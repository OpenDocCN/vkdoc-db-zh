    \    }\n}\n```\n\n`EventHandler` 使用了一个名为 `TagCloudEventArgs` 的控件 `EventArgs` 实现，该实现包含一个名为\
    \ `Token` 的属性，该属性对事件订阅者可用。当事件引发时，此值可以设置为 `TaggedLinksControl` 中的 `Token` 属性。`TaggedLinksControl`\
    \ 的工作方式与 `LinksControl` 类似，但它使用 `Token` 属性通过 `Token` 属性获取链接列表。\n\n**注意** 用户控件可以在每个使用它们的页面中声明，但也可以在\
    \ `Web.config` 文件的 `pages/controls` 部分声明，以便在整个网站中使用一致的标签前缀来引用用户控件。通常，当你将用户控件拖到设计界面时，生成的声明会将标签前缀设置为\
    \ `uc1` 或 `uc2` 等。之后，如果将某个控件从用户控件转换为服务器控件，网站中只需在一个地方调整引用。\n\n## 创建页面\n\n现在，将用户控件组合到页面上并连接它们的属性和事件可能是最简单的步骤。由于母版页已经创建，此页面只需保存用户控件以列出链接和标签云。我们可以创建一个名为\
    \ `Home.aspx` 的新页面，并将用户控件拖到设计界面上。最终结果将如清单 7-40 所示。\n\n`清单 7-40.` `Home.aspx`\n\
    \n```aspx\n<%@ Page Language=\"C#\" MasterPageFile=\"~/FavoriteLink.master\"\n\
    \    AutoEventWireup=\"true\"\n    CodeFile=\"Home.aspx.cs\"\n    Inherits=\"\
    Home\"\n    Title=\"Favorite Link: Home\" %>\n\n<asp:Content ID=\"Content1\" runat=\"\
    server\"\n    ContentPlaceHolderID=\"MainContentPlaceHolder\">\n    <div id=\"\
    HomeContent\">\n        <div class=\"tagCloud\" style=\"float: right; width: 150px;\"\
    >\n            <h3 class=\"Title\">标签</h3>\n            <fl:TagCloudControl ID=\"\
    tagCloud\" runat=\"server\"\n                OnTagSelected=\"tagCloud_OnTagSelected\"\
    \ />\n        </div>\n        <div id=\"Links\">\n            <fl:TaggedLinksControl\n\
    \                ID=\"taggedLinks\" runat=\"server\"\n                Visible=\"\
    false\" />\n            <fl:LinksControl\n                ID=\"lcToday\" runat=\"\
    server\"\n                Title=\"今天\"\n                EndDaysBack=\"0\"\n  \
    \              StartDaysBack=\"1\"\n                TitleVisible=\"true\" />\n\
    \            <fl:LinksControl\n                ID=\"lcThisWeek\" runat=\"server\"\
    \n                Title=\"本周\"\n                EndDaysBack=\"1\"\n          \
    \      StartDaysBack=\"7\"\n                TitleVisible=\"true\" />\n       \
    \     <fl:LinksControl\n                ID=\"lcThisMonth\" runat=\"server\"\n\
    \                Title=\"本月\"\n                EndDaysBack=\"8\"\n           \
    \     StartDaysBack=\"31\"\n                TitleVisible=\"true\" />\n       \
    \ </div>\n    </div>\n</asp:Content>\n```\n\n每个用户控件都没有在页面顶部声明用户控件引用，因为它们已经在 `Web.config`\
    \ 文件的 `pages` 部分预先声明了，如清单 7-41 所示。\n\n`清单 7-41.` `用户控件配置`\n\n```xml\n<pages>\n\
    \    <controls>\n        <add tagPrefix=\"fl\" tagName=\"HeaderNavigation\"\n\
    \            src=\"~/Controls/HeaderNavigation.ascx\"/>\n        <add tagPrefix=\"\
    fl\" tagName=\"LinksControl\"\n            src=\"~/Controls/LinksControl.ascx\"\
    />\n        <add tagPrefix=\"fl\" tagName=\"LoginControl\"\n            src=\"\
    ~/Controls/LoginControl.ascx\"/>\n        <add tagPrefix=\"fl\" tagName=\"TagCloudControl\"\
    \n            src=\"~/Controls/TagCloudControl.ascx\"/>\n        <add tagPrefix=\"\
    fl\" tagName=\"TaggedLinksControl\"\n            src=\"~/Controls/TaggedLinksControl.ascx\"\
    />\n    </controls>\n</pages>\n```\n\n每个用户控件都被赋予 `fl` 作为其 `tagPrefix`，你可以在 `Home.aspx`\
    \ 中看到。这个细节稍微清理了页面，并为声明每个用户控件创建了一致的方式。\n\n这个主页面将 `LinksControl` 列出了三次，分别显示今天、本周和本月添加的链接。`TagCloudControl`\
    \ 列出了与用户添加的链接相关的标签。当链接被点击时，`Token` 属性由 `tagCloud_OnTagSelected` 事件处理程序捕获，如清单 7-42\
    \ 所示。\n\n`清单 7-42.` `tagCloud_OnTagSelected`\n\n```csharp\nprotected void tagCloud_OnTagSelected(object\
    \ sender, TagCloudEventArgs e)\n{\n    lcToday.Visible = false;\n    lcThisWeek.Visible\
    \ = false;\n    lcThisMonth.Visible = false;\n    taggedLinks.Visible = true;\n\
    \    taggedLinks.Title = \"标记为 \" + e.Token;\n    taggedLinks.Token = e.Token;\n\
    }\n```\n\n这几行代码就是调整页面上所有用户控件所需的全部内容。它们所有的独立细节都已完全封装并在内部管理。现在可以在架构的各个层面提升此网站的性能。一些调整可以在表上进行，并与对存储过程的必要修改相协调。另一些调整可以通过在数据访问层引入缓存来完成。在应用层，用户控件和页面可以使用额外的技术，例如数据或输出缓存。每一层都是完全独立和封装的，因此在实施优化时，下一层不需要修改。\n\
    \n## 总结\n\n本章介绍了手动创建数据访问层时需要考虑的步骤和选择。你了解了手动构建此层需要额外的工作，以便利用它所提供的性能增强。最后，你通过使用\
    \ `ObjectDataSource` 和用户控件将数据访问层连接到一个功能网站，这种方式在最大限度地减少维护的同时，也留下了大量无需对应用程序进行重大返工即可优化性能的空间。\n\
    \n# 生成的数据访问层\n\n没有多少开发人员愿意碰数据访问层。大多数开发人员更喜欢坚持使用他们最喜欢的语言，例如 C#，并避免使用他们很少使用的语言，例如\
    \ T-SQL。\n\n这是可以理解的。开发人员使用一种语言越多，他建立的专业知识和信心水平就越高。因此，如果你足够幸运，团队中有一位精通 T-SQL 的熟练数据库开发人员，你肯定会尽可能多地利用他的技能。\n\
    \n然而，这类程序员是稀缺的。为应对这种情况，你可以寻找生成数据访问层的方法，从而大大减少你不得不离开首选语言 C# 所需的时间。\n\n本章涵盖以下内容：\n\
    *   代码生成\n*   SubSonic\n*   Blinq\n"
- fmt: "The common term used when discussing data access layers is `CRUD`, for Create,\
    \ Read, Update, and Delete. Data access layers are mostly boilerplate code. If\
    \ you take this to mean that for each table you just need to create the equivalent\
    \ SQL statements, you can easily generate such code automatically by scanning\
    \ the database and constructing classes that carry out all of the `CRUD` tasks.\
    \ If you want to add smart functionality, such as relationships, you can read\
    \ the foreign key constraints during the code generation process to infer the\
    \ relationships and bake in the object-oriented functionality into your generated\
    \ code. The tools covered in this chapter do all of this work for us in an elegant\
    \ way that does not leave a bad taste in the mouth like Typed Data Sets.\n\n##\
    \ Code Generation\n\nCode generation is an old concept. If you go all the way\
    \ back to the beginning of software development, you will see how source files\
    \ were compiled into assembly code, and developers at the time argued that a compiler\
    \ did not produce code nearly as efficient as assembly instructions written by\
    \ hand. The benefit of using a compiler was implementing the intent of the source\
    \ code with a dramatically shorter development cycle. These days, we are several\
    \ steps beyond this initial step that has taken us well into code generation.\
    \ We write code in an IDE in the language we choose, it is converted into an intermediate\
    \ language (IL), and eventually the Just-In-Time compiler converts it into machine\
    \ code. The compilation process has been improved over the past few decades to\
    \ introduce optimizations the developer does not even know about yet benefits\
    \ from continually. We have embraced code generation, and we are finding new ways\
    \ to make use of it to further accelerate our development cycles while generating\
    \ more efficient code than if we were to develop it ourselves.\n\nWhen you work\
    \ with `ASP.NET`, you are already making use of code generation with each page\
    \ and user control that generates a partial class for each code-behind into memory.\
    \ Each variable reference for the controls placed on the markup side of a page\
    \ is placed in this partial class while you define the rest of the partial class\
    \ in the code-behind file. You may remember the generated code region in `ASP.NET\
    \ 1.1` that warned you not to modify it directly. The code for this region is\
    \ what is now safely generated into the hidden partial class. The code generation\
    \ that makes this work is due to the build providers introduced with `ASP.NET\
    \ 2.0`.\n\n**Note** If you are not building a Website Project and are instead\
    \ building a Web Application Project, you will still be using the old `ASP.NET\
    \ 1.1` model where the code is generated directly into the code-behind file. A\
    \ Web Application Project cannot make use of build providers because it requires\
    \ the dynamic compiler that is only available for websites. A Web Application\
    \ Project is technically a class library, which does not have access to this functionality.\n\
    \n## Build Providers\n\nA build provider is a code generator that places the results\
    \ of the build into memory so that it is accessible by the runtime. Visual Studio\
    \ is able to also run the build providers and make the generated code available\
    \ immediately without needing to compile the project. Build providers are preconfigured\
    \ for all of the common file types such as `.aspx`, `.ascx`, `.asmx`, and several\
    \ others. In the base `Web.config` file, which all websites inherit from, you\
    \ will find a configuration element named `buildProviders`, which lists all of\
    \ the mapped providers. In particular, the `.aspx` extension is mapped to a provider\
    \ called `PageBuildProvider`, while `.xsd` is mapped to `XsdBuildProvider`, which\
    \ creates Typed DataSets.\n\nYou can implement your own build provider and associate\
    \ it with an extension of your choosing. Listing 8-1 shows how you would map a\
    \ build provider for all files with `.xyz` as the extension.\n\n### Listing 8-1.\
    \ Build Provider for .xyz Files\n\n```xml\n<buildProviders>\n    <add extension=\"\
    .xyz\" type=\"Chapter08.BuildProviders.XyzBuildProviders\" />\n</buildProviders>\n\
    ```\n\nWhen the `ASP.NET` compiler comes across files with the `.xyz` extension,\
    \ it will use the configured build provider to generate code into memory so that\
    \ it can be used by pages and controls in a website as well as provide IntelliSense\
    \ support. Figure 8-1 shows how the IntelliSense appears for the generated class.\n\
    \n![Image 32](index-239_1.png)\n\n### Figure 8-1. IntelliSense for generated class\n\
    \nThe `BuildProvider` class, which is found in the `System.Web.Compilation` namespace,\
    \ includes a method named `GenerateCode`, which you must override in order to\
    \ inject your generated code into a website. Listing 8-2 shows an implementation\
    \ of the `GenerateCode` method.\n\n### Listing 8-2. GenerateCode Method\n\n```csharp\n\
    public override void GenerateCode(AssemblyBuilder assemblyBuilder)\n{\n    assemblyBuilder.AddCodeCompileUnit(this,\n\
    \        new CodeSnippetCompileUnit(GetGeneratedCode()));\n}\n```\n\nThe sample\
    \ class that contains the `GenerateCode` method is named `XyzBuildProviders`,\
    \ and it inherits the `BuildProvider` class. The first task you will likely want\
    \ to do is read the contents of the source file. To read the file, you can either\
    \ call `OpenStream`, which returns a `Stream`, or `OpenReader`, which returns\
    \ a `Reader`. Listing 8-3 shows you how to get the contents of the source file\
    \ as a string.\n\n### Listing 8-3. GetContents Method\n\n```csharp\nprivate string\
    \ GetContents()\n{\n    TextReader reader = OpenReader();\n    string contents\
    \ = reader.ReadToEnd();\n    reader.Close();\n    return contents;\n}\n```\n\n\
    The contents of a source file could easily be `XML` or a custom file format of\
    \ your choosing that you can parse and use while constructing your generated code.\
    \ For this example, you will just have a single line in the source file, which\
    \ will be used as the comment for the class.\n\nYou may also want to know the\
    \ name of the source file. Perhaps for each source file you want to generate a\
    \ single class, and the filename of the source file will be reused as the name\
    \ of the generated class. In this case, you can use the `VirtualPath` property,\
    \ which is inherited from the base `BuildProvider` class. For a website, the source\
    \ file must be in the `App_Code` folder, so a typical value would be `/AppCode/SomeFile.xyz`.\
    \ Listing 8-4 shows how the class name can be extracted from this value.\n\n###\
    \ Listing 8-4. GetClassName Method\n\n```csharp\nprivate string GetClassName()\n\
    {\n    int startIndex = VirtualPath.LastIndexOf(\"/\") + 1;\n    int length =\
    \ VirtualPath.IndexOf(\".\") - startIndex;\n    string className = VirtualPath.Substring(startIndex,\
    \ length);\n    return className;\n}\n```\n\nYou could also allow the class name\
    \ to have some significance as well, but here you will assume the same namespace\
    \ regardless of the directory structure. Finally, the `GetGeneratedCode` method\
    \ called in Listing 8-2 is shown in Listing 8-5.\n\n### Listing 8-5. GetGeneratedCode\
    \ Method\n\n```csharp\npublic string GetGeneratedCode()\n{\n    string className\
    \ = GetClassName();\n    string contents = GetContents();\n    StringBuilder code\
    \ = new StringBuilder();\n    code.AppendLine(\"namespace Chapter08.Website {\"\
    );\n    code.AppendLine(\"/// <summary>\");\n    code.AppendLine(\"/// \" + contents);\n\
    \    code.AppendLine(\"/// </summary>\");\n    code.AppendLine(\"public partial\
    \ class \" + className + \" {\");\n    code.AppendLine(\"/// <summary>\");\n \
    \   code.AppendLine(\"/// Returns \" + VirtualPath);\n    code.AppendLine(\"///\
    \ </summary>\");\n    code.AppendLine(\"public static string GetVirtualPath()\
    \ {\");\n    code.AppendLine(\"return \\\"\" + VirtualPath + \"\\\";\");\n   \
    \ code.AppendLine(\"}\\n}\\n}\");\n    return code.ToString();\n}\n```"
