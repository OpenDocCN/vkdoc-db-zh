    \ SET Version = @Version WHERE [Name] = @Name\nEND\nGO\nGRANT EXEC ON chpt09_SetSchemaVersion\
    \ TO PUBLIC\nGO\n```\n\n设置版本是一个简单的过程，要么插入，要么更新架构版本表。获取架构版本需要一个类似的过程。获取命名架构版本的脚本如清单\
