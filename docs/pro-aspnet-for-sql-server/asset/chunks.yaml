    # 第 1 章 入门


    性能始终是一个问题。本书将向你展示如何优化 ASP.NET 2.0 应用程序对 SQL Server 数据库的访问。你可以利用 ASP.NET 2.0 与
    SQL Server 的紧密集成，来实现其他技术无法达到的性能水平。你将详细探究 ASP.NET 2.0 与 SQL Server 之间的中间地带，以及如何加以利用。


    本书通过专业代码演示所有概念，因此你需要做的第一件事就是设置你的开发环境。我将在过程中涵盖相关问题。


    本章涵盖以下内容：


    - 准备你的环境

    - 管理提供程序服务

    - 配置提供程序

    - 创建用户和角色


    ## 准备你的环境


    我通常运行多个 Microsoft Virtual PC 环境，并根据需要在它们之间切换。当我最初设置我的初始虚拟环境时，我会创建所需数量的环境。


    其中一个将作为我的主要开发环境。这很有帮助，因为我会在创建初始环境后立即保留其备份映像。当我尝试测试测试版或第三方插件时，我的环境可能会被"弄脏"。因为卸载过程可能无法完全清理
    Windows 安装，所以虚拟环境就派上用场了。


    例如，在一次本地用户组会议上，演示者正在展示一个与 Visual Studio 集成的工具。我没有在当前开发环境中安装该工具，而是克隆了一个新的环境来试用该工具。之后，我关闭并删除了该环境，为其他环境腾出空间。我的主要环境完全不受影响。


    我还会在虚拟环境中创建两个驱动器。`C:` 盘存放操作系统，而 `D:` 盘存放我的数据。这些驱动器由虚拟硬盘表示。


    如果我决定克隆我的数据驱动器，我可以根据需要将其用于另一个系统。因为我通常使用源代码控制来开发每个项目，所以我可以从一个全新的环境开始，拉取当前项目的版本，然后再次开始开发。


    为了进一步利用虚拟化，你还可以为开发环境创建一个虚拟硬盘安装，并将文件设置为只读。然后，你可以创建一个新的虚拟映像，该映像使用只读副本作为基础映像，同时将所有更改保留在辅助映像上。当你被要求创建新的虚拟硬盘时，可以选择
    `差异` 选项，如图 1-1 所示。


    **图 1-1.** 创建差异虚拟硬盘


    差异映像允许你在开始使用全新的环境进行开发时，保持基础映像不受影响。这可以节省硬盘空间，因为空间可能会很快被占满；一个典型的虚拟映像可以增长到 20 GB，还不包括数据映像。而且，由于你可以让多个虚拟映像使用同一个基础映像，你的环境可以快速根据你的工作需求准备就绪。


    有一次，我的同事需要在第二天开始一个短期的 .NET 1.1 项目。她只安装了 Visual Studio 2005，因此面临一个通常需要几个小时才能完成的漫长安装过程。但因为我已经为
    .NET 1.1 和 .NET 2.0 开发准备好了虚拟映像，我在 20 分钟内就让她准备就绪了。最长时间的等待是复制映像文件从文件服务器上。在她完成这个短期项目后，她就能够移除这个临时环境了。

