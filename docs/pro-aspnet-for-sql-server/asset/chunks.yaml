    The initial infrastructure is prepared here and then the EnsureSiteMapLoaded method
    is called. This method is actually called at multiple points throughout the class
    in the event that the SiteMap data is updated and has to be reloaded. Let’s take
    a look at this method in Listing 5-28.


    **Listing 5-28.** *EnsureSiteMapLoaded Method in SqlSiteMapProvider* private void
    EnsureSiteMapLoaded()


    {


    if (rootNode == null)


    {


    // Build the site map in memory.


    LoadSiteMapFromDatabase();


    }


    }


    The rootNode is required for the SiteMap to work, so setting it to null causes
    the data to be reloaded the next time this method is called. I created a mechanism
    to automatically reset the rootNode back to null when the data is updated.


    The SiteMap data is loaded from that single table by using a single query. Ultimately,
    this data is loaded from the database and placed into the cache mechanism with
    a one-hour window to live, with the CachedItemRemovedCallback attached. When it
    is removed from the cache, it clears the rootNode, forcing it to get fresh data
    on the next pass. There are many ways that the cache can be manipulated to invalidate
    a cached item. For the moment, this uses a very simplistic solution.


    The first way the SiteMap data will be reset is via the simple one-hour time-out
    period, which is helpful to clear up memory when a cached item is not used. I
    also assumed that I am able to control the SiteMap when a change is made to the
    photo album database. What I created was a helper class for the SqlSiteMapProvider,
    which removes the item from the cache.


    8601Ch05CMP3 8/27/07 8:05 AM Page 145


    C H A P T E R 5 ■ S Q L P R OV I D E R S


    **145**


    This raises the CachedItemRemoved event and clears the rootNode. In the code for
    the website, every time an album is added or removed, the code also calls this
    helper class to remove the cached item as well as repopulate the SiteMap with
    the new data.


    This is not a very elegant approach, but it is functional. In the next chapter,
    you will learn techniques to manage cached data in far more efficient ways without
    resorting to manual calls to clear the data.


    **COMMON FOLDER ADDITIONS**


    The custom SiteMap provider will be useful for many websites because the standard
    XML provider is not typically sufficient. This sample could be placed in your
    Common folder under the Templates folder (D:\Projects\Common\Templates\Provider
    Model). The provider model will also be something that you will want to implement
    in future projects, so you may want to also include the Photo Album provider,
    which is available with the sample code download for the book (in the Source Code
    area of the Apress website, http://www.apress.com).


    **Summary**


    This chapter covered the three major ASP.NET SQL providers and how to adjust their
    behavior to suit your needs. You implemented a provider from the ground up and
    integrated it with a custom implementation of a standard SQL provider. The topics
    covered in this chapter showed how your application can use providers as pluggable
    components. These components are completely interchangeable by design, giving
    you the flexibility necessary to rework whatever part of your application that
    you determine needs to be reworked. This chapter also showed you how the interface
    layer will automatically work with multiple provider implementations if you simply
    adjust the configuration.


