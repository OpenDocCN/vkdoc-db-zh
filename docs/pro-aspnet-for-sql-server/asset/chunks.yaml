    \ 地址的物理位置。允许用户从可信的物理位置（而不仅仅是一个 IP 地址）在其账户上执行某些操作，可以增强安全性，同时也使用户更方便。如果你的用户在芝加哥生活和工作，当你知道她是从该位置登录时，可以授予她更高信任级别。然而，如果她下午\
    \ 1:00 在芝加哥登录，而有人在下午 1:40 从洛杉矶登录，你可以假设发生了意外情况，将账户标记为待审查，并提醒用户注意这一不明活动。\n\n`GeoIP`\
    \ 试图为每个 IP 地址确定一个物理位置，但它并不总是准确的——就像你不能总是在电话簿中查到某人的电话号码一样。你也可以使用按国家分配的 IP 地址块。例如，韩国的\
    \ IP 地址范围从 `210.220.128.0` 到 `210.223.255.255`。即使你无法确定用户是否在芝加哥，你也可以确定该用户是从韩国、中国、俄罗斯还是其他国家访问网站。\n\
    \n### 在 Web 场中使用共享的机器密钥\n\n当将多个 Web 服务器放入一个场中以分担高流量网站的负载时，有必要使用机器密钥设置，该设置通常对服务器是唯一的。此配置设置包括验证密钥和解密密钥，用于哈希处理和解密。表单身份验证令牌使用这些值，如果机器密钥在服务器之间不一致，当用户会话在服务器之间跳跃时，你将遇到身份验证问题。使用粘性会话可以部分避免此问题，但在用户离开较长时间后，他可能会失去与负载均衡器的粘性会话，并访问具有不同机器密钥值（这些值将不兼容）的不同服务器。\n\
    \n其他数据也受机器密钥保护，例如 `ViewState`，它被加密以防止篡改。如果用户使页面空闲很长时间，然后导致 `PostBack`，该用户可能会因为这种跨服务器不兼容性而遇到异常。\n\
    \n机器密钥在 `Web.config` 文件中配置，并且必须生成。尽管 Microsoft 不提供生成这些值的实用工具，但 MSDN 文档解释了如何操作。可以在诸如代码项目网站（The\
    \ Code Project）之类的网站上找到多个执行此操作的实用工具，该网站有一个实用工具，恰当地命名为 ASP.NET `machineKey 生成器`。\n\
    \n### 构建 SQL 相册提供程序\n\n除了标准提供程序之外，你还可以创建自己的自定义提供程序以满足特定需求。在构建自己的提供程序时，你可以让它与标准提供程序的接口交互，以实现无缝集成。创建自己的自定义提供程序允许多种实现。对于内部应用程序，可能不需要不止一种实现，至少最初是这样。\n\
    \n你可以构建一个由多个应用程序使用的组件。如果你使用提供程序模型来构建它，你就允许多种实现。此组件可以与自定义订单履行系统交互。后来，你的公司可能会购买一个处理相同功能的订单履行系统套件。你不必将应用程序与这个新套件紧密耦合，而是可以为其创建一个提供程序实现。将应用程序迁移到它只需调整配置即可。\n\
    \n相同的场景可以应用于组件的内部版本。自定义提供程序的第一次实现可能与一组复杂的底层依赖项交互。也许你有一座难以维护的遗留代码山，但你和你的团队正在清理它以提高可维护性。之后，随着代码库的重构，你可以创建一个使用更新系统的新实现。构建在提供程序之上的应用程序不必更改。\n\
    \n对程序集进行版本控制也可以实现类似的解决方案。提供程序的不同之处在于，你不是直接针对实现或版本编译应用程序。相反，你将提供程序用作一个抽象层，它将使用配置来实例化所需的程序集。这样做还可以避免将一个程序集直接绑定到另一个程序集的特定版本。\n"
- fmt: "# Chapter 5: SQL Providers\n\n## Provider Requirements\n\nA provider is made\
    \ up of three essential pieces: the abstract provider, at least one provider implementation,\
    \ and the configuration to load the implementation. For a custom provider built\
    \ from the ground up, you will need additional code to load the configuration\
    \ and give you access to the provider implementations. If you were implementing\
    \ a custom implementation of an existing provider, such as the `MembershipProvider`,\
    \ you would use the loading mechanism already in place and just create your provider\
    \ implementation class.\n\nThe first two classes to implement when getting started\
    \ with a new provider are the configuration and provider collection classes. To\
    \ facilitate the loading of providers, there is a whole infrastructure to support\
    \ the process. Using the following classes accelerates the process of creating\
    \ a provider.\n\n### Configuration Section Class\n\nIf you were to look in the\
    \ `Machine.config` file for references to the membership, you would see a section\
    \ definition that references the `MembershipSection` type, which is the class\
    \ that the `MemerbershipProvider` uses to read in its configuration. This class\
    \ inherits the `ConfigurationSection` class, which you will use to create your\
    \ own `PhotoAlbumSection` class, starting with Listing 5-18.\n\n**Listing 5-18.**\
    \ *PhotoAlbumSection.cs*\n\n```csharp\nusing System.Configuration;\n\nnamespace\
    \ Chapter04.PhotoAlbumProvider\n{\n    public class PhotoAlbumSection : ConfigurationSection\n\
    \    {\n        [ConfigurationProperty(\"providers\")]\n        public ProviderSettingsCollection\
    \ Providers\n        {\n            get { return (ProviderSettingsCollection)base[\"\
    providers\"]; }\n        }\n\n        [StringValidator(MinLength = 1)]\n     \
    \   [ConfigurationProperty(\"defaultProvider\", DefaultValue = \"SqlPhotoAlbumProvider\"\
    )]\n        public string DefaultProvider\n        {\n            get { return\
    \ (string)base[\"defaultProvider\"]; }\n            set { base[\"defaultProvider\"\
    ] = value; }\n        }\n    }\n}\n```\n\nThe `Providers` property loads the providers\
    \ sub-element, while the `DefaultProvider` property loads the value of the `defaultProperty`\
    \ attribute. There is really not much work necessary at this point, because the\
    \ provider infrastructure handles a good deal of the work.\n\nSimply creating\
    \ a property for the `ProviderSettingsCollection` type causes this `AlbumSection`\
    \ class to function as a provider configuration section, just as with the standard\
    \ providers, which hold the `add`, `remove`, and `clear` directives within a `providers`\
    \ element in the configuration. The `Providers` property automatically handles\
    \ these configuration elements.\n\n### Provider Collection Class\n\nBecause you\
    \ can configure multiple instances of a provider, you will want to be able to\
    \ hold a collection of them. To do so, you will create a class called `PhotoAlbumProviderCollection`,\
    \ which will inherit the `ProviderCollection` and override the behavior to use\
    \ the `PhotoAlbumProvider` type instead of the generic `Provider` type. This class\
    \ is shown in Listing 5-19.\n\n**Listing 5-19.** *PhotoAlbumProviderCollection.cs*\n\
    \n```csharp\nusing System;\nusing System.Configuration.Provider;\n\nnamespace\
    \ Chapter04.PhotoAlbumProvider\n{\n    public class PhotoAlbumProviderCollection\
    \ : ProviderCollection\n    {\n        public new PhotoAlbumProvider this[string\
    \ name]\n        {\n            get { return (PhotoAlbumProvider)base[name]; }\n\
    \        }\n\n        public override void Add(ProviderBase provider)\n      \
    \  {\n            if (provider == null)\n                throw new ArgumentNullException(\"\
    provider\");\n            if (!(provider is PhotoAlbumProvider))\n           \
    \     throw new ArgumentException(\"Invalid provider type\", \"provider\");\n\
    \            base.Add(provider);\n        }\n    }\n}\n```\n\nWith your own customized\
    \ provider infrastructure in place, you are ready to start defining the `PhotoAlbumProvider`.\n\
    \n## Abstract Provider Class"
