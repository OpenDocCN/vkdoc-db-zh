- fmt: "Now you’ll do much of the same with the Roles provider. This configuration\
    \ block is called `roleManager`, and in addition to the `defaultProvider` attribute,\
    \ it also has an attribute called `enabled`, which allows you to turn it on and\
    \ off. Later you can easily access the `enabled` setting in your code by using\
    \ the `Roles.Enabled` property. By default this value is set to `false`, so it\
    \ must be set to add support for roles even if you have configured a provider.\
    \ See the following roles configuration in Listing 1-8.\n\n# Chapter 1: Getting\
    \ Started\n\n**Listing 1-8.** *Roles Configuration*\n```xml\n<roleManager defaultProvider=\"\
    Chapter01SqlRoleProvider\" enabled=\"true\">\n    <providers>\n        <clear/>\n\
    \        <add\n            name=\"Chapter01SqlRoleProvider\"\n            connectionStringName=\"\
    chapter01db\"\n            applicationName=\"/chapter01\"\n            type=\"\
    System.Web.Security.SqlRoleProvider, System.Web, Version=2.0.0.0, Culture=neutral,\
    \ PublicKeyToken=b03f5f7f11d50a3a\"\n        />\n    </providers>\n</roleManager>\n\
    ```\n\n## Profile Configuration\n\nFinally, you can add support for the Profile\
    \ provider. And as with the preceding two provider configurations, you will set\
    \ the `defaultProvider` attribute to match the newly added configuration and also\
    \ add the `clear` element to ensure that this is the only configured provider.\
    \ The unique feature for the Profile provider configuration is the ability to\
    \ define custom properties.\n\nIn the sample configuration shown in Listing 1-9,\
    \ a few custom properties have been defined: `FirstName`, `LastName`, and `BirthDate`.\
    \ I will explain these properties in a bit; Table 1-2 lists the profile configuration\
    \ settings.\n\n**Listing 1-9.** *Profile Configuration*\n```xml\n<profile defaultProvider=\"\
    Chapter01SqlProfileProvider\" automaticSaveEnabled=\"true\" enabled=\"true\">\n\
    \    <providers>\n        <clear/>\n        <add\n            name=\"Chapter01SqlProfileProvider\"\
    \n            applicationName=\"/chapter01\"\n            connectionStringName=\"\
    chapter01db\"\n            type=\"System.Web.Profile.SqlProfileProvider, System.Web,\
    \ Version=2.0.0.0, Culture=neutral, PublicKeyToken=b03f5f7f11d50a3a\"/>\n    </providers>\n\
    \    <properties>\n        <add name=\"FirstName\" type=\"String\" allowAnonymous=\"\
    true\" />\n        <add name=\"LastName\" type=\"String\" allowAnonymous=\"true\"\
    \ />\n        <add name=\"BirthDate\" type=\"DateTime\" allowAnonymous=\"true\"\
    \ />\n    </properties>\n</profile>\n```\n\n**Table 1-2.** *Profile Configuration\
    \ Settings*\n\n**Setting** | **Description**\n---|---\n`name` | Specifies the\
    \ configuration name referenced by the profile element.\n`applicationName` | Defines\
    \ the application name used as a scope in the Profile database.\n`connectionStringName`\
    \ | Specifies the connection string to use for this provider.\n\nYou can see those\
    \ custom properties near the end. The Profile provider allows you to manage properties\
    \ that are bound to the ASP.NET user. You can define anything that can be serialized.\
    \ In the three examples, both `String` and `DateTime` objects can easily be serialized\
    \ for storage in the SQL Server database. However, the properties can be much\
    \ more complicated objects than these common primitive types. Perhaps you have\
    \ a business object called `Employee`, which holds properties such as `Title`,\
    \ `Name`, `Department`, and `Office`. Instead of configuring all these properties,\
    \ you can instead just specify the `Employee` object as a property.\n\nThen with\
    \ code in either your code-behind classes or classes held with the `App_Code`\
    \ folder, you can access this property as `Profile.Employee`. Thanks to the dynamic\
    \ compiler, which is part of the ASP.NET runtime, these properties are immediately\
    \ available within Visual Studio with IntelliSense support. That sounds really\
    \ powerful, doesn’t it? It is.\n\nHowever, you can quickly paint yourself into\
    \ a corner if you set up many complex objects as Profile properties. What happens\
    \ when you need to add or remove properties to the `Employee` object but you already\
    \ have many serialized versions of the object held in the database? How will you\
    \ upgrade them?\n\nWhen ASP.NET 2.0 first came out, I saw all kinds of examples\
    \ of how you could create an object called `ShoppingBasket`, add objects called\
    \ `Items` to the `ShoppingBasket`, and set up the `ShoppingBasket` as a Profile\
    \ property. I immediately knew that would not be something I was going to attempt.\
    \ In the year previous to the launch of .NET 2.0, I was building a commerce website\
    \ to manage a basket with items and customer orders, and I never used the Profile\
    \ properties. I still had my `ShoppingBasket` object, which held lots of `Item`\
    \ objects, but I managed the tables and stored procedures used with those objects\
    \ so that I could add new properties to them and easily manage the changes. If\
    \ the `Item` started out with just one value for price called `Price`, and later\
    \ I needed to add a couple more such as `SalesPrice` and `SeasonalPrice`, it was\
    \ easy enough to add them. And to associate them to the current website user,\
    \ I used the following technique.\n\nFor this particular website, I had to work\
    \ with anonymous and authenticated users. When a user first came to the site,\
    \ that user was given a token to identify him as he moved from page to page. This\
    \ was an anonymous user token. After the user created an account, that anonymous\
    \ token would be deleted and the user would be migrated to an authenticated user\
    \ token. Authenticated users were Members with the Membership provider. To seamlessly\
    \ work with anonymous and authenticated users, I needed a way to uniquely identify\
    \ these users. Unfortunately, there is no such default value as `Profile.UserID`.\
    \ There is a property for `Profile.UserName`, but that is available only for authenticated\
    \ users. So I ended up creating a wrapper property, which provided a `Guid` value\
    \ whether the user was anonymous or authenticated.\n\n## ANONYMOUS PROFILES\n\n\
    To make use of properties on the profile, you must first have anonymous profiles\
    \ enabled. An element in `system.web` named `anonymousIdentification` can be enabled\
    \ to turn on this feature.\n\nIn the `App_Code` folder, I created a class called\
    \ `Utility` and added the properties in Listing 1-10.\n\n**Listing 1-10.** *Utility\
    \ Methods*\n```csharp\npublic static bool IsUserAuthenticated\n{\n    get\n  \
    \  {\n        return HttpContext.Current.User.Identity.IsAuthenticated;\n    }\n\
    }\n\npublic static Guid UserID\n{\n    get\n    {\n        if (IsUserAuthenticated)\n\
    \        {\n            return (Guid)Membership.GetUser().ProviderUserKey;\n \
    \       }\n        else\n        {\n            Guid userId = new Guid(HttpContext.Current.Request.AnonymousID.Substring(0,\
    \ 36));\n            return userId;\n        }\n    }\n}\n```\n\nWhenever I needed\
    \ the unique identifier for the current user, I would access it with `Utility.UserID`.\
    \ But then I had to handle the transition from anonymous to authenticated.\n\n\
    To do so, I added a method to `Global.asax` called `Profile_OnMigrateAnonymous`,\
    \ shown in Listing 1-11.\n\n**Listing 1-11.** *Profile_OnMigrateAnonymous*\n```csharp\n\
    public void Profile_OnMigrateAnonymous(object sender, ProfileMigrateEventArgs\
    \ args)\n{\n    Guid anonID = new Guid(args.AnonymousID);\n    Guid authId = (Guid)Membership.GetUser().ProviderUserKey;\n\
    \n    // migrate anonymous user resources to the authenticated user\n\n    //\
    \ remove the anonymous user.\n    Membership.DeleteUser(args.AnonymousID, true);\n\
    }\n```\n\nIn the case of the basket, I just added the items that were in the anonymous\
    \ user’s basket into the authenticated user’s basket, and removed the anonymous\
    \ account and all associated data.\n\nI have considered adding a `Guid` property\
    \ to the Profile properties called `UserID`, but the dynamic compiler for the\
    \ ASP.NET runtime works only in code-behind files. It would not work in the `Utility`\
    \ class held in the `App_Code` directory, which is where I place a good deal of\
    \ the code. So the preceding technique was the only option.\n\n## Creating Users\
    \ and Roles"
