    Both of the solutions I’ve described work sufficiently if there is not a great
    deal of data.


    But after there is a significant amount of data, the time necessary to transfer
    all that data between the database and application will become unreasonably long
    because the query is transferring all the data each time. The sheer size of the
    data being pulled from the database


    8601Ch02.qxd 8/29/07 5:00 PM Page 53


    C H A P T E R 2 ■ D ATA M O D E L C H O I C E S


    **53**


    will contribute to this sluggishness. Then shaping that data into the DataSet
    requires a certain amount of processing overhead. By using a DataReader, you can
    reduce that overhead.


    **DataReader**


    Unlike a DataSet, the DataReader does not offer functionality such as sorting,
    filtering, or even bidirectional movement on the result set. It has minimal features
    to iterate over the result rows and access the fields as needed. After you have
    passed a row, you cannot return to it with a DataKey or an index. Those seem like
    major limitations, but these limitations are meant to cut down on the overhead
    necessary with the DataSet, which maintains indexes on the data columns and holds
    the full result set in memory. In contrast, the DataReader is a lean and mean
    option with unique characteristics that make it ideal in some cases.


    Listing 2-10 shows the code to add to PersonDomain, which again calls the same
    stored procedure but returns an IDataReader object as the result instead of a
    DataSet.


    **Listing 2-10.** *GetAllPeopleReader*


    [DataObjectMethod(DataObjectMethodType.Select)]


    public IDataReader GetAllPeopleReader()


    {


