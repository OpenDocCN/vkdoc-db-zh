  trans: '

    球所在的线段、哪方控球以及当前是第几档进攻。这些通常都是基于 Adobe Flash 的应用程序，它们能够访问网页服务器之外的不同来源，并能处理经过优化以降低整体带宽需求的数据流。发送
    4KB 的数据流肯定比让用户每更新一次就刷新 50KB 的页面要好得多。通过采用另一种更高效的通信方案来管理数据流，高负载就能得到更有效的管理。


    ## 分配流量


    流量可以进行分配，这样即使你每天有 50 万次点击，也可以将它们分散到五台服务器上，从而有效地使每台服务器每天处理 10 万次点击。这种网站集群（web farm）方法相当普遍，并得到负载均衡硬件的支持。你甚至可以利用这样一个事实：通过域名系统（DNS），一个主机名可以关联多个
    IP 地址。当一个网站的主机名配置了多个 IP 地址时，网络浏览器会循环使用每个 IP 地址。这种技术被称为 `Round Robin DNS`（循环 DNS）。像
    `www.cnn.com` 和 `www.microsoft.com` 这样的网站，就为其网站地址配置了多个 IP 地址，以便从负载分配中获益。图 10-1
    显示了在 `www.cnn.com` 和 `www.microsoft.com` 上运行 `nslookup` 实用程序的结果。你可以看到这两个网站都有多个
    IP 地址。


    **图 10-1.** `Round Robin DNS`


    由多台服务器组成、连接到一个共同的数据库服务器的网站集群，可以有效地分配处理负载。结合良好的数据缓存策略，网站集群还可以减轻数据库的负载。


    除了仅通过 DNS 进行逻辑分配外，你还可以将硬件分布到多个物理网络。你可以在几个主要城市的托管设施中放置服务器，这些设施接入互联网的主要骨干网，这将保证所有用户都能可靠、快速地访问你的网站。我住在密尔沃基，记得
    1998 年有几次，在安装新线路时，密尔沃基和芝加哥之间的主干线被切断了。当时，还没有像现在这样通往麦迪逊和明尼阿波利斯等其他地点的冗余线路。我们接到客户的电话，说他们无法访问我们为他们托管的网站，尽管这些网站是在线的，甚至从城市内的不同地点也可以访问。如果这些网站被托管在多个托管设施中，可能只有极小一部分用户无法访问，或者根本不受影响。


    ## 分配内容


    虽然分配网站流量可以提供访问速度和可靠性，但你也可以通过分配你发布的内容来获得类似的益处。网站上的大量带宽可能用于图像和其他静态媒体。没有理由让所有这些内容都来自同一个网络服务器。你可以将包含所有动态页面的
    ASP.NET 网站部署在一台服务器上，而将所有媒体部署在另一台服务器上，或者将媒体分布在多台服务器上。这样，生成动态页面的服务器就能被释放出来，专注于处理个性化内容。


    多年来，苹果、微软、`Amazon.com` 和 Facebook 都使用了将媒体分散到庞大网络服务器群上的服务，这使他们能够应对因定期发布新产品和服务而出现的流量高峰。


    ### 托管在 AKAMAI 上


    多年来，主要网站使用的流行内容分发网络一直是 `Akamai` (`www.akamai.com`)。它提供的主要服务一直是图像缓存，尽管后来也扩展到了动态和个性化内容。如果你查看
    `images.apple.com`，你会看到在主机名下面，内容是由 `Akamai` 托管的。


    将内容分配到单独网站的一个有用之处在于，你可以充分利用 HTTP 提供的传输机制，例如过期头（这是响应内容之前的众多头信息之一）。当你使用输出缓存时，会设置过期头。如果用户在过期时间内返回到该页面，该用户的网络浏览器可能直接从本地浏览器缓存中读取内容。


    当大量用户位于使用过期头来保存你网站内容的缓存代理后面时，客户端缓存会得到进一步增强，这样你就不必为每个请求提供服务。像 AOL 这样的大型互联网服务提供商（ISP）曾使用大型代理来减少其网络上的带宽，从而惠及用户并降低成本。在大多数用户使用拨号调制解调器、带宽有限的时候，减少带宽是
    AOL 的一个主要关注点。最近，Google 推出了他们的网络加速器服务，本质上是一个缓存大量内容的巨型代理。然而，它无法缓存动态内容，这包括所有未启用输出缓存而生成的
    ASP.NET 网站。


    如果你的网站有大量的静态内容，比如图像、样式表和 JavaScript，你将从客户端缓存中获益匪浅，尽管这些好处并不是绝对的。事实上，在 ASP.NET 网站上放置此类内容可能会妨碍它获得尽可能多的缓存，因为
    ASP.NET 网站上的每一段内容都与构成匿名和认证会话的 Cookie 相关联。缓存代理将不得不假设，用户从你网站拉取的、带有 Cookie 的静态内容对该用户来说必须是唯一的。这样，代理就不会为你网站每个页面使用的、用于所有共享代理后面用户的那个
    35KB 的页头图形进行缓存。你可以做的是，将你的静态内容放置到一个未配置为 ASP.NET 网站的子域上，这样就完全不涉及 Cookie。你需要确保，如果你的主网站运行在
    `www.acme.com`，而你的图片运行在 `images.acme.com`，你的 Cookie 不要被笼统地设置为来自 `acme.com`，否则会导致
    Cookie 与图片相关联。


    当你的静态内容符合大多数代理遵循的标准后，你将开始通过利用你直接控制范围之外的资源，真正从内容分发中受益。然而，你需要小心处理静态内容。我从一位 Yahoo!开发者的演讲中了解到代理在处理
    Cookie 时遇到的问题，他解释说，他们对静态图片采用一次性使用策略。图片发布后就不能更改。相反，他们必须将更新后的图片发布到一个新的 URL，并将他们的页面指向它。这种方法旨在确保无论客户端缓存多么激进，他们的用户都能获得正确的图片。对于再次成为现代
    Web 应用关键部分的 JavaScript，也可以采用同样的方法。


    ### 使用静态文件开发

    '
- fmt: 'Renaming static files as you work with them during development is not a realistic
    option. I tend to place a unique query string at the end of a script reference
    (`script.js?20070707`) to ensure that when it goes to the staging server to be
    tested, the Quality Assurance team gets the latest version of the script. It saves
    me from having to version-control an ever-changing filename while also keeping
    the application aligned with the latest version. When the website is released
    to the users, I can rename the script to include an arbitrary and unique version
    number to ensure that the day the new website goes live, users are not using the
    old version of the script. I find this is sometimes necessary for style sheets
    as well, especially with Internet Explorer, which very reluctantly replaces items
    that it has cached locally.


    ## Distributing Services


    You can also split the dynamic content of your website into multiple sub-domains.
    CNN.com could split their website into multiple sub-domains such as `weather.cnn.com`,
    `politics.cnn.com`, `entertainment.cnn.com`, and `sports.cnn.com`. Google already
    has their services split into sites such as `maps.google.com`, `mail.google.com`,
    and `news.google.com`. With each service set up to run in a more independent way,
    you will gain flexibility you would not have with a single large website. Each
    of the sub-domains would be dedicated to a specific service.


    With the services split up onto separate servers, you will have the ability to
    independently manage each of the websites. If the development team working on
    the mapping website is ready to put out a new release, the team can do so without
    being concerned about how it will impact the mail and news websites (because they
    are decoupled from the mapping website).


    The mail and news websites at Google likely have their own servers and release
    schedules with a minimal number of dependencies between them. Each website can
    then act as one collective by using their single sign-on functionality, which
    unifies all Google websites, much like you would do with your own website using
    the `ASP.NET Membership Provider`.


    If you could break your website into multiple sections and split them across multiple
    servers while also breaking up the development and release schedule, you could
    take an unwieldy website and shape it into multiple websites that are much easier
    to manage from technical and project management points of view. As traffic increases
    on one of the services, you can add more web servers to the web farm that is hosting
    that service to improve overall performance. Your services could also overlap
    across servers. Table 10-2 shows an intranet website split across many sub-domains
    to service a large company. The services are grouped by Human Resources (HR),
    Timesheets (TS), Accounts Payable (A/P), Accounts Receivable (A/R), and Contracts
    (C).


    **Table 10-2.** *Overlapping Services*


    | **Server** | **HR** | **TS** | **A/P** | **A/R** | **C** |

    | :--- | :---: | :---: | :---: | :---: | :---: |

    | Web01 | X | | | | X |

    | Web02 | | X | | | X |

    | Web03 | | | X | | |

    | Web04 | | | | X | |

    | Web05 | X | | X | | |

    | Web06 | | X | | X | |

    | Web07 | X | | | X | |

    | Web08 | | X | X | | |

    | Web09 | X | X | | | |

    | Web10 | | | X | | X |


    With ten servers in the web farm, the services can be placed on each of them.
    To reduce the cost of maintenance, however, the services are placed on only as
    many servers as necessary to provide the desired level of service. The applications
    that get much more traffic and require more resources, such as A/P and A/R, are
    placed on five servers each. The services are also on separate servers so that
    no A/P service is hosted on an A/R server. Meanwhile, the lesser-used applications
    such as Contracts, Human Resources, and Timesheets are spread across the ten servers
    to ensure an even spread. Traffic to these ten servers could be managed by `Round
    Robin DNS` or a load-balancing router.


    ## Distributing the Back End


    The approaches in the previous section break up the front-end traffic, but because
    the bottleneck will often be the database, you will want to consider breaking
    up the various groupings of data so you can run multiple database servers. For
    the intranet example in the previous section, the breakdown could easily go along
    the lines of the five services: Human Resources, Timesheets, Accounts Payable,
    Accounts Receivable, and Contracts. Initially, when you set out to create a distributed
    back end, you can do so logically long before you physically distribute the databases.
    Either `SQL Server` could have a single logical database with each of the tables
    and stored procedures carefully managed so they do not become interdependent over
    time, or you can run multiple logical databases on the same physical server. Later,
    as the company grows to the point that the single physical server is not enough,
    you can move one or more of the databases to a second server to physically distribute
    the back end. Table 10-3 shows the initial configuration for a small company with
    a single database server.


    **Table 10-3.** *Small Company Configuration*


    | **Hostname** | **Database Name** | **Service** | **Database** |

    | :--- | :--- | :--- | :--- |

    | `hrdb.acme.com` | HR | Human Resources | `DB1` |

    | `tsdb.acme.com` | TS | Timesheets | `DB1` |

    | `apdb.acme.com` | AP | Accounts Payable | `DB1` |

    | `ardb.acme.com` | AR | Accounts Receivable | `DB1` |

    | `contactsdb.acme.com` | Contracts | Contracts | `DB1` |


    Table 10-3 shows the configuration of the five databases that handle all the services
    for the intranet website. A small company needs only a single database, so each
    of the hostnames point to the `DB1` database, which may be at an internal IP address
    of `10.10.1.101`. Each of the hostnames point to that IP address. Later, when
    the databases are distributed to separate physical servers, that data will be
    moved and the DNS records will be updated while the application configurations
    remain the same, as long as they are configured with these hostnames.


    Listing 10-1 shows the connection string for the `AP` database.


    **Listing 10-1.** *Connection String for AP Database*

    `Data Source=apdb.acme.com;Initial Catalog=AP;Integrated Security=True`


    When the company grows and the application performance needs to improve, you could
    move the database that is under the most load to a new database server, perhaps
    with much more capable hardware than the initial database server created when
    the company was smaller and had a much smaller budget. Now instead of just a basic
    `RAID` and dual processor server, you may be stepping up to a `SAN` with a quad
    processor server, which could handle your top two databases. This updated configuration
    is shown in Table 10-4.


    **Table 10-4.** *Growing Company Configuration*


    | **Hostname** | **Database Name** | **Service** | **Database** |

    | :--- | :--- | :--- | :--- |

    | `hrdb.acme.com` | HR | Human Resources | `DB1` |

    | `tsdb.acme.com` | TS | Timesheets | `DB1` |

    | `apdb.acme.com` | AP | Accounts Payable | `DB2` |

    | `ardb.acme.com` | AR | Accounts Receivable | `DB2` |

    | `contactsdb.acme.com` | Contracts | Contracts | `DB1` |


    After the databases for the A/P and A/R services have been moved, the DNS records
    for `apdb.acme.com` and `ardb.acme.com` could be pointed to the IP address of
    the new server, `10.10.1.102`. The change to the new IP will not be instant, as
    the `DNS` record typically has a “time to live” setting of 30 minutes or an hour.
    To make the change immediate, you will need to flush the `DNS` on the application
    servers to force them to get the latest `DNS` information and begin routing the
    right requests to the databases. For a time, you may want to set the A/P and A/R
    databases to `Read Only` and leave them online for a while after the transition.


    ## Planning for Scalability'
