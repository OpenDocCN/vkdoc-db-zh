    **Creating the Admin User**


    After your Admin section is ready, you will naturally need the Admin user so you
    can log in to this section and use the controls. It is sort of a catch-22 scenario.
    But just as you can use the Membership API to manage users and roles, with these
    controls you can also programmatically create users and roles. To automatically
    ensure that your website has the necessary Admin user, you can add the code to
    do all of this work to the Application_Start event handler in the Global.asax
    file for the website. I first check whether the three default roles exist and
    add each one that does not exist. And then if there are no users, I have the method
    add the default Admin user, as shown in Listing 1-19.


