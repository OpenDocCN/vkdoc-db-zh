  trans: "\n`AttachProperty` 方法接收必要的变量，用以引用该属性将要访问的相关私有成员变量。该属性使用 `CodeMemberProperty`\
    \ 类型，结合 `CodeFieldReferenceExpression`、`CodeMethodReturnStatement` 和 `CodeAssignStatement`\
    \ 等类来创建。此方法首先创建属性实例，创建对字段的引用，然后向该属性添加 getter 和 setter 语句。\n最后，该属性被添加到 `generatedClass`\
    \ 的 `Members` 集合中。\n核心工作就是这些。还有几个小的私有方法来辅助这个过程。\n\n### GetNamespace 方法\n`GetNamespace`\
    \ 方法从配置中获取字符串值。\n```\nprivate string GetNamespace()\n{\n    string ns = ConfigurationManager.AppSettings[\"\
    AbcNamespace\"];\n    if (String.IsNullOrEmpty(ns))\n    {\n        ns = \"Abc\"\
    ;\n    }\n    return ns;\n}\n```\n`AbcNamespace` 的配置应添加到网站中，值为 `Chapter08.Website`；否则将默认使用\
    \ `Abc`。\n\n### GetFieldName 方法\n`GetFieldName` 方法根据所有先前代码示例中遵循的命名约定，将属性名转换为字段名，即在字段名前加下划线。\n\
    ```\nprivate string GetFieldName(string propertyName)\n{\n    return \"_\" +\n\
    \           propertyName.Substring(0, 1).ToLower() +\n           propertyName.Substring(1);\n\
    }\n```\n现在，当网站与构建提供程序一起编译时，它将生成一个名为 `Person` 的新类，其中包含前面清单 8-7 中显示的所有字段。构建成功运行后，你可以打开对象浏览器查看新生成的类。图\
    \ 8-2 展示了包含所有已生成字段和属性的 `Person` 类。\n原始源文件是十行 XML，而它生成的类却超过 60 行代码，这些代码我都不用自己写。你可以更进一步：不用\
    \ XML 文件直接定义字段，而是让 XML 数据指向数据库中的一个表或存储过程，由它们提供生成所有这些字段和属性所需的全部详细信息。几个流行的数据访问层项目正是这么做的。本章稍后将介绍的\
    \ `SubSonic` 和 `Blinq` 都从数据库读取架构，并根据发现的信息生成类。我将向你展示这两个项目提供的功能。但首先，考虑一下你会如何生成所有这些代码。虽然仅用\
    \ `CodeDom` 你也能非常快速地完成，但你应该考虑使用模板。\n\n## 模板\n虽然 `CodeDom` 为你提供了一种结构化的方式来生成代码，但使用\
    \ `CodeDom` 可能很繁琐且难以维护。`CodeDom` 也让人感觉不自然。作为开发者，我们更习惯看起来像代码的代码，而不是 `CodeDom` 用来描述构成代码的各个部分的衍生形式。当你浏览一组使用\
    \ `CodeDom` 生成代码的方法时，你会看到对 `CodeTypeDeclaration` 和 `CodeMemberProperty` 的引用。当\
    \ `CodeDom` 代码很多时，它可能难以理解，也难以在脑中拼凑起来。\n因此，当需要生成大量代码时，将代码段放入模板文件中会很有帮助。这些模板文件可以以尽可能接近实际代码的形式读取。生成代码时，该过程会读取这些模板，并将结果字符串加载到\
    \ `CodeCompileUnit` 中以生成类。\nASP.NET 对页面和用户控件使用模板，这些内容主要由 HTML 以及特定于 ASP.NET 控件的特殊指令组成。如果不这样做，你就必须像早期\
    \ Web 开发那样，从源文件中拼凑所有的 HTML。\n前面章节中从 XML 文件生成所有字段只需要大约 100 行 `CodeDom` 代码。这相当不错，但它也只定义了字段和属性。\n\
    创建调用存储过程的方法（可能带有多个输入参数）将需要使用 `CodeDom` 完成大量更多的工作。而且，正如你所看到的，调用存储过程是非常样板化的代码，特别是在使用企业库（Enterprise\
    \ Library）时，你可以从模板中获得很多价值。\n我将要 review 的第一个代码生成器是 `SubSonic`，它包含一个丰富的模板系统。\n\n\
    ### SubSonic\n`SubSonic` 是一个开源项目，部分托管在 CodePlex 上，因其提供的许多引人注目的功能而广受欢迎。最近，`SubSonic`\
    \ 发布了 2.0 版本，增加了对企业库的支持以及为多个数据库生成代码的能力。更多详情请访问 http://www.subsonicproject.com。这里，我将重点介绍它如何使用模板生成代码以及如何从数据库读取详细信息来生成代码。\n\
    > **注意** CodePlex (http://www.codeplex.com) 是微软提供的最新的代码存储库。它以 Team System 作为源代码控制和工作项跟踪系统。有一个免费的支持\
    \ Team System 的 Visual Studio 版本可用于与 CodePlex 一起工作。CodePlex 也支持与 Windows 资源管理器集成的\
    \ Subversion 客户端 TortoiseSVN 的基本桥接。\n你需要下载 `SubSonic` 项目文件用于本节，并将它们放入如图 8-3 所示的公共工具文件夹中。你将从此位置引用命令行工具以及\
    \ `SubSonic` 程序集。如果你想编译 `SubSonic` 项目，还需要安装 SQL Server SDK。\n运行 `SubSonic` 是通过一个名为\
    \ `SubCommander` 的命令行工具完成的，它处理多个命令以生成代码和数据库脚本。`generate` 命令识别许多参数。最重要的参数与 `/config`\
    \ 和 `/out` 开关一起使用。清单 8-14 展示了一个用于生成数据访问层代码的示例命令。\n\n```console\nsonic.exe /config\
    \ Website\\Web.config /out Website\\App_Code\\Generated\n```\n生成的类可以包含在你的项目中，项目可以是一个网站或一个类库。最初，`SubSonic`\
    \ 创建时，它专门用于 ASP.NET 2.0 网站，因为它利用了构建提供程序（Build Provider）模型，而该模型仅适用于网站。为了扩展生成代码的适用范围，增加了将类生成到源文件的功能。将代码生成限制在网站内，阻止了数据访问层作为其他类型应用程序（如桌面和控制台应用程序）的依赖项被使用。一些开发人员也对数据访问层随着数据库变化而动态变化感到不适。\n\
    > **注意** 有关 `code generate` 命令参数的完整文档以及演练视频，请参阅 `SubSonic` 网站 (http://www.subsonicproject.com)。\n\
    \n### SubSonic 模板\n`SubSonic` 中的模板系统镜像了 ASP.NET 使用的模板系统。文件的格式看起来很像 `.aspx` 标记文件，但它不是生成\
    \ HTML，而是为你的数据访问层生成代码。图 8-4 展示了一个用于生成类的示例模板。\n"
- fmt: '.NET 框架本身不提供处理这些模板文件的设施，除非作为 ASP.NET 运行时的一部分。为了让这些模板能在 SubSonic 中用于代码生成，项目创建了一个解析器和代码处理器。它读取嵌入在程序集中的模板文件，并解析、处理、生成输出代码，然后保存到源文件中。创建可工作代码的所有模板代码都包含在源代码下载中，以便您可以根据需要进行调整。如果您不想使用嵌入式模板，也可以为自己的模板指定一个替代位置。`/templateDirectory`
    参数用于覆盖标准模板处理。为了使用“外部世界”的值处理模板，一些占位符在解析和处理模板时被替换。在图 8-3 中，您可以看到 `providerName`
    和 `tableName` 变量被设置为 `#PROVIDER#` 和 `#TABLE#`，这些是占位符，在模板处理的早期步骤中被替换。这些变量在模板生成代码的其余部分中被使用。


    模拟 .aspx 模板处理的优势在于，它不仅支持占位符替换，还支持循环。清单 8-15 展示了类模板中的一个循环，用于生成与数据库表列匹配的所有属性。


    `Listing 8-15`. 模板中用于表属性的循环


    ```

    <%

    foreach(TableSchema.TableColumn col in cols){

    string propName = col.PropertyName;

    string varType = Utility.GetVariableType(col.DataType, col.IsNullable, lang);

    %>

    [XmlAttribute("<%=propName%>")]

    public <%=varType%> <%=propName%>

    {

    get { return GetColumnValue[<]<%= varType%>[>]("<%= col.ColumnName %>"); }

    set

    {

    MarkDirty();

    SetColumnValue("<%=col.ColumnName %>", value);

    }

    }

    <%

    }

    %>

    ```


    为每个表类生成的属性将符合清单 8-15 的模板，其中包含调用 `MarkDirty` 方法。如果所有代码都是手动编写的，那个简单的调用可能是一个乏味的细节。而在这里，调用
    `MarkDirty` 是自动的，因此每次属性值更改时都能可靠地调用它。此示例来自标准模板，但您可以将其更改为检查新值是否与当前值不同，并仅在适当时调用 `MarkDirty`。如果您现在想这样做，可以将标准模板复制到您自己的模板目录，并调整此模板使其类似于清单
    8-16。


