    The rule of thumb to follow is to create a query that has a limited scope. It
    makes perfectly good sense that you cannot include the average ListPrice from
    the Production.Product table in the AdventureWorks database because it would require
    monitoring all rows in the table.


    You will also want to consider that monitoring a table with query notifications
    will degrade the performance of table updates. And if the data that is being monitored
    is updated frequently by multiple applications, it may be best to choose another
    way to ensure data in the cache is kept current, as the notifications will negate
    the value of caching the data. You may not be able to cache the frequently updated
    data, but instead limit the caching to the data that does not change frequently.
    Doing so will at least reduce the overall load on the system, as less data is
    being pushed around.


    Due to all of the special cases that are not supported, it is necessary to verify
    that each query is valid. If a query is not valid, a notification will immediately
    fire the OnChange event, which will remove the item from the cache.


    **Troubleshooting Query Notifications**


    Notifications can be a black box, much like the cache itself. Knowing what is
    happening and how changes to the code base will affect the actual performance
    of the cache and notifications should be carefully monitored to ensure these black
    boxes are functioning as expected. There are tools that you can use to take a
    peek into the black boxes to monitor activity.


    Troubleshooting with the SQL Server Profiler


    The SQL Server Profiler for SQL Server 2005 can be used to see what is happening
    as queries are sent into the system and how the notifications system responds
    by tracing the internals of the system. Unfortunately, SQL Express Management
    Studio does not include the profiler, so you will need to use the full version.
    Most of the examples so far use SQL Express because I personally prefer to just
    run SQL Express on my development system and only install SQL


    Server 2005 on another system that I use as needed. I have found that SQL Express
    does not tie up resources as much as SQL Server 2005\. When it comes to tracing,
    I simply deploy my changes to the other computer (Virtual PC) and run a trace
    to get the information I need.


    Normally, I only need to run traces when I cannot diagnose a problem by other
    means, such as watching the monitor utility covered earlier in the chapter.


    To capture information specific to notifications, it is necessary to create a
    custom template in the profile. Start the SQL Server Profiler and click the New
    Template icon. Then click the Events Selection tab to get a listing of all of
    the available events (see Figure 6-2). For notifications, you are interested in
    the Broker and Query Notifications events. Click the check box in the leftmost
    column to enable all of the events for those two event groupings. Return to the
    General table and enter Notifications as the name of the new template and save
    it.


    Now start a new trace by clicking the New Trace icon. Select the newly created
    Notifications template and click the Run button (see Figure 6-3).


