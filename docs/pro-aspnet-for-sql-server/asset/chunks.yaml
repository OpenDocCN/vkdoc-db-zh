    C H A P T E R 9 ■ D E P L OY M E N T


    **257**


    An MSBuild script is an XML document that is made up of three primary elements:
    PropertyGroup, ItemGroup, and Target, which are all held in the root element,
    Project. This is the basic structure for every MSBuild script. The PropertyGroup
    element defines properties that are used throughout the rest of the script. The
    ItemGroup element defines collections of properties. The Target element contains
    multiple tasks such as MakeDir and Copy. Listing 9-1


    shows the skeleton of a basic MSBuild script.


    **Listing 9-1.** *Skeleton of a Basic MSBuild Script*


    <?xml version="1.0" encoding="utf-8"?>


    <Project DefaultTargets="Build"


    >


    <PropertyGroup>


    <Configuration Condition=" ''$(Configuration)'' == '''' ">Debug</Configuration>


    <PackageName>MyProject</PackageName>


    <DatabaseDirectory>Database</DatabaseDirectory>


    <WebsiteBinDirectory>Website\bin</WebsiteBinDirectory>


    </PropertyGroup>


    <ItemGroup>


    <!-- Collection Definitions -->


    </ItemGroup>


    <Target Name="Build">


    <!-- Build Tasks -->


    </Target>


    </Project>


    While the standard tasks included with MSBuild cover many common tasks, they do
    not cover everything you will need to automate your build and deployment work.
    One task in particular is the Zip task, which I use frequently to create collections
    of files so they can be easily archived and moved from environment to environment.
    Fortunately, there is an open source project called MSBuild Community Tasks that
    includes a Zip task among many other useful tasks (see the sidebar “MSBuild Community
    Tasks”).


    **MSBUILD COMMUNITY TASKS**


    MSBuild can be extended by creating custom tasks. An open source project that
    has become the gathering point for custom MSBuild tasks is the MSBuild Community
    Tasks project, which continually adds more custom tasks to the already extensive
    list (see http://msbuildtasks.tigris.org/). Tasks such as Zip, FxCop, and Prompt
    are a few examples that add key functionality to this scripting environment.


