    C H A P T E R 1


    Getting Started


    **P**erformance is always an issue. This book will show you how to optimize ASP.NET
    2.0 application access to SQL Server databases. You can leverage the close integration
    of ASP.NET 2.0 and SQL Server to achieve levels of performance not possible with
    other technologies. You’ll inves-tigate in detail the middle ground between ASP.NET
    2.0 and SQL Server and how to exploit it.


    This book demonstrates all concepts with professional code, so the first thing
    you need to do is set up your development environment. I’ll cover related issues
    along the way.


    This chapter covers the following:


    • Preparing your environment


    • Managing provider services


    • Configuring providers


    • Creating users and roles


    **Preparing Your Environment**


    I typically run several Microsoft Virtual PC environments and move between them
    as my needs change. When I first set up my initial virtual environments, I create
    as many as I need.


    One will be my main development environment. This has been helpful as I keep a
    backup image of the initial environment immediately after I create it. As I try
    out beta releases or third-party add-ons, I may begin to dirty up my environment.
    Because the uninstall process may not completely clean up Windows installations,
    the virtual environments come in handy.


    For example, at a local user group session, a presenter was demonstrating a tool
    that integrated with Visual Studio. Instead of installing the tool in my current
    development environment, I cloned a fresh environment and used it to try the tool.
    Afterward, I turned off the environment and deleted it to clear up space for another
    environment. My primary environment wasn’t affected at all.


    I also create two drives within my virtual environment. The C: drive holds the
    operating system, while the D: drive holds my data. These drives are represented
    by virtual hard drives.


    And if I decide to clone my data drive, I can use it with another system as I
    see it. Because I typically develop every project by using source control, I can
    start with a fresh environment, pull down the current project versions, and start
    development again.


    To further leverage virtualization, you can also create a virtual hard-drive installation
    of your development environment and set the files to read-only. Then you can create
    a new virtual image that uses the read-only copy as a base image while keeping
    all changes on the **1**


    ![Image 1](index-10_1.jpg)


    8601Ch01CMP2 8/22/07 7:56 PM Page 2


    **2**


    C H A P T E R 1 ■ G E T T I N G S TA RT E D


    secondary image. When you are given the option to create a new virtual hard drive,
    you can choose the Differencing option, as shown in Figure 1-1.


    **Figure 1-1.** *Creating a differencing virtual hard disk* The differencing image
    allows you to leave your base image untouched as you begin to use a fresh environment
    for development. This conserves space on a hard drive, which can fill up quickly;
    a typical virtual image can grow to 20 GB, not including the data image. And because
    you can have multiple virtual images using the same base image, your environment
    can quickly be prepared for your work as you need it.


    One time my coworker needed to start work on a short .NET 1.1 project the next
    day. She had only Visual Studio 2005 installed and so was facing a long install
    process that typically takes several hours to complete. But because I had already
    prepared virtual images for .NET 1.1 and


    .NET 2.0 development, I had her ready to go in under 20 minutes. The longest wait
    was for copying the image off the file server. After she was finished with the
    short project, she was able to remove the temporary environment.'
