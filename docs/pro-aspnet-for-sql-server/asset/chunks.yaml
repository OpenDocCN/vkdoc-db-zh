    A popular unit-testing framework is NUnit (http://www.nunit.org/), which is open
    source and available freely. You can also get UnitRun from JetBrains (http://www.jetbrains.com/


    unitrun/), which is a free tool that runs as an add-in to Visual Studio 2005 to
    run and debug tests created with NUnit (see Figure 6-5).


    **Figure 6-5.** *UnitRun with NUnit tests*


    Each of the tests shown in Figure 6-5 check the various caching scenarios supported
    by the data access layer created for use in this chapter. These scenarios include
    no caching (Off ), absolute expiration, polling, notifications with SqlCacheDependency,
    and notifications with SqlDependency.


    These tests are not strictly unit tests. They cross the line to integration tests
    because they are doing much more than a single unit of work and interact with
    more than a single object or resource. This distinction is critically important
    to some developers who feel strongly about test-driven development. For the purposes
    of testing here, these tests are integration tests; however, attempts are made
    to isolate each test so that one test does not affect another.


    Part of that effort includes declaring the StartUp and TearDown methods (see Listing
    6-34).


    **Listing 6-34.** *DomainTests.cs*


    using System;


    using System.Data;


    using System.Threading;


    using Chapter06.ClassLibrary;


    using NUnit.Framework;


    namespace UnitTests


    {


    [TestFixture]


    public class DomainTests


    {


