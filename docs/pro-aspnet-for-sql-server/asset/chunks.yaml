  trans: '## 测试设计与数据契约


    由于无法完全利用编译时支持来避免运行时异常，因此必须对应用程序进行测试。自然，这是添加自动化测试的良好位置。这些测试将确认从数据源检索的数据包含具有正确类型的预期字段。


    这些测试可以在两个不同层次上完成。直接在数据访问层之上，可以有一组单元测试来确保返回预期数据；一个测试数据库会被填充特定数据，数据访问层和测试使用这些数据来返回一致的结果。


    数据访问层通过这些测试后，下一步是包含集成测试，这些测试将考虑通过数据绑定使用的数据。


    测试代码相当容易。测试网页上的数据绑定则不那么容易。此步骤现在需要加载每个页面，并检查每个值是否看起来正确且不会引发异常。诸如 Microsoft Visual
    Studio Team System 之类的工具提供了创建和运行此类测试的工具。或者，您可以使用 OpenQA 的 Selenium，它为网页提供跨浏览器和跨平台的测试功能。


    在这些集成测试中，您加载页面并验证预期值是否出现在页面上。


    ## 构建数据库


    每当我构建应用程序时，我总是从数据库开始。这是一种自下而上的方法。


    我知道我将管理哪些数据以及需要对数据执行哪些操作，因此我首先规划数据库将存储什么、数据之间的关系将如何工作以及应用程序将如何与之交互。通过将工作范围仅限于数据库，工作可以更快地推进，而不会被界面或其他辅助细节分心。数据库功能完成后，构建应用程序的前端就容易得多。


    在本章中，您将构建一个社交书签网站，该网站保存链接并具有用于浏览链接的标签系统。个人资料将直接与标准的 `ASP.NET Membership User`
    帐户集成，以便您可以利用 `ASP.NET` 中所有其他可用的用户帐户管理功能。


    ## 创建数据库结构


    数据结构将保存链接和标签，以及与 `Membership User` 的关联。它将采用完全规范化的方式进行分解，以减少存储需求并优化数据访问速度。我的假设是许多用户将使用该应用程序，并且不同用户会保存相同的链接并使用相同的标签，因此我希望仅存储一次这些公共数据，并仅保留与该数据的关系。


    图 7-5 列出了数据库结构。它显示了核心部分是 `FavoriteLinks` 表，周围环绕着所有相关数据。


    ![图片 31](img/index-209_1.png)


    **图 7-5.** 数据库结构


    ## 整合数据


    由于许多用户会存储相同的 URL 和标题作为其链接的一部分，因此这些数据保存在与 `FavoriteLinks` 表分离的表中。当用户存储 `http://youtube.com/`
    的链接时，保存过程将在 `LinkUrls` 表中创建一个新记录。下一个保存相同链接的用户将简单地指向现有记录。对于链接使用的任何标题，`LinkTitles`
    表也是如此。这样，数据库中将存储尽可能少的数据。


    减少数据重复还降低了全表扫描以及表范围扫描的成本。在接下来的存储过程中，努力确保数据被清除任何未使用的数据，并且数据库尽可能小。当链接或标签不再被任何用户使用时，它将从数据库中删除。


    ## 管理关系


    数据并非存在于真空中。在普通数据库中，表之间可能存在许多关系。关系类型可分为三组：


    *   `一对一`

    *   `一对多`

    *   `多对多`


    `一对一` 关系乍看之下可能不是特别有用，但请考虑如何拆分数据。您可以将关于用户最常访问的数据信息保存在一个表中，而将额外的详细信息保存在另一个表中。我将第一个表称为摘要表，第二个表称为详细信息表。而且我可能拥有多个详细信息表。在
    `FavoriteLinks` 数据库中，`Membership User` 记录与单个收藏链接配置文件具有关系。这并非为了规范化数据，而是为了按用途对数据进行分组。一个包含
    30 列的表在硬盘扫描每条记录方面将难以查询，更不用说读取和维护索引了。通过拆分数据，您可以增强性能。


    当数据被拆分时，您还有机会考虑对数据进行分区以获得进一步的性能提升。


    您需要仔细地将数据分组到表中，以在应用程序所需的所有查询中创建尽可能少的连接。理想情况下，您在从详细信息表访问相关记录后，将使用其主键直接访问详细信息表。


    下一种关系是 `一对多`。对于 `FavoriteLinks` 数据库，存在多个 `一对多` 关系。`Profile` 表中的一条记录可以有多个指向 `FavoriteLinks`
    表的引用。子记录在每个实例中指回父记录以允许多个关系。这些子对父的引用是通过外键完成的，这要求将子记录中的一列与父记录的主键配对。这意味着访问索引列，这有助于加快利用这些关系的查询速度。令人惊讶的是，我遇到过未正式使用外键的数据库。关系存在，但向数据库添加外键约束的额外步骤并未完成。我确信创建此类数据库的开发人员在准备首次发布应用程序时，不想处理外键约束的麻烦。一个简单的脚本来添加和移除约束本可以消除这个问题。


    我还发现，当开发数据库中没有外键约束时，关系可能会变得有点混乱。当父记录被删除时，您可能会留下子记录，这些记录会随着时间的推移而累积，并用垃圾数据填满您的数据库。当我使用新数据库或维护现有数据库时，我在开发存储过程时会保留外键约束，以确保我尊重这些关系。调整存储过程以采取必要步骤满足约束要求是非常简单的。


    最后，逻辑上存在 `多对多` 关系，但不应直接用两个表表示。有必要将此类关系拆分为三个表，中间的表充当两个 `一对多` 关系之间的链接。在当前数据库中，`FavoriteLinks`
    数据库与 `TagTokens` 表具有 `多对多` 关系，该关系通过 `LinkTags` 表组织。对于这种关系，同一个标签可以放在许多链接上，而一个链接可以拥有许多标签。我选择将中间的表称为
    `LinkTags`。中间表取相关表的部分内容是有用的。


    这种结构使得轻松识别这些“桥梁”表，并一目了然地显示关系。


    ## 创建与修改时间'
- fmt: "## 表设计：维护创建与修改时间戳\n\n每当从零开始创建数据库时，我喜欢在每个表的末尾添加 `created` 和 `modified` 值，并在每次插入和更新时维护它们。拥有这些细节的访问权限有很多用处。首先，在数据库使用了很长时间后，你可以看到表中某些行有多旧。这让你有机会清除或归档那些未被访问的旧数据。你还可以根据\
    \ `Created` 或 `Modified` 值对旧数据进行逻辑分区。当一个表变得非常大时，你可能只访问最近创建或修改的数据。当数据被分区后，你可以在查询范围内对该子集进行扫描，而无需对整个表进行全表扫描。\n\
    \n> **注意**：分区属于数据库管理员的职责范围，本书不深入讨论。在考虑数据的逻辑分组时，与你的 DBA 讨论分区策略会很有用，以确定根据你的数据库结构和可用硬件可以采取哪些措施。\n\
    \n## 关于空值（Null）的处理\n\n如何处理空值（`null`）的决定对某些开发团队来说是一个敏感问题。\n\n有些人倾向于完全不允许空值，只使用已知的默认值；而另一些人则认为真正的空值应该被保留为\
    \ `null`。争论的焦点将取决于你能否将默认值的定义传达给数据库的所有用户——这即使不是不可能，也通常是困难的。同时，空值是众所周知的，并且会迫使应用程序开发人员迟早处理它。然而，当你能阻止空值从数据库中输出时，你就降低了数据访问层的复杂性。\n\
    \n当一个列可能返回空值时，使用该值需要额外的步骤来检查该值是否可以安全地转换为不允许空值的类型（如 `int` 或 `DateTime`）。这个额外的空值检查会对性能产生影响。传统的方法是检查该值是否匹配\
    \ `DBNull.Value`，如果不是空值则进行转换。清单 7-7 展示了传统的做法。\n\n**清单 7-7. 传统的空值处理代码**\n```\n\
    DateTime birthDate;\n\nif (!DBNull.Value.Equals(row[\"BirthDate\"]) && row[\"\
    BirthDate\"] is DateTime)\n{\n    birthDate = (DateTime)row[\"BirthDate\"];\n\
    }\n```\n\n或者，你可以通过为 `DateTime` 和 `int` 使用可空类型来简化这段代码，这样你就可以直接使用 `as` 运算符进行转换（见清单\
    \ 7-8）。\n\n**清单 7-8. 简化的空值处理代码**\n```\nDateTime? birthDate;\n\nbirthDate = row[\"\
    BirthDate\"] as DateTime?;\n```\n\n清单 7-8 中的简化代码结合了可空类型和 `as` 运算符，允许将空值赋值，而不会有\
    \ `NullReferencesException` 或 `InvalidCastException` 的风险。`as` 运算符首先测试转换是否有效，然后再完成转换。检查是否匹配\
    \ `DBNull.Value` 或使用 `as` 运算符是没有必要的。\n\n如果你选择使用默认值，你可以使用在整个应用程序中明确定义的默认值。对于 `String`\
    \ 来说，自然的选择是 `String.Empty`，而像 `int` 和 `DateTime` 这样的类型没有明显的默认值。通常，数值是正数，特别是当它被用作从\
    \ 0 开始递增的标识值的主键时。在这种情况下，`-1` 是一个明确的选择。\n\n对于 `DateTime`，你可能想使用 `DateTime.MinValue`，但\
    \ SQL Server 不允许在数据库中为 `DateTime` 类型使用该值，因为它将日期限制为大于 1753年1月1日。你将需要使用一个替代值。在微软内部，使用的是\
    \ 1754年1月1日的值，在大多数情况下这是一个合理的默认值。"
  raw: 'Whenever I create databases from the ground up, I like to add the created
    and modified values at the end of each table and maintain them for each insert
    and update. Having access to these


    8601Ch07CMP2 8/24/07 12:23 PM Page 206


    **206**


    C H A P T E R 7 ■ M A N U A L D ATA A C C E S S L AY E R


    details is useful for many reasons. For starters, you can see how old some of
    the rows in a table are after the database has been in use for a long time. It
    gives you the opportunity to purge or archive older data that is not being accessed.
    You can also logically partition the older data based on the Created or Modified
    value. When a table grows very large, you may be accessing only the recently created
    or modified data. When the data is partitioned, you can run a scan on the subset
    that falls in the scope of your query without needing to run a full scan of the
    entire table.


    ■**Note** Partitioning falls well within the realm of a database administrator
    and is not covered in depth in this book. When considering logical groupings of
    data, it will be useful to discuss partitioning strategies with your DBA to determine
    what can be done given your database structure and available hardware.


    **What About Nulls?**


    The decision about how to handle nulls is a hot-button issue for some development
    teams.


    Some prefer to not allow nulls at all and just use known default values, while
    others argue that a truly null value should be preserved as a null. The argument
    will hinge on how well you can relay the definition of a default value across
    all users of the database—which can be difficult if not impossible. Meanwhile,
    a null value is well known and will force the application developers to deal with
    it sooner or later. However, when you can prevent nulls from coming out of the
    database, you reduce the complexity of the data access layer.


    When a column could return a null value, using the value requires the additional
    step to see whether the value can be safely cast to types such as int or DateTime,
    which do not allow null values. The additional check for a null value will have
    an impact on performance. The traditional way is to check whether the value matches
    the DBNull.Value and then cast it when it is not null. Listing 7-7 shows the traditional
    way to do so.


    **Listing 7-7.** *Traditional Code to Handle Nulls* DateTime birthDate;


    if (!DBNull.Value.Equals(row["BirthDate"]) && row["BirthDate"]) is DateTime)


    {


    birthDate = (DateTime)row["BirthDate"];


    }


    Alternatively, you can streamline this code by using nullable types for DateTime
    and int so that you can directly cast the value using the as operator (see Listing
    7-8).


    **Listing 7-8.** *Streamlined Code to Handle Nulls* DateTime? birthDate;


    birthDate = row["BirthDate"] as DateTime?;


    8601Ch07CMP2 8/24/07 12:23 PM Page 207


    C H A P T E R 7 ■ M A N U A L D ATA A C C E S S L AY E R


    **207**


    The streamlined code in Listing 7-8 uses the nullable types combined with the
    as operator to allow the null values to be assigned without the risk of a NullReferencesException
    or an InvalidCastException. The as operator first tests whether the cast is valid
    and whether it is completed. Checking for a match on DBNull.Value or using the
    as operator is unnecessary.


    If you instead choose to use default values, you could use well-defined defaults
    that are used throughout the application. A natural choice for String is String.Empty,
    while types such as int and DateTime do not have obvious default values. Typically,
    a numerical value is positive, especially when it is used as a primary key set
    as an identity value starting at 0 and increasing. In this case -1 is the clear
    choice.


    When it comes to DateTime, you may want to use DateTime.MinValue, but SQL Server
    does not allow that value for the DateTime type in the database because SQL Server
    limits the dates to greater than 1/1/1753. You will instead need to use an alternate
    value. Internally at Microsoft the value of 1/1/1754 is used, which will be a
    reasonable default value in most cases.'
  trans: "## 表设计：维护创建与修改时间戳\n\n每当从零开始创建数据库时，我喜欢在每个表的末尾添加 `created` 和 `modified` 字段，并在每次插入和更新时维护它们。掌握这些细节的访问权限有很多好处。首先，在数据库使用了很长时间后，你可以查看表中某些行有多“老”。这使你有机会清除或归档那些久未被访问的旧数据。你还可以根据\
    \ `Created` 或 `Modified` 值对旧数据进行逻辑分区。当一个表变得非常大时，你可能只访问最近创建或修改的数据。在数据被分区后，你可以在查询中仅扫描该子集，而无需对整个表进行全表扫描。\n\
    \n> **注意**：分区属于数据库管理员的职责范围，本书不深入讨论。在考虑数据的逻辑分组时，与你的 DBA 讨论分区策略会很有用，以确定根据你的数据库结构和可用硬件可以采取哪些措施。\n\
    \n## 关于空值（Null）的处理\n\n如何处理空值（`null`）的决定对某些开发团队来说是一个敏感问题。\n\n有些人倾向于完全不允许空值，只使用已知的默认值；而另一些人则认为真正的空值应该被保留为\
    \ `null`。争论的焦点将取决于你能否将默认值的定义传达给数据库的所有用户——这即使不是不可能，也通常是困难的。同时，空值是众所周知的存在，并且会迫使应用程序开发人员迟早处理它。然而，当你能够阻止空值从数据库中输出时，你就降低了数据访问层的复杂性。\n\
    \n当一个列可能返回空值时，使用该值需要额外的步骤来检查该值是否可以安全地转换为不允许空值的类型（如 `int` 或 `DateTime`）。这个额外的空值检查会对性能产生影响。传统的方法是检查该值是否匹配\
    \ `DBNull.Value`，如果不是空值则进行转换。清单 7-7 展示了传统的做法。\n\n**清单 7-7. 传统的空值处理代码**\n```\n\
    DateTime birthDate;\n\nif (!DBNull.Value.Equals(row[\"BirthDate\"]) && row[\"\
    BirthDate\"] is DateTime)\n{\n    birthDate = (DateTime)row[\"BirthDate\"];\n\
    }\n```\n\n或者，你可以通过为 `DateTime` 和 `int` 使用可空类型来简化这段代码，这样你就可以直接使用 `as` 运算符进行转换（见清单\
    \ 7-8）。\n\n**清单 7-8. 简化的空值处理代码**\n```\nDateTime? birthDate;\n\nbirthDate = row[\"\
    BirthDate\"] as DateTime?;\n```\n\n清单 7-8 中的简化代码结合了可空类型和 `as` 运算符，允许将空值赋值，而不会有\
    \ `NullReferencesException` 或 `InvalidCastException` 的风险。`as` 运算符首先测试转换是否有效，然后再完成转换。检查是否匹配\
    \ `DBNull.Value` 或使用 `as` 运算符是没有必要的。\n\n如果你选择使用默认值，你可以使用在整个应用程序中明确定义的默认值。对于 `String`\
    \ 来说，自然的选择是 `String.Empty`，而像 `int` 和 `DateTime` 这样的类型没有明显的默认值。通常，数值默认是正数，特别是当它被用作从\
    \ 0 开始递增的标识值的主键时。在这种情况下，`-1` 是一个明确的选择。\n\n对于 `DateTime`，你可能想使用 `DateTime.MinValue`，但\
    \ SQL Server 不允许在数据库中为 `DateTime` 类型使用该值，因为它将日期限制为大于 1753 年 1 月 1 日。你将需要使用一个替代值。在微软内部，使用的是\
    \ 1754 年 1 月 1 日的值，在大多数情况下这是一个合理的默认值。"
- fmt: "## Table 7-2. Suggested Default Values\n\n| Type      | Default Value |\n\
    |-----------|---------------|\n| String    | `String.Empty` |\n| DateTime  | `1/1/1754`\
    \    |\n\nWith these values set as constants in your data access layer, they can\
    \ be checked throughout the rest of the application. At some point, if you choose\
    \ to change the default values, you could update the constants to reflect the\
    \ change throughout the application. When the data access layer and the database\
    \ are both set to recognize the same default values, you can handle them properly\
    \ with the stored procedures so that while you do not allow the stored procedures\
    \ to return null values, you could still set nulls in the database.\n\n### Preventing\
    \ Null Values\n\nAssume that you do have a table that holds a `DateTime` column\
    \ called `BirthDate` that does allow for null values. The stored procedure returning\
    \ this value could use the `COALESCE` function to change the null value to the\
    \ default date value. Listing 7-9 shows how to use the `COALESCE` function.\n\n\
    **Listing 7-9. Return a Default Date for a Null Value**\n\n```sql\nSELECT\n  \
    \  COALESCE(\n        BirthDate,\n        Convert(DateTime, '1/1/1754')\n    )\
    \ AS BirthDate\nFROM chpt07_Nullable\n```\n\nWhen sending a default value into\
    \ the system, we can also convert the default value to a null for storage. This\
    \ check and conversion is shown in Listing 7-10.\n\n**Listing 7-10. Converting\
    \ a Default Date to a Null**\n\n```sql\nDECLARE @DefaultDate DateTime\nSET @DefaultDate\
    \ = Convert(DateTime, '1/1/1754')\nDECLARE @BirthDate DateTime\nSET @BirthDate\
    \ = Convert(DateTime, '1/1/1754')\nIF (@BirthDate = @DefaultDate)\nBEGIN\n   \
    \ SET @BirthDate = NULL\nEND\n```\n\nBy handling default value conversion in a\
    \ stored procedure, you get greater performance than is possible with `CLR` code\
    \ and avoid the overhead of checking the type for `DBNull.Value` and casting the\
    \ value.\n\n### COALESCE VS. ISNULL\n\nThe `COALESCE` function is a standard SQL\
    \ function, while `ISNULL` is a proprietary function available with SQL Server.\
    \ The `ISNULL` function is generally interchangeable with the `COALESCE` function\
    \ and may offer better performance. You will need to run your own tests to gather\
    \ metrics to check whether your individual queries would benefit from one over\
    \ the other, because one can be faster than the other in certain conditions.\n\
    \nFor the FavoriteLinks database, I chose to not allow null values at the table\
    \ level. For this small application, it is reasonably possible to ensure that\
    \ the default values are respected throughout the application. The application\
    \ will also use validation to ensure that empty strings are not sent into the\
    \ data access layer, which itself prevents null values from entering the system.\n\
    \n### Using Database Projects\n\nTo construct the database, I used Database Projects,\
    \ which are a feature of Visual Studio 2005 Professional Edition. Each table and\
    \ stored procedure script is uniquely organized and source controlled, which makes\
    \ it easier to manage changes to the database across releases of the application.\n\
    \n#### Managing the Scripts\n\nThe FavoriteLinks database has six tables, as shown\
    \ in Figure 7-5. In addition to those tables, there are several scripts for stored\
    \ procedures that access the tables in every way the application requires. There\
    \ are also scripts to add and remove the constraints that maintain the relationships\
    \ across the tables. All these scripts are organized into groups, in folders.\n\
    \nA hidden feature of Database Projects is the intelligent dependency analysis,\
    \ which is done transparently when you select multiple scripts and run them. Visual\
    \ Studio reviews the selected scripts, and based on the dependencies, it will\
    \ run the scripts in the proper order to allow the scripts to run successfully.\
    \ If you do happen to define a foreign key in a table script that references another\
    \ table which is alphabetically listed after the dependency, the order will be\
    \ adjusted when running the script."
  raw: 'Table 7-2 shows these default values.


    **Table 7-2.** *Suggested Default Values*


    String


    String.Empty


    int


    DateTime


    1/1/1754


    With these values set as constants in your data access layer, they can be checked
    throughout the rest of the application. At some point, if you choose to change
    the default values, you could update the constants to reflect the change throughout
    the application. When the data access layer and the database are both set to recognize
    the same default values, you can handle them properly with the stored procedures
    so that while you do not allow the stored procedures to return null values, you
    could still set nulls in the database.


    Preventing Null Values


    Assume that you do have a table that holds a DateTime column called BirthDate
    that does allow for null values. The stored procedure returning this value could
    use the COALESCE function to change the null value to the default date value.
    Listing 7-9 shows how to use the COALESCE function.


    **Listing 7-9.** *Return a Default Date for a Null Value* SELECT


    COALESCE(


    BirthDate,


    Convert(DateTime, ''1/1/1754'')


    ) AS BirthDate


    FROM chpt07_Nullable


    When sending a default value into the system, we can also convert the default
    value to a null for storage. This check and conversion is shown in Listing 7-10.


    8601Ch07CMP2 8/24/07 12:23 PM Page 208


    **208**


    C H A P T E R 7 ■ M A N U A L D ATA A C C E S S L AY E R


    **Listing 7-10.** *Converting a Default Date to a Null* DECLARE @DefaultDate DateTime


    SET @DefaultDate = Convert(DateTime, ''1/1/1754'')


    DECLARE @BirthDate DateTime


    SET @BirthDate = Convert(DateTime, ''1/1/1754'')


    IF (@BirthDate = @DefaultDate)


    BEGIN


    SET @BirthDate = NULL


    END


    By handling default value conversion in a stored procedure, you get greater performance
    than is possible with CLR code and avoid the overhead of checking the type for
    DBNull.Value and casting the value.


    **COALESCE VS. ISNULL**


    The COALESCE function is a standard SQL function, while ISNULL is a proprietary
    function available with SQL Server. The ISNULL function is generally interchangeable
    with the COALESCE function and may offer better performance. You will need to
    run your own tests to gather metrics to check whether your individual queries
    would benefit from one over the other, because one can be faster than the other
    in certain conditions.


    For the FavoriteLinks database, I chose to not allow null values at the table
    level. For this small application, it is reasonably possible to ensure that the
    default values are respected throughout the application. The application will
    also use validation to ensure that empty strings are not sent into the data access
    layer, which itself prevents null values from entering the system.


    **Using Database Projects**


    To construct the database, I used Database Projects, which are a feature of Visual
    Studio 2005


    Professional Edition. Each table and stored procedure script is uniquely organized
    and source controlled, which makes it easier to manage changes to the database
    across releases of the application.


    Managing the Scripts


    The FavoriteLinks database has six tables, as shown in Figure 7-5\. In addition
    to those tables, there are several scripts for stored procedures that access the
    tables in every way the application requires. There are also scripts to add and
    remove the constraints that maintain the relationships across the tables. All
    these scripts are organized into groups, in folders.


    A hidden feature of Database Projects is the intelligent dependency analysis,
    which is done transparently when you select multiple scripts and run them. Visual
    Studio reviews the selected scripts, and based on the dependencies, it will run
    the scripts in the proper order to allow the scripts to run successfully. If you
    do happen to define a foreign key in a table script that references another table
    which is alphabetically listed after the dependency, the order will be adjusted
    when running the script.


