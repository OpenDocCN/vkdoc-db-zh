- fmt: "This test runs much like the test for absolute expiration, but the messages\
    \ printed to the output window show that instead of the cached item being removed\
    \ due to the expiration, they are removed due to a changed dependency. Otherwise,\
    \ the assertions are the same.\n\nThe test in Listing 6-38 gets into notifications.\
    \ The time between updating the price and getting the updated value is very short,\
    \ but long enough for the notification to remove the cached item from the cache.\n\
    \n### Listing 6-38. `Test104_Caching_Notification_Test` Method\n\n```csharp\n\
    /// <summary>\n/// Tests that the system works properly with notification\n///\
    \ </summary>\n[Test]\npublic void Test104_Caching_Notification_Test()\n{\n   \
    \ CachingMode mode = CachingMode.Notification;\n    domain.PrepareCachingMode(mode);\n\
    \n    // get the first copy of the product\n    DataSet productDs1 = domain.GetProductByID(productId,\
    \ mode);\n    Assert.IsNotNull(productDs1, \"productDs1 cannot be null\");\n \
    \   decimal price1 = GetPrice(productDs1);\n\n    decimal newPrice1 = price1 +\
    \ 0.01m;\n    domain.SetListPrice(newPrice1, productId);\n\n    // sleep just\
    \ long enough to allow the notification to work\n    Thread.Sleep(200);\n\n  \
    \  // get the second copy of the product\n    DataSet productDs2 = domain.GetProductByID(productId,\
    \ mode);\n    Assert.IsNotNull(productDs2, \"productDs2 cannot be null\");\n \
    \   decimal price2 = GetPrice(productDs2);\n\n    DataSet productDs3 = domain.GetProductByID(productId,\
    \ mode);\n    Assert.IsNotNull(productDs3, \"productDs3 cannot be null\");\n \
    \   decimal price3 = GetPrice(productDs3);\n\n    Assert.AreNotEqual(price1, price2,\n\
    \        \"price1 and price2 should not match due to the cache notification\"\
    );\n    Assert.AreEqual(newPrice1, price2,\n        \"newPrice1 and price2 should\
    \ match due to the cache notification\");\n    Assert.AreEqual(newPrice1, price3,\n\
    \        \"newPrice1 and price3 should match\");\n\n    domain.CompleteCachingMode(mode);\n\
    }\n```\n\nThe assertions verify that the first and second price do not match,\
    \ while the new price does match the third price, which should come from the cache.\
    \ The text in the output window should again show when the dependency change removes\
    \ the item from the cache and when a cached copy is used.\n\nFinally, the last\
    \ test shown in Listing 6-39 uses the `SqlDepdendency` object, which does not\
    \ use the cache, but still uses the notifications system.\n\n### Listing 6-39.\
    \ `Test105_Caching_SqlDependency_Test` Method\n\n```csharp\n/// <summary>\n///\
    \ Tests that the system works properly with SqlDependency\n/// </summary>\n[Test]\n\
    public void Test105_Caching_SqlDependency_Test()\n{\n    CachingMode mode = CachingMode.SqlDependency;\n\
    \    domain.PrepareCachingMode(mode);\n\n    // get the first copy of the product\n\
    \    Console.WriteLine(\"Getting price1\");\n    DataSet productDs1 = domain.GetProductByID(productId,\
    \ mode);\n    Assert.IsNotNull(productDs1, \"productDs1 cannot be null\");\n \
    \   decimal price1 = GetPrice(productDs1);\n\n    decimal newPrice1 = price1 +\
    \ 0.01m;\n    domain.SetListPrice(newPrice1, productId);\n\n    // sleep just\
    \ long enough to allow the notification to work\n    Thread.Sleep(200);\n\n  \
    \  // get the second copy of the product\n    Console.WriteLine(\"Getting price2\"\
    );\n    DataSet productDs2 = domain.GetProductByID(productId, mode);\n    Assert.IsNotNull(productDs2,\
    \ \"productDs2 cannot be null\");\n    decimal price2 = GetPrice(productDs2);\n\
    \n    Console.WriteLine(\"Getting price3\");\n    DataSet productDs3 = domain.GetProductByID(productId,\
    \ mode);\n    Assert.IsNotNull(productDs3, \"productDs3 cannot be null\");\n \
    \   decimal price3 = GetPrice(productDs3);\n\n    Assert.AreNotEqual(price1, price2,\n\
    \        \"price1 and price2 should not match due to the SqlDependency\");\n \
    \   Assert.AreEqual(newPrice1, price2,\n        \"newPrice1 and price2 should\
    \ match due to the SqlDependency\");\n    Assert.AreEqual(newPrice1, price3,\n\
    \        \"newPrice1 and price3 should match\");\n\n    domain.CompleteCachingMode(mode);\n\
    }\n```\n\nThis final test works much like the other notifications test, except\
    \ the internals use a custom collection to hold onto a copy of the product data\
    \ instead of relying on the cache. When all of these tests pass without an error,\
    \ it confirms that the caching system and the database are working properly. This\
    \ small group of tests will at least provide a baseline of support that is necessary\
    \ for the application as a whole. Some teams make it a requirement that all unit\
    \ tests must pass before changes are committed to the source control system. It\
    \ acts as a safeguard from breaking changes.\n\n![Image 26](index-192_1.png)\n\
    \nOnce a testing system is in place, you can use an MSBuild script to run the\
    \ tests without firing up Visual Studio 2005 (see Figure 6-6). If your current\
    \ work relies on several other projects, you can sync up the source code for the\
    \ dependency projects and run the MSBuild scripts to build and test them. This\
    \ automation will save you time and identify problems with the dependencies before\
    \ you start making changes in your project.\n\n### Figure 6-6. MSBuild with unit\
    \ testing\n\n## Problems with Caching\n\nUnexpected problems come up when you\
    \ make use of caching, unless you have devised a caching policy that you enforce\
    \ through planning, training, and code reviews. You may decide as a policy that\
    \ all data placed in the cache will use an absolute expiration no greater than\
    \ five minutes. You may also decide that you will not make use of output caching\
    \ and instead focus on data caching with dependency notifications to ensure the\
    \ data used by the application is always current. By setting a clear policy and\
    \ enforcing it with code reviews, it will be easier to keep things under control.\n\
    \nThere are a few things to keep an eye on. When using data caching, you could\
    \ easily hold cached items with a static reference in a code-behind that will\
    \ cause it to never go away. I find it is best to avoid static references when\
    \ working with cached data. To cope with it, I create wrapper methods that act\
    \ as the access points where I get the data. The wrapper first checks for the\
    \ cached item in the cache and returns it if it exists. If not, it pulls the data\
    \ from the database, places it in the cache, and returns it. I never assume that\
    \ the item is already in the cache.\n\nWith output caching, you will likely set\
    \ the `VaryByParam` to `*`, thinking that will ensure that different URLs will\
    \ get different results. For a product page, you want `Product.aspx?ProductID=808`\
    \ to show a different result from `Product.aspx?ProductID=429`. This `VaryByParam`\
    \ setting will make sure it works that way, but if you have a website that has\
    \ been set to show content in multiple languages, the first user to hit the page\
    \ will cache the content for his language. The next person who hits the page,\
    \ with a different language preference, will see the language preference of the\
    \ first user for the duration that the output cache holds the original request.\
    \ To account for this situation, you can check the `Accept-Language` header as\
    \ a part of uniquely identifying the contents of a page. Listing 6-40 shows the\
    \ settings to use for output caching when language is a concern.\n\n### Listing\
    \ 6-40. `VaryByHeader` for Language\n\n```aspx\n<%@ OutputCache Duration=\"300\"\
    \ VaryByParam=\"*\"\n    VaryByHeader=\"Accept-Language\" %>\n```\n\n## Performance\
    \ Strategies\n\nIt will be necessary to develop a comprehensive approach to performance.\
    \ Simply caching the results from the database will not ensure your application\
    \ performs well. If several of the queries are very slow, you will continue to\
    \ experience performance problems. Wherever your application is slowest, you can\
    \ try to speed up the queries."
