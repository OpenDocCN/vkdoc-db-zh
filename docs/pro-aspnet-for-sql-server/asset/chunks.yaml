    # 第 10 章：示例应用程序


    如果在排查性能瓶颈时，你总是关注那些常见的“嫌疑对象”，可能就会忽略其他真正构成瓶颈、真正制约可扩展性的区域。多年前有一份报告对比了 Linux 上 Apache
    网络服务器与 Windows NT 上 IIS 的可扩展性。报告显示，在高负载情况下 IIS 能够处理更多的请求。许多开发者质疑该报告的准确性，因为当时 Apache
    是最流行、最高效的网络服务器，而 IIS 则被视为新入局者，且曾饱受各种问题困扰。事实证明，瓶颈与网络服务器关系不大。Apache 的问题根源在于 Linux
    内部使用的锁定机制只允许有限数量的并发网络连接进入 Apache 服务器，而 Windows NT 采用线程模型，允许更多并发请求进入 IIS。因此，无论你如何配置
    Apache 服务器，都不可能让它比 IIS 更快。因为它根本就不是最薄弱的环节。


    同样地，你可能会发现你的网站并非应用程序中最薄弱的环节。问题可能出在数据库，甚至可能是网络。网络设备的质量可能是罪魁祸首，或者服务器之间的网络线缆质量不佳。我曾经有一台电脑，使用了一张
    15 美元购买的网卡。我本可以购买 100 美元的网卡，但当时我认为两者标称速度相同，看不出区别。我用了便宜的网卡，大多数时候工作正常，但当我尝试通过网络传输多个大文件时，网卡就失效并丢失了连接。事实证明，更贵的网卡性能更优；因为它有更多缓冲区，能够处理将大量大文件复制到远程计算机的那种负载。那次经历让我明白，有时我可以通过更换一个
    15 美元的硬件来加速应用程序，而不是购买一台新的、价值 10,000 美元的服务器，却让真正的瓶颈依然存在。


    要找到你的瓶颈，你需要测量系统每个部分的性能。你可能会惊喜地发现，有时最简单的调整就能提升性能。


    ## 流量激增


    表 10-1 中显示的请求平均间隔时间并不能真实反映流量模式。没有任何保证能让发往你网络服务器的请求如此均匀地间隔开。实际上，绝大多数网络流量看起来像一条钟形曲线。如果你的网站主要由邻近时区的人使用（通常情况如此），那么使用
    24 小时制来看，你的大部分流量肯定会出现在白天。在美国，当东海岸是早上 6 点时，你网站的流量就会开始增加；当西海岸晚上 10 点过后，流量开始下降。而通常在中午时分，你会看到流量达到峰值，具体取决于你网站提供的内容。像新闻网站这样的站点，在午餐时间人们查看新闻头条时，流量会急剧飙升。


    鉴于这些流量激增，你不能假设一个一天总共获得 10 万次点击的网站，在可扩展性成为问题之前，有 0.86 秒的时间来处理每个请求。由于规律性的流量激增或你的某些操作，你的网络服务器可能在一天中的几个关键时间点不堪重负。如果你运营一个资讯类网站，并向数百万读者发送电子邮件通讯，那么在通讯发出后的几小时甚至几天内，你可能会突然迎来一波流量高峰。像
    Digg (`www.digg.com`) 和 Slashdot (`http://slashdot.org`) 这样的网站拥有数百万读者，这些读者都被引导至其首页展示的头条新闻。这导致那些被
    Digg 和 Slashdot 链接到的、毫无防备的网站，在极短时间内获得巨大的流量。这种效应被称为 ***Slashdot 效应***，以让那些未准备好应对流量激增的网站下线而闻名。最近，Digg
    变得极其流行，因此你的网站也可能受到 ***Digg 效应*** 的冲击。你可能只是发布了一篇有趣的博客文章或照片，而足够多的 Digg 用户认为它有价值。这种事情的发生确实毫无预警。


    ## 应对 Digg 效应


    我的网站曾两次被 Slashdot 和 Digg 冲击，通过针对最初的流量激增做出一些调整，我得以安然度过风暴。在这两个案例中，内容都托管在 Apache
    网络服务器上，我只是简单地调整了配置，以应对我的中等性能服务器上新增的负载。内容本身已经准备就绪，因为它们被设置为静态内容，Apache 可以直接从内存中提供服务，类似于
    ASP.NET 的输出缓存。对于 Apache 网络服务器而言，瓶颈是由我允许创建的、用于处理请求的子进程数量所导致的。对于 IIS 来说，这不是问题，因为
    IIS 是完全线程化的，现代的 Apache 2.0 安装也是如此，至少能够根据传入请求数量进行扩展。但是，如果每个请求多次访问数据库，你可能会发现瓶颈并非网络服务器。


    这些遭遇流量巨大激增的时刻，需要一个应急响应计划。


    我记得 9/11 袭击的那个悲惨日子，当时所有人都拼命寻找他们能找到的任何新闻，想了解正在发生什么。我当时浏览的网站之一是 CNN.com。我看到该网站在当天早些时候还是我们常见的完整版面，首页布满繁忙的链接和广告，后来就只剩下几个链接和一个头条。他们显然在努力应对这股流量激增，这无疑是他们以前从未经历过的。他们成功地保持了网站的在线状态，并将关键新闻传递给了读者。


    有些时候，你知道流量会激增。在超级碗期间，NFL 网站承受着巨大的负载。运营该网站的人可以全年为此做准备，通常会为当年的超级碗设立一个专门的网站，在比赛前和比赛期间将所有流量引导至此。当橄榄球迷们一边在电视屏幕上观看比赛，一边从网站上获取最新统计数据时，该网站的流量会非常密集。交互式应用程序会展示球场示意图，并提供比赛的所有细节，持续更新。每次网络应用程序访问服务器，都会获取有关...

