    Once the trace has started, you can launch your application and watch the events
    as they happen. Figure 6-4 shows a trace of a functioning notification system.
    The broker and query notification systems are showing the right sequence of events
    in the trace, and the application is behaving as it should. If it were failing,
    you may see the broker starting and ending a “conversation” immediately. This
    will indicate that the query notification rejected your query.


    Perhaps it had an aggregate function or another SQL feature it could not support.
