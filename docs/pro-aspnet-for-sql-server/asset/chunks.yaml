    Controls.Add(ltFirstName);\nControls.Add(new LiteralControl(\" \"));\nControls.Add(ltLastName);\n\
    Controls.Add(new LiteralControl(\", \"));\nControls.Add(ltBirthDate);\nControls.Add(new\
    \ LiteralControl(\", \"));\nControls.Add(ltCity);\nControls.Add(new LiteralControl(\"\
    , \"));\nControls.Add(ltCountry);\nControls.Add(new LiteralControl(\"\\n</p>\\\
    n\"));\n```\n\n**高效标记**\n"
- fmt: "The `PersonRow` uses the `LiteralControl` instead of a `Label` control specifically\
    \ because it generates less markup code for the page. This reduces the page size\
    \ and decreases the page load time for the user. A new control called `ListView`\
    \ will be included with the `.NET 3.5` release coming in early 2008. It will allow\
    \ the developer to choose exactly what markup will be presented to the web browser,\
    \ with a focus on offloading styling to an external stylesheet that is loaded\
    \ a single time with each visit to a website. This reduced overall size will speed\
    \ up the page requests and make your applications work more quickly.\n\nThese\
    \ `LiteralControl`s act as containers that are updated later during the `PreRender`\
    \ event when the `Text` values are finally set, as shown in **Listing 4-42**.\n\
    \n**C H A P T E R 4 ■ D A T A B O U N D C O N T R O L S**\n\n**105**\n\n**Listing\
    \ 4-42.** *Setting the `Text` Properties in the `OnPreRender` Method*\n```\nprotected\
    \ override void OnPreRender(EventArgs e)\n{\n    base.OnPreRender(e);\n    if\
    \ (String.IsNullOrEmpty(CssClass))\n    {\n        CssClass = \"personRow\";\n\
    \    }\n    ltFirstName.Text = FirstName;\n    ltLastName.Text = LastName;\n \
    \   ltBirthDate.Text = BirthDate.ToString(birthDateFormat);\n    ltCity.Text =\
    \ City;\n    ltCountry.Text = Country;\n}\n```\n\nThis separation is done to address\
    \ some issues with `ViewState` that will be explained in the following section.\n\
    \n## Persisting ViewState Manually\n\nCustom controls may not persist state as\
    \ you would like. To overcome this shortcoming, it is possible to manually handle\
    \ the `ViewState`. This is done by overriding the `SaveViewState` and `LoadViewState`\
    \ methods. The `SaveViewState` method is shown in **Listing 4-43**.\n\n**Listing\
    \ 4-43.** *`SaveViewState` Method*\n```\nprotected override object SaveViewState()\n\
    {\n    Pair state = new Pair();\n    object baseState = base.SaveViewState();\n\
    \    object[] objArray = new object[5];\n    objArray[0] = _firstName;\n    objArray[1]\
    \ = _lastName;\n    objArray[2] = _birthDate;\n    objArray[3] = _city;\n    objArray[4]\
    \ = _country;\n    state.First = baseState;\n    state.Second = objArray;\n  \
    \  return state;\n}\n```\n\nThe structure of the state is completely arbitrary.\
    \ It is virtually identical to how `ControlState` works, as shown earlier in this\
    \ chapter. For a small amount of data, it may be reasonable to just use the `Pair`\
    \ or `Triplet` types. Because there are five values that need to be serialized\
    \ here, I chose to use an array of objects set to the values of the member variables.\n\
    \nNext the state must be reloaded into the page on the next page request. The\
    \ `LoadViewState` method is shown in **Listing 4-44**.\n\n**C H A P T E R 4 ■\
    \ D A T A B O U N D C O N T R O L S**\n\n**106**\n\n**Listing 4-44.** *`LoadViewState`\
    \ Method*\n```\nprotected override void LoadViewState(object state)\n{\n    if\
    \ (state != null && state is Pair)\n    {\n        Pair pair = (Pair)state;\n\
    \        base.LoadViewState(pair.First);\n        object[] objArray = (object[])pair.Second;\n\
    \        if (objArray[0] != null)\n        {\n            _firstName = (string)objArray[0];\n\
    \        }\n        if (objArray[1] != null)\n        {\n            _lastName\
    \ = (string)objArray[1];\n        }\n        if (objArray[2] != null)\n      \
    \  {\n            _birthDate = (DateTime)objArray[2];\n        }\n        if (objArray[3]\
    \ != null)\n        {\n            _city = (string)objArray[3];\n        }\n \
    \       if (objArray[4] != null)\n        {\n            _country = (string)objArray[4];\n\
    \        }\n    }\n    else\n    {\n        base.LoadViewState(null);\n    }\n\
    }\n```\n\nThe `LoadViewState` method carries out the opposite action as `SaveViewState`\
    \ by casting the object to a `Pair` to access the `Second` property, which is\
    \ the array of objects set previously.\n\nWith these methods in place, the five\
    \ member variables will be safely stored to `ViewState` and reloaded before the\
    \ `Load` event during the postback request.\n\nThis leads into the reason why\
    \ the `Text` properties of the `LiteralControl`s were not set in the `CreateChildControls`\
    \ method and instead were set in the `OnPreRender` method. The `ViewState` used\
    \ to persist the data for `PersonRow` will not be available when `CreateChildControls`\
    \ is called. But these values are available when the `OnPreRender` method is run.\n\
    \n![Image 16](index-114_1.png)\n\n**C H A P T E R 4 ■ D A T A B O U N D C O N\
    \ T R O L S**\n\n**107**\n\n## Working Without ViewState\n\nTo reduce page size,\
    \ a developer may choose to disable the `ViewState` on a databound control. If\
    \ the control does not handle this case, the control will fail to work as expected.\
    \ Instead of displaying the data as it does on the first page load, it will show\
    \ empty rows. It is important to note that this databound control may be one of\
    \ several listed on a page, and a postback event could be caused by any control\
    \ on the page. While creating this control, I used a test page that had a button\
    \ that was not attached to an event handler (see Figure 4-4). It simply caused\
    \ a postback.\n\n**Figure 4-4.** *Do Nothing button*\n\nWhen I first turned off\
    \ `ViewState`, it did what I expected because it was specifically using the `ViewState`\
    \ accessor to hold onto the data. It was expected that it would fail. One option\
    \ to ensure this data stays in place is to use `ControlState`, but doing so would\
    \ simply move the problem to another place and not allow developers using the\
    \ control to tune their page size by disabling `ViewState`. Instead, the problem\
    \ has to be resolved in the `PersonListingControl`.\n\nThe `PersonListingControl`\
    \ has access to the data through the `DataSourceID` so that it can always retrieve\
    \ the data if it needs it. When `ViewState` is disabled, a set of values must\
    \ be persisted as `ControlState`. These values include the `PageIndex`, `TotalRowsCount`,\
    \ `ItemCount`, and `CommandArgument` values for the pager links.\n\nEarlier you\
    \ looked at the `CreateChildControls` method for the `PersonListingControl` in\
    \ **Listing 4-22**, which used the `_itemCount` member variable to re-create the\
    \ right number of items when the `dataBinding` value was `false`. This is one\
    \ of the values that will be persisted using `ControlState`. **Listing 4-45**\
    \ shows the `SaveControlState` method.\n\n**C H A P T E R 4 ■ D A T A B O U N\
    \ D C O N T R O L S**\n\n**108**\n\n**Listing 4-45.** *`SaveControlState` Method*\n\
    ```\nprotected override object SaveControlState()\n{\n    object[] state = new\
    \ object[6];\n    state[0] = base.SaveControlState();\n    state[1] = _pageIndex;\n\
    \    state[2] = _totalRowsCount;\n    state[3] = _itemCount;\n    state[4] = _previousLinkButton.CommandArgument;\n\
    \    state[5] = _nextLinkButton.CommandArgument;\n    return state;\n}\n```\n\n\
    This limited set of values should be quite small when they are persisted. You\
    \ may notice the value in the hidden input field where `ViewState` is placed normally\
    \ is not empty even though you may have disabled `ViewState` for the entire page.\
    \ The reason it is not empty is that `ControlState` is using the same space as\
    \ `ViewState` with hopefully much less space. Loading the `ControlState` is shown\
    \ in **Listing 4-46**.\n\n**Listing 4-46.** *`LoadControlState` Method*\n```\n\
    protected override void LoadControlState(object savedState)\n{\n    _pageIndex\
    \ = 0;\n    object[] objArray = savedState as object[];\n    if (objArray != null)\n\
    \    {\n        InitializePagerControls();\n        base.LoadControlState(objArray[0]);\n\
    \        if (objArray[1] != null)\n        {\n            _pageIndex = (int) objArray[1];\n\
    \        }\n        if (objArray[2] != null)\n        {\n            _totalRowsCount\
    \ = (int)objArray[2];\n        }\n        if (objArray[3] != null)\n        {\n\
    \            _itemCount = (int)objArray[3];\n        }\n        if (objArray[4]\
    \ != null)\n        {\n            _previousLinkButton.CommandArgument = (string)objArray[4];\n\
    \        }\n        if (objArray[5] != null)\n        {\n            _nextLinkButton.CommandArgument\
    \ = (string)objArray[5];\n        }\n    }\n    else\n    {\n        base.LoadControlState(null);\n\
    \    }\n}\n```\n\nWhen I implemented these methods, everything started to work\
    \ as it did before `ViewState` was disabled. I knew that I had done absolutely\
    \ nothing to persist the data for the `PersonRow`, yet I could click the pager\
    \ links and the Do Nothing button and would always get the data I expected. It\
    \ seems everything was handled for me automatically, and I wanted to know exactly\
    \ how it was being done, so I fired up the debugger.\n\n![Image 17](index-116_1.png)\n\
    \n**C H A P T E R 4 ■ D A T A B O U N D C O N T R O L S**\n\n**109**\n\n### Walking\
    \ the Debugger"
