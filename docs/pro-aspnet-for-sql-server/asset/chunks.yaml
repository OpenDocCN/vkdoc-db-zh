- fmt: "and `.asmx` web services that offered some interoperability for multiple platforms\
    \ such as `.NET`, `Java`, `Python`, and `Ruby`. But the industry set out to define\
    \ many details about how web services would become a fully functional protocol\
    \ for distributing applications as services with the `WS-*` specifications. Some\
    \ of these specifications related to routing requests, while others addressed\
    \ how security should be handled. Microsoft produced the Web Service Extensions\
    \ (`WSE`), which added functionality that fell in line with these constantly changing\
    \ specifications to the point that they became relatively stable. Then Microsoft\
    \ released `.NET 3.0` with `WCF`, which is a rich implementation of the `WS-*`\
    \ specifications meant for web services, but the intention is not just for making\
    \ `.NET` applications integrate well with other platforms.\n\n`WCF` will eventually\
    \ replace `.NET remoting` and `COM`.\n\n`WCF` will give us a great deal of flexibility\
    \ that is not possible with other technologies. A `WCF` service could be self-hosted\
    \ within that application that uses the services, or the service could be running\
    \ outside of the application on the same server or a remote server. Making the\
    \ change can be done entirely through the configuration. By creating a `WCF` implementation\
    \ of a provider, we will have the option to move the data access layer to a service\
    \ that runs locally or remotely on a separate server, which effectively distributes\
    \ the load and traffic coming into the application.\n\nAnother benefit of using\
    \ `WCF` is that you can provide a rich application layer that can be used by multiple\
    \ applications simultaneously. Consider a provider that manages the payroll system,\
    \ which needs to be accessible by multiple applications. If you had three distinct\
    \ websites that used that provider, you would not automatically share the caching\
    \ functionality from one website to the next because they are running in separate\
    \ runtimes. But if you were to implement the provider with `WCF` and point each\
    \ of the three websites to the shared service, you would benefit from having a\
    \ central point where data can be effectively cached, because you can control\
    \ where data is saved and deleted and remove items from the cache when you determine\
    \ they have changed.\n\nYou could actually be much more aggressive with your caching\
    \ policy with a shared service because you do control every piece of data that\
    \ is coming and going. It is much like using the stored procedures as the gatekeepers,\
    \ but you have access to the full functionality of the `.NET` runtime. And instead\
    \ of using `ASP.NET` caching, you could simply hold on to your own collections\
    \ of data, keep them current as the data changes, and return the requested data\
    \ from your internal collection without querying the database each time.\n\n##\
    \ WCF Service Requirements\n\nRunning a `WCF` service requires a client and a\
    \ service. It is a bit more work than just setting up a set of classes that can\
    \ automatically talk to each other. In order for a client to work, the service\
    \ must be hosted and ready. The service also needs to be at a known location that\
    \ is set by using the configuration. For the `WCF` provider, we will create a\
    \ new `EventProvider` and we will set the service to run inside of a console application\
    \ during development on a local port by using the binding called `netTcpBinding`.\
    \ The client configuration is shown in Listing 10-28.\n\n**Listing 10-28.** WCF\
    \ Client Configuration\n\n```xml\n<system.serviceModel>\n  <client>\n    <endpoint\n\
    \      address = \"net.tcp://localhost:8002/EventService/\"\n      binding = \"\
    netTcpBinding\"\n      contract = \"DotnetUserGroup.DataAccess.WcfProviders.Events.IEventService\"\
    \n    />\n  </client>\n</system.serviceModel>\n```\n\nThe client will look for\
    \ the service by using the `netTcpBinding` on `port 8002` on the same machine.\
    \ Then in the console application, the service will use the configuration in Listing\
    \ 10-29.\n\n**Listing 10-29.** WCF Service Configuration\n\n```xml\n<system.serviceModel>\n\
    \  <services>\n```"
