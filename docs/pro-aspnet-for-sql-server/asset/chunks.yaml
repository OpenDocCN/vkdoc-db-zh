    C H A P T E R 6 ■ C A C H I N G


    **171**


    Once this stored procedure is updated, the script to enable dependency polling
    on this table will run without failing. And to again clear the resources added
    to the database, you can run the script in Listing 6-26.


    **Listing 6-26.** *Remove SQL Cache Dependencies.cmd*


    @echo off


    set REGSQL="%windir%\Microsoft.NET\Framework\v2.0.50727\aspnet_regsql.exe"


    set DATABASE=AdventureWorks


    set DSN="Data Source=.\SQLEXPRESS;Initial Catalog=%DATABASE%; ➥


    Integrated Security=True"


    %REGSQL% -C %DSN% -dd


    pause


    Configuring the SqlCacheDependency for Polling


    Once the database is prepared for polling, you must also configure the application
    to make use of it. The configuration block shown in Listing 6-27 belongs within
    the system.web block and creates a mapping to the AdventureWorks database, which
    is designated with the aw values as the connection string name as well as the
    name of the cache dependency.


    **Listing 6-27.** *Configuration SqlCacheDependency*


    <caching>


    <sqlCacheDependency enabled="true">


    <databases>


    <add name="aw" connectionStringName="aw" pollTime="15000"/>


    </databases>


    </sqlCacheDependency>


    </caching>


    The pollTime attribute is optional. It controls how often the status table is
    checked. This value is in milliseconds, but I would highly discourage the value
    ever dropping below one second (1,000 ms). In fact, I would make the poll time
    much higher, such as ten seconds or a full minute. And if you are using absolute
    expiration, you would naturally want the poll time to be much shorter than the
    caching window, while a sliding window may never invalidate cached items unless
    polling indicates to the cache that a dependency has changed.


    Now that polling is enabled and configured, the code snippet in Listing 6-28 will
    create a polling cache dependency and insert the item into the cache.


    **Listing 6-28.** *Creating a Polling Cache Dependency* Cache cache = HttpRuntime.Cache;


    CacheDependency cacheDependency =


    new SqlCacheDependency("aw", "Production.Product"); cache.Insert(cacheKey, dataSet,
    cacheDependency,


    8601Ch06CMP2 8/24/07 12:13 PM Page 172


    **172**


    C H A P T E R 6 ■ C A C H I N G


    DateTime.Now.AddSeconds(120), Cache.NoSlidingExpiration, CacheItemPriority.Normal,
    removedCallback);


    Notice the aw parameter references the configured cache dependency, and the table
    fully qualifies the Production.Product table. The cached item is given an absolute
    time-out of 120


    seconds, while the cache dependency will poll the status table for changes every
    15 seconds.


    If the data changes immediately after the query pulls the data, it will not get
    a change until at least 15 seconds later.


    Problems with Polling


    While polling is a simple and reliable way to invalidate data held in the cache,
    it can be a bit resource intensive if the poll time is very low. And because the
    poll time is configured for the entire database and not unique for each monitored
    table, it is likely you will set the poll time to the lowest number necessary
    for the table that needs to remain the most current. A shorter poll time means
    the database will be hit more often.


    Polling is also not a fine-grained approach. The cache dependency will change
    for any insert, update, or delete in the monitored table regardless of whether
    the modified data is actually held in the cache. If you have a table with 50,000
    rows and 10,000 of those rows are currently held in the cache, an update to a
    single record will cause all of those 10,000 rows to be removed from the cache.


    **Query Notifications**'
  trans: "\n不幸的是，清单 6-23 中的脚本在首次运行时失败了，因为 `Product` 表位于 `Production` 模式中，而不是默认的 `dbo`\
    \ 模式。这可以通过调整实用工具使用的存储过程来修复，使其认识到目标表不存在于 `dbo` 模式中。一旦数据库启用了依赖项，就会创建一个名为 `AspNet_SqlCacheRegisterTableStoredProcedure`\
    \ 的存储过程。必须更新此存储过程，以便能够通过轮询监控 `Production.Product` 表（参见清单 6-24）。（感谢 Chris Benard\
    \ [http://chrisbenard.net/]，他在博客上发布了这个更新后的脚本。）\n\n## 更新存储过程以支持模式\n\n**清单 6-24.**\
    \ *更新后的 AspNet_SqlCacheRegisterTableStoredProcedure*\n```sql\nALTER PROCEDURE\
    \ [dbo].[AspNet_SqlCacheRegisterTableStoredProcedure]\n    @tableName NVARCHAR(450)\n\
    AS\nBEGIN\n    DECLARE @triggerName AS NVARCHAR(3000)\n    DECLARE @fullTriggerName\
    \ AS NVARCHAR(3000)\n    DECLARE @canonTableName NVARCHAR(3000)\n    DECLARE @quotedTableName\
    \ NVARCHAR(3000)\n    DECLARE @schemaName NVARCHAR(3000)\n\n    /* 检测模式名称 */\n\
    \    IF CHARINDEX('.', @tableName) <> 0 AND CHARINDEX('[', @tableName) = 0\n \
    \       OR CHARINDEX('[', @tableName) > 1\n        SET @schemaName = SUBSTRING(@tableName,\
    \ 1, CHARINDEX('.', @tableName) - 1)\n    ELSE\n        SET @schemaName = 'dbo'\n\
    \n    /* 创建触发器名称 */\n    IF @schemaName <> 'dbo'\n        SET @triggerName = SUBSTRING(@tableName,\n\
    \            CHARINDEX('.', @tableName) + 1, LEN(@tableName) - CHARINDEX('.',\
    \ @tableName))\n    ELSE\n        SET @triggerName = @tableName\n\n    SET @triggerName\
    \ = REPLACE(@triggerName, '[', '__o__')\n    SET @triggerName = REPLACE(@triggerName,\
    \ ']', '__c__')\n    SET @triggerName = @triggerName + '_AspNet_SqlCacheNotification_Trigger'\n\
    \    SET @fullTriggerName = @schemaName + '.[' + @triggerName + ']'\n\n    /*\
    \ 为触发器创建规范化表名 */\n    /* 如果名称包含其他分隔符，则不要修改 */\n    IF (CHARINDEX('.', @tableName)\
    \ <> 0 OR\n        CHARINDEX('[', @tableName) <> 0 OR\n        CHARINDEX(']',\
    \ @tableName) <> 0)\n        SET @canonTableName = @tableName\n    ELSE\n    \
    \    SET @canonTableName = '[' + @tableName + ']'\n\n    /* 首先确保表存在 */\n    IF\
    \ (SELECT OBJECT_ID(@tableName, 'U')) IS NULL\n    BEGIN\n        RAISERROR ('00000001',\
    \ 16, 1)\n        RETURN\n    END\n\n    BEGIN TRAN\n        /* 将值插入通知表 */\n \
    \       IF NOT EXISTS (SELECT tableName FROM\n            dbo.AspNet_SqlCacheTablesForChangeNotification\n\
    \            WITH (NOLOCK) WHERE tableName = @tableName)\n\n        IF NOT EXISTS\
    \ (SELECT tableName FROM\n            dbo.AspNet_SqlCacheTablesForChangeNotification\n\
    \            WITH (TABLOCKX) WHERE tableName = @tableName)\n\n            INSERT\
    \ dbo.AspNet_SqlCacheTablesForChangeNotification\n            VALUES (@tableName,\
    \ GETDATE(), 0)\n\n        /* 创建触发器 */\n        SET @quotedTableName = QUOTENAME(@tableName,\
    \ '''')\n\n        IF NOT EXISTS (SELECT name FROM sysobjects WITH (NOLOCK) WHERE\
    \ name = @triggerName AND type = 'TR')\n            IF NOT EXISTS (SELECT name\
    \ FROM sysobjects WITH (TABLOCKX) WHERE name = @triggerName AND type = 'TR')\n\
    \                EXEC('CREATE TRIGGER ' + @fullTriggerName + ' ON ' + @canonTableName\
    \ +'\n                    FOR INSERT, UPDATE, DELETE AS BEGIN\n              \
    \          SET NOCOUNT ON\n                        EXEC dbo.AspNet_SqlCacheUpdateChangeIdStoredProcedure\
    \ N' +\n                        @quotedTableName + '\n                    END\n\
    \                ')\n    COMMIT TRAN\nEND\n```\n\n`Add SQL Cache Dependencies.cmd`\
    \ 脚本可以进行调整，以内联更新存储过程，这样它使用 SQL Server 2005 附带的 `OSQL` 命令行实用工具时就不会失败（参见清单 6-25）。\n\
    \n## 更新批处理脚本以支持模式\n\n**清单 6-25.** *Add SQL Cache Dependencies.cmd (修订版)*\n```cmd\n\
    @echo off\nset REGSQL=\"%windir%\\Microsoft.NET\\Framework\\v2.0.50727\\aspnet_regsql.exe\"\
    \nset OSQL=\"C:\\Program Files\\Microsoft SQL Server\\90\\Tools\\Binn\\osql.exe\"\
    \nset SCRIPTS_DIR=\"AdventureWorksDatabase\\AspNet Scripts\"\nset UPDATE_SCRIPT=AspNet_SqlCacheRegisterTableStoredProcedure.sql\n\
    set DATABASE=AdventureWorks\nset DSN=\"Data Source=.\\SQLEXPRESS;Initial Catalog=%DATABASE%;Integrated\
    \ Security=True\"\n\necho Registering dependencies\n%REGSQL% -C %DSN% -ed\n\n\
    echo Updating AspNet Stored Procedure for Schema Support\n%OSQL% -S .\\SQLEXPRESS\
    \ -E -d %DATABASE% -i %SCRIPTS_DIR%\\%UPDATE_SCRIPT%\n\necho Registering Production.Product\
    \ table\n%REGSQL% -C %DSN% -et -t Production.Product\n\npause\n```\n\n此存储过程更新后，启用此表依赖项轮询的脚本将能成功运行。要再次清除添加到数据库的资源，您可以运行清单\
    \ 6-26 中的脚本。\n\n## 移除 SQL 缓存依赖项\n\n**清单 6-26.** *Remove SQL Cache Dependencies.cmd*\n\
    ```cmd\n@echo off\nset REGSQL=\"%windir%\\Microsoft.NET\\Framework\\v2.0.50727\\\
    aspnet_regsql.exe\"\nset DATABASE=AdventureWorks\nset DSN=\"Data Source=.\\SQLEXPRESS;Initial\
    \ Catalog=%DATABASE%;Integrated Security=True\"\n\n%REGSQL% -C %DSN% -dd\n\npause\n\
    ```\n\n## 为轮询配置 SqlCacheDependency\n\n数据库准备好进行轮询后，您还必须配置应用程序以使用它。清单 6-27 所示的配置块属于\
    \ `system.web` 块内，并创建了一个到 `AdventureWorks` 数据库的映射，该数据库使用 `aw` 值指定为连接字符串名称以及缓存依赖项的名称。\n\
    \n**清单 6-27.** *配置 SqlCacheDependency*\n```xml\n<caching>\n    <sqlCacheDependency\
    \ enabled=\"true\">\n        <databases>\n            <add name=\"aw\" connectionStringName=\"\
    aw\" pollTime=\"15000\"/>\n        </databases>\n    </sqlCacheDependency>\n</caching>\n\
    ```\n\n`pollTime` 属性是可选的。它控制检查状态表的频率。该值以毫秒为单位，但我强烈建议该值不要低于 1 秒（1,000 毫秒）。实际上，我会将轮询时间设置得更高，比如\
    \ 10 秒或一分钟。如果您使用的是绝对过期，您自然希望轮询时间远短于缓存窗口，而滑动窗口可能永远不会使缓存项失效，除非轮询指示缓存依赖项已更改。\n\n\
    现在轮询已启用并配置好，清单 6-28 中的代码片段将创建一个轮询缓存依赖项并将项插入缓存。\n\n## 创建轮询缓存依赖项\n\n**清单 6-28.**\
    \ *创建轮询缓存依赖项*\n```csharp\nCache cache = HttpRuntime.Cache;\nCacheDependency cacheDependency\
    \ = new SqlCacheDependency(\"aw\", \"Production.Product\");\ncache.Insert(cacheKey,\
    \ dataSet, cacheDependency,\n    DateTime.Now.AddSeconds(120), Cache.NoSlidingExpiration,\n\
    \    CacheItemPriority.Normal, removedCallback);\n```\n\n注意 `aw` 参数引用了配置的缓存依赖项，而表名完全限定为\
    \ `Production.Product` 表。缓存项被赋予 120 秒的绝对超时时间，而缓存依赖项将每 15 秒轮询一次状态表以检查更改。\n\n如果数据在查询提取数据后立即更改，它至少要等到\
    \ 15 秒后才能得到更改。\n\n## 轮询的问题\n\n虽然轮询是一种简单可靠的方法来使缓存中保存的数据失效，但如果轮询时间非常低，它可能会有点消耗资源。而且因为轮询时间是为整个数据库配置的，而不是为每个监控的表唯一设置的，您可能会将轮询时间设置为保持最当前状态的表所需的最低数字。更短的轮询时间意味着数据库会被更频繁地访问。\n\
    \n轮询也不是一种细粒度的方法。对于监控表中的任何插入、更新或删除，缓存依赖项都会更改，而不管修改的数据是否实际保存在缓存中。如果您有一个包含 50,000\
    \ 行的表，其中 10,000 行当前保存在缓存中，更新单个记录将导致所有这 10,000 行从缓存中移除。\n\n**查询通知**\n"
- fmt: 'The other option to remove items from the cache automatically prior to their
    expiration is query notifications. Instead of constantly checking whether the
    status of a table has changed, query notifications register a query with the notifications
    system and request to be notified if the resources referenced in the query change.
    This is an immediate notification without delay and also specific to the scope
    of the query, which makes it ideal when the targeted data is time sensitive. It
    also means it is more fine-grained than the polling approach, which cannot distinguish
    changes of one row from another in the same table.


    ## Contrasting Polling and Notifications


    Choosing between polling and notifications will be a critical decision when you
    approach caching. While one or the other may be a perfect solution for your scenario,
    there are some details to consider. What is appealing about polling is the fact
    that it is so easy to set up, but as the examples in the previous section show,
    the change dependency is not known by the application until the poll time is reached.
    And each change is triggered by any change made to the table.


    Notifications do alert you immediately to a changed dependency with greater specificity
    of the rows you are concerned about, but the valid queries are limiting. Notifications
    can also become quite intense on a system where the data changes frequently. Where
    the choice of polling or notifications alone does not sufficiently solve your
    performance needs, you can consider a hybrid or custom approach.


    The polling solution works by placing a trigger on each table, which is monitored
    for each insert, update, and delete. Each time a change is made, a counter is
    incremented on a status table. Then the polling mechanism monitors the counters
    for changes. A custom solution could make use of stored procedures that handle
    all inserts, updates, and deletes to your data, and a more fine-grained status
    table can be updated as changes are made so that a single row does not invalidate
    all of the cached items from that table. Perhaps you have products organized into
    categories, and when a single category changes, you just invalidate the cached
    items from the affected category.


    With your own efficient status table, you can use notifications to monitor changes
    and remove cached items as necessary. Variations of this custom solution will
    allow you to adapt a high-performance solution to your application.


    ## Enabling the Service Broker


    To get query notifications set up, you must take several steps to prepare your
    database. This can be a tricky process, but the following steps should get you
    up and running shortly. Query notifications work on top of a notifications system
    that uses the Service Broker, which is a feature of the SQL Server database. This
    feature goes well beyond just monitoring queries, and for security reasons it
    is not enabled by default when you first install your database. This is true for
    SQL Server 2005 and SQL Express. To enable it, you would use a utility called
    SQL Server Surface Area Configuration for Features, which has a link at the bottom
    called Surface Area Configuration for Features. After a fresh installation, you
    will see that when you dig into the Service Broker node under the Database Engine
    node, you cannot enable the Service Broker because an endpoint has not been created
    yet. The necessary endpoint requires the `master key` to be defined. This can
    all be created with the script in Listing 6-29.


    Listing 6-29. `Create Service Broker Endpoint.sql`

    ```sql

    CREATE MASTER KEY ENCRYPTION BY password = ''CHANGE_ME'';

    GO


    use Master;

    GO


    CREATE CERTIFICATE [SERVER_NAME]

    with subject = N''SERVER_NAME'';

    GO


    CREATE ENDPOINT [ServiceBroker]

    state = started as tcp (listener_port = 4022) for service_broker (authentication
    = certificate [SERVER_NAME]);

    GO

    ```'
