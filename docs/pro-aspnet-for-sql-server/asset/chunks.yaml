    \    if (tmpDate < minDate || tmpDate > maxDate)\n    {\n        args.IsValid\
    \ = false;\n        return;\n    }\n}\n```\n\n代码隐藏文件仔细检查`TextBox`的值，以确保永远不会返回无效值。在`CustomValidator`的`ServerValidate`事件处理程序中，它使用`DateTime`对象的`TryParse`方法来检查`TextBox`的`Text`属性是否不仅看起来像日期，而且确实是一个有效的日期。它不会允许\
    \ 6 月 31 日通过。然后，在`Date`属性中，会执行相同的检查，以防止无效日期通过。回到`GridView`中，`DateEditor`被放置在`EditTemplate`中，其`Date`属性绑定到`出生日期`字段（见清单\
    \ 4-7）。\n\n`清单 4-7.` `DateEditor`\n\n```xml\n<EditItemTemplate>\n    <chpt04:DateEditor\
    \ ID=\"DateEditor1\" runat=\"server\"\n        Date='<%# Bind(\"BirthDate\") %>'\
    \ />\n</EditItemTemplate>\n```\n\n现在，当输入无效日期时，会显示一个有用的错误提示，而不是抛出异常。\n\n更好的是，`DateEditor`可以在整个网站中的任何地方使用，因此所有地方都使用了一致的验证检查，这将带来更好的界面和更少的工作量。\n\
    \n### 绑定输入参数\n\n数据源可以配置输入参数，以便以多种方式筛选数据。输入参数可以来自`TextBox`或`DropDownList`等控件，也可以来自查询字符串值。配置`ObjectDataSource`和`SqlDataSource`的向导将检测数据源何时需要输入参数，并呈现这些选项。你可以绑定这些参数，也可以选择以编程方式处理它们。\n\
    \n### 通过控件绑定输入参数\n\n使用输入参数的最简单示例是将它们绑定到`TextBox`或`DropDownList`等控件。使用示例数据库时，你将首先将姓氏列表绑定到`DropDownList`。然后，`GridView`将获取`DropDownList`的`SelectedValue`，并获取所有姓氏匹配的人员。此示例可以在不编写任何代码隐藏文件代码的情况下完成。这只是拖放控件的问题。清单\
    \ 4-8 显示了代码。\n\n`清单 4-8.` `InputParameterExample.aspx`\n\n```xml\n<b>选择姓氏: </b>\n\
    <asp:DropDownList ID=\"DropDownList1\" runat=\"server\" AutoPostBack=\"True\"\n\
    \    DataSourceID=\"ObjectDataSource1\" DataTextField=\"LastName\">\n</asp:DropDownList>\n\
    \n<asp:ObjectDataSource ID=\"ObjectDataSource1\" runat=\"server\"\n    OldValuesParameterFormatString=\"\
    original_{0}\"\n    SelectMethod=\"GetLastNames\" TypeName=\"Chapter04.PersonDomain\"\
    >\n</asp:ObjectDataSource>\n\n<asp:GridView ID=\"GridView1\" runat=\"server\"\
    \ AllowPaging=\"True\"\n    AllowSorting=\"True\" DataSourceID=\"ObjectDataSource2\"\
    >\n</asp:GridView>\n\n<asp:ObjectDataSource ID=\"ObjectDataSource2\" runat=\"\
    server\"\n    OldValuesParameterFormatString=\"original_{0}\"\n    SelectMethod=\"\
    GetPeopleByLastName\"\n    TypeName=\"Chapter04.PersonDomain\">\n    <SelectParameters>\n\
    \        <asp:ControlParameter ControlID=\"DropDownList1\"\n            Name=\"\
    lastName\" PropertyName=\"SelectedValue\"\n            Type=\"String\" />\n  \
    \  </SelectParameters>\n</asp:ObjectDataSource>\n```\n\n重要的部分在接近底部的`SelectParameters`，它定义了`ControlParameter`来自`DropDownList1`，并设置了`lastName`输入参数。\n\
    \n### 以编程方式绑定输入参数"
- fmt: "Sometimes you cannot just get a value from a control. Either the datasource\
    \ is not bound to the control yet or it needs to be carefully validated before\
    \ setting the value as an input parameter to prevent an exception. In these cases,\
    \ you can withhold the `ControlParameter` definition and instead leave the input\
    \ parameter undefined except for the `Name` and `Type`. The `ObjectDataSource`\
    \ has an event called `Selecting`, which is where you will want to set the input\
    \ parameter programmatically. Listing 4-9 shows an example of declaring input\
    \ parameters.\n\n### Listing 4-9. `InputParameterExample2.aspx`\n\n```xml\n<b>Select\
    \ Last Name: </b>\n<asp:DropDownList ID=\"DropDownList1\" runat=\"server\" AutoPostBack=\"\
    True\"\n    DataSourceID=\"ObjectDataSource1\" DataTextField=\"LastName\">\n</asp:DropDownList>\n\
    <asp:GridView ID=\"GridView1\" runat=\"server\" AllowPaging=\"True\"\n    AllowSorting=\"\
    True\" DataSourceID=\"ObjectDataSource2\">\n</asp:GridView>\n<asp:ObjectDataSource\
    \ ID=\"ObjectDataSource1\" runat=\"server\"\n    OldValuesParameterFormatString=\"\
    original_{0}\"\n    SelectMethod=\"GetLastNames\"\n    TypeName=\"Chapter04.PersonDomain\"\
    >\n</asp:ObjectDataSource>\n<asp:ObjectDataSource ID=\"ObjectDataSource2\" runat=\"\
    server\"\n    OldValuesParameterFormatString=\"original_{0}\"\n    SelectMethod=\"\
    GetPeopleByLastName\"\n    TypeName=\"Chapter04.PersonDomain\"\n    OnSelecting=\"\
    ObjectDataSource2_Selecting\">\n    <SelectParameters>\n        <asp:Parameter\
    \ Name=\"lastName\" Type=\"String\" />\n    </SelectParameters>\n</asp:ObjectDataSource>\n\
    ```\n\nNotice that the `OnSelecting` event handler is specified and the `SelectParameters`\
    \ specifies the `lastName` parameter with no control association. The value for\
    \ the parameter is set in the code-behind file. Listing 4-10 shows an event handler\
    \ for the `Selecting` event.\n\n### Listing 4-10. Selecting Event Handler\n\n\
    ```csharp\nprotected void ObjectDataSource2_Selecting(object sender, ObjectDataSourceSelectingEventArgs\
    \ e)\n{\n    e.InputParameters[\"lastName\"] = DropDownList1.SelectedValue;\n\
    }\n```\n\nIf this input parameter wanted a date and the value was coming from\
    \ a `TextBox`, the value could be checked to ensure that it really is a valid\
    \ date and only set the input parameter when it is valid. An input parameter may\
    \ also be a more complex type, like a business object, that you assemble in the\
    \ `Selecting` event handler. This simple handler gives you many options.\n\n##\
    \ Binding a User Control\n\nAll too often I have seen very large pages with piles\
    \ and piles of markup in the template side of each page and plenty more code in\
    \ the code-behind because the pages were not broken up into user controls. A user\
    \ control is just a fragment of a page that is very useful when used to encapsulate\
    \ a section of the page. It will isolate not only a piece of the markup, but also\
    \ events and behavior. User controls can also be used multiple times on one page\
    \ as well as across many pages. It is a great way to introduce code reuse for\
    \ a website.\n\nThe matter of binding to a user control can be tricky when you\
    \ first attempt it. Should it try to read values from the query string or somehow\
    \ traverse the control hierarchy to get to a control that defines the input parameter\
    \ it needs to carry out its `DataBind` function? The best way to handle this is\
    \ to treat the user control just like you already treat other controls such as\
    \ the `TextBox` and set properties on the user control. First you need a user\
    \ control, as shown in Listing 4-11.\n\n### Listing 4-11. `PersonListingControl.ascx`\n\
    \n```xml\n<%@ Control Language=\"C#\" AutoEventWireup=\"true\"\n    CodeFile=\"\
    PersonListingControl.ascx.cs\"\n    Inherits=\"Controls_PersonListingControl\"\
    \ %>\n<asp:GridView ID=\"GridView1\" runat=\"server\" AllowPaging=\"True\"\n \
    \   AllowSorting=\"True\" DataSourceID=\"ObjectDataSource1\">\n</asp:GridView>\n\
    <asp:ObjectDataSource ID=\"ObjectDataSource1\" runat=\"server\"\n    OldValuesParameterFormatString=\"\
    original_{0}\"\n    SelectMethod=\"GetPeopleByLastName\"\n    TypeName=\"Chapter04.PersonDomain\"\
    \n    OnSelecting=\"ObjectDataSource1_Selecting\">\n    <SelectParameters>\n \
    \       <asp:Parameter Name=\"lastName\" Type=\"String\" />\n    </SelectParameters>\n\
    </asp:ObjectDataSource>\n```\n\nThis example includes the `GridView` as in the\
    \ previous examples, yet it is held in a user control. It also has an `ObjectDataSource`\
    \ with a `lastName` input parameter with the `Selecting` event handler specified.\
    \ The parent page will need to pass in the value for the `lastName` parameter,\
    \ and you will do it with a property declaration (see Listing 4-12).\n\n### Listing\
    \ 4-12. `PersonListing.aspx.cs` Code-Behind\n\n```csharp\nprotected void ObjectDataSource1_Selecting(\n\
    \    object sender, ObjectDataSourceSelectingEventArgs e)\n{\n    e.InputParameters[\"\
    lastName\"] = LastName;\n}\n\nprivate string _lastName = String.Empty;\npublic\
    \ string LastName\n{\n    get\n    {\n        return _lastName;\n    }\n    set\n\
    \    {\n        _lastName = value;\n        ObjectDataSource1.DataBind();\n  \
    \  }\n}\n```\n\nThe `LastName` property holds the value that is used on the `Selecting`\
    \ event handler. And when the `LastName` property is set, you can see that it\
    \ calls `DataBind` on `ObjectDataSource1` to immediately bind the data to the\
    \ `GridView`. Without calling `DataBind`, the `GridView` may not be bound at all\
    \ because it will not automatically get fired like it would if the `ObjectDataSource`\
    \ was configured with a control property. It makes sense to call it right here\
    \ when the value is set, but it can also be called on the `PreRender` event for\
    \ the user control or even have the page holding this control call the `DataBind`\
    \ method on the user control. Having the data bound immediately once the value\
    \ is known ensures that the data is always bound.\n\nIn the case when there are\
    \ multiple properties that are used to set multiple input parameters, it is better\
    \ to defer the data binding to a later event like the `PreRender` event so all\
    \ of the properties can be set before the `Selecting` event runs.\n\n## Embedding\
    \ Databound Controls\n\nFor a more complex data hierarchy, you may find that you\
    \ would like to embed a user control within another user control, just as the\
    \ previous example embedded a user control within a page and bound data to it\
    \ by passing a value to it through a property. Perhaps you are showing a report,\
    \ and with each section there is a related subsection. Creating a user control\
    \ to represent the section that holds another user control representing the subsection\
    \ is a great way to break up the code into isolated pieces that are responsible\
    \ for their own data binding.\n\nThe sample database has a `Location` table holding\
    \ a `City` and a `Country` column. You will bind a list of countries to a `Repeater`\
    \ control that displays the country with a `Label` control and then passes the\
    \ country to a user control to show a list of cities in that country. You just\
    \ need to design the user controls and wire them together to set the properties\
    \ and fire the data binding in the right order.\n\nThe first user control, shown\
    \ in Listing 4-13, draws a bulleted list with the countries.\n\n### Listing 4-13.\
    \ `CountryListingControl.ascx`\n\n```xml\n<%@ Control Language=\"C#\" AutoEventWireup=\"\
    true\"\n    CodeFile=\"CountryListingControl.ascx.cs\"\n    Inherits=\"Controls_CountryListingControl\"\
    \ %>\n<%@ Register Src=\"CityListingControl.ascx\"\n    TagName=\"CityListingControl\"\
    \ TagPrefix=\"uc1\" %>\n<asp:Repeater ID=\"Repeater1\" runat=\"server\"\n    DataSourceID=\"\
    ObjectDataSource1\">\n    <HeaderTemplate>\n        <ul>\n    </HeaderTemplate>\n\
    \    <ItemTemplate>\n        <li>\n            <asp:Label ID=\"Label1\" runat=\"\
    server\"\n                Text='<%# Bind(\"Country\") %>'></asp:Label>\n     \
    \       <uc1:CityListingControl ID=\"CityListingControl1\"\n                runat=\"\
    server\" Country='<%# Bind(\"Country\") %>' />\n        </li>\n    </ItemTemplate>\n\
    \    <FooterTemplate>\n        </ul>\n    </FooterTemplate>\n</asp:Repeater>\n\
    <asp:ObjectDataSource ID=\"ObjectDataSource1\" runat=\"server\"\n    OldValuesParameterFormatString=\"\
    original_{0}\"\n    SelectMethod=\"GetAllCountries\"\n```"
