  trans: '

    从缓存中自动移除过期项的另一种方式是**查询通知**。它无需持续检查表状态是否变更，而是将查询注册到通知系统，并请求在查询所引用的资源发生变动时获得通知。这种通知是即时且无延迟的，同时精确限定于查询的范围，这使得它在目标数据对时间敏感的场景下尤为理想。这也意味着它比轮询方法更**细粒度**，因为轮询无法区分同一表中不同行的变动。


    ## 对比轮询与通知机制


    在实施缓存时，选择轮询还是通知将成为关键决策。虽然某一方案可能完美适配你的场景，但仍需考虑一些细节。轮询的吸引力在于其易于设置，但正如前一节示例所示，在轮询时间点到达前，应用程序无法感知变更依赖。且每次表的任何变动都会触发通知。


    通知确实能立即提醒你依赖项的变更，并能更精确地定位你关心的行，但有效的查询受到限制。在数据频繁变动的系统中，通知也可能变得相当密集。若单独使用轮询或通知不足以满足你的性能需求，可考虑采用混合或定制方案。


    轮询解决方案的工作原理是在每个表上设置触发器，监视所有插入、更新和删除操作。每次变更时，状态表中的计数器会递增。随后轮询机制通过监控计数器的变化来检测变动。定制解决方案可利用存储过程处理所有插入、更新和删除操作，并随着变更更新更细粒度的状态表，使得单行变动不会使该表的所有缓存项失效。例如，若产品按类别组织，当某个类别变更时，只需使受影响的类别对应的缓存项失效。


    通过建立高效的状态表，你可以使用通知来监控变化并按需移除缓存项。这种定制解决方案的变体可帮助你为应用程序调整出高性能方案。


    ## 启用 Service Broker


    要设置查询通知，必须执行多个步骤来准备数据库。这可能是个复杂的过程，但以下步骤应能助你快速启动运行。查询通知构建于使用 **Service Broker**（SQL
    Server 数据库的一项功能）的通知系统之上。该功能远超单纯的查询监控，并且出于安全考虑，初次安装数据库时默认未启用（适用于 SQL Server 2005
    和 SQL Express）。要启用它，你需要使用名为 **SQL Server Surface Area Configuration for Features**
    的工具，其底部有一个名为 **Surface Area Configuration for Features** 的链接。全新安装后，你会发现当深入查看**数据库引擎**节点下的
    **Service Broker** 节点时，由于尚未创建端点，无法启用 Service Broker。必要的端点要求定义 `master key`。这些均可通过清单
    6-29 中的脚本创建。


    清单 6-29. `Create Service Broker Endpoint.sql`

    ```sql

    CREATE MASTER KEY ENCRYPTION BY password = ''CHANGE_ME'';

    GO


    use Master;

    GO


    CREATE CERTIFICATE [SERVER_NAME]

    with subject = N''SERVER_NAME'';

    GO


    CREATE ENDPOINT [ServiceBroker]

    state = started as tcp (listener_port = 4022) for service_broker (authentication
    = certificate [SERVER_NAME]);

    GO

    ```

    '
- fmt: '# CHAPTER 6: CACHING


    Naturally, you should change the password used to create the master key and also
    set it to use your computer name in place of `SERVER_NAME`. With the endpoint
    in place, you can restart the `Surface Area Configuration for Features` utility
    and check the status of the `Service Broker`.


    With the endpoint defined, you will now see the endpoint that was created in this
    script, and the state will either be `started` or `stopped`. It may be necessary
    to restart your instance of `SQL Server` for this change to take effect.


    You are now ready to enable the `Service Broker`. When you first create a new
    database, the `Service Broker` will already be enabled. For the `AdventureWorks`
    database, the `Service Broker` is not enabled. It is enabled with the script shown
    in Listing 6-30.


    ## Listing 6-30. Enable Service Broker.sql


    ```sql

    ALTER DATABASE AdventureWorks SET ENABLE_BROKER

    ```


    If also goes well, this command should run fairly quickly, but you may find that
    it takes an extremely long time to complete due to a deadlock. To force the command
    to run, you can add `WITH ROLLBACK IMMEDIATE` to the end of the command and rerun
    the script. To check whether the `Service Broker` is enabled, you can run the
    query in Listing 6-31.


    ## Listing 6-31. Service Broker Query.sql


    ```sql

    SELECT name, is_broker_enabled FROM sys.databases

    ```


    This query will list all of your databases with a `1` or `0`, the former indicating
    the `Service Broker` is enabled and the latter indicating it is disabled.


    ## Granting Permissions


    In order to make use of the notifications system, it will be necessary to grant
    the user the ability to create procedures, queues, and services in the database
    (see Listing 6-32). Several other permissions are also necessary.


    ## Listing 6-32. Grant Permissions.sql


    ```sql

    GRANT CREATE PROCEDURE to [USERNAME]

    GRANT CREATE QUEUE to [USERNAME]

    GRANT CREATE SERVICE to [USERNAME]

    GRANT REFERENCES on

    CONTRACT::[http://schemas.microsoft.com/SQL/Notifications/PostQueryNotification]

    to [USERNAME]

    --(note that the schema is case sensitive)

    CREATE SERVICE SqlQueryNotificationService ON QUEUE ServiceBrokerQueue

    GRANT VIEW DEFINITION to [USERNAME]

    EXEC sp_addrole ''sql_dependency_subscriber''

    GRANT SUBSCRIBE QUERY NOTIFICATIONS TO [USERNAME]

    GRANT REFERENCES on

    CONTRACT::[http://schemas.microsoft.com/SQL/Notifications/PostQueryNotification]

    to [USERNAME]

    EXEC sp_addrolemember ''sql_dependency_subscriber'', ''USERNAME''

    GRANT SELECT TO [USERNAME]

    GRANT SUBSCRIBE QUERY NOTIFICATIONS TO [USERNAME]

    GRANT SEND ON SERVICE::SqlQueryNotificationService TO [USERNAME]

    GRANT RECEIVE ON QueryNotificationErrorsQueue TO [USERNAME]

    ```


    Simply change `USERNAME` to the username specified in the connection string. The
    user will be granted the necessary permissions to create the resources required
    for notifications.


    **COMMON FOLDER ADDITIONS**


    You will need to run the scripts to enable SQL notifications each time you want
    to make use of this feature of `SQL Server`. You can place these scripts into
    your `Common` folder under the `Scripts` subfolder (`D:\Projects\Common\Scripts\SQL
    Notifications`).


    ## Requirements for Queries


    Query notifications will not work for all queries. First, a query must reference
    the tables qualified with a two-part name, such as in Listing 6-33.


    ## Listing 6-33. Valid Query for Notifications


    ```sql

    SELECT

    ProductID, [Name], ProductNumber, Color, ListPrice,

    SellStartDate, SellEndDate, DiscontinuedDate

    FROM Production.Product

    WHERE ProductID = @ProductID

    ```


    There is also a long list of operators and expressions that will not be allowed
    with a query notification request. The following are the commonly used functions,
    operators, and expressions that cannot be used with query notifications.


    *   A `count(*)` aggregate

    *   `AVG`, `MAX`, `MIN`

    *   The `TOP` clause

    *   The `DISTINCT` keyword

    *   The `UNION` operator

    *   Subqueries

    *   A `SUM` function that references a nullable expression

    *   An `INTO` clause'
