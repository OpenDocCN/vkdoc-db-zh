- fmt: 'Doing so will keep broken code out of the source-control system, which would
    spread to the other developers’ systems as they pull down updates. But even when
    tests are run, the combination of changes from multiple developers can break the
    unit tests. To protect against this scenario, you can set up a build server to
    pull updates from source control, build the projects, and run the tests at regular
    intervals. This is commonly known as continuous integration.


    ## Continuous Integration


    The most popular continuous integration solution over the past few years has been
    `CruiseControl.NET`. It works with the unit-testing frameworks such as `NUnit`
    as well as a wide range of source-control systems. It can be configured to check
    the source-control system for updates every five minutes. When there is an update,
    `CruiseControl.NET` kicks off the build and testing process. The results of the
    build and tests are recorded with build reports, and the developer can get the
    results immediately by e-mail.


    `CruiseControl.NET` also has a system tray application that stays in touch with
    the build server to report changes back to the developers. When a build is successful,
    the application pops up a notification bubble from the system tray. And when there
    is a failure, it displays a notification with the bad news. `CruiseControl.NET`
    also has a website that displays each of the configured projects with a list of
    all of the build reports. When a build fails, you can look at the latest build
    to see exactly what went wrong.


    Not only does it show you the files that were changed for the latest build, but
    also the line numbers where the code broke. These details make it much easier
    to determine who broke the build and what was changed to cause the break. A side
    effect of having the automated build report failures is that it is much less personal,
    and the developer can simply volunteer to fix his problem right away. Many times
    I have seen the build fail because of a missing file that was not committed to
    source control with all the other changes. Committing that missing file quickly
    fixes the build, and everyone can get back to work. Because of such cases, it
    is best to commit your changes and request the build server to run the build immediately
    so you can ensure that the build is run successfully after your changes are included
    but before you head home for the day. That last thing you need is to be called
    back into work because you did not include a file with your latest changes.


    The upcoming chapters cover specific examples for unit testing and continuous
    integration. They will become a regular part of your daily routine.


    ## Summary


    This chapter covered database management processes, from organizing the scripts
    in Database Projects to creating the scripts for managing stored procedures, indexes,
    and constraints.


    It concluded with a review of automated testing techniques that can be used to
    ensure that the application layer continues to work well with the database.


    `8601Ch04CMP3 8/25/07 1:07 PM Page 73`


    ## Chapter 4 Databound Controls


    There are many useful controls available in `ASP.NET 2.0`, which makes it very
    easy to work with data. Many of the examples provided by Microsoft show how you
    can quickly assemble a data-driven website with little or no code. But sometimes
    the real-world requirements push you beyond this safe space and demand a more
    complex solution. The solutions can still be elegant and work with very little
    code. You just need a deeper understanding of what you can do with the available
    controls and what you do with a more complex combination of these controls. And
    once you break up your approach into smaller components that work together, you
    can handle the more complicated requirements with manageable components.


    This chapter covers the following:


    • The `DetailsView` control


    • The `FormView` control


    • The `GridView` control


    • Editing and validating fields


    • Binding input parameters


    • Embedding user controls


    • Creating a databound control'
