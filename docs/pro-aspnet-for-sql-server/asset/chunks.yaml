    会返回命名的提供程序。由于默认构造函数将与 `ObjectDataSource` 一起使用，从 `ProviderName` 属性返回的值将始终为 null。当
    `EventManager` 接收到 null 值时，它会假定默认的提供程序是合适的，这样 `EventDataObject` 就能够正常运作。如果你想使用默认提供程序之外的其他提供程序，你就必须以编程方式实例化
    `EventDataObject` 并设置其 `ProviderName` 属性，或者直接使用 `EventManager` 来获取你想要的提供程序。


