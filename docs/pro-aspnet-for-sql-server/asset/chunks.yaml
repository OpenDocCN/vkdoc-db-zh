    ## 混合与匹配提供程序


    由于提供程序的性质，可以将这些提供程序服务部署到网站其余部分所使用的同一数据库，或完全不同的数据库。甚至可以为每个单独的提供程序将服务部署到单独的数据库。这样做可能有很好的理由。在一种情况下，您可能正在运行一个连接到庞大数据库的网站，该数据库需要偶尔下线进行维护。这样做时，可能完全没必要让提供程序服务也一起下线。您可能还会发现，通过在不同的硬件上托管提供程序服务，可以获得更好的性能。


    您的配置选项远不止于此，这将在下一节中解释。


    ## 配置提供程序'
- fmt: 'When you first create a new ASP.NET 2.0 website with Visual Studio 2005, it
    is already preconfigured to work with a set of defaults. These defaults are set
    in the `Machine.config` file, which is a part of the .NET 2.0 installation. Typically
    it is located at `C:\WINDOWS\Microsoft.NET\Framework\v2.0.50727\CONFIG`, or wherever
    .NET 2.0 has been installed onto your computer.


    The defaults for the provider configuration are near the bottom, in the `system.web`
    section, as shown in Listing 1-4.


    **Listing 1-4.** system.web in Machine.config


    ```xml

    <system.web>


    <processModel autoConfig="true"/>


    <httpHandlers />


    <membership>


    <providers>


    <add name="AspNetSqlMembershipProvider"


    type="System.Web.Security.SqlMembershipProvider, System.Web, Version=2.0.0.0,
    Culture=neutral, PublicKeyToken=b03f5f7f11d50a3a"


    connectionStringName="LocalSqlServer"


    enablePasswordRetrieval="false"


    enablePasswordReset="true"


    requiresQuestionAndAnswer="true"


    applicationName="/"


    requiresUniqueEmail="false"


    passwordFormat="Hashed"


    maxInvalidPasswordAttempts="5"


    minRequiredPasswordLength="7"


    minRequiredNonalphanumericCharacters="1"


    passwordAttemptWindow="10"


    passwordStrengthRegularExpression="" />


    </providers>


    </membership>


    <profile>


    <providers>


    <add name="AspNetSqlProfileProvider"


    connectionStringName="LocalSqlServer" applicationName="/"


    type="System.Web.Profile.SqlProfileProvider, System.Web, Version=2.0.0.0, Culture=neutral,
    PublicKeyToken=b03f5f7f11d50a3a" />


    </providers>


    </profile>


    <roleManager>


    <providers>


    <add name="AspNetSqlRoleProvider"


    connectionStringName="LocalSqlServer" applicationName="/"


    type="System.Web.Security.SqlRoleProvider, System.Web, Version=2.0.0.0, Culture=neutral,
    PublicKeyToken=b03f5f7f11d50a3a" />


    <add name="AspNetWindowsTokenRoleProvider" applicationName="/"


    type="System.Web.Security.WindowsTokenRoleProvider, System.Web, Version=2.0.0.0,
    Culture=neutral, PublicKeyToken=b03f5f7f11d50a3a" />


    </providers>


    </roleManager>


    </system.web>

    ```


    A default connection string named `LocalSqlServer` is also defined, which looks
    for a file called `aspnetdb.mdf` in the `App_Data` folder (see Listing 1-5).


    **Listing 1-5.** connectionStrings in Machine.config


    ```xml

    <connectionStrings>


    <add name="LocalSqlServer"


    connectionString="data source=.\SQLEXPRESS;Integrated Security=SSPI;AttachDBFilename=|DataDirectory|aspnetdb.mdf;User
    Instance=true"


    providerName="System.Data.SqlClient"/>


    </connectionStrings>

    ```


    The default `LocalSqlServer` connection is referenced by the Membership, Roles,
    and Profile provider configurations in the `system.web` block. The datasource
    specifies that this database exists in the `DATA_DIRECTORY`. That `DATA_DIRECTORY`
    for an ASP.NET 2.0 website is the `App_Data` folder. If you were to create a new
    website and start using the Membership and Profile services, this SQL Express
    database would be created for you in the `App_Data` folder.


    However, if you have the Standard or Professional Edition of SQL Server installed,
    this process would fail because SQL Express is required. This default configuration
    can be quite handy, but also dangerous if you do not adjust it for the deployed
    environment.


    For each provider configuration, the parent block has multiple attributes for
    the respective provider implementation. And within that block, you have the ability
    to add, remove, or even clear the provider implementations. In your new website’s
    `Web.config` file, you will want to clear the defaults set by `Machine.config`
    and customize them specifically for your needs.


    Next you will configure a new website to use the SQL implementations of the Membership,
    Roles, and Profile providers. Before those are configured, you must prepare the
    datasource.


    Assuming you have a sample website that will work with a database called `Sample`
    and that has been prepared with the provider services as described in the previous
    section, use the configuration in Listing 1-6.


    **Listing 1-6.** Custom Web.config


    ```xml

    <connectionStrings>


    <add name="sampledb"


    connectionString="Data Source=.\SQLEXPRESS;Initial Catalog=Sample; Integrated
    Security=True"


    providerName="System.Data.SqlClient"/>


    </connectionStrings>

    ```


    During the development process, I use a trusted database connection and talk to
    the local machine. Now you are ready to configure the providers with the SQL implementations.
    And because the defaults in `Machine.config` already use the SQL implementations,
    let’s start with them and then make our adjustments.


    ## Membership Configuration


    For starters, you’ll organize the configuration block to make it more readable.
    You will be looking at this quite a bit during development, so making it easy
    to read at a glance will save you time. Place each attribute on a separate line
    and indent the attributes to line them up. Then make the `name`, `applicationName`,
    and `connectionStringName` the first few attributes. These are the critical values.


    Next you want to ensure that this is the only Membership provider for this website.


    Add the `clear` element before the `add` element in the `membership` block to
    tell the ASP.NET runtime to clear all preconfigured settings. Then add an attribute
    called `defaultProvider` to the `membership` element and set it to the same value
    as the `name` for the newly added provider configuration. Listing 1-7 shows the
    Membership configuration. Table 1-1 covers the various settings that are available.


    **Listing 1-7.** Membership Configuration


    ```xml

    <membership defaultProvider="Chapter01SqlMembershipProvider">


    <providers>


    <clear/>


    <add


    name="Chapter01SqlMembershipProvider"


    applicationName="/chapter01"


    connectionStringName="chapter01db"


    enablePasswordRetrieval="true"


    enablePasswordReset="true"


    requiresQuestionAndAnswer="true"


    requiresUniqueEmail="false"


    passwordFormat="Clear"


    maxInvalidPasswordAttempts="5"


    minRequiredPasswordLength="7"


    minRequiredNonalphanumericCharacters="0"


    passwordAttemptWindow="10"


    passwordStrengthRegularExpression=""


    type="System.Web.Security.SqlMembershipProvider, System.Web, Version=2.0.0.0,
    Culture=neutral, PublicKeyToken=b03f5f7f11d50a3a"


    />


    </providers>


    </membership>

    ```


    **Table 1-1.** Membership Configuration Settings


    | **Setting** | **Description** |

    | :--- | :--- |

    | `name` | Specifies the configuration name referenced by the `membership` element.
    |

    | `applicationName` | Defines the application name used as a scope in the Membership
    database. |

    | `connectionStringName` | Specifies the connection string to use for this provider.
    |

    | `enablePasswordRetrieval` | Specifies whether this provider allows for password
    retrieval. |

    | `enablePasswordReset` | Specifies whether this provider can reset the user password
    (enabled = `true`). |

    | `requiresQuestionAndAnswer` | Specifies whether the question and answer are
    required for password reset and retrieval. |

    | `requiresUniqueEmail` | Specifies whether this provider requires a unique e-mail
    address per user. |

    | `passwordFormat` | Specifies the password format, such as `cleared`, `hashed`
    (default), and `encrypted`. |

    | `maxInvalidPasswordAttempts` | Specifies how many failed login attempts are
    allowed before the user account is locked. |

    | `minRequiredPasswordLength` | Specifies the minimal number of characters required
    for the password. |

    | `minRequiredNonalphanumericCharacters` | Specifies the number of special characters
    that must be present for the password. |

    | `passwordAttemptWindow` | The duration in minutes when failed attempts are tracked.
    |

    | `passwordStrengthRegularExpression` | A regular expression used to check a password
    string for the required password strength. |


