  trans: "\n在讨论数据访问层时，常用的术语是 `CRUD`，代表创建（Create）、读取（Read）、更新（Update）和删除（Delete）。数据访问层大部分是样板代码。如果你认为这意味着对于每个表，你只需要创建对应的\
    \ SQL 语句，那么你可以通过扫描数据库并构建执行所有 `CRUD` 任务的类来自动生成此类代码。如果你想添加智能功能，比如关系处理，你可以在代码生成过程中读取外键约束以推断关系，并将面向对象的功能内建到生成的代码中。本章介绍的工具能以一种优雅的方式为我们完成所有这些工作，而不会像类型化数据集那样让人感觉不适。\n\
    \n## 代码生成\n\n代码生成是一个古老的概念。如果你追溯到软件开发的起点，你会看到源文件如何被编译成汇编代码，当时的开发人员认为编译器生成的代码效率远不如手写的汇编指令。但使用编译器的好处在于，它能以显著缩短的开发周期来实现源代码的意图。如今，我们已经超越了这个初始阶段，深入到了代码生成的领域。我们在集成开发环境（IDE）中用选择的语言编写代码，代码被转换为中间语言（IL），最终由即时编译器将其转换为机器码。在过去几十年里，编译过程不断改进，引入了开发者甚至还未意识到但一直在持续受益的优化。我们已经接纳了代码生成，并且正在寻找新的方法来利用它进一步加速我们的开发周期，同时生成比我们自己开发更高效的代码。\n\
    \n当你使用 `ASP.NET` 时，你已经在利用代码生成：每个页面和用户控件都会为各自的后台代码生成一个分部类到内存中。标记页面上放置的每个控件的变量引用都会被放入这个分部类中，而你则在后台代码文件中定义分部类的其余部分。你可能还记得\
    \ `ASP.NET 1.1` 中那个警告你不要直接修改的已生成代码区域。该区域的代码现在被安全地生成到隐藏的分部类中。实现这一点的代码生成归功于随 `ASP.NET\
    \ 2.0` 引入的构建提供程序。\n\n**注意** 如果你构建的不是网站项目，而是 Web 应用程序项目，那么你仍然在使用旧的 `ASP.NET 1.1`\
    \ 模型，代码是直接生成到后台代码文件中的。Web 应用程序项目无法利用构建提供程序，因为它需要仅对网站可用的动态编译器。从技术上讲，Web 应用程序项目是一个类库，无法访问此功能。\n\
    \n## 构建提供程序\n\n构建提供程序是一种代码生成器，它将构建结果放入内存，以便运行时可以访问。Visual Studio 也能够运行构建提供程序，并使生成的代码立即可用，而无需编译项目。构建提供程序为所有常见文件类型（如\
    \ `.aspx`、`.ascx`、`.asmx` 等）进行了预配置。在所有网站都继承的基础 `Web.config` 文件中，你会找到一个名为 `buildProviders`\
    \ 的配置元素，它列出了所有映射的提供程序。特别是，`.aspx` 扩展名被映射到名为 `PageBuildProvider` 的提供程序，而 `.xsd`\
    \ 被映射到 `XsdBuildProvider`，后者创建类型化数据集。\n\n你可以实现自己的构建提供程序，并将其与你选择的扩展名关联。清单 8-1 展示了如何为所有扩展名为\
    \ `.xyz` 的文件映射一个构建提供程序。\n\n### 清单 8-1. 用于 .xyz 文件的构建提供程序\n\n```xml\n<buildProviders>\n\
    \    <add extension=\".xyz\" type=\"Chapter08.BuildProviders.XyzBuildProviders\"\
    \ />\n</buildProviders>\n```\n\n当 `ASP.NET` 编译器遇到扩展名为 `.xyz` 的文件时，它将使用配置的构建提供程序将代码生成到内存中，以便网站中的页面和控件可以使用，同时也提供智能感知支持。图\
    \ 8-1 显示了生成类的智能感知外观。\n\n![Image 32](img/index-239_1.png)\n\n### 图 8-1. 生成类的智能感知\n\
    \n`BuildProvider` 类（位于 `System.Web.Compilation` 命名空间中）包含一个名为 `GenerateCode` 的方法，你必须重写此方法才能将生成的代码注入到网站中。清单\
    \ 8-2 展示了 `GenerateCode` 方法的一个实现。\n\n### 清单 8-2. GenerateCode 方法\n\n```csharp\n\
    public override void GenerateCode(AssemblyBuilder assemblyBuilder)\n{\n    assemblyBuilder.AddCodeCompileUnit(this,\n\
    \        new CodeSnippetCompileUnit(GetGeneratedCode()));\n}\n```\n\n包含 `GenerateCode`\
    \ 方法的示例类名为 `XyzBuildProviders`，它继承自 `BuildProvider` 类。你可能想做的第一个任务是读取源文件的内容。要读取文件，你可以调用返回\
    \ `Stream` 的 `OpenStream`，或者返回 `Reader` 的 `OpenReader`。清单 8-3 向你展示了如何将源文件内容作为字符串获取。\n\
    \n### 清单 8-3. GetContents 方法\n\n```csharp\nprivate string GetContents()\n{\n \
    \   TextReader reader = OpenReader();\n    string contents = reader.ReadToEnd();\n\
    \    reader.Close();\n    return contents;\n}\n```\n\n源文件的内容可以很容易地是 `XML` 或你选择的自定义文件格式，你可以在构建生成代码时解析和使用它。在这个例子中，源文件中只有一行，它将用作类的注释。\n\
    \n你可能还想知道源文件的名称。也许对于每个源文件，你想生成一个单独的类，并且源文件的文件名将被重用为生成类的名称。在这种情况下，你可以使用从基类 `BuildProvider`\
    \ 继承的 `VirtualPath` 属性。对于网站，源文件必须位于 `App_Code` 文件夹中，因此一个典型的值类似于 `/AppCode/SomeFile.xyz`。清单\
    \ 8-4 展示了如何从该值中提取类名。\n\n### 清单 8-4. GetClassName 方法\n\n```csharp\nprivate string\
    \ GetClassName()\n{\n    int startIndex = VirtualPath.LastIndexOf(\"/\") + 1;\n\
    \    int length = VirtualPath.IndexOf(\".\") - startIndex;\n    string className\
    \ = VirtualPath.Substring(startIndex, length);\n    return className;\n}\n```\n\
    \n你也可以让类名具有一定含义，但在这里，我们将假设无论目录结构如何，都使用相同的命名空间。最后，清单 8-2 中调用的 `GetGeneratedCode`\
    \ 方法如清单 8-5 所示。\n\n### 清单 8-5. GetGeneratedCode 方法\n\n```csharp\npublic string\
    \ GetGeneratedCode()\n{\n    string className = GetClassName();\n    string contents\
    \ = GetContents();\n    StringBuilder code = new StringBuilder();\n    code.AppendLine(\"\
    namespace Chapter08.Website {\");\n    code.AppendLine(\"/// <summary>\");\n \
    \   code.AppendLine(\"/// \" + contents);\n    code.AppendLine(\"/// </summary>\"\
    );\n    code.AppendLine(\"public partial class \" + className + \" {\");\n   \
    \ code.AppendLine(\"/// <summary>\");\n    code.AppendLine(\"/// Returns \" +\
    \ VirtualPath);\n    code.AppendLine(\"/// </summary>\");\n    code.AppendLine(\"\
    public static string GetVirtualPath() {\");\n    code.AppendLine(\"return \\\"\
    \" + VirtualPath + \"\\\";\");\n    code.AppendLine(\"}\\n}\\n}\");\n    return\
    \ code.ToString();\n}\n```\n"
- fmt: "# Generated Data Access Layer\n\nThe code generated in Listing 8-5 is simply\
    \ a string returned to the caller that is used to create a new `CodeSnippetCompileUnit`\
    \ class. For the moment, all you need to know is that this class reads in the\
    \ string value for the code and passes it into the `AssemblyBuilder` class, which\
    \ generates the code into memory.\n\n**Note:** A new dynamic language runtime\
    \ (DLR) is currently under development for the .NET platform. It will support\
    \ languages such as IronPython and IronRuby, which you can then use as your language\
    \ of choice beyond C# and VB in a production environment. Many developers think\
    \ this is great news because they feel these languages can do a great deal more\
    \ with less code. It is an area worth some attention over the next few years as\
    \ these technologies mature and become a core part of the .NET platform.\n\n##\
    \ CodeDom Namespace\n\nGenerating code for the .NET platform is conveniently supported\
    \ by the `CodeDom` namespace, specifically `System.CodeDom`. The namespace represents\
    \ code as a document object model that can be manipulated just as easily as XML.\
    \ You can create new classes and add fields, properties, and methods to them in\
    \ a language-neutral way and then generate them out to supported languages such\
    \ as C# and VB.\n\nIn Listing 8-5, the code was assembled as a string. You can\
    \ do the very same work with `CodeDom`, which will give you more structure. By\
    \ assembling the code as a string within quotes across multiple lines, you have\
    \ to be careful to end each statement with a semicolon and close each block. When\
    \ the code is assembled programmatically with `CodeDom`, these concerns go away.\n\
    \nStarting with a new custom build provider named `AbcBuildProvider`, you will\
    \ define an XML file format with files using an `.abc` extension. The compilation\
    \ section of the `Web.config` file now includes the additional build provider,\
    \ shown in Listing 8-6.\n\n### Listing 8-6. Adding Build Provider for .abc Files\n\
    \n```xml\n<compilation debug=\"true\">\n  <buildProviders>\n    <add extension=\"\
    .abc\" type=\"Chapter08.BuildProviders.AbcBuildProvider\"/>\n    <add extension=\"\
    .xyz\" type=\"Chapter08.BuildProviders.XyzBuildProvider\"/>\n  </buildProviders>\n\
    </compilation>\n```\n\nThe new file format will define a custom data class that\
    \ the build provider will generate using a list of fields defined in each source\
    \ file. Listing 8-7 shows a sample file.\n\n### Listing 8-7. Person.abc\n\n```xml\n\
    <?xml version=\"1.0\"?>\n<dataClass>\n  <fields>\n    <add name=\"FirstName\"\
    \ type=\"System.String\"/>\n    <add name=\"LastName\" type=\"System.String\"\
    />\n    <add name=\"BirthDate\" type=\"System.DateTime\"/>\n    <add name=\"Location\"\
    \ type=\"System.String\"/>\n  </fields>\n</dataClass>\n```\n\nAs with the `XyzBuildProvider`,\
    \ this new build provider will use the name of the source of the generated class.\
    \ The sample file, `Person.abc`, will create a class named `Person` with a set\
    \ of fields and properties that are defined by the file. When the build provider\
    \ and website are compiled, the `Person` class should be available to the website.\n\
    \nStarting with the `GetGeneratedCode` method, which was also created for the\
    \ previous build provider, you will adjust it to return a `CodeCompileUnit` instead\
    \ of a string, have it parse the source file as an XML stream, and process each\
    \ of the fields defined within the `fields` element. Listing 8-8 shows the new\
    \ method.\n\n### Listing 8-8. GetGeneratedCode for AbcBuildProvider\n\n```csharp\n\
    private CodeCompileUnit GetGeneratedCode()\n{\n    CodeCompileUnit code = new\
    \ CodeCompileUnit();\n    CodeNamespace ns = new CodeNamespace(GetNamespace());\n\
    \    CodeNamespaceImport import = new CodeNamespaceImport(\"System\");\n    ns.Imports.Add(import);\n\
    \    code.Namespaces.Add(ns);\n\n    string className = GetClassName();\n    CodeTypeDeclaration\
    \ generatedClass =\n        new CodeTypeDeclaration(className);\n    generatedClass.IsPartial\
    \ = true;\n    ns.Types.Add(generatedClass);\n\n    XmlDocument document = new\
    \ XmlDocument();\n    using (Stream stream = OpenStream())\n    {\n        document.Load(stream);\n\
    \        XmlNode rootNode = document.SelectSingleNode(RootPath);\n        if (rootNode\
    \ != null)\n        {\n            ProcessFieldNodes(generatedClass, rootNode);\n\
    \        }\n    }\n    return code;\n}\n```\n\nThere are several new types referenced\
    \ in the new `GetGeneratedCode` method. Types like `CodeNamespace`, `CodeNamespaceImport`,\
    \ and `CodeTypeDeclaration` are all pieces of a `CodeCompileUnit`, which is used\
    \ to create the generated class. The `CodeNamespace` type is the namespace that\
    \ wraps the generated class. A single `CodeNamespaceImport` for `System` is added\
    \ to the namespace. You would add others as needed just as you would to a source\
    \ file you are editing in Visual Studio. Finally, the `CodeTypeDeclaration` is\
    \ used for an instance of `generatedClass`, which will hold the fields that are\
    \ defined in the `ProcessFieldNodes` method shown in Listing 8-9.\n\n### Listing\
    \ 8-9. ProcessFieldNodes\n\n```csharp\nprivate void ProcessFieldNodes(\n    CodeTypeDeclaration\
    \ generatedClass, XmlNode rootNode)\n{\n    XmlNodeList fieldNodes = rootNode.SelectNodes(FieldsAddPath);\n\
    \    foreach (XmlNode addFieldNode in fieldNodes)\n    {\n        XmlNode nameNode\
    \ = addFieldNode.SelectSingleNode(\"@name\");\n        XmlNode typeNode = addFieldNode.SelectSingleNode(\"\
    @type\");\n        string propertyName = nameNode.Value;\n        string fieldName\
    \ = GetFieldName(propertyName);\n        Type fieldType = Type.GetType(typeNode.Value);\n\
    \n        // private field\n        CodeMemberField field = new CodeMemberField(fieldType,\
    \ fieldName);\n        generatedClass.Members.Add(field);\n\n        AttachProperty(generatedClass,\
    \ propertyName, fieldName, fieldType);\n    }\n}\n```\n\nThe `ProcessFieldNodes`\
    \ method starts by looping over all of the field nodes under the root node from\
    \ the XML source file. The two nodes you want to access are the attributes in\
    \ the `add` element named `name` and `type`. These references are done with XPath\
    \ references such as `@name` and `@type`. At the top of the `AbcBuildProvider`\
    \ are two constants defined to assist with traversing this XML document. These\
    \ XPath constants are shown in Listing 8-10.\n\n### Listing 8-10. XPath Constants\n\
    \n```csharp\npublic const string RootPath = \"/dataClass\";\npublic const string\
    \ FieldsAddPath = \"fields/add\";\n```\n\nThe first XPath constant, `RootPath`,\
    \ accesses the first XML node, which then allows the second XPath constant, `FieldsAddPath`,\
    \ to access all the `add` elements that hold onto the attributes we want to use.\
    \ In Listing 8-9, these two nodes are read and later used to set the values for\
    \ the `propertyName`, `fieldName`, and `fieldType` variables. Then a new `CodeMemberField`\
    \ instance is created and added to the list of `Members` for the `generatedClass`.\
    \ These are all private member variables that are accessed via properties defined\
    \ by the `AttachedProperty` method shown in Listing 8-11.\n\n### Listing 8-11.\
    \ AttachProperty\n\n```csharp\nprivate static void AttachProperty(\n    CodeTypeDeclaration\
    \ generatedClass,\n    string propertyName,\n    string fieldName,\n    Type fieldType)\n\
    {\n    // public property\n    CodeMemberProperty prop = new CodeMemberProperty();\n\
    \    prop.Name = propertyName;\n    prop.Type = new CodeTypeReference(fieldType);\n\
    \    prop.Attributes = MemberAttributes.Public;\n\n    CodeFieldReferenceExpression\
    \ fieldRef;\n    fieldRef = new CodeFieldReferenceExpression();\n    fieldRef.TargetObject\
    \ = new CodeThisReferenceExpression();\n    fieldRef.FieldName = fieldName;\n\n\
    \    // property getter\n    CodeMethodReturnStatement ret;\n    ret = new CodeMethodReturnStatement(fieldRef);\n\
    \    prop.GetStatements.Add(ret);\n\n    // property setter\n    CodeAssignStatement\
    \ assign = new CodeAssignStatement();\n    assign.Left = fieldRef;\n    assign.Right\
    \ = new CodePropertySetValueReferenceExpression();\n    prop.SetStatements.Add(assign);\n\
    \n    generatedClass.Members.Add(prop);\n}\n```"
