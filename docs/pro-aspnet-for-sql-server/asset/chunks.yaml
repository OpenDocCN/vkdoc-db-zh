    \          <Function>\n          </Function>\n        </Literal>\n      </Declarations>\n\
    \      <Code Language=\"CSharp\" Kind=\"method decl\">\n        <![CDATA[\npublic\
    \ IDataReader $methodName$()\n{\n    IDataReader dr = null;\n    using (DbCommand\
    \ dbCmd = db.GetStoredProcCommand(\"$sproc$\"))\n    {\n        //db.AddInParameter(dbCmd,\
    \ \"@Parameter\", DbType.String, String.Empty);\n        dr = db.ExecuteReader(dbCmd);\n\
    \    }\n    //return the results\n    return dr;\n}\n]]>\n      </Code>\n    </Snippet>\n\
    \  </CodeSnippet>\n</CodeSnippets>\n```\n\nThe `DataReader` snippet does exactly\
    \ the same work as the `DataSet` snippet, except that the `DataReader` snippet\
