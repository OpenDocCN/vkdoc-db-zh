    Admin\"/>\n                <deny users=\"*\"/>\n            </authorization>\n\
    \        </system.web>\n    </location>\n</configuration>\n```\n\n## 创建管理员用户\n\
    \n管理区域准备好后，你自然需要管理员用户，以便登录此区域并使用控件。这有点像是第 22 条军规的场景。但正如你可以使用`成员资格` API 来管理用户和角色一样，使用这些控件你也可以以编程方式创建用户和角色。为了自动确保你的网站拥有必要的管理员用户，你可以将完成所有这些工作的代码添加到网站`Global.asax`文件中的`Application_Start`事件处理程序中。我首先检查三个默认角色是否存在，并添加每一个不存在的角色。然后，如果没有用户，我让方法添加默认的管理员用户，如清单\
    \ 1-19 所示。\n\n**清单 1-19.** 添加角色和用户\n\n```csharp\npublic void Application_Start(object\
    \ sender, EventArgs e)\n{\n    if (Roles.Enabled)\n    {\n        String[] requiredRoles\
    \ = { \"Admin\", \"Users\", \"Editors\" };\n        foreach (String role in requiredRoles)\n\
    \        {\n            if (!Roles.RoleExists(role))\n            {\n        \
    \        Roles.CreateRole(role);\n            }\n        }\n\n        string[]\
    \ users = Roles.GetUsersInRole(\"Admin\");\n        if (users.Length == 0)\n \
    \       {\n            // 创建管理员用户\n            MembershipCreateStatus status;\n\
    \            Membership.CreateUser(\"admin\", \"CHANGE_ME\", \"admin@localhost\"\
    ,\n                \"Favorite color?\", \"green\", true, out status);\n      \
    \      if (MembershipCreateStatus.Success.Equals(status))\n            {\n   \
    \             Roles.AddUserToRole(\"admin\", \"Admin\");\n            }\n    \
    \        else\n            {\n                LogMessage(\"无法创建管理员用户: \" + status,\
    \ true);\n            }\n        }\n    }\n}\n```\n\n## 总结\n\n本章介绍了如何为处理 ASP.NET\
    \ 网站准备环境，以及如何配置数据库连接。你学习了如何配置和管理提供程序服务，包括以编程方式添加用户和角色，以便新网站在部署后可以立即被管理。\n\n# 第\
    \ 2 章 数据模型选择\n\nASP.NET 2.0 数据模型允许使用多种方法将数据从数据库获取到 Web 窗体。三种主要方法是`数据集`、`数据读取器`和`数据对象`。本章将回顾这些选项以及企业库的一部分——数据访问应用程序块。\n\
    \n本章涵盖以下内容：\n\n- 数据访问应用程序块\n- 数据访问代码片段\n- 示例人员数据库\n- 性能和`ViewState`考虑\n- 类型化`数据集`\n\
    - 非类型化`数据集`\n- `数据读取器`\n- 子集和范围排序\n\n在.NET 中处理数据并非只有一种方法。有许多不同且有时相互交织的方法，这给你带来了看似压倒性的选择。虽然你可能仅使用可用功能的有限子集就能应付，但你会发现，随着你对选项了解的加深，你可以提出更简化的方法，减少完成工作所需的工作量。这很快就会转化为更高的生产力和更少的维护代码。\n\
    \n尽管记录在 Microsoft 开发者网络（MSDN）上的巧妙示例提供了一些惊人的解决方案，但它们实际上是简单的示例。本章将通过向工作流程中引入一个挑战并展示如何克服它，来深入探讨超越简单示例的内容。\n\
    \n## 数据访问应用程序块\n\nMicrosoft 模式与实践小组提供了一组称为应用程序块的模块，为开发人员提供额外的工具来与.NET 框架一起工作。其中一个模块是数据访问应用程序块，它提供了一组方法，整合了你通常需要做的与数据库交互的工作。这种抽象层简化了原本可能很繁琐的任务。\n\
