    **196**


    C H A P T E R 7 ■ M A N U A L D ATA A C C E S S L AY E R


    **Inline SQL**


    One temptation to avoid is writing your SQL right into your code. Although it
    is true that the code you create to communicate with the database will be tightly
    bound to the queries and other database commands, that is not the most efficient
    way to create or maintain the software.


    Maintenance Considerations


    One problem with placing SQL right into your code is the resulting extra maintenance
    work when those queries change. You end up making more work for yourself and increasing
    the opportunity for error. For example, your most basic query may start out looking
    like Listing 7-1.


    **Listing 7-1.** *Simple Inline Query*


    String sql = "SELECT * FROM Production.Product WHERE ProductID = 1"


    You can see that it starts out all right with a readable query, but as the query
    gets longer, it starts to look more like Listing 7-2.


    **Listing 7-2.** *More Complex Inline Query*


    String sql = "SELECT " +


    "p.ProductID, p.[Name], p.ProductNumber," +


    "p.Color, p.ListPrice, " +


    "p.SellStartDate, p.SellEndDate, " +


    "p.DiscontinuedDate " +


    "FROM Production.Product AS p " +


    "JOIN Production.ProductProductPhoto AS ppp " +


    "ON ppp.ProductID = p.ProductID " +


    "WHERE ppp.ProductPhotoID != 1";


    The query in Listing 7-2 is an obvious maintenance nightmare. As you make minor
    changes, you will do it inline and do your best to make sure you have the query
    wrapped carefully inside the quotes for the String. But there is so much that
    you give up.


    If the query in Listing 7-2 was maintained as a stand-alone SQL script, you could
    use tools such as SQL Server Management Studio or Visual Studio with Database
    Projects to provide syntax coloring along with several other rich features. Third-party
    tools are also available to offer real-time IntelliSense support and give you
    access to listings of column and table names as you work with your SQL. An inline
    query cannot leverage all of that support.


    Security Considerations'
