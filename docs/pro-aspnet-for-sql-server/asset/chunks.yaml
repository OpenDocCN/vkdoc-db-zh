    C H A P T E R 4 ■ D ATA B O U N D C O N T R O L S


    When you dig into the code for this control, you will start to see all of the
    facilities that are available to a control through the use of abstract classes.
    Just a few years ago, creating controls was quite difficult. In ASP.NET 2.0, it
    became much easier with the CompositeControl and CompositeDataBoundControl, which
    are base classes that the standard ASP.NET controls are built on. You can also
    use these base classes, which automatically provide you with rich Design Time
    support as well as extensive runtime functionality.


    Both of these base classes include a method called CreateChildControls, which
    takes no parameters and does not return anything. The control hierarchy is created
    in this method, which is called automatically as a part of the event life cycle.
    In the CompositeControl you could override the behavior of this method, but in
    the CompositeDataBoundControl this method has already been implemented. Instead,
    there is an abstract method by the same name that takes a couple of parameters
    and has a result type. Because it is an abstract method, it must be implemented
    in the inheriting class. The example method signature is shown in Listing 4-21.


    **Listing 4-21.** *CreateChildControls for CompositeDataBoundControl* protected
    override int CreateChildControls(IEnumerable dataSource, bool dataBinding)


    {


    // code


    }


    The CreateChildControls method is the core of the databound control. The overall
    control is created by initializing controls and adding them to the Controls collection.
    The Controls property is the accessor for this collection. When the dataBinding
    parameter is true, the dataSource value should be holding onto data that can be
    enumerated over while creating a collection of controls that are added to the
    Controls collection.


    This may make you wonder why the dataBinding parameter would ever be false. You
    may also wonder why it returns an integer. When a postback occurs, the ViewState
    must be applied to the control hierarchy constructed when the control was first
    created. This means there must be the same number of rows, but because you are
    not going to have access to the actual data at this time, you have to create the
    skeleton of the previous hierarchy that will match the data in ViewState. There
    must be the same number of items in the Controls collection as there were before
    in order for the ViewState to be applied successfully.'
  trans: "\n这个名为 `PersonListingControl` 的新控件将接收与人员和位置相关的多个字段，并以两种格式之一进行显示。它还将提供可选的**分页支持**，该功能与数据源协调工作，通过控件上的\
    \ `DataSourceID` 属性进行声明式定义。无论是否启用 `ViewState`，它都能正常工作。\n\n此控件将通过诸如 `GridView`\
    \ 等功能丰富的控件来实现大量功能。\n\n## 为何要创建自定义数据绑定控件？\n\n此数据绑定控件的目的纯粹是作为一种学习工具。你很难想到许多无法使用现有数据绑定控件（从\
    \ `GridView` 到 `Repeater`）来满足需求的场景。使用这些控件无法做到的是，通过调试器逐步执行它们，以查看内部究竟发生了什么，以及进行各种测试实验，看看如何改进流程。因为此数据绑定控件同样继承自\
    \ `CompositeDataBoundControl`，它的行为将类似于标准的数据绑定控件。\n\n然而，你可以将此示例作为基础，创建一个实用的解决方案，使其紧密贴合你的应用程序进行定制，从而利用所有可用的优势。仅仅将用户控件转换为服务器控件，你可能看不到显著的性能提升。借助此示例入门，你或许能够比较两者并衡量其差异。\n\
    \n8601Ch04CMP3 8/25/07 1:07 PM Page 92\n\n92\n\n# 第四章 ■ 数据绑定控件\n\n当你深入研究此控件的代码时，将开始看到通过使用抽象类，控件所能利用的所有功能。就在几年前，创建控件还相当困难。在\
    \ ASP.NET 2.0 中，随着 `CompositeControl` 和 `CompositeDataBoundControl` 的出现，这变得容易多了，标准\
    \ ASP.NET 控件正是构建于这些基类之上。你也可以使用这些基类，它们自动为你提供丰富的**设计时支持**以及广泛的运行时功能。\n\n这两个基类都包含一个名为\
    \ `CreateChildControls` 的方法，该方法不接受任何参数且不返回任何内容。控件层次结构在此方法中创建，它是事件生命周期的一部分被自动调用。在\
    \ `CompositeControl` 中，你可以覆盖此方法的行为，但在 `CompositeDataBoundControl` 中，此方法已经实现。取而代之的是一个同名的抽象方法，它接受几个参数并具有一个结果类型。因为它是抽象方法，所以必须在派生类中实现。该方法的签名示例如清单\
    \ 4-21 所示。\n\n### 清单 4-21. `CompositeDataBoundControl` 的 `CreateChildControls`\n\
    ```\nprotected override int CreateChildControls(IEnumerable dataSource, bool dataBinding)\n\
    {\n    // 代码\n}\n```\n\n`CreateChildControls` 方法是数据绑定控件的核心。整个控件通过初始化控件并将其添加到 `Controls`\
    \ 集合中来创建。`Controls` 属性是此集合的访问器。当 `dataBinding` 参数为 true 时，`dataSource` 值应持有可在创建控件集合时进行枚举的数据，这些控件将被添加到\
    \ `Controls` 集合。\n\n这可能会让你疑惑为何 `dataBinding` 参数有时会为 false。你可能还会问为什么它返回一个整数。当发生回发时，必须将\
    \ `ViewState` 应用于控件首次创建时构建的控件层次结构。这意味着必须具有相同的行数，但因为此时你无法访问实际数据，所以必须创建与 `ViewState`\
    \ 中数据相匹配的先前层次结构的骨架。`Controls` 集合中的项数必须与之前的项数相同，`ViewState` 才能成功应用。\n"
- fmt: "For the `PersonListingControl`, these items are instances of the `PersonRow`\
    \ control. This is equivalent to a `GridViewRow`. Each item pulled from the `IEnumerable`\
    \ value is passed to the `PersonRow` through the constructor and added to the\
    \ `Controls` collection. The `PersonRow` is then responsible for drawing that\
    \ individual row.\n\nThere are a few additional classes that provide Design Time\
    \ support that you will find in the downloadable sample code. The class library\
    \ with these classes looks like Figure 4-3.\n\n![Image 15](index-100_1.png)\n\n\
    # CHAPTER 4: DATA BOUND CONTROLS\n\nYou will skip the `PersonRow` for the moment\
    \ and look at the implementation of the `CreateChildControls` method. When the\
    \ control is created for the initial page request, it will call `CreateChildControls`\
    \ with the Boolean value set to `true` with a defined value for the data. You\
    \ can iterate over that data, create the `PersonRow` instances, and add them to\
    \ the `Controls` collection.\n\nDuring a postback, before `ViewState` is applied,\
    \ the `CreateChildControls` method must be called with the Boolean value set to\
    \ `false` for the `dataBinding` parameter and a `null` value for the `dataSource`\
    \ parameter. And somehow the number of items created in the previous control rendering\
    \ must be known at this point so the correct number of items are re-created.\n\
    \nListing 4-22 shows the full implementation.\n\n**Listing 4-22.** `CreateChildControls`\
    \ Implementation\n```csharp\nprotected override int CreateChildControls(\n   \
    \ IEnumerable dataSource, bool dataBinding)\n{\n    Controls.Clear();\n    int\
    \ count = 0;\n\n    if (dataBinding && dataSource != null)\n    {\n        IEnumerator\
    \ e = dataSource.GetEnumerator();\n        while (e.MoveNext())\n        {\n \
    \           object datarow = e.Current;\n            PersonRow row = new PersonRow(count,\
    \ datarow);\n            Rows.Add(row);\n            Controls.Add(row);\n    \
    \        count++;\n        }\n        _itemCount = count;\n    }\n    else\n \
    \   {\n        if (_itemCount > 0)\n        {\n            for (count = 0; count\
    \ < _itemCount; count++)\n            {\n                PersonRow row = new PersonRow(count,\
    \ null);\n                Rows.Add(row);\n                Controls.Add(row);\n\
    \            }\n        }\n    }\n\n    CreatePagerControls();\n    AttachStyle();\n\
    \    ClearChildViewState();\n    ChildControlsCreated = true;\n    return count;\n\
    }\n```\n\nWhen there is data available, the first section of code moves over the\
    \ enumerator, creates instances of `PersonRow`, and adds them to the `Rows` and\
    \ `Controls` collections and increments the `count`. When there is no data, the\
    \ member variable `_itemCount` is used to ensure the correct number of empty items\
    \ is added to the `Controls` collection. As you can see, a `null` value is given\
    \ to the `PersonRow` constructor. Finally, at the very end the `count` variable\
    \ that was incremented on both execution branches is used as the return value.\n\
    \n## Getting the Data\n\nIn order to get the data that is passed into `CreateChildControls`,\
    \ a databound control will fire the `PerformSelect` method. The implementation\
    \ details of the `CompositeDataBoundControl` take care of calling this method\
    \ when it is needed so you do not have to call it explicitly with your own code.\
    \ This is the method that raises the `OnDataBinding` and `OnDataBound` events\
    \ before and after the data is requested.\n\nThe data is represented as a `DataSourceView`,\
    \ which could be a datasource that was manually bound to the control or defined\
    \ by the `DataSourceID` property. In any case, you can get an instance of it with\
    \ the built-in `GetData` method, as shown in Listing 4-23.\n\n**Listing 4-23.**\
    \ `GetData` Method\n```csharp\nDataSourceView dataSourceView = GetData();\n```\n\
    \nThis view has a method called `Select` that takes two parameters, `DataSourceSelectArguments`\
    \ and `DataSourceViewSelectCallback`, which are used to give the view additional\
    \ details that will be used when retrieving the data. In the case of an `ObjectDataSource`\
    \ configured with a `DataObject` and `DataObjectMethod` with paging enabled, the\
    \ `StartRowIndex` and `MaximumRows` must be defined.\n\nThese values are passed\
    \ as parameters to the `DataObjectMethod`. This is shown in Listing 4-24."
