    \ 任务使用。成功运行此 MSBuild 脚本的结果如图 9-6 所示。\n\n**图 9-6.** 成功运行 `db.proj`\n\n## 使用嵌入式脚本\n\
    \n数据库更新可以直接集成到您的应用程序中，方法是将脚本与其余数据访问层一起嵌入到程序集中。最初使用应用程序时，可以初始化数据库，应用程序的未来版本可以使用嵌入的脚本更新现有的数据库架构。这一切都将是自动且透明的。\n\
    \n升级网站可能就像复制新程序集一样简单，这会自动重启工作进程。数据库更新将自动应用。\n\n此类功能不是 ASP.NET 的自动特性，但可以使用应用程序中可用的构建块来实现。对于以下示例，您将创建一个表来保存名称。初始化脚本将创建一个用于跟踪数据库架构的架构版本表。然后将有一系列更新脚本。每个版本都可以添加额外的更新脚本。\n\
    \n### 初始化数据库\n\n首先，像在数据库项目中通常做的那样创建架构版本表。此表包含一个名称和一个整数作为版本。每个更新成功执行后，版本将设置为下一个版本。清单\
    \ 9-21 显示了架构版本表的创建脚本。\n\n**清单 9-21.** `chpt09_SchemaVersions.sql`\n```sql\nIF\
    \ EXISTS (\n  SELECT * FROM sysobjects WHERE type = 'U' AND name = 'chpt09_SchemaVersions')\
    \ BEGIN\n  DROP Table chpt09_SchemaVersions\nEND\nGO\nCREATE TABLE [dbo].[chpt09_SchemaVersions](\n\
    \  [Name] [nvarchar](20) COLLATE SQL_Latin1_General_CP1_CI_AS NOT NULL,\n  [Version]\
    \ [smallint] NOT NULL,\n  CONSTRAINT [PK_chpt09_SchemaVersions] PRIMARY KEY CLUSTERED\
    \ ([Name] ASC)WITH (PAD_INDEX = OFF, IGNORE_DUP_KEY = OFF) ON [PRIMARY]\n) ON\
    \ [PRIMARY]\nGO\n```\n\n`Name` 列是主键。对于嵌入式脚本，将只有一个名为 `names` 的架构。此结构可以支持任意数量的其他架构，这些架构都可以独立进行版本控制。将数据库中保存的所有数据分解为不同的命名架构将有助于隔离更新，从而简化更新脚本。\n\
    \n该架构表使用两个存储过程来获取和设置架构版本。清单 9-22 显示了设置命名架构版本的脚本。\n\n**清单 9-22.** `chpt09_SetSchemaVersion.sql`\n\
    ```sql\nIF EXISTS (\n  SELECT * FROM sysobjects WHERE type = 'P' AND name = 'chpt09_SetSchemaVersion')\
