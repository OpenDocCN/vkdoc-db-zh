  raw: 'The .NET framework does not provide the facilities to process these template
    files except as a part of the ASP.NET runtime. To make these templates work for
    code generation in SubSonic, a parser and code processor was created for the project.
    It reads template files embedded within the assembly, and parses, processes, and
    generates the output code, which is then saved out to source files. All of the
    code to create working code from the templates is included with the source code
    download so that you can adjust it to your needs. You can also specify an alternative
    location for your own templates if you do not want to use the embedded templates.
    The /templateDirectory parameter is used to override the standard templating.
    To process the templates with values from the “outside world,” some placeholders
    are replaced while parsing and processing the templates. In Figure 8-3, you can
    see the providerName and tableName variables are set to #PROVIDER# and #TABLE#,
    which are placeholders that are replaced in the early steps of template processing.
    These variables are used throughout the rest of the template when the code is
    generated.


    The advantages of emulating the .aspx template processing is that it supports
    not only placeholder replacement, but also loops. Listing 8-15 shows a loop within
    the class template that is used to generate all of the properties matching the
    columns from the database table.


    **Listing 8-15.** *Loop in Template for Table Properties*


    <%


    foreach(TableSchema.TableColumn col in cols){


    string propName = col.PropertyName;


    string varType = Utility.GetVariableType(col.DataType, col.IsNullable, lang);


    %>


    [XmlAttribute("<%=propName%>")]


    public <%=varType%> <%=propName%>


    {


    get { return GetColumnValue[<]<%= varType%>[>]("<%= col.ColumnName %>"); }


    set


    {


    MarkDirty();


    SetColumnValue("<%=col.ColumnName %>", value);


    }


    }


    <%


    }


    %>


    The properties generated for each table class will conform to the template in
    Listing 8-15, which includes calling the MarkDirty method. That simple call is
    something that could be a tedious detail if all of the code were written manually.
    Here, calling MarkDirty is automatic so that it is reliably called each time the
    value on a property is changed. This example is from the standard template, but
    you could change it to check whether the new value is different from the current
    value and only call MarkDirty as appropriate. If you wanted to do so now, you
    could copy the standard templates to your own templates directory and adjust this
    template to look like Listing 8-16.


    8601Ch08CMP2 8/24/07 3:57 PM Page 245


    C H A P T E R 8 ■ G E N E R AT E D D ATA A C C E S S L AY E R


    **245**


    **Listing 8-16.** *Adjusted Template for Table Properties*


    <%


    foreach(TableSchema.TableColumn col in cols){


    string propName = col.PropertyName;


    string varType = Utility.GetVariableType(col.DataType, col.IsNullable, lang);


    %>


    [XmlAttribute("<%=propName%>")]


    public <%=varType%> <%=propName%>


    {


    get { return GetColumnValue[<]<%= varType%>[>]("<%= col.ColumnName %>"); }


    set


    {


    if (!GetColumnValue[<]<%= varType%>[>]("<%= col.ColumnName %>") ➥


    .Equals(value)) {


    MarkDirty();


    SetColumnValue("<%=col.ColumnName %>", value);


    }


    }


    }


    <%


    }


    %>


    Now the class will only be marked dirty when a property value changes. Because
    anything in the template can be changed, you could make many more changes. The
    code generated from SubSonic also leverages partial classes, which are commonly
    used for ASP.NET page code-behind files.


    ■**Note** SubSonic works well to generate code that is very consistent so that
    the MarkDirty method is always called when a property value is changed. Similarly,
    you can use the Spring Framework to do what is called *dependency injection* to
    add similar behavior to your methods and properties without generating the code
    or even recompiling your existing code. (See http://www.springframework.net.)
    **Partial Classes**'
