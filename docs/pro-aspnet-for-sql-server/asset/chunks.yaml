    C H A P T E R 2


    Data Model Choices


    **T**he ASP.NET 2.0 data model allows for many methods to get the data from the
    database to the Web Form. The three top methods are DataSets, DataReaders, and
    DataObjects. This chapter reviews each of these options as well as the Data Access
    Application Block, which is a part of the Enterprise Library.


    This chapter covers the following:


    • Data Access Application Block


    • Data Access code snippets


    • Sample Person database


    • Performance and ViewState considerations


    • Typed DataSet


    • Nontyped DataSet


    • DataReader


    • Subsets and sorting with ranges


    There is not just one way to work with data in .NET. There are many distinct and
    sometimes intermingling ways, which give you a seemingly overwhelming set of choices.
    Although you may get by using a limited set of the available features, you will
    find that as your knowledge of your options deepens, you can come up with more-streamlined
    approaches that reduce the amount of work you need to do to get the job done.
    That translates quickly into higher productivity and less code to maintain.


    And although the clever examples documented on the Microsoft Developer Network
    (MSDN) offer some amazing solutions, they really are simple examples. This chapter
    digs beyond the simplistic by throwing a wrench into the works and showing you
    how to get past it.


    **The Data Access Application Block**


    The Microsoft Patterns & Practices group provides a set of modules called Application
    Blocks, which give developers additional tools to work with the .NET framework.
    One of the modules is the Data Access Application Block, which provides a set
    of methods that consolidate the work you would normally have to do in order to
    work with the database. This layer of abstraction simplifies what can otherwise
    be a cumbersome task.


