- fmt: "# Data Bound Controls\n\nBy far the most commonly used databound control is\
    \ the `GridView` control. It is a very powerful control that can show your data\
    \ and provide add, update, and delete functionality you would expect from a rich\
    \ data control. Beyond this one control, there are several other databound controls\
    \ that provide the same display and editing features as `GridView` but do it in\
    \ a different way. Let’s look at those other controls first.\n\n## DetailsView\n\
    \nThe `DetailsView` control shows a single record at a time. Like the `GridView`\
    \ control, it features add, update, and delete functionality. It also has paging\
    \ functionality. In contrast, the `GridView` shows the data in a tabular format\
    \ so you can view multiple records at a time. The `DetailsView` is useful when\
    \ there are more fields than you would reasonably want to show in a tabular view.\n\
    \nThis makes it better suited for editing.\n\nLet’s use the `DetailsView` control\
    \ with the person and location data from the previous chapter. The first example\
    \ is in Listing 4-1.\n\n**73**\n\n8601Ch04CMP3 8/25/07 1:07 PM Page 74\n\n**74**\n\
    \nC H A P T E R 4 ■ D A T A B O U N D C O N T R O L S\n\n**Listing 4-1.** `DetailsView`\
    \ Example\n\n```xml\n<asp:DetailsView ID=\"DetailsView1\" runat=\"server\"\n \
    \   DataSourceID=\"ObjectDataSource1\" AllowPaging=\"True\"\n    AutoGenerateRows=\"\
    False\" DataKeyNames=\"PersonId\">\n    <Fields>\n        <asp:BoundField DataField=\"\
    FirstName\"\n            HeaderText=\"First Name\" SortExpression=\"FirstName\"\
    \ />\n        <asp:BoundField DataField=\"LastName\"\n            HeaderText=\"\
    Last Name\" SortExpression=\"LastName\" />\n        <asp:BoundField DataField=\"\
    BirthDate\"\n            HeaderText=\"Birth Date\" SortExpression=\"BirthDate\"\
    \n            DataFormatString=\"{0:MM/dd/yyyy}\" HtmlEncode=\"False\" />\n  \
    \      <asp:BoundField DataField=\"City\"\n            HeaderText=\"City\" SortExpression=\"\
    City\" />\n        <asp:BoundField DataField=\"Country\"\n            HeaderText=\"\
    Country\" SortExpression=\"Country\" />\n        <asp:CommandField ShowDeleteButton=\"\
    True\"\n            ShowEditButton=\"True\" ShowInsertButton=\"True\" />\n   \
    \ </Fields>\n</asp:DetailsView>\n```\n\nThe columns selected here include First\
    \ Name, Last Name, Birth Date, City, and Country. Each of these fields is automatically\
    \ editable, and each record can be deleted. You can even add a new record. And\
    \ with paging enabled, you can jump to each of the records. It is all as you would\
    \ expect from such a data-editing control. I’ll come back to the `DetailsView`\
    \ control in the advanced examples throughout the rest of this chapter.\n\n##\
    \ FormView\n\nThe `FormView` control starts out looking a lot like the `DetailsView`,\
    \ but it is not as rigid. It may start out as a two-column layout, but it is a\
    \ template control that can be changed completely.\n\nYou may choose to group\
    \ the First Name, Last Name, and Birth Date columns together in one block and\
    \ the City and Country columns in another. When you view the code, you will see\
    \ the various templates, including the `ItemTemplate`, which shows the data in\
    \ read-only mode; you will also see all of the `Label` controls with the `Bind`\
    \ method calls to fill each `Label` with the data from the `DataSource`. A sample\
    \ `FormView` is shown in Listing 4-2.\n\n**Listing 4-2.** `FormView` Example\n\
    \n```xml\n<asp:FormView ID=\"FormView1\" runat=\"server\"\n    AllowPaging=\"\
    True\" DataKeyNames=\"PersonId\"\n    DataSourceID=\"ObjectDataSource1\">\n  \
    \  <EditItemTemplate>\n        PersonId:\n        <asp:Label ID=\"PersonIdLabel1\"\
    \ runat=\"server\"\n            Text='<%# Eval(\"PersonId\") %>'></asp:Label><br\
    \ />\n        FirstName:\n        <asp:TextBox ID=\"FirstNameTextBox\" runat=\"\
    server\"\n            Text='<%# Bind(\"FirstName\") %>'>\n        </asp:TextBox><br\
    \ />\n        LastName:\n        <asp:TextBox ID=\"LastNameTextBox\" runat=\"\
    server\"\n            Text='<%# Bind(\"LastName\") %>'>\n        </asp:TextBox><br\
    \ />\n        BirthDate:\n        <asp:TextBox ID=\"BirthDateTextBox\" runat=\"\
    server\"\n            Text='<%# Bind(\"BirthDate\") %>'>\n        </asp:TextBox><br\
    \ />\n        City:\n        <asp:TextBox ID=\"CityTextBox\" runat=\"server\"\n\
    \            Text='<%# Bind(\"City\") %>'>\n        </asp:TextBox><br />\n   \
    \     Country:\n        <asp:TextBox ID=\"CountryTextBox\" runat=\"server\"\n\
    \            Text='<%# Bind(\"Country\") %>'>\n        </asp:TextBox><br />\n\
    \        <asp:LinkButton ID=\"UpdateButton\" runat=\"server\"\n            CausesValidation=\"\
    True\" CommandName=\"Update\" Text=\"Update\">\n        </asp:LinkButton>\n  \
    \  </EditItemTemplate>\n</asp:FormView>\n```"
