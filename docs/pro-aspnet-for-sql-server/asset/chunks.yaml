    **Polling**


    When a SqlCacheDependency is created with a database and table name, it will monitor
    the table for changes. Monitoring the table is done with the polling features
    that are available with SQL Server 2000 and 2005. The way polling works is by
    attaching a trigger to the table to be monitored that is fired with each insert,
    update, and delete statement. The trigger increments a number in a status table
    for this source table to indicate that the table has been changed.


    When a table is being monitored, this status table is polled for that number to
    check whether it has changed.


    Enabling Polling for a Table


    Polling is enabled using the aspnet_regsql.exe utility. I use the script in Listing
    6-23 to enable the Production.Product table in the AdventureWorks sample database.
    First the services to manage dependencies must be enabled and then the specific
    table must be enabled.


    **Listing 6-23.** *Add SQL Cache Dependencies.cmd*


    @echo off


    set REGSQL="%windir%\Microsoft.NET\Framework\v2.0.50727\aspnet_regsql.exe"


    set DATABASE=AdventureWorks


    set DSN="Data Source=.\SQLEXPRESS;Initial Catalog=%DATABASE%;➥


    Integrated Security=True"


    echo Registering dependencies


    %REGSQL% -C %DSN% -ed


    echo Registering Production.Product table


    %REGSQL% -C %DSN% -et -t Production.Product


