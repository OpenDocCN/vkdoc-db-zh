  trans: '

    另一种方法是使用团队共享的 SQL Server 帐户。这种方式比使用共享的 Windows 帐户更好，但下面的选项是最佳实践。每个项目都应配置一个受信任的连接字符串，以便使用当前用户的帐户连接数据库——例如：

    `server=localhost;Trusted_Connection=yes;database=Products;` 此方式不提供 `uid` 和 `pwd`
    参数，而是使用 Windows 身份验证来访问数据库。所有开发者使用相同的连接字符串，但通过各自的帐户单独访问数据库。


    受信任的连接让你能够控制谁有权访问数据库中的哪些内容。当使用一个普遍共享的用户帐户时，每个人都能访问所有内容，无法实现独立的权限管理。而通过这种方式，你可以为
    Web 开发团队设置创建和修改存储过程的权限，同时不给予他们直接修改表或数据的权限。同时，你可以让你的数据库团队负责管理对表和存储过程的变更。如果你确实有业务分析师或管理人员需要访问数据库，你可以给予他们足够的权限来完成所需的工作，但不会引发数据库问题。


    一个额外的好处是，你的 Web 团队可以专注于他们的职责范围，无需为数据库内部发生的事情负责。这也给了数据库团队更改数据库结构的自由，同时通过更新的存储过程为
    Web 团队提供相同的公共接口——接收相同的参数并返回相同的结果列。请记住，有时一些团队成员会同时兼任 Web 和数据库团队的职责。这完全没问题。团队中的一些资深成员可能对系统的每个部分都有足够程度的精通来承担这些责任。但并非每个团队成员都准备好承担那种级别的责任。将后一类开发者隔离在他们所能管理的范围内，会让他们和项目负责人更加安心，因为他们知道项目掌握在合适的人手中。


    ## 代码与数据库分离


    在一个最近的项目中，我负责处理数据库的变更，同时从头开始开发新的网站。难点在于，这个网站是作为多个在线商店的前端构建的，并且每个商店都有独特的数据库结构。这带来了真正的挑战。我计划只构建一个购物车和订单管理组件，但必须与不同的数据库协同工作，同时尽量减少将数据与各种前端集成的工作量。


    为了让同一个前端能够与这些多个后端协同工作，我通过为每个数据库使用一组名称相同、参数集相同的存储过程，创建了一个清晰的集成点。这些存储过程每个都返回相同的列或输出参数。在内部，每个过程会以不同的方式连接名称不同的表，并从与下一个数据库不同的位置收集列数据，但最终会返回前端可以轻松解释并显示给客户的数据。要运行一个使用不同数据库的在线商店，只需要实现这些存储过程即可。无需对网站进行任何编码更改。


    另一个额外的好处是，我的团队成员精通 T-SQL，并且对每个数据库都非常熟悉。通过让她专注于那个领域，她的工作效率非常高，完成新网站上线所需的集成工作比我自己做要快得多。在她处理那些变更时，我就能专注于前端的变更请求以及性能优化。


    作为使用一组存储过程作为可靠集成层的替代方案，你可以考虑使用一组 Web 服务（Windows Communication Foundation，即 WCF）作为面向服务的架构（SOA）。我确信那也能行，但当数据库本身已经允许广泛的平台与之通信时，你其实已经拥有了一个跨平台的方法。它可能没有使用可扩展标记语言（XML）或
    Web 服务互操作性组织（WSI）规范，但 SQL Server 确实可以通过开放数据库连接（ODBC）连接与 .NET、PHP、Java、Delphi 以及一系列语言和平台协同工作。


    而且，使用这些语言和平台的开发者已经具备一定的 SQL 基础能力，因此他们可以直接采用这种方法，而无需接触一行 C# 或 Visual Basic (VB)
    代码。


    ## 管理提供程序服务


    提供程序模型是在 ASP.NET 2.0 中引入的。对于 Web 应用程序，它就像 Web 浏览器的插件。ASP.NET 提供程序包括 `Membership`、`Roles`
    和 `Profile` 提供程序。这些提供程序中的每一个都有 SQL Server 实现，以及其他实现。默认情况下，SQL Server 实现已为 ASP.NET
    网站预先配置好。然而，你必须在数据库中用资源来支持这些实现。要准备这些资源，你将使用 `aspnet_regsql.exe` 实用工具。


    Visual Studio 2005 命令提示符便于从控制台访问此实用工具。该实用工具本身位于 .NET 2.0 系统目录中，该目录包含在为 Visual
    Studio 2005 命令提示符使用的特殊命令行所定义的路径中。


    该实用工具可以在没有参数的情况下运行以启动向导模式，这是一种可视化模式。尽管名为“向导模式”，但它远不如功能强大的命令行模式，后者提供了更多选项。


    首先，可视化模式会为所有提供程序启用支持。如果只想启用 `Profile` 或 `Membership` 提供程序，你可以通过命令行仅请求这些功能，而不添加对
    `Roles` 提供程序的支持（你可能使用自定义提供程序实现它，或者根本不实现）。使用以下命令获取可用选项的完整列表：`aspnet_regsql.exe
    -?`


    该实用工具支持的可用服务包括 `Membership`、`Role manager`、`Profiles`、`Personalization` 和 `SQL
    Web event provider`。每一个都可以有选择性地在数据库中注册。


    ## 使用命令行


    大多数情况下，当我使用可用提供程序处理网站时，我只使用 `Membership`、`Roles` 和 `Personalization` 支持，而关闭其他功能。要仅添加所需的服务，请使用下面的
    `Add Provider Services.cmd` 脚本，见清单 1-1。


    **清单 1-1.** `Add Provider Services.cmd`

    ```cmd

    @echo off


    set REGSQL="%windir%\Microsoft.NET\Framework\v2.0.50727\aspnet_regsql.exe"


    set DSN="Data Source=.\SQLEXPRESS;Initial Catalog=Chapter01;Integrated Security=True"


    %REGSQL% -C %DSN% -A mrpc


    pause

    ```


    此脚本可以放在项目的根目录下，与解决方案文件一起，以便在开发过程中轻松使用。它首先设置实用工具的位置，然后设置用于承载这些功能的数据源。最后，执行命令以在数据库中添加对
    `Membership` 和 `Roles` 提供程序的支持。


    `–C` 开关指定连接字符串，而 `–A` 指定你想要添加到数据库的服务列表。要添加所有服务，只需指定 `all` 即可。脚本执行只需很短时间。完成后，你会看到所选数据库中将出现新的表和存储过程。


    仅添加将要使用的服务是一种极简主义的实践。功能如果有可用，往往就会被用到，因此通过不提供你计划之外的服务，你可以省去监管它们的麻烦。

    '
- fmt: '# CHAPTER 1 ■ GETTING STARTED


    在开发具有这些功能的网站时，您偶尔会希望重置一切并从头开始。为此，您可以使用脚本来移除提供程序服务。但是，如果表中存在数据，该实用程序不允许移除这些服务。为了帮助完成此操作，您必须按照正确的顺序删除数据，因为表之间存在外键约束。


    为此，请使用清单 1-2 中名为`WipeProviderData.sql`的以下脚本。


    **清单 1-2.** *WipeProviderData.sql*


    ```

    --

    -- WipeProviderData.sql

    --

    -- Wipes data from the provider services table so the services can be removed

    -- (and added back fresh)

    --

    -- SELECT name FROM sysobjects WHERE type = ''U'' and name like ''aspnet_%''

    --


    IF EXISTS (SELECT * FROM sysobjects WHERE type = ''U'' AND

    name = ''aspnet_WebEvent_Events'')

    BEGIN

    delete from dbo.aspnet_WebEvent_Events

    END

    GO


    IF EXISTS (SELECT * FROM sysobjects WHERE type = ''U'' AND

    name = ''aspnet_PersonalizationAllUsers'')

    BEGIN

    delete from dbo.aspnet_PersonalizationAllUsers

    END

    GO


    IF EXISTS (SELECT * FROM sysobjects WHERE type = ''U'' AND

    name = ''aspnet_PersonalizationPerUser'')

    BEGIN

    delete from dbo.aspnet_PersonalizationPerUser

    END

    GO


    IF EXISTS (SELECT * FROM sysobjects WHERE type = ''U'' AND

    name = ''aspnet_Membership'')

    BEGIN

    delete from dbo.aspnet_Membership

    END

    GO


    IF EXISTS (SELECT * FROM sysobjects WHERE type = ''U'' AND

    name = ''aspnet_Profile'')

    BEGIN

    delete from dbo.aspnet_Profile

    END

    GO


    IF EXISTS (SELECT * FROM sysobjects WHERE type = ''U'' AND

    name = ''aspnet_UsersInRoles'')

    BEGIN

    delete from dbo.aspnet_UsersInRoles

    END

    GO


    IF EXISTS (SELECT * FROM sysobjects WHERE type = ''U'' AND

    name = ''aspnet_Users'')

    BEGIN

    delete from dbo.aspnet_Users

    END

    GO


    IF EXISTS (SELECT * FROM sysobjects WHERE type = ''U'' AND

    name = ''aspnet_Roles'')

    BEGIN

    delete from dbo.aspnet_Roles

    END

    GO


    IF EXISTS (SELECT * FROM sysobjects WHERE type = ''U'' AND

    name = ''aspnet_Paths'')

    BEGIN

    delete from dbo.aspnet_Paths

    END

    GO


    IF EXISTS (SELECT * FROM sysobjects WHERE type = ''U'' AND

    name = ''aspnet_Applications'')

    BEGIN

    delete from dbo.aspnet_Applications

    END

    GO

    ```


    您可以将此脚本放入您的脚本文件夹`D:\Projects\Common\Scripts`中，以便在多个项目中使用。当您想要使用它时，将其加载到 SQL Server
    Management Studio 中，并在您想要清除的数据库上下文中运行它。然后，您可以运行清单 1-3 所示的移除脚本`Remove Provider
    Services.cmd`。


    **清单 1-3.** *Remove Provider Services.cmd*


    ```

    @echo off

    set REGSQL="%windir%\Microsoft.NET\Framework\v2.0.50727\aspnet_regsql.exe"

    set DSN="Data Source=.\SQLEXPRESS;Initial Catalog=Chapter01;Integrated Security=True"

    %REGSQL% -C %DSN% -R mrpc

    Pause

    ```


    此脚本与`Add Provider Services.cmd`相同，只是命令行开关从`-A`简单地更改为`-R`，后者指定要移除服务。数据清除后，此脚本将成功运行。


    ## Mixing and Matching Providers


    由于提供程序的性质，可以将这些提供程序服务部署到网站其余部分所使用的同一数据库，或完全不同的数据库。甚至可以为每个单独的提供程序将服务部署到单独的数据库。这样做可能有很好的理由。在一种情况下，您可能正在运行一个连接到庞大数据库的网站，该数据库需要偶尔下线进行维护。这样做时，可能完全没必要让提供程序服务也一起下线。您可能还会发现，通过在不同的硬件上托管提供程序服务，可以获得更好的性能。


    您的配置选项远不止于此，这将在下一节中解释。


    ## Configuring Providers'
