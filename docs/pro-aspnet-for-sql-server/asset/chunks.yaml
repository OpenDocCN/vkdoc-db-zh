  trans: "# 使用 SQL 提供程序\n\n在开发包含这些提供程序配置的网站时，您可能会发现需要在工作站的本地数据库副本与办公室服务器上的远程数据库之间进行切换。您可以配置每一个数据库连接，并将提供程序配置所使用的名称切换为您想要激活的那个。我通常使用本地数据库副本进行工作，这样可以避免他人直接修改服务器上的数据库对我造成干扰。您可能会维护一个所有开发人员共用的过渡数据库，用于测试集成构建。当您在本地副本上完成一组功能后，可以将数据库更改部署到该过渡数据库，重新配置您的网站以连接过渡数据库，然后运行测试以验证您的更改是否与他人可能已做的更改正确集成，之后再将您的更改签入源代码控制。\n\
    \n## 创建密码策略\n\n为一个新网站配置 `SqlMembershipProvider` 时，您必须选择密码的处理方式。这是使用 `MembershipProvider`\
    \ 的第一个障碍，因为默认的密码策略有些严格。它要求密码至少七个字符，并且至少包含一个非字母数字字符。像 `aspnet9` 这样的密码是不允许的，但 `aspnet9!`\
    \ 则可以。在开发过程中，我经常创建新账户并登录，因此简化这个要求（至少在开发期间）是我的首要步骤之一。根据您的公共网站所需的安全级别，您可以放宽密码策略，不要求非字母数字字符，并可能将所需长度降至六个字符。或者，您可以配置一个正则表达式来验证新密码。表\
    \ 5-2 展示了一些您可以使用的示例正则表达式。\n\n**表 5-2.** 密码正则表达式\n\n`^.{7,10}$`\n密码可以包含任何字符，长度为七到十个字符。\n\
    \n`^[a-zA-Z]\\w{7,14}$`\n密码必须仅为字母，长度为七到十四个字符。\n\n`^(?=.*\\d).{7,12}$`\n密码必须包含至少一个数字字符，长度为七到十二个字符。\n\
    \n`^(?=.*\\d)(?=.*[a-z])(?=.*[A-Z]).{7,15}$`\n密码必须至少包含一个大写字母、一个小写字母和一个数字。其长度必须为七到十五个字符。\n\
    \n当然，您可以使用更严格的正则表达式要求，但应将其与用户能接受的程度相平衡。如果它只是一个关于您梦幻橄榄球联盟的在线讨论论坛，您可以采用宽松的密码策略。但如果是一个通过\
    \ SSL 保护的、管理银行账户的网站，您应该倾向于使用最后一个示例。\n\n**注意** 您可以在 `http://regexlib.com/` 上在线获取更多正则表达式示例。搜索\
    \ `password`，您将得到一个密码正则表达式列表。\n\n## SqlRoleProvider\n\n`SqlRoleProvider` 是 `RoleProvider`\
    \ 的一个实现，它提供了一种对用户进行分组的方法。如果您正在使用 `SqlMembershipProvider`，则并非必须启用 `RoleProvider`。并且如果两者都启用，您甚至可以选择不同类型的提供程序。您可以将网站配置为使用\
    \ `Active Directory 成员资格提供程序` 和 `SqlRoleProvider`，它将通过提供程序接口按预期工作。\n\n`SqlRoleProvider`\
    \ 的功能相当简单，但对于大多数网站来说非常必要。用户与角色相关联，角色可以以各种方式用于授予或拒绝访问权限，以及定制网站的行为。\n\n## 按角色控制访问\n\
    \n在网站使用了 `SqlMembershipProvider` 和 `SqlRoleProvider` 之后，您可能希望保护它。要完全锁定网站，您可以拒绝所有匿名用户的访问。在\
    \ ASP.NET 中，您可以在 `Web.config` 文件中使用 `authorization` 元素来实现。该元素包含 `deny` 或 `allow`\
    \ 元素，这些元素指定了您的身份验证要求，无论是基于角色、用户，还是已验证或匿名用户。清单 5-1 展示了如何锁定网站，使得只有经过身份验证的用户才能进入。\n\
    \n**清单 5-1.** 仅允许经过身份验证的用户\n\n```xml\n<authorization>\n  <deny users=\"?\"/>\n\
    </authorization>\n```\n\n问号代表匿名用户。默认的身份验证是允许所有用户，无论其登录状态如何，如清单 5-2 所示。\n\n**清单\
    \ 5-2.** 允许所有用户\n\n```xml\n<authorization>\n  <allow users=\"*\" />\n</authorization>\n\
    ```\n\n您也可以组合使用这些指令，首先允许某些用户（可能通过角色），然后拒绝所有其他用户。您的访问控制规则还可以限制在特定位置。清单 5-3 展示了一个必须放在主\
    \ `system.web` 配置部分之外的配置，因为 `location` 块不能被 `system.web` 节包含。通常，您将在主 `system.web`\
    \ 配置中设置全局访问设置，然后紧接着添加额外的、限制性更强的规则。\n\n**清单 5-3.** 仅允许管理员用户\n\n```xml\n<location\
    \ path=\"Admin\">\n  <system.web>\n    <authorization>\n      <allow roles=\"\
    Admin\"/>\n      <deny users=\"*\"/>\n    </authorization>\n  </system.web>\n\
    </location>\n```\n\n## 注意，并非所有内容都被保护！\n\n当添加授权要求以防止匿名账户访问您的页面时，您可能并未保护所有内容。您实际上只保护了映射到\
    \ .NET 运行时运行的 ASP.NET 资源。扩展名为 `.aspx`、`.asmx` 和 `.ashx` 等文件被映射到 .NET 运行时，但图片和文本文件则不然。那些不由\
    \ .NET 运行时管理的文件也不受此授权机制的保护。通常，您的关键数据位于网页上，但如果您的 ASP.NET 应用程序生成包含关键数据的图片或其他文档到磁盘，请记住这一点。\n\
    \n然而，当您使用 Visual Studio 2005 时，您会发现所有资源都根据配置受到保护。这是因为开发 Web 服务器提供的所有内容都通过 .NET\
    \ 运行时运行，它遵循 `Web.config` 中的设置。如果您确实希望保护您的文件，您可以选择将文件类型的扩展名专门映射到 .NET 运行时，或者为应用程序扩展部分中未专门映射的每个文件设置通配符应用程序映射。后一个选项可能会增加服务器的负载，因为\
    \ IIS 更适合提供静态图像文件，因此如果您希望保护生成的 Excel 文档，最好将 `.xls` 扩展名映射到 .NET 运行时。您可以复制 `.aspx`\
    \ 扩展名的映射。它引用以 `aspnet_isapi.dll` 结尾的 .NET 2.0 安装文件夹。\n\n授权机制有一个例外，那就是登录页面。必须允许此页面，以便表单身份验证可以授予用户访问权限。默认的身份验证模式是\
    \ `Windows`，但要使用 `SqlMembershipProvider` 和 `Login` 控件，您必须将其更改为 `Forms` 模式。您可以决定使用不同的页面，但\
    \ `Login.aspx` 是默认的。您还可以将超时时间从默认的 30 分钟更改为大约 2 周（20,160 分钟），并将其设置为使用可滑动过期，这样只要用户在两周内返回网站，她就保持登录状态。如清单\
    \ 5-4 所示的这个配置，对于门户或购物网站非常有用。\n\n**清单 5-4.** 登录页面配置"
- fmt: "<authentication mode=\"Forms\">\n\n<forms loginUrl=\"Login.aspx\"\n\nname=\"\
    .ASPXFORMSAUTH\"\n\ntimeout=\"20160\"\n\nslidingExpiration=\"true\"/>\n\n</authentication>\n\
    \nAfter the user successfully logs in to her account, she is assigned a token\
    \ that is kept on the client side as a cookie. This cookie is known as the Forms\
    \ Authentication token. In Listing 5-4, the cookie name is `.ASPXFORMSAUTH`, the\
    \ default name. This token is the connection between the client and the back end\
    \ for the membership system.\n\n## Controlling Behavior by Role\n\nAs the administrator\
    \ of your website, you will likely add yourself to a role called `Admin`. In Listing\
    \ 5-5, you can see how the `Admin` role is used to restrict access to the Admin\
    \ section for users in the `Admin` role. When you log in to the website, you can\
    \ display a link to the Admin section while the same link will not be visible\
    \ to a regular user. You simply check whether the current user is in the `Admin`\
    \ role and set the `Visible` property on the hyperlink.\n\n**Listing 5-5.** Setting\
    \ Visibility of the AdminHyperlink\n\n```\nprotected void Page_Load(object sender,\
    \ EventArgs e)\n{\n    AdminHyperLink.Visible = Roles.IsUserInRole(User.Identity.Name,\
    \ \"Admin\");\n}\n```\n\nYou can take this even further. In the case of a commerce\
    \ site, when a customer makes a first purchase, you may add him to a role of `Customer`,\
    \ which will start showing content on his account page for order history and shipment\
    \ tracking. And if your commerce site works with multiple vendors who supply the\
    \ products for the website, you may add them to a `Vendor` role and grant them\
    \ access to update inventory data and projected ship times.\n\nKeep in mind that\
    \ all the role information is stored in the database along with your application\
    \ data. Although it is best to use the `RoleProvider` to interact with this data,\
    \ you can use the underlying stored procedures to interact with the membership\
    \ data. For a commerce site, you may want to run a monthly report to find all\
    \ users who have purchased more than $1,000 in merchandise in the last three months.\
    \ You can then use the `aspnet_UsersInRoles_AddUsersToRoles` stored procedure\
    \ to add them to a `PreferredCustomer` role that makes them eligible for discounts\
    \ and special offers. And as orders come in, you will record the items, quantities,\
    \ and prices for the order but leave the processing to be handled as a batch later\
    \ in the day. At that point, you can verify that a user is in the `PreferredCustomer`\
    \ role and give him his discount by using the `aspnet_UsersInRole_IsUserInRole`\
    \ stored procedure. Back on the website, the user will start to see special offers\
    \ on the home page that are not available to everyone else (hopefully winning\
    \ the user’s loyalty), which is all keyed on the user’s association with the privileged\
    \ role.\n\nAnother advantage of having these stored procedures accessible is that\
    \ many platforms work with SQL Server. Your public website may run ASP.NET, but\
    \ your fulfillment process may be implemented with a different language or platform\
    \ that cannot use the .NET framework directly. With all the talk about service-oriented\
    \ architecture (SOA) as a means to integrate diverse platforms, I feel that the\
    \ database is already an excellent integration point. When I was building a website\
    \ a couple of years back, I had a few developers on the team who produced desktop\
    \ applications with another software platform that handled vendor applications\
    \ and the fulfillment process. I used the database as a way to safely pass data\
    \ between platforms.\n\nWith the stored procedures equally available to the other\
    \ platform, I did not have to do any additional work for them to adapt to what\
    \ I was building.\n\n## The SqlProfileProvider\n\nThe ASP.NET Profile provider\
    \ adds additional properties to a user account. We touched on this in Chapter\
    \ 1. What is interesting about the `SqlProfileProvider` is that it does not require\
    \ you to also use an implementation of the `MembershipProvider`. That would seem\
    \ to make little sense, if you could customize a user account but then could not\
    \ log in to it and restore your preferences. But that is not exactly how ASP.NET\
    \ authentication works. The Membership provider is actually just a layer above\
    \ forms authentication, which has been around for several years. In fact, you\
    \ can completely implement a membership system with forms authentication directly,\
    \ which is compatible with the `SqlProfileProvider`. You can even store usernames\
    \ and passwords in your `Web.config` file, as shown in Listing 5-6.\n\n**Listing\
    \ 5-6.** Usernames and Passwords in Web.config\n\n```\n<authentication mode=\"\
    Forms\">\n  <forms loginUrl=\"Login.aspx\"\n         name=\".ASPXFORMSAUTH\"\n\
    \         slidingExpiration=\"true\">\n    <credentials passwordFormat=\"Clear\"\
    >\n      <user name=\"admin\" password=\"easy12guess\"/>\n      <user name=\"\
    user\" password=\"abc123\"/>\n    </credentials>\n  </forms>\n</authentication>\n\
    ```\n\nThis all may explain why the Membership, Roles, and Profile interfaces\
    \ seem mixed up, with so many places to gather the necessary information about\
    \ your users. The `MembershipUser` object uses the `User` object, which has been\
    \ around since .NET 1.0. But although you can use `SqlProfileProvider` without\
    \ the `MembershipProvider`, there is little reason to do so.\n\nAfter you are\
    \ using the `SqlProfileProvider`, you have a choice to make. You can choose to\
    \ allow anyone who comes to your website to maintain a profile anonymously or\
    \ not. This is a common feature, but there are some concerns worth considering.\n\
    \n**Note:** Remember that there are already default providers configured that\
    \ you will need to clear when configuring your website. Otherwise, you will experience\
    \ unexpected behavior. Although you can configure and use multiple implementations\
    \ of a provider, it is not common. Starting your provider configuration with a\
    \ `clear` directive should be the first step in configuring your website.\n\n\
    ## Why Anonymous Profiles?\n\nAn anonymous profile can store customization settings\
    \ associated to a profile just as an authenticated profile can. These settings\
    \ will stay with the user even after the web browser has been restarted. Perhaps\
    \ you want to allow a new user to use your website before requiring her to create\
    \ an account. A common feature on commerce sites allows a user to add products\
    \ to her basket anonymously, and after she chooses to purchase the items, it creates\
    \ an account for her during the checkout process so she can return later, log\
    \ in, and access her order status or make a new order with the previous account\
    \ information.\n\nMore and more websites are also offering small ways to customize\
    \ their content to suit their users, but these minor preferences are not really\
    \ worth the effort to create yet another account on another website. One example\
    \ is the font-resizing buttons on the CNN website that allow you to increase or\
    \ decrease the size of the text on the page (see Figure 5-1). The CNN site remembers\
    \ your preference when you return days later. This single setting could be saved\
    \ alone as a cookie, but when it is so easy to set properties on a profile, you\
    \ can rely on the anonymous profile.\n\n**Figure 5-1.** CNN.com font resizing"
