    the same value in each component so that you do not have to maintain the connection
    string configuration for each of those components. But there is a problem with
    assuming you will only have a single database connection. It forces you to place
    all of your data in the same database.


    Alternatively, you may use a unique connection string name for each component,
    which will require you to maintain a connection string for each component. This
    approach gives you some flexibility but duplicates several connection strings
