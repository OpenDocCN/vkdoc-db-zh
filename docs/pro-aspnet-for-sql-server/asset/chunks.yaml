    # 第 5 章 ■ SQL 提供程序


    ## 使用由提供程序驱动的 ASP.NET 控件


    现在，你已经为网站配置了用户登录所需的所有成员功能。`Login`控件可以轻松处理这一点。这个过程充满了安全性，建立在多年的遗留技术之上。尽管`Membership`
    API 和提供程序模型对 ASP.NET 来说是新的，但验证用户身份和维护用户会话的机制从 ASP.NET 诞生之初就已存在。当用户成功登录你的网站时，她会获得一个令牌，该令牌作为
    Cookie 存储在她的 Web 浏览器中。这个令牌就像一把钥匙，让她能够访问网站的受保护区域和定制区域。


    身份验证令牌是一个加密的`FormsAuthenticationTicket`，它保存着用户名、会话过期时间以及其他数据，包括自定义用户数据。


    在下面的场景中，我将展示如何利用这些自定义用户数据来提高已验证会话的安全性，并演示 ASP.NET 中身份验证系统的灵活性。


    在这个示例场景中，你正在使用一个银行网站，并在工作时查看你的余额。你被短暂叫走，但没想到锁定电脑。一位不诚实的同事偷偷使用你的电脑，复制了用于验证你与银行会话的
    Cookie。这个 Cookie 至少不是包含你账号的明文值（否则任何时间都能访问你的账户），而是一个加密的`FormsAuthenticationTicket`形式，其中包含过期时间和令牌颁发日期。这意味着这位不诚实的同事只有有限的时间可以使用该
    Cookie。


    对于采用滑动过期的会话，这位同事所能做的是将 Cookie 放入浏览器，这将不断更新过期时间。但它不会改变的是保存在服务器上的最后登录日期。如果你的银行网站非常安全，该网站可能会在允许你执行任何真正重要的操作（例如安排付款或转账到他人账户）之前检查你的最后登录时间。在网站允许你进行这些操作之前，它可以检查你是否在交易发生的几分钟内登录过，如果你没有，则要求你提供密码。即使你已经通过验证，你也可以重新登录，这样做会重置最后登录时间。这个要求将阻止你的同事完成此类操作，因为他只有
    Cookie，只能对你的账户进行基本访问。但要让该同事获得执行交易的访问权限，只需等你回到电脑前并再次登录银行网站即可。如果在令牌中存储你的 IP 地址，以便网站可以验证你最近是从那台计算机登录的，这将会很有帮助。这正是你要使用自定义用户数据的地方。


    登录过程可以调整，以便将远程地址作为用户数据插入到`FormsAuthenticationTicket`中。只需将`Login`控件拖放到 Web 窗体的设计界面。然后为`Authenticate`事件创建一个处理程序。清单
    5-15 中的代码处理该事件，并将用户的远程地址插入到票据中，该地址可用于在用户每次返回网站时验证其位置。

    '
- fmt: "# Chapter 5: SQL Providers\n\n## Listing 5-15: Login Authenticate Event Handler\n\
    \n```csharp\nprotected void Login1_Authenticate(object sender, System.Web.UI.WebControls.AuthenticateEventArgs\
    \ e)\n{\n    if (Membership.ValidateUser(Login1.UserName, Login1.Password))\n\
    \    {\n        e.Authenticated = true;\n        string username = Login1.UserName;\n\
    \        bool persist = Login1.RememberMeSet;\n        int timeout = GetLoginTimeout();\n\
    \        string userData = \"remoteAddress=\" + Request.UserHostAddress;\n   \
    \     FormsAuthenticationTicket ticket = new FormsAuthenticationTicket(1, username,\
    \ DateTime.Now, DateTime.Now.AddMinutes(timeout), persist, userData);\n      \
    \  string encTicket = FormsAuthentication.Encrypt(ticket);\n        HttpCookie\
    \ cookie = new HttpCookie(FormsAuthentication.FormsCookieName, encTicket);\n \
    \       cookie.Expires = ticket.Expiration;\n        Response.Cookies.Add(cookie);\n\
    \        Response.Redirect(FormsAuthentication.GetRedirectUrl(username, persist),\
    \ true);\n    }\n    else\n    {\n        e.Authenticated = false;\n    }\n}\n\
    ```\n\nTo get the configured time-out for the user session, I created a method\
    \ that reads in the configured value from `Web.config`, as shown in Listing 5-16.\n\
    \n## Listing 5-16: GetLoginTimeout Method\n\n```csharp\nprivate int GetLoginTimeout()\n\
    {\n    AuthenticationSection authSection = ConfigurationManager.GetSection(\"\
    system.web/authentication\") as AuthenticationSection;\n    if (authSection !=\
    \ null && authSection.Forms != null)\n    {\n        return authSection.Forms.Timeout.Minutes;\n\
    \    }\n    // return the default\n    return 30;\n}\n```\n\nNow that the ticket\
    \ has the value, you can check it whenever the user is about to do something more\
    \ critical than the typical page request, such as making a bank transfer or changing\
    \ a password. The method in Listing 5-17 checks the remote address.\n\n## Listing\
    \ 5-17: IsRemoteAddressMatched Method\n\n```csharp\nprivate bool IsRemoteAddressMatched()\n\
    {\n    if (User.Identity.IsAuthenticated)\n    {\n        FormsIdentity identity\
    \ = User.Identity as FormsIdentity;\n        if (identity != null)\n        {\n\
    \            string prefix = \"remoteAddress=\";\n            if (!String.IsNullOrEmpty(identity.Ticket.UserData)\
    \ && identity.Ticket.UserData.IndexOf(prefix) == 0)\n            {\n         \
    \       string remoteAddress = identity.Ticket.UserData.Substring(prefix.Length);\n\
    \                return Request.UserHostAddress.Equals(remoteAddress);\n     \
