    block is called roleManager, and in addition to the defaultProvider attribute,
    it also has an attribute called enabled, which allows you to turn it on and off.
    Later you can easily access the enabled setting in your code by using the Roles.Enabled
    property. By default this value is set to false, so it must be set to add support
    for roles even if you have configured a provider. See the following roles configuration
    in Listing 1-8.


