    C H A P T E R 9 ■ D E P L OY M E N T


    Next you will create a few sample scripts that will run as updates to test the
    functionality of the update routine. These scripts will be placed in the Scripts
    folder in the class library and set as embedded resources. They will be named
    NamesUpdate.00.sql, NamesUpdate.01.sql, and NamesUpdate.02.sql. The first script
    defines the names table and stored procedure. The second script adds three names,
    and the third script adds one more name. These scripts could easily adjust table
    columns, add or remove indexes, or whatever you choose to have them do.


    There are two important details about these embedded scripts. First the commands
    are all separated with a GO statement after each command. This is done so the
    commands can be run independently as SQL commands with the Data Access Block in
    the Enterprise Library as you have done with stored procedures in previous chapters.
    Second, the update scripts should always set the version of the database to the
    next number. This is done at the end after all of the other commands have run
    successfully. However, the order is not strictly necessary as these commands will
    be grouped together as a transaction, so if any of the commands fail, all changes
    in the update script will be undone. Listing 9-24 shows NamesUpdate.01.sql.


    **Listing 9-24.** *NamesUpdate-01.sql*


    -- update 1 (add stooges to names table)


    EXEC chpt09_SaveName ''Larry''


    GO


    EXEC chpt09_SaveName ''Moe''


    GO


    EXEC chpt09_SaveName ''Curly''


    GO


    -- be sure to update the names schema version


    EXEC chpt09_SetSchemaVersion ''names'', 2


    GO


    Each name is added using the chpt09_SaveName stored procedure created by the first
    update script, NamesUpdate.00.sql, which is not shown here (see the code downloads).
    You can see how each command ends with a GO statement with the last statement
    setting the schema version for the names schema to 2.


    **Running the Scripts**


    The scripts embedded in the assembly are now ready to be loaded and run using
    a class called DatabaseManager. This class is in the same class library as the
    update scripts, which has the default namespace set to Chapter09—an important
    detail when loading the scripts as resource streams. The folder structure is also
    important. It should look like Figure 9-8.


    To reference the scripts, you will use a prefix to access them much like a namespace.
    This prefix is defined as a constant in the DatabaseManager class, shown in Listing
    9-25.


