    The free-form nature of the `FormView` allows for layouts that are very different\
    \ from those possible with the `DetailsView`, yet still gives you the same features\
    \ to add, edit, and delete data.\n\n## GridView\n\nNow for the granddaddy of all\
    \ databound controls: the `GridView` control. Whether it lists transactions from\
    \ your checking account or lists contacts in your address book, this control is\
    \ used nearly everywhere. And while it lists data in a tabular format and allows\
    \ you to add, edit, and delete records, it also allows you to sort the data. This\
    \ makes it a powerful and easy means of looking at data in a way that is most\
    \ useful to you. Listing 4-3 shows an example of the `GridView` control.\n\n![Image\
    \ 13](index-84_1.png)\n\n8601Ch04CMP3 8/25/07 1:07 PM Page 77\n\nC H A P T E R\
    \ 4 ■ D ATA B O U N D C O N T R O L S\n\n**77**\n\n**Listing 4-3.** `GridView`\
    \ Example\n\n```\n<asp:GridView ID=\"GridView1\" runat=\"server\" AllowPaging=\"\
    True\" AllowSorting=\"True\"\n    AutoGenerateColumns=\"False\" DataKeyNames=\"\
    PersonId\"\n    DataSourceID=\"ObjectDataSource1\">\n    <Columns>\n        <asp:BoundField\
    \ DataField=\"FirstName\"\n            HeaderText=\"First Name\" SortExpression=\"\
    FirstName\" />\n        <asp:BoundField DataField=\"LastName\"\n            HeaderText=\"\
    Last Name\" SortExpression=\"LastName\" />\n        <asp:BoundField DataField=\"\
    City\"\n            HeaderText=\"City\" SortExpression=\"City\" />\n        <asp:BoundField\
