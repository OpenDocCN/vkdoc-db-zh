    \n## 项目组织\n\n对于每个环境，我将所有项目都放在 `D:\\Projects` 目录下。并且我明确地将解决方案文件放在每个项目的根目录。我曾见过一些团队仅在创建项目时才附带创建解决方案文件，但这削弱了当你在解决方案中妥善管理项目时所能获得的优势。\n\
    \n对于一个典型的 Web 项目，我从一个空白解决方案中的 ASP.NET 网站开始。然后我添加一个类库，并将其命名为 `ClassLibrary`。我将尽可能多的网站代码放入这个类库中，原因我稍后会讲到。接着，我将该类库作为引用关联到网站，解决方案会将此记录为一个依赖项。这非常有用，因为新的\
    \ ASP.NET 2.0\n\n![Image 2](img/index-11_1.jpg)\n\n![Image 3](img/index-11_2.png)\n\
    \n8601Ch01CMP2 8/22/07 7:56 PM Page 3\n\nC H A P T E R 1 ■ G E T T I N G S TA\
    \ RT E D\n\n**3**\n\n网站项目模型不包含用于维护文件和依赖项清单的项目文件。我添加了一个名为 `Database` 的数据库项目，其中包含我所有的数据库脚本，用于创建表和存储过程，以及准备数据库支持数据的脚本。（数据库项目需要\
    \ Visual Studio 2005 专业版。）最后，我创建一个名为 `Solution Items` 的解决方案文件夹，并添加一个名为 `README.txt`\
    \ 的文本文件，该文件提供项目的基本信息，例如名称、描述、要求、依赖项以及构建和部署说明。\n\n所有这些工作的结果就是如图 1-2 所示的解决方案结构。\n\
    \n**图 1-2.** *典型的解决方案环境*\n\n当你首次设置空白解决方案并向其中添加第一个项目或网站时，你可能会发现解决方案消失了。这是 Visual\
    \ Studio 的一个默认设置，你可以更改它。从 `工具` 菜单中选择 `选项`，然后点击 `项目和解决方案` 项，如图 1-3 所示。\n\n**图 1-3.**\
    \ *设置“始终显示解决方案”选项*\n\n![Image 4](img/index-12_1.jpg)\n\n8601Ch01CMP2 8/22/07 7:56\
    \ PM Page 4\n\n**4**\n\nC H A P T E R 1 ■ G E T T I N G S TA RT E D\n\n这个示例解决方案将成为本书所有示例的模板。对所有项目使用相同的基本结构为构建自动化提供了一致的基础。它也使得你开发的每个应用程序的所有内容都保持在相同位置。能够轻松地在解决方案中搜索对数据库表的引用，然后获取该表的创建脚本和任何使用该表的存储过程，这非常方便。大多数开发人员只是在数据库中编写并保存他们的表数据定义语言（DDL）和存储过程，并使用数据库内的工具进行移动，从不将它们保存为可以在\
    \ Visual Studio 项目中进行版本控制的脚本。这种常见做法未能充分利用 Visual Studio 2005 的一大优势，并使得从头重新创建数据库对象更加困难。因此，由于需要进行大量额外工作，为了改进应用程序而进行数据库更新的变更往往被避免。当你的环境允许你以非常敏捷的方式工作时，你才能承担那些否则可能不会尝试的任务。\n\
    \n## 公共文件夹\n\n当你从事多个项目时，你会积累对多个项目都有用的工具、模板和脚本。将它们放入一个由你用源代码管理的公共文件夹中是很有帮助的，这样多个团队中的开发人员在工作中就可以利用它们。借助图\
    \ 1-2 中的解决方案布局，将一个 MSBuild 脚本和 CMD 脚本放入一个新项目以提供构建自动化是轻而易举的事。你将在本书中使用以下文件夹来存放工具、模板和脚本（见图\
    \ 1-4）：\n- `D:\\Projects\\Common\\Tools`\n- `D:\\Projects\\Common\\Templates`\n\
    - `D:\\Projects\\Common\\Scripts`\n\n**图 1-4.** *用于工具、脚本和模板的文件夹*\n\n![Image 5](img/index-13_1.jpg)\n\
    \n8601Ch01CMP2 8/22/07 7:56 PM Page 5\n\nC H A P T E R 1 ■ G E T T I N G S TA\
    \ RT E D\n\n**5**\n\n为了便于针对这些文件夹编写脚本，让我们为这些位置添加一些系统环境变量（见图 1-5）：\n- `DevTools\
    \ = D:\\Projects\\Common\\Tools`\n- `DevTemplates = D:\\Projects\\Common\\Templates`\n\
    - `DevScripts = D:\\Projects\\Common\\Scripts`\n\n**图 1-5.** *用于开发的*\n\n环境变量\n\
    \n你将在本书中基于这些文件夹和变量进行构建，以增强你的通用开发环境。\n\n## 数据源配置\n\n数据源是将 ASP.NET 2.0 Web 应用程序连接到数据的机制。\n\
    \n对于 ASP.NET 应用程序，数据通常存储在 SQL Server 数据库中。要连接到数据源，你需要使用一个连接字符串，该字符串设置了连接到数据库的各种选项。连接字符串有很多可用的选项。对于最基本的连接字符串，你需要数据库的位置和访问数据库的身份验证详细信息。以下是一个此类连接字符串的示例：\n\
    \n```\nserver=localhost;database=Products;uid=webuser;pwd=webpw\n```\n\n请注意，这包含了\
    \ `server`、`database`、`uid` 和 `pwd` 参数，它们提供了访问本地计算机上 `Products` 数据库所需的一切。这种形式对于\
    \ ASP.NET 开发人员来说应该非常熟悉。不过，还有其他替代方法，我将稍后解释。\n\n8601Ch01CMP2 8/22/07 7:56 PM Page\
    \ 6\n\n**6**\n\nC H A P T E R 1 ■ G E T T I N G S TA RT E D\n\n### 混合模式身份验证\n\n\
    使用 SQL Server，你可以选择允许 Windows 身份验证、SQL Server 身份验证或两者。\n\n在安装 SQL Server 时会提示你做出此选择。当数据库托管在无法访问\
    \ Windows 域的远程服务器上时，SQL Server 账户很有用。当你的用户和数据库服务器都在域上运行时，Windows 身份验证在开发过程中很有帮助。对于开发和暂存数据库，你可以为数据库开发人员和\
    \ Web 开发人员等组授予不同级别的访问权限，然后根据情况将人员放入这些组中。对于生产数据库，你使用一个不与整个开发团队共享的用户账户，以便只有那些应该有访问权限的有限用户才能访问。与这些数据库配合使用的应用程序只需更新连接字符串即可更改身份验证模式。\n\
    \n在 ASP.NET 应用程序中，数据源在 `Web.config` 文件的一个名为 `connectionStrings` 的节中配置。每个连接字符串都使用名称、连接字符串和提供程序名称添加到此节中，例如：\n\
    \n```xml\n<connectionStrings>\n  <add name=\"SampleDatabase\" connectionString=\"\
    ...\"\n       providerName=\"System.Data.SqlClient\" />\n</connectionStrings>\n\
    ```\n\n在团队环境中，你很可能会使用源代码管理系统。你会将 `Web.config` 文件放入源代码管理中，以便团队的每个成员都有相同的配置。然而，共享一个受源代码管理的配置文件可能会带来一些问题。\n\
    \n首先，可能会使用一组通用的身份验证值。使用 Windows 用户账户（例如，某个团队成员的账户）会将密码暴露给整个团队——这是不良做法，特别是如果密码策略要求定期更新的话。"
- fmt: 'Another approach is to use a SQL Server account that is shared by the team.
    This way is better than using a shared Windows account, but the following option
    works best. Each project should be configured with a trusted connection string
    so that the current user’s account is used to connect with the database—for example:

    `server=localhost;Trusted_Connection=yes;database=Products;` Instead of providing
    the `uid` and `pwd` parameters, this uses Windows authentication to access the
    database. All developers use the same connection string but individually access
    the database by using their own accounts.


    A trusted connection allows you to control who has access to what in the databases.
    When there is a universally shared user account, everyone will have access to
    everything, and no individual role management is possible. This way, you can set
    up the web development team with access to create and modify stored procedures
    while not giving them access to directly alter tables or data. Meanwhile, you
    can have your database team manage changes to the tables and stored procedures.
    And if you do have business analysts or management accessing the database, you
    can give them enough access to do what they need to do, but nothing that would
    cause trouble with the databases.


    A side benefit is that your web team can focus on their concerns without having
    responsibility for what is happening to the database internals. It also gives
    the database team the freedom to change the database structure while using updated
    stored procedures to provide the same public interface for the web team, taking
    in the same parameters and returning the same result columns. Keep in mind that
    sometimes some team members will wear hats for the web and database teams. That
    is perfectly fine. Some senior members of the team may have the right level of
    mastery on every part of the system to handle those responsibilities. But not
    every team member will be ready to take on that level of responsibility. Isolating
    the latter group of developers to what they can manage will give them and the
    project leader some peace of mind knowing that the project is in the right hands.


    ## Code and Database Separation


    On one recent project, I took care of changes to the database while developing
    the new website from the ground up. The catch was that this website was being
    built as a front end for multiple online stores and had a unique database structure
    for each store. That presented a real challenge. I planned to build just one basket
    and order management component but had to work with different databases while
    minimizing the effort to integrate the data with various front ends.


    To make the same front end work with these multiple back ends, I created a clean
    integration point by using a set of stored procedures that had the same name and
    a set of parameters for each of the databases. These stored procedures each returned
    the same columns or output parameters. Internally, each would join differently
    named tables and gather column data from different locations than the next database,
    but ultimately would return data that the front end could easily interpret and
    display to customers. To run this online store with a different database, all
    that was needed was to implement those stored procedures. No coding changes were
    needed for the websites.


    Another side benefit was that my team member was proficient with T-SQL and intimately
    familiar with each of the databases. By isolating her focus in that space, she
    was very productive and able to complete the integrations for a new website rollout
    much more quickly that I could have. As she worked on those changes, I was able
    to focus on requested changes to the front end as well as performance optimization.


    As an alternative to using a set of stored procedures as a reliable integration
    layer, you could consider a set of web services (Windows Communication Foundation,
    or WCF) as a service-oriented architecture (SOA). I am sure that could work, but
    when a database already allows a wide range of platforms to talk with it, you
    already have a cross-platform approach. It may not use Extensible Markup Language
    (XML) or Web Services Interoperability Organization (WSI) specifications, but
    SQL Server does work with .NET, PHP, Java, Delphi, and a whole range of languages
    and platforms over an Open Database Connectivity (ODBC) connection.


    And the developers using those languages and platforms will already have some
    basic proficiency with SQL, so they can jump right into this approach without
    touching a single line of C# or Visual Basic (VB).


    ## Managing Provider Services


    The provider model was introduced to ASP.NET 2.0. It is to web applications what
    plug-ins are to web browsers. Included with the ASP.NET providers are the `Membership`,
    `Roles`, and `Profile` providers. Each of these providers has a SQL Server implementation,
    among others. By default, the SQL Server implementations are preconfigured for
    an ASP.NET website. However, you must support these implementations with resources
    in the database. To prepare these resources, you will use the `aspnet_regsql.exe`
    utility.


    The Visual Studio 2005 command prompt provides easy access to this utility from
    the console. The utility itself is located in the .NET 2.0 system directory, which
    is included on that path defined for the special command line used by the Visual
    Studio 2005 command prompt.


    The utility can be run with no arguments to start the wizard mode, which is a
    visual mode. Despite the name, the wizard mode is not nearly as powerful as the
    command line, which offers more options.


    For starters, the visual mode turns on support for all providers. To enable just
    the `Profile` or `Membership` provider, you can request just those features from
    the command line and not add support for the `Roles` provider (which you may implement
    with a custom provider or not at all). Get a full list of the available options
    with the following command: `aspnet_regsql.exe -?`


    The available services supported by the utility include `Membership`, `Role manager`,
    `Profiles`, `Personalization`, and `SQL Web event provider`. Each can be selectively
    registered with the database.


    ## Using the Command Line


    Most of the time that I work with a website using the available providers, I use
    only the `Membership`, `Roles`, and `Personalization` support and leave the others
    off. To add just the desired services, use the following `Add Provider Services.cmd`
    script in Listing 1-1.


    **Listing 1-1.** `Add Provider Services.cmd`

    ```cmd

    @echo off


    set REGSQL="%windir%\Microsoft.NET\Framework\v2.0.50727\aspnet_regsql.exe"


    set DSN="Data Source=.\SQLEXPRESS;Initial Catalog=Chapter01;Integrated Security=True"


    %REGSQL% -C %DSN% -A mrpc


    pause

    ```


    This script can be placed at the root of a project, alongside the solution file,
    to make it easily available during development. It sets the location of first
    the utility and then the datasource to be used to host these features. Finally,
    the command is executed to add support for the `Membership` and `Roles` provider
    in the database.


    The `–C` switch specifies the connection string, while `–A` specifies the list
    of services you want added to the database. To add all of them, you can simply
    specify `all` instead. The script takes a short time to complete. When it is done,
    you can see there will be new tables and stored procedures in the selected database.


    Adding only the services that are going to be used is a practice of minimalism.
    Features have a tendency to be used if they are available, so by withholding the
    services that you do not plan to use, you save yourself the trouble of watching
    over them.'
