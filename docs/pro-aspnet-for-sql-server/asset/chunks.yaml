- fmt: 'With all of the suggestions covered to this point in the chapter, you should
    have several options to choose from when you start to experience growing pains.
    Unfortunately, there is a lot of space between knowing what you can do to improve
    the scalability of your application and being able to actually do it. And as much
    as you do not want to immediately set out to make your little website scalable
    to 1 billion users, you also should not ignore that your software should be flexible
    enough to adapt to your changing needs.


    ## Building a Flexible Web Application


    Throughout this book, you have looked into the techniques and features of the
    `ASP.NET` environment that assist us with building fast websites. Now you will
    work on piecing it all together into a flexible web application that is easy to
    build and easy to adapt to changing needs. As the load on the website increases,
    the software design will allow you to change the components that need a new approach
    without forcing the entire system to change. But you want to ensure that you can
    start out with the least amount of effort. You will never get a million users
    if you never get that first user, so you will start simple with a few baseline
    requirements.


    ### Initial Design Considerations


    For starters, you will break the business objects into groupings that are managed
    with custom provider models. Each business grouping will be managed independently
    while relationships between the business objects will be addressed by the design
    of the system. You will also create prototypes for future providers to ensure
    that when it becomes necessary to distribute the application in multiple ways,
    you will be ready to do so without a significant amount of rework.


    Building a highly scalable system can be costly in terms of hardware and time,
    and because you cannot know what part of your application will need the attention
    down the road, it is best to simply be ready to adapt instead of investing all
    your time and energy on a problem that may never appear. Let the performance problems
    reveal themselves in time. You can make sure you are ready for them.


    > **Note** It is best to proactively gather metrics on everything that affects
    your application, from the number of requests per hour to the memory, disk, and
    processor usage of every server in your system. As you see the numbers change,
    you should be able to explain the changes and adapt as needed. The metrics should
    allow you to see trends so that you can get ahead of them and take the proper
    actions as necessary. And if the traffic to your website is seasonal, perhaps
    with a greater peak of traffic during a specific month, you should project that
    traffic increase by using the numbers for the month from the previous year in
    relation to the gradual changes you see happening throughout the year. Your goal
    should be to keep the capacity of your application well ahead of the projected
    use.


    ## The Sample Application


    The sample application for this chapter will be a website for a `.NET` user group.
    The website will display information about upcoming meetings, including details
    about the speakers and sponsors. It will also feature a job listing. There are
    relationships between some of these things, such as the location that will be
    associated with each event as well as each job and sponsor. The relationship to
    the location objects is a dependency that must be managed so, for example, a location
    associated with a job is not deleted when the location is also associated with
    an event.


    ### Creating the Database


    We will create the database as we have done in previous chapters by building up
    a database project with scripts to define the tables, stored procedures, and constraint
    scripts. The objects in Table 10-5 will be represented in the database.


    **Table 10-5.** Objects in the Database


    | Table | Object |

    | :--- | :--- |

    | `dug_Events` | `Event` |

    | `dug_Jobs` | `Job` |

    | `dug_JobContacts` | `JobContact` |

    | `dug_Locations` | `Location` |

    | `dug_Speakers` | `Speaker` |

    | `dug_Sponsors` | `Sponsor` |'
