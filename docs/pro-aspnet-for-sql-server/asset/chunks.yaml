  raw: 'They are not even included in the same source-control system as the software
    that uses the databases. But Visual Studio Professional Edition supports Database
    Projects that you can include alongside your website and class library projects
    and organize with your source-control system.


    **Using Database Projects**


    Instead of only creating your tables and stored procedures in the database, you
    can extract those creation scripts and place them in Database Projects. Doing
    so aligns their changes directly with applications and manages them with the same
    source-control system. This allows you to deploy every application release with
    the necessary database changes.


    **55**


    ![Image 12](index-64_1.png)


    8601Ch03CMP2 8/22/07 8:05 PM Page 56


    **56**


    C H A P T E R 3 ■ D ATA B A S E M A N A G E M E N T


    ■**Note** To use Database Projects, you must have Visual Studio Professional Edition.
    The Standard and Express editions do not recognize this project type.


    **Visual Studio**


    In Visual Studio, the Database Projects are included in the other project types
    group when you add a new project to a solution. A file manifest keeps track of
    which files are in each of the folders, as with a class library project, and when
    you add a new table or stored procedure script to a folder, you are given a quick
    start template just as with Web Forms and classes.


    But the Database Project goes beyond the mundane work of holding your Structured
    Query Language (SQL) scripts. Each project can be associated with a database connection,
    with one being marked as the default. To run a stored procedure script on the
    default database, you simply right-click on the script and select Run On. The
    results of the script will be shown in the Output window. Figure 3-1 shows how
    to create a Database Project.


    **Figure 3-1.** *Database Projects*


    Database Projects are not used as often as they should be. All too often, tables
    and stored procedures are managed directly in the database, and changes to the
    schema or stored procedures are propagated either manually or with a third-party
    tool that generates scripts by analyzing the differences between these databases.
    By developing the scripts within Visual Studio, you will better understand the
    changes and have the control you need to plan for changes. And when the database
    scripts are managed within the solution, they will also be


    8601Ch03CMP2 8/22/07 8:05 PM Page 57


    C H A P T E R 3 ■ D ATA B A S E M A N A G E M E N T


    **57**


    version-controlled with your source-control system. At each release, you should
    be able to not only build your projects, but also return the database to a state
    that works with that release.


    Relying on manual changes or tools that adapt for unmanaged changes leads to confusion
    over the state of the database schema. And although these tools can eliminate
    the need to write change scripts yourself, they should not generate so much scripting
    that it is not possible to make sense of everything that is changing.


    A silent feature built into the Run On process is dependency detection across
    table and stored procedure scripts. If you have several table scripts that must
    be run in a certain order, the dependency detection will determine the order when
    you highlight all the tables and click the Run On command. That is a real time-saver.


    Visual Studio also has the Server Explorer, where you can view the tables and
    stored procedures deployed to the database. You can open a table to view and edit
    the contents of the table. You can even start a new query window within Visual
    Studio to query the databases listed in the Server Explorer. But for a little
    more power, many developers choose to use SQL


    Server Management Studio, which has a few additional features beyond what Visual
    Studio offers.


    **SQL Server Management Studio**


    SQL Server Management Studio does everything you need to manage table creation
    and modifications. It also works great with any sort of script. I have learned
    it is a valuable tool when it is paired properly with the Database Projects available
    in Visual Studio. I first create the stubs for the tables and stored procedure
    scripts in Visual Studio and then use Management Studio to build the tables and
    stored procedures. I do so with one table and one stored procedure at a time and
    test the changes at each step.


    To create a table, I simply add a new table to the database with Management Studio
    and save it with the name I choose. Then I right-click the table in the Object
    Explorer and select Script Database As and then Create To and send it to the Clipboard.
    I move back to Visual Studio and paste the script in place and save the script.
    From that point, I can make adjustments to the script in Visual Studio, such as
    resizing the size of a VARCHAR or adding a new column.


    And to ensure that my script works after changes, I run it from Visual Studio
    against the development database. Right-click the script in the Solution Explorer
    and select Run On. The script will be run on the default database for the Database
    Project and report the result in the Output window.


    **Managing Stored Procedures**


    The process of creating stored procedures is very different from creating tables.
    In Visual Studio, you write your stored procedure script, run it against the database,
    and test it with any required parameters. As you refine the script, you will find
    that the process of deploying the stored procedure to the database to test it
    requires unnecessary overhead. Instead you can write the script in Management
    Studio and adjust it to work as a stored procedure.


    I start by declaring the variables that the script will need and then set their
    values. Then I write the rest of the script, which makes use of those variables,
    as shown in Listing 3-1.


