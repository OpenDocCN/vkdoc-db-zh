    like the SessionPageStatePersister, but instead of limiting the data to ten items,
    older data could be stored to the database in case it is needed. A scheduled job
    could purge this data nightly.


    **Paging**


    The size of the ViewState can also be reduced using paging. Consider a GridView
    that has 1,000 total items with the page size set to 10 items. Only the data for
    those 10 items will be persisted in ViewState instead of the data for all 1,000
    items. When paging is combined with the subset selection technique covered in
    the last chapter, you can ensure that only the 10 rows that are shown are pulled
    from the database, which will reduce the load on the database. You will learn
    more about the benefits of paging later when you get into building a custom databound
    control in the section “Creating a Databound Control.”


