    **149**


    **Application State**


    Application state is a global resource that every user and request will be able
    to access. You can use it to hold onto objects you will want to access quickly.
    You can place items into this collection with the Application_Start event in Global.asax
    so items are available immediately when the application first starts up. Listing
    6-1 shows how data can be stored in the application state using the Global.asax
    file in the root folder of the website. The rest of the code can be placed in
    a utility class in the App_Code folder. Listing 6-2 shows the GetApplicationState
    method, which is called by the methods in Global.asax.


    **Listing 6-1.** *Loading Data into Application State in Global.asax* void Application_Start(object
    sender, EventArgs e)


    {


    HttpContext.Current.Application["ApplicationState"] = GetApplicationState();


    }


    void Application_End(object sender, EventArgs e)


    {


    HttpContext.Current.Application["ApplicationState"] = null;


    }


    **Listing 6-2.** *GetApplicationState Method in App_Code\Utility.cs* public static
    DataSet GetApplicationState()


    {


    return HttpContext.Current.Application["Global Data"] as DataSet;


    }


    Without any additional work, the data placed in application state will not be
    updated. If an external event requires this data to be updated, a handler could
    be used to reload the data.


    Listing 6-3 shows a handler (.ashx) that can be called to reload the application
    state.


    **Listing 6-3.** *ApplicationStateHandler.ashx*


    <%@ WebHandler Language="C#" Class="ApplicationStateHandler" %> using System.Web;


    using Chapter06.ClassLibrary;


    public class ApplicationStateHandler : IHttpHandler {


    public void ProcessRequest (HttpContext context) {


    context.Response.ContentType = "text/plain";


    string action = context.Request.QueryString["action"]; if ("ReloadApplicationState".Equals(action))


    {


    8601Ch06CMP2 8/24/07 12:13 PM Page 150


    **150**


    C H A P T E R 6 ■ C A C H I N G


    context.Response.Write("Reloading Application State\n"); Domain.LoadApplicationState();


    context.Response.Write("Done.");


    }


    else


    {


    context.Response.Write("Action unknown: " + action);


    }


    }


    public bool IsReusable {


    get {


    return false;


    }


    }


    }


    Application state can hold multiple items like any collection, so a diverse set
    of data could be stored for use anytime a request would need it.


    **Session**


    A Session holds onto data for an individual user with a sliding 20-minute window.
    In Global.


    asax, you can use the Session_Start and Session_End event handlers to manage the
    life cycle of a Session, which is another collection that can hold any type of
    object. You can add data to it over time as the user uses the website. A good
    place to load up a Session is right after a user logs in to a website. It could
    hold all data relevant to that user that you expect the user will eventually request
    from the database during the visit.


    **ViewState**


    ViewState further limits the scope of the data that it holds to just the current
    page, for as long as the page maintains a postback cycle. When data is bound to
    a GridView, it will not have to hit the database on a postback, as it uses the
    ViewState to draw the GridView. You can also place additional items into the ViewState,
    which you can access on the postback, that are not attached to page elements.
    However, this is limited to objects that can be serialized for use in ViewState.


    **Current Context**


    You can also hold data in the current context, which is limited to just the current
    request. You can store data that is then shared by any control through the request
    process. Consider that if the Page_Load in your code-behind populates objects
    in the context, all user controls included in that page will then be able to use
    it instead of going to the database to get the data. In the case of a product
    detail page, you may break up sections of the page into user controls to simplify
    maintenance, but with a page holding five user controls, you could be hitting
    the


