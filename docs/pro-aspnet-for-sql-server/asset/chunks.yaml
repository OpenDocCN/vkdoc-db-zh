- fmt: "### Listing 10-15. *SpeakerSection.cs*\n\n```csharp\nnamespace DotnetUserGroup.DataAccess.Speakers\n\
    {\n    public class SpeakerSection : ProviderConfigurationSection\n    {\n   \
    \     [ConfigurationProperty(\"providers\")]\n        public override ProviderSettingsCollection\
    \ Providers\n        {\n            get { return (ProviderSettingsCollection)base[\"\
    providers\"]; }\n        }\n\n        [StringValidator(MinLength = 1)]\n     \
    \   [ConfigurationProperty(\"defaultProvider\", DefaultValue = \"SqlSpeakerProvider\"\
    )]\n        public override string DefaultProvider\n        {\n            get\
    \ { return (string)base[\"defaultProvider\"]; }\n            set { base[\"defaultProvider\"\
    ] = value; }\n        }\n    }\n}\n```\n\nimplementation for each provider initially\
    \ but later configure a new `SpeakerProvider` implementation that integrates with\
    \ an existing speaker database. All that is needed is the assembly that holds\
    \ the class that inherits from the abstract `SpeakerProvider` class and an update\
    \ to the configuration to point to the new class and assembly. The change is then\
    \ configured with the respective provider section.\n\nEach custom provider defines\
    \ a configuration section that inherits from the standard class named `ConfigurationSection`.\
    \ Listing 10-15 shows the `SpeakerSection` class.\n\nThe custom configuration\
    \ in Chapter 9 simply defined a placeholder for a couple of configuration values.\
    \ In Listing 10-15, the provider section defines a property named `Providers`,\
    \ which leads to the `ProviderSettingsCollection`, as well as a property named\
    \ `DefaultProvider`, which points to the provider to use when a name is not given.\
    \ This should remind you of the standard ASP.NET providers because it is implemented\
    \ in the same way.\n\nThe `Providers` property uses the `ConfigurationProperty`\
    \ attribute to point to the related element in the configuration. The `ProviderSettingsCollection`\
    \ is a standard type that will automatically handle the configuration within the\
    \ `providers` section. Listing 10-16 shows a sample configuration for the speakers\
    \ section.\n\n### Listing 10-16. *Sample Configuration Section*\n\n```xml\n<speakers\
    \ defaultProvider=\"SqlSpeakerProvider\">\n  <providers>\n    <clear />\n    <add\
    \ name=\"SqlSpeakerProvider\"\n         connectionStringName=\"dug\"\n       \
    \  type=\"DotnetUserGroup.DataAccess.Speakers.SqlSpeakerProvider, DotnetUserGroup.DataAccess\"\
    \ />\n  </providers>\n</speakers>\n```\n\nYou can see that the `providers` element\
    \ lines up with the `Providers` property in the `SpeakerSection` class due to\
    \ the `ConfigurationProperty` attribute. Within the `providers` section, you can\
    \ `clear`, `add`, or `remove` provider definitions that must include the `name`\
    \ and `type` attributes as well as any values the provider implementation needs.\n\
    \n### Configuration Grouping\n\nEach provider section looks much the same, and\
    \ each will be a child element of the `dotnetUserGroup` element, which is associated\
