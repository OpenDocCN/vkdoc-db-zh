    **61**


    This stored procedure includes an additional location to first check whether the
    city and country combination already exists. The procedure then either runs an
    INSERT or a SELECT


    command to get the value of the LocationId, which is the output parameter. When
    saving a Location and Person, this stored procedure can be called to get the LocationId.


    Finally, a single stored procedure, shown in Listing 3-5, can be created to combine
    all this work into a single call to the database.


    **Listing 3-5.** *chpt03_SavePersonWithLocation.sql* IF EXISTS (SELECT * FROM
    sysobjects WHERE type = ''P'' AND


    name = ''chpt03_SavePersonWithLocation'')


    BEGIN


    DROP Procedure chpt03_SavePersonWithLocation


