- fmt: "When you determine that the standard SQL providers are not sufficient to handle\
    \ your needs, it is easy to create a new provider. All you need to do is inherit\
    \ from the abstract provider class, such as `EventProvider`, and implement all\
    \ of the abstract methods. Perhaps everything works as you like except for a few\
    \ minor details in one provider. You can create a new implementation for that\
    \ provider and configure your application to use it while leaving the rest of\
    \ the standard providers in place. Because they all work off of the abstract interface\
    \ defined by the base provider classes, the new implementation will work seamlessly\
    \ with the existing providers. And with the source code that you can download\
    \ for this book, you can use the existing classes as a starting point.\n\nA new\
    \ provider could be much like the standard SQL provider with a few differences,\
    \ such as adding data-caching functionality that is not included in the standard\
    \ implementations.\n\nThe design for the .NET user group website is to use output\
    \ caching on user controls to reduce the load on the database instead of placing\
    \ the caching responsibilities into the data access layer. Content such as the\
    \ event listings will not change frequently, so it is not necessary to always\
    \ get the latest data from the provider to render the page. However, you may have\
    \ different needs and may want to create a new provider that does put the caching\
    \ functionality into the data access layer. You could create a new `EventProvider`\
    \ implementation called `SqlCachedEventProvider` and use it in your application.\n\
