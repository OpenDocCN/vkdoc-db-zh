    ## CRUD 概念


    *CRUD*是*创建（Create）、读取（Read）、更新（Update）和删除（Delete）*的首字母缩写。典型的做法是为数据库中的每张表针对这些操作分别创建存储过程。在一个完全规范化的数据库结构中，这意味着会有许多可能不太有用的
    CRUD 存储过程。通过零碎地更新记录，性能可能会受到影响。通过将 CRUD 功能分组到规划好的存储过程中，可以一次更新多张表，而无需多次访问数据库。因此，并非每个数据库表总是对应四个存储过程。


    存储过程不仅仅是返回`SELECT`语句的结果。一个存储过程可能只是设置一个输出参数的值。在将数据保存到数据库的情况下，它可能只返回所保存记录的键值。清单
    3-3 展示了如何保存一个人。


    ### 清单 3-3. `chpt03_SavePerson.sql`


    ```sql

    IF EXISTS (SELECT * FROM sysobjects WHERE type = ''P''

    AND name = ''chpt03_SavePerson'')

    BEGIN

    DROP Procedure chpt03_SavePerson

    END

    GO


    CREATE Procedure dbo.chpt03_SavePerson

    (

    @FirstName varchar(50),

    @LastName varchar(50),

    @BirthDate datetime,

    @LocationId bigint,

    @PersonId bigint OUTPUT

    )

    AS

    INSERT into chpt03_Person

    (FirstName, LastName, BirthDate, LocationID)

    values (@FirstName, @LastName, @BirthDate, @LocationID)

    SET @PersonId = @@IDENTITY

    GO


    GRANT EXEC ON chpt03_SavePerson TO PUBLIC

    GO

    ```


    这个存储过程插入一个新的人员记录并为`PersonId`设置输出参数。请注意，顶部附近定义的`PersonId`参数带有`OUTPUT`标记，表明它是一个输出参数。如果你善加利用，访问这类值会变得非常有用。人员表(`Person`)与地点表(`Location`)存在关系，并接受`LocationId`作为参数。不能使用任意值，因此应该使用一个真实的值。


    清单 3-4 展示了如何保存一个地点的过程。


    ### 清单 3-4. `chpt03_SaveLocation.sql`


    ```sql

    IF EXISTS (SELECT * FROM sysobjects WHERE type = ''P'' AND

    name = ''chpt03_SaveLocation'')

    BEGIN

    DROP Procedure chpt03_SaveLocation

    END

    GO


    CREATE Procedure dbo.chpt03_SaveLocation

    (

    @City varchar,

    @Country varchar,

    @LocationId bigint OUTPUT

    )

    AS

    IF NOT EXISTS (

    SELECT * FROM chpt03_Location

    WHERE City = @City and Country = @Country

    )

    BEGIN

    -- INSERT

    PRINT ''Inserting Location''

    INSERT into chpt03_Location

    (City,Country)

    values (@City, @Country)

    SET @LocationId = @@IDENTITY

    END

    ELSE

    BEGIN

    -- get LocationId

    PRINT ''Location Exists''

    SET @LocationId = (

    SELECT LocationId FROM chpt03_Location

    WHERE City = @City and Country = @Country

    )

    END

    GO


    GRANT EXEC ON chpt03_SaveLocation TO PUBLIC

    GO

    ```


    这个存储过程包含了一个额外的逻辑，首先检查城市和国家的组合是否已存在。然后，该过程要么运行`INSERT`命令，要么运行`SELECT`命令来获取`LocationId`的值，也就是输出参数。在保存地点和人员时，可以调用此存储过程来获取`LocationId`。


    最后，可以创建一个单独的存储过程（如清单 3-5 所示），将所有这些工作组合到对数据库的一次调用中。


    ### 清单 3-5. `chpt03_SavePersonWithLocation.sql`


    ```sql

    IF EXISTS (SELECT * FROM sysobjects WHERE type = ''P'' AND

    name = ''chpt03_SavePersonWithLocation'')

    BEGIN

    DROP Procedure chpt03_SavePersonWithLocation

    END

    GO


    CREATE Procedure dbo.chpt03_SavePersonWithLocation

    (

    @FirstName varchar(50),

    @LastName varchar(50),

    @BirthDate datetime,

    @City varchar,

    @Country varchar,

    @LocationId bigint OUTPUT,

    @PersonId bigint OUTPUT

    )

    AS

    EXEC chpt03_SaveLocation @City, @Country, @LocationId OUTPUT

    EXEC chpt03_SavePerson @FirstName, @LastName, @BirthDate, @LocationId,

    @PersonId OUTPUT

    GO


    GRANT EXEC ON chpt03_SavePersonWithLocation TO PUBLIC

    GO

    ```

    '
- fmt: 'Fewer trips to the database makes for a more efficient application. It also
    gives you some flexibility with how the tables are organized in the database.
    Schema changes could be completely encapsulated behind the stored procedures so
    that the applications using the database require no changes.


    ## Managing Indexes and Constraints


    As you add tables that have foreign key constraints, you will start to run into
    some complications. You cannot drop a table if there are foreign key dependencies
    preventing that action. To get past this problem, I create a folder in each Database
    Project called Constraints, which has a script to add all the foreign key constraints
    and another to remove them. I also often have a script that will purge all data
    and fill in some initial sample data. When I change several table scripts, I can
    remove the constraints, run the table scripts, and repopulate the database with
    sample data so I can test the stored procedures.


    There are no templates for Database Projects to check indexes and foreign keys,
    so you have to start from scratch. The best feature of table and stored procedure
    templates is the check for the existence of an item that needs to be dropped before
    it is re-created so that you can run the script without errors.


    ### Managing Indexes


    For the Person and Location tables, there are just three indexes. The scripts
    to manage the indexes are created by using Management Studio. The scripts were
    first added to the tables, and before saving the change I used the `Generate Change
    Script` button on the taskbar, which displays the script used to make an individual
    change. I copied and pasted that script into the script to add indexes. This script
    does not check whether the index already exists, so the query to check for these
    indexes must be included before the `CREATE INDEX` command to be run successfully
    each time.


    #### Removing Indexes


    Listing 3-6 shows the script that removes indexing.


    **Listing 3-6.** *Remove Indexing.sql*


    ```sql

    BEGIN TRANSACTION


    GO


    IF EXISTS


    (SELECT * FROM sysindexes AS i


    JOIN sysobjects AS o on i.id = o.id


    WHERE o.name = ''chpt03_Location'' and i.name =


    ''IX_chpt03_Location_City'')


    BEGIN


    PRINT ''Dropping index IX_chpt03_Location_City''


    DROP INDEX IX_chpt03_Location_City ON dbo.chpt03_Location END


    GO


    IF EXISTS


    (SELECT * FROM sysindexes AS i


    JOIN sysobjects AS o on i.id = o.id


    WHERE o.name = ''chpt03_Location'' and i.name =


    ''IX_chpt03_Location_Country'')


    BEGIN


    PRINT ''Dropping index IX_chpt03_Location_Country''


    DROP INDEX IX_chpt03_Location_Country ON dbo.chpt03_Location END


    GO


    IF EXISTS


    (SELECT * FROM sysindexes AS i


    JOIN sysobjects AS o on i.id = o.id


    WHERE o.name = ''chpt03_Person'' and i.name =


    ''IX_chpt03_Person_BirthDate'')


    BEGIN


    PRINT ''Dropping index IX_chpt03_Person_BirthDate''


    DROP INDEX IX_chpt03_Person_BirthDate ON dbo.chpt03_Person END


    GO


    COMMIT

    ```


    The `sysindexes` and `sysobjects` tables provide the information needed to detect
    whether an index already exists so the `DROP` command can be run conditionally
    to avoid any errors.


    Removing indexing makes the process of adding lots of data to tables much faster
    because the indexes do not have to be checked and maintained for each insert when
    it is removed. After the index can be added back, the script in Listing 3-7 can
    be run. After the indexes are back in place, queries should run much faster when
    there is a lot of data.


    #### Adding Indexes


    **Listing 3-7.** *AddIndexing.sql*


    ```sql

    BEGIN TRANSACTION


    GO


    IF NOT EXISTS


    (SELECT * FROM sysindexes AS i


    JOIN sysobjects AS o on i.id = o.id


    WHERE o.name = ''chpt03_Location'' and i.name =


    ''IX_chpt03_Location_City'')


    BEGIN


    PRINT ''Adding index IX_chpt03_Location_City''


    CREATE NONCLUSTERED INDEX


    IX_chpt03_Location_City ON dbo.chpt03_Location


    (


    City


    ) WITH( STATISTICS_NORECOMPUTE = OFF, IGNORE_DUP_KEY = OFF, ALLOW_ROW_LOCKS =
    ON, ALLOW_PAGE_LOCKS = ON)


    ON [PRIMARY]


    END


    GO


    IF NOT EXISTS


    (SELECT * FROM sysindexes AS i


    JOIN sysobjects AS o on i.id = o.id

    ```'
