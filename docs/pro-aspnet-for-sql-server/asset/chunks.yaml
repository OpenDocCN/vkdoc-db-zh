  raw: 'When you determine that the standard SQL providers are not sufficient to handle
    your needs, it is easy to create a new provider. All you need to do is inherit
    from the abstract provider class, such as EventProvider, and implement all of
    the abstract methods. Perhaps everything works as you like except for a few minor
    details in one provider. You can create a new implementation for that provider
    and configure your application to use it while leaving the rest of the standard
    providers in place. Because they all work off of the abstract interface defined
    by the base provider classes, the new implementation will work seamlessly with
    the existing providers. And with the source code that you can download for this
    book, you can use the existing classes as a starting point.


    A new provider could be much like the standard SQL provider with a few differences,
    such as adding data-caching functionality that is not included in the standard
    implementations.


    The design for the .NET user group website is to use output caching on user controls
    to reduce the load on the database instead of placing the caching responsibilities
    into the data access layer. Content such as the event listings will not change
    frequently, so it is not necessary to always get the latest data from the provider
    to render the page. However, you may have different needs and may want to create
    a new provider that does put the caching functionality into the data access layer.
    You could create a new EventProvider implementation called SqlCachedEventProvider
    and use it in your application.


    **Implementing a LINQ Provider**


    Beyond using ADO.NET and the Enterprise Library, we can also now start using LINQ,
    which is currently out as a CTP. The final release of the .NET 3.5 runtime and
    Visual Studio 2008 is scheduled for February of 2008\. When LINQ is finally released,
    it will change how we work with data. LINQ, or Language Integrated Query, is a
    language extension that introduces dynamic language features into C#. What it
    does is enable us to query objects by using a syntax similar to SQL. You may have
    a large collection of Event objects and want to get a list of the events that
    are going to be at a certain location in the next six months. A LINQ query can
    get you that result from C# without having the database involved.


