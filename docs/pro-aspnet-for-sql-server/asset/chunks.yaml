  trans: "\n您还可以利用匿名配置文件来跟踪用户行为，将其操作记录至数据库。每当用户返回网站时，系统将记录此次访问。当用户深入浏览某个栏目并查看具体文章时，您也可以记录该细节。后续可分析所有这些数据，从而掌握访问网站的用户画像。或许您之后会将用户细分为七个群体，将长期用户分配到其中一个群体，并开始主动调整网站的功能、内容和广告以适应这些群体。\n\
    \n## 配置匿名配置文件\n\n匿名配置文件默认未启用，因此您需要将该设置添加到配置中（参见清单 5-7）。\n\n**清单 5-7.** 启用匿名配置文件\n\
    \n```\n<anonymousIdentification\n    enabled=\"true\"\n    cookieName=\".ASPXANONYMOUS\"\
    \n    cookieTimeout=\"144000\"\n    cookieSlidingExpiration=\"true\"/>\n```\n\n\
    此配置为匿名会话设置了 100 天的超时时间，并启用滑动过期。如果打算启用匿名配置文件，您需要权衡其利弊。虽然让成千上万的匿名配置文件用户在考虑是否购买商品时使用您的商务网站将商品添加到购物篮系统会带来好处，但让所有这些匿名配置文件占用数据库空间也会产生成本。\n\
    \n## 管理匿名配置文件\n\n如果将超时时间设置为四周并启用滑动过期窗口，您可以认为四周内没有任何活动的匿名账户已不活跃，因为用户将无法重新连接到该配置文件。识别出这些非活动配置文件后，您可以从系统中清除它们。如果某些配置文件未存储重要数据，甚至可以更早清除部分配置文件。您会发现搜索引擎和其他自动化程序生成了大量匿名会话。这类匿名配置文件将构成数据库中配置文件的很大一部分。\n\
    \n您可以编写查询来识别数据库中的配置文件，并编写脚本来清除这些配置文件，但幸运的是，`Membership API` 已预见到此需求，因此您无需完成所有这些工作。\n\
    \n清单 5-8 展示了 `Web Form` 上一个按钮的事件处理程序。它可以放置在网站管理部分某个页面的后台代码中。当您想要清除非活动配置文件时，可以使其执行以下代码行。\n\
    \n**清单 5-8.** 使用 `Button1` 删除非活动配置文件\n\n```\nprotected void Button1_Click(object\
    \ sender, EventArgs e)\n{\n    ProfileManager.DeleteInactiveProfiles(\n      \
    \  ProfileAuthenticationOption.Anonymous,\n        DateTime.Now.AddMonths(-1));\n\
    }\n```\n\n此代码删除过去一个月内没有任何活动的所有匿名配置文件。`ProfileAuthenticationOption` 枚举还包括 `Authenticated`\
    \ 或 `All` 值，以便您能够删除任何配置文件。这仍然是手动过程。最好安排脚本在每晚运行，以维持一个滚动窗口，持续删除所有非活动配置文件。当 `MembershipProvider`\
    \ 以 `SQL Server` 为后端时，您可以利用 `SqlMembershipProvider` 调用的存储过程 `aspnet_Profile_DeleteInactiveProfiles`。您必须传入应用程序名称、配置文件选项以及配置文件处于活动状态以来的日期。配置文件选项\
    \ `0` 表示匿名，`1` 表示已认证，`2` 表示两种配置文件类型。清单 5-9 展示了删除非活动配置文件的代码。\n\n**清单 5-9.** 使用\
    \ T-SQL 删除非活动配置文件\n\n```\nDECLARE @PurgeDate DATETIME\nSET @PurgeDate = DATEADD(DAY,\
    \ -60, GETDATE())\nEXEC aspnet_Profile_DeleteInactiveProfiles 'appName', 0, @PurgeDate\n\
    ```\n\n将此脚本设置为每晚运行，应能保持您的数据库清除不必要的配置文件数据。脚本设置为回溯 60 天，但 14 天可能更合适。\n"
- fmt: "8601Ch05CMP3 8/27/07 8:05 AM Page 121\n\n# CHAPTER 5 ■ SQL PROVIDERS\n\n121\n\
    \n## Anonymous and Authenticated Profile Differences\n\nThe time-out for anonymous\
    \ sessions can be different from the time-out for the authenticated sessions,\
    \ but that is not the only difference. As discussed in the first chapter, custom\
    \ properties can be allowed to require authenticated profiles. Keeping the anonymous\
    \ profile properties to a minimum will help keep the size down for the anonymous\
    \ profile data in the database. The custom properties to record the font size\
    \ and profile group are shown in Listing 5-10.\n\n### Listing 5-10. Custom Profile\
    \ Properties\n\n```\n<properties>\n<add name=\"FontSize\" type=\"String\" allowAnonymous=\"\
    true\" defaultValue=\"10\" />\n<add name=\"ProfileGroup\" type=\"String\" allowAnonymous=\"\
    false\" />\n</properties>\n```\n\n## Migrating from Anonymous to Authenticated\n\
    \nWhen a user creates an account or logs in to your website, that user will carry\
    \ along with him his anonymous profile. The cookie for it will still be set in\
    \ his browser, and the profile values associated with the anonymous profile will\
    \ still be in your database. What I typically want to do is remove that cookie\
    \ and copy forward any values that make sense.\n\nIn the first chapter, I explained\
    \ that I managed an association to a shopping basket with the Guid value from\
    \ the authenticated or anonymous profile. But when a user did come to the site\
    \ from a different computer, add items to an anonymous basket, and then finally\
    \ log in while making purchases, I did not want to lose the items placed in the\
    \ anonymous basket. To bring these basket items over to the authenticated account,\
    \ I handled the `Profile_MigrateAnonymous` event, which is a global application\
    \ event in `Global.asax`.\n\nBut I did not just blindly replace the authenticated\
    \ basket with the anonymous basket. It was necessary to merge the baskets by adding\
    \ items. If the user had logged in to that account from home the day before and\
    \ added a couple of items to the basket and then while at work the next day added\
    \ more items to a fresh anonymous basket, that user would effectively have two\
    \ baskets. When logging in, the `Profile_MigrateAnonymous` event fires, and I\
    \ simply add the items from the anonymous basket to the authenticated basket and\
    \ display the merged basket.\n\nThe alternative was to either completely forget\
    \ the items in the anonymous basket or to replace the authenticated basket with\
    \ the anonymous basket. Moving the items from the anonymous basket to the authenticated\
    \ basket was the ideal choice.\n\nSometimes your profile may hold data that you\
    \ cannot handle in this way. The simple example of font size preference shows\
    \ how you may have selected one size when you first created your profile, and\
    \ when you log in from another computer, you do not just want to override your\
    \ authenticated profile value with the anonymous value. Perhaps the exception\
    \ would be if the authenticated value is set as the default and the anonymous\
    \ value is not the default. In that case, it may be helpful to take in the value\
    \ to maintain some consistency as the user continues using the website. The code\
    \ in Listing 5-11 handles the `Profile_MigrateAnonymous` in `Global.asax` to migrate\
    \ the `FontSize` property and then removes all traces of the anonymous profile.\n\
    \n![Image 19](index-129_1.png)\n\n8601Ch05CMP3 8/27/07 8:05 AM Page 122\n\n122\n\
    \nCHAPTER 5 ■ SQL PROVIDERS\n\n### Listing 5-11. Migrating an Anonymous Profile\n\
    \n```\nvoid Profile_MigrateAnonymous(object sender, ProfileMigrateEventArgs e)\n\
    {\n    ProfileCommon anonymousProfile = Profile.GetProfile(e.AnonymousID);\n \
    \   string defaultFontSize = \"10\";\n    if (defaultFontSize.Equals(Profile.FontSize)\
    \ &&\n        !defaultFontSize.Equals(anonymousProfile.FontSize))\n    {\n   \
    \     Profile.FontSize = anonymousProfile.FontSize;\n    }\n    // remove the\
    \ anonymous user, profile, and cookie\n    Membership.DeleteUser(e.AnonymousID,\
    \ true);\n    ProfileManager.DeleteProfile(e.AnonymousID);\n    AnonymousIdentificationModule.ClearAnonymousIdentifier();\n\
    }\n```"
