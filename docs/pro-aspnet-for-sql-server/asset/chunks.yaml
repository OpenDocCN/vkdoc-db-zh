- fmt: 'what line the ball is on, who has possession, and what down it is. Often these
    are Adobe Flash applications, which can reach out to different sources other than
    just the web server serving up the web pages and can work with a data stream that
    is optimized to reduce the overall bandwidth requirements. Sending a 4 KB data
    stream is definitely preferable to having the user refresh a 50 KB page for each
    update. By managing the flow of data by an alternate, more efficient communication
    scheme, the high load is more easily managed.


    ## Distributing Traffic


    Traffic can be distributed so that while you are getting 500,000 hits per day,
    you could spread them across five servers to make it effectively 100,000 hits
    per day per server. This web farm approach is pretty common and is supported by
    load-balancing hardware. You can even leverage the fact that one hostname can
    be associated with multiple IP addresses through the Domain Name System (DNS).
    When a hostname has multiple IP addresses for a website, the web browser will
    circulate through each of the IP addresses. This technique is called `Round Robin
    DNS`. Sites such as `www.cnn.com` and `www.microsoft.com` have multiple IP addresses
    configured for their website addresses to benefit from distributing the load.
    Figure 10-1 shows the result of running the utility `nslookup` on `www.cnn.com`
    and `www.microsoft.com`. You can see that there are multiple IP addresses for
    both websites.


    **Figure 10-1.** `Round Robin DNS`


    A web farm made up of multiple servers running off a common database server can
    effectively distribute the processing load, and with a good data-caching policy,
    a web farm can also reduce the load on the database.


    Beyond using a logical distribution through DNS alone, you can also distribute
    the hardware to multiple physical networks. You may place servers at hosting facilities
    in a few major cities that have access to a major backbone of the Internet, which
    will guarantee reliable and fast access to your website for all of your users.
    I live in Milwaukee and remember that back in 1998 there were a few times that
    major lines between Milwaukee and Chicago were cut off as new lines were being
    installed. At the time, there were no redundant lines going to other locations
    such as Madison and Minneapolis as they do today. We got calls from customers
    saying they could not reach the websites we were hosting for them even though
    they were online and even reachable from different locations within the city.
    If these websites were co-located at multiple hosting facilities, they may have
    been inaccessible to only a small portion of users or none at all.


    ## Distributing Content


    While distributing the traffic to a website offers speed of access and reliability,
    you can also achieve similar benefits by distributing the content that you are
    publishing. Much of the bandwidth on your website is likely due to images and
    other static media. There is no reason it all has to come from the same web server.
    You could publish your ASP.NET website with all dynamic pages on one server and
    all media on another, or perhaps distribute the media across many servers. The
    server producing the dynamic pages will then be freed up to handle personalized
    content.


    For years Apple, Microsoft, `Amazon.com`, and Facebook have used services that
    spread their media across a vast network of web servers to allow them to cope
    with traffic spikes affecting them regularly as they announce new products and
    services.


    ### HOSTING ON AKAMAI


    The popular content distribution network used by the major websites for years
    has been `Akamai` (`www.akamai.com`). The primary service it offers has been image
    caching, although it has expanded to dynamic and personalized content. If you
    were to look up `images.apple.com`, you will see underneath the hostname that
    `Akamai` is hosting the content.


    A useful aspect of distributing the content to separate websites is that you can
    fully leverage the delivery mechanisms provided by HTTP, such as the expiration
    header (one of many headers that precede the content of a response from your web
    server). When you use output caching, the expiration header is set. If the user
    returns to that page within the expiration period, that user’s web browser may
    simply read the content from the local browser cache.


    Client-side caching is further enhanced when a large group of users are behind
    a caching proxy that uses the expiration headers to hold onto the content from
    your website for all users so that you do not have to serve up every request.
    The large Internet service providers (ISPs) such as AOL have used massive proxies
    to reduce the bandwidth on their networks to benefit their users and reduce their
    costs. Reducing bandwidth was a major concern for AOL when most of its users were
    on dial-up modems and bandwidth was limited. More recently, Google has offered
    their web accelerator service, which is essentially a massive proxy that caches
    a great deal of content. However, it cannot cache dynamic content, which includes
    every ASP.NET website that is generated without output caching enabled.


    If your website has a great deal of static content, such as images, style sheets,
    and JavaScript, you could benefit greatly from client-side caching, although these
    benefits are not guaranteed. In fact, having this sort of content on an ASP.NET
    website can prevent it from being cached as much as it could be, because every
    piece of content on an ASP.NET website is associated with the cookies that make
    up the anonymous and authenticated sessions. A caching proxy will have to assume
    that the static content that a user pulls from your website that comes with a
    cookie must be unique to that user. The proxy will then not cache that same 35
    KB header graphic used on every page of your website for all users behind the
    shared proxy. What you can do is place your static content onto a sub-domain that
    is not configured as an ASP.NET website, so that there are absolutely no cookies
    involved. You will need to ensure that if your main website is running at `www.acme.com`
    and your images are running at `images.acme.com`, your cookies are not set to
    be coming generically from `acme.com`, which would cause the cookies to be associated
    with the images.


    After your static content meets the standards that most proxies follow, you will
    start to benefit from truly distributing your content by leveraging resources
    beyond your direct control. However, you will need to be careful with the static
    content. I learned about the problem that proxies have with cookies from a presentation
    by a developer from Yahoo! who explained that they have a one-time-use policy
    for static images. After an image has been published, it cannot change. Instead,
    they have to publish an updated image to a new URL and point their pages to it.
    The approach is meant to ensure that their users are getting the right image regardless
    of how aggressive the client-side caching is. The same could be done for JavaScript,
    which has again become a critical part of modern web applications.


    ### DEVELOPING WITH STATIC FILES'
