  trans: "# 第七章：手动数据访问层\n\n## 保存数据\n\n接下来，用于通过插入或更新来保存链接的存储过程提出了一个更具挑战性的要求。该过程不仅要保存链接的核心详细信息，还必须获取\
    \ `Title` 和 `Url` 值，将它们存储到辅助表中，同时避免为相同的值创建重复记录。表的设计允许一条 `Favorite Link` 记录指向其他\
    \ `Favorite Link` 记录已在使用的同一个 `Url` 记录。\n\n所有协调此操作的工作都将在 `chpt07_SaveFavoriteLink`\
    \ 存储过程中进行管理。首先，该存储过程将接收保存数据所需的所有参数，如代码清单 7-13 所示。\n\n**代码清单 7-13.** `chpt07_SaveFavoriteLink`\
    \ 的参数\n\n```sql\nCREATE Procedure dbo.chpt07_SaveFavoriteLink\n(\n    @ProfileID\
    \ bigint,\n    @Url nvarchar(250),\n    @Title nvarchar(150),\n    @Keeper bit,\n\
    \    @Rating smallint,\n    @Note nvarchar(500),\n    @Created datetime,\n   \
    \ @Modified datetime,\n    @OldFavoriteLinkID bigint,\n    @FavoriteLinkID bigint\
    \ OUTPUT\n)\n```\n\n处理保存过程的第一步是将 `Url` 和 `Title` 值保存到辅助表，并取回 `ID` 值以用于外键引用。代码清单\
    \ 7-14 展示了如何开始。\n\n**代码清单 7-14.** 保存 Title 和 Url 值\n\n```sql\nDECLARE @LinkUrlID\
    \ int\nDECLARE @LinkTitleID int\nEXEC chpt07_SaveLinkUrl @Url, @LinkUrlID OUTPUT\n\
    EXEC chpt07_SaveLinkTitle @Title, @LinkTitleID OUTPUT\n```\n\n在 `LinkUrlID` 和\
    \ `LinkTitleID` 的值设置好之后，就可以保存主记录了。因为这是一个保存例程，该过程可能是插入一个新记录，也可能是更新一个记录。在决定是插入还是更新之前，必须检查\
    \ `@OldFavoriteLinkID` 的值。如果该值为正数，则表示保存操作意在更新一个已知的现有记录。此外，如果 `@OldFavoriteLinkID`\
    \ 值为负数（意味着未定义），则应检查是否已存在具有相同 `Url` 和 `Title` 值的 `Favorite Link` 记录。代码清单 7-15 中的代码处理这项工作。\n\
    \n**代码清单 7-15.** 检查现有记录\n\n```sql\nIF (@OldFavoriteLinkID < 0 AND EXISTS (\n \
    \   SELECT * FROM chpt07_FavoriteLinks\n    WHERE LinkUrlID = @LinkUrlID AND ProfileID\
    \ = @ProfileID\n))\nBEGIN\n    SET @OldFavoriteLinkID =\n        (SELECT FavoriteLinkID\
    \ FROM chpt07_FavoriteLinks\n         WHERE LinkUrlID = @LinkUrlID AND ProfileID\
    \ = @ProfileID)\nEND\n```\n\n最后，我们应该能够根据 `@OldFavoriteLinkID` 的值是否指向指定配置文件的一个现有记录来决定执行插入还是更新。如果记录确实存在，则执行插入。否则，执行更新，如代码清单\
    \ 7-16 所示。\n\n**代码清单 7-16.** 通过插入或更新进行保存\n\n```sql\nIF EXISTS (SELECT * FROM chpt07_FavoriteLinks\n\
    \    WHERE FavoriteLinkID = @OldFavoriteLinkID\n    AND ProfileID = @ProfileID)\n\
    BEGIN\n    UPDATE chpt07_FavoriteLinks\n    SET\n        LinkUrlID = @LinkUrlID,\n\
    \        LinkTitleID = @LinkTitleID,\n        Keeper = @Keeper,\n        Rating\
    \ = @Rating,\n        Note = @Note,\n        Modified = GETDATE()\n    WHERE\n\
    \        FavoriteLinkID = @OldFavoriteLinkID AND\n        ProfileID = @ProfileID\n\
    \    SET @FavoriteLinkID = @OldFavoriteLinkID\nEND\nELSE\nBEGIN\n    INSERT INTO\
    \ chpt07_FavoriteLinks\n        (ProfileID, LinkUrlID, LinkTitleID, Keeper,\n\
    \        Rating, Note, Created, Modified)\n    VALUES (\n        @ProfileID,\n\
    \        @LinkUrlID,\n        @LinkTitleID,\n        @Keeper,\n        @Rating,\n\
    \        @Note,\n        @Created,\n        @Modified\n    )\n    SELECT @FavoriteLinkID\
    \ = @@IDENTITY\nEND\nGO\n```\n\n在任何一种情况下，`@FavoriteLinkID` 的值都会被设置为受影响记录的标识，该值作为一个输出参数提供给存储过程的调用者。\n\
    \n## 删除数据"
- fmt: '


    ## Deleting Data


    The last major work handled by the stored procedures is deleting data. For the
    `FavoriteLinks` database, it is easy to remove a reference to a `TagToken` record
    that drops the tag association from a `Favorite Link` record, but it is not a
    small matter of a single `DELETE` statement. To remove all `TagToken` records
    that are no longer being referenced, a few steps must be completed, starting in
    Listing 7-17.


    ### Listing 7-17. First Step of the RemoveLinkTag Stored Procedure


    ```sql

    CREATE Procedure dbo.chpt07_RemoveLinkTag

    (

    @FavoriteLinkID bigint,

    @Token nvarchar(30)

    )

    AS

    DECLARE @LinkTagID bigint

    SET @LinkTagID = (

    SELECT TOP 1 lt.LinkTagID

    FROM chpt07_LinkTags AS lt

    JOIN chpt07_TagTokens AS tt ON tt.TagTokenID = lt.TagTokenID

    WHERE lt.FavoriteLinkID = @FavoriteLinkID AND tt.Token = @Token

    )

    DELETE FROM chpt07_LinkTags WHERE LinkTagID = @LinkTagID

    ```


    This first step takes the `@FavoriteLinkID` and `@Token` parameters and gets the
    value for the `@LinkTagID`. After the ID is known, the record can be deleted.
    Now we must check whether the `@Token` value is referenced by any other records,
    as shown in Listing 7-18.


    ### Listing 7-18. Counting the Token References


    ```sql

    DECLARE @TokenCount int

    SET @TokenCount = (

    SELECT COUNT(*)

    FROM chpt07_LinkTags AS lt

    JOIN chpt07_TagTokens AS tt ON tt.TagTokenID = lt.TagTokenID

    WHERE tt.Token = @Token

    )

    ```


    8601Ch07CMP2 8/24/07 12:23 PM Page 214 **214** C H A P T E R 7 ■ M A N U A L D
    ATA A C C E S S L AY E R


    If the count is zero, we know there are no references to it and the record can
    safely be deleted in the final step, shown in Listing 7-19.


    ### Listing 7-19. Deleting the Token Record


