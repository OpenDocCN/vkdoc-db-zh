    Chapter08.BlinqDAL.Person\"\n    OldValuesParameterFormatString=\"original_{0}\"\
    \n    ConflictDetection=\"CompareAllValues\"\n    SelectMethod=\"GetPerson\"\n\
    \    InsertMethod=\"Insert\"\n    UpdateMethod=\"Update\"\n    DeleteMethod=\"\
    Delete\"\n    EnableCaching=\"True\">\n    <SelectParameters>\n        <asp:QueryStringParameter\
    \ QueryStringField=\"ID\"\n            Name=\"ID\"\n            ConvertEmptyStringToNull=\"\
    False\">\n        </asp:QueryStringParameter>\n    </SelectParameters>\n</asp:ObjectDataSource>\n\
    ```\n\n`Blinq` 在 `Chapter08.BlinqDAL` 命名空间中创建的 `Person` 类包括 `GetPerson`、`Insert`、`Update`\
    \ 和 `Delete` 方法。用于查询数据库中单个记录的 `ID` 值被设置为从查询字符串中提取。\n\n`Blinq` 生成的代码放置在网站的 `App_Code`\
    \ 文件夹中的两个源文件 `Chapter08.cs` 和 `StaticMethods.cs` 中。第一个源文件的名称来自数据库的名称。你可以将这些文件提取到一个类库中，以便从中心点作为依赖项重用它们。`Blinq`\
    \ 如此有趣的原因在于它用于处理数据的代码是多么简单和切中要害。清单 8-23 显示了 `Person` 类中的 `GetPerson` 方法。\n\n**清单\
    \ 8-23.** `GetPerson` 方法\n```\npublic static Person GetPerson(Int64 ID) {\n  \
    \  Chapter08 db = Chapter08.CreateDataContext();\n    return db.Persons.Where(x=>x.ID\
    \ == ID).FirstOrDefault();\n}\n```\n\n查询只有一行。另一端没有存储过程。`LINQ` 系统创建所有必要的 `SQL`，并使用它来获取数据并填充\
    \ `Person` 对象。\n\n就这样！`LINQ` 查询简单地将 `ID` 列与传入该方法的 `ID` 值进行匹配。另一个方法 `GetPersonsByLocation`\
    \ 稍微复杂一些，因为它处理 `Person` 和 `Location` 表之间的关系。如清单 8-24 所示。\n\n**清单 8-24.** `GetPersonsByLocation`\
    \ 方法\n```\npublic static IQueryable<Person> GetPersonsByLocation(Int64 ID) {\n\
    \    Chapter08 db = Chapter08.CreateDataContext();\n    return db.Locations.Where(x=>x.ID\
    \ == ID).SelectMany(x=>x.Persons);\n}\n```\n\n`GetPersonsByLocation` 查询获取一个 `Location`\
    \ 的 `ID`，然后从中选择多个 `Person` 记录。正如你所看到的，这里发生了一些查询链式调用。随着你在工作中越来越多地使用 `LINQ`，这将成为一种熟悉的编码风格。一个查询的结果可以通过另一个查询进行传递，以过滤最终结果。虽然你可能认为这个查询效率低下，但你会惊喜地发现，`LINQ`\
    \ 运行时环境的内部机制处理了一些优化，从而加快了你的查询速度，同时让你编写的代码对你来说更具可读性。\n\n在第 10 章中，我将通过一系列例子更深入地探讨\
    \ `LINQ`，这些例子将更详细地解释这里发生的事情。\n\n## 总结\n\n在本章中，你了解了如何使用构建提供程序以及几个强大的实用程序来生成代码，这些实用程序会生成新的源文件。你现在应该已经了解了如何充分利用自动生成的数据访问层，节省通常编写所有代码所需的时间，同时仍然保留通过模板和部分类扩展生成代码的能力。\n\
    \n# 9 部署"
- fmt: "# 第九章 部署\n\n提升应用程序性能的最大障碍是部署成本。这个过程伴随着一定程度的风险，因为它涉及更改生产环境，可能导致停机。因此，它需要大量的质量保证测试以及发布所需的资源，这些工作可能在非工作时间进行，以最小化对应用程序用户的影响。所有这些加起来构成了一个成本高昂的过程，这可能足以将性能改进推迟到几周或几个月后的某个发布窗口。采用正确的部署模型，风险和成本可以大大降低，从而使及时的更新能够被推送到生产环境。\n\
    \n本章涵盖以下内容：\n\n*   使用`MSBuild`进行自动化\n*   部署网站\n*   部署数据库\n*   自动化配置更改\n*   自动化数据库更新\n\
    *   自定义配置节\n\n部署应用程序发布版本有正确的方式和错误的方式。几年前，我曾与一位开发者合作，他会创建生产数据库的备份，下载它，在本地还原，然后对数据库进行更改。接着，他会创建一个新的备份，上传并将其还原到服务器上。这个过程明显存在一些问题，回想起来让我既好笑又心惊。我很庆幸自己从未不得不遵循同样的流程。如今，使用可用的工具，有好得多的方法来推送更新。\n\
    \n在接触`SQL Server`之前，许多开发者通过将数据库文件上传到网站可以直接访问的服务器，将`Microsoft Access`数据库连接到经典`ASP`应用程序。由于服务器上通常没有安装`Microsoft\
    \ Access`，开发者会将应用程序下线，拉取数据库文件，更新它，然后将其放回原处并使应用程序重新上线。这个旧流程或许可以解释为什么前一个例子中的开发者对`SQL\
    \ Server`数据库使用了非常相似的流程。他只是在做他一直做的事情，尽管有更好的方法。\n\n虽然其中一些旧做法正变得罕见，但我仍然看到手动在不同环境之间进行更改。如果所有更改只是添加列和**255**\n\
    \n8601Ch09CMP2 8/24/07 4:05 PM Page 256\n\n**256**\n\n第九章 ■ 部署\n\n也许再添加一个索引，那么这些步骤在每个环境中手动执行足够容易，因此这些开发者每次都这样做，从未创建脚本来执行这些更改。此类更改的一个具体例子是将列从`varchar(20)`更改为`varchar(25)`。对于小型数据库，如此小的更改可能是可以接受的，但随着时间的推移，一些更改可能会被遗忘，数据库环境变得不一致。通过一点准备和一些自动化，您可以确保您的环境保持一致。\n\
    \n## 使用 MSBuild 自动化\n\n使用微小更改持续更新数据库可能是一项繁琐且重复的工作，但必须完成。幸运的是，这项工作可以以最小的努力实现自动化。自动化工具`MSBuild`是`.NET`平台的标准构建工具。它是一个脚本系统，使用`XML`来定义一系列包含一组任务的构建目标。目标通过依赖关系链接在一起。一旦您了解了基础知识，`Visual\
    \ Studio`将为`MSBuild`脚本提供智能感知支持，帮助您入门。\n\n`MSBuild`脚本几乎可以做任何事情。如果标准任务不能满足您的需求，您可以使用`Exec`任务调用命令行来运行其他工具，或者创建一个自定义任务。但您不希望过度使用`MSBuild`脚本。我在处理`MSBuild`脚本时遵循三个首要规则。\n\
    \n首先，我将脚本完成的工作保持在最低限度。自动化所有事情可能很诱人，但最终您将花费更多时间维护脚本，而不是在应用程序上完成工作，而应用程序应该是您的主要关注点。\n\
    \n其次，我只自动化那些我发现自己反复执行的耗时工作。\n\n每天多次花费几分钟的任务是理想的自动化候选者。虽然向脚本添加功能可能需要一段时间，但最终将为每个发布版本节省数小时的工作。\n\
    \n最后，我将脚本与解决方案一起进行版本控制。随着构建过程随时间变化，您将更新构建脚本以适应这些更改。这些调整应该与应用程序的其余部分一起在源代码管理中保持最新。当您生成发布版本时，您将能够从源代码管理中拉取较旧的版本并进行构建，即使自该版本部署以来构建过程已经发生变化。通过在源代码控制系统中使用发布分支，您可以在继续在主分支上进行开发的同时，支持应用程序的生产版本。\n\
    \n### 发布分支\n\n在源代码控制中管理项目的方法有很多。使用`Microsoft Team Foundation Server`和`Subversion`等现代源代码控制系统，您可以创建分支来隔离项目中的更改。\n\
    \n您可以为每个开发者、错误修复或您选择的任何其他原因创建分支。然而，大型团队最终采用的分支模型是*发布分支*。开发在主分支（主干）上进行，当准备发布时，会为该发布创建一个新分支，以便将其与持续开发隔离。然后应用程序从这个发布分支推送。之后，当部署的应用程序需要更新时，更改在分支上进行，并在必要时合并回主干。\n\
    \n8601Ch09CMP2 8/24/07 4:05 PM Page 257\n\n第九章 ■ 部署\n\n**257**\n\n`MSBuild`脚本是一个由三个主要元素组成的`XML`文档：`PropertyGroup`、`ItemGroup`和`Target`，它们都包含在根元素`Project`中。这是每个`MSBuild`脚本的基本结构。`PropertyGroup`元素定义了在脚本其余部分使用的属性。`ItemGroup`元素定义了属性的集合。`Target`元素包含多个任务，例如`MakeDir`和`Copy`。清单9-1\n\
    \n展示了一个基本`MSBuild`脚本的框架。\n\n**清单 9-1.** *基本 MSBuild 脚本框架*\n\n```xml\n<?xml version=\"\
    1.0\" encoding=\"utf-8\"?>\n<Project DefaultTargets=\"Build\"\n>\n  <PropertyGroup>\n\
    \    <Configuration Condition=\" '$(Configuration)' == '' \">Debug</Configuration>\n\
    \    <PackageName>MyProject</PackageName>\n    <DatabaseDirectory>Database</DatabaseDirectory>\n\
    \    <WebsiteBinDirectory>Website\\bin</WebsiteBinDirectory>\n  </PropertyGroup>\n\
    \  <ItemGroup>\n    <!-- 集合定义 -->\n  </ItemGroup>\n  <Target Name=\"Build\">\n\
    \    <!-- 构建任务 -->\n  </Target>\n</Project>\n```\n\n虽然`MSBuild`附带的标准任务涵盖了许多常见任务，但它们并未涵盖自动化构建和部署工作所需的所有内容。一个特别的任务是`Zip`任务，我经常使用它来创建文件集合，以便可以轻松地归档并在环境之间移动。幸运的是，有一个名为`MSBuild\
    \ Community Tasks`的开源项目，其中包括`Zip`任务以及许多其他有用的任务（请参阅侧栏“MSBuild 社区任务”）。\n\n### MSBuild\
    \ 社区任务\n\n`MSBuild`可以通过创建自定义任务来扩展。一个已成为自定义`MSBuild`任务聚集点的开源项目是`MSBuild Community\
    \ Tasks`项目，它不断向已相当广泛的列表中添加更多自定义任务（参见 http://msbuildtasks.tigris.org/）。诸如`Zip`、`FxCop`和`Prompt`等任务是为此脚本环境添加关键功能的几个例子。\n\
    \n8601Ch09CMP2 8/24/07 4:05 PM Page 258\n\n**258**"
  raw: '**T**he largest impedimentto improving the performance of an application is
    the cost of deployment. This process is associated with a certain amount of risk
    because it involves changing the production environment in a way that could potentially
    cause downtime. As a result, it requires a good deal of quality assurance testing
    as well as the resources necessary to push out the release, which may be done
    after hours to minimize the impact on the users of the application. This all adds
    up to a costly process, which may be enough to delay performance improvements
    until a release window that may be weeks or months away. With the right deployment
    model in place, the risk and cost can be greatly minimized so that timely updates
    can be pushed to the production environment.


    This chapter covers the following:


    • Automation with MSBuild


    • Deploying the website


    • Deploying the database


    • Automating configuration changes


    • Automating database updates


    • Custom configuration sections


    There is a right way and a wrong way to deploy your application releases. A few
    years ago I worked with a developer who would create a backup of the production
    database, download it, restore it locally, and make changes to the database. Then
    he would create a new backup, upload it, and restore it on the server. There are
    clearly some problems with this process, the memory of which makes me smile and
    cringe at the same time. I am glad that I have never had to follow this same process.
    There are far better ways to push out updates with the tools available today.


    Prior to working with SQL Server, many developers hooked up Microsoft Access databases
    to classic ASP applications by uploading a copy of the database file to the server
    where the website could directly access the file. Because Microsoft Access was
    not typically installed on the server, a developer would take the application
    offline, pull down the database file, update it, and then put it back in place
    and bring the application back online. This old process may explain why the developer
    in the previous example used a very similar process with a SQL Server database.
    He was just doing what he was always doing, even though there is a better way.


    While some of these old practices are becoming rare, I continue to see changes
    carried out manually from environment to environment. If all that was changed
    was adding columns and **255**


    8601Ch09CMP2 8/24/07 4:05 PM Page 256


    **256**


    C H A P T E R 9 ■ D E P L OY M E N T


    perhaps adding an index, the steps are easy enough to carry out manually in each
    environment, so these developers do so each time without ever creating a script
    to carry out these changes. A specific example of such a change is altering a
    column from varchar(20) to varchar(25). For small databases, such a minor change
    may be acceptable, but over time some changes may be forgotten, and the database
    environments become inconsistent. With a little preparation mixed with some automation,
    you can ensure that your environments remain consistent.


    **Automation with MSBuild**


    Updating the database with minor changes continually can be a tedious and repetitive
    job, but it has to be done. Fortunately, the job can be automated with minimal
    effort. The automation utility MSBuild is the standard build tool for the .NET
    platform. It is a scripting system that uses XML to define a series of build targets
    that include a set of tasks. The targets are chained together using dependencies.
    Visual Studio provides IntelliSense support for the MSBuild scripts that will
    help you get started once you know the basics.


    MSBuild scripts can do nearly anything. And if a standard task does not do what
    you need, you can either use the Exec task to call out to a command line to run
    another utility or create a custom task. But you do not want to go too far with
    MSBuild scripts. I follow three overriding rules when I work with MSBuild scripts.


    First, I keep the work that the script does to the bare minimum. It can be tempting
    to automate absolutely everything, but you will end up spending more time maintaining
    the script instead of getting work done on the application, which should be your
    primary concern.


    Second, I only automate the time-consuming work that I find myself doing over
    and over.


    The tasks that take several minutes multiple times a day are ideal automation
    candidates. It may take me a while to add the functionality to the script, but
    it will ultimately add up to saving many hours of work for each release.


    Finally, I keep the script’s version controlled with the solution. As the build
    process changes over time, you will update the build script to adapt to those
    changes. These adjustments should stay current with the rest of the application
    in source control. And as you produce releases, you will be able to pull an older
    version from source control and build it even if the build process has changed
    since the release was deployed. With release branching in your source control
    system, you can support a production version of the application while development
    continues on the main branch.


    **RELEASE BRANCHING**


    There are many ways to manage projects in source control. With modern source control
    systems such as Microsoft Team Foundation Server and Subversion, you can create
    branches to isolate changes on a project.


    You can create branches for each developer, bug fix, or any other reason you choose.
    However, the branching model that larger teams settle on eventually is *release
    branching*. Development is carried out on the main branch (trunk), and as releases
    are prepared, a new branch is created for the release so that it is isolated from
    continuing development. The application is then pushed from this release branch.
    Later, when the deployed application needs updates, the changes are made on the
    branch and merged back to the trunk as necessary.


