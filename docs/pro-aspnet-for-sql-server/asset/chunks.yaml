    **Automating Configuration Changes**


    The most useful feature of Web Deployment Projects is the ability to modify the
    contents of the Web.config file based on the targeted configuration. This is done
    on a section-by-section basis. The project file is an MSBuild script that runs
    a sequence of tasks that leads it to read the settings you put in place. Figure
    9-1 shows the dialog window for inserting these settings.


    **Figure 9-1.** *Configuration section replacements* The replacement section settings
    are unique for each configuration. A standard project in Visual Studio starts
    out with just the Debug and Release configurations. You can create a new one for
    each of your target environments, such as QA (Quality Assurance), Staging, and
    Production. These unique environments surely have different values for connection
    strings and perhaps other settings as well.


    The sources for your replacement sections must exist under the website that is
    being modified. The original Web.config file will not be changed. The updated
    copy of the Web.config file is placed in the output directory along with all of
    the other files for the website. To create a new configuration, you can select
    the New option from within the Configuration Manager, as shown in Figure 9-2.


    With all of your configurations defined, you can open the Property Pages for the
    Web Deployment Project. You can open the Property Pages from the context menu
    from the Web Deployment Project. The Deployment tab on the left side is where
    the configuration section replacement options are. For the Production configuration,
    you could create a folder called Config in the website and place a file named
