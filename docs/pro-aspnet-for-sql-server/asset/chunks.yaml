    **121**


    **Anonymous and Authenticated Profile Differences**


    The time-out for anonymous sessions can be different from the time-out for the
    authenticated sessions, but that is not the only difference. As discussed in the
    first chapter, custom properties can be allowed to require authenticated profiles.
    Keeping the anonymous profile properties to a minimum will help keep the size
    down for the anonymous profile data in the database. The custom properties to
    record the font size and profile group are shown in Listing 5-10.


    **Listing 5-10.** *Custom Profile Properties*


    <properties>


    <add name="FontSize" type="String" allowAnonymous="true" defaultValue="10" />


    <add name="ProfileGroup" type="String" allowAnonymous="false" />


    </properties>


    **Migrating from Anonymous to Authenticated**


    When a user creates an account or logs in to your website, that user will carry
    along with him his anonymous profile. The cookie for it will still be set in his
    browser, and the profile values associated with the anonymous profile will still
    be in your database. What I typically want to do is remove that cookie and copy
    forward any values that make sense.


    In the first chapter, I explained that I managed an association to a shopping
    basket with the Guid value from the authenticated or anonymous profile. But when
    a user did come to the site from a different computer, add items to an anonymous
    basket, and then finally log in while making purchases, I did not want to lose
    the items placed in the anonymous basket. To bring these basket items over to
    the authenticated account, I handled the Profile_MigrateAnonymous event, which
    is a global application event in Global.asax.


    But I did not just blindly replace the authenticated basket with the anonymous
    basket. It was necessary to merge the baskets by adding items. If the user had
    logged in to that account from home the day before and added a couple of items
    to the basket and then while at work the next day added more items to a fresh
    anonymous basket, that user would effectively have two baskets. When logging in,
    the Profile_MigrateAnonymous event fires, and I simply add the items from the
    anonymous basket to the authenticated basket and display the merged basket.


    The alternative was to either completely forget the items in the anonymous basket
    or to replace the authenticated basket with the anonymous basket. Moving the items
    from the anonymous basket to the authenticated basket was the ideal choice.


    Sometimes your profile may hold data that you cannot handle in this way. The simple
    example of font size preference shows how you may have selected one size when
    you first created your profile, and when you log in from another computer, you
    do not just want to override your authenticated profile value with the anonymous
    value. Perhaps the exception would be if the authenticated value is set as the
    default and the anonymous value is not the default. In that case, it may be helpful
    to take in the value to maintain some consistency as the user continues using
    the website. The code in Listing 5-11 handles the Profile_


    MigrateAnonymous in Global.asax to migrate the FontSize property and then removes
    all traces of the anonymous profile.


    ![Image 19](index-129_1.png)


    8601Ch05CMP3 8/27/07 8:05 AM Page 122


    **122**


    C H A P T E R 5 ■ S Q L P R OV I D E R S


    **Listing 5-11.** *Migrating an Anonymous Profile* void Profile_MigrateAnonymous(object
    sender, ProfileMigrateEventArgs e)


    {


    ProfileCommon anonymousProfile = Profile.GetProfile(e.AnonymousID); string defaultFontSize
    = "10";


    if (defaultFontSize.Equals(Profile.FontSize) &&


    !defaultFontSize.Equals(anonymousProfile.FontSize))


    {


    Profile.FontSize = anonymousProfile.FontSize;


    }


    // remove the anonymous user, profile, and cookie


    Membership.DeleteUser(e.AnonymousID, true);


    ProfileManager.DeleteProfile(e.AnonymousID);


    AnonymousIdentificationModule.ClearAnonymousIdentifier();


