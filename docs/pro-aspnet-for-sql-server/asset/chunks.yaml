    and your team are in the process of cleaning it up to improve maintainability.
    Later, as the code base has been refactored, you could create a new implementation
    that works with the updated system. The applications built on top of the provider
    will not have to change.


    Versioning the assemblies can also achieve a similar solution. The difference
    with providers is that you do not compile your applications directly against the
    implementation or version. You instead use the provider as an abstraction layer,
    which will use the configuration to instantiate the desired assembly. Doing so
    also avoids directly binding one assembly to a specific version of another assembly.'
