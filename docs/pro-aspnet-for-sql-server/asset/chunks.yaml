- fmt: "In the `RunSqlCommands` method, the commands passed in are run individually\
    \ inside of a transaction. If any command fails, the entire transaction will be\
    \ rolled back, and the return value that indicates whether or not the commands\
    \ executed successfully will be set to `false`.\n\n**Tip** While developing the\
    \ embedded scripts to update the database, you can leverage the fact that the\
    \ commands are run in a transaction to prevent the script from being committed.\
    \ As you add statements to the update script, you can place an invalid statement\
    \ at the very end to ensure the changes will be rolled back; this way, you can\
    \ continue working on the script without having to restore the database to the\
    \ state it was in before you executed the updates. Once you have completed the\
    \ update script to your satisfaction, you can remove the intentional error.\n\n\
    The final step to ensuring the database updates are put in place each time the\
    \ application is updated is to call the `InitializeDatabase` method each time\
    \ the application starts. For a website, this can be done using the `Application_Start`\
    \ method in the `Global.asax` file (see Listing 9-30).\n\n### Listing 9-30. Application_Start\
    \ Calling InitializeDatabase\n```csharp\nvoid Application_Start(object sender,\
    \ EventArgs e)\n{\n    DatabaseManager dbm = new DatabaseManager();\n    dbm.InitializeDatabase();\n\
    }\n```\n\nNow each time the website is updated, it will run the `InitializeDatabase`\
    \ method, which will ensure your database schema is up to date.\n\n## Custom Configuration\
    \ Sections\n\nIn previous chapters, you have hard-coded the connection string\
    \ name in the data access layer. If you continue to hard-code this value in your\
    \ data access layer and build modular components that work with different sets\
    \ of data, you may hard-code the same value in each component so that you do not\
    \ have to maintain the connection string configuration for each of those components.\
    \ But there is a problem with assuming you will only have a single database connection.\
    \ It forces you to place all of your data in the same database.\n\nAlternatively,\
    \ you may use a unique connection string name for each component, which will require\
    \ you to maintain a connection string for each component. This approach gives\
    \ you some flexibility but duplicates several connection strings in your configuration.\
    \ Another alternative is to use application settings for each component that indicate\
    \ the connection string name to use. The class library created earlier in this\
    \ chapter, which works with a names database, could use an application setting\
    \ named `NamesDatabase`, which matches the name of the connection string to use.\
    \ This would be done for each component. This may be a reasonable approach.\n\n\
    The last approach is to create a custom configuration, which allows you to set\
    \ the values as you want them in a structure you choose. This is done by leveraging\
    \ the existing `ConfigurationSectionGroup` and `ConfigurationSection` classes.\
    \ In Chapter 5, you created providers that used a custom `ConfigurationSection`.\
    \ Through the provider base classes, some of the extra work was done for you.\
    \ Here you will build a custom configuration, read it all in manually, and use\
    \ it in the `DatabaseManager` class created in the previous sections.\n\nWhat\
    \ you will build is a few classes that provide access to the connection string\
    \ name you will use for the `DatabaseManager`. One class will represent the configuration\
    \ group while another will represent the section. The third class will be a utility\
    \ to load the configuration programmatically.\n\n### Listing 9-31. Chapter09SectionGroup\n\
    The first class is `Chapter09SectionGroup`, which inherits from `ConfigurationSectionGroup`\
    \ and defines a single property.\n```csharp\nusing System.Configuration;\n\nnamespace\
    \ Chapter09.Configuration\n{\n    public class Chapter09SectionGroup : ConfigurationSectionGroup\n\
