- fmt: "# Data Access Application Block\n\nOne goal of the Data Access Application\
    \ Block is to give the developer an interface that is not specific to the underlying\
    \ database. Software using this module will work with SQL Server and SQL Server\
    \ CE as well as Oracle without modification of the C# code. This module also handles\
    \ common tasks you must do if you are just using ADO.NET, such as opening and\
    \ closing each database connection. Various tasks such as this one are handled\
    \ automatically.\n\n## Configuration\n\nIn addition to this alternate interface,\
    \ the Enterprise Library includes configuration tools that can modify your web\
    \ configuration file for you. In the case of the Data Access Application Block,\
    \ such a configuration tool is unnecessary because all you need to configure is\
    \ the connection string you will use to connect to the database. However, the\
    \ configuration tool can set the default connection string to be used when it\
    \ is not specified explicitly in the code.\n\n## Core Object\n\nAt the core of\
    \ the Data Access Application Block is the `Database` object, which abstracts\
    \ away much of the complexity of the .NET framework related to database communications.\n\
    \nYou run your database commands through the `Database` object by using the `DbCommand`\
    \ from the `System.Data.Common` namespace to do everything from selects, inserts,\
    \ updates, and deletes to calling stored procedures that carry out more-complex\
    \ tasks.\n\nThe majority of examples throughout this book use the Data Access\
    \ Application Block. It is an easy-to-use interface and should be used to build\
    \ your data access layer if you choose to build that layer manually.\n\n## Installing\
    \ and Building\n\nTo use the Enterprise Library, you will have to download it\
    \ from the Microsoft Patterns & and Practices website. When you run the installation,\
    \ you may want to change the installation directory so that it is placed in your\
    \ common folder, such as `D:\\Projects\\Common\\Microsoft Enterprise Library 3.1\\\
    `. As a part of the installer, you are given the option to install and compile\
    \ the source. You can place the source in the same folder, as shown in Figure\
    \ 2-1. When you build from the source, it will create assemblies that are not\
    \ signed, so you will need to update the projects to use your own key if you plan\
    \ to deploy the assemblies to the global assembly cache (GAC) or use them with\
    \ projects that are strongly signed. Otherwise, you can use the assemblies in\
    \ the `bin` folder, which are signed by Microsoft.\n\n**Figure 2-1.** Enterprise\
    \ Library 3.1 in the Common directory\n\nThe Enterprise Library is made up of\
    \ many assemblies for all the Application Blocks. You do not need to reference\
    \ every one of these assemblies to make use of just a single module.\n\nIn the\
    \ case of the Data Access Application Block, you need only three assemblies: `Microsoft.Practices.EnterpriseLibrary.Common.dll`,\
    \ `Microsoft.Practices.ObjectBuilder.dll`, and `Microsoft.Practices.EnterpriseLibrary.Data.dll`.\n\
    \nWhen I build my data access layer, I do so with a class library instead of placing\
    \ all that code in the `App_Code` folder of an ASP.NET Website Project. Doing\
    \ so allows it to be used as a dependency for multiple websites as well as console\
    \ and desktop applications. It also makes it easy to version-control the data\
    \ layer and run unit tests against it. When it is built inside the `App_Code`\
    \ folder, it cannot be used externally, which makes versioning and unit testing\
    \ difficult.\n\n## Guidance Automation Tool\n\nThe Enterprise Library is just\
    \ one product of the Patterns & Practices team. The team also produces the Guidance\
    \ Automation Extensions for Visual Studio, which uses templates and recipes for\
    \ building applications that conform to their recommendations. Within the WCF\
    \ and Web Service Software Factories is the Data Access Guidance Package, which\
    \ can generate code for your data access layer.\n\nWhenever you start work on\
    \ an application, you do not want to be slowed down with all the tedious work\
    \ of setting up your database with the various tables, stored procedures, indexing,\
    \ and constraints only to spend a significant amount of time writing the intermediate\
    \ layer between the database and the front end of the application. To speed up\
    \ the process of creating all that code, you can use code snippets. This powerful\
    \ feature of Visual Studio 2005 (and Visual Studio 2008) allows you to quickly\
    \ select a template and fill in placeholders so you can avoid manually writing\
    \ each line of code (typically, boilerplate code). Code snippets also help you\
    \ avoid coding errors due to typos.\n\n### Data Access Code Snippets\n\nI have\
    \ created five code snippets to assist with writing code that uses the Data Access\
    \ Application Block. In addition to adding lines of code to your class, the snippets\
    \ can also specify the required namespace statements for the new block of code.\
    \ The namespace imports work only in VB code, but the references will work if\
    \ the assemblies can be found by Visual Studio. If you add the necessary assembly\
    \ references to your project before adding one of the following code snippets,\
    \ Visual Studio will automatically add the `using` statements to your class.\n\
    \nMy collection of data access code snippets is as follows:\n\n- Data Access Types\n\
    - Database Creation\n- DataSet Method\n- DataReader Method\n- Nonquery Method\n\
    \nThe code for these snippets follows in Listings 2-1 through 2-5.\n\n### Listing\
    \ 2-1. Data Access Types\n\n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n\
    <CodeSnippets xmlns=\"http://schemas.microsoft.com/VisualStudio/2005/CodeSnippet\"\
    >\n  <CodeSnippet Format=\"1.0.0\">\n    <Header>\n      <Title>1 Type Declarations</Title>\n\
    \      <Shortcut>da1</Shortcut>\n      <Description>Data Access Types</Description>\n\
    \      <Author>Brennan Stehling</Author>\n      <SnippetTypes>\n        <SnippetType>Expansion</SnippetType>\n\
    \      </SnippetTypes>\n    </Header>\n    <Snippet>\n      <References>\n   \
    \     <Reference>\n          <Assembly>Microsoft.Practices.EnterpriseLibrary.Common.dll</Assembly>\n\
    \        </Reference>\n        <Reference>\n          <Assembly>Microsoft.Practices.EnterpriseLibrary.Data.dll</Assembly>\n\
    \        </Reference>\n        <Reference>\n          <Assembly>Microsoft.Practices.ObjectBuilder.dll</Assembly>\n\
    \        </Reference>\n      </References>\n      <Imports>\n        <Import>\n\
    \          <Namespace>System.Data</Namespace>\n        </Import>\n        <Import>\n\
    \          <Namespace>System.Data.Common</Namespace>\n        </Import>\n    \
    \    <Import>\n          <Namespace>Microsoft.Practices.EnterpriseLibrary.Data</Namespace>\n\
    \        </Import>\n      </Imports>\n      <Code Language=\"CSharp\" Kind=\"\
    type decl\" Delimiter=\"$\">private Database db;\n      </Code>\n    </Snippet>\n\
    \  </CodeSnippet>\n</CodeSnippets>\n```\n\nThe Data Access Types snippet simply\
    \ declares a reference for the `Database` object that is used in the data access\
    \ methods. This initial code snippet specifies the imports and references that\
    \ are required for all the code snippets. Although C# does not automatically include\
    \ the imports as in VB, I have included them with the expectation that a future\
    \ release of Visual Studio will be able to use them.\n\n### Listing 2-2. Database\
    \ Creation\n\n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<CodeSnippets\
    \ xmlns=\"http://schemas.microsoft.com/VisualStudio/2005/CodeSnippet\">\n  <CodeSnippet\
    \ Format=\"1.0.0\">\n    <Header>\n      <Title>2 Database Creation</Title>\n\
    \      <Shortcut>da2</Shortcut>\n      <Description>Data Access Database Creation</Description>\n\
    \      <Author>Brennan Stehling</Author>\n    </Header>\n    <Snippet>\n     \
    \ <Imports>\n        <Import>\n          <Namespace>Microsoft.Practices.EnterpriseLibrary.Data</Namespace>\n\
    \        </Import>\n      </Imports>\n      <Declarations>\n        <Literal Editable=\"\
    true\">\n          <ID>connectionStringName</ID>\n          <ToolTip>Connection\
    \ String Name</ToolTip>\n          <Default>db</Default>\n          <Function>\n\
    \          </Function>\n        </Literal>\n      </Declarations>\n      <Code\
    \ Language=\"CSharp\" Kind=\"method body\">\n        <![CDATA[\ndb = DatabaseFactory.CreateDatabase(\"\
    $connectionStringName$\");\n        ]]>\n      </Code>\n    </Snippet>\n  </CodeSnippet>\n\
    </CodeSnippets>\n```"
