  trans: "# 第 6 章 ■ 缓存\n\n遵循的经验法则是创建一个作用范围有限的查询。你不能将 `AdventureWorks` 数据库中 `Production.Product`\
    \ 表的平均 `ListPrice` 包含进来，这是完全合理的，因为这需要监控表中的所有行。\n\n你还需要考虑，通过查询通知监控表会降低表更新的性能。并且，如果被监控的数据被多个应用程序频繁更新，那么选择另一种方式来确保缓存中的数据保持最新可能是最佳选择，因为这些通知会抵消缓存数据的价值。你可能无法缓存频繁更新的数据，而应将缓存限制在不经常变化的数据上。这样做至少能减少系统上的整体负载，因为需要传输的数据更少了。\n\
    \n由于存在许多不支持的特殊情况，因此有必要验证每个查询是否有效。如果查询无效，通知将立即触发 `OnChange` 事件，从而将该项从缓存中移除。\n\n\
    ## 查询通知故障排除\n\n通知可能像缓存本身一样，是一个黑盒。需要仔细监控发生了什么以及对代码库的更改将如何影响缓存和通知的实际性能，以确保这些黑盒按预期运行。有一些工具可以用来窥探这些黑盒内部以监控活动。\n\
    \n## 使用 SQL Server Profiler 进行故障排除\n\n`SQL Server 2005` 的 `SQL Server Profiler`\
    \ 可用于查看查询被发送到系统时发生的情况，以及通知系统如何通过跟踪系统内部来作出响应。不幸的是，`SQL Express Management Studio`\
    \ 不包含探查器，因此你需要使用完整版。到目前为止，大多数示例都使用 `SQL Express`，因为我个人更喜欢只在我的开发系统上运行 `SQL Express`，只在需要时才在另一个系统上安装\
    \ `SQL Server 2005`。我发现 `SQL Express` 不像 `SQL Server 2005` 那样占用大量资源。在需要跟踪时，我只需将我的更改部署到另一台计算机（虚拟机）上并运行跟踪来获取所需信息。\n\
    \n通常，我只在无法通过其他方式（例如观察本章前面介绍的监控实用工具）诊断问题时才需要运行跟踪。\n\n要捕获特定于通知的信息，需要在探查器中创建一个自定义模板。启动\
    \ `SQL Server Profiler` 并单击“新建模板”图标。然后单击“事件选择”选项卡以获取所有可用事件的列表（见图 6-2）。对于通知，你关注的是“代理服务”和“查询通知”事件。单击最左边列的复选框以启用这两个事件组的所有事件。返回“常规”表，输入\
    \ `Notifications` 作为新模板的名称并保存它。\n\n现在通过单击“新建跟踪”图标开始一个新的跟踪。选择新创建的 `Notifications`\
    \ 模板，然后单击“运行”按钮（见图 6-3）。\n\n![Image 22](img/index-183_1.jpg)\n\n![Image 23](img/index-183_2.png)\n\
    \n**图 6-2.** 用于通知的自定义跟踪模板\n\n**图 6-3.** 运行通知跟踪\n\n![Image 24](img/index-184_1.png)\n\
    \n跟踪启动后，你可以启动你的应用程序并观察事件的发生。图 6-4 显示了正常工作的通知系统的跟踪。代理服务和查询通知系统在跟踪中显示了正确的事件序列，应用程序的行为也符合预期。如果它失败了，你可能会看到代理服务立即启动并结束一个“会话”。这将表明查询通知拒绝了你的查询。\n\
    \n也许它包含了一个聚合函数或其他它无法支持的 SQL 功能。你可以通过精简你正在测试的查询并重新启动此序列来更新查询，以识别查询的哪一部分被拒绝。\n\n\
    **图 6-4.** 观察跟踪\n\n你不必停止跟踪，但暂停它并单击“播放”按钮左侧的“清除”按钮是有帮助的。在再次启动你的应用程序之前单击“播放”以恢复观察跟踪。\n\
    \n一旦你的应用程序按你希望的方式工作，你可以将跟踪保存到文件中，以便以后如果需要比较行为时作为参考。只需从“文件”菜单保存跟踪。之后，你可以在探查器中打开保存的跟踪文件，与另一个新创建的跟踪并排查看。\n\
    \n## 通过单元测试进行故障排除\n\n对于测试通知和整个缓存系统的更自动化方法，你可以利用单元测试。如果你预期某个通知将强制依赖项更改，你可以检查数据中的更改是否确实引发了从缓存中移除缓存数据的事件。\n\
    \n![Image 25](img/index-185_1.png)\n\n一个流行的单元测试框架是 `NUnit` (http://www.nunit.org/)，它是开源的，可以免费获取。你也可以从\
    \ JetBrains 获取 `UnitRun` (http://www.jetbrains.com/unitrun/)，它是一个免费工具，作为 `Visual\
    \ Studio 2005` 的插件运行，以运行和调试用 `NUnit` 创建的测试（见图 6-5）。\n\n**图 6-5.** 使用 NUnit 测试的\
    \ UnitRun\n\n图 6-5 中显示的每个测试都检查了本章创建的用于数据访问层所支持的各种缓存场景。这些场景包括无缓存 (`Off`)、绝对到期、轮询、使用\
    \ `SqlCacheDependency` 的通知以及使用 `SqlDependency` 的通知。\n\n这些测试并不严格是单元测试。它们越界成为了集成测试，因为它们做的工作远不止单一单元，并且与多个对象或资源交互。对于那些强烈认同测试驱动开发的开发者来说，这种区别至关重要。就本文档的测试目的而言，这些是集成测试；然而，我们尝试隔离每个测试，以便一个测试不影响另一个测试。\n\
    \n为此所做的部分努力包括声明 `StartUp` 和 `TearDown` 方法（见清单 6-34）。\n\n**清单 6-34.** DomainTests.cs\n\
    \n```csharp\nusing System;\nusing System.Data;\nusing System.Threading;\nusing\
    \ Chapter06.ClassLibrary;\nusing NUnit.Framework;\n\nnamespace UnitTests\n{\n\
    \    [TestFixture]\n    public class DomainTests\n    {\n        #region \" Shared\
    \ Methods \"\n        private Domain domain;\n        private int productId;\n\
    \        private decimal originalPrice;\n\n        [SetUp]\n        public void\
    \ SetUp()\n        {\n            productId = 1;\n            domain = new Domain();\n\
    \            DataSet productDs = domain.GetProductByID(productId, CachingMode.Off);\n\
    \            originalPrice = GetPrice(productDs);\n        }\n\n        [TearDown]\n\
    \        public void TearDown()\n        {\n            domain.SetListPrice(originalPrice,\
    \ productId);\n            domain.ClearCache();\n            domain = null;\n\
    \        }\n\n        private decimal GetPrice(DataSet ds)\n        {\n      \
    \      // verify there is data\n            Assert.IsTrue(ds.Tables.Count > 0,\
    \ \"DataSet must be populated\");\n            Assert.IsNotNull(ds.Tables[0],\
    \ \"Table must be populated\");\n            Assert.IsTrue(ds.Tables[0].Rows.Count\
    \ > 0, \"Row must be populated\");\n            DataRow row = ds.Tables[0].Rows[0];\n\
    \            decimal price = (decimal)row[\"ListPrice\"];\n            return\
    \ price;\n        }\n        #endregion\n\n        // Test Methods //\n    }\n\
    }\n```\n\n你可以看到 `SetUp` 方法创建了域对象并获取了原始价格。`TearDown` 方法使用原始价格恢复价格。对于运行的每个测试，`SetUp`\
    \ 方法首先运行，测试完成后，`TearDown` 方法运行。一个测试不会影响下一个测试。"
