    Using a console application to host a service during development is convenient
    because you can easily stop and start the console application as you make changes
    to the application.


    After you are ready to deploy your service to a production environment, you can
    run the service either through a website or a Windows service.


    **Defining the DataContracts**


    In addition to defining the operations that a service handles, it is also necessary
    to define the data objects that the service passes around. A DataContract is used
    to mark an object for use with a WCF service. In Listing 10-7, you may have noticed
    the DataContract and DataMember attributes on the Event class. Marking an object
    as a DataContract is much like marking it as Serializable. You can actually also
    pass around objects that are marked as Serializable, but it is preferable to now
    mark the classes as a DataContract.


    Every bit of data that is used within a service must be prepared so that it can
    be safely passed around with the service. The Event class must be marked as a
    DataContract as well as each of the classes that it references, such as the Location
    and DomainKey classes.


