    C H A P T E R 9 ■ D E P L OY M E N T


    Another useful option is the configSource attribute, which is a feature of all
    .NET application configuration files that allows you to refer to an external file
    for the contents of a section.


    This can be done automatically by checking the second option below the text box,
    as shown in Figure 9-3.


    **Figure 9-3.** *Using an external configuration source file* Having the connection
    string settings in a separate file outside of the Web.config file for a production
    environment could allow you to safely isolate the connection strings so that you
    can always drop a new Web.config file on top of an older copy with each deployment
    without overwriting the external file. Doing so could allow you to lock down the
    Config folder so that only a limited group of users can read and modify those
    files. You could give the user running the worker process for the website, typically
    Network Service, permission to read the configuration files while local administrators
    can modify those files.


    **PostBuild Deployments**


    A shortcoming of the Web Deployment Projects is the fact that you must build each
    time you want to create a new deployment with the adjusted configuration. Moving
    an application from QA to staging and finally to production requires building
    it once for each environment. It would be better to build it once, place the files
    in a drop location, and generate your environment-specific outputs from there.
    Fortunately, the task that handles the configuration section replacements can
    be used outside of Web Deployment Projects, skipping the build process, which
    only needs to be done once.


    The task you want to use for your PostBuild deployments is called ReplaceConfigSections.
    It is a custom MSBuild task included with the assemblies for the Web Deployment
    Projects in an assembly called Microsoft.WebDeployment.Tasks.dll. You can create
    a custom MSBuild script and include this custom task with the UsingTask directive.
    A simple example of what this looks like is shown in Listing 9-9\. The example
    looks very much like the contents of the project file for a Web Deployment Project.


    **Listing 9-9.** *PostBuild Configuration Section Replacements*


    <Project DefaultTargets="Build"


