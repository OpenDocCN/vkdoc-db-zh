    Enumerating Over the Cache


    You can loop over the cache entries with the Cache object. For monitoring purposes,
    you may want to log the number of items in the cache broken down by type so you
    can better fine-tune the performance that the cache is providing. You could also
    purge all items in the cache by a certain type, as demonstrated in Listing 6-17.


    **Listing 6-17.** *Purging Cached Items by Type*


    private static int PurgeCacheItemsByType(Type type)


    {


    Cache cache = HttpRuntime.Cache;


    List<String> keys = new List<string>();


    foreach (DictionaryEntry entry in cache)


    {


    if (entry.Value != null &&


    entry.Value.GetType().Equals(type))


    {


    keys.Add((string)entry.Key);


    }


    }


    foreach (string key in keys)


    {


    cache.Remove(key);


    }


    return keys.Count;


    }


    While the example in Listing 6-17 could prove useful in the right situation, it
    is generally better to allow the cache to manage the data based on the parameters
    provided when you insert items.


    Parameters


    The cache makes use of several parameters that control the behavior for the cache,
    specifically for the item being added. The parameters used to place items into
    the cache form a policy for how the data should be handled. Some data can be assigned
    a higher priority, which will increase the likelihood that the data will be available
    when it is requested. But you may also have data that you are caching for the
    simple convenience of reducing database load. You can give it a lower priority.
    The following text discusses these parameters and explains how they can be used
    to influence how the data you place in the cache is handled.


    **CacheItemPriority**


    The cache uses the priority to determine which items it can remove when it needs
    to clear space to free up memory or there are other reasons for automatic removal.
    Table 6-1 shows the various values for CacheItemPriority.


