  trans: "# 8 生成数据访问层\n\n## 常用文件夹补充\n\n像 `SubSonic` 和 `Blinq` 这样的工具，即使不用于整个数据访问层，也可以纯粹利用它们的脚手架功能。你可以将这些工具放在\
    \ `Tools` 文件夹中的 `Common` 文件夹中（例如 `D:\\Projects\\Common\\Tools\\Code Generators`）。`Blinq`\
    \ 会被安装到 `Program Files` 文件夹，而 `SubSonic` 的工具和程序集可以解压到一个文件夹中，供活动项目引用。\n\n由于项目引用了\
    \ `LINQ`，它应该在运行时生成优化的查询，因为 `LINQ` 已经过精细调整以与 `SQL Server` 协同工作。只要数据库有 `LINQ` 提供程序实现，`LINQ`\
    \ 也可以与其他数据库一起工作。`LINQ` 中专门查询数据库的部分是 `DLINQ`，而 `XLINQ` 用于查询 `XML`。请参阅 `MSDN` 文档以获取关于\
    \ `LINQ` 技术的完整介绍和入门。在这里，我将重点介绍如何使用 `Blinq`，它提供了哪些功能，以及如何利用它来构建真实的应用程序。\n\n首先，你需要从\
    \ `ASP.NET` 网站（`http://www.asp.net`）下载 `Blinq`。它位于沙盒部分。它需要 `LINQ` 支持，因此你需要 `LINQ\
    \ CTP` 或 `Visual Studio 2008` 的预览版（代号 `Orcas`）。一旦安装了 `Blinq`，你就可以运行清单 8-21 中的命令来生成一个\
    \ `Blinq` 驱动的网站。\n\n**清单 8-21.** `Blinq` 生成命令\n```\n\"C:\\Program Files\\Microsoft\
    \ ASP.NET\\Blinq\\blinq.exe\" /l:cs /server:.\\SQLEXPRESS /database:Chapter08\
    \ /namespace:Chapter08.BlinqDAL /t:$(BlinqTmpDir) /f\n```\n\n`Blinq` 工具可以通过 `/l`\
    \ 开关生成 `C#` 或 `VB` 的代码。值可以是 `cs` 或 `vb`，默认输出语言是 `C#`。`/server` 和 `/database` 开关指定服务器和数据库，并假设使用受信任的连接。清单\
    \ 8-21 中的命令连接到本地 `SQL Express` 数据库和 `Chapter08` 数据库。`/namespace` 开关定义了生成代码将放置的命名空间。`/t`\
    \ 开关指定了所有文件将被创建的目标目录。文件开关 `/f` 会在命令再次运行时强制替换现有文件。\n\n以下示例使用的示例数据库与 `SubSonic`\
    \ 示例使用的结构相同。它只包含一个 `Person` 表和一个 `Location` 表，它们之间有一个外键引用。运行 `Blinq` 工具创建的文件如图\
    \ 8-7 所示。\n\n图 8-8 展示了该网站，其特点是一个类似于 `SubSonic` 项目的脚手架系统。\n\n再次说明，你可能不希望最终用户使用此界面，但你可以在开发应用程序时使用它来输入初始样本数据。你希望从这个生成的网站中获取的是放在\
    \ `App_Code` 文件夹中的代码，以及提供数据访问的页面中的标记。\n\n页面本身几乎没有代码。所有操作都是通过带有数据绑定控件和 `ObjectDataSource`\
    \ 引用的标记声明完成的。这些页面在你处理自定义页面时可以作为很好的参考。清单 8-22 显示了用于 `Person` 表的 `ObjectDataSource`\
    \ 声明。\n\n![Image 38](img/index-255_1.jpg)\n\n![Image 39](img/index-255_2.jpg)\n\
    \n**图 8-7.** `Blinq` 生成的文件\n\n**图 8-8.** `Blinq` 生成的网站\n\n**清单 8-22.** 用于 `Person`\
    \ 的 `ObjectDataSource`\n```\n<asp:ObjectDataSource ID=\"PersonsDataSource\" runat=\"\
