- fmt: "While the preceding controls do allow you to modify the data they display,\
    \ they do not offer a great deal of smart functionality for various data types.\
    \ For example, the date-editing function will have you edit the date with a regular\
    \ `TextBox` control. Entering a string that is not a date will cause the postback\
    \ event to throw an exception, as shown in Figure 4-1.\n\n**Figure 4-1.** FormatException\
    \ when saving a date value\n\n![Image 14](index-85_1.jpg)\n\n## Chapter 4 - Data\
    \ Bound Controls\n\nYou may even enter a value that looks like a valid date, such\
    \ as June 31, but there is no 31st day of June, so it will also fail. It would\
    \ be best to prevent that error from happening and prevent the exception. To do\
    \ so, the `BoundField` can be replaced with a `TemplateField`. This can be done\
    \ by converting the `BoundField` to a `TemplateField` in the **Fields** panel,\
    \ shown in Figure 4-2, which is accessed by clicking the **Edit Columns** link\
    \ on the **Smart Tag** for the `GridView`.\n\n**Figure 4-2.** Fields editor\n\n\
    Once you have your `TemplateField`, it will start with a `Label` for read-only\
    \ mode and a `TextBox` for edit mode and be placed in the `ItemTemplate` and `EditTemplate`.\
    \ An example is shown in Listing 4-4.\n\n**Listing 4-4.** GridView with TemplateField\n\
    \n```asp\n<asp:GridView ID=\"GridView1\" runat=\"server\"\n    AllowPaging=\"\
    True\" AllowSorting=\"True\"\n    AutoGenerateColumns=\"False\" DataKeyNames=\"\
    PersonId\"\n    DataSourceID=\"ObjectDataSource1\">\n    <Columns>\n        <asp:BoundField\
    \ DataField=\"FirstName\"\n            HeaderText=\"First Name\" SortExpression=\"\
    FirstName\" />\n        <asp:BoundField DataField=\"LastName\"\n            HeaderText=\"\
    Last Name\" SortExpression=\"LastName\" />\n        <asp:BoundField DataField=\"\
    City\" HeaderText=\"City\" SortExpression=\"City\" />\n        <asp:TemplateField\
    \ HeaderText=\"Birth Date\" SortExpression=\"BirthDate\">\n            <EditItemTemplate>\n\
    \                <asp:TextBox ID=\"TextBox1\" runat=\"server\"\n             \
    \       Text='<%# Bind(\"BirthDate\") %>'></asp:TextBox>\n            </EditItemTemplate>\n\
    \            <ItemTemplate>\n                <asp:Label ID=\"Label1\" runat=\"\
    server\"\n                    Text='<%# Bind(\"BirthDate\") %>'></asp:Label>\n\
    \            </ItemTemplate>\n        </asp:TemplateField>\n        <asp:BoundField\
    \ DataField=\"Country\"\n            HeaderText=\"Country\" SortExpression=\"\
    Country\" />\n        <asp:CommandField ShowDeleteButton=\"True\" ShowEditButton=\"\
    True\" />\n    </Columns>\n</asp:GridView>\n```\n\nThe new `TemplateField` initially\
    \ does not stop the problem with the invalid date but will allow you to add validation\
    \ controls to check on the value. A `ValidationSummary` control can be placed\
    \ above the `GridView` to show the `ErrorMessage` property of any validator that\
    \ indicates an invalid value, but this would have to be repeated in every place\
    \ that a date is edited. It also makes the `GridView` definition quite bulky.\
    \ Instead, you will create a simple user control called `DateEditor`. This user\
    \ control will be made up of a `TextBox` along with a `CustomValidator` and `RegularExpressionValidator`.\
    \ The `DateEditor` is shown in Listing 4-5.\n\n**Listing 4-5.** DateEditor\n\n\
    ```asp\n<%@ Control Language=\"C#\" AutoEventWireup=\"true\"\n    CodeFile=\"\
    DateEditor.ascx.cs\" Inherits=\"DateEditor\" %>\n<asp:TextBox ID=\"TextBox1\"\
    \ runat=\"server\"></asp:TextBox>\n<asp:CustomValidator ID=\"cvDate\" runat=\"\
    server\"\n    ControlToValidate=\"TextBox1\" Display=\"Dynamic\"\n    EnableClientScript=\"\
    False\" ErrorMessage=\"Date is invalid\"\n    OnServerValidate=\"cvDate_ServerValidate\"\
    >\n</asp:CustomValidator>\n<asp:RegularExpressionValidator ID=\"revDate\" runat=\"\
    server\"\n    ControlToValidate=\"TextBox1\"\n    Display=\"Dynamic\" ErrorMessage=\"\
    Date format is invalid. [MM/dd/yyyy]\"\n    ValidationExpression=\"^\\d\\d*\\\
    /\\d\\d*\\/\\d\\d\\d\\d$\">\n</asp:RegularExpressionValidator>\n```\n\nIn the\
    \ code-behind, you add a little help to the `CustomValidator` to verify the value\
    \ is truly a valid date and also make the value available through a property for\
    \ the `TemplateField` that will hold the `DateEditor` (see Listing 4-6).\n\n**Listing\
    \ 4-6.** DateEditor Code-Behind\n\n```csharp\nusing System;\nusing System.Web.UI;\n\
    using System.Web.UI.WebControls;\n\npublic partial class DateEditor : UserControl\n\
    {\n    protected void Page_Load(object sender, EventArgs e)\n    {\n    }\n}\n\
    ```"
