- fmt: "# Working with SQL Providers\n\nYou may also find that as you are working\
    \ on a website with these provider configurations, you will want to switch between\
    \ different copies of databases on your workstation and remote databases on servers\
    \ at the office. You can configure every one of these database connections and\
    \ move the name used by the provider configurations to the one you want active.\
    \ I typically work with a local copy of the database so that I can work without\
    \ direct interference by someone making changes to a database on the server. You\
    \ may maintain a common staging database that all developers use to test integration\
    \ builds. As you complete a set of features on your local copy, you can deploy\
    \ your database changes to that staging database, reconfigure your website for\
    \ the staging database, and then run your tests to verify that your changes integrate\
    \ properly with changes others may have made, before you check your changes in\
    \ the source control.\n\n## Creating a Password Policy\n\nWhen configuring the\
    \ `SqlMembershipProvider` for a new website, you must choose how passwords will\
    \ be handled. It is the first stumbling block to using the `MembershipProvider`\
    \ because the default password policy is somewhat rigid. It requires a password\
    \ to be at least seven characters long with at least one nonalphanumeric character.\
    \ A password such as `aspnet9` would not be allowed, but `aspnet9!` would be allowed.\
    \ During development I frequently create new accounts and log in to them, so simplifying\
    \ this requirement, at least during development, is one of my first steps. Depending\
    \ on the level of security your public site requires, you can ease the password\
    \ policy and not require the nonalphanumeric character and possibly drop the required\
    \ length down to six characters. Alternatively, you can configure a regular expression\
    \ to be used to validate new passwords. Table 5-2 shows a few sample regular expressions\
    \ you could use.\n\n**Table 5-2.** Regular Expressions for Passwords\n\n`^.{7,10}$`\n\
    The password can have any characters and a length of seven to ten characters.\n\
    \n`^[a-zA-Z]\\w{7,14}$`\nThe password must be just letters with a length of seven\
    \ to fourteen characters.\n\n`^(?=.*\\d).{7,12}$`\nThe password must include at\
    \ least one numeric character and have a length of seven to twelve characters.\n\
    \n`^(?=.*\\d)(?=.*[a-z])(?=.*[A-Z]).{7,15}$`\nThe password must have at last one\
    \ uppercase letter, one lowercase letter, and one digit. Its length must be seven\
    \ to fifteen characters.\n\nNaturally, you can get much more rigid with the regular\
    \ expressions requirement but should balance that with what will work for your\
    \ users. If it is just an online discussion forum about your fantasy football\
    \ league, you can use a relaxed password policy. But if it is for an SSL-secured\
    \ website managing bank accounts, you should lean toward the last example.\n\n\
    **Note** You can get more example regular expressions online at `http://regexlib.com/`.\
    \ Search for `password`, and you will be given a list of regular expressions for\
    \ passwords.\n\n## The SqlRoleProvider\n\nThe `SqlRoleProvider` is an implementation\
    \ of the `RoleProvider`, which provides a way to group users. You are not required\
    \ to enable the `RoleProvider` if you are using the `SqlMembershipProvider`. And\
    \ if you do have both of them enabled, you can even choose different types of\
    \ providers. You could configure your website to use the `Active Directory Membership\
    \ provider` and the `SqlRoleProvider`, and it will work as it should through the\
    \ provider interfaces.\n\nThe features of the `SqlRoleProvider` are pretty simple\
    \ but very much necessary for most sites. Users are associated with roles, which\
    \ can be used in various ways to grant or deny access as well as customize the\
    \ behavior of the website.\n\n## Controlling Access by Role\n\nAfter the website\
    \ is using the `SqlMembershipProvider` and the `SqlRoleProvider`, you will probably\
    \ want to secure it. To lock down a website completely, you deny access to all\
    \ anonymous users. With ASP.NET, you do so in the `Web.config` file by using the\
    \ `authorization` element. That element holds either `deny` or `allow` elements\
    \ that designate your authentication requirements, whether it is by role or user\
    \ as well as authenticated or anonymous. Listing 5-1 shows how to lock down a\
    \ website so that only authenticated users can get in.\n\n**Listing 5-1.** Authenticated\
    \ Users Only\n\n```xml\n<authorization>\n  <deny users=\"?\"/>\n</authorization>\n\
    ```\n\nThe question mark designates anonymous users. The default authentication\
    \ is to allow all users regardless of their login status, as shown in Listing\
    \ 5-2.\n\n**Listing 5-2.** Any User Allowed\n\n```xml\n<authorization>\n  <allow\
    \ users=\"*\" />\n</authorization>\n```\n\nYou can also combine the directives\
    \ to first allow a user, perhaps by role, and then deny everyone else. Your access\
    \ control rules can also be limited to a specific location. Listing 5-3 shows\
    \ a configuration that must be placed outside the main `system.web` configuration\
    \ section because the `location` block cannot be contained by the `system.web`\
    \ section. Typically, you will set your global access settings in the main `system.web`\
    \ configuration and add additional, more restrictive rules immediately afterward.\n\
    \n**Listing 5-3.** Allow Admin Users Only\n\n```xml\n<location path=\"Admin\"\
    >\n  <system.web>\n    <authorization>\n      <allow roles=\"Admin\"/>\n     \
    \ <deny users=\"*\"/>\n    </authorization>\n  </system.web>\n</location>\n```\n\
    \n## CAREFUL, NOT EVERYTHING IS SECURED!\n\nWhen adding the authorization requirement\
    \ to prevent anonymous accounts from reaching your pages, you may not be securing\
    \ everything. You are really securing only ASP.NET resources that are mapped to\
    \ run under the .NET runtime. Files with extensions such as `.aspx`, `.asmx`,\
    \ and `.ashx` are mapped to the .NET runtime, but images and text files are not.\
    \ The files that are not managed with the .NET runtime are also not protected\
    \ by this authorization mechanism. Normally, your critical data is on a web page,\
    \ but keep this in mind if your ASP.NET application generates images or other\
    \ documents to disk with critical data.\n\nHowever, when you are working with\
    \ Visual Studio 2005, you will find that all your resources are protected according\
    \ to the configuration. This is because everything served up by the development\
    \ web server is run through the .NET runtime, which respects the settings in `Web.config`.\
    \ If you do wish to protect your files, you can either specifically map the extension\
    \ for the file type to the .NET runtime or set the wildcard application maps for\
    \ every file not specifically mapped in the application extensions section. The\
    \ latter option may introduce more load on your server, because IIS is better\
    \ equipped to serve up static image files, so if you are looking to secure generated\
    \ Excel documents, it would be best to just map the `.xls` extension to the .NET\
    \ runtime. You can copy the mapping of the `.aspx` extension. It references the\
    \ .NET 2.0 installation folder ending with `aspnet_isapi.dll`.\n\nThere is one\
    \ exception to the authorization mechanism, and that is for the login page. This\
    \ page has to be allowed so that forms authentication can give the user access.\
    \ By default the authentication mode is `Windows`, but to use the `SqlMembershipProvider`\
    \ and the `Login` controls, you must change it to `Forms` mode. You can decide\
    \ to use a different page, but `Login.aspx` is the default. You can also change\
    \ the time-out from the default of 30 minutes to something like 2 weeks (20,160\
    \ minutes) and set it to use a sliding expiration so that as long as the user\
    \ returns to the website within 2 weeks, she stays logged in. This configuration,\
    \ shown in Listing 5-4, is useful for a portal or shopping website.\n\n**Listing\
    \ 5-4.** Login Page Configuration"
  raw: 'You may also find that as you are working on a website with these provider
    configurations, you will want to switch between different copies of databases
    on your workstation and remote databases on servers at the office. You can configure
    every one of these database connections and move the name used by the provider
    configurations to the one you want active. I typically work with a local copy
    of the database so that I can work without direct interference by someone making
    changes to a database on the server. You may maintain a common staging database
    that all developers use to test integration builds. As you complete a set of features
    on your local copy, you can deploy your database changes to that staging database,
    reconfigure your website for the staging database, and then run your tests to
    verify that your changes integrate properly with changes others may have made,
    before you check your changes in the source control.


    **Creating a Password Policy**


    When configuring the SqlMembershipProvider for a new website, you must choose
    how passwords will be handled. It is the first stumbling block to using the MembershipProvider
    because the default password policy is somewhat rigid. It requires a password
    to be at least seven characters long with at least one nonalphanumeric character.
    A password such as aspnet9 would not be allowed, but aspnet9! would be allowed.
    During development I frequently create new accounts and log in to them, so simplifying
    this requirement, at least during development, is one of my first steps. Depending
    on the level of security your public site requires, you can ease the password
    policy and not require the nonalphanumeric character and possibly drop the required
    length down to six characters. Alternatively, you can configure a regular expression
    to be used to validate new passwords. Table 5-2 shows a few sample regular expressions
    you could use.


    **Table 5-2.** *Regular Expressions for Passwords*


    ^.{7,10}$


    The password can have any characters and a length


    of seven to ten characters.


    ^[a-zA-Z]\w{7,14}$


    The password must be just letters with a length of


    seven to fourteen characters.


    ^(?=.*\d).{7,12}$


    The password must include at least one numeric


    character and have a length of seven to twelve


    characters.


    ^(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{7,15}$


    The password must have at last one uppercase


    letter, one lowercase letter, and one digit. Its length must be seven to fifteen
    characters.


    8601Ch05CMP3 8/27/07 8:05 AM Page 115


    C H A P T E R 5 ■ S Q L P R OV I D E R S


    **115**


    Naturally, you can get much more rigid with the regular expressions requirement
    but should balance that with what will work for your users. If it is just an online
    discussion forum about your fantasy football league, you can use a relaxed password
    policy. But if it is for an SSL-secured website managing bank accounts, you should
    lean toward the last example.


    ■**Note** You can get more example regular expressions online at http://regexlib.com/.
    Search for *password*, and you will be given a list of regular expressions for
    passwords.


    **The SqlRoleProvider**


    The SqlRoleProvider is an implementation of the RoleProvider, which provides a
    way to group users. You are not required to enable the RoleProvider if you are
    using the SqlMembershipProvider. And if you do have both of them enabled, you
    can even choose different types of providers. You could configure your website
    to use the Active Directory Membership provider and the SqlRoleProvider, and it
    will work as it should through the provider interfaces.


    The features of the SqlRoleProvider are pretty simple but very much necessary
    for most sites. Users are associated with roles, which can be used in various
    ways to grant or deny access as well as customize the behavior of the website.


    **Controlling Access by Role**


    After the website is using the SqlMembershipProvider and the SqlRoleProvider,
    you will prob-ably want to secure it. To lock down a website completely, you deny
    access to all anonymous users. With ASP.NET, you do so in the Web.config file
    by using the authorization element. That element holds either deny or allow elements
    that designate your authentication requirements, whether it is by role or user
    as well as authenticated or anonymous. Listing 5-1 shows how to lock down a website
    so that only authenticated users can get in.


    **Listing 5-1.** *Authenticated Users Only*


    <authorization>


    <deny users="?"/>


    </authorization>


    The question mark designates anonymous users. The default authentication is to
    allow all users regardless of their login status, as shown in Listing 5-2.


    **Listing 5-2.** *Any User Allowed*


    <authorization>


    <allow users="*" />


    </authorization>


    You can also combine the directives to first allow a user, perhaps by role, and
    then deny everyone else. Your access control rules can also be limited to a specific
    location. Listing 5-3


    shows a configuration that must be placed outside the main system.web configuration
    section


    8601Ch05CMP3 8/27/07 8:05 AM Page 116


    **116**


    C H A P T E R 5 ■ S Q L P R OV I D E R S


    because the location block cannot be contained by the system.web section. Typically,
    you will set your global access settings in the main system.web configuration
    and add additional, more restrictive rules immediately afterward.


    **Listing 5-3.** *Allow Admin Users Only*


    <location path="Admin">


    <system.web>


    <authorization>


    <allow roles="Admin"/>


    <deny users="*"/>


    </authorization>


    </system.web>


    </location>


    **CAREFUL, NOT EVERYTHING IS SECURED!**


    When adding the authorization requirement to prevent anonymous accounts from reaching
    your pages, you may not be securing everything. You are really securing only ASP.NET
    resources that are mapped to run under the .NET runtime. Files with extensions
    such as .aspx, .asmx, and .ashx are mapped to the .NET runtime, but images and
    text files are not. The files that are not managed with the .NET runtime are also
    not protected by this authorization mechanism. Normally, your critical data is
    on a web page, but keep this in mind if your ASP.NET application generates images
    or other documents to disk with critical data.


    However, when you are working with Visual Studio 2005, you will find that all
    your resources are protected according to the configuration. This is because everything
    served up by the development web server is run through the .NET runtime, which
    respects the settings in Web.config. If you do wish to protect your files, you
    can either specifically map the extension for the file type to the .NET runtime
    or set the wildcard application maps for every file not specifically mapped in
    the application extensions section. The latter option may introduce more load
    on your server, because IIS is better equipped to serve up static image files,
    so if you are looking to secure generated Excel documents, it would be best to
    just map the .xls extension to the .NET runtime. You can copy the mapping of the
    .aspx extension. It references the


    .NET 2.0 installation folder ending with aspnet_isapi.dll.


    There is one exception to the authorization mechanism, and that is for the login
    page.


    This page has to be allowed so that forms authentication can give the user access.
    By default the authentication mode is Windows, but to use the SqlMembershipProvider
    and the Login controls, you must change it to Forms mode. You can decide to use
    a different page, but Login.aspx is the default. You can also change the time-out
    from the default of 30 minutes to something like 2 weeks (20,160 minutes) and
    set it to use a sliding expiration so that as long as the user returns to the
    website within 2 weeks, she stays logged in. This configuration, shown in Listing
    5-4, is useful for a portal or shopping website.


