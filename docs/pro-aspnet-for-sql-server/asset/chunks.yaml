  trans: "\n最后，可以将准备好的输出目录中的内容打包成一个 zip 文件。相比于处理一大堆散文件，将 zip 文件移动到目标环境会更加容易。这可以通过`Zip`任务完成，它是\
    \ MSBuild 社区任务的一部分。首先，你需要在默认的`PropertyGroup`中定义 zip 文件的名称，如**清单 9-15**所示。\n\n\
    **清单 9-15.** 定义`ZipFilename`\n\n```xml\n<ZipFilename>$(MSBuildProjectDirectory)\\\
    Deployments\\$(Configuration).zip</ZipFilename>\n```\n\n然后，可以将`Zip`任务添加到`PrepEnvironment`目标的末尾。`Zip`任务的声明如**清单\
    \ 9-16**所示。\n\n**清单 9-16.** `Zip`声明\n\n```xml\n<CreateItem Include=\"$(DestinationDeploymentDir)\\\
    **\\*.*\">\n    <Output ItemName=\"ZipFiles\" TaskParameter=\"Include\"/>\n</CreateItem>\n\
    \n<Zip Files=\"@(ZipFiles)\"\n     ZipFileName=\"$(ZipFilename)\"\n     WorkingDirectory=\"\
    $(DestinationDeploymentDir)\" />\n```\n\n最终会得到一个包含网站所有文件的 zip 包，其中包含了修改后的配置文件。如果\
    \ Web 服务器位于远程托管设施，你可以将此 zip 文件上传到服务器，并在原地解压，无需任何额外工作。\n\n## 通用文件夹补充\n\n本章中的 MSBuild\
    \ 脚本在你的项目中具有很高的可复用性。使用它们可以减少你在每个项目上进行的手动工作，并能捕获构建项目所需的详细信息。这些脚本可以放置在你的`Scripts`子文件夹下的`Common`文件夹中，以便在你的项目中引用（`D:\\\
    Projects\\Common\\Scripts\\MSBuild`）。\n\n## 数据库部署\n\n随着你的 Web 应用程序的每个版本被推送到各个环境，数据库可能需要进行一些更新，以确保应用程序正常运行。也许某个表中增加了一列，或者定义了一个新的存储过程。如果更新后的网站调用了该存储过程，那么在新的应用程序版本投入使用前，数据库必须先更新。要将数据库结构更新到当前版本，可能只需要创建一些`alter`语句。我将向你展示如何创建这些更新脚本，以及如何以最小的工作量部署它们。\n\
    \n### 生成变更脚本\n\nSQL Server Management Studio 可以帮助创建变更脚本。一旦你创建了所有表并填充了数据，就可以使用`alter`语句来更改结构。你可以在查询窗口中手动操作，也可以使用\
    \ SQL Server Management Studio 进行可视化操作。要修改表，只需在对象资源管理器中右键单击该表，然后从上下文菜单中选择`修改`。表编辑器将显示所有列。进行你的更改，完成后，可以单击`生成更改脚本`按钮。\n\
    \n将一个列从`varchar(25)`调整为`varchar(50)`会生成一个脚本，该脚本将创建一个具有修订后表定义的新临时表，然后将所有数据从现有表复制进去。接着，它会删除现有表，并将临时表重命名为刚刚删除的表的名称。这些步骤都在一个事务内完成，一旦所有步骤成功完成，事务就会提交。对于数据量较大的情况，这个更新操作可能需要一段时间才能完成。与你手动编写`alter`语句相比，这个生成的脚本也相当大。**清单\
    \ 9-17**所示的脚本可以实现等效的结果。\n\n**清单 9-17.** Alter 脚本\n\n```sql\nBEGIN TRANSACTION\n\
    GO\nALTER TABLE chpt09_Names\nALTER COLUMN [Name] varchar(50) NOT NULL\nGO\nCOMMIT\n\
    ```\n\n> **注意：** 修改存储过程并非必要，因为你可以安全地删除并重新创建它们，而不会丢失任何数据。\n\n修改表的过程仍然在事务中执行，但不需要复制表的内容。因此，这个简单的语句可能比生成的脚本运行得快得多。即使你打算手动编写自己的语句，参考生成的脚本也是有帮助的。你可能对表进行的另一项调整是添加索引。**清单\
    \ 9-17**中更新的表有一个名为`Name`的列。如果该列有一个索引，可能会加快对该表的查询速度。\n\n使用 Management Studio 在编辑表时，通过`管理索引和键`按钮，也可以可视化地添加索引。添加索引后，你可以生成更改脚本，复制创建索引的部分，并在你的自定义脚本中使用它。结果将如**清单\
    \ 9-18**所示。\n\n**清单 9-18.** 索引创建脚本\n\n```sql\nBEGIN TRANSACTION\nGO\nCREATE NONCLUSTERED\
    \ INDEX IX_chpt09_Names ON dbo.chpt09_Names (\n    Name\n) WITH(\n    STATISTICS_NORECOMPUTE\
    \ = OFF, IGNORE_DUP_KEY = OFF,\n    ALLOW_ROW_LOCKS = ON, ALLOW_PAGE_LOCKS = ON)\
    \ ON [PRIMARY]\nGO\nCOMMIT\n```\n\n同样，大量的数据会导致创建索引需要一段时间。\n\n在完成一个发布周期时，你可能会将变更脚本添加到你的数据库项目中，作为下一次部署的一部分运行。这些更新脚本可以放置在解决方案的数据库项目中一个名为`Change\
    \ Scripts`的文件夹里。在每个发布周期开始时，你可能希望将这些脚本中的更改合并到数据库的创建脚本中，并随着新的更改开始使用一组新的更新脚本。这样做将减少从头开始准备新环境的复杂性。如何管理更新脚本取决于你发布版本的频率以及每个发布版本所需更改的程度。\n\
    \n### 使用脚本模板\n\nSQL Server Management Studio 提供了一个模板集合，你可以用来创建脚本以修改现有数据库并执行各种与数据库相关的任务。你可以通过打开模板资源管理器来查看这些模板。双击模板将在新的查询窗口中打开它。要用实际值替换模板中的所有参数，你可以从“查询”菜单中单击`为模板参数指定值`。\n\
    \n## 自动化数据库更新\n\n如果你有访问权限，变更脚本可以直接在目标数据库上手动运行。你可以直接从你的计算机访问，或者将脚本上传到数据库服务器，通过远程桌面连接到服务器，并使用本地安装的\
    \ Management Studio 副本来运行脚本。对于更改集有限且不频繁的更新，你可能会发现这种手动流程就足够了。但如果更改很多，而你又没有完全掌握所有情况，你可能希望由一个精心设计的自动化流程来控制这些更改，该流程已在\
    \ QA 和测试环境中成功运行。在生产环境中重复那个受控且经过验证的流程将确保部署更加可靠。\n\n### 使用 MSBuild 和 ExecuteDDL\n\
    \n`ExecuteDDL`任务是 MSBuild 社区任务的一部分，可用于运行脚本以执行数据库更新。脚本创建后，可以从一个 MSBuild 脚本中引用，该脚本将在每个环境中用于更新数据库。\n\
    \n**清单 9-19**展示了`db.proj`的内容，这是一个 MSBuild 脚本，它为四个环境（开发、QA、测试和生产）运行两个更新脚本。\n\n\
    **清单 9-19.** `db.proj`\n\n```xml\n<Project DefaultTargets=\"RunScripts\">\n  \
    \  <Import Project=\"$(MSBuildExtensionsPath)\\MSBuildCommunityTasks\\...\" />\n\
    ```\n"
