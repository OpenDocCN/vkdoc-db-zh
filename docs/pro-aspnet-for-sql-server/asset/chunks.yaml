    The attributes associated with each method declare the name of the stored procedure
    with the StoredProcedure attribute along with each of the parameters that are
    passed into the stored procedure. You can see that the return value from the get
    methods is StoredProcedureResult<EventResult>, which is not the same as EventCollection
    (as is necessary for the EventProvider implementation). A conversion will be necessary.
    The EventResultConvert class shown in Listing 10-26 will convert the LINQ type
    to the type we need.


