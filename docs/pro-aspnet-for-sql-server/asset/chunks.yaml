    I was allowing to be created to handle requests. With IIS this is not a concern
    because IIS is fully threaded, as is a modern Apache 2.0 installation, which can
    at least scale for the number of incoming requests. But if each request hits a
    database multiple times, you may see that the bottleneck is not the web server.


    These times when you get a massive surge of traffic require an emergency response
    plan.


    I remember the tragic day of the 9/11 attacks and how everybody was desperately
    looking for any news they could find to tell them what was happening. One of the
    websites I was viewing was CNN.com. I watched as the website went from the full
    website we usually see with busy links and ads all over the home page in the first
    part of the day, to just a few links and one headline. They were clearly trying
    to handle the surge of traffic, which they surely had not experienced before.
    They successfully kept their website online and got that critical news to their
    readers.


    Other times you know there will be a surge of traffic. During the Super Bowl,
    the NFL website is under a great deal of load. The people running the website
    can plan for this all year and typically set up a special website for the Super
    Bowl for that year, where all traffic is directed leading up to and during the
    game. The traffic on this website can be intense as football fans watch the game
    on their TV screens while also getting the latest stats from the website. Interactive
    applications show a diagram of the field and provide all the details about the
    game, updated continually. Each time the web application hits the server, it gets
    information about


