  trans: "\n# 数据绑定控件\n\n迄今为止最常用的数据绑定控件是 `GridView` 控件。这是一个非常强大的控件，能够展示数据，并提供丰富的数据控件应有的添加、更新和删除功能。除了这个控件，还有其他几个数据绑定控件，它们提供与\
    \ `GridView` 相同的显示和编辑功能，但实现方式不同。让我们首先看看那些其他控件。\n\n## DetailsView\n\n`DetailsView`\
    \ 控件一次显示一条记录。与 `GridView` 控件一样，它具有添加、更新和删除功能。它还具备分页功能。相比之下，`GridView` 以表格形式显示数据，因此可以一次查看多条记录。当字段数量多到不适合在表格视图中合理显示时，`DetailsView`\
    \ 就很有用。\n\n这使得它更适合用于编辑。\n\n让我们将 `DetailsView` 控件与上一章中使用的人员和位置数据结合使用。第一个示例在清单 4-1\
    \ 中。\n\n**73**\n\n8601Ch04CMP3 8/25/07 1:07 PM Page 74\n\n**74**\n\n第 4 章 ■ 数据绑定控件\n\
    \n**清单 4-1.** `DetailsView` 示例\n\n```xml\n<asp:DetailsView ID=\"DetailsView1\"\
    \ runat=\"server\"\n    DataSourceID=\"ObjectDataSource1\" AllowPaging=\"True\"\
    \n    AutoGenerateRows=\"False\" DataKeyNames=\"PersonId\">\n    <Fields>\n  \
    \      <asp:BoundField DataField=\"FirstName\"\n            HeaderText=\"First\
    \ Name\" SortExpression=\"FirstName\" />\n        <asp:BoundField DataField=\"\
    LastName\"\n            HeaderText=\"Last Name\" SortExpression=\"LastName\" />\n\
    \        <asp:BoundField DataField=\"BirthDate\"\n            HeaderText=\"Birth\
    \ Date\" SortExpression=\"BirthDate\"\n            DataFormatString=\"{0:MM/dd/yyyy}\"\
    \ HtmlEncode=\"False\" />\n        <asp:BoundField DataField=\"City\"\n      \
    \      HeaderText=\"City\" SortExpression=\"City\" />\n        <asp:BoundField\
    \ DataField=\"Country\"\n            HeaderText=\"Country\" SortExpression=\"\
    Country\" />\n        <asp:CommandField ShowDeleteButton=\"True\"\n          \
    \  ShowEditButton=\"True\" ShowInsertButton=\"True\" />\n    </Fields>\n</asp:DetailsView>\n\
    ```\n\n这里选择的列包括名字、姓氏、出生日期、城市和国家。这些字段中的每一个都是可自动编辑的，并且每条记录都可以被删除。你甚至可以添加一条新记录。通过启用分页，你可以跳转到每一条记录。这完全符合你对这样一个数据编辑控件的期望。在本章剩余部分的高级示例中，我将再次回到\
    \ `DetailsView` 控件。\n\n## FormView\n\n`FormView` 控件乍看起来很像 `DetailsView`，但它没有那么死板。它可能最初是两列布局，但它是一个模板控件，可以完全更改。\n\
    \n你可以选择将名字、姓氏和出生日期列分组在一个块中，将城市和国家列分组在另一个块中。当你查看代码时，你会看到各种模板，包括 `ItemTemplate`（它以只读模式显示数据）；你还会看到所有带有\
    \ `Bind` 方法调用的 `Label` 控件，用于从 `DataSource` 填充每个 `Label`。一个示例 `FormView` 如清单 4-2\
    \ 所示。\n\n**清单 4-2.** `FormView` 示例\n\n```xml\n<asp:FormView ID=\"FormView1\" runat=\"\
    server\"\n    AllowPaging=\"True\" DataKeyNames=\"PersonId\"\n    DataSourceID=\"\
    ObjectDataSource1\">\n    <EditItemTemplate>\n        PersonId:\n        <asp:Label\
    \ ID=\"PersonIdLabel1\" runat=\"server\"\n            Text='<%# Eval(\"PersonId\"\
    ) %>'></asp:Label><br />\n        FirstName:\n        <asp:TextBox ID=\"FirstNameTextBox\"\
    \ runat=\"server\"\n            Text='<%# Bind(\"FirstName\") %>'>\n        </asp:TextBox><br\
    \ />\n        LastName:\n        <asp:TextBox ID=\"LastNameTextBox\" runat=\"\
    server\"\n            Text='<%# Bind(\"LastName\") %>'>\n        </asp:TextBox><br\
    \ />\n        BirthDate:\n        <asp:TextBox ID=\"BirthDateTextBox\" runat=\"\
    server\"\n            Text='<%# Bind(\"BirthDate\") %>'>\n        </asp:TextBox><br\
    \ />\n        City:\n        <asp:TextBox ID=\"CityTextBox\" runat=\"server\"\n\
    \            Text='<%# Bind(\"City\") %>'>\n        </asp:TextBox><br />\n   \
    \     Country:\n        <asp:TextBox ID=\"CountryTextBox\" runat=\"server\"\n\
    \            Text='<%# Bind(\"Country\") %>'>\n        </asp:TextBox><br />\n\
    \        <asp:LinkButton ID=\"UpdateButton\" runat=\"server\"\n            CausesValidation=\"\
    True\" CommandName=\"Update\" Text=\"Update\">\n        </asp:LinkButton>\n  \
    \  </EditItemTemplate>\n</asp:FormView>\n```\n"
