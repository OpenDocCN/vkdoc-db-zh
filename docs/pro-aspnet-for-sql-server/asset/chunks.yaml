    \ Stehling</Author>\n    </Header>\n    <Snippet>\n      <Imports>\n        <Import>\n\
    \          <Namespace>Microsoft.Practices.EnterpriseLibrary.Data</Namespace>\n\
    \        </Import>\n      </Imports>\n      <Declarations>\n        <Literal Editable=\"\
    true\">\n          <ID>methodName</ID>\n          <ToolTip>Method Name</ToolTip>\n\
    \          <Default>GetDataSet</Default>\n          <Function>\n          </Function>\n\
    \        </Literal>\n        <Literal Editable=\"true\">\n          <ID>sproc</ID>\n\
    \          <ToolTip>Stored Procedure</ToolTip>\n          <Default>GetDataSet</Default>\n\
    \          <Function>\n          </Function>\n        </Literal>\n      </Declarations>\n\
    \      <Code Language=\"CSharp\" Kind=\"method decl\">\n        <![CDATA[\npublic\
    \ DataSet $methodName$()\n{\n    DataSet ds = new DataSet();\n    using (DbCommand\
    \ dbCmd = db.GetStoredProcCommand(\"$sproc$\"))\n    {\n        //db.AddInParameter(dbCmd,\
    \ \"@Parameter1\", DbType.String, String.Empty);\n        //db.AddOutParameter(dbCmd,\
    \ \"@Parameter2\", DbType.String, 0);\n        ds = db.ExecuteDataSet(dbCmd);\n\
    \        //Object outputParameter =\n        //db.GetParameterValue(dbCmd, \"\
    @OutputParameter\");\n    }\n    //return the results\n    return ds;\n}\n]]>\n\
    \      </Code>\n    </Snippet>\n  </CodeSnippet>\n</CodeSnippets>\n```\n\nThe\
    \ `DataSet` method returns a `DataSet` after filling it with the results of a\
    \ stored procedure call. The placeholders are for the name of the method and the\
    \ name of the stored procedure.\n\nThe snippet also includes a few lines for input\
    \ and output parameters. These are in place to show how to add input and output\
    \ parameters. These lines can be deleted if the stored procedure that is called\
    \ does not take parameters. This snippet references the `DbCommand` variable with\
    \ the `using` statement, which was introduced as a part of C# 2.0. It ensures\
    \ that the `DbCommand` is disposed of at the end of the block. You will notice\
    \ that it is not necessary to open and close the database connection here.\n\n\
    ## Listing 2-4. `DataReader Method`\n\n```xml\n<?xml version=\"1.0\" encoding=\"\
    utf-8\"?>\n<CodeSnippets>\n  <CodeSnippet Format=\"1.0.0\">\n    <Header>\n  \
