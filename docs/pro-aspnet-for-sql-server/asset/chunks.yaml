  trans: "\n现在，你将对角色提供程序（Roles provider）进行大致相同的操作。这个配置块名为 `roleManager`，除了 `defaultProvider`\
    \ 属性外，它还有一个名为 `enabled` 的属性，允许你开启或关闭它。之后，你可以通过 `Roles.Enabled` 属性在代码中轻松访问 `enabled`\
    \ 设置。默认情况下，此值设置为 `false`，因此，即使你已经配置了提供程序，也必须显式设置此值以添加对角色的支持。请参见代码清单 1-8 中的角色配置。\n\
    \n# 第 1 章：入门\n\n**代码清单 1-8.** *角色配置*\n```xml\n<roleManager defaultProvider=\"\
    Chapter01SqlRoleProvider\" enabled=\"true\">\n    <providers>\n        <clear/>\n\
    \        <add\n            name=\"Chapter01SqlRoleProvider\"\n            connectionStringName=\"\
    chapter01db\"\n            applicationName=\"/chapter01\"\n            type=\"\
    System.Web.Security.SqlRoleProvider, System.Web, Version=2.0.0.0, Culture=neutral,\
    \ PublicKeyToken=b03f5f7f11d50a3a\"\n        />\n    </providers>\n</roleManager>\n\
    ```\n\n## 配置文件（Profile）配置\n\n最后，你可以添加对配置文件（Profile）提供程序的支持。与前面两个提供程序配置一样，你需要将\
    \ `defaultProvider` 属性设置为与新添加的配置相匹配，并添加 `clear` 元素以确保这是唯一配置的提供程序。配置文件提供程序配置的独特功能是能够定义自定义属性。\n\
    \n在代码清单 1-9 所示的示例配置中，定义了一些自定义属性：`FirstName`、`LastName` 和 `BirthDate`。我稍后会解释这些属性；表\
    \ 1-2 列出了配置文件配置设置。\n\n**代码清单 1-9.** *配置文件配置*\n```xml\n<profile defaultProvider=\"\
    Chapter01SqlProfileProvider\" automaticSaveEnabled=\"true\" enabled=\"true\">\n\
    \    <providers>\n        <clear/>\n        <add\n            name=\"Chapter01SqlProfileProvider\"\
    \n            applicationName=\"/chapter01\"\n            connectionStringName=\"\
    chapter01db\"\n            type=\"System.Web.Profile.SqlProfileProvider, System.Web,\
    \ Version=2.0.0.0, Culture=neutral, PublicKeyToken=b03f5f7f11d50a3a\"/>\n    </providers>\n\
    \    <properties>\n        <add name=\"FirstName\" type=\"String\" allowAnonymous=\"\
    true\" />\n        <add name=\"LastName\" type=\"String\" allowAnonymous=\"true\"\
    \ />\n        <add name=\"BirthDate\" type=\"DateTime\" allowAnonymous=\"true\"\
    \ />\n    </properties>\n</profile>\n```\n\n**表 1-2.** *配置文件配置设置*\n\n**设置** |\
    \ **描述**\n---|---\n`name` | 指定 profile 元素引用的配置名称。\n`applicationName` | 定义在配置文件数据库中用作范围的应用程序名称。\n\
    `connectionStringName` | 指定此提供程序要使用的连接字符串。\n\n你可以在末尾附近看到那些自定义属性。配置文件提供程序允许你管理绑定到\
    \ ASP.NET 用户的属性。你可以定义任何可以序列化的属性。在三个示例中，`String` 和 `DateTime` 对象都可以轻松序列化以存储在 SQL\
    \ Server 数据库中。然而，属性可以比这些常见的基元类型复杂得多。也许你有一个名为 `Employee` 的业务对象，它包含诸如 `Title`、`Name`、`Department`\
    \ 和 `Office` 之类的属性。与其配置所有这些属性，你可以直接将 `Employee` 对象指定为一个属性。\n\n然后，通过在你的后台代码类或位于\
    \ `App_Code` 文件夹中的类里编写代码，你可以通过 `Profile.Employee` 访问此属性。多亏了作为 ASP.NET 运行时一部分的动态编译器，这些属性在\
    \ Visual Studio 中立即可用，并支持 IntelliSense。这听起来真的很强大，不是吗？确实如此。\n\n然而，如果你将许多复杂对象设置为配置文件属性，你可能会很快陷入困境。当你需要向\
    \ `Employee` 对象添加或删除属性，但数据库中已经保存了许多该对象的序列化版本时，会发生什么？你将如何升级它们？\n\n当 ASP.NET 2.0\
    \ 首次发布时，我看到各种示例展示了如何创建一个名为 `ShoppingBasket` 的对象，将名为 `Items` 的对象添加到 `ShoppingBasket`\
    \ 中，并将 `ShoppingBasket` 设置为配置文件属性。我立刻意识到这不会是我愿意尝试的做法。在 .NET 2.0 发布的前一年，我正在构建一个商业网站来管理包含商品项和客户订单的购物篮，而我从未使用过配置文件属性。我仍然有我的\
    \ `ShoppingBasket` 对象，它包含许多 `Item` 对象，但我管理了与这些对象一起使用的表和存储过程，这样我就可以轻松地为它们添加新属性并管理变更。如果\
    \ `Item` 开始时只有一个名为 `Price` 的价格值，而后来我需要添加另外几个，如 `SalesPrice` 和 `SeasonalPrice`，添加它们很容易。为了将它们与当前网站用户关联起来，我使用了以下技术。\n\
    \n对于这个特定网站，我需要同时处理匿名用户和已认证用户。当用户首次访问该网站时，会获得一个令牌以在页面间导航时标识他。这是一个匿名用户令牌。用户创建账户后，该匿名令牌将被删除，用户将被迁移到一个已认证用户令牌。已认证用户是使用成员资格（Membership）提供程序的会员。为了无缝处理匿名和已认证用户，我需要一种方法来唯一标识这些用户。不幸的是，没有像\
    \ `Profile.UserID` 这样的默认值。有一个 `Profile.UserName` 属性，但它仅对已认证用户可用。所以我最终创建了一个包装属性，无论用户是匿名还是已认证，都提供一个\
    \ `Guid` 值。\n\n## 匿名配置文件\n\n要使用配置文件上的属性，必须首先启用匿名配置文件。`system.web` 中名为 `anonymousIdentification`\
    \ 的元素可以被启用以开启此功能。\n\n在 `App_Code` 文件夹中，我创建了一个名为 `Utility` 的类，并添加了代码清单 1-10 中的属性。\n\
    \n**代码清单 1-10.** *实用工具方法*\n```csharp\npublic static bool IsUserAuthenticated\n\
    {\n    get\n    {\n        return HttpContext.Current.User.Identity.IsAuthenticated;\n\
    \    }\n}\n\npublic static Guid UserID\n{\n    get\n    {\n        if (IsUserAuthenticated)\n\
    \        {\n            return (Guid)Membership.GetUser().ProviderUserKey;\n \
    \       }\n        else\n        {\n            Guid userId = new Guid(HttpContext.Current.Request.AnonymousID.Substring(0,\
    \ 36));\n            return userId;\n        }\n    }\n}\n```\n\n每当我需要当前用户的唯一标识符时，我会通过\
    \ `Utility.UserID` 来访问它。但随后我必须处理从匿名用户到已认证用户的过渡。\n\n为此，我在 `Global.asax` 中添加了一个名为\
    \ `Profile_OnMigrateAnonymous` 的方法，如代码清单 1-11 所示。\n\n**代码清单 1-11.** *Profile_OnMigrateAnonymous*\n\
    ```csharp\npublic void Profile_OnMigrateAnonymous(object sender, ProfileMigrateEventArgs\
    \ args)\n{\n    Guid anonID = new Guid(args.AnonymousID);\n    Guid authId = (Guid)Membership.GetUser().ProviderUserKey;\n\
    \n    // 将匿名用户资源迁移到已认证用户\n\n    // 删除匿名用户。\n    Membership.DeleteUser(args.AnonymousID,\
    \ true);\n}\n```\n\n以购物篮为例，我只需将匿名用户购物篮中的商品项添加到已认证用户的购物篮中，然后删除匿名账户及其所有关联数据。\n\n\
    我曾考虑在配置文件属性中添加一个名为 `UserID` 的 `Guid` 属性，但 ASP.NET 运行时的动态编译器仅在后台代码文件中有效。它在位于 `App_Code`\
    \ 目录中的 `Utility` 类中不起作用，而我大部分代码都放在那里。所以上述技术是当时唯一的选择。\n\n## 创建用户和角色\n"
- fmt: 'When you work on a website with Visual Studio, you are able to use the Website
    Administration tool to create users and roles. But this utility is not a feature
    built into Microsoft Internet Information Server (IIS). To work with users and
    roles, you have to do it yourself—either in the database by carefully calling
    stored procedures or by creating an interface to safely use the Membership API.
    I chose to create a couple of user controls that I can easily drop into any website.


    The two main controls, `UserManager.ascx` and `RolesManager.ascx`, do the work
    to manage the users and roles. These controls are held in another user control
    called `MembersControl.ascx`.


    This control switches between three views to create a new user, edit existing
    users, and edit roles. Listings 1-12 through 1-17 provide the full source for
    these controls.


