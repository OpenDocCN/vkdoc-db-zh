    \ == '6'\"></MSBuild>\n        <MSBuild Targets=\"FullBuild\"\n            Projects=\"\
    build.proj\" Condition=\"'$(SelectedTarget)' == '7'\"></MSBuild>\n    </Target>\n\
    </Project>\n```\n\n你不能简单地双击一个 MSBuild 脚本来运行它，因此创建一个可以在 Windows 资源管理器中点击的脚本会很有帮助，例如示例（Listing\
    \ 9-5）所示的 `RunBuild.cmd`。\n\n**Listing 9-5.** `RunBuild.cmd`\n\n```cmd\n%windir%\\\
    Microsoft.NET\\Framework\\v2.0.50727\\MSBuild.exe build.proj ➥\n    /t:PromptForTarget\
    \ /p:Configuration=Release;Interactive=True\nPause\n```\n\nMSBuild 实用程序接受多个参数。具体来说，`/t`\
    \ 开关指定了一个以分号分隔的**目标**列表，而 `/p` 开关指定了脚本将能使用的一系列**属性**。示例（Listing 9-5）中的命令调用了一个名为\
    \ `PromptForTarget` 的目标，并将 `Configuration` 属性设置为 `Release`，将 `Interactive` 属性设置为\
    \ `True`。你可以通过在 Visual Studio 命令提示符下运行 `MSBuild \\?` 来获取 MSBuild 命令行选项的完整列表。\n\
    \n## 部署网站\n\n将网站从开发环境移动到服务器可以通过多种方式完成。\n\n最常用的方式一直是 `xcopy` 命令：一个标准的 Windows 命令行实用程序，它有许多开关，让你可以极大地控制复制过程。示例（Listing\
    \ 9-6）显示了一个简单的命令，它将所有文件从源目录复制到目标目录。如果目标文件夹中已经存在文件，它只会在源文件较新时才替换目标文件。\n\n**Listing\
    \ 9-6.** 使用 `xcopy`\n\n```cmd\nxcopy /E/D/Y \"D:\\SourceDir\" \"\\\\Server1\\\
    DestinationDir\"\n```\n\n虽然使用 `xcopy` 有时可以完成任务，但你可能并不总是想盲目地复制文件。`xcopy` 命令无法确保在每次部署时删除旧文件，也不会为目的地环境调整配置。要处理这些需求，你可以利用\
    \ Web 部署项目。\n\n### 网站部署项目\n"
- fmt: "Web applications created with the ASP.NET 2.0 website model do not use project\
    \ files like class libraries. This new model made many new features possible,\
    \ such as page-level compilation, but it also eliminated a few features we had\
    \ with .NET 1.1 projects. Without a project file, you cannot run actions automatically\
    \ before and after builds, and you also cannot manage references and resources\
    \ in the same way. The `Web.config` file handles some details, but not everything.\
    \ Managing ASP.NET websites inside of a solution helps manage dependencies and\
    \ relationships with other projects in the solution, but ultimately you need a\
    \ way to build a website and prepare it for deployment. This is where Web Deployment\
    \ Projects come in.\n\nWeb Deployment Projects are an extension to Visual Studio\
    \ that must be installed as an add-in. Once the add-in is in place, you can right-click\
    \ a website in the Solution Explorer and click the option **Create Web Deployment\
    \ Project**, which will create a new project that includes a single `MSBuild`\
    \ script that Visual Studio can manage with a set of wizards.\n\n### WHERE TO\
    \ GET WEB DEPLOYMENT PROJECTS\n\nWeb Deployment Projects can be found on the ASP.NET\
    \ website (http://www.asp.net). Click the **Downloads** link at the top and look\
    \ for the Web Deployment Projects section. That will take you to the page where\
    \ you can download the installer.\n\n![Image 40](index-265_1.jpg)\n\n**262** C\
    \ H A P T E R 9 ■ D E P L OY M E N T\n\n### Automating Configuration Changes\n\
    \nThe most useful feature of Web Deployment Projects is the ability to modify\
    \ the contents of the `Web.config` file based on the targeted configuration. This\
    \ is done on a section-by-section basis. The project file is an `MSBuild` script\
    \ that runs a sequence of tasks that leads it to read the settings you put in\
    \ place. Figure 9-1 shows the dialog window for inserting these settings.\n\n\
    **Figure 9-1.** *Configuration section replacements* The replacement section settings\
    \ are unique for each configuration. A standard project in Visual Studio starts\
    \ out with just the **Debug** and **Release** configurations. You can create a\
    \ new one for each of your target environments, such as QA (Quality Assurance),\
    \ Staging, and Production. These unique environments surely have different values\
    \ for connection strings and perhaps other settings as well.\n\nThe sources for\
    \ your replacement sections must exist under the website that is being modified.\
    \ The original `Web.config` file will not be changed. The updated copy of the\
    \ `Web.config` file is placed in the output directory along with all of the other\
    \ files for the website. To create a new configuration, you can select the **New**\
    \ option from within the **Configuration Manager**, as shown in Figure 9-2.\n\n\
    With all of your configurations defined, you can open the **Property Pages** for\
    \ the Web Deployment Project. You can open the **Property Pages** from the context\
    \ menu from the Web Deployment Project. The **Deployment** tab on the left side\
    \ is where the configuration section replacement options are. For the **Production**\
    \ configuration, you could create a folder called `Config` in the website and\
    \ place a file named `ConnectionStrings.Production.config` in that folder. Then\
    \ you would check the box in the **Property Pages** to enable configuration section\
    \ replacements with the settings shown in Listing 9-7.\n\n![Image 41](index-266_1.jpg)\n\
    \nC H A P T E R 9 ■ D E P L OY M E N T **263**\n\n**Figure 9-2.** *Creating a\
    \ new configuration*\n\n**Listing 9-7.** *Settings for Production Connection Strings*\n\
    ```\nconnectionStrings=Config\\ConnectionStrings.Production.config;\n```\nYou\
    \ can place the configuration files anywhere you like in the website. Although\
    \ you can use whatever extension you like on the file, it is best to use the standard\
    \ `.config` extension because it is a protected extension: it is specifically\
    \ blocked so that the web server will not serve it up to a user. The contents\
    \ of the file holding the replacement section should just contain the single section,\
    \ as is shown in Listing 9-8.\n\n**Listing 9-8.** *ConnectionStrings.Production.config*\n\
    ```xml\n<?xml version=\"1.0\"?>\n<connectionStrings>\n  <add name=\"chpt09\" connectionString=\"\
    Data Source=ProductionDB\\SQL2005;\n       Initial Catalog=Chapter09;Integrated\
    \ Security=True\"\n       providerName=\"System.Data.SqlClient\" />\n</connectionStrings>\n\
    ```\nWhen the Web Deployment Project is compiled with the **Production** configuration,\
    \ it will replace the `connectionStrings` section with the contents in Listing\
    \ 9-8. When it is finished building, you can confirm that it has been replaced\
    \ by looking in the **Production** folder under the directory for the Web Deployment\
    \ Project. It will create a folder for each configuration just like a typical\
    \ project.\n\n![Image 42](index-267_1.jpg)\n\n**264** C H A P T E R 9 ■ D E P\
    \ L OY M E N T\n\nAnother useful option is the `configSource` attribute, which\
    \ is a feature of all .NET application configuration files that allows you to\
    \ refer to an external file for the contents of a section.\n\nThis can be done\
    \ automatically by checking the second option below the text box, as shown in\
    \ Figure 9-3.\n\n**Figure 9-3.** *Using an external configuration source file*\
    \ Having the connection string settings in a separate file outside of the `Web.config`\
    \ file for a production environment could allow you to safely isolate the connection\
    \ strings so that you can always drop a new `Web.config` file on top of an older\
    \ copy with each deployment without overwriting the external file. Doing so could\
    \ allow you to lock down the `Config` folder so that only a limited group of users\
    \ can read and modify those files. You could give the user running the worker\
    \ process for the website, typically **Network Service**, permission to read the\
    \ configuration files while local administrators can modify those files.\n\n###\
    \ PostBuild Deployments\n\nA shortcoming of the Web Deployment Projects is the\
    \ fact that you must build each time you want to create a new deployment with\
    \ the adjusted configuration. Moving an application from QA to staging and finally\
    \ to production requires building it once for each environment. It would be better\
    \ to build it once, place the files in a drop location, and generate your environment-specific\
    \ outputs from there. Fortunately, the task that handles the configuration section\
    \ replacements can be used outside of Web Deployment Projects, skipping the build\
    \ process, which only needs to be done once.\n\nThe task you want to use for your\
    \ PostBuild deployments is called `ReplaceConfigSections`. It is a custom `MSBuild`\
    \ task included with the assemblies for the Web Deployment Projects in an assembly\
    \ called `Microsoft.WebDeployment.Tasks.dll`. You can create a custom `MSBuild`\
    \ script and include this custom task with the `UsingTask` directive. A simple\
    \ example of what this looks like is shown in Listing 9-9. The example looks very\
    \ much like the contents of the project file for a Web Deployment Project.\n\n\
    **Listing 9-9.** *PostBuild Configuration Section Replacements*\n```xml\n<Project\
    \ DefaultTargets=\"Build\">\n  <UsingTask\n    TaskName=\"ReplaceConfigSections\"\
    \n    AssemblyFile=\"$(MSBuildExtensionsPath)\\Microsoft\\WebDeployment\\v8.0\\\
    \n                  Microsoft.WebDeployment.Tasks.dll\"/>\n  <PropertyGroup>\n\
    \    <DeploymentDir>$(MSBuildProjectDirectory)\\Website_deploy\\$(Configuration)\n\
    \                   </DeploymentDir>\n    <WDTargetDir>$(DeploymentDir)</WDTargetDir>\n\
    \    <ValidateWebConfigReplacement>false</ValidateWebConfigReplacement>\n    <UseExternalWebConfigReplacementFile>false\n\
    ```"
