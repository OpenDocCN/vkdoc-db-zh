    doing? If you dig into what is happening in there, you will see it ultimately
    uses the CreateInstance method of the System.Activator class. That method instantiates
    an instance of the class specified by the configuration setting.


    That is all there is to creating a custom provider from scratch. With a little
    bit of infrastructure in place, you are ready to get into the “real code” for
    the job at hand.


    **Unit Testing**


    To enhance and accelerate development while building your own custom provider,
    it is extremely helpful to use unit tests. A provider is a service contract, and
    unit tests are meant to verify expected functionality. These two models just belong
    together.


