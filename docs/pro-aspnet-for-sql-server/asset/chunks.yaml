    **15**


    **Listing 1-8.** *Roles Configuration*


    <roleManager defaultProvider="Chapter01SqlRoleProvider" enabled="true">


    <providers>


    <clear/>


    <add


    name="Chapter01SqlRoleProvider"


    connectionStringName="chapter01db"


    applicationName="/chapter01"


    type="System.Web.Security.SqlRoleProvider, ➥


    System.Web, Version=2.0.0.0, Culture=neutral, PublicKeyToken=b03f5f7f11d50a3a"


    />


    </providers>


    </roleManager>


    **Profile Configuration**


    Finally, you can add support for the Profile provider. And as with the preceding
    two provider configurations, you will set the defaultProvider attribute to match
    the newly added configuration and also add the clear element to ensure that this
    is the only configured provider. The unique feature for the Profile provider configuration
    is the ability to define custom properties.


    In the sample configuration shown in Listing 1-9, a few custom properties have
    been defined: FirstName, LastName, and BirthDate. I will explain these properties
    in a bit; Table 1-2 lists the profile configuration settings.


    **Listing 1-9.** *Profile Configuration*


    <profile defaultProvider="Chapter01SqlProfileProvider"


    automaticSaveEnabled="true" enabled="true">


    <providers>


    <clear/>


    <add


    name="Chapter01SqlProfileProvider"


    applicationName="/chapter01"


    connectionStringName="chapter01db"


    type="System.Web.Profile.SqlProfileProvider, ➥


    System.Web, Version=2.0.0.0, Culture=neutral, PublicKeyToken=b03f5f7f11d50a3a"/>


    </providers>


    <properties>


    <add name="FirstName" type="String" allowAnonymous="true" />


    <add name="LastName" type="String" allowAnonymous="true" />


    <add name="BirthDate" type="DateTime" allowAnonymous="true" />


    </properties>


    </profile>


    8601Ch01CMP2 8/22/07 7:56 PM Page 16


    **16**


    C H A P T E R 1 ■ G E T T I N G S TA RT E D


    **Table 1-2.** *Profile Configuration Settings*


    **Setting**


    **Description**


    name


    Specifies the configuration name referenced by the profile element applicationName


    Defines the application name used as a scope in the Profile database connectionStringName


    Specifies the connection string to use for this provider You can see those custom
    properties near the end. The Profile provider allows you to manage properties
    that are bound to the ASP.NET user. You can define anything that can be serialized.
    In the three examples, both String and DateTime objects can easily be serialized
    for storage in the SQL Server database. However, the properties can be much more
    complicated objects than these common primitive types. Perhaps you have a business
    object called Employee, which holds properties such as Title, Name, Department,
    and Office. Instead of configuring all these properties, you can instead just
    specify the Employee object as a property.


    Then with code in either your code-behind classes or classes held with the App_Code
    folder, you can access this property as Profile.Employee. Thanks to the dynamic
    compiler, which is part of the ASP.NET runtime, these properties are immediately
    available within Visual Studio with IntelliSense support. That sounds really powerful,
    doesn’t it? It is.


    However, you can quickly paint yourself into a corner if you set up many complex
    objects as Profile properties. What happens when you need to add or remove properties
    to the Employee object but you already have many serialized versions of the object
    held in the database? How will you upgrade them?


    When ASP.NET 2.0 first came out, I saw all kinds of examples of how you could
    create an object called ShoppingBasket, add objects called Items to the ShoppingBasket,
    and set up the ShoppingBasket as a Profile property. I immediately knew that would
    not be something I was going to attempt. In the year previous to the launch of
    .NET 2.0, I was building a commerce website to manage a basket with items and
    customer orders, and I never used the Profile properties. I still had my ShoppingBasket
    object, which held lots of Item objects, but I managed the tables and stored procedures
    used with those objects so that I could add new properties to them and easily
    manage the changes. If the Item started out with just one value for price called
    Price, and later I needed to add a couple more such as SalesPrice and SeasonalPrice,
    it was easy enough to add them. And to associate them to the current website user,
    I used the following technique.


    For this particular website, I had to work with anonymous and authenticated users.
    When a user first came to the site, that user was given a token to identify him
    as he moved from page to page. This was an anonymous user token. After the user
    created an account, that anonymous token would be deleted and the user would be
    migrated to an authenticated user token. Authenticated users were Members with
    the Membership provider. To seamlessly work with anonymous and authenticated users,
    I needed a way to uniquely identify these users. Unfortunately, there is no such
    default value as Profile.UserID. There is a property for Profile.UserName, but
    that is available only for authenticated users. So I ended up creating a wrapper
    property, which provided a Guid value whether the user was anonymous or authenticated.


    8601Ch01CMP2 8/22/07 7:56 PM Page 17


    C H A P T E R 1 ■ G E T T I N G S TA RT E D


    **17**


    **ANONYMOUS PROFILES**


    To make use of properties on the profile, you must first have anonymous profiles
    enabled. An element in system.web named anonymousIdentification can be enabled
    to turn on this feature.


    In the App_Code folder, I created a class called Utility and added the properties
    in Listing 1-10.


    **Listing 1-10.** *Utility Methods*


    public static bool IsUserAuthenticated


    {


    get


    {


    return HttpContext.Current.User.Identity.IsAuthenticated;


    }


    }


    public static Guid UserID


    {


    get


    {


    if (IsUserAuthenticated)


    {


    return (Guid)Membership.GetUser().ProviderUserKey;


    }


    else


    {


    Guid userId =


    new Guid(HttpContext.Current.Request.AnonymousID.Substring(0, 36)); return userId;


    }


    }


    }fcdd


    Whenever I needed the unique identifier for the current user, I would access it
    with Utility.UserID. But then I had to handle the transition from anonymous to
    authenticated.


    To do so, I added a method to Global.asax called Profile_OnMigrateAnonymous, shown
    in Listing 1-11.


    **Listing 1-11.** *Profile_OnMigrateAnonymous*


    public void Profile_OnMigrateAnonymous(object sender, ProfileMigrateEventArgs
    args)


    {


    Guid anonID = new Guid(args.AnonymousID);


    Guid authId = (Guid)Membership.GetUser().ProviderUserKey;


    8601Ch01CMP2 8/22/07 7:56 PM Page 18


    **18**


    C H A P T E R 1 ■ G E T T I N G S TA RT E D


    // migrate anonymous user resources to the authenticated user


    // remove the anonymous user.


    Membership.DeleteUser(args.AnonymousID, true);


    }


    In the case of the basket, I just added the items that were in the anonymous user’s
    basket into the authenticated user’s basket, and removed the anonymous account
    and all associated data.


    I have considered adding a Guid property to the Profile properties called UserID,
    but the dynamic compiler for the ASP.NET runtime works only in code-behind files.
    It would not work in the Utility class held in the App_Code directory, which is
    where I place a good deal of the code. So the preceding technique was the only
    option.


