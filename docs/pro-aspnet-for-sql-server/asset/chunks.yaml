    ## 构建 SQL 站点地图提供程序


    如果你仔细观察`图 5-3`中`PhotoAlbumProvider`的最终成品，你会在顶部看到一个熟悉的元素。它是一个面包屑导航轨迹，这是 ASP.NET
    的一项标准功能。


    遗憾的是，面包屑导航的唯一实现是基于 XML 的。为了使其与新的照片库协同工作，你需要一个 SQL 实现，该实现能够即时适应照片库的变化。自然地，你希望能够浏览不同的照片库，因此利用
    ASP.NET 中与`SiteMapProvider`协同工作的导航控件是有意义的。


    这一次，事情会稍微容易一些，因为有几个细节对你有利。首先，`SiteMapProvider`已经为你处理了配置加载。其次，你可以选择扩展现有的`SiteMapProvider`实现之一，或者从抽象的`SiteMapProvider`类开始实现。由于
    MSDN 上有一个很好的示例展示了如何从基类构建实现，我以此为基础开始，并根据我的需求进行了调整。


    > **注意** MSDN 上有大量关于示例代码和架构解释的内容。随着微软识别出需要更多关注的领域，这些内容一直在持续改进。在.NET 2.0 准备发布期间，我见证了文档的不断扩充。我发现每次重返
    MSDN 时，都能发现以前没有的新内容。它现在还包含一个 Wiki，这样像我们这样的开发者就可以为 MSDN 贡献内容，以更好地完善整个文档和平台。如果你现在去看，你会看到大多数页面都允许你切换到不同版本的框架，如.NET
    1.1、2.0、3.0 和 3.5。


    站点地图是一种层次结构，它必须有一个唯一的父节点，并且每个节点必须有一个唯一的 URL。重要的是，在生成用于存储网站层次结构数据的数据库时，必须遵循这些规则；否则，站点地图将无法工作。


    ### SiteMap 要求


    `SiteMap`像一棵树一样工作，并符合以下要求。首先，必须有一个根节点。从那里开始，每个节点必须有一个最终指向根节点的父节点。最后，每个节点必须有一个唯一的
    URL。唯一 URL 的要求可能有些棘手，因为你可能允许一个叶子节点出现在网站的多个区域中，例如一个皮革椅子的产品。显示皮革家具的页面会指向这把椅子，显示椅子的页面同样会指向它。面包屑导航只能指向一个父节点，因此
    URL 必须以某种方式是唯一的，即使它在概念上可能存在于两个不同的父节点下。


    ### 实现 SiteMapProvider


    有了一个可工作的示例后，我开始调整它以适应我的数据库要求。这些要求非常简单，可以通过单个表轻松处理，如`表 5-4`所示。


    `表 5-4.` `sm_SiteMapNodes`表


    - `ID`: `Bigint` (主键)

    - `ParentID`: `Bigint`

    - `Url`: `Nvarchar(150)`

    - `Title`: `Nvarchar(50)`

    - `Depth`: `Int`

    - `Creation`: `Datetime`

    - `Modified`: `Datetime`


    为了加载`SiteMap`，我硬编码了主页和主相册页面，然后读取了`PhotoAlbumProvider`使用的表。用于填充`SiteMap`的脚本如`清单
    5-24`所示。


