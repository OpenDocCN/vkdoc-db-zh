    This chapter covered the big concerns, such as scalability and performance, that
    continue to drive the need to seek out techniques to make websites faster in high-load
    situations. I explained several scenarios where scalability intersects with performance
    and demands that you implement a plan to distribute the content and load in a
    way that is manageable from the perspectives of the network, web servers, and
    database servers. Having the ability to change the distribution of the data and
    the software with simple configuration changes will enable a highly agile environment
    that can adapt to your growing needs so you can address performance issues when
    they start to reveal themselves.


