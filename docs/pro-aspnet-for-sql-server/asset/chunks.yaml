  trans: "\n每张表都将共享相同的基本结构：主键被定义为一个名为 `ID` 的 `bigint` 类型字段，以及名为 `Created` 和 `Modified`\
    \ 的 `DateTime` 值字段，这些字段会在记录创建和更新时自动设置。主键被设置为一个标识值，在创建新记录时会自动递增。另一种做法是，主键可以根据表的内容具体命名，例如\
    \ `EventID`，这是一种常见的实践。遗憾的是，这种做法使得以通用方式处理所有记录变得困难，而这正是我们下一节将要采用的方式。\n\n## 按日期分区\n\
    \n由于数据库中的每条记录都设置了 `Created` 和 `Modified` 日期，因此可以基于这些值对数据库进行分区。主分区可以包含所有在最近三个月内有修改日期的记录，而其他所有记录则属于另一个分区，该分区实际上充当了数据的归档。最初，这种分区方案可能不是必需的，甚至可能永远都不需要。但对于一个向数据库生成大量记录的高流量网站来说，这种方法将是一个有用的选择。\n\
    \n像 Digg 这样的网站可以使用几个分区。一个可以用于当前周，另一个用于最近三个月，还有一个用于超过最近三个月的所有内容。因为用户通常阅读和互动的是最新内容页面，所以第一个分区的访问频率最高，需要最快的物理数据访问速度。另外两个分区对速度的要求相对较低，但需要大量的存储空间。由于性能要求不高，归档分区的成本将显著降低；而主分区的空间需求被最小化，其成本也将低于一个需要高性能的大规模存储系统。\n\
    \n8601Ch10CMP3 8/25/07 1:09 PM Page 300\n\n**300**\n\n第 10 章 ■ 示例应用程序\n\n## 获取、保存和删除\n\
    \n数据操作方法将遵循第 7 章介绍的获取、保存和删除方法。每个为 `Event` 获取数据的存储过程都将返回相同的列，因此可以为每个存储过程一致地创建一个\
    \ `Event` 实例。对于 `Event`，我们将使用以下存储过程：`dug_GetEvent.sql`、`dug_GetAllEvents.sql`\
    \ 和 `dug_GetEventsByDate.sql`。代码清单 10-2 显示了 `dug_GetEvent.sql`，它返回与给定键匹配的单条记录。\n\
    \n### 代码清单 10-2. dug_GetEvent.sql\n\n```sql\nIF EXISTS (SELECT * FROM sysobjects\
    \ WHERE type = 'P' AND name = 'dug_GetEvent') BEGIN\n    DROP Procedure dug_GetEvent\n\
    END\nGO\n\nCREATE Procedure dbo.dug_GetEvent\n(\n    @EventID bigint\n)\nAS\n\
    \    SELECT\n        ID, Title, Description, MeetingDate, Created, Modified\n\
    \    FROM dug_Events\n    WHERE ID = @EventID\nGO\n\nGRANT EXEC ON dug_GetEvent\
    \ TO PUBLIC\nGO\n```\n\n访问网站的用户大多会对即将发生的事件感兴趣，因此，除了提供访问特定事件或所有事件的功能外，我们还将创建一个名为\
    \ `dug_GetEventsByDate` 的存储过程，该过程返回从现在到作为参数传入的目标日期之间的所有事件。使用这个简单的存储过程代表了“设计时性能”而非“优化时性能”，因为这种需求在设计阶段很容易被预见到。显然，如果数据库中最终有\
    \ 1000 个事件，并且大多数是过去的事件，那么获取所有记录然后只显示未来几个月的事件将会产生不必要的开销。此存储过程如代码清单 10-3 所示。\n\n\
    ### 代码清单 10-3. dug_GetEventsByDate.sql\n\n```sql\nIF EXISTS (SELECT * FROM sysobjects\
    \ WHERE type = 'P' AND name = 'dug_GetEvent') BEGIN\n    DROP Procedure dug_GetEvent\n\
    END\nGO\n\n8601Ch10CMP3 8/25/07 1:09 PM Page 301\n\n第 10 章 ■ 示例应用程序\n\n**301**\n\
    \nCREATE Procedure dbo.dug_GetEvent\n(\n    @EventID bigint\n)\nAS\n    SELECT\n\
    \        ID, Title, Description, MeetingDate, Created, Modified\n    FROM dug_Events\n\
    \    WHERE ID = @EventID\nGO\n\nGRANT EXEC ON dug_GetEvent TO PUBLIC\nGO\n```\n"
- fmt: "And because the `dug_GetEventsByDate` stored procedure is using the `MeetingDate`\
    \ column as the filtering criteria, it is a logical candidate for indexing if\
    \ the table becomes large—but it is not strictly necessary when the database has\
    \ just a few records. You may be able to get by easily for years without indexing\
    \ the `MeetingDate` column. Keep in mind that maintaining indexes also adds load\
    \ to your database, so the fewer indexes that you add to your tables, the less\
    \ overhead you add to the system.\n\nThe script to save Event records, `dug_SaveEvent.sql`,\
    \ takes in all the values associated with an Event along with the `OldEventID`,\
    \ which is defined if the Event is already in the database and is being updated,\
    \ along with an output parameter named `EventID`. The `EventID` is set whether\
    \ an update or insert statement is executed during the save procedure. Listing\
    \ 10-4 shows the save procedure.\n\n**Listing 10-4.** `dug_SaveEvent.sql`\n\n\
    ```\nIF EXISTS (SELECT * FROM sysobjects WHERE type = 'P' AND name = 'dug_SaveEvent')\n\
    BEGIN\n    DROP Procedure dug_SaveEvent\nEND\nGO\n\nCREATE Procedure dbo.dug_SaveEvent\n\
    (\n    @Title nvarchar(50),\n    @Description text,\n    @MeetingDate datetime,\n\
    \    @SpeakerID bigint,\n    @SponsorID bigint,\n    @LocationID bigint,\n   \
    \ @OldEventID bigint,\n    @EventID bigint OUTPUT\n)\nAS\nBEGIN\n    IF (@OldEventID\
    \ < 0)\n    BEGIN\n        INSERT INTO dug_Events\n            (Title, Description,\
    \ MeetingDate, SpeakerID,\n             SponsorID, LocationID, Created, Modified)\n\
    \        VALUES (\n            @Title,\n            @Description,\n          \
    \  @MeetingDate,\n            @SpeakerID,\n            @SponsorID,\n         \
    \   @LocationID,\n            GETDATE(),\n            GETDATE()\n        )\n\n\
    \        SELECT @EventID = @@IDENTITY\n    END\n    ELSE\n    BEGIN\n        UPDATE\
    \ dug_Events\n        SET\n            Title = @Title,\n            Description\
    \ = @Description,\n            MeetingDate = @MeetingDate,\n            SpeakerID\
    \ = @SpeakerID,\n            SponsorID = @SponsorID,\n            LocationID =\
    \ @LocationID,\n            Modified = GETDATE()\n        WHERE\n            ID\
    \ = @OldEventID\n\n        SET @EventID = @OldEventID\n    END\nEND\nGO\n\nGRANT\
    \ EXEC ON dug_SaveEvent TO PUBLIC\nGO\n```\n\nYou can see that the Event record\
    \ holds foreign key references to the `Speaker`, `Sponsor`, and `Location` tables.\
    \ The specific data for the `Speaker`, `Sponsor`, and `Location` is not saved\
    \ as a part of the Event save procedure beyond the foreign key reference with\
    \ the respective ID value. The boundary between these sets of data is maintained\
    \ to ensure ease of maintenance. The values stored in the `Sponsor` table could\
    \ be changed completely as long as the ID value remains the same, which will preserve\
    \ the relationship to the Event records.\n\nFinally, the delete procedure is straightforward.\
    \ All that is necessary is that the ID value for the event and the record are\
    \ deleted, as shown in Listing 10-5.\n\n**Listing 10-5.** `dug_DeleteEvent.sql`\n\
    \n```\nIF EXISTS (SELECT * FROM sysobjects WHERE type = 'P'\n    AND name = 'dug_DeleteEvent')\n\
    BEGIN\n    DROP Procedure dug_DeleteEvent\nEND\nGO\n\nCREATE Procedure dbo.dug_DeleteEvent\n\
    (\n    @EventID bigint\n)\nAS\nDELETE FROM dug_Events\nWHERE ID = @EventID\nGO\n\
    \nGRANT EXEC ON dug_DeleteEvent TO PUBLIC\nGO\n```\n\nThe other tables for `Speaker`,\
    \ `Sponsor`, and `Location` are managed in a similar way, with a few differences\
    \ due to the uniqueness of the data. Later I will go into how the `Location` table\
    \ is used as a dependency by multiple other tables.\n\n## Creating Data Access\
    \ Providers\n\nThe modular design of our example website encourages us to use\
    \ the provider model, which is easy to implement as you saw in Chapter 5. We will\
    \ create a SQL provider for each of the sets of data used by the .NET user group\
    \ website, to be used when the initial website goes live.\n\nLater, as the website\
    \ grows and needs to scale further, new providers can be created and deployed\
    \ as needed. One provider we will create later uses LINQ, which could be faster\
    \ than using the Enterprise Library and ADO.NET. We will also create a WCF provider,\
    \ which would allow us to configure the database back end in a distributed way\
    \ that would spread the database load.\n\n### EventProvider Object\n\nFor the\
    \ moment, we will focus on the `EventProvider`, shown in Listing 10-6."
