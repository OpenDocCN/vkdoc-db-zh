    **Mixing and Matching Providers**


    Because of the nature of the providers, it is possible to deploy these provider
    services to either the same database that the rest of the website is using or
    an entirely different database. It is possible to even deploy the services for
    each individual provider to a separate database. There can be good reason to do
    so. In one instance, you may be running a website connected to a massive database
    that needs to be taken offline occasionally for maintenance. In doing so, it may
    not be completely necessary to take the provider services offline as well. You
    may also find that you get better performance by having your provider services
    hosted on a database on a different piece of hardware.


    Your configuration options go much further, as explained in the next section.


    **Configuring Providers**'
