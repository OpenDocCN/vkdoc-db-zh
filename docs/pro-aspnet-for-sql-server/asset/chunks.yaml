    \ SQL 提供程序，以及如何调整它们的行为以满足你的需求。你从头开始实现了一个提供程序，并将其与标准 SQL 提供程序的自定义实现集成在一起。本章涵盖的主题展示了你的应用程序如何将提供程序用作可插拔组件。这些组件在设计上是完全可互换的，为你提供了必要的灵活性，以重构你确定需要重构的任何应用程序部分。本章还向你展示了如果你只是调整配置，接口层将如何自动与多个提供程序实现协同工作。\n\
    \n8601Ch06CMP2 8/24/07 12:13 PM Page 147\n\n# 第 6 章\n\n# 缓存\n\n也许加速应用程序的最佳方法是实施有针对性的缓存策略。当你对应用程序进行性能分析时，通常会发现从数据库提取数据的时间是页面请求周期中最显著的延迟。你需要从数据库提取的数据越少，应用程序的执行速度就越快。ASP.NET\
    \ 内置的缓存机制为你提供了大量的缓存选项，它建立在 .NET 1.1 的坚实基础上，并在 .NET 2.0 中增加了更多功能。\n\n在 ASP.NET\
    \ 中，缓存由 `Cache` 对象处理，该对象是 `System.Web.Caching` 命名空间的一部分。尽管它位于 `System.Web` 程序集中，但它可以轻松地用于任何\
    \ .NET 应用程序，包括控制台和桌面应用程序。你可以像引用任何其他程序集一样引用它。而对于 ASP.NET 网站，`Cache` 对象可以在类库中使用，以创建可重用的数据访问层。\n\
    \n本章涵盖以下内容：\n\n-   缓存的替代方案\n-   缓存选项\n-   缓存的问题\n-   使缓存失效\n-   性能策略\n\n本章的重点主要放在\
    \ ASP.NET 上，这很大程度上是由于 HTTP 的无状态特性。已经创建了许多策略和技术来克服请求-响应周期的无状态性质，例如 Cookie 和会话，但事实仍然是网站以分离模式工作。相比之下，桌面应用程序可以加载数据并将其可靠地保存在内存中，并持续访问它。桌面应用程序也是单用户的，这允许应用程序为该单一用户占用所有资源。这些因素降低了桌面应用程序使用\
    \ Web 应用程序所采用的相同缓存技术的需求。\n\n对于网站，你可能需要为多个会话提供服务，每个会话都保存用户的数据，每个会话都会占用内存空间。如果你为每个用户的会话加载占用\
    \ 3 MB 空间的数据，并且有 1,000 个并发会话，那么你将已经占用 3 GB 的内存。默认情况下，会话将保持活动状态，直到在 20 分钟不活动后超时。虽然服务器拥有\
    \ 4 GB 或更多内存并不少见，但占用那么多空间是不合理的。最好是在需要空间时（例如像网站上发生的那样，流量高峰期突然出现 5,000 个活动会话）让数据从内存中清除。\n\
    \n**147**\n\n8601Ch06CMP2 8/24/07 12:13 PM Page 148\n\n**148**\n\n## 第 6 章 ■ 缓存\n\
    \n对于典型的访问，用户可能访问几个页面并在不到 10 分钟内离开。也许他们正在查看你网站上某个产品的价格或订单状态。他们希望快速获取信息然后离开。一旦他们离开，你希望有一种方法来清理他们使用的内存，以便其他用户可用。这正是缓存填补实际需求的地方。\n\
    \n还有一种情况是，特定数据集被许多用户同时使用。也许一个热门产品刚刚开始销售。每次对产品页面的访问都会触发一系列查询数据库以显示页面的操作。数据实际上并不经常变化，但在一秒钟内，你可能有\
    \ 20 个用户访问该页面并运行相同的查询来加载页面。这会给数据库带来负载，导致越来越多的 I/O 延迟，因为数据库在短时间内执行大量工作。它还填满了数据库服务器和\
    \ Web 服务器之间的网络连接，如果网络没有足够的容量来处理带宽，这可能成为瓶颈。如果产品页面或查询被包装了缓存机制，即使它只使用五秒钟的超时，你也可以显著提高页面性能，并减少数据库服务器和网络的负载。这是缓存解决的另一个实际问题。\n\
    \n## WEB 与数据库服务器的通信\n"
- fmt: "# Chapter 6: Caching\n\nThe communications between the web server and the\
    \ database server are easily overlooked during development when a local database\
    \ is on the same machine as the development web server started by Visual Studio.\
    \ It can give you a false impression that the data access layer is going to be\
    \ just as fast once it is deployed.\n\nAdjusting queries to just pull the necessary\
    \ columns from a table instead of all columns is an example of easily reducing\
    \ the bandwidth between the web server and the database server.\n\nA sudden surge\
    \ of queries on the database, even if they are the same query, could cause the\
    \ performance of the database to drop dramatically. This can be caused by the\
    \ fact that the query joins across multiple tables that happen to be located in\
    \ different parts of the physical disk. SQL Server 2005 will attempt to compensate\
    \ by keeping recently used data and indexes in memory, but these desired automatic\
    \ optimizations are not guaranteed. It is best to save the results of those queries\
    \ on the web server to allow the database to service other queries.\n\n## Alternatives\
    \ to Caching\n\nUsing the ASP.NET cache is not always the right solution to boost\
    \ performance. The more data you place in the cache, the more complex it can become.\
    \ And more data in the cache may push out items you want to have in there to enhance\
    \ performance. Some data can be stored by other means that require less overhead,\
    \ such as using application state, Session, or even ViewState.\n\nWhile the techniques\
    \ described in the following text are sometimes appropriate solutions, they do\
    \ also have some problems. Either they hold onto objects without an automatic\
    \ way to release them when memory is in short supply or they do not hold onto\
    \ the data long enough to be useful. Even so, you can combine the techniques with\
    \ each other and with caching to provide a more comprehensive solution that gives\
    \ you all of the benefits with a minimal downside.\n\n## Application State\n\n\
    Application state is a global resource that every user and request will be able\
    \ to access. You can use it to hold onto objects you will want to access quickly.\
    \ You can place items into this collection with the `Application_Start` event\
    \ in `Global.asax` so items are available immediately when the application first\
    \ starts up. Listing 6-1 shows how data can be stored in the application state\
    \ using the `Global.asax` file in the root folder of the website. The rest of\
    \ the code can be placed in a utility class in the `App_Code` folder. Listing\
    \ 6-2 shows the `GetApplicationState` method, which is called by the methods in\
    \ `Global.asax`.\n\n**Listing 6-1.** Loading Data into Application State in `Global.asax`\n\
    \n```csharp\nvoid Application_Start(object sender, EventArgs e)\n{\n    HttpContext.Current.Application[\"\
    ApplicationState\"] = GetApplicationState();\n}\n\nvoid Application_End(object\
    \ sender, EventArgs e)\n{\n    HttpContext.Current.Application[\"ApplicationState\"\
    ] = null;\n}\n```\n\n**Listing 6-2.** `GetApplicationState` Method in `App_Code\\\
    Utility.cs`\n\n```csharp\npublic static DataSet GetApplicationState()\n{\n   \
    \ return HttpContext.Current.Application[\"Global Data\"] as DataSet;\n}\n```\n\
    \nWithout any additional work, the data placed in application state will not be\
    \ updated. If an external event requires this data to be updated, a handler could\
    \ be used to reload the data. Listing 6-3 shows a handler (`.ashx`) that can be\
    \ called to reload the application state.\n\n**Listing 6-3.** `ApplicationStateHandler.ashx`\n\
    \n```csharp\n<%@ WebHandler Language=\"C#\" Class=\"ApplicationStateHandler\"\
    \ %>\nusing System.Web;\nusing Chapter06.ClassLibrary;\n\npublic class ApplicationStateHandler\
    \ : IHttpHandler {\n    public void ProcessRequest (HttpContext context) {\n \
    \       context.Response.ContentType = \"text/plain\";\n        string action\
    \ = context.Request.QueryString[\"action\"];\n        if (\"ReloadApplicationState\"\
    .Equals(action))\n        {\n            context.Response.Write(\"Reloading Application\
    \ State\\n\");\n            Domain.LoadApplicationState();\n            context.Response.Write(\"\
    Done.\");\n        }\n        else\n        {\n            context.Response.Write(\"\
    Action unknown: \" + action);\n        }\n    }\n\n    public bool IsReusable\
    \ {\n        get {\n            return false;\n        }\n    }\n}\n```\n\nApplication\
    \ state can hold multiple items like any collection, so a diverse set of data\
    \ could be stored for use anytime a request would need it.\n\n## Session\n\nA\
    \ `Session` holds onto data for an individual user with a sliding 20-minute window.\
    \ In `Global.asax`, you can use the `Session_Start` and `Session_End` event handlers\
    \ to manage the life cycle of a `Session`, which is another collection that can\
    \ hold any type of object. You can add data to it over time as the user uses the\
    \ website. A good place to load up a `Session` is right after a user logs in to\
    \ a website. It could hold all data relevant to that user that you expect the\
    \ user will eventually request from the database during the visit.\n\n## ViewState\n\
    \n`ViewState` further limits the scope of the data that it holds to just the current\
    \ page, for as long as the page maintains a postback cycle. When data is bound\
    \ to a `GridView`, it will not have to hit the database on a postback, as it uses\
    \ the `ViewState` to draw the `GridView`. You can also place additional items\
    \ into the `ViewState`, which you can access on the postback, that are not attached\
    \ to page elements. However, this is limited to objects that can be serialized\
    \ for use in `ViewState`.\n\n## Current Context\n\nYou can also hold data in the\
    \ current context, which is limited to just the current request. You can store\
    \ data that is then shared by any control through the request process. Consider\
    \ that if the `Page_Load` in your code-behind populates objects in the context,\
    \ all user controls included in that page will then be able to use it instead\
    \ of going to the database to get the data. In the case of a product detail page,\
    \ you may break up sections of the page into user controls to simplify maintenance,\
    \ but with a page holding five user controls, you could be hitting the database\
    \ to pull product details five separate times for one request. Using the current\
    \ context would dramatically reduce your database load. Listing 6-4 shows how\
    \ you can load data into the current context. Listing 6-5 shows how every user\
    \ control, or any control, on the page can access the data placed in the current\
    \ context.\n\n**Listing 6-4.** Loading the Product into the Current Context in\
    \ the `Page_Load` Method\n\n```csharp\nusing System;\nusing System.Web.UI;\n\n\
    public partial class _Default : Page\n{\n    protected void Page_Load(object sender,\
    \ EventArgs e)\n    {\n        Context.Items[\"CurrentProduct\"] = GetProduct();\n\
    \    }\n\n    private Product GetProduct()\n    {\n        Product product = new\
    \ Product(\"Product 1\");\n        return product;\n    }\n}\n```\n\n**Listing\
    \ 6-5.** Using the Current Context to Access the Product in a User Control\n\n\
    ```csharp\nusing System;\nusing System.Web.UI;\n\npublic partial class Controls_ProductControl\
    \ : UserControl\n{\n    protected void Page_Load(object sender, EventArgs e)\n\
    \    {\n        Product currentProduct = Context.Items[\"CurrentProduct\"] as\
    \ Product;\n        if (currentProduct != null)\n        {\n            Label1.Text\
    \ = currentProduct.Name;\n        }\n        else\n        {\n            // hide\
    \ the control when there is nothing to display\n            Visible = false;\n\
    \        }\n    }\n}\n```\n\n## Your Own Worst Enemy\n\nI once worked with a developer\
    \ who hit the database hundreds of times for a single page request without realizing\
    \ it. These queries caused the page to take a very long time to load. He did not\
    \ see how calls into certain methods within loops in his code were continually\
    \ reloading data he already requested previously. By simply holding onto data\
    \ from early in the same request to be used later in the request, you can speed\
    \ up your application without making use of the ASP.NET caching system."
