  trans: '

    当你在 Visual Studio 中处理网站时，可以使用**网站管理工具**来创建用户和角色。但此实用程序并非**微软互联网信息服务 (IIS)** 的内置功能。要管理用户和角色，你必须亲自动手——要么通过谨慎调用存储过程在数据库中操作，要么创建一个界面来安全地使用**成员资格
    API**。我选择创建几个用户控件，可以轻松地将它们放入任何网站中。


    两个主要控件 `UserManager.ascx` 和 `RolesManager.ascx` 负责处理用户和角色的管理。这些控件被包含在另一个名为 `MembersControl.ascx`
    的用户控件中。


    这个控件在三种视图之间切换，用于创建新用户、编辑现有用户以及编辑角色。清单 1-12 到 1-17 提供了这些控件的完整源代码。


    ### 清单 1-12. `UserManager.ascx`


