    Framework\\v2.0.50727\\MSBuild.exe ➥\n        \"$(SolutionDir)build.proj\" /t:PreBuild\
    \ /p:Configuration=$(ConfigurationName)\n    </PreBuildEvent>\n    <PostBuildEvent>%25windir%25\\\
    Microsoft.NET\\Framework\\v2.0.50727\\MSBuild.exe ➥\n        \"$(SolutionDir)build.proj\"\
    \ /t:PostBuild /p:Configuration=$(ConfigurationName)\n    </PostBuildEvent>\n\
    </PropertyGroup>\n```\n\n在独立管理各个项目的细节之后，你可以在解决方案级别创建一个构建脚本，该脚本将简单地使用项目文件，调用 `Build`\
    \ 目标。\n\n这是通过 `MSBuild` 目标完成的。对于标准的解决方案布局——即解决方案文件位于根文件夹中，项目位于子文件夹中——通常会在根文件夹中放置一个名为\
    \ `build.proj` 的文件，用于协调自动化流程。\n\n主要的构建脚本 `build.proj` 将主要处理构建过程，但它也可以清理项目，运行单元测试和其他自动化任务。示例（Listing\
    \ 9-4）展示了一个脚本，它使用来自 MSBuild Community Tasks 项目的 `Prompt` 任务，在打印一系列选项后获取用户的响应。这样做使得构建脚本能够与用户进行交互。\n\
    \n**Listing 9-4.** 主构建脚本示例 (`build.proj`)\n\n```xml\n<?xml version=\"1.0\" encoding=\"\
    utf-8\"?>\n<Project DefaultTargets=\"Build\">\n    <PropertyGroup>\n        <NoWarn\
    \ Condition=\"'$(NoWarn)'!=''\">$(NoWarn),</NoWarn>\n        <NoWarn>$(NoWarn)MSB4078</NoWarn>\n\
    \        <Configuration Condition=\" '$(Configuration)' == '' \">Release</Configuration>\n\
    \        <ApplicationName>Chapter09</ApplicationName>\n        <ApplicationVersion>v1.0</ApplicationVersion>\n\
    \        <Interactive Condition=\"'$(Interactive)' == ''\">False</Interactive>\n\
    \    </PropertyGroup>\n    <Import Project=\"$(MSBuildExtensionsPath)\\MSBuildCommunityTasks\\\
    \ ➥\n        MSBuild.Community.Tasks.Targets\" />\n    <Target Name=\"Clean\"\
    >\n        <Message Text=\"Running Clean Target...\" Importance=\"high\"></Message>\n\
    \        <MSBuild Projects=\"ClassLibrary\\ClassLibrary.csproj\"\n           \
    \ Targets=\"Clean\" ContinueOnError=\"false\"></MSBuild>\n    </Target>\n    <Target\
    \ Name=\"PreBuild\">\n        <Message Text=\"No PreBuild Tasks\"></Message>\n\
    \    </Target>\n    <Target Name=\"Build\">\n        <Message Text=\"Running Build\
    \ Target...\" Importance=\"high\"></Message>\n        <MSBuild Projects=\"ClassLibrary\\\
    ClassLibrary.csproj\"\n            Targets=\"Build\" ContinueOnError=\"false\"\
    ></MSBuild>\n    </Target>\n    <Target Name=\"PostBuild\">\n        <Message\
    \ Text=\"No PostBuild Tasks\"></Message>\n    </Target>\n    <Target Name=\"RunTests\"\
    \ DependsOnTargets=\"Build\">\n        <Message Text=\"No Tests Tasks\"></Message>\n\
    \    </Target>\n    <Target Name=\"Rebuild\" DependsOnTargets=\"Clean;PreBuild;Build;PostBuild\"\
    >\n        <Message Text=\"Full Rebuild Successful!\" Importance=\"high\"></Message>\n\
    \    </Target>\n    <Target Name=\"FullBuild\"\n        DependsOnTargets=\"Clean;PreBuild;Build;PostBuild;RunTests\"\
    >\n        <Message Text=\"Full Build Successful!\" Importance=\"high\"></Message>\n\
    \    </Target>\n    <Target Name=\"PromptForTarget\" Condition=\"'$(Interactive)'\
    \ == 'True'\">\n        <Message Text=\" \"></Message>\n        <Message Text=\"\
    1) Clean\" Importance=\"high\"></Message>\n        <Message Text=\"2) PreBuild\"\
    \ Importance=\"high\"></Message>\n        <Message Text=\"3) Build\" Importance=\"\
    high\"></Message>\n        <Message Text=\"4) PostBuild\" Importance=\"high\"\
    ></Message>\n        <Message Text=\"5) RunTests\" Importance=\"high\"></Message>\n\
    \        <Message Text=\"6) Rebuild\" Importance=\"high\"></Message>\n       \
    \ <Message Text=\"7) FullBuild\" Importance=\"high\"></Message>\n        <Prompt\
    \ Text=\" Enter a target:\">\n            <Output TaskParameter=\"UserInput\"\
    \ PropertyName=\"SelectedTarget\"/>\n        </Prompt>\n        <Message Text=\"\
    Selected target is $(SelectedTarget)\" Importance=\"high\">\n        </Message>\n\
    \        <MSBuild Targets=\"Clean\"\n            Projects=\"build.proj\" Condition=\"\
    '$(SelectedTarget)' == '1'\"></MSBuild>\n        <MSBuild Targets=\"PreBuild\"\
    \n            Projects=\"build.proj\" Condition=\"'$(SelectedTarget)' == '2'\"\
    ></MSBuild>\n        <MSBuild Targets=\"Build\"\n            Projects=\"build.proj\"\
    \ Condition=\"'$(SelectedTarget)' == '3'\"></MSBuild>\n        <MSBuild Targets=\"\
    PostBuild\"\n            Projects=\"build.proj\" Condition=\"'$(SelectedTarget)'\
    \ == '4'\"></MSBuild>\n        <MSBuild Targets=\"RunTests\"\n            Projects=\"\
    build.proj\" Condition=\"'$(SelectedTarget)' == '5'\"></MSBuild>\n        <MSBuild\
    \ Targets=\"Rebuild\"\n            Projects=\"build.proj\" Condition=\"'$(SelectedTarget)'\
    \ == '6'\"></MSBuild>\n        <MSBuild Targets=\"FullBuild\"\n            Projects=\"\
    build.proj\" Condition=\"'$(SelectedTarget)' == '7'\"></MSBuild>\n    </Target>\n\
    </Project>\n```\n\n你不能简单地双击一个 MSBuild 脚本来运行它，因此创建一个可以在 Windows 资源管理器中点击的脚本会很有帮助，例如示例（Listing\
    \ 9-5）所示的 `RunBuild.cmd`。\n\n**Listing 9-5.** `RunBuild.cmd`\n\n```cmd\n%windir%\\\
    Microsoft.NET\\Framework\\v2.0.50727\\MSBuild.exe build.proj ➥\n    /t:PromptForTarget\
    \ /p:Configuration=Release;Interactive=True\nPause\n```\n\nMSBuild 实用程序接受多个参数。具体来说，`/t`\
    \ 开关指定了一个以分号分隔的目标列表，而 `/p` 开关指定了脚本将能使用的一系列属性。示例（Listing 9-5）中的命令调用了一个名为 `PromptForTarget`\
    \ 的目标，并将 `Configuration` 属性设置为 `Release`，将 `Interactive` 属性设置为 `True`。你可以通过在 Visual\
    \ Studio 命令提示符下运行 `MSBuild \\?` 来获取 MSBuild 命令行选项的完整列表。\n\n## 部署网站\n\n将网站从开发环境移动到服务器可以通过多种方式完成。\n\
    \n最常用的方式一直是 `xcopy` 命令：一个标准的 Windows 命令行实用程序，它有许多开关，让你可以极大地控制复制过程。示例（Listing 9-6）显示了一个简单的命令，它将所有文件从源目录复制到目标目录。如果目标文件夹中已经存在文件，它只会在源文件较新时才替换目标文件。\n\
    \n**Listing 9-6.** 使用 `xcopy`\n\n```cmd\nxcopy /E/D/Y \"D:\\SourceDir\" \"\\\\\
    Server1\\DestinationDir\"\n```\n\n虽然使用 `xcopy` 有时可以完成任务，但你可能并不总是想盲目地复制文件。`xcopy`\
    \ 命令无法确保在每次部署时删除旧文件，也不会为目的地环境调整配置。要处理这些需求，你可以利用 Web 部署项目。\n\n### 网站部署项目"
  raw: 'C H A P T E R 9 ■ D E P L OY M E N T


    It is useful to note that some project files are also MSBuild scripts. The project
    file for a class library is an MSBuild script, and you can place tasks in the
    BeforeBuild and AfterBuild targets shown in Listing 9-2\. These targets are commented
    out initially, but you can uncomment them. You can then place whatever tasks you
    want in them to be run before or after the build process.


    **Listing 9-2.** *BeforeBuild and AfterBuild Targets*


    <Target Name="BeforeBuild">


    <Message Text="### BeforeBuild ###" Importance="high"></Message>


    </Target>


    <Target Name="AfterBuild">


    <Message Text="### AfterBuild ###" Importance="high"></Message>


    </Target>


    You can also use the PreBuildEvent and PostBuildEvent properties, which work more
    like a batch file with a series of commands. These properties are empty by default,
    but you can call out to the command line. The example in Listing 9-3 runs the
    MSBuild utility with parameters that specify a script in the solution directory.


    **Listing 9-3.** *PreBuildEvent and PostBuildEvent Properties*


    <PropertyGroup>


    <PreBuildEvent>%25windir%25\Microsoft.NET\Framework\v2.0.50727\MSBuild.exe ➥


    "$(SolutionDir)build.proj" /t:PreBuild /p:Configuration=$(ConfigurationName)


    </PreBuildEvent>


    <PostBuildEvent>%25windir%25\Microsoft.NET\Framework\v2.0.50727\MSBuild.exe ➥


    "$(SolutionDir)build.proj" /t:PostBuild /p:Configuration=$(ConfigurationName)


    </PostBuildEvent>


    </PropertyGroup>


    With the details about the individual projects managed independently, you can
    create a build script at the solution level that will simply use the project files,
    calling the Build target.


    This is done with the MSBuild target. With the standard solution layout—that is,
    with the solution file in the root folder with projects in subfolders—it is common
    to place a file called build.proj in the root folder, which coordinates the automated
    processes.


    The main build script, build.proj, will primarily handle the build process, but
    it can also clean up the project, and run unit tests and other automated tasks.
    The sample in Listing 9-4


