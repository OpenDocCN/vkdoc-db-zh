    # 缓存


    ## 未充分利用


    该项目是通过 `Remove` 或 `Insert` 方法的请求而被移除的。


    该项目是为了清理空间而被移除的。


    你可能会发现，即使你不断将项目放回缓存，它们仍会因 `未充分利用` 的原因而被移除。当你明知缓存中只有几个小项目，系统却不断将它们踢出时，这可能会令人沮丧。很自然地，你会想要提高其优先级，或者干脆将其优先级设置为
    `不可移除`。但如果缓存中的所有内容都被设置为 `不可移除`，你就失去了优先级带来的好处。相反，你可以尝试调整缓存设置。


    对于 `Web.config` 文件中的缓存设置，在处理因 `未充分利用` 原因从缓存中移除项目时，有两个值最为重要：`privateBytesLimit`
    和 `percentagePhysicalMemoryUsedLimit`。默认情况下，`privateBytesLimit` 没有限制，而 `percentagePhysicalMemoryUsedLimit`
    将被设置为总物理内存的 89%。知道 89% 已经是一个非常高的值后，你可能只想通过为服务器增加更多物理内存来改善缓存。但如果你的服务器由多个应用程序共享，你可以为其中一些应用程序将
    `privateBytesLimit` 设置为限制性较强的值，从而为最需要的应用程序腾出更多空间。


    ![图 21](img/index-169_1.png)


    找到合适的缓存设置可能很棘手。缓存是根据你的自定义设置以及一组难以预测的启发式规则进行管理的。为了更好地了解你的设置将如何表现，你可以通过模拟来测试配置设置。


    ## 缓存模拟


    要理解缓存如何与上一节描述的各种参数协同工作可能很困难。为了将其实际行为可视化，我创建了一个模拟。


    因为缓存系统可以在 Web 应用程序之外使用，你可以创建一个简单的控制台应用程序，从数据库读取数据并将其放入缓存。为了模拟活动 Web 服务器的负载，我设置它每隔几秒运行一个线程，向缓存中添加若干新项目。随着活动的发生，信息会立即报告到控制台，并用颜色标示活动类型，例如项目被添加到缓存或从缓存中移除。我设置模拟使用两个变量：新项目添加之间的时间间隔，以及每个时间间隔要添加的项目数量。


    我运行的模拟使用了微软提供的示例数据库 `AdventureWorks`，这是一个充满产品和订单数据的商业数据库示例。（该数据库可以从微软网站下载。）模拟首先读取所有产品的列表，然后将所有键放入一个集合，用于在每个时间间隔随机向缓存添加项目。


    该模拟也会根据缓存设置表现出不同的行为。当我将 `privateBytesLimit` 设置为一个低得离谱的值时，我发现项目更频繁地因 `未充分利用` 的原因被移除。但随着我提高该值或将其恢复为默认值，我开始看到更多项目达到了超时时间。这导致更多项目因
    `已过期` 原因从缓存中移除，这比 `未充分利用` 原因更可取。


    在你努力寻找内存和性能之间最佳平衡点的过程中，可以为你的每个应用程序修改此模拟。此模拟软件在结束时报告结果，同时包括当前的缓存设置和持续时间，以便你可以记录结果（参见
    `图 6-1`）。如果测试结果表明需要购买额外内存，这份文档将有助于证明其合理性。请参阅本章的代码下载以获取模拟的完整源代码。


    `图 6-1.` 缓存模拟


    ## 常用文件夹补充


    缓存模拟可以调整到与你的应用程序相匹配的场景。它可以作为一个有用的工具添加到你的 `常用` 文件夹的 `工具` 子文件夹中（`D:\项目\常用\工具\缓存模拟`）。模拟器的完整源代码可随本书的示例代码一起下载。


    ## 使缓存数据无效


    缓存数据可以通过多种方式使其无效。主要方式是设置一个超时时间，强制缓存项在指定时间点后过期。或者，你可以设置一个滑动窗口来实现移动过期。在一段不活动期后，滑动窗口将允许缓存项从缓存中移除。绝对过期和滑动过期的设置是互斥的。同样在本节中，我将讨论缓存依赖项，你可以在依赖项更改时使用它来使项目无效，以及手动从缓存中移除项目。


    ### 绝对过期


    我的偏好始终是在缓存项上设置绝对超时时间。我知道仅仅将一个项目缓存十秒钟，在高峰负载期间也有助于提高性能。但将超时时间设置为五分钟或更长，至少可以确保如果我更改了数据库中的值，网站上显示的内容将在五分钟内更新。`代码清单
    6-18` 展示了一个使用绝对过期的示例。


    `代码清单 6-18.` 绝对过期


    ```

    DataSet data = GetItem(3491);

    string cacheKey = "Item-3491";

    DateTime expiration = DateTime.Now.AddMinutes(5);

    Cache.Insert(cacheKey, data, null, expiration,

    Cache.NoSlidingExpiration, CacheItemPriority.Normal, null);

    ```


    ### 滑动过期


    滑动过期会使项目只要在指定的时间窗口内被访问，就会保留在缓存中。对于不经常更改但访问频繁的数据，这是一个不错的选择。但从理论上讲，如果一个项目被频繁访问，它在缓存中停留的时间没有上限。这可能会导致一些问题，首先表现为当数据在数据库中更新后却似乎没有变化的、难以解释的行为。通常的良好实践是，当使用滑动过期时，为项目设置一个缓存依赖项。`代码清单
    6-19` 展示了一个使用滑动过期的示例。


    `代码清单 6-19.` 滑动过期


    ```

    DataSet data = GetItem(3491);

    string cacheKey = "Item-3491";

    TimeSpan slidingWindow = TimeSpan.FromSeconds(30);

    Cache.Insert(cacheKey, data, null, Cache.NoAbsoluteExpiration, slidingWindow,
    CacheItemPriority.Normal, null);

    ```


    ### 缓存依赖项


    为了在绝对过期之前或滑动过期的时间段过去之前快速从缓存中移除项目，你可以利用缓存依赖项。缓存依赖项有多种实现方式。你可以将缓存中的一个项目绑定到一个文件，当文件更新时，缓存项将从缓存中移除。你也可以通过创建一个继承自
    `CacheDependency` 类的类来实现自己的缓存依赖项。`SqlCacheDependency` 就是这样一种实现，它可以在数据库中的数据发生更改时通知你的应用程序。这个实现将在稍后介绍。


    ### 手动移除

