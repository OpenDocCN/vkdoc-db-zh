    `Figure 5-3.` The finished product


    ## Building a SQL SiteMap Provider


    If you look closely at the finished product of the `PhotoAlbumProvider` in `Figure
    5-3`, you will see something familiar at the top. It is a breadcrumb trail, which
    is a standard ASP.NET feature.


    Unfortunately, the only implementation of the breadcrumb navigation is XML. To
    make it work with the new photo album, you need a SQL implementation that will
    adapt instantly to changes in the photo album. Naturally, you want to be able
    to navigate around the different photo albums, so it makes sense to leverage the
    navigational controls in ASP.NET that work with the `SiteMapProvider`.


    This time around, it will be a bit easier because you have a couple of details
    working in your favor. First, the `SiteMapProvider` already handles the configuration
    loading for you. And second, you can choose to extend one of the existing `SiteMapProvider`
    implementations or implement it from the abstract `SiteMapProvider` class. Because
    there was a great example on MSDN showing how to build an implementation from
    the base, I started with that and adjusted it to my requirements.


    > **Note** There is a great deal of content on MSDN for sample code and explanations
    of the architecture. It continues to improve all the time as Microsoft identifies
    areas that need more attention. I watched as the documentation was continually
    augmented as .NET 2.0 was prepared for the launch. And I find that every time
    I return to MSDN, I find something that was not there before. It now features
    a wiki so that developers like us can contribute content to MSDN to better enhance
    the overall document and the platform. If you look today, you will see most pages
    allow you to move to various versions of the frameworks such as .NET 1.1, 2.0,
    3.0, and 3.5.


    A site map is a hierarchical construct that must have a single parent node, and
    each node must have a unique URL. It is important to ensure that when the database
    is generated to hold the data about the website hierarchy, these rules are followed;
    otherwise, the site map will not work.


    ### SiteMap Requirements


    A `SiteMap` works like a tree and conforms to the following requirements. First,
    there must be a single root node. From there, each node must have a parent node
    that ultimately leads to the root node. Finally, each node must have a unique
    URL. The requirement for the unique URL can be tricky because you may allow a
    left node to appear in more than one area of the website, such as a product that
    is a leather chair. A page displaying leather furniture would point to the chair,
    and so would the page displaying chairs. The breadcrumb can point to only a single
    parent, so somehow the URL has to be unique even though it may conceptually exist
    under two separate parent nodes.


    ### Implementing SiteMapProvider


    With a working sample in place, I started to adjust it to fit my database requirements.
    They are very modest requirements that are easily handled by a single table, as
    shown in `Table 5-4`.


    `Table 5-4.` `sm_SiteMapNodes` Table


    - `ID`: `Bigint` (Primary Key)

    - `ParentID`: `Bigint`

    - `Url`: `Nvarchar(150)`

    - `Title`: `Nvarchar(50)`

    - `Depth`: `Int`

    - `Creation`: `Datetime`

    - `Modified`: `Datetime`


    To load the `SiteMap`, I just hard-coded the home page and the main gallery page
    and then read the table used by the `PhotoAlbumProvider`. The script used to populate
    the `SiteMap` is shown in `Listing 5-24`.


    `Listing 5-24.` `sm_RepopulateSiteMapNodes.sql`'
