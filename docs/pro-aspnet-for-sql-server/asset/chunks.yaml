    **YOUR OWN WORST ENEMY**


    I once worked with a developer who hit the database hundreds of times for a single
    page request without realizing it. These queries caused the page to take a very
    long time to load. He did not see how calls into certain methods within loops
    in his code were continually reloading data he already requested previously. By
    simply holding onto data from early in the same request to be used later in the
    request, you can speed up your application without making use of the ASP.NET caching
    system.'
  trans: "\n# 第六章：缓存\n\n当开发环境中本地数据库与 Visual Studio 启动的开发 Web 服务器位于同一台机器上时，Web 服务器与数据库服务器之间的通信很容易被忽视。这可能会给你一个错误的印象，即部署后数据访问层同样会如此迅速。\n\
    \n调整查询，只从表中提取必要的列而非所有列，就是一种轻松减少 Web 服务器与数据库服务器之间带宽消耗的示例。\n\n数据库上的查询量突然激增，即使是相同的查询，也可能导致数据库性能急剧下降。这可能是因为这些查询涉及跨多个表的连接，而这些表恰好位于物理磁盘的不同部分。SQL\
    \ Server 2005 会尝试通过将最近使用的数据和索引保留在内存中来进行补偿，但这些理想的自动优化并不保证会发生。最好将这些查询的结果保存在 Web\
    \ 服务器上，以便数据库能够处理其他查询。\n\n## 缓存的替代方案\n\n使用 ASP.NET 缓存并不总是提升性能的正确解决方案。放入缓存的数据越多，它可能变得越复杂。并且缓存中的更多数据可能会将你希望保留其中以增强性能的项目挤出去。一些数据可以通过其他开销更低的方式存储，例如使用应用程序状态、`Session`，甚至\
    \ `ViewState`。\n\n虽然下文描述的技术有时是合适的解决方案，但它们也存在一些问题。要么它们在内存不足时没有自动释放对象的方式，要么它们保留数据的时间不够长，从而无法发挥作用。即便如此，你可以将这些技术相互结合并与缓存结合使用，以提供一个更全面的解决方案，让你在获得所有好处的同时将负面影响降至最低。\n\
    \n## 应用程序状态\n\n应用程序状态是一个全局资源，每个用户和请求都可以访问。你可以用它来保存需要快速访问的对象。你可以使用 `Global.asax`\
    \ 中的 `Application_Start` 事件将项目放入此集合，以便项目在应用程序首次启动时立即可用。列表 6-1 展示了如何使用网站根目录下的 `Global.asax`\
    \ 文件将数据存储到应用程序状态中。其余代码可以放在 `App_Code` 文件夹的工具类中。列表 6-2 展示了 `GetApplicationState`\
    \ 方法，该方法由 `Global.asax` 中的方法调用。\n\n**列表 6-1.** 在 `Global.asax` 中将数据加载到应用程序状态\n\
    \n```csharp\nvoid Application_Start(object sender, EventArgs e)\n{\n    HttpContext.Current.Application[\"\
    ApplicationState\"] = GetApplicationState();\n}\n\nvoid Application_End(object\
    \ sender, EventArgs e)\n{\n    HttpContext.Current.Application[\"ApplicationState\"\
    ] = null;\n}\n```\n\n**列表 6-2.** `App_Code\\Utility.cs` 中的 `GetApplicationState`\
    \ 方法\n\n```csharp\npublic static DataSet GetApplicationState()\n{\n    return\
    \ HttpContext.Current.Application[\"Global Data\"] as DataSet;\n}\n```\n\n无需任何额外工作，放入应用程序状态的数据将不会被更新。如果外部事件需要更新这些数据，可以使用处理程序重新加载数据。列表\
    \ 6-3 展示了一个可以调用来重新加载应用程序状态的处理程序（`.ashx`）。\n\n**列表 6-3.** `ApplicationStateHandler.ashx`\n\
    \n```csharp\n<%@ WebHandler Language=\"C#\" Class=\"ApplicationStateHandler\"\
    \ %>\nusing System.Web;\nusing Chapter06.ClassLibrary;\n\npublic class ApplicationStateHandler\
    \ : IHttpHandler {\n    public void ProcessRequest (HttpContext context) {\n \
    \       context.Response.ContentType = \"text/plain\";\n        string action\
    \ = context.Request.QueryString[\"action\"];\n        if (\"ReloadApplicationState\"\
    .Equals(action))\n        {\n            context.Response.Write(\"Reloading Application\
    \ State\\n\");\n            Domain.LoadApplicationState();\n            context.Response.Write(\"\
    Done.\");\n        }\n        else\n        {\n            context.Response.Write(\"\
    Action unknown: \" + action);\n        }\n    }\n\n    public bool IsReusable\
    \ {\n        get {\n            return false;\n        }\n    }\n}\n```\n\n应用程序状态可以像任何集合一样保存多个项目，因此可以存储各种各样的数据，以供任何请求需要时使用。\n\
    \n## Session\n\n`Session` 为单个用户保存数据，其时间窗口为滑动的 20 分钟。在 `Global.asax` 中，你可以使用 `Session_Start`\
    \ 和 `Session_End` 事件处理程序来管理 `Session` 的生命周期，这是另一个可以保存任何类型对象的集合。随着用户使用网站，你可以随时间向其添加数据。加载\
    \ `Session` 的一个好时机是在用户登录网站后立即进行。它可以保存与该用户相关的所有数据，你预计用户在访问期间最终会从数据库请求这些数据。\n\n\
    ## ViewState\n\n`ViewState` 进一步将其保存的数据范围限制为仅当前页面，只要页面维持着回发周期。当数据绑定到 `GridView`\
    \ 时，由于它使用 `ViewState` 来绘制 `GridView`，因此在回发时不必访问数据库。你还可以将额外的项目放入 `ViewState` 中，这些项目不附加到页面元素，但你可以在回发时访问它们。不过，这仅限于可以序列化以用于\
    \ `ViewState` 的对象。\n\n## 当前上下文\n\n你还可以在当前上下文中保存数据，其范围仅限于当前请求。你可以存储数据，然后在整个请求过程中由任何控件共享。考虑一下，如果你代码隐藏中的\
    \ `Page_Load` 在上下文中填充了对象，那么该页面中包含的所有用户控件随后都将能够使用它，而不必去数据库获取数据。对于产品详情页，你可能会将页面的部分内容拆分为用户控件以简化维护，但如果一个页面包含五个用户控件，你可能会为了一个请求分别访问数据库五次来获取产品详情。使用当前上下文将显著减少数据库负载。列表\
    \ 6-4 展示了如何将数据加载到当前上下文中。列表 6-5 展示了页面上的每个用户控件或任何控件如何访问放置在当前上下文中的数据。\n\n**列表 6-4.**\
    \ 在 `Page_Load` 方法中将产品加载到当前上下文\n\n```csharp\nusing System;\nusing System.Web.UI;\n\
    \npublic partial class _Default : Page\n{\n    protected void Page_Load(object\
    \ sender, EventArgs e)\n    {\n        Context.Items[\"CurrentProduct\"] = GetProduct();\n\
    \    }\n\n    private Product GetProduct()\n    {\n        Product product = new\
    \ Product(\"Product 1\");\n        return product;\n    }\n}\n```\n\n**列表 6-5.**\
    \ 在用户控件中使用当前上下文访问产品\n\n```csharp\nusing System;\nusing System.Web.UI;\n\npublic\
    \ partial class Controls_ProductControl : UserControl\n{\n    protected void Page_Load(object\
    \ sender, EventArgs e)\n    {\n        Product currentProduct = Context.Items[\"\
    CurrentProduct\"] as Product;\n        if (currentProduct != null)\n        {\n\
    \            Label1.Text = currentProduct.Name;\n        }\n        else\n   \
    \     {\n            // 当没有内容可显示时隐藏该控件\n            Visible = false;\n       \
    \ }\n    }\n}\n```\n\n## 你最糟糕的敌人\n\n我曾经与一位开发人员共事，他在一次页面请求中无意间访问了数据库数百次。这些查询导致页面加载时间非常长。他没有意识到，在代码循环中调用某些方法会不断重新加载他之前已经请求过的数据。只需将同一请求早期的数据保存下来，供同一请求的后续部分使用，你就可以在不使用\
    \ ASP.NET 缓存系统的情况下加快应用程序的速度。\n"
- fmt: "One of the side effects of hitting the database hundreds of times for a single\
    \ page request is an unusually slower response for each query, which adds up quickly.\
    \ It is like a traffic jam during rush hour, but it all happens in a matter of\
    \ seconds for a database, which is noticeable when you expect a page to load in\
    \ under a second. Using the data you recently requested from the database will\
    \ space out your queries and reduce the frequency of query traffic jams.\n\nEvent\
    \ order is very important when you are loading data and making use of it later.\
    \ When used with a master page, you may expect the `Load` event on the master\
    \ page to run first, but in fact the `Load` event on the page will fire first,\
    \ then the master page, and then all of the user controls on the page. I have\
    \ used this technique along with a custom `SiteMap` to load the current objects\
    \ for the page into the current context using the `Url` association to these objects.\n\
    \nThe `Url` may not be a product, but when it is, I can populate that item, and\
    \ all user controls can check for it and use it when it is available. To centralize\
    \ all of this logic, you could place the code to populate these context items\
    \ in the master page in the `Init` event handler so it precedes the `Load` event\
    \ on the page.\n\n## SHOULD YOU SKIP PERFORMANCE TUNING?\n\nYou should not prematurely\
    \ optimize a system, because early on you will not know what will need to be tuned.\
    \ It important to first measure before you tune, and then again after so you can\
    \ show the difference.\n\nAfter several iterations, you will start to see patterns\
    \ in your code emerge that will show you common performance problems that hopefully\
    \ have a common solution you can apply throughout your code in a consistent way.\
    \ Attempting to tune an application before it is completed can introduce problems\
    \ that delay the completion of the project without adding measurable value.\n\n\
    There are also features deep in .NET that address commonly inefficient coding\
    \ techniques that kick in to automatically speed up your application. By using\
    \ your normal coding techniques, you will find what may appear to be inefficient\
    \ will actually perform quite well. But if you attempt to pretune the application,\
    \ you will not realize that automatic benefit and will put in much more time and\
    \ energy into the project.\n\n## PERFORMANCE TUNING STRING CONCATENATION\n\nA\
    \ common hallway conversation on tuning is the debate over string concatenation.\
    \ Should you add strings together or use a `StringBuilder` and append strings\
    \ together? The conflict is that it is easier and faster to just add strings together\
    \ with the `+` operator instead of using a `StringBuilder`, but a `StringBuilder`\
    \ performs better. What quickly ends the debate is someone pointing out that once\
    \ the code is compiled either way, it is optimized to use a `StringBuilder` anyway.\
    \ And this is just one of many performance-enhancing mechanisms built into .NET\
    \ that you can use without changing your current coding practices. A good rule\
    \ of thumb to remember is that programming code is for people and machine code\
    \ is for machines. Let the compiler do its job.\n\nAs you complete the components\
    \ that make up your application, you will be able to profile the actual performance\
    \ and identify bottlenecks. Sometimes tuning the performance will be a simple\
    \ one-line adjustment to a stored procedure or a few lines of code in your data\
    \ access layer. Using regular techniques to build your application allows you\
    \ to be as productive as possible while letting the inefficiencies appear as you\
    \ near completion. Gradually, as you gain a level of comfort, you will start to\
    \ fall into the patterns that result in more performant applications right from\
    \ the start.\n\n## Caching Options\n\nThere is a dizzying array of options available\
    \ when it comes to caching. The `Cache` object does not simply hold onto a collection\
    \ of objects so they are available for fast access. The entire caching system\
    \ includes a rich set of features that can be used in different scenarios. Primarily\
    \ caching in ASP.NET breaks down into two groupings: output caching and data caching.\n\
    \n## Output Caching\n\nWith output caching, you are working at the user interface\
    \ level. You are caching the output of either a page or a user control. (Caching\
    \ the output of a user control is known as `fragment` caching. Think of a user\
    \ control as generating part of, or `a fragment of`, a page.) A page or user control\
    \ configured for output caching will run normally for the first request and every\
    \ subsequent request until it expires from the cache, and it will return the same\
    \ output as the request that placed the content into the cache. Pulling the content\
    \ from the cache prevents server-side processing in the code-behind, which includes\
    \ all data binding and database queries.\n\nWhile there are some major benefits\
    \ to output caching, it is a bit of a brute-force approach as opposed to a targeted\
    \ solution, which can take into account the nature of the data that is being consumed.\
    \ A page or user control can cache many pieces of data that all have unique dependencies,\
    \ which raises many questions when the data is grouped together for display. With\
    \ the right combination of the techniques covered here, it should be possible\
    \ to minimize the downside.\n\n### Page Caching\n\nAt the highest level you will\
    \ cache the output of an entire page, including all controls held within the page.\
    \ The declarative way to enable such caching is to place a directive in the page\
    \ with the desired settings.\n\nThe example in Listing 6-6 will cache the output\
    \ of the page for a `Duration` of 60 seconds and will be unique for any parameter.\
    \ The `VaryByParam` attribute will cause the output cache to produce a fresh output\
    \ if any of the query string parameters are different when the wildcard (`*`)\
    \ is used. You can also specify a specific query string or strings with a semicolon-delimited\
    \ list of names.\n\n**Listing 6-6.** `Enabled Output Caching`\n\n```aspx\n<%@\
    \ OutputCache Duration=\"60\" VaryByParam=\"*\" %>\n```\n\nOne of the appealing\
    \ features about output caching is that not only does it not have to pull data\
    \ from the database when it returns a cached response, it also does not have to\
    \ fire any page events because the output from the first request that recorded\
    \ the output to the cache is used. So not only does it reduce database load, it\
    \ also reduces processor usage.\n\nThe output cache can also be set programmatically\
    \ in the code-behind, as shown in Listing 6-7, although this approach is not as\
    \ elegant as the declarative approach. It does give you the option to use logic\
    \ to set your expiration time, which could come in handy if you want to adapt\
    \ the cache based on server load.\n\n**Listing 6-7.** `Programmatically Setting\
    \ a Page for Output Cache`\n\n```csharp\nprotected void Page_Load(object sender,\
    \ EventArgs e)\n{\n    Response.Cache.SetCacheability(HttpCacheability.Public);\n\
    \    if (IsPeakLoadTime())\n    {\n        // cache for ten minutes during peak\
    \ load time\n        Response.Cache.SetExpires(DateTime.Now.AddMinutes(10));\n\
    \    }\n    else\n    {\n        // cache for two minutes during normal traffic\
    \ periods\n        Response.Cache.SetExpires(DateTime.Now.AddMinutes(2));\n  \
    \  }\n    Response.Cache.SetValidUntilExpires(true);\n    Product currentProduct\
    \ = Context.Items[\"CurrentProduct\"] as Product;\n    if (currentProduct != null)\n\
    \    {\n        Label1.Text = currentProduct.Name;\n    }\n    else\n    {\n \
    \       // hide the control when there is nothing to display\n        Visible\
    \ = false;\n    }\n}\n```\n\n### Problems with Output Caching"
