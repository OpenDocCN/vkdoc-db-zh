    1.0\" encoding=\"utf-8\"?>\n<CodeSnippets>\n  <CodeSnippet Format=\"1.0.0\">\n\
    \    <Header>\n      <Title>3 Get DataSet Method</Title>\n      <Shortcut>da3</Shortcut>\n\
