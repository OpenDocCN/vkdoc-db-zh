    The configuration for the new WCF provider is now split into two parts: the client
    and the service. The client will be the application, such as the website, which
    will use the WCF


    provider to communicate with the service. Then the service will use the SQL implementation
    of the EventProvider to carry out the service operations. Listing 10-33 shows
    the client configuration, and Listing 10-34 shows the service configuration.


