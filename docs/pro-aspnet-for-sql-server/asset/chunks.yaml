    \ `Speaker`。主键值自动成为比较的一部分，而 `Created` 和 `Modified` 值则是另一部分。一个 `Speaker` 对象的旧副本不会与新副本匹配，而一个\
    \ `Speaker` 记录加载到两个 `Speaker` 对象中时，它们则会如预期般匹配。此功能为任何使用本网站数据访问层所定义的约定构建的类自动提供。由于本网站创建的每个表都使用\
    \ `ID`、`Created` 和 `Modified` 列，加载过程将按计划填充 `DomainObject` 实例中的相应属性。\n\n同时，其余的数据加载过程与第\
    \ 7 章所述相同。加载方法可以接受 `DataRow` 或 `IDataReader` 来填充 `DomainObject`。完整代码列表请参阅本章的可下载示例。\n\
    \n## DOMAINOBJECT 与泛型\n\n之所以在修订版的 `DomainObject` 中使用泛型，是为了解决继承与反射结合时出现的问题。在某些情况下，即使数据列与对象属性的名称和类型匹配，也会抛出\
    \ `TargetException`。我最终通过 NHibernate 项目的主要开发者 Ayende Rahien 发现，他在处理继承与反射时也遇到了类似问题。我通过将\
    \ `DomainObject` 改为泛型类型来绕过 `TargetException` 问题，该泛型要求所有继承类必须是 `DomainObject<T>`\
    \ 的形式，其中 `T` 是一个 `DomainObject`。当 `Location` 继承自 `DomainObject<Location>` 时，它满足了泛型条件，并克服了反射的问题。\n\
    \n## 管理关系\n\n回到第 10 章清单 10-7 中的 `Event` 类，你可能已经注意到其中存在表示关系的属性。具体来说，名为 `Speaker`、`Sponsor`\
    \ 和 `Location` 的属性，其值并非随 `Event` 对象的“获取”存储过程一同载入。对于 `Location` 属性，其实际值最初被留空（null），并在需要时加载。这就是之前介绍过的“延迟加载”技术。当访问\
    \ `Location` 属性时，“getter”方法会检查该变量是否已定义，如果没有，它将尝试从 `LocationProvider` 获取值，如清单 10-10\
    \ 所示。\n\n**清单 10-10.** *Location 属性的 Getter*\n```csharp\nprivate Location _location;\n\
    \n[DataMember(Name = \"Location\",Order = 1)]\npublic Location Location\n{\n \
    \   get\n    {\n        if (_location == null)\n        {\n            // 延迟加载位置\n\
    \            EventSection section = new EventSection();\n            _location\
    \ = LocationManager.GetProvider(section.LocationProvider).GetLocation(this);\n\
    \        }\n        return _location;\n    }\n    set { _location = value; }\n\
    }\n```\n\n当使用 `Location` 属性时，值是通过 `LocationManager` 类加载的，但并非直接使用默认提供程序来获取位置，而是通过\
    \ `EventSection` 类来确定要使用的提供程序名称。稍后我们将探讨自定义配置如何辅助管理由不同提供程序处理的对象间关系。\n\n## 使用位置\n\
    \n用于管理关系的 `EventProvider` 的另一个特性是清单 10-11 所示的 `ILocationConsumer` 接口。\n\n**清单\
    \ 10-11.** *ILocationConsumer 接口*\n```csharp\nnamespace DotnetUserGroup.DataAccess.Locations\n\
    {\n    public interface ILocationConsumer\n    {\n        bool IsUsingLocation(Location\
    \ location);\n    }\n}\n```\n\n`ILocationConsumer` 接口用于保护 `Location` 在仍在被使用时不被删除。一个\
    \ `Sponsor` 可以关联一个 `Location`，一个 `Event` 也可以。如果某个 `Sponsor` 或 `Event` 正在使用一个 `Location`，则该\
    \ `Location` 不应被删除。每个与位置有关系的提供程序都实现了 `ILocationConsumer` 接口。\n"
