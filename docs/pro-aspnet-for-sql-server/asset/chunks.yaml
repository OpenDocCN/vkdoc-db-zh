    **194**


    C H A P T E R 7 ■ M A N U A L D ATA A C C E S S L AY E R


    Debugging


    You might expect that debugging with DataSets would be well supported. Surprisingly,
    the lack of debugging support is a significant shortcoming of working with DataSets.
    In Figure 7-1


    you can see how you can get to the values for the first DataRow of the first DataTable
    in the DataSet. To get to the next DataRow, you must change the index value.


    **Figure 7-1.** *Viewing a DataSet in the debugger* At least you can view the
    values for the columns in the row, but these values are accessed by using the
    index and not the column name. When you are accessing this same row that is being
    attached to a databound control on the Web Form, such as a Repeater, you will
    access the row with e.Item.DataItem, which is a DataRowView. And as you see from
    Figure 7-2, the watch window is less helpful than Figure 7-1\. You cannot directly
    navigate to the values, and you can hardly infer the type by looking at the watch
    window.


    **Figure 7-2.** *Viewing a DataRowView in the debugger* This poor debugging experience
    will decrease the amount of time you can spend creating and maintaining your application.
    When the data is moved immediately into a business object on the data access layer
    and passed back to the application, you will be able to access the data from the
    debugger in a much more useful way. The same data used in Figures 7-1 and 7-2
    is


    ![Image 29](index-200_1.png)


    8601Ch07CMP2 8/24/07 12:23 PM Page 195


    C H A P T E R 7 ■ M A N U A L D ATA A C C E S S L AY E R


    **195**


    dropped into a FavoriteLink object in Figure 7-3\. FavoriteLink is a key object
    used by the website that will we will be building later in this chapter.


    **Figure 7-3.** *Viewing a FavoriteLink object in the debugger* The values shown
    in Figure 7-3 are definitely much more readable, and you know exactly what you
    are working with. Using a business object clearly offers a better debugging experience
    over DataSets. Compile-time support is restored for at least the user interface
    layer, while the type-safety issues are isolated deep inside the data access layer.
    When you set the Url property in the FavoriteLink object by casting row["Url"]
    to String, you will do so near the query that pulled the data. Any resulting exception
    will show a stack trace leading to this query and the line number if you have
    deployed the Program Debug Database (PDB) file with the assembly. Later you will
    see how to completely avoid the InvalidCastException.


    ■**Note** Exceptions can provide a more detailed stack trace if the PDB file that
    is created when the class library is compiled is deployed with the assembly. Useful
    details such as the exact line number where the exception came from will assist
    you in tracking down and fixing bugs. The PDB file is created while in the Debug
    and Release configuration.


    Like any other normal object, the FavoriteLink object is also more approachable
    for refactoring. You can find all references to the Url property wherever it is
    used in the code in your solution. Unfortunately, if you declaratively bind the
    Url property to a databound control, the refactoring search will not find that
    reference.


    And finally, you can use the FavoriteLink object more easily while debugging,
    as shown in Figure 7-3\. This even includes setting break points in the property
    accessors, which will be very useful when watching which values are being bound
    to a databound control.


