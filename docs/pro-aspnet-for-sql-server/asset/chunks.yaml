    Name="ID"


    ConvertEmptyStringToNull="False">


    </asp:QueryStringParameter>


    </SelectParameters>


    </asp:ObjectDataSource>


    The Person class created by Blinq in the Chapter08.BlinqDAL namespace includes
    the GetPerson, Insert, Update, and Delete methods. The ID value that is used to
    query the database for an individual record is set to be pulled from the query
    string.


    The code generated by Blinq is placed in two source files, Chapter08.cs and StaticMethods.cs,
    in the App_Code folder of the website. The name of the first source file comes
    from the name of the database. You could pull these files out to a class library
    to make them reusable from a central point as a dependency. What is so interesting
    about Blinq is how simple and to the point the code is for working with the data.
    Listing 8-23 shows the GetPerson method from the Person class.


    **Listing 8-23.** *GetPerson Method*


    public static Person GetPerson(Int64 ID) {


    Chapter08 db = Chapter08.CreateDataContext();


    return db.Persons.Where(x=>x.ID == ID).FirstOrDefault();


    }


    The query is a single line. There is no stored procedure on the other end. The
    LINQ system creates all of the necessary SQL and uses it to get the data and populate
    the Person object.


    That is all there is to it! The LINQ query simply matches the ID column with the
    ID value passed into the method. Another method, GetPersonsByLocation, is a little
    more complex because it handles the relationship between the Person and Location
    tables. It is shown in Listing 8-24.


    **Listing 8-24.** *GetPersonsByLocation Method*


    public static IQueryable<Person> GetPersonsByLocation(Int64 ID) {


    Chapter08 db = Chapter08.CreateDataContext();


    return db.Locations.Where(x=>x.ID == ID).SelectMany(x=>x.Persons);


    }


    The GetPersonsByLocation query takes the ID for a Location, and from there it
    selects multiple Person records. As you can see, there is some query chaining
    happening here. This is going to become a familiar coding style as you use LINQ
    more and more in your work. The results from one query can be passed through another
    query to filter the final result. And while you may think the query appears to
    be inefficient, you will be pleasantly surprised that the inner workings of the
    LINQ runtime environment handle several optimizations that speed up your queries
    while allowing you to write code that is more readable to you.


    I will get into LINQ a great deal more in Chapter 10 with a series of examples
    that will explain what is going on here in more detail.


