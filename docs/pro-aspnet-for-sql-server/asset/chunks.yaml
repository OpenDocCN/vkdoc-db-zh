- fmt: '# CHAPTER 4


    ## Debugging and ViewState


    To see exactly what was happening, I placed breakpoints at the start of each of
    the event-handler methods and the `CreateChildControl` methods for the `PersonListingControl`
    and `PersonRow` classes. I then started a debugging process on a page that had
    a single `PersonListingControl` on the page. Once the debugger was started, I
    added a few watch items such as `dataSource`, `dataBinding`, `_firstName`, and
    `IsViewStateEnabled` so I could see their values at each step.


    Normally, with `ViewState` enabled, a postback will only cause the `CreateChildControls`
    method to be called once if a postback event does not specifically cause it to
    load fresh data, like when the `PageIndex` changes. With the `ViewState` disabled,
    I found that the `CreateChildControls` method was called a second time during
    the `PreRender` event with the `dataSource` parameter defined, which caused the
    `PersonRow` items to get the values they needed. As you can see in `Figure 4-5`,
    the `ViewState` is disabled and the `_firstName` member variable has been defined.
    This value was set during the second call to the `CreateChildControls` method.


    `Figure 4-5.` Debugging without `ViewState`


    With this sample databound control, you can now try your own experiments and watch
    exactly what happens while walking through the code during a debugging session.
    You can see how the `ViewState` can impact performance, while moving `ViewState`
    to the `Session` can offer some benefits with a different set of risks. Using
    the right combination of databound control settings for your application will
    give you some performance improvements with minimal effort.


    ## Common Folder Additions


    This custom databound control is a useful code sample that you could place in
    your Common folder in the Templates subfolder (`D:\Projects\Common\Templates\Databound
    Control`). While you may not be building a custom databound control, you will
    occasionally want to create a control that uses `ViewState` more efficiently,
    perhaps even with `ViewState` disabled. This code can be downloaded with the rest
    of the sample code for the book.


    ## Summary


    In this chapter, you looked at all of the data binding options available to ASP.NET.
    You looked at several of the standard controls, combined them with a series of
    user controls, and finally created your own custom databound control. With these
    choices, you can now decide which databound controls will work well for your needs,
    and by choosing the right controls along with the optimal settings for `ViewState`,
    you can make a more efficient presentation layer.


    # CHAPTER 5


    ## SQL Providers


    The flexibility of ASP.NET 2.0 is largely due to the pluggable architecture of
    the provider model, which beautifully connects SQL Server, the SQL implementations
    of the providers, and many ASP.NET controls. Not only are these providers and
    the controls that use them highly configurable, but they are also completely replaceable
    if you choose to build your own from scratch to suit unique requirements. It is
    quite easy to get your ASP.NET website to do exactly what you need it to do by
    using the available features, which give you a rich base of functionality to get
    you started with a full bag of tricks.


    This chapter covers the following:


    *   The `SqlMembershipProvider`

    *   The `SqlRoleProvider`

    *   The `SqlProfileProvider`

    *   Building a SQL Photo Album provider

    *   Building a SQL SiteMap provider


    The SQL providers in ASP.NET 2.0 give the platform a great deal of flexibility
    by pairing a domain model with user-interface components that can be pieced together
    with other domains and components in a very modular way. Most of the new controls
    introduced with ASP.NET 2.0 are backed by providers offering multiple implementations
    that go beyond SQL Server. And if you would like to implement your own provider,
    there are features in the framework to help you get started with minimal effort.
    You could even design your own SQL'
