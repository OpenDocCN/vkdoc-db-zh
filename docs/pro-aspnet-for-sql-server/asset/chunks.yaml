    \n用户成功登录账户后，会被分配一个令牌，该令牌以 Cookie 的形式保存在客户端。此 Cookie 即被称为表单身份验证令牌。在清单 5-4 中，Cookie\
    \ 名称为 `.ASPXFORMSAUTH`（这是默认名称）。该令牌是客户端与后端会员系统之间的连接纽带。\n\n## 按角色控制行为\n\n作为网站的管理员，你可能会将自己添加到一个名为\
    \ `Admin` 的角色中。在清单 5-5 中，可以看到如何使用 `Admin` 角色来限制只有属于 `Admin` 角色的用户才能访问管理区域。当你登录网站时，可以显示指向管理区域的链接，而普通用户则看不到该链接。你只需检查当前用户是否在\
    \ `Admin` 角色中，并据此设置超链接的 `Visible` 属性。\n\n**清单 5-5.** 设置 AdminHyperLink 的可见性\n\n\
    ```\nprotected void Page_Load(object sender, EventArgs e)\n{\n    AdminHyperLink.Visible\
    \ = Roles.IsUserInRole(User.Identity.Name, \"Admin\");\n}\n```\n\n你可以更进一步利用这个机制。例如，在一个电商网站中，当客户首次购买时，你可能会将其添加到\
    \ `Customer` 角色，这将开始在其账户页面上显示订单历史和货运追踪等内容。如果你的电商网站与为网站提供产品的多个供应商合作，你可以将他们添加到 `Vendor`\
    \ 角色，并授权他们访问以更新库存数据和预计发货时间。\n\n请记住，所有角色信息都与你的应用程序数据一起存储在数据库中。虽然最好使用 `RoleProvider`\
    \ 来与此数据交互，但你也可以使用底层存储过程来与会员数据交互。对于电商网站，你可能希望每月运行一次报告，查找过去三个月内购买商品总额超过 1000 美元的所有用户。然后，你可以使用\
    \ `aspnet_UsersInRoles_AddUsersToRoles` 存储过程将他们添加到 `PreferredCustomer` 角色，使其有资格享受折扣和特别优惠。当订单进来时，你会记录订单的商品、数量和价格，但将处理工作留到当天晚些时候批量处理。那时，你可以验证用户是否在\
    \ `PreferredCustomer` 角色中，并使用 `aspnet_UsersInRole_IsUserInRole` 存储过程给予他折扣。回到网站上，该用户将开始在主页上看到其他人无法看到的特别优惠（希望能赢得用户的忠诚度），这一切都基于用户与特权角色的关联。\n\
    \n拥有这些可访问的存储过程的另一个优势是，许多平台都可以与 SQL Server 协同工作。你的公共网站可能运行的是 ASP.NET，但你的订单履行流程可能使用另一种无法直接使用\
    \ .NET 框架的语言或平台来实现。在关于面向服务架构（SOA）作为整合不同平台的手段的诸多讨论中，我认为数据库本身已经是一个极好的集成点。几年前我在构建一个网站时，团队中有几位开发人员使用另一个软件平台开发桌面应用程序，用于处理供应商申请和订单履行流程。我使用数据库作为在不同平台之间安全传递数据的方式。\n\
    \n由于存储过程对其他平台同样可用，我不必为让他们适应我正在构建的系统而做任何额外的工作。\n\n## SqlProfileProvider\n\nASP.NET\
    \ 配置文件提供程序向用户账户添加了额外的属性。我们在第 1 章中提到过这一点。`SqlProfileProvider` 的有趣之处在于，它不要求你必须同时使用\
    \ `MembershipProvider` 的实现。这似乎没什么意义，因为如果你可以自定义用户账户，却无法登录并恢复你的偏好设置。但这并不是 ASP.NET\
    \ 身份验证的工作方式。会员提供程序实际上只是表单身份验证之上的一个层，而表单身份验证已经存在好几年了。事实上，你可以直接使用表单身份验证完全实现一个会员系统，并且它与\
    \ `SqlProfileProvider` 兼容。你甚至可以在 `Web.config` 文件中存储用户名和密码，如清单 5-6 所示。\n\n**清单\
    \ 5-6.** Web.config 中的用户名和密码\n\n```\n<authentication mode=\"Forms\">\n  <forms\
    \ loginUrl=\"Login.aspx\"\n         name=\".ASPXFORMSAUTH\"\n         slidingExpiration=\"\
    true\">\n    <credentials passwordFormat=\"Clear\">\n      <user name=\"admin\"\
    \ password=\"easy12guess\"/>\n      <user name=\"user\" password=\"abc123\"/>\n\
    \    </credentials>\n  </forms>\n</authentication>\n```\n\n这一切或许可以解释为什么会员、角色和配置文件接口似乎混杂在一起，有如此多的地方可以收集关于用户的必要信息。`MembershipUser`\
    \ 对象使用自 .NET 1.0 以来就存在的 `User` 对象。但是，尽管你可以在不使用 `MembershipProvider` 的情况下使用 `SqlProfileProvider`，但几乎没有理由这样做。\n\
    \n在使用 `SqlProfileProvider` 后，你需要做一个选择。你可以选择允许任何访问你网站的用户匿名维护其配置文件，或者不允许。这是一个常见功能，但有一些值得考虑的问题。\n\
    \n**注意：** 请记住，已经配置了默认提供程序，你在配置网站时需要先清除它们。否则，你会遇到意外行为。虽然可以配置和使用多个提供程序实现，但这并不常见。在配置网站时，以\
    \ `clear` 指令开始你的提供程序配置应该是第一步。\n\n## 为什么需要匿名配置文件？\n\n匿名配置文件可以像已验证的配置文件一样，存储与配置文件相关的自定义设置。即使重启\
    \ Web 浏览器，这些设置也会跟随用户。也许你希望允许新用户在要求她创建账户之前就使用你的网站。电商网站上的一个常见功能是允许用户匿名将商品添加到她的购物篮中，在她选择购买这些商品后，在结账过程中为她创建一个账户，这样她以后就可以返回、登录并访问她的订单状态或使用之前的账户信息下新订单。\n\
    \n越来越多的网站还提供一些小功能来定制其内容以适应用户，但这些微小的偏好设置并不值得用户在另一个网站上再创建一个账户。一个例子是 CNN 网站上的字体大小调整按钮，它允许你增大或减小页面上的文本大小（见图\
    \ 5-1）。当你在几天后返回时，CNN 网站会记住你的偏好。这个单一设置本可以单独保存为一个 Cookie，但当设置配置文件属性如此容易时，你就可以依赖匿名配置文件了。\n\
    \n**图 5-1.** CNN.com 的字体大小调整"
- fmt: "You can also use the anonymous profile to keep track of a user by recording\
    \ the user’s actions to the database. Each time the user returns to the website,\
    \ it will log the visit. And each time the user digs into a section to get to\
    \ an individual article, you can record that detail. Later you can analyze all\
    \ this data to get a picture of the users coming to the website. Perhaps you later\
    \ break down the users into seven groups, assign longtime users to one of those\
    \ groups, and start to proactively adapt features, content, and advertising on\
    \ the website to them.\n\n## Configuring Anonymous Profiles\n\nAnonymous profiles\
    \ are not enabled by default, so you will need to add that setting to the configuration\
    \ (see Listing 5-7).\n\n**Listing 5-7.** Anonymous Profiles Enabled\n\n```\n<anonymousIdentification\n\
    \    enabled=\"true\"\n    cookieName=\".ASPXANONYMOUS\"\n    cookieTimeout=\"\
    144000\"\n    cookieSlidingExpiration=\"true\"/>\n```\n\nThis configuration gives\
    \ the anonymous session a 100-day time-out with a sliding expiration. If you are\
    \ going to allow for anonymous profiles, you will want to weigh the benefits and\
    \ the consequences. Although it will be a benefit to have thousands of users with\
    \ anonymous profiles using your commerce site to add products to your shopping\
    \ basket system as they mull over whether to purchase an item, it will also be\
    \ costly to have all those anonymous profiles taking up space in your database.\n\
    \n## Managing Anonymous Profiles\n\nIf you set the time-out to four weeks with\
    \ a sliding expiration window, you can assume that an anonymous account that has\
    \ not had any activity in four weeks is inactive as the user will not be able\
    \ to reestablish a connection to that profile. After you can identify these inactive\
    \ profiles, you can purge them from the system. You could purge some of them even\
    \ sooner if they do not have significant data stored with the profile. You will\
    \ find that search engines and other automated programs generate a significant\
    \ number of anonymous sessions. This classification of anonymous profiles will\
    \ make up a significant number of the profiles in your database.\n\nYou could\
    \ write a query identifying profiles in the database and write a script to purge\
    \ those profiles, but fortunately the `Membership API` anticipated this need so\
    \ you do not have to do all that work.\n\nListing 5-8 shows the event handler\
    \ for a button on a `Web Form`. It can be placed in the code-behind of a page\
    \ in the admin section of your website. When you want to purge the inactive profiles,\
    \ you can have it execute the following lines of code.\n\n**Listing 5-8.** Delete\
    \ Inactive Profiles with `Button1`\n\n```\nprotected void Button1_Click(object\
    \ sender, EventArgs e)\n{\n    ProfileManager.DeleteInactiveProfiles(\n      \
    \  ProfileAuthenticationOption.Anonymous,\n        DateTime.Now.AddMonths(-1));\n\
    }\n```\n\nThis code deletes all anonymous profiles that have not had any activity\
    \ in the past month. The `ProfileAuthenticationOption` enumeration also includes\
    \ values of `Authenticated` or `All` to give you access to deleting any profile.\
    \ This is still a manual process. It would be better to schedule a script to run\
    \ nightly, to keep a rolling window going that keeps deleting all inactive profiles.\
    \ When the `MembershipProvider` is backed by `SQL Server`, you can take advantage\
    \ of the stored procedure that the `SqlMembershipProvider` calls, `aspnet_Profile_DeleteInactiveProfiles`.\
    \ You have to pass in the application name, the profile option, and the date since\
    \ the profile has been active. The profile option is `0` for anonymous, `1` for\
    \ authenticated, and `2` for both profile types. Listing 5-9 shows the code that\
    \ deletes the inactive profiles.\n\n**Listing 5-9.** Delete Inactive Profiles\
    \ with T-SQL\n\n```\nDECLARE @PurgeDate DATETIME\nSET @PurgeDate = DATEADD(DAY,\
    \ -60, GETDATE())\nEXEC aspnet_Profile_DeleteInactiveProfiles 'appName', 0, @PurgeDate\n\
    ```\n\nWith this script scheduled to run nightly, it should keep your database\
    \ clear of unnecessary profile data. It is set to go back 60 days, but 14 days\
    \ may be preferable."
