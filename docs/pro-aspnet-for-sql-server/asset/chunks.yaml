  trans: '

    减少对数据库的访问次数可以提高应用程序的效率。这还为你在数据库中组织表的方式提供了一定的灵活性。模式变更可以完全封装在存储过程之后，这样使用数据库的应用程序就无需进行任何更改。


    ## 索引与约束管理


    当你添加具有外键约束的表时，会开始遇到一些复杂情况。如果存在外键依赖关系阻止该操作，你就无法删除表。为了解决这个问题，我会在每个数据库项目中创建一个名为 Constraints
    的文件夹，其中包含一个用于添加所有外键约束的脚本和另一个用于删除它们的脚本。我还经常会有一个用于清除所有数据并填充一些初始示例数据的脚本。当我更改多个表脚本时，可以先移除约束，运行表脚本，然后用示例数据重新填充数据库，以便测试存储过程。


    数据库项目没有用于检查索引和外键的模板，因此你必须从头开始。表和存储过程模板的最佳功能是，在重新创建项目之前会检查该项目是否存在并需要先删除，这样你就可以无错误地运行脚本。


    ### 管理索引


    对于 Person 和 Location 表，只有三个索引。管理索引的脚本是通过使用 Management Studio 创建的。脚本首先被添加到表中，在保存更改之前，我使用了任务栏上的
    `Generate Change Script` 按钮，该按钮会显示用于进行单项更改的脚本。我将该脚本复制并粘贴到用于添加索引的脚本中。此脚本不检查索引是否已存在，因此必须在
    `CREATE INDEX` 命令之前包含检查这些索引的查询，才能每次成功运行。


    #### 删除索引


    清单 3-6 展示了删除索引的脚本。


    **清单 3-6.** *删除索引.sql*


    ```sql

    BEGIN TRANSACTION


    GO


    IF EXISTS


    (SELECT * FROM sysindexes AS i


    JOIN sysobjects AS o on i.id = o.id


    WHERE o.name = ''chpt03_Location'' and i.name =


    ''IX_chpt03_Location_City'')


    BEGIN


    PRINT ''Dropping index IX_chpt03_Location_City''


    DROP INDEX IX_chpt03_Location_City ON dbo.chpt03_Location END


    GO


    IF EXISTS


    (SELECT * FROM sysindexes AS i


    JOIN sysobjects AS o on i.id = o.id


    WHERE o.name = ''chpt03_Location'' and i.name =


    ''IX_chpt03_Location_Country'')


    BEGIN


    PRINT ''Dropping index IX_chpt03_Location_Country''


    DROP INDEX IX_chpt03_Location_Country ON dbo.chpt03_Location END


    GO


    IF EXISTS


    (SELECT * FROM sysindexes AS i


    JOIN sysobjects AS o on i.id = o.id


    WHERE o.name = ''chpt03_Person'' and i.name =


    ''IX_chpt03_Person_BirthDate'')


    BEGIN


    PRINT ''Dropping index IX_chpt03_Person_BirthDate''


    DROP INDEX IX_chpt03_Person_BirthDate ON dbo.chpt03_Person END


    GO


    COMMIT

    ```


    `sysindexes` 和 `sysobjects` 表提供了所需的信息来检测索引是否已存在，这样就可以有条件地运行 `DROP` 命令以避免任何错误。


    移除索引使得向表中添加大量数据的过程快得多，因为移除后，每次插入时都无需检查和维护索引。在索引可以重新添加回去之后，可以运行清单 3-7 中的脚本。索引恢复到位后，当有大量数据时，查询运行速度应该会快得多。


    #### 添加索引


    **清单 3-7.** *添加索引.sql*


    ```sql

    BEGIN TRANSACTION


    GO


    IF NOT EXISTS


    (SELECT * FROM sysindexes AS i


    JOIN sysobjects AS o on i.id = o.id


    WHERE o.name = ''chpt03_Location'' and i.name =


    ''IX_chpt03_Location_City'')


    BEGIN


    PRINT ''Adding index IX_chpt03_Location_City''


    CREATE NONCLUSTERED INDEX


    IX_chpt03_Location_City ON dbo.chpt03_Location


    (


    City


    ) WITH( STATISTICS_NORECOMPUTE = OFF, IGNORE_DUP_KEY = OFF, ALLOW_ROW_LOCKS =
    ON, ALLOW_PAGE_LOCKS = ON)


    ON [PRIMARY]


    END


    GO


    IF NOT EXISTS


    (SELECT * FROM sysindexes AS i


    JOIN sysobjects AS o on i.id = o.id

    ```'
- fmt: "# Chapter 3: Database Management\n\n## Index Management\n\n### Checking and\
    \ Creating Indexes\n\n```sql\nIF NOT EXISTS (SELECT * FROM sysindexes AS i JOIN\
    \ sysobjects AS o on i.id = o.id WHERE o.name = 'chpt03_Location' and i.name =\
    \ 'IX_chpt03_Location_Country')\nBEGIN\n    PRINT 'Adding index IX_chpt03_Location_Country'\n\
    \    CREATE NONCLUSTERED INDEX IX_chpt03_Location_Country ON dbo.chpt03_Location\n\
    \    (\n        Country\n    ) WITH( STATISTICS_NORECOMPUTE = OFF, IGNORE_DUP_KEY\
    \ = OFF, ALLOW_ROW_LOCKS = ON, ALLOW_PAGE_LOCKS = ON)\n    ON [PRIMARY]\nEND\n\
    GO\n```\n\n```sql\nIF NOT EXISTS (SELECT * FROM sysindexes AS i JOIN sysobjects\
    \ AS o on i.id = o.id WHERE o.name = 'chpt03_Person' and i.name = 'IX_chpt03_Person_BirthDate')\n\
    BEGIN\n    PRINT 'Adding index IX_chpt03_Person_BirthDate'\n    CREATE NONCLUSTERED\
    \ INDEX IX_chpt03_Person_BirthDate ON dbo.chpt03_Person\n    (\n        BirthDate\n\
    \    ) WITH( STATISTICS_NORECOMPUTE = OFF, IGNORE_DUP_KEY = OFF, ALLOW_ROW_LOCKS\
    \ = ON, ALLOW_PAGE_LOCKS = ON)\n    ON [PRIMARY]\nEND\nGO\n```\n\nAfter the indexes\
    \ are easily managed, it is time to move on to the foreign key constraints. In\
    \ the case of these constraints, there also is no starter template that checks\
    \ for existing constraints before dropping them. The script in Listing 3-8 removes\
    \ the single foreign key between the `Person` and `Location` tables.\n\n## Defragmenting\
    \ Indexes\n\nOver time indexes can become fragmented. A fragmented index will\
    \ take longer to scan than a freshly created index, so it is necessary to occasionally\
    \ use the `REORGANIZE` command to clean up indexes. That command does not fully\
    \ refresh an index but does improve performance. The `REBUILD` command can be\
    \ used to fully refresh the index. These tasks are best left to your database\
    \ administrator (DBA). As you start to notice performance degradation, you can\
    \ consider this tuning technique.\n\n### Listing 3-8. `RemoveConstraints.sql`\n\
    \n```sql\nIF EXISTS (SELECT * FROM dbo.sysobjects WHERE id = object_id(N'[dbo].[FK_chpt03_Person_chpt03_Location]')\
    \ and OBJECTPROPERTY(id, N'IsForeignKey') = 1)\n    ALTER TABLE [dbo].[chpt03_Person]\n\
    \    DROP CONSTRAINT FK_chpt03_Person_chpt03_Location\n```\n\nAnd then to add\
    \ the constraint back, the constraint in Listing 3-9 is run.\n\n### Listing 3-9.\
    \ `AddConstraints.sql`\n\n```sql\nALTER TABLE [dbo].[chpt03_Person] WITH CHECK\
    \ ADD CONSTRAINT [FK_chpt03_Person_chpt03_Location] FOREIGN KEY([LocationId])\
    \ REFERENCES [dbo].[chpt03_Location] ([LocationId])\n```\n\nNow that roadblock\
    \ is easily removed whenever the tables need to be readjusted for a change to\
    \ the tables. If you want to add a column, you can update the table script, remove\
    \ the constraints, run the table script, and add the constraints back.\n\n## Performance\
    \ Considerations\n\nBefore I get to the next example, there are some considerations\
    \ to review. Where performance is concerned, there are many factors to consider.\
    \ To tune a slow application using a database, there are a few basic steps you\
    \ can take such as adding indexes to your tables and pulling only the necessary\
    \ data. The indexing will help assemble the results more quickly, while pulling\
    \ less data will reduce the amount of data transferred. In the case of very large\
    \ result sets, leaving off some columns will add up to a measurable difference.\
    \ There are many other changes that can be made to enhance performance, but these\
    \ first two are the low-hanging fruit that will typically give the most benefit.\n\
    \nAfter you have pulled all data from the database into the web application to\
    \ display on the Web Form, the databound values will be serialized to `ViewState`.\
    \ With a very large amount of data, the result will be a very large file that\
    \ the users of the website will have to download.\n\nFor a `GridView` that is\
    \ showing only 10 of 100 rows, the `ViewState` can still hold all the data for\
    \ all 100 rows. And although the pages with such large sets of data will load\
    \ quickly during development while you are working on the same computer as the\
    \ web server, it will be painfully slow for a user accessing the website remotely.\
    \ As a rule of thumb, the web page must be under 100 KB, if not under 50 KB.\n\
    \nI once worked on a website using a dynamic navigational menu that had `ViewState`\
    \ and `PostBack` events covering several levels of the website hierarchy. It included\
    \ a large number of links, which added to the size of the `ViewState`. The typical\
    \ web page was nearly 300 KB, with over 90 percent of the page content being the\
    \ `ViewState`. The original developer never knew about this problem as he worked\
    \ on his laptop, and everything was always fast. He never checked the page size\
    \ or how long it took to move from page to page from a remote server. This sort\
    \ of problem should be caught early, when it is easier to fix.\n\nYou can tune\
    \ your tables and queries all you like, but if the page is 300 KB and many of\
    \ your users are still using dial-up or even low-end broadband speeds, they will\
    \ find that your website is slow. In contrast, most major news sites and information\
    \ portals are under 30 KB. In the following examples, the `ViewState` issue will\
    \ be addressed and resolved with a simple strategy.\n\n**Note:** The time to transfer\
    \ data is just one aspect of a slow web page. Large tables with many rows and\
    \ cells add to the rendering time for a web page. If it takes less than a second\
    \ to load the data for a page, it can still take a few more seconds for the web\
    \ page to render a complex table.\n\nIt would be much more efficient to ask that\
    \ the database return only the range of items that will be displayed, rather than\
    \ have the database return all possible items. When only ten rows are shown, it\
    \ is wasteful to transfer thousands of rows from the database to the web application.\n\
    \nFortunately, we can request just that subset, but we will need a new stored\
    \ procedure that will work with our new goal. Listing 3-10 shows the script to\
    \ create this special stored procedure.\n\n### Listing 3-10. `chpt03_GetPeopleSubSetSorted.sql`\n\
    \n```sql\nIF EXISTS (SELECT * FROM sysobjects WHERE type = 'P' AND name = 'chpt03_GetPeopleSubSetSorted')\n\
    BEGIN\n    DROP Procedure chpt03_GetPeopleSubSetSorted\nEND\nGO\n\nCREATE Procedure\
    \ dbo.chpt03_GetPeopleSubSetSorted\n(\n    @sortExpression nvarchar(50),\n   \
    \ @startRowIndex int,\n    @maximumRows int\n)\nAS\nIF LEN(@sortExpression) =\
    \ 0\n    SET @sortExpression = 'PersonId'\n\n-- reset to 1 based index\nSET @startRowIndex\
    \ = @startRowIndex + 1\n\n-- build sql\nDECLARE @sql nvarchar(4000)\nSET @sql\
    \ = 'SELECT PersonId,FirstName,LastName,BirthDate,City,Country FROM\n(SELECT p.PersonId,p.FirstName,p.LastName,p.BirthDate,l.City,l.Country,\n\
    ROW_NUMBER() over(ORDER BY ' + @sortExpression + ') AS RowNum\nFROM chpt03_Person\
