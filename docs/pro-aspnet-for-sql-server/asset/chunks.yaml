    varchar(50)


    DECLARE @LastName varchar(50)


    SET @FirstName = ''John''


    SET @LastName = ''Smith''


    SELECT * FROM chpt03_Person


    WHERE FirstName = @FirstName


    AND LastName = @LastName


    The preceding script shows how the variables are declared, set, and used within
    the script.


    After the script is working properly, it can be placed into the stored procedure
    template that was stubbed out in the Database Project (see Listing 3-2).


    **Listing 3-2.** *Stored Procedure to Select People by First and Last Name* IF
    EXISTS (SELECT * FROM sysobjects WHERE type = ''P'' AND


    name = ''chpt03_GetPeopleByName'')


    BEGIN


    DROP Procedure chpt03_GetPeopleByName


    END


    GO


    CREATE Procedure dbo.chpt03_GetPeopleByName


    (


    @FirstName varchar(50),


    @LastName varchar(50)


    }


    AS


    SELECT * FROM chpt03_Person


    WHERE FirstName = @FirstName


    AND LastName = @LastName


    GO


    GRANT EXEC ON chpt03_GetPeopleByName TO PUBLIC


    GO


    You can see how the declared variables are now used as parameters and the set
