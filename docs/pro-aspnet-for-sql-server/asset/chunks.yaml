    The EventDataObject uses a property called Provider that is simply a wrapper to
    get EventManager, which returns the named provider. Because the default constructor
    will be used with an ObjectDataSource, the value returned from the ProviderName
    property will always return a null value. When the EventManager is given a null
    value, it assumes the default provider is appropriate and the EventDataObject
    is able to function. If you wanted to use a different provider other than the
    default, you would have to programmatically instantiate either the EventDataObject
    and set the ProviderName property or directly use the EventManager to get access
    to the provider you want.


