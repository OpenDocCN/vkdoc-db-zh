    private decimal originalPrice;


    **[SetUp]**


    public void SetUp()


    {


    productId = 1;


    domain = new Domain();


    DataSet productDs = domain.GetProductByID(productId, CachingMode.Off); originalPrice
    = GetPrice(productDs);


    }


    **[TearDown]**


    public void TearDown()


    {


    domain.SetListPrice(originalPrice, productId);


    domain.ClearCache();


    domain = null;


    }


    private decimal GetPrice(DataSet ds)


    {


    // verify there is data


    Assert.IsTrue(ds.Tables.Count > 0, "DataSet must be populated"); Assert.IsNotNull(ds.Tables[0],
    "Table must be populated"); Assert.IsTrue(ds.Tables[0].Rows.Count > 0, "Row must
    be populated"); DataRow row = ds.Tables[0].Rows[0];


    decimal price = (decimal)row["ListPrice"];


    return price;


    }


    #endregion


    // Test Methods //


    }


    }


    You can see the SetUp method creates the domain object and gets the original price.


    The TearDown method restores the price using the original price. For every test
    that is run, the SetUp method is run first, and after the test has completed,
