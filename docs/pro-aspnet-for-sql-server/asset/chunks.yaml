  trans: "\n虽然前面的控件确实允许你修改它们显示的数据，但它们并未为各种数据类型提供强大的智能功能。例如，日期编辑功能会让你使用常规的 `TextBox`\
    \ 控件来编辑日期。输入一个非日期格式的字符串将导致回发事件抛出异常，如图 4-1 所示。\n\n**图 4-1.** 保存日期值时出现的 FormatException\n\
    \n![Image 14](img/index-85_1.jpg)\n\n## 第 4 章 - 数据绑定控件\n\n你甚至可能输入一个看起来像有效日期的值，例如\
    \ 6 月 31 日，但 6 月没有 31 日，因此也会失败。最佳做法是防止该错误发生并避免异常。为此，可以用 `TemplateField` 替换 `BoundField`。这可以通过在\
    \ `GridView` 的**智能标记**上点击**编辑列**链接（如图 4-2 所示）打开的**字段**面板中，将 `BoundField` 转换为 `TemplateField`\
    \ 来实现。\n\n**图 4-2.** 字段编辑器\n\n一旦你拥有了 `TemplateField`，它将以用于只读模式的 `Label` 和用于编辑模式的\
    \ `TextBox` 开始，并分别放置在 `ItemTemplate` 和 `EditTemplate` 中。一个示例如清单 4-4 所示。\n\n**清单\
    \ 4-4.** 包含 TemplateField 的 GridView\n\n```asp\n<asp:GridView ID=\"GridView1\"\
    \ runat=\"server\"\n    AllowPaging=\"True\" AllowSorting=\"True\"\n    AutoGenerateColumns=\"\
    False\" DataKeyNames=\"PersonId\"\n    DataSourceID=\"ObjectDataSource1\">\n \
    \   <Columns>\n        <asp:BoundField DataField=\"FirstName\"\n            HeaderText=\"\
    First Name\" SortExpression=\"FirstName\" />\n        <asp:BoundField DataField=\"\
    LastName\"\n            HeaderText=\"Last Name\" SortExpression=\"LastName\" />\n\
    \        <asp:BoundField DataField=\"City\" HeaderText=\"City\" SortExpression=\"\
    City\" />\n        <asp:TemplateField HeaderText=\"Birth Date\" SortExpression=\"\
    BirthDate\">\n            <EditItemTemplate>\n                <asp:TextBox ID=\"\
    TextBox1\" runat=\"server\"\n                    Text='<%# Bind(\"BirthDate\"\
    ) %>'></asp:TextBox>\n            </EditItemTemplate>\n            <ItemTemplate>\n\
    \                <asp:Label ID=\"Label1\" runat=\"server\"\n                 \
    \   Text='<%# Bind(\"BirthDate\") %>'></asp:Label>\n            </ItemTemplate>\n\
    \        </asp:TemplateField>\n        <asp:BoundField DataField=\"Country\"\n\
    \            HeaderText=\"Country\" SortExpression=\"Country\" />\n        <asp:CommandField\
    \ ShowDeleteButton=\"True\" ShowEditButton=\"True\" />\n    </Columns>\n</asp:GridView>\n\
    ```\n\n新的 `TemplateField` 最初并未阻止无效日期的问题，但它将允许你添加验证控件来检查该值。可以在 `GridView` 上方放置一个\
    \ `ValidationSummary` 控件，以显示任何指示无效值的验证器的 `ErrorMessage` 属性，但这必须在每个编辑日期的地方重复设置。它也使得\
    \ `GridView` 的定义相当臃肿。因此，你将创建一个名为 `DateEditor` 的简单用户控件。该用户控件将由一个 `TextBox` 以及一个\
    \ `CustomValidator` 和一个 `RegularExpressionValidator` 组成。`DateEditor` 如清单 4-5 所示。\n\
    \n**清单 4-5.** DateEditor\n\n```asp\n<%@ Control Language=\"C#\" AutoEventWireup=\"\
    true\"\n    CodeFile=\"DateEditor.ascx.cs\" Inherits=\"DateEditor\" %>\n<asp:TextBox\
    \ ID=\"TextBox1\" runat=\"server\"></asp:TextBox>\n<asp:CustomValidator ID=\"\
    cvDate\" runat=\"server\"\n    ControlToValidate=\"TextBox1\" Display=\"Dynamic\"\
    \n    EnableClientScript=\"False\" ErrorMessage=\"Date is invalid\"\n    OnServerValidate=\"\
