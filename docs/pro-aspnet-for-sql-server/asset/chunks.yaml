    Cache Methods


    There are a few methods you can use to place items into the cache and then remove
    them.


    The Cache object directly includes three methods: Add, Insert, and Remove. These
    are the only methods you will use to directly manipulate the cache. Beyond these
    methods, you will use the various types of dependencies you send into the cache
    as you work with your data.


    **Add Method**


    The Add method takes a key and an object along with other parameters to place
    objects into the cache. If an item is already in the cache, it does not add the
    new value; instead, it leaves the existing item untouched. This behavior is the
    reason it is more common to use the Insert method. It is important to realize
    this key difference between the Add and Insert methods.


    You can test the behavior I’ve just described by adding an item to the cache with
    a key of myKey and a value of 1\. Then add another item with the same key with
    a value of 2\. When you pull the value for myKey from the cache, it will be 1,
    as the second add did not replace the first value. This behavior can present a
    problem, but it can also be used to your advantage in the right scenario. Generally
    though, you will not attempt to add an item to the cache when one already exists.
    The normal data-caching pattern is to first check whether an item exists in the
    cache. If it exists, you use it. If it does not exist, you create it, add it to
    the cache, and then use it.


    **Insert Method**


    The Insert method also takes a key and an object with several parameters to place
    items into the cache. However, if an item with the same key is already in the
    cache, it will replace the item and use all of the values provided by the parameters.
    While the Add method only has one method signature, there are four method signatures
    for the Insert method.


    **Remove Method**


    The Remove method takes the key used to place an item into the cache and removes
    it from the cache. It is not required that an item marked with that key still
    exist in the cache for it to be removed, but if it does, the Remove method will
    return a reference to this object as it is removed.


    Otherwise, it returns a null reference.


