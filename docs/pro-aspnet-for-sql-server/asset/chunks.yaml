    creates instances of PersonRow, and adds them to the Rows and Controls collections
    and increments the count. When there is no data, the member variable _itemCount
    is used to ensure the correct number of empty items is added to the Controls collection.
    As you can see, a null value is given to the PersonRow constructor. Finally, at
    the very end the count variable that was incremented on both execution branches
    is used as the return value.


    **Getting the Data**


    In order to get the data that is passed into CreateChildControls, a databound
    control will fire the PerformSelect method. The implementation details of the
    CompositeDataBoundControl take care of calling this method when it is needed so
    you do not have to call it explicitly with your own code. This is the method that
    raises the OnDataBinding and OnDataBound events before and after the data is requested.


    The data is represented as a DataSourceView, which could be a datasource that
    was manually bound to the control or defined by the DataSourceID property. In
    any case, you can get an instance of it with the built-in GetData method, as shown
    in Listing 4-23.


