    **151**


    database to pull product details five separate times for one request. Using the
    current context would dramatically reduce your database load. Listing 6-4 shows
    how you can load data into the current context. Listing 6-5 shows how every user
    control, or any control, on the page can access the data placed in the current
    context.


    **Listing 6-4.** *Loading the Product into the Current Context in the Page_Load
    Method* using System;


    using System.Web.UI;


    public partial class _Default : Page


    {


    protected void Page_Load(object sender, EventArgs e)


    {


    Context.Items["CurrentProduct"] = GetProduct();


    }


    private Product GetProduct()


    {


    Product product = new Product("Product 1");


    return product;


    }


    }


    **Listing 6-5.** *Using the Current Context to Access the Product in a User Control*
    using System;


    using System.Web.UI;


    public partial class Controls_ProductControl : UserControl


