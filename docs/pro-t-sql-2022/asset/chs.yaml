- '# 使用模式比较和源代码控制管理数据库项目


  ### 模式比较工具概述


  一张标题为“模式比较”的页面截图。它显示了源和目标列表。下方显示了比较详细信息。


  **图 10-7**


  **模式比较窗口**


  图 10-7 中的顶部菜单栏显示了模式比较中可用的众多选项。使用此选项可以将本地存储库中缺少的代码添加到源代码控制。两个最有用的选项是 `Apply` 和 `Options`。`Apply`
  获取源下列出的所有项目并对目标执行中心的操作（本例中为 `Add`）。例如，存在于 `OutdoorRecreation` 数据库中的 SQL 表 `dbo.Customer`
  将被添加到 `OutdoorRecreation` 本地存储库。源代码控制是用于管理更改的工具，而存储库是存储更改的位置。`Options` 让你控制哪些项目将被比较，从而在此次模式比较中被修改。图
  10-7 包括添加一些用户定义类型和队列。如果你想排除它们，可以选择 `options` 并导航到 `Include Object Types` 选项卡。取消选中
  `Queues` 和 `User-Defined Types (CLR)` 的复选框会将这些对象从比较中移除，如果你在移除它们之后应用更改，它们将不会被添加到本地存储库中。如果你将队列和用户定义类型排除在比较之外，这些对象将不会被添加到你的存储库中。如果你后来决定想将它们添加到存储库，你将需要再次比较源和目标。一旦你选择了
  `Apply`，你会得到确认是否要进行这些更改的选项。


  ### 数据库项目窗口


  现在更改已应用，你可以在图 10-8 所示的 **数据库项目** 窗口中看到它们。


  ![图片](img/480547_2_En_10_Fig8_HTML.jpg)


  一张数据库项目的截图，显示了一个下拉列表。它从上到下依次呈现了 outdoor recreation 文件夹、数据库引用、d b o、procedures 和
  tables 文件夹。


  **图 10-8**


  **包含新对象的数据库项目窗口**


  图 10-8 显示了一个名为 `dbo` 的文件夹，用于 dbo 架构。在 `dbo` 文件夹下有两个子文件夹，一个用于 `Procedures`，一个用于 `Tables`。在每个文件夹中，是各自架构/对象类型组中存在的每个数据库对象的单独脚本。


  在左侧栏，源代码控制图标还显示有 13 个挂起的更改。在图 10-9 中，你可以看到以树状查看的更改。


  ![图片](img/480547_2_En_10_Fig9_HTML.jpg)


  一张源代码控制的截图，显示了一个选项列表。主要显示 changes、outdoor recreation、bin 或 debug、d b o、procedures、tables，最后是
  object 或 debug options。


  **图 10-9**


  **以树状显示的源代码控制更改**


  ### 提交更改


  为了提交更改，在你看到文本 *Message (Ctrl+Enter to commit on ''ch11'')* 的文本框中键入一条消息。要提交消息，可以选择右上角的复选框或使用
  `Ctrl+Enter`。一个弹出窗口会询问，*would you like to stage all your changes and commit them
  directly?* 一旦你选择是，更改将在本地提交。


  源代码控制窗口将更新。之前显示的所有对象将不再列出。相反，你会在文本框下方看到一个蓝色按钮，用于向提交添加消息。在图 10-10 中，该按钮显示了一个可以同步到
  GitHub 存储库的提交。


  ![图片](img/480547_2_En_10_Fig10_HTML.jpg)


  一张标题为“源代码控制”的页面截图，显示了一个水平栏，内容为：message open parenthesis c t r l plus enter to commit
  on c h 1 1 parenthesis close。下方高亮显示了 sync changes 按钮。


  **图 10-10**


  **同步更改**


  在选择此按钮之前，更改仅存储在你的本地机器上。为了允许这些更改保存在中央存储库中，你需要同步这些更改。这也将允许任何其他有权访问此存储库的人看到与 *ch11*
  分支相关的更改。


  ### 添加存储过程


  如果你在此分支上有需要执行的额外任务，可以创建额外的对象。通过右键单击 `Procedures` 文件夹，你可以选择 **添加存储过程**。这将打开一个带有如何创建存储过程模板的窗口。名为
  `GetProduct.sql` 的新文件也将被添加到左侧的数据库项目窗口中，如图 10-11 所示。


  ![图片](img/480547_2_En_10_Fig11_HTML.jpg)


  一张截图，左侧显示了数据库项目的列表，并高亮显示了 product dot s q l 选项。右侧显示了名称、作者、创建日期、描述和用法示例的详细信息。


  **图 10-11**


  **添加存储过程**


  图 10-11 右侧显示了创建存储过程 `dbo.GetProduct` 的 T-SQL 代码。为了保存此更改，你应该在本地提交更改。这应该像保存文件一样快，只是多了一步，即包含更改内容的描述。一旦你完成了在存储库分支内的工作，你应该将更改同步到
  GitHub，以便其他开发人员如果正在处理同一分支，可以拉取你所做的任何更改。


  ### 同步与推送操作


  注意


  当使用 GitHub 进行同步时，GitHub 上当前分支的任何更改都会在本地更新。这被称为 *pull first*。然后，像创建存储过程这样的更改会在 GitHub
  上更新。这被称为 *push*。同步（Sync）是先拉取（pull）后推送（push）。


  ### 创建拉取请求


  如果你已经完成了 *ch11* 分支的所有必要更改，你可以通过拉取请求（pull request）将更改合并到 *main* 分支。拉取请求非常有用，尤其是在团队中工作时，因为它们允许其他人轻松地看到分支中所做的更改。作为解决拉取请求的一部分，还可以添加各种批准和验证，但这超出了本书的范围。


  创建拉取请求可以通过 Azure Data Studio 上的终端或访问 github.com 上的存储库来完成。当我去到 GitHub 上的 ProTSQL2022
  存储库时，我可以看到为 *ch11* 分支推送的新更改，如图 10-12 所示。


  ![图片](img/480547_2_En_10_Fig12_HTML.jpg)


  一张显示存储库页面的截图。主要显示：Compare & Pull request 按钮、go-to file、add a file 和 code 按钮。在右下角，显示：Add
  a readme 按钮。


  **图 10-12**


  **显示更改的 GitHub.com 存储库**


  要创建拉取请求，请选择 `Compare & pull request` 按钮。这将打开一个拉取请求。你可以选择将分支 *ch11* 合并到 github.com
  上存在的任何分支。对于你选择合并到的任何分支，GitHub 将运行快速检查以查看该分支是否可以合并。


  对于此示例，我将把 *ch11* 合并到 *main* 分支。这将获取 *ch11* 中的所有更改并将其添加到 *main* 分支。在创建拉取请求之前，如果我向下滚动，可以查看更改的文件。一旦我准备好创建拉取请求，我可以选择
  `Create pull request` 按钮。


  提示


  在许多组织中，拉取请求被用作代码审查过程的一部分。


  一旦创建了拉取请求，GitHub 将运行额外的验证以确认没有合并冲突。此拉取请求将保持打开状态，直到被合并。在我的示例中，一旦代码被合并，所有更改都将添加到 main
  分支。代码合并后，任何人拉取 *main* 分支的副本也将拥有来自 *ch11* 分支的更新更改。




  实施源代码控制是让数据库项目更易于管理的重要一步。在您的公司内部推动一项源代码控制倡议。主动联系其他部门，建立流程，确保每个人都能舒适地实施源代码控制。您也已经了解了将数据库添加到源代码控制的初始步骤。这是一段旅程的开始，途中可能会遇到一些小波折，但从长远来看能为您节省时间。既然您已经实施了源代码控制，就为管理
  T-SQL 代码的下一步做好了准备。下一章将重点介绍可用于测试 T-SQL 代码并确认您是否符合各种编码标准的多种方法。


  '
- "# 第 11 章：测试\n\n当您需要编写或修改一些 T-SQL 代码时，您可能会忍不住直接开始写代码。在许多情况下，必要的数据库代码足够简单，无需进行额外分析。但最终，所查询的数据或\
  \ T-SQL 代码会变得足够复杂，以至于您希望确保自己的代码能按预期工作。在这些时候，您可能需要测试您的 T-SQL 变更。虽然您可以随时开始测试 T-SQL\
  \ 代码，但在处理复杂场景之前，尽早养成某些习惯可能会对您有所帮助。\n\n您可能已经准备好开始测试代码，但不知道从哪里开始。您将进行的测试类型取决于您想要实现的目标。您可以实施测试以确认单个功能是否按预期工作。也可以测试两个或多个代码段之间的交互。这种类型的测试在尝试确认对\
  \ T-SQL 代码进行变更所产生的下游影响时也很有用。您还可以测试以确保您编写的代码符合编码标准。虽然任何类型的测试都很有价值，但最显著的好处来自于将这三者结合起来使用。\n\
  \n## 单元测试\n\n您接到了下一个任务，并准备开始编写一些 T-SQL。您还希望对代码实施功能性测试。当您测试单个代码段时，这被称为 `单元测试`。了解什么是单元测试以及为什么应该使用它们，可以帮助提高您的\
  \ T-SQL 代码质量。单元测试非常有益，因为它能让您快速、轻松地验证 T-SQL 代码的准确性。让我们开始为 SQL Server 编写您的第一个单元测试。本节将介绍创建第一个单元测试的过程。这包括设计测试用例、编写单元测试、确认单元测试是否正常工作，以及更新您的代码以使单元测试产生正确的结果。\n\
  \n单元测试的概念很简单。您想要对 T-SQL 代码进行单个变更。单元测试允许您测试并确认单个代码段的功能。使用单元测试的一种常见方法是创建一个会失败的测试用例，例如在执行\
  \ `dbo.GetCustomer` 时，期望非活跃客户的数量为零。这将会失败，因为该存储过程当前的代码选择了所有客户。然后您编写 T-SQL 代码，运行单元测试，并重复此过程直到单元测试通过。这就是\
  \ `测试驱动设计`。无论您是在实现新功能还是在解决 T-SQL 中的错误，单元测试都能帮助验证您的代码。\n\n创建单元测试时，您需要与通常着手编写 T-SQL\
  \ 代码时不同的思考方式。您创建单元测试是为了确认您正在编写的代码能按预期工作。为了验证您的 T-SQL 代码是否按预期工作，您希望您的单元测试显示通过。在创建单元测试时，您第一次执行它应该失败。从一个失败的单元测试开始，表明期望的功能尚不存在。\n\
  \n运行单元测试有许多不同的实现方式。单元测试可以在 `Visual Studio` 内部编写。您也可以使用免费的第三方单元测试框架，该框架在 T-SQL 中创建数据库对象。另一个选项是使用付费的第三方工具来创建和运行您的单元测试。每种选择都有其优缺点。\n\
  \n决定如何实施单元测试的另一个因素在于您希望如何运行测试。如果您还没有机会开发一种自动化的方法来管理代码和部署，您可能会决定更喜欢手动运行单元测试。但是，如果您有一个自动化的构建和部署流水线，您可能会发现自动化单元测试更容易。开销最小、最简单的方法是手动运行单元测试。这可以通过存储过程或图形用户界面来执行。\n\
  \n您可以使用单元测试来验证数据库架构的几乎所有内容。这些单元测试大多是用于测试数据库对象（如存储过程、视图和函数）的功能性。我可能有偏见，但我希望您的存储过程数量远多于视图或查询。如果您现在还没有任何单元测试，请不要担心。您可以在需要时创建单元测试。这可能意味着您的单元测试没有完全的代码覆盖率，但它可以防止您花费时间去实现那些不经常修改的代码的单元测试。\n\
  \n\n在编写第一个单元测试之前，你需要了解将要开发的功能。现在让我们修改存储过程 `dbo.GetCustomer`，使其仅显示处于活动状态的客户。当我最初开始对\
  \ T-SQL 代码进行单元测试时，我会手动运行测试。在这个例子中，让我们查找当前非活动的客户。你可以创建一个单元测试来检查非活动记录。如果你的单元测试发现任何非活动记录，它将失败。如果你的单元测试没有发现任何非活动记录，它将成功或通过。让我们运行如清单\
  \ 11-1 所示的查询来查找任何非活动的客户。\n\n```sql\nSELECT CustomerID,\nFirstName,\nLastName,\n\
  IsActive\nFROM dbo.Customer\nWHERE IsActive = 0;\n```\n**清单 11-1**\n查找非活动客户\n\n\
  运行此查询时，你可能会得到如表 11-1 所示的结果。\n\n**表 11-1**\n非活动客户\n\n| CustomerID | FirstName | LastName\
  \ | IsActive |\n| --- | --- | --- | --- |\n| 12 | Selena | Tiesto | False |\n| 27\
  \ | Ian | West | False |\n\n一旦你获得了表 11-1 中的结果，你就知道哪些记录会受到 `dbo.GetCustomer` 更改的影响，以返回活动客户而非所有客户。未修改的存储过程如清单\
  \ 11-2 所示。\n\n```sql\n/*-------------------------------------------------------------*\\\
  \nName:             dbo.GetCustomer\nAuthor:           Elizabeth Noble\nCreated\
  \ Date:     2022-10-30\nDescription:      Get a list of all customers in the databases\n\
  Sample Usage:\nEXECUTE dbo.GetCustomer;\n\\*-------------------------------------------------------------*/\n\
  CREATE OR ALTER PROCEDURE dbo.GetCustomer\nAS\nSELECT\nCustomerID,\nFirstName,\n\
  LastName,\nAddress,\nCity,\nPostalCode,\nCountry,\nIsActive,\nDateCreated,\nDateModified,\n\
  DateDisabled\nFROM dbo.Customer;\n```\n**清单 11-2**\n原始存储过程\n\n执行此存储过程时，你期望看到表中的所有客户都被返回。执行此存储过程后，你得到的记录如表\
  \ 11-2 所示。\n\n**表 11-2**\n所有客户示例\n\n| CustomerID | FirstName | LastName | IsActive\
  \ |\n| --- | --- | --- | --- |\n| 1 | Myra | Acharya | True |\n| 2 | Jose | Gomez\
  \ | True |\n| 12 | Selena | Tiesto | False |\n| 27 | Ian | West | False |\n| 401409\
  \ | Stacy | Alexander | True |\n| 401407 | Karim | Khalil | True |\n| 401405 | Marty`\
  \ | Bethel | True |\n\n你可以在表 11-2 中看到，执行存储过程时，活动和非活动客户都被返回了。这样，你就创建了一个基本的单元测试（清单\
  \ 11-1 中的查询），并确认当运行清单 11-2 中的存储过程时，由于非活动记录也包含在结果集中，该测试失败了。\n\n下一步是找出如何让单元测试通过。对于此示例，更改很简单。让我们在存储过程的末尾添加一行，只返回活动客户，如清单\
  \ 11-3 所示。\n\n```sql\n/*-------------------------------------------------------------*\\\
  \nName:             dbo.GetCustomer\nAuthor:           Elizabeth Noble\nCreated\
  \ Date:     2022-10-30\nDescription:      Get a list of all active customers in\
  \ the databases\nSample Usage:\nEXECUTE dbo.GetCustomer;\n\\*-------------------------------------------------------------*/\n\
  CREATE OR ALTER PROCEDURE dbo.GetCustomer\nAS\nSELECT\nCustomerID,\nFirstName,\n\
  LastName,\nAddress,\nCity,\nPostalCode,\nCountry,\nIsActive,\nDateCreated,\nDateModified,\n\
  DateDisabled\nFROM dbo.Customer\nWHERE IsActive = 1;\n```\n**清单 11-3**\n修改后的存储过程\n\
  \n创建此存储过程后，你可以执行它以确认新功能是否按预期工作。在这种情况下，你希望验证 CustomerID 2 和 5 不再被返回。根据前面的代码，你期望清单\
  \ 11-3 的结果集与表 11-3 所示的内容匹配。\n\n**表 11-3**\n活动客户示例\n\n| CustomerID | FirstName |\
  \ LastName | IsActive |\n| --- | --- | --- | --- |\n| 1 | Myra | Acharya | True\
  \ |\n| 2 | Jose | Gomez | True |\n| 401409 | Stacy | Alexander | True |\n| 401407\
  \ | Karim | Khalil | True |\n| 401405 | Marty` | Bethel | True |\n\n你已经确认，对清单 11-3\
  \ 所做的更改已正确地从结果集中移除了非活动客户。这就是 T-SQL 代码通常的测试方式。在更改前后执行并比较结果是测试代码更改的有效方法，但这需要付出可重复性的代价。构建一组单元测试集合可以让你在每次部署时重新测试更改，以确保功能不会从一个软件版本到下一个版本丢失。\n\
  \n这种测试代码的方法是一个很好的起点，但可能难以始终如一地遵循。你可能有一些可以存储不同状态数据的表。例如，如果你想查找有关促销产品订单频率的信息，测试结果的逻辑会变得更加复杂。这就是使用第三方工具可能有所帮助的地方。\n\
  \n为你的数据寻找单独的示例集可能既耗时又容易出错。此外，你可能会花更多时间尝试找到正确的测试用例，而不是编写或测试 T-SQL 代码。另一个挑战是，由于手动在数据库中查找已有的测试数据需要花费时间和精力，你可能会跳过重要的测试用例。然而，使用\
  \ T-SQL 在你的数据中查找特定的测试用例并不是你唯一的选择。你可以手动插入测试数据并对你插入的记录执行测试。这种方法允许你为正在测试的代码确定最佳场景。在大多数情况下，这些示例数据不会集中保存。你可能仍然需要在每次测试新功能时重写特定的示例。\n\
  \n有不同类型的单元测试工具可供你使用。单元测试可以通过向数据库添加额外的 T-SQL 对象来处理。另一个选择是付费购买可以帮助管理单元测试的第三方工具。另一个选项是使用\
  \ Visual Studio 来创建和管理单元测试。虽然所有这些选项都是有效的并且各有其优点，但我想重点介绍通过 Visual Studio 原生创建单元测试可以完成什么。图\
  \ 11-1 展示了在 Visual Studio 中创建单元测试的第一步。\n\n![](img/480547_2_En_11_Fig1_HTML.jpg)\n\
  \n**图 11-1**\n创建单元测试\n\n选择创建单元测试的选项后，Visual Studio 将引导你完成创建第一个单元测试的过程。图 11-2 中的对话框将会打开。\n\
  \n![](img/480547_2_En_11_Fig2_HTML.jpg)\n\n**图 11-2**\n“创建单元测试”对话框\n\n\n窗口顶部区域允许你选择用于创建单元测试的对象。在本例中，我们将为\
  \ `dbo.GetCustomer` 存储过程创建一个新的单元测试。这也是你为这个数据库项目创建的第一个单元测试。你可以选择创建一个新的 Visual C#\
  \ 测试项目。不过，你无需了解 C# 即可在 Visual Studio 中开始创建自己的单元测试。为这个新项目命名并创建一个新类。今后，你可以将这个类复用于其他单元测试。\n\
  \n在对话框窗口上点击“确定”后，你会看到另一个弹出窗口，如图 11-3 所示。\n\n![](img/480547_2_En_11_Fig3_HTML.jpg)\n\
  \nPro T SQL 2022 VS 单元测试的 SQL Server 测试配置屏幕截图。一个“选择连接”按钮被高亮显示。“确定”和“取消”按钮位于右下角。\n\
  \n## 图 11-3\n\n### 设置连接字符串\n\n这里可以设置几个选项。其中大部分涉及选择用于执行单元测试的数据源。选择预存在的 `Menu` 数据库来运行单元测试。你可以选择在运行单元测试之前自动部署数据库。但是，我们仅在单元测试通过时才部署数据库。\n\
  \n设置好连接字符串并配置好其他设置后，Visual Studio 会向现有解决方案中添加一个新项目。你可以在图 11-4 中看到你的数据库项目与单元测试项目一起的样子。\n\
  \n![](img/480547_2_En_11_Fig4_HTML.jpg)\n\nPro T SQL 2022 VS 项目的解决方案资源管理器窗口屏幕截图。“单元测试\
  \ GetCustomer.cs”选项被高亮显示。“确定”和“取消”按钮位于右下角。\n\n## 图 11-4\n\n### 源代码管理中的单元测试\n\n在图\
  \ 11-4 中，原始 `ProTSQL2022-VS` 项目中的对象均未被更改。你可以看到为单元测试项目创建的所有对象都已准备好检入源代码管理。创建单元测试项目后，Visual\
  \ Studio 中将打开一些附加窗口。其中一个窗口允许你设置测试条件。默认情况下，会配置一个“结果不确定” (`Inconclusive`) 的测试条件。你可以保留或移除此测试条件。图\
  \ 11-5 显示了可用测试条件的下拉列表。\n\n![](img/480547_2_En_11_Fig5_HTML.jpg)\n\n测试条件窗口的屏幕截图。下拉菜单列出了：数据校验和\
  \ (`Data checksum`)、空结果集 (`empty result set`)、执行时间 (`execution time`)、预期架构 (`expected\
  \ schema`)、结果不确定 (`inconclusive`)、非空结果集 (`not empty result set`)、行数 (`row count`)\
  \ 和标量值 (`scalar value`)。\n\n## 图 11-5\n\n### 可用的单元测试选项\n\n在开始创建单元测试之前，让我们通过表 11-4\
  \ 来定义这些条件各自的目的。\n\n#### 表 11-4\n\n#### 单元测试条件\n\n| 测试条件 | 描述 |\n| --- | --- |\n\
  | `数据校验和` | 计算单元测试的 `CheckSum`。如果 `CheckSum` 与原始单元测试匹配，则测试通过。仅当结果集中返回的数据将保持不变时，才应使用此条件。\
  \ |\n| `空结果集` | 检查是否返回了任何数据。如果没有返回数据，则测试通过。 |\n| `执行时间` | 检查查询的总体执行时间。如果查询在指定时间内完成，则测试通过。\
  \ |\n| `预期架构` | 检查返回对象的架构。如果列和数据类型与预期架构匹配，则测试通过。 |\n| `结果不确定` | 此条件由系统创建作为占位符，应在创建第一个单元测试后将其移除。\
  \ |\n| `非空结果集` | 检查是否返回了任何数据。如果返回了数据，则测试通过。 |\n| `行数` | 检查返回的行数。如果返回的行数与预期计数匹配，则测试通过。\
  \ |\n| `标量值` | 检查返回的值。如果返回的值与预期值匹配，则测试通过。 |\n\n你需要创建一个单元测试来验证 `dbo.GetCustomer`\
  \ 存储过程是否没有返回非活动客户。与你之前编写的类似手动单元测试一样，你要确认存储过程 `dbo.GetCustomer` 没有返回任何非活动客户。你可以通过选择\
  \ `空结果集` 条件来实现这一点。你可以在图 11-6 中看到这个测试条件。\n\n![](img/480547_2_En_11_Fig6_HTML.jpg)\n\
  \n测试条件窗口的屏幕截图。它显示：名称，空结果集条件 1；类型，空结果集；值，结果集 1 必须有零行；已启用，是。\n\n## 图 11-6\n\n### 用于检查空结果集的单元测试\n\
  \n现在你已经创建了测试条件，你需要为这个单元测试编写一些 T-SQL 代码。选择 `空结果集` 作为测试条件。为了让这个单元测试在运行时通过，单元测试内部的\
  \ T-SQL 代码必须不返回任何结果。\n\n在你修改存储过程后，你不希望返回任何非活动客户。在这种情况下，一个通过的测试用例就是没有返回非活动客户。这也与图\
  \ 11-6 中创建的测试条件相符。清单 11-4 展示了该单元测试的代码。\n\n```sql\n-- 针对 dbo.GetCustomer 的数据库单元测试\n\
  -- 创建表变量以保存结果\nDECLARE @CustomerList TABLE\n(\n    CustomerID      INT,\n    FirstName\
  \       VARCHAR(40),\n    LastName        VARCHAR(100),\n    [Address]       VARCHAR(100),\n\
  \    City            VARCHAR(100),\n    PostalCode      VARCHAR(20),\n    Country\
  \         VARCHAR(75),\n    IsActive        BIT,\n    DateCreated     DATETIME2(2),\n\
  \    DateModified    DATETIME2(2),\n    DateDisabled    DATETIME2(2)\n);\n-- 将 dbo.GetCustomer\
  \ 的结果插入表变量\nINSERT INTO @CustomerList\n(\n    CustomerID,\n    FirstName,\n    LastName,\n\
  \    [Address],\n    City,\n    PostalCode,\n    Country,\n    IsActive,\n    DateCreated,\n\
  \    DateModified,\n    DateDisabled\n)\nEXECUTE [dbo].[GetCustomer];\n-- 获取非活动客户的数量\n\
  ---- 如果没有非活动客户，单元测试将通过\n---- 如果有非活动客户，单元测试将失败\nSELECT CustomerID\nFROM @CustomerList\n\
  WHERE IsActive = 0;\n```\n\n#### 清单 11-4\n#### 运行单元测试的代码\n\n你首先创建一个表变量。单元测试的下一部分将存储过程\
  \ `dbo.GetCustomer` 的结果插入该表变量。最后一步是从表变量中仅选择非活动的记录。将上述代码添加到 `UnitTestGetCustomer.cs`\
  \ 并保存文件后，你就可以运行你的第一个单元测试了。你可以转到 `测试` 菜单来运行单元测试，如图 11-7 所示。\n\n![](img/480547_2_En_11_Fig7_HTML.jpg)\n\
  \n\n### 手动运行单元测试\n\n一张截图高亮显示了测试选项下的运行测试选项。主菜单包括测试、分析、工具、扩展、窗口和帮助等选项。\n\n**图 11-7**\n\
  \n你正在对单元测试使用测试驱动设计，并且在更改原始存储过程之前，你正在测试这个单元测试。在此场景中，你预期单元测试会失败。你可以在图 11-8 中看到运行此单元测试的结果。\n\
  \n![](img/480547_2_En_11_Fig8_HTML.jpg)\n\n测试资源管理器窗口的截图。它显示测试运行已完成两个测试，1 个通过，1 个失败，0\
  \ 个跳过，耗时 7.4 秒。\n\n**图 11-8**\n\n原始存储过程仍返回非活跃客户。这导致单元测试失败。一旦你使用清单 11-3 中的 T-SQL\
  \ 代码更新存储过程 `dbo.GetCustomer` 并重复单元测试，你将得到图 11-9 中的结果。\n\n![](img/480547_2_En_11_Fig9_HTML.jpg)\n\
  \n测试资源管理器窗口的截图。它显示测试运行已完成两个测试，2 个通过，0 个失败，0 个跳过，耗时 6.6 秒。\n\n**图 11-9**\n\n既然单元测试已成功运行，你可以确信你的新\
  \ T-SQL 代码按预期工作。数据库项目还有其他可用的单元测试选项。我建议你研究几种替代方案，并与同事合作确定哪种方法最适合你的环境。\n\n## 集成测试\n\
  \n虽然知道单个数据库代码按预期工作是好的，但大多数 T-SQL 代码并非孤立存在。关系设计的本质意味着数据库中的项目是相互关联的。我们通常考虑表之间的关系。然而，存储过程访问的是表中存在的数据。如果你想验证数据的插入，可以运行单元测试。这将确认你期望插入的数据确实已被插入。\n\
  \n当有多种方式访问数据库中的相同数据时，可能会出现问题。通常，这些查询是在不同时期编写的。这可能导致查询中的逻辑略有不同。我还见过这样的情况：公司内不同业务部门对相同数据有不同的计算方法。如果一个业务部门的计算被另一个业务部门重用，可能会导致看似不准确的结果。\n\
  \n这就提出了一个问题：如何在多个不同的数据库对象中保持你的 T-SQL 代码和查询结果的一致性。这就是集成测试可以发挥作用的地方。`集成测试` 这个术语用于表示旨在与多个代码片段协同工作的测试。如果你正在使用应用程序插入数据，并希望验证数据是否被正确插入，这可以被视为集成测试。你正在测试应用程序连接到\
  \ SQL Server 的能力以及将数据插入数据库的 T-SQL 代码。\n\n这只是集成测试可以应用的一个场景。我发现自己经常遇到的情况是，处理两个旨在返回大致相同信息的存储过程。有时，对底层表或其中一个存储过程中的代码进行更改，可能会导致这两个存储过程返回不同的结果。不幸的是，这些结果差异通常直到\
  \ T-SQL 代码部署后很久才会被发现。这会导致对应用程序的整体信心丧失。\n\n虽然理想情况下这些相互关联的存储过程应有文档记录，或者最好重构为单个存储过程，但这并非总是可行。拥有多个相似代码版本是有成本的，但让多个流程依赖同一段代码也有成本。在本章的剩余部分，我们将假设无法重写\
  \ T-SQL 代码来消除这种依赖关系。\n\n就像测试数据库代码的单元测试一样，你可以通过使用 T-SQL 查询手动开始集成测试。你集成的最关键因素是理解你的环境如何协同工作。有时这是偶然发现的，比如当某些东西崩溃时。其他时候，你可能是一个主题专家，已经了解这些交互。无论哪种方式，为了开始集成测试，你首先至少需要有两个测试对象。\n\
  \n你可以从测试数据的插入以及同一张表的数据查询开始。你也可以使用集成测试来比较两个查询的结果。如果你有一个返回所有值的查询和另一个搜索特定值的查询，就可能发生这种情况。虽然这两个存储过程不会匹配每条记录，但对于特定记录它们可能有匹配的结果。这种类型的集成测试将确认返回列中的值彼此一致。\n\
  \n\n如果你开始修改一个用于选择数据的存储过程，你可能希望同时测试该数据的插入和选择操作。例如，你可能正在更新存储过程 `dbo.GetCustomer` 以使其仅返回活跃客户。你可以通过为非活跃客户创建一个单元测试，以及为活跃客户创建一个单元测试，来对此存储过程进行单元测试。你也可以使用集成测试来确认在创建新客户后，此存储过程是否仍能返回预期结果。现在看来，这种测试可能显得微不足道，但随着应用程序的发展和成熟，它们可能会变得越来越有用。通常，业务需要答案的速度比能够提供答案的速度更快。这有时会导致数据库对象以非原始设计意图的方式被使用。\n\
  \n此集成测试包括向 `dbo.Customer` 表中插入一个新客户。插入记录后，你将执行 `dbo.GetCustomerAndOrderNumberByProductID`\
  \ 存储过程，以验证新客户是否被返回。用于向 `dbo.Customer` 表插入记录的存储过程如代码清单 11-5 所示。\n\n```sql\n/*-------------------------------------------------------------*\\\
  \nName:             dbo.InsertCustomer\nAuthor:           Elizabeth Noble\nCreated\
  \ Date:     2022-10-30\nDescription:      Used to create a customer\nSample Usage:\n\
  EXECUTE dbo.InsertCustomer\n'Elizabeth',\n'Noble',\n'123 Main Steet',\n'Some City',\n\
  '00000',\n'United States',\n1,\nGETDATE(),\nGETDATE(),\nGETDATE();\n\\*------------------------------------------------------------*/\n\
  CREATE OR ALTER PROCEDURE dbo.InsertCustomer\n@FirstName      VARCHAR(40),\n@LastName\
  \       VARCHAR(100),\n@Address        VARCHAR(100),\n@City           VARCHAR(100),\n\
  @PostalCode     VARCHAR(20),\n@Country        VARCHAR(75),\n@IsActive       BIT,\n\
  @DateCreated    DATETIME2(2),\n@DateModified   DATETIME2(2),\n@DateDisabled   DATETIME2(2)\n\
  AS\nINSERT INTO dbo.Customer\n(\nFirstName,\nLastName,\n[Address],\nCity,\nPostalCode,\n\
  Country,\nIsActive,\nDateCreated,\nDateModified,\nDateDisabled\n)\nVALUES\n(\n@FirstName,\n\
  @LastName,\n@Address,\n@City,\n@PostalCode,\n@Country,\n@IsActive,\n@DateCreated,\n\
  @DateModified,\n@DateDisabled\n);\n```\n代码清单 11-5\n向 `dbo.Customer` 表插入记录\n\n既然你知道了将如何向数据库添加客户，你应该确定集成测试所需的其他存储过程。代码清单\
  \ 11-6 显示了用于创建客户订单的存储过程的 T-SQL 代码。\n\n```sql\n/*-------------------------------------------------------------*\\\
  \nName:             dbo.InsertCustomerOrder\nAuthor:           Elizabeth Noble\n\
  Created Date:     2022-10-30\nDescription:      Used to create the header for a\
  \ customer order\nSample Usage:\nEXECUTE dbo.InsertCustomerOrder\n3,\n99999,\n'2022-10-31',\n\
  NULL;\n\\*------------------------------------------------------------*/\nCREATE\
  \ OR ALTER PROCEDURE dbo.InsertCustomerOrder\n@CustomerID     INT,\n@OrderNumber\
  \    VARCHAR(15),\n@OrderDate      DATETIME2(2),\n@ShipDate       DATETIME2(2)\n\
  AS\nINSERT INTO dbo.CustomerOrder\n(\nCustomerID,\nOrderNumber,\nOrderDate,\nShipDate,\n\
  IsActive,\nDateCreated,\nDateModified,\nDateDisabled\n)\nSELECT\n@CustomerID,\n\
  @OrderNumber,\n@OrderDate,\n@ShipDate,\n1,\nSYSDATETIME() AS DateCreated,\nSYSDATETIME()\
  \ AS DateModified,\nNULL AS DateDisabled;\n```\n代码清单 11-6\n向 `dbo.CustomerOrder`\
  \ 表插入记录\n\n此代码在 `dbo.CustomerOrder` 表中创建一条记录。一旦在 `dbo.CustomerOrder` 表中创建了记录，你就可以向\
  \ `dbo.OrderDetail` 表中插入数据。用于创建订单详细信息的存储过程在代码清单 11-7 中。\n\n```sql\n/*-------------------------------------------------------------*\\\
  \nName:             dbo.InsertOrderDetail\nAuthor:           Elizabeth Noble\nCreated\
  \ Date:     2022-10-30\nDescription:      Used to create line items for the order\
  \ detail\nSample Usage:\nEXECUTE dbo.InsertOrderDetail\n111111,\n1,\n599.00,\n1;\n\
  \\*------------------------------------------------------------*/\nCREATE OR ALTER\
  \ PROCEDURE dbo.InsertOrderDetail\n@CustomerOrderID     INT,\n@ProductID       \
  \    INT,\n@ProductPrice        DECIMAL(6,2),\n@QuantitySold        INT\nAS\nINSERT\
  \ INTO dbo.OrderDetail\n(\nCustomerOrderID,\nProductID,\nProductPrice,\nQuantitySold,\n\
  IsActive,\nDateCreated,\nDateModified,\nDateDisabled\n)\nSELECT\n@CustomerOrderID,\n\
  @ProductID,\n@ProductPrice,\n@QuantitySold,\n1,\nSYSDATETIME() AS DateCreated,\n\
  SYSDATETIME() AS DateModified,\nNULL AS DateDisabled;\n```\n代码清单 11-7\n向 `dbo.OrderDetail`\
  \ 表插入记录\n\n你使用上述存储过程来创建一个客户并为此客户填充订单信息。\n\n下一步是回顾你将用于集成测试的存储过程。在代码清单 11-8 中，你可以看到存储过程\
  \ `dbo.GetCustomerAndOrderNumberByProductID`。\n\n```sql\n/*-------------------------------------------------------------*\\\
  \nName:             dbo.GetCustomerAndOrderNumberByProductID\nAuthor:          \
  \ Elizabeth Noble\nCreated Date:     2022-10-30\nDescription:      Get customer\
  \ and products ordered for an order number\nSample Usage:\nEXECUTE dbo.GetCustomerAndOrderNumberByProductID\
  \ 1;\n\\*-------------------------------------------------------------*/\nCREATE\
  \ OR ALTER PROCEDURE dbo.GetCustomerAndOrderNumberByProductID\n@ProductID    INT\n\
  AS\nSELECT\ncus.CustomerID,\ncus.FirstName,\ncus.LastName,\nord.OrderNumber,\nord.OrderDate,\n\
  prd.ProductName,\nSUM(dtl.QuantitySold) AS QuantitySold,\ndtl.ProductPrice\nFROM\
  \ dbo.Customer cus\nINNER JOIN dbo.CustomerOrder ord\nON cus.CustomerID = ord.CustomerID\n\
  INNER JOIN dbo.OrderDetail dtl\nON ord.CustomerOrderID = dtl.CustomerOrderID\nINNER\
  \ JOIN dbo.Product prd\nON prd.ProductID = dtl.ProductID\nWHERE prd.ProductID =\
  \ @ProductID\nGROUP BY cus.FirstName,\ncus.LastName,\nord.OrderNumber,\nord.OrderDate,\n\
  prd.ProductName,\ndtl.ProductPrice\nORDER BY cus.FirstName, cus.LastName;\n```\n\
  代码清单 11-8\n按产品选择客户和订单\n\n为了执行集成测试，你需要编写一些代码，以便能够插入客户数据。之后，运行第二个存储过程。你可以将这些结果插入到一个临时表中，然后验证在\
  \ `dbo.InsertCustomer` 中创建的客户是否存在于存储过程 `dbo.GetCustomerAndOrderNumberByProductID`\
  \ 返回的结果中。在代码清单 11-9 的示例中，你还需要向订单中添加一些产品，以便 `dbo.GetCustomerAndOrderNumberByProductID`\
  \ 存储过程能够查询出一些结果。\n\n\n\n```sql\n-- 声明后续要使用的变量\nDECLARE @Customer       INT;\nDECLARE\
  \ @Product        INT = 1;\nDECLARE @CustomerOrder  INT;\n-- 创建客户 ID 1\nEXECUTE\
  \ dbo.InsertCustomer        @FirstName = 'Elizabeth',\n@LastName = 'Noble',\n@Address\
  \ = '123 Main Steet',\n@City = 'Some City',\n@PostalCode = '00000',\n@County = 'United\
  \ States',\n@IsActive = 1,\n@DateCreated = GETDATE(),\n@DateModified = GETDATE(),\n\
  @DateDisabled = NULL;\n-- 为客户 ID 1 创建订单\nEXECUTE dbo.InsertCustomerOrder\n@CustomerID\
  \ = @Customer,\n@OrderNumber = 99999,\n@OrderDate = '2022-10-31',\n@ShipDate = NULL;\n\
  -- 获取最近插入的记录\nSELECT @CustomerOrder = SCOPE_IDENTITY();\n-- SELECT TOP 1 * FROM\
  \ dbo.CustomerOrder ORDER BY 1 DESC;\n-- DELETE FROM dbo.CustomerOrder WHERE CustomerOrderID\
  \ = 802820\n-- DBCC CHECKIDENT(CustomerOrder, NORESEED)\n-- DBCC CHECKIDENT(CustomerOrder,\
  \ RESEED, 802819)\n-- 为客户 ID 1 的订单号 10050 添加订单详情\nEXECUTE dbo.InsertOrderDetail\n\
  @CustomerOrderID = @CustomerOrder,\n@ProductID = 1,\n@ProductPrice = 599.00,\n@QuantitySold\
  \ = 1;\n-- 声明表变量来存储下面的结果\nDECLARE @OrderInfo TABLE\n(\nCustomerID      INT,\nFirstName\
  \       VARCHAR(50),\nLastName        VARCHAR(100),\nOrderNumber     VARCHAR(15),\n\
  OrderDate       DATETIME2(2),\nProductName     VARCHAR(25),\nQuantitySold    INT,\n\
  ProductPrice    DECIMAL(6,2)\n);\n-- 查找订购了 ProductID 1 的客户和订单\nINSERT INTO @OrderInfo\
  \ (CustomerID, FirstName, LastName, OrderNumber, OrderDate, ProductName, QuantitySold,\
  \ ProductPrice)\nEXECUTE dbo.GetCustomerAndOrderNumberByProductID @Product;\n--\
  \ 通过确认为客户 ID 1 返回了结果来验证存储过程的集成\nSELECT FirstName, LastName, OrderNumber\nFROM @OrderInfo\n\
  WHERE CustomerID = @Customer;\n```\n\n### Listing 11-9: 手动集成测试\n\n在确定应该对哪些内容进行集成测试时，请考虑与您正在编写的\
  \ T-SQL 代码相关的任何依赖关系。\n\n有些 T-SQL 代码比其他代码更明显地需要集成测试。最需要集成测试的场景之一涉及返回相同数据的不同数据库对象。这可以是两个不同的存储过程。集成测试也用于比较函数和存储过程之间，或视图和函数之间的结果。虽然这些数据库对象可能在结果集中返回不同的列或列的顺序不同，但可以比较相同的列。\n\
  \n其他时候，您可能有一些 T-SQL 代码，其中一个数据库对象依赖于前一步骤中处理的数据。您可能有一个更新表中值的存储过程。一个视图或存储过程可能只返回特定的值子集。使用集成测试可以让您执行第一个存储过程来更新表中的查找值。根据所需的测试，您可以执行存储过程并确认记录出现。除非该记录不应再出现，否则您可以使用集成测试来确认该记录不再出现。\n\
  \n这种情况常见的一个场景是，当您希望从应用程序中软删除或禁用一条数据记录时。您可以使用一组 T-SQL 来禁用该记录。然后可能有一个或多个数据库对象需要进行测试，以确认被禁用的记录不再显示。创建一种将所有集成测试场景集中管理并确保其可重复的方法，将是未来保护您应用程序的关键。现在对代码进行集成测试可以确认您当前版本的\
  \ T-SQL 代码能够通过。然而，未来实现集成测试的自动化和重复执行，将使您能够持续验证新的错误没有被引入到您的 T-SQL 代码中。\n\n根据系统的设计和复杂性，您可能有在一个应用程序中输入并发送到或被另一个应用程序使用的数据。在整个业务活动中，这些数据最终可能存在于不同的数据库或不同的表中。这可能涉及您业务中数据的不同阶段。这也包括在事务型数据库和数据仓库之间使用集成测试。以这种方式使用集成测试可以确保在您的应用程序中输入的数据在迁移到数据仓库时保持一致。\n\
  \n有更优雅的方法可以帮助进行集成测试。然而，我发现其中大多数方法都参考了单元测试。在集成测试中使用这些工具的唯一区别在于测试的编写方式。这意味着您可以像前面章节所示，使用\
  \ Visual Studio 中的单元测试功能。还有其他工具可用于单元测试和集成测试，但本书不涉及这些内容。\n\n## 负载测试\n\n使用 SQL Server\
  \ 的另一个方面是快速处理大型数据集。很容易期望功能上正确的 T-SQL 代码也能表现良好。然而，情况并非总是如此。虽然您可以使用执行计划来很好地了解查询的相对性能，但这并不能保证代码在高负载下也能表现良好。如果您想了解\
  \ T-SQL 代码在压力下的性能表现，则需要进行负载测试。\n\n负载测试带来了一些非常特殊的问题。一个挑战是负载测试环境和生产环境之间的硬件通常不同。除了硬件差异之外，较低级环境（如开发、测试环境）中存在的数据通常也有所不同。这可能是从较低级环境中数据量较少，到较低级环境中数据被清理过并具有不同的统计信息不等。其他差异可能包括在较低级环境中输入的数据与生产环境不匹配。在许多情况下，这些差异无法解决。\n\
  \n除非您拥有完全相同的硬件和完全相同的生产数据库，否则您的负载测试无法与生产环境完全匹配。尽管如此，对您的 T-SQL 代码进行负载测试仍然是有益的。即使无法创建完美的负载测试环境，您仍然可以在负载测试环境中比较\
  \ T-SQL 代码的相对性能。下一步是弄清楚如何实施负载测试。一个简单但不太可靠的方法是创建 T-SQL 脚本来生成虚拟负载测试数据。这种方法会让您对性能有一个大致的了解，但如果没有对现有生产数据进行大量分析，它将无法准确反映生产性能。\n\
  \n有几种可用于负载测试的第三方工具，其中许多是免费的。这些工具应该使开始负载测试更简单。然而，您面临着同样的问题，即测试不能准确反映生产活动。虽然实施负载测试是开发\
  \ T-SQL 代码时的一个重要方面，但进行负载测试所需的步骤超出了本书的范围。\n\n\n\n## 静态代码分析\n\n创建格式化和开发 T-SQL 编码标准只是编写\
  \ T-SQL 代码的开始。在第 3 章中，我讨论了标准化你的 T-SQL 代码。T-SQL 编码标准在第 9 章中有所涵盖。这些标准只有在被遵循时才是有用的。很多时候，标准很长且难以记住。确保这些标准被遵循，有比试图记住所有规则更好的方法。*静态代码分析*可以用来确认你的标准正在被遵循。\n\
  \n如前所述，标准化你和你的同事编写 T-SQL 的方式是有好处的。这可以使代码更易于阅读，并节省调试 T-SQL 代码问题的时间。不幸的是，如果签入源代码管理的\
  \ T-SQL 代码不符合格式化标准，标准化的好处就无法实现。这是静态代码分析可以帮助的一种情况。\n\n静态代码分析允许你阻止不符合你 T-SQL 编码标准的代码进入生产环境。一旦你的代码被保存并签入源代码管理，你就可以在部署数据库代码之前验证其是否符合你的标准。虽然有强制执行\
  \ T-SQL 格式化的选项，但主要选项是一个第三方工具。\n\n除了将静态代码分析用于数据库代码格式化标准化之外，你还可以将其用于你的数据库编码标准。Visual\
  \ Studio 2017 中内置了此功能。你可以通过从“属性”菜单中选择“代码分析”选项来找到图 11-10 中的窗口。\n\n![](img/480547_2_En_11_Fig10_HTML.jpg)\n\
  \n一张截图展示了`Pro T Q S L 2022 V S`项目的代码分析。配置被选择为活动、调试。平台被选择为活动、任何`C P U`。多条规则在复选框中被勾选。\n\
  \n图 11-10\n\n数据库项目中的代码分析\n\n你可以选择在每次构建数据库项目时运行代码分析。你还可以选择哪些项目应作为代码分析的一部分包含进来。这些选项包括最佳实践和可能影响\
  \ T-SQL 代码性能的项目。此外，还可以选择将其中一些规则升级为错误并失败，而不是发送警告消息。\n\n静态代码分析的好处在于，它自动化了确保 T-SQL\
  \ 代码符合你业务编码标准的过程。这可以让代码被拒绝的感觉不那么个人化；代码是作为整个构建过程的一部分被审查和拒绝的。构建过程也会以一致的方式传达警告或错误消息。\n\
  \n将你的数据库代码纳入源代码管理只是问题的一半。真正的挑战可能出现在尝试部署仅保存在源代码管理中的数据库变更时。确定你希望如何部署代码将帮助你决定使用什么方法来保存你的\
  \ T-SQL 代码。从源代码管理部署 T-SQL 代码将在第 13 章中进一步讨论。\n\n## 部署\n\n在开发软件的过程中，总会有需要实现新功能的时候。关于新功能的一个普遍问题是如何以不影响当前性能的方式实现它。对于当今的许多企业来说，让应用程序全天候运行的需求至关重要。这造成了一种情况，任何形式的停机或当前功能的损失都可能极其昂贵。虽然使用的部署方法可以帮助最小化与新功能相关的整体风险，但在编写新代码时，还有其他选项可以使用。\n\
  \n一个经常出现的问题与软件开发的方式与代码部署的方式之间的关联有关。在许多项目中，实现新功能所需的时间大于部署 T-SQL 代码的频率。确定如何管理源代码管理可以减轻其中一些风险。T-SQL\
  \ 代码可以通过不同的方式部署。了解这些方法以及使用它们的最佳时机将有助于改进你的数据库部署。在用户如何与数据库代码交互方面也有选择。\n\n### 方法论\n\
  \n每个开发环境都是不同的。在决定如何部署 T-SQL 代码之前，更好地了解你公司的开发处理方式会有所帮助。你需要知道你公司有多少数据库开发人员，以及有多少不同的开发团队使用\
  \ SQL Server。另一个你想知道的因素是这些开发团队如何编写和部署代码。收集所有这些信息使你能够确定最适合你环境部署 T-SQL 代码的方法。\n\n\
  在使用 SQL Server 时，与代码问题相关的风险通常比应用程序代码更大。当有多个个人访问相同的 T-SQL 代码时，这些风险会加剧。如果你处在一个你是唯一数据库开发人员的环境中，发生合并冲突问题的机会可能较少。如果有多个数据库开发人员或团队编写\
  \ T-SQL 代码，那么有不止一个人处理相同数据库代码的可能性就更大。虽然其中一些可以通过源代码管理来管理，但注意数据库代码如何部署也很重要。\n\n\n\n\
  ### 部署类型\n\n确定部署方法的部分包括了解你当前用于部署数据库代码的流程。目前，你的业务可能有手动部署的脚本。根据你的组织结构，你可能有一个环境，其中这些脚本可以随时部署到特定环境，或者你可能有一些关于这些\
  \ T-SQL 脚本可以在一周的哪几天部署的条件。了解谁在开发数据库代码、如何编码和管理变更以及你的部署频率，可以帮助你确定基于迁移的方法还是基于状态的方法更适合你。\n\
  \n如果你只能在某些特定日期部署到各种环境，这被称为`门控部署`。你可能在版本控制系统中使用数据库项目。第 11 章涵盖了分支和合并的主题。你的公司可能只为你数据库项目使用一个分支。所有个人的开发工作都在同一个地方完成。另一方面，你的公司可能利用`分支`。这是你的开发人员使用主代码库的副本并对该副本进行更改的地方。有些公司可能直接从一个分支部署。如果你的数据库代码不是设计为可以在任何时间点部署，这可能特别有用。其他公司，特别是那些编写代码以在任何时间点部署的公司，可能会选择在所有工作完成后将所有分支合并回\
  \ master 或主分支。在这种情况下，所有部署都来自主分支。\n\n有时团队管理其工作流的方式取决于其部署的频率。对于许多公司来说，目标是能够频繁部署。然而，这并不意味着每个公司都准备好接受那种频率的部署。对于以更接近看板风格编写代码的开发团队来说，代码部署到生产环境可能没有固定模式。其他团队可能有固定的节奏或冲刺周期来部署他们的代码。这些冲刺周期可以从几周到几个月不等。如果你的公司仍在决定发布代码的频率，我建议避免过长的冲刺周期，因为这通常意味着一次部署的变更更多。这会增加部署出现问题的风险。\n\
  \n你还想了解平均每次部署的数据库变更量。你可能会发现平均每个冲刺部署的数据库变更并不多。如果是这种情况，请确保你最终不会进行包含大量数据库变更的部署。当一次部署中发生多个数据库变更时，不仅出现错误的风险更大，而且根据你的部署方法，一个\
  \ T-SQL 代码的变更可能会覆盖另一个变更。\n\n在介绍两种主要的数据库代码部署方法之前，还有一个额外因素你应该考虑。虽然我们都希望每次数据库部署都能按预期工作，但有时你可能需要撤销或回滚部署中的一个或多个数据库变更。如果你还没有回滚策略，现在是开始考虑一个可靠的回滚策略的好时机。当需要回滚时，并不是开始弄清楚如何快速有效地回滚你的\
  \ T-SQL 代码的好时机。拥有一个可以重复执行此操作的方法可以显著提高你对部署的信心。你的公司可能会使用回滚脚本来简化需要恢复到先前版本数据库代码的情况。如果你使用版本控制，你可以选择恢复到数据库代码的不同版本。在此基础上，如果你使用持续集成，你可能有一个预先打包的先前数据库代码版本，可以在几分钟内部署到你的生产数据库。\n\
  \n#### 基于迁移的部署\n\n这最终引导我们考虑数据库部署常用的部署方法。一种方法包括将所有要一起部署的脚本打包在一起。这被认为是`基于迁移的方法`；另一个选项是采用源代码管理中存在的所有内容，并将其视为你数据库的真实来源。使用这种方法时，你部署到的任何数据库都将被覆盖，以匹配源代码管理中存在的数据库对象。这通常被称为`基于状态的部署`。\n\
  \n现在你了解了基于迁移的部署方法是什么，你可以开始确定它是否最适合你的部署。使用基于迁移方法的主要好处之一是，你可以精确控制部署到数据库的内容。这种部署方法通常涉及将所有要部署的脚本保存在一个位置，这些脚本通常以某种方式命名，以便可以按特定顺序部署。这可以使你的部署易于管理。你可以快速找到保存脚本的文件夹，并确切知道部署了什么内容。\n\
  \n如果你使用这种部署方法，我建议你有一个单独的文件夹来跟踪需要部署的回滚脚本以及这些回滚脚本应部署的顺序。如果你需要在部署当晚回滚，或者需要一次性回滚几个部署，这将帮助你快速找到需要回滚的代码。基于迁移的部署方法有一些限制。主要挑战之一是如果你需要回滚特定的代码片段。根据你的源代码管理方式，这可能不像查看该数据库对象的历史记录并从源代码管理恢复先前版本那么简单。\n\
  \n基于迁移的部署方法可以手动设置。你和你的团队可以编写你的 T-SQL 代码文件，并按数字顺序保存。这实际上包括在 SQL Server Management\
  \ Studio 中创建一个脚本，并使用特定的命名约定保存文件。这个命名约定包括指定部署顺序，例如在文件名前加上步骤号以指示部署顺序。\n\n你可能会创建一个名为`001_20230620_DB232_ActiveProduct.sql`的文件。然而，你可能随后收到请求，要求对同一存储过程进行额外修改。在这种情况下，你需要从存储过程`dbo.GetProduct`中删除日期列。在清单\
  \ 12-1 中，你可以找到 T-SQL 代码。\n\n```\nPRINT N'Altering [dbo].[GetProduct]...';\nGO\n\
  /*-------------------------------------------------------------*\\\nName:      \
  \       dbo.GetProduct\nAuthor:           Elizabeth Noble\nCreated Date:     2022-10-30\n\
  Description:      Get a list of all products in the databases\nUpdated Date:   \
  \  2023-05-23\nDescription:      Add feature flag. If feature flag is enabled, only\n\
  Show active products. Otherwise, show all products.\nUpdated Date:     2023-06-20\n\
  Description:      Remove the feature flag. Leave only the new logic.\nThe stored\
  \ procedure now only returns active products.\nUpdated Date:     2023-06-21\nDescription:\
  \      Remove dates.\nThe stored procedure now only returns active products.\nSample\
  \ Usage:\nEXECUTE dbo.GetProduct;\n\\*-------------------------------------------------------------*/\n\
  CREATE OR ALTER PROCEDURE dbo.GetProduct\nAS\nSELECT\nProductID,\nProductName,\n\
  ProductPrice,\nIsActive\nFROM dbo.Product\nWHERE IsActive = 1;\n```\n清单 12-1\n基于迁移部署的示例脚本\n\
  \n\n\n完成对数据库代码的修改后，您可以将此代码保存为 SQL 脚本。保存此代码的文件名为 `002_20230620_DB232_RemoveDates.sql`。为了确保部署顺利进行，您可以将两个文件放在同一个文件夹中。图\
  \ 12-1 显示了这两个文件在文件文件夹中的显示方式。\n\n![](img/480547_2_En_12_Fig1_HTML.jpg)\n\n截图显示了活动产品和删除日期的\
  \ SQL 文件名。它还进一步显示文件类型为 Microsoft SQL Server 查询文件。\n\n图 12-1\n\n基于迁移的文件列表\n\n您创建的第一个脚本以\
  \ 001 开头。这是按文件名排序的第一个脚本。这也是下次部署时应运行的第一个脚本。您创建的第二个脚本以 002 开头。这些文件被专门命名，以便在下次软件发布时按文件名升序运行。手动编写\
  \ `T-SQL` 脚本并保存并非基于迁移的部署中唯一可用的方法。第三方工具可以帮助您管理此过程。\n\n基于迁移的部署有许多支持者。开发任何数据库代码的一个主要挑战是，当多个开发人员基于同一个代码库工作时，如何管理代码的维护。在第\
  \ 11 章中，我介绍了分支和合并。这是确保所有为数据库项目开发 `T-SQL` 代码的人员都能以限制多个开发人员处理同一数据库对象时产生不一致的方式工作。如果您与不习惯使用源代码控制的团队合作，采用基于迁移的方法可能更合理。基于迁移的部署过程更适合处理对数据库数据的多次更改。这可以是数据清理的一部分，或与重构数据库对象有关。使用基于迁移的部署方法的另一个优点是，更容易精确选择将要部署的数据库对象。如果您频繁更改数据库，最终可能会得到许多脚本，这可能会增加部署所需的时间。\n\
  \n由于这些因素，在某些情况下，您可能会发现基于迁移的部署比基于状态的部署更有效。较小的开发团队可能会发现基于迁移的方法更容易使用。如果您为数据库使用源代码控制，您仍然需要确保您的团队同步他们的开发数据库代码。对于开发团队较少的环境，情况也可能如此。如果您团队不在同一天进行频繁部署，或者有较大的维护窗口可用于部署，那么基于迁移的部署方法也可能很适合您。\n\
  \n使用基于迁移的方法时，您需要牢记的一个风险涉及在源代码控制之外发生的数据库更改。您可能会遇到需要立即将更改部署到生产环境的情况。通常，这些更改在没有部署到较低环境或未签入源代码控制的情况下就被部署到生产环境。如果您需要部署热修复或补丁，而此代码最终未进入您的源代码控制，您的环境可能会变得不同步。虽然未来的部署不会覆盖您的更改，但您可能会发现环境之间存在不一致的行为。为了解决这个问题，任何手动进行的热修复都应添加回源代码控制，以便您的开发环境与生产环境保持同步。\n\
  \n#### 基于状态的迁移\n\n基于状态的推出涉及将整个数据库架构从一个环境复制到另一个环境。部署 `T-SQL` 代码时，基于迁移的部署并非唯一可用的选择。数据库部署的另一个流行选项涉及使用数据库架构的来源，并更新目标环境以具有相同的数据库架构。这被称为\
  \ `基于状态的方法`。通常，这与源代码控制一起使用，但这并非总是必要。其概念是，在部署完成后，目标数据库将与源数据库或源代码控制相似。此方法不需要源代码控制，但通过源代码控制更容易管理。\n\
  \n在使用基于迁移的方法时，每个更改都单独保存在其自己的脚本文件中，而对于基于状态的部署则不是这样。在基于状态的部署中，对同一数据库对象可能有多个更改，但只有一组\
  \ `T-SQL` 代码被部署到目标数据库实例。这个单一的 `T-SQL` 脚本将所有更改合并为一个净更改。如果数据库对象在源代码控制中，或者源数据库与目标不同，则会在目标实例上运行更改脚本。我也喜欢这一点，因为我知道一旦部署完成，数据库将处于什么状态。部署完成后，目标实例中的数据库应具有与源位置相同的数据库对象。\n\
  \n使用与基于迁移方法相同的示例，我将逐步介绍其作为基于状态部署的一部分是如何处理的。第一步涉及进入源代码控制并确保您拥有最新版本。获得最新版本后，您可以打开存储过程\
  \ `dbo.GetProduct`。进行这些更改后，您可以将这些更改签入源代码控制。\n\n假设其他人正在修改代码以匹配清单 12-1 中的 `T-SQL`\
  \ 代码。如果另一个开发人员想要更改此过程，他们需要确保使用的是最新的副本。他们通过检查源代码控制中是否有其他开发人员的任何签入来实现。在此示例中，他们将找到您所做的更改。如果他们跳过此步骤，您的代码更改可能会丢失，或者可能出现合并冲突。然后，他们可以更改\
  \ `dbo.GetProduct` 存储过程。然后可以将这些更改合并回主分支。当部署此代码时，源位置将包含两个更改。这些更改将仅显示活动产品并删除日期列。不是一次部署一个更改，而是将存储过程\
  \ `dbo.GetProduct` 部署到目标实例一次。对存储过程的单个更新将包含这两个更改。\n\n\n\n当与众多开发者或不同的开发团队协作时，采用基于状态的部署方法可能带来显著优势。这源于整个数据库项目中可能发生的频繁变更。虽然基于状态的迁移适用于有少量或大量变更的数据库项目，但这种方法在管理频繁变更方面表现更佳。这是因为，使用迁移方法时，众多开发者的大量变更意味着部署流程需要更多步骤；而在基于状态的方法下，需要更改的文件则更少。采用基于状态的方法，你的部署过程会更快，也更不容易因某人输错文件名而导致代码部署出现问题。使用基于状态的方法，你可以确信，在部署完成后，源位置的任何变更都将同步到目标位置。这也意味着，如果生产环境中有许多未纳入源代码控制的变更，这些变更将在下一次部署时被覆盖。如果你的团队执行频繁更新（尤其是全天持续进行），你可能会发现基于状态的方法部署耗时更少。至少，这通常是因为在频繁部署的情况下，基于状态方法所需部署的变更通常更少。\n\
  \n使用基于状态方法最大的挑战之一，在于如何部署数据操作变更。这些数据变更可能涉及管理配置表、管理功能开关、添加默认值，或纠正因先前缺陷而受影响的数据。基于状态的方法非常适合比较整个数据库架构。然而，在更改数据库内部数据方面存在局限性。在大多数情况下，这是通过在部署后可能执行的手动脚本来完成的。如果你使用源代码控制，可以通过\
  \ `预部署` 和 `后部署` 脚本来管理这些变更。如果你使用源代码控制，那么 `预部署` 和 `后部署` 脚本各只有一个。这可能会使数据变更的过程变得有些复杂，因为你需要编写\
  \ `T-SQL` 代码，使其能够运行一次后便被忽略，或者你需要进入源代码控制并频繁更改你的 `预部署` 或 `后部署` 脚本。\n\n### 开发风格\n\n\
  数据库开发团队有几种不同的方式来管理工作流程。所采用的方法论会影响应该选择哪种类型的部署方法。\n\n### 看板\n\n我第一份需要持续编写数据库代码的工作没有严格的时间表。目标是尽快做出更改并部署。这通常是因为我在创建\
  \ SQL Server 报表服务 (SSRS) 报告。通常，这种类型的开发可以被称为看板。看板指的是一种管理变更请求的方法。其高层概念是存在一个持续的工作队列。请求进入待办事项列表，然后逐个处理，直到完成。\n\
  \n### Scrum\n\nScrum 代码开发方法比看板更具结构性。Scrum 包括几个步骤，例如确保工作项定义明确、估算完成特定工作项所需时间，以及确定工作项何时完成。为了确定代码预期何时完成并可部署，组织会确定他们打算以多高的频率部署代码。这段时间长度被称为\
  \ `Sprint 或冲刺周期`。每个 Sprint 预计包含可完成的固定数量工作。利用估算值，工作项根据其优先级被添加到 Sprint 中，直到估算的工作量与\
  \ Sprint 的预期工作量相匹配。这是一个高层定义，并非关于如何为你的数据库团队实施 Scrum 或看板的深度指南。对于这些部署，Sprint 中的所有用户故事都应作为该\
  \ Sprint 的一部分部署。虽然有一些方法可以在不改变功能的情况下部署 Sprint 内的所有内容，但我们的代码通常并非那样编写。\n\n如果你的业务正在尝试做到能在任何时间点部署变更，请考虑改变你开发数据库代码的方式。这种改变可能涉及你对解决方案的思考方式以及你编写代码的方式。使用功能开关等概念将会帮助你。本质上，你希望以这样一种方式编写你的\
  \ `T-SQL` 代码：它可以在任何时间点部署，而你的应用程序不会崩溃。然而，达到这一点需要几个基本步骤。首先是了解你公司如何开发其 `T-SQL` 代码。如果你有许多开发者为单个应用程序编写\
  \ `T-SQL` 代码，与每个开发者负责不同应用程序的情况相比，你可能需要以不同方式处理部署。这将帮助你确定哪种部署方法最适合你。\n\n\n\n### 特性标志\n\
  \n你可能会遇到这样的情况：需要对一个应用程序进行修改，而这将涉及许多不同的用户故事。换句话说，你可能在重构一个需要数月时间才能完成的应用程序。与此同时，你知道你的业务可能每两周就部署一次数据库代码。问题就变成了：如何开发\
  \ T-SQL 代码，既能确保代码在现有数据库结构中有效工作，又能保证这些数据库变更在准备好之前不会进入生产环境。\n\n这不仅是许多数据库开发人员，也是许多软件开发人员问过自己的问题。问题的核心在于如何编写可以随时开启或关闭的数据库代码。一种试图处理这个问题的方法是使用**特性标志**。特性标志是一种以编程方式启用或禁用功能的方法。它们不是\
  \ SQL Server 的特定功能，而是实现 T-SQL 代码的一种方法。理想情况下，特性标志用于允许代码尽快部署，同时能精细控制功能何时启用。使用特性标志的初衷是让它们只存在有限的时间，因为它们的目的只是在启用功能之前允许代码部署。高层次的过程如下：\n\
  \n1.  向数据库添加一个处于禁用状态的特性标志。\n2.  更新存储过程，使用 `IF ((SELECT IsActive FROM dbo.FeatureFlag\
  \ WHERE FeatureFlagID = <FeatureFlagID>) = 1)... EXISTS...`\n3.  从数据库表中启用该特性。\n\
  4.  更新存储过程，移除 `IF… EXISTS`，仅使用新逻辑。\n5.  从数据库表中禁用或删除该特性标志。\n\n实现特性标志的方法有很多。目标始终如一：创建可以配置为在不同场景下工作的数据库代码和数据库对象。\n\
  \n使用特性标志时，你可以随意启用或禁用新功能。这种管理数据库代码的方法可以让你编写代码，将代码部署到生产环境，并在业务选定的后续时间启用新功能。除了能够精确控制何时启用新功能外，你还能获得一个额外好处：通过更新数据库中的一个值，几乎可以即时回滚变更。在完全采用特性标志之前，你需要打好一些基础。例如，你应该养成对数据库代码进行单元测试的习惯。对于特性标志，你需要在特性标志启用时进行单元测试，也需要在特性标志禁用时进行单元测试，以确认你的应用程序使用的是预先存在的数据库逻辑。\n\
  \n我建议你等到完全为数据库实施了源代码管理之后，再采用特性标志。这样建议的原因之一是管理特性标志需要额外的工作。当你为数据库对象创建特性标志时，你需要创建一些额外的逻辑，以允许你的应用程序使用预先存在的\
  \ T-SQL 代码或新的数据库代码。这既需要纪律性，也需要明确的流程来确定何时从代码中移除特性标志。虽然特性标志对于存储过程、函数或视图等数据库对象非常有效，但它们并不是你开发的所有内容的解决方案。有些变更，例如对数据库列的修改，无法被开启和关闭。为了管理对数据库对象的这类变更，我将在本节末尾讨论一些解决方案。\n\
  \n当为你的 T-SQL 代码使用特性标志时，你有几种选项来确定在任何给定时间哪些特性标志是启用的。关于特性和数据库，我听过两种主要的解决方案被提出。第一种可能更偏向于应用程序代码。它包括在配置文件中提供特性标志的值。第二种选项更偏向于基于\
  \ T-SQL 的解决方案。这个解决方案涉及创建一个表来存储特性标志及其当前状态（如启用或禁用）。每种选项都有其优缺点。使用应用程序代码来管理特性标志可能更容易实现和管理。然而，数据库管理员可能更难支持这些特性标志。如果你将特性标志值保存在数据库中，你需要有纪律地管理这些特性标志并移除它们。最终很容易得到一张堆满了已弃用特性标志的表。缺点是只有有权访问数据库表的用户才能确认每个特性标志关联的值。\n\
  \n当你部署数据库代码时，可以将特性标志部署为禁用状态。一旦你准备好启用新功能，就可以将特性标志设置为启用。你需要定义一个流程来确定何时完全切换到新功能。当你准备好完全在新功能下运行时，移除之前的\
  \ T-SQL 代码。同时，在这个过程中移除任何对特性标志的引用。这种方法的挑战是，很容易跳过移除先前数据库代码的流程。如果你的 T-SQL 代码没有定期清理，这会大大降低你代码未来的可维护性。\n\
  \n如果你需要更新一个存储过程以使用新逻辑，你可以使用特性标志，以便在想要的时候部署这个变更。参考清单 12-2，你可以找到未经修改的原始存储过程。\n\n```\n\
  /*-------------------------------------------------------------*\\\nName:      \
  \       dbo.GetProduct\nAuthor:           Elizabeth Noble\nCreated Date:     2022-10-30\n\
  Description:      Get a list of all products in the databases\nSample Usage:\nEXECUTE\
  \ dbo.GetProduct;\n\\*-------------------------------------------------------------*/\n\
  CREATE OR ALTER PROCEDURE dbo.GetProduct\nAS\nSELECT\nProductID,\nProductName,\n\
  ProductPrice,\nIsActive,\nDateCreated,\nDateModified,\nDateDisabled\nFROM dbo.Product;\n\
  GO\nListing 12-2\n原始存储过程\n```\n\n这个存储过程提取了关于所有产品的各种信息。在这段 T-SQL 代码中，存储过程没有区分活跃和不活跃的产品。它返回了所有产品的信息。你可能会发现这个存储过程本应该只返回活跃的产品。你需要更新这个存储过程，使其只返回活跃产品，并排除\
  \ `IsActive` 列。移除这个列可以防止这个代码变更在部署后立即被启用。\n\n在这种情况下，你需要使用像特性标志这样的机制，以赋予你灵活性来创建存储过程的这些变更，并控制这些变更何时对应用程序可用。使用特性标志时，你需要一种方法来确定某个特性标志是启用还是禁用。这就是你和数据库代码将知道在给定时间应执行哪段\
  \ T-SQL 代码的方式。一个选项是创建一个表来存储有关特性标志的信息。你可以创建一个如清单 12-3 所示的表。\n\n```\nCREATE TABLE\
  \ dbo.FeatureFlag\n(\nFeatureFlagID     SMALLINT,\nIsActive          BIT,\nDateCreated\
  \       DATETIME2,\nDateModified      DATETIME2\n);\nListing 12-3\n创建特性标志表\n```\n\
  \n\n\n"
- "# 功能标志在数据库开发中的使用\n\n## 功能标志表简介\n\n这个表格很简单，包含一个整数形式的功能标志 ID、一个指示功能标志是否启用的值、一个功能标志的创建日期，以及一个功能标志值最后更新的日期。这个表格允许你存储有关启用了哪些功能标志的信息。\n\
  \n要使用此功能标志表，你需要将此功能标志的信息输入到清单 12-3 中创建的表中。清单 12-4 中的`INSERT`语句展示了向`dbo.FeatureFlag`表插入数据。\n\
  \n```\nINSERT INTO dbo.FeatureFlag\n(\nFeatureFlagID,\nIsActive,\nDateCreated,\n\
  DateModified\n)\nVALUES (947,0,SYSDATETIME(),SYSDATETIME());\nListing 12-4\n插入功能标志记录\n\
  ```\n\n## 插入功能标志记录\n\n你已经为功能标志 947 插入了一条记录。在插入时，该功能标志是禁用的。目标是现有的存储过程在功能标志添加后继续返回与之前相同的结果。\n\
  \n## 修改存储过程以使用功能标志\n\n在清单 12-5 的存储过程中，你添加逻辑以使存储过程能够根据功能标志 947 是禁用还是启用返回不同的结果。\n\n\
  ```\n/*-------------------------------------------------------------*\\\nName: \
  \            dbo.GetProduct\nAuthor:           Elizabeth Noble\nCreated Date:  \
  \   2022-10-30\nDescription:      Get a list of all products in the databases\n\
  Updated Date:     2023-05-20\nDescription:      Add feature flag. If feature flag\
  \ is enabled, only\nShow active products. Otherwise, show all products.\nSample\
  \ Usage:\nEXECUTE dbo.GetProduct;\n\\*-------------------------------------------------------------*/\n\
  CREATE OR ALTER PROCEDURE dbo.GetProduct\nAS\nIF ((SELECT IsActive FROM dbo.FeatureFlag\
  \ WHERE FeatureFlagID = 947) = 1)\nBEGIN\nSELECT\nProductID,\nProductName,\nProductPrice,\n\
  DateCreated,\nDateModified,\nDateDisabled\nFROM dbo.Product\nWHERE IsActive = 1;\n\
  END\nELSE\nBEGIN\nSELECT\nProductID,\nProductName,\nProductPrice,\nIsActive,\nDateCreated,\n\
  DateModified,\nDateDisabled\nFROM dbo.Product;\nEND;\nListing 12-5\n带功能标志的存储过程\n\
  ```\n\n此查询的第一部分现在仅在功能标志 947 启用时返回结果。在任何其他情况下，存储过程都返回第二个查询的结果。功能标志的原始状态是禁用的。当功能标志被禁用时，将返回所有产品。\n\
  \n## 启用功能标志\n\n一旦此代码部署到生产环境，你将准备好启用新功能。此时，运行清单 12-6 中的 T-SQL 代码将启用该功能标志。\n\n```\n\
  UPDATE dbo.FeatureFlag\nSET   IsActive = 1,\nDateModified = GETDATE()\nWHERE FeatureFlagID\
  \ = 947;\nListing 12-6\n启用功能标志\n```\n\n启用此功能标志将导致存储过程`dbo.GetProduct`现在仅返回活跃产品。\n\
  \n## 移除功能标志并更新最终逻辑\n\n一旦你确信新代码按预期工作且没有业务需求回滚，请更新存储过程，使其仅返回新数据库代码的结果。移除功能标志还可以防止此存储过程在功能标志被错误更新时返回不准确的结果。清单\
  \ 12-7 中的 T-SQL 代码展示了`dbo.GetProduct`存储过程的最终状态。\n\n```\n/*-------------------------------------------------------------*\\\
  \nName:             dbo.GetProduct\nAuthor:           Elizabeth Noble\nCreated Date:\
  \     2022-10-30\nDescription:      Get a list of all products in the databases\n\
  Updated Date:     2023-05-20\nDescription:      Add feature flag. If feature flag\
  \ is enabled, only\nShow active products. Otherwise, show all products.\nUpdated\
  \ Date:     2023-06-20\nDescription:      Remove the feature flag. Leave only the\
  \ new logic.\nThe stored procedure now only returns active products.\nSample Usage:\n\
  EXECUTE dbo.GetProduct;\n\\*-------------------------------------------------------------*/\n\
  CREATE OR ALTER PROCEDURE dbo.GetProduct\nAS\nSELECT\nProductID,\nProductName,\n\
  ProductPrice,\nDateCreated,\nDateModified,\nDateDisabled\nFROM dbo.Product\nWHERE\
  \ IsActive = 1;\nListing 12-7\n最终的存储过程\n```\n\n存储过程`dbo.GetProduct`中的数据库代码已更新。在任何代码更改之前，此存储过程返回所有产品。创建功能标志后，存储过程被更新为包含根据功能标志状态返回所有产品或仅活跃产品的逻辑。当更改得到确认后，你可以移除功能标志的逻辑。这将使存储过程保持原样，只包含更新后的\
  \ T-SQL 代码。你可以通过将`IsActive`设置为 FALSE 来清理`dbo.FeatureFlag`表，或者删除功能标志 ID 为 947 的行。\n\
  \n## 版本控制与持续部署的思考\n\n你管理源代码控制中的分支和合并的方式，可能决定了你需要多频繁地部署未完成的数据库代码。你可能会发现自己正处于开发数据库代码但在下一次部署前尚未完成的情况。通常，以可以在完成时部署的方式编写代码是最简单的。然而，随着向敏捷软件开发的转变，以可以在任何时间点部署的方式编写\
  \ T-SQL 代码变得越来越重要。这正是功能标志真正价值的体现。\n\n\n\n## 自动化部署\n\n处理数据库部署的方式多种多样。您可以使用不同的工具来自动化数据库部署，并采用不同的部署策略。确定为数据库部署采用何种方法，取决于您试图预防或解决的问题类型。这些问题可能包括：在部署过程中未能更新代码、在部署过程中覆盖代码、防止部署不需要的代码，或提高部署速度。这些部署策略取决于所部署的\
  \ `T-SQL` 代码类型。其他部署数据库代码的方法涉及以某种方式部署数据库，帮助您在更改部署到包括生产环境在内的所有其他环境之前，在开发阶段发现问题是关键。\n\
  \n有多种方法可以使用 `SQL Server Management Studio`、`Visual Studio` 或 `PowerShell` 来简化和自动化部署\
  \ `T-SQL` 代码。如果您希望在不将数据库纳入源代码控制的情况下实现数据库部署自动化，则需要采取一些额外步骤来保护您的数据库。`SSDT` 允许所有对象以\
  \ `CREATE` 开头。在部署代码时，`SSDT` 会判断一个对象应使用 `CREATE` 还是 `ALTER`。如果您想使用 `DML` 更改数据库中的数据，则需要使用预部署或后部署脚本。这样做时，您的\
  \ `T-SQL` 代码应编写成允许多次运行。这可能不是您当前使用的方法，但您应该考虑如果有人意外再次尝试部署相同的脚本会发生什么。编写脚本时，应确保无论执行多少次都能成功运行。如果您已经在使用源代码控制，那么您的源代码控制应该为您管理此功能。\n\
  \n当作为基于迁移的部署的一部分部署 `T-SQL` 代码时，如果您不使用源代码控制，流程可能会有所不同。对于基于迁移的部署，您通常有一组需要运行的脚本来完成部署。在不使用源代码控制时，最复杂的步骤有时是确切地确定应该部署什么。当您准备好部署\
  \ `T-SQL` 代码时，理想情况下，脚本将保存在同一个文件夹中。此时，您可以手动运行所有这些迁移脚本，或者确定如何实现运行脚本的自动化。如果您选择手动运行脚本，则必须打开每个脚本，并确保连接到正确的\
  \ `SQL Server` 实例。还有其他选项可用于提高部署这些迁移脚本的一致性和速度。您可以使用批处理文件或 `PowerShell` 来帮助自动执行这些部署。代码清单\
  \ 12-8 包含了运行保存在文件夹 `C:\\Deploy` 中的所有 `SQL` 脚本文件所需的 `PowerShell`。\n\n```\nInvoke-DbaQuery\
  \ -SQLInstance localhost -Database OutdoorRecreation -File \"C:\\Deploy\\*.sql\"\
  \n代码清单 12-8\n用于运行 SQL 脚本的 PowerShell\n```\n\n此代码表示，`C:\\Deploy` 文件夹中扩展名为 `.sql`\
  \ 的所有文件都应在 `localhost` `SQL Server` 上的 `OutdoorRecreation` 数据库中执行。\n\n提示\n\n此代码使用\
  \ `PowerShell` 模块 `dbatools` 执行。该模块是一个由 `SQL Server` 社区构建的开源项目。更多详情，请访问 [`https://dbatools.io/`](https://dbatools.io/)。\n\
  \n如果您使用的是基于状态的迁移方法并且未使用源代码控制，也可以使用 `PowerShell` 实现自动化。这些 `DACPAC` 可以从已有的数据库和 `SQL\
  \ Server` 实例生成。根据您选择处理 `DACPAC` 的方式，您可以将目标数据库更新为匹配 `DACPAC` 中的代码，或者基于 `DACPAC` 与目标数据库之间的差异创建一个脚本文件。一旦找到从您的解决方案或工作区生成的\
  \ `DACPAC` 文件，您就可以运行代码清单 12-9 所示的 `PowerShell` 代码。\n\n```\nPublish-DbaDacPackage\
  \ -SQLInstance localhost -Database OutdoorRecreation -Path C:\\temp\\OutdoorRecreation.dacpac\n\
  代码清单 12-9\n用于比较 DACPAC 的 PowerShell\n```\n\n此 `PowerShell` 也来自 `dbatools` 模块。它不是执行\
  \ `C:\\temp` 文件夹中的所有 `SQL Server` 文件，而是将 `DACPAC` 文件中的架构与 `localhost` 服务器上 `OutdoorRecreation`\
  \ 数据库的架构进行比较。此 `PowerShell` 命令包含一些额外的开关，例如 `-GenerateDeploymentReport` 或 `-ScriptOnly`。`-GenerateDeploymentReport`\
  \ 会创建一个 `XML` 文件，显示对数据库所做的更改。`-ScriptOnly` 选项会输出一个可以手动执行的 `SQL Script` 文件。根据您选择处理\
  \ `DACPAC` 的方式，您可以将目标数据库更新为匹配 `DACPAC` 中的代码，或者基于 `DACPAC` 与目标数据库之间的差异创建一个脚本文件。\n\
  \n实现完全自动化部署的最简单方法是使用第三方工具。然而，这并非您唯一的选择。如果您对基于迁移的部署感兴趣，至少有一个免费的第三方工具可用：`DbUp`。虽然此工具可能有助于管理基于迁移的部署，但本书不会涵盖\
  \ `DbUp`。请注意，如果您打算使用基于迁移的部署和源代码控制，您将需要一个扩展程序或类似 `DbUp` 的其他工具。\n\n如果您的数据库已纳入源代码控制并且您正在使用基于状态的迁移，那么有几种替代方案来部署数据库更改。您可以选择直接从\
  \ `Visual Studio` 将更改部署到目标数据库实例。虽然您仍然是手动部署代码，但这可以显著节省时间，因为您不必打开多个文件并单独执行每个文件。但是，如果不使用第三方工具来进一步自动化部署，您将需要创建\
  \ `PowerShell` 脚本来生成 `DACPAC` 或 `SQL script` 文件，并将这些文件部署到目标实例。\n\n在上一节关于部署方法的内容中，我介绍了基于迁移和基于状态的部署。在部署修改数据的更改时，例如使用数据操作语言（`DML`）查询，您需要确保不会意外地多次修改数据。虽然我们可能希望确保每个脚本都能以无法多次更新数据的方式编写，但有时可能无法编写脚本来防止这种情况发生。如果发生这种情况，您可以使用类似于功能标志（feature\
  \ flags）的概念。即创建一个表来记录数据修改脚本何时已运行。脚本首次完成时，可以更新该表并添加一个值，表明所有记录都已更新。例如，如果您想将产品价格提高\
  \ 10%，您的 `T-SQL` 代码应编写成不会在每次部署数据库项目时都更新产品价格。该脚本还可以检查以确保该值在脚本运行之前不存在于表中。该表也可以在 `T-SQL`\
  \ 脚本整体通过或失败时进行检查和填充，或者在更新完成时记录每个单独的记录。\n\n\n\n你可能还会发现，有时数据库代码已准备好部署，但业务尚未准备好启用新功能。本章前面已经介绍过，特性开关如何帮助你控制应用程序使用数据库代码的当前状态还是未来状态。有一种部署方法可以在这些情况下提供帮助。其最大优势在于，你可以在不使用这些新\
  \ T-SQL 代码的情况下部署数据库代码。根据所更改的数据库对象，管理起来可能相对容易或困难。\n\n当你想要部署 T-SQL 代码更改，但尚未准备好将这些更改发布到生产环境时，可以使用一种部署方法来帮助你。这种部署方法被称为\
  \ *暗部署*。此方法使用特性开关或类似概念。你部署 T-SQL 代码，使得数据库代码继续按原有方式运行。当你准备好启用新功能时，可以启用特性开关。这会切换数据库代码的工作方式，使其使用新功能而非原始数据库代码。\n\
  \n## 暗部署步骤\n\n应用程序和数据库的初始状态如图 12-2 所示。\n\n![](img/480547_2_En_12_Fig2_HTML.jpg)\n\
  \n图 12-2：未修改的应用程序和数据库\n\n暗部署的下一步是通过部署 SQL 脚本来更新数据库。如果你使用特性开关，此时应将其禁用。图 12-3 中的数据库已用新的数据库代码更新。\n\
  \n![](img/480547_2_En_12_Fig3_HTML.jpg)\n\n图 12-3：部署数据库更改\n\n部署带有特性开关的 T-SQL 代码后，你现在就可以部署应用程序了。一旦你部署应用程序并启用特性开关，你的应用程序和数据库将处于相同状态，如图\
  \ 12-4 所示。\n\n![](img/480547_2_En_12_Fig4_HTML.jpg)\n\n图 12-4：部署应用程序并启用特性开关\n\n\
  这些步骤可以让你以“暗”的方式部署数据库更改。\n\n## 蓝绿部署\n\n数据库部署涉及许多风险。这些风险可能涉及不再按预期工作的 T-SQL 代码或应用程序代码。也存在代码看似有效但实际不符合预期的风险。在某些情况下，这个问题可能只是表面性的。其他时候，数据库代码中的缺陷可能会对保存在数据库中的数据质量产生负面影响。这可能包括以导致数据无法再使用的方式更改数据。为避免这类情况，可以使用不同的部署方法来保护数据库和应用程序。\n\
  \n一种潜在的部署方法是将一组硬件替换为装有更新软件的另一组硬件。这种部署方法被称为 *蓝绿部署*。这对应用程序效果很好，但当涉及数据库时会更加困难。如果你的应用程序仅使用数据库读取数据，你可以直接使用蓝绿方法。然而，由于该概念是完全替换代码，这对于需要允许写入活动的数据库效果不佳。\n\
  \n有一种改进的蓝绿方法可用于数据库。在这种方法中，你仍然有两组应用程序：原始应用程序和新应用程序。当用户连接到原始应用程序时，你部署那些可以更新并仍允许原始应用程序按预期工作的脚本。如果你使用特性开关，你部署使用了特性开关的数据库对象。一旦你准备好开始使用新的应用程序代码，你可以更新存储过程，开始为新的应用程序代码使用特性开关。在你确信对应用程序和数据库代码的更新按预期工作后，可以移除特性开关。此时，你已完全过渡到新的应用程序代码，并且所有特性开关都将从\
  \ T-SQL 代码中移除。\n\n### 蓝绿部署步骤\n\n你的蓝绿部署的初始状态如图 12-5 所示。\n\n![](img/480547_2_En_12_Fig5_HTML.jpg)\n\
  \n图 12-5：未修改的应用程序和数据库\n\n在部署前，应用程序和数据库均未修改。蓝绿数据库部署的下一步是部署那些将对原始或新应用程序都有效的数据库更改。图\
  \ 12-6 显示数据库已应用了一些更改。\n\n![](img/480547_2_En_12_Fig6_HTML.jpg)\n\n图 12-6：部署数据库更改\n\
  \n原始应用程序将继续连接到已修改的数据库。蓝绿部署方法基于替换代码而非覆盖代码的概念。为了遵循此部署方法，你需要搭建新应用程序所需的硬件和软件。图 12-7\
  \ 显示了数据库和更新后的应用程序的状态。\n\n![](img/480547_2_En_12_Fig7_HTML.jpg)\n\n图 12-7：部署新应用程序\n\
  \n在特性开关就位的情况下，两个应用程序继续以与原始应用程序相同的方式运行。既然应用程序代码已准备就绪，就可以在数据库中启用特性开关了。图 12-8 显示了更新后的应用程序连接到更新后的数据库。\n\
  \n![](img/480547_2_En_12_Fig8_HTML.jpg)\n\n图 12-8：移除特性开关\n\n更新后的应用程序和数据库已启动并运行，原始应用程序已停用。新的状态将如图\
  \ 12-9 所示。\n\n![](img/480547_2_En_12_Fig9_HTML.jpg)\n\n图 12-9：移除原始应用程序\n\n移除原始应用程序信息即完成蓝绿部署过程。重申一下，蓝绿部署的过程如下：\n\
  \n1.  从未修改的应用程序和数据库开始。\n2.  向数据库添加一个特性开关。\n\n\n\n3.  使用新的 `功能标志` 部署更新后的应用程序。\n \
  \   1.  未修改的应用程序可以继续如常工作。\n\n2.  由于 `功能标志`，修改后的应用程序将使用新功能。\n\n4.  移除未修改的应用程序。\n\n\
  5.  更新剩余的应用程序代码，使其在不使用 `功能标志` 的情况下具备相同功能。\n\n6.  移除 `功能标志`。\n\n这种部署方法让你能够管理和控制如何部署及启用新的数据库代码。\n\
  \n虽然影响数据质量是一个问题，但与数据库代码变更相关的性能问题也同样令人担忧。在某些情况下，数据库对象的添加或修改可能导致性能严重下降。根据应用程序的配置方式，这可能会导致应用程序失败。可以采用一些部署策略，帮助在潜在的性能问题对最终用户可见之前就识别它们。\n\
  \n你可能还希望在让所有人使用新的 `T-SQL` 代码之前对其进行测试。通过使用一个单独的应用了 `T-SQL` 代码变更的数据库，你可以大致了解 `T-SQL`\
  \ 代码的性能情况。由于目前 `SQL Server` 的特性，你只能在这个辅助数据库上测试读事务。当你使用这种方法时，你采用的是 `金丝雀部署方法`。其概念是应用程序将同时连接到两个数据库。第二个数据库仅执行读事务。借助额外的硬件，你可以让大部分事务发送到原始数据库，只有一小部分活动发送到第二个数据库。随着你对新的\
  \ `T-SQL` 代码信心的增加，可以逐步增加发送到第二个数据库的活动量。\n\n在设计可部署的代码时，你需要从最开始就着手。你必须了解团队的架构、开发周期以及代码何时部署到各个环境中。目标是编写可维护且易于管理的\
  \ `T-SQL` 代码。你可以选择基于迁移的方法来部署 `T-SQL` 代码，这样可以精确控制部署到各个环境的内容。或者，你也可以选择基于状态的方法，控制部署后数据库应处的状态。你还需要确定如何处理尚未准备好部署的代码开发。通过使用分支与合并策略，你可以将开发中的代码与将要部署的代码分开管理。还有一种选择是使用\
  \ `功能标志`，这样你可以在任何时间点部署代码，并控制新功能的启用时机。无论你选择哪种方法，都需要确定一个清晰可定义的、可重复执行的部署策略。\n\n"
- '# 13. 功能性


  在本书中，我们涵盖了许多不同的主题。其中大多数章节都涉及最佳实践。这些最佳实践包括命名规范、`T-SQL` 代码格式化或数据库对象设计。尽管你已尽最大努力，但有时仍可能遇到超出最佳实践范围的情况。这些时候往往与高压期或紧迫的截止日期相关。本章的目标是帮助你为必须就复杂主题快速做出决策的情况做好准备。


  为允许用户插入或更新数据的应用程序设计数据库代码可能具有挑战性。你可能会发现自己需要处理需要禁用权限或功能的应用程序。在处理遗留应用程序代码时，可能会遇到额外的挑战，特别是如果这些应用程序使用了
  `ORM`（对象关系映射）软件。随着组织的成长，可能需要额外的报表功能，但可能没有足够的时间来开发数据仓库。在 `SQL Server` 中，你可以让 `T-SQL`
  代码更加灵活，但必须确保不以牺牲功能为代价来换取灵活性。


  在本章中，你将回顾常见的编程需求和可用于满足这些需求的 `T-SQL` 编码方法。对于每种方法，你将审视其优缺点，以帮助你快速做出决策。




  ## 插入与更新数据


  T-SQL 代码需要处理的一个常见情况是如何插入或更新数据。本节首先讨论使用 `MERGE` 语句最简单但也最麻烦的解决方案。然后将讨论另一种使用 `IF` 语句的方法；它允许
  SQL 判断记录是否存在。如果存在，则更新该记录；否则，将插入该记录。


  在许多场景下，你希望能够传入一组值。如果记录不存在，你可能希望插入信息；但如果记录已存在，你可能希望更新该记录。通常，当我们有压力时，我们希望使用最快、最简单的方式行事。其他时候，我们可能更关注
  T-SQL 代码的可读性，而非数据库引擎的最佳性能。虽然确保你的数据库代码能被他人理解很重要，但在编写 T-SQL 时，考虑数据库代码的性能同样重要。


  使用 T-SQL 插入或更新数据库记录时，情况也是如此。对于应用程序来说，无论用户是插入新记录还是更新现有记录，都执行相同的存储过程可能更简单、更直接。这类操作也可以被称为
  `upsert`（更新插入）。你是如何陷入这种境地的并不重要；重要的是设计出可靠且高效工作的 T-SQL 代码。


  ### MERGE 语句的问题


  有一些 T-SQL 数据库代码看似能够简化在单个查询中执行插入或更新的过程。此功能称为 `MERGE` 语句。使用 `MERGE` 语句的好处是逻辑直接明了。然而，`MERGE`
  语句存在许多已知问题。`MERGE` 语句最显著的问题涉及从使用索引视图的表中删除数据。当从表中删除数据时，关联的索引视图会间歇性地更新。也有报告称，将 `MERGE`
  语句与时态表一起使用时，效果并不总是如预期。其他问题包括：当 `MERGE` 语句修改属于全文索引一部分的字符串列时，分区表不会更新全文索引；当使用非筛选唯一索引通过
  `MERGE` 语句向表中 `DELETE` 或 `INSERT` 数据时，可能会发生唯一键冲突错误。


  除非你愿意接受这些潜在问题，否则我建议不要使用 `MERGE` 语句。清单 13-1 展示了一个 `MERGE` 语句的示例。


  ```sql

  CREATE PROCEDURE dbo.CustomerOrderMerge

  @CustomerOrderID INT,

  @CustomerID INT,

  @OrderNumber VARCHAR(15),

  @OrderDate DATETIME2(2),

  @ShipDate DATETIME2(2),

  @IsActive BIT,

  @DateCreated DATETIME2(2),

  @DateModified DATETIME2(2),

  @DateDisabled DATETIME2(2)

  AS

  MERGE dbo.CustomerOrder AS [Target]

  USING

  (

  VALUES

  (

  @CustomerOrderID,

  @CustomerID,

  @OrderNumber,

  @OrderDate,

  @ShipDate,

  @IsActive,

  @DateCreated,

  @DateModified,

  @DateDisabled

  )

  ) AS [Source]

  (

  CustomerOrderID,

  CustomerID,

  OrderNumber,

  OrderDate,

  ShipDate,

  IsActive,

  DateCreated,

  DateModified,

  DateDisabled

  )

  ON ([Target].CustomerOrderID = [Source].CustomerOrderID)

  WHEN MATCHED THEN

  UPDATE SET

  [Target].CustomerID = [Source].CustomerID,

  [Target].OrderNumber = [Source].OrderNumber,

  [Target].OrderDate = [Source].OrderDate,

  [Target].ShipDate = [Source].ShipDate,

  [Target].IsActive = [Source].IsActive,

  [Target].DateCreated = [Source].DateCreated,

  [Target].DateModified = [Source].DateModified,

  [Target].DateDisabled = [Source].DateDisabled

  WHEN NOT MATCHED BY TARGET THEN

  INSERT (

  CustomerOrderID,

  CustomerID,

  OrderNumber,

  OrderDate,

  ShipDate,

  IsActive,

  DateCreated,

  DateModified,

  DateDisabled

  )

  VALUES (

  [Source].CustomerOrderID,

  [Source].CustomerID,

  [Source].OrderNumber,

  [Source].OrderDate,

  [Source].ShipDate,

  [Source].IsActive,

  [Source].DateCreated,

  [Source].DateModified,

  [Source].DateDisabled

  );

  ```

  *清单 13-1 包含 Merge 语句的存储过程*


  此 `MERGE` 语句会更新客户订单（如果该订单已存在于 `dbo.CustomerOrder` 表中）。这个 `MERGE` 语句的逻辑易于遵循，其格式也易于编写。但在你的环境中实施
  `MERGE` 语句之前，你需要意识到这些问题。


  我曾经在充分理解 `MERGE` 语句所带来的问题之前就实施了它们。当我试图替换这些 `MERGE` 语句时，有人担心逻辑会变得过于困难。要替换清单 13-1
  中的逻辑，你可以编写一个如清单 13-2 所示的查询。


  ### 使用 IF…ELSE 进行更新插入


  要替换 `MERGE` 语句的逻辑，你可以使用 `IF… ELSE` 语句来控制 SQL Server 查询中的操作流程。在清单 13-2 中，如果订单存在于
  `dbo.CustomerOrder` 表中，记录将更新除 `DateCreated` 外的所有字段。否则，将在 `dbo.CustomerOrder` 中插入一条新记录。


  ```sql

  CREATE PROCEDURE dbo.CustomerOrderUpsert

  @CustomerOrderID INT,

  @CustomerID INT,

  @OrderNumber VARCHAR(15),

  @OrderDate DATETIME2(2),

  @ShipDate DATETIME2(2),

  @IsActive BIT,

  @DateCreated DATETIME2(2),

  @DateModified DATETIME2(2),

  @DateDisabled DATETIME2(2)

  AS

  IF EXISTS (SELECT CustomerOrderID FROM dbo.CustomerOrder WHERE CustomerOrderID =
  @CustomerOrderID)

  BEGIN

  UPDATE dbo.CustomerOrder

  SET   CustomerID = @CustomerID,

  OrderNumber = @OrderNumber,

  OrderDate = @OrderDate,

  ShipDate = @ShipDate,

  IsActive = @IsActive,

  DateModified = @DateModified,

  DateDisabled = @DateDisabled

  WHERE CustomerOrderID = @CustomerOrderID;

  END;

  ELSE

  BEGIN

  INSERT dbo.CustomerOrder

  (

  CustomerOrderID,

  CustomerID,

  OrderNumber,

  OrderDate,

  ShipDate,

  IsActive,

  DateCreated,

  DateModified,

  DateDisabled

  )

  VALUES

  (

  @CustomerOrderID,

  @CustomerID,

  @OrderNumber,

  @OrderDate,

  @ShipDate,

  @IsActive,

  @DateCreated,

  @DateModified,

  @DateDisabled

  )

  END;

  ```

  *清单 13-2 用于插入或更新的存储过程*


  ### 结论与建议


  `MERGE` 语句不仅限于向目标表插入或更新数据。它可以扩展到处理其他场景，例如插入或删除数据。也可以创建 `MERGE` 语句，使其在单个语句中完成插入缺失记录、更新更改记录以及删除孤立记录。虽然数据修改可以合并为单个语句的一部分，但在使用
  `MERGE` 语句时应谨慎，因为如前所述，它们容易导致性能问题和数据不一致。由于 `MERGE` 语句易于编写，有可能以一种对 SQL Server 效率不高的方式来比较两个表之间的数据。尽管表可能只被比较一次，但如果比较操作效率低下，可能会对被比较表的性能产生显著影响。也出现过在使用筛选索引时发生唯一键违规的情况。在特定情况下，`MERGE`
  语句还可能导致外键约束违规。这包括使用两个具有外键约束的表，其中外键设置为 `NOCHECK` 然后被回滚。我建议研究 `MERGE` 语句的已知问题，并进行充分的测试以确认
  T-SQL 代码能按预期工作。清单 13-2 中的代码表明，编写能够处理插入或更新的代码并非过于复杂。在 SQL Server 2019 之前，清单 13-1
  或 13-2 中的代码都可能受到参数嗅探的影响。既然 SQL Server 2019 已支持自适应联接，这个问题应该会有所缓解。




  ## 禁用功能


  在开发应用程序时，一个常见的挑战是如何在不影响业务连续性的情况下修改后端表设计。本节将讨论如何更新数据，以便在应用程序当前不支持软删除（即记录被标记为非活动状态而非从数据库中移除）的情况下，仍能从数据库中删除记录。这些方法可能包括禁用外键约束或创建虚拟记录。之后，记录就应该可以被删除。


  本节还将介绍如何使用软删除，以及一些决定何时切换“允许用户查找所有记录”或“仅查找未软删除记录”的方法。你也可以运用“应用程序规则”的概念来实现功能的切换。这同样可以与功能标志（Feature
  Flags）结合使用，正如第 13 章所讨论的那样。


  ### 启用/禁用功能的挑战


  在设计应用程序时，首要目标通常是满足既定需求。在许多情况下，产品负责人或业务部门提出的是他们当前所需的功能。然而，这些人并不具备你对应用程序和数据库开发的了解。因此，他们可能不会主动要求具备按需启用或禁用特定功能的能力。这里，“功能”可以指用户或角色执行某项操作的能力，也可以指应用程序以某种特定方式运行的能力。他们可能指望着你能预见到未来他们可能会如何使用这些应用程序。


  设计新应用程序时，最容易被遗忘的功能之一，就是为用户角色启用或禁用特定功能的能力。如果你遇到这种情况：表中一条记录的存在就意味着它对应用程序可用，那么你就属于这种情况。例如，`dbo.Customer`表是使用清单
  13-3 中的 T-SQL 语句创建的。


  ```sql

  CREATE TABLE [dbo].[Customer] (

  [CustomerID]       INT            IDENTITY (1, 1) NOT NULL,

  [FirstName]        VARCHAR (40)                   NOT NULL,

  [LastName]         VARCHAR (100)                  NOT NULL,

  [Address]          VARCHAR (100)                  NOT NULL,

  [City]             VARCHAR (100)                  NOT NULL,

  [PostalCode]       VARCHAR (20)                       NULL,

  [Country]          VARCHAR (75)                   NOT NULL,

  [DateCreated]      DATETIME2 (2)                  NOT NULL

  CONSTRAINT [DF_Customer_DateCreated] DEFAULT (SYSDATETIME()),

  [DateModified]     DATETIME2 (2)     NOT NULL

  CONSTRAINT [DF_Customer_DateModified] DEFAULT (SYSDATETIME()),

  CONSTRAINT PK_Customer PRIMARY KEY CLUSTERED (CustomerID)

  );

  ```

  清单 13-3: 创建 `dbo.Customer` 表


  在表 13-1 中，你可以查看 `dbo.Customer` 表中的记录。


  **表 13-1: 客户表示例数据**


  | CustomerID | FirstName | LastName | DateCreated |

  | --- | --- | --- | --- |

  | 1 | Myra | Acharya | 2022-08-30 |

  | 2 | José | Gomez | 2022-08-30 |

  | 12 | Selena | Tiësto | 2022-08-30 |

  | 27 | Ian | West | 2022-08-30 |

  | 401405 | Marty` | Bethel | 2022-10-02 |


  例如，如果因为一条订单在 `dbo.Customer` 表中，它就会在应用程序中显示，那么在这种情况下，你无法控制应用程序如何与客户订单交互。要防止应用程序使用某个客户订单，你唯一的选择就是删除该客户订单记录。此操作被称为*硬删除*。


  ### 硬删除及其局限性


  你需要从哪些表中删除记录，取决于该删除操作是否会因外键关系而被阻止。在这些场景下，你只有几个可用选项。一个选项是删除外键，然后删除指定的记录。对于此表设计，如果你想从数据库中移除客户
  Ian，你需要删除任何引用 `dbo.CustomerOrder` 表的外键，然后删除记录。清单 13-4 中的查询用于删除外键。


  ```sql

  ALTER TABLE [dbo].[CustomerOrder]

  DROP CONSTRAINT [FK_CustomerOrder_Customer];

  ```

  清单 13-4: 删除外键


  一旦删除了所有引用 `dbo.CustomerOrder` 表的外键，你就需要移除客户记录以确保其不再可用。清单 13-5 展示了删除特定客户的语句。


  ```sql

  DELETE FROM dbo.Customer

  WHERE FirstName = ''Ian'';

  ```

  清单 13-5: 删除客户记录


  生成的表包含如表 13-2 所示的记录。


  **表 13-2: 删除 Ian 后的客户表**


  | CustomerID | FirstName | LastName | DateCreated |

  | --- | --- | --- | --- |

  | 1 | Myra | Acharya | 2022-08-30 |

  | 2 | José | Gomez | 2022-08-30 |

  | 12 | Selena | Tiësto | 2022-08-30 |

  | 401405 | Marty` | Bethel | 2022-10-02 |


  这种方法存在一个显著问题。当你需要决定是否删除表之间的外键关系时，应格外谨慎。这不仅可能对查询性能产生负面影响，还可能影响数据质量。外键是帮助确保表间数据一致性的最后防线之一。


  另一种可能的方法是向存在外键关系的表中插入一条虚拟记录。你可以向 `dbo.Customer` 表添加一个名为 Inactive Deactivated 的客户。可以使用清单
  13-6 中的查询插入此记录。


  ```sql

  SET IDENTITY_INSERT dbo.Customer ON;

  INSERT INTO dbo.Customer

  (

  CustomerID,

  FirstName,

  LastName,

  [Address],

  City,

  PostalCode,

  Country,

  DateCreated,

  DateModified,

  DateDisabled

  )

  VALUES

  (

  0,

  ''Inactive'',

  ''Deactivated'',

  '''',

  '''',

  '''',

  '''',

  GETDATE(),

  GETDATE(),

  NULL

  );

  SET IDENTITY_INSERT dbo.Customer OFF;

  ```

  清单 13-6: 插入一个虚拟客户记录


  将这条虚拟记录插入 `dbo.Customer` 表只是第一步。你需要将 `dbo.CustomerOrder` 表中 Ian 的记录更新为使用 Inactive
  Deactivated 的 `CustomerID`。更新操作如清单 13-7 所示。


  ```sql

  UPDATE dbo.CustomerOrder

  SET CustomerID = 0,

  DateModified = GETDATE()

  WHERE CustomerID = 27;

  ```

  清单 13-7: 在客户订单表中更新非活动客户


  除非你的应用程序已配置为始终忽略该值，否则这可能无法阻止应用程序显示特定值。如果这两种选项都无法使用，还有另一种选择。对于这种表设计，另一个选择是移除与客户 Ian
  关联的所有订单。


  由于这些限制，硬删除的概念可能并不适合你的环境。你还有其他可用选项。你可以设计表结构，使得能够切换客户是否处于活动状态。这使你无需删除数据记录即可启用或禁用功能。


  ### 使用 `IsActive` 标志实现软删除


  要使用此选项，你需要 `dbo.Customer` 表包含一个类似 `IsActive` 的列。要修改清单 13-3 中创建的表，请执行清单 13-8 中的查询。


  ```sql

  ALTER TABLE dbo.Customer

  ADD IsActive BIT

  CONSTRAINT DF_Customer_IsActive DEFAULT ((1)) NOT NULL;

  ```

  清单 13-8: 向 `dbo.Customer` 表添加 `IsActive` 列




  这通常是一个表示真或假的值。对于 `SQL Server`，常用 1 表示真，0 表示假。若将 `IsActive` 设为真并运行筛选 `IsActive` 值为真的结果的查询，你将只获得活跃客户的列表。一旦将
  `IsActive` 列添加到 `dbo.Customer` 表，你就可以修改 `T-SQL` 代码，根据编写方式显示活跃或非活跃客户的订单。


  你可以选择仅根据分配给 `IsActive` 的值来显示结果。当 `IsActive` 值设为 1 时，表示值为真。若只想显示活跃客户，需在 `WHERE` 子句中修改
  `T-SQL` 代码以使用 `IsActive = 1`。这也让你能够实现某些屏幕仅显示活跃客户，而其他屏幕仅显示非活跃或禁用客户的功能。


  除了为用户或角色启用或禁用功能外，有时你可能希望控制应用程序的运行方式。公司通常希望随时间改变其业务运营方式。这通常可以通过在业务所使用的应用程序中添加、更改或移除功能来实现。


  例如，如果一家企业希望扩展到当前市场之外，可能会选择为其现有应用程序添加新功能。添加新功能最简单的方法是增加新的应用程序代码。然而，企业可能会发现这个新市场或新业务线并未如预期运作，公司决定回滚这项新功能。根据代码的编写方式，这可能是一个需要重新编写代码的复杂变更，也可能是一个允许应用程序使用代码不同部分的简单变更。


  根据你的业务环境，你可能会发现通过数据库管理功能变更比通过应用程序代码更容易。当功能需要基于季节性或地区进行变化时，这种可能性更大。这让你能够实施可快速更改的精细控制。你需要仔细考虑管理此功能的最佳位置。我能提供的最佳建议是：当高层管理需要对任何变更进行审批时，将业务逻辑保留在应用程序中。对于那些能够快速变更且监督较少的业务逻辑，最好将其保留在数据库中。


  如果你想从数据库内部管理部分应用程序业务逻辑，则需要创建一个表来管理某些功能是否启用。这个表在概念上类似于第 12 章为功能标志创建的表。如果你想在数据库中管理功能，可能需要创建一个如代码清单
  13-9 所示的表。


  ```sql

  CREATE TABLE dbo.ApplicationRule

  (

  ApplicationRuleID               IDENTITY(1,1) INT      NOT NULL,

  ApplicationRuleDescription      VARCHAR(50)            NOT NULL,

  IsActive                        BIT                    NOT NULL,

  DateCreated                     DATETIME               NOT NULL,

  DateModified                    DATETIME                   NULL,

  CONSTRAINT PK_ApplicationRule_ApplicationRuleID

  PRIMARY KEY CLUSTERED (ApplicationRuleID)

  );

  ```

  代码清单 13-9

  创建应用规则表


  如果你是为一个单一、集中的应用程序创建规则，这个表设计将满足你的需求。如果你在管理多个应用程序，请考虑应用程序如何使用这些规则。如果大多数或所有规则对于每个应用程序都是唯一的，你可能需要为此表添加一列来指明受影响的应用程序。


  可能存在业务原因，使你希望切换应用程序以仅显示活跃客户或显示所有客户。如果应用程序需要显示所有客户或仅活跃客户存在合理的业务理由，就可能发生这种情况。此规则的值可以存储在表
  13-3 中。


  表 13-3


  应用规则表


  | Application RuleID | ApplicationRule Description | IsActive | DateCreated | DateModifed
  |

  | --- | --- | --- | --- | --- |

  | 1 | 仅显示活跃客户 | 1 | 2023-04-12 | 2023-04-12 |


  此表中的条目表示，启用此应用规则时将仅显示活跃客户。若希望同一应用程序显示所有客户，你需要将 `IsActive` 值更新为假。虽然你可以更新所有数据库代码和存储过程，以根据此应用规则的启用状态使用
  `IF... THEN` 语句，但我建议在应用程序内部处理此功能。


  这正是将代码开发得足够灵活变得重要的地方。尽管本书的主题不是应用程序代码开发，但你将需要一个能与你的应用程序代码协作来处理这些场景的数据库。从概念上讲，这可以与第
  12 章讨论的功能标志类似地工作。你可以创建一个表来存储对特定功能的引用。在某些环境中，这可能被称为应用规则。




