  \ `SQL Server 2017` 开始使用这些函数可能是有益的。\n\n\n\n## 其他用户定义对象\n\n处理复杂数据并将数据分解为易于管理和分析的部分有许多方法。在某些情况下，数据可以保存到临时表或表变量中。然而，根据您的需求，还有其他可用选项。SQL\
  \ Server 2016 引入了外部表的概念。这是一个特性，外部数据源（即不在当前 SQL Server 实例内的数据）可以在 SQL Server 内被视为表来处理。在\
  \ SQL Server 2022 中，此特性已扩展到包括与 S3 兼容的对象存储作为外部数据源。这将允许您将 CSV 或 Parquet 等数据文件作为 SQL\
  \ Server 内的表来使用。要添加外部数据源，您需要为数据库创建主密钥。要创建外部数据源，请使用共享访问签名 (SAS) 身份验证以及关联存储帐户的 SAS\
  \ 令牌。然后，您将能够创建指向与 S3 兼容的对象存储、通用 ODBC 连接、Oracle、Teradata 以及 SQL Server 支持的其他选项的外部数据表。SQL\
  \ Server 中的另一个选项是使用表值参数。这提供了类似于临时表的性能，但其工作方式也类似于表变量。还有一种方法是创建一个临时结果集，供批处理中的下一条语句使用。\n\
  \n### 用户定义的表类型\n\n在使用数据库和存储过程时，您可能会发现需要将多个值（对应一个或多个字段）作为参数传递给存储过程。有一种选项是创建用户定义的表类型，它允许您指定多个列和数据类型。用户定义的表类型可用于传入包含多行的单个列。例如，您可以允许用户选择一周中的多天，并将这些值保存到一个表类型中。当参数传递给存储过程时，它可以用于与其他表进行连接，从而允许您基于多个值一次性过滤查询。\n\
  \n创建用户定义的表类型的一个优点是，这个表类型可以被重用。例如，您可以使用三个独立的用户定义表，分别用于 `INT`、`DATE` 和 `VARCHAR(30)`\
  \ 数据类型。然后，这些请求可以放入正确的用户定义表类型中，并发送到相应的存储过程。您可以添加代码来验证用户定义的表类型中是否有任何数据。您可以使存储过程计算行数。如果计数为零，则忽略它。否则，您可以从用户定义的表类型中选择该列。您可以在清单\
  \ 2-23 中找到创建用户定义的表类型的示例。\n\n```sql\nCREATE TYPE dbo.CustomerOrderNumber AS TABLE\n\
  (\nCustomerOrderID INT,\nOrderNumber     VARCHAR(15)\n);\n```\n\n*清单 2-23*\n*创建用户定义的表类型*\n\
  \n一旦创建了用户定义的表类型，它就可以用作存储过程的参数，或者用于变量声明。用户定义的表类型带来的可重用性和一致性是有代价的。由于存储过程现在使用单个参数来表示存储在此对象中的所有列和行，因此很难确定存储过程中的哪些参数代表单个值，哪些参数代表用户定义的表类型。这个对象可以使代码更易于阅读；但也可能使未来的性能问题排查变得更加困难。\n\
  \n### 表值参数\n\n很高比例的存储过程可用于向表中插入、更新或删除数据。在某些情况下，应用程序可能需要将表中每个列的一个参数发送到各个存储过程。虽然每个字段使用一个参数简单明了且易于调试，但有些人认为在一个参数中发送多个字段更清晰、更简单。我理解想要简化代码的想法，但我也相信过度简化会使未来的代码故障排除变得困难。\n\
  \n但是，您可能希望在存储过程或其他代码中使用数组类型的格式。在这种情况下，使用这些数据来执行基于集合的操作是有益的。这样做时，您必须记住，作为参数传入的用户定义的表类型不能被修改。传入此参数时，传递的数据可以像临时表一样对待，并用于与基表连接并进行任何必要的修改。\n\
  \n由于 SQL Server 的设计是为了在基于集合的操作中获得最佳性能，您可能会达到希望利用 SQL Server 固有的、最擅长处理集合的能力的阶段。如果您想将表传递给存储过程并在同一存储过程内部关系型地使用该表，您可能需要考虑使用表值参数。\n\
  \n由于表值参数本质上是一个变量，SQL Server 不一定会根据实际估计行数来优化执行计划。如果您发现自己处于这种情况，您可能需要从参数中获取值，并将它们保存到存储过程内的表变量中。我建议不要仅仅为了提高代码的可读性而使用表值参数。清单\
  \ 2-24 展示了在存储过程中使用表值参数的示例。\n\n```sql\nCREATE PROCEDURE dbo.UpdateCustomerOrderNumber\n\
  @CustomerOrder CustomerOrderNumber READONLY\nAS\nSET NOCOUNT ON;\nUPDATE co\nSET\
  \ OrderNumber = fco.OrderNumber,\nDateModified = GETDATE()\nFROM dbo.CustomerOrder\
  \ co\nINNER JOIN @CustomerOrder fco\nON co.CustomerOrderID = fco.CustomerOrderID;\n\
  ```\n\n*清单 2-24*\n*使用表值参数*\n\n清单 2-24 中的表值参数使用了清单 2-23 中创建的用户定义的表类型。当您想要使用表值参数执行存储过程时，可以运行清单\
  \ 2-25 中的代码。\n\n```sql\nDECLARE @CustomerOrder AS CustomerOrderNumber;\nINSERT INTO\
  \ @CustomerOrder (CustomerOrderID, OrderNumber)\nVALUES\n(802818, 'AZ-72834'),\n\
  (802819, 'AZ-98341');\nEXECUTE dbo.UpdateCustomerOrderNumber @CustomerOrder;\n```\n\
  \n*清单 2-25*\n*执行带表值参数的存储过程*\n\n此代码的执行计划如图 2-15 所示。请注意表值参数上的表扫描。\n\n![](img/480547_2_En_2_Fig15_HTML.jpg)\n\
  \n*一个流程图。T S Q L 的成本为 0%，来自聚簇索引更新。它源自计算标量，而计算标量又源自排序、嵌套循环，然后是表扫描和聚簇索引查找。*\n\n*图\
  \ 2-15*\n*带表值参数的存储过程的执行计划*\n\n如果您保留了清单 2-12 中创建的索引视图，返回的执行计划会变得更加复杂。图 2-16 显示了如果索引视图仍然存在时产生的执行计划。\n\
  \n![](img/480547_2_En_2_Fig16_HTML.jpg)\n\n*一个流程图。T S Q L 的成本为 0%，源自序列。它源自聚簇索引更新和表假脱机。它们分别源自拆分和折叠。*\n\
  \n*图 2-16*\n*带索引视图的表值参数的执行计划*\n\n虽然表值参数可以简化您的代码，但请记住可能存在隐藏的性能影响。在开发新代码时，最佳实践之一是检查执行计划，并确认\
  \ SQL Server 正以符合数据形状的方式处理代码。\n\n\n\n### 公共表表达式\n\n虽然不是用户定义的数据库对象，但我将公共表表达式包含在本节中，因为它们常用于与临时表、表变量和表值参数相似的场景。公共表表达式是一个\
  \ SQL 语句产生的临时结果集，其存在时间仅够用于紧随其创建之后的 `SELECT`、`INSERT`、`UPDATE` 或 `DELETE` 语句。它们的目的是帮助分解复杂逻辑，或获取一个数据子集以供稍后在\
  \ T-SQL 代码、批处理或存储过程中使用。\n\n使用基本公共表表达式的主要原因是提高代码的整体可读性。代码清单 2-26 展示了一个使用与代码清单 2-2\
  \ 中创建的视图相同逻辑的公共表表达式。期望是当执行此代码时，其性能将与之前创建的视图相同。\n\n```sql\nDECLARE @CustomerID INT\
  \ = 234;\nWITH cte_orderavg AS\n(\nSELECT ord.CustomerOrderID,\nAVG(dtl.QuantitySold\
  \ * dtl.ProductPrice)\nAS OrderAverage\nFROM dbo.CustomerOrder ord\nINNER JOIN dbo.OrderDetail\
  \ dtl\nON ord.CustomerOrderID = dtl.CustomerOrderID\nWHERE ord.CustomerID = @CustomerID\n\
  GROUP BY ord.CustomerOrderID\n)\nSELECT cag.CustomerOrderID, cag.OrderAverage\n\
  FROM cte_orderavg cag;\n```\n*代码清单 2-26*\n创建基本的公共表表达式\n\n在图 2-17 中，你可以确认代码清单 2-26\
  \ 生成的执行计划与图 2-6 中的执行计划匹配。如果你还记得，图 2-8 中的执行计划是由代码清单 2-20 创建的视图生成的。\n\n![](img/480547_2_En_2_Fig17_HTML.jpg)\n\
  \n*一个流程图。Select 从一个序列中的开销为 0%。它来源于计算标量、流聚合、计算标量和嵌套循环。其数据源为索引扫描和聚集索引查找。*\n\n*图 2-17*\n\
  基本公共表表达式的执行计划\n\n当你使用公共表表达式时，你也可以像连接视图或临时表一样，将公共表表达式 (`CTE`) 与其他表连接。你还可以使用 `CTE`\
  \ 不仅进行 `SELECT`，还能基于 `CTE` 进行 `INSERT`、`UPDATE` 和 `DELETE` 数据操作。代码清单 2-27 展示了一个使用公共表表达式的更复杂逻辑的查询。\n\
  \n```sql\nDECLARE @CustomerID INT = 234;\nWITH cte_orderavg AS\n(\nSELECT ord.CustomerOrderID,\n\
  AVG(dtl.QuantitySold * dtl.ProductPrice)\nAS OrderAverage\nFROM dbo.CustomerOrder\
  \ ord\nINNER JOIN dbo.OrderDetail dtl\nON ord.CustomerOrderID = dtl.CustomerOrderID\n\
  WHERE ord.CustomerID = @CustomerID\nGROUP BY ord.CustomerOrderID\n)\nSELECT cus.FirstName,\
  \ cus.LastName, cag.OrderAverage\nFROM   dbo.Customer cus\nINNER JOIN dbo.CustomerOrder\
  \ ord\nON cus.CustomerID = ord.CustomerID\nINNER JOIN dbo.OrderDetail dtl\nON ord.CustomerOrderID\
  \ = dtl.CustomerOrderID\nINNER JOIN cte_orderavg cag\nON ord.CustomerOrderID = cag.CustomerOrderID;\n\
  ```\n*代码清单 2-27*\n在公共表表达式中使用连接\n\n关于公共表表达式，还有一项最终功能使其具有独特性。你可以创建递归公共表表达式。在这种情况下，一个\
  \ `CTE` 将引用自身以帮助生成层次结构数据。虽然很诱人，想让递归 `CTE` 来解决许多不同的问题，但我建议在实现递归 `CTE` 时要谨慎。它们在需要时可能是正确的工具，但也可能带来重大的性能挑战。代码清单\
  \ 2-28 是创建一个递归 `CTE` 来查找作为其他产品组件的产品的示例。\n\n```sql\nWITH cte_product (ProductID,\
  \ ProductName, ProductPrice, ProductComponentLevel) AS\n(\nSELECT prd.ProductID,\
  \ prd.ProductName, prd.ProductPrice, 1 AS ProductComponentLevel\nFROM dbo.Product\
  \ prd\nLEFT JOIN dbo.ProductComponent cmp\nON prd.ProductID = cmp.ProductID\nWHERE\
  \ cmp.ProductComponentID IS NULL\nUNION ALL\nSELECT prd.ProductID, prd.ProductName,\
  \ prd.ProductPrice,\n(cpd.ProductComponentLevel + 1) AS ProductComponentLevel\n\
  FROM cte_product cpd  --引用上面创建的 cte\nINNER JOIN dbo.ProductComponent cmp\nON cpd.ProductID\
  \ = cmp.ProductComponentID\nINNER JOIN dbo.Product prd\nON cmp.ProductID = prd.ProductID\n\
  )\nSELECT ProductID, ProductName, ProductPrice, ProductComponentLevel\nFROM cte_product;\n\
  ```\n*代码清单 2-28*\n用于查找所有产品及其组件的递归 CTE\n\n如你在图 2-18 中看到的部分执行计划，`SQL Server` 执行此查询所需的步骤变得相当复杂。\n\
  \n![](img/480547_2_En_2_Fig18_HTML.jpg)\n\n*一个流程图。Select 从一个索引假脱机中的开销为 0%。它来源于连接（开销来自计算标量）、断言（开销）等。最终以聚集索引扫描和聚集索引查找结束。*\n\
  \n*图 2-18*\n递归 CTE 的部分执行计划\n\n我发现极少有情况是绝对需要使用递归 `CTE` 的。然而，当我确实需要使用公共表表达式时，我发现它们非常有帮助。\n\
  \n## 临时对象\n\n你可能会发现自己处于需要创建对象但只使用很短时间的场景。有时创建这些对象是为了在处理复杂逻辑时能够操作数据子集。其他时候，将部分代码分离出来创建一个临时对象，可以提高可读性或使其他人更容易理解你在做什么。无论哪种情况，都可以在\
  \ `SQL Server` 中创建临时对象。\n\n### 临时表\n\n临时表正如其名。它们具有与表相同的形态，包含列、数据类型并存储数据。主要区别在于临时表不会在数据库中持久存在。你对临时表的用途以及需要它们持续多久，将决定你最终创建哪种类型的临时表。本节将介绍局部临时表、全局临时表和持久临时表。大多数临时表被创建为局部临时表，这些表只能通过创建它们的连接访问。全局临时表类似于局部临时表，但对所有连接可用。然而，如果\
  \ `SQL Server` 重新启动，这两种临时表都会被删除。持久临时表是在 `tempdb` 数据库内创建的标准表。\n\n使用临时表还有其他优势。包括能够使用主键和索引来提高性能。还可以在临时表上创建统计信息，进一步提高其性能。需要考虑的一点是，如果在临时表首次创建后又进行了额外的修改，统计信息可能不会自动更新。\n\
  \n\n\n#### 本地临时表\n\n如果你发现自己需要将数据暂存以进行额外的分析或处理，那么可以考虑使用**本地临时表**。这类临时表在存储过程内部也很有用。本地临时表仅在它们被创建时所在的同一会话或连接内可用。一旦会话关闭或连接终止，你将无法访问该本地临时表。\n\
  \n虽然本地临时表可用于许多不同的场景，但通常建议，在需要临时存储数据时，不要首选使用临时表。本地临时表本身并无问题，但你会发现其他对象在临时存储数据时，可能带来更小的潜在性能影响。与所有涉及\
  \ SQL Server 的事情一样，最佳实践是在将 T-SQL 代码部署到生产环境之前，实现解决方案并对其进行测试，包括负载测试。\n\n创建临时表很容易。虽然你可以使用\
  \ `SELECT` 语句并通过代码 `SELECT <column list> INTO #<temp table name>...` 来创建临时表，但最佳实践是先用定义好的数据类型创建临时表，然后再插入记录。清单\
  \ 2-29 展示了生成本地临时表的代码。为便于比较，用于填充此表的代码与清单 2-2 中使用的代码相同。\n\n```sql\nCREATE TABLE #TempOrderAverage\n\
  (\nCustomerID      INT,\nCustomerOrderID INT,\nOrderAverage    DECIMAL(6,2)\n);\n\
  Listing 2-29\n创建临时表\n```\n\n临时表创建后，运行清单 2-30 中的查询来填充表中的数据。\n\n```sql\nDECLARE @CustomerID\
  \ INT = 234;\nINSERT INTO #TempOrder\n(\nCustomerID,\nCustomerOrderID,\nOrderAverage\n\
  )\nSELECT ord.CustomerID,\nord.CustomerOrderID,\nAVG(dtl.QuantitySold * dtl.ProductPrice)\
  \ AS OrderAverage\nFROM dbo.CustomerOrder ord\nINNER JOIN dbo.OrderDetail dtl\n\
  ON ord.CustomerOrderID = dtl.CustomerOrderID\nWHERE ord.CustomerID = @CustomerID\n\
  GROUP BY ord.CustomerID,\nord.CustomerOrderID;\nListing 2-30\n填充临时表\n```\n\n当我运行填充临时表的过程时，我也获取了该过程的执行计划。在图\
  \ 2-19 中，你会发现该执行计划看起来与为视图和公用表表达式生成的计划类似。虽然形状相似，但正在发生的一些活动以及百分比分布是不同的。\n\n![](img/480547_2_En_2_Fig19_HTML.jpg)\n\
  \n图 2-19\n创建临时表的执行计划\n\n既然你已经了解了创建临时表的执行计划，那么当你从临时表中查询数据后，执行计划又是怎样的呢？清单 2-31 展示了如何查询现有的临时表。\n\
  \n```sql\nSELECT cus.FirstName, cus.LastName, AVG(OrderAverage) AS AverageOrder\n\
  FROM dbo.Customer cus\nINNER JOIN #TempOrder ord\nON cus.CustomerID = ord.CustomerID\n\
  GROUP BY cus.FirstName, cus.LastName;\nListing 2-31\n查询临时表\n```\n\n到目前为止，你已经确定了查询的大部分工作发生的时间点：与最初选择数据的时间相同。在这种情况下，插入和选择操作被分成了两个独立的步骤。图\
  \ 2-20 是查询临时表中的数据时生成的执行计划。\n\n![](img/480547_2_En_2_Fig20_HTML.jpg)\n\n图 2-20\n\
  查询临时表\n\n虽然此查询使用了 `Table Scan`（表扫描），但可以向临时表添加索引。\n\n#### 全局临时表\n\n你可能发现自己想要创建一个临时表，它不仅对创建它的连接可用，也对其他连接可用。也许你想要一个可以被多个用户访问的临时表。在这种情况下，你可能需要创建一个**全局临时表**。这种全局临时表在原始会话结束后仍然可以存在，但前提是所有其他使用该全局临时表的任务都已完成。\n\
  \n创建全局临时表很简单。如果你想重新创建清单 2-26 中的临时表，但要确保该表是全局的，可以运行清单 2-32 中的代码来创建全局临时表。\n\n```sql\n\
  -- 使用 ## 使其成为全局临时表\nCREATE TABLE ##TempOrder\n(\nCustomerID      INT,\nCustomerOrderID\
  \ INT,\nOrderAverage    DECIMAL(6,2)\n);\nListing 2-32\n创建全局临时表\n```\n\n创建本地临时表和全局临时表之间的唯一区别在于创建时使用的表名。比较清单\
  \ 2-30（本地临时表）和清单 2-32（全局临时表）的代码，你可以确认表名的差异。在清单 2-30 中，表名是 `#TempOrder`，而在清单 2-32\
  \ 中，临时表名是 `##TempOrder`。在表名开头添加第二个 `#` 字符表明该临时表是一个全局临时表。此外，全局临时表的操作方式与本地临时表类似。关键区别在于，全局临时表可以在创建它的特定连接之外被访问。\n\
  \n\n\n##### 持久临时表\n\n在使用临时表时，您可能希望创建一个能超出创建它的会话生命周期而持续存在的表。需要考虑的一点是，如果您计划创建一个存在于\
  \ `tempdb` 中的临时表，那么当 SQL Server 重启时，该表及其数据将不会被保存。为了确保持久临时表保留在 `tempdb` 中，您需要使用下文展示的技术。您可以使用与在用户数据库中创建表类似的\
  \ T-SQL 语法来创建持久临时表。此数据库代码的示例见清单 2-33。\n\n```\nUSE tempdb;\nGO\nCREATE TABLE TempOrder\n\
  (\nCustomerID      INT,\nCustomerOrderID INT,\nOrderAverage    DECIMAL(6,2)\n);\n\
  Listing 2-33\n创建一个持久临时表\n```\n\n您可以使用清单 2-33 中的 T-SQL 代码来创建持久表，但我推荐一种更符合 `tempdb`\
  \ 使用方式的方法。相反，您可以创建一个在 SQL Server 启动时执行的存储过程。然后，此存储过程会创建您可能需要的任何全局临时表。您可以使用清单 2-34\
  \ 中的 T-SQL 来创建一个用于创建全局临时表的存储过程。\n\n```\nUSE tempdb;\nGO\nCREATE PROCEDURE dbo.CreateGlobalTempOrder\n\
  AS\nCREATE TABLE TempOrder\n(\nCustomerID      INT,\nCustomerOrderID INT,\nOrderAverage\
  \    DECIMAL(6,2)\n);\nListing 2-34\n创建用于重建持久临时表的存储过程\n```\n\n一旦创建了清单 2-34 中的存储过程，您需要修改该存储过程选项，以便其在\
  \ SQL Server 重启时执行。清单 2-35 中的 T-SQL 允许您将存储过程修改为在启动时执行。\n\n```\nEXECUTE sp_procoption\
  \ 'CreateGlobalTempOrder', 'startup', 'true';\nListing 2-35\n更新存储过程以在启动时执行\n```\n\
  \n如果您发现自己处于考虑使用持久临时表的情况，请考虑您的环境以及由此可能增加的维护和知识共享方面的困难，以便每个人都意识到一个关键任务表可能存在于 `tempdb`\
  \ 数据库中。\n\n### 表变量\n\n有些情况下，您希望在本地存储数据，但您知道要存储的记录数量是有限的。如果您不需要数据对其他连接可用，并且只希望数据在批处理内持久存在是可以接受的，那么您可能想尝试使用表变量。在使用表变量时，如果您愿意将所有操作保持在同一个批处理中，您还可以选择按需多次复用该表变量。\n\
  \n在 SQL Server 2019 之前，表变量的估计行数是 1 行。与本章前面讨论的其他对象类似，SQL Server 在改进表变量相关的一般性能方面取得了显著进步。SQL\
  \ Server 现在能够在使用表变量时生成更准确的估计行数。执行查询的一部分工作涉及 SQL Server 决定如何执行该查询。SQL Server 将执行查询的方法保存在一个称为执行计划的结构中。既然\
  \ SQL Server 现在能更准确地估计行数，它也将此逻辑保存在了执行计划中。\n\n执行计划最初创建时，是根据参数中提供的原始值计算的。然而，有些数据表的记录数按值分布可能不均匀。如果您遇到这种情况，即通过表变量拉回的数据可能高度偏斜，您可能会发现\
  \ T-SQL 代码的性能表现不一致。这个概念被称为*参数嗅探*。既然表变量的信息现在被存储在执行计划中，遇到参数嗅探的概率就更高了。虽然这可能带来麻烦，但请记住，SQL\
  \ Server 生成的执行计划对于至少某些数据值来说也可能是非常高效的。\n\n和临时表一样，表变量的创建和使用也可以很直接。清单 2-36 展示了声明和填充表变量的方法。\n\
  \n```\nDECLARE @CustomerID INT = 234;\nDECLARE @TempOrder TABLE\n(\nCustomerID \
  \     INT,\nCustomerOrderID INT,\nOrderAverage    DECIMAL(6,2)\n);\nINSERT INTO\
  \ @TempOrder\n(\nCustomerID,\nCustomerOrderID,\nOrderAverage\n)\nSELECT ord.CustomerID,\n\
  ord.CustomerOrderID,\nAVG(dtl.QuantitySold * dtl.ProductPrice)\nAS OrderAverage\n\
  FROM dbo.CustomerOrder ord\nINNER JOIN dbo.OrderDetail dtl\nON ord.CustomerOrderID\
  \ = dtl.CustomerOrderID\nWHERE ord.CustomerID = @CustomerID\nGROUP BY ord.CustomerID,\n\
  ord.CustomerOrderID;\nSELECT cus.FirstName,\ncus.LastName,\nAVG(OrderAverage) AS\
  \ AverageOrder\nFROM dbo.Customer cus\nINNER JOIN @TempOrder ord\nON cus.CustomerID\
  \ = ord.CustomerID\nGROUP BY cus.FirstName, cus.LastName;\nListing 2-36\n声明并填充表变量\n\
  ```\n\n此查询的执行计划看起来与填充本地临时表时在图 2-18 中生成的计划非常相似。图 2-21 显示了填充表变量时创建的执行计划。\n\n![](img/480547_2_En_2_Fig21_HTML.jpg)\n\
  \n一个流程图。T-SQL 的成本为 0%，包含表插入、两次计算标量、流聚合、计算标量和嵌套循环。它来源于索引扫描和聚集索引查找。\n\n图 2-21\n\n\
  填充表变量\n\n既然 SQL Server 2019 已更新，允许在使用表变量时获得更好的估计，我预计执行计划在创建时会对表变量中的行数获得更准确的数字。这种改进的准确性将有助于\
  \ SQL Server 创建性能更高的执行计划。但是，如果您计划向表变量中添加大量数据，请务必仔细检查查询性能。\n\n### 临时存储过程\n\n如果在 `tempdb`\
  \ 数据库中创建了存储过程，则该存储过程就是临时存储过程。SQL Server 可能实现了此功能，但请考虑开发人员和应用程序将如何与此数据库对象交互。至少，在\
  \ `tempdb` 数据库中存在临时存储过程会使与这些存储过程相关的代码更难以故障排除或维护。\n\n## 触发器\n\nSQL Server 提供了在发生插入、更新或删除操作时（或代替这些操作）执行特定操作的能力。这些响应可以因用户登录系统而触发。还有其他响应可以在现有数据库发生更改之后或之前发生，以防止更改。在处理应用程序和数据时，最常见的响应类型是针对数据库中数据更改的响应。无论出于何种原因，这些响应都被定义为触发器。触发器是一种特殊类型的存储过程，用于响应服务器、数据库或表上的特定操作。\n\
  \n\n### 登录触发器\n\n当用户登录到服务器时，你可能希望记录该特定活动。在其他情况下，你可能希望在用户登录时限制其活动，或因为服务器登录而实现额外的安全功能。登录触发器使你能够让\
  \ SQL Server 针对服务器上的部分或所有登录操作做出反应。\n\n在应用程序开发中，需要使用登录触发器的场景并不多。然而，有一些事情可以通过登录触发器来完成，它们有助于保护或监控与应用程序的连接。例如，使用登录触发器来存储登录活动信息，包括**谁**在**何时**连接到了数据库。登录触发器可以限制某个登录所允许的连接数，或完全阻止用户连接到服务器。在发生安全漏洞的情况下，这可以确保数据库不会被过多的连接淹没。反过来，限制每个登录所允许的连接数量也可能限制系统的可扩展性和面向未来的能力。今天可接受的连接数可能远低于未来所需的登录数。\n\
  \n### 数据定义语言触发器\n\n当应用程序或用户更改整个数据库架构时，他们会使用数据定义语言。对于 SQL Server，可以对因数据库更改而导致的特定情况做出反应。虽然我不认为这是应用程序开发的标准部分，但了解这类触发器可能会有所帮助。DDL\
  \ 触发器可以配置为响应各种 `CREATE`、`ALTER`、`DROP`、`GRANT`、`DENY`、`REVOKE` 和 `UPDATE STATISTICS`\
  \ 语句。\n\n如果你担心 SQL 注入对你的服务器造成问题，DDL 触发器可以帮助减轻损害。通过设置选项可以防止或控制对数据库对象的所有类型的更改，包括创建、修改或删除各种对象。你还可以使用\
  \ DDL 触发器来执行诸如在用户尝试修改数据库对象时生成错误等操作。此外，还可以记录或记录数据库对象被创建或修改的时间。虽然你可能希望通过设置各种触发器来监控服务器和数据库上的每个活动，但可能存在更好的可用选项。有其他替代方案可用于跟踪此类行为，包括用于服务器和数据库活动的\
  \ SQL Server 审计。通常，应用程序并不关心对服务器或数据库架构更改的记录。\n\n### 数据 manipulation 语言触发器\n\n如果你发现自己需要在应用程序开发中实现审计或日志记录，你可能会发现使用数据操作语言触发器非常有帮助。这些触发器可以在\
  \ `INSERT`、`UPDATE` 或 `DELETE` 语句完成后执行，或者完全替代 SQL 语句执行。在某些情况下，你可能只想记录更改发生的时间和更改了什么。在其他情况下，更改或验证请求的功能可能更为重要。\n\
  \n触发器的一种方法是在某事发生后执行一个动作。假设你想成功修改 `dbo.Product` 表中的一条记录，但你也想保留该物品成本随时间变化的历史记录。清单\
  \ 2-37 展示了一些 T-SQL 代码，它将在更改发生后向历史表中添加一条记录。\n\n```sql\nCREATE TRIGGER dbo.LogProductPriceHistory\n\
  ON dbo.Product\nAFTER INSERT, DELETE\nAS\nIF (ROWCOUNT_BIG() = 0)\nRETURN;\nINSERT\
  \ INTO dbo.ProductPriceHistory\n(\nProductID,\nProductPrice,\nUserName,\nDateCreated\n\
  )\nSELECT\nProductID,\nProductPrice,\nSYSTEM_USER,\nSYSDATETIME()\nFROM inserted;\n\
  ```\n清单 2-37\n创建后插入或删除的 DML 触发器\n\n当 `dbo.Product` 表中的记录被插入或删除时，新的产品价格和价格更改的日期将被记录在\
  \ `dbo.ProductPriceHistory` 表中。为了确定此触发器的性能，请通过运行清单 2-38 中的代码来测试此触发器。\n\n```sql\n\
  INSERT INTO dbo.Product (ProductName, ProductPrice)\nVALUES ('Disk Golf Disk - Small',\
  \ 7.99);\n```\n清单 2-38\n向 Product 表插入记录的查询\n\n执行上述代码时，执行计划包括两个步骤。第一步是运行代码将记录插入 `dbo.Product`\
  \ 表。第二个执行计划显示了因触发器而发生的插入操作的计划。清单 2-38 生成的执行计划如图 2-22 所示。\n\n![](img/480547_2_En_2_Fig22_HTML.jpg)\n\
  \n流程图。在查询 1 中，T-SQL 的成本为 0%，包含聚集索引插入、两次计算标量和常量扫描。查询 2 包含插入的扫描，而不是常量扫描。查询 1 百分比 =\
  \ 43，查询 2 百分比 = 57。\n\n图 2-22\n使用触发器插入记录的执行计划\n\n图 2-22 中的执行计划显示了当记录以触发触发器的方式被修改时发生的情况。然而，清单\
  \ 2-35 中的 T-SQL 代码 `IF (ROWCOUNT_BIG() = 0) RETURN;` 会阻止 DML 触发器在没有记录被更新时触发。这被认为是一种最佳实践，可以在无需任何操作时最小化服务器上的资源利用。清单\
  \ 2-39 展示了一个不会更新任何记录的更新查询。\n\n```sql\nDELETE FROM dbo.Product\nWHERE ProductID =\
  \ 500;\n```\n清单 2-39\n不会更新任何记录的 DELETE 语句\n\n如图 2-23 所示，执行计划只有一个步骤。那就是删除数据的执行计划。没有来自触发器的\
  \ T-SQL 代码执行。\n\n![](img/480547_2_En_2_Fig23_HTML.jpg)\n\n流程图。删除 product where product\
  \ ID = at 1。它们源自聚集索引删除和聚集索引扫描。查询 1 百分比 = 100。\n\n图 2-23\n没有记录被更新时的执行计划\n\nSQL Server\
  \ 知道触发器没有返回需要更新的记录。它没有尝试向 `dbo.ProductPriceHistory` 表插入任何记录，唯一的操作是生成删除操作的执行计划。\n\
  \n\n在活动之后执行触发器并不是数据操作触发器（trigger）的唯一选项。另一种可能是让触发器执行一个动作，而不是执行最初请求的操作。清单 2-40 展示了一个触发器，当用户发出删除（DELETE）请求时，该触发器将禁用一条记录。\n\
  \n```sql\nCREATE TRIGGER dbo.DisableProduct\nON dbo.Product\nINSTEAD OF DELETE\n\
  AS\nUPDATE prd\nSET IsActive = 0,\nDateDisabled = GETDATE()\nFROM dbo.Product prd\n\
  INNER JOIN deleted del\nON prd.ProductID = del.ProductID;\nListing 2-40\nINSTEAD\
  \ OF 触发器示例\n```\n\n在 `SQL Server` 中使用 `DML` 触发器时，不止有一种选择。还可以为每个数据库对象设置多个触发器。对于每个\
  \ `INSERT`、`UPDATE` 和 `DELETE` 操作，你最多可以拥有一个 `INSTEAD OF` 触发器。在同一个表或视图上，你也可以拥有多个\
  \ `AFTER` 触发器。由于允许的触发器数量众多，你还可以为每个 `INSERT`、`UPDATE` 或 `DELETE` 操作指定哪个触发器应该最先运行，哪个应该最后运行。如果你对一个操作类型拥有多个\
  \ `AFTER` 触发器，那么这些触发器中的任何一个都可能以随机顺序运行。\n\n由于一个给定的数据库对象上可能存在多层触发器，测试这些触发器的功能就显得很重要。如同本章讨论的许多其他概念一样，了解触发器在负载下的表现有助于预判应用程序的性能。值得一提的是，触发器应谨慎使用。它们应该像我的示例那样简短。你不应该开始编写包含\
  \ 3 个游标的、长达 2000 行的触发器。\n\n#### 游标\n\n为了有效地使用关系数据库，通常至关重要的一点是以大块或集合的形式来思考流程和数据。在几乎所有场景中，目标都是编写能够利用这种基于集合（set-based）逻辑的\
  \ `T-SQL`。\n\n虽然这是理想的方法，但你可能会遇到一种情况，觉得无法以大块的方式处理数据。在其中一些场景中，这可能意味着需要按行逐个处理数据。为了在\
  \ `SQL Server` 中做到这一点，你需要使用游标（cursor）。游标是一种对象，它接收一个查询，并允许你循环遍历结果数据集的每一行。\n\n如果考虑采用这条路，必须承认\
  \ `SQL Server` 在处理一大块数据时性能最佳，而一次处理大量单个记录则不然。在遇到诱人的、需要处理逐行逻辑的场景时，也许是时候寻找另一个工具来更好地满足你的需求了。例如，当创建一个游标来依次连接到多个\
  \ `SQL Server` 实例并执行任务时。虽然这超出了本书的范围，但解决这种特定情况的最佳方式可能是创建一个 `SQL Server` Integration\
  \ Services (`SSIS`) 包来处理连接到各种 `SQL Server` 实例。\n\n还有其他时候，你可能需要使用 `T-SQL` 来生成一个结果集，其中返回的数据是相同的，但必须按位置或供应商信息进行分段。在这个例子中，可以使用\
  \ `SQL Server` Reporting Services (`SSRS`) 来达到相同的目标。然而，你的企业可能决定不使用 `SSRS`。因此，使用游标可能是正确的选择。我也遇到过需要使用特定的、按记录计算的值通过计算来更新数据的情况。在这种情况下，几乎不可能使用基于集合的逻辑来执行更新。\n\
  \n虽然 `SQL Server` 可以处理这个任务，但最好由应用程序来处理这些变更。编写 `T-SQL` 的一个主要因素是意识到你的代码可能对 `SQL Server`\
  \ 产生的影响。这对于游标和触发器同样适用。触发器似乎是解决各种问题的快速方法，但触发器也会给服务器带来开销。想象一下，`SQL Server` 必须评估插入表中的每一条记录，以确定它是否符合触发器的条件，如果符合，那么\
  \ `SQL Server` 还必须执行另一个操作。这对 `SQL Server` 来说是相当多的额外工作。\n\n游标可以帮助创建一个可重复的、一次处理一条记录的过程。虽然游标可以用来解决各种问题，但重要的是要记住，可能有其他方法可以在不使用游标的情况下实现相同的结果。如果你确定真的必须使用游标，下一步就是决定使用哪种类型的游标。虽然无论使用哪种类型，游标的概念是相同的，但游标的类型将决定游标内数据的功能性和可访问性。\n\
  \n在为你的需求选择正确的游标类型时，请选择功能最少但能满足你需求的那一种。与功能更多的游标类型相比，这将有助于减少性能的负面影响。当你在 `SQL Server`\
  \ 中一次处理一条记录时，其性能几乎总是比以组为单位处理数据要差。\n\n游标选择一个数据集，一次提取一条记录，然后修改当前记录。一旦所需的操作完成，就可以提取下一条记录。了解可用的各种游标类型将使你能够选择正确的类型。\n\
  \n\n\n### 只进游标\n\n默认的游标类型称为只进游标。对于这种类型的游标，数据只能以单一方向获取。可以在只进游标中对获取的记录执行插入、更新和删除操作。如果记录之前已被更新过，则除非关闭并重新打开游标，否则不会再次获取该记录。也存在一些有限的情况，在记录被更新后，你仍可以在游标中返回相同的记录。清单\
  \ 2-41 展示了一个只进游标的例子。\n\n```sql\nSET NOCOUNT ON;\nDECLARE\n@CustomerID      INT =\
  \ 1,\n@CustomerOrderID INT,\n@CustomerName    VARCHAR(140),\n@message         VARCHAR(50);\n\
  SELECT @CustomerName =\nFirstName + ' ' + LastName\nFROM dbo.Customer\nWHERE CustomerID\
  \ = @CustomerID;\nPRINT '------- Order History for ' + @CustomerName + ' -------';\n\
  DECLARE customer_cursor CURSOR FORWARD_ONLY\nFOR\nSELECT CustomerOrderID\nFROM dbo.CustomerOrder\n\
  WHERE CustomerID = @CustomerID\nORDER BY CustomerOrderID;\nOPEN customer_cursor;\n\
  FETCH NEXT FROM customer_cursor\nINTO @CustomerOrderID;\nWHILE @@FETCH_STATUS =\
  \ 0\nBEGIN\nPRINT ' ';\nSELECT @message = '----- Order Number:' +\nCAST(@CustomerOrderID\
  \ AS VARCHAR(8)) +\n'-----';\nPRINT @message;\nSELECT prd.ProductName,\ndtl.QuantitySold,\n\
  dtl.ProductPrice\nFROM dbo.OrderDetail dtl\nINNER JOIN dbo.Product prd\nON dtl.ProductID\
  \ = prd.ProductID\nWHERE dtl.CustomerOrderID =\n@CustomerOrderID;\nFETCH NEXT FROM\
  \ customer_cursor INTO\n@CustomerOrderID;\nEND;\nCLOSE customer_cursor;\nDEALLOCATE\
  \ customer_cursor;\n```\n\n清单 2-41\n只进游标示例\n\n这个只进游标生成了一个包含特定客户所有订单及其所有产品的列表。在图\
  \ 2-24 中，你可以看到使用输出到文本窗口时的结果。\n\n![](img/480547_2_En_2_Fig24_HTML.jpg)\n\n一个屏幕截图展示了特定客户的所有订单列表。它包括产品名称、销售数量和产品价格。\n\
  \n图 2-24\n\n只进游标的输出\n\n虽然这产生了所需的输出，但需谨记其性能影响。在图 2-25 中，你可以查看此游标执行计划的一部分。\n\n![](img/480547_2_En_2_Fig25_HTML.jpg)\n\
  \n一个屏幕截图展示了只进游标的执行计划。查询 4 和 6 突出了缺失的索引。查询成本相对于批次在查询 4 中是 33%，在查询 5 中是 0，在查询 6 中是\
  \ 33%。\n\n图 2-25\n\n只进游标的执行计划\n\n重要的是要记住，图中第二和第三部分将为游标中处理的每一行重新运行。如果底层查询快速且执行高效，这可能不是问题。然而，如果游标内的查询存在任何性能问题，游标可能会严重加剧这些性能问题。\n\
  \n### 静态游标\n\n有时你希望能够在运行游标时向前和向后移动。使用静态游标时，可用的结果集自游标首次打开后就不会改变。静态游标可以选择为只读或允许读写。如果游标是只读的，则无法修改数据。如果数据被修改，则无法保证游标会拉回修改后的数据。\n\
  \n### 键集游标\n\n在定义游标时，可能存在一组构成唯一条目的列。如果可以找到这组唯一数据，并且你需要能够与已更改的记录进行交互，那么使用键集游标可能是一个选项。键集是从唯一列集合中提取的一组键。游标可以向前和向后移动，但检测订单更改的唯一方法是关闭并重新打开属于游标的记录。\n\
  \n### 动态游标\n\n如果其他游标不适用于你的情况，还有最后一种游标类型可用。由于潜在的性能影响，应尽可能少地使用这种类型的游标。动态游标允许你在结果集中向前和向后移动。此外，它将感知对数据所做的更改。虽然处理事务隔离级别超出了本书的范围，但动态游标在涉及事务隔离级别时有一些额外的注意事项。所有已提交事务的更改都将是可见的。然而，只有当游标的事务隔离级别设置为未提交读时，才能找到未提交事务的更改。\n\
  \n在本节前面，我展示了如何创建只进游标。创建游标的有趣之处在于，在切换各种游标类型时，代码变化不大。游标类型之间的最大区别在于每个游标可以访问哪些数据更改以及数据如何被获取。最大的诱惑之一是游标的工作方式与应用程序代码非常相似。游标不是一次性处理大量数据，而是循环遍历数据。在应用程序代码中，这是访问数据的首选方法，这使得使用游标更具诱惑力。\n\
  \n我最常遇到游标被用于处理本可以由应用程序更好地处理的流程。你可能会发现自己处于一种情况，游标似乎是唯一可用的解决方案之一。参考清单 2-42，你可以了解动态游标可以是什么样子。\n\
  \n```sql\nSET NOCOUNT ON;\nDECLARE\n@CustomerID      INT = 1,\n@CustomerOrderID\
  \ INT,\n@CustomerName    VARCHAR(140),\n@message         VARCHAR(50);\nSELECT @CustomerName\
  \ =\nFirstName + ' ' + LastName\nFROM dbo.Customer\nWHERE CustomerID = @CustomerID;\n\
  PRINT '------- Order History for ' + @CustomerName + ' -------';\nDECLARE customer_cursor\
  \ CURSOR DYNAMIC\nFOR\nSELECT CustomerOrderID\nFROM dbo.CustomerOrder\nWHERE CustomerID\
  \ = @CustomerID\nORDER BY CustomerOrderID;\nOPEN customer_cursor;\nFETCH NEXT FROM\
  \ customer_cursor\nINTO @CustomerOrderID;\nWHILE @@FETCH_STATUS = 0\nBEGIN\nPRINT\
  \ ' ';\nSELECT @message = '----- Order Number:' + CAST(@CustomerOrderID AS VARCHAR(8))\
  \ + '-----';\nPRINT @message;\nSELECT prd.ProductName, dtl.QuantitySold, dtl.ProductPrice\n\
  FROM dbo.OrderDetail dtl\nINNER JOIN dbo.Product prd\nON dtl.ProductID = prd.ProductID\n\
  WHERE dtl.CustomerOrderID = @CustomerOrderID;\nFETCH NEXT FROM customer_cursor INTO\
  \ @CustomerOrderID;\nEND;\nCLOSE customer_cursor;\nDEALLOCATE customer_cursor;\n\
  ```\n\n清单 2-42\n创建动态游标\n\n将游标类型从 `FORWARD_ONLY` 更改为 `DYNAMIC` 就像交换这两个短语一样简单。这些游标的输出也是相同的。真正可能发生的差异是在幕后。如果在游标运行时记录发生了变化，只进游标可能无法感知该更改，而动态游标可能能够滚动访问该更改，或者在某些情况下，动态游标可能在更改提交之前就发现了它。\n\
  \n在本章中，我介绍了在编写 T-SQL 时可用的几种不同类型的数据库对象。这些对象可以帮助提高代码的可读性。虽然在某些情况下，其中一些数据库对象可以提高性能，但这些数据库对象都不是设计来解决每一个技术挑战的。有些情况下，使用错误的数据库对象可能对数据库和你的应用程序代码产生负面的性能影响。现在你知道了何时使用每种数据库对象，是时候开始考虑你编写的代码质量了。\n\
  \n\n\n"
- "# 3. 标准化 T-SQL\n\n制定一种编写代码的方法，有助于提高你和他人理解代码意图的速度。你是否曾多次写下代码，过后再看却不明其意？我们的目标是，如果你遵循良好的格式、命名和注释\
  \ T-SQL 的实践，理解和掌握 T-SQL 的意图就会更轻松、更迅速。虽然确定这些标准前期会花费一些额外时间，但长远来看，它所节省的成本将是值得的。\n\n\
  编写易于理解的 T-SQL 对你和你的公司都有益。许多其他编程语言都有标准或最佳实践，我认为 T-SQL 也不例外。编写 T-SQL 的主要目标或许是实现某个功能，但次要目标——确保你的\
  \ T-SQL 清晰易懂——同样重要。随着时间的推移，代码会发生变化，或者会发现缺陷。你的 T-SQL 代码可读性和可理解性越高，修改或排查问题就越容易。\n\n\
  ## 格式化 T-SQL\n\nT-SQL 书写时的外观与其内容同等重要。和其他应用程序代码一样，未来很可能有人需要查看你的代码，或者你需要查看别人的代码。如果我不是在编写新代码，那我就是在查看已有代码，以理解其目的、调试代码、调整查询性能或更新业务逻辑。根据我审查代码的原因，我通常会确定当时什么对我最重要。\n\
  \n如果我查看 T-SQL 代码是为了理解代码功能，我会审阅任何注释和涉及的表，以理解哪个应用程序可能正在使用此 T-SQL 代码。我并不太关心表是如何连接的，因为我预期它们能正确工作——尽管表连接逻辑错误也可能是查询返回非常意外结果的原因。接下来，我会查看用于筛选\
  \ T-SQL 代码结果的条件。只有在我分析的最后阶段，我才会审阅查询返回的列。通常，只有涉及特殊业务逻辑时，我才会关注列。将这种思维模式应用于编写简单查询时，你可以看到我在清单\
  \ 3-1 中将列名列在了一行。\n\n```\nSELECT ProductID, ProductName, DateCreated, DateModified\n\
  FROM dbo.Product;\n```\n清单 3-1\n基础查询\n\n我以这种格式编写代码，是因为我希望能够快速看到通过 `FROM` 子句和 `WHERE`\
  \ 条件发生的所有操作项。如果我为每个列创建单独一行，我将更难看清表之间的关系以及应用于这些关系的条件。在清单 3-2 中，我修改了 `SELECT` 子句中列的显示方式。\n\
  \n```\nSELECT cus.FirstName,\n       cus.LastName,\n       prd.ProductName,\n  \
  \     dtl.QuantitySold AS QuantitySold\nFROM dbo.CustomerOrder ord\nINNER JOIN dbo.OrderDetail\
  \ dtl\n  ON ord.CustomerOrderID = dtl.CustomerOrderID\nINNER JOIN dbo.Product prd\n\
  \  ON dtl.ProductID = prd.ProductID\nINNER JOIN dbo.Customer cus\n  ON ord.CustomerID\
  \ = cus.CustomerID\n  AND cus.Country = 'India';\n```\n清单 3-2\n带连接的查询\n\n对于此查询，列是逐行罗列的。这是因为我对实际检索的列进行了某种修改。如果我为列设置了别名或向列添加了特殊逻辑，我会改变\
  \ `SELECT` 语句中列的格式化方式。对于这些场景，我会根据逻辑的复杂性，为每个列创建一行或多行。请注意查询最后两行上的两个连接条件。我通常将第一个连接条件之后的所有条件进行缩进，因为我希望它能立即显现出对一个连接应用了多个条件。\n\
  \n我审查 T-SQL 代码常常是为了排查它为何返回错误结果。当返回的结果出现问题时，我会从一个描述发生了什么错误的用户故事开始。在这种情况下，我会直接查看 `WHERE`\
  \ 子句，仔细检查逻辑并确认其正确性。一旦确认了该逻辑，我就会查看连接条件，以确认表是否连接正确。我使用与理解 T-SQL 代码相同的流程来排查代码问题；我最后查看\
  \ `SELECT` 语句，重点关注任何带有特殊逻辑的主要列。查看清单 3-3 中的查询，我可以先快速浏览 `WHERE` 子句，然后再看 `FROM` 子句。\n\
  \n\n\n### 清单 3-3 使用子查询的查询\n\n```sql\nSELECT\n(\n    SELECT prd.ProductName\n   \
  \ FROM dbo.CustomerOrder ord\n    INNER JOIN dbo.OrderDetail dtl\n        ON ord.CustomerOrderID\
  \ = dtl.CustomerOrderID\n    INNER JOIN dbo.Product prd\n        ON dtl.ProductID\
  \ = prd.ProductID\n    WHERE ord.CustomerID = bord.CustomerID\n    GROUP BY prd.ProductName\n\
  ) AS ProductName,\nbord.CustomerOrderID,\nbord.OrderNumber,\nbord.OrderDate,\nbdtl.QuantitySold,\n\
  bprd.ProductPrice\nFROM dbo.CustomerOrder bord\nINNER JOIN dbo.OrderDetail bdtl\n\
  \    ON bord.CustomerOrderID = bdtl.CustomerOrderID\nINNER JOIN dbo.Product bprd\n\
  \    ON bdtl.ProductID = bprd.ProductID\nWHERE bprd.ProductName LIKE '%board%';\n\
  ```\n\n这使我能够立即判断该查询正在处理名称中包含 `board` 一词的产品。`SELECT` 语句中的列各自独立成行列出，我能立刻意识到查询的这部分存在特殊逻辑。我还对子查询部分的逻辑进行了缩进，这有助于让该子查询更加突出。现在我正在尝试排查可能不准确的结果，可以快速识别可能导致问题的原因。根据报告的错误，问题极有可能出现在\
  \ `WHERE` 子句或 `SELECT` 语句返回的第一列。分析清单 `3-4` 中创建的视图则会得出不同的结论。\n\n### 清单 3-4 创建视图\n\
  \n```sql\nCREATE OR ALTER VIEW dbo.CustomerProduct\nAS\nSELECT cus.FirstName,\n\
  \       cus.LastName,\n       prd.ProductName,\n       SUM(dtl.QuantitySold) AS\
  \ QuantitySold\nFROM dbo.CustomerOrder ord\nINNER JOIN dbo.OrderDetail dtl\n   \
  \ ON ord.CustomerOrderID = dtl.CustomerOrderID\nINNER JOIN dbo.Product prd\n   \
  \ ON dtl.ProductID = prd.ProductID\nINNER JOIN dbo.Customer cus\n    ON ord.CustomerID\
  \ = cus.CustomerID\nGROUP BY cus.FirstName, cus.LastName, prd.ProductName;\n```\n\
  \n在这个视图的 `T-SQL` 代码中，我仍然首先查看 `FROM` 子句。我立即识别出存在多个联接。此外，没有 `WHERE` 子句，并且我还能快速判断 `SELECT`\
  \ 语句中没有特殊逻辑，因为所有列并未各自独立成行。将该视图的信息与我正在研究的任何潜在错误进行匹配，我知道此查询最复杂的部分是联接逻辑。如果联接正确，并且该视图返回的结果过多，我可以快速排除\
  \ `SELECT` 语句的问题。在创建函数时也可以遵循类似的模式，如清单 `3-5` 所示。\n\n### 清单 3-5 创建函数\n\n```sql\nCREATE\
  \ FUNCTION dbo.ProductsByCustomer (@CustomerID INT)\nRETURNS TABLE\nAS\nRETURN\n\
  (\n    SELECT cus.CustomerID, dtl.ProductID\n    FROM dbo.Customer cus\n    INNER\
  \ JOIN dbo.CustomerOrder ord\n        ON cus.CustomerID = ord.CustomerID\n    INNER\
  \ JOIN dbo.OrderDetail dtl\n        ON ord.CustomerOrderID = dtl.CustomerOrderID\n\
  \    WHERE cus.CustomerID = @CustomerID\n    GROUP BY cus.CustomerID, dtl.ProductID\n\
  );\n```\n\n在上述函数中，我可以快速识别 `FROM` 语句中的多个联接以及 `WHERE` 子句中的一个条件。如果函数仅返回所提供客户的结果，那么任何已发现的错误极有可能与联接条件有关。\n\
  \n我对查询进行性能调优的处理方式有所不同，我将在本书的 `第二部分` 进一步讨论这些差异。当作为性能调优的一部分审查 `T-SQL` 时，我重点关注使用了哪些表。如果涉及多个表，我还会查看这些表是如何联接在一起的。我最后关注的是使用了哪些列以及它们与现有索引的关系。\n\
  \n在更新 `T-SQL` 代码内部的逻辑时，我也会审查 `T-SQL` 代码。由于新增、更改或删除了功能，我需要修改 `T-SQL` 代码以反映这些变更。根据修改的性质，可能简单到查看\
  \ `SELECT` 子句中的字段并更改要显示的字段或计算方式。其他时候，我可能需要查看 `FROM` 子句，并在联接条件中添加或删除表。在某些情况下，我可能需要更新\
  \ `WHERE` 子句中的条件以处理新的业务需求。清单 `3-6` 就是这种情况，它展示了表值参数的创建。\n\n### 清单 3-6 创建表值参数\n\n\
  ```sql\nCREATE PROCEDURE dbo.UpdateProductPricing\n    @ProductList ProductPricing\
  \ READONLY\nAS\nSET NOCOUNT ON\nUPDATE prd\nSET ProductName = pr.ProductName,\n\
  \    ProductPrice = pr.ProductPrice\nFROM dbo.Product prd\nINNER JOIN @ProductList\
  \ pr\n    ON prd.ProductID = pr.ProductID;\n```\n\n我首先注意到的一点是此存储过程缺少 `WHERE` 子句。这也是在处理用户定义表类型时增加复杂性的地方。很可能用户定义的表被用于在联接时过滤数据。然而，仅看代码很难判断应用程序如何使用此存储过程。由于用户定义的表类型，增强此存储过程逻辑所需的工作量显著增加。我需要了解数据如何通过表值参数传入，但同时还需要考虑传递给此表值参数的数据随时间可能发生的变化。由于数据库管理员通常是在应用程序部署后长期管理\
  \ `T-SQL` 代码的人，我发现最好将 `T-SQL` 代码设计得易于后续支持。如你在清单 `3-7` 中所见，在创建公用表表达式时，我使用了相同的方法，但我会对公用表表达式内部的查询进行缩进。我再次使用这种缩进来表明在特定部分存在特殊逻辑。\n\
  \n### 清单 3-7 创建公用表表达式\n\n```sql\nWITH cte_customer AS\n(\n    SELECT cus.CustomerID,\n\
  \           cus.FirstName,\n           cus.LastName,\n           dtl.ProductID,\n\
  \           MIN(ord.OrderDate) AS FirstOrder\n    FROM dbo.CustomerOrder ord\n \
  \   INNER JOIN dbo.OrderDetail dtl\n        ON ord.CustomerOrderID = dtl.CustomerOrderID\n\
  \    INNER JOIN dbo.Customer cus\n        ON ord.CustomerID = cus.CustomerID\n \
  \   GROUP BY cus.CustomerID, cus.FirstName, cus.LastName, dtl.ProductID\n)\nSELECT\
  \ cus.CustomerID,\n       cus.FirstName,\n       cus.LastName,\n       cus.FirstOrder,\n\
  \       SUM(dtl.QuantitySold) AS QuantitySold\nFROM cte_customer cus\nINNER JOIN\
  \ dbo.CustomerOrder ord\n    ON cus.CustomerID = ord.CustomerID\nINNER JOIN dbo.OrderDetail\
  \ dtl\n    ON ord.CustomerOrderID = dtl.CustomerOrderID\n    AND cus.ProductID =\
  \ dtl.ProductID\nGROUP BY cus.CustomerID,\n         cus.FirstName,\n         cus.LastName,\n\
  \         cus.FirstOrder\nHAVING SUM(dtl.QuantitySold) > 5;\n```\n\n在定义我个人的风格时，我了解到我的总体目标是让查询适合在足够小的区域内显示，以便我能快速高效地找到我正在试图审查的那部分\
  \ `T-SQL` 代码。在设计你自己的标准时，你需要思考你的总体目标。\n\n在许多公司，会招聘初级团队成员。其中一些初级团队成员对 `SQL Server`\
  \ 可能是新手，任何新员工都需要一些时间来了解你公司业务中的应用程序如何运作。在设计内部的 `T-SQL` 编码标准时，你需要考虑应遵循哪些格式约定，以帮助新员工快速了解你公司的系统和数据流。\n\
  \n\n\n"
- "# T-SQL 格式化标准\n\n制定 T-SQL 格式化标准的另一个因素是创建一个易于员工记忆或参考的标准。你希望团队成员在实施新标准时能够成功，而不会在编写代码时被所有细节压得喘不过气。如果你的所有\
  \ T-SQL 代码都必须手动编写，并且你的公司没有可以自动格式化 T-SQL 代码的软件，这一点尤为重要。\n\n对于 `INSERT`、`UPDATE` 和\
  \ `DELETE` 语句，也有一些格式上的考虑。清单 3-8 包含了一个 `INSERT` 语句示例。在这个例子中，我列出了 `INSERT` 的所有列名。\n\
  \n```\nINSERT INTO dbo.Product (ProductName, ProductPrice) VALUES\n('Telescope',\
  \ 599.00);\n清单 3-8\n插入数据的查询\n```\n\n虽然列出列名可能看起来没有必要，但这种格式标准使得正在插入的数据变得易于识别，并且当列被添加或列顺序改变时，这种格式还能保护应用程序代码免受未来问题的影响。更新数据的格式很简单，如清单\
  \ 3-9 所示。我仍然遵循与保留字和引用用户定义数据库对象相同的格式。\n\n```\nUPDATE dbo.Customer\nSET Address =\
  \ '123 Main Street'\nWHERE CustomerID = 1;\n清单 3-9\n更新数据的简单查询\n```\n\n你还可以看到我始终在运算符前后留出空格。我在几个例子中都这样做了。就像我为格式化所做的其他决定一样，我相信在等号前后添加空格可以提高\
  \ T-SQL 代码的可读性。我还包含了清单 3-10 来展示如何在 T-SQL 中格式化删除数据。\n\n```\nDELETE FROM dbo.Product\n\
  WHERE ProductName = 'Electric surfboard';\n清单 3-10\n删除数据的查询\n```\n\n这个例子是一个简单的删除，当涉及到连接（`JOIN`）时，删除数据的格式可能会变得更加复杂。删除数据在\
  \ SQL Server 中通常比其他数据操作活动显得更为重大。有时你可能想编写一个查询来系统性地删除表中的数据。当我刚开始编写从表中删除数据的查询时，我会从编写\
  \ `SELECT` 语句开始。这将有助于解决几个因素。我可以清楚地看到哪些数据会受到影响。我还可以获得预期受影响记录的行数。一旦我写好了 `SELECT` 语句，我就可以轻松地修改代码以删除必要的记录。清单\
  \ 3-11 中的查询显示了我用来准备删除数据记录的 `SELECT` 语句。\n\n```\nSELECT ord.CustomerOrderID, ord.OrderNumber\n\
  FROM dbo.CustomerOrder ord\nINNER JOIN dbo.OrderDetail dtl\nON ord.CustomerOrderID\
  \ = dtl.CustomerOrderID\nWHERE dtl.ProductID = 2;\n清单 3-11\n选择 ProductID 为 2 的订单\n\
  ```\n\n在这种情况下，我正准备从 `dbo.CustomerOrder` 表中删除 `ProductID` 为 2 的记录。使用清单 3-11 的结果，我可以确认我正在删除什么数据以及预计会删除多少条记录。在审查了清单\
  \ 3-11 的结果后，我可以更新我的 T-SQL 代码来删除这些记录。在清单 3-12 中，我用引用 `dbo.CustomerOrder` 表别名的 `DELETE\
  \ FROM` 替换了 `SELECT` 语句。\n\n```\nBEGIN TRAN\nDELETE FROM ord\nFROM dbo.CustomerOrder\
  \ ord\nINNER JOIN dbo.OrderDetail dtl\nON ord.CustomerOrderID = dtl.CustomerOrderID\n\
  WHERE dtl.ProductID = 2;\nCOMMIT\n清单 3-12\n删除 ProductID 为 2 的订单\n```\n\n多年来，我发现最好将复杂的\
  \ `DELETE` 语句包装在显式事务中。默认情况下，当我们在 SQL Server 上执行 T-SQL 代码时，我们使用的是隐式事务。这意味着 SQL Server\
  \ 知道在我们执行事务后自动提交事务。我们也可以选择指定显式事务。在这种情况下，SQL Server 在我们发送 `COMMIT` 命令之前不会完成 T-SQL\
  \ 代码的执行。特别是在删除操作中，但通常对于任何复杂的代码，我发现最好始终小心谨慎。我有两个选择。我可以单独运行 `BEGIN TRAN` 和 `DELETE`\
  \ 语句。如果结果看起来不错，我可以运行 `COMMIT`。如果结果不如人意，我可以回滚并重新开始。如果你使用这种方法，你必须确保正确地 `ROLLBACK`\
  \ 或 `COMMIT` 显式事务。\n\n另一个选择是运行包含 `BEGIN TRAN` 和 `DELETE` 语句的整个脚本，但加上 `ROLLBACK`。如果行数看起来正确，我可以将\
  \ `ROLLBACK` 改为 `COMMIT` 并重新执行。\n\n这让我能够验证受影响的记录数量。这是我确认查询是否按预期工作的最后机会。如果我返回的记录数量与我预期的不同，我可以发出\
  \ `ROLLBACK`，SQL Server 将撤销我尝试运行的代码。这只在显式事务中才有可能。还值得一提的是，如果你使用了多级事务（称为嵌套事务），`ROLLBACK`\
  \ 的功能可能与你预期的不同，因为它会回滚所有嵌套的开放事务。\n\n这就引出了设计 T-SQL 格式时的另一个考虑因素。你需要了解你的 T-SQL 代码将如何被编写和存储。如果所有\
  \ T-SQL 代码都将手动编写且无法通过第三方工具格式化，那么你可能需要保持编码标准非常简单，并限制特殊情况的准则。然而，如果你有可用的第三方工具，你可以创建一个该工具能处理的最复杂的格式。\n\
  \n优秀开发者或工程师的特质之一是纪律性。编写 T-SQL 也是如此。在某种程度上，你使用哪种特定的格式风格并不重要。重要的是要与该格式保持一致。理想情况下，你应该努力让你的整个团队就一种标准的\
  \ T-SQL 格式化方法达成一致。\n\n当你的整个团队都以相同的方式编写 T-SQL 代码时，查看别人的代码就会容易得多。你不再需要同时转换格式和编码风格，这可以加快分析和解决问题的速度。格式化你的\
  \ T-SQL 代码使其更具可读性，完全是关于代码的外观。\n\n你应该朝着为公司编写的所有 T-SQL 代码拥有统一格式的方向努力。由于无论谁编写代码，格式都将相同，这也意味着每个阅读代码的人都会越来越熟悉快速解读他们的代码。在清单\
  \ 3-13 中，我创建了一个用户定义的表类型。\n\n```\nCREATE TYPE ProductPricing AS TABLE\n(\nProductName\
  \  VARCHAR(25),\nProductPrice DECIMAL(6,2)\n);\n清单 3-13\n创建用户定义的表类型\n```\n\n我在清单\
  \ 3-14 中创建临时表时也使用了统一的格式。\n\n```\nCREATE TABLE #TempCustomerFirstOrder\n(\nCustomerID\
  \    INT,\nFirstName     VARCHAR(40),\nLastName      VARCHAR(100),\nFirstOrder \
  \   DATETIME2(2),\nQuantityOrder SMALLINT\n);\n清单 3-14\n创建临时表\n```\n\n你还可以看到我在清单\
  \ 3-15 中创建表变量时使用了相同的格式。\n\n```\nDECLARE @TempCustomerFirstOrder TABLE\n(\nCustomerID\
  \    INT,\nFirstName     VARCHAR(40),\nLastName      VARCHAR(100),\nFirstOrder \
  \   DATETIME2(2),\nQuantityOrder SMALLINT\n);\n清单 3-15\n创建表变量\n```\n\n\n\n对比代码清单\
  \ 3-13、3-14 和 3-15，你可以很快发现我在创建表和声明变量时使用了统一的格式。这样，任何其他人看到这种格式的代码，都能立即明白这是在创建表。\n\n\
  关于大小写，至少有两件事需要考虑。一是与关键字相关的大写，二是所有其他术语的大小写。我倾向于将所有保留字大写。`T-SQL` 的保留字列表可能相当长。我选择将任何不属于数据库架构组成部分的词都视为保留字。对于数据库对象和列名，我按其创建时的形式大小写书写。创建表别名时，我使用小写。你可以在代码清单\
  \ 3-16 中看到，保留字被大写，而数据库对象名的每个单词的首字母则大写。\n\n```\nCREATE TRIGGER dbo.ArchiveProduct\n\
  ON dbo.Product\nAFTER INSERT, UPDATE\nAS\nIF (ROWCOUNT_BIG() = 0)\nRETURN;\nINSERT\
  \ INTO dbo.ProductArchive (ProductID, ProductPrice, DateCreated)\nSELECT inserted.ProductID,\
  \ inserted.ProductPrice, GETDATE()\nFROM inserted;\n代码清单 3-16\n创建一个 DML 触发器\n```\n\
  \n在确定 `T-SQL` 的格式标准时，另一个需要考虑的因素是是否以及如何使用别名。别名是一种允许你创建一个简短名称来引用表的方法。在编写查询时，也可以在 `SELECT`\
  \ 语句中为列名创建别名。如何使用别名值取决于别名是针对表还是列。然而，总体概念是相同的。如果为表名创建了别名，则必须在整个查询中使用该别名来代替表名。对于列，别名常用于重命名列或使输出更用户友好。通常，列别名不会被引用。\n\
  \n我在编写查询时唯一会引用列别名的情况是，必须按一个已被别名化的列进行排序，特别是当该列包含的逻辑不仅仅是重命名原始列名时。可以在 `ORDER BY` 语句中提供一个代表列顺序的数字，而不是提供列名。虽然这是一种快速排序数据的方法，但不建议在永久性的应用程序代码中使用，因为\
  \ `SELECT` 语句中的列顺序可能会更改，而 `ORDER BY` 子句却未得到更新。这将导致返回的数据可能按非预期的顺序排列。\n\n关于 `T-SQL`\
  \ 代码格式化的另一个有争议的话题是，在编写代码时如何格式化逗号。有些人喜欢将逗号放在每行的开头。这可以提高可读性，并帮助其他人快速识别这是多行中的一行。将逗号放在每行开头确实简化了调试，因为很容易注释掉以逗号开头的单行，而查询的其余部分仍能正确解析。我更喜欢将逗号放在结尾，这样我就可以忽略逗号，专注于查询中返回的列。\n\
  \n对于 `WHERE` 子句中的多个条件，我确实倾向于在每个条件前加上运算符。对于许多类型的条件，这个运算符要么是 `OR`，要么是 `AND`。这使我能够快速查看\
  \ `WHERE` 子句中的逻辑，而无需扫描整个 `WHERE` 子句来确定所有条件如何协同工作。你也可以选择让每行以运算符结尾，但你可能会发现这会使调试复杂化。\n\
  \n在使用 `T-SQL` 代码时，有时你需要编写复杂的代码。这些代码可能包括子查询，或者 `WHERE` 子句中涉及 `AND` 或 `OR` 的逻辑。如果在\
  \ `WHERE` 子句中存在像子查询或 `AND` 和 `OR` 混合这样的逻辑，我会将它们用括号括起来。我会缩进括号内的所有代码，以便于识别哪些逻辑被组合在一起。有时，两个表之间会有多个连接条件。如果两个表之间存在多个连接条件，我会缩进除第一个条件之外的所有其他连接条件，以便他人能轻松看出两个表之间存在多个连接条件。\n\
  \n在向代码添加额外的逻辑层级时，你还需要考虑如何格式化 `T-SQL` 代码。`T-SQL` 代码块有各种原因，包括 `TRY… CATCH` 块、`IF…\
  \ ELSE` 语句、`BEGIN…END` 或其他需要分割代码的情况。对于这些场景，我会缩进代码块内部。如果代码块最终被嵌套，我会对每个后续的代码块进行缩进。我倾向于缩进我的代码块，以便审查我代码的人能看到父级活动，例如代码清单\
  \ 3-17 中的 `WHILE` 循环。一旦你看到第一级缩进，你就知道所有缩进的逻辑都属于同一个代码块。\n\n```\nSET NOCOUNT ON;\n\
  DECLARE @ProductID INT,\n@ProductName VARCHAR(25),\n@message VARCHAR(50);\nPRINT\
  \ '-------- 产品列表 --------';\nDECLARE product_cursor CURSOR DYNAMIC\nFOR\nSELECT\
  \ ProductID, ProductName\nFROM dbo.Product;\nOPEN product_cursor;\nFETCH NEXT FROM\
  \ product_cursor\nINTO @ProductID, @ProductName;\nWHILE @@FETCH_STATUS = 0\nBEGIN\n\
  PRINT ' ';\nSELECT @message = '----- 产品客户：' + @ProductName + '-----';\nPRINT @message;\n\
  SELECT LEFT(cus.FirstName, 25), LEFT(cus.LastName, 25), SUM(dtl.QuantitySold) AS\
  \ QuantitySold\nFROM dbo.CustomerOrder ord\nINNER JOIN dbo.OrderDetail dtl\nON ord.CustomerOrderID\
  \ = dtl.CustomerOrderID\nINNER JOIN dbo.Product prd\nON dtl.ProductID = prd.ProductID\n\
  INNER JOIN dbo.Customer cus\nON ord.CustomerID = cus.CustomerID\nWHERE prd.ProductID\
  \ = @ProductID\nGROUP BY cus.FirstName, cus.LastName, prd.ProductName;\nFETCH NEXT\
  \ FROM product_cursor INTO @ProductID, @ProductName;\nEND;\nCLOSE product_cursor;\n\
  DEALLOCATE product_cursor;\n代码清单 3-17\n创建一个游标\n```\n\n一致地格式化 `T-SQL` 代码可以提高你自己以及将来任何需要审查你代码的人的可读性。格式良好的代码有助于在故障排除、性能调优和代码增强时提供清晰度。在你的组织中创建一个\
  \ `T-SQL` 格式化标准，也有助于新员工入职或培训初级数据库开发人员。一旦确定了 `T-SQL` 格式化标准，你将需要考虑采取哪些步骤来为你的 `T-SQL`\
  \ 代码创建命名约定。\n\n\n\n## T-SQL 命名规范\n\n当你编写 T-SQL 时，你可以选择如何编写代码。正如第 2 章所述，你很可能会在 T-SQL\
  \ 中创建持久化对象。无论你的目的如何，遵循良好的命名策略都能让其他人更容易理解你的 T-SQL 代码的用途。理想情况下，你的团队成员应该能够根据代码所在对象的名称来判断其目的。这对于新员工或经验较少的员工来说尤其有帮助。\n\
  \n命名规范的实践与 T-SQL 格式化的实践类似。命名规范所涉及的一个方面是外观和感觉。这可能涉及对象使用的大写方式。在为数据库对象提供大小写方案时，有多种选项可用。主要选择是\
  \ `camel case`（驼峰命名法）或 `pascal case`（帕斯卡命名法）。`驼峰命名法`是指第一个单词的首字母不大写，但所有其他单词的首字母大写。`帕斯卡命名法`是指每个单词的首字母都大写。这些大小写风格的主要区别在于数据库对象第一个单词的首字母。`代码清单\
  \ 3-18` 展示了一个使用`驼峰命名法`的查询。\n\n```sql\nSELECT productID, productName, dateCreated,\
  \ dateModified\nFROM dbo.product;\n```\n`代码清单 3-18`\n使用驼峰命名法的查询\n\n相反，你可以在`代码清单\
  \ 3-19`中看到编写相同查询时`帕斯卡命名法`的样子。\n\n```sql\nSELECT ProductID, ProductName, DateCreated,\
  \ DateModified\nFROM dbo.Product;\n```\n`代码清单 3-19`\n使用帕斯卡命名法的查询\n\n此外，还有一种选项是首字母不大写，并且在单词之间使用下划线。我个人通常不喜欢数据库名称中出现非字母字符，但我确实知道有些人更喜欢下划线。如果你想要另一种选择，`代码清单\
  \ 3-20`展示了如何以所谓的`蛇形命名法`来命名表和列。\n\n```sql\nSELECT productID, product_name, date_created,\
  \ date_modified\nFROM dbo.product;\n```\n`代码清单 3-20`\n使用蛇形命名法的查询\n\n在确定为你的命名规范使用哪种大小写时，务必也要注意数据库的排序规则以及是否有任何表使用了特殊的排序规则。了解大小写敏感性将有助于确保你的命名规范和格式标准保持一致。\n\
  \n这还可能涉及对象在 `对象资源管理器` 中出现的位置。其中一些与正在命名的对象类型以及谁会查找这些对象有关。如果你想按用途查找对象，可能需要指定`架构`名称来将这些对象分组。这对于应用程序或服务可能特别有用。根据预期的故障排除类型，数据库对象，特别是`存储过程`，可以按其执行的操作来命名。这便于搜索进行`选择`数据操作的存储过程与进行`插入`数据操作的存储过程。然而，还有另一个选项，即让受影响的主要表作为存储过程名称的第一个词。这允许某人在`对象资源管理器`中按受影响的表进行搜索，以查看存在的所有存储过程。\n\
  \n另一个考虑因素是在为数据库对象命名时是否可以使用`保留字`。如果在数据库对象名称中使用了保留字，你将需要在对象名称中添加另一个词，以便在引用对象名称时不需要使用方括号。\n\
  \n在确定命名规范时，你可能还需要考虑表中是否有一些列会与其他表中的列具有相同的名称。这类列的一些例子包括：指定记录创建日期、记录最后更新日期的列，以及记录是否被软删除的列。对于指定状态或类型的表，这些表可以包含一个状态或类型名称列以及一个关联的描述列。你可能会决定，希望所有这些列在所有包含这些列的表中都使用完全相同的名称。\n\
  \n在编写查询时，如果可能，我倾向于不对列名使用别名。我也不显示多个创建日期或更新日期列。因此，对于创建日期、修改日期和软删除标志，我使用完全相同的名称。然而，在编写查询时，我也经常返回多个表中的名称或描述字段。因此，我更喜欢这些列在列名中包含表名作为一部分。例如，我不会在\
  \ `Customer` 和 `Product` 表中使用列名 `Description`，而是倾向于在 `Customer` 表中将列命名为 `CustomerDescription`，在\
  \ `Product` 表中将列命名为 `ProductDescription`。这使得其他人可以查看 select 语句并轻松识别正在引用的表。这也意味着我在编写查询时需要别名的列更少。\n\
  \n命名持久化数据库对象也可能很棘手。为表命名可能不同于为索引、视图、触发器或函数命名。再次强调，为这些对象命名不仅仅是给它们一个描述性的名称。这也可能是给它们一个能清楚表明其对象类型的名称。这是因为许多数据库工程师和开发人员使用\
  \ `对象资源管理器` 作为查找对象的主要工具。如前所述，如果表名以名词开头，存储过程以动词开头，那么我接下来需要弄清楚如何将其他数据库对象与表和存储过程区分开来。\n\
  \n其中一个选项是在对象名称前加上对象类型的缩写。对于索引，你可以对非聚集索引使用 `IX_`，对聚集索引使用 `CX_`。在命名索引时，一旦指定了 `IX_`\
  \ 或 `CX_`，接下来的项目应该是索引所在的表名。表名之后应该是索引中包含的列的列表。这些列应按照创建索引时指定的顺序列出。在`代码清单 3-21`中，你可以看到一个聚集索引。聚集索引名称以\
  \ `CX` 开头，后跟表名，然后是列名。每个部分之间用下划线分隔。\n\n```sql\nCREATE CLUSTERED INDEX CX_Product_ProductName\n\
  ON dbo.Product (ProductName);\n```\n`代码清单 3-21`\n创建聚集索引\n\n创建非聚集索引遵循相同的模式。在`代码清单\
  \ 3-22`中，你可以看到非聚集索引也包含多个列。\n\n```sql\nCREATE NONCLUSTERED INDEX IX_Customer_DateCreated_FirstName_LastName_Country\n\
  ON dbo.Customer\n(\nDateCreated ASC,\nFirstName ASC,\nLastName ASC,\nCountry ASC\n\
  );\n```\n`代码清单 3-22`\n创建包含多列的非聚集索引\n\n\n### 数据库对象命名规范\n\n#### 主键与外键命名\n\n在创建主键和外键时也遵循同样的原则。如果在`T-SQL`中创建主键或外键时未指定名称，`SQL\
  \ Server`会随机分配一个名称。因此，**最佳实践**是显式命名主键或外键。\n\n- 命名主键时，应使其以`PK_`开头，代表主键。\n- 类似地，外键应以`FK_`开头。\n\
  - 名称的下一部分是分配该键的表名。\n- 接着是用于定义该键的一个或多个列名。如果指定了多个列，这些列在键定义中应按顺序列出。\n\n清单[3-23]展示了如何在表创建后添加并命名主键。\n\
  \n```\nALTER TABLE dbo.Product\nADD CONSTRAINT PK_Product_ProductID\nPRIMARY KEY\
  \ (ProductID);\nListing 3-23\nAdd a Primary Key\n```\n\n可以看到，主键名称以`PK`开头，后跟表名和用于创建主键的列名。\n\
  \n类似地，外键名称以`FK_`开头。名称的下一部分是外键所属的表名，接着是用于定义外键的列。如果指定了多个列，它们应按顺序列出。在表创建后添加外键可以参考清单[3-24]。\n\
  \n```\nALTER TABLE dbo.CustomerOrder\nADD CONSTRAINT FK_Order_CustomerID\nFOREIGN\
  \ KEY (CustomerID)\nREFERENCES dbo.Customer(CustomerID);\nListing 3-24\nAdd a Foreign\
  \ Key\n```\n\n与创建主键类似，外键遵循相似的命名结构：以`FK`开头，后跟表名和列名。\n\n#### 视图与触发器命名\n\n我也倾向于在视图名称前加上`vw_`，在触发器前加上`tr_`。还有其他不那么明显的命名选项。例如，你可以为视图或触发器定义保留特定的名词或动词列表。这提供了更多灵活性，也能防止`Object\
  \ Explorer`中的列表项都以相同的前三个字符开头。这能让任何人都轻松识别出这些对象既不是表也不是存储过程。这对于视图和触发器尤其重要。\n\n最大的挑战之一是，如果命名不能明显区分它们是视图还是触发器，人们可能会花费大量时间寻找这些对象而无法找到。视图像表一样用于连接查询，而触发器则像存储过程一样用于修改对象。触发器更棘手，因为它们可能导致你花费大量时间研究存储过程，试图找出值发生变化的原因。\n\
  \n#### 表命名\n\n命名表时，应仅使用名词。这有助于表明这些对象用于存储，而不是执行任何特定活动。\n\n在命名对象时，一个常被忽视直至为时已晚的命名约定是：对象名是使用单数还是复数。在首次出现复数数据库对象之前，这可能不是问题。但一旦架构中存在复数对象，其问题会很快变得明显。这是因为数据库中一旦存在复数对象，编写查询时就越来越难以记住哪些表是复数、哪些是单数。\n\
  \n选择表名时，还应确保名称具有描述性。应以一种能让其他数据库工程师和开发者轻松了解表中存储信息类型的方式来描述表。使用名词命名表也表明该对象用于存储，而非执行任何特定活动。\n\
  \n#### 存储过程命名\n\n大多数用户很容易熟悉表和存储过程。选择一种命名约定来区分这些对象是很容易的，例如让存储过程以动词开头，或在存储过程名称中包含其他高级条件。清单[3-25]展示了一个以动词开头的存储过程。\n\
  \n```\nEXECUTE dbo.GetCustomer;\nListing 3-25\nStored Procedure Beginning with a\
  \ Verb\n```\n\n如果我看到这个存储过程名，我期望它能检索所有客户。清单[3-26]中的存储过程返回特定客户的所有信息。\n\n```\nEXECUTE\
  \ dbo.GetCustomerByCustomerID 1;\nListing 3-26\nStored Procedure with Selection\
  \ Criteria\n```\n\n### 总结\n\n由此可见，在命名`T-SQL`数据库对象时有许多考虑因素。在许多情况下，一个好的名称能帮助你轻松确定数据库对象的用途。在特殊情况下，它还能帮助你识别对象的类型。虽然你通常在格式化和注释`T-SQL`之后才命名对象，但我将注释放在最后，因为它既涉及数据库对象的创建，也涉及数据库对象内部的`T-SQL`代码。\n\
  \n\n## T-SQL 注释\n\n虽然编写 T-SQL 的主要目的是让应用程序能够对数据执行特定操作，但同样重要的是确保他人能够理解你未来的 T-SQL 代码。至少，这能确保你不是唯一一个为某段代码或业务逻辑负责的人。它还有助于你团队的其他成员增强对自己工作能力的信心，并加深对幕后代码的理解。\n\
  \n在许多情况下，快速浏览 T-SQL 代码或查看数据库对象的名称并不足以理解 T-SQL 代码的用途。清单 3-27 展示了在数据库对象顶部创建头部区域的示例\
  \ T-SQL 代码。\n\n```sql\n/*-------------------------------------------------------------*\\\
  \nName:             \nAuthor:           \nCreated Date:     \nDescription:     \
  \ \nSample Usage:\n\nChange Log:\nUpdate on  by : \nUpdate on  by : \n\\*-------------------------------------------------------------*/\n\
  Listing 3-27\n持久化数据库对象头部的注释\n```\n\n这个头部的目的是让其他用户能够一目了然地了解此数据库对象的概况。审查此 T-SQL 的目的不同，对用户重要的信息也会不同。对于那些不熟悉所有业务应用细节的人来说，描述部分会提供关于该\
  \ T-SQL 数据库对象用途的高层次概念。同样地，示例用法让那些调查性能问题的人能够了解应用程序如何使用这段 T-SQL 代码。数据库对象的作者可以帮助确定原始创建者是否仍在公司，以回答有关该数据库对象的更具体问题。如果你的数据库处于源代码控制之下，你可能会选择省略其中一些字段。我将在第\
  \ 11 章进一步讨论源代码控制。在清单 3-28 中，你可以看到创建最初见于清单 3-4 的视图时头部信息的样子。\n\n```sql\n/*-------------------------------------------------------------*\\\
  \nName:             dbo.CustomerProduct\nAuthor:           Elizabeth Noble\nCreated\
  \ Date:     2022-10-31\nDescription:      Simple view to display all customer purchases\n\
  Sample Usage:\nSELECT FirstName, LastName, ProductName, QuantitySold\nFROM dbo.CustomerProduct;\n\
  Change Log:\nUpdate on 2022-10-31 by enoble: Added header to view\n\\*-------------------------------------------------------------*/\n\
  CREATE OR ALTER VIEW dbo.CustomerProduct\nAS\nSELECT cus.FirstName, cus.LastName,\
  \ prd.ProductName, SUM(dtl.QuantitySold) AS QuantitySold\nFROM dbo.CustomerOrder\
  \ ord\nINNER JOIN dbo.OrderDetail dtl\nON ord.CustomerOrderID = dtl.CustomerOrderID\n\
  INNER JOIN dbo.Product prd\nON dtl.ProductID = prd.ProductID\nINNER JOIN dbo.Customer\
  \ cus\nON ord.CustomerID = cus.CustomerID\nGROUP BY cus.FirstName, cus.LastName,\
  \ prd.ProductName;\nListing 3-28\n创建带有注释头部的视图\n```\n\n### 为复杂逻辑添加注释\n\n有时，编写易于阅读的简单\
  \ T-SQL 可能就足够了。然而，也有些时候，数据库对象可能包含难以快速理解的复杂 T-SQL 代码。我发现在编写代码后添加注释的一个挑战是，我的注释往往过于技术化，难以轻松描述我试图实现的目标。你需要确保不熟悉你代码的人也能轻松理解你\
  \ T-SQL 代码的目的。\n\n如果存在任何复杂逻辑，你需要清晰地解释该复杂逻辑是如何工作的。如果你使用了不是最佳实践的 T-SQL 编码方式，这一点尤其重要。任何关于为何选择非标准实践的解释都有助于节省他人的宝贵时间。如果你已经确定标准的最佳实践在特定情况下性能不够好，这也能节省你团队成员的时间。回顾清单\
  \ 3-3，`SELECT`语句中有一个子查询。初次编写这段代码时，使用子查询的原因可能是显而易见的，但未来你可能会忘记。此外，阅读我代码的其他人可能也不会明显看出我为何选择为该列包含一个子查询。在清单\
  \ 3-29 中，我展示了如何添加注释，以便更容易快速理解所编写代码的目的或逻辑。\n\n```sql\n-- 外部查询显示所有购买了包含“board”一词产品的客户\n\
  SELECT\n-- 下面子查询用于显示也购买了类似“board”零件的客户\n---- 所购买的所有零件\n(\nSELECT prd.ProductName\n\
  FROM dbo.CustomerOrder ord\nINNER JOIN dbo.OrderDetail dtl\nON ord.CustomerOrderID\
  \ = dtl.CustomerOrderID\nINNER JOIN dbo.Product prd\nON dtl.ProductID = prd.ProductID\n\
  WHERE ord.CustomerID = bord.CustomerID\nGROUP BY prd.ProductName\n) AS ProductName\n\
  FROM dbo.CustomerOrder bord\nINNER JOIN dbo.OrderDetail bdtl\nON bord.CustomerOrderID\
  \ = bdtl.CustomerOrderID\nINNER JOIN dbo.Product bprd\nON bdtl.ProductID = bprd.ProductID\n\
  WHERE bprd.ProductName LIKE '%board%';\nListing 3-29\n包含子查询的查询\n```\n\n### 先编写注释\n\
  \n如果你在开始编写任何 T-SQL 代码之前就先为 T-SQL 代码添加注释，通常最容易在代码中包含注释。在清单 3-30 中，你可以看到头部信息和起始注释。这些注释指明了编写该存储过程背后的概念。\n\
  \n```sql\n/*-------------------------------------------------------------*\\\nName:\
  \             dbo.GetCustomerPurchase\nAuthor:           Elizabeth Noble\nCreated\
  \ Date:     2022-10-30\nDescription:      Lookup customer information for a given\
  \ product\nSample Usage:\nDECLARE @ProductID INT;\nSET @ProductID = 1;\nEXECUTE\
  \ dbo.GetCustomerPurchase @ProductID;\n\\*-------------------------------------------------------------*/\n\
  -- 获取出售给客户的产品\n-- 显示总销售数量以及最近的购买日期\n-- 按购买时的产品价格显示购买数量详情\n---- 的详细信息\nListing 3-30\n\
  创建新的存储过程\n```\n\n一旦你指定了查询的总体逻辑，就可以继续编写 T-SQL 以满足这些要求。如果你经常发现自己是在重新表述已经写好的代码，而不是解释代码的总体目的，这通常会很有帮助。\n\
  \n在编写任何 T-SQL 代码之前编写这些注释，可以确保注释解释的是存储过程的目的，而不是代码如何执行。\n\n### 总结\n\n你现在应该已经准备好开始为你自己和你的组织定义\
  \ SQL 格式化标准了。这将使你和你团队的成员能够快速审查组织的 T-SQL 代码。此外，我还讨论了在为你的 T-SQL 代码提供额外文档时可以使用的策略。为你的\
  \ T-SQL 代码添加注释，可以让其他人理解 T-SQL 代码在业务逻辑和高级技术逻辑方面应该做什么。我还介绍了在为你的组织定义命名约定时可用的选项。定义良好的命名约定应该使任何访问数据库架构的人都能更容易地知道在哪里找到数据库对象。\n\
  \n你现在应该已经熟悉了第 1 章中的 SQL Server 数据类型以及使用它们的最佳时机。你也应该对编写 T-SQL 时可用的各种数据库对象感到得心应手。既然你更熟悉如何设置代码样式以提高可读性和理解度，你就已经准备好学习更多关于使用参数、复杂逻辑和存储过程设计\
  \ T-SQL 代码的知识了，这些将在下一节中介绍。\n\n\n\n"
- '# 4. 设计 T-SQL


  构建易于理解的 T-SQL 的重点在于提高理解先前未见或许久未见代码的速度。正如第 1 章所讨论的，选择合适的数据类型可以提升 T-SQL 代码的速度，因为需要检索的数据量更小。尽管格式和数据类型非常重要，但为
  T-SQL 代码选择正确的数据库对象同样会影响应用程序的速度。本章将探讨查询设计如何影响查询速度。


  在为应用程序编写 T-SQL 时，就性能而言，存储过程通常是**最理想的选择**。使用存储过程有许多优势，包括可能使你的代码更具适应性和可重用性。类似地，在代码中使用参数可以增加
  T-SQL 代码的灵活性。在为更复杂的查询设计解决方案时，你可以使用存储过程和参数。此外，在解决复杂问题时，你可能还需要考虑其他技术。设计 T-SQL 代码时需要考虑几个事项，包括存储过程、参数和复杂的查询逻辑。


  ## 使用存储过程


  在编写 T-SQL 代码时，有多种编写方式，这会影响查询执行的快慢。如果计划缓存中没有执行计划，查询的相对速度会更慢。能够使用缓存的执行计划将提高查询速度，因为
  SQL Server 不需要花费额外资源来确定如何检索数据。SQL Server 用于检索数据的方法称为执行计划，第 8 章将对此进行更详细的讨论。


  为应用程序编写 T-SQL 代码时，需要考虑几个方面。为了更好地理解你希望应用程序如何使用 T-SQL，最好先了解 SQL Server 如何处理可用的每个 T-SQL
  选项。当 SQL Server 执行查询时，它必须确定如何执行该查询。在此之前，SQL Server 会检查是否已存在此查询的执行计划。T-SQL 的设计方式会对
  SQL Server 验证执行计划是否已存在产生一定影响。


  为了展示存储过程、即席查询和预准备语句如何影响计划缓存，让我们看几个例子。使用存储过程可以使你的 T-SQL 代码可重复执行，有可能让查询计划在缓存中保留更长时间，从而提高查询执行速度。在代码清单
  4-1 中，你可以看到创建存储过程的语句。


  ```

  /*-------------------------------------------------------------*\

  Name:             dbo.GetCustomer

  Author:           Elizabeth Noble

  Created Date:     2022-04-20

  Description:      Get a list of all customers in the databases

  Sample Usage:

  EXECUTE dbo.GetCustomer;

  \*-------------------------------------------------------------*/

  CREATE PROCEDURE dbo.GetCustomer

  AS

  SELECT

  CustomerID,

  FirstName,

  LastName,

  Address,

  City,

  PostalCode,

  Country,

  IsActive,

  DateCreated,

  DateModified,

  DateDisabled

  FROM dbo.Customer;

  Listing 4-1

  Creating a Stored Procedure

  ```


  在此示例中，你创建了一个未参数化的存储过程，每次都将执行完全相同的 T-SQL。此存储过程返回 `SELECT` 语句中请求的列的结果，包含已输入数据库的所有客户。如果你想查看此存储过程的结果，可以按照代码清单
  4-2 所示执行该存储过程。


  ```

  EXECUTE dbo.GetCustomer;

  Listing 4-2

  Executing the Stored Procedure

  ```


  SQL Server 创建了图 4-1 所示的执行计划，并且在大多数情况下，会将执行计划保存到查询计划缓存中。此计划可能被视为微不足道而根本不会保存到缓存中。如果将来再次运行此存储过程，SQL
  Server 将检查计划缓存，看看此存储过程是否已存在于缓存中。只要 SQL Server 认为该计划相关，它就会一直保留在计划缓存中。第 8 章将更详细地介绍
  SQL Server 如何计算执行计划的相关性。在图 4-1 中，你可以看到与代码清单 4-2 中的存储过程相关的执行计划。


  ![](img/480547_2_En_4_Fig1_HTML.jpg)


  一幅插图描绘了左侧选择成本等于 0%，右侧聚集索引扫描成本等于 100%。两者由一个反向箭头分隔。


  图 4-1

  存储过程的执行计划




  ### 执行计划缓存与查询类型


  如果执行计划在缓存中，SQL Server 将继续重用相同的执行计划。这对于存储过程效果很好。然而，在 SQL Server 中还有其他访问数据的方法。其中一种方法是编写即席查询。编写即席查询时，可以选择硬编码值或对它们进行参数化。清单
  4-3 所示类型的查询与清单 4-1 中的存储过程具有相同的逻辑。


  #### 代码清单 4-3：即席查询逻辑


  ```sql

  SELECT

  CustomerID,

  FirstName,

  LastName,

  Address,

  City,

  PostalCode,

  Country,

  IsActive,

  DateCreated,

  DateModified,

  DateDisabled

  FROM dbo.Customer;

  ```

  清单 4-1 和 4-3 中的逻辑是相同的。最大的区别在于 SQL Server 处理这两个不同的 T-SQL 查询的方式。然而，实际情况是 SQL Server
  会检查计划缓存以查看是否存在相同的计划。存储在计划缓存中的计划不是基于核心逻辑，而是基于实际的即席查询或存储过程执行的编写方式。


  #### 计划缓存条目对比


  如表 4-1 所示，即席查询甚至作为即席对象类型存储，而 SQL Server 能够正确识别第二行是一个存储过程。在表 4-1 中，您可以看到运行存储过程和作为即席查询运行相同代码后计划缓存中的结果。


  ##### 表 4-1：即席查询与存储过程的计划缓存


  | 使用次数 | 对象类型 | 查询文本 |

  | --- | --- | --- |

  | 1 | 即席 | `SELECT      CustomerID,      FirstName,      LastName,      Address,      City,      PostalCode,      Country,      IsActive,      DateCreated,      DateModified,      DateDisabled
  FROM dbo.Customer;` |

  | 1 | 存储过程 | `/*-------------------------------------------------------------*\
  Name:            dbo.GetCustomer Author:          Elizabeth Noble Created Date:    2022-10-30
  Description: Get a list of all customers in the databases Sample Usage:      EXECUTE
  dbo.GetCustomer \*-------------------------------------------------------------*/
  CREATE PROCEDURE dbo.GetCustomer AS  SELECT        CustomerID,        FirstName,        LastName,        Address,        City,        PostalCode,        Country,        IsActive,        DateCreated,        DateModified,        DateDisabled  FROM
  dbo.Customer;` |


  #### 查询格式变化的影响


  当用户或应用程序以不一致的方式编写代码时，这一切就变得重要了。通过将 `SELECT` 子句后的第一列移到与 `SELECT` 子句同一行，对清单 4-3 中的查询进行了修改。清单
  4-4 显示了更新后的查询。


  ##### 代码清单 4-4：修改后的即席查询


  ```sql

  SELECT CustomerID,

  FirstName,

  LastName,

  Address,

  City,

  PostalCode,

  Country,

  IsActive,

  DateCreated,

  DateModified,

  DateDisabled

  FROM dbo.Customer;

  ```

  真正改变的只有查询本身的格式。虽然您可能能看出该查询使用了相同的逻辑，但您应该运行清单 4-5 中的查询，以了解 SQL Server 如何处理此查询与计划缓存的关系。运行清单
  4-4 中的查询后，计划缓存将显示表 4-2 中的结果。


  ##### 表 4-2：修改后的即席查询的计划缓存


  | 使用次数 | 对象类型 | 查询文本 |

  | --- | --- | --- |

  | 1 | 即席 | `SELECT      CustomerID,      FirstName,      LastName,      Address,      City,      PostalCode,      Country,      IsActive,      DateCreated,      DateModified,      DateDisabled
  FROM dbo.Customer;` |

  | 1 | 即席 | `SELECT CustomerID,      FirstName,      LastName,      Address,      City,      PostalCode,      Country,      IsActive,      DateCreated,      DateModified,      DateDisabled
  FROM dbo.Customer;` |

  | 1 | 存储过程 | `/*-------------------------------------------------------------*\
  Name:            dbo.GetCustomer Author:          Elizabeth Noble Created Date:    2022-10-30
  Description: Get a list of all customers in the databases Sample Usage:      EXECUTE
  dbo.GetCustomer \*-------------------------------------------------------------*/
  CREATE PROCEDURE dbo.GetCustomer AS  SELECT        CustomerID,        FirstName,        LastName,        Address,        City,        PostalCode,        Country,        IsActive,        DateCreated,        DateModified,        DateDisabled  FROM
  dbo.Customer;` |


  #### 计划缓存膨胀与性能影响


  您可以在表 4-2 中看到，计划缓存中现在有三个条目。SQL Server 并没有重用第一次调用即席查询时的执行计划，而是生成了一个全新的执行计划。每次 SQL
  Server 创建新的执行计划时，它都会消耗额外的资源来创建和存储该计划。需要生成执行计划可能会使查询速度延迟几秒钟。


  每个执行的查询计划都会保存在计划缓存中。为每个查询保存多个执行计划可能会填满执行计划缓存。这可能导致其他查询执行计划过早地从计划缓存中移除。查询计划从缓存中移除将导致
  SQL Server 消耗额外的资源为那个其他查询创建新的执行计划。第 7 章将提供更多关于内存使用如何影响查询性能速度的信息。在确定您的应用程序将如何调用 T-SQL
  代码时，这是需要考虑的事情。


  #### 存储过程与参数化查询的权衡


  虽然存储过程为您提供了一种一致的方式来多次调用相同类型的代码，但通用的存储过程可能无法提供应用程序所需的灵活性。如果是这种情况，您需要了解使用参数如何帮助提高
  T-SQL 代码的可伸缩性。



  '
- "# 使用参数\n\n除了使用存储过程来提高 T-SQL 代码的可重用性之外，您还可以在 T-SQL 代码中使用参数。参数可以用于即席查询、预处理语句或存储过程。参数也可以用作输入或输出。无论参数用在何处，参数都允许您编写可在多种情况下重用的查询。清单\
  \ 4-5 展示了一个根据存储过程中提供的 `CustomerID` 返回客户信息的存储过程。\n\n```sql\n/*-------------------------------------------------------------*\\\
  \nName:             dbo.GetCustomerByCustomerID\nAuthor:           Elizabeth Noble\n\
  Created Date:     2022-10-30\nDescription:      Get Customer information when a\
  \ Customer ID is provided\nSample Usage:\nDECLARE @CustomerID INT;\nSET @CustomerID\
  \ = 1;\nEXECUTE dbo.GetCustomerByCustomerID @CustomerID;\n\\*-------------------------------------------------------------*/\n\
  CREATE PROCEDURE dbo.GetCustomerByCustomerID\n    @CustomerID   INT\nAS\nSELECT\n\
  \    CustomerID,\n    FirstName,\n    LastName,\n    Address,\n    City,\n    PostalCode,\n\
  \    Country,\n    IsActive,\n    DateCreated,\n    DateModified,\n    DateDisabled\n\
  FROM dbo.Customer\nWHERE CustomerID = @CustomerID;\n```\n**清单 4-5** 创建带参数的存储过程\n\
  \n这个存储过程允许您传入任何 `CustomerID`，然后它会根据该 `CustomerID` 返回一组预定义的客户信息。这也使得以更简单的方式调用 T-SQL\
  \ 代码成为可能。清单 4-6 包含执行该存储过程的代码，执行时传递了一个硬编码的值。\n\n```sql\nEXECUTE dbo.GetCustomerByCustomerID\
  \ 1;\n```\n**清单 4-6** 使用硬编码值执行存储过程\n\n虽然可以使用此方法调用存储过程，但使用变量是执行此存储过程的一种更为动态的方式。其中一种方法是声明一个具有特定数据类型的变量，然后将该变量设置为特定值。这更接近地模拟了应用程序调用存储过程的方式。应用程序代码通常已经声明了一个变量，并在执行存储过程时使用相同的变量。声明变量、将该变量设置为某个值，然后使用该变量执行存储过程的过程可以在清单\
  \ 4-7 中看到。\n\n```sql\nDECLARE @CustomerID INT;\nSET @CustomerID = 1;\nEXECUTE dbo.GetCustomerByCustomerID\
  \ @CustomerID;\n```\n**清单 4-7** 使用变量执行存储过程\n\n### 计划缓存比较\n\n为了比较清单 4-6 中存储过程的计划缓存与即席查询的计划缓存，请执行与清单\
  \ 4-5 具有相同整体逻辑的即席查询。但是，此值不会被参数化。在清单 4-8 中，下面的查询对 `CustomerID` 使用了硬编码值。\n\n```sql\n\
  SELECT\n    CustomerID,\n    FirstName,\n    LastName,\n    Address,\n    City,\n\
  \    PostalCode,\n    Country,\n    IsActive,\n    DateCreated,\n    DateModified,\n\
  \    DateDisabled\nFROM dbo.Customer\nWHERE CustomerID = 1;\n```\n**清单 4-8** 运行带硬编码值的即席查询\n\
  \n执行相同存储过程的另一种方法是使用类似于清单 4-8 中的查询，但在 where 子句中使用参数。这将执行与清单 4-6、4-7 和 4-8 相同的整体逻辑。清单\
  \ 4-9 中的代码通过声明一个变量并整体参数化查询来使用相同的代码。\n\n```sql\nDECLARE @CustomerID INT;\nSET @CustomerID\
  \ = 1;\nSELECT\n    CustomerID,\n    FirstName,\n    LastName,\n    Address,\n \
  \   City,\n    PostalCode,\n    Country,\n    IsActive,\n    DateCreated,\n    DateModified,\n\
  \    DateDisabled\nFROM dbo.Customer\nWHERE @CustomerID = @CustomerID;\n```\n**清单\
  \ 4-9** 运行带参数的即席查询\n\n### 执行计划分析\n\n虽然所有这些查询都返回相同的数据，但 SQL Server 处理这四个查询的方式可能截然不同。在我的测试案例中，我通过执行代码\
  \ `DBCC FREEPROCCACHE` 清除了计划缓存。\n\n> **注意**\n>\n> 不要在生产系统上运行此存储过程，因为它可能对 SQL Server\
  \ 的性能产生负面影响。\n\n然后我执行了清单 4-7、4-8、4-9 和 4-10 中的 T-SQL 代码。尽管这些查询中的每一个都返回相同的结果，但您将在表\
  \ 4-3 中看到 SQL Server 如何为这些查询中的每一个计算或使用执行计划。\n\n**表 4-3** 变量和硬编码值的计划缓存比较\n\n| 使用计数\
  \ | 对象类型 | 文本 |\n| :--- | :--- | :--- |\n| 2 | Proc | `/*-------------------------------------------------------------*\\\
  \ Name:             dbo.GetCustomerByCustomerID Author:           Elizabeth Noble\
  \ Created Date:     2022-10-30 Description:      Get Customer information when a\
  \ Customer ID is provided Sample Usage:       DECLARE @CustomerID INT;       SET\
  \ @CustomerID = 1;       EXECUTE dbo.GetCustomerByCustomerID @CustomerID \\*-------------------------------------------------------------*/\
  \ CREATE PROCEDURE dbo.GetCustomerByCustomerID       @CustomerID        SELECT \
  \          CustomerID,           FirstName,           LastName,           Address,\
  \           City,           PostalCode,           Country,           IsActive, \
  \          DateCreated,           DateModified,           DateDisabled       FROM\
  \ dbo.Customer       WHERE CustomerID = @CustomerID;` |\n| 1 | Adhoc | `DECLARE\
  \ @CustomerID INT; SET @CustomerID = 1 SELECT CustomerID,       FirstName,     \
  \  LastName,       Address,       City,       PostalCode,       Country,       IsActive,\
  \       DateCreated,       DateModified,       DateDisabled FROM dbo.Customer WHERE\
  \ @CustomerID = 1;` |\n| 1 | Adhoc | `SELECT CustomerID,       FirstName,      \
  \ LastName,       Address,       City,       PostalCode,       Country,       IsActive,\
  \       DateCreated,       DateModified,       DateDisabled FROM dbo.Customer WHERE\
  \ CustomerID = 1;` |\n| 1 | Prepared | `(@1 tinyint)SELECT [CustomerID],[FirstName],[LastName],[Address],[City],[PostalCode],[Country],[IsActive],[DateCreated],[DateModified],[DateDisabled]\
  \ FROM [dbo].[Customer] WHERE [CustomerID]=@1` |\n\n在表 4-3 中，您可以看到存储过程已被执行了两次。带硬编码值的\
  \ SELECT 语句和带参数值的 SELECT 语句各自拥有自己的执行计划。当您只讨论少数几个查询时，这可能不会有太大影响。但是，如果您的整个环境中存在大量不是存储过程或预处理语句的查询，您可能需要检查您的计划缓存，以确定它们是如何被处理的。\n\
  \n这不是您在编写查询时需要考虑的唯一主题。另一个潜在选项涉及通常被称为**参数嗅探**的问题。参数嗅探听起来并不像它实际可能那么危险。嘘！！理解参数嗅探是什么以及它如何影响您的关键要点是考虑您的数据是如何分布的。对于许多公司来说，存储在数据表中的数据并非都是均匀分布的。\n\
  \n\n对于因列统计信息导致 SQL Server 预期返回大量行的查询，其查询计划可能与那些因不同参数带来不同统计信息、从而预期返回极少行的同一查询的计划看起来截然不同。所有这些参数化的尝试，都是为了让这些查询的不同版本能够共享一个存储在计划缓存中的单一计划。当查询在不共享计划的情况下可能表现更好时，这种共享计划的问题被称为`parameter\
  \ sniffing`。在清单 4-10 中，你可以看到用于测试参数嗅探的存储过程。\n\n```\n/*-------------------------------------------------------------*\\\
  \nName:             dbo.GetCustomerAndOrderNumberByProductID\nAuthor:          \
  \ Elizabeth Noble\nCreated Date:     2022-10-30\nDescription:      Get customer\
  \ and products ordered for an order number\nSample Usage:\nEXECUTE dbo.GetCustomerAndOrderNumberByProductID\
  \ 1\n\\*-------------------------------------------------------------*/\nCREATE\
  \ PROCEDURE dbo.GetCustomerAndOrderNumberByProductID\n@ProductID     INT\nWITH RECOMPILE\n\
  AS\nSELECT\ncus.FirstName,\ncus.LastName,\nord.OrderNumber,\nord.OrderDate,\nprd.ProductName,\n\
  SUM(dtl.QuantitySold),\ndtl.ProductPrice\nFROM dbo.Customer cus\nINNER JOIN dbo.CustomerOrder\
  \ ord\nON cus.CustomerID = ord.CustomerID\nINNER JOIN dbo.OrderDetail dtl\nON ord.CustomerOrderID\
  \ = dtl.CustomerOrderID\nINNER JOIN dbo.Product prd\nON prd.ProductID = dtl.ProductID\n\
  WHERE prd.ProductID = @ProductID\nGROUP BY cus.FirstName,\ncus.LastName,\nord.OrderNumber,\n\
  ord.OrderDate,\nprd.ProductName,\ndtl.ProductPrice\nORDER BY cus.FirstName, cus.LastName;\n\
  Listing 4-10\n用于按产品查找客户和订单的存储过程\n```\n\n对于产品而言，存储在表中的不同产品类型数量可能存在显著差异。如果你有成百上千个望远镜售出，但只有少量桨板售出，你可能会遇到参数嗅探影响应用程序性能的场景。在此场景中，你可能执行一个想要查询望远镜的存储过程。第一次调用存储过程时，SQL\
  \ Server 会使用提供的参数来生成执行计划。该执行计划最终将存储在计划缓存中。要测试参数嗅探，你可能需要用给定的参数执行存储过程，如清单 4-11 所示。\n\
