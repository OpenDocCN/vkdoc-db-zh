  ## SQL Server 索引操作详解


  这表示 SQL Server 按照聚集索引排序的顺序查看了数据，但不得不扫描整个表以找到满足查询所需的所有记录。


  SQL Server 使用术语 `查找` 来表示无需搜索索引的大部分就能找到所需数据。当访问的记录多于表 `t` 中的匹配记录时，SQL Server 将此称为
  `扫描`。虽然查找或扫描可以应用于聚集索引，但它们也可以应用于非聚集索引。非聚集索引的排序顺序与聚集索引或表（如果表是堆）不同。非聚集索引按照索引中指定的键列顺序进行排序。如果表上存在聚集索引，非聚集索引将包含一个指回聚集索引的指针。如果没有聚集索引，则非聚集索引将指回表中的行
  ID。


  如果执行计划使用了非聚集索引，SQL Server 有几种不同的方式可以搜索数据记录。如果 SQL Server 知道如何在非聚集索引中找到数据，你将在执行计划中看到一个索引查找。索引查找将如图
  7-13 所示。


  ![](img/480547_2_En_7_Fig13_HTML.jpg)


  一张快照展示了执行计划中聚集索引查找的图标。


  图 7-13: 索引查找图标


  如果根据编写的 `T-SQL` 代码无法使用聚集索引查找，次优选择是索引查找，即在非聚集索引上进行查找。如果无法进行查找，SQL Server 最终将使用索引扫描。与聚集索引扫描类似，这意味着
  SQL Server 需要遍历索引来查找必要的数据记录。如果执行计划使用了索引扫描，图 7-14 显示了它在执行计划中的呈现方式。


  ![](img/480547_2_En_7_Fig14_HTML.jpg)


  一张快照展示了执行计划中聚集索引扫描的图标。


  图 7-14: 索引扫描图标


  同样，与聚集索引扫描类似，如果你看到索引扫描，你可能希望研究一下在重写 `T-SQL` 以使用索引查找方面可以做些什么。


  在编写 `T-SQL` 查询时，请记住需要哪种数据。虽然包含额外的数据字段可能会带来额外的硬件开销，但它也会影响 SQL Server 搜索数据记录的方式。如果
  SQL Server 需要使用索引查找或索引扫描来找到所需的数据记录，这并不意味着所有数据字段都需要存在于非聚集索引中。如果需要额外的数据列，SQL Server
  可能需要通过非聚集索引从聚集索引中获取这些额外的数据列。当这种情况发生时，你将在执行计划中看到一个键查找，如图 7-15 所示。


  ![](img/480547_2_En_7_Fig15_HTML.jpg)


  一张快照展示了执行计划中键查找的图标。该图标用于从聚集索引中获取额外的数据列。


  图 7-15: 键查找图标


  当你看到键查找时，这表明查询所需的所有列并非都存在于非聚集索引中。在这些情况下，这意味着可能需要修改索引以包含这些列。在决定将这些数据字段添加为包含列之前，你应该意识到在索引中包含列可能会带来与写入或更新索引相关的额外成本。


  没有聚集索引的表也称为堆。如果表上没有其他索引，SQL Server 将不得不逐行搜索以找到查询结果所需的数据记录。虽然涉及许多其他因素，但这可能导致 SQL
  Server 扫描整个表。这可以在图 7-16 的执行计划中看到。


  ![](img/480547_2_En_7_Fig16_HTML.jpg)


  一张快照展示了执行计划中表扫描的图标。该图标用于扫描整个表。


  图 7-16: 表扫描图标


  一些非常小的表可能不需要索引，使用表扫描可能是可以接受的。如果表中有很多记录，那么表扫描就不理想了。在这种情况下，你可能需要调查是否可以向该表添加任何可能的索引。


  如果堆上存在非聚集索引，SQL Server 有可能在执行计划中使用该非聚集索引。如果是这种情况，你将看到索引查找或索引扫描。当执行计划中出现索引查找或索引扫描时，查询中使用的列可能不存在于非聚集索引中。如果需要在表中查找额外的列，你将在执行计划中看到一个
  `RID` 查找。你可以在图 7-17 中看到这一点。


  ![](img/480547_2_En_7_Fig17_HTML.jpg)


  一张快照展示了执行计划中 `R I d` 查找的图标。当需要在表中查找额外的列时使用该图标。


  图 7-17: `RID` 查找图标


  与键查找类似，你需要查看是否可以修改任何非聚集索引以包含 `T-SQL` 代码中必要的列。也有可能修改查询以排除导致 `RID` 查找的列。


  例如，清单 7-6 展示了一个检索名字以字母 S 开头的所有客户的查询。


