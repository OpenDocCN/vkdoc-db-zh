  像这样查看数据还可以让你看到数据之间的相似之处。


  当你编写 T-SQL 代码时，你希望用更少的、针对 SQL Server 运行的单独查询来返回所需的数据。目标是考虑同时对所有行执行相同的操作。在前面的例子中，你可以快速确定哪些记录具有相同的城市名称。数据提示，如果你想查看或更改有关同一城市客户的信息，可能有不止一种方法可以实现此目标。这种类型的场景可能表明你的逻辑应该以某种方式构建，使其能够通过使用关系或变量而不是硬编码或静态值来正确运行。





  ### 理解数据检索


  过程式代码被描述为不仅告诉系统做什么，还要告诉它如何做。在许多公司中，软件开发人员或软件工程师负责编写 `T-SQL` 代码。我从与开发人员互动中学到的一件事是，编写应用程序代码本质上是过程式的。许多应用程序开发人员一天中的大部分时间都在过程式环境中处理代码。这意味着在过程式应用程序代码和数据库
  `T-SQL` 代码之间切换上下文的心智成本可能非常高。编写基于集合的代码所使用的思维过程，可能与以迭代方式处理代码的思维过程截然不同。


  #### 基于集合设计的价值


  我们为什么会对使用基于集合的设计感兴趣？为什么值得这么做？这与 `SQL Server` 引擎的工作方式以及如何检索查询数据有关。当发出一个查询时，`SQL Server`
  需要检索一条或多条数据记录。当 `SQL Server` 为查询结果检索数据时，数据页必须位于内存中。这块预留用于存放数据页的内存被称为 `缓冲区缓存`，也称为
  `缓冲池`。`SQL Server` 会查看 `缓冲区缓存` 以确认所需数据是否可用。图 5-1 展示了如果数据已缓存在 `缓冲池` 中，`SQL Server`
  作为查询请求的一部分检索数据所经历的过程。


  ![一个块流程图，显示了标题为查询、命令解析器、优化器、查询执行器和缓冲池的块。所有块之间由前向和后向箭头分隔。](img/480547_2_En_5_Fig1_HTML.jpg)


  **图 5-1** 单个查询的数据检索


  数据是逐行检索还是作为集合检索，取决于过程逻辑或程序代码。如果 `T-SQL` 是使用 `基于游标的逻辑` 编写的，它将采用逐行处理，这将导致 `SQL Server`
  为每条记录都访问 `缓冲区缓存`。一次检索单行的过程会增加 `SQL Server` 的工作负载。由于每个查询本身就是一个集合（这个集合可以只包含一个元素），我们的目标是设计出能够用最少数量的独立查询来处理最大数量可用记录的查询。设计查询以处理更大的数据集，将避免
  `SQL Server` 必须多次迭代执行同一个查询。在图 5-2 中，你可以看到逐行检索数据所需的额外工作负载。


  ![一个块流程图，显示了三行标题为查询、命令解析器、优化器、查询执行器和缓冲池的块。所有块之间由前向和后向箭头分隔。](img/480547_2_En_5_Fig2_HTML.jpg)


  **图 5-2** 当查询一次检索一行时的数据检索


  #### 缓冲池的作用


  图 5-2 显示了当数据存储在 `缓冲池` 中时，一次检索单个记录的查询过程。然而，如果查询是为 `基于集合的设计` 编写的，那么只会对 `缓冲池` 进行一次调用。对于小数据集，这可能影响不大。但当处理包含数千或数百万条记录的数据集时，执行时间的差异可能是巨大的。


  关于数据如何在 `缓冲区缓存` 中存储，还有另一点需要考虑。当 `SQL Server` 执行查询并取回数据时，它只取回存在于 `缓冲区缓存` 中的数据。从 `SQL
  Server 2019` 开始，有一个名为 `混合缓冲池` 的功能。`混合缓冲池` 允许将存储在 RAM 和持久内存 (PMEM) 中的数据都视为 `缓冲区缓存`
  的一部分。否则，如果数据不在 RAM 或 PMEM 中，`SQL Server` 将需要访问磁盘来检索数据。检索到的数据随后将被存储在内存中。图 5-3 展示了如何从磁盘检索数据并存储到
  `缓冲区缓存` 中。


  ![一个块流程图，显示了标题为查询、命令解析器、优化器、查询执行器、缓冲池和数据文件的块。所有块之间由前向和后向箭头分隔。](img/480547_2_En_5_Fig3_HTML.jpg)


  **图 5-3** 从磁盘到缓冲区缓存的数据检索


  当查询执行时，该数据在那个时间点可能甚至不在 `缓冲区缓存` 中。`SQL Server` 必须访问磁盘子系统来查找该数据。一旦找到数据，该数据就会被存储到 `缓冲区缓存`
  中。


  #### 性能影响


  如果每一行都单独提取，那么对磁盘 I/O 的调用就必须为每条记录单独进行。从 `缓冲区缓存` 提取数据并非瞬间完成。从磁盘 I/O 获取数据，将其放入 `缓冲区缓存`，然后再由查询检索，这个过程更是资源密集型。最终，这会形成一个场景，让你希望专注于
  `基于集合的设计`，以便为执行的查询提供尽可能最佳的速度和性能。




