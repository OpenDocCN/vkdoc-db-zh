  \n这里有一个新的联接，允许执行计划用相同的计划处理不同形状的数据。这就是自适应联接运算符的使用。目前，需要理解的重要一点是，执行计划中的自适应联接运算符让 SQL\
  \ Server 能够在查询执行时选择两个不同运算符中的一个，如图 4-4 所示。\n\n![](img/480547_2_En_4_Fig4_HTML.jpg)\n\
