  \ SQL Server 如何组合这些数据。\n\n总的来说，目标是使用对正在连接的数据最有效的物理连接方式。合并连接（Merge joins）可以表现得非常好，但它们仅限于已通过索引或\
  \ `ORDER BY` 或 `GROUP BY` 语句排序的数据。正如预期的那样，使用索引的合并连接比不使用索引的合并连接表现更好。当数据未排序，特别是如果被连接的两侧数据中有一侧数据量较小时，SQL\
  \ Server 可能会使用嵌套循环（nested loop）。你需要确认循环遍历另一个表不会产生显著的成本。就像使用索引的合并连接比不使用索引的合并连接性能更好一样，嵌套循环也是如此。对于合并连接和嵌套循环，看看你是否可以调整你的\
  \ `T-SQL` 代码以使用索引。这并不意味着在没有索引时创建索引；相反，你可以检查表上的索引，看看是否有任何索引适用于你的特定查询。如果表未排序，特别是如果连接两侧的记录数都很大，那么哈希匹配（hash\
  \ match）可能是理想的解决方案。\n\n在本章中，我介绍了使用执行计划的各个方面。我从访问和查看执行计划的一些方法开始。我还讨论了估计执行计划、实际执行计划以及计划缓存中的执行之间的区别。查看执行计划时，有一些项目，如箭头大小、估计行数和实际行数，可以为你提供有关下一步如何改进\
  \ `T-SQL` 代码性能的线索。研究这些项目后，你可能还能够检查执行如何使用索引。不仅关注使用了哪些索引，还关注 SQL Server 如何搜索这些索引，这很有帮助。连接表时，使用能够引用特定逻辑连接类型行为的\
  \ `T-SQL` 代码。这些逻辑连接类型会影响执行计划中使用的物理连接类型。通过以不同方式编写 `T-SQL` 代码，你可能能够影响 SQL Server 生成的执行计划。本章涵盖的信息应能帮助你更熟练地审查你的\
  \ `T-SQL` 代码，并提高与之相关的速度及硬件使用效率。\n\n"
- '# 8. 为 T-SQL 优化数据库


  在本书的这一部分，我介绍了编写 `T-SQL` 代码的许多方面。我首先介绍了在查询中使用基于集合的设计。在设计查询时，设计能有效利用硬件的查询也很重要。检查查询性能的一种方法是使用执行计划。一旦你获得了想要改进的查询的执行计划，就可以开始专注于如何优化该查询。在优化
  `T-SQL` 方面，有一些可用的选项。


  当你开始对查询进行性能调优时，有许多选项可供选择。过去，一个选项是手动识别性能不佳的查询并进行改进。在识别需要优化的查询时，有许多不同的因素需要考虑。从 `SQL
  Server 2017` 开始，附加功能允许 SQL Server 自动改进执行 `T-SQL` 某些方面的性能。随着 `SQL Server 2019` 的发布，有了更多的增强功能，可以在不改变底层
  `T-SQL` 代码的情况下，帮助查询运行得更好、更快。本章将展示 SQL Server 的最新变化，包括 `SQL Server 2022`，以及如何利用它们在不重写
  `T-SQL` 的情况下提升代码性能。



  ## 使用查询存储


  在 SQL Server 中执行查询时，一个关键优势是使用执行计划。在第[7]章中，我简要讨论了内存如何在 SQL Server 中使用，而在第[8]章中，我解释了执行计划如何保存在它们自己的计划缓存中。执行计划的一个挑战发生在执行计划从计划缓存中被清除时。生成新的执行计划不仅有关联成本，而且还存在新的执行计划可能比原始计划性能更差的风险。


  从 SQL Server 2016 开始，有了一项关于如何管理执行计划的新功能。除了仅在计划缓存中提供执行计划外，还可以选择保存有关已生成执行计划的历史信息。最大的优势在于与计划本身一起保存的性能信息。这个新功能称为**查询存储**。要使用查询存储，必须按清单[8-1]所示启用它。


  ```sql

  ALTER DATABASE Menu

  SET QUERY_STORE (OPERATION_MODE = READ_WRITE);

  -- 清单 8-1

  -- 启用查询存储的查询

  ```


  启用查询存储后，SQL Server 可以随时间跟踪执行计划。SQL Server 2022 还引入了为可用性组中的副本编译查询存储数据的功能。这可能非常有用，特别是如果您使用只读副本来卸载报告任务。除了跟踪执行计划外，查询存储还记录执行统计信息。从
  SQL Server 2017 和 Azure SQL Database 开始，查询存储还跟踪有关特定查询执行的等待统计信息。您可以使用查询存储来识别一个被编译或优化成不同计划的查询。您还可以使用查询存储来强制优化器一致地选择特定性能更好的计划。


  在 SQL Server 2016 中，您必须手动管理查询存储以确定您的 T-SQL 代码是否有更好的执行计划。如果您在查询存储中找到一个会受益于某个执行计划的查询，您需要手动为该查询强制一个计划。这导致了随时间推移的额外维护，因为随着数据库中数据的变化，您需要返回并撤销强制的计划。


  ### 优化逻辑读取


  您可能见过一些看起来运行良好的 T-SQL 代码。代码及时执行并返回正确的结果。然而，当您查看某个 SQL Server 监控工具时，您可能会注意到一些意外行为，表明您的系统上存在性能问题。在某些情况下，您可能会发现一些查询正在读取未包含在结果集中的内存中的页面。读取数据页可以识别为逻辑读取。您应该查看
  T-SQL 代码的执行计划，以找出可能导致此差异的原因。这涉及查看正在执行的 T-SQL 代码，并尝试确定可以采取哪些措施来提高性能。


  优化此查询以减少读取量的优势在于，这应该会减少作为此查询执行的一部分而读入内存的数据页数量。换句话说，读取比查询结果所需更多数据的缺点是，应用程序更频繁使用的页面可能会过早地从内存中清除。不幸的是，我们通常只在发现应用程序运行缓慢或崩溃时才意识到性能问题。此时，很难诊断出导致问题的具体查询。如果您无法访问监控软件，这种情况可能会变得更加难以排查。当我最初开始调查性能问题时，我会检查
  SQL Server 代理的作业历史记录。有时您会发现一个与生产问题同时运行的进程。虽然这并不能确认 SQL Server 代理作业是原因，但它可能值得调查。


  对于这些情况，最好是知道导致性能问题的确切存储过程或预处理语句。除了第三方软件、查询存储或先前设置的扩展事件之外，您可能只有很少的可用选项。此外，我更喜欢在发生中断之前识别可能导致性能问题的查询。如果我无法访问第三方工具，我会使用
  DMV 在查询成为问题之前找到它们。我经常将前述任何操作与性能监视器结合使用，以帮助随时间跟踪 SQL Server 并确认我的性能调整是否有效。


  如果您没有第三方工具或者您想更熟悉 DMV 以找到需要性能调整的 T-SQL，您可以查询 `sys.dm_exec_query_stats`。这个 DMV 跟踪已执行的
  T-SQL 代码的统计信息，并且仍然是计划缓存的一部分。这将仅返回尚未从计划缓存中清除的查询的结果。如果您认为此 DMV 缺少您期望看到的一些存储过程，您可能需要对您的计划缓存进行一些研究，并确定缓存是否被即席查询填满。您需要将此数据与
  `sys.dm_exec_sql_text` 连接，以查找与统计信息关联的 T-SQL 代码。


  在尝试查找具有高逻辑读取的查询时，您希望根据各种条件查看 T-SQL 代码。查看平均逻辑读取通常是我寻找要性能调整的查询时的主要目标。我更喜欢这个指标，因为它通常能识别在服务器上频繁运行并且读取量可能超出我预期的
  T-SQL 代码。如果有一个在服务器上频繁运行的进程，我不期望平均读取次数会很高，因为一个频繁的进程意味着 T-SQL 代码与应用程序直接相关。还有一些查询运行频率不高，但运行时使用大量逻辑读取。根据我的经验，如果总逻辑读取量很高而总执行次数很低，我会将这些查询的优先级排在那些具有更高平均逻辑读取值和大量执行次数的
  T-SQL 代码之后。



  '
- "# 性能优化：查询与执行计划分析\n\n一旦确定了需要进行性能调整的 T-SQL 代码，就需要同时查看代码和执行计划，以便熟悉查询正在检索的数据以及 SQL\
  \ Server 如何检索这些数据。清单 8-2 展示了一个你将进行优化的查询。\n\n```sql\nDECLARE @CustomerID        \
  \ INT = 1;\nDECLARE @CustomerOrderID    INT = 401508;\nDECLARE @ProductID      \
  \    INT = 1;\n-- 获取特定客户和产品的所有订单\nSELECT cus.CustomerID,\n       ord.CustomerOrderID,\n\
  \       prd.ProductID\nINTO #TmpOrder\nFROM dbo.Customer cus\nINNER JOIN dbo.CustomerOrder\
  \ ord\n    ON cus.CustomerID = ord.CustomerID\nINNER JOIN dbo.OrderDetail dtl\n\
  \    ON ord.CustomerOrderID = dtl.CustomerOrderID\nINNER JOIN dbo.Product prd\n\
  \    ON dtl.ProductID = prd.ProductID\nWHERE (cus.CustomerID = @CustomerID OR @CustomerID\
  \ = -1)\n  AND (ord.CustomerOrderID = @CustomerOrderID OR @CustomerID = -1)\n  AND\
  \ (dtl.ProductID = @ProductID OR @ProductID = -1)\n  AND prd.IsActive = 1;\n\nSELECT\
  \ ProductID\nINTO #HistPriceCost\nFROM dbo.ProductPriceHistory\nGROUP BY ProductID\n\
  HAVING COUNT(*)>3;\n\nSELECT cus.CustomerID,\n       cus.FirstName,\n       cus.LastName,\n\
  \       ord.CustomerOrderID,\n       ord.OrderNumber,\n       prd.ProductName,\n\
  \       dtl.QuantitySold,\n       dtl.ProductPrice\nFROM #TmpOrder tor\nINNER JOIN\
  \ #HistPriceCost hpc\n    ON tor.ProductID = hpc.ProductID\nLEFT JOIN dbo.Customer\
  \ cus\n    ON tor.CustomerID = cus.CustomerID\nINNER JOIN dbo.CustomerOrder ord\n\
  \    ON tor.CustomerOrderID = ord.CustomerOrderID\nINNER JOIN dbo.OrderDetail dtl\n\
  \    ON tor.CustomerOrderID = dtl.CustomerOrderID\n    AND tor.ProductID = dtl.ProductID\n\
  INNER JOIN dbo.Product prd\n    ON tor.ProductID = prd.ProductID\nWHERE cus.IsActive\
  \ = 1\nORDER BY\n    cus.CustomerID,\n    CASE WHEN\n        (\n            cus.CustomerID\
  \ = @CustomerID\n            AND ord.CustomerOrderID = @CustomerOrderID\n      \
  \  )\n        THEN 0\n        ELSE 1\n    END,\n    ord.CustomerOrderID DESC,\n\
  \    cus.LastName ASC;\n\nDROP TABLE #TmpOrder;\nDROP TABLE #HistPriceCost;\n```\n\
  *清单 8-2 客户订单原始查询*\n\n你还需要从计划缓存中获取执行计划，以便查看 SQL Server 如何执行 T-SQL 代码。图 8-1 中的部分执行计划展示了一个可能受益于优化的环节。\n\
  \n![](img/480547_2_En_8_Fig1_HTML.jpg)\n\n*图 8-1 清单 8-2 的部分执行计划*\n\n该执行计划中有一条粗线，在哈希匹配后变成细线。这很好地表明，该查询有可能通过优化来减少总体的读取量。基于此信息，你需要调查来自`dbo.OrderDetail`的数据如何与`dbo.Customer`和`dbo.CustomerOrder`的结果相结合。通过查看\
  \ T-SQL 代码或其输出，你可以更好地理解此查询的目的。该查询返回所有产品价格已变更超过三次的客户订单，以及下这些订单的客户信息。\n\n了解这一点有助于你开始优化此查询的逻辑读取过程。你知道此查询基于价格已变更超过三次的产品。如果专注于仅查找包含价格已变更超过三次的产品的订单，可能可以减少读取次数。虽然`dbo.OrderDetail`表是按`CustomerOrderID`排序，然后再按`OrderDetailID`排序，但这在清单\
  \ 8-2 中的 T-SQL 代码仅查找包含特定产品的客户订单时并无帮助。执行计划表明 SQL Server 正在使用一个非聚集索引来检索数据。创建此索引的 T-SQL\
  \ 代码如清单 8-3 所示。\n\n```sql\nCREATE NONCLUSTERED INDEX [IX_OrderDetail_ProductID_CustomerOrderID]\n\
  ON [dbo].OrderDetail;\n```\n*清单 8-3 为 OrderDetail 表创建索引的查询*\n\n非聚集索引不会更改表中数据的顺序，但索引会保持索引数据的排序。在此情况下，索引首先按`ProductID`列的值对数据排序，然后按`CustomerOrderID`排序。非聚集索引还必须能够引用回聚集索引，因为当\
  \ SQL Server 决定使用此非聚集索引但也可能需要表中的一些额外数据时，就需要这样做。SQL Server 通过将聚集索引的列作为此索引的一部分来实现这一点。这对你是有帮助的，因为这意味着可以使用此索引中的`OrderDetailID`来查找包含此产品的所有订单明细。\n\
  \n这一切听起来都不错，但看起来此索引目前并未提供最佳性能。虽然你可以致力于调整索引，但我发现，在非常大的表和高度事务性的系统中，你可能无法添加或修改现有索引。有时这些索引的存在正是为了确保应用程序的关键部分性能良好，它们正在做它们需要做的事情。修改这些索引可能会带来更多麻烦。在这个场景中你是幸运的，你只需向清单\
  \ 8-1 中的 T-SQL 代码添加一行，就能减少读取次数。索引按`ProductID`排序，然后是`CustomerOrderID`。如果你从查询中移除`(...\
  \ AND @IsActive = 1)`，你或许可以使索引更高效地工作。参见清单 8-4。\n\n\n"
