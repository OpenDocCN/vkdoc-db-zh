  自适应联接运算符属性\n\n如你所见，自适应联接允许 SQL Server 在`hash join`运算符和`nested loop`运算符之间动态选择。该运算符在哈希联接和嵌套循环联接之间切换的能力，有助于缓解许多因参数嗅探而经历的性能问题。名为`Adaptive\
  \ Join`的批处理模式在 SQL Server 2017 中引入，只要你的数据库兼容级别为 140 或更高，它就可用。我将在第 8 章中更详细地讨论自适应联接。\n\
  \n\n\n## 使用复杂逻辑\n\nSQL Server 中有一些基本操作并不复杂。这些基本操作可能包括对单表进行插入、读取、更新和删除，可称为 CRUD（创建、读取、更新、删除）操作。其中一些操作可能涉及少量连接（join），但在某些时候，可能会需要更复杂的逻辑。使用\
  \ T-SQL 时面临的挑战之一就是处理复杂逻辑。\n\n### 分解请求\n\n处理复杂逻辑时，牢记几点很重要。处理复杂逻辑的第一步是将请求分解为更小的部分。这部分逻辑包括弄清楚需要从哪些数据开始，以及如何将这些数据精简为更小的数据集。你还需要专注于将所有需求分解为简化的步骤。\n\
  \n许多查询请求可能涉及处理那些设计时未充分利用关系型数据库优势的数据库，以及那些设计时未考虑集成或与遗留应用程序交互的系统。通常，我们无法控制被要求做什么，如果我们能设计数据在数据库中的存储方式，那已经是很幸运的了。\n\
  \n### 编码方法与性能的平衡\n\n这类场景也可能涉及各种不一定符合最佳实践的编码方法。这包括需要循环处理数据，包括递归。有时，你可能还想使用关联子查询或处理各种字符串，如\
  \ XML 或 JSON。虽然这些选项中许多看起来像是完美的解决方案，但很多都过于复杂。这就需要在让 T-SQL 代码易于理解和让 T-SQL 代码拥有良好性能之间进行权衡，而这可能很棘手。目标是展示那些看似更高级的查询技术可能正是导致应用程序性能不佳的原因。\n\
  \n人们常常倾向于按照特定的验收标准或业务需求来编写代码。有时这很有效，最终会得到性能非常好的代码。但在其他情况下，尝试编写解决复杂问题的代码不仅可能困难重重、令人沮丧，而且如果\
  \ T-SQL 代码没有以最适合 SQL Server 的方式编写，就有可能出现严重的性能问题。我发现，如果我保持代码简单直接，SQL Server 通常能发挥最佳性能。这也意味着，使用\
  \ SQL Server 中的新功能在性能方面可能并不总能产生最佳结果，即使代码编写起来更容易。\n\n### 常见的性能陷阱：循环\n\n我最常见到 T-SQL\
  \ 代码未考虑 SQL Server 如何发挥最佳性能的情况就是涉及循环。SQL Server 允许使用多种选项来循环处理数据，虽然代码会返回正确的结果，但我经常发现其对\
  \ SQL Server 造成的开销比找到与相同数据交互的其他方法要大得多。我将第 2 章中的代码（清单 2-29）在清单 4-13 中重复了相同的逻辑。\n\n\
  ```\nSET NOCOUNT ON;\nDECLARE @ProductID INT,\n@ProductName VARCHAR(25),\n@message\
  \ VARCHAR(50);\nPRINT '-------- Product Listing --------';\nDECLARE product_cursor\
  \ CURSOR DYNAMIC\nFOR\nSELECT ProductID, ProductName\nFROM dbo.Product;\nOPEN product_cursor;\n\
  FETCH NEXT FROM product_cursor\nINTO @ProductID, @ProductName;\nWHILE @@FETCH_STATUS\
  \ = 0\nBEGIN\nPRINT ' ';\nSELECT @message = '----- Customers For Products: ' + @ProductName\
  \ + '-----';\nPRINT @message;\nSELECT LEFT(cus.FirstName, 25), LEFT(cus.LastName,\
  \ 25), SUM(dtl.QuantitySold) AS QuantitySold\nFROM dbo.CustomerOrder ord\nINNER\
  \ JOIN dbo.OrderDetail dtl\nON ord.CustomerOrderID = dtl.CustomerOrderID\nINNER\
  \ JOIN dbo.Product prd\nON dtl.ProductID = prd.ProductID\nINNER JOIN dbo.Customer\
  \ cus\nON ord.CustomerID = cus.CustomerID\nWHERE prd.ProductID = @ProductID\nGROUP\
  \ BY cus.FirstName, cus.LastName, prd.ProductName;\nFETCH NEXT FROM product_cursor\
  \ INTO @ProductID, @ProductName;\nEND\nCLOSE product_cursor;\nDEALLOCATE product_cursor;\n\
  清单 4-13\n创建动态游标\n```\n\n这个查询将给出我们想要的确切结果，但 SQL Server 必须为游标正在分析的每一行重复游标内部的逻辑。当游标内部的查询逻辑编写良好时，影响可能微乎其微。然而，真正的挑战发生在查询内部的\
  \ T-SQL 代码执行缓慢或占用大量硬件资源时。这时服务器可能会消耗更多资源，导致查询速度变慢，并且如果查询时间超过应用程序超时时间，还可能导致应用程序出现问题。虽然很容易将问题归咎于游标本身，但其他情况，如\
  \ WHILE 循环（而非游标），也可能导致性能问题。\n\n### 性能下降的可能性及替代方法\n\n另一个较大的难题是，即使代码在首次创建时性能良好，随着数据库的增长或数据形态的变化，其性能也有可能随时间推移而下降。在这种情况下，曾经看似很棒的解决方案可能迅速变成最大的难题之一。有一些选项可以通过以更高效、资源消耗更少的方式编写\
  \ T-SQL 代码来获得相同的输出。\n\n处理复杂逻辑时，做笔记并尝试将问题分解为更小的步骤可能是有益的。在清单 4-14 中，你会看到注释概述了获得与清单\
  \ 4-13 中返回的数据输出相同的所需步骤。\n\n```\n-- 为所有产品创建报告标题\n-- 为每个产品重复以下步骤\n---- 为每个产品创建章节副标题\n\
  ---- 列出所有客户及其购买每种产品的数量\n清单 4-14\n使用注释简化 T-SQL 代码逻辑\n```\n\n理想情况下，分解验收标准的过程使你能够专注于从哪里开始最小化数据访问。从两个不同的角度来看待这个查询。首先是确定如何开始将数据精简到结果中仅需要的数据。我通常会在查询设计的早期就尝试这样做。我也会尝试寻找那些我知道所需\
  \ T-SQL 代码会很简单的部分。\n\n参考清单 4-15，验收标准是显示购买了产品的所有客户。另一个需求是为每个产品显示一个包含产品名称的标题。需要注意的是，这个示例是为了展示如何使用不同的\
  \ T-SQL 编码技术来提高性能。如果你收到编写此类 T-SQL 代码的请求，你可能需要与内部团队协作，看看是否可以用其他方式处理。最好首先专注于查询中最简单的部分。在这种情况下，获取每个产品的所有客户列表是最简单的需求代码集，请参见清单\
  \ 4-15。\n\n\n\n```\n-- 为所有产品创建报表标题\n-- 为每个产品重复以下部分\n---- 为每个产品创建节标题\n---- 列出所有客户的每种产品销售数量\n\
  SELECT cus.FirstName, cus.LastName, prd.ProductName, SUM(dtl.QuantitySold) AS QuantitySold\n\
  FROM dbo.CustomerOrder ord\nINNER JOIN dbo.OrderDetail dtl\nON ord.CustomerOrderID\
  \ = dtl.CustomerOrderID\nINNER JOIN dbo.Product prd\nON dtl.ProductID = prd.ProductID\n\
  INNER JOIN dbo.Customer cus\nON ord.CustomerID = cus.CustomerID\nGROUP BY cus.FirstName,\
  \ cus.LastName, prd.ProductName;\n```\n代码清单 4-15\n获取所有客户的所有产品部件\n\n既然你已经知道了如何获取购买了特定产品的所有客户，就可以继续添加逻辑片段了。下一个挑战是弄清楚如何为每个产品创建一个标题。代码清单\
  \ 4-16 展示了一种开始添加标题信息的方法。\n\n```\n-- 为所有产品创建报表标题\nPRINT '-------- 产品列表 --------';\n\
  -- 为每个产品重复以下部分\nSELECT\n'----- 产品客户： ' + ProductName + '-----'\nFROM  dbo.Product\n\
  ---- 为每个产品创建节标题\n---- 列出所有客户的每种产品销售数量\nSELECT cus.FirstName, cus.LastName, prd.ProductName,\
  \ SUM(dtl.QuantitySold) AS QuantitySold\nFROM dbo.CustomerOrder ord\nINNER JOIN\
  \ dbo.OrderDetail dtl\nON ord.CustomerOrderID = dtl.CustomerOrderID\nINNER JOIN\
  \ dbo.Product prd\nON dtl.ProductID = prd.ProductID\nINNER JOIN dbo.Customer cus\n\
  ON ord.CustomerID = cus.CustomerID\nGROUP BY cus.FirstName, cus.LastName, prd.ProductName;\n\
  ```\n代码清单 4-16\n将所有数据汇总到一起\n\n添加了一些标题信息后，你就可以开始让输出匹配代码清单 4-13 中游标返回的输出。在代码清单 4-17\
  \ 中，你可以看到匹配原始输出所需的所有代码。\n\n```\nSET NOCOUNT ON;\n-- 创建临时表来存储产品信息\nCREATE TABLE #ProductList\n\
  (\nOrderedList             INT,\nProductID               INT,\nSectionHeader   \
  \        VARCHAR(100)\n);\n-- 为每个产品重复以下部分\n---- 为每个产品创建节间距\nINSERT INTO #ProductList\
  \ (OrderedList, ProductID, SectionHeader)\nSELECT\n0 AS OrderedList,\nProductID,\n\
  '' AS SectionHeader\nFROM  dbo.Product;\n---- 为每个产品创建节标题\nINSERT INTO #ProductList\
  \ (OrderedList, ProductID, SectionHeader)\nSELECT\n10 AS OrderedList,\nProductID,\n\
  '----- 产品客户： ' + ProductName + ' -----' AS SectionHeader\nFROM  Product;\n---- 为每个产品添加客户的列标题\n\
  INSERT INTO #ProductList (OrderedList, ProductID, SectionHeader)\nSELECT\n15 AS\
  \ OrderedList,\nProductID,\nCAST('FirstName' AS CHAR(25)) + ' ' +\nCAST('LastName'\
  \ AS CHAR(22)) + ' ' +\nCAST('QuantitySold' AS CHAR(19)) AS SectionHeader\nFROM\
  \  dbo.Product;\nINSERT INTO #ProductList (OrderedList, ProductID, SectionHeader)\n\
  SELECT\n20 AS 'OrderedList',\nProductID,\n'---------------------- ----------------------\
  \ ----------------' AS SectionHeader\nFROM  dbo.Product;\n---- 列出每个产品的所有客户\nINSERT\
  \ INTO #ProductList\n(\nOrderedList,\nProductID,\nSectionHeader\n)\nSELECT\n25 AS\
  \ 'OrderedList',\ngrp.ProductID,\nCAST(grp.FirstName AS CHAR(25)) + ' ' +\nCAST(grp.LastName\
  \ AS CHAR(22)) + ' ' +\nCAST(CAST(grp.QuantitySold AS VARCHAR) AS CHAR(19)) AS SectionHeader\n\
  FROM\n(\nSELECT cus.FirstName, cus.LastName, prd.ProductID, SUM(dtl.QuantitySold)\
  \ AS QuantitySold\nFROM dbo.CustomerOrder ord\nINNER JOIN dbo.OrderDetail dtl\n\
  ON ord.CustomerOrderID = dtl.CustomerOrderID\nINNER JOIN dbo.Product prd\nON dtl.ProductID\
  \ = prd.ProductID\nINNER JOIN dbo.Customer cus\nON ord.CustomerID = cus.CustomerID\n\
  GROUP BY cus.FirstName, cus.LastName, prd.ProductID\n) AS grp;\nSELECT SectionHeader\
  \ AS '-------- 产品列表 --------'\nFROM #ProductList\nORDER BY ProductID, OrderedList;\n\
  DROP TABLE #ProductList;\n```\n代码清单 4-17\n为避免使用游标而重写的查询\n\n当结果输出为文本时，原始游标给出了如图 4-5\
  \ 所示的输出。\n\n![](img/480547_2_En_4_Fig5_HTML.jpg)\n\n一张截图显示了顶部的产品列表。它进一步显示了望远镜、飞盘高尔夫盘和充气桨板等产品的客户详情。\n\
  \n图 4-5\n游标的输出\n\n为了确认代码清单 4-17 的重写是正确的，我在执行相同查询时将结果捕获为文本。图 4-6 中的输出看起来是一样的。\n\n\
  ![](img/480547_2_En_4_Fig6_HTML.jpg)\n\n一张截图显示了顶部的产品列表。它进一步显示了望远镜、飞盘高尔夫盘和充气桨板等产品的客户详情。\n\
  \n图 4-6\n修改后查询的输出\n\n然而，这些输出仅在导出为文本时才相似。在处理小数据集时，额外的代码和工作量似乎并非必需。通常，大多数性能问题只有在性能显著且负面影响应用程序性能时才会变得明显。就这两种方法而言，在处理两条记录时，性能看起来是一样的。但是，当处理超过\
  \ 10,000 种售出的产品时，立即就能清楚地看到代码清单 4-17 的查询性能明显更好。\n\n本章介绍了如何以及为何要使用存储过程。这包括创建可重用且一致的代码。你还看到了参数如何提高代码的可扩展性。参数有助于使你的代码更具适应性和动态性。参数在许多不同的场景中都很有用。虽然参数在许多不同情况下都非常有用，但你也需要确保你的\
  \ `T-SQL` 不会受到参数嗅探的负面影响。你探索了可能需要使用 `T-SQL` 解决复杂问题的常见情况。当你保持代码更直接明了时，`T-SQL` 的性能会更好。这可能意味着代码的可读性或整洁度会降低，但\
  \ `SQL Server` 会更清楚如何获得最优的执行计划。\n\n这也结束了当前关于编写易于理解的 `T-SQL` 的部分。这种 `T-SQL` 为每种情况使用了最佳的数据类型。这通常是占用最少空间并提供必要精度的数据类型。你还需要了解可用于构建\
  \ `T-SQL` 的各种 `SQL Server` 数据库对象。你必须权衡使用一种数据库对象相对于另一种的益处与挑战。在某些情况下，你需要决定代码可读性或数据库性能哪个更重要。编写易于理解的\
  \ `T-SQL` 的另一个方面是格式化、命名和注释你的 `T-SQL`，以便他人能够快速理解你所写的内容。\n\n在使用 `T-SQL` 时，有时你会希望编写可以多次一致调用的\
  \ `T-SQL`。使用参数可以让这段 `T-SQL` 代码变得更加灵活。当面对不那么直接的 `T-SQL` 编写任务时，将代码分解成片段以简化需要编写的内容。一旦你对编写易于理解的\
  \ `T-SQL` 感到得心应手，你就准备好编写高效的 `T-SQL`，并最小化对 `SQL Server` 的性能影响了。\n\n\n\n"
- '# 5. 基于集合的设计


  掌握 T-SQL 的设计方法是编写专业代码的基础。一旦你能够编写出易于理解的 T-SQL 代码，便可以专注于优化 T-SQL 代码的性能。如果你是在工作中非正式地学习了
  T-SQL，或者你的主要职责是为软件应用程序编写代码，那么在编写 T-SQL 代码时可能不会下意识地考虑基于集合的设计。或者，你可能是一位经验丰富的数据库开发人员，想了解更多关于基于集合设计的知识。


  在本章中，我将讨论如何处理数据。第一步是熟悉与数据交互的各种方式。一旦理解了与数据交互的不同方式，就可以开始思考如何以最佳格式为查询准备数据。然后，你应该能够以利用
  SQL Server 天然优势的方式来编写这些查询。


  ## 介绍基于集合的设计


  基于集合设计的概念是确保处理过程尽可能靠近数据进行。这样做可以最大限度地减少网络往返次数。它还可以最大限度地减少数据库引擎内的上下文切换。


  逐行处理速度很慢，因为部分逻辑位于数据库引擎外部的某个程序中。或者在 T-SQL 游标循环的情况下，逻辑位于过程代码中，这需要为每一行进行上下文切换，并且每一行都需要从访问实际数据的数据库引擎部分传递到运行
  T-SQL 的部分。


  基于集合的处理将所有内容尽可能深入地推入数据库引擎。每一行都不会单独返回给调用程序，也不会为每一行发生上下文切换。数据库引擎全速运行，进行你指定的任何更改。


  数据几乎在我们生活的方方面面都会产生，其中大部分数据出于各种目的被存储。为了提高数据检索速度，考虑数据的存储和访问方式通常很重要。使用 SQL Server 可以让你利用数据之间的关系。这是因为
  SQL Server 是一个关系数据库管理系统。虽然本书的重点是编写 T-SQL，但理解数据的存储方式也将帮助你编写返回值速度更快的查询。


  本书使用一个名为 `OutdoorRecreation` 的示例数据库，代表一家专门销售环保、合乎道德来源的户外装备的公司。为了了解数据可以存储的各种方式，让我们首先看看可能有用的信息类型：


  *   客户名称

  *   客户地址

  *   产品

  *   产品成本

  *   产品价格

  *   订单日期

  *   订单状态

  *   当前产品价格

  *   销售数量


  查看上面的列，你可以开始将数据分组到类似的类别中。例如，你可以按如表 5-1 所示对客户信息进行分组。


  表 5-1


  OutdoorRecreation 的一般信息


