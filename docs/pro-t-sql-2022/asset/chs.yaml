  图 7-23: 带有包含列的非聚集索引的执行计划


  一张快照展示了执行计划。使用非聚集索引的索引查找，成本 100%。


  执行计划显示查询仍在使用非聚集索引。由于此索引已更改以包含 SELECT 语句中的额外列，执行计划也随之改变。之前使用非聚集索引时，执行计划包含索引查找和键查找。现在执行计划仅使用索引查找。


  一旦你熟悉了阅读执行计划，就可以开始利用它们来确定如何提升性能。当你查看执行计划时，可能会发现聚集索引扫描。这通常意味着 SQL Server 必须遍历整个表来查找符合查询条件的数据。正如本节所示，创建一个包含连接条件的非聚集索引可以帮助提升查询性能。如果你发现
  SQL Server 必须执行键查找，可以看看将被选择的列作为非聚集索引的一部分包含进来是否合理。理解 SQL Server 如何使用索引有助于改进查询性能。理解
  SQL Server 如何比较来自多个数据集的数据也能帮助你提升查询性能。



  ## 执行计划中的逻辑连接类型


  本章最后一节将深入探讨 SQL Server 中几种不同的逻辑连接运算符，包括 `INNER JOIN`、`LEFT` 或 `RIGHT OUTER JOIN`
  以及 `FULL OUTER JOIN`。逻辑连接运算符的类型、数据的排序方式、被比较数据的大小以及数据的比较方式，可以共同决定 SQL Server 在执行计划中可以使用的物理运算符。文中提供了
  T-SQL 以及物理运算符的示例，以便您理解逻辑运算符与物理运算符之间的关联。


  除了阅读执行计划和理解索引之外，您的 T-SQL 代码也可用于决定执行计划的生成方式。在某些情况下，表如何连接在一起，与数据如何存储在表中同等重要。有时，您连接列的方式也可能影响您的执行计划。`WHERE`
  子句中的一些 T-SQL 可能会影响查询执行中使用的逻辑连接类型。如果多个查询被组合在一起，也可能改变查询的执行方式。最终，T-SQL 代码的编写方式与 SQL
  Server 决定如何执行查询之间存在着关联。


  ### 逻辑连接类型


  SQL Server 中有几种不同的逻辑连接。其中一些逻辑连接在 T-SQL 中很容易识别，包括 `INNER JOIN`、`LEFT OUTER JOIN`、`RIGHT
  OUTER JOIN` 和 `FULL OUTER JOIN`。这些并不是 SQL Server 中存在的唯一逻辑连接。对于某些 T-SQL 命令，SQL Server
  会将一个表与另一个表进行比较，以查找匹配或不匹配的记录。在这些情况下，SQL Server 执行的不是完整的连接，而是 `半连接`。这种连接类型并未在 T-SQL
  命令中明确指定，但一些像 `EXISTS` 或 `NOT EXISTS` 这样的 T-SQL 命令会指示使用 `半连接`。可用的 `半连接` 类型包括 `左半连接`、`左反半连接`、`右半连接`
  和 `右反半连接`。最后，还有一些逻辑连接是通过在同一事务中组合两个或更多查询结果而关联的。它们包括 `串联`（通常与 `UNION ALL` 关联）或 `UNION`
  逻辑连接（可在 T-SQL 中使用 `UNION` 时发生）。基于逻辑连接，SQL Server 将决定可以使用哪些物理连接。这样，逻辑连接就可以用来影响查询性能。


  ### 物理连接运算符


  存在一些可以与逻辑连接相关联的物理连接运算符。四种物理连接运算符称为 `合并连接`、`哈希连接`、`嵌套循环` 和 `自适应连接`。当使用 `INNER JOIN`
  时，这四种物理连接运算符中的任何一种都可能作为执行计划的一部分使用。数据在表中的存储方式以及表的相对大小可能会影响使用哪个物理运算符。


  #### 合并连接


  如果被比较的两个表中的数据都已排序，则可以将来自两个表的记录并排进行比较。这使得 SQL Server 能够快速找到匹配或不匹配的记录（取决于查询要求）。当这种情况发生时，称为
  `合并连接`。`合并连接` 物理运算符出现在图 7-24 所示的执行计划中。


  ![](img/480547_2_En_7_Fig24_HTML.jpg)


  一个快照展示了执行计划中合并连接的图标。它用于查找匹配或不匹配的记录。


  图 7-24 合并连接图标


  #### 哈希匹配


  有时，要连接在一起的表并未排序。如果是这种情况，SQL Server 仍然可以比较各个表之间的行。但是，SQL Server 需要将记录转换为易于比较的形式。这可以通过哈希处理来完成。如果
  SQL Server 对两个表中被比较的列进行哈希处理并进行比较，那么物理运算符将是 `哈希匹配`。如果您在执行计划中看到图 7-25 中的图标，那么您就知道
  SQL Server 正在执行 `哈希匹配` 物理连接。


  ![](img/480547_2_En_7_Fig25_HTML.jpg)


  一个快照展示了执行计划中哈希匹配的图标。它用于将记录转换为易于比较的形式。


  图 7-25 哈希匹配图标


  #### 嵌套循环


  如果存在两个表，其中一个表比另一个小，那么 SQL Server 可能会决定将一个表的值逐行与另一个表的所有行进行比较。当这种情况发生时，SQL Server
  将使用 `嵌套循环`，如图 7-26 所示。


  ![](img/480547_2_En_7_Fig26_HTML.jpg)


  一个快照展示了执行计划中嵌套循环的图标。它用于将一张表的值逐行与另一张表的所有行进行比较。


  图 7-26 嵌套循环图标


  ### 自适应连接


  从 SQL Server 2017 开始，在 SQL Server 为查询确定执行计划时，可以使用一种新的物理连接运算符。这种新的物理连接运算符旨在帮助应对这种情况：存储在给定表中的数据可能根据
  `WHERE` 子句中的标准而有显著差异。这种物理连接允许 SQL Server 根据查询所选的数据，决定是使用 `哈希匹配` 还是 `嵌套循环`。这被称为 `自适应连接`。在
  SQL Server 2017 中，`自适应连接` 仅在列存储索引中可用。从 SQL Server 2019 开始，`自适应连接` 可以在其他场景中使用。


  ### LEFT OUTER JOIN 和 RIGHT OUTER JOIN


  在介绍可用的逻辑连接时，接下来是 `LEFT OUTER JOIN` 和 `RIGHT OUTER JOIN`。在某些方面，这两种逻辑连接类型相同但也不同。例如，`嵌套循环`
  只能使用 `LEFT OUTER JOIN`。如果查询是使用 `RIGHT OUTER JOIN` 编写的，SQL Server 将会产生额外开销来将 `RIGHT
  OUTER JOIN` 转换为 `LEFT OUTER JOIN`。除了这个特定场景，所有物理连接类型都支持 `LEFT OUTER JOIN`。在以前版本的
  SQL Server 中，根据查询中使用的是 `LEFT OUTER JOIN` 还是 `RIGHT OUTER JOIN`，SQL Server 可能生成两种不同的执行计划。这是由于连接重新排序方面的限制造成的。


  `LEFT OUTER JOIN` 对于何时可以使用一种物理连接类型而不是另一种，有一些具体的规则。清单 7-9 显示了按标识符对表进行排序。


  ```sql

  ALTER TABLE [dbo].[OrderDetail]

  ADD CONSTRAINT [PK_OrderDetail]

  PRIMARY KEY CLUSTERED ([OrderDetailID] ASC);

  ```


  清单 7-9 按 OrderDetailID 对数据排序的主键


  一旦表已按 `OrderDetailID` 排序，您就可以将 `CustomerOrder` 表连接到 `OrderDetail` 表。此连接的 T-SQL 代码如清单
  7-10 所示。


  ```sql

  SELECT ord.OrderNumber

  FROM dbo.CustomerOrder ord

  LEFT OUTER JOIN dbo.OrderDetail dtl

  ON ord.CustomerOrderID = dtl.CustomerOrderID

  WHERE ord.CustomerOrderID < 80000;

  ```


  清单 7-10 CustomerOrder 和 OrderDetail 之间的外连接


  在此场景中，两个表未按相同方式排序。`CustomerOrder` 表按 `CustomerOrderID` 排序，而 `OrderDetail` 表按 `OrderDetailID`
  排序。您可以在图 7-27 中看到物理运算符是 `哈希匹配`。


  ![](img/480547_2_En_7_Fig27_HTML.jpg)


