  \ 18%和 17%。\n\n图 4-2\n参数对应大量记录的存储过程的执行计划\n\n如果你稍后返回并想为桨板重新运行该存储过程，SQL Server 将重用最初为查询望远镜（其记录很多）生成的执行计划。然而，SQL\
