  | --- | --- |

  | Stacy | Parks |


  表 5-4


  第二个客户作为单条记录


  | 名字 | 姓氏 |

  | --- | --- |

  | Josè | Gomez |


  表 5-3


  第一个客户作为单条记录


  | 名字 | 姓氏 |

  | --- | --- |

  | Myra | Acharya |


