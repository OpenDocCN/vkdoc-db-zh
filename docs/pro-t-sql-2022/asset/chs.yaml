- "# 处理事务型数据的报告\n\n## 概述\n\n我们经常发现，对数据库的主要需求之一就是提供报告功能。本节将介绍如何利用参数，在基于不同条件获取相同信息时，提高代码的可重用性。还将提供一个示例，说明如何使用视图来创建一个标准化的数据集，该数据集可以在多个应用程序中重复使用。这个视图也可以在其他代码中被复用。一个包含另一个视图的视图被称为\
  \ `嵌套视图`。但需要注意的是，使用视图，尤其是嵌套视图时，应谨慎行事，本节稍后将对此进行讨论。\n\n## 处理 OLTP 数据库的报告\n\n大多数应用程序使用的数据库都旨在处理大量事务。这些数据库的整体设计被称为联机事务处理或\
  \ `OLTP`。这些数据库通常设计用于快速存储和检索数据。这种行为涉及大量的数据库写入操作。\n\n然而，您的业务最终可能决定需要从这个运行着某个应用程序的同一数据库中获取汇总或报告信息。理想情况下，您应该只让\
  \ `OLTP` 应用程序（而不是报告应用程序）访问事务服务器上的数据库。您需要充分了解您的业务，以及任何报告查询可能对应用程序性能产生的影响。您或许可以运行非常简单的\
  \ `SELECT` 语句，这些语句只访问一小部分数据，而不会对您的应用程序产生负面影响。您应尽一切努力，限制为处理应用程序之外的数据请求而给 SQL Server\
  \ 带来的额外负载。\n\n当为了报告目的访问大量数据时，可能会导致主要应用程序或 `OLTP` 应用程序的性能下降。这包括生成执行计划所需的额外 `CPU`\
  \ 资源，这些计划可能已被清除出缓存，以便为运行报告工作负载的查询腾出空间。在大量数据被移入内存用于报告后，应用程序在内存中的数据也可能从缓冲池中被清除。这些问题会级联发生，最终导致您的应用程序性能受到报告工作负载的影响。如果您发现自己需要直接从事务型数据库进行报告，请与您的管理团队沟通报告可能对应用程序产生的影响。\n\
  \n## 收集报告数据的挑战\n\n当您需要为报告访问数据时，需要对同一数据库进行大量的读取操作。事务型数据并非为处理报告可能需要的庞大数据量而设计。它通常针对读取少量数据的查询进行了优化，例如为应用程序屏幕读取一个订单或一个客户。此外还有其他挑战。\n\
  \n在某些情况下，收集这些报告数据可能很简单。可能涉及少量的连接操作，或者底层逻辑并不复杂。您最终可能写好了一份报告，并且由于报告质量不错，可能会被要求创建更多报告。这些额外的报告可能涉及许多表，或者查询的整体逻辑可能更加复杂。这通常是因为这些表在设计之初并未考虑到报告需求。在某些情况下，您可能会发现您被要求对不存在的数据进行报告。\n\
  \n## 硬编码报表的问题\n\n为了快速开发报表，最简单的方法通常是为每个单独的报表编写特定的逻辑。久而久之，这可能导致您最终拥有大量本应返回相同或类似结果的报表。最好的情况是结果相似，但底层代码不同。随着业务可能会更改某些应用程序的功能，情况会变得更加复杂。可能很容易识别出一些需要更新的报表，而其他报表则被遗漏并开始返回不准确的结果。\n\
  \n在某个时间点，您可能会收到一个请求，要求根据您的事务型数据生成报告。通常，这些请求最初可能只是一个简单的一次性数据请求。假设一个用户想要访问名字为 Stacy\
  \ 的客户的订单信息。虽然这可能最初只是一个运行查询并获取一些数据的请求，但您可能会发现，最终您的用户希望这个报告可以随时运行，或者由特定的一群人运行。此时，您可能会编写一个类似代码清单\
  \ 13-16 中的查询。\n\n```sql\nSELECT cus.FirstName,\n       cus.LastName,\n       ord.CustomerOrderID,\n\
  \       ord.OrderNumber,\n       prd.ProductName,\n       dtl.QuantitySold,\n  \
  \     dtl.ProductPrice\nFROM dbo.Customer cus\nINNER JOIN dbo.CustomerOrder ord\n\
  \    ON cus.CustomerId = ord.CustomerID\nINNER JOIN dbo.OrderDetail dtl\n    ON\
  \ ord.CustomerOrderID = dtl.CustomerOrderID\nINNER JOIN dbo.Product prd\n    ON\
  \ dtl.ProductID = prd.ProductID\nWHERE cus.FirstName = 'Stacy';\n```\n*代码清单 13-16:\
  \ Stacy 客户的订单*\n\n虽然报表开发的具体细节超出了本书的范围，但我很少在工作中遇到不需要定期从事务型数据库中请求某种报告数据的情况。前面的查询没有显示存储过程，但您同样可以轻松地使用存储过程来选择这些数据。代码清单\
  \ 13-16 中查询的问题在于，它是硬编码的，只返回名字为 Stacy 的客户的结果。\n\n随着时间的推移，企业在分析数据时通常需要不同或额外的信息。这可能表现为需要一份新报表来显示另一个客户的信息。现在，您的用户想要一份关于\
  \ Myra 订单的报告。这也可能是一个用 Myra 的报告替换 Stacy 报告的请求。无论哪种情况，您都需要创建一个类似于代码清单 13-17 的查询。\n\
  \n```sql\nSELECT cus.FirstName,\n       cus.LastName,\n       ord.CustomerOrderID,\n\
  \       ord.OrderNumber,\n       prd.ProductName,\n       dtl.QuantitySold,\n  \
  \     dtl.ProductPrice\nFROM dbo.Customer cus\nINNER JOIN dbo.CustomerOrder ord\n\
  \    ON cus.CustomerId = ord.CustomerID\nINNER JOIN dbo.OrderDetail dtl\n    ON\
  \ ord.CustomerOrderID = dtl.CustomerOrderID\nINNER JOIN dbo.Product prd\n    ON\
  \ dtl.ProductID = prd.ProductID\nWHERE cus.FirstName = 'Myra';\n```\n*代码清单 13-17:\
  \ Myra 客户的订单*\n\n虽然您已经满足了为 Stacy 创建一份报表和为 Myra 创建一份新报表的要求，但您也增加了维护报表的开销。代码清单 13-16\
  \ 和 13-17 中的查询是分开维护的。如果其中一个报告的数据提取方式发生变化，您需要记住另一个报告可能也需要修改。\n\n## 使用参数提高可重用性\n\n\
  如果您发现自己处于这种情况，下一步就是想办法开始合并报告中的数据集。您首先需要识别哪些报告返回相似的结果。这些可以是处理相同业务应用程序或相同功能的报告。您需要创建一个查询，返回该应用程序或功能的所有相关信息。这将作为基础数据源，用于更新您现有的报告。代码清单\
  \ 13-18 中的查询展示了编写一个可用于两份报告的查询的一种方法。\n\n```sql\nDECLARE @FirstName VARCHAR(40);\n\
  SELECT cus.FirstName,\n       cus.LastName,\n       ord.CustomerOrderID,\n     \
  \  ord.OrderNumber,\n       prd.ProductName,\n       dtl.QuantitySold,\n       dtl.ProductPrice\n\
  FROM dbo.Customer cus\nINNER JOIN dbo.CustomerOrder ord\n    ON cus.CustomerId =\
  \ ord.CustomerID\nINNER JOIN dbo.OrderDetail dtl\n    ON ord.CustomerOrderID = dtl.CustomerOrderID\n\
  INNER JOIN dbo.Product prd\n    ON dtl.ProductID = prd.ProductID\nWHERE cus.FirstName\
  \ = @FirstName;\n```\n*代码清单 13-18: 通过多个连接获取订单信息*\n\n\n\n### 参数化查询与代码复用\n\n在本次查询中，您使用了一个名为\
  \ `@FirstName` 的参数。此参数允许您为 `@FirstName` 变量设置一个值。该值可以根据运行的报告而改变。在使用报表服务器时，可以为每个报告设置\
  \ `@FirstName` 的值。此类查询允许您为多种类型的报告使用同一套代码。这意味着您可以将同一个查询用于 Stacy 和 Myra，或是针对特定客户的报告请求。\n\
  \n在清单 [13-18] 中创建查询，可以使您的整体代码可复用。这可以解决从事务型数据生成报告的相关问题之一。从事务型数据进行报告时可能遇到的另一个问题是表之间逻辑的复杂性。在清单\
  \ [13-19] 中，关于客户和订单的信息已被扁平化，以更紧密地符合数据仓库的设计方式。\n\n```sql\nCREATE VIEW dbo.CustomerOrderInformation\n\
  AS\nSELECT\n    cus.FirstName,\n    cus.LastName,\n    cus.FirstName + ' ' + cus.LastName\
  \ AS FullName,\n    cus.[Address],\n    cus.City,\n    cus.Country,\n    cus.PostalCode,\n\
  \    cus.IsActive AS CustomerIsActive,\n    ord.CustomerOrderID,\n    ord.OrderNumber,\n\
  \    prd.ProductName,\n    dtl.QuantitySold,\n    dtl.ProductPrice,\n    prd.IsActive\
  \ AS ProductIsActive\nFROM dbo.Customer cus\nINNER JOIN dbo.CustomerOrder ord\n\
  \    ON cus.CustomerID = ord.CustomerID\nINNER JOIN dbo.OrderDetail dtl\n    ON\
  \ ord.CustomerOrderID = dtl.CustomerOrderID\nINNER JOIN dbo.Product prd\n    ON\
  \ dtl.ProductID = prd.ProductID;\n```\n*清单 13-19 客户订单信息*\n\n## 视图设计与简化逻辑\n\n与清单\
  \ [13-18] 中的查询类似，清单 [13-19] 中的查询旨在让您的 T-SQL 代码能适应各种场景复用。这种设计降低了查询或报告所需逻辑的复杂性。清单\
  \ [13-20] 中的查询与清单 [13-18] 中的查询功能相同。\n\n```sql\nCREATE PROCEDURE dbo.CustomerOrderByFirstName\n\
  \    @FirstName VARCHAR(40)\nAS\nSELECT\n    co.FirstName,\n    co.LastName,\n \
  \   co.CustomerOrderID,\n    co.OrderNumber,\n    co.ProductName,\n    co.QuantitySold,\n\
  \    co.ProductPrice\nFROM dbo.CustomerOrderInformation co\nWHERE co.FirstName =\
  \ @FirstName;\n```\n*清单 13-20 从视图中获取的配方成分*\n\n这两个查询的主要区别在于，清单 [13-20] 所需的总体逻辑要简单直接得多。这可以让技术能力较弱的用户也能够基于相同的数据集创建报告。虽然这有助于保持数据的一致性和易于访问，但这种方法可能并非性能最佳。在使用此方法访问数据进行报告时，请务必监控性能并确认报告是否能在超时前返回数据。\n\
  \n## 使用 Azure Synapse Link 进行近实时报告\n\nSQL Server 2022 还可以通过使用 Azure Synapse Link\
  \ for SQL Server，帮助您基于事务型数据库的近实时副本来创建报告。Azure Synapse Link 会以极小的当前生产系统开销将数据发送到 Azure\
  \ Synapse Analytics。\n\n为了为 SQL Server 设置 Azure Synapse Link，您需要在 Azure 门户的租户中创建一个\
  \ Azure Data Lake Storage Gen2 帐户，并确保您的数据库有一个主密钥。然后，您可以通过 Synapse Studio (`https://ms.web.azuresynapse.net/en/`)\
  \ 将 SQL Server 2022 实例与 Azure Synapse Analytics 通过 Azure Synapse Link 连接起来。您需要在\
  \ Synapse Studio 中创建一个 SQL 池，然后为该池创建一个主密钥。完成后，您可以创建一个到 SQL Server 的链接服务。为了连接到您的\
  \ SQL Server 2022 实例，您需要一个自承载集成运行时。完成后，您应添加一个到 Azure Data Lake Storage Gen2 帐户的链接服务。现在，Synapse\
  \ Studio 已链接到 SQL Server 2022 和 Azure Data Lake Storage Gen2 的服务，您可以在两个链接服务之间集成链接连接。设置此连接时，您可以选择要同步的表。成功发布这些更改后，您就可以启动\
  \ Azure Synapse Link。您需要等待几分钟，然后确认数据已复制到 Azure Synapse Analytics。\n\n## 数据集管理与嵌套视图的性能影响\n\
  \n此基础数据集随后可用于您所有的报告中。一旦您将报告更新为使用此基础数据集，请确认该数据集能够满足您未来的报告需求。如果您希望转向数据仓库，这能让您了解所需数据的结构。\n\
  \n正如本节开头所述，使用一个视图从另一个视图获取数据的概念称为嵌套视图。嵌套视图的想法非常诱人，因为视图可以使 T-SQL 更易于阅读和理解。然而，这种可读性通常是以性能为代价的。当访问视图时，SQL\
  \ Server 会在运行时执行 `SELECT` 语句。这本质上使视图成为执行您经常运行的查询的快捷方式。视图仍然需要确定是否存在执行计划并查找要返回的数据。即使视图的结果将用于另一个视图，情况也是如此。根据视图的设计，这甚至可能导致\
  \ SQL Server 多次访问同一个表。在嵌套到另一个视图中且两个视图都访问 `dbo.Customer` 表的视图情况下，SQL Server 将需要访问\
  \ `dbo.Customer` 表两次，一次用于嵌套视图，一次用于另一个视图。\n\n\n\n"
- '# 动态 SQL


  有时，编写可重用于众多且可能不同场景的 T-SQL 代码是理想的做法。在本节中，你将了解动态 SQL 如何用于实现代码重用。本节内容应谨慎阅读，因为动态 SQL
  存在许多问题，包括可能使你的数据库遭受攻击或损坏的风险。例如，在表单输入中包含 `;DELETE FROM dbo.Customer` 就可能导致这种情况发生。当这种情况发生时，它被称为
  `SQL 注入`，因为 SQL 代码被注入到了数据库中。


  根据你要编写的 T-SQL 代码类型，你可能会发现难以将数据库代码编写为基于集合的设计。在这些情况下，以更具迭代性的方式编写代码可能很有诱惑力。你可能希望编写高度可变、并能根据传入的参数和值进行修改的
  T-SQL 代码。动态 SQL 使你可以在代码执行时，混合使用变量和 T-SQL 代码来生成 SQL 语句。使用动态 SQL 似乎正是你一直想要的解决方案。但在大多数情况下，动态
  SQL 的弊端往往远大于其好处，不过在某些时候，动态 SQL 可能是正确的解决方案之一。


  在第 7 章中，我介绍了如何读取执行计划。使用动态 SQL 时，每次执行查询都需要计算一个新的执行计划。这会给数据库引擎带来额外的压力。


  ## 使用动态 SQL 的场景


  大多数需要使用动态 SQL 的情况都涉及需要额外灵活性的时刻。许多希望使用动态 SQL 的情况与数据库管理活动有关。这些活动大多涉及在 SQL Server 实例的多个数据库上执行相同的操作。动态
  SQL 提供了一些额外的功能，这使得使用它特别具有吸引力。


  在执行标准 T-SQL 时，不能将数据库名或表名用作变量。而使用动态 SQL 则提供了编写可在多个数据库对象上执行的查询的选项。


  ## 动态 SQL 示例


  清单 13-21 中的查询展示了一个动态 SQL 的示例。


  ```sql

  CREATE PROCEDURE dbo.TableByDynamicValues

  @TableName SYSNAME,

  @ColumnName SYSNAME,

  @ColumnValue NVARCHAR(25)

  AS

  DECLARE @ObjectID INT;

  DECLARE @ColumnList NVARCHAR(MAX);

  DECLARE @Query NVARCHAR(MAX);

  SET @ObjectID = OBJECT_ID(@TableName);

  SELECT @ColumnList = STRING_AGG (cast([name] as nvarchar(max)), '','')

  FROM sys.columns

  WHERE [object_id] = @ObjectID

  AND [name] NOT IN (N''IsActive'',N''DateCreated'',N''DateModified'',N''DateDisabled'')
  ;

  SET @Query =

  N''SELECT '' + @ColumnList +

  N'' FROM '' + @TableName +

  N'' WHERE '' + @ColumnName + N'' = @ColumnValue'';

  EXECUTE sp_executesql @Query,

  N''@ColumnName SYSNAME, @ColumnValue NVARCHAR(25)'',

  @ColumnName = @ColumnName,

  @ColumnValue = @ColumnValue;

  ```


  **清单 13-21 动态地从表中检索数据**


  此查询允许用户或应用程序传入一个表名。这将是查询其值的目标表。另外两个参数允许将列名和列值作为查询的一部分传入。此列名将用于过滤数据。清单 12-22 展示了此代码的功能。


  ```sql

  EXECUTE dbo.TableByDynamicValues N''Product'', N''ProductID'', N''1'';

  EXECUTE dbo.TableByDynamicValues N''Customer'', N''FirstName'', N''Marty`'';

  ```


  **清单 13-22 使用不同值执行存储过程**


  清单 13-22 中有两次执行同一个存储过程。第一次执行返回 `Product` 表的结果。第二次执行返回 `Customer` 表的结果。执行清单 13-22
  中的查询，你会得到表 13-4 中的结果。


  **表 13-4 动态 SQL 结果**


  | DateDisabled | ProductID | ProductName | ProductPrice |

  | --- | --- | --- | --- |

  | NULL | 1 | Telescope | 599.00 |


  | Address | City | Country | Customer ID | Date Disabled | First Name | LastName
  | Postal Code |

  | --- | --- | --- | --- | --- | --- | --- | --- |

  | 750 Cherry Rd | Memphis | United States | 410405 | 2022-08-30 | Marty` | Bethel
  | 38117 |


  返回的第一组数据是 `Product` 表中 `ProductID` 为 1 的列。清单 13-21 中的存储过程排除了 `IsActive`、`DateCreated`、`DateModified`
  和 `DateDisabled` 这些列。表中所有其他列都被返回。第二组数据中的值是 `Customer` 表中 `FirstName` 为 Marty` 的记录。从软件开发的角度来看，在编写数据库代码时，这似乎是一种理想的方法。


  ## 动态 SQL 的缺点


  然而，这种使用 T-SQL 的方法没有考虑数据库引擎如何执行查询。这将导致 SQL Server 在每次执行存储过程时生成一个新的执行计划，因为每次执行时请求的数据可能发生巨大变化。虽然动态
  SQL 似乎有助于让你的应用程序代码更灵活，但编写 T-SQL 的这种方法是有代价的。我曾在尝试创建 ETL 流程时使用动态 SQL，那时我希望以编程方式确定哪些表有主键，哪些没有。然后我可以轻松地生成一个脚本，只为那些有主键的表删除主键。总的来说，当需要编写
  T-SQL 代码时，我会在大多数场景中避免使用动态 SQL。尝试在没有动态 SQL 的情况下编写代码，将促使你实践如何利用 SQL Server 数据库引擎的优势来编写数据库代码。


  ### SQL 注入风险


  使用动态 SQL 也会增加执行超出你原始预期的额外 T-SQL 代码的风险。这种行为被称为 `SQL 注入`。SQL 注入的概念是，额外的 T-SQL 代码被插入或注入到原始语句中。被插入的额外
  T-SQL 代码实现了查询执行时原本未打算实现的功能。这可能包括查看此用户本不应访问的数据。同一用户还可能通过 SQL 注入修改数据或数据库对象。如果你想使用动态
  SQL，可以通过使用参数将值传递给动态 SQL 来最小化 SQL 注入的风险。对动态 SQL 进行参数化的方法将使用户更难以你不期望的方式查看或修改数据。


  ## 总结与建议


  编写 T-SQL 代码时，你需要编写功能有效且高效的代码。这意味着要编写可读性强且易于维护的代码。编写能够伴随业务发展的代码也是一项关键技能。如果你正在编写代码来处理插入、更新或各种数据修改，请确保你编写的代码易于理解并便于后续支持。在应用程序开发过程中，考虑你希望如何处理禁用权限或应用程序功能。如果不考虑，你需要考虑一些策略，允许你以不破坏数据库中表之间关系的方式停用数据值。你可能还需要支持遗留代码。支持遗留代码的挑战之一是在不破坏现有功能的情况下进行更改。有时你可能需要从事务型数据库中提取数据用于报告。尝试设计你的查询以实现灵活性和可重用性。虽然灵活性是好的，但也要谨慎考虑在
  T-SQL 代码中实现多大程度的灵活性。在改进了数据库代码的功能后，你可能会发现你想要确定如何跟踪数据的变更。你可以在第 14 章中学习有关日志记录的内容。



  '
- '# 14. 日志记录


  在你与 SQL Server 打交道期间，会收到来自公司的各种各样的需求。其中一些需求可能涉及更改业务逻辑或添加新功能。有时候，公司可能还想追踪过去发生的事情。有多种第三方工具有助于跟踪性能及与数据库维护相关的其他功能。然而，你的业务团队可能更关注于跟踪数据变更或了解问题出在哪里。


  这种与数据修改或错误处理相关的日志记录可以通过 T-SQL 来实现。在记录这些类型的更改时，你有多种选项可供选择。这些选项包括从最简略的活动日志到记录最细粒度的活动日志。你还需要考虑这些信息将来将如何被访问和使用。这将帮助你以一种对未来组织有益的方式记录信息。这也可以防止你记录下最终从未被使用的数据。


  ## 数据修改


  本节提供如何跟踪数据库内数据变更的示例。本节涵盖了设置变更跟踪以及使用变更跟踪时可以收集的信息类型。还有一部分内容关于启用变更跟踪以及访问从变更跟踪生成的数据。


  选择跟踪数据修改的方法需要了解你的组织需要跟踪哪些类型的信息。你可能只想在数据发生变更时记录信息。根据你的业务场景，你可能不仅需要知道数据何时变更，还需要知道具体什么发生了变化。关于如何跟踪这些变更也有几个选项。你可以选择让
  SQL Server 为你跟踪这些变更，也可以创建数据库对象来为你记录这些信息。


  在实施任何类型的日志记录时，需要考虑的事情之一是性能开销。在跟踪数据修改时，这一点可能更为关键。你需要确保选择的日志记录方法既能跟踪必要的变更，又具有可预期的性能影响。正如你可能预料到的，你实施的日志记录越详细，性能开销就越大。


  在本章讨论的所有选项中，**变更跟踪**的开销最小。如果你希望记录更详细的信息并且愿意增加资源消耗，你可能需要考虑**变更数据捕获**。另一种跟踪变更的实现方式涉及使用数据库触发器。虽然使用数据库触发器可以让你精细地调整记录内容和记录方式，但这可能会以更高的资源消耗为代价。


  根据你想记录的数据类型，一个中间选项可能是使用 **SQL Server 审核**。SQL Server 审核可用于跟踪服务器或数据库级别的活动。在记录与应用程序相关的变更的上下文中，你应该专注于数据库审核。SQL
  Server 审核中的数据库审核操作可以跟踪与所有类型数据活动相关的更改，包括访问或修改数据。SQL Server 使用扩展事件来监控审核活动。可检索的数据包括操作发生的时间、触发审核的用户信息以及受影响的对象。也可能记录审核操作发生时所执行的语句。


  关于数据修改，另一个可用的最简略日志记录活动涉及记录记录最后一次更改的时间，并递增该数据记录发生的更改次数。这种类型的跟踪由 SQL Server 内置的**变更跟踪**功能处理，该功能将自动记录表中数据的更改，并在自定义表对象中报告这些更改。要使用变更跟踪，你首先需要在数据库上启用它。在本书中，我们一直使用
  `Menu` 数据库。你需要运行清单 14-1 所示的 T-SQL 代码来在 `Menu` 数据库上启用变更跟踪。


  ```

  ALTER DATABASE OutdoorRecreation

  SET CHANGE_TRACKING = ON

  (CHANGE_RETENTION = 2 DAYS, AUTO_CLEANUP = ON);

  ```

  清单 14-1

  在 OutdoorRecreation 数据库上启用变更跟踪


  要在 `Menu` 数据库上启用变更跟踪，你需要指定数据库名称并表明你希望开启变更跟踪。前面 T-SQL 代码中的最后一行是可选的。这些值表示你希望保留更改记录的时间，以及是否应自动清理保留的历史记录。



  一旦您在 `Menu` 数据中启用了变更跟踪，就可以配置表以使用变更跟踪。您要实施变更跟踪的表必须具有主键。如果该表没有主键，您必须先添加一个，然后才能在该表上启用变更跟踪。在此情况下，您将在
  `dbo.CustomerOrder` 表上启用变更跟踪；请参考代码清单 14-2。


  ```sql

  ALTER TABLE dbo.CustomerOrder

  ENABLE CHANGE_TRACKING

  WITH (TRACK_COLUMNS_UPDATED = ON);

  ```


  **代码清单 14-2**

  在 `dbo.CustomerOrder` 表上启用变更跟踪


  现在，`dbo.CustomerOrder` 表已启用变更跟踪。变更跟踪可以记录整个数据行已更改，也可以指定特定列已更改。当您跟踪列更改时，SQL Server
  会记录发生了更改以及哪些特定列已更改。如果您没有为 `TRACK_COLUMNS_UPDATED` 指定值，SQL Server 将使用默认值 `OFF`，并且只会告诉您某行已添加到表中、从表中删除或在表内被修改，而不会提供更多细节。


  设置好变更跟踪后，您可能想确定有哪些信息可用或已更改。虽然 SQL Server 会跟踪 `dbo.CustomerOrder` 表中的更改，但这些信息无法从您可以在对象资源管理器中找到的表中获得。相反，您需要访问与
  `dbo.CustomerOrder` 表关联的 `CHANGETABLE`。一旦启用了变更跟踪，记录就会被初始化，并可以在 `CHANGETABLE` 中找到。代码清单
  14-3 中的查询展示了如何查找这些已初始化的记录。


  ```sql

  SELECT ord.CustomerOrderID,

  ord.OrderNumber,

  ord.OrderDate,

  chng.CustomerOrderID,

  chng.SYS_CHANGE_VERSION,

  chng.SYS_CHANGE_CONTEXT

  FROM dbo.CustomerOrder AS ord

  CROSS APPLY CHANGETABLE

  (VERSION CustomerOrder,

  (CustomerOrderID), (ord.CustomerOrderID)) AS chng;

  ```


  **代码清单 14-3**

  查询已初始化的记录


  此查询返回来自 `dbo.CustomerOrder` 表和 `CHANGETABLE` 的信息。表 14-1 显示了已初始化记录的示例。


  **表 14-1**

  已初始化的记录


  | CustomerOrderID | SYS_CHANGE_VERSION | SYS_CHANGE_CONTEXT |

  | --- | --- | --- |

  | 1 | NULL | NULL |

  | 2 | NULL | NULL |

  | 3 | NULL | NULL |

  | 4 | NULL | NULL |


  表 14-1 中的记录来自 `CHANGETABLE`。这里有一列是 `CustomerOrderID`（表的主键），以及用于跟踪更改信息的列。由于没有任何数据记录被修改，所有值均为
  NULL。


  您可以修改 `dbo.CustomerOrder` 表中的记录。在代码清单 14-4 中，您更新了 `DateModified`。


  ```sql

  UPDATE dbo.CustomerOrder

  SET ShipDate = SYSDATETIME()

  WHERE CustomerOrderID = 3;

  ```


  **代码清单 14-4**

  更新 `DateModified`


  既然记录已被修改，您就能更好地了解在涉及变更跟踪时信息是如何存储的。如果您再次运行代码清单 14-3 中的查询，将得到表 14-2 所示的结果。


  **表 14-2**

  更改 `ShipDate` 后的记录


  | CustomerOrderID | SYS_CHANGE_VERSION | SYS_CHANGE_CONTEXT |

  | --- | --- | --- |

  | 1 | NULL | NULL |

  | 2 | NULL | NULL |

  | 3 | 1 | NULL |

  | 4 | NULL | NULL |


  该表显示 `SYS_CHANGE_VERSION` 已从初始值 NULL 更改为 1。这表明自变更跟踪最初初始化以来，`CustomerOrderID` 为 3
  的记录已被修改。


  如果您想查找有关哪些列被更改的更多信息，代码清单 14-5 展示了查找自上次自动清理以来 `dbo.CustomerOrder` 发生更改的信息所需的查询。


  ```sql

  SELECT CustomerOrderID,

  SYS_CHANGE_OPERATION AS ChangeOperation,

  CHANGE_TRACKING_IS_COLUMN_IN_MASK

  (COLUMNPROPERTY

  (OBJECT_ID(''CustomerOrder''), ''OrderNumer'', ''ColumnId''),

  SYS_CHANGE_COLUMNS) AS OrderNumberChange,

  CHANGE_TRACKING_IS_COLUMN_IN_MASK

  (COLUMNPROPERTY

  (OBJECT_ID(''CustomerOrder''), ''OrderDate'', ''ColumnId''),

  SYS_CHANGE_COLUMNS) AS OrderDateChange,

  CHANGE_TRACKING_IS_COLUMN_IN_MASK

  (COLUMNPROPERTY

  (OBJECT_ID(''CustomerOrder''), ''ShipDate'', ''ColumnId''),

  SYS_CHANGE_COLUMNS) AS ShipDateChange,

  CHANGE_TRACKING_IS_COLUMN_IN_MASK

  (COLUMNPROPERTY

  (OBJECT_ID(''CustomerOrder''), ''DateCreated'', ''ColumnId''),

  SYS_CHANGE_COLUMNS) AS CreatedChange,

  CHANGE_TRACKING_IS_COLUMN_IN_MASK

  (COLUMNPROPERTY

  (OBJECT_ID(''CustomerOrder''), ''DateModified'', ''ColumnId''),

  SYS_CHANGE_COLUMNS) AS ModifiedChange,

  CHANGE_TRACKING_IS_COLUMN_IN_MASK

  (COLUMNPROPERTY

  (OBJECT_ID(''CustomerOrder''), ''DateDisabled'', ''ColumnId''),

  SYS_CHANGE_COLUMNS) AS DisabledChange,

  SYS_CHANGE_CONTEXT

  FROM CHANGETABLE

  (CHANGES dbo.CustomerOrder,0) as ChngTbl

  ORDER BY SYS_CHANGE_VERSION;

  ```


  **代码清单 14-5**

  查找已更改的记录


  需要此版本信息来查找此表上更改的状态。代码清单 14-5 中的查询展示了您可用于访问此信息的一种方法。表 14-3 显示了代码清单 14-5 中查询的结果。


  **表 14-3**

  变更跟踪结果集


  | CustomerOrderID | ChangeOperation | OrderNumberChange | OrderDateChange | ShipDateChange
  | CreatedChange | ModifiedChange |

  | --- | --- | --- | --- | --- | --- | --- |

  | 3 | U | False | False | True | False | False |


  这些结果记录自代码清单 14-4 中发出的更新。


  受影响的 `CustomerOrderID` 列在表 14-3 的第一列。这与代码清单 14-4 中更新的 `CustomerOrderID` 相匹配。`ChangeOperation`
  列出为 `U`，表示更新。这也与代码清单 14-4 中的 DML 操作相匹配。表 14-3 中的最后五列是使用特定函数填充的，用于揭示变更跟踪表中指示的列。如果列被修改，该函数返回
  `True` 值；如果数据未被修改，则返回 `False` 值。在代码清单 14-4 的情况下，唯一更新的列是 `DateModified`。这与表 14-3
  中的结果相匹配。`OrderNumberChange`、`OrderDateChange`、`CreatedChange` 和 `DisabledChange`
  列均为 `False`。这些值未被更改。然而，`ModifiedChange` 列为 `True`。这表明引用的列 `DateModified` 已被更改。


  使用变更跟踪时，在一致性方面存在一些潜在问题。存储数据不影响数据的一致性。数据一致性受影响是数据检索过程的一部分。您可以尽一切可能确保访问变更跟踪表中最新的数据。这包括检查变更跟踪中最后同步的版本，并确认该版本仍然可用。但是，如果变更跟踪中的版本早于保留期，则这些数据可能在检索之前就被清理掉了。使用变更跟踪时，您还可能遇到在最后一次同步之后发生数据修改的情况。这可能导致返回额外的版本或修改的记录。这些情况中的任何一种都可能影响变更跟踪返回数据的一致性。最小化一致性问题的最佳实践是使用快照隔离级别。




  '
- "# 变更数据捕获详解\n\n### 概念与权衡\n\n如果需要了解比“哪一行或哪一列被更改”以及“该记录自实施变更跟踪以来发生了多少次更改”更多的信息，您可能需要考虑\
  \ **变更数据捕获**。与 **变更跟踪** 类似，使用 **变更数据捕捕获** 也有其优缺点。\n\n最大的好处是 **变更数据捕获** 将捕获与已更改数据记录相关的详细信息。\n\
  \n-   对于插入的数据，您将能够准确识别向表中添加了什么。\n-   同样，您将能够确定被删除数据记录的所有列。\n-   更新数据时，您将能够访问更新前后的数据。\n\
  \n缺点包括：\n\n-   对表的每次更改都要求至少有一条记录被写入跟踪表。\n-   另一个缺点是，为每个被跟踪的表都会创建两个 **SQL Server\
  \ Agent** 作业。\n-   随着您在 **变更数据捕获** 下管理的表数量增加，所使用的资源量也会增加。这可能会导致与 **变更数据捕获** 相关的性能开销变得非常严重，以至于阻止您实施该功能。\n\
  \n### 启用变更数据捕获\n\n如果决定使用 **变更数据捕获**，您可以更新数据库中的一个表来使用它。在此之前，您需要允许在您的数据库上运行 **变更数据捕获**。您可以通过运行代码清单\
  \ 14-6 中的 **T-SQL** 代码来按数据库启用 **变更数据捕获**。\n\n```sql\nUSE OutdoorRecreation;\nGO\n\
  EXECUTE sys.sp_cdc_enable_db;\nGO\n```\n*代码清单 14-6 在 Menu 数据库上启用数据库跟踪*\n\n### 在特定表上启用\n\
  \n现在您已经启用了 **变更数据捕获**，需要选择一个表，您只关心记录何时发生变化。让我们在表 `dbo.CustomerOrder` 上实施 **变更数据捕获**。在此表上启用\
  \ **变更数据捕获** 之前，您需要确保此实例上正在运行 **SQL Server Agent**。在代码清单 14-7 中，您可以找到在此表上实施 **变更数据捕获**\
  \ 所需的数据库代码。\n\n```sql\nUSE OutdoorRecreation;\nGO\nEXECUTE sys.sp_cdc_enable_table\n\
  \    @source_schema = 'dbo',\n    @source_name = 'CustomerOrder',\n    @role_name\
  \ = NULL;\nGO\n```\n*代码清单 14-7 在 dbo.CustomerOrder 表上启用数据库跟踪*\n\n您至少需要指定表架构、表名以及可以访问此数据的数据库角色。如果将角色名指定为\
  \ `NULL`，则 **变更数据捕获** 记录的信息将对所有人可访问。一旦此表启用了 **变更数据捕获**，您将能够在 **SQL Server Agent**\
  \ 中找到新创建的作业。**T-SQL** 代码（代码清单 14-7）完成后，您会收到一条消息。您可以在图 14-1 中查看此消息的示例。\n\n![](img/480547_2_En_14_Fig1_HTML.jpg)\n\
  \n*图 14-1 显示已创建的 SQL Server Agent 作业的消息*\n\n启用 **变更数据捕获** 的过程还会在 `cdc` 架构中创建多个系统表。在图\
  \ 14-2 中，您可以找到为管理 **变更数据捕获** 而创建的系统表。\n\n![](img/480547_2_En_14_Fig2_HTML.jpg)\n\
  \n*图 14-2 为变更数据捕获创建的系统表*\n\n### 跟踪更改\n\n您将用于跟踪 `dbo.CustomerOrder` 上更改的表是 `cdc.dbo_CustomerOrder_CT`\
  \ 表。\n\n如果您在空表上实施 **变更数据捕获**，您将能够跟踪数据记录何时更改，同时也能够跟踪自表创建以来发生了多少次更改。代码清单 14-8 包含一个向\
  \ `dbo.CustomerOrder` 插入记录的脚本。\n\n```sql\nINSERT INTO dbo.CustomerOrder\n(\n   \
  \ CustomerID,\n    OrderNumber,\n    OrderDate,\n    IsActive,\n    DateCreated,\n\
  \    DateModified\n)\nVALUES\n(\n    3,\n    'T15493',\n    SYSDATETIME(),\n   \
  \ 1,\n    SYSDATETIME(),\n    SYSDATETIME()\n);\n```\n*代码清单 14-8 将客户订单插入 dbo.CustomerOrder*\n\
  \n当向现有表添加 **变更数据捕获** 时，情况会有所不同。如果您向现有表添加 **变更数据捕获**，您仍然能够跟踪数据记录何时发生变化，但您只能确定自实施\
  \ **变更数据捕获** 以来发生了多少次数据修改。\n\n之前在代码清单 14-8 中，您在 `dbo.CustomerOrder` 表上启用了 **变更数据捕获**。如果您假设该表为空，然后向其中插入一些记录，您将能够确定这些记录是何时添加的。执行代码清单\
  \ 14-9 中的查询将显示 **变更数据捕获** 表中的记录。\n\n```sql\nSELECT\n    __$start_lsn,\n    __$end_lSN,\n\
  \    __$seqval,\n    __$operation,\n    __$update_mask,\n    CustomerOrderID,\n\
  \    CustomerID,\n    OrderNumber,\n    OrderDate,\n    ShipDate,\n    IsActive,\n\
  \    DateCreated,\n    DateModified,\n    DateDisabled,\n    __$command_id\nFROM\
  \ cdc.dbo_CustomerOrder_CT;\n```\n*代码清单 14-9 查询 dbo.CustomerOrder 的变更数据捕获表*\n\n\
  您可以在表 14-4 中检查已跟踪的数据记录信息的子集。\n\n*表 14-4 dbo.CustomerOrder 的变更跟踪输出*\n\n| __$start_lsn\
  \ | __$operation | CustomerOrderID | CustomerOrder |\n| --- | --- | --- | --- |\n\
  | 0x000000AF0001FA500005 | 2 | 802821 | T15493 |\n\n虽然记录的信息看起来不多，但保存在此表中的信息可能非常有用。`__$operation`\
  \ 列指示了在此表上发生的操作。`__$operation` 告诉您执行了哪种类型的活动。在此案例中，`__$operation` 列中的值 `2` 表示一条记录被插入到表中。`cdc.dbo_CustomerOrder_CT`\
  \ 中的 `CustomerOrderID`、`CustomerID` 和 `DateCreated` 列是插入的部分值。\n\n执行代码清单 14-10 中的代码会更新表中的一条记录，使您能够检查变更跟踪表中的差异。\n\
  \n```sql\nUPDATE dbo.CustomerOrder\nSET OrderNumber = 'T-15493',\n    DateModified\
  \ = GETDATE()\nWHERE CustomerOrderID = 802821;\n```\n*代码清单 14-10 更新 dbo.CustomerOrder\
  \ 中的客户订单*\n\n在此查询中，您正在将订单号从 `T15493` 更改为 `T-15493`。要查找此更新的结果，您可以重新运行代码清单 14-9 中的\
  \ **T-SQL**。表 14-5 显示了该查询的结果。\n\n*表 14-5 dbo.CustomerOrder 的变更跟踪输出*\n\n| __$start_lsn\
  \ | __$operation | CustomerOrderID | CustomerOrder |\n| --- | --- | --- | --- |\n\
  | 0x000000AF0001FA500005 | 2 | 802821 | T15493 |\n| 0x000000AF0001FC300003 | 3 |\
  \ 802821 | T15493 |\n| 0x000000AF0001FC300003 | 4 | 802821 | T-15493 |\n\n\n\n###\
  \ 变更数据捕获输出\n\n表 `cdc.dbo_CustomerOrder_CT` 中将有两个条目具有相同的起始 LSN `0x000000AF0001FC300003`。这两行都与从清单\
  \ 14-10 执行的更新相关。表中第一行 `__$start_lsn` 为 `0x000000AF0001FC300003` 的行具有 `__$operation`\
  \ 为 `3`。此操作类型用于表示表中更新前的值。第二行 `__$start_lsn` 为 `0x000000AF0001FC300003` 的行具有 `__$operation`\
  \ 为 `4`。此操作值表示该行中的值是更新完成后的值。在本例中，`CustomerOrderID` 保持不变。但是，`CustomerOrder` 发生了变化。`__$operation`\
  \ 为 `3` 且 `CustomerOrder` 为 `T15493` 的行是 `CustomerOrder` 的旧值；`__$operation` 为 `4`\
  \ 且 `CustomerOrder` 为 `T-15493` 的行是新值。\n\n我已经介绍了如何在启用了变更数据捕获的表中插入和更新数据。最后要检查的操作是从表中删除记录。清单\
  \ 14-11 中的代码删除了从清单 14-8 添加的记录。\n\n```sql\nDELETE FROM dbo.CustomerOrder\nWHERE CustomerOrderID\
  \ = 802821;\n```\n清单 14-11\n删除 dbo.CustomerOrder 中的客户订单\n\n删除此记录后，可以执行清单 14-10 中的\
  \ T-SQL 来确定跟踪表中是否有新添加的记录。此查询的结果如表 14-6 所示。\n\n表 14-6\n\n dbo.CustomerOrder 的变更跟踪输出\n\
  \n| __$start_lsn | __$operation | CustomerOrderID | CustomerOrder |\n| --- | ---\
  \ | --- | --- |\n| 0x000000AF0001FA500005 | 2 | 802821 | T15493 |\n| 0x000000AF0001FC300003\
  \ | 3 | 802821 | T15493 |\n| 0x000000AF0001FC300003 | 4 | 802821 | T-15493 |\n|\
  \ 0x000000B0000003A00008 | 1 | 802821 | T-15493 |\n\n表中的最后一条记录是为了跟踪清单 14-11 中的删除操作而添加的。`__$operation`\
  \ 为 `1` 用于表示该记录正在跟踪对表执行的删除操作。\n\n如果表已存在并且您启用了变更数据捕获，您将无法找到原始数据记录的条目，直到它们被更新。一旦这些记录被修改，它们将出现在\
  \ `cdc.dbo_CustomerOrder_CT` 表中。虽然变更数据捕获在设置和实现上可能很简单，但在将表添加到变更数据捕获时应谨慎。添加到变更数据捕获的每个表都会导致创建两个\
  \ SQL Server Agent 作业。由于跟踪这些表上的更改，还会产生大量的日志记录。这两者都可能导致 SQL Server 使用额外的资源。\n\n您可以使用变更跟踪、变更数据捕获或数据库触发器来跟踪数据修改。所有这些选项都有其自身的优点和局限性。在为组织选择合适的选项时，您需要考虑需要记录的数据类型以及您愿意为跟踪这些更改所承担的性能开销。如果您需要更好的性能，通常必须选择较少的功能。您想要收集的信息越多，或者您想要自定义记录数据修改的程度越高，都将导致硬件利用率增加和潜在的性能开销。\n\
  \n## 错误处理\n\n本节讨论如何编写 T-SQL 代码，以便在遇到错误时能按预期（甚至优雅地）运行。一种解决方案是使用 `TRY…CATCH` 块。这是编写\
  \ T-SQL 代码时的一种流行方法。但是，它确实需要对未设计为能优雅处理 SQL Server 错误的应用程序进行一些潜在的修改。另一个不太稳健的选择是创建数据库表来记录历史信息以及日志活动。这可能在防止应用程序崩溃方面帮助不大，但它可能有助于显示问题开始发生的时间。\n\
  \n除了记录数据修改外，记录数据库中发生的某些类型的错误也可能对您有益。虽然可能会发生特定于 SQL Server 的错误，但这并不是本节的重点。也有一些错误是由于应用程序与数据库交互而产生的。其中许多错误可以作为应用程序开发的一部分在\
  \ SQL Server 外部记录。但是，您可能会发现某些问题需要从 SQL Server 内部访问。\n\n在考虑错误处理时，您需要考虑如何记录该信息以及应用程序如何处理错误。在\
  \ SQL Server 内部更常见的选项之一是使用 `TRY...CATCH` 块。这段代码封装了尝试执行 T-SQL 代码并在尝试失败时执行特定操作的能力。如果代码成功，则\
  \ T-SQL 代码将按预期执行。清单 14-12 展示了一个 `TRY…CATCH` 块。\n\n```sql\nCREATE PROCEDURE dbo.CustomerOrderInsert\n\
  @CustomerID INT,\n@OrderNumber VARCHAR(15),\n@OrderDate DATETIME2(2),\n@ShipDate\
  \ DATETIME2(2),\n@IsActive BIT,\n@DateCreated DATETIME2(2),\n@DateModified DATETIME2(2),\n\
  @DateDisabled DATETIME2(2)\nAS\nBEGIN TRY\nBEGIN TRANSACTION;\nINSERT INTO dbo.CustomerOrder\n\
  (\nCustomerID,\nOrderNumber,\nOrderDate,\nShipDate,\nIsActive,\nDateCreated,\nDateModified,\n\
  DateDisabled\n)\nVALUES\n(\n@CustomerID,\n@OrderNumber,\n@OrderDate,\n@ShipDate,\n\
  @IsActive,\n@DateCreated,\n@DateModified,\n@DateDisabled\n);\nCOMMIT TRANSACTION;\n\
  END TRY\nBEGIN CATCH\nROLLBACK TRANSACTION;\nEND CATCH;\n```\n清单 14-12\n用于插入客户订单的\
  \ Try…Catch 块\n\n如果没有错误，此代码块将插入一条记录。但是，如果遇到错误，事务将回滚。有一些方法可以将此功能与您的应用程序代码集成，以便用户知道事务出错。使用此方法的目标是防止应用程序崩溃或防止最终用户期望事务正确保存。\n\
  \n您还可以在 `CATCH` 块中添加错误处理，以提供有关失败原因的更多信息。您可以更新清单 14-12 中的存储过程以包含错误输出，如清单 14-13 所示。\n\
  \n```sql\nCREATE OR ALTER PROCEDURE dbo.CustomerOrderInsert\n@CustomerID INT,\n\
  @OrderNumber VARCHAR(15),\n@OrderDate DATETIME2(2),\n@ShipDate DATETIME2(2),\n@IsActive\
  \ BIT,\n@DateCreated DATETIME2(2),\n@DateModified DATETIME2(2),\n@DateDisabled DATETIME2(2)\n\
  AS\nBEGIN TRY\nBEGIN TRANSACTION;\nINSERT INTO dbo.CustomerOrder\n(\nCustomerID,\n\
  OrderNumber,\nOrderDate,\nShipDate,\nIsActive,\nDateCreated,\nDateModified,\nDateDisabled\n\
  )\nVALUES\n(\n@CustomerID,\n@OrderNumber,\n@OrderDate,\n@ShipDate,\n@IsActive,\n\
  @DateCreated,\n@DateModified,\n@DateDisabled\n);\nCOMMIT TRANSACTION;\nEND TRY\n\
  BEGIN CATCH\nSELECT ERROR_NUMBER() AS ErrorNumber,\nERROR_SEVERITY() AS ErrorSeverity,\n\
  ERROR_STATE() AS ErrorState,\nERROR_PROCEDURE() AS ErrorProcedure,\nERROR_MESSAGE()\
  \ AS ErrorMessage;\nROLLBACK TRANSACTION;\nEND CATCH;\n```\n清单 14-13\n用于插入客户订单并包含错误信息的\
  \ Try…Catch 块\n\n现在，如果插入失败有原因，用户将收到一条包含失败信息的消息。这使用户可以选择更正问题并重试该操作。\n\n\n\n## 1.\
  \ 代码执行与错误处理\n\n例如，如果你执行了代码清单 14-4 中的 T-SQL 代码，你将创建一个插入操作会失败的情景。\n\n```sql\nALTER\
  \ TABLE [dbo].[CustomerOrder] WITH CHECK\nADD CONSTRAINT [FK_CustomerOrder_Customer]\n\
  FOREIGN KEY([CustomerID])\nREFERENCES [dbo].[Customer] ([CustomerID]);\nDECLARE\
  \ @Date DATETIME2(2) = CAST(SYSDATETIME() AS DATETIME2(2))\nEXEC dbo.CustomerOrderInsert\n\
  \    @CustomerID = 50000000,\n    @OrderNumber = 12345,\n    @OrderDate = @Date,\n\
  \    @ShipDate = NULL,\n    @IsActive = 1,\n    @DateCreated = @Date,\n    @DateModified\
  \ = @Date,\n    @DateDisabled = NULL;\n```\n**代码清单 14-14**\n执行带有 TRY…CATCH 和错误消息的存储过程\n\
  \n此代码将会失败，因为 `CustomerID` 50000000 在表 `dbo.Customer` 中不存在。此失败源于外键约束。代码清单 14-4 中查询的输出结果如表\
  \ 14-7 所示。\n\n**表 14-7**\n\n来自 TRY…CATCH 的错误输出\n\n| 错误编号 | 错误级别 | 错误状态 | 错误过程 |\
  \ 错误消息 |\n| --- | --- | --- | --- | --- |\n| 547 | 16 | 0 | dbo.CustomerOrderInsert\
  \ | INSERT 语句与 FOREIGN KEY 约束\"FK_CustomerOrder_Customer\"冲突。该冲突发生于数据库\"OutdoorRecreation\"\
  ，表\"dbo.Customer\"，列'CustomerID'。 |\n\n该表确认插入操作因外键约束而未执行。然后用户可以修正值以提供一个有效的 `CustomerID`，或者用户可能决定不需要此更改。\n\
  \n## 2. 状态追踪与错误日志\n\n你可能会发现你的应用程序能够毫无问题地写入或更新数据库中的数据。然而，你可能有一个进程负责将数据从一个系统发送到另一个系统。可能存在基础设施问题或数据类型不一致，这些都可能导致数据从一个数据库对象发送到另一个时失败。你需要确定应如何处理这些错误。你仍然希望有一种方法来处理这些失败，但你可能还需要更即时的报告，表明这些记录未能发送或接收。当今业务要求持续的正常运行状态和成功的交互。你可以通过记录尝试处理数据时失败的方式来控制你响应这些问题的有效性。\n\
  \n存储需要通过系统移动的信息的数据库表通常在数据表中存储一个状态类型列。无论何种进程更新记录状态，都可能在更新记录状态或将记录状态更新为失败状态时出现问题。当表中数据量不大时，查找这些失败的记录可能很容易。通常需要搜索那些在指定时间段内状态未改变，或者处于失败或错误状态的记录。\n\
  \n根据你如何使用客户订单信息，你可能希望记录每个客户订单的准备时间。你可能有一个应用程序，允许你指示客户订单何时开始和完成。此信息可以通过客户订单状态来记录。你需要创建一个表来指示客户订单历史状态。一个信息示例可以在表\
  \ 14-8 中找到。\n\n**表 14-8**\n\n`dbo.CustomerOrderHistoryStatus` 表中的数据\n\n| 客户订单历史状态\
  \ ID | 客户订单历史状态名称 | 是否有效 | 创建日期 | 修改日期 |\n| --- | --- | --- | --- | --- |\n| 1 |\
  \ 已开始 | True | 2023-02-12 | 2023-02-13 |\n| 2 | 已完成 | True | 2023-02-13 | 2023-02-13\
  \ |\n| 3 | 已取消 | True | 2023-02-13 | 2023-02-13 |\n| 4 | 错误 | True | 2023-02-13\
  \ | 2023-02-13 |\n\n此表包含当有人开始准备客户订单时可用的状态。为了记录每次客户订单准备的实例，你需要创建一个表来存储有关每个客户订单何时准备的信息。有几种方式可以记录这一点。就本章而言，让我们在每次客户订单开始时创建一条记录。一旦客户订单开始，该订单最终可能处于已完成、已取消或错误状态。用于存储客户订单历史的查询可以在代码清单\
  \ 14-5 中找到。\n\n```sql\nCREATE TABLE dbo.CustomerOrderHistory\n(\n    CustomerOrderHistoryID\
  \        INT           NOT NULL,\n    CustomerOrderID               INT        \
  \   NOT NULL,\n    CustomerOrderHistoryStatusID  TINYINT       NOT NULL,\n    DateCreated\
  \                   DATETIME2(2)  NOT NULL,\n    DateModified                  DATETIME2(2)\
  \      NULL,\n    CONSTRAINT PK_CustomerOrderHistory_CustomerOrderHistoryID\n  \
  \      PRIMARY KEY CLUSTERED (CustomerOrderHistoryID),\n    CONSTRAINT FK_CustomerOrderHistory_CustomerOrder\n\
  \        FOREIGN KEY (CustomerOrderID)\n        REFERENCES dbo.CustomerOrder(CustomerOrderID),\n\
  \    CONSTRAINT FK_CustomerOrderHistory_CustomerOrderHistoryStatus\n        FOREIGN\
  \ KEY (CustomerOrderHistoryStatusID)\n        REFERENCES dbo.CustomerOrderHistoryStatus(CustomerOrderHistoryStatusID)\n\
  );\n```\n**代码清单 14-15**\n创建 `dbo.CustomerOrderHistory` 表\n\n此表可以存储每个客户订单开始的唯一时间。存储在此表中的数据示例可以在表\
  \ 14-9 中找到。\n\n**表 14-9**\n\n`dbo.CustomerOrderHistory` 表中的数据\n\n| 客户订单历史 ID | 客户订单\
  \ ID | 客户订单历史状态 ID | 创建日期 | 修改日期 |\n| --- | --- | --- | --- | --- |\n| 1 | 1 | 2\
  \ | 2023-02-13 | 2023-02-13 |\n| 2 | 1 | 3 | 2023-02-13 | 2023-02-13 |\n| 3 | 3\
  \ | 4 | 2023-02-13 | 2023-02-13 |\n| 4 | 4 | 1 | 2023-02-13 | 2023-02-13 |\n\n表\
  \ 14-9 中的记录指示了已开始的客户订单及其各种状态。第一条记录是 `CustomerOrderID` 为 1 的订单，状态为已完成。第二条记录是 `CustomerOrderID`\
  \ 为 1 的订单，状态为已取消。第三条记录是 `CustomerOrderID` 为 3 的订单，状态为错误。显示的最后一条记录是 `CustomerOrderID`\
  \ 为 4 的订单，状态为已开始。\n\n当任何记录出现错误时，这些记录在 `dbo.CustomerOrderHistory` 表中的 `CustomerOrderHistoryStatusID`\
  \ 将为 4。最初，此表中的数据量不会很大，因此很容易在该表中找到最近的错误记录。然而，随着时间的推移，此表将增长到相当大的规模。这可能导致 `SQL Server`\
  \ 为了查找任何最近的错误记录而需要搜索许多记录。如果你预计 `dbo.CustomerOrderHistory` 表会增长到难以搜索的大小，你可能需要以不同的方式实现错误日志记录。在其他场景中，你可能希望保留所有处于错误状态的有错误记录，但你也希望能够解决最近出错记录的问题。\n\
  \n在这两种场景中，创建一个专门用于记录最近错误记录的表可能是有益的。在创建此表之前，你可能还需要考虑如何长期管理此表。与 `dbo.CustomerOrderHistory`\
  \ 表不同，你希望确保此新表不会变得太大。你还希望仅在此表中保留最近的错误记录。在表中保持少量记录可以使表易于搜索。此新表的目标仅是提醒用户任何最近的错误记录。考虑到此表的目的，你还需要设计一个进程来定期清除该表中的数据。\n\
  \n\n\n如果您选择为错误记录创建额外的日志表，最终可能会创建一个类似于代码清单 14-16 中的表。\n\n```\nCREATE TABLE dbo.CustomerOrderHistoryLog\n\
  (\nCustomerOrderHistoryLogID INT             NOT NULL,\nCustomerOrderHistoryID \
  \   INT             NOT NULL,\nDateCreated               DATETIME2(2)    NOT NULL,\n\
  DateModified              DATETIME2(2)    NULL,\nCONSTRAINT PK_CustomerOrderHistoryLog_CustomerOrderHistoryLogID\n\
  PRIMARY KEY CLUSTERED (CustomerOrderHistoryLogID),\nCONSTRAINT FK_CustomerOrderHistoryLog_CustomerOrderHistoryID\n\
  FOREIGN KEY (CustomerOrderHistoryID)\nREFERENCES dbo.CustomerOrderHistory(CustomerOrderHistoryID)\n\
  );\nListing 14-16\n创建 dbo.CustomerOrderHistoryLog 表\n```\n\n`dbo.CustomerOrderHistory`表上的任何错误都可以在代码清单\
  \ 14-16 的表中插入一条对应的记录。在表 14-9 中，有一条关于`CustomerOrderHistoryID` 2 的错误记录。如果您在该错误记录创建之前就已经建立了代码清单\
  \ 14-16 中的表，您可能会发现一条类似于表 14-10 中的条目。\n\n表 14-10\n\n`dbo.CustomerOrderHistoryLog`\
  \ 表内的数据\n\n| CustomerOrder HistoryLogID | CustomerOrder HistoryID | DateCreated\
  \ | DateModified |\n| --- | --- | --- | --- |\n| 1 | 2 | 2023-02-13 | 2023-02-13\
  \ |\n\n一旦在`dbo.CustomerOrderHistoryLog`表中有了记录，您就可以根据此表中是否存在记录来生成警报。一种选择是设置一个每 15\
  \ 分钟执行一次的存储过程。该存储过程的目的可能是，如果在`dbo.CustomerOrderHistoryLog`表中发现任何记录，就生成一封电子邮件。如果您选择此方法来创建警报，请确保定期从此表中清除数据。在这种情况下，您还需要一个存储过程来定期删除此表中的数据。\n\
  \n无论您选择哪种方法来实现应用程序与 SQL Server 之间的错误日志记录，您都应确保这些错误被记录在某个可以被多方访问的地方。最难排查的问题之一就是没有可用的日志。记录与\
  \ SQL Server 相关错误的目标是让您组织内的相关人员能够快速发现问题所在，从而高效地解决问题。您可能会选择在应用程序层面实现大部分错误处理。但是，对于需要立即纠正的错误，或许可以从\
  \ SQL Server 内部生成自动报告。\n\n作为应用程序开发的一部分，您需要考虑您的组织需要哪种类型的日志记录。在盗窃风险较高的行业中，跟踪数据何时发生修改以及由谁修改可能更为重要。所需的信息将决定您为数据修改实现何种类型的日志记录。您还需要考虑如何管理与数据库相关的错误。这些错误并非\
  \ SQL Server 特有的错误，而是由于为您的应用程序编写的 T-SQL 代码执行而产生的错误。在确定了如何管理应用程序的日志记录后，您可能还需要考虑如何设计可重用的\
  \ T-SQL 代码。\n\n"
- '# 15. 增强


  本章继续关注构建可维护的 T-SQL。很多时候，您需要更新数据库架构以添加新的应用程序功能。第一节提供了几个可用于修改现有数据库对象的示例。第二节重点介绍了在逐步淘汰不良数据库设计或已弃用功能时可能遇到的一些挑战。


  ## 添加新功能


  理想情况下，为现有应用程序添加功能是软件开发的常规部分。本节讨论如何在保留现有功能的同时为现有应用程序添加功能的几种选项。在本书中，我将使用“应用程序规则”来指代通过更新存储在数据库表中的值来启用功能的能力。此方法不需要任何应用程序或代码更改。但是，“功能标志”将用于指代通过数据传递给
  SQL Server 的方式（包括使用参数）来启用功能的情况。如果您通过向表中添加数据来增加功能，行级安全性或许能让您控制新功能何时上线。如果您需要添加记录数据日志或历史信息的新功能，也可以使用触发器。实现日志记录的其他选项在第
  14 章中讨论。



  ### 应用规则


  使用应用规则包括创建一个存储所有可用应用规则及其状态的地方。在第 14 章中，清单 14-9 展示了为应用规则创建表的 T-SQL。作为参考，此代码在清单 15-1
  中再次展示。


  ```sql

  CREATE TABLE dbo.ApplicationRule

  (

  ApplicationRuleID              INT           IDENTITY(1,1)  NOT NULL,

  ApplicationRuleDescription     VARCHAR(50)                  NOT NULL,

  IsActive                       BIT

  CONSTRAINT DF_ApplicationRule_IsActive    DEFAULT 1      NOT NULL,

  DateCreated                    DATETIME2(2)

  CONSTRAINT DF_ApplicationRule_DateCreated DEFAULT SYSDATETIME() NOT NULL,

  DateModified                   DATETIME2(2)

  CONSTRAINT DF_ApplicationRule_DateModified DEFAULT SYSDATETIME() NULL,

  CONSTRAINT PK_ApplicationRule_ApplicationRuleID

  PRIMARY KEY CLUSTERED (ApplicationRuleID)

  );

  清单 15-1

  创建应用规则表

  ```


  您会注意到上面的代码略有不同，因为现在为 `IsActive`、`DateCreated` 和 `DateModified` 列添加了默认约束。既然现在有了存储应用规则的地方，就可以插入您的第一条规则了。清单
  15-2 展示了创建应用规则的代码。


  ```sql

  INSERT INTO dbo.ApplicationRule (ApplicationRuleDescription)

  VALUES (''仅显示活跃客户'');

  清单 15-2

  填充应用规则表

  ```


  一旦插入了记录，这条应用规则就会存在于 `dbo.ApplicationRule` 表中。表 15-1 展示了您应该期望在数据库中看到的内容。


  **表 15-1 应用规则表**


  | ApplicationRuleID | ApplicationRuleDescription | IsActive | DateCreated | DateModifed
  |

  | --- | --- | --- | --- | --- |

  | 1 | 仅显示活跃客户 | 1 | 2023-04-12 | 2023-04-12 |


  这些概念已在第 14 章讨论过，本节将继续梳理整个过程。在第 12 章，清单 12-2 和清单 12-3 中有两个名为 `dbo.GetCustomer` 的存储过程示例。它们之间的区别在于添加了一个
  `WHERE` 子句，条件为 `IsActive = 1`。清单 15-3 展示了该存储过程的原始 T-SQL 代码。


  ```sql

  /*-------------------------------------------------------------*\

  Name:             dbo.GetCustomer

  Author:           Elizabeth Noble

  Created Date:     2022-10-30

  Description:      获取数据库中所有客户的列表

  Sample Usage:

  EXECUTE dbo.GetCustomer;

  \*-------------------------------------------------------------*/

  CREATE OR ALTER PROCEDURE dbo.GetCustomer

  AS

  SELECT

  CustomerID,

  FirstName,

  LastName,

  Address,

  City,

  PostalCode,

  Country,

  IsActive,

  DateCreated,

  DateModified,

  DateDisabled

  FROM dbo.Customer;

  清单 15-3

  原始存储过程

  ```


  当我们在第 12 章讨论修改清单 15-3 中的存储过程时，我们只包括在查询末尾添加一个硬编码的行项，以更改存储过程使其仅允许活跃客户。然而，您可能希望在应用程序准备好进行此更改之前部署这个变更。幸运的是，有一种方法可以在存储过程内切换此功能。清单
  15-4 展示了更新后的存储过程，以便应用规则表决定是显示所有客户还是仅显示活跃客户。


  ```sql

  /*-------------------------------------------------------------*\

  Name:             dbo.GetCustomer

  Author:           Elizabeth Noble

  Created Date:     2022-10-30

  Description:      获取数据库中所有客户的列表

  Updated Date      2023-04-12

  Description:      更新为使用 IsActive 应用规则

  Sample Usage:

  EXECUTE dbo.GetCustomer;

  \*-------------------------------------------------------------*/

  CREATE OR ALTER PROCEDURE dbo.GetCustomer

  AS

  DECLARE @OnlyActive BIT;

  SELECT @OnlyActive = IsActive

  FROM dbo.ApplicationRule

  -- 这是''仅显示活跃客户''的硬编码值

  ---- 如果 ApplicationRuleID 1 启用，则 @OnlyActive = 1

  ---- 如果 ApplicationRuleID 1 禁用，则 @OnlyActive = 0

  WHERE ApplicationRuleID = 1;

  SELECT

  CustomerID,

  FirstName,

  LastName,

  Address,

  City,

  PostalCode,

  Country,

  IsActive,

  DateCreated,

  DateModified,

  DateDisabled

  FROM dbo.Customer

  -- 存储过程将始终显示活跃客户

  WHERE IsActive = 1

  -- 如果应用规则 1 启用，则使用 1

  ---- 这将只返回活跃客户

  -- 如果应用规则 1 禁用，则使用 0

  ---- 这将返回非活跃客户

  AND IsActive = @OnlyActive;

  清单 15-4

  使用应用规则的存储过程

  ```


  在未来的某个时刻，您可能会决定不再需要该应用规则。当这种情况发生时，您可以更新存储过程以移除对应用规则的依赖。在此场景下，让我们将存储过程更新为仅显示活跃客户，如清单
  15-5 所示。


  ```sql

  /*-------------------------------------------------------------*\

  Name:             dbo.GetCustomer

  Author:           Elizabeth Noble

  Created Date:     2022-10-30

  Description:      获取数据库中所有客户的列表

  Updated Date      2023-04-12

  Description:      更新为使用 IsActive 应用规则

  Updated Date      2023-06-13

  Description:      更新为仅显示 IsActive 客户

  Sample Usage:

  EXECUTE dbo.GetCustomer;

  \*-------------------------------------------------------------*/

  CREATE OR ALTER PROCEDURE dbo.GetCustomer

  AS

  SELECT

  CustomerID,

  FirstName,

  LastName,

  Address,

  City,

  PostalCode,

  Country,

  IsActive,

  DateCreated,

  DateModified,

  DateDisabled

  FROM dbo.Customer

  -- 存储过程将始终显示活跃客户

  WHERE IsActive = 1;

  清单 15-5

  使用应用规则的存储过程

  ```


  应用规则可以应用于其他不支持输入参数的 T-SQL 数据库对象，例如视图。清单 15-6 展示了如何使用应用规则来控制视图的功能。


  ```sql

  CREATE OR ALTER VIEW dbo.vwCustomer

  AS

  SELECT

  CustomerID,

  FirstName,

  LastName,

  Address,

  City,

  PostalCode,

  Country,

  IsActive,

  DateCreated,

  DateModified,

  DateDisabled

  FROM dbo.Customer

  -- 此视图将始终显示活跃客户

  WHERE

  -- 这是

  -- ''仅显示活跃客户''的硬编码值

  IsActive = 1

  -- 如果应用规则 1 启用，则使用 1

  ---- 这将只返回活跃客户

  -- 如果应用规则 1 禁用，则使用 0

  ---- 这将返回非活跃客户

  AND IsActive =

  (

  SELECT IsActive

  FROM dbo.ApplicationRule

  WHERE ApplicationRuleID = 1

  );

  清单 15-6

  使用应用规则的视图

  ```


  这是一种切换功能的方法。另一种选择是使用功能标志，如第 12 章所讨论。它们在概念上与应用规则相似。然而，在许多情况下，可能存在一段外部代码来决定是否应启用或关闭新功能。


  ### 特性标志


  使用特性标志时，你可以向存储过程添加一个输入参数，以此控制 T-SQL 代码的行为。代码清单 15-7 展示了如何更新代码清单 15-3 中的存储过程 `dbo.Customer`
  以使用特性标志。


  ```sql

  /*-------------------------------------------------------------*\

  Name:             dbo.GetCustomer

  Author:           Elizabeth Noble

  Created Date:     2022-10-30

  Description:      Get a list of all customers in the databases

  Updated Date      2023-04-12

  Description:      Updated to use IsActive feature flag

  Sample Usage:

  EXECUTE dbo.GetCustomer

  \*-------------------------------------------------------------*/

  CREATE OR ALTER PROCEDURE dbo.GetCustomer

  @OnlyActive BIT = 0 –- Defaults to show all customers

  AS

  SELECT

  CustomerID,

  FirstName,

  LastName,

  Address,

  City,

  PostalCode,

  Country,

  IsActive,

  DateCreated,

  DateModified,

  DateDisabled

  FROM dbo.Customer

  -- Stored procedure will always show Active customers

  WHERE IsActive = 1

  -- This will use 1 if ApplicationRule 1 is enabled

  ---- This will return only active customers

  -- This will use 0 if ApplicationRule 1 is disabled

  ---- This will return inactive customers

  AND IsActive = @OnlyActive;

  ```

  代码清单 15-7

  使用特性标志的存储过程


  在上面的存储过程中，`@OnlyActive` 值被传递给存储过程。使用参数来切换存储过程功能的一个好处是，你可以为该参数设置默认值，以维持现有功能。


  还可能有一些情况是，你希望向数据库添加数据，但在未来的某个日期之前不希望应用程序能够使用这些数据。当你正在将一个新的业务或应用程序迁移或集成到现有数据库时，就可能发生这种情况。如果你发现自己需要填充表中的数据，但又不希望这些数据被访问，那么可以尝试使用行级安全性。关于行级安全性的更多信息，可以参考第
  21 章。


  你可能会遇到想要记录表上的操作行为的情况。虽然让应用程序直接记录信息是最理想的，但这可能无法实现。在这种情况下，你可能希望用一个触发器来记录这些信息。例如，你可以使用触发器来记录产品何时被添加、修改或删除。你可能想要记录新产品的添加时间以及添加产品的登录用户。代码清单
  15-8 展示了一个用于记录 `dbo.Product` 表上行为的日志表。


  ```sql

  CREATE TABLE dbo.ProductLog(

  ProductLogID     INT                        IDENTITY(1,1)   NOT NULL,

  ProductID        INT                                        NOT NULL,

  ProductName      VARCHAR(25)                                NOT NULL,

  ProductPrice     DECIMAL(6,2)                               NOT NULL,

  IsActive         BIT

  CONSTRAINT DF_ProductLog_IsActive     DEFAULT (1)     NOT NULL,

  DateCreated      DATETIME2(2)

  CONSTRAINT DF_ProductLog_DateCreated  DEFAULT (SYSDATETIME()) NOT NULL,

  DateModified     DATETIME2(2)

  CONSTRAINT DF_ProductLog_DateModified DEFAULT (SYSDATETIME()) NOT NULL,

  DateDisabled     DATETIME2(2)                                   NULL,

  CONSTRAINT PK_ProductLog PRIMARY KEY CLUSTERED (PK_ProductLogID ASC)

  );

  ```

  代码清单 15-8

  创建 ProductLog 表


  现在你已经创建了表，可以给 `dbo.Product` 表添加一个触发器，这样当在该表中插入或更新记录时，新数据的记录将被保存到 `dbo.ProductHistory`
  表中。由于表上已经会有触发器，你还可以添加逻辑来更新 `dbo.Product` 表中的 `DateModified` 字段。代码清单 15-9 展示了如何创建一个在产品被插入或更新时记录产品更改的触发器。


  ```sql

  CREATE TRIGGER dbo.LogProductHistory

  ON dbo.Product

  AFTER INSERT, UPDATE

  AS

  INSERT INTO dbo.ProductHistory

  (

  ProductID,

  ProductPrice,

  ProductName

  )

  SELECT

  ProductID,

  ProductPrice,

  ProductName

  FROM inserted;

  UPDATE prd

  SET DateModified = SYSDATETIME()

  FROM dbo.Product prd

  INNER JOIN deleted del

  ON prd.ProductID = del.ProductID;

  ```

  代码清单 15-9

  创建触发器以记录产品历史


  除了在记录被添加或更改后向 `dbo.ProductHistory` 表插入一条记录外，此触发器还会更新 `dbo.Product` 表上的 `DateModified`
  字段，以便记录该记录最近一次被更改的时间。


  像编写任何其他代码一样，你应该对此进行测试并确认触发器是否按预期工作。要测试此触发器，请执行代码清单 15-10 中的 T-SQL。


  ```sql

  UPDATE dbo.Product

  SET IsActive = 1

  WHERE ProductID = 5;

  INSERT INTO dbo.Product (ProductName, ProductPrice)

  VALUES (''Kayak'',1299.00);

  ```

  代码清单 15-10

  测试触发器的插入和更新功能


  在代码清单 15-10 中，你将 `ProductID` 为 5 的产品更新为激活状态。你还运行了一个单独的查询，将一个新产品“Kayak”插入到 `dbo.Product`
  表中。由于触发器 `dbo.LogProductHistory` 已被添加到 `dbo.Product` 表，你预期会在 `dbo.ProductHistory`
  表中找到两条新记录。


  第一个查询不仅应该向 `dbo.ProductHistory` 表添加一条记录，还应该更新 `dbo.Product` 表中的 `DateModified` 字段。第二个查询应该向
  `dbo.ProductHistory` 表添加一条记录，因为创建了一个新产品。请参考代码清单 15-11。


  ```sql

  SELECT ProductLogID,

  ProductID,

  ProductName,

  ProductPrice,

  DateCreated

  FROM dbo.ProductHistory;

  SELECT ProductID,

  ProductName,

  DateCreated,

  DateModified,

  DateDisbled

  FROM dbo.Product

  WHERE ProductID = 5;

  ```

  代码清单 15-11

  检查触发器的运行结果


  运行这些查询后，你可以检查结果。如前所述，你应该在 `dbo.ProductHistory` 表中找到两条新记录。此外，`dbo.Product` 表中 `ProductID`
  为 5 的记录的 `DateModified` 字段应该已被更新。表 15-2 显示了第一个查询的结果。


