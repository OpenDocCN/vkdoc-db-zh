  \ ASC;\n\nDROP TABLE #TmpOrder;\nDROP TABLE #HistPriceCost;\n```\n\n**代码清单 8-4**\
  \ 客户订单的优化查询\n\n现在你已经更改了代码，需要获取一个新的执行计划来确认这些更改是否按预期工作。图 8-2 显示了执行计划中相同的大致区域，但这是 T-SQL\
  \ 代码更改后的样子。\n\n![](img/480547_2_En_8_Fig2_HTML.jpg)\n\n一个流程图展示了部分执行计划。它描绘了一个聚集索引扫描、2\
  \ 个嵌套循环和一个索引查找。聚集索引扫描的成本为 12%，耗时 0.000 秒，3/3。嵌套循环的成本为 0%，耗时 0.000 秒，3/3 和 1/1。索引查找的成本为\
  \ 26%，耗时 0.000 秒，2/9。\n\n**图 8-2** **代码清单 8-4** 的部分执行计划\n\n发生了几个变化。从整体执行计划来看，所有的连线都比之前细得多。虽然某些步骤的顺序发生了变化，但最大的差异与非聚集索引有关。在\
  \ **图 8-1** 中，SQL Server 正对该索引执行索引扫描。既然你创建了一个排序方式不同的索引，SQL Server 现在对同一个非聚集索引使用索引查找。并非所有优化\
  \ T-SQL 代码的尝试都如此简单。然而，当你了解数据存储方式以及表上的索引如何引用数据时，就有可能对你的 T-SQL 代码做出显著的改进。\n\n## 优化执行时长\n\
  \n我使用 SQL Server 的目标是让执行 T-SQL 代码的查询运行得尽可能快。我倾向于关注逻辑读取次数，因为我想最小化进入缓存的、当前执行查询不需要的数据页数量。然而，SQL\
  \ Server 中还可能发生其他问题，对下游产生负面影响。\n\n在 SQL Server 2019 之前，查询缓慢最常见的原因之一是参数嗅探。SQL Server\
  \ 2019 中的自适应联接有助于最小化与参数嗅探相关的问题。如果执行计划中有自适应联接，SQL Server 将在执行时决定是使用合并联接还是嵌套循环联接。自适应联接的灵活性允许\
  \ T-SQL 代码在数据集较小时以一种方式执行，而在数据集较大时使用不同的物理联接方式。这将使查询的执行无论检索到何种数据都能表现良好。\n\n尝试找出执行时长最长的查询可能具有挑战性，尤其是在尝试获取有关查询性能的实时数据时。幸运的是，SQL\
  \ Server 确实会跟踪查询计划缓存中存在的 T-SQL 代码的查询性能。你可以使用与上一节相同的 DMV `sys.dm_exec_query_stats`，但不是查找总逻辑读取或平均逻辑读取最高的记录，而是要查看工作线程时间。你可以从总工作线程时间或平均工作线程时间开始。查询运行的时间点可能帮助你决定首先关注哪个。如果工作线程时间最高的查询之一在业务最活跃的时间运行，我会优先处理该查询。然而，如果你有平均工作线程时间最高的\
  \ T-SQL 代码在一天中的繁忙时段频繁运行，首先处理这段代码可能会带来更多好处。无论哪种方式，你都需要在 `sys.dm_exec_sql_text` 中查找与\
  \ `sys.dm_exec_query_stats` 中的查询哈希匹配的查询计划，以找到相关的查询文本。\n\nSQL Server 的一个挑战是，相同的解决方案并非总是适用于所有情况。我遇到过一些查询，将数据分成更小的片段可以提高性能。在其他时候，将几个步骤合并为单个\
  \ T-SQL 语句可能更有效。**代码清单 8-5** 中的查询展示了一系列 T-SQL 语句。\n\n\n```sql\nDECLARE @CustomerID\
  \         INT = NULL;\nDECLARE @CustomerOrderID    INT = NULL;\nDECLARE @ProductID\
  \          INT = NULL;\n-- 获取特定客户和产品的所有订单\nSELECT cus.CustomerID,\n       cus.FirstName,\n\
  \       cus.LastName,\n       ord.CustomerOrderID,\n       prd.ProductID\nINTO \
  \  #TmpOrder\nFROM   dbo.Customer cus\n       INNER JOIN dbo.CustomerOrder ord\n\
  \              ON cus.CustomerID = ord.CustomerID\n       INNER JOIN dbo.OrderDetail\
  \ dtl\n              ON ord.CustomerOrderID = dtl.CustomerOrderID\n       INNER\
  \ JOIN dbo.Product prd\n              ON dtl.ProductID = prd.ProductID\nWHERE  prd.IsActive\
  \ = 1\n       AND EXISTS (SELECT *\n                   FROM   dbo.ProductPriceHistory\
  \ hist\n                   WHERE  prd.ProductID = hist.ProductID\n             \
  \      GROUP  BY hist.ProductID\n                   HAVING COUNT(*) > 3);\n\nSELECT\
  \ ord.CustomerID,\n       tor.FirstName,\n       tor.LastName,\n       ord.CustomerOrderID,\n\
  \       ord.OrderNumber,\n       prd.ProductName,\n       dtl.QuantitySold,\n  \
  \     dtl.ProductPrice\nFROM   #TmpOrder tor\n       INNER JOIN dbo.CustomerOrder\
  \ ord\n              ON tor.CustomerOrderID = ord.CustomerOrderID\n       INNER\
  \ JOIN dbo.OrderDetail dtl\n              ON tor.CustomerOrderID = dtl.CustomerOrderID\n\
  \                 AND tor.ProductID = dtl.ProductID\n       INNER JOIN dbo.Product\
  \ prd\n              ON tor.ProductID = prd.ProductID\nWHERE  ( tor.CustomerID =\
  \ @CustomerID\n          OR @CustomerID IS NULL )\n       AND ( ord.CustomerOrderID\
  \ = @CustomerOrderID\n              OR @CustomerOrderID IS NULL )\n       AND (\
  \ dtl.ProductID = @ProductID\n              OR @ProductID IS NULL )\nORDER  BY ord.CustomerID,\n\
  \          CASE\n            WHEN ( ord.CustomerID = @CustomerID\n             \
  \      AND ord.CustomerOrderID = @CustomerOrderID ) THEN 0\n            ELSE 1\n\
  \          END,\n          ord.CustomerOrderID DESC,\n          tor.LastName ASC;\n\
  \nDROP TABLE #TmpOrder;\n```\n\n`清单 8-5`\n获取所有客户订单信息的原始查询\n\n总的来说，`清单 8-5` 的目标是返回任意客户、订单和产品组合的客户与订单信息。成本百分比指示了\
  \ `SQL Server` 引擎预计在执行计划中该步骤所花费的时间比例。在查看执行计划时，你需要调查执行计划中成本百分比最高的特定部分，如 `图 8-3` 所示。\n\
  \n![](img/480547_2_En_8_Fig3_HTML.jpg)\n\n流程图展示了部分执行计划。它描绘了一个哈希匹配，随后是表插入、并行操作和 `T\
  \ S Q L`。哈希匹配成本为 2%，耗时 0.056 秒，处理了 1605638 行（共 1605640 行）。`T S Q L` 成本为 0%。\n\n\
  `图 8-3`\n\n`清单 8-5` 的部分执行计划\n\n插入临时表是第一个 `T-SQL` 语句中最主要的部分。该语句也占用了整个执行计划中较高的百分比。因此，与此查询相关的最高成本是将数据插入临时表。你可以将此查询重写为\
  \ `清单 8-6` 中所示的查询。\n\n```sql\nDECLARE @CustomerID         INT = NULL;\nDECLARE @CustomerOrderID\
  \    INT = NULL;\nDECLARE @ProductID          INT = NULL;\n\nSELECT cus.CustomerID,\n\
  \       cus.FirstName,\n       cus.LastName,\n       ord.CustomerOrderID,\n    \
  \   ord.OrderNumber,\n       prd.ProductName,\n       dtl.QuantitySold,\n      \
  \ dtl.ProductPrice\nFROM   dbo.Customer cus\n       INNER JOIN dbo.CustomerOrder\
  \ ord\n              ON cus.CustomerID = ord.CustomerID\n       INNER JOIN dbo.OrderDetail\
  \ dtl\n              ON ord.CustomerOrderID = dtl.CustomerOrderID\n       INNER\
  \ JOIN dbo.Product prd\n              ON dtl.ProductID = prd.ProductID\nWHERE  (\
  \ cus.CustomerID = @CustomerID\n          OR @CustomerID IS NULL )\n       AND (\
  \ ord.CustomerOrderID = @CustomerOrderID\n              OR @CustomerOrderID IS NULL\
  \ )\n       AND ( dtl.ProductID = @ProductID\n              OR @ProductID IS NULL\
  \ )\n       AND prd.IsActive = 1\n       AND EXISTS (SELECT *\n                \
  \   FROM   dbo.ProductPriceHistory hist\n                   WHERE  prd.ProductID\
  \ = hist.ProductID\n                   GROUP  BY hist.ProductID\n              \
  \     HAVING COUNT(*) > 3)\nORDER  BY cus.CustomerID,\n          CASE\n        \
  \    WHEN ( cus.CustomerID = @CustomerID\n                   AND ord.CustomerOrderID\
  \ = @CustomerOrderID ) THEN 0\n            ELSE 1\n          END,\n          ord.CustomerOrderID\
  \ DESC,\n          cus.LastName ASC;\n```\n\n`清单 8-6`\n获取所有客户订单信息的优化查询\n\n这个 `T-SQL`\
  \ 语句包含了生成与 `清单 8-5` 相同输出所需的所有代码。根据表上存在的索引和连接条件，有时通过单次查询选择所有数据会看到更好的性能。其他时候，你可能通过获取数据子集并将其组合到一个查询中来优化查询。`清单\
  \ 8-6` 执行计划的一部分可以在 `图 8-4` 中看到。\n\n![](img/480547_2_En_8_Fig4_HTML.jpg)\n\n流程图展示了部分执行计划。它描绘了\
  \ 2 个聚集索引扫描、聚集索引查找和索引扫描。聚集索引扫描成本为 49%，耗时 0.044 秒，处理了 1605638 行（共 1605640 行）。索引扫描成本为\
  \ 7%，耗时 0.016 秒，处理了 401409 行（共 13246 行）。\n\n`图 8-4`\n\n`清单 8-6` 的部分执行计划\n\n如 `图\
  \ 8-4` 所示，占用执行计划最大百分比的步骤已经改变。根据实际的执行计划，最大百分比花费在 `Customer` 表的主键上执行 `聚集索引查找`。由于这是涉及表主键的查找，似乎没有更好的替代方案来对此查询进行性能调优。\n\
  \n## 优化索引\n\n还有其他因素可能导致查询运行缓慢。在许多场景中，优化这些查询的最佳方法涉及使用索引。你需要检查执行计划中的 `键查找`。这些 `键查找`\
  \ 表明 `SQL Server` 必须从 `非聚集索引` 转到 `聚集索引` 以查找查询所需的额外字段。在某些情况下，你可能能够更改返回的值或查询的连接条件来解决\
  \ `键查找`。否则，你将需要查看是否可以更改索引以提高性能。\n\n创建和维护索引是一个本身就能写成一本书的话题，但在处理索引时，你可以做一些事情。如果你处于可能需要考虑添加索引的阶段，你首先需要了解相关表上当前存在哪些索引。虽然这超出了本书的范围，但你需要确定是否存在不再使用并可以删除的索引。对于剩下的索引，你需要仔细评估。其中一些索引可能可以进行修改，使其继续对其他\
  \ `T-SQL` 代码有效，同时也能优化当前查询。你可以创建或修改索引，使额外的列与索引一起存储。但是，索引不会按这些列排序。这些列可以被称为 `覆盖列`。如果某个列是连接或\
  \ `WHERE 子句` 所需的，我会考虑将其添加到索引中。在决定将列添加到索引之前，请确保你熟悉 `SQL Server` 如何使用索引来搜索数据。处理某些索引的方法涉及在索引上将列添加为\
  \ `包含列`。这将允许 `SQL Server` 返回列结果而无需进行 `键查找`，但它不会影响 `SQL Server` 如何使用索引来检索数据记录。\n\n\
  优化 `T-SQL` 代码的执行时长可以带来诸多好处。一是提高应用程序的性能。在某些情况下，你可能能够通过以更高效的方式重写代码来改善查询的执行时长。在其他情况下，你可能需要考虑是否有不同的代码编写方式可以更好地利用现有索引。另一个选项是修改现有索引或创建新索引。如果选择修改索引，请谨慎行事，因为有时存在的索引可能弊大于利。定期检查你的\
  \ `T-SQL` 代码的执行时长，看看是否能找到任何需要性能调优的查询。\n\n\n## 自动数据库调优\n\n在之前的章节中，我讨论了如何针对逻辑读取和持续时间来优化您的\
  \ T-SQL 代码。在 SQL Server 过去的几个版本中，发生了许多变化，这些变化可以帮助您自动优化 SQL Server 或优化您的查询。在某些情况下，这涉及记录有关查询性能的信息。在其他时候，这可能是\
  \ SQL Server 在管理您的执行计划或索引。虽然本节涵盖的主题与 SQL Server 可以为您执行的优化相关，但理解这些概念将有助于您更好地了解 SQL\
  \ Server 将如何处理您的 T-SQL 代码。\n\n### 自动计划纠正\n\n在 SQL Server 2016 引入的*查询存储*功能之上，SQL\
  \ Server 2017 引入了一项新功能。下一步是看看 SQL Server 是否能利用对执行计划、执行统计信息和这些查询执行的等待统计信息的历史信息的访问来获益。此功能内置于查询存储中，可以进行配置而无需人工干预。为了实现这一点，这种新功能还必须包含一种验证结果的方法。\n\
  \n既然 SQL Server 可以查看查询存储，它就能系统地确定新的执行计划是比之前的执行计划性能更好还是更差。这个新功能被称为**自动计划纠正**。此功能默认不启用。在启用之前，需要先启用查询存储，如代码清单\
  \ 8-6 所示。一旦启用了查询存储，您就可以运行代码清单 8-7 所示的代码来启用自动计划纠正。\n\n```\nALTER DATABASE Menu\n\
  SET AUTOMATIC_TUNING (FORCE_LAST_GOOD_PLAN = ON);\n代码清单 8-7\n启用自动计划纠正的查询\n```\n\n\
  一旦启用了自动计划纠正，SQL Server 就可以比较新的和之前的执行计划，以确定比较结果是否符合 SQL Server 可以强制使用之前执行计划的标准。为了确保\
  \ SQL Server 不会花费额外精力进行微调性能，阈值设置为将 CPU 成本减少 10 秒或更多。另一个选项是执行中的错误数量少于之前的版本。如果新的执行计划在\
  \ CPU 上多花费了超过 10 秒，SQL Server 可以自动强制使用之前的计划。同样，如果新的执行计划比之前的计划有更多的错误，SQL Server 可以强制使用之前的执行计划。\n\
  \n在 SQL Server 自动强制执行计划后，它会继续监视性能，以确认新强制的执行计划是否按预期工作。如果 SQL Server 确定强制的执行计划不再提供预期的性能收益，它可以撤销对执行计划的强制。自动计划纠正不会更改您的\
  \ T-SQL 代码；此功能仅帮助管理当前用于您的 T-SQL 代码的执行计划。\n\n如果您更愿意手动管理执行计划，您也可以这样做。请确保不要运行代码清单 7-8\
  \ 中所示的 T-SQL 代码。如果您选择手动执行计划纠正，则需要定期监视哪些查询需要强制执行计划。随着数据形状和相关统计信息可能随时间变化，您还需要手动撤销对查询执行计划的强制。从\
  \ SQL Server 2016 开始，可以使用查询存储来监视执行计划随时间的变化。在 SQL Server 2017 中，还可以选择使用 DMV `sys.dm_tuning_recommendations`\
  \ 来查找可以从强制执行计划中受益的查询。\n\n虽然自动或手动计划纠正超出了 T-SQL 的范围，但了解 SQL Server 可以对您的 T-SQL 查询执行哪些操作是有帮助的。我仍然建议您将\
  \ T-SQL 设计为在各种场景下高效运行，但知道当参数嗅探等问题不可避免时，SQL Server 中还有其他选项可以帮助提高整体查询性能，这是一件好事。\n\n\
  ### 自动索引管理\n\n除了允许 SQL Server 管理您的执行计划并选择最佳可用计划外，您还可以选择允许 SQL Server 系统地监视和管理您的索引。此功能目前仅在\
  \ Azure SQL Database 中可用。启用**自动索引管理**允许 SQL Server 创建它认为必要的新索引，并识别未使用或似乎与其他已创建索引类似的索引。\n\
  \n与自动计划纠正类似，SQL Server 将监视新索引的性能。如果认为它们效率较低，SQL Server 将删除这些索引。如果 SQL Server 修改或删除索引，也将使用相同的过程。在使用\
  \ Azure SQL Database 时，仍然可以手动管理索引。然而，允许 Azure SQL Database 及时发现并解决索引问题可能会节省您的成本，因为执行相同任务可能需要更少的资源。\n\
  \n## 智能查询处理\n\n除了 SQL Server 自动管理执行计划和索引的能力外，还有其他新功能可以帮助自动优化 T-SQL 代码性能。如第 6 章所讨论的，内存是\
  \ SQL Server 使用的关键资源。在使用 SQL Server 的内存时，您希望确保内存被尽可能高效地使用。处理数据集对于使用 SQL Server 也至关重要。如果\
  \ SQL Server 可以将一组行转换为批次，然后执行任何必要的操作，这将有助于优化查询。数据形状在数据表中并不总是一致的。在这些场景中，拥有一个根据返回的数据类型而灵活调整的执行计划可能会有所帮助。这些功能有助于提高正在执行的\
  \ T-SQL 代码的效率。\n\n### 内存授予反馈\n\n在执行查询时，SQL Server 会尝试估计该事务所需的内存量。基于估计分配给查询的内存量称为内存授予。虽然\
  \ SQL Server 能正确估计内存是理想情况，但有时估计的内存量与实际使用的内存量并不匹配。**内存授予反馈**首次在 SQL Server 2017 中可用。内存授予反馈的添加使\
  \ SQL Server 能够查看之前查询执行的内存使用情况，并在内存估计值显著低估或高估时进行调整。这允许 SQL Server 最大限度地减少因内存估计不正确而导致的潜在性能问题。\n\
  \n为了确保内存授予得到正确管理，为内存授予与实际内存使用量之间的差异定义了阈值。如果使用的内存少于 1 MB，则无需进行额外分析。如果内存授予是所用内存量的两倍，则可以重新计算特定查询的内存授予。同样，如果执行查询所需的内存超过内存授予，也可以重新计算内存授予。\n\
  \n### 行存储上的批处理模式\n\n为批处理操作提供内存授权，是批处理操作发展的下一阶段的必要基础。批处理操作是指 SQL Server 可以一次性对一组记录执行一个操作，而不是一次只处理一条记录。当批处理模式最初在\
  \ SQL Server 2012 中引入时，它仅可用于 `列存储索引`。从 SQL Server 2019 开始，批处理操作也被允许用于一组行。在这种情况下，一组行也被称为\
  \ `行存储`。为批处理操作提供内存授权，使得堆和索引也能使用批处理模式，这为额外的查询优化类型奠定了基础。\n\n### 自适应连接\n\nSQL Server\
  \ 使用统计信息来帮助估计最佳执行计划。然而，数据在表中的分布并不总是均匀的。它选择的计划通常是针对某些列值的最佳计划。问题在于，对于其他列值，该计划可能表现不佳。在\
  \ SQL Server 2019 中，由于新功能的引入，发生这种情况的可能性降低了。该功能允许 SQL Server 根据查询的当前执行情况，在 `嵌套循环`\
  \ 和 `哈希匹配` 这两种物理连接运算符之间进行选择。这项新功能被称为 `自适应连接`。\n\n`自适应连接` 最初在 SQL Server 2017 中引入。然而，`自适应连接`\
  \ 只能作为 `批处理模式操作` 的一部分使用。在 SQL Server 2017 中，`批处理模式操作` 仅支持 `列存储索引`。既然 `批处理模式操作` 现在也支持堆和\
  \ B 树索引，那么 `自适应连接` 也可以在这些数据库对象上使用。执行清单 8-6 中的查询会生成一个包含 `自适应连接` 的执行计划。当你看到执行计划时，你会看到一个\
  \ `自适应连接` 的物理运算符。在图形执行计划中，你无法辨别幕后使用的是什么类型的运算符。但是，如果你将鼠标悬停在执行计划中的 `自适应连接` 上，你会看到一个属性列表，如图\
  \ 8-5 所示。\n\n![](img/480547_2_En_8_Fig5_HTML.png)\n\n自适应连接属性的截图呈现了一个列表。它描绘了 22 个属性。列表底部有代码，位于“输出列表”、“探测哈希键”和“外部引用”标题下。\n\
  \n图 8-5\n\n清单 8-6 中的自适应连接属性\n\n清单 8-6 中的原始查询是根据所有三个参数返回有关客户、订单和产品的信息。在图 8-5 中，你可以看到属性下列出的\
  \ `自适应连接` 类型是 `哈希匹配`。图 8-6 显示了执行清单 8-6 时实时查询统计信息的部分截图。\n\n![](img/480547_2_En_8_Fig6_HTML.jpg)\n\
  \n一个流程图展示了实时查询统计信息。它描绘了聚集索引扫描、索引扫描、聚集索引查找、聚集索引扫描和自适应连接。聚集索引扫描耗时 8.019 秒，处理了 264931\
  \ 行中的 802820 行（注：此处原文数据可能存在笔误或特殊上下文）。自适应连接处理了 87427 行中的 802820 行（注：同上）。\n\n图 8-6\n\
  \n清单 8-6 的实时查询统计信息\n\n你可以看到每个步骤处理的记录总数以及部分步骤所花费的时间。通过查看实时查询统计信息，你可以看到返回的记录数与估计数的百分比。图\
  \ 8-6 显示了正在进行的实时查询统计信息。在这种情况下，对表 `CustomerOrder` 的 `聚集索引扫描` 或对表 `OrderDetail` 的\
  \ `索引扫描` 等步骤似乎估计正确。其他运算符也可能未被正确估计。虽然这些差异可能导致性能问题，但我指出这些值的原因是为了与你在更改传递给 `@CustomerID`、`@CustomerOrderID`\
  \ 和 `@ProductID` 变量的值之后的查询执行情况进行比较。\n\n如果将相同的查询限制为一个客户、一个订单和一个产品，你可能会编写如清单 8-8 所示的\
  \ `T-SQL`。\n\n```sql\nDECLARE @CustomerID         INT = 1;\nDECLARE @CustomerOrderID\
  \    INT = 401508;\nDECLARE @ProductID          INT = 1;\nSELECT cus.CustomerID,\n\
  \       cus.FirstName,\n       cus.LastName,\n       ord.CustomerOrderID,\n    \
  \   ord.OrderNumber,\n       prd.ProductName,\n       dtl.QuantitySold,\n      \
  \ dtl.ProductPrice\nFROM dbo.Customer cus\nINNER JOIN dbo.CustomerOrder ord\n  \
  \  ON cus.CustomerID = ord.CustomerID\nINNER JOIN dbo.OrderDetail dtl\n    ON ord.CustomerOrderID\
  \ = dtl.CustomerOrderID\nINNER JOIN dbo.Product prd\n    ON dtl.ProductID = prd.ProductID\n\
  WHERE (cus.CustomerID = @CustomerID OR @CustomerID IS NULL)\n    AND (ord.CustomerOrderID\
  \ = @CustomerOrderID OR @CustomerOrderID IS NULL)\n    AND (dtl.ProductID = @ProductID\
  \ OR @ProductID IS NULL)\n    AND prd.IsActive = 1\n    AND EXISTS\n        (\n\
  \            SELECT *\n            FROM dbo.ProductPriceHistory hist\n         \
  \   WHERE prd.ProductID = hist.ProductID\n            GROUP BY hist.ProductID\n\
  \            HAVING COUNT(*) > 3\n        )\nORDER BY\n    cus.CustomerID,\n   \
  \ CASE WHEN\n        (\n            cus.CustomerID = @CustomerID\n            AND\
  \ ord.CustomerOrderID = @CustomerOrderID\n        )\n        THEN 0\n        ELSE\
  \ 1\n    END,\n    ord.CustomerOrderID DESC,\n    cus.LastName ASC;\n```\n清单 8-8\n\
  针对特定配方信息的查询\n\n清单 8-6 和清单 8-8 之间的区别在于前三行。在清单 8-6 中，`@CustomerID`、`@CustomerOrderID`\
  \ 和 `@ProductID` 被设置为 -1，以便返回所有配方。在清单 8-8 中，`@CustomerID`、`@CustomerOrderID` 和 `@ProductID`\
  \ 各被设置为一个特定值。你可以执行此查询并查看执行计划，以了解 SQL Server 现在是否会以不同方式处理此查询执行，因为现在可能只影响一个配方。在图 8-7\
  \ 中，你可以看到执行清单 8-8 时 `自适应连接` 的属性。\n\n![](img/480547_2_En_8_Fig7_HTML.png)\n\n自适应连接属性的截图呈现了一个列表。它描绘了\
  \ 22 个属性。列表底部有代码，位于“输出列表”、“探测哈希键”和“外部引用”标题下。\n\n图 8-7\n\n清单 8-8 中的自适应连接属性\n\n图 8-7\
  \ 中显示的实际连接类型是一个 `嵌套循环`。图 8-5 和 8-7 中 `自适应连接` 类型的差异，展示了 `自适应连接` 如何帮助优化那些先前受参数嗅探影响的查询。清单\
  \ 8-8 的实时查询统计信息的详细信息如图 8-8 所示。\n\n![](img/480547_2_En_8_Fig8_HTML.jpg)\n\n一个流程图展示了实时查询统计信息。它描绘了聚集索引扫描、索引扫描、聚集索引查找、聚集索引扫描和自适应连接。聚集索引扫描处理了\
  \ 264931 行中的 1 行。索引扫描处理了 13246 行中的 0 行。聚集索引查找处理了 264931 行中的 0 行。自适应连接处理了 87427 行中的\
  \ 0 行。\n\n图 8-8\n\n清单 8-8 的实时查询统计信息\n\n\n在图 8-8 中，存在的物理运算符与图 8-6 中的相同。然而，实际处理的行数与估计的行数存在显著差异。在图\
  \ 8-8 的情况下，几乎所有的步骤都被严重高估了。尽管如此，由于使用了自适应联接，清单 8-8 中的查询仍然会受益于其性能优势。\n\n虽然当一个查询可能因提供的参数不同而受益于使用哈希联接或嵌套循环联接时，自适应联接会很有用，但也存在其他查询，其中表内数据分布不均可能影响查询性能。SQL\
  \ Server 2022 针对这类场景有一个新功能，称为参数敏感计划优化。当 SQL Server 尝试创建执行计划时，它会评估与参数关联的表，以确定是否存在分布不均的情况。如果发现任何不均，PSP\
  \ 允许 SQL Server 创建最多三个执行计划来适应不同的数据分布。例如，如果你为 `ProductID` 1 执行存储过程 `dbo.GetCustomerAndOrderNumberByProductID`，其数据分布与为\
  \ `ProductID` 4 执行该过程时不同。借助 PSP，SQL Server 可以在计划缓存中为 `ProductID` 1 和 `ProductID`\
  \ 4 分别保存一个不同的执行计划。研究这些不同执行计划的一种方法是使用本章前面讨论过的查询存储。\n\n你可以通过多种方式致力于优化 T-SQL 代码。除非你正在测试一个新查询，通常第一步是识别需要优化的\
  \ T-SQL 代码。确定需要优化的查询后，你可能希望分析执行计划，以帮助确定是否有某个步骤明显需要优化。你可能还想分析与查询相关的信息，例如平均逻辑读取次数或平均执行时间。结合这些信息可能有助于你确定可以调整什么来提升性能。\n\
  \n此外，SQL Server 中有一些功能可以帮助自动使你的 T-SQL 代码运行得更好。这包括允许 SQL Server 分析新的执行计划，并确认其性能优于之前的执行计划。如果预期之前的执行计划性能更佳，SQL\
  \ Server 可以确保自动选择该计划。如果你使用的是 Azure SQL Database，在管理索引方面也有一个类似的选项可用。自适应联接的使用使 SQL\
  \ Server 能够让你的执行计划更加灵活。当自适应联接是执行计划的一部分时，SQL Server 可以根据特定查询执行时传递的值来决定使用正确的物理运算符。无论你是手动优化\
  \ T-SQL 代码，还是让 SQL Server 决定如何改进查询执行，你都有多种可用的工具来确保你的 T-SQL 代码运行得更好。\n\n"
- '# 9. 编码标准


  标准化代码库的优势之一是，无论作者是谁，它都将增强我们阅读和理解该代码的能力。你也可以将标准化理解为让每个人都遵循规则，这不仅体现在格式上，还体现在组织内预期或不允许的代码元素方面。标准化命名数据库对象的另一个好处是，它可以帮助提高你和你的团队快速找到你正尝试调试的特定
  T-SQL 代码部分的速度。


  在本章中，我将讨论实施编码标准的各种优势。我还将介绍在定义标准时应考虑哪些类型的因素。在制定标准时，你还需要确定如何实施这些编码标准。我将涵盖设立这些标准所需的基本流程。



  ## 为何要使用编码标准


  你可以采取多种不同的方法来提升代码质量。在改进代码质量时，你需要思考最终目标。我希望我的 `T-SQL` 代码能够高效运行、便于快速调试并且易于理解。这通常是通过在设计和编写
  `T-SQL` 代码时建立一致性而实现的结果。其中一个选择就是实施编码标准。


  通常，有些特定的 `T-SQL` 实践是明确希望大家遵循的。其中一些行为很容易达成共识，并且大多数人默认就在使用。然而，也可能存在其他一些 `T-SQL` 最佳实践，你知道它们在普遍情况下或在你的组织中并不常见。你希望创建一套指导方针，让每个人都能轻松知晓他们应该做什么。


  还有一些情况，无论出于何种原因，你都不希望在 `T-SQL` 代码中看到。同样，其中有些主题并不常见，但另一些可能也普遍存在。无论哪种情况，你都需要将这些明确界定为编码标准的一部分。使用编码标准可以最大限度地减少关于哪些类型的
  `T-SQL` 代码是被允许的、或者哪些代码优于其他代码的来回争论。


  你可以使用编码标准来设定允许和不被允许的边界。我遇到过这样的情况：软件工程师或数据库开发人员希望使用特定的 `T-SQL` 写法，因为它更易于阅读和编写。然而，有时对人类来说很容易理解的
  `T-SQL` 代码，在 `SQL Server` 上的性能表现却并不理想。虽然我希望这些同事能随时来找我咨询当前流程相关的问题，但有时我有太多更高优先级的请求，没有时间处理他们的关切。


  在缺乏标准导致冲突之前，能就这些指导方针达成一致是件好事。这也应该能提供一些保证，表明每个主题都已讨论过，且多方已达成共识：某些 `T-SQL` 代码在许多场景下表现良好，或者可能具有导致性能问题的高风险。


  我知道当我开始工作时，我的一天已经排满了。这不仅来自我知道需要做的事情，也来自最后一刻的请求和零散的问题。实施编码标准的真正目标是让你的生活更轻松。这包括能够安心休息，因为知道你的数据库中运行着高质量的
  `T-SQL` 代码。理想情况下，你应该能够将那些时间用于未来的数据库设计改进或消除技术债务。


  影响我们生活的另一个因素是决策疲劳。这个概念指的是一个人在一天中不得不做出一个又一个决定，从而感到精疲力竭。随着技术的出现，我们每天都经历着这种疲劳。当涉及到关于
  `T-SQL` 编码的决策时，这种决策疲劳可能更加令人不堪重负。在 `SQL Server` 中，有很多方法可以实现相同的功能。实施 `T-SQL` 编码标准的另一个优势是，它可以最大限度地减少数据库开发人员在编写新代码时需要做出的决策。


  当你首次实施编码标准时，务必获得所有相关方的认同。在许多情况下，你可能无法达成一致意见。如果可能的话，为你希望纳入编码标准的任何变更争取多数票。另一种方法是，确保在最终标准获得批准和实施之前，每个个体都同意这些标准。


  在工作场所中，`T-SQL` 面临的主要挑战之一是，许多负责编写 `T-SQL` 的人并非数据库专家。这可能导致挫败感，也可能导致查询性能不佳。`T-SQL`
  最令人喜爱也最难掌握的方面之一，就是编写第一个查询是多么容易。`SQL` 是结构化查询语言的缩写，查询的编写就是如此简单。你几乎可以像读句子一样阅读它们。


  然而，这可能给人一种错误的印象，认为 `SQL Server` 在后台处理的事情同样简单。我们大多数人工作在一个高压力、快节奏的环境中。这通常意味着我们没有时间停下来解释我们做出的每一个决定。这可能包括为何不应该使用某些
  `T-SQL` 代码。这正是 `T-SQL` 编码标准的优势真正显现的地方。它允许你只进行一次对话来设定基本规则。在这些规则或标准到位之后，只要符合预定义的标准，`T-SQL`
  开发人员和工程师就可以用他们想要的任何方式编写代码。


  我听过软件开发人员说，在编写应用程序时拥有明确的编码标准会非常有帮助。这让他们能够轻松地跳入任何代码，无论是不是他们写的，并立刻感到适应。这是因为，尽管他们可能知道自己从未看过这套代码，但他们的大脑已经看到了与他们编写过的其他代码的相似之处。它消除了那种“正在看的代码不是自己的”的瞬间反应。好处在于，他们可以立即着手审查代码或进行必要的修改。


  既然你已经决定要定义编码标准，下一步就是实施这些编码标准。事情在这里可能会变得棘手。你会很想让每一个经过 `脚本审查` 的 `存储过程` 都遵循这些标准。然而，你将看到的一些代码已经在生产环境中运行了。我发现有些时候，特别是当其他人面临严格的截止日期时，仅仅因为不遵循编码标准就拒绝一个
  `存储过程` 会令人特别沮丧。


  一个可能的折中方案是给予有条件的批准，并请求创建一个新的 `用户故事`，以便将 `T-SQL` 代码更新以符合新的编码标准。这既让开发者放心，他们可以满足当前
  `冲刺阶段` 的截止日期，也让你知道这个 `T-SQL` 代码应该在未来的版本中进行更正以满足编码标准。


  处理这些新的 `用户故事` 项的一个简单方法是将它们添加到下一个 `冲刺阶段`。这使得它们可以在你仍记得需要更改什么的时候得到清理。这也确保了执行 `脚本审查`
  的其他人知道，让所有 `T-SQL` 代码符合编码标准这项工作对所有相关方都很重要。


  ## 编码标准应包含什么


  理想情况下，制定编码标准将为你提供一个框架，能最大限度地减少你在审查和部署 `T-SQL` 代码时遇到的整体挑战。你希望编码标准涵盖 `T-SQL` 代码应有的外观、应有的功能、应有的性能表现以及应有的可理解性。


  编码标准的一些基础知识已经在第 4 章讨论过。这包括通过创建关于如何编写 `T-SQL` 的标准来格式化 `T-SQL` 代码。你还会需要指示如何命名 `T-SQL`
  数据库对象的标准。制定关于 `T-SQL` 代码应如何注释的标准也很有用。


  ### T-SQL 设计


  你也可以通过编码标准来定义数据库设计。这可以包括数据库对象（包括架构）应如何组织。编码标准还可以指出数据应如何存储在数据库中。你可以指明哪些类型的列应包含在主键中。同样，也可以指明表应如何进行聚簇，或者何时最好使用聚簇索引或非聚簇索引。



  #### ANSI 标准


  一个重要的考量是是否保持你的 T-SQL 代码符合 ANSI 标准。虽然 SQL Server 有一些可用的功能，但并非所有这些功能都符合 ANSI 标准。在许多情况下，SQL
  Server 特定的命令和函数可以使用 ANSI 标准代码重写。确保你以 ANSI 标准编写 T-SQL 代码，可以让你轻松迁移到另一个同样符合 ANSI 标准的关系数据库管理系统。


  #### 范式


  在涵盖 T-SQL 编码标准时，你可能还想定义设计元素。这包括数据应如何分组存放于表中，以及这些表中应包含哪些信息。存在不同级别的范式，你可以使用 T-SQL
  编码标准来指明这些是什么。通常讨论的数据库规范化类型包括第一范式 (1NF)、第二范式 (2NF)、第三范式 (3NF) 和第四范式 (4NF)。


  每种范式都建立在前一种之上。最低级别的范式是第一范式。它要求每个表必须有一个主键，并且每个字段或列只包含单个值。


  #### 表的大小


  创建表时，很容易想将与特定项目相关的所有列都放入同一个表中。这可能导致表拥有非常多列。拥有大量列的表所面临的挑战之一是数据的存储方式。这最终可能导致性能问题。你可以通过分析所存储信息的类型，并创建由信息子组构成的表来设计表，从而避免这类问题。例如，我可能想在同一张表中记录关于产品的所有信息，包括关于制造商、产品详情和销售价格的所有信息。但是，更好的做法是创建一个用于供应商信息的表和一个用于产品信息的表。这符合遵循数据库规范化最佳实践的要求。此外，设计得当的表能使整体数据库设计更能适应应用程序随时间发生的变化。


  #### 名称-值对


  使用 SQL Server 时，目标是考虑基于集合的操作。记住这一点，你在设计表时需要谨慎。你需要确保尽量减少列数以保持表的宽度较小。你需要考虑哪些类型的列是有价值的。如果你使用一列来定义值类型，另一列来定义实际值，那么你就设计了一个名称-值对关系。


  这种设计可能更易于理解并创建更简单的表，但这种设计并未充分利用 SQL Server 的优势。使用名称-值对时，使用索引变得越来越困难。因此，SQL Server
  需要查看更多的数据才能提取出所需的值。


  #### 主键


  在创建和设计表时，考虑将存储什么类型的数据。这不仅与数据的排序方式有关，还与表和其他表的关系有关。在许多情况下，将主键作为编码标准的一部分是理想的。虽然并非所有场景都需要主键，但它应有助于阐明哪些字段用于定义与其他表的关系。


  #### 外键


  SQL Server 是一个关系数据库管理系统，其主要优势之一是表之间的关系。但是，你需要指定表之间的关系，以便 SQL Server 可以确保在表中保存有效数据。当发生这种情况时，SQL
  Server 会检查存储值的表与引用表之间的关系。SQL Server 使用外键来实现这一点。因为 SQL Server 知道它可以信任这种关系，所以通常可以更有效地过滤数据并更快地找到数据。因此，指定外键关系作为
  T-SQL 编码标准的一部分可能是个好主意。


  #### 非聚集索引


  我发现非聚集索引是一个比我预期中更具争议性的话题。使用非聚集索引的挑战之一是记录数据作为索引的一部分或在值更改时更新索引存在相关成本。然而，SQL Server
  使用索引来快速查找各种查询引用的数据。确保使用非聚集索引的好处大于成本。


  你可以通过确保正确定义索引来实现这一点。由于维护索引有成本，你需要确保你创建的任何索引都被现有查询定期使用。你可能还想定义如何确定哪些列应作为索引的一部分，以及哪些列应作为索引的一部分被取回。


  #### 约束定义


  你的表可以有一个或多个列。每个列都保存某种类型的信息。对于这些信息，你可能知道只有某些值可以存储在该列中。在某些情况下，使用外键可以保持数据完整性，但在其他时候使用外键可能没有意义。在这些情况下，你可以对记录指定约束。约束可以限制可以存储在这些列中的信息类型。


  然而，强制 SQL Server 管理这些约束会给 SQL Server 带来额外负担。因此，你可能需要考虑尽量减少约束的使用来限制可存储在数据库中的数据类型，并依赖应用程序代码来提供良好的数据。约束的另一个用途是为某些字段指定默认值。这适用于那些你知道在创建记录时最可能存在的值的列。例如，你可能希望为
  `IsActive` 列指定默认值 True，因为大多数创建的记录在创建时都是活动的。同样，这可以由应用程序处理，但你也可以决定将其作为 T-SQL 编码标准的一部分来强制执行。


  考虑鼓励良好设计实践的 T-SQL 编码标准非常重要。这包括确定你将多大程度上遵循 ANSI 标准。还有其他主题需要包括，例如在数据库设计中选择允许的最低范式级别。这个决策可能会影响
  T-SQL 设计的其他方面，包括主键、外键和非聚集索引。你可能还需要考虑如何处理约束。一旦确定了要强制执行的良好 T-SQL 设计实践相关的 T-SQL 编码标准，你可能需要决定关于
  T-SQL 整体性能方面需要哪些编码标准。


  ### T-SQL 性能


  在确定了与数据库设计和实现相关的 T-SQL 编码标准后，你需要确定需要哪些标准来帮助最小化和解决可能出现的任何性能问题。这包括创建 T-SQL 编码标准，以帮助确保
  SQL Server 不会被不必要的信息拖累。你还需要考虑如何编写 T-SQL 代码以最小化性能开销。




  #### 选择必要数据


  SQL Server 可以存储大量数据，也能检索海量数据。在许多应用场景中，应用程序都需要进行数据检索。初次学习数据库及其关联表时，我们往往很容易会选择查询表中的所有列。尽管这是返回数据最简单的方法，但通常并非最佳选择。


  首先是使用星号（`*`）来选择所有行的语法。这种方法的问题在于，如果底层对象的列发生变化，代码可能无法按预期工作。更糟糕的是，代码可能不会报错，用户也就无从知晓他们正在获取错误的数据。


  第二个更常见的问题是：当你取回所有列时，会给 SQL Server 带来相当大的额外负担。SQL Server 不仅需要返回所有行的所有数据，而且很可能无法利用任何索引来返回这些数据。这就好比每次你想学习某个特定章节时，却要通读整本书。你确实能学到你需要的内容，但也花费了大量时间去阅读那些与你当前需求无关、很可能会被忽略的内容。


  #### 可搜索性


  我们希望 SQL Server 能够轻松地搜索数据库以找到你需要访问的信息。你可以通过一些方式来编写 `T-SQL`，从而让 `SQL Server` 能够利用索引快速找到必要的数据。然而，也存在其他编写
  `T-SQL` 的方法，它们能产生相同的结果，但可能耗时更长，并且需要 `SQL Server` 扫描更多的数据。这两种场景的区别在于，第一种场景确保你的 `T-SQL`
  是“可搜索的”，而第二种场景则是“不可搜索的”。这种情况通常发生在 `T-SQL` 语句的 `WHERE` 子句中。清单 [9-1] 展示了一个查询，用于查找所有在
  2022 年 10 月创建的客户。


  ```sql

  SELECT FirstName, LastName, Country

  FROM dbo.Customer

  WHERE DATEPART(MM, DateCreated) = 10

  AND DATEPART(YY, DateCreated) = 2022;

  ```


  清单 9-1

  使用非可搜索条件的查询


  你可以看到，在 `DateCreated` 列上使用了 `DATEPART` 函数来确定每条记录创建的月份和年份。为了让 `SQL Server` 确定哪些记录是在
  2022 年 10 月创建的，它需要检查表中的每一条记录。你可以从图 [9-1] 的执行计划中的索引扫描操作看到确实如此。


  ![](img/480547_2_En_9_Fig1_HTML.jpg)


  图 9-1

  来自非可搜索条件的执行计划


  当执行计划如此简单时，有时很难判断这些查询的实际性能如何。一个更好的方法是查看与此执行计划关联的属性。图 [9-2] 中包含大量信息，但让我们重点关注 `Number
  of Rows Read`（读取行数）。


  ![](img/480547_2_En_9_Fig2_HTML.jpg)


  图 9-2

  来自非可搜索条件的索引扫描的属性


  清单 [9-1] 中索引扫描读取的行数是 401,408。为了更好地判断此查询性能是否良好，让我们编写一个使用可搜索值的查询。在清单 [9-2] 中，代码仍然是查询
  `dbo.Customer` 表中 2022 年 10 月创建的记录，但现在它使用大于等于和小于运算符来指定一个确切的日期范围。


  ```sql

  DECLARE @StartDate DATETIME2(2) = ''2022-09-01'';

  DECLARE @EndDate DATETIME2(6) = DATEADD(mm, 1, @StartDate)

  SELECT FirstName, LastName, Country, DateCreated

  FROM dbo.Customer

  WHERE DateCreated >= @StartDate

  AND DateCreated < @EndDate;

  ```


  清单 9-2

  使用可搜索条件的查询


  虽然这样写可能看起来不那么简洁或更难阅读，但其重要性在于，我们编写了一个 `SQL Server` 可以快速确定哪些记录符合查询条件的查询。图 [9-3] 展示了清单
  [9-2] 查询的执行计划。


  ![](img/480547_2_En_9_Fig3_HTML.jpg)


  图 9-3

  来自可搜索条件的执行计划



  乍看之下，图 9-3 中的执行计划与图 9-1 中的执行计划非常相似。在比较外观相似的执行计划时，可以说它们具有相同的“形状”。虽然这些执行计划形状相似，但构成执行计划的项目是不同的。在图
  9-1 中，有一个`index scan`（索引扫描）。在图 9-3 中，你可以看到这个执行计划使用的是`index seek`（索引查找）。此外，图 9-3
  中`SELECT`的`index seek`之间的连线，也比图 9-1 中`SELECT`的`index scan`之间的连线更细。所有这些都是每个查询整体性能的图形化表示。不过，你也可以获取一些事实和数据来与清单
  9-1 和 9-2 中的查询性能进行比较。在图 9-2 中，实际读取的行数是 32,242。让我们将这个值与图 9-4 中实际读取的行数进行比较。


  ![](img/480547_2_En_9_Fig4_HTML.jpg)


  一张截图展示了聚集`index scan`的属性。物理和逻辑操作的值为`index seek`。执行模式和实际执行模式的值为`Row`。读取的行数为 401408。


  图 9-4

  基于可搜索条件的`index seek`属性


  清单 9-2 的实际读取行数为 1，如图 9-4 所示。将清单 9-2 读取的 392 行与清单 9-1 读取的 401,408 行进行比较，可以非常清楚地看出哪个查询更高效。


  你也可以查看两个查询的总`CPU`使用率，以了解每个查询的表现。如果你同时运行清单 9-1 和 9-2 中的查询，两个查询总执行计划的 98%都消耗在清单 9-1
  的查询上。你还可以使用`SET STATISTICS TIME ON`来查找`CPU`时间和已用时间。`CPU`时间是查询执行在`CPU`或多个`CPU`上花费的总时间。已用时间是查询执行的总时间。我运行这两个查询多次，发现清单
  9-1 的平均`CPU`时间为 15 毫秒，平均已用时间为 17 毫秒。而每次清单 9-2 的`CPU`时间和已用时间都是 0 毫秒。比较两者的`CPU`时间和已用时间，你可以清楚地看到清单
  9-2 的表现优于清单 9-1。清单 9-1 使用`index scan`读取数据，而清单 9-2 使用`index seek`访问数据。这种`index seek`使`SQL
  Server`能够显著降低估计的`I/O`成本以及估计的`CPU`成本。同样重要的是要注意，如果存在多个`CPU`，总已用时间可能少于总`CPU`时间。


  #### 隐式转换


  `SQL Server`中的数据都有数据类型。这些数据类型在第 2 章中讨论过。在使用这些数据类型时，确保保持数据类型一致性非常重要。否则，`SQL Server`必须进行隐式转换。这是指`SQL
  Server`在后台将一种数据类型转换为另一种数据类型。这可能会给`SQL Server`带来额外的负载。此外，还存在隐式转换失败的风险。我最常见到这种情况发生在一种标识类型列主要存储整数值，但偶尔也存储字符串值时。


  #### SET NOCOUNT ON


  你可以对`T-SQL`进行许多小调整，以实现一些微小的性能改进。当你运行`T-SQL`代码时，默认情况下，它会计算受影响的行数并可能报告回来。计算这些记录的成本可能是额外的几毫秒。因此，对编码标准的一个可能改进是关闭此功能，特别是在涉及存储过程时。实现这一点的方法是确保在存储过程内部包含`SET
  NOCOUNT ON`。你可以在清单 9-3 中看到这一点。


  ```sql

  /*-------------------------------------------------------------*\

  Name:             dbo.GetCustomer

  Author:           Elizabeth Noble

  Created Date:     2022-10-30

  Description:      获取数据库中所有客户的列表

  Sample Usage:

  EXECUTE dbo.GetCustomer;

  \*-------------------------------------------------------------*/

  CREATE PROCEDURE dbo.GetCustomer

  AS

  SET NOCOUNT ON;

  SELECT

  CustomerID,

  FirstName,

  LastName,

  Address,

  City,

  PostalCode,

  Country,

  IsActive,

  DateCreated,

  DateModified,

  DateDisabled

  FROM dbo.Customer;

  ```

  清单 9-3

  使用 `SET NOCOUNT ON` 的存储过程


  当在执行查询代码之前包含了`SET NOCOUNT ON`时，存储过程的执行时间可以减少几毫秒。


  #### NULL 值


  大多数`T-SQL`编码标准的存在是为了帮助提高`SQL Server`的整体性能。然而，有些`T-SQL`编码标准的存在是为了帮助改进查询结果，或者让人们更容易编写出按预期工作的代码。`NULL`的问题之一在于它的工作方式并不直观。在`SQL
  Server`中，`NULL`被视为一个未知值。这意味着`NULL`既不为真，也不为假。因此，对于可能包含`NULL`值的字段，处理这些字段的方式是不同的。


  此外，`NULL`值可能表明表设计得不够高效。在最终陷入这种情况之前，考虑表应该如何设计可能是有益的。你需要确保表确实需要包含可为空的列。这也与数据的存储方式以及索引的创建方式有关。你需要考虑这些数据将如何被使用。



  ##### NOLOCK


  最佳实践也应成为你编码标准的一部分。一些非常常见的最佳实践涉及高度争议的话题，例如在查询中何时或是否使用 `NOLOCK` 提示。我特别提到这一点的原因之一是，至少存在两大阵营围绕着
  `NOLOCK`。一方面，许多数据库管理员将不使用 `NOLOCK` 视为最佳实践。另一方面，许多开发者则认为使用 `NOLOCK` 是最佳实践。这种视角差异源于数据准确性和性能之间的权衡。


  `NOLOCK` 背后的理念是通过减少锁的数量来提高查询性能。就 `NOLOCK` 而言，减少的锁活动是在 `SELECT` 语句上。诸如 `INSERT`、`UPDATE`
  和 `DELETE` 之类的操作不受 `NOLOCK` 影响。但是，当数据修改操作持有 `SELECT` 语句试图访问的同一张表的锁时，在 `SELECT` 语句上使用
  `NOLOCK` 可以更快地返回结果。


  通过查看一个例子，你可以了解这些观点为何是正确的。清单 9-4 展示了一个在显式事务中向 `dbo.Customer` 表插入记录的查询。


  ```sql

  BEGIN TRAN

  INSERT INTO dbo.Customer

  (

  FirstName,

  LastName,

  Address,

  City,

  PostalCode,

  Country

  )

  VALUES

  (

  ''Stacy'',

  ''Parks'',

  ''123 Rua de Santa Catarina'',

  ''Porto'',

  ''1234-567'',

  ''Portugal''

  );

  ```

  清单 9-4

  向 dbo.Customer 插入记录


  在清单 9-4 中，已使用 `BEGIN TRAN` 启动了一个显式事务，但未指定 `COMMIT` 或 `ROLLBACK`。这将使事务保持打开状态，并对 `dbo.Customer`
  持有锁。为了模拟应用程序性能，让我们打开一个单独的查询窗口并运行一个查询，以查找在此表中创建于 2022 年 10 月 1 日之后的所有记录。你可以在清单 9-5
  中看到此查询的示例。


  ```sql

  SELECT FirstName, LastName, Country

  FROM dbo.Customer

  WHERE DateCreated > ''2022-10-01'';

  ```

  清单 9-5

  查询最近的客户


  由于清单 9-4 中的查询对 `dbo.Customer` 持有锁，该查询似乎持续运行。清单 9-5 中的查询正在等待锁被释放，然后才能返回任何数据。为了更快地获得结果，你可以更改
  SQL Server 处理表上锁的方式。在清单 9-6 中，你修改了清单 9-5 中的查询，并包含了一个查询提示 `WITH (NOLOCK)`。


  ```sql

  SELECT FirstName, LastName, Country

  FROM dbo.Customer WITH (NOLOCK)

  WHERE DateCreated > ''2022-10-01'';

  ```

  清单 9-6

  使用 NOLOCK 提示查询最近的客户


  当你在单独的查询窗口中运行清单 9-6 中的查询时，你几乎会立即得到结果。你可以在表 9-1 中看到这些结果的示例。


  表 9-1


  在 2022 年 10 月 1 日之后创建的客户


  | FirstName | LastName | Country |

  | --- | --- | --- |

  | Myra | Acharya | India |

  | Stacy | Parks | Portugal |


  查看前面的结果，你可以看到清单 9-4 中插入的记录包含在结果中。但是，此记录尚未提交到 SQL Server。你可以回滚清单 9-4 中的事务并撤销插入。这将导致表
  9-1 的结果不准确。查询返回未完全提交到数据库的结果，这种差异被称为**脏读** (`dirty read`)。这是在查询中使用 `NOLOCK` 时的最大风险。在决定应在
  T-SQL 代码中使用 `NOLOCK` 之前，请确保业务方（包括你的最终用户）了解使用此提示的潜在风险。


  ##### RECOMPILE


  除了 `NOLOCK`，另一个经常被考虑的查询提示是 `RECOMPILE`。你可能会发现自己正处理一个受参数嗅探 (`parameter sniffing`)
  影响的查询，如第 5 章所述。这意味着查询创建的执行计划可能对某些值表现良好，但当使用其他参数值时，性能会显著下降。可以轻松快速实施的解决方法之一是查询提示 `RECOMPILE`。在清单
  9-7 中，你可以看到在创建存储过程时为允许存储过程在执行时重新编译所需的额外行。


  ```sql

  /*-------------------------------------------------------------*\

  Name:             dbo.GetCustomerAndOrderNumberByProductID

  Author:           Elizabeth Noble

  Created Date:     2022-10-30

  Description:      Get customer and products ordered for an order number

  Sample Usage:

  EXECUTE dbo.GetRecipeAndIngredientByMealTypeID 1;

  \*-------------------------------------------------------------*/

  CREATE PROCEDURE dbo.GetCustomerAndOrderNumberByProductID

  @ProductID     INT

  WITH RECOMPILE

  AS

  SELECT

  cus.FirstName,

  cus.LastName,

  ord.OrderNumber,

  ord.OrderDate,

  prd.ProductName,

  SUM(dtl.QuantitySold),

  dtl.ProductPrice

  FROM dbo.Customer cus

  INNER JOIN dbo.CustomerOrder ord

  ON cus.CustomerID = ord.CustomerID

  INNER JOIN dbo.OrderDetail dtl

  ON ord.CustomerOrderID = dtl.CustomerOrderID

  INNER JOIN dbo.Product prd

  ON prd.ProductID = dtl.ProductID

  WHERE prd.ProductID = @ProductID

  ORDER BY cus.FirstName, cus.LastName;

  ```

  清单 9-7

  向存储过程添加 WITH RECOMPILE


  虽然这是一个快速修复方法，但它会增加服务器上的 CPU 负载。我建议如果可能的话，尝试重新设计查询。如果不行，你可能需要更改存储过程，使其仅针对落在多数情况之外的值进行重新编译。这是为了最大限度地减少每次运行存储过程时创建新执行计划所需的资源。如果重新编译仅限于较小的数据集，那么存储过程将不需要如此频繁地生成执行计划。


  对于你的 T-SQL 编码标准，重要的是包含与编写高性能 T-SQL 相关的指导原则。你还需要包含一些规则，规定允许或不允许采取哪些操作来尝试修复性能不佳的 T-SQL。你的
  T-SQL 编码标准的最后部分是一个包罗万象的部分，通常与安全性、未来适用性和可维护性有关。


  ### T-SQL 可用性


  拥有鼓励良好数据库设计并解决性能问题的 T-SQL 编码标准是一个好的开始。然而，你还需要一些编码标准来帮助处理 T-SQL 的其他方面。其中一些包括针对潜在安全问题的
  T-SQL 编码标准。你还可以实施其他编码标准，这些标准是最佳实践，但可能不影响性能。它们可能是为了帮助即使底层数据结构发生变化也能保持你的 T-SQL 功能正常，或者为了鼓励使用有助于使你的
  T-SQL 代码更易于阅读或理解的 T-SQL 命令。


  #### 链接服务器


  链接服务器是那些可能作为编码标准一部分而被忽视的事情之一。你似乎不太可能需要使用链接服务器，但链接服务器往往在你最意想不到的时候显得必要。这就是为什么将有关如何处理链接服务器的规范作为
  T-SQL 编码标准的一部分包含在内是一个好主意。由于使用链接服务器存在普遍的安全风险，建议除非必要，否则不要使用链接服务器。我建议明确定义什么被认为是必要的。这将有助于减少争议，万一你发现自己想要实现链接服务器的话。




  #### 列定义


  编写 T-SQL 的关键因素之一是明确指出您正在使用或影响哪些列。虽然这与确保只与所需数据交互相关，但要求 T-SQL 代码显式声明列名还有其他好处。在向 SQL
  Server 插入数据时，可以不声明所使用的列名或顺序。如果您正在向表中的每一列插入数据，并且插入数据的顺序与表中的列顺序相同，那么不会有任何问题。但是，如果将来从表中添加或删除列，或者更改了列顺序，这可能会导致存储过程或其他
  T-SQL 代码停止工作。因此，一个好的习惯是在所有 T-SQL 语句中显式声明列名。对于这些示例，这特别包括 `SELECT` 和 `INSERT` 语句。


  #### BETWEEN


  在编写 T-SQL 代码时，有时会有多种选择，而且这些选项的性能似乎都差不多。当您试图获取涵盖连续范围的数据子集时，就可能发生这种情况。在这种情况下定义 T-SQL
  编码标准不一定与提高 SQL Server 的性能相关。它更多地与提高 T-SQL 代码的一致性有关。清单 9-8 展示了一个如何使用 `BETWEEN` 编写
  T-SQL 的示例。


  ```

  SELECT FirstName, LastName, Country

  FROM dbo.Customer

  WHERE CustomerID BETWEEN 100 AND 20000;

  Listing 9-8

  Query with BETWEEN

  ```


  在可读性方面，您可能会决定所有涵盖包含值的范围都应该使用 `BETWEEN` 来编写。这可能比使用大于等于 (`>=`) 和小于等于 (`<=`) 来获取相同范围更可取。


  #### 存储过程参数


  虽然提高代码可读性很重要，但在处理性能问题时，提高 T-SQL 的可读性有时可能会使调试代码变得更加困难。这种情况的发生取决于您如何配置存储过程参数。您可以选择单独定义每个参数，也可以创建一个用户定义的表来传递大量变量。如果您选择使用用户定义的表，您的
  T-SQL 代码可能更简洁，但未来调试性能问题可能需要更多时间。此外，您的存储过程的工作方式会有所不同，因为您是在使用表变量，而不是单独处理每个数据字段。


  #### UNION


  有时您会希望合并来自两个不同查询的数据。这种组合涉及将一个数据集附加到另一个数据集。当这两个数据集具有相同数量的列且数据类型相同时，就可以使用 `UNION`
  语句来组合这些数据。使用 `UNION` 的优势在于查询具有可读性，通过阅读 T-SQL 代码可以很容易地看出发生了什么。使用 `UNION` 的挑战在于，`UNION`
  的性能可能比每个单独查询的性能更差。除了 `UNION`，还有 `UNION ALL` 功能。`UNION` 和 `UNION ALL` 之间的主要区别在于数据的返回方式。在
  `UNION` 语句中，返回的是一个不重复的记录集，而在 `UNION ALL` 语句中，每个单独查询的实际记录数都包含在结果集中。在设计编码标准时，您需要决定是否允许使用
  `UNION` 和 `UNION ALL` 语句。您可能还想决定在特定场景下是否允许使用它们。


  #### CAST 或 CONVERT


  在编写代码时，您可能会发现自己处于希望将数据类型从一种值更改为另一种的情况。在对整数值执行数学函数时，更改数据类型可能很重要。由于 SQL Server 执行数学运算的方式，如果您将一个整数除以另一个整数，得到的答案将是整数。如果您希望
  SQL Server 提供小数作为结果，则需要将数据类型从整数更改为小数。类似地，您可能希望在 SQL Server 查询中显示一串文本。或者，如果您在连接字符串时包含一个整数，当
  SQL Server 尝试执行查询时，您会收到错误。但是，如果您将整数更改为 `varchar` 数据类型，就可以正确解析字符串。


  例如，您可以指定所有代码在可能的情况下都应使用 ANSI SQL 标准。如果实施此策略，开发人员将必须对所有代码使用 `CAST`，除非他们需要格式化日期。然后开发人员才能使用
  `CONVERT`。或者，您可以规定所有日期格式化都必须在应用程序中处理。因此，`CONVERT` 将永远不被允许作为编码标准的一部分。


  #### 游标


  在数据库领域，游标是一个有争议的话题。在第 6 章中，我介绍了基于集合的操作，这是 SQL Server 表现最好的地方。游标的问题在于它们没有利用这些基于集合的操作。这在处理数据时可能会造成相当大的开销。加剧游标挑战的是，它们的编写方式更类似于应用程序代码的编写方式，而不是
  T-SQL。这可能使得使用游标非常诱人，因为它可能更容易理解如何编写代码以获得所需的结果。与制定 T-SQL 编码标准时的其他因素一样，您可能无法完全排除游标。如果是这样，请尝试创建一些标准，规定您认为游标会有益的情况，并将游标使用仅限于这些情况。


  #### ORDER BY


  通常很希望让 SQL Server 获取应用程序所需的全部数据。虽然 SQL Server 可以做到这一点，但您需要考虑让 SQL Server 完成您所请求的所有工作是否值得付出成本。当您希望数据为应用程序排序时，就可能出现这种情况。SQL
  Server 可以使用 `ORDER BY` 语句对数据进行排序，但让应用程序对这些数据进行排序可能是资源利用的更好方式。如果您决定这是处理数据排序的方式，那么在
  T-SQL 编码标准中包含不应在 SQL Server 中对数据进行排序的建议可能是个好主意。如果您知道在某些特定情况下这是不可避免的，您可以在编码标准中明确规定在哪些场景下允许在
  T-SQL 代码中使用 `ORDER BY`。


  #### CASE 语句


  T-SQL 代码可以非常灵活。虽然您可能选择将 T-SQL 代码仅限于应用程序功能，但数据库代码也用于其他目的，例如报告。在许多应用程序中，您可能同时处理事务并允许用户搜索和筛选数据。此类活动可以是报告活动。通常，用户不希望看到数据以与存储方式相同的形式呈现。例如，您可能有一个包含状态类型的表。一个给定的记录可能在一段时间内有几种状态。但是，用户可能希望看到一行中包含该特定记录的所有状态。这就是您需要使用
  `CASE` 语句的地方，以便可以将多行转换为多个列。执行此类活动并非纯粹是 T-SQL 的事务性使用，您可能希望将此类行为作为编码标准的一部分加以限制。




  ##### TRY…CATCH


  在 T-SQL 代码中加入错误处理是有益的，并且可能被您所在的工作场所视为最佳实践。您会希望应用程序能够妥善处理执行失败的存储过程。一种情况是存储过程不幸成为死锁的牺牲品。`TRY…CATCH`
  块可以使涉及死锁的存储过程能够重新运行或优雅地退出。请参见清单 9-9。


  ```sql

  DECLARE @FirstName      VARCHAR(40) = ''Stacy'';

  DECLARE @LastName       VARCHAR(100) = ''Parks'';

  DECLARE @Address        VARCHAR(100) = ''123 Rua de Santa Catarina'';

  DECLARE @City           VARCHAR(100) = ''Porto'';

  DECLARE @PostalCode     VARCHAR(20) = ''1234-567'';

  DECLARE @County         VARCHAR(75) = ''Portugal'';

  BEGIN TRY

  BEGIN TRAN

  INSERT INTO dbo.Customer

  (

  FirstName,

  LastName,

  Address,

  City,

  PostalCode,

  Country

  )

  VALUES

  (

  @FirstName,

  @LastName,

  @Address,

  @City,

  @PostalCode,

  @County

  );

  COMMIT TRANSACTION

  END TRY

  BEGIN CATCH

  PRINT ''Insert Failed'';

  ROLLBACK TRANSACTION

  END CATCH

  Listing 9-9

  Query Using TRY…CATCH

  ```


  一旦确定了要在 T-SQL 编码标准中包含的内容，下一步就是获得也将编写 T-SQL 的同事或其他部门的认可。让每个人都同意一套标准可以解决许多问题。首先，它有助于新员工入职。当他们审查代码时，会看到一致的代码风格。这将使他们能够专注于
  T-SQL 的功能，而不是试图解读 T-SQL 代码的编写方式。


  如果您创建了一个详尽且定义明确的编码标准，那么当出现不被认为是最佳实践的 T-SQL 时，在脚本评审过程中应该会减少来回讨论。有了 T-SQL 编码标准，各方都知道什么是允许的，什么是不受欢迎或不好的做法。新员工也会知道什么是可接受的
  T-SQL。每个人都可以被要求遵守相同的标准，并且它允许其他人看到编写 T-SQL 的规则是公平的。


  '
- "# 10. 源代码控制\n\n编写可管理的 T-SQL 代码是一个有价值的目标，它建立在可理解和可维护代码的坚实基础之上。第 4 章讨论了如何标准化您的 T-SQL\
  \ 代码。这在第 10 章继续，即实施 SQL 编码标准。这个基础的目的是为您的数据库创建一致的代码库。虽然开发一致的代码库有助于提高代码质量，但如果您无法维护您的\
  \ T-SQL 代码，这种效果就会减弱。\n\n开发可管理的 T-SQL 代码涵盖编写数据库代码的许多不同方面。前一章重点介绍了编码标准，以此作为指导您和其他人编写性能良好的\
  \ T-SQL 代码的方法。拥有性能良好且易于阅读的数据库代码可以帮助您的应用程序和开发过程。这条道路上的下一步是考虑如何存储您的代码。\n\n一个选择是使用源代码控制来保存与创建各种数据库对象相关的\
  \ T-SQL 代码。为什么源代码控制很重要，它能为改进 T-SQL 代码开发做些什么？知道您想实施源代码控制与定义管理源代码控制的过程是不同的。设置关于如何处理源代码控制的指导方针，使您处于一个良好的位置来开始在源代码控制中创建您的第一个数据库项目。\n\
  \n## 使用源代码控制的理由\n\n如果没有管理代码的方法，您最终可能会花费数小时审查脚本并为软件发布做准备。这种手动工作包括为脚本审查定位文件、手动比较生产环境和手动脚本之间的代码、确定在部署中包含哪些脚本，或在部署过程中手动运行每个脚本。这就是您可以从拥有可维护代码中受益的地方。这包括确保您可以找到任何数据库对象的\
  \ T-SQL 代码。您还希望知道您正在修改的是正确版本的代码。当错误版本的 T-SQL 代码被修改和部署时，可能会发生严重问题。它还将帮助您知道在任何时间点需要部署什么版本的代码。由于这些原因，数据库代码可以从纳入源代码控制中受益。\n\
  \n将 T-SQL 代码集中存放以便轻松访问可能是一个挑战。源代码控制可以帮助将所有 T-SQL 代码集中并有组织地存放在一起。源代码控制不再仅仅是应用程序开发所独有的。源代码控制允许您组织代码，并且它可以用来帮助围绕数据库开发创建结构。通过使用第三方工具作为提交、构建和部署过程的一部分，使用源代码控制可以更轻松地管理标准化您的\
  \ T-SQL 和实施编码标准。当您对数据库代码进行更改时，您可以选择在本地进行这些更改。如果您选择使用 SQL Server Data Tools (SSDT)\
  \ 并将所有数据库代码保存在同一项目中，您可以一起构建所有数据库，以确认任何数据库依赖关系是否按预期工作。`SSDT` 允许您在有或没有源代码控制的情况下管理数据库代码。这比手动将代码部署到\
  \ `SQL Server` 具有优势。作为构建过程的一部分，数据库项目将验证视图、函数、存储过程或其他 T-SQL 代码中的字段是否存在于数据库中。\n\n\
  编写 T-SQL 代码时还可能出现其他问题。您可能会遇到多人或团队需要更改相同数据库对象的情况。根据公司处理代码部署的方式，您最终可能会得到一些具有多层更改的数据库对象。源代码控制可以帮助管理这些更改并确保它们得到正确实施。此外，定义管理代码的流程可以帮助每个人为其需求使用正确的数据库代码版本。\n\
  \n如果您将所有数据库保存在同一解决方案中，可以在存在依赖关系时在数据库之间添加引用。如果从一个数据库的表中删除列，另一个数据库中依赖此列的存储过程将构建失败。构建失败会标识受影响的存储过程以及缺失的列引用。当您添加列或更改列名时，这可能特别有用。有时您可能想要重构表或其他数据库对象。如果您的应用程序和数据库保存在同一解决方案中，您将可以选择自动重构代码。\n\
  \n对 T-SQL 代码的一些更改可能很复杂且涉及广泛。其他时候，您可能正在处理对运行公司至关重要的数据库对象或代码。要开始修改代码，您需要确保使用的是最新版本的代码。在实施源代码控制之前，我有一个非常手动的代码审查过程，非常耗时。由于实施了源代码控制，审查数据库代码的速度可以大大提高。使用源代码控制可以让您确保一致地实施更改。\n\
  \n\n\n你可能需要一个能够修改代码、测试代码并重复此过程直到获得期望输出的环境。源代码控制可以将最近保存的 `T-SQL` 代码拉取到你的本地机器。然后你可以在本地桌面上对\
  \ `T-SQL` 代码进行修改。当你准备好保存工作时，可以将这些更改保存在本地。这样你就可以独立于其他开发者工作。当你确认更改无误后，可以将你的 `T-SQL`\
  \ 代码保存到中央位置。这个集中的仓库就成为你所有数据库更改的来源。\n\n使用源代码控制的另一个好处是，它能加速识别哪些 `T-SQL` 代码发生了变化。在使用源代码控制之前，我不得不手动审查整个数据库对象以确认变更内容。我发现的最佳流程是目视比较当前的生产环境存储过程与新版本的存储过程。虽然这种方法有一定效果，但我仍可能轻易忽略某些内容。\n\
  \n将数据库纳入源代码控制后，我可以轻松查看脚本审查中所有发生变化的代码。这使我能够快速浏览所有变更的 `T-SQL` 代码。我还可以使用源代码控制轻松地将 `T-SQL`\
  \ 代码与之前的版本进行比较。在比较过程中，被修改的代码部分会被高亮显示。更有帮助的是，新增、修改或删除的代码会以两种不同的颜色高亮显示。\n\n能够访问你的\
  \ `T-SQL` 代码，可以更轻松、更快速地为软件发布准备脚本。源代码控制还有助于防止未经批准的 `T-SQL` 代码被错误部署。如果没有用于 `T-SQL`\
  \ 的源代码控制，准备部署工作可能会很麻烦。\n\n你需要能够访问不同数据库和软件版本的脚本，同时还要跟踪随时间发生的变化。业务方可能决定回退到代码的某个先前版本。当该代码保存在源代码控制中时，更容易搜索特定数据库对象的各个版本并找到变更历史。借助源代码控制，我可以通过查找变更实施的时间来节省时间。如果你实施了自动化部署（如第\
  \ 13 章所讨论的），你可能有更快捷的方法来回退到代码的先前版本。\n\n你可以将源代码控制与第 12 章讨论的测试策略以及自动化软件发布相结合。这将使你能够最大限度地减少代码审查所需的人工工作，这可能有助于改善\
  \ IT 部门之间的业务关系。使用类似管理数据库代码的流程与应用程序开发流程，可以有助于提高源代码控制的采用率。当 `T-SQL` 代码存储在源代码控制中时，就为指向第三方工具打开了可能性。这些工具可以分析整个\
  \ `T-SQL` 代码库，并帮助自动化任务，例如自动拒绝或修正格式问题。\n\n> **提示**\n>\n> 自动化代码格式化的一种方法是结合 `Git` 使用\
  \ `precommit hooks`。\n\n源代码控制的另一个优势是，它为你多提供了一个工具，在灾难恢复情况下提供帮助。如果你丢失了所有硬件和备份，需要多长时间才能让业务重新运转？虽然你可能知道备份需要定期测试，但你可能最近没有机会进行测试。根据贵公司制定灾难恢复计划的方式以及灾难发生时的情况，这可能意味着你将无法访问当前的生产服务器及其所有相关数据。如果发生这种不太可能的情况，你可能会发现自己需要思考如何让应用程序重新运行起来。作为最后的手段，如果你的数据库与基础表中必要的数据都存放在源代码控制中，那么你就有机会让公司的系统重新启动并运行。\n\
  \n\n\n## 如何使用源代码控制\n\n我初次实施源代码控制时发现，真正实施前需要内部进行大量讨论。我发现数据库团队、开发团队和 QA 团队需要就未来如何管理代码达成一致。了解每个团队的目标和需求非常理想，这样才能设计出有效的流程来管理数据库代码。每个团队可能希望以不同方式管理各自的代码库。需要涵盖的一些要点包括：\n\
  \n*   何时使用本地仓库与中央仓库的准则\n*   如何将更改保存到源代码控制\n*   如何解决已部署的错误\n*   数据库代码中应包含哪些内容\n\n\
  源代码控制允许你在本地机器上处理代码。你可以创建或更改数据库对象，并在本地生成代码时，这为检查数据库项目能否成功构建提供了额外的确认。成功的构建表明已针对数据库运行了多项检查，以确认对象可以成功创建。一旦你测试并确认了你的数据库代码，就可以将其签入到中央位置。该位置可以是你本地设置的服务器，也可以是云端的服务器，例如\
  \ `GitHub` 的情况。这个中央仓库可以接收来自你以及团队中任何其他获准修改此数据库项目的成员的代码更改。此外，仓库可以让开发者或开发团队独立于彼此处理代码。\n\
  \n将对 `T-SQL` 代码的更改保存到本地通常称为 `提交`。在提交代码时，你可以为提交添加注释。你还可以实施关于如何编写提交消息的标准。一个例子是在提交消息前加上工单或用户故事编号。一旦中央仓库建立，各个用户就可以复制中央代码。此副本通常存储在开发人员的本地机器上，称为\
  \ `分支`。这个名称源于被称为 `主干` 的中央代码。在现代术语中，这被称为 `主分支`。在准备软件发布的分支时，添加对所处理问题的引用可能会有所帮助。`Git`\
  \ 和 `GitHub` 允许你在更改永久提交到仓库之前保存更改。`暂存更改` 是指你保存不立即提交到仓库的更改时使用的术语。可以通过 `Azure Data\
  \ Studio` 或命令行为提交暂存更改。\n\n随着越来越多的公司希望结合使用敏捷、看板、Scrum、持续集成或持续交付，拥有一个更灵活的源代码控制解决方案变得越来越重要。该解决方案需要允许多个团队同时处理相同的代码库，而不会对软件发布产生负面影响。这正是\
  \ `Git` 流行的起源。\n\n如果你使用 `SQL Server Data Tools` 和 `Visual Studio`，每个代码仓库将包含至少一个数据库解决方案。在数据库解决方案中，每个数据库将有一个单独的数据库项目。你可以选择每个数据库项目是否拥有自己的解决方案，或者所有项目是否共享同一个解决方案。`Azure\
  \ Data Studio` 或 `Visual Studio Code` 有一个用于数据库项目的扩展。这些数据库项目存在于工作区内，类似于解决方案。工作区提供了一种访问给定文件夹内数据库项目的方法。将所有应用程序和数据库放在同一个解决方案中是可能的，但这超出了本书的范围。这些决策不仅基于偏好和所需功能。正如你将在第\
  \ 13 章看到的，你如何组织仓库也将决定你的代码如何部署。\n\n在仓库内部，有一个或多个分支的概念。其中一个分支是主分支。可以将其视为你需要部署这些更改时通常会去使用的那组代码。这个分支称为\
  \ `main`。任何时候你想对 `main` 分支进行更改，通常最好创建一个新分支来编写你的 `T-SQL` 代码。这使得 `main` 分支不受正在开发中且尚未准备好部署的代码影响。这样，`main`\
  \ 分支就可以与当前部署到生产环境的代码相匹配。\n\n当每个分支发生这些提交时，你可能会遇到在同一次部署中需要部署两个不同分支的情况。这时你会希望尝试合并这些代码。为了合并代码，需要获取分支中的更改并将其添加回\
  \ `main` 或发布分支。将功能分支合并到主分支称为 `合并`。在此过程中可能发生的一个方面称为 `冲突`。当许多人在同一时间段内处理同一个数据库对象，或者延迟将之前的功能分支与主分支合并时，就可能发生冲突。确保与开发团队合作，以更好地了解如何避免合并冲突以及如何解决它们。\n\
  \n\n\n\n### 回滚更改\n\n有一种情况比我们一些人愿意承认的更常见，那就是代码部署后运行结果不如预期。我曾多次遇到在部署过程中就发现缺陷的情况。另一些时候，这些缺陷直到部署后数天、数周或数月才被发现。无论哪种情况，关键是要迅速将数据库恢复到功能更佳的状态。我曾与开发人员和质量保证团队讨论过在部署当晚应如何处理此事。一个缺陷可以通过\
  \ `T-SQL` 脚本手动修复。根据你管理数据库代码软件发布的方式，这个修复可能在未来的部署中被撤销。如果你将缺陷修复放入源代码管理，就能确保此修复不会在未来被撤销。\n\
  \n因此，我们采纳了所谓的“前滚”策略。如果我们能快速定位并解决问题，我们会将这些更改检入源代码管理，并将其部署到各个环境。前滚遵循与手动部署热修复相同的过程。然而，将更改加入源代码管理确保了此修复不会在未来的软件发布中被回滚。此前滚策略仅允许在部署当晚使用。我们采纳此策略时的理念是，我们将部署所有已合并到主分支的代码。如果你选择部署的数据库项目版本不是最新版本，将无法使用此方法。\n\
  \n我们还采用了一种使用热修复的方法。这些是因为应用程序功能严重缺失而需要尽快进行的更改。由于开发中可能有多个项目，我们不能直接部署最新的数据库代码。在这些情况下，我仍然会将修改后的\
  \ `T-SQL` 代码检入源代码管理。该代码可能已部署到开发环境并在我们的质量保证环境中测试过，但会被手动部署到生产环境。其理念是下次部署数据库代码时，该数据库对象将已经存在。\n\
  \n设计如何保存数据库代码也涉及与开发、质量保证和发布管理团队的沟通。现有的各种方法各有利弊。你可以将所有数据库项目与所有应用程序代码保存在同一解决方案中。虽然这可能会使项目构建时间变长，但如果建立了正确的关系，你可以确保数据库的更改不会影响应用程序的功能。根据公司中应用程序的数量，这可能是一项艰巨的任务。另一种选择是将所有数据库项目保存在同一解决方案中。将所有数据库项目保存在同一解决方案中也会导致它们保存在同一代码仓库中。如果你有跨数据库依赖关系，此方法将有助于保护你的数据库。当你对一个数据库对象进行更改，且不确定这些更改是否会破坏另一个数据库的功能时，这种方法特别有用。最后一个选项是为每个数据库创建一个解决方案。此方法的优点是可以独立开发每个数据库。缺点是你可能对某个数据库的更改会破坏另一个数据库的功能。\n\
  \n在将第一个数据库置于源代码管理之前，我建议与公司的其他团队讨论本节的主题。确保在编写、测试和保存数据库代码更改方面达成一致。在修复已部署的数据库代码时，也要争取他人的支持。同时考虑你希望数据库项目之间以及它们与你的应用程序如何交互。一旦你考虑了所有这些因素，就可以创建你的第一个数据库项目了。\n\
  \n### 设置源代码管理\n\n既然你已决定为数据库实施源代码管理，并且已经确定了如何设置数据库项目的一些基本准则，那么让我们开始设置吧。本节假设由其他人负责采购、安装和配置源代码管理。源代码管理初始设置涉及许多因素，它们超出了本书范围。首先要做的事情之一是让你使用的任何\
  \ `IDE` 连接到源代码管理。一旦连接到源代码管理，就要创建一种方式来存储你的数据库源代码管理。在有了存放数据库源代码管理的地方之后，你需要弄清楚如何进行并保存数据库代码的更改。\n\
  \n在本节中，我将使用 `Azure Data Studio`、`数据库项目扩展`、`Git` 和 `GitHub` 将数据库纳入源代码管理。为了在 `Azure\
  \ Data Studio` 中管理数据库项目，你需要安装 `数据库项目扩展`。图 10-1 展示了如何在 `Azure Data Studio` 中添加 `数据库项目扩展`。\n\
  \n![](img/480547_2_En_10_Fig1_HTML.jpg)\n\n一张标题为“扩展市场”的截图，其中数据库项目显示在一个横条中。下方，其右侧角落显示了\
  \ SQL 数据库项目的安装按钮。\n\n图 10-1\n\n在 `Azure Data Studio` 中安装 `数据库项目扩展`\n\n在 `Azure Data\
  \ Studio` 中安装 `数据库项目扩展` 后，`Azure Data Studio` 最左侧会出现一个新图标，形状像两个应用程序窗口叠在一起。现在你可以创建一个工作区来处理数据库项目。\n\
  \n注意\n\n在 `Azure Data Studio` 或 `VS Code` 中处理数据库项目时，会创建一个工作区文件来管理数据库项目。在 `Visual\
  \ Studio` 中，会创建一个解决方案文件来管理数据库项目。\n\n`Azure Data Studio` 有几个选项可用于开始处理数据库项目：\n\n*\
  \   从“数据库项目”窗口\n    *   `新建项目`\n\n*   `打开现有项目`\n\n*   从“数据库项目”窗口的菜单中\n    *   `从数据库创建项目`\n\
  \n*   `从数据库更新项目`\n\n*   `从 OpenAPI/Swagger 规范生成 SQL 项目`\n\n这些选项涵盖了你在创建数据库项目时可能考虑的各种场景。如果从“数据库项目”窗口选择\
  \ `新建项目`，`Azure Data Studio` 将创建一个新的空数据库项目。如果你本地已保存有数据库项目，你可能想在 `Azure Data Studio`\
  \ 中使用 `打开现有项目` 选项。如果你已在使用在 `Azure Data Studio`、`VS Code` 或 `Visual Studio` 中创建的数据库项目，也可以使用此选项。然而，如果你想基于现有数据库或数据库结构创建新的数据库项目，这两个选项都不是最佳选择。\n\
  \n开始使用源代码管理最简单的方法之一是将现有数据库添加到源代码管理。`Azure Data Studio` 使这变得简单，它允许你从现有数据库创建数据库项目。最棒的是，这还会将所有数据库对象分类放入文件夹中，以便你轻松管理代码。从现有数据库创建数据库对象时，你可以选择这些对象在新数据库项目中的组织方式。\n\
  \n\n"
- '# 创建和管理数据库项目


  ### 文件夹结构选项


  在创建数据库项目时，您可以选择将文件夹结构组织为**文件**、**扁平**、**对象类型**、**架构**或**架构/对象类型**。


  *   如果选择**文件**，所有数据库对象将保存在一个文件中。如果您计划向此文件添加新的 T-SQL 来创建数据库对象，它们需要被附加到这个单一文件中。

  *   下一个可用选项是**扁平**。扁平选项为每个数据库对象创建一个独立的 `.SQL` 文件。主键、外键、约束和索引都包含在指定表的 `.SQL` 文件中。此选项比文件选项更容易管理单个对象，但要修改任何现有对象，您将需要搜索整个文件列表以找到特定对象。


  其他三个选项——**对象类型**、**架构**和**架构/对象类型**——是类似的。


  *   **对象类型**文件夹选项为每种对象类型创建文件夹。所有表保存在一个文件夹中，另一个文件夹包含所有存储过程。

  *   如果您更喜欢按架构保存 `.SQL` 文件，这也是一个选项。如果您在比 `dbo` 更多的架构中创建数据库对象，这会很有帮助。

  *   **架构/对象类型**为每个架构创建文件夹，并在每个架构内为数据库对象类型创建子文件夹。


  虽然选择如何组织文件是个人偏好的问题，但文件组织对所有开发人员都是相同的。因此，您可能希望在实现之前讨论要选择哪种组织方法。


  ### 创建新的数据库项目


  现在您了解了有关创建数据项目和可用选项的更多信息，您可以创建一个数据库项目。要将一个新的空数据库添加到源代码控制中，请选择 **Database Projects**
  扩展，然后选择 **Create new** 或 **Open existing**。


  在本例中，选择 **Create new**，以便您可以构建一个全新的数据库。选择 **Create new** 后，您将得到一个名为 *Create new
  database project* 的滑出窗口，如图 10-2 所示。


  ![创建新数据库项目页面的截图显示了三种数据库类型。下方要求输入名称、位置和目标平台，并在右角显示创建和取消按钮。](img/480547_2_En_10_Fig2_HTML.jpg)


  **图 10-2** 创建新的数据库项目


  在此步骤中，您正在创建一个包含新数据库项目的新工作区。将 `OutdoorRecreation` 数据库项目保存到 `D:\repos\`。


  在源代码控制（例如 Git）的当前状态下，存在一个拥有集中式仓库的概念。这是保存所有代码并可供用户访问的位置。预期是用户将在其本地机器上创建代码的副本并在其本地机器上进行更改。这有时被称为*本地仓库*。这与您的其他本地仓库保存的位置相同。在本例中，您选择创建
  SQL Server 数据库。但是，也可以创建 Azure SQL 数据库或 Azure SQL Edge 数据库。


  ### 将工作区添加到 GitHub 仓库


  下一步是将工作区添加到 GitHub 仓库。当您选择**源代码控制**图标（顶部有两个圆圈，通过线条连接到底部的一个圆圈）时，滑出窗口会为您提供 **Initialize
  Repository** 或 **Publish to GitHub** 的选项，如图 10-3 所示。


  ![源代码控制页面的截图突出显示了初始化存储库和发布到 Git Hub 按钮。](img/480547_2_En_10_Fig3_HTML.jpg)


  **图 10-3** Azure Data Studio 中的初始仓库设置


  由于您没有现有的仓库，因此需要选择 **Initialize Repository**。这将启动一个弹出窗口，要求允许 GitHub 扩展使用 GitHub 登录。这将允许您同时初始化和创建仓库。


  > **注意**

  > Git 和 GitHub 是两个独立的东西。Git 是用于管理分布式版本控制更改的软件。GitHub 是用于托管基于 Web 的 Git 仓库的托管服务。


  将仓库命名为 `OutdoorRecreation`。为仓库提供描述“Database project for Menu”。为仓库选择一个许可证。但是，详细讨论
  Git ignore 或可用的许可选项超出了本书的范围。最后需要指定的是私有仓库。公共仓库和私有仓库之间的主要区别在于您是否希望其他人能够访问、下载并对您的代码提出建议。


  图 10-4 显示了一个链接到我的 GitHub 账户的新仓库。


  ![源工具页面的截图在水平栏中显示了创建存储库选项。下方显示了一个标题为“更改”的下拉列表。](img/480547_2_En_10_Fig4_HTML.jpg)


  **图 10-4** Azure Data Studio 中可见的本地仓库


  您可以在**源代码控制**窗口中看到 `Outdoor Recreation` 工作区现在已设置为本地仓库。如果您返回到 **Database Projects**
  窗口，您将能够看到当前与数据库项目关联的所有对象。对话框窗口如图 10-5 所示。


  ![数据库项目页面的截图显示了户外娱乐和数据库引用选项。](img/480547_2_En_10_Fig5_HTML.jpg)


  **图 10-5** Azure Data Studio 中可见的数据库项目


  如图 10-5 所示，没有数据库对象与此项目关联。您可能会注意到图 10-4 和图 10-5 的布局几乎完全相同。图 10-4 显示了**源代码控制**窗口。右上角的选项是如何查看提议的更改、提交更改、刷新显示的更改或附加源代码控制选项菜单的选项。图
  10-5 中的选项是能够创建新的数据库项目、打开现有项目、刷新数据库项目或与管理数据库项目相关的特定操作的菜单。


  ### 从现有数据库更新项目


  如果您想使用现有数据库中的对象更新数据库项目，您可以通过选择菜单轻松完成，该菜单可以通过选择数据库项目窗口右上角的 `…` 来打开。然后，您可以选择 **Update
  Project From Database**。这将打开 *Update project from database* 窗口，您可以在其中指定源数据库、目标项目和更新操作，如图
  10-6 所示。


  ![标题为“从数据库更新项目”的页面截图显示了源数据库、目标项目和更新操作选项。它为操作更新勾选了“在架构比较中查看更改”选项。](img/480547_2_En_10_Fig6_HTML.jpg)


  **图 10-6** 从数据库更新项目窗口


  *Update project from database* 窗口的一个有用功能是可以在架构比较中查看更改或应用所有更改。在本例中，让我们在更新数据库项目之前查看更改。同时，指定文件夹结构应按架构然后按对象类型存储所有对象。一旦您选择
  **Update** 按钮，您将获得一个新窗口，如图 10-7 所示，将数据库 `OutdoorRecreation` 与源代码控制中当前的对象进行比较。由于您刚刚创建此工作区，源代码控制中没有对象。


  ![图像占位符](img/480547_2_En_10_Fig7_HTML.jpg)



