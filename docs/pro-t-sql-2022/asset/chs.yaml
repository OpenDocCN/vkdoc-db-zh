  ### 使用 T-SQL 获取执行计划信息


  还有一个选项是使用 T-SQL 来获取执行计划信息，而不是执行查询。此 T-SQL 代码将提供无图片的输出。如果你想获取有关 SQL Server 将如何执行查询的信息以及估算值，应使用清单
  7-3 中的 T-SQL。


  ```sql

