  \    ord.CustomerOrderID,\n    prd.ProductID\nINTO #TmpOrder\nFROM dbo.Customer\
  \ cus\nINNER JOIN dbo.CustomerOrder ord\n    ON cus.CustomerID = ord.CustomerID\n\
  INNER JOIN dbo.OrderDetail dtl\n    ON ord.CustomerOrderID = dtl.CustomerOrderID\n\
  INNER JOIN dbo.Product prd\n    ON dtl.ProductID = prd.ProductID\nWHERE (cus.CustomerID\
  \ = @CustomerID OR @CustomerID = -1)\n    AND (ord.CustomerOrderID = @CustomerOrderID)\n\
  \    AND (dtl.ProductID = @ProductID OR @ProductID = -1)\n    AND prd.IsActive =\
  \ 1;\n\nSELECT ProductID\nINTO #HistPriceCost\nFROM dbo.ProductPriceHistory\nGROUP\
  \ BY ProductID\nHAVING COUNT(*) > 3;\n\nSELECT\n    cus.CustomerID,\n    cus.FirstName,\n\
  \    cus.LastName,\n    ord.CustomerOrderID,\n    ord.OrderNumber,\n    prd.ProductName,\n\
  \    dtl.QuantitySold,\n    dtl.ProductPrice\nFROM #TmpOrder tor\nLEFT JOIN #HistPriceCost\
  \ hpc\n    ON tor.ProductID = hpc.ProductID\nLEFT JOIN dbo.Customer cus\n    ON\
  \ tor.CustomerID = cus.CustomerID\nINNER JOIN dbo.CustomerOrder ord\n    ON tor.CustomerOrderID\
  \ = ord.CustomerOrderID\nINNER JOIN dbo.OrderDetail dtl\n    ON tor.CustomerOrderID\
  \ = dtl.CustomerOrderID\n    AND tor.ProductID = dtl.ProductID\nINNER JOIN dbo.Product\
  \ prd\n    ON tor.ProductID = prd.ProductID\nWHERE hpc.ProductID IS NOT NULL\nORDER\
  \ BY\n    cus.CustomerID,\n    CASE WHEN (cus.CustomerID = @CustomerID AND ord.CustomerOrderID\
