  | --- | --- | --- |

  | 客户名称 | 产品 | 订单日期 |

  | 客户地址 | 产品价格 | 订单状态 |

  |   | 产品成本 | 当前产品价格 |

  |   |   | 销售数量 |


  一旦信息被分组，数据就可以按组存储。在数据库中，这些组被称为 `表`。如果你开始填充客户数据，数据可以存储在如表 5-2 的表中。


  表 5-2


  客户信息


