  \ | `Postal Code` | `Country` |\n| --- | --- | --- | --- | --- | --- |\n| 401407\
  \ | Karim | Khalil | Memphis | 3364932 | Egypt |\n| 401405 | Marty` | Bethel | Memphis\
  \ | 38117 | United States |\n| 401408 | Ruth | Johnson | Memphis | 38110 | United\
  \ States |\n\n在这种情况下，我会想要运行一个查询，其中城市名称等于“Memphis”。如你在此示例中所见，这不仅在数据集合方面存在限制（影响性能），还可能影响功能。\n\
  \n使用数据集合时最大的挑战之一与插入数据记录有关。在大多数情况下，当你插入数据记录时，一次只插入一条记录。这可能导致你养成一次只处理插入一条单独记录的习惯。当你设计新表或移动数据时，你可能会遇到可以从数据集合角度考虑插入操作的情况。这通常在你创建查询以将数据插入另一个表时发生。\n\
  \n虽然这些情况看起来不会经常出现，但我在填充临时表、表变量和公用表表达式时经常使用数据集合。\n\n以集合形式插入数据建立在以数据集合形式选择数据的基础之上。一旦你以集合形式选择了数据，就可以以集合形式插入数据。我使用将数据插入对象（如临时表）的方式有几个不同的原因。插入数据集合的一个更常见的情况是当我连接几个不同的表，并实现涉及复杂计算或函数的准则时。查看表\
  \ 5-16 和表 5-17，你可以看到一些插入到 `dbo.Customer` 中的数据示例。\n\n表 5-17\n作为记录添加的 Ruth\n\n| `CustomerID`\
  \ | `First Name` | `Last Name` | `City` | `Postal Code` | `Country` |\n| --- | ---\
  \ | --- | --- | --- | --- |\n| 401408 | Ruth | Johnson | Memphis | 38110 | United\
  \ States |\n\n表 5-16\n作为记录添加的 Marty`\n\n| `CustomerID` | `First Name` | `Last Name`\
  \ | `City` | `Postal Code` | `Country` |\n| --- | --- | --- | --- | --- | --- |\n\
  | 401405 | Marty` | Bethel | Memphis | 38117 | United States |\n\n虽然所有这些条目都可以单独插入，但也可以一次插入多条记录。在这种情况下，它可能看起来像表\
  \ 5-18 所示。\n\n表 5-18\n作为数据集合添加客户\n\n| `CustomerID` | `First Name` | `Last Name`\
  \ | `City` | `Postal Code` | `Country` |\n| --- | --- | --- | --- | --- | --- |\n\
  | 401405 | Marty` | Bethel | Memphis | 38117 | United States |\n| 401408 | Ruth\
  \ | Johnson | Memphis | 38110 | United States |\n\n我使用批量插入到临时对象中的另一个场景是，当这些记录可能需要通过连接到包含多表连接的其他查询来进行额外修改时。\n\
  \n\n"
- "# 使用数据集\n\n如果你正在更改应用程序代码的工作方式，例如插入新表或修改值的填充方式，你可能会发现自己需要执行批量更新。虽然你可以通过使用硬编码值逐条更新记录来完成批量更新，但让我们看看是否有一种方法能够使用相同的代码逻辑来更新数据集中的所有记录。这正是数据集真正能帮助你的地方。\n\
  \n你可以编写一个查询来查找所有需要更新的记录，并系统地执行所有这些更新操作。除了在性能和功能方面的优势外，这种处理方式还能确保你的数据得到一致性的处理。\n\n\
  总的来说，作为数据集更新数据的过程与之前讨论的选择和插入数据的方法非常相似。在表 5-19 中，你可以看到存储在 `dbo.Customer` 表中的信息。\n\
  \n### 表 5-19：客户与地址信息\n\n| 名字 | 姓氏 | 地址 | 城市 | 邮政编码 | 国家 |\n| --- | --- | --- | ---\
  \ | --- | --- |\n| Myra | Acharya | 30 Magrath Road | Bengaluru | 560025 | India\
  \ |\n| Josè | Gomez | 790 Calle Cinco de Mayo | Cancun | 53778 | Mexico |\n| Stacy\
  \ | Parks | 123 Rua de Santa Catarina | Porto | 1234-567 | Portugal |\n| Karim |\
  \ Khalil | 153 Road Mit Rahina Al Shabab | Memphis | 3364932 | Egypt |\n\n虽然这是客户当前的保存方式，但你可能会决定要改变地址信息的保存方式。例如，你可能希望将国家字段改为使用国家代码缩写，而不是完整的国家名称。在这种情况下，你可以如表\
  \ 5-20、表 5-21、表 5-22 和表 5-23 所示，逐条更新记录。\n\n### 表 5-23：为 Josè 更新国家\n\n| 名字 | 姓氏 |\
  \ 地址 | 城市 | 邮政编码 | 国家 |\n| --- | --- | --- | --- | --- | --- |\n| Karim | Khalil\
  \ | 153 Road Mit Rahina Al Shabab | Memphis | 3364932 | EGY |\n\n### 表 5-22：为 Stacy\
  \ 更新国家\n\n| 名字 | 姓氏 | 地址 | 城市 | 邮政编码 | 国家 |\n| --- | --- | --- | --- | --- | ---\
  \ |\n| Stacy | Parks | 123 Rua de Santa Catarina | Porto | 1234-567 | PRT |\n\n\
  ### 表 5-21：为 Josè 更新国家\n\n| 名字 | 姓氏 | 地址 | 城市 | 邮政编码 | 国家 |\n| --- | --- | --- |\
  \ --- | --- | --- |\n| Josè | Gomez | 790 Calle Cinco de Mayo | Cancun | 53778 |\
  \ MEX |\n\n### 表 5-20：为 Myra 更新国家\n\n| 名字 | 姓氏 | 地址 | 城市 | 邮政编码 | 国家 |\n| --- |\
  \ --- | --- | --- | --- | --- |\n| Myra | Acharya | 30 Magrath Road | Bengaluru\
  \ | 560025 | IND |\n\n要使用 `T-SQL` 逐条执行这些更新，请运行下面的代码清单 5-4。\n\n```sql\nUPDATE dbo.Customer\n\
  SET Country = 'IND'\nWHERE CustomerID = 401408;\nUPDATE dbo.Customer\nSET Country\
  \ = 'MEX'\nWHERE CustomerID = 401406;\nUPDATE dbo.Customer\nSET Country = 'PRT'\n\
  WHERE CustomerID = 401409;\nUPDATE dbo.Customer\nSET Country = 'EGY'\nWHERE CustomerID\
  \ = 401407;\n```\n*清单 5-4：逐个更新国家代码*\n\n你可以创建一些查询来批量更新所有国家为印度、墨西哥、埃及或葡萄牙的记录。代码清单\
  \ 5-5 展示了这些查询。\n\n```sql\nUPDATE dbo.Customer\nSET Country = 'IND'\nWHERE Country\
  \ = 'India';\nUPDATE dbo.Customer\nSET Country = 'MEX'\nWHERE CustomerID = 'Mexico';\n\
  UPDATE dbo.Customer\nSET Country = 'PRT'\nWHERE CustomerID = 'Portugal';\nUPDATE\
  \ dbo.Customer\nSET Country = 'EGY'\nWHERE CustomerID = 'Egypt';\n```\n*清单 5-5：按国家更新国家代码*\n\
  \n这段代码可以工作，并创建了一些集合。但还有更高效的方法来更新这些数据，特别是当你不想为每个国家创建一个查询时。你可以创建一个包含完整国家名称和三位国家代码的引用表。然后编写一个简单的查询，同时更新所有记录，如表\
  \ 5-24 所示。\n\n### 表 5-24：按国家分组的客户数据集\n\n| 名字 | 姓氏 | 地址 | 城市 | 邮政编码 | 国家 |\n| ---\
  \ | --- | --- | --- | --- | --- |\n| Myra | Acharya | 30 Magrath Road | Bengaluru\
  \ | 560025 | IND |\n| Josè | Gomez | 790 Calle Cinco de Mayo | Cancun | 53778 |\
  \ MEX |\n| Stacy | Parks | 123 Rua de Santa Catarina | Porto | 1234-567 | PRT |\n\
  | Karim | Khalil | 153 Road Mit Rahina Al Shabab | Memphis | 3364932 | EGY |\n\n\
  此表显示了你希望使用单个查询更新的整个数据集。在执行更新之前，你应该先创建引用表。创建该表的 `SQL` 语句在代码清单 5-6 中。\n\n```sql\n\
  CREATE TABLE dbo.Country\n(\nCountryCode VARCHAR(3),\nCountry     VARCHAR(75)\n\
  );\nINSERT INTO dbo.Country (CountryCode, Country)\nVALUES\n('EGY','Egypt'),\n('IND','India'),\n\
  ('MEX','Mexico'),\n('PRT','Portugal');\n```\n*清单 5-6：创建国家引用表*\n\n现在 `Country` 表已经创建好了，你可以编写一个单一的查询，只要国家名称存在于引用表中，它就会将所有国家名称更新为你指定的国家代码。代码清单\
  \ 5-7 中的 `SQL` 会更新所有客户记录，如果国家名称存在于 `dbo.Country` 表中，则使用对应的国家代码。\n\n```sql\nUPDATE\
  \ cus\nSET Country = cty.CountryCode,\n    DateModified = GETDATE()\nFROM dbo.Customer\
  \ cus\nINNER JOIN dbo.Country cty\n    ON cus.Country = cty.Country;\n```\n*清单 5-7：将客户国家更新为国家代码*\n\
  \n虽然这些更新可以通过硬编码值来完成，但有时将你正在更新的表与其他相关表连接起来可能更好。表之间的这种交互可能使执行更新操作变得更加容易。\n\n你可以使用客户的地址来决定如何更新国家代码。思考一下你想要使用的逻辑会很有帮助。如果你想在地址中添加所属大洲，你首先需要确定每个客户所在的国家。下一步是获取一个包含国家及其对应大洲的表。一旦你拥有了这两部分信息，你就可以创建一个临时表来将国家映射到特定的大洲。虽然对于仅仅几处更改来说，这似乎需要大量的工作，但其威力体现在你需要长期维护这些数据，并且可能需要更频繁地进行此类更新时。\n\
  \n总的来说，我发现每当我需要逐条处理数据时，我通常必须执行某种手动操作。而手动操作最有可能在插入、更新或删除数据时出现数据错误的问题。我更喜欢在数据集中编写代码，这样我更能确保我的逻辑是一致的。\n\
  \n\n\n## 为数据集编写代码\n\n在前文中，我讨论了如何开始将你的数据视为数据集而非单条记录。在选择、更新或删除数据时，我经常使用数据集。虽然大多数应用程序代码一次只插入单条记录，但在许多常见场景下，以数据集的形式插入数据可能会很有帮助。在接下来的部分，我将介绍几种你可能会希望将数据视为集合而非单条记录的场景。\n\
  \n数据集最常用于你希望查看部分数据时。理想情况下，这些数据集是基于特定条件选择的。这不仅有利于性能，也有助于确保你只查看你想要的特定数据。在大多数场景下，一次检索和显示一条单个记录甚至没有意义。通常，如果你发现自己处于一次只选择一条记录的情况，这通常是一个很好的迹象，表明你可能需要查看该\
  \ `T-SQL` 代码是否可以重写以使用基于集合的逻辑。\n\n查询可以有更复杂的选择方式。在某些情况下，你可能会发现自己想要合并或比较两个不同的数据集。如果你想将两个数据集连接在一起，你可以选择使用\
  \ `UNION` 或 `UNION ALL`。它们之间只有一个微小但重要的区别。回顾表 5-2，我识别了两组不同的数据，一组基于城市名称，另一组基于部分地址。在下面的例子中，我将展示一种你可以用来查找同时包含这两个数据集结果的方法。当你对数据进行\
  \ `UNION` 时，返回的每条记录在连接在一起的 `SELECT` 语句之间都将是唯一的。代码清单 5-8 展示了一个在两个查询之间的 `UNION` 操作。\n\
  \n```sql\nSELECT FirstName, LastName\nFROM dbo.Customer\nWHERE City = 'Memphis'\n\
  UNION\nSELECT FirstName, LastName\nFROM dbo.Customer\nWHERE [Address] LIKE '%de%';\n\
  ```\n代码清单 5-8\n两个查询的联合\n\n表 5-25 显示了当前存储的所有客户数据。共有六位客户。\n\n**表 5-25**\n**所有客户**\n\
  \n| 名 | 姓 | 地址 | 城市 | 邮政编码 | 国家 |\n| --- | --- | --- | --- | --- | --- |\n| Myra\
  \ | Acharya | 30 Magrath Road | Bengaluru | 560025 | India |\n| Josè | Gomez | 790\
  \ Calle Cinco de Mayo | Cancun | 53778 | Mexico |\n| Stacy | Parks | 123 Rua de\
  \ Santa Catarina | Porto | 1234-567 | Portugal |\n| Karim | Khalil | 153 Road Mit\
  \ Rahina Al Shabab | Memphis | 3364932 | Egypt |\n| Marty` | Bethel | 750 Cherry\
  \ Rd | Memphis | 38117 | United States |\n| Ruth | Johnson | 4711 Ponce de Leon\
  \ | Memphis | 38110 | United States |\n\n表 5-26 显示了第一个查询的结果值。\n\n**表 5-26**\n**Memphis\
  \ 的客户**\n\n| 名 | 姓 | 地址 | 城市 | 邮政编码 | 国家 |\n| --- | --- | --- | --- | --- | ---\
  \ |\n| Karim | Khalil | 153 Road Mit Rahina Al Shabab | Memphis | 3364932 | Egypt\
  \ |\n| Marty` | Bethel | 750 Cherry Rd | Memphis | 38117 | United States |\n| Ruth\
  \ | Johnson | 4711 Ponce de Leon | Memphis | 38110 | United States |\n\n第二个查询的数据如表\
  \ 5-27 所示。\n\n**表 5-27**\n**地址中包含 \"de\" 的客户**\n\n| 名 | 姓 | 地址 | 城市 | 邮政编码 | 国家\
  \ |\n| --- | --- | --- | --- | --- | --- |\n| Josè | Gomez | 790 Calle Cinco de\
  \ Mayo | Cancun | 53778 | Mexico |\n| Stacy | Parks | 123 Rua de Santa Catarina\
  \ | Porto | 1234-567 | Portugal |\n| Ruth | Johnson | 4711 Ponce de Leon | Memphis\
  \ | 38110 | United States |\n\n联合查询提供了如表 5-28 所示的结果集。\n\n**表 5-28**\n**表 5-26 和\
  \ 5-27 结果的联合**\n\n| 名 | 姓 | 地址 | 城市 | 邮政编码 | 国家 |\n| --- | --- | --- | --- | ---\
  \ | --- |\n| Josè | Gomez | 790 Calle Cinco de Mayo | Cancun | 53778 | Mexico |\n\
  | Stacy | Parks | 123 Rua de Santa Catarina | Porto | 1234-567 | Portugal |\n| Karim\
  \ | Khalil | 153 Road Mit Rahina Al Shabab | Memphis | 3364932 | Egypt |\n| Marty`\
  \ | Bethel | 750 Cherry Rd | Memphis | 38117 | United States |\n| Ruth | Johnson\
  \ | 4711 Ponce de Leon | Memphis | 38110 | United States |\n\n然而，对于 `UNION ALL`，无论多个查询中是否存在重复值，两个查询中返回的每条记录都将被返回。如果你运行相同的查询但使用\
  \ `UNION ALL`，`T-SQL` 代码如代码清单 5-9 所示。\n\n```sql\nSELECT FirstName, LastName\nFROM\
  \ dbo.Customer\nWHERE City = 'Memphis'\nUNION ALL\nSELECT FirstName, LastName\n\
  FROM dbo.Customer\nWHERE [Address] LIKE '%de%';\n```\n代码清单 5-9\n两个查询的联合所有\n\n你返回了所有数据，即使它是重复的。`UNION\
  \ ALL` 的结果如表 5-29 所示。\n\n**表 5-29**\n**表 5-26 和 5-27 结果的联合所有**\n\n| 名 | 姓 | 地址 |\
  \ 城市 | 邮政编码 | 国家 |\n| --- | --- | --- | --- | --- | --- |\n| Josè | Gomez | 790\
  \ Calle Cinco de Mayo | Cancun | 53778 | Mexico |\n| Stacy | Parks | 123 Rua de\
  \ Santa Catarina | Porto | 1234-567 | Portugal |\n| Ruth | Johnson | 4711 Ponce\
  \ de Leon | Memphis | 38110 | United States |\n| Karim | Khalil | 153 Road Mit Rahina\
  \ Al Shabab | Memphis | 3364932 | Egypt |\n| Marty` | Bethel | 750 Cherry Rd | Memphis\
  \ | 38117 | United States |\n| Ruth | Johnson | 4711 Ponce de Leon | Memphis | 38110\
  \ | United States |\n\n如你所见，`UNION ALL` 返回了两行完全相同的数据。在某些时候，这些场景中的每一种都可能是可取的。\n\n\
  有时候，查询逻辑可能足够复杂，以至于我可能无法快速理解所有的 `T-SQL` 代码，或者在其他时候，我正在对非常大的数据集进行故障排除。如果我编写一个更简单的查询来返回我想要的所有数据，我通常会在那两个查询之间写一个\
  \ `INTERSECT` 来查找记录匹配的地方。使用与之前相同的通用查询，我想向你展示使用 `INTERSECT` 与其他选项相比，返回的数据会是什么样子。在代码清单\
  \ 5-10 中，你可以看到查找两个查询交集的查询。\n\n```sql\nSELECT FirstName, LastName\nFROM dbo.Customer\n\
  WHERE City = 'Memphis'\nINTERSECT\nSELECT FirstName, LastName\nFROM dbo.Customer\n\
  WHERE [Address] LIKE '%de%';\n```\n代码清单 5-10\n两个查询的交集\n\n你已经从前面的图表中知道了每个单独查询返回的结果。前面\
  \ `T-SQL` 代码的实际结果如表 5-30 所示。\n\n**表 5-30**\n**表 5-26 和 5-27 结果的交集**\n\n| 名 | 姓 |\
  \ 地址 | 城市 | 邮政编码 | 国家 |\n| --- | --- | --- | --- | --- | --- |\n| Ruth | Johnson\
  \ | 4711 Ponce de Leon | Memphis | 38110 | United States |\n\n此外，如果你试图查找缺失的记录或验证是否存在匹配的记录，你可以在两个查询之间使用\
  \ `EXCEPT`。代码清单 5-11 展示了如果你从一个查询的结果中排除另一个查询的结果时的 `T-SQL` 代码。\n\n```sql\nSELECT FirstName,\
  \ LastName\nFROM dbo.Customer\nWHERE City = 'Memphis'\nEXCEPT\nSELECT FirstName,\
  \ LastName\nFROM dbo.Customer\nWHERE [Address] LIKE '%de%';\n```\n代码清单 5-11\n两个查询的除外\n\
  \n\n\n在这种情况下，第一条查询返回所有城市名包含“Memphis”一词的结果。然而，`EXCEPT`语句表明，如果某条记录同时出现在第一条和第二条查询中，则该记录将从结果集中排除。此查询的结果见表\
  \ 5-31。\n\n表 5-31\n表 5-26 和 5-27 结果的 EXCEPT 运算\n\n| 名 | 姓 | 地址 | 城市 | 邮政编码 | 国家\
  \ |\n| --- | --- | --- | --- | --- | --- |\n| Josè | Gomez | 790 Calle Cinco de\
  \ Mayo | Cancun | 53778 | 墨西哥 |\n| Stacy | Parks | 123 Rua de Santa Catarina | Porto\
  \ | 1234-567 | 葡萄牙 |\n\n使用`EXCEPT`语句可能不是从数据集中排除结果的首选方法，但它是我更习惯使用的方法。这正是 T-SQL 代码的益处与挑战所在：对于几乎任何场景，编写\
  \ T-SQL 代码的方式几乎肯定不止一种。你编写数据库代码的原因将决定你在编码时拥有的灵活度。如果你只是执行一次查询，或许可以使用效率较低的方法来访问这些数据。然而，如果你是为某个应用程序编写代码，你就需要平衡\
  \ T-SQL 代码的可读性与提升数据返回速度。\n\n代码清单 5-12 展示了在插入数据时如何使用数据集。\n\n```sql\nCREATE TABLE\
  \ #TempProductArchive\n(\nProductID      INT            NOT NULL,\nProductName \
  \   VARCHAR(25)    NOT NULL,\nProductPrice   DECIMAL(6,2)   NOT NULL,\nIsActive\
  \       BIT            NOT NULL,\nDateCreated    DATETIME2(2)   NOT NULL,\nDateModified\
  \   DATETIME2(2)   NOT NULL,\nDateDisabled   DATETIME2(2)   NULL,\nDateInserted\
  \   DATETIME2(2)   NOT NULL\n);\nINSERT INTO #TempProductArchive\n(\nProductID,\n\
  ProductName,\nProductPrice,\nIsActive,\nDateCreated,\nDateModified,\nDateDisabled,\n\
  DateInserted\n)\nSELECT\nProductID,\nProductName,\nProductPrice,\nIsActive,\nDateCreated,\n\
  DateModified,\nDateDisabled,\nGETDATE()\nFROM dbo.Product\nWHERE DateDisabled <\
  \ '2022-08-01';\n```\n代码清单 5-12\n作为集合插入数据\n\n代码清单 5-13 展示了如果是逐条记录插入，插入语句的样子。\n\n\
  ```sql\nCREATE TABLE #TempProductArchive\n(\nProductID         INT             \
  \  NOT NULL,\nProductName       VARCHAR(25)       NOT NULL,\nProductPrice      DECIMAL(6,2)\
  \      NOT NULL,\nIsActive          BIT               NOT NULL,\nDateCreated   \
  \    DATETIME2(2)      NOT NULL,\nDateModified      DATETIME2(2)      NOT NULL,\n\
  DateDisabled      DATETIME2(2)      NULL,\nDateInserted      DATETIME2(2)      NOT\
  \ NULL,\n);\nINSERT INTO #TempProductArchive\n(\nProductID,\nProductName,\nProductPrice,\n\
  IsActive,\nDateCreated,\nDateModified,\nDateDisabled,\nDateInserted\n)\nVALUES\n\
  (\n14,\n'Water shoes - Large',\n25.00,\n0,\n'2018-01-01',\n'2022-07-29',\n'2022-07-29',\n\
  GETDATE()\n);\nINSERT INTO #TempProductArchive\n(\nProductID,\nProductName,\nProductPrice,\n\
  IsActive,\nDateCreated,\nDateModified,\nDateDisabled,\nDateInserted\n)\nVALUES\n\
  (\n15,\n'Water shoes - Medium',\n25.00,\n0,\n'2018-01-01',\n'2022-07-29',\n'2022-07-29',\n\
  GETDATE()\n);\nINSERT INTO #TempProductArchive\n(\nProductID,\nProductName,\nProductPrice,\n\
  IsActive,\nDateCreated,\nDateModified,\nDateDisabled,\nDateInserted\n)\nVALUES\n\
  (\n16,\n'Water shoes - Small',\n25.00,\n0,\n'2018-01-01',\n'2022-07-29',\n'2022-07-29',\n\
  GETDATE()\n);\nINSERT INTO #TempProductArchive\n(\nProductID,\nProductName,\nProductPrice,\n\
  IsActive,\nDateCreated,\nDateModified,\nDateDisabled,\nDateInserted\n)\nVALUES\n\
  (\n17,\n'Water shoes - Child',\n15.00,\n0,\n'2018-01-01',\n'2022-07-29',\n'2022-07-29',\n\
  GETDATE()\n);\n```\n代码清单 5-13\n逐条记录插入数据\n\n如你所见，逐条记录插入数据会占用相当多的代码，并且可能繁琐得多。\n\n\
  我最喜欢的数据集用途之一是更新数据。在许多情况下，我不是在更新特定记录，而是在更新具有相同特征的多条记录。如果我想将表中的所有产品设置为非活动状态，我有几种不同的方法可以做到。例如，我可以为每条记录编写一个更新语句，将`IsActive`值设置为零，如代码清单\
  \ 5-14 所示。\n\n```sql\nUPDATE dbo.Product\nSET IsActive = 0,\nDateModified = GETDATE(),\n\
  DateDisabled = GETDATE()\nWHERE ProductID = 1;\nUPDATE dbo.Product\nSET IsActive\
  \ = 0,\nDateModified = GETDATE(),\nDateDisabled = GETDATE()\nWHERE ProductID = 2;\n\
  UPDATE dbo.Product\nSET IsActive = 0,\nDateModified = GETDATE(),\nDateDisabled =\
  \ GETDATE()\nWHERE ProductID = 3;\n```\n代码清单 5-14\n逐条记录更新数据\n\n这需要三次独立的事务。此外，SQL\
  \ Server 必须访问这些记录所在的数据页三次。如代码清单 5-15 所示，我也可以编写一个查询，一次性更新所有三条记录。\n\n```sql\nUPDATE\
  \ dbo.Product\nSET IsActive = 0,\nDateModified = GETDATE(),\nDateDisabled = GETDATE()\n\
  WHERE ProductID BETWEEN 1 AND 3;\n```\n代码清单 5-15\n按范围更新数据\n\n事实上，如果这三条记录都位于同一个数据页上，我只需要访问该页面一次。一个更可能的场景是请求停用产品名称中包含“water”一词的所有产品。这正是你希望发现的模式。如果存在这样的模式，你可以编写如代码清单\
  \ 5-16 所示的查询。\n\n```sql\nUPDATE dbo.CustomerOrder\nSET IsActive = 0,\nDateDisabled\
  \ = GETDATE()\nWHERE IsActive = 1\nAND CustomerID = 234;\n```\n代码清单 5-16\n作为数据集更新数据\n\
  \n这个查询实现了两个目标。它让你能在一次给定的查询中更新多条记录。`WHERE`子句包含了`IsActive`和`CustomerID`列，允许查询使用索引`IX_CustomerOrder_Isactive_CustomerID_OrderID_DateCreated`。\n\
  \n使用数据集更新多条记录没有限制。我经常需要更新成百上千条记录。虽然我可以编写查询来单独识别每条记录，然后手动提取这些 ID 来逐条或批量更新它们，但有更简单的方法来更新这些多条记录，并最大限度地减少因人为干预而导致的错误风险。代码清单\
  \ 5-17 展示了如何在连接表的同时更新数据。\n\n```sql\nUPDATE prd\nSET DateModified = GETDATE(),\n\
  IsActive = 0\nFROM dbo.Product prd\nINNER JOIN dbo.ProductArchive pch\nON prd.ProductID\
  \ = pch.ProductID\nWHERE pch.DateInserted >= CAST(GETDATE() AS DATE);\n```\n代码清单\
  \ 5-17\n通过连接创建数据集来更新数据\n\n在更新操作中使用连接时，我建议你确认正在更新的数据是什么。这可以通过将更新语句转换为选择语句来完成，如代码清单\
  \ 5-18 所示。\n\n```sql\nSELECT\nProductID,\nProductName,\nProductPrice,\nIsActive,\n\
  DateCreated,\nDateModified,\nDateDisabled\nFROM dbo.Product prd\nINNER JOIN dbo.ProductArchive\
  \ pch\nON prd.ProductID = pch.ProductID\nWHERE pch.DateInserted >= CAST(GETDATE()\
  \ AS DATE);\n```\n代码清单 5-18\n使用 SELECT 语句验证数据集\n\n你可以检查记录并验证记录数。在执行更新之前，我建议将`UPDATE`语句包裹在`BEGIN\
  \ TRAN…ROLLBACK`中以验证记录数。\n\n就像处理更新一样，你也可以在删除数据时使用数据集。我发现使用数据集删除数据可以显著提高效率，但如果数据在删除前未经验证，也可能存在一定风险。\n\
  \n\n\n在编写 T-SQL 代码时，最大的问题之一是未能充分利用数据集。这通常是因为编写过程式代码更得心应手，或者尚未培养以数据集方式思考的能力。在本书中，我的目标是通过多种方式，指导你编写出拥抱并善用数据集的代码。\n\
  \n"
- "# 6. 硬件使用\n\n在考虑如何设计查询时，你已经了解了基于集合的设计的要素。但在使用 SQL Server 时，还有其他需要考虑的事项。你所使用的是一个超越其各个组成部分的系统。SQL\
  \ Server 有许多方面：存储的数据、访问数据的过程，以及如何访问数据的流程。SQL Server 不仅仅是软件，它还涉及该软件如何与你的计算机或服务器的硬件进行交互。\n\
  \n在使用硬件方面，SQL Server 利用了多个不同的部件。有些部件可能看起来很直接，而另一些起初可能令人惊讶。SQL Server 被称为关系数据库管理系统。作为关系数据库管理系统的一部分，SQL\
  \ Server 的目的是实现数据的高效存储和检索。这意味着，运行 SQL Server 的系统上，最重要的硬件部件之一是内存。谈到数据的长期存储，硬盘驱动器就变得最为关键。在本章中，我将它们称为\
  \ `storage`，因为存储不仅限于硬盘。然而，还有其他一些不太明显的元素，例如 CPU。\n\n在本章中，你将审视一些编码模式和反模式，这些模式可能导致服务器资源被有效或无效地分配。对于反模式，你将探讨替代方法，以实现在不使这些有限的硬件资源负担过重的情况下的相同结果。\n\
  \n## T-SQL 设计中的内存考量\n\n当你初次开始在 SQL Server 中处理数据时，可能会惊讶地发现内存是最重要的因素之一。这在很大程度上与内存在\
  \ SQL Server 内部的用途有关。SQL Server 旨在利用内存。有一个称为 `caching` 的过程，它将信息保留在内存中。对于 SQL Server，有两种缓存类型非常重要。第一种与执行计划的缓存有关。这是\
  \ SQL Server 保存有关将来如何再次执行存储过程或即席查询的指令的地方。其目的是利用 SQL Server 已经计算出的关于执行特定查询的最佳方式的知识。第二种与查询设计相关的缓存几乎可能更为重要。它涉及信息如何存储在内存中。这被称为\
  \ `缓冲池`。\n\n在本节中，我谈到数据存储在缓冲池中。如果我们需要的数据不在缓冲池中，会发生什么？这可能是 SQL Server 中事物变得有点复杂的地方。SQL\
  \ Server 只与缓冲池内部的数据进行交互。因此，如果需要的数据不在缓冲池中，第一步是确定哪些数据使用频率较低。然后，你将这些数据从缓冲池中移除。这些第一步已经为我们提供了关于内存使用的线索。如果有某些东西不必要地填满了缓冲池，你现在就知道关键数据可能会被清除出缓冲池，以便为这个新数据腾出空间。\n\
  \n真正的关键在于限制 SQL Server 必须处理的数据量。在编写查询时，这可以通过你的连接逻辑来处理；也可以通过你的 `where` 子句条件来处理。你需要确保访问尽可能少的数据。访问所需的最少量的数据，可以让你在使用\
  \ T-SQL 时最小化内存的使用。列表 6-1 提供了一个查询，其中 SELECT 语句没有包含所有列。\n\n```sql\nSELECT cus.FirstName,\n\
  cus.LastName,\nprd.ProductName\nFROM dbo.Customer cus\nINNER JOIN dbo.CustomerOrder\
  \ ord\nON cus.CustomerID = ord.CustomerID\nINNER JOIN dbo.OrderDetail dtl\nON ord.CustomerOrderID\
  \ = dtl.CustomerOrderID\nINNER JOIN dbo.Product prd\nON dtl.ProductID = prd.ProductID\n\
  WHERE prd.ProductName LIKE 'Tel%'\nAND cus.LastName LIKE 'G%'\nAND ord.IsActive\
  \ = 1;\n```\n\n列表 6-1\n仅获取客户和产品的查询\n\n虽然这并未影响查询的原始性能，但随着数据表的数据量增加，会产生明显的性能影响。\n\n\
  内存的速度和多功能性是 SQL Server 的重要组成部分。另一个因素与内存成本相对于存储成本的关系有关。这种成本差异凸显了有效使用内存的重要性。有许多不同类型的东西存储在内存中。SQL\
  \ Server 用来访问满足查询标准所需数据的过程，作为执行计划保存在内存中。为查询结果检索的数据也存储在内存中。你还可以让数据库对象存在于内存中，例如表变量或临时表。你经常听到\
  \ `OLTP` 这个术语。它真正的含义是，你希望有一个能够执行大量写入和更新活动的系统。这些类型的活动在我们的应用程序中频繁发生。当提及写入和更新活动时，例如在食谱数据库中，每次访问食谱、每次对食谱进行更改，或每个新配料添加到系统中，都属于此类活动。\n\
  \n\n\n\n### 内存管理与性能优化\n\n当系统中存储大量数据时，用户通常只需要处理其中很小的一个子集。关键技能在于判断哪些数据应保持随时可用。这将提升添加新条目、更新现有条目或访问已有条目的速度。此时，对硬件的更好理解能提供帮助。\n\
  \n我们通常将内存视为服务器或计算机上的`RAM`。然而，还有其他类型的内存可用。内存是`SQL Server`用于快速访问数据最常见的硬件。\n\n虽然执行计划和数据都可以保存在缓存中，但`SQL\
  \ Server`会执行某些计算来确定为计划缓存或缓冲池分配多少内存。此外，复杂的计算用于决定在计划缓存或缓冲池中保留某物多久。真正的目标是确保不经常访问的存储过程或查询从计划缓存中清除，以免占用不必要的空间。同样，对于缓冲池，目标是只保留正在被主动使用的数据，并清除应用程序不再需要的数据。在这两种情况下，项目只有在缓存已满且需要为新的执行计划或数据腾出空间时才会被清除。\n\
  \n另一种解决方案是缓冲池扩展。缓冲池仅存在于`RAM`上，而缓冲池扩展允许你将缓冲池扩展到使用`RAM`和固态驱动器（`SSDs`）。然而，并非缓冲池中的所有数据页都可以驻留在`SSD`上。只有缓冲池中与写入存储的数据页匹配的页才能位于`SSD`上。这意味着对该页的所有更改都已写入磁盘。当更改被写入磁盘时，此过程称为“固化”。在更改写入磁盘之前，这些页称为“脏页”。在页写入磁盘后，它们称为“干净页”。考虑到`SSDs`可能比购买额外的`RAM`更具成本效益，这有助于减少当`SQL\
  \ Server`因业务应用程序访问数据缺乏可用内存而频繁将页面移出缓冲池时发生的`I/O`瓶颈。\n\n关于计划缓存，有一些需要记住的特定注意事项。默认情况下，`SQL\
  \ Server`针对处理存储过程和预处理语句进行了优化。这种对存储过程的优化也是使用计划缓存时的一个因素。在理想情况下，你的计划缓存中会有大量的存储过程，而即席查询很少。然而，这并非总是适用于每个业务。你的公司可能使用`ORM`（对象关系映射）或像`LINQ`这样的技术在应用程序代码中编写即席查询。虽然它们便于开发人员编写，但它们给`SQL\
  \ Server`带来了额外开销。通常，`ORM`软件编写的`T-SQL`代码功能可行，但在性能上可能不如开发人员编写的查询优化。此外，`ORM`软件还倾向于创建可能填满计划缓存的即席查询。当计划缓存充满即席查询时，它可能在缓存中创建同一查询的多个版本，浪费计划缓存中的查询分配，并导致其他有价值的计划被清除。如果这些查询没有转换为预处理语句，这种情况尤其可能发生。\n\
  \n如果存储过程因应用程序而被清除出计划缓存，那么当下次调用该存储过程时，`SQL Server`将需要重新计算其执行计划。这将需要额外的`CPU`成本来生成新的执行计划。有各种方法可以处理计划缓存中存在大量即席查询的情况。然而，这超出了本书的范围。\n\
  \n我在与`SQL Server`交互时遇到的另一个问题与缓冲池以及缓冲池中保存的数据有关。我曾不止一次听说，在处理非常大的表时，你将永远陷入不得不处理访问大量数据的困境。当表设计、索引、查询或上述任何组合未经过优化时，这种确切的情况就可能发生。然而，有方法可以预防。\n\
  \n在使用内存和`SQL Server`时，要考虑的主要方面是当你编写查询时，它们必须返回正确的结果，并在应用程序可接受的时间内完成。然而，根据整体表设计或查询的编写方式，这些查询访问的数据量可能远远超过必要。起初这可能看起来不是一个重大问题。当数据表是新的且未充满数据时，通常不会是问题。清单`6-2`中的查询用于在应用程序中返回一些数据。\n\
  \n```sql\nSELECT cus.FirstName,\n       cus.LastName,\n       cus.Country,\n   \
  \    ord.OrderNumber,\n       prd.ProductName,\n       dtl.QuantitySold,\n     \
  \  prd.ProductPrice\nFROM dbo.Customer cus\nINNER JOIN dbo.CustomerOrder ord\n \
  \   ON cus.CustomerID = ord.CustomerID\nINNER JOIN dbo.OrderDetail dtl\n    ON ord.CustomerOrderID\
  \ = dtl.CustomerOrderID\nINNER JOIN dbo.Product prd\n    ON dtl.ProductID = prd.ProductID\n\
  WHERE prd.ProductName LIKE 'Tel%'\n  AND cus.LastName LIKE 'G%'\n  AND ord.IsActive\
  \ = 1;\n```\n清单`6-2` 获取客户订单信息的查询\n\n当表是新的且数据不多时，你将看到如表`6-1`所示的逻辑读取。\n\n表`6-1` 数据表较小时的逻辑读取\n\
  \n| 客户数量 | 订单数量 | 订单明细数量 | 返回记录数 | 逻辑读取次数 |\n| --- | --- | --- | --- | --- |\n|\
  \ 401,409 | 4 | 8 | 4 | 54 |\n\n逻辑读取`54`指的是为了执行此查询而读取的数据页数量。随着你的表增长并且`SQL Server`必须筛选越来越多的数据，你可能会开始看到与此行为相关的显著性能影响。当这种情况发生时，逻辑读取的次数可能会显著增加，如表`6-2`所示。\n\
  \n表`6-2` 数据表较大时的逻辑读取\n\n| 客户数量 | 订单数量 | 订单明细数量 | 返回记录数 | 逻辑读取次数 |\n| --- | --- |\
  \ --- | --- | --- |\n| 401,409 | 802,820 | 1,605,638 | 1,204,224 | 20,755 |\n\n\
  如你所见，一个最初看似性能良好的查询，随着应用程序成熟并获取更多数据，可能开始出现性能问题。\n\n在这些情况下，应用程序频繁访问的数据可能正被从缓冲池中清除。当存储过程必须筛选大量数据时，你通常可以通过查看与该查询关联的逻辑读取看到这一点。你可能正在处理一个只返回五个结果的查询；然而，它必须经过两百万次逻辑读取才能返回结果。这表明你可能正在使用比预期更多的缓冲池。\n\
  \n\n\n\n这类行为可能导致缓冲池中的大量数据被清空。SQL Server 中有一个名为 `page life expectancy`（页生存期）的值，用于显示数据页在缓冲池中停留的平均时间。我习惯将\
  \ `page life expectancy` 作为一个指标，用以判断是否有查询在 SQL Server 中读取的数据量可能远大于结果集返回的数据量。这可能导致这些查询本身使用了超出其实际需要的内存。当我处理与应用程序配合使用的查询时，它们通常一次不涉及超过十条记录。即使某个查询用于某种形式的报表，一次通常也不会超过几千条记录。即便我一次查看\
  \ 20 万条记录，我仍然不希望为了获取这些结果而进行数千万次的逻辑读取。我可以添加一些索引来帮助最小化查询的逻辑读取次数。清单 6-3 展示了添加的索引。\n\
  \n```sql\nCREATE NONCLUSTERED INDEX IX_Customer_CustomerNameName\nON dbo.Customer(LastName\
  \ ASC, FirstName ASC);\nCREATE NONCLUSTERED INDEX IX_CustomerOrder_CustomerID_IsActive\n\
  ON dbo.CustomerOrder(CustomerID ASC, IsActive ASC);\nCREATE NONCLUSTERED INDEX IX_OrderDetail_CustomerOrderID_ProductID\n\
  ON dbo.OrderDetail(CustomerOrderID ASC, ProductID ASC);\n```\n清单 6-3\n用于减少逻辑读取的非聚集索引\n\
  \n尽管我预期查询的逻辑读取会减少，但仍应通过执行查询来验证这个假设。在表 6-3 中，你可以通过逻辑读取数看到查询已被修改。\n\n表 6-3\n\n仅选择必要列时的逻辑读取数\n\
  \n| 食谱数量 | 配料数量 | 食谱-配料关系数量 | 返回记录数 | 逻辑读取数 |\n| --- | --- | --- | --- | --- |\n\
  | 401,409 | 802,820 | 1,605,638 | 1,204,224 | 5,899 |\n\n将表 6-2 与表 6-3 的结果进行比较，你可以看到逻辑读取数已经下降。索引在内部组织了数据，使得\
  \ SQL Server 更容易、更快速地找到数据页。因此，SQL Server 执行此查询时需要访问缓冲池中的数据页更少。在这个案例中，索引应该有助于使用此\
  \ SQL Server 实例的其他应用程序提升性能。\n\n然而，你需要谨慎地为每一个独特的场景都创建索引。为每一个慢查询都创建索引可能会因为维护每个索引所需的磁盘活动增加而对性能产生负面影响。此外，SQL\
  \ Server 在创建索引时确实会分配内存以便对数据进行排序。使用索引可以成为确保你只访问所需数据的强有力方式。你还需要理解数据以及相关的 `T-SQL`，以便在不给\
  \ SQL Server 增加过重负担的情况下有效地创建索引。\n\n有一些查询可以用来确定存储过程使用了多少逻辑读取。如前所述，逻辑读取是查询是否影响内存的一个指标。如果存储过程存在于计划缓存中，你可以找出哪些存储过程的逻辑读取数更高。清单\
  \ 6-4 展示了查找存储过程及其逻辑读取数的查询。\n\n```sql\nUSE OutdoorRecreation;\nGO\nSELECT db.[name]\
  \ AS name_database,\nobj.[name] AS name_stored_procedure,\nsts.execution_count,\n\
  sts.total_logical_reads\nFROM sys.objects obj\nINNER JOIN sys.dm_exec_procedure_stats\
  \ sts\nON obj.[object_id] = sts.[object_id]\nLEFT JOIN sys.databases db\nON sts.database_id\
  \ = db.database_id;\n```\n清单 6-4\n查找计划缓存中存储过程的逻辑读取数\n\n这个查询会显示当前 `OutdoorRecreation`\
  \ 数据库计划缓存中的存储过程。它包含了该存储过程已被执行的次数以及所有执行产生的逻辑读取总数。要分析每个存储过程的平均逻辑读取数，你需要用 `total_logical_reads`\
  \ 除以 `execution_count`。一旦你识别出逻辑读取数最高的查询，你可能需要回顾第 8 章，学习如何优化这些查询的逻辑读取。\n\n尽管内存可以被认为是\
  \ SQL Server 可用的最强大、最有益的硬件，但它也有相关的金钱成本。内存可以弥补尚未优化的 `T-SQL`。然而，通常会达到一个临界点，即表变得非常大而查询又未完全优化。那时，很容易倾向于通过增加更多内存来解决性能问题。在许多情况下，这只是针对长期问题的短期解决方案。除此之外，购买额外内存相关的成本并不总是企业能够负担的选项。防止或解决此问题的一个方法是查看系统中的存储过程和预准备语句，并找出那些可以通过减少相关查询的逻辑读取而得到改进的查询。\n\
  \n\n\n"
- "# 考虑存储与 T-SQL 设计\n\n我已经介绍了如何与你计划频繁访问的数据进行交互；你还需要考虑大部分数据是如何存储的。在处理存储时，重要的是考虑哪些活动会导致你必须访问磁盘上的数据。这些正是你希望最小化或改进的活动类型。在某些情况下，当我看到大量的磁盘\
  \ I/O 时，这可能表明 T-SQL 设计的某些其他部分需要改进。这可能只是症状，而非根源。\n\nSQL Server 使用索引来组织数据，并使其能够轻松快速地检索。对于大于几个数据页的表，SQL\
  \ Server 会尝试使用索引来遍历各个数据页，并快速找到所需数据。然而，在某些情况下，必要的索引可能不存在。这导致 SQL Server 必须读取更多的数据页，有时甚至是表中的所有数据，以确定哪些行是满足查询需求所必需的。\n\
  \n一旦数据被判定为非优先事项，SQL Server 便可以访问磁盘并获取其所需的数据。这些数据将被存储在缓冲池中，直到未来的某个时刻它被认为不再需要。就硬件速度而言，这个过程本身已经引入了延迟。如果数据不在缓冲池中，还需要额外的时间来确定哪些记录需要从缓冲池中移除。将这些记录从缓冲池中移除并访问磁盘，会带来从磁盘检索数据的额外时间成本。\n\
  \n如果这些数据仅用于每四到六小时运行一次的作业，那么大部分数据可能被判定为对所有其他进程无关紧要。这就导致了从缓冲池中移除的数据出现高频率更替。新数据可以从磁盘获取并保存到缓冲池中。然后，这些新数据可能会从缓冲池中移除，并被从磁盘检索到的更新数据所取代。\n\
  \n除了处理大量数据所带来的这种开销之外，还有其他与磁盘或存储交互的活动。当新数据被写入系统时，该数据将被存储在事务日志中。数据将持续添加到事务日志中，直到日志被清除。当事务提交且信息被写入磁盘时，日志可能会被刷写。在系统中添加、更新或删除大量数据的情况下，这可能导致大量的磁盘活动以修改表，并且由于日志增长以及插入操作中保存的数据（用于回滚），磁盘存储空间也会增加。\n\
  \n了解数据是如何存储的，以及 SQL Server 如何通过索引和存储在磁盘上的其他数据页轻松找到这些数据，这很重要。当信息被添加到索引或索引需要更新时，这些操作也会产生存储成本。这不仅涉及存储数据所需的时间，还包括访问磁盘进行这些添加或更改所涉及的时间。\n\
  \n在使用 T-SQL 时，你需要考虑你的查询如何影响数据存储。正如你在上一节所见，这可以意味着多件事情。你需要确保在给定时间内，你没有访问、插入、更新或删除超出你实际需要的数据量。但这并不是编写\
  \ T-SQL 时唯一需要考虑的因素。你可以做一些事情来监控与查询相关的存储使用情况。其中大部分涉及查看物理读取次数、预读读取次数或与查询相关的 I/O 成本。\n\
  \n如果你已经确认你正在处理与你想要交互的数据量最少，那么可能无法再降低与你的 T-SQL 查询相关的存储成本。在某些情况下，就像内存一样，发现巨大的存储使用量可能指向其他问题。这些问题可能包括数据如何保存在磁盘上以及索引是如何设计的等。\n\
  \n### 索引和页拆分对存储的影响\n\n在某些情况下，你可能会发现频繁的索引更新导致了巨大的存储成本。这可能是由于索引需要根据其设计方式不断重新组织。如果在\
  \ `dbo.CustomerOrder` 表的 `ShipDate` 上创建了一个非聚集索引，那么当 `ShipDate` 被填充或更改时，就需要更新该索引。当这种情况发生时，`ShipDate`\
  \ 可能需要移动到不同的页。如果该页已满，SQL Server 将创建一个新页。这个新页可能会从旧页转移一些数据过来，而新数据将被添加到该页中。同时还会创建一个指针，以便\
  \ SQL Server 知道在逻辑序列中去哪里查找下一个数据页。当这种情况发生时，就称为 `索引碎片`。这可能导致使用此索引的查询性能不佳，因为索引信息没有按顺序存储。虽然这在\
  \ SSD 上问题较小，但索引碎片仍然可能导致索引占用比正确组织时更多的空间。\n\n在涉及页拆分的情况下，你也可能看到与此活动相关的显著存储成本。你的表的排序方式或索引的设计方式可能导致大量的页拆分。例如，我可以在\
  \ `dbo.CustomerOrder` 表中使用 `ShipDate` 作为聚集索引来创建表。如果应用程序没有为每个订单填充发货日期，或者如果发货日期被更改，那么数据记录可能会被移动到不同的页。在某些情况下，该记录可能被移动到一个已经满了的页。如果是这样，该页将会拆分，以便将记录添加到有可用空间的数据页中。你可能会看到维护这些索引相关的磁盘活动增加。\n\
  \n### 存储引擎的作用\n\n关于存储成本如何运作的更多信息，了解 SQL Server 存储引擎如何操作可能会有所帮助。在处理 T-SQL 查询时，有一个方面更频繁地依赖于存储引擎。这与访问当前不在缓冲池中的数据有关。\n\
  \n存储引擎具有几个不同的功能。这些功能涉及访问不在缓冲池中的数据。存储引擎的另一个功能与需要锁时如何处理数据有关。存储引擎的第三个功能涉及与应用程序使用的 T-SQL\
  \ 运行无关的命令。\n\n存储引擎在访问数据时可能会遇到性能瓶颈。这些瓶颈反过来会导致访问存储数据时出现性能问题。一个例子是当查询访问数据表中的行或与索引交互时。在其他时候，存储引擎可能需要处理与为缓冲池检索数据相关的页分配。如果你的公司决定实施行版本控制，这可能会导致存储性能问题。虽然这超出了本书的范围，但如果你正在使用行版本控制并且遇到与存储性能相关的问题，你可能需要进行额外的研究以确认行版本控制不是原因。\n\
  \n\n\n当访问数据行或索引时，SQL Server 将使用存储引擎。被访问的数据可能存储在 `buffer pool` 中。由存储引擎负责跟踪这些行在 `B-Tree`\
  \ 中的位置。`B-tree` 是一种自平衡的二叉搜索树，为数据存储创建层级结构。这种特定的结构设计允许多个分支，使得其子项（称为 `nodes` 或 `levels`）比典型的二叉搜索树更\"\
  扁平\"。`B-Tree` 是专门为处理数据库等大量数据而设计的。在 SQL Server 中管理、添加、更新或删除索引中的条目时，也会发生相同的过程。这在存储引擎中统称为\
  \ `row and index operations maintenance`。\n\n在编写查询以访问数据时，SQL Server 使用一个称为 `read`\
  \ 的指标（发音与动词 \"to read\" 相同）来跟踪查询需要访问的数据。如果数据已在内存中，则访问该数据的行为称为 `logical read`。有时，访问数据可能需要\
  \ SQL Server 访问磁盘或存储上的数据页。数据页是 SQL Server 存储的最小数据单元，大小为 8 kb。如果从磁盘访问数据，则该数据称为 `physical\
  \ read`。如果数据页被移至 `buffer pool`，该操作称为 `read-ahead read`。无论哪种情况，SQL Server 都需要访问磁盘以获取请求的记录。当你编写一个查询，并且它需要检索不存在于\
  \ `buffer pool` 中的记录时，SQL Server 将需要访问磁盘上的那些记录。这对 SQL Server 来说可能是一个非常正常的过程。但是，如果查询需要读取的记录数量多于查询结果所需的数量，则可能导致磁盘活动超出实际需求。监控从磁盘检索数据所花费时间的一种方法是使用\
  \ `latch waits`。这表示 SQL Server 访问不存在于 `buffer pool` 中的数据所花费的时间量。\n\n除了 SQL Server\
  \ 在存储引擎内管理数据访问外，存储引擎还负责管理与数据锁定相关的活动。这类活动可能受到服务器、应用程序或事务上配置的 `isolation level` 的影响。`isolation\
  \ level` 决定了 SQL Server 将如何处理事务间的锁和行版本控制。在许多情况下，`isolation level` 的配置由不同于负责编写 `T-SQL`\
  \ 代码的团队来管理。存储引擎还负责处理 SQL Server 中的锁。\n\n与存储相关的其他可能导致性能问题的因素涉及查询设计的其他方面，这些方面可能与硬盘驱动器交互，例如需要将大量活动记录到事务日志的数据库操作。这可能包括插入、更新或删除大量数据。SQL\
  \ Server 设计为及时将这些更改记录到事务日志。然而，这些修改也需要记录到磁盘上。根据碎片情况或其他使用硬盘的进程，这可能会导致额外的性能问题。\n\n\
  `tempdb` 是 SQL Server 的另一部分，可能会产生与存储相关的显著开销。可能存在一些查询导致 `tempdb` 内部发生大量活动。如果你正在创建大型临时表，就可能发生这种情况，因为这些信息可能存储在\
  \ `tempdb` 中。也可能是 SQL Server 未能正确估算 `execution plan`。这通常是由于过时的 `statistics`（即表中数据的直方图）造成的。如果这些\
  \ `statistics` 不正确，SQL Server 可能不会分配足够的资源来执行查询。如果 `tempdb` 与数据或日志文件放在同一驱动器上，可能会出现磁盘延迟问题。为避免此问题，通常建议将\
  \ `tempdb` 移动到与数据和日志文件不同的独立驱动器上。在这种情况下，`tempdb` 上的任何存储开销应该只影响同样依赖 `tempdb` 的其他查询。\n\
  \n编写 `T-SQL` 查询从根本上与 SQL Server 如何与已存储的数据交互相关联。这种交互的某些方面是可以控制的，例如确保你访问尽可能少的数据。而其他因素，例如\
  \ SQL Server 如何访问数据或管理锁，可能超出你的控制范围。无论如何，了解所有这些部分如何结合并可能影响你的查询性能至关重要。\n\n\n\n## 考虑\
  \ CPU 与 T-SQL 设计\n\nSQL Server 不仅与内存和存储交互；它也与服务器 CPU 交互。这是在设计查询时需要考虑的最终环节之一。当涉及到\
  \ SQL Server 的许可时，CPU 可能是一笔显著的成本。部分原因可能在于不理解 SQL Server 所需的最佳 CPU。SQL Server 有其许可限制。如果不遵守这些限制，你可能会购买\
  \ SQL 永远无法识别或使用的 CPU 核心。由于大多数人按核心付费，因此确保每个核心尽可能强大是有意义的。你甚至可能通过节省 SQL 许可费用，来抵消更高性能\
  \ CPU 所带来的额外成本。此外，还有一个问题是在你的 T-SQL 代码中执行计算。\n\n如前所述，有时大量使用内存会导致 I/O 问题。同样，当存在大量\
  \ I/O 活动时，这也可能导致 CPU 问题。在整体 T-SQL 设计中考虑内存时，有两种类型的缓存。在那一节中，我主要关注了缓冲区缓存或缓冲池。在本节中，我将完整循环一圈，讨论执行计划的缓存如何导致\
  \ CPU 性能问题。\n\n当你运行一个查询时，SQL Server 必须查看所有涉及的表、这些表上的所有索引、所有的联接谓词和 WHERE 子句，以弄清楚哪种表、索引和联接类型的组合能够带来可接受且准确的查询性能。这个计算的结果被称为\
  \ `` `查询执行计划` ``。\n\n虽然有时查询很简单，这个过程快速而容易，但其他时候它可能资源消耗大得多。特别是对于第二种情况，我们非常希望 SQL Server\
  \ 能够重用该计划，而不是在执行类似查询时必须重新计算它。\n\n为了让 SQL Server 知道如何执行查询，它必须利用 CPU。这被视为一种 CPU 成本。期望是这种成本不应该导致性能问题，因为频繁执行的预\
  \ pared 语句和存储过程的计划已经保存在缓存中，不需要以任何显著的频率重新创建这些执行计划。\n\n这就引出了是什么导致 SQL Server 判断需要一个新的执行计划。这直接关系于理解\
  \ SQL Server 在创建执行计划时做了什么。创建执行计划的一部分是生成一个值，允许 SQL Server 快速找到先前创建的执行计划。这个值被称为`计划哈希`。目标是在必要时创建执行计划，并尽可能多地重用这些执行计划。所有这些计划都存储在`计划缓存`中。只有看起来相同的查询才具有相同的`计划哈希`，并会使用相同的执行计划。虽然你可能有几个看起来相似或返回相同结果的查询，但\
  \ SQL Server 可能不会给它们相同的`计划哈希`。如果 SQL Server 在`计划缓存`中没有识别出现有的计划，它将需要创建一个新的执行计划。这种对`计划哈希`的依赖有助于确定是否需要创建新的执行计划。\n\
  \n这导致我们依赖于使用参数。这些参数可以存在于存储过程或预 pared 语句中。如果正在执行的查询与`计划缓存`中的某个查询具有相同的`计划哈希`，SQL Server\
  \ 将不会重新创建新的执行计划。这个创建执行计划的过程被称为`` `编译` ``。这可能是你的查询消耗的 CPU 资源超出预期的众多原因之一。\n\nSQL Server\
  \ 也可能判断需要为某个查询创建新的执行计划，即使执行缓存中已经存在相关的`计划哈希`。在 SQL Server 2016 中引入的，数据库表的统计信息是根据表中行数的动态阈值来更新的。如果统计信息更新了，SQL\
  \ Server 可能会选择生成一个新的执行计划。这可能是频繁数据更改的结果，也可能是参数嗅探的结果。有关参数嗅探的更多信息，请参见第 2 章和第 8 章。无论哪种方式，它都会导致\
  \ SQL Server 识别为`` `重新编译` ``的东西。就像查询`编译`有相关成本一样，`重新编译`在 CPU 上也有相关成本。\n\n如果查询正在处理大量\
  \ I/O，这可能会蔓延导致 CPU 性能问题。虽然一个查询可能访问了比必要更多的数据，但这可能并非由于整体的 T-SQL 查询设计。它可能是由于过时的统计信息。虽然管理统计信息的概念超出了本书的范围，但你需要意识到统计信息对执行计划的影响。统计信息让\
  \ SQL Server 能够快速了解特定数据表或索引内的数据整体分布情况。其概念是，正确的统计信息有助于 SQL Server 对如何创建执行计划做出最佳猜测。如果这些值过时或陈旧，SQL\
  \ Server 可能会决定一个执行计划，而这个计划如果 SQL Server 拥有最新的统计信息本可以更高效。由于统计信息过时，估计的读取次数和实际的读取次数之间可能存在显著差异。这可能会对\
  \ CPU 产生性能影响。你可以看到统计信息已经更新，估计和实际返回的行数保持相对一致。\n\n还有一种可能是，SQL Server 必须遍比最初预期更多的硬盘或存储。这可能是由于涉及碎片的情况。在\
  \ CPU 活动高于正常水平的情况下，它可能是由于索引碎片造成的。这意味着 SQL Server 可能只估计了检索数据所需的一定工作量，因为它假设索引没有碎片。然而，由于索引存在碎片，SQL\
  \ Server 必须做潜在比预期更多的工作来访问请求的数据。\n\n另一个在你的 T-SQL 查询设计中可能发生的常见问题涉及数据类型。在 SQL Server\
  \ 中有许多不同的地方你需要定义数据类型。它们可以在表、临时表、参数、存储过程、变量中定义，甚至可以通过你的应用程序代码指定数据类型。如第 1 章所讨论的，SQL\
  \ Server 可以在后台将一种数据类型转换为另一种；这个过程被称为`` `隐式转换` ``。虽然 SQL Server 可以处理`隐式转换`并有一个结构化的过程来执行，但强制\
  \ SQL Server 执行`隐式转换`也可能带来相关的 CPU 成本。代码清单 6-5 是`隐式转换`的一个例子。\n\n```sql\nDECLARE @IsActive\
  \ NVARCHAR(1);\nSET @IsActive = 1;\nSELECT CustomerID,\n       FirstName,\n    \
  \   LastName,\n       [Address],\n       City,\n       PostalCode,\n       IsActive,\n\
  \       DateCreated,\n       DateModified,\n       DateDisabled\nFROM dbo.Customer\n\
  WHERE IsActive = @IsActive;\n```\n代码清单 6-5\n包含隐式转换的查询\n\n\n"
- '# 6. 隐式转换、数据压缩与并行度注意事项


  清单 6-4 中创建了隐式转换，因为变量 `@IsActive` 的数据类型被设置为 `NVARCHAR`。`dbo.Customer` 表中 `IsActive`
  字段的数据类型是 `BIT`。因此，SQL Server 将不得不执行隐式转换来比较这两个值。在图 6-1 中，您可以看到隐式转换对执行计划的影响。


  ![](img/480547_2_En_6_Fig1_HTML.png)


  图 6-1


  执行计划中显示隐式转换的索引扫描


  隐式转换可能对查询的总体性能产生显著的负面影响。在编写 T-SQL 查询时，请确保避免隐式转换。


  一些公司也可能使用数据压缩。数据压缩的好处之一是能够将更多数据保留在内存中，因为压缩数据占用的空间比未压缩的数据小。在 SQL Server 中使用数据压缩也有一些缺点。其中一个缺点与数据压缩过程整体所产生的
  CPU 成本有关。这并不意味着您不应该使用数据压缩。我提到这一点只是为了让您意识到可能出现的任何潜在问题。


  这就引出了并行度的整体概念。您很容易看到 CPU 使用率的情况最常见的就是查询的并行执行。并行度是一个概念，指的是查询不是在单个线程上执行，而是可以在多个线程上执行。如果您的
  CPU 有四个核心，每个核心有两个线程，那么您总共有八个可用的线程。一个只在一个线程上运行的单线程查询，使用的是半个核心，或者说您整体 CPU 的八分之一。然而，如果查询以并行方式运行，它可能能够运行在多个线程上。例如，如果它运行在四个线程上，那么该查询可以在每个核心上使用两个线程。虽然
  CPU 使用的时间可能会增加，但查询应该比以单线程执行花费更少的时间。


  SQL Server 在决定执行查询时是否使用并行度涉及许多因素。其中大部分与 SQL Server 的配置方式有关。虽然配置 SQL Server 超出了本书的范围，但我希望您了解当
  SQL Server 创建执行计划时它是如何工作的。SQL Server 会给执行计划一个总体成本。SQL Server 还有一个配置值，指示在决定实施并行度之前应存在的最低成本。这个成本被称为
  *cost threshold for parallelism*。如果执行计划的成本大于并行度的成本阈值，SQL Server 可以确定是否存在一个运行在并行模式下的更好的执行计划。


  如果 SQL Server 确定要创建一个使用并行度的执行计划，它还需要确定给定执行计划允许使用的最大线程数。还有一个配置值指示可用于并行度的最大线程数。这个值被称为
  *maximum degree of parallelism*。`MAXDOP` 是 maximum degrees of parallelism 的缩写。这并不意味着
  SQL Server 必须使用与最大并行度中指定的相同数量的线程。它只意味着这是允许执行计划以并行方式运行的最大线程数。


  SQL Server 将在执行时确定并行执行计划要使用的线程数。这将基于查询执行开始时未使用的线程数来完成。当涉及到并行度时，一个可能影响 CPU 性能的因素是，如果在查询并行运行期间有更多线程开始被使用。并行度的基本思想是，总体上会使用更多的
  CPU 处理资源，但持续时间会短得多。如果有更多查询进入队列并需要运行，需要更多活动线程，这可能导致 CPU 在更长的时间内保持高于正常水平的运行状态。


  确保您的 T-SQL 不会负面影响 CPU 使用率的主要原因之一与 CPU 相关的资金成本有关。自 SQL Server 2012 以来，SQL Server
  的许可一直与运行 SQL Server 的核心数量相关。在更高版本的 SQL Server 中，这已修改为与服务器可用的核心数量相关，即使它们没有明确分配给 SQL
  Server。当公司开始遇到性能问题时，常见的解决方案之一是增加更多硬件。虽然这可能在短期内解决性能问题，但根据需要添加的硬件，这也可能是一个非常昂贵的解决方案。由于每个核心的许可费用可能超过
  1000 美元，因此通过减少与 CPU 使用相关的性能瓶颈来最小化对额外 CPU 的需求是理想的做法。


  在设计 T-SQL 查询时，有许多方面需要考虑。其中一些因素包括了解 T-SQL 对运行 SQL Server 的物理硬件可能产生的影响。在编写 T-SQL 查询时，您需要注意访问的数据量，以便最好地利用可用的内存。减少数据量的另一个好处是减少了存储资源。确保您的统计信息是最新的并且有适当的索引将有益于
  CPU 使用率。了解您的查询如何影响您的硬件，不仅可以最大限度地减少对额外硬件的需求，还可以让您的当前硬件更好地支持您的应用程序。


  '
- '# 7. 执行计划


  随着您对编写 T-SQL 越来越熟悉，您将从关注语法和准确性进展到关注性能。在本章中，您将学习如何查看和理解 SQL Server 执行计划。本章将包括演示您现有和新的索引如何影响您的执行计划。您将学习
  SQL Server 在执行计划中如何连接数据。到本章结束时，您将知道如何使用执行计划来提高 T-SQL 的性能。


  ## 介绍执行计划


  为了生成 T-SQL 查询的结果，SQL Server 需要决定如何运行该查询。它需要决定使用哪个索引以及运行查询时使用哪种连接类型。这些决策的结果就是执行计划。学习如何阅读和理解执行计划将帮助您更好地构建查询以提高性能。


  执行计划以 XML 格式存储在数据库中。SSMS 提供了这些计划的可视化表示工具，本章您将主要使用这个工具。有不同类型的计划，例如估计计划和实际计划，您将在本节中了解到。图形化执行计划的示例可以在图
  7-1 中找到。


  ![](img/480547_2_En_7_Fig1_HTML.jpg)


  图 7-1


  图形化执行计划


  图 7-1 包含几个我们将在本章讨论的元素。这些图标被称为 *operators*（运算符）。箭头用于显示操作的顺序。有不同类型的计划，例如估计计划和实际计划。最重要的是，虽然这张图片现在看起来不太明白，但到本章结束时，您将能够翻回几页并读懂整张图！



  ## 阅读执行计划


  本节将涵盖阅读执行计划的基础知识。内容包括讨论**估计执行计划**、**实际执行计划**和**实时查询统计信息**之间的区别。我将讲解显示运算符的图形化执行计划及其阅读方法。此外，本节还将介绍如何在执行计划中查看运算符的详细信息和属性。最后，本节将详细介绍执行计划的组成部分，包括多个步骤、箭头、警告、运算符、估计值和实际值。


  编写 `T-SQL` 时，你的目标是确保获得准确的结果。有时，你编写的查询可能简单直接。你可能会发现自己需要对报表相关的查询进行性能调优，或者为报表编写新的查询。如果你需要编写查询来提供基于事务性数据的报表，你可能需要比编写应用程序查询时使用更多的连接和更复杂的逻辑。虽然这并非理想状态，但这却是许多公司非常常见的场景。


  许多公司已经开始意识到其系统中数据的重要性，或者他们希望增加监控以确保应用程序按预期运行。无论哪种情况，你都很有可能在环境中遇到一个对应用程序产生负面影响的查询。那时，你会希望知道如何解决该问题。在本节中，你将学习执行计划的重要性以及何时需要使用它们。你将学习如何阅读执行计划，包括常用的符号。你还将了解执行计划中的属性和警告。


  我的第一位导师曾告诉我，要编写出好的 `T-SQL`，我需要理解 SQL Server 的工作原理。这是我收到过最明智的建议之一，至今我仍在努力每天更好地理解
  SQL Server 内部机制。运用这个建议，一种更好地理解 SQL Server 的方法就是理解 SQL Server 如何执行你编写的任何查询。与执行查询相关的一些内部机制在第
  1 章中有所涉及。在本章中，我将向你展示 SQL Server 确定的用于执行你的 `T-SQL` 代码的指令。只要计划仍在计划缓存中，这些指令就可以在执行计划中找到。如果你的数据库启用了
  `查询存储`，你可以查阅第 9 章，了解如何访问保存在 `查询存储` 中的查询计划。


  一旦你决定开始研究某些 `T-SQL` 代码的执行计划，你应该确认你拥有在 SQL Server 中查看执行计划的权限。在审查执行计划时，你可以查看估计执行计划、实际执行计划或实时查询统计信息。**估计执行计划**将显示该计划*将*如何执行的最佳猜测。然而，由于查询尚未执行，估计执行计划可能并不代表查询运行时实际发生的情况。**实际执行计划**会执行查询，返回结果，并显示
  SQL Server 为执行查询所采取的步骤。**实时查询统计信息**与实际执行计划相同，只是它还实时显示了查询在执行计划中的流转过程。这在尝试调试性能不佳的查询时很有帮助。但是，如果你的查询执行速度非常快，它最终可能看起来与实际执行计划完全一样。


  如果你希望在执行 `T-SQL` 代码时获取实际执行计划，你需要确保你有执行该代码的权限，并且对于 `T-SQL` 代码中涉及的数据库，你拥有 `SHOWPLAN`
  访问权限。管理执行计划的用户权限超出了本书的范围。但是，如果你想验证用户对执行计划的访问权限，可以执行清单 7-1 中的查询。




  ### 获取执行计划


  此查询显示所有已被授予或拒绝 `SHOWPLAN` 权限的用户。


  ```

  USE OutdoorRecreation;

  GO

  SELECT prn.[name] AS UserName, prm.state_desc, prm.[permission_name]

  FROM sys.database_permissions prm

  INNER JOIN sys.database_principals prn

  ON prm.grantee_principal_id = prn.principal_id

  WHERE prm.[permission_name] = ''SHOWPLAN'';

  ```

  *清单 7-1 查看 SHOWPLAN 权限*


  你也可以从计划缓存中获取执行计划，但你需要能够查询动态管理视图 `sys.dm_exec_cached_plans`。


  在排查性能问题时，通常可以从 `sys.dm_exec_cached_plans` 检索执行计划。如果你想要之前使用的执行计划，这是首选方法。如果执行计划已从计划缓存中清除，你可能无法在此处找到查询或存储过程。此外，根据性能问题发生的时间，缓存中的计划可能已被清除。这可能意味着你能找到一个执行计划，但它可能不是之前使用的那个。在这种情况下，请参阅第
  9 章，了解有关使用查询存储排查性能问题的信息。


  ### 估算与实际执行计划


  如果你发现执行计划自性能问题发生后已被更改，可以尝试查找当前的执行计划。使用此方法有两种选项。一种是获取 SQL Server 将用作执行计划的假设性想法，而无需在服务器上运行实际的
  T-SQL 代码。这称为 *估算执行计划*。使用此方法的最大挑战是，由于 SQL Server 已估算了一个执行计划，无法保证这将是查询运行时 SQL Server
  实际使用的执行计划。我只使用过少数几次估算执行计划，那是在我犹豫是否要运行 T-SQL 代码以避免生产环境中断，或者想快速猜测查询如何运行而不想等待查询完成时。


  如果在计划缓存中找不到执行计划，你可能希望查看当前运行 T-SQL 时生成的执行计划。使用 SQL Server Management Studio (SSMS)
  或 Azure Data Studio (ADS) 时，在执行 T-SQL 代码时请求实际执行计划，将使执行计划在查询执行完成后可用。在查询执行过程中，还可以查看数据在执行计划中的流动情况。除了查看实际执行计划，你还可以要求
  SQL Server 显示实时查询统计信息。虽然此选项对于存在特定瓶颈的较慢查询可能很有帮助，但我经常发现许多查询完成得太快，无法有效使用此方法来诊断我正尝试解决的许多问题。


  ### 执行计划的呈现方式


  如何以及何时检索执行计划是在处理执行计划时可以控制的因素。此外，还有关于检索后执行计划应呈现为何种形式的选项。我通常的方法是查看执行计划的图形输出。无论是编写新的
  T-SQL 还是对现有代码进行性能调整，审查 T-SQL 代码执行计划的过程都是相同的。


  图形执行计划提供了查询执行方式的高级视图。这使得执行计划一目了然，易于阅读，但也意味着在深入执行计划细节时需要访问额外的信息。执行计划中包含运算符，这些运算符描述了
  SQL Server 将如何执行查询。每个运算符都有一个独特的名称，该名称在执行计划中可用。使用图形执行计划时，这些运算符有独特的图标。图 7-2 显示了在图形执行计划中将鼠标悬停在聚集索引扫描运算符上时可以查看的一些详细信息。


