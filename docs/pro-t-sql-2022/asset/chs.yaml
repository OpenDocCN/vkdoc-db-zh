  | --- | --- | --- | --- | --- |

  | 1 | 5 | 飞盘高尔夫盘 - 大号 | 12.99 | 202304-12 11:58 AM |

  | 2 | 7 | 皮划艇 | 1299.00 | 2023-04-12 11:58 AM |


  一旦你确认了触发器的日志记录部分按预期工作，就可以检查 `dbo.Product` 表中的 `DateModified` 字段是否已更新。上面第二个查询的结果如表
  15-3 所示。


  表 15-3

