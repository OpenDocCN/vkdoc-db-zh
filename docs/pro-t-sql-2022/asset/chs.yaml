- "# SQL Server 表分区与索引查询性能分析\n\n### 初始查询：非分区表\n`dbo.CustomerOrderHistory` 表在执行查询时未进行分区，且表按聚集主键（即\
  \ `CustomerOrderHistoryID`）排序。虽然数据可能按记录创建顺序存储，但 SQL Server 无法根据表的配置得知这一点。为确保 SQL\
  \ Server 能基于创建日期检索所有数据，它需要检查表中的每条记录。这在执行计划中体现为聚集索引扫描操作。图 16-8 显示了与清单 16-3 中查询相关的一些属性。\n\
  \n![](img/480547_2_En_16_Fig8_HTML.jpg)\n\n图 16-8：与聚集索引扫描相关的读取操作\n\n本次查询返回的总记录数为\
  \ 802,818 条，本地读取总数为 3,392 次。这代表了为确定满足查询条件的记录数而访问的总页数。\n\n### 分区表性能对比\n前述数值代表了 SQL\
  \ Server 在非分区表上执行查询的方式。你可以对比清单 16-13 中的查询在非分区表和分区表上的性能。你可以为 `dbo.CustomerOrderHistory`\
  \ 表添加分区，并将结果与前面的非分区表进行对比。首先需要删除现有的主键，并添加一个新的非聚集主键，如清单 16-10 所示。由于该表不再有聚集索引，如果你尝试重新运行清单\
  \ 16-13 的查询，将会得到如图 16-9 所示的执行计划。\n\n![](img/480547_2_En_16_Fig9_HTML.jpg)\n\n图 16-9：分区表上无分区键聚集索引的情况\n\
  \n如果忘记在包含分区范围的分区列上添加新的聚集索引，最终会得到一个堆表。这种情况下，结果是需要进行全表扫描来查找符合指定日期条件的任何记录。虽然你可能预期此示例与前一示例的逻辑读取次数相同，但图\
  \ 16-10 显示了一个不同的结果。\n\n![](img/480547_2_En_16_Fig10_HTML.jpg)\n\n图 16-10：分区表上无分区键聚集索引的查询读取情况\n\
  \n在第一个示例中，图 16-8 显示了需要 3,392 次逻辑读取才能找到 `dbo.CustomerOrderHistory` 中符合指定日期范围的所有记录。对表进行分区并用\
  \ `CustomerOrderHistoryID` 和 `DateCreated` 替换原始主键后，逻辑读取次数从 3,392 次下降到 3,375 次，如图\
  \ 16-10 所示。尽管逻辑读取次数显著下降，但在分区表的分区列上执行需要全表扫描的查询并不是理想的做法。关键点在于确保分区表上有一个能够利用分区列的聚集索引。\n\
  \n### 正确使用分区表：利用聚集索引与分区消除\n为了更好地利用分区表，需要在分区表上包含一个聚集索引。这包括拥有一个按分区列与分区方案对齐的聚集索引。完成此操作后，就可以运行清单\
  \ 16-3 中的 T-SQL 代码。你将得到如图 16-11 所示的执行计划。\n\n![](img/480547_2_En_16_Fig11_HTML.jpg)\n\
  \n图 16-11：分区表上在分区键上有聚集索引的情况\n\n你可以验证 SQL Server 现在使用聚集索引查找来定位正确的数据。还可以检查此操作的属性，以确定包含分区键的聚集索引带来的实际影响。你可以在图\
  \ 16-12 中看到 I/O 统计信息和返回的行数。\n\n![](img/480547_2_En_16_Fig12_HTML.jpg)\n\n图 16-12：分区表上在分区键上有聚集索引的查询读取情况\n\
  \n最初在非分区表上运行此查询时，有 3,392 次逻辑读取。在分区表上但没有聚集索引的情况下，逻辑读取次数下降到 3,375 次。虽然较低的逻辑读取次数不能完全确定性能会更好，但你可以确认，在分区列上具有聚集索引的分区表上查询时，SQL\
  \ Server 将读取更少的数据。现在分区表上有了聚集索引，总逻辑读取次数从 3,375 次下降到 4,190 次，如图 16-12 所示。\n\n正确创建分区表只是提升性能挑战的一部分。主要的方法是编写包含允许分区消除条件的\
  \ T-SQL 代码。清单 16-14 中的代码是一个未将分区列指定为条件的 T-SQL 代码示例。\n\n```sql\nSELECT CustomerOrderHistoryID,\n\
  \       CustomerOrderID,\n       CustomerOrderHistoryStatusID,\n       DateCreated\n\
  FROM dbo.CustomerOrderHistory\nWHERE CustomerOrderID = 401408\n  AND CustomerOrderHistoryStatusID\
  \ = 1;\n```\n\n*清单 16-14：未使用分区列访问数据*\n\n因此，该查询将在表的所有分区上执行。即使对指定的列存在索引，查询仍需要分别搜索每个分区中的数据，以确认返回了所有请求的数据。一旦确定了分区列，就应将其包含在所有查询中，以便利用分区表。对于清单\
  \ 16-15 的查询，你需要在 WHERE 子句中包含 `DateCreated`。为了避免访问所有分区，你还需要为该值指定一个实际的日期范围，例如 `DateCreated\
  \ BETWEEN '2022-10-07' AND '2022-10-09'`。\n\n\n\n## 分区视图\n\n你可以通过创建分区表，将单个表拆分为多个段。反之，你也可以选择将几个较小的表组合在一起，使它们像一个大表一样运作。以这种方式联接的表可以是分区的，也可以不是。与创建分区表类似，你也可以选择创建一个分区视图。\n\
  \n与分区表一样，你不应期望使用分区视图就必然意味着未来使用此数据库对象的查询能获得更好的性能。但是，存在一些设计原则可能让你实现性能提升。使用分区表时，有*分区消除*的概念。在分区视图中也能找到类似的概念。清单\
  \ 16-15 展示了两个彼此具有相同架构的表。\n\n```sql\nCREATE TABLE dbo.CustomerOrderHistory2021\n\
  (\nCustomerOrderHistoryID       BIGINT    IDENTITY(1,1)   NOT NULL,\nCustomerOrderID\
  \              INT                       NOT NULL,\nCustomerOrderHistoryStatusID\
  \ TINYINT                   NOT NULL,\nDateCreated                  DATETIME2(2)\
  \              NOT NULL,\nDateModified                 DATETIME2(2)            \
  \      NULL,\nCONSTRAINT PK_CustomerOrderHistory2021_CustomerOrderHistoryID\nPRIMARY\
  \ KEY NONCLUSTERED (CustomerOrderHistoryID, DateCreated),\nCONSTRAINT FK_CustomerOrderHistory2021_CustomerOrder\n\
  FOREIGN KEY (CustomerOrderID)\nREFERENCES dbo.CustomerOrder(CustomerOrderID),\n\
  CONSTRAINT FK_CustomerOrderHistory2021_CustomerOrderHistoryStatus\nFOREIGN KEY (CustomerOrderHistoryStatusID)\n\
  REFERENCES dbo.CustomerOrderHistoryStatus\n(CustomerOrderHistoryStatusID)\n);\n\
  CREATE CLUSTERED INDEX IX_CustomerOrderHistory2021_DateCreated\nON dbo.CustomerOrderHistory2021\
  \ (DateCreated)\nON CustomerOrderHistoryRange (DateCreated);\nCREATE TABLE dbo.CustomerOrderHistory2022\n\
  (\nCustomerOrderHistoryID        BIGINT    IDENTITY(1,1)    NOT NULL,\nCustomerOrderID\
  \               INT                        NOT NULL,\nCustomerOrderHistoryStatusID\
  \  TINYINT                    NOT NULL,\nDateCreated                   DATETIME2(2)\
  \               NOT NULL,\nDateModified                  DATETIME2(2)          \
  \         NULL,\nCONSTRAINT PK_CustomerOrderHistory2022_CustomerOrderHistoryID\n\
  PRIMARY KEY NONCLUSTERED (CustomerOrderHistoryID, DateCreated),\nCONSTRAINT FK_CustomerOrderHistory2022_CustomerOrder\n\
  FOREIGN KEY (CustomerOrderID)\nREFERENCES dbo.CustomerOrder(CustomerOrderID),\n\
  CONSTRAINT FK_CustomerOrderHistory2022_CustomerOrderHistoryStatus\nFOREIGN KEY (CustomerOrderHistoryStatusID)\n\
  REFERENCES dbo.CustomerOrderHistoryStatus\n(CustomerOrderHistoryStatusID)\n);\n\
  CREATE CLUSTERED INDEX IX_CustomerOrderHistory2022_DateCreated\nON dbo.CustomerOrderHistory2022\
  \ (DateCreated)\nON CustomerOrderHistoryRange (DateCreated);\n```\n\n清单 16-15 为分区视图创建表\n\
  \n虽然这些表都位于同一分区方案上，但没有任何限制来规定哪些类型的数据可以存储在这些表中。第一个表旨在存储 2022 年的数据，第二个表用于存储 2021 年的数据。但是，你需要向这些表添加约束，以确保正确的记录存在于每个表中。在清单\
  \ 16-16 中，你可以找到将添加到两个表的约束。\n\n```sql\nALTER TABLE dbo.CustomerOrderHistory2022\n\
  WITH CHECK ADD CONSTRAINT CK_CustomerOrderHistory2022_MinDateCreated\nCHECK\n(\n\
  DateCreated IS NOT NULL\nAND DateCreated >= '2022-01-01'\n);\nALTER TABLE dbo.CustomerOrderHistory2022\n\
  WITH CHECK ADD CONSTRAINT CK_CustomerOrderHistory2022_MaxDateCreated\nCHECK\n(\n\
  DateCreated IS NOT NULL\nAND DateCreated = '2021-01-01'\n);\nALTER TABLE dbo.CustomerOrderHistory2021\n\
  WITH CHECK ADD CONSTRAINT CK_CustomerOrderHistory2021_MaxDateCreated\nCHECK\n(\n\
  DateCreated IS NOT NULL\nAND DateCreated < '2022-01-01'\n);\n```\n\n清单 16-16 向表中添加约束\n\
  \n现在，2022 年的表有一个约束，只允许 `DateCreated` 从 2022 年 1 月 1 日开始，直到但不包括 2023 年 1 月 1 日的记录。2021\
  \ 年的表上也有一个逻辑类似的约束，以便只有在 2021 年创建的记录才能存储在此表中。\n\n现在你有了适用于两个不同日期范围的表，并且已经向这些表应用了约束。下一步是创建一个分区视图。创建分区视图的过程相对简单，包括在底层表的每个\
  \ `SELECT` 语句之间添加一个 `UNION ALL`。创建分区视图的示例可以在清单 16-17 中找到。\n\n```sql\nCREATE VIEW\
  \ dbo.vwCustomerOrderHistory\nWITH SCHEMABINDING\nAS\n-- 从当前的读/写表中选择数据\nSELECT CustomerOrderHistoryID,\n\
  CustomerOrderID,\nCustomerOrderHistoryStatusID,\nDateCreated,\nDateModified\nFROM\
  \ dbo.CustomerOrderHistory2022\nUNION ALL\n-- 从分区表中选择数据\nSELECT CustomerOrderHistoryID,\n\
  CustomerOrderID,\nCustomerOrderHistoryStatusID,\nDateCreated,\nDateModified\nFROM\
  \ dbo.CustomerOrderHistory2021;\n```\n\n清单 16-17 创建分区视图\n\n请注意，分区视图内使用的两个 `SELECT`\
  \ 语句的列列表顺序相同。这是创建分区视图的要求。在创建分区视图时，还必须指定表的完整列列表。一旦分区视图创建完成，你可能想检查查询分区视图是如何工作的。\n\n\
  回到清单 16-13，你查询了 `dbo.CustomerOrderHistory` 表中 2022 年 10 月 7 日至 2022 年 10 月 9 日期间的数据。你可以对分区视图查询相同的日期范围，如清单\
  \ 16-18 所示。\n\n```sql\nDECLARE @StartDate  DATETIME2(2) = '2022-10-07';\nDECLARE\
  \ @EndDate    DATETIME2(2) = '2022-10-09';\nSELECT CustomerOrderHistoryID,\nCustomerOrderID,\n\
  CustomerOrderHistoryStatusID,\nDateCreated,\nDateModified\nFROM dbo.vwCustomerOrderHistory\n\
  WHERE DateCreated > @StartDate\nAND DateCreated <= @EndDate;\n```\n\n清单 16-18 使用分区列访问数据\n\
  \n清单 16-13 和清单 16-18 中的 T-SQL 代码非常相似。这显示了改用分区视图而不是当前表名进行查询是多么容易。然而，你真正感兴趣的是确认使用分区视图后执行计划有何变化。图\
  \ 16-13 显示了运行清单 16-18 中的查询所产生的执行计划。\n\n![](img/480547_2_En_16_Fig13_HTML.jpg)\n\n\
  图 16-13 分区视图的执行计划\n\n与本章前面提到的分区表类似，分区视图的执行计划也使用了聚集索引查找。即使分区视图包含了 2022 年和 2021 年的表，你也可以从执行计划中确定，在查找清单\
  \ 16-18 中的查询结果时，`SQL Server` 仅从 `dbo.CustomerOrderHistory2022` 表返回结果。`dbo.CustomerOrderHistory`\
  \ 的百分比为 0%。你也可以在图 16-14 中检查聚集索引查找的属性。\n\n![](img/480547_2_En_16_Fig14_HTML.jpg)\n\
  \n\n\n### 查询分区视图的执行计划\n\n一张截图展示了与聚集索引查找相关的属性。它列出了 10 个属性。实际逻辑读取数为 7。实际物理读取数为 3。实际预读数为\
  \ 8。实际扫描数为 2。所有执行的实际行数为 3。\n\n**图 16-14**\n在分区键上带有聚集索引的查询分区视图的读取操作\n\n根据返回的行数，你可以确定\
  \ 2021 表中的数据与本章前面提到的分区表不同。你还可以确定，相对逻辑读取数较低，并且其趋势与本章前面的分区表相似。\n\n清单 16-18 中执行的 T-SQL\
  \ 代码访问了基于每个表中分区列和为每个表指定的约束的分区视图。你看到 SQL Server 在查询数据时能够快速确定要访问哪个表。有时你可能想要运行一个不包含分区列的查询，就像清单\
  \ 16-19 中的那个一样。\n\n```sql\nSELECT CustomerOrderHistoryID,\nCustomerOrderID,\nCustomerOrderHistoryStatusID,\n\
  DateCreated\nFROM dbo.vwCustomerOrderHistory\nWHERE CustomerOrderID = 401408\nAND\
  \ CustomerOrderHistoryStatusID = 1;\n-- Listing 16-19\n-- 访问数据而不使用分区列\n```\n\n此查询搜索具有特定状态的特定`CustomerOrder`。然而，没有任何迹象表明这些记录存在于索引视图中的特定表中。由于\
  \ SQL Server 无法在查询中排除某些日期范围，因此你会得到如图 16-15 所示的执行计划。\n\n![](img/480547_2_En_16_Fig15_HTML.jpg)\n\
  \n带有符号的文本描绘了一个包含分区视图的执行计划。文本显示了 2 个聚集索引扫描，成本分别为 85%和 0%，耗时分别为 0.029 秒和 0.000 秒，行数比分别为\
  \ 1 of 1 和 0 of 1，一个连接操作，以及一个 Select 操作成本为 0%。符号包括一个表、一个连接和一个聚集索引扫描。\n\n**图 16-15**\n\
  分区视图的执行计划\n\n你可以确定，在此执行计划中，SQL Server 必须访问包含 2021 数据的表和包含 2022 数据的表。在此示例中，你可以确定此请求在访问的表数量方面没有带来任何好处。\n\
  \n使用分区视图可以帮助你将多个表组合成一个数据库对象。通过访问这个单一的数据库对象，你可以简化跨多个范围的 T-SQL 代码。你还了解到，使用分区视图在限制访问的表数量方面可能是有益的，但如果你不在查询中使用分区列，你仍然需要访问视图中包含的所有表。分区表将一个表拆分成多个段，而分区视图将表组合成一个数据库对象，你可能会发现结合使用两者的优势。\n\
  \n## 混合工作负载\n\n公司使用数据库多年，可能积累了大量的数据。通常，这些公司可能会从这些数据中生成报告。在许多情况下，这些公司可能没有优先构建数据仓库。对于这些情况，一个数据库通常需要同时执行两项任务。第一个角色是继续存储事务性数据。然而，第二个角色也是充当用于分析处理的数据仓库。在许多情况下，事务处理所需的数据库设计与分析处理的最佳设计并不匹配。虽然你的公司可能愿意在将来转向数据仓库，但你可能会发现自己处于需要实施能够适应这种混合工作负载的设计的情况。\n\
  \n通过将分区和非分区表与分区视图结合使用，你可以给自己额外的灵活性。使用分区视图将允许你使用单一的数据库对象和名称来访问用于特定目的的任何数据。在此示例中，让我们继续处理作为启动`CustomerOrders`的结果而记录的数据。由于分区视图允许你将多个表组合在一起，因此你可以研究如何创建这些表。使用多个表的一个优势是每个表可以使用不同的索引。这种索引的差异可以改变数据的存储和访问方式。你还可以选择将某些表设为只读，这可以表明你不打算向这些表添加数据。\n\
  \n你将创建一个分区视图来访问所有`CustomerOrder`历史数据。第一个表仅用于保存要归档的所有较旧数据。你也可以对这个表进行分区，以便在基于表的分区键进行搜索时允许分区消除。在清单\
  \ 16-20 中，你可以参考创建归档数据分区表所需的 T-SQL。\n\n```sql\nCREATE TABLE dbo.CustomerOrderHistoryPartition\n\
  (\nCustomerOrderHistoryID         BIGINT          NOT NULL,\nCustomerOrderID   \
  \             INT             NOT NULL,\nCustomerOrderHistoryStatusID   TINYINT\
  \         NOT NULL,\nDateCreated                    DATETIME2(2)    NOT NULL,\n\
  DateModified                   DATETIME2(2)        NULL,\nCONSTRAINT PK_CustomerOrderHistoryPartition_CustomerOrderHistoryID\n\
  PRIMARY KEY (CustomerOrderHistoryID, DateCreated),\nCONSTRAINT FK_CustomerOrderHistoryPartition_CustomerOrderID\n\
  FOREIGN KEY (CustomerOrderID)\nREFERENCES dbo.CustomerOrder(CustomerOrderID),\n\
  CONSTRAINT FK_CustomerOrderHistoryParition_CustomerOrderHistoryStatusID\nFOREIGN\
  \ KEY (CustomerOrderHistoryStatusID)\nREFERENCES dbo.CustomerOrderHistoryStatus\n\
  (CustomerOrderHistoryStatusID)\n)\nON CustomerOrderHistoryRange (DateCreated);\n\
  -- Listing 16-20\n-- 为归档数据创建分区表\n```\n\n这个分区表的创建方式与本章中已包含的许多分区表类似。与本章前面创建的分区表一样，该表也是在分区方案`CustomerOrderHistoryRange`上创建的。现在你有了一个分区表，你想要为应用程序当前正在积极使用的数据创建一个非分区表。在清单\
  \ 16-21 中创建的表是非分区表的一个示例。\n\n\n\n### 创建活跃数据表\n\n```sql\nCREATE TABLE dbo.CustomerOrderActive\n\
  (\n    CustomerOrderHistoryID         BIGINT             NOT NULL,\n    CustomerOrderID\
  \                INT                NOT NULL,\n    CustomerOrderHistoryStatusID\
  \   TINYINT            NOT NULL,\n    DateCreated                    DATETIME2(2)\
  \       NOT NULL,\n    DateModified                   DATETIME2(2)           NULL,\n\
  \    CONSTRAINT PK_CustomerOrderActive_CustomerOrderHistoryID\n        PRIMARY KEY\
  \ (CustomerOrderHistoryID),\n    CONSTRAINT FK_CustomerOrderActive_CustomerOrderID\n\
  \        FOREIGN KEY (CustomerOrderID)\n        REFERENCES dbo.CustomerOrder(CustomerOrderID),\n\
  \    CONSTRAINT FK_CustomerOrderActive_CustomerOrderHistoryStatusID\n        FOREIGN\
  \ KEY (CustomerOrderHistoryStatusID)\n        REFERENCES\n            dbo.CustomerOrderHistoryStatus(CustomerOrderHistoryStatusID)\n\
  );\n```\n**清单 16-21**  \n创建活跃数据表\n\n此表的创建未指定 `CustomerOrderHistoryRange` 分区方案。此表将成为在数据库\
  \ `PRIMARY` 文件组上创建的标准表。\n\n一旦基础表创建完成，就可以创建一个允许你访问这两个表的数据库对象。这将与上一节中创建的分区视图相同。清单\
  \ 16-22 提供了创建分区视图所需的 T-SQL 代码。\n\n```sql\nCREATE VIEW dbo.vwCustomerOrderHistory_PT\n\
  AS\n    -- 从当前的读/写表中选择数据\n    SELECT CustomerOrderHistoryID,\n           CustomerOrderID,\n\
  \           CustomerOrderHistoryStatusID,\n           DateCreated,\n           DateModified\n\
  \    FROM dbo.CustomerOrderActive\n    UNION ALL\n    -- 从分区表中选择数据\n    SELECT CustomerOrderHistoryID,\n\
  \           CustomerOrderID,\n           CustomerOrderHistoryStatusID,\n       \
  \    DateCreated,\n           DateModified\n    FROM dbo.CustomerOrderHistoryPartition;\n\
  ```\n**清单 16-22**  \n创建分区视图\n\n此分区视图允许你将最新且高度活跃的数据保存在未分区的表中。此表可以专门构建索引以实现最佳的写入速度。分区视图中包含的任何其他表可以根据其使用情况进行索引。上一分区视图中包含的分区表可能仅包含非活动数据。因此，可以预期这些数据未来仅供读取。了解这一点后，你可以使用不同的策略来索引此表。\n\
  \n现在让我们确定 SQL Server 在查询非分区表时的行为。清单 16-23 中的查询显示了如何在 `dbo.CustomerOrderHistory`\
  \ 表中查找特定日期范围内的所有记录。\n\n```sql\nDECLARE @StartDate  DATETIME2(2) = '2022-10-07';\n\
  DECLARE @EndDate    DATETIME2(2) = '2022-10-09';\nSELECT CustomerOrderHistoryID,\n\
  \       CustomerOrderID,\n       CustomerOrderHistoryStatusID,\n       DateCreated,\n\
  \       DateModified\nFROM dbo.CustomerOrderHistory\nWHERE DateCreated > @StartDate\n\
  \  AND DateCreated <= @EndDate;\n```\n**清单 16-23**  \n在分区表和视图分区前访问数据\n\n此查询将在非分区表上运行。在查询执行时，此表按原始主键（即\
  \ `CustomerOrderHistoryID`）排序。因此，清单 16-23 中查询的执行计划如图 16-16 所示。\n\n![](img/480547_2_En_16_Fig16_HTML.jpg)\n\
  *图 16-16*  \n非分区表的执行计划\n\n基于 清单 16-16 中的执行计划，你可以确认 SQL Server 使用 `clustered index\
  \ scan`（聚集索引扫描）来查找相关记录。这是因为没有包含 `DateCreated` 的索引。由于表未按日期分区，SQL Server 还需要遍历整个表才能找到满足\
  \ 清单 16-23 中查询条件的数据记录。\n\n运行此查询后，你可以查看执行计划中操作符的其他信息。具体来说，你需要确定此查询执行的逻辑读次数和返回的行数。使用图\
  \ 16-17，你可以识别逻辑读次数和行数。\n\n![](img/480547_2_En_16_Fig17_HTML.jpg)\n*图 16-17*  \n\
  与聚集索引扫描相关的读操作\n\n你可以看到此查询返回了 802,818 行，逻辑读的总页数为 3,392。你将把这些值与包含分区和非分区表的分区视图的性能进行比较。\n\
  \n之前，在 清单 16-22 中，你创建了一个分区视图，其中包含一个用于所有 2021 年数据记录的分区表和一个用于所有 2022 年数据记录的非分区表。为了比较分区视图与非分区表的性能差异，你可以运行\
  \ 清单 16-24 中的查询。\n\n```sql\nDECLARE @StartDate  DATETIME2(2) = '2022-10-07';\nDECLARE\
  \ @EndDate    DATETIME2(2) = '2022-10-09';\nSELECT CustomerOrderHistoryID,\n   \
  \    CustomerOrderID,\n       CustomerOrderHistoryStatusID,\n       DateCreated,\n\
  \       DateModified\nFROM dbo.vwCustomerOrderHistory_PT\nWHERE DateCreated > @StartDate\n\
  \  AND DateCreated <= @EndDate;\n```\n**清单 16-24**  \n在分区表中使用分区列访问数据\n\n此查询搜索与 清单\
  \ 16-23 中的查询相同的数据记录。但是，此查询访问的是分区视图，而不是非分区表。该分区视图由一个包含 2021 年全部数据的分区表和一个包含 2022 年数据的非分区表组成。在图\
  \ 16-18 中，你可以看到此查询生成的执行计划。\n\n![](img/480547_2_En_16_Fig18_HTML.jpg)\n*图 16-18*\
  \  \n分区视图的执行计划\n\n需要注意的重要一点是，此执行计划使用了 `clustered index seek`（聚集索引查找）而不是 `clustered\
  \ index scan`（聚集索引扫描）。这让你知道 SQL Server 能够高效地确定查找相关数据记录的位置，而无需遍历表中的全部或大部分记录。另一个突出的点是，`clustered\
  \ index seek` 是在分区表 `dbo.CustomerOrderHistory` 上执行的。你还可以查找与 `clustered index seek`\
  \ 相关的属性以获取更多信息。在图 16-19 中，你可以看到逻辑读次数和返回的记录数。\n\n![](img/480547_2_En_16_Fig19_HTML.jpg)\n\
  \n\n"
- "# 17. 长期数据管理\n\n在上一章中，我介绍了分区表和分区视图的概念。本章继续讨论分区，重点讲解如何使用分区切换。第一节介绍分区切换的概念。第二节指导你运用已学到的关于分区切换的所有知识，来管理数据保留和归档。\n\
  \n在前几章中，我们探讨了分区表和分区视图在提升查询性能方面的应用。本章将转向数据生命周期管理，介绍一个强大的工具——分区切换，它能极大地简化数据的归档和清除过程。\n\
  \n## 分区切换简介\n\n分区切换是一种高效的数据管理操作，它能够将整个分区（或非分区表）作为一个单元快速地移入或移出分区表。此操作本质上是元数据的更改，因此速度极快，且通常只需极少的系统资源。\n\
  \n其核心思想是将数据存储与数据管理分离。你可以通过创建 `staging` 表（暂存表）来准备新数据，或通过将旧数据移动到归档表中来清理生产数据，然后通过 `ALTER\
  \ TABLE ... SWITCH` 语句在瞬间完成“切换”，而无需实际移动大量数据行。\n\n### 使用分区切换进行数据管理\n\n通过一个具体的例子来理解如何利用分区切换进行数据管理。假设你有一个按月分区的销售表\
  \ `Sales`，并且希望将超过 24 个月的旧数据归档。\n\n1.  **准备归档表**：首先，创建一个与 `Sales` 表结构相同的非分区表 `SalesArchive`。确保其文件组与要移出的分区所在文件组一致，并且没有任何索引或约束（或与原分区完全相同）。\n\
  \    ```sql\n    CREATE TABLE SalesArchive\n    (\n        SaleID INT,\n       \
  \ SaleDate DATE,\n        Amount DECIMAL(10,2)\n        -- ... 其他列\n    ) ON [ArchiveFG];\n\
  \    ```\n\n2.  **切换分区**：使用 `ALTER TABLE ... SWITCH PARTITION ... TO` 语句将指定的分区切换到归档表。\n\
  \    ```sql\n    ALTER TABLE Sales\n    SWITCH PARTITION 1 TO SalesArchive;\n  \
  \  ```\n    执行后，原 `Sales` 表第一个分区的所有数据行会“变成” `SalesArchive` 表的内容，而 `Sales` 表的第一个分区变为空。这个操作几乎是瞬间完成的。\n\
  \n3.  **处理空分区**：切换后，`Sales` 表留下的空分区可以被移除（`ALTER PARTITION FUNCTION ... MERGE RANGE`），为未来的新数据腾出空间，或者用于接收新数据。\n\
  \n### 将非分区表切换到分区表\n\n分区切换不仅可以从分区表中移出数据，还可以将准备好的非分区表（暂存表）切换为分区表的一个新分区。这在批量加载新数据时非常有用，因为它可以避免直接在大型生产表上执行缓慢的\
  \ `INSERT` 操作。\n\n流程如下：\n1.  在一个单独的文件组上创建并准备 `Staging` 表，填入新数据。\n2.  确保 `Staging`\
  \ 表的结构与目标分区表兼容。\n3.  将 `Staging` 表切换为目标分区表的一个新分区。\n    ```sql\n    ALTER TABLE Staging\n\
  \    SWITCH TO Sales PARTITION 5;\n    ```\n    此操作后，`Staging` 表变为空，并成为 `Sales`\
  \ 表的一部分，而加载过程对用户的影响微乎其微。\n\n### 注意事项\n\n-   **兼容性检查**：源表和目标表/分区的架构必须完全兼容，包括列、数据类型、索引、约束、压缩设置等。不匹配的操作将失败。\n\
  -   **对齐要求**：分区表的分区函数和分区方案必须已正确定义，目标分区必须存在且为空（移出时），或者源表必须与目标分区架构对齐（移入时）。\n-   **文件组**：源表和目标表通常需要位于相同的文件组或文件组组中。\n\
  \n分区切换是管理大数据量生命周期的关键技术。它使得按时间窗口（如每月、每季度）归档历史数据或加载新数据变得高效而简单，从而在保持系统性能的同时，满足数据保留策略的要求。结合分区视图，你可以构建出既灵活又高效的数据存储架构。\n\
  \n\n## 数据保留与归档\n\n长期的数据管理应能让你高效地存储数据并快速删除数据。本节介绍如何将待删除的数据交换到一个新表中，以便将其移除。表的最后两个分区将被合并，这样最旧的数据仍保留在最后一个分区中。最后，新分区将被拆分，以便新数据可以保存到最新的分区中。整个过程被称为*滑动窗口分区*。如果你决定实现此过程之一，最好使用\
  \ SQL Server 代理作业将此过程自动化。\n\n让我们熟悉一下你将用于此过程的表的 T-SQL。第一个表是 `dbo.CustomerOrderActive`。此表用于根据业务规则保存活动订单。清单\
  \ 17-1 中的表用于保存当月的客户订单。\n\n```sql\nCREATE TABLE dbo.CustomerOrderActive\n(\nCustomerOrderHistoryID\
  \         BIGINT             NOT NULL,\nCustomerOrderID                INT     \
  \           NOT NULL,\nCustomerOrderHistoryStatusID   TINYINT            NOT NULL,\n\
  DateCreated                    DATETIME2(2)       NOT NULL,\nDateModified      \
  \             DATETIME2(2)           NULL,\nCONSTRAINT PK_CustomerOrderActive_CustomerOrderHistoryID\n\
  PRIMARY KEY (CustomerOrderHistoryID),\nCONSTRAINT FK_CustomerOrderActive_CustomerOrderID\n\
  FOREIGN KEY (CustomerOrderID)\nREFERENCES dbo.CustomerOrder(CustomerOrderID),\n\
  CONSTRAINT FK_CustomerOrderActive_CustomerOrderHistoryStatusID\nFOREIGN KEY (CustomerOrderHistoryStatusID)\n\
  REFERENCES\ndbo.CustomerOrderHistoryStatus(CustomerOrderHistoryStatusID)\n);\n```\n\
  \n`清单 17-1`\n当月客户订单\n\n预期所有订单都将在三个月内完成。因此，最近三个月的活动预计最为频繁。\n\n第二个表用于保存过去 12 个月的客户历史记录。此数据用于业务内的报告和分析。在清单\
  \ 17-2 中，T-SQL 显示该表已分区。\n\n```sql\nCREATE TABLE dbo.CustomerOrderHistory\n(\nCustomerOrderHistoryID\
  \        BIGINT    IDENTITY(1,1)    NOT NULL,\nCustomerOrderID               INT\
  \                        NOT NULL,\nCustomerOrderHistoryStatusID  TINYINT      \
  \              NOT NULL,\nDateCreated                   DATETIME2(2)           \
  \    NOT NULL,\nDateModified                  DATETIME2(2)                   NULL,\n\
  CONSTRAINT PK_CustomerOrderHistory_CustomerOrderHistoryID\nPRIMARY KEY NONCLUSTERED\n\
  (CustomerOrderHistoryID, DateCreated),\nCONSTRAINT FK_CustomerOrderHistory_CustomerOrder\n\
  FOREIGN KEY (CustomerOrderID)\nREFERENCES dbo.CustomerOrder(CustomerOrderID),\n\
  CONSTRAINT FK_CustomerOrderHistory_CustomerOrderHistoryStatus\nFOREIGN KEY (CustomerOrderHistoryStatusID)\n\
  REFERENCES dbo.CustomerOrderHistoryStatus\n(CustomerOrderHistoryStatusID)\n) ON\
  \ CustomerOrderHistoryRange (DateCreated);\n```\n\n`清单 17-2`\n过去 12 个月客户订单的分区表\n\
  \n第三个表是一个用于保存法规目的所需存档数据的表，在本例中是超过一年的客户订单信息。15 个月后，数据将从此表中删除。此表也是分区的，如下方清单 17-3 所示。\n\
  \n```sql\nCREATE TABLE dbo.CustomerOrderHistoryArchive\n(\nCustomerOrderHistoryID\
  \        BIGINT     IDENTITY(1,1)    NOT NULL,\nCustomerOrderID               INT\
  \                         NOT NULL,\nCustomerOrderHistoryStatusID  TINYINT     \
  \                NOT NULL,\nDateCreated                   DATETIME2(2)         \
  \       NOT NULL,\nDateModified                  DATETIME2(2)                  \
  \  NULL,\nCONSTRAINT PK_CustomerOrderHistoryArchive_CustomerOrderHistoryID\nPRIMARY\
  \ KEY NONCLUSTERED\n(CustomerOrderHistoryID, DateCreated),\nCONSTRAINT FK_CustomerOrderHistoryArchive_CustomerOrder\n\
  FOREIGN KEY (CustomerOrderID)\nREFERENCES dbo.CustomerOrder(CustomerOrderID),\n\
  CONSTRAINT FK_CustomerOrderHistoryArchive_CustomerOrderHistoryStatus\nFOREIGN KEY\
  \ (CustomerOrderHistoryStatusID)\nREFERENCES dbo.CustomerOrderHistoryStatus\n(CustomerOrderHistoryStatusID)\n\
  ) ON CustomerOrderHistoryArchiveRange (DateCreated);\n```\n\n`清单 17-3`\n用于归档过去 15\
  \ 个月客户订单的分区表\n\n最后一个表用于临时保存要清除的数据。此表必须与其他表具有相同的格式，如清单 17-4 所示。\n\n```sql\nCREATE\
  \ TABLE dbo.CustomerOrderPurge\n(\nCustomerOrderHistoryID        BIGINT    IDENTITY(1,1)\
  \   NOT NULL,\nCustomerOrderID               INT                       NOT NULL,\n\
  CustomerOrderHistoryStatusID  TINYINT                   NOT NULL,\nDateCreated \
  \                  DATETIME2(2)              NOT NULL,\nDateModified           \
  \       DATETIME2(2)                  NULL,\nCONSTRAINT PK_CustomerOrderPurge_CustomerOrderHistoryID\n\
  PRIMARY KEY NONCLUSTERED\n(CustomerOrderHistoryID, DateCreated),\nCONSTRAINT FK_CustomerOrderPurge_CustomerOrder\n\
  FOREIGN KEY (CustomerOrderID)\nREFERENCES dbo.CustomerOrder(CustomerOrderID),\n\
  CONSTRAINT FK_CustomerOrderPurge_CustomerOrderHistoryStatus\nFOREIGN KEY (CustomerOrderHistoryStatusID)\n\
  REFERENCES dbo.CustomerOrderHistoryStatus\n(CustomerOrderHistoryStatusID)\n);\n\
  ```\n\n`清单 17-4`\n用于清除超过 15 个月的客户订单的表\n\n现在你已经创建了表，接下来是在月底移动这些分区的过程。\n\n\n\n## 切换分区\n\
  \n在第 18 章中，我介绍了 SQL Server 中分区的概念。本节将探讨创建分区后管理分区的过程。第一个示例将演示如何在两个**非分区**表之间使用分区切换。第二个示例将展示如何将数据从非分区表切换到分区表。最后一个示例将展示如何在分区表之间切换分区。\n\
  \n### 在非分区表之间切换\n\n对于第一个示例，你将使用清单 17-5 中的 T-SQL 代码创建一个非分区表。\n\n```sql\nCREATE TABLE\
  \ dbo.CustomerOrderNonParitition(\n    CustomerOrderHistoryID         BIGINT   \
  \      NOT NULL,\n    CustomerOrderID                INT            NOT NULL,\n\
  \    CustomerOrderHistoryStatusID   TINYINY        NOT NULL,\n    DateCreated  \
  \                  DATETIME2(2)   NOT NULL,\n    DateModified                  \
  \ DATETIME2(2)   NULL,\n    CONSTRAINT [PK_CustomerOrderNonPartition]\n    PRIMARY\
  \ KEY CLUSTERED ([CustomerOrderHistoryID], [DateCreated])\n);\n-- 清单 17-5\n-- 创建一个非分区表\n\
  ```\n\n这是一个新的空表，其架构与表 `dbo.CustomerOrderActive` 相同。这两个表都未进行分区。在将数据从一个表切换到另一个表之前，你应该获取每个表中的记录数。这是因为非分区表被视为由单个分区组成的表。清单\
  \ 17-6 中的查询获取了 `dbo.CustomerOrderActive` 和 `dbo.CustomerOrderNonPartition` 表的记录数。\n\
  \n```sql\nSELECT COUNT(*)\nFROM dbo.CustomerOrderActive;\nSELECT COUNT(*)\nFROM\
  \ dbo.CustomerOrderNonParitition;\n-- 清单 17-6\n-- 获取源表和目标表的记录数\n```\n\n上述查询的输出已格式化为表\
  \ 17-1，以显示每个表的客户记录数。\n\n表 17-1\n\n每个表的记录数\n\n| 表名 | 记录数 |\n| --- | --- |\n| `dbo.CustomerOrderActive`\
  \ | 802,821 |\n| `dbo.CustomerOrderNonPartition` | 0 |\n\n在分区切换之前，`dbo.CustomerOrder`\
  \ 表有 802,821 条记录，而 `dbo.CustomerOrderNonPartition` 表有 0 条记录。清单 17-7 中的 T-SQL 展示了如何将数据切换到另一个非分区表。\n\
  \n```sql\nALTER TABLE dbo.CustomerOrderActive\nSWITCH TO dbo.CustomerOrderNonParitition;\n\
  -- 清单 17-7\n-- 在非分区表之间移动数据\n```\n\n将分区（在此例中是整个表）从 `dbo.CustomerOrderActive` 切换到\
  \ `dbo.CustomerOrderNonPartition` 后，你可以运行查询来检查两个表的行数，如清单 17-8 所示。\n\n```sql\nSELECT\
  \ COUNT(*)\nFROM dbo.CustomerOrderActive;\nSELECT COUNT(*)\nFROM dbo.CustomerOrderNonParitition;\n\
  -- 清单 17-8\n-- 非分区表中的记录数\n```\n\n运行此 T-SQL 后，你将获得两个表的记录数，如表 17-2 所示。\n\n表 17-2\n\
  \n每个表的记录数\n\n| 表名 | 记录数 |\n| --- | --- |\n| `dbo.CustomerOrderActive` | 0 |\n| `dbo.CustomerOrderNonPartition`\
  \ | 802,821 |\n\n该表显示 `dbo.CustomerOrderActive` 中没有行，而 `dbo.CustomerOrderNonPartition`\
  \ 中有 802,821 行。这符合预期，因为 `dbo.CustomerOrderActive` 的整个表已切换到 `dbo.CustomerOrderNonPartition`。如果你想将表恢复到分区切换之前的状态，可以执行清单\
  \ 17-9 中的 T-SQL，将数据从 `dbo.CustomerOrderNonParition` 切换回 `dbo.CustomerOrderActive`。\n\
  \n```sql\nALTER TABLE dbo.CustomerOrderNonParitition\nSWITCH TO dbo.CustomerOrderActive;\n\
  -- 清单 17-9\n-- 将数据移回原始表\n```\n\n现在分区已切换回来，所有记录再次位于 `dbo.CustomerOrderActive` 中。如果在\
  \ `dbo.CustomerOrderActive` 表中写入了数据，你将无法将数据切换回原始表。目标表必须为空。清单 17-10 中有一个查询，你可以执行它来确认\
  \ `dbo.CustomerOrderNonPartition` 没有任何分区。\n\n```sql\nSELECT tbl.[name] AS TableName,\n\
  \       sch.[name] AS PartitionScheme,\n       fnc.[name] AS PartitionFunction,\n\
  \       prt.partition_number,\n       fnc.[type_desc],\n       rng.boundary_id,\n\
  \       rng.[value] AS BoundaryValue,\n       prt.[rows]\nFROM sys.tables tbl\n\
  INNER JOIN sys.indexes idx\n    ON tbl.[object_id] = idx.[object_id]\nINNER JOIN\
  \ sys.partitions prt\n    ON idx.[object_id] = prt.[object_id]\n    AND idx.index_id\
  \ = prt.index_id\nINNER JOIN sys.partition_schemes AS sch\n    ON idx.data_space_id\
  \ = sch.data_space_id\nINNER JOIN sys.partition_functions AS fnc\n    ON sch.function_id\
  \ = fnc.function_id\nLEFT JOIN sys.partition_range_values AS rng\n    ON fnc.function_id\
  \ = rng.function_id\n    AND rng.boundary_id = prt.partition_number\nWHERE tbl.[name]\
  \ = 'CustomerOrderNonParitition'\n    AND idx.[type] <= 1\nORDER BY prt.partition_number;\n\
  -- 清单 17-10\n-- 查询以查看 CustomerOrderNonPartition 表的分区信息\n```\n\n### 从非分区表切换到分区表\n\
  \n以上示例展示了如何在两个非分区表之间进行分区切换。然而，更可能的情况是，你会希望至少对一个分区表使用分区切换。\n\n接下来，你将通过一个示例来学习如何从非分区表切换到分区表。作为复习，清单\
  \ 17-11 展示了如何创建分区函数和分区方案。\n\n```sql\nCREATE PARTITION FUNCTION CustomerOrderHistoryFunc(DATETIME2(2))\n\
  AS RANGE RIGHT FOR VALUES\n(\n    '2022-01-01',\n    '2022-02-01',\n    '2022-03-01'\n\
  );\nCREATE PARTITION SCHEME CustomerOrderHistoryRange\nAS PARTITION CustomerOrderHistoryFunc\
  \ TO\n(\n    [PRIMARY],\n    [PRIMARY],\n    CustomerOrderHistory202202,\n    CustomerOrderHistory202203\n\
  );\n-- 清单 17-11\n-- 创建分区函数和分区方案\n```\n\n切换分区时需要注意的一个重要点是：被切换出的源表和切换入的目标表必须位于**相同的文件组**中。对于你的示例，`dbo.CustomerOrderActive`\
  \ 位于 PRIMARY 文件组中。因此，如果你要将其切换到 `dbo.CustomerOrderHistory` 的第一个分区，那么第一个分区也必须位于 PRIMARY\
  \ 文件组中。否则，你将需要把 `dbo.CustomerOrderActive` 移动到与 `dbo.CustomerOrderHistory` 中第一个分区相同的文件组。\n\
  \n在将记录从 `dbo.CustomerActive` 切换到 `dbo.CustomerOrderHistory` 之前，你可以使用清单 17-12 中的查询来检查记录数。\n\
  \n```sql\nSELECT COUNT(*)\nFROM dbo.CustomerOrderActive;\nSELECT COUNT(*)\nFROM\
  \ dbo.CustomerOrderHistory;\n-- 清单 17-12\n-- 非分区表和分区表中的记录数\n```\n\n这两个查询的结果显示在表\
  \ 17-3 中。\n\n表 17-3\n\n每个表的记录数\n\n| 表名 | 记录数 |\n| --- | --- |\n| `dbo.CustomerOrderActive`\
  \ | 802,821 |\n| `dbo.CustomerOrderNonPartition` | 0 |\n\n记录数显示 `dbo.CustomerOrderActive`\
  \ 表中有 802,821 条记录，而 `dbo.CustomerOrderNonPartition` 中有零条记录。\n\n在尝试切换分区之前，你需要确认 `dbo.CustomerOrderActive`\
  \ 中的所有记录都存在于你将在 `dbo.CustomerOrderNonPartition` 中使用的分区内。为此，你需要向 `dbo.CustomerOrderActive`\
  \ 添加检查约束。清单 17-13 显示了用于添加检查约束的 T-SQL。\n\n\n\n"
- '# 分区切换


  当将数据从非分区表切换到分区表的某个分区时，必须首先验证非分区表中的所有数据是否能够存在于分区表的对应分区中。为此，需要向非分区表添加一个检查约束。上面的检查约束确认了
  `dbo.CustomerOrderActive` 表中的所有数据都是在 2022 年 1 月 1 日之前创建的。这与 `dbo.CustomerOrderActive`
  表中第一个分区的日期范围相同。


  > **注意**

  > 如果由于存在超出分区日期范围的数据而导致创建检查约束失败，你将无法使用分区切换将数据从非分区表移动到分区表。同样，如果你只想将非分区表中的部分数据移动到分区表，或者想将非分区表中的所有数据移动到目标表中一个非空的分区，你也将无法使用分区切换。


  一旦添加了检查约束，就可以使用以下 T-SQL（参考 清单 17-14）将非分区表 `dbo.CustomerOrderActive` 中的所有数据切换到 `dbo.CustomerOrderHistory`
  表的第一个分区。


  ```sql

  ALTER TABLE dbo.CustomerOrderActive

  SWITCH TO dbo.CustomerOrderHistory PARTITION 1;

  ```

  **清单 17-14**

  **从非分区表切换到分区表的分区切换**


  与之前的操作一样，一旦分区成功切换，你就可以执行以下 T-SQL（参考 清单 17-15）来确认每个受影响表中的记录数。


  ```sql

  SELECT COUNT(*)

  FROM dbo.CustomerOrderActive;

  SELECT COUNT(*)

  FROM dbo.CustomerOrderHistory;

  ```

  **清单 17-15**

  **非分区表和分区表中的记录数**


  这些查询的结果符合预期。`dbo.CustomerOrderActive` 表中剩余 0 条记录，而 `dbo.CustomerOrderNonPartition`
  表中有 802,821 条记录，如表 17-4 所示。


  **表 17-4**

  **每个表的记录数统计**


  | 表名 | 记录数 |

  | --- | --- |

  | `dbo.CustomerOrderActive` | 0 |

  | `dbo.CustomerOrderNonPartition` | 802,821 |


  这确认了所有记录已从 `dbo.CustomerOrderActive` 切换到 `dbo.CustomerOrderNonPartition`。


  你将切换分区以重置演示。在将分区切换回去之前，你可以运行一个额外的查询来验证 `dbo.CustomerOrderNonPartition` 中包含这些记录的分区。清单
  17-16 展示了用于验证这些结果的查询。


  ```sql

  SELECT tbl.[name] AS TableName,

  sch.[name] AS PartitionScheme,

  fnc.[name] AS PartitionFunction,

  prt.partition_number,

  fnc.[type_desc],

  rng.boundary_id,

  rng.[value] AS BoundaryValue,

  prt.[rows]

  FROM sys.tables tbl

  INNER JOIN sys.indexes idx

  ON tbl.[object_id] = idx.[object_id]

  INNER JOIN sys.partitions prt

  ON idx.[object_id] = prt.[object_id]

  AND idx.index_id = prt.index_id

  INNER JOIN sys.partition_schemes AS sch

  ON idx.data_space_id = sch.data_space_id

  INNER JOIN sys.partition_functions AS fnc

  ON sch.function_id = fnc.function_id

  LEFT JOIN sys.partition_range_values AS rng

  ON fnc.function_id = rng.function_id

  AND rng.boundary_id = prt.partition_number

  WHERE tbl.[name] = ''CustomerOrderHistory''

  AND idx.[type] <= 1

  ORDER BY prt.partition_number;

  ```

  **清单 17-16**

  **用于查看 CustomerOrderHistory 表分区信息的查询**


  运行此 T-SQL 代码后，你会发现所有 802,821 条记录都按预期在第一个分区中。这表明你已成功将数据从非分区表切换到分区表。如果你想将分区切换回去，需要运行
  清单 17-17 中所示的 T-SQL。


  ```sql

  ALTER TABLE dbo.CustomerOrderActive

  DROP CONSTRAINT CK_MaxDateCreated;

  ALTER TABLE dbo.CustomerOrderHistory

  SWITCH PARTITION 1 TO dbo.CustomerOrderActive;

  ```

  **清单 17-17**

  **从当前分区表切换回原始非分区表**


