    You need to determine how these errors should be handled. You still want a method
    to handle these failures, but you may also need more instantaneous reporting that
    these records failed to be sent or received. Business today requires a constant
    state of uptime and successful interactions. You can control your effectiveness
    in responding to these issues by how you record failures when trying to process
    data.


    Database tables that store information that needs to be moved through a system
