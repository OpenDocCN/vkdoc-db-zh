  trans: '

    # 考虑存储与 T-SQL 设计


    我已经介绍了如何与你计划频繁访问的数据进行交互；你还需要考虑大部分数据是如何存储的。在处理存储时，重要的是考虑哪些活动会导致你必须访问磁盘上的数据。这些正是你希望最小化或改进的活动类型。在某些情况下，当我看到大量的磁盘
    I/O 时，这可能表明 T-SQL 设计的某些其他部分需要改进。这可能只是症状，而非根源。


    SQL Server 使用索引来组织数据，并使其能够轻松快速地检索。对于大于几个数据页的表，SQL Server 会尝试使用索引来遍历各个数据页，并快速找到所需数据。然而，在某些情况下，必要的索引可能不存在。这导致
    SQL Server 必须读取更多的数据页，有时甚至是表中的所有数据，以确定哪些行是满足查询需求所必需的。


    一旦数据被判定为非优先事项，SQL Server 便可以访问磁盘并获取其所需的数据。这些数据将被存储在缓冲池中，直到未来的某个时刻它被认为不再需要。就硬件速度而言，这个过程本身已经引入了延迟。如果数据不在缓冲池中，还需要额外的时间来确定哪些记录需要从缓冲池中移除。将这些记录从缓冲池中移除并访问磁盘，会带来从磁盘检索数据的额外时间成本。


    如果这些数据仅用于每四到六小时运行一次的作业，那么大部分数据可能被判定为对所有其他进程无关紧要。这就导致了从缓冲池中移除的数据出现高频率更替。新数据可以从磁盘获取并保存到缓冲池中。然后，这些新数据可能会从缓冲池中移除，并被从磁盘检索到的更新数据所取代。


    除了处理大量数据所带来的这种开销之外，还有其他与磁盘或存储交互的活动。当新数据被写入系统时，该数据将被存储在事务日志中。数据将持续添加到事务日志中，直到日志被清除。当事务提交且信息被写入磁盘时，日志可能会被刷写。在系统中添加、更新或删除大量数据的情况下，这可能导致大量的磁盘活动以修改表，并且由于日志增长以及插入操作中保存的数据（用于回滚），磁盘存储空间也会增加。


    了解数据是如何存储的，以及 SQL Server 如何通过索引和存储在磁盘上的其他数据页轻松找到这些数据，这很重要。当信息被添加到索引或索引需要更新时，这些操作也会产生存储成本。这不仅涉及存储数据所需的时间，还包括访问磁盘进行这些添加或更改所涉及的时间。


    在使用 T-SQL 时，你需要考虑你的查询如何影响数据存储。正如你在上一节所见，这可以意味着多件事情。你需要确保在给定时间内，你没有访问、插入、更新或删除超出你实际需要的数据量。但这并不是编写
    T-SQL 时唯一需要考虑的因素。你可以做一些事情来监控与查询相关的存储使用情况。其中大部分涉及查看物理读取次数、预读读取次数或与查询相关的 I/O 成本。


    如果你已经确认你正在处理与你想要交互的数据量最少，那么可能无法再降低与你的 T-SQL 查询相关的存储成本。在某些情况下，就像内存一样，发现巨大的存储使用量可能指向其他问题。这些问题可能包括数据如何保存在磁盘上以及索引是如何设计的等。


    ## 索引和页拆分对存储的影响


    在某些情况下，你可能会发现频繁的索引更新导致了巨大的存储成本。这可能是由于索引需要根据其设计方式不断重新组织。如果在 `dbo.CustomerOrder`
    表的 `ShipDate` 上创建了一个非聚集索引，那么当 `ShipDate` 被填充或更改时，就需要更新该索引。当这种情况发生时，`ShipDate`
    可能需要移动到不同的页。如果该页已满，SQL Server 将创建一个新页。这个新页可能会从旧页转移一些数据过来，而新数据将被添加到该页中。同时还会创建一个指针，以便
    SQL Server 知道在逻辑序列中去哪里查找下一个数据页。当这种情况发生时，就称为 `索引碎片`。这可能导致使用此索引的查询性能不佳，因为索引信息没有按顺序存储。虽然这在
    SSD 上问题较小，但索引碎片仍然可能导致索引占用比正确组织时更多的空间。


    在涉及页拆分的情况下，你也可能看到与此活动相关的显著存储成本。你的表的排序方式或索引的设计方式可能导致大量的页拆分。例如，我可以在 `dbo.CustomerOrder`
    表中使用 `ShipDate` 作为聚集索引来创建表。如果应用程序没有为每个订单填充发货日期，或者如果发货日期被更改，那么数据记录可能会被移动到不同的页。在某些情况下，该记录可能被移动到一个已经满了的页。如果是这样，该页将会拆分，以便将记录添加到有可用空间的数据页中。你可能会看到维护这些索引相关的磁盘活动增加。


    ## 存储引擎的作用


    关于存储成本如何运作的更多信息，了解 SQL Server 存储引擎如何操作可能会有所帮助。在处理 T-SQL 查询时，有一个方面更频繁地依赖于存储引擎。这与访问当前不在缓冲池中的数据有关。


    存储引擎具有几个不同的功能。这些功能涉及访问不在缓冲池中的数据。存储引擎的另一个功能与需要锁时如何处理数据有关。存储引擎的第三个功能涉及与应用程序使用的 T-SQL
    运行无关的命令。


    存储引擎在访问数据时可能会遇到性能瓶颈。这些瓶颈反过来会导致访问存储数据时出现性能问题。一个例子是当查询访问数据表中的行或与索引交互时。在其他时候，存储引擎可能需要处理与为缓冲池检索数据相关的页分配。如果你的公司决定实施行版本控制，这可能会导致存储性能问题。虽然这超出了本书的范围，但如果你正在使用行版本控制并且遇到与存储性能相关的问题，你可能需要进行额外的研究以确认行版本控制不是原因。

    '
- fmt: 'When accessing data rows or indexes, SQL Server will utilize the storage engine.
    The data being accessed may be stored in the `buffer pool`. It is up to the storage
    engine to keep track of where these rows live in the `B-Tree`. A `B-tree` is a
    type of self-balancing binary search tree that creates a hierarchal structure
    for data to be stored. This specific design for this structure allows for many
    branches causing the children (called `nodes` or `levels`) to be flatter than
    with typical binary search tree. The `B-Tree` was specifically designed to work
    with large amounts of data such as databases. The same process happens with regard
    to managing, adding, updating, or removing entries from indexes within SQL Server.
    This is collectively called `row and index operations maintenance` within the
    storage engine.


    When writing queries to access data, SQL Server keeps track of the data that needs
    to be accessed by a query using a metric called a `read`, which is pronounced
    like the verb (“to read”). If the data is available in memory, the act of accessing
    that data is referred to as a `logical read`. There are also times when accessing
    data may require SQL Server to go to disk or storage to access the data pages.
    Data pages are the smallest amount of data SQL Server will store, which is 8 kb
    of data. If the data is accessed from disk, the data is referred to as a `physical
    read`. If the pages are moved to the `buffer pool`, that action is referred to
    as a `read-ahead read`. In either case, SQL Server will need to go to disk to
    access the requested records. When you write a query and it needs to retrieve
    records that do not exist in the `buffer pool`, SQL Server will need to access
    those records on disk. This can be a very normal process for SQL Server. However,
    in cases where the query requires more records to be read than are needed for
    the query results, this can cause more activity on disk than is required. One
    way to monitor the amount of time spent retrieving data from disk is with `latch
    waits`. This is the amount of time SQL Server spends accessing data that does
    not exist in the `buffer pool`.


    In addition to SQL Server managing data access within the storage engine, the
    storage engine also manages activities relating to locking data. This type of
    activity can be affected by the `isolation level` configured on the server, application,
    or transaction. The `isolation level` determines how SQL Server will handle locks
    and row versions between transactions. In many cases, the `isolation level` configuration
    is managed by a different team than the team that is responsible for writing the
    `T-SQL` code. The storage engine is also responsible for handling locks in SQL
    Server.


    Additional factors that can contribute to performance issues related to storage
    have to do with other areas of query design that may interact with the hard drive,
    such as database actions that require a large amount of activity to get recorded
    to the transaction log. This can include inserting, updating, or deleting a large
    quantity of data. SQL Server is designed to record these changes to the transaction
    log promptly. However, these modifications need to be recorded to disk as well.
    Depending on fragmentation or other processes utilizing the hard disk, this may
    cause additional performance issues.


    `tempdb` is another part of SQL Server that can have a noticeable amount of overhead
    related to storage. There may be queries that are causing quite a bit of activity
    to happen within `tempdb` . This can occur if you are creating large temporary
    tables as this information can be stored in `tempdb` . It is also possible that
    SQL Server has not estimated the `execution plan` correctly. This is often due
    to out-of-date `statistics`, which are histograms of the data within a table.
    If these `statistics` are incorrect, SQL Server may not allocate enough resources
    to execute the query. If `tempdb` is put on the same drive as the data or log
    files, there may be issues with disk latency. To avoid this, it is often recommended
    to move `tempdb` to a separate drive from the data and log files. In those causes,
    any storage overhead on `tempdb` should only affect other queries also relying
    on `tempdb` .


    Writing `T-SQL` queries is fundamentally linked to how SQL Server interacts with
    data that has been stored. There are some aspects of this interaction that can
    be controlled, like making sure that you are accessing the least amount of data
    possible. There are other factors such as how SQL Server accesses data or manages
    locking that may be outside of your control. Either way, it is important to be
    aware of how all these pieces come together and may affect your query performance.'
