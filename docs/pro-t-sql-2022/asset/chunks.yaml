    CREATE TRIGGER CustomerOrder_InsertCustomerOrderIsActive

    ON dbo.CustomerOrder

    FOR INSERT

    AS

    INSERT INTO dbo.CustomerOrderIsActive

    (

    CustomerID,

    FirstName,

    LastName,

    [Address],

    City,

    PostalCode,

    Country,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    )

    SELECT

    CustomerID,

    FirstName,

    LastName,

    [Address],

    City,

    PostalCode,

    Country,

    IsActive,

    DateCreated,

    DateModified,

    DateModified,

    DateDisabled

    FROM inserted;

    ```


    **清单 13-12：当记录被插入到 `dbo.CustomerOrder` 时创建触发器**


    这将允许你继续对所有应用程序代码使用原始数据库对象。你可以保留这个额外的表和触发器，直到准备好开始在数据库代码中使用新表为止。


    除了添加新列，你可能还需要使用一些其他策略来重构表。这可以包括增加数据库的规范化程度。遇到包含远超预期列数的遗留表是很常见的，尤其是在规范化程度高的数据库中。通过创建一个可以修改表设计并创建抽象层的空间，你可以在不影响应用程序性能的情况下修改数据库对象。


    有时从最终目标开始会更容易。在这个例子中，你正试图将一个遗留表重新设计成两个或多个规范化表。想法是在实现这一目标的同时，让应用程序照常运行。在这个例子中，你有一个类似清单
    13-13 的表。


    ```

    CREATE TABLE dbo.OrderDetail(

    OrderDetailID       INT           IDENTITY(1,1)   NOT NULL,

    CustomerOrderID     INT                           NOT NULL,

    ProductName         VARCHAR(25)                   NOT NULL,

    ProductPrice        DECIMAL(6,2)                  NOT NULL,

    QuantitySold        SMALLINT                      NOT NULL,

    IsActive            BIT                           NOT NULL,

    DateCreated         DATETIME2(2)                  NOT NULL,

    DateModified        DATETIME2(2)                  NOT NULL,

    DateDisabled        DATETIME2(2)                      NULL,

    CONSTRAINT PK_OrderDetail PRIMARY KEY CLUSTERED (CustomerOrderID ASC, OrderDetailID
    ASC)

    );

    ```


    **清单 13-13：原始未规范化表**


    一旦确定了要规范化的表，就需要设计用于替换这个原始表的新表。清单 13-14 展示了可以创建的表的示例，以便可以过渡到更规范化的数据表。


    ```

    CREATE TABLE dbo.Product(

    ProductID       INT           IDENTITY(1,1)     NOT NULL,

    ProductName     VARCHAR(25)                     NOT NULL,

    ProductPrice    DECIMAL(6,2)                    NOT NULL,

    IsActive        BIT                             NOT NULL,

    DateCreated     DATETIME2(2)                    NOT NULL,

    DateModified    DATETIME2(2)                    NOT NULL,

    DateDisabled    DATETIME2(2)                        NULL,

    CONSTRAINT PK_Product PRIMARY KEY CLUSTERED (ProductID ASC)

    );

    CREATE TABLE dbo.OrderDetail_Normal(

    OrderDetailID      INT           IDENTITY(1,1)    NOT NULL,

    CustomerOrderID    INT                            NOT NULL,

    ProductID          INT                            NOT NULL,

    ProductPrice       DECIMAL(6,2)                   NOT NULL,

    QuantitySold       SMALLINT                       NOT NULL,

    IsActive           BIT                            NOT NULL,

    DateCreated        DATETIME2(2)                   NOT NULL,

    DateModified       DATETIME2(2)                   NOT NULL,

    DateDisabled       DATETIME2(2)                       NULL,

    CONSTRAINT PK_OrderDetail PRIMARY KEY CLUSTERED (CustomerOrderID ASC, OrderDetailID
    ASC)

    );

    ```


    **清单 13-14：规范化表**


    在前面的例子中，如果确定 `dbo.Product` 表不会有数据修改，你也可以使用视图与 `dbo.OrderDetail` 表进行交互。清单 13-15
    展示了一个使用这些新表的视图。


    ```

    CREATE VIEW dbo.OrderDetail

    AS

    SELECT dtl.OrderDetailID,

    dtl.CustomerOrderID,

    prd.ProductName,

    dtl.ProductPrice,

    dtl.QuantitySold,

    dtl.IsActive,

    dtl.DateCreated,

    dtl.DateModified,

    dtl.DateDisabled

    FROM dbo.OrderDetail_Normal dtl

    INNER JOIN dbo.Product prd

    ON dtl.ProductID = prd.ProductID;

    ```


    **清单 13-15：使用规范化表的视图**


    与清单 13-11 中的逻辑类似，你可以创建一个名为 `dbo.OrderDetail` 的视图，以便应用程序可以继续与新表交互。根据原始表和新表的目的，你可能无法将所有代码更新为使用这些新表。如果是这样，你可能不得不依赖触发器来更新这些表。'
- fmt: "# Reporting on Transactional Data\n\n## Overview\n\nOftentimes, we find that\
    \ one of the main requests for a database is to provide reporting. This section\
    \ covers how you can use parameters to improve the code reusability when you are\
    \ trying to get the same information based on different criteria. There is also\
    \ an example of how to use views to create a standardized data set that can be\
    \ reused across multiple applications. This view can be reused in other code.\
    \ A view that includes another view is called a `nested view`. However, it is\
    \ important to note that using views, especially nested views, should be used\
    \ with caution, as will be discussed later in the section.\n\n## Reporting on\
    \ OLTP Databases\n\nMost databases used by applications are designed to handle\
    \ a large volume of transactions. The overall design of these databases is referred\
    \ to as online transaction processing or `OLTP`. These databases are usually designed\
    \ to store and retrieve data quickly. This type of behavior involves many writes\
    \ to the database.\n\nHowever, your business may ultimately decide that it needs\
    \ summary or reporting information from this same database that is running one\
    \ of your applications. Ideally, you only have your `OLTP` applications, as opposed\
    \ to reporting applications, accessing databases on your transactional servers.\
    \ You want to have a good understanding of your business and the impact any reporting\
    \ queries could have on application performance. You may be able to run very simple\
    \ `SELECT` statements that are only accessing a small set of data without negatively\
    \ impacting your applications. You should do everything in your power to limit\
    \ the additional load put on SQL Server for data requests outside of your applications.\n\
    \nWhen large quantities of data are accessed for reporting purposes, this can\
    \ cause performance degradation of the primary applications or `OLTP` applications.\
    \ This includes additional `CPU` resources to generate execution plans that have\
    \ been flushed from the cache to make way for running queries for reporting workloads.\
    \ You may also have issues with application data that exists in memory getting\
    \ cleared from the buffer pool after large quantities of data have been moved\
    \ to memory for reporting. These issues can cascade into a scenario where your\
    \ application performance is affected by reporting workloads. If you find yourself\
    \ in the situation where you need to report directly from a transactional database,\
    \ communicate with your management team what kind of impact reporting may have\
    \ on your applications.\n\n## Challenges in Gathering Report Data\n\nWhen you\
    \ need to access data for reporting, you need to have a high number of reads from\
    \ this same database. Transactional data is not designed for handling the large\
    \ quantities of data one might need for reporting. It is generally tuned for queries\
    \ that read smaller amounts of data like reading one order or one customer for\
    \ an application screen. There are other challenges.\n\nIn some cases, gathering\
    \ this reporting data can be simple. There may be a small number of joins or the\
    \ underlying logic may not be very complex. You can end up writing a single report,\
    \ and due to the quality of the report, you may be asked to create additional\
    \ reports. These additional reports may involve many tables or the overall logic\
    \ for these queries may be more complex. This can often be because these tables\
    \ were not designed with reporting in mind. In some cases, you may find that you\
    \ are being asked to report on data that does not exist.\n\n## The Problem of\
    \ Hard-Coded Reports\n\nTo develop reports quickly, it is often easiest to write\
    \ specific logic for each individual report. Over time this can cause you to end\
    \ up with a significant number of reports that should return the same or similar\
    \ results. The best-case scenario is that the results are similar but that the\
    \ underlying code is different. This can get even more complex as the business\
    \ may change the functionality of some applications. It may be easy to identify\
    \ some reports that need to be updated while other reports are missed and start\
    \ returning inaccurate results.\n\nAt some point in time, you may receive a request\
    \ to generate a report from your transactional data. Often these requests can\
    \ start out as a simple one-time request for data. Say a user wants to access\
    \ order information for customers with the first name Stacy. While this may start\
    \ as a request to run a query and get some data, you may find that eventually\
    \ your users want this report available to be run any time or by a select group\
    \ of people. At that point in time, you may write a query like the one in Listing\
    \ 13-16.\n\n```sql\nSELECT cus.FirstName,\n       cus.LastName,\n       ord.CustomerOrderID,\n\
    \       ord.OrderNumber,\n       prd.ProductName,\n       dtl.QuantitySold,\n\
    \       dtl.ProductPrice\nFROM dbo.Customer cus\nINNER JOIN dbo.CustomerOrder\
    \ ord\n    ON cus.CustomerId = ord.CustomerID\nINNER JOIN dbo.OrderDetail dtl\n\
    \    ON ord.CustomerOrderID = dtl.CustomerOrderID\nINNER JOIN dbo.Product prd\n\
    \    ON dtl.ProductID = prd.ProductID\nWHERE cus.FirstName = 'Stacy';\n```\n*Listing\
    \ 13-16: Stacy Customer Orders*\n\nWhile the specifics of report development are\
    \ outside of the scope of this book, I have seldom worked in an environment where\
    \ some type of reporting data was not regularly requested off the transactional\
    \ databases. The preceding query does not show a stored procedure, but you can\
    \ just as easily use a stored procedure to select this data. The issue with the\
    \ query in Listing 13-16 is that it is hard-coded to only return results for the\
    \ customer with a first name of Stacy.\n\nOver time, businesses often need different\
    \ or additional information when it comes to analyzing data. This can come in\
    \ the format of needing a new report showing information about another customers.\
    \ Now your users want a report with information about Myra’s orders. This may\
    \ also be a request to replace the report for Stacy with a report for Myra. In\
    \ either scenario, you need to create a query like the one in Listing 13-17.\n\
    \n```sql\nSELECT cus.FirstName,\n       cus.LastName,\n       ord.CustomerOrderID,\n\
    \       ord.OrderNumber,\n       prd.ProductName,\n       dtl.QuantitySold,\n\
    \       dtl.ProductPrice\nFROM dbo.Customer cus\nINNER JOIN dbo.CustomerOrder\
    \ ord\n    ON cus.CustomerId = ord.CustomerID\nINNER JOIN dbo.OrderDetail dtl\n\
    \    ON ord.CustomerOrderID = dtl.CustomerOrderID\nINNER JOIN dbo.Product prd\n\
    \    ON dtl.ProductID = prd.ProductID\nWHERE cus.FirstName = 'Myra';\n```\n*Listing\
    \ 13-17: Myra Customer Orders*\n\nWhile you have met the requirements for creating\
    \ one report for Stacy and a new report for Myra, you have also added overhead\
    \ to maintaining your reports. The queries from Listings 13-16 and 13-17 are maintained\
    \ separately. If there are changes to how data is pulled from one report, you\
    \ need to remember that the other report may also need to be changed.\n\n## Using\
    \ Parameters for Reusability\n\nIf you find yourself in this situation, the next\
    \ step is to figure out how to start collapsing the data sets in your reports.\
    \ You first want to identify which reports return similar results. These can be\
    \ reports that deal with the same business application or the same functionality.\
    \ You want to create a query that returns all relevant information for that application\
    \ or functionality. This will be the base data source that you can use to update\
    \ your existing reports. The query in Listing 13-18 shows one way to write a query\
    \ that can be used for both reports.\n\n```sql\nDECLARE @FirstName VARCHAR(40);\n\
    SELECT cus.FirstName,\n       cus.LastName,\n       ord.CustomerOrderID,\n   \
    \    ord.OrderNumber,\n       prd.ProductName,\n       dtl.QuantitySold,\n   \
    \    dtl.ProductPrice\nFROM dbo.Customer cus\nINNER JOIN dbo.CustomerOrder ord\n\
    \    ON cus.CustomerId = ord.CustomerID\nINNER JOIN dbo.OrderDetail dtl\n    ON\
    \ ord.CustomerOrderID = dtl.CustomerOrderID\nINNER JOIN dbo.Product prd\n    ON\
    \ dtl.ProductID = prd.ProductID\nWHERE cus.FirstName = @FirstName;\n```\n*Listing\
    \ 13-18: Order Information from Several Joins*"
  raw: '## Reporting on Transactional Data


    Oftentimes, we find that one of the main requests for a database is to provide
    reporting. This section covers how you can use parameters to improve the code
    reusability when you are trying to get the same information based on different
    criteria. There is also an example of how to use views to create a standardized
    data set that can be reused across multiple applications. This view can be reused
    in other code. A view that includes another view is called a *nested view*. However,
    it is important to note that using views, especially nested views, should be used
    with caution, as will be discussed later in the section.


    Most databases used by applications are designed to handle a large volume of transactions.
    The overall design of these databases is referred to as online transaction processing
    or OLTP. These databases are usually designed to store and retrieve data quickly.
    This type of behavior involves many writes to the database. However, your business
    may ultimately decide that it needs summary or reporting information from this
    same database that is running one of your applications. Ideally, you only have
    your OLTP applications, as opposed to reporting applications, accessing databases
    on your transactional servers. You want to have a good understanding of your business
    and the impact the impact any reporting queries could have on application performance.
    You may be able to run very simple SELECT statements that are only accessing a
    small set of data without negatively impacting your applications. You should do
    everything in your power to limit the additional load put on SQL Server for data
    requests outside of your applications. When large quantities of data are accessed
    for reporting purposes, this can cause performance degradation of the primary
    applications or OLTP applications. This includes additional CPU resources to generate
    execution plans that have been flushed from the cache to make way for running
    queries for reporting workloads. You may also have issues with application data
    that exists in memory getting cleared from the buffer pool after large quantities
    of data have been moved to memory for reporting. These issues can cascade into
    a scenario where your application performance is affected by reporting workloads.
    If you find yourself in the situation where you need to report directly from a
    transactional database, communicate with your management team what kind of impact
    reporting may have on your applications.


    When you need to access data for reporting, you need to have a high number of
    reads from this same database. Transactional data is not designed for handling
    the large quantities of data one might need for reporting. It is generally tuned
    for queries that read smaller amounts of data like reading one order or one customer
    for an application screen. There are other challenges.


    In some cases, gathering this reporting data can be simple. There may be a small
    number of joins or the underlying logic may not be very complex. You can end up
    writing a single report, and due to the quality of the report, you may be asked
    to create additional reports. These additional reports may involve many tables
    or the overall logic for these queries may be more complex. This can often be
    because these tables were not designed with reporting in mind. In some cases,
    you may find that you are being asked to report on data that does not exist.


    To develop reports quickly, it is often easiest to write specific logic for each
    individual report. Over time this can cause you to end up with a significant number
    of reports that should return the same or similar results. The best-case scenario
    is that the results are similar but that the underlying code is different. This
    can get even more complex as the business may change the functionality of some
    applications. It may be easy to identify some reports that need to be updated
    while other reports are missed and start returning inaccurate results.


    At some point in time, you may receive a request to generate a report from your
    transactional data. Often these requests can start out as a simple one-time request
    for data. Say a user wants to access order information for customers with the
    first name Stacy. While this may start as a request to run a query and get some
    data, you may find that eventually your users want this report available to be
    run any time or by a select group of people. At that point in time, you may write
    a query like the one in Listing [13-16](#480547_2_En_13_Chapter.xhtml#PC16).


    ```

    SELECT cus.FirstName,

    cus.LastName,

    ord.CustomerOrderID,

    ord.OrderNumber,

    prd.ProductName,

    dtl.QuantitySold,

    dtl.ProductPrice

    FROM dbo.Customer cus

    INNER JOIN dbo.CustomerOrder ord

    ON cus.CustomerId = ord.CustomerID

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    INNER JOIN dbo.Product prd

    ON dtl.ProductID = prd.ProductID

    WHERE cus.FirstName = ''Stacy'';

    Listing 13-16

    Stacy Customer Orders

    ```


    While the specifics of report development are outside of the scope of this book,
    I have seldom worked in an environment where some type of reporting data was not
    regularly requested off the transactional databases. The preceding query does
    not show a stored procedure, but you can just as easily use a stored procedure
    to select this data. The issue with the query in Listing [13-16](#480547_2_En_13_Chapter.xhtml#PC16)
    is that it is hard-coded to only return results for the customer with a first
    name of Stacy.


    Over time, businesses often need different or additional information when it comes
    to analyzing data. This can come in the format of needing a new report showing
    information about another customers. Now your users want a report with information
    about Myra’s orders. This may also be a request to replace the report for Stacy
    with a report for Myra. In either scenario, you need to create a query like the
    one in Listing [13-17](#480547_2_En_13_Chapter.xhtml#PC17).


    ```

    SELECT cus.FirstName,

    cus.LastName,

    ord.CustomerOrderID,

    ord.OrderNumber,

    prd.ProductName,

    dtl.QuantitySold,

    dtl.ProductPrice

    FROM dbo.Customer cus

    INNER JOIN dbo.CustomerOrder ord

    ON cus.CustomerId = ord.CustomerID

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    INNER JOIN dbo.Product prd

    ON dtl.ProductID = prd.ProductID

    WHERE cus.FirstName = ''Myra'';

    Listing 13-17

    Myra Customer Orders

    ```


    While you have met the requirements for creating one report for Stacy and a new
    report for Myra, you have also added overhead to maintaining your reports. The
    queries from Listings [13-16](#480547_2_En_13_Chapter.xhtml#PC16) and [13-17](#480547_2_En_13_Chapter.xhtml#PC17)
    are maintained separately. If there are changes to how data is pulled from one
    report, you need to remember that the other report may also need to be changed.


    If you find yourself in this situation, the next step is to figure out how to
    start collapsing the data sets in your reports. You first want to identify which
    reports return similar results. These can be reports that deal with the same business
    application or the same functionality. You want to create a query that returns
    all relevant information for that application or functionality. This will be the
    base data source that you can use to update your existing reports. The query in
    Listing [13-18](#480547_2_En_13_Chapter.xhtml#PC18) shows one way to write a query
    that can be used for both reports.


    ```

    DECLARE @FirstName VARCHAR(40);

    SELECT cus.FirstName,

    cus.LastName,

    ord.CustomerOrderID,

    ord.OrderNumber,

    prd.ProductName,

    dtl.QuantitySold,

    dtl.ProductPrice

    FROM dbo.Customer cus

    INNER JOIN dbo.CustomerOrder ord

    ON cus.CustomerId = ord.CustomerID

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    INNER JOIN dbo.Product prd

    ON dtl.ProductID = prd.ProductID

    WHERE cus.FirstName = @FirstName;

    Listing 13-18

    Order Informaiton from Several Joins

    ```'
  trans: "\n# 处理事务型数据的报告\n\n## 概述\n\n我们经常发现，对数据库的主要需求之一就是提供报告功能。本节将介绍如何利用参数，在基于不同条件获取相同信息时，提高代码的可重用性。还将提供一个示例，说明如何使用视图来创建一个标准化的数据集，该数据集可以在多个应用程序中重复使用。这个视图也可以在其他代码中被复用。一个包含另一个视图的视图被称为\
    \ `嵌套视图`。但需要注意的是，使用视图，尤其是嵌套视图时，应谨慎行事，本节稍后将对此进行讨论。\n\n## 处理 OLTP 数据库的报告\n\n大多数应用程序使用的数据库都旨在处理大量事务。这些数据库的整体设计被称为联机事务处理或\
    \ `OLTP`。这些数据库通常设计用于快速存储和检索数据。这种行为涉及大量的数据库写入操作。\n\n然而，您的业务最终可能决定需要从这个运行着某个应用程序的同一数据库中获取汇总或报告信息。理想情况下，您应该只让\
    \ `OLTP` 应用程序（而不是报告应用程序）访问事务服务器上的数据库。您需要充分了解您的业务，以及任何报告查询可能对应用程序性能产生的影响。您或许可以运行非常简单的\
    \ `SELECT` 语句，这些语句只访问一小部分数据，而不会对您的应用程序产生负面影响。您应尽一切努力，限制为处理应用程序之外的数据请求而给 SQL Server\
    \ 带来的额外负载。\n\n当为了报告目的访问大量数据时，可能会导致主要应用程序或 `OLTP` 应用程序的性能下降。这包括生成执行计划所需的额外 `CPU`\
    \ 资源，这些计划可能已被清除出缓存，以便为运行报告工作负载的查询腾出空间。在大量数据被移入内存用于报告后，应用程序在内存中的数据也可能从缓冲池中被清除。这些问题会级联发生，最终导致您的应用程序性能受到报告工作负载的影响。如果您发现自己需要直接从事务型数据库进行报告，请与您的管理团队沟通报告可能对应用程序产生的影响。\n\
    \n## 收集报告数据的挑战\n\n当您需要为报告访问数据时，需要对同一数据库进行大量的读取操作。事务型数据并非为处理报告可能需要的庞大数据量而设计。它通常针对读取少量数据的查询进行了优化，例如为应用程序屏幕读取一个订单或一个客户。此外还有其他挑战。\n\
    \n在某些情况下，收集这些报告数据可能很简单。可能涉及少量的连接操作，或者底层逻辑并不复杂。您最终可能写好了一份报告，并且由于报告质量不错，可能会被要求创建更多报告。这些额外的报告可能涉及许多表，或者查询的整体逻辑可能更加复杂。这通常是因为这些表在设计之初并未考虑到报告需求。在某些情况下，您可能会发现您被要求对不存在的数据进行报告。\n\
    \n## 硬编码报表的问题\n\n为了快速开发报表，最简单的方法通常是为每个单独的报表编写特定的逻辑。久而久之，这可能导致您最终拥有大量本应返回相同或类似结果的报表。最好的情况是结果相似，但底层代码不同。随着业务可能会更改某些应用程序的功能，情况会变得更加复杂。可能很容易识别出一些需要更新的报表，而其他报表则被遗漏并开始返回不准确的结果。\n\
    \n在某个时间点，您可能会收到一个请求，要求根据您的事务型数据生成报告。通常，这些请求最初可能只是一个简单的一次性数据请求。假设一个用户想要访问名字为 Stacy\
    \ 的客户的订单信息。虽然这可能最初只是一个运行查询并获取一些数据的请求，但您可能会发现，最终您的用户希望这个报告可以随时运行，或者由特定的一群人运行。此时，您可能会编写一个类似代码清单\
    \ 13-16 中的查询。\n\n```sql\nSELECT cus.FirstName,\n       cus.LastName,\n       ord.CustomerOrderID,\n\
    \       ord.OrderNumber,\n       prd.ProductName,\n       dtl.QuantitySold,\n\
    \       dtl.ProductPrice\nFROM dbo.Customer cus\nINNER JOIN dbo.CustomerOrder\
    \ ord\n    ON cus.CustomerId = ord.CustomerID\nINNER JOIN dbo.OrderDetail dtl\n\
    \    ON ord.CustomerOrderID = dtl.CustomerOrderID\nINNER JOIN dbo.Product prd\n\
    \    ON dtl.ProductID = prd.ProductID\nWHERE cus.FirstName = 'Stacy';\n```\n*代码清单\
    \ 13-16: Stacy 客户的订单*\n\n虽然报表开发的具体细节超出了本书的范围，但我很少在工作中遇到不需要定期从事务型数据库中请求某种报告数据的情况。前面的查询没有显示存储过程，但您同样可以轻松地使用存储过程来选择这些数据。代码清单\
    \ 13-16 中查询的问题在于，它是硬编码的，只返回名字为 Stacy 的客户的结果。\n\n随着时间的推移，企业在分析数据时通常需要不同或额外的信息。这可能表现为需要一份新报表来显示另一个客户的信息。现在，您的用户想要一份关于\
    \ Myra 订单的报告。这也可能是一个用 Myra 的报告替换 Stacy 报告的请求。无论哪种情况，您都需要创建一个类似于代码清单 13-17 的查询。\n\
    \n```sql\nSELECT cus.FirstName,\n       cus.LastName,\n       ord.CustomerOrderID,\n\
    \       ord.OrderNumber,\n       prd.ProductName,\n       dtl.QuantitySold,\n\
    \       dtl.ProductPrice\nFROM dbo.Customer cus\nINNER JOIN dbo.CustomerOrder\
    \ ord\n    ON cus.CustomerId = ord.CustomerID\nINNER JOIN dbo.OrderDetail dtl\n\
    \    ON ord.CustomerOrderID = dtl.CustomerOrderID\nINNER JOIN dbo.Product prd\n\
    \    ON dtl.ProductID = prd.ProductID\nWHERE cus.FirstName = 'Myra';\n```\n*代码清单\
    \ 13-17: Myra 客户的订单*\n\n虽然您已经满足了为 Stacy 创建一份报表和为 Myra 创建一份新报表的要求，但您也增加了维护报表的开销。代码清单\
    \ 13-16 和 13-17 中的查询是分开维护的。如果其中一个报告的数据提取方式发生变化，您需要记住另一个报告可能也需要修改。\n\n## 使用参数提高可重用性\n\
    \n如果您发现自己处于这种情况，下一步就是想办法开始合并报告中的数据集。您首先需要识别哪些报告返回相似的结果。这些可以是处理相同业务应用程序或相同功能的报告。您需要创建一个查询，返回该应用程序或功能的所有相关信息。这将作为基础数据源，用于更新您现有的报告。代码清单\
    \ 13-18 中的查询展示了编写一个可用于两份报告的查询的一种方法。\n\n```sql\nDECLARE @FirstName VARCHAR(40);\n\
    SELECT cus.FirstName,\n       cus.LastName,\n       ord.CustomerOrderID,\n   \
    \    ord.OrderNumber,\n       prd.ProductName,\n       dtl.QuantitySold,\n   \
    \    dtl.ProductPrice\nFROM dbo.Customer cus\nINNER JOIN dbo.CustomerOrder ord\n\
    \    ON cus.CustomerId = ord.CustomerID\nINNER JOIN dbo.OrderDetail dtl\n    ON\
    \ ord.CustomerOrderID = dtl.CustomerOrderID\nINNER JOIN dbo.Product prd\n    ON\
    \ dtl.ProductID = prd.ProductID\nWHERE cus.FirstName = @FirstName;\n```\n*代码清单\
    \ 13-18: 通过多个连接获取订单信息*\n"
- fmt: "## 参数化查询与代码复用\n\n在本次查询中，您使用了一个名为 `@FirstName` 的参数。此参数允许您为 `@FirstName` 变量设置一个值。该值可以根据运行的报告而改变。在使用报表服务器时，可以为每个报告设置\
    \ `@FirstName` 的值。此类查询允许您为多种类型的报告使用同一套代码。这意味着您可以将同一个查询用于 Stacy 和 Myra，或是针对特定客户的报告请求。\n\
    \n在清单 [13-18] 中创建查询，可以使您的整体代码可复用。这可以解决从事务型数据生成报告的相关问题之一。从事务型数据进行报告时可能遇到的另一个问题是表之间逻辑的复杂性。在清单\
    \ [13-19] 中，关于客户和订单的信息已被扁平化，以更紧密地符合数据仓库的设计方式。\n\n```sql\nCREATE VIEW dbo.CustomerOrderInformation\n\
    AS\nSELECT\n    cus.FirstName,\n    cus.LastName,\n    cus.FirstName + ' ' + cus.LastName\
    \ AS FullName,\n    cus.[Address],\n    cus.City,\n    cus.Country,\n    cus.PostalCode,\n\
    \    cus.IsActive AS CustomerIsActive,\n    ord.CustomerOrderID,\n    ord.OrderNumber,\n\
    \    prd.ProductName,\n    dtl.QuantitySold,\n    dtl.ProductPrice,\n    prd.IsActive\
    \ AS ProductIsActive\nFROM dbo.Customer cus\nINNER JOIN dbo.CustomerOrder ord\n\
    \    ON cus.CustomerID = ord.CustomerID\nINNER JOIN dbo.OrderDetail dtl\n    ON\
    \ ord.CustomerOrderID = dtl.CustomerOrderID\nINNER JOIN dbo.Product prd\n    ON\
    \ dtl.ProductID = prd.ProductID;\n```\n*清单 13-19 客户订单信息*\n\n## 视图设计与简化逻辑\n\n与清单\
    \ [13-18] 中的查询类似，清单 [13-19] 中的查询旨在让您的 T-SQL 代码能适应各种场景复用。这种设计降低了查询或报告所需逻辑的复杂性。清单\
    \ [13-20] 中的查询与清单 [13-18] 中的查询功能相同。\n\n```sql\nCREATE PROCEDURE dbo.CustomerOrderByFirstName\n\
    \    @FirstName VARCHAR(40)\nAS\nSELECT\n    co.FirstName,\n    co.LastName,\n\
    \    co.CustomerOrderID,\n    co.OrderNumber,\n    co.ProductName,\n    co.QuantitySold,\n\
    \    co.ProductPrice\nFROM dbo.CustomerOrderInformation co\nWHERE co.FirstName\
    \ = @FirstName;\n```\n*清单 13-20 从视图中获取的配方成分*\n\n这两个查询的主要区别在于，清单 [13-20] 所需的总体逻辑要简单直接得多。这可以让技术能力较弱的用户也能够基于相同的数据集创建报告。虽然这有助于保持数据的一致性和易于访问，但这种方法可能并非性能最佳。在使用此方法访问数据进行报告时，请务必监控性能并确认报告是否能在超时前返回数据。\n\
    \n## 使用 Azure Synapse Link 进行近实时报告\n\nSQL Server 2022 还可以通过使用 Azure Synapse Link\
    \ for SQL Server，帮助您基于事务型数据库的近实时副本来创建报告。Azure Synapse Link 会以极小的当前生产系统开销将数据发送到\
    \ Azure Synapse Analytics。\n\n为了为 SQL Server 设置 Azure Synapse Link，您需要在 Azure\
    \ 门户的租户中创建一个 Azure Data Lake Storage Gen2 帐户，并确保您的数据库有一个主密钥。然后，您可以通过 Synapse Studio\
    \ (`https://ms.web.azuresynapse.net/en/`) 将 SQL Server 2022 实例与 Azure Synapse\
    \ Analytics 通过 Azure Synapse Link 连接起来。您需要在 Synapse Studio 中创建一个 SQL 池，然后为该池创建一个主密钥。完成后，您可以创建一个到\
    \ SQL Server 的链接服务。为了连接到您的 SQL Server 2022 实例，您需要一个自承载集成运行时。完成后，您应添加一个到 Azure\
    \ Data Lake Storage Gen2 帐户的链接服务。现在，Synapse Studio 已链接到 SQL Server 2022 和 Azure\
    \ Data Lake Storage Gen2 的服务，您可以在两个链接服务之间集成链接连接。设置此连接时，您可以选择要同步的表。成功发布这些更改后，您就可以启动\
    \ Azure Synapse Link。您需要等待几分钟，然后确认数据已复制到 Azure Synapse Analytics。\n\n## 数据集管理与嵌套视图的性能影响\n\
    \n此基础数据集随后可用于您所有的报告中。一旦您将报告更新为使用此基础数据集，请确认该数据集能够满足您未来的报告需求。如果您希望转向数据仓库，这能让您了解所需数据的结构。\n\
    \n正如本节开头所述，使用一个视图从另一个视图获取数据的概念称为嵌套视图。嵌套视图的想法非常诱人，因为视图可以使 T-SQL 更易于阅读和理解。然而，这种可读性通常是以性能为代价的。当访问视图时，SQL\
    \ Server 会在运行时执行 `SELECT` 语句。这本质上使视图成为执行您经常运行的查询的快捷方式。视图仍然需要确定是否存在执行计划并查找要返回的数据。即使视图的结果将用于另一个视图，情况也是如此。根据视图的设计，这甚至可能导致\
    \ SQL Server 多次访问同一个表。在嵌套到另一个视图中且两个视图都访问 `dbo.Customer` 表的视图情况下，SQL Server 将需要访问\
    \ `dbo.Customer` 表两次，一次用于嵌套视图，一次用于另一个视图。"
  raw: 'In this query, you are using a parameter named `@FirstName`. This parameter
    allows you to set a value for the `@FirstName` variable. This value can be changed
    depending on which report is being run. When it comes to using Report Server,
    the value for `@FirstName` can be set for each report. This type of query allows
    you to use a single set of code for multiple types of report. This allows you
    to use the same query for Stacy and Myra or a report request for a specific customer.


    Creating the query in Listing [13-18](#480547_2_En_13_Chapter.xhtml#PC18) allows
    your overall code to be reusable. This can solve one of the issues related to
    generating reports off transactional data. Another issue that can occur when reporting
    off transactional data is the intricacy of the logic between the tables. In Listing
    [13-19](#480547_2_En_13_Chapter.xhtml#PC19), the information about customers and
    orders has been flattened to more closely align with how a data warehouse is designed.


    ```

    CREATE VIEW dbo.CustomerOrderInformation

    AS

    SELECT

    cus.FirstName,

    cus.LastName,

    cus.FirstName + '' '' + cus.LastName AS FullName,

    cus.[Address],

    cus.City,

    cus.Country,

    cus.PostalCode,

    cus.IsActive AS CustomerIsActive,

    ord.CustomerOrderID,

    ord.OrderNumber,

    prd.ProductName,

    dtl.QuantitySold,

    dtl.ProductPrice,

    prd.IsActive AS ProductIsActive

    FROM dbo.Customer cus

    INNER JOIN dbo.CustomerOrder ord

    ON cus.CustomerID = ord.CustomerID

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    INNER JOIN dbo.Product prd

    ON dtl.ProductID = prd.ProductID;

    Listing 13-19

    Customer Order Information

    ```


    Like the query in Listing [13-18](#480547_2_En_13_Chapter.xhtml#PC18), the query
    in Listing [13-19](#480547_2_En_13_Chapter.xhtml#PC19) is designed to allow your
    T-SQL code to be reusable for a variety of scenarios. The design decreases the
    complexity of the logic required for your queries or reports. The query in Listing
    [13-20](#480547_2_En_13_Chapter.xhtml#PC20) has the same functionality as the
    query in Listing [13-18](#480547_2_En_13_Chapter.xhtml#PC18).


    ```

    CREATE PROCEDURE dbo.CustomerOrderByFirstName

    @FirstName VARCHAR(40)

    AS

    SELECT

    co.FirstName,

    co.LastName,

    co.CustomerOrderID,

    co.OrderNumber,

    co.ProductName,

    co.QuantitySold,

    co.ProductPrice

    FROM dbo.CustomerOrderInformation co

    WHERE co.FirstName = @FirstName;

    Listing 13-20

    Recipe Ingredients from a View

    ```


    The main difference between these two queries is that the overall logic required
    for Listing [13-20](#480547_2_En_13_Chapter.xhtml#PC20) is much simpler and more
    straightforward. This can allow less technical users the ability to create reports
    off this same data set. While this can help keep data consistent and easy to access,
    this method may not have the best performance. When using this method to access
    your data for reporting, be sure to monitor performance and confirm that the reports
    are returning data without timing out. SQL Server 2022 can also help you create
    reports off of a near real-time copy of your transactional databases by using
    Azure Synapse Link for SQL Server. Azure Synapse Link will send data to Azure
    Synapse Analytics with minimal overhead on your current production systems. In
    order to setup Azure Synapse Link for SQL Server, you will need to create an Azure
    Data Lake Storage Gen2 account in your tenant on the Azure portal as well as ensuring
    your database has a master key. Then you can connect your SQL Server 2022 instance
    to Azure Synapse Analytics with Azure Synapse Link through Synpase Studio at [`https://ms.web.azuresynapse.net/en/`](https://ms.web.azuresynapse.net/en/).
    You will need to create a SQL pool in Synapse Studio and then create a master
    key for that pool. Once that is complete, you can create a linked service to SQL
    Server. In order to connect to your SQL Server 2022 instance, you will need a
    self-hosted integration runtime. Once this is complete, you should add a linked
    service to the Azure Data Lake Storage Gen2 account. Now that Synapse Studio has
    linked services to SQL Server 2022 and Azure Data Lake Storage Gen2, you can integrate
    a linked connection between both linked services. You are able to select which
    tables you wanted synced when you setup this connection. After you successfully
    publish these changes, you can then start Azure Synapse Link. You will need to
    wait a few minutes before confirming your data has been copied to Azure Synapse
    Analytics.


    This base data set can then be used throughout all your reports. Once you have
    updated the reports to use this base data set, confirm that this data set will
    be able to handle your reporting needs going forward. This gives you an idea of
    the structure of the data that you will need if you would like to move toward
    a data warehouse.


    As stated in the beginning of this section, the concept of using one view to get
    data from another view is referred to as nesting views. The idea of nesting views
    is very enticing because views can make T-SQL easier to read and understand. However,
    that readability often comes at the cost of performance. When a view is accessed,
    SQL Server executes the SELECT statement at run time. This essentially makes a
    view a shortcut for executing a query that you run frequently. The view still
    needs to determine if there is an execution plan and find the data to return.
    This is true even if the results of the view are going to be used in another view.
    Depending on the design of the views, this can even cause SQL Server to access
    the same table multiple times. In the case of a view that is nested into another
    view where both views access the `dbo.Customer` table, SQL Server would need to
    go to the `dbo.Customer` table two times, once for the nested view and once for
    the other view.'
