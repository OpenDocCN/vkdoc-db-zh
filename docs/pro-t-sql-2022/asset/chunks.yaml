- fmt: 'Implementing source control is a big step in getting your database projects
    to be more manageable. Champion a source control initiative at your company. Reach
    out to other departments and put procedures in place that make sure everyone feels
    comfortable implementing source control. You also walked through the beginning
    steps of getting your database added to source control. This is the beginning
    of a journey that will have some hiccups but can save you time in the long run.
    Now that you have implemented source control, you are ready for the next steps
    in managing your T-SQL code. The next chapter will focus on the various methods
    you can use to test your T-SQL code and confirm that you are complying with various
    coding standards.


    # 11. Testing


    When you need to write or modify some T-SQL code, you may be tempted to just start
    writing the code. In many cases, the necessary database code is simple enough
    that no additional analysis is needed. Eventually, the data being queried or the
    T-SQL code is complex enough that you want to make certain your code is working
    as expected. During these times, you may want to test your T-SQL changes. While
    you can start testing T-SQL code at any time, you may find it helpful to start
    certain habits early on before dealing with complex scenarios.


    You may be ready to start testing your code, but you do not know where to start.
    The type of testing you will do will depend on what you are trying to accomplish.
    You can implement testing to confirm that a single piece of functionality is working
    as expected. It is also possible to test interactions between two or more pieces
    of code. This type of testing can also be useful when trying to confirm the downstream
    effects of implementing changes to your T-SQL code. You can also test to ensure
    that the code you write matches your coding standards. While any type of testing
    is valuable, the most significant benefits come when using all three in conjunction.


    ## Unit Testing


    You have your next task, and you are ready to start writing some T-SQL. You also
    want to implement functionally testing your code. When you test a single piece
    of code, this is called `unit testing`. Understanding what unit tests are and
    why you should use them can help improve your T-SQL code quality. Unit tests are
    beneficial because they allow you to quickly and easily verify the accuracy of
    your T-SQL code. Let’s get started writing your first unit tests for SQL Server.
    This section will go over the process of creating your first unit test. This will
    include designing a test case, writing a unit test, confirming that the unit test
    is working, and updating your code to produce the correct results for your unit
    test.


    The concept of unit testing is basic. You have a single change that you want to
    make to your T-SQL code. Unit testing allows you to test and confirm the functionality
    for a single piece of code. One of the common methods of using unit tests is to
    create a test case that fails, such as expecting the count of customers that are
    inactive to be zero when executing `dbo.GetCustomer`. This will fail because the
    current code for the stored procedure selects all customers. Then you write the
    T-SQL code, run the unit test, and repeat until the unit test passes. This is
    `test-driven design`. Whether you are implementing new functionality or resolving
    a bug in T-SQL, unit tests can help verify your code.


    When creating unit tests, you need to think differently than you normally do when
    you set out to write T-SQL code. You are creating unit tests to confirm that the
    code you are writing works as expected. In order to verify that your T-SQL code
    is working as expected, you want your unit test to indicate a pass. When creating
    your unit test, your first execution of the unit test should fail. Starting with
    a failing unit test indicates that the desired functionality does not exist.


    There are many different implementations of running unit tests. Unit tests can
    be written inside of `Visual Studio`. You can also use a free third-party unit
    testing framework that creates database objects in T-SQL. Another option is to
    use a paid third-party tool to create and run your unit tests. There are benefits
    and drawbacks to each of these options.


    Another factor in determining how you will implement unit testing is in how you
    want to run your unit tests. If you have not had a chance to develop an automated
    way to manage code and deployments, you may decide that you prefer to manually
    run your unit tests. However, if you have an automated build and deployment pipeline,
    you may find it easier to automate your unit tests. The easiest method that has
    the least amount of overhead is manually running your unit tests. This can be
    running these tests with a stored procedure or through a GUI.


    You can use unit tests to verify just about anything with your database schema.
    Most of those unit tests are for testing functionality for your database objects
    like stored procedures, views, and functions. I may be biased, but I hope you
    have far more stored procedures than views or queries. Do not be concerned if
    you do not have any unit tests in place now. You can create unit tests as you
    need them. This may mean that you do not have complete code coverage for your
    unit tests, but it prevents you from spending time implementing unit tests for
    code that is not modified frequently.'
