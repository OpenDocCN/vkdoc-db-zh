  trans: '### 登录触发器


    当用户登录到服务器时，你可能希望记录该特定活动。在其他情况下，你可能希望在用户登录时限制其活动，或因为服务器登录而实现额外的安全功能。登录触发器使你能够让
    SQL Server 针对服务器上的部分或所有登录操作做出反应。


    在应用程序开发中，需要使用登录触发器的场景并不多。然而，有一些事情可以通过登录触发器来完成，它们有助于保护或监控与应用程序的连接。例如，使用登录触发器来存储登录活动信息，包括**谁**在**何时**连接到了数据库。登录触发器可以限制某个登录所允许的连接数，或完全阻止用户连接到服务器。在发生安全漏洞的情况下，这可以确保数据库不会被过多的连接淹没。反过来，限制每个登录所允许的连接数量也可能限制系统的可扩展性和面向未来的能力。今天可接受的连接数可能远低于未来所需的登录数。


    ### 数据定义语言触发器


    当应用程序或用户更改整个数据库架构时，他们会使用数据定义语言。对于 SQL Server，可以对因数据库更改而导致的特定情况做出反应。虽然我不认为这是应用程序开发的标准部分，但了解这类触发器可能会有所帮助。DDL
    触发器可以配置为响应各种 `CREATE`、`ALTER`、`DROP`、`GRANT`、`DENY`、`REVOKE` 和 `UPDATE STATISTICS`
    语句。


    如果你担心 SQL 注入对你的服务器造成问题，DDL 触发器可以帮助减轻损害。通过设置选项可以防止或控制对数据库对象的所有类型的更改，包括创建、修改或删除各种对象。你还可以使用
    DDL 触发器来执行诸如在用户尝试修改数据库对象时生成错误等操作。此外，还可以记录或记录数据库对象被创建或修改的时间。虽然你可能希望通过设置各种触发器来监控服务器和数据库上的每个活动，但可能存在更好的可用选项。有其他替代方案可用于跟踪此类行为，包括用于服务器和数据库活动的
    SQL Server 审计。通常，应用程序并不关心对服务器或数据库架构更改的记录。


    ### 数据 manipulation 语言触发器


    如果你发现自己需要在应用程序开发中实现审计或日志记录，你可能会发现使用数据操作语言触发器非常有帮助。这些触发器可以在 `INSERT`、`UPDATE` 或
    `DELETE` 语句完成后执行，或者完全替代 SQL 语句执行。在某些情况下，你可能只想记录更改发生的时间和更改了什么。在其他情况下，更改或验证请求的功能可能更为重要。


    触发器的一种方法是在某事发生后执行一个动作。假设你想成功修改 `dbo.Product` 表中的一条记录，但你也想保留该物品成本随时间变化的历史记录。清单
    2-37 展示了一些 T-SQL 代码，它将在更改发生后向历史表中添加一条记录。


    ```sql

    CREATE TRIGGER dbo.LogProductPriceHistory

    ON dbo.Product

    AFTER INSERT, DELETE

    AS

    IF (ROWCOUNT_BIG() = 0)

    RETURN;

    INSERT INTO dbo.ProductPriceHistory

    (

    ProductID,

    ProductPrice,

    UserName,

    DateCreated

    )

    SELECT

    ProductID,

    ProductPrice,

    SYSTEM_USER,

    SYSDATETIME()

    FROM inserted;

    ```

    清单 2-37

    创建后插入或删除的 DML 触发器


    当 `dbo.Product` 表中的记录被插入或删除时，新的产品价格和价格更改的日期将被记录在 `dbo.ProductPriceHistory` 表中。为了确定此触发器的性能，请通过运行清单
    2-38 中的代码来测试此触发器。


    ```sql

    INSERT INTO dbo.Product (ProductName, ProductPrice)

    VALUES (''Disk Golf Disk - Small'', 7.99);

    ```

    清单 2-38

    向 Product 表插入记录的查询


    执行上述代码时，执行计划包括两个步骤。第一步是运行代码将记录插入 `dbo.Product` 表。第二个执行计划显示了因触发器而发生的插入操作的计划。清单
    2-38 生成的执行计划如图 2-22 所示。


    ![](img/480547_2_En_2_Fig22_HTML.jpg)


    流程图。在查询 1 中，T-SQL 的成本为 0%，包含聚集索引插入、两次计算标量和常量扫描。查询 2 包含插入的扫描，而不是常量扫描。查询 1 百分比 =
    43，查询 2 百分比 = 57。


    图 2-22

    使用触发器插入记录的执行计划


    图 2-22 中的执行计划显示了当记录以触发触发器的方式被修改时发生的情况。然而，清单 2-35 中的 T-SQL 代码 `IF (ROWCOUNT_BIG()
    = 0) RETURN;` 会阻止 DML 触发器在没有记录被更新时触发。这被认为是一种最佳实践，可以在无需任何操作时最小化服务器上的资源利用。清单 2-39
    展示了一个不会更新任何记录的更新查询。


    ```sql

    DELETE FROM dbo.Product

    WHERE ProductID = 500;

    ```

    清单 2-39

    不会更新任何记录的 DELETE 语句


    如图 2-23 所示，执行计划只有一个步骤。那就是删除数据的执行计划。没有来自触发器的 T-SQL 代码执行。


    ![](img/480547_2_En_2_Fig23_HTML.jpg)


    流程图。删除 product where product ID = at 1。它们源自聚集索引删除和聚集索引扫描。查询 1 百分比 = 100。


    图 2-23

    没有记录被更新时的执行计划


    SQL Server 知道触发器没有返回需要更新的记录。它没有尝试向 `dbo.ProductPriceHistory` 表插入任何记录，唯一的操作是生成删除操作的执行计划。'
- fmt: 'Having a trigger execute after an activity is not the only option for data
    manipulation triggers. There is also the possibility of having a trigger perform
    an action instead of the original action that was requested. Listing [2-40](#480547_2_En_2_Chapter.xhtml#PC40)
    shows a trigger that will disable a record when a user issues a delete.


    ```sql

    CREATE TRIGGER dbo.DisableProduct

    ON dbo.Product

    INSTEAD OF DELETE

    AS

    UPDATE prd

    SET IsActive = 0,

    DateDisabled = GETDATE()

    FROM dbo.Product prd

    INNER JOIN deleted del

    ON prd.ProductID = del.ProductID;

    Listing 2-40

    Instead of a Trigger

    ```


    There is more than one option available when using `DML` triggers in `SQL Server`.
    There is also the possibility of having multiple triggers per database object.
    You can have up to one `INSTEAD OF` trigger per `INSERT`, `UPDATE`, and `DELETE`.
    You can have multiple `AFTER` triggers on the same table or view as well. Due
    to the number of triggers allowed, you can also specify which trigger should be
    run first and last per `INSERT`, `UPDATE`, or `DELETE`. If you have more than
    one type of `AFTER` trigger per action type, any of the triggers will be run in
    a random order.


    Since there can be so many layers of triggers on a given database object, testing
    the functionality of these triggers is important. Like many other concepts discussed
    in this chapter, understanding how triggers will perform under load helps prepare
    for how the application will perform. It is worth mentioning that triggers should
    be used sparingly. They should be short like my examples. You should not start
    writing 2,000 line triggers with 3 cursors in them.


    ## Cursors


    In order to use relational databases effectively, it is often critical to think
    of processes and data in large chunks or sets. The goal in almost all scenarios
    is to write `T-SQL` that takes advantage of this set-based logic. While this is
    the ideal method, you may find yourself in a situation where you feel handling
    data in large sections is not possible. In some of these scenarios, it may mean
    that it is time to handle the data by each row individually. In order to do this
    in `SQL Server`, you use a cursor. The cursor is an object that takes a query
    and allows you to loop through each row of the resulting data set.


    If you consider this route, it is imperative to acknowledge that `SQL Server`
    is designed to perform best when dealing with one large section of data vs. dealing
    with lots of individual records one at a time. In cases where it is tempting to
    use something that handles row-by-row logic, it may be time to find another tool
    to handle your needs better. Such is the case when creating a cursor to connect
    to several instances of `SQL Server` one at a time and perform a task. While it
    is outside the scope of this book, this specific situation may be best resolved
    by creating an `SQL Server` Integration Services (`SSIS`) package to handle connecting
    to the various `SQL Server` instances.


    There are other times when you may need to use `T-SQL` to generate a result set
    where the data returned is the same, but the data must be segmented by location
    or vendor information. In this example, `SQL Server` Reporting Services (`SSRS`)
    could be used to achieve the same goal. However, your business may decide not
    to use `SSRS`. Therefore, using a cursor may be the right choice. I have also
    had situations when data needed to be updated with a calculation using a specific,
    calculated value per record. In this case, it was almost impossible to perform
    the updates using set-based logic.


    While `SQL Server` can handle this task, it’s preferable for the application to
    handle these changes. A major factor of writing `T-SQL` is being aware of the
    effects your code can have on `SQL Server`. This is just as true for cursors as
    it is for triggers. Triggers may seem like a quick fix to a variety of issues,
    but triggers also come with a cost on the server. Imagine `SQL Server` having
    to evaluate each insert into a table to determine if it meets the criteria for
    the trigger and, if the insert meets the criteria, then `SQL Server` has to perform
    another action. That’s quite a bit of extra work for `SQL Server` to manage.


    Cursors can help make a repeatable process that touches one record at a time.
    While cursors can be used to address a variety of issues, it is important to remember
    that there may be a different way to achieve the same outcome without using cursors.
    If you have decided that you must really use a cursor, the next step is to determine
    which type of cursor to use. While the concept of a cursor is the same regardless
    of which type is used, the type of cursor will determine the functionality and
    accessibility of the data within the cursor.


    When choosing the right type of cursor for your needs, choose the one with the
    least amount of functionality that will meet your needs. This will help reduce
    negative performance as compared to cursor types with more functionality. Whenever
    you handle records in `SQL Server` one at a time, they will almost always perform
    worse than handling data in groups.


    A cursor selects a set of data, fetches one record at a time, and then modifies
    the current record. Once the required actions have been taken, the next record
    can be fetched. This is where knowing the various types of cursors available will
    allow you to choose the correct type.'
