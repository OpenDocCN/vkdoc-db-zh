    表 5-5


    第三个客户作为单条记录


    | 名字 | 姓氏 |

    | --- | --- |

    | Stacy | Parks |


    表 5-4


    第二个客户作为单条记录


    | 名字 | 姓氏 |

    | --- | --- |

    | Josè | Gomez |


    表 5-3


    第一个客户作为单条记录


    | 名字 | 姓氏 |

    | --- | --- |

    | Myra | Acharya |


    如果你以这种方式从表 5-3、表 5-4 和表 5-5 中选择数据，效率远低于将数据作为集合选择。可以将表 5-3 到表 5-5 视为代表三个不同的 `SELECT`
    操作或三次不同的数据库往返。表 5-6 显示了将数据作为集合选择的样子，通过单次往返在单个操作中检索所有三行。


    表 5-6


    客户作为一个数据集


    | 名字 | 姓氏 |

    | --- | --- |

    | Myra | Acharya |

    | Josè | Gomez |

    | Stacy | Parks |


    像这样查看数据还可以让你看到数据之间的相似之处。


    当你编写 T-SQL 代码时，你希望用更少的、针对 SQL Server 运行的单独查询来返回所需的数据。目标是考虑同时对所有行执行相同的操作。在前面的例子中，你可以快速确定哪些记录具有相同的城市名称。数据提示，如果你想查看或更改有关同一城市客户的信息，可能有不止一种方法可以实现此目标。这种类型的场景可能表明你的逻辑应该以某种方式构建，使其能够通过使用关系或变量而不是硬编码或静态值来正确运行。

    '
- fmt: '### Understanding Data Retrieval


    Procedural code is described as not only telling a system what to do but how to
    do it. In many companies, the software developers or software engineers are the
    ones responsible for writing the `T-SQL` code. One of the things I have learned
    from interacting with developers is that writing application code is procedural
    in nature. Many application developers spend most of their day working with code
    in a procedural context. This means that the mental cost of context switching
    between procedural application code and database `T-SQL` code can be significant.
    The process of writing set-based code can use a very different thought process
    than dealing with the code iteratively.


    #### The Value of Set-Based Design


    Why are we even interested in using set-based design? Why is it worth the trouble?
    This has to do with how the `SQL Server` engine works and how data is retrieved
    for queries. When a query is issued, `SQL Server` needs to retrieve one or more
    data records. When `SQL Server` retrieves data for a query result, the data page
    must be in memory. This memory set aside to hold the data pages is referred to
    as the `buffer cache`, also known as the `buffer pool`. `SQL Server` goes to the
    `buffer cache` to see if this data is available. Figure 5-1 shows the process
    `SQL Server` goes through to retrieve data as part of a query request if the data
    is cached in the `buffer pool`.


    ![A block flow diagram displays the blocks titled query, command parser, optimizer,
    query executor, and buffer pool. All the blocks are separated by a forward and
    a backward arrow.](images/480547_2_En_5_Chapter/480547_2_En_5_Fig1_HTML.jpg)


    **Figure 5-1** Data retrieval from a single query


    Whether the data is retrieved row by row or as a set is dependent on the procedural
    logic or program code. If the `T-SQL` is written using `cursor-based logic`, it
    will use row-by-row processing, which will cause `SQL Server` to go to the `buffer
    cache` for each record. The process of retrieving a single row at a time can increase
    the workload on `SQL Server`. Since each query is its own set, and that can be
    a set of one, the goal is to design queries that will process the highest number
    of available records with the least amount of unique queries. Designing queries
    to work with larger data sets will prevent `SQL Server` from having to iterate
    through the same query multiple times. In Figure 5-2, you can see the additional
    workload required to retrieve one row at a time.


    ![A block flow diagram displays three rows of the blocks titled query, command
    parser, optimizer, query executor, and buffer pool. All the blocks are separated
    by a forward and a backward arrow.](images/480547_2_En_5_Chapter/480547_2_En_5_Fig2_HTML.jpg)


    **Figure 5-2** Data retrieval when the query retrieves one row at a time


    #### The Role of the Buffer Pool


    Figure 5-2 shows the query process to retrieve a single record at a time with
    the data stored in the `buffer pool`. However, if the query is written for `set-based
    design`, there will be one call to the `buffer pool`. On a small set of data,
    this may not be a very large impact. When dealing with data sets of thousands
    or millions of records, the difference in execution time can be drastic.


    There is also something else to consider with how the data is stored in the `buffer
    cache`. When `SQL Server` executes a query and pulls back data, it only pulls
    back data that exists in the `buffer cache`. Starting in `SQL Server 2019`, there
    is a feature called the `hybrid buffer pool`. The `hybrid buffer pool` allows
    both data stored on RAM and in persistent memory (PMEM) to be treated as being
    part of the `buffer cache`. Otherwise, if the data is not available in RAM or
    PMEM, `SQL Server` will need to go to disk to retrieve the data. The data retrieved
    will then be stored in memory. Figure 5-3 shows how this data is retrieved from
    disk and stored in the `buffer cache`.


    ![A block flow diagram displays the blocks titled query, command parser, optimizer,
    query executor, buffer pool, and data file. All the blocks are separated by a
    forward and a backward arrow.](images/480547_2_En_5_Chapter/480547_2_En_5_Fig3_HTML.jpg)


    **Figure 5-3** Data retrieval from disk to the buffer cache


    When the query is executed, that data may not even be in the `buffer cache` at
    that point in time. `SQL Server` must go to the disk subsystem to find that data.
    Once that data is found, that data is stored in the `buffer cache`.


    #### Performance Implications


    If each row is pulled individually, that call to the disk I/O will have to happen
    individually for each record. Pulling data from the `buffer cache` is not instantaneous.
    Getting data from the disk I/O and putting it in the `buffer cache` to then be
    retrieved by the query is even more resource intensive. Ultimately this creates
    a scenario where you want to focus on `set-based design` to have the best possible
    speed and performance for the queries that you are executing.'
