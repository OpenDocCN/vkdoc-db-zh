    single statement, you should use caution when using MERGE statements because they
    can be prone to performance issues and data inconsistencies as discussed. Due
    to the ease of writing MERGE statements, it is possible to compare data between
    two tables in a way that is not efficient for SQL Server. While the tables are
    only being compared once, if the comparison is not efficient, this can have a
    significant impact on the performance tables being compared. There have also been
    instances where unique key violations can occur when using filtered indexes. MERGE
    statements can also create foreign key constraint violations in specific circumstances.
    This includes using two tables with foreign key constraints where the foreign
    key is set to NOCHECK and then rolled back. I suggest researching known issues
    with MERGE statements and performing adequate testing to confirm the T-SQL code
    will work as expected. The code in Listing [13-2](#480547_2_En_13_Chapter.xhtml#PC2)
    shows that it is not overly complex to write code that can handle either an insert
    or an update. Prior to SQL Server 2019, either the code in Listing [13-1](#480547_2_En_13_Chapter.xhtml#PC1)
    or Listing [13-2](#480547_2_En_13_Chapter.xhtml#PC2) may have been subject to
    parameter sniffing. Now that SQL Server 2019 has adaptive joins, this should be
    less of an issue.'
  trans: '

    ## 插入与更新数据


    T-SQL 代码需要处理的一个常见情况是如何插入或更新数据。本节首先讨论使用 `MERGE` 语句最简单但也最麻烦的解决方案。然后将讨论另一种使用 `IF`
    语句的方法；它允许 SQL 判断记录是否存在。如果存在，则更新该记录；否则，将插入该记录。


    在许多场景下，你希望能够传入一组值。如果记录不存在，你可能希望插入信息；但如果记录已存在，你可能希望更新该记录。通常，当我们有压力时，我们希望使用最快、最简单的方式行事。其他时候，我们可能更关注
    T-SQL 代码的可读性，而非数据库引擎的最佳性能。虽然确保你的数据库代码能被他人理解很重要，但在编写 T-SQL 时，考虑数据库代码的性能同样重要。


    使用 T-SQL 插入或更新数据库记录时，情况也是如此。对于应用程序来说，无论用户是插入新记录还是更新现有记录，都执行相同的存储过程可能更简单、更直接。这类操作也可以被称为
    `upsert`（更新插入）。你是如何陷入这种境地的并不重要；重要的是设计出可靠且高效工作的 T-SQL 代码。


    ### MERGE 语句的问题


    有一些 T-SQL 数据库代码看似能够简化在单个查询中执行插入或更新的过程。此功能称为 `MERGE` 语句。使用 `MERGE` 语句的好处是逻辑直接明了。然而，`MERGE`
    语句存在许多已知问题。`MERGE` 语句最显著的问题涉及从使用索引视图的表中删除数据。当从表中删除数据时，关联的索引视图会间歇性地更新。也有报告称，将 `MERGE`
    语句与时态表一起使用时，效果并不总是如预期。其他问题包括：当 `MERGE` 语句修改属于全文索引一部分的字符串列时，分区表不会更新全文索引；当使用非筛选唯一索引通过
    `MERGE` 语句向表中 `DELETE` 或 `INSERT` 数据时，可能会发生唯一键冲突错误。


    除非你愿意接受这些潜在问题，否则我建议不要使用 `MERGE` 语句。清单 13-1 展示了一个 `MERGE` 语句的示例。


    ```sql

    CREATE PROCEDURE dbo.CustomerOrderMerge

    @CustomerOrderID INT,

    @CustomerID INT,

    @OrderNumber VARCHAR(15),

    @OrderDate DATETIME2(2),

    @ShipDate DATETIME2(2),

    @IsActive BIT,

    @DateCreated DATETIME2(2),

    @DateModified DATETIME2(2),

    @DateDisabled DATETIME2(2)

    AS

    MERGE dbo.CustomerOrder AS [Target]

    USING

    (

    VALUES

    (

    @CustomerOrderID,

    @CustomerID,

    @OrderNumber,

    @OrderDate,

    @ShipDate,

    @IsActive,

    @DateCreated,

    @DateModified,

    @DateDisabled

    )

    ) AS [Source]

    (

    CustomerOrderID,

    CustomerID,

    OrderNumber,

    OrderDate,

    ShipDate,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    )

    ON ([Target].CustomerOrderID = [Source].CustomerOrderID)

    WHEN MATCHED THEN

    UPDATE SET

    [Target].CustomerID = [Source].CustomerID,

    [Target].OrderNumber = [Source].OrderNumber,

    [Target].OrderDate = [Source].OrderDate,

    [Target].ShipDate = [Source].ShipDate,

    [Target].IsActive = [Source].IsActive,

    [Target].DateCreated = [Source].DateCreated,

    [Target].DateModified = [Source].DateModified,

    [Target].DateDisabled = [Source].DateDisabled

    WHEN NOT MATCHED BY TARGET THEN

    INSERT (

    CustomerOrderID,

    CustomerID,

    OrderNumber,

    OrderDate,

    ShipDate,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    )

    VALUES (

    [Source].CustomerOrderID,

    [Source].CustomerID,

    [Source].OrderNumber,

    [Source].OrderDate,

    [Source].ShipDate,

    [Source].IsActive,

    [Source].DateCreated,

    [Source].DateModified,

    [Source].DateDisabled

    );

    ```

    *清单 13-1 包含 Merge 语句的存储过程*


    此 `MERGE` 语句会更新客户订单（如果该订单已存在于 `dbo.CustomerOrder` 表中）。这个 `MERGE` 语句的逻辑易于遵循，其格式也易于编写。但在你的环境中实施
    `MERGE` 语句之前，你需要意识到这些问题。


    我曾经在充分理解 `MERGE` 语句所带来的问题之前就实施了它们。当我试图替换这些 `MERGE` 语句时，有人担心逻辑会变得过于困难。要替换清单 13-1
    中的逻辑，你可以编写一个如清单 13-2 所示的查询。


    ### 使用 IF…ELSE 进行更新插入


    要替换 `MERGE` 语句的逻辑，你可以使用 `IF… ELSE` 语句来控制 SQL Server 查询中的操作流程。在清单 13-2 中，如果订单存在于
    `dbo.CustomerOrder` 表中，记录将更新除 `DateCreated` 外的所有字段。否则，将在 `dbo.CustomerOrder` 中插入一条新记录。


    ```sql

    CREATE PROCEDURE dbo.CustomerOrderUpsert

    @CustomerOrderID INT,

    @CustomerID INT,

    @OrderNumber VARCHAR(15),

    @OrderDate DATETIME2(2),

    @ShipDate DATETIME2(2),

    @IsActive BIT,

    @DateCreated DATETIME2(2),

    @DateModified DATETIME2(2),

    @DateDisabled DATETIME2(2)

    AS

    IF EXISTS (SELECT CustomerOrderID FROM dbo.CustomerOrder WHERE CustomerOrderID
    = @CustomerOrderID)

    BEGIN

    UPDATE dbo.CustomerOrder

    SET   CustomerID = @CustomerID,

    OrderNumber = @OrderNumber,

    OrderDate = @OrderDate,

    ShipDate = @ShipDate,

    IsActive = @IsActive,

    DateModified = @DateModified,

    DateDisabled = @DateDisabled

    WHERE CustomerOrderID = @CustomerOrderID;

    END;

    ELSE

    BEGIN

    INSERT dbo.CustomerOrder

    (

    CustomerOrderID,

    CustomerID,

    OrderNumber,

    OrderDate,

    ShipDate,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    )

    VALUES

    (

    @CustomerOrderID,

    @CustomerID,

    @OrderNumber,

    @OrderDate,

    @ShipDate,

    @IsActive,

    @DateCreated,

    @DateModified,

    @DateDisabled

    )

    END;

    ```

    *清单 13-2 用于插入或更新的存储过程*


    ### 结论与建议


    `MERGE` 语句不仅限于向目标表插入或更新数据。它可以扩展到处理其他场景，例如插入或删除数据。也可以创建 `MERGE` 语句，使其在单个语句中完成插入缺失记录、更新更改记录以及删除孤立记录。虽然数据修改可以合并为单个语句的一部分，但在使用
    `MERGE` 语句时应谨慎，因为如前所述，它们容易导致性能问题和数据不一致。由于 `MERGE` 语句易于编写，有可能以一种对 SQL Server 效率不高的方式来比较两个表之间的数据。尽管表可能只被比较一次，但如果比较操作效率低下，可能会对被比较表的性能产生显著影响。也出现过在使用筛选索引时发生唯一键违规的情况。在特定情况下，`MERGE`
    语句还可能导致外键约束违规。这包括使用两个具有外键约束的表，其中外键设置为 `NOCHECK` 然后被回滚。我建议研究 `MERGE` 语句的已知问题，并进行充分的测试以确认
    T-SQL 代码能按预期工作。清单 13-2 中的代码表明，编写能够处理插入或更新的代码并非过于复杂。在 SQL Server 2019 之前，清单 13-1
    或 13-2 中的代码都可能受到参数嗅探的影响。既然 SQL Server 2019 已支持自适应联接，这个问题应该会有所缓解。

    '
- fmt: '## Disable Functionality


    One challenge when working with applications is how to make changes to backend
    table design without affecting business continuity. This section discusses how
    you can update data so that records can be deleted from the database when the
    current application does not support soft deletes, where the records are marked
    as inactive instead of removed from the database. These methods can include disabling
    a foreign key constraint or creating a dummy record. Afterwards, the record should
    be able to be deleted.


    This section will also cover how to use soft deletes and some methods to decide
    when to toggle allowing users to find all records or only those that have not
    been soft deleted. You may also be able to use the concept of application rules
    to allow the ability to toggle functionality. This can also be used with feature
    flags, as discussed in Chapter [13](#480547_2_En_13_Chapter.xhtml).


    ### The Challenge of Enabling/Disabling Functionality


    When designing applications, often the first goal is to focus on meeting the specified
    requirements. In many cases, the product owners or business units are asking for
    functionality that they need right now. However, the same individuals do not have
    your knowledge of application and database development. Therefore, the same people
    may not request the ability to enable or disable specified functionality upon
    their request. In this case, functionality can either be considered the ability
    for a user or a role to perform an action or for an application to behave in a
    certain way. It may be that they are counting on you to know how they may want
    to use the same applications in the future.


    One of the most frequent things that can be forgotten when designing a new application
    is the ability to enable or disable certain functionality for a user role. You
    can tell you are in this situation if the existence of a record in a table means
    that it is available to the application. For this example, table `dbo.CustomerOrder`
    is created using the T-SQL statement in Listing [13-3](#480547_2_En_13_Chapter.xhtml#PC3).


    ```sql

    CREATE TABLE [dbo].[Customer] (

    [CustomerID]       INT            IDENTITY (1, 1) NOT NULL,

    [FirstName]        VARCHAR (40)                   NOT NULL,

    [LastName]         VARCHAR (100)                  NOT NULL,

    [Address]          VARCHAR (100)                  NOT NULL,

    [City]             VARCHAR (100)                  NOT NULL,

    [PostalCode]       VARCHAR (20)                       NULL,

    [Country]          VARCHAR (75)                   NOT NULL,

    [DateCreated]      DATETIME2 (2)                  NOT NULL

    CONSTRAINT [DF_Customer_DateCreated] DEFAULT (SYSDATETIME()),

    [DateModified]     DATETIME2 (2)     NOT NULL

    CONSTRAINT [DF_Customer_DateModified] DEFAULT (SYSDATETIME()),

    CONSTRAINT PK_Customer PRIMARY KEY CLUSTERED (CustomerID)

    );

    ```

    Listing 13-3: Creating the `dbo.Customer` Table


    In Table [13-1](#480547_2_En_13_Chapter.xhtml#Tab1), you can examine the records
    from the `dbo.Customer` table.


    **Table 13-1: Customer Table Sample Data**


    | CustomerID | FirstName | LastName | DateCreated |

    | --- | --- | --- | --- |

    | 1 | Myra | Acharya | 2022-08-30 |

    | 2 | José | Gomez | 2022-08-30 |

    | 12 | Selena | Tiësto | 2022-08-30 |

    | 27 | Ian | West | 2022-08-30 |

    | 401405 | Marty` | Bethel | 2022-10-02 |


    For instance, if an order is displayed in an application because it is in the
    `dbo.Customer` table, this is a case where you can’t control how an application
    interacts with customer orders. The only option you have to keep a customer order
    from being used by an application is to delete the customer order record. This
    action is referred to as a *hard delete*.


    ### Hard Delete and Its Limitations


    The tables you need to delete a record from depend on whether this deletion may
    be prevented by foreign key relationships. In these scenarios, you only have a
    couple options available. One option is to drop the foreign keys and then delete
    the specified record. For this table design, if you want to remove the customer
    Ian from the database, you need to drop any foreign keys referencing the `dbo.CustomerOrdertable`
    and then delete the record. The query in Listing [13-4](#480547_2_En_13_Chapter.xhtml#PC4)
    drops the foreign key.


    ```sql

    ALTER TABLE [dbo].[CustomerOrder]

    DROP CONSTRAINT [FK_CustomerOrder_Customer];

    ```

    Listing 13-4: Dropping the Foreign Key


    Once any foreign keys that referenced the `dbo.CustomerOrder` table have been
    dropped, you need to remove the customer record to make sure that it is no longer
    available. Listing [13-5](#480547_2_En_13_Chapter.xhtml#PC5) shows the statement
    to remove the specific customer.


    ```sql

    DELETE FROM dbo.Customer

    WHERE FirstName = ''Ian'';

    ```

    Listing 13-5: Deleting a Customer Record


    The resulting table has the records shown in Table [13-2](#480547_2_En_13_Chapter.xhtml#Tab2).


    **Table 13-2: Customer Table After Deleting Ian**


    | CustomerID | FirstName | LastName | DateCreated |

    | --- | --- | --- | --- |

    | 1 | Myra | Acharya | 2022-08-30 |

    | 2 | José | Gomez | 2022-08-30 |

    | 12 | Selena | Tiësto | 2022-08-30 |

    | 401405 | Marty` | Bethel | 2022-10-02 |


    There is a significant issue with this method. You should take caution when you
    are faced with the decision to drop foreign key relationships between tables.
    This can not only negatively affect query performance but can also affect your
    data quality. Foreign keys are one of the final pieces that can help ensure that
    data between your tables remains consistent.


    Another possibility is to insert a dummy record into the table with the foreign
    key relationship. You can add a customer to the `dbo.Customer` table with the
    name Inactive Deactivated. This can be inserted using the query in Listing [13-6](#480547_2_En_13_Chapter.xhtml#PC6).


    ```sql

    SET IDENTITY_INSERT dbo.Customer ON;

    INSERT INTO dbo.Customer

    (

    CustomerID,

    FirstName,

    LastName,

    [Address],

    City,

    PostalCode,

    Country,

    DateCreated,

    DateModified,

    DateDisabled

    )

    VALUES

    (

    0,

    ''Inactive'',

    ''Deactivated'',

    '''',

    '''',

    '''',

    '''',

    GETDATE(),

    GETDATE(),

    NULL

    );

    SET IDENTITY_INSERT dbo.Customer OFF;

    ```

    Listing 13-6: Inserting a Dummy Customer Record


    Inserting this dummy record into the `dbo.Customer` table is only the first step.
    You need to update the records in the `dbo.CustomerOrder` table for Ian to use
    the `CustomerID` for Inactive Deactivated. The update is shown in Listing [13-7](#480547_2_En_13_Chapter.xhtml#PC7).


    ```sql

    UPDATE dbo.CustomerOrder

    SET CustomerID = 0,

    DateModified = GETDATE()

    WHERE CustomerID = 27;

    ```

    Listing 13-7: Updating Inactive Customers in the Customer Order Table


    This may not prevent your application from showing the specific value unless your
    application has been configured in such a way to always ignore that value. If
    neither of these options can be used, there is another option available. With
    this table design involved, another option is to remove the orders associated
    with the customer Ian.


    Due to these limitations, the concept of a hard delete may not be ideal for your
    environment. There are other options available to you. It is possible to design
    your tables so that you can toggle whether the customers are active. This allows
    you to enable or disable functionality without deleting the data record.


    ### Implementing Soft Deletes with an `IsActive` Flag


    To use this option, you need the `dbo.Customer` table to include a column such
    as `IsActive`. To change the table created in Listing [13-3](#480547_2_En_13_Chapter.xhtml#PC3),
    execute the query in Listing [13-8](#480547_2_En_13_Chapter.xhtml#PC8).


    ```sql

    ALTER TABLE dbo.Customer

    ADD IsActive BIT

    CONSTRAINT DF_Customer_IsActive DEFAULT ((1)) NOT NULL;

    ```

    Listing 13-8: Adding the `IsActive` Column to the `dbo.Customer` Table'
