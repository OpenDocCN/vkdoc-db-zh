  trans: '

    ## 阅读执行计划


    本节将涵盖阅读执行计划的基础知识。内容包括讨论**估计执行计划**、**实际执行计划**和**实时查询统计信息**之间的区别。我将讲解显示运算符的图形化执行计划及其阅读方法。此外，本节还将介绍如何在执行计划中查看运算符的详细信息和属性。最后，本节将详细介绍执行计划的组成部分，包括多个步骤、箭头、警告、运算符、估计值和实际值。


    编写 `T-SQL` 时，你的目标是确保获得准确的结果。有时，你编写的查询可能简单直接。你可能会发现自己需要对报表相关的查询进行性能调优，或者为报表编写新的查询。如果你需要编写查询来提供基于事务性数据的报表，你可能需要比编写应用程序查询时使用更多的连接和更复杂的逻辑。虽然这并非理想状态，但这却是许多公司非常常见的场景。


    许多公司已经开始意识到其系统中数据的重要性，或者他们希望增加监控以确保应用程序按预期运行。无论哪种情况，你都很有可能在环境中遇到一个对应用程序产生负面影响的查询。那时，你会希望知道如何解决该问题。在本节中，你将学习执行计划的重要性以及何时需要使用它们。你将学习如何阅读执行计划，包括常用的符号。你还将了解执行计划中的属性和警告。


    我的第一位导师曾告诉我，要编写出好的 `T-SQL`，我需要理解 SQL Server 的工作原理。这是我收到过最明智的建议之一，至今我仍在努力每天更好地理解
    SQL Server 内部机制。运用这个建议，一种更好地理解 SQL Server 的方法就是理解 SQL Server 如何执行你编写的任何查询。与执行查询相关的一些内部机制在第
    1 章中有所涉及。在本章中，我将向你展示 SQL Server 确定的用于执行你的 `T-SQL` 代码的指令。只要计划仍在计划缓存中，这些指令就可以在执行计划中找到。如果你的数据库启用了
    `查询存储`，你可以查阅第 9 章，了解如何访问保存在 `查询存储` 中的查询计划。


    一旦你决定开始研究某些 `T-SQL` 代码的执行计划，你应该确认你拥有在 SQL Server 中查看执行计划的权限。在审查执行计划时，你可以查看估计执行计划、实际执行计划或实时查询统计信息。**估计执行计划**将显示该计划*将*如何执行的最佳猜测。然而，由于查询尚未执行，估计执行计划可能并不代表查询运行时实际发生的情况。**实际执行计划**会执行查询，返回结果，并显示
    SQL Server 为执行查询所采取的步骤。**实时查询统计信息**与实际执行计划相同，只是它还实时显示了查询在执行计划中的流转过程。这在尝试调试性能不佳的查询时很有帮助。但是，如果你的查询执行速度非常快，它最终可能看起来与实际执行计划完全一样。


    如果你希望在执行 `T-SQL` 代码时获取实际执行计划，你需要确保你有执行该代码的权限，并且对于 `T-SQL` 代码中涉及的数据库，你拥有 `SHOWPLAN`
    访问权限。管理执行计划的用户权限超出了本书的范围。但是，如果你想验证用户对执行计划的访问权限，可以执行清单 7-1 中的查询。

    '
- fmt: '# 获取执行计划


    此查询显示所有已被授予或拒绝 `SHOWPLAN` 权限的用户。


    ```

    USE OutdoorRecreation;

    GO

    SELECT prn.[name] AS UserName, prm.state_desc, prm.[permission_name]

    FROM sys.database_permissions prm

    INNER JOIN sys.database_principals prn

    ON prm.grantee_principal_id = prn.principal_id

    WHERE prm.[permission_name] = ''SHOWPLAN'';

    ```

    *Listing 7-1 查看 SHOWPLAN 权限*


    你也可以从计划缓存中获取执行计划，但你需要能够查询动态管理视图 `sys.dm_exec_cached_plans`。


    在排查性能问题时，通常可以从 `sys.dm_exec_cached_plans` 检索执行计划。如果你想要之前使用的执行计划，这是首选方法。如果执行计划已从计划缓存中清除，你可能无法在此处找到查询或存储过程。此外，根据性能问题发生的时间，缓存中的计划可能已被清除。这可能意味着你能找到一个执行计划，但它可能不是之前使用的那个。在这种情况下，请参阅第
    9 章，了解有关使用查询存储排查性能问题的信息。


    ## 估算与实际执行计划


    如果你发现执行计划自性能问题发生后已被更改，可以尝试查找当前的执行计划。使用此方法有两种选项。一种是获取 SQL Server 将用作执行计划的假设性想法，而无需在服务器上运行实际的
    T-SQL 代码。这称为 *估算执行计划*。使用此方法的最大挑战是，由于 SQL Server 已估算了一个执行计划，无法保证这将是查询运行时 SQL Server
    实际使用的执行计划。我只使用过少数几次估算执行计划，那是在我犹豫是否要运行 T-SQL 代码以避免生产环境中断，或者想快速猜测查询如何运行而不想等待查询完成时。


    如果在计划缓存中找不到执行计划，你可能希望查看当前运行 T-SQL 时生成的执行计划。使用 SQL Server Management Studio (SSMS)
    或 Azure Data Studio (ADS) 时，在执行 T-SQL 代码时请求实际执行计划，将使执行计划在查询执行完成后可用。在查询执行过程中，还可以查看数据在执行计划中的流动情况。除了查看实际执行计划，你还可以要求
    SQL Server 显示实时查询统计信息。虽然此选项对于存在特定瓶颈的较慢查询可能很有帮助，但我经常发现许多查询完成得太快，无法有效使用此方法来诊断我正尝试解决的许多问题。


    ## 执行计划的呈现方式


    如何以及何时检索执行计划是在处理执行计划时可以控制的因素。此外，还有关于检索后执行计划应呈现为何种形式的选项。我通常的方法是查看执行计划的图形输出。无论是编写新的
    T-SQL 还是对现有代码进行性能调整，审查 T-SQL 代码执行计划的过程都是相同的。


    图形执行计划提供了查询执行方式的高级视图。这使得执行计划一目了然，易于阅读，但也意味着在深入执行计划细节时需要访问额外的信息。执行计划中包含运算符，这些运算符描述了
    SQL Server 将如何执行查询。每个运算符都有一个独特的名称，该名称在执行计划中可用。使用图形执行计划时，这些运算符有独特的图标。图 7-2 显示了在图形执行计划中将鼠标悬停在聚集索引扫描运算符上时可以查看的一些详细信息。


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig2_HTML.jpg)

    *图 7-2 图形执行计划中的运算符详细信息*

    *一个图表展示了执行计划中聚集索引扫描运算符的详细信息。物理和逻辑操作是聚集索引扫描。实际和估算执行模式是行。存储是行存储。*


    除了此工具提示中的属性外，在较新版本的 SQL Server Management Studio 中，你还可以访问扩展属性，如图 7-3 所示。


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig3_HTML.jpg)

    *图 7-3 执行计划的附加属性*

    *一个快照展示了聚集索引扫描的属性。它包含实际 I/O 统计信息、时间统计信息、实际重绕和重绑、实际批次数和行数等的详细信息。*


    ## XML 格式的执行计划


    可以选择以 XML 格式与执行计划交互。你可以在清单 7-2 中看到一个例子。


    ```xml

    <!-- 此处应为 XML 格式的执行计划内容 -->

    ```

    *清单 7-2 XML 执行计划*


    虽然这种方法可能更难阅读，但它确实包含了与执行计划相关的所有信息。生成此表的查询是对一个表的 SELECT 语句。将执行计划以 XML 形式提供会产生大量需要审查的代码。


    ## 在 SSMS 和 ADS 中访问执行计划


    当需要在 SSMS 中访问执行计划时，你使用 GUI（图形用户界面）来选择要使用哪一种。图 7-4 显示了用于访问执行计划的不同方式的图标。


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig4_HTML.jpg)

    *图 7-4 SSMS 中的执行计划图标*

    *一个快照展示了访问执行计划的 4 个不同图标。一个看起来像手机的图标被高亮显示。*


    第一个图标生成所选 T-SQL 代码的估算执行计划。第四个图标允许你从执行的 T-SQL 代码生成实际执行计划。第五个图标允许你在 SQL 引擎通过实际执行计划处理数据时查看活动运算符。你可以选择这些图标中的任何一个在
    SQL Server Management Studio 中使用执行计划。


    你也可以使用 Azure Data Studio 查看执行计划。在 ADS 中，你可以在 GUI 中选择实际或估算执行计划，如图 7-5 所示。


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig5_HTML.jpg)

    *图 7-5 ADS 中的执行计划图标*

    *一个快照展示了用于访问估算计划和启用实际计划的 2 个不同图标。*


    你可以在 ADS 查询窗口的顶部栏上切换这两个选项。第一个选项显示所选代码的估算执行计划。第二个选项在你执行 T-SQL 代码时提供实际执行计划。


    ## 使用 T-SQL 获取执行计划信息


    还有一个选项是使用 T-SQL 来获取执行计划信息，而不是执行查询。此 T-SQL 代码将提供无图片的输出。如果你想获取有关 SQL Server 将如何执行查询的信息以及估算值，应使用清单
    7-3 中的 T-SQL。


    ```sql

    SET SHOWPLAN_ALL ON;

    ```

    *清单 7-3 在文本中显示执行计划和估算值*


    如果你觉得这信息太多，可以改为执行 T-SQL 以仅检索 SQL Server 将如何执行查询的信息。`<ON/OFF>` 表示你可以启用和禁用此功能。清单
    7-4 包含了仅查看 SQL Server 将如何执行查询的 T-SQL。


    ```sql

    SET SHOWPLAN_TEXT ON;

    ```

    *清单 7-4 在文本中显示执行计划*


    你可能会发现你更喜欢以 XML 而非文本形式获取有关 SQL Server 将如何执行查询的信息。如果是这样，你可以运行清单 7-5 中的查询以查看格式良好的
    SQL 中的执行计划。


    ```sql

    SET SHOWPLAN_XML ON;

    ```

    *清单 7-5 以 XML 格式显示执行计划*'
  raw: '```

    USE OutdoorRecreation;

    GO

    SELECT prn.[name] AS UserName, prm.state_desc, prm.[permission_name]

    FROM sys.database_permissions prm

    INNER JOIN sys.database_principals prn

    ON prm.grantee_principal_id = prn.principal_id

    WHERE prm.[permission_name] = ''SHOWPLAN'';

    Listing 7-1

    Viewing SHOWPLAN Permissions

    ```


    This query shows all users who have been granted or denied SHOWPLAN permissions.


    You can also get the execution plan from the plan cache, but you need to be able
    to query the dynamic management view `sys.dm_exec_cached_plans`.


    When you troubleshoot performance issues, you can usually retrieve the execution
    plan from `sys.dm_exec_cached_plans`. This is the method you want to use if you
    want the execution plan that was used previously. You may not be able to find
    the query or stored procedure here if the execution plan has been cleared from
    the plan cache. In addition, depending on when the performance issue happened,
    the plan that was in cache may have been cleared. This may mean you can find an
    execution plan, but it may not be the same one used previously. In this case,
    see Chapter [9](#480547_2_En_9_Chapter.xhtml) for information about troubleshooting
    performance issues using Query Store.


    If you find that the execution plan has been changed since the performance issue,
    you can try to find the current execution plan. There are two options available
    when using this method. One option is to get a hypothetical idea of what SQL Server
    would use as an execution plan. This can be done without running the actual T-SQL
    code on the server. This is called the *estimated execution plan*. The largest
    challenge when using this method is since SQL Server has estimated an execution,
    there is no guarantee that this will be the actual execution plan that SQL Server
    will use when the query is run. I have used estimated execution plans only a handful
    of times, and that was when I was hesitant to run the T-SQL code for fear of causing
    an outage in Production or wanted a quick guess at how the query would run without
    waiting for the query to finish.


    If you can’t find the execution plan in the plan cache, you may want to look at
    the execution plan that is generated if the T-SQL runs now. When using SQL Server
    Management Studio (SSMS) or Azure Data Studio (ADS), requesting an actual execution
    plan when you execute your T-SQL code will cause the execution plan to be available
    after the query execution completes. There is also the ability to see the flow
    of data through the execution plan as the query is executing. Instead of viewing
    the actual execution plan, you ask SQL Server to show you the live query statistics.
    While this option may be helpful in slower queries where there is one specific
    pain point, I often find that many queries complete too quickly to use this method
    to effectively diagnose many issues I am trying to resolve.


    How and when you retrieve an execution plan are factors that you can control when
    it comes to working with execution plans. There is also the option of what the
    execution plan should look like once you retrieve it. My usual method is to look
    at the graphical output for the execution plan. The process of reviewing execution
    plans for T-SQL code is the same regardless of whether you are writing new T-SQL
    or performance tuning existing code.


    The graphical execution gives a high-level view of how a query is executed. This
    makes the execution plan easier to read at a glance, but it also means that there
    is additional information that needs to be accessed when getting into the details
    in the execution plan. Included in an execution plan are operators, which are
    descriptors of how SQL Server will execute a query. Each of these operators has
    a distinct name, which is available in the execution plan. When using a graphical
    execution plan, these operators have a distinct icon. Figure [7-2](#480547_2_En_7_Chapter.xhtml#Fig2)
    shows some details that can be viewed when you mouse over the Clustered Index
    Scan operator in the execution plan.


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig2_HTML.jpg)


    A chart presents the details of the clustered Index Scan operator in the execution
    plan. The physical and logical operations are clustered index scans. The actual
    and estimated execution modes are rows. Storage is row store.


    Figure 7-2


    Operator details from a graphical execution plan


    In addition to the properties in this tool tip, in newer versions of SQL Server
    Management Studio, you have access to extended properties as shown in Figure [7-3](#480547_2_En_7_Chapter.xhtml#Fig3).


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig3_HTML.jpg)


    A snapshot presents the properties of a clustered index scan. It has the details
    of the actual I O statistics, time statistics, Actual rewinds and rebinds, the
    actual number of batches and rows, etc.


    Figure 7-3


    Additional properties for execution plans


    There is an option to interact with the execution plan in an XML format. You can
    see an example of this in Listing [7-2](#480547_2_En_7_Chapter.xhtml#PC2).


    ```


    Listing 7-2

    XML Execution Plan

    ```


    While this method may be more difficult to read, it does contain all information
    related to the execution plan. The query that generated this table was a SELECT
    statement on one table. Having the execution plan in XML gives quite a bit of
    code that needs to be reviewed.


    When you want to access an execution plan in SSMS, you use the GUI (graphical
    user interface) to choose which one. Figure [7-4](#480547_2_En_7_Chapter.xhtml#Fig4)
    shows the icons for the different ways to access execution plans.


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig4_HTML.jpg)


    A snapshot presents the 4 different icons to access execution plans. An icon that
    looks like a mobile phone is highlighted.


    Figure 7-4


    Execution plan icons in SSMS


    The first icon generates an estimated execution plan of the T-SQL code selected.
    The fourth icon allows you to generate an actual execution plan from the T-SQL
    code executed. The fifth icon allows you to view active operators as the SQL Engine
    processes the data through the actual execution plan. You can select any of these
    icons to use execution plans in SQL Server Management Studio.


    You can use Azure Data Studio to view execution plans also. In ADS, you can select
    either the actual or estimated execution plan in the GUI as shown in Figure [7-5](#480547_2_En_7_Chapter.xhtml#Fig5).


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig5_HTML.jpg)


    A snapshot presents the 2 different icons to access the estimated plan and enable
    the actual plan.


    Figure 7-5


    Execution plan icons in ADS


    You can toggle either of these options on the top bar of the query window in ADS.
    The first option shows an estimated execution plan for the code selected. The
    second option provides an actual execution plan when you execute T-SQL code.


    There is also an option to use T-SQL to get execution plan information instead
    of executing a query. This T-SQL code will provide an output without pictures.
    If you want to get the information about how SQL Server will execute a query as
    well as estimates, you should use the T-SQL in Listing [7-3](#480547_2_En_7_Chapter.xhtml#PC3).


    ```

    SET SHOWPLAN_ALL ;

    Listing 7-3

    Showing an Execution Plan and Estimates in Text

    ```


    If you find this is too much information, you can instead execute T-SQL to only
    retrieve how SQL Server would execute a query. The `<ON/OFF>` indicates that you
    can enable and disable this functionality. Listing [7-4](#480547_2_En_7_Chapter.xhtml#PC4)
    has the T-SQL to only see how SQL Server would execute a query.


    ```

    SET SHOWPLAN_TEXT ;

    Listing 7-4

    Showing an Execution Plan in Text

    ```


    You may find that you prefer the information about how SQL Server would execute
    a query in XML instead of text. If so, you can run the query in Listing [7-5](#480547_2_En_7_Chapter.xhtml#PC5)
    to see the execution plan in well-formed SQL.


    ```

    SET SHOWPLAN_XML ;

    Listing 7-5

    Showing the Execution Plan in XML

