- fmt: '# 查询分区视图的执行计划


    一张截图展示了与聚集索引查找相关的属性。它列出了10个属性。实际逻辑读取数为7。实际物理读取数为3。实际预读数为8。实际扫描数为2。所有执行的实际行数为3。


    **图 16-14**

    在分区键上带有聚集索引的查询分区视图的读取操作


    根据返回的行数，你可以确定2021表中的数据与本章前面提到的分区表不同。你还可以确定，相对逻辑读取数较低，并且其趋势与本章前面的分区表相似。


    清单[16-18](#480547_2_En_16_Chapter.xhtml#PC18)中执行的T-SQL代码访问了基于每个表中分区列和为每个表指定的约束的分区视图。你看到SQL
    Server在查询数据时能够快速确定要访问哪个表。有时你可能想要运行一个不包含分区列的查询，就像清单[16-19](#480547_2_En_16_Chapter.xhtml#PC19)中的那个一样。


    ```sql

    SELECT CustomerOrderHistoryID,

    CustomerOrderID,

    CustomerOrderHistoryStatusID,

    DateCreated

    FROM dbo.vwCustomerOrderHistory

    WHERE CustomerOrderID = 401408

    AND CustomerOrderHistoryStatusID = 1;

    -- Listing 16-19

    -- 访问数据而不使用分区列

    ```


    此查询搜索具有特定状态的特定`CustomerOrder`。然而，没有任何迹象表明这些记录存在于索引视图中的特定表中。由于SQL Server无法在查询中排除某些日期范围，因此你会得到如图[16-15](#480547_2_En_16_Chapter.xhtml#Fig15)所示的执行计划。


    ![](images/480547_2_En_16_Chapter/480547_2_En_16_Fig15_HTML.jpg)


    带有符号的文本描绘了一个包含分区视图的执行计划。文本显示了2个聚集索引扫描，成本分别为85%和0%，耗时分别为0.029秒和0.000秒，行数比分别为1 of
    1和0 of 1，一个连接操作，以及一个Select操作成本为0%。符号包括一个表、一个连接和一个聚集索引扫描。


    **图 16-15**

    分区视图的执行计划


    你可以确定，在此执行计划中，SQL Server必须访问包含2021数据的表和包含2022数据的表。在此示例中，你可以确定此请求在访问的表数量方面没有带来任何好处。


    使用分区视图可以帮助你将多个表组合成一个数据库对象。通过访问这个单一的数据库对象，你可以简化跨多个范围的T-SQL代码。你还了解到，使用分区视图在限制访问的表数量方面可能是有益的，但如果你不在查询中使用分区列，你仍然需要访问视图中包含的所有表。分区表将一个表拆分成多个段，而分区视图将表组合成一个数据库对象，你可能会发现结合使用两者的优势。


    ## 混合工作负载


    公司使用数据库多年，可能积累了大量的数据。通常，这些公司可能会从这些数据中生成报告。在许多情况下，这些公司可能没有优先构建数据仓库。对于这些情况，一个数据库通常需要同时执行两项任务。第一个角色是继续存储事务性数据。然而，第二个角色也是充当用于分析处理的数据仓库。在许多情况下，事务处理所需的数据库设计与分析处理的最佳设计并不匹配。虽然你的公司可能愿意在将来转向数据仓库，但你可能会发现自己处于需要实施能够适应这种混合工作负载的设计的情况。


    通过将分区和非分区表与分区视图结合使用，你可以给自己额外的灵活性。使用分区视图将允许你使用单一的数据库对象和名称来访问用于特定目的的任何数据。在此示例中，让我们继续处理作为启动`CustomerOrders`的结果而记录的数据。由于分区视图允许你将多个表组合在一起，因此你可以研究如何创建这些表。使用多个表的一个优势是每个表可以使用不同的索引。这种索引的差异可以改变数据的存储和访问方式。你还可以选择将某些表设为只读，这可以表明你不打算向这些表添加数据。


    你将创建一个分区视图来访问所有`CustomerOrder`历史数据。第一个表仅用于保存要归档的所有较旧数据。你也可以对这个表进行分区，以便在基于表的分区键进行搜索时允许分区消除。在清单[16-20](#480547_2_En_16_Chapter.xhtml#PC20)中，你可以参考创建归档数据分区表所需的T-SQL。


    ```sql

    CREATE TABLE dbo.CustomerOrderHistoryPartition

    (

    CustomerOrderHistoryID         BIGINT          NOT NULL,

    CustomerOrderID                INT             NOT NULL,

    CustomerOrderHistoryStatusID   TINYINT         NOT NULL,

    DateCreated                    DATETIME2(2)    NOT NULL,

    DateModified                   DATETIME2(2)        NULL,

    CONSTRAINT PK_CustomerOrderHistoryPartition_CustomerOrderHistoryID

    PRIMARY KEY (CustomerOrderHistoryID, DateCreated),

    CONSTRAINT FK_CustomerOrderHistoryPartition_CustomerOrderID

    FOREIGN KEY (CustomerOrderID)

    REFERENCES dbo.CustomerOrder(CustomerOrderID),

    CONSTRAINT FK_CustomerOrderHistoryParition_CustomerOrderHistoryStatusID

    FOREIGN KEY (CustomerOrderHistoryStatusID)

    REFERENCES dbo.CustomerOrderHistoryStatus

    (CustomerOrderHistoryStatusID)

    )

    ON CustomerOrderHistoryRange (DateCreated);

    -- Listing 16-20

    -- 为归档数据创建分区表

    ```


    这个分区表的创建方式与本章中已包含的许多分区表类似。与本章前面创建的分区表一样，该表也是在分区方案`CustomerOrderHistoryRange`上创建的。现在你有了一个分区表，你想要为应用程序当前正在积极使用的数据创建一个非分区表。在清单[16-21](#480547_2_En_16_Chapter.xhtml#PC21)中创建的表是非分区表的一个示例。'
