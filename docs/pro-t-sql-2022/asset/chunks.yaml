- fmt: 'You have verified that the data is getting sorted into the correct partition.
    However, you have not confirmed that you have any data that has a value that matches
    the exact date for your range partitions. One way you can verify this is to run
    a query, like the one in Listing [16-9](#480547_2_En_16_Chapter.xhtml#PC9), that
    shows the number of records with the exact date and time as the one specified
    for your partition function.


    ```sql

    SELECT COUNT(*)

    FROM dbo.CustomerOrderHistory

    WHERE DateCreated = ''2022-08-01'';

    ```


    Listing 16-9

    Query to Confirm Range Function


    When you run the preceding query, you end up getting 14,720 results returned.
    This lets you know that your partition function is working as expected. If you
    had zero results returned, you might not be certain on which partition any records
    with the exact date and time of August 1, 2022, 12:00:00:00.000 would end up.
    However, since your partitions show the correct counts by date and time grouping,
    you know it is working as expected.


    Previously, you created an empty partitioned table. Once you partition the table,
    you are ready to manage the growth of this table over time. This process of managing
    data growth is not a one-time occurrence but something that will need to be maintained
    going forward. In the case of the table, you need to add partitions going forward.
    This process will be like the one shown in Listing [16-5](#480547_2_En_16_Chapter.xhtml#PC5).
    Adding partitions to an existing partitioned table is not the only time that you
    may need to partition tables. You may also find yourself in a situation where
    you did not originally intend to partition a table, but for any number of circumstances,
    you now need to partition the table. In Listing [16-10](#480547_2_En_16_Chapter.xhtml#PC10),
    you can refer to the T-SQL code required to change a non-partitioned table to
    a partitioned table.


    ```sql

    ALTER TABLE dbo.CustomerOrderHistory

    DROP CONSTRAINT PK_CustomerOrderHistory_CustomerOrderHistoryID

    WITH (MOVE TO CustomerOrderHistoryRange(DateCreated));

    ALTER TABLE dbo.CustomerOrderHistory

    ADD CONSTRAINT PK_CustomerOrderHistory_CustomerOrderHistoryID

    PRIMARY KEY NONCLUSTERED (CustomerOrderHistoryID, DateCreated);

    CREATE CLUSTERED INDEX IX_CustomerOrderHistory_DateCreated

    ON dbo.CustomerOrderHistory (DateCreated)

    ON CustomerOrderHistoryRange (DateCreated);

    ```


    Listing 16-10

    Adding a Partition to an Existing Table


    Prior to implementing the partition, all the data in the table is ordered by the
    primary key. In this case, the primary key is the `CustomerOrderHistoryID`. However,
    once you partition the table, you want the table segmented by the created date.
    This requires changing how the data in the table is stored. To get SQL Server
    to update how the data is stored, you need to drop the original clustered key.
    If the primary key is clustered, then you also need to drop the primary key. At
    that time, you can create a new non-clustered primary key along with the date
    created. Including the date created as part of the partitioning column on the
    clustered key is necessary for the partitioned table. Once this is done, you can
    create a clustered index on the date created. This index will be created on the
    partition scheme. When an index is created on a partition scheme, it is called
    an *aligned index*.


    **Caution**


    Be aware that adding a non-aligned primary key to a partitioned table will prevent
    you from easily moving partitions into and out of the table. This concept is called
    *partition switching* and is discussed in detail in Chapter [17](#480547_2_En_17_Chapter.xhtml).


    If all the data in your existing non-partitioned table exists within one of the
    partitions on your new table, you have the option to easily move the data from
    the non-partitioned table to the partitioned table. Listing [16-11](#480547_2_En_16_Chapter.xhtml#PC11)
    shows the T-SQL code necessary to accomplish this task.


    ```sql

    ALTER TABLE dbo.CustomerOrderHistory

    WITH CHECK ADD CONSTRAINT CK_CustomerOrderHistory_MinDateCreated

    CHECK

    (

    DateCreated IS NOT NULL

    AND DateCreated >= ''2021-08-01''

    );

    ALTER TABLE dbo.CustomerOrderHistory

    WITH CHECK ADD CONSTRAINT CK_CustomerOrderHistor_MaxDateCreated

    CHECK

    (

    DateCreated IS NOT NULL

    AND DateCreated < ''2023-01-01''

    );

    ALTER TABLE dbo.CustomerOrderHistory SWITCH PARTITION 1

    TO dbo.CustomerOrderHistoryArchive;

    ```


    Listing 16-11

    Switching All Data Out of a Partitioned Table to a Non-Partitioned Table


    To switch the data from the non-partitioned table, the tables need to use the
    same filegroup as well as verify that the data in the non-partitioned table can
    exist within the partition that you will be using on the partitioned table. You
    first need to create constraints on the partitioning column that match the range
    for the partition. Once the constraints have been created, you can switch all
    the data from the non-partitioned table into the partition specified on the partitioned
    table.


    If you have two partitioned tables, you may want to move a partition from one
    table to another. This process can be referred to as partition switching. The
    T-SQL code required to do this is less complex than the code from Listing [16-11](#480547_2_En_16_Chapter.xhtml#PC11).
    Listing [16-12](#480547_2_En_16_Chapter.xhtml#PC12) shows database code that will
    switch the partition from the current table to a new archive table.


    ```sql

    ALTER TABLE dbo.CustomerOrderHistory SWITCH

    PARTITION 1

    TO dbo.CustomerOrderHistoryArchive

    PARTITION 1;

    ```


    Listing 16-12

    Switchig Out of Partitioned Table to Another Partitioned Table


    For this example, you move the records from the fourth quarter of 2021 from the
    `dbo.CustomerOrderHistory` table to the `dbo.CustomerOrderHistoryArchive` table.
    In order to switch a partition from one table to partition in a different partitioned
    table, you must specify the partitions for each table. The partition in the target
    table must also be empty in order for this T-SQL code to execute. This method
    is a particularly straightforward and easy method of managing your data growth
    over time. If you create a specific data management plan and move data from your
    main OLTP tables to an archive table, you can keep all your data but also allow
    your highly transactional tables to maintain only the most relevant data for your
    business.


    Now that we have covered how to partition new and existing tables, let’s determine
    what partitioning can mean for query execution. Data is usually recorded in the
    order that each transaction occurred. This can correlate to a specific time period,
    but that may not always be the case. In addition, even though data is recorded
    in a specific order, there are often reasons why the business may want to analyze
    data based on a specific date range. You may want to find the `CustomerOrders`
    that were started for a specific date range. By issuing the query in Listing [16-13](#480547_2_En_16_Chapter.xhtml#PC13),
    you can search the `dbo.CustomerOrderHistory` table to find this information.


    ```sql

    SELECT CustomerOrderHistoryID,

    CustomerOrderID,

    CustomerOrderHistoryStatusID,

    DateCreated

    FROM dbo.CustomerOrderHistory

    WHERE DateCreated BETWEEN ''2022-10-07'' AND ''2022-10-09'';

    ```


    Listing 16-13

    Accessing Data Before Partitioning Table


