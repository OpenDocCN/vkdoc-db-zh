    Listing 5-13

    Inserting Data Record by Record


    As you can see, inserting data record by record takes up considerably more code
    and can be quite a bit more tedious.


    One of my favorite uses for data sets is to update data. In many situations, I
    am not updating a specific record, but I am updating multiple records that share
    the same characteristics. If I want to make all the products inactive from the
    table, I have a couple different ways I can do this. For instance, I can write
    one update statement per record to set the `IsActive` value to zero as shown in
    Listing [5-14](#480547_2_En_5_Chapter.xhtml#PC14).


    ```sql

    UPDATE dbo.Product

    SET IsActive = 0,

    DateModified = GETDATE(),

    DateDisabled = GETDATE()

    WHERE ProductID = 1;

    UPDATE dbo.Product

    SET IsActive = 0,

    DateModified = GETDATE(),

    DateDisabled = GETDATE()

    WHERE ProductID = 2;

    UPDATE dbo.Product

    SET IsActive = 0,

    DateModified = GETDATE(),

    DateDisabled = GETDATE()

    WHERE ProductID = 3;

    ```

    Listing 5-14

    Updating Data Record by Record


    This requires three unique transactions. In addition, SQL Server must access the
    data page that each of these records is on three times. As shown in Listing [5-15](#480547_2_En_5_Chapter.xhtml#PC15),
    I can also write a query that allows me to update all three records at once.


    ```sql

    UPDATE dbo.Product

    SET IsActive = 0,

    DateModified = GETDATE(),

    DateDisabled = GETDATE()

    WHERE ProductID BETWEEN 1 AND 3;

    ```

    Listing 5-15

    Updating Data as a Range


    In fact, if all three of these records live on the same data page, I only need
    to access that page once. A much more likely scenario is a request to deactivate
    all products that contained the word water in the product name. This is type of
    pattern you want to find. If there is a pattern like this, you can write a query
    like the one in Listing [5-16](#480547_2_En_5_Chapter.xhtml#PC16).


    ```sql

    UPDATE dbo.CustomerOrder

    SET IsActive = 0,

    DateDisabled = GETDATE()

    WHERE IsActive = 1

    AND CustomerID = 234;

    ```

    Listing 5-16

    Updating Data as a Data Set


    This query accomplishes two goals. It lets you update more than one record in
    a given query. The `WHERE` clause has the `IsActive` and `CustomerID` columns
    allowing the query to use the index `IX_CustomerOrder_Isactive_CustomerID_OrderID_DateCreated`.


    There is no limit to using data sets for updating multiple records. I have often
    needed to update hundreds or thousands of records. While I could write a query
    to identify each record individually and then manually pull those IDs to update
    all those records individually or in a set, there are easier ways to update those
    multiple records and minimize the risk of errors due to human intervention. The
    query in Listing [5-17](#480547_2_En_5_Chapter.xhtml#PC17) shows how you can update
    data while joining tables together.


    ```sql

    UPDATE prd

    SET DateModified = GETDATE(),

    IsActive = 0

    FROM dbo.Product prd

    INNER JOIN dbo.ProductArchive pch

    ON prd.ProductID = pch.ProductID

    WHERE pch.DateInserted >= CAST(GETDATE() AS DATE);

    ```

    Listing 5-17

    Updating Data with Joins to Create a Data Set


    When using joins during your updates, I recommend that you confirm what data you
    are updating. This can be done by converting the update statement to a select
    statement as shown in Listing [5-18](#480547_2_En_5_Chapter.xhtml#PC18).


    ```sql

    SELECT

    ProductID,

    ProductName,

    ProductPrice,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Product prd

    INNER JOIN dbo.ProductArchive pch

    ON prd.ProductID = pch.ProductID

    WHERE pch.DateInserted >= CAST(GETDATE() AS DATE);

    ```

    Listing 5-18

    Verifying the Data Set with a Select Statement


    You can check the records and verify the record count. Before performing the update,
    I suggest wrapping the `UPDATE` statement in a `BEGIN TRAN…ROLLBACK` to verify
    the record count.


    Just like working with updates, you can also use data sets when deleting data.
    I have found that deleting data using data sets can be significantly more efficient,
    but it can also be somewhat risky if the data is not verified prior to deleting.'
