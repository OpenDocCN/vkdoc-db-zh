    10,000 种售出的产品时，立即就能清楚地看到代码清单 4-17 的查询性能明显更好。


    本章介绍了如何以及为何要使用存储过程。这包括创建可重用且一致的代码。你还看到了参数如何提高代码的可扩展性。参数有助于使你的代码更具适应性和动态性。参数在许多不同的场景中都很有用。虽然参数在许多不同情况下都非常有用，但你也需要确保你的
    `T-SQL` 不会受到参数嗅探的负面影响。你探索了可能需要使用 `T-SQL` 解决复杂问题的常见情况。当你保持代码更直接明了时，`T-SQL` 的性能会更好。这可能意味着代码的可读性或整洁度会降低，但
    `SQL Server` 会更清楚如何获得最优的执行计划。


    这也结束了当前关于编写易于理解的 `T-SQL` 的部分。这种 `T-SQL` 为每种情况使用了最佳的数据类型。这通常是占用最少空间并提供必要精度的数据类型。你还需要了解可用于构建
    `T-SQL` 的各种 `SQL Server` 数据库对象。你必须权衡使用一种数据库对象相对于另一种的益处与挑战。在某些情况下，你需要决定代码可读性或数据库性能哪个更重要。编写易于理解的
    `T-SQL` 的另一个方面是格式化、命名和注释你的 `T-SQL`，以便他人能够快速理解你所写的内容。


    在使用 `T-SQL` 时，有时你会希望编写可以多次一致调用的 `T-SQL`。使用参数可以让这段 `T-SQL` 代码变得更加灵活。当面对不那么直接的 `T-SQL`
    编写任务时，将代码分解成片段以简化需要编写的内容。一旦你对编写易于理解的 `T-SQL` 感到得心应手，你就准备好编写高效的 `T-SQL`，并最小化对 `SQL
    Server` 的性能影响了。

