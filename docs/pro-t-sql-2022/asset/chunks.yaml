    After the partition, which in this case is the entire table, is switched from
    `dbo.CustomerOrderActive` to `dbo.CustomerOrderNonPartition`, you can run a query
    to check the row counts of both tables as shown in Listing [17-8](#480547_2_En_17_Chapter.xhtml#PC8).


    ```

    SELECT COUNT(*)

    FROM dbo.CustomerOrderActive;

    SELECT COUNT(*)

    FROM dbo.CustomerOrderNonParitition;

    Listing 17-8

    Number of Records in Non-Partitioned Tables

    ```


    After running this T-SQL, you get the record count for both tables as shown in
    Table [17-2](#480547_2_En_17_Chapter.xhtml#Tab2).


    Table 17-2


    Count of Records per Table


    | Table Name | Record Count |

    | --- | --- |

    | `dbo.CustomerOrderActive` | 0 |

    | `dbo.CustomerOrderNonPartition` | 802,821 |


    This table indicates that there are no rows in `dbo.CustomerOrderActive` and 802,821
    rows in `dbo.CustomerOrderNonPartition`. This is what you would expect since the
    entire table of `dbo.CustomerOrderActive` was switched into `dbo.CustomerOrderNonPartition`.
    If you want to reset the tables back to how they were before the partition switch,
    you could execute the T-SQL in Listing [17-9](#480547_2_En_17_Chapter.xhtml#PC9)
    to switch back from `dbo.CustomerOrderNonParition` to `dbo.CustomerOrderActive`.


    ```

    ALTER TABLE dbo.CustomerOrderNonParitition

    SWITCH TO dbo.CustomerOrderActive;

    Listing 17-9

    Moving Data Back to the Original Table

    ```


    Now that the partition has been switched back, all of the records are once again
    in `dbo.CustomerOrderActive`. If data had been written to the `dbo.CustomerOrderActive`
    table, you would not be able to switch the data back to the original table. The
    target table must be empty. Listing [17-10](#480547_2_En_17_Chapter.xhtml#PC10)
    has a query you can execute to confirm that `dbo.CustomerOrderNonPartition` does
    not have any partitions.


    ```

    SELECT tbl.[name] AS TableName,

    sch.[name] AS PartitionScheme,

    fnc.[name] AS PartitionFunction,

    prt.partition_number,

    fnc.[type_desc],

    rng.boundary_id,

    rng.[value] AS BoundaryValue,

    prt.[rows]

    FROM sys.tables tbl

    INNER JOIN sys.indexes idx

    ON tbl.[object_id] = idx.[object_id]

    INNER JOIN sys.partitions prt

    ON idx.[object_id] = prt.[object_id]

    AND idx.index_id = prt.index_id

    INNER JOIN sys.partition_schemes AS sch

    ON idx.data_space_id = sch.data_space_id

    INNER JOIN sys.partition_functions AS fnc

    ON sch.function_id = fnc.function_id

    LEFT JOIN sys.partition_range_values AS rng

    ON fnc.function_id = rng.function_id

    AND rng.boundary_id = prt.partition_number

    WHERE tbl.[name] = ''CustomerOrderNonParitition''

    AND idx.[type] <= 1

    ORDER BY prt.partition_number;

    Listing 17-10

    Query to View Partition Information for CustomerOrderNonPartition Table

    ```


    The examples above indicate how to partition switch between two non-partitioned
    tables. However, it is much more likely that you will want to use partition switching
    with at least one table that is partitioned.


    Next, you will work through an example where you will partition switch from a
    non-partitioned table to a partitioned table. As a refresher, Listing [17-11](#480547_2_En_17_Chapter.xhtml#PC11)
    shows how to create a partition function and partition scheme.


    ```

    CREATE PARTITION FUNCTION CustomerOrderHistoryFunc(DATETIME2(2))

    AS RANGE RIGHT FOR VALUES

    (

    ''2022-01-01'',

    ''2022-02-01'',

    ''2022-03-01''

    );

    CREATE PARTITION SCHEME CustomerOrderHistoryRange

    AS PARTITION CustomerOrderHistoryFunc TO

    (

    [PRIMARY],

    [PRIMARY],

    CustomerOrderHistory202202,

    CustomerOrderHistory202203

    );

    Listing 17-11

    Creating a Partition Function and Partition Scheme

    ```


    One important note when switching partitions is that the both the source that
    is being switched out and the target being switched to must be in the same filegroup.
    For your example, `dbo.CustomerOrderActive` is in the PRIMARY filegroup. Therefore,
    if you are switching out to the first partition in `dbo.CustomerOrderHistory`,
    the first partition must also be in the filegroup PRIMARY. Otherwise, you would
    have to move `dbo.CustomerOrderActive` to the same filegroup as the first partition
    in `dbo.CustomerOrderHistory`.


    Before switching the records from `dbo.CustomerActive` to `dbo.CustomerOrderHistory`,
    you can check the record counts using the query in Listing [17-12](#480547_2_En_17_Chapter.xhtml#PC12).


    ```

    SELECT COUNT(*)

    FROM dbo.CustomerOrderActive;

    SELECT COUNT(*)

    FROM dbo.CustomerOrderHistory;

    Listing 17-12

    Number of Records in the Non-Partitioned and Partitioned Tables

    ```


    The results from these two queries are displayed in Table [17-3](#480547_2_En_17_Chapter.xhtml#Tab3).


    Table 17-3


    Count of Records per Table


    | Table Name | Record Count |

    | --- | --- |

    | `dbo.CustomerOrderActive` | 802,821 |

    | `dbo.CustomerOrderNonPartition` | 0 |


    The record counts indicated that 802,821 records are in the table `dbo.CustomerOrderActive`,
    and there are zero records in `dbo.CustomerOrderNonPartition`.


    Before you can try to switch the partitions, you need to confirm that all records
    in `dbo.CustomerOrderActive` exist within the partition you will be using in `dbo.CustomerOrderNonPartition`.
    To do this, you need to add check constraints to `dbo.CustomerOrderActive`. Listing
    [17-13](#480547_2_En_17_Chapter.xhtml#PC13) shows the T-SQL used to add check
    constraints.'
  trans: "\n## 切换分区\n\n在第 18 章中，我介绍了 SQL Server 中分区的概念。本节将探讨创建分区后管理分区的过程。第一个示例将演示如何在两个**非分区**表之间使用分区切换。第二个示例将展示如何将数据从非分区表切换到分区表。最后一个示例将展示如何在分区表之间切换分区。\n\
    \n### 在非分区表之间切换\n\n对于第一个示例，你将使用清单 17-5 中的 T-SQL 代码创建一个非分区表。\n\n```sql\nCREATE\
    \ TABLE dbo.CustomerOrderNonParitition(\n    CustomerOrderHistoryID         BIGINT\
    \         NOT NULL,\n    CustomerOrderID                INT            NOT NULL,\n\
    \    CustomerOrderHistoryStatusID   TINYINY        NOT NULL,\n    DateCreated\
    \                    DATETIME2(2)   NOT NULL,\n    DateModified              \
    \     DATETIME2(2)   NULL,\n    CONSTRAINT [PK_CustomerOrderNonPartition]\n  \
    \  PRIMARY KEY CLUSTERED ([CustomerOrderHistoryID], [DateCreated])\n);\n-- 清单\
    \ 17-5\n-- 创建一个非分区表\n```\n\n这是一个新的空表，其架构与表 `dbo.CustomerOrderActive` 相同。这两个表都未进行分区。在将数据从一个表切换到另一个表之前，你应该获取每个表中的记录数。这是因为非分区表被视为由单个分区组成的表。清单\
    \ 17-6 中的查询获取了 `dbo.CustomerOrderActive` 和 `dbo.CustomerOrderNonPartition` 表的记录数。\n\
    \n```sql\nSELECT COUNT(*)\nFROM dbo.CustomerOrderActive;\nSELECT COUNT(*)\nFROM\
    \ dbo.CustomerOrderNonParitition;\n-- 清单 17-6\n-- 获取源表和目标表的记录数\n```\n\n上述查询的输出已格式化为表\
    \ 17-1，以显示每个表的客户记录数。\n\n表 17-1\n\n每个表的记录数\n\n| 表名 | 记录数 |\n| --- | --- |\n| `dbo.CustomerOrderActive`\
    \ | 802,821 |\n| `dbo.CustomerOrderNonPartition` | 0 |\n\n在分区切换之前，`dbo.CustomerOrder`\
    \ 表有 802,821 条记录，而 `dbo.CustomerOrderNonPartition` 表有 0 条记录。清单 17-7 中的 T-SQL 展示了如何将数据切换到另一个非分区表。\n\
    \n```sql\nALTER TABLE dbo.CustomerOrderActive\nSWITCH TO dbo.CustomerOrderNonParitition;\n\
    -- 清单 17-7\n-- 在非分区表之间移动数据\n```\n\n将分区（在此例中是整个表）从 `dbo.CustomerOrderActive` 切换到\
    \ `dbo.CustomerOrderNonPartition` 后，你可以运行查询来检查两个表的行数，如清单 17-8 所示。\n\n```sql\n\
    SELECT COUNT(*)\nFROM dbo.CustomerOrderActive;\nSELECT COUNT(*)\nFROM dbo.CustomerOrderNonParitition;\n\
    -- 清单 17-8\n-- 非分区表中的记录数\n```\n\n运行此 T-SQL 后，你将获得两个表的记录数，如表 17-2 所示。\n\n表 17-2\n\
    \n每个表的记录数\n\n| 表名 | 记录数 |\n| --- | --- |\n| `dbo.CustomerOrderActive` | 0 |\n\
    | `dbo.CustomerOrderNonPartition` | 802,821 |\n\n该表显示 `dbo.CustomerOrderActive`\
    \ 中没有行，而 `dbo.CustomerOrderNonPartition` 中有 802,821 行。这符合预期，因为 `dbo.CustomerOrderActive`\
    \ 的整个表已切换到 `dbo.CustomerOrderNonPartition`。如果你想将表恢复到分区切换之前的状态，可以执行清单 17-9 中的 T-SQL，将数据从\
    \ `dbo.CustomerOrderNonParition` 切换回 `dbo.CustomerOrderActive`。\n\n```sql\nALTER\
    \ TABLE dbo.CustomerOrderNonParitition\nSWITCH TO dbo.CustomerOrderActive;\n--\
    \ 清单 17-9\n-- 将数据移回原始表\n```\n\n现在分区已切换回来，所有记录再次位于 `dbo.CustomerOrderActive` 中。如果在\
    \ `dbo.CustomerOrderActive` 表中写入了数据，你将无法将数据切换回原始表。目标表必须为空。清单 17-10 中有一个查询，你可以执行它来确认\
    \ `dbo.CustomerOrderNonPartition` 没有任何分区。\n\n```sql\nSELECT tbl.[name] AS TableName,\n\
    \       sch.[name] AS PartitionScheme,\n       fnc.[name] AS PartitionFunction,\n\
    \       prt.partition_number,\n       fnc.[type_desc],\n       rng.boundary_id,\n\
    \       rng.[value] AS BoundaryValue,\n       prt.[rows]\nFROM sys.tables tbl\n\
    INNER JOIN sys.indexes idx\n    ON tbl.[object_id] = idx.[object_id]\nINNER JOIN\
    \ sys.partitions prt\n    ON idx.[object_id] = prt.[object_id]\n    AND idx.index_id\
    \ = prt.index_id\nINNER JOIN sys.partition_schemes AS sch\n    ON idx.data_space_id\
    \ = sch.data_space_id\nINNER JOIN sys.partition_functions AS fnc\n    ON sch.function_id\
    \ = fnc.function_id\nLEFT JOIN sys.partition_range_values AS rng\n    ON fnc.function_id\
    \ = rng.function_id\n    AND rng.boundary_id = prt.partition_number\nWHERE tbl.[name]\
    \ = 'CustomerOrderNonParitition'\n    AND idx.[type] <= 1\nORDER BY prt.partition_number;\n\
    -- 清单 17-10\n-- 查询以查看 CustomerOrderNonPartition 表的分区信息\n```\n\n### 从非分区表切换到分区表\n\
    \n以上示例展示了如何在两个非分区表之间进行分区切换。然而，更可能的情况是，你会希望至少对一个分区表使用分区切换。\n\n接下来，你将通过一个示例来学习如何从非分区表切换到分区表。作为复习，清单\
    \ 17-11 展示了如何创建分区函数和分区方案。\n\n```sql\nCREATE PARTITION FUNCTION CustomerOrderHistoryFunc(DATETIME2(2))\n\
    AS RANGE RIGHT FOR VALUES\n(\n    '2022-01-01',\n    '2022-02-01',\n    '2022-03-01'\n\
    );\nCREATE PARTITION SCHEME CustomerOrderHistoryRange\nAS PARTITION CustomerOrderHistoryFunc\
    \ TO\n(\n    [PRIMARY],\n    [PRIMARY],\n    CustomerOrderHistory202202,\n   \
    \ CustomerOrderHistory202203\n);\n-- 清单 17-11\n-- 创建分区函数和分区方案\n```\n\n切换分区时需要注意的一个重要点是：被切换出的源表和切换入的目标表必须位于**相同的文件组**中。对于你的示例，`dbo.CustomerOrderActive`\
    \ 位于 PRIMARY 文件组中。因此，如果你要将其切换到 `dbo.CustomerOrderHistory` 的第一个分区，那么第一个分区也必须位于\
    \ PRIMARY 文件组中。否则，你将需要把 `dbo.CustomerOrderActive` 移动到与 `dbo.CustomerOrderHistory`\
    \ 中第一个分区相同的文件组。\n\n在将记录从 `dbo.CustomerActive` 切换到 `dbo.CustomerOrderHistory` 之前，你可以使用清单\
    \ 17-12 中的查询来检查记录数。\n\n```sql\nSELECT COUNT(*)\nFROM dbo.CustomerOrderActive;\n\
    SELECT COUNT(*)\nFROM dbo.CustomerOrderHistory;\n-- 清单 17-12\n-- 非分区表和分区表中的记录数\n\
    ```\n\n这两个查询的结果显示在表 17-3 中。\n\n表 17-3\n\n每个表的记录数\n\n| 表名 | 记录数 |\n| --- | ---\
    \ |\n| `dbo.CustomerOrderActive` | 802,821 |\n| `dbo.CustomerOrderNonPartition`\
    \ | 0 |\n\n记录数显示 `dbo.CustomerOrderActive` 表中有 802,821 条记录，而 `dbo.CustomerOrderNonPartition`\
    \ 中有零条记录。\n\n在尝试切换分区之前，你需要确认 `dbo.CustomerOrderActive` 中的所有记录都存在于你将在 `dbo.CustomerOrderNonPartition`\
    \ 中使用的分区内。为此，你需要向 `dbo.CustomerOrderActive` 添加检查约束。清单 17-13 显示了用于添加检查约束的 T-SQL。\n"
- fmt: '# 分区切换


    当将数据从非分区表切换到分区表的某个分区时，必须首先验证非分区表中的所有数据是否能够存在于分区表的对应分区中。为此，需要向非分区表添加一个检查约束。上面的检查约束确认了
    `dbo.CustomerOrderActive` 表中的所有数据都是在2022年1月1日之前创建的。这与 `dbo.CustomerOrderActive`
    表中第一个分区的日期范围相同。


    > **Note**

    > 如果由于存在超出分区日期范围的数据而导致创建检查约束失败，你将无法使用分区切换将数据从非分区表移动到分区表。同样，如果你只想将非分区表中的部分数据移动到分区表，或者想将非分区表中的所有数据移动到目标表中一个非空的分区，你也将无法使用分区切换。


    一旦添加了检查约束，就可以使用以下 T-SQL（参考 清单 17-14）将非分区表 `dbo.CustomerOrderActive` 中的所有数据切换到
    `dbo.CustomerOrderHistory` 表的第一个分区。


    ```sql

    ALTER TABLE dbo.CustomerOrderActive

    SWITCH TO dbo.CustomerOrderHistory PARTITION 1;

    ```

    **Listing 17-14**

    **从非分区表切换到分区表的分区切换**


    与之前的操作一样，一旦分区成功切换，你就可以执行以下 T-SQL（参考 清单 17-15）来确认每个受影响表中的记录数。


    ```sql

    SELECT COUNT(*)

    FROM dbo.CustomerOrderActive;

    SELECT COUNT(*)

    FROM dbo.CustomerOrderHistory;

    ```

    **Listing 17-15**

    **非分区表和分区表中的记录数**


    这些查询的结果符合预期。`dbo.CustomerOrderActive` 表中剩余 0 条记录，而 `dbo.CustomerOrderNonPartition`
    表中有 802,821 条记录，如表 17-4 所示。


    **Table 17-4**

    **每个表的记录数统计**


    | Table Name | Record Count |

    | --- | --- |

    | `dbo.CustomerOrderActive` | 0 |

    | `dbo.CustomerOrderNonPartition` | 802,821 |


    这确认了所有记录已从 `dbo.CustomerOrderActive` 切换到 `dbo.CustomerOrderNonPartition`。


    你将切换分区以重置演示。在将分区切换回去之前，你可以运行一个额外的查询来验证 `dbo.CustomerOrderNonPartition` 中包含这些记录的分区。清单
    17-16 展示了用于验证这些结果的查询。


    ```sql

    SELECT tbl.[name] AS TableName,

    sch.[name] AS PartitionScheme,

    fnc.[name] AS PartitionFunction,

    prt.partition_number,

    fnc.[type_desc],

    rng.boundary_id,

    rng.[value] AS BoundaryValue,

    prt.[rows]

    FROM sys.tables tbl

    INNER JOIN sys.indexes idx

    ON tbl.[object_id] = idx.[object_id]

    INNER JOIN sys.partitions prt

    ON idx.[object_id] = prt.[object_id]

    AND idx.index_id = prt.index_id

    INNER JOIN sys.partition_schemes AS sch

    ON idx.data_space_id = sch.data_space_id

    INNER JOIN sys.partition_functions AS fnc

    ON sch.function_id = fnc.function_id

    LEFT JOIN sys.partition_range_values AS rng

    ON fnc.function_id = rng.function_id

    AND rng.boundary_id = prt.partition_number

    WHERE tbl.[name] = ''CustomerOrderHistory''

    AND idx.[type] <= 1

    ORDER BY prt.partition_number;

    ```

    **Listing 17-16**

    **用于查看 CustomerOrderHistory 表分区信息的查询**


    运行此 T-SQL 代码后，你会发现所有 802,821 条记录都按预期在第一个分区中。这表明你已成功将数据从非分区表切换到分区表。如果你想将分区切换回去，需要运行
    清单 17-17 中所示的 T-SQL。


    ```sql

    ALTER TABLE dbo.CustomerOrderActive

    DROP CONSTRAINT CK_MaxDateCreated;

    ALTER TABLE dbo.CustomerOrderHistory

    SWITCH PARTITION 1 TO dbo.CustomerOrderActive;

    ```

    **Listing 17-17**

    **从当前分区表切换回原始非分区表**


    在将分区切换回去之前，你需要移除 `dbo.CustomerOrderActive` 表上的检查约束，以便表结构与 `dbo.CustomerOrderHistory`
    匹配。如果表结构不匹配，你将无法切换分区。这一要求是分区切换比将数据插入目标表快得多的原因之一。


    移除此约束后，你就可以成功地将数据从 `dbo.CustomerOrderHistory` 切换回 `dbo.CustomerOrderActive`。


    如果你重新运行了 清单 17-9 和 清单 17-10 中的 T-SQL，你将把数据移回 `dbo.CustomerOrderHistory` 表。将数据从
    `dbo.CustomerOrderActive` 切换到 `dbo.CustomerOrderHistory` 后，`dbo.CustomerOrderHistory`
    表中将有 802,821 条记录。完成后，我们就可以开始在两个分区表之间实现分区切换了。在开始分区切换过程之前，你应该执行 清单 17-18 来确认每个表中的记录数。


    ```sql

    SELECT COUNT(*)

    FROM dbo.CustomerOrderHistory;

    SELECT COUNT(*)

    FROM dbo.CustomerOrderHistoryArchive;

    ```

    **Listing 17-18**

    **分区表中的记录数**


    上面的查询结果显示了 `dbo.CustomerOrderHistory` 和 `dbo.CustomerOrderHistoryArchive` 表的行数。这些行数统计如表
    17-5 所示。


    **Table 17-5**

    **每个表的记录数统计**


    | Table Name | Record Count |

    | --- | --- |

    | `dbo.CustomerOrderHistory` | 802,821 |

    | `dbo.CustomerOrderHistoryArchive` | 0 |


    你可以确认 `dbo.CustomerOrderHistory` 表有 802,821 条记录，而 `dbo.CustomerOrderHistoryArchive`
    表有 0 条记录。既然知道了切换分区前的记录数，你就可以按照 清单 17-19 所示，将 `dbo.CustomerOrderHistory` 的第一个分区切换到
    `dbo.CustomerOrderHistoryArchive` 的第一个分区。


    ```sql

    ALTER TABLE dbo.CustomerOrderHistory SWITCH PARTITION 1

    TO dbo.CustomerOrderHistoryArchive PARTITION 1;

    ```

    **Listing 17-19**

    **从分区表切换到分区表**


    此分区切换完成后，你可以再次验证 `dbo.CustomerOrderHistory` 和 `dbo.CustomerOrderHistoryArchive`
    中的行数。清单 17-20 展示了用于验证这些行数的 T-SQL。


    ```sql

    SELECT COUNT(*)

    FROM dbo.CustomerOrderHistory;

    SELECT COUNT(*)

    FROM dbo.CustomerOrderHistoryArchive;

    ```

    **Listing 17-20**

    **分区表中的记录数**


    这些查询的结果显示，`dbo.CustomerOrderHistory` 表中没有剩余记录。表 17-6 也显示所有 802,821 条记录现在都在 `dbo.CustomerOrderHistoryArchive`
    表中。


    **Table 17-6**

    **每个表的记录数统计**


    | Table Name | Record Count |

    | --- | --- |

    | `dbo.CustomerOrderHistory` | 0 |

    | `dbo.CustomerOrderHistoryArchive` | 802,821 |


    此表表明分区已成功切换。如果你希望将分区切换回原始分区表，可以执行 清单 17-21 中的 T-SQL。'
  raw: '```

    ALTER TABLE dbo.CustomerOrderActive WITH CHECK ADD CONSTRAINT CK_MaxDateCreated
    CHECK (DateCreated IS NOT NULL AND DateCreated < ''2022-01-01'');

    Listing 17-13

    Adding Check Constraints to the Source Table

    ```


    When switching data from a non-partitioned table to a partition in a partitioned
    table, you must first verify that all of the data in the non-partitioned table
    can exist in the partition in the partitioned table. To do this, you need to add
    a check constraint to the non-partitioned table. The check constraint above confirms
    that all data in `dbo.CustomerOrderActive` was created before January 1, 2022\.
    This is the same date range that exists for the first partition in `dbo.CustomerOrderActive`.


    Note


    If creating the check constraint fails because there is data outside of the date
    range for the partition, you will not be able to use partition switching to move
    the data from the non-partitioned to the partitioned table. Similarly, you will
    not be able to use partition switching if you only want to move some data from
    the non-partitioned table to the partitioned table or if you want to move all
    data from the non-partitioned table to the target table in a partition that is
    not empty.


    Once the check constraint has been added, you can use the T-SQL in Listing [17-14](#480547_2_En_17_Chapter.xhtml#PC14)
    to switch all of the data from the non-partitioned table `dbo.CustomerOrderActive`
    to the first partition in the `dbo.CustomerOrderHistory` table.


    ```

    ALTER TABLE dbo.CustomerOrderActive

    SWITCH TO dbo.CustomerOrderHistory PARTITION 1;

    Listing 17-14

    Partition Switch from Non-Partitioned Table to Partitioned Table

    ```


    As you have done before, once the partition is successfully switched, you can
    execute the T-SQL in Listing [17-15](#480547_2_En_17_Chapter.xhtml#PC15) to confirm
    the record counts in each table affected.


    ```

    SELECT COUNT(*)

    FROM dbo.CustomerOrderActive;

    SELECT COUNT(*)

    FROM dbo.CustomerOrderHistory;

    Listing 17-15

    Number of Records in the Non-Partitioned and Partitioned Tables

    ```


    The results from these queries are as expected. There are 0 records remaining
    in `dbo.CustomerOrderActive` and 802,821 records are in `dbo.CustomerOrderNonPartition`,
    as shown in Table [17-4](#480547_2_En_17_Chapter.xhtml#Tab4).


    Table 17-4


    Count of Records per Table


    | Table Name | Record Count |

    | --- | --- |

    | `dbo.CustomerOrderActive` | 0 |

    | `dbo.CustomerOrderNonPartition` | 802,821 |


    This confirms that all records have been switched from `dbo.CustomerOrderActive`
    to `dbo.CustomerOrderNonPartition`.


    You will switch the partition back to reset the demo. Before you switch the partitions
    back, you can run an additional query to verify the partition in `dbo.CustomerOrderNonPartition`
    that contains these records. Listing [17-16](#480547_2_En_17_Chapter.xhtml#PC16)
    has the query to execute to verify these results.


    ```

    SELECT tbl.[name] AS TableName,

    sch.[name] AS PartitionScheme,

    fnc.[name] AS PartitionFunction,

    prt.partition_number,

    fnc.[type_desc],

    rng.boundary_id,

    rng.[value] AS BoundaryValue,

    prt.[rows]

    FROM sys.tables tbl

    INNER JOIN sys.indexes idx

    ON tbl.[object_id] = idx.[object_id]

    INNER JOIN sys.partitions prt

    ON idx.[object_id] = prt.[object_id]

    AND idx.index_id = prt.index_id

    INNER JOIN sys.partition_schemes AS sch

    ON idx.data_space_id = sch.data_space_id

    INNER JOIN sys.partition_functions AS fnc

    ON sch.function_id = fnc.function_id

    LEFT JOIN sys.partition_range_values AS rng

    ON fnc.function_id = rng.function_id

    AND rng.boundary_id = prt.partition_number

    WHERE tbl.[name] = ''CustomerOrderHistory''

    AND idx.[type] <= 1

    ORDER BY prt.partition_number;

    Listing 17-16

    Query to View Partition Information for the CustomerOrderHistory Table

    ```


    Running this T-SQL code, you will find that all 802,821 records are in the first
    partition as expected. This indicates you have successfully switched the data
    from a non-partitioned to a partitioned table. If you want to switch the partition
    back, you need to run the T-SQL shown in Listing [17-17](#480547_2_En_17_Chapter.xhtml#PC17).


    ```

    ALTER TABLE dbo.CustomerOrderActive

    DROP CONSTRAINT CK_MaxDateCreated;

    ALTER TABLE dbo.CustomerOrderHistory

    SWITCH PARTITION 1 TO dbo.CustomerOrderActive;

    Listing 17-17

    Switching Back from the Current Partitioned Table to the Original Non-Partitioned
    Table

    ```


    Before switching the partitions back, you need to remove the check constraint
    on `dbo.CustomerOrderActive` so that the table schemas match `dbo.CustomerOrderHistory`.
    If the table schemas do not match, you will not be able to switch the partition.
    This requirement is one of the reasons partition switching can be so much faster
    than inserting the data into the target table.


    Once you remove this constraint, you can successfully switch the data from `dbo.CustomerOrderHistory`
    back to `dbo.CustomerOrderActive`.


    If you reran the T-SQL from Listing [17-9](#480547_2_En_17_Chapter.xhtml#PC9)
    and Listing [17-10](#480547_2_En_17_Chapter.xhtml#PC10), you would move data back
    into the `dbo.CustomerOrderHistory` table. After switching the data from `dbo.CustomerOrderActive`
    to `dbo.CustomerOrderHistory`, you will have 802,821 records in `dbo.CustomerOrderHistory`.
    When this is complete, you we are ready to implement partition switching between
    two partitioned tables. Before beginning the process of partition switching, you
    should execute Listing [17-18](#480547_2_En_17_Chapter.xhtml#PC18) to confirm
    how many records are in each table.


    ```

    SELECT COUNT(*)

    FROM dbo.CustomerOrderHistory;

    SELECT COUNT(*)

    FROM dbo.CustomerOrderHistoryArchive;

    Listing 17-18

    Number of Records in Partitioned Tables

    ```


    The results from the queries above indicate the row count for the `dbo.CustomerOrderHistory`
    and `dbo.CustomerOrderHistoryArchive` tables. These row counts are shown in Table
    [17-5](#480547_2_En_17_Chapter.xhtml#Tab5).


    Table 17-5


    Count of Records per Table


    | Table Name | Record Count |

    | --- | --- |

    | `dbo.CustomerOrderHistory` | 802,821 |

    | `dbo.CustomerOrderHistoryArchive` | 0 |


    You are able to confirm that `dbo.CustomerOrderHistory` has 802,821 records and
    `dbo.CustomerOrderHistoryArchive` has 0 records. Now that you know the record
    counts before you switch partitions, you can switch the first partition from `dbo.CustomerOrderHistory`
    to the first partition in `dbo.CustomerOrderHistoryArchive` as indicated in Listing
    [17-19](#480547_2_En_17_Chapter.xhtml#PC19).


    ```

    ALTER TABLE dbo.CustomerOrderHistory SWITCH PARTITION 1

    TO dbo.CustomerOrderHistoryArchive PARTITION 1;

    Listing 17-19

    Partition Switch from Partitioned Table to Partitioned Table

    ```


    Once this partition switch is complete, you can again verify the row counts in
    `dbo.CustomerOrderHistory` and `dbo.CustomerOrderHistoryArchive`. Listing [17-20](#480547_2_En_17_Chapter.xhtml#PC20)
    shows the T-SQL to verify these row counts.


    ```

    SELECT COUNT(*)

    FROM dbo.CustomerOrderHistory;

    SELECT COUNT(*)

    FROM dbo.CustomerOrderHistoryArchive;

    Listing 17-20

    Number of Records in Partitioned Tables

    ```


    The results from these queries show that there are no records remaining in `dbo.CustomerOrderHistory`.
    Table [17-6](#480547_2_En_17_Chapter.xhtml#Tab6) also shows that all 802,821 records
    are now in the `dbo.CustomerOrderHistoryArchive` table.


    Table 17-6


    Count of Records per Table


    | Table Name | Record Count |

    | --- | --- |

    | `dbo.CustomerOrderHistory` | 0 |

    | `dbo.CustomerOrderHistoryArchive` | 802,821 |


    The table indicates that the partition has been successfully switched. If you
    would like to switch the partition back to the original partitioned table, you
    can execute the T-SQL in Listing [17-21](#480547_2_En_17_Chapter.xhtml#PC21).'
