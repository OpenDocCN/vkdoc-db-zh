- fmt: 'In this case, the first query returns all results where the city name includes
    the word Memphis. However, the `EXCEPT` statement indicates that if a record is
    returned in both the first and second query, the record will be excluded from
    the result set. The results of this query are in Table [5-31](#480547_2_En_5_Chapter.xhtml#Tab31).


    Table 5-31

    Except of Results from Tables [5-26](#480547_2_En_5_Chapter.xhtml#Tab26) and [5-27](#480547_2_En_5_Chapter.xhtml#Tab27)


    | First Name | Last Name | Address | City | Postal Code | Country |

    | --- | --- | --- | --- | --- | --- |

    | Josè | Gomez | 790 Calle Cinco de Mayo | Cancun | 53778 | Mexico |

    | Stacy | Parks | 123 Rua de Santa Catarina | Porto | 1234-567 | Portugal |


    Using an `EXCEPT` statement may not be the preferred method to exclude results
    from a data set, but it is the method that I am more accustomed to using. Therein
    lies the benefits and challenges of T-SQL code: for almost any scenario there
    is almost certainly more than one way to write T-SQL code. The reason you are
    writing the database code will determine the level of flexibility you have in
    writing your code. If you are executing a query for a single time, you may be
    able to use a less efficient method to access this data. However, if you are writing
    your code for an application, you want to balance writing T-SQL code that is readable
    and improves the speed at which the data is returned.


    Listing [5-12](#480547_2_En_5_Chapter.xhtml#PC12) is an example of how to use
    data sets when inserting data.


    ```sql

    CREATE TABLE #TempProductArchive

    (

    ProductID      INT            NOT NULL,

    ProductName    VARCHAR(25)    NOT NULL,

    ProductPrice   DECIMAL(6,2)   NOT NULL,

    IsActive       BIT            NOT NULL,

    DateCreated    DATETIME2(2)   NOT NULL,

    DateModified   DATETIME2(2)   NOT NULL,

    DateDisabled   DATETIME2(2)   NULL,

    DateInserted   DATETIME2(2)   NOT NULL

    );

    INSERT INTO #TempProductArchive

    (

    ProductID,

    ProductName,

    ProductPrice,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled,

    DateInserted

    )

    SELECT

    ProductID,

    ProductName,

    ProductPrice,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled,

    GETDATE()

    FROM dbo.Product

    WHERE DateDisabled < ''2022-08-01'';

    ```

    Listing 5-12

    Inserting Data as a Set


    Listing [5-13](#480547_2_En_5_Chapter.xhtml#PC13) shows what the insert statements
    look like if they are inserted record by record.


    ```sql

    CREATE TABLE #TempProductArchive

    (

    ProductID         INT               NOT NULL,

