    This will allow you to continue using the original database object for all your
    application code. You can leave this additional table and trigger in place until
    you are ready to start using the new table in your database code.


    In addition to adding new columns, you may want to use some other strategies to
    refactor tables. This can include increasing the normalization of your databases.
    It is quite common to come across legacy tables with many more columns than would
    be expected for a database with a high level of normalization. By creating a space
    where you can modify the table design and create an abstraction layer, you can
    modify your database objects without affecting application performance.


    Sometimes it is easier to start with your end goal in mind. In this case, you
    are trying to redesign one legacy table into two or more normalized tables. The
    idea is to accomplish this while allowing your applications to function as normal.
    For this example, you have a table like the one from Listing [13-13](#480547_2_En_13_Chapter.xhtml#PC13).


    ```

    CREATE TABLE dbo.OrderDetail(

    OrderDetailID       INT           IDENTITY(1,1)   NOT NULL,

    CustomerOrderID     INT                           NOT NULL,

    ProductName         VARCHAR(25)                   NOT NULL,

    ProductPrice        DECIMAL(6,2)                  NOT NULL,

    QuantitySold        SMALLINT                      NOT NULL,

    IsActive            BIT                           NOT NULL,

    DateCreated         DATETIME2(2)                  NOT NULL,

    DateModified        DATETIME2(2)                  NOT NULL,

    DateDisabled        DATETIME2(2)                      NULL,

    CONSTRAINT PK_OrderDetail PRIMARY KEY CLUSTERED (CustomerOrderID ASC, OrderDetailID
    ASC)

    );

    Listing 13-13

    Original Denormalized Table

    ```


    Once you know which table you would like to normalize, you want to design the
    tables you will use to replace this original table. Listing [13-14](#480547_2_En_13_Chapter.xhtml#PC14)
    shows an example of the tables that can be created so that you can transition
    to more normalized data tables.


    ```

    CREATE TABLE dbo.Product(

    ProductID       INT           IDENTITY(1,1)     NOT NULL,

    ProductName     VARCHAR(25)                     NOT NULL,

    ProductPrice    DECIMAL(6,2)                    NOT NULL,

    IsActive        BIT                             NOT NULL,

    DateCreated     DATETIME2(2)                    NOT NULL,

    DateModified    DATETIME2(2)                    NOT NULL,

    DateDisabled    DATETIME2(2)                        NULL,

    CONSTRAINT PK_Product PRIMARY KEY CLUSTERED (ProductID ASC)

    );

    CREATE TABLE dbo.OrderDetail_Normal(

    OrderDetailID      INT           IDENTITY(1,1)    NOT NULL,

    CustomerOrderID    INT                            NOT NULL,

    ProductID          INT                            NOT NULL,

    ProductPrice       DECIMAL(6,2)                   NOT NULL,

    QuantitySold       SMALLINT                       NOT NULL,

    IsActive           BIT                            NOT NULL,

    DateCreated        DATETIME2(2)                   NOT NULL,

    DateModified       DATETIME2(2)                   NOT NULL,

    DateDisabled       DATETIME2(2)                       NULL,

    CONSTRAINT PK_OrderDetail PRIMARY KEY CLUSTERED (CustomerOrderID ASC, OrderDetailID
    ASC)

    );

    Listing 13-14

    Normalized Table

    ```


    In the preceding example, if you know that there will be no data modifications
    to the `dbo.Product` table, you can also use a view to interact with the `dbo.OrderDetail`
    table. Listing [13-15](#480547_2_En_13_Chapter.xhtml#PC15) shows a view to use
    these new tables.


    ```

    CREATE VIEW dbo.OrderDetail

    AS

    SELECT dtl.OrderDetailID,

    dtl.CustomerOrderID,

    prd.ProductName,

    dtl.ProductPrice,

    dtl.QuantitySold,

    dtl.IsActive,

    dtl.DateCreated,

    dtl.DateModified,

    dtl.DateDisabled

    FROM dbo.OrderDetail_Normal dtl

    INNER JOIN dbo.Product prd

    ON dtl.ProductID = prd.ProductID;

    Listing 13-15

    View Using the Normalized Table

    ```


    Like the logic in Listing [13-11](#480547_2_En_13_Chapter.xhtml#PC11), you can
    create a view with the name `dbo.OrderDetail` so that the applications can interact
    with the new table going forward. Depending on the purpose of the original and
    new tables, you may not be able to update all code to use these new tables. If
    so, you may have to rely on triggers to update these tables.'
