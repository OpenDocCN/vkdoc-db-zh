- fmt: '### Logon Triggers


    When users log onto the server, you may want to record that specific activity.
    In other instances, you may want to limit user activity upon login or implement
    additional security functionality as a result of a server login. The logon trigger
    gives you the ability to allow SQL Server to initiate reactions in response to
    some or all logins onto the server.


    There are not many scenarios where logon triggers are needed for application development.
    However, there are some things that can be done with logon triggers that can help
    protect or monitor connections to your applications. They include using a logon
    trigger to store login activity including who and when a connection was made to
    the database. A logon trigger can limit the number of connections allowed by a
    login or prevent users from connecting to the server entirely. In the case of
    a breach, this can ensure the database does not get flooded with excess connections.
    Conversely, limiting the number of connections allowed per login can also limit
    scalability and futureproofing. The number of acceptable connections today may
    be much lower than the number of logins needed in the future.


    ### Data Definition Language Triggers


    When applications or users change the overall database schema, they use data definition
    language (DDL). In the case of SQL Server, it is possible to react to specific
    scenarios resulting from changes to the database. While I do not expect this to
    be a standard part of application development, it may be helpful to be aware of
    this type of trigger. DDL triggers can be configured to respond to various `CREATE`,
    `ALTER`, `DROP`, `GRANT`, `DENY`, `REVOKE`, and `UPDATE STATISTICS` statements.


    If you are concerned about SQL injection causing issues on your server, DDL triggers
    can help mitigate the damage. There are options to prevent or control all sorts
    of changes to database objects including creating, altering, or dropping various
    object. You can also use DDL triggers to do things like generate an error in response
    to users trying to modify database objects. In addition, it is possible to log
    or record when database objects are created or altered. While you may want to
    use triggers to set up all sorts of triggers to monitor every activity on the
    server and the databases, there may be better options available. There are alternatives
    available for tracking this type of behavior, including SQL Server Audit for both
    server and database activity. Typically, applications are not concerned with logging
    changes to the server or database schemas.


    ### Data Manipulation Language Triggers


    If you find yourself needing to implement auditing or logging as a part of your
    application development, you may find using data manipulation language (DML) triggers
    quite helpful. These triggers can be executed in response to the completion of
    an `INSERT`, `UPDATE`, or `DELETE` statement or instead of the SQL statement entirely.
    In some cases, you may just want to record when the change happened and what changed.
    In other instances, it may be more important to change or verify the functionality
    of the request.


    One method for triggers is to have an action performed after something happens.
    Say you want to successfully modify a record in the `dbo.Product` table, but you
    also want to keep a history of that item’s cost changes over time. Listing [2-37](#480547_2_En_2_Chapter.xhtml#PC37)
    shows some T-SQL that will add an entry to a history table after a change is made.


    ```sql

    CREATE TRIGGER dbo.LogProductPriceHistory

    ON dbo.Product

    AFTER INSERT, DELETE

    AS

    IF (ROWCOUNT_BIG() = 0)

    RETURN;

    INSERT INTO dbo.ProductPriceHistory

    (

    ProductID,

    ProductPrice,

    UserName,

    DateCreated

    )

    SELECT

    ProductID,

    ProductPrice,

    SYSTEM_USER,

    SYSDATETIME()

    FROM inserted;

    ```

    Listing 2-37

    Creating After Insert or Deleting a DML Trigger


    When a record is inserted or deleted in the `dbo.Product` table, the new product
    price and the date the price was changed will be recorded in the `dbo.ProductPriceHistory`
    table. To determine the performance of this trigger, test this trigger by running
    the code in Listing [2-38](#480547_2_En_2_Chapter.xhtml#PC38).


    ```sql

    INSERT INTO dbo.Product (ProductName, ProductPrice)

    VALUES (''Disk Golf Disk - Small'', 7.99);

    ```

    Listing 2-38

    Query to Insert Record into Product


    When executing the preceding code, the execution plan includes two steps. The
    first is to run the code to insert the record into `dbo.Product`. The second execution
    plan shows the plan for the insert that occurs due to the trigger. The execution
    plans generated from Listing [2-38](#480547_2_En_2_Chapter.xhtml#PC38) are in
    Figure [2-22](#480547_2_En_2_Chapter.xhtml#Fig22).


    ![](images/480547_2_En_2_Chapter/480547_2_En_2_Fig22_HTML.jpg)


    A flow diagram. In Query 1, T S Q L has a cost of 0% from clustered index insert,
    compute scalar twice, and constant scan. Query 2 has inserted scn instead of constant
    scan. Query 1 percentage = 43, and query 2 percentage = 57.


    Figure 2-22

    Execution plans to insert a record with a trigger


    The execution plans in Figure [2-22](#480547_2_En_2_Chapter.xhtml#Fig22) shows
    what happens when a record is modified in a way to fire the trigger. However,
    the T-SQL code `IF (ROWCOUNT_BIG() = 0) RETURN;` from Listing [2-35](#480547_2_En_2_Chapter.xhtml#PC35)
    prevents the DML trigger from firing if no records were updated. This is considered
    a best practice to minimize resource utilization on the server when no actions
    are needed. Listing [2-39](#480547_2_En_2_Chapter.xhtml#PC39) shows an update
    query where no records will be updated.


    ```sql

    DELETE FROM dbo.Product

    WHERE ProductID = 500;

    ```

    Listing 2-39

    Delete Statement That Will Not Update Any Records


    As shown in Figure [2-23](#480547_2_En_2_Chapter.xhtml#Fig23), the execution plan
    only has one step. That is the execution plan for the deletion of the data. There
    is no T-SQL code execution from the trigger.


    ![](images/480547_2_En_2_Chapter/480547_2_En_2_Fig23_HTML.jpg)


    A flow diagram. Delete product where product I D = at 1. They originate from clustered
    index delete and clustered index scan. Query 1 percentage = 100.


    Figure 2-23

    Execution plan where no records are updated


    SQL Server was aware that there were no records to update returned from the trigger.
    Without attempting to insert any records into the `dbo.ProductPriceHistory` table,
    the only action was to generate an execution plan for the delete.'
