    You can combine source control with testing strategies, discussed in Chapter [12](#480547_2_En_12_Chapter.xhtml),
    and automated software releases. This will allow you to minimize the manual effort
    needed for code reviews, which may help business relationships between IT departments.
    Using similar processes to manage database code as application development can
    help increase source control adoption. When T-SQL code is stored in source control,
    this opens up the possibility of pointing third-party tools at it. These tools
    can analyze an entire T-SQL codebase and help automate tasks such as automatically
    rejecting or correcting formatting issues.


    Tip


    One method of automating code formatting is through the use of precommit hooks
    with Git


    Another advantage of source control is it allows you to have one more tool to
    help in the case of disaster recovery. If you lose all your hardware and backups,
    how long will it take you to get your business up and running again? While you
    may know that your backups need to be tested on a regular basis, you may not have
    had the opportunity to test them lately. Depending on how your company developed
    its disaster recovery plan and what happens when disaster strikes could mean you
    lose access to your current Production servers and all the associated data. If
    this unlikely situation happens, you may find yourself wondering how you will
    get your applications running again. As a plan of last resort, if your databases
    are in source control along with the necessary data in your base tables, you have
    a chance of getting your company’s systems up and running.'
  trans: '

    你可能需要一个能够修改代码、测试代码并重复此过程直到获得期望输出的环境。源代码控制可以将最近保存的 `T-SQL` 代码拉取到你的本地机器。然后你可以在本地桌面上对
    `T-SQL` 代码进行修改。当你准备好保存工作时，可以将这些更改保存在本地。这样你就可以独立于其他开发者工作。当你确认更改无误后，可以将你的 `T-SQL`
    代码保存到中央位置。这个集中的仓库就成为你所有数据库更改的来源。


    使用源代码控制的另一个好处是，它能加速识别哪些 `T-SQL` 代码发生了变化。在使用源代码控制之前，我不得不手动审查整个数据库对象以确认变更内容。我发现的最佳流程是目视比较当前的生产环境存储过程与新版本的存储过程。虽然这种方法有一定效果，但我仍可能轻易忽略某些内容。


    将数据库纳入源代码控制后，我可以轻松查看脚本审查中所有发生变化的代码。这使我能够快速浏览所有变更的 `T-SQL` 代码。我还可以使用源代码控制轻松地将 `T-SQL`
    代码与之前的版本进行比较。在比较过程中，被修改的代码部分会被高亮显示。更有帮助的是，新增、修改或删除的代码会以两种不同的颜色高亮显示。


    能够访问你的 `T-SQL` 代码，可以更轻松、更快速地为软件发布准备脚本。源代码控制还有助于防止未经批准的 `T-SQL` 代码被错误部署。如果没有用于
    `T-SQL` 的源代码控制，准备部署工作可能会很麻烦。


    你需要能够访问不同数据库和软件版本的脚本，同时还要跟踪随时间发生的变化。业务方可能决定回退到代码的某个先前版本。当该代码保存在源代码控制中时，更容易搜索特定数据库对象的各个版本并找到变更历史。借助源代码控制，我可以通过查找变更实施的时间来节省时间。如果你实施了自动化部署（如第
    13 章所讨论的），你可能有更快捷的方法来回退到代码的先前版本。


    你可以将源代码控制与第 12 章讨论的测试策略以及自动化软件发布相结合。这将使你能够最大限度地减少代码审查所需的人工工作，这可能有助于改善 IT 部门之间的业务关系。使用类似管理数据库代码的流程与应用程序开发流程，可以有助于提高源代码控制的采用率。当
    `T-SQL` 代码存储在源代码控制中时，就为指向第三方工具打开了可能性。这些工具可以分析整个 `T-SQL` 代码库，并帮助自动化任务，例如自动拒绝或修正格式问题。


    > **提示**

    >

    > 自动化代码格式化的一种方法是结合 `Git` 使用 `precommit hooks`。


    源代码控制的另一个优势是，它为你多提供了一个工具，在灾难恢复情况下提供帮助。如果你丢失了所有硬件和备份，需要多长时间才能让业务重新运转？虽然你可能知道备份需要定期测试，但你可能最近没有机会进行测试。根据贵公司制定灾难恢复计划的方式以及灾难发生时的情况，这可能意味着你将无法访问当前的生产服务器及其所有相关数据。如果发生这种不太可能的情况，你可能会发现自己需要思考如何让应用程序重新运行起来。作为最后的手段，如果你的数据库与基础表中必要的数据都存放在源代码控制中，那么你就有机会让公司的系统重新启动并运行。

    '
- fmt: '## How to Use Source Control


    One of the things I found out when first implementing source control was the discussions
    that needed to happen internally prior to implementing source control. I found
    that the database team, the development teams, and the QA teams needed to come
    to an agreement as to how code would be managed going forward. It is ideal to
    learn each team''s goals and needs so that you can design an effective process
    to manage database code. There may be differences in how each team wants to manage
    their respective codebases. Some things to cover are


    *   Guidelines for when to use local vs. centralized repositories

    *   How to save your changes to source control

    *   How to resolve bugs that have been deployed

    *   What should be included with your database code


    Source control allows you to work with code locally on your machine. You can create
    database objects or change database objects, and when you build the code locally,
    you have an additional check that the database project can build successfully.
    A successful build indicates that several checks have been run against the database
    to confirm that objects can be created successfully. Once you have tested and
    confirmed your database code, you can check it into a centralized location. The
    location can either be a server you have set up on-premises or in the cloud, such
    as the case with `GitHub`. This central repository can receive code changes from
    you and any other members of your team that are authorized to make changes to
    this database project. In addition, a repository can allow developers or development
    teams to work on code independently of one another.


    Saving changes to `T-SQL` code locally is often referred to as a `commit`. When
    committing code, you can add comments to your commit. You can also implement standards
    as to how your commit messages should be written. One example is to precede the
    commit message with a ticket or user story number. Once a central repository is
    set up, individual users can make a copy of the centralized code. This copy is
    usually stored locally on the developer''s machine and is called a `branch`. This
    name stems from the centralized code, which is referred to as a `trunk`. In modern
    terminology, this is called the `main branch`. Adding a reference to the issue
    worked can be helpful when preparing branches for software releases. `Git` and
    `GitHub` allow you to save changes before they are committed permanently to the
    repository. `Staging changes` is the term for when you save changes that are not
    immediately committed to the repository. Staging changes for your commit can be
    done through `Azure Data Studio` or the command line.


    With the desire for more companies to allow any combination of Agile, Kanban,
    Scrum, Continuous Integration, or Continuous Delivery, it has become increasingly
    important to have a source control solution that is more flexible. This solution
    needs to allow for multiple teams to simultaneously work on the same code base
    without negatively affecting software releases. That is where the popularity of
    `Git` originates.


    If you are using `SQL Server Data Tools` and `Visual Studio`, each code repository
    will contain at least one database solution. Within the database solution, each
    database will have a single database project. You have the option of choosing
    if each database project will have its own solution or if all projects will share
    the same solution. `Azure Data Studio` or `Visual Studio Code` has an extension
    for database projects. These database projects live within a workspace and are
    similar to a solution. The workspace provides a way to access the database projects
    within a given folder. It is possible to have all applications and databases in
    the same solution, but that is outside the scope of this book. These decisions
    are not only based on preference and desired functionality. As you will see in
    Chapter 13, how you organize your repository will also determine how your code
    is deployed.


    Inside of the repository, there is the concept of one or more branches. One branch
    is the main branch. Think of it similarly to the set of code you regularly go
    to if you need to deploy these changes. This branch is called the main. Any time
    you want to make changes to the main branch, it is generally best to create a
    new branch to write your `T-SQL` code. This allows the main branch to remain unaffected
    by code that is in development and is not ready to be deployed. In this way, the
    main branch can match the code that is currently deployed to Production.


    As these commits happen per branch, you may find yourself in a situation where
    you need to deploy two different branches during the same deployment. This is
    when you will want to try to combine this code. In order to combine this code,
    take the changes in the branch and add them back to the main or release branch.
    Combining a feature branch to the main branch is called a `merge`. One aspect
    that can happen as part of this merge is called a `conflict`. This can happen
    when many people have been working on the same database object over the same period
    of time or there has been a delay in merging a previous feature branch with the
    main branch. Make sure to work with your development teams to get a better understanding
    of how to avoid merge conflicts and how they can be resolved.'
