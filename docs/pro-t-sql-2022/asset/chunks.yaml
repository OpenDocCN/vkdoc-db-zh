- fmt: '## DATETIME2


    The `DATETIME2` data type supports multiple numeric and alphabetical ways to display
    the information. The date range for `DATETIME` is from `1753-01-01` to `2999-11-31`
    and the time range is from `00:00:00` to `23:59:59.9999999`. Multiple precision
    options are allowed, causing the character length to range from `19` for the precision
    to the second all the way up to `27` for the precision to `0.0000001` nanoseconds.


    The variation in the precision also affects the storage size of the `DATETIME2`
    data type. One byte is used to store the precision of `DATETIME2` plus the number
    of bytes needed depending on the precision of time. If the precision is less than
    three decimal places for nanoseconds, then there are another `6` bytes used to
    store the `DATETIME2` value. If the precision is `3` or `4`, there is `1` byte
    to store the precision and `7` bytes to store the value, for a total of `8` bytes.
    However, the total is `9` bytes for any values with a precision of more than four
    decimal places.


    Due to the high level of accuracy, the probability of converting values to `DATETIME2`
    is highly likely. If a date is converted to `DATETIME2`, the time component will
    be recorded as `00:00:00`. If time is converted to `DATETIME2`, the day will be
    `1900-01-01`. In the case of `SMALLDATETIME` to `DATETIME2`, the date and time
    will be copied. Any additional precision will be represented with `0`s. When going
    from `DATETIME` to `DATETIME2`, make sure to use explicit conversions to avoid
    unexpected results. The main limitation of using `DATETIME2` is that the data
    type is not time zone aware or Daylight Savings Time aware.


    ## DATETIMEOFFSET


    It is common for businesses to operate across multiple time zones. The final data
    type for dates and times is `DATETIMEOFFSET`. Offset is used to refer to the concept
    of a time zone. When discussing `DATETIMEOFFSET`, there is some additional functionality
    that has not been presented before with the other data types. There are also things
    to keep in mind when formatting, storing, or converting to this data type.


    The `DATETIMEOFFSET` data type records the specific date and time, with a high
    level of accuracy, for transactions or actions that have taken place. One of the
    key advantages of this data type is the ability to have an offset on the time,
    thus allowing databases from multiple geographic locations to not only be aware
    of when something happened in relation to their local time but also in relation
    to local time at another location.


    The `DATETIMEOFFSET` is accurate to `100` nanoseconds and has a default value
    of `1900-01-01 00:00:00`. The format of `DATETIMEOFFSET` is `YYYY-MM-DD hh:mm:ss.nnnnnnn
    +|– hh:mm`. The `+|– hh:mm` portion of this data type is related to the offset.
    The offset can range from `+14` to `–14` for the number of hours that a given
    time can have an offset. As with the other time and `DATETIME` data types, this
    date can be formatted or displayed numerically or alphabetically.


    The dates can range from `0001-01-01` to `2999-12-31`. The time that can be saved
    ranges from `00:00:00` to `23:59:59.9999999`. When the precision is saved as `YYYY-MM-DD
    hh:mm:ss {+|–} hh:mm`, the character length is `26`. The character length can
    go up to `34` when the precision is `YYYY-MM-DD hh:mm:ss.0000000 {+|–} hh:mm`.
    The storage space required for the `DATETIMEOFFSET` data type is a fixed `10`
    bytes. A `DATETIMEOFFSET` value can be very easily converted from the time zone
    in which it is stored to any other time zone. Going from `DATETIMEOFFSET` to `DATETIME2`
    will cause the time zone to be truncated.


    ## Other Data Types


    In addition to the data types discussed, SQL Server has several other data types.
    Some of these data types can be used in table definition and may have special
    purposes, while others may only be usable as variables or inside stored procedures.


    ### UNIQUEIDENTIFIER


    The `UNIQUEIDENTIFIER` data type can be a column in a table or used as a variable.
    The `UNIQUEIDENTIFIER` takes up `16` bytes, and the maximum number of characters
    that can be stored in this data type is `36`. While non-Unicode character strings
    can be converted to `UNIQUEIDENTIFIER`, if the total number of characters exceeds
    `36`, those results will be truncated.


    This data type is a `GUID`, or Globally Unique Identifier. The concept is that
    these unique values will only ever be used once. However, there have been reports
    of this not being true. Either way, the `UNIQUEIDENTIFIER` can be populated one
    of several ways. These include using the functions `NEWID()` and `NEWSEQUENTIALID()`.
    Otherwise, these values can be manually populated if the overall format of the
    `GUID` is correct and uses valid hexadecimal values of `0–9` and `a–f`.


    While the `UNIQUEIDENTIFIER` can be used in place of `IDENTITY`, I only recommend
    it for scenarios where it is absolutely required. Not only does it take up significantly
    more space than an `INT` or `BIGINT`, but `UNIQUEIDENTIFIER` is limited in the
    types of constraints that can be used with this data type. `UNIQUEIDENTIFER` can
    be an `IDENTITY` but other table constraints are not allowed.


    ### XML


    Various systems and applications send, use, or store `XML` data. While there is
    the option to parse this data and save it in tables, there are also times when
    it may be necessary to store the `XML` data intact. It is important to note that
    `XML` is conceptually a `NVARCHAR(MAX)` data type with special rules. When storing
    `XML` data, there are other considerations that include what data is in the `XML`.


    For the `XML` data type, the data must be in a valid `XML` format. In order to
    be valid, there are several requirements. All starting tags must have matching
    end tags. In addition, nested elements must begin and end within the same parent
    element. `XML` elements cannot have more than one attribute, and markup characters
    must be properly specified. If the `XML` data meets all the preceding requirements,
    then the `XML` data is considered well-formed. If you can’t follow those rules
    but really want to store your `XML` you can use `NVARCHAR(MAX)`.


    The total amount of stored `XML` data allowed is limited to `2 GB`. That data
    can have non-Unicode or Unicode data. Sometimes `XML` data follows a set guideline
    and has specified data types. In this scenario, the `XML` data may have a defined
    `XML` schema. For `XML` data that has a schema, the `XML` can be considered typed.
    Often typed `XML` data will take up less space, and there may be additional functionality
    with the data that is stored. However, a limitation of this typed `XML` is that
    the `XML` must pass validation. If untyped `XML` data is chosen, the data does
    not have to be validated and may not be assigned a schema.


    ### Spatial Geometry Types


    When working with data, you may want to store various shapes in your database.
    While this is not a common request, there is an available data type that can be
    used to store shapes or drawings based on flat maps.


    This data type can support several format instances including points, lines, circular
    lines, curves, polygons, curved polygons, multiple points, multiple strings, multiple
    polygons, and a collection of any or none of these objects. This data type can
    be used to create a map of a retail store or a map showing where delivery drivers
    should park to deliver or pick up goods.'
  raw: 'The DATETIME2 data type supports multiple numeric and alphabetical ways to
    display the information. The date range for DATETIME is from 1753-01-01 to 2999-11-31
    and the time range is from 00:00:00 to 23:59:59.9999999. Multiple precision options
    are allowed, causing the character length to range from 19 for the precision to
    the second all the way up to 27 for the precision to 0.0000001 nanoseconds.


    The variation in the precision also affects the storage size of the DATETIME2
    data type. One byte is used to store the precision of DATETIME2 plus the number
    of bytes needed depending on the precision of time. If the precision is less than
    three decimal places for nanoseconds, then there are another 6 bytes used to store
    the DATETIME2 value. If the precision is 3 or 4, there is 1 byte to store the
    precision and 7 bytes to store the value, for a total of 8 bytes. However, the
    total is 9 bytes for any values with a precision of more than four decimal places.


    Due to the high level of accuracy, the probability of converting values to DATETIME2
    is highly likely. If a date is converted to DATETIME2, the time component will
    be recorded as 00:00:00\. If time is converted to DATETIME2, the day will be 1900-01-01\.
    In the case of SMALLDATETIME to DATETIME2, the date and time will be copied. Any
    additional precision will be represented with 0s. When going from DATETIME to
    DATETIME2, make sure to use explicit conversions to avoid unexpected results.
    The main limitation of using DATETIME2 is that the data type is not time zone
    aware or Daylight Savings Time aware.


    It is common for businesses to operate across multiple time zones. The final data
    type for dates and times is DATETIMEOFFSET. Offset is used to refer to the concept
    of a time zone. When discussing DATETIMEOFFSET, there is some additional functionality
    that has not been presented before with the other data types. There are also things
    to keep in mind when formatting, storing, or converting to this data type.


    The DATETIMEOFFSET data type records the specific date and time, with a high level
    of accuracy, for transactions or actions that have taken place. One of the key
    advantages of this data type is the ability to have an offset on the time, thus
    allowing databases from multiple geographic locations to not only be aware of
    when something happened in relation to their local time but also in relation to
    local time at another location.


    The DATETIMEOFFSET is accurate to 100 nanoseconds and has a default value of 1900-01-01
    00:00:00\. The format of DATETIMEOFFSET is YYYY-MM-DD hh:mm:ss.nnnnnnn +|– hh:mm.
    The +|– hh:mm portion of this data type is related to the offset. The offset can
    range from +14 to –14 for the number of hours that a given time can have an offset.
    As with the other time and DATETIME data types, this date can be formatted or
    displayed numerically or alphabetically.


    The dates can range from 0001-01-01 to 2999-12-31\. The time that can be saved
    ranges from 00:00:00 to 23:59:59.9999999\. When the precision is saved as YYYY-MM-DD
    hh:mm:ss {+|–} hh:mm, the character length is 26. The character length can go
    up to 34 when the precision is YYYY-MM-DD hh:mm:ss.0000000 {+|–} hh:mm. The storage
    space required for the DATETIMEOFFSET data type is a fixed 10 bytes. A DATETIMEOFFSET
    value can be very easily converted from the time zone in which it is stored to
    any other time zone. Going from DATETIMEOFFSET to DATETIME2 will cause the time
    zone to be truncated.


    ## Other Data Types


    In addition to the data types discussed, SQL Server has several other data types.
    Some of these data types can be used in table definition and may have special
    purposes, while others may only be usable as variables or inside stored procedures.


    ### UNIQUEIDENTIFIER


    The UNIQUEIDENTIFIER data type can be a column in a table or used as a variable.
    The UNIQUEIDENTIFIER takes up 16 bytes, and the maximum number of characters that
    can be stored in this data type is 36\. While non-Unicode character strings can
    be converted to UNIQUEIDENTIFIER, if the total number of characters exceeds 36,
    those results will be truncated.


    This data type is a GUID, or Globally Unique Identifier. The concept is that these
    unique values will only ever be used once. However, there have been reports of
    this not being true. Either way, the UNIQUEIDENTIFIER can be populated one of
    several ways. These include using the functions NEWID() and NEWSEQUENTIALID().
    Otherwise, these values can be manually populated if the overall format of the
    GUID is correct and uses valid hexadecimal values of 0–9 and a–f.


    While the UNIQUEIDENTIFIER can be used in place of IDENTITY, I only recommend
    it for scenarios where it is absolutely required. Not only does it take up significantly
    more space than an INT or BIGINT, but UNIQUEIDENTIFIER is limited in the types
    of constraints that can be used with this data type. UNIQUEIDENTIFER can be an
    IDENTITY but other table constraints are not allowed.


    ### XML


    Various systems and applications send, use, or store XML data. While there is
    the option to parse this data and save it in tables, there are also times when
    it may be necessary to store the XML data intact. It is important to note that
    XML is conceptually a NVARCHAR(MAX) data type with special rules. When storing
    XML data, there are other considerations that include what data is in the XML.


    For the XML data type, the data must be in a valid XML format. In order to be
    valid, there are several requirements. All starting tags must have matching end
    tags. In addition, nested elements must begin and end within the same parent element.
    XML elements cannot have more than one attribute, and markup characters must be
    properly specified. If the XML data meets all the preceding requirements, then
    the XML data is considered well-formed. If you can’t follow those rules but really
    want to store your XML you can use NVARCHAR(MAX).


    The total amount of stored XML data allowed is limited to 2 GB. That data can
    have non-Unicode or Unicode data. Sometimes XML data follows a set guideline and
    has specified data types. In this scenario, the XML data may have a defined XML
    schema. For XML data that has a schema, the XML can be considered typed. Often
    typed XML data will take up less space, and there may be additional functionality
    with the data that is stored. However, a limitation of this typed XML is that
    the XML must pass validation. If untyped XML data is chosen, the data does not
    have to be validated and may not be assigned a schema.


    ### Spatial Geometry Types


    When working with data, you may want to store various shapes in your database.
    While this is not a common request, there is an available data type that can be
    used to store shapes or drawings based on flat maps.


    This data type can support several format instances including points, lines, circular
    lines, curves, polygons, curved polygons, multiple points, multiple strings, multiple
    polygons, and a collection of any or none of these objects. This data type can
    be used to create a map of a retail store or a map showing where delivery drivers
    should park to deliver or pick up goods.'
  trans: '

    ## DATETIME2


    `DATETIME2` 数据类型支持多种数字和字母方式来显示信息。`DATETIME` 的日期范围是从 `1753-01-01` 到 `2999-12-31`，时间范围是从
    `00:00:00` 到 `23:59:59.9999999`。允许使用多种精度选项，导致字符长度从表示秒精度的 `19` 个字符，一直到表示 `0.0000001`
    纳秒精度的 `27` 个字符不等。


    精度的变化也会影响 `DATETIME2` 数据类型的存储大小。使用一个字节来存储 `DATETIME2` 的精度，并根据时间的精度额外存储所需数量的字节。如果精度低于纳秒的小数点后三位，则需要额外
    `6` 个字节来存储 `DATETIME2` 值。如果精度为 `3` 或 `4`，则使用 `1` 个字节存储精度和 `7` 个字节存储值，总共 `8` 个字节。然而，对于任何精度超过小数点后四位的值，总存储空间为
    `9` 个字节。


    由于其高精度，将值转换为 `DATETIME2` 的可能性很高。如果日期转换为 `DATETIME2`，时间部分将被记录为 `00:00:00`。如果时间转换为
    `DATETIME2`，日期将是 `1900-01-01`。在将 `SMALLDATETIME` 转换为 `DATETIME2` 的情况下，日期和时间将被复制。任何额外的精度将用
    `0` 表示。当从 `DATETIME` 转换为 `DATETIME2` 时，请务必使用显式转换以避免意外结果。使用 `DATETIME2` 的主要限制在于该数据类型不感知时区或夏令时。


    ## DATETIMEOFFSET


    企业跨多个时区运营很常见。日期和时间的最后一种数据类型是 `DATETIMEOFFSET`。偏移量用于指代时区的概念。在讨论 `DATETIMEOFFSET`
    时，有一些其他数据类型此前未曾呈现的附加功能。在格式化、存储或转换为此数据类型时，也有一些事项需要注意。


    `DATETIMEOFFSET` 数据类型记录了已发生事务或操作的具体日期和时间，并具有高精度。该数据类型的关键优势之一是能够对时间设置偏移量，从而允许多个地理位置的数据库不仅知道某事相对于其本地时间发生的时间，还能知道相对于另一地点本地时间的发生时间。


    `DATETIMEOFFSET` 精确到 `100` 纳秒，默认值为 `1900-01-01 00:00:00`。`DATETIMEOFFSET` 的格式为
    `YYYY-MM-DD hh:mm:ss.nnnnnnn +|– hh:mm`。此数据类型的 `+|– hh:mm` 部分与偏移量相关。给定时间的偏移量范围可以是
    `+14` 到 `–14` 小时。与其他时间和 `DATETIME` 数据类型一样，此日期可以按数字或字母方式格式化或显示。


    日期范围可以从 `0001-01-01` 到 `2999-12-31`。可以保存的时间范围是从 `00:00:00` 到 `23:59:59.9999999`。当精度保存为
    `YYYY-MM-DD hh:mm:ss {+|–} hh:mm` 时，字符长度为 `26`。当精度为 `YYYY-MM-DD hh:mm:ss.0000000
    {+|–} hh:mm` 时，字符长度可达 `34`。`DATETIMEOFFSET` 数据类型所需的存储空间是固定的 `10` 字节。`DATETIMEOFFSET`
    值可以非常轻松地从其存储的时区转换到任何其他时区。从 `DATETIMEOFFSET` 转换到 `DATETIME2` 将导致时区信息被截断。


    ## 其他数据类型


    除了讨论的数据类型外，SQL Server 还有其他几种数据类型。其中一些数据类型可用于表定义并可能有特殊用途，而另一些可能仅可用作变量或在存储过程内部使用。


    ### UNIQUEIDENTIFIER


    `UNIQUEIDENTIFIER` 数据类型可以是表中的列，也可以用作变量。`UNIQUEIDENTIFIER` 占用 `16` 字节，此数据类型可存储的最大字符数为
    `36`。虽然非 Unicode 字符串可以转换为 `UNIQUEIDENTIFIER`，但如果总字符数超过 `36`，那些结果将被截断。


    此数据类型是 `GUID`，即全局唯一标识符。其概念是这些唯一值将只被使用一次。然而，已有报告表明情况并非总是如此。无论如何，`UNIQUEIDENTIFIER`
    可以通过几种方式填充。这包括使用函数 `NEWID()` 和 `NEWSEQUENTIALID()`。否则，如果 `GUID` 的总体格式正确并使用 `0–9`
    和 `a–f` 的有效十六进制值，也可以手动填充这些值。


    虽然 `UNIQUEIDENTIFIER` 可以替代 `IDENTITY`，但我只建议在绝对需要的情况下使用。它不仅比 `INT` 或 `BIGINT` 占用多得多的空间，而且
    `UNIQUEIDENTIFIER` 在可与其一起使用的约束类型方面也有限制。`UNIQUEIDENTIFER` 可以是 `IDENTITY`，但不允许其他表约束。


    ### XML


    各种系统和应用程序发送、使用或存储 `XML` 数据。虽然可以选择解析此数据并将其保存在表中，但有时也可能需要完整地存储 `XML` 数据。重要的是要注意，`XML`
    在概念上是一个具有特殊规则的 `NVARCHAR(MAX)` 数据类型。存储 `XML` 数据时，还有其他考虑因素，包括 `XML` 中包含什么数据。


    对于 `XML` 数据类型，数据必须是有效的 `XML` 格式。为了有效，有几个要求。所有开始标签必须有匹配的结束标签。此外，嵌套元素必须在同一个父元素内开始和结束。`XML`
    元素不能有多个属性，并且必须正确指定标记字符。如果 `XML` 数据满足所有上述要求，则该 `XML` 数据被认为是结构良好的。如果无法遵循这些规则但确实想存储
    `XML`，可以使用 `NVARCHAR(MAX)`。


    允许存储的 `XML` 数据总量限制为 `2 GB`。该数据可以包含非 Unicode 或 Unicode 数据。有时 `XML` 数据遵循一组准则并具有指定的数据类型。在这种情况下，`XML`
    数据可能具有定义的 `XML` 架构。对于具有架构的 `XML` 数据，该 `XML` 可被视为类型化的。通常类型化的 `XML` 数据占用的空间更少，并且存储的数据可能具有附加功能。然而，这种类型化
    `XML` 的一个限制是它必须通过验证。如果选择非类型化 `XML` 数据，则数据无需验证，并且可能不会被分配架构。


    ### 空间几何类型


    处理数据时，您可能希望在数据库中存储各种形状。虽然这不是常见需求，但有一种可用的数据类型可用于存储基于平面地图的形状或绘图。


    此数据类型可以支持多种格式实例，包括点、线、圆形线、曲线、多边形、曲面多边形、多点多线、多线、多面以及这些对象中任意或全部对象的集合。此数据类型可用于创建零售店地图或显示送货司机应停在哪里装卸货物的地图。

    '
- fmt: '## Spatial Geography Types


    While you may want to save shapes in SQL Server using a flat-Earth method, there
    are other times when it is necessary to store information based on the shape of
    the Earth. In these cases, using the `geography` data type is preferable. Use
    this data type for countries, roads, or maps where longitude and latitude are
    important.


    Like the `geometry` data type, the `geography` data type supports several options.
    These options include all the same types as the `geometry` data type including
    points, lines, circular lines, curves, polygons, curved polygons, multiple points,
    multiple strings, multiple polygons, and a collection of any or none of these
    shapes. However, the `geography` data type also supports the full globe instance.
    The spatial geography type can allow you to create a shape that identifies when
    a delivery driver has arrived at the target location. This data type can also
    be used to identify all retail stores within a specified range of one another.
    This can allow customers to easily know which locations are within a set driving
    distance of their usual store.


    ## SQL_VARIANT


    The `sql_variant` data type is used internally by SQL Server, and that is where
    the data type should remain. While not a data type that you should use in your
    own databases, I do want to go over what this data type in case you want to learn
    more about it.


    The `sql_variant` data type stores various data types in the same column. You
    can insert data directly into the column or cast the data as a specific data type.
    If you do not specify the data type at the time of the insert, `sql_variant` will
    try to determine the correct data type. This can cause data to be stored differently
    than expected. While `sql_variant` does seem to choose well with numbers, there
    are cases where dates may be stored as `VARCHAR(8000)` if the data type is not
    specified.


    The way data in a `sql_variant` column is ordered also differs from other data
    types. `sql_variant` groups data into like types called data type families. These
    data type families have their own order, and values with data types in higher
    families are considered greater than values in lower families. If a data that
    is being compared exists in same family, `sql_variant` will implicitly convert
    the data type that is lower to the data type that is higher and then complete
    the comparison.


    ## ROWVERSION


    There are instances when you may want to know when an action happened to a table.
    While there are some methods that can be used to track database changes, there
    is also a specific data type that can be used to record when a record has been
    updated.


    The `rowversion` data type allows you to get a relative idea of when a specific
    record or set of records was updated. This value neither has a date nor a time
    component but is a binary value. `rowversion` can be compared to other `rowversion`
    values or to the current `rowversion` value in the database. You can create a
    table that has a column named `RowVersion` with the type `rowversion`. Upon inserting
    a record, the `ROWVERSION` column may be updated to have the value `0x00000000000007D1`.
    You can update one of the columns in the same row, and the `ROWVERSION` column
    may be updated to `0x00000000000007D2`. While you can tell a change has happened,
    you cannot determine when the change happened or determine what was changed.


    > **Note**

    >

    > The `rowversion` value is incremented at the database level. Any insert or update
    associated with a row having a `rowversion` data type will increment the `rowversion`
    value for the database.

    >

    > Therefore, the `rowversion` values for a given table may appear to be missing
    records in the sequence. However, these records may be saved in a different table.


    When storing the `rowversion` value, the total storage space required is 8 bytes.
    You can specify if `rowversion` should be either non-nullable or nullable. If
    the column is not nullable, then the column will act similarly to `binary(8)`.
    Otherwise, the column will behave similarly to `varbinary(8)`. Only one `rowversion`
    column can be added per table. This column is updated systematically any time
    one or more rows is inserted or updated.


    ## HIERARCHYID


    Sometimes data has an ordered relationship to a different data record in the same
    table. Oftentimes this has to do with data that is a parent or child of other
    data. A very common scenario is a table that stores all employees for an organization.
    A `hierarchyid` column can be added, allowing the organizational structure between
    employees to be saved and accessible to an application. Another possibility is
    a product table where some products in the table are components of other products.


    For these scenarios, the `hierarchyid` may be useful to help categorize how data
    is interrelated. The data type `hierarchyid` is limited to 892 bytes. However,
    this data type is a system data type with a variable length. Even though this
    data type is a system data type, the application using this data type is responsible
    for determining the correct hierarchy that should be stored.


    ## Table


    A special data type is the `table` data type. This data type is not part of a
    `CREATE TABLE` definition. Rather, this data type is either used as a variable,
    which is commonly referred to as a table variable, or is used to store values
    returned from a table-valued function. When you find yourself wanting to store
    data for later use, this may be a good data type to consider. However, there are
    some caveats and limitations to keep in mind with using tables as a data type.


    Usually, it is preferable to limit the use of table variables to scenarios where
    there will not be a significant amount of data returned. Historically, SQL Server
    has not accurately estimated the total number of rows in a table variable. In
    the past, it would estimate low. When your row count is low, you’re good to go.
    But if you put a lot of rows and the estimate is a few rows, the query plan can
    be poor. SQL Server 2019 made some updates to improve this fault in the query
    optimizer. Therefore, starting with SQL Server 2019 the database engine should
    give a better estimation when dealing with table variables going forward.


    While table variables can be used in stored procedures, batches, or functions,
    the table variable only exists for the duration of that object.


    > **Note**

    >

    > Batches are one or more SQL statements that are executed as a group. A single
    statement, like a stored procedure, can be considered a batch if there are multiple
    queries within the stored procedure. This is similar to when you have multiple
    queries in the SQL Server Management Studio (SSMS) and you select `F5` to have
    all queries execute at the same time. Adding semicolons after each query will
    also create a batch if there are two or more statements.


    In the case of functions or stored procedures, the table variable no longer exists
    after the function or stored procedure has completed executing. In the case of
    batches, the table will exist for the entirety of the batch. As table variables
    only persist for the entirety of an update, using them may decrease the locks
    required as part of an update.


    Another limitation of tables as data types is that there are no statistics generated
    on the table variable. This also means that using indexes with table variables
    is very limited. Some indexes can be included when creating a table variable.'
  raw: '### Spatial Geography Types


    While you may want to save shapes in SQL Server using a flat-Earth method, there
    are other times when it is necessary to store information based on the shape of
    the Earth. In these cases, using the geography data type is preferable. Use this
    data type for countries, roads, or maps where longitude and latitude are important.


    Like the geometry data type, the geography data type supports several options.
    These options include all the same types as the geometry data type including points,
    lines, circular lines, curves, polygons, curved polygons, multiple points, multiple
    strings, multiple polygons, and a collection of any or none of these shapes. However,
    the geography data type also supports the full globe instance. The spatial geography
    type can allow you to create a shape that identifies when a delivery driver has
    arrived at the target location. This data type can also be used to identify all
    retail stores within a specified range of one another. This can allow customers
    to easily know which locations are within a set driving distance of their usual
    store.


    ### SQL_VARIANT


    The SQL_VARIANT data type is used internally by SQL Server, and that is where
    the data type should remain. While not a data type that you should use in your
    own databases, I do want to go over what this data type in case you want to learn
    more about it.


    The SQL_VARIANT data type stores various data types in the same column. You can
    insert data directly into the column or cast the data as a specific data type.
    If you do not specify the data type at the time of the insert, SQL_VARIANT will
    try to determine the correct data type. This can cause data to be stored differently
    than expected. While SQL_VARIANT does seem to choose well with numbers, there
    are cases where dates may be stored as VARCHAR(8000) if the data type is not specified.


    The way data in a SQL_VARIANT column is ordered also differs from other data types.
    SQL_VARIANT groups data into like types called data type families. These data
    type families have their own order, and values with data types in higher families
    are considered greater than values in lower families. If a data that is being
    compared exists in same family, SQL_VARIANT will implicitly convert the data type
    that is lower to the data type that is higher and then complete the comparison.


    ### ROWVERSION


    There are instances when you may want to know when an action happened to a table.
    While there are some methods that can be used to track database changes, there
    is also a specific data type that can be used to record when a record has been
    updated.


    The ROWVERSION data type allows you to get a relative idea of when a specific
    record or set of records was updated. This value neither has a date nor a time
    component but is a binary value. ROWVERSION can be compared to other rowversion
    values or to the current rowversion value in the database. You can create a table
    that has a column named `RowVersion` with the type ROWVERSION. Upon inserting
    a record, the `ROWVERSION` column may be updated to have the value 0x00000000000007D1\.
    You can update one of the columns in the same row, and the `ROWVERSION` column
    may be updated to 0x00000000000007D2\. While you can tell a change has happened,
    you cannot determine when the change happened or determine what was changed.


    Note


    The ROWVERSION value is incremented at the database level. Any insert or update
    associated with a row having a ROWVERSION data type will increment the rowversion
    value for the database.


    Therefore, the rowversion values for a given table may appear to be missing records
    in the sequence. However, these records may be saved in a different table.


    When storing the rowversion value, the total storage space required is 8 bytes.
    You can specify if ROWVERSION should be either non-nullable or nullable. If the
    column is not nullable, then the column will act similarly to BINARY(8). Otherwise,
    the column will behave similarly to VARBINARY(8). Only one ROWVERSION column can
    be added per table. This column is updated systematically any time one or more
    rows is inserted or updated.


    ### HIERARCHYID


    Sometimes data has an ordered relationship to a different data record in the same
    table. Oftentimes this has to do with data that is a parent or child of other
    data. A very common scenario is a table that stores all employees for an organization.
    A HIERARCHYID column can be added, allowing the organizational structure between
    employees to be saved and accessible to an application. Another possibility is
    a product table where some products in the table are components of other products.


    For these scenarios, the HIERARCHYID may be useful to help categorize how data
    is interrelated. The data type HIERARCHYID is limited to 892 bytes. However, this
    data type is a system data type with a variable length. Even though this data
    type is a system data type, the application using this data type is responsible
    for determining the correct hierarchy that should be stored.


    ### Table


    A special data type is the table data type. This data type is not part of a CREATE
    TABLE definition. Rather, this data type is either used as a variable, which is
    commonly referred to as a table variable, or is used to store values returned
    from a table-valued function. When you find yourself wanting to store data for
    later use, this may be a good data type to consider. However, there are some caveats
    and limitations to keep in mind with using tables as a data type.


    Usually, it is preferable to limit the use of table variables to scenarios where
    there will not be a significant amount of data returned. Historically, SQL Server
    has not accurately estimated the total number of rows in a table variable. In
    the past, it would estimate low. When your row count is low, you’re good to go.
    But if you put a lot of rows and the estimate is a few rows, the query plan can
    be poor. SQL Server 2019 made some updates to improve this fault in the query
    optimizer. Therefore, starting with SQL Server 2019 the database engine should
    give a better estimation when dealing with table variables going forward.


    While table variables can be used in stored procedures, batches, or functions,
    the table variable only exists for the duration of that object.


    Note


    Batches are one or more SQL statements that are executed as a group. A single
    statement, like a stored procedure, can be considered a batch if there are multiple
    queries within the stored procedure. This is similar to when you have multiple
    queries in the SQL Server Management Studio (SSMS) and you select F5 to have all
    queries execute at the same time. Adding semicolons after each query will also
    create a batch if there are two or more statements.


    In the case of functions or stored procedures, the table variable no longer exists
    after the function or stored procedure has completed executing. In the case of
    batches, the table will exist for the entirety of the batch. As table variables
    only persist for the entirety of an update, using them may decrease the locks
    required as part of an update.


    Another limitation of tables as data types is that there are no statistics generated
    on the table variable. This also means that using indexes with table variables
    is very limited. Some indexes can be included when creating a table variable.'
  trans: '## 空间地理类型


    虽然有时你可能想在 SQL Server 中使用平面地球方法保存形状，但有时则需要根据地球的形状来存储信息。在这些情况下，使用 `geography` 数据类型更为可取。对于国家、道路或经度和纬度很重要的地图，请使用此数据类型。


    与 `geometry` 数据类型类似，`geography` 数据类型支持多种选项。这些选项包括与 `geometry` 数据类型相同的所有类型，包括点、线、圆弧线、曲线、多边形、曲线多边形、多点、多线、多多边形以及这些形状的任意或空集合。然而，`geography`
    数据类型还支持完整的球体实例。空间地理类型可以让你创建一个形状，用于识别配送司机何时到达目标位置。此数据类型也可用于识别在指定相互范围内所有零售店。这可以让顾客轻松知道哪些地点在他们常去门店的设定驾车距离内。


    ## SQL_VARIANT


    `sql_variant` 数据类型在 SQL Server 内部使用，它应该只用于此目的。虽然这不是你应在自己的数据库中使用的数据类型，但我还是想介绍一下它，以防你想了解更多。


    `sql_variant` 数据类型在同一个列中存储各种数据类型的数据。你可以直接将数据插入列中，或将数据转换为特定数据类型。如果在插入时未指定数据类型，`sql_variant`
    将尝试确定正确的数据类型。这可能导致数据存储方式与预期不同。虽然 `sql_variant` 在处理数字时似乎选择得不错，但在某些情况下，如果未指定数据类型，日期可能会被存储为
    `VARCHAR(8000)`。


    `sql_variant` 列中数据的排序方式也与其他数据类型不同。`sql_variant` 将数据按相似类型分组，称为数据类型族。这些数据类型族有各自的排序规则，数据类型在较高族中的值被认为大于在较低族中的值。如果要比较的数据存在于同一个族中，`sql_variant`
    会隐式地将较低的数据类型转换为较高的数据类型，然后完成比较。


    ## ROWVERSION


    有时你可能想知道表上的操作发生的时间。虽然有一些方法可以用于跟踪数据库更改，但也有一种特定的数据类型可用于记录记录何时被更新。


    `rowversion` 数据类型让你能够获得关于特定记录或记录集何时被更新的相对概念。此值既不包含日期也不包含时间组件，它是一个二进制值。`rowversion`
    可以与其他 `rowversion` 值或数据库中当前的 `rowversion` 值进行比较。你可以创建一个表，其中包含一个名为 `RowVersion`、类型为
    `rowversion` 的列。插入记录后，`ROWVERSION` 列可能会被更新为值 `0x00000000000007D1`。你可以更新同一行中的一列，`ROWVERSION`
    列可能会更新为 `0x00000000000007D2`。虽然你可以知道发生了变化，但无法确定变化发生的时间或具体改变了什么。


    > **注意**

    >

    > `rowversion` 值是在数据库级别递增的。任何与具有 `rowversion` 数据类型的行相关的插入或更新操作，都会增加该数据库的 `rowversion`
    值。

    >

    > 因此，给定表的 `rowversion` 值在序列中可能会看似缺失记录。然而，这些记录可能被保存在不同的表中。


    存储 `rowversion` 值所需的总存储空间为 8 字节。你可以指定 `rowversion` 应为非可空或可空。如果该列不可空，那么其行为类似于 `binary(8)`。否则，该列的行为类似于
    `varbinary(8)`。每个表只能添加一个 `rowversion` 列。每当插入或更新一行或多行时，此列会被系统性地更新。


    ## HIERARCHYID


    有时数据与同一表中的不同数据记录存在有序关系。这通常与作为其他数据的父项或子项的数据有关。一个非常常见的场景是存储组织中所有员工的表。可以添加一个 `hierarchyid`
    列，允许保存员工之间的组织结构，供应用程序访问。另一种可能性是产品表，其中表中的某些产品是其他产品的组件。


    对于这些场景，`hierarchyid` 可能有助于对数据的相互关联进行分类。数据类型 `hierarchyid` 限制为 892 字节。但是，此数据类型是系统数据类型，长度可变。尽管此数据类型是系统数据类型，但使用该数据类型的应用程序负责确定应存储的正确层次结构。


    ## TABLE


    一种特殊的数据类型是 `table` 数据类型。此数据类型不是 `CREATE TABLE` 定义的一部分。相反，此数据类型要么用作变量（通常称为表变量），要么用于存储从表值函数返回的值。当你发现自己需要存储数据以供以后使用时，这可能是一个值得考虑的好数据类型。但是，使用表作为数据类型时，有一些注意事项和限制需要牢记。


    通常，最好将表变量的使用限制在不会返回大量数据的场景中。历史上，SQL Server 未能准确估计表变量中的总行数。过去，它会低估。当你的行数较少时，没有问题。但如果你插入很多行，而估计只有几行，查询计划可能会很差。SQL
    Server 2019 对此查询优化器的缺陷进行了一些更新改进。因此，从 SQL Server 2019 开始，数据库引擎在处理表变量时应该能给出更好的估计。


    虽然表变量可用于存储过程、批处理或函数中，但表变量仅存在于该对象的持续期间内。


    > **注意**

    >

    > 批处理是一个或多个作为一组执行的 SQL 语句。如果存储过程中有多个查询，那么像存储过程这样的单条语句也可以被视为一个批处理。这类似于在 SQL Server
    Management Studio (SSMS) 中有多个查询，你选择 `F5` 让所有查询同时执行的情况。如果查询后有两条或多条语句，添加分号也会创建一个批处理。


    在函数或存储过程的情况下，函数或存储过程执行完毕后，表变量不再存在。在批处理的情况下，该表将存在整个批处理期间。由于表变量只在一个更新期间内持久存在，使用它们可能会减少更新所需的锁。


    表作为数据类型的另一个限制是，不会在表变量上生成统计信息。这也意味着使用表变量的索引非常有限。在创建表变量时可以包含一些索引。'
- fmt: '### Cursor


    Another data type that cannot be used as a column in a table is `cursor`. Overall,
    this data type can be very limited, but there are occasions when this is the best
    data type for the task. When considering this data type, it is best to understand
    the potential performance impact associated with using the `cursor` data type.


    The `cursor` data type is usually used as a variable. However, this data type
    can also be used as an output from a stored procedure. In either case, the `cursor`
    data type takes a set of data and interacts with each record row by row. Since
    the `cursor` data type can hold a set of data, it is also possible for this data
    type to have no data. This indicates that the `cursor` data type is nullable.


    This data type is most commonly created using `T-SQL`. Cursors can also be implemented
    using API (application programming interface) server cursors and client cursors,
    but both of these are outside the scope of this book. In order to create a cursor,
    a local variable must be declared as a `cursor`. Like other local variables, it
    is possible to either declare the `cursor` and populate values or declare the
    `cursor` and populate values using a `set` statement. Other functions used to
    create cursors can be used with this data type. They include `open`, `fetch`,
    `close`, `deallocate`, and `cursor_status`. In addition, there are system stored
    procedures that have `cursor` data types.


    One of the key factors in understanding the various data types available is knowing
    which data type to use. In some cases, using the correct data type may come down
    to saving space. Other times, using an incorrect data type can lead to significant
    performance issues. You also want to be consistent in how you use and reference
    your data types both in your `T-SQL` code and database objects. If SQL Server
    needs to compare two different types, it will need to convert at least one of
    the data types so that both data types are the same. This process is known as
    implicit conversion. The CPU cost associated with implicit conversion can be significant
    and should be avoided if possible. The best way to avoid implicit conversion is
    to use the same data types for fields that will be compared. The biggest challenge
    is that sometimes it takes several years to realize how an incorrect data type
    may be negatively impacting application performance.


    ### Database Objects


    You need to know more than just the right data types to write `T-SQL` that performs
    quickly and uses hardware efficiently. Data types will help you determine how
    your data should be stored, but the next step is to design the process to access
    that data. One of the largest benefits and drawbacks of using `T-SQL` is the number
    of options available to access data. This chapter was written with the expectation
    that you are already familiar with how to write `T-SQL` to read, insert, update,
    and delete data.


    In this chapter, I will discuss various methods that can be used to interact with
    your data. There are objects that allow you to pull information together consistently
    and quickly. You may also want a database object that performs small, quick actions
    and can reuse that code for multiple purposes. Some database objects can store
    information temporarily for reusability within the same batch or connection. Other
    database objects can perform actions as the result of activities on server or
    database objects. While `T-SQL` performs best with set-based activities, you may
    also find yourself needing to loop through data one record at a time.


    Depending on your purpose, one or more database objects may meet your needs. While
    each of these database objects has its place, there are pros and cons for when
    and how to use each of these objects. Throughout this chapter, I will walk through
    various scenarios showing both the positive and negative consequences of using
    each of these database objects. First, I will start by discussing views in `T-SQL`.


    #### Views


    What is a view? Like the definition of the word `view`, a view in `T-SQL` is a
    means of taking several different items and putting them together to form one
    cohesive image. A view is a `select` query that is saved with a new name called
    the view name. Users can query that view name and SQL Server will actually use
    the underlying predefined query. In this section, I will discuss some of the options
    available when using views. As with any tool, there are advantages to using views,
    and there are risks associated with views if they are used incorrectly.'
  raw: '### Cursor


    Another data type that cannot be used as a column in a table is cursor. Overall,
    this data type can be very limited, but there are occasions when this is the best
    data type for the task. When considering this data type, it is best to understand
    the potential performance impact associated with using the cursor data type.


    The cursor data type is usually used as a variable. However, this data type can
    also be used as an output from a stored procedure. In either case, the cursor
    data type takes a set of data and interacts with each record row by row. Since
    the cursor data type can hold a set of data, it is also possible for this data
    type to have no data. This indicates that the cursor data type is nullable.


    This data type is most commonly created using T-SQL. Cursors can also be implemented
    using API (application programming interface) server cursors and client cursors,
    but both of these are outside the scope of this book. In order to create a cursor,
    a local variable must be declared as a cursor. Like other local variables, it
    is possible to either declare the cursor and populate values or declare the cursor
    and populate values using a set statement. Other functions used to create cursors
    can be used with this data type. They include open, fetch, close, deallocate,
    and cursor_status. In addition, there are system stored procedures that have cursor
    data types.


    One of the key factors in understanding the various data types available is knowing
    which data type to use. In some cases, using the correct data type may come down
    to saving space. Other times, using an incorrect data type can lead to significant
    performance issues. You also want to be consistent in how you use and reference
    your data types both in your T-SQL code and database objects. If SQL Server needs
    to compare two different types, it will need to convert at least one of the data
    types so that both data types are the same. This process is known as implicit
    conversion. The CPU cost associated with implicit conversion can be significant
    and should be avoided if possible. The best way to avoid implicit conversion is
    to use the same data types for fields that will be compared. The biggest challenge
    is that sometimes it takes several years to realize how an incorrect data type
    may be negatively impacting application performance.


    # 2. Database Objects


    You need to know more than just the right data types to write T-SQL that performs
    quickly and uses hardware efficiently. Data types will help you determine how
    your data should be stored, but the next step is to design the process to access
    that data. One of the largest benefits and drawbacks of using T-SQL is the number
    of options available to access data. This chapter was written with the expectation
    that you are already familiar with how to write T-SQL to read, insert, update,
    and delete data.


    In this chapter, I will discuss various methods that can be used to interact with
    your data. There are objects that allow you to pull information together consistently
    and quickly. You may also want a database object that performs small, quick actions
    and can reuse that code for multiple purposes. Some database objects can store
    information temporarily for reusability within the same batch or connection. Other
    database objects can perform actions as the result of activities on server or
    database objects. While T-SQL performs best with set-based activities, you may
    also find yourself needing to loop through data one record at a time.


    Depending on your purpose, one or more database objects may meet your needs. While
    each of these database objects has its place, there are pros and cons for when
    and how to use each of these objects. Throughout this chapter, I will walk through
    various scenarios showing both the positive and negative consequences of using
    each of these database objects. First, I will start by discussing views in T-SQL.


    ## Views


    What is a view? Like the definition of the word *view*, a view in T-SQL is a means
    of taking several different items and putting them together to form one cohesive
    image. A view is a select query that is saved with a new name called the view
    name. Users can query that view name and SQL Server will actually use the underlying
    predefined query. In this section, I will discuss some of the options available
    when using views. As with any tool, there are advantages to using views, and there
    are risks associated with views if they are used incorrectly.'
  trans: '### 游标


    另一种不能用作表中列的数据类型是 `游标`。总的来说，这种数据类型可能限制很大，但在某些情况下，它是完成任务的最佳数据类型。考虑使用此数据类型时，最好了解使用
    `游标` 数据类型可能带来的潜在性能影响。


    `游标` 数据类型通常用作变量。然而，这种数据类型也可以用作存储过程的输出。无论哪种情况，`游标` 数据类型都会获取一组数据，并逐行与每条记录进行交互。由于
    `游标` 数据类型可以容纳一组数据，因此它也可能不包含任何数据。这表明 `游标` 数据类型是可为空的。


    这种数据类型最常使用 `T-SQL` 创建。游标也可以通过 API（应用程序编程接口）服务器游标和客户端游标来实现，但这两种方式超出了本书的范围。为了创建游标，必须将一个局部变量声明为
    `游标`。与其他局部变量一样，可以声明 `游标` 并填充值，也可以先声明 `游标`，然后使用 `set` 语句填充值。其他用于创建游标的函数也可以与该数据类型一起使用。它们包括
    `open`、`fetch`、`close`、`deallocate` 和 `cursor_status`。此外，还有一些系统存储过程具有 `游标` 数据类型。


    理解可用的各种数据类型时，其中一个关键因素是知道该使用哪种数据类型。在某些情况下，使用正确的数据类型可能归结为节省空间。在其他情况下，使用不正确的数据类型可能会导致严重的性能问题。您还需要在
    `T-SQL` 代码和数据库对象中，保持数据类型使用和引用方式的一致性。如果 SQL Server 需要比较两种不同的类型，它将至少转换其中一种数据类型，以使两者相同。这个过程称为隐式转换。与隐式转换相关的
    CPU 开销可能非常大，应尽可能避免。避免隐式转换的最佳方法是为要比较的字段使用相同的数据类型。最大的挑战是，有时需要好几年才能意识到不正确的数据类型可能如何对应用程序性能产生负面影响。


    ### 数据库对象


    要编写执行速度快且能高效利用硬件的 `T-SQL`，您需要了解的不仅仅是正确的数据类型。数据类型将帮助您确定应如何存储数据，但下一步是设计访问该数据的过程。使用
    `T-SQL` 的最大好处和缺点之一是可用于访问数据的选项数量众多。本章的撰写基于您已经熟悉如何编写 `T-SQL` 来读取、插入、更新和删除数据的假设。


    在本章中，我将讨论可用于与数据交互的各种方法。有些对象允许您一致且快速地汇总信息。您可能还需要一个能执行小型、快速操作并可将该代码重用于多种用途的数据库对象。某些数据库对象可以临时存储信息，以便在同一批处理或连接内重用。其他数据库对象可以作为对服务器或数据库对象上执行活动的结果而执行操作。虽然
    `T-SQL` 在处理基于集合的操作时表现最佳，但您也可能会发现自己需要逐条记录地循环遍历数据。


    根据您的目的，一个或多个数据库对象可能满足您的需求。虽然每种数据库对象都有其适用的场合，但在何时以及如何使用每种对象方面都存在利弊。在本章中，我将通过各种场景，展示使用每种数据库对象所带来的积极和消极后果。首先，我将从讨论
    `T-SQL` 中的视图开始。


    #### 视图


    什么是视图？就像 `视图` 一词的定义一样，`T-SQL` 中的视图是一种将多个不同的项目组合在一起，形成一个有凝聚力的整体图像的方法。视图是一个 `select`
    查询，它被保存时带有一个新名称，称为视图名称。用户可以查询该视图名称，而 SQL Server 将实际使用底层预定义的查询。在本节中，我将讨论使用视图时可用的一些选项。与任何工具一样，使用视图有其优势，但如果使用不当，也存在相关风险。'
- fmt: "# User-Defined Views\n\nThe term user-defined view is the full name for the\
    \ basic version of a view. One of the results of a view is simplicity. It is one\
    \ way for applications and users to access complex sets of information without\
    \ needing to understand all the relationships in a database. There is some additional\
    \ functionality for protection and security that is available when using views.\
    \ I will go through examples of views that help performance as well as some situations\
    \ where views may not be the right option.\n\n## View Performance and Data Access\n\
    \nFor standard user-defined views, SQL Server does not store the actual data returned\
    \ by a view physically. Therefore, each time a view is called, it will use the\
    \ statement inside the view to pull back the data that currently exists in the\
    \ underlying table(s). One of the advantages for this method is it allows users\
    \ accessing these views to have code that is cleaner and easier to read. Another\
    \ feature of views is that users can be granted permission to the view but not\
    \ to the associated tables. This can allow users to have access to some but not\
    \ all the data from the tables that make up the view.\n\nLet’s start by comparing\
    \ the performance of a view to the performance of the same query as an ad hoc\
    \ query or a stored procedure. Listing 2-1 shows the query that will be used as\
    \ the basis for the comparison.\n\n```sql\nSELECT cus.FirstName,\n       cus.LastName,\n\
    \       cus.FirstName + ' ' + cus.LastName AS FullName,\n       ord.OrderNumber,\n\
    \       ord.OrderDate,\n       ord.ShipDate\nFROM dbo.CustomerOrder ord\nINNER\
    \ JOIN dbo.Customer cus\n    ON ord.CustomerID = cus.CustomerID;\n```\n*Listing\
    \ 2-1: Query for Analysis*\n\nIn the case of this query, the logic is simple.\
    \ In Listing 2-2, the query shows how to make a view using T-SQL code.\n\n```sql\n\
    CREATE VIEW dbo.vwCustomerOrder\nAS\nSELECT cus.FirstName,\n       cus.LastName,\n\
    \       cus.FirstName + ' ' + cus.LastName AS FullName,\n       ord.OrderNumber,\n\
    \       ord.OrderDate,\n       ord.ShipDate\nFROM dbo.CustomerOrder ord\nINNER\
    \ JOIN dbo.Customer cus\n    ON ord.CustomerID = cus.CustomerID;\n```\n*Listing\
    \ 2-2: Creating a View*\n\nOnce the view has been created, it becomes much simpler\
    \ to use the view to pull back the same information as the original query. Listing\
    \ 2-3 shows how the view can be used to simplify pulling back data from SQL Server.\n\
    \n```sql\nSELECT FullName, OrderNumber, OrderDate\nFROM dbo.vwCustomerOrder\n\
    WHERE FirstName = 'Karim';\n```\n*Listing 2-3: Calling the View*\n\nWhile having\
    \ a simplified way to access data is nice, another consideration is how querying\
    \ the view performs vs. running the query as an ad-hoc statement. In general,\
    \ you can expect the view to perform the same as the query that exists inside\
    \ the view. I will give you a visual comparison between how SQL Server executes\
    \ the query for the ad hoc statement as well as the view. The images below are\
    \ called execution plans. If you want to learn more about them, refer to Chapter\
    \ 7. For the time being, it is not important to understand the details of the\
    \ execution plan, only to compare the shape of the images in Figure 2-1 and Figure\
    \ 2-2.\n\nFigure 2-1 shows the actual query execution plan for the ad hoc query\
    \ in Listing 2-2.\n\n![A flow diagram. Select has a cost of 0% and is from parallelism\
    \ cost of 27% from adaptive join cost of 0%. It is from clustered index scan,\
    \ index scan, and clustered index seek.](images/480547_2_En_2_Chapter/480547_2_En_2_Fig1_HTML.jpg)\n\
    *Figure 2-1: Ad hoc query execution plan*\n\nComparing this to the query execution\
    \ plan for the view from Listing 2-3 in Figure 2-2, you can confirm there is no\
    \ difference between the execution plans.\n\n![A flow diagram. Select has a cost\
    \ of 0% and is from parallelism cost of 27% from adaptive join cost of 0%. It\
    \ is from clustered index scan, index scan, and clustered index seek.](images/480547_2_En_2_Chapter/480547_2_En_2_Fig2_HTML.jpg)\n\
    *Figure 2-2: Execution plan for the view*\n\nAs stated, the execution plan for\
    \ both is the same. One of the issues that can occur when using views is that\
    \ the execution plan does not identify that you are using a view to access this\
    \ data.\n\n## Updating Data Through Views\n\nWhile views can make things simpler\
    \ to use, there are other ways you may want to use views. Since views make interacting\
    \ with complex queries simpler, they may also make modifying data easier. However,\
    \ there are some caveats that you need to consider when updating data through\
    \ views. In Listing 2-4, you can find the query to update data based upon the\
    \ view.\n\n```sql\nUPDATE dbo.vwCustomerOrder\nSET OrderNumber = '76871-1'\nWHERE\
    \ OrderDate = '2022-08-30 23:20:08.86'\nAND FirstName = 'Karim'\nAND LastName\
    \ = 'Khalil';\n```\n*Listing 2-4: Updating Data in a View*\n\nThrough a view you\
    \ can update data from the base table. If a view is used to modify data from more\
    \ than one base table, then the update will fail. The same is true for inserts\
    \ as it is for updates. In Listing 2-5, you can determine what happens when you\
    \ attempt to insert a record for data in more than one table.\n\n```sql\nINSERT\
    \ INTO dbo.vwCustomerOrder\n(\n    FirstName,\n    LastName,\n    OrderNumber,\n\
    \    OrderDate,\n    ShipDate\n)\nVALUES\n(\n    'Abeba',\n    'Kidana',\n   \
    \ '1324-9',\n    GETDATE(),\n    NULL\n);\n```\n*Listing 2-5: Inserting Data Through\
    \ a View*\n\nWhen trying to execute the preceding query, SQL Server returns the\
    \ error `\"View or function 'dbo.vwCustomerOrder' is not updatable because the\
    \ modification affects multiple base tables.\"`\n\n## Schema Binding for Security\n\
    \nThere are other features available when using views. There is a way to prevent\
    \ an underlying table from being modified when it is referenced by a view. If\
    \ you want to make sure that users cannot accidentally drop a table, having a\
    \ view reference table with `SCHEMABINDING` is an available option. You can implement\
    \ this additional level of security using a query like the one in Listing 2-6.\n\
    \n```sql\nCREATE VIEW dbo.vwCustomerOrderBound\nWITH SCHEMABINDING\nAS\nSELECT\
    \ cus.FirstName,\n       cus.LastName,\n       cus.FirstName + ' ' + cus.LastName\
    \ AS FullName,\n       ord.CustomerOrderID,\n       ord.OrderNumber,\n       ord.ShipDate\n\
    FROM dbo.CustomerOrder ord\nINNER JOIN dbo.Customer cus\n    ON ord.CustomerID\
    \ = cus.CustomerID;\n```\n*Listing 2-6: Creating a View with Schema Binding*\n\
    \nHere, when adding `SCHEMABINDING` to a view, I change how SQL Server handles\
    \ changes to the columns contained within the view. Specifically, I can’t modify\
    \ columns in the `dbo.Customer` or `dbo.CustomerOrder` tables in a way that would\
    \ impact the view `dbo.vwCustomerOrderBound`. Listing 2-7 shows a query where\
    \ I try to drop a column in the `dbo.CustomerOrder` table that is referenced by\
    \ the `dbo.vwCustomerOrderBound` schema.\n\n```sql\nALTER TABLE dbo.CustomerOrder\n\
    DROP COLUMN ShipDate;\n```\n*Listing 2-7: Removing a Column in a Schemabound View*\n\
    \nWhen trying to execute the preceding query, I get the following error `\"The\
    \ object 'vwCustomerOrderBound' is dependent on column 'ShipDate'. ALTER TABLE\
    \ DROP COLUMN ShipDate failed because one or more objects access this column.\"\
    ` However, there is also a potential loophole regarding protecting data. Once\
    \ a view is created with `SCHEMABINDING`, a user can change what data is returned\
    \ as long as the column names returned in the `SELECT` statement remain the same."
  raw: '### User-Defined Views


    The term *user-defined view* is the full name for the basic version of a view.
    One of the results of a view is simplicity. It is one way for applications and
    users to access complex sets of information without needing to understand all
    the relationships in a database. There is some additional functionality for protection
    and security that is available when using views. I will go through examples of
    views that help performance as well as some situations where views may not be
    the right option.


    For standard user-defined views, SQL Server does not store the actual data returned
    by a view physically. Therefore, each time a view is called, it will use the statement
    inside the view to pull back the data that currently exists in the underlying
    table(s). One of the advantages for this method is it allows users accessing these
    views to have code that is cleaner and easier to read. Another feature of views
    is that users can be granted permission to the view but not to the associated
    tables. This can allow users to have access to some but not all the data from
    the tables that make up the view.


    Let’s start by comparing the performance of a view to the performance of the same
    query as an ad hoc query or a stored procedure. Listing [2-1](#480547_2_En_2_Chapter.xhtml#PC1)
    shows the query that will be used as the basis for the comparison.


    ```

    SELECT cus.FirstName,

    cus.LastName,

    cus.FirstName + '' '' + cus.LastName AS FullName,

    ord.OrderNumber,

    ord.OrderDate,

    ord.ShipDate

    FROM dbo.CustomerOrder ord

    INNER JOIN dbo.Customer cus

    ON ord.CustomerID = cus.CustomerID;

    Listing 2-1

    Query for Analysis

    ```


    In the case of this query, the logic is simple. In Listing [2-2](#480547_2_En_2_Chapter.xhtml#PC2),
    the query shows how to make a view using T-SQL code.


    ```

    CREATE VIEW dbo.vwCustomerOrder

    AS

    SELECT cus.FirstName,

    cus.LastName,

    cus.FirstName + '' '' + cus.LastName AS FullName,

    ord.OrderNumber,

    ord.OrderDate,

    ord.ShipDate

    FROM dbo.CustomerOrder ord

    INNER JOIN dbo.Customer cus

    ON ord.CustomerID = cus.CustomerID;

    Listing 2-2

    Creating a View

    ```


    Once the view has been created, it becomes much simpler to use the view to pull
    back the same information as the original query. Listing [2-3](#480547_2_En_2_Chapter.xhtml#PC3)
    shows how the view can be used to simplify pulling back data from SQL Server.


    ```

    SELECT FullName, OrderNumber, OrderDate

    FROM dbo.vwCustomerOrder

    WHERE FirstName = ''Karim'';

    Listing 2-3

    Calling the View

    ```


    While having a simplified way to access data is nice, another consideration is
    how querying the view performs vs. running the query as an ad-hoc statement. In
    general, you can expect the view to perform the same as the query that exists
    inside the view. I will give you a visual comparison between how SQL Server executes
    the query for the ad hoc statement as well as the view. The images below are called
    *execution plans*. If you want to learn more about them, refer to Chapter [7](#480547_2_En_7_Chapter.xhtml).
    For the time being, it is not important to understand the details of the execution
    plan, only to compare the shape of the images in Figure [2-1](#480547_2_En_2_Chapter.xhtml#Fig1)
    and Figure [2-2](#480547_2_En_2_Chapter.xhtml#Fig2). Figure [2-1](#480547_2_En_2_Chapter.xhtml#Fig1)
    shows the actual query execution plan for the ad hoc query in Listing [2-2](#480547_2_En_2_Chapter.xhtml#PC2).


    ![](images/480547_2_En_2_Chapter/480547_2_En_2_Fig1_HTML.jpg)


    A flow diagram. Select has a cost of 0% and is from parallelism cost of 27% from
    adaptive join cost of 0%. It is from clustered index scan, index scan, and clustered
    index seek.


    Figure 2-1


    Ad hoc query execution plan


    Comparing this to the query execution plan for the view from Listing [2-3](#480547_2_En_2_Chapter.xhtml#PC3)
    in Figure [2-2](#480547_2_En_2_Chapter.xhtml#Fig2), you can confirm there is no
    difference between the execution plans.


    ![](images/480547_2_En_2_Chapter/480547_2_En_2_Fig2_HTML.jpg)


    A flow diagram. Select has a cost of 0% and is from parallelism cost of 27% from
    adaptive join cost of 0%. It is from clustered index scan, index scan, and clustered
    index seek.


    Figure 2-2


    Execution plan for the view


    As stated, the execution plan for both is the same. One of the issues that can
    occur when using views is that the execution plan does not identify that you are
    using a view to access this data. While views can make things simpler to use,
    there are other ways you may want to use views. Since views make interacting with
    complex queries simpler, they may also make modifying data easier. However, there
    are some caveats that you need to consider when updating data through views. In
    Listing [2-4](#480547_2_En_2_Chapter.xhtml#PC4), you can find the query to update
    data based upon the view.


    ```

    UPDATE dbo.vwCustomerOrder

    SET OrderNumber = ''76871-1''

    WHERE OrderDate = ''2022-08-30 23:20:08.86''

    AND FirstName = ''Karim''

    AND LastName = ''Khalil'';

    Listing 2-4

    Updating Data in a View

    ```


    Through a view you can update data from the base table. If a view is used to modify
    data from more than one base table, then the update will fail. The same is true
    for inserts as it is for updates. In Listing [2-5](#480547_2_En_2_Chapter.xhtml#PC5),
    you can determine what happens when you attempt to insert a record for data in
    more than one table.


    ```

    INSERT INTO dbo.vwCustomerOrder

    (

    FirstName,

    LastName,

    OrderNumber,

    OrderDate,

    ShipDate

    )

    VALUES

    (

    ''Abeba'',

    ''Kidana'',

    ''1324-9'',

    GETDATE(),

    NULL

    );

    Listing 2-5

    Inserting Data Through a View

    ```


    When trying to execute the preceding query, SQL Server returns the error `"View
    or function ''dbo.vwCustomerOrder'' is not updatable because the modification
    affects multiple base tables."`


    There are other features available when using views. There is a way to prevent
    an underlying table from being modified when it is referenced by a view. If you
    want to make sure that users cannot accidentally drop a table, having a view reference
    table with SCHEMABINDING is an available option. You can implement this additional
    level of security using a query like the one in Listing [2-6](#480547_2_En_2_Chapter.xhtml#PC6).


    ```

    CREATE VIEW dbo.vwCustomerOrderBound

    WITH SCHEMABINDING

    AS

    SELECT cus.FirstName,

    cus.LastName,

    cus.FirstName + '' '' + cus.LastName AS FullName,

    ord.CustomerOrderID,

    ord.OrderNumber,

    ,

    ord.ShipDate

    FROM dbo.CustomerOrder ord

    INNER JOIN dbo.Customer cus

    ON ord.CustomerID = cus.CustomerID;

    Listing 2-6

    Creating a View with Schema Binding

    ```


    Here, when adding SCHEMABINDING to a view, I change how SQL Server handles changes
    to the columns contained within the view. Specifically, I can’t modify columns
    in the `dbo.Customer` or `dbo.CustomerOrder` tables in a way that would impact
    the view `dbo.vwCustomerOrderBound`. Listing [2-7](#480547_2_En_2_Chapter.xhtml#PC7)
    shows a query where I try to drop a column in the `dbo.CustomerOrder` table that
    is referenced by the `dbo.vwCustomerOrderBound` schema.


    ```

    ALTER TABLE dbo.CustomerOrder

    DROP COLUMN ShipDate;

    Listing 2-7

    Removing a Column in a Schemabound View

    ```


    When trying to execute the preceding query, I get the following error `"The object
    ''vwCustomerOrderBound'' is dependent on column ''ShipDate''. ALTER TABLE DROP
    COLUMN ShipDate failed because one or more objects access this column."` However,
    there is also a potential loophole regarding protecting data. Once a view is created
    with SCHEMABINDING, a user can change what data is returned as long as the column
    names returned in the SELECT statement remain the same.'
  trans: "\n# 用户定义视图\n\n术语“用户定义视图”是视图基本版本的全称。视图的优势之一在于其简化性。它是应用程序和用户访问复杂信息集合的一种方式，无需理解数据库中的所有关系。使用视图时，还提供了一些用于保护和安全性的附加功能。我将通过一些有助于提升性能的视图示例，以及一些可能不适合使用视图的情况来进行说明。\n\
    \n## 视图性能与数据访问\n\n对于标准的用户定义视图，SQL Server 不会物理存储视图返回的实际数据。因此，每次调用视图时，它都会使用视图内部的语句来获取基础表中当前存在的数据。这种方法的一个优点是，它允许访问这些视图的用户拥有更简洁、更易于阅读的代码。视图的另一个特点是，用户可以被授予对视图的访问权限，但无权访问关联的表。这样，用户就可以访问构成视图的表中的部分数据，而非全部数据。\n\
    \n让我们从比较视图与相同查询作为即席查询或存储过程时的性能开始。清单 2-1 显示了将用作比较基础的查询。\n\n```sql\nSELECT cus.FirstName,\n\
    \       cus.LastName,\n       cus.FirstName + ' ' + cus.LastName AS FullName,\n\
    \       ord.OrderNumber,\n       ord.OrderDate,\n       ord.ShipDate\nFROM dbo.CustomerOrder\
    \ ord\nINNER JOIN dbo.Customer cus\n    ON ord.CustomerID = cus.CustomerID;\n\
    ```\n*清单 2-1：用于分析的查询*\n\n就本查询而言，其逻辑很简单。清单 2-2 展示了如何使用 T-SQL 代码创建一个视图。\n\n```sql\n\
    CREATE VIEW dbo.vwCustomerOrder\nAS\nSELECT cus.FirstName,\n       cus.LastName,\n\
    \       cus.FirstName + ' ' + cus.LastName AS FullName,\n       ord.OrderNumber,\n\
    \       ord.OrderDate,\n       ord.ShipDate\nFROM dbo.CustomerOrder ord\nINNER\
    \ JOIN dbo.Customer cus\n    ON ord.CustomerID = cus.CustomerID;\n```\n*清单 2-2：创建视图*\n\
    \n视图创建完成后，使用该视图来获取与原始查询相同的信息就变得简单得多。清单 2-3 展示了如何使用视图来简化从 SQL Server 检索数据的过程。\n\
    \n```sql\nSELECT FullName, OrderNumber, OrderDate\nFROM dbo.vwCustomerOrder\n\
    WHERE FirstName = 'Karim';\n```\n*清单 2-3：调用视图*\n\n拥有简化的数据访问方式固然很好，但另一个需要考虑的因素是查询视图与运行即席查询语句的性能对比。通常，你可以预期视图的性能与其内部包含的查询相同。我将为你直观对比\
    \ SQL Server 如何执行即席查询语句以及视图的查询。下图称为执行计划。如果你想了解更多相关信息，请参阅第 7 章。目前，理解执行计划的细节并不重要，只需比较图\
    \ 2-1 和图 2-2 中图像的形状即可。\n\n图 2-1 显示了清单 2-2 中即席查询的实际查询执行计划。\n\n![一个流程图。选择的成本为 0%，来源于并行处理的成本\
    \ 27%，而并行处理又来源于自适应联接的成本 0%。自适应联接又来源于聚集索引扫描、索引扫描和聚集索引查找。](img/480547_2_En_2_Fig1_HTML.jpg)\n\
    *图 2-1：即席查询执行计划*\n\n将此与图 2-2 中清单 2-3 所示视图的查询执行计划进行比较，你可以确认执行计划之间没有差异。\n\n![一个流程图。选择的成本为\
    \ 0%，来源于并行处理的成本 27%，而并行处理又来源于自适应联接的成本 0%。自适应联接又来源于聚集索引扫描、索引扫描和聚集索引查找。](img/480547_2_En_2_Fig2_HTML.jpg)\n\
    *图 2-2：视图的执行计划*\n\n如前所述，两者的执行计划是相同的。使用视图时可能出现的一个问题是，执行计划无法识别你正在使用视图来访问这些数据。\n\n\
    ## 通过视图更新数据\n\n虽然视图可以使操作更简单，但你可能还希望以其他方式使用视图。由于视图简化了与复杂查询的交互，它们也可能使修改数据变得更容易。然而，通过视图更新数据时，有一些注意事项需要考虑。在清单\
    \ 2-4 中，你可以找到基于视图更新数据的查询。\n\n```sql\nUPDATE dbo.vwCustomerOrder\nSET OrderNumber\
    \ = '76871-1'\nWHERE OrderDate = '2022-08-30 23:20:08.86'\nAND FirstName = 'Karim'\n\
    AND LastName = 'Khalil';\n```\n*清单 2-4：在视图中更新数据*\n\n通过视图，你可以更新基础表中的数据。如果视图用于修改来自多个基础表的数据，则更新将失败。插入操作与更新操作的情况相同。在清单\
    \ 2-5 中，你可以看到当尝试为多个表中的数据插入记录时会发生什么。\n\n```sql\nINSERT INTO dbo.vwCustomerOrder\n\
    (\n    FirstName,\n    LastName,\n    OrderNumber,\n    OrderDate,\n    ShipDate\n\
    )\nVALUES\n(\n    'Abeba',\n    'Kidana',\n    '1324-9',\n    GETDATE(),\n   \
    \ NULL\n);\n```\n*清单 2-5：通过视图插入数据*\n\n尝试执行上述查询时，SQL Server 会返回错误 `\"视图或函数 'dbo.vwCustomerOrder'\
    \ 不可更新，因为修改会影响多个基础表。\"`。\n\n## 用于安全性的架构绑定\n\n使用视图时还有其他可用功能。有一种方法可以防止在视图引用时修改基础表。如果你想确保用户不会意外删除表，让视图通过\
    \ `SCHEMABINDING` 来引用表是一个可用的选项。你可以使用清单 2-6 中的查询来实现这种额外的安全级别。\n\n```sql\nCREATE\
    \ VIEW dbo.vwCustomerOrderBound\nWITH SCHEMABINDING\nAS\nSELECT cus.FirstName,\n\
    \       cus.LastName,\n       cus.FirstName + ' ' + cus.LastName AS FullName,\n\
    \       ord.CustomerOrderID,\n       ord.OrderNumber,\n       ord.ShipDate\nFROM\
    \ dbo.CustomerOrder ord\nINNER JOIN dbo.Customer cus\n    ON ord.CustomerID =\
    \ cus.CustomerID;\n```\n*清单 2-6：创建带有架构绑定的视图*\n\n在这里，通过向视图添加 `SCHEMABINDING`，我改变了\
    \ SQL Server 处理对视图中包含列的更改的方式。具体来说，我不能以会影响视图 `dbo.vwCustomerOrderBound` 的方式修改 `dbo.Customer`\
    \ 或 `dbo.CustomerOrder` 表中的列。清单 2-7 显示了一个尝试删除被 `dbo.vwCustomerOrderBound` 架构引用的\
    \ `dbo.CustomerOrder` 表中列的查询。\n\n```sql\nALTER TABLE dbo.CustomerOrder\nDROP COLUMN\
    \ ShipDate;\n```\n*清单 2-7：在架构绑定视图中删除列*\n\n尝试执行上述查询时，我收到以下错误 `\"对象 'vwCustomerOrderBound'\
    \ 依赖于列 'ShipDate'。ALTER TABLE DROP COLUMN ShipDate 失败，因为一个或多个对象访问了此列。\"`。然而，在保护数据方面还存在一个潜在的漏洞。一旦视图通过\
    \ `SCHEMABINDING` 创建，只要 `SELECT` 语句返回的列名保持不变，用户就可以更改返回的数据。\n"
- fmt: "## 视图修改与列名欺骗\n\n以一个例子来说明，假设用户希望查看 `OrderDate` 而不是 `ShipDate`。在列表 [2-8](#480547_2_En_2_Chapter.xhtml#PC8)\
    \ 中，最后一列显示的是 `OrderDate` 的值，但列名却叫做 `ShipDate`。即使该视图是 `schemabound`（架构绑定）的，也可以对其进行修改，使最后一列返回的是\
    \ `OrderDate` 而非 `ShipDate`。然而，除非有人审查代码，否则使用该视图的应用程序将无法知晓返回的数据不再是 `ShipDate`！这可能导致用户访问到他们本不应访问的数据场景。在列表\
    \ [2-8](#480547_2_En_2_Chapter.xhtml#PC8) 中，我修改了原始的 `dbo.vwCustomerOrder` 视图。\n\
    \n```sql\nALTER VIEW dbo.vwCustomerOrder\nAS\nSELECT cus.FirstName,\n       cus.LastName,\n\
    \       cus.FirstName + ' ' + cus.LastName AS FullName,\n       ord.OrderNumber,\n\
    \       ord.OrderDate AS ShipDate\nFROM   dbo.CustomerOrder ord\n       INNER\
    \ JOIN dbo.Customer cus\n              ON ord.CustomerID = cus.CustomerID;\nListing\
    \ 2-8\nAltering the View to Change the Column\n```\n\n之前，我有一个用户仅有权访问视图 `dbo.vwCustomerOrder`\
    \ 中的数据。我的本意是让该用户只能访问视图中原始列的数据。如果这个用户稍后尝试查询该视图，这个视图将不再返回 `ShipDate` 列中的数据。\n\n\
    ## 嵌套视图带来的性能问题\n\n尽管视图有这些功能，但其最大的问题之一仍然围绕着嵌套视图。在典型的软件开发中，开发者希望在多个场景中复用相同的软件代码。为了了解嵌套视图如何影响性能，让我们将一个视图作为连接条件的一部分，放入另一个视图中。首先，我在列表\
    \ [2-9](#480547_2_En_2_Chapter.xhtml#PC9) 中创建一个返回 `CustomerID`、`FirstName`、`LastName`、`FullName`\
    \ 和 `LastOrderDate` 的视图。\n\n```sql\nCREATE VIEW dbo.vwCustomer\nAS\nSELECT cus.CustomerID,\n\
    \       cus.FirstName,\n       cus.LastName,\n       cus.FirstName + ' ' + cus.LastName\
    \ AS FullName,\n       MAX(ord.OrderDate) AS LastOrderDate\nFROM   dbo.CustomerOrder\
    \ ord\n       INNER JOIN dbo.Customer cus\n              ON ord.CustomerID = cus.CustomerID\n\
    GROUP BY cus.CustomerID,\n         cus.FirstName,\n         cus.LastName;\nListing\
    \ 2-9\nView for Customer Information\n```\n\n现在，我有了一个简便的方法来查找有关客户的一些基本信息。如果我仍想查看订单详细信息，可以将\
    \ `dbo.Customer` 连接到视图 `dbo.vwCustomer`。列表 [2-10](#480547_2_En_2_Chapter.xhtml#PC10)\
    \ 包含了这个嵌套视图的创建语句。\n\n```sql\nCREATE VIEW dbo.vwCustomerOrderNest\nAS\nSELECT cus.FirstName,\n\
    \       cus.LastName,\n       cus.FullName AS FullName,\n       ord.OrderNumber,\n\
    \       ord.OrderDate ,\n       ord.ShipDate\nFROM   dbo.CustomerOrder ord\n \
    \      INNER JOIN dbo.vwCustomer cus\n              ON ord.CustomerID = cus.CustomerID;\n\
    Listing 2-10\nNested View for Customer Orders\n```\n\n这个视图返回的结果与原始视图 `dbo.vwCustomerOrder`\
    \ 相同。上述视图并不推荐，仅作为反面示例创建，用以说明不该做什么以及原因。接下来的步骤是对比这些视图的相对性能。列表 [2-11](#480547_2_En_2_Chapter.xhtml#PC11)\
    \ 中的查询返回所有订单号不是 `76871` 的客户订单。\n\n```sql\nSELECT FullName, OrderDate\nFROM   dbo.vwCustomerOrder\n\
    WHERE  OrderNumber <> '76871';\n\nSELECT FullName, OrderDate\nFROM   dbo.vwCustomerOrderNest\n\
    WHERE  OrderNumber <> '76871';\nListing 2-11\nQuery to Compare Views\n```\n\n\
    第一个查询使用的是非嵌套视图，第二个查询使用的是嵌套视图。它们都返回了表 [2-1](#480547_2_En_2_Chapter.xhtml#Tab1)\
    \ 中的结果。\n\n**表 2-1**\n**订单号为 78871 的客户**\n\n| FullName | OrderDate |\n| --- |\
    \ --- |\n| Karim Khalil | 2022-08-30 23:20:08.86 |\n| Myra Acharya | 2022-10-31\
    \ 00:00:00.00 |\n| Myra Acharya | 2022-10-31 00:00:00.00 |\n\n## 执行计划对比\n\n虽然返回的结果相同，但\
    \ SQL Server 执行这两个查询的方式却大相径庭。我将使用执行计划的图片，但你只需比较两个执行计划的形状。图 [2-3](#480547_2_En_2_Chapter.xhtml#Fig3)\
    \ 显示了原始视图的执行计划。\n\n`![](images/480547_2_En_2_Chapter/480547_2_En_2_Fig3_HTML.jpg)`\n\
    \n*（一个流程图。Select 的成本为 0%，来自于并行处理（成本 7%），而并行处理又来自于哈希匹配（成本 28%）。它来源于计算标量、并行处理等。）*\n\
    \n**图 2-3**\n**原始视图的执行计划**\n\n作为对比，嵌套视图的执行计划在图 [2-4](#480547_2_En_2_Chapter.xhtml#Fig4)\
    \ 中。\n\n`![](images/480547_2_En_2_Chapter/480547_2_En_2_Fig4_HTML.jpg)`\n\n*（一个流程图。Select\
    \ 的成本为 0%，来自于并行处理（成本 6%），而并行处理又来自于哈希匹配（成本 12%）。它来源于计算标量、并行处理等。）*\n\n**图 2-4**\n\
    **嵌套视图的执行计划**\n\nSQL Server 执行嵌套视图查询的方式更为复杂，而这只是一个基础示例！比较相对执行时间百分比，嵌套视图的执行时间是原始视图的三倍。想象一下，如果有更多的嵌套视图，特别是当它们很复杂时，会发生什么。为什么嵌套视图的执行计划看起来不同？\n\
    \n影响嵌套视图性能的一个因素涉及获取数据的过程。当 SQL Server 连接到一个视图时，它必须确定哪些值匹配连接条件。这意味着每个嵌套视图，根据其连接条件，都需要访问该视图的数据以确定数据是否满足连接条件。嵌套视图内将多层表连接在一起的额外复杂性，也使得\
    \ SQL Server 难以生成一个好的执行计划。相反，查询优化器可能不得不在确定最佳执行计划之前就选择一个执行计划。所有这些都可能导致使用嵌套视图时发生的性能问题。\n\
    \n## 总结\n\n在创建视图时，可能会忍不住复用这些视图来创建其他视图。不幸的是，这可能会导致某个视图开始表现不佳。一旦视图性能下降，可能需要付出相当大的努力，穿梭于嵌套视图的各个层级之间，才能找到根本原因。"
  raw: 'As an example, let’s assume a user wants to view the `OrderDate` instead of
    the `ShipDate`. In Listing [2-8](#480547_2_En_2_Chapter.xhtml#PC8), the last column
    shows the values for `OrderDate`, but the column name is called `ShipDate`. Even
    though the view is schemabound, the view can be altered so that the `OrderDate`
    is the last column returned instead of `ShipDate`. However, unless someone reviews
    the code, the applications using the view will have no way of knowing the data
    being returned is no longer the `ShipDate`! This can create a scenario where users
    can access data that they should not be able to access. In Listing [2-8](#480547_2_En_2_Chapter.xhtml#PC8),
    I alter the original `dbo.vwCustomerOrder` view.


    ```

    ALTER VIEW dbo.vwCustomerOrder

    AS

    SELECT cus.FirstName,

    cus.LastName,

    cus.FirstName + '' '' + cus.LastName AS FullName,

    ord.OrderNumber,

    ord.OrderDate AS ShipDate

    FROM dbo.CustomerOrder ord

    INNER JOIN dbo.Customer cus

    ON ord.CustomerID = cus.CustomerID;

    Listing 2-8

    Altering the View to Change the Column

    ```


    Previously, I had a user that only had permission to access the data within the
    view `dbo.vwCustomerOrder`. My intention was to allow this user to only have access
    to the original columns in the view. If this same user attempts to query the view
    at a later date, this view no longer returns the data in the `ShipDate` column.


    With all these features, one of the largest issues with views remains around nested
    views. In typical software development, there is a desire to reuse the same software
    code in multiple scenarios. To get an idea of how nested views can affect performance,
    let’s use a view as part of a join condition inside of another view. First, I
    create a view that returns the `CustomerID`, `FirstName, LastName, FullName`,
    and `LastOrderDate` in Listing [2-9](#480547_2_En_2_Chapter.xhtml#PC9).


    ```

    CREATE VIEW dbo.vwCustomer

    AS

    SELECT cus.CustomerID,

    cus.FirstName,

    cus.LastName,

    cus.FirstName + '' '' + cus.LastName AS FullName,

    MAX(ord.OrderDate) AS LastOrderDate

    FROM dbo.CustomerOrder ord

    INNER JOIN dbo.Customer cus

    ON ord.CustomerID = cus.CustomerID

    GROUP BY cus.CustomerID,

    cus.FirstName,

    cus.LastName;

    Listing 2-9

    View for Customer Information

    ```


    Now I have an easy way to find some general information about my customers. If
    I still want to view order detail information, I can join `dbo.Customer` to the
    view `dbo.vwCustomer`. Listing [2-10](#480547_2_En_2_Chapter.xhtml#PC10) contains
    the create statement for the nested view.


    ```

    CREATE VIEW dbo.vwCustomerOrderNest

    AS

    SELECT cus.FirstName,

    cus.LastName,

    cus.FullName AS FullName,

    ord.OrderNumber,

    ord.OrderDate ,

    ord.ShipDate

    FROM dbo.CustomerOrder ord

    INNER JOIN dbo.vwCustomer cus

    ON ord.CustomerID = cus.CustomerID;

    Listing 2-10

    Nested View for Customer Orders

    ```


    This view returns the same results as the original view, `dbo.vwCustomerOrder`.
    The view above is not recommended and has only been created as an example of what
    not to do and why. The next steps are to compare the relative performance of these
    views. The queries in Listing [2-11](#480547_2_En_2_Chapter.xhtml#PC11) return
    all customer orders that aren’t for order number 76871.


    ```

    SELECT FullName, OrderDate

    FROM dbo.vwCustomerOrder

    WHERE OrderNumber  ''76871'';

    SELECT FullName, OrderDate

    FROM dbo.vwCustomerOrderNest

    WHERE OrderNumber  ''76871'';

    Listing 2-11

    Query to Compare Views

    ```


    The first query uses the view that is not nested, and the second query used the
    nested view. They both return the results in Table [2-1](#480547_2_En_2_Chapter.xhtml#Tab1).


    Table 2-1


    Customers with Order Number 78871


    | FullName | OrderDate |

    | --- | --- |

    | Karim Khalil | 2022-08-30 23:20:08.86 |

    | Myra Acharya | 2022-10-31 00:00:00.00 |

    | Myra Acharya | 2022-10-31 00:00:00.00 |


    While the results returned are the same, how SQL Server executed these two queries
    is very different. I will be using images of execution plans, but you will only
    need to compare the shape of the two execution plans. Figure [2-3](#480547_2_En_2_Chapter.xhtml#Fig3)
    shows the execution plan for the original view.


    ![](images/480547_2_En_2_Chapter/480547_2_En_2_Fig3_HTML.jpg)


    A flow diagram. Select has a cost of 0% and is from parallelism cost of 7% from
    hash match cost 28%. It is from computing scalar, parallelism, and so on.


    Figure 2-3


    Execution plan for the original view


    For a comparison, the execution plan for the nested view is in Figure [2-4](#480547_2_En_2_Chapter.xhtml#Fig4).


    ![](images/480547_2_En_2_Chapter/480547_2_En_2_Fig4_HTML.jpg)


    A flow diagram. Select has a cost of 0% and is from parallelism cost of 6% from
    hash match cost 12%. It is from computing scalar, parallelism, and so on.


    Figure 2-4


    Execution plan for the nested view


    How SQL Server executes the query for the nested view is more complex, and this
    is a basic example! Comparing the relative percentage for execution time, the
    execution of the nest view was three times as long as the original view. Imagine
    what would happen with many more nested views, especially if they are complex.
    Why does the execution plan seem different for the nested view?


    One factor affecting the performance of nested views involves the process of acquiring
    data. When SQL Server joins to a view, it must determine what values match the
    join criteria. This means that each nested view, depending on the join criteria,
    needs to access the data for the view to determine if the data meets the join
    criteria. The added complexity of joining layers of tables together within the
    nested views also makes it difficult for SQL Server to get a good execution plan.
    Instead, the query optimizer may have to choose an execution plan before it can
    determine the best execution plan. All of this can contribute to the performance
    issues that can happen when using nested view.


    When creating views, it can be tempting to reuse those views to create other views.
    Unfortunately, this can create a situation where one view can start performing
    poorly. Once the view is performing poorly, it can take considerable effort to
    weave through the various layers of nested views to find the root cause.'
