  trans: '# 账本表实现


    此查询将为可更新账本表 `ApplicationRule` 生成账本表、历史表和账本视图。账本视图是一个系统创建的视图，它结合了可更新账本表和历史表的数据。创建的表和视图的名称如下：


    *   `dbo.ApplicationRule`

    *   `dbo.ApplicationRuleHistory`

    *   `dbo.ApplicationRule_Ledger`


    由于表已经创建，你现在可以修改表 `dbo.ApplicationRule` 中的数据。为了添加和修改数据，你可以执行清单 18-24 中的查询。


    ```

    INSERT INTO dbo.ApplicationRule (ApplicationRuleDescription)

    VALUES (''Show only active customers'');

    UPDATE dbo.ApplicationRule

    SET IsActive = 0,

    DateModified = GETDATE()

    WHERE ApplicationRuleDescription = ''Show only active customers'';

    清单 18-24

    在 ApplicationRule 表中添加和修改数据

    ```


    这些查询在 `dbo.ApplicationRule` 表中创建一条记录并停用该应用程序规则。要查看为可更新账本表记录的信息，清单 18-25 中的查询包含了你需要的
    T-SQL 代码。


    ```

    SELECT trn.commit_time AS CommitTime,

    trn.principal_name AS UserName,

    app.ApplicationRuleDescription,

    app.IsActive,

    app.ledger_operation_type_desc AS ActionType

    FROM dbo.ApplicationRule_Ledger app

    INNER JOIN sys.database_ledger_transactions trn

    ON app.ledger_transaction_id = trn.transaction_id

    ORDER BY trn.commit_time;

    清单 18-25

    查看账本历史信息

    ```


    此查询使用视图 `dbo.ApplicationRule_Ledger` 来查找为可更新账本表记录的信息。该查询显示了查询运行的时间、谁执行了查询、`dbo.ApplicationRule`
    表中的列以及执行的操作类型。由于可更新账本表是系统版本控制的，用户无法修改历史表中的数据。表 18-9 显示了清单 18-23 的结果。


    表 18-9

    查看系统访问记录


    | 提交时间 | 用户名 | 应用程序规则描述 | 是否激活 | 操作类型 |

    | --- | --- | --- | --- | --- |

    | 2023-05-01 | Enoble | 仅显示活跃客户 | 1 | 插入 |

    | 2023-05-01 | Enoble | 仅显示活跃客户 | 1 | 删除 |

    | 2023-05-01 | Enoble | 仅显示活跃客户 | 0 | 插入 |


    此表中的第一条记录显示了新应用程序规则插入表的时间。操作类型显示为插入。第二行和第三行对应于 `IsActive` 列从 True (1) 更新为 False
    (0) 的情况。第二行显示了删除，因为 `IsActive` 为 1 的记录被删除。第三行显示了插入，其中 `IsActive` 被设置为 False (0)。这种记录粒度级别与第
    15 章讨论的某些跟踪方式类似。


    请注意，我没有给你一个如何向现有表添加账本表功能的示例。这是因为无法向现有表添加账本功能。为了向现有表实现账本表，你需要新建一个账本表。清单 18-26 展示了为
    `dbo.Product` 表创建一个新的可更新账本表。


    ```

    CREATE TABLE dbo.Product_LedgerTable(

    ProductID         INT      IDENTITY(1,1)      NOT NULL,

    ProductName       VARCHAR(25)                 NOT NULL,

    ProductPrice      DECIMAL(6, 2)               NOT NULL,

    IsActive          BIT

    CONSTRAINT DF_Product_LedgerTable_IsActive DEFAULT (1)

    NOT NULL,

    DateCreated       DATETIME2(2)

    CONSTRAINT DF_Product_LedgerTable_DateCreated

    DEFAULT (GETDATE())

    NOT NULL,

    DateModified      DATETIME2(2)

    CONSTRAINT DF_Product_LedgerTable_DateModified

    DEFAULT (SYSDATETIME())

    NOT NULL,

    DateDisabled      DATETIME2(2)                    NULL,

    CONSTRAINT PK_Product_LedgerTable PRIMARY KEY CLUSTERED (ProductID ASC)

    )

    WITH

    (

    SYSTEM_VERSIONING = ON,

    LEDGER = ON

    );

    清单 18-26

    创建一个新的可更新账本表

    ```


    一旦创建了可更新账本表，你就可以使用系统存储过程 `sys.sp_copy_data_in_batches` 将数据从原始表复制到新的账本表。此代码的示例如清单
    18-27 所示。


    ```

    EXECUTE sp_copy_data_in_batches

    @source_table_name = N''Product'' ,

    @target_table_name = N''Product_Ledger'';

    清单 18-27

    将数据从 Product 复制到 Product_Ledger

    ```


    你将源表指定为原始表，目标表是新创建的可更新账本表。


    使用账本表的好处是能够验证是否有人篡改了账本表。要检查篡改，你首先需要生成账本摘要。执行清单 18-28 中的 T-SQL 将给出验证篡改所需的 JSON。


    ```

    EXECUTE sp_generate_database_ledger_digest;

    清单 18-28

    查找账本摘要

    ```


    一旦执行了 JSON，你需要复制该 JSON 以传递给下一个系统存储过程。要检查篡改，你可以执行清单 18-29 中的 T-SQL 代码。


    ```

    EXECUTE sp_verify_database_ledger N''

    {

    "database_name":"OutdoorRecreation",

    "block_id":0,

    "hash":"0xE32AE537398CB3F1276C7BA16AF359C8E0365CB6AAE9617AEA40B54D61EAC865",

    "last_transaction_commit_time":"2022-12-09T23:40:44.9700000",

    "digest_time":"2022-12-11T22:24:06.7619426"

    }'';

    清单 18-29

    检查账本表是否被篡改

    ```


    如果没有发生篡改，上面的查询将返回结果 “Ledger verification successfully verified up to block 0”。如果你使用的是
    Azure SQL，你可以使用清单 18-30 中的查询来检查篡改。


    ```

    DECLARE @digest_locations NVARCHAR(MAX) =

    (

    SELECT *

    FROM sys.database_ledger_digest_locations

    FOR JSON AUTO, INCLUDE_NULL_VALUES

    );

    SELECT @digest_locations as digest_locations;

    BEGIN TRY

    EXEC sys.sp_verify_database_ledger_from_digest_storage @digest_locations;

    SELECT ''Ledger verification succeeded.'' AS Result;

    END TRY

    BEGIN CATCH

    THROW;

    END CATCH

    清单 18-30

    检查 Azure SQL 数据库账本表是否被篡改

    ```


    如果你想随时间跟踪数据库的更改，SQL Server 2022 引入了为 SQL Server 创建账本数据库的功能。创建 SQL Server 账本数据库的代码见清单
    18-31。


    ```

    CREATE DATABASE OutdoorRecreated_Ledger

    WITH LEDGER = ON;

    清单 18-31

    创建 SQL Server 账本数据库

    ```


    如果你使用的是 Azure SQL 数据库，可以在 Azure 门户中创建数据库时在 `Security` 表中配置账本。其他选项包括 PowerShell
    和 Azure CLI。也可以使用清单 18-32 中的 T-SQL。


    ```

    CREATE DATABASE OutdoorRecreated_Ledger

    (

    EDITION = ''GeneralPurpose'',

    SERVICE_OBJECTIVE=''GP_Gen5_2'',

    MAXSIZE = 2 GB

    )

    WITH LEDGER = ON;

    清单 18-32

    创建 SQL Server 账本数据库

    ```


    与 SQL Server 账本数据类似，Azure SQL 数据库账本数据库必须只包含账本表。如果未指定，创建的任何表都将默认为可更新账本表。


    # 19. 实现加密


    继第 18 章介绍管理安全功能的方法之后，本章将重点介绍如何为数据库实现加密。本章第一节将介绍如何使用 Always Encrypted 来确保你最敏感的数据在静态和传输过程中保持加密。第二节将指导你如何为数据库实现静态的透明数据加密
    (TDE)。本章的目标是在安全访问数据的概念基础上，再赋予你根据需要加密数据的能力。'
- fmt: '## Always Encrypted


    在第 [18](#480547_2_En_18_Chapter.xhtml) 章中，我介绍了如何使用动态数据屏蔽来防止用户访问敏感数据。本节将介绍如何使用始终加密来确保您的敏感数据在静态和传输过程中都得到加密。我将讨论可用的加密类型及其相关限制。本节还将包括如何实现始终加密以及如何从始终加密中删除列的示例。最后，本节将简要概述如何轮换用于始终加密的密钥。


    始终加密允许您在维护数据库的个人与访问数据的应用程序之间实现职责分离。借助始终加密，应用程序可以轻松访问加密数据，而数据库管理员无法查看这些数据，这使得这种加密形式对信用卡号、社会安全号码或国民身份证等最敏感的数据尤其具有吸引力。


    在实现始终加密之前，让我们先了解一下可用的两种加密类型。第一种加密类型是确定性加密。使用此加密类型时，相同的明文值将具有相同的加密值。因此，确定性加密可能容易受到暴力攻击。确定性加密的优点是管理员可以允许用户对加密列进行搜索、分组、索引和联接。另一种可用的加密类型是随机化加密。这种加密类型更安全。但是，您将无法在
    `JOIN…ON`、`WHERE` 或 `GROUP BY` 子句或索引中使用这些列。


    注意

    您需要在连接字符串中更新 `Column Encryption Setting = enabled` 作为连接字符串的一部分。


    在启用始终加密之前，您应该查询现有表，以了解在实现始终加密之前查询如何返回数据。清单 [19-1](#480547_2_En_19_Chapter.xhtml#PC1)
    包含查找所有在美国的客户及其社会安全号码（缩写为 `SSN`）的查询。


    ```sql

    SELECT CustomerID, SSN

    FROM dbo.Customer

    WHERE Country = ''United States'';

    Listing 19-1

    Creating the Master Key and Certificate

    ```


    执行此查询后，您可以在表 [19-1](#480547_2_En_19_Chapter.xhtml#Tab1) 中查看结果。


    表 19-1


    始终加密前查看列


    | CustomerID | SSN |

    | --- | --- |

    | 401405 | 123-45-6789 |


    在此示例中，我创建了一个完全虚构的社会安全号码 123-45-6789。如表 [19-1](#480547_2_En_19_Chapter.xhtml#Tab1)
    所示，您可以读取实际的社会安全号码。


    要设置始终加密，请导航到对象资源管理器中的数据库。您可以展开 `Tables` 文件夹并导航到要加密的列。在此示例中，您将加密 `SSN` 列。通过右键单击
    `dbo.Customer` 表中的 `SSN` 列，您可以选择“加密列”选项，如图 [19-1](#480547_2_En_19_Chapter.xhtml#Fig1)
    所示。


    ![](images/480547_2_En_19_Chapter/480547_2_En_19_Fig1_HTML.jpg)


    图 19-1


    选择要加密的列


    选择“加密列”选项将打开始终加密向导。向导的第一个屏幕是“简介”。始终加密向导中的简介步骤指出：“*始终加密旨在保护存储在 SQL Server 数据库中的敏感信息（例如信用卡号）。它使客户端能够在客户端应用程序内加密数据，并且永远不会向
    SQL Server 泄露加密密钥。*” 请参阅图 [19-2](#480547_2_En_19_Chapter.xhtml#Fig2)。


    ![](images/480547_2_En_19_Chapter/480547_2_En_19_Fig2_HTML.jpg)


    图 19-2


    选择要加密的列


    简介屏幕上还有一个图示，以图形方式显示了上述陈述。查看此屏幕后，您可以选择“下一步”。“列选择”是向导中的第二个屏幕。如图 [19-3](#480547_2_En_19_Chapter.xhtml#Fig3)
    所示，您可以使用此屏幕选择列名、加密类型和加密密钥。


    ![](images/480547_2_En_19_Chapter/480547_2_En_19_Fig3_HTML.jpg)


    图 19-3


    选择列和加密类型


    如图 [19-3](#480547_2_En_19_Chapter.xhtml#Fig3) 所示，选择 `SSN` 列。加密类型的选项有明文、确定性或随机化。选择对社会安全号码使用随机化。由于这是您要加密的第一列，您只有选择新加密密钥
    `CEK_Auto1` 的选项。图 [19-3](#480547_2_En_19_Chapter.xhtml#Fig3) 中的警告消息如图 [19-4](#480547_2_En_19_Chapter.xhtml#Fig4)
    所示。


    ![](images/480547_2_En_19_Chapter/480547_2_En_19_Fig4_HTML.jpg)


    图 19-4


    排序规则更改警告


    此警告消息表明，始终加密会将 `SSN` 列的排序规则方法从 `SQL_Latin1_General_CP1_CI_AS` 更改为 `Latin1_General_BIN2`。


    现在您已选择列，选择“下一步”将带您进入“主密钥配置”。请参阅图 [19-5](#480547_2_En_19_Chapter.xhtml#Fig5)。


    ![](images/480547_2_En_19_Chapter/480547_2_En_19_Fig5_HTML.jpg)


    图 19-5


    主密钥配置屏幕


    在此屏幕上，您可以指定列主密钥、密钥存储提供程序和主密钥源。在此示例中，选择“自动生成列主密钥”、“Windows 证书存储”和“当前用户”。此处选择 Windows
    证书存储，但请注意，我建议在生产环境中使用 Azure Key Vault。


    现在您已为始终加密配置了主密钥，可以选择“下一步”进入“运行设置”屏幕。如图 [19-6](#480547_2_En_19_Chapter.xhtml#Fig6)
    所示，您可以选择生成稍后运行的 PowerShell 脚本，或者现在实现始终加密。


    ![](images/480547_2_En_19_Chapter/480547_2_En_19_Fig6_HTML.jpg)


    图 19-6


    运行设置


    有一个警告指出“*在加密/解密过程中，不应在表上执行写入操作。如果执行写入操作，则可能导致数据丢失。建议在计划的维护窗口期间安排加密/解密操作*”。由于我是在开发环境中运行，我可以选择现在运行。


    选择“下一步”后，您将能够在始终加密向导的“摘要”屏幕上验证始终加密配置。图 [19-7](#480547_2_En_19_Chapter.xhtml#Fig7)
    显示了当前设置的摘要。


    ![](images/480547_2_En_19_Chapter/480547_2_En_19_Fig7_HTML.jpg)'
  raw: '## Always Encrypted


    In Chapter [18](#480547_2_En_18_Chapter.xhtml), I went over how you can use Dynamic
    Data Masking to prevent users from accessing sensitive data. This section covers
    how you can use Always Encrypted to ensure your sensitive data is encrypted at
    rest and in flight. I will discuss the types of encryption available and their
    associated limitations. This section will also include examples of how you can
    implement Always Encrypted and how to remove a column from Always Encrypted. Finally,
    this section will give a brief overview of how you can rotate the keys used for
    Always Encrypted.


    Always Encrypted allows you to implement a separation of duties between the individuals
    maintaining the databases and the applications accessing the data. With Always
    Encrypted, applications can easily access encrypted data while the database administrators
    are unable to view this data, making this form of encryption especially appealing
    for the most sensitive data including credit card numbers, social security numbers,
    or national IDs.


    Before implementing Always Encrypted, let’s go over the two types of encryption
    available. The first type of encryption available is deterministic encryption.
    When using this encryption type, the same plain text value will have the same
    encrypted value. Therefore, deterministic encryption can be vulnerable to a brute
    force attack. The advantages of deterministic encryption are that administrators
    can allow users to search, group, index, and join on encrypted columns. The other
    type of encryption available is randomized encryption. This type of encryption
    is more secure. However, you will not be able to use these columns in JOIN…ON,
    WHERE, or GROUP BY clauses or indexes.


    Note


    You will need to update connection strings to use `Column Encryption Setting =
    enabled` as part of the connection string.


    Before enabling Always Encrypted, you should query the existing table to see how
    the data is returned from a query before Always Encrypted is implemented. Listing
    [19-1](#480547_2_En_19_Chapter.xhtml#PC1) has the query to find all customers
    in the United States as well as their social security number, abbreviated as SSN.


    ```

    SELECT CustomerID, SSN

    FROM dbo.Customer

    WHERE Country = ''United States'';

    Listing 19-1

    Creating the Master Key and Certificate

    ```


    Once this query is executed, you can review the results in Table [19-1](#480547_2_En_19_Chapter.xhtml#Tab1).


    Table 19-1


    View Column Before Always Encrypted


    | CustomerID | SSN |

    | --- | --- |

    | 401405 | 123-45-6789 |


    For this example, I created an entirely fictitious social security number, 123-45-6789\.
    As Table [19-1](#480547_2_En_19_Chapter.xhtml#Tab1) indicates, you can read the
    actual social security number.


    To setup Always Encrypted, navigate to the database in Object Explorer. You can
    expand the `Tables` folder and navigate to the column you would like to encrypt.
    In this example, you will be encrypting the SSN column. By right-clicking the
    SSN column in the `dbo.Customer` table, you can select the Encrypt Column option,
    as shown in Figure [19-1](#480547_2_En_19_Chapter.xhtml#Fig1).


    ![](images/480547_2_En_19_Chapter/480547_2_En_19_Fig1_HTML.jpg)


    A screenshot highlights the encrypt column option from the list of the S S N file
    of the column folder.


    Figure 19-1


    Selecting the column to encrypt


    Selecting the Encrypt Column option will cause the Always Encrypted wizard to
    open. The first screen in the wizard is in the Introduction. The introduction
    step in the Always Encrypted wizard states “*Always Encrypted is designed to protect
    sensitive information - such as credit card numbers - stored in SQL Server databases.
    It enabled clients to encrypt data inside client applications and never reveal
    the encryption keys to SQL Server.*” Refer to Figure [19-2](#480547_2_En_19_Chapter.xhtml#Fig2).


    ![](images/480547_2_En_19_Chapter/480547_2_En_19_Fig2_HTML.jpg)


    A screenshot of the Introduction page displays a dotted and solid rectangle. An
    outward arrow from the page symbol displays a lock symbol and the inward arrow
    depicts a lock with a key. Below, it displays the previous next, and cancel buttons.


    Figure 19-2


    Selecting the column to encrypt


    There is also a diagram on the Introduction screen displaying a graphical version
    of the statement above. Once you have reviewed this screen, you can select Next.
    The Column Selection is the second screen in the wizard. As shown in Figure [19-3](#480547_2_En_19_Chapter.xhtml#Fig3),
    you can use this screen to select the column name, encryption type, and encryption
    key.


    ![](images/480547_2_En_19_Chapter/480547_2_En_19_Fig3_HTML.jpg)


    A screenshot of the column selection page displays a search bar at the top. Below,
    it presents a table for name, state, encryption type, and encryption key.


    Figure 19-3


    Select the column(s) and encryption type


    As shown in Figure [19-3](#480547_2_En_19_Chapter.xhtml#Fig3), select the column
    `SSN`. The options for encryption type are plaintext, deterministic, or randomized.
    Choose to use randomized for the social security number. Since this is the first
    column you are encrypting, you only have the option to make the new encryption
    key CEK_Auto1\. The warning message in Figure [19-3](#480547_2_En_19_Chapter.xhtml#Fig3)
    is shown in Figure [19-4](#480547_2_En_19_Chapter.xhtml#Fig4).


    ![](images/480547_2_En_19_Chapter/480547_2_En_19_Fig4_HTML.jpg)


    An image of the test. It reads that the collation will be changed from A S Q L
    Latin general c p 1 c I a s to Latin 1 general b I n 2.


    Figure 19-4


    Warning for collation change


    This warning message indicates that Always Encrypted will change the collation
    method of the `SSN` column from SQL_Latin1_General_CP1_CI_AS to Latin1_General_BIN2.


    Now that you have selected your columns, choosing Next will take you to the Master
    Key Configuration. Refer to Figure [19-5](#480547_2_En_19_Chapter.xhtml#Fig5).


    ![](images/480547_2_En_19_Chapter/480547_2_En_19_Fig5_HTML.jpg)


    A screenshot of the MAster Key configuration page displays 2 options to select
    the key store provider and current user option from the drop-down menu to select
    a master key source. Below, it highlights the next button.


    Figure 19-5


    Master Key Configuration screen


    On this screen, you can specify the column master key, key store provider, and
    master key source. For this example, choose Auto generate column master key, Windows
    certificate store, and Current User. Choose the Windows certificate store here
    but note that I recommend using the Azure Key Vault for your Production environment.


    Now that you have configured the master key for Always Encrypted, you can select
    Next to go to the Run Settings screen. As shown in Figure [19-6](#480547_2_En_19_Chapter.xhtml#Fig6),
    you can choose to either generate a PowerShell script to run later or implement
    Always Encrypted now.


    ![](images/480547_2_En_19_Chapter/480547_2_En_19_Fig6_HTML.jpg)


    A screenshot of the next settings page displays 2 options to select to proceed.
    It highlights the option, proceed to finish now. Below, it highlights the next
    button.


    Figure 19-6


    Run settings


    There is a warning stating that *While encryption/decryption is in progress, write
    operations should not be performed on a table. If write operations are performed,
    there is a potential for data loss. It is recommended to schedule the encryption/decryption
    operation during your planned maintenance window*. As I am running this in my
    development environment, I can choose to run this now.


    After selecting Next, you will have the option to verify the Always Encrypted
    configuration on the Summary screen in the Always Encrypted wizard. Figure [19-7](#480547_2_En_19_Chapter.xhtml#Fig7)
    shows the summary for the current setup.


    ![](images/480547_2_En_19_Chapter/480547_2_En_19_Fig7_HTML.jpg)'
  trans: '

    ## 始终加密


    在第 18 章中，我介绍了如何使用动态数据屏蔽来防止用户访问敏感数据。本节将介绍如何使用**始终加密**来确保您的敏感数据在静态存储和传输过程中都得到加密。我将讨论可用的加密类型及其相关限制。本节还将包括如何实现始终加密以及如何从始终加密中删除列的示例。最后，本节将简要概述如何轮换用于始终加密的密钥。


    **始终加密**允许您在维护数据库的个人与访问数据的应用程序之间实现职责分离。借助始终加密，应用程序可以轻松访问加密数据，而数据库管理员无法查看这些数据，这使得这种加密形式对信用卡号、社会安全号码或国民身份证等最敏感的数据尤其具有吸引力。


    在实现始终加密之前，让我们先了解一下可用的两种加密类型。第一种加密类型是**确定性加密**。使用此加密类型时，相同的明文值将具有相同的加密值。因此，确定性加密可能容易受到暴力攻击。确定性加密的优点是管理员可以允许用户对加密列进行搜索、分组、索引和联接。另一种可用的加密类型是**随机化加密**。这种加密类型更安全。但是，您将无法在
    `JOIN…ON`、`WHERE` 或 `GROUP BY` 子句或索引中使用这些列。


    > **注意**

    > 您需要在连接字符串中更新 `Column Encryption Setting = enabled` 作为连接字符串的一部分。


    在启用始终加密之前，您应该查询现有表，以了解在实现始终加密之前查询如何返回数据。清单 19-1 包含查找所有在美国的客户及其社会安全号码（缩写为 `SSN`）的查询。


    ```sql

    SELECT CustomerID, SSN

    FROM dbo.Customer

    WHERE Country = ''United States'';

    ```

    **清单 19-1**

    **创建主密钥和证书**


    执行此查询后，您可以在表 19-1 中查看结果。


    **表 19-1**


    **始终加密前查看列**


    | CustomerID | SSN |

    | --- | --- |

    | 401405 | 123-45-6789 |


    在此示例中，我创建了一个完全虚构的社会安全号码 123-45-6789。如表 19-1 所示，您可以读取实际的社会安全号码。


    要设置始终加密，请导航到对象资源管理器中的数据库。您可以展开 `Tables` 文件夹并导航到要加密的列。在此示例中，您将加密 `SSN` 列。通过右键单击
    `dbo.Customer` 表中的 `SSN` 列，您可以选择“加密列”选项，如图 19-1 所示。


    ![](img/480547_2_En_19_Fig1_HTML.jpg)


    **图 19-1**


    **选择要加密的列**


    选择“加密列”选项将打开始终加密向导。向导的第一个屏幕是“简介”。始终加密向导中的简介步骤指出：“*始终加密旨在保护存储在 SQL Server 数据库中的敏感信息（例如信用卡号）。它使客户端能够在客户端应用程序内加密数据，并且永远不会向
    SQL Server 泄露加密密钥。*” 请参阅图 19-2。


    ![](img/480547_2_En_19_Fig2_HTML.jpg)


    **图 19-2**


    **选择要加密的列**


    简介屏幕上还有一个图示，以图形方式显示了上述陈述。查看此屏幕后，您可以选择“下一步”。“列选择”是向导中的第二个屏幕。如图 19-3 所示，您可以使用此屏幕选择列名、加密类型和加密密钥。


    ![](img/480547_2_En_19_Fig3_HTML.jpg)


    **图 19-3**


    **选择列和加密类型**


    如图 19-3 所示，选择 `SSN` 列。加密类型的选项有明文、确定性或随机化。选择对社会安全号码使用随机化。由于这是您要加密的第一列，您只有选择新加密密钥
    `CEK_Auto1` 的选项。图 19-3 中的警告消息如图 19-4 所示。


    ![](img/480547_2_En_19_Fig4_HTML.jpg)


    **图 19-4**


    **排序规则更改警告**


    此警告消息表明，始终加密会将 `SSN` 列的排序规则方法从 `SQL_Latin1_General_CP1_CI_AS` 更改为 `Latin1_General_BIN2`。


    现在您已选择列，选择“下一步”将带您进入“主密钥配置”。请参阅图 19-5。


    ![](img/480547_2_En_19_Fig5_HTML.jpg)


    **图 19-5**


    **主密钥配置屏幕**


    在此屏幕上，您可以指定列主密钥、密钥存储提供程序和主密钥源。在此示例中，选择“自动生成列主密钥”、“Windows 证书存储”和“当前用户”。此处选择 Windows
    证书存储，但请注意，我建议在生产环境中使用 Azure Key Vault。


    现在您已为始终加密配置了主密钥，可以选择“下一步”进入“运行设置”屏幕。如图 19-6 所示，您可以选择生成稍后运行的 PowerShell 脚本，或者现在实现始终加密。


    ![](img/480547_2_En_19_Fig6_HTML.jpg)


    **图 19-6**


    **运行设置**


    有一个警告指出“*在加密/解密过程中，不应在表上执行写入操作。如果执行写入操作，则可能导致数据丢失。建议在计划的维护窗口期间安排加密/解密操作*”。由于我是在开发环境中运行，我可以选择现在运行。


    选择“下一步”后，您将能够在始终加密向导的“摘要”屏幕上验证始终加密配置。图 19-7 显示了当前设置的摘要。


    ![](img/480547_2_En_19_Fig7_HTML.jpg)

    '
- fmt: '# Always Encrypted 概述


    ## 总结页面与初始错误


    一个总结页面的截图描绘了4个要点。它们依次是：源数据库设置、创建新的主密钥、创建新的加密密钥以及加密 SSN 列。下方高亮显示了完成按钮。


    图 19-7

    Always Encrypted 的总结


    在审查完摘要配置后，你可以选择下一步。然而，图[19-8](#480547_2_En_19_Chapter.xhtml#Fig8)显示了我尝试完成 Always
    Encrypted 实施时看到的错误消息。


    ![](images/480547_2_En_19_Chapter/480547_2_En_19_Fig8_HTML.jpg)


    一个标题为 Microsoft SQL Server Management Studio 的对话框左侧显示 I 符号，内容为“验证部署计划字段”。下方提供了复制消息选项和一个“确定”按钮。


    图 19-8

    包含行级安全策略的表的错误


    错误消息指出“*由于策略 [dbo].[CountryFilter] 启用了行级安全，因此无法在此表上执行数据移动。*”这引用的是在第[18](#480547_2_En_18_Chapter.xhtml)章中设置的行级安全。我从表中删除了行级安全，并重试为
    SSN 列添加 Always Encrypted，如图[19-9](#480547_2_En_19_Chapter.xhtml#Fig9)所示。


    ![](images/480547_2_En_19_Chapter/480547_2_En_19_Fig9_HTML.jpg)


    一个结果页面的截图描绘了摘要列表。它显示了名为“任务”和“详细信息”的列，并高亮显示列表中的第一个选项。下方显示了上一步、下一步和关闭按钮。


    图 19-9

    成功的 Always Encrypted 列


    ## 成功加密与数据查看


    添加 Always Encrypted 后，“结果”屏幕会显示状态。在此示例中，你已成功生成新的列主密钥、生成新的列加密密钥并执行了加密操作。


    你现在可以执行清单 [19-1](#480547_2_En_19_Chapter.xhtml#PC1) 中的相同查询。使用当前连接执行此查询的结果如表 [19-2](#480547_2_En_19_Chapter.xhtml#Tab2)
    所示。


    表 19-2

    查看 Always Encrypted 后的列


    | Customer ID | SSN |

    | --- | --- |

    | 401405 | 0x01C0716043E1D97311AA2A0C456CA358359B9A4882D2B80FC1A95718BB31066F165150E252F3582003B543F4B37A7C3DE7A9310F487CFDDD3969DC05AC76B0B2BE
    |


    很明显，`SSN` 列现在已被加密。如前所述，只要你有权限访问先前生成的加密密钥，仍然可以通过更新的连接字符串访问数据。图 [19-10](#480547_2_En_19_Chapter.xhtml#Fig10)
    展示了可以在 SSMS 中配置的 Always Encrypted 选项。


    ![](images/480547_2_En_19_Chapter/480547_2_En_19_Fig10_HTML.jpg)


    一个标题为 SQL Server 的截图高亮显示了 always encrypted 选项。它勾选了“启用始终加密”按钮，并在“ enclave 证明 URL”选项前呈现一个空白栏。下方高亮显示了“连接”按钮。


    图 19-10

    配置 Always Encrypted 连接


    ## 配置 Always Encrypted 连接


    在启用 Always Encrypted 的情况下连接到 SQL Server 实例后，你可以重新运行清单 [19-1](#480547_2_En_19_Chapter.xhtml#PC1)
    中的查询。运行此查询的结果如表 [19-3](#480547_2_En_19_Chapter.xhtml#Tab3) 所示。


    表 19-3

    启用 Always Encrypted 后查看列


    | CustomerID | SSN |

    | --- | --- |

    | 401405 | XXX-XXX-XXXX |


    如表所示，启用 Always Encrypted 允许你以未加密形式访问 `SSN` 列中的数据。


    ## 移除加密与密钥轮换


    如果你发现不再希望或需要在列上使用 Always Encrypted，可以导航到列加密设置，如图[19-1](#480547_2_En_19_Chapter.xhtml#Fig1)所示。打开
    Always Encrypted 向导后，导航到如图[19-11](#480547_2_En_19_Chapter.xhtml#Fig11)所示的列选择屏幕。


    ![](images/480547_2_En_19_Chapter/480547_2_En_19_Fig11_HTML.jpg)


    一个列选择页面的截图显示了名为“名称”、“状态”、“加密类型”和“加密密钥”的列，并高亮显示了“明文”加密类型。下方高亮显示了“下一步”按钮。


    图 19-11

    移除加密密钥


    通过选择加密类型为“明文”，该列将不再受 Always Encrypted 影响。


    使用 Always Encrypted 的另一个考虑是需要轮换加密密钥。以下是轮换主密钥的步骤概述：


    1.  创建一个新的列主密钥。

    2.  使用新的列主密钥加密现有列的加密密钥。

    3.  使用新的列主密钥更新应用程序。

    4.  清理旧的列主密钥。


    本节介绍了 Always Encrypted 的用途。解释了确定性和随机化加密密钥。你为一个列设置了 Always Encrypted，并确认加密按预期工作。本节还指出了如何从列中移除
    Always Encrypted。最后一部分概述了如何更新用于加密的主密钥的高层流程。'
  raw: 'A screenshot of the summary page depicts 4 points. It reads them as source
    database settings, creates a new master key, creates a new encryption key, and
    encrypts column S S N. Below, it highlights the finish button.


    Figure 19-7


    Summary for Always Encrypted


    Once you have reviewed the summary configuration, you can select Next. However,
    Figure [19-8](#480547_2_En_19_Chapter.xhtml#Fig8) shows the error message I saw
    when I tried to finish implementing Always Encrypted.


    ![](images/480547_2_En_19_Chapter/480547_2_En_19_Fig8_HTML.jpg)


    A dialog box titled Microsoft S Q L server management studio depicts the I symbol
    on the left and reads verification of the deployment plan field. Below, it presents
    copy message option and an o k button.


    Figure 19-8


    Error for table with row-level security


    The error message indicates that the *data motion cannot be performed on this
    table because it has row-level security enabled by policy [dbo].[CountryFilter].*
    This is referencing the row-level security that was set up in Chapter [18](#480547_2_En_18_Chapter.xhtml).
    I dropped row-level security from the table and retried adding Always Encrypted
    to the SSN column, as show in Figure [19-9](#480547_2_En_19_Chapter.xhtml#Fig9).


    ![](images/480547_2_En_19_Chapter/480547_2_En_19_Fig9_HTML.jpg)


    A screenshot of the result page depicts the summary list. It displays the columns
    titled Task and Details. and highlights the first option from the list. Below,
    it displays the previous, next and close buttons.


    Figure 19-9


    Successful Always Encrypted column


    After Always Encrypted is added, the Results screen displays the status. For this
    example you have successfully generated a new column master key, generated a new
    column encryption key, and performed the encryption operations.


    You can now execute the same query from Listing [19-1](#480547_2_En_19_Chapter.xhtml#PC1).
    The results of this query using the current connection are shown in Table [19-2](#480547_2_En_19_Chapter.xhtml#Tab2).


    Table 19-2


    View Column After Always Encrypted


    | Customer ID | SSN |

    | --- | --- |

    | 401405 | 0x01C0716043E1D97311AA2A0C456CA358359B9A4882D2B80FC1A95718BB31066F165150E252F3582003B543F4B37A7C3DE7A9310F487CFDDD3969DC05AC76B0B2BE
    |


    It is evident that the SSN column is now encrypted. As indicated previously, it
    is still possible to access the data using an updated connection string as long
    as you have access to the encryption key previously generated. Figure [19-10](#480547_2_En_19_Chapter.xhtml#Fig10)
    shows the Always Encrypted option that can be configured in SSMS.


    ![](images/480547_2_En_19_Chapter/480547_2_En_19_Fig10_HTML.jpg)


    A screenshot tiled S Q L server highlights the always encrypted option. It ticks
    the enable always encrypted button and presents a blank bar in front of the enclave
    attestation U R L option. Below, it highlights the connect button.


    Figure 19-10


    Configuring the Always Encrypted connection


    After you have connected to the SQL Server instance with the Always Encrypted
    enabled, you can rerun the query in Listing [19-1](#480547_2_En_19_Chapter.xhtml#PC1).
    The results of running this query are shown in Table [19-3](#480547_2_En_19_Chapter.xhtml#Tab3).


    Table 19-3


    View Column With Always Encrypted Enabled


    | CustomerID | SSN |

    | --- | --- |

    | 401405 | XXX-XXX-XXXX |


    As indicated in the table, enabling Always Encrypted allows you to access the
    data in the SSN column unencrypted.


    If you find that you no longer want or need to use Always Encrypted on a column,
    you can navigate to column encryption as shown in Figure [19-1](#480547_2_En_19_Chapter.xhtml#Fig1).
    Once you open the Always Encrypted wizard, navigate to the Column Selection screen
    shown in Figure [19-11](#480547_2_En_19_Chapter.xhtml#Fig11).


    ![](images/480547_2_En_19_Chapter/480547_2_En_19_Fig11_HTML.jpg)


    A screenshot of the column selection page displays whose columns read the name,
    state, encryption type, and encryption key and highlights the plaintext encryption
    type. Below, it highlights the next button.


    Figure 19-11


    Removing an encryption key


    By selecting the encryption type of plaintext, the column will no longer be affected
    by Always Encrypted.


    Another consideration of using Always Encrypted is the need to rotate encryption
    keys. Here is a brief overview of the steps to rotate the master key:


    1.  Create a new column master key.


    2.  Use the new column master key to encrypt an existing column’s encryption keys.


    3.  Update applications with the new column master key.


    4.  Clean up the old column master key.


    This section covered the purpose of Always Encrypted. The deterministic and randomized
    encryption keys have been explained. You set up Always Encrypted for a column
    and confirmed that the encryption is working as expected. This section also indicated
    how to remove Always Encrypted from a column. The last part of this section gave
    a high level process for how to update the master key used for encryption.'
