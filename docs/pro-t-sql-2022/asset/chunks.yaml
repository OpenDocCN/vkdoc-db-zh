  raw: '```

    ALTER TABLE dbo.OrderDetail

    ADD CONSTRAINT PK_OrderDetail

    PRIMARY KEY CLUSTERED (CustomerOrderID ASC, OrderDetailID ASC);

    Listing 7-11

    Changing the Primary Key to Sort Data by CustomerOrderID

    ```


    Looking at Figure [7-28](#480547_2_En_7_Chapter.xhtml#Fig28), you can see that
    the execution plan has changed and now uses a merge join.


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig28_HTML.jpg)


    A snapshot presents the execution plan. clustered index seek with clustered, cost
    27%. and another clustered index seek with clustered, cost 46%. Hash match with
    left outer join, cost 26%. Select, cost 0%.


    Figure 7-28


    Execution plan using a merge join


    Now that these two tables are ordered in the same manner, SQL Server has determined
    that it is more cost-effective to use a merge join. In the preceding example,
    SQL Server took the two ordered data sets and compared the records to determine
    which records match. All the preceding examples assume equality between the columns
    being compared. As a general guide, SQL Server will always use a nested loop for
    LEFT OUTER JOINs if none of the joins in the query are equal. You can see an example
    of a query that meets this criterion in Listing [7-12](#480547_2_En_7_Chapter.xhtml#PC12).


    ```

    SELECT TOP(500) ord.OrderNumber

    FROM dbo.CustomerOrder ord

    LEFT OUTER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID  dtl.CustomerOrderID;

    Listing 7-12

    Left Outer Join with Inequality

    ```


    If I recreate the primary key referenced in Listing [7-8](#480547_2_En_7_Chapter.xhtml#PC8),
    the data between the two tables will be sorted differently. Due to the amount
    of data that will be compared between the two tables, I limit the result to the
    first 500 records. After running this query, I get the execution plan returned
    in Figure [7-29](#480547_2_En_7_Chapter.xhtml#Fig29).


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig29_HTML.jpg)


    A snapshot presents the execution plan. clustered index scan with clustered, cost
    35%. Clustered index scan with clustered, cost 64%. Nested loop with left outer
    join, cost 0%. Top, cost 1%. Select, cost 0%.


    Figure 7-29


    Execution plan using a nested loop


    Now that the only join in the T-SQL code is an inequality, SQL Server uses a nested
    loop physical join. Almost every query where there are no joins that are equal
    must use a nested loop except one specific scenario. If the data being compared
    is sorted and there is an inequality, SQL Server can use a merge join. Creating
    the primary key from Listing [7-10](#480547_2_En_7_Chapter.xhtml#PC10) will order
    the data the same between the two tables. The execution plan in Figure [7-30](#480547_2_En_7_Chapter.xhtml#Fig30)
    is returned when executing the query from Listing [7-9](#480547_2_En_7_Chapter.xhtml#PC9).


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig30_HTML.jpg)


    A snapshot presents the execution plan. clustered index seek with clustered, cost
    27%. Clustered index see with clustered, cost 46%. Merge join with left outer
    join, cost 0%. Select, cost 0%.


    Figure 7-30


    Execution plan using a merge join


    Figure [7-30](#480547_2_En_7_Chapter.xhtml#Fig30) shows that it is possible to
    have a merge join when there is an inequality. However, only when the tables are
    sorted and there is an inequality will you see a merge join with a LEFT OUTER
    JOIN. In addition to T-SQL joins that relate to logical joins, there are other
    logical join types that SQL Server can use.


    Another logical join type involves situations when SQL Server compares data between
    two tables but without doing a full join between the tables. Depending on the
    T-SQL code used, this can be referred to as a SEMI JOIN or an ANTI SEMI JOIN.
    Like the LEFT OUTER JOIN and RIGHT OUTER JOIN, SQL Server has some of the same
    limitations matching the SEMI JOIN and ANTI SEMI JOIN to physical join operators.
    When working with either a SEMI JOIN or an ANTI SEMI JOIN, there is the concept
    of left or right. This left or right has to do with which side is being compared.
    Listing [7-13](#480547_2_En_7_Chapter.xhtml#PC13) finds all orders for the customer
    with an ID of 234.


    ```

    SELECT ord.OrderNumber

    FROM dbo.CustomerOrder ord

    WHERE NOT EXISTS

    (

    SELECT *

    FROM dbo.OrderDetail dtl

    WHERE dtl.CustomerOrderID = ord.CustomerOrderID

    AND ord.CustomerID = 234

    );

    Listing 7-13

    All Orders For CustomerID 234

    ```


    When this query is run, the data in `OrderDetail` is sorted by `CustomerOrderID`
    and then `OrderDetailID`. In Figure [7-31](#480547_2_En_7_Chapter.xhtml#Fig31),
    the execution plan shows a RIGHT ANTI SEMI JOIN.


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig31_HTML.jpg)


    A snapshot presents the execution plan. 2 Parallelism with repartition stream,
    cost 5%. A hash match with the right anti semi join, cost 29%. Parallelism with
    gather stream, cost 5%. Select, cost 0%.


    Figure 7-31


    Partial execution plan with RIGHT ANTI SEMI JOIN


    The ANTI SEMI JOIN is due to the NOT EXISTS in the query from Listing [7-11](#480547_2_En_7_Chapter.xhtml#PC11).
    In the preceding scenario, SQL Server has chosen a right join. The query in Listing
    [7-14](#480547_2_En_7_Chapter.xhtml#PC14) looks for all orders that have products
    other than ProductID of 2.


    ```

    SELECT ord.*

    FROM dbo.CustomerOrder ord

    WHERE EXISTS

    (

    SELECT dtl.ProductID

    FROM dbo.OrderDetail dtl

    WHERE ord.CustomerOrderID = dtl.CustomerOrderID

    AND dtl.ProductID  2

    );

    Listing 7-14

    All Orders Except Those with Only ProductID 2

    ```


    As shown in execution plan in Figure [7-32](#480547_2_En_7_Chapter.xhtml#Fig32),
    you can see a RIGHT SEMI JOIN.


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig32_HTML.jpg)


    A snapshot presents the execution plan. Parallelism with repartition stream, cost
    5%. Parallelism with repartition stream, cost 9%. A hash match with the right
    semi join, cost 27%. Parallelism with gather stream, cost 9%. Select, cost 0%.


    Figure 7-32


    Partial execution plan with RIGHT SEMI JOIN


    The use of the RIGHT SEMI JOIN is due to the EXISTS in the T-SQL from Listing
    [7-10](#480547_2_En_7_Chapter.xhtml#PC10). The use of right is stating that SQL
    Server is evaluating the results returned from the EXISTS statement to the list
    of customer orders. While the use of EXISTS or NOT EXISTS can indicate that there
    will be a SEMI JOIN or an ANTI SEMI join, that may not always be what happens.
    This is also true for a ANTI JOINs, as the database engine can convert a RIGHT
    SEMI JOIN to a LEFT ANTI JOIN. Listing [7-15](#480547_2_En_7_Chapter.xhtml#PC15)
    shows a query that will return all orders that exist for the product with an ID
    of 2.


    ```

    SELECT ord.OrderNumber

    FROM dbo.CustomerOrder ord

    WHERE EXISTS

    (

    SELECT *

    FROM dbo.OrderDetail dtl

    WHERE dtl.CustomerOrderID = ord.CustomerOrderID

    AND dtl.ProductID = 2

    );

    Listing 7-15

    All Orders with ProductID 2

    ```


    The execution plan in Figure [7-33](#480547_2_En_7_Chapter.xhtml#Fig33) shows
    how SQL Server has determined to execute this query.


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig33_HTML.jpg)


    A snapshot presents execution plan. Clustered index scan with cluster, cost 65%.
    Parallelism with repartition stream cost 1%. Sort with distinct sort, cost 0%.
    Clustered index seek with cluster, cost 33%. Nested loop with inner join, cost
    0%. Parallelism with gather stream, cost 0%. Select, cost 0%.


    Figure 7-33


