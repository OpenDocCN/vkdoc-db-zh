  trans: '

    这类行为可能导致缓冲池中的大量数据被清空。SQL Server 中有一个名为 `page life expectancy`（页生存期）的值，用于显示数据页在缓冲池中停留的平均时间。我习惯将
    `page life expectancy` 作为一个指标，用以判断是否有查询在 SQL Server 中读取的数据量可能远大于结果集返回的数据量。这可能导致这些查询本身使用了超出其实际需要的内存。当我处理与应用程序配合使用的查询时，它们通常一次不涉及超过十条记录。即使某个查询用于某种形式的报表，一次通常也不会超过几千条记录。即便我一次查看
    20 万条记录，我仍然不希望为了获取这些结果而进行数千万次的逻辑读取。我可以添加一些索引来帮助最小化查询的逻辑读取次数。清单 6-3 展示了添加的索引。


    ```sql

    CREATE NONCLUSTERED INDEX IX_Customer_CustomerNameName

    ON dbo.Customer(LastName ASC, FirstName ASC);

    CREATE NONCLUSTERED INDEX IX_CustomerOrder_CustomerID_IsActive

    ON dbo.CustomerOrder(CustomerID ASC, IsActive ASC);

    CREATE NONCLUSTERED INDEX IX_OrderDetail_CustomerOrderID_ProductID

    ON dbo.OrderDetail(CustomerOrderID ASC, ProductID ASC);

    ```

    清单 6-3

    用于减少逻辑读取的非聚集索引


    尽管我预期查询的逻辑读取会减少，但仍应通过执行查询来验证这个假设。在表 6-3 中，你可以通过逻辑读取数看到查询已被修改。


    表 6-3


    仅选择必要列时的逻辑读取数


    | 食谱数量 | 配料数量 | 食谱-配料关系数量 | 返回记录数 | 逻辑读取数 |

    | --- | --- | --- | --- | --- |

    | 401,409 | 802,820 | 1,605,638 | 1,204,224 | 5,899 |


    将表 6-2 与表 6-3 的结果进行比较，你可以看到逻辑读取数已经下降。索引在内部组织了数据，使得 SQL Server 更容易、更快速地找到数据页。因此，SQL
    Server 执行此查询时需要访问缓冲池中的数据页更少。在这个案例中，索引应该有助于使用此 SQL Server 实例的其他应用程序提升性能。


    然而，你需要谨慎地为每一个独特的场景都创建索引。为每一个慢查询都创建索引可能会因为维护每个索引所需的磁盘活动增加而对性能产生负面影响。此外，SQL Server
    在创建索引时确实会分配内存以便对数据进行排序。使用索引可以成为确保你只访问所需数据的强有力方式。你还需要理解数据以及相关的 `T-SQL`，以便在不给 SQL
    Server 增加过重负担的情况下有效地创建索引。


    有一些查询可以用来确定存储过程使用了多少逻辑读取。如前所述，逻辑读取是查询是否影响内存的一个指标。如果存储过程存在于计划缓存中，你可以找出哪些存储过程的逻辑读取数更高。清单
    6-4 展示了查找存储过程及其逻辑读取数的查询。


    ```sql

    USE OutdoorRecreation;

    GO

    SELECT db.[name] AS name_database,

    obj.[name] AS name_stored_procedure,

    sts.execution_count,

    sts.total_logical_reads

    FROM sys.objects obj

    INNER JOIN sys.dm_exec_procedure_stats sts

    ON obj.[object_id] = sts.[object_id]

    LEFT JOIN sys.databases db

    ON sts.database_id = db.database_id;

    ```

    清单 6-4

    查找计划缓存中存储过程的逻辑读取数


    这个查询会显示当前 `OutdoorRecreation` 数据库计划缓存中的存储过程。它包含了该存储过程已被执行的次数以及所有执行产生的逻辑读取总数。要分析每个存储过程的平均逻辑读取数，你需要用
    `total_logical_reads` 除以 `execution_count`。一旦你识别出逻辑读取数最高的查询，你可能需要回顾第 8 章，学习如何优化这些查询的逻辑读取。


    尽管内存可以被认为是 SQL Server 可用的最强大、最有益的硬件，但它也有相关的金钱成本。内存可以弥补尚未优化的 `T-SQL`。然而，通常会达到一个临界点，即表变得非常大而查询又未完全优化。那时，很容易倾向于通过增加更多内存来解决性能问题。在许多情况下，这只是针对长期问题的短期解决方案。除此之外，购买额外内存相关的成本并不总是企业能够负担的选项。防止或解决此问题的一个方法是查看系统中的存储过程和预准备语句，并找出那些可以通过减少相关查询的逻辑读取而得到改进的查询。

    '
- fmt: '# Considering Storage with T-SQL Design


    I have covered how to interact with the data that you plan on accessing frequently;
    you also want to consider how the bulk of your data is stored. When it comes to
    working with storage, it is important to consider what activities cause you to
    have to access data on disk. These are the types of activities that you want to
    minimize or improve. In some cases, when I see a significant amount of disk I/O,
    it may be a sign that there is some other part of the T-SQL design that needs
    to be improved. This may be the symptom instead of the cause.


    SQL Server uses indexes to organize data and allow data to be retrieved easily
    and quickly. When it comes to tables that are larger than a couple of data pages,
    SQL Server tries to use indexes to traverse the various data pages and find the
    data it needs quickly. However, there can be scenarios where the necessary indexes
    do not exist. This causes SQL Server to have to read more data pages, sometimes
    all the data in a table, to determine which rows are needed in order to satisfy
    the query requirements.


    Once the data has been deemed to not be a priority, SQL Server can then go to
    disk and get the data that it needs. This data will be stored in the buffer pool
    until a future point when it is deemed that this data is no longer needed. In
    terms of the speed of hardware, there is already a slowness introduced with this
    process. If the data does not exist in the buffer pool, there is also the time
    associated with determining what records need to be dropped from the buffer pool.
    Dropping those records from the buffer pool and going to disk incurs additional
    cost in terms of time to retrieve that data from disk.


    If this data is only needed for a job that runs once every four to six hours,
    most of this data may be deemed irrelevant for every other process. This introduces
    a high churn of data that is being removed from the buffer pool. New data can
    be grabbed from disk and saved to the buffer pool. Then this new data may be removed
    from the buffer pool and be replaced with even newer data that has been retrieved
    from disk.


    In addition to this overhead associated with dealing with significant amount of
    data, there are other activities that interact with the disk or storage. When
    new data is being written to the system, that data will get stored in the transaction
    log. Data will continue to be added to the transaction log until the transaction
    log is cleared. Flushing the log can occur when the transaction is committed and
    the information is written to disk. In cases where a significant amount of data
    is being added, updated, or deleted from the system, this can cause a significant
    amount of disk activity to modify the table and an increase of disk storage due
    to log growth and data saved in the case of an insert.


    Knowing how this data is stored and how SQL Server can easily find that data through
    indexes and other data pages stored on disk is important. When information is
    added to an index or an index needs to be updated, this information will also
    incur storage cost. This is not only in terms of the time needed to store the
    data but also the time involved to go to disk and make these additions or changes.


    When working with T-SQL, you want to consider how your queries affect your data
    storage. This can mean multiple things, as you saw in the previous section. You
    want to make sure that you are not accessing, inserting, updating, or deleting
    more data than you need at a given time. That is not the only factor that comes
    into play when writing T-SQL. There are some things you can do to monitor storage
    use associated with your queries. Most of these things involve looking at the
    number of physical reads, read-ahead reads, or the I/O cost associated with the
    query.


    If you have confirmed that you are dealing with the minimal amount of data that
    you want to interact with, there may be nothing you can do to decrease the storage
    cost associated with your T-SQL queries. In some cases, just like with memory,
    finding large storage usage may point to other issues. These issues can include
    things like how the data is saved on disk and how the indexes are designed.


    ## Index and Page Split Impacts on Storage


    In some cases, you may find that frequent index updates are causing a significant
    amount of storage cost. This may be due to indexes constantly needing to be reorganized
    based on how the index is designed. If a non-clustered index is created on the
    `ShipDate` in the `dbo.CustomerOrder` table, then the index will need to be updated
    if the `ShipDate` is populated or changed. When this happens, the `ShipDate` may
    need to be moved to a different page. If that page is full, SQL Server will create
    a new page. That new page may have some data transferred over from the old page,
    and the new data will be added to the page. There will also be a pointer created
    so that SQL Server knows where to look for the next data page in the logical sequence.
    When this happens, it is referred to as `index fragmentation`. This can cause
    queries using this index to perform poorly as the index information is not stored
    in sequence. While this is less of an issue with SSDs, index fragmentation can
    still cause the index to take up more space than it would if the index was properly
    organized.


    There are also cases involving page splits where you may see a significant storage
    cost associated with this activity. The way that your tables are ordered or your
    indexes are designed may cause a significant number of page splits. For instance,
    I can create the table using the `ShipDate` as the clustered index in the `dbo.CustomerOrder`
    table. If the application does not populate a ship date for every order, or if
    a ship date gets changed, then the data record could get moved to a different
    page. In some cases, the record may be moved to a page that is already full. If
    so, then the page will split, allowing the record to be added to a data page with
    available space. You may see an increase in disk activity associated with maintaining
    some of these indexes.


    ## The Role of the Storage Engine


    For additional information regarding how storage costs work, it may help to understand
    how the SQL Server storage engine operates. When dealing with T-SQL queries, there
    is one aspect that depends on the storage engine more frequently. This has to
    do with accessing data that is currently not in the buffer pool.


    The storage engine has several different functions. These functions involve accessing
    data that is not in the buffer pool. Another function of the storage engine has
    to do with how data is handled when locks are required. The third function of
    the storage engine involves commands that are not related to running T-SQL that
    is used by applications.


    The storage engine can experience performance bottlenecks when accessing data.
    These bottlenecks can in turn cause performance issues when it comes to accessing
    the data that is stored. One example is when queries access rows in data tables
    or interact with indexes. At other times, the storage engine may need to handle
    page allocations related to retrieving data for the buffer pool. If your company
    has decided to implement row versioning, this could cause performance issues with
    storage. While this is outside the scope of this book, if you are using row versioning
    and you experience issues related to storage performance, you may want to do additional
    research to confirm that row versioning is not the cause.'
