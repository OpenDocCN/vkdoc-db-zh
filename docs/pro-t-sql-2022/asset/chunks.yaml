    | 27 | Ian | West | False |


    一旦你获得了表 11-1 中的结果，你就知道哪些记录会受到 `dbo.GetCustomer` 更改的影响，以返回活动客户而非所有客户。未修改的存储过程如清单
    11-2 所示。


    ```sql

    /*-------------------------------------------------------------*\

    Name:             dbo.GetCustomer

