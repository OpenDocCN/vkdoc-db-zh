- fmt: "# SQL Server 表分区与索引查询性能分析\n\n## 初始查询：非分区表\n`dbo.CustomerOrderHistory` 表在查询执行时未进行分区，且表按聚集主键（即\
    \ `CustomerOrderHistoryID`）排序。虽然数据可能按记录创建顺序存储，但 SQL Server 无法根据表的配置得知这一点。为确保 SQL\
    \ Server 能基于创建日期检索所有数据，它需要检查表中的每条记录。这在执行计划中体现为聚集索引扫描操作。图 16-8 显示了与清单 16-3 中查询相关的一些属性。\n\
    \n![](images/480547_2_En_16_Chapter/480547_2_En_16_Fig8_HTML.jpg)\n\n图 16-8：与聚集索引扫描相关的读取操作\n\
    \n本次查询返回的总记录数为 802,818 条，本地读取总数为 3,392 次。这代表了为确定满足查询条件的记录数而访问的总页数。\n\n## 分区表性能对比\n\
    前述数值代表了 SQL Server 在非分区表上执行查询的方式。你可以对比清单 16-13 中的查询在非分区表和分区表上的性能。你可以为 `dbo.CustomerOrderHistory`\
    \ 表添加分区，并将结果与前面的非分区表进行对比。首先需要删除现有的主键，并添加一个新的非聚集主键，如清单 16-10 所示。由于该表不再有聚集索引，如果你尝试重新运行清单\
    \ 16-13 的查询，将会得到如图 16-9 所示的执行计划。\n\n![](images/480547_2_En_16_Chapter/480547_2_En_16_Fig9_HTML.jpg)\n\
    \n图 16-9：分区表上无分区键聚集索引的情况\n\n如果忘记在包含分区范围的分区列上添加新的聚集索引，最终会得到一个堆表。这种情况下，结果是需要进行全表扫描来查找符合指定日期条件的任何记录。虽然你可能预期此示例与前一示例的逻辑读取次数相同，但图\
    \ 16-10 显示了一个不同的结果。\n\n![](images/480547_2_En_16_Chapter/480547_2_En_16_Fig10_HTML.jpg)\n\
    \n图 16-10：分区表上无分区键聚集索引的查询读取情况\n\n在第一个示例中，图 16-8 显示了需要 3,392 次逻辑读取才能找到 `dbo.CustomerOrderHistory`\
    \ 中符合指定日期范围的所有记录。对表进行分区并用 `CustomerOrderHistoryID` 和 `DateCreated` 替换原始主键后，逻辑读取次数从\
    \ 3,392 次下降到 3,375 次，如图 16-10 所示。尽管逻辑读取次数显著下降，但在分区表的分区列上执行需要全表扫描的查询并不是理想的做法。关键点在于确保分区表上有一个能够利用分区列的聚集索引。\n\
    \n## 正确使用分区表：利用聚集索引与分区消除\n为了更好地利用分区表，需要在分区表上包含一个聚集索引。这包括拥有一个按分区列与分区方案对齐的聚集索引。完成此操作后，就可以运行清单\
    \ 16-3 中的 T-SQL 代码。你将得到如图 16-11 所示的执行计划。\n\n![](images/480547_2_En_16_Chapter/480547_2_En_16_Fig11_HTML.jpg)\n\
    \n图 16-11：分区表上在分区键上有聚集索引的情况\n\n你可以验证 SQL Server 现在使用聚集索引查找来定位正确的数据。还可以检查此操作的属性，以确定包含分区键的聚集索引带来的实际影响。你可以在图\
    \ 16-12 中看到 I/O 统计信息和返回的行数。\n\n![](images/480547_2_En_16_Chapter/480547_2_En_16_Fig12_HTML.jpg)\n\
    \n图 16-12：分区表上在分区键上有聚集索引的查询读取情况\n\n最初在非分区表上运行此查询时，有 3,392 次逻辑读取。在分区表上但没有聚集索引的情况下，逻辑读取次数下降到\
    \ 3,375 次。虽然较低的逻辑读取次数不能完全确定性能会更好，但你可以确认，在分区列上具有聚集索引的分区表上查询时，SQL Server 将读取更少的数据。现在分区表上有了聚集索引，总逻辑读取次数从\
    \ 3,375 次下降到 4,190 次，如图 16-12 所示。\n\n正确创建分区表只是提升性能挑战的一部分。主要的方法是编写包含允许分区消除条件的 T-SQL\
    \ 代码。清单 16-14 中的代码是一个未将分区列指定为条件的 T-SQL 代码示例。\n\n```sql\nSELECT CustomerOrderHistoryID,\n\
    \       CustomerOrderID,\n       CustomerOrderHistoryStatusID,\n       DateCreated\n\
    FROM dbo.CustomerOrderHistory\nWHERE CustomerOrderID = 401408\n  AND CustomerOrderHistoryStatusID\
    \ = 1;\n```\n\n*清单 16-14：未使用分区列访问数据*\n\n因此，该查询将在表的所有分区上执行。即使对指定的列存在索引，查询仍需要分别搜索每个分区中的数据，以确认返回了所有请求的数据。一旦确定了分区列，就应将其包含在所有查询中，以便利用分区表。对于清单\
    \ 16-15 的查询，你需要在 WHERE 子句中包含 `DateCreated`。为了避免访问所有分区，你还需要为该值指定一个实际的日期范围，例如 `DateCreated\
    \ BETWEEN '2022-10-07' AND '2022-10-09'`。"
  raw: 'The `dbo.CustomerOrderHistory` table was not partitioned when this query was
    executed, and the table was ordered by the clustered primary key. In this case,
    that is the `CustomerOrderHistoryID`. While the data may have been stored in the
    order the records were created, SQL Server has no way to know that is true based
    on how the table is configured. To make sure that SQL Server retrieves all data
    based on the date created, SQL Server will need to review each record in the table.
    This is represented earlier with the Clustered Index Scan operator on the execution
    plan. Figure [16-8](#480547_2_En_16_Chapter.xhtml#Fig8) shows some of the properties
    associated with the query from Listing [16-3](#480547_2_En_16_Chapter.xhtml#PC3).


    ![](images/480547_2_En_16_Chapter/480547_2_En_16_Fig8_HTML.jpg)


    A screenshot presents the properties associated with clustered index scan. It
    depicts 10 properties. Actual logical reads are 3392\. Actual physical reads are
    2\. Actual read aheads are 3458\. Actual scans are 1. The actual number of rows
    for all executions is 802818.


    Figure 16-8


    Reads associated with a clustered index scan


    The number of total records returned for this query is 802,818\. The total number
    of local reads is 3,392\. This represents the total number of pages that were
    accessed to determine the number of records that met the criteria for this query.


    The preceding values represent how SQL Server would execute a query on a non-partitioned
    table. You can compare the performance of the query in Listing [16-13](#480547_2_En_16_Chapter.xhtml#PC13)
    between a non-partitioned and partitioned table. You can add a partition to the
    `dbo.CustomerOrderHistory` table and compare the results to the preceding non-partitioned
    table. You first need to drop the existing primary key and add a new non-clustered
    primary key like the one from Listing [16-10](#480547_2_En_16_Chapter.xhtml#PC10).
    Since this table no longer has a clustered index, you will get an execution plan
    like the one in Figure [16-9](#480547_2_En_16_Chapter.xhtml#Fig9) if you try to
    rerun the query from Listing [16-13](#480547_2_En_16_Chapter.xhtml#PC13).


    ![](images/480547_2_En_16_Chapter/480547_2_En_16_Fig9_HTML.jpg)


    A text with symbols depicts an execution plan without a clustered index. The text
    presents table scan, cost 100%, 0.237 seconds, 802818 of 131917, and Select cost
    0%. Symbols are of a table and table scan.


    Figure 16-9


    Partitioned table without a clustered index on a partitioning key


    If you forget to add a new clustered index on the partitioning column including
    the partition range, you will end up with a heap. In this case, the result is
    a full scan of the table to find any records that matches the date criteria specified.
    While you might expect the number of logical reads to be the same for this example
    and the previous example, Figure [16-10](#480547_2_En_16_Chapter.xhtml#Fig10)
    shows a different result.


    ![](images/480547_2_En_16_Chapter/480547_2_En_16_Fig10_HTML.jpg)


    A screenshot presents the properties associated with the table scan. It depicts
    10 properties. Actual logical reads are 3375\. Actual physical reads are 0\. Actual
    read aheads are 0\. Actual scans are 2\. The actual number of rows for all executions
    is 802818.


    Figure 16-10


    Reads for a query partitioned table without a clustered index on a partitioning
    key


    In the first example, Figure [16-8](#480547_2_En_16_Chapter.xhtml#Fig8) shows
    3,392 logical reads to find all records in `dbo.CustomerOrderHistory` that match
    the date range specified. Partitioning the table and replacing the original primary
    key with both the `CustomerOrderHistoryID` and `DateCreated` has caused the number
    of logical reads to drop from 3,392 to 3,375, as shown in Figure [16-10](#480547_2_En_16_Chapter.xhtml#Fig10).
    While the number of logical reads has dropped significantly, it is not ideal to
    perform queries where full table scans are required on the partitioning column
    of the partitioned table. The point is to make sure you have a clustered index
    on your partitioned table that can take advantage of the partitioning column.


    To take better advantage of your partitioned table, you want to include a clustered
    index on your partitioned table. This included having a clustered index that is
    aligned on the partition scheme by the partition column. Once you have done this,
    you can run the T-SQL code from Listing [16-13](#480547_2_En_16_Chapter.xhtml#PC13).
    You will get an execution plan like the one in Figure [16-11](#480547_2_En_16_Chapter.xhtml#Fig11).


    ![](images/480547_2_En_16_Chapter/480547_2_En_16_Fig11_HTML.jpg)


    A text with symbols depicts an execution plan with a clustered index. The text
    presents clustered index seek, cost 100%, 0.149 seconds, 802818 of 131917, and
    Select cost 0%. Symbols are of a table and clustered index seek.


    Figure 16-11


    Partitioned table with a clustered index on a partitioning key


    You can verify that SQL Server now uses a clustered index seek to find the correct
    data. You can also examine the properties for this operator to identify what kind
    of impact having a clustered index that includes the partitioning key really has.
    You can see the I/O statistics and rows return in Figure [16-12](#480547_2_En_16_Chapter.xhtml#Fig12).


    ![](images/480547_2_En_16_Chapter/480547_2_En_16_Fig12_HTML.jpg)


    A screenshot presents the properties associated with the clustered index seek.
    It depicts 10 properties. Actual logical reads are 4199. Actual physical reads
    are 2\. Actual read aheads are 4190\. Actual scans are 2\. The actual number of
    rows for all executions is 802818.


    Figure 16-12


    Reads for a query partitioned table with a clustered index on a partitioning key


    When you originally ran this query on a non-partitioned table, there were 3,392
    logical reads. After partitioning table without a clustered index, the number
    of logical reads dropped to 3,375\. While the lower number of logical reads does
    not indicate with certainty that the performance will be better, you can confirm
    that SQL Server will read less data querying a partitioned table with a clustered
    index on the partitioning column. Now that there is a clustered index on the partition
    table, the total logic reads has dropped from 3,375 to 4,190 logical reads, as
    shown in Figure [16-12](#480547_2_En_16_Chapter.xhtml#Fig12) above.


    Creating a partitioned table correctly is only part of the challenge if you want
    to improve performance. The main way this can be done is by writing T-SQL code
    that includes criteria that allows for partition elimination. The data code in
    Listing [16-14](#480547_2_En_16_Chapter.xhtml#PC14) is an example of T-SQL code
    that does not specify the partitioning column as part of the criteria.


    ```

    SELECT CustomerOrderHistoryID,

    CustomerOrderID,

    CustomerOrderHistoryStatusID,

    DateCreated

    FROM dbo.CustomerOrderHistory

    WHERE CustomerOrderID = 401408

    AND CustomerOrderHistoryStatusID = 1;

    Listing 16-14

    Accessing Data Without Using a Partitioned Column

    ```


    As a result, this query will be executed on all partitions in the table. Even
    if there is an index for the columns specified, the query will still need to search
    the data in each partition separately to confirm that all data requested is returned.
    Once you decide on a partitioning column, you should include the partitioning
    column in all your queries so that you can take advantage of the partitioned table.
    To do that for the query from Listing [16-15](#480547_2_En_16_Chapter.xhtml#PC15),
    you need to include the `DataCreated` in the WHERE clause. In order to keep from
    accessing all partitions, you also want to specify an actual date range for this
    value, such as `DateCreated BETWEEN ''2022-10-07'' AND ''2022-10-09''`.'
