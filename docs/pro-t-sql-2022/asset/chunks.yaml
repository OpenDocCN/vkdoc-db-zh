  trans: '

    在这种情况下，第一条查询返回所有城市名包含“Memphis”一词的结果。然而，`EXCEPT`语句表明，如果某条记录同时出现在第一条和第二条查询中，则该记录将从结果集中排除。此查询的结果见表
    5-31。


    表 5-31

    表 5-26 和 5-27 结果的 EXCEPT 运算


    | 名 | 姓 | 地址 | 城市 | 邮政编码 | 国家 |

    | --- | --- | --- | --- | --- | --- |

    | Josè | Gomez | 790 Calle Cinco de Mayo | Cancun | 53778 | 墨西哥 |

    | Stacy | Parks | 123 Rua de Santa Catarina | Porto | 1234-567 | 葡萄牙 |


    使用`EXCEPT`语句可能不是从数据集中排除结果的首选方法，但它是我更习惯使用的方法。这正是 T-SQL 代码的益处与挑战所在：对于几乎任何场景，编写 T-SQL
    代码的方式几乎肯定不止一种。你编写数据库代码的原因将决定你在编码时拥有的灵活度。如果你只是执行一次查询，或许可以使用效率较低的方法来访问这些数据。然而，如果你是为某个应用程序编写代码，你就需要平衡
    T-SQL 代码的可读性与提升数据返回速度。


    代码清单 5-12 展示了在插入数据时如何使用数据集。


    ```sql

    CREATE TABLE #TempProductArchive

    (

    ProductID      INT            NOT NULL,

    ProductName    VARCHAR(25)    NOT NULL,

    ProductPrice   DECIMAL(6,2)   NOT NULL,

    IsActive       BIT            NOT NULL,

    DateCreated    DATETIME2(2)   NOT NULL,

    DateModified   DATETIME2(2)   NOT NULL,

    DateDisabled   DATETIME2(2)   NULL,

    DateInserted   DATETIME2(2)   NOT NULL

    );

    INSERT INTO #TempProductArchive

    (

    ProductID,

    ProductName,

    ProductPrice,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled,

    DateInserted

    )

    SELECT

    ProductID,

    ProductName,

    ProductPrice,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled,

    GETDATE()

    FROM dbo.Product

    WHERE DateDisabled < ''2022-08-01'';

    ```

    代码清单 5-12

    作为集合插入数据


    代码清单 5-13 展示了如果是逐条记录插入，插入语句的样子。


    ```sql

