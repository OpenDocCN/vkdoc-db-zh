- fmt: '## SQL Server 索引操作详解


    This mean that SQL Server looked through the data as sorted by the clustered index
    but had to scan through the table to find all the records needed to satisfy the
    query requirements.


    SQL Server uses the term `seek` to indicate that the requested data could be found
    without searching a significant portion of the reference index. When more records
    are accessed that the matching records in the table `t`, SQL Server refers to
    this as a `scan`. While seeks or scans can apply to clustered indexes, they can
    also apply to non-clustered indexes. Non-clustered indexes are not sorted in the
    same order as the clustered index or the table, if the table is a heap. The non-clustered
    index is sorted in the order of key columns specified in the index. If there is
    a clustered index on the table, the non-clustered index will have a pointer back
    to the clustered index. If there is no clustered index, then the non-clustered
    index will point back to the row ID in the table.


    If the execution plan uses a non-clustered index, there are a couple of different
    ways the SQL Server can search through the data records. If SQL Server knows where
    to find the data in the non-clustered index, you will see an index seek in the
    execution plan. The index seek will look like Figure [7-13](#480547_2_En_7_Chapter.xhtml#Fig13).


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig13_HTML.jpg)


    A snapshot presents the icon of the clustered index seek in the execution plan.


    Figure 7-13: Index Seek icon


    If a clustered index seek cannot be used based on the `T-SQL` code that is written,
    the next best option is an index seek, where a there is a seek on a non-clustered
    index. If a seek is not possible, SQL Server will end up using an index scan.
    Like the clustered index scan, this means that SQL Server needed to go through
    the index to find the necessary data records. If the execution plan uses an index
    scan, Figure [7-14](#480547_2_En_7_Chapter.xhtml#Fig14) shows how it will appear
    in your execution plan.


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig14_HTML.jpg)


    A snapshot presents the icon of the clustered index scan in the execution plan.


    Figure 7-14: Index Scan icon


    Also, like clustered index scans, if you see an index scan, you may want to see
    what can be done in terms of rewriting `T-SQL` to use an index seek instead.


    Keep in mind what kind of data is needed when writing your `T-SQL` queries. While
    including additional data fields can have additional hardware overhead, it can
    also affect how SQL Server searches the data records. If SQL Server needs to use
    an index seek or an index scan to find the required data records, that does not
    mean that all the data fields need to exist in the non-clustered index. If additional
    data columns are required, SQL Server may need the non-clustered index to get
    the additional data columns from the clustered index. When this happens, you will
    see a key lookup in your execution plan like the one in Figure [7-15](#480547_2_En_7_Chapter.xhtml#Fig15).


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig15_HTML.jpg)


    A snapshot presents the icon of the key lookup in the execution plan. The icon
    is used to o get the additional data columns from the clustered index.


    Figure 7-15: Key Lookup icon


    When you see a key lookup, that lets you know that not all the columns needed
    for your query existed in the non-clustered index. In these scenarios, it signifies
    that the index may need to be modified to include those columns. Before deciding
    to add these data fields as included columns, you should be aware that including
    the columns in the index may have an additional cost associated with writing or
    updating the index.


    A table that does not have a clustered index is also known as a heap. If there
    are no other indexes on the table, SQL Server will have to search row by row to
    find the data records it needs for query results. There are many other factors
    that can be involved, but this can cause SQL Server to scan the entire table.
    This can be seen in the execution plan in Figure [7-16](#480547_2_En_7_Chapter.xhtml#Fig16).


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig16_HTML.jpg)


    A snapshot presents the icon of the table scan in the execution plan. The con
    is used to scan the entire table.


    Figure 7-16: Table Scan icon


    Some tables that are very small may not need to have indexes and using a table
    scan may be acceptable. If there are many records in the table, then a table scan
    is not ideal. When this is the case, you may want to investigate if there are
    any possible indexes that can be added to the table.


    If there is a non-clustered index on the heap, it is possible that SQL Server
    can use the non-clustered index as part of the execution plan. If this is the
    case, you will see an index seek or an index scan. When either an index seek or
    index scan is in the execution plan, it is possible that the columns used in the
    query do not exist in the non-clustered index. If additional columns need to be
    looked up in the table, you will see a `RID` lookup in the execution plan. You
    can see this in Figure [7-17](#480547_2_En_7_Chapter.xhtml#Fig17).


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig17_HTML.jpg)


    A snapshot presents the icon of the `R I d` lookup in the execution plan. The
    con is used when additional columns need to be looked up in the table.


    Figure 7-17: `RID` Lookup icon


    Like the key lookup, you want to see if you can alter any non-clustered indexes
    to include the necessary columns from the `T-SQL` code. It is also possible that
    the query can be modified to exclude the columns that are causing the `RID` lookup.


    As an example, Listing [7-6](#480547_2_En_7_Chapter.xhtml#PC6) shows a query to
    retrieve all customers that have a first name that begins with the letter S.


    ```sql

    SELECT FirstName, DateCreated

    FROM dbo.Customer

    WHERE FirstName LIKE ''S%'';

    ```

    Listing 7-6: Query to Get Customers


    The first time I ran this query, there was only a primary clustered index on `CustomerID`
    in this table. The execution plan from the `T-SQL` code in Listing [7-6](#480547_2_En_7_Chapter.xhtml#PC6)
    is shown in Figure [7-18](#480547_2_En_7_Chapter.xhtml#Fig18).


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig18_HTML.jpg)


    A snapshot presents the icon of the clustered index scan in the execution plan.
    A leftward arrow indicates the select cost of 0%.


    Figure 7-18: Execution plan with only a clustered index


    There are no non-clustered index on the table. The only option SQL Server has
    is to search through the entire clustered index to find the requested records.
    You can see this by looking over the properties associated with the clustered
    index scan. The properties for this query execution can be found in Figure [7-19](#480547_2_En_7_Chapter.xhtml#Fig19).


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig19_HTML.jpg)


    A chart presents the details of the clustered Index Scan operator in the execution
    plan. Two arrows indicate the number of rows read, and the number of rows to be
    read, both are 401409.


    Figure 7-19: Reads with a clustered index


    Looking at the estimated and actual number of rows to be read, they are the same.
    The total for each is `401,409` rows read. The actual number of rows is `2`. SQL
    Server must search `401,409` rows to find the `2` rows that matched the criteria.


    This scenario has a query that is reading significantly more rows than the number
    of rows returned. You cannot rewrite the query to use a non-clustered index since
    none exist. The best option is to write a non-clustered index to improve performance.
    The new non-clustered index is Listing [7-7](#480547_2_En_7_Chapter.xhtml#PC7).'
