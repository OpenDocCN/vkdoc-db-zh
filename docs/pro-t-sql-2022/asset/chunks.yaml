  trans: "\n3.  使用新的 `功能标志` 部署更新后的应用程序。\n    1.  未修改的应用程序可以继续如常工作。\n\n2.  由于 `功能标志`，修改后的应用程序将使用新功能。\n\
    \n4.  移除未修改的应用程序。\n\n5.  更新剩余的应用程序代码，使其在不使用 `功能标志` 的情况下具备相同功能。\n\n6.  移除 `功能标志`。\n\
    \n这种部署方法让你能够管理和控制如何部署及启用新的数据库代码。\n\n虽然影响数据质量是一个问题，但与数据库代码变更相关的性能问题也同样令人担忧。在某些情况下，数据库对象的添加或修改可能导致性能严重下降。根据应用程序的配置方式，这可能会导致应用程序失败。可以采用一些部署策略，帮助在潜在的性能问题对最终用户可见之前就识别它们。\n\
    \n你可能还希望在让所有人使用新的 `T-SQL` 代码之前对其进行测试。通过使用一个单独的应用了 `T-SQL` 代码变更的数据库，你可以大致了解 `T-SQL`\
    \ 代码的性能情况。由于目前 `SQL Server` 的特性，你只能在这个辅助数据库上测试读事务。当你使用这种方法时，你采用的是 `金丝雀部署方法`。其概念是应用程序将同时连接到两个数据库。第二个数据库仅执行读事务。借助额外的硬件，你可以让大部分事务发送到原始数据库，只有一小部分活动发送到第二个数据库。随着你对新的\
    \ `T-SQL` 代码信心的增加，可以逐步增加发送到第二个数据库的活动量。\n\n在设计可部署的代码时，你需要从最开始就着手。你必须了解团队的架构、开发周期以及代码何时部署到各个环境中。目标是编写可维护且易于管理的\
    \ `T-SQL` 代码。你可以选择基于迁移的方法来部署 `T-SQL` 代码，这样可以精确控制部署到各个环境的内容。或者，你也可以选择基于状态的方法，控制部署后数据库应处的状态。你还需要确定如何处理尚未准备好部署的代码开发。通过使用分支与合并策略，你可以将开发中的代码与将要部署的代码分开管理。还有一种选择是使用\
    \ `功能标志`，这样你可以在任何时间点部署代码，并控制新功能的启用时机。无论你选择哪种方法，都需要确定一个清晰可定义的、可重复执行的部署策略。\n\n#\
    \ 13. 功能性\n\n在本书中，我们涵盖了许多不同的主题。其中大多数章节都涉及最佳实践。这些最佳实践包括命名规范、`T-SQL` 代码格式化或数据库对象设计。尽管你已尽最大努力，但有时仍可能遇到超出最佳实践范围的情况。这些时候往往与高压期或紧迫的截止日期相关。本章的目标是帮助你为必须就复杂主题快速做出决策的情况做好准备。\n\
    \n为允许用户插入或更新数据的应用程序设计数据库代码可能具有挑战性。你可能会发现自己需要处理需要禁用权限或功能的应用程序。在处理遗留应用程序代码时，可能会遇到额外的挑战，特别是如果这些应用程序使用了\
    \ `ORM`（对象关系映射）软件。随着组织的成长，可能需要额外的报表功能，但可能没有足够的时间来开发数据仓库。在 `SQL Server` 中，你可以让\
    \ `T-SQL` 代码更加灵活，但必须确保不以牺牲功能为代价来换取灵活性。\n\n在本章中，你将回顾常见的编程需求和可用于满足这些需求的 `T-SQL`\
    \ 编码方法。对于每种方法，你将审视其优缺点，以帮助你快速做出决策。\n"
- fmt: '## Inserting and Updating Data


    One common situation that T-SQL code needs to handle is how to insert or update
    data. This section starts by discussing the easiest, but most troublesome, solution
    using `MERGE` statements. Another method of using an `IF` statement is discussed;
    it allows SQL to determine if a record exists. If it does, the record will be
    updated. Otherwise, the record will be inserted.


    There are many scenarios where you want the ability to pass in a set of values.
    If the records do not exist, you may want to insert the information, but if the
    record does exist, you may want to update that record. Often, when we are under
    pressure, we want to use the fastest, easiest way to do things. Other times, we
    may be focused more on T-SQL code readability than what is best for the database
    engine. While it is important to ensure that your database code can be understood
    by others, it is equally as important to consider the performance of your database
    code when writing T-SQL.


    This can be equally true when using T-SQL to insert or update database records.
    It may be easier and more straightforward for an application to execute the same
    stored procedure regardless of whether the user is inserting a new record or updating
    an existing record. This type of action can also be referred to as an `upsert`.
    It does not matter how you find yourself in the situation; the important thing
    is to design T-SQL code that works reliably and effectively.


    ### Problems with the MERGE Statement


    There is T-SQL database code that seems like it will make the process of performing
    an insert or an update in a single query. This functionality is called a `MERGE`
    statement. The benefit of using a `MERGE` statement is that the logic is straightforward.
    However, there are many known issues with the `MERGE` statement. The most significant
    issue with the `MERGE` statement is in relation to deleting data from tables that
    use indexed views. When data is deleted from the table, the associated indexed
    view updates intermittently. It has also been reported that using `MERGE` statements
    with temporal tables does not always work as expected. Other issues include partitioned
    tables not updating full-text indexes when the `MERGE` statement modifies a string
    column that is part of the full-text index. Unique key violation errors can occur
    when using `MERGE` to `DELETE` or `INSERT` data into a table using nonfiltered
    unique indexes.


    I suggest not using a `MERGE` statement unless you are willing to accept these
    potential issues. Listing 13-1 shows an example of a `MERGE` statement.


    ```sql

    CREATE PROCEDURE dbo.CustomerOrderMerge

    @CustomerOrderID INT,

    @CustomerID INT,

    @OrderNumber VARCHAR(15),

    @OrderDate DATETIME2(2),

    @ShipDate DATETIME2(2),

    @IsActive BIT,

    @DateCreated DATETIME2(2),

    @DateModified DATETIME2(2),

    @DateDisabled DATETIME2(2)

    AS

    MERGE dbo.CustomerOrder AS [Target]

    USING

    (

    VALUES

    (

    @CustomerOrderID,

    @CustomerID,

    @OrderNumber,

    @OrderDate,

    @ShipDate,

    @IsActive,

    @DateCreated,

    @DateModified,

    @DateDisabled

    )

    ) AS [Source]

    (

    CustomerOrderID,

    CustomerID,

    OrderNumber,

    OrderDate,

    ShipDate,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    )

    ON ([Target].CustomerOrderID = [Source].CustomerOrderID)

    WHEN MATCHED THEN

    UPDATE SET

    [Target].CustomerID = [Source].CustomerID,

    [Target].OrderNumber = [Source].OrderNumber,

    [Target].OrderDate = [Source].OrderDate,

    [Target].ShipDate = [Source].ShipDate,

    [Target].IsActive = [Source].IsActive,

    [Target].DateCreated = [Source].DateCreated,

    [Target].DateModified = [Source].DateModified,

    [Target].DateDisabled = [Source].DateDisabled

    WHEN NOT MATCHED BY TARGET THEN

    INSERT (

    CustomerOrderID,

    CustomerID,

    OrderNumber,

    OrderDate,

    ShipDate,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    )

    VALUES (

    [Source].CustomerOrderID,

    [Source].CustomerID,

    [Source].OrderNumber,

    [Source].OrderDate,

    [Source].ShipDate,

    [Source].IsActive,

    [Source].DateCreated,

    [Source].DateModified,

    [Source].DateDisabled

    );

    ```

    *Listing 13-1 Stored Procedure with a Merge Statement*


    This `MERGE` statement updates a customer order if the order already exists in
    the `dbo.CustomerOrder` table. The logic for this `MERGE` statement is easy to
    follow, and the format can be easy to write. You want to be aware of these issues
    before implementing `MERGE` statements in your environment.


    I once implemented `MERGE` statements before fully understanding the issues these
    statements presented. When I tried to replace the `MERGE` statements, there were
    concerns that the logic would be too difficult. To replace the logic from Listing
    13-1, you can write a query like the one in Listing 13-2.


    ### Using IF…ELSE for Upserts


    Replacing the logic from the `MERGE` statement, you can use an `IF… ELSE` statement
    to control the flow of actions inside the SQL Server query. In Listing 13-2, if
    the order exists in the `dbo.CustomerOrder` table, the record will update all
    fields except `DateCreated`. Otherwise, a new record in `dbo.CustomerOrder` will
    be inserted.


    ```sql

    CREATE PROCEDURE dbo.CustomerOrderUpsert

    @CustomerOrderID INT,

    @CustomerID INT,

    @OrderNumber VARCHAR(15),

    @OrderDate DATETIME2(2),

    @ShipDate DATETIME2(2),

    @IsActive BIT,

    @DateCreated DATETIME2(2),

    @DateModified DATETIME2(2),

    @DateDisabled DATETIME2(2)

    AS

    IF EXISTS (SELECT CustomerOrderID FROM dbo.CustomerOrder WHERE CustomerOrderID
    = @CustomerOrderID)

    BEGIN

    UPDATE dbo.CustomerOrder

    SET   CustomerID = @CustomerID,

    OrderNumber = @OrderNumber,

    OrderDate = @OrderDate,

    ShipDate = @ShipDate,

    IsActive = @IsActive,

    DateModified = @DateModified,

    DateDisabled = @DateDisabled

    WHERE CustomerOrderID = @CustomerOrderID;

    END;

    ELSE

    BEGIN

    INSERT dbo.CustomerOrder

    (

    CustomerOrderID,

    CustomerID,

    OrderNumber,

    OrderDate,

    ShipDate,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    )

    VALUES

    (

    @CustomerOrderID,

    @CustomerID,

    @OrderNumber,

    @OrderDate,

    @ShipDate,

    @IsActive,

    @DateCreated,

    @DateModified,

    @DateDisabled

    )

    END;

    ```

    *Listing 13-2 Stored Procedure to Insert or Update*


    ### Conclusion and Recommendations


    `MERGE` statements are not limited to inserting or updating data in a target table.
    `MERGE` statements can be expanded to handle other scenarios such as inserting
    or deleting data. `MERGE` statements can also be created so that missing records
    are inserted, changed records are updated, and orphaned records are deleted as
    part of a single statement. While the data modifications can be combined as part
    of single statement, you should use caution when using `MERGE` statements because
    they can be prone to performance issues and data inconsistencies as discussed.
    Due to the ease of writing `MERGE` statements, it is possible to compare data
    between two tables in a way that is not efficient for SQL Server. While the tables
    are only being compared once, if the comparison is not efficient, this can have
    a significant impact on the performance tables being compared. There have also
    been instances where unique key violations can occur when using filtered indexes.
    `MERGE` statements can also create foreign key constraint violations in specific
    circumstances. This includes using two tables with foreign key constraints where
    the foreign key is set to `NOCHECK` and then rolled back. I suggest researching
    known issues with `MERGE` statements and performing adequate testing to confirm
    the T-SQL code will work as expected. The code in Listing 13-2 shows that it is
    not overly complex to write code that can handle either an insert or an update.
    Prior to SQL Server 2019, either the code in Listing 13-1 or Listing 13-2 may
    have been subject to parameter sniffing. Now that SQL Server 2019 has adaptive
    joins, this should be less of an issue.'
