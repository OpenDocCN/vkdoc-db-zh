  trans: '

    在编写 T-SQL 代码时，最大的问题之一是未能充分利用数据集。这通常是因为编写过程式代码更得心应手，或者尚未培养以数据集方式思考的能力。在本书中，我的目标是通过多种方式，指导你编写出拥抱并善用数据集的代码。


    # 6. 硬件使用


    在考虑如何设计查询时，你已经了解了基于集合的设计的要素。但在使用 SQL Server 时，还有其他需要考虑的事项。你所使用的是一个超越其各个组成部分的系统。SQL
    Server 有许多方面：存储的数据、访问数据的过程，以及如何访问数据的流程。SQL Server 不仅仅是软件，它还涉及该软件如何与你的计算机或服务器的硬件进行交互。


    在使用硬件方面，SQL Server 利用了多个不同的部件。有些部件可能看起来很直接，而另一些起初可能令人惊讶。SQL Server 被称为关系数据库管理系统。作为关系数据库管理系统的一部分，SQL
    Server 的目的是实现数据的高效存储和检索。这意味着，运行 SQL Server 的系统上，最重要的硬件部件之一是内存。谈到数据的长期存储，硬盘驱动器就变得最为关键。在本章中，我将它们称为
    `storage`，因为存储不仅限于硬盘。然而，还有其他一些不太明显的元素，例如 CPU。


    在本章中，你将审视一些编码模式和反模式，这些模式可能导致服务器资源被有效或无效地分配。对于反模式，你将探讨替代方法，以实现在不使这些有限的硬件资源负担过重的情况下的相同结果。


    ## T-SQL 设计中的内存考量


    当你初次开始在 SQL Server 中处理数据时，可能会惊讶地发现内存是最重要的因素之一。这在很大程度上与内存在 SQL Server 内部的用途有关。SQL
    Server 旨在利用内存。有一个称为 `caching` 的过程，它将信息保留在内存中。对于 SQL Server，有两种缓存类型非常重要。第一种与执行计划的缓存有关。这是
    SQL Server 保存有关将来如何再次执行存储过程或即席查询的指令的地方。其目的是利用 SQL Server 已经计算出的关于执行特定查询的最佳方式的知识。第二种与查询设计相关的缓存几乎可能更为重要。它涉及信息如何存储在内存中。这被称为
    `缓冲池`。


    在本节中，我谈到数据存储在缓冲池中。如果我们需要的数据不在缓冲池中，会发生什么？这可能是 SQL Server 中事物变得有点复杂的地方。SQL Server
    只与缓冲池内部的数据进行交互。因此，如果需要的数据不在缓冲池中，第一步是确定哪些数据使用频率较低。然后，你将这些数据从缓冲池中移除。这些第一步已经为我们提供了关于内存使用的线索。如果有某些东西不必要地填满了缓冲池，你现在就知道关键数据可能会被清除出缓冲池，以便为这个新数据腾出空间。


    真正的关键在于限制 SQL Server 必须处理的数据量。在编写查询时，这可以通过你的连接逻辑来处理；也可以通过你的 `where` 子句条件来处理。你需要确保访问尽可能少的数据。访问所需的最少量的数据，可以让你在使用
    T-SQL 时最小化内存的使用。列表 6-1 提供了一个查询，其中 SELECT 语句没有包含所有列。


    ```sql

    SELECT cus.FirstName,

    cus.LastName,

    prd.ProductName

    FROM dbo.Customer cus

    INNER JOIN dbo.CustomerOrder ord

    ON cus.CustomerID = ord.CustomerID

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    INNER JOIN dbo.Product prd

    ON dtl.ProductID = prd.ProductID

    WHERE prd.ProductName LIKE ''Tel%''

    AND cus.LastName LIKE ''G%''

    AND ord.IsActive = 1;

    ```


    列表 6-1

    仅获取客户和产品的查询


    虽然这并未影响查询的原始性能，但随着数据表的数据量增加，会产生明显的性能影响。


    内存的速度和多功能性是 SQL Server 的重要组成部分。另一个因素与内存成本相对于存储成本的关系有关。这种成本差异凸显了有效使用内存的重要性。有许多不同类型的东西存储在内存中。SQL
    Server 用来访问满足查询标准所需数据的过程，作为执行计划保存在内存中。为查询结果检索的数据也存储在内存中。你还可以让数据库对象存在于内存中，例如表变量或临时表。你经常听到
    `OLTP` 这个术语。它真正的含义是，你希望有一个能够执行大量写入和更新活动的系统。这些类型的活动在我们的应用程序中频繁发生。当提及写入和更新活动时，例如在食谱数据库中，每次访问食谱、每次对食谱进行更改，或每个新配料添加到系统中，都属于此类活动。

    '
- fmt: "## 内存管理与性能优化\n\n在系统中存储大量数据时，用户通常只需要处理其中很小的一个子集。关键技能在于判断哪些数据应保持随时可用。这将提升添加新条目、更新现有条目或访问已有条目的速度。此时，对硬件的更好理解能提供帮助。\n\
    \n我们通常将内存视为服务器或计算机上的`RAM`。然而，还有其他类型的内存可用。内存是`SQL Server`用于快速访问数据最常见的硬件。\n\n虽然执行计划和数据都可以保存在缓存中，但`SQL\
    \ Server`会执行某些计算来确定为计划缓存或缓冲池分配多少内存。此外，复杂的计算用于决定在计划缓存或缓冲池中保留某物多久。真正的目标是确保不经常访问的存储过程或查询从计划缓存中清除，以免占用不必要的空间。同样，对于缓冲池，目标是只保留正在被主动使用的数据，并清除应用程序不再需要的数据。在这两种情况下，项目只有在缓存已满且需要为新的执行计划或数据腾出空间时才会被清除。\n\
    \n另一种解决方案是缓冲池扩展。缓冲池仅存在于`RAM`上，而缓冲池扩展允许你将缓冲池扩展到使用`RAM`和固态驱动器（`SSDs`）。然而，并非缓冲池中的所有数据页都可以驻留在`SSD`上。只有缓冲池中与写入存储的数据页匹配的页才能位于`SSD`上。这意味着对该页的所有更改都已写入磁盘。当更改被写入磁盘时，此过程称为“固化”。在更改写入磁盘之前，这些页称为“脏页”。在页写入磁盘后，它们称为“干净页”。考虑到`SSDs`可能比购买额外的`RAM`更具成本效益，这有助于减少当`SQL\
    \ Server`因业务应用程序访问数据缺乏可用内存而频繁将页面移出缓冲池时发生的`I/O`瓶颈。\n\n关于计划缓存，有一些需要记住的特定注意事项。默认情况下，`SQL\
    \ Server`针对处理存储过程和预处理语句进行了优化。这种对存储过程的优化也是使用计划缓存时的一个因素。在理想情况下，你的计划缓存中会有大量的存储过程，而即席查询很少。然而，这并非总是适用于每个业务。你的公司可能使用`ORM`（对象关系映射）或像`LINQ`这样的技术在应用程序代码中编写即席查询。虽然它们便于开发人员编写，但它们给`SQL\
    \ Server`带来了额外开销。通常，`ORM`软件编写的`T-SQL`代码功能可行，但在性能上可能不如开发人员编写的查询优化。此外，`ORM`软件还倾向于创建可能填满计划缓存的即席查询。当计划缓存充满即席查询时，它可能在缓存中创建同一查询的多个版本，浪费计划缓存中的查询分配，并导致其他有价值的计划被清除。如果这些查询没有转换为预处理语句，这种情况尤其可能发生。\n\
    \n如果存储过程因应用程序而被清除出计划缓存，那么当下次调用该存储过程时，`SQL Server`将需要重新计算其执行计划。这将需要额外的`CPU`成本来生成新的执行计划。有各种方法可以处理计划缓存中存在大量即席查询的情况。然而，这超出了本书的范围。\n\
    \n我在与`SQL Server`交互时遇到的另一个问题与缓冲池以及缓冲池中保存的数据有关。我曾不止一次听说，在处理非常大的表时，你将永远陷入不得不处理访问大量数据的困境。当表设计、索引、查询或上述任何组合未经过优化时，这种确切的情况就可能发生。然而，有方法可以预防。\n\
    \n在使用内存和`SQL Server`时，要考虑的主要方面是当你编写查询时，它们必须返回正确的结果，并在应用程序可接受的时间内完成。然而，根据整体表设计或查询的编写方式，这些查询访问的数据量可能远远超过必要。起初这可能看起来不是一个重大问题。当数据表是新的且未充满数据时，通常不会是问题。清单`6-2`中的查询用于在应用程序中返回一些数据。\n\
    \n```sql\nSELECT cus.FirstName,\n       cus.LastName,\n       cus.Country,\n \
    \      ord.OrderNumber,\n       prd.ProductName,\n       dtl.QuantitySold,\n \
    \      prd.ProductPrice\nFROM dbo.Customer cus\nINNER JOIN dbo.CustomerOrder ord\n\
    \    ON cus.CustomerID = ord.CustomerID\nINNER JOIN dbo.OrderDetail dtl\n    ON\
    \ ord.CustomerOrderID = dtl.CustomerOrderID\nINNER JOIN dbo.Product prd\n    ON\
    \ dtl.ProductID = prd.ProductID\nWHERE prd.ProductName LIKE 'Tel%'\n  AND cus.LastName\
    \ LIKE 'G%'\n  AND ord.IsActive = 1;\n```\n清单`6-2` 获取客户订单信息的查询\n\n当表是新的且数据不多时，你将看到如表`6-1`所示的逻辑读取。\n\
    \n表`6-1` 数据表较小时的逻辑读取\n\n| 客户数量 | 订单数量 | 订单明细数量 | 返回记录数 | 逻辑读取次数 |\n| --- | ---\
    \ | --- | --- | --- |\n| 401,409 | 4 | 8 | 4 | 54 |\n\n逻辑读取`54`指的是为了执行此查询而读取的数据页数量。随着你的表增长并且`SQL\
    \ Server`必须筛选越来越多的数据，你可能会开始看到与此行为相关的显著性能影响。当这种情况发生时，逻辑读取的次数可能会显著增加，如表`6-2`所示。\n\
    \n表`6-2` 数据表较大时的逻辑读取\n\n| 客户数量 | 订单数量 | 订单明细数量 | 返回记录数 | 逻辑读取次数 |\n| --- | ---\
    \ | --- | --- | --- |\n| 401,409 | 802,820 | 1,605,638 | 1,204,224 | 20,755 |\n\
    \n如你所见，一个最初看似性能良好的查询，随着应用程序成熟并获取更多数据，可能开始出现性能问题。\n\n在这些情况下，应用程序频繁访问的数据可能正被从缓冲池中清除。当存储过程必须筛选大量数据时，你通常可以通过查看与该查询关联的逻辑读取看到这一点。你可能正在处理一个只返回五个结果的查询；然而，它必须经过两百万次逻辑读取才能返回结果。这表明你可能正在使用比预期更多的缓冲池。"
  raw: 'While there is a significant amount of data being stored within the system,
    often someone only wants to deal with a very small subset of that data. The skill
    comes when trying to determine what data should remain readily available. This
    will increase the speed required to add new entries, to update existing entries,
    or to access pre-existing entries. This is where a better understanding of hardware
    can assist you.


    We most commonly think of memory as the RAM available on our servers or in our
    machines. However, there are other types of memory available. Memory is the most
    common hardware that SQL Server uses to access data quickly.


    While both the execution plan and the data can be saved in cache, certain calculations
    are performed by SQL Server to determine how much should be allocated in memory
    to either the plan cache or the buffer pool. In addition, complex calculations
    are used to determine how long to keep something in the plan cache or the buffer
    pool. The real goal is to make certain that stored procedures or queries that
    are not frequently accessed are dropped from the plan cache so they do not take
    up unnecessary space. In the same way, when it comes to the buffer pool, the goal
    is to only keep data in the buffer pool that is being actively used and to clear
    out data that is no longer needed by the application. In both scenarios, items
    are not cleared from cache until the cache is full and space is needed for new
    execution plans or data.


    Another solution is the buffer pool extension. While the buffer pool only exists
    on RAM, the buffer pool extension allows you to extend the buffer pool to use
    RAM and solid state drives (SSDs). However, not all of the data pages in the buffer
    pool can reside on the SSD. Only data pages in the buffer pool that match the
    data pages written to storage can be on the SSD. This means all changes to the
    page have been written to disk. This process is called *hardening* when changes
    are written to disk. Before the changes are written to disk, the pages are called
    *dirty pages*. After the pages are written to disk, they are called *clean pages*.
    Considering that SSDs can be more cost-effective than purchasing additional RAM,
    this can help to reduce I/O bottlenecks that occur when SQL Server frequently
    moves pages out of the buffer pool due to lack of available memory for the data
    being accessed by business applications.


    When it comes to the plan cache, there are some specific considerations that need
    to be remembered. By default, SQL Server is optimized to deal with stored procedures
    and prepared statements. This optimization for stored procedures is also a factor
    when using the plan cache. In a perfect world, your plan cache would have a significant
    amount of stored procedures in the cache and very few ad hoc queries. However,
    this is not always the case for every business. Your company may use ORM (object
    relational mapping) or other technologies like LINQ to write ad hoc queries inside
    application code. While they are convenient for the developers to write, they
    put an additional cost on SQL Server. Often times the ORM software writes T-SQL
    code that is functional but may not be better optimized for performance than a
    query written by a developer. In addition, ORM software also tends to create ad-hoc
    queries that can fill the plan cache. When the plan cache is full of ad hoc queries,
    it can create multiple versions of the same query in the cache, wasting the allocation
    of queries in the plan cache and causing other valuable plans to be dropped from
    the plan cache. This can be especially true if those queries are not converted
    into prepared statements.


    If stored procedures are dropped out of the plan cache by the application, then
    when the stored procedure is called the next time, SQL Server will need to recalculate
    its execution plan. This will require an additional CPU cost to generate a new
    execution plan. There are various ways to handle situations where there are a
    high number of ad hoc queries in your plan cache. However, this is outside the
    scope of this book.


    One of the other issues I have seen when interacting with SQL Server has to do
    with the buffer pool and the data that is being held in the buffer pool. I have
    heard more than once that when dealing with very large tables, you will always
    be stuck having to deal with accessing large quantities of data. When the table
    design, indexes, queries, or any combination of the preceding are not optimized,
    this exact scenario can happen. However, there are ways to prevent this.


    The main aspect to consider when working with memory and with SQL Server is when
    you write queries, they must return the correct results and complete in an acceptable
    amount of time for your applications. However, depending on the overall table
    design or how the queries are written, these queries may be accessing far greater
    amounts of data than is necessary. This may not seem like a significant issue
    at first. It typically will not be an issue when the data tables are new and not
    full of data. The query in Listing [6-2](#480547_2_En_6_Chapter.xhtml#PC2) is
    used to return some data in the application.


    ```

    SELECT cus.FirstName,

    cus.LastName,

    cus.Country,

    ord.OrderNumber,

    prd.ProductName,

    dtl.QuantitySold,

    prd.ProductPrice

    FROM dbo.Customer cus

    INNER JOIN dbo.CustomerOrder ord

    ON cus.CustomerID = ord.CustomerID

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    INNER JOIN dbo.Product prd

    ON dtl.ProductID = prd.ProductID

    WHERE prd.ProductName LIKE ''Tel%''

    AND cus.LastName LIKE ''G%''

    AND ord.IsActive = 1;

    Listing 6-2

    Query to Get Customer Order Information

    ```


    When the tables are new and there is not much data, you will see logical reads
    as shown in Table [6-1](#480547_2_En_6_Chapter.xhtml#Tab1).


    Table 6-1


    Logical Reads When Data Table Is Small


    | Number of Customers | Number of Orders | Number of Recipe Order Details | Records
    Returned | Logical Reads |

    | --- | --- | --- | --- | --- |

    | 401,409 | 4 | 8 | 4 | 54 |


    The logical reads of 54 refers to the number of data pages read in order to execute
    this query. As your tables grow and SQL Server must sift through more and more
    data, you may start seeing a significant performance impact related to this behavior.
    When this happens, the number of logical reads can increase significantly, as
    shown in Table [6-2](#480547_2_En_6_Chapter.xhtml#Tab2).


    Table 6-2


    Logical Reads When Data Table Is Larger


    | Number of Customers | Number of Orders | Number of Order Details | Records Returned
    | Logical Reads |

    | --- | --- | --- | --- | --- |

    | 401,409 | 802,820 | 1,605,638 | 1,204,224 | 20,755 |


    As you can see, a query that originally seemed to perform well may start experiencing
    performance issues as the application matures and acquires more data.


    In these situations, the data that is frequently accessed by the application may
    be getting cleared out of the buffer pool. When a stored procedure must sift through
    a significant amount of data, you can usually see this when you look at the logical
    reads associated with the query. You may be working with a query that only returns
    five results; however, it must go through two million logical reads to return
    the results. This is a sign that you are potentially using more of your buffer
    pool than you intended.'
  trans: "\n\n## 内存管理与性能优化\n\n当系统中存储大量数据时，用户通常只需要处理其中很小的一个子集。关键技能在于判断哪些数据应保持随时可用。这将提升添加新条目、更新现有条目或访问已有条目的速度。此时，对硬件的更好理解能提供帮助。\n\
    \n我们通常将内存视为服务器或计算机上的`RAM`。然而，还有其他类型的内存可用。内存是`SQL Server`用于快速访问数据最常见的硬件。\n\n虽然执行计划和数据都可以保存在缓存中，但`SQL\
    \ Server`会执行某些计算来确定为计划缓存或缓冲池分配多少内存。此外，复杂的计算用于决定在计划缓存或缓冲池中保留某物多久。真正的目标是确保不经常访问的存储过程或查询从计划缓存中清除，以免占用不必要的空间。同样，对于缓冲池，目标是只保留正在被主动使用的数据，并清除应用程序不再需要的数据。在这两种情况下，项目只有在缓存已满且需要为新的执行计划或数据腾出空间时才会被清除。\n\
    \n另一种解决方案是缓冲池扩展。缓冲池仅存在于`RAM`上，而缓冲池扩展允许你将缓冲池扩展到使用`RAM`和固态驱动器（`SSDs`）。然而，并非缓冲池中的所有数据页都可以驻留在`SSD`上。只有缓冲池中与写入存储的数据页匹配的页才能位于`SSD`上。这意味着对该页的所有更改都已写入磁盘。当更改被写入磁盘时，此过程称为“固化”。在更改写入磁盘之前，这些页称为“脏页”。在页写入磁盘后，它们称为“干净页”。考虑到`SSDs`可能比购买额外的`RAM`更具成本效益，这有助于减少当`SQL\
    \ Server`因业务应用程序访问数据缺乏可用内存而频繁将页面移出缓冲池时发生的`I/O`瓶颈。\n\n关于计划缓存，有一些需要记住的特定注意事项。默认情况下，`SQL\
    \ Server`针对处理存储过程和预处理语句进行了优化。这种对存储过程的优化也是使用计划缓存时的一个因素。在理想情况下，你的计划缓存中会有大量的存储过程，而即席查询很少。然而，这并非总是适用于每个业务。你的公司可能使用`ORM`（对象关系映射）或像`LINQ`这样的技术在应用程序代码中编写即席查询。虽然它们便于开发人员编写，但它们给`SQL\
    \ Server`带来了额外开销。通常，`ORM`软件编写的`T-SQL`代码功能可行，但在性能上可能不如开发人员编写的查询优化。此外，`ORM`软件还倾向于创建可能填满计划缓存的即席查询。当计划缓存充满即席查询时，它可能在缓存中创建同一查询的多个版本，浪费计划缓存中的查询分配，并导致其他有价值的计划被清除。如果这些查询没有转换为预处理语句，这种情况尤其可能发生。\n\
    \n如果存储过程因应用程序而被清除出计划缓存，那么当下次调用该存储过程时，`SQL Server`将需要重新计算其执行计划。这将需要额外的`CPU`成本来生成新的执行计划。有各种方法可以处理计划缓存中存在大量即席查询的情况。然而，这超出了本书的范围。\n\
    \n我在与`SQL Server`交互时遇到的另一个问题与缓冲池以及缓冲池中保存的数据有关。我曾不止一次听说，在处理非常大的表时，你将永远陷入不得不处理访问大量数据的困境。当表设计、索引、查询或上述任何组合未经过优化时，这种确切的情况就可能发生。然而，有方法可以预防。\n\
    \n在使用内存和`SQL Server`时，要考虑的主要方面是当你编写查询时，它们必须返回正确的结果，并在应用程序可接受的时间内完成。然而，根据整体表设计或查询的编写方式，这些查询访问的数据量可能远远超过必要。起初这可能看起来不是一个重大问题。当数据表是新的且未充满数据时，通常不会是问题。清单`6-2`中的查询用于在应用程序中返回一些数据。\n\
    \n```sql\nSELECT cus.FirstName,\n       cus.LastName,\n       cus.Country,\n \
    \      ord.OrderNumber,\n       prd.ProductName,\n       dtl.QuantitySold,\n \
    \      prd.ProductPrice\nFROM dbo.Customer cus\nINNER JOIN dbo.CustomerOrder ord\n\
    \    ON cus.CustomerID = ord.CustomerID\nINNER JOIN dbo.OrderDetail dtl\n    ON\
    \ ord.CustomerOrderID = dtl.CustomerOrderID\nINNER JOIN dbo.Product prd\n    ON\
    \ dtl.ProductID = prd.ProductID\nWHERE prd.ProductName LIKE 'Tel%'\n  AND cus.LastName\
    \ LIKE 'G%'\n  AND ord.IsActive = 1;\n```\n清单`6-2` 获取客户订单信息的查询\n\n当表是新的且数据不多时，你将看到如表`6-1`所示的逻辑读取。\n\
    \n表`6-1` 数据表较小时的逻辑读取\n\n| 客户数量 | 订单数量 | 订单明细数量 | 返回记录数 | 逻辑读取次数 |\n| --- | ---\
    \ | --- | --- | --- |\n| 401,409 | 4 | 8 | 4 | 54 |\n\n逻辑读取`54`指的是为了执行此查询而读取的数据页数量。随着你的表增长并且`SQL\
    \ Server`必须筛选越来越多的数据，你可能会开始看到与此行为相关的显著性能影响。当这种情况发生时，逻辑读取的次数可能会显著增加，如表`6-2`所示。\n\
    \n表`6-2` 数据表较大时的逻辑读取\n\n| 客户数量 | 订单数量 | 订单明细数量 | 返回记录数 | 逻辑读取次数 |\n| --- | ---\
    \ | --- | --- | --- |\n| 401,409 | 802,820 | 1,605,638 | 1,204,224 | 20,755 |\n\
    \n如你所见，一个最初看似性能良好的查询，随着应用程序成熟并获取更多数据，可能开始出现性能问题。\n\n在这些情况下，应用程序频繁访问的数据可能正被从缓冲池中清除。当存储过程必须筛选大量数据时，你通常可以通过查看与该查询关联的逻辑读取看到这一点。你可能正在处理一个只返回五个结果的查询；然而，它必须经过两百万次逻辑读取才能返回结果。这表明你可能正在使用比预期更多的缓冲池。\n\
    \n"
- fmt: 'This type of behavior can cause a significant amount of data in the buffer
    pool to be cleared out. There is a value called `page life expectancy` in SQL
    Server that shows the amount of time on average that data pages stay in the buffer
    pool. I have come to use `page life expectancy` as an indicator that there are
    queries that may be reading far more data in SQL Server than are returned in the
    result set. This can cause those same queries to use more memory than the query
    needs. When I work with queries that work with the application, they normally
    do not involve more than ten records at a time. If the query is used for some
    form of report, it is still usually not more than a couple thousand records at
    a time. Even if I look at 200,000 records at a time, I still don’t want to be
    handling tens of millions of logical reads in order to get those results. I can
    add some indexes to help minimize the number of logical reads for the query. Listing
    [6-3](#480547_2_En_6_Chapter.xhtml#PC3) shows the added indexes.


    ```sql

    CREATE NONCLUSTERED INDEX IX_Customer_CustomerNameName

    ON dbo.Customer(LastName ASC, FirstName ASC);

    CREATE NONCLUSTERED INDEX IX_CustomerOrder_CustomerID_IsActive

    ON dbo.CustomerOrder(CustomerID ASC, IsActive ASC);

    CREATE NONCLUSTERED INDEX IX_OrderDetail_CustomerOrderID_ProductID

    ON dbo.OrderDetail(CustomerOrderID ASC, ProductID ASC);

    ```

    Listing 6-3

    NonClustered Indexes to Reduce Logical Reads


    Even though I expect the query to involve less logical reads, I should verify
    this hypothesis by executing the query. In Table [6-3](#480547_2_En_6_Chapter.xhtml#Tab3),
    you can see by the logical reads that the query has been modified.


    Table 6-3


    Logical Reads with Only Necessary Columns


    | Number of Recipes | Number of Ingredients | Number of Recipe Ingredients | Records
    Returned | Logical Reads |

    | --- | --- | --- | --- | --- |

    | 401,409 | 802,820 | 1,605,638 | 1,204,224 | 5,899 |


    Comparing the results from Table [6-2](#480547_2_En_6_Chapter.xhtml#Tab2) to Table
    [6-3](#480547_2_En_6_Chapter.xhtml#Tab3), you can see that the logical reads have
    decreased. The index has organized the data within itself, making it easier and
    faster for SQL Server to find data pages. As a result, SQL Server needs to access
    less data pages in the buffer pool to perform this query. In this case, an index
    should help other applications using this instance of SQL Server perform better.


    However, you want to be mindful of making an index for every unique scenario.
    Creating an index for every slow query can have a negative impact on performance
    due to increased disk activity to maintain each index. In addition, SQL Server
    does allocate memory when the index is created to allow the data to be sorted.
    Using indexes can be a powerful way to make sure you''re only accessing the data
    you need. You also want to understand the data and associated `T-SQL` to effectively
    create indexes without overburdening SQL Server.


    There are queries you can execute to determine how many logic reads stored procedures
    are using. As shown, logical reads are an indicator of if a query is affecting
    memory. If the stored procedure exists in the plan cache, you can find which ones
    have the higher logic reads. Listing [6-4](#480547_2_En_6_Chapter.xhtml#PC4) shows
    the query to find stored procedures and their logical reads.


    ```sql

    USE OutdoorRecreation;

    GO

    SELECT db.[name] AS name_database,

    obj.[name] AS name_stored_procedure,

    sts.execution_count,

    sts.total_logical_reads

    FROM sys.objects obj

    INNER JOIN sys.dm_exec_procedure_stats sts

    ON obj.[object_id] = sts.[object_id]

    LEFT JOIN sys.databases db

    ON sts.database_id = db.database_id;

    ```

    Listing 6-4

    Finding Logical Reads for Stored Procedures in the Plan Cache


    This query gives you the stored procedures that are currently in your plan cache
    for the `OutdoorRecreation` database. The number of times this stored procedure
    has been executed is included as well as the sum of all logic reads for all executions.
    To analyze the average logic reads per stored procedure, you divide the `total_logical_reads`
    by the `execution_count`. Once you identify the queries with the highest logical
    reads, you may want to review Chapter [8](#480547_2_En_8_Chapter.xhtml) to learn
    how optimize logical reads for these queries.


    While memory can be considered the most powerful and beneficial hardware available
    to SQL Server, there are monetary costs associated with memory. Memory can make
    up for `T-SQL` that has not been optimized. However, there often comes a point
    where tables are significantly large and the queries are not fully optimized.
    At that time, it is tempting to get more memory to solve the performance issues.
    In many cases, this ends up being a short-term solution to a long-term problem.
    On top of that, the cost associated with purchasing additional memory is not always
    an option for the business. One way to prevent this or resolve this issue is to
    look at the stored procedures and prepared statements in your system and identify
    queries that can be improved by reducing the logical reads associated with those
    queries.'
