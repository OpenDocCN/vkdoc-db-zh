  trans: '

    ## 禁用功能


    在开发应用程序时，一个常见的挑战是如何在不影响业务连续性的情况下修改后端表设计。本节将讨论如何更新数据，以便在应用程序当前不支持软删除（即记录被标记为非活动状态而非从数据库中移除）的情况下，仍能从数据库中删除记录。这些方法可能包括禁用外键约束或创建虚拟记录。之后，记录就应该可以被删除。


    本节还将介绍如何使用软删除，以及一些决定何时切换“允许用户查找所有记录”或“仅查找未软删除记录”的方法。你也可以运用“应用程序规则”的概念来实现功能的切换。这同样可以与功能标志（Feature
    Flags）结合使用，正如第 13 章所讨论的那样。


    ### 启用/禁用功能的挑战


    在设计应用程序时，首要目标通常是满足既定需求。在许多情况下，产品负责人或业务部门提出的是他们当前所需的功能。然而，这些人并不具备你对应用程序和数据库开发的了解。因此，他们可能不会主动要求具备按需启用或禁用特定功能的能力。这里，“功能”可以指用户或角色执行某项操作的能力，也可以指应用程序以某种特定方式运行的能力。他们可能指望着你能预见到未来他们可能会如何使用这些应用程序。


    设计新应用程序时，最容易被遗忘的功能之一，就是为用户角色启用或禁用特定功能的能力。如果你遇到这种情况：表中一条记录的存在就意味着它对应用程序可用，那么你就属于这种情况。例如，`dbo.Customer`表是使用清单
    13-3 中的 T-SQL 语句创建的。


    ```sql

    CREATE TABLE [dbo].[Customer] (

    [CustomerID]       INT            IDENTITY (1, 1) NOT NULL,

    [FirstName]        VARCHAR (40)                   NOT NULL,

    [LastName]         VARCHAR (100)                  NOT NULL,

    [Address]          VARCHAR (100)                  NOT NULL,

    [City]             VARCHAR (100)                  NOT NULL,

    [PostalCode]       VARCHAR (20)                       NULL,

    [Country]          VARCHAR (75)                   NOT NULL,

    [DateCreated]      DATETIME2 (2)                  NOT NULL

    CONSTRAINT [DF_Customer_DateCreated] DEFAULT (SYSDATETIME()),

    [DateModified]     DATETIME2 (2)     NOT NULL

    CONSTRAINT [DF_Customer_DateModified] DEFAULT (SYSDATETIME()),

    CONSTRAINT PK_Customer PRIMARY KEY CLUSTERED (CustomerID)

    );

    ```

    清单 13-3: 创建 `dbo.Customer` 表


    在表 13-1 中，你可以查看 `dbo.Customer` 表中的记录。


    **表 13-1: 客户表示例数据**


    | CustomerID | FirstName | LastName | DateCreated |

    | --- | --- | --- | --- |

    | 1 | Myra | Acharya | 2022-08-30 |

    | 2 | José | Gomez | 2022-08-30 |

    | 12 | Selena | Tiësto | 2022-08-30 |

    | 27 | Ian | West | 2022-08-30 |

    | 401405 | Marty` | Bethel | 2022-10-02 |


    例如，如果因为一条订单在 `dbo.Customer` 表中，它就会在应用程序中显示，那么在这种情况下，你无法控制应用程序如何与客户订单交互。要防止应用程序使用某个客户订单，你唯一的选择就是删除该客户订单记录。此操作被称为*硬删除*。


    ### 硬删除及其局限性


    你需要从哪些表中删除记录，取决于该删除操作是否会因外键关系而被阻止。在这些场景下，你只有几个可用选项。一个选项是删除外键，然后删除指定的记录。对于此表设计，如果你想从数据库中移除客户
    Ian，你需要删除任何引用 `dbo.CustomerOrder` 表的外键，然后删除记录。清单 13-4 中的查询用于删除外键。


    ```sql

    ALTER TABLE [dbo].[CustomerOrder]

    DROP CONSTRAINT [FK_CustomerOrder_Customer];

    ```

    清单 13-4: 删除外键


    一旦删除了所有引用 `dbo.CustomerOrder` 表的外键，你就需要移除客户记录以确保其不再可用。清单 13-5 展示了删除特定客户的语句。


    ```sql

    DELETE FROM dbo.Customer

    WHERE FirstName = ''Ian'';

    ```

    清单 13-5: 删除客户记录


    生成的表包含如表 13-2 所示的记录。


    **表 13-2: 删除 Ian 后的客户表**


    | CustomerID | FirstName | LastName | DateCreated |

    | --- | --- | --- | --- |

    | 1 | Myra | Acharya | 2022-08-30 |

    | 2 | José | Gomez | 2022-08-30 |

    | 12 | Selena | Tiësto | 2022-08-30 |

    | 401405 | Marty` | Bethel | 2022-10-02 |


    这种方法存在一个显著问题。当你需要决定是否删除表之间的外键关系时，应格外谨慎。这不仅可能对查询性能产生负面影响，还可能影响数据质量。外键是帮助确保表间数据一致性的最后防线之一。


    另一种可能的方法是向存在外键关系的表中插入一条虚拟记录。你可以向 `dbo.Customer` 表添加一个名为 Inactive Deactivated 的客户。可以使用清单
    13-6 中的查询插入此记录。


    ```sql

    SET IDENTITY_INSERT dbo.Customer ON;

    INSERT INTO dbo.Customer

    (

    CustomerID,

    FirstName,

    LastName,

    [Address],

    City,

    PostalCode,

    Country,

    DateCreated,

    DateModified,

    DateDisabled

    )

    VALUES

    (

    0,

    ''Inactive'',

    ''Deactivated'',

    '''',

    '''',

    '''',

    '''',

    GETDATE(),

    GETDATE(),

    NULL

    );

    SET IDENTITY_INSERT dbo.Customer OFF;

    ```

    清单 13-6: 插入一个虚拟客户记录


    将这条虚拟记录插入 `dbo.Customer` 表只是第一步。你需要将 `dbo.CustomerOrder` 表中 Ian 的记录更新为使用 Inactive
    Deactivated 的 `CustomerID`。更新操作如清单 13-7 所示。


    ```sql

    UPDATE dbo.CustomerOrder

    SET CustomerID = 0,

    DateModified = GETDATE()

    WHERE CustomerID = 27;

    ```

    清单 13-7: 在客户订单表中更新非活动客户


    除非你的应用程序已配置为始终忽略该值，否则这可能无法阻止应用程序显示特定值。如果这两种选项都无法使用，还有另一种选择。对于这种表设计，另一个选择是移除与客户
    Ian 关联的所有订单。


    由于这些限制，硬删除的概念可能并不适合你的环境。你还有其他可用选项。你可以设计表结构，使得能够切换客户是否处于活动状态。这使你无需删除数据记录即可启用或禁用功能。


    ### 使用 `IsActive` 标志实现软删除


    要使用此选项，你需要 `dbo.Customer` 表包含一个类似 `IsActive` 的列。要修改清单 13-3 中创建的表，请执行清单 13-8 中的查询。


    ```sql

    ALTER TABLE dbo.Customer

    ADD IsActive BIT

    CONSTRAINT DF_Customer_IsActive DEFAULT ((1)) NOT NULL;

    ```

    清单 13-8: 向 `dbo.Customer` 表添加 `IsActive` 列

    '
- fmt: 'This will usually be a value that indicates a true or false. For `SQL Server`,
    this is often represented with a one for true and a zero for false. If you set
    the `IsActive` to true and run a query that filtered results where the `IsActive`
    value is true, you will only have a listing of active customers. Once you have
    added the `IsActive` column to the `dbo.Customer` table, you can modify your `T-SQL`
    code to display either orders for active or inactive customers based on how they
    are written.


    You have the option to only show results based on the value assigned to `IsActive`.
    When the `IsActive` value is set to 1, the value is true. If you want to only
    show active customers, you modify your `T-SQL` code to use `IsActive = 1` in the
    `WHERE` clause. This also gives you the ability to have some screens that only
    show active customers and other screens that only show inactive or disabled customers.


    In addition to disabling or enabling functionalities for users or roles, there
    are occasions when you want to be able to control how an application works. Companies
    often want to change how their business operates over time. This can usually be
    done by adding, changing, or removing functionality in the applications that the
    business uses.


    For instance, if a business wants to expand outside its current market, it may
    choose to add new functionality to its existing applications. The easiest way
    to add this new functionality is to add new application code. However, the business
    may find that this new market or new line of business is not working the way it
    intended and the company decides to roll back this new functionality. Depending
    on how the code was written, this may be a complex change requiring another code
    rewrite or a simple change allowing the application to use a different part of
    the code.


    Depending on your business environment, you may find that it is easier to manage
    the changes in functionality through the database instead of the application code.
    This is even more likely when you want functionality to change based on seasonality
    or by region. This allows you to exert finely tuned control that can be changed
    rapidly. You want to carefully consider the best place to manage this functionality.
    The best advice I can offer is to keep business logic in the application when
    higher-level management needs to sign off on any changes. For business logic that
    can change rapidly and with little oversight, it may be best to leave the business
    logic in the database.


    If you want to manage some of your application business logic from within the
    database, you want to create a table to manage whether certain features are enabled.
    This table is similar in concept to the table created for feature flags in Chapter
    12. If you want to manage the functionality in the database, you may want to create
    a table like the one in Listing 13-9.


    ```sql

    CREATE TABLE dbo.ApplicationRule

    (

    ApplicationRuleID               IDENTITY(1,1) INT      NOT NULL,

    ApplicationRuleDescription      VARCHAR(50)            NOT NULL,

    IsActive                        BIT                    NOT NULL,

    DateCreated                     DATETIME               NOT NULL,

    DateModified                    DATETIME                   NULL,

    CONSTRAINT PK_ApplicationRule_ApplicationRuleID

    PRIMARY KEY CLUSTERED (ApplicationRuleID)

    );

    ```

    Listing 13-9

    Creating an Application Rule Table


    If you are creating rules for a single, centralized application, this table design
    will work for your needs. If you are managing multiple applications, consider
    how these rules are used by applications. If most or all rules are unique per
    application, you may want to add a column to this table to indicate the application
    affected.


    There could be a business reason why you may want to toggle your application to
    show only active customers or show all customers. This scenario could happen if
    there are justifiable business reasons why the application may need to show all
    customers or only the active customers. The value for this rule can be stored
    in Table 13-3.


    Table 13-3


    Application Rule Table


    | Application RuleID | ApplicationRule Description | IsActive | DateCreated |
    DateModifed |

    | --- | --- | --- | --- | --- |

    | 1 | Show only active customers | 1 | 2023-04-12 | 2023-04-12 |


    The entry in this table indicates that only active customers will be shown when
    this application rule is enabled. If you want the same application to show all
    customers, you need to update the `IsActive` value to false. While you could update
    all your database code and stored procedures to use `IF... THEN` statements depending
    on when this application rule is enabled, I suggest handling this functionality
    within the application.


    This is where it becomes important to develop your code to be flexible. While
    the topic of this book is not application code development, you will need a database
    that works with your application code to handle these scenarios. Conceptually
    this can work similarly to feature flags, as discussed in Chapter 12. This is
    where you can make a table to store a reference to the specified functionality.
    In some environments, this may be referred to as application rules.'
