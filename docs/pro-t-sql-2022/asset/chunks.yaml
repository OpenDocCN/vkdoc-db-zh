    WHERE ProductName = ''Electric surfboard'';

    清单 3-10

    删除数据的查询

    ```


    这个例子是一个简单的删除，当涉及到连接（`JOIN`）时，删除数据的格式可能会变得更加复杂。删除数据在 SQL Server 中通常比其他数据操作活动显得更为重大。有时你可能想编写一个查询来系统性地删除表中的数据。当我刚开始编写从表中删除数据的查询时，我会从编写
    `SELECT` 语句开始。这将有助于解决几个因素。我可以清楚地看到哪些数据会受到影响。我还可以获得预期受影响记录的行数。一旦我写好了 `SELECT` 语句，我就可以轻松地修改代码以删除必要的记录。清单
    3-11 中的查询显示了我用来准备删除数据记录的 `SELECT` 语句。


    ```

    SELECT ord.CustomerOrderID, ord.OrderNumber

    FROM dbo.CustomerOrder ord

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    WHERE dtl.ProductID = 2;

    清单 3-11

    选择 ProductID 为 2 的订单

    ```


    在这种情况下，我正准备从 `dbo.CustomerOrder` 表中删除 `ProductID` 为 2 的记录。使用清单 3-11 的结果，我可以确认我正在删除什么数据以及预计会删除多少条记录。在审查了清单
    3-11 的结果后，我可以更新我的 T-SQL 代码来删除这些记录。在清单 3-12 中，我用引用 `dbo.CustomerOrder` 表别名的 `DELETE
    FROM` 替换了 `SELECT` 语句。


    ```

    BEGIN TRAN

    DELETE FROM ord

    FROM dbo.CustomerOrder ord

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    WHERE dtl.ProductID = 2;

    COMMIT

    清单 3-12

    删除 ProductID 为 2 的订单

    ```


    多年来，我发现最好将复杂的 `DELETE` 语句包装在显式事务中。默认情况下，当我们在 SQL Server 上执行 T-SQL 代码时，我们使用的是隐式事务。这意味着
    SQL Server 知道在我们执行事务后自动提交事务。我们也可以选择指定显式事务。在这种情况下，SQL Server 在我们发送 `COMMIT` 命令之前不会完成
    T-SQL 代码的执行。特别是在删除操作中，但通常对于任何复杂的代码，我发现最好始终小心谨慎。我有两个选择。我可以单独运行 `BEGIN TRAN` 和 `DELETE`
    语句。如果结果看起来不错，我可以运行 `COMMIT`。如果结果不如人意，我可以回滚并重新开始。如果你使用这种方法，你必须确保正确地 `ROLLBACK`
    或 `COMMIT` 显式事务。


    另一个选择是运行包含 `BEGIN TRAN` 和 `DELETE` 语句的整个脚本，但加上 `ROLLBACK`。如果行数看起来正确，我可以将 `ROLLBACK`
    改为 `COMMIT` 并重新执行。


    这让我能够验证受影响的记录数量。这是我确认查询是否按预期工作的最后机会。如果我返回的记录数量与我预期的不同，我可以发出 `ROLLBACK`，SQL Server
    将撤销我尝试运行的代码。这只在显式事务中才有可能。还值得一提的是，如果你使用了多级事务（称为嵌套事务），`ROLLBACK` 的功能可能与你预期的不同，因为它会回滚所有嵌套的开放事务。


    这就引出了设计 T-SQL 格式时的另一个考虑因素。你需要了解你的 T-SQL 代码将如何被编写和存储。如果所有 T-SQL 代码都将手动编写且无法通过第三方工具格式化，那么你可能需要保持编码标准非常简单，并限制特殊情况的准则。然而，如果你有可用的第三方工具，你可以创建一个该工具能处理的最复杂的格式。


    优秀开发者或工程师的特质之一是纪律性。编写 T-SQL 也是如此。在某种程度上，你使用哪种特定的格式风格并不重要。重要的是要与该格式保持一致。理想情况下，你应该努力让你的整个团队就一种标准的
    T-SQL 格式化方法达成一致。


    当你的整个团队都以相同的方式编写 T-SQL 代码时，查看别人的代码就会容易得多。你不再需要同时转换格式和编码风格，这可以加快分析和解决问题的速度。格式化你的
    T-SQL 代码使其更具可读性，完全是关于代码的外观。


    你应该朝着为公司编写的所有 T-SQL 代码拥有统一格式的方向努力。由于无论谁编写代码，格式都将相同，这也意味着每个阅读代码的人都会越来越熟悉快速解读他们的代码。在清单
    3-13 中，我创建了一个用户定义的表类型。


    ```

    CREATE TYPE ProductPricing AS TABLE

    (

    ProductName  VARCHAR(25),

    ProductPrice DECIMAL(6,2)

    );

    清单 3-13

    创建用户定义的表类型

    ```


    我在清单 3-14 中创建临时表时也使用了统一的格式。


    ```

    CREATE TABLE #TempCustomerFirstOrder

    (

    CustomerID    INT,

    FirstName     VARCHAR(40),

    LastName      VARCHAR(100),

    FirstOrder    DATETIME2(2),

    QuantityOrder SMALLINT

    );

    清单 3-14

    创建临时表

    ```


    你还可以看到我在清单 3-15 中创建表变量时使用了相同的格式。


    ```

    DECLARE @TempCustomerFirstOrder TABLE

    (

    CustomerID    INT,

    FirstName     VARCHAR(40),

    LastName      VARCHAR(100),

    FirstOrder    DATETIME2(2),

    QuantityOrder SMALLINT

    );

    清单 3-15

    创建表变量

    ```

