  trans: '

    ## 特性标志


    你可能会遇到这样的情况：需要对一个应用程序进行修改，而这将涉及许多不同的用户故事。换句话说，你可能在重构一个需要数月时间才能完成的应用程序。与此同时，你知道你的业务可能每两周就部署一次数据库代码。问题就变成了：如何开发
    T-SQL 代码，既能确保代码在现有数据库结构中有效工作，又能保证这些数据库变更在准备好之前不会进入生产环境。


    这不仅是许多数据库开发人员，也是许多软件开发人员问过自己的问题。问题的核心在于如何编写可以随时开启或关闭的数据库代码。一种试图处理这个问题的方法是使用**特性标志**。特性标志是一种以编程方式启用或禁用功能的方法。它们不是
    SQL Server 的特定功能，而是实现 T-SQL 代码的一种方法。理想情况下，特性标志用于允许代码尽快部署，同时能精细控制功能何时启用。使用特性标志的初衷是让它们只存在有限的时间，因为它们的目的只是在启用功能之前允许代码部署。高层次的过程如下：


    1.  向数据库添加一个处于禁用状态的特性标志。

    2.  更新存储过程，使用 `IF ((SELECT IsActive FROM dbo.FeatureFlag WHERE FeatureFlagID =
    <FeatureFlagID>) = 1)... EXISTS...`

    3.  从数据库表中启用该特性。

    4.  更新存储过程，移除 `IF… EXISTS`，仅使用新逻辑。

    5.  从数据库表中禁用或删除该特性标志。


    实现特性标志的方法有很多。目标始终如一：创建可以配置为在不同场景下工作的数据库代码和数据库对象。


    使用特性标志时，你可以随意启用或禁用新功能。这种管理数据库代码的方法可以让你编写代码，将代码部署到生产环境，并在业务选定的后续时间启用新功能。除了能够精确控制何时启用新功能外，你还能获得一个额外好处：通过更新数据库中的一个值，几乎可以即时回滚变更。在完全采用特性标志之前，你需要打好一些基础。例如，你应该养成对数据库代码进行单元测试的习惯。对于特性标志，你需要在特性标志启用时进行单元测试，也需要在特性标志禁用时进行单元测试，以确认你的应用程序使用的是预先存在的数据库逻辑。


    我建议你等到完全为数据库实施了源代码管理之后，再采用特性标志。这样建议的原因之一是管理特性标志需要额外的工作。当你为数据库对象创建特性标志时，你需要创建一些额外的逻辑，以允许你的应用程序使用预先存在的
    T-SQL 代码或新的数据库代码。这既需要纪律性，也需要明确的流程来确定何时从代码中移除特性标志。虽然特性标志对于存储过程、函数或视图等数据库对象非常有效，但它们并不是你开发的所有内容的解决方案。有些变更，例如对数据库列的修改，无法被开启和关闭。为了管理对数据库对象的这类变更，我将在本节末尾讨论一些解决方案。


    当为你的 T-SQL 代码使用特性标志时，你有几种选项来确定在任何给定时间哪些特性标志是启用的。关于特性和数据库，我听过两种主要的解决方案被提出。第一种可能更偏向于应用程序代码。它包括在配置文件中提供特性标志的值。第二种选项更偏向于基于
    T-SQL 的解决方案。这个解决方案涉及创建一个表来存储特性标志及其当前状态（如启用或禁用）。每种选项都有其优缺点。使用应用程序代码来管理特性标志可能更容易实现和管理。然而，数据库管理员可能更难支持这些特性标志。如果你将特性标志值保存在数据库中，你需要有纪律地管理这些特性标志并移除它们。最终很容易得到一张堆满了已弃用特性标志的表。缺点是只有有权访问数据库表的用户才能确认每个特性标志关联的值。


    当你部署数据库代码时，可以将特性标志部署为禁用状态。一旦你准备好启用新功能，就可以将特性标志设置为启用。你需要定义一个流程来确定何时完全切换到新功能。当你准备好完全在新功能下运行时，移除之前的
    T-SQL 代码。同时，在这个过程中移除任何对特性标志的引用。这种方法的挑战是，很容易跳过移除先前数据库代码的流程。如果你的 T-SQL 代码没有定期清理，这会大大降低你代码未来的可维护性。


    如果你需要更新一个存储过程以使用新逻辑，你可以使用特性标志，以便在想要的时候部署这个变更。参考清单 12-2，你可以找到未经修改的原始存储过程。


    ```

    /*-------------------------------------------------------------*\

    Name:             dbo.GetProduct

    Author:           Elizabeth Noble

    Created Date:     2022-10-30

    Description:      Get a list of all products in the databases

    Sample Usage:

    EXECUTE dbo.GetProduct;

    \*-------------------------------------------------------------*/

    CREATE OR ALTER PROCEDURE dbo.GetProduct

    AS

    SELECT

    ProductID,

    ProductName,

    ProductPrice,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Product;

    GO

    Listing 12-2

    原始存储过程

    ```


    这个存储过程提取了关于所有产品的各种信息。在这段 T-SQL 代码中，存储过程没有区分活跃和不活跃的产品。它返回了所有产品的信息。你可能会发现这个存储过程本应该只返回活跃的产品。你需要更新这个存储过程，使其只返回活跃产品，并排除
    `IsActive` 列。移除这个列可以防止这个代码变更在部署后立即被启用。


    在这种情况下，你需要使用像特性标志这样的机制，以赋予你灵活性来创建存储过程的这些变更，并控制这些变更何时对应用程序可用。使用特性标志时，你需要一种方法来确定某个特性标志是启用还是禁用。这就是你和数据库代码将知道在给定时间应执行哪段
    T-SQL 代码的方式。一个选项是创建一个表来存储有关特性标志的信息。你可以创建一个如清单 12-3 所示的表。


    ```

    CREATE TABLE dbo.FeatureFlag

    (

    FeatureFlagID     SMALLINT,

    IsActive          BIT,

    DateCreated       DATETIME2,

    DateModified      DATETIME2

    );

    Listing 12-3

    创建特性标志表

    ```

    '
- fmt: '# 功能标志在数据库开发中的使用


    ## 功能标志表简介


    这个表格很简单，包含一个整数形式的功能标志ID、一个指示功能标志是否启用的值、一个功能标志的创建日期，以及一个功能标志值最后更新的日期。这个表格允许你存储有关启用了哪些功能标志的信息。


    要使用此功能标志表，你需要将此功能标志的信息输入到清单[12-3](#480547_2_En_12_Chapter.xhtml#PC3)中创建的表中。清单[12-4](#480547_2_En_12_Chapter.xhtml#PC4)中的`INSERT`语句展示了向`dbo.FeatureFlag`表插入数据。


    ```

    INSERT INTO dbo.FeatureFlag

    (

    FeatureFlagID,

    IsActive,

    DateCreated,

    DateModified

    )

    VALUES (947,0,SYSDATETIME(),SYSDATETIME());

    Listing 12-4

    Inserting a Feature Flag Record

    ```


    ## 插入功能标志记录


    你已经为功能标志947插入了一条记录。在插入时，该功能标志是禁用的。目标是现有的存储过程在功能标志添加后继续返回与之前相同的结果。


    ## 修改存储过程以使用功能标志


    在清单[12-5](#480547_2_En_12_Chapter.xhtml#PC5)的存储过程中，你添加逻辑以使存储过程能够根据功能标志947是禁用还是启用返回不同的结果。


    ```

    /*-------------------------------------------------------------*\

    Name:             dbo.GetProduct

    Author:           Elizabeth Noble

    Created Date:     2022-10-30

    Description:      Get a list of all products in the databases

    Updated Date:     2023-05-20

    Description:      Add feature flag. If feature flag is enabled, only

    Show active products. Otherwise, show all products.

    Sample Usage:

    EXECUTE dbo.GetProduct;

    \*-------------------------------------------------------------*/

    CREATE OR ALTER PROCEDURE dbo.GetProduct

    AS

    IF ((SELECT IsActive FROM dbo.FeatureFlag WHERE FeatureFlagID = 947) = 1)

    BEGIN

    SELECT

    ProductID,

    ProductName,

    ProductPrice,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Product

    WHERE IsActive = 1;

    END

    ELSE

    BEGIN

    SELECT

    ProductID,

    ProductName,

    ProductPrice,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Product;

    END;

    Listing 12-5

    Stored Procedure with Feature Flag

    ```


    此查询的第一部分现在仅在功能标志947启用时返回结果。在任何其他情况下，存储过程都返回第二个查询的结果。功能标志的原始状态是禁用的。当功能标志被禁用时，将返回所有产品。


    ## 启用功能标志


    一旦此代码部署到生产环境，你将准备好启用新功能。此时，运行清单[12-6](#480547_2_En_12_Chapter.xhtml#PC6)中的T-SQL代码将启用该功能标志。


    ```

    UPDATE dbo.FeatureFlag

    SET   IsActive = 1,

    DateModified = GETDATE()

    WHERE FeatureFlagID = 947;

    Listing 12-6

    Enabling the Feature Flag

    ```


    启用此功能标志将导致存储过程`dbo.GetProduct`现在仅返回活跃产品。


    ## 移除功能标志并更新最终逻辑


    一旦你确信新代码按预期工作且没有业务需求回滚，请更新存储过程，使其仅返回新数据库代码的结果。移除功能标志还可以防止此存储过程在功能标志被错误更新时返回不准确的结果。清单[12-7](#480547_2_En_12_Chapter.xhtml#PC7)中的T-SQL代码展示了`dbo.GetProduct`存储过程的最终状态。


    ```

    /*-------------------------------------------------------------*\

    Name:             dbo.GetProduct

    Author:           Elizabeth Noble

    Created Date:     2022-10-30

    Description:      Get a list of all products in the databases

    Updated Date:     2023-05-20

    Description:      Add feature flag. If feature flag is enabled, only

    Show active products. Otherwise, show all products.

    Updated Date:     2023-06-20

    Description:      Remove the feature flag. Leave only the new logic.

    The stored procedure now only returns active products.

    Sample Usage:

    EXECUTE dbo.GetProduct;

    \*-------------------------------------------------------------*/

    CREATE OR ALTER PROCEDURE dbo.GetProduct

    AS

    SELECT

    ProductID,

    ProductName,

    ProductPrice,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Product

    WHERE IsActive = 1;

    Listing 12-7

    Final Stored Procedure

    ```


    存储过程`dbo.GetProduct`中的数据库代码已更新。在任何代码更改之前，此存储过程返回所有产品。创建功能标志后，存储过程被更新为包含根据功能标志状态返回所有产品或仅活跃产品的逻辑。当更改得到确认后，你可以移除功能标志的逻辑。这将使存储过程保持原样，只包含更新后的T-SQL代码。你可以通过将`IsActive`设置为FALSE来清理`dbo.FeatureFlag`表，或者删除功能标志ID为947的行。


    ## 版本控制与持续部署的思考


    你管理源代码控制中的分支和合并的方式，可能决定了你需要多频繁地部署未完成的数据库代码。你可能会发现自己正处于开发数据库代码但在下一次部署前尚未完成的情况。通常，以可以在完成时部署的方式编写代码是最简单的。然而，随着向敏捷软件开发的转变，以可以在任何时间点部署的方式编写T-SQL代码变得越来越重要。这正是功能标志真正价值的体现。'
  raw: 'This table is simple. There is an integer value for the feature flag, a value
    that indicates if the feature flag is enabled, a date when the feature flag was
    created, and a date when the feature flag values were last updated. This table
    allows you to store information about what feature flags are enabled. In order
    to use this feature flag table, you need to enter information about this feature
    flag into the table created in Listing [12-3](#480547_2_En_12_Chapter.xhtml#PC3).
    The INSERT statement in Listing [12-4](#480547_2_En_12_Chapter.xhtml#PC4) shows
    an insert into the `dbo.FeatureFlag` table.


    ```

    INSERT INTO dbo.FeatureFlag

    (

    FeatureFlagID,

    IsActive,

    DateCreated,

    DateModified

    )

    VALUES (947,0,SYSDATETIME(),SYSDATETIME());

    Listing 12-4

    Inserting a Feature Flag Record

    ```


    You have inserted a record for Feature Flag 947\. At the time of the insert, the
    feature flag is disabled. The goal is that the existing stored procedure will
    continue to return the same results as it did before the feature flag was added.
    In the stored procedure in Listing [12-5](#480547_2_En_12_Chapter.xhtml#PC5),
    you add logic to allow the stored procedure to return different results depending
    on whether Feature Flag 947 is disabled or enabled.


    ```

    /*-------------------------------------------------------------*\

    Name:             dbo.GetProduct

    Author:           Elizabeth Noble

    Created Date:     2022-10-30

    Description:      Get a list of all products in the databases

    Updated Date:     2023-05-20

    Description:      Add feature flag. If feature flag is enabled, only

    Show active products. Otherwise, show all products.

    Sample Usage:

    EXECUTE dbo.GetProduct;

    \*-------------------------------------------------------------*/

    CREATE OR ALTER PROCEDURE dbo.GetProduct

    AS

    IF ((SELECT IsActive FROM dbo.FeatureFlag WHERE FeatureFlagID = 947) = 1)

    BEGIN

    SELECT

    ProductID,

    ProductName,

    ProductPrice,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Product

    WHERE IsActive = 1;

    END

    ELSE

    BEGIN

    SELECT

    ProductID,

    ProductName,

    ProductPrice,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Product;

    END;

    Listing 12-5

    Stored Procedure with Feature Flag

    ```


    The first portion of this query now only return results if Feature Flag 947 is
    enabled. For any other scenario, the stored procedure returns the results from
    the second query. The original state for the feature flag is to be disabled. When
    the feature flag is disabled, all products will be returned. Once this code has
    been deployed to Production, there will come a time where you are ready to enable
    the new functionality. When this happens, running the T-SQL code in Listing [12-6](#480547_2_En_12_Chapter.xhtml#PC6)
    will enable the feature flag.


    ```

    UPDATE dbo.FeatureFlag

    SET   IsActive = 1,

    DateModified = GETDATE()

    WHERE FeatureFlagID = 947;

    Listing 12-6

    Enabling the Feature Flag

    ```


    Enabling this feature flag will cause the stored procedure `dbo.GetProduct` to
    now only return active products.


    Once you are confident that the new code is working as intended and there is no
    business need to roll back, update the stored procedure to only return results
    for the new database code. Removing the feature flag will also protect this stored
    procedure from returning inaccurate results if the feature flag gets updated in
    error. The T-SQL code in Listing [12-7](#480547_2_En_12_Chapter.xhtml#PC7) shows
    the final state of the `dbo.GetProduct` stored procedure.


    ```

    /*-------------------------------------------------------------*\

    Name:             dbo.GetProduct

    Author:           Elizabeth Noble

    Created Date:     2022-10-30

    Description:      Get a list of all products in the databases

    Updated Date:     2023-05-20

    Description:      Add feature flag. If feature flag is enabled, only

    Show active products. Otherwise, show all products.

    Updated Date:     2023-06-20

    Description:      Remove the feature flag. Leave only the new logic.

    The stored procedure now only returns active products.

    Sample Usage:

    EXECUTE dbo.GetProduct;

    \*-------------------------------------------------------------*/

    CREATE OR ALTER PROCEDURE dbo.GetProduct

    AS

    SELECT

    ProductID,

    ProductName,

    ProductPrice,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Product

    WHERE IsActive = 1;

    Listing 12-7

    Final Stored Procedure

    ```


    The database code in the stored procedure `dbo.GetProduct` has been updated. Before
    any code changes, this stored procedure returned all products. After creating
    the feature flag, the stored procedure is updated to include logic to either return
    all products or only active products depending on the feature flag status. When
    the changes have been confirmed, you can remove the logic for the feature flag.
    This leaves the stored procedure in place with only the updated T-SQL code. You
    can either clean up the `dbo.FeatureFlag` table by setting `IsActive` to FALSE
    or delete the row for FeatureFlagID 947.


    How you manage your branching and merging in source control may determine how
    frequently you need to deploy database code that is incomplete. You may find yourself
    in a situation where you are working on developing database code but it is not
    complete before your next deployment. It is often easiest to write code in a way
    that it can be deployed when it is completed. However, with the move toward Agile
    software development, it has become increasingly important to write T-SQL code
    in a manner where it can be deployed at any moment in time. This is where the
    true benefit of feature flags can be realized.'
  trans: '

    # 功能标志在数据库开发中的使用


    ## 功能标志表简介


    这个表格很简单，包含一个整数形式的功能标志 ID、一个指示功能标志是否启用的值、一个功能标志的创建日期，以及一个功能标志值最后更新的日期。这个表格允许你存储有关启用了哪些功能标志的信息。


    要使用此功能标志表，你需要将此功能标志的信息输入到清单 12-3 中创建的表中。清单 12-4 中的`INSERT`语句展示了向`dbo.FeatureFlag`表插入数据。


    ```

    INSERT INTO dbo.FeatureFlag

    (

    FeatureFlagID,

    IsActive,

    DateCreated,

    DateModified

    )

    VALUES (947,0,SYSDATETIME(),SYSDATETIME());

    Listing 12-4

    插入功能标志记录

    ```


    ## 插入功能标志记录


    你已经为功能标志 947 插入了一条记录。在插入时，该功能标志是禁用的。目标是现有的存储过程在功能标志添加后继续返回与之前相同的结果。


    ## 修改存储过程以使用功能标志


    在清单 12-5 的存储过程中，你添加逻辑以使存储过程能够根据功能标志 947 是禁用还是启用返回不同的结果。


    ```

    /*-------------------------------------------------------------*\

    Name:             dbo.GetProduct

    Author:           Elizabeth Noble

    Created Date:     2022-10-30

    Description:      Get a list of all products in the databases

    Updated Date:     2023-05-20

    Description:      Add feature flag. If feature flag is enabled, only

    Show active products. Otherwise, show all products.

    Sample Usage:

    EXECUTE dbo.GetProduct;

    \*-------------------------------------------------------------*/

    CREATE OR ALTER PROCEDURE dbo.GetProduct

    AS

    IF ((SELECT IsActive FROM dbo.FeatureFlag WHERE FeatureFlagID = 947) = 1)

    BEGIN

    SELECT

    ProductID,

    ProductName,

    ProductPrice,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Product

    WHERE IsActive = 1;

    END

    ELSE

    BEGIN

    SELECT

    ProductID,

    ProductName,

    ProductPrice,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Product;

    END;

    Listing 12-5

    带功能标志的存储过程

    ```


    此查询的第一部分现在仅在功能标志 947 启用时返回结果。在任何其他情况下，存储过程都返回第二个查询的结果。功能标志的原始状态是禁用的。当功能标志被禁用时，将返回所有产品。


    ## 启用功能标志


    一旦此代码部署到生产环境，你将准备好启用新功能。此时，运行清单 12-6 中的 T-SQL 代码将启用该功能标志。


    ```

    UPDATE dbo.FeatureFlag

    SET   IsActive = 1,

    DateModified = GETDATE()

    WHERE FeatureFlagID = 947;

    Listing 12-6

    启用功能标志

    ```


    启用此功能标志将导致存储过程`dbo.GetProduct`现在仅返回活跃产品。


    ## 移除功能标志并更新最终逻辑


    一旦你确信新代码按预期工作且没有业务需求回滚，请更新存储过程，使其仅返回新数据库代码的结果。移除功能标志还可以防止此存储过程在功能标志被错误更新时返回不准确的结果。清单
    12-7 中的 T-SQL 代码展示了`dbo.GetProduct`存储过程的最终状态。


    ```

    /*-------------------------------------------------------------*\

    Name:             dbo.GetProduct

    Author:           Elizabeth Noble

    Created Date:     2022-10-30

    Description:      Get a list of all products in the databases

    Updated Date:     2023-05-20

    Description:      Add feature flag. If feature flag is enabled, only

    Show active products. Otherwise, show all products.

    Updated Date:     2023-06-20

    Description:      Remove the feature flag. Leave only the new logic.

    The stored procedure now only returns active products.

    Sample Usage:

    EXECUTE dbo.GetProduct;

    \*-------------------------------------------------------------*/

    CREATE OR ALTER PROCEDURE dbo.GetProduct

    AS

    SELECT

    ProductID,

    ProductName,

    ProductPrice,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Product

    WHERE IsActive = 1;

    Listing 12-7

    最终的存储过程

    ```


    存储过程`dbo.GetProduct`中的数据库代码已更新。在任何代码更改之前，此存储过程返回所有产品。创建功能标志后，存储过程被更新为包含根据功能标志状态返回所有产品或仅活跃产品的逻辑。当更改得到确认后，你可以移除功能标志的逻辑。这将使存储过程保持原样，只包含更新后的
    T-SQL 代码。你可以通过将`IsActive`设置为 FALSE 来清理`dbo.FeatureFlag`表，或者删除功能标志 ID 为 947 的行。


    ## 版本控制与持续部署的思考


    你管理源代码控制中的分支和合并的方式，可能决定了你需要多频繁地部署未完成的数据库代码。你可能会发现自己正处于开发数据库代码但在下一次部署前尚未完成的情况。通常，以可以在完成时部署的方式编写代码是最简单的。然而，随着向敏捷软件开发的转变，以可以在任何时间点部署的方式编写
    T-SQL 代码变得越来越重要。这正是功能标志真正价值的体现。

    '
- fmt: '## Automated Deployment


    There are many ways to handle your database deployments. There are different tools
    you can use to automate your database deployments and there are different deployment
    strategies you can use. Determining what method to use for your database deployments
    depends on what types of issues you are trying to prevent or resolve. These issues
    can include failing to update code during a deployment, overwriting code during
    a deployment, preventing unwanted code from being deployed, or improving the speed
    of your deployments. These deployment strategies depend on what type of `T-SQL`
    code is being deployed. Other methods of deploying database code involve deploying
    your database in a way that can help you catch issues in development before the
    changes are deployed to all other environments including production.


    There are ways to streamline and automate deploying `T-SQL` code using `SQL Server
    Management Studio`, `Visual Studio`, or `PowerShell`. If you want to automate
    your database deployments without having your database in source control, you
    want to take some additional steps to protect your database. `SSDT` allows all
    objects to begin with `CREATE`. When deploying code, `SSDT` determines if an object
    should use `CREATE` or `ALTER`. If you want to change data in the database using
    `DML`, you need to use predeployment or postdeployment scripts. When doing so,
    your `T-SQL` code should be written in a way to allow the code to be run more
    than once. This may not be the method you are using now, but you should consider
    what would happen if someone accidentally tried to deploy the same scripts again.
    Write your scripts so that they will run successfully no matter how many times
    they are executed. If you are using source control already, your source control
    should manage this functionality for you.


    When deploying `T-SQL` code as part of a migration-based deployment, the process
    may function differently if you are not using source control. For migration-based
    deployments, you usually have a set of scripts that needs to be run for your deployment.
    When not using source control, the most complicated step can sometimes be determining
    exactly what should be deployed. When you are ready to deploy your `T-SQL` code,
    ideally the scripts will be saved in the same folder. At this point, you can either
    manually run all these migration scripts or determine what can be done to automate
    running the scripts. If you choose to run the scripts manually, you must open
    each script and make sure that you are connected to the correct instance of `SQL
    Server`. There are other options you can use to improve the consistency and speed
    of deploying these migration scripts. You can use batch files or `PowerShell`
    can help you automate these deployments. Listing 12-8 includes the `PowerShell`
    needed to run all `SQL` script files saved in the folder `C:\Deploy`.


    ```

    Invoke-DbaQuery -SQLInstance localhost -Database OutdoorRecreation -File "C:\Deploy\*.sql"

    Listing 12-8

    PowerShell to Run SQL Scripts

    ```


    This code indicates that all files with the extension of `.sql` in the `C:\Deploy`
    folder should be executed on the `localhost` `SQL Server` on the `OutdoorRecreation`
    database.


    Tip


    This code is executed using the `PowerShell` module `dbatools`. This module is
    a `SQL Server` community-built open source project. For more details, you can
    visit [`https://dbatools.io/`](https://dbatools.io/).


    If you are using a state-based migration approach and you are not using source
    control, it can also be automated using `PowerShell`. These `DACPAC`s can be generated
    from a database that already exists and an instance of `SQL Server`. Depending
    on how you choose to work with `DACPAC`s, you can either have the target database
    updated to match the code from the `DACPAC` or you can create a script file based
    off the differences between the `DACPAC` and the target database. Once you locate
    the `DACPAC` file that is generated from your solution or workspace, you can run
    the `PowerShell` code shown in Listing 12-9.


    ```

    Publish-DbaDacPackage -SQLInstance localhost -Database OutdoorRecreation -Path
    C:\temp\OutdoorRecreation.dacpac

    Listing 12-9

    PowerShell to Compare DACPAC

    ```


    This `PowerShell` is also from the `dbatools` module. Instead of executing all
    `SQL Server` files in the `C:\temp` folder, this `PowerShell` compares the schema
    from the `DACPAC` file to the schema of the `OutdoorRecreation` database on the
    `localhost` server. This `PowerShell` command includes some additional toggles
    such as `-GenerateDeploymentReport` or `-ScriptOnly`. The `-GenerateDeploymentReport`
    creates an `XML` file showing the changes that are made to the database. The `-ScriptOnly`
    option outputs a `SQL Script` file that can be executed manually. Depending on
    how you choose to work with `DACPAC`s, you can either have the target database
    updated to match the code from the `DACPAC` or you can create a script file based
    off the differences between the `DACPAC` and the target database.


    The easiest way to move towards a fully automated deployment is to use third-party
    tools. However, this is not the only option available to you. If you are interested
    in migration-based deployments, there is at least one free third-party tool available:
    `DbUp`. While this tool may be helpful for managing migration-based deployments,
    I will not be covering `DbUp` as part of this book. Be aware that if you are going
    to use migration-based deployments and source control, you will need an extension
    or another tool like `DbUp`.


    If your database is in source control and you are using state-based migrations,
    you have several alternatives to deploy your database changes. You have the option
    of deploying the changes directly from `Visual Studio` to your target database
    instance. While you are still manually deploying your code, there can be a significant
    time savings so that you don’t have to open up multiple files and execute each
    one individually. However, without using third-party tools to further automate
    your deployments, you will need to create `PowerShell` scripts to create the `DACPAC`
    or `SQL script` file and deploying those files to the target instance.


    In the previous section of deployment methods, I went over migration-based and
    state-based deployments. When deploying changes to that modify data, such as with
    data manipulation language (`DML`) queries, you want to make certain that you
    cannot accidentally modify the data more than once. While we may want to make
    sure that every script can be written in a way where they could not update the
    data more than once, there may be times where it is not possible to write a script
    to prevent this from happening. If this happens, you can use a similar concept
    to feature flags. This is where you create a table to record when a data modification
    script has been run. The first time this script completes, the table can be updated
    with a value indicating that all records were updated. For instance, if you want
    to increase the product price by 10%, your `T-SQL` code should be written in a
    way that does not update the product prices each time the database project is
    deployed. The script can also check to make sure that this value does not exist
    in the table prior to running the script. This table can also be checked and populated
    either as pass or fail for the entire `T-SQL` script or each individual record
    can be recorded when the update is complete.'
