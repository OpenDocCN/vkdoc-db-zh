    differently, SQL Server is using an index seek on this same non-clustered index.
    Not all attempts to optimize your T-SQL code are this simple. However, it is possible
    for you to make dramatic improvements in your T-SQL code when you understand how
    your data is stored and how the indexes on your tables reference that data.


    ## Optimizing Duration


    My goal when working with SQL Server is to have the queries executing T-SQL code
    run as quickly as possible. I tend to focus on logical reads because I want to
    minimize the number of data pages going into the cache that are not needed by
    the query that is being executed. However, there are other issues that can happen
    in SQL Server that can have negative effects downstream.


    Prior to SQL Server 2019, one of the most common reasons for slow queries was
    parameter sniffing. The adaptive join in SQL Server 2019 has helped minimize issues
    associated with parameter sniffing. If an execution plan has an adaptive join,
    SQL Server will determine at execution time whether to use a merge join or a nested
    loop. The flexibility of the adaptive join allows the execution of T-SQL code
    to execute one way if there is a small set of data and use a different physical
    join if there is a larger set of data. This will cause the execution of the query
    to perform well regardless of the data being retrieved.


    Working to find the queries that have the slowest durations can be challenging
    especially if you are trying to find real-time data regarding query performance.
    Thankfully, SQL Server does keep track of query performance for T-SQL code that
    exists in the query plan cache. You can use the same DMV from the previous section,
    `sys.dm_exec_query_stats`, but instead of looking for records with the highest
    total logical reads or average logical reads, you want to look at worker time.
    You can either start with total worker time or average worker time. The time of
    day your queries are running may help you decide which to focus on first. If one
    of the queries with the highest worker time is running during the most active
    time for your business, I would address that query first. However, if you have
    T-SQL code with the highest average worker time running frequently throughout
    the busy time of your day, you may see more benefit by working on this code first.
    Either way, you want to look up the query plan in `sys.dm_exec_sql_text` that
    matches the query hash from `sys.dm_exec_query_stats` to find the associated query
    text.


    One of the challenges with SQL Server is that the same solution does not always
    work for every situation. I have come across some queries where breaking the data
    up into smaller segments will improve performance. There are other times where
    it may be more efficient to combine several steps into a single T-SQL statement.
    The query in Listing [8-5](#480547_2_En_8_Chapter.xhtml#PC5) shows a series of
    T-SQL statements.'
