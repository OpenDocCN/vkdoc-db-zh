    `5xxxxet`。在 SQL Server 2022 中，你可以使用 `GRANT UNMASK ON` T-SQL 代码为数据库、架构、表或列实现细粒度解除屏蔽。


    到目前为止，我只介绍了如何在创建新表时使用动态数据屏蔽。然而，更常见的情况是，你可能希望在现有表中添加新列或对现有表中的列实施动态数据屏蔽。清单 18-7
    提供了使用 `datetime()` 屏蔽函数屏蔽客户出生日期数据的 T-SQL 代码。


    ```sql

    ALTER TABLE dbo.Customer

    ADD DateOfBirth DATETIME2(2)

    MASKED WITH (FUNCTION = ''datetime("Y")'')

    NULL;

    清单 18-7

    向具有动态数据屏蔽的表中添加列

    ```


    此代码将向 `dbo.Customer` 表创建一个名为 `DateOfBirth` 的新列。同时，`DateOfBirth` 列也将被配置为使用日期时间屏蔽函数。此
    T-SQL 将导致任何未被授予数据库、架构、表或列 UNMASK 权限的用户只能看到出生日期中的年份。


    在使用数据发现和分类识别出包含敏感数据的列后，你可以决定如何对这些列实施动态数据屏蔽。此外，也可以向现有表添加一个配置为动态数据屏蔽的新列。清单 18-8
    包含将现有列更改为使用动态数据屏蔽所需的 T-SQL 代码。


    ```sql

    ALTER TABLE dbo.CustomerOrder

    ALTER COLUMN OrderNumber

    ADD MASKED WITH (FUNCTION = ''default()'');

    清单 18-8

    修改现有列以实现动态数据屏蔽

    ```


    `dbo.CustomerOrder` 表中的现有列 `OrderNumber` 应更新为使用 `default()` 屏蔽函数。但是，由于该列上存在预先存在的依赖项，因此无法修改
    `OrderNumber` 列。返回的错误消息如图 18-14 所示。


