    Once this security policy is in place, all other users will only be able to see
    customer information for the country of India. To test the new security policy
    for all other users, create a user and rerun the same query, as shown in Listing
    [18-14](#480547_2_En_18_Chapter.xhtml#PC14).


    ```

    CREATE USER TestRowLevel WITHOUT LOGIN;

    GRANT SELECT ON SCHEMA::dbo TO TestRowLevel;

    -- impersonate for testing:

    EXECUTE AS USER = ''TestRowLevel'';

    SELECT Country, COUNT(*) AS CustomerCount

    FROM dbo.Customer

    GROUP BY Country;

    REVERT;

    Listing 18-14

    Viewing Current Customers by Country for a Test User

    ```


    The new user, TestRowLevel, is created but is not tied to a login. The only permission
    granted to the user is the ability to select data on objects in the dbo schema.
    The T-SQL code then executes the same query as in Listing [18-11](#480547_2_En_18_Chapter.xhtml#PC11).
    The results of that query are shown in Table [18-7](#480547_2_En_18_Chapter.xhtml#Tab7).


    Table 18-7


    Customer Count by Country for Current User


    | Country | Customer Count |

    | --- | --- |

    | India | 200702 |


    The only result returned is for customers in the country of India. This confirms
    that the security policy is working as expected. Checking the execution plan for
    Listing [18-13](#480547_2_En_18_Chapter.xhtml#PC13), you saw an example of how
    to use a FILTER PREDICATE within a security policy to prevent a user from updating
    data. However, you may want to prevent certain users from being able to update
    data in the database, even if they can access the data. This is where you use
    a BLOCK PREDICATE.


    Note


    You will be unable to add a predicate to a table that already has a predicate
    unless you alter the existing security policy. Alternatively, you can have more
    than one predicate, including a filter and block, on the same table when you create
    security policy.


    Listing [18-15](#480547_2_En_18_Chapter.xhtml#PC15) shows a BLOCK PREDICATE that
    will prevent the any user except dbo from updating any customer data that is not
    in the country of India.


    ```

    CREATE SECURITY POLICY CountryBlock

    ADD BLOCK PREDICATE dbo.TVF_SecuritySalesIndia(Country)

    ON dbo.Customer

    WITH (STATE=ON);

    Listing 18-15

    Creating a Block Security Policy for Row-Level Security

    ```


    The security policy will allow any non-dbo users to view all data in the `dbo.Customer`
    table. However, those same users will not be able to modify any data that has
    a country other than India. An example of how this block predicate works is shown
    in Listing [18-16](#480547_2_En_18_Chapter.xhtml#PC16).


    ```

    GRANT SELECT ON SCHEMA::dbo TO TestRowLevel;

    GRANT UPDATE ON SCHEMA::dbo TO TestRowLevel;

    -- impersonate for testing:

    EXECUTE AS USER = ''TestRowLevel'';

    UPDATE Customer

    SET DateDisabled = GETDATE();

    REVERT;

    Listing 18-16

    Updating Data for a Test User

    ```


    This query is attempting to update the `DateDisabled` for all records for the
    user TestRowLevel. This user has been granted the ability to update records. However,
    since there is a block predicate in place, the user will receive the error shown
    in Figure [18-15](#480547_2_En_18_Chapter.xhtml#Fig15) when trying to update all
    the records.


    ![](images/480547_2_En_18_Chapter/480547_2_En_18_Fig15_HTML.jpg)


    A text presents an error message. The second line of the message reads, the attempted
    operation failed because the target object outdoor recreation dot d b o dot customer
    has a block predicate that conflicts with this operation.


    Figure 18-15


    Error message with block predicate


    The message indicates that this user cannot modify the data on the table `dbo.Customer`
    due to the block predicate security policy.


    If you want to temporarily disable the security policy created in Listing [18-13](#480547_2_En_18_Chapter.xhtml#PC13),
    you can execute the T-SQL code in Listing [18-17](#480547_2_En_18_Chapter.xhtml#PC17).


    ```

    ALTER SECURITY POLICY CountryFilter

    WITH (STATE=OFF);

    Listing 18-17

    Disabling a Security Policy

    ```


    This code disables the security policy. Identifying that the security policy can
    be disabled indicates that additional measures may need to put in place to confirm
    that someone has not tampered with the security policy.


    Tip


    If the security policy is disabled, the row-level security will not prevent users
    from viewing or updating data as expected.


    As stated previously, you can only have one policy per table. However, that policy
    can have one filter and block predicate within it for the same table. Having more
    than one predicate that modifies data per table is not supported. These predicates
    can also use different table-valued functions. If a user is affected by a FILTER
    PREDICATE, they will be able to insert any data even if they are limited to the
    data they can SELECT, UPDATE, or DELETE. Similarly, if a user has a BLOCK PREDICATE
    but not a filter predicate, they will be able to see all data even if they cannot
    modify the data. However, these users are blocked from any change to the data
    including inserts, updates, and deletes. While you see a value of 1 for the RETURN
    in the table-valued function, any non-NULL value will produce the same result
    for row-level security. When there is no match, the function returns NULL and
    implements the security policy.


    Always use some level of caution when using table-valued functions. For instance,
    you should avoid multiple table joins within the table-valued function. You also
    need to ensure that your query inside the function will not return a NULL due
    to conversion or calculation issues. It is also worth noting that the execution
    plan will not include an operator for the table-valued function. Instead, you
    will see a predicate listed on one of the operators, as shown in Figure [18-16](#480547_2_En_18_Chapter.xhtml#Fig16).


    ![](images/480547_2_En_18_Chapter/480547_2_En_18_Fig16_HTML.jpg)


    A screenshot of the clustered index scan. It depicts a list of 22 properties.
    There are codes at the bottom of the list under the titles, predicate, object,
    and output list.


    Figure 18-16


    Predicate in an execution plan


    This section covered the purpose of row-level security as well as an example of
    how to implement this type of security. The example also showed how the results
    are different when a filter predicate is in place for row-level security. There
    was also an example of how to disable row-level security, if needed.'
