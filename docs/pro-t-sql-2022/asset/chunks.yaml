    same items when the 5% price increase was in place. This change to the data is
    cosmetic and does not affect the data that is stored in the database.


    #### Multi-Statement Table-Valued Functions


    When you must have both code reuse and the ability to update SQL Server, it may
    be time to consider using multi-statement table-valued functions. I caution you
    to carefully consider whether this approach is necessary because these types of
    functions can end up having a tremendous performance impact.


    Multi-statement table-valued functions are not just inline table-valued functions
    that can do more. They also can’t be inlined with the query execution. This signifies
    that the query optimizer does not attempt a best guess when using these types
    of functions. As a matter of fact, prior to SQL Server 2014, multi-statement table-valued
    functions were estimated to have one row. For SQL Server 2014 and SQL Server 2016,
    the estimated number of rows was 100\. However, as of SQL Server 2017, there is
    a possibility that SQL Server will get a proper estimate for the rows returned
    by using interleaved execution.


    What happens is that the optimization process will pause to allow execution so
    that the cardinality estimator can determine the actual number of rows that should
    be returned by the multi-statement table-valued function. While interleaved execution
    is part of the new adaptive query processing, there are some limitations to keep
    in mind. If there is a CROSS APPLY used in conjunction with a multi-statement
    table-valued function, then the interleaved functionality will not work. It has
    also been reported that if there is a WHERE clause inside the multi-statement
    table-valued function that depends on an input parameter, then interleaved execution
    may also not apply.


    To get a better idea of how this all works, refer to the multi-statement table-valued
    function in Listing [2-21](#480547_2_En_2_Chapter.xhtml#PC21).


    ```

    CREATE FUNCTION dbo.GetTopCustomersByCountry (@Country VARCHAR(75), @TopN INT)

    RETURNS @TopCustomer TABLE

    (

    CustomerRank      INT,

    FirstName         VARCHAR(40),

    LastName          VARCHAR(100),

    CustomerOrderID   INT,

    TotalProductSales DECIMAL(12,2)

    )

    AS

    BEGIN

    WITH cte_TopCust (FirstName, LastName, CustomerOrderID, TotalProductSales) AS

    (

    SELECT cus.FirstName,

    cus.LastName,

    ord.CustomerOrderID,

    SUM(dtl.QuantitySold * dtl.ProductPrice) AS TotalProductSales

    FROM dbo.Customer cus

    INNER JOIN dbo.CustomerOrder ord

    ON cus.CustomerID = ord.CustomerID

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    WHERE (cus.Country = @Country OR @Country IS NULL)

    GROUP BY ord.CustomerOrderID,

    cus.FirstName,

    cus.LastName

    )

    INSERT INTO @TopCustomer

    (

    CustomerRank,

    FirstName,

    LastName,

    CustomerOrderID,

    TotalProductSales

    )

    SELECT TOP(@TopN) ROW_NUMBER() OVER(ORDER BY TotalProductSales DESC) AS CustomerRank,

    FirstName,

    LastName,

    CustomerOrderID,

    TotalProductSales

    FROM cte_TopCust

    ORDER BY 5 DESC, CustomerOrderID DESC;

    RETURN

    END;

    Listing 2-21

    Multi-Statement Table-Valued Function

    ```


    Let’s execute this function in compatibility mode for SQL Server 2017 and SQL
    Server 2022\. When analyzing sales for a company, it is very common to compare
    customer purchasing behavior. Sometimes this can cause the logic within queries
    to get quite complex. Now that this function has been created, you can write a
    script to test the performance of this function in the various versions of SQL
    Server; refer to Listing [2-22](#480547_2_En_2_Chapter.xhtml#PC22).


    ```

    SELECT cty.CustomerRank,

    cty.FirstName,

    cty.LastName,

    COUNT(cty.CustomerOrderID) AS NumberOfOrders,

    cty.TotalProductSales

    FROM dbo.GetTopCustomersByCountry (NULL, 5999) AS cty

    GROUP BY cty.CustomerRank,

    cty.FirstName,

    cty.LastName,

    cty.TotalProductSales;

    Listing 2-22

    Code to Execute Function

    ```


    Next, let’s test the execution plans and relative performance across the various
    versions of SQL Server. Figure [2-9](#480547_2_En_2_Chapter.xhtml#Fig9) show the
    execution plan in SQL Server 2012 by using the compatibility mode 110.


