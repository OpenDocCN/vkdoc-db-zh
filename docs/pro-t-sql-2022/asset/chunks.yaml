    # *To my best girl, Khari.*


    *I miss you oodles, especially you letting me know it was time to quit working
    or to go to bed. Now I''ve been working on figuring that out myself.*


    # Introduction


    This book was written with the intention of encouraging others to get to the next
    level of their `T-SQL` development. The goal is to not only get a better understanding
    of how to write better queries but also an idea of why some methods can be better
    than others. There is a great deal of flexibility when creating `T-SQL` statements.
    In many cases, there is more than one way to achieve the same outcome from your
    `T-SQL`. This book is designed for database developers and data professionals
    who have a general knowledge of `T-SQL` but are looking to improve their overall
    code quality. You should understand the `T-SQL` syntax and know how to write `SELECT`,
    `INSERT`, `UPDATE`, or `DELETE` statements before beginning this book. *Pro T-SQL
    2022* will prepare you to write consistent code with improved performance. You
    will also learn how to protect your `T-SQL` code by using source control and improving
    your database deployment pipeline. Overall, the goal of this book is to provide
    you with a framework to write better `T-SQL` code. As data professionals, we can
    find ourselves in scenarios where there are high demands or short deadlines. *Pro
    T-SQL 2022* was written to help you write code that can save you time and energy
    in the future.


    There are five sections in this book. The first section covers how to improve
    the readability of your `T-SQL` code. There is an overview of the various data
    types of `T-SQL` along with guidance on how to best use these data types. This
    first section explains the benefits and disadvantages of the various database
    objects in SQL Server. Additional chapters discuss standardizing and designing
    `T-SQL` code. The second section explains how to write `T-SQL` code that is efficient.
    This section includes using set-based design to write `T-SQL` code and how to
    understand the relationship between hardware and `T-SQL` design. You will also
    learn how to use execution plans and new features in SQL Server 2019 to improve
    the performance of your `T-SQL` code. The third section discusses how to manage
    your `T-SQL` code. The chapters included in this section cover developing coding
    standards and using source control to store your code. To further manage your
    `T-SQL` code, you will also learn some methods to test and deploy your database
    code. The fourth section addresses how to write `T-SQL` code so that it is sustainable
    over time. The last section gives an overview of the different options you can
    implement to help make your databases more secure. These chapters include methods
    to safely add new functionality, to log changes to data within your databases,
    and to manage data growth over time.


    # Acknowledgments


    This book would truly not be possible without the technical editing of Eric Blinn.
    He challenged me to make this book more organized and structured. I also want
    to thank the entire Apress team including Shaul Elson, Shonmirin PA, and Laura
    Berendson for their patience while I worked to complete this book.


    I also would like to acknowledge the continued support of Mind, Eve, Danny, Mom,
    Dad, Kaiya, and Ares. You all played your part in helping me either destress or
    take a break or focus to get this book finished.


    I want to thank my team at work for their support including Anthony, Helen, and
    Jude. I also want to thank the SQL community and the data community for being
    a part of this journey, and I hope you enjoy this book!


    About the Author About the Technical Reviewer


    # 1. Data Types


    Data types are key to writing efficient and performant `T-SQL`. While many data
    types can be a number, string, or date/time, there are also a variety of data
    types that do not fit into any of these categories. When selecting a data type,
    it is important to understand what the data type is and when best to use it.


    The most obvious use for data types is to allow users to know what type of information
    is stored in each column. There is also a difference in how SQL Server stores
    different data types, and data types can affect how SQL Server generates execution
    plans. In addition, columns all have a storage cost that is based on the data
    type and row count of the column. The effects of these storage requirements will
    be discussed further in Chapter [7](#480547_2_En_7_Chapter.xhtml). As you’ll find
    later in this chapter, data types can also affect the cost of performing calculations
    as well as the results of those calculations.


    ## Number Data Types


    While numbers may all seem to be the same, `T-SQL` segments numeric data types
    into several different categories of data types. These segments can include whole
    numbers or numbers with decimal places. Numbers are also categorized by either
    being exact or approximate. When saving numbers there is also a variation in data
    types based on the range. Understanding how to work with various number data types
    when performing mathematical calculations is critical to ensuring that applications
    handle data as expected.


    While it may be easiest to pick the most common data types from each category,
    there are times where it is best to analyze the data that will be stored and search
    for a more appropriate option. When choosing data types, there are various factors
    to consider. The most important step is to figure out what kind of data will be
    stored. The next logical step is to consider how the data will be used. In addition,
    it is important to understand how `T-SQL` handles calculations involving various
    data types. If you want to store the day of the year, you should use a whole number
    that allows you to use a value between 1 and 366. When storing revenue for a large
    company, you need a number with multiple digits and two decimal places. However,
    if you need to store the price for a gallon of gas, you want a number with two
    digits and several decimal places. All of these situations are defined differently
    in SQL Server.'
