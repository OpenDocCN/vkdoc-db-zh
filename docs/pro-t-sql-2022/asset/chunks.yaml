- fmt: '## Partitioned Views


    You can break a single table up into multiple segments by creating a partitioned
    table. Conversely, you have the option of combining several smaller tables together
    in a way that will allow them to act like one large table. The tables that are
    joined in this manner can be partitioned or not. Similar to creating a partitioned
    table, you also have the option of creating a partitioned view.


    Like partitioned tables, you should not expect the use of partitioned views to
    necessarily mean that you will get better performance from the queries that will
    use this database object going forward. However, there are some design principles
    that may allow you to achieve improved performance. When using partitioned tables,
    there is the concept of *partition elimination*. The same sort of concept can
    be found with partitioned views. Listing 16-15 shows two tables with the same
    schema as one another.


    ```sql

    CREATE TABLE dbo.CustomerOrderHistory2021

    (

    CustomerOrderHistoryID       BIGINT    IDENTITY(1,1)   NOT NULL,

    CustomerOrderID              INT                       NOT NULL,

    CustomerOrderHistoryStatusID TINYINT                   NOT NULL,

    DateCreated                  DATETIME2(2)              NOT NULL,

    DateModified                 DATETIME2(2)                  NULL,

    CONSTRAINT PK_CustomerOrderHistory2021_CustomerOrderHistoryID

    PRIMARY KEY NONCLUSTERED (CustomerOrderHistoryID, DateCreated),

    CONSTRAINT FK_CustomerOrderHistory2021_CustomerOrder

    FOREIGN KEY (CustomerOrderID)

    REFERENCES dbo.CustomerOrder(CustomerOrderID),

    CONSTRAINT FK_CustomerOrderHistory2021_CustomerOrderHistoryStatus

    FOREIGN KEY (CustomerOrderHistoryStatusID)

    REFERENCES dbo.CustomerOrderHistoryStatus

    (CustomerOrderHistoryStatusID)

    );

    CREATE CLUSTERED INDEX IX_CustomerOrderHistory2021_DateCreated

    ON dbo.CustomerOrderHistory2021 (DateCreated)

    ON CustomerOrderHistoryRange (DateCreated);

    CREATE TABLE dbo.CustomerOrderHistory2022

    (

    CustomerOrderHistoryID        BIGINT    IDENTITY(1,1)    NOT NULL,

    CustomerOrderID               INT                        NOT NULL,

    CustomerOrderHistoryStatusID  TINYINT                    NOT NULL,

    DateCreated                   DATETIME2(2)               NOT NULL,

    DateModified                  DATETIME2(2)                   NULL,

    CONSTRAINT PK_CustomerOrderHistory2022_CustomerOrderHistoryID

    PRIMARY KEY NONCLUSTERED (CustomerOrderHistoryID, DateCreated),

    CONSTRAINT FK_CustomerOrderHistory2022_CustomerOrder

    FOREIGN KEY (CustomerOrderID)

    REFERENCES dbo.CustomerOrder(CustomerOrderID),

    CONSTRAINT FK_CustomerOrderHistory2022_CustomerOrderHistoryStatus

    FOREIGN KEY (CustomerOrderHistoryStatusID)

    REFERENCES dbo.CustomerOrderHistoryStatus

    (CustomerOrderHistoryStatusID)

    );

    CREATE CLUSTERED INDEX IX_CustomerOrderHistory2022_DateCreated

    ON dbo.CustomerOrderHistory2022 (DateCreated)

    ON CustomerOrderHistoryRange (DateCreated);

    ```


    Listing 16-15 Creating Tables for a Partitioned View


    While each of these tables is on the same partitioning scheme, there is nothing
    to limit the type of data that will be stored in these tables. The first table
    is intended to store data for 2022, and the second table is for data from 2021.
    However, you need to add constraints to these tables to ensure that the correct
    records exist in each table. In Listing 16-16, you can find the constraints that
    will be added to both tables.


    ```sql

    ALTER TABLE dbo.CustomerOrderHistory2022

    WITH CHECK ADD CONSTRAINT CK_CustomerOrderHistory2022_MinDateCreated

    CHECK

    (

    DateCreated IS NOT NULL

    AND DateCreated >= ''2022-01-01''

    );

    ALTER TABLE dbo.CustomerOrderHistory2022

    WITH CHECK ADD CONSTRAINT CK_CustomerOrderHistory2022_MaxDateCreated

    CHECK

    (

    DateCreated IS NOT NULL

    AND DateCreated = ''2021-01-01''

    );

    ALTER TABLE dbo.CustomerOrderHistory2021

    WITH CHECK ADD CONSTRAINT CK_CustomerOrderHistory2021_MaxDateCreated

    CHECK

    (

    DateCreated IS NOT NULL

    AND DateCreated < ''2022-01-01''

    );

    ```


    Listing 16-16 Adding Constraints to Tables


    The table for 2022 now has a constraint that only allows records with a `DateCreated`
    from January 1, 2022, up to but not including January 1, 2023. There is also a
    constraint on the table for 2021 with similar logic so that only records that
    were created in 2021 can be stored in this table.


    You now have tables for two different date ranges, and you have applied constraints
    to these tables. The next step is to create a partitioned view. The process of
    creating a partitioned view is relatively simple and consists of adding a `UNION
    ALL` between each `SELECT` statement on the underlying tables. An example of creating
    a partitioned view can be found in Listing 16-17.


    ```sql

    CREATE VIEW dbo.vwCustomerOrderHistory

    WITH SCHEMABINDING

    AS

    -- Select data from current read/write table

    SELECT CustomerOrderHistoryID,

    CustomerOrderID,

    CustomerOrderHistoryStatusID,

    DateCreated,

    DateModified

    FROM dbo.CustomerOrderHistory2022

    UNION ALL

    -- Select data from partitioned table

    SELECT CustomerOrderHistoryID,

    CustomerOrderID,

    CustomerOrderHistoryStatusID,

    DateCreated,

    DateModified

    FROM dbo.CustomerOrderHistory2021;

    ```


    Listing 16-17 Creating a Partitioned View


    Notice that the column lists are in the same order for both `SELECT` statements
    used within the partitioned view. This is a requirement of creating a partitioned
    view. You must also specify the full column list of the table when creating a
    partitioned view. Once the partitioned view has been created, you may want to
    check how querying a partitioned view works.


    Back in Listing 16-13 you queried the `dbo.CustomerOrderHistory` table on the
    date range between October 7, 2022 and October 9, 2022. You can query the partitioned
    view for the same date range, as shown in Listing 16-18.


    ```sql

    DECLARE @StartDate  DATETIME2(2) = ''2022-10-07'';

    DECLARE @EndDate    DATETIME2(2) = ''2022-10-09'';

    SELECT CustomerOrderHistoryID,

    CustomerOrderID,

    CustomerOrderHistoryStatusID,

    DateCreated,

    DateModified

    FROM dbo.vwCustomerOrderHistory

    WHERE DateCreated > @StartDate

    AND DateCreated <= @EndDate;

    ```


    Listing 16-18 Accessing Data Using a Partitioned Column


    The T-SQL code is very similar between Listing 16-13 and Listing 16-18. This shows
    how easy it can be to shift to using a partitioned view instead of the current
    table names in your queries. However, what you are really interested in confirming
    is how the execution plan has changed with the use of a partitioned view. Figure
    16-13 shows the execution plan that is generated as a result of running the query
    in Listing 16-18.


    ![](images/480547_2_En_16_Chapter/480547_2_En_16_Fig13_HTML.jpg)


    Figure 16-13 Execution plan for a partitioned view


    Like the partitioned table referenced earlier in this chapter, the execution plan
    for the partitioned view also uses a clustered index seek. Even though the partitioned
    view includes both the 2022 and 2021 tables, you can determine from the execution
    plan that `SQL Server` only returns results from the `dbo.CustomerOrderHistory2022`
    table when finding the results from the query in Listing 16-18. The percentage
    for `dbo.CustomerOrderHistory` is 0%. You can also examine the properties of the
    clustered index seek in Figure 16-14.


    ![](images/480547_2_En_16_Chapter/480547_2_En_16_Fig14_HTML.jpg)'
  raw: '### Partitioned Views


    You can break a single table up into multiple segments by creating a partitioned
    table. Conversely, you have the option of combining several smaller tables together
    in a way that will allow them to act like one large table. The tables that are
    joined in this manner can be partitioned or not. Similar to creating a partitioned
    table, you also have the option of creating a partitioned view.


    Like partitioned tables, you should not expect the use of partitioned views to
    necessarily mean that you will get better performance from the queries that will
    use this database object going forward. However, there are some design principles
    that may allow you to achieve improved performance. When using partitioned tables,
    there is the concept of *partition elimination*. The same sort of concept can
    be found with partitioned views. Listing [16-15](#480547_2_En_16_Chapter.xhtml#PC15)
    shows two tables with the same schema as one another.


    ```

    CREATE TABLE dbo.CustomerOrderHistory2021

    (

