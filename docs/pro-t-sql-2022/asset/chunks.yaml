    ## 测试行级安全策略


    一旦此安全策略就位，所有其他用户将只能看到印度的客户信息。要为所有其他用户测试新的安全策略，请创建一个用户并重新运行相同的查询，如清单 [18-14](#480547_2_En_18_Chapter.xhtml#PC14)
    所示。


    ```sql

    CREATE USER TestRowLevel WITHOUT LOGIN;

    GRANT SELECT ON SCHEMA::dbo TO TestRowLevel;

    -- impersonate for testing:

    EXECUTE AS USER = ''TestRowLevel'';

    SELECT Country, COUNT(*) AS CustomerCount

    FROM dbo.Customer

    GROUP BY Country;

    REVERT;

    -- Listing 18-14

    -- Viewing Current Customers by Country for a Test User

    ```


    新用户 `TestRowLevel` 已创建，但未关联登录账户。授予该用户的唯一权限是能够在 `dbo` 架构中的对象上选择数据。然后，`T-SQL` 代码执行与清单
    [18-11](#480547_2_En_18_Chapter.xhtml#PC11) 中相同的查询。该查询的结果如表 [18-7](#480547_2_En_18_Chapter.xhtml#Tab7)
    所示。


    **Table 18-7**

    **Customer Count by Country for Current User**


    | Country | Customer Count |

    | --- | --- |

    | India | 200702 |


    返回的唯一结果是针对印度客户的。这证实了安全策略正在按预期工作。检查清单 [18-13](#480547_2_En_18_Chapter.xhtml#PC13)
    的执行计划，你看到了一个如何在安全策略中使用 `FILTER PREDICATE` 来防止用户更新数据的例子。然而，你可能希望阻止某些用户更新数据库中的数据，即使他们可以访问这些数据。这时就需要使用
    `BLOCK PREDICATE`。


    > **注意**

    > 除非修改现有的安全策略，否则无法向已具有谓词的表添加谓词。或者，在创建安全策略时，可以在同一表上拥有多个谓词，包括一个过滤器和一个阻止器。


    清单 [18-15](#480547_2_En_18_Chapter.xhtml#PC15) 展示了一个 `BLOCK PREDICATE`，它将阻止除 `dbo`
    外的任何用户更新非印度的任何客户数据。


    ```sql

    CREATE SECURITY POLICY CountryBlock

    ADD BLOCK PREDICATE dbo.TVF_SecuritySalesIndia(Country)

    ON dbo.Customer

    WITH (STATE=ON);

    -- Listing 18-15

    -- Creating a Block Security Policy for Row-Level Security

    ```


    该安全策略将允许任何非 `dbo` 用户查看 `dbo.Customer` 表中的所有数据。然而，这些相同的用户将无法修改任何国家不是印度的数据。清单 [18-16](#480547_2_En_18_Chapter.xhtml#PC16)
    展示了此阻止谓词如何工作的示例。


    ```sql

    GRANT SELECT ON SCHEMA::dbo TO TestRowLevel;

    GRANT UPDATE ON SCHEMA::dbo TO TestRowLevel;

    -- impersonate for testing:

    EXECUTE AS USER = ''TestRowLevel'';

    UPDATE Customer

    SET DateDisabled = GETDATE();

    REVERT;

    -- Listing 18-16

    -- Updating Data for a Test User

    ```


    此查询试图为用户 `TestRowLevel` 的所有记录更新 `DateDisabled`。该用户已被授予更新记录的权限。但是，由于存在阻止谓词，当尝试更新所有记录时，用户将收到如图
    [18-15](#480547_2_En_18_Chapter.xhtml#Fig15) 所示的错误。


    ![](images/480547_2_En_18_Chapter/480547_2_En_18_Fig15_HTML.jpg)


    A text presents an error message. The second line of the message reads, the attempted
    operation failed because the target object outdoor recreation dot d b o dot customer
    has a block predicate that conflicts with this operation.


    **Figure 18-15**

    **Error message with block predicate**


    该消息表明，由于阻止谓词安全策略，此用户无法修改表 `dbo.Customer` 上的数据。


    ## 管理安全策略


    如果你想暂时禁用清单 [18-13](#480547_2_En_18_Chapter.xhtml#PC13) 中创建的安全策略，可以执行清单 [18-17](#480547_2_En_18_Chapter.xhtml#PC17)
    中的 `T-SQL` 代码。


    ```sql

    ALTER SECURITY POLICY CountryFilter

    WITH (STATE=OFF);

    -- Listing 18-17

    -- Disabling a Security Policy

    ```


    此代码会禁用安全策略。指出安全策略可以被禁用，意味着可能需要采取额外措施来确认没有人篡改过安全策略。


    > **提示**

    > 如果安全策略被禁用，行级安全将无法按预期阻止用户查看或更新数据。


    如前所述，每个表只能有一个策略。但是，该策略可以为同一个表包含一个过滤器谓词和一个阻止谓词。不支持每个表有多个修改数据的谓词。这些谓词也可以使用不同的表值函数。如果用户受到
    `FILTER PREDICATE` 的影响，即使他们被限制了可以 `SELECT`、`UPDATE` 或 `DELETE` 的数据，他们也能够插入任何数据。类似地，如果用户有
    `BLOCK PREDICATE` 但没有过滤器谓词，即使他们不能修改数据，他们也能看到所有数据。但是，这些用户被阻止对数据进行任何更改，包括插入、更新和删除。虽然你在表值函数中看到
    `RETURN` 的值为 1，但任何非 `NULL` 值都会对行级安全产生相同的结果。当没有匹配时，函数返回 `NULL` 并实施安全策略。


    使用表值函数时，始终要谨慎。例如，应避免在表值函数内进行多表连接。还需要确保函数内的查询不会因转换或计算问题而返回 `NULL`。还值得注意的是，执行计划不会包含表值函数的操作符。相反，你将在其中一个操作符上看到列出的谓词，如图
    [18-16](#480547_2_En_18_Chapter.xhtml#Fig16) 所示。


    ![](images/480547_2_En_18_Chapter/480547_2_En_18_Fig16_HTML.jpg)


    A screenshot of the clustered index scan. It depicts a list of 22 properties.
    There are codes at the bottom of the list under the titles, predicate, object,
    and output list.


    **Figure 18-16**

    **Predicate in an execution plan**


    本节介绍了行级安全的目的以及如何实现此类安全的示例。该示例还展示了当为行级安全设置了过滤器谓词时，结果有何不同。另外还给出了一个如何根据需要禁用行级安全的示例。'
