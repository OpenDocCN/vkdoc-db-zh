  trans: '


    ### 理解数据检索


    过程式代码被描述为不仅告诉系统做什么，还要告诉它如何做。在许多公司中，软件开发人员或软件工程师负责编写 `T-SQL` 代码。我从与开发人员互动中学到的一件事是，编写应用程序代码本质上是过程式的。许多应用程序开发人员一天中的大部分时间都在过程式环境中处理代码。这意味着在过程式应用程序代码和数据库
    `T-SQL` 代码之间切换上下文的心智成本可能非常高。编写基于集合的代码所使用的思维过程，可能与以迭代方式处理代码的思维过程截然不同。


    #### 基于集合设计的价值


    我们为什么会对使用基于集合的设计感兴趣？为什么值得这么做？这与 `SQL Server` 引擎的工作方式以及如何检索查询数据有关。当发出一个查询时，`SQL
    Server` 需要检索一条或多条数据记录。当 `SQL Server` 为查询结果检索数据时，数据页必须位于内存中。这块预留用于存放数据页的内存被称为 `缓冲区缓存`，也称为
    `缓冲池`。`SQL Server` 会查看 `缓冲区缓存` 以确认所需数据是否可用。图 5-1 展示了如果数据已缓存在 `缓冲池` 中，`SQL Server`
    作为查询请求的一部分检索数据所经历的过程。


    ![一个块流程图，显示了标题为查询、命令解析器、优化器、查询执行器和缓冲池的块。所有块之间由前向和后向箭头分隔。](img/480547_2_En_5_Fig1_HTML.jpg)


    **图 5-1** 单个查询的数据检索


    数据是逐行检索还是作为集合检索，取决于过程逻辑或程序代码。如果 `T-SQL` 是使用 `基于游标的逻辑` 编写的，它将采用逐行处理，这将导致 `SQL Server`
    为每条记录都访问 `缓冲区缓存`。一次检索单行的过程会增加 `SQL Server` 的工作负载。由于每个查询本身就是一个集合（这个集合可以只包含一个元素），我们的目标是设计出能够用最少数量的独立查询来处理最大数量可用记录的查询。设计查询以处理更大的数据集，将避免
    `SQL Server` 必须多次迭代执行同一个查询。在图 5-2 中，你可以看到逐行检索数据所需的额外工作负载。


    ![一个块流程图，显示了三行标题为查询、命令解析器、优化器、查询执行器和缓冲池的块。所有块之间由前向和后向箭头分隔。](img/480547_2_En_5_Fig2_HTML.jpg)


    **图 5-2** 当查询一次检索一行时的数据检索


    #### 缓冲池的作用


    图 5-2 显示了当数据存储在 `缓冲池` 中时，一次检索单个记录的查询过程。然而，如果查询是为 `基于集合的设计` 编写的，那么只会对 `缓冲池` 进行一次调用。对于小数据集，这可能影响不大。但当处理包含数千或数百万条记录的数据集时，执行时间的差异可能是巨大的。


    关于数据如何在 `缓冲区缓存` 中存储，还有另一点需要考虑。当 `SQL Server` 执行查询并取回数据时，它只取回存在于 `缓冲区缓存` 中的数据。从
    `SQL Server 2019` 开始，有一个名为 `混合缓冲池` 的功能。`混合缓冲池` 允许将存储在 RAM 和持久内存 (PMEM) 中的数据都视为
    `缓冲区缓存` 的一部分。否则，如果数据不在 RAM 或 PMEM 中，`SQL Server` 将需要访问磁盘来检索数据。检索到的数据随后将被存储在内存中。图
    5-3 展示了如何从磁盘检索数据并存储到 `缓冲区缓存` 中。


    ![一个块流程图，显示了标题为查询、命令解析器、优化器、查询执行器、缓冲池和数据文件的块。所有块之间由前向和后向箭头分隔。](img/480547_2_En_5_Fig3_HTML.jpg)


    **图 5-3** 从磁盘到缓冲区缓存的数据检索


    当查询执行时，该数据在那个时间点可能甚至不在 `缓冲区缓存` 中。`SQL Server` 必须访问磁盘子系统来查找该数据。一旦找到数据，该数据就会被存储到
    `缓冲区缓存` 中。


    #### 性能影响


    如果每一行都单独提取，那么对磁盘 I/O 的调用就必须为每条记录单独进行。从 `缓冲区缓存` 提取数据并非瞬间完成。从磁盘 I/O 获取数据，将其放入 `缓冲区缓存`，然后再由查询检索，这个过程更是资源密集型。最终，这会形成一个场景，让你希望专注于
    `基于集合的设计`，以便为执行的查询提供尽可能最佳的速度和性能。


    '
- fmt: "# Thinking in Data Sets\n\n现在我已经讨论了什么是数据集，我希望你能以接受数据集的方式来思考数据。在开始编写 T-SQL\
    \ 代码之前，先理解存储了什么信息、数据如何存储，以及如何选择或使用具有相似特征的数据组，可能会为你节省时间和精力。当底层表设计得最适合数据集操作时，处理数据集也会更容易完成。\n\
    \n你的目标是学会以数据集的方式进行思考。这意味着要思考如何一次处理多条记录，而不是单条记录。例如，你可能有一个像生成报告这样的任务。挑战自己，尝试用单个查询生成一份报告。这虽然不是在所有情况下都是性能最优的，但会让你习惯于思考如何描述将进入报告的那组行。这实际上需要一种更少算术性、更多代数性的方法。通常，执行\
    \ `SELECT` 语句是适应基于集的事务最简单的方式。考虑表 [5-7](#480547_2_En_5_Chapter.xhtml#Tab7) 中显示的数据。\n\
    \n**表 5-7 客户数据**\n\n| FirstName | LastName | Address | City | PostalCode | Country\
    \ |\n| --- | --- | --- | --- | --- | --- |\n| Myra | Acharya | 30 Magrath Road\
    \ | Bengaluru | 560025 | India |\n| Josè | Gomez | 790 Calle Cinco de Mayo | Cancun\
    \ | 53778 | Mexico |\n| Karim | Khalil | 153 Road Mit Rahina Al Shabab | Memphis\
    \ | 3364932 | Egypt |\n| Marty` | Bethel | 750 Cherry Rd | Memphis | 38117 | United\
    \ States |\n| Stacy | Alexander | 123 Rua de Santa Catarina | Porto | 1234-567\
    \ | Portugal |\n\n这是一份部分客户的地址列表。你可以编写清单 [5-1](#480547_2_En_5_Chapter.xhtml#PC1)\
    \ 中的 T-SQL 查询来获取上面的数据集。\n\n```sql\nSELECT FirstName,\n       LastName,\n     \
    \  [Address],\n       City,\n       PostalCode,\n       Country\nFROM dbo.Customer\n\
    WHERE CustomerID BETWEEN 401405 AND 401409\nORDER BY City,\n       Country;\n\
    -- Listing 5-1\n-- Partial Customer List\n```\n\n通过查看前面的数据，你可以发现某些列数据之间的相似性。\n\
    \n你可以创建一个数据集来获取孟菲斯市客户的所有订单。这些记录如表 [5-8](#480547_2_En_5_Chapter.xhtml#Tab8) 所示。\n\
    \n**表 5-8 孟菲斯市的客户**\n\n| FirstName | LastName | Address | City | PostalCode |\
    \ Country |\n| --- | --- | --- | --- | --- | --- |\n| Karim | Khalil | 153 Road\
    \ Mit Rahina Al Shabab | Memphis | 3364932 | Egypt |\n| Marty` | Bethel | 750\
    \ Cherry Rd | Memphis | 38117 | United States |\n\n如果你想使用 T-SQL 来查找相同的信息，可以编写清单\
    \ [5-2](#480547_2_En_5_Chapter.xhtml#PC2) 中的查询。\n\n```sql\nSELECT FirstName, LastName\n\
    FROM dbo.Customer\nWHERE City = 'Memphis';\n-- Listing 5-2\n-- Customers in Memphis\n\
    ```\n\n你也可以获取所有产品单价大于或等于 $500 的订单数据集，如表 [5-9](#480547_2_En_5_Chapter.xhtml#Tab9)\
    \ 所示。\n\n**表 5-9 产品单价等于 $500 的客户订单**\n\n| FirstName | LastName | CustomerOrderID\
    \ | QuantitySold |\n| --- | --- | --- | --- |\n| Karim | Khalil | 802818 | 2 |\n\
    | Marty` | Bethel | 802817 | 1 |\n| Myra | Acharya | 802816 | 1 |\n\n清单 [5-3](#480547_2_En_5_Chapter.xhtml#PC3)\
    \ 是检索表 [5-9](#480547_2_En_5_Chapter.xhtml#Tab9) 中数据所需的查询。\n\n```sql\nSELECT cus.FirstName,\n\
    \       cus.LastName,\n       ord.CustomerOrderID,\n       SUM(dtl.QuantitySold)\
    \ AS QuantitySold\nFROM dbo.Customer cus\nINNER JOIN dbo.CustomerOrder ord\n \
    \      ON cus.CustomerID = ord.CustomerID\nINNER JOIN dbo.OrderDetail dtl\n  \
    \     ON ord.CustomerOrderID = dtl.CustomerOrderID\nWHERE dtl.ProductPrice = 249.99\n\
    GROUP BY cus.FirstName,\n       cus.LastName,\n       ord.CustomerOrderID;\n--\
    \ Listing 5-3\n-- Query to Identify Customer Orders with Products Equal to $500\n\
    ```\n\n现在你有了一个数据集，可以考虑如何与该数据集进行交互。知道可以将相似的数据分组并对整个数据集执行操作，是有效使用 T-SQL 代码的关键。如果你想找出产品的平均购买数量，可以将订单总额除以单位数量。要计算每条记录的平均购买量，可以手动为每条记录计算成本。在这种情况下，`CustomerOrderID`\
    \ 802817 的订单总额是 $2,295。这张发票上售出的总单位数是 5：三个望远镜和两个充气桨板。结果是每个售出单位 $459。或者，你可以使用数据集中的列进行相同的计算。要将单位成本作为数据集计算，你可以指定\
    \ `Average Unit Price`。以这种方式处理数据的结果如表 [5-10](#480547_2_En_5_Chapter.xhtml#Tab10)\
    \ 所示。\n\n**表 5-10 计算得出的平均单位价格**\n\n| CustomerOrderID | Average Unit Price |\n\
    | --- | --- |\n| 802817 | $459.00 |\n| 802924 | $249.00 |\n\n使用 SQL Server 最大的挑战之一就是学习如何以数据集的方式思考。思考数据集最简单的方法是，将检索数据的过程视为对一列或列的子集执行操作。如果你能找到某种模式，说明如何对数据的子集执行该操作，那么你就是在以数据集的方式思考。"
  raw: '### Thinking in Data Sets


    Now that I have discussed what data sets are, I want you to be comfortable thinking
    about data in a way that embraces data sets. Before you start writing T-SQL code,
    it may save you time and energy to first understand what information is stored,
    how the data is stored, and selecting or using that data in groups of similar
    characteristics. Working with data sets is also easier to accomplish when the
    underlying tables are designed to work best with data sets.


    Your goal is to learn to think in terms of data sets. This means thinking about
    handling multiple records at once instead of a single record. As an example, you
    may have a task like generating a report. Challenge yourself to generate a report
    from a single query. This won’t be optimal for performance in all cases, but it
    will get you accustomed to thinking through how to describe the set of rows that
    will go into the report. This really requires an approach that is less arithmetic
    and more algebraic. In general, performing SELECT statements is the easiest way
    to get comfortable with set-based transactions. Consider the data shown in Table
    [5-7](#480547_2_En_5_Chapter.xhtml#Tab7).


    Table 5-7


    Customer Data


    | First Name | Last Name | Address | City | Postal Code | Country |

    | --- | --- | --- | --- | --- | --- |

    | Myra | Acharya | 30 Magrath Road | Bengaluru | 560025 | India |

    | Josè | Gomez | 790 Calle Cinco de Mayo | Cancun | 53778 | Mexico |

    | Karim | Khalil | 153 Road Mit Rahina Al Shabab | Memphis | 3364932 | Egypt |

    | Marty` | Bethel | 750 Cherry Rd | Memphis | 38117 | United States |

    | Stacy | Alexander | 123 Rua de Santa Catarina | Porto | 1234-567 | Portugal
    |


    This is a partial list of customers with their address. You can write the T-SQL
    query in Listing [5-1](#480547_2_En_5_Chapter.xhtml#PC1) to get the data set above.


    ```

    SELECT FirstName,

    LastName,

    [Address],

    City,

    PostalCode,

    Country

    FROM dbo.Customer

    WHERE CustomerID BETWEEN 401405 AND 401409

    ORDER BY City,

    Country;

    Listing 5-1

    Partial Customer List

    ```


    By looking at the preceding data, you can find similarities between the data in
    some of the columns.


    You can create a data set that gets all orders for customers in the city of Memphis.
    These records are shown in Table [5-8](#480547_2_En_5_Chapter.xhtml#Tab8).


    Table 5-8


    Customers in the City of Memphis


    | First Name | Last Name | Address | City | Postal Code | Country |

    | --- | --- | --- | --- | --- | --- |

    | Karim | Khalil | 153 Road Mit Rahina Al Shabab | Memphis | 3364932 | Egypt |

    | Marty` | Bethel | 750 Cherry Rd | Memphis | 38117 | United States |


    If you want to use T-SQL to find this same information, you can write the query
    in Listing [5-2](#480547_2_En_5_Chapter.xhtml#PC2).


    ```

    SELECT FirstName, LastName

    FROM dbo.Customer

    WHERE City = ''Memphis'';

    Listing 5-2

    Customers in Memphis

    ```


    You can instead get the data set for all orders where the price per product is
    greater than or equal to $500 as shown in Table [5-9](#480547_2_En_5_Chapter.xhtml#Tab9).


    Table 5-9


    Customer Orders with a Products Equal to $500


    | First Name | Last Name | CustomerOrderID | Quantity Sold |

    | --- | --- | --- | --- |

    | Karim | Khalil | 802818 | 2 |

    | Marty` | Bethel | 802817 | 1 |

    | Myra | Acharya | 802816 | 1 |


    Listing [5-3](#480547_2_En_5_Chapter.xhtml#PC3) is the query needed to retrieve
    the data in Table [5-9](#480547_2_En_5_Chapter.xhtml#Tab9).


    ```

    SELECT cus.FirstName,

    cus.LastName,

    ord.CustomerOrderID,

    SUM(dtl.QuantitySold) AS QuantitySold

    FROM dbo.Customer cus

    INNER JOIN dbo.CustomerOrder ord

    ON cus.CustomerID = ord.CustomerID

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    WHERE dtl.ProductPrice = 249.99

    GROUP BY cus.FirstName,

    cus.LastName,

    ord.CustomerOrderID;

    Listing 5-3

    Query to Identify Customer Orders with Products Equal to $500

    ```


    Now that you have a set of data, you can consider how you want to interact with
    that data set. Knowing that you can group like data together and perform an action
    on that entire set of data is the key to using T-SQL code effectively. If you
    want to find out the average amount of products purchased, you can divide the
    order total by the number of units. To calculate the average amount purchased
    for each record, you can calculate the cost manually for each record. In this
    case, the order total for CustomerOrderID 802817 is $2,295\. The total number
    of units sold on this invoice is 5: three telescopes and two inflatable paddleboards.
    This gives the result of $459 per unit sold. Alternatively, you can use the columns
    in the data sets to do the same calculation. To calculate the cost per unit as
    a data set, you can specify Average Unit Price. The result of handling the data
    in this fashion is shown in Table [5-10](#480547_2_En_5_Chapter.xhtml#Tab10).


    Table 5-10


    Calculated Average Unit Price


    | CustomerOrderID | Average Unit Price |

    | --- | --- |

    | 802817 | $459.00 |

    | 802924 | $249.00 |


    One of the greatest challenges working with SQL Server is learning how to think
    in data sets. The simplest way to think of data sets is to view the process of
    retrieving data as performing an action on a column or a subset of a column. If
    you can find some sort of pattern on how to perform that action on a subset of
    the data, then you are thinking in terms of data sets.'
  trans: "# 以数据集的方式思考\n\n既然我已经讨论了什么是数据集，我希望你能以接纳数据集的方式去思考数据。在开始编写 T-SQL 代码之前，先理解存储了什么信息、数据如何存储，以及如何选择或使用具有相似特征的数据组，这可能会为你节省时间和精力。当底层表设计得最适合数据集操作时，处理数据集也会更容易完成。\n\
    \n你的目标是学会以数据集的方式进行思考。这意味着要思考如何一次处理多条记录，而不是单条记录。例如，你可能有一个像生成报告这样的任务。挑战自己，尝试用单个查询生成一份报告。虽然这并非在所有情况下都是性能最优的，但会让你习惯于思考如何描述将要进入报告的那一组行。这实际上需要一种更少算术性、更多代数性的方法。通常，执行\
    \ `SELECT` 语句是适应基于集的事务最简单的方式。考虑表 5-7 中显示的数据。\n\n**表 5-7 客户数据**\n\n| FirstName\
    \ | LastName | Address | City | PostalCode | Country |\n| --- | --- | --- | ---\
    \ | --- | --- |\n| Myra | Acharya | 30 Magrath Road | Bengaluru | 560025 | India\
    \ |\n| Josè | Gomez | 790 Calle Cinco de Mayo | Cancun | 53778 | Mexico |\n| Karim\
    \ | Khalil | 153 Road Mit Rahina Al Shabab | Memphis | 3364932 | Egypt |\n| Marty`\
    \ | Bethel | 750 Cherry Rd | Memphis | 38117 | United States |\n| Stacy | Alexander\
    \ | 123 Rua de Santa Catarina | Porto | 1234-567 | Portugal |\n\n这是一份部分客户的地址列表。你可以编写清单\
    \ 5-1 中的 T-SQL 查询来获取上面的数据集。\n\n```sql\nSELECT FirstName,\n       LastName,\n \
    \      [Address],\n       City,\n       PostalCode,\n       Country\nFROM dbo.Customer\n\
    WHERE CustomerID BETWEEN 401405 AND 401409\nORDER BY City,\n       Country;\n\
    -- 清单 5-1\n-- 部分客户列表\n```\n\n通过查看前面的数据，你可以发现某些列数据之间的相似性。\n\n你可以创建一个数据集来获取孟菲斯市客户的所有订单。这些记录如表\
    \ 5-8 所示。\n\n**表 5-8 孟菲斯市的客户**\n\n| FirstName | LastName | Address | City | PostalCode\
    \ | Country |\n| --- | --- | --- | --- | --- | --- |\n| Karim | Khalil | 153 Road\
    \ Mit Rahina Al Shabab | Memphis | 3364932 | Egypt |\n| Marty` | Bethel | 750\
    \ Cherry Rd | Memphis | 38117 | United States |\n\n如果你想使用 T-SQL 来查找相同的信息，可以编写清单\
    \ 5-2 中的查询。\n\n```sql\nSELECT FirstName, LastName\nFROM dbo.Customer\nWHERE City\
    \ = 'Memphis';\n-- 清单 5-2\n-- 孟菲斯市的客户\n```\n\n你也可以获取所有产品单价大于或等于 $500 的订单数据集，如表\
    \ 5-9 所示。\n\n**表 5-9 产品单价等于 $500 的客户订单**\n\n| FirstName | LastName | CustomerOrderID\
    \ | QuantitySold |\n| --- | --- | --- | --- |\n| Karim | Khalil | 802818 | 2 |\n\
    | Marty` | Bethel | 802817 | 1 |\n| Myra | Acharya | 802816 | 1 |\n\n清单 5-3 是检索表\
    \ 5-9 中数据所需的查询。\n\n```sql\nSELECT cus.FirstName,\n       cus.LastName,\n     \
    \  ord.CustomerOrderID,\n       SUM(dtl.QuantitySold) AS QuantitySold\nFROM dbo.Customer\
    \ cus\nINNER JOIN dbo.CustomerOrder ord\n       ON cus.CustomerID = ord.CustomerID\n\
    INNER JOIN dbo.OrderDetail dtl\n       ON ord.CustomerOrderID = dtl.CustomerOrderID\n\
    WHERE dtl.ProductPrice = 249.99\nGROUP BY cus.FirstName,\n       cus.LastName,\n\
    \       ord.CustomerOrderID;\n-- 清单 5-3\n-- 用于识别产品单价等于 $500 的客户订单的查询\n```\n\n\
    现在你有了一个数据集，可以考虑如何与该数据集进行交互。知道可以将相似的数据分组并对整个数据集执行操作，是有效使用 T-SQL 代码的关键。如果你想找出产品的平均购买数量，可以将订单总额除以单位数量。要计算每条记录的平均购买量，可以手动为每条记录计算成本。在这种情况下，`CustomerOrderID`\
    \ 802817 的订单总额是 $2,295。这张发票上售出的总单位数是 5：三个望远镜和两个充气桨板。结果是每个售出单位 $459。或者，你可以使用数据集中的列进行相同的计算。要将单位成本作为数据集计算，你可以指定\
    \ `Average Unit Price`。以这种方式处理数据的结果如表 5-10 所示。\n\n**表 5-10 计算得出的平均单位价格**\n\n|\
    \ CustomerOrderID | Average Unit Price |\n| --- | --- |\n| 802817 | $459.00 |\n\
    | 802924 | $249.00 |\n\n使用 SQL Server 最大的挑战之一就是学习如何以数据集的方式思考。思考数据集最简单的方法是，将检索数据的过程视为对一列或列的子集执行操作。如果你能找到某种模式，说明如何对数据的子集执行该操作，那么你就是在以数据集的方式思考。"
- fmt: '### Identifying Data Sets


    Looking at the `Customer` table, you can create a data set where all cities have
    the word Memphis in the name. All the available values in the `Customer` table
    are in Table [5-11](#480547_2_En_5_Chapter.xhtml#Tab11).


    Table 5-11

    General Listing of Customers


    | `First Name` | `Last Name` | `Address` | `City` | `Postal Code` | `Country`
    |

    | --- | --- | --- | --- | --- | --- |

    | Myra | Acharya | 30 Magrath Road | Bengaluru | 560025 | India |

    | Josè | Gomez | 790 Calle Cinco de Mayo | Cancun | 53778 | Mexico |

    | Stacy | Parks | 123 Rua de Santa Catarina | Porto | 1234-567 | Portugal |

    | Karim | Khalil | 153 Road Mit Rahina Al Shabab | Memphis | 3364932 | Egypt |

    | Marty` | Bethel | 750 Cherry Rd | Memphis | 38117 | United States |


    There are a couple different ways to do this. You can write a query that looks
    for the `CustomerID` of 401407 or 401405. You can see the results of this logic
    in Table [5-12](#480547_2_En_5_Chapter.xhtml#Tab12).


    Table 5-12

    Customers in the City of Memphis


    | `First Name` | `Last Name` | `Address` | `City` | `Postal Code` | `Country`
    |

    | --- | --- | --- | --- | --- | --- |

    | Karim | Khalil | 153 Road Mit Rahina Al Shabab | Memphis | 3364932 | Egypt |

    | Marty` | Bethel | 750 Cherry Rd | Memphis | 38117 | United States |


    Going back to the preceding table, add a new customer for Memphis. Table [5-13](#480547_2_En_5_Chapter.xhtml#Tab13)
    shows the new record added.


    Table 5-13

    Adding New Memphis Customer


    | `First Name` | `Last Name` | `Address` | `City` | `Postal Code` | `Country`
    |

    | --- | --- | --- | --- | --- | --- |

    | Karim | Khalil | 153 Road Mit Rahina Al Shabab | Memphis | 3364932 | Egypt |

    | Marty` | Bethel | 750 Cherry Rd | Memphis | 38117 | United States |

    | Ruth | Johnson | 4711 Ponce de Leon | Memphis | 38110 | United States |


    If you want to still show all records that have the city of Memphis and you use
    the same logic as earlier, which is to use the `CustomerID` to display the desired
    values, you will not get the results you expect. If you don’t change how the data
    is accessed and use the same logic to get the results as in Table [5-13](#480547_2_En_5_Chapter.xhtml#Tab13),
    you will get the result set shown in Table [5-14](#480547_2_En_5_Chapter.xhtml#Tab14).


    Table 5-14

    Customers in Memphis using `CustomerID`


    | `CustomerID` | `First Name` | `Last Name` | `City` | `Postal Code` | `Country`
    |

    | --- | --- | --- | --- | --- | --- |

    | 401407 | Karim | Khalil | Memphis | 3364932 | Egypt |

    | 401405 | Marty` | Bethel | Memphis | 38117 | United States |


    Table [5-15](#480547_2_En_5_Chapter.xhtml#Tab15) shows the expected results by
    changing the logic to look at the city name to find all cities equal to Memphis.


    Table 5-15

    Customers with Memphis as City Name


    | `CustomerID` | `First Name` | `Last Name` | `City` | `Postal Code` | `Country`
    |

    | --- | --- | --- | --- | --- | --- |

    | 401407 | Karim | Khalil | Memphis | 3364932 | Egypt |

    | 401405 | Marty` | Bethel | Memphis | 38117 | United States |

    | 401408 | Ruth | Johnson | Memphis | 38110 | United States |


    In that case, I would want to run a query where the city name was equal to Memphis.
    As you can see in this example, there are not only limitations with regard to
    data sets that affect performance but can also affect functionality.


    One of the largest challenges in using data sets has to do with inserting data
    records. In most cases, when you insert a data record, you are inserting a single
    record at a time. This can cause it to become a habit to only deal with inserting
    one individual record at a time. When you are designing new table or moving data,
    you may have situations where you can think of an insert in terms of a data set.
    This will often happen when you are creating a query to insert data into another
    table.


    While it does not seem like these situations will come up very often, I frequently
    use data sets when I populate temporary tables, table variables, and common table
    expressions.


    Inserting data as a set uses the foundation of selecting data as data set. Once
    you select data as a set, you can insert data as a set. I have used inserting
    data into an object like a temporary table for a couple of different reasons.
    One of the more common situations when I insert data sets is when I join several
    different tables and implement criteria that make complicated calculations or
    functions. Looking at Table [5-16](#480547_2_En_5_Chapter.xhtml#Tab16) and Table
    [5-17](#480547_2_En_5_Chapter.xhtml#Tab17), you can see some examples of data
    inserted into `dbo.Customer`.


    Table 5-17

    Ruth Added As a Record


    | `CustomerID` | `First Name` | `Last Name` | `City` | `Postal Code` | `Country`
    |

    | --- | --- | --- | --- | --- | --- |

    | 401408 | Ruth | Johnson | Memphis | 38110 | United States |


    Table 5-16

    Marty` Added As a Record


    | `CustomerID` | `First Name` | `Last Name` | `City` | `Postal Code` | `Country`
    |

    | --- | --- | --- | --- | --- | --- |

    | 401405 | Marty` | Bethel | Memphis | 38117 | United States |


    While all these entries can be inserted individually, it is also possible to insert
    multiple records at once. In this case, it may look something like Table [5-18](#480547_2_En_5_Chapter.xhtml#Tab18).


    Table 5-18

    Adding Customers As a Data Set


    | `CustomerID` | `First Name` | `Last Name` | `City` | `Postal Code` | `Country`
    |

    | --- | --- | --- | --- | --- | --- |

    | 401405 | Marty` | Bethel | Memphis | 38117 | United States |

    | 401408 | Ruth | Johnson | Memphis | 38110 | United States |


    Another scenario where I have used bulk inserts into temporary objects is when
    those records may require additional modifications by joining to other queries
    that include multiple table joins.'
