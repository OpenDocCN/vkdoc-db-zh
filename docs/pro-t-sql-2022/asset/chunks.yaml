    \ seek` on the primary key of the `Customer` table. As this is a seek relating\
    \ to the primary key of the table, it seems unlikely that there is a better alternative\
    \ for performance tuning this query.\n\n## Optimizing Indexes\n\nThere are other\
    \ factors that can contribute to slowness of running queries. In many scenarios,\
    \ the best way to optimize these queries involves using indexes. You want to check\
    \ execution plans for `key lookups`. These `key lookups` indicate that `SQL Server`\
    \ is having to go from the `non-clustered index` to the `clustered index` to find\
    \ additional fields that are needed as part of the query. In some cases, you may\
    \ be able to change the values returned or the join conditions of your query to\
    \ resolve the `key lookups`. Otherwise, you will need to see if the indexes can\
    \ be changed in order to improve performance.\n\nCreating and maintaining indexes\
    \ is a topic that could take up a book by itself, but there are some things you\
    \ can do when working with indexes. If you are at a point where you think you\
    \ may need to consider adding indexes, you first want to be aware of what indexes\
    \ currently exist on the tables in question. While it is outside the scope of\
    \ this book, you want to determine if there are indexes that are no longer in\
    \ use and can be dropped. Of the indexes that are remaining, you want to evaluate\
    \ these carefully. One of these indexes may be able to be modified to allow it\
    \ to continue to be effective for other `T-SQL` code but also to optimize the\
    \ current query. You can create or modify an index so that additional columns\
    \ are stored with the index. However, the index is not sorted by these columns.\
    \ These columns can be referred to as a `covering column`. If a column is needed\
    \ for a join or a `WHERE clause`, I would consider adding it to the index. Before\
    \ deciding to add the column to the index, make sure you are familiar with how\
    \ `SQL Server` uses indexes to search for data. The approach with some indexes\
    \ involves adding a column as an `included column` on the index. This will allow\
    \ `SQL Server` to return the column results without a `key lookup`, but it will\
    \ not affect how `SQL Server` uses the index to retrieve data records.\n\nOptimizing\
    \ the duration of your `T-SQL` code can yield many benefits. One is improved performance\
    \ of your applications. In some cases, you may be able to improve the duration\
    \ of your queries by rewriting the code in a way that is more efficient. In other\
    \ situations, you may want to consider if there are ways the code can be written\
    \ differently to make better use of the existing indexes. Another option is to\
    \ modify existing indexes or create new ones. If you choose to modify indexes,\
    \ use caution as sometimes indexes can exist that cause more harm than they help.\
    \ Regularly review the duration of your `T-SQL` code to see if you can find any\
    \ queries that need performance tuning."
  raw: '```

    DECLARE @CustomerID         INT = NULL;

    DECLARE @CustomerOrderID    INT = NULL;

    DECLARE @ProductID          INT = NULL;

    -- Get all orders for a specific customer and product

    SELECT cus.CustomerID,

    cus.FirstName,

    cus.LastName,

    ord.CustomerOrderID,

    prd.ProductID

    INTO #TmpOrder

    FROM dbo.Customer cus

    INNER JOIN dbo.CustomerOrder ord

    ON cus.CustomerID = ord.CustomerID

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    INNER JOIN dbo.Product prd

    ON dtl.ProductID = prd.ProductID

    WHERE prd.IsActive = 1

    AND EXISTS

    (

    SELECT *

    FROM dbo.ProductPriceHistory hist

    WHERE prd.ProductID = hist.ProductID

    GROUP BY hist.ProductID

    HAVING COUNT(*) > 3

    );

    SELECT ord.CustomerID,

    tor.FirstName,

    tor.LastName,

    ord.CustomerOrderID,

    ord.OrderNumber,

    prd.ProductName,

    dtl.QuantitySold,

    dtl.ProductPrice

    FROM #TmpOrder tor

    INNER JOIN dbo.CustomerOrder ord

    ON tor.CustomerOrderID = ord.CustomerOrderID

    INNER JOIN dbo.OrderDetail dtl

    ON tor.CustomerOrderID = dtl.CustomerOrderID

    AND tor.ProductID = dtl.ProductID

    INNER JOIN dbo.Product prd

    ON tor.ProductID = prd.ProductID

    WHERE (tor.CustomerID = @CustomerID OR @CustomerID IS NULL)

    AND (ord.CustomerOrderID = @CustomerOrderID OR @CustomerOrderID IS NULL)

    AND (dtl.ProductID = @ProductID OR @ProductID IS NULL)

    ORDER BY

    ord.CustomerID,

    CASE WHEN

    (

    ord.CustomerID = @CustomerID

    AND ord.CustomerOrderID = @CustomerOrderID

    )

    THEN 0

    ELSE 1

    END,

    ord.CustomerOrderID DESC,

    tor.LastName ASC;

    DROP TABLE #TmpOrder;

    Listing 8-5

    Original Query for Order Information for All Customers

    ```


    Overall, the goal of Listing [8-5](#480547_2_En_8_Chapter.xhtml#PC5) is to return
    the customer and order information for any combination of customers, orders, and
    products. The cost percentage indicates the percent of time the SQL Server Engine
    expects to spend on that step in the execution plan. When reviewing the execution
    plan, you want to investigate the specific part of the execution plan with the
    highest cost percentage, as shown in Figure [8-3](#480547_2_En_8_Chapter.xhtml#Fig3).


    ![](images/480547_2_En_8_Chapter/480547_2_En_8_Fig3_HTML.jpg)


    A flow diagram presents a partial execution plan. It depicts a hash match followed
    by table insert, parallelism, and T S Q L. Hash match has cost 2%, 0.056 seconds,
    1605638 of 1605640\. T S Q L has cost 0%.


    Figure 8-3


    Partial execution plan for Listing [8-5](#480547_2_En_8_Chapter.xhtml#PC5)


    The insert into the temporary table is the most significant part of the first
    T-SQL statement. The same statement also took up a higher percentage of the overall
    execution plan. Therefore, the highest cost associated with this query is inserting
    data into the temporary table. You can rewrite this query to the one shown in
    Listing [8-6](#480547_2_En_8_Chapter.xhtml#PC6).


    ```

    DECLARE @CustomerID         INT = NULL;

    DECLARE @CustomerOrderID    INT = NULL;

    DECLARE @ProductID          INT = NULL;

    SELECT cus.CustomerID,

    cus.FirstName,

    cus.LastName,

    ord.CustomerOrderID,

    ord.OrderNumber,

    prd.ProductName,

    dtl.QuantitySold,

    dtl.ProductPrice

    FROM dbo.Customer cus

    INNER JOIN dbo.CustomerOrder ord

    ON cus.CustomerID = ord.CustomerID

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    INNER JOIN dbo.Product prd

    ON dtl.ProductID = prd.ProductID

    WHERE (cus.CustomerID = @CustomerID OR @CustomerID IS NULL)

    AND (ord.CustomerOrderID = @CustomerOrderID OR @CustomerOrderID IS NULL)

    AND (dtl.ProductID = @ProductID OR @ProductID IS NULL)

    AND prd.IsActive = 1

    AND EXISTS

    (

    SELECT *

    FROM dbo.ProductPriceHistory hist

    WHERE prd.ProductID = hist.ProductID

    GROUP BY hist.ProductID

    HAVING COUNT(*) > 3

    )

    ORDER BY

    cus.CustomerID,

    CASE WHEN

    (

    cus.CustomerID = @CustomerID

    AND ord.CustomerOrderID = @CustomerOrderID

    )

    THEN 0

    ELSE 1

    END,

    ord.CustomerOrderID DESC,

    cus.LastName ASC;

    Listing 8-6

    Optimized Query for Order Information for All Customers

    ```


    This T-SQL statement has all the code required to generate the same output as
    the one from Listing [8-5](#480547_2_En_8_Chapter.xhtml#PC5). Depending on the
    indexes that exist on your tables and the join criteria, sometimes you will see
    better performance when selecting all your data in one query. Other times you
    may optimize your queries by getting subsets of data and combining them into one
    query. A portion of the execution plan for Listing [8-6](#480547_2_En_8_Chapter.xhtml#PC6)
    can be seen in Figure [8-4](#480547_2_En_8_Chapter.xhtml#Fig4).


    ![](images/480547_2_En_8_Chapter/480547_2_En_8_Fig4_HTML.jpg)


    A flow diagram presents a partial execution plan. It depicts 2 clustered index
    scan, clustered index seek, and index scan. Clustered index scan has cost 49%,
    0.044 seconds, 1605638 of 1605640\. Index scan has cost 7%, 0.016 seconds, and
    401409 of 13246.


    Figure 8-4


    Partial execution plan for Listing [8-6](#480547_2_En_8_Chapter.xhtml#PC6)


    As shown in Figure [8-4](#480547_2_En_8_Chapter.xhtml#Fig4), the step taking up
    the largest percentage of the execution plan has changed. Based on the actual
    execution plan, the largest percentage is spent performing a clustered index seek
    on the primary key of the `Customer` table. As this is a seek relating to the
    primary key of the table, it seems unlikely that there is a better alternative
    for performance tuning this query.


    ## Optimizing Indexes


    There are other factors that can contribute to slowness of running queries. In
    many scenarios, the best way to optimize these queries involves using indexes.
    You want to check execution plans for key lookups. These key lookups indicate
    that SQL Server is having to go from the non-clustered index to the clustered
    index to find additional fields that are needed as part of the query. In some
    cases, you may be able to change the values returned or the join conditions of
    your query to resolve the key lookups. Otherwise, you will need to see if the
    indexes can be changed in order to improve performance.


    Creating and maintaining indexes is a topic that could take up a book by itself,
    but there are some things you can do when working with indexes. If you are at
    a point where you think you may need to consider adding indexes, you first want
    to be aware of what indexes currently exist on the tables in question. While it
    is outside the scope of this book, you want to determine if there are indexes
    that are no longer in use and can be dropped. Of the indexes that are remaining,
    you want to evaluate these carefully. One of these indexes may be able to be modified
    to allow it to continue to be effective for other T-SQL code but also to optimize
    the current query. You can create or modify an index so that additional columns
    are stored with the index. However, the index is not sorted by these columns.
    These columns can be referred to as a covering column. If a column is needed for
    a join or a WHERE clause, I would consider adding it to the index. Before deciding
    to add the column to the index, make sure you are familiar with how SQL Server
    uses indexes to search for data. The approach with some indexes involves adding
    a column as an included column on the index. This will allow SQL Server to return
    the column results without a key lookup, but it will not affect how SQL Server
    uses the index to retrieve data records.


    Optimizing the duration of your T-SQL code can yield many benefits. One is improved
    performance of your applications. In some cases, you may be able to improve the
    duration of your queries by rewriting the code in a way that is more efficient.
    In other situations, you may want to consider if there are ways the code can be
    written differently to make better use of the existing indexes. Another option
    is to modify existing indexes or create new ones. If you choose to modify indexes,
    use caution as sometimes indexes can exist that cause more harm than they help.
    Regularly review the duration of your T-SQL code to see if you can find any queries
    that need performance tuning.'
