    into an existing database. If you find yourself needing to populate data in a
    table, but you don’t want the data to be accessed, then you may be able to try
    using row-level security. For an additional information on row-level security,
    you can refer to Chapter [21](https://doi.org/10.1007/978-1-4842-9256-3_21).


    You may find yourself in a situation where you would like to log behavior on a
    table. While it may be ideal to have the application log the information directly,
    this may not be possible. In this case, you may want a trigger to record this
    information. As an example, you can log when a product is added, changed, or deleted
    using triggers. You may want to record when a new product is added as well as
    the login that added the product. Listing [15-8](#480547_2_En_15_Chapter.xhtml#PC8)
    shows a table to log the behavior on the `dbo.Product` table.


    ```

    CREATE TABLE dbo.ProductLog(

    ProductLogID     INT                        IDENTITY(1,1)   NOT NULL,

    ProductID        INT                                        NOT NULL,

    ProductName      VARCHAR(25)                                NOT NULL,

    ProductPrice     DECIMAL(6,2)                               NOT NULL,

    IsActive         BIT

    CONSTRAINT DF_ProductLog_IsActive     DEFAULT (1)     NOT NULL,

    DateCreated      DATETIME2(2)

    CONSTRAINT DF_ProductLog_DateCreated  DEFAULT (SYSDATETIME()) NOT NULL,

    DateModified     DATETIME2(2)

    CONSTRAINT DF_ProductLog_DateModified DEFAULT (SYSDATETIME()) NOT NULL,

    DateDisabled     DATETIME2(2)                                   NULL,

    CONSTRAINT PK_ProductLog PRIMARY KEY CLUSTERED (PK_ProductLogID ASC)

    );

    Listing 15-8

    Creating the ProductLog Table

    ```


    Now that you have created the table, you can get add a trigger to the table so
    that when a record is inserted or updated in the `dbo.Product` table, a record
    of the new data will be saved in the `dbo.ProductHistory`. Since there will already
    be a trigger on the table, you can also add logic to update the `DateModified`
    in the `dbo.Product` table. Listing [15-9](#480547_2_En_15_Chapter.xhtml#PC9)
    shows how to create a trigger that logs product changes if a product is inserted
    or updated.


    ```

    CREATE TRIGGER dbo.LogProductHistory

    ON dbo.Product

    AFTER INSERT, UPDATE

    AS

    INSERT INTO dbo.ProductHistory

    (

    ProductID,

    ProductPrice,

    ProductName

    )

    SELECT

    ProductID,

    ProductPrice,

    ProductName

    FROM inserted;

    UPDATE prd

    SET DateModified = SYSDATETIME()

    FROM dbo.Product prd

    INNER JOIN deleted del

    ON prd.ProductID = del.ProductID;

    Listing 15-9

    Creating the ProductLog Table

    ```


    In addition to inserting a record into the `dbo.ProductHistory` table after a
    record has been added or changed, this trigger also updates the `DateModified`
    on the `dbo.Product` table so that there is a record of the when the record was
    most recently changed.


    Like writing any other code, you should test this and confirm the trigger is working
    as expected. To test this trigger, execute the T-SQL from Listing [15-10](#480547_2_En_15_Chapter.xhtml#PC10).


    ```

    UPDATE dbo.Product

    SET IsActive = 1

    WHERE ProductID = 5;

    INSERT INTO dbo.Product (ProductName, ProductPrice)

    VALUES (''Kayak'',1299.00);

    Listing 15-10

    Testing the Insert and Updating the Trigger

    ```


    In Listing [15-10](#480547_2_En_15_Chapter.xhtml#PC10), you update `ProductID`
    of 5 to be active. You also run a separate query to insert a new product kayak
    into the table `dbo.Product`. Since the trigger `dbo.LogProductHistory` has been
    added to the `dbo.Product` table, you expect to find two new entries in the `dbo.ProductHistory`
    table.


    The first query should not only add a record to the `dbo.ProductHistory` table
    but should also update the `DateModified` in the `dbo.Product` table. The second
    query should add a record to the `dbo.ProductHistory` table because a new product
    has been created. Refer to Listing [15-11](#480547_2_En_15_Chapter.xhtml#PC11).


    ```

    SELECT ProductLogID,

    ProductID,

    ProductName,

    ProductPrice,

    DateCreated

    FROM dbo.ProductHistory;

    SELECT ProductID,

    ProductName,

    DateCreated,

    DateModified,

    DateDisbled

    FROM dbo.Product

    WHERE ProductID = 5;

    Listing 15-11

    Checking Results from the Trigger

    ```


    After running these queries, you can check the results. As stated, you should
    find two new records in the `dbo.ProductHistory` table. In addition, the `DateModified`
    should be updated in `dbo.Product` for `ProductID` 5\. Table [15-2](#480547_2_En_15_Chapter.xhtml#Tab2)
    shows the results from the first query.


    Table 15-2


    Product History Results


    | Product Log ID | Product ID | Product Name | Product Price | Date Created |

    | --- | --- | --- | --- | --- |

    | 1 | 5 | Disk Golf Disk - Large | 12.99 | 202304-12 11:58 AM |

    | 2 | 7 | Kayak | 1299.00 | 2023-04-12 11:58 AM |


    Once you have confirmed that the logging portion of the trigger is working as
    expected, you can check to confirm that `DateModified` has been updated in `dbo.Product`.
    The results from the second query above are shown in Table [15-3](#480547_2_En_15_Chapter.xhtml#Tab3).


    Table 15-3


    Product Table Update


    | Product ID | Product Name | Date Created | Date Modified | Date Disabled |

    | --- | --- | --- | --- | --- |

    | 5 | Disk Golf Disk - Large | 2023-02-12 8:27 AM | 2023-04-12 11:58 AM | NULL
    |


    This allows you to confirm that the `DateModified` in the `dbo.Product` table
    has been updated as expected.


    Using application rules, feature flags, row-level security, or triggers can be
    useful when trying to implement new functionality for your database. This can
    include changing how stored procedures or other database code functions, limiting
    access to information for certain users, or adding logging to your data tables.
    However, there are also times where you may want to remove existing functionality
    from your database. Continue to the next section for more ideas on how you can
    use T-SQL to manage application enhancements.'
  trans: '### 特性标志


    使用特性标志时，你可以向存储过程添加一个输入参数，以此控制 T-SQL 代码的行为。代码清单 15-7 展示了如何更新代码清单 15-3 中的存储过程 `dbo.Customer`
    以使用特性标志。


    ```sql

    /*-------------------------------------------------------------*\

    Name:             dbo.GetCustomer

    Author:           Elizabeth Noble

    Created Date:     2022-10-30

    Description:      Get a list of all customers in the databases

    Updated Date      2023-04-12

    Description:      Updated to use IsActive feature flag

    Sample Usage:

    EXECUTE dbo.GetCustomer

    \*-------------------------------------------------------------*/

    CREATE OR ALTER PROCEDURE dbo.GetCustomer

    @OnlyActive BIT = 0 –- Defaults to show all customers

    AS

    SELECT

    CustomerID,

    FirstName,

    LastName,

    Address,

    City,

    PostalCode,

    Country,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Customer

    -- Stored procedure will always show Active customers

    WHERE IsActive = 1

    -- This will use 1 if ApplicationRule 1 is enabled

    ---- This will return only active customers

    -- This will use 0 if ApplicationRule 1 is disabled

    ---- This will return inactive customers

    AND IsActive = @OnlyActive;

    ```

    代码清单 15-7

    使用特性标志的存储过程


    在上面的存储过程中，`@OnlyActive` 值被传递给存储过程。使用参数来切换存储过程功能的一个好处是，你可以为该参数设置默认值，以维持现有功能。


    还可能有一些情况是，你希望向数据库添加数据，但在未来的某个日期之前不希望应用程序能够使用这些数据。当你正在将一个新的业务或应用程序迁移或集成到现有数据库时，就可能发生这种情况。如果你发现自己需要填充表中的数据，但又不希望这些数据被访问，那么可以尝试使用行级安全性。关于行级安全性的更多信息，可以参考第
    21 章。


    你可能会遇到想要记录表上的操作行为的情况。虽然让应用程序直接记录信息是最理想的，但这可能无法实现。在这种情况下，你可能希望用一个触发器来记录这些信息。例如，你可以使用触发器来记录产品何时被添加、修改或删除。你可能想要记录新产品的添加时间以及添加产品的登录用户。代码清单
    15-8 展示了一个用于记录 `dbo.Product` 表上行为的日志表。


    ```sql

    CREATE TABLE dbo.ProductLog(

    ProductLogID     INT                        IDENTITY(1,1)   NOT NULL,

    ProductID        INT                                        NOT NULL,

    ProductName      VARCHAR(25)                                NOT NULL,

    ProductPrice     DECIMAL(6,2)                               NOT NULL,

    IsActive         BIT

    CONSTRAINT DF_ProductLog_IsActive     DEFAULT (1)     NOT NULL,

    DateCreated      DATETIME2(2)

    CONSTRAINT DF_ProductLog_DateCreated  DEFAULT (SYSDATETIME()) NOT NULL,

    DateModified     DATETIME2(2)

    CONSTRAINT DF_ProductLog_DateModified DEFAULT (SYSDATETIME()) NOT NULL,

    DateDisabled     DATETIME2(2)                                   NULL,

    CONSTRAINT PK_ProductLog PRIMARY KEY CLUSTERED (PK_ProductLogID ASC)

    );

    ```

    代码清单 15-8

    创建 ProductLog 表


    现在你已经创建了表，可以给 `dbo.Product` 表添加一个触发器，这样当在该表中插入或更新记录时，新数据的记录将被保存到 `dbo.ProductHistory`
    表中。由于表上已经会有触发器，你还可以添加逻辑来更新 `dbo.Product` 表中的 `DateModified` 字段。代码清单 15-9 展示了如何创建一个在产品被插入或更新时记录产品更改的触发器。


    ```sql

    CREATE TRIGGER dbo.LogProductHistory

    ON dbo.Product

    AFTER INSERT, UPDATE

    AS

    INSERT INTO dbo.ProductHistory

    (

    ProductID,

    ProductPrice,

    ProductName

    )

    SELECT

    ProductID,

    ProductPrice,

    ProductName

    FROM inserted;

    UPDATE prd

    SET DateModified = SYSDATETIME()

    FROM dbo.Product prd

    INNER JOIN deleted del

    ON prd.ProductID = del.ProductID;

    ```

    代码清单 15-9

    创建触发器以记录产品历史


    除了在记录被添加或更改后向 `dbo.ProductHistory` 表插入一条记录外，此触发器还会更新 `dbo.Product` 表上的 `DateModified`
    字段，以便记录该记录最近一次被更改的时间。


    像编写任何其他代码一样，你应该对此进行测试并确认触发器是否按预期工作。要测试此触发器，请执行代码清单 15-10 中的 T-SQL。


    ```sql

    UPDATE dbo.Product

    SET IsActive = 1

    WHERE ProductID = 5;

    INSERT INTO dbo.Product (ProductName, ProductPrice)

    VALUES (''Kayak'',1299.00);

    ```

    代码清单 15-10

    测试触发器的插入和更新功能


    在代码清单 15-10 中，你将 `ProductID` 为 5 的产品更新为激活状态。你还运行了一个单独的查询，将一个新产品“Kayak”插入到 `dbo.Product`
    表中。由于触发器 `dbo.LogProductHistory` 已被添加到 `dbo.Product` 表，你预期会在 `dbo.ProductHistory`
    表中找到两条新记录。


    第一个查询不仅应该向 `dbo.ProductHistory` 表添加一条记录，还应该更新 `dbo.Product` 表中的 `DateModified`
    字段。第二个查询应该向 `dbo.ProductHistory` 表添加一条记录，因为创建了一个新产品。请参考代码清单 15-11。


    ```sql

    SELECT ProductLogID,

    ProductID,

    ProductName,

    ProductPrice,

    DateCreated

    FROM dbo.ProductHistory;

    SELECT ProductID,

    ProductName,

    DateCreated,

    DateModified,

    DateDisbled

    FROM dbo.Product

    WHERE ProductID = 5;

    ```

    代码清单 15-11

    检查触发器的运行结果


    运行这些查询后，你可以检查结果。如前所述，你应该在 `dbo.ProductHistory` 表中找到两条新记录。此外，`dbo.Product` 表中 `ProductID`
    为 5 的记录的 `DateModified` 字段应该已被更新。表 15-2 显示了第一个查询的结果。


    表 15-2

    产品历史结果


    | 产品日志 ID | 产品 ID | 产品名称 | 产品价格 | 创建日期 |

    | --- | --- | --- | --- | --- |

    | 1 | 5 | 飞盘高尔夫盘 - 大号 | 12.99 | 202304-12 11:58 AM |

    | 2 | 7 | 皮划艇 | 1299.00 | 2023-04-12 11:58 AM |


    一旦你确认了触发器的日志记录部分按预期工作，就可以检查 `dbo.Product` 表中的 `DateModified` 字段是否已更新。上面第二个查询的结果如表
    15-3 所示。


    表 15-3

    产品表更新情况


    | 产品 ID | 产品名称 | 创建日期 | 修改日期 | 禁用日期 |

    | --- | --- | --- | --- | --- |

    | 5 | 飞盘高尔夫盘 - 大号 | 2023-02-12 8:27 AM | 2023-04-12 11:58 AM | NULL |


    这可以让你确认 `dbo.Product` 表中的 `DateModified` 字段已按预期更新。


    使用应用程序规则、特性标志、行级安全性或触发器，在尝试为数据库实现新功能时可能很有用。这可以包括更改存储过程或其他数据库代码的运行方式、限制特定用户对信息的访问，或为数据表添加日志记录。然而，有时你可能希望从数据库中移除现有功能。请继续阅读下一节，了解更多关于如何使用
    T-SQL 来管理应用程序增强功能的想法。'
- fmt: '## Phasing Out Old Technology


    You can also find yourself in situations where you want to refactor or rework
    existing tables or database code. Like adding new functionality, this section
    will cover some techniques that can be used to allow you to change the database
    schema in ways that will not affect the current functionality of applications.
    When trying to improve database normalization, you may be able to temporarily
    use views to allow applications to behave like they are still using the previous
    table schemas. If you need to create more dynamic functionality with stored procedures,
    you can use input parameters to allow the application to use previous functionality.
    This can be accomplished using either application rules or feature flags. When
    you are ready to migrate away from current tables for your application, you may
    not be ready to discontinue the use of those tables for other purposes. You can
    use triggers to ensure that the data is saved to the legacy data tables as well.


    The main challenge with phasing out old technology is ensuring your applications
    continue to work as expected until the applications can be updated to use the
    new T-SQL code. However, many of the same techniques referenced in the section
    “Add New Functionality” can be used to phase out existing functionality.


    # 16. Managing Data Growth


    When a database is first created, for a given amount of time, the tables in the
    database will remain small. Depending on the nature of the data stored in the
    table or the amount of time that has passed, you may find yourself in a situation
    where one or more of your tables have experienced a significant amount of growth
    since the table was first created. There can be many motivations for managing
    the relative age of the data stored in a table or how data is stored overall.
    This chapter will focus on organizing your data in a way that can be managed long
    term. While many companies also have the goal of improving performance when it
    comes to managing data, that will not be the focus of this chapter.


    SQL Server provides the functionality to separate or sort your data into various
    groups or categories. When it comes to managing data growth, this data is normally
    sorted by date. You are not limited to organizing your data by a given date, but
    for the purposes of this chapter, which will be our focus. You first want to figure
    out how to organize your data, not only how the data will be grouped but also
    how the data will be stored. Setting up the functionality for sorting and storing
    your data allows you to start moving your data into those various groups that
    you have created. There are options for grouping data, and you can use different
    ways to store your data. This allows you to design a solution that can support
    a highly transactional throughput for recent data and allow older data to be designed
    in a way to support reporting.


    ## Partitioning


    When reviewing one of your database tables, you may find that this table has grown
    to a size that makes it difficult to manage. A big table is hard to manage. Your
    indexes are big. Too big to defrag. Your stats don’t get enough steps to build
    solid plans. Deleting the older rows from that table can create locks that include
    brand new rows. Yikes!


    The process of organizing this data by some value is partitioning. Partitioning
    allows us to make that one big table into many smaller tables, each of which is
    easier to manage. These smaller tables can even be stored on different disks so
    you don’t waste prime SSD space on year-year-old rows that no one ever reads but
    Legal won’t let you delete. The remainder of this section will go through the
    steps you need to do in order to partition your tables.


    First, you want to identify tables that should be partitioned before they grow
    to that size. However, you can still partition a table after it has grown extremely
    large. In either scenario, you have identified a table where you would like to
    better manage archiving data or maintaining indexes. Conceptually you want to
    think about how you access this data. Ideally, a clustered index includes values
    that don’t change often so that the table doesn’t get rearranged frequently. In
    addition, when implementing partitioning, you want to choose a column that will
    always be used when accessing this data.


    ### Partition Foundation


    In order to implement partitioning through a partitioned table, you need to create
    several other database objects to partition the table. The first step in partitioning
    is figuring out how you want to consistently access your data. You will be working
    with the `dbo.CustomerOrderHistory` table. For the purposes of this chapter, this
    table represents information about when `CustomerOrders` have been used over the
    past two years. You may decide for legal, user experience, or other reasons that
    you want to start the process of archiving some of this historical information.
    Since this is a historical table, you will be choosing to partition (that is,
    organize or sort) this data based upon the `DateCreated`. Choosing how this data
    will be partitioned leads to the next decision that must be made.


    Once you have decided how the data will be sorted, you also need to decide specifically
    what data will be sorted together in groups. Groups of data that are sorted together
    are called ranges. One thing to consider when choosing ranges to be partitioned
    is to think about how frequently data will be accessed within each range. For
    most applications, this mean that recent data is accessed frequently and data
    that is much older is accessed less frequently. If you have five years of CustomerOrder
    history data, there may be a business reason why you have data for this long of
    a period, but for day-to-day operations you may normally only access information
    on a daily, weekly, monthly, or annual basis.


    Knowing how the data is accessed in general allows you to determine the ranges
    you need to partition the data. Once you figure out the ranges, you need to decide
    how to store your data. Within any installation of SQL Server, there is a single
    primary data file per database. This file contains the objects and data stored
    within the database, and the file extension is `.mdf`. This data file exists within
    a primary filegroup. It is also possible to add other files and filegroups to
    your database. Files can be added to the primary filegroup or another filegroup,
    and each filegroup can exist on a different drive. Using filegroups can benefit
    you by allowing you to choose how you store your data.


    You can keep more frequently used data in filegroups on faster storage. You can
    also keep less frequently used data in filegroups on slower storage. This can
    allow you to change how your data is stored in a way that allows you to save money.
    The filegroups operate like a logical structure as to how the data will be sorted.
    When you use a database that does not have any additional filegroups, you will
    have a single filegroup named primary. The T-SQL code to create these filegroups
    is shown in Listing 16-1.


    ```sql

    ALTER DATABASE OutdoorRecreation

    ADD FILEGROUP CustomerOrderHistory2021;

    ALTER DATABASE OutdoorRecreation

    ADD FILEGROUP CustomerOrderHistory2022Q1;

    ALTER DATABASE OutdoorRecreation

    ADD FILEGROUP CustomerOrderHistory2022Q2;

    ALTER DATABASE OutdoorRecreation

    ADD FILEGROUP CustomerOrderHistory2022Q3;

    Listing 16-1

    Creating Filegroups

    ```


    In this example, there are four different filegroups. The first filegroup will
    hold the CustomerOrder history prior to 2022. The next two filegroups are each
    for the first two quarters of the calendar year in 2022. The third filegroup is
    designed for the third quarter of 2022. Once you create the filegroups, you need
    to create any files that will be used by the filegroups. For the example in this
    chapter, you will be creating one file per filegroup. You can create these files
    using T-SQL in Listing 16-2.'
