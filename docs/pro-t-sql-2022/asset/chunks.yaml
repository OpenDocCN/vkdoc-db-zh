- fmt: '# 5. Set-Based Design


    了解如何设计 T-SQL 是编写专业代码的基础。一旦你能编写出易于理解的 T-SQL 代码，就可以专注于优化 T-SQL 代码的性能。如果你是在工作中非正式地学习了
    T-SQL，或者你的主要职责是为软件应用程序编写代码，那么在编写 T-SQL 代码时可能不会下意识地考虑基于集合的设计。或者你可能是一位经验丰富的数据库开发人员，想了解更多关于基于集合设计的知识。


    在本章中，我将讨论如何处理数据。第一步是熟悉与数据交互的各种方式。一旦理解了与数据交互的不同方式，就可以开始思考如何以最佳格式为查询准备数据。然后，你应该能够以利用
    SQL Server 天然优势的方式来编写这些查询。


    ## Introducing Set-Based Design


    基于集合设计的概念是确保处理过程尽可能靠近数据进行。这样做可以最大限度地减少网络往返次数。它还可以最大限度地减少数据库引擎内的上下文切换。


    逐行处理速度很慢，因为部分逻辑位于数据库引擎外部的某个程序中。或者在 T-SQL 游标循环的情况下，逻辑位于过程代码中，这需要为每一行进行上下文切换，并且每一行都需要从访问实际数据的数据库引擎部分传递到运行
    T-SQL 的部分。


    基于集合的处理将所有内容尽可能深入地推入数据库引擎。每一行都不会单独返回给调用程序，也不会为每一行发生上下文切换。数据库引擎全速运行，进行你指定的任何更改。


    数据几乎在我们生活的方方面面都会产生，其中大部分数据出于各种目的被存储。为了提高数据检索速度，考虑数据的存储和访问方式通常很重要。使用 SQL Server
    可以让你利用数据之间的关系。这是因为 SQL Server 是一个关系数据库管理系统。虽然本书的重点是编写 T-SQL，但理解数据的存储方式也将帮助你编写返回值速度更快的查询。


    本书使用一个名为 `OutdoorRecreation` 的示例数据库，代表一家专门销售环保、合乎道德来源的户外装备的公司。为了了解数据可以存储的各种方式，让我们首先看看可能有用的信息类型：


    *   客户名称

    *   客户地址

    *   产品

    *   产品成本

    *   产品价格

    *   订单日期

    *   订单状态

    *   当前产品价格

    *   销售数量


    查看上面的列，你可以开始将数据分组到类似的类别中。例如，你可以按如表 [5-1](#480547_2_En_5_Chapter.xhtml#Tab1) 所示对客户信息进行分组。


    Table 5-1


    OutdoorRecreation 的一般信息


    | 客户 | 产品 | 订单 |

    | --- | --- | --- |

    | 客户名称 | 产品 | 订单日期 |

    | 客户地址 | 产品价格 | 订单状态 |

    |   | 产品成本 | 当前产品价格 |

    |   |   | 销售数量 |


    一旦信息被分组，数据就可以按组存储。在数据库中，这些组被称为 `表`。如果你开始填充客户数据，数据可以存储在如表 [5-2](#480547_2_En_5_Chapter.xhtml#Tab2)
    的表中。


    Table 5-2


    客户信息


    | 名字 | 姓氏 | 地址 | 城市 | 邮政编码 | 国家 |

    | --- | --- | --- | --- | --- | --- |

    | Myra | Acharya | 30 Magrath Road | Bengaluru | 560025 | India |

    | Josè | Gomez | 790 Calle Cinco de Mayo | Cancun | 53778 | Mexico |

    | Stacy | Parks | 123 Rua de Santa Catarina | Porto | 1234-567 | Portugal |

    | Karim | Khalil | 153 Road Mit Rahina Al Shabab | Memphis | 3364932 | Egypt |

    | Marty` | Bethel | 750 Cherry Rd | Memphis | 38117 | United States |


    表中整理的数据是一个 `数据集`。查看第四列 `City` 中的数据，有两条记录的城市是 Memphis。在 `Address` 列中也有两行包含“de”。你可以为
    Memphis 市的所有客户创建一组数据。或者，你可以为地址包含“de”的所有客户创建另一组不同的数据。你将在本章后面使用这两组数据。


    使用 SQL Server 时可能感到困难的事情之一是基于集合的事务的使用。当你对一组数据中的所有行应用单一操作（例如 SQL 语句）时，就是在使用基于集合的事务。在
    SQL Server 中，行组必须额外满足表之间任何连接的条件以及 `WHERE` 子句中的条件。例如，如果你使用单个查询将所有以 `Rd` 结尾的地址修改为以
    `Road` 结尾，那么你就是在使用基于集合的事务。基于集合的操作从块或段的角度来看待数据，而不是逐行查看记录或数据行。虽然使用基于集合的事务本身并不困难，但使用基于集合的事务可以提高许多查询的速度，这并不总是显而易见的。此外，SQL
    Server 将为任何具有正确语法的查询返回结果。因此，一次与一个记录交互似乎比作为集合交互更容易。


    这可能会引发一系列非常自然的问题，询问基于集合操作的目的和好处。为了更好地解释基于集合的操作，让我们通过一个例子来说明，如果你单独访问数据或作为集合访问数据，查询的输出会是什么。为了向你展示一个比较，表
    [5-3](#480547_2_En_5_Chapter.xhtml#Tab3)、表 [5-4](#480547_2_En_5_Chapter.xhtml#Tab4)
    和表 [5-5](#480547_2_En_5_Chapter.xhtml#Tab5) 各自显示了一条单独的数据记录。


    Table 5-5


    第三个客户作为单条记录


    | 名字 | 姓氏 |

    | --- | --- |

    | Stacy | Parks |


    Table 5-4


    第二个客户作为单条记录


    | 名字 | 姓氏 |

    | --- | --- |

    | Josè | Gomez |


    Table 5-3


    第一个客户作为单条记录


    | 名字 | 姓氏 |

    | --- | --- |

    | Myra | Acharya |


    如果你以这种方式从表 [5-3](#480547_2_En_5_Chapter.xhtml#Tab3)、表 [5-4](#480547_2_En_5_Chapter.xhtml#Tab4)
    和表 [5-5](#480547_2_En_5_Chapter.xhtml#Tab5) 中选择数据，效率远低于将数据作为集合选择。可以将表 [5-3](#480547_2_En_5_Chapter.xhtml#Tab3)
    到表 [5-5](#480547_2_En_5_Chapter.xhtml#Tab5) 视为代表三个不同的 `SELECT` 操作或三次不同的数据库往返。表
    [5-6](#480547_2_En_5_Chapter.xhtml#Tab6) 显示了将数据作为集合选择的样子，通过单次往返在单个操作中检索所有三行。


    Table 5-6


    客户作为一个数据集


    | 名字 | 姓氏 |

    | --- | --- |

    | Myra | Acharya |

    | Josè | Gomez |

    | Stacy | Parks |


    像这样查看数据还可以让你看到数据之间的相似之处。


    当你编写 T-SQL 代码时，你希望用更少的、针对 SQL Server 运行的单独查询来返回所需的数据。目标是考虑同时对所有行执行相同的操作。在前面的例子中，你可以快速确定哪些记录具有相同的城市名称。数据提示，如果你想查看或更改有关同一城市客户的信息，可能有不止一种方法可以实现此目标。这种类型的场景可能表明你的逻辑应该以某种方式构建，使其能够通过使用关系或变量而不是硬编码或静态值来正确运行。'
  raw: '# 5. Set-Based Design


    Knowing how to design T-SQL is part of the foundation of writing professional
    code. Once you can write T-SQL code that can be easily understood, you can focus
    on improving the performance of your T-SQL code. If you learned T-SQL informally
    as part of your job or your primary function is writing code for software applications,
    you may not consciously consider set-based design when writing your T-SQL code.
    Or you may be an experienced database developer and want to learn more about set-based
    design.


    In this chapter, I will discuss how to work with your data. The first step is
    to get familiar with the various ways to interact with your data. Once you understand
    the different ways you can interact with your data, you can start thinking about
    how to put the data in the best format for your queries. Then you should be able
    to write those queries in a way that takes advantages of SQL Server’s natural
    strengths.


    ## Introducing Set-Based Design


    The concept of set-based design is making sure the processing takes place as close
    to the data as possible. Doing so minimizes network round trips. It can also minimize
    context switches within the database engine.


    Row-by-row processing is slow because part of the logic is in some program that
    is external to the database engine. Or in the case of a T-SQL cursor loop, the
    logic is in procedural code that requires a context switch for each row, and for
    each row to be passed back from whatever part of the database engine accesses
    the actual data to whatever part of the database engine runs the T-SQL.


    Set-based processing pushes everything as deeply into the database engine as possible.
    Each row is not individually returned to a calling program, nor is there a context
    switch occurring for each row. The database engine spins through at full speed
    making whatever changes you have specified be made.


    Data is created in almost every aspect of our lives, and much of that data is
    stored for various purposes. To increase the speed of data retrieval, it is often
    important to consider how data will be stored and accessed. Using SQL Server will
    allow you to take advantage of the relationships between data. This is because
    SQL Server is a relational database management system (RDBMS). While the focus
    of this book is writing T-SQL, understanding how data is stored will also help
    you write queries that return values with increased speed.


    This book uses a sample database called `OutdoorRecreation` for a company that
    specializes in selling environmentally conscious, ethically sourced gear for the
    outdoors. To get an idea of various ways data can be stored, let’s first look
    at various types of information that may be useful:


    *   Customer Name


    *   Customer Address


    *   Product


    *   Product Cost


    *   Product Price


    *   Order Date


    *   Order Status


    *   Current Product Price


    *   Quantity Sold


    Looking at the above columns, you can start grouping the data into similar categories.
    For instance, you can group information about customers as shown in Table [5-1](#480547_2_En_5_Chapter.xhtml#Tab1).


    Table 5-1


    General Information for OutdoorRecreation


    | Customer | Product | Order |

    | --- | --- | --- |

    | Customer Name | Product | Order Date |

    | Customer Address | Product Price | Order Status |

    |   | Product Cost | Current Product Price |

    |   |   | Quantity Sold |


    Once that information is grouped, the data can be stored by the groups. Within
    a database, the groups are referred to as *tables*. If you start populating data
    for customers, the data can be stored in a table like Table [5-2](#480547_2_En_5_Chapter.xhtml#Tab2).


    Table 5-2


    Customer Information


    | First Name | Last Name | Address | City | Postal Code | Country |

    | --- | --- | --- | --- | --- | --- |

    | Myra | Acharya | 30 Magrath Road | Bengaluru | 560025 | India |

    | Josè | Gomez | 790 Calle Cinco de Mayo | Cancun | 53778 | Mexico |

    | Stacy | Parks | 123 Rua de Santa Catarina | Porto | 1234-567 | Portugal |

    | Karim | Khalil | 153 Road Mit Rahina Al Shabab | Memphis | 3364932 | Egypt |

    | Marty` | Bethel | 750 Cherry Rd | Memphis | 38117 | United States |


    The data organized in the table is a *data set*. Looking at the data in the fourth
    column, `City`, there are two records with the city of Memphis. There are also
    two rows contain “de” in the `Address` column. You can create a set of data for
    all customers in the city of Memphis. Alternatively, you can create a different
    set of data for all customers where the address contains “de”. You will use these
    two sets of data later in the chapter.


    One of the things that can be difficult when working with SQL Server is the use
    of set-based transactions. You are using set-based transactions when you apply
    a single operation, such as a SQL statement, to all rows in a group of data. In
    SQL Server, the group of rows must be the additional threshold of meeting the
    conditions of any joins between tables as well as criteria in the WHERE clause.
    As an example, if you modify all addresses that end in Rd to end in Road using
    a single query, you are using a set-based transaction. Set-based operations look
    at data in terms of chunks or segments instead of looking at records or data row
    by row. While using set-based transactions is not inherently difficult, it is
    not always apparent how much using set-based transactions can improve the speed
    of many queries. In addition, SQL Server will return results for any query that
    has the correct syntax. Therefore, it might seem easier to interact with data
    one record at a time instead as a set.


    This can lead to a very natural line of questions asking about the purpose and
    benefits for set-based operations. To better explain set-based operations, let’s
    go through an example of what the output of a query will be if you access the
    data individually or as a set. To show you a comparison, Table [5-3](#480547_2_En_5_Chapter.xhtml#Tab3),
    Table [5-4](#480547_2_En_5_Chapter.xhtml#Tab4), and Table [5-5](#480547_2_En_5_Chapter.xhtml#Tab5)
    each show an individual data record.


    Table 5-5


    Third Customer as Individual Record


    | First Name | Last Name |

    | --- | --- |

    | Stacy | Parks |


    Table 5-4


    Second Customer as Individual Record


    | First Name | Last Name |

    | --- | --- |

    | Josè | Gomez |


    Table 5-3


    First Customer as Individual Record


    | First Name | Last Name |

    | --- | --- |

    | Myra | Acharya |


    If you select the data from Table [5-3](#480547_2_En_5_Chapter.xhtml#Tab3), Table
    [5-4](#480547_2_En_5_Chapter.xhtml#Tab4), and Table [5-5](#480547_2_En_5_Chapter.xhtml#Tab5)
    in this manner, it is far less efficient than trying to select the data as a set.
    Think of Tables [5-3](#480547_2_En_5_Chapter.xhtml#Tab3) through [5-5](#480547_2_En_5_Chapter.xhtml#Tab5)
    as representing three distinct select operations or three different round trips
    to the database. Table [5-6](#480547_2_En_5_Chapter.xhtml#Tab6) shows what it
    looks like to select the data as a set, making a single round trip to retrieve
    all three rows in a single operation.


    Table 5-6


    Customers as One Data Set


    | First Name | Last Name |

    | --- | --- |

    | Myra | Acharya |

    | Josè | Gomez |

    | Stacy | Parks |


    Viewing the data like this allows you to also see the similarities between the
    data.


    When you write T-SQL code, you want to return the data you need with fewer individual
    queries run against SQL Server. The goal is to consider doing the same thing to
    all the rows at the same time. In the preceding example, you can quickly determine
    which records have the same city name. The data provides a hint that if you want
    to look at or change something about customers with the same city, there may be
    more than one way to accomplish this goal. This type of scenario may indicate
    your logic should be structured in a way that it can function correctly by using
    relationships or variables instead of hard-coded or static values.'
