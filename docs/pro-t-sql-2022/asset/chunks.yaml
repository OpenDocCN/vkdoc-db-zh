    Select the pre-existing `Menu` database to run the unit tests. You have the option
    to automatically deploy the database before running the unit tests. However, let’s
    only deploy the database if the unit tests passes.


    Once you have set the connection string and configured the additional settings,
    Visual Studio will add a new project to the existing solution. You can see in
    Figure [11-4](#480547_2_En_11_Chapter.xhtml#Fig4) how your database project will
    look along with the unit testing project.


    ![](images/480547_2_En_11_Chapter/480547_2_En_11_Fig4_HTML.jpg)


    A screenshot of the solution explorer window of the Pro T S Q L 2022 V S project.
    An option of the unit test get customer dot c s is highlighted. Ok and cancel
    buttons are at the bottom right.


    Figure 11-4


    Unit testing in source control


    In Figure [11-4](#480547_2_En_11_Chapter.xhtml#Fig4), none of the objects in the
    original ProTSQL2022-VS project have been altered. You can see all the objects
    created for the unit testing project are available to be checked into source control.
    After the unit testing project has been created, some additional windows will
    open in Visual Studio. One of these windows allows you to set test conditions.
    By default, a test condition is configured for Inconclusive. You can leave this
    test condition or remove it. Figure [11-5](#480547_2_En_11_Chapter.xhtml#Fig5)
    shows the drop-down of available test conditions.


    ![](images/480547_2_En_11_Chapter/480547_2_En_11_Fig5_HTML.jpg)


    A screenshot of the test condition window. The drop-down menu list data checksum,
    empty result set, execution time, expected schema, inconclusive, not empty result
    set, raw count, and scalar value.


    Figure 11-5


    Available unit test options


    Before you begin creating your unit test, let’s define the purpose of each of
    these conditions in Table [11-4](#480547_2_En_11_Chapter.xhtml#Tab4).


    Table 11-4


    Unit Test Conditions


    | Test Condition | Description |

    | --- | --- |

    | Data Checksum | Finds the CheckSum of the unit test. Test passes if the CheckSum
    matches the original unit test.This should only be used if the data returned in
    the result set will remain the same. |

    | Empty ResultSet | Checks to see if any data is returned. Test passes if no data
    is returned. |

    | Execution Time | Checks the overall execution time of the query. Test passes
    if the query completes in the specified amount of time. |

    | Expected Schema | Checks the schema of the object returned. Test passes if the
    columns and data types match the expected schema. |

    | Inconclusive | This is created by the system as a placeholder and should be
    removed once the first unit test is created. |

    | Not Empty ResultSet | Checks to see if any data is returned. Test passes if
    data is returned. |

    | Row Count | Checks the number of rows returned. Test passes if the row count
    returns matches the expected count. |

    | Scalar Value | Checks the value returned. Test passes if the value returned
    matches the expected value. |


    You want to create a unit test to verify that inactive customers are not being
    returned by the `dbo.GetCustomer` stored procedure. Similar to the manual unit
    test you wrote previously, you want to confirm that there are no inactive customers
    returned by the stored procedure `dbo.GetCustomer`. You can do this by selecting
    the condition of Empty ResultSet. You can see this test condition in Figure [11-6](#480547_2_En_11_Chapter.xhtml#Fig6).


    ![](images/480547_2_En_11_Chapter/480547_2_En_11_Fig6_HTML.jpg)


    A screenshot of the test condition window. It presents. Name, empty result set
    condition 1\. Type, empty result set. Value, result set 1 must have zero rows.
    enabled, true.


    Figure 11-6


    Unit test to check for Empty ResultSet


    Now that you’ve created a test condition, you need to write some T-SQL code for
    this unit test. Select Empty ResultSet as the test condition. For this unit test
    to pass when it is run, the T-SQL code inside the unit test must not return any
    results.


    After you change the stored procedure, you do not want any inactive customers
    to be returned. In this case, a passing test case is to have no inactive customers
    returned. This also matches the test conditions that were created in Figure [11-6](#480547_2_En_11_Chapter.xhtml#Fig6).
    Listing [11-4](#480547_2_En_11_Chapter.xhtml#PC4) shows the code for the unit
    test.


    ```

    -- database unit test for dbo.GetCustomer

    -- Create table variable to hold results

    DECLARE @CustomerList TABLE

    (

    CustomerID      INT,

    FirstName       VARCHAR(40),

    LastName        VARCHAR(100),

    [Address]       VARCHAR(100),

    City            VARCHAR(100),

    PostalCode      VARCHAR(20),

    Country         VARCHAR(75),

    IsActive        BIT,

    DateCreated     DATETIME2(2),

    DateModified    DATETIME2(2),

    DateDisabled    DATETIME2(2)

    );

    -- Insert results from dbo.GetCustomer into table variable

    INSERT INTO @CustomerList

    (

    CustomerID,

    FirstName,

    LastName,

    [Address],

    City,

    PostalCode,

    Country,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    )

    EXECUTE [dbo].[GetCustomer];

    -- Get count of customers that are inactive

    ---- The unit test will pass if there are no inactive customers

    ---- The unit test will fail if there are inactive customers

    SELECT CustomerID

    FROM @CustomerList

    WHERE IsActive = 0;

    Listing 11-4

    Code to Run the Unit Test

    ```


    You first create a table variable. The next section of the unit test inserts the
    results from the stored procedure `dbo.GetCustomer` into the table variable. The
    final step is to select only the inactive records from the table variable. Once
    you add the preceding code to `UnitTestGetCustomer.cs` and save the file, you
    are ready to run your first unit test. You can go to the Test menu to run the
    unit tests as shown in Figure [11-7](#480547_2_En_11_Chapter.xhtml#Fig7).


