  trans: '## 创建非聚集索引


    ```

    CREATE NONCLUSTERED INDEX IX_Customer_FirstName

    ON dbo.Customer (FirstName ASC);

    清单 7-7

    创建非聚集索引

    ```


    现在我已经创建了非聚集索引，我可以再次运行查询，看看是否会得到一个新的执行计划。新的执行计划如图 7-20 所示。


    ![](img/480547_2_En_7_Fig20_HTML.jpg)

    图 7-20: 带有非聚集索引的执行计划


    一张快照展示了执行计划。使用非聚集索引的索引查找，成本 12%，聚集索引的键查找，成本 88%。使用内连接的嵌套循环，成本 0%。选择操作成本 0%。


    在图 7-18 中，聚集索引扫描已被索引查找和键查找所取代。虽然这看起来似乎降低了执行计划的性能，但你可以通过查看读取的行数来验证这一点。在图 7-21 中，你可以看到与索引查找相关的属性。


    ![](img/480547_2_En_7_Fig21_HTML.jpg)

    图 7-21: 索引查找的属性


    一张图表展示了执行计划中聚集索引扫描操作符的详细信息。两个箭头指示读取的行数为 2，每次执行的行数为 8.33144。


    既然非聚集索引已经创建，你可以看到实际的读取行数已从 401,409 减少到 2。你可能会预期键查找也有相同的读取次数，但你可以查看其属性来确认。在图 7-22
    中，你可以看到返回的属性。


    ![](img/480547_2_En_7_Fig22_HTML.jpg)

    图 7-22: 键查找的属性


    一张图表展示了执行计划中聚集索引扫描操作符的详细信息。一个箭头指示读取的行数为 2。


    检查键查找，它也读取了 2 行。没有非聚集索引的 T-SQL 代码读取了 401,409 行。使用非聚集索引后读取的总行数是 4：索引查找 2 行，键查找
    2 行。


    你可以通过将 `DateCreated` 列作为非聚集索引的一部分包含进来，或者从原始查询中移除该列来消除键查找。清单 7-8 展示了一个包含列的非聚集索引示例。


    ## 带包含列的非聚集索引


    ```

    CREATE NONCLUSTERED INDEX IX_Customer_FirstName

    ON dbo.Customer (FirstName ASC) INCLUDE (DateCreated);

    清单 7-8

    带包含列的非聚集索引

    ```


    在添加清单 7-8 中的索引并运行清单 7-6 中的查询后，查看图 7-23 中的执行计划。


    ![](img/480547_2_En_7_Fig23_HTML.jpg)

    图 7-23: 带有包含列的非聚集索引的执行计划


    一张快照展示了执行计划。使用非聚集索引的索引查找，成本 100%。


    执行计划显示查询仍在使用非聚集索引。由于此索引已更改以包含 SELECT 语句中的额外列，执行计划也随之改变。之前使用非聚集索引时，执行计划包含索引查找和键查找。现在执行计划仅使用索引查找。


    一旦你熟悉了阅读执行计划，就可以开始利用它们来确定如何提升性能。当你查看执行计划时，可能会发现聚集索引扫描。这通常意味着 SQL Server 必须遍历整个表来查找符合查询条件的数据。正如本节所示，创建一个包含连接条件的非聚集索引可以帮助提升查询性能。如果你发现
    SQL Server 必须执行键查找，可以看看将被选择的列作为非聚集索引的一部分包含进来是否合理。理解 SQL Server 如何使用索引有助于改进查询性能。理解
    SQL Server 如何比较来自多个数据集的数据也能帮助你提升查询性能。'
- fmt: '## Logical Join Types in Execution Plans


    This last section of the chapter goes into detail about the several different
    logical join operators within SQL Server including `INNER JOIN`, `LEFT` or `RIGHT
    OUTER JOIN`, and `FULL OUTER JOIN`. The type of logical join operator, how the
    data is sorted, the size of the data being compared, and how the data is being
    compared can determine the physical operators that SQL Server can use in an execution
    plan. There are examples of T-SQL as well as physical operators so that you can
    see the correlation between logical and physical operators.


    In addition to reading execution plans and understanding indexes, your T-SQL code
    can also be used to determine how an execution plan will be generated. In some
    cases, how tables are joined together is just as important as how data is stored
    in the tables. There are times when how you are joining your columns together
    may also affect your execution plan. Some T-SQL in the `WHERE` clause can impact
    what types of logical joins are used in the query execution. If multiple queries
    are combined, it is also possible that it may change how the query is executed.
    Ultimately, there is a relationship between how the T-SQL code is written and
    how SQL Server decides to execute the query.


    ### Types of Logical Joins


    There are several different logical joins in SQL Server. Some of these logical
    joins are easily visible in T-SQL. They include the `INNER JOIN`, `LEFT OUTER
    JOIN`, `RIGHT OUTER JOIN`, and `FULL OUTER JOIN`. These are not the only logical
    joins that exist in SQL Server. With some T-SQL commands, SQL Server will compare
    one table to another looking for records that match or not. In these scenarios,
    SQL Server does not perform a full join but a `SEMI JOIN`. This type of join is
    not specified as a T-SQL command, but some T-SQL commands like `EXISTS` or `NOT
    EXISTS` will indicate a `SEMI JOIN`. Available `SEMI JOIN`s include the `LEFT
    SEMI JOIN`, `LEFT ANTI-SEMI JOIN`, `RIGHT SEMI JOIN`, and `RIGHT ANTI-SEMI JOIN`.
    Finally, there are some logical joins that are related by combining two or more
    query results in the same transaction. They include `CONCATENATION`, which is
    often associated with a `UNION ALL`, or the `UNION` logical join, which can happen
    with a `UNION` in T-SQL. Based on the logical join, SQL Server will determine
    what physical joins can be used. In this way, logical joins can be used to affect
    query performance.


    ### Physical Join Operators


    There are physical join operators that can be associated with logical joins. The
    four physical join operators are called `merge join`, `hash join`, `nested loop`,
    and `adaptive join`. When using an `INNER JOIN`, any of these four types of physical
    join operators can be used as part of the execution plan. How the data is stored
    in the table and the relative sizes of the tables may affect which physical operator
    is used.


    #### Merge Join


    If the data from both tables being compared is sorted, the records from the two
    tables can be compared side by side. This lets SQL Server quickly find the records
    that do or do not match, depending on the query requirements. When this happens,
    it is called a `merge join`. A `merge join` physical operator appears in the execution
    plan shown in Figure 7-24.


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig24_HTML.jpg)


    A snapshot presents the icon of the merge join in the execution plan. It is used
    to find the records that do or do not match.


    Figure 7-24 Merge join icon


    #### Hash Match


    There are times where the tables being joined together are not sorted. If that
    is the case, SQL Server can still compare the rows between each of the tables.
    However, SQL Server will need to convert the records to something that can be
    compared easily. This can be done by hashing. If SQL Server hashes the columns
    being compared in both tables and compares them, the physical operator will be
    a `hash match`. If you see the icon in Figure 7-25 in your execution plan, you
    know SQL Server is performing a `hash match` physical join.


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig25_HTML.jpg)


    A snapshot presents the icon of the Hash match in the execution plan. It is used
    to convert the records to something that can be compared easily.


    Figure 7-25 Hash match icon


    #### Nested Loop


    If there are two tables where one table is smaller than another, then SQL Server
    may decide to compare the values or one table one row at a time to all rows of
    the other table. When this happens, SQL Server will use a `nested loop` as shown
    in Figure 7-26.


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig26_HTML.jpg)


    A snapshot presents the icon of the Nested loop in the execution plan. It is used
    to compare the values or one table one row at a time to all rows of the other
    table.


    Figure 7-26 Nested loop icon


    #### Adaptive Join


    Starting in SQL Server 2017, a new physical join operator can be used when SQL
    Server determines an execution plan for a query. This new physical join operator
    is intended to help in situations when the data stored in a given table may vary
    significantly based on the criteria in the `WHERE` clause. This type of physical
    join allows SQL Server to determine if a `hash match` or `nested loop` should
    be used depending on the data selected for the query. This is referred to as an
    `adaptive join`. In SQL Server 2017, `adaptive join`s were only available with
    columnstore indexes. Starting in SQL Server 2019, `adaptive join`s can be used
    in other scenarios.


    ### LEFT OUTER JOIN and RIGHT OUTER JOIN


    Going through the logical joins that are available, the next ones are the `LEFT
    OUTER JOIN` and the `RIGHT OUTER JOIN`. In some ways, these two types of logical
    joins are the same but also different. For instance, `nested loops` can only use
    a `LEFT OUTER JOIN`. If a query is written using a `RIGHT OUTER JOIN`, SQL Server
    will incur an additional cost to convert a `RIGHT OUTER JOIN` to a `LEFT OUTER
    JOIN`. Except this specific scenario, all physical join types support the use
    of `LEFT OUTER JOIN`. In previous versions of SQL Server, it was possible for
    SQL Server to generate two different execution plans depending on whether a `LEFT
    OUTER JOIN` or a `RIGHT OUTER JOIN` was used in the query. This was due to the
    limitations around how joins can be reordered.


    The `LEFT OUTER JOIN` has several specifics about when one physical join type
    may be used over another. Listing 7-9 shows ordering the table by the identifier.


    ```sql

    ALTER TABLE [dbo].[OrderDetail]

    ADD CONSTRAINT [PK_OrderDetail]

    PRIMARY KEY CLUSTERED ([OrderDetailID] ASC);

    ```


    Listing 7-9 Primary Key to Sort Data by OrderDetailID


    Once the table has been ordered by the `OrderDetailID`, you can join the `CustomerOrder`
    table to the `OrderDetail` table. The T-SQL code for this join is shown in Listing
    7-10.


    ```sql

    SELECT ord.OrderNumber

    FROM dbo.CustomerOrder ord

    LEFT OUTER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    WHERE ord.CustomerOrderID < 80000;

    ```


    Listing 7-10 Outer Join Between CustomerOrder and OrderDetail


    In this scenario, the two tables are not ordered in the same way. The `CustomerOrder`
    table is sorted by the `CustomerOrderID`, whereas the `OrderDetail` table is sorted
    by the `OrderDetailID`. You can see in Figure 7-27 that the physical operator
    is a `hash match`.


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig27_HTML.jpg)


    A snapshot presents the execution plan. Index seek with clustered, cost 5%. Table
    scan with heap, 99%. Hash match with left outer join, cost 2%. Parallelism with
    gather stream, cost 1%. Select, cost 0%.


    Figure 7-27 Execution plan using a hash match


    You have seen what happens when the tables are ordered differently. If you run
    the T-SQL code in Listing 7-11, both tables will be ordered by the same column,
    `CustomerOrderID`.'
  raw: '## Logical Join Types in Execution Plans


    This last section of the chapter goes into detail about the several different
    logical join operators within SQL Server including INNER JOIN, LEFT or RIGHT OUTER
    JOIN, and FULL OUTER JOIN. The type of logical join operator, how the data is
    sorted, the size of the data being compared, and how the data is being compared
    can determine the physical operators that SQL Server can use in an execution plan.
    There are examples of T-SQL as well as physical operators so that you can see
    the correlation between logical and physical operators.


    In addition to reading execution plans and understanding indexes, your T-SQL code
    can also be used to determine how an execution plan will be generated. In some
    cases, how tables are joined together is just as important as how data is stored
    in the tables. There are times when how you are joining your columns together
    may also affect your execution plan. Some T-SQL in the WHERE clause can impact
    what types of logical joins are used in the query execution. If multiple queries
    are combined, it is also possible that it may change how the query is executed.
    Ultimately, there is a relationship between how the T-SQL code is written and
    how SQL Server decides to execute the query.


    There are several different logical joins in SQL Server. Some of these logical
    joins are easily visible in T-SQL. They include the INNER JOIN, LEFT OUTER JOIN,
    RIGHT OUTER JOIN, and FULL OUTER JOIN. These are not the only logical joins that
    exist in SQL Server. With some T-SQL commands, SQL Server will compare one table
    to another looking for records that match or not. In these scenarios, SQL Server
    does not perform a full join but a SEMI JOIN. This type of join is not specified
    as a T-SQL command, but some T-SQL commands like EXISTS or NOT EXISTS will indicate
    a SEMI JOIN. Available SEMI JOINs include the LEFT SEMI JOIN, LEFT ANTI-SEMI JOIN,
    RIGHT SEMI JOIN, and RIGHT ANTI-SEMI JOIN. Finally, there are some logical joins
    that are related by combining two or more query results in the same transaction.
    They include CONCATENATION, which is often associated with a UNION ALL, or the
    UNION logical join, which can happen with a UNION in T-SQL. Based on the logical
    join, SQL Server will determine what physical joins can be used. In this way,
    logical joins can be used to affect query performance.


    There are physical join operators that can be associated with logical joins. The
    four physical join operators are called merge join, hash join, nested loop, and
    adaptive join. When using an INNER JOIN, any of these four types of physical join
    operators can be used as part of the execution plan. How the data is stored in
    the table and the relative sizes of the tables may affect which physical operator
    is used. If the data from both tables being compared is sorted, the records from
    the two tables can be compared side by side. This lets SQL Server quickly find
    the records that do or do not match, depending on the query requirements. When
    this happens, it is called a merge join. A merge join physical operator appears
    in the execution plan shown in Figure [7-24](#480547_2_En_7_Chapter.xhtml#Fig24).


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig24_HTML.jpg)


    A snapshot presents the icon of the merge join in the execution plan. It is used
    to find the records that do or do not match.


    Figure 7-24


    Merge join icon


    There are times where the tables being joined together are not sorted. If that
    is the case, SQL Server can still compare the rows between each of the tables.
    However, SQL Server will need to convert the records to something that can be
    compared easily. This can be done by hashing. If SQL Server hashes the columns
    being compared in both tables and compares them, the physical operator will be
    a hash match. If you see the icon in Figure [7-25](#480547_2_En_7_Chapter.xhtml#Fig25)
    in your execution plan, you know SQL Server is performing a hash match physical
    join.


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig25_HTML.jpg)


    A snapshot presents the icon of the Hash match in the execution plan. It is used
    to convert the records to something that can be compared easily.


    Figure 7-25


    Hash match icon


    If there are two tables where one table is smaller than another, then SQL Server
    may decide to compare the values or one table one row at a time to all rows of
    the other table. When this happens, SQL Server will use a nested loop as shown
    in Figure [7-26](#480547_2_En_7_Chapter.xhtml#Fig26).


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig26_HTML.jpg)


    A snapshot presents the icon of the Nested loop in the execution plan. It is used
    to compare the values or one table one row at a time to all rows of the other
    table.


    Figure 7-26


    Nested loop icon


    Starting in SQL Server 2017, a new physical join operator can be used when SQL
    Server determines an execution plan for a query. This new physical join operator
    is intended to help in situations when the data stored in a given table may vary
    significantly based on the criteria in the `WHERE` clause. This type of physical
    join allows SQL Server to determine if a hash match or nested loop should be used
    depending on the data selected for the query. This is referred to as an adaptive
    join. In SQL Server 2017, adaptive joins were only available with columnstore
    indexes. Starting in SQL Server 2019, adaptive joins can be used in other scenarios.


    Going through the logical joins that are available, the next ones are the LEFT
    OUTER JOIN and the RIGHT OUTER JOIN. In some ways, these two types of logical
    joins are the same but also different. For instance, nested loops can only use
    a LEFT OUTER JOIN. If a query is written using a RIGHT OUTER JOIN, SQL Server
    will incur an additional cost to convert a RIGHT OUTER JOIN to a LEFT OUTER JOIN.
    Except this specific scenario, all physical join types support the use of LEFT
    OUTER JOIN. In previous versions of SQL Server, it was possible for SQL Server
    to generate two different execution plans depending on whether a LEFT OUTER JOIN
    or a RIGHT OUTER JOIN was used in the query. This was due to the limitations around
    how joins can be reordered.


    The LEFT OUTER JOIN has several specifics about when one physical join type may
    be used over another. Listing [7-9](#480547_2_En_7_Chapter.xhtml#PC9) shows ordering
    the table by the identifier.


    ```

    ALTER TABLE [dbo].[OrderDetail]

    ADD CONSTRAINT [PK_OrderDetail]

    PRIMARY KEY CLUSTERED ([OrderDetailID] ASC);

    Listing 7-9

    Primary Key to Sort Data by OrderDetailID

    ```


    Once the table has been ordered by the `OrderDetailID`, you can join the `CustomerOrder`
    table to the `OrderDetail` table. The T-SQL code for this join is shown in Listing
    [7-10](#480547_2_En_7_Chapter.xhtml#PC10).


    ```

    SELECT ord.OrderNumber

    FROM dbo.CustomerOrder ord

    LEFT OUTER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    WHERE ord.CustomerOrderID < 80000;

    Listing 7-10

    Outer Join Between CustomerOrder and OrderDetail

    ```


    In this scenario, the two tables are not ordered in the same way. The `CustomerOrder`
    table is sorted by the `CustomerOrderID`, whereas the `OrderDetail` table is sorted
    by the `OrderDetailID`. You can see in Figure [7-27](#480547_2_En_7_Chapter.xhtml#Fig27)
    that the physical operator is a hash match.


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig27_HTML.jpg)


    A snapshot presents the execution plan. Index seek with clustered, cost 5%. Table
    scan with heap, 99%. Hash match with left outer join, cost 2%. Parallelism with
    gather stream, cost 1%. Select, cost 0%.


    Figure 7-27


    Execution plan using a hash match


    You have seen what happens when the tables are ordered differently. If you run
    the T-SQL code in Listing [7-11](#480547_2_En_7_Chapter.xhtml#PC11), both tables
    will be ordered by the same column, `CustomerOrderID`.'
