  trans: '

    ### 公共表表达式


    虽然不是用户定义的数据库对象，但我将公共表表达式包含在本节中，因为它们常用于与临时表、表变量和表值参数相似的场景。公共表表达式是一个 SQL 语句产生的临时结果集，其存在时间仅够用于紧随其创建之后的
    `SELECT`、`INSERT`、`UPDATE` 或 `DELETE` 语句。它们的目的是帮助分解复杂逻辑，或获取一个数据子集以供稍后在 T-SQL 代码、批处理或存储过程中使用。


    使用基本公共表表达式的主要原因是提高代码的整体可读性。代码清单 2-26 展示了一个使用与代码清单 2-2 中创建的视图相同逻辑的公共表表达式。期望是当执行此代码时，其性能将与之前创建的视图相同。


    ```sql

    DECLARE @CustomerID INT = 234;

    WITH cte_orderavg AS

    (

    SELECT ord.CustomerOrderID,

    AVG(dtl.QuantitySold * dtl.ProductPrice)

    AS OrderAverage

    FROM dbo.CustomerOrder ord

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    WHERE ord.CustomerID = @CustomerID

    GROUP BY ord.CustomerOrderID

    )

    SELECT cag.CustomerOrderID, cag.OrderAverage

    FROM cte_orderavg cag;

    ```

    *代码清单 2-26*

    创建基本的公共表表达式


    在图 2-17 中，你可以确认代码清单 2-26 生成的执行计划与图 2-6 中的执行计划匹配。如果你还记得，图 2-8 中的执行计划是由代码清单 2-20
    创建的视图生成的。


    ![](img/480547_2_En_2_Fig17_HTML.jpg)


    *一个流程图。Select 从一个序列中的开销为 0%。它来源于计算标量、流聚合、计算标量和嵌套循环。其数据源为索引扫描和聚集索引查找。*


    *图 2-17*

    基本公共表表达式的执行计划


    当你使用公共表表达式时，你也可以像连接视图或临时表一样，将公共表表达式 (`CTE`) 与其他表连接。你还可以使用 `CTE` 不仅进行 `SELECT`，还能基于
    `CTE` 进行 `INSERT`、`UPDATE` 和 `DELETE` 数据操作。代码清单 2-27 展示了一个使用公共表表达式的更复杂逻辑的查询。


    ```sql

    DECLARE @CustomerID INT = 234;

    WITH cte_orderavg AS

    (

    SELECT ord.CustomerOrderID,

    AVG(dtl.QuantitySold * dtl.ProductPrice)

    AS OrderAverage

    FROM dbo.CustomerOrder ord

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    WHERE ord.CustomerID = @CustomerID

    GROUP BY ord.CustomerOrderID

    )

    SELECT cus.FirstName, cus.LastName, cag.OrderAverage

    FROM   dbo.Customer cus

    INNER JOIN dbo.CustomerOrder ord

    ON cus.CustomerID = ord.CustomerID

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    INNER JOIN cte_orderavg cag

    ON ord.CustomerOrderID = cag.CustomerOrderID;

    ```

    *代码清单 2-27*

    在公共表表达式中使用连接


    关于公共表表达式，还有一项最终功能使其具有独特性。你可以创建递归公共表表达式。在这种情况下，一个 `CTE` 将引用自身以帮助生成层次结构数据。虽然很诱人，想让递归
    `CTE` 来解决许多不同的问题，但我建议在实现递归 `CTE` 时要谨慎。它们在需要时可能是正确的工具，但也可能带来重大的性能挑战。代码清单 2-28 是创建一个递归
    `CTE` 来查找作为其他产品组件的产品的示例。


    ```sql

    WITH cte_product (ProductID, ProductName, ProductPrice, ProductComponentLevel)
    AS

    (

    SELECT prd.ProductID, prd.ProductName, prd.ProductPrice, 1 AS ProductComponentLevel

    FROM dbo.Product prd

    LEFT JOIN dbo.ProductComponent cmp

    ON prd.ProductID = cmp.ProductID

    WHERE cmp.ProductComponentID IS NULL

    UNION ALL

    SELECT prd.ProductID, prd.ProductName, prd.ProductPrice,

    (cpd.ProductComponentLevel + 1) AS ProductComponentLevel

    FROM cte_product cpd  --引用上面创建的 cte

    INNER JOIN dbo.ProductComponent cmp

    ON cpd.ProductID = cmp.ProductComponentID

    INNER JOIN dbo.Product prd

    ON cmp.ProductID = prd.ProductID

    )

    SELECT ProductID, ProductName, ProductPrice, ProductComponentLevel

    FROM cte_product;

    ```

    *代码清单 2-28*

    用于查找所有产品及其组件的递归 CTE


    如你在图 2-18 中看到的部分执行计划，`SQL Server` 执行此查询所需的步骤变得相当复杂。


    ![](img/480547_2_En_2_Fig18_HTML.jpg)


    *一个流程图。Select 从一个索引假脱机中的开销为 0%。它来源于连接（开销来自计算标量）、断言（开销）等。最终以聚集索引扫描和聚集索引查找结束。*


    *图 2-18*

    递归 CTE 的部分执行计划


    我发现极少有情况是绝对需要使用递归 `CTE` 的。然而，当我确实需要使用公共表表达式时，我发现它们非常有帮助。


    ## 临时对象


    你可能会发现自己处于需要创建对象但只使用很短时间的场景。有时创建这些对象是为了在处理复杂逻辑时能够操作数据子集。其他时候，将部分代码分离出来创建一个临时对象，可以提高可读性或使其他人更容易理解你在做什么。无论哪种情况，都可以在
    `SQL Server` 中创建临时对象。


    ### 临时表


    临时表正如其名。它们具有与表相同的形态，包含列、数据类型并存储数据。主要区别在于临时表不会在数据库中持久存在。你对临时表的用途以及需要它们持续多久，将决定你最终创建哪种类型的临时表。本节将介绍局部临时表、全局临时表和持久临时表。大多数临时表被创建为局部临时表，这些表只能通过创建它们的连接访问。全局临时表类似于局部临时表，但对所有连接可用。然而，如果
    `SQL Server` 重新启动，这两种临时表都会被删除。持久临时表是在 `tempdb` 数据库内创建的标准表。


    使用临时表还有其他优势。包括能够使用主键和索引来提高性能。还可以在临时表上创建统计信息，进一步提高其性能。需要考虑的一点是，如果在临时表首次创建后又进行了额外的修改，统计信息可能不会自动更新。

    '
- fmt: '### Local Temporary Tables


    If you find yourself needing to put data aside for additional analysis or processing,
    then you can consider using a local temporary table. This type of temporary table
    can also be useful inside of stored procedures. Local temporary tables are only
    available within the same session or connection as they were created. Once the
    session is closed or the connection is terminated, you can’t access the local
    temporary table.


    While local temporary tables can be used for many different scenarios, it is often
    recommended to not use temporary tables as the first option when needing to store
    data temporarily. There is nothing inherently wrong with local temporary tables,
    but you may find other objects can store data temporarily with less potential
    performance impact. As with all things related to SQL Server, it is best to implement
    a solution and test your solution including load testing before pushing the T-SQL
    code to Production.


    Creating temporary tables is easy. While you can use `SELECT` statement to create
    a temporary table by using the code `SELECT <column list> INTO #<temp table name>...`,
    it is considered best practice to create the temporary table with a defined data
    type before inserting records. Listing 2-29 shows code to generate a local temporary
    table. For comparison, this code used to populate this table is the same as the
    code used in Listing 2-2.


    ```sql

    CREATE TABLE #TempOrderAverage

    (

    CustomerID      INT,

    CustomerOrderID INT,

    OrderAverage    DECIMAL(6,2)

    );

    Listing 2-29

    Creating a Temporary Table

    ```


    Once the temporary table has been created, run the query in Listing 2-30 to populate
    the data in the table.


    ```sql

    DECLARE @CustomerID INT = 234;

    INSERT INTO #TempOrder

    (

    CustomerID,

    CustomerOrderID,

    OrderAverage

    )

    SELECT ord.CustomerID,

    ord.CustomerOrderID,

    AVG(dtl.QuantitySold * dtl.ProductPrice) AS OrderAverage

    FROM dbo.CustomerOrder ord

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    WHERE ord.CustomerID = @CustomerID

    GROUP BY ord.CustomerID,

    ord.CustomerOrderID;

    Listing 2-30

    Populating the Temporary Table

    ```


    When I ran the process to populate the temporary table, I also got the execution
    plan for this process. In Figure 2-19, you will determine that the execution plan
    seems like the ones generated for the view and the common table expression. While
    the shape is similar, some of the activities that are happening and the percent
    distribution are different.


    ![](images/480547_2_En_2_Chapter/480547_2_En_2_Fig19_HTML.jpg)


    Figure 2-19

    Execution plan to create a temporary table


    Now that you have determined the execution plan to create the temporary table,
    how does the execution plan seem after you query from the temporary table? Listing
    2-31 shows how to query the existing temporary table.


    ```sql

    SELECT cus.FirstName, cus.LastName, AVG(OrderAverage) AS AverageOrder

    FROM dbo.Customer cus

    INNER JOIN #TempOrder ord

    ON cus.CustomerID = ord.CustomerID

    GROUP BY cus.FirstName, cus.LastName;

    Listing 2-31

    Querying the Temporary Table

    ```


    So far, you have determined where most of the work for a query happens: the same
    time as when the data is originally selected. In this case, the insert and the
    select have been separated into two separate steps. Figure 2-20 is the execution
    that was generated when the data in the temporary table was queried.


    ![](images/480547_2_En_2_Chapter/480547_2_En_2_Fig20_HTML.jpg)


    Figure 2-20

    Querying the temporary table


    While this query used a `Table Scan`, it is possible to add indexes to a temporary
    table.


    ### Global Temporary Tables


    You may find yourself wanting to create a temporary table that is available to
    other connections besides the connection that created the temporary table. Maybe
    you want a temporary table that can be accessed by more than one user. In this
    case, you may want to create a global temporary table. This global temporary table
    can exist after the original session but only when all other tasks that use the
    global temporary table have been completed.


    Creating a global temporary table is straightforward. If you want to recreate
    the temporary table in Listing 2-26 but make sure that the table is global, you
    can run the code in Listing 2-32 to create the global temporary table.


    ```sql

    -- The use of ## make this a global temporary table

    CREATE TABLE ##TempOrder

    (

    CustomerID      INT,

    CustomerOrderID INT,

    OrderAverage    DECIMAL(6,2)

    );

    Listing 2-32

    Creating a Global Temporary Table

    ```


    The only change between creating a local and global temporary table is with the
    table name used during creation. Comparing the code in Listing 2-30 for a local
    temporary table and Listing 2-32 for a global temporary table, you can confirm
    the difference in the table names. In Listing 2-30, the table name is `#TempOrder`,
    while the temporary table name is `##TempOrder` in Listing 2-32. The addition
    of the second `#` character at the beginning of the table name indicates that
    this temporary table is a global temporary table. In addition, global temporary
    tables operate similarly to local temporary tables. The key difference is global
    temporary tables can be accessed outside of the specific connection that created
    the temporary table.'
  raw: '#### Local Temporary Tables


    If you find yourself needing to put data aside for additional analysis or processing,
    then you can consider using a local temporary table. This type of temporary table
    can also be useful inside of stored procedures. Local temporary tables are only
    available within the same session or connection as they were created. Once the
    session is closed or the connection is terminated, you can’t access the local
    temporary table.


    While local temporary tables can be used for many different scenarios, it is often
    recommended to not use temporary tables as the first option when needing to store
    data temporarily. There is nothing inherently wrong with local temporary tables,
    but you may find other objects can store data temporarily with less potential
    performance impact. As with all things related to SQL Server, it is best to implement
    a solution and test your solution including load testing before pushing the T-SQL
    code to Production.


    Creating temporary tables is easy. While you can use SELECT statement to create
    a temporary table by using the code `SELECT <column list> INTO #<temp table name>...`,
    it is considered best practice to create the temporary table with a defined data
    type before inserting records. Listing [2-29](#480547_2_En_2_Chapter.xhtml#PC29)
    shows code to generate a local temporary table. For comparison, this code used
    to populate this table is the same as the code used in Listing [2-2](#480547_2_En_2_Chapter.xhtml#PC2).


    ```

    CREATE TABLE #TempOrderAverage

    (

    CustomerID      INT,

    CustomerOrderID INT,

    OrderAverage    DECIMAL(6,2)

    );

    Listing 2-29

    Creating a Temporary Table

    ```


    Once the temporary table has been created, run the query in Listing [2-30](#480547_2_En_2_Chapter.xhtml#PC30)
    to populate the data in the table.


    ```

    DECLARE @CustomerID INT = 234;

    INSERT INTO #TempOrder

    (

    CustomerID,

    CustomerOrderID,

    OrderAverage

    )

    SELECT ord.CustomerID,

    ord.CustomerOrderID,

    AVG(dtl.QuantitySold * dtl.ProductPrice) AS OrderAverage

    FROM dbo.CustomerOrder ord

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    WHERE ord.CustomerID = @CustomerID

    GROUP BY ord.CustomerID,

    ord.CustomerOrderID;

    Listing 2-30

    Populating the Temporary Table

    ```


    When I ran the process to populate the temporary table, I also got the execution
    plan for this process. In Figure [2-19](#480547_2_En_2_Chapter.xhtml#Fig19), you
    will determine that the execution plan seems like the ones generated for the view
    and the common table expression. While the shape is similar, some of the activities
    that are happening and the percent distribution are different.


    ![](images/480547_2_En_2_Chapter/480547_2_En_2_Fig19_HTML.jpg)


    A flow diagram. T S Q L has a cost of 0% from table insert. It is from compute
    scalar, stream aggregate, compute scalar, nested loops. It is from index scan
    and clustered index seek.


    Figure 2-19


    Execution plan to create a temporary table


    Now that you have determined the execution plan to create the temporary table,
    how does the execution plan seem after you query from the temporary table? Listing
    [2-31](#480547_2_En_2_Chapter.xhtml#PC31) shows how to query the existing temporary
    table.


    ```

    SELECT cus.FirstName, cus.LastName, AVG(OrderAverage) AS AverageOrder

    FROM dbo.Customer cus

    INNER JOIN #TempOrder ord

    ON cus.CustomerID = ord.CustomerID

    GROUP BY cus.FirstName, cus.LastName;

    Listing 2-31

    Querying the Temporary Table

    ```


    So far, you have determined where most of the work for a query happens: the same
    time as when the data is originally selected. In this case, the insert and the
    select have been separated into two separate steps. Figure [2-20](#480547_2_En_2_Chapter.xhtml#Fig20)
    is the execution that was generated when the data in the temporary table was queried.


    ![](images/480547_2_En_2_Chapter/480547_2_En_2_Fig20_HTML.jpg)


    A flow diagram. Select has a cost of 0% from compute scalar, hash match, and adaptive
    join. It is from hash match, index scan, and clustered index seek. Hash match
    is form table scan.


    Figure 2-20


    Querying the temporary table


    While this query used a Table Scan, it is possible to add indexes to a temporary
    table.


    #### Global Temporary Tables


    You may find yourself wanting to create a temporary table that is available to
    other connections besides the connection that created the temporary table. Maybe
    you want a temporary table that can be accessed by more than one user. In this
    case, you may want to create a global temporary table. This global temporary table
    can exist after the original session but only when all other tasks that use the
    global temporary table have been completed.


    Creating a global temporary table is straightforward. If you want to recreate
    the temporary table in Listing [2-26](#480547_2_En_2_Chapter.xhtml#PC26) but make
    sure that the table is global, you can run the code in Listing [2-32](#480547_2_En_2_Chapter.xhtml#PC32)
    to create the global temporary table.


    ```

    -- The use of ## make this a global temporary table

    CREATE TABLE ##TempOrder

    (

    CustomerID      INT,

    CustomerOrderID INT,

    OrderAverage    DECIMAL(6,2)

    );

    Listing 2-32

    Creating a Global Temporary Table

    ```


    The only change between creating a local and global temporary table is with the
    table name used during creation. Comparing the code in Listing [2-30](#480547_2_En_2_Chapter.xhtml#PC30)
    for a local temporary table and Listing [2-32](#480547_2_En_2_Chapter.xhtml#PC32)
    for a global temporary table, you can confirm the difference in the table names.
    In Listing [2-30](#480547_2_En_2_Chapter.xhtml#PC30), the table name is `#TempOrder`,
    while the temporary table name is `##TempOrder` in Listing [2-32](#480547_2_En_2_Chapter.xhtml#PC32).
    The addition of the second # character at the beginning of the table name indicates
    that this temporary table is a global temporary table. In addition, global temporary
    tables operate similarly to local temporary tables. The key difference is global
