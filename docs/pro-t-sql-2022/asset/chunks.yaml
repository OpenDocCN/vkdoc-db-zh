  trans: '

    ## 自动化部署


    处理数据库部署的方式多种多样。您可以使用不同的工具来自动化数据库部署，并采用不同的部署策略。确定为数据库部署采用何种方法，取决于您试图预防或解决的问题类型。这些问题可能包括：在部署过程中未能更新代码、在部署过程中覆盖代码、防止部署不需要的代码，或提高部署速度。这些部署策略取决于所部署的
    `T-SQL` 代码类型。其他部署数据库代码的方法涉及以某种方式部署数据库，帮助您在更改部署到包括生产环境在内的所有其他环境之前，在开发阶段发现问题是关键。


    有多种方法可以使用 `SQL Server Management Studio`、`Visual Studio` 或 `PowerShell` 来简化和自动化部署
    `T-SQL` 代码。如果您希望在不将数据库纳入源代码控制的情况下实现数据库部署自动化，则需要采取一些额外步骤来保护您的数据库。`SSDT` 允许所有对象以
    `CREATE` 开头。在部署代码时，`SSDT` 会判断一个对象应使用 `CREATE` 还是 `ALTER`。如果您想使用 `DML` 更改数据库中的数据，则需要使用预部署或后部署脚本。这样做时，您的
    `T-SQL` 代码应编写成允许多次运行。这可能不是您当前使用的方法，但您应该考虑如果有人意外再次尝试部署相同的脚本会发生什么。编写脚本时，应确保无论执行多少次都能成功运行。如果您已经在使用源代码控制，那么您的源代码控制应该为您管理此功能。


    当作为基于迁移的部署的一部分部署 `T-SQL` 代码时，如果您不使用源代码控制，流程可能会有所不同。对于基于迁移的部署，您通常有一组需要运行的脚本来完成部署。在不使用源代码控制时，最复杂的步骤有时是确切地确定应该部署什么。当您准备好部署
    `T-SQL` 代码时，理想情况下，脚本将保存在同一个文件夹中。此时，您可以手动运行所有这些迁移脚本，或者确定如何实现运行脚本的自动化。如果您选择手动运行脚本，则必须打开每个脚本，并确保连接到正确的
    `SQL Server` 实例。还有其他选项可用于提高部署这些迁移脚本的一致性和速度。您可以使用批处理文件或 `PowerShell` 来帮助自动执行这些部署。代码清单
    12-8 包含了运行保存在文件夹 `C:\Deploy` 中的所有 `SQL` 脚本文件所需的 `PowerShell`。


    ```

    Invoke-DbaQuery -SQLInstance localhost -Database OutdoorRecreation -File "C:\Deploy\*.sql"

    代码清单 12-8

    用于运行 SQL 脚本的 PowerShell

    ```


    此代码表示，`C:\Deploy` 文件夹中扩展名为 `.sql` 的所有文件都应在 `localhost` `SQL Server` 上的 `OutdoorRecreation`
    数据库中执行。


    提示


    此代码使用 `PowerShell` 模块 `dbatools` 执行。该模块是一个由 `SQL Server` 社区构建的开源项目。更多详情，请访问 [`https://dbatools.io/`](https://dbatools.io/)。


    如果您使用的是基于状态的迁移方法并且未使用源代码控制，也可以使用 `PowerShell` 实现自动化。这些 `DACPAC` 可以从已有的数据库和 `SQL
    Server` 实例生成。根据您选择处理 `DACPAC` 的方式，您可以将目标数据库更新为匹配 `DACPAC` 中的代码，或者基于 `DACPAC` 与目标数据库之间的差异创建一个脚本文件。一旦找到从您的解决方案或工作区生成的
    `DACPAC` 文件，您就可以运行代码清单 12-9 所示的 `PowerShell` 代码。


    ```

    Publish-DbaDacPackage -SQLInstance localhost -Database OutdoorRecreation -Path
    C:\temp\OutdoorRecreation.dacpac

    代码清单 12-9

    用于比较 DACPAC 的 PowerShell

    ```


    此 `PowerShell` 也来自 `dbatools` 模块。它不是执行 `C:\temp` 文件夹中的所有 `SQL Server` 文件，而是将 `DACPAC`
    文件中的架构与 `localhost` 服务器上 `OutdoorRecreation` 数据库的架构进行比较。此 `PowerShell` 命令包含一些额外的开关，例如
    `-GenerateDeploymentReport` 或 `-ScriptOnly`。`-GenerateDeploymentReport` 会创建一个
    `XML` 文件，显示对数据库所做的更改。`-ScriptOnly` 选项会输出一个可以手动执行的 `SQL Script` 文件。根据您选择处理 `DACPAC`
    的方式，您可以将目标数据库更新为匹配 `DACPAC` 中的代码，或者基于 `DACPAC` 与目标数据库之间的差异创建一个脚本文件。


    实现完全自动化部署的最简单方法是使用第三方工具。然而，这并非您唯一的选择。如果您对基于迁移的部署感兴趣，至少有一个免费的第三方工具可用：`DbUp`。虽然此工具可能有助于管理基于迁移的部署，但本书不会涵盖
    `DbUp`。请注意，如果您打算使用基于迁移的部署和源代码控制，您将需要一个扩展程序或类似 `DbUp` 的其他工具。


    如果您的数据库已纳入源代码控制并且您正在使用基于状态的迁移，那么有几种替代方案来部署数据库更改。您可以选择直接从 `Visual Studio` 将更改部署到目标数据库实例。虽然您仍然是手动部署代码，但这可以显著节省时间，因为您不必打开多个文件并单独执行每个文件。但是，如果不使用第三方工具来进一步自动化部署，您将需要创建
    `PowerShell` 脚本来生成 `DACPAC` 或 `SQL script` 文件，并将这些文件部署到目标实例。


    在上一节关于部署方法的内容中，我介绍了基于迁移和基于状态的部署。在部署修改数据的更改时，例如使用数据操作语言（`DML`）查询，您需要确保不会意外地多次修改数据。虽然我们可能希望确保每个脚本都能以无法多次更新数据的方式编写，但有时可能无法编写脚本来防止这种情况发生。如果发生这种情况，您可以使用类似于功能标志（feature
    flags）的概念。即创建一个表来记录数据修改脚本何时已运行。脚本首次完成时，可以更新该表并添加一个值，表明所有记录都已更新。例如，如果您想将产品价格提高
    10%，您的 `T-SQL` 代码应编写成不会在每次部署数据库项目时都更新产品价格。该脚本还可以检查以确保该值在脚本运行之前不存在于表中。该表也可以在 `T-SQL`
    脚本整体通过或失败时进行检查和填充，或者在更新完成时记录每个单独的记录。

    '
- fmt: 'You may also find that there are times where database code is ready to be
    deployed but the business is not ready to enable the new functionality. Earlier
    in this chapter, I covered how feature flags can help you control whether applications
    use the current state or a future state of database code. There is a deployment
    method that can help in these situations. The largest advantage here is that you
    can deploy database code without having your applications use this new T-SQL code.
    Depending on the database objects that are changing, this can be relatively easy
    or difficult to manage.


    When you want to deploy T-SQL code changes, but you are not ready for those changes
    to be released to the Production environment, you can use a deployment method
    to help you. This deployment method is referred to as *dark deployment*. This
    method uses a feature flag or a similar concept. You deploy T-SQL code so that
    the database code continues to function as it always has. When you are ready to
    enable the new functionality, you can enable the feature flags. This switches
    how the database code works so that it uses the new functionality instead of the
    original database code.


    ## Dark Deployment Steps


    The beginning state of the application and the database is shown in Figure 12-2.


    ![](images/480547_2_En_12_Chapter/480547_2_En_12_Fig2_HTML.jpg)


    Figure 12-2: Unmodified application and database


    The next step in a dark deployment is to update the database by deploying the
    SQL scripts. If you are using feature flags, the feature flags should be disabled.
    The database in Figure 12-3 has been updated with the new database code.


    ![](images/480547_2_En_12_Chapter/480547_2_En_12_Fig3_HTML.jpg)


    Figure 12-3: Deploying database changes


    After the T-SQL code with feature flags has been deployed, you are now ready to
    deploy the application. Once you deploy the application and enable the feature
    flag, your application and database will be in the same state, as in Figure 12-4.


    ![](images/480547_2_En_12_Chapter/480547_2_En_12_Fig4_HTML.jpg)


    Figure 12-4: Deploying the application and enabling feature flags


    These steps can allow you to deploy your database changes dark.


    ## Blue-Green Deployment


    There are many risks involved with database deployments. These risks can involve
    T-SQL code or application code that no longer work as expected. There are also
    risks that the same code may appear to work but does not work as expected. In
    some cases, this issue may be cosmetic. Other times, a bug in the database code
    may negatively affect the quality of the data that is saved in the database. This
    can include altering the data in a way that the data is no longer usable. In order
    to avoid these types of scenarios, different deployment methods can be used to
    protect the database and the applications.


    One potential deployment method is where one set of hardware is swapped out for
    a set of hardware with the updated software. This type of deployment method is
    known as *blue-green*. This can work well for applications, but this can be more
    difficult when databases are involved. If your application is only using a database
    to read data, you can use the blue-green method as is. However, since the concept
    is to replace the code entirely, this does not work well for databases that need
    to allow for write activity.


    There is a modified version of the blue-green method that can be used for databases.
    In this method, you still have two sets of applications: the original application
    and the new application. When users are connecting to the original application,
    you deploy any scripts that can be updated and still allow the original application
    to work as intended. If you use feature flags, you deploy the database objects
    that use feature flags. Once you are ready to start using the new application
    code, you can update the stored procedures to start using the feature flags for
    the new application code. After you are confident that the updates to the applications
    and the database code are working as intended, you can remove the feature flags.
    At this point, you will have transitioned entirely over to the new application
    code and all feature flags will be removed from the T-SQL code.


    ## Blue-Green Deployment Steps


    The initial state for your blue-green deployment is shown in Figure 12-5.


    ![](images/480547_2_En_12_Chapter/480547_2_En_12_Fig5_HTML.jpg)


    Figure 12-5: Unmodified application and database


    The application and the database are both unmodified before the deployment. The
    next step in a blue-green database deployment is to deploy the database changes
    that will work for either the original or new application. Figure 12-6 shows the
    database having some changes applied.


    ![](images/480547_2_En_12_Chapter/480547_2_En_12_Fig6_HTML.jpg)


    Figure 12-6: Deploying database changes


    The original application will continue to connect to the modified database. The
    blue-green deployment method is based on the concept of replacing code, not overwriting
    code. In order to follow this deployment method, you want to stand up the hardware
    and software needed for the new application. Figure 12-7 shows the state of the
    database and the updated application.


    ![](images/480547_2_En_12_Chapter/480547_2_En_12_Fig7_HTML.jpg)


    Figure 12-7: Deploying a new application


    With the feature flags in place, both applications continue to function in the
    same manner as the original application. Now that the application code is ready,
    the feature flags can be enabled in the database. Figure 12-8 shows the updated
    application connecting to the updated database.


    ![](images/480547_2_En_12_Chapter/480547_2_En_12_Fig8_HTML.jpg)


    Figure 12-8: Removing feature flags


    The updated application and database are up and running, and the original application
    has been decommissioned. The new state would be like Figure 12-9.


    ![](images/480547_2_En_12_Chapter/480547_2_En_12_Fig9_HTML.jpg)


    Figure 12-9: Removing the original application


    Removing the original application information completes the blue-green deployment
    process. To reiterate, the process for a blue-green deployment is as follows:


    1.  Start with an unmodified application and database.

    2.  Add a feature flag to the database.'
