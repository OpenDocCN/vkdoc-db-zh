    \n![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig32_HTML.jpg)\n\n一个快照展示了执行计划。带有重新分区流的并行，成本\
    \ 5%。带有重新分区流的并行，成本 9%。带有右半连接的哈希匹配，成本 27%。带有收集流的并行，成本 9%。选择（`Select`），成本 0%。\n\n\
    **Figure 7-32**\n带有 `RIGHT SEMI JOIN` 的部分执行计划\n\n使用右半连接（`RIGHT SEMI JOIN`）是由于清单\
    \ **7-10** T-SQL 中的 `EXISTS`。使用“右”表示 SQL Server 正在将 `EXISTS` 语句返回的结果与客户订单列表进行比较评估。\n\
    \n虽然使用 `EXISTS` 或 `NOT EXISTS` 可能表示将会出现半连接或反半连接，但这并不总是发生的情况。对于反连接（`ANTI JOIN`）也是如此，因为数据库引擎可以将右半连接（`RIGHT\
    \ SEMI JOIN`）转换为左反连接（`LEFT ANTI JOIN`）。清单 **7-15** 显示了一个将返回 `ProductID` 为 2 的产品的所有订单的查询。\n\
    \n```sql\nSELECT ord.OrderNumber\nFROM dbo.CustomerOrder ord\nWHERE EXISTS\n(\n\
    \    SELECT *\n    FROM dbo.OrderDetail dtl\n    WHERE dtl.CustomerOrderID = ord.CustomerOrderID\n\
