- fmt: '## Other User-Defined Objects


    There are many ways of working with complex data and breaking data up into sections
    that can be easily managed and analyzed. In some cases, data can be saved to temporary
    tables or table variables. However, there are other options available depending
    on your needs. SQL Server 2016 introduced the concept of external tables. This
    is a feature where external data sources, that is data not within the current
    SQL Server instance, can be treated as a table within SQL Server. In SQL Server
    2022, this feature has been expanded to include s3-compatible object storage as
    an external data source. This will allow you to use data files, such as CSV or
    parquet files, as tables within SQL Server. In order to add external data source,
    you will need create a master key for the database. To create the external data
    source, use the authentication of Shared Access Signature (SAS) along with the
    SAS token for the associated storage account. You will then be able to create
    an external data table to s3-compatible object storage, generic ODBC connections,
    Oracle, Teradata, and other options supported by SQL Server. Another option in
    SQL Server is using table-valued parameters. This allows for similar performance
    as a temporary table, but it also works similarly to table variables. There is
    also a method where a temporary result set is created for use in the next statement
    in a batch.


    ### User-Defined Table Types


    When working with databases and stored procedures, you may find yourself needing
    to pass many values for one or more fields into a stored procedure as a parameter.
    There is an option to create a user-defined table type that will allow you to
    specify multiple columns and data types. The user-defined table type can be used
    to pass in a single column with many rows. As an example, you can allow users
    to pick multiple days of the week and save those values into a table type. When
    the parameter is passed into the stored procedure, it can be used to join to other
    tables thus allowing you to filter queries based on multiple values at one.


    One advantage of creating a user-defined table type is that this table type can
    be reused. For instance, you can use three separate user-defined tables, one each
    for the `INT`, `DATE`, and `VARCHAR(30)` data types. Then these requests can be
    put into the proper user-defined table type and sent to the correct stored procedures.
    You can add code that verifies if there is any data in the user-defined table
    type. You can have the stored procedure count the number of rows. If the count
    is zero, ignore it. Otherwise, you can select the column from the user-defined
    table type. You can find an example of creating a user-defined table type in Listing
    [2-23](#480547_2_En_2_Chapter.xhtml#PC23).


    ```sql

    CREATE TYPE dbo.CustomerOrderNumber AS TABLE

    (

    CustomerOrderID INT,

    OrderNumber     VARCHAR(15)

    );

    ```


    *Listing 2-23*

    *Creating a User-Defined Table Type*


    Once a user-defined table type has been created, it can be used as a parameter
    for a stored procedure or be used for variable declaration. The reusability and
    consistency that is created with user-defined table types comes with a cost. As
    the stored procedures now use a single parameter to represent all of the columns
    and rows stored in this object, it becomes difficult to determine what parameters
    in a stored procedure represent a single value and what parameters represent a
    user-defined table type. This object can make code easier to read; it can also
    make it harder to troubleshoot performance issues in the future.


    ### Table-Valued Parameters


    A high percentage of stored procedures can be used to insert, update, or delete
    data from tables. In some cases, the application may need to send one parameter
    per column of a table to various stored procedures. While using one parameter
    per field is straightforward and easy to debug, some contend that it’s cleaner
    and simpler to send multiple fields in one parameter. I understand wanting to
    simplify the code, but I also believe that too much simplification can make it
    difficult to troubleshoot code in the future.


    However, you may want to use an array type format in a stored procedure or other
    code. In this case, it’s beneficial to use this data to perform a set-based operation.
    When doing so, you must remember that the user-defined table type that is passed
    in as a parameter cannot be modified. When this parameter is passed in, the data
    passed can be treated like a temporary table and used to join to the base table
    and make any necessary modifications.


    As SQL Server is designed to perform best for set-based operations, you may get
    to the point where you want to take advantage of SQL Server’s inherent ability
    to work best with sets. You may want to consider using table-valued parameters
    if you want to pass in a table to a stored procedure and use that table relationally
    with other tables within the same stored procedure.


    Since a table-valued parameter is ultimately a variable, SQL Server will not necessarily
    optimize the execution plan for the actual estimated number of rows. If you find
    yourself in this situation, you may need to take the values from the parameter
    and save them into a table variable within the stored procedure. I advise against
    using table-valued parameters solely to improve readability of the code. Listing
    [2-24](#480547_2_En_2_Chapter.xhtml#PC24) shows an example of using a table-valued
    parameter in a stored procedure.


    ```sql

    CREATE PROCEDURE dbo.UpdateCustomerOrderNumber

    @CustomerOrder CustomerOrderNumber READONLY

    AS

    SET NOCOUNT ON;

    UPDATE co

    SET OrderNumber = fco.OrderNumber,

    DateModified = GETDATE()

    FROM dbo.CustomerOrder co

    INNER JOIN @CustomerOrder fco

    ON co.CustomerOrderID = fco.CustomerOrderID;

    ```


    *Listing 2-24*

    *Using a Table-Valued Parameter*


    The table-valued parameter in Listing [2-24](#480547_2_En_2_Chapter.xhtml#PC24)
    uses the user-defined table type created in Listing [2-23](#480547_2_En_2_Chapter.xhtml#PC23).
    When you want to execute the stored procedure using the table-valued parameter,
    you can run the code in Listing [2-25](#480547_2_En_2_Chapter.xhtml#PC25).


    ```sql

    DECLARE @CustomerOrder AS CustomerOrderNumber;

    INSERT INTO @CustomerOrder (CustomerOrderID, OrderNumber)

    VALUES

    (802818, ''AZ-72834''),

    (802819, ''AZ-98341'');

    EXECUTE dbo.UpdateCustomerOrderNumber @CustomerOrder;

    ```


    *Listing 2-25*

    *Executing a Stored Procedure with a Table-Valued Parameter*


    The execution plan from this code is in Figure [2-15](#480547_2_En_2_Chapter.xhtml#Fig15).
    Notice the Table Scan on the table-valued parameter.


    ![](images/480547_2_En_2_Chapter/480547_2_En_2_Fig15_HTML.jpg)


    *A flow diagram. T S Q L has a cost of 0% from a clustered index update. It is
    from compute scalar, that is from sort, nested loops, and then table scan and
    clustered index seek.*


    *Figure 2-15*

    *Execution plan for a stored procedure with a table-valued parameter*


    If you keep the indexed view created in Listing [2-12](#480547_2_En_2_Chapter.xhtml#PC12),
    the execution plan returned gets even more complex. Figure [2-16](#480547_2_En_2_Chapter.xhtml#Fig16)
    shows the resulting execution plan if the indexed view still exists.


    ![](images/480547_2_En_2_Chapter/480547_2_En_2_Fig16_HTML.jpg)


    *A flow diagram. T S Q L has a cost of 0% and is from a sequence. It is from clustered
    index update and table spool. It is from split and collapse, respectively.*


    *Figure 2-16*

    *Execution plan for a table-valued parameter with an indexed view*


    While table-valued parameters can streamline your code, keep in mind that there
    can be a hidden performance impact. One of the best practices when developing
    new code is to check the execution plan and confirm that SQL Server is processing
    the code in a method that aligns with the shape of the data.'
