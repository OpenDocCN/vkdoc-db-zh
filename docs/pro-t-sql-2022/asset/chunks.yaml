    | 12 | Selena | Tiesto | False |

    | 27 | Ian | West | False |

    | 401409 | Stacy | Alexander | True |

    | 401407 | Karim | Khalil | True |

    | 401405 | Marty` | Bethel | True |


    你可以在表 11-2 中看到，执行存储过程时，活动和非活动客户都被返回了。这样，你就创建了一个基本的单元测试（清单 11-1 中的查询），并确认当运行清单
    11-2 中的存储过程时，由于非活动记录也包含在结果集中，该测试失败了。


    下一步是找出如何让单元测试通过。对于此示例，更改很简单。让我们在存储过程的末尾添加一行，只返回活动客户，如清单 11-3 所示。


    ```sql

    /*-------------------------------------------------------------*\

    Name:             dbo.GetCustomer

    Author:           Elizabeth Noble

    Created Date:     2022-10-30

    Description:      Get a list of all active customers in the databases

    Sample Usage:

    EXECUTE dbo.GetCustomer;

    \*-------------------------------------------------------------*/

    CREATE OR ALTER PROCEDURE dbo.GetCustomer

    AS

    SELECT

    CustomerID,

    FirstName,

    LastName,

    Address,

    City,

    PostalCode,

    Country,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Customer

    WHERE IsActive = 1;

    ```

    **清单 11-3**

    修改后的存储过程


    创建此存储过程后，你可以执行它以确认新功能是否按预期工作。在这种情况下，你希望验证 CustomerID 2 和 5 不再被返回。根据前面的代码，你期望清单
    11-3 的结果集与表 11-3 所示的内容匹配。


    **表 11-3**

    活动客户示例


    | CustomerID | FirstName | LastName | IsActive |

    | --- | --- | --- | --- |

    | 1 | Myra | Acharya | True |

    | 2 | Jose | Gomez | True |

    | 401409 | Stacy | Alexander | True |

    | 401407 | Karim | Khalil | True |

    | 401405 | Marty` | Bethel | True |


    你已经确认，对清单 11-3 所做的更改已正确地从结果集中移除了非活动客户。这就是 T-SQL 代码通常的测试方式。在更改前后执行并比较结果是测试代码更改的有效方法，但这需要付出可重复性的代价。构建一组单元测试集合可以让你在每次部署时重新测试更改，以确保功能不会从一个软件版本到下一个版本丢失。


    这种测试代码的方法是一个很好的起点，但可能难以始终如一地遵循。你可能有一些可以存储不同状态数据的表。例如，如果你想查找有关促销产品订单频率的信息，测试结果的逻辑会变得更加复杂。这就是使用第三方工具可能有所帮助的地方。


    为你的数据寻找单独的示例集可能既耗时又容易出错。此外，你可能会花更多时间尝试找到正确的测试用例，而不是编写或测试 T-SQL 代码。另一个挑战是，由于手动在数据库中查找已有的测试数据需要花费时间和精力，你可能会跳过重要的测试用例。然而，使用
    T-SQL 在你的数据中查找特定的测试用例并不是你唯一的选择。你可以手动插入测试数据并对你插入的记录执行测试。这种方法允许你为正在测试的代码确定最佳场景。在大多数情况下，这些示例数据不会集中保存。你可能仍然需要在每次测试新功能时重写特定的示例。


    有不同类型的单元测试工具可供你使用。单元测试可以通过向数据库添加额外的 T-SQL 对象来处理。另一个选择是付费购买可以帮助管理单元测试的第三方工具。另一个选项是使用
    Visual Studio 来创建和管理单元测试。虽然所有这些选项都是有效的并且各有其优点，但我想重点介绍通过 Visual Studio 原生创建单元测试可以完成什么。图
    11-1 展示了在 Visual Studio 中创建单元测试的第一步。


    ![](img/480547_2_En_11_Fig1_HTML.jpg)


    **图 11-1**

    创建单元测试


    选择创建单元测试的选项后，Visual Studio 将引导你完成创建第一个单元测试的过程。图 11-2 中的对话框将会打开。


    ![](img/480547_2_En_11_Fig2_HTML.jpg)


    **图 11-2**

    “创建单元测试”对话框'
- fmt: "The top portion of the window allows you to select which objects should be\
    \ used to create unit tests. For this example, let’s work on creating a new unit\
    \ test for the `dbo.GetCustomer` stored procedure. You are also creating your\
    \ first unit test associated with this database project. You can select that you\
    \ want to create a new Visual C# test project. However, you do not need to know\
    \ C# to start creating your own unit tests in Visual Studio. Give this new project\
    \ a name and create a new class. You can reuse this class for other unit tests\
    \ going forward.\n\nOnce you select OK on the dialog window, you will get another\
    \ pop-up, as shown in Figure [11-3](#480547_2_En_11_Chapter.xhtml#Fig3).\n\n![](images/480547_2_En_11_Chapter/480547_2_En_11_Fig3_HTML.jpg)\n\
    \nA screenshot of the S Q L server test configuration of Pro T S Q L 2022 V S\
    \ unit test. A select connection button is highlighted. Ok and cancel buttons\
    \ are at the bottom right.\n\n## Figure 11-3\n\n## Setting the connection string\n\
    \nThere are a couple of options that can be set here. Most of this has to do with\
    \ selecting the data source you are using where you can perform the unit tests.\
    \ Select the pre-existing `Menu` database to run the unit tests. You have the\
    \ option to automatically deploy the database before running the unit tests. However,\
    \ let’s only deploy the database if the unit tests passes.\n\nOnce you have set\
    \ the connection string and configured the additional settings, Visual Studio\
    \ will add a new project to the existing solution. You can see in Figure [11-4](#480547_2_En_11_Chapter.xhtml#Fig4)\
    \ how your database project will look along with the unit testing project.\n\n\
    ![](images/480547_2_En_11_Chapter/480547_2_En_11_Fig4_HTML.jpg)\n\nA screenshot\
    \ of the solution explorer window of the Pro T S Q L 2022 V S project. An option\
    \ of the unit test get customer dot c s is highlighted. Ok and cancel buttons\
    \ are at the bottom right.\n\n## Figure 11-4\n\n## Unit testing in source control\n\
    \nIn Figure [11-4](#480547_2_En_11_Chapter.xhtml#Fig4), none of the objects in\
    \ the original `ProTSQL2022-VS` project have been altered. You can see all the\
    \ objects created for the unit testing project are available to be checked into\
    \ source control. After the unit testing project has been created, some additional\
    \ windows will open in Visual Studio. One of these windows allows you to set test\
    \ conditions. By default, a test condition is configured for `Inconclusive`. You\
    \ can leave this test condition or remove it. Figure [11-5](#480547_2_En_11_Chapter.xhtml#Fig5)\
    \ shows the drop-down of available test conditions.\n\n![](images/480547_2_En_11_Chapter/480547_2_En_11_Fig5_HTML.jpg)\n\
    \nA screenshot of the test condition window. The drop-down menu list data checksum,\
    \ empty result set, execution time, expected schema, inconclusive, not empty result\
    \ set, raw count, and scalar value.\n\n## Figure 11-5\n\n## Available unit test\
    \ options\n\nBefore you begin creating your unit test, let’s define the purpose\
    \ of each of these conditions in Table [11-4](#480547_2_En_11_Chapter.xhtml#Tab4).\n\
    \n### Table 11-4\n\n### Unit Test Conditions\n\n| Test Condition | Description\
    \ |\n| --- | --- |\n| `Data Checksum` | Finds the `CheckSum` of the unit test.\
    \ Test passes if the `CheckSum` matches the original unit test. This should only\
    \ be used if the data returned in the result set will remain the same. |\n| `Empty\
    \ ResultSet` | Checks to see if any data is returned. Test passes if no data is\
    \ returned. |\n| `Execution Time` | Checks the overall execution time of the query.\
    \ Test passes if the query completes in the specified amount of time. |\n| `Expected\
    \ Schema` | Checks the schema of the object returned. Test passes if the columns\
    \ and data types match the expected schema. |\n| `Inconclusive` | This is created\
    \ by the system as a placeholder and should be removed once the first unit test\
    \ is created. |\n| `NotEmpty ResultSet` | Checks to see if any data is returned.\
    \ Test passes if data is returned. |\n| `Row Count` | Checks the number of rows\
    \ returned. Test passes if the row count returns matches the expected count. |\n\
    | `Scalar Value` | Checks the value returned. Test passes if the value returned\
    \ matches the expected value. |\n\nYou want to create a unit test to verify that\
    \ inactive customers are not being returned by the `dbo.GetCustomer` stored procedure.\
    \ Similar to the manual unit test you wrote previously, you want to confirm that\
    \ there are no inactive customers returned by the stored procedure `dbo.GetCustomer`.\
    \ You can do this by selecting the condition of `Empty ResultSet`. You can see\
    \ this test condition in Figure [11-6](#480547_2_En_11_Chapter.xhtml#Fig6).\n\n\
    ![](images/480547_2_En_11_Chapter/480547_2_En_11_Fig6_HTML.jpg)\n\nA screenshot\
    \ of the test condition window. It presents. Name, empty result set condition\
    \ 1\\. Type, empty result set. Value, result set 1 must have zero rows. enabled,\
    \ true.\n\n## Figure 11-6\n\n## Unit test to check for Empty ResultSet\n\nNow\
    \ that you’ve created a test condition, you need to write some T-SQL code for\
    \ this unit test. Select `Empty ResultSet` as the test condition. For this unit\
    \ test to pass when it is run, the T-SQL code inside the unit test must not return\
    \ any results.\n\nAfter you change the stored procedure, you do not want any inactive\
    \ customers to be returned. In this case, a passing test case is to have no inactive\
    \ customers returned. This also matches the test conditions that were created\
    \ in Figure [11-6](#480547_2_En_11_Chapter.xhtml#Fig6). Listing [11-4](#480547_2_En_11_Chapter.xhtml#PC4)\
    \ shows the code for the unit test.\n\n```sql\n-- database unit test for dbo.GetCustomer\n\
    -- Create table variable to hold results\nDECLARE @CustomerList TABLE\n(\n   \
    \ CustomerID      INT,\n    FirstName       VARCHAR(40),\n    LastName       \
    \ VARCHAR(100),\n    [Address]       VARCHAR(100),\n    City            VARCHAR(100),\n\
    \    PostalCode      VARCHAR(20),\n    Country         VARCHAR(75),\n    IsActive\
    \        BIT,\n    DateCreated     DATETIME2(2),\n    DateModified    DATETIME2(2),\n\
    \    DateDisabled    DATETIME2(2)\n);\n-- Insert results from dbo.GetCustomer\
    \ into table variable\nINSERT INTO @CustomerList\n(\n    CustomerID,\n    FirstName,\n\
    \    LastName,\n    [Address],\n    City,\n    PostalCode,\n    Country,\n   \
    \ IsActive,\n    DateCreated,\n    DateModified,\n    DateDisabled\n)\nEXECUTE\
    \ [dbo].[GetCustomer];\n-- Get count of customers that are inactive\n---- The\
    \ unit test will pass if there are no inactive customers\n---- The unit test will\
    \ fail if there are inactive customers\nSELECT CustomerID\nFROM @CustomerList\n\
    WHERE IsActive = 0;\n```\n\n### Listing 11-4\n### Code to Run the Unit Test\n\n\
    You first create a table variable. The next section of the unit test inserts the\
    \ results from the stored procedure `dbo.GetCustomer` into the table variable.\
    \ The final step is to select only the inactive records from the table variable.\
    \ Once you add the preceding code to `UnitTestGetCustomer.cs` and save the file,\
    \ you are ready to run your first unit test. You can go to the `Test` menu to\
    \ run the unit tests as shown in Figure [11-7](#480547_2_En_11_Chapter.xhtml#Fig7).\n\
    \n![](images/480547_2_En_11_Chapter/480547_2_En_11_Fig7_HTML.jpg)"
  raw: 'The top portion of the window allows you to select which objects should be
    used to create unit tests. For this example, let’s work on creating a new unit
    test for the `dbo.GetCustomer` stored procedure. You are also creating your first
    unit test associated with this database project. You can select that you want
    to create a new Visual C# test project. However, you do not need to know C# to
    start creating your own unit tests in Visual Studio. Give this new project a name
    and create a new class. You can reuse this class for other unit tests going forward.


    Once you select OK on the dialog window, you will get another pop-up, as shown
    in Figure [11-3](#480547_2_En_11_Chapter.xhtml#Fig3).


