    SET Address = ''123 Main Street''

    WHERE CustomerID = 1;

    清单 3-9

    更新数据的简单查询

    ```


    你还可以看到我始终在运算符前后留出空格。我在几个例子中都这样做了。就像我为格式化所做的其他决定一样，我相信在等号前后添加空格可以提高 T-SQL 代码的可读性。我还包含了清单
    3-10 来展示如何在 T-SQL 中格式化删除数据。


