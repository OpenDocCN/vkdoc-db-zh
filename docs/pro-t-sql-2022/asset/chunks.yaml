  trans: '

    在图 8-8 中，存在的物理运算符与图 8-6 中的相同。然而，实际处理的行数与估计的行数存在显著差异。在图 8-8 的情况下，几乎所有的步骤都被严重高估了。尽管如此，由于使用了自适应联接，清单
    8-8 中的查询仍然会受益于其性能优势。


    虽然当一个查询可能因提供的参数不同而受益于使用哈希联接或嵌套循环联接时，自适应联接会很有用，但也存在其他查询，其中表内数据分布不均可能影响查询性能。SQL
    Server 2022 针对这类场景有一个新功能，称为参数敏感计划优化。当 SQL Server 尝试创建执行计划时，它会评估与参数关联的表，以确定是否存在分布不均的情况。如果发现任何不均，PSP
    允许 SQL Server 创建最多三个执行计划来适应不同的数据分布。例如，如果你为 `ProductID` 1 执行存储过程 `dbo.GetCustomerAndOrderNumberByProductID`，其数据分布与为
    `ProductID` 4 执行该过程时不同。借助 PSP，SQL Server 可以在计划缓存中为 `ProductID` 1 和 `ProductID`
    4 分别保存一个不同的执行计划。研究这些不同执行计划的一种方法是使用本章前面讨论过的查询存储。


    你可以通过多种方式致力于优化 T-SQL 代码。除非你正在测试一个新查询，通常第一步是识别需要优化的 T-SQL 代码。确定需要优化的查询后，你可能希望分析执行计划，以帮助确定是否有某个步骤明显需要优化。你可能还想分析与查询相关的信息，例如平均逻辑读取次数或平均执行时间。结合这些信息可能有助于你确定可以调整什么来提升性能。


    此外，SQL Server 中有一些功能可以帮助自动使你的 T-SQL 代码运行得更好。这包括允许 SQL Server 分析新的执行计划，并确认其性能优于之前的执行计划。如果预期之前的执行计划性能更佳，SQL
    Server 可以确保自动选择该计划。如果你使用的是 Azure SQL Database，在管理索引方面也有一个类似的选项可用。自适应联接的使用使 SQL
    Server 能够让你的执行计划更加灵活。当自适应联接是执行计划的一部分时，SQL Server 可以根据特定查询执行时传递的值来决定使用正确的物理运算符。无论你是手动优化
    T-SQL 代码，还是让 SQL Server 决定如何改进查询执行，你都有多种可用的工具来确保你的 T-SQL 代码运行得更好。


    # 9. 编码标准


    标准化代码库的优势之一是，无论作者是谁，它都将增强我们阅读和理解该代码的能力。你也可以将标准化理解为让每个人都遵循规则，这不仅体现在格式上，还体现在组织内预期或不允许的代码元素方面。标准化命名数据库对象的另一个好处是，它可以帮助提高你和你的团队快速找到你正尝试调试的特定
    T-SQL 代码部分的速度。


    在本章中，我将讨论实施编码标准的各种优势。我还将介绍在定义标准时应考虑哪些类型的因素。在制定标准时，你还需要确定如何实施这些编码标准。我将涵盖设立这些标准所需的基本流程。

    '
- fmt: '## Why Use Coding Standards


    There are many different things you can do to improve your code quality. When
    improving your code quality, you want to think about your end goal. I want my
    `T-SQL` code to run efficiently, be able to be debugged quickly, and be easy to
    understand. This is often the result of creating consistency in how you design
    and write your `T-SQL` code. One option is to implement coding standards.


    Oftentimes, there are specific `T-SQL` practices that you know you want people
    to follow. Some of these behaviors are easily agreed upon and most people use
    them by default. However, there can be other `T-SQL` best practices that you know
    are not common in general or in your organization. You want to create a set of
    guidelines that allows everyone to easily know what they should be doing.


    There are also certain things that you know you do not want to see in `T-SQL`
    code no matter the reason. Once again, some of these topics are not common, but
    others may also be pervasive. Either way, you want to clearly define this all
    as part of your coding standards. Using coding standards can minimize the back
    and forth regarding what types of `T-SQL` code are allowed or preferable vs. other
    code.


    You can use coding standards to set boundaries for what is and is not allowed.
    I have come across times where software engineers or database developers want
    to use specific `T-SQL` because it is easier to read and write. However, there
    are times where the `T-SQL` code that makes sense easily to a human does not perform
    as well with `SQL Server`. While I want those same individuals to be able to come
    to me to ask questions about the current process, there are times where I have
    too many higher priority requests, and I do not have time to address their concerns.


    It''s nice to have these guidelines agreed on before their absence leads to conflict.
    This also should provide some reassurance that each topic has been discussed and
    multiple parties have come to the same conclusion that certain `T-SQL` code is
    either performing well for many scenarios or could be at a high risk to cause
    performance issues.


    I know when I come into work my day is already full. Not only from the things
    I know I need to do but from the last-minute requests and one-off questions. The
    real goal of implementing coding standards is to make your life easier. This includes
    being able to rest easy knowing that quality `T-SQL` code is in your database.
    Ideally, you should be able to spend that time working on future database design
    enhancements or getting rid of technical debt.


    Another factor affecting our lives is decision fatigue. This is the concept where
    a person gets worn down having to make decision after decision throughout the
    day. With the advent of technology, we experience that kind of fatigue every day.
    When it comes to making decisions regarding `T-SQL` coding, this type of decision
    fatigue can be even more overwhelming. There are many ways to accomplish the same
    thing in `SQL Server`. One of the other advantages to implementing `T-SQL` coding
    standards is that it can minimize the decisions a database developer needs to
    make when writing new code.


    When you first implement coding standards, make sure to get buy-in from all parties.
    In many cases, you will not be able to have a unanimous decision. If you can,
    get a majority vote for any change you would like included in the coding standards.
    Another method is to make sure every individual agrees on the final standard before
    those standards are approved and implemented.


    One of the main challenges with `T-SQL` in the workplace is that many of the people
    who are responsible for writing `T-SQL` are not database experts. This can cause
    frustration, and it can also contribute to poorly performing queries. One of the
    nicest and hardest aspects about `T-SQL` is how easy it is to write your first
    query. `SQL` is an abbreviation for Structured Query Language, and that is how
    simple queries are written. You can read them almost like a sentence.


    However, this can give the false impression that what is happening with `SQL Server`
    behind the scenes is also simple. Most of us work in a high-stress, fast-paced
    environment. This often means we do not have time to stop and explain every decision
    we make. This can include why certain `T-SQL` code should not be used. This is
    where the strength of `T-SQL` coding standards really shines. It allows you to
    have the conversation once to set up the ground rules. After those rules or standards
    are in place, `T-SQL` developers and engineers can write their code in any way
    they want if it meets the predefined standards.


    I have heard software developers say that having defined coding standards when
    writing applications can be very helpful. It allows them to easily jump into any
    code, whether they wrote it or not, and immediately feel comfortable. This is
    because while they may know they have never looked at this set of code, their
    brain already sees similarities with other code they have written. It gets rid
    of the instantaneous response that the code they are looking at is not theirs.
    The benefit is that they can immediately jump into reviewing the code or making
    the necessary changes.


    Now that you have determined that you want to define coding standards, the next
    step is to implement these coding standards. This is where things can get tricky.
    It will be tempting to want every `stored procedure` that goes through `script
    review` to adhere to these standards. However, some of the code you will see is
    already out in Production. I have found there are times, especially when others
    are under strict deadlines, that it is especially frustrating when a `stored procedure`
    is rejected merely because it does not follow coding standards.


    A possible compromise is to give a conditional approval and request that a new
    `user story` be created so that the `T-SQL` code can be updated to fit the new
    coding standards. This gives the developer reassurance that they can meet the
    deadlines of their current `sprint`, and it also lets you know that this `T-SQL`
    code should be corrected in a future release to meet coding standards.


    An easy way to handle these new `user story` items is to add them to the following
    `sprint`. This allows them to get cleaned up while you still remember what needs
    to be changed. This also makes sure that the others performing `script review`
    know that the effort to get all `T-SQL` code compliant with the coding standards
    is important to all parties.


    ## What to Include in Coding Standards


    Ideally, coming up with coding standards will provide you with a framework that
    minimizes your overall challenges with reviewing and deploying `T-SQL` code. You
    want coding standards to cover how `T-SQL` code should look, how `T-SQL` code
    should function, how `T-SQL` code should perform, and how `T-SQL` code should
    be understood.


    Some of the basics of coding standards have already been discussed in Chapter
    [4](#480547_2_En_4_Chapter.xhtml). This includes formatting `T-SQL` code by creating
    standards as to how the `T-SQL` is written. You will also want standards indicating
    how to name `T-SQL` database objects. It is also useful to have standards indicating
    how `T-SQL` code should be commented.


    ### T-SQL Design


    You can also define database design through coding standards. This can include
    how database objects should be organized including schemas. Coding standards can
    also indicate how data should be stored in the database. You can indicate what
    types of columns should be included in primary keys. It is also possible to indicate
    how tables should be clustered or when it is best to use clustered or non-clustered
    indexes.'
