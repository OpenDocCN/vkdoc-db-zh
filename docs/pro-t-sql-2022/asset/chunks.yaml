  trans: "\n## 1. 代码执行与错误处理\n\n例如，如果你执行了代码清单 14-4 中的 T-SQL 代码，你将创建一个插入操作会失败的情景。\n\n\
    ```sql\nALTER TABLE [dbo].[CustomerOrder] WITH CHECK\nADD CONSTRAINT [FK_CustomerOrder_Customer]\n\
    FOREIGN KEY([CustomerID])\nREFERENCES [dbo].[Customer] ([CustomerID]);\nDECLARE\
    \ @Date DATETIME2(2) = CAST(SYSDATETIME() AS DATETIME2(2))\nEXEC dbo.CustomerOrderInsert\n\
    \    @CustomerID = 50000000,\n    @OrderNumber = 12345,\n    @OrderDate = @Date,\n\
    \    @ShipDate = NULL,\n    @IsActive = 1,\n    @DateCreated = @Date,\n    @DateModified\
    \ = @Date,\n    @DateDisabled = NULL;\n```\n**代码清单 14-14**\n执行带有 TRY…CATCH 和错误消息的存储过程\n\
    \n此代码将会失败，因为 `CustomerID` 50000000 在表 `dbo.Customer` 中不存在。此失败源于外键约束。代码清单 14-4\
    \ 中查询的输出结果如表 14-7 所示。\n\n**表 14-7**\n\n来自 TRY…CATCH 的错误输出\n\n| 错误编号 | 错误级别 | 错误状态\
    \ | 错误过程 | 错误消息 |\n| --- | --- | --- | --- | --- |\n| 547 | 16 | 0 | dbo.CustomerOrderInsert\
    \ | INSERT 语句与 FOREIGN KEY 约束\"FK_CustomerOrder_Customer\"冲突。该冲突发生于数据库\"OutdoorRecreation\"\
    ，表\"dbo.Customer\"，列'CustomerID'。 |\n\n该表确认插入操作因外键约束而未执行。然后用户可以修正值以提供一个有效的 `CustomerID`，或者用户可能决定不需要此更改。\n\
    \n## 2. 状态追踪与错误日志\n\n你可能会发现你的应用程序能够毫无问题地写入或更新数据库中的数据。然而，你可能有一个进程负责将数据从一个系统发送到另一个系统。可能存在基础设施问题或数据类型不一致，这些都可能导致数据从一个数据库对象发送到另一个时失败。你需要确定应如何处理这些错误。你仍然希望有一种方法来处理这些失败，但你可能还需要更即时的报告，表明这些记录未能发送或接收。当今业务要求持续的正常运行状态和成功的交互。你可以通过记录尝试处理数据时失败的方式来控制你响应这些问题的有效性。\n\
    \n存储需要通过系统移动的信息的数据库表通常在数据表中存储一个状态类型列。无论何种进程更新记录状态，都可能在更新记录状态或将记录状态更新为失败状态时出现问题。当表中数据量不大时，查找这些失败的记录可能很容易。通常需要搜索那些在指定时间段内状态未改变，或者处于失败或错误状态的记录。\n\
    \n根据你如何使用客户订单信息，你可能希望记录每个客户订单的准备时间。你可能有一个应用程序，允许你指示客户订单何时开始和完成。此信息可以通过客户订单状态来记录。你需要创建一个表来指示客户订单历史状态。一个信息示例可以在表\
    \ 14-8 中找到。\n\n**表 14-8**\n\n`dbo.CustomerOrderHistoryStatus` 表中的数据\n\n| 客户订单历史状态\
    \ ID | 客户订单历史状态名称 | 是否有效 | 创建日期 | 修改日期 |\n| --- | --- | --- | --- | --- |\n| 1\
    \ | 已开始 | True | 2023-02-12 | 2023-02-13 |\n| 2 | 已完成 | True | 2023-02-13 | 2023-02-13\
    \ |\n| 3 | 已取消 | True | 2023-02-13 | 2023-02-13 |\n| 4 | 错误 | True | 2023-02-13\
    \ | 2023-02-13 |\n\n此表包含当有人开始准备客户订单时可用的状态。为了记录每次客户订单准备的实例，你需要创建一个表来存储有关每个客户订单何时准备的信息。有几种方式可以记录这一点。就本章而言，让我们在每次客户订单开始时创建一条记录。一旦客户订单开始，该订单最终可能处于已完成、已取消或错误状态。用于存储客户订单历史的查询可以在代码清单\
    \ 14-5 中找到。\n\n```sql\nCREATE TABLE dbo.CustomerOrderHistory\n(\n    CustomerOrderHistoryID\
    \        INT           NOT NULL,\n    CustomerOrderID               INT      \
    \     NOT NULL,\n    CustomerOrderHistoryStatusID  TINYINT       NOT NULL,\n \
    \   DateCreated                   DATETIME2(2)  NOT NULL,\n    DateModified  \
    \                DATETIME2(2)      NULL,\n    CONSTRAINT PK_CustomerOrderHistory_CustomerOrderHistoryID\n\
    \        PRIMARY KEY CLUSTERED (CustomerOrderHistoryID),\n    CONSTRAINT FK_CustomerOrderHistory_CustomerOrder\n\
    \        FOREIGN KEY (CustomerOrderID)\n        REFERENCES dbo.CustomerOrder(CustomerOrderID),\n\
    \    CONSTRAINT FK_CustomerOrderHistory_CustomerOrderHistoryStatus\n        FOREIGN\
    \ KEY (CustomerOrderHistoryStatusID)\n        REFERENCES dbo.CustomerOrderHistoryStatus(CustomerOrderHistoryStatusID)\n\
    );\n```\n**代码清单 14-15**\n创建 `dbo.CustomerOrderHistory` 表\n\n此表可以存储每个客户订单开始的唯一时间。存储在此表中的数据示例可以在表\
    \ 14-9 中找到。\n\n**表 14-9**\n\n`dbo.CustomerOrderHistory` 表中的数据\n\n| 客户订单历史 ID |\
    \ 客户订单 ID | 客户订单历史状态 ID | 创建日期 | 修改日期 |\n| --- | --- | --- | --- | --- |\n| 1\
    \ | 1 | 2 | 2023-02-13 | 2023-02-13 |\n| 2 | 1 | 3 | 2023-02-13 | 2023-02-13 |\n\
    | 3 | 3 | 4 | 2023-02-13 | 2023-02-13 |\n| 4 | 4 | 1 | 2023-02-13 | 2023-02-13\
    \ |\n\n表 14-9 中的记录指示了已开始的客户订单及其各种状态。第一条记录是 `CustomerOrderID` 为 1 的订单，状态为已完成。第二条记录是\
    \ `CustomerOrderID` 为 1 的订单，状态为已取消。第三条记录是 `CustomerOrderID` 为 3 的订单，状态为错误。显示的最后一条记录是\
    \ `CustomerOrderID` 为 4 的订单，状态为已开始。\n\n当任何记录出现错误时，这些记录在 `dbo.CustomerOrderHistory`\
    \ 表中的 `CustomerOrderHistoryStatusID` 将为 4。最初，此表中的数据量不会很大，因此很容易在该表中找到最近的错误记录。然而，随着时间的推移，此表将增长到相当大的规模。这可能导致\
    \ `SQL Server` 为了查找任何最近的错误记录而需要搜索许多记录。如果你预计 `dbo.CustomerOrderHistory` 表会增长到难以搜索的大小，你可能需要以不同的方式实现错误日志记录。在其他场景中，你可能希望保留所有处于错误状态的有错误记录，但你也希望能够解决最近出错记录的问题。\n\
    \n在这两种场景中，创建一个专门用于记录最近错误记录的表可能是有益的。在创建此表之前，你可能还需要考虑如何长期管理此表。与 `dbo.CustomerOrderHistory`\
    \ 表不同，你希望确保此新表不会变得太大。你还希望仅在此表中保留最近的错误记录。在表中保持少量记录可以使表易于搜索。此新表的目标仅是提醒用户任何最近的错误记录。考虑到此表的目的，你还需要设计一个进程来定期清除该表中的数据。\n"
- fmt: 'If you choose to create an additional logging table for error records, you
    may end up creating a table like the one in Listing 14-16.


    ```

    CREATE TABLE dbo.CustomerOrderHistoryLog

    (

    CustomerOrderHistoryLogID INT             NOT NULL,

    CustomerOrderHistoryID    INT             NOT NULL,

    DateCreated               DATETIME2(2)    NOT NULL,

    DateModified              DATETIME2(2)    NULL,

    CONSTRAINT PK_CustomerOrderHistoryLog_CustomerOrderHistoryLogID

    PRIMARY KEY CLUSTERED (CustomerOrderHistoryLogID),

    CONSTRAINT FK_CustomerOrderHistoryLog_CustomerOrderHistoryID

    FOREIGN KEY (CustomerOrderHistoryID)

    REFERENCES dbo.CustomerOrderHistory(CustomerOrderHistoryID)

    );

    Listing 14-16

    Creating the dbo.CustomerOrderHistoryLog Table

    ```


    Any errors on the `dbo.CustomerOrderHistory` table can have a corresponding record
    entered to the table in Listing 14-16. In Table 14-9, there was an error record
    for `CustomerOrderHistoryID` 2. If you had created the table in Listing 14-16
    before that error record was created, you might find an entry like the one in
    Table 14-10.


    Table 14-10


    Data Within the `dbo.CustomerOrderHistoryLog` Table


    | CustomerOrder HistoryLogID | CustomerOrder HistoryID | DateCreated | DateModified
    |

    | --- | --- | --- | --- |

    | 1 | 2 | 2023-02-13 | 2023-02-13 |


    Once you have a record in the `dbo.CustomerOrderHistoryLog` table, you can generate
    an alert based on the existence of a record in this table. One option is to have
    a stored procedure that is executed every 15 minutes. The purpose of this stored
    procedure may be to generate an email if there are any records found in the `dbo.CustomerOrderHistoryLog`
    table. If you choose this method to create your alerts, make certain that you
    remove data from this table regularly. In this case, you also need a stored procedure
    to regularly remove data from this table.


    Regardless of which method you choose to implement logging errors between your
    applications and SQL Server, you should make sure that these errors are tracked
    somewhere that can be accessible to multiple parties. One of the more difficult
    issues to troubleshoot is when there is no logging available. The goal of logging
    errors related to SQL Server is to allow individuals within your organization
    to quickly find where issues are occurring so that they can resolve them efficiently.
    You may choose to implement most of your error handling from the application.
    However, it may be possible to generate automated reports from within SQL Server
    for errors that need to be corrected promptly.


    As part of your application development, you want to consider what type of logging
    is necessary for your organization. In industries where there is the possibility
    for greater theft, it may be more important to track when a data modification
    occurs and who modified the data. The information needed will determine what type
    of logging you implement for data modifications. You also want to consider how
    to manage errors associated with the database. These are not errors that are specific
    to SQL Server but are errors that occur as a result of the T-SQL code that has
    been written for use by your applications. After determining how to manage logging
    for your application, you may want to consider how to design your T-SQL code to
    be reusable.


    # 15. Enhancement


    This chapter continues the focus on building maintainable T-SQL. There are many
    times when you need to update a database schema to add new application functionality.
    The first section gives several examples you can use to implement changes to existing
    database objects. The second section highlights some challenges you may experience
    while trying to phase out poor database design or deprecated functionality.


    ## Adding New Functionality


    Ideally, adding functionality to existing applications is a regular part of software
    development. This section discusses options for how you can add functionality
    to existing applications while keeping existing functionality. For the purposes
    of this book, I will use application rules to reference the ability to enable
    functionality by updating values stored in a database table. This method will
    not require any application or code changes. However, feature flags will be used
    to refer to when functionality is enabled through how data is passed to SQL Server,
    including the use of parameters. If you are adding functionality by adding data
    to tables, row-level security may allow you to control when the new functionality
    goes live. You can also use triggers if you need to add new functionality for
    recording log or historical information about your data. Other options to implement
    logging are covered in Chapter 14.'
