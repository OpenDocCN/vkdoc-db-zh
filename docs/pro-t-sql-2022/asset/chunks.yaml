    **清单 18-1：查找标识为敏感数据的列**


    此查询的结果包括架构名称、表名、列名、信息类型和敏感度标签。表 18-1 显示了清单 18-1 中查询的这些值。


    ### 表 18-1：查看标记为敏感的列


    | 架构名称 | 表名 | 列名 | 信息类型 | 敏感度级别 |

    | --- | --- | --- | --- | --- |

    | dbo | Customer | Address | Contact Info | Confidential |


    如前所述，`Customer` 表中的 `Address` 列的敏感度标签为“机密”。查询还显示 `Customer` 表位于 dbo 架构中，`Address`
    列的信息类型为“联系信息”。'
- fmt: '### Data Discovery and Classification in Azure


    While data discovery and classification is also available in Azure SQL Database,
    Azure SQL Manager Instance, and Azure Synapse Analytics, the implementation and
    management is in the Azure portal.


    To access or setup data discovery and classification, go to the SQL database (or
    other Azure SQL resource). Under Security, you will find a section for Data Discovery
    & Classification as shown in Figure [18-11](#480547_2_En_18_Chapter.xhtml#Fig11).


    ![A screenshot presents the options under security. The options are auditing,
    ledger, data discovery and classification, dynamic data masking, Microsoft Defender
    for Cloud, and transparent data encryption. Data discovery and classification
    is highlighted.](images/480547_2_En_18_Chapter/480547_2_En_18_Fig11_HTML.jpg)

    Figure 18-11: Accessing the Data Discovery & Classification section in Azure


    SQL Server and Azure support the same two protection policies but choosing and
    managing the protection policies in Azure is easier than on SQL Server. Figure
    [18-12](#480547_2_En_18_Chapter.xhtml#Fig12) shows how you can manage or change
    the protection policy by clicking Configure.


    ![A screenshot presents options under security on the left panel. Data discovery
    and classification is highlighted. The right panel has export, configure, and
    feedback options on the top. Below is a piece of information that says, currently
    using S Q L information protection policy.](images/480547_2_En_18_Chapter/480547_2_En_18_Fig12_HTML.jpg)

    Figure 18-12: Accessing the protection policy


    In addition to managing the protection policy, adding data classification labels
    is also managed on the Azure Portal. By selecting the Classification tab, as shown
    in Figure [18-13](#480547_2_En_18_Chapter.xhtml#Fig13), you can classify and label
    your sensitive data.


    ![A screenshot presents the top bar with 4 options. Below are 2 lines of a piece
    of information. There are 2 tabs among which classification is selected. There
    are drop-downs to select scheme, table, filter, information type, and sensitivity
    label. Add classification tab is at the bottom center.](images/480547_2_En_18_Chapter/480547_2_En_18_Fig13_HTML.jpg)

    Figure 18-13: Adding data classification


    Identifying, labeling, categorizing, and reporting on sensitive data can be an
    effective first step to improving data governance as it pertains to security.
    In addition, once you have identified all the sensitive columns, you can start
    making decisions about how you want to handle this data as it pertains to user
    access. In the following sections, I will discuss how you can obfuscate the columns
    or hide rows entirely based upon user permissions.


    ## Dynamic Data Masking


    In the Dynamic Data Masking section, I will go over the purpose, types, and implementations
    of dynamic data masking. Masking allows us to partially obfuscate data when we
    present it to certain users. This is different than encrypting the data. Masking
    an email address could turn `ENoble@MyWebsite.com` into `EN***@**ite.com` for
    users that aren’t allowed to have access to actual email addresses. Those same
    users might only view the last four digits of a government ID number. I will also
    cover some challenges you may encounter when trying to implement dynamic data
    masking.


    As discussed in the previous section, there may be data columns in your databases
    that contain information of varying levels of sensitivity. In many cases, you
    may not want all users to be able to access this data directly. There are situations
    when you can’t limit access to the entire table because there are columns that
    the users need to be able to access. By using dynamic data masking, you can grant
    access to the entire table, but limit what can be returned in sensitive columns.
    Using a function on a column in a table, you can specify the type of masking you
    want to implement for any columns that have sensitive data. The types of masking
    available are as follows:


    *   Default: `default()`

    *   Email: `email()`

    *   Random: `random([start range], [end range])`

    *   Custom: `partial(prefix, [padding], suffix)`

    *   Datetime: `datetime("<time interval")`


    With default data masking, SQL Server uses specific default values depending on
    the data type of the column. The email data masking function shows the first letter
    of the email address and the .com at the end for any string that ends in .com.
    The random data making function allows you to specify a range. The values displayed
    will be returned at random. If you want to create your own masking logic, you
    can use the custom masking function. The partial masking allows you to select
    how many characters of the original data type you would like unmasked for the
    beginning and the end of the mask. The padding in the middle is used to indicate
    your preferred mask to implement.


    SQL Server 2022 introduces the ability to use the datatime masking function. This
    function is intended to mask the data to show the year, month, date, hour, minute,
    or second of the column selected. The supported data types for the datetime function
    include `DATETIME`, `DATETIME2`, `DATE`, `TIME`, `DATETIMEOFFSET`, or `SMALLDATATIME`.
    In order to specify the masking method for the column, you need to use the following
    values for the time interval in the datatime masking function:


    *   Year: Use “Y” as the time interval.

    *   Month: Use “M” as the time interval.

    *   Day: Use “D” as the time interval.

    *   Hour: Use “h” as the time interval.

    *   Minute: Use “m” as the time interval.

    *   Second: Use “s” as the time interval.


    To create a table with dynamic data masking, Listing [18-2](#480547_2_En_18_Chapter.xhtml#PC2)
    includes the T-SQL to use a masking function on the Address column.


    ```

    CREATE TABLE [dbo].[Vendor](

    [VendorID]         INT    IDENTITY(1,1)             NOT NULL,

    [CompanyName]      VARCHAR(100)                     NOT NULL,

    [Address]          VARCHAR(100)

    MASKED WITH (FUNCTION = ''partial(1, "xxxx", 2)'')

    NOT NULL,

    [City]             VARCHAR(100)                     NOT NULL,

    [PostalCode]       VARCHAR(20)                          NULL,

    [Country]          VARCHAR(75)                      NOT NULL,

    [EmailAddress]     VARCHAR(100)

    MASKED WITH (FUNCTION = ''email()'')

    NOT NULL,

    [IsActive]         BIT

    CONSTRAINT DF_Vendor_IsActive    DEFAULT 1    NOT NULL,

    [DateCreated]      DATETIME2(2)

    CONSTRAINT DF_Vendor_DateCreated DEFAULT GETDATE()

    NOT NULL,

    [DateModified]     DATETIME2(2)

    CONSTRAINT DF_Vendor_DateModified DEFAULT GETDATE()

    NOT NULL,

    [DateDisabled]     DATETIME2(2)                         NULL,

    CONSTRAINT [PK_Vendor] PRIMARY KEY CLUSTERED ([VendorID] ASC)

    );

    Listing 18-2: Creating a Table with Dynamic Data Masking

    ```'
