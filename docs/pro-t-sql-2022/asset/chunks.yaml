  raw: '### Indexed View


    I covered how views can be used to simplify writing queries, to modify data, and
    to protect database schemas. I also covered how reusing views to create other
    views can cause significant performance issues. As you saw in the previous section,
    views can help make T-SQL simpler, but the execution plan is the same for both
    the ad hoc query and the view. In some instances, there are joins that do not
    perform well either as a query or a view.


    If you have a view that is misbehaving, your first step should always be to tune
    the view by fixing bad joins and such. If that’s off limits or doesn’t work, step
    2 should be adding indexes to the underlying tables. Only if these steps fail
    (or aren’t allowed because of some rules) should you explore indexed views. When
    adding indexes to a view, the view is then considered an indexed view. The first
    index added to a view must be a unique clustered index. After a clustered index
    has been added, non-clustered indexes can also be added to the view. However,
    there is a cost associated with adding indexes to a view. Each time data is modified,
    the indexes on any related table and the indexed view must also be updated.


    The first step in creating an indexed view is to create a view with schema binding.
    In this example, I will be using the view created in Listing [2-2](#480547_2_En_2_Chapter.xhtml#PC2).
    The next step is to add an index to this view. In Listing [2-12](#480547_2_En_2_Chapter.xhtml#PC12),
    I add a clustered index to this view.


    ```

    CREATE UNIQUE CLUSTERED INDEX CX_vwCustomerOrderBound_FullNameCustomerOrderID

    ON dbo.vwCustomerOrderBound (FullName, CustomerOrderID);

    Listing 2-12

    Adding a Clustered Index to a View

    ```


    Comparing the performance between the view before adding a clustered index and
    after shows an improvement in performance overall. Remember that while there are
    situations where indexed views can help performance when pulling back the data,
    there can still be performance issues that happen when data is inserted, updated,
    or deleted on the affected tables. In Figure [2-5](#480547_2_En_2_Chapter.xhtml#Fig5),
    the execution plan is displayed for when data is inserted into the base table.


    ![](images/480547_2_En_2_Chapter/480547_2_En_2_Fig5_HTML.jpg)


    A screenshot contains the execution plan view at the top and a base table at the
    bottom. The node with the clustered index insert is highlighted. The clustered
    index insert table at the bottom contains 0 for actual rebinds, actual rewinds,
    and node I D.


    Figure 2-5


    Execution plan for an insert into the base table


    As shown above, there is an extra step where the index on the view is updated
    as part of the insert into the base table.


    ## Functions


    In many applications, there are core parts of the functionality that may be recalculated
    or reused several times. Sometimes you may want to write some simple piece of
    code once and reuse that code throughout various other database objects. There
    are other situations where you may want to take complex logic and create a database
    object that encompasses that logic and returns the required results. This could
    be done to make T-SQL code appear less complex and therefore less overwhelming.
    Either way, functions can help you simplify your T-SQL code.


    ### Scalar Functions


    You may find yourself in a situation where you need to rerun the same portion
    of code in many different scenarios. You may be finding a configuration value,
    or you may want to rerun the same basic logic in many different parts of your
    code where only one value is returned. When you want to pass zero or more parameters
    and you only want to return a single value, you may be able to use a scalar function.
    However, consider the potential cost of using a scalar function.


    Prior to SQL Server 2019, scalar functions were optimized very differently. Historically,
    SQL Server did not include cost-based optimization on scalar functions. This often
    meant that scalar functions were not included as part of the execution plan. Now
    that SQL Server 2019 has implemented additional features as part of the intelligent
    query processing, including scalar user-defined function (UDF) inlining, the queries
    that reference functions are improved because the estimates are better.


    An inline function is one that can be included as part of the execution plan.
    One of the largest advantages of inlining scalar UDFs is the significantly improved
    performance when it comes to using scalar UDFs. When wanting to simplify complex
    processes and reuse code, scalar UDFs are the ideal option when the function only
    needs to return one result.


    The difference between scalar UDFs between prior versions of SQL Server and SQL
    Server 2019 in terms of performance is significant. To compare these execution
    plans, let’s change the compatibility mode at the database level to match that
    of SQL Server 2017 and SQL Server 2019\. By using compatibility mode 140 as the
    optimizer, it works like SQL Server 2017. Putting the compatibility mode of the
    data to 160 uses the optimizer available in SQL Server 2022\. Listing [2-13](#480547_2_En_2_Chapter.xhtml#PC13)
    shows the code necessary to create a scalar UDF in T-SQL.


    ```

    CREATE FUNCTION dbo.ProductTotal

    (

    @Quantity     SMALLINT,

    @ProductPrice DECIMAL(6,2)

    )

    RETURNS DECIMAL (8,2) AS

    BEGIN

    RETURN @Quantity * @ProductPrice;

    END;

    Listing 2-13

    Creating a Scalar UDF

    ```


    When executing the preceding function in compatibility mode 140, the execution
    plan ends up appearing to be simpler than the execution plan generated in compatibility
    mode 160\. Listing [2-14](#480547_2_En_2_Chapter.xhtml#PC14) shows the code in
    compatibility modes 140 and 160.


    ```

    SELECT ord.CustomerID,

    ord.CustomerOrderID,

    SUM(dbo.ProductTotal(dtl.QuantitySold, dtl.ProductPrice)) AS LineItemTotal

    FROM dbo.CustomerOrder ord

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    GROUP BY ord.CustomerID,

    ord.CustomerOrderID;

    Listing 2-14

    Code to Execute Function

    ```


    In order to simulate the behavior of SQL Server 2017, change the compatibility
    mode of the database to 140\. The T-SQL code needed to change the compatibility
    mode is in Listing [2-15](#480547_2_En_2_Chapter.xhtml#PC15).


    ```

    ALTER DATABASE OutdoorRecreation

    SET COMPATIBILITY_LEVEL = 120;

    Listing 2-15

    Change Database Compatibility Mode to SQL Server 2014

    ```


    The query in Listing [2-16](#480547_2_En_2_Chapter.xhtml#PC16) allows us to force
    SQL Server to generate new execution plans for all queries using compatibility
    level 140.


    ```

    DBCC FREEPROCCACHE;

    Listing 2-16

    Clear Execution Plan for Query from Listing 2-14

    ```


    It is important to note that the preceding T-SQL code should not be run in your
    Production environments. This code will cause SQL Server to use additional resources
    to determine how every query should be run the first time the query is called.
    I saved the actual execution plan from running the preceding query using compatibility
    mode 140\. You can find this actual execution plan in Figure [2-6](#480547_2_En_2_Chapter.xhtml#Fig6).


    ![](images/480547_2_En_2_Chapter/480547_2_En_2_Fig6_HTML.jpg)


    A flow diagram. Select has a cost of 0% and is from merge join. It is from clustered
    index scans, compute scalar, that is from stream aggregate, and from clustered
    index scan.


    Figure 2-6'
  trans: '## 索引视图


    我已介绍了视图如何用于简化查询编写、修改数据以及保护数据库模式。同时，我也阐述了通过复用视图来创建其他视图可能导致严重的性能问题。正如你在上一节所见，视图有助于简化
    T-SQL，但对于临时查询和视图，其执行计划是相同的。在某些情况下，某些连接操作无论是作为查询还是视图，性能表现都不佳。


    如果你遇到一个行为不佳的视图，第一步应该是通过修正不良连接等方式来优化视图。如果此路不通或无效，第二步应该是向基础表添加索引。只有当这些步骤失败（或由于某些规则不允许）时，你才应考虑探索索引视图。当向视图添加索引后，该视图即被视为索引视图。向视图添加的第一个索引必须是唯一的聚集索引。添加聚集索引后，还可以向视图添加非聚集索引。然而，向视图添加索引会带来一定的成本。每次数据修改时，相关表上的索引以及索引视图也必须随之更新。


    创建索引视图的第一步是创建一个使用了`WITH SCHEMABINDING`子句的视图。在此示例中，我将使用清单 2-2 中创建的视图。下一步是向此视图添加索引。在清单
    2-12 中，我为此视图添加了一个聚集索引。


    ```

    CREATE UNIQUE CLUSTERED INDEX CX_vwCustomerOrderBound_FullNameCustomerOrderID

    ON dbo.vwCustomerOrderBound (FullName, CustomerOrderID);

    Listing 2-12

    向视图添加聚集索引

    ```


    比较添加聚集索引前后的视图性能，整体上显示出性能的提升。请记住，尽管在某些情况下，索引视图在检索数据时能提升性能，但在受影响的表上进行数据插入、更新或删除操作时，仍可能出现性能问题。在图
    2-5 中，显示了向基础表插入数据时的执行计划。


    ![](img/480547_2_En_2_Fig5_HTML.jpg)


    一幅截图，上方是执行计划视图，下方是一个基础表。带有聚集索引插入操作的节点被高亮显示。下方的聚集索引插入表中，实际重新绑定、实际重绕和节点 ID 的值均为
    0。


    图 2-5

    向基础表插入数据的执行计划


    如上所示，作为向基础表插入操作的一部分，存在一个额外的步骤来更新视图上的索引。


    ## 函数


    在许多应用程序中，核心功能部分可能需要多次重新计算或复用。有时，你可能希望一次性编写一段简单的代码，并在各种其他数据库对象中复用该代码。在其他情况下，你可能希望封装复杂的逻辑，创建一个包含该逻辑并返回所需结果的数据库对象。这样做可以使
    T-SQL 代码显得不那么复杂，从而降低其复杂度。无论哪种方式，函数都可以帮助你简化 T-SQL 代码。


    ### 标量函数


    你可能发现自己需要在许多不同场景中重新运行同一部分代码。你可能在查找一个配置值，或者你希望在代码的许多不同部分重新运行相同的基本逻辑，而这些部分只返回一个值。当你想要传递零个或多个参数，并且只希望返回单个值时，你可能会考虑使用标量函数。但是，请考虑使用标量函数的潜在成本。


    在 SQL Server 2019 之前，标量函数的优化方式非常不同。历史上，SQL Server 并未对标量函数进行基于成本的优化。这通常意味着标量函数不包含在执行计划中。既然
    SQL Server 2019 已作为智能查询处理的一部分实现了更多功能，包括标量用户定义函数（UDF）内联，那么引用这些函数的查询性能得到了改善，因为其估算更加准确。


    内联函数是能够被包含在执行计划中的一种函数。内联标量 UDF 的最大优势之一是在使用标量 UDF 时性能的显著提升。当需要简化复杂流程和复用代码，且函数仅需返回一个结果时，标量
    UDF 是理想的选择。


    早期版本的 SQL Server 与 SQL Server 2019 在标量 UDF 性能方面的差异是显著的。为了比较这些执行计划，让我们将数据库级别的兼容性级别分别更改为匹配
    SQL Server 2017 和 SQL Server 2019。通过使用兼容级别 140 作为优化器，其行为类似于 SQL Server 2017。将数据库的兼容级别设置为
    160 则使用 SQL Server 2022 中可用的优化器。清单 2-13 展示了使用 T-SQL 创建标量 UDF 所需的代码。


    ```

    CREATE FUNCTION dbo.ProductTotal

    (

    @Quantity     SMALLINT,

    @ProductPrice DECIMAL(6,2)

    )

    RETURNS DECIMAL (8,2) AS

    BEGIN

    RETURN @Quantity * @ProductPrice;

    END;

    Listing 2-13

    创建标量 UDF

    ```


    在兼容级别 140 下执行前述函数时，最终生成的执行计划看起来比在兼容级别 160 下生成的执行计划更简单。清单 2-14 展示了在兼容级别 140 和 160
    下的代码。


    ```

    SELECT ord.CustomerID,

    ord.CustomerOrderID,

    SUM(dbo.ProductTotal(dtl.QuantitySold, dtl.ProductPrice)) AS LineItemTotal

    FROM dbo.CustomerOrder ord

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    GROUP BY ord.CustomerID,

    ord.CustomerOrderID;

    Listing 2-14

    执行函数的代码

    ```


    为了模拟 SQL Server 2017 的行为，将数据库的兼容级别更改为 140。更改兼容级别所需的 T-SQL 代码如清单 2-15 所示。


    ```

    ALTER DATABASE OutdoorRecreation

    SET COMPATIBILITY_LEVEL = 140;

    Listing 2-15

    将数据库兼容级别更改为 SQL Server 2017

    ```


    清单 2-16 中的查询允许我们强制 SQL Server 为所有使用兼容级别 140 的查询生成新的执行计划。


    ```

    DBCC FREEPROCCACHE;

    Listing 2-16

    清除清单 2-14 查询的执行计划缓存

    ```


    需要注意的是，前述 T-SQL 代码不应在你的生产环境中运行。此代码将导致 SQL Server 在首次调用查询时使用额外资源来确定每个查询应如何运行。我保存了在兼容级别
    140 下运行前述查询的实际执行计划。你可以在图 2-6 中找到此实际执行计划。


    ![](img/480547_2_En_2_Fig6_HTML.jpg)


    一个流程图。Select 操作成本为 0%，来源于合并连接。它来源于聚集索引扫描、计算标量（该操作又来源于流聚合）以及聚集索引扫描。


    图 2-6'
- fmt: "# Execution plan for compatibility mode 140\n\nAnalyzing the actual execution\
    \ plan for compatibility mode 160, you can ascertain that it appears more complex.\
    \ However, you may notice that the scalar function now includes a number of rows\
    \ below the `Scalar Operator` in the execution plan in Figure [2-7](#480547_2_En_2_Chapter.xhtml#Fig7).\n\
    \n![](images/480547_2_En_2_Chapter/480547_2_En_2_Fig7_HTML.jpg)\n\nA flow diagram.\
    \ `Select` has a cost of 0% and is from parallelism from the hash match. It is\
    \ from index scan, hash match aggregate, and so on.\n\n**Figure 2-7** Execution\
    \ plan for compatibility mode 160\n\nWhile the execution plan for SQL Server 2019\
    \ may be more complex, the execution time between these two versions of SQL Server\
    \ is relatively significant because using scalar UDF inlining causes the query\
    \ to complete almost 50% faster. You can also compare the `CPU` and elapsed times\
    \ for compatibility modes 140 and 160. In Table [2-2](#480547_2_En_2_Chapter.xhtml#Tab2),\
    \ you can find the average `CPU` and elapsed times for both queries after executing\
    \ each 10 times.\n\n**Table 2-2** Elapsed and CPU Times for Query Execution\n\n\
    | Compatibility Mode | CPU Time | Elapsed Time |\n| --- | --- | --- |\n| 140 |\
    \ 8,206 milliseconds | 9,225 milliseconds |\n| 160 | 1,866 milliseconds | 3,877\
    \ milliseconds |\n\nThe speed for `CPU` time is decreased when this function is\
    \ used in compatibility mode 160 vs. 140.\n\nThe ability to inline scalar UDFs\
    \ in SQL Server 2019 does not apply only to single query scalar UDFs. There is\
    \ also improved functionality when it comes to using multi-statement scalar UDFs.\
    \ Multi-statement scalar UDFs return a single value, similar to the scalar UDF\
    \ created in Listing [2-10](#480547_2_En_2_Chapter.xhtml#PC10). The difference\
    \ with a multi-statement scalar UDF is that additional logic can exist within\
    \ the function. Let’s improve the function created in Listing [2-10](#480547_2_En_2_Chapter.xhtml#PC10)\
    \ so that the function can handle a divide-by-zero error. Listing [2-17](#480547_2_En_2_Chapter.xhtml#PC17)\
    \ shows the T-SQL code to enhance Listing [2-13](#480547_2_En_2_Chapter.xhtml#PC13)\
    \ by using a multi-statement scalar UDF.\n\n```sql\nCREATE OR ALTER FUNCTION dbo.ProductAverage\n\
    (\n    @Quantity     SMALLINT,\n    @ProductPrice DECIMAL(6,2)\n)\nRETURNS DECIMAL\
    \ (6,2) AS\nBEGIN\n    DECLARE @ProductAvg DECIMAL (6,2);\n    IF @Quantity =\
    \ 0\n    BEGIN\n        SET @ProductAvg =  0.00;\n    END\n    ELSE\n    BEGIN\n\
    \        SET @ProductAvg = @ProductPrice / @Quantity;\n    END\n    RETURN @ProductAvg;\n\
    END;\n```\n\n*Listing 2-17* Creating a Multi-Statement Scalar UDF\n\nThe multi-statement\
    \ scalar UDF created in Listing [2-17](#480547_2_En_2_Chapter.xhtml#PC17) benefits\
    \ from the same scalar inlining as the scalar UDF created in Listing [2-13](#480547_2_En_2_Chapter.xhtml#PC13).\
    \ Regardless of the scalar UDF you decide to use, SQL Server 2019 has been improved\
    \ so that you may have improved performance with these functions.\n\n## Table-Valued\
    \ Functions\n\nThere will be times when you find yourself needing to perform complex\
    \ logic, but you need to return more than one value. When these situations come\
    \ up, you may want to consider using a table-valued function. A table-valued function\
    \ returns a table. Unlike a UDF that often appears in `SELECT` or `WHERE` clauses,\
    \ you put it in a `FROM` clause and treat its output like any other table or view.\
    \ It can be alone in a `FROM` clause or you can join to it. Prior to SQL Server\
    \ 2019, the only function that could run inline was a variation of table-valued\
    \ functions.\n\nTable-valued functions are useful for those times when you need\
    \ a table as a result. This could be anything from one row with multiple columns\
    \ to one column with the potential for multiple rows or many rows and many columns.\
    \ No matter your purpose, if you want a reusable piece of code that can give you\
    \ a table output, then table-valued functions may be what you want. Keep in mind\
    \ that there are two main types of table-valued functions, and while the output\
    \ can seem the same, the performance of each of these types can be incredibly\
    \ different.\n\n### Inline Table-Valued Functions\n\nIf you’re using a function\
    \ to perform some complex logic, but you can survive only using a `SELECT` statement,\
    \ then you may want to learn more about how inline table-valued user-defined functions\
    \ can work for you. It is important to note that you do not specifically indicate\
    \ that a function is inline or multi-statement. It is how you create and declare\
    \ the function that will determine which type of function you have created.\n\n\
    Like the inline scalar user-defined functions (UDFs) available in SQL Server 2019,\
    \ table-valued functions can also be inlined. Also be aware that table-valued\
    \ functions have been able to be inlined for quite some time, while inlining scalar\
    \ UDFs is quite new. Either way, the advantage is clear. When a table-valued function\
    \ can be run inline with the rest of the query, the optimizer can provide a better\
    \ execution plan for the function and the T-SQL code overall.\n\nHistorically,\
    \ the most popular use for inline table-valued functions is to operate similarly\
    \ to views, except that in the case of inline table-valued functions, parameters\
    \ can be used to limit the data returned, whereas views will return all data available\
    \ to the view for each execution. Let’s determine the steps necessary to create\
    \ an inline table-valued function in Listing [2-18](#480547_2_En_2_Chapter.xhtml#PC18).\n\
    \n```sql\nCREATE FUNCTION dbo.CustomerOrderSummaryForCustomer (@CustomerID INT)\n\
    RETURNS TABLE\nAS\nRETURN\n(\n    SELECT cus.FirstName,\n           cus.LastName,\n\
    \           ord.CustomerOrderID,\n           ord.OrderNumber,\n           ord.OrderDate,\n\
    \           prd.ProductName,\n           SUM(dtl.QuantitySold) AS QuantitySold,\n\
    \           dtl.ProductPrice,\n           SUM(dtl.QuantitySold) * dtl.ProductPrice\
    \ AS ProductRevenue\n    FROM dbo.CustomerOrder ord\n    INNER JOIN dbo.OrderDetail\
    \ dtl\n        ON ord.CustomerOrderID = dtl.CustomerOrderID\n    INNER JOIN dbo.Customer\
    \ cus\n        ON ord.CustomerID = cus.CustomerID\n    INNER JOIN dbo.Product\
    \ prd\n        ON dtl.ProductID = prd.ProductID\n    WHERE cus.CustomerID = @CustomerID\n\
    \    GROUP BY cus.FirstName,\n             cus.LastName,\n             ord.CustomerOrderID,\n\
    \             ord.OrderNumber,\n             ord.OrderDate,\n             prd.ProductName,\n\
    \             dtl.ProductPrice\n);\n```\n\n*Listing 2-18* Creating an Inline Table-Valued\
    \ Function\n\nThe process to create an inline table-valued function is straightforward.\
    \ There may be concerns about the impact functions have on performance. You can\
    \ determine how an inline table-valued function performs; let’s run a query using\
    \ this function so you can verify what happens in the execution plan. Listing\
    \ [2-19](#480547_2_En_2_Chapter.xhtml#PC19) shows the script to determine the\
    \ effectiveness of an execution plan.\n\n```sql\nSELECT FirstName,\n       LastName,\n\
    \       CustomerOrderID,\n       OrderNumber,\n       OrderDate,\n       ProductName,\n\
    \       QuantitySold,\n       ProductPrice,\n       ProductRevenue\nFROM dbo.CustomerOrderSummaryForCustomer\
    \ (234);\n```\n\n*Listing 2-19* Query to Call an Inline Table-Valued Function\n\
    \nFigure [2-8](#480547_2_En_2_Chapter.xhtml#Fig8) shows the execution plan generated\
    \ from the code in Listing [2-19](#480547_2_En_2_Chapter.xhtml#PC19) as it was\
    \ returned in SQL Server 2022.\n\n![](images/480547_2_En_2_Chapter/480547_2_En_2_Fig8_HTML.jpg)\n\
    \nA flow diagram. `Select` has a cost of 0% and is from compute scalar of 0% from\
    \ parallelism, hash match aggregate, and inner join. It is from clustered index\
    \ scan, hash match, and so on.\n\n**Figure 2-8** Inline table-valued function\
    \ execution plan\n\nUpon close investigation, you can confirm the function does\
    \ not appear in the execution plan. While inline table-valued UDFs can be used\
    \ like a table and can accept parameters, there are still limitations associated\
    \ with using inline table-valued UDFs. These types of functions can only allow\
    \ for one `SELECT` statement and one result set. In addition, the data that is\
    \ returned in these functions cannot be modified in the database. However, you\
    \ can modify the output of the `SELECT` statement for inline table-valued. For\
    \ instance, if you want to create an output of what `CustomerID` 234’s sales could\
    \ be if you raise the price of all products by 0.05%, you can execute the query\
    \ in Listing [2-20](#480547_2_En_2_Chapter.xhtml#PC20)."
  raw: 'Execution plan for compatibility mode 140


    Analyzing at the actual execution plan for compatibility mode 160, you can ascertain
    that it appears more complex. However, you may notice that the scalar function
    now includes a number of rows below the Scalar Operator in the execution plan
    in Figure [2-7](#480547_2_En_2_Chapter.xhtml#Fig7).


    ![](images/480547_2_En_2_Chapter/480547_2_En_2_Fig7_HTML.jpg)


    A flow diagram. Select has a cost of 0% and is from parallelism from the hash
    match. It is from index scan, hash match aggregate, and so on.


    Figure 2-7


    Execution plan for compatibility mode 160


    While the execution plan for SQL Server 2019 may be more complex, the execution
    time between these two versions of SQL Server is relatively significant because
    using scalar UDF inlining causes the query to complete almost 50% faster. You
    can also compare the CPU and elapsed times for compatibility modes 140 and 160\.
    In Table [2-2](#480547_2_En_2_Chapter.xhtml#Tab2), you can find the average CPU
    and elapsed times for both queries after executing each 10 times.


    Table 2-2


    Elapsed and CPU Times for Query Execution


    | Compatibility Mode | CPU Time | Elapsed Time |

    | --- | --- | --- |

    | 140 | 8,206 milliseconds | 9,225 milliseconds |

    | 160 | 1,866 milliseconds | 3,877 milliseconds |


    The speed for CPU time is decreased when this function is used in compatibility
    mode 160 vs. 140.


    The ability to inline scalar UDFs in SQL Server 2019 does not apply only to single
    query scalar UDFs. There is also improved functionality when it comes to using
    multi-statement scalar UDFs. Multi-statement scalar UDFs return a single value,
    similar to the scalar UDF created in Listing [2-10](#480547_2_En_2_Chapter.xhtml#PC10).
    The difference with a multi-statement scalar UDF is that additional logic can
    exist within the function. Let’s improve the function created in Listing [2-10](#480547_2_En_2_Chapter.xhtml#PC10)
    so that the function can handle a divide-by-zero error. Listing [2-17](#480547_2_En_2_Chapter.xhtml#PC17)
    shows the T-SQL code to enhance Listing [2-13](#480547_2_En_2_Chapter.xhtml#PC13)
    by using a multi-statement scalar UDF.


    ```

    CREATE OR ALTER FUNCTION dbo.ProductAverage

    (

    @Quantity     SMALLINT,

    @ProductPrice DECIMAL(6,2)

    )

    RETURNS DECIMAL (6,2) AS

    BEGIN

    DECLARE @ProductAvg DECIMAL (6,2);

    IF @Quantity = 0

    BEGIN

    SET @ProductAvg =  0.00;

    END

    ELSE

    BEGIN

    SET @ProductAvg = @ProductPrice / @Quantity;

    END

    RETURN @ProductAvg;

    END;

    Listing 2-17

    Creating a Multi-Statement Scalar UDF

    ```


    The multi-statement scalar UDF created in Listing [2-17](#480547_2_En_2_Chapter.xhtml#PC17)
    benefits from the same scalar inlining as the scalar UDF created in Listing [2-13](#480547_2_En_2_Chapter.xhtml#PC13).
    Regardless of the scalar UDF you decide to use, SQL Server 2019 has been improved
    so that you may have improved performance with these functions.


    ### Table-Valued Functions


    There will be times when you find yourself needing to perform complex logic, but
    you need to return more than one value. When these situations come up, you may
    want to consider using a table-valued function. A table-valued function returns
    a table. Unlike a UDF that often appears in SELECT or WHERE clauses, you put it
    in a FROM clause and treat its output like any other table or view. It can be
    alone in a FROM clause or you can join to it. Prior to SQL Server 2019, the only
    function that could run inline was a variation of table-valued functions.


    Table-valued functions are useful for those times when you need a table as a result.
    This could be anything from one row with multiple columns to one column with the
    potential for multiple rows or many rows and many columns. No matter your purpose,
    if you want a reusable piece of code that can give you a table output, then table-valued
    functions may be what you want. Keep in mind that there are two main types of
    table-valued functions, and while the output can seem the same, the performance
    of each of these types can be incredibly different.


    #### Inline Table-Valued Functions


    If you’re using a function to perform some complex logic, but you can survive
    only using a select statement, then you may want to learn more about how inline
    table-valued user-defined functions can work for you. It is important to note
    that you do not specifically indicate that a function is inline or multi-statement.
    It is how you create and declare the function that will determine which type of
    function you have created.


    Like the inline scalar user-defined functions (UDFs) available in SQL Server 2019,
    table-valued functions can also be inlined. Also be aware that table-valued functions
    have been able to be inlined for quite some time, while inlining scalar UDFs is
    quite new. Either way, the advantage is clear. When a table-valued function can
    be run inline with the rest of the query, the optimizer can provide a better execution
    plan for the function and the T-SQL code overall.


    Historically, the most popular use for inline table-valued functions is to operate
    similarly to views, except that in the case of inline table-valued functions,
    parameters can be used to limit the data returned, whereas views will return all
    data available to the view for each execution. Let’s determine the steps necessary
    to create an inline table-valued function in Listing [2-18](#480547_2_En_2_Chapter.xhtml#PC18).


    ```

    CREATE FUNCTION dbo.CustomerOrderSummaryForCustomer (@CustomerID INT)

    RETURNS TABLE

    AS

    RETURN

    (

    SELECT cus.FirstName,

    cus.LastName,

    ord.CustomerOrderID,

    ord.OrderNumber,

    ord.OrderDate,

    prd.ProductName,

    SUM(dtl.QuantitySold) AS QuantitySold,

    dtl.ProductPrice,

    SUM(dtl.QuantitySold) * dtl.ProductPrice AS ProductRevenue

    FROM dbo.CustomerOrder ord

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    INNER JOIN dbo.Customer cus

    ON ord.CustomerID = cus.CustomerID

    INNER JOIN dbo.Product prd

    ON dtl.ProductID = prd.ProductID

    WHERE cus.CustomerID = @CustomerID

    GROUP BY cus.FirstName,

    cus.LastName,

    ord.CustomerOrderID,

    ord.OrderNumber,

    ord.OrderDate,

    prd.ProductName,

    dtl.ProductPrice

    );

    Listing 2-18

    Creating an Inline Table-Valued Function

    ```


    The process to create an inline table-valued function is straightforward. There
    may be concerns about the impact functions have on performance. You can determine
    how an inline table-valued function performs; let’s run a query using this function
    so you can verify what happens in the execution plan. Listing [2-19](#480547_2_En_2_Chapter.xhtml#PC19)
    shows the script to determine the effectiveness of an execution plan.


    ```

    SELECT FirstName,

    LastName,

    CustomerOrderID,

    OrderNumber,

    OrderDate,

    ProductName,

    QuantitySold,

    ProductPrice,

    ProductRevenue

    FROM dbo.CustomerOrderSummaryForCustomer (234);

    Listing 2-19

    Query to Call an Inline Table-Valued Function

    ```


    Figure [2-8](#480547_2_En_2_Chapter.xhtml#Fig8) shows the execution plan generated
    from the code in Listing [2-19](#480547_2_En_2_Chapter.xhtml#PC19) as it was returned
    in SQL Server 2022.


    ![](images/480547_2_En_2_Chapter/480547_2_En_2_Fig8_HTML.jpg)


    A flow diagram. Select has a cost of 0% and is from compute scalar of 0% from
    parallelism, hash match aggregate, and inner join. It is from clustered index
    scan, hash match, and so on.


    Figure 2-8


    Inline table-valued function execution plan


    Upon close investigation, you can confirm the function does not appear in the
    execution plan. While inline table-valued UDFs can be used like a table and can
    accept parameters, there are still limitations associated with using inline table-valued
    UDFs. These types of functions can only allow for one select statement and one
    result set. In addition, the data that is returned in these functions cannot be
    modified in the database. However, you can modify the output of the select statement
    for inline table-valued. For instance, if you want to create an output of what
    CustomerID 234’s sales could be if you raise the price of all products by 0.05%,
    you can execute the query in Listing [2-20](#480547_2_En_2_Chapter.xhtml#PC20).'
  trans: "\n# 兼容模式 140 的执行计划\n\n通过分析兼容模式 160 的实际执行计划，你可以确定它看起来更为复杂。然而，你可能会注意到，在图 2-7\
    \ 的执行计划中，标量函数现在包含了`标量运算符`下方的若干行。\n\n![](img/480547_2_En_2_Fig7_HTML.jpg)\n\n一个流程图。`Select`\
    \ 的开销为 0%，源自哈希匹配的并行化。它来源于索引扫描、哈希匹配聚合等。\n\n**图 2-7** 兼容模式 160 的执行计划\n\n虽然 SQL Server\
    \ 2019 的执行计划可能更复杂，但这两个版本的 SQL Server 之间的执行时间却有显著差异，因为使用标量 UDF 内联使得查询完成速度提高了近 50%。你还可以比较兼容模式\
    \ 140 和 160 的 `CPU` 时间和经过时间。在表 2-2 中，你可以找到两个查询各执行 10 次后的平均 `CPU` 时间和经过时间。\n\n\
    **表 2-2** 查询执行的经过时间和 CPU 时间\n\n| 兼容模式 | CPU 时间 | 经过时间 |\n| --- | --- | --- |\n\
    | 140 | 8,206 毫秒 | 9,225 毫秒 |\n| 160 | 1,866 毫秒 | 3,877 毫秒 |\n\n与兼容模式 140 相比，在兼容模式\
    \ 160 中使用此函数时，`CPU` 时间的速度有所降低。\n\n在 SQL Server 2019 中内联标量 UDF 的能力不仅限于单查询标量 UDF。在使用多语句标量\
    \ UDF 时，功能也有所改进。多语句标量 UDF 返回单个值，类似于清单 2-10 中创建的标量 UDF。多语句标量 UDF 的不同之处在于函数内部可以存在额外的逻辑。让我们改进清单\
    \ 2-10 中创建的函数，使其能够处理除零错误。清单 2-17 展示了使用多语句标量 UDF 来增强清单 2-13 的 T-SQL 代码。\n\n```sql\n\
    CREATE OR ALTER FUNCTION dbo.ProductAverage\n(\n    @Quantity     SMALLINT,\n\
    \    @ProductPrice DECIMAL(6,2)\n)\nRETURNS DECIMAL (6,2) AS\nBEGIN\n    DECLARE\
    \ @ProductAvg DECIMAL (6,2);\n    IF @Quantity = 0\n    BEGIN\n        SET @ProductAvg\
    \ =  0.00;\n    END\n    ELSE\n    BEGIN\n        SET @ProductAvg = @ProductPrice\
    \ / @Quantity;\n    END\n    RETURN @ProductAvg;\nEND;\n```\n\n*清单 2-17* 创建多语句标量\
    \ UDF\n\n清单 2-17 中创建的多语句标量 UDF 可以从与清单 2-13 中创建的标量 UDF 相同的标量内联中获益。无论你决定使用哪种标量 UDF，SQL\
    \ Server 2019 都已经过改进，使用这些函数可能会获得更好的性能。\n\n## 表值函数\n\n有时你会发现需要执行复杂的逻辑，但需要返回不止一个值。当遇到这些情况时，你可能需要考虑使用表值函数。表值函数返回一个表。与通常出现在\
    \ `SELECT` 或 `WHERE` 子句中的 UDF 不同，你将其放在 `FROM` 子句中，并像对待任何其他表或视图一样对待其输出。它可以单独存在于\
    \ `FROM` 子句中，也可以与之联接。在 SQL Server 2019 之前，唯一可以内联运行的函数是表值函数的一种变体。\n\n表值函数在你需要一个表作为结果时非常有用。这可以是从包含多列的一行，到包含单列但可能有多行，再到包含多行多列的任何情况。无论你的目的是什么，如果你想要一个可重用的代码片段，能够给你提供表输出，那么表值函数可能就是你想要的。请记住，表值函数主要有两种类型，虽然输出看起来可能相同，但每种类型的性能可能会有天壤之别。\n\
    \n### 内联表值函数\n\n如果你正在使用一个函数来执行一些复杂的逻辑，但仅使用一个 `SELECT` 语句就能满足需求，那么你可能想了解更多关于内联表值用户定义函数如何为你工作的信息。需要注意的是，你并不需要明确指明一个函数是内联的还是多语句的。它是你创建和声明函数的方式决定了你创建了哪种类型的函数。\n\
    \n与 SQL Server 2019 中可用的内联标量用户定义函数（UDF）类似，表值函数也可以被内联。同时也要注意到，表值函数能够内联已经有一段时间了，而内联标量\
    \ UDF 则是相当新的功能。无论哪种方式，优势都很明显。当一个表值函数可以与查询的其余部分内联运行时，优化器可以为该函数以及整个 T-SQL 代码提供更好的执行计划。\n\
    \n从历史上看，内联表值函数最受欢迎的用途是类似于视图的操作，不同之处在于，对于内联表值函数，可以使用参数来限制返回的数据，而视图在每次执行时都会返回视图可用的所有数据。让我们通过清单\
    \ 2-18 来确定创建内联表值函数所需的步骤。\n\n```sql\nCREATE FUNCTION dbo.CustomerOrderSummaryForCustomer\
    \ (@CustomerID INT)\nRETURNS TABLE\nAS\nRETURN\n(\n    SELECT cus.FirstName,\n\
    \           cus.LastName,\n           ord.CustomerOrderID,\n           ord.OrderNumber,\n\
    \           ord.OrderDate,\n           prd.ProductName,\n           SUM(dtl.QuantitySold)\
    \ AS QuantitySold,\n           dtl.ProductPrice,\n           SUM(dtl.QuantitySold)\
    \ * dtl.ProductPrice AS ProductRevenue\n    FROM dbo.CustomerOrder ord\n    INNER\
    \ JOIN dbo.OrderDetail dtl\n        ON ord.CustomerOrderID = dtl.CustomerOrderID\n\
    \    INNER JOIN dbo.Customer cus\n        ON ord.CustomerID = cus.CustomerID\n\
    \    INNER JOIN dbo.Product prd\n        ON dtl.ProductID = prd.ProductID\n  \
    \  WHERE cus.CustomerID = @CustomerID\n    GROUP BY cus.FirstName,\n         \
    \    cus.LastName,\n             ord.CustomerOrderID,\n             ord.OrderNumber,\n\
    \             ord.OrderDate,\n             prd.ProductName,\n             dtl.ProductPrice\n\
    );\n```\n\n*清单 2-18* 创建内联表值函数\n\n创建内联表值函数的过程很简单。可能会有对函数性能影响的担忧。你可以确定内联表值函数的性能表现；让我们运行一个使用此函数的查询，这样你就可以验证执行计划中发生了什么。清单\
    \ 2-19 展示了用于确定执行计划有效性的脚本。\n\n```sql\nSELECT FirstName,\n       LastName,\n   \
    \    CustomerOrderID,\n       OrderNumber,\n       OrderDate,\n       ProductName,\n\
    \       QuantitySold,\n       ProductPrice,\n       ProductRevenue\nFROM dbo.CustomerOrderSummaryForCustomer\
    \ (234);\n```\n\n*清单 2-19* 调用内联表值函数的查询\n\n图 2-8 显示了在 SQL Server 2022 中返回的、由清单\
    \ 2-19 中代码生成的执行计划。\n\n![](img/480547_2_En_2_Fig8_HTML.jpg)\n\n一个流程图。`Select` 的开销为\
    \ 0%，源自计算标量（开销 0%），源自并行化、哈希匹配聚合和内部联接。它来源于聚集索引扫描、哈希匹配等。\n\n**图 2-8** 内联表值函数执行计划\n\
    \n仔细检查后，你可以确认该函数并未出现在执行计划中。虽然内联表值 UDF 可以像表一样使用并且可以接受参数，但使用内联表值 UDF 仍然存在一些限制。这类函数只允许一个\
    \ `SELECT` 语句和一个结果集。此外，这些函数中返回的数据不能在数据库中被修改。但是，你可以修改内联表值函数 `SELECT` 语句的输出。例如，如果你想创建一个输出，显示如果将所有产品的价格提高\
    \ 0.05%，`CustomerID` 234 的销售额会是多少，你可以执行清单 2-20 中的查询。\n"
- fmt: "# Listing 2-20 Modifying the Output from an Inline Table-Valued Function\n\
    \n```sql\nSELECT FirstName,\n       LastName,\n       CustomerOrderID,\n     \
    \  OrderNumber,\n       OrderDate,\n       ProductName,\n       QuantitySold,\n\
    \       ROUND(ProductPrice * 1.05, 2) AS ProductPrice,\n       QuantitySold *\
    \ (ROUND(ProductPrice * 1.05, 2)) AS TotalRevenue\nFROM dbo.CustomerOrderSummaryForCustomer\
    \ (234);\n```\n\nThis query takes the `ProductPrice` and adds an addition 5%.\
    \ In addition, the query also shows what the total revenue would be if Customer\
    \ 234 purchased the same items when the 5% price increase was in place. This change\
    \ to the data is cosmetic and does not affect the data that is stored in the database.\n\
    \n## Multi-Statement Table-Valued Functions\n\nWhen you must have both code reuse\
    \ and the ability to update SQL Server, it may be time to consider using multi-statement\
    \ table-valued functions. I caution you to carefully consider whether this approach\
    \ is necessary because these types of functions can end up having a tremendous\
    \ performance impact.\n\nMulti-statement table-valued functions are not just inline\
    \ table-valued functions that can do more. They also can’t be inlined with the\
    \ query execution. This signifies that the query optimizer does not attempt a\
    \ best guess when using these types of functions. As a matter of fact, prior to\
    \ SQL Server 2014, multi-statement table-valued functions were estimated to have\
    \ one row. For SQL Server 2014 and SQL Server 2016, the estimated number of rows\
    \ was 100. However, as of SQL Server 2017, there is a possibility that SQL Server\
    \ will get a proper estimate for the rows returned by using interleaved execution.\n\
    \nWhat happens is that the optimization process will pause to allow execution\
    \ so that the cardinality estimator can determine the actual number of rows that\
    \ should be returned by the multi-statement table-valued function. While interleaved\
    \ execution is part of the new adaptive query processing, there are some limitations\
    \ to keep in mind. If there is a `CROSS APPLY` used in conjunction with a multi-statement\
    \ table-valued function, then the interleaved functionality will not work. It\
    \ has also been reported that if there is a `WHERE` clause inside the multi-statement\
    \ table-valued function that depends on an input parameter, then interleaved execution\
    \ may also not apply.\n\nTo get a better idea of how this all works, refer to\
    \ the multi-statement table-valued function in Listing 2-21.\n\n### Listing 2-21\
    \ Multi-Statement Table-Valued Function\n\n```sql\nCREATE FUNCTION dbo.GetTopCustomersByCountry\
    \ (@Country VARCHAR(75), @TopN INT)\nRETURNS @TopCustomer TABLE\n(\n    CustomerRank\
    \      INT,\n    FirstName         VARCHAR(40),\n    LastName          VARCHAR(100),\n\
    \    CustomerOrderID   INT,\n    TotalProductSales DECIMAL(12,2)\n)\nAS\nBEGIN\n\
    \    WITH cte_TopCust (FirstName, LastName, CustomerOrderID, TotalProductSales)\
    \ AS\n    (\n        SELECT cus.FirstName,\n               cus.LastName,\n   \
    \            ord.CustomerOrderID,\n               SUM(dtl.QuantitySold * dtl.ProductPrice)\
    \ AS TotalProductSales\n        FROM dbo.Customer cus\n        INNER JOIN dbo.CustomerOrder\
    \ ord\n            ON cus.CustomerID = ord.CustomerID\n        INNER JOIN dbo.OrderDetail\
    \ dtl\n            ON ord.CustomerOrderID = dtl.CustomerOrderID\n        WHERE\
    \ (cus.Country = @Country OR @Country IS NULL)\n        GROUP BY ord.CustomerOrderID,\n\
    \                 cus.FirstName,\n                 cus.LastName\n    )\n    INSERT\
    \ INTO @TopCustomer\n    (\n        CustomerRank,\n        FirstName,\n      \
    \  LastName,\n        CustomerOrderID,\n        TotalProductSales\n    )\n   \
    \ SELECT TOP(@TopN) ROW_NUMBER() OVER(ORDER BY TotalProductSales DESC) AS CustomerRank,\n\
    \           FirstName,\n           LastName,\n           CustomerOrderID,\n  \
    \         TotalProductSales\n    FROM cte_TopCust\n    ORDER BY 5 DESC, CustomerOrderID\
    \ DESC;\n    RETURN\nEND;\n```\n\nLet’s execute this function in compatibility\
    \ mode for SQL Server 2017 and SQL Server 2022. When analyzing sales for a company,\
    \ it is very common to compare customer purchasing behavior. Sometimes this can\
    \ cause the logic within queries to get quite complex. Now that this function\
    \ has been created, you can write a script to test the performance of this function\
    \ in the various versions of SQL Server; refer to Listing 2-22.\n\n### Listing\
    \ 2-22 Code to Execute Function\n\n```sql\nSELECT cty.CustomerRank,\n       cty.FirstName,\n\
    \       cty.LastName,\n       COUNT(cty.CustomerOrderID) AS NumberOfOrders,\n\
    \       cty.TotalProductSales\nFROM dbo.GetTopCustomersByCountry (NULL, 5999)\
    \ AS cty\nGROUP BY cty.CustomerRank,\n         cty.FirstName,\n         cty.LastName,\n\
    \         cty.TotalProductSales;\n```\n\nNext, let’s test the execution plans\
    \ and relative performance across the various versions of SQL Server. Figure 2-9\
    \ shows the execution plan in SQL Server 2012 by using the compatibility mode\
    \ 110.\n\n![Figure 2-9](images/480547_2_En_2_Chapter/480547_2_En_2_Fig9_HTML.jpg)"
