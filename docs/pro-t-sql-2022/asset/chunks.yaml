    to be accessed by a query using a metric called a *read*, which is pronounced
    like the verb (“to read”). If the data is available in memory, the act of accessing
    that data is referred to as a *logical read*. There are also times when accessing
    data may require SQL Server to go to disk or storage to access the data pages.
    Data pages are the smallest amount of data SQL Server will store, which is 8 kb
    of data. If the data is accessed from disk, the data is referred to as a *physical
    read*. If the pages are moved to the buffer pool, that action is referred to as
    a *read-ahead read*. In either case, SQL Server will need to go to disk to access
    the requested records. When you write a query and it needs to retrieve records
    that do not exist in the buffer pool, SQL Server will need to access those records
    on disk. This can be a very normal process for SQL Server. However, in cases where
    the query requires more records to be read than are needed for the query results,
    this can cause more activity on disk than is required. One way to monitor the
    amount of time spent retrieving data from disk is with latch waits. This is the
    amount of time SQL Server spends accessing data that does not exist in the buffer
    pool.


    In addition to SQL Server managing data access within the storage engine, the
    storage engine also manages activities relating to locking data. This type of
    activity can be affected by the isolation level configured on the server, application,
    or transaction. The isolation level determines how SQL Server will handle locks
    and row versions between transactions. In many cases, the isolation level configuration
    is managed by a different team than the team that is responsible for writing the
    T-SQL code. The storage engine is also responsible for handling locks in SQL Server.


    Additional factors that can contribute to performance issues related to storage
    have to do with other areas of query design that may interact with the hard drive,
    such as database actions that require a large amount of activity to get recorded
    to the transaction log. This can include inserting, updating, or deleting a large
    quantity of data. SQL Server is designed to record these changes to the transaction
    log promptly. However, these modifications need to be recorded to disk as well.
    Depending on fragmentation or other processes utilizing the hard disk, this may
    cause additional performance issues.


    `tempdb` is another part of SQL Server that can have a noticeable amount of overhead
    related to storage. There may be queries that are causing quite a bit of activity
    to happen within `tempdb` . This can occur if you are creating large temporary
    tables as this information can be stored in `tempdb` . It is also possible that
    SQL Server has not estimated the execution plan correctly. This is often due to
    out-of-date statistics, which are histograms of the data within a table. If these
    statistics are incorrect, SQL Server may not allocate enough resources to execute
    the query. If `tempdb` is put on the same drive as the data or log files, there
    may be issues with disk latency. To avoid this, it is often recommended to move
    `tempdb` to a separate drive from the data and log files. In those causes, any
    storage overhead on `tempdb` should only affect other queries also relying on
    `tempdb` .


    Writing T-SQL queries is fundamentally linked to how SQL Server interacts with
    data that has been stored. There are some aspects of this interaction that can
    be controlled, like making sure that you are accessing the least amount of data
    possible. There are other factors such as how SQL Server accesses data or manages
    locking that may be outside of your control. Either way, it is important to be
    aware of how all these pieces come together and may affect your query performance.'
  trans: '

    当访问数据行或索引时，SQL Server 将使用存储引擎。被访问的数据可能存储在 `buffer pool` 中。由存储引擎负责跟踪这些行在 `B-Tree`
    中的位置。`B-tree` 是一种自平衡的二叉搜索树，为数据存储创建层级结构。这种特定的结构设计允许多个分支，使得其子项（称为 `nodes` 或 `levels`）比典型的二叉搜索树更"扁平"。`B-Tree`
    是专门为处理数据库等大量数据而设计的。在 SQL Server 中管理、添加、更新或删除索引中的条目时，也会发生相同的过程。这在存储引擎中统称为 `row
    and index operations maintenance`。


    在编写查询以访问数据时，SQL Server 使用一个称为 `read` 的指标（发音与动词 "to read" 相同）来跟踪查询需要访问的数据。如果数据已在内存中，则访问该数据的行为称为
    `logical read`。有时，访问数据可能需要 SQL Server 访问磁盘或存储上的数据页。数据页是 SQL Server 存储的最小数据单元，大小为
    8 kb。如果从磁盘访问数据，则该数据称为 `physical read`。如果数据页被移至 `buffer pool`，该操作称为 `read-ahead
    read`。无论哪种情况，SQL Server 都需要访问磁盘以获取请求的记录。当你编写一个查询，并且它需要检索不存在于 `buffer pool` 中的记录时，SQL
    Server 将需要访问磁盘上的那些记录。这对 SQL Server 来说可能是一个非常正常的过程。但是，如果查询需要读取的记录数量多于查询结果所需的数量，则可能导致磁盘活动超出实际需求。监控从磁盘检索数据所花费时间的一种方法是使用
    `latch waits`。这表示 SQL Server 访问不存在于 `buffer pool` 中的数据所花费的时间量。


    除了 SQL Server 在存储引擎内管理数据访问外，存储引擎还负责管理与数据锁定相关的活动。这类活动可能受到服务器、应用程序或事务上配置的 `isolation
    level` 的影响。`isolation level` 决定了 SQL Server 将如何处理事务间的锁和行版本控制。在许多情况下，`isolation
    level` 的配置由不同于负责编写 `T-SQL` 代码的团队来管理。存储引擎还负责处理 SQL Server 中的锁。


    与存储相关的其他可能导致性能问题的因素涉及查询设计的其他方面，这些方面可能与硬盘驱动器交互，例如需要将大量活动记录到事务日志的数据库操作。这可能包括插入、更新或删除大量数据。SQL
    Server 设计为及时将这些更改记录到事务日志。然而，这些修改也需要记录到磁盘上。根据碎片情况或其他使用硬盘的进程，这可能会导致额外的性能问题。


    `tempdb` 是 SQL Server 的另一部分，可能会产生与存储相关的显著开销。可能存在一些查询导致 `tempdb` 内部发生大量活动。如果你正在创建大型临时表，就可能发生这种情况，因为这些信息可能存储在
    `tempdb` 中。也可能是 SQL Server 未能正确估算 `execution plan`。这通常是由于过时的 `statistics`（即表中数据的直方图）造成的。如果这些
    `statistics` 不正确，SQL Server 可能不会分配足够的资源来执行查询。如果 `tempdb` 与数据或日志文件放在同一驱动器上，可能会出现磁盘延迟问题。为避免此问题，通常建议将
    `tempdb` 移动到与数据和日志文件不同的独立驱动器上。在这种情况下，`tempdb` 上的任何存储开销应该只影响同样依赖 `tempdb` 的其他查询。


    编写 `T-SQL` 查询从根本上与 SQL Server 如何与已存储的数据交互相关联。这种交互的某些方面是可以控制的，例如确保你访问尽可能少的数据。而其他因素，例如
    SQL Server 如何访问数据或管理锁，可能超出你的控制范围。无论如何，了解所有这些部分如何结合并可能影响你的查询性能至关重要。

