    代码清单 5-13

    逐条记录插入数据


    如你所见，逐条记录插入数据会占用相当多的代码，并且可能繁琐得多。


    我最喜欢的数据集用途之一是更新数据。在许多情况下，我不是在更新特定记录，而是在更新具有相同特征的多条记录。如果我想将表中的所有产品设置为非活动状态，我有几种不同的方法可以做到。例如，我可以为每条记录编写一个更新语句，将`IsActive`值设置为零，如代码清单
    5-14 所示。


    ```sql

    UPDATE dbo.Product

    SET IsActive = 0,

    DateModified = GETDATE(),

    DateDisabled = GETDATE()

    WHERE ProductID = 1;

    UPDATE dbo.Product

    SET IsActive = 0,

    DateModified = GETDATE(),

    DateDisabled = GETDATE()

    WHERE ProductID = 2;

    UPDATE dbo.Product

    SET IsActive = 0,

    DateModified = GETDATE(),

    DateDisabled = GETDATE()

    WHERE ProductID = 3;

    ```

    代码清单 5-14

    逐条记录更新数据


    这需要三次独立的事务。此外，SQL Server 必须访问这些记录所在的数据页三次。如代码清单 5-15 所示，我也可以编写一个查询，一次性更新所有三条记录。


    ```sql

    UPDATE dbo.Product

    SET IsActive = 0,

    DateModified = GETDATE(),

    DateDisabled = GETDATE()

    WHERE ProductID BETWEEN 1 AND 3;

    ```

    代码清单 5-15

    按范围更新数据


    事实上，如果这三条记录都位于同一个数据页上，我只需要访问该页面一次。一个更可能的场景是请求停用产品名称中包含“water”一词的所有产品。这正是你希望发现的模式。如果存在这样的模式，你可以编写如代码清单
    5-16 所示的查询。


    ```sql

    UPDATE dbo.CustomerOrder

    SET IsActive = 0,

    DateDisabled = GETDATE()

    WHERE IsActive = 1

    AND CustomerID = 234;

    ```

    代码清单 5-16

    作为数据集更新数据


    这个查询实现了两个目标。它让你能在一次给定的查询中更新多条记录。`WHERE`子句包含了`IsActive`和`CustomerID`列，允许查询使用索引`IX_CustomerOrder_Isactive_CustomerID_OrderID_DateCreated`。


    使用数据集更新多条记录没有限制。我经常需要更新成百上千条记录。虽然我可以编写查询来单独识别每条记录，然后手动提取这些 ID 来逐条或批量更新它们，但有更简单的方法来更新这些多条记录，并最大限度地减少因人为干预而导致的错误风险。代码清单
    5-17 展示了如何在连接表的同时更新数据。


    ```sql

    UPDATE prd

    SET DateModified = GETDATE(),

    IsActive = 0

    FROM dbo.Product prd

    INNER JOIN dbo.ProductArchive pch

    ON prd.ProductID = pch.ProductID

    WHERE pch.DateInserted >= CAST(GETDATE() AS DATE);

    ```

    代码清单 5-17

    通过连接创建数据集来更新数据


    在更新操作中使用连接时，我建议你确认正在更新的数据是什么。这可以通过将更新语句转换为选择语句来完成，如代码清单 5-18 所示。


    ```sql

    SELECT

    ProductID,

    ProductName,

    ProductPrice,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Product prd

    INNER JOIN dbo.ProductArchive pch

    ON prd.ProductID = pch.ProductID

    WHERE pch.DateInserted >= CAST(GETDATE() AS DATE);

    ```

    代码清单 5-18

    使用 SELECT 语句验证数据集


    你可以检查记录并验证记录数。在执行更新之前，我建议将`UPDATE`语句包裹在`BEGIN TRAN…ROLLBACK`中以验证记录数。


    就像处理更新一样，你也可以在删除数据时使用数据集。我发现使用数据集删除数据可以显著提高效率，但如果数据在删除前未经验证，也可能存在一定风险。

