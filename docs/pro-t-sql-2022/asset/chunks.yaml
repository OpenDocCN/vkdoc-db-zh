    \    SELECT CustomerOrderHistoryID,\n           CustomerOrderID,\n           CustomerOrderHistoryStatusID,\n\
    \           DateCreated,\n           DateModified\n    FROM dbo.CustomerOrderHistoryPartition;\n\
    ```\n**清单 16-22**  \n创建分区视图\n\n此分区视图允许你将最新且高度活跃的数据保存在未分区的表中。此表可以专门构建索引以实现最佳的写入速度。分区视图中包含的任何其他表可以根据其使用情况进行索引。上一分区视图中包含的分区表可能仅包含非活动数据。因此，可以预期这些数据未来仅供读取。了解这一点后，你可以使用不同的策略来索引此表。\n\
    \n现在让我们确定 SQL Server 在查询非分区表时的行为。清单 16-23 中的查询显示了如何在 `dbo.CustomerOrderHistory`\
    \ 表中查找特定日期范围内的所有记录。\n\n```sql\nDECLARE @StartDate  DATETIME2(2) = '2022-10-07';\n\
    DECLARE @EndDate    DATETIME2(2) = '2022-10-09';\nSELECT CustomerOrderHistoryID,\n\
    \       CustomerOrderID,\n       CustomerOrderHistoryStatusID,\n       DateCreated,\n\
    \       DateModified\nFROM dbo.CustomerOrderHistory\nWHERE DateCreated > @StartDate\n\
    \  AND DateCreated <= @EndDate;\n```\n**清单 16-23**  \n在分区表和视图分区前访问数据\n\n此查询将在非分区表上运行。在查询执行时，此表按原始主键（即\
    \ `CustomerOrderHistoryID`）排序。因此，清单 16-23 中查询的执行计划如图 16-16 所示。\n\n![](img/480547_2_En_16_Fig16_HTML.jpg)\n\
    *图 16-16*  \n非分区表的执行计划\n\n基于 清单 16-16 中的执行计划，你可以确认 SQL Server 使用 `clustered index\
    \ scan`（聚集索引扫描）来查找相关记录。这是因为没有包含 `DateCreated` 的索引。由于表未按日期分区，SQL Server 还需要遍历整个表才能找到满足\
    \ 清单 16-23 中查询条件的数据记录。\n\n运行此查询后，你可以查看执行计划中操作符的其他信息。具体来说，你需要确定此查询执行的逻辑读次数和返回的行数。使用图\
    \ 16-17，你可以识别逻辑读次数和行数。\n\n![](img/480547_2_En_16_Fig17_HTML.jpg)\n*图 16-17*  \n\
    与聚集索引扫描相关的读操作\n\n你可以看到此查询返回了 802,818 行，逻辑读的总页数为 3,392。你将把这些值与包含分区和非分区表的分区视图的性能进行比较。\n\
    \n之前，在 清单 16-22 中，你创建了一个分区视图，其中包含一个用于所有 2021 年数据记录的分区表和一个用于所有 2022 年数据记录的非分区表。为了比较分区视图与非分区表的性能差异，你可以运行\
    \ 清单 16-24 中的查询。\n\n```sql\nDECLARE @StartDate  DATETIME2(2) = '2022-10-07';\n\
    DECLARE @EndDate    DATETIME2(2) = '2022-10-09';\nSELECT CustomerOrderHistoryID,\n\
    \       CustomerOrderID,\n       CustomerOrderHistoryStatusID,\n       DateCreated,\n\
    \       DateModified\nFROM dbo.vwCustomerOrderHistory_PT\nWHERE DateCreated >\
    \ @StartDate\n  AND DateCreated <= @EndDate;\n```\n**清单 16-24**  \n在分区表中使用分区列访问数据\n\
    \n此查询搜索与 清单 16-23 中的查询相同的数据记录。但是，此查询访问的是分区视图，而不是非分区表。该分区视图由一个包含 2021 年全部数据的分区表和一个包含\
    \ 2022 年数据的非分区表组成。在图 16-18 中，你可以看到此查询生成的执行计划。\n\n![](img/480547_2_En_16_Fig18_HTML.jpg)\n\
    *图 16-18*  \n分区视图的执行计划\n\n需要注意的重要一点是，此执行计划使用了 `clustered index seek`（聚集索引查找）而不是\
    \ `clustered index scan`（聚集索引扫描）。这让你知道 SQL Server 能够高效地确定查找相关数据记录的位置，而无需遍历表中的全部或大部分记录。另一个突出的点是，`clustered\
    \ index seek` 是在分区表 `dbo.CustomerOrderHistory` 上执行的。你还可以查找与 `clustered index seek`\
    \ 相关的属性以获取更多信息。在图 16-19 中，你可以看到逻辑读次数和返回的记录数。\n\n![](img/480547_2_En_16_Fig19_HTML.jpg)\n"
- fmt: "# 17. 长期数据管理\n\n在上一章中，我介绍了分区表和分区视图的概念。本章继续讨论分区，重点讲解如何使用分区切换。第一节介绍分区切换的概念。第二节指导你运用已学到的关于分区切换的所有知识，来管理数据保留和归档。\n\
    \n在前几章中，我们探讨了分区表和分区视图在提升查询性能方面的应用。本章将转向数据生命周期管理，介绍一个强大的工具——分区切换，它能极大地简化数据的归档和清除过程。\n\
    \n## 分区切换简介\n\n分区切换是一种高效的数据管理操作，它能够将整个分区（或非分区表）作为一个单元快速地移入或移出分区表。此操作本质上是元数据的更改，因此速度极快，且通常只需极少的系统资源。\n\
    \n其核心思想是将数据存储与数据管理分离。你可以通过创建 staging 表（暂存表）来准备新数据，或通过将旧数据移动到归档表中来清理生产数据，然后通过 `ALTER\
    \ TABLE ... SWITCH` 语句在瞬间完成“切换”，而无需实际移动大量数据行。\n\n### 使用分区切换进行数据管理\n\n通过一个具体的例子来理解如何利用分区切换进行数据管理。假设你有一个按月分区的销售表\
    \ `Sales`，并且希望将超过24个月的旧数据归档。\n\n1.  **准备归档表**：首先，创建一个与 `Sales` 表结构相同的非分区表 `SalesArchive`。确保其文件组与要移出的分区所在文件组一致，并且没有任何索引或约束（或与原分区完全相同）。\n\
    \    ```sql\n    CREATE TABLE SalesArchive\n    (\n        SaleID INT,\n     \
    \   SaleDate DATE,\n        Amount DECIMAL(10,2)\n        -- ... 其他列\n    ) ON\
    \ [ArchiveFG];\n    ```\n\n2.  **切换分区**：使用 `ALTER TABLE ... SWITCH PARTITION ...\
    \ TO` 语句将指定的分区切换到归档表。\n    ```sql\n    ALTER TABLE Sales\n    SWITCH PARTITION\
    \ 1 TO SalesArchive;\n    ```\n    执行后，原 `Sales` 表第一个分区的所有数据行会“变成” `SalesArchive`\
    \ 表的内容，而 `Sales` 表的第一个分区变为空。这个操作几乎是瞬间完成的。\n\n3.  **处理空分区**：切换后，`Sales` 表留下的空分区可以被移除（`ALTER\
    \ PARTITION FUNCTION ... MERGE RANGE`），为未来的新数据腾出空间，或者用于接收新数据。\n\n### 将非分区表切换到分区表\n\
    \n分区切换不仅可以从分区表中移出数据，还可以将准备好的非分区表（Staging Table）切换为分区表的一个新分区。这在批量加载新数据时非常有用，因为它可以避免直接在大型生产表上执行缓慢的\
    \ `INSERT` 操作。\n\n流程如下：\n1.  在一个单独的文件组上创建并准备 `Staging` 表，填入新数据。\n2.  确保 `Staging`\
    \ 表的结构与目标分区表兼容。\n3.  将 `Staging` 表切换为目标分区表的一个新分区。\n    ```sql\n    ALTER TABLE\
    \ Staging\n    SWITCH TO Sales PARTITION 5;\n    ```\n    此操作后，`Staging` 表变为空，并成为\
    \ `Sales` 表的一部分，而加载过程对用户的影响微乎其微。\n\n### 注意事项\n\n-   **兼容性检查**：源表和目标表/分区的架构必须完全兼容，包括列、数据类型、索引、约束、压缩设置等。不匹配的操作将失败。\n\
    -   **对齐要求**：分区表的分区函数和分区方案必须已正确定义，目标分区必须存在且为空（移出时），或者源表必须与目标分区架构对齐（移入时）。\n-  \
    \ **文件组**：源表和目标表通常需要位于相同的文件组或文件组组中。\n\n分区切换是管理大数据量生命周期的关键技术。它使得按时间窗口（如每月、每季度）归档历史数据或加载新数据变得高效而简单，从而在保持系统性能的同时，满足数据保留策略的要求。结合分区视图，你可以构建出既灵活又高效的数据存储架构。"
  raw: 'A screenshot presents the properties associated with the clustered index seek.
    It depicts 10 properties. Actual logical reads are 7\. Actual physical reads are
    3\. Actual read aheads are 8\. Actual scans are 2\. The actual number of rows
    for all executions is 3.


    Figure 16-19


    Reads for a query partitioned view with a clustered index on a partitioning key


    The total number of rows returned is 3 with a total number of 7 data pages read
    from memory. The decrease in the number of total data pages read from memory indicates
    that this query is more efficient at finding the relevant data than the query
    in Listing [16-23](#480547_2_En_16_Chapter.xhtml#PC23).


    You have seen how querying a partitioned view on a column that references a partitioned
    table performs. The next step is to see how querying a partitioned view works
    when accessing a non-partitioned table. Listing [16-25](#480547_2_En_16_Chapter.xhtml#PC25)
    shows a query to access data from the non-partitioned table of the partitioned
    view.


    ```

    SELECT CustomerOrderHistoryID,

    CustomerOrderID,

    CustomerOrderHistoryStatusID,

    DateCreated

    FROM dbo.vwCustomerOrderHistory

    WHERE CustomerOrderID = 401408

    AND CustomerOrderHistoryStatusID = 1;

    Listing 16-25

    Accessing Data Using a Partitioned Column Not in a Partitioned Table

    ```


    This query returns the same columns as the queries from Listings [16-23](#480547_2_En_16_Chapter.xhtml#PC23)
    and [16-24](#480547_2_En_16_Chapter.xhtml#PC24). The criteria in the WHERE clause
    is accessing data from 2022 instead of 2021\. To see how this change in dates
    affects the execution plan generated, you can see the difference in Figure [16-20](#480547_2_En_16_Chapter.xhtml#Fig20).


    ![](images/480547_2_En_16_Chapter/480547_2_En_16_Fig20_HTML.jpg)


    A text with symbols depicts an execution plan with a partitioned view and not
    on a partitioned table. The text presents 2 clustered index scans, cost 85% and
    0%, 0.212 seconds and 0.000 seconds, 1 of 1 and 0 of 1, concatenation, and Select
    cost 0%.


    Figure 16-20


    Execution plan for a partitioned view not on a partitioned table


    In Figure [16-20](#480547_2_En_16_Chapter.xhtml#Fig20), the preceding execution
    plan used a clustered index scan on the `dbo.CustomerOrderHistory2022` table.
    While the execution plans between the partitioned and non-partitioned tables are
    similar, how much data is retrieved from SQL Server can vary between the two execution
    plans. Figure [16-21](#480547_2_En_16_Chapter.xhtml#Fig21) can show you how much
    data is accessed for the query in Listing [16-25](#480547_2_En_16_Chapter.xhtml#PC25).


    ![](images/480547_2_En_16_Chapter/480547_2_En_16_Fig21_HTML.jpg)


    A screenshot presents the properties associated with the clustered index scan.
    It depicts 10 properties. Actual logical reads are 4212. Actual physical reads
    are 3\. Actual read aheads are 4213\. Actual scans are 5\. The actual number of
    rows for all executions is 1.


    Figure 16-21


    Reads for a query partitioned view on a non-partitioned table


    In Figure [16-21](#480547_2_En_16_Chapter.xhtml#Fig21), you can see there are
    4,212 data pages read from memory and 1 records returned. This performance is
    still much better than the performance when all data existed in a single non-partitioned
    table.


    You have confirmed that partitioned views work well for queries that access partitioned
    tables and non-partitioned tables within the partitioned view. Like partitioned
    tables, it is still best to query data using the columns that are part of the
    partition. In Listing [16-26](#480547_2_En_16_Chapter.xhtml#PC26), you query the
    partitioned view using columns that are not part of the partition.


    ```

    SELECT CustomerOrderHistoryID,

    CustomerOrderID,

    CustomerOrderHistoryStatusID,

    DateCreated

    FROM dbo.vwCustomerOrderHistory_PT

    WHERE CustomerOrderID = 401408

    AND CustomerOrderHistoryStatusID = 1;

    Listing 16-26

    Accessing Data Without Using a Partitioned Column

    ```


    You can see that instead of referencing a date for the preceding query, you want
    to return all records for `CustomerOrderID` of 4 that have a `CustomerOrderHistoryStatusID`
    of 2\. There is no date provided, and SQL Server will need to access all tables
    within the partitioned view. You can see the execution plan for the query in Listing
    [16-26](#480547_2_En_16_Chapter.xhtml#PC26) in Figure [16-22](#480547_2_En_16_Chapter.xhtml#Fig22).


    ![](images/480547_2_En_16_Chapter/480547_2_En_16_Fig22_HTML.jpg)


    A text with symbols depicts an execution plan with a partitioned view and not
    on a partitioned key. The text presents 2 clustered index scans, cost 85% and
    0%, 0.188 seconds and 0.000 seconds, 1 of 1 and 0 of 1, concatenation, and Select
    cost 0%.


    Figure 16-22


    Execution plan for a partitioned view not on a partitioning key


    As expected, the execution plan shows a clustered index scan on `dbo.CustomerOrderHistory`
    and `dbo.CustomerOrderHistoryPartition`. There is no date range provided in Listing
    [16-26](#480547_2_En_16_Chapter.xhtml#PC26), which causes SQL Server to access
    both tables in the partitioned view. The criteria for the query do not take advantage
    of any indexes on the tables which causes the need for a clustered index scan.
    The key point here is to use the partitioning column as much as possible. This
    gives you the best chance to take advantage of any performance gains associated
    with partitioning your data.


    The longer your applications and databases are in use, the more new challenges
    you will face in managing the data generated. When working with hybrid workloads,
    you may find that you need too many different methods to manage and access your
    data. Combining tables and partitioned tables in a partitioned view can give you
    some of the flexibility you need. Breaking your data up into multiple non-partitioned
    and partitioned tables can allow you to create different indexes on the tables
    based on how you will be accessing the data within those tables. This sort of
    strategy can allow you to keep a table with only recent data separate from any
    data used for reporting purposes. The table containing recent and current data
    can then be configured to maximize application performance.


    One of the options available within SQL Server is the use of partitioning. You
    have the option to partition information into various filegroups. You can also
    create partition functions and partition schemes that help SQL Server determine
    how to segment data. Once the partition scheme is applied to a column on a table,
    the table is now a partitioned table. The column used for the partition scheme
    is known as the partitioning key. When queries are designed to use the partitioning
    key, SQL Server can use partition elimination to find the records that meet the
    query criteria. In addition to using partitioned tables, you also have the option
    of using partitioned views. Partitioned views can allow you to combine multiple
    database objects into a single object that can be referenced by your application
    code. When running a query, SQL Server will determine which objects need to be
    accessed to meet the query criteria. You can also combine non-partitioned tables
    and partitioned tables into the same partitioned view. This method may be able
    to help you if you find yourself in a situation where your database needs to be
    able to handle both transactional and analytical queries.


    # 17. Managing Data Long-Term


    In the previous chapter, I introduced the concepts of partitioned tables and partitioned
    views. This chapter continues the discussion on partitions by discussing how to
    use partition switching. The first section introduces the concept of partition
    switching. The second section guides you to use all the information you have learned
    about partition switching to manage data retention and archival.'
