    如果您不确定如何开始使用数据发现和分类，可以允许 SQL Server 推荐那些看起来包含敏感数据的列。图 18-1 展示了如何使用 `Object Explorer`
    开始对数据进行分类的过程。


    ![](img/480547_2_En_18_Fig1_HTML.jpg)


    图 18-1 本地数据分类


    您需要找到要进行分类的数据库。右键单击数据库名称，然后选择“任务” ➤ “数据发现和分类” ➤ “分类数据”。选择后，SQL Server 将扫描数据库并打开“数据分类”窗口。图
    18-2 显示了一个灰色框中的消息，提示“我们已找到 6 个具有分类建议的列。单击此处查看它们”。


    ![](img/480547_2_En_18_Fig2_HTML.jpg)


    图 18-2 数据分类输出


    单击灰色框的任意位置将更新“数据分类”窗口中的视图。现在出现了一个新的部分，以一个灰色条开始。该灰色条显示“6 个具有分类建议的列（单击以最小化）”。图 18-3
    展示了数据分类窗口上的这个附加部分。


    ![](img/480547_2_En_18_Fig3_HTML.jpg)


    图 18-3 数据分类结果


    图 18-3 显示了已识别的六个列以及它们所属的架构和表。“数据分类”窗口还有两列带有下拉菜单。第一列是“信息类型”。可用选项如下：


    *   网络

    *   联系人信息

    *   凭证

    *   信用卡

    *   银行

    *   金融

    *   其他

    *   姓名

    *   国民身份证

    *   社会安全号码

    *   健康

    *   出生日期

    *   [不适用]


    除了各种信息类型外，还有各种可用的敏感度标签，如图 18-4 所示。


    ![](img/480547_2_En_18_Fig4_HTML.jpg)


    图 18-4 可用的敏感度标签


    一旦确认了信息类型和敏感度标签，您可以选择表中左侧的复选框来标记任意多列进行更新。图 18-5 显示了为 `dbo.Customer.Address` 列选中的复选框。


    ![](img/480547_2_En_18_Fig5_HTML.jpg)

