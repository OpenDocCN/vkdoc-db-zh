    ## 如何使用源代码控制


    我初次实施源代码控制时发现，真正实施前需要内部进行大量讨论。我发现数据库团队、开发团队和 QA 团队需要就未来如何管理代码达成一致。了解每个团队的目标和需求非常理想，这样才能设计出有效的流程来管理数据库代码。每个团队可能希望以不同方式管理各自的代码库。需要涵盖的一些要点包括：


    *   何时使用本地仓库与中央仓库的准则

    *   如何将更改保存到源代码控制

    *   如何解决已部署的错误

    *   数据库代码中应包含哪些内容


    源代码控制允许你在本地机器上处理代码。你可以创建或更改数据库对象，并在本地生成代码时，这为检查数据库项目能否成功构建提供了额外的确认。成功的构建表明已针对数据库运行了多项检查，以确认对象可以成功创建。一旦你测试并确认了你的数据库代码，就可以将其签入到中央位置。该位置可以是你本地设置的服务器，也可以是云端的服务器，例如
    `GitHub` 的情况。这个中央仓库可以接收来自你以及团队中任何其他获准修改此数据库项目的成员的代码更改。此外，仓库可以让开发者或开发团队独立于彼此处理代码。


    将对 `T-SQL` 代码的更改保存到本地通常称为 `提交`。在提交代码时，你可以为提交添加注释。你还可以实施关于如何编写提交消息的标准。一个例子是在提交消息前加上工单或用户故事编号。一旦中央仓库建立，各个用户就可以复制中央代码。此副本通常存储在开发人员的本地机器上，称为
    `分支`。这个名称源于被称为 `主干` 的中央代码。在现代术语中，这被称为 `主分支`。在准备软件发布的分支时，添加对所处理问题的引用可能会有所帮助。`Git`
    和 `GitHub` 允许你在更改永久提交到仓库之前保存更改。`暂存更改` 是指你保存不立即提交到仓库的更改时使用的术语。可以通过 `Azure Data
    Studio` 或命令行为提交暂存更改。


    随着越来越多的公司希望结合使用敏捷、看板、Scrum、持续集成或持续交付，拥有一个更灵活的源代码控制解决方案变得越来越重要。该解决方案需要允许多个团队同时处理相同的代码库，而不会对软件发布产生负面影响。这正是
    `Git` 流行的起源。


    如果你使用 `SQL Server Data Tools` 和 `Visual Studio`，每个代码仓库将包含至少一个数据库解决方案。在数据库解决方案中，每个数据库将有一个单独的数据库项目。你可以选择每个数据库项目是否拥有自己的解决方案，或者所有项目是否共享同一个解决方案。`Azure
    Data Studio` 或 `Visual Studio Code` 有一个用于数据库项目的扩展。这些数据库项目存在于工作区内，类似于解决方案。工作区提供了一种访问给定文件夹内数据库项目的方法。将所有应用程序和数据库放在同一个解决方案中是可能的，但这超出了本书的范围。这些决策不仅基于偏好和所需功能。正如你将在第
    13 章看到的，你如何组织仓库也将决定你的代码如何部署。


    在仓库内部，有一个或多个分支的概念。其中一个分支是主分支。可以将其视为你需要部署这些更改时通常会去使用的那组代码。这个分支称为 `main`。任何时候你想对
    `main` 分支进行更改，通常最好创建一个新分支来编写你的 `T-SQL` 代码。这使得 `main` 分支不受正在开发中且尚未准备好部署的代码影响。这样，`main`
    分支就可以与当前部署到生产环境的代码相匹配。


    当每个分支发生这些提交时，你可能会遇到在同一次部署中需要部署两个不同分支的情况。这时你会希望尝试合并这些代码。为了合并代码，需要获取分支中的更改并将其添加回
    `main` 或发布分支。将功能分支合并到主分支称为 `合并`。在此过程中可能发生的一个方面称为 `冲突`。当许多人在同一时间段内处理同一个数据库对象，或者延迟将之前的功能分支与主分支合并时，就可能发生冲突。确保与开发团队合作，以更好地了解如何避免合并冲突以及如何解决它们。


    '
- fmt: "## Rollback Changes\n\nOne thing that happens more often than some of us would\
    \ like to admit is when code is deployed and then does not work as intended. I\
    \ have been in situations where those bugs were found during deployment. Other\
    \ times those bugs are not found until days, weeks, or months after deployment.\
    \ In either scenario, the key is to figure out how to quickly restore the database\
    \ to a more functional state. One of the discussions I had with developers and\
    \ QA was how to handle this on deployment night. A bug can be manually fixed by\
    \ a `T-SQL` script. Depending on how you manage your database code software releases,\
    \ it is possible that this bug fix can be undone in a future deployment. If you\
    \ put the bug fix into source control, you can make sure this bug fix will not\
    \ be undone going forward.\n\nAs a result, we adopted what we called a rollforward\
    \ strategy. If we could quickly find and resolve the issue, we would check those\
    \ changes into source control and deploy them up through the environments. A rollforward\
    \ follows the same process as manually deploying a hotfix. However, adding the\
    \ changes to source control ensures that this fix will not be rolled back in a\
    \ future software release. This rollforward strategy was only permitted on the\
    \ night of the deployment. When we adopted the strategy, the concept was that\
    \ we were going to deploy all code that had been merged to a main branch. If you\
    \ choose to deploy a different version of the database project than the most recent\
    \ version, you will not be able to use this method.\n\nWe also adopted a method\
    \ to use a hotfix. These were changes that were needed as soon as possible due\
    \ to a critical loss in functionality of an application. As there may be various\
    \ items in development, we could not go ahead and just deploy the most recent\
    \ database code. In these cases, I would still check the modified `T-SQL` code\
    \ into source control. That code may have been deployed to development and tested\
    \ in our QA environment, but the code would be manually deployed to production.\
    \ The concept was that the next time the database code was deployed, this database\
    \ object would already exist.\n\nDesigning how to save database code also involves\
    \ conversations with the development, QA, and release management teams. There\
    \ are pros and cons to the various methods that exist. You can save all of your\
    \ database projects in the same solution with all of your application code. While\
    \ this may take longer for your projects to build, if you create the right relationships,\
    \ you can be certain that changes in your database will not affect the functionality\
    \ of your applications. Depending on the number of applications that exist in\
    \ your company, this may be a difficult task. There is also the option of having\
    \ all your database projects saved in the same solution. Saving all database projects\
    \ in the same solution will also cause them to be saved in the same repository.\
    \ If you have cross-database dependencies, this method will help protect your\
    \ databases. This is particularly helpful when you make changes to one database\
    \ object and you are not certain if these changes will break functionality in\
    \ a different database. The final option is to create one solution per database.\
    \ The advantage of this method is that you can develop each database independently.\
    \ The downside is that you may make changes to a database that breaks functionality\
    \ for another database.\n\nPrior to setting up your first database in source control,\
    \ I recommend discussing the topics in this section with the other teams at your\
    \ company. Make sure everyone is in agreement when it comes to writing, testing,\
    \ and saving changes to your database code. Get others on board when it comes\
    \ to fixing database code once it has been deployed. Also consider how you want\
    \ your database projects to interact with one another and your applications. Once\
    \ you take all of this under consideration, you are ready to create your first\
    \ database project.\n\n## Setting Up Source Control\n\nNow that you have decided\
    \ you would like to implement source control for your database, and you have figured\
    \ out some general guidelines on how you want to set up your database projects,\
    \ let’s set it up. This section assumes that someone else is responsible for procuring,\
    \ installing, and configuring source control. There are many factors involved\
    \ in the initial setup for source control and they are outside the scope of this\
    \ book. One of the first things to do is get whatever `IDE` you are using to connect\
    \ to source control. Once you are connected to source control, create a way to\
    \ store the source control for your databases. You want to figure out how to make\
    \ and save changes to your database code after you have a place for your database\
    \ source control.\n\nIn this section, I will be using `Azure Data Studio`, the\
    \ `Database Projects extension`, `Git`, and `GitHub` to get a database into source\
    \ control. In order to manage database projects in `Azure Data Studio`, you need\
    \ to install the `Database Projects extension`. Figure [10-1](#480547_2_En_10_Chapter.xhtml#Fig1)\
    \ shows how to add the `Database Project extension` in `Azure Data Studio`.\n\n\
    ![](images/480547_2_En_10_Chapter/480547_2_En_10_Fig1_HTML.jpg)\n\nA screenshot\
    \ titled extensions marketplace depicts the database project in a horizontal bar.\
    \ Below, it displays the installation button on the right corner for the S Q L\
    \ database projects.\n\nFigure 10-1\n\nInstalling the `Database Projects extension`\
    \ in `Azure Data Studio`\n\nOnce you have installed the `Database Projects extension`\
    \ in `Azure Data Studio`, there will be a new icon on the far left had side of\
    \ `Azure Data Studio` that has the shape of two application windows on top of\
    \ one another. Now you can create a workspace to work on a database project.\n\
    \nNote\n\nWhen working with database projects in `Azure Data Studio` or `VS Code`,\
    \ a workspace file is created to manage the database project. In `Visual Studio`,\
    \ a solution file is created to manage database projects.\n\n`Azure Data Studio`\
    \ has several options you can use to start working with database projects:\n\n\
    *   From the Database Projects window\n    *   `Create new`\n\n*   `Open existing`\n\
    \n*   From the menu on the Database Projects window\n    *   `Create project from\
    \ database`\n\n*   `Update project from database`\n\n*   `Generate SQL Project\
    \ from OpenAPI/Swagger spec`\n\nThese options cover all sorts of scenarios that\
    \ you may consider when creating your database project. If you choose `Create\
    \ new` from the Database Projects window, `Azure Data Studio` will create a new,\
    \ empty database project. If you already have a database project saved locally,\
    \ you want to use the `Open existing` option in `Azure Data Studio`. This option\
    \ can be used if you are already using a database project that was created in\
    \ `Azure Data Studio`, `VS Code`, or `Visual Studio`. However, neither of these\
    \ options are the best option if you want to create new database project based\
    \ on an existing database or database structure.\n\nOne of the easiest ways to\
    \ start using source control is to add an existing database to source control.\
    \ `Azure Data Studio` makes this easy by allow you to create a database project\
    \ from an existing database. The best part is that this will also sort all of\
    \ your database objects into folders so that you can easily manage your code.\
    \ When creating a database object from an existing database, you can choose how\
    \ the database objects are organized in your new database project."
  raw: "### Rollback Changes\n\nOne thing that happens more often than some of us\
    \ would like to admit is when code is deployed and then does not work as intended.\
    \ I have been in situations where those bugs were found during deployment. Other\
    \ times those bugs are not found until days, weeks, or months after deployment.\
    \ In either scenario, the key is to figure out how to quickly restore the database\
    \ to a more functional state. One of the discussions I had with developers and\
    \ QA was how to handle this on deployment night. A bug can be manually fixed by\
    \ a T-SQL script. Depending on how you manage your database code software releases,\
    \ it is possible that this bug fix can be undone in a future deployment. If you\
    \ put the bug fix into source control, you can make sure this bug fix will not\
    \ be undone going forward.\n\nAs a result, we adopted what we called a rollforward\
    \ strategy. If we could quickly find and resolve the issue, we would check those\
    \ changes into source control and deploy them up through the environments. A rollforward\
    \ follows the same process as manually deploying a hotfix. However, adding the\
    \ changes to source control ensures that this fix will not be rolled back in a\
    \ future software release. This rollforward strategy was only permitted on the\
    \ night of the deployment. When we adopted the strategy, the concept was that\
    \ we were going to deploy all code that had been merged to a main branch. If you\
    \ choose to deploy a different version of the database project than the most recent\
    \ version, you will not be able to use this method.\n\nWe also adopted a method\
    \ to use a hotfix. These were changes that were needed as soon as possible due\
    \ to a critical loss in functionality of an application. As there may be various\
    \ items in development, we could not go ahead and just deploy the most recent\
    \ database code. In these cases, I would still check the modified T-SQL code into\
    \ source control. That code may have been deployed to development and tested in\
    \ our QA environment, but the code would be manually deployed to production. The\
    \ concept was that the next time the database code was deployed, this database\
    \ object would already exist.\n\nDesigning how to save database code also involves\
    \ conversations with the development, QA, and release management teams. There\
    \ are pros and cons to the various methods that exist. You can save all of your\
    \ database projects in the same solution with all of your application code. While\
    \ this may take longer for your projects to build, if you create the right relationships,\
    \ you can be certain that changes in your database will not affect the functionality\
    \ of your applications. Depending on the number of applications that exist in\
    \ your company, this may be a difficult task. There is also the option of having\
    \ all your database projects saved in the same solution. Saving all database projects\
    \ in the same solution will also cause them to be saved in the same repository.\
    \ If you have cross-database dependencies, this method will help protect your\
    \ databases. This is particularly helpful when you make changes to one database\
    \ object and you are not certain if these changes will break functionality in\
    \ a different database. The final option is to create one solution per database.\
    \ The advantage of this method is that you can develop each database independently.\
    \ The downside is that you may make changes to a database that breaks functionality\
    \ for another database.\n\nPrior to setting up your first database in source control,\
    \ I recommend discussing the topics in this section with the other teams at your\
    \ company. Make sure everyone is in agreement when it comes to writing, testing,\
    \ and saving changes to your database code. Get others on board when it comes\
    \ to fixing database code once it has been deployed. Also consider how you want\
    \ your database projects to interact with one another and your applications. Once\
    \ you take all of this under consideration, you are ready to create your first\
    \ database project.\n\n## Setting Up Source Control\n\nNow that you have decided\
    \ you would like to implement source control for your database, and you have figured\
    \ out some general guidelines on how you want to set up your database projects,\
    \ let’s set it up. This section assumes that someone else is responsible for procuring,\
    \ installing, and configuring source control. There are many factors involved\
    \ in the initial setup for source control and they are outside the scope of this\
    \ book. One of the first things to do is get whatever IDE you are using to connect\
    \ to source control. Once you are connected to source control, create a way to\
    \ store the source control for your databases. You want to figure out how to make\
    \ and save changes to your database code after you have a place for your database\
    \ source control.\n\nIn this section, I will be using Azure Data Studio, the Database\
    \ Projects extension, Git, and GitHub to get a database into source control. In\
    \ order to manage database projects in Azure Data Studio, you need to install\
    \ the Database Projects extension. Figure [10-1](#480547_2_En_10_Chapter.xhtml#Fig1)\
    \ shows how to add the Database Project extension in Azure Data Studio.\n\n![](images/480547_2_En_10_Chapter/480547_2_En_10_Fig1_HTML.jpg)\n\
    \nA screenshot titled extensions marketplace depicts the database project in a\
    \ horizontal bar. Below, it displays the installation button on the right corner\
    \ for the S Q L database projects.\n\nFigure 10-1\n\nInstalling the Database Projects\
    \ extension in Azure Data Studio\n\nOnce you have installed the Database Projects\
    \ extension in Azure Data Studio, there will be a new icon on the far left had\
    \ side of Azure Data Studio that has the shape of two application windows on top\
    \ of one another. Now you can create a workspace to work on a database project.\n\
    \nNote\n\nWhen working with database projects in Azure Data Studio or VS Code,\
    \ a workspace file is created to manage the database project. In Visual Studio,\
    \ a solution file is created to manage database projects.\n\nAzure Data Studio\
    \ has several options you can use to start working with database projects:\n\n\
    *   From the Database Projects window\n    *   Create new\n\n*   Open existing\n\
    \n*   From the menu on the Database Projects window\n    *   Create project from\
    \ database\n\n*   Update project from database\n\n*   Generate SQL Project from\
    \ OpenAPI/Swagger spec\n\nThese options cover all sorts of scenarios that you\
    \ may consider when creating your database project. If you choose Create new from\
    \ the Database Projects window, Azure Data Studio will create a new, empty database\
    \ project. If you already have a database project saved locally, you want to use\
    \ the Open existing option in Azure Data Studio. This option can be used if you\
    \ are already using a database project that was created in Azure Data Studio,\
    \ VS Code, or Visual Studio. However, neither of these options are the best option\
    \ if you want to create new database project based on an existing database or\
    \ database structure.\n\nOne of the easiest ways to start using source control\
    \ is to add an existing database to source control. Azure Data Studio makes this\
    \ easy by allow you to create a database project from an existing database. The\
    \ best part is that this will also sort all of your database objects into folders\
    \ so that you can easily manage your code. When creating a database object from\
    \ an existing database, you can choose how the database objects are organized\
    \ in your new database project."
  trans: "\n## 回滚更改\n\n有一种情况比我们一些人愿意承认的更常见，那就是代码部署后运行结果不如预期。我曾多次遇到在部署过程中就发现缺陷的情况。另一些时候，这些缺陷直到部署后数天、数周或数月才被发现。无论哪种情况，关键是要迅速将数据库恢复到功能更佳的状态。我曾与开发人员和质量保证团队讨论过在部署当晚应如何处理此事。一个缺陷可以通过\
    \ `T-SQL` 脚本手动修复。根据你管理数据库代码软件发布的方式，这个修复可能在未来的部署中被撤销。如果你将缺陷修复放入源代码管理，就能确保此修复不会在未来被撤销。\n\
    \n因此，我们采纳了所谓的“前滚”策略。如果我们能快速定位并解决问题，我们会将这些更改检入源代码管理，并将其部署到各个环境。前滚遵循与手动部署热修复相同的过程。然而，将更改加入源代码管理确保了此修复不会在未来的软件发布中被回滚。此前滚策略仅允许在部署当晚使用。我们采纳此策略时的理念是，我们将部署所有已合并到主分支的代码。如果你选择部署的数据库项目版本不是最新版本，将无法使用此方法。\n\
    \n我们还采用了一种使用热修复的方法。这些是因为应用程序功能严重缺失而需要尽快进行的更改。由于开发中可能有多个项目，我们不能直接部署最新的数据库代码。在这些情况下，我仍然会将修改后的\
    \ `T-SQL` 代码检入源代码管理。该代码可能已部署到开发环境并在我们的质量保证环境中测试过，但会被手动部署到生产环境。其理念是下次部署数据库代码时，该数据库对象将已经存在。\n\
    \n设计如何保存数据库代码也涉及与开发、质量保证和发布管理团队的沟通。现有的各种方法各有利弊。你可以将所有数据库项目与所有应用程序代码保存在同一解决方案中。虽然这可能会使项目构建时间变长，但如果建立了正确的关系，你可以确保数据库的更改不会影响应用程序的功能。根据公司中应用程序的数量，这可能是一项艰巨的任务。另一种选择是将所有数据库项目保存在同一解决方案中。将所有数据库项目保存在同一解决方案中也会导致它们保存在同一代码仓库中。如果你有跨数据库依赖关系，此方法将有助于保护你的数据库。当你对一个数据库对象进行更改，且不确定这些更改是否会破坏另一个数据库的功能时，这种方法特别有用。最后一个选项是为每个数据库创建一个解决方案。此方法的优点是可以独立开发每个数据库。缺点是你可能对某个数据库的更改会破坏另一个数据库的功能。\n\
    \n在将第一个数据库置于源代码管理之前，我建议与公司的其他团队讨论本节的主题。确保在编写、测试和保存数据库代码更改方面达成一致。在修复已部署的数据库代码时，也要争取他人的支持。同时考虑你希望数据库项目之间以及它们与你的应用程序如何交互。一旦你考虑了所有这些因素，就可以创建你的第一个数据库项目了。\n\
    \n## 设置源代码管理\n\n既然你已决定为数据库实施源代码管理，并且已经确定了如何设置数据库项目的一些基本准则，那么让我们开始设置吧。本节假设由其他人负责采购、安装和配置源代码管理。源代码管理初始设置涉及许多因素，它们超出了本书范围。首先要做的事情之一是让你使用的任何\
    \ `IDE` 连接到源代码管理。一旦连接到源代码管理，就要创建一种方式来存储你的数据库源代码管理。在有了存放数据库源代码管理的地方之后，你需要弄清楚如何进行并保存数据库代码的更改。\n\
    \n在本节中，我将使用 `Azure Data Studio`、`数据库项目扩展`、`Git` 和 `GitHub` 将数据库纳入源代码管理。为了在 `Azure\
    \ Data Studio` 中管理数据库项目，你需要安装 `数据库项目扩展`。图 10-1 展示了如何在 `Azure Data Studio` 中添加\
    \ `数据库项目扩展`。\n\n![](img/480547_2_En_10_Fig1_HTML.jpg)\n\n一张标题为“扩展市场”的截图，其中数据库项目显示在一个横条中。下方，其右侧角落显示了\
    \ SQL 数据库项目的安装按钮。\n\n图 10-1\n\n在 `Azure Data Studio` 中安装 `数据库项目扩展`\n\n在 `Azure\
    \ Data Studio` 中安装 `数据库项目扩展` 后，`Azure Data Studio` 最左侧会出现一个新图标，形状像两个应用程序窗口叠在一起。现在你可以创建一个工作区来处理数据库项目。\n\
    \n注意\n\n在 `Azure Data Studio` 或 `VS Code` 中处理数据库项目时，会创建一个工作区文件来管理数据库项目。在 `Visual\
    \ Studio` 中，会创建一个解决方案文件来管理数据库项目。\n\n`Azure Data Studio` 有几个选项可用于开始处理数据库项目：\n\n\
    *   从“数据库项目”窗口\n    *   `新建项目`\n\n*   `打开现有项目`\n\n*   从“数据库项目”窗口的菜单中\n    *  \
    \ `从数据库创建项目`\n\n*   `从数据库更新项目`\n\n*   `从 OpenAPI/Swagger 规范生成 SQL 项目`\n\n这些选项涵盖了你在创建数据库项目时可能考虑的各种场景。如果从“数据库项目”窗口选择\
    \ `新建项目`，`Azure Data Studio` 将创建一个新的空数据库项目。如果你本地已保存有数据库项目，你可能想在 `Azure Data Studio`\
    \ 中使用 `打开现有项目` 选项。如果你已在使用在 `Azure Data Studio`、`VS Code` 或 `Visual Studio` 中创建的数据库项目，也可以使用此选项。然而，如果你想基于现有数据库或数据库结构创建新的数据库项目，这两个选项都不是最佳选择。\n\
    \n开始使用源代码管理最简单的方法之一是将现有数据库添加到源代码管理。`Azure Data Studio` 使这变得简单，它允许你从现有数据库创建数据库项目。最棒的是，这还会将所有数据库对象分类放入文件夹中，以便你轻松管理代码。从现有数据库创建数据库对象时，你可以选择这些对象在新数据库项目中的组织方式。\n"
- fmt: '# 创建和管理数据库项目


    ## 文件夹结构选项


    在创建数据库项目时，您可以选择将文件夹结构组织为**文件**、**扁平**、**对象类型**、**架构**或**架构/对象类型**。


    *   如果选择**文件**，所有数据库对象将保存在一个文件中。如果您计划向此文件添加新的 T-SQL 来创建数据库对象，它们需要被附加到这个单一文件中。

    *   下一个可用选项是**扁平**。扁平选项为每个数据库对象创建一个独立的 `.SQL` 文件。主键、外键、约束和索引都包含在指定表的 `.SQL` 文件中。此选项比文件选项更容易管理单个对象，但要修改任何现有对象，您将需要搜索整个文件列表以找到特定对象。


    其他三个选项——**对象类型**、**架构**和**架构/对象类型**——是类似的。


    *   **对象类型**文件夹选项为每种对象类型创建文件夹。所有表保存在一个文件夹中，另一个文件夹包含所有存储过程。

    *   如果您更喜欢按架构保存 `.SQL` 文件，这也是一个选项。如果您在比 `dbo` 更多的架构中创建数据库对象，这会很有帮助。

    *   **架构/对象类型**为每个架构创建文件夹，并在每个架构内为数据库对象类型创建子文件夹。


    虽然选择如何组织文件是个人偏好的问题，但文件组织对所有开发人员都是相同的。因此，您可能希望在实现之前讨论要选择哪种组织方法。


    ## 创建新的数据库项目


    现在您了解了有关创建数据项目和可用选项的更多信息，您可以创建一个数据库项目。要将一个新的空数据库添加到源代码控制中，请选择 **Database Projects**
    扩展，然后选择 **Create new** 或 **Open existing**。


    在本例中，选择 **Create new**，以便您可以构建一个全新的数据库。选择 **Create new** 后，您将得到一个名为 *Create new
    database project* 的滑出窗口，如图 10-2 所示。


    ![创建新数据库项目页面的截图显示了三种数据库类型。下方要求输入名称、位置和目标平台，并在右角显示创建和取消按钮。](images/480547_2_En_10_Chapter/480547_2_En_10_Fig2_HTML.jpg)


    **图 10-2** 创建新的数据库项目


    在此步骤中，您正在创建一个包含新数据库项目的新工作区。将 `OutdoorRecreation` 数据库项目保存到 `D:\repos\`。


    在源代码控制（例如 Git）的当前状态下，存在一个拥有集中式仓库的概念。这是保存所有代码并可供用户访问的位置。预期是用户将在其本地机器上创建代码的副本并在其本地机器上进行更改。这有时被称为*本地仓库*。这与您的其他本地仓库保存的位置相同。在本例中，您选择创建
    SQL Server 数据库。但是，也可以创建 Azure SQL 数据库或 Azure SQL Edge 数据库。


    ## 将工作区添加到 GitHub 仓库


    下一步是将工作区添加到 GitHub 仓库。当您选择**源代码控制**图标（顶部有两个圆圈，通过线条连接到底部的一个圆圈）时，滑出窗口会为您提供 **Initialize
    Repository** 或 **Publish to GitHub** 的选项，如图 10-3 所示。


    ![源代码控制页面的截图突出显示了初始化存储库和发布到 Git Hub 按钮。](images/480547_2_En_10_Chapter/480547_2_En_10_Fig3_HTML.jpg)


    **图 10-3** Azure Data Studio 中的初始仓库设置


    由于您没有现有的仓库，因此需要选择 **Initialize Repository**。这将启动一个弹出窗口，要求允许 GitHub 扩展使用 GitHub
    登录。这将允许您同时初始化和创建仓库。


    > **注意**

    > Git 和 GitHub 是两个独立的东西。Git 是用于管理分布式版本控制更改的软件。GitHub 是用于托管基于 Web 的 Git 仓库的托管服务。


    将仓库命名为 `OutdoorRecreation`。为仓库提供描述“Database project for Menu”。为仓库选择一个许可证。但是，详细讨论
    Git ignore 或可用的许可选项超出了本书的范围。最后需要指定的是私有仓库。公共仓库和私有仓库之间的主要区别在于您是否希望其他人能够访问、下载并对您的代码提出建议。


    图 10-4 显示了一个链接到我的 GitHub 账户的新仓库。


    ![源工具页面的截图在水平栏中显示了创建存储库选项。下方显示了一个标题为“更改”的下拉列表。](images/480547_2_En_10_Chapter/480547_2_En_10_Fig4_HTML.jpg)


    **图 10-4** Azure Data Studio 中可见的本地仓库


    您可以在**源代码控制**窗口中看到 `Outdoor Recreation` 工作区现在已设置为本地仓库。如果您返回到 **Database Projects**
    窗口，您将能够看到当前与数据库项目关联的所有对象。对话框窗口如图 10-5 所示。


    ![数据库项目页面的截图显示了户外娱乐和数据库引用选项。](images/480547_2_En_10_Chapter/480547_2_En_10_Fig5_HTML.jpg)


    **图 10-5** Azure Data Studio 中可见的数据库项目


    如图 10-5 所示，没有数据库对象与此项目关联。您可能会注意到图 10-4 和图 10-5 的布局几乎完全相同。图 10-4 显示了**源代码控制**窗口。右上角的选项是如何查看提议的更改、提交更改、刷新显示的更改或附加源代码控制选项菜单的选项。图
    10-5 中的选项是能够创建新的数据库项目、打开现有项目、刷新数据库项目或与管理数据库项目相关的特定操作的菜单。


    ## 从现有数据库更新项目


    如果您想使用现有数据库中的对象更新数据库项目，您可以通过选择菜单轻松完成，该菜单可以通过选择数据库项目窗口右上角的 `…` 来打开。然后，您可以选择 **Update
    Project From Database**。这将打开 *Update project from database* 窗口，您可以在其中指定源数据库、目标项目和更新操作，如图
    10-6 所示。


    ![标题为“从数据库更新项目”的页面截图显示了源数据库、目标项目和更新操作选项。它为操作更新勾选了“在架构比较中查看更改”选项。](images/480547_2_En_10_Chapter/480547_2_En_10_Fig6_HTML.jpg)


    **图 10-6** 从数据库更新项目窗口


    *Update project from database* 窗口的一个有用功能是可以在架构比较中查看更改或应用所有更改。在本例中，让我们在更新数据库项目之前查看更改。同时，指定文件夹结构应按架构然后按对象类型存储所有对象。一旦您选择
    **Update** 按钮，您将获得一个新窗口，如图 10-7 所示，将数据库 `OutdoorRecreation` 与源代码控制中当前的对象进行比较。由于您刚刚创建此工作区，源代码控制中没有对象。


    ![图像占位符](images/480547_2_En_10_Chapter/480547_2_En_10_Fig7_HTML.jpg)'
  raw: 'When creating the database project, you can choose to organize the folder
    structure as file, flat, object type, schema, or schema/object type. If you choose
    file, all the database objects will be saved in a single file. If you are planning
    on adding new T-SQL for database objects to this file, they need to be appended
    to the single file. The next option available is flat. The flat option creates
    a single .SQL file for each database object. Primary keys, foreign keys, constraints,
    and indexes are all included in the .SQL file for the specified table. This option
    lets you more easily manage individual objects than the file option, but to modify
    any existing object, you will have to search the entire list of files to find
    the specific object.


    The other three options of object type, schema, and schema/object type are similar.
    The object type folder option creates folders for each object type. All tables
    are saved in one folder and another folder contains all stored procedures. If
    you prefer to save the .SQL files by schema, this is also an option. This can
    be helpful if you create database objects in more schemas than dbo. The schema/object
    type creates folders for each schema and subfolders within each schema for the
    database object type. While choosing how you would like to organize the files
    is a matter of personal preference, the file organization will be the same for
    all developers. Therefore, you may want to discuss which organization method to
    choose prior to implementation.


    Now that you know more information about creating data projects and the available
    options, you can create a database project. To add a new, empty database in source
    control, select the Database Projects extension, and select either Create new
    or Open existing. For this example, choose Create new so you can build an entirely
    new database. Once you select Create new, you get a slide-out window named *Create
    new database project*, as shown in Figure [10-2](#480547_2_En_10_Chapter.xhtml#Fig2).


    ![](images/480547_2_En_10_Chapter/480547_2_En_10_Fig2_HTML.jpg)


    A screenshot of the create new database project page displays 3 database types.
    Below, it asks for the name, location, and target platform and displays the create
    and cancel buttons in the right corner.


    Figure 10-2


    Creating a new database project


    In this step, you are creating a new workspace with a new database project. Save
    the `OutdoorRecreation` database project to `D:\repos\`. In the current state
    of source control, such as with Git, there is a concept of having a centralized
    repository. This is the location where all code is saved and accessible for users.
    The expectation is that users will create a copy of the code on their local machines
    and make changes on their local machine. This is sometimes called a *local repository*.
    This is the same location where your other local repositories are saved. For this
    example, you are choosing to create a SQL Server Database. However, it is also
    possible to create an Azure SQL Database or Azure SQL Edge Database.


    The next step is to add the workspace to a GitHub repository. When you select
    the Source Control icon, which has two circles on the top with lines connecting
    them to one circle on the bottom, the slide-out window gives you the option to
    Initialize Repository or Publish to GitHub**,** as shown in Figure [10-3](#480547_2_En_10_Chapter.xhtml#Fig3).


    ![](images/480547_2_En_10_Chapter/480547_2_En_10_Fig3_HTML.jpg)


    A screenshot of the source control page highlights the initialize repository and
    publish to Git Hub buttons.


    Figure 10-3


    Initial repository setup in Azure Data Studio


    Since you do not have an existing repository, you need to choose Initialize Repository.
    This will launch a pop-up window asking for permission to let the GitHub extension
    sign in using GitHub. This will allow you to initialize and create the repository
    at the same time.


    Note


    Git and GitHub are two separate things. Git is the software used to manage changes
    for distributed version control. GitHub is a hosting service used to host web-based
    Git repositories.


    Name the repository OutdoorRecreation. Give the repository the description of
    Database project for Menu. Select a license for the repository. However, it is
    beyond the scope of this book to go into detail regarding Git ignore or the available
    licensing options. The last part to specify is a private repository. The main
    difference between a public and private repository is whether you would like others
    to be able to access, download, and make suggestions regarding your code.


    Figure [10-4](#480547_2_En_10_Chapter.xhtml#Fig4) shows a new repository that
    is linked to my GitHub account.


    ![](images/480547_2_En_10_Chapter/480547_2_En_10_Fig4_HTML.jpg)


    A screenshot of the source tool page displays to create a repository option in
    the horizontal bar. Below, it displays a dropdown list titled changes.


    Figure 10-4


    Local repository visible in Azure Data Studio


    You can see in the Source Control window that the Outdoor Recreation workspace
    is now set up as a local repository. If you go back to the Database Projects window,
    you will be able to see the all objects currently associated with the database
    project. The dialog window is shown in Figure [10-5](#480547_2_En_10_Chapter.xhtml#Fig5).


    ![](images/480547_2_En_10_Chapter/480547_2_En_10_Fig5_HTML.jpg)


    A screenshot of the database projects page displays the outdoor recreation and
    database reference options.


    Figure 10-5


    Database project visible in Azure Data Studio


    As you can see in Figure [10-5](#480547_2_En_10_Chapter.xhtml#Fig5), there are
    no database objects associated with this project. You may notice that Figure [10-4](#480547_2_En_10_Chapter.xhtml#Fig4)
    and Figure [10-5](#480547_2_En_10_Chapter.xhtml#Fig5) have almost exactly the
    same layout. Figure [10-4](#480547_2_En_10_Chapter.xhtml#Fig4) shows the Source
    Control window. The options in the upper right corner are the options to how to
    view the proposed changes, commit the changes, refresh the changes displayed,
    or a menu of additional source control options. The options in Figure [10-5](#480547_2_En_10_Chapter.xhtml#Fig5)
    are the ability to create a new database project, open an existing project, refresh
    the database project, or a menu of specific actions related to managing database
    projects.


    If you want to update the database project with the objects in an existing database,
    you can do that easily by selecting the menu, which can be opened by selecting
    the … in the upper right corners of the Database Project window. You can then
    choose Update Project From Database. This will open the *Update project from database*
    window where you can specify the source database, target projects, and update
    actions, as shown in Figure [10-6](#480547_2_En_10_Chapter.xhtml#Fig6).


    ![](images/480547_2_En_10_Chapter/480547_2_En_10_Fig6_HTML.jpg)


    A screenshot of the page titled update project from the Database displays the
    source database, target project, and update action options. It ticks the view
    changes in the schema compare option for action updation.


    Figure 10-6


    Update project from database window


    One of the useful features of the *Update project from database* window is the
    option to either view changes in Schema Compare or apply all changes. For this
    example, let’s view the changes before you update the database project. Also,
    specify that the folder structure should have all objects stored by schema and
    then by object type. Once you select the Update button, you will get a new window,
    as shown in Figure [10-7](#480547_2_En_10_Chapter.xhtml#Fig7), comparing the database
    `OutdoorRecreation` to the objects currently in source control. Since you just
    created this workspace, there are no objects in source control.


    ![](images/480547_2_En_10_Chapter/480547_2_En_10_Fig7_HTML.jpg)'
  trans: '# 创建和管理数据库项目


    ## 文件夹结构选项


    在创建数据库项目时，您可以选择将文件夹结构组织为**文件**、**扁平**、**对象类型**、**架构**或**架构/对象类型**。


    *   如果选择**文件**，所有数据库对象将保存在一个文件中。如果您计划向此文件添加新的 T-SQL 来创建数据库对象，它们需要被附加到这个单一文件中。

    *   下一个可用选项是**扁平**。扁平选项为每个数据库对象创建一个独立的 `.SQL` 文件。主键、外键、约束和索引都包含在指定表的 `.SQL` 文件中。此选项比文件选项更容易管理单个对象，但要修改任何现有对象，您将需要搜索整个文件列表以找到特定对象。


    其他三个选项——**对象类型**、**架构**和**架构/对象类型**——是类似的。


    *   **对象类型**文件夹选项为每种对象类型创建文件夹。所有表保存在一个文件夹中，另一个文件夹包含所有存储过程。

    *   如果您更喜欢按架构保存 `.SQL` 文件，这也是一个选项。如果您在比 `dbo` 更多的架构中创建数据库对象，这会很有帮助。

    *   **架构/对象类型**为每个架构创建文件夹，并在每个架构内为数据库对象类型创建子文件夹。


    虽然选择如何组织文件是个人偏好的问题，但文件组织对所有开发人员都是相同的。因此，您可能希望在实现之前讨论要选择哪种组织方法。


    ## 创建新的数据库项目


    现在您了解了有关创建数据项目和可用选项的更多信息，您可以创建一个数据库项目。要将一个新的空数据库添加到源代码控制中，请选择 **Database Projects**
    扩展，然后选择 **Create new** 或 **Open existing**。


    在本例中，选择 **Create new**，以便您可以构建一个全新的数据库。选择 **Create new** 后，您将得到一个名为 *Create new
    database project* 的滑出窗口，如图 10-2 所示。


    ![创建新数据库项目页面的截图显示了三种数据库类型。下方要求输入名称、位置和目标平台，并在右角显示创建和取消按钮。](img/480547_2_En_10_Fig2_HTML.jpg)


    **图 10-2** 创建新的数据库项目


    在此步骤中，您正在创建一个包含新数据库项目的新工作区。将 `OutdoorRecreation` 数据库项目保存到 `D:\repos\`。


    在源代码控制（例如 Git）的当前状态下，存在一个拥有集中式仓库的概念。这是保存所有代码并可供用户访问的位置。预期是用户将在其本地机器上创建代码的副本并在其本地机器上进行更改。这有时被称为*本地仓库*。这与您的其他本地仓库保存的位置相同。在本例中，您选择创建
    SQL Server 数据库。但是，也可以创建 Azure SQL 数据库或 Azure SQL Edge 数据库。


    ## 将工作区添加到 GitHub 仓库


    下一步是将工作区添加到 GitHub 仓库。当您选择**源代码控制**图标（顶部有两个圆圈，通过线条连接到底部的一个圆圈）时，滑出窗口会为您提供 **Initialize
    Repository** 或 **Publish to GitHub** 的选项，如图 10-3 所示。


    ![源代码控制页面的截图突出显示了初始化存储库和发布到 Git Hub 按钮。](img/480547_2_En_10_Fig3_HTML.jpg)


    **图 10-3** Azure Data Studio 中的初始仓库设置


    由于您没有现有的仓库，因此需要选择 **Initialize Repository**。这将启动一个弹出窗口，要求允许 GitHub 扩展使用 GitHub
    登录。这将允许您同时初始化和创建仓库。


    > **注意**

    > Git 和 GitHub 是两个独立的东西。Git 是用于管理分布式版本控制更改的软件。GitHub 是用于托管基于 Web 的 Git 仓库的托管服务。


    将仓库命名为 `OutdoorRecreation`。为仓库提供描述“Database project for Menu”。为仓库选择一个许可证。但是，详细讨论
    Git ignore 或可用的许可选项超出了本书的范围。最后需要指定的是私有仓库。公共仓库和私有仓库之间的主要区别在于您是否希望其他人能够访问、下载并对您的代码提出建议。


    图 10-4 显示了一个链接到我的 GitHub 账户的新仓库。


    ![源工具页面的截图在水平栏中显示了创建存储库选项。下方显示了一个标题为“更改”的下拉列表。](img/480547_2_En_10_Fig4_HTML.jpg)


    **图 10-4** Azure Data Studio 中可见的本地仓库


    您可以在**源代码控制**窗口中看到 `Outdoor Recreation` 工作区现在已设置为本地仓库。如果您返回到 **Database Projects**
    窗口，您将能够看到当前与数据库项目关联的所有对象。对话框窗口如图 10-5 所示。


    ![数据库项目页面的截图显示了户外娱乐和数据库引用选项。](img/480547_2_En_10_Fig5_HTML.jpg)


    **图 10-5** Azure Data Studio 中可见的数据库项目


    如图 10-5 所示，没有数据库对象与此项目关联。您可能会注意到图 10-4 和图 10-5 的布局几乎完全相同。图 10-4 显示了**源代码控制**窗口。右上角的选项是如何查看提议的更改、提交更改、刷新显示的更改或附加源代码控制选项菜单的选项。图
    10-5 中的选项是能够创建新的数据库项目、打开现有项目、刷新数据库项目或与管理数据库项目相关的特定操作的菜单。


    ## 从现有数据库更新项目


    如果您想使用现有数据库中的对象更新数据库项目，您可以通过选择菜单轻松完成，该菜单可以通过选择数据库项目窗口右上角的 `…` 来打开。然后，您可以选择 **Update
    Project From Database**。这将打开 *Update project from database* 窗口，您可以在其中指定源数据库、目标项目和更新操作，如图
    10-6 所示。


    ![标题为“从数据库更新项目”的页面截图显示了源数据库、目标项目和更新操作选项。它为操作更新勾选了“在架构比较中查看更改”选项。](img/480547_2_En_10_Fig6_HTML.jpg)


    **图 10-6** 从数据库更新项目窗口


    *Update project from database* 窗口的一个有用功能是可以在架构比较中查看更改或应用所有更改。在本例中，让我们在更新数据库项目之前查看更改。同时，指定文件夹结构应按架构然后按对象类型存储所有对象。一旦您选择
    **Update** 按钮，您将获得一个新窗口，如图 10-7 所示，将数据库 `OutdoorRecreation` 与源代码控制中当前的对象进行比较。由于您刚刚创建此工作区，源代码控制中没有对象。


    ![图像占位符](img/480547_2_En_10_Fig7_HTML.jpg)'
- fmt: '# 使用 Schema Compare 和源代码控制管理数据库项目


    ## Schema Compare 工具概述


    一张标题为“schema compare”的页面截图。它显示了源和目标列表。下方显示了比较详细信息。


    **图 10-7**


    **Schema Compare 窗口**


    图 [10-7](#480547_2_En_10_Chapter.xhtml#Fig7) 中的顶部菜单栏显示了 Schema Compare 中可用的众多选项。使用此选项可以将本地存储库中缺少的代码添加到源代码控制。两个最有用的选项是
    `Apply` 和 `Options`。`Apply` 获取源下列出的所有项目并对目标执行中心的操作（本例中为 `Add`）。例如，存在于 `OutdoorRecreation`
    数据库中的 SQL 表 `dbo.Customer` 将被添加到 `OutdoorRecreation` 本地存储库。源代码控制是用于管理更改的工具，而存储库是存储更改的位置。`Options`
    让你控制哪些项目将被比较，从而在此次模式比较中被修改。图 [10-7](#480547_2_En_10_Chapter.xhtml#Fig7) 包括添加一些用户定义类型和队列。如果你想排除它们，可以选择
    `options` 并导航到 `Include Object Types` 选项卡。取消选中 `Queues` 和 `User-Defined Types
    (CLR)` 的复选框会将这些对象从比较中移除，如果你在移除它们之后应用更改，它们将不会被添加到本地存储库中。如果你将队列和用户定义类型排除在比较之外，这些对象将不会被添加到你的存储库中。如果你后来决定想将它们添加到存储库，你将需要再次比较源和目标。一旦你选择了
    `Apply`，你会得到确认是否要进行这些更改的选项。


    ## 数据库项目窗口


    现在更改已应用，你可以在图 [10-8](#480547_2_En_10_Chapter.xhtml#Fig8) 所示的 **Database Projects**
    窗口中看到它们。


    ![图片](images/480547_2_En_10_Chapter/480547_2_En_10_Fig8_HTML.jpg)


    一张数据库项目的截图，显示了一个下拉列表。它从上到下依次呈现了 outdoor recreation 文件夹、数据库引用、d b o、procedures
    和 tables 文件夹。


    **图 10-8**


    **包含新对象的 Database Projects 窗口**


    图 [10-8](#480547_2_En_10_Chapter.xhtml#Fig8) 显示了一个名为 `dbo` 的文件夹，用于 dbo 架构。在 `dbo`
    文件夹下有两个子文件夹，一个用于 `Procedures`，一个用于 `Tables`。在每个文件夹中，是各自架构/对象类型组中存在的每个数据库对象的单独脚本。


    在左侧栏，源代码控制图标还显示有 13 个挂起的更改。在图 [10-9](#480547_2_En_10_Chapter.xhtml#Fig9) 中，你可以看到以树状查看的更改。


    ![图片](images/480547_2_En_10_Chapter/480547_2_En_10_Fig9_HTML.jpg)


    一张源代码控制的截图，显示了一个选项列表。主要显示 changes、outdoor recreation、bin 或 debug、d b o、procedures、tables，最后是
    object 或 debug options。


    **图 10-9**


    **以树状显示的源代码控制更改**


    ## 提交更改


    为了提交更改，在你看到文本 *Message (Ctrl+Enter to commit on ''ch11'')* 的文本框中键入一条消息。要提交消息，可以选择右上角的复选框或使用
    `Ctrl+Enter`。一个弹出窗口会询问，*would you like to stage all your changes and commit them
    directly?* 一旦你选择是，更改将在本地提交。


    源代码控制窗口将更新。之前显示的所有对象将不再列出。相反，你会在文本框下方看到一个蓝色按钮，用于向提交添加消息。在图 [10-10](#480547_2_En_10_Chapter.xhtml#Fig10)
    中，该按钮显示了一个可以同步到 GitHub 存储库的提交。


    ![图片](images/480547_2_En_10_Chapter/480547_2_En_10_Fig10_HTML.jpg)


    一张标题为“source Control”的页面截图，显示了一个水平栏，内容为：message open parenthesis c t r l plus
    enter to commit on c h 1 1 parenthesis close。下方高亮显示了 sync changes 按钮。


    **图 10-10**


    **同步更改**


    在选择此按钮之前，更改仅存储在你的本地机器上。为了允许这些更改保存在中央存储库中，你需要同步这些更改。这也将允许任何其他有权访问此存储库的人看到与 *ch11*
    分支相关的更改。


    ## 添加存储过程


    如果你在此分支上有需要执行的额外任务，可以创建额外的对象。通过右键单击 `Procedures` 文件夹，你可以选择 **Add Stored Procedure**。这将打开一个带有如何创建存储过程模板的窗口。名为
    `GetProduct.sql` 的新文件也将被添加到左侧的 Database Projects 窗口中，如图 [10-11](#480547_2_En_10_Chapter.xhtml#Fig11)
    所示。


    ![图片](images/480547_2_En_10_Chapter/480547_2_En_10_Fig11_HTML.jpg)


    一张截图，左侧显示了数据库项目的列表，并高亮显示了 product dot s q l 选项。右侧显示了名称、作者、创建日期、描述和用法示例的详细信息。


    **图 10-11**


    **添加存储过程**


    图 [10-11](#480547_2_En_10_Chapter.xhtml#Fig11) 右侧显示了创建存储过程 `dbo.GetProduct` 的
    T-SQL 代码。为了保存此更改，你应该在本地提交更改。这应该像保存文件一样快，只是多了一步，即包含更改内容的描述。一旦你完成了在存储库分支内的工作，你应该将更改同步到
    GitHub，以便其他开发人员如果正在处理同一分支，可以拉取你所做的任何更改。


    ## 同步与推送操作


    注意


    当使用 GitHub 进行同步时，GitHub 上当前分支的任何更改都会在本地更新。这被称为 *pull first*。然后，像创建存储过程这样的更改会在
    GitHub 上更新。这被称为 *push*。同步（Sync）是先拉取（pull）后推送（push）。


    ## 创建 Pull Request


    如果你已经完成了 *ch11* 分支的所有必要更改，你可以通过拉取请求（pull request）将更改合并到 *main* 分支。拉取请求非常有用，尤其是在团队中工作时，因为它们允许其他人轻松地看到分支中所做的更改。作为解决拉取请求的一部分，还可以添加各种批准和验证，但这超出了本书的范围。


    创建拉取请求可以通过 Azure Data Studio 上的终端或访问 github.com 上的存储库来完成。当我去到 GitHub 上的 ProTSQL2022
    存储库时，我可以看到为 *ch11* 分支推送的新更改，如图 [10-12](#480547_2_En_10_Chapter.xhtml#Fig12) 所示。


    ![图片](images/480547_2_En_10_Chapter/480547_2_En_10_Fig12_HTML.jpg)


    一张显示存储库页面的截图。主要显示：Compare & Pull request 按钮、go-to file、add a file 和 code 按钮。在右下角，显示：Add
    a readme 按钮。


    **图 10-12**


    **显示更改的 GitHub.com 存储库**


    要创建拉取请求，请选择 `Compare & pull request` 按钮。这将打开一个拉取请求。你可以选择将分支 *ch11* 合并到 github.com
    上存在的任何分支。对于你选择合并到的任何分支，GitHub 将运行快速检查以查看该分支是否可以合并。


    对于此示例，我将把 *ch11* 合并到 *main* 分支。这将获取 *ch11* 中的所有更改并将其添加到 *main* 分支。在创建拉取请求之前，如果我向下滚动，可以查看更改的文件。一旦我准备好创建拉取请求，我可以选择
    `Create pull request` 按钮。


    提示


    在许多组织中，拉取请求被用作代码审查过程的一部分。


    一旦创建了拉取请求，GitHub 将运行额外的验证以确认没有合并冲突。此拉取请求将保持打开状态，直到被合并。在我的示例中，一旦代码被合并，所有更改都将添加到
    main 分支。代码合并后，任何人拉取 *main* 分支的副本也将拥有来自 *ch11* 分支的更新更改。'
  raw: 'A screenshot of the page titled schema compare. It displays the source and
    the target list. Below, it displays the comparison details.


    Figure 10-7


    Schema Compare window


    The top menu bar in Figure [10-7](#480547_2_En_10_Chapter.xhtml#Fig7) shows the
    many options available in Schema Compare. Use this to add code to source control
    in the local repository that is missing. The two most useful options are Apply
    and Options. Apply takes all of the items listed under source and performs the
    action in the center (in this case, Add) to the target. For example, the SQL table
    `dbo.Customer` that exists in the `OutdoorRecreation` database will be added to
    the `OutdoorRecreation` local repository. While source control is the tool used
    to manage changes, a repository is the location where the changes are stored.
    Options gives you control over what items will be compared, and thus modified,
    as part of this schema compare. Figure [10-7](#480547_2_En_10_Chapter.xhtml#Fig7)
    includes adding some user defined types and queues. If you want to exclude them,
    you can select options and navigate to the Include Object Types tab. Deselecting
    the check boxes for Queues and User-Defined Types (CLR) removes these objects
    from the comparison, and if you apply the changes after the removing them, they
    will not be added into the local repository. If you exclude the queues and user-defined
    types from the comparison, these objects will not be added to your repository.
    If you later decide you want to add them to your repository, you will need to
    compare the source and target again. Once you select Apply, you get the option
    to confirm that you want to make these changes.


    Now that the changes have been applied, you can see them in the *Database Projects*
    window as shown in Figure [10-8](#480547_2_En_10_Chapter.xhtml#Fig8).


    ![](images/480547_2_En_10_Chapter/480547_2_En_10_Fig8_HTML.jpg)


    A screenshot of the database projects displays a drop-down list. It presents the
    outdoor recreation folder followed by the database references, d b o, procedures,
    and tables folders from top to bottom.


    Figure 10-8


    Database Projects window with new objects


    Figure [10-8](#480547_2_En_10_Chapter.xhtml#Fig8) shows a folder named `dbo` for
    the dbo schema. Under the `dbo` folder are two subfolders, one for `Procedures`
    and one for `Tables`. Within each of these folders are the individual scripts
    for each database object that exists in the respective schema/object type group.


    On the left-hand bar, the source control icon also shows that there are 13 changes
    pending. In Figure [10-9](#480547_2_En_10_Chapter.xhtml#Fig9), you can see the
    changes viewed as a tree.


    ![](images/480547_2_En_10_Chapter/480547_2_En_10_Fig9_HTML.jpg)


    A screenshot of the source control displays a list of options. It mainly displays
    changes, outdoor recreation, bin or debug, d b o, procedures, tables, and finally
    object or debug options.


    Figure 10-9


    Changes to source control as a tree


    In order to commit the changes, type a message in the text box where you see the
    text *Message (Ctrl+Enter to commit on ''ch11'')*. To commit the message, either
    select the check box in the upper right-hand corner or use Ctrl+Enter. A pop-up
    window will ask, *would you like to stage all your changes and commit them directly?*
    Once you select yes, the changes are committed locally.


    The source control window will update. All of the objects previously displayed
    will no longer be listed. Instead, you’ll see a blue button right below the text
    box to add a message to the commit. In Figure [10-10](#480547_2_En_10_Chapter.xhtml#Fig10),
    the button shows one commit that can be synced to the GitHub repository.


    ![](images/480547_2_En_10_Chapter/480547_2_En_10_Fig10_HTML.jpg)


    A screenshot of the page titled source Control displays a horizontal bar that
    reads, message open parenthesis c t r l plus enter to commit on c h 1 1 parenthesis
    close. Below, it highlights the sync changes button.


    Figure 10-10


    Syncing changes


    Before selecting this button, the changes are only stored on your local machine.
    To allow these changes to be saved in the central repository, you need to sync
    these changes. This will also allow anyone else with access to this repository
    to see the changes associated with the *ch11* branch.


    If you have additional tasks you need to perform on this branch, you can create
    additional objects. By right-clicking the `Procedures` folder, you can select
    *Add Stored Procedure*. This will open a window with a template for how to create
    stored procedures. The new file named `GetProduct.sql` will also be added to the
    Database Projects window to the left, as shown in Figure [10-11](#480547_2_En_10_Chapter.xhtml#Fig11).


    ![](images/480547_2_En_10_Chapter/480547_2_En_10_Fig11_HTML.jpg)


    A screenshot displays the list of the database projects on the left side of the
    page and highlights the product dot s q l option. On the right, it displays the
    details of the name, author, created date, description, and sample usage.


    Figure 10-11


    Adding stored procedures


    Figure [10-11](#480547_2_En_10_Chapter.xhtml#Fig11) shows the T-SQL code to create
    the stored procedure dbo.GetProduct on the right-hand side. In order to save this
    change, you should commit the change locally. This should be about as quick as
    saving a file with the added step of including a description of what changed.
    Once you are done with your work within a branch of a repository, you should sync
    the change to GitHub so that other developers can pull down any changes you have
    made if they are working on the same branch.


    Note


    When using sync with GitHub, any changes to the current branch on GitHub are updated
    locally. This is called *pull first*. Then changes, like the creation of the stored
    procedure, are updated at GitHub. This is called a *push*. Sync is a pull followed
    by a push.


    If you are finished with all necessary changes for the *ch11* branch, you can
    merge the changes to the *main* branch with a pull request. Pull requests are
    useful, especially when working in teams, because they allow others to easily
    see what changes were made in the branch. It is also possible to add various approvals
    and validations as part of resolving a pull request, but that is outside the scope
    of this book.


    Creating a pull request can be done through the terminal on Azure Data Studio
    or accessing the repository on github.com. When I go to the ProTSQL2022 repository
    on GitHub, I can see the new changes that have been pushed for the *ch11* branch,
    as shown in Figure [10-12](#480547_2_En_10_Chapter.xhtml#Fig12).


    ![](images/480547_2_En_10_Chapter/480547_2_En_10_Fig12_HTML.jpg)


    A screenshot displays a repository page. It mainly displays, Compare and Pull
    request button, go-to file, add a file, and code button. In the bottom right corner,
    it displays, Add a readme button.


    Figure 10-12


    Repository in GitHub.com showing changes


    To create a pull request, select the Compare & pull request button. This will
    open a pull request. You have the option to merge the branch *ch11* into any branch
    that exists at github.com. For any branch you select to merge into, GitHub will
    run a quick check to see if the branch can be merged.


    For this example, I am going to merge *ch11* into the *main* branch. This will
    take all of the changes in *ch11* and add them to the *main* branch. Before creating
    the pull request, I can review the files changed if I scroll down. Once I am ready
    to create the pull request, I can select the Create pull request button.


    Tip


    In many organizations, the pull request is used as part of the code review process.


    Once a pull request is created, GitHub will run additional validations to confirm
    there are no merge conflicts. This pull request will stay open until it is merged.
    In my example, once the code is merged, all of the changes will be added to the
    main branch. After the code is merged, anyone pulling down a copy of the *main*
    branch will also have the updated changes from the *ch11* branch.'
