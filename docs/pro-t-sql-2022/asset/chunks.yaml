    table variables, I expect the execution plans to get a more accurate number of
    rows in the table variable when creating the execution plan. This improved accuracy
    will help SQL Server create a more performant execution plan. However, double-check
    the query performance especially if you are planning on adding large quantities
    of data to the table variable.


    ### Temporary Stored Procedures


    If a stored procedure is created in the `tempdb` database, then this stored procedure
    is a temporary stored procedure. SQL Server may have made this functionality possible,
    but keep in mind how developers and applications will interact with this database
    object. At the very least, having a temporary stored procedure in the `tempdb`
    database will make it more difficult to troubleshoot or maintain code related
    to these stored procedures.


    ## Triggers


    SQL Server provides the ability to have specific actions occur as a result or
    instead of an insert, update, or delete. The reactions can occur as a result of
    a user logging into the system. There are other reactions that can happen after
    or prevent changes to the existing database. When dealing with applications and
    data, the most common type of reaction is in response to changing data in the
    database. Regardless of the reason, these reactions are defined as triggers. Triggers
    are a special type of stored procedure that responds to a specific action on the
    server, database(s), or table(s).'
  trans: '

    #### 持久临时表


    在使用临时表时，您可能希望创建一个能超出创建它的会话生命周期而持续存在的表。需要考虑的一点是，如果您计划创建一个存在于 `tempdb` 中的临时表，那么当
    SQL Server 重启时，该表及其数据将不会被保存。为了确保持久临时表保留在 `tempdb` 中，您需要使用下文展示的技术。您可以使用与在用户数据库中创建表类似的
    T-SQL 语法来创建持久临时表。此数据库代码的示例见清单 2-33。


    ```

    USE tempdb;

    GO

    CREATE TABLE TempOrder

    (

    CustomerID      INT,

    CustomerOrderID INT,

    OrderAverage    DECIMAL(6,2)

    );

    Listing 2-33

    创建一个持久临时表

    ```


    您可以使用清单 2-33 中的 T-SQL 代码来创建持久表，但我推荐一种更符合 `tempdb` 使用方式的方法。相反，您可以创建一个在 SQL Server
    启动时执行的存储过程。然后，此存储过程会创建您可能需要的任何全局临时表。您可以使用清单 2-34 中的 T-SQL 来创建一个用于创建全局临时表的存储过程。


    ```

    USE tempdb;

    GO

    CREATE PROCEDURE dbo.CreateGlobalTempOrder

    AS

    CREATE TABLE TempOrder

    (

    CustomerID      INT,

    CustomerOrderID INT,

    OrderAverage    DECIMAL(6,2)

    );

    Listing 2-34

    创建用于重建持久临时表的存储过程

    ```


    一旦创建了清单 2-34 中的存储过程，您需要修改该存储过程选项，以便其在 SQL Server 重启时执行。清单 2-35 中的 T-SQL 允许您将存储过程修改为在启动时执行。


    ```

    EXECUTE sp_procoption ''CreateGlobalTempOrder'', ''startup'', ''true'';

    Listing 2-35

    更新存储过程以在启动时执行

    ```


    如果您发现自己处于考虑使用持久临时表的情况，请考虑您的环境以及由此可能增加的维护和知识共享方面的困难，以便每个人都意识到一个关键任务表可能存在于 `tempdb`
    数据库中。


    ### 表变量


    有些情况下，您希望在本地存储数据，但您知道要存储的记录数量是有限的。如果您不需要数据对其他连接可用，并且只希望数据在批处理内持久存在是可以接受的，那么您可能想尝试使用表变量。在使用表变量时，如果您愿意将所有操作保持在同一个批处理中，您还可以选择按需多次复用该表变量。


    在 SQL Server 2019 之前，表变量的估计行数是 1 行。与本章前面讨论的其他对象类似，SQL Server 在改进表变量相关的一般性能方面取得了显著进步。SQL
    Server 现在能够在使用表变量时生成更准确的估计行数。执行查询的一部分工作涉及 SQL Server 决定如何执行该查询。SQL Server 将执行查询的方法保存在一个称为执行计划的结构中。既然
    SQL Server 现在能更准确地估计行数，它也将此逻辑保存在了执行计划中。


    执行计划最初创建时，是根据参数中提供的原始值计算的。然而，有些数据表的记录数按值分布可能不均匀。如果您遇到这种情况，即通过表变量拉回的数据可能高度偏斜，您可能会发现
    T-SQL 代码的性能表现不一致。这个概念被称为*参数嗅探*。既然表变量的信息现在被存储在执行计划中，遇到参数嗅探的概率就更高了。虽然这可能带来麻烦，但请记住，SQL
    Server 生成的执行计划对于至少某些数据值来说也可能是非常高效的。


    和临时表一样，表变量的创建和使用也可以很直接。清单 2-36 展示了声明和填充表变量的方法。


    ```

    DECLARE @CustomerID INT = 234;

    DECLARE @TempOrder TABLE

    (

    CustomerID      INT,

    CustomerOrderID INT,

    OrderAverage    DECIMAL(6,2)

    );

    INSERT INTO @TempOrder

    (

    CustomerID,

    CustomerOrderID,

    OrderAverage

    )

    SELECT ord.CustomerID,

    ord.CustomerOrderID,

    AVG(dtl.QuantitySold * dtl.ProductPrice)

    AS OrderAverage

    FROM dbo.CustomerOrder ord

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    WHERE ord.CustomerID = @CustomerID

    GROUP BY ord.CustomerID,

    ord.CustomerOrderID;

    SELECT cus.FirstName,

    cus.LastName,

    AVG(OrderAverage) AS AverageOrder

    FROM dbo.Customer cus

    INNER JOIN @TempOrder ord

    ON cus.CustomerID = ord.CustomerID

    GROUP BY cus.FirstName, cus.LastName;

    Listing 2-36

    声明并填充表变量

    ```


    此查询的执行计划看起来与填充本地临时表时在图 2-18 中生成的计划非常相似。图 2-21 显示了填充表变量时创建的执行计划。


    ![](img/480547_2_En_2_Fig21_HTML.jpg)


    一个流程图。T-SQL 的成本为 0%，包含表插入、两次计算标量、流聚合、计算标量和嵌套循环。它来源于索引扫描和聚集索引查找。


    图 2-21


    填充表变量


    既然 SQL Server 2019 已更新，允许在使用表变量时获得更好的估计，我预计执行计划在创建时会对表变量中的行数获得更准确的数字。这种改进的准确性将有助于
    SQL Server 创建性能更高的执行计划。但是，如果您计划向表变量中添加大量数据，请务必仔细检查查询性能。


    ### 临时存储过程


    如果在 `tempdb` 数据库中创建了存储过程，则该存储过程就是临时存储过程。SQL Server 可能实现了此功能，但请考虑开发人员和应用程序将如何与此数据库对象交互。至少，在
    `tempdb` 数据库中存在临时存储过程会使与这些存储过程相关的代码更难以故障排除或维护。


    ## 触发器


    SQL Server 提供了在发生插入、更新或删除操作时（或代替这些操作）执行特定操作的能力。这些响应可以因用户登录系统而触发。还有其他响应可以在现有数据库发生更改之后或之前发生，以防止更改。在处理应用程序和数据时，最常见的响应类型是针对数据库中数据更改的响应。无论出于何种原因，这些响应都被定义为触发器。触发器是一种特殊类型的存储过程，用于响应服务器、数据库或表上的特定操作。

