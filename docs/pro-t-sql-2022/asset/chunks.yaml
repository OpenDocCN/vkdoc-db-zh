  trans: '### 识别数据集合


    查看 `Customer` 表，你可以创建一个数据集合，其中所有城市的名称都包含“Memphis”。`Customer` 表中所有可用值如表 5-11 所示。


    表 5-11

    客户通用列表


    | `First Name` | `Last Name` | `Address` | `City` | `Postal Code` | `Country`
    |

    | --- | --- | --- | --- | --- | --- |

    | Myra | Acharya | 30 Magrath Road | Bengaluru | 560025 | India |

    | Josè | Gomez | 790 Calle Cinco de Mayo | Cancun | 53778 | Mexico |

    | Stacy | Parks | 123 Rua de Santa Catarina | Porto | 1234-567 | Portugal |

    | Karim | Khalil | 153 Road Mit Rahina Al Shabab | Memphis | 3364932 | Egypt |

    | Marty` | Bethel | 750 Cherry Rd | Memphis | 38117 | United States |


    有几种不同的方法可以实现这一点。你可以编写一个查询来查找 `CustomerID` 为 401407 或 401405 的记录。你可以看到此逻辑的结果如表
    5-12 所示。


    表 5-12

    孟菲斯市的客户


    | `First Name` | `Last Name` | `Address` | `City` | `Postal Code` | `Country`
    |

    | --- | --- | --- | --- | --- | --- |

    | Karim | Khalil | 153 Road Mit Rahina Al Shabab | Memphis | 3364932 | Egypt |

    | Marty` | Bethel | 750 Cherry Rd | Memphis | 38117 | United States |


    回到前面的表格，为孟菲斯添加一个新客户。表 5-13 显示了添加的新记录。


    表 5-13

    添加新的孟菲斯客户


    | `First Name` | `Last Name` | `Address` | `City` | `Postal Code` | `Country`
    |

    | --- | --- | --- | --- | --- | --- |

    | Karim | Khalil | 153 Road Mit Rahina Al Shabab | Memphis | 3364932 | Egypt |

    | Marty` | Bethel | 750 Cherry Rd | Memphis | 38117 | United States |

    | Ruth | Johnson | 4711 Ponce de Leon | Memphis | 38110 | United States |


    如果你想仍然显示所有城市为孟菲斯的记录，并且使用与之前相同的逻辑（即使用 `CustomerID` 来显示所需的值），你将不会得到预期的结果。如果你不更改数据访问方式，并使用与获取表
    5-13 结果相同的逻辑，你将得到表 5-14 中显示的结果集。


    表 5-14

    使用 `CustomerID` 查询孟菲斯的客户


    | `CustomerID` | `First Name` | `Last Name` | `City` | `Postal Code` | `Country`
    |

    | --- | --- | --- | --- | --- | --- |

    | 401407 | Karim | Khalil | Memphis | 3364932 | Egypt |

    | 401405 | Marty` | Bethel | Memphis | 38117 | United States |


    表 5-15 通过更改逻辑来查看城市名称以查找所有等于“Memphis”的城市，从而显示了预期的结果。


    表 5-15

    城市名称为“孟菲斯”的客户


    | `CustomerID` | `First Name` | `Last Name` | `City` | `Postal Code` | `Country`
    |

    | --- | --- | --- | --- | --- | --- |

    | 401407 | Karim | Khalil | Memphis | 3364932 | Egypt |

    | 401405 | Marty` | Bethel | Memphis | 38117 | United States |

    | 401408 | Ruth | Johnson | Memphis | 38110 | United States |


    在这种情况下，我会想要运行一个查询，其中城市名称等于“Memphis”。如你在此示例中所见，这不仅在数据集合方面存在限制（影响性能），还可能影响功能。


    使用数据集合时最大的挑战之一与插入数据记录有关。在大多数情况下，当你插入数据记录时，一次只插入一条记录。这可能导致你养成一次只处理插入一条单独记录的习惯。当你设计新表或移动数据时，你可能会遇到可以从数据集合角度考虑插入操作的情况。这通常在你创建查询以将数据插入另一个表时发生。


    虽然这些情况看起来不会经常出现，但我在填充临时表、表变量和公用表表达式时经常使用数据集合。


    以集合形式插入数据建立在以数据集合形式选择数据的基础之上。一旦你以集合形式选择了数据，就可以以集合形式插入数据。我使用将数据插入对象（如临时表）的方式有几个不同的原因。插入数据集合的一个更常见的情况是当我连接几个不同的表，并实现涉及复杂计算或函数的准则时。查看表
    5-16 和表 5-17，你可以看到一些插入到 `dbo.Customer` 中的数据示例。


    表 5-17

    作为记录添加的 Ruth


    | `CustomerID` | `First Name` | `Last Name` | `City` | `Postal Code` | `Country`
    |

    | --- | --- | --- | --- | --- | --- |

    | 401408 | Ruth | Johnson | Memphis | 38110 | United States |


    表 5-16

    作为记录添加的 Marty`


    | `CustomerID` | `First Name` | `Last Name` | `City` | `Postal Code` | `Country`
    |

    | --- | --- | --- | --- | --- | --- |

    | 401405 | Marty` | Bethel | Memphis | 38117 | United States |


    虽然所有这些条目都可以单独插入，但也可以一次插入多条记录。在这种情况下，它可能看起来像表 5-18 所示。


    表 5-18

    作为数据集合添加客户


    | `CustomerID` | `First Name` | `Last Name` | `City` | `Postal Code` | `Country`
    |

    | --- | --- | --- | --- | --- | --- |

    | 401405 | Marty` | Bethel | Memphis | 38117 | United States |

    | 401408 | Ruth | Johnson | Memphis | 38110 | United States |


    我使用批量插入到临时对象中的另一个场景是，当这些记录可能需要通过连接到包含多表连接的其他查询来进行额外修改时。'
- fmt: "# Using Data Sets\n\nIf you are changing how your application code works and\
    \ inserting new tables or changing how the value should be populated, you may\
    \ find yourself needing to perform bulk updates. While you can perform bulk updates\
    \ by updating one record at a time with hard-coded values, let’s see if there\
    \ is a way to update all the records in the data set by using the same code logic.\
    \ This can be where data sets really help you out.\n\nYou can write one query\
    \ to find all the records that you need to update and systematically perform all\
    \ those updates. In addition to the advantages in terms of performance and functionality,\
    \ this type of process also ensures that your data is being handled consistently.\n\
    \nOverall, the process for updating data as a data set is very much like the methods\
    \ discussed for selecting and inserting data. In Table [5-19](#480547_2_En_5_Chapter.xhtml#Tab19),\
    \ you can see information stored in the `dbo.Customer` table.\n\n## Table 5-19:\
    \ Customers and Address Information\n\n| First Name | Last Name | Address | City\
    \ | Postal Code | Country |\n| --- | --- | --- | --- | --- | --- |\n| Myra | Acharya\
    \ | 30 Magrath Road | Bengaluru | 560025 | India |\n| Josè | Gomez | 790 Calle\
    \ Cinco de Mayo | Cancun | 53778 | Mexico |\n| Stacy | Parks | 123 Rua de Santa\
    \ Catarina | Porto | 1234-567 | Portugal |\n| Karim | Khalil | 153 Road Mit Rahina\
    \ Al Shabab | Memphis | 3364932 | Egypt |\n\nWhile this is how the customers are\
    \ currently saved, you may decide that you want to change how address information\
    \ is saved. You may want to change the country to use a country code abbreviation\
    \ instead of the full county name. In this case, you can update the records one\
    \ at a time as shown in Table [5-20](#480547_2_En_5_Chapter.xhtml#Tab20), Table\
    \ [5-21](#480547_2_En_5_Chapter.xhtml#Tab21), Table [5-22](#480547_2_En_5_Chapter.xhtml#Tab22),\
    \ and Table [5-23](#480547_2_En_5_Chapter.xhtml#Tab23).\n\n## Table 5-23: Update\
    \ Country for Josè\n\n| First Name | Last Name | Address | City | Postal Code\
    \ | Country |\n| --- | --- | --- | --- | --- | --- |\n| Karim | Khalil | 153 Road\
    \ Mit Rahina Al Shabab | Memphis | 3364932 | EGY |\n\n## Table 5-22: Update Country\
    \ for Stacy\n\n| First Name | Last Name | Address | City | Postal Code | Country\
    \ |\n| --- | --- | --- | --- | --- | --- |\n| Stacy | Parks | 123 Rua de Santa\
    \ Catarina | Porto | 1234-567 | PRT |\n\n## Table 5-21: Update Country for Josè\n\
    \n| First Name | Last Name | Address | City | Postal Code | Country |\n| --- |\
    \ --- | --- | --- | --- | --- |\n| Josè | Gomez | 790 Calle Cinco de Mayo | Cancun\
    \ | 53778 | MEX |\n\n## Table 5-20: Update Country for Myra\n\n| First Name |\
    \ Last Name | Address | City | Postal Code | Country |\n| --- | --- | --- | ---\
    \ | --- | --- |\n| Myra | Acharya | 30 Magrath Road | Bengaluru | 560025 | IND\
    \ |\n\nTo use `T-SQL` to perform these updates one at a time, execute the code\
    \ in Listing [5-4](#480547_2_En_5_Chapter.xhtml#PC4) below.\n\n```sql\nUPDATE\
    \ dbo.Customer\nSET Country = 'IND'\nWHERE CustomerID = 401408;\nUPDATE dbo.Customer\n\
    SET Country = 'MEX'\nWHERE CustomerID = 401406;\nUPDATE dbo.Customer\nSET Country\
    \ = 'PRT'\nWHERE CustomerID = 401409;\nUPDATE dbo.Customer\nSET Country = 'EGY'\n\
    WHERE CustomerID = 401407;\n```\n*Listing 5-4: Updating the Country Code Individually*\n\
    \nYou can create a handful of queries that can update all records with the country\
    \ of either India, Mexico, Egypt, or Portugal. Listing [5-5](#480547_2_En_5_Chapter.xhtml#PC5)\
    \ shows these queries.\n\n```sql\nUPDATE dbo.Customer\nSET Country = 'IND'\nWHERE\
    \ Country = 'India';\nUPDATE dbo.Customer\nSET Country = 'MEX'\nWHERE CustomerID\
    \ = 'Mexico';\nUPDATE dbo.Customer\nSET Country = 'PRT'\nWHERE CustomerID = 'Portugal';\n\
    UPDATE dbo.Customer\nSET Country = 'EGY'\nWHERE CustomerID = 'Egypt';\n```\n*Listing\
    \ 5-5: Updating the Country Code by Country*\n\nThis code will work, and it creates\
    \ some sets. There are still more efficient ways to update this data, especially\
    \ if you don’t want to create one query per country. You can create a reference\
    \ table with the full country name and three-digit country abbreviation. You can\
    \ write a simple query and update all the records at the same time as shown in\
    \ Table [5-24](#480547_2_En_5_Chapter.xhtml#Tab24).\n\n## Table 5-24: Customers\
    \ as Data Sets by Country\n\n| First Name | Last Name | Address | City | Postal\
    \ Code | Country |\n| --- | --- | --- | --- | --- | --- |\n| Myra | Acharya |\
    \ 30 Magrath Road | Bengaluru | 560025 | IND |\n| Josè | Gomez | 790 Calle Cinco\
    \ de Mayo | Cancun | 53778 | MEX |\n| Stacy | Parks | 123 Rua de Santa Catarina\
    \ | Porto | 1234-567 | PRT |\n| Karim | Khalil | 153 Road Mit Rahina Al Shabab\
    \ | Memphis | 3364932 | EGY |\n\nThis table shows the entire data set you want\
    \ to update using a single query. Before you perform the update, you should create\
    \ the reference table. The `SQL` to create this table is in Listing [5-6](#480547_2_En_5_Chapter.xhtml#PC6).\n\
    \n```sql\nCREATE TABLE dbo.Country\n(\nCountryCode VARCHAR(3),\nCountry     VARCHAR(75)\n\
    );\nINSERT INTO dbo.Country (CountryCode, Country)\nVALUES\n('EGY','Egypt'),\n\
    ('IND','India'),\n('MEX','Mexico'),\n('PRT','Portugal');\n```\n*Listing 5-6: Creating\
    \ the Country Reference Table*\n\nNow that the `Country` table has been created,\
    \ you can write a single query that will update all the country names, as long\
    \ as they exist in the reference table, to the country codes you’ve specified.\
    \ The `SQL` in Listing [5-7](#480547_2_En_5_Chapter.xhtml#PC7) updates all customer\
    \ records to use a country code if the country name exists in `dbo.Country`.\n\
    \n```sql\nUPDATE cus\nSET Country = cty.CountryCode,\n    DateModified = GETDATE()\n\
    FROM dbo.Customer cus\nINNER JOIN dbo.Country cty\n    ON cus.Country = cty.Country;\n\
    ```\n*Listing 5-7: Updating the Customer Country to Country Code*\n\nWhile these\
    \ updates can be done in a with hard-coded values, there are times when it may\
    \ be better to join the table you are updating to other related tables. This type\
    \ of interaction between the tables may make it easier to perform your updates.\n\
    \nYou can use the addresses for the customers to determine how to update the country\
    \ codes. It helps to think about the logic you want to use. If you want to add\
    \ the continent to the address, you first need to determine the country for each\
    \ customer. The next step is to get a table for countries and their associated\
    \ continent. Once you have both pieces of information, you can create a temporary\
    \ table to map the country to a specific continent. While it may seem like this\
    \ is a significant amount of work for just a few changes, the power comes when\
    \ you need to maintain this data over time and may need to make updates like these\
    \ on a more regular basis.\n\nIn general, I found anytime that I am dealing with\
    \ data one record of the time, I often have to perform some type of manual interaction.\
    \ I have found that manual interactions are the most likely to have issues or\
    \ errors where data is inserted, updated, or deleted incorrectly. I much prefer\
    \ writing code in data sets, so that I can be more assured that my logic is consistent."
  raw: '### Using Data Sets


    If you are changing how your application code works and inserting new tables or
    changing how the value should be populated, you may find yourself needing to perform
    bulk updates. While you can perform bulk updates by updating one record at a time
    with hard-coded values, let’s see if there is a way to update all the records
    in the data set by using the same code logic. This can be where data sets really
    help you out.


    You can write one query to find all the records that you need to update and systematically
    perform all those updates. In addition to the advantages in terms of performance
    and functionality, this type of process also ensures that your data is being handled
    consistently.


    Overall, the process for updating data as a data set is very much like the methods
    discussed for selecting and inserting data. In Table [5-19](#480547_2_En_5_Chapter.xhtml#Tab19),
    you can see information stored in the `dbo.Customer` table.


    Table 5-19


    Customers and Address Information


    | First Name | Last Name | Address | City | Postal Code | Country |

    | --- | --- | --- | --- | --- | --- |

    | Myra | Acharya | 30 Magrath Road | Bengaluru | 560025 | India |

    | Josè | Gomez | 790 Calle Cinco de Mayo | Cancun | 53778 | Mexico |

    | Stacy | Parks | 123 Rua de Santa Catarina | Porto | 1234-567 | Portugal |

    | Karim | Khalil | 153 Road Mit Rahina Al Shabab | Memphis | 3364932 | Egypt |


    While this is how the customers are currently saved, you may decide that you want
    to change how address information is saved. You may want to change the country
    to use a country code abbreviation instead of the full county name. In this case,
    you can update the records one at a time as shown in Table [5-20](#480547_2_En_5_Chapter.xhtml#Tab20),
    Table [5-21](#480547_2_En_5_Chapter.xhtml#Tab21), Table [5-22](#480547_2_En_5_Chapter.xhtml#Tab22),
    and Table [5-23](#480547_2_En_5_Chapter.xhtml#Tab23).


    Table 5-23


    Update Country for Josè


    | First Name | Last Name | Address | City | Postal Code | Country |

    | --- | --- | --- | --- | --- | --- |

    | Karim | Khalil | 153 Road Mit Rahina Al Shabab | Memphis | 3364932 | EGY |


    Table 5-22


    Update Country for Stacy


    | First Name | Last Name | Address | City | Postal Code | Country |

    | --- | --- | --- | --- | --- | --- |

    | Stacy | Parks | 123 Rua de Santa Catarina | Porto | 1234-567 | PRT |


    Table 5-21


    Update Country for Josè


    | First Name | Last Name | Address | City | Postal Code | Country |

    | --- | --- | --- | --- | --- | --- |

    | Josè | Gomez | 790 Calle Cinco de Mayo | Cancun | 53778 | MEX |


    Table 5-20


    Update Country for Myra


    | First Name | Last Name | Address | City | Postal Code | Country |

    | --- | --- | --- | --- | --- | --- |

    | Myra | Acharya | 30 Magrath Road | Bengaluru | 560025 | IND |


    To use T-SQL to perform these updates one at a time, execute the code in Listing
    [5-4](#480547_2_En_5_Chapter.xhtml#PC4) below.


    ```

    UPDATE dbo.Customer

    SET Country = ''IND''

    WHERE CustomerID = 401408;

    UPDATE dbo.Customer

    SET Country = ''MEX''

    WHERE CustomerID = 401406;

    UPDATE dbo.Customer

    SET Country = ''PRT''

    WHERE CustomerID = 401409;

    UPDATE dbo.Customer

    SET Country = ''EGY''

    WHERE CustomerID = 401407;

    Listing 5-4

    Updating the Country Code Individually

    ```


    You can create a handful of queries that can update all records with the country
    of either India, Mexico, Egypt, or Portugal. Listing [5-5](#480547_2_En_5_Chapter.xhtml#PC5)
    shows these queries.


    ```

    UPDATE dbo.Customer

    SET Country = ''IND''

    WHERE Country = ''India'';

    UPDATE dbo.Customer

    SET Country = ''MEX''

    WHERE CustomerID = ''Mexico'';

    UPDATE dbo.Customer

    SET Country = ''PRT''

    WHERE CustomerID = ''Portugal'';

    UPDATE dbo.Customer

    SET Country = ''EGY''

    WHERE CustomerID = ''Egypt'';

    Listing 5-5

    Updating the Country Code by Country

    ```


    This code will work, and it creates some sets. There are still more efficient
    ways to update this data, especially if you don’t want to create one query per
    country. You can create a reference table with the full country name and three-digit
    country abbreviation. You can write a simple query and update all the records
    at the same time as shown in Table [5-24](#480547_2_En_5_Chapter.xhtml#Tab24).


    Table 5-24


    Customers as Data Sets by Country


    | First Name | Last Name | Address | City | Postal Code | Country |

    | --- | --- | --- | --- | --- | --- |

    | Myra | Acharya | 30 Magrath Road | Bengaluru | 560025 | IND |

    | Josè | Gomez | 790 Calle Cinco de Mayo | Cancun | 53778 | MEX |

    | Stacy | Parks | 123 Rua de Santa Catarina | Porto | 1234-567 | PRT |

    | Karim | Khalil | 153 Road Mit Rahina Al Shabab | Memphis | 3364932 | EGY |


    This table shows the entire data set you want to update using a single query.
    Before you perform the update, you should create the reference table. The SQL
    to create this table is in Listing [5-6](#480547_2_En_5_Chapter.xhtml#PC6).


    ```

    CREATE TABLE dbo.Country

    (

    CountryCode VARCHAR(3),

    Country     VARCHAR(75)

    );

    INSERT INTO dbo.Country (CountryCode, Country)

    VALUES

    (''EGY'',''Egypt''),

    (''IND'',''India''),

    (''MEX'',''Mexico''),

    (''PRT'',''Portugal'');

    Listing 5-6

    Creating the Country Reference Table

    ```


    Now that the country table has been created, you can write a single query that
    will update all the country names, as long as they exist in the reference table,
    to the country codes you’ve specified. The SQL in Listing [5-7](#480547_2_En_5_Chapter.xhtml#PC7)
    updates all customer records to use a country code if the country name exists
    in `dbo.Country`.


    ```

    UPDATE cus

    SET Country = cty.CountryCode,

    DateModified = GETDATE()

    FROM dbo.Customer cus

    INNER JOIN dbo.Country cty

    ON cus.Country = cty.Country;

    Listing 5-7

    Updating the Customer Country to Country Code

    ```


    While these updates can be done in a with hard-coded values, there are times when
    it may be better to join the table you are updating to other related tables. This
    type of interaction between the tables may make it easier to perform your updates.


    You can use the addresses for the customers to determine how to update the country
    codes. It helps to think about the logic you want to use. If you want to add the
    continent to the address, you first need to determine the country for each customer.
    The next step is to get a table for countries and their associated continent.
    Once you have both pieces of information, you can create a temporary table to
    map the country to a specific continent. While it may seem like this is a significant
    amount of work for just a few changes, the power comes when you need to maintain
    this data over time and may need to make updates like these on a more regular
    basis.


    In general, I found anytime that I am dealing with data one record of the time,
    I often have to perform some type of manual interaction. I have found that manual
    interactions are the most likely to have issues or errors where data is inserted,
    updated, or deleted incorrectly. I much prefer writing code in data sets, so that
    I can be more assured that my logic is consistent.'
  trans: "\n# 使用数据集\n\n如果你正在更改应用程序代码的工作方式，例如插入新表或修改值的填充方式，你可能会发现自己需要执行批量更新。虽然你可以通过使用硬编码值逐条更新记录来完成批量更新，但让我们看看是否有一种方法能够使用相同的代码逻辑来更新数据集中的所有记录。这正是数据集真正能帮助你的地方。\n\
    \n你可以编写一个查询来查找所有需要更新的记录，并系统地执行所有这些更新操作。除了在性能和功能方面的优势外，这种处理方式还能确保你的数据得到一致性的处理。\n\
    \n总的来说，作为数据集更新数据的过程与之前讨论的选择和插入数据的方法非常相似。在表 5-19 中，你可以看到存储在 `dbo.Customer` 表中的信息。\n\
    \n## 表 5-19：客户与地址信息\n\n| 名字 | 姓氏 | 地址 | 城市 | 邮政编码 | 国家 |\n| --- | --- | --- |\
    \ --- | --- | --- |\n| Myra | Acharya | 30 Magrath Road | Bengaluru | 560025 |\
    \ India |\n| Josè | Gomez | 790 Calle Cinco de Mayo | Cancun | 53778 | Mexico\
    \ |\n| Stacy | Parks | 123 Rua de Santa Catarina | Porto | 1234-567 | Portugal\
    \ |\n| Karim | Khalil | 153 Road Mit Rahina Al Shabab | Memphis | 3364932 | Egypt\
    \ |\n\n虽然这是客户当前的保存方式，但你可能会决定要改变地址信息的保存方式。例如，你可能希望将国家字段改为使用国家代码缩写，而不是完整的国家名称。在这种情况下，你可以如表\
    \ 5-20、表 5-21、表 5-22 和表 5-23 所示，逐条更新记录。\n\n## 表 5-23：为 Josè 更新国家\n\n| 名字 | 姓氏\
    \ | 地址 | 城市 | 邮政编码 | 国家 |\n| --- | --- | --- | --- | --- | --- |\n| Karim | Khalil\
    \ | 153 Road Mit Rahina Al Shabab | Memphis | 3364932 | EGY |\n\n## 表 5-22：为 Stacy\
    \ 更新国家\n\n| 名字 | 姓氏 | 地址 | 城市 | 邮政编码 | 国家 |\n| --- | --- | --- | --- | --- | ---\
    \ |\n| Stacy | Parks | 123 Rua de Santa Catarina | Porto | 1234-567 | PRT |\n\n\
    ## 表 5-21：为 Josè 更新国家\n\n| 名字 | 姓氏 | 地址 | 城市 | 邮政编码 | 国家 |\n| --- | --- | ---\
    \ | --- | --- | --- |\n| Josè | Gomez | 790 Calle Cinco de Mayo | Cancun | 53778\
    \ | MEX |\n\n## 表 5-20：为 Myra 更新国家\n\n| 名字 | 姓氏 | 地址 | 城市 | 邮政编码 | 国家 |\n| ---\
    \ | --- | --- | --- | --- | --- |\n| Myra | Acharya | 30 Magrath Road | Bengaluru\
    \ | 560025 | IND |\n\n要使用 `T-SQL` 逐条执行这些更新，请运行下面的代码清单 5-4。\n\n```sql\nUPDATE dbo.Customer\n\
    SET Country = 'IND'\nWHERE CustomerID = 401408;\nUPDATE dbo.Customer\nSET Country\
    \ = 'MEX'\nWHERE CustomerID = 401406;\nUPDATE dbo.Customer\nSET Country = 'PRT'\n\
    WHERE CustomerID = 401409;\nUPDATE dbo.Customer\nSET Country = 'EGY'\nWHERE CustomerID\
    \ = 401407;\n```\n*清单 5-4：逐个更新国家代码*\n\n你可以创建一些查询来批量更新所有国家为印度、墨西哥、埃及或葡萄牙的记录。代码清单\
    \ 5-5 展示了这些查询。\n\n```sql\nUPDATE dbo.Customer\nSET Country = 'IND'\nWHERE Country\
    \ = 'India';\nUPDATE dbo.Customer\nSET Country = 'MEX'\nWHERE CustomerID = 'Mexico';\n\
    UPDATE dbo.Customer\nSET Country = 'PRT'\nWHERE CustomerID = 'Portugal';\nUPDATE\
    \ dbo.Customer\nSET Country = 'EGY'\nWHERE CustomerID = 'Egypt';\n```\n*清单 5-5：按国家更新国家代码*\n\
    \n这段代码可以工作，并创建了一些集合。但还有更高效的方法来更新这些数据，特别是当你不想为每个国家创建一个查询时。你可以创建一个包含完整国家名称和三位国家代码的引用表。然后编写一个简单的查询，同时更新所有记录，如表\
    \ 5-24 所示。\n\n## 表 5-24：按国家分组的客户数据集\n\n| 名字 | 姓氏 | 地址 | 城市 | 邮政编码 | 国家 |\n| ---\
    \ | --- | --- | --- | --- | --- |\n| Myra | Acharya | 30 Magrath Road | Bengaluru\
    \ | 560025 | IND |\n| Josè | Gomez | 790 Calle Cinco de Mayo | Cancun | 53778\
    \ | MEX |\n| Stacy | Parks | 123 Rua de Santa Catarina | Porto | 1234-567 | PRT\
    \ |\n| Karim | Khalil | 153 Road Mit Rahina Al Shabab | Memphis | 3364932 | EGY\
    \ |\n\n此表显示了你希望使用单个查询更新的整个数据集。在执行更新之前，你应该先创建引用表。创建该表的 `SQL` 语句在代码清单 5-6 中。\n\n\
    ```sql\nCREATE TABLE dbo.Country\n(\nCountryCode VARCHAR(3),\nCountry     VARCHAR(75)\n\
    );\nINSERT INTO dbo.Country (CountryCode, Country)\nVALUES\n('EGY','Egypt'),\n\
    ('IND','India'),\n('MEX','Mexico'),\n('PRT','Portugal');\n```\n*清单 5-6：创建国家引用表*\n\
    \n现在 `Country` 表已经创建好了，你可以编写一个单一的查询，只要国家名称存在于引用表中，它就会将所有国家名称更新为你指定的国家代码。代码清单 5-7\
    \ 中的 `SQL` 会更新所有客户记录，如果国家名称存在于 `dbo.Country` 表中，则使用对应的国家代码。\n\n```sql\nUPDATE\
    \ cus\nSET Country = cty.CountryCode,\n    DateModified = GETDATE()\nFROM dbo.Customer\
    \ cus\nINNER JOIN dbo.Country cty\n    ON cus.Country = cty.Country;\n```\n*清单\
    \ 5-7：将客户国家更新为国家代码*\n\n虽然这些更新可以通过硬编码值来完成，但有时将你正在更新的表与其他相关表连接起来可能更好。表之间的这种交互可能使执行更新操作变得更加容易。\n\
    \n你可以使用客户的地址来决定如何更新国家代码。思考一下你想要使用的逻辑会很有帮助。如果你想在地址中添加所属大洲，你首先需要确定每个客户所在的国家。下一步是获取一个包含国家及其对应大洲的表。一旦你拥有了这两部分信息，你就可以创建一个临时表来将国家映射到特定的大洲。虽然对于仅仅几处更改来说，这似乎需要大量的工作，但其威力体现在你需要长期维护这些数据，并且可能需要更频繁地进行此类更新时。\n\
    \n总的来说，我发现每当我需要逐条处理数据时，我通常必须执行某种手动操作。而手动操作最有可能在插入、更新或删除数据时出现数据错误的问题。我更喜欢在数据集中编写代码，这样我更能确保我的逻辑是一致的。\n"
- fmt: '## Writing Code for Data Sets


    Previously, I discussed how to start thinking about your data as data sets instead
    of individual records. I frequently use data sets when selecting, updating, or
    deleting data. While most application code inserts single records at a time, there
    are many common scenarios where inserting data as a data set may be helpful. In
    this next section, I will walk through various scenarios where you may want to
    think about your data as sets instead of individual records.


    The most frequent use for data sets is when you want to view a portion of data.
    Ideally, these data sets are selected based upon specific criteria. This is not
    only good for performance but can also help make sure you are only looking at
    the specific data that you want. For most scenarios, it does not even make sense
    to retrieve and display one individual record at a time. Oftentimes, if you find
    yourself in a situation where you are selecting one record at a time, it is a
    good indication that you may want to see if that `T-SQL` code can be rewritten
    to use set-based logic.


    There are more complex ways that queries can be selected. In some cases, you may
    find yourself wanting to combine or compare two different data sets. If you want
    to join two data sets together, you have the option of `UNION` or `UNION ALL`.
    There is only one small but important difference between them. Referring back
    to Table [5-2](#480547_2_En_5_Chapter.xhtml#Tab2), I identified two different
    sets of data, one based on the city name and the other based on part of the address.
    In the following example, I will show one method you can use to find results that
    contain both of these data sets. When you `UNION` data, each record returned will
    be distinct between the `SELECT` statements that are joined together. Listing
    [5-8](#480547_2_En_5_Chapter.xhtml#PC8) shows a `UNION` between two queries.


    ```sql

    SELECT FirstName, LastName

    FROM dbo.Customer

    WHERE City = ''Memphis''

    UNION

