- fmt: 'At a glance, the execution plan in Figure [9-3](#480547_2_En_9_Chapter.xhtml#Fig3)
    looks very similar to the execution plan in Figure [9-1](#480547_2_En_9_Chapter.xhtml#Fig1).
    When comparing execution plans that look similar, they can be said to have the
    same shape. While these execution plans have a similar shape, the items that make
    up the execution plan are different. In Figure [9-1](#480547_2_En_9_Chapter.xhtml#Fig1),
    there was an `index scan`. In Figure [9-3](#480547_2_En_9_Chapter.xhtml#Fig3),
    you can see that this execution plan is using an `index seek`. There is also a
    thinner line between the `index seek` from the `SELECT` in Figure [9-3](#480547_2_En_9_Chapter.xhtml#Fig3)
    than there is in the `index scan` from the `SELECT` in Figure [9-1](#480547_2_En_9_Chapter.xhtml#Fig1).
    All of this is a graphical representation of the overall performance of each query.
    However, you can also get some facts and figures to compare the performance to
    the queries in Listings [9-1](#480547_2_En_9_Chapter.xhtml#PC1) and [9-2](#480547_2_En_9_Chapter.xhtml#PC2).
    In Figure [9-2](#480547_2_En_9_Chapter.xhtml#Fig2), the actual number of rows
    read was 32,242\. Let’s compare this value to the actual number of rows read from
    Figure [9-4](#480547_2_En_9_Chapter.xhtml#Fig4).


    ![](images/480547_2_En_9_Chapter/480547_2_En_9_Fig4_HTML.jpg)


    A screenshot presents the properties of a clustered `index scan`. The physical
    and logical operations have value as the `index seek`. The execution and actual
    execution modes have values as `Row`. The number of rows read is 401408.


    Figure 9-4


    Properties for the `index seek` from sargeable criteria


    The actual number of rows read for Listing [9-2](#480547_2_En_9_Chapter.xhtml#PC2)
    is 1, as shown in Figure [9-4](#480547_2_En_9_Chapter.xhtml#Fig4). Comparing 392
    rows read for Listing [9-2](#480547_2_En_9_Chapter.xhtml#PC2) to 401,408 rows
    read for Listing [9-1](#480547_2_En_9_Chapter.xhtml#PC1), it becomes very clear
    which query is more efficient.


    You can also look at the total `CPU` usage for both queries to see how each query
    performs. If you run both queries in Listings [9-1](#480547_2_En_9_Chapter.xhtml#PC1)
    and [9-2](#480547_2_En_9_Chapter.xhtml#PC2) at the same time, 98% of the total
    execution plan of both queries is spent on the query in Listing [9-1](#480547_2_En_9_Chapter.xhtml#PC1).
    You can also use `SET STATISTICS TIME ON` to find the `CPU` time and elapsed time.
    The `CPU` time is the total amount of time the query execution spent on the `CPU`
    or `CPUs`. The elapsed time is the total time for the query to execute. I ran
    both queries several times and found that the average `CPU` time for Listing [9-1](#480547_2_En_9_Chapter.xhtml#PC1)
    was 15 milliseconds and the average elapsed time for Listing [9-1](#480547_2_En_9_Chapter.xhtml#PC1)
    was 17 milliseconds. Each time the `CPU` time and elapsed time for Listing [9-2](#480547_2_En_9_Chapter.xhtml#PC2)
    was 0 millisecond. Comparing both the `CPU` time and the elapsed time, you can
    clearly see that Listing [9-2](#480547_2_En_9_Chapter.xhtml#PC2) performs better
    than Listing [9-1](#480547_2_En_9_Chapter.xhtml#PC1). Listing [9-1](#480547_2_En_9_Chapter.xhtml#PC1)
    read the data using an `index scan` and Listing [9-2](#480547_2_En_9_Chapter.xhtml#PC2)
    accessed the data using an `index seek`. This `index seek` allowed `SQL Server`
    to decrease the estimate `I/O` cost significantly as well as the estimate `CPU`
    cost. It is also important to note that the total elapsed time could be less than
    the total `CPU` time if there are multiple `CPUs`.


    ## Implicit Conversion


    The data in `SQL Server` has a data type. These data types were discussed in Chapter
    [2](#480547_2_En_2_Chapter.xhtml). When using these data types, it is important
    to make sure you keep the data types consistent. Otherwise, `SQL Server` must
    undergo an implicit conversion. This is where `SQL Server` converts one data type
    to another behind the scenes. This can cause additional load on `SQL Server`.
    In addition, there is a risk that the implicit conversion will fail. I see this
    most when an identification type column saves mostly integer values but occasionally
    strings.


    ## SET NOCOUNT ON


    There are many small tweaks that you can make to your `T-SQL` that will allow
    for some minor performance improvements. When you run `T-SQL` code by default,
    it will count the number of rows affected and can report them back. The cost of
    counting these records can be a few extra milliseconds. Therefore, a possible
    enhancement to the coding standards is to turn this functionality off, particularly
    when it involves stored procedures. The way to accomplish this is to make sure
    that `SET NOCOUNT ON` is included inside of a stored procedure. You can see this
    in Listing [9-3](#480547_2_En_9_Chapter.xhtml#PC3).


    ```sql

    /*-------------------------------------------------------------*\

    Name:             dbo.GetCustomer

    Author:           Elizabeth Noble

    Created Date:     2022-10-30

    Description:      Get a list of all customers in the databases

    Sample Usage:

    EXECUTE dbo.GetCustomer;

    \*-------------------------------------------------------------*/

    CREATE PROCEDURE dbo.GetCustomer

    AS

    SET NOCOUNT ON;

    SELECT

    CustomerID,

    FirstName,

    LastName,

    Address,

    City,

    PostalCode,

    Country,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Customer;

    ```

    Listing 9-3

    Stored Procedure Using `SET NOCOUNT ON`


    When `SET NOCOUNT ON` is included before the query code is executed, the stored
    procedure can execute in a couple fewer milliseconds.


    ## NULL Values


    Most of the `T-SQL` coding standards exist to help improve overall performance
    for `SQL Server`. However, some `T-SQL` coding standards exist to help improve
    query results or make it easier for people to write code that works as expected.
    One of the issues with `NULL` is that it does not work intuitively. `NULL` is
    treated as an unknown value in `SQL Server`. That means that `NULL` is neither
    true nor false. Therefore, where there are fields that can contain `NULL` values,
    the way these fields must be treated is different.


    In addition, `NULL` values may indicate that tables were not designed efficiently.
    Before ending up in these scenarios, it may be beneficial to consider how the
    table should be designed. You want to make sure that the table really needs to
    include nullable columns. This is also due to how data is stored and how indexes
    are created. You want to consider how this data will be used.'
