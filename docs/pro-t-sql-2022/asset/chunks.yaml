    \ CustomerOrderID = 802821;\n```\n清单 14-11\n删除 dbo.CustomerOrder 中的客户订单\n\n删除此记录后，可以执行清单\
    \ 14-10 中的 T-SQL 来确定跟踪表中是否有新添加的记录。此查询的结果如表 14-6 所示。\n\n表 14-6\n\n dbo.CustomerOrder\
    \ 的变更跟踪输出\n\n| __$start_lsn | __$operation | CustomerOrderID | CustomerOrder |\n\
    | --- | --- | --- | --- |\n| 0x000000AF0001FA500005 | 2 | 802821 | T15493 |\n\
    | 0x000000AF0001FC300003 | 3 | 802821 | T15493 |\n| 0x000000AF0001FC300003 | 4\
    \ | 802821 | T-15493 |\n| 0x000000B0000003A00008 | 1 | 802821 | T-15493 |\n\n\
    表中的最后一条记录是为了跟踪清单 14-11 中的删除操作而添加的。`__$operation` 为 `1` 用于表示该记录正在跟踪对表执行的删除操作。\n\
    \n如果表已存在并且您启用了变更数据捕获，您将无法找到原始数据记录的条目，直到它们被更新。一旦这些记录被修改，它们将出现在 `cdc.dbo_CustomerOrder_CT`\
    \ 表中。虽然变更数据捕获在设置和实现上可能很简单，但在将表添加到变更数据捕获时应谨慎。添加到变更数据捕获的每个表都会导致创建两个 SQL Server Agent\
    \ 作业。由于跟踪这些表上的更改，还会产生大量的日志记录。这两者都可能导致 SQL Server 使用额外的资源。\n\n您可以使用变更跟踪、变更数据捕获或数据库触发器来跟踪数据修改。所有这些选项都有其自身的优点和局限性。在为组织选择合适的选项时，您需要考虑需要记录的数据类型以及您愿意为跟踪这些更改所承担的性能开销。如果您需要更好的性能，通常必须选择较少的功能。您想要收集的信息越多，或者您想要自定义记录数据修改的程度越高，都将导致硬件利用率增加和潜在的性能开销。\n\
    \n## 错误处理\n\n本节讨论如何编写 T-SQL 代码，以便在遇到错误时能按预期（甚至优雅地）运行。一种解决方案是使用 `TRY…CATCH` 块。这是编写\
    \ T-SQL 代码时的一种流行方法。但是，它确实需要对未设计为能优雅处理 SQL Server 错误的应用程序进行一些潜在的修改。另一个不太稳健的选择是创建数据库表来记录历史信息以及日志活动。这可能在防止应用程序崩溃方面帮助不大，但它可能有助于显示问题开始发生的时间。\n\
    \n除了记录数据修改外，记录数据库中发生的某些类型的错误也可能对您有益。虽然可能会发生特定于 SQL Server 的错误，但这并不是本节的重点。也有一些错误是由于应用程序与数据库交互而产生的。其中许多错误可以作为应用程序开发的一部分在\
    \ SQL Server 外部记录。但是，您可能会发现某些问题需要从 SQL Server 内部访问。\n\n在考虑错误处理时，您需要考虑如何记录该信息以及应用程序如何处理错误。在\
    \ SQL Server 内部更常见的选项之一是使用 `TRY...CATCH` 块。这段代码封装了尝试执行 T-SQL 代码并在尝试失败时执行特定操作的能力。如果代码成功，则\
    \ T-SQL 代码将按预期执行。清单 14-12 展示了一个 `TRY…CATCH` 块。\n\n```sql\nCREATE PROCEDURE dbo.CustomerOrderInsert\n\
    @CustomerID INT,\n@OrderNumber VARCHAR(15),\n@OrderDate DATETIME2(2),\n@ShipDate\
    \ DATETIME2(2),\n@IsActive BIT,\n@DateCreated DATETIME2(2),\n@DateModified DATETIME2(2),\n\
    @DateDisabled DATETIME2(2)\nAS\nBEGIN TRY\nBEGIN TRANSACTION;\nINSERT INTO dbo.CustomerOrder\n\
    (\nCustomerID,\nOrderNumber,\nOrderDate,\nShipDate,\nIsActive,\nDateCreated,\n\
    DateModified,\nDateDisabled\n)\nVALUES\n(\n@CustomerID,\n@OrderNumber,\n@OrderDate,\n\
    @ShipDate,\n@IsActive,\n@DateCreated,\n@DateModified,\n@DateDisabled\n);\nCOMMIT\
    \ TRANSACTION;\nEND TRY\nBEGIN CATCH\nROLLBACK TRANSACTION;\nEND CATCH;\n```\n\
    清单 14-12\n用于插入客户订单的 Try…Catch 块\n\n如果没有错误，此代码块将插入一条记录。但是，如果遇到错误，事务将回滚。有一些方法可以将此功能与您的应用程序代码集成，以便用户知道事务出错。使用此方法的目标是防止应用程序崩溃或防止最终用户期望事务正确保存。\n\
    \n您还可以在 `CATCH` 块中添加错误处理，以提供有关失败原因的更多信息。您可以更新清单 14-12 中的存储过程以包含错误输出，如清单 14-13\
    \ 所示。\n\n```sql\nCREATE OR ALTER PROCEDURE dbo.CustomerOrderInsert\n@CustomerID\
    \ INT,\n@OrderNumber VARCHAR(15),\n@OrderDate DATETIME2(2),\n@ShipDate DATETIME2(2),\n\
    @IsActive BIT,\n@DateCreated DATETIME2(2),\n@DateModified DATETIME2(2),\n@DateDisabled\
    \ DATETIME2(2)\nAS\nBEGIN TRY\nBEGIN TRANSACTION;\nINSERT INTO dbo.CustomerOrder\n\
    (\nCustomerID,\nOrderNumber,\nOrderDate,\nShipDate,\nIsActive,\nDateCreated,\n\
    DateModified,\nDateDisabled\n)\nVALUES\n(\n@CustomerID,\n@OrderNumber,\n@OrderDate,\n\
    @ShipDate,\n@IsActive,\n@DateCreated,\n@DateModified,\n@DateDisabled\n);\nCOMMIT\
    \ TRANSACTION;\nEND TRY\nBEGIN CATCH\nSELECT ERROR_NUMBER() AS ErrorNumber,\n\
    ERROR_SEVERITY() AS ErrorSeverity,\nERROR_STATE() AS ErrorState,\nERROR_PROCEDURE()\
    \ AS ErrorProcedure,\nERROR_MESSAGE() AS ErrorMessage;\nROLLBACK TRANSACTION;\n\
    END CATCH;\n```\n清单 14-13\n用于插入客户订单并包含错误信息的 Try…Catch 块\n\n现在，如果插入失败有原因，用户将收到一条包含失败信息的消息。这使用户可以选择更正问题并重试该操作。\n"
- fmt: "## 1. 代码执行与错误处理\n\nFor instance, if you execute the T-SQL code in Listing\
    \ [14-4](#480547_2_En_14_Chapter.xhtml#PC14), you will create a situation where\
    \ the insert will fail.\n\n```sql\nALTER TABLE [dbo].[CustomerOrder] WITH CHECK\n\
    ADD CONSTRAINT [FK_CustomerOrder_Customer]\nFOREIGN KEY([CustomerID])\nREFERENCES\
    \ [dbo].[Customer] ([CustomerID]);\nDECLARE @Date DATETIME2(2) = CAST(SYSDATETIME()\
    \ AS DATETIME2(2))\nEXEC dbo.CustomerOrderInsert\n    @CustomerID = 50000000,\n\
    \    @OrderNumber = 12345,\n    @OrderDate = @Date,\n    @ShipDate = NULL,\n \
    \   @IsActive = 1,\n    @DateCreated = @Date,\n    @DateModified = @Date,\n  \
    \  @DateDisabled = NULL;\n```\n**Listing 14-14**\nExecuting a Stored Procedure\
    \ with TRY… CATCH with an Error Message\n\nThis code with fail because `CustomerID`\
    \ 50000000 does not exist in the table `dbo.Customer`. This failure is to the\
    \ foreign key constraint. The output of the query in Listing [14-4](#480547_2_En_14_Chapter.xhtml#PC14)\
    \ is in Table [14-7](#480547_2_En_14_Chapter.xhtml#Tab7).\n\n**Table 14-7**\n\n\
    Error Output from TRY… CATCH\n\n| ErrorNumber | ErrorSeverity | ErrorState | ErrorProcedure\
    \ | ErrorMessage |\n| --- | --- | --- | --- | --- |\n| 547 | 16 | 0 | dbo.CustomerOrderInsert\
    \ | The INSERT statement conflicted with the FOREIGN KEY constraint “FK_CustomerOrder_Customer”.\
    \ The conflict occurred in database “OutdoorRecreation”, table “dbo.Customer”,\
    \ column ‘CustomerID’. |\n\nThe table confirms that the insert did not happen\
    \ due to a foreign key constraint. The user can then fix the values to provide\
    \ a valid `CustomerID`, or the user may decide this change is not needed.\n\n\
    ## 2. 状态追踪与错误日志\n\nYou may find that your application is able to write or update\
    \ data in the database without any issues. However, you may have a process that\
    \ sends data from one system to another. There may be infrastructure issues or\
    \ inconsistencies with data types that can cause failures when sending data from\
    \ one database object to another. You need to determine how these errors should\
    \ be handled. You still want a method to handle these failures, but you may also\
    \ need more instantaneous reporting that these records failed to be sent or received.\
    \ Business today requires a constant state of uptime and successful interactions.\
    \ You can control your effectiveness in responding to these issues by how you\
    \ record failures when trying to process data.\n\nDatabase tables that store information\
    \ that needs to be moved through a system often store a status type column in\
    \ the data table. Whatever process updates the status of the record may either\
    \ have issues updating the record status or updating the record status to a failed\
    \ state. When there is not a large amount of data in the table, finding these\
    \ failed records can be easy. It usually require a search of records where the\
    \ status has not changed in a specified period or where the records are in a failed\
    \ or error status.\n\nDepending on how you use the information about customer\
    \ orders, you may want to log when each customer order is prepared. You may have\
    \ an application that allows you to indicate when a customer order was started\
    \ and completed. This information can be recorded with a customer order status.\
    \ You need to create a table to indicate the customer order history status. An\
    \ example of the information can be found in Table [14-8](#480547_2_En_14_Chapter.xhtml#Tab8).\n\
    \n**Table 14-8**\n\nData Within the `dbo.CustomerOrderHistoryStatus` Table\n\n\
    | CustomerOrder HistoryStatusID | CustomerOrderHistoryStatusName | IsActive |\
    \ DateCreated | DateModified |\n| --- | --- | --- | --- | --- |\n| 1 | Started\
    \ | True | 2023-02-12 | 2023-02-13 |\n| 2 | Completed | True | 2023-02-13 | 2023-02-13\
    \ |\n| 3 | Cancelled | True | 2023-02-13 | 2023-02-13 |\n| 4 | Error | True |\
    \ 2023-02-13 | 2023-02-13 |\n\nThis table includes the status available when recording\
    \ occurrences where someone has started preparing a customer order. To log each\
    \ instance of a customer order being prepared, you need to create a table to store\
    \ information about when each customer order is prepared. There are several ways\
    \ this can be recorded. For the sake of this chapter, let’s create a single record\
    \ each time a customer order is started. Once the customer order is started, the\
    \ customer order can end up in a completed, cancelled, or error status. The query\
    \ for storing the customer order history can be found in Listing [14-5](#480547_2_En_14_Chapter.xhtml#PC15).\n\
    \n```sql\nCREATE TABLE dbo.CustomerOrderHistory\n(\n    CustomerOrderHistoryID\
    \        INT           NOT NULL,\n    CustomerOrderID               INT      \
    \     NOT NULL,\n    CustomerOrderHistoryStatusID  TINYINT       NOT NULL,\n \
    \   DateCreated                   DATETIME2(2)  NOT NULL,\n    DateModified  \
    \                DATETIME2(2)      NULL,\n    CONSTRAINT PK_CustomerOrderHistory_CustomerOrderHistoryID\n\
    \        PRIMARY KEY CLUSTERED (CustomerOrderHistoryID),\n    CONSTRAINT FK_CustomerOrderHistory_CustomerOrder\n\
    \        FOREIGN KEY (CustomerOrderID)\n        REFERENCES dbo.CustomerOrder(CustomerOrderID),\n\
    \    CONSTRAINT FK_CustomerOrderHistory_CustomerOrderHistoryStatus\n        FOREIGN\
    \ KEY (CustomerOrderHistoryStatusID)\n        REFERENCES dbo.CustomerOrderHistoryStatus(CustomerOrderHistoryStatusID)\n\
    );\n```\n**Listing 14-15**\nCreating the `dbo.CustomerOrderHistory` Table\n\n\
    This table can store each unique time a customer order is started. An example\
    \ of the data stored in this table can be found in Table [14-9](#480547_2_En_14_Chapter.xhtml#Tab9).\n\
    \n**Table 14-9**\n\nData Within the `dbo.CustomerOrderHistory` Table\n\n| CustomerOrder\
    \ HistoryID | Customer OrderID | CustomerOrder HistoryStatusID | DateCreated |\
    \ DateModified |\n| --- | --- | --- | --- | --- |\n| 1 | 1 | 2 | 2023-02-13 |\
    \ 2023-02-13 |\n| 2 | 1 | 3 | 2023-02-13 | 2023-02-13 |\n| 3 | 3 | 4 | 2023-02-13\
    \ | 2023-02-13 |\n| 4 | 4 | 1 | 2023-02-13 | 2023-02-13 |\n\nThe records in Table\
    \ [14-9](#480547_2_En_14_Chapter.xhtml#Tab9) indicate customer orders that have\
    \ been started and their various statuses. The first record is for `CustomerOrderID`\
    \ of 1 with a status of completed. The second record is for `CustomerOrderID`\
    \ of 1 with a status of cancelled. The third record is for `CustomerOrderID` of\
    \ 3 with a status of error. The last record displayed is for `CustomerOrderID`\
    \ of 4 with a status of started.\n\nWhen there is an error for any of the records,\
    \ those records will have a `CustomerOrderHistoryStatusID` of 4 in the `dbo.CustomerOrderHistory`\
    \ table. Initially the amount of data in this table will not be very large, and\
    \ it will be easy to find the recent error records within this table. However,\
    \ over time this table will grow to a considerable size. This can cause `SQL Server`\
    \ to search through many records in order to find any recent error records. If\
    \ you plan for the table `dbo.CustomerOrderHistory` to grow to a size where it\
    \ will be difficult to search, you may implement error logging differently. There\
    \ may be other scenarios where you want to keep all records that have errored\
    \ in an error status, but you also want to know what to be able to resolve any\
    \ issues with recently errored records.\n\nIn either of these scenarios, it may\
    \ be beneficial to create a table specifically for logging recent error records.\
    \ Before creating this table, you may also want to consider how this table must\
    \ be managed over time. Unlike the `dbo.CustomerOrderHistory` table, you want\
    \ to make sure that this new table does not get too large. You also want to only\
    \ keep recent error records in this table. Keeping a small number of records in\
    \ the table allows the table to be easily searched. The goal of this new table\
    \ is only be to alert users of any recent error records. Considering the purpose\
    \ of this table, you also want to design a process to purge data from this table\
    \ regularly."
