- fmt: '### Types of Deployment


    确定部署方法的部分包括了解你当前用于部署数据库代码的流程。目前，你的业务可能有手动部署的脚本。根据你的组织结构，你可能有一个环境，其中这些脚本可以随时部署到特定环境，或者你可能有一些关于这些
    T-SQL 脚本可以在一周的哪几天部署的条件。了解谁在开发数据库代码、如何编码和管理变更以及你的部署频率，可以帮助你确定基于迁移的方法还是基于状态的方法更适合你。


    如果你只能在某些特定日期部署到各种环境，这被称为`gated deployment`。你可能在版本控制系统中使用数据库项目。第 11 章涵盖了分支和合并的主题。你的公司可能只为你数据库项目使用一个分支。所有个人的开发工作都在同一个地方完成。另一方面，你的公司可能利用`branching`。这是你的开发人员使用主代码库的副本并对该副本进行更改的地方。有些公司可能直接从一个分支部署。如果你的数据库代码不是设计为可以在任何时间点部署，这可能特别有用。其他公司，特别是那些编写代码以在任何时间点部署的公司，可能会选择在所有工作完成后将所有分支合并回
    master 或主分支。在这种情况下，所有部署都来自主分支。


    有时团队管理其工作流的方式取决于其部署的频率。对于许多公司来说，目标是能够频繁部署。然而，这并不意味着每个公司都准备好接受那种频率的部署。对于以更接近看板风格编写代码的开发团队来说，代码部署到生产环境可能没有固定模式。其他团队可能有固定的节奏或冲刺周期来部署他们的代码。这些冲刺周期可以从几周到几个月不等。如果你的公司仍在决定发布代码的频率，我建议避免过长的冲刺周期，因为这通常意味着一次部署的变更更多。这会增加部署出现问题的风险。


    你还想了解平均每次部署的数据库变更量。你可能会发现平均每个冲刺部署的数据库变更并不多。如果是这种情况，请确保你最终不会进行包含大量数据库变更的部署。当一次部署中发生多个数据库变更时，不仅出现错误的风险更大，而且根据你的部署方法，一个
    T-SQL 代码的变更可能会覆盖另一个变更。


    在介绍两种主要的数据库代码部署方法之前，还有一个额外因素你应该考虑。虽然我们都希望每次数据库部署都能按预期工作，但有时你可能需要撤销或回滚部署中的一个或多个数据库变更。如果你还没有回滚策略，现在是开始考虑一个可靠的回滚策略的好时机。当需要回滚时，并不是开始弄清楚如何快速有效地回滚你的
    T-SQL 代码的好时机。拥有一个可以重复执行此操作的方法可以显著提高你对部署的信心。你的公司可能会使用回滚脚本来简化需要恢复到先前版本数据库代码的情况。如果你使用版本控制，你可以选择恢复到数据库代码的不同版本。在此基础上，如果你使用持续集成，你可能有一个预先打包的先前数据库代码版本，可以在几分钟内部署到你的生产数据库。


    #### Migration-Based Deployments


    这最终引导我们考虑数据库部署常用的部署方法。一种方法包括将所有要一起部署的脚本打包在一起。这被认为是`migration-based approach`；另一个选项是采用源代码管理中存在的所有内容，并将其视为你数据库的真实来源。使用这种方法时，你部署到的任何数据库都将被覆盖，以匹配源代码管理中存在的数据库对象。这通常被称为`state-based
    deployment`。


    现在你了解了基于迁移的部署方法是什么，你可以开始确定它是否最适合你的部署。使用基于迁移方法的主要好处之一是，你可以精确控制部署到数据库的内容。这种部署方法通常涉及将所有要部署的脚本保存在一个位置，这些脚本通常以某种方式命名，以便可以按特定顺序部署。这可以使你的部署易于管理。你可以快速找到保存脚本的文件夹，并确切知道部署了什么内容。


    如果你使用这种部署方法，我建议你有一个单独的文件夹来跟踪需要部署的回滚脚本以及这些回滚脚本应部署的顺序。如果你需要在部署当晚回滚，或者需要一次性回滚几个部署，这将帮助你快速找到需要回滚的代码。基于迁移的部署方法有一些限制。主要挑战之一是如果你需要回滚特定的代码片段。根据你的源代码管理方式，这可能不像查看该数据库对象的历史记录并从源代码管理恢复先前版本那么简单。


    基于迁移的部署方法可以手动设置。你和你的团队可以编写你的 T-SQL 代码文件，并按数字顺序保存。这实际上包括在 SQL Server Management
    Studio 中创建一个脚本，并使用特定的命名约定保存文件。这个命名约定包括指定部署顺序，例如在文件名前加上步骤号以指示部署顺序。


    你可能会创建一个名为`001_20230620_DB232_ActiveProduct.sql`的文件。然而，你可能随后收到请求，要求对同一存储过程进行额外修改。在这种情况下，你需要从存储过程`dbo.GetProduct`中删除日期列。在清单
    12-1 中，你可以找到 T-SQL 代码。


    ```

    PRINT N''Altering [dbo].[GetProduct]...'';

