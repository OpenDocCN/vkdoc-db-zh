    完成对数据库代码的修改后，您可以将此代码保存为 SQL 脚本。保存此代码的文件名为 `002_20230620_DB232_RemoveDates.sql`。为了确保部署顺利进行，您可以将两个文件放在同一个文件夹中。图
    12-1 显示了这两个文件在文件文件夹中的显示方式。


    ![](img/480547_2_En_12_Fig1_HTML.jpg)


    截图显示了活动产品和删除日期的 SQL 文件名。它还进一步显示文件类型为 Microsoft SQL Server 查询文件。


    图 12-1


    基于迁移的文件列表


    您创建的第一个脚本以 001 开头。这是按文件名排序的第一个脚本。这也是下次部署时应运行的第一个脚本。您创建的第二个脚本以 002 开头。这些文件被专门命名，以便在下次软件发布时按文件名升序运行。手动编写
    `T-SQL` 脚本并保存并非基于迁移的部署中唯一可用的方法。第三方工具可以帮助您管理此过程。


    基于迁移的部署有许多支持者。开发任何数据库代码的一个主要挑战是，当多个开发人员基于同一个代码库工作时，如何管理代码的维护。在第 11 章中，我介绍了分支和合并。这是确保所有为数据库项目开发
    `T-SQL` 代码的人员都能以限制多个开发人员处理同一数据库对象时产生不一致的方式工作。如果您与不习惯使用源代码控制的团队合作，采用基于迁移的方法可能更合理。基于迁移的部署过程更适合处理对数据库数据的多次更改。这可以是数据清理的一部分，或与重构数据库对象有关。使用基于迁移的部署方法的另一个优点是，更容易精确选择将要部署的数据库对象。如果您频繁更改数据库，最终可能会得到许多脚本，这可能会增加部署所需的时间。


    由于这些因素，在某些情况下，您可能会发现基于迁移的部署比基于状态的部署更有效。较小的开发团队可能会发现基于迁移的方法更容易使用。如果您为数据库使用源代码控制，您仍然需要确保您的团队同步他们的开发数据库代码。对于开发团队较少的环境，情况也可能如此。如果您团队不在同一天进行频繁部署，或者有较大的维护窗口可用于部署，那么基于迁移的部署方法也可能很适合您。


    使用基于迁移的方法时，您需要牢记的一个风险涉及在源代码控制之外发生的数据库更改。您可能会遇到需要立即将更改部署到生产环境的情况。通常，这些更改在没有部署到较低环境或未签入源代码控制的情况下就被部署到生产环境。如果您需要部署热修复或补丁，而此代码最终未进入您的源代码控制，您的环境可能会变得不同步。虽然未来的部署不会覆盖您的更改，但您可能会发现环境之间存在不一致的行为。为了解决这个问题，任何手动进行的热修复都应添加回源代码控制，以便您的开发环境与生产环境保持同步。


    ## 基于状态的迁移


    基于状态的推出涉及将整个数据库架构从一个环境复制到另一个环境。部署 `T-SQL` 代码时，基于迁移的部署并非唯一可用的选择。数据库部署的另一个流行选项涉及使用数据库架构的来源，并更新目标环境以具有相同的数据库架构。这被称为
    `基于状态的方法`。通常，这与源代码控制一起使用，但这并非总是必要。其概念是，在部署完成后，目标数据库将与源数据库或源代码控制相似。此方法不需要源代码控制，但通过源代码控制更容易管理。


    在使用基于迁移的方法时，每个更改都单独保存在其自己的脚本文件中，而对于基于状态的部署则不是这样。在基于状态的部署中，对同一数据库对象可能有多个更改，但只有一组
    `T-SQL` 代码被部署到目标数据库实例。这个单一的 `T-SQL` 脚本将所有更改合并为一个净更改。如果数据库对象在源代码控制中，或者源数据库与目标不同，则会在目标实例上运行更改脚本。我也喜欢这一点，因为我知道一旦部署完成，数据库将处于什么状态。部署完成后，目标实例中的数据库应具有与源位置相同的数据库对象。


    使用与基于迁移方法相同的示例，我将逐步介绍其作为基于状态部署的一部分是如何处理的。第一步涉及进入源代码控制并确保您拥有最新版本。获得最新版本后，您可以打开存储过程
    `dbo.GetProduct`。进行这些更改后，您可以将这些更改签入源代码控制。


    假设其他人正在修改代码以匹配清单 12-1 中的 `T-SQL` 代码。如果另一个开发人员想要更改此过程，他们需要确保使用的是最新的副本。他们通过检查源代码控制中是否有其他开发人员的任何签入来实现。在此示例中，他们将找到您所做的更改。如果他们跳过此步骤，您的代码更改可能会丢失，或者可能出现合并冲突。然后，他们可以更改
    `dbo.GetProduct` 存储过程。然后可以将这些更改合并回主分支。当部署此代码时，源位置将包含两个更改。这些更改将仅显示活动产品并删除日期列。不是一次部署一个更改，而是将存储过程
    `dbo.GetProduct` 部署到目标实例一次。对存储过程的单个更新将包含这两个更改。

    '
- fmt: 'When working with many developers or many different development teams, there
    may be a benefit to using a state-based deployment method. This is due to the
    frequency of changes that may be happening in the overall database project. While
    the state-based migration can work for database projects that have a few or many
    changes, this deployment method is better at managing frequent changes. This is
    because those many developers making many changes means many steps to the rollout
    process when using migration, but fewer files are changed in a state-based approach.
    When using a state-based approach, your rollout will be faster and less prone
    to someone making a tiny typo of the wrong file name and causing an issue deploying
    the code. When using the state-based approach, you can be confident that any changes
    in your source location will exist in your target location after the deployment
    is complete. This also means that if there are many changes made to Production
    that were not put into source control, these changes will be overwritten during
    the next deployment. If your team is performing frequent updates especially throughout
    the day, you may find the state-based approach takes less time for a deployment.
    At the very least, this is since there are usually less changes being deployed
    through the state-based approach when there are frequent deployments.


    One of the largest challenges in using the state-based approach has to do with
    deploying data manipulation changes. These data changes can involve managing configuration
    tables, managing feature flags, adding default values, or correcting data that
    was affected by a prior bug. The state-based approach is excellent for comparing
    the overall database schema. However, there are limitations when it comes to changing
    the data within the database. In most cases, this is done through manual files
    that may be executed after deployment. If you are using source control, this can
    be managed through the `pre-deployment` and `post-deployment` scripts. There is
    only one `predeployment` and one `postdeployment` script if you are using source
    control. This can make the process of changing data somewhat more complicated
    as you will either need to write your `T-SQL` code to be able to run once and
    then be ignored or go into source control and frequently change either your `predeployment`
    or `postdeployment` script.


    ### Styles of Development


    There are several different ways that database development teams can manage their
    workflows. The methodology used can contribute to what type of deployment method
    should be used.


    #### Kanban


    My first job that involved consistently writing database code did not have any
    strict timelines. The goal was to make changes and deploy them as quickly as possible.
    This was often because I was creating SQL Server Reporting Service (SSRS) reports.
    Typically, this type of development can be referred to as Kanban. Kanban refers
    to a methodology for managing change requests. The high-level concept is that
    there is a continuous queue of work. Requests go into a backlog and are worked,
    usually one at a time, until they are complete.


    #### Scrum


    The Scrum method of code development involves more structure that Kanban. Scrum
    involves several steps such as ensuring work items are well defined, estimating
    how long it will take to complete a specific work item, and determining when the
    item will be completed. To determine when code is expected to be complete and
    deployable, organizations identify how often they intend to deploy code. This
    length of time is called a `sprint or sprint cycle`. Each sprint is expected to
    have a fixed quantity of work that can be completed. Using the estimates, work
    items are added to a sprint based on priority until the estimated work matches
    the expected quantity of work in a sprint. This is a high-level definition and
    not intended to be an in-depth resource on how to implement Scrum or Kanban for
    your database teams. For these deployments, all user stories in the sprint are
    expected to be deployed as part of the sprint. While there are some ways to deploy
    everything in a sprint without changing functionality, our code was often not
    written that way.


    If your business is trying to move toward being able to deploy changes at any
    point in time, consider changing how you develop your database code. This change
    can be a shift in how you think about your solutions and how you write your code.
    Concepts like using feature flags will help you. Essentially you want to write
    your `T-SQL` code in a way that it can be deployed at any point in time and your
    applications will not break. However, getting to this point requires several fundamental
    steps. The first is knowing how your company develops its `T-SQL` code. You may
    want to handle deployments differently if you have many developers working on
    `T-SQL` code for a single application than if you have each developer working
    on a separate application. This will help you determine what method of deployment
    will work best for you.'
