    You can also determine that the relative number of logical reads is low and trends
    similarly to the partitioned table earlier in this chapter.


    The T-SQL code executed in Listing [16-18](#480547_2_En_16_Chapter.xhtml#PC18)
    accessed the partitioned view based on the partitioned column in each of the tables
    and on the constraint specified for each of the tables. You saw that SQL Server
    was able to quickly determine which table to access when querying the data. There
    may be times when you want to run a query that does not include the partitioning
    column, like the one in Listing [16-19](#480547_2_En_16_Chapter.xhtml#PC19).


    ```

    SELECT CustomerOrderHistoryID,

    CustomerOrderID,

    CustomerOrderHistoryStatusID,

    DateCreated

    FROM dbo.vwCustomerOrderHistory

    WHERE CustomerOrderID = 401408

    AND CustomerOrderHistoryStatusID = 1;

    Listing 16-19

    Accessing Data Without Using a Partitioned Column

    ```


    This query searches for a specific `CustomerOrder` that has a certain status.
    However, there is no indication that any of these records exist in a specific
    table within the indexed view. Since SQL Server does not have the ability to rule
    out certain date ranges as part of the query, you get the execution plan in Figure
    [16-15](#480547_2_En_16_Chapter.xhtml#Fig15).


    ![](images/480547_2_En_16_Chapter/480547_2_En_16_Fig15_HTML.jpg)


    A text with symbols depicts an execution plan with a partitioned view. The text
    presents 2 clustered index scans with cost 85% and 0%, 0.029 seconds and 0.000
    seconds, 1 of 1 and 0 of 1, concatenation, and Select cost 0%. Symbols are of
    a table, concatenation, and clustered index scan.


    Figure 16-15


    Execution plan for a partitioned view


    You can determine that in this execution plan, SQL Server must access the table
    containing the 2021 data and the table containing the 2022 data. In this example,
    you can determine that there is no benefit on the number of tables accessed as
    part of this request.


    Using partitioned views can help you take more than one table and combine them
    together into one database object. By accessing this single database object, you
    can simplify your T-SQL code across multiple ranges. You have also learned that
    using a partitioned view can be beneficial in limiting the number of tables accessed,
    but if you do not use the partitioning column as part of your queries, you will
    still need to access all tables included in the view. While partitioned tables
    break one table up into multiple segments and partitioned views combine tables
    together into one database object, you may find advantages to combining them both.


    ## Hybrid Workloads


    Companies have been using databases for many years and may have acquired a significant
    amount of data. Often, these same companies may be generating reports from this
    data. In many cases, these same companies may not have prioritized building a
    data warehouse. For these situations, one database is often trying to perform
    two tasks at the same time. The first role is to continue to store transactional
    data. However, the second role is to also act as a data warehouse for analytical
    processing. In many situations, the database design needed for transaction processing
    does not match the best design for analysis processing. While your company may
    be willing to move toward a data warehouse someday, you may find yourself in a
    situation where you need to implement designs that can function well with this
    hybrid workload.


    In combining partitioned and non-partitioned tables with a partitioned view, you
    can give yourself additional flexibility. Using a partitioned view will allow
    you to use a single database object and name to access any data for a specific
    purpose. In this example, let’s continue to work with the data recorded as a result
    of `CustomerOrders` being started. Since a partitioned view allows you to combine
    several tables together, you can investigate how those tables can be created.
    One advantage of using multiple tables is that each table can use different indexes.
    This difference in indexes can change both how data is stored and accessed. You
    can also have the option to make some tables as read only, which can signify that
    you do not intend to add data to these tables.


    You will be creating a partitioned view to access all the `CustomerOrder` history
    data. The first table is only to hold all the older data that you want to archive.
    You can also partition this table to allow for partition elimination when searches
    are performed based on the partitioning key of the table. In Listing [16-20](#480547_2_En_16_Chapter.xhtml#PC20),
    you can refer to the T-SQL needed to create your partitioned table for archived
    data.


    ```

    CREATE TABLE dbo.CustomerOrderHistoryPartition

    (

    CustomerOrderHistoryID         BIGINT          NOT NULL,

    CustomerOrderID                INT             NOT NULL,

    CustomerOrderHistoryStatusID   TINYINT         NOT NULL,

