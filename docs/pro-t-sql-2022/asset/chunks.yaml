- fmt: 'You may want a place where you can change code, test code, and repeat this
    process until you get to the desired output. Source control can pull the most
    recently saved `T-SQL` code down to your local machine. You can then work on making
    your modifications to the `T-SQL` code on your local desktop. When you are ready
    to save that work, you can save those changes locally. This allows you to work
    independently of other developers. When you are sure of your changes, you can
    save your `T-SQL` code to the centralized location. This centralized repository
    becomes your source for all database changes.


    Another benefit of using source control is that it speeds up the process to identify
    what `T-SQL` code has changed. Prior to using source control, I had to manually
    review an entire database object to confirm what changed. The best process I found
    was to visually compare the current Production stored procedure to the new version
    of the stored procedure. While this was somewhat effective, it was also possible
    for me to easily miss something.


    After getting the database added into source control, I could easily see all code
    that changed as part of the script review. This allowed me to quickly see all
    `T-SQL` code that changed. I could also use source control to easily compare `T-SQL`
    code to previous versions. As part of the comparison, sections of the code that
    had been modified were highlighted. Even more helpful was that the code that was
    added vs. modified or removed was highlighted in two different colors.


    Having access to your `T-SQL` code can make it easier and faster to get scripts
    together for software releases. Source control also helps protect unapproved `T-SQL`
    code from being deployed in error. Without source control for `T-SQL`, getting
    ready for a deployment can be a hassle.


    You need to be able to access scripts for different databases and software releases
    but also keep track of changes over time. The business may decide to revert back
    to a previous version of code. When that code is saved in source control, it is
    easier to search through the versions of the specific database object and find
    the change history. With source control I can save time by finding when a change
    was implemented. If you implement automated deployments, as discussed in Chapter
    [13](#480547_2_En_13_Chapter.xhtml), you may have even faster methods to revert
    to a previous version of code.


    You can combine source control with testing strategies, discussed in Chapter [12](#480547_2_En_12_Chapter.xhtml),
    and automated software releases. This will allow you to minimize the manual effort
    needed for code reviews, which may help business relationships between IT departments.
    Using similar processes to manage database code as application development can
    help increase source control adoption. When `T-SQL` code is stored in source control,
    this opens up the possibility of pointing third-party tools at it. These tools
    can analyze an entire `T-SQL` codebase and help automate tasks such as automatically
    rejecting or correcting formatting issues.


    > **Tip**

    >

    > One method of automating code formatting is through the use of `precommit hooks`
    with `Git`.


    Another advantage of source control is it allows you to have one more tool to
    help in the case of disaster recovery. If you lose all your hardware and backups,
    how long will it take you to get your business up and running again? While you
    may know that your backups need to be tested on a regular basis, you may not have
    had the opportunity to test them lately. Depending on how your company developed
    its disaster recovery plan and what happens when disaster strikes could mean you
    lose access to your current Production servers and all the associated data. If
    this unlikely situation happens, you may find yourself wondering how you will
    get your applications running again. As a plan of last resort, if your databases
    are in source control along with the necessary data in your base tables, you have
    a chance of getting your company’s systems up and running.'
