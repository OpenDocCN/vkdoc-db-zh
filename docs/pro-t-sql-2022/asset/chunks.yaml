  trans: '

    此表包含两列经过屏蔽的数据。第一列是 `dbo.Vendor` 表上的 `Address` 列。该列使用了 `partial()` 函数。开头的数字 1 表示第一个字符将保持不屏蔽。紧随第一个未屏蔽字符之后的将是填充的
    `xxxx`。当 `Address` 列被屏蔽时，其末尾将显示最后两个未屏蔽的字符。


    为了演示动态数据屏蔽的工作原理，你应该向 `dbo.Vendor` 表添加一些数据。如果你已创建 `dbo.Vendor` 表，可以使用清单 18-3 中的
    T-SQL 代码向该表插入一条新记录。


    ```sql

    INSERT INTO dbo.Vendor

    (CompanyName, [Address], City, PostalCode, Country, EmailAddress)

    VALUES

    (

    ''Kayak Unlimited'',

    ''567 3rd Street'',

    ''Somewhere'',

    ''10005'',

    ''United States'',

    ''sales@kayakutld.com''

    );

    清单 18-3

    向供应商表添加数据

    ```


    现在你已将供应商 Kayak Unlimited 添加到 `dbo.Vendor` 表，可以查询数据以确认新供应商是否已添加。执行清单 18-4 中的查询，你可以查看未屏蔽的数据。


    ```sql

    SELECT CompanyName,

    [Address],

    EmailAddress

    FROM dbo.Vendor;

    清单 18-4

    查询供应商表

    ```


    清单 18-4 的查询结果如表 18-2 所示。


