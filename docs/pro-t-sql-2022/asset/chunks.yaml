    随着您对编写 T-SQL 越来越熟悉，您将从关注语法和准确性进展到关注性能。在本章中，您将学习如何查看和理解 SQL Server 执行计划。本章将包括演示您现有和新的索引如何影响您的执行计划。您将学习
    SQL Server 在执行计划中如何连接数据。到本章结束时，您将知道如何使用执行计划来提高 T-SQL 的性能。


    ## 介绍执行计划


    为了生成 T-SQL 查询的结果，SQL Server 需要决定如何运行该查询。它需要决定使用哪个索引以及运行查询时使用哪种连接类型。这些决策的结果就是执行计划。学习如何阅读和理解执行计划将帮助您更好地构建查询以提高性能。


    执行计划以 XML 格式存储在数据库中。SSMS 提供了这些计划的可视化表示工具，本章您将主要使用这个工具。有不同类型的计划，例如估计计划和实际计划，您将在本节中了解到。图形化执行计划的示例可以在图
    7-1 中找到。


    ![](img/480547_2_En_7_Fig1_HTML.jpg)


    图 7-1


    图形化执行计划


    图 7-1 包含几个我们将在本章讨论的元素。这些图标被称为 *operators*（运算符）。箭头用于显示操作的顺序。有不同类型的计划，例如估计计划和实际计划。最重要的是，虽然这张图片现在看起来不太明白，但到本章结束时，您将能够翻回几页并读懂整张图！'
- fmt: '## Reading Execution Plans


    This section will cover the basics of reading execution plans. This includes discussing
    the difference between estimated execution plans, actual executions plans, and
    live query statistics. I will go over the graphical execution plan showing the
    operators and how to read them. In addition, this section will cover how to view
    operator details and properties in the execution plan. Finally, this section will
    go over the details of an execution plan including multiple steps, arrows, warnings,
    operators, estimated, and actual values.

    Your goal when writing `T-SQL` is to make sure that you get accurate results.
    In some cases, the queries you write may be simple and straightforward. You may
    find yourself needing to performance tune queries related to reporting or to write
    new queries for reporting. If you need to write queries to provide reports on
    transactional data, you may need to incorporate more joins and more logic than
    you would need if you were to write queries for an application. While this is
    not ideal, this is a very common scenario for many companies.

    Many companies have begun to realize the importance of the data in their systems,
    or they want additional monitoring to ensure the applications are working as intended.
    In either case, it is highly likely that you will come across a query in your
    environment that is negatively affecting your applications. At that time, you
    will want to know what you can do to resolve the issue. In this section, you will
    learn why execution plans are important and when you need to use them. You will
    learn how to read execution plans including commonly used symbols. You will also
    learn about properties and warnings in execution plans.

    My first mentor once told me that in order to write good `T-SQL`, I needed to
    understand how SQL Server worked. It was some of the wisest advice I have received,
    and I am still working to understand SQL Server internals better each day. Using
    this advice, one way that you can have a better understanding of SQL Server is
    to understand how SQL Server executes any queries that you have written. Some
    of the internals related to executing a query are in Chapter 1. In this chapter,
    I will show you the instructions that SQL Server has determined should be used
    to execute your `T-SQL` code. These instructions can be found in the execution
    plan for as long as the plan is still in the plan cache. If you have `Query Store`
    enabled for your database, you can check Chapter 9 to determine how to access
    the query plans saved in `Query Store`.

    Once you have decided that you want to start investigating an execution plan for
    some `T-SQL` code, you should confirm that you have access in SQL Server to view
    execution plans. When reviewing execution plans, you can view estimated, actual,
    or live query statistics. The estimated execution plan will show the best guess
    as to how the plan *would* be executed. However, since the query has not been
    executed, the estimated execution plan may not represent what will happen if the
    query is run. The actual execution plan executes the query, returns the results,
    and shows what steps SQL Server took to execute the query. The live query statistics
    is the same as the actual execution plan, except it also shows how the query moves
    through the execution plan in real time. This can be helpful when trying to debug
    poorly performing queries. However, if your query is very fast, it may end up
    looking exactly like the actual execution plan.

    If you are getting the actual execution plan when the `T-SQL` code is executed,
    you need to make sure you have permissions to execute that code and that you have
    `SHOWPLAN` access for the databases that exist in the `T-SQL` code. Managing the
    user permissions for execution plans is outside the scope of this book. However,
    if you want to verify user access to execution plans, you can execute the query
    in Listing 7-1.'
