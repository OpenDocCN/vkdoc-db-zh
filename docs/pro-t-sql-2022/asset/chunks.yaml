  trans: '

    # 4. 设计 T-SQL


    构建易于理解的 T-SQL 的重点在于提高理解先前未见或许久未见代码的速度。正如第 1 章所讨论的，选择合适的数据类型可以提升 T-SQL 代码的速度，因为需要检索的数据量更小。尽管格式和数据类型非常重要，但为
    T-SQL 代码选择正确的数据库对象同样会影响应用程序的速度。本章将探讨查询设计如何影响查询速度。


    在为应用程序编写 T-SQL 时，就性能而言，存储过程通常是**最理想的选择**。使用存储过程有许多优势，包括可能使你的代码更具适应性和可重用性。类似地，在代码中使用参数可以增加
    T-SQL 代码的灵活性。在为更复杂的查询设计解决方案时，你可以使用存储过程和参数。此外，在解决复杂问题时，你可能还需要考虑其他技术。设计 T-SQL 代码时需要考虑几个事项，包括存储过程、参数和复杂的查询逻辑。


    ## 使用存储过程


    在编写 T-SQL 代码时，有多种编写方式，这会影响查询执行的快慢。如果计划缓存中没有执行计划，查询的相对速度会更慢。能够使用缓存的执行计划将提高查询速度，因为
    SQL Server 不需要花费额外资源来确定如何检索数据。SQL Server 用于检索数据的方法称为执行计划，第 8 章将对此进行更详细的讨论。


    为应用程序编写 T-SQL 代码时，需要考虑几个方面。为了更好地理解你希望应用程序如何使用 T-SQL，最好先了解 SQL Server 如何处理可用的每个
    T-SQL 选项。当 SQL Server 执行查询时，它必须确定如何执行该查询。在此之前，SQL Server 会检查是否已存在此查询的执行计划。T-SQL
    的设计方式会对 SQL Server 验证执行计划是否已存在产生一定影响。


    为了展示存储过程、即席查询和预准备语句如何影响计划缓存，让我们看几个例子。使用存储过程可以使你的 T-SQL 代码可重复执行，有可能让查询计划在缓存中保留更长时间，从而提高查询执行速度。在代码清单
    4-1 中，你可以看到创建存储过程的语句。


    ```

    /*-------------------------------------------------------------*\

    Name:             dbo.GetCustomer

    Author:           Elizabeth Noble

    Created Date:     2022-04-20

    Description:      Get a list of all customers in the databases

    Sample Usage:

    EXECUTE dbo.GetCustomer;

    \*-------------------------------------------------------------*/

    CREATE PROCEDURE dbo.GetCustomer

    AS

    SELECT

    CustomerID,

    FirstName,

    LastName,

    Address,

    City,

    PostalCode,

    Country,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Customer;

    Listing 4-1

    Creating a Stored Procedure

    ```


    在此示例中，你创建了一个未参数化的存储过程，每次都将执行完全相同的 T-SQL。此存储过程返回 `SELECT` 语句中请求的列的结果，包含已输入数据库的所有客户。如果你想查看此存储过程的结果，可以按照代码清单
    4-2 所示执行该存储过程。


    ```

    EXECUTE dbo.GetCustomer;

    Listing 4-2

    Executing the Stored Procedure

    ```


    SQL Server 创建了图 4-1 所示的执行计划，并且在大多数情况下，会将执行计划保存到查询计划缓存中。此计划可能被视为微不足道而根本不会保存到缓存中。如果将来再次运行此存储过程，SQL
    Server 将检查计划缓存，看看此存储过程是否已存在于缓存中。只要 SQL Server 认为该计划相关，它就会一直保留在计划缓存中。第 8 章将更详细地介绍
    SQL Server 如何计算执行计划的相关性。在图 4-1 中，你可以看到与代码清单 4-2 中的存储过程相关的执行计划。


    ![](img/480547_2_En_4_Fig1_HTML.jpg)


    一幅插图描绘了左侧选择成本等于 0%，右侧聚集索引扫描成本等于 100%。两者由一个反向箭头分隔。


    图 4-1

    存储过程的执行计划

    '
- fmt: '# 执行计划缓存与查询类型


    如果执行计划在缓存中，SQL Server 将继续重用相同的执行计划。这对于存储过程效果很好。然而，在 SQL Server 中还有其他访问数据的方法。其中一种方法是编写即席查询。编写即席查询时，可以选择硬编码值或对它们进行参数化。清单
    [4-3](#480547_2_En_4_Chapter.xhtml#PC3) 所示类型的查询与清单 [4-1](#480547_2_En_4_Chapter.xhtml#PC1)
    中的存储过程具有相同的逻辑。


    ## 代码清单 4-3：即席查询逻辑


    ```sql

    SELECT

    CustomerID,

    FirstName,

    LastName,

    Address,

    City,

    PostalCode,

    Country,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Customer;

    Listing 4-3

    Adhoc Query Logic

    ```


    清单 [4-1](#480547_2_En_4_Chapter.xhtml#PC1) 和 [4-3](#480547_2_En_4_Chapter.xhtml#PC3)
    中的逻辑是相同的。最大的区别在于 SQL Server 处理这两个不同的 T-SQL 查询的方式。然而，实际情况是 SQL Server 会检查计划缓存以查看是否存在相同的计划。存储在计划缓存中的计划不是基于核心逻辑，而是基于实际的即席查询或存储过程执行的编写方式。


    ## 计划缓存条目对比


    如表 [4-1](#480547_2_En_4_Chapter.xhtml#Tab1) 所示，即席查询甚至作为即席对象类型存储，而 SQL Server 能够正确识别第二行是一个存储过程。在表
    [4-1](#480547_2_En_4_Chapter.xhtml#Tab1) 中，您可以看到运行存储过程和作为即席查询运行相同代码后计划缓存中的结果。


    ### 表 4-1：即席查询与存储过程的计划缓存


    | Use Count | Object Type | Query Text |

    | --- | --- | --- |

    | 1 | Adhoc | `SELECT      CustomerID,      FirstName,      LastName,      Address,      City,      PostalCode,      Country,      IsActive,      DateCreated,      DateModified,      DateDisabled
    FROM dbo.Customer;` |

    | 1 | Proc | `/*-------------------------------------------------------------*\
    Name:            dbo.GetCustomer Author:          Elizabeth Noble Created Date:    2022-10-30
    Description: Get a list of all customers in the databases Sample Usage:      EXECUTE
    dbo.GetCustomer \*-------------------------------------------------------------*/
    CREATE PROCEDURE dbo.GetCustomer AS  SELECT        CustomerID,        FirstName,        LastName,        Address,        City,        PostalCode,        Country,        IsActive,        DateCreated,        DateModified,        DateDisabled  FROM
    dbo.Customer;` |


    ## 查询格式变化的影响


    当用户或应用程序以不一致的方式编写代码时，这一切就变得重要了。通过将 `SELECT` 子句后的第一列移到与 `SELECT` 子句同一行，对清单 [4-3](#480547_2_En_4_Chapter.xhtml#PC3)
    中的查询进行了修改。清单 [4-4](#480547_2_En_4_Chapter.xhtml#PC5) 显示了更新后的查询。


    ### 代码清单 4-4：修改后的即席查询


    ```sql

    SELECT CustomerID,

    FirstName,

    LastName,

    Address,

    City,

    PostalCode,

    Country,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Customer;

    Listing 4-4

    Adhoc Query Modified

    ```


    真正改变的只有查询本身的格式。虽然您可能能看出该查询使用了相同的逻辑，但您应该运行清单 [4-5](#480547_2_En_4_Chapter.xhtml#PC6)
    中的查询，以了解 SQL Server 如何处理此查询与计划缓存的关系。运行清单 [4-4](#480547_2_En_4_Chapter.xhtml#PC6)
    中的查询后，计划缓存将显示表 [4-2](#480547_2_En_4_Chapter.xhtml#Tab2) 中的结果。


    ### 表 4-2：修改后的即席查询的计划缓存


    | Use Count | Object Type | Query Text |

    | --- | --- | --- |

    | 1 | Ad hoc | `SELECT      CustomerID,      FirstName,      LastName,      Address,      City,      PostalCode,      Country,      IsActive,      DateCreated,      DateModified,      DateDisabled
    FROM dbo.Customer;` |

    | 1 | Ad hoc | `SELECT CustomerID,      FirstName,      LastName,      Address,      City,      PostalCode,      Country,      IsActive,      DateCreated,      DateModified,      DateDisabled
    FROM dbo.Customer;` |

    | 1 | Proc | `/*-------------------------------------------------------------*\
    Name:            dbo.GetCustomer Author:          Elizabeth Noble Created Date:    2022-10-30
    Description: Get a list of all customers in the databases Sample Usage:      EXECUTE
    dbo.GetCustomer \*-------------------------------------------------------------*/
    CREATE PROCEDURE dbo.GetCustomer AS  SELECT        CustomerID,        FirstName,        LastName,        Address,        City,        PostalCode,        Country,        IsActive,        DateCreated,        DateModified,        DateDisabled  FROM
    dbo.Customer;` |


    ## 计划缓存膨胀与性能影响


    您可以在表 [4-2](#480547_2_En_4_Chapter.xhtml#Tab2) 中看到，计划缓存中现在有三个条目。SQL Server 并没有重用第一次调用即席查询时的执行计划，而是生成了一个全新的执行计划。每次
    SQL Server 创建新的执行计划时，它都会消耗额外的资源来创建和存储该计划。需要生成执行计划可能会使查询速度延迟几秒钟。


    每个执行的查询计划都会保存在计划缓存中。为每个查询保存多个执行计划可能会填满执行计划缓存。这可能导致其他查询执行计划过早地从计划缓存中移除。查询计划从缓存中移除将导致
    SQL Server 消耗额外的资源为那个其他查询创建新的执行计划。第 [7](#480547_2_En_7_Chapter.xhtml) 章将提供更多关于内存使用如何影响查询性能速度的信息。在确定您的应用程序将如何调用
    T-SQL 代码时，这是需要考虑的事情。


    ## 存储过程与参数化查询的权衡


    虽然存储过程为您提供了一种一致的方式来多次调用相同类型的代码，但通用的存储过程可能无法提供应用程序所需的灵活性。如果是这种情况，您需要了解使用参数如何帮助提高
    T-SQL 代码的可伸缩性。'
  raw: 'If the plan is in the cache, SQL Server will continue to reuse the same execution
    plan. This works well for stored procedures. However, there are other ways of
    accessing data in SQL Server. One of these methods is to write ad hoc queries.
    When writing ad hoc queries, you have the option to hard code the values or parameterize
    them. The example of the type of query shown in Listing [4-3](#480547_2_En_4_Chapter.xhtml#PC3)
    has the same logic as the stored procedure in Listing [4-1](#480547_2_En_4_Chapter.xhtml#PC1).


    ```

    SELECT

    CustomerID,

    FirstName,

    LastName,

    Address,

    City,

    PostalCode,

    Country,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Customer;

    Listing 4-3

    Adhoc Query Logic

    ```


    The logic in Listings [4-1](#480547_2_En_4_Chapter.xhtml#PC1) and [4-3](#480547_2_En_4_Chapter.xhtml#PC3)
    is the same. The largest difference is in how SQL Server handles the two different
    T-SQL queries. However, what happens is SQL Server checks the plan cache to see
    if the same plan exists. The plans that are stored in the plan cache are not based
    on the core logic but are based on how the actual ad hoc query or stored procedure
    execution is written.


    As you can see in Table [4-1](#480547_2_En_4_Chapter.xhtml#Tab1), the ad hoc query
    is even stored as an ad hoc object type, whereas SQL Server can properly tell
    that the second row is a stored procedure. In Table [4-1](#480547_2_En_4_Chapter.xhtml#Tab1),
    you can see the results in the plan cache from running the stored procedure and
    the same code as an ad hoc query.


    Table 4-1


    Plan Cache for Ad Hoc Query and Stored Procedure


    | Use Count | Object Type | Query Text |

    | --- | --- | --- |

    | 1 | Adhoc | `SELECT      CustomerID,      FirstName,      LastName,      Address,      City,      PostalCode,      Country,      IsActive,      DateCreated,      DateModified,      DateDisabled
    FROM dbo.Customer;` |

    | 1 | Proc | `/*-------------------------------------------------------------*\
    Name:            dbo.GetCustomer Author:          Elizabeth Noble Created Date:    2022-10-30
    Description: Get a list of all customers in the databases Sample Usage:      EXECUTE
    dbo.GetCustomer \*-------------------------------------------------------------*/
    CREATE PROCEDURE dbo.GetCustomer AS  SELECT        CustomerID,        FirstName,        LastName,        Address,        City,        PostalCode,        Country,        IsActive,        DateCreated,        DateModified,        DateDisabled  FROM
    dbo.Customer;` |


    Where this all can become important is when users or applications write code inconsistently.
    The query is modified from Listing [4-3](#480547_2_En_4_Chapter.xhtml#PC3) by
    moving the first column in the select statement to the same row as the SELECT
    clause. Listing [4-4](#480547_2_En_4_Chapter.xhtml#PC5) shows the updated query.


    ```

    SELECT CustomerID,

    FirstName,

    LastName,

    Address,

    City,

    PostalCode,

    Country,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Customer;

    Listing 4-4

    Adhoc Query Modified

    ```


    The only thing that has really changed is the formatting of the query itself.
    While you may be able to see that the query is using the same logic, you should
    run the query in Listing [4-5](#480547_2_En_4_Chapter.xhtml#PC6) to see how SQL
    Server handles this query in relation to the plan cache. After running the query
    in Listing [4-4](#480547_2_En_4_Chapter.xhtml#PC6), the plan cache will show the
    results in Table [4-2](#480547_2_En_4_Chapter.xhtml#Tab2).


    Table 4-2


    Plan Cache for Modified Ad Hoc Query


    | Use Count | Object Type | Query Text |

    | --- | --- | --- |

    | 1 | Ad hoc | `SELECT      CustomerID,      FirstName,      LastName,      Address,      City,      PostalCode,      Country,      IsActive,      DateCreated,      DateModified,      DateDisabled
    FROM dbo.Customer;` |

    | 1 | Ad hoc | `SELECT CustomerID,      FirstName,      LastName,      Address,      City,      PostalCode,      Country,      IsActive,      DateCreated,      DateModified,      DateDisabled
    FROM dbo.Customer;` |

    | 1 | Proc | `/*-------------------------------------------------------------*\
    Name:            dbo.GetCustomer Author:          Elizabeth Noble Created Date:    2022-10-30
    Description: Get a list of all customers in the databases Sample Usage:      EXECUTE
    dbo.GetCustomer \*-------------------------------------------------------------*/
    CREATE PROCEDURE dbo.GetCustomer AS  SELECT        CustomerID,        FirstName,        LastName,        Address,        City,        PostalCode,        Country,        IsActive,        DateCreated,        DateModified,        DateDisabled  FROM
    dbo.Customer;` |


    You can see in Table [4-2](#480547_2_En_4_Chapter.xhtml#Tab2) that there are now
    three entries in the plan cache. Instead of SQL Server reusing the execution plan
    from the first time the ad hoc query was called, SQL Server generated an entirely
    new execution plan. Each time SQL Server creates a new execution plan, it uses
    additional resources to create and store the plan. Needing to generate an execution
    plan can delay the speed of the query by a couple of seconds.


    Each query plan executed is saved in the plan cache. Having multiple execution
    plans saved for each query can fill up the execution plan cache. This can cause
    other query execution plans to be removed from the plan cache prematurely. The
    removal of a query plan from the cache will cause SQL Server to expend additional
    resources to create a new execution for that other query. Chapter [7](#480547_2_En_7_Chapter.xhtml)
    will have a more information about how memory usage can affect the speed of the
    query performance. This is something to consider when determining how your applications
    will call T-SQL code.


    While a stored procedure gives you a consistent way to call that same type of
    code more than once, generic stored procedures may not give you the flexibility
    you need in your applications. If that is the case, you want to see how using
    parameters can help increase the scalability of your T-SQL code.'
  trans: '

    # 执行计划缓存与查询类型


    如果执行计划在缓存中，SQL Server 将继续重用相同的执行计划。这对于存储过程效果很好。然而，在 SQL Server 中还有其他访问数据的方法。其中一种方法是编写即席查询。编写即席查询时，可以选择硬编码值或对它们进行参数化。清单
    4-3 所示类型的查询与清单 4-1 中的存储过程具有相同的逻辑。


    ## 代码清单 4-3：即席查询逻辑


    ```sql

    SELECT

    CustomerID,

    FirstName,

    LastName,

    Address,

    City,

    PostalCode,

    Country,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Customer;

    ```

    清单 4-1 和 4-3 中的逻辑是相同的。最大的区别在于 SQL Server 处理这两个不同的 T-SQL 查询的方式。然而，实际情况是 SQL Server
    会检查计划缓存以查看是否存在相同的计划。存储在计划缓存中的计划不是基于核心逻辑，而是基于实际的即席查询或存储过程执行的编写方式。


    ## 计划缓存条目对比


    如表 4-1 所示，即席查询甚至作为即席对象类型存储，而 SQL Server 能够正确识别第二行是一个存储过程。在表 4-1 中，您可以看到运行存储过程和作为即席查询运行相同代码后计划缓存中的结果。


    ### 表 4-1：即席查询与存储过程的计划缓存


    | 使用次数 | 对象类型 | 查询文本 |

    | --- | --- | --- |

    | 1 | 即席 | `SELECT      CustomerID,      FirstName,      LastName,      Address,      City,      PostalCode,      Country,      IsActive,      DateCreated,      DateModified,      DateDisabled
    FROM dbo.Customer;` |

    | 1 | 存储过程 | `/*-------------------------------------------------------------*\
    Name:            dbo.GetCustomer Author:          Elizabeth Noble Created Date:    2022-10-30
    Description: Get a list of all customers in the databases Sample Usage:      EXECUTE
    dbo.GetCustomer \*-------------------------------------------------------------*/
    CREATE PROCEDURE dbo.GetCustomer AS  SELECT        CustomerID,        FirstName,        LastName,        Address,        City,        PostalCode,        Country,        IsActive,        DateCreated,        DateModified,        DateDisabled  FROM
    dbo.Customer;` |


    ## 查询格式变化的影响


    当用户或应用程序以不一致的方式编写代码时，这一切就变得重要了。通过将 `SELECT` 子句后的第一列移到与 `SELECT` 子句同一行，对清单 4-3
    中的查询进行了修改。清单 4-4 显示了更新后的查询。


    ### 代码清单 4-4：修改后的即席查询


    ```sql

    SELECT CustomerID,

    FirstName,

    LastName,

    Address,

    City,

    PostalCode,

    Country,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Customer;

    ```

    真正改变的只有查询本身的格式。虽然您可能能看出该查询使用了相同的逻辑，但您应该运行清单 4-5 中的查询，以了解 SQL Server 如何处理此查询与计划缓存的关系。运行清单
    4-4 中的查询后，计划缓存将显示表 4-2 中的结果。


    ### 表 4-2：修改后的即席查询的计划缓存


    | 使用次数 | 对象类型 | 查询文本 |

    | --- | --- | --- |

    | 1 | 即席 | `SELECT      CustomerID,      FirstName,      LastName,      Address,      City,      PostalCode,      Country,      IsActive,      DateCreated,      DateModified,      DateDisabled
    FROM dbo.Customer;` |

    | 1 | 即席 | `SELECT CustomerID,      FirstName,      LastName,      Address,      City,      PostalCode,      Country,      IsActive,      DateCreated,      DateModified,      DateDisabled
    FROM dbo.Customer;` |

    | 1 | 存储过程 | `/*-------------------------------------------------------------*\
    Name:            dbo.GetCustomer Author:          Elizabeth Noble Created Date:    2022-10-30
    Description: Get a list of all customers in the databases Sample Usage:      EXECUTE
    dbo.GetCustomer \*-------------------------------------------------------------*/
    CREATE PROCEDURE dbo.GetCustomer AS  SELECT        CustomerID,        FirstName,        LastName,        Address,        City,        PostalCode,        Country,        IsActive,        DateCreated,        DateModified,        DateDisabled  FROM
    dbo.Customer;` |


    ## 计划缓存膨胀与性能影响


    您可以在表 4-2 中看到，计划缓存中现在有三个条目。SQL Server 并没有重用第一次调用即席查询时的执行计划，而是生成了一个全新的执行计划。每次 SQL
    Server 创建新的执行计划时，它都会消耗额外的资源来创建和存储该计划。需要生成执行计划可能会使查询速度延迟几秒钟。


    每个执行的查询计划都会保存在计划缓存中。为每个查询保存多个执行计划可能会填满执行计划缓存。这可能导致其他查询执行计划过早地从计划缓存中移除。查询计划从缓存中移除将导致
    SQL Server 消耗额外的资源为那个其他查询创建新的执行计划。第 7 章将提供更多关于内存使用如何影响查询性能速度的信息。在确定您的应用程序将如何调用
    T-SQL 代码时，这是需要考虑的事情。


    ## 存储过程与参数化查询的权衡


    虽然存储过程为您提供了一种一致的方式来多次调用相同类型的代码，但通用的存储过程可能无法提供应用程序所需的灵活性。如果是这种情况，您需要了解使用参数如何帮助提高
    T-SQL 代码的可伸缩性。

    '
- fmt: "# Using Parameters\n\nIn addition to using stored procedures to help T-SQL\
    \ code be more reusable, you can use parameters with your T-SQL code. Parameters\
    \ can be used with ad hoc queries, prepared statements, or stored procedures.\
    \ It is also possible to use parameters as an input or output. Regardless of where\
    \ parameters are used, parameters are what allow you to write queries that can\
    \ be reused in a variety of situations. Listing [4-5](#480547_2_En_4_Chapter.xhtml#PC6)\
    \ shows a stored procedure that returns customer information based on the `CustomerID`\
    \ provided in the stored procedure.\n\n```sql\n/*-------------------------------------------------------------*\\\
    \nName:             dbo.GetCustomerByCustomerID\nAuthor:           Elizabeth Noble\n\
    Created Date:     2022-10-30\nDescription:      Get Customer information when\
    \ a Customer ID is provided\nSample Usage:\nDECLARE @CustomerID INT;\nSET @CustomerID\
    \ = 1;\nEXECUTE dbo.GetCustomerByCustomerID @CustomerID;\n\\*-------------------------------------------------------------*/\n\
    CREATE PROCEDURE dbo.GetCustomerByCustomerID\n    @CustomerID   INT\nAS\nSELECT\n\
    \    CustomerID,\n    FirstName,\n    LastName,\n    Address,\n    City,\n   \
    \ PostalCode,\n    Country,\n    IsActive,\n    DateCreated,\n    DateModified,\n\
    \    DateDisabled\nFROM dbo.Customer\nWHERE CustomerID = @CustomerID;\n```\n**Listing\
    \ 4-5** Creating a Stored Procedure with a Parameter\n\nThis stored procedure\
    \ allows you to pass in any `CustomerID` and the stored procedure will return\
    \ a predefined set of customer information based on that `CustomerID`. This also\
    \ allows the T-SQL code to be called in a much simpler method. Listing [4-6](#480547_2_En_4_Chapter.xhtml#PC7)\
    \ contains code to execute the stored procedure, passing a hard-coded value as\
    \ part of the execution.\n\n```sql\nEXECUTE dbo.GetCustomerByCustomerID 1;\n```\n\
    **Listing 4-6** Executing a Stored Procedure with a Hard-Coded Value\n\nWhile\
    \ it is possible to use this method to call the stored procedure, using variables\
    \ is a much more dynamic way to execute this stored procedure. One such method\
    \ is to declare a variable with a specific data type and then set that variable\
    \ to a specific value. This more closely simulates how an application might call\
    \ a stored procedure. The application code generally has a variable already declared\
    \ and uses the same variable when executing the stored procedure. The process\
    \ of declaring a variable, setting that variable to a value, and executing the\
    \ stored procedure using that variable can be seen in Listing [4-7](#480547_2_En_4_Chapter.xhtml#PC8).\n\
    \n```sql\nDECLARE @CustomerID INT;\nSET @CustomerID = 1;\nEXECUTE dbo.GetCustomerByCustomerID\
    \ @CustomerID;\n```\n**Listing 4-7** Executing a Stored Procedure with a Variable\n\
    \n## Plan Cache Comparison\n\nTo get a comparison of the plan cache for the stored\
    \ procedure in Listing [4-6](#480547_2_En_4_Chapter.xhtml#PC7) vs. an ad hoc query,\
    \ execute the ad hoc query that will use the same overall logic as Listing [4-5](#480547_2_En_4_Chapter.xhtml#PC6).\
    \ However, this value will not be parameterized. In Listing [4-8](#480547_2_En_4_Chapter.xhtml#PC9),\
    \ the query below has a hard-coded value for the `CustomerID`.\n\n```sql\nSELECT\n\
    \    CustomerID,\n    FirstName,\n    LastName,\n    Address,\n    City,\n   \
    \ PostalCode,\n    Country,\n    IsActive,\n    DateCreated,\n    DateModified,\n\
    \    DateDisabled\nFROM dbo.Customer\nWHERE CustomerID = 1;\n```\n**Listing 4-8**\
    \ Running an Adhoc Query with a Hard-Coded Value\n\nAnother method for executing\
    \ the same stored procedure is to use a query like the one in Listing [4-8](#480547_2_En_4_Chapter.xhtml#PC9)\
    \ but to use a parameter as part of the where clause. This will perform that same\
    \ overall logic as Listings [4-6](#480547_2_En_4_Chapter.xhtml#PC7), [4-7](#480547_2_En_4_Chapter.xhtml#PC8),\
    \ and [4-8](#480547_2_En_4_Chapter.xhtml#PC9). The code in Listing [4-9](#480547_2_En_4_Chapter.xhtml#PC10)\
    \ uses the same code by declaring a variable and parameterized the query overall.\n\
    \n```sql\nDECLARE @CustomerID INT;\nSET @CustomerID = 1;\nSELECT\n    CustomerID,\n\
    \    FirstName,\n    LastName,\n    Address,\n    City,\n    PostalCode,\n   \
    \ Country,\n    IsActive,\n    DateCreated,\n    DateModified,\n    DateDisabled\n\
    FROM dbo.Customer\nWHERE @CustomerID = @CustomerID;\n```\n**Listing 4-9** Running\
    \ an Adhoc Query with a Parameter\n\n## Execution Plan Analysis\n\nWhile all these\
    \ queries return the same data, the way SQL Server handles these four queries\
    \ can be surprisingly different. In my test case, I cleared the plan cache by\
    \ executing the code `DBCC FREEPROCCACHE`.\n\n> **Caution**\n>\n> Do not run this\
    \ stored procedure on a Production system because it can negatively impact the\
    \ performance of SQL Server.\n\nThen I executed the T-SQL code in Listings [4-7](#480547_2_En_4_Chapter.xhtml#PC8),\
    \ [4-8](#480547_2_En_4_Chapter.xhtml#PC9), [4-9](#480547_2_En_4_Chapter.xhtml#PC10),\
    \ and [4-10](#480547_2_En_4_Chapter.xhtml#PC11). Even though each of these queries\
    \ returns the same results, you will see in Table [4-3](#480547_2_En_4_Chapter.xhtml#Tab3)\
    \ how SQL Server has calculated or used execution plans for each of these queries.\n\
    \n**Table 4-3** Comparison of Plan Cache for Variables and Hard-Coded Values\n\
    \n| Use Counts | Object Type | Text |\n| :--- | :--- | :--- |\n| 2 | Proc | `/*-------------------------------------------------------------*\\\
    \ Name:             dbo.GetCustomerByCustomerID Author:           Elizabeth Noble\
    \ Created Date:     2022-10-30 Description:      Get Customer information when\
    \ a Customer ID is provided Sample Usage:       DECLARE @CustomerID INT;     \
    \  SET @CustomerID = 1;       EXECUTE dbo.GetCustomerByCustomerID @CustomerID\
    \ \\*-------------------------------------------------------------*/ CREATE PROCEDURE\
    \ dbo.GetCustomerByCustomerID       @CustomerID        SELECT           CustomerID,\
    \           FirstName,           LastName,           Address,           City,\
    \           PostalCode,           Country,           IsActive,           DateCreated,\
    \           DateModified,           DateDisabled       FROM dbo.Customer     \
    \  WHERE CustomerID = @CustomerID;` |\n| 1 | Adhoc | `DECLARE @CustomerID INT;\
    \ SET @CustomerID = 1 SELECT CustomerID,       FirstName,       LastName,    \
    \   Address,       City,       PostalCode,       Country,       IsActive,    \
    \   DateCreated,       DateModified,       DateDisabled FROM dbo.Customer WHERE\
    \ @CustomerID = 1;` |\n| 1 | Adhoc | `SELECT CustomerID,       FirstName,    \
    \   LastName,       Address,       City,       PostalCode,       Country,    \
    \   IsActive,       DateCreated,       DateModified,       DateDisabled FROM dbo.Customer\
    \ WHERE CustomerID = 1;` |\n| 1 | Prepared | `(@1 tinyint)SELECT [CustomerID],[FirstName],[LastName],[Address],[City],[PostalCode],[Country],[IsActive],[DateCreated],[DateModified],[DateDisabled]\
    \ FROM [dbo].[Customer] WHERE [CustomerID]=@1` |\n\nIn Table [4-3](#480547_2_En_4_Chapter.xhtml#Tab3),\
    \ you can see that the stored procedure has been executed twice. The SELECT statement\
    \ with the hard-coded value and the SELECT statement with the parameter value\
    \ each have their own execution plan. This may not have a large impact when you\
    \ are discussing only a handful of queries. However, if your entire environment\
    \ has a significant number of queries that are not stored procedures or prepared\
    \ statements, you may want to check your plan cache to determine how they are\
    \ being handled.\n\nThis is not the only topic you need to consider when writing\
    \ your queries. Another potential option has to do with what is commonly referred\
    \ to as parameter sniffing. Parameter sniffing does not sound as dangerous as\
    \ it can be. PSP!! The key takeaway when understanding what parameter sniffing\
    \ is and how it affects you is to consider how your data is shaped. For many companies,\
    \ not all data stored in a data table is evenly distributed."
  raw: '## Using Parameters


    In addition to using stored procedures to help T-SQL code be more reusable, you
    can use parameters with your T-SQL code. Parameters can be used with ad hoc queries,
    prepared statements, or stored procedures. It is also possible to use parameters
    as an input or output. Regardless of where parameters are used, parameters are
    what allow you to write queries that can be reused in a variety of situations.
    Listing [4-5](#480547_2_En_4_Chapter.xhtml#PC6) shows a stored procedure that
    returns customer information based on the `CustomerID` provided in the stored
    procedure.


    ```

    /*-------------------------------------------------------------*\

    Name:             dbo.GetCustomerByCustomerID

    Author:           Elizabeth Noble

    Created Date:     2022-10-30

    Description:      Get Customer information when a Customer ID is provided

    Sample Usage:

    DECLARE @CustomerID INT;

    SET @CustomerID = 1;

    EXECUTE dbo.GetCustomerByCustomerID @CustomerID;

    \*-------------------------------------------------------------*/

    CREATE PROCEDURE dbo.GetCustomerByCustomerID

    @CustomerID   INT

    AS

    SELECT

    CustomerID,

    FirstName,

    LastName,

    Address,

    City,

    PostalCode,

    Country,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Customer

    WHERE CustomerID = @CustomerID;

    Listing 4-5

    Creating a Stored Procedure with a Parameter

    ```


    This stored procedure allows you to pass in any `CustomerID` and the stored procedure
    will return a predefined set of customer information based on that `CustomerID`.
    This also allows the T-SQL code to be called in a much simpler method. Listing
    [4-6](#480547_2_En_4_Chapter.xhtml#PC7) contains code to execute the stored procedure,
    passing a hard-coded value as part of the execution.


    ```

    EXECUTE dbo.GetCustomerByCustomerID 1;

    Listing 4-6

    Executing a Stored Procedure with a Hard-Coded Value

    ```


    While it is possible to use this method to call the stored procedure, using variables
    is a much more dynamic way to execute this stored procedure. One such method is
    to declare a variable with a specific data type and then set that variable to
    a specific value. This more closely simulates how an application might call a
    stored procedure. The application code generally has a variable already declared
    and uses the same variable when executing the stored procedure. The process of
    declaring a variable, setting that variable to a value, and executing the stored
    procedure using that variable can be seen in Listing [4-7](#480547_2_En_4_Chapter.xhtml#PC8).


    ```

    DECLARE @CustomerID INT;

    SET @CustomerID = 1;

    EXECUTE dbo.GetCustomerByCustomerID @CustomerID;

    Listing 4-7

    Executing a Stored Procedure with a Variable

    ```


    To get a comparison of the plan cache for the stored procedure in Listing [4-6](#480547_2_En_4_Chapter.xhtml#PC7)
    vs. an ad hoc query, execute the ad hoc query that will use the same overall logic
    as Listing [4-5](#480547_2_En_4_Chapter.xhtml#PC6). However, this value will not
    be parameterized. In Listing [4-8](#480547_2_En_4_Chapter.xhtml#PC9), the query below
    has a hard-coded value for the `CustomerI``D`.


    ```

    SELECT CustomerID,

    FirstName,

    LastName,

    Address,

    City,

    PostalCode,

    Country,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Customer

    WHERE CustomerID = 1;

    Listing 4-8

    Running an Adhoc Query with a Hard-Coded Value

    ```


    Another method for executing the same stored procedure is to use a query like
    the one in Listing [4-8](#480547_2_En_4_Chapter.xhtml#PC9) but to use a parameter
    as part of the where clause. This will perform that same overall logic as Listings
    [4-6](#480547_2_En_4_Chapter.xhtml#PC7), [4-7](#480547_2_En_4_Chapter.xhtml#PC8),
    and [4-8](#480547_2_En_4_Chapter.xhtml#PC9). The code in Listing [4-9](#480547_2_En_4_Chapter.xhtml#PC10)
    uses the same code by declaring a variable and parameterized the query overall.


    ```

    DECLARE @CustomerID INT;

    SET @CustomerID = 1;

    SELECT CustomerID,

    FirstName,

    LastName,

    Address,

    City,

    PostalCode,

    Country,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Customer

    WHERE @CustomerID = @CustomerID;

    Listing 4-9

    Running an Adhoc Query with a Parameter

    ```


    While all these queries return the same data, the way SQL Server handles these
    four queries can be surprisingly different. In my test case, I cleared the plan
    cache by executing the code `DBCC FREEPROCCACHE`.


    Caution


    Do not run this stored procedure on a Production system because it can negatively
    impact the performance of SQL Server.


    Then I executed the T-SQL code in Listings [4-7](#480547_2_En_4_Chapter.xhtml#PC8),
    [4-8](#480547_2_En_4_Chapter.xhtml#PC9), [4-9](#480547_2_En_4_Chapter.xhtml#PC10),
    and [4-10](#480547_2_En_4_Chapter.xhtml#PC11). Even though each of these queries
    returns the same results, you will see in Table [4-3](#480547_2_En_4_Chapter.xhtml#Tab3)
    how SQL Server has calculated or used execution plans for each of these queries.


    Table 4-3


    Comparison of Plan Cache for Variables and Hard-Coded Values


    | Use Counts | Object Type | Text |

    | --- | --- | --- |

    | 2 | Proc | `/*-------------------------------------------------------------*\
    Name:            dbo.GetCustomerByCustomerID Author:          Elizabeth Noble
    Created Date:    2022-10-30 Description: Get Customer information when a Customer
    ID is provided Sample Usage:      DECLARE @CustomerID INT;      SET @CustomerID
    = 1;      EXECUTE dbo.GetCustomerByCustomerID @CustomerID \*-------------------------------------------------------------*/
    CREATE PROCEDURE dbo.GetCustomerByCustomerID      @CustomerID        SELECT          CustomerID,          FirstName,          LastName,          Address,          City,          PostalCode,          Country,          IsActive,          DateCreated,          DateModified,          DateDisabled      FROM
    dbo.Customer      WHERE CustomerID = @CustomerID;` |

    | 1 | Adhoc | `DECLARE @CustomerID INT; SET @CustomerID = 1 SELECT CustomerID,      FirstName,      LastName,      Address,      City,      PostalCode,      Country,      IsActive,      DateCreated,      DateModified,      DateDisabled
    FROM dbo.Customer WHERE @CustomerID = 1;` |

    | 1 | Adhoc | `SELECT CustomerID,      FirstName,      LastName,      Address,      City,      PostalCode,      Country,      IsActive,      DateCreated,      DateModified,      DateDisabled
    FROM dbo.Customer WHERE CustomerID = 1;` |

    | 1 | Prepared | `(@1 tinyint)SELECT [CustomerID],[FirstName],[LastName],[Address],[City],[PostalCode],[Country],[IsActive],[DateCreated],[DateModified],[DateDisabled]
    FROM [dbo].[Customer] WHERE [CustomerID]=@1` |


    In Table [4-3](#480547_2_En_4_Chapter.xhtml#Tab3), you can see that the stored
    procedure has been executed twice. The SELECT statement with the hard-coded value
    and the SELECT statement with the parameter value each have their own execution
    plan. This may not have a large impact when you are discussing only a handful
    of queries. However, if your entire environment has a significant number of queries
    that are not stored procedures or prepared statements, you may want to check your
    plan cache to determine how they are being handled.


    This is not the only topic you need to consider when writing your queries. Another
    potential option has to do with what is commonly referred to as parameter sniffing.
    Parameter sniffing does not sound as dangerous as it can be. PSP!! The key takeaway
    when understanding what parameter sniffing is and how it affects you is to consider
    how your data is shaped. For many companies, not all data stored in a data table
    is evenly distributed.'
  trans: "# 使用参数\n\n除了使用存储过程来提高 T-SQL 代码的可重用性之外，您还可以在 T-SQL 代码中使用参数。参数可以用于即席查询、预处理语句或存储过程。参数也可以用作输入或输出。无论参数用在何处，参数都允许您编写可在多种情况下重用的查询。清单\
    \ 4-5 展示了一个根据存储过程中提供的 `CustomerID` 返回客户信息的存储过程。\n\n```sql\n/*-------------------------------------------------------------*\\\
    \nName:             dbo.GetCustomerByCustomerID\nAuthor:           Elizabeth Noble\n\
    Created Date:     2022-10-30\nDescription:      Get Customer information when\
    \ a Customer ID is provided\nSample Usage:\nDECLARE @CustomerID INT;\nSET @CustomerID\
    \ = 1;\nEXECUTE dbo.GetCustomerByCustomerID @CustomerID;\n\\*-------------------------------------------------------------*/\n\
    CREATE PROCEDURE dbo.GetCustomerByCustomerID\n    @CustomerID   INT\nAS\nSELECT\n\
    \    CustomerID,\n    FirstName,\n    LastName,\n    Address,\n    City,\n   \
    \ PostalCode,\n    Country,\n    IsActive,\n    DateCreated,\n    DateModified,\n\
    \    DateDisabled\nFROM dbo.Customer\nWHERE CustomerID = @CustomerID;\n```\n**清单\
    \ 4-5** 创建带参数的存储过程\n\n这个存储过程允许您传入任何 `CustomerID`，然后它会根据该 `CustomerID` 返回一组预定义的客户信息。这也使得以更简单的方式调用\
    \ T-SQL 代码成为可能。清单 4-6 包含执行该存储过程的代码，执行时传递了一个硬编码的值。\n\n```sql\nEXECUTE dbo.GetCustomerByCustomerID\
    \ 1;\n```\n**清单 4-6** 使用硬编码值执行存储过程\n\n虽然可以使用此方法调用存储过程，但使用变量是执行此存储过程的一种更为动态的方式。其中一种方法是声明一个具有特定数据类型的变量，然后将该变量设置为特定值。这更接近地模拟了应用程序调用存储过程的方式。应用程序代码通常已经声明了一个变量，并在执行存储过程时使用相同的变量。声明变量、将该变量设置为某个值，然后使用该变量执行存储过程的过程可以在清单\
    \ 4-7 中看到。\n\n```sql\nDECLARE @CustomerID INT;\nSET @CustomerID = 1;\nEXECUTE\
    \ dbo.GetCustomerByCustomerID @CustomerID;\n```\n**清单 4-7** 使用变量执行存储过程\n\n## 计划缓存比较\n\
    \n为了比较清单 4-6 中存储过程的计划缓存与即席查询的计划缓存，请执行与清单 4-5 具有相同整体逻辑的即席查询。但是，此值不会被参数化。在清单 4-8\
    \ 中，下面的查询对 `CustomerID` 使用了硬编码值。\n\n```sql\nSELECT\n    CustomerID,\n    FirstName,\n\
    \    LastName,\n    Address,\n    City,\n    PostalCode,\n    Country,\n    IsActive,\n\
    \    DateCreated,\n    DateModified,\n    DateDisabled\nFROM dbo.Customer\nWHERE\
    \ CustomerID = 1;\n```\n**清单 4-8** 运行带硬编码值的即席查询\n\n执行相同存储过程的另一种方法是使用类似于清单 4-8\
    \ 中的查询，但在 where 子句中使用参数。这将执行与清单 4-6、4-7 和 4-8 相同的整体逻辑。清单 4-9 中的代码通过声明一个变量并整体参数化查询来使用相同的代码。\n\
    \n```sql\nDECLARE @CustomerID INT;\nSET @CustomerID = 1;\nSELECT\n    CustomerID,\n\
    \    FirstName,\n    LastName,\n    Address,\n    City,\n    PostalCode,\n   \
    \ Country,\n    IsActive,\n    DateCreated,\n    DateModified,\n    DateDisabled\n\
    FROM dbo.Customer\nWHERE @CustomerID = @CustomerID;\n```\n**清单 4-9** 运行带参数的即席查询\n\
    \n## 执行计划分析\n\n虽然所有这些查询都返回相同的数据，但 SQL Server 处理这四个查询的方式可能截然不同。在我的测试案例中，我通过执行代码\
    \ `DBCC FREEPROCCACHE` 清除了计划缓存。\n\n> **注意**\n>\n> 不要在生产系统上运行此存储过程，因为它可能对 SQL Server\
    \ 的性能产生负面影响。\n\n然后我执行了清单 4-7、4-8、4-9 和 4-10 中的 T-SQL 代码。尽管这些查询中的每一个都返回相同的结果，但您将在表\
    \ 4-3 中看到 SQL Server 如何为这些查询中的每一个计算或使用执行计划。\n\n**表 4-3** 变量和硬编码值的计划缓存比较\n\n| 使用计数\
    \ | 对象类型 | 文本 |\n| :--- | :--- | :--- |\n| 2 | Proc | `/*-------------------------------------------------------------*\\\
    \ Name:             dbo.GetCustomerByCustomerID Author:           Elizabeth Noble\
    \ Created Date:     2022-10-30 Description:      Get Customer information when\
    \ a Customer ID is provided Sample Usage:       DECLARE @CustomerID INT;     \
    \  SET @CustomerID = 1;       EXECUTE dbo.GetCustomerByCustomerID @CustomerID\
    \ \\*-------------------------------------------------------------*/ CREATE PROCEDURE\
    \ dbo.GetCustomerByCustomerID       @CustomerID        SELECT           CustomerID,\
    \           FirstName,           LastName,           Address,           City,\
    \           PostalCode,           Country,           IsActive,           DateCreated,\
    \           DateModified,           DateDisabled       FROM dbo.Customer     \
    \  WHERE CustomerID = @CustomerID;` |\n| 1 | Adhoc | `DECLARE @CustomerID INT;\
    \ SET @CustomerID = 1 SELECT CustomerID,       FirstName,       LastName,    \
    \   Address,       City,       PostalCode,       Country,       IsActive,    \
    \   DateCreated,       DateModified,       DateDisabled FROM dbo.Customer WHERE\
    \ @CustomerID = 1;` |\n| 1 | Adhoc | `SELECT CustomerID,       FirstName,    \
    \   LastName,       Address,       City,       PostalCode,       Country,    \
    \   IsActive,       DateCreated,       DateModified,       DateDisabled FROM dbo.Customer\
    \ WHERE CustomerID = 1;` |\n| 1 | Prepared | `(@1 tinyint)SELECT [CustomerID],[FirstName],[LastName],[Address],[City],[PostalCode],[Country],[IsActive],[DateCreated],[DateModified],[DateDisabled]\
    \ FROM [dbo].[Customer] WHERE [CustomerID]=@1` |\n\n在表 4-3 中，您可以看到存储过程已被执行了两次。带硬编码值的\
    \ SELECT 语句和带参数值的 SELECT 语句各自拥有自己的执行计划。当您只讨论少数几个查询时，这可能不会有太大影响。但是，如果您的整个环境中存在大量不是存储过程或预处理语句的查询，您可能需要检查您的计划缓存，以确定它们是如何被处理的。\n\
    \n这不是您在编写查询时需要考虑的唯一主题。另一个潜在选项涉及通常被称为**参数嗅探**的问题。参数嗅探听起来并不像它实际可能那么危险。嘘！！理解参数嗅探是什么以及它如何影响您的关键要点是考虑您的数据是如何分布的。对于许多公司来说，存储在数据表中的数据并非都是均匀分布的。"
- fmt: '对于列统计信息导致 SQL Server 预期返回大量行的查询，其查询计划可能与因不同参数带来不同统计信息而预期返回极少行的同一查询的计划看起来截然不同。所有这些参数化的尝试，都是为了让这些查询的不同版本能够共享一个存储在计划缓存中的单一计划。当查询可能在不共享的情况下表现更好时，这种共享计划的问题被称为`parameter
    sniffing`。在清单 [4-10](#480547_2_En_4_Chapter.xhtml#PC11) 中，你可以看到用于测试参数嗅探的存储过程。


    ```

    /*-------------------------------------------------------------*\

    Name:             dbo.GetCustomerAndOrderNumberByProductID

    Author:           Elizabeth Noble

    Created Date:     2022-10-30

    Description:      Get customer and products ordered for an order number

    Sample Usage:

    EXECUTE dbo.GetCustomerAndOrderNumberByProductID 1

    \*-------------------------------------------------------------*/

    CREATE PROCEDURE dbo.GetCustomerAndOrderNumberByProductID

    @ProductID     INT

    WITH RECOMPILE

    AS

    SELECT

    cus.FirstName,

    cus.LastName,

    ord.OrderNumber,

    ord.OrderDate,

    prd.ProductName,

    SUM(dtl.QuantitySold),

    dtl.ProductPrice

    FROM dbo.Customer cus

    INNER JOIN dbo.CustomerOrder ord

    ON cus.CustomerID = ord.CustomerID

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    INNER JOIN dbo.Product prd

    ON prd.ProductID = dtl.ProductID

    WHERE prd.ProductID = @ProductID

    GROUP BY cus.FirstName,

    cus.LastName,

    ord.OrderNumber,

    ord.OrderDate,

    prd.ProductName,

    dtl.ProductPrice

    ORDER BY cus.FirstName, cus.LastName;

    Listing 4-10

    Stored Procedure to Find Customer and Order by Product

    ```


    对于产品而言，存储在表中的不同类型产品的数量可能存在显著差异。如果你有成百上千个望远镜售出，但只有少量桨板售出，你可能会遇到参数嗅探影响应用程序性能的场景。在此场景中，你可能执行一个想要查询望远镜的存储过程。第一次调用存储过程时，SQL
    Server 会使用提供的参数来生成执行计划。该执行计划最终将存储在计划缓存中。要测试参数嗅探，你可能需要用给定的参数执行存储过程，如清单 [4-11](#480547_2_En_4_Chapter.xhtml#PC12)
    所示。


    ```

    EXECUTE dbo.GetCustomerAndOrderNumberByProductID 1;

    Listing 4-11

    Executing a Stored Procedure with a Parameter with Many Records

    ```


    此存储过程执行产生了图 [4-2](#480547_2_En_4_Chapter.xhtml#Fig2) 中的部分执行计划，用于检索客户订单和订单详细信息。


    ![](images/480547_2_En_4_Chapter/480547_2_En_4_Fig2_HTML.jpg)


    A flow diagram depicts two backward arrows towards a hash match for a cost equal
    to 12 percent from 2 parallelism repartition streams for a cost equal to 2 and
    3 percent. The repartition streams are separated by backward arrows from the clustered
    index scan for costs equal to 18 and 17 percent.


    图 4-2

    参数对应大量记录的存储过程的执行计划


    如果你稍后返回并想为桨板重新运行该存储过程，SQL Server 将重用最初为查询望远镜（其记录很多）生成的执行计划。然而，SQL Server 创建的第一个执行计划在尝试查找购买桨板的客户时，性能可能会更差。如果你清除计划缓存并以不同顺序重新运行存储过程，可以验证该问题与参数嗅探有关。在清单
    [4-12](#480547_2_En_4_Chapter.xhtml#PC13) 中，你可以看到用于生成不同执行计划的 T-SQL 代码，因为现在预期行数要少得多。


    ```

    EXECUTE dbo.GetCustomerAndOrderNumberByProductID 4;

    Listing 4-12

    Executing a Stored Procedure with a Parameter with Few Records

    ```


    当你执行此存储过程时，会创建一个新的计划缓存。你可以在图 [4-3](#480547_2_En_4_Chapter.xhtml#Fig3) 中看到创建的执行计划。


    ![](images/480547_2_En_4_Chapter/480547_2_En_4_Fig3_HTML.jpg)


    A flow diagram depicts two backward arrows towards a nested loop for a cost equal
    to 0 percent from a nested loop for a cost equal to 0 percent and clustered index
    scan. It further displays a nested loop separated from the index seek and key
    lookup through backward arrows.


    图 4-3

    参数对应少量记录的存储过程的执行计划


    这里有一个新的联接，允许执行计划用相同的计划处理不同形状的数据。这就是自适应联接运算符的使用。目前，需要理解的重要一点是，执行计划中的自适应联接运算符让 SQL
    Server 能够在查询执行时选择两个不同运算符中的一个，如图 [4-4](#480547_2_En_4_Chapter.xhtml#Fig4) 所示。


    ![](images/480547_2_En_4_Chapter/480547_2_En_4_Fig4_HTML.jpg)


    A screenshot titled adaptive join displays 21 options. The options mainly comprise
    logical operation, estimated execution mode, adaptive threshold rows, actual join
    type, and actual rebinds.


    图 4-4

    自适应联接运算符属性


    如你所见，自适应联接允许 SQL Server 在`hash join`运算符和`nested loop`运算符之间动态选择。该运算符在哈希联接和嵌套循环联接之间切换的能力，有助于缓解许多因参数嗅探而经历的性能问题。名为`Adaptive
    Join`的批处理模式在 SQL Server 2017 中引入，只要你的数据库兼容级别为 140 或更高，它就可用。我将在第 [8](#480547_2_En_8_Chapter.xhtml)
    章中更详细地讨论自适应联接。'
  raw: 'A query plan for a query where SQL Server expects many rows to be returned
    due to column statistics can look very different than a plan for that very same
    query if it now expects very few rows due to a different parameter bringing back
    different statistics. All this parameterization is trying to get both of versions
    of these queries to share a single plan that is saved in the plan cache. This
    problem of sharing plans when the queries may do better without sharing is called
    parameter sniffing. In Listing [4-10](#480547_2_En_4_Chapter.xhtml#PC11), you
    can see the stored procedure to test for parameter sniffing.


    ```

    /*-------------------------------------------------------------*\

    Name:             dbo.GetCustomerAndOrderNumberByProductID

    Author:           Elizabeth Noble

    Created Date:     2022-10-30

    Description:      Get customer and products ordered for an order number

    Sample Usage:

    EXECUTE dbo.GetCustomerAndOrderNumberByProductID 1

    \*-------------------------------------------------------------*/

    CREATE PROCEDURE dbo.GetCustomerAndOrderNumberByProductID

    @ProductID     INT

    WITH RECOMPILE

    AS

    SELECT

    cus.FirstName,

    cus.LastName,

    ord.OrderNumber,

    ord.OrderDate,

    prd.ProductName,

    SUM(dtl.QuantitySold),

    dtl.ProductPrice

    FROM dbo.Customer cus

    INNER JOIN dbo.CustomerOrder ord

    ON cus.CustomerID = ord.CustomerID

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    INNER JOIN dbo.Product prd

    ON prd.ProductID = dtl.ProductID

    WHERE prd.ProductID = @ProductID

    GROUP BY cus.FirstName,

    cus.LastName,

    ord.OrderNumber,

    ord.OrderDate,

    prd.ProductName,

    dtl.ProductPrice

    ORDER BY cus.FirstName, cus.LastName;

    Listing 4-10

    Stored Procedure to Find Customer and Order by Product

    ```


    In the case of products, you may have a significant difference in the quantity
    of the types of products that are stored in the tables. If you have hundreds or
    thousands of telescopes sold but only a handful of paddleboards sold, you may
    find yourself in a scenario where parameter sniffing will affect your application
    performance. In this scenario, you may execute a stored procedure wanting telescopes.
    The first time you call your stored procedure, SQL Server will use the parameter
    provided to generate an execution plan. That execution plan will end up stored
    in the plan cache. To test for parameter sniffing, you may want to execute the
    stored procedure with a given parameter, as shown in Listing [4-11](#480547_2_En_4_Chapter.xhtml#PC12).


    ```

    EXECUTE dbo.GetCustomerAndOrderNumberByProductID 1;

    Listing 4-11

    Executing a Stored Procedure with a Parameter with Many Records

    ```


    This stored procedure execution results in the partial execution plan in Figure
    [4-2](#480547_2_En_4_Chapter.xhtml#Fig2) for retrieving the customer order and
    order detail information.


    ![](images/480547_2_En_4_Chapter/480547_2_En_4_Fig2_HTML.jpg)


    A flow diagram depicts two backward arrows towards a hash match for a cost equal
    to 12 percent from 2 parallelism repartition streams for a cost equal to 2 and
    3 percent. The repartition streams are separated by backward arrows from the clustered
    index scan for costs equal to 18 and 17 percent.


    Figure 4-2


    Execution plan for a stored procedure with a parameter that has many records


    If you come back later and want to rerun the stored procedure for paddleboards,
    SQL Server will reuse the original execution plan that was generated when you
    ran the query for telescopes, of which there are many. However, the first execution
    plan that SQL Server created may perform worse when trying to find customers with
    the product of paddleboards. If you clear the plan cache and rerun the stored
    procedure in a different order, you can verify that the issue is related to parameter
    sniffing. In Listing [4-12](#480547_2_En_4_Chapter.xhtml#PC13), you can see the
    T-SQL code used to generate a different execution plan based on the fact that
    there are far fewer rows expected now.


    ```

    EXECUTE dbo.GetCustomerAndOrderNumberByProductID 4;

    Listing 4-12

    Executing a Stored Procedure with a Parameter with Few Records

    ```


    When you execute this stored procedure, a different plan cache is created. You
    can see the execution plan that is created in Figure [4-3](#480547_2_En_4_Chapter.xhtml#Fig3).


    ![](images/480547_2_En_4_Chapter/480547_2_En_4_Fig3_HTML.jpg)


    A flow diagram depicts two backward arrows towards a nested loop for a cost equal
    to 0 percent from a nested loop for a cost equal to 0 percent and clustered index
    scan. It further displays a nested loop separated from the index seek and key
    lookup through backward arrows.


    Figure 4-3


    Execution plan for a stored procedure with a parameter that has few records


    There is a new join that allows the execution plan to handle different shapes
    of data with the same execution plan. This is the use of the adaptive join operator.
    For now, the important thing to understand is that the adaptive join operator
    in the execution plan gives SQL Server the option to choose one of two different
    operators for the query execution, as shown in Figure [4-4](#480547_2_En_4_Chapter.xhtml#Fig4).


    ![](images/480547_2_En_4_Chapter/480547_2_En_4_Fig4_HTML.jpg)


    A screenshot titled adaptive join displays 21 options. The options mainly comprise
    logical operation, estimated execution mode, adaptive threshold rows, actual join
    type, and actual rebinds.


    Figure 4-4


    Adaptive join operator properties


    As you can see, the adaptive join allows SQL Server to choose dynamically between
    either a hash join operator or a nested loop. The ability for this operator to
    switch between the hash join and nest loop operators helps alleviate many of the
    performance issues experienced with parameter sniffing. The batch mode named Adaptive
    Join was introduced in SQL Server 2017 and is available as long as your database
    is in compatibility mode 140 or greater. I will discuss adaptive joins in more
    detail in Chapter [8](#480547_2_En_8_Chapter.xhtml).'
  trans: '

    对于因列统计信息导致 SQL Server 预期返回大量行的查询，其查询计划可能与那些因不同参数带来不同统计信息、从而预期返回极少行的同一查询的计划看起来截然不同。所有这些参数化的尝试，都是为了让这些查询的不同版本能够共享一个存储在计划缓存中的单一计划。当查询在不共享计划的情况下可能表现更好时，这种共享计划的问题被称为`parameter
    sniffing`。在清单 4-10 中，你可以看到用于测试参数嗅探的存储过程。


    ```

    /*-------------------------------------------------------------*\

    Name:             dbo.GetCustomerAndOrderNumberByProductID

    Author:           Elizabeth Noble

    Created Date:     2022-10-30

    Description:      Get customer and products ordered for an order number

    Sample Usage:

    EXECUTE dbo.GetCustomerAndOrderNumberByProductID 1

    \*-------------------------------------------------------------*/

    CREATE PROCEDURE dbo.GetCustomerAndOrderNumberByProductID

    @ProductID     INT

    WITH RECOMPILE

    AS

    SELECT

    cus.FirstName,

    cus.LastName,

    ord.OrderNumber,

    ord.OrderDate,

    prd.ProductName,

    SUM(dtl.QuantitySold),

    dtl.ProductPrice

    FROM dbo.Customer cus

    INNER JOIN dbo.CustomerOrder ord

    ON cus.CustomerID = ord.CustomerID

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    INNER JOIN dbo.Product prd

    ON prd.ProductID = dtl.ProductID

    WHERE prd.ProductID = @ProductID

    GROUP BY cus.FirstName,

    cus.LastName,

    ord.OrderNumber,

    ord.OrderDate,

    prd.ProductName,

    dtl.ProductPrice

    ORDER BY cus.FirstName, cus.LastName;

    Listing 4-10

    用于按产品查找客户和订单的存储过程

    ```


    对于产品而言，存储在表中的不同产品类型数量可能存在显著差异。如果你有成百上千个望远镜售出，但只有少量桨板售出，你可能会遇到参数嗅探影响应用程序性能的场景。在此场景中，你可能执行一个想要查询望远镜的存储过程。第一次调用存储过程时，SQL
    Server 会使用提供的参数来生成执行计划。该执行计划最终将存储在计划缓存中。要测试参数嗅探，你可能需要用给定的参数执行存储过程，如清单 4-11 所示。


    ```

    EXECUTE dbo.GetCustomerAndOrderNumberByProductID 1;

    Listing 4-11

    使用对应大量记录的参数执行存储过程

    ```


    此存储过程执行产生了图 4-2 中的部分执行计划，用于检索客户订单和订单详细信息。


    ![](img/480547_2_En_4_Fig2_HTML.jpg)


    一个流程图描绘了两个指向哈希匹配的反向箭头，其成本占比为 12%，源自两个并行度重分区流，成本占比分别为 2%和 3%。重分区流通过反向箭头从聚簇索引扫描分离出来，成本占比分别为
    18%和 17%。


    图 4-2

    参数对应大量记录的存储过程的执行计划


    如果你稍后返回并想为桨板重新运行该存储过程，SQL Server 将重用最初为查询望远镜（其记录很多）生成的执行计划。然而，SQL Server 创建的第一个执行计划在尝试查找购买桨板的客户时，性能可能会更差。如果你清除计划缓存并以不同顺序重新运行存储过程，可以验证该问题与参数嗅探有关。在清单
    4-12 中，你可以看到用于生成不同执行计划的 T-SQL 代码，因为现在预期行数要少得多。


    ```

    EXECUTE dbo.GetCustomerAndOrderNumberByProductID 4;

    Listing 4-12

    使用对应少量记录的参数执行存储过程

    ```


    当你执行此存储过程时，会创建一个新的计划缓存。你可以在图 4-3 中看到创建的执行计划。


    ![](img/480547_2_En_4_Fig3_HTML.jpg)


    一个流程图描绘了两个指向嵌套循环的反向箭头，其成本占比为 0%，源自另一个成本占比为 0%的嵌套循环和聚簇索引扫描。它进一步显示了一个通过反向箭头从索引查找和键查找分离出来的嵌套循环。


    图 4-3

    参数对应少量记录的存储过程的执行计划


    这里有一个新的联接，允许执行计划用相同的计划处理不同形状的数据。这就是自适应联接运算符的使用。目前，需要理解的重要一点是，执行计划中的自适应联接运算符让 SQL
    Server 能够在查询执行时选择两个不同运算符中的一个，如图 4-4 所示。


    ![](img/480547_2_En_4_Fig4_HTML.jpg)


    一张标题为“自适应联接”的截图显示了 21 个选项。这些选项主要包括逻辑操作、估计执行模式、自适应阈值行数、实际联接类型和实际重绑定次数。


    图 4-4

    自适应联接运算符属性


    如你所见，自适应联接允许 SQL Server 在`hash join`运算符和`nested loop`运算符之间动态选择。该运算符在哈希联接和嵌套循环联接之间切换的能力，有助于缓解许多因参数嗅探而经历的性能问题。名为`Adaptive
    Join`的批处理模式在 SQL Server 2017 中引入，只要你的数据库兼容级别为 140 或更高，它就可用。我将在第 8 章中更详细地讨论自适应联接。

