- fmt: '## 数据管理总结


    上一节介绍了如何结合分区切换来管理长期数据。通常，应用程序不需要访问与报表相同的数据。创建独立的表可能有助于长期数据管理。


    本章继续讨论第18章引入的分区概念。在本章中，我介绍了如何在非分区表、分区表以及两者组合之间切换分区。您利用这些知识建立了一种管理数据归档的方法。这使您能够管理数据访问，并可能通过让应用程序使用数据量更小的表来提升性能。至此，关于构建可扩展
    T-SQL 以有效管理数据的部分就结束了。下一节将介绍如何增强数据的安全性。


    # 18. 实施安全特性


    在数据库内管理和控制对敏感数据的访问变得越来越重要。本章介绍了您可以用来改善对敏感数据的治理和访问的各种方法。第一节解释了数据发现和分类如何帮助您管理数据资产中的敏感数据。下一节使用动态数据屏蔽来防止用户查看特定列中的敏感数据。第三节介绍如何使用行级安全性来阻止用户访问表中的整行数据。本章最后介绍了如何使用账本来跟踪对数据库和表的更改。


    ## 数据发现与分类


    本节将指导您如何搜索、分类和标记敏感数据，并向您展示如何使用内置报表查看有关所有敏感数据的高层信息。


    随着数据资产变得越来越大，管理公司数据库中所有不同类型的数据变得越来越困难。对数据治理的关注已成为组织数据管理中日益重要的部分。这就是 SQL Server
    内置的数据发现和分类可以帮助您轻松找到包含敏感数据的数据字段的地方。一旦识别出来，您可以选择信息类型和敏感度标签来标记每个列。如果您还想将其他列标记为敏感列，可以选择将列添加到数据分类中。使用内置报表，您可以快速浏览您拥有的敏感数据类型以及这些敏感数据的重要性。


    ### SQL Server 中的数据发现与分类


    从 SQL Server 2019 开始，您可以使用系统目录视图来查看所有列。这些视图使您能够在一个地方管理和查看所有敏感数据。


    如果您不确定如何开始使用数据发现和分类，可以允许 SQL Server 推荐那些看起来包含敏感数据的列。图 [18-1](#480547_2_En_18_Chapter.xhtml#Fig1)
    展示了如何使用 `Object Explorer` 开始对数据进行分类的过程。


    ![](images/480547_2_En_18_Chapter/480547_2_En_18_Fig1_HTML.jpg)


    图 18-1 本地数据分类


    您需要找到要进行分类的数据库。右键单击数据库名称，然后选择“任务” ➤ “数据发现和分类” ➤ “分类数据”。选择后，SQL Server 将扫描数据库并打开“数据分类”窗口。图
    [18-2](#480547_2_En_18_Chapter.xhtml#Fig2) 显示了一个灰色框中的消息，提示“我们已找到 6 个具有分类建议的列。单击此处查看它们”。


    ![](images/480547_2_En_18_Chapter/480547_2_En_18_Fig2_HTML.jpg)


    图 18-2 数据分类输出


    单击灰色框的任意位置将更新“数据分类”窗口中的视图。现在出现了一个新的部分，以一个灰色条开始。该灰色条显示“6 个具有分类建议的列（单击以最小化）”。图 [18-3](#480547_2_En_18_Chapter.xhtml#Fig3)
    展示了数据分类窗口上的这个附加部分。


    ![](images/480547_2_En_18_Chapter/480547_2_En_18_Fig3_HTML.jpg)


    图 18-3 数据分类结果


    图 [18-3](#480547_2_En_18_Chapter.xhtml#Fig3) 显示了已识别的六个列以及它们所属的架构和表。“数据分类”窗口还有两列带有下拉菜单。第一列是“信息类型”。可用选项如下：


    *   网络

    *   联系人信息

    *   凭证

    *   信用卡

    *   银行

    *   金融

    *   其他

    *   姓名

    *   国民身份证

    *   社会安全号码

    *   健康

    *   出生日期

    *   [不适用]


    除了各种信息类型外，还有各种可用的敏感度标签，如图 [18-4](#480547_2_En_18_Chapter.xhtml#Fig4) 所示。


    ![](images/480547_2_En_18_Chapter/480547_2_En_18_Fig4_HTML.jpg)


    图 18-4 可用的敏感度标签


    一旦确认了信息类型和敏感度标签，您可以选择表中左侧的复选框来标记任意多列进行更新。图 [18-5](#480547_2_En_18_Chapter.xhtml#Fig5)
    显示了为 `dbo.Customer.Address` 列选中的复选框。


    ![](images/480547_2_En_18_Chapter/480547_2_En_18_Fig5_HTML.jpg)'
  raw: 'The intention for this example is to allow you to create a main table to hold
    data actively needed by the application. The history table is data needed for
    reporting, and the archive table is for data needed for archival purposes. This
    section covered how you can incorporate partition switching to manage data over
    an extended period of time. Often times our applications do not need access to
    the same data we need for other reporting purposes. Creating separate tables may
    be beneficial to allow you to manage data long-term.


    This chapter continued on the concepts introduced into Chapter [18](#480547_2_En_18_Chapter.xhtml)
    about partitions. In this chapter, I covered how to switch partitions between
    non-partitioned tables, partitioned tables, and the combination of the two. You
    took this knowledge and used it to set up a method to manage archiving data. This
    allows you to manage access to data as well as potentially improve performance
    for your applications since they can use tables with smaller sets of data. This
    concludes the section on building scalable T-SQL that allows you to manage data
    effectively. The next section will cover how to enhance the security of your data.


    # 18. Implementing Security Features


    It is becoming increasingly important to manage and control access to sensitive
    data within your database. This chapter goes through the various methods you can
    use to improve governance and access to sensitive data. The first section of this
    chapter explains how data discovery and classification can help you manage the
    sensitive data within your data estate. The next section uses dynamic data masking
    to prevent users from viewing sensitive data within specific columns. The third
    section covers how row-level security can be used to prevent users from accessing
    entire rows in a table. The chapter finishes with going through how you can use
    ledger to track changes to databases and tables.


    ## Data Discovery and Classification


    This section will walk you through how to search, categorize, and label sensitive
    data as well as show you how to view high-level information about all your sensitive
    data with built-in reports.


    As data estates grow larger, it’s become more difficult to manage all the different
    types of data within a company’s databases. The focus on data governance has become
    an increasingly important part of managing data in an organization. This where
    SQL Server’s built-in data discovery and classification can help you easily find
    data fields with sensitive data. Once identified, you can choose the information
    type and sensitivity label to give each column. If there are additional columns
    you want like to mark as sensitive, you have the option to add columns to the
    data classification. Using a built-in report, you can get a quick glance of what
    types of sensitive data you have as well as the significance of that sensitive
    data.


    ### Data Discovery and Classification in SQL Server


    Starting in SQL Server 2019 there are system catalog views you can use to review
    all columns. These views give you the ability to manage and review all sensitive
    data in one place.


    If you are not certain how to begin using data discovery and classification, you
    can allow SQL Server to recommend columns that appear to have sensitive data.
    Figure [18-1](#480547_2_En_18_Chapter.xhtml#Fig1) shows how you can use Object
    Explorer to begin the process of classifying your data.


    ![](images/480547_2_En_18_Chapter/480547_2_En_18_Fig1_HTML.jpg)


    A screenshot of Object Explorer. The left side of the background screen has 18
    components, among which outdoor recreation is selected. A dialog box has the tasks
    option selected. Another dialog box has data discovery and classification selected.
    The third dialog box has classify data selected.


    Figure 18-1


    Classifying data on premises


    You need to find the database where you want to classify data. Right-click the
    database name and select Tasks ➤ Data Discovery and Classification ➤ Classify
    Data. Once selected, SQL Server will scan through the database and open the Data
    Classification window. Figure [18-2](#480547_2_En_18_Chapter.xhtml#Fig2) shows
    a message in the gray box indicating “We have found 6 columns with classification
    recommendations. Click here to view them.”


    ![](images/480547_2_En_18_Chapter/480547_2_En_18_Fig2_HTML.jpg)


    A screenshot of the data classification outdoor recreation window. It presents
    a piece of information on the top. The text below it reads, choose a table to
    view its classified columns. Below are the tabs to enter the scheme and table
    and a tab for load columns.


    Figure 18-2


    Data classification output


    Clicking anywhere on the gray box will update the view in the Data Classification
    window. Now there is a new section that begins with a gray bar. The gray bar reads
    “6 columns with classification recommendations (click to minimize).” This additional
    section on the Data Classification window is shown in Figure [18-3](#480547_2_En_18_Chapter.xhtml#Fig3).


    ![](images/480547_2_En_18_Chapter/480547_2_En_18_Fig3_HTML.jpg)


    A screenshot of the data classification outdoor recreation window. It presents
    a piece of information on the top. Below it are the tabs to enter the scheme and
    table and a tab for load columns. A table at the bottom with 4 columns and 7 rows
    depicts the scheme, table, and column.


    Figure 18-3


    Data classification results


    Figure [18-3](#480547_2_En_18_Chapter.xhtml#Fig3) shows the six columns that have
    been identified as well as their schema and table where the columns can be found.
    The Data Classification window also has two columns with drop-down menus. The
    first column is for the Information Type. The available options are as follows:


    *   Networking


    *   Contact Info


    *   Credentials


    *   Credit Card


    *   Banking


    *   Financial


    *   Other


    *   Name


    *   National ID


    *   SSN


    *   Health


    *   Date of Birth


    *   [n/a]


    In addition to the various information types, there are various sensitivity labels
    available as shown in Figure [18-4](#480547_2_En_18_Chapter.xhtml#Fig4).


    ![](images/480547_2_En_18_Chapter/480547_2_En_18_Fig4_HTML.jpg)


    A screenshot presents the information type and sensitivity label. It has 5 drop-down
    tabs, 2 for contact info, 2 for name, and one for sensitivity label. Among 7 sensitivity
    labels, confidential is selected.


    Figure 18-4


    Available sensitivity labels


    Once you have confirmed the information type and sensitivity label, you can select
    the check box on the left side of the table for as many columns as you want to
    update. Figure [18-5](#480547_2_En_18_Chapter.xhtml#Fig5) shows a selected check
    box for the `dbo.Customer.Address` column.


    ![](images/480547_2_En_18_Chapter/480547_2_En_18_Fig5_HTML.jpg)'
