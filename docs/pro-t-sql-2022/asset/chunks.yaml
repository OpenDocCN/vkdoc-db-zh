- fmt: '### Common Table Expressions


    Although not a user-defined database object, I include common table expressions
    in this section because they are often used for similar purposes as temporary
    tables, table variables, and table-valued parameters. A common table expression
    is a transitory result from a SQL statement that only exists long enough to be
    used in the `SELECT`, `INSERT`, `UPDATE`, or `DELETE` statement immediately following
    the creation of the result set. Their purpose is to help break up complex logic
    or get a subset of data to be used later in the T-SQL code, batch, or stored procedure.


    The primary reason for using basic common table expressions is to improve overall
    readability of code. Listing [2-26](#480547_2_En_2_Chapter.xhtml#PC26) shows a
    common table expression using the same logic as the view that was created in Listing
    [2-2](#480547_2_En_2_Chapter.xhtml#PC2). The expectation is that when this code
    is executed, it will perform the same as the view created earlier.


    ```sql

    DECLARE @CustomerID INT = 234;

    WITH cte_orderavg AS

    (

    SELECT ord.CustomerOrderID,

    AVG(dtl.QuantitySold * dtl.ProductPrice)

    AS OrderAverage

    FROM dbo.CustomerOrder ord

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    WHERE ord.CustomerID = @CustomerID

    GROUP BY ord.CustomerOrderID

    )

    SELECT cag.CustomerOrderID, cag.OrderAverage

    FROM cte_orderavg cag;

    ```

    *Listing 2-26*

    Creating a Basic Common Table Expression


    In Figure [2-17](#480547_2_En_2_Chapter.xhtml#Fig17), you can confirm that the
    execution plan generated from Listing [2-26](#480547_2_En_2_Chapter.xhtml#PC26)
    matches the execution in Figure [2-6](#480547_2_En_2_Chapter.xhtml#Fig6). If you
    recall, the execution plan in Figure [2-8](#480547_2_En_2_Chapter.xhtml#Fig8)
    was generated from the view created in Listing [2-20](#480547_2_En_2_Chapter.xhtml#PC20).


    ![](images/480547_2_En_2_Chapter/480547_2_En_2_Fig17_HTML.jpg)


    *A flow diagram. Select has a cost of 0% from a sequence. It is from compute scalar,
    stream aggregate, compute scalar, and nested loops. It is from index scan and
    clustered index seek.*


    *Figure 2-17*

    Execution plan for a basic common table expression


    When you use a common table expression, you can also join the common table expression
    (`CTE`) to other tables as you would do for a view or a temporary table. You also
    get the ability to use `CTE`s to not only `SELECT` but also `INSERT`, `UPDATE`,
    and `DELETE` data based on the `CTE`. Listing [2-27](#480547_2_En_2_Chapter.xhtml#PC27)
    shows a query with more complex logic when using common table expressions.


    ```sql

    DECLARE @CustomerID INT = 234;

    WITH cte_orderavg AS

    (

    SELECT ord.CustomerOrderID,

    AVG(dtl.QuantitySold * dtl.ProductPrice)

    AS OrderAverage

    FROM dbo.CustomerOrder ord

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    WHERE ord.CustomerID = @CustomerID

    GROUP BY ord.CustomerOrderID

    )

    SELECT cus.FirstName, cus.LastName, cag.OrderAverage

    FROM   dbo.Customer cus

    INNER JOIN dbo.CustomerOrder ord

    ON cus.CustomerID = ord.CustomerID

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    INNER JOIN cte_orderavg cag

    ON ord.CustomerOrderID = cag.CustomerOrderID;

    ```

    *Listing 2-27*

    Using Joins with Common Table Expressions


    There is one final piece of functionality related to common table expressions
    that makes them somewhat unique. You can create recursive common table expressions.
    In this scenario, a `CTE` will reference itself to help generate hierarchical
    data. It may be tempting to try to get recursive `CTE`s to solve many different
    issues. I advise caution when implementing recursive `CTE`s. They can be the correct
    tool when needed, but they can also cause significant performance challenges.
    Listing [2-28](#480547_2_En_2_Chapter.xhtml#PC28) is an example of creating a
    recursive `CTE` to find products that are components of other products.


    ```sql

    WITH cte_product (ProductID, ProductName, ProductPrice, ProductComponentLevel)
    AS

    (

    SELECT prd.ProductID, prd.ProductName, prd.ProductPrice, 1 AS ProductComponentLevel

    FROM dbo.Product prd

    LEFT JOIN dbo.ProductComponent cmp

    ON prd.ProductID = cmp.ProductID

    WHERE cmp.ProductComponentID IS NULL

    UNION ALL

    SELECT prd.ProductID, prd.ProductName, prd.ProductPrice,

    (cpd.ProductComponentLevel + 1) AS ProductComponentLevel

    FROM cte_product cpd  --References the cte created above

    INNER JOIN dbo.ProductComponent cmp

    ON cpd.ProductID = cmp.ProductComponentID

    INNER JOIN dbo.Product prd

    ON cmp.ProductID = prd.ProductID

    )

    SELECT ProductID, ProductName, ProductPrice, ProductComponentLevel

    FROM cte_product;

    ```

    *Listing 2-28*

    Recursive CTE to Find All Products and Their Components


    As you can find the partial execution plan in Figure [2-18](#480547_2_En_2_Chapter.xhtml#Fig18),
    the steps `SQL Server` needs to take to execute this query get considerably more
    complex.


    ![](images/480547_2_En_2_Chapter/480547_2_En_2_Fig18_HTML.jpg)


    *A flow diagram. Select has a cost of 0% from an index spool. It is from concatenation
    cost from compute scalar, assert cost, and so on. They end in clustered index
    scan and clustered index seek.*


    *Figure 2-18*

    Partial execution plan for a recursive CTE


    I have found very few times where I have absolutely needed to use a recursive
    `CTE`. However, when I have had to use a common table expression, I have found
    them very helpful.


    ## Temporary Objects


    You may find yourself in a situation where you need to create an object but only
    for a short period of time. Sometimes these objects are created so that you can
    work with a subset of data when dealing with complex logic. Other times it is
    easier to break some of the code out to create a temporary object to improve readability
    or make it easier for others to understand what you are doing. Regardless of the
    scenario, it is possible to create temporary objects in `SQL Server`.


    ### Temporary Tables


    Temporary tables are exactly what they sound like. They take the same shape as
    tables where they have columns and data types and stored data. The main difference
    is that temporary tables do not persist in the database. Depending on what you
    want to do with your temporary tables and how long you need them to last will
    determine which type of temporary table you end up creating. This section will
    cover local temporary tables, global temporary tables, and persistent temporary
    tables. Most temporary tables are created as local temporary tables, and these
    tables are only accessible through the connection that created the table. The
    global temporary table is like the local temporary table but is available to all
    connections. However, both of these temporary tables will be dropped if `SQL Server`
    is restarted. The persistent temporary table is a standard table created within
    the `tempdb` database.


    There are other advantages to using temporary tables. These include the ability
    to use primary keys and indexes for improved performance. Statistics can also
    be created on temporary tables, further improving their performance. One thing
    to consider is that statistics may not be automatically updated on the temporary
    table if additional modifications are performed after the temporary table is first
    created.'
