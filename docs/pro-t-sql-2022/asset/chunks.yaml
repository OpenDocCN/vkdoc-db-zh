    '
- fmt: "Once the schema binding has been removed, you can rerun the T-SQL code from\
    \ Listing [18-8](#480547_2_En_18_Chapter.xhtml#PC8). The code will execute successfully,\
    \ and the column `OrderNumber` will use default dynamic data masking going forward.\
    \ Once the column has been updated, you can add schema binding back to the view\
    \ `dbo.vwCustomerOrderBound` as shown in Listing [18-10](#480547_2_En_18_Chapter.xhtml#PC10).\n\
    \n```sql\nCREATE OR ALTER VIEW dbo.vwCustomerOrderBound\nWITH SCHEMABINDING\n\
    AS\nSELECT cus.FirstName,\n       cus.LastName,\n       cus.FirstName + ' ' +\
    \ cus.LastName AS FullName,\n       ord.CustomerOrderID,\n       ord.OrderNumber,\n\
    \       ord.OrderDate,\n       ord.ShipDate\nFROM dbo.CustomerOrder ord\nINNER\
    \ JOIN dbo.Customer cus\n    ON ord.CustomerID = cus.CustomerID;\nListing 18-10\n\
    Adding Schema Binding Back to the View\n```\n\nThis section showed how you can\
    \ configure columns to use dynamic data masking. This includes the various types\
    \ of functions available to mask your data. This section also included samples\
    \ on how to create a table, add a column, or alter an existing column to use dynamic\
    \ data masking. The next logical step is to consider what to do if you want to\
    \ implement the concept of row-level encryption.\n\n## Row-Level Security\n\n\
    In this section, you will go over the definition of row-level security. You will\
    \ also go through an example of how to set up row-level security and explore different\
    \ types of functionality you can use when creating security policies.\n\nSQL Server\
    \ does not provide the ability to mask data at the column level. However, row-level\
    \ security allows you to define who can see which rows beyond what the `WHERE`\
    \ clause indicates. Since this row limitation defined by row-level security will\
    \ apply in addition to any `WHERE` clause that may be part of a query executed\
    \ against the database, it will also limit a user’s ability to modify data.\n\n\
    To start, let’s check to see the results of a query before you implement row-level\
    \ security. Listing [18-11](#480547_2_En_18_Chapter.xhtml#PC11) shows the count\
    \ of all customers by country in the `dbo.Customer` table.\n\n```sql\nSELECT Country,\
    \ COUNT(*) AS CustomerCount\nFROM dbo.Customer\nGROUP BY Country;\nListing 18-11\n\
    Viewing Current Customers by Country\n```\n\nThe results from the query are shown\
    \ in Figure [18-5](#480547_2_En_18_Chapter.xhtml#Fig5).\n\nTable 18-5: Customer\
    \ Count by Country\n\n| Country | Customer Count |\n| --- | --- |\n| Egypt | 1\
    \ |\n| India | 200702 |\n| Mexico | 200704 |\n| Portugal | 1 |\n| United States\
    \ | 1 |\n\nThis query returns five countries with different customer counts per\
    \ country. Now that you know the customer distribution before you implement row-level\
    \ security, you can check to see what happens once you implement row-level security.\
    \ A table-valued function can be used to determine if a row is eligible to be\
    \ viewed by returning a one or a zero. A one indicates that the user can view\
    \ the row, and a zero prevents the user from viewing the row. Listing [18-12](#480547_2_En_18_Chapter.xhtml#PC12)\
    \ shows a function to manage row-level security based on the country provided.\n\
    \n```sql\nCREATE FUNCTION dbo.TVF_SecuritySalesIndia(@Country AS VARCHAR(25))\n\
    RETURNS TABLE\nWITH SCHEMABINDING\nAS\nRETURN SELECT 1 AS tvf_region_result\n\
    \       WHERE @Country = 'India' OR USER_NAME() = 'dbo';\nListing 18-12\nCreating\
    \ a Function for Row-Level Security\n```\n\nThis function will cause any use that\
    \ is not in `dbo` to return a value of 1 only if the country is `India`. The `dbo`\
    \ user will still be able to see all customers regardless of country.\n\nOnce\
    \ you have created a table-valued function, you need a way to manage whether the\
    \ row-level security is on or off. This is done by creating a security policy.\
    \ When creating a security policy, there are three options. You can either indicate\
    \ a `FILTER PREDICATE`, a `BLOCK PREDICATE`, or both. A filter predicate is used\
    \ to determine what data can be accessed. This filter applies to `SELECT`, `UPDATE`,\
    \ and `DELETE` operations. A block predicate can be used in combination with a\
    \ function to block specific users from modifying the specified columns. An example\
    \ of a `BLOCK PREDICATE` will be shown later in this chapter. In the example where\
    \ you created the function in Listing [18-12](#480547_2_En_18_Chapter.xhtml#PC12),\
    \ you can create a security policy on this function. Listing [18-13](#480547_2_En_18_Chapter.xhtml#PC13)\
    \ shows a security policy using a filter predicate.\n\n```sql\nCREATE SECURITY\
    \ POLICY CountryFilter\nADD FILTER PREDICATE dbo.TVF_SecuritySalesIndia(Country)\n\
    ON dbo.Customer\nWITH (STATE=ON);\nListing 18-13\nCreating a Filter Security Policy\
    \ for Row-Level Security\n```\n\nThis security policy passes the country from\
    \ the `dbo.Customer` table to the function creating in Listing [18-12](#480547_2_En_18_Chapter.xhtml#PC12).\
    \ The `dbo` user will still be able see all customers as shown in Table [18-6](#480547_2_En_18_Chapter.xhtml#Tab6)\
    \ using the T-SQL code in Listing [18-11](#480547_2_En_18_Chapter.xhtml#PC11).\n\
    \nThese results are the same as those in Table [18-5](#480547_2_En_18_Chapter.xhtml#Tab5),\
    \ as expected. This indicates that the current user is not affected by the new\
