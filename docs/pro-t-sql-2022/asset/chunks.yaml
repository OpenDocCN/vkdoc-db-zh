- fmt: '## 查看分类建议


    一张包含6列分类建议的截图。顶部有两个选项卡，用于保存和忽略选定的建议。一个6列7行的表格展示了勾选框、架构、表、列、信息类型和敏感度标签。


    ### 图 18-5：选择对特定列进行数据分类


    在勾选复选框后，您可以选择 **保存选定的建议** 或 **忽略选定的建议**。在此示例中，保存第一列（`dbo.Customer` 表中的 `Address`）的建议。这仅是示例；您可以选择保存一个或多个建议的列。


    > **注意**

    >

    > 敏感度标签在 Microsoft 365 合规中心管理。如果您需要不同的标签，或者您的组织已配置了不同的敏感度标签，您需要使用 **设置 Microsoft
    信息保护策略** 选项来访问此配置。但是，使用 Microsoft 365 合规中心超出了本书的范围。


    ## 查看已分类的数据


    保存此信息后，数据分类窗口的顶部区域将更新。您可以参考图 [18-6](#480547_2_En_18_Chapter.xhtml#Fig6)，其中列 `Address`
    现在显示在窗口的上部。


    ![](images/480547_2_En_18_Chapter/480547_2_En_18_Fig6_HTML.jpg)


    一张展示已分类数据的截图。顶部有一条信息。下方是用于输入架构、表和加载列的选项卡。一个3列2行的表格展示了1个已分类列、信息类型和敏感度标签。


    ### 图 18-6：查看已分类的数据


    这表明 `dbo.Customer` 表中的 `Address` 列现已被标记为敏感数据，并关联了信息类型和标签。


    ## 添加未建议的分类列


    如果您想为 `dbo.Customer` 表添加一个 SQL Server 未建议分类的列，可以选择数据分类窗口左上角附近的“添加分类”选项。图 [18-7](#480547_2_En_18_Chapter.xhtml#Fig7)
    中突出了“添加分类”按钮。


    ![](images/480547_2_En_18_Chapter/480547_2_En_18_Fig7_HTML.jpg)


    一张展示检索到的分类数据的截图。顶部面板有4个选项，其中“添加分类”被高亮显示。下方是用于输入架构、表和加载列的选项卡。一个表格展示了1个已分类列、信息类型和敏感度标签。


    ### 图 18-7：打开添加数据分类的窗口


    一旦您选择“添加分类”，屏幕右侧将打开一个新窗口。这就是“添加分类”窗口，如图 [18-8](#480547_2_En_18_Chapter.xhtml#Fig8)
    所示。


    ![](images/480547_2_En_18_Chapter/480547_2_En_18_Fig8_HTML.jpg)


    一张展示检索到的分类数据的截图。顶部面板有4个选项。下方是用于输入架构、表和加载列与表的选项卡。右侧面板展示了一个用于添加分类的窗口，其中包含列、信息类型和敏感度标签的下拉菜单。


    ### 图 18-8：向分类添加列


    此窗口继承了主数据分类窗口中引用的架构和表。在此示例中，这是 dbo 架构和 `Customer` 表。在“添加分类”窗口中，您可以选择表中的任何列，以及信息类型和敏感度标签。确认这些值后，可以选择底部的“添加”按钮。此按钮将把新分类的列添加到主数据分类窗口中。


    ## 查看 SQL 数据分类报告


    在向数据发现和分类添加列后，您可以在 SQL 数据分类报告中查看您的敏感数据、敏感度标签和信息类型，如图 [18-9](#480547_2_En_18_Chapter.xhtml#Fig9)
    所示。


    ![](images/480547_2_En_18_Chapter/480547_2_En_18_Fig9_HTML.jpg)


    一张 SQL 数据分类报告的截图。顶部面板显示了服务器和数据库名称以及报告的日期和时间。有两个标签和信息类型分布的环形图。已分类的列为 1/170，包含敏感数据的表为
    1/24。


    ### 图 18-9：SQL 数据分类报告


    如果您不确定如何访问此报告，请参阅上面的图 [18-1](#480547_2_En_18_Chapter.xhtml#Fig1)。可以通过右键单击数据库名称并选择“任务”
    ➤ “数据发现和分类” ➤ “生成报告”来访问此报告。报告显示了服务器名称、数据库名称和报告生成日期。


    SQL 数据分类报告还显示了已分类列占总列数的计数、包含敏感数据的表占总表数的计数以及唯一信息类型的计数。由于您只添加了一列，已分类列的计数是 170 个总列中的
    1 列。同样，24 个表中只有 1 个表包含敏感数据，并且只有一个唯一信息类型。还有两个图表以可视化方式显示了敏感度标签和信息类型的分布情况。对于此示例，两者均为绿色，仅显示一个“机密”标签和一个“联系信息”敏感度类型。报告的最后一部分显示了所有被分类为具有敏感数据的列。


    ## 查看列属性中的敏感度


    如果您打开 `dbo.Customer` 表中 `Address` 列的列属性，图 [18-10](#480547_2_En_18_Chapter.xhtml#Fig10)
    显示 `Address` 列的敏感度标签为“机密”。


    ![](images/480547_2_En_18_Chapter/480547_2_En_18_Fig10_HTML.jpg)


    一张列属性“地址”窗口的截图。左侧面板显示了“选择页面”、“常规”和“扩展属性”选项以及连接详细信息。右侧面板展示了一个2列27行的表格。其中一个“敏感度标签”被选中。


    ### 图 18-10：在列属性中查看敏感度


    此敏感度标签与您在数据分类窗口以及 SQL 数据分类报告中看到的信息一致。您还可以查询系统目录视图以查找所有具有敏感度标签的列及其信息类型。清单 [18-1](#480547_2_En_18_Chapter.xhtml#PC1)
    显示了您可以运行的查询，用于查找所有包含敏感数据的列。


    ```sql

    SELECT

    sch.[name] AS SchemaName,

    obj.[name] AS TableName,

    col.[name] AS ColumnName,

    sc.[information_type] AS InformationType,

    sc.[label] AS SensitivityLabel

    FROM sys.sensitivity_classifications sc

    INNER JOIN sys.objects obj

    ON obj.[object_id] = sc.major_id

    INNER JOIN sys.columns col

    ON col.[object_id] = sc.major_id

    AND col.column_id = sc.minor_id

    INNER JOIN sys.schemas sch

    ON obj.[schema_id] = sch.[schema_id];

    ```

    **清单 18-1：查找标识为敏感数据的列**


    此查询的结果包括架构名称、表名、列名、信息类型和敏感度标签。表 [18-1](#480547_2_En_18_Chapter.xhtml#Tab1) 显示了清单
    [18-1](#480547_2_En_18_Chapter.xhtml#PC1) 中查询的这些值。


    ### 表 18-1：查看标记为敏感的列


    | 架构名称 | 表名 | 列名 | 信息类型 | 敏感度级别 |

    | --- | --- | --- | --- | --- |

    | dbo | Customer | Address | Contact Info | Confidential |


    如前所述，`Customer` 表中的 `Address` 列的敏感度标签为“机密”。查询还显示 `Customer` 表位于 dbo 架构中，`Address`
    列的信息类型为“联系信息”。'
  raw: 'A screenshot of 6 columns with classification recommendations. There are 2
    tabs on the top to save and dismiss selected recommendations. A table of 6 columns
    and 7 rows depicts boxes for tick mark, scheme, table, column, information type,
    and sensitivity label.


    Figure 18-5


    Selecting to classify data on certain columns


    After the check box has been selected, you have the option to *Save selected recommendation*
    or *Dismiss selected recommendation*. In this example, save the recommendation
    for the first column, the `Address` in the `dbo.Customer` table. This is for example
    purposes only; you can choose to save one or more of the suggested columns.


    Note


    Sensitivity labels are managed in the Microsoft 365 compliance center. If you
    want different labels or your organization has different sensitivity labels already
    configured, you need to use the *Set Microsoft Information Protection Policy*
    option to access this configuration. However, using the Microsoft 365 compliance
    center is outside of the scope of this book.


    Now that this information has been saved, the top portion of the Data Classification
    window will update. You can refer to Figure [18-6](#480547_2_En_18_Chapter.xhtml#Fig6)
    that the column `Address` is now shown in the upper portion of the window.


    ![](images/480547_2_En_18_Chapter/480547_2_En_18_Fig6_HTML.jpg)


    A screenshot presents classified data. There is a piece of information on the
    top. Below are tabs to enter the scheme, table, and tab to load columns. A table
    with 3 columns and 2 rows depicts 1 classified column, information type, and sensitivity
    label.


    Figure 18-6


    Viewing classified data


    This indicates that the `Address` column in the `dbo.Customer` table is now tagged
    as sensitive data with an associated information type and label.


    If you want to add a column to the data classification for the `dbo.Customer`
    table that was not recommended by SQL Server, you can select the Add Classification
    option near the upper left corner of the Data Classification window. The Add Classification
    button is highlighted in Figure [18-7](#480547_2_En_18_Chapter.xhtml#Fig7).


    ![](images/480547_2_En_18_Chapter/480547_2_En_18_Fig7_HTML.jpg)


    A screenshot presents retrieved classified data. The top panel has 4 options among
    which add classification is highlighted. Below are tabs to enter the scheme, table,
    and tab to load columns. A table depicts 1 classified column, information type,
    and sensitivity label.


    Figure 18-7


    Opening a window to add data classification


    Once you select the Add Classification, a new window opens on the right side of
    your screen. This is the Add Classification window, as shown in Figure [18-8](#480547_2_En_18_Chapter.xhtml#Fig8).


    ![](images/480547_2_En_18_Chapter/480547_2_En_18_Fig8_HTML.jpg)


    A screenshot presents retrieved classified data. The top panel has 4 options.
    Below are tabs to enter the scheme, table, and tab to load columns and a table.
    The right panel depicts a window to add classification with drop-downs for the
    column, information type, and sensitivity label.


    Figure 18-8


    Adding a column to a classification


    This window inherits the schema and table referenced in the main Data Classification
    window. In this examples, this is the dbo schema and the `Customer` table. In
    the Add Classification window, you can select any column in the table as well
    as an information type and sensitivity label. Once you have confirmed these values,
    you can select the Add button at the bottom. This button will add the newly classified
    column into the main Data Classification window.


    After adding columns to the data discovery and classification, you can review
    your sensitive data, the sensitivity labels, and information types in the SQL
    Data Classification Report, as shown in Figure [18-9](#480547_2_En_18_Chapter.xhtml#Fig9).


    ![](images/480547_2_En_18_Chapter/480547_2_En_18_Fig9_HTML.jpg)


    A screenshot of the S Q L data classification report. The top panel depicts server
    and database names and the date and time of the report. There are 2 donut charts
    of label and information type distribution. Classified columns are 1 over 170
    and tables containing sensitive data are 1 over 24.


    Figure 18-9


    The SQL Data Classification Report


    If you are unsure how to access this report, refer to Figure [18-1](#480547_2_En_18_Chapter.xhtml#Fig1)
    above. This report can be accessed by right-clicking the database name and selecting
    Tasks ➤ Data Discovery and Classification ➤ Generate Report. The report shows
    the server name, database name, and report generation date.


    The SQL Data Classification Report also shows the count of classified columns
    out of the total number of columns, the count of tables with sensitive data out
    of the total of all tables, and the count of the unique information types. Since
    you have only added one column, the count of classified columns is 1 column out
    of 170 total columns. Similarly, there is only 1 table out of 24 tables with sensitive
    data, and there is only one unique information type. There are also two charts
    showing a visual representation of the distribution of sensitivity labels and
    information types. For this example, both of these are green, showing only one
    label of Confidential and one sensitivity type of Contact Info. The last section
    of the report shows all columns that are classified as having sensitive data.


    If you open up the column properties for the `Address` column in the `dbo.Customer`
    table, Figure [18-10](#480547_2_En_18_Chapter.xhtml#Fig10) shows the sensitivity
    label for the `Address` column as Confidential.


    ![](images/480547_2_En_18_Chapter/480547_2_En_18_Fig10_HTML.jpg)


    A screenshot of the column properties address window. The left panel presents
    select a page, general and extended properties options, and details of the connection.
    The right panel depicts a table of 2 columns and 27 rows. A sensitivity label
    is selected.


    Figure 18-10


    Viewing Sensitivity in Column Properties


    The sensitivity label matches the same information you saw in the Data Classification
    window as well as the SQL Data Classification Report. You can also query the system
    catalog views to find all columns that have sensitivity labels as well as their
    information type. Listing [18-1](#480547_2_En_18_Chapter.xhtml#PC1) shows the
    query you can run to find all of the columns with sensitive data.


    ```

    SELECT

    sch.[name] AS SchemaName,

    obj.[name] AS TableName,

    col.[name] AS ColumnName,

    sc.[information_type] AS InformationType,

    sc.[label] AS SensitivityLabel

    FROM sys.sensitivity_classifications sc

    INNER JOIN sys.objects obj

    ON obj.[object_id] = sc.major_id

    INNER JOIN sys.columns col

    ON col.[object_id] = sc.major_id

    AND col.column_id = sc.minor_id

    INNER JOIN sys.schemas sch

    ON obj.[schema_id] = sch.[schema_id];

    Listing 18-1

    Finding Columns Identified as Sensitive Data

    ```


    The results from this query include the schema name, table name, column name,
    information type, and sensitivity label. Table [18-1](#480547_2_En_18_Chapter.xhtml#Tab1)
    shows these values for the query in Listing [18-1](#480547_2_En_18_Chapter.xhtml#PC1).


    Table 18-1


    Viewing Columns Marked as Sensitive


    | Schema Name | Table Name | Column Name | Information Type | Sensitivity Level
    |

    | --- | --- | --- | --- | --- |

    | dbo | Customer | Address | Contact Info | Confidential |


    As indicated previously, the `Address` column in the `Customer` table has a sensitivity
    label of Confidential. The query also shows that the `Customer` table is in the
    dbo schema and the `Address` column has an information type of Contact Info.'
