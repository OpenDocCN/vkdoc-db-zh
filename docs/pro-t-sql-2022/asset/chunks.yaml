  trans: '乍看之下，图 9-3 中的执行计划与图 9-1 中的执行计划非常相似。在比较外观相似的执行计划时，可以说它们具有相同的“形状”。虽然这些执行计划形状相似，但构成执行计划的项目是不同的。在图
    9-1 中，有一个`index scan`（索引扫描）。在图 9-3 中，你可以看到这个执行计划使用的是`index seek`（索引查找）。此外，图 9-3
    中`SELECT`的`index seek`之间的连线，也比图 9-1 中`SELECT`的`index scan`之间的连线更细。所有这些都是每个查询整体性能的图形化表示。不过，你也可以获取一些事实和数据来与清单
    9-1 和 9-2 中的查询性能进行比较。在图 9-2 中，实际读取的行数是 32,242。让我们将这个值与图 9-4 中实际读取的行数进行比较。


    ![](img/480547_2_En_9_Fig4_HTML.jpg)


    一张截图展示了聚集`index scan`的属性。物理和逻辑操作的值为`index seek`。执行模式和实际执行模式的值为`Row`。读取的行数为 401408。


    图 9-4

    基于可搜索条件的`index seek`属性


    清单 9-2 的实际读取行数为 1，如图 9-4 所示。将清单 9-2 读取的 392 行与清单 9-1 读取的 401,408 行进行比较，可以非常清楚地看出哪个查询更高效。


    你也可以查看两个查询的总`CPU`使用率，以了解每个查询的表现。如果你同时运行清单 9-1 和 9-2 中的查询，两个查询总执行计划的 98%都消耗在清单
    9-1 的查询上。你还可以使用`SET STATISTICS TIME ON`来查找`CPU`时间和已用时间。`CPU`时间是查询执行在`CPU`或多个`CPU`上花费的总时间。已用时间是查询执行的总时间。我运行这两个查询多次，发现清单
    9-1 的平均`CPU`时间为 15 毫秒，平均已用时间为 17 毫秒。而每次清单 9-2 的`CPU`时间和已用时间都是 0 毫秒。比较两者的`CPU`时间和已用时间，你可以清楚地看到清单
    9-2 的表现优于清单 9-1。清单 9-1 使用`index scan`读取数据，而清单 9-2 使用`index seek`访问数据。这种`index
    seek`使`SQL Server`能够显著降低估计的`I/O`成本以及估计的`CPU`成本。同样重要的是要注意，如果存在多个`CPU`，总已用时间可能少于总`CPU`时间。


    ## 隐式转换


    `SQL Server`中的数据都有数据类型。这些数据类型在第 2 章中讨论过。在使用这些数据类型时，确保保持数据类型一致性非常重要。否则，`SQL Server`必须进行隐式转换。这是指`SQL
    Server`在后台将一种数据类型转换为另一种数据类型。这可能会给`SQL Server`带来额外的负载。此外，还存在隐式转换失败的风险。我最常见到这种情况发生在一种标识类型列主要存储整数值，但偶尔也存储字符串值时。


    ## SET NOCOUNT ON


    你可以对`T-SQL`进行许多小调整，以实现一些微小的性能改进。当你运行`T-SQL`代码时，默认情况下，它会计算受影响的行数并可能报告回来。计算这些记录的成本可能是额外的几毫秒。因此，对编码标准的一个可能改进是关闭此功能，特别是在涉及存储过程时。实现这一点的方法是确保在存储过程内部包含`SET
    NOCOUNT ON`。你可以在清单 9-3 中看到这一点。


    ```sql

    /*-------------------------------------------------------------*\

    Name:             dbo.GetCustomer

    Author:           Elizabeth Noble

    Created Date:     2022-10-30

    Description:      获取数据库中所有客户的列表

    Sample Usage:

    EXECUTE dbo.GetCustomer;

    \*-------------------------------------------------------------*/

    CREATE PROCEDURE dbo.GetCustomer

    AS

    SET NOCOUNT ON;

    SELECT

    CustomerID,

    FirstName,

    LastName,

    Address,

    City,

    PostalCode,

    Country,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Customer;

    ```

    清单 9-3

    使用 `SET NOCOUNT ON` 的存储过程


    当在执行查询代码之前包含了`SET NOCOUNT ON`时，存储过程的执行时间可以减少几毫秒。


    ## NULL 值


    大多数`T-SQL`编码标准的存在是为了帮助提高`SQL Server`的整体性能。然而，有些`T-SQL`编码标准的存在是为了帮助改进查询结果，或者让人们更容易编写出按预期工作的代码。`NULL`的问题之一在于它的工作方式并不直观。在`SQL
    Server`中，`NULL`被视为一个未知值。这意味着`NULL`既不为真，也不为假。因此，对于可能包含`NULL`值的字段，处理这些字段的方式是不同的。


    此外，`NULL`值可能表明表设计得不够高效。在最终陷入这种情况之前，考虑表应该如何设计可能是有益的。你需要确保表确实需要包含可为空的列。这也与数据的存储方式以及索引的创建方式有关。你需要考虑这些数据将如何被使用。'
- fmt: '#### NOLOCK


    最佳实践也应该成为你的编码标准的一部分。一些非常常见的最佳实践包括高度争议的话题，比如在查询中何时或是否使用 `NOLOCK` 提示。我特别提到这一点的原因之一是，至少有两大阵营涉及
    `NOLOCK`。一方面，许多数据库管理员将不使用 `NOLOCK` 视为最佳实践。另一方面，许多开发者则认为使用 `NOLOCK` 是最佳实践。这种视角差异是基于数据准确性和性能之间的权衡。


    `NOLOCK` 背后的理念是通过减少锁的数量来提高查询性能。就 `NOLOCK` 而言，减少的锁活动是在 `SELECT` 语句上。诸如 `INSERT`、`UPDATE`
    和 `DELETE` 之类的操作不受 `NOLOCK` 影响。但是，当数据修改操作持有 `SELECT` 语句试图访问的同一张表的锁时，在 `SELECT`
    语句上使用 `NOLOCK` 可以更快地返回结果。


    通过查看一个例子，你可以了解这些观点为何是正确的。清单 [9-4](#480547_2_En_9_Chapter.xhtml#PC4) 展示了一个在显式事务中向
    `dbo.Customer` 表插入记录的查询。


    ```sql

    BEGIN TRAN

    INSERT INTO dbo.Customer

    (

    FirstName,

    LastName,

    Address,

    City,

    PostalCode,

    Country

    )

    VALUES

    (

    ''Stacy'',

    ''Parks'',

    ''123 Rua de Santa Catarina'',

    ''Porto'',

    ''1234-567'',

    ''Portugal''

    );

    ```

    清单 9-4

    向 dbo.Customer 插入记录


    在清单 [9-4](#480547_2_En_9_Chapter.xhtml#PC4) 中，已使用 `BEGIN TRAN` 启动了一个显式事务，但未指定
    `COMMIT` 或 `ROLLBACK`。这将使事务保持打开状态，并对 `dbo.Customer` 持有锁。为了模拟应用程序性能，让我们打开一个单独的查询窗口并运行一个查询，以查找在此表中创建于
    2022 年 10 月 1 日之后的所有记录。你可以在清单 [9-5](#480547_2_En_9_Chapter.xhtml#PC5) 中看到此查询的示例。


    ```sql

    SELECT FirstName, LastName, Country

    FROM dbo.Customer

    WHERE DateCreated > ''2022-10-01'';

    ```

    清单 9-5

    查询最近的客户


    由于清单 [9-4](#480547_2_En_9_Chapter.xhtml#PC4) 中的查询对 `dbo.Customer` 持有锁，该查询似乎持续运行。清单
    [9-5](#480547_2_En_9_Chapter.xhtml#PC5) 中的查询正在等待锁被释放，然后才能返回任何数据。为了更快地获得结果，你可以更改
    SQL Server 处理表上锁的方式。在清单 [9-6](#480547_2_En_9_Chapter.xhtml#PC6) 中，你修改了清单 [9-5](#480547_2_En_9_Chapter.xhtml#PC5)
    中的查询，并包含了一个查询提示 `WITH (NOLOCK)`。


    ```sql

    SELECT FirstName, LastName, Country

    FROM dbo.Customer WITH (NOLOCK)

    WHERE DateCreated > ''2022-10-01'';

    ```

    清单 9-6

    使用 NOLOCK 提示查询最近的客户


    当你在单独的查询窗口中运行清单 [9-6](#480547_2_En_9_Chapter.xhtml#PC6) 中的查询时，你几乎会立即得到结果。你可以在表
    [9-1](#480547_2_En_9_Chapter.xhtml#Tab1) 中看到这些结果的示例。


    表 9-1


    在 2022 年 10 月 1 日之后创建的客户


    | FirstName | LastName | County |

    | --- | --- | --- |

    | Myra | Acharya | India |

    | Stacy | Parks | Portugal |


    查看前面的结果，你可以看到清单 [9-4](#480547_2_En_9_Chapter.xhtml#PC4) 中插入的记录包含在结果中。但是，此记录尚未提交到
    SQL Server。你可以回滚清单 [9-4](#480547_2_En_9_Chapter.xhtml#PC4) 中的事务并撤销插入。这将导致表 [9-1](#480547_2_En_9_Chapter.xhtml#Tab1)
    的结果不准确。查询返回未完全提交到数据库的结果，这种差异被称为**脏读** (`dirty read`)。这是在查询中使用 `NOLOCK` 时的最大风险。在决定应在
    T-SQL 代码中使用 `NOLOCK` 之前，请确保业务方（包括你的最终用户）了解使用此提示的潜在风险。


    #### RECOMPILE


    除了 `NOLOCK`，另一个经常被考虑的查询提示是 `RECOMPILE`。你可能会发现自己正处理一个受参数嗅探 (`parameter sniffing`)
    影响的查询，如第 [5](#480547_2_En_5_Chapter.xhtml) 章所述。这意味着查询创建的执行计划可能对某些值表现良好，但当使用其他参数值时，性能会显著下降。可以轻松快速实施的解决方法之一是查询提示
    `RECOMPILE`。在清单 [9-7](#480547_2_En_9_Chapter.xhtml#PC7) 中，你可以看到在创建存储过程时为允许存储过程在执行时重新编译所需的额外行。


    ```sql

    /*-------------------------------------------------------------*\

    Name:             dbo.GetCustomerAndOrderNumberByProductID

    Author:           Elizabeth Noble

    Created Date:     2022-10-30

    Description:      Get customer and products ordered for an order number

    Sample Usage:

    EXECUTE dbo.GetRecipeAndIngredientByMealTypeID 1;

    \*-------------------------------------------------------------*/

    CREATE PROCEDURE dbo.GetCustomerAndOrderNumberByProductID

    @ProductID     INT

    WITH RECOMPILE

    AS

    SELECT

    cus.FirstName,

    cus.LastName,

    ord.OrderNumber,

    ord.OrderDate,

    prd.ProductName,

    SUM(dtl.QuantitySold),

    dtl.ProductPrice

    FROM dbo.Customer cus

    INNER JOIN dbo.CustomerOrder ord

    ON cus.CustomerID = ord.CustomerID

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    INNER JOIN dbo.Product prd

    ON prd.ProductID = dtl.ProductID

    WHERE prd.ProductID = @ProductID

    ORDER BY cus.FirstName, cus.LastName;

    ```

    清单 9-7

    向存储过程添加 WITH RECOMPILE


    虽然这是一个快速修复方法，但它会增加服务器上的 CPU 负载。我建议如果可能的话，尝试重新设计查询。如果不行，你可能需要更改存储过程，使其仅针对落在多数情况之外的值进行重新编译。这是为了最大限度地减少每次运行存储过程时创建新执行计划所需的资源。如果重新编译仅限于较小的数据集，那么存储过程将不需要如此频繁地生成执行计划。


    对于你的 T-SQL 编码标准，重要的是包含与编写高性能 T-SQL 相关的指导原则。你还需要包含一些规则，规定允许或不允许采取哪些操作来尝试修复性能不佳的
    T-SQL。你的 T-SQL 编码标准的最后部分是一个包罗万象的部分，通常与安全性、未来适用性和可维护性有关。


    ### T-SQL 可用性


    拥有鼓励良好数据库设计并解决性能问题的 T-SQL 编码标准是一个好的开始。然而，你还需要一些编码标准来帮助处理 T-SQL 的其他方面。其中一些包括针对潜在安全问题的
    T-SQL 编码标准。你还可以实施其他编码标准，这些标准是最佳实践，但可能不影响性能。它们可能是为了帮助即使底层数据结构发生变化也能保持你的 T-SQL 功能正常，或者为了鼓励使用有助于使你的
    T-SQL 代码更易于阅读或理解的 T-SQL 命令。


    #### 链接服务器


    链接服务器是那些可能作为编码标准一部分而被忽视的事情之一。你似乎不太可能需要使用链接服务器，但链接服务器往往在你最意想不到的时候显得必要。这就是为什么将有关如何处理链接服务器的规范作为
    T-SQL 编码标准的一部分包含在内是一个好主意。由于使用链接服务器存在普遍的安全风险，建议除非必要，否则不要使用链接服务器。我建议明确定义什么被认为是必要的。这将有助于减少争议，万一你发现自己想要实现链接服务器的话。'
  raw: '#### NOLOCK


    Best practices should also be a part of your coding standards. Some of the very
    common best practices include highly debated topics like if or when to use the
    NOLOCK hint in queries. One of the reasons I mention this specifically is that
    there are at least two very distinct groups involving NOLOCK. On the one hand,
    many database administrators view not using NOLOCK is a best practice. On the
    other hand, many developers see the use of NOLOCK is a best practice. This difference
    in perspective is based on a trade-off between data accuracy and performance.


    The idea behind NOLOCK is to improve query performance by reducing the number
    of locks. In the case of NOLOCK, the reduction in lock activity is on the SELECT
    statement. Actions such as INSERT, UPDATE, and DELETE are not affected by NOLOCK.
    However, using NOLOCK on a SELECT statement can return results more quickly when
    a data modification action is holding a lock on that same table that the SELECT
    statement is trying to access.


    You can get an idea of how these viewpoints are correct by looking at an example.
    Listing [9-4](#480547_2_En_9_Chapter.xhtml#PC4) shows a query to insert a record
    into the `dbo.Customer` table inside of an explicit transaction.


    ```

    BEGIN TRAN

    INSERT INTO dbo.Customer

    (

    FirstName,

    LastName,

    Address,

    City,

    PostalCode,

    Country

    )

    VALUES

    (

    ''Stacy'',

    ''Parks'',

    ''123 Rua de Santa Catarina'',

    ''Porto'',

    ''1234-567'',

    ''Portugal''

    );

    Listing 9-4

    Inserting a Record into dbo.Customer

    ```


    In Listing [9-4](#480547_2_En_9_Chapter.xhtml#PC4), an explicit transaction has
    been started using BEGIN TRAN, but it has not specified a COMMIT or ROLLBACK.
    This will leave the transaction open with a lock on `dbo.Customer`. To simulate
    application performance, let’s open a separate query window and run a query to
    find all records created in this table after October 1, 2022\. You can see a sample
    of this query in Listing [9-5](#480547_2_En_9_Chapter.xhtml#PC5).


    ```

    SELECT FirstName, LastName, Country

    FROM dbo.Customer

    WHERE DateCreated > ''2022-10-01'';

    Listing 9-5

    Query to Find Recent Customers

    ```


    Due to the lock on `dbo.Customer` from the query in Listing [9-4](#480547_2_En_9_Chapter.xhtml#PC4),
    it seems like the query is continuing to run. The query in Listing [9-5](#480547_2_En_9_Chapter.xhtml#PC5)
    is waiting for the locks to be released before any data can be returned. In order
    to get results more quickly, you can change how SQL Server treats the locks on
    the table. In Listing [9-6](#480547_2_En_9_Chapter.xhtml#PC6), you modify the
    query from Listing [9-5](#480547_2_En_9_Chapter.xhtml#PC5) and included a query
    hint of WITH (NOLOCK).


    ```

    SELECT FirstName, LastName, Country

    FROM dbo.Customer WITH (NOLOCK)

    WHERE DateCreated > ''2022-10-01'';

    Listing 9-6

    Query to Find Recent Customers Using NOLOCK Hint

    ```


    When you run the query in Listing [9-5](#480547_2_En_9_Chapter.xhtml#PC5) in a
    separate query window, you get nearly instantaneous results. You can see an example
    of these results in Table [9-1](#480547_2_En_9_Chapter.xhtml#Tab1).


    Table 9-1


    Customers Created After October 1, 2022


    | FirstName | LastName | County |

    | --- | --- | --- |

    | Myra | Acharya | India |

    | Stacy | Parks | Portugal |


    Looking at the preceding results, you can see that the record inserted in Listing
    [9-4](#480547_2_En_9_Chapter.xhtml#PC4) is included in the results. However, this
    record has not been committed to SQL Server. You could roll back the transaction
    from Listing [9-4](#480547_2_En_9_Chapter.xhtml#PC4) and undo the insert. This
    would cause the results from Table [9-1](#480547_2_En_9_Chapter.xhtml#Tab1) to
    be inaccurate. This discrepancy where queries return results that are not fully
    committed to the database is known as a *dirty read*. This is the largest risk
    when using NOLOCK in your queries. Before deciding that you should use NOLOCK
    in your T-SQL code, make sure that the business, including your end users, understands
    the potential risks of using this hint.


    #### RECOMPILE


    Besides NOLOCK, another possible query hint that is often considered is RECOMPILE.
    You may find yourself dealing with a query that is affected by parameter sniffing,
    as discussed in Chapter [5](#480547_2_En_5_Chapter.xhtml). This means that the
    query creates an execution plan that may perform well for some values, but when
    other parameter values are used, the performance can degrade significantly. One
    of the workarounds that can be easily and quickly implemented is the query hint
    RECOMPILE. In Listing [9-7](#480547_2_En_9_Chapter.xhtml#PC7), you can see the
    additional line needed when creating a stored procedure to allow the stored procedure
    to recompile on execution.


    ```

    /*-------------------------------------------------------------*\

    Name:             dbo.GetCustomerAndOrderNumberByProductID

    Author:           Elizabeth Noble

    Created Date:     2022-10-30

    Description:      Get customer and products ordered for an order number

    Sample Usage:

    EXECUTE dbo.GetRecipeAndIngredientByMealTypeID 1;

    \*-------------------------------------------------------------*/

    CREATE PROCEDURE dbo.GetCustomerAndOrderNumberByProductID

    @ProductID     INT

    WITH RECOMPILE

    AS

    SELECT

    cus.FirstName,

    cus.LastName,

    ord.OrderNumber,

    ord.OrderDate,

    prd.ProductName,

    SUM(dtl.QuantitySold),

    dtl.ProductPrice

    FROM dbo.Customer cus

    INNER JOIN dbo.CustomerOrder ord

    ON cus.CustomerID = ord.CustomerID

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    INNER JOIN dbo.Product prd

    ON prd.ProductID = dtl.ProductID

    WHERE prd.ProductID = @ProductID

    ORDER BY cus.FirstName, cus.LastName;

    Listing 9-7

    Adding WITH RECOMPILE to a Stored Procedure

    ```


    While this is a quick fix, it can increase the CPU load on the server. I suggest
    trying to redesign the query if possible. If not, you may need to change the stored
    procedure to only recompile for the values that fall outside of the majority.
    This is to minimize the resources needed to create a new execution plan every
    time the stored procedure is run. If the recompile is limited to a smaller set
    of data, then the store procedure will not need to generate an execution plan
    as frequently.


    For your T-SQL coding standards, it is important to include guidelines related
    to writing T-SQL that performs well. You also want to include some rules for what
    actions are or are not allowable in order to try and fix poorly performing T-SQL.
    The last part of your T-SQL coding standards is a catch-all generally related
    to security, futureproofing, and maintainability.


    ### T-SQL Usability


    Having T-SQL coding standards that encourage good database design and address
    performance issues is a good start. However, you are also going to want some coding
    standards to help with other aspects of T-SQL. Some of this includes having T-SQL
    coding standards for potential security issues. There are other coding standards
    that you can put in place that are best practices but may not affect performance.
    They may be in place either to help keep your T-SQL functioning even if the underlying
    data structure changes or to encourage T-SQL commands that help make your T-SQL
    code easier to read or understand.


    #### Linked Server


    Linked servers are one of those things that may be overlooked as part of the coding
    standards. It seems unlikely that you will need to use linked servers, but linked
    servers have a way of seeming necessary when you least expect it. This is why
    it is a good idea to include specifications about how to handle linked servers
    as part of your T-SQL coding standards. Due to the general security risks associated
    with using linked servers, it is recommended that you do not use linked servers
    unless necessary. I suggest clearly defining exactly what is considered necessary.
    This will help reduce any contention should you find yourself wanting to implement
    linked servers.'
