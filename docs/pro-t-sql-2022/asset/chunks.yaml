- fmt: "# 查询优化与执行计划分析\n\n```sql\nDECLARE @CustomerID INT = 1;\nDECLARE @CustomerOrderID\
    \ INT = 401508;\nDECLARE @ProductID INT = 1;\n-- Get all orders for a specific\
    \ customer and product\nSELECT\n    cus.CustomerID,\n    ord.CustomerOrderID,\n\
    \    prd.ProductID\nINTO #TmpOrder\nFROM dbo.Customer cus\nINNER JOIN dbo.CustomerOrder\
    \ ord\n    ON cus.CustomerID = ord.CustomerID\nINNER JOIN dbo.OrderDetail dtl\n\
    \    ON ord.CustomerOrderID = dtl.CustomerOrderID\nINNER JOIN dbo.Product prd\n\
    \    ON dtl.ProductID = prd.ProductID\nWHERE (cus.CustomerID = @CustomerID OR\
    \ @CustomerID = -1)\n    AND (ord.CustomerOrderID = @CustomerOrderID)\n    AND\
    \ (dtl.ProductID = @ProductID OR @ProductID = -1)\n    AND prd.IsActive = 1;\n\
    \nSELECT ProductID\nINTO #HistPriceCost\nFROM dbo.ProductPriceHistory\nGROUP BY\
