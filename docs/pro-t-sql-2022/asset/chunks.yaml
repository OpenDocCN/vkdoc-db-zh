    WHERE CustomerID = @Customer;

    ```


    ### Listing 11-9: 手动集成测试


    在确定应该对哪些内容进行集成测试时，请考虑与您正在编写的 T-SQL 代码相关的任何依赖关系。


    有些 T-SQL 代码比其他代码更明显地需要集成测试。最需要集成测试的场景之一涉及返回相同数据的不同数据库对象。这可以是两个不同的存储过程。集成测试也用于比较函数和存储过程之间，或视图和函数之间的结果。虽然这些数据库对象可能在结果集中返回不同的列或列的顺序不同，但可以比较相同的列。


    其他时候，您可能有一些 T-SQL 代码，其中一个数据库对象依赖于前一步骤中处理的数据。您可能有一个更新表中值的存储过程。一个视图或存储过程可能只返回特定的值子集。使用集成测试可以让您执行第一个存储过程来更新表中的查找值。根据所需的测试，您可以执行存储过程并确认记录出现。除非该记录不应再出现，否则您可以使用集成测试来确认该记录不再出现。


    这种情况常见的一个场景是，当您希望从应用程序中软删除或禁用一条数据记录时。您可以使用一组 T-SQL 来禁用该记录。然后可能有一个或多个数据库对象需要进行测试，以确认被禁用的记录不再显示。创建一种将所有集成测试场景集中管理并确保其可重复的方法，将是未来保护您应用程序的关键。现在对代码进行集成测试可以确认您当前版本的
    T-SQL 代码能够通过。然而，未来实现集成测试的自动化和重复执行，将使您能够持续验证新的错误没有被引入到您的 T-SQL 代码中。


    根据系统的设计和复杂性，您可能有在一个应用程序中输入并发送到或被另一个应用程序使用的数据。在整个业务活动中，这些数据最终可能存在于不同的数据库或不同的表中。这可能涉及您业务中数据的不同阶段。这也包括在事务型数据库和数据仓库之间使用集成测试。以这种方式使用集成测试可以确保在您的应用程序中输入的数据在迁移到数据仓库时保持一致。


    有更优雅的方法可以帮助进行集成测试。然而，我发现其中大多数方法都参考了单元测试。在集成测试中使用这些工具的唯一区别在于测试的编写方式。这意味着您可以像前面章节所示，使用
    Visual Studio 中的单元测试功能。还有其他工具可用于单元测试和集成测试，但本书不涉及这些内容。


    ## 负载测试


    使用 SQL Server 的另一个方面是快速处理大型数据集。很容易期望功能上正确的 T-SQL 代码也能表现良好。然而，情况并非总是如此。虽然您可以使用执行计划来很好地了解查询的相对性能，但这并不能保证代码在高负载下也能表现良好。如果您想了解
    T-SQL 代码在压力下的性能表现，则需要进行负载测试。


    负载测试带来了一些非常特殊的问题。一个挑战是负载测试环境和生产环境之间的硬件通常不同。除了硬件差异之外，较低级环境（如开发、测试环境）中存在的数据通常也有所不同。这可能是从较低级环境中数据量较少，到较低级环境中数据被清理过并具有不同的统计信息不等。其他差异可能包括在较低级环境中输入的数据与生产环境不匹配。在许多情况下，这些差异无法解决。


    除非您拥有完全相同的硬件和完全相同的生产数据库，否则您的负载测试无法与生产环境完全匹配。尽管如此，对您的 T-SQL 代码进行负载测试仍然是有益的。即使无法创建完美的负载测试环境，您仍然可以在负载测试环境中比较
    T-SQL 代码的相对性能。下一步是弄清楚如何实施负载测试。一个简单但不太可靠的方法是创建 T-SQL 脚本来生成虚拟负载测试数据。这种方法会让您对性能有一个大致的了解，但如果没有对现有生产数据进行大量分析，它将无法准确反映生产性能。


    有几种可用于负载测试的第三方工具，其中许多是免费的。这些工具应该使开始负载测试更简单。然而，您面临着同样的问题，即测试不能准确反映生产活动。虽然实施负载测试是开发
    T-SQL 代码时的一个重要方面，但进行负载测试所需的步骤超出了本书的范围。

    '
- fmt: '## Static Code Analysis


    创建格式化和开发T-SQL编码标准只是编写T-SQL代码的开始。在第[3](#480547_2_En_3_Chapter.xhtml)章中，我讨论了标准化你的T-SQL代码。T-SQL编码标准在第[9](#480547_2_En_9_Chapter.xhtml)章中有所涵盖。这些标准只有在被遵循时才是有用的。很多时候，标准很长且难以记住。确保这些标准被遵循，有比试图记住所有规则更好的方法。*静态代码分析*可以用来确认你的标准正在被遵循。


    如前所述，标准化你和你的同事编写T-SQL的方式是有好处的。这可以使代码更易于阅读，并节省调试T-SQL代码问题的时间。不幸的是，如果签入源代码管理的T-SQL代码不符合格式化标准，标准化的好处就无法实现。这是静态代码分析可以帮助的一种情况。


    静态代码分析允许你阻止不符合你T-SQL编码标准的代码进入生产环境。一旦你的代码被保存并签入源代码管理，你就可以在部署数据库代码之前验证其是否符合你的标准。虽然有强制执行T-SQL格式化的选项，但主要选项是一个第三方工具。


    除了将静态代码分析用于数据库代码格式化标准化之外，你还可以将其用于你的数据库编码标准。Visual Studio 2017中内置了此功能。你可以通过从“属性”菜单中选择“代码分析”选项来找到图[11-10](#480547_2_En_11_Chapter.xhtml#Fig10)中的窗口。


    ![](images/480547_2_En_11_Chapter/480547_2_En_11_Fig10_HTML.jpg)


    一张截图展示了`Pro T Q S L 2022 V S`项目的代码分析。配置被选择为活动、调试。平台被选择为活动、任何`C P U`。多条规则在复选框中被勾选。


    图 11-10


    数据库项目中的代码分析


    你可以选择在每次构建数据库项目时运行代码分析。你还可以选择哪些项目应作为代码分析的一部分包含进来。这些选项包括最佳实践和可能影响T-SQL代码性能的项目。此外，还可以选择将其中一些规则升级为错误并失败，而不是发送警告消息。


    静态代码分析的好处在于，它自动化了确保T-SQL代码符合你业务编码标准的过程。这可以让代码被拒绝的感觉不那么个人化；代码是作为整个构建过程的一部分被审查和拒绝的。构建过程也会以一致的方式传达警告或错误消息。


    将你的数据库代码纳入源代码管理只是问题的一半。真正的挑战可能出现在尝试部署仅保存在源代码管理中的数据库变更时。确定你希望如何部署代码将帮助你决定使用什么方法来保存你的T-SQL代码。从源代码管理部署T-SQL代码将在第[13](#480547_2_En_13_Chapter.xhtml)章中进一步讨论。


    ## Deployment


    在开发软件的过程中，总会有需要实现新功能的时候。关于新功能的一个普遍问题是如何以不影响当前性能的方式实现它。对于当今的许多企业来说，让应用程序全天候运行的需求至关重要。这造成了一种情况，任何形式的停机或当前功能的损失都可能极其昂贵。虽然使用的部署方法可以帮助最小化与新功能相关的整体风险，但在编写新代码时，还有其他选项可以使用。


    一个经常出现的问题与软件开发的方式与代码部署的方式之间的关联有关。在许多项目中，实现新功能所需的时间大于部署T-SQL代码的频率。确定如何管理源代码管理可以减轻其中一些风险。T-SQL代码可以通过不同的方式部署。了解这些方法以及使用它们的最佳时机将有助于改进你的数据库部署。在用户如何与数据库代码交互方面也有选择。


    ### Methodology


    每个开发环境都是不同的。在决定如何部署T-SQL代码之前，更好地了解你公司的开发处理方式会有所帮助。你需要知道你公司有多少数据库开发人员，以及有多少不同的开发团队使用SQL
    Server。另一个你想知道的因素是这些开发团队如何编写和部署代码。收集所有这些信息使你能够确定最适合你环境部署T-SQL代码的方法。


    在使用SQL Server时，与代码问题相关的风险通常比应用程序代码更大。当有多个个人访问相同的T-SQL代码时，这些风险会加剧。如果你处在一个你是唯一数据库开发人员的环境中，发生合并冲突问题的机会可能较少。如果有多个数据库开发人员或团队编写T-SQL代码，那么有不止一个人处理相同数据库代码的可能性就更大。虽然其中一些可以通过源代码管理来管理，但注意数据库代码如何部署也很重要。'
  raw: '## Static Code Analysis


    Creating standards for formatting and developing T-SQL coding standards is only
    a start when it comes to writing T-SQL code. In Chapter [3](#480547_2_En_3_Chapter.xhtml),
    I wrote about standardizing your T-SQL code. T-SQL coding standards were covered
    in Chapter [9](#480547_2_En_9_Chapter.xhtml). These standards are only useful
    if they are followed. Many times, the standards are lengthy and can be difficult
    to remember. There are better ways to ensure these standards are followed than
    trying to remember all the rules. *Static code analysis* can be used to confirm
    that your standards are being followed.


    As discussed, there are benefits to standardizing how you and your coworkers write
    T-SQL. This can make the code easier to read and save time debugging issues in
    the T-SQL code. Unfortunately, the benefits of standardization cannot be realized
    if the T-SQL code getting checked into source control does not match the formatting
    standards. This is one situation where static code analysis can help.


    Static code analysis allows you to prevent code that does not meet your T-SQL
    coding standards from ending up in Production. Once your code is saved and checked
    into source control, you can verify that the code complies with your standards
    prior to deploying the database code. There are options to enforce T-SQL formatting,
    but the main option is a third-party tool.


    In addition to using static code analysis for standardization of formatting for
    database code, you can use static code analysis for your database coding standards.
    There is built-in functionality in Visual Studio 2017\. You can find the window
    in Figure [11-10](#480547_2_En_11_Chapter.xhtml#Fig10) by selecting the Code Analysis
    option from the Properties menu.


    ![](images/480547_2_En_11_Chapter/480547_2_En_11_Fig10_HTML.jpg)


    A screenshot presents the code analysis for the Pro T Q S L 2022 V S project.
    The configuration is selected as active, debug. The platform is selected as active,
    any C P U. The several rules are ticked right in the checkboxes.


    Figure 11-10


    Code analysis in database projects


    You can select code analysis to be run every time you build the database project.
    You also have the option of selecting which items should be included as part of
    your code analysis. These options include best practices and items that can affect
    the performance of the T-SQL code. In addition, there is the option to escalate
    some of these rules to error and fail instead of sending a warning message.


    The benefit of static code analysis is that it automates the process of ensuring
    that the T-SQL code meets your business’ coding standards. This can help code
    rejections feel less personal; the code is being reviewed and rejected as part
    of the overall build process. The build process will also communicate the warning
    or error message in a consistent method.


    Getting your database code into source control is only half of the issue. The
    real challenge can come when trying to deploy database changes that are only saved
    in source control. Determining how you want to deploy your code will help you
    determine what method to use to save your T-SQL code. Deploying T-SQL code from
    source control will be discussed further in Chapter [13](#480547_2_En_13_Chapter.xhtml).


    # 12. Deployment


    Throughout the course of developing software, there will come a time when you
    need to implement new functionality. One of the prevailing issues with new functionality
    is implementing that functionality in a manner that does not affect current performance.
    For many businesses today, the need to have applications up and running 24 hours
    per day is critical. This creates a scenario where any form of downtime or loss
    in current functionality can be incredibly expensive. While the deployment method
    used can help minimize the overall risk associated with new functionality, there
    are other options that can be used when writing new code.


    A frequent issue that comes up is related to how software is developed in correlation
    with how code is deployed. In many projects, the amount of time needed to implement
    new functionality is greater than the frequency at which T-SQL code is deployed.
    Determining how source control is managed can mitigate some of these risks. There
    are different ways T-SQL code can be deployed. Understanding these methods and
    the best times to use them will help improve your database deployments. There
    are also options when it comes to how your users interact with the database code.


    ## Methodology


    Each development environment is different. Before deciding how to deploy T-SQL
    code, it helps to get a better understanding of how development is handled at
    your company. You want to know how many database developers are at your company
    and how many different development teams use SQL Server. Another factor you want
    to know is how these development teams write and deploy code. Collecting all this
    information enables you to determine the best method to deploy T-SQL code for
    your environment.


    When working with SQL Server, the risks associated with code issues can often
    be larger than with application code. These risks are compounded when there are
    multiple individuals accessing the same T-SQL code. If you are in an environment
    where you are the only database developer, there may be less of a chance of having
    issues with merge conflicts. If there are multiple database developers or teams
    writing T-SQL code, there is more of a chance of having more than one person working
    on the same database code. While some of this can be managed through source control,
    it is also important to be mindful of how database code is deployed.'
