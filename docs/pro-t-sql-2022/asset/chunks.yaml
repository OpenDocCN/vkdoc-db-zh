    | Josè | Gomez | 790 Calle Cinco de Mayo | Cancun | 53778 | Mexico |

    | Stacy | Parks | 123 Rua de Santa Catarina | Porto | 1234-567 | Portugal |


    Using an EXCEPT statement may not be the preferred method to exclude results from
    a data set, but it is the method that I am more accustomed to using. Therein lies
    the benefits and challenges of T-SQL code: for almost any scenario there is almost
    certainly more than one way to write T-SQL code. The reason you are writing the
    database code will determine the level of flexibility you have in writing your
    code. If you are executing a query for a single time, you may be able to use a
    less efficient method to access this data. However, if you are writing your code
    for an application, you want to balance writing T-SQL code that is readable and
    improves the speed at which the data is returned.


