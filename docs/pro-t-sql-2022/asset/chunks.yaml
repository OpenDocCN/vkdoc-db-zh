    ## 部署


    在开发软件的过程中，总会有需要实现新功能的时候。关于新功能的一个普遍问题是如何以不影响当前性能的方式实现它。对于当今的许多企业来说，让应用程序全天候运行的需求至关重要。这造成了一种情况，任何形式的停机或当前功能的损失都可能极其昂贵。虽然使用的部署方法可以帮助最小化与新功能相关的整体风险，但在编写新代码时，还有其他选项可以使用。


