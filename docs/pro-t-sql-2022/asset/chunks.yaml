    实施源代码控制是让数据库项目更易于管理的重要一步。在您的公司内部推动一项源代码控制倡议。主动联系其他部门，建立流程，确保每个人都能舒适地实施源代码控制。您也已经了解了将数据库添加到源代码控制的初始步骤。这是一段旅程的开始，途中可能会遇到一些小波折，但从长远来看能为您节省时间。既然您已经实施了源代码控制，就为管理
    T-SQL 代码的下一步做好了准备。下一章将重点介绍可用于测试 T-SQL 代码并确认您是否符合各种编码标准的多种方法。


    # 第 11 章：测试


    当您需要编写或修改一些 T-SQL 代码时，您可能会忍不住直接开始写代码。在许多情况下，必要的数据库代码足够简单，无需进行额外分析。但最终，所查询的数据或
    T-SQL 代码会变得足够复杂，以至于您希望确保自己的代码能按预期工作。在这些时候，您可能需要测试您的 T-SQL 变更。虽然您可以随时开始测试 T-SQL
    代码，但在处理复杂场景之前，尽早养成某些习惯可能会对您有所帮助。


    您可能已经准备好开始测试代码，但不知道从哪里开始。您将进行的测试类型取决于您想要实现的目标。您可以实施测试以确认单个功能是否按预期工作。也可以测试两个或多个代码段之间的交互。这种类型的测试在尝试确认对
    T-SQL 代码进行变更所产生的下游影响时也很有用。您还可以测试以确保您编写的代码符合编码标准。虽然任何类型的测试都很有价值，但最显著的好处来自于将这三者结合起来使用。


    ## 单元测试


    您接到了下一个任务，并准备开始编写一些 T-SQL。您还希望对代码实施功能性测试。当您测试单个代码段时，这被称为 `单元测试`。了解什么是单元测试以及为什么应该使用它们，可以帮助提高您的
    T-SQL 代码质量。单元测试非常有益，因为它能让您快速、轻松地验证 T-SQL 代码的准确性。让我们开始为 SQL Server 编写您的第一个单元测试。本节将介绍创建第一个单元测试的过程。这包括设计测试用例、编写单元测试、确认单元测试是否正常工作，以及更新您的代码以使单元测试产生正确的结果。


    单元测试的概念很简单。您想要对 T-SQL 代码进行单个变更。单元测试允许您测试并确认单个代码段的功能。使用单元测试的一种常见方法是创建一个会失败的测试用例，例如在执行
    `dbo.GetCustomer` 时，期望非活跃客户的数量为零。这将会失败，因为该存储过程当前的代码选择了所有客户。然后您编写 T-SQL 代码，运行单元测试，并重复此过程直到单元测试通过。这就是
    `测试驱动设计`。无论您是在实现新功能还是在解决 T-SQL 中的错误，单元测试都能帮助验证您的代码。


    创建单元测试时，您需要与通常着手编写 T-SQL 代码时不同的思考方式。您创建单元测试是为了确认您正在编写的代码能按预期工作。为了验证您的 T-SQL 代码是否按预期工作，您希望您的单元测试显示通过。在创建单元测试时，您第一次执行它应该失败。从一个失败的单元测试开始，表明期望的功能尚不存在。


    运行单元测试有许多不同的实现方式。单元测试可以在 `Visual Studio` 内部编写。您也可以使用免费的第三方单元测试框架，该框架在 T-SQL 中创建数据库对象。另一个选项是使用付费的第三方工具来创建和运行您的单元测试。每种选择都有其优缺点。


    决定如何实施单元测试的另一个因素在于您希望如何运行测试。如果您还没有机会开发一种自动化的方法来管理代码和部署，您可能会决定更喜欢手动运行单元测试。但是，如果您有一个自动化的构建和部署流水线，您可能会发现自动化单元测试更容易。开销最小、最简单的方法是手动运行单元测试。这可以通过存储过程或图形用户界面来执行。


    您可以使用单元测试来验证数据库架构的几乎所有内容。这些单元测试大多是用于测试数据库对象（如存储过程、视图和函数）的功能性。我可能有偏见，但我希望您的存储过程数量远多于视图或查询。如果您现在还没有任何单元测试，请不要担心。您可以在需要时创建单元测试。这可能意味着您的单元测试没有完全的代码覆盖率，但它可以防止您花费时间去实现那些不经常修改的代码的单元测试。

    '
- fmt: '在编写第一个单元测试之前，你需要了解将要开发的功能。现在让我们修改存储过程 `dbo.GetCustomer`，使其仅显示处于活动状态的客户。当我最初开始对
    T-SQL 代码进行单元测试时，我会手动运行测试。在这个例子中，让我们查找当前非活动的客户。你可以创建一个单元测试来检查非活动记录。如果你的单元测试发现任何非活动记录，它将失败。如果你的单元测试没有发现任何非活动记录，它将成功或通过。让我们运行如清单
    [11-1](#480547_2_En_11_Chapter.xhtml#PC1) 所示的查询来查找任何非活动的客户。


    ```sql

    SELECT CustomerID,

    FirstName,

    LastName,

    IsActive

    FROM dbo.Customer

    WHERE IsActive = 0;

    ```

    **清单 11-1**

    查找非活动客户


    运行此查询时，你可能会得到如表 [11-1](#480547_2_En_11_Chapter.xhtml#Tab1) 所示的结果。


    **表 11-1**

    非活动客户


    | CustomerID | FirstName | LastName | IsActive |

    | --- | --- | --- | --- |

    | 12 | Selena | Tiesto | False |

    | 27 | Ian | West | False |


    一旦你获得了表 [11-1](#480547_2_En_11_Chapter.xhtml#Tab1) 中的结果，你就知道哪些记录会受到 `dbo.GetCustomer`
    更改的影响，以返回活动客户而非所有客户。未修改的存储过程如清单 [11-2](#480547_2_En_11_Chapter.xhtml#PC2) 所示。


    ```sql

    /*-------------------------------------------------------------*\

    Name:             dbo.GetCustomer

    Author:           Elizabeth Noble

    Created Date:     2022-10-30

    Description:      Get a list of all customers in the databases

    Sample Usage:

    EXECUTE dbo.GetCustomer;

    \*-------------------------------------------------------------*/

    CREATE OR ALTER PROCEDURE dbo.GetCustomer

    AS

    SELECT

    CustomerID,

    FirstName,

    LastName,

    Address,

    City,

    PostalCode,

    Country,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Customer;

    ```

    **清单 11-2**

    原始存储过程


    执行此存储过程时，你期望看到表中的所有客户都被返回。执行此存储过程后，你得到的记录如表 [11-2](#480547_2_En_11_Chapter.xhtml#Tab2)
    所示。


    **表 11-2**

    所有客户示例


    | CustomerID | FirstName | LastName | IsActive |

    | --- | --- | --- | --- |

    | 1 | Myra | Acharya | True |

    | 2 | Jose | Gomez | True |

    | 12 | Selena | Tiesto | False |

    | 27 | Ian | West | False |

    | 401409 | Stacy | Alexander | True |

    | 401407 | Karim | Khalil | True |

    | 401405 | Marty` | Bethel | True |


    你可以在表 [11-2](#480547_2_En_11_Chapter.xhtml#Tab2) 中看到，执行存储过程时，活动和非活动客户都被返回了。这样，你就创建了一个基本的单元测试（清单
    [11-1](#480547_2_En_11_Chapter.xhtml#PC1) 中的查询），并确认当运行清单 [11-2](#480547_2_En_11_Chapter.xhtml#PC2)
    中的存储过程时，由于非活动记录也包含在结果集中，该测试失败了。


    下一步是找出如何让单元测试通过。对于此示例，更改很简单。让我们在存储过程的末尾添加一行，只返回活动客户，如清单 [11-3](#480547_2_En_11_Chapter.xhtml#PC3)
    所示。


    ```sql

    /*-------------------------------------------------------------*\

    Name:             dbo.GetCustomer

    Author:           Elizabeth Noble

    Created Date:     2022-10-30

    Description:      Get a list of all active customers in the databases

    Sample Usage:

    EXECUTE dbo.GetCustomer;

    \*-------------------------------------------------------------*/

    CREATE OR ALTER PROCEDURE dbo.GetCustomer

    AS

    SELECT

    CustomerID,

    FirstName,

    LastName,

    Address,

    City,

    PostalCode,

    Country,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Customer

    WHERE IsActive = 1;

    ```

    **清单 11-3**

    修改后的存储过程


    创建此存储过程后，你可以执行它以确认新功能是否按预期工作。在这种情况下，你希望验证 CustomerID 2 和 5 不再被返回。根据前面的代码，你期望清单
    [11-3](#480547_2_En_11_Chapter.xhtml#PC3) 的结果集与表 [11-3](#480547_2_En_11_Chapter.xhtml#Tab3)
    所示的内容匹配。


    **表 11-3**

    活动客户示例


    | CustomerID | FirstName | LastName | IsActive |

    | --- | --- | --- | --- |

    | 1 | Myra | Acharya | True |

    | 2 | Jose | Gomez | True |

    | 401409 | Stacy | Alexander | True |

    | 401407 | Karim | Khalil | True |

    | 401405 | Marty` | Bethel | True |


    你已经确认，对清单 [11-3](#480547_2_En_11_Chapter.xhtml#PC3) 所做的更改已正确地从结果集中移除了非活动客户。这就是
    T-SQL 代码通常的测试方式。在更改前后执行并比较结果是测试代码更改的有效方法，但这需要付出可重复性的代价。构建一组单元测试集合可以让你在每次部署时重新测试更改，以确保功能不会从一个软件版本到下一个版本丢失。


    这种测试代码的方法是一个很好的起点，但可能难以始终如一地遵循。你可能有一些可以存储不同状态数据的表。例如，如果你想查找有关促销产品订单频率的信息，测试结果的逻辑会变得更加复杂。这就是使用第三方工具可能有所帮助的地方。


    为你的数据寻找单独的示例集可能既耗时又容易出错。此外，你可能会花更多时间尝试找到正确的测试用例，而不是编写或测试 T-SQL 代码。另一个挑战是，由于手动在数据库中查找已有的测试数据需要花费时间和精力，你可能会跳过重要的测试用例。然而，使用
    T-SQL 在你的数据中查找特定的测试用例并不是你唯一的选择。你可以手动插入测试数据并对你插入的记录执行测试。这种方法允许你为正在测试的代码确定最佳场景。在大多数情况下，这些示例数据不会集中保存。你可能仍然需要在每次测试新功能时重写特定的示例。


    有不同类型的单元测试工具可供你使用。单元测试可以通过向数据库添加额外的 T-SQL 对象来处理。另一个选择是付费购买可以帮助管理单元测试的第三方工具。另一个选项是使用
    Visual Studio 来创建和管理单元测试。虽然所有这些选项都是有效的并且各有其优点，但我想重点介绍通过 Visual Studio 原生创建单元测试可以完成什么。图
    [11-1](#480547_2_En_11_Chapter.xhtml#Fig1) 展示了在 Visual Studio 中创建单元测试的第一步。


    ![](images/480547_2_En_11_Chapter/480547_2_En_11_Fig1_HTML.jpg)


    **图 11-1**

    创建单元测试


    选择创建单元测试的选项后，Visual Studio 将引导你完成创建第一个单元测试的过程。图 [11-2](#480547_2_En_11_Chapter.xhtml#Fig2)
    中的对话框将会打开。


    ![](images/480547_2_En_11_Chapter/480547_2_En_11_Fig2_HTML.jpg)


    **图 11-2**

    “创建单元测试”对话框'
  raw: 'Before you write your first unit test, you need to know what functionality
    you will be developing. Let’s change the stored procedure `dbo.GetCustomer` to
    only display customers that are active. When I first started unit testing my T-SQL
    code, I would run my unit tests manually. In this case, let’s look for customers
    that are currently not active. You can create a unit test to check for inactive
    records. If your unit test finds any inactive records, it will fail. If your unit
    test does not find any inactive records, it will succeed or pass. Let’s run the
    query shown in Listing [11-1](#480547_2_En_11_Chapter.xhtml#PC1) to find any customers
    that are not active.


    ```

    SELECT CustomerID,

    FirstName,

    LastName,

    IsActive

    FROM dbo.Customer

    WHERE IsActive = 0;

    Listing 11-1

    Finding Inactive Customers

    ```


    When running this query, you may get the results displayed in Table [11-1](#480547_2_En_11_Chapter.xhtml#Tab1).


    Table 11-1


    Inactive Customers


    | CustomerID | FirstName | LastName | IsActive |

    | --- | --- | --- | --- |

    | 12 | Selena | Tiesto | False |

    | 27 | Ian | West | False |


    Once you get the results in Table [11-1](#480547_2_En_11_Chapter.xhtml#Tab1),
    you know what records will be affected by `dbo.GetCustomer` changing to pull back
    active customers instead of all customers. The unmodified stored procedure is
    shown in Listing [11-2](#480547_2_En_11_Chapter.xhtml#PC2).


    ```

    /*-------------------------------------------------------------*\

    Name:             dbo.GetCustomer

    Author:           Elizabeth Noble

    Created Date:     2022-10-30

    Description:      Get a list of all customers in the databases

    Sample Usage:

    EXECUTE dbo.GetCustomer;

    \*-------------------------------------------------------------*/

    CREATE OR ALTER PROCEDURE dbo.GetCustomer

    AS

    SELECT

    CustomerID,

    FirstName,

    LastName,

    Address,

    City,

    PostalCode,

    Country,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Customer;

    Listing 11-2

    Original Stored Procedure

    ```


    When executing this stored procedure, you expect to see all customers in the table
    being returned. After executing this stored procedure, you get the records shown
    in Table [11-2](#480547_2_En_11_Chapter.xhtml#Tab2).


    Table 11-2


    Sample of All Customers


    | CustomerID | FirstName | LastName | IsActive |

    | --- | --- | --- | --- |

    | 1 | Myra | Acharya | True |

    | 2 | Jose | Gomez | True |

    | 12 | Selena | Tiesto | False |

    | 27 | Ian | West | False |

    | 401409 | Stacy | Alexander | True |

    | 401407 | Karim | Khalil | True |

    | 401405 | Marty` | Bethel | True |


    You can see in Table [11-2](#480547_2_En_11_Chapter.xhtml#Tab2) that both active
    and inactive customers are returned when executing the stored procedure. In this
    way, you have created a basic unit test, the query in Listing [11-1](#480547_2_En_11_Chapter.xhtml#PC1),
    and confirmed that this test failed when running the stored procedure in Listing
    [11-2](#480547_2_En_11_Chapter.xhtml#PC2) since the inactive records were also
    returned with the result set.


    The next step is to figure out how to get the unit test to pass. For this example,
    the change is simple. Let’s add a line at the end of the stored procedure where
    only active customers are returned, as shown in Listing [11-3](#480547_2_En_11_Chapter.xhtml#PC3).


    ```

    /*-------------------------------------------------------------*\

    Name:             dbo.GetCustomer

    Author:           Elizabeth Noble

    Created Date:     2022-10-30

    Description:      Get a list of all active customers in the databases

    Sample Usage:

    EXECUTE dbo.GetCustomer;

    \*-------------------------------------------------------------*/

    CREATE OR ALTER PROCEDURE dbo.GetCustomer

    AS

    SELECT

    CustomerID,

    FirstName,

    LastName,

    Address,

    City,

    PostalCode,

    Country,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Customer

    WHERE IsActive = 1;

    Listing 11-3

    Stored Procedure After Modification

    ```


    Once this stored procedure has been created, you can execute it to confirm that
    the new functionality is working as expected. In this case, you want to verify
    that CustomerIDs 2 and 5 are no longer being returned. Based on the preceding
    code, you expect the result set from Listing [11-3](#480547_2_En_11_Chapter.xhtml#PC3)
    to match what is shown in Table [11-3](#480547_2_En_11_Chapter.xhtml#Tab3).


    Table 11-3


    Sample Active Customers


    | CustomerID | FirstName | LastName | IsActive |

    | --- | --- | --- | --- |

    | 1 | Myra | Acharya | True |

    | 2 | Jose | Gomez | True |

    | 401409 | Stacy | Alexander | True |

    | 401407 | Karim | Khalil | True |

    | 401405 | Marty` | Bethel | True |


    You have confirmed that the changes you made to Listing [11-3](#480547_2_En_11_Chapter.xhtml#PC3)
    have correctly removed the inactive customers from the result set. This is how
    T-SQL code is commonly tested. Executing and comparing results before and after
    a change is a valid way to test code changes, but it comes at the cost of repeatability.
    Building a collection of unit tests allows you to retest changes in each deployment
    to ensure that functionality is not lost from one software release to the next.


    This method of testing your code is a good place to start, but it can be difficult
    to follow consistently. You may have some tables that can store data in various
    states. For instance, if you want to find the information about the frequency
    of orders for an on-sale product, the logic to test the results gets more complex.
    This is where using third-party tools can be helpful.


    Finding individual sample sets for your data can be time consuming and error prone.
    In addition, you may spend more time trying to find the right test case rather
    than writing or testing the T-SQL code. Another challenge is that you may skip
    over important test cases due to the time and energy spent manually finding test
    data that already exists in the database. However, using T-SQL to find specific
    test cases in your data is not your only option. You can manually insert test
    data and perform your tests on the records that have been inserted. This method
    allows you to determine the best scenarios for the code you are testing. In most
    cases, this sample data will not remain in a centralized location. You may still
    need to rewrite specific examples each time you test a new piece of functionality.


    There are different types of unit testing tools available to you. Unit testing
    can be handled by adding additional T-SQL objects to your database. Another option
    is to pay for third-party tools that can help manage your unit tests. Another
    option is to use Visual Studio to create and manage unit tests. While all these
    options are valid and have their own benefits, I want to focus on what you can
    accomplish by creating unit tests natively in Visual Studio. Figure [11-1](#480547_2_En_11_Chapter.xhtml#Fig1)
    shows the first step to create a unit test in Visual Studio.


    ![](images/480547_2_En_11_Chapter/480547_2_En_11_Fig1_HTML.jpg)


    A screenshot of a solution explorer. A create unit test option is highlighted
    in a submenu.


    Figure 11-1


    Creating a unit test


    Once you select the option to create a unit test, Visual Studio will walk you
    through the process of creating your first unit test. The dialog box in Figure
    [11-2](#480547_2_En_11_Chapter.xhtml#Fig2) will open.


    ![](images/480547_2_En_11_Chapter/480547_2_En_11_Fig2_HTML.jpg)


    A screenshot of a create unit test window. The stored procedures are presented
    for the current selection Pro T Q S L 2022 V S. The details of the output project,
    and output class are also visible. The OK button at the bottom is highlighted.


    Figure 11-2


    The Create Unit Test dialog box'
  trans: '在编写第一个单元测试之前，你需要了解将要开发的功能。现在让我们修改存储过程 `dbo.GetCustomer`，使其仅显示处于活动状态的客户。当我最初开始对
    T-SQL 代码进行单元测试时，我会手动运行测试。在这个例子中，让我们查找当前非活动的客户。你可以创建一个单元测试来检查非活动记录。如果你的单元测试发现任何非活动记录，它将失败。如果你的单元测试没有发现任何非活动记录，它将成功或通过。让我们运行如清单
    11-1 所示的查询来查找任何非活动的客户。


    ```sql

    SELECT CustomerID,

    FirstName,

    LastName,

    IsActive

    FROM dbo.Customer

    WHERE IsActive = 0;

    ```

    **清单 11-1**

    查找非活动客户


