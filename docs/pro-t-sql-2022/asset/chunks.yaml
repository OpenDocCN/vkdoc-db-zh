  trans: '## 为何要使用编码标准


    你可以采取多种不同的方法来提升代码质量。在改进代码质量时，你需要思考最终目标。我希望我的 `T-SQL` 代码能够高效运行、便于快速调试并且易于理解。这通常是通过在设计和编写
    `T-SQL` 代码时建立一致性而实现的结果。其中一个选择就是实施编码标准。


    通常，有些特定的 `T-SQL` 实践是明确希望大家遵循的。其中一些行为很容易达成共识，并且大多数人默认就在使用。然而，也可能存在其他一些 `T-SQL`
    最佳实践，你知道它们在普遍情况下或在你的组织中并不常见。你希望创建一套指导方针，让每个人都能轻松知晓他们应该做什么。


    还有一些情况，无论出于何种原因，你都不希望在 `T-SQL` 代码中看到。同样，其中有些主题并不常见，但另一些可能也普遍存在。无论哪种情况，你都需要将这些明确界定为编码标准的一部分。使用编码标准可以最大限度地减少关于哪些类型的
    `T-SQL` 代码是被允许的、或者哪些代码优于其他代码的来回争论。


    你可以使用编码标准来设定允许和不被允许的边界。我遇到过这样的情况：软件工程师或数据库开发人员希望使用特定的 `T-SQL` 写法，因为它更易于阅读和编写。然而，有时对人类来说很容易理解的
    `T-SQL` 代码，在 `SQL Server` 上的性能表现却并不理想。虽然我希望这些同事能随时来找我咨询当前流程相关的问题，但有时我有太多更高优先级的请求，没有时间处理他们的关切。


    在缺乏标准导致冲突之前，能就这些指导方针达成一致是件好事。这也应该能提供一些保证，表明每个主题都已讨论过，且多方已达成共识：某些 `T-SQL` 代码在许多场景下表现良好，或者可能具有导致性能问题的高风险。


    我知道当我开始工作时，我的一天已经排满了。这不仅来自我知道需要做的事情，也来自最后一刻的请求和零散的问题。实施编码标准的真正目标是让你的生活更轻松。这包括能够安心休息，因为知道你的数据库中运行着高质量的
    `T-SQL` 代码。理想情况下，你应该能够将那些时间用于未来的数据库设计改进或消除技术债务。


    影响我们生活的另一个因素是决策疲劳。这个概念指的是一个人在一天中不得不做出一个又一个决定，从而感到精疲力竭。随着技术的出现，我们每天都经历着这种疲劳。当涉及到关于
    `T-SQL` 编码的决策时，这种决策疲劳可能更加令人不堪重负。在 `SQL Server` 中，有很多方法可以实现相同的功能。实施 `T-SQL` 编码标准的另一个优势是，它可以最大限度地减少数据库开发人员在编写新代码时需要做出的决策。


    当你首次实施编码标准时，务必获得所有相关方的认同。在许多情况下，你可能无法达成一致意见。如果可能的话，为你希望纳入编码标准的任何变更争取多数票。另一种方法是，确保在最终标准获得批准和实施之前，每个个体都同意这些标准。


    在工作场所中，`T-SQL` 面临的主要挑战之一是，许多负责编写 `T-SQL` 的人并非数据库专家。这可能导致挫败感，也可能导致查询性能不佳。`T-SQL`
    最令人喜爱也最难掌握的方面之一，就是编写第一个查询是多么容易。`SQL` 是结构化查询语言的缩写，查询的编写就是如此简单。你几乎可以像读句子一样阅读它们。


    然而，这可能给人一种错误的印象，认为 `SQL Server` 在后台处理的事情同样简单。我们大多数人工作在一个高压力、快节奏的环境中。这通常意味着我们没有时间停下来解释我们做出的每一个决定。这可能包括为何不应该使用某些
    `T-SQL` 代码。这正是 `T-SQL` 编码标准的优势真正显现的地方。它允许你只进行一次对话来设定基本规则。在这些规则或标准到位之后，只要符合预定义的标准，`T-SQL`
    开发人员和工程师就可以用他们想要的任何方式编写代码。


    我听过软件开发人员说，在编写应用程序时拥有明确的编码标准会非常有帮助。这让他们能够轻松地跳入任何代码，无论是不是他们写的，并立刻感到适应。这是因为，尽管他们可能知道自己从未看过这套代码，但他们的大脑已经看到了与他们编写过的其他代码的相似之处。它消除了那种“正在看的代码不是自己的”的瞬间反应。好处在于，他们可以立即着手审查代码或进行必要的修改。


    既然你已经决定要定义编码标准，下一步就是实施这些编码标准。事情在这里可能会变得棘手。你会很想让每一个经过 `脚本审查` 的 `存储过程` 都遵循这些标准。然而，你将看到的一些代码已经在生产环境中运行了。我发现有些时候，特别是当其他人面临严格的截止日期时，仅仅因为不遵循编码标准就拒绝一个
    `存储过程` 会令人特别沮丧。


    一个可能的折中方案是给予有条件的批准，并请求创建一个新的 `用户故事`，以便将 `T-SQL` 代码更新以符合新的编码标准。这既让开发者放心，他们可以满足当前
    `冲刺阶段` 的截止日期，也让你知道这个 `T-SQL` 代码应该在未来的版本中进行更正以满足编码标准。


    处理这些新的 `用户故事` 项的一个简单方法是将它们添加到下一个 `冲刺阶段`。这使得它们可以在你仍记得需要更改什么的时候得到清理。这也确保了执行 `脚本审查`
    的其他人知道，让所有 `T-SQL` 代码符合编码标准这项工作对所有相关方都很重要。


    ## 编码标准应包含什么


    理想情况下，制定编码标准将为你提供一个框架，能最大限度地减少你在审查和部署 `T-SQL` 代码时遇到的整体挑战。你希望编码标准涵盖 `T-SQL` 代码应有的外观、应有的功能、应有的性能表现以及应有的可理解性。


    编码标准的一些基础知识已经在第 4 章讨论过。这包括通过创建关于如何编写 `T-SQL` 的标准来格式化 `T-SQL` 代码。你还会需要指示如何命名 `T-SQL`
    数据库对象的标准。制定关于 `T-SQL` 代码应如何注释的标准也很有用。


    ### T-SQL 设计


    你也可以通过编码标准来定义数据库设计。这可以包括数据库对象（包括架构）应如何组织。编码标准还可以指出数据应如何存储在数据库中。你可以指明哪些类型的列应包含在主键中。同样，也可以指明表应如何进行聚簇，或者何时最好使用聚簇索引或非聚簇索引。'
- fmt: '#### ANSI STANDARD


    One consideration is whether to keep your T-SQL code in compliance with ANSI standards.
    While SQL Server has some functionality that can be used, not all of this functionality
    is compliant with ANSI standards. In many cases, the SQL Server-specific commands
    and functions can be rewritten using ANSI standard code. Making sure you write
    your T-SQL code as ANSI standard allows you to easily move to another relational
    database management system that is also ANSI standard-compliant.


    #### Normal Form


    While covering T-SQL coding standards, you may also want to define design elements.
    This includes what and how data should be grouped together in tables and what
    information should be in those tables. There are various levels of normal forms,
    and you can use your T-SQL coding standards to indicate what those are. There
    are various types of database normalization that are commonly discussed. These
    include first normal form (1NF), second normal form (2NF), third normal form (3NF),
    and fourth normal form (4NF).


    Each type of normal form builds on the one before it. The lowest-level normal
    form is the first normal form. This includes requiring that each table has a primary
    key and that each field or column only holds a single value.


    #### Table Size


    When creating tables, it is tempting to want to put all columns related to a specific
    item into the same table. This can cause tables to have many, many columns. One
    of the challenges of having a table with a significant number of columns is how
    the data is stored. This can ultimately lead to performance issues. It is possible
    to design your tables to prevent this kind of issue by analyzing the types of
    information you are storing and creating tables made up of subgroups of information.
    For instance, I may want to record everything about a product in the same table
    including all information about the manufacturer, product details, and sales price.
    However, it would be better to create one table for vendor information and one
    table for product information. This is in line with following best practices for
    database normalization. In addition, properly designed tables make the overall
    database design more adaptable as applications change over time.


    #### Name Value Pair


    When working with SQL Server, the goal is to think about set-based actions. Keeping
    this is mind, you want to be careful designing tables. You want to make sure that
    you minimize the number of columns to keep the table width small. You want to
    consider what kinds of columns are valuable. If you are using one column to define
    the value type and another column to define the actual value, you have designed
    a name-value pair relationship.


    This type of design may be easier to understand and create simpler tables, but
    this design does not embrace the benefits of using SQL Server. When using name-value
    pairs, it becomes increasingly difficult to use indexes. Therefore, SQL Server
    need to look through more data to pull back the necessary values.


    #### Primary Key


    When creating and designing tables, think about what type of data will be stored.
    This not only has to do with how the data is ordered but also the table’s relationship
    to other tables. In many cases, it is ideal to require primary keys as part of
    your coding standards. While a primary key is not required in all scenarios, it
    should help clarify what fields are used to define relationships to other tables.


    #### Foreign Key


    SQL Server is a relational database management system, and one of the main benefits
    of SQL Server is the relationships between tables. However, you need to specify
    the relationships between tables so that SQL Server can ensure that valid data
    is saved across the tables. When this happens, SQL Server checks the relationship
    between the table storing the values and the referencing table. SQL Server does
    this using a foreign key. Because SQL Server knows that it can trust the relationship,
    it can often filter out data more efficiently and find data faster. Therefore,
    it may be a good idea to specify that foreign key relationships are part of your
    T-SQL coding standards.


    #### Non-Clustered Index


    I have found that non-clustered indexes are a more highly debated topic than I
    would have ever expected. One of the challenges of using non-clustered indexes
    is that there is a cost associated with recording the data as part of the index
    or updating the index as the values change. However, SQL Server uses indexes to
    quickly find the data referenced by various queries. Make sure that the benefit
    of using non-clustered indexes outweighs the cost.


    One of the ways that you can do this is to make sure that you properly define
    your indexes. Due to the cost associated with maintaining indexes, you want to
    make certain that any index you create is regularly being used by the available
    queries. You may also want to define how to determine which columns should be
    part of the index and which columns should be pulled back as part of the index.


    #### Constraint Definition


    Your tables can have one or more columns. Each of these columns holds some type
    of information. When it comes to that information, you may know that only certain
    values can be stored in that column. Using foreign keys can keep the data integrity
    in some situations, but there are other times when it may not make sense to use
    a foreign key. In these cases, you can specify a constraint on the record. The
    constraint can limit what type of information can be stored in those columns.


    However, forcing SQL Server to manage those constraints puts an extra load on
    SQL Server. So, you may want to consider minimizing the use of constraints to
    limit what type of data can be stored in the database and rely on the application
    code to provide good data. Another use of constraints is to specify default values
    for certain fields. This can happen for columns where you know the most likely
    value that will exist when a record is created. For instance, you may want to
    specify a default value of True for an `IsActive` column as most records created
    will be active at the time they are created. Once again, this can be handled by
    the application, but you may also decide to enforce this as part of your T-SQL
    coding standards.


    It is important to consider T-SQL coding standards that encourage good design
    practices. This includes determining how closely you will adhere to ANSI standards.
    There are other topics to include such as choosing the minimum normal form allowed
    as part of your database design. This decision may affect other aspects of your
    T-SQL design including primary keys, foreign keys, and non-clustered indexes.
    You may also consider how you want to handle constraints. Once you have determined
    the T-SQL coding standards you want to enforce for good T-SQL design practices,
    you may want to decide what coding standards are needed with regard to the overall
    performance of T-SQL.


    ### T-SQL Performance


    After determining the T-SQL coding standards related to database design and implementation,
    you want to determine what standards you need to help minimize and address any
    performance issues that may come up. This includes creating T-SQL coding standards
    that help make sure SQL Server does not get bogged down with unnecessary information.
    You also want to consider how T-SQL code needs to be written to minimize performance
    overhead.'
  raw: '#### ANSI STANDARD


    One consideration is whether to keep your T-SQL code in compliance with ANSI standards.
    While SQL Server has some functionality that can be used, not all of this functionality
    is compliant with ANSI standards. In many cases, the SQL Server-specific commands
    and functions can be rewritten using ANSI standard code. Making sure you write
    your T-SQL code as ANSI standard allows you to easily move to another relational
    database management system that is also ANSI standard-compliant.


    #### Normal Form


    While covering T-SQL coding standards, you may also want to define design elements.
    This includes what and how data should be grouped together in tables and what
    information should be in those tables. There are various levels of normal forms,
    and you can use your T-SQL coding standards to indicate what those are. There
    are various types of database normalization that are commonly discussed. These
    include first normal form (1NF), second normal form (2NF), third normal form (3NF),
    and fourth normal form (4NF).


    Each type of normal form builds on the one before it. The lowest-level normal
    form is the first normal form. This includes requiring that each table has a primary
    key and that each field or column only holds a single value.


    #### Table Size


    When creating tables, it is tempting to want to put all columns related to a specific
    item into the same table. This can cause tables to have many, many columns. One
    of the challenges of having a table with a significant number of columns is how
    the data is stored. This can ultimately lead to performance issues. It is possible
    to design your tables to prevent this kind of issue by analyzing the types of
    information you are storing and creating tables made up of subgroups of information.
    For instance, I may want to record everything about a product in the same table
    including all information about the manufacturer, product details, and sales price.
    However, it would be better to create one table for vendor information and one
    table for product information. This is in line with following best practices for
    database normalization. In addition, properly designed tables make the overall
    database design more adaptable as applications change over time.


    #### Name Value Pair


    When working with SQL Server, the goal is to think about set-based actions. Keeping
    this is mind, you want to be careful designing tables. You want to make sure that
    you minimize the number of columns to keep the table width small. You want to
    consider what kinds of columns are valuable. If you are using one column to define
    the value type and another column to define the actual value, you have designed
    a name-value pair relationship.


    This type of design may be easier to understand and create simpler tables, but
    this design does not embrace the benefits of using SQL Server. When using name-value
    pairs, it becomes increasingly difficult to use indexes. Therefore, SQL Server
    need to look through more data to pull back the necessary values.


    #### Primary Key


    When creating and designing tables, think about what type of data will be stored.
    This not only has to do with how the data is ordered but also the table’s relationship
    to other tables. In many cases, it is ideal to require primary keys as part of
    your coding standards. While a primary key is not required in all scenarios, it
    should help clarify what fields are used to define relationships to other tables.


    #### Foreign Key


    SQL Server is a relational database management system, and one of the main benefits
    of SQL Server is the relationships between tables. However, you need to specify
    the relationships between tables so that SQL Server can ensure that valid data
    is saved across the tables. When this happens, SQL Server checks the relationship
    between the table storing the values and the referencing table. SQL Server does
    this using a foreign key. Because SQL Server knows that it can trust the relationship,
    it can often filter out data more efficiently and find data faster. Therefore,
    it may be a good idea to specify that foreign key relationships are part of your
    T-SQL coding standards.


    #### Non-Clustered Index


    I have found that non-clustered indexes are a more highly debated topic than I
    would have ever expected. One of the challenges of using non-clustered indexes
    is that there is a cost associated with recording the data as part of the index
    or updating the index as the values change. However, SQL Server uses indexes to
    quickly find the data referenced by various queries. Make sure that the benefit
    of using non-clustered indexes outweighs the cost.


    One of the ways that you can do this is to make sure that you properly define
    your indexes. Due to the cost associated with maintaining indexes, you want to
    make certain that any index you create is regularly being used by the available
    queries. You may also want to define how to determine which columns should be
    part of the index and which columns should be pulled back as part of the index.


    #### Constraint Definition


    Your tables can have one or more columns. Each of these columns holds some type
    of information. When it comes to that information, you may know that only certain
    values can be stored in that column. Using foreign keys can keep the data integrity
    in some situations, but there are other times when it may not make sense to use
    a foreign key. In these cases, you can specify a constraint on the record. The
    constraint can limit what type of information can be stored in those columns.


    However, forcing SQL Server to manage those constraints puts an extra load on
    SQL Server. So, you may want to consider minimizing the use of constraints to
    limit what type of data can be stored in the database and rely on the application
    code to provide good data. Another use of constraints is to specify default values
    for certain fields. This can happen for columns where you know the most likely
    value that will exist when a record is created. For instance, you may want to
    specify a default value of True for an `IsActive` column as most records created
    will be active at the time they are created. Once again, this can be handled by
    the application, but you may also decide to enforce this as part of your T-SQL
    coding standards.


    It is important to consider T-SQL coding standards that encourage good design
    practices. This includes determining how closely you will adhere to ANSI standards.
    There are other topics to include such as choosing the minimum normal form allowed
    as part of your database design. This decision may affect other aspects of your
    T-SQL design including primary keys, foreign keys, and non-clustered indexes.
    You may also consider how you want to handle constraints. Once you have determined
    the T-SQL coding standards you want to enforce for good T-SQL design practices,
    you may want to decide what coding standards are needed with regard to the overall
    performance of T-SQL.


    ### T-SQL Performance


    After determining the T-SQL coding standards related to database design and implementation,
    you want to determine what standards you need to help minimize and address any
    performance issues that may come up. This includes creating T-SQL coding standards
    that help make sure SQL Server does not get bogged down with unnecessary information.
    You also want to consider how T-SQL code needs to be written to minimize performance
    overhead.'
  trans: '

    #### ANSI 标准


    一个重要的考量是是否保持你的 T-SQL 代码符合 ANSI 标准。虽然 SQL Server 有一些可用的功能，但并非所有这些功能都符合 ANSI 标准。在许多情况下，SQL
    Server 特定的命令和函数可以使用 ANSI 标准代码重写。确保你以 ANSI 标准编写 T-SQL 代码，可以让你轻松迁移到另一个同样符合 ANSI
    标准的关系数据库管理系统。


    #### 范式


    在涵盖 T-SQL 编码标准时，你可能还想定义设计元素。这包括数据应如何分组存放于表中，以及这些表中应包含哪些信息。存在不同级别的范式，你可以使用 T-SQL
    编码标准来指明这些是什么。通常讨论的数据库规范化类型包括第一范式 (1NF)、第二范式 (2NF)、第三范式 (3NF) 和第四范式 (4NF)。


    每种范式都建立在前一种之上。最低级别的范式是第一范式。它要求每个表必须有一个主键，并且每个字段或列只包含单个值。


    #### 表的大小


    创建表时，很容易想将与特定项目相关的所有列都放入同一个表中。这可能导致表拥有非常多列。拥有大量列的表所面临的挑战之一是数据的存储方式。这最终可能导致性能问题。你可以通过分析所存储信息的类型，并创建由信息子组构成的表来设计表，从而避免这类问题。例如，我可能想在同一张表中记录关于产品的所有信息，包括关于制造商、产品详情和销售价格的所有信息。但是，更好的做法是创建一个用于供应商信息的表和一个用于产品信息的表。这符合遵循数据库规范化最佳实践的要求。此外，设计得当的表能使整体数据库设计更能适应应用程序随时间发生的变化。


    #### 名称-值对


    使用 SQL Server 时，目标是考虑基于集合的操作。记住这一点，你在设计表时需要谨慎。你需要确保尽量减少列数以保持表的宽度较小。你需要考虑哪些类型的列是有价值的。如果你使用一列来定义值类型，另一列来定义实际值，那么你就设计了一个名称-值对关系。


    这种设计可能更易于理解并创建更简单的表，但这种设计并未充分利用 SQL Server 的优势。使用名称-值对时，使用索引变得越来越困难。因此，SQL Server
    需要查看更多的数据才能提取出所需的值。


    #### 主键


    在创建和设计表时，考虑将存储什么类型的数据。这不仅与数据的排序方式有关，还与表和其他表的关系有关。在许多情况下，将主键作为编码标准的一部分是理想的。虽然并非所有场景都需要主键，但它应有助于阐明哪些字段用于定义与其他表的关系。


    #### 外键


    SQL Server 是一个关系数据库管理系统，其主要优势之一是表之间的关系。但是，你需要指定表之间的关系，以便 SQL Server 可以确保在表中保存有效数据。当发生这种情况时，SQL
    Server 会检查存储值的表与引用表之间的关系。SQL Server 使用外键来实现这一点。因为 SQL Server 知道它可以信任这种关系，所以通常可以更有效地过滤数据并更快地找到数据。因此，指定外键关系作为
    T-SQL 编码标准的一部分可能是个好主意。


    #### 非聚集索引


    我发现非聚集索引是一个比我预期中更具争议性的话题。使用非聚集索引的挑战之一是记录数据作为索引的一部分或在值更改时更新索引存在相关成本。然而，SQL Server
    使用索引来快速查找各种查询引用的数据。确保使用非聚集索引的好处大于成本。


    你可以通过确保正确定义索引来实现这一点。由于维护索引有成本，你需要确保你创建的任何索引都被现有查询定期使用。你可能还想定义如何确定哪些列应作为索引的一部分，以及哪些列应作为索引的一部分被取回。


    #### 约束定义


    你的表可以有一个或多个列。每个列都保存某种类型的信息。对于这些信息，你可能知道只有某些值可以存储在该列中。在某些情况下，使用外键可以保持数据完整性，但在其他时候使用外键可能没有意义。在这些情况下，你可以对记录指定约束。约束可以限制可以存储在这些列中的信息类型。


    然而，强制 SQL Server 管理这些约束会给 SQL Server 带来额外负担。因此，你可能需要考虑尽量减少约束的使用来限制可存储在数据库中的数据类型，并依赖应用程序代码来提供良好的数据。约束的另一个用途是为某些字段指定默认值。这适用于那些你知道在创建记录时最可能存在的值的列。例如，你可能希望为
    `IsActive` 列指定默认值 True，因为大多数创建的记录在创建时都是活动的。同样，这可以由应用程序处理，但你也可以决定将其作为 T-SQL 编码标准的一部分来强制执行。


    考虑鼓励良好设计实践的 T-SQL 编码标准非常重要。这包括确定你将多大程度上遵循 ANSI 标准。还有其他主题需要包括，例如在数据库设计中选择允许的最低范式级别。这个决策可能会影响
    T-SQL 设计的其他方面，包括主键、外键和非聚集索引。你可能还需要考虑如何处理约束。一旦确定了要强制执行的良好 T-SQL 设计实践相关的 T-SQL 编码标准，你可能需要决定关于
    T-SQL 整体性能方面需要哪些编码标准。


    ### T-SQL 性能


    在确定了与数据库设计和实现相关的 T-SQL 编码标准后，你需要确定需要哪些标准来帮助最小化和解决可能出现的任何性能问题。这包括创建 T-SQL 编码标准，以帮助确保
    SQL Server 不会被不必要的信息拖累。你还需要考虑如何编写 T-SQL 代码以最小化性能开销。

    '
- fmt: '## Selecting Necessary Data


    SQL Server can store quite a bit of data, and SQL Server can also retrieve large
    quantities of data. There are many scenarios where applications are retrieving
    data. When first learning about a database and the associated tables, it is often
    tempting to select all the columns in a table. While this is the easiest method
    to return data, it is not usually ideal.


    First is the syntax used to select all rows by using the asterisks. The issue
    with this method is if the columns in the underlying object change, the code may
    not work as expected. Even worse, the code may not provide an error and users
    will not know they are getting bad data.


    The second issue that can happen is more common. When you pull back all columns,
    there is considerably more work put on SQL Server. Not only must SQL Server return
    everything for all rows of data returned, but it is likely that SQL Server will
    not be able to use any indexes to return this data. This is the equivalent to
    reading this entire book each time you want to study one specific section. You
    would learn what you needed, but you would also spend a considerable amount of
    time reading topics that you were mostly likely going to disregard since they
    were not relevant for your needs at that time.


    ## Sargeable


    You want SQL Server to be able to easily search the database to find the information
    you are trying to access. There are some ways that you can write `T-SQL` that
    can let `SQL Server` take advantage of indexes and quickly find the necessary
    data. However, there are other methods of writing `T-SQL` that can give the same
    results but may take longer and require `SQL Server` to look through more data.
    The difference between these two scenarios is that the first scenario refers to
    making sure your `T-SQL` is sargeable, whereas the second option is when the `T-SQL`
    is not sargeable. This usually happens in the `WHERE` clause of the `T-SQL` statement.
    Listing [9-1] shows a query to find all customers that were created in October
    2022.


    ```sql

    SELECT FirstName, LastName, Country

    FROM dbo.Customer

    WHERE DATEPART(MM, DateCreated) = 10

    AND DATEPART(YY, DateCreated) = 2022;

    ```


    Listing 9-1

    Query Using Non-Sargeable Criteria


    You can see the use of the `DATEPART` function on the `DateCreated` column to
    determine both the month and the year each record was created. In order for `SQL
    Server` to determine which records are in October 2022, it will need to check
    every record in the table. You can see this is true in the execution plan in Figure
    [9-1] with the index scan.


    ![](images/480547_2_En_9_Chapter/480547_2_En_9_Fig1_HTML.jpg)


    Figure 9-1

    Execution plan from non-sargeable criteria


    When execution plans are this simple, it can sometimes be difficult to get an
    idea of how performant these queries really are. One way you can get a better
    idea is to look at the properties associated with this execution plan. There is
    a lot of information in Figure [9-2], but let’s focus on the `Number of Rows Read`.


    ![](images/480547_2_En_9_Chapter/480547_2_En_9_Fig2_HTML.jpg)


    Figure 9-2

    Properties for the index scan from non-sargeable criteria


    The number of rows read for the index scan from Listing [9-1] is 401,408. To get
    a better idea of whether this query is performing well, let’s write a query with
    sargeable values. In Listing [9-2], the code is still querying the `dbo.Customer`
    table for records created in October 2022, but now it uses greater than or equal
    to and less than to specify an exact date range.


    ```sql

    DECLARE @StartDate DATETIME2(2) = ''2022-09-01'';

    DECLARE @EndDate DATETIME2(6) = DATEADD(mm, 1, @StartDate)

    SELECT FirstName, LastName, Country, DateCreated

    FROM dbo.Customer

    WHERE DateCreated >= @StartDate

    AND DateCreated < @EndDate;

    ```


    Listing 9-2

    Query Using Sargeable Criteria


    While this may look less clean or harder to read, the importance is in writing
    a query where `SQL Server` can quickly determine what records meet the criteria
    requested in the query. Figure [9-3] shows the execution plan for the query from
    Listing [9-2].


    ![](images/480547_2_En_9_Chapter/480547_2_En_9_Fig3_HTML.jpg)


    Figure 9-3

    Execution plan from sargeable criteria'
