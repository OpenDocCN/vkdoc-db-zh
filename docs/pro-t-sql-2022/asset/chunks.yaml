    18-3 中显示的结果。


    表 18-3


    查看被屏蔽的供应商信息


    | 公司名称 | 地址 | 电子邮件地址 |

    | --- | --- | --- |

    | Kayak Unlimited | 5xxxxet | sXXX@XXXX.com |


    该表显示地址为 `5xxxxet`，电子邮件地址为 `sXXX@XXXX.com`。虽然该用户拥有 SELECT 权限，但他们没有 UNMASK 权限。因此，这证实了数据如你所预期的那样被屏蔽了。如果你授予此登录
    UNMASK 权限并重新运行清单 18-5 中的示例，用户将能够看到未屏蔽的数据。


    在 SQL Server 2022 中，还可以为给定用户实现细粒度的解除屏蔽。这允许用户查看 `GRANT UNMASK` 语句中指定的特定未屏蔽数据。清单
    18-6 中的代码授予 TestGranularUnmasking 用户对 `EmailAddress` 列的 UNMASK 权限。


    ```sql

    CREATE USER TestGranularUnmasking WITHOUT LOGIN;

    GRANT SELECT ON SCHEMA::dbo TO TestGranularUnmasking;

    GRANT UNMASK ON dbo.Vendor(EmailAddress) TO TestGranularUnmasking;

    -- 为测试进行模拟:

    EXECUTE AS USER = ''TestGranularUnmasking'';

    SELECT CompanyName,

    [Address],

    EmailAddress

    FROM dbo.Vendor;

    REVERT;

    清单 18-6

    创建用户以测试细粒度解除屏蔽

