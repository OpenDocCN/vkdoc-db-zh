  trans: '

    ## T-SQL 命名规范


    当你编写 T-SQL 时，你可以选择如何编写代码。正如第 2 章所述，你很可能会在 T-SQL 中创建持久化对象。无论你的目的如何，遵循良好的命名策略都能让其他人更容易理解你的
    T-SQL 代码的用途。理想情况下，你的团队成员应该能够根据代码所在对象的名称来判断其目的。这对于新员工或经验较少的员工来说尤其有帮助。


    命名规范的实践与 T-SQL 格式化的实践类似。命名规范所涉及的一个方面是外观和感觉。这可能涉及对象使用的大写方式。在为数据库对象提供大小写方案时，有多种选项可用。主要选择是
    `camel case`（驼峰命名法）或 `pascal case`（帕斯卡命名法）。`驼峰命名法`是指第一个单词的首字母不大写，但所有其他单词的首字母大写。`帕斯卡命名法`是指每个单词的首字母都大写。这些大小写风格的主要区别在于数据库对象第一个单词的首字母。`代码清单
    3-18` 展示了一个使用`驼峰命名法`的查询。


    ```sql

    SELECT productID, productName, dateCreated, dateModified

    FROM dbo.product;

    ```

    `代码清单 3-18`

    使用驼峰命名法的查询


    相反，你可以在`代码清单 3-19`中看到编写相同查询时`帕斯卡命名法`的样子。


    ```sql

    SELECT ProductID, ProductName, DateCreated, DateModified

    FROM dbo.Product;

    ```

    `代码清单 3-19`

    使用帕斯卡命名法的查询


    此外，还有一种选项是首字母不大写，并且在单词之间使用下划线。我个人通常不喜欢数据库名称中出现非字母字符，但我确实知道有些人更喜欢下划线。如果你想要另一种选择，`代码清单
    3-20`展示了如何以所谓的`蛇形命名法`来命名表和列。


    ```sql

    SELECT productID, product_name, date_created, date_modified

    FROM dbo.product;

    ```

    `代码清单 3-20`

    使用蛇形命名法的查询


    在确定为你的命名规范使用哪种大小写时，务必也要注意数据库的排序规则以及是否有任何表使用了特殊的排序规则。了解大小写敏感性将有助于确保你的命名规范和格式标准保持一致。


    这还可能涉及对象在 `对象资源管理器` 中出现的位置。其中一些与正在命名的对象类型以及谁会查找这些对象有关。如果你想按用途查找对象，可能需要指定`架构`名称来将这些对象分组。这对于应用程序或服务可能特别有用。根据预期的故障排除类型，数据库对象，特别是`存储过程`，可以按其执行的操作来命名。这便于搜索进行`选择`数据操作的存储过程与进行`插入`数据操作的存储过程。然而，还有另一个选项，即让受影响的主要表作为存储过程名称的第一个词。这允许某人在`对象资源管理器`中按受影响的表进行搜索，以查看存在的所有存储过程。


    另一个考虑因素是在为数据库对象命名时是否可以使用`保留字`。如果在数据库对象名称中使用了保留字，你将需要在对象名称中添加另一个词，以便在引用对象名称时不需要使用方括号。


    在确定命名规范时，你可能还需要考虑表中是否有一些列会与其他表中的列具有相同的名称。这类列的一些例子包括：指定记录创建日期、记录最后更新日期的列，以及记录是否被软删除的列。对于指定状态或类型的表，这些表可以包含一个状态或类型名称列以及一个关联的描述列。你可能会决定，希望所有这些列在所有包含这些列的表中都使用完全相同的名称。


    在编写查询时，如果可能，我倾向于不对列名使用别名。我也不显示多个创建日期或更新日期列。因此，对于创建日期、修改日期和软删除标志，我使用完全相同的名称。然而，在编写查询时，我也经常返回多个表中的名称或描述字段。因此，我更喜欢这些列在列名中包含表名作为一部分。例如，我不会在
    `Customer` 和 `Product` 表中使用列名 `Description`，而是倾向于在 `Customer` 表中将列命名为 `CustomerDescription`，在
    `Product` 表中将列命名为 `ProductDescription`。这使得其他人可以查看 select 语句并轻松识别正在引用的表。这也意味着我在编写查询时需要别名的列更少。


    命名持久化数据库对象也可能很棘手。为表命名可能不同于为索引、视图、触发器或函数命名。再次强调，为这些对象命名不仅仅是给它们一个描述性的名称。这也可能是给它们一个能清楚表明其对象类型的名称。这是因为许多数据库工程师和开发人员使用
    `对象资源管理器` 作为查找对象的主要工具。如前所述，如果表名以名词开头，存储过程以动词开头，那么我接下来需要弄清楚如何将其他数据库对象与表和存储过程区分开来。


    其中一个选项是在对象名称前加上对象类型的缩写。对于索引，你可以对非聚集索引使用 `IX_`，对聚集索引使用 `CX_`。在命名索引时，一旦指定了 `IX_`
    或 `CX_`，接下来的项目应该是索引所在的表名。表名之后应该是索引中包含的列的列表。这些列应按照创建索引时指定的顺序列出。在`代码清单 3-21`中，你可以看到一个聚集索引。聚集索引名称以
    `CX` 开头，后跟表名，然后是列名。每个部分之间用下划线分隔。


    ```sql

    CREATE CLUSTERED INDEX CX_Product_ProductName

    ON dbo.Product (ProductName);

    ```

    `代码清单 3-21`

    创建聚集索引


    创建非聚集索引遵循相同的模式。在`代码清单 3-22`中，你可以看到非聚集索引也包含多个列。


    ```sql

    CREATE NONCLUSTERED INDEX IX_Customer_DateCreated_FirstName_LastName_Country

    ON dbo.Customer

    (

    DateCreated ASC,

    FirstName ASC,

    LastName ASC,

    Country ASC

    );

    ```

    `代码清单 3-22`

    创建包含多列的非聚集索引

    '
- fmt: '# 数据库对象命名规范


    ## 主键与外键命名


    在创建主键和外键时也遵循同样的原则。如果在`T-SQL`中创建主键或外键时未指定名称，`SQL Server`会随机分配一个名称。因此，最佳实践是显式命名主键或外键。


    - 命名主键时，应使其以`PK_`开头，代表主键。

    - 类似地，外键应以`FK_`开头。

    - 名称的下一部分是分配该键的表名。

    - 接着是用于定义该键的一个或多个列名。如果指定了多个列，这些列在键定义中应按顺序列出。


    清单[3-23]展示了如何在表创建后添加并命名主键。


    ```

    ALTER TABLE dbo.Product

    ADD CONSTRAINT PK_Product_ProductID

    PRIMARY KEY (ProductID);

    Listing 3-23

    Add a Primary Key

    ```


    可以看到，主键名称以`PK`开头，后跟表名和用于创建主键的列名。


    类似地，外键名称以`FK_`开头。名称的下一部分是外键所属的表名，接着是用于定义外键的列。如果指定了多个列，它们应按顺序列出。在表创建后添加外键可以参考清单[3-24]。


    ```

    ALTER TABLE dbo.CustomerOrder

    ADD CONSTRAINT FK_Order_CustomerID

    FOREIGN KEY (CustomerID)

    REFERENCES dbo.Customer(CustomerID);

    Listing 3-24

    Add a Foreign Key

    ```


    与创建主键类似，外键遵循相似的命名结构：以`FK`开头，后跟表名和列名。


    ## 视图与触发器命名


    我也倾向于在视图名称前加上`vw_`，在触发器前加上`tr_`。还有其他不那么明显的命名选项。例如，你可以为视图或触发器定义保留特定的名词或动词列表。这提供了更多灵活性，也能防止`Object
    Explorer`中的列表项都以相同的前三个字符开头。这能让任何人都轻松识别出这些对象既不是表也不是存储过程。这对于视图和触发器尤其重要。


    最大的挑战之一是，如果命名不能明显区分它们是视图还是触发器，人们可能会花费大量时间寻找这些对象而无法找到。视图像表一样用于连接查询，而触发器则像存储过程一样用于修改对象。触发器更棘手，因为它们可能导致你花费大量时间研究存储过程，试图找出值发生变化的原因。


    ## 表命名


    命名表时，应仅使用名词。这有助于表明这些对象用于存储，而不是执行任何特定活动。


    在命名对象时，一个常被忽视直至为时已晚的命名约定是：对象名是使用单数还是复数。在首次出现复数数据库对象之前，这可能不是问题。但一旦架构中存在复数对象，其问题会很快变得明显。这是因为数据库中一旦存在复数对象，编写查询时就越来越难以记住哪些表是复数、哪些是单数。


    选择表名时，还应确保名称具有描述性。应以一种能让其他数据库工程师和开发者轻松了解表中存储信息类型的方式来描述表。使用名词命名表也表明该对象用于存储，而非执行任何特定活动。


    ## 存储过程命名


    大多数用户很容易熟悉表和存储过程。选择一种命名约定来区分这些对象是很容易的，例如让存储过程以动词开头，或在存储过程名称中包含其他高级条件。清单[3-25]展示了一个以动词开头的存储过程。


    ```

    EXECUTE dbo.GetCustomer;

    Listing 3-25

    Stored Procedure Beginning with a Verb

    ```


    如果我看到这个存储过程名，我期望它能检索所有客户。清单[3-26]中的存储过程返回特定客户的所有信息。


    ```

    EXECUTE dbo.GetCustomerByCustomerID 1;

    Listing 3-26

    Stored Procedure with Selection Criteria

    ```


    ## 总结


    由此可见，在命名`T-SQL`数据库对象时有许多考虑因素。在许多情况下，一个好的名称能帮助你轻松确定数据库对象的用途。在特殊情况下，它还能帮助你识别对象的类型。虽然你通常在格式化和注释`T-SQL`之后才命名对象，但我将注释放在最后，因为它既涉及数据库对象的创建，也涉及数据库对象内部的`T-SQL`代码。'
  raw: 'The same is true when creating primary and foreign keys. If you do not specify
    a name when you create a primary or foreign key in T-SQL, SQL Server will assign
    a name at random. Therefore, it is best practice to explicitly name the primary
    or foreign key. When naming the primary key, you want the primary key to begin
    with PK_ which stands for primary key. Similarly, you want to precede the foreign
    key with FK_ and then name the rest of the key. The next part of the name is the
    table name where the primary or foreign key is assigned. This is followed by the
    column or columns used to define the primary or foreign key. If there is more
    than one column specified, the columns listed in the primary or foreign key should
    be listed in order. Listing [3-23](#480547_2_En_3_Chapter.xhtml#PC23) shows an
    example of how to create and name a primary key after table has been created.


    ```

    ALTER TABLE dbo.Product

    ADD CONSTRAINT PK_Product_ProductID

    PRIMARY KEY (ProductID);

    Listing 3-23

    Add a Primary Key

    ```


    As you can see, the primary key name begins with PK followed by the table name
    and then the column name used for the creation of the primary key.


    Similarly, you want to precede the foreign key with FK_ and then name the rest
    of the key. The next part of the name is the table name where the primary or foreign
    key is assigned. This is followed by the column or columns used to define the
    primary or foreign key. If there is more than one column specified, the columns
    listed in the primary or foreign key should be listed in order. When creating
    a foreign key after the table has been created, you can refer to Listing [3-24](#480547_2_En_3_Chapter.xhtml#PC24).


    ```

    ALTER TABLE dbo.CustomerOrder

    ADD CONSTRAINT FK_Order_CustomerID

    FOREIGN KEY (CustomerID)

    REFERENCES dbo.Customer(CustomerID);

    Listing 3-24

    Add a Foreign Key

    ```


    Like creating the primary key, the foreign key follows a similar naming structure.
    The foreign key begins with FK followed by the table name and then the column
    name.


    I also precede views with vw_ and triggers with tr_. There are other options available
    that can be less obvious. For instance, you can define a list of nouns or verbs
    that will be reserved for only views or triggers. This will give you more flexibility,
    and it will also keep Object Explorer from having all items in the list begin
    with the same three characters. This will allow anyone to easily be able to tell
    these objects are neither tables nor stored procedures. This is particularly true
    when it comes to views and triggers.


    One of the biggest challenges is that if they are not named to make it obvious
    that they are views or triggers, people can spend a significant amount of time
    looking for these objects without being able to find them. Views are used in joins
    like tables, whereas triggers change objects similar to stored procedures. Triggers
    are even trickier because they can cause you to spend a significant amount of
    time researching stored procedures trying to determine why values are changing.


    When naming tables, you want to use only nouns. This helps signify that these
    objects are for storage and not for performing any specific activity. When naming
    objects, one of the naming conventions that is often overlooked until it is too
    late is whether objects are singular or plural. It is not really an issue until
    the first time where an object is pluralized. Once a plural database object is
    in the overall schema, it becomes obvious very quickly the issues with a plural
    object. This is because once a plural object exists in the database, it becomes
    increasingly difficult to write queries without specifically remembering which
    tables are plural and which are singular.


    You also want to make sure that you choose a descriptive name when naming a table.
    You want to describe your table in a way that other database engineers and developers
    will easily know what type of information is stored in the table. Naming tables
    with nouns also indicates that the object is for storage and not performing any
    specific activities.


    Most users become easily familiar with tables and stored procedures. It is easy
    to choose a naming convention that differentiates these objects either by having
    stored procedure preceded with a verb or having additional high-level criteria
    as part of the stored procedure name. Listing [3-25](#480547_2_En_3_Chapter.xhtml#PC25)
    shows a stored procedure that has a verb at the beginning of a stored procedure
    name.


    ```

    EXECUTE dbo.GetCustomer;

    Listing 3-25

    Stored Procedure Beginning with a Verb

    ```


    If I see that stored procedure name, I expect it to retrieve all customers. The
    stored procedure in Listing [3-26](#480547_2_En_3_Chapter.xhtml#PC26) returns
    all the customer information for a specific customer.


    ```

    EXECUTE dbo.GetCustomerByCustomerID 1;

    Listing 3-26

    Stored Procedure with Selection Criteria

    ```


    As you can see, there are many considerations when it comes to naming your T-SQL
    database objects. In many of these cases, a good name helps you easily determine
    the purpose of the database object. In special circumstances, it can also help
    you identify the type of object. While you normally name your objects after formatting
    and commenting the T-SQL, I saved the commenting for last as it covers both the
    creation of the database object and the T-SQL code that goes inside the database
    object.'
  trans: '# 数据库对象命名规范


    ## 主键与外键命名


    在创建主键和外键时也遵循同样的原则。如果在`T-SQL`中创建主键或外键时未指定名称，`SQL Server`会随机分配一个名称。因此，**最佳实践**是显式命名主键或外键。


    - 命名主键时，应使其以`PK_`开头，代表主键。

    - 类似地，外键应以`FK_`开头。

    - 名称的下一部分是分配该键的表名。

    - 接着是用于定义该键的一个或多个列名。如果指定了多个列，这些列在键定义中应按顺序列出。


    清单[3-23]展示了如何在表创建后添加并命名主键。


    ```

    ALTER TABLE dbo.Product

    ADD CONSTRAINT PK_Product_ProductID

    PRIMARY KEY (ProductID);

    Listing 3-23

    Add a Primary Key

    ```


    可以看到，主键名称以`PK`开头，后跟表名和用于创建主键的列名。


    类似地，外键名称以`FK_`开头。名称的下一部分是外键所属的表名，接着是用于定义外键的列。如果指定了多个列，它们应按顺序列出。在表创建后添加外键可以参考清单[3-24]。


    ```

    ALTER TABLE dbo.CustomerOrder

    ADD CONSTRAINT FK_Order_CustomerID

    FOREIGN KEY (CustomerID)

    REFERENCES dbo.Customer(CustomerID);

    Listing 3-24

    Add a Foreign Key

    ```


    与创建主键类似，外键遵循相似的命名结构：以`FK`开头，后跟表名和列名。


    ## 视图与触发器命名


    我也倾向于在视图名称前加上`vw_`，在触发器前加上`tr_`。还有其他不那么明显的命名选项。例如，你可以为视图或触发器定义保留特定的名词或动词列表。这提供了更多灵活性，也能防止`Object
    Explorer`中的列表项都以相同的前三个字符开头。这能让任何人都轻松识别出这些对象既不是表也不是存储过程。这对于视图和触发器尤其重要。


    最大的挑战之一是，如果命名不能明显区分它们是视图还是触发器，人们可能会花费大量时间寻找这些对象而无法找到。视图像表一样用于连接查询，而触发器则像存储过程一样用于修改对象。触发器更棘手，因为它们可能导致你花费大量时间研究存储过程，试图找出值发生变化的原因。


    ## 表命名


    命名表时，应仅使用名词。这有助于表明这些对象用于存储，而不是执行任何特定活动。


    在命名对象时，一个常被忽视直至为时已晚的命名约定是：对象名是使用单数还是复数。在首次出现复数数据库对象之前，这可能不是问题。但一旦架构中存在复数对象，其问题会很快变得明显。这是因为数据库中一旦存在复数对象，编写查询时就越来越难以记住哪些表是复数、哪些是单数。


    选择表名时，还应确保名称具有描述性。应以一种能让其他数据库工程师和开发者轻松了解表中存储信息类型的方式来描述表。使用名词命名表也表明该对象用于存储，而非执行任何特定活动。


    ## 存储过程命名


    大多数用户很容易熟悉表和存储过程。选择一种命名约定来区分这些对象是很容易的，例如让存储过程以动词开头，或在存储过程名称中包含其他高级条件。清单[3-25]展示了一个以动词开头的存储过程。


    ```

    EXECUTE dbo.GetCustomer;

    Listing 3-25

    Stored Procedure Beginning with a Verb

    ```


    如果我看到这个存储过程名，我期望它能检索所有客户。清单[3-26]中的存储过程返回特定客户的所有信息。


    ```

    EXECUTE dbo.GetCustomerByCustomerID 1;

    Listing 3-26

    Stored Procedure with Selection Criteria

    ```


    ## 总结


    由此可见，在命名`T-SQL`数据库对象时有许多考虑因素。在许多情况下，一个好的名称能帮助你轻松确定数据库对象的用途。在特殊情况下，它还能帮助你识别对象的类型。虽然你通常在格式化和注释`T-SQL`之后才命名对象，但我将注释放在最后，因为它既涉及数据库对象的创建，也涉及数据库对象内部的`T-SQL`代码。'
- fmt: "## Commenting T-SQL\n\nWhile the primary goal of writing T-SQL is to allow\
    \ an application to do a specific action regarding data, almost equally important\
    \ is ensuring that others will understand your T-SQL code going forward. At the\
    \ very least, this makes sure that you are not the only one responsible for a\
    \ certain piece of code or business logic going forward. It also helps all your\
    \ other team members build confidence in their ability to do their job and improve\
    \ their understanding of the code behind the scenes.\n\nIn many cases, quickly\
    \ scanning the T-SQL code or looking at the name of a database object is not enough\
    \ to understand the purpose of the T-SQL code. Listing 3-27 shows sample T-SQL\
    \ code for creating a header section at the top of database objects.\n\n```sql\n\
    /*-------------------------------------------------------------*\\\nName:    \
    \         \nAuthor:           \nCreated Date:     \nDescription:      \nSample\
    \ Usage:\n\nChange Log:\nUpdate on  by : \nUpdate on  by : \n\\*-------------------------------------------------------------*/\n\
    Listing 3-27\nComment for Header of Persistent Database Object\n```\n\nThe purpose\
    \ of this heading is to give other users a summary of this database object at\
    \ a glance. Depending on the purpose for reviewing this T-SQL will determine what\
    \ is important to the user. For those who are not familiar with all the details\
    \ of the business applications, the description segment will provide a high-level\
    \ idea of the purpose of the T-SQL database object. Likewise, the sample usage\
    \ allows those looking into performance issues to understand how the applications\
    \ are using this piece of T-SQL code. The author-of-the-database object can be\
    \ useful to determine if the original creator is still with the company to answer\
    \ more specific questions about the database object. If your databases are in\
    \ source control, you may decide to omit some of these fields. I discuss source\
    \ control further in Chapter 11. In Listing 3-28, you can see how the header information\
    \ looks while creating the view originally found in Listing 3-4.\n\n```sql\n/*-------------------------------------------------------------*\\\
    \nName:             dbo.CustomerProduct\nAuthor:           Elizabeth Noble\nCreated\
    \ Date:     2022-10-31\nDescription:      Simple view to display all customer\
    \ purchases\nSample Usage:\nSELECT FirstName, LastName, ProductName, QuantitySold\n\
    FROM dbo.CustomerProduct;\nChange Log:\nUpdate on 2022-10-31 by enoble: Added\
    \ header to view\n\\*-------------------------------------------------------------*/\n\
    CREATE OR ALTER VIEW dbo.CustomerProduct\nAS\nSELECT cus.FirstName, cus.LastName,\
    \ prd.ProductName, SUM(dtl.QuantitySold) AS QuantitySold\nFROM dbo.CustomerOrder\
    \ ord\nINNER JOIN dbo.OrderDetail dtl\nON ord.CustomerOrderID = dtl.CustomerOrderID\n\
    INNER JOIN dbo.Product prd\nON dtl.ProductID = prd.ProductID\nINNER JOIN dbo.Customer\
    \ cus\nON ord.CustomerID = cus.CustomerID\nGROUP BY cus.FirstName, cus.LastName,\
    \ prd.ProductName;\nListing 3-28\nCreate a View with a Commented Header\n```\n\
    \n### Commenting Complex Logic\n\nSometimes it may be enough to write simple T-SQL\
    \ that is easily readable. However, there are other times where a database object\
    \ may have T-SQL code that is difficult to understand at a quick glance. I often\
    \ find one of the challenges in commenting after I’ve written my code is that\
    \ my comments are too technical to easily describe what I am trying to accomplish.\
    \ You want to make sure that someone unfamiliar with your code can easily understand\
    \ the purpose of your T-SQL code.\n\nIf there is any complex logic, you want to\
    \ clearly explain how the complex logic works. This is especially true if you\
    \ are using T-SQL coding practices that are not best practices. Any explanation\
    \ as to why non-standard practices were chosen helps save other people’s valuable\
    \ time. This can also save your team members’ time if you have already determined\
    \ that standard best practices will not perform well enough in the given situation.\
    \ Looking back to Listing 3-3, there is a subquery in the `SELECT` statement.\
    \ When first writing this code, it may be obvious why a subquery was used, but\
    \ you may forget the reason in the future. In addition, it is probably not obvious\
    \ to others who read my code why I chose to include a subquery for that column.\
    \ In Listing 3-29, I show how to add comments so that it is easier to quickly\
    \ understand the purpose or logic of the code that is written.\n\n```sql\n-- The\
    \ outer query shows all customers that bought products that contain the word \"\
    board\"\nSELECT\n-- The subquery below is used to show all parts purchased\n----\
    \ by customers that also bought parts like \"board\"\n(\nSELECT prd.ProductName\n\
    FROM dbo.CustomerOrder ord\nINNER JOIN dbo.OrderDetail dtl\nON ord.CustomerOrderID\
    \ = dtl.CustomerOrderID\nINNER JOIN dbo.Product prd\nON dtl.ProductID = prd.ProductID\n\
    WHERE ord.CustomerID = bord.CustomerID\nGROUP BY prd.ProductName\n) AS ProductName\n\
    FROM dbo.CustomerOrder bord\nINNER JOIN dbo.OrderDetail bdtl\nON bord.CustomerOrderID\
    \ = bdtl.CustomerOrderID\nINNER JOIN dbo.Product bprd\nON bdtl.ProductID = bprd.ProductID\n\
    WHERE bprd.ProductName LIKE '%board%';\nListing 3-29\nQueries with Subqueries\n\
    ```\n\n### Writing Comments First\n\nIt is often easiest to include comments in\
    \ your code if you start commenting your T-SQL code even before you begin writing\
    \ any T-SQL. In Listing 3-30, you can see the header information and the beginning\
    \ comments. The comments indicate the concept behind writing the stored procedure.\n\
    \n```sql\n/*-------------------------------------------------------------*\\\n\
    Name:             dbo.GetCustomerPurchase\nAuthor:           Elizabeth Noble\n\
    Created Date:     2022-10-30\nDescription:      Lookup customer information for\
    \ a given product\nSample Usage:\nDECLARE @ProductID INT;\nSET @ProductID = 1;\n\
    EXECUTE dbo.GetCustomerPurchase @ProductID;\n\\*-------------------------------------------------------------*/\n\
    -- Get the product sold to a customer\n-- Show total number sold as well as most\
    \ recent purchase date\n-- Show details for quantity purchased by product price\n\
    ---- at time of purchase\nListing 3-30\nCreate New Stored Procedure\n```\n\nOnce\
    \ you specify the general logic for the query, you can move forward with writing\
    \ the T-SQL so that these requirements are met. This is often helpful if you usually\
    \ find yourself rephrasing the code you have already written instead of explaining\
    \ the overall purpose of the code.\n\nWriting these comments before writing any\
    \ T-SQL code ensures the comments explain the purpose of the stored procedure\
    \ instead of how the code executes.\n\n### Conclusion\n\nYou should now be prepared\
    \ to start defining SQL formatting standards for yourself and in your own organization.\
    \ This will allow you and other members of your team to quickly review your organization’s\
    \ T-SQL code. In addition, I discussed strategies to use when providing additional\
    \ documentation about your T-SQL code. Commenting your T-SQL code allows others\
    \ to understand what the T-SQL code should be doing both regarding business logic\
    \ and advanced technical logic. I also covered options available when defining\
    \ naming conventions for your organization. Well-defined naming conventions should\
    \ make it easier for anyone accessing the database schema to know where to find\
    \ database objects.\n\nYou should now be familiar with SQL Server data types from\
    \ Chapter 1 and the best time to use them. You should also be comfortable with\
    \ some of the various database objects that are available when writing your T-SQL.\
    \ Now that you are also more familiar with how to style your code to improve readability\
    \ and understanding, you are ready to learn more about designing T-SQL code using\
    \ parameters, complex logic, and stored procedures as covered in the next section."
