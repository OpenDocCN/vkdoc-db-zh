    ### Listing 11-9: Manual Integration Testing


    When determining what you should be integration testing, think about any dependencies
    related to the T-SQL code that you are writing.


    Some T-SQL code has a more obvious need for integration testing than others. One
    of the scenarios that needs the most integration testing involves different database
    objects that return the same data. This can be two different stored procedures.
    It is also possible that the integration testing can compare the results between
    functions and stored procedures or views and functions. While these database objects
    may return different columns in the result set or in a different order, the columns
    that are the same can be compared.


    Other times you may have T-SQL code where one database object depends on the data
    handled in a previous step. You may have a stored procedure that updates a value
    in the table. A view or stored procedure may only return a specific subset of
    values. Using integration testing can allow you to execute the first stored procedure
    where you will update a lookup value in the table. Depending on the testing required,
    you can execute the stored procedure and confirm that the record appears. Unless
    the record should no longer appear, you can use integration testing to confirm
    that the record no longer appears.


    A common situation when this can occur is when you want to soft delete or disable
    a data record from your application. You can use one set of T-SQL to disable the
    record. There may be one or more database objects that should then be tested to
    confirm that the disabled records no longer appear. Creating a way to keep all
    your integration testing scenarios together and making sure that they are repeatable
    is what will protect your applications in the future. Integration testing your
    code now confirms that your current version of T-SQL code will pass. However,
    automating and repeating your integration testing going forward will allow you
    to continue to verify that new bugs have not been introduced into your T-SQL code.


    Depending on the design and complexity of your system, you may have data that
    is entered in one application and is sent to or used by another application. Throughout
    the business activities, this data may end up in different databases or different
    tables. This can involve different stages of data throughout your business. This
    can also include using integration testing between the transactional databases
    and a data warehouse. Using integration testing in this manner can ensure that
    the data entered in your applications remains consistent when it is migrated into
    a data warehouse.


    There are more graceful methods that can help with integration testing. However,
    I have found that most of them reference unit testing. The only difference for
    using these tools with integration testing is how the tests are written. This
    means you can use the unit testing functionality within Visual Studio as shown
    in the preceding section. There are other tools you can use for your unit and
    integration testing, but they will not be covered in this book.


    ## Load Testing


    Another aspect of working with SQL Server is handling large data sets quickly.
    It’s easy to hope that T-SQL code that is functionally correct will also perform
    well. However, this is not always what happens. While you can use execution plans
    to get a good idea of the relative performance of a query, this does not guarantee
    that the code will perform well under a heavy load. If you want to get an idea
    of how the T-SQL code will perform under stress, you need to perform load testing.


    Load testing presents some very special issues. One challenge is that the hardware
    is often different between the load testing environment and Production. In addition
    to hardware differences, there is usually a difference in the data that exists
    in the lower environments. This can be anything from having less data in lower
    environments to the data in the lower environments being cleansed and having different
    statistics. Additional differences can include data that has been entered in the
    lower environments that does not match Production. In many cases, these differences
    cannot be resolved.


    Unless you have the exact hardware and the exact Production databases, your load
    testing will not match Production with complete certainty. It is still beneficial
    to load test your T-SQL code. Even if you are unable to create the perfect load
    testing environment, you can still compare the relative performance of T-SQL code
    in your load testing environment. The next step is to figure out how to implement
    load testing. A simple but not very reliable method is to create T-SQL scripts
    to generate dummy load testing data. This method will give you a general idea
    of performance, but without significant analysis of existing Production data,
    it will not accurately reflect Production performance.


    There are several third-party tools available for load testing and many of them
    are free. These tools should make it simpler to begin load testing. However, you
    are faced with the same issue of the tests not accurately reflecting Production
    activity. While implementing load testing is an important aspect when developing
    your T-SQL code, the steps needed to load test are outside the scope of this book.

    ```'
