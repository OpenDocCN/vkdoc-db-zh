  trans: '#### NTEXT


    以前，存储超大的可变长度 Unicode 数据是通过 `NTEXT` 数据类型完成的。如果你的系统中仍在使用这种数据类型，可以预期它最多可存储 1,073,741,823
    个字符。然而，由于 Unicode 值所占用的空间较大，实际存储的总长度可能会更短。展望未来，使用此数据类型已不再是最佳实践。取而代之，应使用 `NVARCHAR(MAX)`
    数据类型。


    ### 二进制字符串数据类型


    有时，你可能需要存储既非数字、字符，也非日期或时间值的数据。使用二进制字符串来存储那些是字符串但不包含字符的项可能很有用。这些项可以包括音频、视频、图像或其他类似项目。在这些情况下，使用二进制字符串可能是合适的。使用二进制字符串数据类型时有几种选择。


    #### BINARY 和 VARBINARY


    可用于存储二进制字符串数据的选项涉及存储固定长度或可变长度的字符字符串。与讨论过的其他字符串数据类型一样，在处理这些数据类型时也有一些注意事项。


    可用的数据类型中有两种是 `BINARY` 和 `VARBINARY`。对于存储长度相似的二进制字符串，最佳选择是 `BINARY` 数据类型。相反地，当存储长度差异很大的二进制字符串数据时，`VARBINARY`
    数据类型是更好的选择。如果预计二进制字符串的总长度将超过 4000 个字符，则建议使用 `VARBINARY(MAX)`。


    在数据定义或变量声明中使用 `BINARY` 和 `VARBINARY` 数据类型时，如果未指定字符数，默认长度为 1。当使用 `CAST` 或 `CONVERT`
    函数将 `BINARY` 转换为 `VARBINARY` 时，默认字符数为 30。当从具有不同长度的变量转换为 `BINARY` 或 `VARBINARY`
    时请谨慎，因为 SQL Server 可能会根据需要填充或截断二进制数据。


    `BINARY` 数据类型存储的字节数与所存储数据的长度相同，而 `VARBINARY` 则使用 2 个字节加上与数据长度相同的字节数。这两种数据类型的长度最高可达
    8000。对于 `VARBINARY(MAX)`，最大存储大小为 2 GB。


    #### IMAGE


    `IMAGE` 数据类型曾用于存储大型可变长度二进制数据。对于 `IMAGE` 数据类型的情况，你应该继续使用 `VARBINARY(MAX)` 数据类型，因为
    `IMAGE` 数据类型已被弃用。


    ### 数据类型的排序规则


    数据可以配置为切换大小写敏感性，这决定了小写字母 c 是否被视为与大写字母 C 相同。还有重音敏感性，用于确定 n 是否被视为与 ñ 相同。你还可以指明片假名和平假名是否应基于假名敏感性进行相同排序。其他一些类型的排序规则选项基于宽度、变体选择符、二进制、二进制代码点和
    UTF-8 敏感。所存储的敏感性被称为排序规则。列的排序规则与数据库的排序规则相同，除非存在特定的覆盖设置。


    ### 日期和时间数据类型


    每个数据库事务都发生在特定的时间点。可能有必要参考或知道事务发生的时间。你的应用程序可能记录一个人的重要日期，包括生日或纪念日。日期和时间也可用于确定定价和功能。通过使用日期和时间，你可以确定何时应启用或禁用功能。日期和时间还可以显示用户账户何时不活动、系统访问何时启用或过期。定价和计费率可能涵盖多个不同的日期范围。当一组定价失效时，另一组可能生效。由于法规要求，你的公司可能需要记录一段时间内的定价。这包括指明定价费率开始和停止的时间。根据跟踪此信息的目的，你可能只需要知道交易的日期或时间。在其他情况下，最好同时知道与某个操作关联的日期和时间。


    #### DATE


    在处理事务时，可能有特定的情况需要你记录某事发生的时间。在某些情况下，可能只关心交易发生在哪一天。`DATE` 数据类型也可用于存储特定日期的汇总数据。在记录活动日期时，关于如何显示该数据可能有一些可用选项。在选择
    `DATE` 数据类型是否适合你的情况时，考虑不仅为 `DATE` 数据类型存储了多少数据，还有存储数据的任何可能限制，这也很重要。


    会有一些时候，应用程序或用户需要知道特定操作发生的时间。在决定 `DATE` 数据类型是否是合适的选择时，请从用户和应用程序使用的角度考虑信息的需求。在某些情况下，考虑
    `DATE` 数据类型何时不可取更容易。对于任何你想知道具体发生时间的操作，`DATE` 数据类型不是一个好的选择。然而，如果只需要知道操作发生在哪一天，那么
    `DATE` 数据类型是一个很好的选项。


    对于 `DATE` 数据类型，有几种关于如何显示 `DATE` 的选项。日期格式的默认值是 `YYYY-MM-DD`。在这种情况下，`YYYY` 代表四位数的年份，范围是
    0001 到 9999。`MM` 代表从 01 到 12 的月份数，`DD` 代表一个月中从 01 到 31 的天数。`DATE` 可以以多种数字和字母格式显示。但是，格式
    `ydm` 不受支持。


    可以存储的 `DATE` 值范围从 0001-01-01 到 9999-11-31。`DATE` 数据类型的字符长度为十位，精度为 10，小数位数为 0。`DATE`
    数据类型占用 3 个字节，并存储为 `INT`。


    日期可以转换为 `DATETIME`、`SMALLDATETIME`、`DATETIME2` 或 `DATETIMEOFFSET`。但是，时间值被设置为午夜。日期无法转换为
    `TIME` 数据类型，任何尝试执行此转换的操作都会失败并报错。此外，日期没有时区偏移，也不感知夏令时（DST）。'
- fmt: '# TIME


    另一种与动作发生时间相关的数据类型是 `TIME` 数据类型。`TIME` 可用于记录事务或活动发生的具体时间。了解时间的存储和格式非常有用。使用 `TIME`
    数据类型时，了解将其转换为其他 `DATE` 和 `DATETIME` 数据类型的影响是有帮助的。使用 `TIME` 数据类型也存在一些限制。


    `TIME` 可用于记录事务或活动发生的具体时间。当这样操作时，时间独立于日期记录，将来可能无法确定日期。解决此问题的一种方法是将日期与时间分开存储。`TIME`
    的精度高达 100 纳秒，其默认值为 `00:00:00`。


    `TIME` 的默认格式是 `hh:mm:ss[.nnnnnnn]`。在此格式中，`hh` 代表从 0 到 23 的两位数小时，`mm` 代表从 0 到 59
    的两位数分钟，`ss` 代表从 0 到 59 的两位数秒。`TIME` 数据类型允许不同的精度，如果指定，最多可以使用七位小数来表示秒的小数部分，即 `nnnnnnn`。这些值的范围可以从
    0 到 9999999。


    由于 `AM` 和 `PM` 用于区分上午和下午，在使用 `TIME` 时有额外的考虑。如果未提供 `AM` 或 `PM` 且小时值在 00 到 11 之间，则时间将被记录为
    `AM`。对于 12 到 23 的小时，时间将被保存为 `PM`。书写 `TIME` 时，如果输入 `12 AM`，该值将转换为 0 时。


    `TIME` 的范围是 `00:00:00.0000000` 到 `23:59:59.9999999`。字符长度可以从 8 到 16 位数字不等，具体取决于为
    `TIME` 指定的精度。无论哪种情况，`TIME` 都保存为固定的 5 字节。如果 `TIME` 转换为任何包含日期和时间的数据类型，则日值表示为 `1900-01-01`。如果
    `TIME` 的小数精度高于新数据类型，则该值将被截断。任何将 `TIME` 数据类型转换为 `DATE` 的尝试都会失败。与 `DATE` 一样，`TIME`
    既不感知时区，也不感知夏令时。


    # SMALLDATETIME, DATETIME, DATETIME2, and DATETIMEOFFSET


    有时仅保存日期或时间可能不够。对于这些场景，最好将日期和时间值组合在一起。有时这些值可能更简单，需要更高的精度，或者需要感知时区。


    一种这样的数据类型是 `SMALLDATETIME`。此数据类型用于记录特定的日期和时间。其默认值为 `1900-01-01 00:00:00`。此数据类型的精度为一分钟。虽然可以传入秒，但它们总是四舍五入到最接近的分钟。


    与日期数据类型一样，`SMALLDATETIME` 数据类型可以以多种数字和字母格式显示。与其他 `DATE` 和 `DATETIME` 数据类型相比，`SMALLDATETIME`
    的范围有些有限。此数据类型的日部分可以跨越 `1900-01-01` 到 `2079-06-06`。虽然输入的时间范围可以从 `00:00:00` 到 `23:59:59`，但数据库中保存的值将是
    `00:00:00` 到 `23:59:00`。`SMALLDATETIME` 的总长度最多为 19 个字符，所需的存储大小总共为 4 个固定字节。


    将 `SMALLDATETIME` 转换为其他 `DATETIME` 数据类型时，请记住，任何额外所需的精度都将记录为 0。虽然使用 `SMALLDATETIME`
    可能很诱人，但此数据类型不符合 ANSI 标准。如前所述，此数据类型的分钟将根据为秒传递的值进行四舍五入。如果传递的秒小于或等于 29.998，则分钟将向下舍入。否则，分钟将向上舍入。与日期和时间数据类型一样，`SMALLDATETIME`
    也不感知时区或夏令时。


    可用的选项不仅仅是 `SMALLDATETIME`。`DATETIME` 是一个比前面提到的数据类型精度更高的选项。使用此数据类型时还需要考虑几个关键点。


    虽然 `DATETIME` 数据类型可以记录特定的日期和时间，但它可能不符合 SQL 标准。此数据类型的一个关键问题与其准确性限制有关。`DATETIME`
    数据类型可以为小数秒记录三位小数；第三位小数总是四舍五入到以 `.000`、`.003` 或 `.007` 结尾的增量。


    如果未指定值，`DATETIME` 的默认值为 `1900-01-01 00:00:00`。使用此数据类型时，有多种数字和字母格式可用。`DATETIME`
    的年份范围是 `1753-01-01` 到 `2999-11-31`，时间范围可以从 `00:00:00.000` 到 `23:59:59.997`。此数据类型的大小为
    8 字节，字符长度范围从 19 到 26。


    虽然可以将其他数据类型转换为 `DATETIME`，但不推荐这样做，因为此数据类型不符合 SQL 标准，也不是 ANSI 兼容的。此数据类型也不感知时区或夏令时。


    `DATETIME2` 数据类型是从 SQL Server 2008 开始添加到 SQL Server 中的。许多应用程序早于 SQL Server 2008，因此尽管
    `DATETIME2` 具有明显的优势，但它不如 `DATETIME` 常用。`DATETIME2` 数据类型比前面提到的数据类型有一些额外的优势。虽然前面提到的一些数据类型具有固定大小，但此数据类型的功能略有不同。您还将了解存储和格式化此数据类型的可用选项。


    `DATETIME2` 数据类型允许记录特定的日期和时间，精度高达 100 纳秒。`DATETIME2` 的默认值为 `1900-01-01 00:00:00`。由于这种精度水平，这是在时间必须精确到小数秒的场景中使用的绝佳数据类型。由于
    `DATETIME2` 没有与 `DATETIME` 相同的舍入问题，因此在编写代码时使用此数据类型也更加直接。'
  raw: '### TIME


    Another data type related to when an action happened is the TIME data type. TIME
    can be used to record a specific time when a transaction or activity occurred.
    It is useful to understand how time is stored and formatted. When using the TIME
    data type, it is helpful to know the implications of converting the data type
    to other DATE and DATETIME data types. There are also some limitations when using
    the TIME data type.


    TIME can be used to record a specific time when a transaction or activity occurred.
    When this happens, the time is recorded independently of the date and the date
    may not be able to be determined in the future. One way around this issue is to
    store the date separately from the time. The accuracy of TIME is up to 100 nanoseconds,
    and the default value for TIME is 00:00:00.


    The default format for TIME is hh:mm:ss[.nnnnnnn]. In this format, hh stands for
    a two-digit hour ranging from 0 to 23, mm for a two-digit minute ranging from
    0 to 59, and ss for a two-digit second from 0 to 59\. The TIME data type allows
    for varying precision and, if specified, up to seven decimal places can be used
    for fractional seconds as represented by nnnnnnn. These values can range from
    0 to 9999999.


    Due to how AM and PM are used to differentiate between morning and evening, there
    are additional considerations when working with TIME. If AM or PM is not provided
    and the value for hour is between 00 and 11, the time will be recorded as AM.
    For hours 12 to 23, the time will be saved as PM. When writing TIME, if 12 AM
    is entered, this value will be converted to the 0 hour.


    The range of TIME is 00:00:00.0000000 to 23:59:59.9999999\. The character length
    can vary from 8 to 16 digits, depending on the precision specified for TIME. In
    either scenario, TIME is saved as fixed 5 bytes. If TIME is converted to any data
    type with a date and time, the day value is represented as 1900-01-01\. If the
    fractional precision is higher for TIME than the new data type, the value is truncated.
    Any attempt to convert the TIME data type to a DATE will fail. Like DATE, TIME
    is neither time zone nor DST aware.


    ### SMALLDATETIME, DATETIME, DATETIME2, and DATETIMEOFFSET


    There are occasions when saving the date or time may not be enough. For these
    scenarios, it may be best to combine the date and time values together. Sometimes
    these values can be somewhat simpler, need more precision, or need to be time
    zone aware.


    One such data type is the SMALLDATETIME. This data type is used to record both
    a specific date and time. It has a default value of 1900-01-01 00:00:00\. This
    data type is accurate to one minute. While you can pass in seconds, they will
    always be rounded to the nearest minute.


    As with the date data type, the SMALLDATETIME data type can be displayed in a
    variety of numeric and alphabetical formats. The range for the SMALLDATETIME is
    somewhat limited as compared to other DATE and DATETIME data types. The day portion
    of this data type can span 1900-01-01 to 2079-06-06\. While the time entered can
    range from 00:00:00 to 23:59:59, the value saved in the database will be 00:00:00
    to 23:59:00\. The overall length of the SMALLDATETIME is up to 19 characters,
    and the storage size required is a total of 4 fixed bytes.


    When converting SMALLDATETIME to other DATETIME data types, keep in mind that
    any additional precision needed will be recorded with 0s. While it may be tempting
    to use the SMALLDATETIME, this data type is not ANSI-compliant. As stated previously,
    the minutes for this data type will be rounded depending on the value passed for
    the seconds. If the seconds passed are less than or equal to 29.998, the minute
    will be rounded down. Otherwise, the minute will be rounded up. Like the date
    and time data types, SMALLDATETIME is also not time zone or DST aware.


    There are more options available than just SMALLDATETIME. DATETIME is an option
    for a higher level of precision than the previously mentioned data types. There
    are also several key considerations when using this data type.


    While the DATETIME data type can record a specific day and time, it may not comply
    with the SQL Standard. One of the key issues with this data type has to do with
    the limitations related to accuracy. The DATETIME data type can record three decimal
    places for fractional seconds; the third decimal place is always rounded to an
    increment ending in .000, .003, or .007.


    If a value is not specified, the default for DATETIME is 1900-01-01 00:00:00\.
    There are many numeric and alphabetical formats available when using this data
    type. The year range for DATETIME is 1753-01-01 to 2999-11-31, and the time can
    range from 00:00:00.000 to 23:59:59.997. The size of this data type is 8 bytes
    with a character length ranging from 19 to 26.


    While it is possible to convert other data types to DATETIME, it is not recommended
    as this data type does not meet SQL Standards and is not ANSI-compliant. This
    data type is also not time zone or DST aware.


    The DATETIME2 data type was added to SQL Server starting with SQL Server 2008\.
    Many applications predate SQL Server 2008 so it is not as commonly used as DATETIME
    despite its obvious advantages. The DATETIME2 data type has some additional advantages
    over the data types previously mentioned. While some of the previously mentioned
    data types have a fixed size, this data type functions a little differently. You
    will also learn the options available for storing and formatting this data type.


    The DATETIME2 data type allows for a specific date and time to be recorded with
    an accuracy of up to 100 nanoseconds. The default value for DATETIME2 is 1900-01-01
    00:00:00\. Due to this level of precision, this is a great data type to use for
    scenarios where the time must be known to a fraction of a second. As DATETIME2
    doesn’t have the same rounding issues as DATETIME, it is also more straightforward
    to work with this data type when writing code.'
