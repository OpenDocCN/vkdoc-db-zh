  raw: '## Writing Code for Data Sets


    Previously, I discussed how to start thinking about your data as data sets instead
    of individual records. I frequently use data sets when selecting, updating, or
    deleting data. While most application code inserts single records at a time, there
    are many common scenarios where inserting data as a data set may be helpful. In
    this next section, I will walk through various scenarios where you may want to
    think about your data as sets instead of individual records.


    The most frequent use for data sets is when you want to view a portion of data.
    Ideally, these data sets are selected based upon specific criteria. This is not
    only good for performance but can also help make sure you are only looking at
    the specific data that you want. For most scenarios, it does not even make sense
    to retrieve and display one individual record at a time. Oftentimes, if you find
    yourself in a situation where you are selecting one record at a time, it is a
    good indication that you may want to see if that T-SQL code can be rewritten to
    use set-based logic.


    There are more complex ways that queries can be selected. In some cases, you may
    find yourself wanting to combine or compare two different data sets. If you want
    to join two data sets together, you have the option of UNION or UNION ALL. There
    is only one small but important difference between them. Referring back to Table
    [5-2](#480547_2_En_5_Chapter.xhtml#Tab2), I identified two different sets of data,
    one based on the city name and the other based on part of the address. In the
    following example, I will show one method you can use to find results that contain
    both of these data sets. When you UNION data, each record returned will be distinct
    between the SELECT statements that are joined together. Listing [5-8](#480547_2_En_5_Chapter.xhtml#PC8)
    shows a UNION between two queries.


    ```

    SELECT FirstName, LastName

    FROM dbo.Customer

    WHERE City = ''Memphis''

    UNION

    SELECT FirstName, LastName

    FROM dbo.Customer

    WHERE [Address] LIKE ''%de%'';

