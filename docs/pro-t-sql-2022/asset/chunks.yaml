- fmt: '## Using Complex Logic


    There are some basic operations in SQL Server that are not significantly complex.
    These basic operations can include inserting, reading, updating, and deleting
    tables from single tables and may be referred to as CRUD (create, read, update,
    and delete) operations. Some of these operations may involve a couple of joins,
    but at some point in time, there may be a need for more complex logic. One of
    the challenges that happens while working with T-SQL is dealing with complex logic.


    ## Breaking Down the Request


    When dealing with complex logic, it is important to keep a couple of things in
    mind. The first step in dealing with complex logic is breaking down the request
    into smaller parts. Part of this logic is to figure out what data you need to
    start with and how to whittle that data down into a smaller data set. You also
    want to focus on taking all the requirements and breaking them down into simplified
    steps.


    Many of these query requests can involve either dealing with databases that were
    not designed to take advantage of the strengths of relational databases and systems
    that were not designed to be integrated or interacting with legacy applications.
    Oftentimes, we do not have control over what we are requested to do, and we are
    lucky if we get to design how the data is stored in the database.


    ## Coding Methodologies and Performance Balance


    These types of scenarios can also involve various types of coding methodologies
    that do not necessarily coincide with best practices. This includes needing to
    loop through data including recursion. There are also times when you may want
    to use correlated subqueries or work with various strings such as XML or JSON.
    While many of these options may seem like they are the perfect solution, many
    are overly complex. This is where the balancing act between making T-SQL code
    easy to understand and having T-SQL code that performs well can be tricky. The
    goal is to show how using what seems like more advanced query techniques may be
    contributing to poor performance in your applications.


    It is often tempting to write your code in a way that matches the specific acceptance
    criteria or business request. Sometimes this will work well, and you will end
    up with code that performs very well. In other instances, not only can trying
    to write to solve complex problem be difficult and frustrating, but if the T-SQL
    code is not written in a way that works best for SQL Server, you have the potential
    for significant performance issues. I have found that SQL Server generally works
    best if I keep my code simple and straightforward. This also means that using
    new functionality in SQL Server may not always yield the best results in terms
    of performance, even if the code is easier to write.


    ## Common Performance Pitfall: Loops


    The most common case I see where the T-SQL code does not always consider how SQL
    Server performs best is involving loops. SQL Server allows many options for looping
    through data, and while the code will return the correct results, I often find
    the cost on SQL Server more significant than figuring out a different way of interacting
    with the same data. I’ve taken the code from Listing 2-29 from Chapter [2](#480547_2_En_2_Chapter.xhtml)
    and repeated the same logic in Listing [4-13](#480547_2_En_4_Chapter.xhtml#PC14).


    ```

    SET NOCOUNT ON;

    DECLARE @ProductID INT,

    @ProductName VARCHAR(25),

    @message VARCHAR(50);

    PRINT ''-------- Product Listing --------'';

    DECLARE product_cursor CURSOR DYNAMIC

    FOR

    SELECT ProductID, ProductName

    FROM dbo.Product;

    OPEN product_cursor;

    FETCH NEXT FROM product_cursor

    INTO @ProductID, @ProductName;

    WHILE @@FETCH_STATUS = 0

    BEGIN

    PRINT '' '';

    SELECT @message = ''----- Customers For Products: '' + @ProductName + ''-----'';

    PRINT @message;

    SELECT LEFT(cus.FirstName, 25), LEFT(cus.LastName, 25), SUM(dtl.QuantitySold)
    AS QuantitySold

    FROM dbo.CustomerOrder ord

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    INNER JOIN dbo.Product prd

    ON dtl.ProductID = prd.ProductID

    INNER JOIN dbo.Customer cus

    ON ord.CustomerID = cus.CustomerID

    WHERE prd.ProductID = @ProductID

    GROUP BY cus.FirstName, cus.LastName, prd.ProductName;

    FETCH NEXT FROM product_cursor INTO @ProductID, @ProductName;

    END

    CLOSE product_cursor;

    DEALLOCATE product_cursor;

    Listing 4-13

    Creating a Dynamic Cursor

    ```


    This query will give us the exact results we want, but SQL Server will have to
    repeat the logic inside the cursor for each row that the cursor is analyzing.
    When the query logic inside the cursor is written well, there can be minimal impact.
    However, the real challenges happen when the T-SQL code inside the query either
    performs slowly or uses a significant amount of hardware. Then the server may
    use more resources, causing the speed of the query to slow down and potentially
    causing issues with your applications if the query takes longer than your application
    timeout period. While it is easy to blame cursors specifically, other scenarios
    like WHILE loops, not cursors, may still cause performance issues.


    ## Potential for Degradation and Alternative Approaches


    Another of the larger struggles is that even if the code performs well when it
    is first created, there is the potential for the performance of this code to decrease
    over time as the database grows or the shape of the data changes. In these situations,
    what once appeared to be a great solution can quickly become one of the largest
    headaches. There are some options to get the same output by writing the T-SQL
    code in a manner that is more efficient and less resource intensive.


    When working through complex logic, it may be beneficial to take notes and try
    to break the problem into smaller steps. In Listing [4-14](#480547_2_En_4_Chapter.xhtml#PC15),
    you will see comments that outline the steps needed to get the same data output
    as would be returned in Listing [4-13](#480547_2_En_4_Chapter.xhtml#PC14).


    ```

    -- Create Report Heading for All Products

    -- Repeat the following per product

    ---- Create Section Subheading per Product

    ---- List All Customers with Quantity Sold Per Product

    Listing 4-14

    Simplifying T-SQL Code Logic with Comments

    ```


    Ideally, the process of breaking the acceptance criteria down allows you to focus
    on where to start minimizing data accessed. Look at the query from two different
    perspectives. The first is to determine how to start paring the data down to only
    the data needed in the result. I usually try to do that as early as possible in
    my query design. I also try to look for the sections where I know the T-SQL code
    needed will be simple.


    When referring to Listing [4-15](#480547_2_En_4_Chapter.xhtml#PC16), the acceptance
    criteria shows all customers that bought a product. An additional requirement
    is to show a header with the receipt name for each product. It is important to
    note that this example has been created to show how to improve performance using
    different coding techniques with T-SQL. If you have received a request to write
    T-SQL code like this, you may want to work with your internal teams to see if
    this can be handled differently. It is better to focus on the easiest part of
    the query first. In this case, getting a list of all customers per product is
    the simplest code set of requirements, so see Listing [4-15](#480547_2_En_4_Chapter.xhtml#PC16).'
