- fmt: '### Application Rules


    Using application rules consists of creating a place to store all of the available
    application rules and their statuses. In Chapter 14, the T-SQL to create a table
    for application rules was shown in Listing 14-9. For reference, this code is shown
    here in Listing 15-1.


    ```sql

    CREATE TABLE dbo.ApplicationRule

    (

    ApplicationRuleID              INT           IDENTITY(1,1)  NOT NULL,

    ApplicationRuleDescription     VARCHAR(50)                  NOT NULL,

    IsActive                       BIT

    CONSTRAINT DF_ApplicationRule_IsActive    DEFAULT 1      NOT NULL,

    DateCreated                    DATETIME2(2)

    CONSTRAINT DF_ApplicationRule_DateCreated DEFAULT SYSDATETIME() NOT NULL,

    DateModified                   DATETIME2(2)

    CONSTRAINT DF_ApplicationRule_DateModified DEFAULT SYSDATETIME() NULL,

    CONSTRAINT PK_ApplicationRule_ApplicationRuleID

    PRIMARY KEY CLUSTERED (ApplicationRuleID)

    );

    Listing 15-1

    Creating an Application Rule Table

    ```


    You will notice the code above varies slightly as there are now default constraints
    for the `IsActive`, `DateCreated`, and `DateModified` columns. Now that you have
    a place to store application rules, you can insert your first rule. Listing 15-2
    shows the code to create the application rule.


    ```sql

    INSERT INTO dbo.ApplicationRule (ApplicationRuleDescription)

    VALUES (''Show only active customers'');

    Listing 15-2

    Populating an Application Rule Table

    ```


    Once you’ve inserted the record, this application rule will exist in the `dbo.ApplicationRule`
    table. Table 15-1 shows what you should expect to find in the database.


    **Table 15-1 Application Rule Table**


    | ApplicationRuleID | ApplicationRuleDescription | IsActive | DateCreated | DateModifed
    |

    | --- | --- | --- | --- | --- |

    | 1 | Show only active customers | 1 | 2023-04-12 | 2023-04-12 |


    These concepts were discussed in Chapter 14, and this section will continue to
    walk through the entire process. In Chapter 12, there were two examples of a stored
    procedure named `dbo.GetCustomer` in Listing 12-2 and Listing 12-3. The difference
    between these two was the addition of a `WHERE` clause of where `IsActive = 1`.
    Listing 15-3 shows the original T-SQL code for the stored procedure.


    ```sql

    /*-------------------------------------------------------------*\

    Name:             dbo.GetCustomer

    Author:           Elizabeth Noble

    Created Date:     2022-10-30

    Description:      Get a list of all customers in the databases

    Sample Usage:

    EXECUTE dbo.GetCustomer;

    \*-------------------------------------------------------------*/

    CREATE OR ALTER PROCEDURE dbo.GetCustomer

    AS

    SELECT

    CustomerID,

    FirstName,

    LastName,

    Address,

    City,

    PostalCode,

    Country,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Customer;

    Listing 15-3

    Original Stored Procedure

    ```


    When we discussed modifying the stored procedure in Listing 15-3 in Chapter 12,
    we only included adding a line item at the end of the query to hardcode changing
    the store procedure to only allow active customers. However, you may want to deploy
    this change prior to when the application is ready for this change. Fortunately,
    there is a way to toggle this functionality within the stored procedure. Listing
    15-4 shows the updated stored procedure so that the application rule table determines
    if all customers or only active customers are shown.


    ```sql

    /*-------------------------------------------------------------*\

    Name:             dbo.GetCustomer

    Author:           Elizabeth Noble

    Created Date:     2022-10-30

    Description:      Get a list of all customers in the databases

    Updated Date      2023-04-12

    Description:      Updated to use IsActive application rule

    Sample Usage:

    EXECUTE dbo.GetCustomer;

    \*-------------------------------------------------------------*/

    CREATE OR ALTER PROCEDURE dbo.GetCustomer

    AS

    DECLARE @OnlyActive BIT;

    SELECT @OnlyActive = IsActive

    FROM dbo.ApplicationRule

    -- This is the hardcoded value for ''Show only active customers''

    ---- If ApplicationRuleID 1 is enabled, @OnlyActive = 1

    ---- If ApplicationRuleID 1 is disabled, @OnlyActive = 0

    WHERE ApplicationRuleID = 1;

    SELECT

    CustomerID,

    FirstName,

    LastName,

    Address,

    City,

    PostalCode,

    Country,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Customer

    -- Stored procedure will always show Active customers

    WHERE IsActive = 1

    -- This will use 1 if ApplicationRule 1 is enabled

    ---- This will return only active customers

    -- This will use 0 if ApplicationRule 1 is disabled

    ---- This will return inactive customers

    AND IsActive = @OnlyActive;

    Listing 15-4

    Stored Procedure Using an Application Rule

    ```


    At some point in the future, you may decide that the application rule is no longer
    needed. When this happens, you can update the stored procedure to remove the dependency
    on the application rule. In this scenario, let’s update the stored procedure to
    only show active customers, as indicated in Listing 15-5.


    ```sql

    /*-------------------------------------------------------------*\

    Name:             dbo.GetCustomer

    Author:           Elizabeth Noble

    Created Date:     2022-10-30

    Description:      Get a list of all customers in the databases

    Updated Date      2023-04-12

    Description:      Updated to use IsActive application rule

    Updated Date      2023-06-13

    Description:      Updated only show IsActive customers

    Sample Usage:

    EXECUTE dbo.GetCustomer;

    \*-------------------------------------------------------------*/

    CREATE OR ALTER PROCEDURE dbo.GetCustomer

    AS

    SELECT

    CustomerID,

    FirstName,

    LastName,

    Address,

    City,

    PostalCode,

    Country,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Customer

    -- Stored procedure will always show Active customers

    WHERE IsActive = 1;

    Listing 15-5

    Stored Procedure Using an Application Rule

    ```


    Application rules can be applied to other T-SQL database objects where input parameters
    are not supported, such as views. Listing 15-6 shows how you can control the functionality
    of a view with an application rule.


    ```sql

    CREATE OR ALTER VIEW dbo.vwCustomer

    AS

    SELECT

    CustomerID,

    FirstName,

    LastName,

    Address,

    City,

    PostalCode,

    Country,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Customer

    -- This view will always show Active customers

    WHERE

    -- This is the hardcoded value for

    -- ''Show only active customers''

    IsActive = 1

    -- This will use 1 if ApplicationRule 1 is enabled

    ---- This will return only active customers

    -- This will use 0 if ApplicationRule 1 is disabled

    ---- This will return inactive customers

    AND IsActive =

    (

    SELECT IsActive

    FROM dbo.ApplicationRule

    WHERE ApplicationRuleID = 1

    );

    Listing 15-6

    View Using an Application Rule

    ```


    This is one way to toggle functionality. Another option is the use of feature
    flags, as discussed in Chapter 12. They are conceptually similar to application
    rules. However, in many cases there may be an external piece of code that determines
    if the new functionality should be toggled on or off.'
  raw: '### Application Rules


    Using application rules consists of creating a place to store all of the available
    application rules and their statuses. In Chapter [14](#480547_2_En_14_Chapter.xhtml),
    the T-SQL to create a table for application rules was shown in Listing [14-9](#480547_2_En_14_Chapter.xhtml#PC9).
    For reference, this code is shown here in Listing [15-1](#480547_2_En_15_Chapter.xhtml#PC1).


    ```

    CREATE TABLE dbo.ApplicationRule

    (

    ApplicationRuleID              INT           IDENTITY(1,1)  NOT NULL,

    ApplicationRuleDescription     VARCHAR(50)                  NOT NULL,

    IsActive                       BIT

    CONSTRAINT DF_ApplicationRule_IsActive    DEFAULT 1      NOT NULL,

    DateCreated                    DATETIME2(2)

    CONSTRAINT DF_ApplicationRule_DateCreated DEFAULT SYSDATETIME() NOT NULL,

    DateModified                   DATETIME2(2)

    CONSTRAINT DF_ApplicationRule_DateModified DEFAULT SYSDATETIME() NULL,

    CONSTRAINT PK_ApplicationRule_ApplicationRuleID

    PRIMARY KEY CLUSTERED (ApplicationRuleID)

    );

    Listing 15-1

    Creating an Application Rule Table

    ```


    You will notice the code above varies slightly as there are now default constraints
    for the `IsActive`, `DateCreated`, and `DataModified` columns. Now that you have
    a place to store application rules, you can insert your first rule. Listing [15-2](#480547_2_En_15_Chapter.xhtml#PC2)
    shows the code to create the application rule.


    ```

    INSERT INTO dbo.ApplicationRule (ApplicationRuleDescription)

    VALUES (''Show only active customers'');

    Listing 15-2

    Populating an Application Rule Table

    ```


    Once you’ve inserted the record, this application rule will exist in the `dbo.ApplicationRule`
    table. Table [15-1](#480547_2_En_15_Chapter.xhtml#Tab1) shows what you should
    expect to find in the database.


    Table 15-1


    Application Rule Table


    | Application RuleID | ApplicationRule Description | IsActive | DateCreated |
    DateModifed |

    | --- | --- | --- | --- | --- |

    | 1 | Show only active customers | 1 | 2023-04-12 | 2023-04-12 |


    These concepts were discussed in Chapter [14](#480547_2_En_14_Chapter.xhtml),
    and this section will continue to walk through the entire process. In Chapter
    [12](#480547_2_En_12_Chapter.xhtml), there were two examples of a stored procedure
    named `dbo.GetCustomer` in Listing [12-2](#480547_2_En_12_Chapter.xhtml#PC2) and
    Listing [12-3](#480547_2_En_12_Chapter.xhtml#PC3). The difference between these
    two was the addition of a WHERE clause of where `IsActive = 1`. Listing [15-3](#480547_2_En_15_Chapter.xhtml#PC3)
    shows the original T-SQL code for the stored procedure.


    ```

    /*-------------------------------------------------------------*\

    Name:             dbo.GetCustomer

    Author:           Elizabeth Noble

    Created Date:     2022-10-30

    Description:      Get a list of all customers in the databases

    Sample Usage:

    EXECUTE dbo.GetCustomer;

    \*-------------------------------------------------------------*/

    CREATE OR ALTER PROCEDURE dbo.GetCustomer

    AS

    SELECT

    CustomerID,

    FirstName,

    LastName,

    Address,

    City,

    PostalCode,

    Country,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Customer;

    Listing 15-3

    Original Stored Procedure

    ```


    When we discussed modifying the stored procedure in Listing [15-3](#480547_2_En_15_Chapter.xhtml#PC3)
    in Chapter [12](#480547_2_En_12_Chapter.xhtml), we only included adding a line
    item at the end of the query to hardcode changing the store procedure to only
    allow active customers. However, you may want to deploy this change prior to when
    the application is ready for this change. Fortunately, there is a way to toggle
    this functionality within the stored procedure. Listing [15-4](#480547_2_En_15_Chapter.xhtml#PC4)
    shows the updated stored procedure so that the application rule table determines
    if all customers or only active customers are shown.


    ```

    /*-------------------------------------------------------------*\

    Name:             dbo.GetCustomer

    Author:           Elizabeth Noble

    Created Date:     2022-10-30

    Description:      Get a list of all customers in the databases

    Updated Date      2023-04-12

    Description:      Updated to use IsActive application rule

    Sample Usage:

    EXECUTE dbo.GetCustomer;

    \*-------------------------------------------------------------*/

    CREATE OR ALTER PROCEDURE dbo.GetCustomer

    AS

    DECLARE @OnlyActive BIT;

    SELECT @OnlyActive = IsActive

    FROM dbo.ApplicationRule

    -- This is the hardcoded value for ''Show only active customers''

    ---- If ApplicationRuleID 1 is enabled, @OnlyActive = 1

    ---- If ApplicationRuleID 1 is disabled, @OnlyActive = 0

    WHERE ApplicationRuleID = 1;

    SELECT

    CustomerID,

    FirstName,

    LastName,

    Address,

    City,

    PostalCode,

    Country,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Customer

    -- Stored procedure will always show Active customers

    WHERE IsActive = 1

    -- This will use 1 if ApplicationRule 1 is enabled

    ---- This will return only active customers

    -- This will use 0 if ApplicationRule 1 is disabled

    ---- This will return inactive customers

    AND IsActive = @OnlyActive;

    Listing 15-4

    Stored Procedure Using an Application Rule

    ```


    At some point in the future, you may decide that the application rule is no longer
    needed. When this happens, you can update the stored procedure to remove the dependency
    on the application rule. In this scenario, let’s update the stored procedure to
    only show active customers, as indicated in Listing [15-5](#480547_2_En_15_Chapter.xhtml#PC5).


    ```

    /*-------------------------------------------------------------*\

    Name:             dbo.GetCustomer

    Author:           Elizabeth Noble

    Created Date:     2022-10-30

    Description:      Get a list of all customers in the databases

    Updated Date      2023-04-12

    Description:      Updated to use IsActive application rule

    Updated Date      2023-06-13

    Description:      Updated only show IsActive customers

    Sample Usage:

    EXECUTE dbo.GetCustomer;

    \*-------------------------------------------------------------*/

    CREATE OR ALTER PROCEDURE dbo.GetCustomer

    AS

    SELECT

    CustomerID,

    FirstName,

    LastName,

    Address,

    City,

    PostalCode,

    Country,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Customer

    -- Stored procedure will always show Active customers

    WHERE IsActive = 1;

    Listing 15-5

    Stored Procedure Using an Application Rule

    ```


    Application rules can be applied to other T-SQL database objects where input parameters
    are not supported, such as views. Listing [15-6](#480547_2_En_15_Chapter.xhtml#PC6)
    shows how you can control the functionality of a view with an application rule.


    ```

    CREATE OR ALTER VIEW dbo.vwCustomer

    AS

    SELECT

    CustomerID,

    FirstName,

    LastName,

    Address,

    City,

    PostalCode,

    Country,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Customer

    -- This view will always show Active customers

    WHERE

    -- This is the hardcoded value for

    -- ''Show only active customers''

    IsActive = 1

    -- This will use 1 if ApplicationRule 1 is enabled

    ---- This will return only active customers

    -- This will use 0 if ApplicationRule 1 is disabled

    ---- This will return inactive customers

    AND IsActive =

    (

    SELECT IsActive

    FROM dbo.ApplicationRule

    WHERE ApplicationRuleID = 1

    );

    Listing 15-6

    View Using an Application Rule

    ```


    This is one way to toggle functionality. Another option is the use of feature
    flags, as discussed in Chapter [12](#480547_2_En_12_Chapter.xhtml). They are conceptually
    similar to application rules. However, in many cases there may be an external
    piece of code that determines if the new functionality should be toggled on or
    off.'
  trans: '### 应用规则


    使用应用规则包括创建一个存储所有可用应用规则及其状态的地方。在第 14 章中，清单 14-9 展示了为应用规则创建表的 T-SQL。作为参考，此代码在清单
    15-1 中再次展示。


    ```sql

    CREATE TABLE dbo.ApplicationRule

    (

    ApplicationRuleID              INT           IDENTITY(1,1)  NOT NULL,

    ApplicationRuleDescription     VARCHAR(50)                  NOT NULL,

    IsActive                       BIT

    CONSTRAINT DF_ApplicationRule_IsActive    DEFAULT 1      NOT NULL,

    DateCreated                    DATETIME2(2)

    CONSTRAINT DF_ApplicationRule_DateCreated DEFAULT SYSDATETIME() NOT NULL,

    DateModified                   DATETIME2(2)

    CONSTRAINT DF_ApplicationRule_DateModified DEFAULT SYSDATETIME() NULL,

    CONSTRAINT PK_ApplicationRule_ApplicationRuleID

    PRIMARY KEY CLUSTERED (ApplicationRuleID)

    );

    清单 15-1

    创建应用规则表

    ```


    您会注意到上面的代码略有不同，因为现在为 `IsActive`、`DateCreated` 和 `DateModified` 列添加了默认约束。既然现在有了存储应用规则的地方，就可以插入您的第一条规则了。清单
    15-2 展示了创建应用规则的代码。


    ```sql

    INSERT INTO dbo.ApplicationRule (ApplicationRuleDescription)

    VALUES (''仅显示活跃客户'');

    清单 15-2

    填充应用规则表

    ```


    一旦插入了记录，这条应用规则就会存在于 `dbo.ApplicationRule` 表中。表 15-1 展示了您应该期望在数据库中看到的内容。


    **表 15-1 应用规则表**


    | ApplicationRuleID | ApplicationRuleDescription | IsActive | DateCreated | DateModifed
    |

    | --- | --- | --- | --- | --- |

    | 1 | 仅显示活跃客户 | 1 | 2023-04-12 | 2023-04-12 |


    这些概念已在第 14 章讨论过，本节将继续梳理整个过程。在第 12 章，清单 12-2 和清单 12-3 中有两个名为 `dbo.GetCustomer`
    的存储过程示例。它们之间的区别在于添加了一个 `WHERE` 子句，条件为 `IsActive = 1`。清单 15-3 展示了该存储过程的原始 T-SQL
    代码。


    ```sql

    /*-------------------------------------------------------------*\

    Name:             dbo.GetCustomer

    Author:           Elizabeth Noble

    Created Date:     2022-10-30

    Description:      获取数据库中所有客户的列表

    Sample Usage:

    EXECUTE dbo.GetCustomer;

    \*-------------------------------------------------------------*/

    CREATE OR ALTER PROCEDURE dbo.GetCustomer

    AS

    SELECT

    CustomerID,

    FirstName,

    LastName,

    Address,

    City,

    PostalCode,

    Country,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Customer;

    清单 15-3

    原始存储过程

    ```


    当我们在第 12 章讨论修改清单 15-3 中的存储过程时，我们只包括在查询末尾添加一个硬编码的行项，以更改存储过程使其仅允许活跃客户。然而，您可能希望在应用程序准备好进行此更改之前部署这个变更。幸运的是，有一种方法可以在存储过程内切换此功能。清单
    15-4 展示了更新后的存储过程，以便应用规则表决定是显示所有客户还是仅显示活跃客户。


    ```sql

    /*-------------------------------------------------------------*\

    Name:             dbo.GetCustomer

    Author:           Elizabeth Noble

    Created Date:     2022-10-30

    Description:      获取数据库中所有客户的列表

    Updated Date      2023-04-12

    Description:      更新为使用 IsActive 应用规则

    Sample Usage:

    EXECUTE dbo.GetCustomer;

    \*-------------------------------------------------------------*/

    CREATE OR ALTER PROCEDURE dbo.GetCustomer

    AS

    DECLARE @OnlyActive BIT;

    SELECT @OnlyActive = IsActive

    FROM dbo.ApplicationRule

    -- 这是''仅显示活跃客户''的硬编码值

    ---- 如果 ApplicationRuleID 1 启用，则 @OnlyActive = 1

    ---- 如果 ApplicationRuleID 1 禁用，则 @OnlyActive = 0

    WHERE ApplicationRuleID = 1;

    SELECT

    CustomerID,

    FirstName,

    LastName,

    Address,

    City,

    PostalCode,

    Country,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Customer

    -- 存储过程将始终显示活跃客户

    WHERE IsActive = 1

    -- 如果应用规则 1 启用，则使用 1

    ---- 这将只返回活跃客户

    -- 如果应用规则 1 禁用，则使用 0

    ---- 这将返回非活跃客户

    AND IsActive = @OnlyActive;

    清单 15-4

    使用应用规则的存储过程

    ```


    在未来的某个时刻，您可能会决定不再需要该应用规则。当这种情况发生时，您可以更新存储过程以移除对应用规则的依赖。在此场景下，让我们将存储过程更新为仅显示活跃客户，如清单
    15-5 所示。


    ```sql

    /*-------------------------------------------------------------*\

    Name:             dbo.GetCustomer

    Author:           Elizabeth Noble

    Created Date:     2022-10-30

    Description:      获取数据库中所有客户的列表

    Updated Date      2023-04-12

    Description:      更新为使用 IsActive 应用规则

    Updated Date      2023-06-13

    Description:      更新为仅显示 IsActive 客户

    Sample Usage:

    EXECUTE dbo.GetCustomer;

    \*-------------------------------------------------------------*/

    CREATE OR ALTER PROCEDURE dbo.GetCustomer

    AS

    SELECT

    CustomerID,

    FirstName,

    LastName,

    Address,

    City,

    PostalCode,

    Country,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Customer

    -- 存储过程将始终显示活跃客户

    WHERE IsActive = 1;

    清单 15-5

    使用应用规则的存储过程

    ```


    应用规则可以应用于其他不支持输入参数的 T-SQL 数据库对象，例如视图。清单 15-6 展示了如何使用应用规则来控制视图的功能。


    ```sql

    CREATE OR ALTER VIEW dbo.vwCustomer

    AS

    SELECT

    CustomerID,

    FirstName,

    LastName,

    Address,

    City,

    PostalCode,

    Country,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Customer

    -- 此视图将始终显示活跃客户

    WHERE

    -- 这是

    -- ''仅显示活跃客户''的硬编码值

    IsActive = 1

    -- 如果应用规则 1 启用，则使用 1

    ---- 这将只返回活跃客户

    -- 如果应用规则 1 禁用，则使用 0

    ---- 这将返回非活跃客户

    AND IsActive =

    (

    SELECT IsActive

    FROM dbo.ApplicationRule

    WHERE ApplicationRuleID = 1

    );

    清单 15-6

    使用应用规则的视图

    ```


    这是一种切换功能的方法。另一种选择是使用功能标志，如第 12 章所讨论。它们在概念上与应用规则相似。然而，在许多情况下，可能存在一段外部代码来决定是否应启用或关闭新功能。'
- fmt: '### Feature Flags


    When using a feature flag, you can add an input parameter to your stored procedure
    that can control the behavior of the T-SQL code. Listing 15-7 shows the stored
    procedure `dbo.Customer` from Listing 15-3 updated to use feature flags.


    ```sql

    /*-------------------------------------------------------------*\

    Name:             dbo.GetCustomer

    Author:           Elizabeth Noble

    Created Date:     2022-10-30

    Description:      Get a list of all customers in the databases

    Updated Date      2023-04-12

    Description:      Updated to use IsActive feature flag

    Sample Usage:

    EXECUTE dbo.GetCustomer

    \*-------------------------------------------------------------*/

    CREATE OR ALTER PROCEDURE dbo.GetCustomer

    @OnlyActive BIT = 0 –- Defaults to show all customers

    AS

    SELECT

    CustomerID,

    FirstName,

    LastName,

    Address,

    City,

    PostalCode,

    Country,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Customer

    -- Stored procedure will always show Active customers

    WHERE IsActive = 1

    -- This will use 1 if ApplicationRule 1 is enabled

    ---- This will return only active customers

    -- This will use 0 if ApplicationRule 1 is disabled

    ---- This will return inactive customers

    AND IsActive = @OnlyActive;

    ```

    Listing 15-7

    Stored Procedure Using Feature Flags


    In the stored procedure above, the `@OnlyActive` value is passed into the stored
    procedure. A benefit of using a parameter to toggle functionality in a stored
    procedure is that you can default the value to maintain existing functionality.


    There may also be instances where you want to add data to the database, but you
    may not want the applications to be able to use the data until a future date.
    This can happen when you are migrating or integrating a new business or application
    into an existing database. If you find yourself needing to populate data in a
    table, but you don’t want the data to be accessed, then you may be able to try
    using row-level security. For an additional information on row-level security,
    you can refer to Chapter 21.


    You may find yourself in a situation where you would like to log behavior on a
    table. While it may be ideal to have the application log the information directly,
    this may not be possible. In this case, you may want a trigger to record this
    information. As an example, you can log when a product is added, changed, or deleted
    using triggers. You may want to record when a new product is added as well as
    the login that added the product. Listing 15-8 shows a table to log the behavior
    on the `dbo.Product` table.


    ```sql

    CREATE TABLE dbo.ProductLog(

    ProductLogID     INT                        IDENTITY(1,1)   NOT NULL,

    ProductID        INT                                        NOT NULL,

    ProductName      VARCHAR(25)                                NOT NULL,

    ProductPrice     DECIMAL(6,2)                               NOT NULL,

    IsActive         BIT

    CONSTRAINT DF_ProductLog_IsActive     DEFAULT (1)     NOT NULL,

    DateCreated      DATETIME2(2)

    CONSTRAINT DF_ProductLog_DateCreated  DEFAULT (SYSDATETIME()) NOT NULL,

    DateModified     DATETIME2(2)

    CONSTRAINT DF_ProductLog_DateModified DEFAULT (SYSDATETIME()) NOT NULL,

    DateDisabled     DATETIME2(2)                                   NULL,

    CONSTRAINT PK_ProductLog PRIMARY KEY CLUSTERED (PK_ProductLogID ASC)

    );

    ```

    Listing 15-8

    Creating the ProductLog Table


    Now that you have created the table, you can get add a trigger to the table so
    that when a record is inserted or updated in the `dbo.Product` table, a record
    of the new data will be saved in the `dbo.ProductHistory`. Since there will already
    be a trigger on the table, you can also add logic to update the `DateModified`
    in the `dbo.Product` table. Listing 15-9 shows how to create a trigger that logs
    product changes if a product is inserted or updated.


    ```sql

    CREATE TRIGGER dbo.LogProductHistory

    ON dbo.Product

    AFTER INSERT, UPDATE

    AS

    INSERT INTO dbo.ProductHistory

    (

    ProductID,

    ProductPrice,

    ProductName

    )

    SELECT

    ProductID,

    ProductPrice,

    ProductName

    FROM inserted;

    UPDATE prd

    SET DateModified = SYSDATETIME()

    FROM dbo.Product prd

    INNER JOIN deleted del

    ON prd.ProductID = del.ProductID;

    ```

    Listing 15-9

    Creating the ProductLog Table


    In addition to inserting a record into the `dbo.ProductHistory` table after a
    record has been added or changed, this trigger also updates the `DateModified`
    on the `dbo.Product` table so that there is a record of the when the record was
    most recently changed.


    Like writing any other code, you should test this and confirm the trigger is working
    as expected. To test this trigger, execute the T-SQL from Listing 15-10.


    ```sql

    UPDATE dbo.Product

    SET IsActive = 1

    WHERE ProductID = 5;

    INSERT INTO dbo.Product (ProductName, ProductPrice)

    VALUES (''Kayak'',1299.00);

    ```

    Listing 15-10

    Testing the Insert and Updating the Trigger


    In Listing 15-10, you update `ProductID` of 5 to be active. You also run a separate
    query to insert a new product kayak into the table `dbo.Product`. Since the trigger
    `dbo.LogProductHistory` has been added to the `dbo.Product` table, you expect
    to find two new entries in the `dbo.ProductHistory` table.


    The first query should not only add a record to the `dbo.ProductHistory` table
    but should also update the `DateModified` in the `dbo.Product` table. The second
    query should add a record to the `dbo.ProductHistory` table because a new product
    has been created. Refer to Listing 15-11.


    ```sql

    SELECT ProductLogID,

    ProductID,

    ProductName,

    ProductPrice,

    DateCreated

    FROM dbo.ProductHistory;

    SELECT ProductID,

    ProductName,

    DateCreated,

    DateModified,

    DateDisbled

    FROM dbo.Product

    WHERE ProductID = 5;

    ```

    Listing 15-11

    Checking Results from the Trigger


    After running these queries, you can check the results. As stated, you should
    find two new records in the `dbo.ProductHistory` table. In addition, the `DateModified`
    should be updated in `dbo.Product` for `ProductID` 5. Table 15-2 shows the results
    from the first query.


    Table 15-2

    Product History Results


    | Product Log ID | Product ID | Product Name | Product Price | Date Created |

    | --- | --- | --- | --- | --- |

    | 1 | 5 | Disk Golf Disk - Large | 12.99 | 202304-12 11:58 AM |

    | 2 | 7 | Kayak | 1299.00 | 2023-04-12 11:58 AM |


    Once you have confirmed that the logging portion of the trigger is working as
    expected, you can check to confirm that `DateModified` has been updated in `dbo.Product`.
    The results from the second query above are shown in Table 15-3.


    Table 15-3

    Product Table Update


    | Product ID | Product Name | Date Created | Date Modified | Date Disabled |

    | --- | --- | --- | --- | --- |

    | 5 | Disk Golf Disk - Large | 2023-02-12 8:27 AM | 2023-04-12 11:58 AM | NULL
    |


    This allows you to confirm that the `DateModified` in the `dbo.Product` table
    has been updated as expected.


    Using application rules, feature flags, row-level security, or triggers can be
    useful when trying to implement new functionality for your database. This can
    include changing how stored procedures or other database code functions, limiting
    access to information for certain users, or adding logging to your data tables.
    However, there are also times where you may want to remove existing functionality
    from your database. Continue to the next section for more ideas on how you can
    use T-SQL to manage application enhancements.'
