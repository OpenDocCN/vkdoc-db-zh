  trans: "\n## T-SQL 注释\n\n虽然编写 T-SQL 的主要目的是让应用程序能够对数据执行特定操作，但同样重要的是确保他人能够理解你未来的 T-SQL\
    \ 代码。至少，这能确保你不是唯一一个为某段代码或业务逻辑负责的人。它还有助于你团队的其他成员增强对自己工作能力的信心，并加深对幕后代码的理解。\n\n在许多情况下，快速浏览\
    \ T-SQL 代码或查看数据库对象的名称并不足以理解 T-SQL 代码的用途。清单 3-27 展示了在数据库对象顶部创建头部区域的示例 T-SQL 代码。\n\
    \n```sql\n/*-------------------------------------------------------------*\\\n\
    Name:             \nAuthor:           \nCreated Date:     \nDescription:     \
    \ \nSample Usage:\n\nChange Log:\nUpdate on  by : \nUpdate on  by : \n\\*-------------------------------------------------------------*/\n\
    Listing 3-27\n持久化数据库对象头部的注释\n```\n\n这个头部的目的是让其他用户能够一目了然地了解此数据库对象的概况。审查此 T-SQL\
    \ 的目的不同，对用户重要的信息也会不同。对于那些不熟悉所有业务应用细节的人来说，描述部分会提供关于该 T-SQL 数据库对象用途的高层次概念。同样地，示例用法让那些调查性能问题的人能够了解应用程序如何使用这段\
    \ T-SQL 代码。数据库对象的作者可以帮助确定原始创建者是否仍在公司，以回答有关该数据库对象的更具体问题。如果你的数据库处于源代码控制之下，你可能会选择省略其中一些字段。我将在第\
    \ 11 章进一步讨论源代码控制。在清单 3-28 中，你可以看到创建最初见于清单 3-4 的视图时头部信息的样子。\n\n```sql\n/*-------------------------------------------------------------*\\\
    \nName:             dbo.CustomerProduct\nAuthor:           Elizabeth Noble\nCreated\
    \ Date:     2022-10-31\nDescription:      Simple view to display all customer\
    \ purchases\nSample Usage:\nSELECT FirstName, LastName, ProductName, QuantitySold\n\
    FROM dbo.CustomerProduct;\nChange Log:\nUpdate on 2022-10-31 by enoble: Added\
    \ header to view\n\\*-------------------------------------------------------------*/\n\
    CREATE OR ALTER VIEW dbo.CustomerProduct\nAS\nSELECT cus.FirstName, cus.LastName,\
    \ prd.ProductName, SUM(dtl.QuantitySold) AS QuantitySold\nFROM dbo.CustomerOrder\
    \ ord\nINNER JOIN dbo.OrderDetail dtl\nON ord.CustomerOrderID = dtl.CustomerOrderID\n\
    INNER JOIN dbo.Product prd\nON dtl.ProductID = prd.ProductID\nINNER JOIN dbo.Customer\
    \ cus\nON ord.CustomerID = cus.CustomerID\nGROUP BY cus.FirstName, cus.LastName,\
    \ prd.ProductName;\nListing 3-28\n创建带有注释头部的视图\n```\n\n### 为复杂逻辑添加注释\n\n有时，编写易于阅读的简单\
    \ T-SQL 可能就足够了。然而，也有些时候，数据库对象可能包含难以快速理解的复杂 T-SQL 代码。我发现在编写代码后添加注释的一个挑战是，我的注释往往过于技术化，难以轻松描述我试图实现的目标。你需要确保不熟悉你代码的人也能轻松理解你\
    \ T-SQL 代码的目的。\n\n如果存在任何复杂逻辑，你需要清晰地解释该复杂逻辑是如何工作的。如果你使用了不是最佳实践的 T-SQL 编码方式，这一点尤其重要。任何关于为何选择非标准实践的解释都有助于节省他人的宝贵时间。如果你已经确定标准的最佳实践在特定情况下性能不够好，这也能节省你团队成员的时间。回顾清单\
    \ 3-3，`SELECT`语句中有一个子查询。初次编写这段代码时，使用子查询的原因可能是显而易见的，但未来你可能会忘记。此外，阅读我代码的其他人可能也不会明显看出我为何选择为该列包含一个子查询。在清单\
    \ 3-29 中，我展示了如何添加注释，以便更容易快速理解所编写代码的目的或逻辑。\n\n```sql\n-- 外部查询显示所有购买了包含“board”一词产品的客户\n\
    SELECT\n-- 下面子查询用于显示也购买了类似“board”零件的客户\n---- 所购买的所有零件\n(\nSELECT prd.ProductName\n\
    FROM dbo.CustomerOrder ord\nINNER JOIN dbo.OrderDetail dtl\nON ord.CustomerOrderID\
    \ = dtl.CustomerOrderID\nINNER JOIN dbo.Product prd\nON dtl.ProductID = prd.ProductID\n\
    WHERE ord.CustomerID = bord.CustomerID\nGROUP BY prd.ProductName\n) AS ProductName\n\
    FROM dbo.CustomerOrder bord\nINNER JOIN dbo.OrderDetail bdtl\nON bord.CustomerOrderID\
    \ = bdtl.CustomerOrderID\nINNER JOIN dbo.Product bprd\nON bdtl.ProductID = bprd.ProductID\n\
    WHERE bprd.ProductName LIKE '%board%';\nListing 3-29\n包含子查询的查询\n```\n\n### 先编写注释\n\
    \n如果你在开始编写任何 T-SQL 代码之前就先为 T-SQL 代码添加注释，通常最容易在代码中包含注释。在清单 3-30 中，你可以看到头部信息和起始注释。这些注释指明了编写该存储过程背后的概念。\n\
    \n```sql\n/*-------------------------------------------------------------*\\\n\
    Name:             dbo.GetCustomerPurchase\nAuthor:           Elizabeth Noble\n\
    Created Date:     2022-10-30\nDescription:      Lookup customer information for\
    \ a given product\nSample Usage:\nDECLARE @ProductID INT;\nSET @ProductID = 1;\n\
    EXECUTE dbo.GetCustomerPurchase @ProductID;\n\\*-------------------------------------------------------------*/\n\
    -- 获取出售给客户的产品\n-- 显示总销售数量以及最近的购买日期\n-- 按购买时的产品价格显示购买数量详情\n---- 的详细信息\nListing\
    \ 3-30\n创建新的存储过程\n```\n\n一旦你指定了查询的总体逻辑，就可以继续编写 T-SQL 以满足这些要求。如果你经常发现自己是在重新表述已经写好的代码，而不是解释代码的总体目的，这通常会很有帮助。\n\
    \n在编写任何 T-SQL 代码之前编写这些注释，可以确保注释解释的是存储过程的目的，而不是代码如何执行。\n\n### 总结\n\n你现在应该已经准备好开始为你自己和你的组织定义\
    \ SQL 格式化标准了。这将使你和你团队的成员能够快速审查组织的 T-SQL 代码。此外，我还讨论了在为你的 T-SQL 代码提供额外文档时可以使用的策略。为你的\
    \ T-SQL 代码添加注释，可以让其他人理解 T-SQL 代码在业务逻辑和高级技术逻辑方面应该做什么。我还介绍了在为你的组织定义命名约定时可用的选项。定义良好的命名约定应该使任何访问数据库架构的人都能更容易地知道在哪里找到数据库对象。\n\
    \n你现在应该已经熟悉了第 1 章中的 SQL Server 数据类型以及使用它们的最佳时机。你也应该对编写 T-SQL 时可用的各种数据库对象感到得心应手。既然你更熟悉如何设置代码样式以提高可读性和理解度，你就已经准备好学习更多关于使用参数、复杂逻辑和存储过程设计\
    \ T-SQL 代码的知识了，这些将在下一节中介绍。\n"
- fmt: '# 4. Designing T-SQL


    The focus of building understandable T-SQL is to increase the speed at which you
    can understand code that you have not seen before or seen in a while. As discussed
    in Chapter 1, choosing the right data type can increase the speed of your T-SQL
    code because smaller amounts of data need to be retrieved. As important as formatting
    and data types can be, choosing the correct database objects for your T-SQL code
    can also have an impact on the speed of your applications. This chapter will discuss
    how your query design can affect the speed of your queries.


    When writing T-SQL for your applications, stored procedures are usually the most
    desirable option when it comes to performance. There are many advantages to using
    stored procedures including the possibility of making your code more adaptable
    and reusable. Similarly, using parameters with your code can increase the flexibility
    of your T-SQL code. You can use stored procedures and parameters when designing
    solutions for more complex queries. In addition, you may want to consider other
    techniques when it comes to solving complex issues. There are several items to
    consider when designing T-SQL code including stored procedures, parameters, and
    complex query logic.


    ## Using Stored Procedures


    When writing T-SQL code, there are several ways the code can be written, and this
    can affect how quickly the query executes. The relative speed of the query will
    be slower if there is no execution plan in the plan cache. Being able to use a
    cached execution plan will increase the speed of your queries since SQL Server
    will not have to spend additional resources to determine how to retrieve the data.
    The method SQL Server uses to retrieve the data is called an execution plan and
    it is discussed in more detail in Chapter 8.


    There are several aspects to consider when writing T-SQL code for applications.
    In order to better understand how you want your applications to use T-SQL, it
    may be best to understand how SQL Server handles each of the T-SQL options available.
    When SQL Server executes a query, it must determine how it will go about executing
    that query. Before doing this, SQL Server will check to see if there is already
    an execution plan for this query. How the T-SQL is designed will have some impact
    on how SQL Server verifies that the execution plan is already in place.


    To show how stored procedures, ad hoc queries, and prepared statements affect
    the plan cache, let’s walk through some examples. Using stored procedures will
    allow your T-SQL code to be repeatable, potentially allowing the query plan to
    stay in the cache longer and improving the speed of your query execution. In Listing
    4-1, you can see a statement to create the stored procedure.


    ```

    /*-------------------------------------------------------------*\

    Name:             dbo.GetCustomer

    Author:           Elizabeth Noble

    Created Date:     2022-04-20

    Description:      Get a list of all customers in the databases

    Sample Usage:

    EXECUTE dbo.GetCustomer;

    \*-------------------------------------------------------------*/

    CREATE PROCEDURE dbo.GetCustomer

    AS

    SELECT

    CustomerID,

    FirstName,

    LastName,

    Address,

    City,

    PostalCode,

    Country,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Customer;

    Listing 4-1

    Creating a Stored Procedure

    ```


    In this example, you create a stored procedure that is not parameterized and will
    execute the exact same T-SQL each time. This stored procedure returns results
    for the requested columns in the `SELECT` statement for all customers that have
    been entered into the database. If you want to see the results for this stored
    procedure, you can execute the stored procedure as shown in Listing 4-2.


    ```

    EXECUTE dbo.GetCustomer;

    Listing 4-2

    Executing the Stored Procedure

    ```


    SQL Server creates the execution plan in Figure 4-1 and, in most cases, saves
    the execution plan to the query plan cache. It is possible this plan may be deemed
    trivial and will not be saved in the cache at all. If this stored procedure is
    run again in the future, SQL Server will check the plan cache to see if this stored
    procedure already exists in the cache. This plan will sit in the plan cache for
    as long as SQL Server deems the plan relevant. Chapter 8 will go into more detail
    as to how SQL Server calculates the relevance of an execution plan. In Figure
    4-1, you can see the execution plan associated with the stored procedure in Listing
    4-2.


    ![](images/480547_2_En_4_Chapter/480547_2_En_4_Fig1_HTML.jpg)


    An illustration depicts a select cost equal to 0 percent on the left side and
    clustered index scan for a cost equal to 100 percent on the right side. Both are
    separated by a backward arrow.


    Figure 4-1

    Execution plan for a stored procedure'
