- fmt: 'One of the largest problems overall in writing T-SQL code is not taking advantage
    of data sets. Often, this is a result of being more comfortable writing procedural
    code or not having developed the ability to think in terms of data sets. My goal
    throughout this book is to guide you through various ways to write code that embraces
    using data sets.


    # 6. Hardware Usage


    You have learned about the elements of set-based design when considering how to
    design your queries. There are other things to take into consideration when working
    with SQL Server. You are working with a system that involves more than its pieces.
    There are many aspects to SQL Server. There is the data that is stored. There
    is accessing the data. There is also the process of how to access the data. SQL
    Server is not only software; it’s also how that software interacts with your computer’s
    or server’s hardware.


    When it comes to working with hardware, there are several different parts that
    SQL Server uses. Some may seem straightforward and others may be surprising at
    first. SQL Server is known as a relational database management system (RDBMS).
    As part of a relational database management system, SQL Server’s purpose is to
    allow for efficient storage and retrieval of data. This implies that one of the
    most important pieces of hardware is the memory on the system that is running
    SQL Server. When it comes to long-term storage of data, the hard drives become
    the most significant. I will refer to them as `storage` for the purposes of this
    chapter as storage is not only limited to hard disks. However, there are other
    elements that are less obvious such as the CPU.


    In this chapter, you will go over at coding patterns and anti-patterns that can
    cause server resources to be allocated effectively or ineffectively. For the anti-patterns,
    you will explore alternate methods to achieve the same outcome without overtaxing
    these limited hardware resources.


    ## Considering Memory with T-SQL Design


    When you first start working with data in SQL Server, it may come as a surprise
    that memory is one of the most important factors. Much of this has to do with
    what memory is used for within SQL Server. SQL Server is designed to take advantage
    of memory. There is a process called `caching` that keeps information in memory.
    There are two types of caching that are important when it comes to SQL Server.
    The first has to do with caching execution plans. This is where SQL Server saves
    directions on how it will execute a stored procedure or ad hoc query again in
    the future. The goal is to take advantage of the knowledge SQL Server already
    has calculated when it comes to the best way to execute a specific query. The
    second form of cache that has to do with query design can almost be more important.
    It has to do with how information is stored in memory. This is called the `buffer
    pool`.


    In this section, I talk about data being stored in the buffer pool. What happens
    if we need data that is not in the buffer pool? This can be where things within
    SQL Server get a little more complex. SQL Server only interacts with data that
    is inside the buffer pool. Therefore, if data is needed that is not in the buffer
    pool, the first step is to determine what data has been used less frequently.
    Then you remove this data from the buffer pool. These first steps already give
    us a hint into the memory usage. If there is something that fills up the buffer
    pool unnecessarily, you now know that critical data may be cleared out of the
    buffer pool to make room for this new data.


    The real key is to limit the amount of data SQL Server must process. When writing
    your queries, this can be handled based on your join logic; this can also be handled
    with your where clause criteria. You want to make sure that you are accessing
    as little data as possible. Accessing the smallest amounts of data needed allows
    you to minimize your use of memory when it comes to your T-SQL. Listing [6-1](#480547_2_En_6_Chapter.xhtml#PC1)
    provides a query where there are not included in the SELECT statement.


    ```sql

    SELECT cus.FirstName,

    cus.LastName,

    prd.ProductName

    FROM dbo.Customer cus

    INNER JOIN dbo.CustomerOrder ord

    ON cus.CustomerID = ord.CustomerID

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    INNER JOIN dbo.Product prd

    ON dtl.ProductID = prd.ProductID

    WHERE prd.ProductName LIKE ''Tel%''

    AND cus.LastName LIKE ''G%''

    AND ord.IsActive = 1;

    ```


    Listing 6-1

    Query to Get Only Customer and Products


    While it did not affect the original performance of the query, now that the data
    table has more data, there is an obvious performance impact.


    The speed and versatility of memory is an important part of SQL Server. Another
    factor is related to the cost of memory vs. the cost of storage. This difference
    in costs increases the importance of using memory effectively. There are many
    different types of things that are stored in memory. The process SQL Server uses
    to access the data needed to meet a query’s criteria is saved in memory as an
    execution plan. The data retrieved for a query’s results is also stored in memory.
    You can also have database objects that exist in memory such as table variables
    or temporary tables. You often hear the term `OLTP` (online transaction processing).
    What this really means is you want a system that can perform a high volume of
    write and update activity. These are the types of activities that happen frequently
    within our applications. When referring to write and update activity, using the
    database for recipes involves each time a recipe is accessed, each change that
    is made to a recipe, or every new ingredient that is added to the system.'
  raw: 'One of the largest problems overall in writing T-SQL code is not taking advantage
