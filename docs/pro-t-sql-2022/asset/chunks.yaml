- fmt: "## Switching Partitions\n\nIn Chapter [18](#480547_2_En_18_Chapter.xhtml),\
    \ I introduced the idea of partitioning in SQL Server. This section will go through\
    \ the process of managing partitions after you have created them. The first example\
    \ will go through using partition switching between two tables that are not partitioned.\
    \ The second example will show how to switch partitions from a non-partitioned\
    \ table to a partition table. The last example will show how partitions can be\
    \ switched between partitioned tables.\n\n### Switching Between Non-Partitioned\
    \ Tables\n\nFor the first example, you will create a non-partitioned table using\
    \ the T-SQL code in Listing [17-5](#480547_2_En_17_Chapter.xhtml#PC5).\n\n```sql\n\
    CREATE TABLE dbo.CustomerOrderNonParitition(\n    CustomerOrderHistoryID     \
    \    BIGINT         NOT NULL,\n    CustomerOrderID                INT        \
    \    NOT NULL,\n    CustomerOrderHistoryStatusID   TINYINY        NOT NULL,\n\
    \    DateCreated                    DATETIME2(2)   NOT NULL,\n    DateModified\
    \                   DATETIME2(2)   NULL,\n    CONSTRAINT [PK_CustomerOrderNonPartition]\n\
    \    PRIMARY KEY CLUSTERED ([CustomerOrderHistoryID], [DateCreated])\n);\n-- Listing\
    \ 17-5\n-- Creating a Non-Partitioned Table\n```\n\nThis is a new empty table\
    \ with the same schema as the table `dbo.CustomerOrderActive`. Both tables have\
    \ not been partitioned. You should get a count of the number of records in each\
    \ table before you switch the data from one table to the other table. This is\
    \ because a non-partitioned table is treated as a table consisting of one partition.\
    \ The query in Listing [17-6](#480547_2_En_17_Chapter.xhtml#PC6) gets the count\
    \ of records for the `dbo.CustomerOrderActive` and `dbo.CustomerOrderNonPartition`\
    \ tables.\n\n```sql\nSELECT COUNT(*)\nFROM dbo.CustomerOrderActive;\nSELECT COUNT(*)\n\
    FROM dbo.CustomerOrderNonParitition;\n-- Listing 17-6\n-- Getting Counts of Records\
    \ in the Source and Destination Tables\n```\n\nThe output of the queries above\
    \ has been formatted into Table [17-1](#480547_2_En_17_Chapter.xhtml#Tab1) to\
    \ show the record count for the number customers in each table.\n\nTable 17-1\n\
    \nCount of Records per Table\n\n| Table Name | Record Count |\n| --- | --- |\n\
    | `dbo.CustomerOrderActive` | 802,821 |\n| `dbo.CustomerOrderNonPartition` | 0\
    \ |\n\nThe `dbo.CustomerOrder` table has 802,821 records before the partition\
    \ switch, and the table `dbo.CustomerOrderNonPartition` has 0 records. The T-SQL\
    \ in Listing [17-7](#480547_2_En_17_Chapter.xhtml#PC7) shows how you can switch\
    \ data to another non-partitioned table.\n\n```sql\nALTER TABLE dbo.CustomerOrderActive\n\
    SWITCH TO dbo.CustomerOrderNonParitition;\n-- Listing 17-7\n-- Moving Data Between\
    \ Non-Partitioned Tables\n```\n\nAfter the partition, which in this case is the\
    \ entire table, is switched from `dbo.CustomerOrderActive` to `dbo.CustomerOrderNonPartition`,\
    \ you can run a query to check the row counts of both tables as shown in Listing\
    \ [17-8](#480547_2_En_17_Chapter.xhtml#PC8).\n\n```sql\nSELECT COUNT(*)\nFROM\
    \ dbo.CustomerOrderActive;\nSELECT COUNT(*)\nFROM dbo.CustomerOrderNonParitition;\n\
    -- Listing 17-8\n-- Number of Records in Non-Partitioned Tables\n```\n\nAfter\
    \ running this T-SQL, you get the record count for both tables as shown in Table\
    \ [17-2](#480547_2_En_17_Chapter.xhtml#Tab2).\n\nTable 17-2\n\nCount of Records\
    \ per Table\n\n| Table Name | Record Count |\n| --- | --- |\n| `dbo.CustomerOrderActive`\
    \ | 0 |\n| `dbo.CustomerOrderNonPartition` | 802,821 |\n\nThis table indicates\
    \ that there are no rows in `dbo.CustomerOrderActive` and 802,821 rows in `dbo.CustomerOrderNonPartition`.\
    \ This is what you would expect since the entire table of `dbo.CustomerOrderActive`\
    \ was switched into `dbo.CustomerOrderNonPartition`. If you want to reset the\
    \ tables back to how they were before the partition switch, you could execute\
    \ the T-SQL in Listing [17-9](#480547_2_En_17_Chapter.xhtml#PC9) to switch back\
    \ from `dbo.CustomerOrderNonParition` to `dbo.CustomerOrderActive`.\n\n```sql\n\
    ALTER TABLE dbo.CustomerOrderNonParitition\nSWITCH TO dbo.CustomerOrderActive;\n\
    -- Listing 17-9\n-- Moving Data Back to the Original Table\n```\n\nNow that the\
    \ partition has been switched back, all of the records are once again in `dbo.CustomerOrderActive`.\
    \ If data had been written to the `dbo.CustomerOrderActive` table, you would not\
    \ be able to switch the data back to the original table. The target table must\
    \ be empty. Listing [17-10](#480547_2_En_17_Chapter.xhtml#PC10) has a query you\
    \ can execute to confirm that `dbo.CustomerOrderNonPartition` does not have any\
    \ partitions.\n\n```sql\nSELECT tbl.[name] AS TableName,\n       sch.[name] AS\
    \ PartitionScheme,\n       fnc.[name] AS PartitionFunction,\n       prt.partition_number,\n\
    \       fnc.[type_desc],\n       rng.boundary_id,\n       rng.[value] AS BoundaryValue,\n\
    \       prt.[rows]\nFROM sys.tables tbl\nINNER JOIN sys.indexes idx\n    ON tbl.[object_id]\
    \ = idx.[object_id]\nINNER JOIN sys.partitions prt\n    ON idx.[object_id] = prt.[object_id]\n\
    \    AND idx.index_id = prt.index_id\nINNER JOIN sys.partition_schemes AS sch\n\
    \    ON idx.data_space_id = sch.data_space_id\nINNER JOIN sys.partition_functions\
    \ AS fnc\n    ON sch.function_id = fnc.function_id\nLEFT JOIN sys.partition_range_values\
    \ AS rng\n    ON fnc.function_id = rng.function_id\n    AND rng.boundary_id =\
    \ prt.partition_number\nWHERE tbl.[name] = 'CustomerOrderNonParitition'\n    AND\
    \ idx.[type] <= 1\nORDER BY prt.partition_number;\n-- Listing 17-10\n-- Query\
    \ to View Partition Information for CustomerOrderNonPartition Table\n```\n\n###\
    \ Switching from a Non-Partitioned to a Partitioned Table\n\nThe examples above\
    \ indicate how to partition switch between two non-partitioned tables. However,\
    \ it is much more likely that you will want to use partition switching with at\
    \ least one table that is partitioned.\n\nNext, you will work through an example\
    \ where you will partition switch from a non-partitioned table to a partitioned\
    \ table. As a refresher, Listing [17-11](#480547_2_En_17_Chapter.xhtml#PC11) shows\
    \ how to create a partition function and partition scheme.\n\n```sql\nCREATE PARTITION\
    \ FUNCTION CustomerOrderHistoryFunc(DATETIME2(2))\nAS RANGE RIGHT FOR VALUES\n\
    (\n    '2022-01-01',\n    '2022-02-01',\n    '2022-03-01'\n);\nCREATE PARTITION\
    \ SCHEME CustomerOrderHistoryRange\nAS PARTITION CustomerOrderHistoryFunc TO\n\
    (\n    [PRIMARY],\n    [PRIMARY],\n    CustomerOrderHistory202202,\n    CustomerOrderHistory202203\n\
    );\n-- Listing 17-11\n-- Creating a Partition Function and Partition Scheme\n\
    ```\n\nOne important note when switching partitions is that the both the source\
    \ that is being switched out and the target being switched to must be in the same\
    \ filegroup. For your example, `dbo.CustomerOrderActive` is in the PRIMARY filegroup.\
    \ Therefore, if you are switching out to the first partition in `dbo.CustomerOrderHistory`,\
    \ the first partition must also be in the filegroup PRIMARY. Otherwise, you would\
    \ have to move `dbo.CustomerOrderActive` to the same filegroup as the first partition\
    \ in `dbo.CustomerOrderHistory`.\n\nBefore switching the records from `dbo.CustomerActive`\
    \ to `dbo.CustomerOrderHistory`, you can check the record counts using the query\
    \ in Listing [17-12](#480547_2_En_17_Chapter.xhtml#PC12).\n\n```sql\nSELECT COUNT(*)\n\
    FROM dbo.CustomerOrderActive;\nSELECT COUNT(*)\nFROM dbo.CustomerOrderHistory;\n\
    -- Listing 17-12\n-- Number of Records in the Non-Partitioned and Partitioned\
    \ Tables\n```\n\nThe results from these two queries are displayed in Table [17-3](#480547_2_En_17_Chapter.xhtml#Tab3).\n\
    \nTable 17-3\n\nCount of Records per Table\n\n| Table Name | Record Count |\n\
    | --- | --- |\n| `dbo.CustomerOrderActive` | 802,821 |\n| `dbo.CustomerOrderNonPartition`\
    \ | 0 |\n\nThe record counts indicated that 802,821 records are in the table `dbo.CustomerOrderActive`,\
    \ and there are zero records in `dbo.CustomerOrderNonPartition`.\n\nBefore you\
    \ can try to switch the partitions, you need to confirm that all records in `dbo.CustomerOrderActive`\
    \ exist within the partition you will be using in `dbo.CustomerOrderNonPartition`.\
    \ To do this, you need to add check constraints to `dbo.CustomerOrderActive`.\
    \ Listing [17-13](#480547_2_En_17_Chapter.xhtml#PC13) shows the T-SQL used to\
    \ add check constraints."
