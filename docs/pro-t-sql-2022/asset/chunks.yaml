    在 SQL Server 2016 中，您必须手动管理查询存储以确定您的 T-SQL 代码是否有更好的执行计划。如果您在查询存储中找到一个会受益于某个执行计划的查询，您需要手动为该查询强制一个计划。这导致了随时间推移的额外维护，因为随着数据库中数据的变化，您需要返回并撤销强制的计划。


    ## 优化逻辑读取


    您可能见过一些看起来运行良好的 T-SQL 代码。代码及时执行并返回正确的结果。然而，当您查看某个 SQL Server 监控工具时，您可能会注意到一些意外行为，表明您的系统上存在性能问题。在某些情况下，您可能会发现一些查询正在读取未包含在结果集中的内存中的页面。读取数据页可以识别为逻辑读取。您应该查看
    T-SQL 代码的执行计划，以找出可能导致此差异的原因。这涉及查看正在执行的 T-SQL 代码，并尝试确定可以采取哪些措施来提高性能。


    优化此查询以减少读取量的优势在于，这应该会减少作为此查询执行的一部分而读入内存的数据页数量。换句话说，读取比查询结果所需更多数据的缺点是，应用程序更频繁使用的页面可能会过早地从内存中清除。不幸的是，我们通常只在发现应用程序运行缓慢或崩溃时才意识到性能问题。此时，很难诊断出导致问题的具体查询。如果您无法访问监控软件，这种情况可能会变得更加难以排查。当我最初开始调查性能问题时，我会检查
    SQL Server 代理的作业历史记录。有时您会发现一个与生产问题同时运行的进程。虽然这并不能确认 SQL Server 代理作业是原因，但它可能值得调查。


    对于这些情况，最好是知道导致性能问题的确切存储过程或预处理语句。除了第三方软件、查询存储或先前设置的扩展事件之外，您可能只有很少的可用选项。此外，我更喜欢在发生中断之前识别可能导致性能问题的查询。如果我无法访问第三方工具，我会使用
    DMV 在查询成为问题之前找到它们。我经常将前述任何操作与性能监视器结合使用，以帮助随时间跟踪 SQL Server 并确认我的性能调整是否有效。


    如果您没有第三方工具或者您想更熟悉 DMV 以找到需要性能调整的 T-SQL，您可以查询 `sys.dm_exec_query_stats`。这个 DMV
    跟踪已执行的 T-SQL 代码的统计信息，并且仍然是计划缓存的一部分。这将仅返回尚未从计划缓存中清除的查询的结果。如果您认为此 DMV 缺少您期望看到的一些存储过程，您可能需要对您的计划缓存进行一些研究，并确定缓存是否被即席查询填满。您需要将此数据与
    `sys.dm_exec_sql_text` 连接，以查找与统计信息关联的 T-SQL 代码。


    在尝试查找具有高逻辑读取的查询时，您希望根据各种条件查看 T-SQL 代码。查看平均逻辑读取通常是我寻找要性能调整的查询时的主要目标。我更喜欢这个指标，因为它通常能识别在服务器上频繁运行并且读取量可能超出我预期的
    T-SQL 代码。如果有一个在服务器上频繁运行的进程，我不期望平均读取次数会很高，因为一个频繁的进程意味着 T-SQL 代码与应用程序直接相关。还有一些查询运行频率不高，但运行时使用大量逻辑读取。根据我的经验，如果总逻辑读取量很高而总执行次数很低，我会将这些查询的优先级排在那些具有更高平均逻辑读取值和大量执行次数的
    T-SQL 代码之后。'
- fmt: "# 性能优化：查询与执行计划分析\n\n一旦确定了需要进行性能调整的T-SQL代码，就需要同时查看代码和执行计划，以便熟悉查询正在检索的数据以及SQL\
    \ Server如何检索这些数据。[清单 8-2](#480547_2_En_8_Chapter.xhtml#PC2)展示了一个你将进行优化的查询。\n\n\
    ```sql\nDECLARE @CustomerID         INT = 1;\nDECLARE @CustomerOrderID    INT\
    \ = 401508;\nDECLARE @ProductID          INT = 1;\n-- Get all orders for a specific\
    \ customer and product\nSELECT cus.CustomerID,\n       ord.CustomerOrderID,\n\
    \       prd.ProductID\nINTO #TmpOrder\nFROM dbo.Customer cus\nINNER JOIN dbo.CustomerOrder\
    \ ord\n    ON cus.CustomerID = ord.CustomerID\nINNER JOIN dbo.OrderDetail dtl\n\
    \    ON ord.CustomerOrderID = dtl.CustomerOrderID\nINNER JOIN dbo.Product prd\n\
    \    ON dtl.ProductID = prd.ProductID\nWHERE (cus.CustomerID = @CustomerID OR\
    \ @CustomerID = -1)\n  AND (ord.CustomerOrderID = @CustomerOrderID OR @CustomerID\
    \ = -1)\n  AND (dtl.ProductID = @ProductID OR @ProductID = -1)\n  AND prd.IsActive\
    \ = 1;\n\nSELECT ProductID\nINTO #HistPriceCost\nFROM dbo.ProductPriceHistory\n\
    GROUP BY ProductID\nHAVING COUNT(*)>3;\n\nSELECT cus.CustomerID,\n       cus.FirstName,\n\
    \       cus.LastName,\n       ord.CustomerOrderID,\n       ord.OrderNumber,\n\
    \       prd.ProductName,\n       dtl.QuantitySold,\n       dtl.ProductPrice\n\
    FROM #TmpOrder tor\nINNER JOIN #HistPriceCost hpc\n    ON tor.ProductID = hpc.ProductID\n\
    LEFT JOIN dbo.Customer cus\n    ON tor.CustomerID = cus.CustomerID\nINNER JOIN\
    \ dbo.CustomerOrder ord\n    ON tor.CustomerOrderID = ord.CustomerOrderID\nINNER\
    \ JOIN dbo.OrderDetail dtl\n    ON tor.CustomerOrderID = dtl.CustomerOrderID\n\
    \    AND tor.ProductID = dtl.ProductID\nINNER JOIN dbo.Product prd\n    ON tor.ProductID\
    \ = prd.ProductID\nWHERE cus.IsActive = 1\nORDER BY\n    cus.CustomerID,\n   \
    \ CASE WHEN\n        (\n            cus.CustomerID = @CustomerID\n           \
    \ AND ord.CustomerOrderID = @CustomerOrderID\n        )\n        THEN 0\n    \
    \    ELSE 1\n    END,\n    ord.CustomerOrderID DESC,\n    cus.LastName ASC;\n\n\
    DROP TABLE #TmpOrder;\nDROP TABLE #HistPriceCost;\n```\n*清单 8-2 客户订单原始查询*\n\n\
    你还需要从计划缓存中获取执行计划，以便查看SQL Server如何执行T-SQL代码。图 [8-1](#480547_2_En_8_Chapter.xhtml#Fig1)中的部分执行计划展示了一个可能受益于优化的环节。\n\
    \n![](images/480547_2_En_8_Chapter/480547_2_En_8_Fig1_HTML.jpg)\n\n*图 8-1 清单 [8-2](#480547_2_En_8_Chapter.xhtml#PC2)的部分执行计划*\n\
    \n该执行计划中有一条粗线，在哈希匹配后变成细线。这很好地表明，该查询有可能通过优化来减少总体的读取量。基于此信息，你需要调查来自`dbo.OrderDetail`的数据如何与`dbo.Customer`和`dbo.CustomerOrder`的结果相结合。通过查看T-SQL代码或其输出，你可以更好地理解此查询的目的。该查询返回所有产品价格已变更超过三次的客户订单，以及下这些订单的客户信息。\n\
    \n了解这一点有助于你开始优化此查询的逻辑读取过程。你知道此查询基于价格已变更超过三次的产品。如果专注于仅查找包含价格已变更超过三次的产品的订单，可能可以减少读取次数。虽然`dbo.OrderDetail`表是按`CustomerOrderID`排序，然后再按`OrderDetailID`排序，但这在清单\
    \ [8-2](#480547_2_En_8_Chapter.xhtml#PC2)中的T-SQL代码仅查找包含特定产品的客户订单时并无帮助。执行计划表明SQL\
    \ Server正在使用一个非聚集索引来检索数据。创建此索引的T-SQL代码如清单 [8-3](#480547_2_En_8_Chapter.xhtml#PC3)所示。\n\
    \n```sql\nCREATE NONCLUSTERED INDEX [IX_OrderDetail_ProductID_CustomerOrderID]\n\
    ON [dbo].[OrderDetail]([ProductID] ASC, [CustomerOrderID] ASC);\n```\n*清单 8-3\
    \ 为OrderDetail表创建索引的查询*\n\n非聚集索引不会更改表中数据的顺序，但索引会保持索引数据的排序。在此情况下，索引首先按`ProductID`列的值对数据排序，然后按`CustomerOrderID`排序。非聚集索引还必须能够引用回聚集索引，因为当SQL\
    \ Server决定使用此非聚集索引但也可能需要表中的一些额外数据时，就需要这样做。SQL Server通过将聚集索引的列作为此索引的一部分来实现这一点。这对你是有帮助的，因为这意味着可以使用此索引中的`OrderDetailID`来查找包含此产品的所有订单明细。\n\
    \n这一切听起来都不错，但看起来此索引目前并未提供最佳性能。虽然你可以致力于调整索引，但我发现，在非常大的表和高度事务性的系统中，你可能无法添加或修改现有索引。有时这些索引的存在正是为了确保应用程序的关键部分性能良好，它们正在做它们需要做的事情。修改这些索引可能会带来更多麻烦。在这个场景中你是幸运的，你只需向清单\
    \ [8-1](#480547_2_En_8_Chapter.xhtml#PC1)中的T-SQL代码添加一行，就能减少读取次数。索引按`ProductID`排序，然后是`CustomerOrderID`。如果你从查询中移除`(...\
    \ AND @IsActive = 1)`，你或许可以使索引更高效地工作。参见清单 [8-4](#480547_2_En_8_Chapter.xhtml#PC4)。"
  raw: 'Once you have identified the T-SQL code that needs to be performance tuned,
    look at both the code and the execution plan to get familiar with what data the
    query is retrieving and how SQL Server is retrieving the data. Listing [8-2](#480547_2_En_8_Chapter.xhtml#PC2)
    shows a query that you will be optimizing.


    ```

    DECLARE @CustomerID         INT = 1;

    DECLARE @CustomerOrderID    INT = 401508;

    DECLARE @ProductID          INT = 1;

    -- Get all orders for a specific customer and product

    SELECT cus.CustomerID,

    ord.CustomerOrderID,

    prd.ProductID

    INTO #TmpOrder

    FROM dbo.Customer cus

    INNER JOIN dbo.CustomerOrder ord

    ON cus.CustomerID = ord.CustomerID

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    INNER JOIN dbo.Product prd

    ON dtl.ProductID = prd.ProductID

    WHERE (cus.CustomerID = @CustomerID OR @CustomerID = -1)

    AND (ord.CustomerOrderID = @CustomerOrderID OR @CustomerID = -1)

    AND (dtl.ProductID = @ProductID OR @ProductID = -1)

    AND prd.IsActive = 1;

    SELECT ProductID

    INTO #HistPriceCost

    FROM dbo.ProductPriceHistory

    GROUP BY ProductID

    HAVING COUNT(*)>3;

    SELECT cus.CustomerID,

    cus.FirstName,

    cus.LastName,

    ord.CustomerOrderID,

    ord.OrderNumber,

    prd.ProductName,

    dtl.QuantitySold,

    dtl.ProductPrice

    FROM #TmpOrder tor

    INNER JOIN #HistPriceCost hpc

    ON tor.ProductID = hpc.ProductID

    LEFT JOIN dbo.Customer cus

    ON tor.CustomerID = cus.CustomerID

    INNER JOIN dbo.CustomerOrder ord

    ON tor.CustomerOrderID = ord.CustomerOrderID

    INNER JOIN dbo.OrderDetail dtl

    ON tor.CustomerOrderID = dtl.CustomerOrderID

    AND tor.ProductID = dtl.ProductID

    INNER JOIN dbo.Product prd

    ON tor.ProductID = prd.ProductID

    WHERE cus.IsActive = 1

    ORDER BY

    cus.CustomerID,

    CASE WHEN

    (

    cus.CustomerID = @CustomerID

    AND ord.CustomerOrderID = @CustomerOrderID

    )

    THEN 0

    ELSE 1

    END,

    ord.CustomerOrderID DESC,

    cus.LastName ASC;

    DROP TABLE #TmpOrder;

    DROP TABLE #HistPriceCost;

    Listing 8-2

    Original Query for Customer Orders

    ```


    You will also want to get the execution plan from the plan cache so that you can
    see how SQL Server is executing the T-SQL code. The partial execution plan in
    Figure [8-1](#480547_2_En_8_Chapter.xhtml#Fig1) shows one part of the execution
    plan that may benefit from optimization.


    ![](images/480547_2_En_8_Chapter/480547_2_En_8_Fig1_HTML.jpg)


    A flow diagram presents a partial execution plan. It depicts 2 clustered index
    scans followed by a hash match. Clustered index scans have cost 0% and 66%, 0.008
    seconds and 1.939 seconds, 7 of 7 and 2 of 160565\. Hash match has cost 2%, 0.754
    seconds, and 2 of 160565.


    Figure 8-1


    Partial execution plan for Listing [8-2](#480547_2_En_8_Chapter.xhtml#PC2)


    The execution plan has one thick line that results in a thin line after the hash
    match. This is a good indication that the query may be able to be optimized to
    use less reads overall. Based on this information, you need to investigate how
    the data from `dbo.OrderDetail` is combined with the results of `dbo.Customer`
    and `dbo.CustomerOrder`. Looking at either the T-SQL code or the output of the
    T-SQL code, you can get a better idea of the purpose of this query. This query
    is returning all customer orders where the product price has changed three times
    along with information about what customers place these orders.


    Knowing this helps you begin the process of optimizing the logical reads on this
    query. You know that this query is based on products that have had their price
    changed more than three times. It may be possible to reduce the number of reads
    if you focus on trying to find only orders that contain products where the price
    has been changed more than three times. While the table `dbo.OrderDetail` is ordered
    by `CustomerOrderID` and then by `OrderDetailID`, this does not help when the
    T-SQL code in Listing [8-2](#480547_2_En_8_Chapter.xhtml#PC2) is only looking
    for customer orders that have specific products. The execution plan indicates
    that there is a non-clustered index that SQL Server is using to retrieve the data.
    The T-SQL code to create this index is in Listing [8-3](#480547_2_En_8_Chapter.xhtml#PC3).


    ```

    CREATE NONCLUSTERED INDEX [IX_OrderDetail_ProductID_CustomerOrderID]

    ON [dbo].[OrderDetail]([ProductID] ASC, [CustomerOrderID] ASC);

    Listing 8-3

    Query for Index on OrderDetail

    ```


    The non-clustered index does not change the order of the data in the table, but
    the index does keep the data for the index ordered. In this case, the index orders
    all the data first by the value of the `ProductID` column and then by the `CustomerOrderID`.
    The non-clustered index also must be able to reference back to the clustered index
    for situations where SQL Server decides to use this non-clustered index but also
    may need some additional data from the table. SQL Server does this by including
    the columns for the clustered index as part of this index. This helps you because
    this means the `OrderDetailID` from this index can be used to find all order details
    with this product.


    This all sounds great, but it does not look like this index is currently providing
    the best performance. While you could work on tuning the indexes, I have found
    that on very large tables and on highly transactional systems, you may not be
    able to add or alter indexes as they exist. Sometimes those indexes are there
    doing exactly what they need to be doing, making sure a critical part of the application
    performs well. Modifying these indexes may cause even more headaches. You are
    fortunate that in this scenario you can add one line of the code to the T-SQL
    from Listing [8-1](#480547_2_En_8_Chapter.xhtml#PC1) and decrease the number of
    reads. The index is ordered by the `ProductID` and then `CustomerOrderID`. If
    you remove `(... AND @IsActive = 1)` from the query, you may be able to get the
    index to work more efficiently. See Listing [8-4](#480547_2_En_8_Chapter.xhtml#PC4).'
