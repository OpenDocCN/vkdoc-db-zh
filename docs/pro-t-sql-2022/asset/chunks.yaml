  trans: '

    ### 在 Azure 中的数据发现与分类


    虽然数据发现与分类功能在 Azure SQL 数据库、Azure SQL 托管实例和 Azure Synapse Analytics 中同样可用，但其实施与管理是在
    Azure 门户中进行的。


    要访问或设置数据发现与分类功能，请导航至 SQL 数据库（或其他 Azure SQL 资源）。在“安全性”下，你会找到一个名为“数据发现和分类”的部分，如图
    18-11 所示。


    ![一张截图展示了安全性下的选项。选项包括：审核、分类账、数据发现和分类、动态数据屏蔽、Microsoft Defender for Cloud 以及透明数据加密。其中“数据发现和分类”被高亮显示。](img/480547_2_En_18_Fig11_HTML.jpg)

    图 18-11：在 Azure 中访问“数据发现和分类”部分


    SQL Server 和 Azure 支持相同的两种保护策略，但在 Azure 中选择和管理保护策略比在 SQL Server 上更简单。图 18-12 展示了如何通过单击“配置”来管理或更改保护策略。


    ![一张截图显示了左侧面板中安全性下的选项。“数据发现和分类”被高亮显示。右侧面板顶部有“导出”、“配置”和“反馈”选项。下方是一条信息，显示“当前使用 SQL
    信息保护策略”。](img/480547_2_En_18_Fig12_HTML.jpg)

    图 18-12：访问保护策略


    除了管理保护策略外，添加数据分类标签也在 Azure 门户中进行管理。通过选择“分类”选项卡，如图 18-13 所示，你可以对敏感数据进行分类和标记。


    ![一张截图显示了顶部有 4 个选项的栏。下方有两行信息。有两个选项卡，其中“分类”被选中。有下拉菜单用于选择方案、表、筛选器、信息类型和敏感度标签。“添加分类”选项卡位于底部中央。](img/480547_2_En_18_Fig13_HTML.jpg)

    图 18-13：添加数据分类


    识别、标记、分类和报告敏感数据，是改进与安全性相关的数据治理的有效第一步。此外，一旦识别出所有敏感列，你就可以开始就如何处理这些数据（与用户访问相关）做出决策。在接下来的章节中，我将讨论如何根据用户权限来混淆列或完全隐藏行。


    ## 动态数据屏蔽


    在动态数据屏蔽部分，我将概述动态数据屏蔽的目的、类型和实施方法。屏蔽允许我们在向某些用户展示数据时部分混淆数据。这与加密数据不同。例如，对于一个不允许访问实际电子邮件地址的用户，屏蔽电子邮件地址可能会将
    `ENoble@MyWebsite.com` 转换为 `EN***@**ite.com`。对于同一用户，可能只显示政府 ID 号码的最后四位数字。我还将介绍在尝试实施动态数据屏蔽时可能遇到的一些挑战。


    正如前一节所讨论的，你的数据库中可能包含具有不同敏感级别的信息的数据列。在许多情况下，你可能不希望所有用户都能直接访问这些数据。有些情况下，你不能限制对整个表的访问，因为用户需要能够访问其中的某些列。通过使用动态数据屏蔽，你可以授予对整个表的访问权限，但限制敏感列中可返回的内容。通过对表中的列使用函数，你可以为任何包含敏感数据的列指定要实施的屏蔽类型。可用的屏蔽类型如下：


    *   默认：`default()`

    *   电子邮件：`email()`

    *   随机：`random([起始范围], [结束范围])`

    *   自定义：`partial(前缀, [填充], 后缀)`

    *   日期时间：`datetime("<时间间隔")`


    使用默认数据屏蔽时，SQL Server 根据列的数据类型使用特定的默认值。电子邮件数据屏蔽函数显示电子邮件地址的首字母和末尾的 .com（针对任何以 .com
    结尾的字符串）。随机数据屏蔽函数允许你指定一个范围，显示的值将是随机返回的。如果你想创建自己的屏蔽逻辑，可以使用自定义屏蔽函数。部分屏蔽允许你选择在屏蔽的开头和结尾处保留原始数据类型的多少个字符不被屏蔽。中间的填充用于指示你希望实施的首选屏蔽。


    SQL Server 2022 引入了使用日期时间屏蔽函数的功能。此函数旨在屏蔽数据，以显示所选列的年、月、日、小时、分钟或秒。日期时间函数支持的数据类型包括
    `DATETIME`、`DATETIME2`、`DATE`、`TIME`、`DATETIMEOFFSET` 或 `SMALLDATETIME`。为了指定列的屏蔽方法，你需要在日期时间屏蔽函数中为时间间隔使用以下值：


    *   年：使用“Y”作为时间间隔。

    *   月：使用“M”作为时间间隔。

    *   日：使用“D”作为时间间隔。

    *   小时：使用“h”作为时间间隔。

    *   分钟：使用“m”作为时间间隔。

    *   秒：使用“s”作为时间间隔。


    要创建一个具有动态数据屏蔽功能的表，清单 18-2 包含在 Address 列上使用屏蔽函数的 T-SQL。


    ```

    CREATE TABLE [dbo].Vendor             NOT NULL,

    [CompanyName]      VARCHAR(100)                     NOT NULL,

    [Address]          VARCHAR(100)

    MASKED WITH (FUNCTION = ''partial(1, "xxxx", 2)'')

    NOT NULL,

    [City]             VARCHAR(100)                     NOT NULL,

    [PostalCode]       VARCHAR(20)                          NULL,

    [Country]          VARCHAR(75)                      NOT NULL,

    [EmailAddress]     VARCHAR(100)

    MASKED WITH (FUNCTION = ''email()'')

    NOT NULL,

    [IsActive]         BIT

    CONSTRAINT DF_Vendor_IsActive    DEFAULT 1    NOT NULL,

    [DateCreated]      DATETIME2(2)

    CONSTRAINT DF_Vendor_DateCreated DEFAULT GETDATE()

    NOT NULL,

    [DateModified]     DATETIME2(2)

    CONSTRAINT DF_Vendor_DateModified DEFAULT GETDATE()

    NOT NULL,

    [DateDisabled]     DATETIME2(2)                         NULL,

    CONSTRAINT [PK_Vendor] PRIMARY KEY CLUSTERED ([VendorID] ASC)

    );

    清单 18-2：创建具有动态数据屏蔽功能的表

    ```

    '
- fmt: 'This table has two columns with masked data. The first column is the `Address`
    on the `dbo.Vendor` table. This column uses the `partial()` function. The number
    1 at the beginning indicates that the first character will be unmasked. The padding
    of xxxx will follow the first unmasked character. The end of the `Address` column,
    when masked, will show the last two unmasked characters.


    In order to walk through an example of how dynamic data masking works, you should
    add some data to the `dbo.Vendor` table. If you have created the `dbo.Vendor`
    table, you can use the T-SQL code in Listing [18-3](#480547_2_En_18_Chapter.xhtml#PC3)
    to insert a new record into the table.


    ```sql

    INSERT INTO dbo.Vendor

    (CompanyName, [Address], City, PostalCode, Country, EmailAddress)

    VALUES

    (

    ''Kayak Unlimited'',

    ''567 3rd Street'',

    ''Somewhere'',

    ''10005'',

    ''United States'',

    ''sales@kayakutld.com''

    );

    Listing 18-3

    Adding Data to the Vendor Table

    ```


    Now that you have added the vendor Kayak Unlimited to the `dbo.Vendor` table,
    you can query the data to confirm the new vendor has been added. Executing the
    query in Listing [18-4](#480547_2_En_18_Chapter.xhtml#PC4) allows you to see the
    unmasked data.


    ```sql

    SELECT CompanyName,

    [Address],

    EmailAddress

    FROM dbo.Vendor;

    Listing 18-4

    Querying the Vendor Table

    ```


    The results from Listing [18-4](#480547_2_En_18_Chapter.xhtml#PC4) are shown in
    Table [18-2](#480547_2_En_18_Chapter.xhtml#Tab2).


    Table 18-2


    Viewing Unmasked Vendor Information


    | Company Name | Address | Email Address |

    | --- | --- | --- |

    | Kayak Unlimited | 567 3rd Street | sales@kayakutld.com |


    Referencing the table, you are able to identify that the address is 567 3^(rd)
    Street and the email address is sales@kayakutld.com. Now that you’ve confirmed
    you the data is unmasked, you can test how a user with different permissions may
    see the data.


    Listing [18-5](#480547_2_En_18_Chapter.xhtml#PC5) contains T-SQL code to create
    a new user, grant permissions, and execute a query as that user.


    ```sql

    CREATE USER TestDynamicMasking WITHOUT LOGIN;

    GRANT SELECT ON SCHEMA::dbo TO TestDynamicMasking;

    -- impersonate for testing:

    EXECUTE AS USER = ''TestDynamicMasking'';

    SELECT CompanyName,

    [Address],

    EmailAddress

    FROM dbo.Vendor;

    REVERT;

    Listing 18-5

    Creating a User to Test Dynamic Data Masking

    ```


    You created the user TestDynamicMasking, but you have not associated that user
    with a login. You have given the user the ability to select data on the dbo schema.
    After executing the query to access the Company Name, Address, and Email Address,
    you can see the results shown in Table [18-3](#480547_2_En_18_Chapter.xhtml#Tab3).


    Table 18-3


    Viewing Masked Vendor Information


    | Company Name | Address | Email Address |

    | --- | --- | --- |

    | Kayak Unlimited | 5xxxxet | sXXX@XXXX.com |


    The table shows that Address as 5xxxxet and the email address as sXXX@XXXX.com.
    While this user has SELECT permissions, they do not have UNMASK permissions. Therefore,
    this confirms that the data as you expect. If you grant this login UNMASK permissions
    and rerun the example from Listing [18-5](#480547_2_En_18_Chapter.xhtml#PC5),
    the user will be able to see the unmasked data.


    In SQL Server 2022, there is also the ability to have granular unmasking for a
    given user. This allows the user to view specific unmasked data as indicated in
    the `GRANT UNMASK` statement. The code in Listing [18-6](#480547_2_En_18_Chapter.xhtml#PC6)
    gives the UNMASK permission to the `EmailAddress` column for the TestGranularUnmasking
    user.


    ```sql

    CREATE USER TestGranularUnmasking WITHOUT LOGIN;

    GRANT SELECT ON SCHEMA::dbo TO TestGranularUnmasking;

    GRANT UNMASK ON dbo.Vendor(EmailAddress) TO TestGranularUnmasking;

    -- impersonate for testing:

    EXECUTE AS USER = ''TestGranularUnmasking'';

    SELECT CompanyName,

    [Address],

    EmailAddress

    FROM dbo.Vendor;

    REVERT;

    Listing 18-6

    Creating a User to Test Granular Unmasking

    ```


    This T-SQL code indicates that the TestGranularUnmasking should be able to unmask
    the EmailAddress on the `dbo.Vendor` table. Table [18-4](#480547_2_En_18_Chapter.xhtml#Tab4)
    shows the results returned from the query in Listing [18-6](#480547_2_En_18_Chapter.xhtml#PC6).


    Table 18-4


    Viewing Granular Unmasked Vendor Information


    | Company Name | Address | Email Address |

    | --- | --- | --- |

    | Kayak Unlimited | 5xxxxet | sales@kayakutld.com |


    The query results have sales@kayakutld.com as the EmailAddress, confirming that
    this column in unmasked. As expected, the `Address` column is still masked and
    has the value of 5xxxxet. In SQL Server 2022, you can use granular unmasking for
    databases, schemas, tables, or columns using the T-SQL code `GRANT UNMASK ON`.


    Until now, I have only covered how to create a new table with dynamic data masking.
    However, it is far more likely that you will want to implement dynamic data masking
    when adding new columns in an existing table or on columns in existing tables.
    The T-SQL code to mask a customer’s data of birth using the `datetime()` masking
    function is available in Listing [18-7](#480547_2_En_18_Chapter.xhtml#PC7).


    ```sql

    ALTER TABLE dbo.Customer

    ADD DateOfBirth DATETIME2(2)

    MASKED WITH (FUNCTION = ''datetime("Y")'')

    NULL;

    Listing 18-7

    Adding a Column to a Table with Dynamic Data Masking

    ```


    This code will create a new column named `DateOfBirth` to the `dbo.Customer` table.
    As the same time, the column `DateOfBirth` will also be configured to use the
    datatime masking function. This T-SQL will cause any user that has not been granted
    UNMASK to the database, schema, table, or column to only have the year returned
    for the data of birth.


    After you have used data discovery and classification to identify columns with
    sensitive data, you can decide how you may want to implement dynamic data masking
    on those columns. In addition, it is also possible to add a new column to an existing
    table where the new column is configured for dynamic data masking. Listing [18-8](#480547_2_En_18_Chapter.xhtml#PC8)
    has the T-SQL code needed to change an existing column to using dynamic data masking.


    ```sql

    ALTER TABLE dbo.CustomerOrder

    ALTER COLUMN OrderNumber

    ADD MASKED WITH (FUNCTION = ''default()'');

    Listing 18-8

    Altering an Existing Column to Have Dynamic Data Masking

    ```


    The existing column `OrderNumber` in the `dbo.CustomerOrder` table should be updated
    to use the `default()` masking function. However, the column `OrderNumber` cannot
    be modified due to pre-existing dependencies on it. The error messages returned
    are indicated in Figure [18-14](#480547_2_En_18_Chapter.xhtml#Fig14).


    ![](images/480547_2_En_18_Chapter/480547_2_En_18_Fig14_HTML.jpg)


    A text presents an error message. The last line of the message reads, alter table
    alter column order number failed because one or more objects access this column.


    Figure 18-14


    Error message: table has foreign key


    The error messages state that *The object ‘viewCustomerOrderBound’ is dependent
    on column ‘OrderNumber’. ALTER TABLE ALTER COLUMN OrderNumber failed because one
    or more objects access this column.* The first error message is due to the schema
    binding on the view `dbo.vwCustomerOrderBound`. The second error message occurs
    any time the column has a dependency including non-clustered indexes. One possible
    solution is to temporarily remove the schema binding from the view `dbo.vwCustomerOrderBound`
    as shown in Listing [18-9](#480547_2_En_18_Chapter.xhtml#PC9).


    ```sql

    CREATE OR ALTER VIEW dbo.vwCustomerOrderBound

    AS

    SELECT cus.FirstName,

    cus.LastName,

    cus.FirstName + '' '' + cus.LastName AS FullName,

    ord.CustomerOrderID,

    ord.OrderNumber,

    ord.OrderDate,

    ord.ShipDate

    FROM dbo.CustomerOrder ord

    INNER JOIN dbo.Customer cus

    ON ord.CustomerID = cus.CustomerID;

    Listing 18-9

    Temporarily Removing Schema Binding

    ```'
  raw: 'This table has two columns with masked data. The first column is the `Address`
    on the `dbo.Vendor` table. This column uses the partial function. The number 1
    at the beginning indicates that the first character will be unmasked. The padding
    of xxxx will follow the first unmasked character. The end of the `Address` column,
    when masked, will show the last two unmasked characters.


    In order to walk through an example of how dynamic data masking works, you should
    add some data to the `dbo.Vendor` table. If you have created the `dbo.Vendor`
    table, you can use the T-SQL code in Listing [18-3](#480547_2_En_18_Chapter.xhtml#PC3)
    to insert a new record into the table.


    ```

    INSERT INTO dbo.Vendor

    (CompanyName, [Address], City, PostalCode, Country, EmailAddress)

    VALUES

    (

    ''Kayak Unlimited'',

    ''567 3rd Street'',

    ''Somewhere'',

    ''10005'',

    ''United States'',

    ''sales@kayakutld.com''

    );

    Listing 18-3

    Adding Data to the Vendor Table

    ```


    Now that you have added the vendor Kayak Unlimited to the `dbo.Vendor` table,
    you can query the data to confirm the new vendor has been added. Executing the
    query in Listing [18-4](#480547_2_En_18_Chapter.xhtml#PC4) allows you to see the
    unmasked data.


    ```

    SELECT CompanyName,

    [Address],

    EmailAddress

    FROM dbo.Vendor;

    Listing 18-4

    Querying the Vendor Table

    ```


    The results from Listing [18-4](#480547_2_En_18_Chapter.xhtml#PC4) are shown in
    Table [18-2](#480547_2_En_18_Chapter.xhtml#Tab2).


    Table 18-2


    Viewing Unmasked Vendor Information


    | Company Name | Address | Email Address |

    | --- | --- | --- |

    | Kayak Unlimited | 567 3rd Street | sales@kayakutld.com |


    Referencing the table, you are able to identify that the address is 567 3^(rd)
    Street and the email address is sales@kayakutld.com. Now that you’ve confirmed
    you the data is unmasked, you can test how a user with different permissions may
    see the data.


    Listing [18-5](#480547_2_En_18_Chapter.xhtml#PC5) contains T-SQL code to create
    a new user, grant permissions, and execute a query as that user.


    ```

    CREATE USER TestDynamicMasking WITHOUT LOGIN;

    GRANT SELECT ON SCHEMA::dbo TO TestDynamicMasking;

    -- impersonate for testing:

    EXECUTE AS USER = ''TestDynamicMasking'';

    SELECT CompanyName,

    [Address],

    EmailAddress

    FROM dbo.Vendor;

    REVERT;

    Listing 18-5

    Creating a User to Test Dynamic Data Masking

    ```


    You created the user TestDynamicMasking, but you have not associated that user
    with a login. You have given the user the ability to select data on the dbo schema.
    After executing the query to access the Company Name, Address, and Email Address,
    you can see the results shown in Table [18-3](#480547_2_En_18_Chapter.xhtml#Tab3).


    Table 18-3


    Viewing Masked Vendor Information


    | Company Name | Address | Email Address |

    | --- | --- | --- |

    | Kayak Unlimited | 5xxxxet | sXXX@XXXX.com |


    The table shows that Address as 5xxxxet and the email address as sXXX@XXXX.com.
    While this user has SELECT permissions, they do not have UNMASK permissions. Therefore,
    this confirms that the data as you expect. If you grant this login UNMASK permissions
    and rerun the example from Listing [18-5](#480547_2_En_18_Chapter.xhtml#PC5),
    the user will be able to see the unmasked data.


    In SQL Server 2022, there is also the ability to have granular unmasking for a
    given user. This allows the user to view specific unmasked data as indicated in
    the `GRANT UNMASK` statement. The code in Listing [18-6](#480547_2_En_18_Chapter.xhtml#PC6)
    gives the UNMASK permission to the `EmailAddress` column for the TestGranularUnmasking
    user.


    ```

    CREATE USER TestGranularUnmasking WITHOUT LOGIN;

    GRANT SELECT ON SCHEMA::dbo TO TestGranularUnmasking;

    GRANT UNMASK ON dbo.Vendor(EmailAddress) TO TestGranularUnmasking;

    -- impersonate for testing:

    EXECUTE AS USER = ''TestGranularUnmasking'';

    SELECT CompanyName,

    [Address],

    EmailAddress

    FROM dbo.Vendor;

    REVERT;

    Listing 18-6

    Creating a User to Test Granular Unmasking

    ```


    This T-SQL code indicates that the TestGranularUnmasking should be able to unmask
    the EmailAddress on the `dbo.Vendor` table. Table [18-4](#480547_2_En_18_Chapter.xhtml#Tab4)
    shows the results returned from the query in Listing [18-6](#480547_2_En_18_Chapter.xhtml#PC6).


    Table 18-4


    Viewing Granular Unmasked Vendor Information


    | Company Name | Address | Email Address |

    | --- | --- | --- |

    | Kayak Unlimited | 5xxxxet | sales@kayakutld.com |


    The query results have sales@kayakutld.com as the EmailAddress, confirming that
    this column in unmasked. As expected, the `Address` column is still masked and
    has the value of 5xxxxet. In SQL Server 2022, you can use granular unmasking for
    databases, schemas, tables, or columns using the T-SQL code `GRANT UNMASK ON`.


    Until now, I have only covered how to create a new table with dynamic data masking.
    However, it is far more likely that you will want to implement dynamic data masking
    when adding new columns in an existing table or on columns in existing tables.
    The T-SQL code to mask a customer’s data of birth using the datetime masking function
    is available in Listing [18-7](#480547_2_En_18_Chapter.xhtml#PC7).


    ```

    ALTER TABLE dbo.Customer

    ADD DateOfBirth DATETIME2(2)

    MASKED WITH (FUNCTION = ''datetime("Y")'')

    NULL;

    Listing 18-7

    Adding a Column to a Table with Dynamic Data Masking

    ```


    This code will create a new column named `DateOfBirth` to the `dbo.Customer` table.
    As the same time, the column `DateOfBirth` will also be configured to use the
    datatime masking function. This T-SQL will cause any user that has not been granted
    UNMASK to the database, schema, table, or column to only have the year returned
    for the data of birth.


    After you have used data discovery and classification to identify columns with
    sensitive data, you can decide how you may want to implement dynamic data masking
    on those columns. In addition, it is also possible to add a new column to an existing
    table where the new column is configured for dynamic data masking. Listing [18-8](#480547_2_En_18_Chapter.xhtml#PC8)
    has the T-SQL code needed to change an existing column to using dynamic data masking.


    ```

    ALTER TABLE dbo.CustomerOrder

    ALTER COLUMN OrderNumber

    ADD MASKED WITH (FUNCTION = ''default()'');

    Listing 18-8

    Altering an Existing Column to Have Dynamic Data Masking

    ```


    The existing column `OrderNumber` in the `dbo.CustomerOrder` table should be updated
    to use the default masking function. However, the column `OrderNumber` cannot
    be modified due to pre-existing dependencies on it. The error messages returned
    are indicated in Figure [18-14](#480547_2_En_18_Chapter.xhtml#Fig14).


    ![](images/480547_2_En_18_Chapter/480547_2_En_18_Fig14_HTML.jpg)


    A text presents an error message. The last line of the message reads, alter table
    alter column order number failed because one or more objects access this column.


    Figure 18-14


    Error message: table has foreign key


    The error messages state that *The object ‘viewCustomerOrderBound’ is dependent
    on column ‘OrderNumber’. ALTER TABLE ALTER COLUMN OrderNumber failed because one
    or more objects access this column.* The first error message is due to the schema
    binding on the view `dbo.vwCustomerOrderBound`. The second error message occurs
    any time the column has a dependency including non-clustered indexes. One possible
    solution is to temporarily remove the schema binding from the view `dbo.vwCustomerOrderBound`
    as shown in Listing [18-9](#480547_2_En_18_Chapter.xhtml#PC9).


    ```

    CREATE OR ALTER VIEW dbo.vwCustomerOrderBound

    AS

    SELECT cus.FirstName,

    cus.LastName,

    cus.FirstName + '' '' + cus.LastName AS FullName,

