    **清单 11-2**

    原始存储过程


    执行此存储过程时，你期望看到表中的所有客户都被返回。执行此存储过程后，你得到的记录如表 11-2 所示。


    **表 11-2**

    所有客户示例


    | CustomerID | FirstName | LastName | IsActive |

    | --- | --- | --- | --- |

