  trans: '

    你可能还会发现，有时数据库代码已准备好部署，但业务尚未准备好启用新功能。本章前面已经介绍过，特性开关如何帮助你控制应用程序使用数据库代码的当前状态还是未来状态。有一种部署方法可以在这些情况下提供帮助。其最大优势在于，你可以在不使用这些新
    T-SQL 代码的情况下部署数据库代码。根据所更改的数据库对象，管理起来可能相对容易或困难。


    当你想要部署 T-SQL 代码更改，但尚未准备好将这些更改发布到生产环境时，可以使用一种部署方法来帮助你。这种部署方法被称为 *暗部署*。此方法使用特性开关或类似概念。你部署
    T-SQL 代码，使得数据库代码继续按原有方式运行。当你准备好启用新功能时，可以启用特性开关。这会切换数据库代码的工作方式，使其使用新功能而非原始数据库代码。


    ## 暗部署步骤


    应用程序和数据库的初始状态如图 12-2 所示。


    ![](img/480547_2_En_12_Fig2_HTML.jpg)


    图 12-2：未修改的应用程序和数据库


    暗部署的下一步是通过部署 SQL 脚本来更新数据库。如果你使用特性开关，此时应将其禁用。图 12-3 中的数据库已用新的数据库代码更新。


    ![](img/480547_2_En_12_Fig3_HTML.jpg)


    图 12-3：部署数据库更改


    部署带有特性开关的 T-SQL 代码后，你现在就可以部署应用程序了。一旦你部署应用程序并启用特性开关，你的应用程序和数据库将处于相同状态，如图 12-4 所示。


    ![](img/480547_2_En_12_Fig4_HTML.jpg)


    图 12-4：部署应用程序并启用特性开关


    这些步骤可以让你以“暗”的方式部署数据库更改。


    ## 蓝绿部署


    数据库部署涉及许多风险。这些风险可能涉及不再按预期工作的 T-SQL 代码或应用程序代码。也存在代码看似有效但实际不符合预期的风险。在某些情况下，这个问题可能只是表面性的。其他时候，数据库代码中的缺陷可能会对保存在数据库中的数据质量产生负面影响。这可能包括以导致数据无法再使用的方式更改数据。为避免这类情况，可以使用不同的部署方法来保护数据库和应用程序。


    一种潜在的部署方法是将一组硬件替换为装有更新软件的另一组硬件。这种部署方法被称为 *蓝绿部署*。这对应用程序效果很好，但当涉及数据库时会更加困难。如果你的应用程序仅使用数据库读取数据，你可以直接使用蓝绿方法。然而，由于该概念是完全替换代码，这对于需要允许写入活动的数据库效果不佳。


    有一种改进的蓝绿方法可用于数据库。在这种方法中，你仍然有两组应用程序：原始应用程序和新应用程序。当用户连接到原始应用程序时，你部署那些可以更新并仍允许原始应用程序按预期工作的脚本。如果你使用特性开关，你部署使用了特性开关的数据库对象。一旦你准备好开始使用新的应用程序代码，你可以更新存储过程，开始为新的应用程序代码使用特性开关。在你确信对应用程序和数据库代码的更新按预期工作后，可以移除特性开关。此时，你已完全过渡到新的应用程序代码，并且所有特性开关都将从
    T-SQL 代码中移除。


    ## 蓝绿部署步骤


    你的蓝绿部署的初始状态如图 12-5 所示。


    ![](img/480547_2_En_12_Fig5_HTML.jpg)


    图 12-5：未修改的应用程序和数据库


    在部署前，应用程序和数据库均未修改。蓝绿数据库部署的下一步是部署那些将对原始或新应用程序都有效的数据库更改。图 12-6 显示数据库已应用了一些更改。


    ![](img/480547_2_En_12_Fig6_HTML.jpg)


    图 12-6：部署数据库更改


    原始应用程序将继续连接到已修改的数据库。蓝绿部署方法基于替换代码而非覆盖代码的概念。为了遵循此部署方法，你需要搭建新应用程序所需的硬件和软件。图 12-7
    显示了数据库和更新后的应用程序的状态。


    ![](img/480547_2_En_12_Fig7_HTML.jpg)


    图 12-7：部署新应用程序


    在特性开关就位的情况下，两个应用程序继续以与原始应用程序相同的方式运行。既然应用程序代码已准备就绪，就可以在数据库中启用特性开关了。图 12-8 显示了更新后的应用程序连接到更新后的数据库。


    ![](img/480547_2_En_12_Fig8_HTML.jpg)


    图 12-8：移除特性开关


    更新后的应用程序和数据库已启动并运行，原始应用程序已停用。新的状态将如图 12-9 所示。


    ![](img/480547_2_En_12_Fig9_HTML.jpg)


    图 12-9：移除原始应用程序


    移除原始应用程序信息即完成蓝绿部署过程。重申一下，蓝绿部署的过程如下：


    1.  从未修改的应用程序和数据库开始。

    2.  向数据库添加一个特性开关。

    '
- fmt: "3.  Deploy an updated application using the new `feature flag`.\n    1.  The\
    \ unmodified application can continue to work as before.\n\n2.  The modified application\
    \ will use the new features due to the `feature flag`.\n\n4.  Remove the unmodified\
    \ application.\n\n5.  Update the remaining application code to have the same functionality\
    \ without the `feature flag`.\n\n6.  Remove the `feature flag`.\n\nThis deployment\
    \ method lets you manage how you deploy and enable your new database code.\n\n\
    While impacting the quality of the data is one issue, there are also concerns\
    \ related to the performance of changes that are made to the database code. In\
    \ some cases, database objects may be added or modified in a way that causes a\
    \ severe degradation of performance. Depending on how the applications are configured,\
    \ this can cause the applications to fail. There are some deployment strategies\
    \ that can be implemented to help identify potential performance issues before\
    \ they are visible to the end users.\n\nYou may also want to test your new code\
    \ before letting everyone use the new `T-SQL` code. It is possible to get a general\
    \ idea of the performance of your `T-SQL` code by using a separate database where\
    \ the changes to the `T-SQL` code have been applied. Due to the nature of `SQL\
    \ Server` at this time, you can only test read transactions on this secondary\
    \ database. When you use this method, you are using a `canary deployment method`.\
    \ The concept is that the application will connect to both databases. The second\
    \ database will only perform read transactions. With additional hardware, you\
    \ can have most of the transactions sent to the original database and a small\
    \ portion of the activity sent to the second database. As you gain confidence\
    \ in the new `T-SQL` code, you can increase the volume of activity sent to second\
    \ database.\n\nWhen designing code that is deployable, you want to start at the\
    \ very beginning. You must understand how your teams are structured, your development\
    \ cycle, and when your code is deployed across your environments. The goal is\
    \ to write maintainable and manageable `T-SQL` code. You can choose to deploy\
    \ your `T-SQL` code using a migration-based approach where you can control exactly\
    \ what is getting deployed to your environments. You can instead choose to use\
    \ a state-based deployment method where you control what your database will be\
    \ after the deployment. You can also determine how to handle developing code that\
    \ is not ready to be deployed. Using branching and merging strategies, you can\
    \ keep the code that is in development separate from the code that will be deployed.\
    \ There is also the option of using `feature flags` so that you can deploy code\
    \ at any point in time and control when the new functionality is enabled. Regardless\
    \ of the methods you chose, you want to determine a deployment strategy that can\
    \ be defined and is repeatable.\n\n# 13. Functionality\n\nOver the course of this\
    \ book, we have covered many different topics. Most of these chapters involve\
    \ best practices. These best practices involve naming conventions, formatting\
    \ `T-SQL` code, or designing database objects. Despite your best efforts, you\
    \ may find yourself in a situation that is outside the scope of best practices.\
    \ These times can correlate to periods of high stress or tight deadlines. The\
    \ goal of this chapter is to help you prepare for the situations when you must\
    \ make quick decisions about complex topics.\n\nDesigning database code for applications\
    \ that are created to let users insert or update data can be challenging. You\
    \ may find yourself dealing with applications where you need to disable permissions\
    \ or functionality. When dealing with legacy application code, there may be additional\
    \ challenges particularly if those applications are using `ORM` (Object-Relational\
    \ Mapping) software. As organizations grow, there may be a need for additional\
    \ reporting, but there may not be the time required to develop a data warehouse.\
    \ Within `SQL Server`, there is the ability to make your `T-SQL` code more flexible,\
    \ but you must ensure that you do not sacrifice functionality at the cost of flexibility.\n\
    \nIn this chapter, you will review common programing requirements and `T-SQL`\
    \ coding methods that can be used to meet those requirements. For each method,\
    \ you will review pros and cons to help you make a quick decision."
