- fmt: '# 关系数据库中的整数数据类型


    关系数据库几乎总是拥有比其他任何数据类型都多的整数数据类型。这些整数无所不能，从递增表、创建表之间的关系到存储业务各个方面的信息。一个常见的诱惑是将所有整数都当作
    `INT` 处理，但在选择使用哪种数据类型时应该多加注意。


    举个例子，想象一个货运行业的数据库。如果你想保存一天内行驶的公里数，你不需要一个大于 2,880 的数字（每小时 120 公里乘以一天 24 小时）。存储发票上的行数，对于大多数企业来说都会小于
    256。也可能有业务的某部分需要每几分钟存储一次送货车辆的位置。如果有 5,000 辆卡车每两到三分钟更新一次该表，三年后该表可能会增长到三十亿条记录。在这种情况下，你需要选择一个
    `BIGINT`，可能初始化为 -9,223,372,036,854,775,808，而不是选择初始化为 1 的 `INT`，后者只允许你保存 2,147,483,647
    条记录。


    ## DECIMAL/NUMERIC


    既然我们已经讨论了各种整数，现在让我们考虑如何处理需要小数位的数字。在很多情况下你都会需要小数位。`DECIMAL` 和 `NUMERIC` 之间没有区别。在
    SQL Server 中，它们是同一种数据类型。其中一些情况涉及使用美元和美分，其他时候你需要小数位来保证测量的精度。在这些场景下有几种选择。


    首先，是 `DECIMAL` 选项（也称为 `NUMERIC` 数据类型）。这个值不保存任何货币信息；但是，它会记录小数位。这些小数位可以通过指定要存储的总位数和小数点右边的位数来设定。例如，`DECIMAL(10,4)`
    数据类型表示你可以存储一个数字，其小数点左边有 6 位（即 10 减 4），小数点右边有 4 位，例如 999999.9999。如果你创建的数据类型是 `NUMERIC(9,2)`，你可以存储从
    -9999999.99 到 999999.99 的数字。你会发现 `DECIMAL` 或 `NUMERIC` 数据类型对于几乎所有涉及数字的数据类型都是可以接受的。这包括通用数字、小数、测量值和货币价值。


    考虑到 `DECIMAL` 类型可以表示多种不同类型的数字，让我们来审视一下这种数据类型。`DECIMAL` 数据类型有一些特定的术语。构成 `DECIMAL`
    数据类型的值是精度和小数位数。精度指的是 `DECIMAL` 数据类型中存储的总位数。小数位数指的是存储在小数点右边的位数。回顾之前货运行业的例子，如果你想存储每升公里数，使用
    `DECIMAL(3,1)` 数据类型可能是合理的，因为你不太可能拥有 99.9 的每升公里数。


    ## SMALLMONEY 和 MONEY


    接下来要讨论的数据类型是 `MONEY` 和 `SMALLMONEY`。`MONEY` 和 `SMALLMONEY` 数据类型类似于 `DECIMAL` 或
    `NUMERIC` 数据类型。`SMALLMONEY` 和 `MONEY` 数据类型也可以用来存储货币价值。SQL Server 保存数值，但不包含与所保存值关联的货币类型。


    `MONEY` 和 `SMALLMONEY` 数据类型之间最大的区别在于大小和所需的存储空间。`SMALLMONEY` 数据类型的范围是 –214,000
    到 214,000，使用的存储空间是 `MONEY` 类型的一半，后者的范围是 –9220 亿到 9220 亿。


    `MONEY` 数据类型最多可精确存储四位小数。小数位的限制将精度限制到所存储货币价值的万分之一。`MONEY` 数据类型将所有值保存到四位小数。固定的小数位数会影响四舍五入对涉及
    `MONEY` 数据类型的计算的影响。这是因为 SQL Server 将 `MONEY` 数据类型保存为 `BIGINT`。同样，`SMALLMONEY`
    数据类型被保存为 `INT`。这就解释了为什么使用 `MONEY` 或 `SMALLMONEY` 时可能会有四舍五入的问题。


    只要您意识到 `MONEY` 数据类型可能对计算产生的影响并相应地进行规划，选择 `MONEY` 还是 `DECIMAL(9,4)` 主要是一个偏好问题。主要目标是在存储与货币相关的数据时保持一致性，以便数据库管理员和开发人员都能快速理解相关数据字段的目的和含义。虽然这种数据类型比
    `DECIMAL` 节省空间，但您的数据库管理员还可以通过其他方式节省空间，而不涉及更改数据类型。


    ### 近似数字数据类型


    接下来，我们来分析精确数字和近似数字之间的区别。精确数字适用于你确切知道其数量的事物，比如你在商店买了多少件物品，或者确切的美元和美分数额。近似数字适用于测量可能不精确的场景。近似数字可用于存储非常大或非常小的数字。你可能还会发现你的应用程序正在记录一个不精确的测量值。你可能剪下一块接近但不完全等于特定值的布料长度。例如，布料的长度可能在
    12 英寸左右。存储 12 英寸的值将是一个近似值。这个 12 英寸的测量可能非常接近，以至于很难看出布料的长度不是 exactly 12 英寸。


    在处理近似数字时，会涉及到一些四舍五入问题。这是因为已知近似数字不是精确的测量值。在 SQL Server 中，有一种近似数字的选项。这种数据类型叫做 `FLOAT`。如果浮点数有
    24 位数字，其同义数据类型是 `REAL`。


    > **注意**

    >

    > 可能会很想使用 `FLOAT` 或 `REAL`，因为它们可以容纳非常大的数字，并且分别只使用 4 或 8 个字节。但是，这些数据类型在某些 `WHERE`
    子句中表现不佳。这些数据类型应仅在非常有限的情况下使用，即当无法使用 `DECIMAL` 或 `BIGINT` 时。

    >

    > 在使用 `REAL` 或 `FLOAT` 数字时，将这些数据类型转换为其他数据类型可能会出现问题。当你将 `FLOAT` 数据类型转换为 `INTEGER`
    时，小数部分的所有值都会被截断。请注意，使用近似数字可能会导致意外结果。一个例子是使用 `DECIMAL` 或 `NUMERIC` 数据类型时。当将 `FLOAT`
    或 `REAL` 数字转换为 `DECIMAL` 或 `NUMERIC` 数据类型时，你只能保留七位小数。'
  raw: 'Relational databases almost always have more whole number data types than
    any other data type. These whole numbers do everything from incrementing tables
    and creating relationships between tables to storing information about various
    aspects of the business. One of the common temptations is to treat all whole numbers
    as INT, but some care should be used when selecting which data type to use.


    As an example, imagine a database for the trucking industry. If you want to save
    the number of kilometers driven in a day, you don’t need a number larger than
    2,880 (120 kilometers per hour times 24 hours in a day). Storing the number of
    lines on an invoice will be less than 256 for most businesses. There may also
    be some part of the business that is storing the location of a delivery vehicle
    every couple of minutes. If there are 5,000 trucks updating that table every two
    to three minutes, over three years that table could grow to three billion records.
    In that case, you want to choose a BIGINT, possibly seeded at -9,223,372,036,854,775,808
    instead of choosing INT seeded at 1, which would only allow you to save 2,147,483,647
    records.


    #### DECIMAL/NUMERIC


    Now that we have discussed various integers, let’s consider what to do with numbers
    that require decimals. There are various cases where you are going to want decimal
    places. There is no difference between DECIMAL and NUMERIC. They are the same
    data type in SQL Server. Some of these cases involve using dollars and cents,
    and other times you need decimal places for precision in measurements. There are
    a couple of options available in these scenarios.


    First, there is the option for DECIMAL (alternatively, it is called a NUMERIC
    data type). This value does not save any currency information with it; however,
    it does record decimal places. These decimal places can be specified by indicating
    both the total number of digits that should be stored and the number of digits
    to the right of the decimal point. For instance, a DECIMAL data type of DECIMAL
    (10,4) indicates that you can store a number with 6, or 10 minus 4, digits to
    the left of the decimal point and digits to the right, such as 999999.9999\. If
    you instead created a data type of NUMERIC (9,2), you can store numbers from -9999999.99
    to 999999.99\. You will find that the DECIMAL or NUMERIC data type is acceptable
    for almost all data types involving numbers. This includes general-purpose numbers,
    decimals, measurements, and money values.


    Considering that the DECIMAL type can represent multiple different types of numbers,
    let’s examine this data type. There are some specific terms for the DECIMAL data
    type. The values that make up a DECIMAL data type are precision and scale. Precision
    relates to the total number of digits that are saved in a DECIMAL data type. Scale
    refers to the number of digits that are stored to the right of the decimal point.
    Referring back to the previous examples with the trucking industry, if you want
    to store kilometers per liter, it may make sense to use the data type DECIMAL(3,1)
    as you are not likely to have kilometers per liter of 99.9.


    #### SMALLMONEY and MONEY


    The next data types to discuss are MONEY and SMALLMONEY. The MONEY and SMALLMONEY
    data types are like the DECIMAL or NUMERIC data type. The SMALLMONEY and MONEY
    data types can also be used to store values for currency. SQL Server saves the
    numeric value and excludes the type of currency associated with the value saved.


    The largest difference between the MONEY and SMALLMONEY data types is the size
    and amount of storage space required. The SMALLMONEY data type covers a range
    from –214,000 to positive 214,000 and uses half the storage as the MONEY type,
    which covers a range from –922 billion to 922 billion.


    The MONEY data type is accurate to store up to four decimal places. The limitation
    on decimal places limits the accuracy to ten thousandths of the monetary value
    stored. The MONEY data type saves all values to four decimal places. The fixed
    number of decimal places impacts how rounding affects calculations involving the
    MONEY data type. This is because SQL Server saves the MONEY data type as BIGINT.
    Similarly, the SMALLMONEY data type is saved as an INT. This explains why you
    may have rounding issues with MONEY or SMALLMONEY.


    Choosing MONEY or DECIMAL (9,4) is mostly a matter of preference as long as you
    are aware of the impact the MONEY data type can have on calculations and plan
    accordingly. The main goal is consistency with how you are storing data relating
    to currency so that DBAs and developers alike can quickly understand the purpose
    and implications of the data field in question. While this data type will save
    space over a DECIMAL, there are other ways your database administrator can save
    space that do not involve changing the data type.


    ### Approximate Number Data Types


    Next, let’s analyze the differences between exact and approximate numbers. Exact
    numbers exist for things that you know the exact quantity of, such as how many
    items you bought at the store or the exact amount in dollars and cents. Approximate
    numbers exist for scenarios where the measurements may not be exact. Approximate
    numbers can be used to store very large or very small numbers. You may also find
    that your application is recording a measurement that is not exact. You may cut
    a length of fabric that is close to but not exactly a specific value. For example,
    the length of fabric may be around 12 inches. Storing the value of 12 inches would
    be an approximate value. This measurement of 12 inches may be so close that it
    would be difficult to tell that the length of fabric was not exactly 12 inches.


    There are some rounding issues that come into play when dealing with approximate
    numbers. This is because approximate numbers are known to not be the exact measurement.
    In SQL Server, there is one option for approximate numbers. This data type is
    called FLOAT. If the floating number has 24 numbers, the synonymous data type
    is REAL.


    Caution


    It may be tempting to use FLOAT or REAL because they can hold such large numbers
    and use only 4 or 8 bytes, respectively. However, these data types do not do well
    with some WHERE clauses. These data types should only be used in very limited
    situations where a DECIMAL or BIGINT can’t be used.


    When working with REAL or FLOAT numbers, there can be issues converting these
    data types to other data types. When you convert a FLOAT data type to an INTEGER,
    all the values in the decimal places get truncated. Be aware that using approximate
    numbers may cause unexpected results. One example is when using the DECIMAL or
    NUMERIC data types. When converting a FLOAT or REAL number to a DECIMAL or NUMERIC
    data type, you are only able to keep seven decimal places.'
  trans: '

    # 关系数据库中的整数数据类型


    关系数据库几乎总是拥有比其他任何数据类型都多的整数数据类型。这些整数用途广泛，从自增表的主键、创建表间关系，到存储业务各个方面的信息。一个常见的诱惑是将所有整数都当作
    `INT` 处理，但在选择使用哪种数据类型时应该多加注意。


    举个例子，想象一个货运行业的数据库。如果你想保存一天内行驶的公里数，你不需要一个大于 2,880 的数字（每小时 120 公里乘以一天 24 小时）。存储发票上的行数，对于大多数企业来说都会小于
    256。也可能有业务的某部分需要每几分钟存储一次送货车辆的位置。如果有 5,000 辆卡车每两到三分钟更新一次该表，三年后该表可能会增长到三十亿条记录。在这种情况下，你需要选择一个
    `BIGINT`，可能初始化为 -9,223,372,036,854,775,808，而不是选择初始化为 1 的 `INT`，后者只允许你保存 2,147,483,647
    条记录。


    ## DECIMAL/NUMERIC


    既然我们已经讨论了各种整数，现在让我们考虑如何处理需要小数位的数字。在很多情况下你都会需要小数位。`DECIMAL` 和 `NUMERIC` 之间没有区别。在
    SQL Server 中，它们是同一种数据类型。其中一些情况涉及使用美元和美分，其他时候你需要小数位来保证测量的精度。在这些场景下有几种选择。


    首先，是 `DECIMAL` 选项（也称为 `NUMERIC` 数据类型）。这个值不保存任何货币信息；但是，它会记录小数位。这些小数位可以通过指定要存储的总位数和小数点右边的位数来设定。例如，`DECIMAL(10,4)`
    数据类型表示你可以存储一个数字，其小数点左边有 6 位（即 10 减 4），小数点右边有 4 位，例如 999999.9999。如果你创建的数据类型是 `NUMERIC(9,2)`，你可以存储从
    -9999999.99 到 9999999.99 的数字。你会发现 `DECIMAL` 或 `NUMERIC` 数据类型对于几乎所有涉及数字的数据类型都是可以接受的。这包括通用数字、小数、测量值和货币价值。


    考虑到 `DECIMAL` 类型可以表示多种不同类型的数字，让我们来审视一下这种数据类型。`DECIMAL` 数据类型有一些特定的术语。构成 `DECIMAL`
    数据类型的值是精度和小数位数。精度指的是 `DECIMAL` 数据类型中存储的总位数。小数位数指的是存储在小数点右边的位数。回顾之前货运行业的例子，如果你想存储每升公里数，使用
    `DECIMAL(3,1)` 数据类型可能是合理的，因为你不太可能拥有 99.9 的每升公里数。


    ## SMALLMONEY 和 MONEY


    接下来要讨论的数据类型是 `MONEY` 和 `SMALLMONEY`。`MONEY` 和 `SMALLMONEY` 数据类型类似于 `DECIMAL` 或
    `NUMERIC` 数据类型。`SMALLMONEY` 和 `MONEY` 数据类型也可以用来存储货币价值。SQL Server 保存数值，但不包含与所保存值关联的货币类型。


    `MONEY` 和 `SMALLMONEY` 数据类型之间最大的区别在于大小和所需的存储空间。`SMALLMONEY` 数据类型的范围是 –214,748.3648
    到 214,748.3647，使用的存储空间是 `MONEY` 类型的一半，后者的范围是 –922,337,203,685,477.5808 到 922,337,203,685,477.5807。


    `MONEY` 数据类型最多可精确存储四位小数。小数位的限制将精度限制到所存储货币价值的万分之一。`MONEY` 数据类型将所有值保存到四位小数。固定的小数位数会影响四舍五入对涉及
    `MONEY` 数据类型的计算的影响。这是因为 SQL Server 将 `MONEY` 数据类型保存为 `BIGINT`。同样，`SMALLMONEY`
    数据类型被保存为 `INT`。这就解释了为什么使用 `MONEY` 或 `SMALLMONEY` 时可能会有四舍五入的问题。


    只要您意识到 `MONEY` 数据类型可能对计算产生的影响并相应地进行规划，选择 `MONEY` 还是 `DECIMAL(9,4)` 主要是一个偏好问题。主要目标是在存储与货币相关的数据时保持一致性，以便数据库管理员和开发人员都能快速理解相关数据字段的目的和含义。虽然这种数据类型比
    `DECIMAL` 节省空间，但您的数据库管理员还可以通过其他方式节省空间，而不涉及更改数据类型。


    ### 近似数字数据类型


    接下来，我们来分析精确数字和近似数字之间的区别。精确数字适用于你确切知道其数量的事物，比如你在商店买了多少件物品，或者确切的美元和美分数额。近似数字适用于测量可能不精确的场景。近似数字可用于存储非常大或非常小的数字。你可能还会发现你的应用程序正在记录一个不精确的测量值。你可能剪下一块接近但不完全等于特定值的布料长度。例如，布料的长度可能在
    12 英寸左右。存储 12 英寸的值将是一个近似值。这个 12 英寸的测量可能非常接近，以至于很难看出布料的长度不是正好 12 英寸。


    在处理近似数字时，会涉及到一些四舍五入问题。这是因为已知近似数字不是精确的测量值。在 SQL Server 中，有一种近似数字的选项。这种数据类型叫做 `FLOAT`。如果浮点数有
    24 位数字，其同义数据类型是 `REAL`。


    > **注意**

    >

    > 可能会很想使用 `FLOAT` 或 `REAL`，因为它们可以容纳非常大的数字，并且分别只使用 4 或 8 个字节。但是，这些数据类型在某些 `WHERE`
    子句中表现不佳。这些数据类型应仅在非常有限的情况下使用，即当无法使用 `DECIMAL` 或 `BIGINT` 时。

    >

    > 在使用 `REAL` 或 `FLOAT` 数字时，将这些数据类型转换为其他数据类型可能会出现问题。当你将 `FLOAT` 数据类型转换为 `INTEGER`
    时，小数部分的所有值都会被截断。请注意，使用近似数字可能会导致意外结果。一个例子是使用 `DECIMAL` 或 `NUMERIC` 数据类型时。当将 `FLOAT`
    或 `REAL` 数字转换为 `DECIMAL` 或 `NUMERIC` 数据类型时，你只能保留七位小数。

    '
- fmt: '### Converting Number Data Types


    你已经探索了可用的数字类型，以及使用各种数字数据类型时会发生什么。除了存储数字，你还想了解各种数字数据类型如何相互作用。首先，让我们考虑当你使用相同数据类型的字段进行计算时会发生什么。在这些场景中，如果计算涉及的所有字段都是相同的数据类型，则计算结果的输出值也是相同的数据类型。因此，如果你将一个数量乘以一个价格，并且两个值都存储为
    `NUMERIC` 数据类型的 `DECIMAL(5,2)`，它会给出相同的 `DECIMAL` 数据类型作为结果。SQL Server 根据初始精度和小数位数以及所执行的计算类型来确定结果的精度和小数位数。你还需要考虑精度和小数位数在应用程序中是如何存储的。应用程序可能期望一个
    `DECIMAL(5,2)` 的值。根据所执行的计算，返回的数据值可能超出指定数据类型的范围。这可能导致计算溢出。


    当涉及多种数据类型时，情况会变得更复杂一些。再次使用数量乘以价格的例子，让我们研究一下如果你的 `INT` 数据类型的数量与 `DECIMAL(5,2)`
    数据类型的价格进行计算会发生什么。SQL Server 使用数据类型优先级的过程。首先，你应该熟悉目前所涉及数据类型的数据类型优先级顺序。以下列表按优先级从高到低排列：


    1. `FLOAT`

    2. `REAL`

    3. `DECIMAL`

    4. `MONEY`

    5. `SMALLMONEY`

    6. `BIGINT`

    7. `INT`

    8. `SMALLINT`

    9. `TINYINT`

    10. `BIT`


    在前面的场景中，你同时使用了 `INT` 和 `DECIMAL` 数据类型，在上面的列表中分别显示为第8行和第3行。由于 `INT` 的优先级较低，你可以预期
    SQL Server 会在内部将 `INT` 数据类型转换为 `DECIMAL` 数据类型。这称为隐式转换，它会增加查询执行时间。此转换不会更改原始数据值，只会更改
    SQL Server 在计算中使用此值的方式。一旦此转换完成，SQL Server 就会继续进行计算。除非你正在执行类似尝试连接数字和字符串数据类型的操作，否则这很有效。


    ## String Data Types


    现在你了解了如何使用数字数据类型，你应该花一些时间了解各种字符串数据类型。这些数据类型用于存储字母、字母和数字的组合。此外，字符串数据类型用于存储非 Unicode
    或 Unicode 字符值。字符串数据类型的最后一个类别包括图像和二进制值。


    ### Character String Data Types


    有些信息存储在数据库中，与数字没有直接关系。存储在字符字符串中的数据可以是 ANSI 或 Unicode。字符串也可以创建为固定长度或可变长度。这些数据可以是名称、描述、地址或其他字符值。确定使用哪种数据类型取决于所存储的信息类型以及需要存储多少信息。在本节之后，你将能够根据需要选择正确的字符串数据类型。


    #### CHAR and VARCHAR


    两种可用的字符字符串数据类型是 `CHAR` 和 `VARCHAR`。这些数据类型相似，仅在字符串是存储为固定长度还是可变长度字符字符串方面有所不同。两种数据类型都用于存储文本数据，这些字段中可以存储的字符与列排序规则允许的字符相同。


    `CHAR` 用于字符字段，表示数据类型具有固定长度。`VARCHAR` 用于可变字符字段。`VARCHAR` 中的 `VAR` 表示数据类型具有可变长度。如果数据长度相似，例如电话号码或邮政编码，那么
    `CHAR` 可能是首选数据类型。但是，如果列宽度差异很大，例如地址行或备注列，那么 `VARCHAR` 将是更好的选择。


    为 `CHAR` 或 `VARCHAR` 选择值时，可以选择 1 到 8000 之间的值或 `MAX` 这个词。请考虑将 `VARCHAR(MAX)` 的使用限制在你期望保存超过
    8000 个字符的情况。如果指定了 `VARCHAR(MAX)`，则最大存储大小为 2 GB。但是，请考虑你是否需要此功能，或者使用较小字符数的 `VARCHAR`
    可能更合适。


    为了最大程度地减少数据截断，请确保在使用 `CHAR` 或 `VARCHAR` 数据类型时始终显式指定存储的字节数。`VARCHAR` 在数据定义中默认为
    1，在使用 `CAST` 或 `CONVERT` 函数时默认为 30 字节。


    对于使用单字节编码字符（例如 Latin）的排序规则，`CHAR` 的存储大小（以字节为单位）等于字符数。使用 `VARCHAR` 时，字段的字符串长度（在单字节编码的情况下与字符数相同）加上两个额外的字节等于存储的总字节数。还可以在
    `CHAR` 和 `VARCHAR` 数据类型中保存多字节编码字符。对于这两种数据类型，保存的字符数可能少于总字节数。


    从 SQL Server 2019 开始，现在可以在 `CHAR` 或 `VARCHAR` 中保存 Unicode 值。但是，仅当启用 UTF-8 编码时才可能。


    #### TEXT


    `TEXT` 数据类型过去用于存储非常大的字符串。但是，此数据类型已弃用。由于此数据类型已弃用，应避免在新开发中使用 `TEXT` 数据类型。如果你需要使用
    `TEXT` 数据类型，请在新开发中改用数据类型 `VARCHAR(MAX)`。


    ### Unicode String Data Types


    在 SQL Server 2019 之前，任何 Unicode 文本数据都需要保存为特殊数据类型。在无法或未启用 UTF-8 编码的情况下，这仍然成立。


    #### NCHAR and NVARCHAR


    使用 Unicode 值时，有几个可用选项。这些选项包括存储固定长度或可变长度字符串。为了避免意外结果，你应了解如果未指定字符数或排序规则，这些数据类型如何工作。


    一旦确定需要使用 `NCHAR` 或 `NVARCHAR` 数据类型，选择它们就变得容易了。如果要存储的数据长度通常相似，则 `NCHAR` 数据类型是正确的选择。但是，如果存储的值差异很大，则
    `NVARCHAR` 数据类型可能是更好的选择。此外，如果要存储的字符数超过 4000，则建议使用 `NVARCHAR(MAX)`。


    通常，最佳做法是在声明 `NCHAR` 或 `NVARCHAR` 数据类型时指定字符数。数据定义或变量声明的默认字符数对于 `NCHAR` 或 `NVARCHAR`
    是 1 个字符。但是，使用 `CAST` 或 `CONVERT` 函数时，如果未指定，则默认字符数为 30。如果未为 `NCHAR` 或 `NVARCHAR`
    数据类型指定排序规则，将使用默认数据库排序规则。


    了解存储此数据类型所需的空间量还可以让你更好地判断这是否是正确的数据类型以及需要存储的字符数。存储 `NCHAR` 所占用的字节数是字节对字符串长度的两倍；使用
    `NVARCHAR` 时，存储的字节数是字节对字符串长度的两倍加 2 个字节。'
  raw: '### Converting Number Data Types


    You have explored the types of numbers available and what happens in working with
    the various number data types. In addition to storing numbers, you also want to
    understand how various number data types interact with one another. First, let’s
    consider what happens when you do calculations involving fields with the same
    data type. In these scenarios, if all the fields for the calculation are of the
    same data type, the output of the calculation is a value of the same data type.
    Therefore, if you multiply a quantity times the price and both values are stored
    as a NUMERIC data type of DECIMAL(5,2), it gives the same data type of DECIMAL
    as a result. SQL Server determines the result precision and scale based on the
    starting precision and scale as well as the type of calculation performed. You
    also want to consider how the precision and scale is stored in the application.
    The application may be expecting a value of DECIMAL(5,2). Based on the calculation
    performed, the data values returned may be outside the range of the data type
    specified. This can cause an overflow in calculation.


    Things can get a little more interesting when working across various data types.
    To use the example of quantity times price again, let’s examine what happens if
    you have an INT data type for the quantity that is calculated with a DECIMAL (5,2)
    data type for the price. SQL Server uses the process of data type precedents.
    First, you should get familiar with the data type order of precedence related
    to the data types covered so far. The following list is ordered from highest order
    to lowest:


    1.  FLOAT


    2.  REAL


    3.  DECIMAL


    4.  MONEY


    5.  SMALLMONEY


    6.  BIGINT


    7.  INT


    8.  SMALLINT


    9.  TINYINT


    10.  BIT


    In the preceding scenario, you are using both the INT and DECIMAL data types,
    shown in the preceding list as lines 8 and 3 respectively. Since INT has the lower
    precedence, you expect that SQL Server will internally convert the INT data type
    to the DECIMAL data type. This is called an implicit conversation and it adds
    time to the query execution. This conversion does not change the original data
    value, only how SQL Server uses this value as part of the calculation. Once this
    conversion is complete, SQL Server moves forward with the calculation. This works
    well unless you are performing an action like trying to concatenate number and
    string data types.


    ## String Data Types


    Now that you know how to work with number data types, you should spend some time
    on the various string data types. These data types are used to store alphabetical
    letters, words, or combinations or letters and numbers. In addition, string data
    types are used to store character values that are either non-Unicode or Unicode.
    The last category of string data types includes images and binary values.


    ### Character String Data Types


    There is information that will be stored in the database that is not related directly
    to numbers. The data stored in character strings can be ANSI or Unicode. Strings
    can also be created with a fixed or variable length. This data can be names, descriptions,
    addresses, or other character values. Determining which data type to use depends
    on what type of information is being stored and how much information needs to
    be stored. After this section, you will be prepared to choose the correct string
    data type for your needs.


    #### CHAR and VARCHAR


    Two of the character string data types available are CHAR and VARCHAR. These data
    types are similar and only vary regarding whether the string is stored as a fixed-length
    or variable-length character string. Both data types are used to store text data,
    and the characters that can be stored in these fields are the same characters
    allowed by the collation of the column.


    CHAR is for character field, which is used to signify that the data type has a
    fixed length. VARCHAR is used for a variable character field. The VAR in VARCHAR
    indicates that the data type has a variable length. If the data will have similar
    lengths, like phone numbers or ZIP codes, then CHAR may be the preferred data
    type. However, if the column widths will vary significantly, as is the case with
    address lines or notes columns, then VARCHAR will be a better option.


    When choosing a value for CHAR or VARCHAR, you can choose either a value between
    1 and 8000 or the word MAX. Consider limiting the use of VARCHAR(MAX) for situations
    where you expect to save more than 8000 characters. If VARCHAR(MAX) is specified,
    then the maximum storage size is 2 GB. However, consider if you need this functionality
    or if using VARCHAR with a smaller number of characters may be more appropriate.


    In order to minimize truncating data, make sure to always specify the number of
    bytes stored explicitly when using the CHAR or VARCHAR data types. VARCHAR defaults
    to 1 for data definition and 30 bytes when using the CAST or CONVERT functions.


    For collations using single-byte encoding characters, such as Latin, the storage
    size in bytes for CHAR is equal to the number of characters. When working with
    VARCHAR, the string length of the field, which in the case of single-byte encoding
    is the same as the number of characters, plus two additional bytes is equal to
    the total number of bytes stored. It is also possible to save multi-byte encoding
    characters in the CHAR and VARCHAR data types. For both data types, the number
    of characters saved may be less than the total number of bytes.


    Starting with SQL Server 2019, it is now possible to save Unicode values in CHAR
    or VARCHAR. However, this is only possible if UTF-8 encoding is enabled.


    #### TEXT


    The TEXT data types have been used to store very large strings of characters.
    However, this data type has been deprecated. As this data type has been deprecated,
    you want to avoid using the TEXT data type for new development. If you need to
    use the TEXT data type, use the data type VARCHAR(MAX) for new development instead.


    ### Unicode String Data Types


    Prior to SQL Server 2019, any Unicode text data needed to be saved as a special
    data type. This is still true for situations where UTF-8 encoding cannot be or
    is not enabled.


    #### NCHAR and NVARCHAR


    When using Unicode values, there are a couple of options available. These options
    include storing a fixed or variable-length string. In order to avoid unexpected
    results, you should understand how these data types work if the number of characters
    or collation is not specified.


    Once you have determined that you need to use the NCHAR or NVARCHAR data types,
    choosing between them gets easy. If the data being stored will generally have
    similar lengths, then the NCHAR data type is the correct choice. However, if the
    values stored will vary significantly, then the NVARCHAR data type may be a better
    choice. In addition, if the number of characters to be stored is over 4000, it
    is recommended to use NVARCHAR(MAX).


    Typically, it is best practice to specify the number of characters when declaring
    the NCHAR or NVARCHAR data types. The default number of characters for data definition
    or variable declaration is 1 character for NCHAR or NVARCHAR. However, when using
    the CAST or CONVERT function, the default number of characters is 30 if none are
    specified. If a collation is not specified for the NCHAR or NVARCHAR data type,
    the default database collation will be used.


    Understanding the amount of space required to store this data type also allows
    you to make better decisions about if this is the correct data type and the number
    of characters that need to be stored. Storing NCHAR takes up twice as many bytes
    as the string length of the byte pairs; when using NVARCHAR the number of bytes
    stored is twice the string length in byte pairs plus 2 bytes.'
  trans: '


    ### 转换数字数据类型


    你已经探索了可用的数字类型，以及使用各种数字数据类型时会发生什么。除了存储数字，你还想了解各种数字数据类型如何相互作用。首先，让我们考虑当你使用相同数据类型的字段进行计算时会发生什么。在这些场景中，如果计算涉及的所有字段都是相同的数据类型，则计算结果的输出值也是相同的数据类型。因此，如果你将一个数量乘以一个价格，并且两个值都存储为
    `NUMERIC` 数据类型的 `DECIMAL(5,2)`，它会给出相同的 `DECIMAL` 数据类型作为结果。SQL Server 根据初始精度和小数位数以及所执行的计算类型来确定结果的精度和小数位数。你还需要考虑精度和小数位数在应用程序中是如何存储的。应用程序可能期望一个
    `DECIMAL(5,2)` 的值。根据所执行的计算，返回的数据值可能超出指定数据类型的范围。这可能导致计算溢出。


    当涉及多种数据类型时，情况会变得更复杂一些。再次使用数量乘以价格的例子，让我们研究一下如果你的 `INT` 数据类型的数量与 `DECIMAL(5,2)`
    数据类型的价格进行计算会发生什么。SQL Server 使用数据类型优先级的过程。首先，你应该熟悉目前所涉及数据类型的数据类型优先级顺序。以下列表按优先级从高到低排列：


    1. `FLOAT`

    2. `REAL`

    3. `DECIMAL`

    4. `MONEY`

    5. `SMALLMONEY`

    6. `BIGINT`

    7. `INT`

    8. `SMALLINT`

    9. `TINYINT`

    10. `BIT`


    在前面的场景中，你同时使用了 `INT` 和 `DECIMAL` 数据类型，在上面的列表中分别显示为第 8 行和第 3 行。由于 `INT` 的优先级较低，你可以预期
    SQL Server 会在内部将 `INT` 数据类型转换为 `DECIMAL` 数据类型。这称为隐式转换，它会增加查询执行时间。此转换不会更改原始数据值，只会更改
    SQL Server 在计算中使用此值的方式。一旦此转换完成，SQL Server 就会继续进行计算。除非你正在执行类似尝试连接数字和字符串数据类型的操作，否则这很有效。


    ## 字符串数据类型


    现在你了解了如何使用数字数据类型，你应该花一些时间了解各种字符串数据类型。这些数据类型用于存储字母、字母和数字的组合。此外，字符串数据类型用于存储非 Unicode
    或 Unicode 字符值。字符串数据类型的最后一个类别包括图像和二进制值。


    ### 字符串数据类型


    有些信息存储在数据库中，与数字没有直接关系。存储在字符字符串中的数据可以是 ANSI 或 Unicode。字符串也可以创建为固定长度或可变长度。这些数据可以是名称、描述、地址或其他字符值。确定使用哪种数据类型取决于所存储的信息类型以及需要存储多少信息。在本节之后，你将能够根据需要选择正确的字符串数据类型。


    #### CHAR 和 VARCHAR


    两种可用的字符字符串数据类型是 `CHAR` 和 `VARCHAR`。这些数据类型相似，仅在字符串是存储为固定长度还是可变长度字符字符串方面有所不同。两种数据类型都用于存储文本数据，这些字段中可以存储的字符与列排序规则允许的字符相同。


    `CHAR` 用于字符字段，表示数据类型具有固定长度。`VARCHAR` 用于可变字符字段。`VARCHAR` 中的 `VAR` 表示数据类型具有可变长度。如果数据长度相似，例如电话号码或邮政编码，那么
    `CHAR` 可能是首选数据类型。但是，如果列宽度差异很大，例如地址行或备注列，那么 `VARCHAR` 将是更好的选择。


    为 `CHAR` 或 `VARCHAR` 选择值时，可以选择 1 到 8000 之间的值或 `MAX` 这个词。请考虑将 `VARCHAR(MAX)` 的使用限制在你期望保存超过
    8000 个字符的情况。如果指定了 `VARCHAR(MAX)`，则最大存储大小为 2 GB。但是，请考虑你是否需要此功能，或者使用较小字符数的 `VARCHAR`
    可能更合适。


    为了最大程度地减少数据截断，请确保在使用 `CHAR` 或 `VARCHAR` 数据类型时始终显式指定存储的字节数。`VARCHAR` 在数据定义中默认为
    1，在使用 `CAST` 或 `CONVERT` 函数时默认为 30 字节。


    对于使用单字节编码字符（例如 Latin）的排序规则，`CHAR` 的存储大小（以字节为单位）等于字符数。使用 `VARCHAR` 时，字段的字符串长度（在单字节编码的情况下与字符数相同）加上两个额外的字节等于存储的总字节数。还可以在
    `CHAR` 和 `VARCHAR` 数据类型中保存多字节编码字符。对于这两种数据类型，保存的字符数可能少于总字节数。


    从 SQL Server 2019 开始，现在可以在 `CHAR` 或 `VARCHAR` 中保存 Unicode 值。但是，仅当启用 UTF-8 编码时才可能。


    #### TEXT


    `TEXT` 数据类型过去用于存储非常大的字符串。但是，此数据类型已弃用。由于此数据类型已弃用，应避免在新开发中使用 `TEXT` 数据类型。如果你需要使用
    `TEXT` 数据类型，请在新开发中改用数据类型 `VARCHAR(MAX)`。


    ### Unicode 字符串数据类型


    在 SQL Server 2019 之前，任何 Unicode 文本数据都需要保存为特殊数据类型。在无法或未启用 UTF-8 编码的情况下，这仍然成立。


    #### NCHAR 和 NVARCHAR


    使用 Unicode 值时，有几个可用选项。这些选项包括存储固定长度或可变长度字符串。为了避免意外结果，你应了解如果未指定字符数或排序规则，这些数据类型如何工作。


    一旦确定需要使用 `NCHAR` 或 `NVARCHAR` 数据类型，选择它们就变得容易了。如果要存储的数据长度通常相似，则 `NCHAR` 数据类型是正确的选择。但是，如果存储的值差异很大，则
    `NVARCHAR` 数据类型可能是更好的选择。此外，如果要存储的字符数超过 4000，则建议使用 `NVARCHAR(MAX)`。


    通常，最佳做法是在声明 `NCHAR` 或 `NVARCHAR` 数据类型时指定字符数。数据定义或变量声明的默认字符数对于 `NCHAR` 或 `NVARCHAR`
    是 1 个字符。但是，使用 `CAST` 或 `CONVERT` 函数时，如果未指定，则默认字符数为 30。如果未为 `NCHAR` 或 `NVARCHAR`
    数据类型指定排序规则，将使用默认数据库排序规则。


    了解存储此数据类型所需的空间量还可以让你更好地判断这是否是正确的数据类型以及需要存储的字符数。存储 `NCHAR` 所占用的字节数是字节对字符串长度的两倍；使用
    `NVARCHAR` 时，存储的字节数是字节对字符串长度的两倍加 2 个字节。


    '
- fmt: '#### NTEXT


    Previously, storing very large variable-length Unicode data was accomplished using
    the `NTEXT` data type. If this data type is still in use in your systems, you
    can expect it to store up to 1,073,741,823 characters. However, due the size associated
    with Unicode values, the total length stored may be less. Going forward, it is
    no longer best practice to use this data type. Instead, use the `NVARCHAR(MAX)`
    data type.


    ### Binary String Data Types


    At some point, you may want to store data that is neither a number, character,
    nor a data or time value. Using binary strings for storing items that are strings
    without characters may be useful. These can include audio, video, images, or other
    similar items. In these cases, the use of binary strings may be appropriate. There
    are a couple alternatives when using binary string data types.


    #### BINARY and VARBINARY


    The options available for storing binary string data involve storing either fixed-length
    or variable-length character strings. Like the other string data types discussed,
    there are some considerations when dealing with these data types.


    Two of the available data types are `BINARY` and `VARBINARY`. The best option
    for storing binary strings with similar lengths is the `BINARY` data type. Conversely,
    when storing binary strings with significantly varying lengths of data, the `VARBINARY`
    data type is a better choice. If the total length of the binary string is expected
    to exceed 4000 characters, then it is suggested to use `VARBINARY(MAX)`.


    Using the `BINARY` and `VARBINARY` data types for data definition or variable
    declaration has a default length of 1 if the number of characters is not specified.
    When converting `BINARY` to `VARBINARY` with the `CAST` or `CONVERT` function,
    the default number of characters is 30. Use caution when converting to `BINARY`
    or `VARBINARY` from a variable with a different length as SQL Server may pad or
    truncate the binary data as necessary.


    The `BINARY` data type stores the same number of bytes as the length of data being
    stored, whereas `VARBINARY` uses 2 bytes plus the same number of bytes as the
    length of data being stored. In both data types, the length can be up to 8000.
    For `VARBINARY(MAX)`, the maximum storage size is 2 GB.


    #### IMAGE


    The `IMAGE` data type has been used to store large variable-length binary data.
    In the case of the `IMAGE` data type, you should use the `VARBINARY(MAX)` data
    type going forward as the `IMAGE` data type is deprecated.


    ### Collation for Data Types


    Data can be configured to toggle case sensitivity, which determines if a lowercase
    c is treated the same as an uppercase C. There is also accent sensitivity for
    determining if n is treated the same as ñ. You can also indicate if Katakana and
    Hiragana should be sorted the same kana sensitivity. Some other types of collation
    options are sensitive based on width, variation-selector, binary, binary-code
    point, and UTF-8. The sensitivity that is stored is referred to as collation.
    The collation of a column is the same as the database unless there is a specific
    override in place.


    ### Date and Time Data Types


    Each database transaction occurs at a specific point in time. There may be a need
    to reference or know when a transaction happened. Your application may record
    important dates for a person including birthdays or anniversaries. Dates and times
    can also be used to determine pricing and functionality. By using dates and times,
    you can determine when functionality should be enabled or disabled. Dates and
    times can also show when a user account is inactive or system access is enabled
    or expired. Pricing and billing rates can cover multiple different date ranges.
    When one set of pricing becomes inactive, another set may be active. Due to regulations,
    your company may need to record the pricing over a period of time. This includes
    indicating when the pricing rates started and stopped. Depending on the purpose
    for tracking this information, you may only need to know the date or time of the
    transaction. There are other situations where it is best to know both the date
    and time associated with a certain action.


    #### DATE


    When working with transactions, there may be a specific occasion when you want
    to record when something happened. In some cases, it may only matter what day
    the transaction happened. The `DATE` data type can also be used to store aggregated
    data for a given day. While recording the date of the activity, there may be some
    options available as to how that data is displayed. When choosing if the `DATE`
    data type is right for your situation, it is also important to consider not only
    how much data is stored for the `DATE` data type but any possible limitations
    in how the data can be stored.


    There will be times when an application or a user needs to know when a specific
    action happened. When deciding if a `DATE` data type is the right choice, consider
    the need for the information both in terms of user and application usage. In some
    cases, it is easier to think about when a `DATE` data type is not preferable.
    For any action where you want to know a specific time when something happened,
    the `DATE` data type is not a good choice. However, if it is only necessary to
    know on what day an action occurred, then the `DATE` data type is a great option.


    For the `DATE` data types, there are several options as to how a `DATE` can be
    displayed. With the date format, the default is `YYYY-MM-DD`. In this case, `YYYY`
    represents the four-digit year with the range of 0001 to 9999. `MM` represents
    the month number from 01 to 12, and `DD` stands for the day ranging from 01 to
    31 per the number of days in a month. The `DATE` can be displayed in a variety
    of numeric and alphabetic formats. However, the format `ydm` is not supported.


    The `DATE` values that can be stored range from 0001-01-01 to 9999-11-31. The
    `DATE` data type has a ten-digit character length with a precision of 10 and a
    scale of 0. The `DATE` data type takes up 3 bytes and is stored as an `INT`.


    Dates can be converted to `DATETIME`, `SMALLDATETIME`, `DATETIME2`, or `DATETIMEOFFSET`.
    However, the time value is set to midnight. Dates cannot be converted to the `TIME`
    data type, and any attempts to perform this conversion will fail with an error.
    In addition, dates do not have a time zone offset and are not Daylight Saving
    Time (DST) aware.'
