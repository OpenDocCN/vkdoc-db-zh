  raw: '## Data Retention and Archival


    Managing data long-term should allow you to store data effectively and remove
    data quickly. This section covers how to swap data to be expunged into a new table
    so that the data can be removed. The last two partitions in the table will be
    merged so that these oldest data remains in the last partition. Finally, the new
    partition will be split to that new data can be saved in the newest partition.
    This entire process is referred to as *a* *sliding window partition*. If you decide
    to implement one of these, it may be best to automate this process using a SQL
    Server Agent job.


    Let’s get familiar with the T-SQL for tables you will use for this process. The
    first table is `dbo.CustomerOrderActive`. This table is used to hold active orders
    as determined by the business rules. The table in Listing [17-1](#480547_2_En_17_Chapter.xhtml#PC1)
    is used to hold the current month of customer orders.


    ```

    CREATE TABLE dbo.CustomerOrderActive

    (

    CustomerOrderHistoryID         BIGINT             NOT NULL,

    CustomerOrderID                INT                NOT NULL,

    CustomerOrderHistoryStatusID   TINYINT            NOT NULL,

    DateCreated                    DATETIME2(2)       NOT NULL,

    DateModified                   DATETIME2(2)           NULL,

    CONSTRAINT PK_CustomerOrderActive_CustomerOrderHistoryID

    PRIMARY KEY (CustomerOrderHistoryID),

    CONSTRAINT FK_CustomerOrderActive_CustomerOrderID

    FOREIGN KEY (CustomerOrderID)

    REFERENCES dbo.CustomerOrder(CustomerOrderID),

    CONSTRAINT FK_CustomerOrderActive_CustomerOrderHistoryStatusID

    FOREIGN KEY (CustomerOrderHistoryStatusID)

    REFERENCES

    dbo.CustomerOrderHistoryStatus(CustomerOrderHistoryStatusID)

    );

    Listing 17-1

    Customer Orders Last Month

    ```


    The expectation is that all orders will be fulfilled within in a three-month period.
    Therefore, the most activity is expected for the most recent three months.


    The second table is used to keep customer history for the past 12 months. This
    data is used for reporting and analysis within the business. In Listing [17-2](#480547_2_En_17_Chapter.xhtml#PC2),
    the T-SQL shows that this table is partitioned.


    ```

    CREATE TABLE dbo.CustomerOrderHistory

    (

    CustomerOrderHistoryID        BIGINT    IDENTITY(1,1)    NOT NULL,

    CustomerOrderID               INT                        NOT NULL,

    CustomerOrderHistoryStatusID  TINYINT                    NOT NULL,

    DateCreated                   DATETIME2(2)               NOT NULL,

    DateModified                  DATETIME2(2)                   NULL,

    CONSTRAINT PK_CustomerOrderHistory_CustomerOrderHistoryID

    PRIMARY KEY NONCLUSTERED

    (CustomerOrderHistoryID, DateCreated),

    CONSTRAINT FK_CustomerOrderHistory_CustomerOrder

    FOREIGN KEY (CustomerOrderID)

    REFERENCES dbo.CustomerOrder(CustomerOrderID),

    CONSTRAINT FK_CustomerOrderHistory_CustomerOrderHistoryStatus

    FOREIGN KEY (CustomerOrderHistoryStatusID)

    REFERENCES dbo.CustomerOrderHistoryStatus

    (CustomerOrderHistoryStatusID)

    ) ON CustomerOrderHistoryRange (DateCreated);

    Listing 17-2

    Partitioned Table for Customer Orders in the Last 12 Months

    ```


    The third table is a table to hold archival data needed to regulatory purposes,
    which this case is customer order information older than a year old. After 15
    months, the data will be removed from this table. This table is also partitioned,
    as shown in Listing [17-3](#480547_2_En_17_Chapter.xhtml#PC3) below.


    ```

    CREATE TABLE dbo.CustomerOrderHistoryArchive

    (

    CustomerOrderHistoryID        BIGINT     IDENTITY(1,1)    NOT NULL,

    CustomerOrderID               INT                         NOT NULL,

    CustomerOrderHistoryStatusID  TINYINT                     NOT NULL,

    DateCreated                   DATETIME2(2)                NOT NULL,

    DateModified                  DATETIME2(2)                    NULL,

    CONSTRAINT PK_CustomerOrderHistoryArchive_CustomerOrderHistoryID

    PRIMARY KEY NONCLUSTERED

    (CustomerOrderHistoryID, DateCreated),

    CONSTRAINT FK_CustomerOrderHistoryArchive_CustomerOrder

    FOREIGN KEY (CustomerOrderID)

    REFERENCES dbo.CustomerOrder(CustomerOrderID),

    CONSTRAINT FK_CustomerOrderHistoryArchive_CustomerOrderHistoryStatus

    FOREIGN KEY (CustomerOrderHistoryStatusID)

    REFERENCES dbo.CustomerOrderHistoryStatus

    (CustomerOrderHistoryStatusID)

    ) ON CustomerOrderHistoryArchiveRange (DateCreated);

    Listing 17-3

    Partitioned Table to Archive Customer Orders in the Last 15 Months

    ```


    The last table is the table to temporarily hold the data to be purged. This table
    must have the same format as the other tables, as shown in Listing [17-4](#480547_2_En_17_Chapter.xhtml#PC4).


    ```

    CREATE TABLE dbo.CustomerOrderPurge

    (

    CustomerOrderHistoryID        BIGINT    IDENTITY(1,1)   NOT NULL,

    CustomerOrderID               INT                       NOT NULL,

    CustomerOrderHistoryStatusID  TINYINT                   NOT NULL,

    DateCreated                   DATETIME2(2)              NOT NULL,

    DateModified                  DATETIME2(2)                  NULL,

    CONSTRAINT PK_CustomerOrderPurge_CustomerOrderHistoryID

    PRIMARY KEY NONCLUSTERED

    (CustomerOrderHistoryID, DateCreated),

    CONSTRAINT FK_CustomerOrderPurge_CustomerOrder

    FOREIGN KEY (CustomerOrderID)

    REFERENCES dbo.CustomerOrder(CustomerOrderID),

    CONSTRAINT FK_CustomerOrderPurge_CustomerOrderHistoryStatus

    FOREIGN KEY (CustomerOrderHistoryStatusID)

    REFERENCES dbo.CustomerOrderHistoryStatus

    (CustomerOrderHistoryStatusID)

    );

    Listing 17-4

    Table to Purge Customer Orders Over 15 Months

    ```


    Now that you have the tables created, the next part is go through the process
    of moving these partitions at month’s end.'
  trans: '

    ## 数据保留与归档


    长期的数据管理应能让你高效地存储数据并快速删除数据。本节介绍如何将待删除的数据交换到一个新表中，以便将其移除。表的最后两个分区将被合并，这样最旧的数据仍保留在最后一个分区中。最后，新分区将被拆分，以便新数据可以保存到最新的分区中。整个过程被称为*滑动窗口分区*。如果你决定实现此过程之一，最好使用
    SQL Server 代理作业将此过程自动化。


    让我们熟悉一下你将用于此过程的表的 T-SQL。第一个表是 `dbo.CustomerOrderActive`。此表用于根据业务规则保存活动订单。清单 17-1
    中的表用于保存当月的客户订单。


    ```sql

    CREATE TABLE dbo.CustomerOrderActive

    (

    CustomerOrderHistoryID         BIGINT             NOT NULL,

    CustomerOrderID                INT                NOT NULL,

    CustomerOrderHistoryStatusID   TINYINT            NOT NULL,

    DateCreated                    DATETIME2(2)       NOT NULL,

    DateModified                   DATETIME2(2)           NULL,

    CONSTRAINT PK_CustomerOrderActive_CustomerOrderHistoryID

    PRIMARY KEY (CustomerOrderHistoryID),

    CONSTRAINT FK_CustomerOrderActive_CustomerOrderID

    FOREIGN KEY (CustomerOrderID)

    REFERENCES dbo.CustomerOrder(CustomerOrderID),

    CONSTRAINT FK_CustomerOrderActive_CustomerOrderHistoryStatusID

    FOREIGN KEY (CustomerOrderHistoryStatusID)

    REFERENCES

    dbo.CustomerOrderHistoryStatus(CustomerOrderHistoryStatusID)

    );

    ```


    `清单 17-1`

    当月客户订单


    预期所有订单都将在三个月内完成。因此，最近三个月的活动预计最为频繁。


    第二个表用于保存过去 12 个月的客户历史记录。此数据用于业务内的报告和分析。在清单 17-2 中，T-SQL 显示该表已分区。


    ```sql

    CREATE TABLE dbo.CustomerOrderHistory

    (

    CustomerOrderHistoryID        BIGINT    IDENTITY(1,1)    NOT NULL,

    CustomerOrderID               INT                        NOT NULL,

    CustomerOrderHistoryStatusID  TINYINT                    NOT NULL,

    DateCreated                   DATETIME2(2)               NOT NULL,

    DateModified                  DATETIME2(2)                   NULL,

    CONSTRAINT PK_CustomerOrderHistory_CustomerOrderHistoryID

    PRIMARY KEY NONCLUSTERED

    (CustomerOrderHistoryID, DateCreated),

    CONSTRAINT FK_CustomerOrderHistory_CustomerOrder

    FOREIGN KEY (CustomerOrderID)

    REFERENCES dbo.CustomerOrder(CustomerOrderID),

    CONSTRAINT FK_CustomerOrderHistory_CustomerOrderHistoryStatus

    FOREIGN KEY (CustomerOrderHistoryStatusID)

    REFERENCES dbo.CustomerOrderHistoryStatus

    (CustomerOrderHistoryStatusID)

    ) ON CustomerOrderHistoryRange (DateCreated);

    ```


    `清单 17-2`

    过去 12 个月客户订单的分区表


    第三个表是一个用于保存法规目的所需存档数据的表，在本例中是超过一年的客户订单信息。15 个月后，数据将从此表中删除。此表也是分区的，如下方清单 17-3 所示。


    ```sql

    CREATE TABLE dbo.CustomerOrderHistoryArchive

    (

    CustomerOrderHistoryID        BIGINT     IDENTITY(1,1)    NOT NULL,

    CustomerOrderID               INT                         NOT NULL,

    CustomerOrderHistoryStatusID  TINYINT                     NOT NULL,

    DateCreated                   DATETIME2(2)                NOT NULL,

    DateModified                  DATETIME2(2)                    NULL,

    CONSTRAINT PK_CustomerOrderHistoryArchive_CustomerOrderHistoryID

    PRIMARY KEY NONCLUSTERED

    (CustomerOrderHistoryID, DateCreated),

    CONSTRAINT FK_CustomerOrderHistoryArchive_CustomerOrder

    FOREIGN KEY (CustomerOrderID)

    REFERENCES dbo.CustomerOrder(CustomerOrderID),

    CONSTRAINT FK_CustomerOrderHistoryArchive_CustomerOrderHistoryStatus

    FOREIGN KEY (CustomerOrderHistoryStatusID)

    REFERENCES dbo.CustomerOrderHistoryStatus

    (CustomerOrderHistoryStatusID)

    ) ON CustomerOrderHistoryArchiveRange (DateCreated);

    ```


    `清单 17-3`

    用于归档过去 15 个月客户订单的分区表


    最后一个表用于临时保存要清除的数据。此表必须与其他表具有相同的格式，如清单 17-4 所示。


    ```sql

    CREATE TABLE dbo.CustomerOrderPurge

    (

    CustomerOrderHistoryID        BIGINT    IDENTITY(1,1)   NOT NULL,

    CustomerOrderID               INT                       NOT NULL,

    CustomerOrderHistoryStatusID  TINYINT                   NOT NULL,

    DateCreated                   DATETIME2(2)              NOT NULL,

    DateModified                  DATETIME2(2)                  NULL,

    CONSTRAINT PK_CustomerOrderPurge_CustomerOrderHistoryID

    PRIMARY KEY NONCLUSTERED

    (CustomerOrderHistoryID, DateCreated),

    CONSTRAINT FK_CustomerOrderPurge_CustomerOrder

    FOREIGN KEY (CustomerOrderID)

    REFERENCES dbo.CustomerOrder(CustomerOrderID),

    CONSTRAINT FK_CustomerOrderPurge_CustomerOrderHistoryStatus

    FOREIGN KEY (CustomerOrderHistoryStatusID)

    REFERENCES dbo.CustomerOrderHistoryStatus

    (CustomerOrderHistoryStatusID)

    );

    ```


    `清单 17-4`

    用于清除超过 15 个月的客户订单的表


    现在你已经创建了表，接下来是在月底移动这些分区的过程。

