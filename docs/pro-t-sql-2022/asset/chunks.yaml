    `160`。虽然更改兼容级别应会清除计划缓存，但您可以使用 `T-SQL` 来确保执行计划缓存已被清除。完成此操作并执行代码清单 2-22 中的查询后，您将获得如图
    2-13 所示的执行计划。


    ![](img/480547_2_En_2_Fig13_HTML.jpg)


    一个流程图。`Select`操作的成本为 `0%`，源自序列。它源自表值函数、计算标量，后者又源自流聚合、嵌套循环等。


    ## 图 2-13


    兼容模式 `160` 的执行计划


    图 2-13 中的执行计划与图 2-9 和图 2-11 中的任何一个都不同。您还可以确定，在 `dbo.OrderDetail` 表的某个非聚集索引上的 `索引扫描`
    占用了大部分执行时间。正如预期的那样，这与图 2-5、2-11 和 2-13 的执行计划中占用大部分时间的运算符相同。您还可以比较兼容级别 `110`、`120`
    和 `160` 下的已用时间和 CPU 时间。这使您可以比较来自 `SQL Server 2012`、`SQL Server 2014` 和 `SQL Server
    2019` 的 `SQL Server` 优化器的预期执行时间。表 2-4 显示了所有三个兼容级别及其相关时间。


    ## 表 2-4


    比较兼容模式 `110`、`120` 和 `160` 下多语句表值函数的执行时间


    | 兼容模式 | CPU 时间 | 已用时间 |

    | --- | --- | --- |

    | `110` | 1,357 毫秒 | 4,343 毫秒 |

    | `120` | 1,414 毫秒 | 2,685 毫秒 |

    | `160` | 910 毫秒 | 1,620 毫秒 |


    比较表 2-4 中的时间，`SQL Server 2022` 的 CPU 时间比 `SQL Server 2014` 或 `SQL Server 2012`
    快 `30%`。此外，`SQL Server 2022` 的已用时间比 `SQL Server 2014` 快约 `40%`，比 `SQL Server 2012`
    快约 `60%`！您还可以将代码清单 2-12（代表与 `SQL Server 2017` 关联的兼容级别）中的表值函数属性与兼容级别 `160` 的属性进行比较。图
    2-14 显示了兼容模式 `160` 下表值函数的属性。


    ![](img/480547_2_En_2_Fig14_HTML.jpg)


    一个名为“表值函数”的表格，其行条目包括物理操作、逻辑操作、估计运算符成本和估计 C P U 成本。


    ## 图 2-14


    兼容模式 `160` 下表值函数的属性


    参考图 2-14，有几个值与图 2-12 相匹配。它们包括图 2-12 和图 2-14 中都更准确的估计行数。图 2-12 和图 2-14 中的估计运算符成本、估计
    CPU 成本和估计子树成本也相同。


    多语句表值函数的性能在较新版本的 `SQL Server` 中得到了提升。此外，您可以验证 `SQL Server 2017` 和 `SQL Server
    2022` 在执行计划中都具有最准确的估计行数和实际返回行数。虽然在使用多语句表值函数时仍需考虑性能问题，但在某些场景下，性能提升足够显著，从 `SQL Server
    2017` 开始使用这些函数可能是有益的。

