    There are many proponents of migration-based deployments. One of the main challenges
    in developing any database code is managing how the code is maintained when multiple
    developers are working off the same code base. In Chapter [11](#480547_2_En_11_Chapter.xhtml),
    I covered branching and merging. This is the main method used to make sure that
    everyone developing T-SQL code for the database project can work in a manner that
    limits inconsistencies when multiple developers are working on the same database
    object. If you are working with a team that is not accustomed to source control,
    using a migration-based approach may be more logical. A migration-based deployment
    process is better suited to handle multiple changes to the data in your database.
    This can be part of a data cleanup or related to refactoring database objects.
    Another advantage of using a migration-based deployment method is that it can
    be easier to pick and choose exactly what database objects will be deployed. If
    you make frequent changes to your databases, you may end up with many scripts,
    which may increase the amount of time required for deployment.


    Due to these factors, there are some scenarios where you may find a migration-based
    deployment is more effective than a state-based deployment. Smaller development
    teams may find a migration-based approach easier to use. If you are using source
    control for your database, you still need to make sure that your team synchronizes
    the database code for their development. The same may also be true for environments
    that have fewer development teams. If your team is not doing frequent deployments
    during the same day or has a larger maintenance window available for deployments,
    then the migration-based deployment method may also work well for you.


    The one risk you need to keep in mind when using a migration-based approach involves
    database changes that happen outside of source control. You may find yourself
    in a situation where you need to deploy a change immediately to production. Often
    these changes are deployed to production without having them deployed to the lower
    environments or checked into source control. If you need to deploy a hotfix or
    a patch and this code does not end up in your source control, your environments
    may become out of sync. While future deployments will not overwrite your changes,
    you may find inconsistent behavior between your environments. In order to resolve
    this, any hotfix that is made manually should be added back to source control
    so that your development environments remain in sync with production.


    #### State-Based Migrations


    State-based rollouts involve copying the entire database schema from one environment
    to another environment. Migration-based deployments are not the only option available
    when deploying your T-SQL code. Another popular option for database deployments
    involves using a source for your database schema and updating your target environment
    to have that same database schema. This is known as a *state-based approach*.
    Typically, this is used with source control, but this is all not always necessary.
    The concept is that the target database will end up similar to the source database
    or source control once the deployment is complete. This method does not require
    source control, but it is easier to manage through source control.


    Whereas each change is saved individually in its own script file when using the
    migration-based approach, this is not the case for a state-based deployment. In
    a state-based deployment, you can have many changes to the same database object,
    but there is only one set of T-SQL code that is deployed to your target database
    instance. This single T-SQL script combines all the changes into one net change.
    If the database object is in source control or the source database is different
    from the target, the change script is run on the target instance. I also like
    the fact that I know exactly what state the database will be in once a deployment
    is complete. The database in the target instance should have the same database
    objects that exist in the source location after the deployment is complete.


    Using the same example as the one for the migration-based approach, I will walk
    through how this is handled as part of the state-based deployment. The first step
    involves going into source control and making sure that you have the latest version.
    Once you have the latest version, you can open the stored procedure `dbo.GetProduct`.
    After you have made these changes, you can check these changes into source control.


    Suppose someone else is making changes to match the T-SQL code in Listing [12-1](#480547_2_En_12_Chapter.xhtml#PC1).
    If another developer wants to change this procedure, they need to be sure they
    are working with the latest copy. They do this by checking source control for
    any check-ins by another developer. In this example, they will find the change
    you made. If they skip this step, your code change could be lost or there could
    be a merge conflict.. They can then make changes to the `dbo.GetProduct` stored
    procedure. These changes can then be merged back into the master branch. When
    it is time to deploy this code, the source location will have both changes. These
    changes will be to only show active products and to remove the date columns. Instead
    of deploying these changes one at a time, the stored procedure `dbo.GetProduct`
    will be deployed to the target instance once. This single update to the stored
    procedure will include both changes.'
