    我要感谢我在工作中的团队，包括 Anthony、Helen 和 Jude 的支持。我还要感谢 SQL 社区和数据社区成为这段旅程的一部分，希望你们喜欢这本书！


    关于作者 关于技术审校


    # 1. 数据类型


    数据类型是编写高效且高性能的 `T-SQL` 的关键。虽然许多数据类型可以是数字、字符串或日期/时间，但也存在多种不属于这些类别的数据类型。在选择数据类型时，了解数据类型是什么以及何时最适合使用它非常重要。


    数据类型最显而易见的用途是让用户知道每列中存储了什么类型的信息。SQL Server 存储不同数据类型的方式也存在差异，并且数据类型会影响 SQL Server
    生成执行计划的方式。此外，所有列都有基于数据类型和列行数的存储成本。这些存储需求的影响将在第 7 章中进一步讨论。正如您将在本章后面发现的，数据类型还会影响执行计算的成本以及这些计算的结果。


    ## 数值数据类型


    虽然数字看起来都一样，但 `T-SQL` 将数值数据类型细分为几种不同的类别。这些类别可以包括整数或带小数点的数字。数字还根据是精确的还是近似的进行分类。保存数字时，数据类型也会根据数值范围而变化。在进行数学计算时，了解如何处理各种数值数据类型对于确保应用程序按预期处理数据至关重要。


    虽然从每个类别中选择最常见的数据类型可能最简单，但有时最好分析将要存储的数据，并寻找更合适的选择。选择数据类型时，需要考虑多种因素。最重要的一步是弄清楚将要存储什么样的数据。下一个合乎逻辑的步骤是考虑数据将如何使用。此外，了解
    `T-SQL` 如何处理涉及各种数据类型的计算也很重要。如果要存储一年中的第几天，应该使用一个允许使用 1 到 366 之间值的整数。在存储大公司的收入时，需要一个带有多位数和两个小数点的数字。然而，如果需要存储一加仑汽油的价格，则需要一个带有两位数字和几个小数点的数字。所有这些情况在
    SQL Server 中的定义都不同。

    '
- fmt: '### 精确数字数据类型


    有些情况下，数字的值是确定且已知的。这类数字可以称为精确数字。一些例子包括表示真或假的1或0、已售单位数量、折扣百分比，或美元和美分。在选择最佳数据类型时，通常会有几种类似的数据类型似乎都能胜任。在某些情况下，一个类别下可能有不止一种数据类型可用。


    在考虑使用何种数据类型时，你需要思考该数据类型的用途。这有助于在确定应使用哪种数据类型时提供更好的清晰度。你需要权衡每种数据类型的优点和缺点。你还需要考虑在与其他数据类型的值进行计算时，SQL
    Server是否会因此数据类型的使用而执行任何隐式转换。最后一点是考虑该数据类型在SQL Server中是如何存储的。以下是一系列精确数字数据类型。对于每种类型，你都会了解到其一些优点、缺点和常见用例。


    #### BIT


    `BIT`数据类型用于存储二进制数字，值为1或0。在T-SQL中，数据类型也可以为可空，这表明`BIT`数据类型也可以存储`NULL`值。由于只有三种可能的值，这种数据类型具有最小的值集。因为可以存储在该数据类型中的值种类很少，`BIT`数据类型在磁盘上也只需要最小的存储空间。由于一个字节中有8位，在数据库中存储`BIT`数据类型的情况也是如此。


    `BIT`数据类型非常适用于“非X即Y”的场景。存储的信息可以被解释为真或假、开或关、是或否。在真或假的情况下，`BIT`类型可用于指示数据记录是否被成功转换。使用`BIT`类型指示开或关的一个常见场景是，指示某个特定功能是否已启用。一个是或否值的例子是记录客户选择接收公司营销信息的决定。


    使用`BIT`数据类型的一个挑战是确保以促进良好数据库设计的方式使用它。这意味着有时在选择`BIT`数据类型时，你需要考虑其整体目的。例如，用`BIT`数据类型来指示一个物品是否具有特定特性似乎是个好主意。一个例子是在`Product`表中添加一列`IsWood`来指示某个零件是否由木材制成。然而，更好的做法可能是重新设计数据库，将这些属性记录在另一个表中。


    `BIT`可用于指示事务的成功状态。然而，通常更好地记录事务在一段时间内的状态。如果记录状态随时间的变化很重要，那么使用`BIT`来记录事务是否成功可能不是最佳选择。虽然`BIT`占用空间小，非常适合是或否的值，但有时你需要一列有比是或否更多的选项，因此需要考虑更大的数据类型。


    #### TINYINT, SMALLINT, INT 和 BIGINT


    SQL Server还允许你存储整数，即没有小数或分数值的数字。这些数字被称为整数。以整数存储的数据的一个例子是给定物品的数量。SQL Server中可以存储多种整数值。第一种整数类型是`TINYINT`。`TINYINT`值可以包含0到255之间的任何整数值。由于该数据类型的大小有限，它可能适用于有限的配置类型或地点数量。该数据类型类似于`BIT`数据类型，但其范围稍大一些。该数据类型也可用于配置系统中的状态类型或对象的类别。`TINYINT`非常适合存储这些状态类型，因为许多应用程序不需要超过256种状态。


    既然我们已经介绍了`TINYINT`，现在来讨论`SMALLINT`的可能性。`SMALLINT`的范围涵盖了大约70,000个可能的值。有了这个范围，你需要考虑什么样的值需要介于256到65,435个唯一值之间。`SMALLINT`的范围从-32,768开始，到32,767结束。该数据类型不适用于记录每一项活动的日志表。许多数据库或数据表在几年内可能会有超过70,000笔事务或记录。这可能导致该数据类型不适合那些表。然而，在其他表中，`SMALLINT`数据类型可能是理想的。


    如果你的数据表交易活动不高，但会持续增长一段时间，那么`SMALLINT`数据类型可能是有益的。了解你的业务将有助于确定`SMALLINT`是否适合存储该值的正确数据类型。


    如果你想创建一个表来持续为应用程序添加功能，你可能希望存储一条记录来指示应用程序中的每个新功能。一个例子是功能标志。你的应用程序在其生命周期中很可能会有超过256项增强功能。你可能还想存储应用程序的配置值。将这些配置值存储在表中可能会受益于`SMALLINT`数据类型。


    `INT`是整数数据类型中最常用的。许多数据库专门对任何类型的整数使用此类型，这是不推荐的。原因之一是它的整个范围涵盖了大约53亿条记录。`INT`数据类型的范围从-2,147,483,648到2,147,483,647。然而，当创建许多数据表时，它们的标识列通常从整数1开始，或称为种子。这导致表被限制在大约21.5亿个唯一标识值。如果你认为你的表将需要超过21.5亿个唯一标识记录，你可能希望标识列从最低的数字开始，即–2,147,483,648，或者尝试使用`BIGINT`。很少有情况需要比`INT`更大的值，而且我认为有很多时候使用`INT`数据类型，而`TINYINT`或`SMALLINT`会是更好的选择。`BIGINT`数据表可以存储从-9,223,372,036,854,775,808到9,223,372,036,854,775,808的值，并且占用的空间是`INT`的两倍。


    这通常是你可能需要进行数学计算的地方。一些企业每秒处理几百笔交易。其他企业每秒处理高达10,000或20,000笔交易。在这两种情况下，重要的是考虑保存这些事务信息的表预期会有怎样的增长。如果你的应用程序在几年内每秒有数百笔交易，那么存储的记录数量将远少于应用程序在相同时间段内每秒有数万笔交易的情况。


    ```

    if (condVar > someVal) {console.log("xxx")}

    ```'
  raw: '### Exact Number Data Types


    There are situations when the value of a number is definite and known. These types
    of numbers can be referred to as exact numbers. Some examples include 1 or 0 for
    true or false, quantity of units sold, discount percent, or dollars and cents.
    When working to select the best data type, there are often several similar data
    types that seem to do the job. In some cases, the categories have more than one
    data type available.


    When considering what data type to use, you want to consider the purpose for this
    data type. This provides better clarity when determining which data type should
    be used. You want to consider both the benefits and drawbacks associated with
    each data type. You also want to consider if SQL Server will have to perform any
    implicit conversions as a result of using this data type in calculations with
    other data types. The final piece is to consider how the data type is stored in
    SQL Server. Here are a series of exact number data types. For each type, you will
    find some benefits, drawbacks, and common use cases.


    #### BIT


    The BIT data type is used to store a binary digit of either 1 or 0\. In T-SQL,
    the data types can also be nullable, which indicates that the BIT data type can
    also store a NULL value. With only three possible values, this data type has the
    smallest number of values possible. Due to the small variety of values that can
    be stored in this data type, the BIT data type also requires the smallest amount
    of storage on disk. As there are 8 bits in a byte, the same holds true for storing
    the BIT data type in a database.


    The BIT data type is great for data types where “either X or Y” is applicable.
    The information stored can be interpreted as true or false, on or off, and yes
    or no. In the case of true or false, this BIT type can be used to indicate if
    a data record was translated successfully. A common use of indicating on or off
    with the BIT data type involves indicating if a certain feature is enabled. One
    example of a yes or no value is recording a customer’s decision to opt in to receive
    marketing information from a company.


    One of the challenges with the BIT data type is making sure to use it in a way
    that promotes good database design. This means there are times when you need to
    consider the overall purpose when selecting the BIT data type. For instance, it
    may seem like indicating whether an item has specific characteristics may be a
    good use of the BIT data type. An example is to add a column in the `Product`
    table `IsWood` to indicate if a part is made of wood. However, it may be better
    to consider redesigning the database to record those attributes in another table.


    A BIT can be used to indicate a successful status for a transaction. However,
    it is often better to record the state of the transaction over a period of time.
    If recording status changes over time is important, then using a BIT to record
    if a transaction is successful may not be the best option. While BIT is small
    and is great for yes or no values, sometimes you need more options for a column
    than just yes or no, so you need to consider a larger data type.


    #### TINYINT, SMALLINT, INT, and BIGINT


    SQL Server also allows you to store whole numbers, which are numbers that do not
    have decimals or fractional values. These numbers are known as integers. One example
    of data stored as integers is quantities of a given item. There are several types
    of integer values that can be stored within SQL Server. The first integer type
    is TINYINT. The TINYINT value can contain any integer value between 0 and 255\.
    Due to the limited size of this data type, this may be useful for limited configuration
    types or number of locations. This data type is like the BIT data type, but this
    data type has a slightly wider range. This data type is also useful to configure
    the types of statuses in a system or categories of objects. TINYINT is good for
    storing these status types as many applications do not need more than 256 statuses.


    Now that we’ve covered TINYINT, let’s discuss the possibilities of SMALLINT. The
    range of SMALLINT covers approximately 70,000 possible values. With this range
    available, you want to consider what sorts of values you need to have between
    256 and 65,435 unique values. The range for the SMALLINT starts at -32,768 and
    ends at 32,767\. This data type would not be useful for a table that logs every
    single activity that happens. Many databases or data tables may have more than
    70,000 transactions or records over the course of several years. This may cause
    this data type to be unsuitable for those tables. However, there may be other
    tables where the SMALLINT data type is ideal.


    If you have data tables that do not experience high transactional activity but
    will be growing for some time, the SMALLINT data type may be beneficial. Understanding
    your business will help you determine if SMALLINT is the correct data type for
    that value being stored.


    If you want to create a table to continue to add functionality to your applications,
    you may want to store a record indicating each new piece of functionality in your
    application. An example of this is feature flags. Your application will likely
    have more than 256 enhancements over the life of the application. You may also
    want to store configuration values for the application. Storing these configuration
    values in a table may benefit from the SMALLINT data type.


    INT is the most frequent use of the whole number data types. Many databases use
    this type exclusively for any sort of whole number that is being tracked, which
    is not recommend. One of the reasons for this is the entire range covers about
    5.3 billion records. The INT data type covers the range from −2,147,483,648 to
    2,147,483,647\. However, when many data tables are created, their identity column
    is often started, or seeded, at the integer 1\. This causes the table to be limited
    to approximately 2.15 billion unique identities. If you believe that your table
    will need more than 2.15 billion unique identity records, you may want to start
    the identity with the lowest number possible, –2,147,483,648, or try using BIGINT.
    There are very few situations where you would need a value larger than INT, and
    I speculate there are many times the INT data type is used when TINYINT or SMALLINT
    would be a better choice. The BIGINT data table can store values from -9,223,372,036,854,775,808
    to 9,223,372,036,854,775,808 and takes twice the storage space of INT.


    This is often where you may need to perform mathematical calculations. Some businesses
    process a couple hundred transactions per second. Other businesses process upward
    of 10,000 or 20,000 transactions per second. In both cases, it’s important to
    consider what kind of growth will be expected in the tables holding this transactional
    information. If your application has hundreds of transactions per second over
    several years, the number of records stored will be much smaller than if the application
    has tens of thousands of transactions per second for the same time period.'
