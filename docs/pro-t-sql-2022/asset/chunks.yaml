    CONSTRAINT PK_CustomerOrderHistory2021_CustomerOrderHistoryID

    PRIMARY KEY NONCLUSTERED (CustomerOrderHistoryID, DateCreated),

    CONSTRAINT FK_CustomerOrderHistory2021_CustomerOrder

    FOREIGN KEY (CustomerOrderID)

    REFERENCES dbo.CustomerOrder(CustomerOrderID),

    CONSTRAINT FK_CustomerOrderHistory2021_CustomerOrderHistoryStatus

    FOREIGN KEY (CustomerOrderHistoryStatusID)

    REFERENCES dbo.CustomerOrderHistoryStatus

    (CustomerOrderHistoryStatusID)

    );

    CREATE CLUSTERED INDEX IX_CustomerOrderHistory2021_DateCreated

    ON dbo.CustomerOrderHistory2021 (DateCreated)

    ON CustomerOrderHistoryRange (DateCreated);

    CREATE TABLE dbo.CustomerOrderHistory2022

    (

    CustomerOrderHistoryID        BIGINT    IDENTITY(1,1)    NOT NULL,

    CustomerOrderID               INT                        NOT NULL,

    CustomerOrderHistoryStatusID  TINYINT                    NOT NULL,

    DateCreated                   DATETIME2(2)               NOT NULL,

    DateModified                  DATETIME2(2)                   NULL,

    CONSTRAINT PK_CustomerOrderHistory2022_CustomerOrderHistoryID

    PRIMARY KEY NONCLUSTERED (CustomerOrderHistoryID, DateCreated),

    CONSTRAINT FK_CustomerOrderHistory2022_CustomerOrder

    FOREIGN KEY (CustomerOrderID)

    REFERENCES dbo.CustomerOrder(CustomerOrderID),

    CONSTRAINT FK_CustomerOrderHistory2022_CustomerOrderHistoryStatus

    FOREIGN KEY (CustomerOrderHistoryStatusID)

    REFERENCES dbo.CustomerOrderHistoryStatus

    (CustomerOrderHistoryStatusID)

    );

    CREATE CLUSTERED INDEX IX_CustomerOrderHistory2022_DateCreated

    ON dbo.CustomerOrderHistory2022 (DateCreated)

    ON CustomerOrderHistoryRange (DateCreated);

    Listing 16-15

    Creating Tables for a Partitioned View

    ```


    While each of these tables is on the same partitioning scheme, there is nothing
    to limit the type of data that will be stored in these tables. The first table
    is intended to store data for 2022, and the second table is for data from 2021\.
    However, you need to add constraints to these tables to ensure that the correct
    records exist in each table. In Listing [16-16](#480547_2_En_16_Chapter.xhtml#PC16),
    you can find the constraints that will be added to both tables.


    ```

    ALTER TABLE dbo.CustomerOrderHistory2022

    WITH CHECK ADD CONSTRAINT CK_CustomerOrderHistory2022_MinDateCreated

    CHECK

    (

    DateCreated IS NOT NULL

    AND DateCreated >= ''2022-01-01''

    );

    ALTER TABLE dbo.CustomerOrderHistory2022

    WITH CHECK ADD CONSTRAINT CK_CustomerOrderHistory2022_MaxDateCreated

    CHECK

    (

    DateCreated IS NOT NULL

    AND DateCreated = ''2021-01-01''

    );

    ALTER TABLE dbo.CustomerOrderHistory2021

    WITH CHECK ADD CONSTRAINT CK_CustomerOrderHistory2021_MaxDateCreated

    CHECK

    (

    DateCreated IS NOT NULL

    AND DateCreated < ''2022-01-01''

    );

    Listing 16-16

    Adding Constraints to Tables

    ```


    The table for 2022 now has a constraint that only allows records with a `DateCreated`
    from January 1, 2022, up to but not including January 1, 2023\. There is also
    a constraint on the table for 2021 with similar logic so that only records that
    were created in 2021 can be stored in this table.


    You now have tables for two different date ranges, and you have applied constraints
    to these tables. The next step is to create a partitioned view. The process of
    creating a partitioned view is relatively simple and consists of adding a UNION
    ALL between each select statement on the underlying tables. An example of creating
    a partitioned view can be found in Listing [16-17](#480547_2_En_16_Chapter.xhtml#PC17).


    ```

    CREATE VIEW dbo.vwCustomerOrderHistory

    WITH SCHEMABINDING

    AS

    -- Select data from current read/write table

    SELECT CustomerOrderHistoryID,

    CustomerOrderID,

    CustomerOrderHistoryStatusID,

    DateCreated,

    DateModified

    FROM dbo.CustomerOrderHistory2022

    UNION ALL

    -- Select data from partitioned table

    SELECT CustomerOrderHistoryID,

    CustomerOrderID,

    CustomerOrderHistoryStatusID,

    DateCreated,

    DateModified

    FROM dbo.CustomerOrderHistory2021;

    Listing 16-17

    Creating a Partitioned View

    ```


    Notice that the column lists are in the same order for both SELECT statements
    used within the partitioned view. This is a requirement of creating a partitioned
    view. You must also specify the full column list of the table when creating a
    partitioned view. Once the partitioned view has been created, you may want to
    check how querying a partitioned view works.


    Back in Listing [16-13](#480547_2_En_16_Chapter.xhtml#PC13) you queried the `dbo.CustomerOrderHistory`
    table on the date range between October 7, 2022 and October 9, 2022\. You can
    query the partitioned view for the same date range, as shown in Listing [16-18](#480547_2_En_16_Chapter.xhtml#PC18).


    ```

    DECLARE @StartDate  DATETIME2(2) = ''2022-10-07'';

    DECLARE @EndDate    DATETIME2(2) = ''2022-10-09'';

    SELECT CustomerOrderHistoryID,

    CustomerOrderID,

    CustomerOrderHistoryStatusID,

    DateCreated,

    DateModified

    FROM dbo.vwCustomerOrderHistory

    WHERE DateCreated > @StartDate

    AND DateCreated <= @EndDate;

    Listing 16-18

    Accessing Data Using a Partitioned Column

    ```


    The T-SQL code is very similar between Listing [16-13](#480547_2_En_16_Chapter.xhtml#PC13)
    and Listing [16-18](#480547_2_En_16_Chapter.xhtml#PC18). This shows how easy it
    can be to shift to using a partitioned view instead of the current table names
    in your queries. However, what you are really interested in confirming is how
    the execution plan has changed with the use of a partitioned view. Figure [16-13](#480547_2_En_16_Chapter.xhtml#Fig13)
    shows the execution plan that is generated as a result of running the query in
    Listing [16-18](#480547_2_En_16_Chapter.xhtml#PC18).


    ![](images/480547_2_En_16_Chapter/480547_2_En_16_Fig13_HTML.jpg)


    A text with symbols depicts an execution plan with a partitioned view. The text
    presents 2 clustered index seek with cost 98% and 0%, 0.022 seconds and 0.000
    seconds, 3 of 131917 and 0 of 1, 2 filters, concatenation, and Select cost 0%.


    Figure 16-13


    Execution plan for a partitioned view


    Like the partitioned table referenced earlier in this chapter, the execution plan
    for the partitioned view also uses a clustered index seek. Even though the partitioned
    view includes both the 2022 and 2021 tables, you can determine from the execution
    plan that SQL Server only returns results from the `dbo.CustomerOrderHistory2022`
    table when finding the results from the query in Listing [16-18](#480547_2_En_16_Chapter.xhtml#PC18).
    The percentage for `dbo.CustomerOrderHistory` is 0%. You can also examine the
    properties of the clustered index seek in Figure [16-14](#480547_2_En_16_Chapter.xhtml#Fig14).


    ![](images/480547_2_En_16_Chapter/480547_2_En_16_Fig14_HTML.jpg)'
  trans: '

    ## 分区视图


    你可以通过创建分区表，将单个表拆分为多个段。反之，你也可以选择将几个较小的表组合在一起，使它们像一个大表一样运作。以这种方式联接的表可以是分区的，也可以不是。与创建分区表类似，你也可以选择创建一个分区视图。


    与分区表一样，你不应期望使用分区视图就必然意味着未来使用此数据库对象的查询能获得更好的性能。但是，存在一些设计原则可能让你实现性能提升。使用分区表时，有*分区消除*的概念。在分区视图中也能找到类似的概念。清单
    16-15 展示了两个彼此具有相同架构的表。


    ```sql

    CREATE TABLE dbo.CustomerOrderHistory2021

    (

    CustomerOrderHistoryID       BIGINT    IDENTITY(1,1)   NOT NULL,

    CustomerOrderID              INT                       NOT NULL,

    CustomerOrderHistoryStatusID TINYINT                   NOT NULL,

    DateCreated                  DATETIME2(2)              NOT NULL,

    DateModified                 DATETIME2(2)                  NULL,

    CONSTRAINT PK_CustomerOrderHistory2021_CustomerOrderHistoryID

    PRIMARY KEY NONCLUSTERED (CustomerOrderHistoryID, DateCreated),

    CONSTRAINT FK_CustomerOrderHistory2021_CustomerOrder

    FOREIGN KEY (CustomerOrderID)

    REFERENCES dbo.CustomerOrder(CustomerOrderID),

    CONSTRAINT FK_CustomerOrderHistory2021_CustomerOrderHistoryStatus

    FOREIGN KEY (CustomerOrderHistoryStatusID)

    REFERENCES dbo.CustomerOrderHistoryStatus

    (CustomerOrderHistoryStatusID)

    );

    CREATE CLUSTERED INDEX IX_CustomerOrderHistory2021_DateCreated

    ON dbo.CustomerOrderHistory2021 (DateCreated)

    ON CustomerOrderHistoryRange (DateCreated);

    CREATE TABLE dbo.CustomerOrderHistory2022

    (

    CustomerOrderHistoryID        BIGINT    IDENTITY(1,1)    NOT NULL,

    CustomerOrderID               INT                        NOT NULL,

    CustomerOrderHistoryStatusID  TINYINT                    NOT NULL,

    DateCreated                   DATETIME2(2)               NOT NULL,

    DateModified                  DATETIME2(2)                   NULL,

    CONSTRAINT PK_CustomerOrderHistory2022_CustomerOrderHistoryID

    PRIMARY KEY NONCLUSTERED (CustomerOrderHistoryID, DateCreated),

    CONSTRAINT FK_CustomerOrderHistory2022_CustomerOrder

    FOREIGN KEY (CustomerOrderID)

    REFERENCES dbo.CustomerOrder(CustomerOrderID),

    CONSTRAINT FK_CustomerOrderHistory2022_CustomerOrderHistoryStatus

    FOREIGN KEY (CustomerOrderHistoryStatusID)

    REFERENCES dbo.CustomerOrderHistoryStatus

    (CustomerOrderHistoryStatusID)

    );

    CREATE CLUSTERED INDEX IX_CustomerOrderHistory2022_DateCreated

    ON dbo.CustomerOrderHistory2022 (DateCreated)

    ON CustomerOrderHistoryRange (DateCreated);

    ```


    清单 16-15 为分区视图创建表


    虽然这些表都位于同一分区方案上，但没有任何限制来规定哪些类型的数据可以存储在这些表中。第一个表旨在存储 2022 年的数据，第二个表用于存储 2021 年的数据。但是，你需要向这些表添加约束，以确保正确的记录存在于每个表中。在清单
    16-16 中，你可以找到将添加到两个表的约束。


    ```sql

    ALTER TABLE dbo.CustomerOrderHistory2022

    WITH CHECK ADD CONSTRAINT CK_CustomerOrderHistory2022_MinDateCreated

    CHECK

    (

    DateCreated IS NOT NULL

    AND DateCreated >= ''2022-01-01''

    );

    ALTER TABLE dbo.CustomerOrderHistory2022

    WITH CHECK ADD CONSTRAINT CK_CustomerOrderHistory2022_MaxDateCreated

    CHECK

    (

    DateCreated IS NOT NULL

    AND DateCreated = ''2021-01-01''

    );

    ALTER TABLE dbo.CustomerOrderHistory2021

    WITH CHECK ADD CONSTRAINT CK_CustomerOrderHistory2021_MaxDateCreated

    CHECK

    (

    DateCreated IS NOT NULL

    AND DateCreated < ''2022-01-01''

    );

    ```


    清单 16-16 向表中添加约束


    现在，2022 年的表有一个约束，只允许 `DateCreated` 从 2022 年 1 月 1 日开始，直到但不包括 2023 年 1 月 1 日的记录。2021
    年的表上也有一个逻辑类似的约束，以便只有在 2021 年创建的记录才能存储在此表中。


    现在你有了适用于两个不同日期范围的表，并且已经向这些表应用了约束。下一步是创建一个分区视图。创建分区视图的过程相对简单，包括在底层表的每个 `SELECT`
    语句之间添加一个 `UNION ALL`。创建分区视图的示例可以在清单 16-17 中找到。


    ```sql

    CREATE VIEW dbo.vwCustomerOrderHistory

    WITH SCHEMABINDING

    AS

    -- 从当前的读/写表中选择数据

    SELECT CustomerOrderHistoryID,

    CustomerOrderID,

    CustomerOrderHistoryStatusID,

    DateCreated,

    DateModified

    FROM dbo.CustomerOrderHistory2022

    UNION ALL

    -- 从分区表中选择数据

    SELECT CustomerOrderHistoryID,

    CustomerOrderID,

    CustomerOrderHistoryStatusID,

    DateCreated,

    DateModified

    FROM dbo.CustomerOrderHistory2021;

    ```


    清单 16-17 创建分区视图


    请注意，分区视图内使用的两个 `SELECT` 语句的列列表顺序相同。这是创建分区视图的要求。在创建分区视图时，还必须指定表的完整列列表。一旦分区视图创建完成，你可能想检查查询分区视图是如何工作的。


    回到清单 16-13，你查询了 `dbo.CustomerOrderHistory` 表中 2022 年 10 月 7 日至 2022 年 10 月 9 日期间的数据。你可以对分区视图查询相同的日期范围，如清单
    16-18 所示。


    ```sql

    DECLARE @StartDate  DATETIME2(2) = ''2022-10-07'';

    DECLARE @EndDate    DATETIME2(2) = ''2022-10-09'';

    SELECT CustomerOrderHistoryID,

    CustomerOrderID,

    CustomerOrderHistoryStatusID,

    DateCreated,

    DateModified

    FROM dbo.vwCustomerOrderHistory

    WHERE DateCreated > @StartDate

    AND DateCreated <= @EndDate;

    ```


    清单 16-18 使用分区列访问数据


    清单 16-13 和清单 16-18 中的 T-SQL 代码非常相似。这显示了改用分区视图而不是当前表名进行查询是多么容易。然而，你真正感兴趣的是确认使用分区视图后执行计划有何变化。图
    16-13 显示了运行清单 16-18 中的查询所产生的执行计划。


    ![](img/480547_2_En_16_Fig13_HTML.jpg)


    图 16-13 分区视图的执行计划


    与本章前面提到的分区表类似，分区视图的执行计划也使用了聚集索引查找。即使分区视图包含了 2022 年和 2021 年的表，你也可以从执行计划中确定，在查找清单
    16-18 中的查询结果时，`SQL Server` 仅从 `dbo.CustomerOrderHistory2022` 表返回结果。`dbo.CustomerOrderHistory`
    的百分比为 0%。你也可以在图 16-14 中检查聚集索引查找的属性。


    ![](img/480547_2_En_16_Fig14_HTML.jpg)

