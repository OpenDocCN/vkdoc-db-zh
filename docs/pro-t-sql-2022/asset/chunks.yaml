- fmt: '## Feature Flags


    You may be asked to make some changes to an application that will require many
    different user stories. To put it differently, you may be refactoring an application
    where that process is expected to take months. At the same time, you know your
    business may deploy database code every two weeks. The issue becomes how to develop
    T-SQL code where you can confirm the code works in the existing database structure
    but also make sure that these database changes do not end up in Production before
    they are ready.


    This is a question not only many database developers but also software developers
    have asked themselves. At the heart of the issue is how to write database code
    that can be turned on and off. One method that attempts to handle this is the
    use of feature flags. Feature flags are a programmatic way to enable or disable
    functionality. They are not a SQL Server feature but rather a method of implementing
    T-SQL code. Ideally, feature flags are used to allow code to be deployed as soon
    as possible while allowing fine-tuned control over when the functionality will
    be enabled. The intention with feature flags is to leave them in place for a limited
    amount of time as they are only intended to allow code to be deployed before enabling
    the features. The high-level process is the following:


    1.  Add a feature flag to the database as disabled.

    2.  Update the stored procedure to use `IF ((SELECT IsActive FROM dbo.FeatureFlag
    WHERE FeatureFlagID = <FeatureFlagID>) = 1)... EXISTS...`

    3.  Enable the feature from the database table.

    4.  Update the stored procedure to remove the `IF… EXISTS` and only use the new
    logic.

    5.  Disable or delete the feature from the database table.


    There are many ways to implement feature flags. The goal remains the same, to
    create database code and database objects that can be configured to work in one
    scenario or another.


    When using feature flags, you have the option to enable or disable new functionality
    at will. This method of managing your database code can allow you to write code,
    deploy the code to production, and enable the new functionality at a later time
    chosen by the business. In addition to being able to determine exactly when to
    enable new functionality, you get the added benefit of being able to roll back
    changes almost instantaneously by updating a single value in a database. There
    are some foundations you want to have in place before fully embracing feature
    flags. For instance, you want to be in the habit of unit testing your database
    code. When it comes to feature flags, you need to unit test when the feature flag
    is enabled, and you also need to unit test when the feature flag is disabled to
    confirm that your applications are using the pre-existing database logic.


    I suggest you wait until you have fully implemented source control for your databases
    before embracing feature flags. One of the reasons for this recommendation is
    that there is additional effort in managing your feature flags. When you create
    feature flags for your database objects, you need to create some additional logic
    to allow your applications to use the pre-existing T-SQL code or the new database
    code. This requires both discipline and defined processes to determine when to
    remove the feature flags from the code. While feature flags will work great for
    database objects like stored procedures, functions, or views, feature flags are
    not the solution for everything you develop. Some changes, such as changes to
    database columns, cannot be toggled on and off. To manage these types of changes
    to database objects, I will discuss some solutions at the end of this section.


    When using feature flags for your T-SQL code, you have a couple options to determine
    what feature flags are enabled at any given time. There are two main solutions
    I’ve heard proposed when it comes to feature flags and databases. The first one
    may be more application code-based. It consists of supplying the feature flag
    values in a configuration file. The second option is more of a T-SQL-based solution.
    This solution involves creating a table to store the feature flags in their current
    status such as enabled or disabled. There are benefits and downsides to each option.
    Using application code to manage feature flags may be easier to implement and
    manage. However, it may be more difficult for the database administrators to support
    these feature flags. If you keep the feature flag values in the database, you
    need to be disciplined in managing those feature flags and removing them. It can
    become very easy to end up with a table that is cluttered with deprecated feature
    flags. The downside is that only users with access to the database table can confirm
    the value associated with each feature flag.


    When you deploy your database code, you can deploy the feature flag as disabled.
    Once you are ready to enable the new functionality, you can set the feature flag
    to enabled. You want to define a process for determining when it is time to switch
    entirely to the new functionality. When you are ready to operate entirely on the
    new functionality, remove the previous T-SQL code. Also remove any reference to
    feature flags as part of this process. The challenge with this method is it can
    become easy to skip over the process of removing the prior database code. If your
    T-SQL code is not cleaned up on a regular basis, this can greatly diminish the
    manageability of your code going forward.


    If you need to update a stored procedure to use new logic, you can use feature
    flags in order to deploy this change whenever you want. Refer to Listing 12-2,
    you can find the original stored procedure that has not been modified.


    ```

    /*-------------------------------------------------------------*\

    Name:             dbo.GetProduct

    Author:           Elizabeth Noble

    Created Date:     2022-10-30

    Description:      Get a list of all products in the databases

    Sample Usage:

    EXECUTE dbo.GetProduct;

    \*-------------------------------------------------------------*/

    CREATE OR ALTER PROCEDURE dbo.GetProduct

    AS

    SELECT

    ProductID,

    ProductName,

    ProductPrice,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Product;

    GO

    Listing 12-2

    Original Stored Procedure

    ```


    This stored procedure pulls various information about all products. In this T-SQL
    code, the stored procedure does not differentiate between active and inactive
    products. Information about all products is returned. You may find that this stored
    procedure was only supposed to return active products. You need to update this
    stored procedure to only return active products and exclude the `IsActive` column.
    Removing this column prevents this code change from being enabled as soon as it
    is deployed.


    In this case, you need to use something like feature flags to allow you the flexibility
    to create these changes in the stored procedure and control when these changes
    are available to the application. When working with feature flags, you need a
    way to determine whether a feature flag is enabled or not. This is how you and
    the database code will know which T-SQL code should be executed at a given time.
    One option is to create a table to store the information about the feature flags.
    You can create a table like the one shown in Listing 12-3.


    ```

    CREATE TABLE dbo.FeatureFlag

    (

    FeatureFlagID     SMALLINT,

    IsActive          BIT,

    DateCreated       DATETIME2,

    DateModified      DATETIME2

    );

    Listing 12-3

    Creating a Feature Flag Table

    ```'
  raw: '## Feature Flags


    You may be asked to make some changes to an application that will require many
    different user stories. To put it differently, you may be refactoring an application
    where that process is expected to take months. At the same time, you know your
    business may deploy database code every two weeks. The issue becomes how to develop
    T-SQL code where you can confirm the code works in the existing database structure
    but also make sure that these database changes do not end up in Production before
    they are ready.


    This is a question not only many database developers but also software developers
    have asked themselves. At the heart of the issue is how to write database code
    that can be turned on and off. One method that attempts to handle this is the
    use of feature flags. Feature flags are a programmatic way to enable or disable
    functionality. They are not a SQL Server feature but rather a method of implementing
    T-SQL code. Ideally, feature flags are used to allow code to be deployed as soon
    as possible while allowing fine-tuned control over when the functionality will
    be enabled. The intention with feature flags is to leave them in place for a limited
    amount of time as they are only intended to allow code to be deployed before enabling
    the features. The high-level process is the following:


    1.  Add a feature flag to the database as disabled.


    2.  Update the stored procedure to use `IF ((SELECT IsActive FROM dbo.FeatureFlag
    WHERE FeatureFlagID = <FeatureFlagID>) = 1)... EXISTS...`


    3.  Enable the feature from the database table.


    4.  Update the stored procedure to remove the `IF… EXISTS` and only use the new
    logic.


    5.  Disable or delete the feature from the database table.


    There are many ways to implement feature flags. The goal remains the same, to
    create database code and database objects that can be configured to work in one
    scenario or another.


    When using feature flags, you have the option to enable or disable new functionality
    at will. This method of managing your database code can allow you to write code,
    deploy the code to production, and enable the new functionality at a later time
    chosen by the business. In addition to being able to determine exactly when to
    enable new functionality, you get the added benefit of being able to roll back
    changes almost instantaneously by updating a single value in a database. There
    are some foundations you want to have in place before fully embracing feature
    flags. For instance, you want to be in the habit of unit testing your database
    code. When it comes to feature flags, you need to unit test when the feature flag
    is enabled, and you also need to unit test when the feature flag is disabled to
    confirm that your applications are using the pre-existing database logic.


    I suggest you wait until you have fully implemented source control for your databases
    before embracing feature flags. One of the reasons for this recommendation is
    that there is additional effort in managing your feature flags. When you create
    feature flags for your database objects, you need to create some additional logic
    to allow your applications to use the pre-existing T-SQL code or the new database
    code. This requires both discipline and defined processes to determine when to
    remove the feature flags from the code. While feature flags will work great for
    database objects like stored procedures, functions, or views, feature flags are
    not the solution for everything you develop. Some changes, such as changes to
    database columns, cannot be toggled on and off. To manage these types of changes
    to database objects, I will discuss some solutions at the end of this section.


    When using feature flags for your T-SQL code, you have a couple options to determine
    what feature flags are enabled at any given time. There are two main solutions
    I’ve heard proposed when it comes to feature flags and databases. The first one
    may be more application code-based. It consists of supplying the feature flag
    values in a configuration file. The second option is more of a T-SQL-based solution.
    This solution involves creating a table to store the feature flags in their current
    status such as enabled or disabled. There are benefits and downsides to each option.
    Using application code to manage feature flags may be easier to implement and
    manage. However, it may be more difficult for the database administrators to support
    these feature flags. If you keep the feature flag values in the database, you
    need to be disciplined in managing those feature flags and removing them. It can
    become very easy to end up with a table that is cluttered with deprecated feature
    flags. The downside is that only users with access to the database table can confirm
    the value associated with each feature flag.


    When you deploy your database code, you can deploy the feature flag as disabled.
    Once you are ready to enable the new functionality, you can set the feature flag
    to enabled. You want to define a process for determining when it is time to switch
    entirely to the new functionality. When you are ready to operate entirely on the
    new functionality, remove the previous T-SQL code. Also remove any reference to
    feature flags as part of this process. The challenge with this method is it can
    become easy to skip over the process of removing the prior database code. If your
    T-SQL code is not cleaned up on a regular basis, this can greatly diminish the
    manageability of your code going forward.


    If you need to update a stored procedure to use new logic, you can use feature
    flags in order to deploy this change whenever you want. Refer to Listing [12-2](#480547_2_En_12_Chapter.xhtml#PC2),
    you can find the original stored procedure that has not been modified.


    ```

    /*-------------------------------------------------------------*\

    Name:             dbo.GetProduct

    Author:           Elizabeth Noble

    Created Date:     2022-10-30

    Description:      Get a list of all products in the databases

    Sample Usage:

    EXECUTE dbo.GetProduct;

    \*-------------------------------------------------------------*/

    CREATE OR ALTER PROCEDURE dbo.GetProduct

    AS

    SELECT

    ProductID,

    ProductName,

    ProductPrice,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Product;

    GO

    Listing 12-2

    Original Stored Procedure

    ```


    This stored procedure pulls various information about all products. In this T-SQL
    code, the stored procedure does not differentiate between active and inactive
    products. Information about all products is returned. You may find that this stored
    procedure was only supposed to return active products. You need to update this
    stored procedure to only return active products and exclude the `IsActive` column.
    Removing this column prevents this code change from being enabled as soon as it
    is deployed.


    In this case, you need to use something like feature flags to allow you the flexibility
    to create these changes in the stored procedure and control when these changes
    are available to the application. When working with feature flags, you need a
    way to determine whether a feature flag is enabled or not. This is how you and
    the database code will know which T-SQL code should be executed at a given time.
    One option is to create a table to store the information about the feature flags.
    You can create a table like the one shown in Listing [12-3](#480547_2_En_12_Chapter.xhtml#PC3).


    ```

