    | --- | --- | --- | --- | --- | --- |

    | Ruth | Johnson | 4711 Ponce de Leon | Memphis | 38110 | United States |


    此外，如果你试图查找缺失的记录或验证是否存在匹配的记录，你可以在两个查询之间使用 `EXCEPT`。代码清单 5-11 展示了如果你从一个查询的结果中排除另一个查询的结果时的
    `T-SQL` 代码。


    ```sql

    SELECT FirstName, LastName

    FROM dbo.Customer

    WHERE City = ''Memphis''

    EXCEPT

    SELECT FirstName, LastName

    FROM dbo.Customer

    WHERE [Address] LIKE ''%de%'';

    ```

