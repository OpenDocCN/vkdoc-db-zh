  trans: '

    对比代码清单 3-13、3-14 和 3-15，你可以很快发现我在创建表和声明变量时使用了统一的格式。这样，任何其他人看到这种格式的代码，都能立即明白这是在创建表。


    关于大小写，至少有两件事需要考虑。一是与关键字相关的大写，二是所有其他术语的大小写。我倾向于将所有保留字大写。`T-SQL` 的保留字列表可能相当长。我选择将任何不属于数据库架构组成部分的词都视为保留字。对于数据库对象和列名，我按其创建时的形式大小写书写。创建表别名时，我使用小写。你可以在代码清单
    3-16 中看到，保留字被大写，而数据库对象名的每个单词的首字母则大写。


    ```

    CREATE TRIGGER dbo.ArchiveProduct

    ON dbo.Product

    AFTER INSERT, UPDATE

    AS

    IF (ROWCOUNT_BIG() = 0)

    RETURN;

    INSERT INTO dbo.ProductArchive (ProductID, ProductPrice, DateCreated)

    SELECT inserted.ProductID, inserted.ProductPrice, GETDATE()

    FROM inserted;

    代码清单 3-16

    创建一个 DML 触发器

    ```


    在确定 `T-SQL` 的格式标准时，另一个需要考虑的因素是是否以及如何使用别名。别名是一种允许你创建一个简短名称来引用表的方法。在编写查询时，也可以在 `SELECT`
    语句中为列名创建别名。如何使用别名值取决于别名是针对表还是列。然而，总体概念是相同的。如果为表名创建了别名，则必须在整个查询中使用该别名来代替表名。对于列，别名常用于重命名列或使输出更用户友好。通常，列别名不会被引用。


    我在编写查询时唯一会引用列别名的情况是，必须按一个已被别名化的列进行排序，特别是当该列包含的逻辑不仅仅是重命名原始列名时。可以在 `ORDER BY` 语句中提供一个代表列顺序的数字，而不是提供列名。虽然这是一种快速排序数据的方法，但不建议在永久性的应用程序代码中使用，因为
    `SELECT` 语句中的列顺序可能会更改，而 `ORDER BY` 子句却未得到更新。这将导致返回的数据可能按非预期的顺序排列。


    关于 `T-SQL` 代码格式化的另一个有争议的话题是，在编写代码时如何格式化逗号。有些人喜欢将逗号放在每行的开头。这可以提高可读性，并帮助其他人快速识别这是多行中的一行。将逗号放在每行开头确实简化了调试，因为很容易注释掉以逗号开头的单行，而查询的其余部分仍能正确解析。我更喜欢将逗号放在结尾，这样我就可以忽略逗号，专注于查询中返回的列。


    对于 `WHERE` 子句中的多个条件，我确实倾向于在每个条件前加上运算符。对于许多类型的条件，这个运算符要么是 `OR`，要么是 `AND`。这使我能够快速查看
    `WHERE` 子句中的逻辑，而无需扫描整个 `WHERE` 子句来确定所有条件如何协同工作。你也可以选择让每行以运算符结尾，但你可能会发现这会使调试复杂化。


    在使用 `T-SQL` 代码时，有时你需要编写复杂的代码。这些代码可能包括子查询，或者 `WHERE` 子句中涉及 `AND` 或 `OR` 的逻辑。如果在
    `WHERE` 子句中存在像子查询或 `AND` 和 `OR` 混合这样的逻辑，我会将它们用括号括起来。我会缩进括号内的所有代码，以便于识别哪些逻辑被组合在一起。有时，两个表之间会有多个连接条件。如果两个表之间存在多个连接条件，我会缩进除第一个条件之外的所有其他连接条件，以便他人能轻松看出两个表之间存在多个连接条件。


    在向代码添加额外的逻辑层级时，你还需要考虑如何格式化 `T-SQL` 代码。`T-SQL` 代码块有各种原因，包括 `TRY… CATCH` 块、`IF…
    ELSE` 语句、`BEGIN…END` 或其他需要分割代码的情况。对于这些场景，我会缩进代码块内部。如果代码块最终被嵌套，我会对每个后续的代码块进行缩进。我倾向于缩进我的代码块，以便审查我代码的人能看到父级活动，例如代码清单
    3-17 中的 `WHILE` 循环。一旦你看到第一级缩进，你就知道所有缩进的逻辑都属于同一个代码块。


    ```

    SET NOCOUNT ON;

    DECLARE @ProductID INT,

    @ProductName VARCHAR(25),

    @message VARCHAR(50);

    PRINT ''-------- 产品列表 --------'';

    DECLARE product_cursor CURSOR DYNAMIC

    FOR

    SELECT ProductID, ProductName

    FROM dbo.Product;

    OPEN product_cursor;

    FETCH NEXT FROM product_cursor

    INTO @ProductID, @ProductName;

    WHILE @@FETCH_STATUS = 0

    BEGIN

    PRINT '' '';

    SELECT @message = ''----- 产品客户：'' + @ProductName + ''-----'';

    PRINT @message;

    SELECT LEFT(cus.FirstName, 25), LEFT(cus.LastName, 25), SUM(dtl.QuantitySold)
    AS QuantitySold

    FROM dbo.CustomerOrder ord

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    INNER JOIN dbo.Product prd

    ON dtl.ProductID = prd.ProductID

    INNER JOIN dbo.Customer cus

    ON ord.CustomerID = cus.CustomerID

    WHERE prd.ProductID = @ProductID

    GROUP BY cus.FirstName, cus.LastName, prd.ProductName;

    FETCH NEXT FROM product_cursor INTO @ProductID, @ProductName;

    END;

    CLOSE product_cursor;

    DEALLOCATE product_cursor;

    代码清单 3-17

    创建一个游标

    ```


    一致地格式化 `T-SQL` 代码可以提高你自己以及将来任何需要审查你代码的人的可读性。格式良好的代码有助于在故障排除、性能调优和代码增强时提供清晰度。在你的组织中创建一个
    `T-SQL` 格式化标准，也有助于新员工入职或培训初级数据库开发人员。一旦确定了 `T-SQL` 格式化标准，你将需要考虑采取哪些步骤来为你的 `T-SQL`
    代码创建命名约定。

    '
- fmt: '## Naming T-SQL


    When you write T-SQL, you have options on how to write that code. As covered in
    Chapter [2](#480547_2_En_2_Chapter.xhtml), you will most likely create persistent
    objects in T-SQL. Regardless of your purpose, following a good naming policy makes
    it easier for others to understand the purpose of your T-SQL code. Ideally, your
    team members should be able to determine the purpose of your code based on the
    object name where the code lives. This is particularly helpful for new or less
    experienced employees.


    The practices for a naming convention are similar to those for formatting T-SQL.
    One of the aspects that comes with naming conventions is look and feel. This can
    involve the capitalization used for objects. There are various options available
    when providing a case for database objects. The main choices are `camel case`
    or `pascal case`. `Camel case` is where the first letter of the first word is
    not capitalized, but the first letter of all of the other words is capitalized.
    `Pascal case` is where the first letter of every word is capitalized. The primary
    difference between these casing styles is the first letter of the first work of
    the database object. `Listing 3-18` shows a query using `camel case`.


    ```sql

    SELECT productID, productName, dateCreated, dateModified

    FROM dbo.product;

    ```

    `Listing 3-18`

    Query with Camel Case


    Conversely, you can see in `Listing 3-19` what `pascal case` looks like when writing
    the same query.


    ```sql

    SELECT ProductID, ProductName, DateCreated, DateModified

    FROM dbo.Product;

    ```

    `Listing 3-19`

    Query with Pascal Case


    In addition, there is also an option where the first letter is not capitalized
    and there is an underscore between words. I am generally not a fan of non-alphabetic
    characters in database names, but I do know some people that prefer underscores.
    If you want another alternative, `Listing 3-20` shows how tables and columns are
    named in what is called `snake case`.


    ```sql

    SELECT productID, product_name, date_created, date_modified

    FROM dbo.product;

    ```

    `Listing 3-20`

    Query with Snake Case


    When determining which case to use for your naming convention, make sure to also
    be aware of the collation for your database and if any tables have a special collation.
    Being aware of case sensitivity will help you ensure that your naming conventions
    and your formatting standards line up.


    This can also involve where objects appear in `Object Explorer`. Some of this
    has to do with what type of object is being named and who will be looking for
    these objects. If you want to find objects by their use, you may want to specify
    `schema` names that group those objects together. This can be particularly useful
    for applications or services. Depending on what type of troubleshooting is expected,
    database objects, particularly `stored procedures`, can be named with the action
    they are taking. This allows for an easy search of stored procedures that are
    `selecting` data vs. `inserting` data. However, there is another option where
    the main table affected could be the first word in the stored procedure name.
    This allows someone to search in `Object Explorer` by affected table to see all
    the stored procedures that exist.


    Another consideration is whether `reserved words` can be used when naming database
    objects. If reserved words are used in database object names, you will want to
    add another word to the object name so that brackets are not needed when referencing
    the object name.


    When determining naming conventions, you may also want to consider if there are
    columns in tables that will have the same names as columns in other tables. Some
    of these types of columns include specifying the date a record was created, the
    date a record was last updated, and if the record has been soft deleted. For tables
    that are specifying status or types, these tables can have columns with a status
    or type name and an associated description. You may decide that you want all these
    columns to have the exact same name in all tables with these columns.


    When writing my queries, I prefer not to alias my column names, if possible. I
    also don’t display more than one date created or updated. Therefore, I use the
    exact same name for creation date, modified date, and the soft delete flag. However,
    I also usually return the name or description field from multiple tables when
    I write my queries. Therefore, I prefer those columns to include the table name
    as part of the column name. For instance, instead of using the column name `Description`
    in the tables `Customer` and `Product`, I prefer to name the columns `CustomerDescription`
    in the `Customer` table and `ProductDescription` in the `Product` table. This
    allows others to view the select statement and easily identify which table is
    being referenced. It also means I alias less columns when I write my queries.


    Naming persistent database objects can get tricky as well. Naming tables can be
    different than naming indexes or views or triggers or functions. Once again, naming
    these objects is more than just giving them a descriptive name. It may also be
    about giving them a name that makes it clear what type of object it is. This is
    because many database engineers and developers use `Object Explorer` as their
    primary tool for finding objects. As discussed, if table names begin with nouns
    and stored procedures begin with verbs, I next need to figure out how to differentiate
    other database objects from tables and stored procedures.


    One of the options is to precede the object name with an abbreviation for the
    object type. In the case of indexes, you can use `IX_` for non-clustered indexes
    and `CX_` for clustered indexes. When naming indexes, once you specify the `IX_`
    or `CX_`, the next item should be the table name where the index exists. After
    the table name should be the list of columns in the index. The columns should
    be listed in the same order that they are specified when the index is created.
    In `Listing 3-21`, you can see a clustered index. The clustered index name begins
    with `CX` followed by the table name and then the column name. Each section is
    separated by an underscore.


    ```sql

    CREATE CLUSTERED INDEX CX_Product_ProductName

    ON dbo.Product (ProductName);

    ```

    `Listing 3-21`

    Create a Clustered Index


    Creating a non-clustered index follows the same pattern. In `Listing 3-22`, you
    see the non-clustered index also includes multiple columns.


    ```sql

    CREATE NONCLUSTERED INDEX IX_Customer_DateCreated_FirstName_LastName_Country

    ON dbo.Customer

    (

    DateCreated ASC,

    FirstName ASC,

    LastName ASC,

    Country ASC

    );

    ```

    `Listing 3-22`

    Create a Non-clustered Index with Multiple Columns'
