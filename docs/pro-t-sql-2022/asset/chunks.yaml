    ### 精确数字数据类型


    有些情况下，数字的值是确定且已知的。这类数字可以称为精确数字。一些例子包括表示真或假的 1 或 0、已售单位数量、折扣百分比，或美元和美分。在选择最佳数据类型时，通常会有几种类似的数据类型似乎都能胜任。在某些情况下，一个类别下可能有不止一种数据类型可用。


    在考虑使用何种数据类型时，你需要思考该数据类型的用途。这有助于在确定应使用哪种数据类型时提供更好的清晰度。你需要权衡每种数据类型的优点和缺点。你还需要考虑在与其他数据类型的值进行计算时，SQL
    Server 是否会因此数据类型的使用而执行任何隐式转换。最后一点是考虑该数据类型在 SQL Server 中是如何存储的。以下是一系列精确数字数据类型。对于每种类型，你都会了解到其一些优点、缺点和常见用例。


    #### BIT


    `BIT`数据类型用于存储二进制数字，值为 1 或 0。在 T-SQL 中，数据类型也可以为可空，这表明`BIT`数据类型也可以存储`NULL`值。由于只有三种可能的值，这种数据类型具有最小的值集。因为可以存储在该数据类型中的值种类很少，`BIT`数据类型在磁盘上也只需要最小的存储空间。由于一个字节中有
    8 位，在数据库中存储`BIT`数据类型的情况也是如此。


    `BIT`数据类型非常适用于“非 X 即 Y”的场景。存储的信息可以被解释为真或假、开或关、是或否。在真或假的情况下，`BIT`类型可用于指示数据记录是否被成功转换。使用`BIT`类型指示开或关的一个常见场景是，指示某个特定功能是否已启用。一个是或否值的例子是记录客户选择接收公司营销信息的决定。


    使用`BIT`数据类型的一个挑战是确保以促进良好数据库设计的方式使用它。这意味着有时在选择`BIT`数据类型时，你需要考虑其整体目的。例如，用`BIT`数据类型来指示一个物品是否具有特定特性似乎是个好主意。一个例子是在`Product`表中添加一列`IsWood`来指示某个零件是否由木材制成。然而，更好的做法可能是重新设计数据库，将这些属性记录在另一个表中。


    `BIT`可用于指示事务的成功状态。然而，通常更好地记录事务在一段时间内的状态。如果记录状态随时间的变化很重要，那么使用`BIT`来记录事务是否成功可能不是最佳选择。虽然`BIT`占用空间小，非常适合是或否的值，但有时你需要一列有比是或否更多的选项，因此需要考虑更大的数据类型。


    #### TINYINT, SMALLINT, INT 和 BIGINT


    SQL Server 还允许你存储整数，即没有小数或分数值的数字。这些数字被称为整数。以整数存储的数据的一个例子是给定物品的数量。SQL Server 中可以存储多种整数值。第一种整数类型是`TINYINT`。`TINYINT`值可以包含
    0 到 255 之间的任何整数值。由于该数据类型的大小有限，它可能适用于有限的配置类型或地点数量。该数据类型类似于`BIT`数据类型，但其范围稍大一些。该数据类型也可用于配置系统中的状态类型或对象的类别。`TINYINT`非常适合存储这些状态类型，因为许多应用程序不需要超过
    256 种状态。


    既然我们已经介绍了`TINYINT`，现在来讨论`SMALLINT`的可能性。`SMALLINT`的范围涵盖了大约 70,000 个可能的值。有了这个范围，你需要考虑什么样的值需要介于
    256 到 65,435 个唯一值之间。`SMALLINT`的范围从-32,768 开始，到 32,767 结束。该数据类型不适用于记录每一项活动的日志表。许多数据库或数据表在几年内可能会有超过
    70,000 笔事务或记录。这可能导致该数据类型不适合那些表。然而，在其他表中，`SMALLINT`数据类型可能是理想的。


    如果你的数据表交易活动不高，但会持续增长一段时间，那么`SMALLINT`数据类型可能是有益的。了解你的业务将有助于确定`SMALLINT`是否适合存储该值的正确数据类型。


    如果你想创建一个表来持续为应用程序添加功能，你可能希望存储一条记录来指示应用程序中的每个新功能。一个例子是功能标志。你的应用程序在其生命周期中很可能会有超过
    256 项增强功能。你可能还想存储应用程序的配置值。将这些配置值存储在表中可能会受益于`SMALLINT`数据类型。


    `INT`是整数数据类型中最常用的。许多数据库专门对任何类型的整数使用此类型，这是不推荐的。原因之一是它的整个范围涵盖了大约 53 亿条记录。`INT`数据类型的范围从-2,147,483,648
    到 2,147,483,647。然而，当创建许多数据表时，它们的标识列通常从整数 1 开始，或称为种子。这导致表被限制在大约 21.5 亿个唯一标识值。如果你认为你的表将需要超过
    21.5 亿个唯一标识记录，你可能希望标识列从最低的数字开始，即–2,147,483,648，或者尝试使用`BIGINT`。很少有情况需要比`INT`更大的值，而且我认为有很多时候使用`INT`数据类型，而`TINYINT`或`SMALLINT`会是更好的选择。`BIGINT`数据表可以存储从-9,223,372,036,854,775,808
    到 9,223,372,036,854,775,808 的值，并且占用的空间是`INT`的两倍。


    这通常是你可能需要进行数学计算的地方。一些企业每秒处理几百笔交易。其他企业每秒处理高达 10,000 或 20,000 笔交易。在这两种情况下，重要的是考虑保存这些事务信息的表预期会有怎样的增长。如果你的应用程序在几年内每秒有数百笔交易，那么存储的记录数量将远少于应用程序在相同时间段内每秒有数万笔交易的情况。


    ```

    if (condVar > someVal) {console.log("xxx")}

    ```

