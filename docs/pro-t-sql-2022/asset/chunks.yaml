- fmt: '# 透明数据加密


    另一种数据加密选项是透明数据加密。它会对磁盘上的整个数据库进行加密，而不仅仅是一个列或列组。由于数据文件被加密，备份文件也随之加密。当数据读入缓冲池时，SQL
    Server 会对其进行解密，用户无法感知这一过程，因此得名。本节将介绍如何实现透明数据加密。一旦启用，SQL Server 将尝试加密数据。本节还将演示如何暂停加密以及查看数据库加密的当前状态。此外，您将学习如何验证证书备份并备份证书。本节最后将说明如何移除透明数据加密。


    在开始实现透明数据加密之前，请制定证书管理计划。这是实现的关键步骤。**如果没有备份证书，当透明数据加密已启用时，您将无法还原数据库备份。** 设置透明数据加密时，首先需要创建主密钥和证书，如代码清单
    19-2 所示。


    ```

    USE master;

    CREATE MASTER KEY ENCRYPTION BY PASSWORD = ''oUtd@or*R3cre&tion!'';

    CREATE CERTIFICATE DataEncryption

    WITH SUBJECT = ''OutdoorRecreation Certificate'';

    Listing 19-2

    创建主密钥和证书

    ```


    主密钥和证书应在 master 数据库中创建。创建主密钥和证书后，需要创建数据库加密密钥。如代码清单 19-3 所示，请确保在 `OutdoorRecreation`
    数据库中创建密钥。


    ```

    USE OutdoorRecreation;

    GO

    CREATE DATABASE ENCRYPTION KEY

    WITH ALGORITHM = AES_256

    ENCRYPTION BY SERVER CERTIFICATE DataEncryption;

    Listing 19-3

    创建数据库加密密钥

    ```


    加密是使用代码清单 19-2 中的服务器证书创建的。加密密钥的算法可以是 AES 128、AES 192 或 AES 256。如果尚未备份加密密钥，您将收到以下警告信息：


    > 警告

    > 用于加密数据库加密密钥的证书尚未备份。您应立即备份证书及其关联的私钥。如果证书变得不可用，或者您必须在另一台服务器上还原或附加数据库，则必须同时拥有证书和私钥的备份，否则将无法打开数据库。


    现在数据库已准备好启用透明数据加密，如代码清单 19-4 所示。


    ```

    ALTER DATABASE OutdoorRecreation

    SET ENCRYPTION ON;

    Listing 19-4

    启用透明数据加密

    ```


    一旦在数据库上启用透明数据加密，后台加密操作将开始运行。


    > 注意

    > 为任何用户数据库启用透明数据加密，也会在 `tempdb` 上启用透明数据加密。


    如果您想暂停此过程，可以运行代码清单 19-5 中的 T-SQL 代码。


    ```

    ALTER DATABASE OutdoorRecreation

    SET ENCRYPTION SUSPEND;

    Listing 19-5

    暂停后台加密操作

    ```


    了解如何管理数据库的加密状态很有帮助。了解如何监控数据库加密状态可能更有用。代码清单 19-6 中的查询可用于查找有关数据库加密状态的信息。


    ```

    SELECT db.[name] AS DatabaseName,

    encryptor_type,

    encryption_state_desc,

    encryption_scan_state_desc

    FROM sys.dm_database_encryption_keys ky

    INNER JOIN sys.databases db

    ON ky.database_id = db.database_id;

    Listing 19-6

    查找加密状态

    ```


    此查询提供数据库名称、加密类型、加密状态描述和加密扫描描述。当加密进行时，您应得到类似表 19-4 的结果。


    **表 19-4**

    加密状态（已暂停）


    | 数据库名称 | 加密程序类型 | 加密状态描述 | 加密扫描状态描述 |

    | --- | --- | --- | --- |

    | tempdb | ASYMMETRIC KEY | ENCRYPTED | COMPLETE |

    | OutdoorRecreation | CERTIFICATE | ENCRYPTION_IN_PROGRESS | SUSPENDED |


    在 `OutdoorRecreation` 数据库的场景中，加密正在进行中。此查询是在我运行了代码清单 19-5 中的代码之后执行的，因此扫描状态为“已暂停”是预期的。


    要恢复透明数据加密加密，可以执行代码清单 19-7 中的代码。


    ```

    ALTER DATABASE OutdoorRecreation

    SET ENCRYPTION RESUME;

    Listing 19-7

    恢复数据加密扫描

    ```


    这将允许加密过程在 `OutdoorRecreation` 数据库上继续。表 19-5 显示了在恢复加密扫描后，运行代码清单 19-6 的结果。


    **表 19-5**

    加密状态（进行中）


    | 数据库名称 | 加密程序类型 | 加密状态描述 | 加密扫描状态描述 |

    | --- | --- | --- | --- |

    | tempdb | ASYMMETRIC KEY | ENCRYPTED | COMPLETE |

    | OutdoorRecreation | CERTIFICATE | ENCRYPTION_IN_PROGRESS | RUNNING |


    `OutdoorRecreation` 数据库相对较小，因此加密过程不应耗时过长。如果再次执行代码清单 19-6 中的 T-SQL，您将得到表 19-6 中的结果。


    **表 19-6**

    加密状态（已完成）


    | 数据库名称 | 加密程序类型 | 加密状态描述 | 加密扫描状态描述 |

    | --- | --- | --- | --- |

    | tempdb | ASYMMETRIC KEY | ENCRYPTED | COMPLETE |

    | OutdoorRecreation | CERTIFICATE | ENCRYPTED | COMPLETE |


    表 19-6 表明数据库 `OutdoorRecreation` 已被加密。既然数据库已启用透明数据加密，请确保将您的证书备份存放在安全位置。


    > 注意

    > 如果您习惯于使用密码加密证书，请不要对启用透明数据加密的证书这样做。实例重启后，您的数据库将无法访问。


    代码清单 19-8 中的查询显示了如何查找证书最近的备份日期。


    ```

    USE master;

    GO

    SELECT crt.pvt_key_last_backup_date AS LastBackupDate,

    DB_NAME(dky.database_id) AS EncryptedDatabase,

    crt.[name] AS CertificateName

    FROM sys.certificates crt

    INNER JOIN sys.dm_database_encryption_keys dky

    ON crt.thumbprint = dky.encryptor_thumbprint;

    Listing 19-8

    检查证书的最后备份日期

    ```


    执行此查询将返回所有有关联数据库的证书的最后备份日期。此查询的结果如表 19-7 所示。


    **表 19-7**

    证书最后备份日期的查询结果


    | 最后备份日期 | 加密数据库 | 证书名称 |

    | --- | --- | --- |

    | NULL | OutdoorRecreation | DataEncryption |


    此表表明 `OutdoorRecreation` 数据库的 `DataEncryption` 证书尚未备份。要备份证书，您可以执行代码清单 19-9 中的
    T-SQL。


    ```

    BACKUP CERTIFICATE DataEncryption

    TO FILE = N''C:\Certificates\DataEncryption.cer''

    WITH PRIVATE KEY (

    FILE = N''C:\Certificates\DataEncryption.pvk'',

    ENCRYPTION BY PASSWORD = ''pR0!5Ql#''

    );

    Listing 19-9

    备份加密证书

    ```


    在此示例中，此证书已备份到 `C` 盘的 `Certificates` 文件夹。'
  raw: '## Transparent Data Encryption


    Another option for data encryption is Transparent Data Encryption (TDE). TDE encrypts
    the entire database on disk, not just a column or group of columns. Since the
    data files are encrypted, the backups are also encrypted. SQL Server decrypts
    the data when it is read into the buffer pool so the users have no idea this is
    going on, hence the name. In this section, you will implement Transparent Data
    Encryption. Once TDE is enabled, SQL Server will attempt to encrypt the data.
    This section will also show how to pause that encryption and view the current
    status of the database encryption. In addition, you will learn how to verify the
    certificate backups and back up the certificate. This section closes with instructions
    on how to remove Transparent Data Encryption.


    Before you begin implementing Transaction Data Encryption, create a plan for managing
    certificate. This is a critical part of implementing TDE. **Without the backup
    certificate, you will not be able to restore a database backup if TDE has been
    enabled.** When setting up TDE, the first thing you need to do is create a master
    key and certificate as shown in Listing [19-2](#480547_2_En_19_Chapter.xhtml#PC2).


    ```

    USE master;

    CREATE MASTER KEY ENCRYPTION BY PASSWORD = ''oUtd@or*R3cre&tion!'';

    CREATE CERTIFICATE DataEncryption

    WITH SUBJECT = ''OutdoorRecreation Certificate'';

    Listing 19-2

    Creating a Master Key and Certificate

    ```


    The master key and certificate should be created in the master database. After
    creating the master key and certificate, you need to create a database encryption
    key. As shown in Listing [19-3](#480547_2_En_19_Chapter.xhtml#PC3), make sure
    you create the key in the `OutdoorRecreation` database.


    ```

    USE OutdoorRecreation;

    GO

    CREATE DATABASE ENCRYPTION KEY

    WITH ALGORITHM = AES_256

    ENCRYPTION BY SERVER CERTIFICATE DataEncryption;

    Listing 19-3

    Creating a Database Encryption Key

    ```


    The encryption is created using the server certificate from Listing [19-2](#480547_2_En_19_Chapter.xhtml#PC2).
    The algorithm for the encryption key can be AES 128, AES 192, or AES 256\. If
    you have not backed up your encryption key, you will get the following message:


    Warning


    The certificate used for encrypting the database encryption key has not been backed
    up. You should immediately back up the certificate and the private key associated
    with the certificate. If the certificate ever becomes unavailable or if you must
    restore or attach the database on another server, you must have backups of both
    the certificate and the private key or you will not be able to open the database.


    The database is now ready to have Transparent Data Encryption enabled as written
    in Listing [19-4](#480547_2_En_19_Chapter.xhtml#PC4).


    ```

    ALTER DATABASE OutdoorRecreation

    SET ENCRYPTION ON;

    Listing 19-4

    Enabling Transparent Data Encryption

    ```


    Once you enable TDE on the database, the background encryption operation will
    run in the background.


    Note


    Enabling TDE for any user database will also enable TDE on `tempdb`.


    If you want to suspend this process, Listing [19-5](#480547_2_En_19_Chapter.xhtml#PC5)
    has the T-SQL code you can run.


    ```

    ALTER DATABASE OutdoorRecreation

    SET ENCRYPTION SUSPEND;

    Listing 19-5

    Suspending a Background Encryption Operation

    ```


    Learning how to manage the encryption status for the database can be helpful.
    It may be even more helpful to know how to monitor the status of the database
    encryption. The query in Listing [19-6](#480547_2_En_19_Chapter.xhtml#PC6) can
    be used to find information about the state of database encryption.


    ```

    SELECT db.[name] AS DatabaseName,

    encryptor_type,

    encryption_state_desc,

    encryption_scan_state_desc

    FROM sys.dm_database_encryption_keys ky

    INNER JOIN sys.databases db

    ON ky.database_id = db.database_id;

    Listing 19-6

    Finding the Encryption Status

    ```


    This query provides the database name, type of encryption, description of the
    encryption status, and the encryption scan description. When the encryption is
    in progress, you should have results similar to those in Table [19-4](#480547_2_En_19_Chapter.xhtml#Tab4).


    Table 19-4


    Encryption Status Suspended


    | Database Name | Encryptor Type | Encryption State Description | Encryption Scan
    State Description |

    | --- | --- | --- | --- |

    | tempdb | ASYMMETRIC KEY | ENCRYPTED | COMPLETE |

    | OutdoorRecreation | CERTIFICATE | ENCRYPTION_IN_PROGRESS | SUSPENDED |


    In the scenario for the `OutdoorRecreation` database, the encryption is in progress.
    This query was run after I ran the code in Listing [19-5](#480547_2_En_19_Chapter.xhtml#PC5),
    so the scan state of suspended is expected.


    To resume TDE encryption, you can execute the code in Listing [19-7](#480547_2_En_19_Chapter.xhtml#PC7).


    ```

    ALTER DATABASE OutdoorRecreation

    SET ENCRYPTION RESUME;

    Listing 19-7

    Suspending a Data EncryptionScan

    ```


    This will allow the encryption process to continue on the `OutdoorRecreation`
    database. Table [19-5](#480547_2_En_19_Chapter.xhtml#Tab5) shows the results from
    running the code in Listing [19-6](#480547_2_En_19_Chapter.xhtml#PC6) after resuming
    the encryption scan.


    Table 19-5


    Encryption Status in Progress


    | Database Name | Encryptor Type | Encryption State Description | Encryption Scan
    State Description |

    | --- | --- | --- | --- |

    | tempdb | ASYMMETRIC KEY | ENCRYPTED | COMPLETE |

    | OutdoorRecreation | CERTIFICATE | ENCRYPTION_IN_PROGRESS | RUNNING |


    The `OutdoorRecreation` database is relatively small so the encryption process
    should not take too long. If you execute the T-SQL in Listing [19-6](#480547_2_En_19_Chapter.xhtml#PC6)
    again, you get the results in Table [19-6](#480547_2_En_19_Chapter.xhtml#Tab6).


    Table 19-6


    Encryption Status Completed


    | Database Name | Encryptor Type | Encryption State Description | Encryption Scan
    State Description |

    | --- | --- | --- | --- |

    | tempdb | ASYMMETRIC KEY | ENCRYPTED | COMPLETE |

    | OutdoorRecreation | CERTIFICATE | ENCRYPTED | COMPLETE |


    Table [19-6](#480547_2_En_19_Chapter.xhtml#Tab6) indicates that the database `OutdoorRecreation`
    has been encrypted. Now that TDE has been enabled on your database, make sure
    to have your certificate backed up in a secure location.


    Caution


    If you are accustomed to encrypted your certificates with a password, do not do
    this to the certificate enabling TDE. Your database will be inaccessible after
    the instance is restarted.


    The query in Listing [19-8](#480547_2_En_19_Chapter.xhtml#PC8) indicates how you
    can find the most recent backup date for the certificate.


    ```

    USE master;

    GO

    SELECT crt.pvt_key_last_backup_date AS LastBackupDate,

    DB_NAME(dky.database_id) AS EncryptedDatabase,

    crt.[name] AS CertificateName

    FROM sys.certificates crt

    INNER JOIN sys.dm_database_encryption_keys dky

    ON crt.thumbprint = dky.encryptor_thumbprint;

    Listing 19-8

    Checking the Last Backup Date for a Certificate

    ```


    Executing this query will return the last backup date for all certificates with
    the associated database. The results for this query are Table [19-7](#480547_2_En_19_Chapter.xhtml#Tab7).


    Table 19-7


    Result for the Last Backup Date for a Certificate


    | Last Backup Date | Encrypted Database | Certificate Name |

    | --- | --- | --- |

    | NULL | OutdoorRecreation | DataEncryption |


    This table indicates that the DataEncryption certificate for the `OutdoorRecreation`
    database has not been backed up. To back up the certificate, you can execute the
    T-SQL in Listing [19-9](#480547_2_En_19_Chapter.xhtml#PC9).


    ```

    BACKUP CERTIFICATE DataEncryption

    TO FILE = N''C:\Certificates\DataEncryption.cer''

    WITH PRIVATE KEY (

    FILE = N''C:\Certificates\DataEncryption.pvk'',

    ENCRYPTION BY PASSWORD = ''pR0!5Ql#''

    );

    Listing 19-9

    Backing Up Encryption Certificates

    ```


    For this example, this certificate has been backed up to the `Certificates` folder
    on the `C` drive.


    Note'
  trans: '

    # 透明数据加密


    另一种数据加密选项是**透明数据加密**。它会对磁盘上的整个数据库进行加密，而不仅仅是一个列或列组。由于数据文件被加密，备份文件也随之加密。当数据读入缓冲池时，SQL
    Server 会对其进行解密，用户无法感知这一过程，因此得名。本节将介绍如何实现透明数据加密。一旦启用，SQL Server 将尝试加密数据。本节还将演示如何暂停加密以及查看数据库加密的当前状态。此外，您将学习如何验证证书备份并备份证书。本节最后将说明如何移除透明数据加密。


    在开始实现透明数据加密之前，请制定证书管理计划。这是实现的关键步骤。**如果没有备份证书，当透明数据加密已启用时，您将无法还原数据库备份。** 设置透明数据加密时，首先需要创建主密钥和证书，如代码清单
    19-2 所示。


    ```

    USE master;

    CREATE MASTER KEY ENCRYPTION BY PASSWORD = ''oUtd@or*R3cre&tion!'';

    CREATE CERTIFICATE DataEncryption

    WITH SUBJECT = ''OutdoorRecreation Certificate'';

    Listing 19-2

    创建主密钥和证书

    ```


    主密钥和证书应在 master 数据库中创建。创建主密钥和证书后，需要创建数据库加密密钥。如代码清单 19-3 所示，请确保在 `OutdoorRecreation`
    数据库中创建密钥。


    ```

    USE OutdoorRecreation;

    GO

    CREATE DATABASE ENCRYPTION KEY

    WITH ALGORITHM = AES_256

    ENCRYPTION BY SERVER CERTIFICATE DataEncryption;

    Listing 19-3

    创建数据库加密密钥

    ```


    加密是使用代码清单 19-2 中的服务器证书创建的。加密密钥的算法可以是 AES 128、AES 192 或 AES 256。如果尚未备份加密密钥，您将收到以下警告信息：


    > 警告

    > 用于加密数据库加密密钥的证书尚未备份。您应立即备份证书及其关联的私钥。如果证书变得不可用，或者您必须在另一台服务器上还原或附加数据库，则必须同时拥有证书和私钥的备份，否则将无法打开数据库。


    现在数据库已准备好启用透明数据加密，如代码清单 19-4 所示。


    ```

    ALTER DATABASE OutdoorRecreation

    SET ENCRYPTION ON;

    Listing 19-4

    启用透明数据加密

    ```


    一旦在数据库上启用透明数据加密，后台加密操作将开始运行。


    > 注意

    > 为任何用户数据库启用透明数据加密，也会在 `tempdb` 上启用透明数据加密。


    如果您想暂停此过程，可以运行代码清单 19-5 中的 T-SQL 代码。


    ```

    ALTER DATABASE OutdoorRecreation

    SET ENCRYPTION SUSPEND;

    Listing 19-5

    暂停后台加密操作

    ```


    了解如何管理数据库的加密状态很有帮助。了解如何监控数据库加密状态可能更有用。代码清单 19-6 中的查询可用于查找有关数据库加密状态的信息。


    ```

    SELECT db.[name] AS DatabaseName,

    encryptor_type,

    encryption_state_desc,

    encryption_scan_state_desc

    FROM sys.dm_database_encryption_keys ky

    INNER JOIN sys.databases db

    ON ky.database_id = db.database_id;

    Listing 19-6

    查找加密状态

    ```


    此查询提供数据库名称、加密类型、加密状态描述和加密扫描描述。当加密进行时，您应得到类似表 19-4 的结果。


    **表 19-4**

    加密状态（已暂停）


    | 数据库名称 | 加密程序类型 | 加密状态描述 | 加密扫描状态描述 |

    | --- | --- | --- | --- |

    | tempdb | ASYMMETRIC KEY | ENCRYPTED | COMPLETE |

    | OutdoorRecreation | CERTIFICATE | ENCRYPTION_IN_PROGRESS | SUSPENDED |


    在 `OutdoorRecreation` 数据库的场景中，加密正在进行中。此查询是在我运行了代码清单 19-5 中的代码之后执行的，因此扫描状态为“已暂停”是预期的。


    要恢复透明数据加密加密，可以执行代码清单 19-7 中的代码。


    ```

    ALTER DATABASE OutdoorRecreation

    SET ENCRYPTION RESUME;

    Listing 19-7

    恢复数据加密扫描

    ```


    这将允许加密过程在 `OutdoorRecreation` 数据库上继续。表 19-5 显示了在恢复加密扫描后，运行代码清单 19-6 的结果。


    **表 19-5**

    加密状态（进行中）


    | 数据库名称 | 加密程序类型 | 加密状态描述 | 加密扫描状态描述 |

    | --- | --- | --- | --- |

    | tempdb | ASYMMETRIC KEY | ENCRYPTED | COMPLETE |

    | OutdoorRecreation | CERTIFICATE | ENCRYPTION_IN_PROGRESS | RUNNING |


    `OutdoorRecreation` 数据库相对较小，因此加密过程不应耗时过长。如果再次执行代码清单 19-6 中的 T-SQL，您将得到表 19-6 中的结果。


    **表 19-6**

    加密状态（已完成）


    | 数据库名称 | 加密程序类型 | 加密状态描述 | 加密扫描状态描述 |

    | --- | --- | --- | --- |

    | tempdb | ASYMMETRIC KEY | ENCRYPTED | COMPLETE |

    | OutdoorRecreation | CERTIFICATE | ENCRYPTED | COMPLETE |


    表 19-6 表明数据库 `OutdoorRecreation` 已被加密。既然数据库已启用透明数据加密，请确保将您的证书备份存放在安全位置。


    > 注意

    > 如果您习惯于使用密码加密证书，请不要对启用透明数据加密的证书这样做。实例重启后，您的数据库将无法访问。


    代码清单 19-8 中的查询显示了如何查找证书最近的备份日期。


    ```

    USE master;

    GO

    SELECT crt.pvt_key_last_backup_date AS LastBackupDate,

    DB_NAME(dky.database_id) AS EncryptedDatabase,

    crt.[name] AS CertificateName

    FROM sys.certificates crt

    INNER JOIN sys.dm_database_encryption_keys dky

    ON crt.thumbprint = dky.encryptor_thumbprint;

    Listing 19-8

    检查证书的最后备份日期

    ```


    执行此查询将返回所有有关联数据库的证书的最后备份日期。此查询的结果如表 19-7 所示。


    **表 19-7**

    证书最后备份日期的查询结果


    | 最后备份日期 | 加密数据库 | 证书名称 |

    | --- | --- | --- |

    | NULL | OutdoorRecreation | DataEncryption |


    此表表明 `OutdoorRecreation` 数据库的 `DataEncryption` 证书尚未备份。要备份证书，您可以执行代码清单 19-9 中的
    T-SQL。


    ```

    BACKUP CERTIFICATE DataEncryption

    TO FILE = N''C:\Certificates\DataEncryption.cer''

    WITH PRIVATE KEY (

    FILE = N''C:\Certificates\DataEncryption.pvk'',

    ENCRYPTION BY PASSWORD = ''pR0!5Ql#''

    );

    Listing 19-9

    备份加密证书

    ```


    在此示例中，此证书已备份到 `C` 盘的 `Certificates` 文件夹。

