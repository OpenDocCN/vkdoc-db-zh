    | Ruth | Johnson | 4711 Ponce de Leon | Memphis | 38110 | United States |

    | Karim | Khalil | 153 Road Mit Rahina Al Shabab | Memphis | 3364932 | Egypt |

    | Marty` | Bethel | 750 Cherry Rd | Memphis | 38117 | United States |

    | Ruth | Johnson | 4711 Ponce de Leon | Memphis | 38110 | United States |


    如你所见，`UNION ALL` 返回了两行完全相同的数据。在某些时候，这些场景中的每一种都可能是可取的。


    有时候，查询逻辑可能足够复杂，以至于我可能无法快速理解所有的 `T-SQL` 代码，或者在其他时候，我正在对非常大的数据集进行故障排除。如果我编写一个更简单的查询来返回我想要的所有数据，我通常会在那两个查询之间写一个
    `INTERSECT` 来查找记录匹配的地方。使用与之前相同的通用查询，我想向你展示使用 `INTERSECT` 与其他选项相比，返回的数据会是什么样子。在代码清单
    5-10 中，你可以看到查找两个查询交集的查询。


    ```sql

    SELECT FirstName, LastName

    FROM dbo.Customer

    WHERE City = ''Memphis''

    INTERSECT

    SELECT FirstName, LastName

    FROM dbo.Customer

    WHERE [Address] LIKE ''%de%'';

    ```

    代码清单 5-10

    两个查询的交集


    你已经从前面的图表中知道了每个单独查询返回的结果。前面 `T-SQL` 代码的实际结果如表 5-30 所示。


    **表 5-30**

    **表 5-26 和 5-27 结果的交集**


