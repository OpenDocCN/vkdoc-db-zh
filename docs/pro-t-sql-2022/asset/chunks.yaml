- fmt: '## Column Definition


    编写 T-SQL 的关键因素之一是明确指出您正在使用或影响哪些列。虽然这与确保只与所需数据交互相关，但要求 T-SQL 代码显式声明列名还有其他好处。在向
    SQL Server 插入数据时，可以不声明所使用的列名或顺序。如果您正在向表中的每一列插入数据，并且插入数据的顺序与表中的列顺序相同，那么不会有任何问题。但是，如果将来从表中添加或删除列，或者更改了列顺序，这可能会导致存储过程或其他
    T-SQL 代码停止工作。因此，一个好的习惯是在所有 T-SQL 语句中显式声明列名。对于这些示例，这特别包括 `SELECT` 和 `INSERT` 语句。


    ## BETWEEN


    在编写 T-SQL 代码时，有时会有多种选择，而且这些选项的性能似乎都差不多。当您试图获取涵盖连续范围的数据子集时，就可能发生这种情况。在这种情况下定义 T-SQL
    编码标准不一定与提高 SQL Server 的性能相关。它更多地与提高 T-SQL 代码的一致性有关。清单 [9-8](#480547_2_En_9_Chapter.xhtml#PC8)
    展示了一个如何使用 `BETWEEN` 编写 T-SQL 的示例。


    ```

    SELECT FirstName, LastName, Country

    FROM dbo.Customer

    WHERE CustomerID BETWEEN 100 AND 20000;

    Listing 9-8

    Query with BETWEEN

    ```


    在可读性方面，您可能会决定所有涵盖包含值的范围都应该使用 `BETWEEN` 来编写。这可能比使用大于等于 (`>=`) 和小于等于 (`<=`) 来获取相同范围更可取。


    ## Stored Procedure Parameters


    虽然提高代码可读性很重要，但在处理性能问题时，提高 T-SQL 的可读性有时可能会使调试代码变得更加困难。这种情况的发生取决于您如何配置存储过程参数。您可以选择单独定义每个参数，也可以创建一个用户定义的表来传递大量变量。如果您选择使用用户定义的表，您的
    T-SQL 代码可能更简洁，但未来调试性能问题可能需要更多时间。此外，您的存储过程的工作方式会有所不同，因为您是在使用表变量，而不是单独处理每个数据字段。


    ## UNION


    有时您会希望合并来自两个不同查询的数据。这种组合涉及将一个数据集附加到另一个数据集。当这两个数据集具有相同数量的列且数据类型相同时，就可以使用 `UNION`
    语句来组合这些数据。使用 `UNION` 的优势在于查询具有可读性，通过阅读 T-SQL 代码可以很容易地看出发生了什么。使用 `UNION` 的挑战在于，`UNION`
    的性能可能比每个单独查询的性能更差。除了 `UNION`，还有 `UNION ALL` 功能。`UNION` 和 `UNION ALL` 之间的主要区别在于数据的返回方式。在
    `UNION` 语句中，返回的是一个不重复的记录集，而在 `UNION ALL` 语句中，每个单独查询的实际记录数都包含在结果集中。在设计编码标准时，您需要决定是否允许使用
    `UNION` 和 `UNION ALL` 语句。您可能还想决定在特定场景下是否允许使用它们。


    ## CAST or CONVERT


    在编写代码时，您可能会发现自己处于希望将数据类型从一种值更改为另一种的情况。在对整数值执行数学函数时，更改数据类型可能很重要。由于 SQL Server 执行数学运算的方式，如果您将一个整数除以另一个整数，得到的答案将是整数。如果您希望
    SQL Server 提供小数作为结果，则需要将数据类型从整数更改为小数。类似地，您可能希望在 SQL Server 查询中显示一串文本。或者，如果您在连接字符串时包含一个整数，当
    SQL Server 尝试执行查询时，您会收到错误。但是，如果您将整数更改为 `varchar` 数据类型，就可以正确解析字符串。


    例如，您可以指定所有代码在可能的情况下都应使用 ANSI SQL 标准。如果实施此策略，开发人员将必须对所有代码使用 `CAST`，除非他们需要格式化日期。然后开发人员才能使用
    `CONVERT`。或者，您可以规定所有日期格式化都必须在应用程序中处理。因此，`CONVERT` 将永远不被允许作为编码标准的一部分。


    ## Cursors


    在数据库领域，游标是一个有争议的话题。在第 [6](#480547_2_En_6_Chapter.xhtml) 章中，我介绍了基于集合的操作，这是 SQL
    Server 表现最好的地方。游标的问题在于它们没有利用这些基于集合的操作。这在处理数据时可能会造成相当大的开销。加剧游标挑战的是，它们的编写方式更类似于应用程序代码的编写方式，而不是
    T-SQL。这可能使得使用游标非常诱人，因为它可能更容易理解如何编写代码以获得所需的结果。与制定 T-SQL 编码标准时的其他因素一样，您可能无法完全排除游标。如果是这样，请尝试创建一些标准，规定您认为游标会有益的情况，并将游标使用仅限于这些情况。


    ## ORDER BY


    通常很希望让 SQL Server 获取应用程序所需的全部数据。虽然 SQL Server 可以做到这一点，但您需要考虑让 SQL Server 完成您所请求的所有工作是否值得付出成本。当您希望数据为应用程序排序时，就可能出现这种情况。SQL
    Server 可以使用 `ORDER BY` 语句对数据进行排序，但让应用程序对这些数据进行排序可能是资源利用的更好方式。如果您决定这是处理数据排序的方式，那么在
    T-SQL 编码标准中包含不应在 SQL Server 中对数据进行排序的建议可能是个好主意。如果您知道在某些特定情况下这是不可避免的，您可以在编码标准中明确规定在哪些场景下允许在
    T-SQL 代码中使用 `ORDER BY`。


    ## Case Statements


    T-SQL 代码可以非常灵活。虽然您可能选择将 T-SQL 代码仅限于应用程序功能，但数据库代码也用于其他目的，例如报告。在许多应用程序中，您可能同时处理事务并允许用户搜索和筛选数据。此类活动可以是报告活动。通常，用户不希望看到数据以与存储方式相同的形式呈现。例如，您可能有一个包含状态类型的表。一个给定的记录可能在一段时间内有几种状态。但是，用户可能希望看到一行中包含该特定记录的所有状态。这就是您需要使用
    `CASE` 语句的地方，以便可以将多行转换为多个列。执行此类活动并非纯粹是 T-SQL 的事务性使用，您可能希望将此类行为作为编码标准的一部分加以限制。'
  raw: '#### Column Definition


    One of the key factors of writing T-SQL is specifying what columns you are using
    or affecting. While this is related to making sure you only interact with the
    data you need, there are other benefits to requiring your T-SQL code to explicitly
    state column names. When inserting data into SQL Server, it is possible to not
    state the column names or order you are using for the insert. If you are inserting
    data into every column in the table and you are inserting the data in the same
    order as the columns in the table, you will not have any issues. However, this
    can cause stored procedures or other T-SQL code to stop functioning if columns
    are added or removed from the table or if the column order is changed in the future.
    Therefore, a good habit is to explicitly state your column names on all T-SQL.
    For these examples, this specifically includes selects and inserts.


    #### BETWEEN


    There are also situations when you have multiple choices on how to write T-SQL
    code, and all those options seem to perform about the same. This can happen when
    you are trying to get a subset of data that covers a continuous range. Defining
    a T-SQL coding standard in this situation does not necessarily correlate to improving
    the performance of SQL Server. This is more closely related to improving the consistency
    of the T-SQL code. An example of how to write T-SQL using BETWEEN is shown in
    Listing [9-8](#480547_2_En_9_Chapter.xhtml#PC8).


    ```

    SELECT FirstName, LastName, Country

    FROM dbo.Customer

    WHERE CustomerID BETWEEN 100 AND 20000;

    Listing 9-8

    Query with BETWEEN

    ```


    In terms of readability, you may decide that all ranges that cover inclusive values
    should be written using BETWEEN. This may be preferable to using greater than
    or equal to and less than or equal to get the same range.


    #### Stored Procedure Parameters


    While improving code readability is important, there are times that improving
    readability of T-SQL may make debugging the code harder when it comes to performance
    issues. This type of situation can happen depending on how you configured your
    stored procedure parameters. You can either define each parameter individually
    or you can create a user-defined table that you can use to pass in a multitude
    of variables. If you choose to use a user-defined table, your T-SQL code may be
    cleaner, but it may take more time to debug performance issues going forward.
    In addition, your stored procedure will work differently because you are working
    with a table variable instead of handling each data field individually.


    #### UNION


    You will have times where you want to combine data from two different queries.
    This type of combination involves appending one data set to another. When these
    two data sets share the same number of columns with the same data types, there
    is the possibility to use a UNION statement to combine this data. The advantage
    of using a UNION is that the queries are readable and you can easily tell by reading
    the T-SQL code what is happening. The challenge with using UNION is that the performance
    of a UNION may be worse than the performance of each query independently. In addition
    to UNION, there is also the UNION ALL functionality. The main difference between
    a UNION and a UNION ALL is how the data is returned. In a UNION statement, a distinct
    set of records is returned, whereas in a UNION ALL statement, the actual number
    of records from each separate query is included in the result set. When designing
    your coding standards, you want to decide if UNION and UNION ALL statements are
    allowed. You may also want to decide if there are specific scenarios where they
    would or would not be allowed.


    #### CAST or CONVERT


    When writing code, you may find yourself in a situation where you want to change
    the data type from one value to another. Changing data types can be important
    with performing mathematical functions on integer values. Due to how SQL Server
    performs mathematical operations, if you divided one integer by another integer,
    you get an integer as the answer. If you want SQL Server to provide a decimal
    as a result, you need to change the data type from an integer to a decimal. Similarly,
    you may want to display a string of text as part of a SQL Server query. Alternatively,
    if you include an integer when concatenating with a string, you get an error when
    SQL Server tries to execute the query. However, if you change the integer to a
    varchar data type, you can parse the string correctly.


    For instance, you may specify that all code should use ANSI SQL standards when
    possible. If you implemented this policy, the developers would have to use CAST
    for all code unless they need to format a date. Then the developer would be able
    to use CONVERT. Or you may indicate that all date formatting must be handled in
    the application. Therefore, CONVERT would never be allowed as part of the coding
    standard.


    #### Cursors


    Cursors are a source of controversy when it comes to databases. In Chapter [6](#480547_2_En_6_Chapter.xhtml),
    I went over set-based operations, which is where SQL Server performs best. The
    issue with cursors is that they do not take advantage of these set-based operations.
    This can cause considerable overhead when it comes to handling data. To compound
    the challenges with cursors, they are written in a way that is more akin to how
    application code is written than T-SQL. This can make it very tempting to use
    cursors as it may be easier to understand how to write the code to get the desired
    results. Like other factors when developing your T-SQL coding standards, you may
    not be able to rule out cursors entirely. If so, try to create some criteria where
    you believe cursors would be beneficial and limit cursor usage to only those situations.


    #### ORDER BY


    It is often tempting to want SQL Server to get all of the data exactly how your
    application needs the data. While SQL Server can do this, you want to consider
    if it is worth the cost to SQL Server to do all the work you are requesting. Such
    can be the situation when you want data to be sorted for your application. SQL
    Server can sort the data using the ORDER BY statement, but it may be a better
    use of resources to have the application sort this data. If you decide this is
    how you want to handle sorting data, it may be a good idea to include in your
    T-SQL coding standards that data should not be sorted in SQL Server. If you know
    there are specific situations where this will be unavoidable, you can state in
    your coding standards the exact scenarios where using an ORDER BY is allowed in
    your T-SQL code.


    #### Case Statements


    T-SQL code can be versatile. While you may choose to keep your T-SQL code limited
    to application functionality, database code is also used for other purposes such
    as reporting. In many applications, you may be both processing transactions and
    allowing your users to search and filter data. This type of activity can be a
    reporting activity. Oftentimes, users do not want to see data in the same manner
    the data is stored. For instance, you may have a table that includes a status
    type. A given record may have several statuses over time. However, a user may
    want to see one line with all of the statuses for that specific record. This is
    where you would want to use a case statement so that you could convert multiple
    rows into various columns. Performing this type of activity is not a purely transactional
    use of T-SQL, and you may want to limit this type of behavior as part of your
    coding standards.'
