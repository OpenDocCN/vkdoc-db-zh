    when something has changed. Depending on your business case, you may need to know
    not only when something changed but also what changed. There are also a couple
    options on how you can track these changes. You have the option to either use
    SQL Server to track these changes for you or you can create database objects that
    will log this information for you.


    One of the things to consider when implementing any sort of logging is the performance
    overhead. This can be even more critical when tracking data modifications. You
    want to make sure that you choose a logging method that allows you to both track
    the necessary changes and have the expected performance impact. As you may expect,
    the more detailed logging you implement, the greater the performance overhead.


    Out of all the options discussed in this chapter, Change Tracking has the least
    amount of overhead. If you want to record more detailed information and you are
    willing to increase resource utilization, you may want to consider Change Data
    Capture. Another possible implementation of tracking change involves using database
    triggers. While the use of database triggers allows you to finely tune what is
    logged and how it is logged, it can come at the cost of even higher resource utilization.


    An intermediate option may be using SQL Server Audit depending on the type of
    data you want to log. SQL Server Audit can be used to track server or database-level
    activity. In the context of logging changes related to applications, you want
    to focus on database audits. The database audit actions within SQL Server Audit
    can track changes related to all types of data activity including accessing or
    modifying data. SQL Server uses extended events to monitor the audit activity.
    The data that can be retrieved includes the time the action happened, information
    about the user that triggered the audit, and the object affected. It may also
    be possible to record the statement issued when the audit action took place.


    Another minimal logging activity available with regard to data modifications involves
    logging the most recent time a record was changed and incrementing the number
    of changes that have occurred for that data record. This type of tracking is handled
    by Change Tracking within SQL Server, a built-in feature that will automatically
    record changes to data within tables and report those changes in custom table
    objects. To use Change Tracking, you will first need to enable it on the database.
    Throughout this book, we have been using the `Menu` database. You need to run
    the T-SQL code shown in Listing [14-1](#480547_2_En_14_Chapter.xhtml#PC1) to enable
    Change Tracking on the `Menu` database.


    ```

    ALTER DATABASE OutdoorRecreation

    SET CHANGE_TRACKING = ON

    (CHANGE_RETENTION = 2 DAYS, AUTO_CLEANUP = ON);

    Listing 14-1

    Enabling Change Tracking on the OutdoorRecreation Database

    ```


    To enable Change Tracking on the `Menu` database, you need to specify the database
    name and indicate that you want to turn Change Tracking on. The last line in the
    preceding T-SQL code is optional. These values indicate how long you want to retain
    changes and if the retention history should be cleaned up automatically.'
  trans: '# 14. 日志记录


    在你与 SQL Server 打交道期间，会收到来自公司的各种各样的需求。其中一些需求可能涉及更改业务逻辑或添加新功能。有时候，公司可能还想追踪过去发生的事情。有多种第三方工具有助于跟踪性能及与数据库维护相关的其他功能。然而，你的业务团队可能更关注于跟踪数据变更或了解问题出在哪里。


    这种与数据修改或错误处理相关的日志记录可以通过 T-SQL 来实现。在记录这些类型的更改时，你有多种选项可供选择。这些选项包括从最简略的活动日志到记录最细粒度的活动日志。你还需要考虑这些信息将来将如何被访问和使用。这将帮助你以一种对未来组织有益的方式记录信息。这也可以防止你记录下最终从未被使用的数据。


    ## 数据修改


    本节提供如何跟踪数据库内数据变更的示例。本节涵盖了设置变更跟踪以及使用变更跟踪时可以收集的信息类型。还有一部分内容关于启用变更跟踪以及访问从变更跟踪生成的数据。


    选择跟踪数据修改的方法需要了解你的组织需要跟踪哪些类型的信息。你可能只想在数据发生变更时记录信息。根据你的业务场景，你可能不仅需要知道数据何时变更，还需要知道具体什么发生了变化。关于如何跟踪这些变更也有几个选项。你可以选择让
    SQL Server 为你跟踪这些变更，也可以创建数据库对象来为你记录这些信息。


    在实施任何类型的日志记录时，需要考虑的事情之一是性能开销。在跟踪数据修改时，这一点可能更为关键。你需要确保选择的日志记录方法既能跟踪必要的变更，又具有可预期的性能影响。正如你可能预料到的，你实施的日志记录越详细，性能开销就越大。


    在本章讨论的所有选项中，**变更跟踪**的开销最小。如果你希望记录更详细的信息并且愿意增加资源消耗，你可能需要考虑**变更数据捕获**。另一种跟踪变更的实现方式涉及使用数据库触发器。虽然使用数据库触发器可以让你精细地调整记录内容和记录方式，但这可能会以更高的资源消耗为代价。


    根据你想记录的数据类型，一个中间选项可能是使用 **SQL Server 审核**。SQL Server 审核可用于跟踪服务器或数据库级别的活动。在记录与应用程序相关的变更的上下文中，你应该专注于数据库审核。SQL
    Server 审核中的数据库审核操作可以跟踪与所有类型数据活动相关的更改，包括访问或修改数据。SQL Server 使用扩展事件来监控审核活动。可检索的数据包括操作发生的时间、触发审核的用户信息以及受影响的对象。也可能记录审核操作发生时所执行的语句。


    关于数据修改，另一个可用的最简略日志记录活动涉及记录记录最后一次更改的时间，并递增该数据记录发生的更改次数。这种类型的跟踪由 SQL Server 内置的**变更跟踪**功能处理，该功能将自动记录表中数据的更改，并在自定义表对象中报告这些更改。要使用变更跟踪，你首先需要在数据库上启用它。在本书中，我们一直使用
    `Menu` 数据库。你需要运行清单 14-1 所示的 T-SQL 代码来在 `Menu` 数据库上启用变更跟踪。


    ```

    ALTER DATABASE OutdoorRecreation

    SET CHANGE_TRACKING = ON

    (CHANGE_RETENTION = 2 DAYS, AUTO_CLEANUP = ON);

    ```

    清单 14-1

    在 OutdoorRecreation 数据库上启用变更跟踪


    要在 `Menu` 数据库上启用变更跟踪，你需要指定数据库名称并表明你希望开启变更跟踪。前面 T-SQL 代码中的最后一行是可选的。这些值表示你希望保留更改记录的时间，以及是否应自动清理保留的历史记录。'
- fmt: 'Once you have enabled Change Tracking in the `Menu` data, you can configure
    tables to use Change Tracking. The table where you will implement Change Tracking
    must have a primary key. If this table does not have a primary key, you must add
    one before you can enable Change Tracking on this table. In this case, you will
    be enabling Change Tracking on the `dbo.CustomerOrder` table; refer to Listing
    14-2.


    ```sql

    ALTER TABLE dbo.CustomerOrder

    ENABLE CHANGE_TRACKING

    WITH (TRACK_COLUMNS_UPDATED = ON);

    ```


    **Listing 14-2**

    Enabling Change Tracking on the `dbo.CustomerOrder` Table


    Change Tracking is now enabled on the `dbo.CustomerOrder` table. Change Tracking
    can either record that an entire data row has changed or specify that specific
    columns have changed. When you track column changes, SQL Server will record that
    a change happened and the specific column or columns that have changed. If you
    do not specify a value for `TRACK_COLUMNS_UPDATED`, SQL Server will use the default
    value of off and will only tell you that a row has been added to, removed from,
    or modified within the table without further detail.


    After setting up Change Tracking, you may want to determine what kind of information
    is available or has changed. While the changes in the table `dbo.CustomerOrder`
    are tracked by SQL Server, this information is not available from a table that
    you can find in Object Explorer. Instead, you need to access the `CHANGETABLE`
    associated with the table `dbo.CustomerOrder`. Once Change Tracking has been enabled,
    records are initialized and can be found in the `CHANGETABLE`. The query in Listing
    14-3 shows how you would find these initialized records.


    ```sql

    SELECT ord.CustomerOrderID,

    ord.OrderNumber,

    ord.OrderDate,

    chng.CustomerOrderID,

    chng.SYS_CHANGE_VERSION,

    chng.SYS_CHANGE_CONTEXT

    FROM dbo.CustomerOrder AS ord

    CROSS APPLY CHANGETABLE

    (VERSION CustomerOrder,

    (CustomerOrderID), (ord.CustomerOrderID)) AS chng;

    ```


    **Listing 14-3**

    Querying Initialized Records


    This query returns information from the `dbo.CustomerOrder` table and information
    from the `CHANGETABLE`. Table 14-1 shows an example of the initialized records.


    **Table 14-1**

    Initialized Records


    | CustomerOrderID | SYS_CHANGE_VERSION | SYS_CHANGE_CONTEXT |

    | --- | --- | --- |

    | 1 | NULL | NULL |

    | 2 | NULL | NULL |

    | 3 | NULL | NULL |

    | 4 | NULL | NULL |


    The records in Table 14-1 are from the `CHANGETABLE`. There is a column for the
    `CustomerOrderID`, the primary key on the table, and columns to track information
    about the changes. Since none of the data records have been modified, the values
    are all NULL.


    You can modify the records in the table `dbo.CustomerOrder`. In Listing 14-4,
    you update the `DateModified`.


    ```sql

    UPDATE dbo.CustomerOrder

    SET ShipDate = SYSDATETIME()

    WHERE CustomerOrderID = 3;

    ```


    **Listing 14-4**

    Updating `DateModified`


    Now that a record has been modified, you can get a better idea of how information
    is being stored when it comes to Change Tracking. If you run the query from Listing
    14-3 again, you will get the results shown in Table 14-2.


    **Table 14-2**

    Records After Changing `ShipDate`


    | CustomerOrderID | SYS_CHANGE_VERSION | SYS_CHANGE_CONTEXT |

    | --- | --- | --- |

    | 1 | NULL | NULL |

    | 2 | NULL | NULL |

    | 3 | 1 | NULL |

    | 4 | NULL | NULL |


    The table shows that the `SYS_CHANGE_VERSION` has changed from the initialized
    value of NULL to 1. This shows that `CustomerOrderID` 3 has been modified since
    the change tracking was originally initialized.


    If you want to find more information about what columns were changed, Listing
    14-5 shows the query needed to find information about changes to `dbo.CustomerOrder`
    that occurred since the last automatic cleanup.


    ```sql

    SELECT CustomerOrderID,

    SYS_CHANGE_OPERATION AS ChangeOperation,

    CHANGE_TRACKING_IS_COLUMN_IN_MASK

    (COLUMNPROPERTY

    (OBJECT_ID(''CustomerOrder''), ''OrderNumer'', ''ColumnId''),

    SYS_CHANGE_COLUMNS) AS OrderNumberChange,

    CHANGE_TRACKING_IS_COLUMN_IN_MASK

    (COLUMNPROPERTY

    (OBJECT_ID(''CustomerOrder''), ''OrderDate'', ''ColumnId''),

    SYS_CHANGE_COLUMNS) AS OrderDateChange,

    CHANGE_TRACKING_IS_COLUMN_IN_MASK

    (COLUMNPROPERTY

    (OBJECT_ID(''CustomerOrder''), ''ShipDate'', ''ColumnId''),

    SYS_CHANGE_COLUMNS) AS ShipDateChange,

    CHANGE_TRACKING_IS_COLUMN_IN_MASK

    (COLUMNPROPERTY

    (OBJECT_ID(''CustomerOrder''), ''DateCreated'', ''ColumnId''),

    SYS_CHANGE_COLUMNS) AS CreatedChange,

    CHANGE_TRACKING_IS_COLUMN_IN_MASK

    (COLUMNPROPERTY

    (OBJECT_ID(''CustomerOrder''), ''DateModified'', ''ColumnId''),

    SYS_CHANGE_COLUMNS) AS ModifiedChange,

    CHANGE_TRACKING_IS_COLUMN_IN_MASK

    (COLUMNPROPERTY

    (OBJECT_ID(''CustomerOrder''), ''DateDisabled'', ''ColumnId''),

    SYS_CHANGE_COLUMNS) AS DisabledChange,

    SYS_CHANGE_CONTEXT

    FROM CHANGETABLE

    (CHANGES dbo.CustomerOrder,0) as ChngTbl

    ORDER BY SYS_CHANGE_VERSION;

    ```


    **Listing 14-5**

    Finding Changed Records


    This version information is needed to find the state of the changes on this table.
    The query in Listing 14-5 shows you one way that you can use to access this information.
    Table 14-3 shows the results for the query in Listing 14-5.


    **Table 14-3**

    Change Tracking Result Set


    | CustomerOrderID | ChangeOperation | OrderNumberChange | OrderDateChange | ShipDateChange
    | CreatedChange | ModifiedChange |

    | --- | --- | --- | --- | --- | --- | --- |

    | 3 | U | False | False | True | False | False |


    These results are recorded from the update issued in Listing 14-4.


    The `CustomerOrderID` affected is listed in the first column of Table 14-3. This
    matches the same `CustomerOrderID` updated in Listing 14-4. The `ChangeOperation`
    is listed as a U for update. This also matches the DML action in Listing 14-4.
    The final five columns in Table 14-3 are populated using specific functions to
    unmask the columns indicated in the Change Tracking tables. The function involved
    returns a true value if the column was modified and a false value if the data
    was not modified. In the case of Listing 14-4, the only column updated was the
    `DateModified`. This matches the result in Table 14-3. The columns `OrderNumberChange`,
    `OrderDateChange`, `CreatedChange`, and `DisabledChange` are all false. These
    values were not changed. However, the column `ModifiedChange` is true. This indicates
    that the column referenced, `DateModified`, was changed.


    There are some potential issues regarding consistency when using Change Tracking.
    Storing the data does not affect the consistency of the data. The consistency
    of the data is affected as part of the data retrieval. You can do everything possible
    to make sure you are accessing the most recent data in the Change Tracking table.
    This includes checking for the last synchronized version in Change Tracking and
    confirming that this version is still available. However, if the version in Change
    Tracking is older than the retention period, this data may be cleaned up before
    the data can be retrieved. With Change Tracking, you may also have occasions where
    a data modification occurs after the last synchronization. This can cause additional
    versions or modified records to be returned. Any of these scenarios can affect
    the consistency of the data returned with Change Tracking. The best practice to
    minimize issues with consistency is to use the snapshot isolation level.'
