    然而，对于 `UNION ALL`，无论多个查询中是否存在重复值，两个查询中返回的每条记录都将被返回。如果你运行相同的查询但使用 `UNION ALL`，`T-SQL`
    代码如代码清单 5-9 所示。


    ```sql

