    | 美国 | 1 |


    ## 测试行级安全策略


    一旦此安全策略就位，所有其他用户将只能看到印度的客户信息。要为所有其他用户测试新的安全策略，请创建一个用户并重新运行相同的查询，如清单 18-14 所示。


    ```sql

    CREATE USER TestRowLevel WITHOUT LOGIN;

    GRANT SELECT ON SCHEMA::dbo TO TestRowLevel;

    -- impersonate for testing:

    EXECUTE AS USER = ''TestRowLevel'';

    SELECT Country, COUNT(*) AS CustomerCount

    FROM dbo.Customer

    GROUP BY Country;

    REVERT;

    -- 清单 18-14

    -- 为测试用户查看当前按国家/地区分布的客户数量

    ```


    新用户 `TestRowLevel` 已创建，但未关联登录账户。授予该用户的唯一权限是能够在 `dbo` 架构中的对象上选择数据。然后，`T-SQL` 代码执行与清单
    18-11 中相同的查询。该查询的结果如表 18-7 所示。


    **表 18-7**

    **当前用户按国家/地区统计的客户数量**


    | 国家/地区 | 客户数量 |

    | --- | --- |

    | 印度 | 200702 |


    返回的唯一结果是针对印度客户的。这证实了安全策略正在按预期工作。检查清单 18-13 的执行计划，你看到了一个如何在安全策略中使用 `FILTER PREDICATE`
    来防止用户更新数据的例子。然而，你可能希望阻止某些用户更新数据库中的数据，即使他们可以访问这些数据。这时就需要使用 `BLOCK PREDICATE`。


    > **注意**

    > 除非修改现有的安全策略，否则无法向已具有谓词的表添加谓词。或者，在创建安全策略时，可以在同一表上拥有多个谓词，包括一个过滤器和一个阻止器。


    清单 18-15 展示了一个 `BLOCK PREDICATE`，它将阻止除 `dbo` 外的任何用户更新非印度的任何客户数据。


    ```sql

    CREATE SECURITY POLICY CountryBlock

    ADD BLOCK PREDICATE dbo.TVF_SecuritySalesIndia(Country)

    ON dbo.Customer

    WITH (STATE=ON);

    -- 清单 18-15

    -- 为行级安全创建阻止安全策略

    ```


    该安全策略将允许任何非 `dbo` 用户查看 `dbo.Customer` 表中的所有数据。然而，这些相同的用户将无法修改任何国家不是印度的数据。清单 18-16
    展示了此阻止谓词如何工作的示例。


    ```sql

    GRANT SELECT ON SCHEMA::dbo TO TestRowLevel;

    GRANT UPDATE ON SCHEMA::dbo TO TestRowLevel;

    -- impersonate for testing:

    EXECUTE AS USER = ''TestRowLevel'';

    UPDATE Customer

    SET DateDisabled = GETDATE();

    REVERT;

    -- 清单 18-16

    -- 为测试用户更新数据

    ```


    此查询试图为用户 `TestRowLevel` 的所有记录更新 `DateDisabled`。该用户已被授予更新记录的权限。但是，由于存在阻止谓词，当尝试更新所有记录时，用户将收到如图
    18-15 所示的错误。


    ![](img/480547_2_En_18_Fig15_HTML.jpg)


    一段文本呈现了一个错误消息。消息的第二行写着，尝试的操作失败，因为目标对象 outdoor recreation dot d b o dot customer
    具有一个与此操作冲突的阻止谓词。


    **图 18-15**

    **带有阻止谓词的错误消息**


    该消息表明，由于阻止谓词安全策略，此用户无法修改表 `dbo.Customer` 上的数据。


    ## 管理安全策略


    如果你想暂时禁用清单 18-13 中创建的安全策略，可以执行清单 18-17 中的 `T-SQL` 代码。


    ```sql

    ALTER SECURITY POLICY CountryFilter

    WITH (STATE=OFF);

    -- 清单 18-17

    -- 禁用安全策略

    ```


    此代码会禁用安全策略。指出安全策略可以被禁用，意味着可能需要采取额外措施来确认没有人篡改过安全策略。


    > **提示**

    > 如果安全策略被禁用，行级安全将无法按预期阻止用户查看或更新数据。


    如前所述，每个表只能有一个策略。但是，该策略可以为同一个表包含一个过滤器谓词和一个阻止谓词。不支持每个表有多个修改数据的谓词。这些谓词也可以使用不同的表值函数。如果用户受到
    `FILTER PREDICATE` 的影响，即使他们被限制了可以 `SELECT`、`UPDATE` 或 `DELETE` 的数据，他们也能够插入任何数据。类似地，如果用户有
    `BLOCK PREDICATE` 但没有过滤器谓词，即使他们不能修改数据，他们也能看到所有数据。但是，这些用户被阻止对数据进行任何更改，包括插入、更新和删除。虽然你在表值函数中看到
    `RETURN` 的值为 1，但任何非 `NULL` 值都会对行级安全产生相同的结果。当没有匹配时，函数返回 `NULL` 并实施安全策略。


    使用表值函数时，始终要谨慎。例如，应避免在表值函数内进行多表连接。还需要确保函数内的查询不会因转换或计算问题而返回 `NULL`。还值得注意的是，执行计划不会包含表值函数的操作符。相反，你将在其中一个操作符上看到列出的谓词，如图
    18-16 所示。


    ![](img/480547_2_En_18_Fig16_HTML.jpg)


    一个聚集索引扫描的截图。它描绘了一个包含 22 个属性的列表。列表底部在标题“谓词”、“对象”和“输出列表”下有代码。


    **图 18-16**

    **执行计划中的谓词**


    本节介绍了行级安全的目的以及如何实现此类安全的示例。该示例还展示了当为行级安全设置了过滤器谓词时，结果有何不同。另外还给出了一个如何根据需要禁用行级安全的示例。

    '
- fmt: '## Ledger


    正如前文所述，有时你需要监控用户修改数据库数据的行为。SQL Server 2022 引入了一种通过 ledger 表来确认数据库中存储数据完整性的方法。这些
    ledger 表通过对每笔交易进行哈希处理，并使用该交易的哈希值来哈希下一笔交易，从而创建一个区块链。这种对每笔交易进行哈希处理的方法会为后续的每笔交易重复进行。本节将讨论可用的
    ledger 表类型。你将看到如何设置这两种 ledger 表的示例，以及将现有表迁移到 ledger 表的过程。本节最后将介绍如何验证 ledger 表是否被篡改。


    第一种 ledger 表是只可追加 ledger 表。该表的功能正如其名；它只允许向表中插入数据，无法更新或删除数据。如果你需要记录用户交互（如访问应用程序、表格或门禁读卡器），这会非常有用。清单
    [18-18](#480547_2_En_18_Chapter.xhtml#PC18) 中的 T-SQL 代码创建了一个只可追加 ledger 表，用于记录用户访问应用程序的时间。


    ```

    CREATE TABLE dbo.SystemAccess

    (

    SystemAccessID      BIGINT     IDENTITY(1,1)      NOT NULL,

    UserID              INT                           NOT NULL,

    IsActive            BIT

    CONSTRAINT DF_SystemAccess_IsActive         DEFAULT 1

    NOT NULL,

    DateCreated         DATETIME2(2)

    CONSTRAINT DF_SystemAccess_DateCreated DEFAULT

    SYSDATETIME()

    NOT NULL

    )

    WITH (LEDGER = ON (APPEND_ONLY = ON));

    Listing 18-18

    创建一个只可追加 Ledger 表

    ```


    创建此表为只可追加 ledger 表的部分是 `CREATE TABLE` 语句的最后一行。最后一行使用 `LEDGER = ON` 启用了 ledger
    功能。表创建中的只可追加部分由 `APPEND_ONLY = ON` 指定。


    现在你已经创建了一个只可追加 ledger 表，可以插入一些数据来查看 ledger 表功能是如何工作的。清单 [18-19](#480547_2_En_18_Chapter.xhtml#PC19)
    中的 T-SQL 模拟了用户尝试登录应用程序时会发生的情况。


    ```

    INSERT INTO dbo.SystemAccess (UserID)

    VALUES (1001);

    Listing 18-19

    向只可追加 Ledger 表添加数据

    ```


    该查询将一个 `UserID` 插入到 `dbo.SystemAccess` 表中。既然已经插入了一条记录，你就可以查询数据是如何记录在 `dbo.SystemAccess`
    表中的。请注意，由于 `table dbo.SystemAccess` 是一个只可追加 ledger 表，表中会有两个额外的可用列。列 `ledger_start_transaction_id`
    和 `ledger_start_sequence_number` 会为只可追加 ledger 表自动生成。清单 [18-20](#480547_2_En_18_Chapter.xhtml#PC20)
    中的查询查看了 `dbo.SystemAccess` 表中的数据。


    ```

    SELECT SystemAccessID,

    UserID,

    ledger_start_transaction_id,

    ledger_start_sequence_number

    FROM dbo.SystemAccess;

    Listing 18-20

    查看只可追加 Ledger 表中的数据

    ```


    `ledger_start_transaction_id` 列是系统生成的，包含插入记录的事务 ID。`ledger_start_sequence_number`
    是事务内的序列号。Ledger 信息如表 [18-8](#480547_2_En_18_Chapter.xhtml#Tab8) 所示。


    表 18-8


    查看系统访问记录


    | System Access ID | User ID | Ledger Start Transaction ID | Ledger Start Sequence
    Number |

    | --- | --- | --- | --- |

    | 1 | 1001 | 120017 | 0 |


    插入操作的事务 ID 为 120017。插入操作的序列号为 0。


    既然你已经向 `dbo.SystemAccess` 插入了一条数据记录，让我们看看尝试更新 `dbo.SystemAccess` 中的记录时会发生什么。清单
    [18-21](#480547_2_En_18_Chapter.xhtml#PC21) 显示了更新 `dbo.SystemAccess` 表上 `DateCreated`
    的 T-SQL 代码。


    ```

    UPDATE dbo.SystemAccess

    SET DateCreated = GETDATE()

    WHERE SystemAccessID = 1;

    Listing 18-21

    尝试更新只可追加 Ledger 表

    ```


    当你尝试更新记录时，会得到图 [18-17](#480547_2_En_18_Chapter.xhtml#Fig17) 中的错误消息。


    ![](images/480547_2_En_18_Chapter/480547_2_En_18_Fig17_HTML.jpg)


    一条文本显示错误消息。文本内容为：消息 37359，级别 16，状态 1，第 173 行，不允许对只可追加 ledger 表 d b o dot system
    access 进行更新。


    图 18-17


    尝试更新只可追加 ledger 表时的错误消息


    正如预期的那样，任何用户都无法更新 `dbo.SystemAccess` 表，包括 `dbo` 和 `sysadmin` 角色成员。当尝试执行清单 [18-9](#480547_2_En_18_Chapter.xhtml#PC9)
    中的更新操作时，你会得到错误 *“Updates are not allowed for the append only Ledger table ‘dbo.SystemAccess.’”*。现在我已经讨论了只可追加
    ledger 表的用途，接下来我将介绍如何设置可更新 ledger 表。


    可更新 ledger 表允许你跟踪数据插入的时间，这与只可追加 ledger 表类似。只可追加和可更新 ledger 表都是系统版本控制表。由于可更新 ledger
    表使用系统版本控制，任何修改记录的先前版本都存储在历史表中。此外，可更新 ledger 表会记录数据在表中更新或删除的时间。更新操作被记录为删除现有数据的删除操作，以及为列中新值进行的插入操作。创建可更新表的
    T-SQL 代码在清单 [18-22](#480547_2_En_18_Chapter.xhtml#PC22) 中。


    ```

    CREATE TABLE dbo.ApplicationRule(

    ApplicationRuleID                                 INT          NOT NULL,

    ApplicationRuleDescription                        VARCHAR(50)  NOT NULL,

    IsActive BIT

    CONSTRAINT DF_ApplicationRule_IsActive      DEFAULT (1)  NOT NULL,

    DateCreated [datetime]

    CONSTRAINT DF_ApplicationRule_DateCreated   DEFAULT (GETDATE())

    NOT NULL,

    DateModified [datetime]

    CONSTRAINT DF_ApplicationRule_DateModified  DEFAULT (GETDATE())

    NULL,

    CONSTRAINT PK_ApplicationRule_ApplicationRuleID

    PRIMARY KEY CLUSTERED (ApplicationRuleID ASC)

    )

    WITH

    (

    SYSTEM_VERSIONING = ON (HISTORY_TABLE =

    dbo.ApplicationRuleHistory),

    LEDGER = ON

    );

    Listing 18-22

    创建一个可更新 Ledger 表

    ```


    在清单 [18-4](#480547_2_En_18_Chapter.xhtml#PC4) 中，你指定了一个历史表及其名称。如果你没有指定名称，SQL Server
    仍然会创建一个历史表。该表是创建可更新 ledger 表时隐式创建的。创建可更新 ledger 表的代码与清单 [18-18](#480547_2_En_18_Chapter.xhtml#PC18)
    中的 T-SQL 类似。查询的最后几行是创建可更新 ledger 表所需的 T-SQL 代码。相同的命令 `LEDGER = ON` 启用了仅 ledger
    功能。`The SYSTEM_VERSIONING = (HISTORY_TABLE = dbo.ApplicatinRuleHistory)` 创建了将用于记录
    ledger 历史的表。清单 [18-23](#480547_2_En_18_Chapter.xhtml#PC23) 包含查找创建可更新 ledger 表时所创建对象的
    T-SQL 代码。


    ```

    SELECT

    ts.[name] + ''.'' + t.[name] AS ledger_table_name,

    hs.[name] + ''.'' + h.[name] AS history_table_name,

    vs.[name] + ''.'' + v.[name] AS ledger_view_name

    FROM sys.tables AS t

    INNER JOIN sys.tables AS h

    ON h.[object_id] = t.history_table_id

    INNER JOIN sys.views v

    ON v.[object_id] = t.ledger_view_id

    INNER JOIN sys.schemas ts

    ON ts.[schema_id] = t.[schema_id]

    INNER JOIN sys.schemas hs

    ON hs.[schema_id] = h.[schema_id]

    INNER JOIN sys.schemas vs

    ON vs.[schema_id] = v.[schema_id]

    WHERE t.[name] = ''ApplicationRule'';

    Listing 18-23

    查看可更新 Ledger 对象

    ```'
  raw: '## Ledger


    As mentioned, there are times when you want to monitor user behavior as it pertains
    to modifying data in the database. SQL Server 2022 introduces a way to confirm
    the integrity of the data stored in the database through ledger tables. These
    ledger table create a blockchain by hashing each transaction and using the hash
    for that transaction to has the next transaction. This method of hashing each
    transaction repeats for each successive transaction. This section will discuss
    the types of ledger tables available. You’ll see examples of how you can set up
    either of these ledger tables, as well as the process to migrate an existing table
    to a ledger table. This section will finish with how you can verify if there has
    been tampering with the ledger tables.


    The first type of ledger table is the append-only ledger table. This table functions
    in the same manner as its name; it only allow inserts to the table. It is not
    possible to update or delete data. This can be very helpful if you need a way
    to log user interactions like accessing an application, table, or badge readers.
    The T-SQL code in Listing [18-18](#480547_2_En_18_Chapter.xhtml#PC18) creates
    an append-only ledger table to record when a user accesses applications.


    ```

    CREATE TABLE dbo.SystemAccess

    (

    SystemAccessID      BIGINT     IDENTITY(1,1)      NOT NULL,

    UserID              INT                           NOT NULL,

    IsActive            BIT

    CONSTRAINT DF_SystemAccess_IsActive         DEFAULT 1

    NOT NULL,

    DateCreated         DATETIME2(2)

    CONSTRAINT DF_SystemAccess_DateCreated DEFAULT

    SYSDATETIME()

    NOT NULL

    )

    WITH (LEDGER = ON (APPEND_ONLY = ON));

    Listing 18-18

    Creating an Append-Only Ledger Table

    ```


    The portion of the code that creates this table as an append-only ledger table
    is the last line of the `CREATE TABLE` statement. The last line enabled the ledger
    functionality with `LEDGER = ON`. The append-only portion of the table creation
    is specified in `APPEND_ONLY = ON`.


    Now that you have created an append-only ledger table, you can insert some data
    to see how the ledger table functionality works. The T-SQL in Listing [18-19](#480547_2_En_18_Chapter.xhtml#PC19)
    simulates what would happen when a user attempts to log in to an application.


    ```

    INSERT INTO dbo.SystemAccess (UserID)

    VALUES (1001);

    Listing 18-19

    Adding Data to Append-Only Ledger Table

    ```


    The query inserts a UserID into the `dbo.SystemAccess` table. Now that you have
    inserted a record, you can query how data is recorded in the `dbo.SystemAccess`
    table. Note that since the `table dbo.SystemAccess` is an append-only ledger table,
    there are two additional columns available in the table. The columns `ledger_start_transaction_id`
    and `ledger_start_sequence_number` are always generated for an append-only ledger
    table. The query in Listing [18-20](#480547_2_En_18_Chapter.xhtml#PC20) views
    the data in the `dbo.SystemAccess` table.


    ```

    SELECT SystemAccessID,

    UserID,

    ledger_start_transaction_id,

    ledger_start_sequence_number

    FROM dbo.SystemAccess;

    Listing 18-20

    Viewing Data in the Append-Only Ledger Table

    ```


    The `ledger_start_transaction_id` column is system-generated with the transaction
    ID that inserted the record. The `ledger_start_sequence_number` is the sequence
    number within the transaction. The ledger information is in Table [18-8](#480547_2_En_18_Chapter.xhtml#Tab8).


    Table 18-8


    Viewing System Access


    | System Access ID | User ID | Ledger Start Transaction ID | Ledger Start Sequence
    Number |

    | --- | --- | --- | --- |

    | 1 | 1001 | 120017 | 0 |


    The transaction ID for the insert is 120017\. The sequence for the insert is 0.


    Now that you have inserted a data record into dbo.SystemAccess, let’s see what
    happens when you try to update a record in `dbo.SystemAccess`. Listing [18-21](#480547_2_En_18_Chapter.xhtml#PC21)
    shows the T-SQL code to update the `DateCreated` on `dbo.SystemAccess`.


    ```

    UPDATE dbo.SystemAccess

    SET DateCreated = GETDATE()

    WHERE SystemAccessID = 1;

    Listing 18-21

    Attempting to Update Append-Only Ledger Table

    ```


    When you try to update the record, you get the error message in Figure [18-17](#480547_2_En_18_Chapter.xhtml#Fig17).


    ![](images/480547_2_En_18_Chapter/480547_2_En_18_Fig17_HTML.jpg)


    A text presents an error message. The text reads message 37359, level, 16, state
    1, line 173, updates are not allowed for the append-only ledger table d b o dot
    system access.


    Figure 18-17


    Error message when trying to update an append-only ledger table


    As expected, the `dbo.SystemAccess` table is not able to be updated by any user,
    including the dbo and sysadmin role members. When attempting the update in Listing
    [18-9](#480547_2_En_18_Chapter.xhtml#PC9), you get the error *Updates are not
    allowed for the append only Ledger table ‘dbo.SystemAccess.’* Now that I have
    discussed the use of append-only ledger tables, I will go through setting up an
    updatable ledger table.The updatable ledger tables allow you to track when data
    is inserted, like the append-only ledger table. Both the append-only and updatable
    ledger tables are system-versioned tables. Since the updatable ledger table uses
    system-versioning, the prior version of any modified record is stored in history
    table. In addition, updatable ledger tables record when data is updated or deleted
    in the table. An update is recorded as a delete for the deletion of the existing
    data and an insert for the new value in the column. The T-SQL code to create an
    updatable table is in Listing [18-22](#480547_2_En_18_Chapter.xhtml#PC22).


    ```

    CREATE TABLE dbo.ApplicationRule(

    ApplicationRuleID                                 INT          NOT NULL,

    ApplicationRuleDescription                        VARCHAR(50)  NOT NULL,

    IsActive BIT

    CONSTRAINT DF_ApplicationRule_IsActive      DEFAULT (1)  NOT NULL,

    DateCreated [datetime]

    CONSTRAINT DF_ApplicationRule_DateCreated   DEFAULT (GETDATE())

    NOT NULL,

    DateModified [datetime]

    CONSTRAINT DF_ApplicationRule_DateModified  DEFAULT (GETDATE())

    NULL,

    CONSTRAINT PK_ApplicationRule_ApplicationRuleID

    PRIMARY KEY CLUSTERED (ApplicationRuleID ASC)

    )

    WITH

    (

    SYSTEM_VERSIONING = ON (HISTORY_TABLE =

    dbo.ApplicationRuleHistory),

    LEDGER = ON

    );

    Listing 18-22

    Creating an Updatable Ledger Table

    ```


    In Listing [18-4](#480547_2_En_18_Chapter.xhtml#PC4), you specify a history table
    and the name for the history table. If you had not specified a name, SQL Server
    would still create a history table. This table is implicitly created as part of
    creating an updatable ledger table. The code to create an updatable ledger table
    is similar to the T-SQL in Listing [18-18](#480547_2_En_18_Chapter.xhtml#PC18).
    The last couple of lines in the query are the T-SQL code that is needed to create
    an updatable ledger table. The same command `LEDGER = ON` enables the ledger only
    functionality. `The SYSTEM_VERSIONING = (HISTORY_TABLE = dbo.ApplicatinRuleHistory)`
    creates the table that will be used to record ledger history. Listing [18-23](#480547_2_En_18_Chapter.xhtml#PC23)
    has the T-SQL code to find the objects created when creating an updatable ledger
    table.


    ```

    SELECT

    ts.[name] + ''.'' + t.[name] AS ledger_table_name,

    hs.[name] + ''.'' + h.[name] AS history_table_name,

    vs.[name] + ''.'' + v.[name] AS ledger_view_name

    FROM sys.tables AS t

    INNER JOIN sys.tables AS h

    ON h.[object_id] = t.history_table_id

    INNER JOIN sys.views v

    ON v.[object_id] = t.ledger_view_id

    INNER JOIN sys.schemas ts

    ON ts.[schema_id] = t.[schema_id]

    INNER JOIN sys.schemas hs

    ON hs.[schema_id] = h.[schema_id]

    INNER JOIN sys.schemas vs

    ON vs.[schema_id] = v.[schema_id]

    WHERE t.[name] = ''ApplicationRule'';

    Listing 18-23

    Viewing Updatable Ledger Objects

    ```'
  trans: '

    ## Ledger（账本表）


    如前所述，有时您需要监控用户修改数据库数据的行为。SQL Server 2022 引入了一种通过 ledger 表（账本表）来验证数据库中所存储数据完整性的方法。这些
    ledger 表通过对每笔交易进行哈希处理，并使用该交易的哈希值来哈希下一笔交易，从而创建一个区块链。这种对每笔交易进行哈希处理的方法会为后续的每笔交易重复进行。本节将讨论可用的
    ledger 表类型。您将看到如何设置这两种 ledger 表的示例，以及将现有表迁移到 ledger 表的过程。本节最后将介绍如何验证 ledger 表是否被篡改。


    第一种 ledger 表是**只可追加 ledger 表**。该表的功能正如其名；它只允许向表中插入数据，无法更新或删除数据。如果您需要记录用户交互（如访问应用程序、表格或门禁读卡器），这会非常有用。清单
    18-18 中的 T-SQL 代码创建了一个只可追加 ledger 表，用于记录用户访问应用程序的时间。


    ```

    CREATE TABLE dbo.SystemAccess

    (

    SystemAccessID      BIGINT     IDENTITY(1,1)      NOT NULL,

    UserID              INT                           NOT NULL,

    IsActive            BIT

    CONSTRAINT DF_SystemAccess_IsActive         DEFAULT 1

    NOT NULL,

    DateCreated         DATETIME2(2)

    CONSTRAINT DF_SystemAccess_DateCreated DEFAULT

    SYSDATETIME()

    NOT NULL

    )

    WITH (LEDGER = ON (APPEND_ONLY = ON));

    Listing 18-18

    创建一个只可追加 Ledger 表

    ```


    创建此表为只可追加 ledger 表的部分是 `CREATE TABLE` 语句的最后一行。最后一行使用 `LEDGER = ON` 启用了 ledger
    功能。表创建中的只可追加部分由 `APPEND_ONLY = ON` 指定。


    现在您已经创建了一个只可追加 ledger 表，可以插入一些数据来查看 ledger 表功能是如何工作的。清单 18-19 中的 T-SQL 模拟了用户尝试登录应用程序时会发生的情况。


    ```

    INSERT INTO dbo.SystemAccess (UserID)

    VALUES (1001);

    Listing 18-19

    向只可追加 Ledger 表添加数据

    ```


    该查询将一个 `UserID` 插入到 `dbo.SystemAccess` 表中。既然已经插入了一条记录，您就可以查询数据是如何记录在 `dbo.SystemAccess`
    表中的。请注意，由于 `table dbo.SystemAccess` 是一个只可追加 ledger 表，表中会有两个额外的可用列。列 `ledger_start_transaction_id`
    和 `ledger_start_sequence_number` 会为只可追加 ledger 表自动生成。清单 18-20 中的查询查看了 `dbo.SystemAccess`
    表中的数据。


    ```

    SELECT SystemAccessID,

    UserID,

    ledger_start_transaction_id,

    ledger_start_sequence_number

    FROM dbo.SystemAccess;

    Listing 18-20

    查看只可追加 Ledger 表中的数据

    ```


    `ledger_start_transaction_id` 列是系统生成的，包含插入记录的事务 ID。`ledger_start_sequence_number`
    是事务内的序列号。Ledger 信息如表 18-8 所示。


    表 18-8


    查看系统访问记录


    | System Access ID | User ID | Ledger Start Transaction ID | Ledger Start Sequence
    Number |

    | --- | --- | --- | --- |

    | 1 | 1001 | 120017 | 0 |


    插入操作的事务 ID 为 120017。插入操作的序列号为 0。


    既然您已经向 `dbo.SystemAccess` 插入了一条数据记录，让我们看看尝试更新 `dbo.SystemAccess` 中的记录时会发生什么。清单
    18-21 显示了更新 `dbo.SystemAccess` 表上 `DateCreated` 的 T-SQL 代码。


    ```

    UPDATE dbo.SystemAccess

    SET DateCreated = GETDATE()

    WHERE SystemAccessID = 1;

    Listing 18-21

    尝试更新只可追加 Ledger 表

    ```


    当你尝试更新记录时，会得到图 18-17 中的错误消息。


    ![](img/480547_2_En_18_Fig17_HTML.jpg)


    一条文本显示错误消息。文本内容为：消息 37359，级别 16，状态 1，第 173 行，不允许对只可追加 ledger 表 d b o dot system
    access 进行更新。


    图 18-17


    尝试更新只可追加 ledger 表时的错误消息


    正如预期的那样，任何用户都无法更新 `dbo.SystemAccess` 表，包括 `dbo` 和 `sysadmin` 角色成员。当尝试执行清单 18-9
    中的更新操作时，你会得到错误 *“Updates are not allowed for the append only Ledger table ‘dbo.SystemAccess.’”*。现在我已经讨论了只可追加
    ledger 表的用途，接下来我将介绍如何设置可更新 ledger 表。


    **可更新 ledger 表**允许您跟踪数据插入的时间，这与只可追加 ledger 表类似。只可追加和可更新 ledger 表都是系统版本控制表。由于可更新
    ledger 表使用系统版本控制，任何修改记录的先前版本都存储在历史表中。此外，可更新 ledger 表会记录数据在表中更新或删除的时间。更新操作被记录为删除现有数据的删除操作，以及为列中新值进行的插入操作。创建可更新表的
    T-SQL 代码在清单 18-22 中。


    ```

    CREATE TABLE dbo.ApplicationRule(

    ApplicationRuleID                                 INT          NOT NULL,

    ApplicationRuleDescription                        VARCHAR(50)  NOT NULL,

    IsActive BIT

    CONSTRAINT DF_ApplicationRule_IsActive      DEFAULT (1)  NOT NULL,

    DateCreated [datetime]

    CONSTRAINT DF_ApplicationRule_DateCreated   DEFAULT (GETDATE())

    NOT NULL,

    DateModified [datetime]

    CONSTRAINT DF_ApplicationRule_DateModified  DEFAULT (GETDATE())

    NULL,

    CONSTRAINT PK_ApplicationRule_ApplicationRuleID

    PRIMARY KEY CLUSTERED (ApplicationRuleID ASC)

    )

    WITH

    (

    SYSTEM_VERSIONING = ON (HISTORY_TABLE =

    dbo.ApplicationRuleHistory),

    LEDGER = ON

    );

    Listing 18-22

    创建一个可更新 Ledger 表

    ```


    在清单 18-4 中，您指定了一个历史表及其名称。如果您没有指定名称，SQL Server 仍然会创建一个历史表。该表是创建可更新 ledger 表时隐式创建的。创建可更新
    ledger 表的代码与清单 18-18 中的 T-SQL 类似。查询的最后几行是创建可更新 ledger 表所需的 T-SQL 代码。相同的命令 `LEDGER
    = ON` 启用了 ledger 功能。`The SYSTEM_VERSIONING = (HISTORY_TABLE = dbo.ApplicatinRuleHistory)`
    创建了将用于记录 ledger 历史的表。清单 18-23 包含查找创建可更新 ledger 表时所创建对象的 T-SQL 代码。


    ```

    SELECT

    ts.[name] + ''.'' + t.[name] AS ledger_table_name,

    hs.[name] + ''.'' + h.[name] AS history_table_name,

    vs.[name] + ''.'' + v.[name] AS ledger_view_name

    FROM sys.tables AS t

    INNER JOIN sys.tables AS h

    ON h.[object_id] = t.history_table_id

    INNER JOIN sys.views v

    ON v.[object_id] = t.ledger_view_id

    INNER JOIN sys.schemas ts

    ON ts.[schema_id] = t.[schema_id]

    INNER JOIN sys.schemas hs

    ON hs.[schema_id] = h.[schema_id]

    INNER JOIN sys.schemas vs

    ON vs.[schema_id] = v.[schema_id]

    WHERE t.[name] = ''ApplicationRule'';

    Listing 18-23

    查看可更新 Ledger 对象

    ```

    '
- fmt: '# Ledger Table Implementation


    This query gives the ledger table, history table, and ledger view for the updatable
    ledger table `ApplicationRule`. The ledger view is a system-created view that
    combines the data from the updatable ledger table and the history table. The names
    of the tables and views created are the following:


    *   `dbo.ApplicationRule`

    *   `dbo.ApplicationRuleHistory`

    *   `dbo.ApplicationRule_Ledger`


    Since the table has been created, you can modify the data in the table `dbo.ApplicationRule`.
    In order to add and modify data, you can execute the queries in Listing 18-24.


    ```

    INSERT INTO dbo.ApplicationRule (ApplicationRuleDescription)

    VALUES (''Show only active customers'');

    UPDATE dbo.ApplicationRule

    SET IsActive = 0,

    DateModified = GETDATE()

    WHERE ApplicationRuleDescription = ''Show only active customers'';

    Listing 18-24

    Adding and Modifying Data in the ApplicationRule Table

    ```


    These queries create an entry in the `dbo.ApplicationRule` table and deactivate
    that application rule. To view the information recorded for the updatable ledger
    table, the query in Listing 18-25 has the T-SQL code you need.


    ```

    SELECT trn.commit_time AS CommitTime,

    trn.principal_name AS UserName,

    app.ApplicationRuleDescription,

    app.IsActive,

    app.ledger_operation_type_desc AS ActionType

    FROM dbo.ApplicationRule_Ledger app

    INNER JOIN sys.database_ledger_transactions trn

    ON app.ledger_transaction_id = trn.transaction_id

    ORDER BY trn.commit_time;

    Listing 18-25

    Viewing Ledger History Information

    ```


    This query uses the view `dbo.ApplicationRule_Ledger` to find the information
    that was recorded for the updatable ledger table. The query shows when the query
    was run, who executed the query, the columns from the `dbo.ApplicationRule` table,
    and the operator type performed. Since the updatable ledger table is system-versioned,
    users cannot modify data in the history table. Table 18-9 shows the results of
    Listing 18-23.


    Table 18-9

    Viewing System Access


    | Commit Time | Username | Application Rule Description | IsActive | Action Type
    |

    | --- | --- | --- | --- | --- |

    | 2023-05-01 | Enoble | Show only active customers | 1 | INSERT |

    | 2023-05-01 | Enoble | Show only active customers | 1 | DELETE |

    | 2023-05-01 | Enoble | Show only active customers | 0 | INSERT |


    The first record in this table shows when the new application rule was inserted
    into the table. The Action Type shows the insert. The second and third rows are
    for when the IsActive column was updated from True (1) to False (0). The second
    row shows the delete since the IsActive of 1 is being deleted. The third row shows
    the inserted where the IsActive is set to False (0). The level of granularity
    record is similar some of the tracking discussed in Chapter 15.


    Note that I have not given you an example of how to add ledger table functionality
    to an existing table. That is because it’s not possible to add ledger functionality
    to an existing table. In order to implement ledger tables to an existing table,
    you need to make a new ledger table. Listing 18-26 shows the creation of a new
    updatable ledger table for the `dbo.Product` table.


    ```

    CREATE TABLE dbo.Product_LedgerTable(

    ProductID         INT      IDENTITY(1,1)      NOT NULL,

    ProductName       VARCHAR(25)                 NOT NULL,

    ProductPrice      DECIMAL(6, 2)               NOT NULL,

    IsActive          BIT

    CONSTRAINT DF_Product_LedgerTable_IsActive DEFAULT (1)

    NOT NULL,

    DateCreated       DATETIME2(2)

    CONSTRAINT DF_Product_LedgerTable_DateCreated

    DEFAULT (GETDATE())

    NOT NULL,

    DateModified      DATETIME2(2)

    CONSTRAINT DF_Product_LedgerTable_DateModified

    DEFAULT (SYSDATETIME())

    NOT NULL,

    DateDisabled      DATETIME2(2)                    NULL,

    CONSTRAINT PK_Product_LedgerTable PRIMARY KEY CLUSTERED (ProductID ASC)

    )

    WITH

    (

    SYSTEM_VERSIONING = ON,

    LEDGER = ON

    );

    Listing 18-26

    Creating a New Updatable Ledger Table

    ```


    Once the updatable ledger table has been created, you can use the system-stored
    procedure `sys.sp_copy_data_in_batches` to copy data from the original table to
    the new ledger table. An example of this code is in Listing 18-27.


    ```

    EXECUTE sp_copy_data_in_batches

    @source_table_name = N''Product'' ,

    @target_table_name = N''Product_Ledger'';

    Listing 18-27

    Copying Data from Product to Product_Ledger

    ```


    You specify the source table as the original table. The target table is the newly
    created updatable ledger table.


    The benefit to using ledger tables is the ability to verify if someone has tampered
    with the ledger tables. To check for tampering, you first need to generate the
    ledger digest. Executing the T-SQL in Listing 18-28 will give you the JSON needed
    to verify tampering.


    ```

    EXECUTE sp_generate_database_ledger_digest;

    Listing 18-28

    Finding the Ledger Digest

    ```


    Once the JSON is executed, you need to copy the JSON to pass into the next system
    stored procedure. To check for tampering, you can execute the T-SQL code in Listing
    18-29.


    ```

    EXECUTE sp_verify_database_ledger N''

    {

    "database_name":"OutdoorRecreation",

    "block_id":0,

    "hash":"0xE32AE537398CB3F1276C7BA16AF359C8E0365CB6AAE9617AEA40B54D61EAC865",

    "last_transaction_commit_time":"2022-12-09T23:40:44.9700000",

    "digest_time":"2022-12-11T22:24:06.7619426"

    }'';

    Listing 18-29

    Checking Ledger Tables for Tampering

    ```


    If there has been no tampering, the query above with return the results "Ledger
    verification successfully verified up to block 0". If you are using Azure SQL,
    you can use the query in Listing 18-30 to check for tampering.


    ```

    DECLARE @digest_locations NVARCHAR(MAX) =

    (

    SELECT *

    FROM sys.database_ledger_digest_locations

    FOR JSON AUTO, INCLUDE_NULL_VALUES

    );

    SELECT @digest_locations as digest_locations;

    BEGIN TRY

    EXEC sys.sp_verify_database_ledger_from_digest_storage @digest_locations;

    SELECT ''Ledger verification succeeded.'' AS Result;

    END TRY

    BEGIN CATCH

    THROW;

    END CATCH

    Listing 18-30

    Checking Azure SQL Database Ledger Tables for Tampering

    ```


    If you want to track the changes to the database over time, SQL Server 2022 introduces
    the ability to create a ledger database for SQL Server. The code to create a SQL
    Server ledger database is available in Listing 18-31.


    ```

    CREATE DATABASE OutdoorRecreated_Ledger

    WITH LEDGER = ON;

    Listing 18-31

    Creating a SQL Server Ledger Database

    ```


    If you are using Azure SQL Database, you can configure the ledger in the `Security`
    table when creating the database in the Azure portal. Other options include PowerShell
    and Azure CLI. It is also possible using the T-SQL in Listing 18-32.


    ```

    CREATE DATABASE OutdoorRecreated_Ledger

    (

    EDITION = ''GeneralPurpose'',

    SERVICE_OBJECTIVE=''GP_Gen5_2'',

    MAXSIZE = 2 GB

    )

    WITH LEDGER = ON;

    Listing 18-32

    Creating a SQL Server Ledger Database

    ```


    Similar to the SQL Server ledger data, the Azure SQL Database ledger database
    must only contain ledger tables. If not specified, any table created will default
    to an updatable ledger table.


    # 19. Implementing Encryption


    Continuing from Chapter 18, where I introduced methods to manage security features,
    this chapter will focus on how to implement encryption for your databases. The
    first section of the chapter will go over how you can use Always Encrypted to
    ensure that your most sensitive data remains encrypted at rest and in flight.
    The second section of the chapter will guide you through how to implement Transparent
    Data Encryption at rest for your databases. The goal of this chapter is to build
    on the concept of security access to data by also giving you the ability to encrypt
    data as needed.'
