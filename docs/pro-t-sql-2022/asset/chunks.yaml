    This section covered how to switch partitions between two non-partitioned tables,
    a non-partitioned and partitioned table, and two partitioned tables. While each
    of these processes separately can be helpful, combining them to suit your business
    needs may be even better. In the next section, you will go through an example
    of how switching partitions across multiple tables can help with your data retention
    and archival processes. The demo in the next section will apply these concepts
    to allow you to have a table for active application activity, a table for reporting
    purposes, a table for storing data for compliance reasons, and a table to quickly
    remove data from the database.


    ## Sliding Window Partition


    The goal of this example is show how you can switch partitions between multiple
    tables, both partitioned and non-partitioned. For this example, you’ll use a preloaded
    small set of sample data in several of the tables, as shown in Table [17-7](#480547_2_En_17_Chapter.xhtml#Tab7).


    Table 17-7


    Count of Records per Table for Managing Customer Orders


    | Table Name | Record Count |

    | --- | --- |

    | `dbo.CustomerOrderActive` | 1 |

    | `dbo.CustomerOrderHistory` | 3 |

    | `dbo.CustomerOrderHistoryArchive` | 12 |

    | `dbo.CustomerOrderPurge` | 0 |


    The single record in `dbo.CustomerOrderActive` is for the month of April 2023\.
    The three records in `dbo.CustomerOrderHistory` are for January, February, and
    March 2023\. In `dbo.CustomerHistory` there are 12 records, one for each month
    for the past 4 to 15 months.


    This process assumes you are at the beginning of May 2023\. This is the point
    in time when you would be ready to update `dbo.CustomerOrderActive` to be for
    May 2023\. Following the pattern where `dbo.CustomerOrderHistory` is for the most
    recent three historical months, this table will be updated to hold data from February
    2023 to April 2023, and `dbo.CustomerOrderHistoryArchive` will have data for to
    February 2022 through January 2023.


    For this example, start by moving the oldest month of data out of `dbo.CustomerOrderHistoryArchive`
    into `dbo.CustomerOrderPurge`. Before you do this, you can verify the row counts
    for each partition for `dbo.CustomerOrderHistoryArchive` by executing the T-SQL
    in Listing [17-23](#480547_2_En_17_Chapter.xhtml#PC23).


    ```

    SELECT SCHEMA_NAME(tbl.[schema_id]) AS SchemaName,

    tbl.[name] AS TableName,

    pt.partition_number AS PartitionNumber,

    pt.[rows] AS NumberRecords,

    rv.[value] AS BoundaryValue,

    CASE WHEN ISNULL(rv.[value], rv2.[value]) IS NULL

    THEN ''N/A''

    ELSE

    CASE WHEN fnc.boundary_value_on_right = 0

    AND rv2.[value] IS NULL THEN ''>=''

    WHEN fnc.boundary_value_on_right = 0

    THEN ''>''

    ELSE ''>=''

    END + '' ''

    + ISNULL(CONVERT(varchar(64), rv2.value),

    ''Min Value'') + '' '' +

    CASE fnc.boundary_value_on_right

    WHEN 1 THEN ''and <''

    ELSE ''and <=''

    END

    + '' '' + ISNULL(CONVERT(varchar(64), rv.value),

    ''Max Value'')

    END AS TextComparison

    FROM sys.tables AS tbl

    INNER JOIN sys.indexes AS idx

    ON tbl.[object_id] = idx.[object_id]

    INNER JOIN sys.partitions AS pt

    ON idx.[object_id] = pt.[object_id]

    AND idx.index_id = pt.index_id

    INNER JOIN sys.partition_schemes AS pch

    ON idx.data_space_id = pch.data_space_id

    INNER JOIN sys.partition_functions AS fnc

    ON pch.function_id = fnc.function_id

    LEFT JOIN sys.partition_range_values AS rng

    ON fnc.function_id = rng.function_id

    AND rng.boundary_id = pt.partition_number

    LEFT JOIN sys.partition_range_values AS rv

    ON fnc.function_id = rv.function_id

    AND pt.partition_number = rv.boundary_id

    LEFT JOIN sys.partition_range_values AS rv2

    ON fnc.function_id = rv2.function_id

    AND pt.partition_number - 1= rv2.boundary_id

    WHERE tbl.[name] = ''CustomerOrderHistoryArchive''

    AND idx.[type] <= 1

    ORDER BY tbl.[name], pt.partition_number;

    Listing 17-23

    Merge Partitions for Customer Orders Over 15 Months Old

    ```


    This query shows not only the partition number, which you need to switch partitions,
    but also shows the row counts and partition logics. For this table, Table [17-8](#480547_2_En_17_Chapter.xhtml#Tab8)
    shows the results from this query.


