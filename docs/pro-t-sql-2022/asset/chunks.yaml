- fmt: '# Partitioned Tables


    ## 创建分区表


    虽然你已经创建了文件组、文件、分区函数和分区方案，但这些分区逻辑尚未应用到数据库中的任何数据。你可以选择创建新表或对现有表进行分区。在本例中，让我们从创建一个在新建时即被分区的表开始。你可以参考清单
    [16-6](#480547_2_En_16_Chapter.xhtml#PC6) 中的 T-SQL 来创建分区表。


    ```sql

    CREATE TABLE dbo.CustomerOrderHistory

    (

    CustomerOrderHistoryID        BIGINT    IDENTITY(1,1)   NOT NULL,

    CustomerOrderID               INT                       NOT NULL,

    CustomerOrderHistoryStatusID  TINYINT                   NOT NULL,

    DateCreated                   DATETIME2(2)              NOT NULL,

    DateModified                  DATETIME2(2)                  NULL,

    CONSTRAINT PK_CustomerOrderHistory_CustomerOrderHistoryID

    PRIMARY KEY NONCLUSTERED

    (CustomerOrderHistoryID, DateCreated),

    CONSTRAINT FK_CustomerOrderHistory_CustomerOrder

    FOREIGN KEY (CustomerOrderID)

    REFERENCES dbo.CustomerOrder(CustomerOrderID),

    CONSTRAINT FK_CustomerOrderHistory_CustomerOrderHistoryStatus

    FOREIGN KEY (CustomerOrderHistoryStatusID)

    REFERENCES dbo.CustomerOrderHistoryStatus

    (CustomerOrderHistoryStatusID)

    ) ON CustomerOrderHistoryRange (DateCreated);

    ```


    **清单 16-6** 创建分区表


    在此代码中，最后一行指示表应创建在清单 [16-4](#480547_2_En_16_Chapter.xhtml#PC4) 的分区方案上。这就是表被分区的方式。表上的分区方案使用分区函数将数据分类到各个分区。


    一旦清单 [16-6](#480547_2_En_16_Chapter.xhtml#PC6) 中的分区表创建完成，其结构将与图 [16-3](#480547_2_En_16_Chapter.xhtml#Fig3)
    在概念上相似。


    ![](images/480547_2_En_16_Chapter/480547_2_En_16_Fig3_HTML.png)


    一个水平块状列表展示了4个分区。1. 分区1。2. 分区2，2022年1月1日。3. 分区3，2022年1月4日。4. 分区4，2022年1月7日。


    **图 16-3** 分区表数据结构


    在分区表内部，你可以清晰地识别每个分区。你还可以确定分区函数上的正确范围是如何将数据分解到每个分区中的。你可以通过运行清单 [16-7](#480547_2_En_16_Chapter.xhtml#PC7)
    中的查询来确认表的分区方式。


    ```sql

    SELECT tbl.[name] AS TableName,

    sch.[name] AS PartitionScheme,

    fnc.[name] AS PartitionFunction,

    prt.partition_number,

    fnc.[type_desc],

    rng.boundary_id,

    rng.[value] AS BoundaryValue,

    prt.[rows]

    FROM sys.tables tbl

    INNER JOIN sys.indexes idx

    ON tbl.[object_id] = idx.[object_id]

    INNER JOIN sys.partitions prt

    ON idx.[object_id] = prt.[object_id]

    AND idx.index_id = prt.index_id

    INNER JOIN sys.partition_schemes AS sch

    ON idx.data_space_id = sch.data_space_id

    INNER JOIN sys.partition_functions AS fnc

    ON sch.function_id = fnc.function_id

    LEFT JOIN sys.partition_range_values AS rng

    ON fnc.function_id = rng.function_id

    AND rng.boundary_id = prt.partition_number

    WHERE tbl.[name] = ''CustomerOrderHistory''

    AND idx.[type] <= 1

    ORDER BY prt.partition_number;

    ```


    **清单 16-7** 查看分区表的分区信息


    此查询显示表名、表使用的分区方案、表使用的分区函数、分区号、用于分区数据的值以及每个分区中的行数。图 [16-4](#480547_2_En_16_Chapter.xhtml#Fig4)
    显示了来自清单 [16-7](#480547_2_En_16_Chapter.xhtml#PC7) 查询的结果。


    ![](images/480547_2_En_16_Chapter/480547_2_En_16_Fig4_HTML.jpg)


    一个包含9列6行的表格。列分别描绘了表名、分区方案、分区函数、分区号、type_desc、boundary_id、边界值和行数。


    **图 16-4** 分区表的数据


    上述结果是在分区表创建后立即获取的。你可以确认使用的分区方案是 `CustomerOrderHistoryRange`，分区函数是 `CustomerOrderHistoryFunc`。上述边界值与创建分区函数时在清单
    [16-3](#480547_2_En_16_Chapter.xhtml#PC3) 中指定的范围相匹配。查看图 [16-4](#480547_2_En_16_Chapter.xhtml#Fig4)
    中 `rows` 列的值，你可以确认所有值都是 0。这是因为表中还没有数据行。


    ## 向分区表插入数据并验证


    你从一个预先存在的表向分区表插入了数据。执行与清单 [16-7](#480547_2_En_16_Chapter.xhtml#PC7) 相同的查询，你可以确定数据是如何存储在分区中的。在图
    [16-5](#480547_2_En_16_Chapter.xhtml#Fig5) 中，你可以找到每个分区的行数。


    ![](images/480547_2_En_16_Chapter/480547_2_En_16_Fig5_HTML.jpg)


    一个包含9列6行的表格。列分别描绘了表名、分区方案、分区函数、分区号、type_desc、boundary_id、边界值和行数。


    **图 16-5** 添加到分区表的数据


    在图 [16-4](#480547_2_En_16_Chapter.xhtml#Fig4) 中，你可以验证在向 `dbo.CustomerOrderHistory`
    表添加任何数据之前每个分区的行数。图 [16-5](#480547_2_En_16_Chapter.xhtml#Fig5) 显示了表完全填充后每个分区的行数。第四个分区有
    802,818 行。虽然你知道分区中的实际行数，但可能仍想确认表是否按预期对数据进行分区。清单 [16-8](#480547_2_En_16_Chapter.xhtml#PC8)
    显示了一个按日期范围统计记录数量的查询。


    ```sql

    SELECT

    SUM(

    CASE WHEN DateCreated < ''2022-01-01''

    THEN 1

    ELSE 0

    END

    ) AS Partition1,

    SUM(

    CASE WHEN DateCreated >= ''2022-01-01''

    AND DateCreated < ''2022-04-01''

    THEN 1

    ELSE 0

    END

    ) AS Partition2,

    SUM(

    CASE WHEN DateCreated >= ''2022-04-01''

    AND DateCreated < ''2022-07-01''

    THEN 1

    ELSE 0

    END

    ) AS Partition3,

    SUM(

    CASE WHEN DateCreated >= ''2022-07-01''

    AND DateCreated < ''2022-10-01''

    THEN 1

    ELSE 0

    END

    ) AS Partition4,

    SUM(

    CASE WHEN DateCreated >= ''2022-10-01''

    THEN 1

    ELSE 0

    END

    ) AS Partition5

    FROM dbo.CustomerOrderHistory;

    ```


    **清单 16-8** 确认行数的查询


    查询中的第一列返回创建日期在2022年1月1日之前的记录计数。假设分区函数按预期对数据进行分区，图 [16-5](#480547_2_En_16_Chapter.xhtml#Fig5)
    中第一个分区显示的行数应与清单 [16-8](#480547_2_En_16_Chapter.xhtml#PC8) 中第一列返回的值相匹配。清单 [16-8](#480547_2_En_16_Chapter.xhtml#PC8)
    的查询结果如图 [16-6](#480547_2_En_16_Chapter.xhtml#Fig6) 所示。


    ![](images/480547_2_En_16_Chapter/480547_2_En_16_Fig6_HTML.jpg)


    一个包含6列2行的表格。列分别描绘了分区1、分区2、分区3、分区4和分区5。分区1、2、3、4和5下的值分别为0、0、0、802818和3。


    **图 16-6** 显示行数的查询结果


    图 [16-6](#480547_2_En_16_Chapter.xhtml#Fig6) 中的每一列都显示了每个日期范围内的记录数量。第一列代表创建日期在2022年1月1日之前的记录数。第二列是从2022年1月1日开始直到但不包括2022年4月1日的创建日期的记录数。第三列对创建日期为2022年4月1日直到2022年7月1日的记录遵循类似的模式。最后一列适用于2022年10月1日或之后创建的所有记录。将这五列的值与图
    [16-5](#480547_2_En_16_Chapter.xhtml#Fig5) 中的 `rows` 列进行比较，可以帮助你确认你的分区函数是否按预期工作。在你的例子中，图
    [16-5](#480547_2_En_16_Chapter.xhtml#Fig5) 中 `rows` 列的值确实对应于图 [16-6](#480547_2_En_16_Chapter.xhtml#Fig6)
    中的列值。这证实了你的数据正按预期进行分区。'
  raw: '### Partitioned Tables


    While you have created filegroups, files, partition functions, and partition schemes,
    none of this partitioning logic has been applied to any data within the databases.
    You have the option of creating a new table or partitioning an existing table.
    For this example, let’s start with creating a new table that is partitioned as
    part of the table creation. You can refer to the T-SQL to create the partitioned
    table in Listing [16-6](#480547_2_En_16_Chapter.xhtml#PC6).


    ```

    CREATE TABLE dbo.CustomerOrderHistory

    (

    CustomerOrderHistoryID        BIGINT    IDENTITY(1,1)   NOT NULL,

    CustomerOrderID               INT                       NOT NULL,

    CustomerOrderHistoryStatusID  TINYINT                   NOT NULL,

    DateCreated                   DATETIME2(2)              NOT NULL,

    DateModified                  DATETIME2(2)                  NULL,

    CONSTRAINT PK_CustomerOrderHistory_CustomerOrderHistoryID

    PRIMARY KEY NONCLUSTERED

    (CustomerOrderHistoryID, DateCreated),

    CONSTRAINT FK_CustomerOrderHistory_CustomerOrder

    FOREIGN KEY (CustomerOrderID)

    REFERENCES dbo.CustomerOrder(CustomerOrderID),

    CONSTRAINT FK_CustomerOrderHistory_CustomerOrderHistoryStatus

    FOREIGN KEY (CustomerOrderHistoryStatusID)

    REFERENCES dbo.CustomerOrderHistoryStatus

    (CustomerOrderHistoryStatusID)

    ) ON CustomerOrderHistoryRange (DateCreated);

    Listing 16-6

    Creating a Partitioned Table

    ```


    In this code, the last line indicates that the table should be created on the
    partition scheme from Listing [16-4](#480547_2_En_16_Chapter.xhtml#PC4). This
    is how the table is partitioned. The partition scheme on the table sorts the data
    into partitions using the partition function.


    Once the partitioned table is created in Listing [16-6](#480547_2_En_16_Chapter.xhtml#PC6),
    the structure of the table will be conceptually similar to Figure [16-3](#480547_2_En_16_Chapter.xhtml#Fig3).


    ![](images/480547_2_En_16_Chapter/480547_2_En_16_Fig3_HTML.png)


    A horizontal block list presents 4 partitions. 1\. Partition 1\. 2. Partition
    2, January 1, 2022\. 3\. Partition 3, January 4, 2022\. 4. Partition 4, January
    7, 2022.


    Figure 16-3


    Partitioned table data structure


    Inside of the partitioned table, you can identify each partition clearly. Within
    the partitioned table, you can also determine how the right range on the partition
    function has broken out the data into each partition. You can confirm how the
    table is partitioned by running the query in Listing [16-7](#480547_2_En_16_Chapter.xhtml#PC7).


    ```

    SELECT tbl.[name] AS TableName,

    sch.[name] AS PartitionScheme,

    fnc.[name] AS PartitionFunction,

    prt.partition_number,

    fnc.[type_desc],

    rng.boundary_id,

    rng.[value] AS BoundaryValue,

    prt.[rows]

    FROM sys.tables tbl

    INNER JOIN sys.indexes idx

    ON tbl.[object_id] = idx.[object_id]

    INNER JOIN sys.partitions prt

    ON idx.[object_id] = prt.[object_id]

    AND idx.index_id = prt.index_id

    INNER JOIN sys.partition_schemes AS sch

    ON idx.data_space_id = sch.data_space_id

    INNER JOIN sys.partition_functions AS fnc

    ON sch.function_id = fnc.function_id

    LEFT JOIN sys.partition_range_values AS rng

    ON fnc.function_id = rng.function_id

    AND rng.boundary_id = prt.partition_number

    WHERE tbl.[name] = ''CustomerOrderHistory''

    AND idx.[type] <= 1

    ORDER BY prt.partition_number;

    Listing 16-7

    Viewing Partitions for Partitioned Table

    ```


    This query shows the table name, the partition scheme used on the table, the partition
    function used on the table, the partition number, the value to partition the data,
    and the number of rows in each partition. Figure [16-4](#480547_2_En_16_Chapter.xhtml#Fig4)
    shows the results from the query in Listing [16-7](#480547_2_En_16_Chapter.xhtml#PC7).


    ![](images/480547_2_En_16_Chapter/480547_2_En_16_Fig4_HTML.jpg)


    A table of 9 columns and 6 rows. The columns depict the table name, partition
    scheme, partition function, partition number, type underscore d e s c, boundary
    underscore i d, boundary value, and rows.


    Figure 16-4


    Data for a partitioned table


    The preceding results were taken immediately after the partitioned table was created.
    You can confirm that the partition scheme used is `CustomerOrderHistoryRange`
    and the partition function is `CustomerOrderHistoryFunc`. The preceding boundary
    values match the ranges specified in Listing [16-3](#480547_2_En_16_Chapter.xhtml#PC3)
    when the partition function was created. Reviewing the value in the `rows` column
    from Figure [16-4](#480547_2_En_16_Chapter.xhtml#Fig4) you can confirm all the
    values are 0\. This is because there are no rows in the table.


    You inserted data from a pre-existing table into the partitioned table. Executing
    the same query from Listing [16-7](#480547_2_En_16_Chapter.xhtml#PC7), you can
    determine how the data has been stored in the partitions. In Figure [16-5](#480547_2_En_16_Chapter.xhtml#Fig5),
    you can find the number of rows per partition.


    ![](images/480547_2_En_16_Chapter/480547_2_En_16_Fig5_HTML.jpg)


    A table of 9 columns and 6 rows. The columns depict the table name, partition
    scheme, partition function, partition number, type underscore d e s c, boundary
    underscore i d, boundary value, and rows.


    Figure 16-5


    Data added to the partitioned table


    In Figure [16-4](#480547_2_En_16_Chapter.xhtml#Fig4), you can verify the row counts
    per partition before any data was added to the `dbo.CustomerOrderHistory` table.
    Figure [16-5](#480547_2_En_16_Chapter.xhtml#Fig5) shows the number of rows per
    partition after the table is fully populated. The fourth partition has 802,818
    rows. You know the actual number of rows in the partition, but you may still want
    to confirm that the table is partitioning data as we would expect. Listing [16-8](#480547_2_En_16_Chapter.xhtml#PC8)
    shows a query to count the number of records by date ranges.


    ```

    SELECT

    SUM(

    CASE WHEN DateCreated = ''2022-01-01''

    AND DateCreated = ''2022-04-01''

    AND DateCreated = ''2022-07-01''

    AND DateCreated = ''2022-10-01''

    THEN 1

    ELSE 0

    END

    ) AS Partition5

    FROM dbo.CustomerOrderHistory;

    Listing 16-8

    Query to Confirm Row Counts

    ```


    The first column in the query returns a count of records that have a created date
    before January 1, 2022\. Assuming the partition function is partitioning data
    as you expect, the number of rows shown for the first partition from Figure [16-5](#480547_2_En_16_Chapter.xhtml#Fig5)
    should match the value returned for column one from Listing [16-8](#480547_2_En_16_Chapter.xhtml#PC8).
    The query results from Listing [16-8](#480547_2_En_16_Chapter.xhtml#PC8) are shown
    in Figure [16-6](#480547_2_En_16_Chapter.xhtml#Fig6).


    ![](images/480547_2_En_16_Chapter/480547_2_En_16_Fig6_HTML.jpg)


    A table of 6 columns and 2 rows. The columns depict Partition 1, Partition 2,
    Partition 3, Partition 4, and Partition 5\. The values under partitions 1, 2,
    3, 4, and 5 are 0, 0, 0, 802818, and 3, respectively.


    Figure 16-6


    Query results showing row count


    Each column in Figure [16-6](#480547_2_En_16_Chapter.xhtml#Fig6) shows the number
    of records that exist in each date range. The first column represents the number
    of records with a date created before January 1, 2022\. The second column is the
    number of records with a created date starting on January 1, 2022 up to but not
    including April 1, 2022\. The third column follows a similar pattern for records
    with a date created of April 1, 2022 all the way until July 1, 2022\. The last
    column is for all records created on or after October 1, 2022\. Comparing the
    values in these five columns to the rows column from Figure [16-5](#480547_2_En_16_Chapter.xhtml#Fig5)
    can help you confirm that your partition function is working as expected. In your
    case, the value from the rows column from Figure [16-5](#480547_2_En_16_Chapter.xhtml#Fig5)
    does correspond to the column values from Figure [16-6](#480547_2_En_16_Chapter.xhtml#Fig6).
    This confirms that your data is being partitioned as expected.'
  trans: '

    # 分区表


    ## 创建分区表


    虽然你已经创建了文件组、文件、分区函数和分区方案，但这些分区逻辑尚未应用到数据库中的任何数据。你可以选择创建新表或对现有表进行分区。在本例中，让我们从创建一个在新建时即被分区的表开始。你可以参考清单
    16-6 中的 T-SQL 来创建分区表。


    ```sql

    CREATE TABLE dbo.CustomerOrderHistory

    (

    CustomerOrderHistoryID        BIGINT    IDENTITY(1,1)   NOT NULL,

    CustomerOrderID               INT                       NOT NULL,

    CustomerOrderHistoryStatusID  TINYINT                   NOT NULL,

    DateCreated                   DATETIME2(2)              NOT NULL,

    DateModified                  DATETIME2(2)                  NULL,

    CONSTRAINT PK_CustomerOrderHistory_CustomerOrderHistoryID

    PRIMARY KEY NONCLUSTERED

    (CustomerOrderHistoryID, DateCreated),

    CONSTRAINT FK_CustomerOrderHistory_CustomerOrder

    FOREIGN KEY (CustomerOrderID)

    REFERENCES dbo.CustomerOrder(CustomerOrderID),

    CONSTRAINT FK_CustomerOrderHistory_CustomerOrderHistoryStatus

    FOREIGN KEY (CustomerOrderHistoryStatusID)

    REFERENCES dbo.CustomerOrderHistoryStatus

    (CustomerOrderHistoryStatusID)

    ) ON CustomerOrderHistoryRange (DateCreated);

    ```


    **清单 16-6** 创建分区表


    在此代码中，最后一行指示表应创建在清单 16-4 的分区方案上。这就是表被分区的方式。表上的分区方案使用分区函数将数据分类到各个分区。


    一旦清单 16-6 中的分区表创建完成，其结构将与图 16-3 在概念上相似。


    ![](img/480547_2_En_16_Fig3_HTML.png)


    一个水平块状列表展示了 4 个分区。1. 分区 1。2. 分区 2，2022 年 1 月 1 日。3. 分区 3，2022 年 1 月 4 日。4. 分区
    4，2022 年 1 月 7 日。


    **图 16-3** 分区表数据结构


    在分区表内部，你可以清晰地识别每个分区。你还可以确定分区函数上的正确范围是如何将数据分解到每个分区中的。你可以通过运行清单 16-7 中的查询来确认表的分区方式。


    ```sql

    SELECT tbl.[name] AS TableName,

    sch.[name] AS PartitionScheme,

    fnc.[name] AS PartitionFunction,

    prt.partition_number,

    fnc.[type_desc],

    rng.boundary_id,

    rng.[value] AS BoundaryValue,

    prt.[rows]

    FROM sys.tables tbl

    INNER JOIN sys.indexes idx

    ON tbl.[object_id] = idx.[object_id]

    INNER JOIN sys.partitions prt

    ON idx.[object_id] = prt.[object_id]

    AND idx.index_id = prt.index_id

    INNER JOIN sys.partition_schemes AS sch

    ON idx.data_space_id = sch.data_space_id

    INNER JOIN sys.partition_functions AS fnc

    ON sch.function_id = fnc.function_id

    LEFT JOIN sys.partition_range_values AS rng

    ON fnc.function_id = rng.function_id

    AND rng.boundary_id = prt.partition_number

    WHERE tbl.[name] = ''CustomerOrderHistory''

    AND idx.[type] <= 1

    ORDER BY prt.partition_number;

    ```


    **清单 16-7** 查看分区表的分区信息


    此查询显示表名、表使用的分区方案、表使用的分区函数、分区号、用于分区数据的值以及每个分区中的行数。图 16-4 显示了来自清单 16-7 查询的结果。


    ![](img/480547_2_En_16_Fig4_HTML.jpg)


    一个包含 9 列 6 行的表格。列分别描绘了表名、分区方案、分区函数、分区号、type_desc、boundary_id、边界值和行数。


    **图 16-4** 分区表的数据


    上述结果是在分区表创建后立即获取的。你可以确认使用的分区方案是 `CustomerOrderHistoryRange`，分区函数是 `CustomerOrderHistoryFunc`。上述边界值与创建分区函数时在清单
    16-3 中指定的范围相匹配。查看图 16-4 中 `rows` 列的值，你可以确认所有值都是 0。这是因为表中还没有数据行。


    ## 向分区表插入数据并验证


    你从一个预先存在的表向分区表插入了数据。执行与清单 16-7 相同的查询，你可以确定数据是如何存储在分区中的。在图 16-5 中，你可以找到每个分区的行数。


    ![](img/480547_2_En_16_Fig5_HTML.jpg)


    一个包含 9 列 6 行的表格。列分别描绘了表名、分区方案、分区函数、分区号、type_desc、boundary_id、边界值和行数。


    **图 16-5** 添加到分区表的数据


    在图 16-4 中，你可以验证在向 `dbo.CustomerOrderHistory` 表添加任何数据之前每个分区的行数。图 16-5 显示了表完全填充后每个分区的行数。第四个分区有
    802,818 行。虽然你知道分区中的实际行数，但可能仍想确认表是否按预期对数据进行分区。清单 16-8 显示了一个按日期范围统计记录数量的查询。


    ```sql

    SELECT

    SUM(

    CASE WHEN DateCreated < ''2022-01-01''

    THEN 1

    ELSE 0

    END

    ) AS Partition1,

    SUM(

    CASE WHEN DateCreated >= ''2022-01-01''

    AND DateCreated < ''2022-04-01''

    THEN 1

    ELSE 0

    END

    ) AS Partition2,

    SUM(

    CASE WHEN DateCreated >= ''2022-04-01''

    AND DateCreated < ''2022-07-01''

    THEN 1

    ELSE 0

    END

    ) AS Partition3,

    SUM(

    CASE WHEN DateCreated >= ''2022-07-01''

    AND DateCreated < ''2022-10-01''

    THEN 1

    ELSE 0

    END

    ) AS Partition4,

    SUM(

    CASE WHEN DateCreated >= ''2022-10-01''

    THEN 1

    ELSE 0

    END

    ) AS Partition5

    FROM dbo.CustomerOrderHistory;

    ```


    **清单 16-8** 确认行数的查询


    查询中的第一列返回创建日期在 2022 年 1 月 1 日之前的记录计数。假设分区函数按预期对数据进行分区，图 16-5 中第一个分区显示的行数应与清单 16-8
    中第一列返回的值相匹配。清单 16-8 的查询结果如图 16-6 所示。


    ![](img/480547_2_En_16_Fig6_HTML.jpg)


    一个包含 6 列 2 行的表格。列分别描绘了分区 1、分区 2、分区 3、分区 4 和分区 5。分区 1、2、3、4 和 5 下的值分别为 0、0、0、802818
    和 3。


    **图 16-6** 显示行数的查询结果


    图 16-6 中的每一列都显示了每个日期范围内的记录数量。第一列代表创建日期在 2022 年 1 月 1 日之前的记录数。第二列是从 2022 年 1 月
    1 日开始直到但不包括 2022 年 4 月 1 日的创建日期的记录数。第三列对创建日期为 2022 年 4 月 1 日直到 2022 年 7 月 1 日的记录遵循类似的模式。最后一列适用于
    2022 年 10 月 1 日或之后创建的所有记录。将这五列的值与图 16-5 中的 `rows` 列进行比较，可以帮助你确认你的分区函数是否按预期工作。在你的例子中，图
    16-5 中 `rows` 列的值确实对应于图 16-6 中的列值。这证实了你的数据正按预期进行分区。

