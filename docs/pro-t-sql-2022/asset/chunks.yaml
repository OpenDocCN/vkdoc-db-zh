- fmt: '# Dynamic SQL


    Sometimes it is ideal to write T-SQL that can be reused in numerous and possibly
    different scenarios. In this section, you’ll learn how dynamic SQL can be used
    to allow for code reuse. This section should be reviewed with caution as there
    are many issues with dynamic SQL including the risk of allowing your database
    to be exploited or corrupted. This can happen by including a `;DELETE FROM dbo.Customer`
    as part of the input on a form. When this happens, it is referred to as a `SQL
    injection` because SQL code is being injected into the database.


    Depending on what T-SQL code you are trying to write, you may find it difficult
    to write your database code to use set-based design. In these situations, it may
    be tempting to write your code in a way that is more iterative. You may want to
    write T-SQL code that is highly variable and can be modified depending on the
    parameters and values passed into it. Dynamic SQL makes it so you can use a mixture
    of variables and T-SQL code to generate a SQL statement when the code is executed.
    Using dynamic SQL may seem like the solution you have been wanting. In most cases,
    the drawbacks of dynamic SQL can far outweigh the benefits, but there are times
    where dynamic SQL can be one of the right solutions.


    In Chapter [7](#480547_2_En_7_Chapter.xhtml), I covered how to read execution
    plans. When using dynamic SQL, a new execution plan needs to be calculated each
    time the query is executed. This causes additional strain on the database engine.


    ## 使用动态SQL的场景


    Most of the cases where you would want to use dynamic SQL involve times when you
    need additional flexibility. Many of the times where dynamic SQL is desirable
    relate to database administration activities. Most of these activities involve
    performing the same actions on more than one database on the SQL Server instance.
    There is some additional functionality available with dynamic SQL that can make
    using it especially appealing.


    When executing T-SQL, you cannot use a database name or a table name as a variable
    in standard T-SQL. Using dynamic SQL gives you the option to write queries that
    can be executed on more than database object.


    ## 动态SQL示例


    The query in Listing [13-21](#480547_2_En_13_Chapter.xhtml#PC21) shows an example
    of dynamic SQL.


    ```sql

    CREATE PROCEDURE dbo.TableByDynamicValues

    @TableName SYSNAME,

    @ColumnName SYSNAME,

    @ColumnValue NVARCHAR(25)

    AS

    DECLARE @ObjectID INT;

    DECLARE @ColumnList NVARCHAR(MAX);

    DECLARE @Query NVARCHAR(MAX);

    SET @ObjectID = OBJECT_ID(@TableName);

    SELECT @ColumnList = STRING_AGG (cast([name] as nvarchar(max)), '','')

    FROM sys.columns

    WHERE [object_id] = @ObjectID

    AND [name] NOT IN (N''IsActive'',N''DateCreated'',N''DateModified'',N''DateDisabled'')
    ;

    SET @Query =

    N''SELECT '' + @ColumnList +

    N'' FROM '' + @TableName +

    N'' WHERE '' + @ColumnName + N'' = @ColumnValue'';

    EXECUTE sp_executesql @Query,

    N''@ColumnName SYSNAME, @ColumnValue NVARCHAR(25)'',

    @ColumnName = @ColumnName,

    @ColumnValue = @ColumnValue;

    ```


    **Listing 13-21 Dynamically Retrieving Data from Tables**


    This query allows a user or application to pass in a table name. This is the table
    name that will be queried for values. The other two parameters allow a column
    name and a column value to be passed in as part of the query. This column name
    will be used to filter the data out. Listing 12-22 shows how this code functions.


    ```sql

    EXECUTE dbo.TableByDynamicValues N''Product'', N''ProductID'', N''1'';

    EXECUTE dbo.TableByDynamicValues N''Customer'', N''FirstName'', N''Marty`'';

    ```


    **Listing 13-22 Executing a Store Procedure with Different Values**


    There are two occurrences of the same stored procedure in Listing [13-22](#480547_2_En_13_Chapter.xhtml#PC22).
    The first execution returns results from the `Product` table. The second execution
    returns results from the `Customer` table. Executing the queries in Listing [13-22](#480547_2_En_13_Chapter.xhtml#PC22),
    you get the results in Table [13-4](#480547_2_En_13_Chapter.xhtml#Tab4).


    **Table 13-4 Dynamic SQL Results**


    | DateDisabled | ProductID | ProductName | ProductPrice |

    | --- | --- | --- | --- |

    | NULL | 1 | Telescope | 599.00 |


    | Address | City | Country | Customer ID | Date Disabled | First Name | LastName
    | Postal Code |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | 750 Cherry Rd | Memphis | United States | 410405 | 2022-08-30 | Marty` | Bethel
    | 38117 |


    The first set of data returned is the columns from the `Product` table for the
    `ProductID` of 1. The stored procedure in Listing [13-21](#480547_2_En_13_Chapter.xhtml#PC21)
    excludes the columns `IsActive`, `DateCreated`, `DateModified`, and `DateDisabled`.
    All other columns in the table are returned. The values in the second data set
    are the records from the `Customer` table for the `FirstName` of Marty`. From
    a software development perspective, this may seem like the ideal method to use
    when writing database code.


    ## 动态SQL的缺点


    However, this method of using T-SQL does not take how the database engine executes
    a query into consideration. This will cause SQL Server to generate a new execution
    plan each time the stored procedure is executed as the data being requested can
    change dramatically between each execution. While it may seem like dynamic SQL
    can help make your application code more flexible, there is a cost to this method
    of writing T-SQL. I have used dynamic SQL when trying to create an ETL process
    and I wanted to programmatically determine which tables had primary keys and which
    ones didn’t. Then I could easily generate a script that dropped primary keys only
    for those tables that had them. In general, I avoid using dynamic SQL for most
    scenarios when I need to write T-SQL code. Trying to write your code without dynamic
    SQL will encourage you to practice writing database code in a manner that uses
    the strengths of the SQL Server database engine.


    ## SQL注入风险


    Using dynamic SQL can also increase the risk that additional T-SQL code is executed
    beyond the purpose you originally intended. This type of behavior is referred
    to as `SQL injection`. The concept of SQL injection is that additional T-SQL code
    is inserted, or injected, into the original statement. The additional T-SQL code
    that has been inserted allows for functionality that was not originally intended
    for the query execution. This can include viewing data that should not be accessible
    to this user. This same user may also be able to modify data or database objects
    through SQL injection. If you want to use dynamic SQL, you can minimize the risk
    of SQL injection by using parameters to pass values to the dynamic SQL. The method
    of parameterizing the dynamic SQL will make it more difficult for users to view
    or modified data in ways that you did not intend.


    ## 总结与建议


    When writing T-SQL code, you want to write code that is functional and effective.
    This means writing code that is readable and maintainable. Writing code that can
    grow with your business is also a critical skill. If you are writing code to handle
    inserts and updates or variety of data modifications, you want to make sure you
    are writing code that is easily understood and supported going forward. During
    application development, consider how you want to handle disabling permissions
    or application functionality. If not, you want to consider strategies that allow
    you to deactivate data values in a way that does not break relationships between
    the tables in your database. You may also have to support legacy code. One of
    the challenges with supporting legacy code is making changes without breaking
    existing functionality. There are times you may need to pull data for reporting
    from your transactional database. Try to design your queries to allow for flexibility
    and reusability. While flexibility is good, also use caution as to how much flexibility
    you implement in your T-SQL code. After improving the functionality of your database
    code, you may find that you want to determine how to track changes to your data.
    You can learn about logging in Chapter [14](#480547_2_En_14_Chapter.xhtml).'
  raw: '## Dynamic SQL


    Sometimes it is ideal to write T-SQL that can be reused in numerous and possibly
    different scenarios. In this section, you’ll learn how dynamic SQL can be used
    to allow for code reuse. This section should be reviewed with caution as there
    are many issues with dynamic SQL including the risk of allowing your database
    to be exploited or corrupted. This can happen by including a `;DELETE FROM dbo.Customer`
    as part of the input on a form. When this happens, it is referred to as a `SQL
    injection` because SQL code is being injected into the database.


    Depending on what T-SQL code you are trying to write, you may find it difficult
    to write your database code to use set-based design. In these situations, it may
    be tempting to write your code in a way that is more iterative. You may want to
    write T-SQL code that is highly variable and can be modified depending on the
    parameters and values passed into it. Dynamic SQL makes it so you can use a mixture
    of variables and T-SQL code to generate a SQL statement when the code is executed.
    Using dynamic SQL may seem like the solution you have been wanting. In most cases,
    the drawbacks of dynamic SQL can far outweigh the benefits, but there are times
    where dynamic SQL can be one of the right solutions.


    In Chapter [7](#480547_2_En_7_Chapter.xhtml), I covered how to read execution
    plans. When using dynamic SQL, a new execution plan needs to be calculated each
    time the query is executed. This causes additional strain on the database engine.


    Most of the cases where you would want to use dynamic SQL involve times when you
    need additional flexibility. Many of the times where dynamic SQL is desirable
    relate to database administration activities. Most of these activities involve
    performing the same actions on more than one database on the SQL Server instance.
    There is some additional functionality available with dynamic SQL that can make
    using it especially appealing.


    When executing T-SQL, you cannot use a database name or a table name as a variable
    in standard T-SQL. Using dynamic SQL gives you the option to write queries that
    can be executed on more than database object. The query in Listing [13-21](#480547_2_En_13_Chapter.xhtml#PC21)
    shows an example of dynamic SQL.


