- fmt: '## 阅读与理解查询执行计划


    选择上述任一选项后，您即可开始与查询的执行计划进行交互。当使用这些 `T-SQL` 方法启用执行计划时，请记住在审阅完毕后将其功能关闭。


    一旦将 `SQL Server Management Studio` 设置为提供执行计划，您需要识别其中重要的项目。您需要知道如何解读执行计划中的流程，以更好地理解
    `SQL Server` 将如何执行该查询。同时，您也需要熟悉一些常见的执行计划形状，因为它们可能有助于加快发现潜在问题的速度。在执行计划中，您可能会发现额外的文本，这些文本能快速显示出已被确定为对查询执行产生负面影响的问题，包括导致结果返回速度缓慢。更好地理解所有这些元素将帮助您找到查询的痛点，从而确定需要重点关注的方向。


    ### 执行计划的阅读方向


    一旦获得执行计划，您就能更清楚地了解 `SQL Server` 将如何执行该查询。当我们阅读英文时，习惯从左到右、从 top 到 bottom 阅读。与此相比，执行计划中最左上角代表查询的结果。如果将其比作读书，当您从左向右移动时，您正在深入了解
    `SQL Server` 为获取结果集所采取的步骤。从上到下移动时也是如此。查看图 7-6 中的示例，您可以看到一个包含多个步骤的执行计划。


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig6_HTML.jpg)


    *`SQL Server` 执行计划的可视化表示快照。查询 1 的查询成本为 100%。三个向左的箭头描述了该计划的多个步骤。聚集索引扫描成本为 0%。排序成本为
    45%。并行操作成本为 27%。选择操作成本为 0%。*


    **图 7-6** 多步骤执行计划


    如果您从左向右阅读，可以看到 `SELECT` 语句返回结果的表示。向右移动，您可以看到 `SQL Server` 在获取结果集之前立即使用了并行操作。这意味着，如果您移动到最右侧的对象，那就是
    `SQL Server` 执行查询时采取的第一个操作。在本例中，`SQL Server` 执行此查询时的第一个步骤是执行聚集索引扫描（`Clustered
    Index Scan`）。了解这一点很重要，因为您可能会听到“从右向左阅读执行计划”的说法。在这种情况下，说话者指的是以 `SQL Server` 执行查询的相同方向来阅读执行计划。


    ### 初步分析执行计划


    当我刚开始处理执行计划时，很快就被其中包含的大量信息所淹没。我本想从头开始理解一切。然而，执行计划中的信息如此之多，最好从一些基础开始。通过多年的故障排除经验，我学会了通过寻找差异来开始我的分析。对于执行计划，没过多久我就能立即识别出问题。分析执行计划时，我检查的第一件事是与每个操作符（`operator`）关联的百分比。回到图
    7-6，百分比最高的操作符是 `Sort` 操作符，为 45%。此百分比表示 `SQL Server` 预计在每个查询执行步骤上花费的时间相对于其他步骤的比例。一个快速的优化方法可能是识别百分比最大的一个或多个操作符，并确定是否有办法重写查询或添加索引来提升性能。就图
    7-6 中的示例而言，移除 `ORDER BY` 子句可以提升查询性能，如果我们不需要对数据排序，这将是一个不错的选择。


    ### 观察箭头粗细


    我也会尝试识别任何两个操作符之间的箭头粗细不一致的地方。图 7-7 展示了两个并排的、不同的箭头以供比较。


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig7_HTML.jpg)


    *两个向左箭头的图像。左侧箭头是实心且细的，右侧箭头是空心且粗的。*


    **图 7-7** 执行计划中的箭头


    我了解到，线条粗细的差异表示了 `SQL Server` 在每个步骤中访问的数据量的相对大小。虽然有些查询比其他查询返回更多记录，因此会有更粗的线条，但您也会发现这样的执行计划：其中一个步骤的线条非常粗，而下一个步骤的线条却很细。这通常表明，线条较粗的步骤可以通过更高效地编写，只获取查询所需的数据。查看线条的粗细是您检查执行计划时可以做的事情之一。


    ### 排序操作符


    有时您希望数据以特定方式排序。例如，您可能希望按字母顺序或创建日期显示客户列表。排序可以在应用程序代码中进行，也可以在 `SQL Server` 中进行。如果您选择在
    `SQL Server` 中排序数据，您可能会在执行计划中看到一个 `Sort` 操作符。您可以在图 7-8 中看到 `Sort` 操作符的示例。


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig8_HTML.jpg)


    *一个展示 `Sort` 操作符图标的快照。该图标有一个向下的箭头，表示从 `A` 到 `Z` 的排序。图标右下角有两个平行的向左箭头。*


    **图 7-8** `Sort` 操作符


    您可能会在执行计划中看到 `Sort` 操作符。虽然有时 `Sort` 操作符是必要的，但您可能需要检查 `T-SQL` 代码，看看是否存在不必要的排序操作。例如，当返回需要以特定方式排序的数据时，排序操作可能是必需的。然而，在其他情况下，即使结果没有排序，`Sort`
    操作符也可能存在。例如，当比较两个表且至少其中一个表未排序时，就可能发生这种情况。这些排序是合并连接（`merge joins`）所必需的，并可能对查询性能产生负面影响。本章将在下一节讨论合并连接。在这些情况下，可以查看是否有可用于连接的索引已经对数据进行了排序。如果存在与
    `Sort` 操作符相关的警告，则可以获得更显著的性能提升。


    ### 执行计划中的警告


    执行计划最有用的功能之一是返回警告。理想情况下，您希望编写的 `T-SQL` 性能良好。这也意味着 `T-SQL` 不应返回带有警告的执行计划。有时您会收到作为执行计划一部分的警告。警告将如图
    7-9 所示。


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig9_HTML.jpg)


    *一个展示执行计划警告的快照。它描述了操作符在执行期间使用 `tempdb` 溢出数据，溢出事件为 1，并且有 12 个溢出线程。*


    **图 7-9** 执行计划中的警告


    看到警告的主要好处是，`SQL Server` 已识别出您的 `T-SQL` 代码中存在潜在问题。您应该调查返回的任何警告，并查看是否可以采取措施解决它们。虽然并非所有警告都相同，但上面的警告引用的是溢出到
    `tempdb` 的情况。此类警告通常意味着对查询返回行数的估计不准确。这可能导致查询的内存授予不正确，从而迫使 `SQL Server` 使用 `tempdb`。要解决此警告，您可能需要确认统计信息是最新的，并且您的表已正确建立索引。'
  raw: 'Choosing any of the above options allows you to start interacting with execution
    plans for your queries. When using any of these T-SQL methods to enable an execution
    plan, remember to turn the functionality off once you are finished reviewing the
    execution plans.


    Once you have set up SQL Server Management Studio to give you an execution plan,
    you want to identify items of significance in the execution plan. You need to
    know how to interpret the flow in the execution plan to better understand how
    SQL Server will execute the query. There are also some general shapes you need
    to be familiar with as they may help increase the speed to find potential issues.
    In the execution plan you may find additional text that quickly shows issues that
    have been determined to be negatively affecting the execution of your query, including
    causing the speed of results to be returned slowly. Having a better understanding
    of all these elements will help you figure out the pain points for your queries
    so that you can determine where to focus your efforts.


    Once you have an execution plan, you can get a better idea of exactly how SQL
    Server will execute that query. When we read English, we are accustomed to reading
    from left to right and from top to bottom. To compare this to execution plans,
    the uppermost left corner represents the result of the query. If we compare this
    to reading a book, as you move from left to right, you are drilling down into
    steps that SQL Server took to get the result set. The same is true when moving
    from top to bottom. Looking at the example in Figure [7-6](#480547_2_En_7_Chapter.xhtml#Fig6),
    you can see an execution plan with multiple steps.


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig6_HTML.jpg)


    A snapshot of the visual representation of S Q L server execution plan. Query
    1 has a query cost of 100%. 3 leftward arrow describes the multiple steps of the
    plan. The clustered index scan cost is 0%. The sort cost is 45%. Parallelism cost
    is 27%. The select cost is 0%.


    Figure 7-6


    Execution plan with multiple steps


    If you read from left to right, you can see the representation for the results
    returned with the SELECT. When you move to the right, you can see that SQL Server
    used parallelism immediately before getting the result set. This means that if
    you move to the right-most object, this is the first action SQL Server took when
    executing the query. In this case, the first step SQL Server performed when executing
    this query was a Clustered Index Scan. This is important to know because you may
    hear references to reading execution plans right to left. In these cases, the
    person is referring to reading the execution plan in the same way SQL Server executes
    the query.


    When I first started working with execution plans, I was quickly overwhelmed with
    the amount of information available in them. I wanted to understand everything
    from the beginning. However, there is so much information in an execution plan
    that it is best to start with some basics. Through my years of troubleshooting,
    I learned to start my analysis by finding differences. With the execution plans,
    it did not take long to identify the issues right away. The first thing I check
    when analyzing an execution plan is the percentage associated with each operator.
    Going back to Figure [7-6](#480547_2_En_7_Chapter.xhtml#Fig6), the operator with
    the highest percentage is the Sort operator with 45%. This percentage represents
    how long SQL Server expects to spend on each step of the query execution relative
    to the other steps. One of the quick wins can be to identify the operator or operators
    with the largest percentage and determine if there are ways to rewrite the query
    or add indexes that will improve performance. In the case of the example from
    Figure [7-6](#480547_2_En_7_Chapter.xhtml#Fig6), removing the ORDER BY can improve
    the performance of the query and would be a good choice if we do not need to order
    the data.


    I also try to identify any places where the arrows between two operators are not
    the same size relative to one another. There are two different arrows side by
    side in Figure [7-7](#480547_2_En_7_Chapter.xhtml#Fig7) for comparison.


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig7_HTML.jpg)


    An image of 2 leftward arrows. The left arrow is solid and thin and the right
    arrow is open and thick.


    Figure 7-7


    Arrows from execution plans


    I learned that the difference in the thickness of the lines indicated the relative
    amount of records SQL Server was accessing for each step. While there are some
    queries that are going to return more records than others and therefore have thicker
    lines, you will find execution plans where one step has a very thick line and
    the next step will have a thin line. This usually indicates that the step with
    the thicker line could be written more efficiently to only get the data needed
    by the query. Looking at the thickness of the lines is one of the things you can
    check when you look at execution plans.


    There are times when you want your data ordered in a specific way. For instance,
    you may want to show a list of customers alphabetically or by creation date. The
    customers can either be sorted within the application code or within SQL Server.
    If you choose to order the data within SQL Server, you may see a sort operator
    in your execution plan. You can see an example of what the sort operator looks
    like in Figure [7-8](#480547_2_En_7_Chapter.xhtml#Fig8).


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig8_HTML.jpg)


    A snapshot presents the icon of the Sort operator. The icon has a downward arrow
    that indicated the a to z. Two parallel leftward arrows are on the right bottom
    corner of the icon.


    Figure 7-8


    Sort operator


    You may see sort operators in your execution plans. While there are occasions
    where the sort operator is necessary, you may want to review your T-SQL code for
    instances where the sort operator may not be needed. For instance, sort operations
    can be needed when returning data in query that is ordered in a particular manner.
    However, there are other occasions when the sort operator is present even if the
    results are not ordered. For instance, this can happen when comparing two tables
    and at least one of them is not sorted. These sorts are required for merge joins
    and may negatively impact the performance of a query. This chapter will discuss
    merge joins in the next section. In these cases, see if there is an index that
    can be used for the join that already has the data sorted. Even more significant
    performance gains can be made when there is a warning related to the sort operator.


    One of the most helpful features of execution plans is when they return a warning.
    Ideally, you want to write T-SQL that performs well. This also means the T-SQL
    should not return execution plans with warnings. There will be times when you
    get a warning as part of your execution plan. The warning will look like Figure
    [7-9](#480547_2_En_7_Chapter.xhtml#Fig9).


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig9_HTML.jpg)


    A snapshot present a warning of the execution plan. It describes that the operator
    used tem d b to spill data during execution with spill eve 1 and 12 spilled thread.


    Figure 7-9


    Warning in an execution plan


    The main advantage of seeing a warning is that SQL Server has identified a potential
    issue with your T-SQL code. You should investigate any warnings that are returned
    and see if you can take steps to resolve them. While not all warnings are the
    same, the warning above is referencing spills to `tempdb`. This type of warning
    usually means there is a bad estimate and the number of rows returned in a query.
    This can cause the memory grant for the query to be incorrect, causing SQL Server
    to use `tempdb`. To resolve this warning, you may want to confirm that statistics
    are up to date and your tables are properly indexed.'
  trans: '## 阅读与理解查询执行计划


    选择上述任一选项后，您即可开始与查询的执行计划进行交互。当使用这些 `T-SQL` 方法启用执行计划时，请记住在审阅完毕后将其功能关闭。


    一旦将 `SQL Server Management Studio` 设置为提供执行计划，您需要识别其中重要的项目。您需要知道如何解读执行计划中的流程，以更好地理解
    `SQL Server` 将如何执行该查询。同时，您也需要熟悉一些常见的执行计划形状，因为它们可能有助于加快发现潜在问题的速度。在执行计划中，您可能会发现额外的文本，这些文本能快速显示出已被确定为对查询执行产生负面影响的问题，包括导致结果返回速度缓慢。更好地理解所有这些元素将帮助您找到查询的痛点，从而确定需要重点关注的方向。


    ### 执行计划的阅读方向


    一旦获得执行计划，您就能更清楚地了解 `SQL Server` 将如何执行该查询。当我们阅读英文时，习惯从左到右、从 top 到 bottom 阅读。与此相比，执行计划中最左上角代表查询的结果。如果将其比作读书，当您从左向右移动时，您正在深入了解
    `SQL Server` 为获取结果集所采取的步骤。从上到下移动时也是如此。查看图 7-6 中的示例，您可以看到一个包含多个步骤的执行计划。


    ![](img/480547_2_En_7_Fig6_HTML.jpg)


    *`SQL Server` 执行计划的可视化表示快照。查询 1 的查询成本为 100%。三个向左的箭头描述了该计划的多个步骤。聚集索引扫描成本为 0%。排序成本为
    45%。并行操作成本为 27%。选择操作成本为 0%。*


    **图 7-6** 多步骤执行计划


    如果您从左向右阅读，可以看到 `SELECT` 语句返回结果的表示。向右移动，您可以看到 `SQL Server` 在获取结果集之前立即使用了并行操作。这意味着，如果您移动到最右侧的对象，那就是
    `SQL Server` 执行查询时采取的第一个操作。在本例中，`SQL Server` 执行此查询时的第一个步骤是执行聚集索引扫描（`Clustered
    Index Scan`）。了解这一点很重要，因为您可能会听到“从右向左阅读执行计划”的说法。在这种情况下，说话者指的是以 `SQL Server` 执行查询的相同方向来阅读执行计划。


    ### 初步分析执行计划


    当我刚开始处理执行计划时，很快就被其中包含的大量信息所淹没。我本想从头开始理解一切。然而，执行计划中的信息如此之多，最好从一些基础开始。通过多年的故障排除经验，我学会了通过寻找差异来开始我的分析。对于执行计划，没过多久我就能立即识别出问题。分析执行计划时，我检查的第一件事是与每个操作符（`operator`）关联的百分比。回到图
    7-6，百分比最高的操作符是 `Sort` 操作符，为 45%。此百分比表示 `SQL Server` 预计在每个查询执行步骤上花费的时间相对于其他步骤的比例。一个快速的优化方法可能是识别百分比最大的一个或多个操作符，并确定是否有办法重写查询或添加索引来提升性能。就图
    7-6 中的示例而言，移除 `ORDER BY` 子句可以提升查询性能，如果我们不需要对数据排序，这将是一个不错的选择。


    ### 观察箭头粗细


    我也会尝试识别任何两个操作符之间的箭头粗细不一致的地方。图 7-7 展示了两个并排的、不同的箭头以供比较。


    ![](img/480547_2_En_7_Fig7_HTML.jpg)


    *两个向左箭头的图像。左侧箭头是实心且细的，右侧箭头是空心且粗的。*


    **图 7-7** 执行计划中的箭头


    我了解到，线条粗细的差异表示了 `SQL Server` 在每个步骤中访问的数据量的相对大小。虽然有些查询比其他查询返回更多记录，因此会有更粗的线条，但您也会发现这样的执行计划：其中一个步骤的线条非常粗，而下一个步骤的线条却很细。这通常表明，线条较粗的步骤可以通过更高效地编写，只获取查询所需的数据。查看线条的粗细是您检查执行计划时可以做的事情之一。


    ### 排序操作符


    有时您希望数据以特定方式排序。例如，您可能希望按字母顺序或创建日期显示客户列表。排序可以在应用程序代码中进行，也可以在 `SQL Server` 中进行。如果您选择在
    `SQL Server` 中排序数据，您可能会在执行计划中看到一个 `Sort` 操作符。您可以在图 7-8 中看到 `Sort` 操作符的示例。


    ![](img/480547_2_En_7_Fig8_HTML.jpg)


    *一个展示 `Sort` 操作符图标的快照。该图标有一个向下的箭头，表示从 `A` 到 `Z` 的排序。图标右下角有两个平行的向左箭头。*


    **图 7-8** `Sort` 操作符


    您可能会在执行计划中看到 `Sort` 操作符。虽然有时 `Sort` 操作符是必要的，但您可能需要检查 `T-SQL` 代码，看看是否存在不必要的排序操作。例如，当返回需要以特定方式排序的数据时，排序操作可能是必需的。然而，在其他情况下，即使结果没有排序，`Sort`
    操作符也可能存在。例如，当比较两个表且至少其中一个表未排序时，就可能发生这种情况。这些排序是合并连接（`merge joins`）所必需的，并可能对查询性能产生负面影响。本章将在下一节讨论合并连接。在这些情况下，可以查看是否有可用于连接的索引已经对数据进行了排序。如果存在与
    `Sort` 操作符相关的警告，则可以获得更显著的性能提升。


    ### 执行计划中的警告


    执行计划最有用的功能之一是返回警告。理想情况下，您希望编写的 `T-SQL` 性能良好。这也意味着 `T-SQL` 不应返回带有警告的执行计划。有时您会收到作为执行计划一部分的警告。警告将如图
    7-9 所示。


    ![](img/480547_2_En_7_Fig9_HTML.jpg)


    *一个展示执行计划警告的快照。它描述了操作符在执行期间使用 `tempdb` 溢出数据，溢出事件为 1，并且有 12 个溢出线程。*


    **图 7-9** 执行计划中的警告


    看到警告的主要好处是，`SQL Server` 已识别出您的 `T-SQL` 代码中存在潜在问题。您应该调查返回的任何警告，并查看是否可以采取措施解决它们。虽然并非所有警告都相同，但上面的警告引用的是溢出到
    `tempdb` 的情况。此类警告通常意味着对查询返回行数的估计不准确。这可能导致查询的内存授予不正确，从而迫使 `SQL Server` 使用 `tempdb`。要解决此警告，您可能需要确认统计信息是最新的，并且您的表已正确建立索引。'
- fmt: '# 执行计划中的行数估计


    执行计划包含其他元素，会提醒你潜在的性能问题。虽然警告可以为你提供关于`T-SQL`问题的具体建议，但执行计划中的其他项目并不会提供相同程度的指导。在创建执行计划时，`SQL
    Server`使用统计信息来猜测将返回的行数。`SQL Server`还会跟踪执行计划每个步骤中实际返回的行数。如果将鼠标悬停在运算符上，你可以看到类似图[7-10](#480547_2_En_7_Chapter.xhtml#Fig10)的内容。


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig10_HTML.jpg)


    图表展示了执行计划中集群索引扫描运算符的详细信息。两条箭头分别指示已读取的行数和待读取的行数，两者均为401409。


    图 7-10


    估计行数与实际行数


    第一条箭头指向此执行计划步骤实际返回的行数。第二条箭头指向估计返回的行数。在这个例子中，行数是匹配的。如果行数匹配或在相近范围内，你将不会遇到与估计相关的性能问题。如果这两个数字差异显著，你可能会得到一个性能不佳的执行计划。这可能是因为统计信息已过时，`SQL
    Server`无法准确确定将返回的行数。另一种可能性是，`SQL Server`可能为一组不同的值创建了执行计划。无论原因如何，如果你看到估计行数和实际行数之间存在较大差异，这是你应该调查的问题。


    通过阅读执行计划，你可以快速识别查询中存在性能问题的地方，以及可以采取哪些步骤来解决这些问题。这包括知道如何访问执行计划，以及了解估计执行计划与实际执行计划之间的区别。执行计划还具有多项功能，可帮助你快速识别可能的性能问题。通过查看箭头的大小，你可以判断通过执行计划中每个步骤的数据量相对大小。排序运算符可能提供一些见解，表明数据被排序的原因不仅仅是返回有序的结果集。你还可以查看估计和实际返回的行数，以帮助确定`SQL
    Server`是否有足够的信息来为你提供良好的执行计划。一旦你熟悉了执行计划的这些方面，你可能想调查`SQL Server`如何使用你的索引。


    ## 执行计划中的索引使用


    既然你已经熟悉了使用执行计划的基础知识，本节将讨论如何在执行计划中查看索引使用（或未使用）情况。这将包括根据`SQL Server`为查找所有相关数据必须访问索引中的数据量，其使用不同的运算符来访问数据。还有不同的运算符显示执行计划是否正在使用集群索引、非集群索引或堆。执行计划中索引使用的另一个方面是`SQL
    Server`如何查找索引中未包含的附加信息。这可能因表中是否有集群索引，或索引是否包含查询所需的所有列而有所不同。


    就管理`T-SQL`而言，我在各公司看到的最大差异之一是索引的管理方式。在某些情况下，开发团队负责编写所有`T-SQL`代码，包括索引创建。也有一些公司由数据库团队处理所有索引创建和维护。由于数据库管理员通常比开发人员对开发环境的访问权限少，我认为让两个团队合作可能是最有帮助的。数据库管理员可以发现性能不佳的索引，并且可能在设计适用于多个`T-SQL`查询的索引方面经验丰富。另一方面，开发人员可能更了解表的设计方式以及`T-SQL`代码如何使用这些表。


    有许多查询、健康检查和监控工具可以帮助你识别索引问题。你可以使用查询来查找哪些存储过程使用了相同的数据库对象，或者你可能有一个特定的查询来提高性能。一旦你从缓存中获取执行计划或生成当前的实际执行计划，你就可以开始调查潜在的性能问题。如前一节所述，你知道可以检查每个步骤的相对数据记录量，查看各种运算符和警告，并验证估计和实际返回的行数。你还可以查看索引在执行计划中的使用方式。


    在`SQL Server`中处理数据时，首选是尽快找到数据。当数据保存在集群索引中时，数据会根据索引的列进行排序。这意味着当`SQL Server`搜索集群索引时，数据是按顺序存储的。在最佳情况下，`SQL
    Server`会遍历数据并快速找到数据。如果发生这种情况，你会在执行计划中看到集群索引查找。执行计划中的集群索引查找看起来像图[7-11](#480547_2_En_7_Chapter.xhtml#Fig11)。


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig11_HTML.jpg)


    快照呈现了执行计划中集群索引查找的图标。图标右下角有两条平行的向左箭头。


    图 7-11


    集群索引查找图标


    看到集群索引查找，你就知道你的`T-SQL`代码写得足够好，能够快速找到数据。如果你在执行计划中没有看到集群索引查找，你可能想看看是否有办法重写你的`T-SQL`来使用一个。


    虽然理想情况是你的数据使用集群索引查找，但你可能会在执行计划中看到类似但不完全相同的内容。`SQL Server`有可能使用集群索引但未能快速找到数据。在这种情况下，`SQL
    Server`可能需要遍历索引的很大一部分。如果发生这种情况，你可能会在执行计划中看到集群索引扫描，如图[7-12](#480547_2_En_7_Chapter.xhtml#Fig12)所示。


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig12_HTML.jpg)


    快照呈现了执行计划中集群索引扫描的图标。图标右下角有两条平行的向左箭头。


    图 7-12


    集群索引扫描图标'
  raw: 'Execution plans have other elements that will alert you to potential performance
    issues. While warnings can give you specific advice about issues with your T-SQL,
    there are other items in your execution plan that do not provide the same level
    of guidance. When creating an execution plan, SQL Server uses statistics to make
    a guess as to the number of rows that will be returned. SQL Server also keeps
    track of the actual number of rows returned in each step of the execution plan.
    If you mouse over the operators, you can see something like Figure [7-10](#480547_2_En_7_Chapter.xhtml#Fig10).


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig10_HTML.jpg)


    A chart presents the details of the clustered Index Scan operator in the execution
    plan. Two arrows indicate the number of rows read, and the number of rows to be
    read, both are 401409.


    Figure 7-10


    Estimated vs. actual number of rows


    The first arrow points to the actual number of rows returned for this step of
    the execution plan. The second arrow points to the estimated number of rows returned.
    In this case, the numbers of rows match. If the numbers of rows match or are close
    in range, you will not have performance issues related to estimates. If the two
    numbers are significantly different, you may get an execution plan that does not
    perform as well as it could. This could be happening because the statistics are
    out of date, and SQL Server cannot accurately determine the number of rows that
    will be returned. Another possibility is that SQL Server may have created the
    execution plan for a different set of values. Regardless of the reason, if you
    see a large variation between the estimated and actual number of rows returned,
    this is something that you should investigate.


    By reading execution plans, you can quickly identify where there are performance
    issues in your queries and what steps you can take to solve those issues. This
    includes knowing how to access execution plans and knowing the difference between
    estimated and actual execution plans. Execution plans also have several features
    that help you quickly identify possible performance issues. By looking at the
    size of the arrows, you can tell the relative amount of data passing through each
    step in an execution plan. The sort operator may provide insights into data that
    is sorted for more reasons than returning an ordered result set. You can also
    look at the estimated and actual number of rows returned to help determine if
    SQL Server has enough information to give you a good execution plan. Once you
    have gotten familiar with these aspects of execution plans, you may want to investigate
    how SQL Server is using your indexes.


    ## Index Usage in Execution Plans


    Now that you are familiar with the basics of using execution plans, this section
    will discuss how to view index usage (or lack thereof) within an execution plan.
    This will include the different operators SQL Server uses when accessing the data
    depending on how much data in an index SQL Server must access to find all relevant
    data. There are also different operators showing if the execution plan is using
    a clustered index, non-clustered index, or a heap. Another aspect of index usage
    in execution plans is how SQL Server looks up additional information that is not
    contained in an index. This can differ based on whether there is a clustered index
    in the table or not, or if the index contains all columns needed for the query.


    In terms of managing T-SQL, one of the largest differences I have seen across
    companies is how indexes are managed. In some cases, the development teams own
    writing all the T-SQL code including index creation. There are also companies
    where the database team handles all index creation and maintenance. Since database
    administrators usually have less access to development than the developers, I
    believe it may be most helpful to have the two teams work together. The database
    administrators can find indexes that are performing poorly and may have more experience
    designing indexes for multiple T-SQL queries. On the other hand, the developers
    may have a better idea of how the tables are designed and how the T-SQL code uses
    those tables.


    There are many queries, health checks, and monitoring tools that can help you
    identify issues with your indexes. You can either use queries to find what stored
    procedures use the same database objects or you may have a specific query in mind
    to improve performance. Once you get the execution plan from the cache or generate
    the current actual execution plan, you can start looking into potential performance
    issues. As discussed in the previous section, you know that you can check the
    relative amount of data records for each step, look at various operators and warnings,
    and verify the estimated and actual number of rows returned. You can also look
    at how indexes are being used as part of your execution plan.


    When working with data in SQL Server, the preference is that data is found as
    quickly as possible. When data is saved in a clustered index, the data is sorted
    based on the columns of the index. This means that when SQL Server searches through
    a clustered index, the data is stored in order. In the best scenario, SQL Server
    looks through the data and finds the data quickly. If this happens, you will see
    a clustered index seek in the execution plan. The clustered index seek in the
    execution plan will look like Figure [7-11](#480547_2_En_7_Chapter.xhtml#Fig11).


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig11_HTML.jpg)


    A snapshot presents the icon of the clustered index seek in the execution plan.
    Two parallel leftward arrows are on the right bottom corner of the icon.


    Figure 7-11


    Clustered Index Seek icon


    Seeing a clustered index seek lets you know that your T-SQL code is written well
    enough to find the data quickly. If you do not see a clustered index seek in your
    execution plan, you may want to see if there is a way to rewrite your T-SQL to
    use one.


    While it is ideal for your data to use a clustered index seek, you may see something
    in your execution plan that looks similar but not the same. It is possible for
    SQL Server to use the clustered index but not find the data quickly. In this case,
    SQL Server may need to look through a significant percentage of the index. If
    this happens, you may see a clustered index scan in the execution plan as shown
    in Figure [7-12](#480547_2_En_7_Chapter.xhtml#Fig12).


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig12_HTML.jpg)


    A snapshot presents the icon of the clustered index scan in the execution plan.
    Two parallel leftward arrows are on the right bottom corner of the icon.


    Figure 7-12


    Clustered Index Scan icon'
