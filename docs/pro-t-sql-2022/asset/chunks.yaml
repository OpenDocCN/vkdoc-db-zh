- fmt: '#### TRY…CATCH


    在 T-SQL 代码中包含错误处理是有益的，并且可能被视为您工作场所的最佳实践。您希望应用程序能够优雅地处理失败的存储过程。一种情况是存储过程不幸成为死锁的牺牲品。`TRY…CATCH`
    块可以使涉及死锁的存储过程能够重新运行或优雅地退出。请参见清单 [9-9](#480547_2_En_9_Chapter.xhtml#PC9)。


    ```sql

    DECLARE @FirstName      VARCHAR(40) = ''Stacy'';

    DECLARE @LastName       VARCHAR(100) = ''Parks'';

    DECLARE @Address        VARCHAR(100) = ''123 Rua de Santa Catarina'';

    DECLARE @City           VARCHAR(100) = ''Porto'';

    DECLARE @PostalCode     VARCHAR(20) = ''1234-567'';

    DECLARE @County         VARCHAR(75) = ''Portugal'';

    BEGIN TRY

    BEGIN TRAN

    INSERT INTO dbo.Customer

    (

    FirstName,

    LastName,

    Address,

    City,

    PostalCode,

    Country

    )

    VALUES

    (

    @FirstName,

    @LastName,

    @Address,

    @City,

    @PostalCode,

    @County

    );

    COMMIT TRANSACTION

    END TRY

    BEGIN CATCH

    PRINT ''Insert Failed'';

    ROLLBACK TRANSACTION

    END CATCH

    Listing 9-9

    Query Using TRY…CATCH

    ```


    一旦确定了要在 T-SQL 编码标准中包含的内容，下一步就是获得也将编写 T-SQL 的同事或其他部门的认可。让每个人都同意一套标准可以解决许多问题。首先，它有助于新员工入职。当他们审查代码时，会看到一致的代码风格。这将使他们能够专注于
    T-SQL 的功能，而不是试图解读 T-SQL 代码的编写方式。


    如果您创建了一个详尽且定义明确的编码标准，那么当出现不被认为是最佳实践的 T-SQL 时，在脚本评审过程中应该会减少来回讨论。有了 T-SQL 编码标准，各方都知道什么是允许的，什么是不受欢迎或不好的做法。新员工也会知道什么是可接受的
    T-SQL。每个人都可以被要求遵守相同的标准，并且它允许其他人看到编写 T-SQL 的规则是公平的。


    # 10. 源代码控制


    编写可管理的 T-SQL 代码是一个有价值的目标，它建立在可理解和可维护代码的坚实基础之上。第 [4](#480547_2_En_4_Chapter.xhtml)
    章讨论了如何标准化您的 T-SQL 代码。这在第 [10](#480547_2_En_10_Chapter.xhtml) 章继续，即实施 SQL 编码标准。这个基础的目的是为您的数据库创建一致的代码库。虽然开发一致的代码库有助于提高代码质量，但如果您无法维护您的
    T-SQL 代码，这种效果就会减弱。


    开发可管理的 T-SQL 代码涵盖编写数据库代码的许多不同方面。前一章重点介绍了编码标准，以此作为指导您和其他人编写性能良好的 T-SQL 代码的方法。拥有性能良好且易于阅读的数据库代码可以帮助您的应用程序和开发过程。这条道路上的下一步是考虑如何存储您的代码。


    一个选择是使用源代码控制来保存与创建各种数据库对象相关的 T-SQL 代码。为什么源代码控制很重要，它能为改进 T-SQL 代码开发做些什么？知道您想实施源代码控制与定义管理源代码控制的过程是不同的。设置关于如何处理源代码控制的指导方针，使您处于一个良好的位置来开始在源代码控制中创建您的第一个数据库项目。


    ## 使用源代码控制的理由


    如果没有管理代码的方法，您最终可能会花费数小时审查脚本并为软件发布做准备。这种手动工作包括为脚本审查定位文件、手动比较生产环境和手动脚本之间的代码、确定在部署中包含哪些脚本，或在部署过程中手动运行每个脚本。这就是您可以从拥有可维护代码中受益的地方。这包括确保您可以找到任何数据库对象的
    T-SQL 代码。您还希望知道您正在修改的是正确版本的代码。当错误版本的 T-SQL 代码被修改和部署时，可能会发生严重问题。它还将帮助您知道在任何时间点需要部署什么版本的代码。由于这些原因，数据库代码可以从纳入源代码控制中受益。


    将 T-SQL 代码集中存放以便轻松访问可能是一个挑战。源代码控制可以帮助将所有 T-SQL 代码集中并有组织地存放在一起。源代码控制不再仅仅是应用程序开发所独有的。源代码控制允许您组织代码，并且它可以用来帮助围绕数据库开发创建结构。通过使用第三方工具作为提交、构建和部署过程的一部分，使用源代码控制可以更轻松地管理标准化您的
    T-SQL 和实施编码标准。当您对数据库代码进行更改时，您可以选择在本地进行这些更改。如果您选择使用 SQL Server Data Tools (SSDT)
    并将所有数据库代码保存在同一项目中，您可以一起构建所有数据库，以确认任何数据库依赖关系是否按预期工作。`SSDT` 允许您在有或没有源代码控制的情况下管理数据库代码。这比手动将代码部署到
    `SQL Server` 具有优势。作为构建过程的一部分，数据库项目将验证视图、函数、存储过程或其他 T-SQL 代码中的字段是否存在于数据库中。


    编写 T-SQL 代码时还可能出现其他问题。您可能会遇到多人或团队需要更改相同数据库对象的情况。根据公司处理代码部署的方式，您最终可能会得到一些具有多层更改的数据库对象。源代码控制可以帮助管理这些更改并确保它们得到正确实施。此外，定义管理代码的流程可以帮助每个人为其需求使用正确的数据库代码版本。


    如果您将所有数据库保存在同一解决方案中，可以在存在依赖关系时在数据库之间添加引用。如果从一个数据库的表中删除列，另一个数据库中依赖此列的存储过程将构建失败。构建失败会标识受影响的存储过程以及缺失的列引用。当您添加列或更改列名时，这可能特别有用。有时您可能想要重构表或其他数据库对象。如果您的应用程序和数据库保存在同一解决方案中，您将可以选择自动重构代码。


    对 T-SQL 代码的一些更改可能很复杂且涉及广泛。其他时候，您可能正在处理对运行公司至关重要的数据库对象或代码。要开始修改代码，您需要确保使用的是最新版本的代码。在实施源代码控制之前，我有一个非常手动的代码审查过程，非常耗时。由于实施了源代码控制，审查数据库代码的速度可以大大提高。使用源代码控制可以让您确保一致地实施更改。'
  raw: '#### TRY… CATCH


    Including error handling in T-SQL code can be helpful and may be considered best
    practice in your workplace. You want your application to gracefully handle procedures
    that fail. One of the situations you may find yourself in is in the unfortunate
    event that a stored procedure is a deadlock victim. The TRY… CATCH block can allow
    the deadlock stored procedure to either rerun or exit gracefully. See Listing
    [9-9](#480547_2_En_9_Chapter.xhtml#PC9).


    ```

    DECLARE @FirstName      VARCHAR(40) = ''Stacy'';

    DECLARE @LastName       VARCHAR(100) = ''Parks'';

    DECLARE @Address        VARCHAR(100) = ''123 Rua de Santa Catarina'';

    DECLARE @City           VARCHAR(100) = ''Porto'';

    DECLARE @PostalCode     VARCHAR(20) = ''1234-567'';

    DECLARE @County         VARCHAR(75) = ''Portugal'';

    BEGIN TRY

    BEGIN TRAN

    INSERT INTO dbo.Customer

    (

    FirstName,

    LastName,

    Address,

    City,

    PostalCode,

    Country

    )

    VALUES

    (

    @FirstName,

    @LastName,

    @Address,

    @City,

    @PostalCode,

    @County

    );

    COMMIT TRANSACTION

    END TRY

    BEGIN CATCH

    PRINT ''Insert Failed'';

    ROLLBACK TRANSACTION

    END CATCH

    Listing 9-9

    Query Using TRY… CATCH

    ```


    Once you have determined what you want to include in your T-SQL coding standards,
    the next step is to get buy-in from your coworkers or other departments that will
    also be writing T-SQL. Getting everyone to agree to a set standard can solve many
    issues. First, it helps those that are onboarding to the company. When they review
    code, they will see a consistent code style. This will allow them to focus on
    what the T-SQL is doing instead of trying to interpret how the T-SQL code is written.


    If you create a thorough and well-defined coding standard, there should be less
    back and forth during script reviews when there is T-SQL that is not believed
    to be best practice. With the T-SQL coding standard in place, all parties know
    what is allowed and what is deemed as undesirable or bad practice. New hires will
    also know what T-SQL is acceptable. Everyone can be held to the same standard,
    and it allows others to see that the rules for writing T-SQL are fair.


    # 10. Source Control


    Writing T-SQL code that is manageable is a worthwhile goal to build upon a solid
    foundation of understandable and maintainable code. Chapter [4](#480547_2_En_4_Chapter.xhtml)
    discussed how to standardize your T-SQL code. This continued in Chapter [10](#480547_2_En_10_Chapter.xhtml)
    with implementing SQL coding standards. The purpose of this foundation is to create
    a consistent code base for your database. While developing a consistent code base
    can help improve code quality, this effect is diminished if you are unable to
    maintain your T-SQL code.


    Developing manageable T-SQL code covers many different aspects of writing database
    code. The previous chapter focused on coding standards as a way to help guide
    you and others to writing T-SQL code that performs well. Having database code
    that performs well and is easy to read can help your applications and your development
    process. The next step on that path is to consider how you are storing your code.


    One option is to use source control to save T-SQL code associated with creating
    various database objects. Why is source control important and what can it do to
    help make T-SQL code development better? Knowing that you want to implement source
    control is different from defining a process for managing source control. Setting
    up guidelines on how to handle source control puts you in a good place to begin
    creating your first database project in source control.


    ## Reasons to Use Source Control


    Without having a way to manage code, you can end up spending hours reviewing scripts
    and preparing for software releases. This kind of manual work involves locating
    files for script review, manually comparing code between production and a manual
    script, figuring out which scripts to include in a deployment, or manually running
    each script as part of the deployment. This is where you can benefit from having
    maintainable code. This includes making sure you can find the T-SQL code for any
    database object. You also want to know that you are modifying the correct version
    of the code. Serious issues can occur when the wrong version of T-SQL code is
    modified and deployed. It will also help you to know what version of code needs
    to be deployed at any point in time. For these reasons, database code can benefit
    from incorporating source control.


    Keeping T-SQL code together to be easily accessed can be a challenge. Source control
    can help keep all T-SQL code together and organized. Source control is no longer
    something that only exists for application development. Source control allows
    you to organize code, and it can be used to help create structure around database
    development. Standardizing your T-SQL and implementing coding standards can be
    more easily managed with source control by using third-party tools as part of
    your commit, build, and deployment processes. When you make changes to database
    code, you have the option to make those changes locally. If you choose to use
    SQL Server Data Tools (SSDT) and keep all your database code in the same project,
    you can build all the databases together to confirm any database dependencies
    are working as expected. SSDT allows you to manage your database code with or
    without source control. This is an advantage over deploying code manually to SQL
    Server. As part of the build process, the database project will verify that the
    fields in your views, functions, stored procedures, or other T-SQL code exist
    within the database.


    There are other issues that can happen when writing T-SQL code. You may have times
    when multiple people or teams need to change the same database objects. Depending
    on how your company handles deploying code, you may end up with some database
    objects that have multiple layers of changes. Source control can help manage these
    changes and make sure they are implemented correctly. In addition, defining processes
    for managing code can help everyone use the correct version of database code for
    their needs.


    If you keep all your databases in the same solution, you can add references between
    databases if there are dependencies. If you remove a column from a table in one
    database, a stored procedure that depends on this column in another database will
    fail to build. The build failure identifies the affected stored procedure as well
    as the missing column reference. This can be especially useful when you are adding
    columns or changing column names. There may come a time when you want to refactor
    a table or some other database object. If your applications and databases are
    saved in the same solution, you will have the option to automatically refactor
    the code.


    Some changes to T-SQL code can be complex and involved. Other times you may be
    working with database objects or code that is critical to running your company.
    To start working on changing code, you want to make sure you are working with
    the most up-to-date version of the code. Prior to source control, I had a very
    manual process for reviewing code that was time consuming. As a result of implementing
    source control, the speed with which you can review database code can be greatly
    improved. Using source control allows you to ensure you are implementing your
    changes consistently.'
