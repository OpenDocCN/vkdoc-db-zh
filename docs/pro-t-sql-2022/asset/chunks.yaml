- fmt: '#### Persistent Temporary Table


    When working with temporary tables, you may want a table that can last beyond
    the closure of the session that created it. One thing to consider is if you plan
    on creating a temporary table that exists within `tempdb`, the table and the data
    will not be saved when SQL Server is restarted. In order to ensure that the persistent
    temporary table remains in `tempdb`, you need to use the techniques shown below.
    You can create a persistent temporary table by using the same sort of T-SQL as
    you would to create a table in a user database. An example of this database code
    is in Listing [2-33](#480547_2_En_2_Chapter.xhtml#PC33).


    ```

    USE tempdb;

    GO

    CREATE TABLE TempOrder

    (

    CustomerID      INT,

    CustomerOrderID INT,

    OrderAverage    DECIMAL(6,2)

    );

    Listing 2-33

    Creating a Persistent Temporary Table

    ```


    You can use the T-SQL code in Listing [2-33](#480547_2_En_2_Chapter.xhtml#PC33)
    to create a persistent table, but I recommend a method that is more consistent
    with the use of `tempdb`. Instead, you can create a stored procedure that executes
    when SQL Server starts. This stored procedure then creates any global temporary
    tables that you may need. You can use the T-SQL in Listing [2-34](#480547_2_En_2_Chapter.xhtml#PC34)
    to create a stored procedure to create global temporary tables.


    ```

    USE tempdb;

    GO

    CREATE PROCEDURE dbo.CreateGlobalTempOrder

    AS

    CREATE TABLE TempOrder

    (

    CustomerID      INT,

    CustomerOrderID INT,

    OrderAverage    DECIMAL(6,2)

    );

    Listing 2-34

    Creating a Stored Procedure for Recreating a Persistent Temporary Tables

    ```


    Once the stored procedure in Listing [2-34](#480547_2_En_2_Chapter.xhtml#PC34)
    is created, you modify the stored procedure options so that the stored procedure
    is executed when SQL Server restarts. The T-SQL in Listing [2-35](#480547_2_En_2_Chapter.xhtml#PC35)
    allows you to modify the stored procedure to execute on startup.


    ```

    EXECUTE sp_procoption ''CreateGlobalTempOrder'', ''startup'', ''true'';

    Listing 2-35

    Updating a Stored Procedure to Execute on Startup

    ```


    If you find yourself in a situation where you are considering a persistent temporary
    table, consider your environment and what potential difficulty is being added
    in terms of maintenance and knowledge sharing so that everyone is aware a mission
    critical table may exist on the `tempdb` database.


    ### Table Variables


    There are instances when you want to store data locally, but you know that the
    number of records you will be storing is limited. If you do not need to have the
    data available to other connections and it is acceptable to only have the data
    persist within the batch, then you may want to try using table variables. When
    it comes to using table variables, you also have the option to reuse the table
    variable as many times as you like if you are willing to keep everything in the
    same batch.


    Prior to SQL Server 2019, the estimated number of rows for a table variable was
    one record. Like other objects discussed previously in this chapter, SQL Server
    has made significant strides to improve general performance related to table variables.
    SQL Server is now capable of generating a more accurate estimated number of rows
    when it comes to using table variables. Part of executing a query involves SQL
    Server determining how to execute the query. SQL Server saves the method of how
    to execute the query in what is called an execution plan. Now that SQL Server
    estimates the number of rows more accurately, it also saves that logic in the
    execution plan.


    When the execution plan is first created, it is calculated using the original
    values provided in the parameters. However, some data tables may have an uneven
    distribution of number of records per value. If you find yourself in this situation
    where the data that will be pulled back with the table variable can be highly
    skewed, you may find that the T-SQL code will perform inconsistently. This concept
    is referred to as *parameter sniffing*. Now that the information about the table
    variable is getting stored in the execution plan, there is a higher probability
    of coming across parameter sniffing. While this may be troublesome, remember that
    SQL Server also generates an execution plan that can be highly efficient for at
    least some data values.


    Like temporary tables, table variables can be straightforward to create and use.
    Listing [2-36](#480547_2_En_2_Chapter.xhtml#PC36) shows the method to declare
    and populate a table variable.


    ```

    DECLARE @CustomerID INT = 234;

    DECLARE @TempOrder TABLE

    (

    CustomerID      INT,

    CustomerOrderID INT,

    OrderAverage    DECIMAL(6,2)

    );

    INSERT INTO @TempOrder

    (

    CustomerID,

    CustomerOrderID,

    OrderAverage

    )

    SELECT ord.CustomerID,

    ord.CustomerOrderID,

    AVG(dtl.QuantitySold * dtl.ProductPrice)

    AS OrderAverage

    FROM dbo.CustomerOrder ord

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    WHERE ord.CustomerID = @CustomerID

    GROUP BY ord.CustomerID,

    ord.CustomerOrderID;

    SELECT cus.FirstName,

    cus.LastName,

    AVG(OrderAverage) AS AverageOrder

    FROM dbo.Customer cus

    INNER JOIN @TempOrder ord

    ON cus.CustomerID = ord.CustomerID

    GROUP BY cus.FirstName, cus.LastName;

    Listing 2-36

    Declaring and Populating a Table Variable

    ```


    The execution plan for this query appears very similar to the one generated in
    Figure [2-18](#480547_2_En_2_Chapter.xhtml#Fig18) when populating the local temporary
    table. Figure [2-21](#480547_2_En_2_Chapter.xhtml#Fig21) shows the execution plan
    created when populating the table variable.


    ![](images/480547_2_En_2_Chapter/480547_2_En_2_Fig21_HTML.jpg)


    A flow diagram. T S Q L has a cost of 0% from table insert, compute scalar twice,
    stream aggregate, compute scalar, and nested loops. It is from index scan and
    clustered index seek.


    Figure 2-21


    Populating the table variable


    Now that SQL Server 2019 has been updated to allow for better estimates when using
    table variables, I expect the execution plans to get a more accurate number of
    rows in the table variable when creating the execution plan. This improved accuracy
    will help SQL Server create a more performant execution plan. However, double-check
    the query performance especially if you are planning on adding large quantities
    of data to the table variable.


    ### Temporary Stored Procedures


    If a stored procedure is created in the `tempdb` database, then this stored procedure
    is a temporary stored procedure. SQL Server may have made this functionality possible,
    but keep in mind how developers and applications will interact with this database
    object. At the very least, having a temporary stored procedure in the `tempdb`
    database will make it more difficult to troubleshoot or maintain code related
    to these stored procedures.


    ## Triggers


    SQL Server provides the ability to have specific actions occur as a result or
    instead of an insert, update, or delete. The reactions can occur as a result of
    a user logging into the system. There are other reactions that can happen after
    or prevent changes to the existing database. When dealing with applications and
    data, the most common type of reaction is in response to changing data in the
    database. Regardless of the reason, these reactions are defined as triggers. Triggers
    are a special type of stored procedure that responds to a specific action on the
    server, database(s), or table(s).'
