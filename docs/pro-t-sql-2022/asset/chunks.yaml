    | 3 | Cancelled | True | 2023-02-13 | 2023-02-13 |

    | 4 | Error | True | 2023-02-13 | 2023-02-13 |


    This table includes the status available when recording occurrences where someone
    has started preparing a customer order. To log each instance of a customer order
    being prepared, you need to create a table to store information about when each
    customer order is prepared. There are several ways this can be recorded. For the
    sake of this chapter, let’s create a single record each time a customer order
    is started. Once the customer order is started, the customer order can end up
    in a completed, cancelled, or error status. The query for storing the customer
