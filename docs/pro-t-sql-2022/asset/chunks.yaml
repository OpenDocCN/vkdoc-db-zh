  trans: '

    在活动之后执行触发器并不是数据操作触发器（trigger）的唯一选项。另一种可能是让触发器执行一个动作，而不是执行最初请求的操作。清单 2-40 展示了一个触发器，当用户发出删除（DELETE）请求时，该触发器将禁用一条记录。


    ```sql

    CREATE TRIGGER dbo.DisableProduct

    ON dbo.Product

    INSTEAD OF DELETE

    AS

    UPDATE prd

    SET IsActive = 0,

    DateDisabled = GETDATE()

    FROM dbo.Product prd

    INNER JOIN deleted del

    ON prd.ProductID = del.ProductID;

    Listing 2-40

    INSTEAD OF 触发器示例

    ```


    在 `SQL Server` 中使用 `DML` 触发器时，不止有一种选择。还可以为每个数据库对象设置多个触发器。对于每个 `INSERT`、`UPDATE`
    和 `DELETE` 操作，你最多可以拥有一个 `INSTEAD OF` 触发器。在同一个表或视图上，你也可以拥有多个 `AFTER` 触发器。由于允许的触发器数量众多，你还可以为每个
    `INSERT`、`UPDATE` 或 `DELETE` 操作指定哪个触发器应该最先运行，哪个应该最后运行。如果你对一个操作类型拥有多个 `AFTER` 触发器，那么这些触发器中的任何一个都可能以随机顺序运行。


    由于一个给定的数据库对象上可能存在多层触发器，测试这些触发器的功能就显得很重要。如同本章讨论的许多其他概念一样，了解触发器在负载下的表现有助于预判应用程序的性能。值得一提的是，触发器应谨慎使用。它们应该像我的示例那样简短。你不应该开始编写包含
    3 个游标的、长达 2000 行的触发器。


    ## 游标


    为了有效地使用关系数据库，通常至关重要的一点是以大块或集合的形式来思考流程和数据。在几乎所有场景中，目标都是编写能够利用这种基于集合（set-based）逻辑的
    `T-SQL`。


    虽然这是理想的方法，但你可能会遇到一种情况，觉得无法以大块的方式处理数据。在其中一些场景中，这可能意味着需要按行逐个处理数据。为了在 `SQL Server`
    中做到这一点，你需要使用游标（cursor）。游标是一种对象，它接收一个查询，并允许你循环遍历结果数据集的每一行。


    如果考虑采用这条路，必须承认 `SQL Server` 在处理一大块数据时性能最佳，而一次处理大量单个记录则不然。在遇到诱人的、需要处理逐行逻辑的场景时，也许是时候寻找另一个工具来更好地满足你的需求了。例如，当创建一个游标来依次连接到多个
    `SQL Server` 实例并执行任务时。虽然这超出了本书的范围，但解决这种特定情况的最佳方式可能是创建一个 `SQL Server` Integration
    Services (`SSIS`) 包来处理连接到各种 `SQL Server` 实例。


    还有其他时候，你可能需要使用 `T-SQL` 来生成一个结果集，其中返回的数据是相同的，但必须按位置或供应商信息进行分段。在这个例子中，可以使用 `SQL
    Server` Reporting Services (`SSRS`) 来达到相同的目标。然而，你的企业可能决定不使用 `SSRS`。因此，使用游标可能是正确的选择。我也遇到过需要使用特定的、按记录计算的值通过计算来更新数据的情况。在这种情况下，几乎不可能使用基于集合的逻辑来执行更新。


    虽然 `SQL Server` 可以处理这个任务，但最好由应用程序来处理这些变更。编写 `T-SQL` 的一个主要因素是意识到你的代码可能对 `SQL Server`
    产生的影响。这对于游标和触发器同样适用。触发器似乎是解决各种问题的快速方法，但触发器也会给服务器带来开销。想象一下，`SQL Server` 必须评估插入表中的每一条记录，以确定它是否符合触发器的条件，如果符合，那么
    `SQL Server` 还必须执行另一个操作。这对 `SQL Server` 来说是相当多的额外工作。


    游标可以帮助创建一个可重复的、一次处理一条记录的过程。虽然游标可以用来解决各种问题，但重要的是要记住，可能有其他方法可以在不使用游标的情况下实现相同的结果。如果你确定真的必须使用游标，下一步就是决定使用哪种类型的游标。虽然无论使用哪种类型，游标的概念是相同的，但游标的类型将决定游标内数据的功能性和可访问性。


    在为你的需求选择正确的游标类型时，请选择功能最少但能满足你需求的那一种。与功能更多的游标类型相比，这将有助于减少性能的负面影响。当你在 `SQL Server`
    中一次处理一条记录时，其性能几乎总是比以组为单位处理数据要差。


    游标选择一个数据集，一次提取一条记录，然后修改当前记录。一旦所需的操作完成，就可以提取下一条记录。了解可用的各种游标类型将使你能够选择正确的类型。

    '
- fmt: '## Forward-Only Cursors


    默认的游标类型称为只进游标。对于这种类型的游标，数据只能以单一方向获取。在只进游标中获取的记录可以对游标内获取的记录进行插入、更新和删除操作。如果记录之前已被更新过，则除非关闭并重新打开游标，否则不会再次获取该记录。也存在一些有限的情况，在记录被更新后，你仍可以在游标中返回相同的记录。清单
    [2-41](#480547_2_En_2_Chapter.xhtml#PC41) 展示了一个只进游标的例子。


    ```sql

    SET NOCOUNT ON;

    DECLARE

    @CustomerID      INT = 1,

    @CustomerOrderID INT,

    @CustomerName    VARCHAR(140),

    @message         VARCHAR(50);

    SELECT @CustomerName =

    FirstName + '' '' + LastName

    FROM dbo.Customer

    WHERE CustomerID = @CustomerID;

    PRINT ''------- Order History for '' + @CustomerName + '' -------'';

    DECLARE customer_cursor CURSOR FORWARD_ONLY

    FOR

    SELECT CustomerOrderID

    FROM dbo.CustomerOrder

    WHERE CustomerID = @CustomerID

    ORDER BY CustomerOrderID;

    OPEN customer_cursor;

    FETCH NEXT FROM customer_cursor

    INTO @CustomerOrderID;

    WHILE @@FETCH_STATUS = 0

    BEGIN

    PRINT '' '';

    SELECT @message = ''----- Order Number:'' +

    CAST(@CustomerOrderID AS VARCHAR(8)) +

    ''-----'';

    PRINT @message;

    SELECT prd.ProductName,

    dtl.QuantitySold,

    dtl.ProductPrice

    FROM dbo.OrderDetail dtl

    INNER JOIN dbo.Product prd

    ON dtl.ProductID = prd.ProductID

    WHERE dtl.CustomerOrderID =

    @CustomerOrderID;

    FETCH NEXT FROM customer_cursor INTO

    @CustomerOrderID;

    END;

    CLOSE customer_cursor;

    DEALLOCATE customer_cursor;

    ```


    清单 2-41

    只进游标示例


    这个只进游标生成了一个包含特定客户所有订单及其所有产品的列表。在图 [2-24](#480547_2_En_2_Chapter.xhtml#Fig24) 中，你可以看到使用输出到文本窗口时的结果。


    ![](images/480547_2_En_2_Chapter/480547_2_En_2_Fig24_HTML.jpg)


    一个屏幕截图展示了特定客户的所有订单列表。它包括产品名称、销售数量和产品价格。


    图 2-24


    只进游标的输出


    虽然这产生了所需的输出，但需谨记其性能影响。在图 [2-25](#480547_2_En_2_Chapter.xhtml#Fig25) 中，你可以查看此游标执行计划的一部分。


    ![](images/480547_2_En_2_Chapter/480547_2_En_2_Fig25_HTML.jpg)


    一个屏幕截图展示了只进游标的执行计划。查询 4 和 6 突出了缺失的索引。查询成本相对于批次在查询 4 中是 33%，在查询 5 中是 0，在查询 6 中是
    33%。


    图 2-25


    只进游标的执行计划


    重要的是要记住，图中第二和第三部分将为游标中处理的每一行重新运行。如果底层查询快速且执行高效，这可能不是问题。然而，如果游标内的查询存在任何性能问题，游标可能会严重加剧这些性能问题。


    ## Static Cursors


    有时你希望能够在运行游标时向前和向后移动。使用静态游标时，可用的结果集自游标首次打开后就不会改变。静态游标可以选择为只读或允许读写。如果游标是只读的，则无法修改数据。如果数据被修改，则无法保证游标会拉回修改后的数据。


    ## Keyset Cursors


    在定义游标时，可能存在一组构成唯一条目的列。如果可以找到这组唯一数据，并且你需要能够与已更改的记录进行交互，那么使用键集游标可能是一个选项。键集是从唯一列集合中提取的一组键。游标可以向前和向后移动，但检测订单更改的唯一方法是关闭并重新打开属于游标的记录。


    ## Dynamic Cursors


    如果其他游标不适用于你的情况，还有最后一种游标类型可用。由于潜在的性能影响，应尽可能少地使用这种类型的游标。动态游标允许你在结果集中向前和向后移动。此外，它将感知对数据所做的更改。虽然处理事务隔离级别超出了本书的范围，但动态游标在涉及事务隔离级别时有一些额外的注意事项。所有已提交事务的更改都将是可见的。然而，只有当游标的事务隔离级别设置为未提交读时，才能找到未提交事务的更改。


    在本节前面，我展示了如何创建只进游标。创建游标的有趣之处在于，在切换各种游标类型时，代码变化不大。游标类型之间的最大区别在于每个游标可以访问哪些数据更改以及数据如何被获取。最大的诱惑之一是游标的工作方式与应用程序代码非常相似。游标不是一次性处理大量数据，而是循环遍历数据。在应用程序代码中，这是访问数据的首选方法，这使得使用游标更具诱惑力。


    我最常遇到游标被用于处理本可以由应用程序更好地处理的流程。你可能会发现自己处于一种情况，游标似乎是唯一可用的解决方案之一。参考清单 [2-42](#480547_2_En_2_Chapter.xhtml#PC42)，你可以了解动态游标可以是什么样子。


    ```sql

    SET NOCOUNT ON;

    DECLARE

    @CustomerID      INT = 1,

    @CustomerOrderID INT,

    @CustomerName    VARCHAR(140),

    @message         VARCHAR(50);

    SELECT @CustomerName =

    FirstName + '' '' + LastName

    FROM dbo.Customer

    WHERE CustomerID = @CustomerID;

    PRINT ''------- Order History for '' + @CustomerName + '' -------'';

    DECLARE customer_cursor CURSOR DYNAMIC

    FOR

    SELECT CustomerOrderID

    FROM dbo.CustomerOrder

    WHERE CustomerID = @CustomerID

    ORDER BY CustomerOrderID;

    OPEN customer_cursor;

    FETCH NEXT FROM customer_cursor

    INTO @CustomerOrderID;

    WHILE @@FETCH_STATUS = 0

    BEGIN

    PRINT '' '';

    SELECT @message = ''----- Order Number:'' + CAST(@CustomerOrderID AS VARCHAR(8))
    + ''-----'';

    PRINT @message;

    SELECT prd.ProductName, dtl.QuantitySold, dtl.ProductPrice

    FROM dbo.OrderDetail dtl

    INNER JOIN dbo.Product prd

    ON dtl.ProductID = prd.ProductID

    WHERE dtl.CustomerOrderID = @CustomerOrderID;

    FETCH NEXT FROM customer_cursor INTO @CustomerOrderID;

    END;

    CLOSE customer_cursor;

    DEALLOCATE customer_cursor;

    ```


    清单 2-42

    创建动态游标


    将游标类型从 `FORWARD_ONLY` 更改为 `DYNAMIC` 就像交换这两个短语一样简单。这些游标的输出也是相同的。真正可能发生的差异是在幕后。如果在游标运行时记录发生了变化，只进游标可能无法感知该更改，而动态游标可能能够滚动访问该更改，或者在某些情况下，动态游标可能在更改提交之前就发现了它。


    在本章中，我介绍了在编写 T-SQL 时可用的几种不同类型的数据库对象。这些对象可以帮助提高代码的可读性。虽然在某些情况下，其中一些数据库对象可以提高性能，但这些数据库对象都不是设计来解决每一个技术挑战的。有些情况下，使用错误的数据库对象可能对数据库和你的应用程序代码产生负面的性能影响。现在你知道了何时使用每种数据库对象，是时候开始考虑你编写的代码质量了。'
  raw: '### Forward-Only Cursors


    The default type of cursor is called the forward-only cursor. For this type of
    cursor, the data can only be fetched in one direction. Records fetched in forward-only
    cursors can insert, update, and delete records that are fetched within the cursor.
    If a record has been updated previously, it will not be fetched again unless the
    cursor is closed and reopened. There are also limited cases where you can return
    the same record within the cursor after it has already been updated. Listing [2-41](#480547_2_En_2_Chapter.xhtml#PC41)
    shows an example of forward-only cursor.


    ```

    SET NOCOUNT ON;

    DECLARE

    @CustomerID      INT = 1,

    @CustomerOrderID INT,

    @CustomerName    VARCHAR(140),

    @message         VARCHAR(50);

    SELECT @CustomerName =

    FirstName + '' '' + LastName

    FROM dbo.Customer

    WHERE CustomerID = @CustomerID;

    PRINT ''------- Order History for '' + @CustomerName + '' -------'';

    DECLARE customer_cursor CURSOR FORWARD_ONLY

    FOR

    SELECT CustomerOrderID

    FROM dbo.CustomerOrder

    WHERE CustomerID = @CustomerID

    ORDER BY CustomerOrderID;

    OPEN customer_cursor;

    FETCH NEXT FROM customer_cursor

    INTO @CustomerOrderID;

    WHILE @@FETCH_STATUS = 0

    BEGIN

    PRINT '' '';

    SELECT @message = ''----- Order Number:'' +

    CAST(@CustomerOrderID AS VARCHAR(8)) +

    ''-----'';

    PRINT @message;

    SELECT prd.ProductName,

    dtl.QuantitySold,

    dtl.ProductPrice

    FROM dbo.OrderDetail dtl

    INNER JOIN dbo.Product prd

    ON dtl.ProductID = prd.ProductID

    WHERE dtl.CustomerOrderID =

    @CustomerOrderID;

    FETCH NEXT FROM customer_cursor INTO

    @CustomerOrderID;

    END;

    CLOSE customer_cursor;

    DEALLOCATE customer_cursor;

    Listing 2-41

    Example of a Forward-Only Cursor

    ```


    This forward-only cursor generates a list of all customer orders with all the
    products per order. In Figure [2-24](#480547_2_En_2_Chapter.xhtml#Fig24), you
    can find what this result is when using the output to text window.


    ![](images/480547_2_En_2_Chapter/480547_2_En_2_Fig24_HTML.jpg)


    A screenshot illustrates the list of all customer orders for a particular customer.
    It includes the product name, quantity sold, and product price.


    Figure 2-24


    Output from the forward-only cursor


    While this produced the output wanted, keep in mind the performance impact. In
    Figure [2-25](#480547_2_En_2_Chapter.xhtml#Fig25), you can review part of the
    execution plan for this cursor.


    ![](images/480547_2_En_2_Chapter/480547_2_En_2_Fig25_HTML.jpg)


    A screenshot illustrates the execution plan for a forward-only cursor. Query 4
    and 6 highlight the missing index. Query cost relative to the batch is 33% in
    query 4, 0 in query 5, and 33% in Query 6.


    Figure 2-25


    Execution plan for a forward-only cursor


    It is important to remember that the second and third sections of this figure
    will rerun for each row processed in this cursor. When the underlying queries
    are quick and perform efficiently, that may not be an issue. However, if the queries
    inside the cursor have any performance issues at all, a cursor can severely exacerbate
    any of these performance issues.


    ### Static Cursors


    Sometimes you want to be able to move backward and forward when running the cursor.
    When using a static cursor, the available result set does not change from when
    the cursor is first opened. The static cursor has the option to be read only or
    allow reads and writes. When the cursor is read only, data cannot be modified.
    If the data is modified, there is no guarantee that the cursor will pull back
    the modified data.


    ### Keyset Cursors


    When defining a cursor, there may be a set of columns that create a unique entry.
    If that set of unique data can be found and you need to be able to interact with
    records that have changed, using the keyset cursor may be an option. The keyset
    is a set of keys from a unique set of columns. The cursor can move backward and
    forward, but the only way to detect changes to the order are the records that
    belong in the cursor to close and reopen the cursor.


    ### Dynamic Cursors


    If the other cursors don’t work for your situation, there is a final type of cursor
    available. This type of cursor should be used as infrequently as possible due
    to the potential performance implications. The dynamic cursor allows you to move
    forward and backward through the result set. In addition, it will be aware of
    changes made to the data. While dealing with transaction levels is outside the
    scope of this book, there are some additional caveats for dynamic cursors when
    related to transaction levels. All changes from committed transactions will be
    visible. However, the only way uncommitted transactions can be found if the transaction
    level of the cursor is set to uncommitted.


    Earlier in this section, I showed how to create a forward-only cursor. The interesting
    thing about creating cursors is that the code does not change significantly when
    switching between the various types of cursor. The largest difference between
    the cursor types is what data modifications each cursor can access and how the
    data is fetched. One of the largest temptations is that cursors work very similarly
    to application code. Instead of handling large quantities all at once, the cursors
    loop through data. In application code, this is the preferred method of accessing
    data, which makes using cursors even more tempting.


    Where I have had cursors most used is to handle processes that could be better
    handled by applications. You may find yourself in a situation where a cursor seems
    like one of the only solutions available. Referring to Listing [2-42](#480547_2_En_2_Chapter.xhtml#PC42),
    you can get an idea of what a dynamic cursor can be.


    ```

    SET NOCOUNT ON;

    DECLARE

    @CustomerID      INT = 1,

    @CustomerOrderID INT,

    @CustomerName    VARCHAR(140),

    @message         VARCHAR(50);

    SELECT @CustomerName =

    FirstName + '' '' + LastName

    FROM dbo.Customer

    WHERE CustomerID = @CustomerID;

    PRINT ''------- Order History for '' + @CustomerName + '' -------'';

    DECLARE customer_cursor CURSOR DYNAMIC

    FOR

    SELECT CustomerOrderID

    FROM dbo.CustomerOrder

    WHERE CustomerID = @CustomerID

    ORDER BY CustomerOrderID;

    OPEN customer_cursor;

    FETCH NEXT FROM customer_cursor

    INTO @CustomerOrderID;

    WHILE @@FETCH_STATUS = 0

    BEGIN

    PRINT '' '';

    SELECT @message = ''----- Order Number:'' + CAST(@CustomerOrderID AS VARCHAR(8))
    + ''-----'';

    PRINT @message;

    SELECT prd.ProductName, dtl.QuantitySold, dtl.ProductPrice

    FROM dbo.OrderDetail dtl

    INNER JOIN dbo.Product prd

    ON dtl.ProductID = prd.ProductID

    WHERE dtl.CustomerOrderID = @CustomerOrderID;

    FETCH NEXT FROM customer_cursor INTO @CustomerOrderID;

    END;

    CLOSE customer_cursor;

    DEALLOCATE customer_cursor;

    Listing 2-42

    Creating a Dynamic Cursor

    ```


    Changing the cursor type from FORWARD_ONLY to DYNAMIC is as easy as swapping out
    the phrases for one another. The output of these cursors is also the same. The
    real difference that could have happened is behind the scenes. If a record changed
    while the cursor was running, the forward-only cursor may not have been aware
    of that change, whereas the dynamic cursor may have been able to scroll to access
    that change or in certain scenarios the dynamic cursor may have found the change
    before it was committed.


    Throughout this chapter, I covered several different types of database objects
    that are available to use when writing T-SQL. These objects can help make code
    more readable. While some of these database objects can improve performance in
    the right circumstances, none of these database objects are designed to resolve
    every technical challenge. There are situations where using the wrong database
    objects can have a negative performance impact on the database and your application
    code. Now that you know when to use each database object, it is time to start
    considering the quality of code you write.'
  trans: '

    ## 只进游标


    默认的游标类型称为只进游标。对于这种类型的游标，数据只能以单一方向获取。可以在只进游标中对获取的记录执行插入、更新和删除操作。如果记录之前已被更新过，则除非关闭并重新打开游标，否则不会再次获取该记录。也存在一些有限的情况，在记录被更新后，你仍可以在游标中返回相同的记录。清单
    2-41 展示了一个只进游标的例子。


    ```sql

    SET NOCOUNT ON;

    DECLARE

    @CustomerID      INT = 1,

    @CustomerOrderID INT,

    @CustomerName    VARCHAR(140),

    @message         VARCHAR(50);

    SELECT @CustomerName =

    FirstName + '' '' + LastName

    FROM dbo.Customer

    WHERE CustomerID = @CustomerID;

    PRINT ''------- Order History for '' + @CustomerName + '' -------'';

    DECLARE customer_cursor CURSOR FORWARD_ONLY

    FOR

    SELECT CustomerOrderID

    FROM dbo.CustomerOrder

    WHERE CustomerID = @CustomerID

    ORDER BY CustomerOrderID;

    OPEN customer_cursor;

    FETCH NEXT FROM customer_cursor

    INTO @CustomerOrderID;

    WHILE @@FETCH_STATUS = 0

    BEGIN

    PRINT '' '';

    SELECT @message = ''----- Order Number:'' +

    CAST(@CustomerOrderID AS VARCHAR(8)) +

    ''-----'';

    PRINT @message;

    SELECT prd.ProductName,

    dtl.QuantitySold,

    dtl.ProductPrice

    FROM dbo.OrderDetail dtl

    INNER JOIN dbo.Product prd

    ON dtl.ProductID = prd.ProductID

    WHERE dtl.CustomerOrderID =

    @CustomerOrderID;

    FETCH NEXT FROM customer_cursor INTO

    @CustomerOrderID;

    END;

    CLOSE customer_cursor;

    DEALLOCATE customer_cursor;

    ```


    清单 2-41

    只进游标示例


    这个只进游标生成了一个包含特定客户所有订单及其所有产品的列表。在图 2-24 中，你可以看到使用输出到文本窗口时的结果。


    ![](img/480547_2_En_2_Fig24_HTML.jpg)


    一个屏幕截图展示了特定客户的所有订单列表。它包括产品名称、销售数量和产品价格。


    图 2-24


    只进游标的输出


    虽然这产生了所需的输出，但需谨记其性能影响。在图 2-25 中，你可以查看此游标执行计划的一部分。


    ![](img/480547_2_En_2_Fig25_HTML.jpg)


    一个屏幕截图展示了只进游标的执行计划。查询 4 和 6 突出了缺失的索引。查询成本相对于批次在查询 4 中是 33%，在查询 5 中是 0，在查询 6 中是
    33%。


    图 2-25


    只进游标的执行计划


    重要的是要记住，图中第二和第三部分将为游标中处理的每一行重新运行。如果底层查询快速且执行高效，这可能不是问题。然而，如果游标内的查询存在任何性能问题，游标可能会严重加剧这些性能问题。


    ## 静态游标


    有时你希望能够在运行游标时向前和向后移动。使用静态游标时，可用的结果集自游标首次打开后就不会改变。静态游标可以选择为只读或允许读写。如果游标是只读的，则无法修改数据。如果数据被修改，则无法保证游标会拉回修改后的数据。


    ## 键集游标


    在定义游标时，可能存在一组构成唯一条目的列。如果可以找到这组唯一数据，并且你需要能够与已更改的记录进行交互，那么使用键集游标可能是一个选项。键集是从唯一列集合中提取的一组键。游标可以向前和向后移动，但检测订单更改的唯一方法是关闭并重新打开属于游标的记录。


    ## 动态游标


    如果其他游标不适用于你的情况，还有最后一种游标类型可用。由于潜在的性能影响，应尽可能少地使用这种类型的游标。动态游标允许你在结果集中向前和向后移动。此外，它将感知对数据所做的更改。虽然处理事务隔离级别超出了本书的范围，但动态游标在涉及事务隔离级别时有一些额外的注意事项。所有已提交事务的更改都将是可见的。然而，只有当游标的事务隔离级别设置为未提交读时，才能找到未提交事务的更改。


    在本节前面，我展示了如何创建只进游标。创建游标的有趣之处在于，在切换各种游标类型时，代码变化不大。游标类型之间的最大区别在于每个游标可以访问哪些数据更改以及数据如何被获取。最大的诱惑之一是游标的工作方式与应用程序代码非常相似。游标不是一次性处理大量数据，而是循环遍历数据。在应用程序代码中，这是访问数据的首选方法，这使得使用游标更具诱惑力。


    我最常遇到游标被用于处理本可以由应用程序更好地处理的流程。你可能会发现自己处于一种情况，游标似乎是唯一可用的解决方案之一。参考清单 2-42，你可以了解动态游标可以是什么样子。


    ```sql

    SET NOCOUNT ON;

    DECLARE

    @CustomerID      INT = 1,

    @CustomerOrderID INT,

    @CustomerName    VARCHAR(140),

    @message         VARCHAR(50);

    SELECT @CustomerName =

    FirstName + '' '' + LastName

    FROM dbo.Customer

    WHERE CustomerID = @CustomerID;

    PRINT ''------- Order History for '' + @CustomerName + '' -------'';

    DECLARE customer_cursor CURSOR DYNAMIC

    FOR

    SELECT CustomerOrderID

    FROM dbo.CustomerOrder

    WHERE CustomerID = @CustomerID

    ORDER BY CustomerOrderID;

    OPEN customer_cursor;

    FETCH NEXT FROM customer_cursor

    INTO @CustomerOrderID;

    WHILE @@FETCH_STATUS = 0

    BEGIN

    PRINT '' '';

    SELECT @message = ''----- Order Number:'' + CAST(@CustomerOrderID AS VARCHAR(8))
    + ''-----'';

    PRINT @message;

    SELECT prd.ProductName, dtl.QuantitySold, dtl.ProductPrice

    FROM dbo.OrderDetail dtl

    INNER JOIN dbo.Product prd

    ON dtl.ProductID = prd.ProductID

    WHERE dtl.CustomerOrderID = @CustomerOrderID;

    FETCH NEXT FROM customer_cursor INTO @CustomerOrderID;

    END;

    CLOSE customer_cursor;

    DEALLOCATE customer_cursor;

    ```


    清单 2-42

    创建动态游标


    将游标类型从 `FORWARD_ONLY` 更改为 `DYNAMIC` 就像交换这两个短语一样简单。这些游标的输出也是相同的。真正可能发生的差异是在幕后。如果在游标运行时记录发生了变化，只进游标可能无法感知该更改，而动态游标可能能够滚动访问该更改，或者在某些情况下，动态游标可能在更改提交之前就发现了它。


    在本章中，我介绍了在编写 T-SQL 时可用的几种不同类型的数据库对象。这些对象可以帮助提高代码的可读性。虽然在某些情况下，其中一些数据库对象可以提高性能，但这些数据库对象都不是设计来解决每一个技术挑战的。有些情况下，使用错误的数据库对象可能对数据库和你的应用程序代码产生负面的性能影响。现在你知道了何时使用每种数据库对象，是时候开始考虑你编写的代码质量了。

    '
- fmt: "# 3. Standardizing T-SQL\n\nCreating a method for how you write your code\
    \ can help increase the speed at which you and others can understand the purpose\
    \ of the code. How many times have you written code and come back to it later\
    \ and not understood what it was doing? The goal is that if you follow good practices\
    \ for formatting, naming, and commenting your T-SQL, it will be easier and faster\
    \ to understand the purpose of the T-SQL. While determining these standards can\
    \ take some extra time upfront, the cost savings in the long run will be worth\
    \ it.\n\nWriting T-SQL that is understandable helps you and your company. Many\
    \ other coding languages have standards or best practices, and I believe that\
    \ T-SQL should be no different. While the primary goal of writing T-SQL may be\
    \ to implement a piece of functionality, no less important is the secondary goal\
    \ of making sure that your T-SQL makes sense. Over time, code changes or bugs\
    \ are found. The more readable and understandable your T-SQL code is, the easier\
    \ it is to modify or troubleshoot.\n\n## Formatting T-SQL\n\nHow T-SQL looks when\
    \ it is written can be as significant as what is written. Like other application\
    \ code, there is always a chance that someone will need to look at your code in\
    \ the future or you will need to look at theirs. If I am not writing new code,\
    \ I am looking at pre-existing code to understand its purpose, to debug the code,\
    \ to performance tune the query, or to update the business logic. Depending on\
    \ why I am reviewing the code, I generally determine what is important to me at\
    \ the time.\n\nIf I am looking at the T-SQL code to understand what the code does,\
    \ I review any comments and the tables involved to understand what application\
    \ may be using this T-SQL code. I am not concerned with how tables are joined\
    \ together as I expect that to be functioning correctly, although incorrect logic\
    \ on table joins can be a cause of queries returning very unexpected results.\
    \ Next, I look at the criteria used to filter the results of the T-SQL code. Only\
    \ at the very end of my analysis will I review the columns returned in the query.\
    \ Oftentimes I am only concerned with the columns if there is special business\
    \ logic involved. Applying this thought pattern to writing simple queries, you\
    \ can see that I list the column names on one line in Listing 3-1.\n\n```\nSELECT\
    \ ProductID, ProductName, DateCreated, DateModified\nFROM dbo.Product;\n```\n\
    Listing 3-1\nBasic Query\n\nI format my code this way because I want to be able\
    \ to quickly see all the action items that are happening through the `FROM` clause\
    \ and the `WHERE` criteria. If I were to create one line per column, it would\
    \ be harder for me to see how tables were related and what conditions were being\
    \ applied to those relationships. In Listing 3-2, I altered how the columns in\
    \ the `SELECT` clause are displayed.\n\n```\nSELECT cus.FirstName,\n       cus.LastName,\n\
    \       prd.ProductName,\n       dtl.QuantitySold AS QuantitySold\nFROM dbo.CustomerOrder\
    \ ord\nINNER JOIN dbo.OrderDetail dtl\n  ON ord.CustomerOrderID = dtl.CustomerOrderID\n\
    INNER JOIN dbo.Product prd\n  ON dtl.ProductID = prd.ProductID\nINNER JOIN dbo.Customer\
    \ cus\n  ON ord.CustomerID = cus.CustomerID\n  AND cus.Country = 'India';\n```\n\
    Listing 3-2\nQueries with Joins\n\nFor this query, the columns are listed line\
    \ by line. This is because I altered something about the actual column being pulled\
    \ back. If I am ever aliasing a column or adding special logic to a column, I\
    \ change how I format the columns in the `SELECT` statement. For these scenarios,\
    \ I create one line or more per column depending on the complexity of the logic.\
    \ Notice the two join conditions on the last two lines of the query. I usually\
    \ indent any join condition after the first one because I want it to be immediately\
    \ obvious there has been more than one condition applied to a join.\n\nOften I\
    \ am reviewing T-SQL code to troubleshoot why it is returning incorrect results.\
    \ When there are issues with the results being returned, I start with a user story\
    \ indicating what is happening that is incorrect. In these cases, I go immediately\
    \ to the `WHERE` clause to double-check the logic and confirm that it is correct.\
    \ Once I have confirmed that logic, I look at the join criteria to confirm that\
    \ the tables are joined correctly. I use the same process to troubleshoot the\
    \ code as I use to understand T-SQL code; I look at the `SELECT` statement last,\
    \ focusing on any primary columns with any special logic. Looking at the query\
    \ in Listing 3-3, I can scan first the `WHERE` clause and then the `FROM` clause."
  raw: '# 3. Standardizing T-SQL


    Creating a method for how you write your code can help increase the speed at which
    you and others can understand the purpose of the code. How many times have you
    written code and come back to it later and not understood what it was doing? The
    goal is that if you follow good practices for formatting, naming, and commenting
    your T-SQL, it will be easier and faster to understand the purpose of the T-SQL.
    While determining these standards can take some extra time upfront, the cost savings
    in the long run will be worth it.


    Writing T-SQL that is understandable helps you and your company. Many other coding
    languages have standards or best practices, and I believe that T-SQL should be
    no different. While the primary goal of writing T-SQL may be to implement a piece
    of functionality, no less important is the secondary goal of making sure that
    your T-SQL makes sense. Over time, code changes or bugs are found. The more readable
    and understandable your T-SQL code is, the easier it is to modify or troubleshoot.


    ## Formatting T-SQL


    How T-SQL looks when it is written can be as significant as what is written. Like
    other application code, there is always a chance that someone will need to look
    at your code in the future or you will need to look at theirs. If I am not writing
    new code, I am looking at pre-existing code to understand its purpose, to debug
    the code, to performance tune the query, or to update the business logic. Depending
    on why I am reviewing the code, I generally determine what is important to me
    at the time.


    If I am looking at the T-SQL code to understand what the code does, I review any
    comments and the tables involved to understand what application may be using this
    T-SQL code. I am not concerned with how tables are joined together as I expect
    that to be functioning correctly, although incorrect logic on table joins can
    be a cause of queries returning very unexpected results. Next, I look at the criteria
    used to filter the results of the T-SQL code. Only at the very end of my analysis
    will I review the columns returned in the query. Oftentimes I am only concerned
    with the columns if there is special business logic involved. Applying this thought
    pattern to writing simple queries, you can see that I list the column names on
    one line in Listing [3-1](#480547_2_En_3_Chapter.xhtml#PC1).


    ```

    SELECT ProductID, ProductName, DateCreated, DateModified

    FROM dbo.Product;

    Listing 3-1

    Basic Query

    ```


    I format my code this way because I want to be able to quickly see all the action
    items that are happening through the FROM clause and the WHERE criteria. If I
    were to create one line per column, it would be harder for me to see how tables
    were related and what conditions were being applied to those relationships. In
    Listing [3-2](#480547_2_En_3_Chapter.xhtml#PC2), I altered how the columns in
    the SELECT clause are displayed.


    ```

    SELECT cus.FirstName,

    cus.LastName,

    prd.ProductName,

    dtl.QuantitySold AS QuantitySold

    FROM dbo.CustomerOrder ord

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    INNER JOIN dbo.Product prd

    ON dtl.ProductID = prd.ProductID

    INNER JOIN dbo.Customer cus

    ON ord.CustomerID = cus.CustomerID

    AND cus.Country = ''India'';

    Listing 3-2

    Queries with Joins

    ```


    For this query, the columns are listed line by line. This is because I altered
    something about the actual column being pulled back. If I am ever aliasing a column
    or adding special logic to a column, I change how I format the columns in the
    SELECT statement. For these scenarios, I create one line or more per column depending
    on the complexity of the logic. Notice the two join conditions on the last two
    lines of the query. I usually indent any join condition after the first one because
    I want it to be immediately obvious there has been more than one condition applied
    to a join.


    Often I am reviewing T-SQL code to troubleshoot why it is returning incorrect
    results. When there are issues with the results being returned, I start with a
    user story indicating what is happening that is incorrect. In these cases, I go
    immediately to the WHERE clause to double-check the logic and confirm that it
    is correct. Once I have confirmed that logic, I look at the join criteria to confirm
    that the tables are joined correctly. I use the same process to troubleshoot the
    code as I use to understand T-SQL code; I look at the SELECT statement last, focusing
    on any primarily columns with any special logic. Looking at the query in Listing
    [3-3](#480547_2_En_3_Chapter.xhtml#PC3), I can scan first the WHERE clause and
    then the FROM clause.'
  trans: "\n# 3. 标准化 T-SQL\n\n制定一种编写代码的方法，有助于提高你和他人理解代码意图的速度。你是否曾多次写下代码，过后再看却不明其意？我们的目标是，如果你遵循良好的格式、命名和注释\
    \ T-SQL 的实践，理解和掌握 T-SQL 的意图就会更轻松、更迅速。虽然确定这些标准前期会花费一些额外时间，但长远来看，它所节省的成本将是值得的。\n\
    \n编写易于理解的 T-SQL 对你和你的公司都有益。许多其他编程语言都有标准或最佳实践，我认为 T-SQL 也不例外。编写 T-SQL 的主要目标或许是实现某个功能，但次要目标——确保你的\
    \ T-SQL 清晰易懂——同样重要。随着时间的推移，代码会发生变化，或者会发现缺陷。你的 T-SQL 代码可读性和可理解性越高，修改或排查问题就越容易。\n\
    \n## 格式化 T-SQL\n\nT-SQL 书写时的外观与其内容同等重要。和其他应用程序代码一样，未来很可能有人需要查看你的代码，或者你需要查看别人的代码。如果我不是在编写新代码，那我就是在查看已有代码，以理解其目的、调试代码、调整查询性能或更新业务逻辑。根据我审查代码的原因，我通常会确定当时什么对我最重要。\n\
    \n如果我查看 T-SQL 代码是为了理解代码功能，我会审阅任何注释和涉及的表，以理解哪个应用程序可能正在使用此 T-SQL 代码。我并不太关心表是如何连接的，因为我预期它们能正确工作——尽管表连接逻辑错误也可能是查询返回非常意外结果的原因。接下来，我会查看用于筛选\
    \ T-SQL 代码结果的条件。只有在我分析的最后阶段，我才会审阅查询返回的列。通常，只有涉及特殊业务逻辑时，我才会关注列。将这种思维模式应用于编写简单查询时，你可以看到我在清单\
    \ 3-1 中将列名列在了一行。\n\n```\nSELECT ProductID, ProductName, DateCreated, DateModified\n\
    FROM dbo.Product;\n```\n清单 3-1\n基础查询\n\n我以这种格式编写代码，是因为我希望能够快速看到通过 `FROM` 子句和 `WHERE`\
    \ 条件发生的所有操作项。如果我为每个列创建单独一行，我将更难看清表之间的关系以及应用于这些关系的条件。在清单 3-2 中，我修改了 `SELECT` 子句中列的显示方式。\n\
    \n```\nSELECT cus.FirstName,\n       cus.LastName,\n       prd.ProductName,\n\
    \       dtl.QuantitySold AS QuantitySold\nFROM dbo.CustomerOrder ord\nINNER JOIN\
    \ dbo.OrderDetail dtl\n  ON ord.CustomerOrderID = dtl.CustomerOrderID\nINNER JOIN\
    \ dbo.Product prd\n  ON dtl.ProductID = prd.ProductID\nINNER JOIN dbo.Customer\
    \ cus\n  ON ord.CustomerID = cus.CustomerID\n  AND cus.Country = 'India';\n```\n\
    清单 3-2\n带连接的查询\n\n对于此查询，列是逐行罗列的。这是因为我对实际检索的列进行了某种修改。如果我为列设置了别名或向列添加了特殊逻辑，我会改变\
    \ `SELECT` 语句中列的格式化方式。对于这些场景，我会根据逻辑的复杂性，为每个列创建一行或多行。请注意查询最后两行上的两个连接条件。我通常将第一个连接条件之后的所有条件进行缩进，因为我希望它能立即显现出对一个连接应用了多个条件。\n\
    \n我审查 T-SQL 代码常常是为了排查它为何返回错误结果。当返回的结果出现问题时，我会从一个描述发生了什么错误的用户故事开始。在这种情况下，我会直接查看\
    \ `WHERE` 子句，仔细检查逻辑并确认其正确性。一旦确认了该逻辑，我就会查看连接条件，以确认表是否连接正确。我使用与理解 T-SQL 代码相同的流程来排查代码问题；我最后查看\
    \ `SELECT` 语句，重点关注任何带有特殊逻辑的主要列。查看清单 3-3 中的查询，我可以先快速浏览 `WHERE` 子句，然后再看 `FROM` 子句。\n"
- fmt: "## Listing 3-3 Queries with Subqueries\n\n```sql\nSELECT\n(\n    SELECT prd.ProductName\n\
    \    FROM dbo.CustomerOrder ord\n    INNER JOIN dbo.OrderDetail dtl\n        ON\
    \ ord.CustomerOrderID = dtl.CustomerOrderID\n    INNER JOIN dbo.Product prd\n\
    \        ON dtl.ProductID = prd.ProductID\n    WHERE ord.CustomerID = bord.CustomerID\n\
    \    GROUP BY prd.ProductName\n) AS ProductName,\nbord.CustomerOrderID,\nbord.OrderNumber,\n\
    bord.OrderDate,\nbdtl.QuantitySold,\nbprd.ProductPrice\nFROM dbo.CustomerOrder\
    \ bord\nINNER JOIN dbo.OrderDetail bdtl\n    ON bord.CustomerOrderID = bdtl.CustomerOrderID\n\
    INNER JOIN dbo.Product bprd\n    ON bdtl.ProductID = bprd.ProductID\nWHERE bprd.ProductName\
    \ LIKE '%board%';\n```\n\nThis allows me to immediately determine that this query\
    \ is dealing with products that contain the word `board`. With the columns in\
    \ the `SELECT` statement listed on individual lines, I am immediately aware that\
    \ there is some special logic involved in the part of the `SELECT` statement.\
    \ I also indented the subquery portion of the logic, which helps that subquery\
    \ stand out even further. Now that I am trying to troubleshoot potentially inaccurate\
    \ results, I can quickly identify what may be causing the issue. Depending on\
    \ the bug reported, there is a very high possibility the issue is either with\
    \ the `WHERE` clause or the first column returned in the `SELECT` statement. Analyzing\
    \ the view created in `Listing 3-4` shows a different conclusion.\n\n## Listing\
    \ 3-4 Create a View\n\n```sql\nCREATE OR ALTER VIEW dbo.CustomerProduct\nAS\n\
    SELECT cus.FirstName,\n       cus.LastName,\n       prd.ProductName,\n       SUM(dtl.QuantitySold)\
    \ AS QuantitySold\nFROM dbo.CustomerOrder ord\nINNER JOIN dbo.OrderDetail dtl\n\
    \    ON ord.CustomerOrderID = dtl.CustomerOrderID\nINNER JOIN dbo.Product prd\n\
    \    ON dtl.ProductID = prd.ProductID\nINNER JOIN dbo.Customer cus\n    ON ord.CustomerID\
    \ = cus.CustomerID\nGROUP BY cus.FirstName, cus.LastName, prd.ProductName;\n```\n\
    \nIn the `T-SQL` code for this view, I still go first to the `FROM` clause. I\
    \ immediately identify that there are several joins. In addition, there is no\
    \ `WHERE` clause, and I can also quickly determine there is no special logic in\
    \ the `SELECT` statement as all columns are not on their own line(s). Matching\
    \ the information about this view to any potential bug I am researching, I know\
    \ the most complex part of this query is the join logic. If the joins are correct,\
    \ I can quickly rule out the `SELECT` statement if the view is returning too many\
    \ results. A similar pattern can be followed when creating a function, as shown\
    \ in `Listing 3-5`.\n\n## Listing 3-5 Create a Function\n\n```sql\nCREATE FUNCTION\
    \ dbo.ProductsByCustomer (@CustomerID INT)\nRETURNS TABLE\nAS\nRETURN\n(\n   \
    \ SELECT cus.CustomerID, dtl.ProductID\n    FROM dbo.Customer cus\n    INNER JOIN\
    \ dbo.CustomerOrder ord\n        ON cus.CustomerID = ord.CustomerID\n    INNER\
    \ JOIN dbo.OrderDetail dtl\n        ON ord.CustomerOrderID = dtl.CustomerOrderID\n\
    \    WHERE cus.CustomerID = @CustomerID\n    GROUP BY cus.CustomerID, dtl.ProductID\n\
    );\n```\n\nIn the preceding function, I can quickly identify several joins in\
    \ the `FROM` statement and one criterion in the `WHERE` clause. If the function\
    \ is returning only results for the customer provided, it is highly likely that\
    \ any bug that has been found is related to the join conditions.\n\nMy process\
    \ for performance tuning queries is handled differently, and I will discuss those\
    \ differences further in `Part II` of this book. When it comes to reviewing the\
    \ `T-SQL` as part of performance tuning, I focus on what tables are used. If there\
    \ is more than one table, I also look at how those tables are joined together.\
    \ My final focus is on what columns are being used and how they relate to indexes\
    \ that already exist.\n\nI also review `T-SQL` code when updating logic inside\
    \ the `T-SQL` code. Either new functionality has been added, changed, or removed\
    \ so I need to modify the `T-SQL` code to mirror those modifications. Depending\
    \ on the modifications, it may be as simple as looking at the fields in the `SELECT`\
    \ clause and changing what fields are displayed or how calculations are performed.\
    \ Other times, I may need to look at the `FROM` clause and add or remove tables\
    \ from join conditions. In some cases, I may need to update criteria in the `WHERE`\
    \ clause to handle the new business requirements. Such is the case in `Listing\
    \ 3-6`, which shows the creation of a table-valued parameter.\n\n## Listing 3-6\
    \ Creating a Table-Valued Parameter\n\n```sql\nCREATE PROCEDURE dbo.UpdateProductPricing\n\
    \    @ProductList ProductPricing READONLY\nAS\nSET NOCOUNT ON\nUPDATE prd\nSET\
    \ ProductName = pr.ProductName,\n    ProductPrice = pr.ProductPrice\nFROM dbo.Product\
    \ prd\nINNER JOIN @ProductList pr\n    ON prd.ProductID = pr.ProductID;\n```\n\
    \nOne of the first things I notice is the lack of a `WHERE` clause in the this\
    \ stored procedure. This is also where some complexity is added when dealing with\
    \ user-defined table types. It is very likely that the user-defined table is being\
    \ used to filter the data on the join. However, just looking at the code, it is\
    \ very difficult to tell how the application uses this stored procedure. Because\
    \ of the user-defined table type, the amount of work required to enhance the logic\
    \ on this stored procedure is significantly increased. I need to be aware of how\
    \ data is being passed in the table-valued parameter, but I also need to consider\
    \ how the data being passed to this table-valued parameter can change over time.\
    \ As database administrators are often the ones managing the `T-SQL` code long\
    \ after the application has been deployed, I find it best to design `T-SQL` code\
    \ so that it can be easily supported going forward. As you can see in `Listing\
    \ 3-7`, when creating a common table expression, I use the same method, but I\
    \ indent the query inside of the common table expression. Once again, I use this\
    \ indent to help signify that special logic is happening in a given section.\n\
    \n## Listing 3-7 Creating a Common Table Expression\n\n```sql\nWITH cte_customer\
    \ AS\n(\n    SELECT cus.CustomerID,\n           cus.FirstName,\n           cus.LastName,\n\
    \           dtl.ProductID,\n           MIN(ord.OrderDate) AS FirstOrder\n    FROM\
    \ dbo.CustomerOrder ord\n    INNER JOIN dbo.OrderDetail dtl\n        ON ord.CustomerOrderID\
    \ = dtl.CustomerOrderID\n    INNER JOIN dbo.Customer cus\n        ON ord.CustomerID\
    \ = cus.CustomerID\n    GROUP BY cus.CustomerID, cus.FirstName, cus.LastName,\
    \ dtl.ProductID\n)\nSELECT cus.CustomerID,\n       cus.FirstName,\n       cus.LastName,\n\
    \       cus.FirstOrder,\n       SUM(dtl.QuantitySold) AS QuantitySold\nFROM cte_customer\
    \ cus\nINNER JOIN dbo.CustomerOrder ord\n    ON cus.CustomerID = ord.CustomerID\n\
    INNER JOIN dbo.OrderDetail dtl\n    ON ord.CustomerOrderID = dtl.CustomerOrderID\n\
    \    AND cus.ProductID = dtl.ProductID\nGROUP BY cus.CustomerID,\n         cus.FirstName,\n\
    \         cus.LastName,\n         cus.FirstOrder\nHAVING SUM(dtl.QuantitySold)\
    \ > 5;\n```\n\nWhen defining my own personal style, I have learned that my overall\
    \ objective is to have a query fit in a small enough area that I can quickly and\
    \ efficiently find the part of `T-SQL` code that I am trying to review. When it\
    \ comes to designing your own standard, you will want to think about your overall\
    \ objective.\n\nIn many companies, junior team members will be hired. Some of\
    \ these junior team members will be new to `SQL Server`, and it will take any\
    \ new hire some time to understand how the applications in your business work.\
    \ When designing an internal `T-SQL` coding standard, you want to take into consideration\
    \ what formatting conventions should be followed that will help new employees\
    \ quickly learn your company’s systems and data flows."
  raw: '```

    SELECT

    (

    SELECT prd.ProductName

    FROM dbo.CustomerOrder ord

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    INNER JOIN dbo.Product prd

    ON dtl.ProductID = prd.ProductID

    WHERE ord.CustomerID = bord.CustomerID

    GROUP BY prd.ProductName

    ) AS ProductName,

    bord.CustomerOrderID,

    bord.OrderNumber,

    bord.OrderDate,

    bdtl.QuantitySold,

    bprd.ProductPrice

    FROM dbo.CustomerOrder bord

    INNER JOIN dbo.OrderDetail bdtl

    ON bord.CustomerOrderID = bdtl.CustomerOrderID

    INNER JOIN dbo.Product bprd

    ON bdtl.ProductID = bprd.ProductID

    WHERE bprd.ProductName LIKE ''%board%'';

    Listing 3-3

    Queries with Subqueries

    ```


    This allows me to immediately determine that this query is dealing with products
    that contain the word board. With the columns in the SELECT statement listed on
    individual lines, I am immediately aware that there is some special logic involved
    in the part of the SELECT statement. I also indented the subquery portion of the
    logic, which helps that subquery stand out even further. Now that I am trying
    to troubleshoot potentially inaccurate results, I can quickly identify what may
    be causing the issue. Depending on the bug reported, there is a very high possibility
    the issue is either with the WHERE clause or the first column returned in the
    SELECT statement. Analyzing the view created in Listing [3-4](#480547_2_En_3_Chapter.xhtml#PC4)
    shows a different conclusion.


    ```

    CREATE OR ALTER VIEW dbo.CustomerProduct

    AS

    SELECT cus.FirstName,

    cus.LastName,

    prd.ProductName,

    SUM(dtl.QuantitySold) AS QuantitySold

    FROM dbo.CustomerOrder ord

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    INNER JOIN dbo.Product prd

    ON dtl.ProductID = prd.ProductID

    INNER JOIN dbo.Customer cus

    ON ord.CustomerID = cus.CustomerID

    GROUP BY cus.FirstName, cus.LastName, prd.ProductName;

    Listing 3-4

    Create a View

    ```


    In the T-SQL code for this view, I still go first to the FROM clause. I immediately
    identify that there are several joins. In addition, there is no WHERE clause,
    and I can also quickly determine there is no special logic in the SELECT statement
    as all columns are not on their own line(s). Matching the information about this
    view to any potential bug I am researching, I know the most complex part of this
    query is the join logic. If the joins are correct, I can quickly rule out the
    SELECT statement if the view is returning too many results. A similar pattern
    can be followed when creating a function, as shown in Listing [3-5](#480547_2_En_3_Chapter.xhtml#PC5).


    ```

    CREATE FUNCTION dbo.ProductsByCustomer (@CustomerID INT)

    RETURNS TABLE

    AS

    RETURN

    (

    SELECT cus.CustomerID, dtl.ProductID

    FROM dbo.Customer cus

    INNER JOIN dbo.CustomerOrder ord

    ON cus.CustomerID = ord.CustomerID

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    WHERE cus.CustomerID = @CustomerID

    GROUP BY cus.CustomerID, dtl.ProductID

    );

    Listing 3-5

    Create a Function

    ```


    In the preceding function, I can quickly identify several joins in the FROM statement
    and one criterion in the WHERE clause. If the function is returning only results
    for the customer provided, it is highly likely that any bug that has been found
    is related to the join conditions.


    My process for performance tuning queries is handled differently, and I will discuss
    those differences further in Part II of this book. When it comes to reviewing
    the T-SQL as part of performance tuning, I focus on what tables are used. If there
    is more than one table, I also look at how those tables are joined together. My
    final focus is on what columns are being used and how they relate to indexes that
    already exist.


    I also review T-SQL code when updating logic inside the T-SQL code. Either new
    functionality has been added, changed, or removed so I need to modify the T-SQL
    code to mirror those modifications. Depending on the modifications, it may be
    as simple as looking at the fields in the SELECT clause and changing what fields
    are displayed or how calculations are performed. Other times, I may need to look
    at the FROM clause and add or remove tables from join conditions. In some cases,
    I may need to update criteria in the WHERE clause to handle the new business requirements.
    Such is the case in Listing [3-6](#480547_2_En_3_Chapter.xhtml#PC6), which shows
    the creation of a table-valued parameter.


    ```

    CREATE PROCEDURE dbo.UpdateProductPricing

    @ProductList ProductPricing READONLY

    AS

    SET NOCOUNT ON

    UPDATE prd

    SET ProductName = pr.ProductName,

    ProductPrice = pr.ProductPrice

    FROM dbo.Product prd

    INNER JOIN @ProductList pr

    ON prd.ProductID = pr.ProductID;

    Listing 3-6

    Creating a Table-Valued Parameter

    ```


    One of the first things I notice is the lack of a WHERE clause in the this stored
    procedure. This is also where some complexity is added when dealing with user-defined
    table types. It is very likely that the user-defined table is being used to filter
    the data on the join. However, just looking at the code, it is very difficult
    to tell how the application uses this stored procedure. Because of the user-defined
    table type, the amount of work required to enhance the logic on this stored procedure
    is significantly increased. I need to be aware of how data is being passed in
    the table-valued parameter, but I also need to consider how the data being passed
    to this table-valued parameter can change over time. As database administrators
    are often the ones managing the T-SQL code long after the application has been
    deployed, I find it best to design T-SQL code so that it can be easily supported
    going forward. As you can see in Listing [3-7](#480547_2_En_3_Chapter.xhtml#PC7),
    when creating a common table expression, I use the same method, but I indent the
    query inside of the common table expression. Once again, I use this indent to
    help signify that special logic is happening in a given section.


    ```

    WITH cte_customer AS

    (

    SELECT cus.CustomerID,

    cus.FirstName,

    cus.LastName,

    dtl.ProductID,

    MIN(ord.OrderDate) AS FirstOrder

    FROM dbo.CustomerOrder ord

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    INNER JOIN dbo.Customer cus

    ON ord.CustomerID = cus.CustomerID

    GROUP BY cus.CustomerID, cus.FirstName, cus.LastName, dtl.ProductID

    )

    SELECT cus.CustomerID,

    cus.FirstName,

    cus.LastName,

    cus.FirstOrder,

    SUM(dtl.QuantitySold) AS QuantitySold

    FROM cte_customer cus

    INNER JOIN dbo.CustomerOrder ord

    ON cus.CustomerID = ord.CustomerID

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    AND cus.ProductID = dtl.ProductID

    GROUP BY cus.CustomerID,

    cus.FirstName,

    cus.LastName,

    cus.FirstOrder

    HAVING SUM(dtl.QuantitySold) > 5;

    Listing 3-7

    Creating a Common Table Expression

    ```


    When defining my own personal style, I have learned that my overall objective
    is to have a query fit in a small enough area that I can quickly and efficiently
    find the part of T-SQL code that I am trying to review. When it comes to designing
    your own standard, you will want to think about your overall objective.


    In many companies, junior team members will be hired. Some of these junior team
    members will be new to SQL Server, and it will take any new hire some time to
    understand how the applications in your business work. When designing an internal
    T-SQL coding standard, you want to take into consideration what formatting conventions
    should be followed that will help new employees quickly learn your company’s systems
    and data flows.'
  trans: "\n## 清单 3-3 使用子查询的查询\n\n```sql\nSELECT\n(\n    SELECT prd.ProductName\n\
    \    FROM dbo.CustomerOrder ord\n    INNER JOIN dbo.OrderDetail dtl\n        ON\
    \ ord.CustomerOrderID = dtl.CustomerOrderID\n    INNER JOIN dbo.Product prd\n\
    \        ON dtl.ProductID = prd.ProductID\n    WHERE ord.CustomerID = bord.CustomerID\n\
    \    GROUP BY prd.ProductName\n) AS ProductName,\nbord.CustomerOrderID,\nbord.OrderNumber,\n\
    bord.OrderDate,\nbdtl.QuantitySold,\nbprd.ProductPrice\nFROM dbo.CustomerOrder\
    \ bord\nINNER JOIN dbo.OrderDetail bdtl\n    ON bord.CustomerOrderID = bdtl.CustomerOrderID\n\
    INNER JOIN dbo.Product bprd\n    ON bdtl.ProductID = bprd.ProductID\nWHERE bprd.ProductName\
    \ LIKE '%board%';\n```\n\n这使我能够立即判断该查询正在处理名称中包含 `board` 一词的产品。`SELECT` 语句中的列各自独立成行列出，我能立刻意识到查询的这部分存在特殊逻辑。我还对子查询部分的逻辑进行了缩进，这有助于让该子查询更加突出。现在我正在尝试排查可能不准确的结果，可以快速识别可能导致问题的原因。根据报告的错误，问题极有可能出现在\
    \ `WHERE` 子句或 `SELECT` 语句返回的第一列。分析清单 `3-4` 中创建的视图则会得出不同的结论。\n\n## 清单 3-4 创建视图\n\
    \n```sql\nCREATE OR ALTER VIEW dbo.CustomerProduct\nAS\nSELECT cus.FirstName,\n\
    \       cus.LastName,\n       prd.ProductName,\n       SUM(dtl.QuantitySold) AS\
    \ QuantitySold\nFROM dbo.CustomerOrder ord\nINNER JOIN dbo.OrderDetail dtl\n \
    \   ON ord.CustomerOrderID = dtl.CustomerOrderID\nINNER JOIN dbo.Product prd\n\
    \    ON dtl.ProductID = prd.ProductID\nINNER JOIN dbo.Customer cus\n    ON ord.CustomerID\
    \ = cus.CustomerID\nGROUP BY cus.FirstName, cus.LastName, prd.ProductName;\n```\n\
    \n在这个视图的 `T-SQL` 代码中，我仍然首先查看 `FROM` 子句。我立即识别出存在多个联接。此外，没有 `WHERE` 子句，并且我还能快速判断\
    \ `SELECT` 语句中没有特殊逻辑，因为所有列并未各自独立成行。将该视图的信息与我正在研究的任何潜在错误进行匹配，我知道此查询最复杂的部分是联接逻辑。如果联接正确，并且该视图返回的结果过多，我可以快速排除\
    \ `SELECT` 语句的问题。在创建函数时也可以遵循类似的模式，如清单 `3-5` 所示。\n\n## 清单 3-5 创建函数\n\n```sql\n\
    CREATE FUNCTION dbo.ProductsByCustomer (@CustomerID INT)\nRETURNS TABLE\nAS\n\
    RETURN\n(\n    SELECT cus.CustomerID, dtl.ProductID\n    FROM dbo.Customer cus\n\
    \    INNER JOIN dbo.CustomerOrder ord\n        ON cus.CustomerID = ord.CustomerID\n\
    \    INNER JOIN dbo.OrderDetail dtl\n        ON ord.CustomerOrderID = dtl.CustomerOrderID\n\
    \    WHERE cus.CustomerID = @CustomerID\n    GROUP BY cus.CustomerID, dtl.ProductID\n\
    );\n```\n\n在上述函数中，我可以快速识别 `FROM` 语句中的多个联接以及 `WHERE` 子句中的一个条件。如果函数仅返回所提供客户的结果，那么任何已发现的错误极有可能与联接条件有关。\n\
    \n我对查询进行性能调优的处理方式有所不同，我将在本书的 `第二部分` 进一步讨论这些差异。当作为性能调优的一部分审查 `T-SQL` 时，我重点关注使用了哪些表。如果涉及多个表，我还会查看这些表是如何联接在一起的。我最后关注的是使用了哪些列以及它们与现有索引的关系。\n\
    \n在更新 `T-SQL` 代码内部的逻辑时，我也会审查 `T-SQL` 代码。由于新增、更改或删除了功能，我需要修改 `T-SQL` 代码以反映这些变更。根据修改的性质，可能简单到查看\
    \ `SELECT` 子句中的字段并更改要显示的字段或计算方式。其他时候，我可能需要查看 `FROM` 子句，并在联接条件中添加或删除表。在某些情况下，我可能需要更新\
    \ `WHERE` 子句中的条件以处理新的业务需求。清单 `3-6` 就是这种情况，它展示了表值参数的创建。\n\n## 清单 3-6 创建表值参数\n\n\
    ```sql\nCREATE PROCEDURE dbo.UpdateProductPricing\n    @ProductList ProductPricing\
    \ READONLY\nAS\nSET NOCOUNT ON\nUPDATE prd\nSET ProductName = pr.ProductName,\n\
    \    ProductPrice = pr.ProductPrice\nFROM dbo.Product prd\nINNER JOIN @ProductList\
    \ pr\n    ON prd.ProductID = pr.ProductID;\n```\n\n我首先注意到的一点是此存储过程缺少 `WHERE` 子句。这也是在处理用户定义表类型时增加复杂性的地方。很可能用户定义的表被用于在联接时过滤数据。然而，仅看代码很难判断应用程序如何使用此存储过程。由于用户定义的表类型，增强此存储过程逻辑所需的工作量显著增加。我需要了解数据如何通过表值参数传入，但同时还需要考虑传递给此表值参数的数据随时间可能发生的变化。由于数据库管理员通常是在应用程序部署后长期管理\
    \ `T-SQL` 代码的人，我发现最好将 `T-SQL` 代码设计得易于后续支持。如你在清单 `3-7` 中所见，在创建公用表表达式时，我使用了相同的方法，但我会对公用表表达式内部的查询进行缩进。我再次使用这种缩进来表明在特定部分存在特殊逻辑。\n\
    \n## 清单 3-7 创建公用表表达式\n\n```sql\nWITH cte_customer AS\n(\n    SELECT cus.CustomerID,\n\
    \           cus.FirstName,\n           cus.LastName,\n           dtl.ProductID,\n\
    \           MIN(ord.OrderDate) AS FirstOrder\n    FROM dbo.CustomerOrder ord\n\
    \    INNER JOIN dbo.OrderDetail dtl\n        ON ord.CustomerOrderID = dtl.CustomerOrderID\n\
    \    INNER JOIN dbo.Customer cus\n        ON ord.CustomerID = cus.CustomerID\n\
    \    GROUP BY cus.CustomerID, cus.FirstName, cus.LastName, dtl.ProductID\n)\n\
    SELECT cus.CustomerID,\n       cus.FirstName,\n       cus.LastName,\n       cus.FirstOrder,\n\
    \       SUM(dtl.QuantitySold) AS QuantitySold\nFROM cte_customer cus\nINNER JOIN\
    \ dbo.CustomerOrder ord\n    ON cus.CustomerID = ord.CustomerID\nINNER JOIN dbo.OrderDetail\
    \ dtl\n    ON ord.CustomerOrderID = dtl.CustomerOrderID\n    AND cus.ProductID\
    \ = dtl.ProductID\nGROUP BY cus.CustomerID,\n         cus.FirstName,\n       \
    \  cus.LastName,\n         cus.FirstOrder\nHAVING SUM(dtl.QuantitySold) > 5;\n\
    ```\n\n在定义我个人的风格时，我了解到我的总体目标是让查询适合在足够小的区域内显示，以便我能快速高效地找到我正在试图审查的那部分 `T-SQL` 代码。在设计你自己的标准时，你需要思考你的总体目标。\n\
    \n在许多公司，会招聘初级团队成员。其中一些初级团队成员对 `SQL Server` 可能是新手，任何新员工都需要一些时间来了解你公司业务中的应用程序如何运作。在设计内部的\
    \ `T-SQL` 编码标准时，你需要考虑应遵循哪些格式约定，以帮助新员工快速了解你公司的系统和数据流。\n"
- fmt: '# T-SQL 格式化标准


    制定 T-SQL 格式化标准的另一个因素是创建一个员工易于记忆或参考的标准。你希望团队成员在实施新标准时能够成功，而不会在编写代码时被所有细微差别压得喘不过气。如果你的所有
    T-SQL 代码都必须手动编写，并且你的公司没有可以自动格式化 T-SQL 代码的软件，这一点尤为重要。


    对于 `INSERT`、`UPDATE` 和 `DELETE` 语句，也有一些格式上的考虑。清单 [3-8](#480547_2_En_3_Chapter.xhtml#PC8)
    包含了一个 `INSERT` 语句示例。在这个例子中，我列出了 `INSERT` 的所有列名。


    ```

    INSERT INTO dbo.Product (ProductName, ProductPrice) VALUES

    (''Telescope'', 599.00);

    Listing 3-8

    插入数据的查询

    ```


    虽然列出列名可能看起来没有必要，但这种格式标准使得正在插入的数据变得易于识别，并且当列被添加或列顺序改变时，这种格式还能保护应用程序代码免受未来问题的影响。更新数据的格式很简单，如清单
    [3-9](#480547_2_En_3_Chapter.xhtml#PC9) 所示。我仍然遵循与保留字和引用用户定义数据库对象相同的格式。


    ```

    UPDATE dbo.Customer

    SET Address = ''123 Main Street''

    WHERE CustomerID = 1;

    Listing 3-9

    更新数据的简单查询

    ```


    你还可以看到我始终在运算符前后留出空格。我在几个例子中都这样做了。就像我为格式化所做的其他决定一样，我相信在等号前后添加空格可以提高 T-SQL 代码的可读性。我还包含了清单
    [3-10](#480547_2_En_3_Chapter.xhtml#PC10) 来展示如何在 T-SQL 中格式化删除数据。


    ```

    DELETE FROM dbo.Product

    WHERE ProductName = ''Electric surfboard'';

    Listing 3-10

    删除数据的查询

    ```


    这个例子是一个简单的删除，当涉及到连接（`JOIN`）时，删除数据的格式可能会变得更加复杂。删除数据在 SQL Server 中通常比其他数据操作活动显得更为重大。有时你可能想编写一个查询来系统性地删除表中的数据。当我刚开始编写从表中删除数据的查询时，我会从编写
    `SELECT` 语句开始。这将有助于解决几个因素。我可以清楚地看到哪些数据会受到影响。我还可以获得预期受影响记录的行数。一旦我写好了 `SELECT` 语句，我就可以轻松地修改代码以删除必要的记录。清单
    [3-11](#480547_2_En_3_Chapter.xhtml#PC11) 中的查询显示了我用来准备删除数据记录的 `SELECT` 语句。


    ```

    SELECT ord.CustomerOrderID, ord.OrderNumber

    FROM dbo.CustomerOrder ord

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    WHERE dtl.ProductID = 2;

    Listing 3-11

    选择 ProductID 为 2 的订单

    ```


    在这种情况下，我正准备从 `dbo.CustomerOrder` 表中删除 `ProductID` 为 2 的记录。使用清单 [3-11](#480547_2_En_3_Chapter.xhtml#PC11)
    的结果，我可以确认我正在删除什么数据以及预计会删除多少条记录。在审查了清单 [3-11](#480547_2_En_3_Chapter.xhtml#PC11)
    的结果后，我可以更新我的 T-SQL 代码来删除这些记录。在清单 [3-12](#480547_2_En_3_Chapter.xhtml#PC12) 中，我用引用
    `dbo.CustomerOrder` 表别名的 `DELETE FROM` 替换了 `SELECT` 语句。


    ```

    BEGIN TRAN

    DELETE FROM ord

    FROM dbo.CustomerOrder ord

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    WHERE dtl.ProductID = 2;

    COMMIT

    Listing 3-12

    删除 ProductID 为 2 的订单

    ```


    多年来，我发现最好将复杂的 `DELETE` 语句包装在显式事务中。默认情况下，当我们在 SQL Server 上执行 T-SQL 代码时，我们使用的是隐式事务。这意味着
    SQL Server 知道在我们执行事务后自动提交事务。我们也可以选择指定显式事务。在这种情况下，SQL Server 在我们发送 `COMMIT` 命令之前不会完成
    T-SQL 代码的执行。特别是在删除操作中，但通常对于任何复杂的代码，我发现最好始终小心谨慎。我有两个选择。我可以单独运行 `BEGIN TRAN` 和 `DELETE`
    语句。如果结果看起来不错，我可以运行 `COMMIT`。如果结果不如人意，我可以回滚并重新开始。如果你使用这种方法，你必须确保正确地 `ROLLBACK`
    或 `COMMIT` 显式事务。


    另一个选择是运行包含 `BEGIN TRAN` 和 `DELETE` 语句的整个脚本，但加上 `ROLLBACK`。如果行数看起来正确，我可以将 `ROLLBACK`
    改为 `COMMIT` 并重新执行。


    这让我能够验证受影响的记录数量。这是我确认查询是否按预期工作的最后机会。如果我返回的记录数量与我预期的不同，我可以发出 `ROLLBACK`，SQL Server
    将撤销我尝试运行的代码。这只在显式事务中才有可能。还值得一提的是，如果你使用了多级事务（称为嵌套事务），`ROLLBACK` 的功能可能与你预期的不同，因为它会回滚所有嵌套的开放事务。


    这就引出了设计 T-SQL 格式时的另一个考虑因素。你需要了解你的 T-SQL 代码将如何被编写和存储。如果所有 T-SQL 代码都将手动编写且无法通过第三方工具格式化，那么你可能需要保持编码标准非常简单，并限制特殊情况的准则。然而，如果你有可用的第三方工具，你可以创建一个该工具能处理的最复杂的格式。


    优秀开发者或工程师的特质之一是纪律性。编写 T-SQL 也是如此。在某种程度上，你使用哪种特定的格式风格并不重要。重要的是要与该格式保持一致。理想情况下，你应该努力让你的整个团队就一种标准的
    T-SQL 格式化方法达成一致。


    当你的整个团队都以相同的方式编写 T-SQL 代码时，查看别人的代码就会容易得多。你不再需要同时转换格式和编码风格，这可以加快分析和解决问题的速度。格式化你的
    T-SQL 代码使其更具可读性，完全是关于代码的外观。


    你应该朝着为公司编写的所有 T-SQL 代码拥有统一格式的方向努力。由于无论谁编写代码，格式都将相同，这也意味着每个阅读代码的人都会越来越熟悉快速解读他们的代码。在清单
    [3-13](#480547_2_En_3_Chapter.xhtml#PC13) 中，我创建了一个用户定义的表类型。


    ```

    CREATE TYPE ProductPricing AS TABLE

    (

    ProductName  VARCHAR(25),

    ProductPrice DECIMAL(6,2)

    );

    Listing 3-13

    创建用户定义的表类型

    ```


    我在清单 [3-14](#480547_2_En_3_Chapter.xhtml#PC14) 中创建临时表时也使用了统一的格式。


    ```

    CREATE TABLE #TempCustomerFirstOrder

    (

    CustomerID    INT,

    FirstName     VARCHAR(40),

    LastName      VARCHAR(100),

    FirstOrder    DATETIME2(2),

    QuantityOrder SMALLINT

    );

    Listing 3-14

    创建临时表

    ```


    你还可以看到我在清单 [3-15](#480547_2_En_3_Chapter.xhtml#PC15) 中创建表变量时使用了相同的格式。


    ```

    DECLARE @TempCustomerFirstOrder TABLE

    (

    CustomerID    INT,

    FirstName     VARCHAR(40),

    LastName      VARCHAR(100),

    FirstOrder    DATETIME2(2),

    QuantityOrder SMALLINT

    );

    Listing 3-15

    创建表变量

    ```'
  raw: 'Another factor in developing a T-SQL formatting standard is creating a standard
    that employees can easily remember or reference. You want your team members to
    be able to succeed when implementing a new standard and not be overwhelmed by
    all the nuances when writing the code. This is especially important if all T-SQL
    code must be written manually and your company does not have software that can
    automatically format the T-SQL code for you.


    There are also some formatting considerations for inserts, updates, and deletes.
    Listing [3-8](#480547_2_En_3_Chapter.xhtml#PC8) contains a sample INSERT statement.
    In this example, I listed all the column names for an INSERT.


    ```

    INSERT INTO dbo.Product (ProductName, ProductPrice) VALUES

    (''Telescope'', 599.00);

    Listing 3-8

    Query to Insert Data

    ```


    While listing the column names may seem unnecessary, this formatting standard
    makes what data is being inserted easily identifiable, but this format also protects
    the application code from future issues if columns are added or the column order
    changes. The format to update data is simple, as you can see in Listing [3-9](#480547_2_En_3_Chapter.xhtml#PC9).
    I am still following the same formatting for reserved words and referencing user-defined
    database objects.


    ```

    UPDATE dbo.Customer

    SET Address = ''123 Main Street''

    WHERE CustomerID = 1;

    Listing 3-9

    Simple Query to Update Data

    ```


    You can also see that I consistently pad the operator. I have done this in several
    examples. Like other decisions I have made for formatting, I believe adding a
    space before and after the equal sign improves the readability of the T-SQL code.
    I have also included Listing [3-10](#480547_2_En_3_Chapter.xhtml#PC10) to show
    how to format deleting data in T-SQL.


    ```

    DELETE FROM dbo.Product

    WHERE ProductName = ''Electric surfboard'';

    Listing 3-10

    Query to Delete Data

    ```


    This example is for a simple delete, and when joins are involved, the format to
    delete data can become even more involved. Deleting data often seems more significant
    than other data manipulation activities in SQL Server. There are times where you
    may want to write a query to systematically delete data from a table. When I first
    started writing queries to delete data from tables, I would start with writing
    the SELECT statement. This would help with several factors. I could clearly see
    what data would be affected. I could also get a row count for the number of records
    I expected to be affected. Once I had the SELECT statement written, I could easily
    modify the code to delete the necessary records. The query in Listing [3-11](#480547_2_En_3_Chapter.xhtml#PC11)
    shows the SELECT statement I use to prepare for deleting data records.


    ```

    SELECT ord.CustomerOrderID, ord.OrderNumber

    FROM dbo.CustomerOrder ord

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    WHERE dtl.ProductID = 2;

    Listing 3-11

    Select Orders with ProductID of 2

    ```


    In this case, I am preparing to delete records from the `dbo.Customer` table that
    have a `ProductID` of 2\. Using the result from Listing [3-11](#480547_2_En_3_Chapter.xhtml#PC11),
    I can confirm what data I am deleting and how many records I can expect to delete.
    After I review the results from Listing [3-11](#480547_2_En_3_Chapter.xhtml#PC11),
    I can update my T-SQL code to delete the records. In Listing [3-12](#480547_2_En_3_Chapter.xhtml#PC12),
    I replaced the SELECT statement with a DELETE FROM referencing the table alias
    for dbo.Customer.


    ```

    BEGIN TRAN

    DELETE FROM ord

    FROM dbo.CustomerOrder ord

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    WHERE dtl.ProductID = 2;

    COMMIT

    Listing 3-12

    Delete Orders with Product of 2

    ```


    Over the years, I have found it best to wrap complex DELETE statements in an explicit
    transaction. By default, when we execute T-SQL code on SQL Server, we are using
    an implicit transaction. That means that SQL Server knows to commit the transaction
    automatically after we execute the transaction. We also have the option of specifying
    an explicit transaction. This is where SQL Server will not complete the execution
    of the T-SQL code until we send the COMMIT to SQL Server. Particularly with deletes,
    but often with any complex code, I have found that it is best to always be careful.
    I have two options. I could run the BEGIN TRAN and DELETE statements by themselves.
    If I like what I see, I can run a commit. If I don’t like what I see, I can roll
    back and start over. If you use this method, you must make sure to ROLLBACK or
    COMMIT the explicit transaction properly. The other option is to run the whole
    script of BEGIN TRAN and DELETE statements, but with a ROLLBACK. If the row count
    looks correct, I can change the ROLLBACK to a COMMIT and re-execute.


    This allows me to verify the number of records affected. This is my last chance
    to confirm that my query is working as expected. If I get a different number of
    records returned than the one I expected, I could issue a ROLLBACK and SQL Server
    would undo the code that I attempted to run. This is only possible while using
    explicit transactions. It is also worth mentioning that if you are using multiple
    levels of transactions, referred to as nested transactions, the functionality
    of the ROLLBACK may work differently than expected as it will rollback all nested open
    transactions.


    This leads to another consideration when designing your T-SQL formatting. You
    will need to know how your T-SQL code will be written and stored. If all T-SQL
    code will be written manually and cannot be formatted by a third-party tool, then
    you may need to keep the coding standard very simple and limit criteria for special
    situations. However, if you have a third-party tool available, you can create
    a format that is as complex as that tool can handle.


    One of the factors that makes a good developer or engineer is discipline. The
    same is true when writing T-SQL. To a certain extent, it does not matter what
    specific style of formatting you use. What does matter is being consistent with
    that formatting. Ideally, you should try to get your entire team to agree to a
    standard method of formatting T-SQL.


    When your whole team writes T-SQL code the same way, it makes it much easier to
    look at someone else’s code. You no longer need to translate both the format and
    the coding style, which can lead to quicker analysis and quicker problem resolution.
    Formatting your T-SQL code to make it more readable is all about how the code
    looks.


    You should move toward having consistent formatting for all T-SQL code written
    at your company. Since the formatting will be the same regardless of who writes
    the code, it also means that everyone reading the code will become more and more
    familiar with quickly interpreting their code. In Listing [3-13](#480547_2_En_3_Chapter.xhtml#PC13),
    I create a user-defined table type.


    ```

    CREATE TYPE ProductPricing AS TABLE

    (

    ProductName  VARCHAR(25),

    ProductPrice DECIMAL(6,2)

    );

    Listing 3-13

    Create User-Defined Table Type

    ```


    I also use a consistent format in Listing [3-14](#480547_2_En_3_Chapter.xhtml#PC14)
    when creating a temporary table.


    ```

    CREATE TABLE #TempCustomerFirstOrder

    (

    CustomerID    INT,

    FirstName     VARCHAR(40),

    LastName      VARCHAR(100),

    FirstOrder    DATETIME2(2),

    QuantityOrder SMALLINT

    );

    Listing 3-14

    Create a Temporary Table

    ```


    You can also see I use the same format when creating a table variable in Listing
    [3-15](#480547_2_En_3_Chapter.xhtml#PC15).


    ```

    DECLARE @TempCustomerFirstOrder TABLE

    (

    CustomerID    INT,

    FirstName     VARCHAR(40),

    LastName      VARCHAR(100),

    FirstOrder    DATETIME2(2),

    QuantityOrder SMALLINT

    );

    Listing 3-15

    Create a Table Variable

    ```'
