  trans: '

    一旦您在 `Menu` 数据中启用了变更跟踪，就可以配置表以使用变更跟踪。您要实施变更跟踪的表必须具有主键。如果该表没有主键，您必须先添加一个，然后才能在该表上启用变更跟踪。在此情况下，您将在
    `dbo.CustomerOrder` 表上启用变更跟踪；请参考代码清单 14-2。


    ```sql

    ALTER TABLE dbo.CustomerOrder

    ENABLE CHANGE_TRACKING

    WITH (TRACK_COLUMNS_UPDATED = ON);

    ```


    **代码清单 14-2**

    在 `dbo.CustomerOrder` 表上启用变更跟踪


    现在，`dbo.CustomerOrder` 表已启用变更跟踪。变更跟踪可以记录整个数据行已更改，也可以指定特定列已更改。当您跟踪列更改时，SQL Server
    会记录发生了更改以及哪些特定列已更改。如果您没有为 `TRACK_COLUMNS_UPDATED` 指定值，SQL Server 将使用默认值 `OFF`，并且只会告诉您某行已添加到表中、从表中删除或在表内被修改，而不会提供更多细节。


    设置好变更跟踪后，您可能想确定有哪些信息可用或已更改。虽然 SQL Server 会跟踪 `dbo.CustomerOrder` 表中的更改，但这些信息无法从您可以在对象资源管理器中找到的表中获得。相反，您需要访问与
    `dbo.CustomerOrder` 表关联的 `CHANGETABLE`。一旦启用了变更跟踪，记录就会被初始化，并可以在 `CHANGETABLE` 中找到。代码清单
    14-3 中的查询展示了如何查找这些已初始化的记录。


    ```sql

    SELECT ord.CustomerOrderID,

    ord.OrderNumber,

    ord.OrderDate,

    chng.CustomerOrderID,

    chng.SYS_CHANGE_VERSION,

    chng.SYS_CHANGE_CONTEXT

    FROM dbo.CustomerOrder AS ord

    CROSS APPLY CHANGETABLE

    (VERSION CustomerOrder,

    (CustomerOrderID), (ord.CustomerOrderID)) AS chng;

    ```


    **代码清单 14-3**

    查询已初始化的记录


    此查询返回来自 `dbo.CustomerOrder` 表和 `CHANGETABLE` 的信息。表 14-1 显示了已初始化记录的示例。


    **表 14-1**

    已初始化的记录


    | CustomerOrderID | SYS_CHANGE_VERSION | SYS_CHANGE_CONTEXT |

    | --- | --- | --- |

    | 1 | NULL | NULL |

    | 2 | NULL | NULL |

    | 3 | NULL | NULL |

    | 4 | NULL | NULL |


    表 14-1 中的记录来自 `CHANGETABLE`。这里有一列是 `CustomerOrderID`（表的主键），以及用于跟踪更改信息的列。由于没有任何数据记录被修改，所有值均为
    NULL。


    您可以修改 `dbo.CustomerOrder` 表中的记录。在代码清单 14-4 中，您更新了 `DateModified`。


    ```sql

    UPDATE dbo.CustomerOrder

    SET ShipDate = SYSDATETIME()

    WHERE CustomerOrderID = 3;

    ```


    **代码清单 14-4**

    更新 `DateModified`


    既然记录已被修改，您就能更好地了解在涉及变更跟踪时信息是如何存储的。如果您再次运行代码清单 14-3 中的查询，将得到表 14-2 所示的结果。


    **表 14-2**

    更改 `ShipDate` 后的记录


    | CustomerOrderID | SYS_CHANGE_VERSION | SYS_CHANGE_CONTEXT |

    | --- | --- | --- |

    | 1 | NULL | NULL |

    | 2 | NULL | NULL |

    | 3 | 1 | NULL |

    | 4 | NULL | NULL |


    该表显示 `SYS_CHANGE_VERSION` 已从初始值 NULL 更改为 1。这表明自变更跟踪最初初始化以来，`CustomerOrderID` 为
    3 的记录已被修改。


    如果您想查找有关哪些列被更改的更多信息，代码清单 14-5 展示了查找自上次自动清理以来 `dbo.CustomerOrder` 发生更改的信息所需的查询。


    ```sql

    SELECT CustomerOrderID,

    SYS_CHANGE_OPERATION AS ChangeOperation,

    CHANGE_TRACKING_IS_COLUMN_IN_MASK

    (COLUMNPROPERTY

    (OBJECT_ID(''CustomerOrder''), ''OrderNumer'', ''ColumnId''),

    SYS_CHANGE_COLUMNS) AS OrderNumberChange,

    CHANGE_TRACKING_IS_COLUMN_IN_MASK

    (COLUMNPROPERTY

    (OBJECT_ID(''CustomerOrder''), ''OrderDate'', ''ColumnId''),

    SYS_CHANGE_COLUMNS) AS OrderDateChange,

    CHANGE_TRACKING_IS_COLUMN_IN_MASK

    (COLUMNPROPERTY

    (OBJECT_ID(''CustomerOrder''), ''ShipDate'', ''ColumnId''),

    SYS_CHANGE_COLUMNS) AS ShipDateChange,

    CHANGE_TRACKING_IS_COLUMN_IN_MASK

    (COLUMNPROPERTY

    (OBJECT_ID(''CustomerOrder''), ''DateCreated'', ''ColumnId''),

    SYS_CHANGE_COLUMNS) AS CreatedChange,

    CHANGE_TRACKING_IS_COLUMN_IN_MASK

    (COLUMNPROPERTY

    (OBJECT_ID(''CustomerOrder''), ''DateModified'', ''ColumnId''),

    SYS_CHANGE_COLUMNS) AS ModifiedChange,

    CHANGE_TRACKING_IS_COLUMN_IN_MASK

    (COLUMNPROPERTY

    (OBJECT_ID(''CustomerOrder''), ''DateDisabled'', ''ColumnId''),

    SYS_CHANGE_COLUMNS) AS DisabledChange,

    SYS_CHANGE_CONTEXT

    FROM CHANGETABLE

    (CHANGES dbo.CustomerOrder,0) as ChngTbl

    ORDER BY SYS_CHANGE_VERSION;

    ```


    **代码清单 14-5**

    查找已更改的记录


    需要此版本信息来查找此表上更改的状态。代码清单 14-5 中的查询展示了您可用于访问此信息的一种方法。表 14-3 显示了代码清单 14-5 中查询的结果。


    **表 14-3**

    变更跟踪结果集


    | CustomerOrderID | ChangeOperation | OrderNumberChange | OrderDateChange | ShipDateChange
    | CreatedChange | ModifiedChange |

    | --- | --- | --- | --- | --- | --- | --- |

    | 3 | U | False | False | True | False | False |


    这些结果记录自代码清单 14-4 中发出的更新。


    受影响的 `CustomerOrderID` 列在表 14-3 的第一列。这与代码清单 14-4 中更新的 `CustomerOrderID` 相匹配。`ChangeOperation`
    列出为 `U`，表示更新。这也与代码清单 14-4 中的 DML 操作相匹配。表 14-3 中的最后五列是使用特定函数填充的，用于揭示变更跟踪表中指示的列。如果列被修改，该函数返回
    `True` 值；如果数据未被修改，则返回 `False` 值。在代码清单 14-4 的情况下，唯一更新的列是 `DateModified`。这与表 14-3
    中的结果相匹配。`OrderNumberChange`、`OrderDateChange`、`CreatedChange` 和 `DisabledChange`
    列均为 `False`。这些值未被更改。然而，`ModifiedChange` 列为 `True`。这表明引用的列 `DateModified` 已被更改。


    使用变更跟踪时，在一致性方面存在一些潜在问题。存储数据不影响数据的一致性。数据一致性受影响是数据检索过程的一部分。您可以尽一切可能确保访问变更跟踪表中最新的数据。这包括检查变更跟踪中最后同步的版本，并确认该版本仍然可用。但是，如果变更跟踪中的版本早于保留期，则这些数据可能在检索之前就被清理掉了。使用变更跟踪时，您还可能遇到在最后一次同步之后发生数据修改的情况。这可能导致返回额外的版本或修改的记录。这些情况中的任何一种都可能影响变更跟踪返回数据的一致性。最小化一致性问题的最佳实践是使用快照隔离级别。

    '
- fmt: "# Change Data Capture 详解\n\n## 概念与权衡\n\n如果需要了解比“哪一行或哪一列被更改”以及“该记录自实施变更跟踪以来发生了多少次更改”更多的信息，您可能需要考虑\
    \ **Change Data Capture**。与 **Change Tracking** 类似，使用 **Change Data Capture**\
    \ 也有其优缺点。\n\n最大的好处是 **Change Data Capture** 将捕获与已更改数据记录相关的详细信息。\n\n- 对于插入的数据，您将能够准确识别向表中添加了什么。\n\
    - 同样，您将能够确定被删除数据记录的所有列。\n- 更新数据时，您将能够访问更新前后的数据。\n\n缺点包括：\n\n- 对表的每次更改都要求至少有一条记录被写入跟踪表。\n\
    - 另一个缺点是，为每个被跟踪的表都会创建两个 **SQL Server Agent** 作业。\n- 随着您在 **Change Data Capture**\
    \ 下管理的表数量增加，所使用的资源量也会增加。这可能会导致与 **Change Data Capture** 相关的性能开销变得非常严重，以至于阻止您实施该功能。\n\
    \n## 启用 Change Data Capture\n\n如果决定使用 **Change Data Capture**，您可以更新数据库中的一个表来使用它。在此之前，您需要允许在您的数据库上运行\
    \ **Change Data Capture**。您可以通过运行代码清单 [14-6](#480547_2_En_14_Chapter.xhtml#PC6)\
    \ 中的 **T-SQL** 代码来按数据库启用 **Change Data Capture**。\n\n```sql\nUSE OutdoorRecreation;\n\
    GO\nEXECUTE sys.sp_cdc_enable_db;\nGO\n```\n*代码清单 14-6 在 Menu 数据库上启用数据库跟踪*\n\n\
    ## 在特定表上启用\n\n现在您已经启用了 **Change Data Capture**，需要选择一个表，您只关心记录何时发生变化。让我们在表 `dbo.CustomerOrder`\
    \ 上实施 **Change Data Capture**。在此表上启用 **Change Data Capture** 之前，您需要确保此实例上正在运行\
    \ **SQL Server Agent**。在代码清单 [14-7](#480547_2_En_14_Chapter.xhtml#PC7) 中，您可以找到在此表上实施\
    \ **Change Data Capture** 所需的数据库代码。\n\n```sql\nUSE OutdoorRecreation;\nGO\nEXECUTE\
    \ sys.sp_cdc_enable_table\n    @source_schema = 'dbo',\n    @source_name = 'CustomerOrder',\n\
    \    @role_name = NULL;\nGO\n```\n*代码清单 14-7 在 dbo.CustomerOrder 表上启用数据库跟踪*\n\n\
    您至少需要指定表架构、表名以及可以访问此数据的数据库角色。如果将角色名指定为 `NULL`，则 **Change Data Capture** 记录的信息将对所有人可访问。一旦此表启用了\
    \ **Change Data Capture**，您将能够在 **SQL Server Agent** 中找到新创建的作业。**T-SQL** 代码（代码清单\
    \ [14-7](#480547_2_En_14_Chapter.xhtml#PC7)）完成后，您会收到一条消息。您可以在图 [14-1](#480547_2_En_14_Chapter.xhtml#Fig1)\
    \ 中查看此消息的示例。\n\n![](images/480547_2_En_14_Chapter/480547_2_En_14_Fig1_HTML.jpg)\n\
    \n*图 14-1 显示已创建的 SQL Server Agent 作业的消息*\n\n启用 **Change Data Capture** 的过程还会在\
    \ `cdc` 架构中创建多个系统表。在图 [14-2](#480547_2_En_14_Chapter.xhtml#Fig2) 中，您可以找到为管理 **Change\
    \ Data Capture** 而创建的系统表。\n\n![](images/480547_2_En_14_Chapter/480547_2_En_14_Fig2_HTML.jpg)\n\
    \n*图 14-2 为 Change Data Capture 创建的系统表*\n\n## 跟踪更改\n\n您将用于跟踪 `dbo.CustomerOrder`\
    \ 上更改的表是 `cdc.dbo_CustomerOrder_CT` 表。\n\n如果您在空表上实施 **Change Data Capture**，您将能够跟踪数据记录何时更改，同时也能够跟踪自表创建以来发生了多少次更改。代码清单\
    \ [14-8](#480547_2_En_14_Chapter.xhtml#PC8) 包含一个向 `dbo.CustomerOrder` 插入记录的脚本。\n\
    \n```sql\nINSERT INTO dbo.CustomerOrder\n(\n    CustomerID,\n    OrderNumber,\n\
    \    OrderDate,\n    IsActive,\n    DateCreated,\n    DateModified\n)\nVALUES\n\
    (\n    3,\n    'T15493',\n    SYSDATETIME(),\n    1,\n    SYSDATETIME(),\n   \
    \ SYSDATETIME()\n);\n```\n*代码清单 14-8 将客户订单插入 dbo.CustomerOrder*\n\n当向现有表添加 **Change\
    \ Data Capture** 时，情况会有所不同。如果您向现有表添加 **Change Data Capture**，您仍然能够跟踪数据记录何时发生变化，但您只能确定自实施\
    \ **Change Data Capture** 以来发生了多少次数据修改。\n\n之前在代码清单 [14-8](#480547_2_En_14_Chapter.xhtml#PC8)\
    \ 中，您在 `dbo.CustomerOrder` 表上启用了 **Change Data Capture**。如果您假设该表为空，然后向其中插入一些记录，您将能够确定这些记录是何时添加的。执行代码清单\
    \ [14-9](#480547_2_En_14_Chapter.xhtml#PC9) 中的查询将显示 **Change Data Capture** 表中的记录。\n\
    \n```sql\nSELECT\n    __$start_lsn,\n    __$end_lSN,\n    __$seqval,\n    __$operation,\n\
    \    __$update_mask,\n    CustomerOrderID,\n    CustomerID,\n    OrderNumber,\n\
    \    OrderDate,\n    ShipDate,\n    IsActive,\n    DateCreated,\n    DateModified,\n\
    \    DateDisabled,\n    __$command_id\nFROM cdc.dbo_CustomerOrder_CT;\n```\n*代码清单\
    \ 14-9 查询 dbo.CustomerOrder 的 Change Data Capture 表*\n\n您可以在表 [14-4](#480547_2_En_14_Chapter.xhtml#Tab4)\
    \ 中检查已跟踪的数据记录信息的子集。\n\n*表 14-4 dbo.CustomerOrder 的变更跟踪输出*\n\n| __$start_lsn |\
    \ __$operation | CustomerOrderID | CustomerOrder |\n| --- | --- | --- | --- |\n\
    | 0x000000AF0001FA500005 | 2 | 802821 | T15493 |\n\n虽然记录的信息看起来不多，但保存在此表中的信息可能非常有用。`__$operation`\
    \ 列指示了在此表上发生的操作。`__$operation` 告诉您执行了哪种类型的活动。在此案例中，`__$operation` 列中的值 `2` 表示一条记录被插入到表中。`cdc.dbo_CustomerOrder_CT`\
    \ 中的 `CustomerOrderID`、`CustomerID` 和 `DateCreated` 列是插入的部分值。\n\n执行代码清单 [14-10](#480547_2_En_14_Chapter.xhtml#PC10)\
    \ 中的代码会更新表中的一条记录，使您能够检查变更跟踪表中的差异。\n\n```sql\nUPDATE dbo.CustomerOrder\nSET OrderNumber\
    \ = 'T-15493',\n    DateModified = GETDATE()\nWHERE CustomerOrderID = 802821;\n\
    ```\n*代码清单 14-10 更新 dbo.CustomerOrder 中的客户订单*\n\n在此查询中，您正在将订单号从 `T15493` 更改为 `T-15493`。要查找此更新的结果，您可以重新运行代码清单\
    \ [14-9](#480547_2_En_14_Chapter.xhtml#PC9) 中的 **T-SQL**。表 [14-5](#480547_2_En_14_Chapter.xhtml#Tab5)\
    \ 显示了该查询的结果。\n\n*表 14-5 dbo.CustomerOrder 的变更跟踪输出*\n\n| __$start_lsn | __$operation\
    \ | CustomerOrderID | CustomerOrder |\n| --- | --- | --- | --- |\n| 0x000000AF0001FA500005\
    \ | 2 | 802821 | T15493 |\n| 0x000000AF0001FC300003 | 3 | 802821 | T15493 |\n\
    | 0x000000AF0001FC300003 | 4 | 802821 | T-15493 |"
  raw: 'If you need to know more than the row or column that was changed and the number
    of changes that occurred for that record since implementing Change Tracking, you
    may want to consider Change Data Capture. Like Change Tracking, there are benefits
    and drawbacks of using Change Data Capture. The single largest benefit is that
    Change Data Capture will capture the details related to the data record that was
    changed.


    For inserted data, you will be able to identify exactly what was added to the
    table. Similarly, you will be able to determine all the columns for a data record
    that was deleted. When updating data, you will be able to access both the data
    before and after the update. A downside is that each change to the table requires
    that at least one record is written to a tracking table. Another downside is that
    two SQL Server Agent jobs are created for each table that is tracked. As you increase
    the number of tables under Change Data Capture, the amount of resources used will
    increase as well. This can cause the performance hit associated with Change Data
    Capture to be severe enough to prevent you from implementing Change Data Capture.


    If you decide to move forward with Change Data Capture, you can update a table
    in a database to use Change Data Capture. Before doing this, you need to allow
    Change Data Capture to occur on your database. You can enable Change Data Capture
    per database by running the T-SQL code in Listing [14-6](#480547_2_En_14_Chapter.xhtml#PC6).


    ```

    USE OutdoorRecreation;

    GO

    EXECUTE sys.sp_cdc_enable_db;

    GO

    Listing 14-6

    Enabling Database Tracking on the Menu Database

    ```


    Now that you have enabled Change Data Capture, you want to choose a table where
    you are only concerned with knowing when a record has changed. Let’s implement
    Change Data Capture on the table `dbo.CustomerOrder`. Before enabling Change Data
    Capture on this table, you need to make sure that SQL Server Agent is running
    on this instance. In Listing [14-7](#480547_2_En_14_Chapter.xhtml#PC7), you can
    find the database code needed to implement Change Data Capture on this table.


    ```

    USE OutdoorRecreation;

    GO

    EXECUTE sys.sp_cdc_enable_table

    @source_schema = ''dbo'',

    @source_name = ''CustomerOrder'',

    @role_name = NULL;

    GO

    Listing 14-7

    Enabling Database Tracking on the dbo.CustomerOrder Table

    ```


    At a minimum you need to specify the table schema, table name, and the database
    roles that can access this data. If you specify NULL for the role name, the information
    recorded by Change Data Capture will be accessible to everyone. Once this table
    has been enabled for Change Data Capture, you will be able to find the new jobs
    created in SQL Server Agent. You will receive a message once the T-SQL code in
    Listing [14-7](#480547_2_En_14_Chapter.xhtml#PC7) completes. You can examine an
    example of this message in Figure [14-1](#480547_2_En_14_Chapter.xhtml#Fig1).


    ![](images/480547_2_En_14_Chapter/480547_2_En_14_Fig1_HTML.jpg)


    2 lines of text illustrate the new jobs created in the S Q L server agent. The
    texts are as follows. Job apostrophe c d c dot outdoor recreation underscore capture,
    apostrophe started successfully. Job apostrophe c d c dot outdoor recreation underscore
    cleanup, apostrophe started successfully.


    Figure 14-1


    Message showing SQL Server Agent jobs created


    The process of enabling Change Data Capture also creates several system tables
    in the cdc schema. In Figure [14-2](#480547_2_En_14_Chapter.xhtml#Fig2), you can
    find the system tables that were created to manage Change Data Capture.


    ![](images/480547_2_En_14_Chapter/480547_2_En_14_Fig2_HTML.jpg)


    A screenshot illustrates the table folder. Tables include system tables. Following
    that, system tables comprise a number of systems, including c d c dot captured
    underscore columns, c d c dot change underscore tables, and c d c dot d d l underscore
    history.


    Figure 14-2


    System tables created for Change Data Capture


    The table that you will use to track changes on `dbo.CustomerOrder` is the `cdc.dbo_CustomerOrder_CT`
    table.


    If you implement Change Data Capture on an empty table, you will be able to track
    when your data records have changed but you will also be able to track the number
    of changes that have happened since the table was created. Listing [14-8](#480547_2_En_14_Chapter.xhtml#PC8)
    contains a script to insert records into `dbo.CustomerOrder`.


    ```

    INSERT INTO dbo.CustomerOrder

    (

    CustomerID,

    OrderNumber,

    OrderDate,

    IsActive,

    DateCreated,

    DateModified

    )

    VALUES

    (

    3,

    ''T15493'',

    SYSDATETIME(),

    1,

    SYSDATETIME(),

    SYSDATETIME()

    );

    Listing 14-8

    Inserting Customer Order into dbo.CustomerOrder

    ```


    This can work somewhat differently when adding Change Data Capture to an existing
    table. If you add Change Data Capture to an existing table, you will still be
    able to track when changes have happened to your data records, but you will only
    be able to determine the number of data modifications that have happened since
    Change Data Capture was implemented.


    Previously in Listing [14-8](#480547_2_En_14_Chapter.xhtml#PC8), you enabled Change
    Data Capture on the `dbo.CustomerOrder` table. If you assume that the table was
    empty and you insert some records into the table, you will be able to determine
    when these records were added. Executing the query in Listing [14-9](#480547_2_En_14_Chapter.xhtml#PC9)
    shows the records in the Change Data Capture table.


    ```

    SELECT __$start_lsn,

    __$end_lSN,

    __$seqval,

    __$operation,

    __$update_mask,

    CustomerOrderID,

    CustomerID,

    OrderNumber,

    OrderDate,

    ShipDate,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled,

    __$command_id

    FROM cdc.dbo_CustomerOrder_CT;

    Listing 14-9

    Querying the Change Data Capture Table for dbo.CustomerOrder

    ```


    You can examine a subset of the information that has been tracked about the data
    records in Table [14-4](#480547_2_En_14_Chapter.xhtml#Tab4).


    Table 14-4


    Change Tracking Output for dbo.CustomerOrder


    | __$start_lsn | __$operation | Customer OrderID | Customer Order |

    | --- | --- | --- | --- |

    | 0x000000AF0001FA500005 | 2 | 802821 | T15493 |


    It may not seem like there is much information being recorded, but the information
    saved in this table can be quite helpful. The column `__$operation` indicates
    the action that occurred on this table. The `__$operation` tells you which type
    of activity was performed. In this case, the value of 2 in the column `__$operation`
    signifies that a record was inserted into the table. The columns `CustomerOrderID`,
    `CustomerID`, and `DateCreated` in `cdc.dbo_CustomerOrder_CT` are some of the
    values that were inserted.


    Executing the code in Listing [14-10](#480547_2_En_14_Chapter.xhtml#PC10) updates
    a record in the table allowing you to review the differences in the change tracking
    table.


    ```

    UPDATE dbo.CustomerOrder

    SET OrderNumber = ''T-15493'',

    DateModified = GETDATE()

    WHERE CustomerOrderID = 802821;

    Listing 14-10

    Updating a Customer Order into dbo.CustomerOrder

    ```


    In this query, you are changing the order number from T15493 to T-15493. To find
    the result of this update, you can rerun the T-SQL from Listing [14-9](#480547_2_En_14_Chapter.xhtml#PC9).
    Table [14-5](#480547_2_En_14_Chapter.xhtml#Tab5) has the results of that query.


    Table 14-5


    Change Tracking Output for dbo.CustomerOrder


    | __$start_lsn | __$operation | Customer OrderID | Customer Order |

    | --- | --- | --- | --- |

    | 0x000000AF0001FA500005 | 2 | 802821 | T15493 |

    | 0x000000AF0001FC300003 | 3 | 802821 | T15493 |

    | 0x000000AF0001FC300003 | 4 | 802821 | T-15493 |'
  trans: "\n# 变更数据捕获详解\n\n## 概念与权衡\n\n如果需要了解比“哪一行或哪一列被更改”以及“该记录自实施变更跟踪以来发生了多少次更改”更多的信息，您可能需要考虑\
    \ **变更数据捕获**。与 **变更跟踪** 类似，使用 **变更数据捕捕获** 也有其优缺点。\n\n最大的好处是 **变更数据捕获** 将捕获与已更改数据记录相关的详细信息。\n\
    \n-   对于插入的数据，您将能够准确识别向表中添加了什么。\n-   同样，您将能够确定被删除数据记录的所有列。\n-   更新数据时，您将能够访问更新前后的数据。\n\
    \n缺点包括：\n\n-   对表的每次更改都要求至少有一条记录被写入跟踪表。\n-   另一个缺点是，为每个被跟踪的表都会创建两个 **SQL Server\
    \ Agent** 作业。\n-   随着您在 **变更数据捕获** 下管理的表数量增加，所使用的资源量也会增加。这可能会导致与 **变更数据捕获** 相关的性能开销变得非常严重，以至于阻止您实施该功能。\n\
    \n## 启用变更数据捕获\n\n如果决定使用 **变更数据捕获**，您可以更新数据库中的一个表来使用它。在此之前，您需要允许在您的数据库上运行 **变更数据捕获**。您可以通过运行代码清单\
    \ 14-6 中的 **T-SQL** 代码来按数据库启用 **变更数据捕获**。\n\n```sql\nUSE OutdoorRecreation;\n\
    GO\nEXECUTE sys.sp_cdc_enable_db;\nGO\n```\n*代码清单 14-6 在 Menu 数据库上启用数据库跟踪*\n\n\
    ## 在特定表上启用\n\n现在您已经启用了 **变更数据捕获**，需要选择一个表，您只关心记录何时发生变化。让我们在表 `dbo.CustomerOrder`\
    \ 上实施 **变更数据捕获**。在此表上启用 **变更数据捕获** 之前，您需要确保此实例上正在运行 **SQL Server Agent**。在代码清单\
    \ 14-7 中，您可以找到在此表上实施 **变更数据捕获** 所需的数据库代码。\n\n```sql\nUSE OutdoorRecreation;\n\
    GO\nEXECUTE sys.sp_cdc_enable_table\n    @source_schema = 'dbo',\n    @source_name\
    \ = 'CustomerOrder',\n    @role_name = NULL;\nGO\n```\n*代码清单 14-7 在 dbo.CustomerOrder\
    \ 表上启用数据库跟踪*\n\n您至少需要指定表架构、表名以及可以访问此数据的数据库角色。如果将角色名指定为 `NULL`，则 **变更数据捕获** 记录的信息将对所有人可访问。一旦此表启用了\
    \ **变更数据捕获**，您将能够在 **SQL Server Agent** 中找到新创建的作业。**T-SQL** 代码（代码清单 14-7）完成后，您会收到一条消息。您可以在图\
    \ 14-1 中查看此消息的示例。\n\n![](img/480547_2_En_14_Fig1_HTML.jpg)\n\n*图 14-1 显示已创建的 SQL\
    \ Server Agent 作业的消息*\n\n启用 **变更数据捕获** 的过程还会在 `cdc` 架构中创建多个系统表。在图 14-2 中，您可以找到为管理\
    \ **变更数据捕获** 而创建的系统表。\n\n![](img/480547_2_En_14_Fig2_HTML.jpg)\n\n*图 14-2 为变更数据捕获创建的系统表*\n\
    \n## 跟踪更改\n\n您将用于跟踪 `dbo.CustomerOrder` 上更改的表是 `cdc.dbo_CustomerOrder_CT` 表。\n\
    \n如果您在空表上实施 **变更数据捕获**，您将能够跟踪数据记录何时更改，同时也能够跟踪自表创建以来发生了多少次更改。代码清单 14-8 包含一个向 `dbo.CustomerOrder`\
    \ 插入记录的脚本。\n\n```sql\nINSERT INTO dbo.CustomerOrder\n(\n    CustomerID,\n    OrderNumber,\n\
    \    OrderDate,\n    IsActive,\n    DateCreated,\n    DateModified\n)\nVALUES\n\
    (\n    3,\n    'T15493',\n    SYSDATETIME(),\n    1,\n    SYSDATETIME(),\n   \
    \ SYSDATETIME()\n);\n```\n*代码清单 14-8 将客户订单插入 dbo.CustomerOrder*\n\n当向现有表添加 **变更数据捕获**\
    \ 时，情况会有所不同。如果您向现有表添加 **变更数据捕获**，您仍然能够跟踪数据记录何时发生变化，但您只能确定自实施 **变更数据捕获** 以来发生了多少次数据修改。\n\
    \n之前在代码清单 14-8 中，您在 `dbo.CustomerOrder` 表上启用了 **变更数据捕获**。如果您假设该表为空，然后向其中插入一些记录，您将能够确定这些记录是何时添加的。执行代码清单\
    \ 14-9 中的查询将显示 **变更数据捕获** 表中的记录。\n\n```sql\nSELECT\n    __$start_lsn,\n    __$end_lSN,\n\
    \    __$seqval,\n    __$operation,\n    __$update_mask,\n    CustomerOrderID,\n\
    \    CustomerID,\n    OrderNumber,\n    OrderDate,\n    ShipDate,\n    IsActive,\n\
    \    DateCreated,\n    DateModified,\n    DateDisabled,\n    __$command_id\nFROM\
    \ cdc.dbo_CustomerOrder_CT;\n```\n*代码清单 14-9 查询 dbo.CustomerOrder 的变更数据捕获表*\n\n\
    您可以在表 14-4 中检查已跟踪的数据记录信息的子集。\n\n*表 14-4 dbo.CustomerOrder 的变更跟踪输出*\n\n| __$start_lsn\
    \ | __$operation | CustomerOrderID | CustomerOrder |\n| --- | --- | --- | ---\
    \ |\n| 0x000000AF0001FA500005 | 2 | 802821 | T15493 |\n\n虽然记录的信息看起来不多，但保存在此表中的信息可能非常有用。`__$operation`\
    \ 列指示了在此表上发生的操作。`__$operation` 告诉您执行了哪种类型的活动。在此案例中，`__$operation` 列中的值 `2` 表示一条记录被插入到表中。`cdc.dbo_CustomerOrder_CT`\
    \ 中的 `CustomerOrderID`、`CustomerID` 和 `DateCreated` 列是插入的部分值。\n\n执行代码清单 14-10\
    \ 中的代码会更新表中的一条记录，使您能够检查变更跟踪表中的差异。\n\n```sql\nUPDATE dbo.CustomerOrder\nSET OrderNumber\
    \ = 'T-15493',\n    DateModified = GETDATE()\nWHERE CustomerOrderID = 802821;\n\
    ```\n*代码清单 14-10 更新 dbo.CustomerOrder 中的客户订单*\n\n在此查询中，您正在将订单号从 `T15493` 更改为 `T-15493`。要查找此更新的结果，您可以重新运行代码清单\
    \ 14-9 中的 **T-SQL**。表 14-5 显示了该查询的结果。\n\n*表 14-5 dbo.CustomerOrder 的变更跟踪输出*\n\n\
    | __$start_lsn | __$operation | CustomerOrderID | CustomerOrder |\n| --- | ---\
    \ | --- | --- |\n| 0x000000AF0001FA500005 | 2 | 802821 | T15493 |\n| 0x000000AF0001FC300003\
    \ | 3 | 802821 | T15493 |\n| 0x000000AF0001FC300003 | 4 | 802821 | T-15493 |\n"
- fmt: "## 变更数据捕获输出\n\n表 `cdc.dbo_CustomerOrder_CT` 中将有两个条目具有相同的起始 LSN `0x000000AF0001FC300003`。这两行都与从清单\
    \ [14-10](#480547_2_En_14_Chapter.xhtml#PC10) 执行的更新相关。表中第一行 `__$start_lsn` 为 `0x000000AF0001FC300003`\
    \ 的行具有 `__$operation` 为 `3`。此操作类型用于表示表中更新前的值。第二行 `__$start_lsn` 为 `0x000000AF0001FC300003`\
    \ 的行具有 `__$operation` 为 `4`。此操作值表示该行中的值是更新完成后的值。在本例中，`CustomerOrderID` 保持不变。但是，`CustomerOrder`\
    \ 发生了变化。`__$operation` 为 `3` 且 `CustomerOrder` 为 `T15493` 的行是 `CustomerOrder`\
    \ 的旧值；`__$operation` 为 `4` 且 `CustomerOrder` 为 `T-15493` 的行是新值。\n\n我已经介绍了如何在启用了变更数据捕获的表中插入和更新数据。最后要检查的操作是从表中删除记录。清单\
    \ [14-11](#480547_2_En_14_Chapter.xhtml#PC11) 中的代码删除了从清单 [14-8](#480547_2_En_14_Chapter.xhtml#PC8)\
    \ 添加的记录。\n\n```sql\nDELETE FROM dbo.CustomerOrder\nWHERE CustomerOrderID = 802821;\n\
    ```\n清单 14-11\n删除 dbo.CustomerOrder 中的客户订单\n\n删除此记录后，可以执行清单 [14-10](#480547_2_En_14_Chapter.xhtml#PC10)\
    \ 中的 T-SQL 来确定跟踪表中是否有新添加的记录。此查询的结果如表 [14-6](#480547_2_En_14_Chapter.xhtml#Tab6)\
    \ 所示。\n\n表 14-6\n\n dbo.CustomerOrder 的变更跟踪输出\n\n| __$start_lsn | __$operation\
    \ | CustomerOrderID | CustomerOrder |\n| --- | --- | --- | --- |\n| 0x000000AF0001FA500005\
    \ | 2 | 802821 | T15493 |\n| 0x000000AF0001FC300003 | 3 | 802821 | T15493 |\n\
    | 0x000000AF0001FC300003 | 4 | 802821 | T-15493 |\n| 0x000000B0000003A00008 |\
    \ 1 | 802821 | T-15493 |\n\n表中的最后一条记录是为了跟踪清单 [14-11](#480547_2_En_14_Chapter.xhtml#PC11)\
    \ 中的删除操作而添加的。`__$operation` 为 `1` 用于表示该记录正在跟踪对表执行的删除操作。\n\n如果表已存在并且您启用了变更数据捕获，您将无法找到原始数据记录的条目，直到它们被更新。一旦这些记录被修改，它们将出现在\
    \ `cdc.dbo_CustomerOrder_CT` 表中。虽然变更数据捕获在设置和实现上可能很简单，但在将表添加到变更数据捕获时应谨慎。添加到变更数据捕获的每个表都会导致创建两个\
    \ SQL Server Agent 作业。由于跟踪这些表上的更改，还会产生大量的日志记录。这两者都可能导致 SQL Server 使用额外的资源。\n\n\
    您可以使用变更跟踪、变更数据捕获或数据库触发器来跟踪数据修改。所有这些选项都有其自身的优点和局限性。在为组织选择合适的选项时，您需要考虑需要记录的数据类型以及您愿意为跟踪这些更改所承担的性能开销。如果您需要更好的性能，通常必须选择较少的功能。您想要收集的信息越多，或者您想要自定义记录数据修改的程度越高，都将导致硬件利用率增加和潜在的性能开销。\n\
    \n## 错误处理\n\n本节讨论如何编写 T-SQL 代码，以便在遇到错误时能按预期（甚至优雅地）运行。一种解决方案是使用 `TRY…CATCH` 块。这是编写\
    \ T-SQL 代码时的一种流行方法。但是，它确实需要对未设计为能优雅处理 SQL Server 错误的应用程序进行一些潜在的修改。另一个不太稳健的选择是创建数据库表来记录历史信息以及日志活动。这可能在防止应用程序崩溃方面帮助不大，但它可能有助于显示问题开始发生的时间。\n\
    \n除了记录数据修改外，记录数据库中发生的某些类型的错误也可能对您有益。虽然可能会发生特定于 SQL Server 的错误，但这并不是本节的重点。也有一些错误是由于应用程序与数据库交互而产生的。其中许多错误可以作为应用程序开发的一部分在\
    \ SQL Server 外部记录。但是，您可能会发现某些问题需要从 SQL Server 内部访问。\n\n在考虑错误处理时，您需要考虑如何记录该信息以及应用程序如何处理错误。在\
    \ SQL Server 内部更常见的选项之一是使用 `TRY...CATCH` 块。这段代码封装了尝试执行 T-SQL 代码并在尝试失败时执行特定操作的能力。如果代码成功，则\
    \ T-SQL 代码将按预期执行。清单 [14-12](#480547_2_En_14_Chapter.xhtml#PC12) 展示了一个 `TRY…CATCH`\
    \ 块。\n\n```sql\nCREATE PROCEDURE dbo.CustomerOrderInsert\n@CustomerID INT,\n@OrderNumber\
    \ VARCHAR(15),\n@OrderDate DATETIME2(2),\n@ShipDate DATETIME2(2),\n@IsActive BIT,\n\
    @DateCreated DATETIME2(2),\n@DateModified DATETIME2(2),\n@DateDisabled DATETIME2(2)\n\
    AS\nBEGIN TRY\nBEGIN TRANSACTION;\nINSERT INTO dbo.CustomerOrder\n(\nCustomerID,\n\
    OrderNumber,\nOrderDate,\nShipDate,\nIsActive,\nDateCreated,\nDateModified,\n\
    DateDisabled\n)\nVALUES\n(\n@CustomerID,\n@OrderNumber,\n@OrderDate,\n@ShipDate,\n\
    @IsActive,\n@DateCreated,\n@DateModified,\n@DateDisabled\n);\nCOMMIT TRANSACTION;\n\
    END TRY\nBEGIN CATCH\nROLLBACK TRANSACTION;\nEND CATCH;\n```\n清单 14-12\n用于插入客户订单的\
    \ Try…Catch 块\n\n如果没有错误，此代码块将插入一条记录。但是，如果遇到错误，事务将回滚。有一些方法可以将此功能与您的应用程序代码集成，以便用户知道事务出错。使用此方法的目标是防止应用程序崩溃或防止最终用户期望事务正确保存。\n\
    \n您还可以在 `CATCH` 块中添加错误处理，以提供有关失败原因的更多信息。您可以更新清单 [14-12](#480547_2_En_14_Chapter.xhtml#PC12)\
    \ 中的存储过程以包含错误输出，如清单 [14-13](#480547_2_En_14_Chapter.xhtml#PC13) 所示。\n\n```sql\n\
    CREATE OR ALTER PROCEDURE dbo.CustomerOrderInsert\n@CustomerID INT,\n@OrderNumber\
    \ VARCHAR(15),\n@OrderDate DATETIME2(2),\n@ShipDate DATETIME2(2),\n@IsActive BIT,\n\
    @DateCreated DATETIME2(2),\n@DateModified DATETIME2(2),\n@DateDisabled DATETIME2(2)\n\
    AS\nBEGIN TRY\nBEGIN TRANSACTION;\nINSERT INTO dbo.CustomerOrder\n(\nCustomerID,\n\
    OrderNumber,\nOrderDate,\nShipDate,\nIsActive,\nDateCreated,\nDateModified,\n\
    DateDisabled\n)\nVALUES\n(\n@CustomerID,\n@OrderNumber,\n@OrderDate,\n@ShipDate,\n\
    @IsActive,\n@DateCreated,\n@DateModified,\n@DateDisabled\n);\nCOMMIT TRANSACTION;\n\
    END TRY\nBEGIN CATCH\nSELECT ERROR_NUMBER() AS ErrorNumber,\nERROR_SEVERITY()\
    \ AS ErrorSeverity,\nERROR_STATE() AS ErrorState,\nERROR_PROCEDURE() AS ErrorProcedure,\n\
    ERROR_MESSAGE() AS ErrorMessage;\nROLLBACK TRANSACTION;\nEND CATCH;\n```\n清单 14-13\n\
    用于插入客户订单并包含错误信息的 Try…Catch 块\n\n现在，如果插入失败有原因，用户将收到一条包含失败信息的消息。这使用户可以选择更正问题并重试该操作。"
  raw: 'There will be two entries in the table `cdc.dbo_CustomerOrder_CT` table with
    the same starting LSN of 0x000000AF0001FC300003\. Both of these lines are associated
    with the update executed from Listing [14-10](#480547_2_En_14_Chapter.xhtml#PC10).
    The first row in the table with a __$start_lsn of 0x000000AF0001FC300003 has an
    $__operation of 3\. This operation type is used for the values in the table before
    the update. The second row for __$start_lsn 0x000000AF0001FC300003 has an $__operation
    of 4\. This operation value indicates the values in this row are the values after
    the update completed. In order case, `CustomerOrderID` remained the same. However,
    `CustomerOrder` changed. The __$operation 3 with a `CustomerOrder` of T15493 is
    the old value for the `CustomerOrder`; the __$operation 4 with the `CustomerOrder`
    of T-15493 is the new value.


    I covered inserting and updating data in a table with change data capture enabled.
    The last action to review is deleting a record from the table. The code in Listing
    [14-11](#480547_2_En_14_Chapter.xhtml#PC11) deletes the record added from Listing
    [14-8](#480547_2_En_14_Chapter.xhtml#PC8).


    ```

    DELETE FROM dbo.CustomerOrder

    WHERE CustomerOrderID = 802821;

    Listing 14-11

    Deleting Customer Order into dbo.CustomerOrder

    ```


    Once this record is deleted, you can execute the T-SQL from Listing [14-10](#480547_2_En_14_Chapter.xhtml#PC10)
    to determine if there are any new records added to the tracking table. The results
    of this query are in Table [14-6](#480547_2_En_14_Chapter.xhtml#Tab6).


    Table 14-6


    Change Tracking Output for dbo.CustomerOrder


    | __$start_lsn | __$operation | Customer OrderID | Customer Order |

    | --- | --- | --- | --- |

    | 0x000000AF0001FA500005 | 2 | 802821 | T15493 |

    | 0x000000AF0001FC300003 | 3 | 802821 | T15493 |

    | 0x000000AF0001FC300003 | 4 | 802821 | T-15493 |

    | 0x000000B0000003A00008 | 1 | 802821 | T-15493 |


    The last record in this table was added to track the delete from Listing [14-11](#480547_2_En_14_Chapter.xhtml#PC11).
    The __$operation of 1 is used to indicate the record is tracking a delete performed
    on the table.


    If the table already existed and you enabled Change Data Capture, you would not
    find entries for the original data records until they had been updated. Once these
    records are modified, they will show up in the `cdc.dbo_CustomerOrder_CT` table.
    While Change Data Capture can be easy for setup and implementation, you should
    use caution when adding tables to Change Data Capture. Each table added to Change
    Data Capture causes two SQL Server Agent jobs to be created. There is also a significant
    amount of logging that occurs as a result of tracking changes on these tables.
    Both can cause SQL Server to use additional resources.


    You can use Change Tracking, Change Data Capture, or database triggers to track
    data modifications. All of these options have their own strengths and limitations.
    When choosing the right option for your organization, you want to consider what
    type of data you need to record and the performance overhead you are willing to
    incur tracking these changes. If you need better performance, you generally have
    to choose less functionality. The more information you want to collect or the
    more you want to customize logging data modifications will come at a cost of increased
    hardware utilization and potential performance overhead.


    ## Error Handling


    This section discusses how you can write T-SQL code that function expectedly,
    if not gracefully, when an error is encountered. One solution is to use a TRY…
    CATCH block. This is a popular method in terms of writing T-SQL code. However,
    it does require some potential modifications to applications that are not designed
    to handle SQL Server errors gracefully. Another less robust option is to create
    database tables to record historical information as well as logging activities.
    This may not help as much in preventing an application from crashing, but it may
    help show when an issue started happening.


    In addition to logging data modifications, you may also benefit from logging certain
    types of errors that occur within the database. While there are SQL Server-specific
    errors that can occur, this is not the focus of this section. There are also errors
    that occur as a result of the application interacting with the database. Many
    of these errors can be logged outside of SQL Server as part of your application
    development. However, you may find that some issues need to be accessible from
    within SQL Server.


    When considering error handling, you want to consider how that information is
    logged and how the application handles errors. One of the more common options
    from within SQL Server is to use a TRY... CATCH block. This code wraps the ability
    to try the T-SQL code and perform a specific action if that attempt failed. If
    the code succeeds, then the T-SQL code will execute as expected. Listing [14-12](#480547_2_En_14_Chapter.xhtml#PC12)
    shows a TRY… CATCH block.


    ```

    CREATE PROCEDURE dbo.CustomerOrderInsert

    @CustomerID INT,

    @OrderNumber VARCHAR(15),

    @OrderDate DATETIME2(2),

    @ShipDate DATETIME2(2),

    @IsActive BIT,

    @DateCreated DATETIME2(2),

    @DateModified DATETIME2(2),

    @DateDisabled DATETIME2(2)

    AS

    BEGIN TRY

    BEGIN TRANSACTION;

    INSERT INTO dbo.CustomerOrder

    (

    CustomerID,

    OrderNumber,

    OrderDate,

    ShipDate,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    )

    VALUES

    (

    @CustomerID,

    @OrderNumber,

    @OrderDate,

    @ShipDate,

    @IsActive,

    @DateCreated,

    @DateModified,

    @DateDisabled

    );

    COMMIT TRANSACTION;

    END TRY

    BEGIN CATCH

    ROLLBACK TRANSACTION;

    END CATCH;

    Listing 14-12

    Try… Catch Block to Insert Customer Order

    ```


    This block of code inserts a record if there are no errors. However, if an error
    is encountered, the transaction will be rolled back. There are some ways to integrate
    this with your application code so that the user is aware there was an error with
    the transaction. The goal of using this method is to prevent the application from
    crashing or prevent the end user from expecting the transaction to save correctly.


    You can also add error handing in the CATCH block that can provide more information
    about the reason for failure. You can update the stored procedure in Listing [14-12](#480547_2_En_14_Chapter.xhtml#PC12)
    to include an error output as displayed in Listing [14-13](#480547_2_En_14_Chapter.xhtml#PC13).


    ```

    CREATE OR ALTER PROCEDURE dbo.CustomerOrderInsert

    @CustomerID INT,

    @OrderNumber VARCHAR(15),

    @OrderDate DATETIME2(2),

    @ShipDate DATETIME2(2),

    @IsActive BIT,

    @DateCreated DATETIME2(2),

    @DateModified DATETIME2(2),

    @DateDisabled DATETIME2(2)

    AS

    BEGIN TRY

    BEGIN TRANSACTION;

    INSERT INTO dbo.CustomerOrder

    (

    CustomerID,

    OrderNumber,

    OrderDate,

    ShipDate,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    )

    VALUES

    (

    @CustomerID,

    @OrderNumber,

    @OrderDate,

    @ShipDate,

    @IsActive,

    @DateCreated,

    @DateModified,

    @DateDisabled

    );

    COMMIT TRANSACTION;

    END TRY

    BEGIN CATCH

    SELECT ERROR_NUMBER() AS ErrorNumber,

    ERROR_SEVERITY() AS ErrorSeverity,

    ERROR_STATE() AS ErrorState,

    ERROR_PROCEDURE() AS ErrorProcedure,

    ERROR_MESSAGE() AS ErrorMessage;

    ROLLBACK TRANSACTION;

    END CATCH;

    Listing 14-13

    Try… Catch Block to Insert Customer Order with Error Information

    ```


    Now if the there is a reason the insert fails, the user will receive a message
    with information about the failure. This gives the user the option to correct
    the issue and retry the action.'
  trans: "\n## 变更数据捕获输出\n\n表 `cdc.dbo_CustomerOrder_CT` 中将有两个条目具有相同的起始 LSN `0x000000AF0001FC300003`。这两行都与从清单\
