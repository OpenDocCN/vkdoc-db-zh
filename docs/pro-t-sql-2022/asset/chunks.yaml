- fmt: "## Considering CPU with T-SQL Design\n\nSQL Server not only works with memory\
    \ and storage; it also interacts with the server CPU. This is one of the final\
    \ pieces to consider when designing your queries. When it comes to licensing SQL\
    \ Server, the CPU can be a significant cost. Some of this may be due to not understanding\
    \ the best CPU needed for SQL Server. SQL Server has licensing limits. If you\
    \ don’t fit into them, you may buy CPU cores that SQL will never see or use. Because\
    \ most people pay by the core, it makes sense to make sure each individual core\
    \ is as powerful as possible. You may even be able to save money on SQL licensing\
    \ that overcomes the increased cost of the higher-powered CPU. There is the matter\
    \ of performing calculations as part of your T-SQL code.\n\nAs discussed, there\
    \ are times where a significant use of memory can cause I/O issues. The same can\
    \ be said when there is a significant amount of I/O activity; this can lead to\
    \ CPU issues. When considering memory in your overall T-SQL design, there are\
    \ two types of caching. In that section, I mainly focused on buffer caching or\
    \ the buffer pool. In this section, I’m coming full circle to discuss how caching\
    \ of execution plans can contribute to CPU performance issues.\n\nWhen you run\
    \ a query, SQL Server has to review at all the tables involved, all the indexes\
    \ on those tables, and all join predicates and where clauses to figure out which\
    \ combination of tables, indexes, and join types will bring about acceptable and\
    \ accurate performance of the query. The result of this calculation is called\
    \ a `` `query execution plan` ``.\n\nWhile sometimes queries are simple and that\
    \ process is quick and easy, other times it can be much more resource intensive.\
    \ Especially for this second scenario, we would very much like SQL Server to be\
    \ able to reuse that plan rather than have to recalculate it should a similar\
    \ query be executed.\n\nFor SQL Server to know how to execute a query, it must\
    \ utilize the CPU. This is considered a CPU cost. The expectation is that this\
    \ type of cost should not cause performance issues because frequently executed\
    \ prepared statements and stored procedures will already have their plans saved\
    \ in the cache and do not need to have these execution plans recreated with any\
    \ amount of significant frequency.\n\nThis leads to what causes SQL Server to\
    \ determine that a new execution plan is needed. This is directly related to understanding\
    \ what SQL Server does when it creates an execution plan. Part of creating an\
    \ execution plan is making a value that allows SQL Server to quickly find a previously\
    \ created execution plan. This value is known as the `plan hash`. The goal is\
    \ to create execution plans when necessary and reuse those execution plans as\
    \ much as possible. All of these plans are stored in the `plan cache`. Only queries\
    \ that look the same have the same `plan hash` and will use the same execution\
    \ plan. While you may have several queries that look similar or return the same\
    \ results, SQL Server may not give them the same `plan hash`. If SQL Server doesn't\
    \ identify an existing plan in the `plan cache`, it will need to create a new\
    \ execution plan. This dependency on the `plan hash` helps determine if a new\
    \ execution plan needs to be created.\n\nThis causes us to become dependent on\
    \ using parameters. These parameters can exist either in stored procedures or\
    \ prepared statements. If the query that is being executed has the same `plan\
    \ hash` as one in the `plan cache`, SQL Server will not recreate a new execution\
    \ plan. This process of creating an execution plan is called `` `compilation`\
    \ ``. This can be one of the many reasons that your queries may be using more\
    \ CPU resources than you expected.\n\nIt is also possible that SQL Server may\
    \ determine it needs to create a new execution plan for a query where there is\
    \ already an associated `plan hash` in the execution cache. Introduced in SQL\
    \ Server 2016, the statistics on database tables are updated based on a dynamic\
    \ threshold for the number of rows in the table. If the statistics are updated,\
    \ SQL Server may opt to generate a new execution plan. This can be the result\
    \ of frequent data changes or it can be the result of parameter sniffing. For\
    \ more information about parameter sniffing, see Chapter 2 and Chapter 8. Either\
    \ way, it will lead to something that SQL Server identifies as a `` `recompilation`\
    \ ``. Just like there is a cost associated with a query `compilation`, there is\
    \ also a cost on the CPU associated with `recompilation`s.\n\nIf there is a significant\
    \ amount of I/O being handled for a query, this may spill over into causing CPU\
    \ performance issues. While it is possible that a query may be accessing more\
    \ data than is necessary, it may not be due to the overall T-SQL query design.\
    \ It could be due to out-of-date statistics. While the concept of managing statistics\
    \ is outside the scope of this book, you want to be aware of the effect that statistics\
    \ have on your execution plans. Statistics are what give SQL Server a quick glance\
    \ at the overall distribution of data within a specific data table or index. The\
    \ concept is that proper statistics help SQL Server make a best guess as to how\
    \ to create an execution plan. If these values are out of date or stale, SQL Server\
    \ may decide on an execution plan that is would not be as efficient as it could\
    \ be if SQL Server had up-to-date statistics. Due to the out-of-date statistics,\
    \ there can be a significant difference between the estimated and actual number\
    \ of reads. This can have a performance impact on the CPU. You can see that the\
    \ statistics have been updated and the estimated and actual number of rows returned\
    \ remains relatively consistent.\n\nThere is also the possibility that SQL Server\
    \ is having to traverse more of the hard disk or storage than it originally anticipated.\
    \ This can be due to situations involving fragmentation. In the case of higher-than-normal\
    \ CPU activity, it could be due to index fragmentation. This means that SQL Server\
    \ may have only estimated a certain amount of work required to retrieve data by\
    \ assuming that the index was not fragmented. However, since the index is fragmented,\
    \ SQL Server must do potentially more work than it anticipated to access the requested\
    \ data.\n\nAnother common issue that can happen with your T-SQL query design involves\
    \ data types. There are many different places in SQL Server where you will define\
    \ data types. They can be defined in tables, temporary tables, parameters, stored\
    \ procedure, variables, and even the data types that are specified through your\
    \ application code. As discussed in Chapter 1, SQL Server can convert one data\
    \ type to another in the background; this process is called `` `implicit conversion`\
    \ ``. While SQL Server can handle `implicit conversion` and has a structured process\
    \ to do so, forcing SQL Server to perform an `implicit conversion` can also have\
    \ a CPU cost associated with that activity. The code in Listing 6-5 is an example\
    \ of an `implicit conversion`.\n\n```sql\nDECLARE @IsActive NVARCHAR(1);\nSET\
    \ @IsActive = 1;\nSELECT CustomerID,\n       FirstName,\n       LastName,\n  \
    \     [Address],\n       City,\n       PostalCode,\n       IsActive,\n       DateCreated,\n\
    \       DateModified,\n       DateDisabled\nFROM dbo.Customer\nWHERE IsActive\
    \ = @IsActive;\n```\nListing 6-5\nQuery with Implicit Conversion"
  raw: '## Considering CPU with T-SQL Design


    SQL Server not only works with memory and storage; it also interacts with the
    server CPU. This is one of the final pieces to consider when designing your queries.
    When it comes to licensing SQL Server, the CPU can be a significant cost. Some
    of this may be due to not understanding the best CPU needed for SQL Server. SQL
    Server has licensing limits. If you don’t fit into them, you may buy CPU cores
    that SQL will never see or use. Because most people pay by the core, it makes
    sense to make sure each individual core is as powerful as possible. You may even
    be able to save money on SQL licensing that overcomes the increased cost of the
    higher-powered CPU. There is the matter of performing calculations as part of
    your T-SQL code.


    As discussed, there are times where a significant use of memory can cause I/O
    issues. The same can be said when there is a significant amount of I/O activity;
    this can lead to CPU issues. When considering memory in your overall T-SQL design,
    there are two types of caching. In that section, I mainly focused on buffer caching
    or the buffer pool. In this section, I’m coming full circle to discuss how caching
    of execution plans can contribute to CPU performance issues.


    When you run a query, SQL Server has to review at all the tables involved, all
    the indexes on those tables, and all join predicates and where clauses to figure
    out which combination of tables, indexes, and join types will bring about acceptable
    and accurate performance of the query. The result of this calculation is called
    a *query execution plan*.


    While sometimes queries are simple and that process is quick and easy, other times
    it can be much more resource intensive. Especially for this second scenario, we
    would very much like SQL Server to be able to reuse that plan rather than have
    to recalculate it should a similar query be executed.


    For SQL Server to know how to execute a query, it must utilize the CPU. This is
    considered a CPU cost. The expectation is that this type of cost should not cause
    performance issues because frequently executed prepared statements and stored
    procedures will already have their plans saved in the cache and do not need to
    have these execution plans recreated with any amount of significant frequency.


    This leads to what causes SQL Server to determine that a new execution plan is
    needed. This is directly related to understanding what SQL Server does when it
    creates an execution plan. Part of creating an execution plan is making a value
    that allows SQL Server to quickly find a previously created execution plan. This
    value is known as the plan hash. The goal is to create execution plans when necessary
    and reuse those execution plans as much as possible. All of these plans are stored
    in the plan cache. Only queries that look the same have the same plan hash and
    will use the same execution plan. While you may have several queries that look
    similar or return the same results, SQL Server may not give them the same plan
    hash. If SQL Server doesn''t identify an existing plan in the plan cache, it will
    need to create a new execution plan. This dependency on the plan hash helps determine
    if a new execution plan needs to be created.


    This causes us to become dependent on using parameters. These parameters can exist
    either in stored procedures or prepared statements. If the query that is being
    executed has the same plan hash as one in the plan cache, SQL Server will not
    recreate a new execution plan. This process of creating an execution plan is called
    *compilation*. This can be one of the many reasons that your queries may be using
    more CPU resources than you expected.


    It is also possible that SQL Server may determine it needs to create a new execution
    plan for a query where there is already an associated plan hash in the execution
    cache. Introduced in SQL Server 2016, the statistics on database tables are updated
    based on a dynamic threshold for the number of rows in the table. If the statistics
    are updated, SQL Server may opt to generate a new execution plan. This can be
    the result of frequent data changes or it can be the result of parameter sniffing.
    For more information about parameter sniffing, see Chapter [2](#480547_2_En_2_Chapter.xhtml)
    and Chapter [8](#480547_2_En_8_Chapter.xhtml). Either way, it will lead to something
    that SQL Server identifies as a recompilation. Just like there is a cost associated
    with a query compilation, there is also a cost on the CPU associated with recompilations.


    If there is a significant amount of I/O being handled for a query, this may spill
    over into causing CPU performance issues. While it is possible that a query may
    be accessing more data than is necessary, it may not be due to the overall T-SQL
    query design. It could be due to out-of-date statistics. While the concept of
    managing statistics is outside the scope of this book, you want to be aware of
    the effect that statistics have on your execution plans. Statistics are what give
    SQL Server a quick glance at the overall distribution of data within a specific
    data table or index. The concept is that proper statistics help SQL Server make
    a best guess as to how to create an execution plan. If these values are out of
    date or stale, SQL Server may decide on an execution plan that is would not be
    as efficient as it could be if SQL Server had up-to-date statistics. Due to the
    out-of-date statistics, there can be a significant difference between the estimated
    and actual number of reads. This can have a performance impact on the CPU. You
    can see that the statistics have been updated and the estimated and actual number
    of rows returned remains relatively consistent.


    There is also the possibility that SQL Server is having to traverse more of the
    hard disk or storage than it originally anticipated. This can be due to situations
    involving fragmentation. In the case of higher-than-normal CPU activity, it could
    be due to index fragmentation. This means that SQL Server may have only estimated
    a certain amount of work required to retrieve data by assuming that the index
    was not fragmented. However, since the index is fragmented, SQL Server must do
    potentially more work than it anticipated to access the requested data.


    Another common issue that can happen with your T-SQL query design involves data
    types. There are many different places in SQL Server where you will define data
    types. They can be defined in tables, temporary tables, parameters, stored procedure,
    variables, and even the data types that are specified through your application
    code. As discussed in Chapter [1](#480547_2_En_1_Chapter.xhtml), SQL Server can
    convert one data type to another in the background; this process is called *implicit
    conversion*. While SQL Server can handle implicit conversion and has a structured
    process to do so, forcing SQL Server to perform an implicit conversion can also
    have a CPU cost associated with that activity. The code in Listing [6-5](#480547_2_En_6_Chapter.xhtml#PC5)
    is an example of an implicit conversion.


    ```

    DECLARE @IsActive NVARCHAR(1);

    SET @IsActive = 1;

    SELECT CustomerID,

    FirstName,

    LastName,

    [Address],

    City,

    PostalCode,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    FROM dbo.Customer

    WHERE IsActive = @IsActive;

    Listing 6-5

    Query with Implicit Conversion

    ```'
  trans: "\n## 考虑 CPU 与 T-SQL 设计\n\nSQL Server 不仅与内存和存储交互；它也与服务器 CPU 交互。这是在设计查询时需要考虑的最终环节之一。当涉及到\
    \ SQL Server 的许可时，CPU 可能是一笔显著的成本。部分原因可能在于不理解 SQL Server 所需的最佳 CPU。SQL Server 有其许可限制。如果不遵守这些限制，你可能会购买\
    \ SQL 永远无法识别或使用的 CPU 核心。由于大多数人按核心付费，因此确保每个核心尽可能强大是有意义的。你甚至可能通过节省 SQL 许可费用，来抵消更高性能\
    \ CPU 所带来的额外成本。此外，还有一个问题是在你的 T-SQL 代码中执行计算。\n\n如前所述，有时大量使用内存会导致 I/O 问题。同样，当存在大量\
    \ I/O 活动时，这也可能导致 CPU 问题。在整体 T-SQL 设计中考虑内存时，有两种类型的缓存。在那一节中，我主要关注了缓冲区缓存或缓冲池。在本节中，我将完整循环一圈，讨论执行计划的缓存如何导致\
    \ CPU 性能问题。\n\n当你运行一个查询时，SQL Server 必须查看所有涉及的表、这些表上的所有索引、所有的联接谓词和 WHERE 子句，以弄清楚哪种表、索引和联接类型的组合能够带来可接受且准确的查询性能。这个计算的结果被称为\
    \ `` `查询执行计划` ``。\n\n虽然有时查询很简单，这个过程快速而容易，但其他时候它可能资源消耗大得多。特别是对于第二种情况，我们非常希望 SQL\
    \ Server 能够重用该计划，而不是在执行类似查询时必须重新计算它。\n\n为了让 SQL Server 知道如何执行查询，它必须利用 CPU。这被视为一种\
    \ CPU 成本。期望是这种成本不应该导致性能问题，因为频繁执行的预 pared 语句和存储过程的计划已经保存在缓存中，不需要以任何显著的频率重新创建这些执行计划。\n\
    \n这就引出了是什么导致 SQL Server 判断需要一个新的执行计划。这直接关系于理解 SQL Server 在创建执行计划时做了什么。创建执行计划的一部分是生成一个值，允许\
    \ SQL Server 快速找到先前创建的执行计划。这个值被称为`计划哈希`。目标是在必要时创建执行计划，并尽可能多地重用这些执行计划。所有这些计划都存储在`计划缓存`中。只有看起来相同的查询才具有相同的`计划哈希`，并会使用相同的执行计划。虽然你可能有几个看起来相似或返回相同结果的查询，但\
    \ SQL Server 可能不会给它们相同的`计划哈希`。如果 SQL Server 在`计划缓存`中没有识别出现有的计划，它将需要创建一个新的执行计划。这种对`计划哈希`的依赖有助于确定是否需要创建新的执行计划。\n\
    \n这导致我们依赖于使用参数。这些参数可以存在于存储过程或预 pared 语句中。如果正在执行的查询与`计划缓存`中的某个查询具有相同的`计划哈希`，SQL\
    \ Server 将不会重新创建新的执行计划。这个创建执行计划的过程被称为`` `编译` ``。这可能是你的查询消耗的 CPU 资源超出预期的众多原因之一。\n\
    \nSQL Server 也可能判断需要为某个查询创建新的执行计划，即使执行缓存中已经存在相关的`计划哈希`。在 SQL Server 2016 中引入的，数据库表的统计信息是根据表中行数的动态阈值来更新的。如果统计信息更新了，SQL\
    \ Server 可能会选择生成一个新的执行计划。这可能是频繁数据更改的结果，也可能是参数嗅探的结果。有关参数嗅探的更多信息，请参见第 2 章和第 8 章。无论哪种方式，它都会导致\
    \ SQL Server 识别为`` `重新编译` ``的东西。就像查询`编译`有相关成本一样，`重新编译`在 CPU 上也有相关成本。\n\n如果查询正在处理大量\
    \ I/O，这可能会蔓延导致 CPU 性能问题。虽然一个查询可能访问了比必要更多的数据，但这可能并非由于整体的 T-SQL 查询设计。它可能是由于过时的统计信息。虽然管理统计信息的概念超出了本书的范围，但你需要意识到统计信息对执行计划的影响。统计信息让\
    \ SQL Server 能够快速了解特定数据表或索引内的数据整体分布情况。其概念是，正确的统计信息有助于 SQL Server 对如何创建执行计划做出最佳猜测。如果这些值过时或陈旧，SQL\
    \ Server 可能会决定一个执行计划，而这个计划如果 SQL Server 拥有最新的统计信息本可以更高效。由于统计信息过时，估计的读取次数和实际的读取次数之间可能存在显著差异。这可能会对\
    \ CPU 产生性能影响。你可以看到统计信息已经更新，估计和实际返回的行数保持相对一致。\n\n还有一种可能是，SQL Server 必须遍比最初预期更多的硬盘或存储。这可能是由于涉及碎片的情况。在\
    \ CPU 活动高于正常水平的情况下，它可能是由于索引碎片造成的。这意味着 SQL Server 可能只估计了检索数据所需的一定工作量，因为它假设索引没有碎片。然而，由于索引存在碎片，SQL\
    \ Server 必须做潜在比预期更多的工作来访问请求的数据。\n\n另一个在你的 T-SQL 查询设计中可能发生的常见问题涉及数据类型。在 SQL Server\
    \ 中有许多不同的地方你需要定义数据类型。它们可以在表、临时表、参数、存储过程、变量中定义，甚至可以通过你的应用程序代码指定数据类型。如第 1 章所讨论的，SQL\
    \ Server 可以在后台将一种数据类型转换为另一种；这个过程被称为`` `隐式转换` ``。虽然 SQL Server 可以处理`隐式转换`并有一个结构化的过程来执行，但强制\
    \ SQL Server 执行`隐式转换`也可能带来相关的 CPU 成本。代码清单 6-5 是`隐式转换`的一个例子。\n\n```sql\nDECLARE\
    \ @IsActive NVARCHAR(1);\nSET @IsActive = 1;\nSELECT CustomerID,\n       FirstName,\n\
    \       LastName,\n       [Address],\n       City,\n       PostalCode,\n     \
    \  IsActive,\n       DateCreated,\n       DateModified,\n       DateDisabled\n\
    FROM dbo.Customer\nWHERE IsActive = @IsActive;\n```\n代码清单 6-5\n包含隐式转换的查询\n"
- fmt: '# 6. 隐式转换、数据压缩与并行度注意事项


    清单 [6-4](#480547_2_En_6_Chapter.xhtml#PC4) 中创建了隐式转换，因为变量 `@IsActive` 的数据类型被设置为
    `NVARCHAR`。`dbo.Customer` 表中 `IsActive` 字段的数据类型是 `BIT`。因此，SQL Server 将不得不执行隐式转换来比较这两个值。在图
    [6-1](#480547_2_En_6_Chapter.xhtml#Fig1) 中，您可以看到隐式转换对执行计划的影响。


    ![](images/480547_2_En_6_Chapter/480547_2_En_6_Fig1_HTML.png)


    图 6-1


    执行计划中显示隐式转换的索引扫描


    隐式转换可能对查询的总体性能产生显著的负面影响。在编写 T-SQL 查询时，请确保避免隐式转换。


    一些公司也可能使用数据压缩。数据压缩的好处之一是能够将更多数据保留在内存中，因为压缩数据占用的空间比未压缩的数据小。在 SQL Server 中使用数据压缩也有一些缺点。其中一个缺点与数据压缩过程整体所产生的
    CPU 成本有关。这并不意味着您不应该使用数据压缩。我提到这一点只是为了让您意识到可能出现的任何潜在问题。


    这就引出了并行度的整体概念。您很容易看到 CPU 使用率的情况最常见的就是查询的并行执行。并行度是一个概念，指的是查询不是在单个线程上执行，而是可以在多个线程上执行。如果您的
    CPU 有四个核心，每个核心有两个线程，那么您总共有八个可用的线程。一个只在一个线程上运行的单线程查询，使用的是半个核心，或者说您整体 CPU 的八分之一。然而，如果查询以并行方式运行，它可能能够运行在多个线程上。例如，如果它运行在四个线程上，那么该查询可以在每个核心上使用两个线程。虽然
    CPU 使用的时间可能会增加，但查询应该比以单线程执行花费更少的时间。


    SQL Server 在决定执行查询时是否使用并行度涉及许多因素。其中大部分与 SQL Server 的配置方式有关。虽然配置 SQL Server 超出了本书的范围，但我希望您了解当
    SQL Server 创建执行计划时它是如何工作的。SQL Server 会给执行计划一个总体成本。SQL Server 还有一个配置值，指示在决定实施并行度之前应存在的最低成本。这个成本被称为
    *cost threshold for parallelism*。如果执行计划的成本大于并行度的成本阈值，SQL Server 可以确定是否存在一个运行在并行模式下的更好的执行计划。


    如果 SQL Server 确定要创建一个使用并行度的执行计划，它还需要确定给定执行计划允许使用的最大线程数。还有一个配置值指示可用于并行度的最大线程数。这个值被称为
    *maximum degree of parallelism*。`MAXDOP` 是 maximum degrees of parallelism 的缩写。这并不意味着
    SQL Server 必须使用与最大并行度中指定的相同数量的线程。它只意味着这是允许执行计划以并行方式运行的最大线程数。


    SQL Server 将在执行时确定并行执行计划要使用的线程数。这将基于查询执行开始时未使用的线程数来完成。当涉及到并行度时，一个可能影响 CPU 性能的因素是，如果在查询并行运行期间有更多线程开始被使用。并行度的基本思想是，总体上会使用更多的
    CPU 处理资源，但持续时间会短得多。如果有更多查询进入队列并需要运行，需要更多活动线程，这可能导致 CPU 在更长的时间内保持高于正常水平的运行状态。


    确保您的 T-SQL 不会负面影响 CPU 使用率的主要原因之一与 CPU 相关的资金成本有关。自 SQL Server 2012 以来，SQL Server
    的许可一直与运行 SQL Server 的核心数量相关。在更高版本的 SQL Server 中，这已修改为与服务器可用的核心数量相关，即使它们没有明确分配给
    SQL Server。当公司开始遇到性能问题时，常见的解决方案之一是增加更多硬件。虽然这可能在短期内解决性能问题，但根据需要添加的硬件，这也可能是一个非常昂贵的解决方案。由于每个核心的许可费用可能超过
    1000 美元，因此通过减少与 CPU 使用相关的性能瓶颈来最小化对额外 CPU 的需求是理想的做法。


    在设计 T-SQL 查询时，有许多方面需要考虑。其中一些因素包括了解 T-SQL 对运行 SQL Server 的物理硬件可能产生的影响。在编写 T-SQL
    查询时，您需要注意访问的数据量，以便最好地利用可用的内存。减少数据量的另一个好处是减少了存储资源。确保您的统计信息是最新的并且有适当的索引将有益于 CPU
    使用率。了解您的查询如何影响您的硬件，不仅可以最大限度地减少对额外硬件的需求，还可以让您的当前硬件更好地支持您的应用程序。


    # 7. 执行计划


    随着您对编写 T-SQL 越来越熟悉，您将从关注语法和准确性进展到关注性能。在本章中，您将学习如何查看和理解 SQL Server 执行计划。本章将包括演示您现有和新的索引如何影响您的执行计划。您将学习
    SQL Server 在执行计划中如何连接数据。到本章结束时，您将知道如何使用执行计划来提高 T-SQL 的性能。


    ## 介绍执行计划


    为了生成 T-SQL 查询的结果，SQL Server 需要决定如何运行该查询。它需要决定使用哪个索引以及运行查询时使用哪种连接类型。这些决策的结果就是执行计划。学习如何阅读和理解执行计划将帮助您更好地构建查询以提高性能。


    执行计划以 XML 格式存储在数据库中。SSMS 提供了这些计划的可视化表示工具，本章您将主要使用这个工具。有不同类型的计划，例如估计计划和实际计划，您将在本节中了解到。图形化执行计划的示例可以在图
    [7-1](#480547_2_En_7_Chapter.xhtml#Fig1) 中找到。


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig1_HTML.jpg)


    图 7-1


    图形化执行计划


    图 [7-1](#480547_2_En_7_Chapter.xhtml#Fig1) 包含几个我们将在本章讨论的元素。这些图标被称为 *operators*（运算符）。箭头用于显示操作的顺序。有不同类型的计划，例如估计计划和实际计划。最重要的是，虽然这张图片现在看起来不太明白，但到本章结束时，您将能够翻回几页并读懂整张图！'
  raw: 'The implicit conversion is created in Listing [6-4](#480547_2_En_6_Chapter.xhtml#PC4)
    because the data type for the variable `@IsActive` is set to an NVARCHAR. The
    data type for the field `IsActive` in the `dbo.Customer` table is a BIT. Therefore,
    SQL Server will have to perform an implicit conversion to compare these two values.
    In Figure [6-1](#480547_2_En_6_Chapter.xhtml#Fig1), you can see the impact of
    an implicit conversion on an execution plan.


    ![](images/480547_2_En_6_Chapter/480547_2_En_6_Fig1_HTML.png)


    A screenshot titled clustered index scan open parenthesis clustered parenthesis
    closed displays a list of 22 options from the top through the bottom. Below, it
    encloses an option titled predicate in a rectangle.


    Figure 6-1


    Index scan in an execution plan showing implicit conversion


    An implicit conversion can have a significant and negative overall performance
    impact on the query. Make sure you avoid implicit conversions when writing your
    T-SQL queries.


    Some companies may also utilize data compression. One of the benefits of data
    compression is the ability to keep more data in memory because the amount of data
    that is taken up by the compressed data is smaller than the uncompressed data.
    There are some drawbacks to using data compression in SQL Server. One of these
    drawbacks has to do with the CPU cost incurred as part of the overall data compression
    process. This does not mean that you should not use data compression. I only mention
    this so that you can be aware of any potential issues should they arise.


    That brings us to the overall concept of parallelism. The most common way that
    you can easily see CPU usage is when it comes to parallelism with your queries.
    Parallelism is a concept where instead of a query executing on a single thread,
    a query can execute on more than one thread. If your CPU has four cores, and each
    core has two threads, you have eight total threads available. A single-threaded
    query that only runs on one thread runs on one-half of one core, or an eighth
    of your overall CPU. However, if the query is running in parallelism, it may be
    able to run on more than one thread. For instance, if it runs on four threads,
    this query can use two threads per core. While the time CPU may use may increase,
    the query should take less time than if the query were to execute single-threaded.


    There are many factors involved for SQL Server to determine whether parallelism
    should be used when executing a query. Much of this involves how SQL Server is
    configured. While configuring SQL Server is outside the scope of this book, I
    want you to be aware of how it works when SQL Server creates an execution plan.
    SQL Server gives the execution plan and overall cost. SQL Server also has a configured
    value that indicates a minimum cost that should exist before it decides to implement
    parallelism. This cost is referred to as the *cost threshold for parallelism*.
    If the execution plan has a cost that is greater than the cost threshold of parallelism,
    SQL Server can determine if there is a better execution plan that runs in parallel.


    If SQL Server does decide to create an execution plan using parallelism, it will
    also need to determine the maximum number of threads that are allowed for a given
    execution plan. There is also a configured value that indicates the maximum number
    of threads that can be used for parallelism. This value is referred to as the
    *maximum degree of parallelism*. MAXDOP is the abbreviation for maximum degrees
    of parallelism. This does not mean that SQL Server must use the same number of
    threads as specified in the maximum degrees of parallelism. It only means that
    this is the maximum amount of threads that can be allowed for an execution plan
    to run in parallelism.


    SQL Server will determine the number of threads to use for an execution plan that
    will run in parallelism at the time of execution. This will be done based on the
    number of threads that are not utilized at the beginning of the execution of the
    query. One factor that can affect CPU performance when it comes to parallelism
    can occur if more threads come into use while the query is running in parallelism.
    The general idea for parallelism is that more CPU process will be used overall
    but for a much shorter duration. If there are more queries that come into the
    queue and need to be run, requiring more threads to be active, it may cause the
    CPU to operate at a higher-than-normal level for a longer period.


    One of the main reasons you want to make sure your T-SQL is not negatively impacting
    CPU usage has to do with the monetary cost related to CPUs. Since SQL Server 2012,
    the licensing for SQL Server has been related to the number of cores using SQL
    Server. In later versions of SQL Server, this has been modified to be the number
    of cores available to the server even if they are not explicitly allocated to
    SQL Server. One of the common solutions when companies start experiencing performance
    issues is to add more hardware. While this may solve performance issues in the
    short term, it can also be a very expensive solution depending on what hardware
    needs to be added. As the license per core can be over $1000, it is ideal to minimize
    the need for additional CPUs by reducing performance bottlenecks related to CPU
    usage.


    There are many aspects to consider when designing your T-SQL queries. Some of
    these factors include being aware of the impact T-SQL can have on the physical
    hardware that runs SQL Server. When writing your T-SQL queries, you want to be
    mindful of the amount of data being accessed in order to make the best use of
    the memory available. Another added benefit to minimizing the data is decreasing
    storage resources. Making sure that your statistics are up to date and that proper
    indexes are in place will benefit the CPU usage. Being aware of how your queries
    are affecting your hardware will not only minimize the need for additional hardware
    but also allow your current hardware to better support your applications.


    # 7. Execution Plans


    As you become more familiar with writing T-SQL, you will progress from focusing
    on syntax to accuracy to performance. In this chapter, you will learn how to view
    and understand SQL Server execution plans. This chapter will include demonstrations
    of how your existing and new indexes can affect your execution plans. You will
    learn how SQL Server joins data together in the execution plan. By the end of
    this chapter, you will know how to use execution plans to improve the performance
    of your T-SQL.


    ## Introducing Execution Plans


    In order to generate results for a T-SQL query, SQL Server needs to decide how
    to run the query. It needs to decide things like what index to use and what join
    type to use when running the query. The result of these decisions is the execution
    plan. Learning how to read and understand an execution plan will help you to better
    form your queries for performance.


    Execution plans are stored in XML in the database. SSMS provides a visual representation
    tool for these plans and this is where you’ll be spending the bulk of your time
    in this chapter. There are different kinds of plans like estimated and actual,
    which you’ll cover during this section. An example of a graphical execution plan
    can be found in Figure [7-1](#480547_2_En_7_Chapter.xhtml#Fig1).


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig1_HTML.jpg)


    A snapshot of the visual representation of S Q L server execution plan. Query
    1 has a query cost of 100%. a leftward arrow indicates the select cost 0%.


    Figure 7-1


    Graphical execution plan


    Figure [7-1](#480547_2_En_7_Chapter.xhtml#Fig1) has several elements that we will
    discuss in this chapter. The icons are called *operators*. The arrows are used
    to show the order of operations. There are different kinds of plans like estimated
    and actual. Most importantly, while this image doesn’t make a ton of sense right
    now, by the end of the chapter you’ll be able to turn back a few pages and read
    this entire image!'
