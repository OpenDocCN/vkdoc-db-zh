  raw: '```

    CREATE TABLE dbo.CustomerOrderActive

    (

    CustomerOrderHistoryID         BIGINT             NOT NULL,

    CustomerOrderID                INT                NOT NULL,

    CustomerOrderHistoryStatusID   TINYINT            NOT NULL,

    DateCreated                    DATETIME2(2)       NOT NULL,

    DateModified                   DATETIME2(2)           NULL,

    CONSTRAINT PK_CustomerOrderActive_CustomerOrderHistoryID

    PRIMARY KEY (CustomerOrderHistoryID),

    CONSTRAINT FK_CustomerOrderActive_CustomerOrderID

    FOREIGN KEY (CustomerOrderID)

    REFERENCES dbo.CustomerOrder(CustomerOrderID),

    CONSTRAINT FK_CustomerOrderActive_CustomerOrderHistoryStatusID

    FOREIGN KEY (CustomerOrderHistoryStatusID)

    REFERENCES

    dbo.CustomerOrderHistoryStatus(CustomerOrderHistoryStatusID)

    );

    Listing 16-21

    Creating a Table for Active Data

    ```


    The creation of this table does not specify that partition scheme of `CustomerOrderHistoryRange`.
    This table will be a standard table created on the PRIMARY filegroup in the database.


    Once the underlying tables have been created, you can create a single database
    object that can allow you to access both tables. This will be the same as the
    partitioned view created in the previous section. Listing [16-22](#480547_2_En_16_Chapter.xhtml#PC22)
    has the T-SQL code needed to create a partitioned view.


    ```

    CREATE VIEW dbo.vwCustomerOrderHistory_PT

    AS

    -- Select data from current read/write table

    SELECT CustomerOrderHistoryID,

    CustomerOrderID,

    CustomerOrderHistoryStatusID,

    DateCreated,

    DateModified

    FROM dbo.CustomerOrderActive

    UNION ALL

    -- Select data from partitioned table

    SELECT CustomerOrderHistoryID,

    CustomerOrderID,

    CustomerOrderHistoryStatusID,

    DateCreated,

    DateModified

    FROM dbo.CustomerOrderHistoryPartition;

    Listing 16-22

    Creating a Partitioned View

    ```


    This partitioned view allows you to keep the most recent and highly active data
    in a table without partitions. This table can be specifically indexed to allow
    for the best write speeds. Any other tables included in the partitioned view can
    be indexed based on their usage. The partitioned table included in the preceding
    partitioned view may only include inactive data. As a result, you may expect this
    data to only be read going forward. Knowing this, you can use a different strategy
    to index this table.


    Now let’s determine the behavior of SQL Server when querying a non-partitioned
    table. The query in Listing [16-23](#480547_2_En_16_Chapter.xhtml#PC23) shows
    a query to find all records for a specific date range in the `dbo.CustomerOrderHistory`
    table.


    ```

    DECLARE @StartDate  DATETIME2(2) = ''2022-10-07'';

    DECLARE @EndDate    DATETIME2(2) = ''2022-10-09'';

    SELECT CustomerOrderHistoryID,

    CustomerOrderID,

    CustomerOrderHistoryStatusID,

    DateCreated,

    DateModified

    FROM dbo.CustomerOrderHistory

    WHERE DateCreated > @StartDate

    AND DateCreated <= @EndDate;

    Listing 16-23

    Access Data Before Partitioning Table and View

    ```


    This query will be run on a non-partitioned table. At the time of the query execution,
    this table is ordered by the original primary key, which is the `CustomerOrderHistoryID`.
    As a result, the execution plan from the query in Listing [16-23](#480547_2_En_16_Chapter.xhtml#PC23)
    is shown in Figure [16-16](#480547_2_En_16_Chapter.xhtml#Fig16).


    ![](images/480547_2_En_16_Chapter/480547_2_En_16_Fig16_HTML.jpg)


    A text with symbols depicts an execution plan with an unpartitioned table. The
    text presents clustered index scan, cost 100%, 0.533 seconds, 802818 of 131917,
    and Select cost 0%. Symbols are of a table and clustered index scan.


    Figure 16-16


    Execution plan for an unpartitioned table


    Based on the execution plan in Listing [16-16](#480547_2_En_16_Chapter.xhtml#PC16),
    you can confirm that SQL Server uses a clustered index scan to find the relevant
    records. This is because there is no index that includes the `DateCreated`. With
    the table not being partitioned by date, SQL Server also needs to go through the
    entire table to find the data records that satisfy the query in Listing [16-23](#480547_2_En_16_Chapter.xhtml#PC23).


    After running this query, you can review additional information about the operators
    in the execution plan. Specifically, you want to identify the number of logical
    reads and rows returned for this query execution. Using Figure [16-17](#480547_2_En_16_Chapter.xhtml#Fig17),
    you can identify the logical reads and number of rows.


    ![](images/480547_2_En_16_Chapter/480547_2_En_16_Fig17_HTML.jpg)


    A screenshot presents the properties associated with the clustered index scan.
    It depicts 10 properties. Actual logical reads are 3392. Actual physical reads
    are 2\. Actual read aheads are 3458\. Actual scans are 1\. The actual number of
    rows for all executions is 802818.


    Figure 16-17


    Reads associated with the clustered index scan


    You can see that this query returned 802,818 rows with a total number of 3,392
    pages read as logical reads. You will be comparing these values to the performance
    associated with a partitioned view that contains both a partitioned and non-partitioned
    table.


    Previously, in Listing [16-22](#480547_2_En_16_Chapter.xhtml#PC22), you created
    a partitioned view that contained a partitioned table for all 2021 data records
    and non-partitioned table for all 2022 data records. To compare how a partitioned
    view performs differently than a non-partitioned table, you can run the query
    in Listing [16-24](#480547_2_En_16_Chapter.xhtml#PC24).


    ```

    DECLARE @StartDate  DATETIME2(2) = ''2022-10-07'';

    DECLARE @EndDate    DATETIME2(2) = ''2022-10-09'';

    SELECT CustomerOrderHistoryID,

    CustomerOrderID,

    CustomerOrderHistoryStatusID,

    DateCreated,

    DateModified

    FROM dbo.vwCustomerOrderHistory_PT

    WHERE DateCreated > @StartDate

    AND DateCreated <= @EndDate;

    Listing 16-24

    Accessing Data Using a Partitioned Column in a Partitioned Table

    ```


    This query searches for the same data records as the query from Listing [16-23](#480547_2_En_16_Chapter.xhtml#PC23).
    However, this query is accessing a partitioned view instead of a non-partitioned
    table. The partitioned view is composed of a partitioned table for all of 2021
    and a non-partitioned table containing data for 2022\. In Figure [16-18](#480547_2_En_16_Chapter.xhtml#Fig18),
    you can see the execution plan generated for this query.


    ![](images/480547_2_En_16_Chapter/480547_2_En_16_Fig18_HTML.jpg)


    A text with symbols depicts an execution plan with a partitioned view. The text
    presents 2 clustered index seeks, cost 98% and 0%, 0.025 seconds and 0.000 seconds,
    3 of 131917 and 0 of 1, concatenation, and Select cost 0%. Symbols are of a table,
    concatenation, and clustered index seek.


    Figure 16-18


    Execution plan for a partitioned view


    One of the important things to note is that this execution plan uses a clustered
    index seek instead of a clustered index scan. This lets you know that SQL Server
    could determine where to find the relevant data records efficiently and without
    having to go through all or most of the records in the table. Another thing that
    stands out is that the clustered index seek is performed on the partitioned `dbo.CustomerOrderHistory`
    table. You can also find the properties associated with the clustered index seek
    to get additional information. In Figure [16-19](#480547_2_En_16_Chapter.xhtml#Fig19),
    you can see the number of logical reads and the number of records returned.


