    表 `dbo.CustomerOrderHistory` 已更新为包含过去三个月的数据。您已完成所有必要的分区切换，但仍需对表 `dbo.CustomerOrderActive`
    进行一些更新，以便它可以收集 2023 年 5 月的数据。


    ## 更新检查约束与创建视图


    由于您使用的是 T-SQL，需要删除 `dbo.CustomerOrderActive` 上现有的检查约束，然后创建新约束。由于表是空的，此过程将相对较快。清单
    [17-34](#480547_2_En_17_Chapter.xhtml#PC34) 显示了可用于为 2023 年 5 月更新检查约束的代码。


    ```

    ALTER TABLE dbo.CustomerOrderActive

    DROP CONSTRAINT CK_CustomerOrderActive_MinDateCreated;

    ALTER TABLE dbo.CustomerOrderActive

    DROP CK_CustomerOrderActive_MaxDateCreated;

    ALTER TABLE dbo.CustomerOrderActive

    WITH CHECK ADD CONSTRAINT CK_CustomerOrderActive_MinDateCreated

    CHECK (DateCreated IS NOT NULL AND DateCreated >= ''2023-05-01'');

    ALTER TABLE dbo.CustomerOrderActive

    WITH CHECK ADD CONSTRAINT CK_CustomerOrderActive_MaxDateCreated

    CHECK (DateCreated IS NOT NULL AND DateCreated < ''2023-06-01'');

    Listing 17-34

    Updating Check Constraints on dbo.CustomerOrderActive

    ```


    此代码更新表，使其只允许创建日期为 2023 年 5 月的记录被导入表中。在表为空时添加约束，不要在一个月后执行窗口滑动代码时尝试添加。这可以节省大量时间，而不是在表已满后添加检查约束。


    既然您已将所有表更新为包含正确的数据，您还可以使用分区视图来访问这些表中的数据。可能存在业务原因，使得应用程序或用户只想访问当前月份的订单以及过去三个月的订单。请参阅清单
    [17-35](#480547_2_En_17_Chapter.xhtml#PC35)。


    ```

    CREATE VIEW dbo.vwCustomerOrderHistoryRecent

    AS

    -- Select data from current read/write table

    SELECT CustomerOrderHistoryID,

    CustomerOrderID,

    CustomerOrderHistoryStatusID,

    DateCreated,

    DateModified

    FROM dbo.CustomerOrderActive

    UNION ALL

    -- Select data from historicial table

    SELECT CustomerOrderHistoryID,

    CustomerOrderID,

    CustomerOrderHistoryStatusID,

    DateCreated,

    DateModified

    FROM dbo.CustomerOrderHistory;

    Listing 17-35

    Partitioned View for Recent Orders, Current Month, and Past Three Months

    ```


    既然您已更新了分区，此视图将返回 2023 年 2 月至 2023 年 5 月的结果。如果您发现需要访问所有数据的情况，那么可以创建另一个分区视图以方便访问所有可用订单。在清单
    [17-36](#480547_2_En_17_Chapter.xhtml#PC36) 中，该视图合并了来自 `dbo.CustomerOrderActive`、`dbo.CustomerOrderHistory`
    和 `dbo.CustomerOrderHistoryArchive` 的所有订单信息。


    ```

    CREATE VIEW dbo.vwCustomerOrderHistoryAll

    AS

    -- Select data from current read/write table

    SELECT CustomerOrderHistoryID,

    CustomerOrderID,

    CustomerOrderHistoryStatusID,

    DateCreated,

    DateModified

    FROM dbo.CustomerOrderActive

    UNION ALL

    -- Select data from historicial table

    SELECT CustomerOrderHistoryID,

    CustomerOrderID,

    CustomerOrderHistoryStatusID,

    DateCreated,

    DateModified

    FROM dbo.CustomerOrderHistory

    UNION ALL

    -- Select data from archive table

    SELECT CustomerOrderHistoryID,

    CustomerOrderID,

    CustomerOrderHistoryStatusID,

    DateCreated,

    DateModified

    FROM dbo.CustomerOrderHistoryArchive;

    Listing 17-36

    Partitioned View for All Orders

    ```


    此视图显示从 2022 年 2 月到 2023 年 5 月的任何客户订单。这适用于数据库中存在的任何订单。'
  raw: 'This code takes the first and second partitions in the table and merges them
    into one partition. This will reduce the total number of partitions from four
    to three. In your case, this will update the first partition so that it includes
    all data before February 2023\. To finish preparing this table for the new month,
    you also need to split the last partition as shown in Listing [17-31](#480547_2_En_17_Chapter.xhtml#PC31).


    ```

    ALTER PARTITION FUNCTION CustomerOrderHistoryFunc()

    SPLIT RANGE (''2023-04-01'');

    Listing 17-31

    Spliting the Last Partition for dbo.CustomerOrderHistory

    ```


    After executing this T-SQL, there will be four partitions again in the table.
    The second-to-last partition will be for data in March 2023\. The last partition
    will be for data on or after April 2023\. The updated partitions are shown in
    Table [17-16](#480547_2_En_17_Chapter.xhtml#Tab16).


    Table 17-16


    CustomerOrderHistory Before Partition Switching


    | Partition Number | Record Count | Boundary Value | Text Comparison |

    | --- | --- | --- | --- |

    | 1 | 0 | 2023-02-01 | >= Min Value and < Feb  1 2023 12:00AM |

    | 2 | 1 | 2023-03-01 | >= Feb  1 2023 12:00AM and < Mar  1 2023 12:00AM |

    | 3 | 1 | 2023-04-01 | >= Mar  1 2023 12:00AM and < Apr  1 2023 12:00AM |

    | 4 | 0 |   | >= Apr  1 2023 12:00AM and < Max Value |


    You have successfully prepared the `dbo.CustomerOrderHistory` table to be ready
    to have the April 2023 data switched in from `dbo.CustomerOrderActive`.


    Before you can switch data from the non-partitioned table of `dbo.CustomerOrderActive`,
    you need to add check constraints to the table. This allows SQL Server to ensure
    that the data being switched in from `dbo.CustomerOrderActive` to the fourth partition
    in `dbo.CustomerOrderHistory` can be successfully switched in. Listing [17-32](#480547_2_En_17_Chapter.xhtml#PC32)
    shows the T-SQL needed to create the check constraints needed.


    ```

    ALTER TABLE dbo.CustomerOrderActive

    WITH CHECK ADD CONSTRAINT CK_CustomerOrderActive3_MinDateCreated

    CHECK (DateCreated IS NOT NULL AND DateCreated >= ''2023-04-01'');

    ALTER TABLE dbo.CustomerOrderActive

    WITH CHECK ADD CONSTRAINT CK_CustomerOrderActive3_MaxDateCreated

    CHECK (DateCreated IS NOT NULL AND DateCreated < ''2023-05-01'');

    Listing 17-32

    Creating Check Constraints on the Non-Partitioned Table

    ```


    This step assumes you have not previously created the check constraints. Due to
    the performance constraints, it is recommended to update the check constraint
    range instead of dropping the constraints. I will discuss that step after you
    finish switching the partitions.


    Once these check constraints are added, you can switch out the data from `dbo.CustomerOrderActive`
    into `dbo.CustomerOrderHistory` as shown in Listing [17-33](#480547_2_En_17_Chapter.xhtml#PC33).


    ```

    ALTER TABLE dbo.CustomerOrderActive

    SWITCH TO dbo.CustomerOrderHistory PARTITION 4;

    Listing 17-33

    Partition Switch Out Last Month’s Customer Orders

    ```


    This T-SQL moves all of the data in `dbo.CustomerOrderActive` to the fourth partition
    in `dbo.CustomerOrderHistory`. Table [17-17](#480547_2_En_17_Chapter.xhtml#Tab17)
    shows the record counts after switch the data out of `dbo.CustomerOrderActive`.


    Table 17-17


    Count of Records per Table for Managing Customer Orders


    | Table Name | Record Count |

    | --- | --- |

    | `dbo.CustomerOrderActive` | 0 |

    | `dbo.CustomerOrderHistory` | 3 |

    | `dbo.CustomerOrderHistoryArchive` | 12 |

    | `dbo.CustomerOrderPurge` | 0 |


    You can verify the distribution of the rows in `dbo.CustomerOrderHistory` by executing
    the code from Listing [17-28](#480547_2_En_17_Chapter.xhtml#PC28). The partition
    distribution can be found in Table [17-18](#480547_2_En_17_Chapter.xhtml#Tab18)
    below.


    Table 17-18


    CustomerOrderHistory After Partition Switching


    | Partition Number | Record Count | Boundary Value | Text Comparison |

    | --- | --- | --- | --- |

    | 1 | 0 | 2023-02-01 | >= Min Value and < Feb  1 2023 12:00AM |

    | 2 | 1 | 2023-03-01 | >= Feb  1 2023 12:00AM and < Mar  1 2023 12:00AM |

    | 3 | 1 | 2023-04-01 | >= Mar  1 2023 12:00AM and < Apr  1 2023 12:00AM |

    | 4 | 1 |   | >= Apr  1 2023 12:00AM and < Max Value |


    The table `dbo.CustomerOrderHistory` has been updated to have the past three months
    of data. You have finished all of the necessary partition switching, but you still
    need to make some updates to the table `dbo.CustomerOrderActive` so that it can
    collect data for May 2023.


    Since you are using T-SQL, you need to drop the existing check constraints on
    `dbo.CustomerOrderActive` and then create new constraints. Now that the table
    is empty, this process will be relatively quick. Listing [17-34](#480547_2_En_17_Chapter.xhtml#PC34)
    shows the code you can use to update the check constraint for May 2023.


    ```

    ALTER TABLE dbo.CustomerOrderActive

    DROP CONSTRAINT CK_CustomerOrderActive_MinDateCreated;

    ALTER TABLE dbo.CustomerOrderActive

    DROP CK_CustomerOrderActive_MaxDateCreated;

    ALTER TABLE dbo.CustomerOrderActive

    WITH CHECK ADD CONSTRAINT CK_CustomerOrderActive_MinDateCreated

    CHECK (DateCreated IS NOT NULL AND DateCreated >= ''2023-05-01'');

    ALTER TABLE dbo.CustomerOrderActive

    WITH CHECK ADD CONSTRAINT CK_CustomerOrderActive_MaxDateCreated

    CHECK (DateCreated IS NOT NULL AND DateCreated < ''2023-06-01'');

    Listing 17-34

    Updating Check Constraints on dbo.CustomerOrderActive

    ```


    This code updates the table so that it will only allow records with a date created
    for May 2023 to be imported into the table. Add the constraint while the table
    is empty and don’t try to add it during the window sliding code a month from now.
    This can save considerable time instead of adding the check constraint after the
    table it full.


    Now that you have updated all of tables to have the correct data, you can also
    use partitioned views to access the data in these tables. There may be a business
    reason why an application or user would only want to access the current month
    of orders as well as the past three months. Refer to Listing [17-35](#480547_2_En_17_Chapter.xhtml#PC35).


    ```

    CREATE VIEW dbo.vwCustomerOrderHistoryRecent

    AS

    -- Select data from current read/write table

    SELECT CustomerOrderHistoryID,

    CustomerOrderID,

    CustomerOrderHistoryStatusID,

    DateCreated,

    DateModified

    FROM dbo.CustomerOrderActive

    UNION ALL

    -- Select data from historicial table

    SELECT CustomerOrderHistoryID,

    CustomerOrderID,

    CustomerOrderHistoryStatusID,

    DateCreated,

    DateModified

    FROM dbo.CustomerOrderHistory;

    Listing 17-35

    Partitioned View for Recent Orders, Current Month, and Past Three Months

    ```


    Now that you have updated the partitions, this view will return results for February
    2023 through May 2023\. If you find situations where access to all data is needed,
    then you can create another partitioned view to allow easy access to all available
    orders. In Listing [17-36](#480547_2_En_17_Chapter.xhtml#PC36), the view combines
    all order information from `dbo.CustomerOrderActive, dbo.CustomerOrderHistory`,
    and `dbo.CustomerOrderHistoryArchive`.


    ```

    CREATE VIEW dbo.vwCustomerOrderHistoryAll

    AS

    -- Select data from current read/write table

    SELECT CustomerOrderHistoryID,

    CustomerOrderID,

    CustomerOrderHistoryStatusID,

    DateCreated,

    DateModified

    FROM dbo.CustomerOrderActive

    UNION ALL

    -- Select data from historicial table

    SELECT CustomerOrderHistoryID,

    CustomerOrderID,

    CustomerOrderHistoryStatusID,

    DateCreated,

    DateModified

    FROM dbo.CustomerOrderHistory

    UNION ALL

    -- Select data from archive table

    SELECT CustomerOrderHistoryID,

    CustomerOrderID,

    CustomerOrderHistoryStatusID,

    DateCreated,

    DateModified

    FROM dbo.CustomerOrderHistoryArchive;

    Listing 17-36

    Partitioned View for All Orders

    ```


    This view shows any customer orders from February 2022 through May 2023\. This
    is for any order that is in the database.'
  trans: '

    ## 分区维护操作


    此代码将表中的第一个和第二个分区合并为一个分区。这会将分区总数从四个减少到三个。在您的情况下，这将更新第一个分区以包含 2023 年 2 月之前的所有数据。要完成为该表准备新月份数据的操作，您还需要按清单
    17-31 所示拆分最后一个分区。


    ```

    ALTER PARTITION FUNCTION CustomerOrderHistoryFunc()

    SPLIT RANGE (''2023-04-01'');

    Listing 17-31

    Spliting the Last Partition for dbo.CustomerOrderHistory

    ```


    执行此 T-SQL 后，表中将再次有四个分区。倒数第二个分区将用于存放 2023 年 3 月的数据。最后一个分区将用于存放 2023 年 4 月 1 日或之后的数据。更新后的分区情况如表
    17-16 所示。


    表 17-16 CustomerOrderHistory 在分区切换前


    | Partition Number | Record Count | Boundary Value | Text Comparison |

    | --- | --- | --- | --- |

    | 1 | 0 | 2023-02-01 | >= Min Value and < Feb  1 2023 12:00AM |

    | 2 | 1 | 2023-03-01 | >= Feb  1 2023 12:00AM and < Mar  1 2023 12:00AM |

    | 3 | 1 | 2023-04-01 | >= Mar  1 2023 12:00AM and < Apr  1 2023 12:00AM |

    | 4 | 0 |   | >= Apr  1 2023 12:00AM and < Max Value |


    您已成功准备好 `dbo.CustomerOrderHistory` 表，以便从 `dbo.CustomerOrderActive` 切换入 2023 年
    4 月的数据。


    ## 检查约束与数据切换


    在您从非分区表 `dbo.CustomerOrderActive` 切换数据之前，需要向该表添加检查约束。这允许 SQL Server 确保从 `dbo.CustomerOrderActive`
    切换到 `dbo.CustomerOrderHistory` 第四个分区的数据能够成功切换。清单 17-32 显示了创建所需检查约束的 T-SQL。


    ```

    ALTER TABLE dbo.CustomerOrderActive

    WITH CHECK ADD CONSTRAINT CK_CustomerOrderActive3_MinDateCreated

    CHECK (DateCreated IS NOT NULL AND DateCreated >= ''2023-04-01'');

    ALTER TABLE dbo.CustomerOrderActive

    WITH CHECK ADD CONSTRAINT CK_CustomerOrderActive3_MaxDateCreated

    CHECK (DateCreated IS NOT NULL AND DateCreated < ''2023-05-01'');

    Listing 17-32

    Creating Check Constraints on the Non-Partitioned Table

    ```


    此步骤假设您之前未创建检查约束。由于性能限制，建议更新检查约束范围，而不是删除约束。在您完成分区切换后，我将讨论该步骤。


    一旦添加了这些检查约束，您就可以按清单 17-33 所示，将数据从 `dbo.CustomerOrderActive` 切换到 `dbo.CustomerOrderHistory`。


    ```

    ALTER TABLE dbo.CustomerOrderActive

    SWITCH TO dbo.CustomerOrderHistory PARTITION 4;

    Listing 17-33

    Partition Switch Out Last Month’s Customer Orders

    ```


    此 T-SQL 将 `dbo.CustomerOrderActive` 中的所有数据移动到 `dbo.CustomerOrderHistory` 的第四个分区。表
    17-17 显示了将数据从 `dbo.CustomerOrderActive` 切换出后的记录数。


    表 17-17 管理客户订单的表记录数统计


    | Table Name | Record Count |

    | --- | --- |

    | `dbo.CustomerOrderActive` | 0 |

    | `dbo.CustomerOrderHistory` | 3 |

    | `dbo.CustomerOrderHistoryArchive` | 12 |

    | `dbo.CustomerOrderPurge` | 0 |


    您可以通过执行清单 17-28 中的代码来验证 `dbo.CustomerOrderHistory` 中行的分布情况。分区分布情况可在下面的表 17-18
    中找到。


    表 17-18 CustomerOrderHistory 在分区切换后


    | Partition Number | Record Count | Boundary Value | Text Comparison |

    | --- | --- | --- | --- |

    | 1 | 0 | 2023-02-01 | >= Min Value and < Feb  1 2023 12:00AM |

    | 2 | 1 | 2023-03-01 | >= Feb  1 2023 12:00AM and < Mar  1 2023 12:00AM |

    | 3 | 1 | 2023-04-01 | >= Mar  1 2023 12:00AM and < Apr  1 2023 12:00AM |

    | 4 | 1 |   | >= Apr  1 2023 12:00AM and < Max Value |


    表 `dbo.CustomerOrderHistory` 已更新为包含过去三个月的数据。您已完成所有必要的分区切换，但仍需对表 `dbo.CustomerOrderActive`
    进行一些更新，以便它可以收集 2023 年 5 月的数据。


    ## 更新检查约束与创建视图


    由于您使用的是 T-SQL，需要删除 `dbo.CustomerOrderActive` 上现有的检查约束，然后创建新约束。由于表是空的，此过程将相对较快。清单
    17-34 显示了可用于为 2023 年 5 月更新检查约束的代码。


    ```

    ALTER TABLE dbo.CustomerOrderActive

    DROP CONSTRAINT CK_CustomerOrderActive_MinDateCreated;

    ALTER TABLE dbo.CustomerOrderActive

    DROP CK_CustomerOrderActive_MaxDateCreated;

    ALTER TABLE dbo.CustomerOrderActive

    WITH CHECK ADD CONSTRAINT CK_CustomerOrderActive_MinDateCreated

    CHECK (DateCreated IS NOT NULL AND DateCreated >= ''2023-05-01'');

    ALTER TABLE dbo.CustomerOrderActive

    WITH CHECK ADD CONSTRAINT CK_CustomerOrderActive_MaxDateCreated

    CHECK (DateCreated IS NOT NULL AND DateCreated < ''2023-06-01'');

    Listing 17-34

    Updating Check Constraints on dbo.CustomerOrderActive

    ```


    此代码更新表，使其只允许创建日期为 2023 年 5 月的记录被导入表中。在表为空时添加约束，不要在一个月后执行窗口滑动代码时尝试添加。这可以节省大量时间，而不是在表已满后添加检查约束。


    既然您已将所有表更新为包含正确的数据，您还可以使用分区视图来访问这些表中的数据。可能存在业务原因，使得应用程序或用户只想访问当前月份的订单以及过去三个月的订单。请参阅清单
    17-35。


    ```

    CREATE VIEW dbo.vwCustomerOrderHistoryRecent

    AS

    -- Select data from current read/write table

    SELECT CustomerOrderHistoryID,

    CustomerOrderID,

    CustomerOrderHistoryStatusID,

    DateCreated,

    DateModified

    FROM dbo.CustomerOrderActive

    UNION ALL

    -- Select data from historicial table

    SELECT CustomerOrderHistoryID,

    CustomerOrderID,

    CustomerOrderHistoryStatusID,

    DateCreated,

    DateModified

    FROM dbo.CustomerOrderHistory;

    Listing 17-35

    Partitioned View for Recent Orders, Current Month, and Past Three Months

    ```


    既然您已更新了分区，此视图将返回 2023 年 2 月至 2023 年 5 月的结果。如果您发现需要访问所有数据的情况，那么可以创建另一个分区视图以方便访问所有可用订单。在清单
    17-36 中，该视图合并了来自 `dbo.CustomerOrderActive`、`dbo.CustomerOrderHistory` 和 `dbo.CustomerOrderHistoryArchive`
    的所有订单信息。


    ```

    CREATE VIEW dbo.vwCustomerOrderHistoryAll

    AS

    -- Select data from current read/write table

    SELECT CustomerOrderHistoryID,

    CustomerOrderID,

    CustomerOrderHistoryStatusID,

    DateCreated,

    DateModified

    FROM dbo.CustomerOrderActive

    UNION ALL

    -- Select data from historicial table

    SELECT CustomerOrderHistoryID,

    CustomerOrderID,

    CustomerOrderHistoryStatusID,

    DateCreated,

    DateModified

    FROM dbo.CustomerOrderHistory

    UNION ALL

    -- Select data from archive table

    SELECT CustomerOrderHistoryID,

    CustomerOrderID,

    CustomerOrderHistoryStatusID,

    DateCreated,

    DateModified

    FROM dbo.CustomerOrderHistoryArchive;

    Listing 17-36

    Partitioned View for All Orders

    ```


    此视图显示从 2022 年 2 月到 2023 年 5 月的任何客户订单。这适用于数据库中存在的任何订单。

