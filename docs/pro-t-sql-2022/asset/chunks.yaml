- fmt: '# 证书备份与透明数据加密（TDE）管理


    在撰写本书时，您需要指定私钥以更新证书的最后备份日期。


    备份证书后，您可以重新运行清单 [19-8](#480547_2_En_19_Chapter.xhtml#PC8) 中的查询。此查询的结果如表 [19-8](#480547_2_En_19_Chapter.xhtml#Tab8)
    所示。


    **表 19-8 证书最后备份日期的查询结果**


    | Last Backup Date | Encrypted Database | Certificate Name |

    | --- | --- | --- |

    | 2023-04-01 | OutdoorRecreation | DataEncryption |


    以上结果表明证书最近已备份。


    > **注意：**

    > 启用 TDE 后，备份文件也会使用数据库加密密钥进行加密。


    既然您已经有了备份的证书，就应该将证书备份保存到安全的位置。您还应该确保拥有用于备份证书的密码。如果您需要将使用 TDE 加密的数据库还原到新服务器，这两者都是必需的。例如，如果我想将此数据库还原到新服务器，我需要将证书备份复制到新服务器。在此示例中，我将把
    `DataEncryption.cer` 和 `DataEncryption.pvk` 复制到新服务器的 `D:\Certificates` 目录。然后，我可以执行清单
    [19-10](#480547_2_En_19_Chapter.xhtml#PC10) 中的代码，使用先前的证书和加密密钥创建新证书。


    ```sql

    USE master;

    CREATE MASTER KEY ENCRYPTION BY PASSWORD = ''oUtd@or*R3cre&tion#'';

    CREATE CERTIFICATE DataEncryption

    FROM FILE = N''D:\Certificates\DataEncryption.cer''

    WITH PRIVATE KEY (

    FILE = N''D:\Certificates\DataEncryption.pvk'',

    DENCRYPTION BY PASSWORD = ''pR0!5Ql#''

    );

    ```

    **清单 19-10 备份加密证书**


    创建新的主密钥和证书后，您将能够还原使用 TDE 加密的数据库。


    如果您发现需要删除 TDE，首先需要通过执行清单 [19-11](#480547_2_En_19_Chapter.xhtml#PC11) 中的 T-SQL
    代码来禁用加密。


    ```sql

    ALTER DATABASE OutdoorRecreationTDE

    SET ENCRYPTION OFF;

    ```

    **清单 19-11 移除 TDE**


    这将导致后台解密过程运行，因此建议在维护窗口期间执行此操作。继续之前，您必须通过执行清单 [19-8](#480547_2_En_19_Chapter.xhtml#PC8)
    中的查询来确认解密过程已完成。一旦解密过程完成，您可以使用清单 [19-12](#480547_2_En_19_Chapter.xhtml#PC12) 中的代码删除数据库加密密钥。


    ```sql

    DROP DATABASE ENCRYPTION KEY;

    ```

    **清单 19-12 删除数据库加密密钥**


    删除加密密钥后，TDE 即已从数据库中移除。


    本节介绍了透明数据加密（TDE）的用途。您还学习了实施 TDE 所需的步骤。本节还提供了如何暂停或恢复加密/解密过程以及查看后台过程状态的说明。您还学习了如何备份和还原证书，以及查找证书的最近备份日期。最后，本节介绍了如何删除
    TDE。'
  raw: 'As of the writing of this book, you need to specify the private key in order
    for the certificate last backup date to be updated.


    After backing up the certificate, you can rerun the query in Listing [19-8](#480547_2_En_19_Chapter.xhtml#PC8).
    The results of this query are in Table [19-8](#480547_2_En_19_Chapter.xhtml#Tab8).


    Table 19-8


    Result for the Last Backup Date for a Certificate


    | Last Backup Date | Encrypted Database | Certificate Name |

    | --- | --- | --- |

    | 2023-04-01 | OutdoorRecreation | DataEncryption |


    The results above indicate that the certificate has been backed up recently.


    Caution


    Once TDE is enabled, backup files will also be encrypted with the database encryption
    key.


    Now that you have a backup of the certificate saved, you should save the certificate
    backup to a secure location. You should also make sure you have the password that
    was used to back up the certificate. Both of these will be needed if you need
    to restore the database encrypted with TDE to a new server. If I want to restore
    this database to a new server, I need to copy the backup of the certificate to
    the new server. For this example, I will copy `DataEncryption.cer` and `DataEncryption.pvk`
    to `D:\Certificates` on the new server. I can then execute the code from Listing
    [19-10](#480547_2_En_19_Chapter.xhtml#PC10) to create a new certificate using
    the previous certificate and encryption key.


    ```

    USE master;

    CREATE MASTER KEY ENCRYPTION BY PASSWORD = ''oUtd@or*R3cre&tion#'';

    CREATE CERTIFICATE DataEncryption

    FROM FILE = N''D:\Certificates\DataEncryption.cer''

    WITH PRIVATE KEY (

    FILE = N''D:\Certificates\DataEncryption.pvk'',

    DENCRYPTION BY PASSWORD = ''pR0!5Ql#''

    );

    Listing 19-10

    Backup Encryption Certificates

    ```


    After creating a new master key and certificate, you will be able to restore the
    database encrypted with TDE.


    If you find that you want to remove TDE, you first need to disable the encryption
    by executing the T-SQL code in Listing [19-11](#480547_2_En_19_Chapter.xhtml#PC11).


    ```

    ALTER DATABASE OutdoorRecreationTDE

    SET ENCRYPTION OFF;

    Listing 19-11

    Removing TDE

    ```


    This will cause the background decryption process to run so it is advisable to
    perform this action during a maintenance window. Before continuing, you must confirm
    that the decryption process is complete by executing the query in Listing [19-8](#480547_2_En_19_Chapter.xhtml#PC8).
    Once the decryption process is complete, you can drop the database encryption
    key using the code in Listing [19-12](#480547_2_En_19_Chapter.xhtml#PC12).


    ```

    DROP DATABASE ENCRYPTION KEY;

    Listing 19-12

    Dropping the Database Encryption Key

    ```


    After the encryption key is dropped, TDE has been removed from the database.


    This section covered the purpose of Transparent Data Encryption. You also learned
    the steps needed to implement TDE. This section also provided instructions on
    how you can suspend or resume the encryption or decryption process and view the
    status of the background process. You also learned how to back up and restore
    the certificate and find that most recent backup date for the certificates. Finally,
    this section covered how to remove TDE.'
  trans: '# 证书备份与透明数据加密（TDE）管理


    在撰写本书时，您需要指定私钥以更新证书的最后备份日期。


    备份证书后，您可以重新运行清单 19-8 中的查询。此查询的结果如表 19-8 所示。


    **表 19-8 证书最后备份日期的查询结果**


    | 上次备份日期 | 加密数据库 | 证书名称 |

    | --- | --- | --- |

    | 2023-04-01 | OutdoorRecreation | DataEncryption |


    以上结果表明证书最近已备份。


    > **注意：**

    > 启用 TDE 后，备份文件也会使用数据库加密密钥进行加密。


    既然您已经有了备份的证书，就应该将证书备份保存到安全的位置。您还应该确保拥有用于备份证书的密码。如果您需要将使用 TDE 加密的数据库还原到新服务器，这两者都是必需的。例如，如果我想将此数据库还原到新服务器，我需要将证书备份复制到新服务器。在此示例中，我将把
    `DataEncryption.cer` 和 `DataEncryption.pvk` 复制到新服务器的 `D:\Certificates` 目录。然后，我可以执行清单
    19-10 中的代码，使用先前的证书和加密密钥创建新证书。


    ```sql

    USE master;

    CREATE MASTER KEY ENCRYPTION BY PASSWORD = ''oUtd@or*R3cre&tion#'';

    CREATE CERTIFICATE DataEncryption

    FROM FILE = N''D:\Certificates\DataEncryption.cer''

    WITH PRIVATE KEY (

    FILE = N''D:\Certificates\DataEncryption.pvk'',

    DENCRYPTION BY PASSWORD = ''pR0!5Ql#''

    );

    ```

    **清单 19-10 备份加密证书**


    创建新的主密钥和证书后，您将能够还原使用 TDE 加密的数据库。


    如果您发现需要删除 TDE，首先需要通过执行清单 19-11 中的 T-SQL 代码来禁用加密。


    ```sql

    ALTER DATABASE OutdoorRecreationTDE

    SET ENCRYPTION OFF;

    ```

    **清单 19-11 移除 TDE**


    这将导致后台解密过程运行，因此建议在维护窗口期间执行此操作。继续之前，您必须通过执行清单 19-8 中的查询来确认解密过程已完成。一旦解密过程完成，您可以使用清单
    19-12 中的代码删除数据库加密密钥。


    ```sql

    DROP DATABASE ENCRYPTION KEY;

    ```

    **清单 19-12 删除数据库加密密钥**


    删除加密密钥后，TDE 即已从数据库中移除。


    本节介绍了透明数据加密（TDE）的用途。您还学习了实施 TDE 所需的步骤。本节还提供了如何暂停或恢复加密/解密过程以及查看后台过程状态的说明。您还学习了如何备份和还原证书，以及查找证书的最近备份日期。最后，本节介绍了如何删除
    TDE。'
