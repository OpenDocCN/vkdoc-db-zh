  trans: '

    如果您选择为错误记录创建额外的日志表，最终可能会创建一个类似于代码清单 14-16 中的表。


    ```

    CREATE TABLE dbo.CustomerOrderHistoryLog

    (

    CustomerOrderHistoryLogID INT             NOT NULL,

    CustomerOrderHistoryID    INT             NOT NULL,

    DateCreated               DATETIME2(2)    NOT NULL,

    DateModified              DATETIME2(2)    NULL,

    CONSTRAINT PK_CustomerOrderHistoryLog_CustomerOrderHistoryLogID

    PRIMARY KEY CLUSTERED (CustomerOrderHistoryLogID),

    CONSTRAINT FK_CustomerOrderHistoryLog_CustomerOrderHistoryID

    FOREIGN KEY (CustomerOrderHistoryID)

    REFERENCES dbo.CustomerOrderHistory(CustomerOrderHistoryID)

    );

    Listing 14-16

    创建 dbo.CustomerOrderHistoryLog 表

    ```


    `dbo.CustomerOrderHistory`表上的任何错误都可以在代码清单 14-16 的表中插入一条对应的记录。在表 14-9 中，有一条关于`CustomerOrderHistoryID`
    2 的错误记录。如果您在该错误记录创建之前就已经建立了代码清单 14-16 中的表，您可能会发现一条类似于表 14-10 中的条目。


    表 14-10


    `dbo.CustomerOrderHistoryLog` 表内的数据


    | CustomerOrder HistoryLogID | CustomerOrder HistoryID | DateCreated | DateModified
    |

    | --- | --- | --- | --- |

    | 1 | 2 | 2023-02-13 | 2023-02-13 |


    一旦在`dbo.CustomerOrderHistoryLog`表中有了记录，您就可以根据此表中是否存在记录来生成警报。一种选择是设置一个每 15 分钟执行一次的存储过程。该存储过程的目的可能是，如果在`dbo.CustomerOrderHistoryLog`表中发现任何记录，就生成一封电子邮件。如果您选择此方法来创建警报，请确保定期从此表中清除数据。在这种情况下，您还需要一个存储过程来定期删除此表中的数据。


    无论您选择哪种方法来实现应用程序与 SQL Server 之间的错误日志记录，您都应确保这些错误被记录在某个可以被多方访问的地方。最难排查的问题之一就是没有可用的日志。记录与
    SQL Server 相关错误的目标是让您组织内的相关人员能够快速发现问题所在，从而高效地解决问题。您可能会选择在应用程序层面实现大部分错误处理。但是，对于需要立即纠正的错误，或许可以从
    SQL Server 内部生成自动报告。


    作为应用程序开发的一部分，您需要考虑您的组织需要哪种类型的日志记录。在盗窃风险较高的行业中，跟踪数据何时发生修改以及由谁修改可能更为重要。所需的信息将决定您为数据修改实现何种类型的日志记录。您还需要考虑如何管理与数据库相关的错误。这些错误并非
    SQL Server 特有的错误，而是由于为您的应用程序编写的 T-SQL 代码执行而产生的错误。在确定了如何管理应用程序的日志记录后，您可能还需要考虑如何设计可重用的
    T-SQL 代码。


    # 15. 增强


    本章继续关注构建可维护的 T-SQL。很多时候，您需要更新数据库架构以添加新的应用程序功能。第一节提供了几个可用于修改现有数据库对象的示例。第二节重点介绍了在逐步淘汰不良数据库设计或已弃用功能时可能遇到的一些挑战。


    ## 添加新功能


    理想情况下，为现有应用程序添加功能是软件开发的常规部分。本节讨论如何在保留现有功能的同时为现有应用程序添加功能的几种选项。在本书中，我将使用“应用程序规则”来指代通过更新存储在数据库表中的值来启用功能的能力。此方法不需要任何应用程序或代码更改。但是，“功能标志”将用于指代通过数据传递给
    SQL Server 的方式（包括使用参数）来启用功能的情况。如果您通过向表中添加数据来增加功能，行级安全性或许能让您控制新功能何时上线。如果您需要添加记录数据日志或历史信息的新功能，也可以使用触发器。实现日志记录的其他选项在第
    14 章中讨论。

