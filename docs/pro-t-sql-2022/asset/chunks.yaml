  trans: '

    这通常是一个表示真或假的值。对于 `SQL Server`，常用 1 表示真，0 表示假。若将 `IsActive` 设为真并运行筛选 `IsActive`
    值为真的结果的查询，你将只获得活跃客户的列表。一旦将 `IsActive` 列添加到 `dbo.Customer` 表，你就可以修改 `T-SQL` 代码，根据编写方式显示活跃或非活跃客户的订单。


    你可以选择仅根据分配给 `IsActive` 的值来显示结果。当 `IsActive` 值设为 1 时，表示值为真。若只想显示活跃客户，需在 `WHERE`
    子句中修改 `T-SQL` 代码以使用 `IsActive = 1`。这也让你能够实现某些屏幕仅显示活跃客户，而其他屏幕仅显示非活跃或禁用客户的功能。


    除了为用户或角色启用或禁用功能外，有时你可能希望控制应用程序的运行方式。公司通常希望随时间改变其业务运营方式。这通常可以通过在业务所使用的应用程序中添加、更改或移除功能来实现。


    例如，如果一家企业希望扩展到当前市场之外，可能会选择为其现有应用程序添加新功能。添加新功能最简单的方法是增加新的应用程序代码。然而，企业可能会发现这个新市场或新业务线并未如预期运作，公司决定回滚这项新功能。根据代码的编写方式，这可能是一个需要重新编写代码的复杂变更，也可能是一个允许应用程序使用代码不同部分的简单变更。


    根据你的业务环境，你可能会发现通过数据库管理功能变更比通过应用程序代码更容易。当功能需要基于季节性或地区进行变化时，这种可能性更大。这让你能够实施可快速更改的精细控制。你需要仔细考虑管理此功能的最佳位置。我能提供的最佳建议是：当高层管理需要对任何变更进行审批时，将业务逻辑保留在应用程序中。对于那些能够快速变更且监督较少的业务逻辑，最好将其保留在数据库中。


    如果你想从数据库内部管理部分应用程序业务逻辑，则需要创建一个表来管理某些功能是否启用。这个表在概念上类似于第 12 章为功能标志创建的表。如果你想在数据库中管理功能，可能需要创建一个如代码清单
    13-9 所示的表。


    ```sql

    CREATE TABLE dbo.ApplicationRule

    (

    ApplicationRuleID               IDENTITY(1,1) INT      NOT NULL,

    ApplicationRuleDescription      VARCHAR(50)            NOT NULL,

    IsActive                        BIT                    NOT NULL,

    DateCreated                     DATETIME               NOT NULL,

    DateModified                    DATETIME                   NULL,

    CONSTRAINT PK_ApplicationRule_ApplicationRuleID

    PRIMARY KEY CLUSTERED (ApplicationRuleID)

    );

    ```

    代码清单 13-9

    创建应用规则表


    如果你是为一个单一、集中的应用程序创建规则，这个表设计将满足你的需求。如果你在管理多个应用程序，请考虑应用程序如何使用这些规则。如果大多数或所有规则对于每个应用程序都是唯一的，你可能需要为此表添加一列来指明受影响的应用程序。


    可能存在业务原因，使你希望切换应用程序以仅显示活跃客户或显示所有客户。如果应用程序需要显示所有客户或仅活跃客户存在合理的业务理由，就可能发生这种情况。此规则的值可以存储在表
    13-3 中。


    表 13-3


    应用规则表


    | Application RuleID | ApplicationRule Description | IsActive | DateCreated |
    DateModifed |

    | --- | --- | --- | --- | --- |

    | 1 | 仅显示活跃客户 | 1 | 2023-04-12 | 2023-04-12 |


    此表中的条目表示，启用此应用规则时将仅显示活跃客户。若希望同一应用程序显示所有客户，你需要将 `IsActive` 值更新为假。虽然你可以更新所有数据库代码和存储过程，以根据此应用规则的启用状态使用
    `IF... THEN` 语句，但我建议在应用程序内部处理此功能。


    这正是将代码开发得足够灵活变得重要的地方。尽管本书的主题不是应用程序代码开发，但你将需要一个能与你的应用程序代码协作来处理这些场景的数据库。从概念上讲，这可以与第
    12 章讨论的功能标志类似地工作。你可以创建一个表来存储对特定功能的引用。在某些环境中，这可能被称为应用规则。

