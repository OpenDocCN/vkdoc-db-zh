- fmt: 'For this execution, SQL Server has decided to convert this `T-SQL` to act
    like an `INNER JOIN` instead of a `SEMI JOIN`. This is because SQL Server has
    calculated that this will give the best execution out of those evaluated.


    There are ways to combine data that consist of comparing values between two data
    sets and selecting items that match or do not match between them. There is also
    the possibility of combining entire data sets as part of the logical join types.
    This can include the use of `UNION` or `UNION ALL` in your `T-SQL` code. The query
    shown in Listing [7-16](#480547_2_En_7_Chapter.xhtml#PC16) shows the use of a
    `UNION` between the two tables.


    ```sql

    SELECT prd.ProductName

    FROM dbo.Product prd

    WHERE prd.ProductName LIKE ''%scope''

    UNION

    SELECT prd.ProductName

    FROM dbo.Product prd

    WHERE prd.ProductName = ''Telescope'';

    Listing 7-16

    All Products with Tele

    ```


    In this query, the list of products that begin with Tele or the product name is
    equal to Telescope will be returned for the current data in the database, but
    the first and second `SELECT` statements will return identical results. Using
    `UNION` ensures that the results are not cumulative between the first and second
    `SELECT` statements. If there was a product microscope as well as telescope, the
    query would only return a single record for each product that matches either criteria.
    However, if you used a `UNION ALL` instead of `UNION`, you would get the full
    results from each `SELECT` statement returned in the result set. When this query
    is executed in the SQL Server, the execution plan in Figure [7-34](#480547_2_En_7_Chapter.xhtml#Fig34)
    is returned.


    ![](images/480547_2_En_7_Chapter/480547_2_En_7_Fig34_HTML.jpg)


    A snapshot presents the execution plan. 2, Clustered index scan with cluster,
    cost 65%. Concatenation, cost 0%. Sort with distinct sort, cost 63%. Select cost
    0%.


    Figure 7-34


    Execution plan with concatenation


    In this query, SQL Server does not join the data together as it has in the other
    examples from this chapter. Instead, there is only one operator, concatenation,
    that indicates how SQL Server is combining this data.


    Overall, the goal is to use the physical join that is the most effective for the
    data that is being joined. Merge joins can perform very well, but they are limited
    to data that has been ordered by indexes or `ORDER BY` or `GROUP BY` statements.
    As expected, index merge joins will perform even better than merge joins that
    do not use an index. When data is not sorted and particularly if one of the two
    sides of the data being joined is small, SQL Server may use a nested loop. You
    will want to confirm that looping through the other table does not incur a significant
    cost. Just as a merge join using an index performs better than a merge join without
    an index, the same is true for a nested loop. For both a merge join and nested
    loop, see if you can alter your `T-SQL` code to use an index. This does not mean
    creating an index if one does not exist; instead, you can check the indexes on
    the table and see if any will apply for your specific query. If the tables are
    not sorted and particularly if the numbers of records being joined on either side
    are both large, the hash match can be the ideal solution.


    Throughout this chapter, I have gone over various aspects of working with execution
    plans. I started with some of the ways you can access and view execution plans.
    I also discussed how estimated execution plans, actual execution plans, and executions
    in the plan cache differed. When looking at execution plans, there are some items
    such as arrow sizes, estimated number of rows, and actual number of rows that
    can give you some hints regarding the next steps you can take to improve the performance
    of your `T-SQL` code. After looking into these items, you may also be able to
    check how the execution is using indexes. It is helpful to not only focus on what
    indexes are being used but how SQL Server is searching through those indexes.
    When joining tables, use `T-SQL` code that can reference certain logical join
    type behavior. These logical join types can affect what types of physical join
    types will be used as part of the execution plan. By writing your `T-SQL` code
    differently, you may be able to impact the execution plan generated by SQL Server.
    The information covered in this chapter should help you get more comfortable with
    reviewing your `T-SQL` code and improving the speed and hardware usage associated
    with your `T-SQL`.


    # 8. Optimizing Databases for T-SQL


    In this part of the book, I have gone over many aspects of writing `T-SQL` code.
    I started by going over the use of set-based design in queries. When designing
    queries, it is also be important to design queries that use hardware effectively.
    One way to check the performance of your queries is by using execution plans.
    Once you have the execution plan of the query you want to improve, you can start
    focusing on how to optimize the query. There are some options available when it
    comes to optimizing `T-SQL`.


    You have many options available to you when you start working on performance tuning
    your queries. In the past, one option was to manually identify poorly performing
    queries and improve them. When identifying queries that need to be optimized,
    there are many different factors that you can take into consideration. Starting
    in `SQL Server 2017`, additional functionality allows SQL Server to automatically
    improve the performance of certain aspects of executing `T-SQL`. With `SQL Server
    2019`, there have been even more enhancements to help queries run better and faster
    without changing the underlying `T-SQL` code. This chapter will show recent changes
    to SQL Server, including `SQL Server 2022`, and how you can use them to improve
    the performance of your code without needed to rewrite your `T-SQL`.'
