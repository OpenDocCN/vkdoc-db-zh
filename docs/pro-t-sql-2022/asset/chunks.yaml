- fmt: '## Automatic Database Tuning


    在之前的章节中，我讨论了您如何针对逻辑读取和持续时间来优化您的 T-SQL 代码。在 SQL Server 过去的几个版本中，发生了许多变化，这些变化可以帮助您自动优化
    SQL Server 或优化您的查询。在某些情况下，这涉及记录有关查询性能的信息。在其他时候，这可能是 SQL Server 在管理您的执行计划或索引。虽然本节涵盖的主题与
    SQL Server 可以为您执行的优化相关，但理解这些概念将有助于您更好地了解 SQL Server 将如何处理您的 T-SQL 代码。


    ### Automatic Plan Correction


    在 SQL Server 2016 引入的 Query Store 功能之上，SQL Server 2017 引入了一项新功能。下一步是看看 SQL Server
    是否能利用对执行计划、执行统计信息和这些查询执行的等待统计信息的历史信息的访问来获益。此功能内置于 Query Store 中，可以进行配置而无需人工干预。为了实现这一点，这种新功能还必须包含一种验证结果的方法。


    既然 SQL Server 可以查看 Query Store，它就能系统地确定新的执行计划是比之前的执行计划性能更好还是更差。这个新功能被称为 Automatic
    Plan Correction。此功能默认不启用。在启用之前，需要先启用 Query Store，如代码清单 [8-6](#480547_2_En_8_Chapter.xhtml#PC6)
    所示。一旦启用了 Query Store，您就可以运行代码清单 [8-7](#480547_2_En_8_Chapter.xhtml#PC7) 所示的代码来启用
    Automatic Plan Correction。


    ```

    ALTER DATABASE Menu

    SET AUTOMATIC_TUNING (FORCE_LAST_GOOD_PLAN = ON);

    Listing 8-7

    Query to Enable Automatic Plan Correction

    ```


    一旦启用了 Automatic Plan Correction，SQL Server 就可以比较新的和之前的执行计划，以确定比较结果是否符合 SQL Server
    可以强制使用之前执行计划的标准。为了确保 SQL Server 不会花费额外精力进行微调性能，阈值设置为将 CPU 成本减少 10 秒或更多。另一个选项是执行中的错误数量少于之前的版本。如果新的执行计划在
    CPU 上多花费了超过 10 秒，SQL Server 可以自动强制使用之前的计划。同样，如果新的执行计划比之前的计划有更多的错误，SQL Server 可以强制使用之前的执行计划。


    在 SQL Server 自动强制执行计划后，它会继续监视性能，以确认新强制的执行计划是否按预期工作。如果 SQL Server 确定强制的执行计划不再提供预期的性能收益，它可以撤销对执行计划的强制。Automatic
    Plan Correction 不会更改您的 T-SQL 代码；此功能仅帮助管理当前用于您的 T-SQL 代码的执行计划。


    如果您更愿意手动管理执行计划，您也可以这样做。请确保不要运行代码清单 [7-8](#480547_2_En_8_Chapter.xhtml#PC8) 中所示的
    T-SQL 代码。如果您选择手动执行计划纠正，则需要定期监视哪些查询需要强制执行计划。随着数据形状和相关统计信息可能随时间变化，您还需要手动撤销对查询执行计划的强制。从
    SQL Server 2016 开始，可以使用 Query Store 来监视执行计划随时间的变化。在 SQL Server 2017 中，还可以选择使用
    DMV `sys.dm_tuning_recommendations` 来查找可以从强制执行计划中受益的查询。


    虽然自动或手动计划纠正超出了 T-SQL 的范围，但了解 SQL Server 可以对您的 T-SQL 查询执行哪些操作是有帮助的。我仍然建议您将 T-SQL
    设计为在各种场景下高效运行，但知道当参数嗅探等问题不可避免时，SQL Server 中还有其他选项可以帮助提高整体查询性能，这是一件好事。


    ### Automatic Index Management


    除了允许 SQL Server 管理您的执行计划并选择最佳可用计划外，您还可以选择允许 SQL Server 系统地监视和管理您的索引。此功能目前仅在 Azure
    SQL Database 中可用。启用 Automatic Index Management 允许 SQL Server 创建它认为必要的新索引，并识别未使用或似乎与其他已创建索引类似的索引。


    与 Automatic Plan Correction 类似，SQL Server 将监视新索引的性能。如果认为它们效率较低，SQL Server 将删除这些索引。如果
    SQL Server 修改或删除索引，也将使用相同的过程。在使用 Azure SQL Database 时，仍然可以手动管理索引。然而，允许 Azure SQL
    Database 及时发现并解决索引问题可能会节省您的成本，因为执行相同任务可能需要更少的资源。


    ## Intelligent Query Processing


    除了 SQL Server 自动管理执行计划和索引的能力外，还有其他新功能可以帮助自动优化 T-SQL 代码性能。如第 [6](#480547_2_En_6_Chapter.xhtml)
    章所讨论的，内存是 SQL Server 使用的关键资源。在使用 SQL Server 的内存时，您希望确保内存被尽可能高效地使用。处理数据集对于使用 SQL
    Server 也至关重要。如果 SQL Server 可以将一组行转换为批次，然后执行任何必要的操作，这将有助于优化查询。数据形状在数据表中并不总是一致的。在这些场景中，拥有一个根据返回的数据类型而灵活调整的执行计划可能会有所帮助。这些功能有助于提高正在执行的
    T-SQL 代码的效率。


    ### Memory Grant Feedback


    在执行查询时，SQL Server 会尝试估计该事务所需的内存量。基于估计分配给查询的内存量称为内存授予。虽然 SQL Server 能正确估计内存是理想情况，但有时估计的内存量与实际使用的内存量并不匹配。Memory
    Grant Feedback 首次在 SQL Server 2017 中可用。Memory Grant Feedback 的添加使 SQL Server 能够查看之前查询执行的内存使用情况，并在内存估计值显著低估或高估时进行调整。这允许
    SQL Server 最大限度地减少因内存估计不正确而导致的潜在性能问题。


    为了确保内存授予得到正确管理，为内存授予与实际内存使用量之间的差异定义了阈值。如果使用的内存少于 1 MB，则无需进行额外分析。如果内存授予是所用内存量的两倍，则可以重新计算特定查询的内存授予。同样，如果执行查询所需的内存超过内存授予，也可以重新计算内存授予。'
  raw: '## Automatic Database Tuning


    In the previous sections, I discussed what you can do to optimize your T-SQL code
    regarding logical reads and duration. Over the past several releases of SQL Server,
    there have been many changes that can either help you optimize SQL Server or optimize
    your queries automatically. In some cases, this involves recording information
    about the performance of your queries. At other times this can be either SQL Server
    managing your execution plans or your indexes. While the topics covered in this
    section are related to optimization that SQL Server can perform for you, it is
    helpful to understand these concepts so that you have a better idea as to how
    SQL Server will handle your T-SQL code.


    ### Automatic Plan Correction


    Building on top of the functionality introduced in SQL Server 2016 with Query
    Store is a new feature introduced in SQL Server 2017\. The next step was to see
    if SQL Server could use the access to historical information about execution plans,
    execution statistics, and wait statistics for those query executions to its benefit.
    Built into Query Store, this functionality can be configured so that no human
    intervention is required. In order to make that happen, this new functionality
    also has to include a way to verify the results.


    Now that SQL Server can look at the query store, it can determine systematically
    if a new execution plan performs better or worse than the prior execution plan.
    This new functionality is referred to as Automatic Plan Correction. This feature
    is not enabled by default. Before it can be enabled, Query Store needs to be enabled,
    as shown in Listing [8-6](#480547_2_En_8_Chapter.xhtml#PC6). Once Query Store
    has been enabled, you can run the code shown in Listing [8-7](#480547_2_En_8_Chapter.xhtml#PC7)
    to enable Automatic Plan Correction.


    ```

    ALTER DATABASE Menu

    SET AUTOMATIC_TUNING (FORCE_LAST_GOOD_PLAN = ON);

    Listing 8-7

    Query to Enable Automatic Plan Correction

    ```


    Once Automatic Plan Correction has been enabled, SQL Server can compare the new
    and previous execution plans to determine if the comparison meets the criteria
    where SQL Server can force the prior execution plan. In order to make sure that
    SQL Server does not spend extra effort microtuning performance, the threshold
    is set at a benefit of decreasing the CPU cost by 10 seconds or more. The other
    option is if the number of errors in the execution is less than the previous version.
    If the new execution plan cost more than 10 extra seconds on the CPU, SQL Server
    can force the previous plan automatically. Similarly, if the new execution plan
    has more errors than the previous plan, SQL Server can force the previous execution
    plan.


    After SQL Server forces an execution plan automatically, it continues to monitor
    performance to confirm that the newly forced execution plan is working as expected.
    If SQL Server determines that the forced execution plan is no longer providing
    the performance benefit expected, it can undo forcing the execution plan. Automatic
    Plan Correction does not alter your T-SQL code; this feature only helps manage
    which execution plan is currently being used for your T-SQL code.


    If you prefer to manually manage your execution plans, you can do so. Make sure
    that you do not run the T-SQL code shown in Listing [7-8](#480547_2_En_8_Chapter.xhtml#PC8).
    If you choose to manually plan choice correction, you need to regularly monitor
    which queries need to have plans forced. You also need to manually undo forcing
    query execution plans over time as the shape of your data and the associated statistics
    may change over time. Query Store can be used to monitor execution plans over
    time starting in SQL Server 2016\. With SQL Server 2017, there is also the option
    of using the DMV `sys.dm_tuning_recommendations` to find queries that can benefit
    from forcing an execution plan.


    While automatic or manual plan correction is outside the scope of T-SQL, it is
    helpful to know what SQL Server can do with your T-SQL queries. I still suggest
    that you design your T-SQL to run efficiently for a variety of scenarios, but
    it is nice to know that when issues like parameter sniffing are unavoidable, there
    are other options within SQL Server to help your overall query performance.


    ### Automatic Index Management


    In addition to allowing SQL Server to manage your execution plans and choose the
    best available plan, you also have the option of allowing SQL Server to systematically
    monitor and manage your indexes. This feature is currently only available in Azure
    SQL Database. Enabling Automatic Index Management allows SQL Server to create
    new indexes that it deems necessary and to also identify indexes that are unused
    or that seem to be like other indexes that have been created.


    Like Automatic Plan Correction, SQL Server will monitor the performance of new
    indexes. If they are deemed to be less efficient, SQL Server will remove those
    indexes. The same process will be used if SQL Server modifies or drops indexes.
    It will still be possible to manually manage your indexes while using Azure SQL
    Database. However, allowing Azure SQL Database to promptly find and resolve indexing
    issues may save you money as less resources may be required to perform the same
    tasks.


    ## Intelligent Query Processing


    Along with the ability for SQL Server to automatically manage execution plans
    and indexes, there are other new features that can help automatically optimize
    T-SQL code performance. As discussed in Chapter [6](#480547_2_En_6_Chapter.xhtml),
    memory is a key resource used by SQL Server. When using memory with SQL Server,
    you want to be sure that memory is being used as efficiently as possible. Working
    with data sets is also critical to working with SQL Server. If SQL Server can
    convert a collection of rows into a batch and then perform any necessary actions,
    this will help optimize the query. The shape of the data is not always consistent
    in a data table. In those scenarios, it may be helpful to have an execution plan
    that is flexible depending on the types of data pulled back. These features can
    help improve the efficiency of the T-SQL code that is being executed.


    ### Memory Grant Feedback


    When executing a query, SQL Server will try to estimate the amount of memory required
    for that transaction. The amount of memory allocated to a query based on the estimate
    is referred to as a memory grant. While it is ideal that SQL Server estimate the
    memory correctly, there are times when the amount of memory estimated does not
    match the amount of memory used. Memory Grant Feedback first became available
    in SQL Server 2017\. The addition of Memory Grant Feedback allows SQL Server to
    review previous memory usage for the previous execution of query and adjust the
    memory estimates if they are significantly under or over estimated. This allows
    SQL Server to minimize potential performance issues due to incorrectly estimated
    memory.


    In order to make sure that memory grants are managed correctly, thresholds are
    defined for the variance between the memory grant and the actual memory usage.
    If the memory used is less than 1 MB, no additional analysis is required. If the
    memory grant is twice the amount of memory used, then the memory grant for the
    specific query can be recalculated. Similarly, the memory grant can be recalculated
    if the memory needed to execute the query is more than the memory grant.'
  trans: '## 自动数据库调优


    在之前的章节中，我讨论了如何针对逻辑读取和持续时间来优化您的 T-SQL 代码。在 SQL Server 过去的几个版本中，发生了许多变化，这些变化可以帮助您自动优化
    SQL Server 或优化您的查询。在某些情况下，这涉及记录有关查询性能的信息。在其他时候，这可能是 SQL Server 在管理您的执行计划或索引。虽然本节涵盖的主题与
    SQL Server 可以为您执行的优化相关，但理解这些概念将有助于您更好地了解 SQL Server 将如何处理您的 T-SQL 代码。


    ### 自动计划纠正


    在 SQL Server 2016 引入的*查询存储*功能之上，SQL Server 2017 引入了一项新功能。下一步是看看 SQL Server 是否能利用对执行计划、执行统计信息和这些查询执行的等待统计信息的历史信息的访问来获益。此功能内置于查询存储中，可以进行配置而无需人工干预。为了实现这一点，这种新功能还必须包含一种验证结果的方法。


    既然 SQL Server 可以查看查询存储，它就能系统地确定新的执行计划是比之前的执行计划性能更好还是更差。这个新功能被称为**自动计划纠正**。此功能默认不启用。在启用之前，需要先启用查询存储，如代码清单
    8-6 所示。一旦启用了查询存储，您就可以运行代码清单 8-7 所示的代码来启用自动计划纠正。


    ```

    ALTER DATABASE Menu

    SET AUTOMATIC_TUNING (FORCE_LAST_GOOD_PLAN = ON);

    代码清单 8-7

    启用自动计划纠正的查询

    ```


    一旦启用了自动计划纠正，SQL Server 就可以比较新的和之前的执行计划，以确定比较结果是否符合 SQL Server 可以强制使用之前执行计划的标准。为了确保
    SQL Server 不会花费额外精力进行微调性能，阈值设置为将 CPU 成本减少 10 秒或更多。另一个选项是执行中的错误数量少于之前的版本。如果新的执行计划在
    CPU 上多花费了超过 10 秒，SQL Server 可以自动强制使用之前的计划。同样，如果新的执行计划比之前的计划有更多的错误，SQL Server 可以强制使用之前的执行计划。


    在 SQL Server 自动强制执行计划后，它会继续监视性能，以确认新强制的执行计划是否按预期工作。如果 SQL Server 确定强制的执行计划不再提供预期的性能收益，它可以撤销对执行计划的强制。自动计划纠正不会更改您的
    T-SQL 代码；此功能仅帮助管理当前用于您的 T-SQL 代码的执行计划。


    如果您更愿意手动管理执行计划，您也可以这样做。请确保不要运行代码清单 7-8 中所示的 T-SQL 代码。如果您选择手动执行计划纠正，则需要定期监视哪些查询需要强制执行计划。随着数据形状和相关统计信息可能随时间变化，您还需要手动撤销对查询执行计划的强制。从
    SQL Server 2016 开始，可以使用查询存储来监视执行计划随时间的变化。在 SQL Server 2017 中，还可以选择使用 DMV `sys.dm_tuning_recommendations`
    来查找可以从强制执行计划中受益的查询。


    虽然自动或手动计划纠正超出了 T-SQL 的范围，但了解 SQL Server 可以对您的 T-SQL 查询执行哪些操作是有帮助的。我仍然建议您将 T-SQL
    设计为在各种场景下高效运行，但知道当参数嗅探等问题不可避免时，SQL Server 中还有其他选项可以帮助提高整体查询性能，这是一件好事。


    ### 自动索引管理


    除了允许 SQL Server 管理您的执行计划并选择最佳可用计划外，您还可以选择允许 SQL Server 系统地监视和管理您的索引。此功能目前仅在 Azure
    SQL Database 中可用。启用**自动索引管理**允许 SQL Server 创建它认为必要的新索引，并识别未使用或似乎与其他已创建索引类似的索引。


    与自动计划纠正类似，SQL Server 将监视新索引的性能。如果认为它们效率较低，SQL Server 将删除这些索引。如果 SQL Server 修改或删除索引，也将使用相同的过程。在使用
    Azure SQL Database 时，仍然可以手动管理索引。然而，允许 Azure SQL Database 及时发现并解决索引问题可能会节省您的成本，因为执行相同任务可能需要更少的资源。


    ## 智能查询处理


    除了 SQL Server 自动管理执行计划和索引的能力外，还有其他新功能可以帮助自动优化 T-SQL 代码性能。如第 6 章所讨论的，内存是 SQL Server
    使用的关键资源。在使用 SQL Server 的内存时，您希望确保内存被尽可能高效地使用。处理数据集对于使用 SQL Server 也至关重要。如果 SQL
    Server 可以将一组行转换为批次，然后执行任何必要的操作，这将有助于优化查询。数据形状在数据表中并不总是一致的。在这些场景中，拥有一个根据返回的数据类型而灵活调整的执行计划可能会有所帮助。这些功能有助于提高正在执行的
    T-SQL 代码的效率。


    ### 内存授予反馈


    在执行查询时，SQL Server 会尝试估计该事务所需的内存量。基于估计分配给查询的内存量称为内存授予。虽然 SQL Server 能正确估计内存是理想情况，但有时估计的内存量与实际使用的内存量并不匹配。**内存授予反馈**首次在
    SQL Server 2017 中可用。内存授予反馈的添加使 SQL Server 能够查看之前查询执行的内存使用情况，并在内存估计值显著低估或高估时进行调整。这允许
    SQL Server 最大限度地减少因内存估计不正确而导致的潜在性能问题。


    为了确保内存授予得到正确管理，为内存授予与实际内存使用量之间的差异定义了阈值。如果使用的内存少于 1 MB，则无需进行额外分析。如果内存授予是所用内存量的两倍，则可以重新计算特定查询的内存授予。同样，如果执行查询所需的内存超过内存授予，也可以重新计算内存授予。'
- fmt: "### Batch Mode on Rowstore\n\nHaving memory grants for batch mode operations\
    \ is a necessary foundation for the next stage in the development of batch mode\
    \ operations. Batch mode operations are where SQL Server can perform an action\
    \ on a group of records all at once instead of one record at a time. When batch\
    \ mode was originally introduced in SQL Server 2012, it was only available for\
    \ `columnstore indexes`. Starting with SQL Server 2019, batch mode operations\
    \ were also allowed to be used for a collection of rows. In this case, a collection\
    \ of rows is also called a `rowstore`. Memory grants for batch mode operations\
    \ allowing batch mode operations for heaps and indexes are the foundation for\
    \ an additional type of query optimization.\n\n### Adaptive Joins\n\nSQL Server\
    \ uses statistics to help estimate the best plan. However, data is not always\
    \ evenly distributed in a table. The plan it picks is often the best plan for\
    \ some column values. The problem comes when it is poor for other column values.\
    \ The chance of this happening has decreased in SQL Server 2019 due to new functionality\
    \ that allows SQL Server to choose between the physical join operator of a `nested\
    \ loop` and a `hash match` depending on the current execution of the query. This\
    \ new functionality is called an `adaptive join`.\n\n`Adaptive joins` were originally\
    \ introduced in SQL Server 2017. However, `adaptive joins` can only be used as\
    \ part of a `batch mode operation`. In SQL Server 2017, `batch mode operations`\
    \ were only supported for `columnstore indexes`. Now that `batch mode operations`\
    \ are also supported for heaps and B-tree indexes, `adaptive joins` can also be\
    \ used on these database objects. Executing the query from Listing [8-6](#480547_2_En_8_Chapter.xhtml#PC6)\
    \ generates an execution plan that contains an `adaptive join`. When you see the\
    \ execution plan, you will see a physical operator for an `adaptive join`. On\
    \ the graphical execution plan, you cannot tell what type of operator is used\
    \ behind the scenes. However, if you mouse over the `adaptive join` in the execution\
    \ plan, you will see a list of properties like the one shown in Figure [8-5](#480547_2_En_8_Chapter.xhtml#Fig5).\n\
    \n![](images/480547_2_En_8_Chapter/480547_2_En_8_Fig5_HTML.png)\n\nA screenshot\
    \ of the adaptive join presents a list. It depicts 22 properties. There are codes\
    \ at the bottom of the list under the titles, output list, hash keys probe, and\
    \ outer references.\n\nFigure 8-5\n\nAdaptive join properties from Listing [8-6](#480547_2_En_8_Chapter.xhtml#PC6)\n\
    \nThe original query from Listing [8-6](#480547_2_En_8_Chapter.xhtml#PC6) was\
    \ to return information about customers, orders, and products based on parameters\
    \ for all three. In Figure [8-5](#480547_2_En_8_Chapter.xhtml#Fig5), you can see\
    \ that the `adaptive join` type listed under the properties is the `hash match`.\
    \ Figure [8-6](#480547_2_En_8_Chapter.xhtml#Fig6) shows a partial screenshot from\
    \ the live query statistics for the execution of Listing [8-6](#480547_2_En_8_Chapter.xhtml#PC6).\n\
    \n![](images/480547_2_En_8_Chapter/480547_2_En_8_Fig6_HTML.jpg)\n\nA flow diagram\
    \ presents live query statistics. It depicts clustered index scan, index scan,\
    \ clustered index seek, clustered index scan, and adaptive join. Clustered Index\
    \ scan has 8.019 seconds, and 802820 of 264931. Adaptive join has 802820 of 87427.\n\
    \nFigure 8-6\n\nLive query statistics from Listing [8-6](#480547_2_En_8_Chapter.xhtml#PC6)\n\
    \nYou can see the total number of records processed by each step as the time spent\
    \ on some of the steps. Looking at the live query statistics, you can see the\
    \ percentage of records returned vs. the estimate. Figure [8-6](#480547_2_En_8_Chapter.xhtml#Fig6)\
    \ shows the live query statistics in progress. In this case, some records like\
    \ the `clustered index scan` on the table `CustomerOrder` or the `index scan`\
    \ on the table `OrderDetail` appear to be estimated correctly. It is also possible\
    \ that other operators may not be estimated correctly. While these variances may\
    \ cause performance issues, the reason I am pointing these values out is to compare\
    \ them to the query execution after you change the value passed to the `@CustomerID`,\
    \ `@CustomerOrderID`, and `@ProductID` variables.\n\nIf you limit the same query\
    \ to one customer, order, and product, you may write `T-SQL` like what is shown\
    \ in Listing [8-8](#480547_2_En_8_Chapter.xhtml#PC8).\n\n```sql\nDECLARE @CustomerID\
    \         INT = 1;\nDECLARE @CustomerOrderID    INT = 401508;\nDECLARE @ProductID\
    \          INT = 1;\nSELECT cus.CustomerID,\n       cus.FirstName,\n       cus.LastName,\n\
    \       ord.CustomerOrderID,\n       ord.OrderNumber,\n       prd.ProductName,\n\
    \       dtl.QuantitySold,\n       dtl.ProductPrice\nFROM dbo.Customer cus\nINNER\
    \ JOIN dbo.CustomerOrder ord\n    ON cus.CustomerID = ord.CustomerID\nINNER JOIN\
    \ dbo.OrderDetail dtl\n    ON ord.CustomerOrderID = dtl.CustomerOrderID\nINNER\
    \ JOIN dbo.Product prd\n    ON dtl.ProductID = prd.ProductID\nWHERE (cus.CustomerID\
    \ = @CustomerID OR @CustomerID IS NULL)\n    AND (ord.CustomerOrderID = @CustomerOrderID\
    \ OR @CustomerOrderID IS NULL)\n    AND (dtl.ProductID = @ProductID OR @ProductID\
    \ IS NULL)\n    AND prd.IsActive = 1\n    AND EXISTS\n        (\n            SELECT\
    \ *\n            FROM dbo.ProductPriceHistory hist\n            WHERE prd.ProductID\
    \ = hist.ProductID\n            GROUP BY hist.ProductID\n            HAVING COUNT(*)\
    \ > 3\n        )\nORDER BY\n    cus.CustomerID,\n    CASE WHEN\n        (\n  \
    \          cus.CustomerID = @CustomerID\n            AND ord.CustomerOrderID =\
    \ @CustomerOrderID\n        )\n        THEN 0\n        ELSE 1\n    END,\n    ord.CustomerOrderID\
    \ DESC,\n    cus.LastName ASC;\n```\nListing 8-8\nQuery for Recipe Information\
    \ for a Specific Recipe\n\nThe differences between Listing [8-6](#480547_2_En_8_Chapter.xhtml#PC6)\
    \ and Listing [8-8](#480547_2_En_8_Chapter.xhtml#PC8) are the first three lines.\
    \ In Listing [8-6](#480547_2_En_8_Chapter.xhtml#PC6), the `@CustomerID`, `@CustomerOrderID`,\
    \ and `@ProductID` is set to -1 so that all recipes are returned. In Listing [8-8](#480547_2_En_8_Chapter.xhtml#PC8),\
    \ the `@CustomerID`, `@CustomerOrderID`, and `@ProductID` are each set to a specific\
    \ value. You can execute this query and look at the execution plan to see if SQL\
    \ Server will handle this query execution differently now that there may be only\
    \ one recipe affected. In Figure [8-7](#480547_2_En_8_Chapter.xhtml#Fig7), you\
    \ can see the properties for the `adaptive join` when executing Listing [8-8](#480547_2_En_8_Chapter.xhtml#PC8).\n\
    \n![](images/480547_2_En_8_Chapter/480547_2_En_8_Fig7_HTML.png)\n\nA screenshot\
    \ of the adaptive join presents a list. It depicts 22 properties. There are codes\
    \ at the bottom of the list under the titles, output list, hash keys probe, and\
    \ outer references.\n\nFigure 8-7\n\nAdaptive join properties from Listing [8-8](#480547_2_En_8_Chapter.xhtml#PC8)\n\
    \nThe actual join type shown in Figure [8-7](#480547_2_En_8_Chapter.xhtml#Fig7)\
    \ is a `nested loop`. The difference between the `adaptive join` types in Figures\
    \ [8-5](#480547_2_En_8_Chapter.xhtml#Fig5) and [8-7](#480547_2_En_8_Chapter.xhtml#Fig7)\
    \ shows how the `adaptive join` can help optimize queries that previously were\
    \ affected by parameter sniffing. The details of the live query statistics from\
    \ Listing [8-8](#480547_2_En_8_Chapter.xhtml#PC8) are shown in Figure [8-8](#480547_2_En_8_Chapter.xhtml#Fig8).\n\
    \n![](images/480547_2_En_8_Chapter/480547_2_En_8_Fig8_HTML.jpg)\n\nA flow diagram\
    \ presents live query statistics. It depicts clustered index scan, index scan,\
    \ clustered index seek, clustered index scan, and adaptive join. Clustered Index\
    \ scan has 1 of 264931. Index scan has 0 of 13246. Clustered index seek has 0\
    \ of 264931. Adaptive join has 0 of 87427.\n\nFigure 8-8\n\nLive query statistics\
    \ from Listing [8-8](#480547_2_En_8_Chapter.xhtml#PC8)"
  raw: '### Batch Mode on Rowstore


    Having memory grants for batch mode operations is a necessary foundation for the
    next stage in the development of batch mode operations. Batch mode operations
    are where SQL Server can perform an action on a group of records all at once instead
    of one record at a time. When batch mode was originally introduced in SQL Server
    2012, it was only available for columnstore indexes. Starting with SQL Server
    2019, batch mode operations were also allowed to be used for a collection of rows.
    In this case, a collection of rows is also called a rowstore. Memory grants for
    batch mode operations allowing batch mode operations for heaps and indexes are
    the foundation for an additional type of query optimization.


    ### Adaptive Joins


    SQL Server uses statistics to help estimate the best plan. However, data is not
    always evenly distributed in a table. The plan it picks is often the best plan
    for some column values. The problem comes when it is poor for other column values.
    The chance of this happening has decreased in SQL Server 2019 due to new functionality
    that allows SQL Server to choose between the physical join operator of a nested
    loop and a hash match depending on the current execution of the query. This new
    functionality is called an adaptive join.


    Adaptive joins were originally introduced in SQL Server 2017\. However, adaptive
    joins can only be used as part of a batch mode operation. In SQL Server 2017,
    batch mode operations were only supported for columnstore indexes. Now that batch
    mode operations are also supported for heaps and B-tree indexes, adaptive joins
    can also be used on these database objects. Executing the query from Listing [8-6](#480547_2_En_8_Chapter.xhtml#PC6)
    generates an execution plan that contains an adaptive join. When you see the execution
    plan, you will see a physical operator for an adaptive join. On the graphical
    execution plan, you cannot tell what type of operator is used behind the scenes.
    However, if you mouse over the adaptive join in the execution plan, you will see
    a list of properties like the one shown in Figure [8-5](#480547_2_En_8_Chapter.xhtml#Fig5).


    ![](images/480547_2_En_8_Chapter/480547_2_En_8_Fig5_HTML.png)


    A screenshot of the adaptive join presents a list. It depicts 22 properties. There
    are codes at the bottom of the list under the titles, output list, hash keys probe,
    and outer references.


    Figure 8-5


    Adaptive join properties from Listing [8-6](#480547_2_En_8_Chapter.xhtml#PC6)


    The original query from Listing [8-6](#480547_2_En_8_Chapter.xhtml#PC6) was to
    return information about customers, orders, and products based on parameters for
    all three. In Figure [8-5](#480547_2_En_8_Chapter.xhtml#Fig5), you can see that
    the adaptive join type listed under the properties is the hash match. Figure [8-6](#480547_2_En_8_Chapter.xhtml#Fig6)
    shows a partial screenshot from the live query statistics for the execution of
    Listing [8-6](#480547_2_En_8_Chapter.xhtml#PC6).


    ![](images/480547_2_En_8_Chapter/480547_2_En_8_Fig6_HTML.jpg)


    A flow diagram presents live query statistics. It depicts clustered index scan,
    index scan, clustered index seek, clustered index scan, and adaptive join. Clustered
    Index scan has 8.019 seconds, and 802820 of 264931\. Adaptive join has 802820
    of 87427.


    Figure 8-6


    Live query statistics from Listing [8-6](#480547_2_En_8_Chapter.xhtml#PC6)


    You can see the total number of records processed by each step as the time spent
    on some of the steps. Looking at the live query statistics, you can see the percentage
    of records returned vs. the estimate. Figure [8-6](#480547_2_En_8_Chapter.xhtml#Fig6)
    shows the live query statistics in progress. In this case, some records like the
    clustered index scan on the table `CustomerOrder` or the index scan on the table
    `OrderDetail` appear to be estimated correctly. It is also possible that other
    operators may not be estimated correctly. While these variances may cause performance
    issues, the reason I am pointing these values out is to compare them to the query
    execution after you change the value passed to the `@CustomerID, @CustomerOrderID`,
    and `@ProductID` variables.


    If you limit the same query to one customer, order, and product, you may write
    T-SQL like what is shown in Listing [8-8](#480547_2_En_8_Chapter.xhtml#PC8).


    ```

    DECLARE @CustomerID         INT = 1;

    DECLARE @CustomerOrderID    INT = 401508;

    DECLARE @ProductID          INT = 1;

    SELECT cus.CustomerID,

    cus.FirstName,

    cus.LastName,

    ord.CustomerOrderID,

    ord.OrderNumber,

    prd.ProductName,

    dtl.QuantitySold,

    dtl.ProductPrice

    FROM dbo.Customer cus

    INNER JOIN dbo.CustomerOrder ord

    ON cus.CustomerID = ord.CustomerID

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    INNER JOIN dbo.Product prd

    ON dtl.ProductID = prd.ProductID

    WHERE (cus.CustomerID = @CustomerID OR @CustomerID IS NULL)

    AND (ord.CustomerOrderID = @CustomerOrderID OR @CustomerOrderID IS NULL)

    AND (dtl.ProductID = @ProductID OR @ProductID IS NULL)

    AND prd.IsActive = 1

    AND EXISTS

    (

    SELECT *

    FROM dbo.ProductPriceHistory hist

    WHERE prd.ProductID = hist.ProductID

    GROUP BY hist.ProductID

    HAVING COUNT(*) > 3

    )

    ORDER BY

    cus.CustomerID,

    CASE WHEN

    (

    cus.CustomerID = @CustomerID

    AND ord.CustomerOrderID = @CustomerOrderID

    )

    THEN 0

    ELSE 1

    END,

    ord.CustomerOrderID DESC,

    cus.LastName ASC;

    Listing 8-8

    Query for Recipe Information for a Specific Recipe

    ```


    The differences between Listing [8-6](#480547_2_En_8_Chapter.xhtml#PC6) and Listing
    [8-8](#480547_2_En_8_Chapter.xhtml#PC8) are the first three lines. In Listing
    [8-6](#480547_2_En_8_Chapter.xhtml#PC6), the `@CustomerID, @CustomerOrderID`,
    and `@ProductID` is set to -1 so that all recipes are returned. In Listing [8-8](#480547_2_En_8_Chapter.xhtml#PC8),
    the @`CustomerID, @CustomerOrderID`, and `@ProductID` are each set to a specific
    value. You can execute this query and look at the execution plan to see if SQL
    Server will handle this query execution differently now that there may be only
    one recipe affected. In Figure [8-7](#480547_2_En_8_Chapter.xhtml#Fig7), you can
    see the properties for the adaptive join when executing Listing [8-8](#480547_2_En_8_Chapter.xhtml#PC8).


    ![](images/480547_2_En_8_Chapter/480547_2_En_8_Fig7_HTML.png)


    A screenshot of the adaptive join presents a list. It depicts 22 properties. There
    are codes at the bottom of the list under the titles, output list, hash keys probe,
    and outer references.


    Figure 8-7


    Adaptive join properties from Listing [8-8](#480547_2_En_8_Chapter.xhtml#PC8)


    The actual join type shown in Figure [8-7](#480547_2_En_8_Chapter.xhtml#Fig7)
    is a nested loop. The difference between the adaptive join types in Figures [8-5](#480547_2_En_8_Chapter.xhtml#Fig5)
    and [8-7](#480547_2_En_8_Chapter.xhtml#Fig7) shows how the adaptive join can help
    optimize queries that previously were affected by parameter sniffing. The details
    of the live query statistics from Listing [8-8](#480547_2_En_8_Chapter.xhtml#PC8)
    are shown in Figure [8-8](#480547_2_En_8_Chapter.xhtml#Fig8).


    ![](images/480547_2_En_8_Chapter/480547_2_En_8_Fig8_HTML.jpg)


    A flow diagram presents live query statistics. It depicts clustered index scan,
    index scan, clustered index seek, clustered index scan, and adaptive join. Clustered
    Index scan has 1 of 264931\. Index scan has 0 of 13246\. Clustered index seek
    has 0 of 264931\. Adaptive join has 0 of 87427.


    Figure 8-8


    Live query statistics from Listing [8-8](#480547_2_En_8_Chapter.xhtml#PC8)'
  trans: "### 行存储上的批处理模式\n\n为批处理操作提供内存授权，是批处理操作发展的下一阶段的必要基础。批处理操作是指 SQL Server 可以一次性对一组记录执行一个操作，而不是一次只处理一条记录。当批处理模式最初在\
    \ SQL Server 2012 中引入时，它仅可用于 `列存储索引`。从 SQL Server 2019 开始，批处理操作也被允许用于一组行。在这种情况下，一组行也被称为\
    \ `行存储`。为批处理操作提供内存授权，使得堆和索引也能使用批处理模式，这为额外的查询优化类型奠定了基础。\n\n### 自适应连接\n\nSQL Server\
    \ 使用统计信息来帮助估计最佳执行计划。然而，数据在表中的分布并不总是均匀的。它选择的计划通常是针对某些列值的最佳计划。问题在于，对于其他列值，该计划可能表现不佳。在\
    \ SQL Server 2019 中，由于新功能的引入，发生这种情况的可能性降低了。该功能允许 SQL Server 根据查询的当前执行情况，在 `嵌套循环`\
    \ 和 `哈希匹配` 这两种物理连接运算符之间进行选择。这项新功能被称为 `自适应连接`。\n\n`自适应连接` 最初在 SQL Server 2017 中引入。然而，`自适应连接`\
    \ 只能作为 `批处理模式操作` 的一部分使用。在 SQL Server 2017 中，`批处理模式操作` 仅支持 `列存储索引`。既然 `批处理模式操作`\
    \ 现在也支持堆和 B 树索引，那么 `自适应连接` 也可以在这些数据库对象上使用。执行清单 8-6 中的查询会生成一个包含 `自适应连接` 的执行计划。当你看到执行计划时，你会看到一个\
    \ `自适应连接` 的物理运算符。在图形执行计划中，你无法辨别幕后使用的是什么类型的运算符。但是，如果你将鼠标悬停在执行计划中的 `自适应连接` 上，你会看到一个属性列表，如图\
    \ 8-5 所示。\n\n![](img/480547_2_En_8_Fig5_HTML.png)\n\n自适应连接属性的截图呈现了一个列表。它描绘了 22\
    \ 个属性。列表底部有代码，位于“输出列表”、“探测哈希键”和“外部引用”标题下。\n\n图 8-5\n\n清单 8-6 中的自适应连接属性\n\n清单 8-6\
    \ 中的原始查询是根据所有三个参数返回有关客户、订单和产品的信息。在图 8-5 中，你可以看到属性下列出的 `自适应连接` 类型是 `哈希匹配`。图 8-6\
    \ 显示了执行清单 8-6 时实时查询统计信息的部分截图。\n\n![](img/480547_2_En_8_Fig6_HTML.jpg)\n\n一个流程图展示了实时查询统计信息。它描绘了聚集索引扫描、索引扫描、聚集索引查找、聚集索引扫描和自适应连接。聚集索引扫描耗时\
    \ 8.019 秒，处理了 264931 行中的 802820 行（注：此处原文数据可能存在笔误或特殊上下文）。自适应连接处理了 87427 行中的 802820\
    \ 行（注：同上）。\n\n图 8-6\n\n清单 8-6 的实时查询统计信息\n\n你可以看到每个步骤处理的记录总数以及部分步骤所花费的时间。通过查看实时查询统计信息，你可以看到返回的记录数与估计数的百分比。图\
    \ 8-6 显示了正在进行的实时查询统计信息。在这种情况下，对表 `CustomerOrder` 的 `聚集索引扫描` 或对表 `OrderDetail`\
    \ 的 `索引扫描` 等步骤似乎估计正确。其他运算符也可能未被正确估计。虽然这些差异可能导致性能问题，但我指出这些值的原因是为了与你在更改传递给 `@CustomerID`、`@CustomerOrderID`\
    \ 和 `@ProductID` 变量的值之后的查询执行情况进行比较。\n\n如果将相同的查询限制为一个客户、一个订单和一个产品，你可能会编写如清单 8-8\
    \ 所示的 `T-SQL`。\n\n```sql\nDECLARE @CustomerID         INT = 1;\nDECLARE @CustomerOrderID\
    \    INT = 401508;\nDECLARE @ProductID          INT = 1;\nSELECT cus.CustomerID,\n\
    \       cus.FirstName,\n       cus.LastName,\n       ord.CustomerOrderID,\n  \
    \     ord.OrderNumber,\n       prd.ProductName,\n       dtl.QuantitySold,\n  \
    \     dtl.ProductPrice\nFROM dbo.Customer cus\nINNER JOIN dbo.CustomerOrder ord\n\
    \    ON cus.CustomerID = ord.CustomerID\nINNER JOIN dbo.OrderDetail dtl\n    ON\
    \ ord.CustomerOrderID = dtl.CustomerOrderID\nINNER JOIN dbo.Product prd\n    ON\
    \ dtl.ProductID = prd.ProductID\nWHERE (cus.CustomerID = @CustomerID OR @CustomerID\
    \ IS NULL)\n    AND (ord.CustomerOrderID = @CustomerOrderID OR @CustomerOrderID\
    \ IS NULL)\n    AND (dtl.ProductID = @ProductID OR @ProductID IS NULL)\n    AND\
    \ prd.IsActive = 1\n    AND EXISTS\n        (\n            SELECT *\n        \
    \    FROM dbo.ProductPriceHistory hist\n            WHERE prd.ProductID = hist.ProductID\n\
    \            GROUP BY hist.ProductID\n            HAVING COUNT(*) > 3\n      \
    \  )\nORDER BY\n    cus.CustomerID,\n    CASE WHEN\n        (\n            cus.CustomerID\
    \ = @CustomerID\n            AND ord.CustomerOrderID = @CustomerOrderID\n    \
    \    )\n        THEN 0\n        ELSE 1\n    END,\n    ord.CustomerOrderID DESC,\n\
    \    cus.LastName ASC;\n```\n清单 8-8\n针对特定配方信息的查询\n\n清单 8-6 和清单 8-8 之间的区别在于前三行。在清单\
    \ 8-6 中，`@CustomerID`、`@CustomerOrderID` 和 `@ProductID` 被设置为 -1，以便返回所有配方。在清单 8-8\
    \ 中，`@CustomerID`、`@CustomerOrderID` 和 `@ProductID` 各被设置为一个特定值。你可以执行此查询并查看执行计划，以了解\
    \ SQL Server 现在是否会以不同方式处理此查询执行，因为现在可能只影响一个配方。在图 8-7 中，你可以看到执行清单 8-8 时 `自适应连接`\
    \ 的属性。\n\n![](img/480547_2_En_8_Fig7_HTML.png)\n\n自适应连接属性的截图呈现了一个列表。它描绘了 22 个属性。列表底部有代码，位于“输出列表”、“探测哈希键”和“外部引用”标题下。\n\
    \n图 8-7\n\n清单 8-8 中的自适应连接属性\n\n图 8-7 中显示的实际连接类型是一个 `嵌套循环`。图 8-5 和 8-7 中 `自适应连接`\
    \ 类型的差异，展示了 `自适应连接` 如何帮助优化那些先前受参数嗅探影响的查询。清单 8-8 的实时查询统计信息的详细信息如图 8-8 所示。\n\n![](img/480547_2_En_8_Fig8_HTML.jpg)\n\
    \n一个流程图展示了实时查询统计信息。它描绘了聚集索引扫描、索引扫描、聚集索引查找、聚集索引扫描和自适应连接。聚集索引扫描处理了 264931 行中的 1\
    \ 行。索引扫描处理了 13246 行中的 0 行。聚集索引查找处理了 264931 行中的 0 行。自适应连接处理了 87427 行中的 0 行。\n\n\
    图 8-8\n\n清单 8-8 的实时查询统计信息"
- fmt: 'In Figure [8-8](#480547_2_En_8_Chapter.xhtml#Fig8), the same physical operators
    are present as in Figure [8-6](#480547_2_En_8_Chapter.xhtml#Fig6). However, the
    actual number of rows processed vs. the estimated number of rows is significantly
    different. In the case of Figure [8-8](#480547_2_En_8_Chapter.xhtml#Fig8), almost
    all the steps are severely overestimated. However, the query from Listing [8-8](#480547_2_En_8_Chapter.xhtml#PC8)
    will still benefit from the performance due to the use of the adaptive join.


    While Adaptive Joins can be beneficial when a query could benefit from using either
    a Hash Join or Nested Loop Join depending on the parameters provided, there are
    other queries where unequal data distribution within the table may affect query
    performance. SQL Server 2022 has a new feature for these types of scenarios called
    Parameter Sensitive Plan (PSP) optimization. When SQL Server attempts to create
    an execution plan, it will evaluate the tables associated with parameters to determine
    if there are uneven distributions. If SQL Server finds any, PSP allows SQL Server
    to create up to three execution plans to accommodate the different data distributions.
    For instance, if you executed the stored procedure `dbo.GetCustomerAndOrderNumberByProductID`
    for `ProductID` 1, the data distribution is different than if the stores procedure
    is executed for `ProductID` 4. With PSP, SQL Server can save an execution plan
    in the plan cache which is different for `ProductID` 1 than `ProductID` 4. One
    way to investigate these different execution plans is to use Query Store as discussed
    earlier in this chapter.


    There are many ways that you can work toward optimizing for T-SQL code. Unless
    you are testing a new query, often the first step is to identify what T-SQL code
    needs to be optimized. After determining what query needs optimization, you may
    want to analyze execution plans to help determine if there is a step that stands
    out as needing optimization. You may also want to analyze information associated
    with the query such as average logical reads or average execution time. Combining
    this information may help you identify what can be tuned to improve performance.


    In addition, there are features in SQL Server that can help automatically make
    your T-SQL code perform better. This includes allowing SQL Server to analyze your
    new execution plans and confirm that they are performing better than the previous
    execution plan. If the previous execution plan is expected to perform better,
    SQL Server can make sure that plan is automatically selected. If you are using
    Azure SQL Database, you have a similar option available when it comes to managing
    indexes. The use of adaptive joins allows SQL Server to make your execution plans
    more flexible. When an adaptive join is part of an execution plan, SQL Server
    can decide the correct physical operator to use depending on the values passed
    for that specific query execution. Whether you are manually optimizing your T-SQL
    code or letting SQL Server determine how to improve query execution, you have
    several tools available that should make your T-SQL code perform better.


    # 9. Coding Standards


    One of the advantages of standardizing a codebase is that it will increase our
    ability to read and understand that code no matter the author. You can also think
    of standardization to get everyone to follow the rules not only in terms of formatting
    but also in what elements of the code are expected or are not allowed for your
    organization. Another benefit of standardization when naming database objects
    is that it can help increase the speed with which you and your team can quickly
    find a specific part of T-SQL code that you are trying to debug.


    In this chapter, I will discuss various advantages to implementing coding standards.
    I will also go over what types of factors you should consider when defining standards.
    When developing them, you also want to determine how to implement those coding
    standards. I will cover the basic process needed to institute these standards.'
