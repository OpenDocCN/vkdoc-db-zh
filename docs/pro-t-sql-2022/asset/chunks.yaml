  trans: '

    ## 选择必要数据


    SQL Server 可以存储大量数据，也能检索海量数据。在许多应用场景中，应用程序都需要进行数据检索。初次学习数据库及其关联表时，我们往往很容易会选择查询表中的所有列。尽管这是返回数据最简单的方法，但通常并非最佳选择。


    首先是使用星号（`*`）来选择所有行的语法。这种方法的问题在于，如果底层对象的列发生变化，代码可能无法按预期工作。更糟糕的是，代码可能不会报错，用户也就无从知晓他们正在获取错误的数据。


    第二个更常见的问题是：当你取回所有列时，会给 SQL Server 带来相当大的额外负担。SQL Server 不仅需要返回所有行的所有数据，而且很可能无法利用任何索引来返回这些数据。这就好比每次你想学习某个特定章节时，却要通读整本书。你确实能学到你需要的内容，但也花费了大量时间去阅读那些与你当前需求无关、很可能会被忽略的内容。


    ## 可搜索性


    我们希望 SQL Server 能够轻松地搜索数据库以找到你需要访问的信息。你可以通过一些方式来编写 `T-SQL`，从而让 `SQL Server` 能够利用索引快速找到必要的数据。然而，也存在其他编写
    `T-SQL` 的方法，它们能产生相同的结果，但可能耗时更长，并且需要 `SQL Server` 扫描更多的数据。这两种场景的区别在于，第一种场景确保你的
    `T-SQL` 是“可搜索的”，而第二种场景则是“不可搜索的”。这种情况通常发生在 `T-SQL` 语句的 `WHERE` 子句中。清单 [9-1] 展示了一个查询，用于查找所有在
    2022 年 10 月创建的客户。


    ```sql

    SELECT FirstName, LastName, Country

    FROM dbo.Customer

    WHERE DATEPART(MM, DateCreated) = 10

    AND DATEPART(YY, DateCreated) = 2022;

    ```


    清单 9-1

    使用非可搜索条件的查询


    你可以看到，在 `DateCreated` 列上使用了 `DATEPART` 函数来确定每条记录创建的月份和年份。为了让 `SQL Server` 确定哪些记录是在
    2022 年 10 月创建的，它需要检查表中的每一条记录。你可以从图 [9-1] 的执行计划中的索引扫描操作看到确实如此。


    ![](img/480547_2_En_9_Fig1_HTML.jpg)


    图 9-1

    来自非可搜索条件的执行计划


    当执行计划如此简单时，有时很难判断这些查询的实际性能如何。一个更好的方法是查看与此执行计划关联的属性。图 [9-2] 中包含大量信息，但让我们重点关注 `Number
    of Rows Read`（读取行数）。


    ![](img/480547_2_En_9_Fig2_HTML.jpg)


    图 9-2

    来自非可搜索条件的索引扫描的属性


    清单 [9-1] 中索引扫描读取的行数是 401,408。为了更好地判断此查询性能是否良好，让我们编写一个使用可搜索值的查询。在清单 [9-2] 中，代码仍然是查询
    `dbo.Customer` 表中 2022 年 10 月创建的记录，但现在它使用大于等于和小于运算符来指定一个确切的日期范围。


    ```sql

    DECLARE @StartDate DATETIME2(2) = ''2022-09-01'';

    DECLARE @EndDate DATETIME2(6) = DATEADD(mm, 1, @StartDate)

    SELECT FirstName, LastName, Country, DateCreated

    FROM dbo.Customer

    WHERE DateCreated >= @StartDate

    AND DateCreated < @EndDate;

    ```


    清单 9-2

    使用可搜索条件的查询


    虽然这样写可能看起来不那么简洁或更难阅读，但其重要性在于，我们编写了一个 `SQL Server` 可以快速确定哪些记录符合查询条件的查询。图 [9-3]
    展示了清单 [9-2] 查询的执行计划。


    ![](img/480547_2_En_9_Fig3_HTML.jpg)


    图 9-3

    来自可搜索条件的执行计划

