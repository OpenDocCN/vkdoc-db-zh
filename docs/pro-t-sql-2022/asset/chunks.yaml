  raw: '### Types of Deployment


    Part of determining your deployment method includes understanding the current
    process you use to deploy your database code. Right now, your business may have
    scripts that are manually deployed. Depending on your organizational structure,
    you may have an environment where those scripts can be deployed at any point in
    time to a specific environment or you may have conditions about what days of the
    week those T-SQL scripts can be deployed. Knowing who is developing database code,
    how changes are coded and managed, and the frequency of your deployments can help
    you determine whether a migration or state-based approach is best for you.


    If there are certain days you can deploy to various environments, this is known
    as a *gated deployment*. You may be using database projects in a version control
    system. In Chapter [11](#480547_2_En_11_Chapter.xhtml), the topic of branching
    and merging was covered. Your company may only use one branch for your database
    project. All development work by all individuals is done in the same place. On
    the other hand, your company may utilize *branching*. This is where your developers
    use a copy of the main code base and make changes to that copy. Some companies
    may deploy directly from a branch. This can be particularly helpful if you are
    not writing your database code to be able to be deployed at any point in time.
    Other companies, particularly ones that write code to be deployed at any point
    in time, may choose to have all branches merged back to master or the main branch
    once the work is complete. In this case, all deployments are from the main branch.


    Sometimes how teams manage their workflows is determined by the frequency of their
    deployments. For many companies, the goal is to be able to deploy frequently.
    However, this does not mean that every company is ready for that frequency of
    deployments. For the development teams that write code in a more Kanban style,
    there may be no pattern for when code is deployed to Production. Other teams may
    have a set cadence or sprint cycle for when they deploy their code. These sprint
    cycles can range from weeks to months. If your company is still in the process
    of determining how often to release code, I caution against longer sprint cycles
    as it often means more changes are being deployed at once. This increases the
    risk of having issues in your deployment.


    You also want to understand the volume of database changes happening on an average
    deployment. You may find that on average there are not that many database changes
    getting deployed every sprint. If this is the case, make sure you do not end up
    having a deployment with a significant number of database changes. When there
    are multiple changes happening to the database during a single deployment, there
    is not only a greater risk of having a bug, but there is also the possibility
    depending on your deployment method that one change to T-SQL code may overwrite
    another.


    Before getting into two of the main methods of deploying database code, there
    is one additional factor you should consider. While we all want every database
    deployment to go out and work as expected, there may come a time where you need
    to undo or roll back one or more database changes from a deployment. If you do
    not have a rollback strategy in place, now is a good time to start considering
    a solid rollback strategy. When a rollback is needed, it’s a bad time to start
    figuring out how to quickly and effectively roll back your T-SQL code. Having
    a method to do this repeatedly can significantly help increase the confidence
    you have in your deployments. Your company may use rollback scripts to streamline
    when you need to revert to the previous version of database code. If you are using
    version control, you have the option to revert to a different version of your
    database code. To build upon this, if you are using continuous integration, you
    may have a prepackaged version of the previous database code that can be deployed
    against your Production database in a manner of minutes.


    #### Migration- Based Deployments


    This ultimately leads us to consider the deployment methods commonly used for
    database deployments. One method consists of bundling all the scripts that will
    be deployed together. This is considered a *migration-based approach*; another
    option is to take everything that exists in source control and treat it as the
    source of truth for your database. When using this type of method, whatever database
    you are deploying to will be overwritten to match the database objects that exist
    in source control. This is commonly called a *state-based deployment*.


    Now that you know what the migration-based deployment method is, you can start
    determining if it is the best method for your deployments. One of the main benefits
    of using the migration-based approach is that you can control exactly what is
    deployed to your database. This method of deployment often involves having all
    the scripts that will be deployed saved in a single location, and these scripts
    are usually named in a way that allows them to be deployed in a specific order.
    This can make your deployments easy to manage. You can quickly find at the folder
    where the scripts are saved and know exactly what is getting deployed.


    If you use this deployment method, I recommend that you have a separate folder
    that keeps track of the rollback scripts that need to be deployed and the order
    in which these rollback scripts should be deployed. This will help if you have
    to roll back on deployment night and it should help you quickly find the code
    that needs to be rolled back if you need to roll back several deployments at once.
    There are some limitations with the migration-based deployment method. One of
    the main challenges is if you need to roll back a specific piece of code. Depending
    on how your source control is managed, it may not be as simple as viewing the
    history of that database object and restoring a previous version from source control.


    A migration-based deployment method can be set up manually. You and the rest of
    your team can write your T-SQL code files and save them in numerical order. This
    really consists of creating a script in SQL Server Management Studio and saving
    the file with a specific naming convention. This naming convention includes specifying
    the deployment order such as prefixing the filename with the step number to indicate
    the deployment order.


    You may create a file named `001_20230620_DB232_ActiveProduct.sql`. However, you
    may then receive a request to make additional modifications to the same stored
    procedure. In this case, you need to remove the date columns from the stored procedure
    `dbo.GetProduct`. In Listing [12-1](#480547_2_En_12_Chapter.xhtml#PC1), you can
    find the T-SQL code.


    ```

    PRINT N''Altering [dbo].[GetProduct]...'';

    GO

    /*-------------------------------------------------------------*\

    Name:             dbo.GetProduct

    Author:           Elizabeth Noble

    Created Date:     2022-10-30

    Description:      Get a list of all products in the databases

    Updated Date:     2023-05-23

    Description:      Add feature flag. If feature flag is enabled, only

    Show active products. Otherwise, show all products.

    Updated Date:     2023-06-20

    Description:      Remove the feature flag. Leave only the new logic.

    The stored procedure now only returns active products.

    Updated Date:     2023-06-21

    Description:      Remove dates.

    The stored procedure now only returns active products.

    Sample Usage:

    EXECUTE dbo.GetProduct;

    \*-------------------------------------------------------------*/

    CREATE OR ALTER PROCEDURE dbo.GetProduct

    AS

    SELECT

    ProductID,

    ProductName,

    ProductPrice,

    IsActive

    FROM dbo.Product

    WHERE IsActive = 1;

    Listing 12-1

    Sample Script for Migration-Based Deployment

    ```'
