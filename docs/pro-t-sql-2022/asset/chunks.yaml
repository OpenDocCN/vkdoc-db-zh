  trans: '

    当与众多开发者或不同的开发团队协作时，采用基于状态的部署方法可能带来显著优势。这源于整个数据库项目中可能发生的频繁变更。虽然基于状态的迁移适用于有少量或大量变更的数据库项目，但这种方法在管理频繁变更方面表现更佳。这是因为，使用迁移方法时，众多开发者的大量变更意味着部署流程需要更多步骤；而在基于状态的方法下，需要更改的文件则更少。采用基于状态的方法，你的部署过程会更快，也更不容易因某人输错文件名而导致代码部署出现问题。使用基于状态的方法，你可以确信，在部署完成后，源位置的任何变更都将同步到目标位置。这也意味着，如果生产环境中有许多未纳入源代码控制的变更，这些变更将在下一次部署时被覆盖。如果你的团队执行频繁更新（尤其是全天持续进行），你可能会发现基于状态的方法部署耗时更少。至少，这通常是因为在频繁部署的情况下，基于状态方法所需部署的变更通常更少。


    使用基于状态方法最大的挑战之一，在于如何部署数据操作变更。这些数据变更可能涉及管理配置表、管理功能开关、添加默认值，或纠正因先前缺陷而受影响的数据。基于状态的方法非常适合比较整个数据库架构。然而，在更改数据库内部数据方面存在局限性。在大多数情况下，这是通过在部署后可能执行的手动脚本来完成的。如果你使用源代码控制，可以通过
    `预部署` 和 `后部署` 脚本来管理这些变更。如果你使用源代码控制，那么 `预部署` 和 `后部署` 脚本各只有一个。这可能会使数据变更的过程变得有些复杂，因为你需要编写
    `T-SQL` 代码，使其能够运行一次后便被忽略，或者你需要进入源代码控制并频繁更改你的 `预部署` 或 `后部署` 脚本。


    ### 开发风格


    数据库开发团队有几种不同的方式来管理工作流程。所采用的方法论会影响应该选择哪种类型的部署方法。


    #### 看板


    我第一份需要持续编写数据库代码的工作没有严格的时间表。目标是尽快做出更改并部署。这通常是因为我在创建 SQL Server 报表服务 (SSRS) 报告。通常，这种类型的开发可以被称为看板。看板指的是一种管理变更请求的方法。其高层概念是存在一个持续的工作队列。请求进入待办事项列表，然后逐个处理，直到完成。


    #### Scrum


    Scrum 代码开发方法比看板更具结构性。Scrum 包括几个步骤，例如确保工作项定义明确、估算完成特定工作项所需时间，以及确定工作项何时完成。为了确定代码预期何时完成并可部署，组织会确定他们打算以多高的频率部署代码。这段时间长度被称为
    `Sprint 或冲刺周期`。每个 Sprint 预计包含可完成的固定数量工作。利用估算值，工作项根据其优先级被添加到 Sprint 中，直到估算的工作量与
    Sprint 的预期工作量相匹配。这是一个高层定义，并非关于如何为你的数据库团队实施 Scrum 或看板的深度指南。对于这些部署，Sprint 中的所有用户故事都应作为该
    Sprint 的一部分部署。虽然有一些方法可以在不改变功能的情况下部署 Sprint 内的所有内容，但我们的代码通常并非那样编写。


    如果你的业务正在尝试做到能在任何时间点部署变更，请考虑改变你开发数据库代码的方式。这种改变可能涉及你对解决方案的思考方式以及你编写代码的方式。使用功能开关等概念将会帮助你。本质上，你希望以这样一种方式编写你的
    `T-SQL` 代码：它可以在任何时间点部署，而你的应用程序不会崩溃。然而，达到这一点需要几个基本步骤。首先是了解你公司如何开发其 `T-SQL` 代码。如果你有许多开发者为单个应用程序编写
    `T-SQL` 代码，与每个开发者负责不同应用程序的情况相比，你可能需要以不同方式处理部署。这将帮助你确定哪种部署方法最适合你。

