    运行上述查询后，你会得到 14,720 条返回结果。这让你知道你的分区函数正按预期工作。如果返回零条结果，你可能无法确定日期和时间为 2022 年 8 月
    1 日 12:00:00:00.000 的记录最终会落在哪个分区。然而，由于你的分区按日期和时间分组显示了正确的计数，你知道它正在按预期工作。


    之前，你创建了一个空的已分区表。一旦对表进行了分区，你就准备好管理该表随时间推移的增长了。这种管理数据增长的过程不是一次性的，而是未来需要持续维护的事情。对于此表，你需要在未来添加分区。此过程将类似于代码清单
    16-5 所示的过程。向现有分区表添加分区并不是你唯一可能需要对表进行分区的时候。你也可能发现自己处于一种情况：最初并未打算对表进行分区，但由于各种原因，你现在需要对其进行分区。在代码清单
    16-10 中，你可以参考将非分区表更改为分区表所需的 T-SQL 代码。


    ```sql

    ALTER TABLE dbo.CustomerOrderHistory

    DROP CONSTRAINT PK_CustomerOrderHistory_CustomerOrderHistoryID

    WITH (MOVE TO CustomerOrderHistoryRange(DateCreated));

    ALTER TABLE dbo.CustomerOrderHistory

    ADD CONSTRAINT PK_CustomerOrderHistory_CustomerOrderHistoryID

    PRIMARY KEY NONCLUSTERED (CustomerOrderHistoryID, DateCreated);

    CREATE CLUSTERED INDEX IX_CustomerOrderHistory_DateCreated

    ON dbo.CustomerOrderHistory (DateCreated)

    ON CustomerOrderHistoryRange (DateCreated);

    ```


    代码清单 16-10

    向现有表添加分区


    在实现分区之前，表中的所有数据都按主键排序。在本例中，主键是 `CustomerOrderHistoryID`。然而，一旦对表进行了分区，你希望表按创建日期进行分段。这需要更改表中数据的存储方式。为了让
    SQL Server 更新数据的存储方式，你需要删除原始的聚集键。如果主键是聚集的，那么你也需要删除主键。此时，你可以创建一个新的非聚集主键以及创建日期。将创建日期作为聚集索引键上的分区列的一部分是分区表所必需的。完成此操作后，你可以在创建日期上创建一个聚集索引。此索引将在分区方案上创建。当索引在分区方案上创建时，它被称为*对齐索引*。


    **注意**


    请注意，向分区表添加非对齐主键将阻碍你轻松地将分区移入和移出该表。这个概念被称为*分区切换*，将在第 17 章中详细讨论。


    如果你现有非分区表中的所有数据都存在于新表的一个分区内，你可以选择轻松地将数据从非分区表移动到分区表。代码清单 16-11 显示了完成此任务所需的 T-SQL
    代码。


    ```sql

    ALTER TABLE dbo.CustomerOrderHistory

    WITH CHECK ADD CONSTRAINT CK_CustomerOrderHistory_MinDateCreated

    CHECK

    (

    DateCreated IS NOT NULL

    AND DateCreated >= ''2021-08-01''

    );

    ALTER TABLE dbo.CustomerOrderHistory

    WITH CHECK ADD CONSTRAINT CK_CustomerOrderHistor_MaxDateCreated

    CHECK

    (

    DateCreated IS NOT NULL

    AND DateCreated < ''2023-01-01''

    );

    ALTER TABLE dbo.CustomerOrderHistory SWITCH PARTITION 1

    TO dbo.CustomerOrderHistoryArchive;

    ```


    代码清单 16-11

    将分区表中的所有数据切换到非分区表


    要从非分区表切换数据，这些表需要使用相同的文件组，并且需要验证非分区表中的数据是否可以存在于你将在分区表上使用的分区内。你首先需要在分区列上创建与分区范围相匹配的约束。一旦创建了约束，你就可以将非分区表中的所有数据切换到分区表上指定的分区中。


    如果你有两个分区表，你可能想将一个分区从一个表移动到另一个表。这个过程可以称为分区切换。实现此操作所需的 T-SQL 代码比代码清单 16-11 中的代码简单。代码清单
    16-12 显示了将分区从当前表切换到新的存档表的数据库代码。


    ```sql

    ALTER TABLE dbo.CustomerOrderHistory SWITCH

    PARTITION 1

    TO dbo.CustomerOrderHistoryArchive

    PARTITION 1;

    ```


    代码清单 16-12

    从分区表切换到另一个分区表


    在此示例中，你将 2021 年第四季度的记录从 `dbo.CustomerOrderHistory` 表移动到 `dbo.CustomerOrderHistoryArchive`
    表。为了将一个表中的分区切换到另一个不同分区表的分区中，你必须为每个表指定分区。目标表中的分区也必须为空，此 T-SQL 代码才能执行。这种方法是一种特别直接且简单的方法，用于管理数据随时间推移的增长。如果你创建一个特定的数据管理计划，并将数据从你的主
    OLTP 表移动到存档表，你就可以保留所有数据，同时让你的高事务性表仅保留与业务最相关的数据。


