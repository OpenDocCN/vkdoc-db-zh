  trans: '## 手动运行单元测试


    一张截图高亮显示了测试选项下的运行测试选项。主菜单包括测试、分析、工具、扩展、窗口和帮助等选项。


    **图 11-7**


    你正在对单元测试使用测试驱动设计，并且在更改原始存储过程之前，你正在测试这个单元测试。在此场景中，你预期单元测试会失败。你可以在图 11-8 中看到运行此单元测试的结果。


    ![](img/480547_2_En_11_Fig8_HTML.jpg)


    测试资源管理器窗口的截图。它显示测试运行已完成两个测试，1 个通过，1 个失败，0 个跳过，耗时 7.4 秒。


    **图 11-8**


    原始存储过程仍返回非活跃客户。这导致单元测试失败。一旦你使用清单 11-3 中的 T-SQL 代码更新存储过程 `dbo.GetCustomer` 并重复单元测试，你将得到图
    11-9 中的结果。


    ![](img/480547_2_En_11_Fig9_HTML.jpg)


    测试资源管理器窗口的截图。它显示测试运行已完成两个测试，2 个通过，0 个失败，0 个跳过，耗时 6.6 秒。


    **图 11-9**


    既然单元测试已成功运行，你可以确信你的新 T-SQL 代码按预期工作。数据库项目还有其他可用的单元测试选项。我建议你研究几种替代方案，并与同事合作确定哪种方法最适合你的环境。


    ## 集成测试


    虽然知道单个数据库代码按预期工作是好的，但大多数 T-SQL 代码并非孤立存在。关系设计的本质意味着数据库中的项目是相互关联的。我们通常考虑表之间的关系。然而，存储过程访问的是表中存在的数据。如果你想验证数据的插入，可以运行单元测试。这将确认你期望插入的数据确实已被插入。


    当有多种方式访问数据库中的相同数据时，可能会出现问题。通常，这些查询是在不同时期编写的。这可能导致查询中的逻辑略有不同。我还见过这样的情况：公司内不同业务部门对相同数据有不同的计算方法。如果一个业务部门的计算被另一个业务部门重用，可能会导致看似不准确的结果。


    这就提出了一个问题：如何在多个不同的数据库对象中保持你的 T-SQL 代码和查询结果的一致性。这就是集成测试可以发挥作用的地方。`集成测试` 这个术语用于表示旨在与多个代码片段协同工作的测试。如果你正在使用应用程序插入数据，并希望验证数据是否被正确插入，这可以被视为集成测试。你正在测试应用程序连接到
    SQL Server 的能力以及将数据插入数据库的 T-SQL 代码。


    这只是集成测试可以应用的一个场景。我发现自己经常遇到的情况是，处理两个旨在返回大致相同信息的存储过程。有时，对底层表或其中一个存储过程中的代码进行更改，可能会导致这两个存储过程返回不同的结果。不幸的是，这些结果差异通常直到
    T-SQL 代码部署后很久才会被发现。这会导致对应用程序的整体信心丧失。


    虽然理想情况下这些相互关联的存储过程应有文档记录，或者最好重构为单个存储过程，但这并非总是可行。拥有多个相似代码版本是有成本的，但让多个流程依赖同一段代码也有成本。在本章的剩余部分，我们将假设无法重写
    T-SQL 代码来消除这种依赖关系。


    就像测试数据库代码的单元测试一样，你可以通过使用 T-SQL 查询手动开始集成测试。你集成的最关键因素是理解你的环境如何协同工作。有时这是偶然发现的，比如当某些东西崩溃时。其他时候，你可能是一个主题专家，已经了解这些交互。无论哪种方式，为了开始集成测试，你首先至少需要有两个测试对象。


    你可以从测试数据的插入以及同一张表的数据查询开始。你也可以使用集成测试来比较两个查询的结果。如果你有一个返回所有值的查询和另一个搜索特定值的查询，就可能发生这种情况。虽然这两个存储过程不会匹配每条记录，但对于特定记录它们可能有匹配的结果。这种类型的集成测试将确认返回列中的值彼此一致。'
- fmt: 'If you start making changes to a stored procedure that selects data, you may
    want to test the insert of the data along with the select for that same data.
    You may be updating the stored procedure `dbo.GetCustomer` to only return active
    customers. You can unit test this stored procedure by creating a unit test for
    inactive customers and a unit test for active customers. You can also use integration
    testing to confirm that this stored procedure will still return expected results
    after creating a new customer. This type of testing may be considered trivial
    now, but as the application grows and matures, they may become increasingly useful.
    Often a business needs answers faster than they can be provided. This sometimes
    causes database objects to be used in ways they were not originally intended.


    This integration test consists of inserting a new customer into the `dbo.Customer`
    table. After inserting the record, you execute the `dbo.GetCustomerAndOrderNumberByProductID`
    stored procedure to verify that the new customer is returned. The stored procedure
    used to insert the record into `dbo.Customer` is shown in Listing [11-5](#480547_2_En_11_Chapter.xhtml#PC5).


    ```sql

    /*-------------------------------------------------------------*\

    Name:             dbo.InsertCustomer

    Author:           Elizabeth Noble

    Created Date:     2022-10-30

    Description:      Used to create a customer

    Sample Usage:

    EXECUTE dbo.InsertCustomer

    ''Elizabeth'',

    ''Noble'',

    ''123 Main Steet'',

    ''Some City'',

    ''00000'',

    ''United States'',

    1,

    GETDATE(),

    GETDATE(),

    GETDATE();

    \*------------------------------------------------------------*/

    CREATE OR ALTER PROCEDURE dbo.InsertCustomer

    @FirstName      VARCHAR(40),

    @LastName       VARCHAR(100),

    @Address        VARCHAR(100),

    @City           VARCHAR(100),

    @PostalCode     VARCHAR(20),

    @Country        VARCHAR(75),

    @IsActive       BIT,

    @DateCreated    DATETIME2(2),

    @DateModified   DATETIME2(2),

    @DateDisabled   DATETIME2(2)

    AS

    INSERT INTO dbo.Customer

    (

    FirstName,

    LastName,

    [Address],

    City,

    PostalCode,

    Country,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    )

    VALUES

    (

    @FirstName,

    @LastName,

    @Address,

    @City,

    @PostalCode,

    @Country,

    @IsActive,

    @DateCreated,

    @DateModified,

    @DateDisabled

    );

    ```

    Listing 11-5

    Inserting a Record into the `dbo.Customer` Table


    Now that you know how you will be adding the customers to the database, you should
    identify the other stored procedures needed for your integration test. Listing
    [11-6](#480547_2_En_11_Chapter.xhtml#PC6) shows the T-SQL code for the stored
    procedure to create the customer order.


    ```sql

    /*-------------------------------------------------------------*\

    Name:             dbo.InsertCustomerOrder

    Author:           Elizabeth Noble

    Created Date:     2022-10-30

    Description:      Used to create the header for a customer order

    Sample Usage:

    EXECUTE dbo.InsertCustomerOrder

    3,

    99999,

    ''2022-10-31'',

    NULL;

    \*------------------------------------------------------------*/

    CREATE OR ALTER PROCEDURE dbo.InsertCustomerOrder

    @CustomerID     INT,

    @OrderNumber    VARCHAR(15),

    @OrderDate      DATETIME2(2),

    @ShipDate       DATETIME2(2)

    AS

    INSERT INTO dbo.CustomerOrder

    (

    CustomerID,

    OrderNumber,

    OrderDate,

    ShipDate,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    )

    SELECT

    @CustomerID,

    @OrderNumber,

    @OrderDate,

    @ShipDate,

    1,

    SYSDATETIME() AS DateCreated,

    SYSDATETIME() AS DateModified,

    NULL AS DateDisabled;

    ```

    Listing 11-6

    Inserting a Record into the `dbo.CustomerOrder` Table


    This code creates a record in the `dbo.CustomerOrder` table. Once the record has
    been created in the `dbo.CustomerOrder` table, you can insert data into the `dbo.OrderDetail`
    table. The stored procedure to create the order detail information is in Listing
    [11-7](#480547_2_En_11_Chapter.xhtml#PC7).


    ```sql

    /*-------------------------------------------------------------*\

    Name:             dbo.InsertOrderDetail

    Author:           Elizabeth Noble

    Created Date:     2022-10-30

    Description:      Used to create line items for the order detail

    Sample Usage:

    EXECUTE dbo.InsertOrderDetail

    111111,

    1,

    599.00,

    1;

    \*------------------------------------------------------------*/

    CREATE OR ALTER PROCEDURE dbo.InsertOrderDetail

    @CustomerOrderID     INT,

    @ProductID           INT,

    @ProductPrice        DECIMAL(6,2),

    @QuantitySold        INT

    AS

    INSERT INTO dbo.OrderDetail

    (

    CustomerOrderID,

    ProductID,

    ProductPrice,

    QuantitySold,

    IsActive,

    DateCreated,

    DateModified,

    DateDisabled

    )

    SELECT

    @CustomerOrderID,

    @ProductID,

    @ProductPrice,

    @QuantitySold,

    1,

    SYSDATETIME() AS DateCreated,

    SYSDATETIME() AS DateModified,

    NULL AS DateDisabled;

    ```

    Listing 11-7

    Inserting a Record into the `dbo.OrderDetail` Table


    You use the above stored procedures to create a customer and populate order information
    for this customer.


    The next step is to review what stored procedure you will be using for the integration
    test. In Listing [11-8](#480547_2_En_11_Chapter.xhtml#PC8), you can see the stored
    procedure `dbo.GetCustomerAndOrderNumberByProductID`.


    ```sql

    /*-------------------------------------------------------------*\

    Name:             dbo.GetCustomerAndOrderNumberByProductID

    Author:           Elizabeth Noble

    Created Date:     2022-10-30

    Description:      Get customer and products ordered for an order number

    Sample Usage:

    EXECUTE dbo.GetCustomerAndOrderNumberByProductID 1;

    \*-------------------------------------------------------------*/

    CREATE OR ALTER PROCEDURE dbo.GetCustomerAndOrderNumberByProductID

    @ProductID    INT

    AS

    SELECT

    cus.CustomerID,

    cus.FirstName,

    cus.LastName,

    ord.OrderNumber,

    ord.OrderDate,

    prd.ProductName,

    SUM(dtl.QuantitySold) AS QuantitySold,

    dtl.ProductPrice

    FROM dbo.Customer cus

    INNER JOIN dbo.CustomerOrder ord

    ON cus.CustomerID = ord.CustomerID

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    INNER JOIN dbo.Product prd

    ON prd.ProductID = dtl.ProductID

    WHERE prd.ProductID = @ProductID

    GROUP BY cus.FirstName,

    cus.LastName,

    ord.OrderNumber,

    ord.OrderDate,

    prd.ProductName,

    dtl.ProductPrice

    ORDER BY cus.FirstName, cus.LastName;

    ```

    Listing 11-8

    Selecting a Customer and Order by Product


    In order to perform integration testing, you need to write some code so that you
    can insert into the customer. Afterward, you run the second stored procedure.
    You can insert these results into a temporary table and then verify that the customer
    created in `dbo.InsertCustomer` exists in the results from the stored procedure
    `dbo.GetCustomerAndOrderNumberByProductID`. In the example in Listing [11-9](#480547_2_En_11_Chapter.xhtml#PC9),
    you also need to add some products to the order so that the `dbo.GetCustomerAndOrderNumberByProductID`
    stored procedure can to pull some results.'
