- fmt: 'Comparing Listings [3-13](#480547_2_En_3_Chapter.xhtml#PC13), [3-14](#480547_2_En_3_Chapter.xhtml#PC14),
    and [3-15](#480547_2_En_3_Chapter.xhtml#PC15), you can quickly see that I use
    a consistent format when creating tables and declaring variables. This will allow
    anyone else to see code in this format and quickly know that this code is creating
    a table.


    There are at least two things to consider when it comes to capitalization. There
    is capitalization related to keywords and capitalization for all other terms.
    I prefer to uppercase all reserved words. The list of `T-SQL` reserved words can
    be quite lengthy. I chose to consider any word that is not part of the database
    schema as a reserved word. I capitalize database objects and column names as they
    were created. When I create table aliases, I use lowercase. You can see in Listing
    [3-16](#480547_2_En_3_Chapter.xhtml#PC16) how the reserved words are uppercased
    and the first letter of each word for a database object name is capitalized.


    ```

    CREATE TRIGGER dbo.ArchiveProduct

    ON dbo.Product

    AFTER INSERT, UPDATE

    AS

    IF (ROWCOUNT_BIG() = 0)

    RETURN;

    INSERT INTO dbo.ProductArchive (ProductID, ProductPrice, DateCreated)

    SELECT inserted.ProductID, inserted.ProductPrice, GETDATE()

    FROM inserted;

    Listing 3-16

    Create a DML Trigger

    ```


    One of the other factors to consider when determining formatting standards for
    `T-SQL` is if and how to use aliasing. Aliasing is a method that allows you to
    create a shortened name to reference a table. It is also possible to alias column
    names in your `SELECT` statements when writing queries. How the aliased values
    can be used depends on whether a table or a column is being aliased. However,
    the overall concept is the same. If an alias is created for a table name, the
    alias must be used in place of the table name for the entirety of the given query.
    For columns, aliases are often used to rename a column or make the output more
    user-friendly. Often the column aliases are not referenced.


    The only time I will reference a column alias when writing my queries is if I
    must order by a column that has been aliased, particularly if that column has
    more logic than only renaming the original column name. It is possible to provide
    a numeric representation of the column order in the `ORDER BY` statement instead
    of proving a column name. While this is a quick method to sort data, this is not
    recommended to be used as part of permanent application code because the order
    of columns in the `SELECT` statement can be changed without the `ORDER BY` clause
    getting updated. This would cause the data returned to potentially be ordered
    differently than intended.


    Another debated topic when it comes to `T-SQL` code formatting is how to format
    commas when writing code. There are those who prefer to put the commas at the
    beginning of each line. This can improve readability and help others quickly identify
    that this is one of multiple lines. Adding the commas at the front of each line
    does simplify debugging as it is easy to comment out a single line that begins
    with a comma and the rest of the query will parse correctly. I prefer adding my
    commas at the end so that I can ignore the commas and focus on the columns being
    returned in a query.


    When it comes to multiple criteria in the `WHERE` clause, I do prefer to precede
    each criteria with the operator. For many types of criteria, this is either an
    `OR` or an `AND`. This allows me to quickly review the logic in the `WHERE` clause
    without having to scan the entire `WHERE` clause to determine how all the criteria
    works together. You can choose to have each line end with the operator, but you
    may find that this complicates debugging.


    There are times when working with `T-SQL` code that you will write complex code.
    This code may include subqueries or logic in the `WHERE` clause involving `AND`s
    or `OR`s. If there is logic like a subquery or a mixture of `AND`s and `OR`s in
    the `WHERE` clause, I wrap those in parentheses. I indent all the code inside
    the parentheses so that it is easy to identify what logic is wrapped together.
    There are also times where there are multiple join conditions between two tables.
    If there is more than one join condition between two tables, I indent every join
    condition except the first one so that others can easily tell there are multiple
    join conditions between two tables.


    You will also want to consider how to format `T-SQL` code when adding additional
    levels of logic to your code. There are various reasons for `T-SQL` code blocks
    including `TRY… CATCH` blocks, `IF… ELSE` statements, `BEGIN…END`, or other reasons
    to segment code. For these scenarios, I indent the interior of the code block.
    If code blocks end up being nested, I indent each subsequent code block. I prefer
    to indent my code blocks so that others reviewing my code can see the parent activity
    such as the `WHILE` loop in Listing [3-17](#480547_2_En_3_Chapter.xhtml#PC17).
    Once you see the first level of indentation, you know that all the logic that
    has been indented belongs to the same code block.


    ```

    SET NOCOUNT ON;

    DECLARE @ProductID INT,

    @ProductName VARCHAR(25),

    @message VARCHAR(50);

    PRINT ''-------- Product Listing --------'';

    DECLARE product_cursor CURSOR DYNAMIC

    FOR

    SELECT ProductID, ProductName

    FROM dbo.Product;

    OPEN product_cursor;

    FETCH NEXT FROM product_cursor

    INTO @ProductID, @ProductName;

    WHILE @@FETCH_STATUS = 0

    BEGIN

    PRINT '' '';

    SELECT @message = ''----- Customers For Products: '' + @ProductName + ''-----'';

    PRINT @message;

    SELECT LEFT(cus.FirstName, 25), LEFT(cus.LastName, 25), SUM(dtl.QuantitySold)
    AS QuantitySold

    FROM dbo.CustomerOrder ord

    INNER JOIN dbo.OrderDetail dtl

    ON ord.CustomerOrderID = dtl.CustomerOrderID

    INNER JOIN dbo.Product prd

    ON dtl.ProductID = prd.ProductID

    INNER JOIN dbo.Customer cus

    ON ord.CustomerID = cus.CustomerID

    WHERE prd.ProductID = @ProductID

    GROUP BY cus.FirstName, cus.LastName, prd.ProductName;

    FETCH NEXT FROM product_cursor INTO @ProductID, @ProductName;

    END;

    CLOSE product_cursor;

    DEALLOCATE product_cursor;

    Listing 3-17

    Create a Cursor

    ```


    Formatting `T-SQL` code consistently improves readability for yourself and anyone
    in the future who will need to review your code. Well-formatted code can help
    provide clarity when troubleshooting, performance tuning, and code enhancing.
    Creating a `T-SQL` formatting standard in your organization can also help when
    onboarding new employees or training junior database developers. Once `T-SQL`
    formatting standards have been determined, you will want to consider what steps
    need to be taken to create naming conventions for your `T-SQL` code.'
