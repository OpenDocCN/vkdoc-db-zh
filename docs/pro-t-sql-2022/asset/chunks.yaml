  trans: "\n# 清单 2-20 修改内联表值函数的输出\n\n```sql\nSELECT FirstName,\n       LastName,\n\
    \       CustomerOrderID,\n       OrderNumber,\n       OrderDate,\n       ProductName,\n\
    \       QuantitySold,\n       ROUND(ProductPrice * 1.05, 2) AS ProductPrice,\n\
    \       QuantitySold * (ROUND(ProductPrice * 1.05, 2)) AS TotalRevenue\nFROM dbo.CustomerOrderSummaryForCustomer\
    \ (234);\n```\n\n此查询获取 `ProductPrice` 并额外增加 5%。此外，该查询还展示了如果客户 234 在价格上涨 5% 后购买相同商品，其总收入将会是多少。此数据变更是修饰性的，并不影响存储在数据库中的实际数据。\n\
    \n## 多语句表值函数\n\n当你既需要代码重用又需要能够更新 SQL Server 时，可能就需要考虑使用多语句表值函数了。但我提醒你需仔细考量此方法是否必要，因为这类函数最终可能对性能产生巨大影响。\n\
    \n多语句表值函数不仅仅是功能更强的内联表值函数。它们也无法与查询执行进行内联。这意味着查询优化器在使用此类函数时不会尝试进行最佳预估。事实上，在 SQL\
    \ Server 2014 之前，多语句表值函数被预估只返回一行数据。对于 SQL Server 2014 和 SQL Server 2016，预估行数为\
    \ 100。然而，从 SQL Server 2017 开始，SQL Server 有可能通过交错执行获得对函数返回行数的准确预估。\n\n其原理是，优化过程会暂停以允许执行，从而让基数估算器能够确定多语句表值函数应返回的实际行数。虽然交错执行是新的自适应查询处理的一部分，但仍需注意一些限制。如果\
    \ `CROSS APPLY` 与多语句表值函数结合使用，则交错功能将不起作用。也有报告称，如果多语句表值函数内部有一个依赖于输入参数的 `WHERE` 子句，那么交错执行也可能不适用。\n\
    \n为了更好地理解其工作原理，请参考清单 2-21 中的多语句表值函数。\n\n### 清单 2-21 多语句表值函数\n\n```sql\nCREATE\
    \ FUNCTION dbo.GetTopCustomersByCountry (@Country VARCHAR(75), @TopN INT)\nRETURNS\
    \ @TopCustomer TABLE\n(\n    CustomerRank      INT,\n    FirstName         VARCHAR(40),\n\
    \    LastName          VARCHAR(100),\n    CustomerOrderID   INT,\n    TotalProductSales\
    \ DECIMAL(12,2)\n)\nAS\nBEGIN\n    WITH cte_TopCust (FirstName, LastName, CustomerOrderID,\
    \ TotalProductSales) AS\n    (\n        SELECT cus.FirstName,\n              \
    \ cus.LastName,\n               ord.CustomerOrderID,\n               SUM(dtl.QuantitySold\
    \ * dtl.ProductPrice) AS TotalProductSales\n        FROM dbo.Customer cus\n  \
    \      INNER JOIN dbo.CustomerOrder ord\n            ON cus.CustomerID = ord.CustomerID\n\
    \        INNER JOIN dbo.OrderDetail dtl\n            ON ord.CustomerOrderID =\
    \ dtl.CustomerOrderID\n        WHERE (cus.Country = @Country OR @Country IS NULL)\n\
    \        GROUP BY ord.CustomerOrderID,\n                 cus.FirstName,\n    \
    \             cus.LastName\n    )\n    INSERT INTO @TopCustomer\n    (\n     \
    \   CustomerRank,\n        FirstName,\n        LastName,\n        CustomerOrderID,\n\
    \        TotalProductSales\n    )\n    SELECT TOP(@TopN) ROW_NUMBER() OVER(ORDER\
    \ BY TotalProductSales DESC) AS CustomerRank,\n           FirstName,\n       \
    \    LastName,\n           CustomerOrderID,\n           TotalProductSales\n  \
    \  FROM cte_TopCust\n    ORDER BY 5 DESC, CustomerOrderID DESC;\n    RETURN\n\
    END;\n```\n\n让我们在 SQL Server 2017 和 SQL Server 2022 的兼容模式下执行此函数。分析公司销售情况时，比较客户购买行为是很常见的。有时这会导致查询内的逻辑变得相当复杂。既然此函数已创建，你可以编写脚本来测试其在各个\
    \ SQL Server 版本中的性能；参考清单 2-22。\n\n### 清单 2-22 执行函数的代码\n\n```sql\nSELECT cty.CustomerRank,\n\
    \       cty.FirstName,\n       cty.LastName,\n       COUNT(cty.CustomerOrderID)\
    \ AS NumberOfOrders,\n       cty.TotalProductSales\nFROM dbo.GetTopCustomersByCountry\
    \ (NULL, 5999) AS cty\nGROUP BY cty.CustomerRank,\n         cty.FirstName,\n \
    \        cty.LastName,\n         cty.TotalProductSales;\n```\n\n接下来，让我们测试各个 SQL\
    \ Server 版本中的执行计划和相关性能。图 2-9 展示了使用兼容模式 110 在 SQL Server 2012 中的执行计划。\n\n![图 2-9](img/480547_2_En_2_Fig9_HTML.jpg)\n"
- fmt: 'A flow diagram. `Select` has a cost of `0%` and is from sequence cost of `0%`.
    It is from computing a scalar, table values function, and so on.


    ## Figure 2-9


    Execution plan for compatibility mode `110`


    The execution plan does not appear to have too many different operators. The table-valued
    function is represented as a single operator. The properties for the table-valued
    function are shown in Figure [2-10](#480547_2_En_2_Chapter.xhtml#Fig10).


    ![](images/480547_2_En_2_Chapter/480547_2_En_2_Fig10_HTML.jpg)


    A table titled table valued function with row entries such as physical operation,
    logical, estimated operator cost, and estimated C P U cost.


    ## Figure 2-10


    Properties for table-valued function in compatibility mode `110`


    Figure [2-10](#480547_2_En_2_Chapter.xhtml#Fig10) shows the estimated number of
    rows as `1`. Additional enhancements were made to the database engine in `SQL
    Server 2014`. The estimation for the number of rows for a table-valued function
    was improved. Using the compatibility mode `120` for `SQL Server 2014`, you can
    refer to the execution plan generated in Figure [2-11](#480547_2_En_2_Chapter.xhtml#Fig11).


    ![](images/480547_2_En_2_Chapter/480547_2_En_2_Fig11_HTML.jpg)


    A flow diagram. `Select` has a cost of `0%` from a sequence. It is from table-valued
    function, compute scalar, that is from stream aggregate, nested loops, and so
    on.


    ## Figure 2-11


    Execution plan for compatibility mode `120`


    Figure [2-11](#480547_2_En_2_Chapter.xhtml#Fig11) seems the same as Figure [2-9](#480547_2_En_2_Chapter.xhtml#Fig9).
    The only visible differences are in the percentages displayed for some of the
    operators. The percentage variance is not significant enough to affect the performance
    of the execution of this query in both compatibility modes `110` and `120`. You
    can find the execution times in Table [2-3](#480547_2_En_2_Chapter.xhtml#Tab3).


    ## Table 2-3


    Comparing Execution Time for a Multi-Statement Table-Valued Function in Compatibility
    Modes `110` and `120`


    | Compatibility Mode | CPU Time | Elapsed Time |

    | --- | --- | --- |

    | `110` | 1,357 milliseconds | 4,343 milliseconds |

    | `120` | 1,414 milliseconds | 2,685 milliseconds |


    The times displayed here indicate that while the CPU time for `SQL Server 2014`
    is `4%` slower, the elapsed time is about `37%` faster than `SQL Server 2012`.
    While the execution plans and times are similar, you can also check if the properties
    on the table-valued function are the same. In Figure [2-12](#480547_2_En_2_Chapter.xhtml#Fig12),
    you can ascertain the properties associated with the table-valued function.


    ![](images/480547_2_En_2_Chapter/480547_2_En_2_Fig12_HTML.jpg)


    A table titled table valued function with row entries such as physical operation,
    logical operation, estimated operator cost, and estimated C P U cost. Actual rebinds
    are `1`, and actual rewinds are `0`.


    ## Figure 2-12


    Properties for a table-valued function in compatibility mode `120`


    You can verify that the estimated number rows in Figure [2-12](#480547_2_En_2_Chapter.xhtml#Fig12)
    is `100`. This is different from the estimated number of rows of `1` as shown
    in Figure [2-10](#480547_2_En_2_Chapter.xhtml#Fig10). You can also confirm that
    the estimated operator cost and estimated subtree cost have all changed slightly.


    Now that you have run the query from Listing [2-22](#480547_2_En_2_Chapter.xhtml#PC22),
    you can run the same query using the optimizer from `SQL Server 2019`. Before
    you do this, you need to change the compatibility level back to `160`. While changing
    the compatibility level should clear the plan cache, you can use `T-SQL` to ensure
    the execution plan cache has been cleared. Once this has been done and you execute
    the query from Listing [2-22](#480547_2_En_2_Chapter.xhtml#PC22), you get an execution
    plan like the one in Figure [2-13](#480547_2_En_2_Chapter.xhtml#Fig13).


    ![](images/480547_2_En_2_Chapter/480547_2_En_2_Fig13_HTML.jpg)


    A flow diagram. `Select` has a cost of `0%` from a sequence. It is from table-valued
    function, compute scalar, that is from stream aggregate, nested loops, and so
    on.


    ## Figure 2-13


    Execution plan for compatibility mode `160`


    The execution plan in Figure [2-13](#480547_2_En_2_Chapter.xhtml#Fig13) is different
    from either of the execution plans in Figure [2-9](#480547_2_En_2_Chapter.xhtml#Fig9)
    and Figure [2-11](#480547_2_En_2_Chapter.xhtml#Fig11). You can also determine
    that the `Index Scan` on one of the non-clustered indexes from the `dbo.OrderDetail`
    table takes the majority of time to execute. As expected, this is the same operator
    that takes the majority of time in the execution plans for Figures [2-5](#480547_2_En_2_Chapter.xhtml#Fig5),
    [2-11](#480547_2_En_2_Chapter.xhtml#Fig11), and [2-13](#480547_2_En_2_Chapter.xhtml#Fig13).
    You can also compare the elapsed and CPU times across compatibility levels `110`,
    `120`, and `160`. This allows you to compare the expected execution times from
    the `SQL Server` optimizer from `SQL Server 2012`, `SQL Server 2014`, and `SQL
    Server 2019`. Table [2-4](#480547_2_En_2_Chapter.xhtml#Tab4) shows all three compatibility
    levels and their associated times.


    ## Table 2-4


    Comparing Execution Time for a Multi-Statement Table-Valued Function in Compatibility
    Modes `110`, `120`, and `160`


    | Compatibility Mode | CPU Time | Elapsed Time |

    | --- | --- | --- |

    | `110` | 1,357 milliseconds | 4,343 milliseconds |

    | `120` | 1,414 milliseconds | 2,685 milliseconds |

    | `160` | 910 milliseconds | 1,620 milliseconds |


    Comparing times in Table [2-4](#480547_2_En_2_Chapter.xhtml#Tab4), the CPU time
    is `30%` faster in `SQL Server 2022` than in `SQL Server 2014` or `SQL Server
    2012`. Additionally, the elapsed time for `SQL Server 2022` is about `40%` faster
    than `SQL Server 2014` and about `60%` faster than `SQL Server 2012`! You can
    also compare the table-valued function properties from Listing [2-12](#480547_2_En_2_Chapter.xhtml#PC12),
    which represented the compatibility level associated with `SQL Server 2017`, to
    those of compatibility level `160`. Figure [2-14](#480547_2_En_2_Chapter.xhtml#Fig14)
    shows the properties for the table-valued function in compatibility mode `160`.


    ![](images/480547_2_En_2_Chapter/480547_2_En_2_Fig14_HTML.jpg)


    A table titled table valued function with row entries such as physical operation,
    logical operation, estimated operator cost, and estimated C P U cost.


    ## Figure 2-14


    Properties for a table-valued function in compatibility mode `160`


    Referring to Figure [2-14](#480547_2_En_2_Chapter.xhtml#Fig14), there are several
    values that match those of Figure [2-12](#480547_2_En_2_Chapter.xhtml#Fig12).
    They include the more accurate estimated number of rows in both Figure [2-12](#480547_2_En_2_Chapter.xhtml#Fig12)
    and Figure [2-14](#480547_2_En_2_Chapter.xhtml#Fig14). The estimated operator
    cost, estimated CPU cost, and estimated subtree cost are also the same in both
    Figure [2-12](#480547_2_En_2_Chapter.xhtml#Fig12) and Figure [2-14](#480547_2_En_2_Chapter.xhtml#Fig14).


    The performance of the multi-statement table-valued function improves in the newer
    versions of `SQL Server`. In addition, you can verify that both `SQL Server 2017`
    and `SQL Server 2022` have the most accurate estimated and actual rows returned
    in the execution plan. While there still are performance concerns to keep in mind
    with multi-statement table-valued functions, there are scenarios where the performance
    is improved enough that it may be beneficial to use these functions starting with
    `SQL Server 2017`.'
