  trans: '

    ## 为数据集编写代码


    在前文中，我讨论了如何开始将你的数据视为数据集而非单条记录。在选择、更新或删除数据时，我经常使用数据集。虽然大多数应用程序代码一次只插入单条记录，但在许多常见场景下，以数据集的形式插入数据可能会很有帮助。在接下来的部分，我将介绍几种你可能会希望将数据视为集合而非单条记录的场景。


    数据集最常用于你希望查看部分数据时。理想情况下，这些数据集是基于特定条件选择的。这不仅有利于性能，也有助于确保你只查看你想要的特定数据。在大多数场景下，一次检索和显示一条单个记录甚至没有意义。通常，如果你发现自己处于一次只选择一条记录的情况，这通常是一个很好的迹象，表明你可能需要查看该
    `T-SQL` 代码是否可以重写以使用基于集合的逻辑。


    查询可以有更复杂的选择方式。在某些情况下，你可能会发现自己想要合并或比较两个不同的数据集。如果你想将两个数据集连接在一起，你可以选择使用 `UNION` 或
    `UNION ALL`。它们之间只有一个微小但重要的区别。回顾表 5-2，我识别了两组不同的数据，一组基于城市名称，另一组基于部分地址。在下面的例子中，我将展示一种你可以用来查找同时包含这两个数据集结果的方法。当你对数据进行
    `UNION` 时，返回的每条记录在连接在一起的 `SELECT` 语句之间都将是唯一的。代码清单 5-8 展示了一个在两个查询之间的 `UNION` 操作。


    ```sql

    SELECT FirstName, LastName

    FROM dbo.Customer

    WHERE City = ''Memphis''

    UNION

    SELECT FirstName, LastName

    FROM dbo.Customer

    WHERE [Address] LIKE ''%de%'';

    ```

    代码清单 5-8

    两个查询的联合


