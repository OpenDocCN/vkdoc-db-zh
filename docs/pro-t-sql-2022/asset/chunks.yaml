  trans: "\n窗口顶部区域允许你选择用于创建单元测试的对象。在本例中，我们将为 `dbo.GetCustomer` 存储过程创建一个新的单元测试。这也是你为这个数据库项目创建的第一个单元测试。你可以选择创建一个新的\
    \ Visual C# 测试项目。不过，你无需了解 C# 即可在 Visual Studio 中开始创建自己的单元测试。为这个新项目命名并创建一个新类。今后，你可以将这个类复用于其他单元测试。\n\
    \n在对话框窗口上点击“确定”后，你会看到另一个弹出窗口，如图 11-3 所示。\n\n![](img/480547_2_En_11_Fig3_HTML.jpg)\n\
    \nPro T SQL 2022 VS 单元测试的 SQL Server 测试配置屏幕截图。一个“选择连接”按钮被高亮显示。“确定”和“取消”按钮位于右下角。\n\
    \n## 图 11-3\n\n## 设置连接字符串\n\n这里可以设置几个选项。其中大部分涉及选择用于执行单元测试的数据源。选择预存在的 `Menu` 数据库来运行单元测试。你可以选择在运行单元测试之前自动部署数据库。但是，我们仅在单元测试通过时才部署数据库。\n\
    \n设置好连接字符串并配置好其他设置后，Visual Studio 会向现有解决方案中添加一个新项目。你可以在图 11-4 中看到你的数据库项目与单元测试项目一起的样子。\n\
    \n![](img/480547_2_En_11_Fig4_HTML.jpg)\n\nPro T SQL 2022 VS 项目的解决方案资源管理器窗口屏幕截图。“单元测试\
    \ GetCustomer.cs”选项被高亮显示。“确定”和“取消”按钮位于右下角。\n\n## 图 11-4\n\n## 源代码管理中的单元测试\n\n\
    在图 11-4 中，原始 `ProTSQL2022-VS` 项目中的对象均未被更改。你可以看到为单元测试项目创建的所有对象都已准备好检入源代码管理。创建单元测试项目后，Visual\
    \ Studio 中将打开一些附加窗口。其中一个窗口允许你设置测试条件。默认情况下，会配置一个“结果不确定” (`Inconclusive`) 的测试条件。你可以保留或移除此测试条件。图\
    \ 11-5 显示了可用测试条件的下拉列表。\n\n![](img/480547_2_En_11_Fig5_HTML.jpg)\n\n测试条件窗口的屏幕截图。下拉菜单列出了：数据校验和\
    \ (`Data checksum`)、空结果集 (`empty result set`)、执行时间 (`execution time`)、预期架构 (`expected\
    \ schema`)、结果不确定 (`inconclusive`)、非空结果集 (`not empty result set`)、行数 (`row count`)\
    \ 和标量值 (`scalar value`)。\n\n## 图 11-5\n\n## 可用的单元测试选项\n\n在开始创建单元测试之前，让我们通过表 11-4\
    \ 来定义这些条件各自的目的。\n\n### 表 11-4\n\n### 单元测试条件\n\n| 测试条件 | 描述 |\n| --- | --- |\n\
    | `数据校验和` | 计算单元测试的 `CheckSum`。如果 `CheckSum` 与原始单元测试匹配，则测试通过。仅当结果集中返回的数据将保持不变时，才应使用此条件。\
    \ |\n| `空结果集` | 检查是否返回了任何数据。如果没有返回数据，则测试通过。 |\n| `执行时间` | 检查查询的总体执行时间。如果查询在指定时间内完成，则测试通过。\
    \ |\n| `预期架构` | 检查返回对象的架构。如果列和数据类型与预期架构匹配，则测试通过。 |\n| `结果不确定` | 此条件由系统创建作为占位符，应在创建第一个单元测试后将其移除。\
    \ |\n| `非空结果集` | 检查是否返回了任何数据。如果返回了数据，则测试通过。 |\n| `行数` | 检查返回的行数。如果返回的行数与预期计数匹配，则测试通过。\
    \ |\n| `标量值` | 检查返回的值。如果返回的值与预期值匹配，则测试通过。 |\n\n你需要创建一个单元测试来验证 `dbo.GetCustomer`\
    \ 存储过程是否没有返回非活动客户。与你之前编写的类似手动单元测试一样，你要确认存储过程 `dbo.GetCustomer` 没有返回任何非活动客户。你可以通过选择\
    \ `空结果集` 条件来实现这一点。你可以在图 11-6 中看到这个测试条件。\n\n![](img/480547_2_En_11_Fig6_HTML.jpg)\n\
    \n测试条件窗口的屏幕截图。它显示：名称，空结果集条件 1；类型，空结果集；值，结果集 1 必须有零行；已启用，是。\n\n## 图 11-6\n\n##\
    \ 用于检查空结果集的单元测试\n\n现在你已经创建了测试条件，你需要为这个单元测试编写一些 T-SQL 代码。选择 `空结果集` 作为测试条件。为了让这个单元测试在运行时通过，单元测试内部的\
    \ T-SQL 代码必须不返回任何结果。\n\n在你修改存储过程后，你不希望返回任何非活动客户。在这种情况下，一个通过的测试用例就是没有返回非活动客户。这也与图\
    \ 11-6 中创建的测试条件相符。清单 11-4 展示了该单元测试的代码。\n\n```sql\n-- 针对 dbo.GetCustomer 的数据库单元测试\n\
    -- 创建表变量以保存结果\nDECLARE @CustomerList TABLE\n(\n    CustomerID      INT,\n    FirstName\
    \       VARCHAR(40),\n    LastName        VARCHAR(100),\n    [Address]       VARCHAR(100),\n\
    \    City            VARCHAR(100),\n    PostalCode      VARCHAR(20),\n    Country\
    \         VARCHAR(75),\n    IsActive        BIT,\n    DateCreated     DATETIME2(2),\n\
    \    DateModified    DATETIME2(2),\n    DateDisabled    DATETIME2(2)\n);\n-- 将\
    \ dbo.GetCustomer 的结果插入表变量\nINSERT INTO @CustomerList\n(\n    CustomerID,\n  \
    \  FirstName,\n    LastName,\n    [Address],\n    City,\n    PostalCode,\n   \
    \ Country,\n    IsActive,\n    DateCreated,\n    DateModified,\n    DateDisabled\n\
    )\nEXECUTE [dbo].[GetCustomer];\n-- 获取非活动客户的数量\n---- 如果没有非活动客户，单元测试将通过\n---- 如果有非活动客户，单元测试将失败\n\
    SELECT CustomerID\nFROM @CustomerList\nWHERE IsActive = 0;\n```\n\n### 清单 11-4\n\
    ### 运行单元测试的代码\n\n你首先创建一个表变量。单元测试的下一部分将存储过程 `dbo.GetCustomer` 的结果插入该表变量。最后一步是从表变量中仅选择非活动的记录。将上述代码添加到\
    \ `UnitTestGetCustomer.cs` 并保存文件后，你就可以运行你的第一个单元测试了。你可以转到 `测试` 菜单来运行单元测试，如图 11-7\
    \ 所示。\n\n![](img/480547_2_En_11_Fig7_HTML.jpg)\n"
- fmt: '## 手动运行单元测试


    A screenshot highlights the run a test option under the test option. The main
    menu includes the option for, test, analyze, tools, extensions, windows, and help.


    **Figure 11-7**


    You are using test-driven design for the unit tests, and you are testing this
    unit test before changing the original stored procedure. For this scenario, you
    are expecting the unit test to fail. You can see the results of running this unit
    test in Figure [11-8](#480547_2_En_11_Chapter.xhtml#Fig8).


    ![](images/480547_2_En_11_Chapter/480547_2_En_11_Fig8_HTML.jpg)


    A screenshot of the test explorer window. It presents that the test run finished
    the two tests, 1 is passed, 1 is failed, and 0 is skipped, in 7.4 seconds.


    **Figure 11-8**


    The original stored procedure still returns inactive customers. This causes the
    unit test to fail. Once you update the stored procedure `dbo.GetCustomer` with
    the T-SQL code from Listing [11-3](#480547_2_En_11_Chapter.xhtml#PC3) and repeat
    the unit test, you will get the results in Figure [11-9](#480547_2_En_11_Chapter.xhtml#Fig9).


    ![](images/480547_2_En_11_Chapter/480547_2_En_11_Fig9_HTML.jpg)


    A screenshot of the test explorer window. It presents that the test run finished
    the two tests, 2 is passed, 0 is failed, and 0 is skipped, in 6.6 seconds.


    **Figure 11-9**


    Now that the unit test has run successfully, you can be confident that your new
    T-SQL code is working as intended. There are other unit testing options available
    for database projects. I propose you investigate several alternatives and collaborate
    with your coworkers to determine which method works best for your environment.


    ## 集成测试


    While it is good to know that a single piece of database code is working as expected,
    most T-SQL code does not exist in isolation. The very nature of relational design
    infers that items in the database are related to one another. We normally think
    of the relationships between tables. However, stored procedures access data that
    exists in tables. If you want to verify an insert of data, you may run a unit
    test. This will confirm that the data you expected to be inserted has been inserted.


    Issues can arise when there is more than one way to access the same data in the
    database. Oftentimes, these queries were written at different periods in time.
    This can cause the logic in the queries to be slightly different. I have also
    seen instances where different business units in a company have different calculations
    for the same data. If a calculation for one business unit is reused for another
    business unit, it can cause what appears to be inaccurate results.


    This brings up a question as to how to keep your T-SQL code and query results
    consistent across multiple different database objects. This is where integration
    testing can be useful. `Integration testing` is the term used to indicate testing
    that is designed to work with more than a single piece of code. If you are using
    an application to insert data and you want to verify that the data is inserted
    correctly, this can be considered integration testing. You are testing both the
    application’s ability to connect to SQL Server and the T-SQL code to insert the
    data into the database.


    This is only one scenario where integration testing can be used. A common situation
    I find myself in is working with two stored procedures that are intended to pull
    back generally the same information. There are times that changes to one of the
    underlying tables or code in one of the stored procedures may cause these two
    stored procedures to return different results. Unfortunately, these differences
    in results are not usually found until well after the T-SQL code is deployed.
    This causes an overall loss of confidence in the applications.


    While it is preferred that these intertwined stored procedures are documented
    or, better yet, refactored down to a single stored procedure, this is not always
    an option. There are costs associated with having multiple versions of similar
    code, but there are also costs with having multiple processes relying on the same
    code. For the rest of this chapter, we will assume that the T-SQL code cannot
    be rewritten to get rid of the dependency.


    Just like unit testing database code, you can begin your integration testing manually
    by using T-SQL queries. The biggest factor in your integration is understanding
    how your environment works together. Sometimes this is found by accident, like
    when something breaks. Other times you may be a subject matter expert and already
    know the interactions. Either way, in order to begin integration testing, you
    first need to have at least two things to test.


    You can begin by testing a data insert along with a data select of the same table(s).
    You can also use integration testing to compare the results of two queries. This
    can happen if you have one query where you return all values and another query
    where you search for a specific value. While these two stored procedures will
    not match for every record, they may have matching results for a specific record.
    This type of integration testing will confirm that the values returned in the
    columns are consistent between one another.'
