  \ SSIS 包。\n\n上面定义的变量稍后会在 Biml 文件中使用。紧跟在这些变量声明之后，添加代码清单 19-21 所示的 `Package` 节点。\n\
  \n**代码清单 19-21. 包含.NET 替换符的 Package 节点**\n\n```xml\n    <Package Name=\"IncrementalLoad_<#=table.Name#>\"\
  \ ConstraintMode=\n       \"Linear\" ProtectionLevel=\"EncryptSensitiveWithUserKey\"\
  >\n```\n\n这段 Biml 代码，就像这个 Biml 文件中的许多代码一样，是从 `IncrementalLoad.biml` 文件复制并修改而来的，以接受来自\
  \ ForEach 循环的.NET 覆盖。当展开此 Biml 时生成的每个 SSIS 包都将有一致的命名：`IncrementalLoad_<`*源表名*`>`。\n\
  \n还要注意 `Package` 节点的 `ConstraintMode` 属性被设置为 `\"Linear\"`。在 `IncrementalLoad.biml`\
  \ 文件中，它被设置为 `\"Parallel\"`。区别很细微但功能强大。首先，Biml 编译器将自动为你创建优先约束。具体来说，它将根据它们在 Biml 文件中出现的顺序，在控制流中从一个任务到下一个任务创建\
  \ `OnSuccess` 优先约束。此功能使脚本编写和简单文件创作变得极其快速。其次，你可以在数据流任务中消除 `InputPath` 节点，因为 `InputPath`\
  \ 将连接到直接出现在它之前的转换的默认输出路径。\n\n在 `<Package>` 标签之后，立即添加一个 `Tasks` 节点，然后是一个配置如代码清单 19-22\
