  \n**图 20-3. 执行由 GenerateExecCmd.biml 生成的命令行**\n\n这有多酷？\n\n### 总结\n\n在本章中，我们扩展了关于业务智能标记语言\
  \ (Business Intelligence Markup Language) 功能的知识。我们已经演示了如何使用 Biml 动态生成 Transact-SQL\
  \ 语句和执行命令行。\n\n# 附录 A\n\n![image](img/frontdot.jpg)\n\n### SSIS 框架的演进\n\nSSIS 框架是\
  \ SSIS 设计模式之后合乎逻辑的下一步，因为框架包含许多模式。至少，一个 SSIS 框架应该提供包执行控制和监控。这听起来很简单，但我向您保证，事实并非如此。执行控制需要对\
  \ Integration Services 运行时 API 有工作知识。理解*紧耦合*和*松耦合*的微妙之处不仅有帮助，它可能成就或毁掉您的日子（或数据集成解决方案）。\n\
  \n如果 SSIS 2012 和 2014 包含 SSIS 目录，为什么还需要 SSIS 框架？这是一个很好的问题。SSIS 2012 和 2014 目录使用项目部署模型——这是在\
  \ SQL Server Data Tools - Business Intelligence (SSDT-BI) 中开发的 SSIS 项目的默认模型。但 SSIS\
  \ 2012 和 2014 也包含包部署模型，因此它们支持将传统 SSIS 项目升级到 SSIS 2012 或 2014。此外，有使用案例既使用 SSIS 目录进行执行和监控，也使用自定义框架和包部署模型。作为数据集成架构师，我非常感谢\
  \ Microsoft SSIS 团队提供了这两种选项。\n\n在本附录中，我将引导您设计和构建一个自定义的、串行的 SSIS 框架，我将其命名为 SSIS 执行和监控框架。该框架将与\
  \ SSIS 2012/2014 的包部署模型配合使用，并包含一个 SQL Server Reporting Services 解决方案。构建 SSIS 框架是一项高级任务。我将帮助您从头开始构建它，使用本书前面介绍的许多设计模式。\n\
  \n### 从中间开始\n\n我们从执行控制的核心开始，即父-子模式。\n\n```\nAppendLine(\"                And PackageID\
  \ = @PackageID\");\nsb.AppendLine(\"                And ExecutionOrder = @ExecutionOrder)\"\
  );\nsb.AppendLine(\" begin\");\nsb.AppendLine(\"  print 'Adding ' + @ApplicationName\
  \ + '.' + @PackageName + ' to Framework with ExecutionOrder ' + convert(varchar,\
  \ @ExecutionOrder)\");\nsb.AppendLine(\"  exec cfg.AddSSISAppPackage @ApplicationID,\
  \ @PackageID, @ExecutionOrder\");\nsb.AppendLine(\"  print @PackageName + ' added\
  \ and wired to ' + @ApplicationName\");\nsb.AppendLine(\" end\");\nsb.AppendLine(\"\
  Else\");\nsb.AppendLine(\" print @ApplicationName + '.' + @PackageName + ' already\
  \ exists in the Framework with ExecutionOrder ' + convert(varchar, @ExecutionOrder)\"\
  );\nsb.AppendLine();\ne += 10;\n}\n```\n\n此循环内的代码针对从连接对象的 `GenerateTableNodes()`\
  \ 方法调用填充的表集合中包含的每个包执行。每次迭代以一条注释开始以标识 SSIS 包的名称，随后设置 `PackageName` 和 `ExecutionOrder`\
  \ 参数值。`PackageName` 设置为字符串变量 `tbl` 中包含的 SSIS 包的名称；`ExecutionOrder` 设置为整数变量 `e` 中包含的值的字符串版本。\n\
