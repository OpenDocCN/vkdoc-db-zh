  \n图 A-14. SSISApp1 的成功与失败\n\n关于应用程序实例日志的介绍到此结束！接下来，让我们构建子包实例日志。\n\n### 构建包实例日志\n\
  \n包实例日志的工作方式类似于应用程序实例日志，只是规模不同。一个应用程序实例由一个应用程序 ID 和一个执行开始时间组成。一个包实例则由一个应用程序包 ID、一个应用程序实例\
  \ ID 和一个执行开始时间组成。\n\n让我们从创建 `log.SSISPkgInstance` 表和相关存储过程开始。清单 A-15 包含了这些数据库对象。\n\
  \n清单 A-15. 构建包实例日志表和存储过程\n\n```sql\n/* log.SSISPkgInstance 表 */\n如果不存在（选择 s.name\
  \ + '.' + t.name\n               从 sys.tables t\n               内连接 sys.schemas\
  \ s\n                 on s.schema_id = t.schema_id\n               其中 s.name = 'log'\n\
  \                 且 t.name = 'SSISPkgInstance'）\n begin\n  打印 '正在创建 log.SSISPkgInstance\
  \ 表'\n  创建表 [log].SSISPkgInstance\n  (\n    PkgInstanceID int identity(1,1) \n \
  \    约束 PK_SSISPkgInstance 主键聚集索引\n   ,AppPackageID int 非空\n        约束 FK_logSSISPkgInstance_cfgAppPackages_AppPackageID\n\
  \         外键引用 cfg.AppPackages(AppPackageID)\n   ,StartDateTime datetime 非空\n  \
  \   约束 DF_cfgSSISPkgInstance_StartDateTime\n      默认值(GetDate())\n   ,EndDateTime\
  \ datetime 空\n   ,[状态] varchar(12) 空\n  )\n  打印 'Log.SSISPkgInstance 已创建'\n end\n\
  否则\n 打印 'Log.SSISPkgInstance 表已存在。'\n打印 ''\n\n/* log.LogStartOfPackage 存储过程 */\n\
  如果存在（选择 s.name + '.' + p.name\n           从 sys.procedures p\n           内连接 sys.schemas\
  \ s\n             on s.schema_id = p.schema_id\n           其中 s.name = 'log'\n \
  \            且 p.name = 'LogStartOfPackage'）\n begin\n  打印 '正在删除 log.LogStartOfPackage\
  \ 存储过程'\n  删除过程 [log].LogStartOfPackage\n  打印 'Log.LogStartOfPackage 存储过程已删除'\n\
  \ end\n打印 '正在创建 log.LogStartOfPackage 存储过程'\ngo\n\n创建过程 [log].LogStartOfPackage\n\
  \ @AppInstanceID int\n ,@AppPackageID int\nAs\n 声明 @ErrMsg varchar(255)\n 插入到 log.SSISPkgInstance\n\
  \  (AppInstanceID, AppPackageID, StartDateTime, 状态)\n  输出 inserted.PkgInstanceID\n\
  \  值\n  (@AppInstanceID, @AppPackageID, GetDate(), '运行中')\ngo\nprint 'Log.SSISPkgInstance\
  \ 存储过程已创建。'\nprint ''\n\n/* log.LogPackageSuccess 存储过程 */\n如果存在（选择 s.name + '.'\
  \ + p.name\n           从 sys.procedures p\n           内连接 sys.schemas s\n      \
  \       on s.schema_id = p.schema_id\n           其中 s.name = 'log'\n           \
  \  且 p.name = 'LogPackageSuccess'）\n begin\n  打印 '正在删除 log.LogPackageSuccess 存储过程'\n\
  \  删除过程 [log].LogPackageSuccess\n  打印 'Log.LogPackageSuccess 存储过程已删除'\n end\n打印\
  \ '正在创建 log.LogPackageSuccess 存储过程'\ngo\n\n创建过程 [log].LogPackageSuccess\n @PkgInstanceID\
  \ int\nAs\n 更新 log.SSISPkgInstance\n set EndDateTime = GetDate()\n   , 状态 = '成功'\n\
  \ where PkgInstanceID = @PkgInstanceID\ngo\nprint 'Log.LogPackageSuccess 存储过程已创建。'\n\
  print ''\n\n/* log.LogPackageFailure 存储过程 */\n如果存在（选择 s.name + '.' + p.name\n  \
  \         从 sys.procedures p\n           内连接 sys.schemas s\n             on s.schema_id\
  \ = p.schema_id\n           其中 s.name = 'log'\n             且 p.name = 'LogPackageFailure'）\n\
  \ begin\n  打印 '正在删除 log.LogPackageFailure 存储过程'\n  删除过程 [log].LogPackageFailure\n\
  \  打印 'Log.LogPackageFailure 存储过程已删除'\n end\n打印 '正在创建 log.LogPackageFailure 存储过程'\n\
  go\n\n创建过程 [log].LogPackageFailure\n @PkgInstanceID int\nAs\n 更新 log.SSISPkgInstance\n\
  \ set EndDateTime = GetDate()\n   , 状态 = '失败'\n where PkgInstanceID = @PkgInstanceID\n\
  go\nprint 'Log.LogPackageFailure 存储过程已创建。'\nprint ''\n```\n\n`log.SSISPkgInstance`\
  \ 表将保存 SSIS 包实例数据。`Log.LogStartofPackage` 向 `SSISPkgInstance` 表插入一行；`log.LogPackageSuccess`\
  \ 用 `EndDateTime` 和 `'成功'` 状态更新该行，而 `log.LogPackageFailure` 用 `EndDateTime` 和 `'失败'`\
  \ 状态更新该记录。\n\n在 `Parent.dtsx` 中，打开 **Foreach Child Package** Foreach 循环容器的编辑器。导航到\
  \ **Variable Mappings** 页面并添加一个新变量。在 **Add Variable** 窗口中配置以下设置：\n*   Container:\
  \ `Parent`\n*   Name: `AppPackageID`\n*   Namespace: `User`\n*   Value Type: `Int32`\n\
  *   Value: `0`\n\n单击 **OK** 按钮关闭 **Add Variable** 窗口。`AppInstanceID`——存在于 `User::Packages`\
  \ SSIS 变量内的数据集中——是从执行 `cfg.GetSSISApplication` 存储过程返回的。`AppPackageID` 列作为第五列返回。因此，**Foreach\
  \ Child Package** Foreach 循环容器的 **Variable Mappings** 页面上 `AppPackageID` 变量的 `Index`\
  \ 列应设置为 `4`（0 基数组中的第五个值）。单击 **OK** 按钮关闭 **Foreach Child Package Foreach Loop Container\
  \ Editor**。\n\n向 **Foreach Child Package** Foreach 循环容器添加一个 **Execute SQL** 任务。将新的\
  \ **Execute SQL** 任务重命名为 **Log Start of Package**。打开编辑器并将 **ResultSet** 属性设置为 **Single\
  \ Row**。将 **ConnectionType** 属性设置为 **ADO.Net**，并将 **Connection** 设置为 `SSISConfig`\
  \ 连接管理器。将 **SQLStatement** 属性设置为 `log.LogStartOfPackage`，并将 **IsQueryStoredProcedure**\
  \ 属性设置为 `True`。\n\n\n\n转到“参数映射”页面并添加两个新参数：\n*   变量名称：`User::AppInstanceID`\n*  \
  \ 方向：输入\n*   数据类型：Int32\n*   参数名称：`AppInstanceID`\n*   变量名称：`User::AppPackageID`\n\
  *   方向：输入\n*   数据类型：Int32\n*   参数名称：`AppPackageID`\n\n在“结果集”页面上，添加一个名为 `0` 的新结果，并将其映射到一个新的父级\
  \ Int32 变量 `PkgInstanceID`，其默认值为 `0`。关闭“执行 SQL 任务编辑器”。从“执行 SQL”任务的“日志包启动”连接一个优先约束到“执行子包”任务。\n\
  \n向“Foreach 子包”Foreach 循环容器再添加两个“执行 SQL”任务。将第一个重命名为 `Log Package Success`，将其连接属性设置为用于连接到\
  \ `SSISConfig` 数据库的 ADO.Net 连接管理器，将 `SQLStatement` 属性设置为 `log.LogPackageSuccess`，并将\
  \ `IsQueryStoredProcedure` 属性设置为 `True`。在“参数映射”页面上，添加一个参数，并将 `User::PkgInstanceID`\
  \ 变量映射到 `log.LogStartofPackage` 存储过程的 `PkgInstanceID` 参数。从“执行子包”任务连接一个优先约束（`OnSuccess`）到“日志包成功”执行\
  \ SQL 任务。\n\n将第二个重命名为 `Log Package Failure`，将其连接属性设置为用于连接到 `SSISConfig` 数据库的 ADO.Net\
  \ 连接管理器，将 `SQLStatement` 属性设置为 `log.LogPackageFailure`，并将 `IsQueryStoredProcedure`\
  \ 属性设置为 `True`。在“参数映射”页面上，添加一个参数，并将 `User::PkgInstanceID` 变量映射到 `log.LogStartofPackage`\
  \ 存储过程的 `PkgInstanceID` 参数。从“执行子包”任务连接一个优先约束（`OnFailure`）到“日志包失败”执行 SQL 任务。\n\n\
  通过运行几次测试执行来测试包实例日志记录。允许一次成功，另一次失败。当你检查应用程序和包实例表时，结果应如 `图 A-15` 所示。\n\n![9781484200834_FigAppA-15.jpg](img/9781484200834_FigAppA-15.jpg)\n\
  \n`图 A-15`. 检查应用程序和包实例日志\n\n通过检查应用程序实例和包实例日志表，你可以看出 `AppInstanceID8` 启动于 2014 年\
  \ 6 月 29 日 下午 6:47:24。你还可以看到三个 SSIS 包——其 `PkgInstanceID` 为 10、11 和 12——作为 SSIS 应用程序的一部分被执行。每个包都成功了，SSIS\
  \ 应用程序也成功了。你还知道 `AppInstanceID7` 启动于 2014 年 6 月 29 日 下午 6:14:15，并执行了 `PkgInstanceID`\
  \ 7、8 和 9。`PkgInstanceID` 7 和 8 成功了，但 `PkgInstanceID` 9 失败了；导致 SSIS 应用程序失败。\n\n\
  酷吗？确实酷。让我们进入错误和事件日志记录。\n\n构建错误日志记录\n\n在数据集成流程中嵌入机制以捕获和保留错误及异常元数据，是最重要的、也是最有用的日志记录类型。异常和错误总会发生。SSIS\
  \ 提供了一个相当健壮的模型来捕获和报告错误，只要你意识到大多数错误代码可以忽略。不过，错误描述大多很有效。所以它达到了平衡。\n\n在我演示如何在 SSIS\
  \ 中捕获错误消息之前，让我们先讨论一下为什么这样做。我曾经管理一个数据集成开发团队。团队规模从 28 人到 40 人不等，我为美国州政府利益相关方构建了非常庞大的\
  \ ETL 解决方案。我工作的一部分就是找出最佳实践。让所有 SSIS 包以相同格式将错误数据记录到同一位置，是一项最佳实践。但如何让 40 个开发人员都做到呢？你曾尝试过让\
  \ 40 个开发人员以同样的方式做同样的事情吗？就像赶猫一样。问题在于，他们中一半人认为比我聪明；而其中一半人确实如此。但这类问题并不需要深奥的思考；它需要的是策略。那么，让每个开发人员每次都能为每个\
  \ SSIS 包构建完全相同类型日志的最佳策略是什么？你猜对了：别让他们做。将错误日志记录完全从他们手中拿走。\n\n在学会使用“执行包任务”后不久，我了解到事件会从子包“冒泡”到父包。就错误日志记录而言，这意味着我可以在父包捕获并记录任何错误。更好的是，这意味着我*可以在子包中不写任何代码*就完成这件事。问题解决了。\n\
  \n让我们看看如何将此功能实现到 SSIS 框架中。首先，让我们添加一个表和一个存储过程来记录和保存错误，如 `清单 A-16` 所示。\n\n`清单 A-16`.\
  \ 构建错误日志记录表和存储过程\n\n```\n/* log.SSISErrors table */\nIf Not Exists(Select s.name\
  \ + '.' + t.name\n              From sys.tables t\n              Join sys.schemas\
  \ s\n                On s.schema_id = t.schema_id\n              Where s.name =\
  \ 'log'\n                And t.name = 'SSISErrors')\n begin\n  print 'Creating log.SSISErrors\
  \ table'\n  Create Table [log].SSISErrors\n  (\n    ID int identity(1,1)\n     Constraint\
  \ PK_SSISErrors Primary Key Clustered\n  ,AppInstanceID int Not Null  Constraint\
  \ FK_logSSISErrors_logSSISAppInstance_AppInstanceID\n Foreign Key References [log].SSISAppInstance(AppInstanceID)\n\
  \  ,PkgInstanceID int Not Null  Constraint FK_logSSISErrors_logPkgInstance_PkgInstanceID\n\
  \ Foreign Key References [log].SSISPkgInstance(PkgInstanceID)\n  ,ErrorDateTime\
  \ datetime Not Null\n     Constraint DF_logSSISErrors_ErrorDateTime\n      Default(GetDate())\n\
  \  ,ErrorDescription varchar(max) Null\n  ,SourceName varchar(255) Null\n  )\n \
  \ print 'Log.SSISErrors created'\n end\nElse\n print 'Log.SSISErrors table already\
  \ exists.'\nprint ''\n\n/* log.LogError stored procedure */\nIf Exists(Select s.name\
  \ + '.' + p.name\n          From sys.procedures p\n          Join sys.schemas s\n\
  \            On s.schema_id = p.schema_id\n          Where s.name = 'log'\n    \
  \        And p.name = 'LogError')\n begin\n  print 'Dropping log.LogError stored\
  \ procedure'\n  Drop Procedure [log].LogError\n  print 'Log.LogError stored procedure\
  \ dropped'\n end\nprint 'Creating log.LogError stored procedure'\ngo\n\nCreate Procedure\
  \ [log].LogError\n @AppInstanceID int\n ,@PkgInstanceID int\n ,@SourceName varchar(255)\n\
  \ ,@ErrorDescription varchar(max)\nAs\n\n insert into log.SSISErrors\n (AppInstanceID,\
  \ PkgInstanceID, SourceName, ErrorDescription)\n Values\n (@AppInstanceID\n ,@PkgInstanceID\n\
  \ ,@SourceName\n ,@ErrorDescription)\ngo\nprint 'Log.LogError stored procedure created.'\n\
  print ''\n```\n\n`log.SSISErrors` 表中的每一行都包含一个 `AppInstanceID` 和一个 `PkgInstanceID`\
  \ 用于标识。为什么两者都要？因为它旨在捕获并保存同时起源于父包和子包的错误。`Parent.dtsx` 包中的错误将具有 `0` 的 `PkgInstanceID`。其余列捕获错误本身的元数据：错误发生的日期和时间（`ErrorDateTime`）、错误消息（`ErrorDescription`）以及错误起源的\
  \ SSIS 任务（`SourceName`）。\n\n![Image](img/sq.jpg) **注意** 此时，向 `log.SSISErrors` 表添加一行\
  \ `PkgInstanceID` 为 `0` 的记录实际上会引发外键约束冲突，但我将在本附录稍后处理此事。\n\n需要注意的是，错误事件是由 SSIS 任务“引发”的。当实例化错误事件时，其字段会被填充信息，例如错误描述和源名称（引发错误的任务名称）。当事件在\
  \ SSIS 包执行堆栈内部导航或冒泡时，这些数据不会更改。当事件到达 `Parent`。\n\n\n\n### SSIS 错误与事件日志记录\n\n当 `dtsx`\
  \ 包中的任务出错时，它将包含引发错误的任务名称（`SourceName`）以及该任务的错误描述（`ErrorDescription`）。当错误冒泡到 `Parent.dtsx`\
  \ 包时，你将调用 `log.LogError` 存储过程来填充 `log.SSISErrors` 表。\n\n在 SSDT 中，返回到我们之前配置的 `Parent.dtsx`\
  \ 包的 OnError 事件处理程序。添加一个 Execute SQL 任务并将其重命名为 `Log Error`。打开编辑器，将 ConnectionType\
  \ 和 Connection 属性配置为通过 ADO.Net 连接到 `SSISConfig` 数据库。将 SQLStatement 属性设置为 `log.LogError`，并将\
  \ IsQueryStoredProcedure 属性设置为 `True`。导航到 Parameter Mapping 页面并添加以下参数：\n\n*   变量名：`User::AppInstanceID`\n\
  *   方向：Input\n*   数据类型：Int32\n*   参数名：`AppInstanceID`\n*   变量名：`User::PkgInstanceID`\n\
  *   方向：Input\n*   数据类型：Int32\n*   参数名：`PkgInstanceID`\n*   变量名：`System::SourceName`\n\
  *   方向：Input\n*   数据类型：String\n*   参数名：`SourceName`\n*   变量名：`System::ErrorDescription`\n\
  *   方向：Input\n*   数据类型：String\n*   参数名：`ErrorDescription`\n\n我们已在本附录前面创建了 `AppInstanceID`\
  \ 和 `PkgInstanceID` SSIS 变量。你现在使用的是来自 System 命名空间的两个变量——`SourceName` 和 `ErrorDescription`——它们是错误事件最初由引发任务填充的两个字段。\n\
  \n映射完这些参数后，关闭 Execute SQL Task Editor，并从 Log Error Execute SQL 任务连接一个优先约束到 Log Application\
  \ Failure Execute SQL 任务，如 图 A-16 所示。\n\n![9781484200834_FigAppA-16.jpg](img/9781484200834_FigAppA-16.jpg)\n\
  \n图 A-16. 在父包 OnError 事件处理程序中添加 Log Error Execute SQL 任务\n\n通过在 SSDT 调试器中运行 `Parent.dtsx`\
  \ 来测试新的错误日志记录功能。当从 `ErrorTest.dtsx` 包提示时，单击“否”按钮以生成错误。在 SSMS 中，执行以下查询以检查错误元数据：\n\
  \n```\nSelect * From log.SSISErrors\n```\n\n结果应类似于 图 A-17 中所示的结果。\n\n![9781484200834_FigAppA-17.jpg](img/9781484200834_FigAppA-17.jpg)\n\
  \n图 A-17. log.SSISErrors 表中的错误元数据\n\n正如你从上图中看到的（希望如果你在家跟着做，你自己的代码也是如此），错误日志记录可以使\
  \ SSIS 问题的故障排除变得简单得多。\n\n事件日志记录与 SSIS 中的错误日志记录非常相似。部分原因是 SSIS 在 OnInformation 事件处理程序中重用了\
  \ OnError 事件处理程序的对象模型。\n\n让我们首先向 `SSISConfig` 数据库添加另一个表和存储过程。清单 A-17 中的 T-SQL 脚本完成了此任务。\n\
  \n***清单 A-17***. 构建事件日志记录表和存储过程\n\n```\n/* log.SSISEvents table */\nIf Not Exists(Select\
  \ s.name + '.' + t.name\n              From sys.tables t\n              Join sys.schemas\
  \ s\n                On s.schema_id = t.schema_id\n              Where s.name =\
  \ 'log'\n                And t.name = 'SSISEvents')\n begin\n  print 'Creating log.SSISEvents\
  \ table'\n  Create Table [log].SSISEvents\n  (\n    ID int identity(1,1)\n     Constraint\
  \ PK_SSISEvents Primary Key Clustered\n  ,AppInstanceID int Not Null\n       Constraint\
  \ FK_logSSISEvents_logSSISAppInstance_AppInstanceID\n        Foreign Key References\
  \ [log].SSISAppInstance(AppInstanceID)\n  ,PkgInstanceID int Not Null\n       Constraint\
  \ FK_logSSISEvents_logPkgInstance_PkgInstanceID\n        Foreign Key References\
  \ [log].SSISPkgInstance(PkgInstanceID)\n  ,EventDateTime datetime Not Null\n   \
  \  Constraint DF_logSSISEvents_ErrorDateTime\n      Default(GetDate())\n  ,EventDescription\
  \ varchar(max) Null\n  ,SourceName varchar(255) Null\n  )\n  print 'Log.SSISEvents\
  \ created'\n end\nElse\n print 'Log.SSISEvents table already exists.'\nprint ''\n\
  \n/* log.LogEvent stored procedure */\nIf Exists(Select s.name + '.' + p.name\n\
  \          From sys.procedures p\n          Join sys.schemas s\n            On s.schema_id\
  \ = p.schema_id\n          Where s.name = 'log'\n            And p.name = 'LogEvent')\n\
  \ begin\n  print 'Dropping log.LogEvent stored procedure'\n  Drop Procedure [log].LogEvent\n\
  \  print 'Log.LogEvent stored procedure dropped'\n end\nprint 'Creating log.LogEvent\
  \ stored procedure'\ngo\n\nCreate Procedure [log].LogEvent\n @AppInstanceID int\n\
  ,@PkgInstanceID int\n,@SourceName varchar(255)\n,@EventDescription varchar(max)\n\
  As\n insert into [log].SSISEvents\n (AppInstanceID, PkgInstanceID, SourceName, EventDescription)\n\
  \ Values\n (@AppInstanceID\n ,@PkgInstanceID\n ,@SourceName\n ,@EventDescription)\n\
  go\nprint 'Log.LogEvent stored procedure created.'\nprint ''\n```\n\n除了列名，`log.SSISEvents`\
  \ 表的设计与 `log.SSISErrors` 表完全相同。返回到 SSDT，从 `Parent.dtsx` OnError 事件处理程序中复制 Log Error\
  \ Execute SQL 任务。将事件处理程序下拉列表从 OnError 更改为 OnInformation，并单击链接创建 OnInformation 事件处理程序。接下来，将剪贴板的内容粘贴到\
  \ OnInformation 事件处理程序 surface 上。打开编辑器并将任务的名称更改为 `Log Event`。将 `SQLStatement` 属性编辑为\
  \ `log.LogEvent`。在 Parameter Mapping 页面，将 `ErrorDescription` 参数名称从 `ErrorDescription`\
  \ 更改为 `EventDescription`。关闭 Execute SQL Task Editor，就完成了。\n\n但是参数映射中的所有“Error”内容怎么办？OnInformation\
  \ 事件处理程序消息是通过名为 `System::ErrorDescription` 的 SSIS 变量传递的。*这不是错字*。你可能期望它是 `InformationDescription`，但事实并非如此，这让我（和你）省了些工作。\n\
  \n如果你现在执行 `Parent.dtsx` 来测试新的事件日志记录功能，你将不会看到任何记录的事件。真糟糕。如何从 SSIS 获取事件？几个任务通过 OnInformation\
  \ 事件提供信息。例如，数据流任务提供了许多有用的元数据，包括从源读取和写入目标的行数、查找缓存大小、行数以及填充时间。你还可以使用脚本任务将 OnInformation\
  \ 事件注入执行流。\n\n我喜欢在 SSIS 框架父包中包含脚本任务来总结我已有的关于 SSIS 应用程序和包的信息。现在让我们添加它们。\n\n将一个脚本任务拖到\
  \ `Parent.dtsx` 包的控制流上，并将其重命名为 `Log Application Variables`。打开编辑器，将 ScriptLanguage\
  \ 更改为 Microsoft Visual Basic 2012。将以下变量添加到 `ReadOnlyVariables` 属性：\n\n*   `System::TaskName`\n\
  *   `System::PackageName`\n*   `User::AppInstanceID`\n*   `User::ApplicationName`\n\
  \n编辑脚本并将 清单 A-18 中所示的代码放入 `Sub Main()`。\n\n***清单 A-18***. 从脚本任务引发信息事件\n\n```vb\n\
  Public Sub Main()\n        Dim sPackageName As String = Dts.Variables(\"PackageName\"\
  ).Value.ToString\n        Dim sTaskName As String = Dts.Variables(\"TaskName\").Value.ToString\n\
  \        Dim sSubComponent As String = sPackageName & \".\" & sTaskName\n      \
  \  Dim sApplicationName As String = Dts.Variables(\"ApplicationName\").Value.ToString\n\
  \        Dim iAppInstanceID As Integer = _\n            Convert.ToInt32(Dts.Variables(\"\
  AppInstanceID\").Value)\n\n        Dim sMsg As String = \"ApplicationName: \" &\
  \ sApplicationName & vbCrLf & _\n                             \"AppInstanceID: \"\
  \ & iAppInstanceID.\n```\n\n\n### 在 SSIS 框架中记录事件\n\n`ToString` 函数 `Dts.Events.FireInformation(1001,\
  \ sSubComponent, sMsg, \"\", 0, True)` 之后是 `Dts.TaskResult = ScriptResults.Success`，最后是\
  \ `End Sub`。\n\n该脚本的目的在于调用 `Dts.Events.FireInformation`。此函数的第一个参数是 `InformationCode`。根据\
  \ SSIS 框架的性质与用途，我可能会在此处输入一个值（除 `0` 外）。接下来是 `SubComponent` 参数，我通常会构建一个包含包名和任务名称的字符串。随后是描述参数，这里包含了我想要注入到\
  \ `log.SSISEvents` 表中的消息。再接下来的两个参数与帮助相关——我通常分别将它们留空并设为零。最后一个参数是 `FireAgain`，我不确定它是否（仍然）有效；我总是将其设置为\
  \ `True`。\n\n关闭脚本编辑器和脚本任务编辑器。从“日志开始应用程序执行 SQL”任务到“日志应用程序变量脚本”任务连接一个优先约束，再从“日志应用程序变量脚本”任务到“获取包元数据执行\
  \ SQL”任务连接另一个优先约束。\n\n将另一个脚本任务拖到“Foreach 子包 Foreach 循环容器”中，并将其重命名为 **Log Package\
  \ Variables**。打开编辑器，将 `ScriptLanguage` 更改为 Microsoft Visual Basic 2012。将以下变量添加到\
  \ `ReadOnlyVariables` 属性中：\n* `System::TaskName`\n* `System::PackageName`\n* `User::PkgInstanceID`\n\
  * `User::ChildPackagePath`\n* `User::AppPackageID`\n\n编辑脚本，并将 清单 A-19 中所示的代码放入 `Sub\
  \ Main()` 中。\n\n**清单 A-19. 从脚本任务引发信息事件**\n\n```vbnet\nPublic Sub Main()\n      \
  \  Dim sPackageName As String = Dts.Variables(\"PackageName\").Value.ToString\n\
  \        Dim sTaskName As String = Dts.Variables(\"TaskName\").Value.ToString\n\
  \        Dim sSubComponent As String = sPackageName & \".\" & sTaskName\n      \
  \  Dim sChildPackagePath As String = Dts.Variables(\"ChildPackagePath\").Value.ToString\n\
  \        Dim iAppPackageID As Integer = Convert.ToInt32(Dts.Variables(\"AppPackageID\"\
  ).Value)\n        Dim iPkgInstanceID As Integer = _\n Convert.ToInt32(Dts.Variables(\"\
  PkgInstanceID\").Value)\n\n        Dim sMsg As String = \"ChildPackagePath: \" &\
  \ sChildPackagePath & vbCrLf & _\n                             \"AppPackageID: \"\
  \ & iAppPackageID.ToString & vbCrLf & _\n                             \"PkgInstanceID:\
  \ \" & iPkgInstanceID.ToString\n\n        Dts.Events.FireInformation(1001, sSubComponent,\
  \ sMsg, \"\", 0, True)\n\n        Dts.TaskResult = ScriptResults.Success\n    End\
  \ Sub\n```\n\n关闭脚本编辑器和脚本任务编辑器。从“日志开始包执行 SQL”任务到“日志开始包执行 SQL”任务连接一个优先约束。\n\n如果现在执行\
  \ `Parent.dtsx`，在记录应用程序变量时可能会遇到外键约束错误。为什么？因为 `PkgInstanceID` 被设置为默认值 `0`，而 `log.SSISPkgInstance`\
  \ 表中没有 ID 为 `0` 的行。现在让我们用 清单 A-20 中所示的脚本来解决这个问题。\n\n**清单 A-20. 在 SSISConfig 数据库的选定表中添加\
  \ ID 为 0 的行**\n\n```sql\n/* Add \"0\" rows */\nIf Not Exists(Select ApplicationID\n\
  \              From cfg.Applications\n                     Where ApplicationID =\
  \ 0)\n begin\n  print 'Adding 0 row for cfg.Applications'\n  Set Identity_Insert\
  \ cfg.Applications ON\n  Insert Into cfg.Applications\n  (ApplicationID\n  ,ApplicationName)\n\
  \  Values\n  (0\n  ,'SSIS Framework')\n  Set Identity_Insert cfg.Applications OFF\n\
  \  print '0 row for cfg.Applications added'\n end\nElse\n print '0 row already exists\
  \ for cfg.Applications'\nprint ''\n\nIf Not Exists(Select PackageID\n          \
  \    From cfg.Packages\n                     Where PackageID = 0)\n begin\n  print\
  \ 'Adding 0 row for cfg.Packages'\n  Set Identity_Insert cfg.Packages ON\n  Insert\
  \ Into cfg.Packages\n  (PackageID\n  ,PackageFolder\n  ,PackageName)\n  Values\n\
  \  (0\n  ,'\\'\n  ,'parent.dtsx')\n  Set Identity_Insert cfg.Packages OFF\n  print\
  \ '0 row for cfg.Packages added'\n end\nElse\n print '0 row already exists for cfg.Packages'\n\
  print ''\n\nIf Not Exists(Select AppPackageID\n              From cfg.AppPackages\n\
  \                     Where AppPackageID = 0)\n begin\n  print 'Adding 0 row for\
  \ cfg.Packages'\n  Set Identity_Insert cfg.AppPackages ON\n  Insert Into cfg.AppPackages\n\
  \  (AppPackageID\n  ,ApplicationID\n  ,PackageID\n  ,ExecutionOrder)\n  Values\n\
  \  (0\n  ,0\n  ,0\n  ,10)\n  Set Identity_Insert cfg.AppPackages OFF\n  print '0\
  \ row for cfg.AppPackages added'\n end\nElse\n print '0 row already exists for cfg.AppPackages'\n\
  print ''\n\nIf Not Exists(Select AppInstanceID\n              From [log].SSISAppInstance\n\
  \                     Where AppInstanceID = 0)\n begin\n  print 'Adding 0 row for\
  \ cfg.Packages'\n  Set Identity_Insert [log].SSISAppInstance ON\n  Insert Into [log].SSISAppInstance\n\
  \  (AppInstanceID\n  ,ApplicationID\n  ,StartDateTime\n  ,EndDateTime\n  ,[Status])\n\
  \  Values\n  (0\n  ,0\n  ,'1/1/1900'\n  ,'1/1/1900'\n  ,'Unknown')\n  Set Identity_Insert\
  \ [log].SSISAppInstance OFF\n  print '0 row for log.SSISAppInstance added'\n end\n\
  Else\n print '0 row already exists for log.SSISAppInstance'\nprint ''\n\nIf Not\
  \ Exists(Select PkgInstanceID\n              From [log].SSISPkgInstance\n      \
  \               Where PkgInstanceID = 0)\n begin\n  print 'Adding 0 row for cfg.Packages'\n\
  \  Set Identity_Insert [log].SSISPkgInstance ON\n  Insert Into [log].SSISPkgInstance\n\
  \  (PkgInstanceID\n  ,AppInstanceID\n  ,AppPackageID\n  ,StartDateTime\n  ,EndDateTime\n\
  \  ,[Status])\n  Values\n  (0\n  ,0\n  ,0\n  ,'1/1/1900'\n  ,'1/1/1900'\n  ,'Unknown')\n\
  \  Set Identity_Insert [log].SSISPkgInstance OFF\n  print '0 row for log.SSISPkgInstance\
  \ added'\n end\nElse\n print '0 row already exists for log.SSISPkgInstance'\nprint\
  \ ''\n```\n\n现在这些生成事件的脚本任务已就绪，测试执行 `Parent.dtsx` 包，然后在 SSMS 中执行以下 T-SQL 来观察 `log.LogEvents`\
  \ 表：\n\n```sql\nSelect * From [log].SSISEvents\n```\n\n我的结果显示在 图 A-18 中。\n\n![9781484200834_FigAppA-18.jpg](img/9781484200834_FigAppA-18.jpg)\n\
  \n**图 A-18. SSIS 框架事件！**\n\n在 SSMS 中查看 `log.SSISEvents` 表令人失望。数据是准确的，SSMS 也完成了它的工作，但对于这类数据，用户体验本可以更好。幸运的是，SQL\
  \ Server 2014 附带了 SQL Server Reporting Services，它提供了更好的用户体验！让我们来看看如何构建报告来显示这些数据。\n\
  \n### 报告执行指标\n\nSQL Server Reporting Services (SSRS) 允许我们创建报告，以更用户友好的格式显示 SSIS 框架的元数据和指标。我们可以在报告中添加可视化效果，以帮助识别\
  \ SSIS 应用程序和 SSIS 包的状态。\n\n打开一个新的 SSDT-BI 实例，并创建一个名为 `PublicFrameworkReports_PackageDeployment_2014`\
  \ 的新报表服务器项目。在解决方案资源管理器中，右键单击“共享数据源”，然后单击“添加新数据源”。当“共享数据源属性”窗口显示时，将 `Name` 属性设置为\
  \ **SSISConfig**，然后单击“编辑”按钮以配置到您的 `SSISConfig` 数据库实例的连接。当我配置共享数据源时，它如 图 A-19 所示。\n\
  \n![9781484200834_FigAppA-19.jpg](img/9781484200834_FigAppA-19.jpg)\n\n**图 A-19.\
  \ 配置 SSISConfig 共享数据源**\n\n您现在准备好构建报告了！让我们从创建一个显示应用程序实例数据的报告开始。\n\n在我们投入报告开发之前，我们将在\
  \ `SSISConfig` 数据库中创建支持对象。清单 A-21……\n\n\n\n### 创建 rpt 架构和 rpt.ReturnAppInstanceHeader\
  \ 存储过程\n\n**清单 A-21** 包含了构建 `rpt` 架构和 `rpt.ReturnAppInstanceHeader` 存储过程所需的 T-SQL\
  \ 脚本。\n\n```sql\n/* rpt 架构 */\nIf Not Exists(Select name\n              From sys.schemas\n\
  \              Where name = 'rpt')\n begin\n  print '正在创建 rpt 架构'\n  declare @sql\
  \ varchar(100) = 'Create Schema rpt'\n  exec(@sql)\n  print 'Rpt 架构已创建'\n end\n\
  Else\n print 'Rpt 架构已存在。'\nprint ''\n\n/* rpt.ReturnAppInstanceHeader 存储过程 */\n\
  If Exists(Select s.name + '.' + p.name\n          From sys.procedures p\n      \
  \    Join sys.schemas s\n            On s.schema_id = p.schema_id\n          Where\
  \ s.name = 'rpt'\n            And p.name = 'ReturnAppInstanceHeader')\n begin\n\
  \  print '正在删除 rpt.ReturnAppInstanceHeader 存储过程'\n  Drop Procedure rpt.ReturnAppInstanceHeader\n\
  \  print 'Rpt.ReturnAppInstanceHeader 存储过程已删除'\n end\nprint '正在创建 rpt.ReturnAppInstanceHeader\
  \ 存储过程'\ngo\n\nCreate Procedure rpt.ReturnAppInstanceHeader\n @ApplicationName varchar(255)\
  \ = NULL\nAs\n\n  Select a.ApplicationID\n       ,ap.AppInstanceID\n       ,a.ApplicationName\n\
  \       ,ap.StartDateTime\n       ,DateDiff(ss,ap.StartDateTime,Coalesce(ap.EndDateTime,GetDate()))\
  \ As RunSeconds\n       ,ap.Status\n  From log.SSISAppInstance ap\n  Join cfg.Applications\
  \ a\n    On ap.ApplicationID = a.ApplicationID\n  Where a.ApplicationName = Coalesce(@ApplicationName,a.ApplicationName)\n\
  \  Order by AppInstanceID desc\n\ngo\nprint 'Rpt.ReturnAppInstanceHeader 存储过程已创建。'\n\
  print ''\n```\n\n### 在 SSDT 中创建报表\n\n返回 `SSDT`，在`解决方案资源管理器`中右键单击`报表`虚拟文件夹，然后单击`添加新报表`。如果显示欢迎屏幕，则单击`下一步`按钮。在`选择数据源`屏幕上，选择名为\
  \ `SSISConfig` 的共享数据源，然后单击`下一步`按钮。接下来显示`设计查询`窗口；将 `rpt.ReturnAppInstanceHeader`\
  \ 添加到`查询字符串`文本框中，然后单击`下一步`按钮。在`选择报表类型`页面上选择`表格`，然后单击`下一步`按钮。当`设计表`页面显示时，在`可用字段`列表框中多选所有列，然后单击`详细信息`按钮。报表向导将显示如\
  \ 图 A-20 所示。\n\n![9781484200834_FigAppA-20.jpg](img/9781484200834_FigAppA-20.jpg)\n\
  \n图 A-20. 将所有可用字段选择为详细信息\n\n单击`下一步`按钮。在`选择表样式`页面上选择一个主题，然后单击`下一步`按钮。在`完成向导`页面上，在`报表名称`属性文本框中输入**应用程序实例**，然后单击`完成`按钮。\n\
  \n`SSRS 报表向导`将生成报表，但它对存储过程的管理效率不高。你需要更改设置以使报表获得最佳性能。单击`视图` -> `报表数据`以显示`报表数据`侧边栏。展开`数据集`虚拟文件夹。右键单击\
  \ `DataSet1` 并单击`数据集属性`。当`数据集属性`窗口显示时，将数据集重命名为 `rpt_ReturnAppInstanceHeader`（`数据集名称`属性不喜欢句点）。将\
  \ `rpt.ReturnAppInstanceHeader` 从`查询`属性中复制出来，并单击`查询类型`下的`存储过程`选项。将 `rpt.ReturnAppInstanceHeader`\
  \ 粘贴到`选择或输入存储过程名称`下拉列表中。`数据集属性`窗口应类似于 图 A-21 所示。\n\n![9781484200834_FigAppA-21.jpg](img/9781484200834_FigAppA-21.jpg)\n\
  \n图 A-21. 配置数据集以使用 rpt.ReturnAppInstanceHeader 存储过程\n\n单击`确定`按钮关闭`数据集属性`窗口。\n\n\
  ### 配置报表参数\n\n如果单击`预览`选项卡，报表将提示您输入应用程序名称，如 图 A-22 所示。\n\n![9781484200834_FigAppA-22.jpg](img/9781484200834_FigAppA-22.jpg)\n\
  \n图 A-22. 提示输入应用程序名称\n\n在文本框中输入 **SSISApp1**，然后单击右上角的`查看报表`按钮。我们不希望用户每次使用报表时都提供\
  \ SSIS 应用程序名称，因此让我们配置名为 `@ApplicationName` 的报表参数。单击`设计`选项卡并返回到`报表数据`侧边栏。展开`参数`虚拟文件夹。双击\
  \ `@ApplicationName` 以打开`报表参数属性`窗口。在`常规`页面上，勾选`允许空值`复选框，并将`选择参数可见性`选项更改为`隐藏`。在`默认值`页面上，选择`指定值`选项，然后单击`添加`按钮。一个\
  \ `(Null)` 行将被添加到`值`网格中，这正是我们想要的。单击`确定`按钮关闭`报表参数属性`窗口。\n\n通过单击`预览`选项卡测试更改。报表应显示数据库中存储的所有应用程序实例行，如\
  \ 图 A-23 所示。\n\n![9781484200834_FigAppA-23.jpg](img/9781484200834_FigAppA-23.jpg)\n\
  \n图 A-23. 显示应用程序实例数据\n\n### 移除 0 行\n\n我们不想在这些报表中看到显示的 `0` 行。通过执行 清单 A-22 中所示的 T-SQL\
  \ 来修改 `rpt.ReturnAppInstanceHeader` 存储过程，以将这些记录从返回结果中排除。\n\n**清单 A-22**. 更新 rpt.ReturnAppInstanceHeader\
  \ 存储过程\n\n```sql\n/* rpt.ReturnAppInstanceHeader 存储过程 */\nIf Exists(Select s.name\
  \ + '.' + p.name\n          From sys.procedures p\n          Join sys.schemas s\n\
  \            On s.schema_id = p.schema_id\n          Where s.name = 'rpt'\n    \
  \        And p.name = 'ReturnAppInstanceHeader')\n begin\n  print '正在删除 rpt.ReturnAppInstanceHeader\
  \ 存储过程'\n  Drop Procedure rpt.ReturnAppInstanceHeader\n  print 'Rpt.ReturnAppInstanceHeader\
  \ 存储过程已删除'\n end\nprint '正在创建 rpt.ReturnAppInstanceHeader 存储过程'\ngo\n\nCreate Procedure\
  \ rpt.ReturnAppInstanceHeader\n @ApplicationName varchar(255) = NULL\nAs\n\n  Select\
  \ a.ApplicationID\n       ,ap.AppInstanceID\n       ,a.ApplicationName\n       ,ap.StartDateTime\n\
  \       ,DateDiff(ss,ap.StartDateTime,Coalesce(ap.EndDateTime,GetDate())) As RunSeconds\n\
  \       ,ap.Status\n  From log.SSISAppInstance ap\n  Join cfg.Applications a\n \
  \   On ap.ApplicationID = a.ApplicationID\n  Where a.ApplicationName = Coalesce(@ApplicationName,a.ApplicationName)\n\
  \  And a.ApplicationID > 0\n  Order by AppInstanceID desc\n\ngo\nprint 'Rpt.ReturnAppInstanceHeader\
  \ 存储过程已创建。'\nprint ''\n```\n\n刷新应用程序实例报表预览，它现在显示如 图 A-24 所示。\n\n![9781484200834_FigAppA-24.jpg](img/9781484200834_FigAppA-24.jpg)\n\
  \n图 A-24. 刷新后的应用程序实例报表，不含 0 行\n\n### 添加条件背景色\n\n颜色比大多数视觉提示更能帮助识别状态。要为数据行添加背景色，请返回到`设计`选项卡并选择表中显示数据值的行（底部行）。按\
  \ `F4` 键显示`属性`，然后单击`背景色`属性。在`背景色`属性的值下拉列表中，选择`表达式`。当`表达式`窗口打开时，将`设置表达式 for: BackgroundColor`文本框中的文本从`无颜色`（默认值）更改为以下表达式：\n\
  \n```vb\n=Switch(Fields!Status.Value=\"Success\", \"LightGreen\" , Fields!Status.Value=\"\
  Failed\", \"LightCoral\" , Fields!Status.Value=\"Running\", \"LightBlue\" , Fields!Status.Value=\"\
  Cancelled\", \"LightYellow\")\n```\n\n\n\n\nValue=\"Running\", \"Yellow\")\n\n当您通过移除对用户意义不大的\
  \ ID 列、重置字体大小、更改文本对齐方式以及调整列宽来清理报告时，可以将报告修改为如图 A-25 所示的外观。\n\n![9781484200834_FigAppA-25.jpg](img/9781484200834_FigAppA-25.jpg)\n\
  \n图 A-25. 应用程序实例——彩色显示！\n\n我称之为运营智能。企业运营人员查看此报告，可以获取有关当前企业数据集成过程状态的大量信息。\n\n包实例报告非常相似。让我们首先将存储过程添加到数据库，如清单\
  \ A-23 所示。\n\n#### 清单 A-23. 添加 rpt.ReturnPkgInstanceHeader 存储过程\n\n```sql\n/* rpt.ReturnPkgInstanceHeader\
  \ stored procedure */\nIf Exists(Select s.name + '.' + p.name\n          From sys.procedures\
  \ p\n          Join sys.schemas s\n            On s.schema_id = p.schema_id\n  \
  \        Where s.name = 'rpt'\n            And p.name = 'ReturnPkgInstanceHeader')\n\
  \ begin\n   print 'Dropping rpt.ReturnPkgInstanceHeader stored procedure'\n   Drop\
  \ Procedure rpt.ReturnPkgInstanceHeader\n   print 'Rpt.ReturnPkgInstanceHeader stored\
  \ procedure dropped'\n end\n\nprint 'Creating rpt.ReturnPkgInstanceHeader stored\
  \ procedure'\ngo\n\nCreate Procedure rpt.ReturnPkgInstanceHeader\n @AppInstanceID\
  \ int\nAs\n              SELECT a.ApplicationName\n                     ,p.PackageFolder\
  \ + p.PackageName As PackagePath\n                     ,cp.StartDateTime\n     \
  \                ,DateDiff(ss, cp.StartDateTime, Coalesce(cp.EndDateTime,GetDate()))\
  \ As RunSeconds\n                     ,cp.Status\n                     ,ai.AppInstanceID\n\
  \                     ,cp.PkgInstanceID\n                     ,p.PackageID\n   \
  \                  ,p.PackageName\n                FROM log.SSISPkgInstance cp\n\
  \                Join cfg.AppPackages ap\n                    on ap.AppPackageID\
  \ = cp.AppPackageID\n               Join cfg.Packages p\n                    on\
  \ p.PackageID = ap.PackageID\n               Join log.SSISAppInstance ai\n     \
  \               on ai.AppInstanceID = cp.AppInstanceID\n               Join cfg.Applications\
  \ a\n                    on a.ApplicationID = ap.ApplicationID\n              WHERE\
  \ ai.AppInstanceID = Coalesce(@AppInstanceID,ai.AppInstanceID)\n               \
  \ And a.ApplicationID > 0\n              Order By cp.PkgInstanceID desc\ngo\n\n\
  print 'Rpt.ReturnPkgInstanceHeader stored procedure created.'\nprint ''\n```\n\n\
  在 SSDT 中，像添加应用程序实例报告一样，添加一个名为 `Package Instance` 的新报告。确保使用 `rpt.ReturnPkgInstanceHeader`\
  \ 存储过程。要让报表向导识别需要参数的查询，您需要在“设计查询”页面添加默认参数值。我的查询字符串文本框内容如下：\n\n```sql\nexec rpt.ReturnPkgInstanceHeader\
  \ NULL\n```\n\n这允许查询生成器定位从存储过程返回的列列表（这是报表向导继续操作所需要的）。报告构建完成后，请记住首先更新数据集，然后更新报告参数，就像您为应用程序实例报告所做的那样。此特定设计的一个很酷的地方是我们可以重用数据行上\
  \ `BackgroundColor` 的表达式。完成后，包实例报告显示如图 A-26。\n\n![9781484200834_FigAppA-26.jpg](img/9781484200834_FigAppA-26.jpg)\n\
  \n图 A-26. 包实例报告\n\n包实例是应用程序实例的“子级”。为了反映这种关系，请返回到应用程序实例报告并向表中添加一列以包含“包”链接。在列标题和数据单元格的文本中输入\
  \ `Packages`。\n\n右键单击数据单元格，然后单击“文本框属性”。在“字体”页面上，将字体颜色更改为蓝色并将“效果”属性设置为“下划线”。在“操作”页面上，为“启用操作”属性选择“转到报告”选项，并将“指定报告”属性设置为\
  \ `Package Instance`。在“使用这些参数运行报告”网格中，单击“添加”按钮并将 `AppInstanceID` 参数映射到 `[AppinstanceID]`\
  \ 值。单击“确定”按钮关闭“文本框属性编辑器”。\n\n单击“预览”选项卡以显示应用程序实例报告。选择一个“包”链接导航到将仅包含与该特定应用程序实例相关的包实例的包实例报告。包实例报告应显示为类似于图\
  \ A-27 中显示的包实例报告。\n\n![9781484200834_FigAppA-27.jpg](img/9781484200834_FigAppA-27.jpg)\n\
  \n图 A-27. 单个应用程序实例的包实例\n\n以这种方式构建报告是有意义的。应用程序实例报告成为包实例报告的“网关”——可以说是“仪表盘”。稍后会详细介绍……\n\
  \n让我们将注意力转向错误日志数据。要检索它，请使用清单 A-24 中所示的 T-SQL 脚本。\n\n#### 清单 A-24. 构建 rpt.ReturnErrors\
  \ 存储过程\n\n```sql\n/* rpt.ReturnErrors stored procedure */\nIf Exists(Select s.name\
  \ + '.' + p.name\n          From sys.procedures p\n          Join sys.schemas s\n\
  \            On s.schema_id = p.schema_id\n          Where s.name = 'rpt'\n    \
  \        And p.name = 'ReturnErrors')\n begin\n   print 'Dropping rpt.ReturnErrors\
  \ stored procedure'\n   Drop Procedure rpt.ReturnErrors\n   print 'Rpt.ReturnErrors\
  \ stored procedure dropped'\n end\n\nprint 'Creating rpt.ReturnErrors stored procedure'\n\
  go\n\nCreate Procedure rpt.ReturnErrors\n  @AppInstanceID int\n ,@PkgInstanceID\
  \ int = NULL\nAs\n  Select\n     a.ApplicationName\n   ,p.PackageName\n   ,er.SourceName\n\
  \   ,er.ErrorDateTime\n   ,er.ErrorDescription\n From log.SSISErrors er\n Join log.SSISAppInstance\
  \ ai\n     On ai.AppInstanceID = er.AppInstanceID\n Join cfg.Applications a\n  \
  \   On a.ApplicationID = ai.ApplicationID\n Join log.SSISPkgInstance cp\n     On\
  \ cp.PkgInstanceID = er.PkgInstanceID\n         And cp.AppInstanceID = er.AppInstanceID\n\
  \ Join cfg.AppPackages ap\n     On ap.AppPackageID = cp.AppPackageID\n Join cfg.Packages\
  \ p\n     On p.PackageID = ap.PackageID\n Where er.AppInstanceID = Coalesce(@AppInstanceID,\
  \ er.AppInstanceID)\n     And er.PkgInstanceID = Coalesce(@PkgInstanceID, er.PkgInstanceID)\n\
  \ Order By ErrorDateTime Desc\ngo\n\nprint 'Rpt.ReturnErrors stored procedure created.'\n\
  print ''\n```\n\n清单 A-24 中的 T-SQL 构建了 `rpt.ReturnErrors` 存储过程，它将为新的报告提供数据。现在让我们在\
  \ SSDT 中构建该报告。\n\n在 `SSISConfig2012Reports` 解决方案中添加一个名为 `Errors` 的新报告。使用 `rpt.ReturnErrors`\
  \ 存储过程作为源。请记住更新数据集和两个报告参数：`AppinstanceID` 和 `PkgInstanceID`。\n\n在表的数据行上，编辑 `BackgroundColor`\
  \ 属性，添加以下表达式：\n\n```vbnet\n=Iif(RowNumber(Nothing) Mod 2 = 0,\"White\",\"WhiteSmoke\"\
  )\n```\n\n我们在这里不是为了反映状态而对每个单元格的背景进行着色；如果我们这样做，报告将充满 `LightCoral`。但我们需要在视觉上分隔这些行，因此让我们使用微妙的阴影来帮助眼睛在凌晨\
  \ 2:15 某个黑暗而沉闷的早晨扫视整行。\n\n打开应用程序实例报告。右键单击 `Status` 数据字段，然后单击“文本框属性”。导航到“字体”页面，然后单击“颜色”属性下拉列表旁边的\
  \ `f(x)` 按钮。在“为 Color 设置表达式”文本框中，输入以下表达式：\n\n```vbnet\n=Iif(Fields!Status.\n\n\n\
  \n### 配置 SSIS 报告中的超链接与装饰\n\n### 修改 Application Instance 报告的状态字段\n\n首先，在 Application\
  \ Instance 报告中修改`Status`字段。\n\n在`Set Expression for: Color`文本框中输入以下表达式，将状态文本颜色改为蓝色：\n\
  ```\n=Iif(Fields!Status.Value=\"Failed\", \"Blue\", \"Black\")\n```\n\n如果状态是`\"\
  Failed\"`，此表达式会将状态文本颜色更改为蓝色。\n\n点击效果属性下拉列表旁的 f(x)按钮。在`Set Expression for: TextDecoration`文本框中，添加以下表达式：\n\
  ```\n=Iif(Fields!Status.Value=\"Failed\", \"Underline\", \"Default\")\n```\n\n此表达式将为`\"\
  Failed\"`状态添加下划线。它与前一个属性结合，使`\"Failed\"`状态显示为超链接。\n\n### 配置超链接目标\n\n现在配置该超链接的导航属性。转到“操作”页面，在“启用为操作”属性中选择“转到报表”选项。\n\
  \n点击“指定报表”下拉列表旁的 f(x)按钮，并在`Set Expression for: ReportName`文本框中添加以下表达式：\n```\n=Iif(Fields!Status.Value=\"\
  Failed\", \"Errors\", Nothing)\n```\n\n点击“添加”按钮，将`AppInstanceID`参数名称映射到`[AppInstanceID]`参数值。\n\
  \n点击参数映射中`Omit`列的 f(x)按钮，并在`Set Expression for: Omit`文本框中添加以下表达式：\n```\n=Iif(Fields!Status.Value=\"\
  Failed\", False, True)\n```\n\n以上两个属性设置配置了`Status`值的“操作”属性。如果状态是`\"Failed\"`，点击将显示为超链接的单词*Failed*，将导致显示“错误”报表。显示时，它将仅显示与该数据行中应用程序实例相关联的错误行。\n\
  \n### 测试 Application Instance 报告\n\n测试一下！当我运行“应用程序实例”报表时，它现在显示如图 A-28 所示。\n![9781484200834_FigAppA-28.jpg](img/9781484200834_FigAppA-28.jpg)\n\
