  \ `cfg.AddSSISPackage` 存储过程来添加它，该过程返回 `PackageID` 参数。如果包元数据存在，则执行一条填充 `PackageID`\
  \ 参数的语句。\n\n添加到 `stringbuilder` 中的 Transact-SQL 的下一部分是一个类似的部分，用于关联 SSIS 包和应用程序元数据。这是通过向\
