  \ SSIS 包\n\n测试将表明其他 SSIS 包也执行得类似。\n\n### 结论\n\n在本章中，我们简要介绍了 Business Intelligence\
  \ Markup Language 的一些功能。\n\n我们展示了它作为领域特定语言在生成 SSIS 设计模式方面的实用性，重点关注增量加载模式。在最后一个例子中，我们演示了\
  \ Biml 集成的 .NET 功能，BimlScript，如何被用来创建一种基于模式的方法，使用经过验证的数据集成模式（增量加载）构建四个 SSIS 包。在我的机器上，这四个包在几秒钟内就生成了。我向你保证，根据测试，Biml\
  \ 可以在几分钟内生成数百个增量加载 SSIS 包。这是一项改变游戏规则的技术，因为生成数百个 SSIS 包——即使使用模板和模式——也可能轻松消耗数据集成开发人员数月的时间。\n\
  \n# 第 20 章\n\n![image](img/frontdot.jpg)\n\n### Biml 与 SSIS 框架\n\n优雅的解决方案会带来更优雅的解决方案。这是优雅解决方案的一个特征，而\
  \ Business Intelligence Markup Language (Biml) *就是*一个优雅的解决方案。Biml 促进了 SSIS 包的快速开发。尽管这令人印象深刻，但\
  \ Biml 可以做得更多——多得多。我们无法在本卷中探索 Biml 的完整功能集，但我想研究一些额外的功能。\n\n在本章中，我们将基于《Business Intelligence\
  \ Markup Language》一章中的示例文件进行构建，添加一些额外的文件和功能。\n\n### 将 Biml 与 SSIS 框架配合使用\n\n附录 A\
  \ 展示了构建基于文件系统的 SSIS Framework 的源代码。由于 SSIS 2014 通过 Package Deployment Model 支持向后兼容性，因此你可以在所有版本的\
  \ SSIS（迄今为止）中使用此 Framework。本章中的示例旨在与附录 A 中描述的 Framework 进行交互。\n\n![Image](img/sq.jpg)\
  \ **注意** 要完成以下示例，你将需要实现附录 A 中的 Framework 并完成名为 *Business Intelligence Markup Language*\
  \ 的章节中的示例。\n\n### 向框架添加 SSIS 包元数据\n\n打开在 Business Intelligence Markup Language 章节中创建的解决方案。解决方案应命名为“Biml2014.sln”。添加一个新的\
  \ Biml 文件并将其重命名为“FrameworkSQLGen.biml”。添加第二个新的 Biml 文件并将其重命名为“i-FrameworkSQLGen.biml”。我将使用\
  \ i-FrameworkSQLGen.biml 文件来演示参数化 Biml 解决方案。\n\n将以下 BimlScript 添加到 i-FrameworkSQLGen.biml\
  \ 中，如清单 20-1 所示：\n\n***清单 20-1***. 手动向 Framework 添加 SSIS 应用程序元数据\n\n```\n<# string\
  \ applicationName = \"Staging_Application\"; string packageFolder = \"I:\\\\Andy\\\
  \\Projects\\\\BIML Demo\\\\\"; string filename = @\"G:\\out\\MyFile.sql\"; string\
  \ connectionString = \"Data Source=(local);Initial Catalog=SSISIncrementalLoad_Source;Provider=SQLNCLI11.1;Integrated\
  \ Security=SSPI;\"; #>\n```\n\n清单 20-1 中显示的 BimlScript 是一个代码片段，包含带有初始值的变量声明。`applicationName`\
  \ 变量是一个字符串，包含我要添加到 SSIS Framework 的 SSIS 应用程序的名称。`packageFolder` 字符串包含我在 Business\
  \ Intelligence Markup Language 章节示例代码中生成的 SSIS 包的位置。`filename` 字符串变量包含将由 FrameworkSQLGen.biml\
  \ 文件生成的 SQL 文件的完整路径。`connectionString` 变量包含此解决方案和 Business Intelligence Markup Language\
  \ 章节中的示例所使用的源数据库的连接信息。\n\n打开 FrameworkSQLGen.biml 文件并添加清单 20-2 中所示的代码：\n\n***清单\
  \ 20-2***. 开始编写 FrameworkSQLGen.biml 文件\n\n```\n<#@ template language=\"C#\" tier=\"\
  1\" #> <#@ include file=\"i-FrameworkSQLGen.biml\" #> <#@ import namespace=\"System.Data\"\
  \ #> <#@ import namespace=\"System.\n```\n\n\n\n文本\n\n#> <#@ import namespace=\"\
  System.IO\" #> <#@ import namespace=\"Varigence.Hadron.CoreLowerer.SchemaManagement\"\
  \ #> <# var connection = SchemaManager.CreateConnectionNode(\"SchemaProvider\",\
  \ connectionString); #> <# var tables = connection.GenerateTableNodes();     int\
  \ e = 10;     StringBuilder sb = new StringBuilder(); #>\n\n第 1 行的模板指令指明了我将在此文件中使用的\
  \ .Net 语言（C#）以及该文件的“层级”。\n\n![Image](img/sq.jpg) **注意** 了解更多关于 Biml 层级和语言元素的信息，请参阅\
  \ Reeves Smith 在 SQLServerCentral.com 上的优秀文章《Stairway to Biml Level 5 - Biml Language\
  \ Elements》(`http://www.sqlservercentral.com/articles/BIML/111305/`)。\n\n### 包含文件和命名空间\n\
  \n接下来是“包含文件”指令，它指向我先构建的 `i-FrameworkSQLGen.biml` 文件。包含此文件意味着在 `i-FrameworkSQLGen.biml`\
  \ 中定义的变量在 `FrameworkSQLGen.biml` 文件中也可用。然后我包含了四个命名空间：`System.Data`、`System.IO`、`System.Text`\
  \ 和 `Varigence.Hadron.CoreLowerer.SchemaManagement`。前三个指的是 .Net 库；第四个提供了对 Biml 程序集的引用。\n\
  \n### C# 应用程序逻辑\n\n从第 7 行开始，C# 应用程序逻辑正式开始，首先是声明并初始化名为 `connection` 的变量。`connection`\
  \ 通过 `CreateConnectionNode` 方法被设置为 `SchemaManager` 对象的 `ConnectionNode` 对象。这个 `ConnectionNode`\
  \ 指向从 `i-FrameworkSQLGen.biml` 包含文件中的 `connectionString` 变量提供的连接字符串。\n\n另一个名为 `tables`\
  \ 的 C# 变量使用 `connection` 变量的 `GenerateTableNodes` 方法进行声明和初始化。`GenerateTableNodes`\
  \ 方法创建一个表对象的集合，以供 BimlScript 使用。\n\n另外声明并初始化了两个变量：一个名为 `e` 的 `int` 变量，将用于枚举框架中包的执行顺序；以及一个名为\
  \ `sb` 的 `StringBuilder` 变量，将用于构建用于加载 SSIS 应用程序框架元数据的 Transact-SQL 命令。\n\n### 添加\
  \ SSIS 应用程序元数据\n\n用于向框架添加 SSIS 应用程序的 Transact-SQL 脚本列在附录 A 的图 A-7 中，并在 清单 20-3 中展示。\n\
  \n**清单 20-3**. 手动向框架添加 SSIS 应用程序元数据\n\n```sql\nUse SSISConfig\nGo\n\ndeclare @ApplicationName\
  \ varchar(255) = 'SSISApp1'\ndeclare @ApplicationID int\n\n/* Add the SSIS First\
  \ Application */\nIf Not Exists(Select ApplicationName\n              From cfg.Applications\n\
  \              Where ApplicationName = @ApplicationName)\n begin\n  print 'Adding\
  \ ' + @ApplicationName\n  exec cfg.AddSSISApplication @ApplicationName, @ApplicationID\
  \ output\n  print @ApplicationName + ' added.'\n end\nElse\n begin\n  Select @ApplicationID\
  \ = ApplicationID\n  From cfg.Applications\n  Where ApplicationName = @ApplicationName\n\
  \  print @ApplicationName + ' already exists in the Framework.'\n end\nprint ''\n\
  ```\n\n将此代码放在 `FrameworkSQLGen.biml` 中清单 2 的代码之后。我需要将此 Transact-SQL 加载到 `stringbuilder`\
  \ 变量 (`sb`) 中，并且需要通过利用包含文件中的变量使其通用化。通过如 清单 20-4 所示将代码加载到 `stringbuilder` 中来实现这一点：\n\
  \n**清单 20-4**. 将 SSIS 应用程序元数据添加到 StringBuilder\n\n```csharp\nsb.AppendLine(\"Use\
