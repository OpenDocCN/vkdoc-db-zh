  \    图 A-33。完成的包实例报告\n\n点击 `Events` 链接将带我进入 `Events` 报告，并仅显示引用行上包实例的事件。\n\n总结一下，你可以从应用程序实例报告开始；它位于仪表板上。点击“包”链接可查看作为选定\
  \ SSIS 应用程序实例一部分执行的所有 SSIS 子包。从那里，可以深入查看错误报告，并观察导致包失败的错误，或者在 `Events` 报告中查看所选包实例的\
  \ `OnInformation` 事件处理程序记录的所有事件。你也可以从应用程序实例报告中访问 SSIS 应用程序实例的所有错误和事件。\n\n### 结论\n\
  \n此示例并非 SSIS 框架的详尽示例，但它展示了使用 SSIS 进行基于模式的数据集成开发的实用性。该示例框架提供了可重复的、元数据驱动的 SSIS 执行，而无需离开\
  \ SSIS 和 SQL Server 数据库领域。监控由一组 SQL Server Reporting Services 报告提供，这些报告由存储过程驱动，这些存储过程读取框架的\
  \ `Parent.dtsx` SSIS 包自动捕获的元数据。在子包中捕获错误和事件信息无需编写代码行，并且这些信息以一致的格式集中记录，这使其非常适合进行报告。\n\
