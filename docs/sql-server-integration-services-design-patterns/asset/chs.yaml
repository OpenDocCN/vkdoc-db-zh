  ```\n\n关于 T-SQL 脚本中展示的一点说明。这不是我将元数据加载到生产（甚至测试）环境的方式。我不会重新声明 `ApplicationName`、`PackageFolder`、`PackageName`、`ApplicationID`\
  \ 和 `PackageID` 这些变量；相反，我会复用前面 T-SQL 脚本中的这些值。我之前提到过，我们稍后将使用 `ApplicationID` 和 `PackageID`\
  \ 的值，这正是对此的暗示。我将在本附录后面提供完整的 T-SQL 元数据加载脚本。\n\n### 在 T-SQL 中检索 SSIS 应用程序\n\n现在，SSIS\
  \ 应用程序元数据已存储在 `SSISConfig` 数据库中。太好了，接下来呢？是时候构建一个存储过程，以便为给定的 SSIS 应用程序返回我们想要的 SSIS\
  \ 包元数据了。清单 A-10 包含了用于构建名为 `cfg.GetSSISApplication` 的存储过程的 T-SQL 数据定义语言脚本。\n\n***清单\
  \ A-10***. 创建 `cfg.GetSSISApplication` 存储过程\n\n```\n/* cfg.GetSSISApplication 存储过程\
  \ */\nIf Exists(Select s.name + '.' + p.name\n          From sys.procedures p\n\
  \          Join sys.schemas s\n            On s.schema_id = p.schema_id\n      \
  \    Where s.name = 'cfg'\n            And p.name = 'GetSSISApplication')\n begin\n\
  \  print '正在删除 cfg.GetSSISApplication 存储过程'\n  Drop Procedure cfg.GetSSISApplication\n\
  \  print 'Cfg.GetSSISApplication 存储过程已删除'\n end\n\nprint '正在创建 cfg.GetSSISApplication\
  \ 存储过程'\ngo\n\nCreate Procedure cfg.GetSSISApplication\n @ApplicationName varchar(255)\n\
  As\n Select p.PackageFolder + p.PackageName As PackagePath\n     , ap.ExecutionOrder\n\
  \     , p.PackageName\n     , p.PackageFolder\n     , ap.AppPackageID\n From cfg.AppPackages\
  \ ap\n Inner Join cfg.Packages p on p.PackageID = ap.PackageID\n Inner Join cfg.Applications\
  \ a on a.ApplicationID = ap.ApplicationID\n Where ApplicationName = @ApplicationName\n\
  \ Order By ap.ExecutionOrder\ngo\n\nprint 'Cfg.GetSSISApplication 存储过程已创建.'\nprint\
  \ ''\n```\n\n清单 A-10 中所示的 `cfg.GetSSISApplication` 存储过程接受一个参数——`ApplicationName`——并使用此值查找与该名称的\
  \ SSIS 应用程序关联的 SSIS 包。注意返回的列：\n\n*   `PackagePath`\n*   `ExecutionOrder`\n*   `PackageName`\n\
  *   `PackagePath`\n\n还需注意，SSIS 包是按照 `ExecutionOrder` 指定的顺序返回的。\n\n现在，通过执行以下 T-SQL\
  \ 语句，使用 `SSISConfig` 数据库中的现有元数据来测试该存储过程：\n\n```\nexec cfg.GetSSISApplication 'SSISApp1'\n\
  ```\n\n我的结果显示如图 A-7 所示。\n\n![9781484200834_FigAppA-07.jpg](img/9781484200834_FigAppA-07.jpg)\n\
