- '# 第 13 章


  ### 缓慢变化维度


  处理缓慢变化维度（SCD）是处理数据仓库时常见的 ETL 操作。SSIS 数据流提供了一个 SCD 转换组件，该组件通过一个向导输出一组转换，用于处理处理 SCD
  的多个步骤。虽然内置的 SCD 转换很有用，但它并不适用于所有数据加载场景。本章将介绍如何充分利用 SCD 转换，并提供几种可供使用的替代模式。


  ![Image](img/sq.jpg) **注意** SCD 有多种不同类型，但本章将重点介绍两种最常见的类型：类型 1 和类型 2。有关不同类型的 SCD
  的更多信息，请参见维基百科条目 `http://en.wikipedia.org/wiki/Slowly_changing_dimensions`。


  ### 缓慢变化维度转换组件


  为了最好地理解 SCD 转换，让我们考虑它所设计的两个关键场景：


  *   **少量变更行：** 你在源头或尽可能靠近源头的地方执行变更数据捕获（CDC）。除非你处理的是一个非常活跃的维度，否则大多数 SCD 处理批次只会包含少量行。

  *   **大型维度：** 你正在处理大型维度，但只处理少量变更行。你需要避免执行对维度进行全表扫描的操作。


  由于这些目标场景，SCD 转换不会缓存现有的维度数据（像查找转换那样），而是针对目标表逐行执行所有比较。虽然这使得该转换能够避免对目标维度进行全表扫描并减少内存使用，但当你处理大量行时，它确实会影响性能。如果你的场景不符合这些情况，你可能需要考虑使用本章中的其他模式。如果符合，或者如果你更喜欢使用开箱即用的组件而非第三方解决方案（或者你只是想避免合并模式所需的自定义
  SQL 语句），那么可以考虑应用本模式末尾列出的优化措施。


  ### 运行向导


  与其他 SSIS 数据流组件不同，当你将 SCD 转换拖放到商业智能开发工作室（BIDS）中的设计界面时，会弹出一个向导，引导你完成设置 SCD 处理的步骤。


  向导的第一页（图 13-1）允许你选择要更新的维度以及构成业务键（也称自然键）的一个或多个列。


  ![9781484200834_Fig13-01.jpg](img/9781484200834_Fig13-01.jpg)


  图 13-1. 在缓慢变化维度向导中选择维度表和键


  在下一页（图 13-2）上，你需要指定要处理的列，并确定希望向导如何对待它们。你有三种选择（如表 13-1 所示）。


  ![9781484200834_Fig13-02.jpg](img/9781484200834_Fig13-02.jpg)


  图 13-2. 在缓慢变化维度向导中选择维度表和键


  表 13-1. 列变更类型


  | 变更类型 | 维度类型 | 何时使用 |

  | --- | --- | --- |

  | 固定属性 | — | 固定属性是指不应更改或在更改时需要特殊处理的列。默认情况下，对这些列之一的更改将被视为错误。 |

  | 可变属性 | 类型 1 | 当对可变属性列进行更改时，现有记录将被更新以反映新值。这些通常是不用作业务逻辑或时间敏感报告查询的一部分的列，例如产品描述。 |

  | 历史属性 | 类型 2 | 历史属性是指你需要维护其历史的列。这些通常是用于时间敏感报告查询的数值列，例如销售价格或重量。 |


  在此页面上，你不应映射那些不会作为 SCD 处理的一部分而更新的列，例如指向其他维度表的外键或与跟踪历史变更相关的列——例如开始日期和结束日期列、过期标志或代理键。SCD
  转换不支持大对象（LOB）列（在 SSIS 数据流中被视为 `DT_IMAGE`、`DT_TEXT` 和 `DT_NTEXT` 类型的列），因此这些列应单独处理，也不应在此处映射。


  '
- "# 第 12 章\n\n![9781484200834_Fig12-04.jpg](img/9781484200834_Fig12-04.jpg)\n\n图\
  \ 12-4. OData 源编辑器中的预览对话框\n\n配置集合或资源路径值后，你可以通过单击“列”页面（如图 12-5 所示）来选择要为数据流检索的列。此对话框使用标准的\
  \ SSIS 外部列对话框，SSIS 开发人员应该很熟悉。请注意，此页面上未选中的列不会添加到你的数据流中，但它们仍会通过请求被下拉到服务中。如果你只选择某个源中的少数几列，你可能希望使用\
  \ `$select` 查询选项预先限制列。有关查询选项的更多信息可在表 12-3 中找到。\n\n![9781484200834_Fig12-05.jpg](img/9781484200834_Fig12-05.jpg)\n\
  \n图 12-5. OData 源编辑器的“列”页面\n\n### 覆盖数据类型\n\nOData 源允许你为某些类型手动覆盖输出列的数据类型。当你使用的 OData\
  \ 服务未为字符串和二进制字段指定最大长度值时，这会非常方便。SSIS 会分别映射到 `DT_NTEXT` 和 `DT_IMAGE` 类型，这可能会对性能产生负面影响。你可以使用高级编辑器（如图\
  \ 12-6 所示）更改列的默认数据类型。\n\n![9781484200834_Fig12-06.jpg](img/9781484200834_Fig12-06.jpg)\n\
  \n图 12-6. OData 源的高级编辑器\n\n以下是修改默认数据类型的方法：\n\n1.  向数据流添加一个 OData 源，并配置其连接管理器以及要访问的数据。\n\
  2.  单击“确定”保存设置。\n3.  在数据流的设计界面上，右键单击 OData 源组件，然后选择“显示高级编辑器”。\n4.  选择“输入和输出属性”选项卡。\n\
  5.  展开“输出”文件夹。\n6.  展开“输出列”文件夹。\n7.  选择要修改的列。\n8.  选择 `DataType` 属性。\n9.  将值更改为新的\
  \ SSIS 数据类型，并在适用时更改 `Length` 值。\n\n你只能更改某些类型的 `DataType` 属性。表 12-5 包含可互换数据类型的列表。为不支持的数据类型更改值将导致错误消息（`COMException\
  \ 0xC020837D`）。\n\n表 12-5. 可更改的数据类型\n\n| 数据类型 | 兼容类型 |\n| --- | --- |\n| `DT_NTEXT`\
  \ | `DT_WSTR` |\n| `DT_IMAGE` | `DT_BYTES` |\n| `DT_DBTIMESTAMP2` | `DT_DBTIMESTAMP`\
  \ |\n\n### 总结\n\n本章介绍了 SSIS 中新的 OData 源组件。过去几年中，OData 的采用率稳步增长，而 OData 源提供了一个开箱即用的解决方案，用于从各种源（如\
  \ SharePoint 和 Windows Azure 存储 API）读取数据。\n\n### 使用缓慢变化维度向导\n\n向导的后续页面允许您配置如何处理固定属性（图\
  \ 13-3）以及类型 1 和类型 2 变化（图 13-4）的选项。在处理历史属性时，向导知道如何以两种不同方式生成更新维度所需的逻辑：使用单个列，或使用开始日期和结束日期列来指示记录是当前的还是已过期的。如果您的表使用这些方法的组合，或使用其他方法来跟踪当前记录，则需要更新生成的转换以包含此逻辑。\n\
  \n![9781484200834_Fig13-03.jpg](img/9781484200834_Fig13-03.jpg)\n图 13-3。固定属性和变化属性选项\n\
  \n![9781484200834_Fig13-04.jpg](img/9781484200834_Fig13-04.jpg)\n图 13-4。历史属性选项\n\
  \n向导的最后一个页面（图 13-5）允许您启用对推断成员的支持。推断成员是以最少的信息创建的——通常只有业务键和代理键。预计在后续加载维度数据时会填充剩余字段。虽然向导默认启用推断成员支持，但对于大多数形式的\
  \ SCD 处理，您并不需要它。\n\n![9781484200834_Fig13-05.jpg](img/9781484200834_Fig13-05.jpg)\n\
  图 13-5。推断维度成员\n\n### 使用转换\n\n向导完成后，除了主要的缓慢变化维度组件外，它还会输出多个不同的数据流组件（图 13-6）。主组件将传入数据与目标表进行比较，如果记录是新的或已修改的，则将传入的行发送到其某个输出。没有任何更改的记录将被忽略。连接到这些输出的组件将根据您在向导对话框中选择的选项进行配置。\n\
  \n![9781484200834_Fig13-06.jpg](img/9781484200834_Fig13-06.jpg)\n图 13-6。向导输出（用于类型\
  \ 1 和类型 2 变化，且无推断成员支持）\n\n您可以通过修改这些组件来进一步自定义 SCD 处理逻辑。双击主要的缓慢变化维度转换将重新启动向导。向导会记住您上一次运行的设置；但是，它会覆盖您对现有转换所做的任何更改或自定义。这包括您可能执行的任何布局和大小调整更改。\n\
  \n`注意`：当您重新运行缓慢变化维度向导时，UI 中选择的默认选项不是从组件推断出来的。相反，它们作为包的一部分持久保存在 `<designTime>` 元素中。如果您的部署过程会删除包布局信息，请注意您也将失去在向导中所做的选择。\n\
  \n### 优化性能\n\n缓慢变化维度向导输出的组件并未配置为最佳性能。通过更改某些设置并转向基于集合的模式，您可以显著提高 SCD 处理的性能。\n\n####\
  \ 缓慢变化维度转换\n\n主转换不会缓存来自参考维度的任何行结果，因此每个传入行都会导致对数据库的一次查询。默认情况下，向导将在每次查询时打开一个新的数据库连接。为了提高性能（以及降低资源使用），您可以将向导使用的连接管理器的\
  \ `RetainSameConnection` 属性设置为 `True`，以便在每次查询时重用同一连接。\n\n#### OLE DB 命令转换\n\n向导将输出两个（或者三个，如果您正在处理推断成员）OLE\
  \ DB 命令转换。这些转换逐行执行更新，这会大大降低性能。通过将这些行放入暂存表并在数据流完成后以单个批次执行更新，您将获得巨大的性能提升。\n\n####\
  \ OLE DB 目标\n\n由于主要的缓慢变化维度转换和目标使用相同的连接管理器，默认情况下目标组件将禁用快速加载选项以避免数据流死锁。如果您正在处理少量行（例如，单个数据流缓冲区的数据量），可以在目标组件上启用快速加载以获得即时的性能提升。为避免在处理大量行时出现死锁问题，请考虑使用暂存表。将数据批量加载到临时暂存表中，并在数据流完成后使用\
  \ `INSERT INTO ... SELECT` 语句更新最终目标。\n\n### 第三方 SCD 组件\n\n有几种流行的第三方 SCD 转换替代方案可用。两者具有相似的架构和使用模式，但提供不同的功能。\n\
  \n*   **Table Difference 组件可通过 CozyRoc.com 获取**：此转换将源表和目标表作为输入，并在内存中逐行进行比较。它有三个输出——新建、已更新和已删除。除了\
  \ SCD 处理外，它还可用于执行通用表比较。\n\n`注意`：有关 Table Difference 组件的更多信息，请参阅 CozyRoc 网页 `www.cozyroc.com/ssis/table-difference`。\n\
  \n*   **Dimension Merge SCD 组件可通过 PragmaticWorks.com 获取**：此组件旨在按照 Kimball 方法处理维度加载。与\
  \ Table Difference 组件类似，它将源维度表和目标维度表作为输入，并在内存中进行比较。同样与 Table Difference 组件类似，它不直接修改目标表。它将在内存中应用行更新，并提供多个输出来填充您的目标表。\n\
  \n`注意`：有关 Dimension Merge SCD 组件的更多信息，请参阅 Pragmatic Works 网页 `http://pragmaticworks.com/Products/Business-Intelligence/TaskFactory/Features.aspx#TSDimensionMergeSCD`。\n\
  \n``````markdown\n#### 合并模式\n\n这些组件的主要优势在于其性能。由于转换将源表和目标表都加载到内存中，它们能够进行快速的内存中比较，而无需多次查询目标服务器。它们还提供了比\
  \ SCD（缓慢变化维度）转换更多的功能，例如检测已删除的行，并且可能更易于维护，因为所有逻辑都包含在一个组件中。\n\n然而，同时加载源和目标维度表意味着您正在对目标进行全表扫描（通常源表也是如此）。由于数据流在读取完所有源行之后才结束，即使您只处理少量更改的源行，整个目标维度也将被读取。尽管第三方组件在许多情况下表现良好，但您应该考虑它们是否适合您的场景。\n\
  \n#### 合并模式\n\nSQL Server 2008 引入了对 T-SQL `MERGE` 语句的支持。该语句将根据与源表连接的结果，在目标表上执行插入、更新和删除操作。它非常高效，并为\
  \ SCD 处理提供了一个良好的替代方案。\n\n![Image](img/sq.jpg) **注意** 有关 `MERGE` 的更多信息，请参阅在线手册中的“在\
  \ Integration Services 包中使用 MERGE”条目，网址为 `http://technet.microsoft.com/en-us/library/cc280522.aspx`。\n\
  \n在 SSIS 中使用 `MERGE` 有三个步骤：\n\n1. 在数据流中暂存数据。\n2. 优化暂存表（可选）。\n3. 使用执行 SQL 任务运行 `MERGE`\
  \ 语句。\n\n`MERGE` 允许在检测到行已更新（使用 `MERGE` 术语为“匹配”）和行是新的（“未匹配”）时运行单个语句。由于类型 1 和类型 2\
  \ 的更改需要不同类型的处理，我们将使用两个 `MERGE` 语句来完成 SCD 处理（如 图 13-7 所示）。\n\n![9781484200834_Fig13-07.jpg](img/9781484200834_Fig13-07.jpg)\n\
  \n图 13-7. 合并模式的控制流\n\n### 处理类型 1 更改\n\n列表 13-1 显示了我们将运行的第一个 `MERGE` 语句，用于更新目标表中的所有类型\
  \ 1 列。`ON ( )` 部分指定了我们将要匹配的键（在本例中是表的业务键）。在 `WHEN MATCHED` 部分，我们包含了 `DEST.EndDate\
  \ is NULL` 以确保我们只更新当前记录（这是可选的——在许多情况下，您确实希望更新所有记录，而不仅仅是当前记录）。`THEN UPDATE` 部分包含我们想要更新的类型\
  \ 1 列的列表。\n\n***列表 13-1***. 用于类型 1 列的 MERGE 语句\n\n```sql\nMERGE INTO [DimProduct]\
  \ AS DEST\nUSING [Staging] AS SRC\nON (\n        DEST.ProductAlternateKey = SRC.ProductAlternateKey\n\
  )\nWHEN MATCHED AND DEST.EndDate is NULL -- 更新当前记录\nTHEN UPDATE\nSET\n         DEST.[ArabicDescription]\
  \ = SRC.ArabicDescription\n        ,DEST.[ChineseDescription] = SRC.ChineseDescription\n\
  \        ,DEST.[EnglishDescription] = SRC.EnglishDescription\n        ,DEST.[FrenchDescription]\
  \ = SRC.FrenchDescription\n        ,DEST.[GermanDescription] = SRC.GermanDescription\n\
  \        ,DEST.[HebrewDescription] = SRC.HebrewDescription\n        ,DEST.[JapaneseDescription]\
  \ = SRC.JapaneseDescription\n        ,DEST.[ThaiDescription] = SRC.ThaiDescription\n\
  \        ,DEST.[TurkishDescription] = SRC.TurkishDescription\n        ,DEST.[ReorderPoint]\
  \ = SRC.ReorderPoint\n        ,DEST.[SafetyStockLevel] = SRC.SafetyStockLevel;\n\
  ```\n\n### 处理类型 2 更改\n\n由于 `MERGE` 语句允许每个操作使用单个语句，更新类型 2 列更具挑战性。\n\n请记住，对于类型 2 更改，您需要执行两个操作：1)\
  \ 将当前记录标记为过期，以及 2) 插入新记录作为当前记录。为此，您将把 `MERGE` 语句放在 `FROM` 子句内，并使用其 `OUTPUT` 为 `INSERT\
  \ INTO` 语句提供数据（如 列表 13-2 所示）。\n\n***列表 13-2***. 用于类型 2 列的 MERGE 语句\n\n```sql\nINSERT\
  \ INTO [DimProduct]\n    ([ProductAlternateKey],[ListPrice],[EnglishDescription],[StartDate])\n\
  SELECT\n    [ProductAlternateKey],[ListPrice],[EnglishDescription],[StartDate]\n\
  FROM (\n        MERGE INTO [DimProduct] AS FACT\n        USING [Staging] AS SRC\n\
  \        ON ( FACT.ProductAlternateKey = SRC.ProductAlternateKey )\n        WHEN\
  \ NOT MATCHED THEN\n        INSERT VALUES (\n                 SRC.ProductAlternateKey\n\
  \                ,SRC.ListPrice\n                ,SRC.EnglishDescription\n     \
  \           ,GETDATE()      -- StartDate\n                ,NULL           -- EndDate\n\
  \        )\n        WHEN MATCHED AND FACT.EndDate is NULL\n        THEN UPDATE SET\
  \ FACT.EndDate = GETDATE()\n        OUTPUT $Action Action_Out\n                ,SRC.ProductAlternateKey\n\
  \                ,SRC.ListPrice\n                ,SRC.EnglishDescription\n     \
  \           ,GETDATE() StartDate\n) AS MERGE_OUT\nWHERE MERGE_OUT.Action_Out = 'UPDATE';\n\
  ```\n\n### 结论\n\n在 SSIS 中处理 SCD 有多种方法。虽然内置的 SCD 转换可以让你快速开始运行，但其性能可能不如替代方案。您可能更喜欢使用合并模式，因为它整体性能更好，但维护\
  \ SQL 语句可能是一个长期的障碍。如果您更喜欢可视化设计器体验，可以考虑尝试第三方组件选项之一。\n\n表 13-2 总结了本章描述的优缺点。\n\n表 13-2.\
  \ 缓慢变化维度处理模式\n\n| 模式 | 用途 |\n| --- | --- |\n| 缓慢变化维度转换 | 快速原型设计<br>处理少量行<br>非常大的维度\
  \ |\n| 第三方组件 | 完整或历史维度加载<br>中小型维度<br>非 SQL Server 目标 |\n| 合并模式 | 最佳整体性能<br>不介意手工编写\
  \ SQL 语句的情况 |\n\n# 第 14 章\n\n![image](img/frontdot.jpg)\n\n### 加载到云端\n\n现在是 2014\
  \ 年，云技术正变得无处不在。随着越来越多的应用程序托管在各种云服务提供商中，将相关数据定位在云中的需求也在增加。得益于远见和良好的工程设计，Microsoft\
  \ SQL Server 处于有利地位，可以提供帮助。与 Microsoft Azure SQL Database (MASD) 数据库交互的用户体验与与本地服务器或企业网络上的服务器交互几乎相同。毫无疑问，这是精心设计的——而且是好的设计。\n\
  \n在本章中，我们将考虑用于集成云中数据的 SSIS 设计模式。这些模式在连接到任何具有云技术特征的存储库时都很有用。因为与云中数据交互与与更本地的数据交互相似，所以这些模式并不具有革命性。“那么为什么要写一章关于加载云的内容呢？”很好的问题。\n\
  \n首先，云将长期存在——精灵不会回到瓶子里。我们作为数据专业人员，对使用云了解得越多越好。其次，云为数据集成带来了有趣的挑战；这些是数据集成开发人员需要解决和解决的挑战。加载云不仅仅是与热门技术交互。这是一个设计良好架构的机会。\n\
  ``````\n\n\n### 与云交互\n\n在本章中，**云（the cloud）** 指的是满足以下条件的数据容器或数据存储库：\n\n*   位于企业场所之外\n\
  *   由第三方托管\n*   位于物理企业域之外\n\n我理解这些观点存在争议。在此我不作辩论。这个定义很可能在本文写作（2012 年）和修订（2014 年）之后的几年里就不再适用。即使在现在，何为“在云中”也存在模糊性和界限不清的情况。\n\
  \n作为演示，我使用的是从我在弗吉尼亚州法姆维尔的本地气象站收集的数据。这些天气数据在 `AndyWeather.com` 上公开可用。`AndyWeather.com`\
  \ 由一家大型托管公司托管，该公司提供可远程访问的 SQL Server 数据库连接。因此，根据我的定义，这些数据存储在云端。\n\n我还使用 Microsoft\
  \ Azure SQL Database 托管天气数据：相同的数据，存储在不同的位置。“为什么？”简单的答案是：容错性。容错性也是数据库管理员（DBA）执行数据库备份和测试数据库恢复的原因。技术人员与工程师——或开发人员与架构师——之间的区别在于，技术人员构建能运行的系统，而工程师构建不会失败的系统。这关乎思维方式。技术人员让系统运行起来就停止了。工程师会考虑系统可能以多种方式失效，并尝试在故障发生前修复它们。\n\
  \n### 增量加载到 Azure SQL 数据库\n\n**增量加载** 是指仅加载或更改新的或更新的行（有时也包括已删除的行）的加载方式。增量加载可以与 **截断并加载**\
  \ 模式形成对比，后者会删除目标中的现有数据，并从源重新加载所有数据。有时截断并加载是最有效的方式。随着数据规模的扩大——尤其是在目标端——截断并加载的性能往往会下降。如何知道哪种方式性能最好？测试、衡量、重复。\n\
  \n截断并加载的一个好处是简单。一个简单的机制不容易搞砸。增量加载引入了复杂性，而变更检测是复杂性进入解决方案的第一个环节。\n\n### 变更检测\n\n**变更检测**\
  \ 是一种旨在区分从未从源发送到目标的行（新行）与已发送行的功能。变更检测还会将存在于目标中的源行，区分为已在源中更改的行（已更改行）和自上次加载或更新到目标以来未更改的行（未更改行）。变更检测还可以包含已从目标中删除、需要从源中删除（或“软删除”）的行。在本章中，我们将忽略已删除行的用例。\n\
  \n我们将考虑使用变更检测来识别和区分未更改行、已更改行和新行。增量加载模式的框图如图 14-1 所示。\n\n![9781484200834_Fig14-01.jpg](img/9781484200834_Fig14-01.jpg)\n\
  \n图 14-1. 增量加载框图\n\n### 仅新行\n\n你可能会认为，无论目标数据库背后的技术如何，检测新行应该是简单的。你是对的。但是，当加载 MASD\
  \ 时，存在经济考量。在我撰写本文时（2011 年，并于 2014 年修订），上传是免费的。作为数据提供者，当你的数据被使用时，你才会被收费。这个事实如何影响你的增量加载？\n\
  \n这正是良好的数据集成架构和设计发挥作用的地方。数据集成架构师的部分工作是了解你的数据。这不仅仅是知道`CleanTemperature`表中有一个包含特定小时平均露点的列。了解你的数据意味着你理解它是如何以及何时变化的——甚至是否变化。某些类型的数据，如天气数据，在被捕获和记录后不会被更新。\n\
  \n如果你阅读了 Tim Mitchell 在第 11 章中对典型增量加载模式的描述，你会注意到一个配置为连接到目标并读取数据的查找（Lookup）转换。在 MASD\
  \ 中，你将为那次数据读取付费。在我的 MASD AndyWeather 数据库中，存在近 30,000 行数据。如果我将所有源行加载到数据流任务中，并使用查找转换在源和\
  \ MASD 之间进行“连接”，我需要为读取未更改的行付费。更重要的是，我知道它们**永远不会改变**。因为天气数据一旦记录就永远不会更新，所以根本不会存在已更改行。\n\
  \n每小时，AndyWeather 数据库中的每个主题区域都会生成几行新数据。如果我使用查找，我会毫无理由地加载所有 30,000 行——并且我还得为这种特权付费。不，谢谢。\n\
  \n为了限制数据读取量，从而降低解决方案的总成本，我可以执行一个查询，选择一个表示最新或最后加载行的“标记”。为此，我可以从包含表上次加载日期和时间的字段中选择最大值；类似于`Max(LastUpdatedDateTime)`，或者甚至是数据集成沿袭或元数据字段如`Max(LoadDate)`。同样地，我可以选择另一个标记，例如由序列、标识、触发器或其他机制可靠维护的整数列中的`Max(ID)`。该机制的可靠性代表了数据集成架构师对该值可以给予的最大置信度。我将演示如何使用源数据上维护的标识列来构建增量加载器。\n\
  \n在此之前，我希望指出第 11 章包含关于增量加载设计模式的精彩章节。其中讨论了另一种我不会涉及的解决方案：变更数据捕获。在完成数据集成设计之前，我鼓励你回顾第\
  \ 11 章。\n\n### 构建云加载器\n\n要完成接下来的演示，你需要一个 MASD 账户和数据库。创建账户和数据库超出了本书的范围，但你可以在 `www.windowsazure.com/en-us/home/features/sql-azure`\
  \ 了解更多信息。一旦 MASD 设置并配置好，创建一个数据库。在此数据库中，使用清单 14-1 所示的 T-SQL 创建一个名为`dbo.LoadMetrics`的表。\n\
  \n**清单 14-1**. 创建 LoadMetrics 表\n\n```sql\nCreate Table dbo.LoadMetrics\n  (ID int\
  \ identity(1,1)\n    Constraint PK_LoadMetrics_ID Primary Key Clustered\n  ,LoadDate\
  \ datetime\n    Constraint DF_LoadMetrics_LoadDate Default(GetDate())\n  ,MetricName\
  \ varchar(25)\n  ,MetricIntValue int)\n```\n\n`LoadMetrics`表将保存云目标中每个表最后加载的 ID。我们将写入此行一次，并在每个加载周期读取和更新它。以这种方式访问此表是获取我们所需信息（特定表的最后加载的\
  \ ID 列值）的最简单且最不占用处理器的方式。为什么将此值存储在表中？为什么不直接在数据表上执行`Max(ID)`的 select 语句呢？再次强调，MASD\
  \ 对读取收费，对写入不收费。收费方式可能会改变——过去就曾改变过。如果我们按照周期或执行计划收费怎么办？你永远不知道。\n\n在连接到 MASD 实例时，创建一个表来保存你的数据。我的数据表将保存从我在弗吉尼亚州法姆维尔的气象站收集的温度信息。我使用的表包含与温度和湿度相关的数据，如清单\
  \ 14-2 所示。\n\n**清单 14-2**.\n\n\n### 创建 CleanTemperature 表\n\n```\nCreate Table dbo.CleanTemperature\n\
  \   (ID int identity(1,1)\n       Constraint PK_Cleantemperature_ID Primary Key\
  \ Clustered\n  ,MeasDateTime datetime\n  ,MinT real\n  ,MaxT real\n  ,AvgT real\n\
  \  ,MinH smallint\n  ,MaxH smallint\n  ,AvgH smallint\n  ,ComfortZone smallint\n\
  \  ,MinDP real\n  ,MaxDP real\n  ,AvgDP real\n  ,MinHI varchar(7)\n  ,MaxHI varchar(7)\n\
  \  ,AvgHI varchar(7)\n  ,LoadDate datetime\n  ,LowBatt bit\n  ,SensorID int)\n```\n\
  \n云表创建完成后，我们就可以开始构建 SSIS 加载器了。\n\n在本地，创建一个新的 SSIS 解决方案和项目，命名为 `CloudLoader`。将默认的\
  \ SSIS 包重命名为 `SimpleCloudLoader.dtsx`。添加一个 Sequence 容器，并将其重命名为 `SEQ Pre-Load Operations`。通过将\
  \ Execute SQL 任务放入 Sequence 容器中来添加一个，并将其重命名为 `Get AWCleanTempMaxID From AndyWeather`。将\
  \ `ResultSet` 属性设置为 `Single Row`，并将 `ConnectionType` 属性更改为 `ADO.Net`。使用你的 MASD 帐户信息创建\
  \ ADO.Net 连接管理器。为了从 `LoadMetrics` 表中获取最新的 ID，我使用以下查询。\n\n```\nIF NOT EXISTS (\n\
  \    Select *\n    From dbo.LoadMetrics\n    Where MetricName = 'CleanTempMaxID'\n\
  )\nBEGIN\n    INSERT INTO dbo.LoadMetrics (LoadDate, MetricName,MetricIntValue)\n\
  \    VALUES (NULL,'CleanTempMaxID',NULL);\nEND\nSelect Coalesce(MetricIntValue,\
  \ 0) As CleanTempMaxID\nFrom dbo.LoadMetrics\nWhere MetricName = 'CleanTempMaxID'\n\
  ```\n\n在 Result Set 页面，我将值存储在一个名为 `AWCleanLoadMaxID` 的 Int32 数据类型的 SSIS 变量中。\n\n\
  在 Sequence 容器中添加另一个 Execute SQL 任务，并将其重命名为 `Get CleanTempMaxID from the local table`。配置连接到你的源数据库和表。对我来说，这是一个托管\
  \ `WeatherData` 数据库和 `dbo.CleanTemperature` 表的本地 SQL Server 默认实例。我使用以下 T-SQL 从表中提取当前的最大值，配置单行结果集以将此值推入名为\
  \ `CleanTempLocalMaxID` 的 SSIS 变量（Int32 数据类型）。\n\n```\nSelect Max(ID) As CleanTempLocalMaxID\n\
  From dbo.CleanTemperature\n```\n\n在 `SEQ Pre-Load Operations` Sequence 容器外部添加一个\
  \ Data Flow 任务，并将其重命名为 `Load Windows Azure SQL Database`。在 Sequence 容器和 Data Flow\
  \ 任务之间连接一个 `OnSuccess` 优先级约束。打开 Data Flow Task Editor 并添加一个 OLE DB 源适配器。将 OLE DB\
  \ 源适配器连接到你希望加载到云中的本地源数据库，并编写查询以从所需表中提取最新数据。在我的例子中，我从我的 `dbo.CleanTemperature` 表中提取数据。为了完成加载，我使用\
  \ `Listing 14-3` 中显示的源查询。\n\n`Listing 14-3`. WeatherData 源查询\n\n```\nSELECT ID\n\
  \      ,MeasDateTime\n      ,MinT\n      ,MaxT\n      ,AvgT\n      ,MinH\n     \
  \ ,MaxH\n      ,AvgH\n      ,ComfortZone\n      ,MinDP\n      ,MaxDP\n      ,AvgDP\n\
  \      ,MinHI\n      ,MaxHI\n      ,AvgHI\n      ,LoadDate\n      ,LowBatt\n   \
  \   ,SensorID\n  FROM dbo.CleanTemperature\n WHERE ID Between ? And ?\n```\n\n点击\
  \ Parameters 按钮，将 `Parameter0` 和 `Parameter1` 分别映射到 `AWCleanLoadMaxID` 和 `CleanTempLocalMaxID`\
  \ 变量，如 `Figure 14-2` 所示。\n\n![9781484200834_Fig14-02.jpg](img/9781484200834_Fig14-02.jpg)\n\
  \n`Figure 14-2`. 将 `SQLAzureCleanLoadMaxID` 变量映射到 `Parameter0`\n\n`Listing 14-3`\
  \ 中显示的源查询中的问号将被替换为相应映射变量中存储的值。此查询将仅返回 `ID` 大于云中存储值的行。为什么我们在加载前从源表获取最大 `ID`？简而言之，是延迟。在\
  \ `WeatherData` 数据库中，延迟是最小的。但想想加载高度活跃的系统——延迟可能成为问题。例如，假设每秒有几笔事务进入源表，而加载目标需要几秒钟。如果我们等到加载完成后再捕获源表的最大\
  \ `ID` 值，该值很可能包含了我们没有加载的数据。专业术语来说，这很“糟糕”。因此，我们将包设计为在加载开始前抓取最大 `ID` 值，并且只加载介于上次加载到\
  \ MASD 的 `ID` 和 SSIS 包开始时捕获的最大 `ID` 值之间的行。这样我们就永远不会错过任何一行。\n\n回到演示包，添加一个 ADO.Net\
  \ 目标适配器，并将其重命名为 `Windows Azure SQL Database ADO NET Destination`。连接一条从 OLE DB 源适配器到\
  \ ADO.Net 目标适配器的数据流路径。为什么使用 ADO.Net 目标？MASD 仅允许 ADO.Net 和 ODBC 连接——在撰写本文时，尚不支持对\
  \ MASD 的 OLE DB 连接。在源和目标适配器之间连接一条数据流路径，编辑目标并映射列。\n\n最后一步是更新 MASD 数据库中的 `LoadMetrics`\
  \ 表。为了完成此更新，向控制流添加一个 Execute SQL 任务，并适当地重命名它。我将其命名为 `Update AndyWeather LoadMetrics\
  \ Table`，并配置为使用 ADO.Net 连接到我的 MASD 数据库。我的查询类似于 `Listing 14-4` 所示。\n\n`Listing 14-4`.\
  \ 更新 Azure SQL Database `LoadMetrics` 表\n\n```\nUpdate dbo.LoadMetrics\n Set MetricIntValue\
  \ = (@MaxID + 1)\n    , LoadDate = GetDate()\n Where MetricName = 'CleanTempMaxID'\n\
  ```\n\n在 Parameter Mapping 页面，将 `CleanTempLocalMaxID` 的值映射到 `@MaxID` 参数。就这样，这个脚本将当前的最大\
  \ `ID` 设置为下一次加载的最小 `ID`。\n\n### 结论\n\n在本章中，我们研究了加载云目标的架构和设计方面。在权衡了架构和经济考虑后，我们设计了一个合理的解决方案。\n\
  \n"
- "# 第 15 章\n\n![image](img/frontdot.jpg)\n\n### 日志记录和报告模式\n\n管理任何应用程序的一个重要部分是了解应用程序在日常使用中发生的情况。这个主题在\
  \ ETL 解决方案中尤其重要，因为正在操作的数据可用于报告和分析。管理员通过记录和报告应用程序的执行、错误和状态来满足这一需求，这完美地契合了管理框架的概念。\n\
  \n前几章讨论了如何设置管理框架的其他部分，包括如何执行父子包以及如何实现集中式自定义日志记录。本章将描述如何使用 Integration Services 中的内置日志记录来报告\
  \ Integration Services 应用程序的所有方面。\n\nIntegration Services 提供两种主要方法来帮助满足日志记录和报告需求。\n\
  \n*   包日志记录和报告\n*   目录日志记录和报告\n\n让我们逐步了解如何设置每种方法，然后利用最能突出这些方法的模式。\n\n#### 包日志记录和报告\n\
  \n包日志记录和报告方法自 Integration Services 第一版以来就存在。此方法的特点是在包开发期间设置日志记录。日志提供程序可以记录到不同的输出，包括\
  \ SQL Server 表、文本文件等。日志信息存储在一个对象中，例如一个文件或 `sysssislog` 表。\n\n每个日志可以限制为仅存储某些类型的事件，例如\
  \ `OnError`、`OnPreExecute` 和 `OnVariableValueChanged`。然后，管理员可以查看日志以了解包执行期间发生了什么。\n\
  \n\n### SSIS 中的包日志与目录日志\n\n当包已部署到服务器后，你将无法更改其发生的日志记录类型或数量。如果你正在使用 `Integration Services\
  \ 2005`、`2008`、`2012` 或 `2014` 的包部署模式，那么包日志是最佳且唯一的选择。在项目部署模型中，你可以定期使用包日志来跟踪可能发生的错误，或确保包按预期执行。为了进行更深入的日志记录和报告，你将需要使用目录日志记录和报告，我们将在本章后面讨论。\n\
  \n让我们看看如何设置包日志，以及如何使用其输出。\n\n### 设置包日志\n\n要在包级别设置日志，你需要转到包本身并启用日志记录。每个包都需要单独设置，以便将日志记录到数据库。你可以通过右键单击包并选择\
  \ `日志记录` 选项，或者通过转到 `SQL Server Data Tools (SSDT)` 顶部的 `SSIS` 菜单并选择 `日志记录` 选项来完成此操作。\n\
  \n在日志记录菜单中（你可以在图 15-1 中看到），你将决定要使用的日志记录类型。选项包括文本文件、XML 文件和 SQL Server 表。一旦确定了日志记录类型，你将选择要记录哪些事件以及记录这些事件的级别。如果你在最高包级别选择事件，你将也能看到所有较低级别容器的所有事件。\n\
  \n![9781484200834_Fig15-01.jpg](img/9781484200834_Fig15-01.jpg)\n图 15-1. SSIS 日志记录菜单\n\
  \n当包运行时，`Integration Services` 会创建一个新表（如果尚无可用表），并将日志信息存储在其中。表 `sysssislog` 包含了所有已记录事件的数据。\n\
  \n### 包日志报告\n\n运行带有日志记录的包后，你会想知道发生了什么！包含你所需全部信息的表名为 `sysssislog`。默认情况下，它将在你在日志菜单中选择的连接管理器的服务器上的\
  \ `msdb` 数据库中创建；但是，你可以通过直接在连接管理器中指定数据库来更改它。\n\n让我们通过运行以下 SQL 查询，查看运行包后表中的数据：\n\n\
  ```sql\nselect * from msdb.dbo.sysssislog\n```\n\n此语句返回的结果类似于图 15-2。\n\n![9781484200834_Fig15-02.jpg](img/9781484200834_Fig15-02.jpg)\n\
  图 15-2. 来自 SSIS 日志表的结果\n\n#### 设计模式：包执行情况\n\n虽然可以直接使用表中的信息，但你也可以组合这些信息使其更具可读性。如果你想查看包的执行情况以及每个包运行了多长时间，可以使用清单\
  \ 15-1 中的查询：\n\n**清单 15-1**. 返回包持续时间的查询\n\n```sql\nselect ssis.source\n        ,\
  \ min(starttime) as package_start\n        , max(endtime) as package_end\n     \
  \   ,DATEDIFF(ms, min(starttime), max(endtime)) as duration_ms\nfrom msdb.dbo.sysssislog\
  \ ssis\nwhere event in ('PackageStart', 'PackageEnd')\ngroup by ssis.source, ssis.executionid\n\
  ```\n\n### 目录日志记录与报告\n\n目录日志记录和报告方法是在 `Integration Services 2012` 中引入的，如果可用，它是最好的日志记录方法。仅当你设置了项目部署模型类型时才能使用它。这种日志记录方法的优点是，你无需在包中准备任何内容即可使用它。让我们直接深入了解如何设置日志记录以及用于报告该数据的设计模式。\n\
  \n#### 设置目录日志记录\n\n如前所述，目录日志记录的好处是，你根本无需修改包即可使用日志输出。你唯一需要做的准备工作是确保你的包设置为项目部署类型，并将包部署到\
  \ SSIS 目录。\n\n要开始设置目录日志记录和报告，你需要创建一个 SSIS 目录。你可以通过连接到数据库实例来完成此操作。如果安装了 `Integration\
  \ Services`，你将看到一个名为 `Integration Services 目录` 的节点。如果你创建一个名为 `SSISDB` 的新目录，它将看起来像图\
  \ 15-3。\n\n![9781484200834_Fig15-03.jpg](img/9781484200834_Fig15-03.jpg)\n图 15-3.\
  \ SSISDB 目录\n\n此时，你已准备好部署你的包。不过，首先你应该确保项目设置为使用项目部署模型。你可以通过右键单击项目来完成此操作。如果你看到 `转换为包部署模型`\
  \ 的选项，如图 15-4 所示，那么你就处于此模式。\n\n![9781484200834_Fig15-04.jpg](img/9781484200834_Fig15-04.jpg)\n\
  图 15-4. 处于项目部署模式的项目\n\n最后，你将包部署到 SSIS 目录。这会将包存储在 `SSISDB` 数据库中，并允许进行一些默认的和可配置的日志记录。\n\
  \n接下来，我们将查看存储两种类型日志信息的表。\n\n#### 目录表\n\n当包运行时，所有信息都存储在部署 `Integration Services`\
  \ 包的同一服务器上的 `SSISDB` 数据库中的一组表中。虽然存在一系列内部表，但你的大多数报告将从目录视图生成。图 15-5 显示了 SSIS 内部表的数据库关系图，而图\
  \ 15-6 显示了 SSIS 目录视图的列表。\n\n![9781484200834_Fig15-05.jpg](img/9781484200834_Fig15-05.jpg)\n\
  图 15-5. SSIS 目录内部表\n\n![9781484200834_Fig15-06.jpg](img/9781484200834_Fig15-06.jpg)\n\
  图 15-6. SSIS 目录视图\n\n### 事后更改日志级别\n\n即使在包已部署到 `Integration Services` 服务器后，你也可以更改发生的日志记录数量。但为什么你想这样做呢？如果你最初设置包时定义了一组日志事件，你将只能看到该数据集。然而，如果你正在进行更高级别的故障排除，或者有一个特定的错误需要追踪，你可能希望包含更多事件。另一方面，你可能希望通过减少记录的事件数量来提高包的性能。\n\
  \n修改包级别的日志记录并非最佳实践。即使是更改最轻微的项，打开包也会增加发生破坏性更改的风险，无论是由于输入错误值还是选择了不可用的日志记录选项。在某些组织中，在包级别对日志记录进行的修改甚至可能导致包必须再次经历变更控制过程。理想情况下，你希望在完全不接触包的情况下，在外部位置进行日志记录更改。\n\
  \n在 `Integration Services 2012` 中，你可以从四种不同的日志记录级别中选择，如表 15-1 所述。\n\n**表 15-1**.\
  \ SSIS 日志记录级别\n\n![Table15-1.jpg](img/Table15-1.jpg)\n\n#### 设计模式\n\n现在你知道如何设置和记录信息了，让我们逐步了解以下设计模式：\n\
  \n1.  更改日志级别\n2.  使用现有报告\n3.\n\n\n### 更改日志记录级别\n\n现在你已经了解了不同的日志记录级别以及各自的使用场景，接下来让我们逐步讲解如何更改日志记录级别。你可以通过以下两种方式之一来完成此操作：通过执行界面或通过命令行执行。\n\
  \n要通过执行界面修改日志记录级别，你需要连接到 Integration Services 目录，右键单击所需的包，然后选择**执行**。在“执行包”屏幕上，你将在“高级”选项卡上看到“日志记录级别”选项。默认情况下，该选项设置为“基本”，如图\
  \ 15-7 所示。或者，你可以将此值更改为另一个日志记录级别，以便在日志表中查看更多或更少的信息。\n\n![9781484200834_Fig15-07.jpg](img/9781484200834_Fig15-07.jpg)\n\
  \n图 15-7. 执行包屏幕\n\n另一种方法是通过命令行修改日志记录。所有包都可以通过命令行执行，并且你可以设置与单个执行关联的日志记录级别。\n\n> **注意**\
  \ 与管理 Integration Services 包相关的许多功能都可以通过命令行界面访问。使用命令行，你可以将 Integration Services\
  \ 管理与其他维护任务集成。\n\n运行清单 15-2 中的代码，将新执行的日志记录级别更改为记录所有详细记录。\n\n### 清单 15-2. 修改执行日志记录级别的语句\n\
  \n```sql\nDECLARE @execution_id INT\nEXECUTE [catalog].[create_execution]\n    @folder_name\
  \ = 'DesignPatterns'\n    ,@project_name = 'DesignPatterns'\n    ,@package_name\
  \ = 'Ch15_Reporting.dtsx'\n    ,@reference_id = null\n    ,@use32bitruntime = false\n\
  \    ,@execution_id = @execution_id OUTPUT\n\nEXECUTE [catalog].[set_execution_parameter_value]\n\
  \    @execution_id\n    ,@object_type = 50\n    ,@parameter_name = 'LOGGING_LEVEL'\n\
  \    ,@parameter_value = 3 --Verbose\n\nEXECUTE [catalog].[start_execution]\n  \
  \  @execution_id\n```\n\n完成此操作后，你可以通过运行清单 15-3 中的查询，查看新设置的日志记录级别产生的输出。\n\n### 清单\
  \ 15-3. 返回所有消息的查询\n\n```sql\nselect *\nfrom catalog.event_messages\nwhere operation_id\
  \ =\n    (select max(execution_id) from catalog.executions)\n```\n\n### 使用现有报告\n\
  \n我们的下一个设计模式很重要：利用提供给你的资源。SSIS 目录中包含了使用我们刚才讨论的日志记录信息的报告。这些报告中的信息包含对你的所有包执行的深入视图。这些报告是一个很好的起点，你可以从中查看包何时运行、是否发生错误以及需要调查的潜在问题区域。\n\
  \n图 15-8 显示了所有可用的报告。你可以通过 Management Studio 界面和 Integration Services 目录节点访问所有报告。\n\
  \n![9781484200834_Fig15-08.jpg](img/9781484200834_Fig15-08.jpg)\n\n图 15-8. 可用的目录报告\n\
  \n如果你正在查看特定的执行，你总是希望从“概述”报告开始，该报告可以通过选择任何已提供报告上的“概述”链接来运行。实际上，通过界面执行完成后，系统会询问你是否要查看此报告。如果选择“是”，你将看到类似于图\
  \ 15-9 的内容。\n\n![9781484200834_Fig15-09.jpg](img/9781484200834_Fig15-09.jpg)\n\n\
  图 15-9. 概述报告\n\n### 创建新报告\n\n既然你已经看到了无需任何操作即可使用的报告，你可能对此非常满意。\n\n如果不是，你可能希望更深入地挖掘数据。你可以通过查看前面描述的目录视图来创建新报告。你可能需要这样做的具体原因包括：\n\
  \n1.  查看运行时间最长的执行\n2.  找出包失败的原因\n3.  了解特定组件的内部工作原理\n\n让我们从第一个原因开始。这个报告很有趣，因为它使用了主要的输出视图，但基于查询和转换，它变成了一个有用的小工具。清单\
  \ 15-4 展示了列出过去一天内运行时间最长的五个包的查询。\n\n### 清单 15-4. 查询运行时间最长的五个包\n\n```sql\nselect top\
  \ 5\n    e.execution_id,\n    e.package_name,\n    DATEDIFF(ms, start_time, end_time)\
  \ as duration_ms\nfrom catalog.executions e\nwhere e.start_time > DATEADD(dd, -1,\
  \ getdate())\norder by duration_ms desc\n```\n\n你可能需要新报告的第二个原因是查看包失败的原因。你将为此信息使用一个额外的视图，即\
  \ `catalog.event_messages` 视图。同时对 `executions` 和 `event_messages` 视图限制数据，将确保你只获取完全失败的包，并且只看到导致它们失败的事件。可以在清单\
  \ 15-5 中看到此查询。\n\n### 清单 15-5. 失败包查询\n\n```sql\nselect\n    e.execution_id,\n  \
  \  e.package_name,\n    em.*\nfrom catalog.executions e\ninner join catalog.event_messages\
  \ em\n    on e.execution_id=em.operation_id\nwhere e.status = 4\n    and em.event_name\
  \ = 'OnError'\n```\n\n最后一个原因是了解特定组件的内部工作原理。你可以查看数据流中每个组件执行期间发生的各个步骤。例如，清单 15-6 中的查询返回源、转换和目标执行过程中发生的每个步骤以及每个步骤花费的时间。\n\
  \n### 清单 15-6. 返回组件阶段和时间的查询\n\n```sql\nselect\n    subcomponent_name,\n    phase,\n\
  \    DATEDIFF(ms, start_time, end_time) as duration_ms\nfrom catalog.execution_component_phases\n\
  where package_name = 'Ch16_Reporting.dtsx'\n    and task_name = 'Data Flow Task'\n\
  ```\n\n一旦你得到了所需的查询，你可以直接从 Management Studio 运行它，或者将其嵌入到 Reporting Services 报告中，使其看起来像解决方案中的标准报告。要通过\
  \ Management Studio 制作报告，你可以将文件夹存储在本地“文档”文件夹中，路径结构为 `SQL Server Management Studio\\\
  Custom Reports`。要访问它们，然后你可以在 Integration Services 节点上的“报告”菜单下选择“自定义报告”选项，如图 15-10\
  \ 所示。\n\n![9781484200834_Fig15-10.jpg](img/9781484200834_Fig15-10.jpg)\n\n图 15-10.\
  \ 自定义报告的选择\n\n### 总结\n\n本章讨论了监控 Integration Services 包的多种方法。无论你使用的是工具的旧版本还是最新最强大的版本，通过遵循此处描述的设计模式，你都能够理解包的内部工作原理。关于包日志记录和报告以及目录日志记录和报告的讨论，向你展示了如何修改所记录的事件类型以及如何检索这些信息。\n\
  \n"
- "# 第 16 章 父子模式\n\n在早期版本的 Integration Services 中，数据移动平台不包括管理框架，该框架是 Integration Services\
  \ 包的执行、日志记录和部署的实现。为了填补这一空白，开发人员创建了自己的管理框架以在他们的组织中使用。\n\n\n### SSIS 中的父子模式与管理框架\n\
  \n### 引言\n\n与任何自定义解决方案一样，开发人员发现当新版本或新包引入系统时，管理框架需要维护和升级。\n\n之前的章节涵盖了 ETL 工具化，重点关注元数据收集和验证。我们讨论的元数据包括管理包所需的关键信息。本章将介绍**父子模式**，即一个\
  \ Integration Services 包可以从其自身执行中调用另一个包。这些模式是实现 ETL 框架的关键部分。\n\nIntegration Services\
  \ 2014 包含其自身的管理框架，其中包括通过 SSIS 目录进行的日志记录和执行。在本章及后续章节中，我们将向您展示如何使用可用的框架并对其进行增强，以在解决我们讨论的问题的同时提供更多信息。\n\
  \n本章我们将介绍以下三种父子模式：\n\n*   主包模式\n*   动态子包模式\n*   子包到父包变量模式\n\n使用这些模式，您可以实现开箱即用的 Integration\
  \ Services 管理功能。\n\n### 主包模式\n\n在设置框架时，您首先要做的事情之一是找到一种方法来组织包的执行方式。您的组织方式可以包括并行与串行处理、条件执行和分类批处理。尽管您可以让其中一些组织工作发生在作业调度器（如\
  \ SQL Server Agent 或 Tivoli）中，但如果能在您已经熟悉的环境中管理包的执行，岂不是更容易？\n\n幸运的是，Integration Services\
  \ 已经提供了这种能力！通过使用工作流设计器和“执行包任务”，您可以执行其他包，从而创建父子包关系。当您使用父子关系来执行一系列包时，这被称为主包。您需要完成两个步骤来为您的主包设置一个子包：\n\
  \n1.  指定子包。\n2.  配置参数绑定。\n\n#### 指定子包\n\n创建初始包后，首先使用 SSIS 工具箱中的“执行包任务”。将该任务拖到控制流中，然后打开任务以查看可以修改的多个菜单。让我们从配置“包”页面开始，如**图\
  \ 16-1**所示。\n\n![执行包任务编辑器 - 包页面](img/9781484200834_Fig16-01.jpg)\n\n**图 16-1.**\
  \ 执行包任务编辑器 - 包页面\n\n这是您设置要执行的包的地方。“执行包任务”的一个新增功能是`ReferenceType`属性，它使开发人员能够使用主包来运行包含在当前项目中的包或项目外部的包。在此示例中，您将使用解决方案中的现有包。\n\
  \n此时，您可以单击“确定”按钮，从而获得一个完全可接受的主包。但在这样做之前，您应该深入了解一下如何使用下一个菜单“参数绑定”在包之间传递信息。\n\n####\
  \ 配置参数绑定\n\n仅仅调用子包并不那么令人兴奋。真正令人兴奋的是将子包与主包正在执行的操作联系起来！您可以通过父包参数来实现这一点。此选项仅在您使用与主包相同项目的子包时才可用。完成包参数的设置后，您应该看到如**图\
  \ 16-2**所示的屏幕。\n\n![执行包任务编辑器 - 参数绑定页面](img/9781484200834_Fig16-02.jpg)\n\n**图 16-2.**\
  \ 执行包任务编辑器 - 参数绑定页面\n\n要实现**图 16-2**所示的结果，您需要查看“执行包任务编辑器”并转到“参数绑定”页面。单击“添加”按钮以设置参数。对于“子包参数”，您可以选择一个已创建的参数，或者在您尚未创建子包参数的情况下添加自己的参数。请记住，这不会在子包中自动创建变量。这取决于您！接下来，您将分配来自主包的参数或变量以存储到子参数中。在**图\
  \ 16-2**所示的场景中，我们将父包的名称存储在子包的一个参数中，然后我们可以使用该参数来记录调用子包的包。\n\n如果您想测试该包，可以使用**清单 16-1**中所示的代码在子包中创建一个“脚本任务”。确保将`$Package::ParentPackageName`参数放入`ReadOnlyVariables`属性中。如果所有映射都正确，当您运行包时，您应该会在消息框中看到父包的名称，如**图\
  \ 16-3**所示。\n\n**清单 16-1.** 用于显示父包名称的 Visual Basic 代码\n\n```vb\nPublic Sub Main()\n\
  \    MsgBox(\"The name of the parent package is: \" &\n          Dts.Variables(\"\
  $Package::ParentPackageName\").Value.ToString)\n    Dts.TaskResult = ScriptResults.Success\n\
  End Sub\n```\n\n![显示父包名称的消息框](img/9781484200834_Fig16-03.jpg)\n\n**图 16-3.** 显示父包名称的消息框\n\
  \n现在您已经有一个可工作的父子包，让我们通过创建一个动态子包将其提升到一个新的水平。\n\n### 动态子包模式\n\nIntegration Services\
  \ 的亮点之一是它提供的灵活性，如果您想做一些不同的事情。例如，如果您不确定具体需要运行哪些包，您可以创建一个具有动态子包的主包，该子包将仅执行所需的包。如果您有一系列文件传入，但不确定哪些文件在特定时间传入，这是一个很好的主意。您的最终目标是创建一个看起来像**图\
  \ 16-4**的包。让我们通过一个示例来创建主包和您希望执行的动态包列表。\n\n![已完成的动态子包模式包](img/9781484200834_Fig16-04.jpg)\n\
  \n**图 16-4.** 已完成的动态子包模式包\n\n要创建包含包名称的表，请运行**清单 16-2**中找到的`CREATE`和`INSERT`语句。您可以创建一个名为`DesignPatterns`的数据库，或者修改脚本以针对您拥有并可用于实验的其他数据库运行。\n\
  \n**清单 16-2.** 用于创建和填充包列表表的 T-SQL 代码\n\n```sql\nUSE [DesignPatterns]\nGO\n\nCREATE\
  \ TABLE [dbo].PackageList NULL\n)\nGO\n\nINSERT INTO [dbo].[PackageList] ([ChildPackageName])\n\
  \     VALUES ('ChildPackage.dtsx')\nGO\n\nINSERT INTO [dbo].[PackageList] ([ChildPackageName])\n\
  \     VALUES ('ChildPackage2.dtsx')\nGO\n```\n\n现在您将创建主包。从一个空白的 SSIS 包开始，创建一个作用域为包级别的变量。（在本章的示例中，SSIS\
  \ 包名为`Dynamic.dtsx`）。该变量应命名为`packageListObject`，数据类型为`Object`。您不需要为该变量提供值。其次，添加另一个同样作用域为包级别的变量，命名为`packageName`，数据类型为`String`。将此变量的值设置为项目中某个包的名称（例如`ChildPackage.dtsx`）。\n\
  \n\n\n### 动态包执行模式\n\ndtsx`），以便用于设计时配置。接下来，在控制流中添加一个“执行 SQL 任务”。使用`清单 16-3`中所示的针对您刚刚为表创建的数据库执行查询的“执行\
  \ SQL 任务”。（提示：您需要一个名为`Source`的连接管理器，该管理器指向`DesignPatterns`数据库）。\n\n**清单 16-3**。查询包列表表的\
  \ T-SQL 代码\n\n```\nSELECT [ChildPackageName] FROM [dbo].[PackageList]\n```\n\n除了\
  \ SQL 查询外，还需确保`ResultSet`属性设置为返回完整结果集，并将其存储到您刚刚创建的名为`packageListObject`的变量中。此属性页可在`图\
  \ 16-5`中查看。\n\n![9781484200834_Fig16-05.jpg](img/9781484200834_Fig16-05.jpg)\n**图\
  \ 16-5**。执行 SQL 任务编辑器常规页\n\n将一个 ForEach 循环容器附加到执行 SQL 任务上。这将是您执行包的地方。在 ForEach 循环容器的“集合”页中，将枚举器设置为使用\
  \ Foreach ADO 枚举器，它将循环遍历变量对象。ADO 对象源变量字段应包含`@[User::packageListObject]`。此屏幕可在`图\
  \ 16-6`中查看。\n\n![9781484200834_Fig16-06.jpg](img/9781484200834_Fig16-06.jpg)\n**图\
  \ 16-6**。枚举`packageListObject`变量中每一行的 Foreach 循环编辑器常规页\n\n然后，您需要告诉 Integration Services\
  \ 如何处理它在枚举对象列表时检索到的值。在“变量映射”页，将变量设置为`@[User::packageName]`，索引设置为 0。这将把每个值放入变量中。\n\
  \n最后，您到了可以添加执行包部分的环节。与创建主-子包类似，您需要使用“执行包任务”。首先将`DelayValidation`属性设置为`True`，这允许您在运行时决定运行哪个包。\n\
  \n无需重复在主-子包中执行的相同步骤，直接转到“执行包任务编辑器”中的“表达式”页。这是您设置包动态部分的地方。将`PackageName`属性设置为使用表达式`@[User::packageName]`。最终的“表达式”页应如`图\
  \ 16-7`所示。\n\n![9781484200834_Fig16-07.jpg](img/9781484200834_Fig16-07.jpg)\n**图\
  \ 16-7**。执行包任务编辑器表达式页\n\n当包运行时，它将循环遍历`PackageList`表中的每一行；将执行 SQL 任务的`PackageName`属性设置为当前行，并仅执行您需要的包。请记住，除非您创建多个循环并专门编写主包代码来处理并行性，否则它总是会串行运行子包。\n\
  \n接下来，我们将描述在“子到父变量模式”中，子包如何将信息发送回父包。\n\n### 子到父变量模式\n\n父-子模式是管理框架的重要组成部分。例如，您可以使用主包模式将类似的包分组在一起，并确保它们按正确的顺序执行。您还可以使用动态子包模式来运行可变数量的包。为了确保存储所有这些信息，在包之间传递重要信息至关重要，不仅从父到子，也要从子到父。虽然此功能并不广为人知，但使用脚本任务是可以实现的。让我们使用您现有的包来演示如何将文件名从子包传递到其父包。\n\
  \n第一步是在父包中创建一个变量。\n\n在此示例场景中，您将创建一个名为`ChildFileName`的字符串数据类型变量，其作用域为包级别。在您先前在本章创建的执行包任务上，您将添加一个脚本任务。将`ChildFileName`变量添加为`ReadOnly`变量，并将`清单\
  \ 16-4`中的代码添加到 Visual Basic 脚本中。\n\n**清单 16-4**。显示子文件名的 Visual Basic 脚本\n\n```\n\
  Public Sub Main()\n    MsgBox(\"The name of the child file is: \" & _\n        \
  \  Dts.Variables(\"User::ChildFileName\").Value.ToString)\n    Dts.TaskResult =\
  \ ScriptResults.Success\nEnd Sub\n```\n\n接下来，修改您的子包。在脚本任务中，将变量`User::ChildFileName`添加到`ReadWriteVariables`属性列表中。您必须手动键入此内容，因为它不会显示在菜单中。因此，完整的只读变量列表显示为：\n\
  \n```\n$Package::ParentPackageName,User::ChildFileName\n```\n\n然后将`清单 16-5`中的一行代码添加到\
  \ Visual Basic 脚本任务中。\n\n**清单 16-5**。设置子文件名值的 Visual Basic 脚本\n\n```\nDts.Variables(\"\
  User::ChildFileName\").Value = \"SalesFile.txt\"\n```\n\n运行后，包将完成，效果如`图 16-8`所示。\n\
  \n![9781484200834_Fig16-08.jpg](img/9781484200834_Fig16-08.jpg)\n**图 16-8**。子到父变量模式执行\n\
  \n变量值从子到父的传递之所以成功，是因为 Integration Services 中容器的工作方式。在包内部，任何子容器（如 Sequence 容器）都可以访问其父容器的属性。同样，任何子任务（如执行\
  \ SQL 任务）都可以访问其父容器的属性。这种范式允许您使用变量和属性，而无需为包中的每个对象重新创建它们。当您使用“执行包任务”添加子包时，您就在父-子层次结构中添加了另一个层级，并允许子包设置父包的变量。\n\
  \n### 结论\n\n当 Integration Services 作为 SQL Server 2005 的一部分首次推出时，各地的 SQL Server 爱好者都欣然接受了它。最新版的\
  \ Integration Services 经过增强，让 ETL 开发人员比以前更加兴奋。如本章所讨论的，Integration Services 2012\
  \ 增加了管理框架的基础和创建父-子关系的能力。我们还讨论了主包模式和管理框架。\n\n### 第 17 章：配置\n\nSQL Server 2012 为 SSIS\
  \ 引入了一种新的、基于参数的配置模型。这个新模型旨在简化配置过程，并使用户更容易在运行时识别值的来源。尽管 2005/2008 样式的包配置在 SQL Server\
  \ 2012 和 SQL Server 2014 中仍受支持，但两种配置模型并不旨在混合使用。事实上，使用它们的菜单选项仅在您使用文件部署模型以及包是从早期版本升级而来时才会出现。在\
  \ SQL Server 2014 中创建的新包将默认使用新的参数模型。\n\n本章描述了新的参数模型以及如何使用它在运行时配置包属性。我们将探讨参数如何在 SSIS\
  \ 目录中公开，以及如何使用 Visual Studio 配置在构建过程中设置参数值作为构建过程的一部分。最后，我们将探讨可用于扩展内置参数模型提供的功能的模式，以实现动态的运行时配置。\n\
  \n\n\n### SSIS 参数概述\n\n`SSIS` 参数允许包定义一个明确的契约，很像 `C#` 等编程语言中的函数参数。与包配置不同，参数对调用者（如\
  \ `SQL Server Agent` 或执行包任务）是公开的，因此用户能够准确看到包运行所需的内容。参数本质上是特殊命名空间中的只读包变量。它们遵循与包变量相同的类型系统，并会出现在变量出现的所有用户界面中（例如，用于设置属性表达式）。你将通过表达式或在脚本任务中读取来使用参数值。参数值在包执行开始之前设置，并且在包运行时无法更改。\n\
  \n参数可以在包级别和项目级别定义。包级别参数仅对该包内的任务和组件可见——很像包变量。包参数在 `$Package` 命名空间中定义。在项目级别定义的参数是全局的——项目中的所有包都可以使用它们。项目参数在\
  \ `$Project` 命名空间中定义。\n\n图 17-1 显示了 `SQL Server Data Tools for Business Intelligence`\
  \ (`SSDT-BI`) 中新的“参数”选项卡，该选项卡显示在包级别定义的参数。除了在包变量上可以找到的标准属性（如 `Name`、`Type` 和 `Value`）之外，“参数”选项卡还公开了三个新属性：`Description`、`Sensitive`\
  \ 和 `Required`。\n\n![9781484200834_Fig17-01.jpg](img/9781484200834_Fig17-01.jpg)\n\
  图 17-1。包级别参数在 `SSDT-BI` 中有自己的选项卡上创建和显示\n\n`Description` 字段为 `SSIS` 包开发人员提供了一种便捷的方式来记录其包的参数。建议你为参数提供描述，特别是在运行或配置包的人与开发包的人不是同一个人的情况下。\n\
  \n如果一个参数被标记为 `Sensitive`，其值将在包中以加密格式存储（或者根本不存储，具体取决于包的 `ProtectionLevel` 设置）。其值在用户界面中显示时也会被屏蔽，并且不会出现在执行日志中。敏感参数只能用于标记为\
  \ `Sensitive` 的属性的表达式中（例如连接管理器的 `Password` 属性）。敏感参数值也可以通过 `Variable.GetSensitiveValue()`\
  \ 方法在脚本任务或脚本组件中检索。\n\n标记为 `Required` 的参数必须在运行时指定其值。所有参数（和变量）在设计时都需要设置值以用于验证。必需参数在包运行时不会使用此设计时值——必须由调用者（即\
  \ `SQL Server Agent` 或父执行包任务）指定一个新值。如果参数的 `Required` 属性设置为 `False`，则该参数变为可选——如果没有提供其他值，则将使用其设计时值。没有逻辑默认值（如\
  \ `BatchID` 或输入文件路径）的参数应标记为 `Required`。\n\n项目级别参数可以通过访问解决方案资源管理器中的新节点找到（如图 17-2\
  \ 所示）。项目参数出现在它们自己的节点中，因为它们存储在解决方案目录中的一个单独文件 (`Project.params`) 中。双击此节点会打开与包参数相同使用的参数设计器，具有所有相同的属性和选项。\n\
  \n![9781484200834_Fig17-02.jpg](img/9781484200834_Fig17-02.jpg)\n图 17-2。项目级别参数可以在解决方案资源管理器中的\
  \ `Project.params` 节点中找到\n\n### 使用参数配置你的包\n\n参数值通过 `SSIS` 表达式在你的包中使用。表达式可以设置在大多数任务属性、变量以及数据流任务中的某些组件属性上。要在任务上设置表达式，请单击任务“属性”窗口中表达式的属性，打开“属性表达式编辑器”对话框（如图\
  \ 17-3 所示）。\n\n![9781484200834_Fig17-03.jpg](img/9781484200834_Fig17-03.jpg)\n图\
  \ 17-3。“属性表达式编辑器”对话框显示所有设置了表达式的属性\n\n表达式可以直接从“变量”窗口设置在变量上（如图 17-4 所示）。在 `SQL Server\
  \ 2012` 中，向变量添加表达式会自动将其 `EvaluateAsExpression` 属性设置为 `True`——在产品的早期版本中，你必须自己执行此步骤。你可以通过将此属性设置回\
  \ `False` 来禁用变量的表达式求值。\n\n![9781484200834_Fig17-04.jpg](img/9781484200834_Fig17-04.jpg)\n\
  图 17-4。在 `SQL Server 2012` 中，表达式可以直接从“变量”窗口设置。设置了表达式的变量会显示一个特殊图标\n\n图 17-4 还展示了\
  \ `SQL Server 2012` 中的一项新功能——表达式修饰器。如果任务的任何属性通过表达式设置，任务、连接管理器和变量的图标将会改变，为开发人员提供了一种视觉方式来识别包的哪些部分是动态设置的。\n\
  \n为数据流组件设置表达式不如为任务设置那么直接。主要区别在于表达式是设置在数据流任务本身上，并且并非所有组件属性都是可表达的。图 17-5 展示了查找转换上的可表达属性如何“冒泡”并显示为数据流任务的属性。\n\
  \n![9781484200834_Fig17-05.jpg](img/9781484200834_Fig17-05.jpg)\n图 17-5。可表达的数据流组件属性将显示为数据流任务上的属性\n\
  \n包和项目级别的参数将出现在显示可用变量列表的所有用户界面中。在“表达式生成器”对话框（图 17-6）中，所有参数都显示在“变量和参数”文件夹下。\n\n![9781484200834_Fig17-06.jpg](img/9781484200834_Fig17-06.jpg)\n\
  图 17-6。参数与变量一起出现在“表达式生成器”对话框中\n\n某些任务和数据流组件能够不使用表达式就利用变量和参数值。例如，`OLE DB` 源提供了一种“来自变量的\
  \ `SQL` 命令”数据访问模式，允许你从变量设置源查询。对于所有此类属性，可以使用参数代替变量。\n\n### 使用参数化对话框\n\n`SSIS` 提供了一个参数化用户界面（如图\
  \ 17-7 所示），它充当在你的包中使用参数的快捷方式。从这个界面，你可以创建一个新参数或使用一个已经存在的参数。要启动参数化界面，请右键单击任务、容器或控制流，然后从上下文菜单中选择“参数化”。当你单击“确定”时，`SSIS`\
  \ 将自动向所选属性添加一个表达式。\n\n![9781484200834_Fig17-07.jpg](img/9781484200834_Fig17-07.jpg)\n\
  图 17-7。参数化界面是在你的包中使用参数的快捷方式\n\n### 创建 Visual Studio 配置\n\n你可以使用 `Visual Studio`\
  \ 配置在 `SSDT-BI` 中创建多组参数值。\n\n\n\n### Visual Studio 配置与 SSIS 包管理\n\n在开发过程中，切换配置可以轻松地更改参数值，并允许你构建具有不同默认参数值的多个项目部署文件版本。Visual\
  \ Studio 配置是开发人员在多开发者或团队环境中维护各自设置的一种方式。\n\n当首次在 SSDT-BI 中创建项目时，会有一个名为 `Development`\
  \ 的默认配置。你可以从“配置管理器”对话框（如图 17-8 所示）创建额外的配置。你可以从“标准”工具栏上的“解决方案配置”组合框，或者通过右键单击“解决方案资源管理器”中的项目节点，选择“属性”，然后单击“配置管理器”按钮来启动“配置管理器”对话框。要创建新配置，请从“活动解决方案配置”下拉列表中选择“<新建...>”选项。\n\
  \n![9781484200834_Fig17-08.jpg](img/9781484200834_Fig17-08.jpg)\n\n图 17-8. Visual\
  \ Studio 配置可以通过“配置管理器”对话框进行管理\n\n要向配置添加参数，请单击包“参数”选项卡上的“将参数添加到配置”按钮。图 17-9 显示了当向配置添加包参数时将显示的“管理参数值”对话框。单击“添加”按钮允许你选择一个参数——一旦添加了一个参数，它将出现在解决方案的所有配置中。“删除”按钮将从配置中删除所选参数（这意味着在设计时它总是具有相同的默认值）。“同步”按钮会将相同的值应用于所有配置——当你确定参数的默认值应在所有配置中更改时，请使用此按钮作为快捷方式。目前，你只能向\
  \ Visual Studio 配置添加包参数和项目参数，但它们是从不同的对话框配置的。要管理项目级参数，请从项目参数设计器 (`Project.params`)\
  \ 中单击“将参数添加到配置”按钮。要使用 Visual Studio 配置管理连接管理器的设置，你首先需要将连接管理器参数化。共享连接管理器无法使用 Visual\
  \ Studio 配置进行配置。\n\n![9781484200834_Fig17-09.jpg](img/9781484200834_Fig17-09.jpg)\n\
  \n图 17-9. “管理参数值”对话框显示当前通过配置设置的所有参数\n\n![Image](img/sq.jpg) **注意** 当参数由 Visual Studio\
  \ 配置控制时，其值将保存到 Visual Studio 项目文件 (`.dtproj`) 中。在更新配置后务必保存项目文件，以确保不会丢失更改。\n\n###\
  \ 指定入口点包\n\nSQL Server 2012 为 SSIS 引入了另一个新概念——`entry-point package`。此功能允许包开发人员指出应特别注意某些包。这在包含少量主包（这些主包运行许多子包）的项目中非常有用。请注意，未标记为入口点包的包仍可运行——该设置旨在为在\
  \ SSIS 目录中配置参数值的人员提供提示。SQL Server Management Studio (SSMS) 中的大多数 SSIS UI 都允许你快速过滤掉非入口点包上的参数，从而只查看需要设置的参数。\n\
  \n包默认标记为入口点。要删除此设置，请右键单击“解决方案资源管理器”中的包名称，并取消选择“入口点包”选项。\n\n### 连接管理器\n\n大多数连接管理器都需要某种形式的配置，在\
  \ SQL Server 2012 中，当通过 SSIS 目录运行包时，所有连接管理器属性都是可配置的。由于这些属性已经公开，在大多数情况下，你将不需要为连接管理器公开额外的参数。但是，你可能会遇到一些情况，其中参数化的连接管理器将是有益的。请注意，任何通过表达式设置的连接管理器属性都不会通过\
  \ SSIS 目录公开，这可以防止 DBA 意外覆盖在运行时设置的属性值。\n\n![Image](img/sq.jpg) **注意** 在早期版本的 SQL\
  \ Server Integration Services 中，子包通常使用父包的变量值来配置连接管理器。如果连接字符串是在运行时确定的，你可能希望在 SQL\
  \ Server 2014 中保留此模式；然而，在许多情况下，你会希望改用共享连接管理器。\n\n可以使用属性表达式在连接管理器上设置参数。通过表达式设置的最常见属性是\
  \ `ConnectionString`，因为许多连接管理器通过解析 `ConnectionString` 值来获取其属性。配置连接管理器时，请务必在 `ConnectionString`\
  \ 或单个属性上设置表达式——无法保证表达式的解析顺序，并且在应用 `ConnectionString` 时某些属性可能会被覆盖。\n\n要参数化共享连接管理器，请打开项目中的一个包，并右键单击设计图面“连接管理器”区域中共享连接管理器的名称。请注意，由于共享连接管理器是在项目级别声明的，因此你只能在共享连接管理器的任何属性表达式中使用项目级参数或静态字符串。表达式对话框不会为你提供使用包参数或变量的选项。\n\
  \n### 服务器上的参数配置\n\n参数的设计目的是使调度和运行 SSIS 包的人员工作起来更轻松。在许多环境中，这通常是 DBA 或 IT 运维人员——而不是最初开发包的人员。通过包含参数的描述，ETL\
  \ 开发人员可以创建自文档化的包，使配置包的人员能够非常容易地看到它运行所需的确切内容。\n\n本节介绍如何通过 SSIS 目录配置包以及如何通过 SSMS 公开参数。它涵盖了项目部署后如何设置默认参数值、各种包执行选项，以及\
  \ SQL Server 2012 中内置的报告功能如何更轻松地确定包运行时设置的精确配置值。\n\n#### 默认配置\n\n所有参数和连接管理器的默认值在构建时保存在\
  \ SSIS 项目部署文件 (`.ispac`) 中。一旦项目部署到 SSIS 目录，这些就成为项目的默认值。要更改默认配置，请在 SSMS 对象资源管理器中右键单击项目名称（或单个包名称）并选择“配置”（如图\
  \ 17-10 所示）。\n\n![9781484200834_Fig17-10.jpg](img/9781484200834_Fig17-10.jpg)\n\n\
  图 17-10. 项目部署后，可以通过 SSMS 更改项目的默认配置\n\n图 17-11 显示了 SSMS 中的参数配置对话框。通过此对话框，你可以为此项目内的所有包设置所有参数和连接管理器属性的默认值。“范围”下拉列表允许你筛选参数和连接管理器的视图。\n\
  \n\n\n默认视图将仅显示入口点包，但您也可以查看单个包以及整个项目的参数。要更改参数或连接管理器属性的值，请单击行末尾的省略号按钮。更改值时，您将有三个选项：使用项目默认值、设置字面值或使用服务器环境变量。有关环境的更多信息，请参阅下一节。\n\
  \n![9781484200834_Fig17-11.jpg](img/9781484200834_Fig17-11.jpg)\n\n#### 图 17-11.\
  \ 参数配置对话框\n\n### 服务器环境\n\n服务器环境包含一组变量——本质上是名称-值对——您可以将它们映射到项目中的参数和连接管理器属性。当您通过 `SSIS\
  \ 目录` 运行包时，可以选择一个环境来运行它。当一个值映射到服务器环境变量时，其值将由其当前运行的运行环境决定。\n\n在将值映射到服务器环境变量之前，必须先将环境与项目关联。图\
  \ 17-12 显示了项目配置对话框的“引用”页面，该页面允许您将项目与一个或多个环境关联。\n\n![9781484200834_Fig17-12.jpg](img/9781484200834_Fig17-12.jpg)\n\
  \n#### 图 17-12. 配置对话框的“引用”页面允许您将项目与环境关联\n\n与项目类似，环境也包含在 `SSIS 目录` 中的一个文件夹内。项目可以引用目录中任何文件夹中的环境——引用不限于当前文件夹。如果您计划在项目中使用环境，可以考虑创建一个单独的文件夹作为存储所有公共环境的区域。\n\
  \n环境支持行级安全性。与项目和文件夹类似，您可以配置哪些用户或角色有权访问单个环境。用户将无法看到他们无权访问的环境。\n\n一旦项目与一个或多个服务器环境关联，您就能够将参数和连接管理器的值映射到这些环境中包含的变量。\n\
  \n![Image](img/sq.jpg) `注意` 环境可以包含任意数量的服务器变量，并且两个环境可能不包含同名的变量。如果参数或连接管理器的值映射到一个服务器变量，那么在您选择要运行包的环境时，只有包含该名称变量（且数据类型匹配！）的环境才可用。\n\
  \n### 使用 T-SQL 设置默认参数值\n\n默认参数值和连接管理器属性可以通过 `SSIS 目录` 的 `T-SQL` API 进行设置。这使得 `DBA`\
  \ 能够在部署后或项目移动到新的 `SSIS 目录` 后自动设置参数值。创建脚本的一种简单方法是通过参数配置 `UI` 进行更改，然后单击 `脚本` 按钮。清单\
  \ 17-1 展示了用于为两个项目设置默认值的 `T-SQL`：一个包参数 (`MaxCount`) 被设置为 `100`，一个连接管理器属性 (`CM.SourceFile.ConnectionString`)\
  \ 被设置为 `'C:\\Demos\\Data\\RaggedRight.txt'`。\n\n#### ***清单 17-1***. 使用 T-SQL 设置参数值\n\
  \n```sql\nDECLARE @var sql_variant = N'C:\\Demos\\Data\\RaggedRight.txt'\nEXEC [SSISDB].[catalog].[set_object_parameter_value]\n\
  \        @object_type=20,\n        @parameter_name=N'CM.SourceFile.ConnectionString',\n\
  \        @object_name=N'ExecutionDemo',\n        @folder_name=N'ETL',\n        @project_name=N'ExecutionDemo',\n\
  \        @value_type=V,\n        @parameter_value=@var\nGO\n\nDECLARE @var bigint\
  \ = 100\nEXEC [SSISDB].[catalog].[set_object_parameter_value]\n        @object_type=30,\n\
  \        @parameter_name=N'MaxCount',\n        @object_name=N'LongRunning.dtsx',\n\
  \        @folder_name=N'ETL',\n        @project_name=N'ExecutionDemo',\n       \
  \ @value_type=V,\n        @parameter_value=@var\nGO\n```\n\n![Image](img/sq.jpg)\
  \ `注意` 有关更多信息，请参阅 SQL Server 联机丛书中关于 `set_object_parameter_value` 存储过程的条目：`http://msdn.microsoft.com/en-us/library/ff878162(sql.110).aspx`。\n\
  \n### 通过 SSIS 目录执行包\n\n执行包时，可以覆盖参数和连接管理器属性的默认值。`SSMS` 中的执行包 `UI`（如图 17-13 所示）允许您为该特定包执行指定要使用的值。项目和包级别的参数显示在“参数”选项卡上，共享连接管理器和包级别的连接管理器显示在“连接管理器”选项卡上。“高级”选项卡允许您覆盖未作为参数公开的属性值。此功能（称为属性覆盖）允许\
  \ `DBA` 快速配置包内值的更改，而无需重新部署整个项目。该功能类似于使用 `DTEXEC` 实用程序的 `/Set` 命令行选项。\n\n![9781484200834_Fig17-13.jpg](img/9781484200834_Fig17-13.jpg)\n\
  \n#### 图 17-13. 通过 SSMS 进行交互式包执行\n\n执行包 `UI` 还有一个 `脚本` 菜单，允许您将创建包执行的操作脚本化为 `T-SQL`。清单\
  \ 17-2 提供了一个创建新包执行并覆盖多项设置的示例。此过程涉及多个步骤：\n\n1.  使用 `[catalog].[create_execution]`\
  \ 创建新的执行实例。\n2.  使用 `[catalog].[set_execution_parameter_value]` 覆盖参数或连接管理器值。\n3.\
  \  使用 `[catalog].[set_execution_property_override_value]` 设置属性覆盖。\n4.  使用 `[catalog].[start_execution]`\
  \ 启动包执行。\n\n#### ***清单 17-2***. 使用 T-SQL 运行包\n\n```sql\n-- 创建包执行\nDECLARE @exec_id\
  \ bigint\nEXEC [SSISDB].[catalog].[create_execution]\n        @execution_id=@exec_id\
  \ OUTPUT,\n        @package_name=N'LoadCustomers.dtsx',\n        @folder_name=N'ETL',\n\
  \        @project_name=N'ExecutionDemo',\n        @use32bitruntime=0\n\n-- 为 SourceFile\
  \ 连接管理器的 AlwaysCheckForRowDelimiters 属性设置新值\nEXEC [SSISDB].[catalog].[set_execution_parameter_value]\n\
  \        @execution_id=@exec_id,\n        @object_type=20,\n        @parameter_name=N'CM.SourceFile.AlwaysCheckForRowDelimiters',\n\
  \        @parameter_value=0\n\n-- 设置此执行的日志记录级别\nEXEC [SSISDB].[catalog].[set_execution_parameter_value]\n\
  \        @execution_id=@exec_id,\n        @object_type=50,\n        @parameter_name=N'LOGGING_LEVEL',\n\
  \        @parameter_value=1\n\n-- 为 MaxConcurrentExecutables 属性创建属性覆盖\nEXEC [SSISDB].[catalog].[set_execution_property_override_value]\n\
  \        @execution_id=@exec_id,\n        @property_path=N'\\Package.Properties[MaxConcurrentExecutables]',\n\
  \        @property_value=N'1',\n        @sensitive=0\n\n-- 启动包执行\nEXEC [SSISDB].[catalog].[start_execution]\
  \ @exec_id\n\n-- 返回执行 ID\nSELECT @exec_id\nGO\n```\n\n`SQL Server 代理` 中的 `Integration\
  \ Services` 作业步骤在 `SQL Server 2012` 中得到了增强，以支持运行存储在 `SSIS 目录` 中的包。其用户界面与通过 `SSMS`\
  \ 交互式运行包时相同，并提供相同的配置选项。或者，您可以使用 `T-SQL` 作业步骤运行 `SSIS` 包。但是，由于此步骤不支持使用代理账户，您将只能以\
  \ `SQL Server 代理` 服务账户的身份运行包。\n\n\n### 使用 DTEXEC 的参数\n\n用于运行 SSIS 包的命令行实用工具 (`DTEXEC`)\
  \ 已更新，以支持项目和参数。`DTEXEC` 能够运行存储在 SSIS 项目文件 (`.ispac`) 内的包，也能启动对存储在 SSIS 目录（本地或远程）中的包执行基于服务器的运行。两种模式使用不同的命令行开关来设置参数值，并在后续页面的独立章节中进行描述。\n\
  \n**注意：** 当处理单个 SSIS 包文件 (`.dtsx`) 时，`DTEXEC` 的行为与 SQL Server 早期版本中的行为相同。有关 `DTEXEC`\
  \ 各种命令行选项的更多信息，请参阅其联机丛书条目：`http://msdn.microsoft.com/en-us/library/ms162810.aspx`。\n\
  \n### 文件系统上的项目\n\n尽管新的项目部署模型主要用于与 SSIS 目录配合使用，但也可以使用 `DTEXEC` 在项目文件内运行包。以这种方式运行的包由\
  \ `DTEXEC` 进程在本地执行。可以使用 `/Set` 选项设置单个参数值，而 `/ConfigFile` 可用于从 2005/2008 风格的 XML\
  \ 配置文件设置多个参数值。表 17-1 总结了与运行存储在文件系统上的项目中的包相关的选项。\n\n表 17-1. 用于使用项目文件 (`.ispac`) 的\
  \ `DTEXEC` 命令行选项\n\n| 参数 | 描述 |\n| --- | --- |\n| `Proj[ect]=*项目路径*` | 此选项提供 SSIS\
  \ 项目文件 (`.ispac`) 的路径。<br>示例：`/Proj c:\\demo\\project.ispac` |\n| `Pack[age]=*包名称*`\
  \ | 您想要运行的项目文件内的包的名称。该值应包含 `.dtsx` 扩展名。<br>示例：`/Pack MyPackage.dtsx` |\n| `Set=*参数名称;值*`\
  \ | 此选项允许您为项目内的参数设置值。其语法类似于您在命令行上覆盖包变量值时使用的语法。使用 `$Project` 命名空间为项目作用域定义的参数设置值，使用\
  \ `$Package` 为包作用域定义的参数设置值。<br>示例：`/Set=\\Package.Variables[$Project::IntParameter];1`\
  \ |\n| `Conf[igFile]=*文件路径*` | 此选项允许您从 XML 配置文件设置多个参数值。每个参数值的语法类似于 `/Set` 选项中使用的语法。<br>示例：`/Conf\
  \ parameters.xml` |\n\n清单 17-3 提供了运行包含在项目文件 (`project.ispac`) 中的包 (`MyPackage.dtsx`)\
  \ 的示例。它设置了两个参数的值：`BatchNumber`（一个在项目级别定义的整数参数）和 `HostName`（一个在包级别定义的字符串参数）。\n\n\
  [**清单 17-3.** 使用 `DTEXEC` 在项目文件内运行包]\n\n```\ndtexec.exe /Project c:\\demo\\project.ispac\
  \ /Package MyPackage.dtsx /Set \\Package.Variables[$Project::BatchNumber];432 /Set\
  \ \\Package.Variables[$Package::HostName];localhost\n```\n\n**注意：** 虽然设置参数值的语法类似于设置变量和其他包属性的值，但有一个关键区别。要设置参数值，不应包含属性的名称——您只需指定参数本身的名称。\n\
  \n### SSIS 目录中的项目\n\n`DTEXEC` 在 SQL Server 2012 中进行了扩展，以支持运行包含在 SSIS 目录中的包。与其他执行模式不同，当从目录运行包时，执行发生在\
  \ SSIS 目录的服务器上，而不是由 `DTEXEC` 进程执行。在此模式下，您将使用 `/ISServer` 命令行选项指定要运行的包的路径，使用 `/Parameter`\
  \ 选项设置参数值，如果希望在特定的服务器环境中运行包，则使用 `/EnvReference` 选项。\n\n表 17-2 包含了使用 `DTEXEC` 进行基于\
  \ SSIS 目录执行的所有命令行选项列表。\n\n表 17-2. 用于 SSIS 目录的 `DTEXEC` 命令行选项\n\n| 参数 | 描述 |\n| ---\
  \ | --- |\n| `Ser[ver]=*服务器实例*` | 包含 SSIS 目录的 SQL 实例的名称。如果未指定此选项，则假定为 `localhost`\
  \ 上的默认实例。<br>示例：`/Ser ETLSERVER1` |\n| `IS[Server]=*包路径*` | SSIS 目录中包的路径。这将包含目录名称\
  \ (`SSISDB`)、文件夹名称、项目名称以及您要运行的包的名称。此选项不能与 `/DTS`、`/SQL` 或 `/FILE` 选项一起使用。<br>示例：`/IS\
  \ \\SSISDB\\MyFolder\\ETLProject\\MyPackage.dtsx` |\n| `Par[ameter]= *名称[(类型)];值*`\
  \ | 为给定参数设置值。在名称中包含参数的命名空间以区分参数作用域（项目级别参数使用 `$Project`，包级别参数使用 `$Package`，连接管理器属性使用\
  \ `$CM`，服务器特定选项使用 `$ServerOption`）。如果未包含命名空间，则假定参数位于包作用域。<br>示例：`/Par $Project::BatchNumber;432`\
  \ |\n| `Env[Reference]=*环境 ID*` | 此选项允许您指定运行包时要使用的服务器环境。任何已绑定到服务器环境变量的参数值都将自动解析。要获取环境的\
  \ ID，请在 `SSISDB` 的 `[catalog].[environments]` 视图中查询其名称。<br>示例：`/Env 20` |\n\n清单\
  \ 17-4 提供了在远程 SSIS 目录服务器 (`ETLServer`) 上的文件夹 (`MyFolder`) 内的项目 (`ETLProject`) 中运行包\
  \ (`MyPackage.dtsx`) 的示例。它设置了两个参数的值：`BatchNumber`（一个在项目级别定义的整数参数）和 `HostName`（一个在包级别定义的字符串参数）。它还将\
  \ `SYNCHRONIZED` 服务器选项设置为 `True`，这告诉 `DTEXEC` 以同步模式运行——关于同步与异步执行的更多细节将在后续页面中介绍。\n\
  \n[**清单 17-4.** 使用 `DTEXEC` 在 SSIS 目录内运行包]\n\n```\nC:\\>dtexec.exe /Ser ETLServer\
  \ /IS \\SSISDB\\MyFolder\\ETLProject\\MyPackage.dtsx /Par $Project::BatchNumber;432\
  \ /Par $Package::HostName;localhost /Par \"$ServerOption::SYNCHRONIZED(Boolean)\"\
  ;True\n\nMicrosoft (R) SQL Server Execute Package Utility Version 12.0.2000.8 for\
  \ 64-bit\nCopyright (C) Microsoft Corporation. All rights reserved.\n\nStarted:\
  \  4:46:44 PM\nExecution ID: 4. To view the details for the execution, right-click\
  \ on the Integration Services Catalog, and open the [All Executions] report\nStarted:\
  \  4:46:44 PM\nFinished: 4:49:45 PM\nElapsed:  3 seconds\n```\n\n**注意：** 当您运行包含在\
  \ SSIS 目录中的包时，必须使用 Windows 身份验证连接到 SQL Server 实例。`/User` 和 `/Password` 命令行选项不能与\
  \ `/ISServer` 选项一起使用。如果您需要模拟其他用户帐户，可以将 `RunAs` DOS 命令与 `DTEXEC` 配合使用。\n\n当您使用 `DTEXEC`\
  \ 运行 SSIS 目录包时，默认情况下它将以异步模式运行。这意味着进程将立即返回，并且不会告诉您包是否实际成功运行。要获得同步执行行为（例如，与从文件系统或\
  \ `MSDB` 运行包时相同的行为），您需要包含 `/Par \"$ServerOption::SYNCHRONIZED(Boolean)\";True` 命令行开关。当使用同步执行时，`DTEXEC`\
  \ 进程在包运行完成之前不会返回。\n\n\n### SSIS Catalog 与 DTEXEC 执行的事件显示差异\n\nSSIS Catalog 与使用 DTEXEC\
  \ 执行包的另一个区别在于，包运行时发生的事件不会显示在命令行上。清单 17-4 展示了在 SSIS Catalog 中运行包的示例输出——如你所见，只有一条消息告诉你服务器执行\
  \ ID，并指向目录报告。\n\n### 动态配置\n\n入口点包上的参数允许用户指定值，但这要求这些值在包开始运行前就已知。有时你可能需要在运行时确定配置，或从其他源（如外部文件或数据库表）动态获取值。以下各节提供了可用于增强参数模型所提供功能的设计模式。\n\
  \n#### 从数据库表配置\n\nSSIS Catalog 为包配置值提供了一个中心位置，但你的环境可能已有其他存储包运行时所需元数据的位置。此模式展示了如何使用执行\
  \ SQL 任务从数据库表中检索值，以及如何使用属性表达式配置包中的属性。在此示例中，你将从数据库读取目录和文件名，将值存储到变量中，然后使用它们动态设置平面文件连接管理器的\
  \ `ConnectionString`。\n\n##### 创建数据库表\n\n清单 17-5 显示了你将从中读取配置值的表的 SQL 定义。表中的每一行都代表一个你希望使用此包处理的新平面文件。你感兴趣的两个主要列是\
  \ `directory` 和 `name`——`id` 列是代理键，用于唯一标识表中的每一行，`processed` 列让我们可以轻松过滤掉已处理的文件。示例值如表\
  \ 17-3 所示。\n\n**清单 17-5.** 包将读取其配置值的表的 SQL 定义\n```sql\nCREATE TABLE [dbo].[PackageConfiguration]\
  \ (\n         [id] int IDENTITY(1,1) NOT NULL,\n         [directory] nvarchar(255)\
  \ NOT NULL,\n         [name] nvarchar(255) NOT NULL,\n         [processed] bit NOT\
  \ NULL\n)\n```\n\n**表 17-3.** 来自`PackageConfiguration`表的示例行\n![Table17-3.jpg](img/Table17-3.jpg)\n\
  \n##### 使用执行 SQL 任务检索配置值\n\n你将使用执行 SQL 任务，从你创建的 `PackageConfiguration` 表中检索需要处理的文件列表。你将把结果集存储到包变量中，然后使用\
  \ Foreach 循环容器遍历每一行。你将使用 `processed` 字段来标记已处理的文件——一旦成功加载文件，你就将 `processed` 值设置为\
  \ `True`。\n\n![Image](img/sq.jpg) **注意**  此示例假设`PackageConfiguration`表中列出的所有平面文件都具有相同的模式。它不涵盖实际将平面文件加载到数据库所需的逻辑——它旨在说明你可以用作模板，用于在循环中处理多个项目的模式。\n\
  \n设置包需要执行以下步骤：\n\n1.  添加四个包变量。\n    *   **`FileID` (`Int32`):** 当前正在处理文件的行 ID\n\
  \    *   **`Directory` (`String`):** 包含你需要处理的平面文件的目录\n    *   **`FileName` (`String`):**\
  \ 你正在处理的文件的名称\n    *   **`FilesToProcess` (`Object`):** 执行 SQL 任务的结果集\n2.  向包中添加一个执行\
  \ SQL 任务；将其命名为 **`Retrieve File List`**。\n3.  双击该任务以打开其编辑器。\n4.  确保 `ConnectionType`\
  \ 为 `OLE DB`。\n5.  点击 `Connection` 下拉菜单并选择 `New connection...`。\n6.  点击 `New` 并配置连接管理器，使其指向包含\
  \ `PackageConfiguration` 表的数据库。\n7.  从`PackageConfiguration`表中选择所有未处理的文件（如清单 17-6\
  \ 所示）。\n    **清单 17-6.** 从配置表中提取所有尚未处理的条目的查询\n    ```sql\n    SELECT * FROM [dbo].[PackageConfiguration]\
  \ WHERE [processed] = 0\n    ```\n8.  将 `ResultSet` 值设置为 `Full Result Set`。这意味着执行\
  \ SQL 任务将检索值作为可供 Foreach 循环处理的 ADO 记录集。请注意，你也可以在这里使用 ADO.NET 连接管理器，这将导致结果作为 ADO.NET\
  \ 数据表返回。\n9.  点击 `Result Set` 选项卡。\n10. 点击 `Add`，并使用以下映射：\n    1.  **Result Name:**\
  \ `0`\n    2.  **Variable Name:** `User::FilesToProcess`\n11. 点击 `OK` 以保存对执行 SQL\
  \ 任务的更改。\n12. 向包中添加一个 Foreach 循环容器。\n13. 将执行 SQL 任务连接到 Foreach 循环容器。\n14. 在 Foreach\
  \ 循环容器内添加一个数据流任务。\n15. 在 Foreach 循环容器内添加一个新的执行 SQL 任务。\n16. 将数据流任务连接到执行 SQL 任务。\n\
  17. 双击执行 SQL 任务以打开其编辑器。\n18. 将连接设置为你在第 5 步创建的同一连接管理器。\n19. 清单 17-7 显示了将表中行标记为已处理的\
  \ `SQLStatement`。请注意，该语句包含一个参数标记（问号）。你将在下一步将变量值映射到此参数。\n    **清单 17-7.** 将文件标记为已处理的\
  \ SQL 语句\n    ```sql\n    UPDATE [dbo].[PackageConfiguration] SET [processed] =\
  \ 1 WHERE   id = ?\n    ```\n20. 点击 `Parameter Mapping` 选项卡。\n21. 点击 `Add`，并使用以下映射：\n\
  \    1.  **Variable name:** `User::FileID`\n    2.  **Data Type:** `LONG`\n    3.\
  \  **Parameter Name:** `0`\n22. 点击 `OK` 以保存对执行 SQL 任务的更改。\n23. 添加一个新的平面文件连接管理器，并将其指向一个现有的平面文件。\n\
  24. 右键单击平面文件连接管理器，然后选择 `Properties`。\n25. 选择 `Expression` 属性，并打开属性表达式编辑器。\n26. 在\
  \ `ConnectionString` 属性上设置一个表达式，该表达式利用从 `PackageConfiguration` 表中检索到的变量值。清单 17-8\
  \ 提供了该表达式的示例。\n    **清单 17-8.** 在`ConnectionString`属性上设置输入文件路径的表达式\n    ```text\n\
  \    @[User::Directory] + \"\\\\\" +  @[User::FileName]\n    ```\n\n你的包现在应该如图 17-14\
  \ 所示。\n![9781484200834_Fig17-14.jpg](img/9781484200834_Fig17-14.jpg)\n**图 17-14.**\
  \ 配置为基于执行 SQL 任务的动态配置的包\n\n#### 使用脚本任务设置值\n\n除了使用执行 SQL 任务检索配置并通过表达式设置包属性外，另一种方法是使用脚本任务。如果你的值不是来自数据库，或者它们需要额外的处理逻辑（例如，来自加密源），这种方法可能很有用。在脚本任务中，你可以轻松地从外部配置文件（如\
  \ XML 文件）读取值，并访问可能被数据集成解决方案中其他非 SSIS 部分使用的共享配置资源。\n\n\n\n脚本任务能够在运行时读取和修改包属性，包括变量值和所有连接管理器属性。清单\
  \ 17-9 提供了一个脚本任务的示例代码，该任务在运行时设置连接管理器的 `ConnectionString`。\n\n### 清单 17-9. 使用脚本任务设置包属性的示例代码\n\
  \n```csharp\npublic void Main()\n{\n    // TODO: 从外部配置文件设置此值\n    const string SourceSystemConnectionString\
  \ = \"...\";\n\n    Dts.TaskResult = (int)ScriptResults.Success;\n\n    if (Dts.Connections.Contains(\"\
  SourceSystem\"))\n    {\n        ConnectionManager cm = Dts.Connections[\"SourceSystem\"\
  ];\n        cm.ConnectionString = SourceSystemConnectionString;\n    }\n    else\n\
  \    {\n        // 未找到预期的连接管理器 - 记录并设置错误状态\n        Dts.Events.FireError(0, \"Script\
  \ Task\",\n                            \"Could not find the SourceSystem connection\
  \ manager\",\n                            string.Empty, 0);\n\n        Dts.TaskResult\
  \ = (int)ScriptResults.Failure;\n    }\n}\n```\n\n### 动态包执行\n\n在此方法中，您将使用清单 17-5\
  \ 中的同一个表，但不是使用 SSIS 包读取配置值，而是使用 T-SQL 在 SSIS 目录上创建动态包执行。清单 17-10 中的代码实现了以下步骤：\n\n\
  1.  声明脚本变量。请注意，在实际脚本中，这些值将通过参数或外部源设置。\n2.  从 `PackageConfiguration` 表读取要处理的文件列表，并将结果存储在表变量\
  \ (`@FileList`) 中。\n3.  遍历文件列表。对于每个文件，代码将执行以下操作：\n    1.  从表变量中检索 ID 和参数值。\n   \
  \ 2.  创建一个新的 SSIS 目录包执行。\n    3.  设置 `Directory` 和 `FileName` 参数值。\n    4.  启动执行。\n\
  \    5.  更新 `PackageConfiguration` 表以标记该文件已处理。\n\n### 清单 17-10. 动态包执行脚本\n\n```sql\n\
  DECLARE @FolderName NVARCHAR(50) = N'ExecutionDemo'\nDECLARE @ProjectName NVARCHAR(50)\
  \ = N'ETL'\nDECLARE @DirectoryParameter NVARCHAR(50) = N'Directory'\nDECLARE @FileNameParameter\
  \ NVARCHAR(50) = N'FileName'\nDECLARE @PackageName NVARCHAR(100) = N'LoadCustomers.dtsx'\n\
  \nDECLARE @FileList TABLE (\n  RowNum smallint,\n  Id int,\n  Directory nvarchar(255),\n\
  \  Name nvarchar(255)\n)\n\nINSERT INTO @FileList (RowNum, Id, Directory, Name)\n\
  \                 SELECT ROW_NUMBER() OVER (ORDER BY id), id, Directory, Name\n\
  \         FROM [dbo].[PackageConfiguration]\n         WHERE processed = 0\n\nDECLARE\
  \ @maxCount int = (SELECT MAX(RowNum) FROM @FileList)\nDECLARE @count int = (SELECT\
  \ MIN(RowNum) FROM @FileList)\n\nWHILE (@count <= @maxCount)\nBEGIN\n\n        \
  \ DECLARE @Id NVARCHAR(255) = (SELECT Id FROM @FileList WHERE RowNum = @count)\n\
  \         DECLARE @DirectoryValue NVARCHAR(255) = (SELECT Directory FROM @FileList\
  \ WHERE RowNum = @count)\n         DECLARE @NameValue NVARCHAR(255) = (SELECT Name\
  \ FROM @FileList WHERE RowNum = @count)\n\n         -- 创建包执行\n         DECLARE @exec_id\
  \ bigint\n         EXEC [SSISDB].[catalog].[create_execution]\n                \
  \   @execution_id = @exec_id OUTPUT,\n                   @package_name = @PackageName,\n\
  \                   @folder_name = @FolderName,\n                   @project_name\
  \ = @ProjectName\n\n         -- 设置 Directory 参数值\n         EXEC [SSISDB].[catalog].[set_execution_parameter_value]\n\
  \                   @execution_id = @exec_id,\n                   @object_type =\
  \ 20,\n                   @parameter_name = @DirectoryParameter,\n             \
  \      @parameter_value = @DirectoryValue\n\n         -- 设置 File Name 参数值\n    \
  \     EXEC [SSISDB].[catalog].[set_execution_parameter_value]\n                \
  \   @execution_id = @exec_id,\n                   @object_type = 20,\n         \
  \          @parameter_name = @FileNameParameter,\n                   @parameter_value\
  \ = @NameValue\n\n         -- 启动包执行\n         EXEC [SSISDB].[catalog].[start_execution]\
  \ @exec_id\n\n         -- 返回执行 ID\n         SELECT N'Started package execution '\
  \ + CONVERT(nvarchar(20), @exec_id)\n\n         -- 标记文件为已处理\n         DECLARE @UpdateSql\
  \ nvarchar(1024) = N'UPDATE [dbo].[PackageConfiguration] SET processed = 1\n   \
  \      WHERE id = ' + CONVERT(nvarchar(20), @Id)\n         EXEC sp_sqlexec @UpdateSql\n\
  \n         SET @count = @count + 1\nEND\n```\n\n### 结论\n\n本章介绍了一些新参数模型的使用模式，以及一些动态配置场景。尽管在\
  \ SQL 2005 和 2008 中常用的配置模式和最佳实践在最新版本的 SSIS 中仍然有效，但大多数用户会发现迁移到新模型是有益的。参数模型的清晰性旨在帮助参与\
  \ SSIS 解决方案生命周期的每个人，从开发包的人员到部署和调度它们的人员。\n\n"
- "# 第 18 章 部署\n\n在 SQL Server 2012 中，Integration Services 项目的部署过程得到了极大简化。Visual Studio\
  \ 中的项目现在可以定位两种不同的部署模型——包部署模型（类似于该产品早期版本中使用的模型）和项目部署模型（专为新的 SSIS 目录设计）。\n\n本章将重点介绍与新的项目部署模型和基于服务器的部署相关的模式。虽然项目模型和\
  \ SSIS 目录是推荐的部署方式，但从早期版本升级的组织可能已经拥有依赖基于文件系统部署的包执行框架。\n\n![Image](img/sq.jpg) **注意**\
  \ SSIS 包部署在 SQL Server 2012 和 SQL Server 2014 之间没有变化。\n\n### 项目部署模型\n\n新的项目模型是 SQL\
  \ Server 2014 中创建 SSIS 项目时的默认目标。使用此模型，在项目的生成阶段，包和其他项目项（如共享连接管理器）会捆绑到扩展名为 `.ispac`\
  \ 的单个文件中。然后可以使用部署向导将此文件部署到 SSIS 目录，或使用 `dtexec.exe` 直接执行。\n\n如果您的项目定位的是包部署模型，您可以在\
  \ Visual Studio 中转换为项目部署模型。在解决方案资源管理器窗口中右键单击项目名称，然后选择 **转换为项目部署模型**（如图 18-1 所示）。转换为项目部署模型将启动项目转换向导。该向导通过更新执行包任务以使用项目引用，并将配置更改为参数，帮助您转换到新模型。\n\
  \n![9781484200834_Fig18-01.jpg](img/9781484200834_Fig18-01.jpg)\n图 18-1. SSDT-BI\
  \ 提供了转换为项目部署模型的选项\n\n项目部署模型中的 Integration Services 项目可以利用参数、共享连接管理器和项目引用等新功能。项目引用允许执行包任务无需使用连接管理器即可定位子包，并大大简化了部署过程。\n\
  \n### SSIS 目录\n\nSSIS 目录在 SQL Server 2012 中添加，是 Integration Services 项目的推荐部署目标。部署到目录通常使用\
  \ SSIS 部署向导完成，该向导可以从 SSDT-BI、SSMS 内部启动，从 Windows 资源管理器双击 SSIS 项目文件 (`.ispac`)，或者通过运行\
  \ `ISDeploymentWizard` 来启动。\n\n\n\n### 部署方法\n\n本节介绍 SSIS 目录支持的不同部署方法。你选择哪种方法取决于你的环境以及执行部署的人员（无论是开发人员、ETL\
  \ 操作员还是 DBA）最习惯使用的方式。此处描述的部署方法包括：\n*   从命令行部署\n*   使用自定义代码部署\n*   使用 PowerShell\
  \ 部署\n*   使用 SQL 部署\n\n### 从命令行部署\n\n部署向导（`ISDeploymentWizard.exe`）提供了命令行界面，允许你在没有\
  \ UI 的情况下部署到 SSIS 目录。这对于从脚本部署或作为批处理过程的一部分非常有用。\n\n表 18-1 显示了支持的参数列表。清单 18-1 提供了一个命令行示例，用于将一个项目（`C:\\\
  ETL\\Project.ispac`）部署到本地 SSIS 目录中名为 MyFolder 的文件夹。\n\n#### Integration Services\
  \ 部署向导命令行参数\n\n| 参数 | 缩写版本 | 描述 |\n| --- | --- | --- |\n| `Silent[+\\|-]` | `S`\
  \ | 当此选项为 true 时，部署将在无 UI 模式下（仅命令行）进行。从批处理文件部署时使用此选项。默认值为‘-’，将显示 UI。示例：`/Silent+`\
  \ |\n| `SourceType:{File\\|Server}` | `ST` | 此选项指定源项目来自文件系统还是另一个 SSIS 目录。默认值为 \"\
  File.\" 示例：`/SourceType:File` |\n| `SourcePath:path_to_project` | `SP` | 要部署的 `.ispac`\
  \ 文件的路径（当使用 `File` 源时），或项目名称的路径（当使用 `Server` 源时）。示例：`/SourcePath:C:\\ETL\\project.ispac`\
  \ |\n| `SourceServer:server_instance` | `SS` | 当 `SourceType` 设置为 `Server` 时的服务器实例名称。示例：`/SourceServer:localhost\\\
  SQL1` |\n| `ProjectPassword:password` | `PP` | 如果源 `.ispac` 文件受密码保护，此参数可用于提供密码。请注意，在命令行上指定密码不推荐，因为系统上的其他用户可能能够看到参数。如果你的项目文件使用密码加密，请考虑在响应文件中指定密码（有关更多信息，请参见\
  \ `@<file>` 选项） |\n| `DestinationServer:server_instance` | `DS` | 你要部署到的服务器实例名称。示例：`/DestinationServer:localhost`\
  \ |\n| `DestinationPath:path` | `DP` | 你希望在目标服务器上部署项目的路径。路径格式为 `\"/<catalog>/<folder>/<project>\"\
  `。示例：`/DestinationPath:/SSISDB/MyFolder/Project` |\n| `@<file>` | | 此选项允许你在文本文件中指定所有命令行参数，而不是直接在命令行输入。示例：`@arguments.txt`\
  \ |\n\n#### 清单 18-1：从命令行部署项目\n```\nISDeploymentWizard.exe /Silent /SourcePath:\"\
  C:\\ETL\\Project.ispac\" /DestinationServer:\"localhost\" /DestinationPath:\"/SSISDB/MyFolder/Project\"\
  \n```\n\n> **注意**：当部署向导以交互式（UI）模式运行时，“审阅”页面会显示用于执行基于命令行部署的等效参数。这可以是一个方便的快捷方式——只需将命令行参数复制到批处理文件中，即可在未来执行自动部署。\n\
  \n### 使用自定义代码部署\n\nSSIS 目录有一个名为管理对象模型（或 MOM）的托管 .NET API。此 API 允许你以编程方式执行通常通过 SQL\
  \ Server Management Studio (SSMS) 完成的相同管理任务，包括文件夹创建和项目部署。\n\n清单 18-2 提供了一个使用 MOM\
  \ 在 SSIS 目录中创建新文件夹并将项目部署到其中的 C# 应用程序示例。核心功能可以在 `Microsoft.SqlServer.Management.IntegrationServices`\
  \ 程序集中找到，该程序集随 SSMS 安装，并与所有依赖项一起位于全局程序集缓存 (GAC) 中。\n\n> **提示**：如果你找不到 `Microsoft.SQLServer.ManagedDTS.dll`\
  \ 文件，请查看 .Net Framework 4.0 全局程序集缓存 (GAC) 目录，在默认安装中，该目录通常是 `C:\\Windows\\Microsoft.NET\\\
  assembly`。\n\n#### 清单 18-2：使用管理对象模型部署项目\n```\nusing System;\nusing System.Collections.Generic;\n\
  using System.Linq;\nusing System.Text;\nusing Microsoft.SqlServer.Management.IntegrationServices;\n\
  using Microsoft.SqlServer.Management.Smo;\nusing Microsoft.SqlServer.Dts.Runtime;\n\
  using System.IO;\n\nclass Program\n{\n    const string ProjectFileLocation = @\"\
  C:\\ETL\\Project.ispac\";\n    static void Main(string[] args)\n    {\n        //\
  \ Connect to the default instance on localhost\n        var server = new Server(\"\
  localhost\");\n        var store = new IntegrationServices(server);\n        //\
  \ Check that we have a catalog\n        if (store.Catalogs.Count == 0)\n        {\n\
              Console.WriteLine(\"SSIS catalog not found on localhost.\");\n        }\n\
          // Get the SSISDB catalog - note that there should only\n        // be one,\
  \ but the API may support multiple catalogs\n        // in the future\n        var\
  \ catalog = store.Catalogs[\"SSISDB\"];\n        // Create a new folder\n        var\
  \ folder = new CatalogFolder(catalog,\n                                      \"\
  MyFolder\",\n                                      \"Folder that holds projects\"\
  );\n        folder.Create();\n        // Make sure the project file exists\n        if\
  \ (!File.Exists(ProjectFileLocation))\n        {\n            Console.WriteLine(\"\
  Project file not found at: {0}\",\n                              ProjectFileLocation);\n\
          }\n        // Load the project using the SSIS API\n        var project =\
  \ Project.OpenProject(ProjectFileLocation);\n        // Deploy the project to the\
  \ folder we just created\n        folder.\n```\n\n### 从 SSDT-BI 启动部署向导\n\n要从 SSDT-BI\
  \ 启动部署向导，请在解决方案资源管理器中右键单击项目，然后选择 `部署` 选项。向导将自动加载你的项目文件，将你带到“选择目标”页面（如 图 18-2 所示）。\n\
  \n![9781484200834_Fig18-02.jpg](img/9781484200834_Fig18-02.jpg)\n\n图 18-2。可以从 SSDT-BI\
  \ 启动 Integration Services 部署向导\n\n> **注意**：部署向导通常用于将文件部署到 SSIS 目录，但它也可用于在服务器之间移动项目。为此，请在“选择源”页面选择\
  \ Integration Services 目录选项。\n\n部署向导允许你选择要将项目部署到的服务器和文件夹。在最后一页上，项目文件被发送到服务器并存储在\
  \ SSIS 目录中。请注意，在部署过程中，向导指示它正在更改项目的保护级别（图 18-3）。在此阶段，项目内的敏感数据被解密，项目被转换为 `服务器存储` 保护级别。服务器依赖于数据库加密来保护包和参数值——这些表在\
  \ SSIS 目录中会自动加密。\n\n![9781484200834_Fig18-03.jpg](img/9781484200834_Fig18-03.jpg)\n\
  \n图 18-3。部署向导状态页面\n\n> **注意**：有关包保护级别和安全部署的更多信息，请参阅联机丛书 `http://msdn.microsoft.com/en-us/library/bb522558.aspx`。\n\
  \n\n### SSIS 包部署\n\n### 使用 PowerShell 部署\n\nSSIS 管理对象模型（MOM）可通过 PowerShell 访问，这使得使用\
  \ PowerShell 脚本完全自动化你的部署（及其他管理任务）成为可能。`Listing 18-3` 展示了 `Listing 18-2` 中简单部署应用程序的\
  \ PowerShell 版本。\n\n**Listing 18-3**. 使用 PowerShell 部署项目\n\n```powershell\n### Variables\n\
  $ProjectFilePath = \"C:\\ETL\\Project.ispac\"\n$ProjectName = \"Project\"\n$FolderName\
  \ = \"MyFolder\"\n\n### Load the IntegrationServices Assembly\n$loadStatus = [Reflection.Assembly]::Load(\"\
  Microsoft.SqlServer.Management.IntegrationServices, Version=12.0.0.0, Culture=neutral,\
  \ PublicKeyToken=89845dcd8080cc91\")\n\n### Store the IntegrationServices Assembly\
  \ namespace to avoid typing it every time\n$ISNamespace = \"Microsoft.SqlServer.Management.IntegrationServices\"\
  \n\nWrite-Host \"Connecting to server ...\"\n\n### Create a connection to the server\n\
  $sqlConnectionString = \"Data Source=localhost;Initial Catalog=master;Integrated\
  \ Security=SSPI;\"\n$sqlConnection = New-Object System.Data.SqlClient.SqlConnection\
  \ $sqlConnectionString\n\n### Create the Integration Services object\n$integrationServices\
  \ = New-Object $ISNamespace\".IntegrationServices\" $sqlConnection\n$catalog = $integrationServices.Catalogs[\"\
  SSISDB\"]\n\nWrite-Host \"Creating Folder\" $FolderName \"...\"\n\n### Create a\
  \ new folder\n$folder = New-Object $ISNamespace\".CatalogFolder\" ($catalog, $FolderName,\
  \ \"This is a folder description\")\n$folder.Create()\n\nWrite-Host \"Deploying\"\
  \ $ProjectName \"project ...\"\n\n### Read the project file, and deploy it to the\
  \ folder\n[byte[]] $projectFile = [System.IO.File]::ReadAllBytes($ProjectFilePath)\n\
  $project = $folder.DeployProject($ProjectName, $projectFile)\n\nWrite-Host \"All\
  \ done.\"\n```\n\n### 使用 SQL 部署\n\n如果你更喜欢使用 T-SQL 完成所有数据库管理和部署，SSIS 目录通过一组视图和存储过程暴露了完整的管理接口。`Listing\
  \ 18-4` 提供了一个示例，它以二进制格式加载项目文件，使用 `[catalog].[deploy_project]` 存储过程将其部署到文件夹中，然后从\
  \ `[catalog].[operations]` 视图查询部署状态。\n\n**Listing 18-4**. 使用 SQL API 部署项目\n\n```sql\n\
  use SSISDB\n\nDECLARE @ProjectBinary as varbinary(max)\nDECLARE @OperationID as\
  \ bigint\n\n-- load the project file\nSET @ProjectBinary = (\n  SELECT *\n  FROM\
  \ OPENROWSET\n  (\n    BULK 'C:\\ETL\\Project.ispac',\n    SINGLE_BLOB\n  ) as BinaryData\n\
  )\n\n-- deploy the project\nEXEC [catalog].[deploy_project]\n        'MyFolder',\
  \      -- folder\n        'Project',       -- project name\n        @ProjectBinary,\
  \  -- binary data\n        @OperationID out -- operation id\n\n-- -- Get the status\
  \ of the last deployment --\nDECLARE @LastDeployment_id bigint;\nSET @LastDeployment_id\
  \ = (\n  SELECT MAX(operation_id)\n  FROM   [catalog].[operations]\n  WHERE  operation_type\
  \ = 101 -- deploy\n)\n\nSELECT [object_name], start_time, end_time, [status], [value]\
  \ =\n  case\n        when [status] = 1 then N'Created'\n        when [status] =\
  \ 2 then N'Running'\n        when [status] = 3 then N'Canceled'\n        when [status]\
  \ = 4 then N'Failed'\n        when [status] = 5 then N'Pending'\n        when [status]\
  \ = 6 then N'Unexpected Termination'\n        when [status] = 7 then N'Succeeded'\n\
  \        when [status] = 8 then N'Stopping'\n        when [status] = 9 then N'Completed'\n\
  \  end\nFROM   [catalog].[operations]\nWHERE  [operation_id] = @LastDeployment_id\n\
  ```\n\n### 包部署模型\n\n在 SQL Server 2012 中创建的 SSIS 项目默认使用项目部署模型，但有些用户可能希望继续使用 SQL Server\
  \ 2005 和 2008 的包部署模型。\n\n你可以在 Visual Studio 中通过右键单击解决方案资源管理器中的项目名称并选择“转换为包部署模型”（如\
  \ `Figure 18-4` 所示）来将项目部署模型转换为包部署模型。最初在早期版本的 SQL Server 中创建的项目在 SSDT-BI 中打开时，会自动以包部署模型开始。\n\
  \n![9781484200834_Fig18-04.jpg](img/9781484200834_Fig18-04.jpg)\n\n**Figure 18-4**.\
  \ 转换为包部署模型\n\n> **注意**  当使用包部署模型时，你将无法使用 SQL Server 2012 引入的一些新功能，例如参数和项目引用。如果你的任何包使用了这些功能，SSDT-BI\
  \ 将不允许你转换为包部署模型。\n\n`Table 18-2` 列出了使用包部署模型时会用到的部署位置，并简要描述了每种方法的优点。\n\n**Table 18-2**.\
  \ 使用包部署模型时的部署位置\n\n| 位置 | 说明 |\n| --- | --- |\n| 文件系统 | • 镜像你在 SSDT-BI 中开发时的结构<br>•\
  \ 不需要数据库权限<br>• 部署是简单的文件复制 |\n| SQL Server (MSDB) | • 备份和维护是常规 SQL 功能的一部分<br>• 对包访问和安全性有更细粒度的控制<br>•\
  \ 通过 `DTSInstall.exe`（旧版部署向导）、SSIS 对象模型或 `dtutil.exe` 进行部署 |\n| 包存储 (SSIS 服务) |\
  \ • 提供文件系统和 MSDB 存储位置之上的一个外观，允许你更改包的物理位置，但保持相同的逻辑路径<br>• 从一个位置管理多个存储位置<br>• 通过 SSMS、SSIS\
  \ 对象模型或 `dtutil.exe` 进行部署<br>• 访问需要特殊的 DCOM 权限配置 |\n\n> **注意**  你不能使用包存储接口来管理部署到\
  \ SSIS 目录的包。该服务只能与存储在 MSDB（2005 和 2008 部署模型）中的包交互，并且是为了继续支持尚未迁移到新项目部署模型的用户而存在的。未来可能会被弃用。\n\
  \n### 结论\n\n在 SQL Server 2012 中，SSIS 包的部署过程被大大简化了。虽然 SQL Server 2005 和 2008 中使用的部署模型（现在称为包部署模型）仍然完全受支持，但对于新的数据集成项目，强烈建议迁移到新的项目部署模型。SSIS\
  \ 提供了多种部署到 SSIS 目录的方法，为你提供了将部署过程融入你的环境所需的灵活性。\n\n"
- "# 第 19 章\n\n### 商业智能标记语言\n\n你购买这本书很可能是为了学习如何成为更高效的 SQL Server Integration Services\
  \ (SSIS) 开发人员。我赞赏你的愿望和决定，并真诚地希望本书中包含的信息提供了帮助你提高生产力的想法和方法。我一直在寻找成为更好的数据集成开发人员的方法。具体来说，我寻求提高代码质量和减少构建解决方案所需时间的方法。这些目标最初促使我开始实践基于模式的开发，这最终催生了本书的想法。\n\
  \n商业智能标记语言（Business Intelligence Markup Language）或 Biml，使用 XML 表示 SSIS 包。通过将描述 SSIS\
  \ 包的元数据存储在 XML 中，Biml 从特定领域语言的角度处理数据集成开发。Biml 提供了另一种实现 SSIS 设计模式的方法——除了包含模板包的 SSIS\
  \ 包库之外的方法。\n\n无论采用哪种机制，存储设计模式都有助于以一致且可重复的质量进行代码生成。这听起来或许无足轻重，但我向你保证它很重要；这正是首先使用设计模式的主要原因之一。\n\
  \n`Biml` 是一门复杂的语言。在正式投入 `Biml` 开发之前，最好先理解领域特定语言、`XML` 和 `.NET` 开发。本章我不会深入探讨 `Biml`\
  \ 的底层架构。我会向你展示其部分机制，并指引你查阅 `Biml` 文档网站：`Biml` 语言 (`www.varigence.com/Documentation/Language/Index`)\
  \ 和 `Biml` API (`www.varigence.com/Documentation/Api/Index`)。我相信，在我展示 `Biml` 强大功能的同时，这足以激发你的兴趣。\n\
  \n### 商业智能标记语言简史\n\n2007 年初，微软客户服务与支持部 (`CSS`) 孵化了一种构建商业智能 (`BI`) 解决方案的新方法。作为负责管理所有一线客户支持互动的部门，`CSS`\
  \ 拥有大量分析和预测需求——涉及来自各种来源的数据。为了加速内部解决方案的开发，`CSS` 开始开发 `Vulcan` 项目，该项目使用一种基于 `XML`\
  \ 的标记语言来描述一部分 `SSIS` 包。这创建了一个模型，使得商业智能解决方案能够由全球分布的 `BI` 开发人员团队更快速、更迭代地进行开发。\n\n\
  在成功构建了新的 `BI` 能力一段时间后，`CSS` 和 `SQL Server` 产品团队决定将 `Vulcan` 项目的源代码发布在 `CodePlex`\
  \ 上，以便客户试用该技术并开始围绕其建立社区 (`http://vulcan.codeplex.com`)。来自客户的反馈表明，他们认识到该方法强大且有前景，但实现方式反映了该项目作为内部工具的状态，用于加速运营交付团队的工作。由于缺乏文档和培训资源、可用性考虑以及附加功能，除了最有决心的客户外，采用\
  \ `Vulcan` 的成本高得令人望而却步。\n\n2008 年底，曾在 `CSS` 使用 `Vulcan` 技术的 Scott Currie 创立了 `Varigence`\
  \ 公司。`Varigence` 创建了商业智能标记语言 (`Biml`) 以及用于其设计和开发的工具。尽管 `Biml` 并未直接使用来自 `Vulcan`\
  \ 的任何代码或技术，但 `Vulcan` 项目采用的方法启发了 `Varigence` 团队，将 `Biml` 构建为一种基于 `XML` 的标记语言，并特别考虑了快速、迭代的全球团队开发能力。\n\
  \n`Biml` 现已可用于专有产品和开源项目，并已被发布为开放语言规范。`Varigence` 开发了一个 `Biml` 编译器，支持广泛的自动化和多目标定位能力。此外，`Varigence`\
  \ 提供了一个名为 `Mist` 的 `Biml` 集成开发环境 (`IDE`)。`Mist` 提供了 `Biml` 的快速、可视化设计和调试功能。开源的 `BIDS\
  \ Helper` 项目包含 `Biml` 功能，使任何人都可以免费编写和执行 `Biml` 代码。\n\n在本章中，我们将利用 `BIDS Helper` 中包含的免费\
  \ `Biml` 功能来动态生成 `SSIS` 包。\n\n![Image](img/sq.jpg) **注意** 包含商业智能标记语言的对象是一个 *Biml\
  \ 文件*。`Biml` 文件通过“执行”来生成 `SSIS` 包。\n\n### 构建你的第一个 Biml 文件\n\n在开始使用商业智能标记语言之前，你需要从\
  \ `http://bidshelper.codeplex.com` 下载并安装最新版本的 `BIDS Helper`。安装完成后，创建一个新的名为 **Biml2014**\
  \ 的 `SSIS` 解决方案和项目。在解决方案资源管理器中，右键单击项目名称，然后单击“添加新建 Biml 文件”。新文件 `BimlScript.biml`\
  \ 将被创建并分配给解决方案资源管理器中的“杂项”虚拟文件夹。双击该文件以在编辑器中打开。\n\n该文件以最基本的 `Biml` 结构开始，如清单 19-1 所示。\n\
  \n***清单 19-1***. 初始 Biml 代码\n\n```xml\n<Biml xmlns=\"http://schemas.varigence.com/biml.xsd\"\
  >\n</Biml>\n```\n\n添加 `XML`，使你的 `Biml` 文件内容如清单 19-2 所示。在键入时，请注意 `IntelliSense` 会自动缩进\
  \ `XML` 标签，以生成更易于阅读的格式良好的代码。\n\n***清单 19-2***. 添加包 XML 元数据后的 Biml\n\n```xml\n<Biml\
  \ xmlns=\"http://schemas.varigence.com/biml.xsd\">\n  <Packages>\n    <Package Name=\"\
  TestBimlPackage\" ConstraintMode=\"Parallel\">\n    </Package>\n  </Packages>\n\
  </Biml>\n```\n\n保存文件，在解决方案资源管理器中右键单击 `BimlScript.biml`，然后单击“生成 SSIS 包”。图 19-1 显示，项目中及文件系统中创建了一个名为\
  \ `TestBimlPackage.dtsx` 的新 `SSIS` 包。该包作为此项目的一部分显示在解决方案资源管理器中。\n\n![9781484200834_Fig19-01.jpg](img/9781484200834_Fig19-01.jpg)\n\
  \n图 19-1. TestBimlPackage.dtsx\n\n让我们回到 `BimlScript.biml` 文件并添加一个任务。在 `<Package>`\
  \ 标签下方创建一个名为 **Tasks** 的新 `XML` 节点。在 `<Tasks>` 和 `</Tasks>` 标签之间，添加一个名为 **ExecuteSQL**\
  \ 的新节点。\n\n![Image](img/sq.jpg) **提示** 如果你没有看到 `Biml` 的 `IntelliSense`，请按照此链接的说明配置\
  \ `Biml` `IntelliSense`：`http://bidshelper.codeplex.com/wikipage?title=Manually%20Configuring%20Biml%20Package%20Generator&referringTitle=xcopy%20deploy`。\n\
  \n向 `ExecuteSQL` 根节点添加一个名为 `Name` 的属性，并将其值设置为 **“Test Select”**。在 `<ExecuteSQL>`\
  \ 和 `</ExecuteSQL>` 标签之间创建一个名为 **DirectInput** 的新 `XML` 节点。在 `<DirectInput>` 和 `</DirectInput>`\
  \ 标签之间，添加 `T-SQL` 语句 **Select 1 As One**。如果你正在动手实践，你的 `BimlScript.biml` 文件应如清单 19-3\
  \ 所示。\n\n***清单 19-3***. 添加描述执行 SQL 任务的初始元数据后的 Biml\n\n```xml\n<Biml xmlns=\"http://schemas.varigence.com/biml.xsd\"\
  >\n  <Packages>\n    <Package Name=\"TestBimlPackage\" ConstraintMode=\"Parallel\"\
  >\n      <Tasks>\n        <ExecuteSQL Name=\"Test Select\">\n          <DirectInput>Select\
  \ 1 As One</DirectInput>\n        </ExecuteSQL>\n      </Tasks>\n    </Package>\n\
  \  </Packages>\n</Biml>\n```\n\n为了测试，请保存文件并从解决方案资源管理器中的 `BimlScript.biml` 生成 `SSIS`\
  \ 包。（通过右键单击 Biml 文件并从上下文相关菜单中选择“生成 SSIS 包”来生成包）。你是否遇到了类似图 19-2 所示的错误？你应该会遇到这样的错误。\n\
  \n![9781484200834_Fig19-02.jpg](img/9781484200834_Fig19-02.jpg)\n\n图 19-2. 缺少 ConnectionName\
  \ 属性\n\n商业智能标记语言引擎包含验证功能，它捕获了图 19-2 中的错误。你可以从解决方案资源管理器调用验证；只需右键单击 `BimlScript.biml`，然后单击“检查\
  \ Biml 是否有错误”。\n\n要修复错误，我们需要向 `ExecuteSQL` 标签添加一个 `ConnectionName` 属性。但目前我们还没有指定连接。要创建连接，请返回到\
  \ `BimlScript.biml` 的顶部，在 `Biml` 标签之后、`Packages` 标签之前添加一个新行。在这一行上，添加 `Connections`\
  \ `XML` 节点。在 `<Connections>` 和 `</Connections>` 标签内，添加一个 `Connection` `XML` 节点。一个\
  \ `Connection` `XML` 节点需要两个属性：`Name` 和 `ConnectionString`。\n\n\n### 我已连接到本地 SQL\
  \ Server 默认实例上的 AdventureWorks2012 数据库。\n\n一旦配置好 `Connection` 元数据，我便向 `ExecuteSQL`\
  \ 标签添加了 `ConnectionName` 属性。我的 `BimlScript.biml` 文件现在包含如 清单 19-4 所列的代码。\n\n**清单\
  \ 19-4. 添加连接元数据后的 Biml**\n\n```xml\n<Biml xmlns=\"http://schemas.varigence.com/biml.xsd\"\
  >\n  <Connections>\n    <Connection Name=\"AdventureWorks2012\" ConnectionString=\"\
  Data Source=.;Initial Catalog=AdventureWorks2012;Provider= SQLNCLI10.1;Integrated\
  \ Security=SSPI;Auto Translate=False;\" />\n  </Connections>\n  <Packages>\n   \
  \ <Package Name=\"TestBimlPackage\" ConstraintMode=\"Parallel\">\n      <Tasks>\n\
  \        <ExecuteSQL Name=\"Test Select\" ConnectionName=\"AdventureWorks2012\"\
  >\n          <DirectInput>Select 1 As One</DirectInput>\n        </ExecuteSQL>\n\
  \      </Tasks>\n    </Package>\n  </Packages>\n</Biml>\n```\n\n让我们通过从 `BimlScript.biml`\
  \ 重新生成 `TestBimlPackage.dtsx` SSIS 包来测试。当你尝试生成 SSIS 包时，会看到一个确认对话框，询问你是否要覆盖现有的 `TestBimlPackage.dtsx`\
  \ SSIS 包。确认此操作后，将从更新后的 `BimlScript.biml` 文件中包含的元数据重新生成 `TestBimlPackage.dtsx` SSIS\
  \ 包。打开 `TestBimlPackage.dtsx` SSIS 包：它应显示为如 图 19-3 所示。\n\n![9781484200834_Fig19-03.jpg](img/9781484200834_Fig19-03.jpg)\n\
  \n**图 19-3. 一个由 Biml 生成的 SSIS 包**\n\n### 构建基本的增量加载 SSIS 包\n\n增量加载模式在数据集成解决方案中至关重要，尤其是在抽取、转换和加载解决方案中。Biml\
  \ 提供了一种机制，可以以可重复的方式对增量加载模式进行编码。\n\n#### 创建数据库和表\n\n让我们通过构建几个数据库和表来准备此演示。执行 清单 19-5\
  \ 中的 T-SQL 语句来构建和填充测试数据库和表。\n\n**清单 19-5. 构建和填充演示数据库和表**\n\n```sql\nUse master\n\
  Go\n\nIf Not Exists(Select name\n              From sys.databases\n            \
  \  Where name = 'SSISIncrementalLoad_Source')\n CREATE DATABASE [SSISIncrementalLoad_Source]\n\
  \nIf Not Exists(Select name\n              From sys.databases\n              Where\
  \ name = 'SSISIncrementalLoad_Dest')\n CREATE DATABASE [SSISIncrementalLoad_Dest]\n\
  Go\nUse SSISIncrementalLoad_Source\nGo\n\nIf Not Exists(Select name\n          \
  \    From sys.tables\n              Where name = 'tblSource')\nCREATE TABLE dbo.tblSource\n\
  \ (ColID int NOT NULL\n ,ColA varchar(10) NULL\n ,ColB datetime NULL constraint\
  \ df_ColB default (getDate())\n ,ColC int NULL\n ,constraint PK_tblSource primary\
  \ key clustered (ColID))\n\nUse SSISIncrementalLoad_Dest\nGo\n\nIf Not Exists(Select\
  \ name\n              From sys.tables\n              Where name = 'tblDest')\nCREATE\
  \ TABLE dbo.tblDest\n (ColID int NOT NULL\n ,ColA varchar(10) NULL\n ,ColB datetime\
  \ NULL\n ,ColC int NULL)\n\nIf Not Exists(Select name\n              From sys.tables\n\
  \              Where name = 'stgUpdates')\n CREATE TABLE dbo.stgUpdates\n  (ColID\
  \ int NULL\n  ,ColA varchar(10) NULL\n  ,ColB datetime NULL\n  ,ColC int NULL)\n\
  \nUse SSISIncrementalLoad_Source\nGo\n\n-- insert an \"unchanged\", a \"changed\"\
  , and a \"new\" row\nINSERT INTO dbo.tblSource\n (ColID,ColA,ColB,ColC)\n VALUES\n\
  \ (0, 'A', '1/1/2007 12:01 AM', -1),\n (1, 'B', '1/1/2007 12:02 AM', -2),\n (2,\
  \ 'N', '1/1/2007 12:03 AM', -3)\n\nUse SSISIncrementalLoad_Dest\nGo\n\n-- insert\
  \ a \"changed\" and an \"unchanged\" row\nINSERT INTO dbo.tblDest\n (ColID,ColA,ColB,ColC)\n\
  \ VALUES\n (0, 'A', '1/1/2007 12:01 AM', -1),\n (1, 'C', '1/1/2007 12:02 AM', -2)\n\
  ```\n\n清单 19-5 中的 T-SQL 语句创建了两个数据库：`SSISIncrementalLoad_Source` 和 `SSISIncrementalLoad_Dest`。在\
  \ `SSISIncrementalLoad_Source` 数据库中创建了一个名为 `tblSource` 的表，并填充了三行数据。在 `SSISIncrementalLoad_Dest`\
  \ 数据库中创建了另一个名为 `tblDest` 的表，并填充了两行数据。\n\n清单 19-5 创建的配置是增量加载的基本设置。`ColID` 是业务键。此值不应更改，并且应唯一标识源系统和目标系统中的行。源表和目标表中\
  \ `ColA` 的字符值指示了行的类型线索。A 行在源和目标表中都存在且相同。它是一个*未更改*的行。`ColID` 值为 `1` 的行在源表中包含 `ColA`\
  \ 值 `B`，在目标表中包含 `ColA` 值 `C`。此行自最初加载到目标表以来，在源中已*更改*。`ColID` 值为 `2` 的行仅存在于源中。它是一个*新*行。\n\
  \n#### 添加元数据\n\n在本节中，我们将：\n*   添加定义增量加载 SSIS 设计模式中使用的连接管理器的元数据。\n*   向 Biml 项目添加一个新的\
  \ Biml 文件，并将其重命名为 `IncrementalLoad.biml`。\n*   在 `<Biml>` 标签后立即添加一个 `Connections`\
  \ XML 节点。\n*   添加两个 `Connection` XML 节点，配置为连接到 `SSISIncremental_Source` 和 `SSISIncremental_Dest`\
  \ 数据库。\n\n你的代码应如 清单 19-6 所示。\n\n**清单 19-6. IncrementalLoad.biml 中配置的连接**\n\n```xml\n\
  <Biml xmlns=\"http://schemas.varigence.com/biml.xsd\">\n  <Connections>\n    <Connection\
  \ Name=\"SSISIncrementalLoad_Source\" ConnectionString=\n      \"Data Source=(local);Initial\
  \ Catalog=SSISIncrementalLoad_Source;Provider=\n       SQLNCLI11.1;Integrated Security=SSPI;\"\
  \ />\n    <Connection Name=\"SSISIncrementalLoad_Dest\" ConnectionString=\n    \
  \  \"Data Source=(local);Initial Catalog=SSISIncrementalLoad_Dest;Provider=\n  \
  \     SQLNCLI11.1;OLE DB Services=1;Integrated Security=SSPI;\" />\n  </Connections>\n\
  </Biml>\n```\n\n在 `</Connections>` 和 `</Biml>` 标签之间添加一个 `Packages` 节点。紧接着，添加一个 `Package`\
  \ XML 节点，后跟一个 `Tasks` 节点。随后，立即添加一个配置为如 清单 19-7 所示的 `ExecuteSQL` 节点。\n\n**清单 19-7.\
  \ 配置好的 Packages、Package、Tasks 和 ExecuteSQL 节点**\n\n```xml\n<Packages>\n  <Package\
  \ Name=\"IncrementalLoadPackage\" ConstraintMode=\n    \"Parallel\" ProtectionLevel=\"\
  EncryptSensitiveWithUserKey\">\n    <Tasks>\n      <ExecuteSQL Name=\"Truncate stgUpdates\"\
  \ ConnectionName=\"SSISIncrementalLoad_Dest\">\n        <DirectInput>Truncate Table\
  \ stgUpdates</DirectInput>\n      </ExecuteSQL>\n    </Tasks>\n  </Package>\n</Packages>\n\
  ```\n\n清单 19-7 中 Biml 定义的 `Execute SQL` 任务将截断一个暂存表，该表将保存自加载到目标表以来在源表中发生更改的行。\n\n\
  #### 指定数据流任务\n\n在 `</ExecuteSQL>` 标签后，添加一个 `Dataflow` XML 节点。包含一个 `Name` 属性，并将 `Name`\
  \ 属性的值设置为 \"`Load tblDest`\"。在 `<Dataflow>` 标签内，添加一个 `PrecedenceConstraints` 节点。在\
  \ `<PrecedenceConstraints>` 标签内放置一个 `Inputs` 节点，并在 `<Inputs>` 标签内放置一个包含 `OutputPathName`\
  \ 属性（值为 \"`Truncate stgUpdates.Output`\"）的 `Input` 节点，如 清单 19-8 所示。\n\n**清单 19-8.**\n\
  \n\n\n从“截断 stgUpdates”执行 SQL 任务到“加载 tblDest”数据流任务添加优先级约束\n\n```xml\n<Dataflow Name=\"\
  Load tblDest\">\n  <PrecedenceConstraints>\n    <Inputs>\n      <Input OutputPathName=\"\
  Truncate stgUpdates.Output\" />\n    </Inputs>\n  </PrecedenceConstraints>\n</Dataflow>\n\
  ```\n\n此代码定义了`截断 stgUpdates`执行 SQL 任务和`加载 tblDest`数据流任务之间的`OnSuccess`优先级约束。\n\n\
  ### 添加转换\n\n现在我们准备添加定义转换的元数据，这些转换是数据流任务的核心。在本节中，我们将设计一个增量加载，其中包括一个`OleDbSource`适配器、一个`Lookup`转换、一个`条件拆分`转换和两个`OleDbDestination`适配器。\n\
  \n首先，在`</PrecedenceConstraints>`标签之后添加一个`<Transformations>`节点。在`<Transformations>`标签内，添加一个`<OleDbSource>`标签，并包含以下属性及值对：\n\
  \n*   `Name`： `tblSource Source`\n*   `ConnectionName`： `SSISIncrementalLoad_Source`\n\
  \n在`<OleDbSource>`标签内，添加一个`<ExternalTableInput>`节点，该节点包含一个值为`\"dbo.tblSource\"`的`Table`属性。此元数据构建了一个名为`\"\
  tblSource Source\"`的`OleDbSource`适配器，它连接到之前在`<Connections>`标签内定义的`SSISIncrementalLoad_Source`连接。`OleDbSource`适配器将按照`ExternalTableInput`标签中的指定连接到表`\"\
  dbo.tblSource\"`。`数据流`XML 节点现在将如`清单 19-9`所示出现。\n\n`清单 19-9`. 包含 OLE DB 源适配器的数据流节点\n\
  \n```xml\n<Dataflow Name=\"Load tblDest\">\n  <PrecedenceConstraints>\n    <Inputs>\n\
  \      <Input OutputPathName=\"Truncate stgUpdates.Output\" />\n    </Inputs>\n\
  \  </PrecedenceConstraints>\n  <Transformations>\n    <OleDbSource Name=\"tblSource\
  \ Source\" ConnectionName=\"SSISIncrementalLoad_Source\">\n      <ExternalTableInput\
  \ Table=\"dbo.tblSource\" />\n    </OleDbSource>\n  </Transformations>\n</Dataflow>\n\
  ```\n\n接下来，在`</OleDbSource>`标签之后立即添加一个`<Lookup>` XML 节点。在`<Lookup>`标签中包含以下属性及值对：\n\
  \n*   `Name`： `Correlate`\n*   `OleDbConnectionName`： `SSISIncrementalLoad_Dest`\n\
  *   `NoMatchBehavior`： `RedirectRowsToNoMatchOutput`\n\n`Name`属性设置`Lookup`转换的名称。`OleDbConnectionName`指示\
  \ Biml 使用清单中在`<Connections>`标签内定义的连接管理器。`NoMatchBehavior`属性被配置为将不匹配的行重定向到`Lookup`转换的\
  \ NoMatch 输出。\n\n继续通过在`<InputPath>`标签之后立即添加一个`<DirectInput>`节点来配置定义`Lookup`转换的元数据。在`<DirectInput>`和`</DirectInput>`标签之间输入以下\
  \ T-SQL 语句。\n\n```sql\nSELECT ColID, ColA, ColB, ColC\nFROM dbo.tblDest\n```\n\n\
  在`</DirectInput>`标签之后立即添加一个`<Inputs>`节点。在`<Inputs>`标签内，添加一个`<Column>`节点。包含以下属性名和值对。\n\
  \n*   `SourceColumn`： `ColID`\n*   `TargetColumn`： `ColID`\n\n前面的元数据提供了在`Lookup`转换的“列”页面上“可用输入”列和“可用查找”列之间的映射。\n\
  \n在`</Inputs>`标签之后立即添加一个`<Outputs>`节点。在`<Outputs>`标签内，添加三个`<Column>`节点，并包含以下属性名和值对。\n\
  \n1.  `SourceColumn`： `ColA`\n    `TargetColumn`： `Dest_ColA`\n2.  `SourceColumn`：\
  \ `ColB`\n    `TargetColumn`： `Dest_ColB`\n3.  `SourceColumn`： `ColC`\n    `TargetColumn`：\
  \ `Dest_ColC`\n\n前面的元数据在`Lookup`转换的“列”页面上“选择”了从“可用查找”列返回的列。添加后，`Lookup`转换元数据应如`清单\
  \ 19-10`所示。\n\n`清单 19-10`. 包含查找元数据的转换\n\n```xml\n<Transformations>\n  <OleDbSource\
  \ Name=\"tblSource Source\" ConnectionName=\"SSISIncrementalLoad_Source\">\n   \
  \ <ExternalTableInput Table=\"dbo.tblSource\" />\n  </OleDbSource>\n  <Lookup Name=\"\
  Correlate\" OleDbConnectionName=\"SSISIncrementalLoad_Dest\"\n     NoMatchBehavior=\"\
  RedirectRowsToNoMatchOutput\">\n    <InputPath OutputPathName=\"tblSource Source.Output\"\
  \ />\n    <DirectInput>SELECT ColID, ColA, ColB, ColC FROM dbo.tblDest</DirectInput>\n\
  \    <Inputs>\n      <Column SourceColumn=\"ColID\" TargetColumn=\"ColID\" />\n\
  \    </Inputs>\n    <Outputs>\n      <Column SourceColumn=\"ColA\" TargetColumn=\"\
  Dest_ColA\" />\n      <Column SourceColumn=\"ColB\" TargetColumn=\"Dest_ColB\" />\n\
  \      <Column SourceColumn=\"ColC\" TargetColumn=\"Dest_ColC\" />\n    </Outputs>\n\
  \  </Lookup>\n</Transformations>\n```\n\n在`</Lookup>`标签之后，立即添加一个`<OleDbDestination>`\
  \ XML 节点，包含以下属性名和值对。\n\n*   `Name`： `tblDest Destination`\n*   `ConnectionName`：\
  \ `SSISIncrementalLoad_Dest`\n\n在`<OleDbDestination>`标签内，添加一个`<InputPath>`节点，其`OutputPathName`属性设置为值`\"\
  Correlate.NoMatch\"`。在`<InputPath>`标签之后，添加一个`<ExternalTableOutput>`节点，其`Table`属性设置为值`\"\
  dbo.tblDest\"`。\n\n前面的元数据定义了一个`OleDbDestination`适配器，并将其配置为将`Lookup`转换的 NoMatch 输出连接到之前定义的`SSISIncrementalLoad_Dest`连接。\n\
  \n在`</OleDbDestination>`标签之后立即添加一个`<ConditionalSplit>` XML 节点。添加一个名为`Name`的属性并将其值设置为`\"\
  Filter\"`。在`<ConditionalSplit>`标签内，添加一个`<InputPath>` XML 节点，其`OutputPathName`属性设置为`\"\
  Correlate.Match\"`。现在我们需要添加一个条件输出路径。在`<InputPath>`标签之后立即添加一个`<OutputPaths>`节点，然后依次添加一个包含`Name`属性（设置为`\"\
  Changed Rows\"`）的`<OutputPath>`节点。在`<OutputPaths>`标签内，创建一个`<Expression>`节点。在`<Expression>`和`</Expression>`标签之间，添加以下\
  \ SSIS 表达式。\n\n```expression\n(ColA != Dest_ColA) || (ColB != Dest_ColB) || (ColC\
  \ != Dest_ColC)\n```\n\n此步骤完成后，`Transformations` XML 应如`清单 19-11`所示。\n\n`清单 19-11`.\
  \ 包含 OLE DB 源、查找、条件拆分和一个 OLE DB 目标的转换节点\n\n```xml\n<Transformations>\n  <OleDbSource\
  \ Name=\"tblSource Source\" ConnectionName=\"SSISIncrementalLoad_Source\">\n   \
  \ <ExternalTableInput Table=\"dbo.tblSource\" />\n  </OleDbSource>\n  <Lookup Name=\"\
  Correlate\" OleDbConnectionName=\"SSISIncrementalLoad_Dest\"\n     NoMatchBehavior=\"\
  RedirectRowsToNoMatchOutput\">\n    <InputPath OutputPathName=\"tblSource Source.Output\"\
  \ />\n    <DirectInput>SELECT ColID, ColA, ColB, ColC FROM dbo.tblDest</DirectInput>\n\
  \    <Inputs>\n      <Column SourceColumn=\"ColID\" TargetColumn=\"ColID\" />\n\
  \    </Inputs>\n    <Outputs>\n      <Column SourceColumn=\"ColA\" TargetColumn=\"\
  Dest_ColA\" />\n      <Column SourceColumn=\"ColB\" TargetColumn=\"Dest_ColB\" />\n\
  \      <Column SourceColumn=\"ColC\" TargetColumn=\"Dest_ColC\" />\n    </Outputs>\n\
  \  </Lookup>\n  <OleDbDestination Name=\"tblDest Destination\" ConnectionName=\"\
  SSISIncrementalLoad_Dest\">\n    <InputPath OutputPathName=\"Correlate.NoMatch\"\
  \ />\n    <ExternalTableOutput Table=\"dbo.tblDest\" />\n  </OleDbDestination>\n\
  \  <ConditionalSplit Name=\"Filter\">\n    <InputPath OutputPathName=\"Correlate.Match\"\
  />\n    <OutputPaths>\n      <OutputPath Name=\"Changed Rows\">\n        <Expression>(ColA\
  \ != Dest_ColA) || (ColB != Dest_ColB) ||\n          (ColC != Dest_ColC)</Expression>\n\
  \      </OutputPath>\n    </OutputPaths>\n  </ConditionalSplit>\n</Transformations>\n\
  ```\n\n\n\n### 条件分割组件配置\n\n在条件分割元数据中，最近添加的配置将单个输出命名为 `\"Changed Rows\"`，并分配了一个 SSIS\
  \ 表达式，该表达式旨在检测同时存在于源表和目标表中的行变化。\n\n### 添加 OLE DB 目标适配器\n\n我们数据流任务中的最后一个组件是一个 OLE\
  \ DB 目标适配器，用于暂存将在数据流执行完成后进行更新的行。在 `</ConditionalSplit>` 标签之后，立即添加一个 `OleDbDestination`\
  \ 节点及其属性：\n\n*   `Name`: `stgUpdates`\n*   `ConnectionName`: `SSISIncrementalLoad_Dest`\n\
  \n在 `<OleDbDestination>` 标签内，添加一个名为 `InputPath` 的新节点，其属性 `OutputPathName` 的值设置为\
  \ `\"Filter.Changed Rows\"`。随后，添加一个名为 `ExternalTableOutput` 的节点，其中包含一个 `Table` 属性，设置为\
  \ `\"dbo.stgUpdates\"`。此元数据定义了一个 OLE DB 目标适配器，该适配器将名为 `Filter` 的条件分割的“Changed Rows”输出连接到之前定义的\
  \ `SSISIncrementalLoad_Dest` 连接所指向数据库中的 `dbo.stgUpdates` 表。\n\n### 完整的数据流任务元数据\n\
  \n完整的数据流任务元数据如 清单 19-12 所示。\n\n### 清单 19-12. 完成的数据流 XML 节点\n\n```xml\n<Dataflow\
  \ Name=\"Load tblDest\">\n  <PrecedenceConstraints>\n    <Inputs>\n      <Input\
  \ OutputPathName=\"Truncate stgUpdates.Output\" />\n    </Inputs>\n  </PrecedenceConstraints>\n\
  \  <Transformations>\n    <OleDbSource Name=\"tblSource Source\" ConnectionName=\"\
  SSISIncrementalLoad_Source\">\n      <ExternalTableInput Table=\"dbo.tblSource\"\
  \ />\n    </OleDbSource>\n    <Lookup Name=\"Correlate\" OleDbConnectionName=\"\
  SSISIncrementalLoad_Dest\"\n        NoMatchBehavior=\"RedirectRowsToNoMatchOutput\"\
  >\n      <InputPath OutputPathName=\"tblSource Source.Output\" />\n      <DirectInput>SELECT\
  \ ColID, ColA, ColB, ColC FROM dbo.tblDest</DirectInput>\n      <Inputs>\n     \
  \   <Column SourceColumn=\"ColID\" TargetColumn=\"ColID\" />\n      </Inputs>\n\
  \      <Outputs>\n        <Column SourceColumn=\"ColA\" TargetColumn=\"Dest_ColA\"\
  \ />\n        <Column SourceColumn=\"ColB\" TargetColumn=\"Dest_ColB\" />\n    \
  \    <Column SourceColumn=\"ColC\" TargetColumn=\"Dest_ColC\" />\n      </Outputs>\n\
  \    </Lookup>\n    <OleDbDestination Name=\"tblDest Destination\" ConnectionName=\"\
  SSISIncrementalLoad_Dest\">\n      <InputPath OutputPathName=\"Correlate.NoMatch\"\
  \ />\n      <ExternalTableOutput Table=\"dbo.tblDest\" />\n    </OleDbDestination>\n\
  \    <ConditionalSplit Name=\"Filter\">\n      <InputPath OutputPathName=\"Correlate.Match\"\
  />\n      <OutputPaths>\n        <OutputPath Name=\"Changed Rows\">\n          <Expression>(ColA\
  \ != Dest_ColA) || (ColB != Dest_ColB) ||\n              (ColC != Dest_ColC)</Expression>\n\
  \        </OutputPath>\n      </OutputPaths>\n    </ConditionalSplit>\n    <OleDbDestination\
  \ Name=\"stgUpdates\" ConnectionName=\"SSISIncrementalLoad_Dest\">\n      <InputPath\
  \ OutputPathName=\"Filter.Changed Rows\" />\n      <ExternalTableOutput Table=\"\
  dbo.stgUpdates\" />\n    </OleDbDestination>\n  </Transformations>\n</Dataflow>\n\
  ```\n\n### 添加执行 SQL 任务\n\n还有一个执行 SQL 任务需要完成我们的增量加载 SSIS 包。此任务将通过使用单个 `Update` T-SQL\
  \ 语句应用存储在 `\"dbo.stgUpdates\"` 表中的行来更新目标表。以这种方式应用更新通常比逐行更新更快。\n\n为了继续开发演示代码，在 `</Dataflow>`\
  \ 标签之后立即添加一个 `ExecuteSQL` XML 节点及其属性：\n\n*   `Name`: `Apply stgUpdates`\n*   `ConnectionName`:\
  \ `SSISIncrementalLoad_Dest`\n\n在 `<ExecuteSQL>` 标签之后，立即添加一个 `PrecedenceConstraints`\
  \ 节点，然后是 `Inputs` 节点。\n\n在 `<Inputs>` 标签内添加一个 `Input` 节点，其中包含一个属性 `OutputPathName`，其值设置为\
  \ `\"Load tblDest.Output\"`。在 `</PrecedenceConstraints>` 标签之后立即添加一个 `DirectInput`\
  \ 节点。在 `<DirectInput>` 标签内，添加以下 T-SQL 语句。\n\n```sql\nUpdate Dest\nSet Dest.ColA\
  \ = Upd.ColA\n   ,Dest.ColB = Upd.ColB\n   ,Dest.ColC = Upd.ColC\nFrom tblDest Dest\n\
  Join stgUpdates Upd\n   On Upd.ColID = Dest.ColID\n```\n\n信不信由你，就是这样！如果你的 Biml 看起来像\
  \ 清单 19-13，那么你就拥有了可编译的元数据。\n\n### 清单 19-13. 完整的 IncrementalLoad.biml 清单\n\n```xml\n\
  <Biml xmlns=\"http://schemas.varigence.com/biml.xsd\">\n  <Connections>\n    <Connection\
  \ Name=\"SSISIncrementalLoad_Source\" ConnectionString=\n      \"Data Source=(local);Initial\
  \ Catalog=SSISIncrementalLoad_Source;Provider=\n      SQLNCLI11.1;Integrated Security=SSPI\"\
  \ />\n    <Connection Name=\"SSISIncrementalLoad_Dest\" ConnectionString=\n    \
  \  \"Data Source=(local);Initial Catalog=SSISIncrementalLoad_Dest;Provider=\n  \
  \    SQLNCLI11.1;OLE DB Services=1;Integrated Security=SSPI;\" />\n  </Connections>\n\
  \  <Packages>\n    <Package Name=\"IncrementalLoadPackage\" ConstraintMode=\n  \
  \    \"Parallel\" ProtectionLevel=\"EncryptSensitiveWithUserKey\">\n      <Tasks>\n\
  \        <ExecuteSQL Name=\"Truncate stgUpdates\" ConnectionName=\"SSISIncrementalLoad_Dest\"\
  >\n          <DirectInput>Truncate Table stgUpdates</DirectInput>\n        </ExecuteSQL>\n\
  \        <Dataflow Name=\"Load tblDest\">\n          <PrecedenceConstraints>\n \
  \           <Inputs>\n              <Input OutputPathName=\"Truncate stgUpdates.Output\"\
  \ />\n            </Inputs>\n          </PrecedenceConstraints>\n          <Transformations>\n\
  \            <OleDbSource Name=\"tblSource Source\"\n             ConnectionName=\"\
  SSISIncrementalLoad_Source\">\n              <ExternalTableInput Table=\"dbo.tblSource\"\
  \ />\n            </OleDbSource>\n            <Lookup Name=\"Correlate\" OleDbConnectionName=\"\
  SSISIncrementalLoad_Dest\"\n                NoMatchBehavior=\"RedirectRowsToNoMatchOutput\"\
  >\n              <InputPath OutputPathName=\"tblSource Source.Output\" />\n    \
  \          <DirectInput>SELECT ColID, ColA, ColB, ColC FROM dbo.tblDest</DirectInput>\n\
  \              <Inputs>\n                <Column SourceColumn=\"ColID\" TargetColumn=\"\
  ColID\" />\n              </Inputs>\n              <Outputs>\n                <Column\
  \ SourceColumn=\"ColA\" TargetColumn=\"Dest_ColA\" />\n                <Column SourceColumn=\"\
  ColB\" TargetColumn=\"Dest_ColB\" />\n                <Column SourceColumn=\"ColC\"\
  \ TargetColumn=\"Dest_ColC\" />\n              </Outputs>\n            </Lookup>\n\
  \            <OleDbDestination Name=\"tblDest Destination\"\n                ConnectionName=\"\
  SSISIncrementalLoad_Dest\">\n              <InputPath OutputPathName=\"Correlate.NoMatch\"\
  \ />\n              <ExternalTableOutput Table=\"dbo.tblDest\" />\n            </OleDbDestination>\n\
  \            <ConditionalSplit Name=\"Filter\">\n              <InputPath OutputPathName=\"\
  Correlate.Match\"/>\n              <OutputPaths>\n                <OutputPath Name=\"\
  Changed Rows\">\n                  <Expression>(ColA != Dest_ColA) || (ColB != Dest_ColB)\
  \ ||\n                      (ColC != Dest_ColC)</Expression>\n                </OutputPath>\n\
  \              </OutputPaths>\n            </ConditionalSplit>\n            <OleDbDestination\
  \ Name=\"stgUpdates\" ConnectionName=\"SSISIncrementalLoad_Dest\">\n           \
  \   <InputPath OutputPathName=\"Filter.Changed Rows\" />\n              <ExternalTableOutput\
  \ Table=\"dbo.stgUpdates\" />\n            </OleDbDestination>\n          </Transformations>\n\
  \        </Dataflow>\n        <ExecuteSQL Name=\"Apply stgUpdates\" ConnectionName=\"\
  SSISIncrementalLoad_Dest\">\n          <PrecedenceConstraints>\n            <Inputs>\n\
  \              <Input OutputPathName=\"Load tblDest.Output\" />\n            </Inputs>\n\
  \          </PrecedenceConstraints>\n          <DirectInput>\n                Update\
  \ Dest\n                Set Dest.ColA = Upd.ColA\n                   ,Dest.ColB\
  \ = Upd.ColB\n                   ,Dest.ColC = Upd.ColC\n                From tblDest\
  \ Dest\n                Join stgUpdates Upd\n                   On Upd.ColID = Dest.ColID\n\
  \          </DirectInput>\n        </ExecuteSQL>\n      </Tasks>\n    </Package>\n\
  \  </Packages>\n</Biml>\n```\n\n\n\n### 测试 Biml\n\n我们现在已准备好进行测试！\n\n### 测试 Biml\n\
  \n测试 Biml 包括生成 SSIS 包，然后执行它。我们将检查数据，以确认增量加载是否按预期运行。首先，我准备了一个用于重置行的 T-SQL 脚本，如 `Listing\
  \ 19-14` 所示。\n\n**Listing 19-14。重置增量加载源和目标值**\n\n```sql\nUse SSISIncrementalLoad_Source\n\
  Go\n\nTRUNCATE TABLE dbo.tblSource\n\n-- insert an \"unchanged\" row, a \"changed\"\
  \ row, and a \"new\" row\nINSERT INTO dbo.tblSource (ColID,ColA,ColB,ColC)\nVALUES\n\
  (0, 'A', '1/1/2007 12:01 AM', -1),\n(1, 'B', '1/1/2007 12:02 AM', -2),\n(2, 'N',\
  \ '1/1/2007 12:03 AM', -3)\n\nUse SSISIncrementalLoad_Dest\nGo\n\nTRUNCATE TABLE\
  \ dbo.stgUpdates\nTRUNCATE TABLE dbo.tblDest\n\n-- insert an \"unchanged\" row and\
  \ a \"changed\" row\nINSERT INTO dbo.tblDest (ColID,ColA,ColB,ColC)\nVALUES\n(0,\
  \ 'A', '1/1/2007 12:01 AM', -1),\n(1, 'C', '1/1/2007 12:02 AM', -2)\n```\n\n`Listing\
  \ 19-15` 包含我们将用来检查和比较源表与目标表内容的测试脚本。\n\n**Listing 19-15。用于 IncrementalLoad.dtsx SSIS\
  \ 包的测试脚本**\n\n```sql\nUse SSISIncrementalLoad_Source\nGo\n\nSELECT TableName = 'tblSource'\n\
  \        ,ColID\n    ,ColA\n    ,ColB\n    ,ColC\nFROM dbo.tblSource\nGo\n\nUse\
  \ SSISIncrementalLoad_Dest\nGo\n\nSELECT TableName = 'tblDest'\n        ,[ColID]\n\
  \    ,[ColA]\n    ,[ColB]\n    ,[ColC]\nFROM [dbo].[tblDest]\n\nSELECT TableName\
  \ = 'stgUpdates'\n        ,[ColID]\n    ,[ColA]\n    ,[ColB]\n    ,[ColC]\nFROM\
  \ [dbo].[stgUpdates]\nGo\n```\n\n### 执行与结果\n\n执行重置脚本后，再执行测试脚本，会得到如 `Figure 19-4`\
  \ 所示的结果。\n\n![9781484200834_Fig19-04.jpg](img/9781484200834_Fig19-04.jpg)\n\n**Figure\
  \ 19-4。执行 SSIS 包之前的测试脚本结果**\n\n返回 SQL Server Data Tools 中的 Solution Explorer。右键单击\
  \ `IncrementalLoad.biml`，然后单击“生成 SSIS 包”。如果没有错误，说明你的 Biml 有效，你应该会在 Solution Explorer\
  \ 的 SSIS Packages 虚拟文件夹中看到一个名为 `IncrementalLoadPackage.dtsx` 的 SSIS 包。如果 SSIS 包打开时没有错误，按\
  \ `F5` 键在调试器中执行它。如果一切正常，你应该会看到类似于 `Figure 19-5` 所示的结果。\n\n![9781484200834_Fig19-05.jpg](img/9781484200834_Fig19-05.jpg)\n\
  \n**Figure 19-5。IncrementalLoadPackage.dtsx 的调试执行**\n\n现在执行测试脚本，返回的结果证明 `SSISIncrementalLoad_Dest.dbo.tblDest`\
  \ 已接收从 `SSISIncrementalLoad_Source.dbo.tblSource` 加载的更新，如 `Figure 19-6` 所示。\n\n\
  ![9781484200834_Fig19-06.jpg](img/9781484200834_Fig19-06.jpg)\n\n**Figure 19-6。IncrementalLoadPackage.dtsx\
  \ 成功执行的结果**\n\n通过检查结果并与 `Figure 19-4` 进行比较，我们可以看到 `SSISIncrementalLoad_Dest.dbo.tblDest`\
  \ 已更新为与 `SSISIncrementalLoad_Source.dbo.tblSource` 相匹配。我们还可以看到，`ColID` 等于 `1` 的更新行被发送到了\
  \ `SSISIncrementalLoad_Dest.dbo.stgUpdates` 表。\n\n这很酷。但等等，接下来更精彩。\n\n### 使用 Biml\
  \ 作为 SSIS 设计模式引擎\n\n让我们用 Biml 做一些真正酷炫和有趣的事情。使用 `IncrementalLoad.biml` 文件作为模板，并应用\
  \ BISD Helper 提供的 Biml 库中的 .NET 集成（称为 BimlScript），我们将为一个新的 Biml 文件增加灵活性和通用性，该文件将在源数据库和暂存数据库中的所有表之间构建一个增量加载\
  \ SSIS 包。这是 ETL 中大写字母“E”的一个例子；这是一个提取 SSIS 设计模式。\n\n![Image](img/sq.jpg) **注意** 此模式要求源表和暂存表在扩展\
  \ Biml 文件以创建 SSIS 包之前就存在。即使有这个限制（它可以被解决、自动化和克服），我相信这个例子展示了 Biml 的力量和变革性属性。\n\n让我们首先向\
  \ `SSISIncrementalLoad_Source` 数据库添加新表，并创建（并填充）一个名为 `SSISIncrementalLoad_Stage`\
  \ 的新数据库。首先，通过执行 `Listing 19-16` 中所示的 T-SQL 脚本向 `SSISIncrementalLoad_Source` 添加新表。\n\
  \n**Listing 19-16。添加并填充新的 SSISincrementalLoad_Source 表**\n\n```sql\nUSE SSISIncrementalLoad_Source\n\
  GO\n\n-- Create Source1 If Not Exists(Select name\nFrom sys.tables\nWhere name =\
  \ 'Source1')\nCREATE TABLE dbo.Source1\n(ColID int NOT NULL\n,ColA varchar(10) NULL\n\
  ,ColB datetime NULL\n,ColC int NULL\n,constraint PK_Source1 primary key clustered\
  \ (ColID))\nGo\n\n-- Load Source1\nINSERT INTO dbo.Source1\n(ColID,ColA,ColB,ColC)\n\
  VALUES\n(0, 'A', '1/1/2007 12:01 AM', -1),\n(1, 'B', '1/1/2007 12:02 AM', -2),\n\
  (2, 'C', '1/1/2007 12:03 AM', -3),\n(3, 'D', '1/1/2007 12:04 AM', -4),\n(4, 'E',\
  \ '1/1/2007 12:05 AM', -5),\n(5, 'F', '1/1/2007 12:06 AM', -6)\n\n-- Create Source2\
  \ If Not Exists(Select name\nFrom sys.tables\nWhere name = 'Source2')\nCREATE TABLE\
  \ dbo.Source2\n(ColID int NOT NULL\n,Name varchar(25) NULL\n,Value int NULL\n,constraint\
  \ PK_Source2 primary key clustered (ColID))\nGo\n\n-- Load Source2\nINSERT INTO\
  \ dbo.Source2\n(ColID,Name,Value)\nVALUES\n(0, 'Willie', 11),\n(1, 'Waylon', 22),\n\
  (2, 'Stevie Ray', 33),\n(3, 'Johnny', 44),\n(4, 'Kris', 55)\n\n-- Create Source3\
  \ If Not Exists(Select name\nFrom sys.tables\nWhere name = 'Source3')\nCREATE TABLE\
  \ dbo.Source3\n(ColID int NOT NULL\n,Value int NULL\n,Name varchar(100) NULL\n,constraint\
  \ PK_Source3 primary key clustered (ColID))\nGo\n\n-- Load Source3\nINSERT INTO\
  \ dbo.Source3\n(ColID,Value,Name)\nVALUES\n(0, 101, 'Good-Hearted Woman'),\n(1,\
  \ 202, 'Lonesome, Onry, and Mean'),\n(2, 303, 'The Sky Is Crying'),\n(3, 404, 'Ghost\
  \ Riders in the Sky'),\n(4, 505, 'Sunday Morning, Coming Down')\n```\n\n`Listing\
  \ 19-16` 中的 T-SQL 创建并填充了三个新表。\n\n*   `dbo.Source1`\n*   `dbo.Source2`\n*   `dbo.Source3`\n\
  \n执行 `Listing 19-17` 中的 T-SQL 来构建并填充 `SSISIncrementalLoad_Stage` 数据库。\n\n**Listing\
  \ 19-17。构建并填充 SSISIncrementalLoad_Stage 数据库**\n\n```sql\nUse master\nGo\n\nIf Not\
