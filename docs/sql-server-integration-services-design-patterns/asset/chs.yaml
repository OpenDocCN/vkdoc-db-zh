  **图 A-6.** 在父-子模式中执行 Child2.dtsx\n\n非常酷，对吧？我们才刚刚开始！\n\n### 创建元数据数据库\n\n让我们创建一个数据库来保存包元数据。打开\
  \ SQL Server Management Studio (SSMS) 并执行清单 A-2 中所示的 T-SQL 脚本。\n\n**清单 A-2.** 创建\
  \ SSISConfig 数据库\n```sql\nUse master\ngo\n\n/* SSISConfig database */\nIf Not Exists(Select\
  \ name\n              From sys.databases\n              Where name = 'SSISConfig')\n\
  \ begin\n  print 'Creating SSISConfig database'\n  Create Database SSISConfig\n\
  \  print 'SSISConfig database created'\n end\nElse\n print 'SSISConfig database\
  \ already exists.'\nprint ''\ngo\n```\n\n清单 A-2 中的脚本是可重复执行的。此外，它通过 `Print` 语句告知执行脚本的人员其操作。首次执行此脚本时，您将在\
  \ SSMS 的“消息”选项卡中看到以下消息：\n```\nCreating SSISConfig database\nSSISConfig database\
  \ created\n```\n\n第二次及之后每次执行相同的脚本时，您将看到此消息：\n```\nSSISConfig database already exists.\n\
  ```\n\n编写可重复执行的 T-SQL 并不总是可行，但在可行时，这是一个好主意。\n\n\n\n### 构建 SSIS 配置数据库\n\n现在我们有了数据库，我们将构建一个表来保存\
  \ SSIS 包元数据。清单 A-3 包含了这样一个表的 T-SQL。\n\n#### 清单 A-3. 构建 cfg 模式和 cfg.Packages 表\n\n\
  ```sql\nUse SSISConfig\ngo\n\n/* cfg schema */\nIf Not Exists(Select name\n    \
  \          From sys.schemas\n              Where name = 'cfg')\n begin\n  print\
  \ 'Creating cfg schema'\n  declare @sql varchar(100) = 'Create Schema cfg'\n  exec(@sql)\n\
  \  print 'Cfg schema created'\n end\nElse\n print 'Cfg schema already exists.'\n\
  print ''\n\n/* cfg.Packages table */\nIf Not Exists(Select s.name + '.' + t.name\n\
  \              From sys.tables t\n              Join sys.schemas s\n           \
  \     On s.schema_id = t.schema_id\n              Where s.name = 'cfg'\n       \
  \         And t.name = 'Packages')\n begin\n  print 'Creating cfg.Packages table'\n\
  \  Create Table cfg.Packages\n  (\n    PackageID int identity(1,1)\n     Constraint\
  \ PK_Packages\n      Primary Key Clustered\n   ,PackageFolder varchar(255) Not Null\n\
  \   ,PackageName varchar(255) Not Null\n  )\n  print 'Cfg.Packages created'\n end\n\
  Else\n print 'Cfg.Packages table already exists.'\nprint ''\n```\n\n清单 A-3 中的脚本创建了一个名为\
  \ `cfg` 的模式（如果它不存在的话）；然后它创建了一个名为 `cfg.Packages` 的表，该表包含三列：\n\n*   `PackageID` 是一个标识列，用作主键。\n\
  *   `PackageFolder` 是一个 `VarChar(255)` 列，用于保存包含 SSIS 包的文件夹路径。\n*   `PackageName`\
  \ 是一个 `VarChar(255)` 列，包含 SSIS 包的名称。\n\n我最近开始将支持此类存储库的存储过程、函数和视图称为数据库编程接口（DPI），而不是应用程序编程接口（API），因为数据库*不是*应用程序。在这里，您应该开始构建\
  \ `SSISConfig` DPI，首先创建一个存储过程来将数据加载到 `cfg.Packages` 表中，如清单 A-4 所示。\n\n#### 清单 A-4.\
  \ cfg.AddSSISPackages 存储过程\n\n```sql\n/* cfg.AddSSISPackage stored procedure */\n\
  If Exists(Select s.name + '.' + p.name\n          From sys.procedures p\n      \
  \    Join sys.schemas s\n            On s.schema_id = p.schema_id\n          Where\
  \ s.name = 'cfg'\n            And p.name = 'AddSSISPackage')\n begin\n  print 'Dropping\
  \ cfg.AddSSISPackage stored procedure'\n  Drop Procedure cfg.AddSSISPackage\n  print\
  \ 'Cfg.AddSSISPackage stored procedure dropped'\n end\nprint 'Creating cfg.AddSSISPackage\
  \ stored procedure'\nprint ''\ngo\n\nCreate Procedure cfg.AddSSISPackage\n  @PackageName\
  \ varchar(255)\n ,@PackageFolder varchar(255)\n ,@PkgID int output\nAs\n\n  Set\
  \ NoCount On\n\n  declare @tbl table (PkgID int)\n\n  If Not Exists(Select PackageFolder\
  \ + PackageName\n                From cfg.Packages\n                Where PackageFolder\
