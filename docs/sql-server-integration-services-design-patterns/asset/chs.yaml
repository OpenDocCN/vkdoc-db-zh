  \ int\");\nsb.AppendLine(\"declare @PackageID int\");\nsb.AppendLine(\"declare @PackageFolder\
  \ varchar(255) = '\" + packageFolder + \"'\");\nsb.AppendLine(\"declare @PackageName\
  \ varchar(255)\");\nsb.AppendLine();\nsb.AppendLine(\"/* Add Packages */\");\nsb.AppendLine();\n\
  ```\n\n### 通过循环加载包元数据\n\n此 BimlScript 的实际工作是在一个循环内完成的，如 清单 20-7 所示：\n\n**清单 20-7**.\
  \ 开始循环以加载 SSIS 框架包元数据\n\n```csharp\nforeach (var table in tables)\n{\n        string\
  \ tbl = \"IncrementalLoad_\" + table.Name + \".dtsx\";\n```\n\n`foreach` 循环定义创建一个名为\
  \ `table` 的新变量，该变量将代表先前填充的 `tables` 集合中的每个 Biml 表。`tbl` 字符串变量被创建用于按名称标识 SSIS 包。\n\
