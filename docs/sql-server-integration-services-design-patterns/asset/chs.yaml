  \n```\n'\n' frmISTreeHelper 模块\n'\n' 我在开发界面时使用助手模式。\n' 每个窗体命名为 frm_____，并且有一个对应的模块命名为\
  \ frm_____Helper.vb。\n' 每个事件方法都调用助手模块中的一个子例程。\n'\n' 此模块支持 frmISTree。\n'\n\nImports\
  \ Microsoft.SqlServer.Management.IntegrationServices\nImports Microsoft.SqlServer.Management.Smo\n\
  \nModule frmISTreeHelper\n\n    ' 变量\n    Public sFullSSISPkgPath As String\n\n\
  \    Sub frmISTreeInit()\n        ' 初始化并加载 frmISTree\n```\n\n\n\n使用 `frmISTree`\n\
      `.Text` = \"Integration Services\"\n    `.txtServer.Text` = \"localhost\"\n\
      `.ShowDialog()`\nEnd With\n\nEnd Sub\n\nSub `btnConnectClick()`\n' 连接到 txtServer\
  \ 文本框中指示的服务器\n' 接入 SSISDB 目录\n' 通过迭代存储在其中的对象来构建 SSISDB 节点\n' 加载节点并显示它\n\nWith `frmISTree`\n\
      Dim `oServer` As New `Server(.txtServer.Text)`\n    Dim `oIS` As New `IntegrationServices(oServer)`\n\
      Dim `cat` As `Catalog` = `oIS.Catalogs(\"SSISDB\")`\n    Dim `L1Node` As New\
  \ `TreeNode(\"SSISDB\")`\n    `L1Node.ImageIndex` = 0\n    Dim `L2Node` As `TreeNode`\n\
      Dim `L3Node` As `TreeNode`\n    Dim `L4Node` As `TreeNode`\n\nFor Each `f` As\
  \ `CatalogFolder` In `cat.Folders`\n        `L2Node` = New `TreeNode(f.Name)`\n\
          `L2Node.ImageIndex` = 1\n        `L1Node.Nodes.Add(L2Node)`\n        '.tvCatalog.Nodes.Add(L2Node)\n\
          For Each `pr` As `ProjectInfo` In `f.Projects`\n            `L3Node` = New\
  \ `TreeNode(pr.Name)`\n            `L3Node.ImageIndex` = 2\n            `L2Node.Nodes.Add(L3Node)`\n\
              '.tvCatalog.Nodes.Add(L3Node)\n            For Each `pkg` As `PackageInfo`\
  \ In `pr.Packages`\n                `L4Node` = New `TreeNode(pkg.Name)`\n                `L4Node.ImageIndex`\
  \ = 3\n                `L3Node.Nodes.Add(L4Node)`\n                '.tvCatalog.Nodes.Add(L4Node)\n\
              Next\n        Next\n    Next\n\n`.tvCatalog.Nodes.Add(L1Node)`\nEnd\
  \ With\n\nEnd Sub\n\nSub `btnSelectClick()`\n' 如果图像索引级别指示为一个包，\n' 则选择此节点，填充 sFullSSISPkgPath\
  \ 变量，\n' 并关闭窗体\n\nWith `frmISTree`\n    If Not `.tvCatalog.SelectedNode` Is Nothing\
  \ Then\n        If `.tvCatalog.SelectedNode.ImageIndex` = 3 Then\n`sFullSSISPkgPath`\
  \ = `.txtServer.Text` & \".\" & _\n`.tvCatalog.SelectedNode.FullPath`\n            `.Close()`\n\
          End If\n    End If\nEnd With\n\nEnd Sub\n\nSub `tvCatalogDoubleClick()`\n\
  ' 执行“选择”点击逻辑\n\nWith `frmISTree`\n    `btnSelectClick()`\nEnd With\n\nEnd Sub\n\n\
  End Module\n```\n\n本模块中的所有操作都发生在填充 `TreeView` 控件 (`btnConnectClick`) 和选择节点 (`btnSelectClick`)\
  \ 的子例程中。代码默认服务器名称为 \"localhost\"。用户可以在点击连接按钮前更改它。一旦点击按钮，代码就会调用 `btnConnectClick`。\n\
  \n`btnConnectClick` 子例程为模型中的 `Server`、`IntegrationServices` 和 `Catalog` 对象创建对象。接着，它从目录开始构建一个包含四级节点的层次结构。变量——`L1Node`、`L2Node`、`L3Node`\
  \ 和 `L4Node`——分别代表该层次结构中的 `Catalog`（目录）、`Folder`（文件夹）、`Project`（项目）和 `Package`（包）级别。代码使用一系列嵌套的\
  \ `For Each` 循环来迭代 SSIS 目录，并在 `L1Node`（目录）下填充子节点，然后将 `L1Node` 添加到 `tvCatalog` 树视图中。\n\
  \n`btnSelectClick` 子例程构建一个字符串，该字符串表示目录层次结构中 SSIS 包的唯一路径。代码检查是否选择了节点，然后检查所选节点是否处于包级别。如果树视图一切正常，变量\
  \ `sFullSSISPkgPath` 将被填充为目录中 SSIS 包的路径。紧接着，`frmISTree` 窗体关闭。用户也可以双击树视图中的包节点来调用\
  \ `btnSelectClick` 子例程。\n\n执行应用程序进行测试！您应该会看到如 图 2-12 所示的结果。\n\n![9781484200834_Fig02-12.jpg](img/9781484200834_Fig02-12.jpg)\n\
