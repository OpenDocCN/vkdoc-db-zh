  URL 编码——OData 源不会自动为您编码这些值。 |

  | 源 URL | N/A | 这是一个只读字段，显示 OData 源将用于访问服务器的 URL。它是基于您在此对话框中为其他字段设置的值构建的。此字段可用于调试目的。
  |


  使用 OData 源访问 OData 服务主要有两种方式：通过选择集合，或通过配置资源路径。


  使用集合访问服务是 OData 源的默认行为。当您想要读取服务公开的顶级实体集之一时，通常会使用此选项。“集合”字段将为您提供可用实体集的下拉列表，类似于 OLE
  DB 源列出可用表和视图的方式。


  当您要执行的操作不仅仅是访问单个实体集时，会使用资源路径。例如，您想要运行服务定义的操作或操作，或者您想通过导航属性访问子实体。在这些情况下，您需要在“资源路径”字段中提供完整的
  URL。请注意，您需要自行对值应用任何 URL 编码——组件不会自动为您完成此操作。另请注意，OData 源不会对这些值进行任何特殊验证——它只是在运行时尝试访问
  URL，并依赖服务的 `$metadata` 文档来确定如何解释结果。在这些情况下，使用 OData 源编辑器对话框（如图 12-4 所示）上的“预览”按钮非常有用，因为它可以让您快速验证请求是否会成功以及是否获得了所需的数据。


  ```javascript

  if (condVar > someVal) {console.log("xxx")}

  ```



