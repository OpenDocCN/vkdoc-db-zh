  \          .txtStatus.Text = sFullSSISPkgPath & \" loaded. Starting validation...\"\
  \n            .Refresh()\n            pkg.Validate(False, PackageInfo.ReferenceUsage.UseAllReferences,\
  \ Nothing)\n            .txtStatus.Text = sFullSSISPkgPath & \" validated. Starting\
  \ execution...\"\n            .Refresh()\n            pkg.Execute(False, Nothing)\n\
  \            .txtStatus.Text = sFullSSISPkgPath & \" execution started.\"\n    \
  \        .Cursor = Cursors.Default\n        End With\nEnd Sub\nEnd Module\n```\n\
  \n我们来逐步分析这段在文件系统中执行 SSIS 包的代码。在图 2-9 中，我们查看的是上部组合框中表示的功能。\n\n该应用程序的工作流程是：用户要么在文件系统中输入\
  \ SSIS 包的完整路径，要么点击省略号浏览到 SSIS 包（`.dtsx`）文件。选择文件后，完整路径将显示在“包路径”文本框中。要执行包，请单击“文件系统中的\
  \ SSIS 包”组合框中的“开始”按钮。当单击“开始”按钮时，将执行 `btnStartFile_Click` 子例程中的窗体代码，它会执行一行调用 `frmMainHelper`\
  \ 模块中 `btnStartFileClick` 子例程的代码。\n\n`btnStartFileClick` 子例程首先将窗体光标更改为 `WaitCursor`。接下来，它更新\
  \ `txtStatus` 文本框以显示文本 \"Executing\" 后跟“包路径”文本框中 SSIS 包的完整路径。`Refresh` 语句使窗体更新，显示\
  \ `WaitCursor` 和 `txtStatus` 中的消息。然后，代码创建 SSIS 应用程序实例（`Microsoft.SqlServer.Dts.Runtime.Wrapper.Application`），形式为\
  \ `ssisApp` 变量。`ssisPkg` 是 SSIS 包对象的实例，通过调用 SSIS 应用程序对象（`ssisApp`）的 `LoadPackage`\
  \ 方法创建。我们使用包对象的 `Execute` 方法来启动 SSIS 包。子例程的剩余部分重置窗体光标并更新 `txtStatus` 消息以指示包已执行。\n\
  \n如果我为生产环境加固此代码，我会将这个子例程中的大部分代码包装在一个大的 `Try-Catch` 块中。在 `Catch` 部分，我会重置光标并用错误消息更新\
  \ `txtStatus`。我非常喜欢日志记录。在生产加固版本中，我会记录执行包的意图，并包含“包路径”文本框中显示的完整路径。我还会记录尝试执行的结果，无论成功还是失败。\n\
  \n### 从 SSIS 目录执行\n\n执行存储在 SSIS 目录中的 SSIS 包的代码位于 `frmMainHelper` 模块的 `btnStartCatalogClick`\
  \ 子例程中。管理光标和向 `txtStatus` 文本框发送消息的代码与 `btnStartFileClick` 子例程中的代码相当。\n\n存储在 SSIS\
  \ 目录中的 SSIS 包有更多的活动部件，如图 2-10 所示。\n\n![9781484200834_Fig02-10.jpg](img/9781484200834_Fig02-10.jpg)\n\
  *图 2-10. SSIS 目录的表示*\n\nIntegration Services 由一个服务器包含，反过来，它又包含一个目录。在 SQL Server\
  \ 2014 中，Integration Services 包含一个名为 `SSISDB` 的单一目录。`SSISDB` 也是用于管理目录中 SSIS 元数据的数据库的名称。一个目录包含一个或多个文件夹。文件夹包含一个或多个项目，项目又包含一个或多个包。\n\
  \n在 `btnStartCatalogClick` 子例程中，代码为这个层次结构中的对象声明变量（使用 `Dim` 语句），并根据五个文本框中提供的名称设置它们的值：`txtSSISCatalogServer`、`txtCatalog`、`txtFolder`、`txtCatalogProject`\
  \ 和 `txtCatalogPackage`。通过将文本框的名称与图 2-10 进行比较，您可以看到，存储在目录中的 SSIS 包可以使用这个层次结构唯一标识。这些文本框是如何填充的？用户可以手动输入信息。但该应用程序包含第二个窗体，由“SSIS\
  \ 目录中的包”组合框中的省略号启动，以方便 SSIS 目录导航。\n\n要构建它，请向应用程序添加第二个窗体并将其命名为 `frmISTree`。在窗体顶部附近添加一个\
  \ `GroupBox` 控件。将组合框的 `Text` 属性更改为 **连接**。向组合框中添加一个标签、一个文本框和一个按钮。将标签的 `Text` 属性更改为\
  \ **服务器:**。将文本框命名为 `txtServer`。将按钮命名为 `btnConnect`，并将其 `Text` 属性更改为 **连接**。在窗体下部添加一个\
  \ `TreeView` 控件，并将其命名为 `tvCatalog`。在树视图下方添加一个按钮，将其命名为 `btnSelect`，并将其 `Text` 属性更改为\
  \ **选择**。添加一个 `ImageList` 控件，并将其命名为 `ilSSDB`。您需要自己准备图片或下载包含我用于树视图节点级别的四张图片的演示项目。将树视图的\
  \ `ImageList` 属性设置为 `ilSSDB`。窗体应如图 2-11 所示。\n\n![9781484200834_Fig02-11.jpg](img/9781484200834_Fig02-11.jpg)\n\
  *图 2-11. ISTree 窗体*\n\n将窗体背后的代码替换为以下代码：\n\n```\n'\n' frmISTree 代码\n'\n' 我在开发界面时使用助手模式。\n\
  ' 每个窗体命名为 frm_____，并且有一个对应的模块命名为 frm_____Helper.vb。\n' 每个事件方法都调用助手模块中的一个子例程。\n'\n\
  Public Class frmISTree\n\n    Private Sub btnConnect_Click(ByVal sender As System.Object,\
  \ _\n                                 ByVal e As System.EventArgs) Handles btnConnect.Click\n\
  \        btnConnectClick()\n    End Sub\n\n    Private Sub btnSelect_Click(ByVal\
  \ sender As System.Object, _\n                                ByVal e As System.EventArgs)\
  \ Handles btnSelect.Click\n        btnSelectClick()\n    End Sub\n\n    Private\
