  );\nsb.AppendLine(\"              From cfg.Applications\");\nsb.AppendLine(\"  \
  \            Where ApplicationName = @ApplicationName) \");\nsb.AppendLine(\" begin\"\
  );\nsb.AppendLine(\"  print 'Adding ' + @ApplicationName\");\nsb.AppendLine(\" \
  \ exec cfg.AddSSISApplication @ApplicationName, @ApplicationID output\");\nsb.AppendLine(\"\
  \  print @ApplicationName + ' added.'\");\nsb.AppendLine(\" end\");\nsb.AppendLine(\"\
  Else\");\nsb.AppendLine(\" begin\");\nsb.AppendLine(\"  Select @ApplicationID =\
  \ ApplicationID\");\nsb.AppendLine(\"  From cfg.Applications\");\nsb.AppendLine(\"\
  \  Where ApplicationName = @ApplicationName\");\nsb.AppendLine(\"  print @ApplicationName\
  \ + ' already exists in the Framework.'\");\nsb.AppendLine(\" end\");\nsb.AppendLine(\"\
  print ''\");\nsb.AppendLine();\n```\n\n### SSIS 框架包参数\n\n用于构建参数以管理包元数据的 Transact-SQL\
  \ 可在 清单 A-5 和 A-9 的前面部分找到，并在此处的 清单 20-5 中展示：\n\n**清单 20-5**. SSIS 框架包参数\n\n```sql\n\
  declare @ExecutionOrder int = 10\ndeclare @ApplicationID int = 1\ndeclare @PackageID\
  \ int = 1\ndeclare @ApplicationName varchar(255) = 'SSISApp1'\ndeclare @PackageFolder\
  \ varchar(255) = 'F:\\Andy\\Projects\\PublicFramework_PackageDeployment_2014\\SSISConfig2014\\\
  '\ndeclare @PackageName varchar(255) = 'Child1.dtsx'\n```\n\n向 `stringbuilder` 的\
  \ Transact-SQL 中添加声明，这些参数将用于将 SSIS 包元数据插入框架，省略了一些参数并添加了一些，如 清单 20-6 所示：\n\n**清单\
