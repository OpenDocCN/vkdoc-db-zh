  \n        End With\n\nEnd Sub\n\nSub btnStartCatalogClick()\n\n' 配置一个 SSIS 应用程序并从目录执行选定的\
  \ SSIS 包\n\n\n\n### 执行 SSIS 包\n\n### 从文件系统执行\n\n```\nWith frmMain\n            .Cursor\
