  ```\n\n### 在 SSIS 中检索 SSIS 应用程序\n\n返回 SSDT-BI 并打开 \"获取包元数据执行 SQL 任务\" 的编辑器。将 \"\
  结果集\" 属性从 \"单行\" 更改为 \"完整结果集\"，并将 \"SQLStatement\" 属性更改为 `cfg.GetSSISApplication`。将\
  \ \"IsQueryStoredProcedure\" 属性设置为 `True`。在 \"参数映射\" 选项卡上，单击 \"添加\" 按钮。单击 \"变量名\"\
  \ 列中的下拉菜单，选择 `<新变量...>`（你可能需要向上滚动才能找到 `<新变量...>`）。\n\n\n\n在**添加变量**窗口中，确保 `Container`\
  \ 属性设置为 `Parent`。将 `Name` 属性更改为 `ApplicationName`。`Namespace` 应设置为 `User`，`Value\
  \ Type` 属性应设置为 `String`。对于 `Value` 属性，输入 `SSISApp1`。**添加变量**窗口应如图 A-8 所示。\n\n![9781484200834_FigAppA-08.jpg](img/9781484200834_FigAppA-08.jpg)\n\
  \n图 A-8. 添加 `ApplicationName` 变量\n\n点击 `OK` 按钮关闭**添加变量**窗口，并将 `ApplicationName`\
  \ 变量的 `Data Type` 更改为 `String`。将 `Parameter Name` 更改为 `ApplicationName`。导航到**结果集**页面，将结果名为\
  \ `0` 的变量从 `User::ChildPackagePath` 更改为一个新变量，设置如下：\n\n*   `Container`: `Parent`\n\
  *   `Name`: `Packages`\n*   `Namespace`: `User`\n*   `Value Type`: `Object`\n\n\
  点击 `OK` 按钮关闭**添加变量**窗口，然后再次点击 `OK` 按钮关闭**执行 SQL 任务编辑器**。删除**获取包元数据执行 SQL** 任务和**执行子包执行包**任务之间的优先级约束。将一个**Foreach\
  \ 循环**容器拖到控制流上，然后将**执行子包执行包**任务拖到其内部。从**获取包元数据执行 SQL** 任务到新的**Foreach 循环**容器添加一个优先级约束，并将该**Foreach\
  \ 循环**容器重命名为 `Foreach Child Package`。打开 `Foreach Child Package` **Foreach 循环**容器的编辑器并导航到**集合**页面。将\
  \ `Enumerator` 更改为 `Foreach ADO Enumerator`。在 `ADO Object Source Variable` 下拉列表中，选择\
  \ `User::Packages` 变量。接受默认的 `Enumeration Mode`: `Rows in the First Table`。\n\n导航到**Foreach\
  \ 循环编辑器**中的**变量映射**页面。点击 `Variable` 下拉列表并选择 `User::ChildPackagePath` 变量。`Index`\
  \ 属性将默认为 `0`——请勿更改它。\n\n我们刚刚所做的更改实现了以下功能：\n\n1.  在 `SSISConfig` 数据库中执行 `cfg.GetSSISApplications`\
  \ 存储过程，向其传递 `ApplicationName` 变量中包含的值。\n2.  将存储过程执行返回的完整结果集推入一个名为 `Packages` 的 SSIS\
  \ 对象变量。\n3.  配置一个**Foreach 循环**，按返回的顺序指向 `Packages` 变量中存储的每一行。\n4.  将**Foreach 循环**所指向行的第一列（`Column\
  \ 0`）中包含的值推入 `User::ChildPackagePath` 变量。\n\n当 `ChildPackagePath` 变量的值发生变化时，`Child.dtsx`\
  \ 文件连接管理器的 `ConnectionString` 属性会动态更新，将连接管理器指向 `User::ChildPackagePath` 中包含的路径。\n\
  \n点击 `OK` 按钮关闭**Foreach 循环容器编辑器**，并在 SSDT 调试器中执行 `Parent.dtsx` SSIS 包。执行后，您会看到两个消息框。第一个显示“I\
  \ am Child1”，第二个如图 A-9 所示。\n\n![9781484200834_FigAppA-09.jpg](img/9781484200834_FigAppA-09.jpg)\n\
  \n图 A-9. 执行一个测试序列化 SSIS 框架\n\n就目前而言，这段代码构成了一个 SSIS 执行框架。数据库包含元数据，父包执行 SSIS 包。接下来是监控。\n\
  \n#### 监控执行\n\n大多数有经验的业务智能开发者会告诉您从报告开始，然后回溯到源数据。在这种情况下，源数据是从数据集成过程收集的信息。什么样的信息？比如开始和结束执行时间、执行状态以及错误和事件消息。\n\
  \n每个 SSIS 应用程序和 SSIS 包执行都会记录实例数据。每个条目代表一次执行，有两个表保存这些条目：`Log.SSISAppInstance` 保存关于\
  \ SSIS 应用程序实例的执行指标，`Log.SSISPkgInstance` 保存 SSIS 子包实例的执行指标。当一个 SSIS 应用程序启动时，会在 `log.SSISAppInstance`\
  \ 表中插入一行。当 SSIS 应用程序完成时，该行会被更新。`log.SSISPkgInstance` 对 SSIS 应用程序中的每个 SSIS 包以相同的方式工作。一个\
  \ SSIS 应用程序实例在逻辑上由应用程序 ID 和开始时间组成。一个 SSIS 包实例由应用程序实例 ID、应用程序包 ID 和开始时间组成。\n\n错误和事件记录相对简单。您存储错误或事件的描述、发生时间以及实例\
  \ ID。这就是报告将反映的内容，记录也就这些了。\n\n### 构建应用程序实例记录\n\n让我们回到 SSMS 来构建支持记录的表和存储过程。您需要执行清单\
  \ A-12 中显示的 T-SQL 脚本来构建实例表和存储过程。\n\n清单 A-12. 构建应用程序实例表和存储过程\n\n```sql\n/* log 模式\
  \ */\nIf Not Exists(Select name\n              From sys.schemas\n              Where\
  \ name = 'log')\n begin\n  print '正在创建 log 模式'\n  declare @sql varchar(100) = 'Create\
  \ Schema [log]'\n  exec(@sql)\n  print 'Log 模式已创建'\n end\nElse\n print 'Log 模式已存在。'\n\
  print ''\n\n/* log.SSISAppInstance 表 */\nIf Not Exists(Select s.name + '.' + t.name\n\
  \              From sys.tables t\n              Join sys.schemas s\n           \
  \    On s.schema_id = t.schema_id\n              Where s.name = 'log'\n        \
  \       And t.name = 'SSISAppInstance')\n begin\n  print '正在创建 log.SSISAppInstance\
  \ 表'\n  Create Table [log].SSISAppInstance\n  (\n    AppInstanceID int identity(1,1)\n\
  \     Constraint PK_SSISAppInstance\n      Primary Key Clustered\n  ,ApplicationID\
  \ int Not Null\n  Constraint FK_logSSISAppInstance_cfgApplication_ApplicationID\n\
  \  Foreign Key References cfg.Applications(ApplicationID)\n  ,StartDateTime datetime\
  \ Not Null\n     Constraint DF_cfgSSISAppInstance_StartDateTime\n      Default(GetDate())\n\
  \  ,EndDateTime datetime Null\n  ,[Status] varchar(12) Null\n  )\n  print 'Log.SSISAppInstance\
  \ 已创建'\n end\nElse\n print 'Log.SSISAppInstance 表已存在。\nprint ''\n\n/* log.LogStartOfApplication\
  \ 存储过程 */\nIf Exists(Select s.name + '.' + p.name\n          From sys.procedures\
  \ p\n          Join sys.schemas s\n           On s.schema_id = p.schema_id\n   \
  \       Where s.name = 'log'\n           And p.name = 'LogStartOfApplication')\n\
  \ begin\n  print '正在删除 log.LogStartOfApplication 存储过程'\n  Drop Procedure [log].LogStartOfApplication\n\
  \  print 'Log.LogStartOfApplication 存储过程已删除'\n end\nprint '正在创建 log.LogStartOfApplication\
  \ 存储过程'\ngo\n\nCreate Procedure [log].LogStartOfApplication\n @ApplicationName varchar(255)\n\
  As\n declare @ErrMsg varchar(255)\n declare @AppID int = (Select ApplicationID\n\
  \                       From cfg.Applications\n                       Where ApplicationName\
  \ = @ApplicationName)\n\n If (@AppID Is Null)\n  begin\n   set @ErrMsg = '找不到 ApplicationName\
  \ ' + Coalesce(@ApplicationName, '<NULL>')\n   raiserror(@ErrMsg,16,1)\n   return-1\n\
  \  end\n\n Insert Into [log].SSISAppInstance\n (ApplicationID, StartDateTime, Status)\n\
  \ Output inserted.AppInstanceID\n Values\n (@AppID, GetDate(), 'Running')\ngo\n\
  print 'Log.LogStartOfApplication 存储过程已创建。'\nprint ''\n\n/* log.LogApplicationSuccess\
  \ 存储过程 */\nIf Exists(Select s.name + '.' + p.name\n          From sys.procedures\
  \ p\n          Join sys.schemas s\n           On s.schema_id = p.schema_id\n   \
  \       Where s.name = 'log'\n           And p.name = 'LogApplicationSuccess')\n\
  \ begin\n  print '正在删除 log.LogApplicationSuccess 存储过程'\n  Drop Procedure [log].LogApplicationSuccess\n\
  \  print 'Log.LogApplicationSuccess 存储过程已删除'\n end\n```\n\n\n### SSIS 应用程序实例日志记录与错误处理\n\
  \n### 存储过程设置\n\n以下 SQL 脚本创建了用于记录 SSIS 应用程序实例状态的存储过程。\n\n```sql\nPrint 'Dropping\
  \ log.LogApplicationSuccess stored procedure'\ngo\nDrop Procedure [log].LogApplicationSuccess\n\
  Print 'Log.LogApplicationSuccess stored procedure dropped'\nend\nPrint 'Creating\
  \ log.LogApplicationSuccess stored procedure'\ngo\n\nCreate Procedure [log].LogApplicationSuccess\n\
  \t@AppInstanceID int\nAs\n\tupdate log.SSISAppInstance\n\tset EndDateTime = GetDate()\n\
  \t  , Status = 'Success'\n\twhere AppInstanceID = @AppInstanceID\ngo\nPrint 'Log.LogApplicationSuccess\
  \ stored procedure created.'\nPrint ''\n\n/* log.LogApplicationFailure stored procedure\
  \ */\nIf Exists(Select s.name + '.' + p.name\n          From sys.procedures p\n\
  \          Join sys.schemas s\n            On s.schema_id = p.schema_id\n      \
  \    Where s.name = 'log'\n            And p.name = 'LogApplicationFailure')\nbegin\n\
  \tprint 'Dropping log.LogApplicationFailure stored procedure'\n\tDrop Procedure\
  \ [log].LogApplicationFailure\n\tPrint 'Log.LogApplicationFailure stored procedure\
  \ dropped'\nend\nPrint 'Creating log.LogApplicationFailure stored procedure'\ngo\n\
  \nCreate Procedure [log].LogApplicationFailure\n\t@AppInstanceID int\nAs\n\tupdate\
  \ log.SSISAppInstance\n\tset EndDateTime = GetDate()\n\t  , Status = 'Failed'\n\t\
  where AppInstanceID = @AppInstanceID\ngo\nPrint 'Log.LogApplicationFailure stored\
  \ procedure created.'\nPrint ''\n```\n\n### 在 SSDT 中配置日志记录\n\n现在让我们回到 SSDT，将应用程序实例日志记录添加到\
  \ `Parent.dtsx` 包中。\n\n#### 记录应用程序开始\n\n1.  在控制流中拖入一个新的执行 SQL 任务，并将其重命名为 `Log Start\
  \ of Application`。\n2.  将 `ResultSet` 属性设置为 Single Row。\n3.  将 `ConnectionType`\
  \ 属性设置为 ADO.Net，并将 `Connection` 设置为 `SSISConfig` 连接管理器。\n4.  将 `SQLStatement` 属性设置为\
  \ `log.LogStartOfApplication`，并将 `IsQueryStoredProcedure` 属性设置为 `True`。\n5.  导航到“参数映射”页面并添加一个新参数：将\
  \ `User::ApplicationName` SSIS 变量映射到 `log.LogStartOfApplication` 存储过程的 `ApplicationName`\
  \ 参数。\n6.  将 `ApplicationName` 参数的“数据类型”属性更改为 String。\n7.  在“结果集”页面上，添加一个名为 `0`\
  \ 的新结果，并将其映射到名为 `AppInstanceID` 的新 Int32 变量。\n8.  将 `AppInstanceID` 变量的默认值设置为 `0`。\n\
  9.  关闭“执行 SQL 任务编辑器”，并从“Log Start of Application”执行 SQL 任务到“Get Package Metadata”执行\
  \ SQL 任务连接一个优先约束。\n\n#### 记录应用程序成功\n\n1.  在控制流中“Foreach Child Package”Foreach 循环容器下方拖入另一个执行\
  \ SQL 任务，并将其重命名为 `Log Application Success`。\n2.  打开编辑器，将 `ConnectionType` 属性更改为\
  \ ADO.Net，并将 `Connection` 属性设置为 `SSISConfig` 连接管理器。\n3.  在 `SQLStatement` 属性中输入\
  \ `log.LogApplicationSuccess`，并将 `IsQueryStoredProcedure` 属性设置为 `True`。\n4.  导航到“参数映射”页面，添加\
  \ `User::AppInstanceID` SSIS 变量与 `log.LogApplicationSuccess` 存储过程的 `Int32 AppInstanceID`\
  \ 参数之间的映射。\n5.  关闭“执行 SQL 任务编辑器”，并从“Foreach Child Package”Foreach 循环容器到“Log Application\
  \ Success”执行 SQL 任务连接一个优先约束。\n\n你刚刚完成了什么？你将 SSIS 应用程序实例日志记录添加到了 `Parent.dtsx` SSIS\
  \ 包的控制流中。\n\n#### 测试与验证\n\n要测试这一点，你需要在 SSDT 调试器中执行 `Parent.dtsx`。\n\n执行完成后，执行以下查询以观察记录的结果：\n\
  \n```sql\nSelect * From [log].SSISAppInstance\n```\n\n当我执行此查询时，得到如图 A-10 所示的结果。\n\
  \n![9781484200834_FigAppA-10.jpg](img/9781484200834_FigAppA-10.jpg)\n图 A-10. 观察查询应用程序实例日志的结果\n\
  \n### 处理应用程序失败\n\n当 SSIS 应用程序失败时会发生什么？你需要用 `EndDateTime` 更新 `log.SSISAppInstance`\
  \ 行，并将状态设置为 Failed。为此，你将使用一个配置为执行 `log.LogApplicationFailure` 存储过程的执行 SQL 任务。问题是：放在哪里？答案是：`Parent.dtsx`\
  \ 包的 OnError 事件处理程序。\n\n在 SSDT 中，单击 `Parent.dtsx` 上的“事件处理程序”选项卡。在“可执行文件”下拉列表中，选择\
  \ Parent；在“事件处理程序”下拉列表中，选择 OnError，如图 A-11 所示。\n\n![9781484200834_FigAppA-11.jpg](img/9781484200834_FigAppA-11.jpg)\n\
  图 A-11. 配置 Parent 包的 OnError 事件处理程序\n\n单击事件处理程序表面上的“单击此处为可执行文件“Parent”创建“OnError”事件处理程序”链接，为\
  \ `Parent.dtsx` 包创建 OnError 事件处理程序。\n\n我可以引导你构建另一个执行 SQL 任务来记录 SSIS 应用程序失败；但是，更简单的方法是直接从控制流底部复制“Log\
  \ Application Success”执行 SQL 任务，并将其粘贴到 `Parent.dtsx` OnError 事件处理程序中。粘贴后，将名称更改为\
  \ `Log Application Failure`，并将 `SQLStatement` 属性更改为 `log.LogApplicationFailure`。\n\
  \n### 构建错误测试包\n\n现在你准备好测试了，但除非修改一个包，否则你无法真正测试应用程序失败，这似乎有点不幸。你之后可能还需要测试错误。那么为什么不构建一个\
  \ `ErrorTest.dtsx` SSIS 包并将其添加到 SSIS 应用程序中呢？我喜欢这个计划！\n\n1.  创建一个新的 SSIS 包并将其重命名为\
  \ `ErrorTest.dtsx`。\n2.  在控制流中添加一个脚本任务，并将其重命名为 `Succeed or Fail?`。\n3.  将 `ScriptLanguage`\
  \ 属性更改为 Microsoft Visual Basic 2012。\n4.  打开编辑器并将 `System::TaskName` 和 `System::PackageName`\
  \ 变量添加到 `ReadOnlyVariables` 属性中。\n5.  打开脚本编辑器，并将清单 A-13 中所示的代码添加到 `Sub Main()` 中。\n\
  \n**清单 A-13.** 使 SSIS 包成功或失败的代码\n\n```vb\nPublic Sub Main()\n        Dim sPackageName\
  \ As String = Dts.Variables(\"PackageName\").Value.ToString\n        Dim sTaskName\
  \ As String = Dts.Variables(\"TaskName\").Value.ToString\n        Dim sSubComponent\
  \ As String = sPackageName & \".\" & sTaskName\n\n        Dim iResponse As Integer\
  \ = MsgBox(\"Succeed Package?\", MsgBoxStyle.YesNo, sSubComponent)\n        If iResponse\
  \ = vbYes Then\n            Dts.TaskResult = ScriptResults.Success\n        Else\n\
  \            Dts.TaskResult = ScriptResults.Failure\n        End If\n\n    End Sub\n\
  ```\n\n通过在 SSDT 调试器中执行 `ErrorTest.dtsx` 进行单元测试，如图 A-12 所示。\n\n![9781484200834_FigAppA-12.jpg](img/9781484200834_FigAppA-12.jpg)\n\
