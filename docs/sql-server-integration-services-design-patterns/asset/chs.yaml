- "# 第 1 章\n\n![image](img/frontdot.jpg)\n\n#### 元数据收集\n\n我们要介绍的第一个集成服务设计模式是元数据收集。我们所说的元数据收集是什么意思？问得好。本章也可以命名为“使用\
  \ SSIS 节省时间并成为出色的 DBA”。许多 DBA 将大量时间花在监控活动上，例如验证备份、对计划作业失败发出警忠、创建架构快照（“以防万一”）、检查空间利用情况以及记录数据库随时间增长的情况，等等。大多数关系数据库管理系统\
  \ (RDBMS) 都提供元数据来帮助 DBA 监控其系统。如果您已经当了几年的 DBA，您甚至可能拥有一个用于查询元数据的“工具箱”脚本集。当您只有一两台服务器时，手动运行这些脚本很容易；然而，随着企业的发展和数据库服务器数量的增加，这很快就会变得难以处理并占用您的大量时间。\n\
  \n本章将探讨如何使用集成服务和 SQL Server 中存在的元数据来自动化其中一些例行任务。\n\n### 关于 SQL Server 数据工具\n\nSQL\
  \ Server 数据工具 - 商业智能 (SSDT-BI) 是微软用于开发集成服务包的集成开发环境 (IDE)。它利用了 Visual Studio 的成熟度和熟悉度，为\
  \ SQL Server 商业智能项目（包括集成服务、分析服务和报表服务项目）提供了一个统一的开发平台。本书使用 Visual Studio 2013 的 `SSDT-BI`\
  \ 和 `SSIS` 2014 编写。\n\n![Image](img/sq.jpg) **提示** 还没安装 `SSDT-BI`？`SSDT-BI` 可从微软下载中心获取。请注意，`SSDT-BI`\
  \ 不向下兼容，因此请务必验证您下载的版本是否适合您的环境。\n\n### 预览最终产品\n\n让我们讨论一下您将在本章中创建的集成服务包。\n\n在 SQL\
  \ Server 中，您将执行以下操作：\n\n1.  创建一个数据库，作为您数据库监控的中央存储库。\n2.  创建一个表，用于存储您希望监控的 SQL Server\
  \ 实例列表。\n3.  为您希望监控的每个数据元素（未使用的索引和数据库增长）创建一个表。\n\n在集成服务中，您将执行以下操作：\n\n1.  创建一个新的集成服务包。\n\
  2.  检索 SQL Server 实例列表并将该列表存储在变量中。\n3.  创建一个带有动态填充服务器名称的 `OLE DB` 连接。\n4.  遍历每个数据库，并\n\
  \    1.  检索当前数据库和日志文件大小以进行历史监控。\n    2.  检索索引候选列表，用于潜在的重新设计或删除。\n    3.  更新每个 SQL\
  \ Server 实例的 `上次监控时间` 值。\n\n这是一个非常灵活的模型，您可以轻松扩展以包含更多监控任务。完成的包的屏幕截图显示在 图 1-1 中。\n\
  \n![9781484200834_Fig01-01.jpg](img/9781484200834_Fig01-01.jpg)\n\n图 1-1. 元数据收集包\n\
  \n如果这不是您的第一个集成服务包，也许您已经注意到此包缺少一些最佳实践，例如错误处理。为了清晰起见，您在本章中创建的包将仅专注于核心设计模式；但是，我们将在适用时指出最佳实践。\n\
  \n另外，请注意，`T-SQL` 示例仅适用于 SQL Server 2005 或更高版本。\n\n### SQL Server 元数据\n\ncatalog\n\
  \n虽然元数据可以从任何提供访问接口的 RDBMS 中收集，但本章使用 SQL Server 作为元数据源。本章的重点不是实际的元数据，而是元数据收集的模式。尽管如此，了解可用的元数据类型对您还是很有帮助的。\n\
  \nSQL Server 通过目录视图、系统函数、动态管理视图 (DMV) 和动态管理函数 (DMF) 公开了丰富的信息。让我们简要了解一下您将在本章中使用的一些元数据。\n\
  \n![Image](img/sq.jpg) **提示** SQL Server 联机丛书是了解 SQL Server 中可用元数据类型的绝佳资源。尝试搜索“元数据函数”、“目录视图”和“DMV”以获取更多信息。\n\
  \n#### sys.dm_os_performance_counters\n\n`sys.dm_os_performance_counters` `DMV`\
  \ 返回服务器性能计数器，涵盖内存、等待统计信息和事务等领域。此 `DMV` 可用于报告文件大小、页面预期寿命、每秒页面读写次数和每秒事务数等。\n\n####\
  \ sys.dm_db_index_usage_stats\n\n\n#### `sys.dm_db_index_usage_stats` 动态管理视图\n\n\
  `sys.dm_db_index_usage_stats` 动态管理视图包含有关索引使用情况的信息。具体来说，每次在索引上执行查找、扫描、查找或更新时，计数器都会递增。每当\
  \ SQL Server 服务启动时，这些计数器都会重新初始化。如果在此动态管理视图中未看到特定索引的行，则意味着自上次服务器重启以来，尚未在该索引上执行过查找、扫描、查找或更新操作。\n\
  \n#### `sys.dm_os_sys_info` 动态管理视图\n\n`sys.dm_os_sys_info` 动态管理视图包含有关服务器资源的信息。其中最常用的信息可能是\
  \ `sqlserver_start_time` 列，它显示了 SQL Server 服务上次启动的时间。\n\n#### `sys.tables` 目录视图\n\
  \n`sys.tables` 目录视图包含数据库中存在的每个表的信息。\n\n#### `sys.indexes` 目录视图\n\n`sys.indexes`\
  \ 目录视图包含数据库中每个索引的信息。这包括诸如索引是聚集还是非聚集，以及索引是唯一还是非唯一等信息。\n\n#### `sys.partitions` 目录视图\n\
  \n`sys.partitions` 目录视图提供了对索引分区结构的可见性。当一个索引有多个分区时，索引中的数据会被拆分到多个物理结构中，但可以通过单一逻辑名称访问。这种技术对于处理大型表（如事务历史表）特别有用。如果一个表未被分区，该表在\
  \ `sys.partitions` 中仍将只有一行。\n\n#### `sys.allocation_units` 目录视图\n\n`sys.allocation_units`\
  \ 目录视图包含有关对象的页数和行数的信息。可以通过将 `container_id` 与 `partition_id` 连接，将此信息与 `sys.partitions`\
  \ 目录视图关联起来。\n\n#### 设置中央存储库\n\n在开始开发 Integration Services 包之前，您需要在 SQL Server 中设置一些先决条件。首先也是最重要的，您需要创建一个数据库作为您的中央数据存储库。这将是您的\
  \ SQL Server 实例列表所在的位置，也是您存储从每个 SQL Server 实例检索到的元数据的地方。许多企业还发现将所有错误和包日志记录存储到这个中央数据库中非常方便。这在有众多\
  \ DBA、开发人员和服务器的环境中尤其有益，因为它使每个人都能轻松知道在哪里查找信息。清单 1-1 中的 T-SQL 代码创建了本章余下部分将使用的数据库。\n\
  \n***清单 1-1***. 创建 SQL Server 数据库的 T-SQL 代码示例\n\n```sql\nUSE [master];\nGO\n\nCREATE\
  \ DATABASE [dbaCentralLogging]\nON PRIMARY\n(\n      NAME = N'dbaCentralLogging'\n\
  \    , FILENAME = N'C:\\Program Files\\Microsoft SQL Server\\MSSQL12.MSSQLSERVER\\\
  MSSQL\\DATA\\dbaCentralLogging.mdf'\n    , SIZE = 1024MB\n    , MAXSIZE = UNLIMITED\n\
  \    , FILEGROWTH = 1024MB\n)\nLOG ON\n(\n      NAME = N'dbaCentralLogging_log'\n\
  \    , FILENAME = N'C:\\Program Files\\Microsoft SQL Server\\MSSQL12.MSSQLSERVER\\\
  MSSQL\\DATA\\dbaCentralLogging_log.ldf'\n    , SIZE = 256MB\n    , MAXSIZE = UNLIMITED\n\
  \    , FILEGROWTH = 256MB\n);\nGO\n```\n\n请注意，您的文件目录可能与前面示例中的不同。\n\n这段代码可以从 SQL\
  \ Server Management Studio (`SSMS`) 执行，如图 1-2 所示，也可以从您喜欢的查询工具执行。\n\n![9781484200834_Fig01-02.jpg](img/9781484200834_Fig01-02.jpg)\n\
  \n图 1-2. SQL Server Management Studio 2012\n\n接下来，您需要一个要监控的 SQL Server 实例列表。实现此目的最简单的方法是将数据库实例名称列表存储在文件或表中。您将使用后一种方法。使用清单\
  \ 1-2 中的代码，现在在新创建的数据库中创建该表。\n\n***清单 1-2***. 创建用于监控 SQL Server 实例的表的 T-SQL 代码示例\n\
  \n```sql\nUSE dbaCentralLogging;\nGO\n\nCREATE TABLE dbo.dba_monitor_SQLServerInstances\n\
  (\n      SQLServerInstance   NVARCHAR(128)\n    , LastMonitored       SMALLDATETIME\
  \     NULL\n\nCONSTRAINT PK_dba_monitor_SQLServerInstances\n    PRIMARY KEY CLUSTERED(\
  \ SQLServerInstance )\n);\n```\n\n现在您已准备好用要监控的 SQL Server 实例列表填充该表。清单 1-3 中的代码将引导您完成此操作，但您需要用您环境中存在的\
  \ SQL Server 实例更新占位符。\n\n***清单 1-3***. 向 `dba_monitor_SQLServerInstances` 表插入数据的\
  \ T-SQL 代码示例\n\n```sql\nINSERT INTO dbo.dba_monitor_SQLServerInstances\n(\n    SQLServerInstance\n\
  )\nSELECT @@SERVERNAME-- 承载中央存储库的服务器名称\nUNION ALL\nSELECT 'YourSQLServerInstanceHere'--\
  \ SQL Server 实例示例\nUNION ALL\nSELECT 'YourSQLServerInstance\\Here';-- 具有多个实例的服务器示例\n\
  ```\n\n您仍然需要创建两个表来存储收集到的元数据，但您将在本章相关部分介绍时创建这些表。接下来，您将创建您的 Integration Services 包。\n\
  \n#### 迭代框架\n\n在本节中，您将为迭代框架奠定基础。具体来说，您将展示一种可重复的模式，用于用 SQL Server 实例列表填充变量，然后遍历该列表并对每个服务器执行操作。\n\
  \n首先，打开 Visual Studio。通过导航到 **文件** ![image](img/arrow.jpg) **新建** ![image](img/arrow.jpg)\
  \ **项目** 创建一个新项目。展开“商业智能”部分（位于 **已安装** ![image](img/arrow.jpg) **模板** 下），然后单击 **Integration\
  \ Services 项目**。将项目命名为 **MetadataCollection**，如图 1-3 所示。\n\n![9781484200834_Fig01-03.jpg](img/9781484200834_Fig01-03.jpg)\n\
  \n图 1-3. 新建 Integration Services 项目\n\n请注意，您的默认 **位置** 将与图 1-3 中所示的目录不同。\n\n您现在需要创建两个变量。第一个变量将用于存储检索到的\
  \ SQL Server 实例列表。第二个变量将在您遍历列表时存储单个实例的值。\n\n要访问变量菜单，请选择 SSIS 菜单下的 **变量**（图 1-4）；您也可以通过右键单击设计器界面来访问变量菜单。\n\
  \n![9781484200834_Fig01-04.jpg](img/9781484200834_Fig01-04.jpg)\n\n图 1-4. 打开变量菜单\n\
  \n通过单击变量菜单最左侧的 **添加变量** 图标添加以下变量，如图 1-5 所示：\n\n*   `SQLServerInstance`—字符串数据类型\n\
  *   `SQLServerList`—对象数据类型\n\n![9781484200834_Fig01-05.jpg](img/9781484200834_Fig01-05.jpg)\n\
  \n图 1-5. 包作用域变量\n\n用您有权限连接的服务器初始化 `SQLServerInstance` 变量。为简单起见，建议使用创建 `dbaCentralLogging`\
  \ 数据库的服务器。此值将在运行时被覆盖。\n\n现在您有了存储实例列表的位置，您已准备好填充该变量。从 SSIS 工具箱中将一个新的 **执行 SQL 任务**\
  \ 拖到设计器界面上。将任务重命名为 **检索 SQL Server 实例**，然后双击它以打开 **执行 SQL 任务编辑器**。单击 **连接** 下的下拉菜单，然后选择\
  \ **<新建连接…>**，如图 1-6 所示。\n\n![9781484200834_Fig01-06.jpg](img/9781484200834_Fig01-06.jpg)\n\
  \n\n### 执行 SQL 任务编辑器\n\n在“配置 OLE DB 连接管理器”菜单中，单击“新建”。在“服务器名称”字段中，输入您在 清单 1-1 中创建数据库时所用的数据库服务器。无论您使用的是\
  \ Windows 身份验证还是 SQL Server 身份验证，请确保该帐户对您的 `dba_monitor_SQLServerInstances` 表中的每个实例都拥有足够的权限。在“选择或输入数据库名称”下，从下拉菜单中选择\
  \ `dbaCentralLogging`，如 图 1-7 所示。单击“确定”返回到“执行 SQL 任务编辑器”。\n\n![9781484200834_Fig01-07.jpg](img/9781484200834_Fig01-07.jpg)\n\
  \n### 连接管理器\n\n![Image](img/sq.jpg) **注意** 权限要求取决于您希望检索的元数据类型。有关访问特定对象所需权限的更多信息，请参阅\
  \ SQL Server 联机丛书中对应对象类型的页面。\n\n现在，您需要编写用于检索 SQL Server 实例列表的 SQL 语句。单击 `SQLStatement`\
  \ 字段右侧的 `[...]` 图标，然后输入 清单 1-4 中的 T-SQL 代码。\n\n###### 用于检索 SQL Server 实例的 T-SQL\
  \ 语句\n\n```sql\nSELECT SQLServerInstance FROM dbo.dba_monitor_SQLServerInstances;\n\
  ```\n\n因为您要检索的是一个值数组，所以从 `ResultSet` 下拉菜单中选择“完整结果集”。此时，您的“执行 SQL 任务编辑器”应类似于 图 1-8；但是，您的“连接”值可能有所不同。\n\
  \n![9781484200834_Fig01-08.jpg](img/9781484200834_Fig01-08.jpg)\n\n###### SQL 任务编辑器\n\
  \n您即将完成连接管理器的配置。剩下需要做的就是将结果集映射到您的变量。在“执行 SQL 任务编辑器”的左侧选择“结果集”，然后单击“添加”。因为您使用的是完整结果集，所以必须将\
  \ `Result Name` 替换为 `0`。现在，您需要告知 Integration Services 使用哪个变量。从“变量名称”下的下拉菜单中选择 `User::SQLServerList`，如\
  \ 图 1-9 所示。单击“确定”。\n\n![9781484200834_Fig01-09.jpg](img/9781484200834_Fig01-09.jpg)\n\
  \n###### 编辑结果集\n\n至此，执行 SQL 任务已完成配置。接下来，您需要遍历每个服务器以检索您计划监控的元数据。此过程将封装在一个 **Foreach\
  \ 循环容器**中，该容器将分解存储在 `SQLServerList` 变量中的 SQL Server 实例列表。\n\n向控制流中添加一个 **Foreach\
  \ 循环容器**，并将其重命名为 **Foreach SQL Server Instance**。使用“成功”优先级约束将其连接到执行 SQL 任务——换句话说，将绿色箭头从执行\
  \ SQL 任务拖到 **Foreach 循环容器**上，如 图 1-10 所示。\n\n![9781484200834_Fig01-10.jpg](img/9781484200834_Fig01-10.jpg)\n\
  \n###### 连接执行 SQL 任务与 Foreach 循环容器\n\n双击 **Foreach 循环容器**以编辑其属性。单击“集合”页，然后在“枚举器”字段中选择“Foreach\
  \ ADO 枚举器”。在“ADO 对象源变量”下，选择 `User::SQLServerList`；将“枚举模式”保留为“表中的行”。您的“集合”属性应与 图\
  \ 1-11 中的匹配。\n\n![9781484200834_Fig01-11.jpg](img/9781484200834_Fig01-11.jpg)\n\n\
  ### Foreach 循环编辑器\n\n在“变量映射”页上，将 `SQLServerInstance` 变量映射到索引 0，如 图 1-12 所示。\n\n\
  ![9781484200834_Fig01-12.jpg](img/9781484200834_Fig01-12.jpg)\n\n#### 变量映射\n\n点击“确定”按钮关闭\
  \ Foreach 循环编辑器。\n\n让我们回顾一下你到目前为止完成的工作。你现在拥有一个变量 `SQLServerList`，其中包含了你插入到 `dba_monitor_SQLServerInstances`\
  \ 表中的所有 SQL Server 实例的列表。然后，Foreach 循环容器会拆解这个变量，逐一遍历每个值——在本例中就是每个 SQL Server 实例。在每一次循环中，它会将其中一个\
  \ SQL Server 实例的值推送到另一个变量 `SQLServerInstance` 中。\n\n现在，是时候设置动态连接了，该连接将用于连接到你正在监控的每个\
  \ SQL Server 实例。为此，你需要创建一个虚拟连接，并将其配置为使用存储在 `SQLServerInstance` 中的服务器名称。\n\n在连接管理器窗口中右键单击，选择“新建\
  \ OLE DB 连接”。使用你之前使用的相同服务器和安全凭据创建一个新连接（图 1-7），但这次选择 Master 作为数据库。需要说明的是，你使用相同的服务器纯粹是为了方便。实际上，只要你有足够权限登录，虚拟连接中指定的服务器并不重要，因为你输入的任何值都将在运行时被\
  \ `SQLServerInstance` 变量覆盖。然而，数据库值很重要，因为你选择的数据库*必须*存在于每个服务器上。由于 Master 是系统数据库，它是一个自然的选择。\n\
  \n单击“确定”关闭“连接管理器属性”窗口。但这个连接你还没有完成。右键单击新创建的连接并选择“属性”。将“Name”属性更改为 `DynamicSQLServerInstance`，然后单击“表达式”字段中的\
  \ `...` 图标。这将打开“属性表达式编辑器”。选择你希望动态填充的属性值——本例中是 ServerName——并在“表达式”字段中输入 `@[User::SQLServerInstance]`，如图\
  \ 1-13 所示。或者，你也可以单击“表达式”字段中的 `...` 图标来打开“表达式生成器”，如果你对表达式语法不太熟悉，这会很有帮助。\n\n![9781484200834_Fig01-13.jpg](img/9781484200834_Fig01-13.jpg)\n\
  \n**图 1-13. 属性表达式编辑器**\n\n你的连接属性现在应该类似于图 1-14 所示。\n\n![9781484200834_Fig01-14.jpg](img/9781484200834_Fig01-14.jpg)\n\
  \n**图 1-14. 动态连接属性**\n\n至此，你已经拥有了一个可重用的框架，用于遍历 SQL Server 实例列表并在每个服务器上执行*某些操作*。这本身就是一个非常有价值的设计模式。然而，由于本章是关于元数据收集的，如果我们不实际演示收集和存储元数据，那就是失职了。下一节将引导你设置两个有用的元数据提取。\n\
  \n#### 元数据收集\n\n现在你已准备好从你的服务器列表中检索元数据。但应该收集什么呢？有海量的信息可供检索，包括安全信息、使用数据、表架构快照、失败作业详情、碎片级别和性能计数器等等，不胜枚举。在第一个示例中，让我们保持简单，检索当前的数据库和日志文件大小。这些信息对于历史数据库增长和容量规划很有用。\n\
  \n为了实现这一点，你将在 Foreach 循环容器中创建数据流，以从每个服务器检索元数据并将其存储在 `dbaCentralLogging` 数据库中。数据流任务可以说是\
  \ Integration Services 中最常用的任务。它允许你在服务器之间轻松移动数据，并在必要时执行数据转换或清理。\n\n从 SSIS 工具箱中将一个数据流任务拖到\
  \ Foreach 循环容器中，并将其重命名为 `Database Size`。双击数据流任务将打开数据流设计器选项卡。请注意，一旦进入数据流设计器，工具箱中可用的对象就会改变。将\
  \ OLE DB 源图标拖到设计器 surface 上，并将其重命名为 `Dynamic SQL Source`。双击该图标以编辑其属性。\n\n在“OLE DB\
  \ 连接管理器”下拉菜单中选择 `DynamicSQLServerInstance`。将“数据访问模式”更改为“SQL 命令”，然后将清单 1-5 中的代码复制到“SQL\
  \ 命令”文本框中。\n\n##### 清单 1-5. 检索服务器上所有数据库当前数据文件和日志文件大小的 T-SQL 示例\n\n```sql\nSELECT\
  \ GETDATE() AS [captureDate]\n    , @@SERVERNAME AS [serverName]\n    , instance_name\
  \ AS [databaseName]\n    , SUM(\n        CASE\n        WHEN counter_name = 'Data\
  \ File(s) Size (KB)'\n        THEN cntr_value\n        END\n    ) AS 'dataSizeInKB'\n\
  \    , SUM(\n        CASE\n        WHEN counter_name = 'Log File(s) Size (KB)'\n\
  \        THEN cntr_value\n        END\n    ) AS 'logSizeInKB'\nFROM sys.dm_os_performance_counters\n\
  WHERE counter_name IN ('Data File(s) Size (KB)'\n    ,'Log File(s) Size (KB)')\n\
  /* optional: remove _Total to avoid accidentally\ndouble-counting in queries */\n\
  \    AND instance_name <> '_Total'\nGROUP BY instance_name;\n```\n\n此查询将产生类似以下的结果：\n\
  \n```\ncaptureDate             serverName databaseName               dataSizeInKB\
  \ logSizeInKB\n----------------------- ---------- -------------------------- ------------\
  \ -----------\n2014-06-29 19:52:21.543 LOCALHOST  _Total                     1320896\
  \      274288\n2014-06-29 19:52:21.543 LOCALHOST  AdventureWorks2012         193536\
  \       496\n2014-06-29 19:52:21.543 LOCALHOST  dbaCentralLogging          1048576\
  \      262136\n2014-06-29 19:52:21.543 LOCALHOST  master                     4096\
  \         760\n2014-06-29 19:52:21.543 LOCALHOST  model                      2112\
  \         760\n2014-06-29 19:52:21.543 LOCALHOST  msdb                       14080\
  \        760\n2014-06-29 19:52:21.543 LOCALHOST  mssqlsystemresource        40960\
  \        504\n2014-06-29 19:52:21.543 LOCALHOST  ReportServer$SQL2012       5184\
  \         7032\n2014-06-29 19:52:21.543 LOCALHOST  ReportServer$SQL2012TempDB 4160\
  \         1080\n2014-06-29 19:52:21.543 LOCALHOST  tempdb                     8192\
  \         760\n\n(10 row(s) affected)\n```\n\n你的 OLE DB 源编辑器现在应该类似于图 1-15 中的编辑器。单击“解析查询”以确保\
  \ SQL 语法正确，然后单击编辑器底部的“预览”以查看结果样本。单击“确定”退出 OLE DB 源编辑器。\n\n![9781484200834_Fig01-15.jpg](img/9781484200834_Fig01-15.jpg)\n\
  \n**图 1-15. OLE DB 源编辑器**\n\n让我们花点时间讨论一下这段代码。你正在使用 `sys.dm_os_performance_counters`\
  \ DMV（动态管理视图）来检索数据文件和日志文件大小。这个 DMV 将每个数据库的数据和日志大小分别存储在单独的行中，因此你正在对数据进行透视，为每个数据库返回一行，文件大小和日志大小位于不同的列中。需要提醒的是，DMV\
  \ 是在 SQL Server 2005 中引入的，因此此示例仅适用于 SQL Server 2005 及更高版本。\n\n\n通常，最佳实践是为这类管理查询创建存储过程，并将它们部署到每个服务器上，通常存入如\
  \ `dbaToolBox` 这样的数据库中。这会带来一些维护开销，但存储过程的好处——例如提升安全性，以及便于查看依赖关系、使用情况、性能调优和故障排查——通常远超这些开销。此外，它允许数据库管理员或开发者手动在每个服务器上执行这些相同的查询，而无需在\
  \ Integration Services 包中搜寻代码。然而，为了保持简洁，你将直接在数据流任务中输入代码。\n\n![Image](img/sq.jpg)\
  \ 提示：`sys.dm_os_performance_counters` 这个 DMV 对于数据库监控非常有用，它包含的信息远不止数据和日志文件大小。你可以轻松修改前面的代码以包含额外的性能计数器。但是，你应该知道\
  \ `cntr_type` 值有三种类型（值/基数型、每秒型、时间点型），而前面的代码仅适用于时间点型计数器 (`cntr_type = 65792`)。关于此\
  \ DMV 中可用的信息类型以及如何处理每种计数器类型，请参阅 SQL Server 联机丛书。\n\n现在你已了解查询的预期输出，你需要一个表来存储结果。在\
  \ SSMS 中，在 `dbaCentralLogging` 数据库里执行 清单 1-6 中的 T-SQL 语句。\n\n**清单 1-6**. 创建表以存储数据和日志文件大小信息的\
  \ T-SQL 代码示例\n\n```\nUSE dbaCentralLogging;\nGO\n\nCREATE TABLE dbo.dba_monitor_databaseGrowth\n\
  (\n      log_id        INT IDENTITY(1,1)\n    , captureDate   DATETIME\n    , serverName\
  \    NVARCHAR(128)\n    , databaseName  SYSNAME\n    , dataSizeInKB  BIGINT\n  \
  \  , logSizeInKB   BIGINT\n\nCONSTRAINT PK_dba_monitor_databaseGrowth\n        PRIMARY\
  \ KEY NONCLUSTERED(log_id)\n);\n\nCREATE CLUSTERED INDEX CIX_dba_monitor_databaseGrowth\n\
  \    ON dbo.dba_monitor_databaseGrowth(captureDate,serverName,databaseName);\n```\n\
  \n现在你可以返回到你的 Integration Services 包。在此数据流任务中，你不需要执行任何数据清理或数据转换，因此将直接进入存储结果的步骤。从工具箱中选择\
  \ OLE DB 目标项，将其拖放到设计图面上，并重命名为 `Central Logging 源`。通过将蓝色的数据流箭头从源拖到目标，将其连接到 OLE DB\
  \ 源。双击 OLE DB 目标会打开另一个编辑器。这次，从 OLE DB 连接管理器下拉列表中选择你的 `dbaCentralLogging` 连接。在数据访问模式下拉列表中保留“表或视图\
  \ – 快速加载”选项。在“表或视图的名称”下拉列表中，选择 `[dbo].[dba_monitor_databaseGrowth]`，如 图 1-16 所示。\n\
  \n![9781484200834_Fig01-16.jpg](img/9781484200834_Fig01-16.jpg)\n\n图 1-16. 编辑 OLE\
  \ DB 目标编辑器的连接管理器\n\n完成连接管理器页面后，点击“映射”菜单。你会注意到 Integration Services 已根据列名自动执行了初步映射。虽然这是一个节省时间的好功能，但在相同列名用于多个数据元素的环境中需要谨慎。由于\
  \ `log_id` 列是在数据插入时填充的标识值，你将在映射中忽略它。确认你的映射类似于 图 1-17 所示，然后点击“确定”返回到数据流设计器。\n\n![9781484200834_Fig01-17.jpg](img/9781484200834_Fig01-17.jpg)\n\
  \n图 1-17. 编辑 OLE DB 目标映射\n\n你的第一个数据流已完成，如 图 1-18 所示。\n\n\n\n![9781484200834_Fig01-18.jpg](img/9781484200834_Fig01-18.jpg)\n\
  \n图 1-18. 已完成的数据流任务\n\n现在，您已准备好创建第二个数据流。在“控制流”选项卡中，将现有的数据流复制并粘贴到 Foreach 循环容器中。将绿色箭头——“成功优先约束”——从“数据库大小”数据流拖动到新的数据流。将新数据流重命名为**未使用的索引**，然后双击它以返回到数据流设计器。\n\
  \n双击“动态 SQL 源”图标以编辑其属性。您需要更改 SQL 命令以使用清单 1-7 中的代码。\n\n***清单 1-7***. 检索未使用索引的 T-SQL\
  \ 查询示例\n\n```sql\n/* 创建一个变量来保存索引列表 */\nDECLARE @Indexes TABLE\n(\n     serverName\
  \      NVARCHAR(128)\n    ,schemaName      SYSNAME\n    ,schemaID        INT\n \
  \   ,databaseName    SYSNAME\n    ,databaseID      INT\n    ,tableName       SYSNAME\n\
  \    ,objectID        INT\n    ,indexName       SYSNAME\n    ,indexID         INT\n\
  \    ,indexType       NVARCHAR(60)\n    ,isPrimaryKey    BIT\n    ,isUnique    \
  \    BIT\n    ,isFiltered      BIT\n    ,isPartitioned   BIT\n    ,numberOfRows\
  \    BIGINT\n    ,totalPages      BIGINT\n);\n\n/* 遍历所有数据库 */\nINSERT INTO @Indexes\
  \ (serverName,schemaName,schemaID,databaseName,databaseID,tableName,objectID,indexName,indexID,indexType,isUnique,isPrimaryKey,isFiltered,isPartitioned,numberOfRows,totalPages)\n\
  EXECUTE sys.sp_MSforeachdb\n' USE ?;\nSELECT @@SERVERNAME\n    , SCHEMA_NAME(t.schema_id)\n\
  \    , t.schema_id\n    , DB_NAME()\n    , DB_ID()\n    , t.name\n    , t.object_id\n\
  \    , i.name\n    , i.index_id\n    , i.type_desc\n    , i.is_primary_key\n   \
  \ , i.is_unique\n    , i.has_filter\n    , CASE WHEN COUNT(p.partition_id) > 1 THEN\
  \ 1 ELSE 0 END\n    , SUM(p.rows)\n    , SUM(au.total_pages)\nFROM sys.tables  \
  \           AS t WITH (NOLOCK)\nJOIN sys.indexes            AS i WITH (NOLOCK)\n\
  \  ON i.object_id = t.object_id\nJOIN sys.partitions         AS p WITH (NOLOCK)\n\
  \  ON p.object_id = i.object_id\n  AND p.index_id = i.index_id\nJOIN sys.allocation_units\
  \   AS au WITH (NOLOCK)\n  ON au.container_id = p.partition_id\nWHERE i.index_id\
  \ <> 0 /* 排除堆 */\nGROUP BY SCHEMA_NAME(t.schema_id)\n    , t.schema_id\n    , t.name\n\
  \    , t.object_id\n    , i.name\n    , i.index_id\n    , i.type_desc\n    , i.has_filter\n\
  \    , i.is_unique\n    , i.is_primary_key;';\n\n/* 检索索引统计信息以返回到我们的中央存储库 */\nSELECT\
  \ GETDATE() AS [captureDate]\n    ,i.serverName\n    ,i.schemaName\n    ,i.databaseName\n\
  \    ,i.tableName\n    ,i.indexName\n    ,i.indexType\n    ,i.isFiltered\n    ,i.isPartitioned\n\
  \    ,i.numberOfRows\n    ,ddius.user_seeks AS [userSeeksSinceReboot]\n    ,ddius.user_scans\
  \ AS [userScansSinceReboot]\n    ,ddius.user_lookups AS [userLookupsSinceReboot]\n\
  \    ,ddius.user_updates AS [userUpdatesSinceReboot]\n    ,(i.totalPages * 8)/ 1024\
  \ AS [indexSizeInMB]/* 页大小为 8KB */\n    ,dosi.sqlserver_start_time AS [lastReboot]\n\
  FROM @Indexes AS i\nJOIN sys.dm_db_index_usage_stats AS ddius\n    ON i.databaseID\
  \ = ddius.database_id\n    AND i.objectID = ddius.object_id\n    AND i.indexID =\
  \ ddius.index_id\nCROSS APPLY sys.dm_os_sys_info AS dosi\nWHERE /* 排除系统数据库 */\n\
  \    i.databaseName NOT IN('master','msdb','tempdb','model')\n/* 排除唯一索引；假设它们服务于业务功能\
  \ */\n    AND i.isUnique = 0\n/* 排除主键；假设它们服务于业务功能 */\n    AND i.isPrimaryKey = 0\n\
  /* 自上次服务器重启以来未执行过查找操作 */\n    AND ddius.user_seeks = 0;\n```\n\n![Image](img/sq.jpg)\
  \ **提示** 清单 1-7 中的 T-SQL 只是一个起点。您可以轻松修改此查询以返回诸如哪些聚集索引可能需要重新设计、哪些表具有最多的更新以及哪些表被查询最频繁等信息。\n\
  \n输出示例如下。\n\n```\ncaptureDate             serverName schemaName databaseName   \
  \    tableName\n----------------------- ---------- ---------- ------------------\
  \ ------------------\n2014-06-29 19:37:36.927 LOCALHOST  Production AdventureWorks2012\
  \ TransactionHistory\n2014-06-29 19:37:36.927 LOCALHOST  Production AdventureWorks2012\
  \ TransactionHistory\n2014-06-29 19:37:36.927 LOCALHOST  Sales      AdventureWorks2012\
  \ SalesOrderDetail\n\nindexName                                  indexType    isFiltered\
  \ isPartitioned numberOfRows\n------------------------------------------ ------------\
  \ ---------- ------------- ------------ IX_TransactionHistory_ProductID        NONCLUSTERED\
  \ 0          0             1134431\nIX_TransactionHistory_ReferenceOrderID NONCLUSTERED\
  \ 0          0             1134431\nIX_SalesOrderDetail_ProductID          NONCLUSTERED\
  \ 0          1             1213178\n\nuserSeeksSinceReboot userScansSinceReboot\
  \ userLookupsSinceReboot userUpdatesSinceReboot\n-------------------- --------------------\
  \ ---------------------- ----------------------\n0                    0        \
  \            0                      98\n0                    8                 \
  \   0                      98\n0                    2                    0     \
  \                 124\n\nindexSizeInMB lastReboot\n------------- -----------------------\n\
  9             2014-06-28 19:15:28.837\n21            2014-06-28 19:15:28.837\n28\
  \            2014-06-28 19:15:28.837\n```\n\n如您所见，这个查询比上一个更复杂一些。让我们讨论一下您在做什么。开发人员通常非常擅长识别性能问题。为什么？因为当查询速度慢时，通常有人会抱怨！解决方法涉及创建索引的情况并不少见，这可以减少\
  \ I/O 并缩短查询时间。然而，随着时间的推移，查询可能会发生变化——导致优化器使用不同的索引——或者可能该查询不再需要。与那些备受关注的影响用户的问题不同，这类变化往往会随着时间的推移悄然累积。最终，那个最初使用时非常有益的同一索引开始消耗不必要的资源——具体来说，它会降低插入速度、消耗宝贵的磁盘空间并增大备份大小。\n\
  \n掌握未使用索引的一种方法是搜索 `sys.dm_db_index_usage_stats` DMV。此 DMV 跟踪索引使用统计信息，包括索引被查找或扫描的次数以及执行的更新次数。此信息会在每次重启后刷新，因此请注意，最近重启的服务器可能会显示不准确的高数量“未使用”索引。此外，此信息仅是起点，您可以由此进一步研究是否应删除或重新设计索引；许多组织可能拥有不常被调用但对于重要的月度或年度报告而言却必不可少的索引。\n\
  \n另一个需要注意的重要事项是，此脚本使用了未公开记录的 `sp_MSforeachdb` 存储过程。这个存储过程执行的任务非常有用：它遍历每个数据库，执行传递给它的任何命令。出于多种原因——尤其是因为它是一个未公开记录且因此不受支持的存储过程，偶尔可能会跳过数据库——我们建议对生产工作负载使用\
  \ Aaron Bertrand 的 `sp_foreachdb` 存储过程代替。然而，为了保持简单，您将在示例中使用 `sp_MSforeachdb` 过程。\n\
  \n![Image](img/sq.jpg) **提示** Aaron Bertrand 的 `sp_foreachdb` 存储过程可以在 `www.mssqltips.com/sqlservertip/2201/making-a-more-reliable-and-flexible-spmsforeachdb`\
  \ 找到。\n\n\n\n现在你对查询和预期输出有了更深入的了解，让我们回到你的包。点击 `解析查询` 以确保语法中没有任何错误，然后点击 `预览` 查看结果的示例。点击\
  \ `列` 页面以确保列列表已成功更新；然后点击 `确定` 返回数据流设计器。\n\n你现在应该会看到数据流中存在错误，如 图 1-19 所示。这是预期的，因为你已经更改了数据源提供的列，但你的目标仍然期望旧的列列表。\n\
  \n![9781484200834_Fig01-19.jpg](img/9781484200834_Fig01-19.jpg)\n\n图 1-19. 已完成的数据流任务\n\
  \n在修复此错误之前，你需要返回 SSMS 创建一个表来存储这些数据。现在请使用 清单 1-8 中的代码创建此表。\n\n#### 清单 1-8. 用于创建 dba_monitor_unusedIndexes\
  \ 表的 T-SQL 代码\n\n```sql\nUSE dbaCentralLogging;\nGO\n\nCREATE TABLE dbo.dba_monitor_unusedIndexes\n\
  (\n     log_id                    INT IDENTITY(1,1)\n    ,captureDate              \
  \ DATETIME\n    ,serverName                NVARCHAR(128)\n    ,schemaName                SYSNAME\n\
      ,databaseName              SYSNAME\n    ,tableName                 SYSNAME\n\
      ,indexName                 SYSNAME\n    ,indexType                 NVARCHAR(60)\n\
      ,isFiltered                BIT\n    ,isPartitioned             BIT\n    ,numberOfRows              BIGINT\n\
      ,userSeeksSinceReboot      BIGINT\n    ,userScansSinceReboot      BIGINT\n    ,userLookupsSinceReboot    BIGINT\n\
      ,userUpdatesSinceReboot    BIGINT\n    ,indexSizeInMB             BIGINT\n    ,lastReboot                DATETIME\n\
  \nCONSTRAINT PK_dba_monitor_unusedIndexes\n        PRIMARY KEY NONCLUSTERED(log_id)\n\
  );\n\nCREATE CLUSTERED INDEX CIX_dba_monitor_unusedIndexes\n    ON dbo.dba_monitor_unusedIndexes(captureDate);\n\
  ```\n\n返回 Visual Studio，双击 `中央日志数据库` 图标以编辑其属性。将 `表或视图的名称` 值更改为 `[dbo].[dba_monitor_unusedIndexes]`，然后点击\
  \ `映射` 页面。由于你的源和目标使用相同的列名，你可以通过右键单击 `可用输入列` 和 `可用目标列` 之间的空白区域并选择 `按匹配名称映射项目` 来轻松更新映射。图\
  \ 1-20 展示了此选项。\n\n![9781484200834_Fig01-20.jpg](img/9781484200834_Fig01-20.jpg)\n\
  \n图 1-20. `映射` 页面中的 `按匹配名称映射项目` 选项\n\n再次说明，`log_id` 列将不会映射到任何内容，因为它是一个标识列。点击 `确定`\
  \ 返回数据流设计器，然后点击 `控制流` 选项卡。\n\n看到第二个数据流进行得有多快了吗？你可以继续使用此方法轻松添加更多的元数据收集任务。剩下要做的就是在\
  \ `dba_monitor_SQLServerInstances` 表中更新你的 `LastMonitored` 列。\n\n![Image](img/sq.jpg)\
  \ **提示** 创建一个“一刀切”的包可能很诱人。然而，通常更好的做法是将元数据收集按频率要求分离到不同的包中。例如，本章收集的元数据只需要定期采样，例如每天或每周收集。需要更频繁收集的元数据，例如每小时检查失败的\
  \ SQL Server Agent 作业，应存储在单独的包中。\n\n向你的 `Foreach 循环` 容器中添加一个 `执行 SQL` 任务，并将其重命名为\
  \ `更新 LastMonitored`。将未使用索引数据流连接到 `更新 LastMonitored` `执行 SQL` 任务。双击 `执行 SQL` 任务以编辑其属性。在\
  \ `连接` 下拉菜单中选择 `dbaCentralLogging` 连接，然后在 `SQLStatement` 字段中输入 清单 1-9 中的代码。\n\n\
  #### 清单 1-9. 用于更新 dba_monitor_SQLServerInstances 中 LastMonitored 值的 T-SQL 代码\n\n\
  ```sql\nUPDATE dbo.dba_monitor_SQLServerInstances\nSET LastMonitored = GETDATE()\n\
  WHERE SQLServerInstance= ?;\n```\n\n问号 (`?`) 通知 `执行 SQL` 任务使用参数来完成 SQL 语句。现在你只需要将变量映射到参数。为此，点击\
  \ `参数映射` 页面并点击 `添加`。按如下方式编辑属性：\n\n*   变量名称 = `User::SQLServerInstance`\n*   方向 =\
  \ `输入`\n*   数据类型 = `NVARCHAR`\n*   参数名称 = `0`\n*   参数大小 = `128`\n\n确认你的映射与 图 1-21\
  \ 中所示的匹配，然后点击 `确定`。\n\n![9781484200834_Fig01-21.jpg](img/9781484200834_Fig01-21.jpg)\n\
  \n图 1-21. `执行 SQL 任务编辑器` 中的参数映射\n\n现在你已准备好执行你的包！为此，从菜单中选择 `调试` ![image](img/arrow.jpg)\
  \ `开始调试`，点击工具栏中的绿色 `运行` 图标，或按 `F5`。成功执行后，你的包应类似于 图 1-22。\n\n![9781484200834_Fig01-22.jpg](img/9781484200834_Fig01-22.jpg)\n\
  \n图 1-22. `MetadataCollection` 包的成功执行\n\n恭喜！你现在已经从服务器列表中收集了元数据，并将结果存储在一个集中式的数据库中。\n\
  \n至此，我们通过 SSIS 收集元数据的演练就结束了。然而，作为一个勤奋的开发人员或 DBA，你可能需要考虑更多的任务。首先，正如我们在本章开头所讨论的，此包不包含任何异常处理或日志记录，这超出了本章的范围。然而，最佳实践是每个包都包含某种形式的异常处理和日志记录。其次，在收集元数据方面，我们只是触及了冰山一角。还有更多信息需要考虑，例如安全审计、错误日志、SQL\
  \ Server Agent 作业状态等等。如果你不确定从哪里开始，可以考虑按关键性对元数据任务进行排序，并按重要性降序添加增量监控。作为最后一项家庭作业，你可能需要考虑设置监视器，以便在遇到不利情况时（例如\
  \ SQL Server Agent 作业失败或可用空间不足）提醒你。\n\n#### 本章小结\n\n在本章中，我们讨论了元数据的重要性。我们探讨了 SQL\
  \ Server 中存在的一些元数据，并提供了两个有用的 T-SQL 元数据查询示例。我们确定了一个非常灵活且可重用的模式，用于在企业环境中收集数据库元数据。最后，我们创建了一个\
  \ `Integration Services` 包，该包检索要监视的 SQL Server 实例列表，然后将结果记录到中央存储库。\n\n"
- "# 第 2 章\n\n![image](img/frontdot.jpg)\n\n### 执行模式\n\n要完全理解 SQL Server 2014 `Integration\
  \ Services` 的执行，你必须首先理解不同的部署模型。有两种：包部署模型和项目部署模型。每种模型都暴露并支持不同的功能。包部署模型主要支持传统功能。它是\
  \ SSIS 2005 到 SSIS 2008 R2 使用的模型。新的方式涉及项目部署模型。某些执行方法（但不是全部）对两种部署模型都可用。\n\n\n\n###\
  \ 执行 SSIS 包\n\n你可以构建出色的 SQL Server Integration Services (SSIS) 包，但除非执行它们，否则它们毫无用处！SSIS\
  \ 提供了多种执行包的方法。在本章中，我们将探讨以下内容：\n\n*   调试执行\n*   命令行执行\n*   执行包实用工具\n*   SQL Server\
  \ 2014 Integration Services\n*   Integration Services 目录\n*   Integration Services\
  \ 目录存储过程\n*   计划 SSIS 包执行\n*   执行包任务\n*   元数据驱动执行\n*   从托管代码执行\n\n我们将首先创建一个简单的 SSIS\
  \ 包用于演示。\n\n### 构建演示用的 SSIS 包\n\n创建一个名为 **Chapter2** 的新 SSIS 解决方案。重命名 SSIS 包，将名称从\
  \ `Package.dtsx` 更改为 `Chapter2.dtsx`。\n\n![Image](img/sq.jpg) **提示** *有关创建 SSIS\
  \ 解决方案和包的更多信息，请参阅 Michael Coles 和 Francis Rodrigues 所著的《Professional SQL Server\
  \ 2014 Integration Services》(Apress, 2012)*。\n\n将脚本组件拖放到控制流画布上并打开编辑器。在“脚本”页面的 `ScriptLanguage`\
  \ 属性中选择你偏好的语言。在 `ReadOnlyVariables` 中选择 `System::PackageName` 变量，然后单击“编辑脚本”按钮。\n\
  \n如果你为脚本任务的 `ScriptLanguage` 属性选择了 Microsoft Visual Basic 2010，请将 `Public Sub Main()`\
  \ 中的代码替换为以下内容：\n\n```vbnet\nPublic Sub Main()\n\nDim sPackageName As String = Dts.Variables(\"\
  PackageName\").Value.ToString\nDim sMsg As String = \"Package Name: \" & sPackageName\n\
  \nMsgBox(sMsg, , sPackageName)\n\nDts.TaskResult = ScriptResults.Success\nEnd Sub\n\
  ```\n\n如果你为脚本任务的 `ScriptLanguage` 属性选择了 Microsoft Visual C# 2010，请将 `public void\
  \ Main()` 中的代码替换为以下内容：\n\n```csharp\npublic void Main()\n{\n    string sPackageName\
  \ = Dts.Variables[\"PackageName\"].Value.ToString();\n    string sMsg = \"Package\
  \ Name: \" + sPackageName;\n\n    MessageBox.Show(sMsg, sPackageName);\n\n    Dts.TaskResult\
  \ = (int)ScriptResults.Success;\n}\n```\n\n保存包、项目和解决方案。准备运行！\n\n### 调试执行\n\n在 SQL\
  \ Server Business Intelligence Development Studio (BIDS) 内执行包非常简单。无论选择哪种部署模型，其工作方式都相同。然而，与\
  \ Visual Studio 集成开发环境 (VS IDE) 中的所有操作一样，有多种方法可以实现。\n\n当你在 BIDS 内执行 SSIS 包时，你是在调用\
  \ SSIS 调试器。SSIS 调试器文件名为 `DtsDebugHost.exe`，存储在 `<drive>:\\Program Files\\Microsoft\
  \ SQL Server\\120\\DTS\\Binn` 文件夹中。重要的是要认识到你是在调试宿主进程内执行 SSIS 包。为什么？因为调试会产生开销——那些框变色可不是免费的！\n\
  \n要在 BIDS 中执行 `Chapter2.dtsx` 包，请按 F5 键。调试宿主加载，然后加载包并执行它。你应该会看到一个显示包名的消息框。当你单击消息框上的“确定”按钮时，Chapter2\
  \ 包控制流中的脚本任务会从黄色变为绿色。“连接管理器”选项卡下方会出现一个链接，指示包执行已完成。但是，`DtsDebugHost.exe` 进程仍在执行。它会继续执行，直到\
  \ BIDS 调试器停止。\n\n以下是一些启动 BIDS 调试器的方法：\n\n*   按 F5 键。\n*   单击工具栏上的 VCR 播放按钮（指向右的绿色箭头）。\n\
  *   单击“调试”下拉菜单并选择“开始调试”。\n\n![Image](img/sq.jpg) **注意** 实际上，从“调试”下拉菜单中选择“逐语句”或“逐过程”也会启动\
  \ BIDS 调试器。\n\n*   在解决方案资源管理器中，右键单击包并从菜单中选择“执行包”。\n*   当包在调试模式下完成执行后，可以通过以下方式之一重新启动包：\n\
  \    *   按住 Ctrl+Shift 并按 F5 键\n    *   使用工具栏上的 VCR 重新启动按钮\n    *   单击“调试”下拉菜单并单击“重新启动”\n\
  \n以下是一些在包执行完成后（或任何时候需要停止调试模式）停止调试器的方法：\n\n*   按住 Shift 并按 F5 键。\n*   单击工具栏上的 VCR\
  \ 停止按钮（方块）。\n*   单击“调试”下拉菜单并选择“停止调试”。\n*   单击“调试”下拉菜单并选择“终止所有”。\n*   单击“连接管理器”选项卡下方的“包执行已完成”链接。\n\
  \n### 命令行执行\n\nSSIS 包的命令行执行使用 DTEXEC 实用工具 (`DtExec.exe`)。DTEXEC 支持项目和包部署模型。你可以通过单击“调试”下拉菜单并选择“开始执行(不调试)”（或按住\
  \ Ctrl 键并按 F5）在 BIDS 内手动调用 DTEXEC。你也可以从命令提示符手动启动 DTEXEC。\n\nDTEXEC 通常不是手动调用的。相反，通常将\
  \ DTEXEC 命令行与计划软件结合使用，在生产环境中执行 SSIS 包。例如，当你使用 SQL Server Agent 计划 SSIS 包（本章稍后介绍）时，就会实例化\
  \ DTEXEC。\n\n要使用 DTEXEC 执行 `Chapter2.dtsx` SSIS 包，请打开命令提示符并输入以下命令：\n\n```\ndtexec\
  \ /FILE \"G:\\Projects\\SSIS Design Patterns\\SSIS Design Patterns\\Chapter2.dtsx\"\
  \n```\n\n此命令执行位于 `G:\\Projects\\SSIS Design Patterns\\SSIS Design Patterns` 文件夹中的\
  \ `Chapter2.dtsx` SSIS 包。如果你跟着做，请编辑命令行以反映你的 SSIS 包的位置。\n\n当你从命令行执行包时，消息框会显示包名——就像从\
  \ BIDS 调试器内执行包时一样。\n\n如果 SSIS 包已部署到新的 SSIS 目录，你仍然可以使用类似以下的命令从命令行执行它：\n\n```\ndtexec.exe\
  \ /ISSERVER \"\\\"\\SSISDB\\Chapter2\\Chapter2\\Chapter2.dtsx\\\"\" /SERVER \"\\\
  \"SSISMVP-RC0\\\"\" /Par \"\\\"$ServerOption::SYNCHRONIZED(Boolean)\\\"\";True /REPORTING\
  \ E /CALLERINFO Andy\n```\n\n### 执行包实用工具\n\n执行包实用工具 (DtExecUI) 在其自身进程中运行并执行 SSIS\
  \ 包。我喜欢使用执行包实用工具来构建 DTEXEC 命令行，但它仅支持包部署模型。你至少可以通过三种方式调用执行包实用工具：\n\n*   单击“开始” ![image](img/arrow.jpg)\
  \ “所有程序” ![image](img/arrow.jpg) “Microsoft SQL Server” ![image](img/arrow.jpg)\
  \ “Integration Services” ![image](img/arrow.jpg) “执行包实用工具”。\n*   单击“开始” ![image](img/arrow.jpg)\
  \ “运行”，在“打开”文本框中键入 **dtexecui**。\n*   双击一个 dtsx 文件（如果你没有为 dtsx 文件重新映射默认应用程序设置）。\n\
  \n我最喜欢的选项是双击 dtsx 文件。这不仅会打开执行包实用工具，还会将“常规”页的设置设置为指示包源是文件系统，并使用双击的 dtsx 文件的完整路径配置“包路径”文本框。很棒。\n\
  \n如果我使用执行包实用工具执行 `Package2.dtsx`，将显示“包执行进度”表单，通知我包的执行进度（多么贴切），并且消息框会出现，就像我使用 BIDS\
  \ 调试器和命令行执行时一样。\n\n![Image](img/sq.jpg) **注意** *有关执行包实用工具的更多信息，请参阅 Michael Coles\
  \ 和 Francis Rodrigues 所著的《Professional SQL Server 11 Integration Services》(Apress,\
  \ 2012)*。\n\n### SQL Server 2014 Integration Services 服务\n\n\n\n### SQL Server Integration\
  \ Services 11.0 服务\n\nSQL Server Integration Services 11.0 服务随 SQL Server 2014 一起安装。要连接，请打开\
  \ SQL Server Management Studio (`SSMS`)。如果在 `SSMS` 启动时出现 `连接到服务器` 窗口提示连接，请确保将 `服务器类型`\
  \ 设置为 `Integration Services`。在 `服务器名称` 下拉框中输入服务器名称。请注意，SSIS 没有命名实例：每个服务器只有一个实例（至少目前如此）。你也可以输入\
  \ `localhost` 来连接本地服务器的默认 SSIS 实例。\n\n配置好连接后，单击 `连接` 按钮。导航到你希望执行的包。存储在文件系统或 `MSDB`\
  \ 数据库中的 SSIS 包可以通过 SSIS 2014 服务执行。\n\nSQL Server 2014 提供了一种管理 Integration Services\
  \ 包的新方法：Integration Services 目录。我们接下来将探讨这种方法。\n\n### Integration Services 目录\n\n\
  你只能在 Integration Services 目录中管理使用项目部署模型的 SSIS 项目。要在目录中执行包，请使用 `SSMS` 连接到托管 `SSISDB`\
  \ 数据库的 SQL Server 实例。展开 `Integration Services 目录` 节点，然后展开 `SSISDB` 节点。深入包含 SSIS\
  \ 项目和包的文件夹。右键单击你希望执行的包，然后单击 `执行`，如 图 2-1 所示。\n\n![9781484200834_Fig02-01.jpg](img/9781484200834_Fig02-01.jpg)\n\
  \n图 2-1. 执行已部署到 SSIS 目录的 SSIS 包\n\n`执行包` 窗口将显示，如 图 2-2 所示。它允许你为此存储在 SSIS 目录中的 SSIS\
  \ 包的此执行实例覆盖参数值、设计时构建的连接管理器的 `ConnectionString` 属性，或任何其他可通过包路径访问的可外部化属性（通过 `高级` 选项卡）。\n\
  \n![9781484200834_Fig02-02.jpg](img/9781484200834_Fig02-02.jpg)\n\n图 2-2. 执行包窗口\n\
  \n### Integration Server 目录存储过程\n\n请注意 图 2-2 中 `参数` 选项卡上方的 `脚本` 按钮。此按钮允许你生成将执行 SSIS\
  \ 包的 Transact-SQL (`T-SQL`) 语句。对于存储在 SSIS 目录中的 `Chapter2.dtsx` 包，脚本将类似于 清单 2-1 中的那些。\n\
  \n`清单 2-1`. 从执行包窗口生成的 T-SQL 脚本\n\n```sql\nDeclare @execution_id bigint\nEXEC [SSISDB].[catalog].[create_execution]\n\
  \   @package_name=N'Chapter2.dtsx'\n  ,@execution_id=@execution_id OUTPUT\n  ,@folder_name=N'Chapter2'\n\
  \  ,@project_name=N'Chapter2'\n  ,@use32bitruntime=False\n  ,@reference_id=Null\n\
  Select @execution_id\nDECLARE @var0 smallint = 1\nEXEC [SSISDB].[catalog].[set_execution_parameter_value]\n\
  \   @execution_id\n  ,@object_type=50\n  ,@parameter_name=N'LOGGING_LEVEL'\n  ,@parameter_value=@var0\n\
  EXEC [SSISDB].[catalog].[start_execution] @execution_id\nGO\n```\n\n你可以使用这些相同的存储过程来执行\
  \ SSIS 目录中的 SSIS 包！事实上，我设计了一个脚本来创建一个包装器存储过程，该过程将调用在 SSIS 目录中执行 SSIS 包时执行的 `T-SQL`\
  \ 语句。你可以在 清单 2-2 中看到该脚本。\n\n`清单 2-2`. 用于构建在 SSIS 目录中执行 SSIS 包的包装器存储过程的脚本\n\n```sql\n\
  \ /* Select the SSISDB database */\nUse SSISDB\nGo\n\n/* Create a parameter (variable)\
  \ named @Sql */\nDeclare @Sql varchar(2000)\n\n/* Create the Custom schema if it\
  \ does not already exist */\nprint 'Custom Schema'\nIf Not Exists(Select name\n\
  \              From sys.schemas\n                Where name = 'custom')\n begin\n\
  \   /* Create Schema statements must occur first in a batch */\n  print ' - Creating\
  \ custom schema'\n  Set @Sql = 'Create Schema custom'\n  Exec(@Sql)\n  print ' -\
  \ Custom schema created'\n end\nElse\n print ' - Custom Schema already exists.'\n\
  print ''\n\n/* Drop the Custom.execute_catalog_package Stored Procedure if it already\
  \ exists */\nprint 'Custom.execute_catalog_package Stored Procedure'\n  If Exists(Select\
  \ s.name + '.' + p.name\n            From sys.procedures p\n            Join sys.schemas\
  \ s\n                On s.schema_id = p.schema_id\n         Where s.name = 'custom'\n\
  \           And p.name = 'execute_catalog_package')\n   begin\n    print ' - Dropping\
  \ custom.execute_catalog_package'\n    Drop Procedure custom.execute_catalog_package\n\
  \    print ' - Custom.execute_catalog_package dropped'\n   end\n\n/* Create the\
  \ Custom.execute_catalog_package Stored Procedure */\n  print ' - Creating custom.execute_catalog_package'\n\
  go\n\n/*\n\nStored Procedure: custom.execute_catalog_package\n     Author: Andy\
  \ Leonard\n     Date: 4 Mar 2012\n     Description: Creates a wrapper around the\
  \ SSISDB Catalog procedures\n                  used to start executing an SSIS Package.\
  \ Packages in the\n                SSIS Catalog are referenced by a multi-part identifier\n\
  \                 - or path - that consists of the following hierarchy:\n      \
  \  Catalog Name: Implied by the database name in Integration Server 2014\n     \
  \   |-Folder Name: A folder created before or at Deployment to contain the SSIS\
  \ project\n        |-Project Name: The name of the SSIS Project deployed\n     \
  \   |-Package Name: The name(s) of the SSIS Package(s) deployed\n\nParameters:\n\
  \        @FolderName [nvarchar(128)] {No default} –\n         contains the name\
  \ of the Folder that holds the SSIS Project\n        @ProjectName [nvarchar(128)]\
  \ {No default} –\n         contains the name of the SSIS Project that holds the\
  \ SSIS Package\n        @PackageName [nvarchar(260)] {No default} –\n         contains\
  \ the name of the SSIS Package to be executed\n        @ExecutionID [bigint] {Output}\
  \ –\n         Output parameter (variable) passed back to the caller\n        @LoggingLevel\
  \ [varchar(16)] {Default} –\n         contains the (case-insensitive) name of the\
  \ logging level\n         to apply to this execution instance\n        @Use32BitRunTime\
  \ [bit] {Default} –\n         1 == Use 64-bit run-time\n                       \
  \                           0 == Use 32-bit run-time\n        @ReferenceID [bigint]\
  \ {Default} –reference to Execution Environment\n        @ObjectType [smallint]\
  \ –identifier related to PackageType property\n        Guessing: @ObjectType ==\
  \ PackageType.ordinal (1-based-array) * 10\n         Must be 20, 30, or 50 for catalog.set_execution_parameter_value\n\
  \         stored procedure\n\nTest:\n        1. Create and deploy an SSIS Package\
  \ to the SSIS Catalog.\n        2. Exec custom.execute_catalog_package and pass\
  \ it the\n          following parameters: @FolderName, @ProjectName, @PackageName,\
  \ @ExecutionID Output\n        @LoggingLevel, @Use32BitRunTime, @ReferenceID, and\
  \ @ObjectType are optional and\n        defaulted parameters.\n\nExample:\n    \
  \       Declare @ExecId bigint\n           Exec custom.execute_catalog_package\n\
  \         'Chapter2'\n        ,'Chapter2'\n        ,'Chapter2.dtsx'\n        ,@ExecId\
  \ Output\n        3. When execution completes, an Execution_Id value should be returned.\n\
  \        View the SSIS Catalog Reports to determine the status of the execution\n\
  \        instance and the test.\n\n*/\nCreate Procedure custom.execute_catalog_package\n\
  \  @FolderName nvarchar(128)\n ,@ProjectName nvarchar(128)\n ,@PackageName nvarchar(260)\n\
  \ ,@ExecutionID bigint Output\n ,@LoggingLevel varchar(16) = 'Basic'\n ,@Use32BitRunTime\
  \ bit = 0\n ,@ReferenceID bigint = NULL\n ,@ObjectType smallint = 50\nAs\n\nbegin\n\
  \nSet NoCount ON\n```\n\n### 在 SSIS Catalog 中执行 SSIS 包\n\n以下 T-SQL 代码片段演示了如何在 SSIS\
  \ Catalog 中初始化并执行一个 SSIS 包。\n\n```sql\n/* Call the catalog.create_execution stored\
  \ procedure\n      to initialize execution location and parameters */\n  Exec catalog.create_execution\n\
  \   @package_name = @PackageName\n  ,@execution_id = @ExecutionID Output\n  ,@folder_name\
  \ = @FolderName\n  ,@project_name = @ProjectName\n  ,@use32bitruntime = @Use32BitRunTime\n\
  \  ,@reference_id = @ReferenceID\n\n/* Populate the @ExecutionID parameter for OUTPUT\
  \ */\n  Select @ExecutionID As Execution_Id\n\n/* Create a parameter (variable)\
  \ named @Sql */\n  Declare @logging_level smallint\n   /* Decode the Logging Level\
  \ */\n  Select @logging_level = Case\n                           When Upper(@LoggingLevel)\
  \ = 'BASIC'\n                           Then 1\n                           When\
  \ Upper(@LoggingLevel) = 'PERFORMANCE'\n                           Then 2\n    \
  \                        When Upper(@LoggingLevel) = 'VERBOSE'\n               \
  \            Then 3\n                           Else 0 /* 'None' */\n          \
  \                End\n   /* Call the catalog.set_execution_parameter_value stored\n\
  \      procedure to update the LOGGING_LEVEL parameter */\n  Exec catalog.set_execution_parameter_value\n\
  \    @ExecutionID\n   ,@object_type = @ObjectType\n   ,@parameter_name = N'LOGGING_LEVEL'\n\
  \   ,@parameter_value = @logging_level\n\n/* Call the catalog.start_execution (self-explanatory)\
  \ */\n  Exec catalog.start_execution\n    @ExecutionID\n\nend\n\nGO\n```\n\n如果执行此脚本在您的\
  \ SSISDB 数据库实例中创建自定义架构和存储过程，可以使用 **清单 2-3** 中的语句进行测试。\n\n**清单 2-3**. 测试 `SSISDB.custom.execute_catalog_package`\
  \ 存储过程\n\n```sql\nDeclare @ExecId bigint\nExec SSISDB.custom.execute_catalog_package\
  \ 'Chapter2','Chapter2','Chapter2.dtsx',\n@ExecId Output\n```\n\n### 添加数据捕获\n\n\
  `SSISDB.custom.execute_catalog_package` 存储过程可以通过稍作修改来创建一个*数据捕获*功能——这是 SSIS 2014\
  \ 中针对从 SSISDB 目录执行的包引入的一项新特性。向存储过程添加一些参数和 T-SQL，允许其执行 SSIS 包并导出一个逗号分隔值 (CSV) 文件，该文件包含流经数据流任务中某个点的部分或全部行。数据捕获为监控数据在\
  \ SSIS 数据流中的移动状态提供了一个急需的窗口，有助于在生产环境中进行根本原因分析和故障排除，而无需更改包代码。数据捕获是 Integration Services\
  \ 2014 最重要的增强功能之一。Listing 2-4 包含了构建 `SSISDB.custom.execute_catalog_package_with_data_tap`\
  \ 的脚本：\n\n**清单 2-4**. 用于构建在 SSIS 目录中执行 SSIS 包的包装器存储过程的脚本\n\n```sql\n/* Select the\
  \ SSISDB database */\nUse SSISDB\nGo\n\n/* Create a parameter (variable) named @Sql\
  \ */\nDeclare @Sql varchar(2000)\n\n/* Create the Custom schema if it does not already\
  \ exist */\nprint 'Custom Schema'\nIf Not Exists(Select name\n              From\
  \ sys.schemas\nWhere name = 'custom')\n begin\n   /* Create Schema statements must\
  \ occur first in a batch */\n  print ' - Creating custom schema'\n  Set @Sql = 'Create\
  \ Schema custom'\n  Exec(@Sql)\n  print ' - Custom schema created'\n end\nElse\n\
  \ print ' - Custom Schema already exists.'\nprint ''\n\n/* Drop the Custom.execute_catalog_package_with_data_tap\n\
  \ Stored Procedure if it already exists */\nprint 'Custom.execute_catalog_package_with_data_tap\
  \ Stored Procedure'\n  If Exists(Select s.name + '.' +  p.name\n            From\
  \ sys.procedures p\n            Join sys.schemas s\n                On s.schema_id\
  \ = p.schema_id\n        Where s.name = 'custom'\n           And p.name = 'execute_catalog_package_with_data_tap')\n\
  \   begin\n    print ' - Dropping custom.execute_catalog_package_with_data_tap'\n\
  \    Drop Procedure custom.execute_catalog_package_with_data_tap\n    print ' -\
  \ Custom.execute_catalog_package_with_data_tap dropped'\n   end\n\n/* Create the\
  \ Custom.execute_catalog_package_with_data_tap Stored Procedure */\n  print ' -\
  \ Creating custom.execute_catalog_package_with_data_tap'\ngo\n\n/*\n\nStored Procedure:\
  \ custom.execute_catalog_package_with_data_tap\n  Author: Andy Leonard\n  Date:\
  \ 4 Apr 2012\n  Description: Creates a wrapper around the SSISDB Catalog procedures\n\
  \               used to start executing an SSIS Package and create a\n         \
  \      data tap. Packages in the\n               SSIS Catalog are referenced by\
  \ a multi-part identifier\n               - or path - that consists of the following\
  \ hierarchy:\n  Catalog Name: Implied by the database name in Integration Server\
  \ 2014\n  |-Folder Name: A folder created before or at Deployment to contain the\
  \ SSIS project\n    |-Project Name: The name of the SSIS Project deployed\n    \
  \  |-Package Name: The name(s) of the SSIS Package(s) deployed\n  Parameters:\n\
  \   @FolderName [nvarchar(128)] {No default} - contains the name of the\n     Folder\
  \ that holds the SSIS Project\n   @ProjectName [nvarchar(128)] {No default} - contains\
  \ the name of the\n    SSIS Project that holds the SSIS Package\n   @PackageName\
  \ [nvarchar(260)] {No default} - contains the name of the\n    SSIS Package to be\
  \ executed\n   @ExecutionID [bigint] {Output} - Output parameter (variable) passed\
  \ back\n    to the caller\n   @LoggingLevel [varchar(16)] {Default} - contains the\
  \ (case-insensitive)\n    name of the logging level to apply to this execution instance\n\
  \   @Use32BitRunTime [bit] {Default} - 1 == Use 64-bit run-time\n              \
  \                        0 == Use 32-bit run-time\n   @ReferenceID [bigint] {Default}\
  \ - contains a reference to an Execution Environment\n   @ObjectType [smallint]\
  \ - contains an identifier that appears to be related\n    to the SSIS PackageType\
  \ property\n\nGuessing: @ObjectType == PackageType.ordinal (1-based-array) * 10\n\
  \    Must be 20, 30, or 50 for catalog.set_execution_parameter_value\n     stored\
  \ procedure\n  @DataFlowTaskName [nvarchar(255)] - contains the name of the Data\
  \ Flow Task in which to\n   to apply the data tap.\n  @IdentificationString [nvarchar(255)]\
  \ - contains the Data Flow Path Identification string\n   in which to apply the\
  \ data tap.\n  @DataTapFileName [nvarchar(4000)] - contains the name of the file\
  \ to create to contain\n   the rows captured from the data tap.\n   Saved in the\
  \ <drive>:\\Program Files\\Microsoft SQL Server\\120\\DTS\\DataDumps folder.\n \
  \ @DataTapMaxRows [int] - contains the maximum number of rows to send to the data\
  \ tap file.\n\nTest:\n  1. Create and deploy an SSIS Package to the SSIS Catalog.\n\
  \  2. Exec custom.execute_catalog_package_with_data_tap and pass it the\n     following\
  \ parameters: @FolderName, @ProjectName, @PackageName,\n     @DataFlowTaskName,\
  \ @IdentificationString, @DataTapFileName,\n     @ExecutionID Output\n  @LoggingLevel,\
  \ @Use32BitRunTime, @ReferenceID, @ObjectType,\n   and @DataTapMaxRows are optional\
  \ and defaulted parameters.\n\nExample:\n  Declare @ExecId bigint\n  Exec custom.execute_catalog_package_with_data_tap\n\
  \   'SSISConfig2014','SSISConfig2014','Child1.dtsx',\n   'Data Flow Task', 'OLESRC\
  \ Temperature.OLE DB Source Output',\n   'Child1_DataFlowTask_OLESRCTemperature_OLEDBSourceOutput.csv',@ExecId\
  \ Output\n\n3. When execution completes, an Execution_Id value should be returned.\n\
  \     View the SSIS Catalog Reports to determine the status of the\n     execution\
  \ instance and the test.\n\n*/\nCreate Procedure [custom].[execute_catalog_package_with_data_tap]\n\
  \  @FolderName nvarchar(128)\n ,@ProjectName nvarchar(128)\n ,@PackageName nvarchar(260)\n\
  \ ,@DataFlowTaskName nvarchar(255)\n ,@IdentificationString nvarchar(255)\n ,@DataTapFileName\
  \ nvarchar(4000)\n ,@ExecutionID bigint Output\n ,@LoggingLevel varchar(16) = 'Basic'\n\
  \ ,@Use32BitRunTime bit = 0\n ,@ReferenceID bigint = NULL\n ,@ObjectType smallint\
  \ = 50\n ,@DataTapMaxRows int = NULL\nAs\n\nbegin\n\nSet NoCount ON\n```\n\n/* 调用\
  \ `catalog.create_execution` 存储过程\n      以初始化执行位置和参数 */\n  执行 `catalog.create_execution`\n\
  \   `@package_name` = `@PackageName`\n  ,`@execution_id` = `@ExecutionID` 输出\n \
  \ ,`@folder_name` = `@FolderName`\n  ,`@project_name` = `@ProjectName`\n  ,`@use32bitruntime`\
  \ = `@Use32BitRunTime`\n  ,`@reference_id` = `@ReferenceID`\n\n/* 填充用于输出的 `@ExecutionID`\
  \ 参数 */\n  选择 `@ExecutionID` 作为 Execution_Id\n\n/* 配置数据钩子参数 */\n  如果 (左侧(`@DataFlowTaskName`,\
  \ 9) <> '\\Package\\')\n   设置 `@DataFlowTaskName` = '\\Package\\' + `@DataFlowTaskName`\n\
  \n如果 左侧(`@IdentificationString`,6) <> 'Paths['\n   设置 `@IdentificationString` =\
  \ 'Paths[' + `@IdentificationString` + ']'\n\n/* 创建数据钩子 */\n  执行 `[SSISDB].[catalog].add_data_tap`\
  \ `@ExecutionID`, `@DataFlowTaskName`,\n   `@IdentificationString`, `@DataTapFileName`,\
  \ `@DataTapMaxRows`\n\n/* 创建一个名为 `@Sql` 的参数（变量） */\n  声明 `@logging_level` smallint\n\
  \   /* 解码日志记录级别 */\n  选择 `@logging_level` = 情况\n                           当 上层(`@LoggingLevel`)\
  \ = 'BASIC'\n                                           则 1\n                  \
  \                         当 上层(`@LoggingLevel`) = 'PERFORMANCE'\n              \
  \                             则 2\n                                            当\
  \ 上层(`@LoggingLevel`) = 'VERBOSE'\n                                           则\
  \ 3\n                                           否则 0 /* '无' '\n                \
  \                          结束\n   /* 调用 `catalog.set_execution_parameter_value`\
  \ 存储\n      过程以更新 `LOGGING_LEVEL` 参数 */\n  执行 `catalog.set_execution_parameter_value`\n\
  \    `@ExecutionID`\n   ,`@object_type` = `@ObjectType`\n   ,`@parameter_name` =\
  \ N'LOGGING_LEVEL'\n   ,`@parameter_value` = `@logging_level`\n\n/* 调用 `catalog.start_execution`（不言自明）\
  \ */\n  执行 `catalog.start_execution`\n    `@ExecutionID`\n\n结束\n```\n\n### 测试数据钩子存储过程\n\
  \n在开始此练习之前，请访问 `http://andyweather.com/data/WeatherData_Dec08.zip` 以获取一些真实世界温度和湿度的天气数据，这些数据收集自我位于弗吉尼亚州法姆维尔的气象站。压缩文件（`WeatherData_Dec08.zip`）包含一个名为\
  \ `sensor1-all.csv` 的 CSV 文件。该文件位于两层文件夹之下，路径为 `Dec08\\TH\\sensor1-all.csv`。解压缩该文件并将其存储在您的文件系统中。我更倾向于将与测试项目相关的数据存储在\
  \ SSIS 解决方案目录中一个名为 `Data` 的文件夹内。只要您记得文件存放的位置，具体存放在哪里并不重要。\n\n向 Chapter2 项目添加一个新的\
  \ SSIS 包，并将其重命名为 `DataTapTest.dtsx`。将一个数据流任务拖到控制流上，并将其重命名为 `DFT 加载温度数据`。打开数据流编辑器（选项卡），并将一个平面文件源适配器拖到设计图面上。将平面文件源适配器重命名为\
  \ `FFSrc 温度`。打开平面文件源适配器编辑器，单击平面文件连接管理器下拉列表右侧的 `新建` 按钮。单击 `新建` 按钮会为您做几件事：\n\n1. \
  \ 它创建一个新的平面文件连接管理器。\n2.  它打开新的平面文件连接管理器编辑器。\n\n将平面文件连接管理器的名称设置为 `FFCM 温度`。单击 `浏览`\
  \ 按钮，并导航到包含 `sensor1-all.csv` 文件的文件夹（记得在 `打开` 对话框中将扩展名筛选器从 `*.txt` 更改为 `*.csv`）。选择\
  \ `sensor1-all.csv` 文件，然后单击 `打开` 对话框上的 `确定` 按钮，因为在此演示中，我们接受平面文件连接管理器的默认设置。单击 `确定`\
  \ 按钮关闭平面文件源适配器编辑器。\n\n在继续之前，打开 SQL Server Management Studio (SSMS)，连接到 SQL Server\
  \ 2014 实例，并创建一个名为 `TestDB` 的数据库。\n\n返回到 SQL Server Data Tools - Business Intelligence\
  \ (SSDT-BI)，并将一个 OLE DB 目标适配器拖到数据流任务设计图面上。将 OLE DB 目标适配器重命名为 `OLEDBDest 温度暂存区`，并在\
  \ `FFSrc 温度` 平面文件源适配器和 `OLEDBDest 温度暂存区` OLE DB 目标适配器之间连接一条数据流路径（蓝色箭头）。打开 `OLEDBDest\
  \ 温度暂存区` OLE DB 目标适配器编辑器，并单击 OLE DB 连接管理器下拉列表右侧的 `新建` 按钮，以创建一个新的 OLE DB 连接管理器并打开其编辑器。当\
  \ `配置 OLE DB 连接管理器` 窗口显示时，单击 `新建` 按钮以打开 `连接管理器编辑器` 窗口。输入服务器名称和用户登录凭据，然后在 `选择或输入数据库名称`\
  \ 下拉列表中输入或选择 `TestDB` 数据库。关闭编辑器和 `配置 OLE DB 连接管理器` 窗口以返回到 `OLEDBDest 温度暂存区` OLE\
  \ DB 目标适配器。\n\n在 `OLEDBDest 温度暂存区` OLE DB 目标适配器中，单击 `表或视图的名称` 下拉列表右侧的 `新建` 按钮。修改\
  \ `创建表` 窗口中的内容，使其与 清单 2-5 中的数据定义语言 (DDL) 语句相匹配。\n\n#### 清单 2-5. 用于目标的数据定义语言 (DDL)\
  \ 创建表语句\n\n```sql\n创建表 [温度暂存区] (\n    [日期] varchar(50),\n    [时间] varchar(50),\n\
  \    [最低温度] varchar(50),\n    [最高温度] varchar(50),\n    [平均温度] varchar(50),\n   \
  \ [最低湿度] varchar(50),\n    [最高湿度] varchar(50),\n    [平均湿度] varchar(50),\n    [舒适区]\
  \ varchar(50),\n    [最低露点] varchar(50),\n    [最高露点] varchar(50),\n    [平均露点] varchar(50),\n\
  \    [最低体感温度] varchar(50),\n    [最高体感温度] varchar(50),\n    [平均体感温度] varchar(50)\n\
  )\n```\n\n此语句通过移除表名中的 `OLEDBDest` 前缀以及移除列名中的空格来修改提供的语句。单击 `确定` 按钮创建表并关闭 `创建表` 窗口。单击\
  \ `映射` 页，并将可用的输入列映射到其匹配的可用目标列。关闭 `OLEDBDest 温度暂存区` OLE DB 目标适配器编辑器。\n\n双击数据流路径以打开其编辑器。从\
  \ `常规` 页，复制 `IdentificationString` 属性值。`IdentificationString` 属性应为 `Paths[FFSrc\
  \ 温度.平面文件源输出]`。我们需要此值以及数据流任务的 `PackagePath` 属性值（`Package\\DFT 加载温度数据`）来执行带有数据钩子的此包。\n\
  \n首先，保存 SSIS 包并将其部署到目录。接下来，执行 清单 2-6 中的语句以执行带有数据钩子的 SSIS 包。\n\n#### 清单 2-6. 使用数据钩子执行\
  \ SSIS 包\n\n```sql\n声明 @ExecId bigint\n执行 SSISDB.custom.execute_catalog_package_with_Data_tap\n\
  \ @文件夹名 = 'Chapter2'\n,@项目名 = 'Chapter2'\n,@包名 = 'DataTapTest.dtsx'\n,@数据流任务名 =\
  \ '\\Package\\DFT 加载温度数据'\n,@标识字符串 = 'Paths[FFSrc 温度.平面文件源输出]'\n,@数据钩子文件名 = 'TemperatureRows.csv'\n\
  ,@执行 ID = @ExecId 输出\n,@数据钩子最大行数 = 25\n```\n\n一旦包执行完成（并且您可以在 `TestDB.dbo.温度暂存区`\
  \ 表中测试行数），您应该在 `<驱动器>:\\Program Files\\Microsoft SQL Server\\120\\DTS\\DataDumps`\
  \ 目录中找到一个名为 `TemperatureRows.csv` 的 CSV 文件，并且该文件应包含流经 `DataTapTest.dtsx` SSIS 包中\
  \ `DFT 加载温度数据` 任务内 `FFSrc 温度.平面文件源输出` 数据流路径的前 25 行数据。\n\n### 创建自定义执行框架\n\n\nSSIS\
  \ 执行框架支持可重复且可靠的 SSIS 包执行。`SSISDB.custom.execute_catalog_package` 存储过程可用作此 SSIS 执行框架的核心。若要创建支持该框架的表，请执行列表\
  \ 2-7 中的语句。\n\n### 列表 2-7. 支持自定义 SSIS 执行框架的表\n\n```sql\n/* Switch to SSISDB database\
  \ */\nUse SSISDB\nGo\n\n/* Build custom Schema */\nprint 'Custom Schema'\n/* Check\
  \ for existence of custom Schema */\nIf Not Exists(Select name\n              From\
  \ sys.schemas\n                         Where name = 'custom')\n begin\n  /* Build\
  \ and execute custom Schema SQL\n     if it does not exist */\n  print ' - Creating\
  \ custom schema'\n  declare @CustomSchemaSql varchar(32) = 'Create Schema custom'\n\
  \  exec(@CustomSchemaSql)\n  print ' - Custom schema created'\n end\nElse\n  /*\
  \ If the custom schema exists, tell us */\n print ' - Custom schema already exists.'\n\
  \ print ''\nGo\n\n/* Build custom.Application table */\nprint 'Custom.Application\
  \ Table'\n/* Check for existence of custom.Application table */\nIf Not Exists(Select\
  \ s.name + '.' + t.name\n              From sys.tables t\n                     \
  \    Join sys.schemas s\n                           On s.schema_id = t.schema_id\n\
  \                         Where s.name = 'custom'\n                           And\
  \ t.name = 'Application')\n begin\n  /* Create custom.Application table\n     if\
  \ it does not exist */\n  print ' - Creating custom.Application Table'\n  Create\
  \ Table custom.Application\n  (\n    ApplicationID int identity(1,1)\n         Constraint\
  \ PK_custom_Application Primary Key Clustered\n   ,ApplicationName nvarchar(256)\
  \ Not Null\n     Constraint U_custom_ApplicationName Unique\n   ,ApplicationDescription\
  \ nvarchar(512) Null\n  )\n  print ' - Custom.Application Table created'\n end\n\
  Else\n  /* If the custom.Application table exists, tell us */\n print ' - Custom.Application\
  \ Table already exists.'\nprint ''\n\n/* Build custom.Package table */\nprint 'Custom.Package\
  \ Table'\n/* Check for existence of custom.Package table */\nIf Not Exists(Select\
  \ s.name + '.' + t.name\n              From sys.tables t\n                     \
  \    Join sys.schemas s\n                           On s.schema_id = t.schema_id\n\
  \                         Where s.name = 'custom'\n                           And\
  \ t.name = 'Package')\n begin\n  /* Create custom.Package table\n     if it does\
  \ not exist */\n  print ' - Creating custom.Package Table'\n  Create Table custom.Package\n\
  \  (\n    PackageID int identity(1,1)\n         Constraint PK_custom_Package Primary\
  \ Key Clustered\n   ,FolderName nvarchar(128) Not Null\n   ,ProjectName nvarchar(128)\
  \ Not Null\n   ,PackageName nvarchar(256) Not Null\n   ,PackageDescription nvarchar(512)\
  \ Null\n  )\n  print ' - Custom.Package Table created'\n end\nElse\n  /* If the\
  \ custom.Package table exists, tell us */\n print ' - Custom.Package Table already\
  \ exists.'\nprint ''\n\n/* Build custom.ApplicationPackage table */\nprint 'Custom.ApplicationPackage\
  \ Table'\n/* Check for existence of custom.ApplicationPackage table */\nIf Not Exists(Select\
  \ s.name + '.' + t.name\n              From sys.tables t\n                     \
  \    Join sys.schemas s\n                           On s.schema_id = t.schema_id\n\
  \                         Where s.name = 'custom'\n                           And\
  \ t.name = 'ApplicationPackage')\n begin\n  /* Create custom.ApplicationPackage\
  \ table\n     if it does not exist */\n  print ' - Creating custom.ApplicationPackage\
  \ Table'\n  Create Table custom.ApplicationPackage\n  (\n    ApplicationPackageID\
  \ int identity(1,1)\n         Constraint PK_custom_ApplicationPackage Primary Key\
  \ Clustered\n   ,ApplicationID int Not Null\n     Constraint FK_custom_ApplicationPackage_Application\n\
  \          Foreign Key References custom.Application(ApplicationID)\n   ,PakcageID\
  \ int Not Null\n     Constraint FK_custom_ApplicationPackage_Package\n         \
  \ Foreign Key References custom.Package(PackageID)\n   ,ExecutionOrder int Not Null\n\
  \     Constraint DF_custom_ApplicationPackage_ExecutionOrder\n          Default(10)\n\
  \   ,ApplicationPackageEnabled bit Not Null\n     Constraint DF_custom_ApplicationPackage_ApplicationPackageEnabled\n\
  \          Default(1)\n  )\n  print ' - Custom.ApplicationPackage Table created'\n\
  \ end\nElse\n  /* If the custom.ApplicationPackage table exists, tell us */\n print\
  \ ' - Custom.ApplicationPackage Table already exists.'\nprint ''\n\n/* Build custom.GetApplicationPackages\
  \ stored procedure */\nprint 'Custom.GetApplicationPackages'\n/* Check for existence\
  \ of custom.GetApplicationPackages stored procedure */\nIf Exists(Select s.name\
  \ + '.' + p.name\n          From sys.procedures p\n                  Join sys.schemas\
  \ s\n                    On s.schema_id = p.schema_id\n                  Where s.name\
  \ = 'custom'\n                    And p.name = 'GetApplicationPackages')\n begin\n\
  \  /* If custom.GetApplicationPackages stored procedure\n     exists, drop it */\n\
  \  print ' - Dropping custom.GetApplicationPackages Stored Procedure'\n  Drop Procedure\
  \ custom.GetApplicationPackages\n  print ' - custom.GetApplicationPackages Stored\
  \ Procedure dropped'\n end\nprint ' - Creating custom.GetApplicationPackages Stored\
  \ Procedure'\ngo\n\n/*\n\nProcedure: custom.GetApplicationPackages\n           Author:\
  \ Andy Leonard\n Parameter(s): ApplicationName [nvarchar(256)]\n               -\
  \ contains the name of the SSIS Application\n                             for which\
  \ to retrieve SSIS Packages.\n  Description: Executes against the custom.ApplicationPackages\n\
  \                table joined to the custom.Application\n                      \
  \  and custom.Packages tables. Returns a\n                        list of enabled\
  \ Packages related to the\n                        Application ordered by ExecutionOrder.\n\
  \          Example: exec custom.GetApplicationPackages 'TestSSISApp'\n\n*/\nCreate\
  \ Procedure custom.GetApplicationPackages\n @ApplicationName nvarchar(256)\nAs\n\
  \  begin\n\nSet NoCount On\n\nSelect p.FolderName, p.ProjectName, p.PackageName,\
  \ ap.ExecutionOrder\n        From custom.ApplicationPackage ap\n        Join custom.Package\
  \ p\n          On p.PackageID = ap.PackageID\n        Join custom.Application a\n\
  \          On a.ApplicationID = ap.ApplicationID\n        Where a.ApplicationName\
  \ = @ApplicationName\n          And ap.ApplicationPackageEnabled = 1\n        Order\
  \ By ap.ExecutionOrder\n  end\ngo\nprint ' - Custom.GetApplicationPackages Stored\
  \ Procedure created.'\nprint ''\n```\n\n\n\n### 创建 SSIS 框架存储过程与包配置\n\n### 创建存储过程\n\
  \n```sql\n/* 构建 custom.AddApplication 存储过程 */\nprint 'Custom.AddApplication'\nIf\
  \ Exists(Select s.name + '.' + p.name\n          From sys.procedures p\n       \
  \           Join sys.schemas s\n                    On s.schema_id = p.schema_id\n\
  \                  Where s.name = 'custom'\n                    And p.name = 'AddApplication')\n\
  \ begin\n  /* 如果 custom.AddApplication 存储过程\n     已存在，则删除它 */\n  print ' - 正在删除\
  \ custom.AddApplication 存储过程'\n  Drop Procedure custom.AddApplication\n  print '\
  \ - custom.AddApplication 存储过程已删除'\n end\nprint ' - 正在创建 custom.AddApplication 存储过程'\n\
  go\n\n/*\n\n存储过程: custom.AddApplication\n        作者: Andy Leonard\n         参数:\
  \ ApplicationName [nvarchar(256)]\n               - 包含要添加到框架数据库的\n             \
  \                SSIS 应用程序名称。\n                   ApplicationDescription [nvarchar(512)]\n\
  \                   - 包含 SSIS 应用程序的描述。\n         描述: 存储一个 SSIS 应用程序。\n         \
  \ 示例: exec custom.AddApplication 'TestSSISApp', '一个测试 SSIS 应用程序。'\n\n*/\nCreate\
  \ Procedure custom.AddApplication\n  @ApplicationName nvarchar(256)\n ,@ApplicationDescription\
  \ nvarchar(512) = NULL\nAs\n  begin\n\nSet NoCount On\n\nInsert Into custom.Application\n\
  \        (ApplicationName\n        ,ApplicationDescription)\n        Output inserted.ApplicationID\n\
  \        Values\n        (@ApplicationName\n        ,@ApplicationDescription)\n\n\
  end\ngo\nprint ' - Custom.AddApplication 存储过程已创建。'\nprint ''\n\n/* 构建 custom.AddPackage\
  \ 存储过程 */\nprint 'Custom.AddPackage'\nIf Exists(Select s.name + '.' + p.name\n \
  \         From sys.procedures p\n                  Join sys.schemas s\n        \
  \            On s.schema_id = p.schema_id\n                  Where s.name = 'custom'\n\
  \                    And p.name = 'AddPackage')\n begin\n  /* 如果 custom.AddPackage\
  \ 存储过程\n     已存在，则删除它 */\n  print ' - 正在删除 custom.AddPackage 存储过程'\n  Drop Procedure\
  \ custom.AddPackage\n  print ' - custom.AddPackage 存储过程已删除'\n end\nprint ' - 正在创建\
  \ custom.AddPackage 存储过程'\ngo\n\n/*\n\n存储过程: custom.AddPackage\n        作者: Andy\
  \ Leonard\n        参数: FolderName [nvarchar(128)]\n               - 包含包含此 SSIS 包的\n\
  \                             SSISDB 目录文件夹名称。\n                   ProjectName [nvarchar(128)]\n\
  \               - 包含包含此 SSIS 包的\n                             SSISDB 目录项目名称。\n \
  \                  PackageName [nvarchar(128)]\n               - 包含此 SSIS 包的\n \
  \                            SSISDB 目录名称。\n                   PackageDescription\
  \ [nvarchar(512)]\n                   - 包含 SSIS 包的描述。\n        描述: 存储一个 SSIS 包。\n\
  \          示例: exec custom.AddPackage 'Chapter2', 'Chapter2'\n                 \
  \                       , 'Chapter2.dtsx', '一个测试 SSIS 包。'\n\n*/\nCreate Procedure\
  \ custom.AddPackage\n  @FolderName nvarchar(128)\n ,@ProjectName nvarchar(128)\n\
  \ ,@PackageName nvarchar(256)\n ,@PackageDescription nvarchar(512) = NULL\nAs\n\
  \  begin\n\nSet NoCount On\n\nInsert Into custom.Package\n        (FolderName\n\
  \        ,ProjectName\n        ,PackageName\n        ,PackageDescription)\n    \
  \    Output inserted.PackageID\n        Values\n        (@FolderName\n        ,@ProjectName\n\
  \        ,@PackageName\n        ,@PackageDescription)\n\nend\ngo\nprint ' - Custom.AddPackage\
  \ 存储过程已创建。'\nprint ''\n\n/* 构建 custom.AddApplicationPackage 存储过程 */\nprint 'Custom.AddApplicationPackage'\n\
  If Exists(Select s.name + '.' + p.name\n          From sys.procedures p\n      \
  \            Join sys.schemas s\n                    On s.schema_id = p.schema_id\n\
  \                  Where s.name = 'custom'\n                    And p.name = 'AddApplicationPackage')\n\
  \ begin\n  /* 如果 custom.AddApplicationPackage 存储过程\n     已存在，则删除它 */\n  print '\
  \ - 正在删除 custom.AddApplicationPackage 存储过程'\n  Drop Procedure custom.AddApplicationPackage\n\
  \  print ' - custom.AddApplicationPackage 存储过程已删除'\n end\nprint ' - 正在创建 custom.AddApplicationPackage\
  \ 存储过程'\ngo\n\n/*\n\n存储过程: custom.AddApplicationPackage\n        作者: Andy Leonard\n\
  \        参数: ApplicationID [int]\n               - 包含从执行 custom.AddApplication\n\
  \                             返回的 ID。\n                   PackageID [int]\n    \
  \           - 包含从执行 custom.AddPackage\n                             返回的 ID。\n  \
  \                 ExecutionOrder [int]\n               - 包含此包在 SSIS 应用程序中\n    \
  \                         执行的顺序。\n                   ApplicationPackageEnabled [bit]\n\
  \                   - 1 == 已启用，将作为 SSIS 应用程序的一部分运行。\n                     0 == 已禁用，不会作为\
  \ SSIS 应用程序的一部分运行。\n        描述: 将一个 SSIS 包链接到 SSIS 应用程序。\n          示例: exec custom.AddApplicationPackage\
  \ 1, 1, 10, 1\n\n*/\nCreate Procedure custom.AddApplicationPackage\n  @ApplicationID\
  \ int\n ,@PackageID int\n ,@ExecutionOrder int = 10\n ,@ApplicationPackageEnabled\
  \ bit = 1\nAs\n  begin\n\nSet NoCount On\n\nInsert Into custom.ApplicationPackage\n\
  \        (ApplicationID\n        ,PackageID\n        ,ExecutionOrder\n        ,ApplicationPackageEnabled)\n\
  \        Values\n        (@ApplicationID\n        ,@PackageID\n        ,@ExecutionOrder\n\
  \        ,@ApplicationPackageEnabled)\n\nend\ngo\nprint ' - Custom.AddApplicationPackage\
  \ 存储过程已创建。'\nprint ''\n```\n\n### 配置 SSIS 包\n\n在 Chapter2 项目中创建一个新的 SSIS 包并重命名为\
  \ `Parent.dtsx`。点击包上的 Parameters 选项卡——它是从左数第三个选项卡（Control Flow, Data Flow, Parameters）。点击\
  \ Add Parameter 按钮并创建一个名为 *ApplicationName，字符串数据类型* 的参数，默认值为 `testSSISApp`。将 `Required`\
  \ 属性设置为 `True`。\n\n添加一个 Execute SQL 任务到控制流并重命名为 `Get Packages`。打开编辑器并将 ConnectionType\
  \ 属性设置为 `ADO.NET`。在 Connection 属性下拉列表中，选择（或创建一个到）SSISDB 数据库的连接。在 SQLStatement 属性中，输入\
  \ `custom.GetApplicationPackages`。将 `IsQueryStoredProcedure` 属性设置为 `True`。将 ResultSet\
  \ 属性更改为 `Full result set`。\n\n导航到 Parameter Mapping 页面并点击 Add 按钮。点击 Variable Name\
  \ 下拉列表并选择列表最顶部的 `$Package::ApplicationName`。将 Data Type 更改为 String，将 Parameter Name\
  \ 更改为 `ApplicationName`。这将父包参数中的值映射到 `ApplicationName` 参数，该参数在 Execute SQL 任务调用\
  \ `custom.GetApplicationPackages` 存储过程时传递。\n\n导航到 Result Set 页面并点击 Add 按钮。如果 Add\
  \ 按钮是禁用的，说明你没有将 General 页面上的 ResultSet 属性从默认设置（None）更改。如果 ResultSet 设置为任何其他设置，Add\
  \ 按钮就会启用。为 Result Name 输入 `0`。在 Variable Name 下拉列表中，创建一个名为 `Packages` 的变量。对于这个变量，将\
  \ Value Type 属性设置为 `Object`。\n\n\n![Image](img/sq.jpg) 注意 `Object` 是一个有趣的数据类型。类似于变体，`Object`\
  \ 可以包含像日期或整数这样的标量。它也可以容纳一个集合或字符串数组。在这个例子中，`Object` 将包含一个 `ADO.Net Dataset` 值。如果我们将\
  \ `ConnectionType` 属性设置为 `OLEDB`（默认值），那么这个结果集变量将填充一个 `ADO Recordset`。是的，那是一个 COM\
  \ 对象——在 2014 年，COM（和 COBOL）永远不会消亡……\n\n### 回顾与设置\n\n首先，任务将使用 ADO.NET 连接到 `SSISDB`\
  \ 数据库，以执行我们之前创建的 `custom.GetApplicationPackages` 存储过程。因为我们已将 `IsQueryStoredProcedure`\
  \ 设置为 `True`，所以我们不需要为参数添加占位符或 `exec` 命令。由于我们使用了 ADO.NET，我们可以在参数映射页上通过名称而不是序数（`ApplicationName`\
  \ 而不是 `0`）来寻址参数。最后，我们配置了执行 SQL 任务，将存储过程执行的结果推送到名为 `Packages` 的对象变量中。\n\n单击“确定”按钮关闭“执行\
  \ SQL 任务编辑器”。将一个 Foreach 循环容器拖到控制流界面并打开其编辑器。在“常规”页上，将“名称”属性更改为 `Foreach Package\
  \ in Packages`。在“集合”页上，选择 `Foreach ADO Enumerator`。在 `ADO` 对象源变量下拉列表中，选择 `Packages`\
  \ 变量。将“枚举模式”默认选项保留为“第一个表中的行”。\n\n### 创建变量\n\n我听到你在想，“如果我有一个 ADO Recordset 在 `Packages`\
  \ 对象变量中，我需要做什么？” 这是一个很好的问题。答案是，“什么都不用做。” 即使对象变量可以保存 `ADO Recordsets` 和 `ADO.NET`\
  \ 数据集（以及其他集合和标量），`Foreach ADO Enumerator` 也足够智能，能够*检测* SSIS 对象变量内部对象的类型——然后读取它。这不是很酷吗？我也这么认为。\n\
  \n导航到“变量映射”页。在包作用域创建四个变量。这些变量与从 `custom.GetApplicationPackages` 存储过程返回的字段相匹配；并且随后加载到\
  \ `ADO.NET` 数据集的第一个表中，该数据集现在位于 `Packages` SSIS 变量内。如果你没理解那句话，请重读一遍（我会等你）。虽然内容很多，但理解我们在这里做什么至关重要。明白了吗？很好。\n\
  \n我将按照我偏好的变量创建方法，引导你创建下面列出的第一个变量。单击“变量”下拉列表并选择列表最顶部的“新建变量...”。当“添加变量”窗口显示时，确保“容器”属性设置为\
  \ `Parent`（包的名称）。这确保了变量具有包作用域。在“名称”文本框中输入 `FolderName`。单击“确定”按钮，然后将“索引”属性更改为 `0`。将“值类型”属性保留为\
  \ `String`。我几乎总是以这种方式创建 SSIS 变量。这样我对作用域有更多控制，并且我是在变量将被使用的地方创建和配置它。此功能节省时间，简直太棒了。\n\
  \n按以下顺序创建变量：\n\n```\nContainer: Parent\nName: FolderName\nNamespace: User\nValue\
  \ Type: String\nValue:\n\nContainer: Parent\nName: ProjectName\nNamespace: User\n\
  Value Type: String\nValue:\n\nContainer: Parent\nName: ChildPackageName\nNamespace:\
  \ User\nValue Type: String\nValue:\n\nContainer: Parent\nName: ExecutionOrder\n\
  Namespace: User\nValue Type: Int32\nValue: 0\n```\n\n确保索引值对齐如下所示：\n\n```\nFolderName:\
  \ 0\nProjectName: 1\nChildPackageName: 2\nExecutionOrder: 3\n```\n\n字段不必按此顺序列出，但索引值必须与\
  \ `custom.GetApplicationPackages` 返回的字段的（从零开始的）序数值对齐。\n\n### 设置执行任务\n\n单击“确定”按钮关闭“Foreach\
  \ 循环容器编辑器”。将一个“执行 SQL”任务拖到“Foreach 循环容器”中，并将其重命名为 `Execute Package`。将 `ConnectionType`\
  \ 设置为 `ADO.NET`，并选择你之前创建的 `SSISDB` 连接。将 `IsQueryStoredProcedure` 属性设置为 `True`，并将\
  \ `SQL Statement` 属性设置为 `custom.execute_catalog_package`。在“参数映射”页上，添加并创建一个名为 `ExecutionID`\
  \ 的新变量，`Int32` 数据类型，包作用域，`默认值`：0。将参数的 `Direction` 更改为 `Output`，并通过提供参数名称 `ExecutionID`\
  \ 将你刚刚创建的 SSIS 变量与 `ExecutionID` 参数关联起来。再添加三个参数映射——分别对应 `FolderName`、`ProjectName`\
  \ 和 `ChildPackageName`。将它们分别映射到存储过程参数 `FolderName`、`ProjectName` 和 `PackageName`。`custom.execute_catalog_package`\
  \ 存储过程接受其他参数：`LoggingLevel`、`Use32BitRunTime`、`ReferenceID` 和 `ObjectType`；但这些参数都包含默认值，这些默认值将满足我们的目的。单击“确定”按钮关闭“执行\
  \ SQL 任务编辑器”。\n\n你的 `Parent.dtsx` SSIS 包应如图 2-3 所示。\n\n![9781484200834_Fig02-03.jpg](img/9781484200834_Fig02-03.jpg)\n\
  \n**图 2-3**. 父包控制流\n\n### 构建执行元数据\n\n返回到 `SSMS`。让我们为简单的执行框架提供要执行的元数据。执行清单 2-8 中的\
  \ T-SQL 语句。\n\n**清单 2-8**. 为 SSIS 应用程序构建元数据\n\n```\nUse SSISDB\nGo\n\nSet NoCount\
  \ On\n\nDeclare @ApplicationName nvarchar(256)\nDeclare @ApplicationDescription\
  \ nvarchar(512)\nDeclare @ApplicationID int\nDeclare @FolderName nvarchar(256)\n\
  Declare @ProjectName nvarchar(256)\nDeclare @PackageName nvarchar(256)\nDeclare\
  \ @PackageDescription nvarchar(512)\nDeclare @PackageID int\nDeclare @ExecutionOrder\
  \ int\nDeclare @ApplicationPackageEnabled bit\nDeclare @ApplicationTbl table(ApplicationID\
  \ int)\nDeclare @PackageTbl table(PackageID int)\n\nbegin tran\n\n-- Build Application\
  \ --\nSelect @ApplicationName = 'TestSSISApp'\n      ,@ApplicationDescription =\
  \ 'A test SSIS application'\n\nInsert Into @ApplicationTbl\nExec custom.AddApplication\n\
  \  @ApplicationName\n ,@ApplicationDescription\n\nSelect @ApplicationID = ApplicationID\n\
  \ From @ApplicationTbl\n\n-- Build Package --\nSelect @FolderName = 'Chapter2'\n\
  \      ,@ProjectName = 'Chapter2'\n      ,@PackageName = 'Chapter2.dtsx'\n     \
  \ ,@PackageDescription = 'A test SSIS package'\n\nInsert Into @PackageTbl\nExec\
  \ custom.AddPackage\n  @FolderName\n ,@ProjectName\n ,@PackageName\n ,@PackageDescription\n\
  \nSelect @PackageID = PackageID\n From @PackageTbl\n\n-- Build ApplicationPackage\
  \ --\nSelect @ExecutionOrder = 10\n       ,@ApplicationPackageEnabled = 1\n\nExec\
  \ custom.AddApplicationPackage\n   @ApplicationID\n  ,@PackageID\n  ,@ExecutionOrder\n\
  \  ,@ApplicationPackageEnabled\n\nDelete @PackageTbl\n\n-- Build Package --\nSelect\
  \ @FolderName = 'Chapter2'\n      ,@ProjectName = 'Chapter2'\n      ,@PackageName\
  \ = 'Chapter2.dtsx'\n      ,@PackageDescription = 'Another test SSIS package'\n\n\
  Insert Into @PackageTbl\nExec custom.AddPackage\n  @FolderName\n ,@ProjectName\n\
  \ ,@PackageName\n ,@PackageDescription\n\nSelect @PackageID = PackageID\n From @PackageTbl\n\
  \n-- Build ApplicationPackage --\nSelect @ExecutionOrder = 20\n       ,@ApplicationPackageEnabled\
  \ = 1\n\nExec custom.AddApplicationPackage\n   @ApplicationID\n  ,@PackageID\n \
  \ ,@ExecutionOrder\n  ,@ApplicationPackageEnabled\n\nDelete @PackageTbl\n\nCommit\n\
  ```\n\n清单 2-8 中的 T-SQL 在执行框架中构建了一个简单的 SSIS 应用程序。它调用了我们的 `Chapter2.dtsx` SSIS 包两次。如果你回到\
  \ `SSDT-BI` 并执行父包，你会注意到 `Chapter2.dtsx` SSIS 包快速连续执行了两次。你可以在图 2-4 中看到该执行情况。\n\n\n\
  ![9781484200834_Fig02-04.jpg](img/9781484200834_Fig02-04.jpg)\n\n图 2-4. `Chapter2.dtsx`\
  \ 无需等待执行两次\n\n理解该框架采用“即发即弃”的设计至关重要。图 2-4 中的截图显示 `Chapter2.dtsx` 的两个实例都显示了它们各自的消息框，而后台任务已经完成。如果你的\
  \ SSIS 包能够并行执行，这种方法效果很好。但如果包之间存在依赖关系呢？这个框架并不便于执行有依赖关系的包，但我会在下一节向你展示一种将框架与 SQL Server\
  \ Agent 作业计划程序耦合的方法。这种耦合将允许你为流程的每个“步骤”执行父包，每一步调用一个 SSIS 应用程序，并进而并行调用一个或多个 SSIS 包。\n\
  \n![Image](img/sq.jpg) **注意** 附录 A 包含了构建一个串行 SSIS 框架的信息，该框架最初是为 SSIS 2005 构建的。如果你使用包部署模型，它在\
  \ SSIS 2014 中同样适用。\n\n### 计划 SSIS 包执行\n\n市场上有许多商业化的软件执行计划程序。它们从相对简单到高度复杂不等，支持基于时间或事件的执行。许多计划程序包含元数据收集功能，用于跟踪执行时间等指标。SQL\
  \ Server Agent 是随 SQL Server 附带的一个相当强大的作业计划应用程序。我们将使用 SQL Server Agent 来计划我们的演示包的执行。\n\
  \n![Image](img/sq.jpg) **警告** 在继续之前，请将 `Chapter2` 项目部署到 SSIS 目录。这样做将部署 `Chapter2.dtsx`\
  \ 和 `Parent.dtsx`。\n\n#### 计划 SSIS 包\n\n打开 SSMS 并连接到 SQL Server 2014 实例。如果可能，打开对象资源管理器并展开\
  \ SQL Server Agent 节点。为什么展开 SQL Server Agent 节点可能不可行？默认情况下，SQL Server Agent 安装为手动启动服务。\n\
  \n右键单击 `Jobs` 虚拟文件夹，然后单击新建 ![image](img/arrow.jpg) 作业。当“新建作业”窗口显示时，将作业命名为 `Ch2`。单击“步骤”页面，然后单击“新建”按钮。将新步骤命名为\
  \ `执行第 2 章包`，并从“类型”下拉列表中选择“SQL Server Integration Services 包”。\n\n从下拉列表中选择一个“包源”。选项如下：\n\
  \n*   SQL Server\n*   文件系统\n*   SSIS 包存储区\n*   SSIS 目录\n\n让我们计划一个来自目录的 SSIS 包作为开始。在“服务器”下拉框中键入\
  \ `localhost` 或包含 SSIS 目录的 SSIS 服务器的名称。单击“包”文本框旁边的省略号 (...)，然后导航到演示包 `Chapter2.dtsx`，如图\
  \ 2-5 所示。\n\n![9781484200834_Fig02-05.jpg](img/9781484200834_Fig02-05.jpg)\n\n图\
  \ 2-5. 配置 SQL Server Agent 作业以执行 SSIS 目录中的 SSIS 包\n\n单击“确定”按钮将完成包选择过程。\n\n#### 计划文件系统中的包\n\
  \n要计划存储在文件系统中的包，请在“包源”下拉列表中选择“文件系统”。单击“包”文本框旁边的省略号 (...)，然后导航到所需的 SSIS 包文件。配置完成后，步骤将如图\
  \ 2-6 所示。\n\n![9781484200834_Fig02-06.jpg](img/9781484200834_Fig02-06.jpg)\n\n图\
  \ 2-6. 配置为从文件系统执行 SSIS 包的 SQL Server Agent 作业步骤\n\n你可以通过右键单击 SSMS 中的作业名称，然后单击“启动作业在步骤”来测试作业。但作业执行可能会失败。为什么？因为\
  \ `Chapter2.dtsx` 包显示一个消息框，而 SQL Server Agent 作业通常由服务账户启动，服务账户不允许显示消息框。如果你的 SQL\
  \ Server Agent 服务是由用户账户（或任何具有 `InteractWithDesktop` 角色的账户）启动的，情况则不同。这将在下一节进一步讨论。\n\
  \n#### 使用自定义执行框架运行 SQL Server Agent 作业\n\n我们可以使用我们的自定义执行框架来运行 SQL Server Agent 作业。为此，创建一个新的名为\
  \ `框架执行` 的 SQL Server Agent 作业。在“步骤”页面，添加一个名为 `TestSSISApp 框架执行` 的新步骤。选择“SSIS 包步骤”类型，并接受“包源”属性的默认值“SSIS\
  \ 目录”。在“服务器”下拉框中输入或选择你的服务器名称，然后单击“包”文本框旁边的省略号 (...) 以打开“选择 SSIS 包”窗口。导航到 `Parent.dtsx`\
  \ SSIS 包，然后单击“确定”按钮。\n\n单击“新建作业步骤”窗口上的“配置”选项卡。包参数 `ApplicationName` 应出现在“参数”列表中。要为此参数输入值，请单击“值”文本框旁边的省略号\
  \ (...)，然后输入 `TestSSISApp`。单击“确定”按钮关闭并保存“新建作业步骤”窗口，然后再次单击“确定”按钮关闭并保存“新建作业”窗口。\n\n\
  要进行测试，请右键单击框架执行 SQL Server Agent 作业，然后单击“启动作业在步骤”。SQL Server Agent 作业将执行并成功，但我有个坏消息：包执行将会失败。我能听到你在想，“等等，什么？”\
  \ 我没开玩笑。还记得这是一个“即发即弃”的执行框架吗？这个事实在这里——以及在 SSIS 执行的其他地方——困扰着我们。你最好现在就意识到这一点——相信我。另一种获得这个知识的方式涉及与你的老板（或更糟，你的客户）争论“作业成功了！”，但你却是错的。\n\
  \n你怎么知道包执行失败了？让我们去看看。在 SSMS 对象资源管理器中展开 Integration Services 目录的虚拟文件夹。右键单击 `SSISDB`\
  \ 并悬停在“报表”上，然后是“标准报表”，再单击“Integration Services 仪表板”。如果你遵循了我的指示，你将在“失败”一词上方看到一个大的、微红色的“2”。如果你单击“2”，报表将带你到一个包含失败执行列表的页面。如果你然后单击“所有消息”链接，你将看到一条错误消息，通知你脚本任务遇到了错误\
  \ (`Exception has been thrown by the target of an invocation`)。该消息意味着（除其他外）你在脚本任务中使用了消息框。不，我不是在编造。\n\
  \n![Image](img/sq.jpg) **注意** “消息框不好吗？” 绝对不是！事实上，它们是在 SSIS 中对某一类错误进行故障排除的唯一方法。我一直在使用它们，但我限定消息框调用在\
  \ If/Then 语句中执行。如果你不这样做，消息框调用将会执行，并导致 SQL Server Agent 作业要么失败，要么在执行成功方面对你撒谎。\n\n\
  并非全无希望。这里的问题是服务账户为执行提供了安全上下文。用于启动 SQL Server Agent 服务的账户是从 SQL Server Agent 作业执行包时使用的账户。该账户通常没有分配\
  \ `InteractWithDesktop` 角色，而且你必须承认——桌面对于显示消息框来说很方便。需要注意的是：你不能在 SSIS 包中包含未经限定的消息框显示调用。使用参数或变量（我使用一个名为\
  \ `Debug` 的变量）并确保其值在包外部，这样你就可以在*想要*显示消息框时打开和关闭它。\n\n\n\n你也可以从 SSIS 目录执行`Parent.dtsx`包。在\
  \ SSMS 对象资源管理器中，继续展开 Chapter2 文件夹。打开“项目”，然后是 Chapter2，再是“包”，右键单击`Parent.dtsx`包。单击“执行”，并为`ApplicationName`参数提供`TestSSISApp`值。单击“确定”按钮后，包将执行，两个消息框会出现。为什么呢？因为你不再是以启动\
  \ SQL Server Agent 服务的服务账户的安全上下文运行；你是在连接 SSMS 对象资源管理器时使用的安全上下文中运行。这很可能是一个使用 Windows\
  \ 身份验证和个人凭据的域账户或计算机账户。如果你一直在监视桌面，那么你（以及域或计算机中的所有其他用户）就被分配了`InteractWithDesktop`角色。但几乎所有的服务账户都不参与`InteractWithDesktop`角色。\n\
  \n### 使用 SQL Server Agent 运行自定义执行框架\n\n你可以使用自定义执行框架运行 SQL Server Agent 作业。只是无法弹出消息框。例如，你可以为流程中的每个“步骤”创建一个\
  \ SSIS 应用程序。该 SSIS 应用程序可以包含能并行执行的 SSIS 包。然后，你构建一个包含多个作业步骤的 SQL Server Agent 作业——每个\
  \ SSIS 应用程序对应一个步骤。SQL Server Agent 作业按顺序执行其步骤，默认情况下等待一个步骤成功后再开始下一个。\n\n大多数数据仓库需要一个提取步骤，将所有数据（来自维度和事实源）暂存到一个暂存数据库中。接着，维度数据被加载到数据仓库中。最后，事实数据从暂存数据库加载到数据仓库中。\n\
  \n操作的优先级如下：提取事实和提取维度可以同时（并行）运行。你可以为每个维度表和事实表提取操作设计一个包，将它们添加到提取 SSIS 应用程序中，并将该 SSIS\
  \ 应用程序作为数据仓库 ETL 作业的步骤 1 执行。完成后，步骤 2 可以从暂存数据库加载维度数据到数据仓库。完成后，步骤 3 可以从暂存数据库加载事实数据到数据仓库。因此，虽然相对简单且有些局限，但我们的自定义执行框架可以促进可配置的并行和串行\
  \ ETL 操作。\n\n### 执行包任务\n\n执行包任务最好通过实际操作来理解。为了演示，请创建一个新的 SSIS 包并将其重命名为`Parent2.dtsx`。向控制流中添加一个执行包任务。打开编辑器，观察\
  \ ReferenceType 属性的选择，如图 2-7 所示。\n\n![9781484200834_Fig02-07.jpg](img/9781484200834_Fig02-07.jpg)\n\
  \n图 2-7. 执行包任务引用属性\n\n如果 ReferenceType 包设置为“项目引用”，则执行包任务可用于启动 SSIS 项目中的包，支持项目部署模型。将此属性设置为“外部引用”允许执行存储在\
  \ MSDB 数据库或文件系统中的 SSIS 包，支持包部署模型。图 2-8 显示了配置为执行`Chapter2.dtsx`包的执行包任务。\n\n![9781484200834_Fig02-08.jpg](img/9781484200834_Fig02-08.jpg)\n\
  \n图 2-8. 选择项目引用包\n\n选择包后，你可以关闭编辑器。通过在 SSIS 调试器中执行`Parent2.dtsx`来测试它。\n\n### 元数据驱动执行\n\
  \n我已经使用了本章列出的所有 SSIS 包执行方法。它们各有优缺点。那么，你如何选择使用哪种方法呢？这是一个极好的问题，我很高兴你问到！我会考虑以下几点：\n\
  \n*   **故障排除：** 在未来的某个时候，总会有人需要弄清楚一个包为什么执行失败。便于故障排除不应该是在数据集成开发项目末尾才考虑的事情；你需要提前考虑。它和安全性一样重要。我为每个企业选择支持故障排除的\
  \ SSIS 包执行方法。\n*   **代码维护：** SSIS 项目未来可能会被修改。这意味着包、项目和执行方法都需要有文档记录。这也意味着我需要考虑维护这段代码的个人或团队的技能和舒适度。如果个人或团队是熟练的.NET\
  \ 开发人员，对于复杂操作，我倾向于使用脚本任务和组件。如果情况确实如此，我也会尝试使用他们选择的.NET 语言进行开发。如果他们是以数据库管理员的身份接触到\
  \ SSIS 的，那么在开发解决方案时，我会在执行 SQL 任务和 OLE DB 源适配器中使用更多的 T-SQL。如果他们有 DTS、SSIS 或其他 ETL\
  \ 开发平台的经验，我会稍微调整开发包的方式以匹配他们的舒适区。同样，这因企业而异。\n*   **企业需求：** 我经常在企业中遇到“最佳实践”。我给这些术语加上引号，因为，嗯，其中一些实际上并非最佳。它们的存在是因为发生了不好的事情，有人做出了反应。有时从\
  \ SSIS 的角度来看，这些反应是有道理的；有时它们是让 SSIS 开发人员烦恼的安全问题；有时它们对任何人都没有真正的好处。\n*   **复杂性：** 我不喜欢复杂的解决方案。如果它们是完成所需工作的唯一方法，我可以容忍，但我努力保持解决方案尽可能简单。更少的活动部件意味着更少的故障点、更少的排查点和更少的维护点。话虽如此，灵活性和复杂性通常是成正比的。这意味着高度灵活的解决方案很可能是复杂的解决方案。\n\
  \n我在这里写下这些，特别是关于复杂性的要点，是为了介绍从托管代码执行。复杂性是从.NET 执行 SSIS 的唯一缺点。从托管代码执行 SSIS 提供了最大的灵活性：只要你想得到，你就能在.NET\
  \ 中找到构建它的方法。在我看来，对于微软技术领域内的数据集成开发人员来说，掌握一门.NET 语言已不再是可选项了。\n\n### 从托管代码执行\n\n从.NET\
  \ 托管代码执行 SSIS 包有诸多（或者如果你喜欢，叫“吨”）好处。以其他方式执行 SSIS 存在各种限制。毫无例外，它们都可以通过从.NET 控制执行来克服。在本节中，我们将演示使用\
  \ VB.NET 执行 SSIS 包的基础知识。\n\n#### 演示应用程序\n\n对于此演示，我使用了 Visual Basic 2013 和.NET Framework\
  \ 4.5.1。我从`www.microsoft.com/en-us/download/details.aspx?id=40787`下载了一份副本。除非另有说明，我接受了\
  \ Visual Studio 2013 集成开发环境（IDE）中 VB 应用程序的默认设置。\n\n首先，在 Visual Studio 2013 中创建一个新的\
  \ VB Windows 窗体项目。添加对以下程序集的引用：\n\n*   `Microsoft.SqlServer.ConnectionInfo`\n*  \
  \ `Microsoft.SqlServer.DTSRuntimeWrap`\n*   `Microsoft.SqlServer.Management.IntegrationServices`\n\
  *   `Microsoft.SqlServer.Management.Sdk.Sfc`\n*   `Microsoft.SqlServer.Smo`\n\n\
  你需要在全局程序集缓存（GAC）中搜索`Microsoft.SqlServer.Management.IntegrationServices`和`Microsoft.SqlServer.SMO`。GAC\
  \ 位于 Windows\\Assembly 文件夹中，这些库在 MSIL 文件夹里。向 Visual Studio 项目添加引用时，单击“浏览”。\n\n####\
  \ frmMain 窗体\n\n\n\n将 `frmMain` 重命名。在窗体上添加两个 `GroupBox` 控件，如 图 2-9 所示上下排列。将顶部组框的\
  \ `Text` 属性更改为 `文件系统中的 SSIS 包`，将底部组框的 `Text` 属性更改为 `目录中的 SSIS 包`。在顶部组框中，添加一个标签、一个文本框和两个按钮。将标签的\
  \ `Text` 属性更改为 `包路径`。将其中一个按钮命名为 `btnOpenSSISPkg`，并将其 `Text` 属性更改为 `...`。将另一个按钮命名为\
  \ `btnStartFile`，并将其 `Text` 属性设置为 `开始`。\n\n![9781484200834_Fig02-09.jpg](img/9781484200834_Fig02-09.jpg)\n\
  \n图 2-9. `frmMain` 控件布局\n\n在 `目录中的 SSIS 包` 组框中，添加五个标签、五个文本框和两个按钮。将标签的 `Text` 属性更改为\
  \ `服务器:`、`目录:`、`文件夹:`、`项目:` 和 `包:`。将每个文本框定位在对应标签的右侧，并分别命名为 `txtSSISCatalogServer`、`txtCatalog`、`txtFolder`、`txtCatalogProject`\
  \ 和 `txtCatalogPackage`。将其中一个按钮命名为 `btnOpenSSISPkgInCatalog`，并将其 `Text` 属性设置为 `...`。将另一个按钮命名为\
  \ `btnStartCatalog`，并将其 `Text` 属性设置为 `开始`。\n\n在 `目录中的 SSIS 包` 组框下方添加一个文本框。将其命名为\
  \ `txtStatus`，将 `MultiLine` 属性设置为 `True`，`BackColor` 设置为 `ButtonFace`，并将 `BorderStyle`\
  \ 设置为 `None`。控件的位置应与 图 2-9 所示类似。最后，向窗体添加一个 `FileOpenDialog` 控件，保留其默认配置。\n\n### 实现辅助器模式\n\
  \n我最初是在担任软件开发人员时接触设计模式的，这大概不会让任何人感到惊讶。我在本应用程序中使用的模式使窗体背后的代码量最少。窗体中的代码调用特定于窗体的模块中的代码。您可以通过在解决方案资源管理器中右键单击\
  \ `frmMain` 并选择查看代码来查看 `frmMain` 的代码。用以下代码替换显示的代码：\n\n```\n'\n' frmMain 代码\n'\n\
