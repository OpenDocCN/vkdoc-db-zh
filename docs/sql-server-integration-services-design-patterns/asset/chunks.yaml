    \         - contains the ID returned from the execution\n                    \
    \         of custom.AddApplication.\n                   PackageID [int]\n    \
    \           - contains the ID returned from the execution\n                  \
    \           of custom.AddPackage.\n                   ExecutionOrder [int]\n \
