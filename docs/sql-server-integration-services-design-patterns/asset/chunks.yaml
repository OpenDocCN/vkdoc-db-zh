    Instance log tables that `AppInstanceID8` started at 6:47:24 PM 29 Jun 2014\.
    You can also see three SSIS packages—with `PkgInstanceID`’s 10, 11, and 12—were
    executed as part of the SSIS application. Each package succeeded, and the SSIS
    application succeeded as well. You also know `AppInstanceID7` started at 6:14:15
    PM 29 Jun 2014 and executed `PkgInstanceID`’s 7, 8, and 9\. `PkgInstanceID`’s
    7 and 8 succeeded, but `PkgInstanceID` 9 failed; failing the SSIS application.    Cool?
    Cool. Let’s move to error and event logging.    Building Error Logging    Instrumenting
    data integration processes to capture and preserve error and exception metadata
    is the most important and useful type of logging. Exceptions and errors are going
    to happen. SSIS provides a fairly robust model for capturing and reporting errors
    as long as you realize you can mostly ignore the error codes. The error descriptions,
    however, are mostly good. So it balances out.    Before I demonstrate how to capture
    error messages in SSIS, let’s discuss why. I used to manage a team of data integration
    developers. The team ranged in size from 28 to 40 developers, and I built very
    large ETL solutions for US state government interests. Part of my job was to figure
    out best practices. Having all SSIS packages log error data in the same format
    to the same location is a best practice. But how do you do this with 40 developers?
    Have you ever tried to get 40 developers to do the same thing the same way? It’s
    like herding cats. The problem was half of them thought they were smarter than
    me; and half of those were correct in thinking that.


    But this wasn’t the kind of problem that required deep thinking; this required
    strategy. So what’s the best strategy for getting every developer to build the
    exact same kind of log for every SSIS package every time? You guessed it: don’t
    let them. Take error logging completely out of their hands.    Soon after learning
    how to use the Execute Package task, I learned events “bubble” from child to parent
    packages. For the purposes of error logging, this means I can capture and record
    any error at the parent package. Even better, it means I can do this *with no
    code in the child package*. Problem solved.    Let’s take a look at how to implement
    this functionality into an SSIS framework. First, let’s add a table and a stored
    procedure to record and preserve errors, as shown in [Listing A-16](#9781484200834_AppA.xhtml#list16).    [***Listing
    A-16***](#9781484200834_AppA.xhtml#_list16). Building the Error Logging Table
    and Stored Procedure    ``` /* log.SSISErrors table */ If Not Exists(Select s.name
    + ''.'' + t.name               From sys.tables t               Join sys.schemas
    s                 On s.schema_id = t.schema_id               Where s.name = ''log''
                    And t.name = ''SSISErrors'')  begin   print ''Creating log.SSISErrors
    table''   Create Table [log].SSISErrors   (     ID int identity(1,1)      Constraint
    PK_SSISErrors Primary Key Clustered    ,AppInstanceID int Not Null  Constraint
    FK_logSSISErrors_logSSISAppInstance_AppInstanceID   Foreign Key References [log].SSISAppInstance(AppInstanceID)
       ,PkgInstanceID int Not Null  Constraint FK_logSSISErrors_logPkgInstance_PkgInstanceID
      Foreign Key References [log].SSISPkgInstance(PkgInstanceID)    ,ErrorDateTime
    datetime Not Null      Constraint DF_logSSISErrors_ErrorDateTime       Default(GetDate())
       ,ErrorDescription varchar(max) Null    ,SourceName varchar(255) Null   )   print
    ''Log.SSISErrors created''  end Else  print ''Log.SSISErrors table already exists.''
    print ''''  /* log.LogError stored procedure */ If Exists(Select s.name + ''.''
    + p.name           From sys.procedures p           Join sys.schemas s             On
    s.schema_id = p.schema_id           Where s.name = ''log''             And p.name
    = ''LogError'')  begin   print ''Dropping log.LogError stored procedure''   Drop
    Procedure [log].LogError   print ''Log.LogError stored procedure dropped''  end
    print ''Creating log.LogError stored procedure'' go  Create Procedure [log].LogError
     @AppInstanceID int ,@PkgInstanceID int ,@SourceName varchar(255) ,@ErrorDescription
    varchar(max) As   insert into log.SSISErrors  (AppInstanceID, PkgInstanceID, SourceName,
    ErrorDescription)  Values  (@AppInstanceID ,@PkgInstanceID ,@SourceName ,@ErrorDescription)
    go print ''Log.LogError stored procedure created.'' print '''' ```    Each row
    in the `log.SSISErrors` table contains an `AppInstanceID` and `PkgInstanceID`
    for identification purposes. Why both? It is designed to capture and preserve
    errors that originate in both the parent and child packages. An error in the `Parent.dtsx`
    package will have a `PkgInstanceID` of `0`. The remaining columns capture metadata
    about the error proper: the date and time the error occurred (`ErrorDateTime`),
    the error message (`ErrorDescription`), and the SSIS task from which the error
    originated (`SourceName`).    ![Image](images/sq.jpg) **Caution**  Adding a row
    to the `log.SSISErrors` table with a `PkgInstanceID` of `0` will actually raise
    a foreign key constraint violation at this time, but I will address this matter
    later in the appendix.    It is important to note that error events are “raised”
    by SSIS tasks. When an error event is instantiated, its fields are populated with
    information such as the error description and source name (the name of the task
    raising the error). These data do not change as the event navigates, or bubbles,
    inside the SSIS package execution stack. When the event arrives at the `Parent.'
