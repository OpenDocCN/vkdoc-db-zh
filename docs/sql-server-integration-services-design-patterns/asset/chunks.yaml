  trans: '# 第 12 章


    ![图片](img/frontdot.jpg)


    ## OData 源


    开放数据（`OData`）协议是一种数据访问协议，它提供了一种通过 Web 创建和使用数据 API 的标准化方法。该技术建立在常见的协议和方法之上，如`HTTP`、`REST`、`AtomPub`和`JSON`。其最初版本由微软定义为开放标准，随后`OData`被一个`OASIS`（结构化信息标准促进组织）委员会接手，其赞助商包括`IBM`、`红帽`和`SAP
    AG`等众多行业巨头。`OASIS`于 2014 年 2 月批准了该标准的最新版本（第 4 版）。


    微软已将`OData`作为其许多产品公开数据 API 的主要方式。`SharePoint`、`Project Online`和许多`Azure`服务都公开了`OData`
    API，用于检索数据和执行`CRUD`（增删改查）操作。`WCF 数据服务`（以前称为`ADO.NET 数据服务`）提供了一种快速简便的方式，让任何人都可以基于`实体数据模型(EDM)`和`ADO.NET
    实体框架`来开发他们自己的`OData`服务。鉴于该技术的广泛普及，微软在`SSIS`（SQL Server Integration Services）中增加对`OData`的支持是合乎情理的。


    本章介绍了`SSIS`中新增的`OData 源`。


    ![图片](img/sq.jpg) **注意** `OData 源`不包含在`SQL Server 2014`或`SQL Server 2012`的安装包中，必须单独下载。`SQL
    Server 2012`版本可从微软下载中心获取：`www.microsoft.com/en-us/download/details.aspx?id=42280`。`SQL
    Server 2014`版本是`SQL Server 2014`功能包的一部分，可在`www.microsoft.com/en-us/download/details.aspx?id=42295`找到。


    ### 理解 OData 协议


    `OData`协议是一个相当广泛的协议，公开了广泛的功能。本节描述了`SSIS`开发人员应该了解的`OData`协议的关键特性。如果您有兴趣了解更多关于该协议的信息，完整的规范和文档可在`www.odata.org`网站上获取。


    ![图片](img/sq.jpg) **注意** `SQL Server 2012`和`2014`的`SSIS OData 源`支持`OData`协议第 3
    版，而非第 4 版。有关`OData`协议的更多信息，请访问`www.odata.org/`。


    从`SSIS`的角度来看，`OData`有两个主要特性：元数据文档和从访问`OData`资源返回的数据。


    元数据文档是`OData`服务的`EDM`描述，它描述了服务公开的实体集。`SSIS OData 源`使用元数据文档来确定源数据的模式。该文档位于每个服务的标准位置——`http://<base_url>/$metadata`。表
    12-1 显示了`OData`和`EDM`概念的映射关系。


    **表 12-1.** 映射到关系术语的 OData v3 概念


    | OData | 关系型 | 注释 |

    | --- | --- | --- |

    | 实体集 | 表或视图 | *实体集*（也称为集合或源）定义了您将在`SSIS`中接收的对象。使用*集合模式*时，`OData 源`提供一个下拉框，允许您选择服务定义的一个实体集。
    |

    | 实体 | 数据行 | 定义实体集内数据行的模式。 |

    | 操作 | 存储过程或函数 | `OData 源`用户界面没有公开选择操作的方法，但可以通过指定其资源路径来调用操作。 |

    | 导航属性 | 外键关系 | 导航属性定义了实体之间的关系。`OData 源`不直接支持这些，但您可以通过输入其资源路径来访问子实体。 |


    在运行时，`SSIS`使用标准`HTTP` URL 从`OData`服务检索数据。这意味着您可以通过将 URL 输入 Web 浏览器来查看返回给`SSIS`的相同数据，这对于调试非常有用。`OData
    源`有两种模式：当使用*集合模式*访问服务时，`SSIS`将自动为您生成资源 URL；当使用*资源路径模式*时，您需要提供完整的 URL。


    #### 数据类型映射


    `OData 源`将尝试将服务元数据文档中定义的复杂类型的字段映射到`SSIS`数据流类型。在配置`OData 源`时，您引用的实体或资源集合或实体集中的字段将作为外部元数据列添加到组件中。表
    12-2 显示了`EDM`到`SSIS`数据类型的映射。鉴于`实体数据模型`的灵活性，您可能会发现某些复杂类型无法与`SSIS OData 源`配合使用。


    **表 12-2.** EDM 数据类型映射到 SSIS 类型


    | EDM 类型 | CLR 类型 | SSIS 类型 |

    | --- | --- | --- |

    | Edm.Binary | byte[] | DT_BYTES |

    | Edm.Boolean | bool | DT_BOOL |

    | Edm.DateTime | DateTime | DT_DBTIMESTAMP |

    | Edm.DateTimeOffset | DateTimeOffset | DT_DBTIMESTAMPOFFSET |

    | Edm.Decimal | decimal | DT_NUMERIC |

    | Edm.Double | double | DT_R8 |

    | Edm.Guid | Guid | DT_GUID |

    | Edm.Int16 | Int16 | DT_I2 |

    | Edm.Int32 | Int32 | DT_I4 |

    | Edm.Int64 | Int64 | DT_I8 |

    | Edm.SByte | sbyte | DT_I1 |

    | Edm.Single | float | DT_R4 |

    | Edm.String | string | DT_WSTR |

    | Edm.Time | TimeSpan | DT_DBTIME2 |


    #### 查询选项


    `OData`支持多种可以包含在请求中的查询选项。查询选项以美元符号（`$`）开头，并添加到 URL 查询字符串部分，位于资源路径之后。这些选项通常用于向服务传递过滤器或限制结果集中的行数或列数。某些`OData`服务可能不支持所有可用的查询选项，因此有时您需要进行试验。表
    12-3 显示了您在使用`SSIS`时会用到的一些更常用的查询选项。您可以通过在`OData 源编辑器`的`查询选项`框中指定它们，或者直接在组件上设置`查询`属性值，来在`SSIS`中使用这些查询选项。


    **表 12-3.** OData 查询选项


    | 查询选项 | 描述 |

    | --- | --- |

    | `$filter` | 根据过滤表达式指定要返回哪些行。 |

    | `$select` | 指定要返回哪些属性（列）。 |

    | `$orderby` | 指定返回项目的顺序。 |

    | `$top` | 指定要返回的最大项目数。 |

    | `$skip` | 指定在返回结果之前要跳过的项目数。 |

    | `$expand` | 指定要在结果中包含的相关实体。 |

    | `$count` | 指定是否在结果中包含项目计数。 |


    此外，根据它们执行的工作类型来组织您的 ETL（提取、转换、加载）包是一个最佳实践。例如：


    *   每个维度表有一个独立的包。

    *   每个事实表有一个独立的包。

    *   暂存操作（如果使用）各自有自己的包。

    *   与数据移动无关的功能操作（例如，在向表加载数据之前删除或禁用索引）也被分离出来。您可以将其中一些操作在适当的时候分组到公共包中；例如，如果您在暂存数据库中截断表并删除索引，这些操作通常位于同一个包中。


    此外，将任何在范围或数据广度上显著不同的`ETL`逻辑隔离到单独的包中通常也是一个好的做法。例如，一个检索大块旧数据的历史`ETL`过程，其性能预期、错误处理规则等，很可能与一个仅收集最近增量数据的、执行更频繁的包不同。因此，通过创建一个单独的包结构来处理这些更大的数据集，有助于避免试图让单个包处理这些不同场景的问题。


    ### 结论


    `SQL Server Integration Services`不仅仅是又一个`ETL`工具。从根本上说，它非常适合数据仓库`ETL`的独特挑战。本章展示了一些具体的方法论，说明了如何利用`SSIS`应对常见且现实的数据仓库挑战。'
- fmt: '# Configuring the OData Connection Manager


    | Option | Description |

    | --- | --- |

    | `$select` | Comma-separated list used to specify which columns should be returned
    by the service. Equivalent to the `SELECT` statement in T-SQL. |

    | `$filter` | Restricts the result set to rows that match the specified filter
    expression. Equivalent to the `WHERE` clause in T-SQL. |

    | `$orderby` | Specifies the order in which results are returned from the service.
    Equivalent to the `ORDER BY` clause in T-SQL. |

    | `$top` | Limits the number of rows returned from the service. Equivalent to
    the `TOP` expression in T-SQL. |

    | `$skip` | Indicates that the service should ignore the first *N* rows of the
    result set, where *N* is specified by the `$skip` argument. |

    | `$format` | This option allows you to override the default format of the response.
    Valid options are `json`, `atom`, and `xml`. SSIS will try to use the `json` format
    by default, since it is the most concise and tends to offer the best performance
    (especially when the service supports JSON with minimal metadata—also known as
    JSON light). |


    The OData Connection Manager is where you specify the service document URL (i.e.,
    the root URL of the OData service) and authentication information. The connection
    manager supports three authentication types: Windows, Basic (username and password),
    and Microsoft Online Services Authentication. You can configure Windows and Basic
    authentication settings on the main OData Connection Manager Editor page (shown
    in [Figure 12-1](#9781484200834_Ch12.xhtml#Fig1)). Microsoft Online Services Authentication
    is meant to be used with SharePoint Online and requires some additional configuration.
    The process is described in the following section.


    ![9781484200834_Fig12-01.jpg](images/9781484200834_Fig12-01.jpg)

    [Figure 12-1](#9781484200834_Ch12.xhtml#_Fig1). The OData Connection Manager Editor


    ## Enabling Microsoft Online Services Authentication


    SharePoint provides OData endpoints for the objects that it stores, such as its
    lists and documents, which can now be accessed in SSIS through the OData Source.
    Although you can configure different types of authentication for the on-premises
    versions of SharePoint, SharePoint Online (and other Microsoft services that are
    a part of Office 365, like Project Online) uses a special type of authentication.
    The OData Connection Manager supports these online services, but you may need
    to install an additional SharePoint SDK component to make it work.


    You can follow these steps to connect to SharePoint Online:


    1.  Click the All button in the OData Connection Manager Editor (shown in [Figure
    12-1](#9781484200834_Ch12.xhtml#Fig1)) to bring up the full property page.

    2.  Under the Security group, change the Integrated Security property from SSPI
    to `False`.

    3.  If the Microsoft Online Services Authentication property stays disabled, then
    you will need to install the SharePoint Service 2013 Client Components SDK from
    the Microsoft Download Center (search for the SDK, or follow this link: `http://www.microsoft.com/en-us/download/details.aspx?id=35585`).
    After installing the SDK, save the SSIS package and restart SQL Server Data Tools.
    You should now be able to change the Microsoft Online Services Authentication
    property to `True` (as shown in [Figure 12-2](#9781484200834_Ch12.xhtml#Fig2)).


    ![9781484200834_Fig12-02.jpg](images/9781484200834_Fig12-02.jpg)

    [Figure 12-2](#9781484200834_Ch12.xhtml#_Fig2). The OData Connection Manager Editor
    showing all properties


    4.  Enter the user ID and password you use when connecting to SharePoint Online.
    You may also need to provide a domain value, depending on how your site administrator
    has configured your Active Directory integration with Office 365.

    5.  You should now be able to successfully connect to your SharePoint Online site.
    Enter the Service Document URL (e.g., `https://<mysite>.sharepoint.com/_vti_bin/ListData.svc`)
    and click the Test Connection button.


    ![Image](images/sq.jpg) **Note** More information about the OData endpoints offered
    by SharePoint Online can be found in Books Online at `http://msdn.microsoft.com/en-us/library/ff521587.aspx`.


    ## Configuring the Source Component


    You can bring up the OData Source Editor by double-clicking on the component in
    the data flow. The editor is similar to what you’d expect from other SSIS data
    flow components and is shown in [Figure 12-3](#9781484200834_Ch12.xhtml#Fig3).


    ![9781484200834_Fig12-03.jpg](images/9781484200834_Fig12-03.jpg)

    [Figure 12-3](#9781484200834_Ch12.xhtml#_Fig3). The OData Source Editor


    A description of the fields you can configure on the Connection page can be found
    in [Table 12-4](#9781484200834_Ch12.xhtml#Tab4). The table lists the field name
    as it is described in the editor UI, as well as the matching property name when
    setting the value through the Advanced Editor (shown later in [Figure 12-6](#9781484200834_Ch12.xhtml#Fig6))
    or the Properties window.


    [Table 12-4](#9781484200834_Ch12.xhtml#_Tab4). OData Source Fields


    | Field | Property | Description |

    | --- | --- | --- |

    | OData Connection Manager | N/A | The connection manager you will use for this
    Source component. This property must be set before you can set the other values.
    Clicking the New button will bring up a dialog that lets you create a new connection
    manager. |

    | Use Collection or Resource Path | `UseResourcePath` | This field determines
    whether you are accessing a specific collection from the OData service or providing
    your own resource path. This is set to Collection by default. More information
    about these access modes can be found later in this section. |

    | Collection | `CollectionName` | This box lets you select a specific collection
    from the OData feed. |

    | Resource Path | `ResourcePath` | When using the Resource Path access mode, this
    field lets you enter a full path of the specific OData resource you want to access.
    |

    | Query Options | `Query` | This field lets you append different query options,
    such as `$top` or `$filter`, to your request. [Table 12-3](#9781484200834_Ch12.xhtml#Tab3)
    lists the set of query options you’d commonly include in a request. Note that
    the values should be URL encoded—the OData Source does not automatically encode
    these values for you. |

    | Feed Url | N/A | This is a read-only field that shows the URL that the OData
    Source will use to access the server. It is built based on the values you set
    for the other fields in this dialog. This field can be useful for debugging purposes.
    |


    There are two main ways to access the OData service using the OData Source: by
    selecting a collection, or by configuring a resource path.


    Accessing the service using a collection is the default behavior of the OData
    Source. You will typically use this option when you want to read one of the top
    level entity sets exposed by the service. The Collection field will give you a
    drop-down list of the available entity sets, similar to how the OLE DB Source
    lists the set of available tables and views.


    You would use the resource path when you are doing more than just accessing a
    single entity set. For example, you want to run an action or operation defined
    by the service, or you want to access a subentity through a navigation property.
    In these cases, you would provide the full URL in the Resource Path field. Note
    that you are expected to apply any URL encoding to the value yourself—the component
    does not automatically do this for you. Also note that the OData Source will not
    do any special validation for these values—it will simply try accessing the URL
    at runtime and rely on the service’s `$metadata` document to determine how to
    interpret the results. Using the Preview button on the OData Source Editor dialog
    (shown in [Figure 12-4](#9781484200834_Ch12.xhtml#Fig4)) is very helpful in these
    cases because it will let you quickly validate whether the request will succeed
    and that you are getting the data you want.


