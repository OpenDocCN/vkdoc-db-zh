    # 配置 OData 连接管理器


    | 选项 | 描述 |

    | --- | --- |

    | `$select` | 用于指定服务应返回哪些列的逗号分隔列表。等效于 T-SQL 中的 `SELECT` 语句。 |

    | `$filter` | 将结果集限制为符合指定筛选表达式的行。等效于 T-SQL 中的 `WHERE` 子句。 |

    | `$orderby` | 指定从服务返回结果的顺序。等效于 T-SQL 中的 `ORDER BY` 子句。 |

    | `$top` | 限制从服务返回的行数。等效于 T-SQL 中的 `TOP` 表达式。 |

    | `$skip` | 指示服务应忽略结果集的前 *N* 行，其中 *N* 由 `$skip` 参数指定。 |

    | `$format` | 此选项允许您覆盖响应的默认格式。有效选项为 `json`、`atom` 和 `xml`。SSIS 默认会尝试使用 `json`
    格式，因为它最简洁且往往能提供最佳性能（特别是当服务支持带最少元数据的 JSON 时——也称为 JSON light）。 |


    OData 连接管理器是您指定服务文档 URL（即 OData 服务的根 URL）和身份验证信息的地方。该连接管理器支持三种身份验证类型：Windows、基本（用户名和密码）以及
    Microsoft Online Services 身份验证。您可以在 OData 连接管理器编辑器的主页面（如图 12-1 所示）上配置 Windows
    和基本身份验证设置。Microsoft Online Services 身份验证用于 SharePoint Online 并且需要一些额外配置。该过程在下一节中描述。


    ![9781484200834_Fig12-01.jpg](img/9781484200834_Fig12-01.jpg)

    图 12-1。OData 连接管理器编辑器


    ## 启用 Microsoft Online Services 身份验证


    SharePoint 为其存储的对象（例如其列表和文档）提供 OData 终结点，现在可以通过 SSIS 中的 OData 源访问这些对象。虽然您可以为本地
    SharePoint 版本配置不同类型的身份验证，但 SharePoint Online（以及 Office 365 的其他 Microsoft 服务，如
    Project Online）使用一种特殊的身份验证类型。OData 连接管理器支持这些联机服务，但您可能需要安装额外的 SharePoint SDK 组件才能使其工作。


    您可以按照以下步骤连接到 SharePoint Online：


    1.  在 OData 连接管理器编辑器（如图 12-1 所示）中单击“全部”按钮，以显示完整的属性页。

    2.  在“安全性”组下，将“集成安全性”属性从 `SSPI` 更改为 `False`。

    3.  如果“Microsoft Online Services 身份验证”属性保持禁用状态，则您需要从 Microsoft 下载中心安装 SharePoint
    Service 2013 客户端组件 SDK（搜索该 SDK，或按照此链接：`http://www.microsoft.com/en-us/download/details.aspx?id=35585`）。安装
    SDK 后，保存 SSIS 包并重新启动 SQL Server Data Tools。现在您应该能够将“Microsoft Online Services
    身份验证”属性更改为 `True`（如图 12-2 所示）。


    ![9781484200834_Fig12-02.jpg](img/9781484200834_Fig12-02.jpg)

    图 12-2。显示所有属性的 OData 连接管理器编辑器


    4.  输入您用于连接到 SharePoint Online 的用户 ID 和密码。根据站点管理员如何将您的 Active Directory 与 Office
    365 集成，您可能还需要提供一个域值。

    5.  现在您应该能够成功连接到您的 SharePoint Online 站点。输入服务文档 URL（例如，`https://<mysite>.sharepoint.com/_vti_bin/ListData.svc`）并单击“测试连接”按钮。


    ![Image](img/sq.jpg) **注意** 有关 SharePoint Online 提供的 OData 终结点的更多信息，请参阅在线丛书：`http://msdn.microsoft.com/en-us/library/ff521587.aspx`。


    ## 配置源组件


    您可以通过双击数据流中的组件来打开 OData 源编辑器。该编辑器与其他 SSIS 数据流组件的类似，如图 12-3 所示。


    ![9781484200834_Fig12-03.jpg](img/9781484200834_Fig12-03.jpg)

    图 12-3。OData 源编辑器


    可以在表 12-4 中找到在“连接”页面上可以配置的字段的描述。该表列出了编辑器 UI 中描述的字段名称，以及通过高级编辑器（如后面的图 12-6 所示）或属性窗口设置值时对应的属性名称。


    表 12-4。OData 源字段


    | 字段 | 属性 | 描述 |

    | --- | --- | --- |

    | OData 连接管理器 | N/A | 您将用于此源组件的连接管理器。必须先设置此属性，才能设置其他值。单击“新建”按钮将打开一个对话框，让您创建新的连接管理器。
    |

    | 使用集合或资源路径 | `UseResourcePath` | 此字段确定您是从 OData 服务访问特定集合还是提供自己的资源路径。默认设置为“集合”。有关这些访问模式的更多信息可在本节后面找到。
    |

    | 集合 | `CollectionName` | 此框允许您从 OData 源中选择特定集合。 |

    | 资源路径 | `ResourcePath` | 当使用“资源路径”访问模式时，此字段允许您输入要访问的特定 OData 资源的完整路径。 |

    | 查询选项 | `Query` | 此字段允许您向请求附加不同的查询选项，例如 `$top` 或 `$filter`。表 12-3 列出了通常在请求中包含的常见查询选项集合。请注意，这些值应进行
    URL 编码——OData 源不会自动为您编码这些值。 |

    | 源 URL | N/A | 这是一个只读字段，显示 OData 源将用于访问服务器的 URL。它是基于您在此对话框中为其他字段设置的值构建的。此字段可用于调试目的。
    |


    使用 OData 源访问 OData 服务主要有两种方式：通过选择集合，或通过配置资源路径。


    使用集合访问服务是 OData 源的默认行为。当您想要读取服务公开的顶级实体集之一时，通常会使用此选项。“集合”字段将为您提供可用实体集的下拉列表，类似于
    OLE DB 源列出可用表和视图的方式。


    当您要执行的操作不仅仅是访问单个实体集时，会使用资源路径。例如，您想要运行服务定义的操作或操作，或者您想通过导航属性访问子实体。在这些情况下，您需要在“资源路径”字段中提供完整的
    URL。请注意，您需要自行对值应用任何 URL 编码——组件不会自动为您完成此操作。另请注意，OData 源不会对这些值进行任何特殊验证——它只是在运行时尝试访问
    URL，并依赖服务的 `$metadata` 文档来确定如何解释结果。在这些情况下，使用 OData 源编辑器对话框（如图 12-4 所示）上的“预览”按钮非常有用，因为它可以让您快速验证请求是否会成功以及是否获得了所需的数据。


    ```javascript

    if (condVar > someVal) {console.log("xxx")}

    ```

