  trans: '

    对于这些情况，你可以使用少量**表达式语言**来动态构建目录路径和文件名，供你在 SSIS 中的连接使用。在这个例子中，假设你正从包内部生成一个平面文本文件，并且希望基于当前日期使用一个动态文件名。通过在“平面文件连接管理器”实例的“属性”窗口中设置
    `ConnectionString` 属性，你可以操作文件名的运行时值。如图 10-2 所示，你正在指定基本文件名，然后附加当前日期的各个元素来构建一个自定义文件名。


    ![9781484200834_Fig10-02.jpg](img/9781484200834_Fig10-02.jpg)


    图 10-2. 使用表达式的动态文件名


    请注意，刚才讨论的模式可以进一步扩展，以包含时间元素（小时/分钟/秒），如果你的 ETL 需求包含这种精细度的要求。


    由于我们不会深入探讨表达式语言的所有语法元素，我在这里只指出我做的几件事：


    *   因为反斜杠 (`\`) 在表达式语言中是一个特殊字符，当我在字符串字面量中包含它时，必须使用双反斜杠 (`\\`) 来“转义”它（以取消其特殊字符状态）。

    *   使用 `(DT_STR, n, 1252)`，我将 `DATEPART` 函数返回的整数值转换为 ASCII 文本。在这种情况下，我使用代码页 `1252`，最大长度根据日期元素的组成部分为
    `2` 或 `4`。

    *   使用 `RIGHT` 函数，我会在任何个位数的月份或日期值前补零（例如，使“`3`”变成“`03`”）以保持一致性。


    请记住，这个模式非常灵活。它几乎可以与任何文件连接一起使用，无论该连接是用作源还是目标。你在此也不仅限于平面文件连接；你也可以将此逻辑扩展到一些其他的 SSIS
    连接。我在处理用作源和目标的 FTP 数据时，也使用了相同的设计模式。通过将相同的逻辑嵌入 FTP 源的属性中，你可以以编程方式“遍历”远程服务器的目录结构，前提是其格式已知且可预测。


    ## 项目级连接管理器


    在使用目录部署模型处理项目时，你可以通过项目连接管理器在同一个项目的多个包之间公开连接信息。当你使用旧版本的 SSIS（2008 或更早版本），或者在后续版本的
    SSIS 中使用包部署模型时，包内定义的任何连接管理器都独立于其他包中的连接管理器。然而，从 SQL Server 2012 中的 SSIS 开始，你现在能够在项目级别将连接管理器附加到你的工作区。这些连接管理器可供同一项目中的所有包访问。


    本章不会深入探讨新的部署模型，但重要的是指出使用表达式如何影响项目连接管理器。因为它们是附加到项目而不是某个特定的包，所以这些共享连接的属性对于项目中的所有包都是通用的。因此，对这些项目连接管理器的任何属性设置——包括使用表达式——都会立即反映在项目中的所有包中。这是对包之间交互方式的一个受欢迎且非常需要的改进，但对于那些使用过先前版本
    SSIS 的人来说，这有点像是一个范式的转变。当应用于一个包中项目连接的表达式也被应用到项目中的其他包时，不要感到意外！


    ## 控制流


    在控制流中，有几种不同的方法来实现 SSIS 表达式。首先，每个任务和容器都将公开几个可以使用表达式配置的属性。此外，它们之间的路径（称为*优先级约束*）允许
    ETL 开发人员在从一个任务/容器移动到另一个时自定义决策路径。


    ### 通过表达式和约束进行条件执行


    控制流的基本功能是管理包元素的执行。通过使用优先级约束，你可以设计一个包，使任务和容器以正确的顺序触发，并保持正确的依赖关系。对于一个简单的例子，考虑一个先截断然后加载临时表的包。你可以在同一个包中执行这两个任务，但如果没有优先级约束来确保插入操作在
    `TRUNCATE TABLE` 执行之后发生，你就有无意中*先加载后删除*相同数据的风险。


    你可以配置优先级约束来管理基于前一个任务成功完成的流（默认行为），或者你可以将它们设置为仅在前一个任务失败时才导致任务执行。此外，你可以将约束设置为 `Completion`，允许下游任务在上一个任务完成后触发，而不管其结果如何。任务可以有多个优先级约束，你可以设置这些约束，使得在它们所附加的任务执行之前，必须满足其中任意一个或所有条件。图
    10-3 展示了一个相当典型的优先级约束用法；请注意，未标记的箭头表示 `Success` 约束，其他的则标有其用途。虚线表示该任务配置为在*任意一个*前置任务完成时执行。


    ![9781484200834_Fig10-03.jpg](img/9781484200834_Fig10-03.jpg)


    图 10-3. 优先级约束


    尽管优先级约束很有用，但它们所能处理的可变性范围相当有限：唯一可以测试的条件是任务是否完成以及该任务的成功或失败。在图 10-3 所示的简短例子中，你可能可以推断出我正在从外部源下载一个或多个文件，将这些文件的数据加载到临时表中，然后合并（更新插入）数据到一个数据库表中。虽然这里在技术上没有错误，但仍有改进的空间。例如，如果没有文件需要处理会怎样？在所示的例子中，临时表的截断、遍历文件系统以查找已下载的文件（即使一个文件也没有），以及合并操作，即使没有文件需要处理，也都会被执行。


    在我第一份工作中，我负责（除其他事项外）从商店停车场收集散落的购物车并将它们带回室内。我的老板曾经告诉我：“这份工作需要走很多路，所以尽你所能节省步数。”这么多年过去了，这个建议仍然适用。如果不需要额外的步骤，为什么不直接跳过它们呢？对于前面的例子，当没有找到需要处理的文件时，你可以包含一个相对简单的表达式来绕过包大部分执行。节省那些步骤就是节省了
    CPU 周期、磁盘 I/O 和其他资源。

    '
- fmt: '# Precedence Constraints and Expressions


    ## 优先级约束中的表达式

    Precedence constraints also have the ability to use expressions to enforce proper
    package flow. In [Figure 10-4](#9781484200834_Ch10.xhtml#Fig4), you’ll see that
    the evaluation operation is set to `Expression` to enforce both the execution
    value of the prior task as well as the value defined in the `Expression` box.
    For illustration purposes, assume that you’ve populated an SSIS variable to store
    the number of files downloaded in the `Script` task operation, and you’re using
    the expression to confirm that at least one file was processed. From here, you
    can either type the expression into the window manually or use the ellipsis button
    to open the `Expression Editor` (note that in earlier versions (2008 and earlier)
    of the product, you will have to enter the expression by hand without the benefit
    of the `Expression Editor`).


    ![9781484200834_Fig10-04.jpg](images/9781484200834_Fig10-04.jpg)


    [Figure 10-4](#9781484200834_Ch10.xhtml#_Fig4). `Precedence Constraint Editor`


    Refer back to the original package; you’ll see that the precedence constraint
    between the first `Script` task and the truncation SQL task now reflects the presence
    of an expression in the constraint ([Figure 10-5](#9781484200834_Ch10.xhtml#Fig5)).


    ![9781484200834_Fig10-05.jpg](images/9781484200834_Fig10-05.jpg)


    [Figure 10-5](#9781484200834_Ch10.xhtml#_Fig5). `Expression` notation in precedence
    constraint


    It’s worth noting that the example in [Figure 10-5](#9781484200834_Ch10.xhtml#Fig5)
    shows a non-standard notation on the constraint. By default, only the function
    icon (`f***x***`) will appear when you are using an expression as part of a constraint.
    Assuming that the expression is not a lengthy one, I typically change the `ShowAnnotation`
    option of the constraint to `ConstraintOptions`, which will include the expression
    itself on the label of the constraint. This is an easy reminder of the expression
    used in the constraint, and it doesn’t require opening the properties window to
    see the expression.


    ## 任务级表达式

    In addition to the control flow uses of expressions, most every task and container
    in SSIS has its own properties that can be configured using expressions. The options
    for configuration using expressions will vary from one executable to the next,
    but there are elements common to most tasks and containers:


    *   `Description`

    *   `Disable`

    *   `DisableValidation`

    *   `TransactionOption`

    *   `FailPackageOnFailure`

    *   `FailParentOnFailure`


    A common design pattern using a task-level expression is to employ the `SqlStatementSource`
    property of the `Execute SQL` task. In most cases, you can use this task combined
    with query parameters to create dynamic statements in T-SQL. However, some language
    constructs (such as subqueries) don’t always work well with parameters, exposing
    a need to build the SQL string in code. By using an expression instead of static
    text for the `SqlStatementSource` property, the ETL developer can have complete
    control of the T-SQL statement when query parameters don’t fit.


    ![Image](images/sq.jpg) **Note** There was a limit on string size in SQL Server
    2008 Release 2 that’s been greatly relaxed in 2012.


    ## 数据流表达式

    As we move from the control flow into the data flow, we find the more traditional
    use of expressions as part of our ETL strategy. Like the higher-level executables,
    we find that every component in the data flow is affected either directly or indirectly
    by SSIS expressions.


    ### 数据清理

    Lightweight data cleansing is one of the most common uses of the expression language
    within the data flow of SSIS. Most frequently used within the derived column transformation,
    expressions can be used for certain cleanup tasks, including these:


    *   Changing the case of data

    *   Grabbing a substring from within a longer string

    *   Trimming extraneous space characters

    *   Replacing inappropriate characters (such as removing letters from text)

    *   Changing data length or type


    Often, you can minimize the need for data cleansing in the data flow simply through
    well-designed query statements in the extraction from the various data sources.
    However, sometimes cleanup at the source is just not an option. Many sources of
    data are nonrelational: consider text files and web services as data sources,
    for example, which generally do not have the option of cleaning up the data before
    its arrival into the SSIS space. Sometimes even relational sources fit in this
    box: I’ve encountered a number of scenarios where the only interface to the data
    was through a predefined stored procedure that could neither be inspected nor
    changed by the ETL developer. For cases such as these where source cleansing is
    not possible, using expressions within the data flow is a good second-level defense.


    One design pattern that I use frequently is to trim out extra whitespace and convert
    blank strings to `NULL` values. As shown in the following, such an operation could
    be performed with a single, relatively simple expression:


    ```

    (LEN(TRIM([Street_Address])) > 0) ? TRIM([Street_Address]) : (DT_WSTR, 100)NULL(DT_WSTR,
    100)

    ```


    Regarding data cleansing using the expression language, I will offer a brief word
    of caution: if you find yourself needing to do complex, multistep cleansing operations
    within your SSIS packages, consider using some other means to do the heavy lifting.
    As I mentioned earlier, the expression language is best suited for lightweight
    data cleansing; because complex expressions can be difficult to develop and debug,
    you might instead use a richer tool such as the `Script` task or `Script` component,
    or perhaps `Data Quality Services`, for these advanced transformations.


    ### 分支

    Sometimes you will find that you need to create forks in the road with ETL data
    flow. There are several reasons why you might need to create such branches within
    your data flow:


    *   **Different outputs**: For data that exists in a single data flow but is bound
    for different destinations, creating branches is an effective solution. I recall
    a case I worked on several years back when we were building a system to distribute
    data to several financial vendors. Each of these vendors required the same type
    of data, but each vendor would get a different “slice” of the data based on several
    criteria, and each required the data in a slightly different format. Rather than
    design multiple end-to-end data flows that would essentially duplicate much of
    the logic, I created a single package that employed a conditional split transformation
    to split the data flow based on a specified condition, and from there, the data
    branched out to the respective outputs.

    *   **Inline cleansing**: A very common ETL scenario in SSIS is to split “good”
    data from “bad” data within a single data flow, attempt to clean the bad data,
    and then merge the cleansed data with the good data. This allows you to leave
    intact any data that does not require cleansing, which may help to conserve processing
    resources.

    *   **Disparate data domains**: In cases where data is structurally similar but
    syntactically different, you might want to employ branching to handle the data
    differently within your data flow. Consider the example of geographical address
    data: although they both describe a physical address, you might need to process
    domestic addresses differently than you would handle international addresses.
    By using branching tools such as the conditional split, various address types
    from a single source type can be handled within one data flow task.

    *   **Varying metadata**: Although relatively rare, there will be the occasion
    where a source may contain rows with varying metadata. Consider a text file with
    a ragged structure in which some rows are missing columns at the end of the line.
    By splitting the data based on the absence of certain columns, you can account
    for the metadata differences inline.'
  raw: 'Precedence constraints also have the ability to use expressions to enforce
    proper package flow. In [Figure 10-4](#9781484200834_Ch10.xhtml#Fig4), you’ll
    see that the evaluation operation is set to Expression to enforce both the execution
    value of the prior task as well as the value defined in the Expression box. For
    illustration purposes, assume that you’ve populated an SSIS variable to store
    the number of files downloaded in the Script task operation, and you’re using
    the expression to confirm that at least one file was processed. From here, you
    can either type the expression into the window manually or use the ellipsis button
    to open the Expression Editor (note that in earlier versions (2008 and earlier)
    of the product, you will have to enter the expression by hand without the benefit
    of the Expression Editor).


    ![9781484200834_Fig10-04.jpg](images/9781484200834_Fig10-04.jpg)


    [Figure 10-4](#9781484200834_Ch10.xhtml#_Fig4). Precedence Constraint Editor


    Refer back to the original package; you’ll see that the precedence constraint
    between the first Script task and the truncation SQL task now reflects the presence
    of an expression in the constraint ([Figure 10-5](#9781484200834_Ch10.xhtml#Fig5)).


    ![9781484200834_Fig10-05.jpg](images/9781484200834_Fig10-05.jpg)


    [Figure 10-5](#9781484200834_Ch10.xhtml#_Fig5). Expression notation in precedence
    constraint


    It’s worth noting that the example in [Figure 10-5](#9781484200834_Ch10.xhtml#Fig5)
    shows a non-standard notation on the constraint. By default, only the function
    icon (f***x***) will appear when you are using an expression as part of a constraint.
    Assuming that the expression is not a lengthy one, I typically change the `ShowAnnotation`
    option of the constraint to `ConstraintOptions`, which will include the expression
    itself on the label of the constraint. This is an easy reminder of the expression
    used in the constraint, and it doesn’t require opening the properties window to
    see the expression.


    Task-Level Expressions


    In addition to the control flow uses of expressions, most every task and container
    in SSIS has its own properties that can be configured using expressions. The options
    for configuration using expressions will vary from one executable to the next,
    but there are elements common to most tasks and containers:


    *   `Description`

    *   `Disable`

    *   `DisableValidation`

    *   `TransactionOption`

    *   `FailPackageOnFailure`

    *   `FailParentOnFailure`


    A common design pattern using a task-level expression is to employ the `SqlStatementSource`
    property of the Execute SQL task. In most cases, you can use this task combined
    with query parameters to create dynamic statements in T-SQL. However, some language
    constructs (such as subqueries) don’t always work well with parameters, exposing
    a need to build the SQL string in code. By using an expression instead of static
    text for the `SqlStatementSource` property, the ETL developer can have complete
    control of the T-SQL statement when query parameters don’t fit.


    ![Image](images/sq.jpg) **Note**  There was a limit on string size in SQL Server
    2008 Release 2 that’s been greatly relaxed in 2012.


    Data Flow Expressions


    As we move from the control flow into the data flow, we find the more traditional
    use of expressions as part of our ETL strategy. Like the higher-level executables,
    we find that every component in the data flow is affected either directly or indirectly
    by SSIS expressions.


    Data Cleansing


    Lightweight data cleansing is one of the most common uses of the expression language
    within the data flow of SSIS. Most frequently used within the derived column transformation,
    expressions can be used for certain cleanup tasks, including these:


    *   Changing the case of data

    *   Grabbing a substring from within a longer string

    *   Trimming extraneous space characters

    *   Replacing inappropriate characters (such as removing letters from text)

    *   Changing data length or type


    Often, you can minimize the need for data cleansing in the data flow simply through
    well-designed query statements in the extraction from the various data sources.
    However, sometimes cleanup at the source is just not an option. Many sources of
    data are nonrelational: consider text files and web services as data sources,
    for example, which generally do not have the option of cleaning up the data before
    its arrival into the SSIS space. Sometimes even relational sources fit in this
    box: I’ve encountered a number of scenarios where the only interface to the data
    was through a predefined stored procedure that could neither be inspected nor
    changed by the ETL developer. For cases such as these where source cleansing is
    not possible, using expressions within the data flow is a good second-level defense.


    One design pattern that I use frequently is to trim out extra whitespace and convert
    blank strings to NULL values. As shown in the following, such an operation could
    be performed with a single, relatively simple expression:


    ```

    (LEN(TRIM([Street_Address])) > 0) ? TRIM([Street_Address]) : (DT_WSTR, 100)NULL(DT_WSTR,
    100)

    ```


    Regarding data cleansing using the expression language, I will offer a brief word
    of caution: if you find yourself needing to do complex, multistep cleansing operations
    within your SSIS packages, consider using some other means to do the heavy lifting.
    As I mentioned earlier, the expression language is best suited for lightweight
    data cleansing; because complex expressions can be difficult to develop and debug,
    you might instead use a richer tool such as the Script task or Script component,
    or perhaps Data Quality Services, for these advanced transformations.


    Branching


    Sometimes you will find that you need to create forks in the road with ETL data
    flow. There are several reasons why you might need to create such branches within
    your data flow:


    *   **Different outputs**: For data that exists in a single data flow but is bound
    for different destinations, creating branches is an effective solution. I recall
    a case I worked on several years back when we were building a system to distribute
    data to several financial vendors. Each of these vendors required the same type
    of data, but each vendor would get a different “slice” of the data based on several
    criteria, and each required the data in a slightly different format. Rather than
    design multiple end-to-end data flows that would essentially duplicate much of
    the logic, I created a single package that employed a conditional split transformation
    to split the data flow based on a specified condition, and from there, the data
    branched out to the respective outputs.

    *   **Inline cleansing**: A very common ETL scenario in SSIS is to split “good”
    data from “bad” data within a single data flow, attempt to clean the bad data,
    and then merge the cleansed data with the good data. This allows you to leave
    intact any data that does not require cleansing, which may help to conserve processing
    resources.

    *   **Disparate data domains**: In cases where data is structurally similar but
    syntactically different, you might want to employ branching to handle the data
    differently within your data flow. Consider the example of geographical address
    data: although they both describe a physical address, you might need to process
    domestic addresses differently than you would handle international addresses.
    By using branching tools such as the conditional split, various address types
    from a single source type can be handled within one data flow task.

    *   **Varying metadata**: Although relatively rare, there will be the occasion
    where a source may contain rows with varying metadata. Consider a text file with
    a ragged structure in which some rows are missing columns at the end of the line.
    By splitting the data based on the absence of certain columns, you can account
    for the metadata differences inline.'
  trans: '# 优先级约束和表达式


    ## 优先级约束中的表达式

    优先级约束还能够使用表达式来强制正确的包流程。在图 10-4 中，你会看到求值操作被设置为`Expression`，以同时强制先前任务的执行值以及`Expression`框中定义的值。为说明起见，假设你已经填充了一个
    SSIS 变量来存储在`脚本`任务操作中下载的文件数量，并且你正在使用表达式来确认至少有一个文件被处理。从这里，你可以手动在窗口中输入表达式，或者使用省略号按钮来打开`表达式编辑器`（请注意，在产品的早期版本（2008
    及更早版本）中，你将不得不手动输入表达式，无法享受`表达式编辑器`的便利）。


    ![9781484200834_Fig10-04.jpg](img/9781484200834_Fig10-04.jpg)


    图 10-4. `优先级约束编辑器`


    回到原始包；你会看到第一个`脚本`任务和截断 SQL 任务之间的优先级约束现在反映了约束中存在表达式（图 10-5）。


    ![9781484200834_Fig10-05.jpg](img/9781484200834_Fig10-05.jpg)


    图 10-5. 优先级约束中的`表达式`表示法


    值得注意的是，图 10-5 中的示例在约束上显示了一种非标准的表示法。默认情况下，当你在约束中使用表达式时，只会显示函数图标（`f***x***`）。假设表达式不是很长，我通常将约束的`ShowAnnotation`选项更改为`ConstraintOptions`，这将在约束的标签上包含表达式本身。这是对约束中所用表达式的一个简便提醒，并且不需要打开属性窗口来查看表达式。


    ## 任务级表达式

    除了表达式在控制流中的用途外，SSIS 中的大多数任务和容器都有自己可以使用表达式配置的属性。使用表达式进行配置的选项因可执行文件而异，但大多数任务和容器都有一些共同的元素：


    *   `Description`

    *   `Disable`

    *   `DisableValidation`

    *   `TransactionOption`

    *   `FailPackageOnFailure`

    *   `FailParentOnFailure`


    使用任务级表达式的一个常见设计模式是采用`执行 SQL`任务的`SqlStatementSource`属性。在大多数情况下，你可以将此任务与查询参数结合使用，在
    T-SQL 中创建动态语句。然而，某些语言构造（如子查询）并不总是能很好地与参数配合使用，这就产生了在代码中构建 SQL 字符串的需求。通过使用表达式而不是静态文本作为`SqlStatementSource`属性，当查询参数不适用时，ETL
    开发人员可以完全控制 T-SQL 语句。


    ![Image](img/sq.jpg) **注意** 在 SQL Server 2008 R2 版本中存在字符串大小限制，此限制在 2012 版本中已大大放宽。


    ## 数据流表达式

    当我们从控制流进入数据流时，我们发现了表达式作为 ETL 策略一部分的更传统用法。与更高级别的可执行文件一样，我们发现数据流中的每个组件都直接或间接受到 SSIS
    表达式的影响。


    ### 数据清理

    轻量级数据清理是 SSIS 数据流内表达式语言最常见的用途之一。最常用于派生列转换中，表达式可用于某些清理任务，包括：


    *   更改数据的大小写

    *   从较长字符串中抓取子字符串

    *   修剪多余的空格字符

    *   替换不适当的字符（例如从文本中移除字母）

    *   更改数据长度或类型


    通常，你可以通过在从各种数据源提取时使用设计良好的查询语句来最小化数据流中对数据清理的需求。然而，有时在源端进行清理根本不可行。许多数据源是非关系型的：例如，考虑文本文件和
    Web 服务作为数据源，它们通常没有在数据进入 SSIS 空间之前进行清理的选项。有时即使是关系型源也属于此类情况：我遇到过许多情况，其中访问数据的唯一接口是通过一个预定义的存储过程，而
    ETL 开发人员既无法检查也无法更改它。对于源清理不可能的情况，在数据流中使用表达式是一个很好的二级防御手段。


    我经常使用的一个设计模式是修剪多余的空白并将空字符串转换为`NULL`值。如下所示，这样的操作可以通过一个相对简单的表达式完成：


    ```

    (LEN(TRIM([Street_Address])) > 0) ? TRIM([Street_Address]) : (DT_WSTR, 100)NULL(DT_WSTR,
    100)

    ```


    关于使用表达式语言进行数据清理，我要简要提醒一下：如果你发现自己需要在 SSIS 包中执行复杂的、多步骤的清理操作，请考虑使用其他方法来完成繁重的工作。如前所述，表达式语言最适合轻量级数据清理；因为复杂的表达式可能难以开发和调试，你可能更愿意使用更丰富的工具，例如`脚本`任务或`脚本`组件，或者可能是`数据质量服务`来进行这些高级转换。


    ### 分支

    有时你会发现需要在 ETL 数据流中创建分支。你可能需要在数据流中创建此类分支的原因有几个：


    *   **不同的输出**：对于存在于单一数据流中但送往不同目的地的数据，创建分支是一种有效的解决方案。我记得几年前我处理过的一个案例，当时我们正在构建一个系统，将数据分发给多个金融供应商。这些供应商中的每一个都需要相同类型的数据，但每个供应商会根据几个标准获得数据的不同“切片”，并且每个供应商要求的数据格式略有不同。我没有设计多个端到端的数据流（这会基本重复大量逻辑），而是创建了一个使用条件拆分转换的单一包，根据指定条件拆分数据流，然后从那里，数据分支到各自的输出。

    *   **内联清理**：SSIS 中一个非常常见的 ETL 场景是在单一数据流中拆分“好”数据和“坏”数据，尝试清理坏数据，然后将清理后的数据与好数据合并。这允许你保留任何不需要清理的数据原封不动，这可能有助于节省处理资源。

    *   **不同的数据域**：在数据结构相似但语法不同的情况下，你可能希望使用分支在数据流中以不同方式处理数据。以地理地址数据为例：尽管它们都描述物理地址，但你可能需要处理国内地址的方式与国际地址不同。通过使用条件拆分等分支工具，来自单一源类型的各种地址类型可以在一个数据流任务中处理。

    *   **变化的元数据**：虽然相对罕见，但偶尔会遇到源可能包含具有不同元数据的行的情况。考虑一个具有不规则结构的文本文件，其中某些行在行尾缺少列。通过基于某些列的缺失来拆分数据，你可以在内联中解决元数据差异。'
- fmt: '[Figure 10-6](#9781484200834_Ch10.xhtml#Fig6) 通过展示使用表达式逻辑将数据流拆分为多个输出，揭示了这种设计模式。在此案例中，你正在处理一个账单文件，通过在条件拆分转换中使用比较表达式（参见标注）来确定每一行是准时付款、尚未到期还是已逾期，然后将其相应地发送到适当的输出。


    ![9781484200834_Fig10-06.jpg](images/9781484200834_Fig10-06.jpg)


    [Figure 10-6](#9781484200834_Ch10.xhtml#_Fig6). 使用表达式定义多条路径


    关于在数据流中应用表达式的一个有趣注意事项是 SSIS 暴露组件级表达式的方式。虽然表达式语言在数据流管道中非常有用，但大多数组件实际上并不暴露可以通过表达式设置的属性。对于那些确实允许在某些属性上使用表达式的组件，这些表达式作为数据流本身的元素显现，并在控制流中工作时显示为“数据流属性”窗口选项的一部分。


    如[Figure 10-7](#9781484200834_Ch10.xhtml#Fig7)所示，你正在使用数据流的表达式属性来访问该数据流内的 ADO.NET
    数据源。如你所见，“属性”列中的标识符显示此表达式属于数据流内的数据源，允许你设置该源的 `SqlCommand` 属性。值得注意的是，我特意在这个例子中使用了
    ADO.NET 源。由于此源当前不允许使用参数，因此设置 `SqlCommand` 属性通常可以作为使用此组件从关系数据库动态检索数据的可接受替代方案。


    ![9781484200834_Fig10-07.jpg](images/9781484200834_Fig10-07.jpg)


    [Figure 10-7](#9781484200834_Ch10.xhtml#_Fig7). 数据流表达式


    ## 应用业务规则


    尽管它们共享一些相同的方法，但应用业务规则在概念上不同于数据清理。在大多数情况下，数据清理被认为是通用的：拼写错误的单词、不一致的大小写、多余的空格以及 NULL
    与空白与零的难题，这些都是几乎每个 ETL 过程中都必须处理的常见问题。另一方面，业务规则是特定的用例，其中根据特定于当前业务的自定义逻辑对数据进行操作、推断或丢弃。这些规则可能足够通用以应用于整个行业（例如医疗账单工作流），也可能具体到适合个别经理偏好的数据排列。


    一般来说，使用表达式应用业务逻辑在仅限于少量简单业务规则案例时效果最佳。如前所述，表达式语言不适用于多个测试条件，因此可能不完全适合多方面和复杂的业务规则。对于企业级的业务规则应用，请考虑
    SSIS 中的其他工具，例如 Script 组件或 Execute SQL 任务（用于可在关系数据库级别执行的操作），或者可能使用单独的工具，如 SQL Server
    Data Quality Services 或 Master Data Services。


    ### 选择复杂表达式与其他工具


    根据我的经验，大多数 SSIS 表达式的使用都涉及简短、简单的表达式。查询变量的值、修改现有列的内容、比较两个值以及其他类似操作通常需要相对简短且不复杂的逻辑作为
    SSIS 表达式。然而，在许多情况下，一个简短而精炼的表达式根本无法解决问题。


    在这些更复杂逻辑的情况下，SSIS 表达式仍然是最佳选择吗？在某些情况下，答案是否定的。如前所述，在 ETL 周期中存在一些情况，表达式语言不适合解决问题。在逻辑所需复杂性超过
    SSIS 表达式语言实际或方便处理范围的情况下，常见的模式是使用单独的工具来处理手头的问题。处理这些复杂逻辑场景的其他一些方法如下：


    *   **数据源组件**：尤其是在处理关系源数据时，将必要的逻辑构建到源组件中可能比在 SSIS 中使用表达式更简单、更快速（包括设计时和运行时）。

    *   **Execute SQL 任务**：有时将数据加载到关系存储中然后在那里执行转换和清理，比在 SSIS 包内联进行更容易。这种方法与传统的 ETL
    略有不同，通常被称为 ELT（提取/加载/转换）。使用此模型，你可以使用 Execute SQL 任务在数据从源加载到将要进行转换的关系数据库后对其进行转换。

    *   **Script 任务**：在控制流中工作时，你可以用 Script 任务实例替代过于复杂的 SSIS 表达式。当出于此目的使用 Script 任务时，你可以获得额外的优势，例如智能感知、错误处理、多步操作以及在代码中包含注释的能力。

    *   **Script 组件**：用于替代数据流内的复杂表达式，原因同上。此外，Script 组件可以在数据流界面中用作源、转换或目标，使你能够比严格使用表达式更强大地控制数据操作。

    *   **自定义任务/组件**：如果你发现自己在许多包中重用相同的复杂逻辑，请考虑创建一个自定义任务或组件，你可以将其分发到多个包，而不必将脚本代码复制并粘贴到每个包中。

    *   **第三方任务/组件**：有时购买（或借用）比构建更容易。有数百甚至数千个第三方任务和组件旨在扩展 SSIS 的原生行为。事实上，这些工具中有许多是免费提供的——通常还附带底层源代码，以防你需要进一步自定义工具的行为。


    没有硬性规定定义何时表达式可能不是最佳解决方案。然而，在决定是否在 SSIS 包中应用动态逻辑时使用表达式或其他工具时，我倾向于遵循一些设计模式。通常，我将在以下情况下避免使用表达式：'
  raw: '[Figure 10-6](#9781484200834_Ch10.xhtml#Fig6) exposes this design pattern
    by showing the use of expression logic to break apart a data stream into multiple
    outputs. In this case, you are processing a billing file by using comparison expressions
    within the conditional split transformation (see the callout) to determine whether
    each row is paid on time, not yet due, or past due, and then you’re sending it
    to the appropriate output accordingly.


    ![9781484200834_Fig10-06.jpg](images/9781484200834_Fig10-06.jpg)


    [Figure 10-6](#9781484200834_Ch10.xhtml#_Fig6). Using expressions to define multiple
    paths


    One interesting caveat regarding the application of expressions within the data
    flow is the way in which SSIS exposes component-level expressions. Although the
    expression language is very useful within the pipeline of the data flow, most
    components do not actually expose properties that can be set using expressions.
    For those that do allow expressions on certain properties, these expressions are
    surfaced as elements of the data flow itself and will appear as part of the options
    in the Data Flow Properties window while working in the control flow.


    As shown in [Figure 10-7](#9781484200834_Ch10.xhtml#Fig7), you are using the expression
    properties of the data flow to access the ADO.NET data source within that data
    flow. As you can see, the identifier in the Property column shows that this expression
    belongs to the data source within the data flow, allowing you to set the `SqlCommand`
    property of that source. It’s useful to note here that I used the ADO.NET source
    purposefully in this example. Since this source does not currently allow the use
    of parameters, setting the `SqlCommand` property is often an acceptable substitute
    for dynamically retrieving data from a relational database using this component.


    ![9781484200834_Fig10-07.jpg](images/9781484200834_Fig10-07.jpg)


    [Figure 10-7](#9781484200834_Ch10.xhtml#_Fig7). Data flow expression


    Application of Business Rules


    Although they share some of the same methods, the applying business rules differs
    conceptually from data cleansing. For the most part, data cleansing is considered
    to be universal: misspelled words, inconsistent casing, extraneous spacing, and
    the NULL-versus-blank-versus-zero quandary are all common problems that must be
    dealt with in almost every ETL process. Business rules, on the other hand, are
    specific use cases in which data is manipulated, extrapolated, or discarded based
    on custom logic that is specific to the business at hand. These rules may be general
    enough to apply to an entire industry (healthcare billing workflows, for example)
    or as specific as the arrangement of data to suit the preferences of an individual
    manager.


    Generally speaking, the use of expressions to apply business logic works best
    when limited to a small number of simple business rule cases. As mentioned earlier,
    the expression language is not ideal for multiple test conditions and therefore
    may not be ideally suited for multifaceted and complex business rules. For enterprise-level
    business rule application, consider other tools in SSIS, such as the Script component
    or Execute SQL task (for operations that can be performed at the relational database
    level), or perhaps a separate tool such as SQL Server Data Quality Services or
    Master Data Services.


    **CHOOSING BETWEEN COMPLEX EXPRESSIONS AND OTHER TOOLS**


    In my experience, the majority of uses of SSIS expressions involve short, simple
    expressions. Interrogating the value of a variable, modifying the contents of
    an existing column, comparing two values, and other similar operations tend to
    require relatively brief and uncomplicated logic as an SSIS expression. However,
    there are many cases where a short-and-sweet expression just won’t get it done.


    In these cases of more complicated logic, is an SSIS expression still the best
    choice? In some instances, the answer is no. As mentioned earlier, there are instances
    in the ETL cycle where the expression language is ill-suited to solve the problem.
    In cases where the logic required involves complexity that exceeds that which
    is practical or convenient for the SSIS expression language, a common pattern
    is to engage a separate tool to address the problem at hand. Some of the other
    methods for handling these complex logical scenarios are as follows:


    *   **Data source component**: Especially when working with relational source
    data, it can be simpler and faster (both in design time and runtime) to build
    the necessary logic into the source component instead of using an expression in
    SSIS.

    *   **Execute SQL task**: Sometimes it’s easier to load the data to a relational
    store and then perform transformation and cleansing there rather than doing it
    inline within the SSIS package. This methodology differs slightly from that of
    traditional ETL and is typically branded as ELT (extract/load/transform). Using
    this model, you could use the Execute SQL task to transform the data once it has
    been loaded from the source to the relational database in which it will be transformed.

    *   **Script task**: When working in the control flow, you can substitute an instance
    of the Script task in place of an overly complex SSIS expression. When using a
    Script task for this purpose, you get the added benefits of IntelliSense, error
    handling, multistep operations, and the ability to include comments in your code.

    *   **Script component**: Replaces complex expressions within the data flow, for
    the same reasons as stated previously. In addition, the Script component may be
    used as a source, transformation, or destination in the data flow surface, giving
    you even greater control of the manipulation of data than by strictly using expressions.

    *   **Custom task/component**: If you find yourself reusing the same complex logic
    in many packages, consider creating a custom task or component that you can distribute
    to multiple packages without having to copy and paste script code to each package.

    *   **Third-party task/component**: Sometimes it’s easier to buy (or borrow) than
    to build. There are hundreds, perhaps even thousands, of third-party tasks and
    components designed to extend the native behaviors of SSIS. In fact, many of these
    tools are freely available—often with the underlying source code in case you need
    to further customize the behavior of the tool.


    There are no hard-and-fast rules defining when an expression may not be the best
    solution. However, there are a few design patterns that I tend to follow when
    deciding whether to use an expression or some other tool when applying dynamic
    logic in my SSIS packages. Typically, I will avoid using expressions in situations
