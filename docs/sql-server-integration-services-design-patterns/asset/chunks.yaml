    In this chapter, we examined a common pattern for loading a basic flat source
    file into SQL Server, a pattern for loading variable-length rows, patterns for
    creating and consuming flat file header and footer rows, and an extremely useful
    SSIS design pattern for archiving flat files.


    # CHAPTER 8


