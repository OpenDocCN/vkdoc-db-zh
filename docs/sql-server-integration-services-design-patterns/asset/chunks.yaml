    | DECIMAL | DT_DECIMAL, DT_I1, DT_I2, DT_I4, DT_I4, DT_I8, DT_NUMERIC, DT_UI1,
    DT_UI2, DT_UI4, DT_UI8 |

    | FLOAT | DT_R4, DT_R8 |

    | INT | DT_I1, DTI2, DT_I4, DT_UI1, DT_UI2 |

    | MONEY | DT_CY |

    | NCHAR | DT_WSTR |

    | NUMERIC | DT_DECIMAL, DT_I1, DT_I2, DT_I4, DT_I8, DT_NUMERIC, DT_UI1, DT_UI2,
    DT_UI4, DT_UI8 |

    | NVARCHAR | DT_WSTR, DT_STR |

    | REAL | DT_R4 |

    | SMALLDATETIME | DT_DBTIMESTAMP2 |

    | SMALLINT | DT_I1, DT_I2, DT_UI1 |

    | SMALLMONEY | DT_R4 |

    | TIME | DT_WSTR |

    | TINYINT | DT_I1 |

