    \ table in the `SSISConfig` database.\n\n## A Note About Relationships\n\nAn SSIS\
    \ application is a collection of SSIS packages that execute in a prescribed order,\
    \ so it is pretty obvious that the relationship between an SSIS application and\
    \ SSIS packages is one-to-many. What may not be as obvious is the relationship\
    \ between SSIS packages and SSIS applications. Herein is a key benefit of choosing\
    \ patterns-based development: code reusability, specifically in reference to the\
    \ SSIS package code. Consider the archive file pattern from the end of [Chapter\
    \ 7](#9781484200834_Ch07.xhtml) on flat file design patterns. In an enterprise\
    \ that loads data from dozens or hundreds of flat file sources, this package may\
    \ be called many times by different SSIS applications. So the relationship between\
    \ SSIS packages and SSIS applications is *also* one-to-many. If you do the set\
    \ math, these relationships combine to create a many-to-many relationship between\
    \ the applications’ and packages’ tables. This means you need a bridge or resolver\
    \ table between them to create mappings between SSIS applications and SSIS packages.\n\
    \nI call this table `cfg.AppPackages`. [Listing A-8](#9781484200834_AppA.xhtml#list8)\
    \ contains the T-SQL script that creates `cfg.AppPackages` and a stored procedure\
    \ with which it is loaded.\n\n### Listing A-8. Creating cfg.AppPackages and cfg.AddSSISApplicationPackage\n\
    \n```sql\n/* cfg.AppPackages table */\nIf Not Exists(Select s.name + '.' + t.name\n\
    \ From sys.tables t\n Join sys.schemas s\n On s.schema_id = t.schema_id\n Where\
    \ s.name = 'cfg'\n And t.name = 'AppPackages')\n begin\n print 'Creating cfg.AppPackages\
    \ table'\n Create Table cfg.AppPackages\n (\n AppPackageID int identity(1,1)\n\
    \ Constraint PK_AppPackages\n Primary Key Clustered\n ,ApplicationID int Not Null\n\
    \ Constraint FK_cfgAppPackages_cfgApplications_ApplicationID\n Foreign Key References\
    \ cfg.Applications(ApplicationID)\n ,PackageID int Not Null\n Constraint FK_cfgAppPackages_cfgPackages_PackageID\n\
    \ Foreign Key References cfg.Packages(PackageID)\n ,ExecutionOrder int Null\n\
    \ )\n print 'Cfg.AppPackages created'\n end\nElse\n print 'Cfg.AppPackages table\
    \ already exists.'\nprint ''\n\n/* cfg.AddSSISApplicationPackage stored procedure\
    \ */\nIf Exists(Select s.name + '.' + p.name\n From sys.procedures p\n Join sys.schemas\
    \ s\n On s.schema_id = p.schema_id\n Where s.name = 'cfg'\n And p.name = 'AddSSISApplicationPackage')\n\
    \ begin\n print 'Dropping cfg.AddSSISApplicationPackage stored procedure'\n Drop\
    \ Procedure cfg.AddSSISApplicationPackage\n print 'Cfg.AddSSISApplicationPackage\
    \ stored procedure dropped'\n end\nPrint 'Creating cfg.AddSSISApplicationPackage\
    \ stored procedure'\nGo\n\nCreate Procedure cfg.AddSSISApplicationPackage\n @ApplicationID\
    \ int\n ,@PackageID int\n ,@ExecutionOrder int = 10\nAs\n Set NoCount On\n If\
    \ Not Exists(Select AppPackageID\n From cfg.AppPackages\n Where ApplicationID\
    \ = @ApplicationID\n And PackageID = @PackageID)\n begin\n Insert Into cfg.AppPackages\n\
    \ (ApplicationID\n ,PackageID\n ,ExecutionOrder)\n Values (@ApplicationID, @PackageID,\
    \ @ExecutionOrder)\n end\nGo\nPrint 'Cfg.AddSSISApplicationPackage stored procedure\
    \ created.'\nPrint ''\n```\n\nTo create the mappings between SSIS applications\
    \ and SSIS packages, you need the IDs of each. Executing the following queries\
    \ returns the information you need:\n\n```sql\nSelect * from cfg.Applications\n\
    Select * from cfg.Packages\n```\n\nYou will now use that information to execute\
    \ the `cfg.AddSSISApplicationPackage` stored procedure, building `SSISApp1` in\
    \ the metadata of the `SSISConfig` database and assigning it `Child1.dtsx` and\
    \ `Child2.dtsx`—in that order. I use the T-SQL script shown in [Listing A-9](#9781484200834_AppA.xhtml#list9)\
    \ to accomplish the mapping.\n\n### Listing A-9. Coupling the Child1 and Child2\
    \ SSIS Packages to the SSISApp1 SSIS Application\n\n```sql\ndeclare @ExecutionOrder\
    \ int = 10\ndeclare @ApplicationID int = 1\ndeclare @PackageID int = 1\ndeclare\
    \ @ApplicationName varchar(255) = 'SSISApp1'\ndeclare @PackageFolder varchar(255)\
    \ = 'F:\\Andy\\Projects\\PublicFramework_PackageDeployment_2014\\SSISConfig2014\\\
    '\ndeclare @PackageName varchar(255) = 'Child1.dtsx'\n\nIf Not Exists(Select AppPackageID\n\
    \ From cfg.AppPackages\n Where ApplicationID = @ApplicationID\n And PackageID\
    \ = @PackageID\n And ExecutionOrder = @ExecutionOrder)\n begin\n print 'Adding\
    \ ' + @ApplicationName + '.' + @PackageName\n + ' to Framework with ExecutionOrder\
    \ ' + convert(varchar, @ExecutionOrder)\n exec cfg.AddSSISApplicationPackage @ApplicationID,\
    \ @PackageID, @ExecutionOrder\n print @PackageName + ' added and wired to ' +\
    \ @ApplicationName\n end\nElse\n print @ApplicationName + '.' + @PackageName +\
    \ ' already exists in the Framework with ExecutionOrder '\n + convert(varchar,\
    \ @ExecutionOrder)\n\n/*Child2.dtsx */\nset @PackageName = 'Child2.dtsx'\nset\
    \ @ExecutionOrder = 20\nset @PackageID = 2\n\nIf Not Exists(Select AppPackageID\n\
    \ From cfg.AppPackages\n Where ApplicationID = @ApplicationID\n And PackageID\
    \ = @PackageID\n And ExecutionOrder = @ExecutionOrder)\n begin\n print 'Adding\
    \ ' + @ApplicationName + '.' + @PackageName + ' to Framework with ExecutionOrder\
    \ ' + convert(varchar, @ExecutionOrder)\n exec cfg.AddSSISApplicationPackage @ApplicationID,\
    \ @PackageID, @ExecutionOrder\n print @PackageName + ' added and wired to ' +\
    \ @ApplicationName\n end\nElse\n print @ApplicationName + '.' + @PackageName +\
    \ ' already exists in the Framework with ExecutionOrder '\n + convert(varchar,\
    \ @ExecutionOrder)\n```"
