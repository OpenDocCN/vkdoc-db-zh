  trans: '## 执行 SQL 任务编辑器


    在“配置 OLE DB 连接管理器”菜单中，单击“新建”。在“服务器名称”字段中，输入您在 清单 1-1 中创建数据库时所用的数据库服务器。无论您使用的是
    Windows 身份验证还是 SQL Server 身份验证，请确保该帐户对您的 `dba_monitor_SQLServerInstances` 表中的每个实例都拥有足够的权限。在“选择或输入数据库名称”下，从下拉菜单中选择
    `dbaCentralLogging`，如 图 1-7 所示。单击“确定”返回到“执行 SQL 任务编辑器”。


    ![9781484200834_Fig01-07.jpg](img/9781484200834_Fig01-07.jpg)


    ### 连接管理器


    ![Image](img/sq.jpg) **注意** 权限要求取决于您希望检索的元数据类型。有关访问特定对象所需权限的更多信息，请参阅 SQL Server
    联机丛书中对应对象类型的页面。


    现在，您需要编写用于检索 SQL Server 实例列表的 SQL 语句。单击 `SQLStatement` 字段右侧的 `[...]` 图标，然后输入 清单
    1-4 中的 T-SQL 代码。


    ### 用于检索 SQL Server 实例的 T-SQL 语句


    ```sql

    SELECT SQLServerInstance FROM dbo.dba_monitor_SQLServerInstances;

    ```


    因为您要检索的是一个值数组，所以从 `ResultSet` 下拉菜单中选择“完整结果集”。此时，您的“执行 SQL 任务编辑器”应类似于 图 1-8；但是，您的“连接”值可能有所不同。


    ![9781484200834_Fig01-08.jpg](img/9781484200834_Fig01-08.jpg)


    ### SQL 任务编辑器


    您即将完成连接管理器的配置。剩下需要做的就是将结果集映射到您的变量。在“执行 SQL 任务编辑器”的左侧选择“结果集”，然后单击“添加”。因为您使用的是完整结果集，所以必须将
    `Result Name` 替换为 `0`。现在，您需要告知 Integration Services 使用哪个变量。从“变量名称”下的下拉菜单中选择 `User::SQLServerList`，如
    图 1-9 所示。单击“确定”。


    ![9781484200834_Fig01-09.jpg](img/9781484200834_Fig01-09.jpg)


    ### 编辑结果集


    至此，执行 SQL 任务已完成配置。接下来，您需要遍历每个服务器以检索您计划监控的元数据。此过程将封装在一个 **Foreach 循环容器**中，该容器将分解存储在
    `SQLServerList` 变量中的 SQL Server 实例列表。


    向控制流中添加一个 **Foreach 循环容器**，并将其重命名为 **Foreach SQL Server Instance**。使用“成功”优先级约束将其连接到执行
    SQL 任务——换句话说，将绿色箭头从执行 SQL 任务拖到 **Foreach 循环容器**上，如 图 1-10 所示。


    ![9781484200834_Fig01-10.jpg](img/9781484200834_Fig01-10.jpg)


    ### 连接执行 SQL 任务与 Foreach 循环容器


    双击 **Foreach 循环容器**以编辑其属性。单击“集合”页，然后在“枚举器”字段中选择“Foreach ADO 枚举器”。在“ADO 对象源变量”下，选择
    `User::SQLServerList`；将“枚举模式”保留为“表中的行”。您的“集合”属性应与 图 1-11 中的匹配。


    ![9781484200834_Fig01-11.jpg](img/9781484200834_Fig01-11.jpg)


    ### Foreach 循环编辑器


    在“变量映射”页上，将 `SQLServerInstance` 变量映射到索引 0，如 图 1-12 所示。


    ![9781484200834_Fig01-12.jpg](img/9781484200834_Fig01-12.jpg)'
- fmt: "# Variable mappings\n\nClick the OK button to close the Foreach Loop Editor.\n\
    \nLet’s review what you’ve done so far. You now have a variable, `SQLServerList`,\
    \ which contains a list of all the SQL Server instances you inserted into the\
    \ `dba_monitor_SQLServerInstances` table. The Foreach Loop container then shreds\
    \ this variable, walking through each value—each SQL Server instance, in this\
    \ case—one at a time. At each pass, it pushes the value of one of those SQL Server\
    \ instances into another variable, `SQLServerInstance`.\n\nNow it’s time to set\
    \ up the dynamic connection that will be used to connect to each of the SQL Server\
    \ instances you’re monitoring. To do this, you need to create a dummy connection\
    \ and configure it to use the server name stored in `SQLServerInstance`.\n\nRight-click\
    \ in the Connection Managers window and select New OLE DB Connection. Create a\
    \ new connection using the same server and security credentials you used previously\
    \ (Figure 1-7), but select Master as the database this time. To be clear, you’re\
    \ using the same server purely for convenience. In reality, the server specified\
    \ in the dummy connection is irrelevant as long as you have sufficient permissions\
    \ to log onto it, because whatever value you enter will be overwritten by the\
    \ `SQLServerInstance` variable at runtime. The database value does matter, however,\
    \ because the database you select *must* exist on every server. Since Master is\
    \ a system database, it is a natural choice.\n\nClick OK to close the Connection\
    \ Manager Properties window. But you’re not done with this connection just yet.\
    \ Right-click the newly created connection and select Properties. Change the Name\
    \ property to `DynamicSQLServerInstance`, then click the `...` icon in the Expressions\
    \ field. This will bring up the Property Expressions Editor. Select the Property\
    \ value you wish to dynamically populate—ServerName, in this case—and enter `@[User::SQLServerInstance]`\
    \ in the Expression field, as demonstrated in Figure 1-13. Optionally, you can\
    \ also click the `...` icon in the Expression field to open the Expression Builder,\
    \ which is helpful if you are not very familiar with Expression syntax.\n\n![9781484200834_Fig01-13.jpg](images/9781484200834_Fig01-13.jpg)\n\
    \n**Figure 1-13. Property Expressions Editor**\n\nThe properties of your connection\
    \ should now resemble those shown in Figure 1-14.\n\n![9781484200834_Fig01-14.jpg](images/9781484200834_Fig01-14.jpg)\n\
    \n**Figure 1-14. Dynamic connection properties**\n\nAt this point, you now have\
    \ a reusable framework for iterating through a list of SQL Server instances and\
    \ doing *something* on each server. This in and of itself is a very valuable design\
    \ pattern. However, because this is a chapter on metadata collection, we would\
    \ be remiss if we did not actually demonstrate collecting and storing metadata.\
    \ The next section will walk you through setting up two useful metadata extracts.\n\
    \n## Metadata Collection\n\nYou’re now ready to retrieve metadata from your list\
    \ of servers. But what should you collect? An incredible wealth of information\
    \ is available for retrieval, including security information, usage data, table\
    \ schema snapshots, failed job details, fragmentation levels, and performance\
    \ counters, to name just a few. For this first example, let’s keep it simple and\
    \ retrieve current database and log file size. This information is useful for\
    \ historical database growth and capacity planning.\n\nTo accomplish this, you\
    \ will create data flows within your Foreach Loop container to retrieve the metadata\
    \ from each server and store it in the `dbaCentralLogging` database. The Data\
    \ Flow task is arguably the most frequently used task in Integration Services.\
    \ It allows you to easily move data between servers and, if necessary, perform\
    \ data conversions or cleansing.\n\nDrag a Data Flow task from the SSIS Toolbox\
    \ into the Foreach Loop container and rename it `Database Size`. Double-clicking\
    \ the Data Flow task will open the Data Flow Designer tab. Notice that the objects\
    \ available within the toolbox change once you are inside the Data Flow designer.\
    \ Drag the OLE DB Source icon onto the designer surface and rename it `Dynamic\
    \ SQL Source`. Double-click the icon to edit its properties.\n\nSelect `DynamicSQLServerInstance`\
    \ in the OLE DB Connection Manager drop-down. Change the Data Access Mode to SQL\
    \ Command, and then copy the code from Listing 1-5 into the SQL Command text box.\n\
    \n### Listing 1-5. Example of T-SQL to Retrieve Current Data and Log File Sizes\
    \ for All Databases on the Server\n\n```sql\nSELECT GETDATE() AS [captureDate]\n\
    \    , @@SERVERNAME AS [serverName]\n    , instance_name AS [databaseName]\n \
    \   , SUM(\n        CASE\n        WHEN counter_name = 'Data File(s) Size (KB)'\n\
    \        THEN cntr_value\n        END\n    ) AS 'dataSizeInKB'\n    , SUM(\n \
    \       CASE\n        WHEN counter_name = 'Log File(s) Size (KB)'\n        THEN\
    \ cntr_value\n        END\n    ) AS 'logSizeInKB'\nFROM sys.dm_os_performance_counters\n\
    WHERE counter_name IN ('Data File(s) Size (KB)'\n    ,'Log File(s) Size (KB)')\n\
    /* optional: remove _Total to avoid accidentally\ndouble-counting in queries */\n\
    \    AND instance_name <> '_Total'\nGROUP BY instance_name;\n```\n\nThis query\
    \ will produce results similar to the following.\n\n```\ncaptureDate         \
    \    serverName databaseName               dataSizeInKB logSizeInKB\n-----------------------\
    \ ---------- -------------------------- ------------ -----------\n2014-06-29 19:52:21.543\
    \ LOCALHOST  _Total                     1320896      274288\n2014-06-29 19:52:21.543\
    \ LOCALHOST  AdventureWorks2012         193536       496\n2014-06-29 19:52:21.543\
    \ LOCALHOST  dbaCentralLogging          1048576      262136\n2014-06-29 19:52:21.543\
    \ LOCALHOST  master                     4096         760\n2014-06-29 19:52:21.543\
    \ LOCALHOST  model                      2112         760\n2014-06-29 19:52:21.543\
    \ LOCALHOST  msdb                       14080        760\n2014-06-29 19:52:21.543\
    \ LOCALHOST  mssqlsystemresource        40960        504\n2014-06-29 19:52:21.543\
    \ LOCALHOST  ReportServer$SQL2012       5184         7032\n2014-06-29 19:52:21.543\
    \ LOCALHOST  ReportServer$SQL2012TempDB 4160         1080\n2014-06-29 19:52:21.543\
    \ LOCALHOST  tempdb                     8192         760\n\n(10 row(s) affected)\n\
    ```\n\nYour OLE DB Source Editor should now resemble the editor in Figure 1-15.\
    \ Click `Parse Query` to ensure the SQL syntax is correct, and then click `Preview`\
    \ at the bottom of the editor to see a sample of the results. Click OK to exit\
    \ the OLE DB Source Editor.\n\n![9781484200834_Fig01-15.jpg](images/9781484200834_Fig01-15.jpg)\n\
    \n**Figure 1-15. OLE DB Source Editor**\n\nLet’s take a moment to discuss this\
    \ code. You are using the `sys.dm_os_performance_counters` DMV to retrieve data\
    \ file and log file sizes. This DMV stores data and log sizes in a separate row\
    \ for each database, so you are pivoting the data to return one row for each database,\
    \ with the file size and log size in separate columns. As a reminder, DMVs were\
    \ introduced in SQL Server 2005, so this example will only work in SQL Server\
    \ 2005 and newer editions."
  raw: '[Figure 1-12](#9781484200834_Ch01.xhtml#_Fig12). Variable mappings


    Click the OK button to close the Foreach Loop Editor.


    Let’s review what you’ve done so far. You now have a variable, `SQLServerList`,
    which contains a list of all the SQL Server instances you inserted into the `dba_monitor_SQLServerInstances`
    table. The Foreach Loop container then shreds this variable, walking through each
    value—each SQL Server instance, in this case—one at a time. At each pass, it pushes
    the value of one of those SQL Server instances into another variable, `SQLServerInstance`.


    Now it’s time to set up the dynamic connection that will be used to connect to
    each of the SQL Server instances you’re monitoring. To do this, you need to create
    a dummy connection and configure it to use the server name stored in `SQLServerInstance`.


    Right-click in the Connection Managers window and select New OLE DB Connection.
    Create a new connection using the same server and security credentials you used
    previously ([Figure 1-7](#9781484200834_Ch01.xhtml#Fig7)), but select Master as
    the database this time. To be clear, you’re using the same server purely for convenience.
    In reality, the server specified in the dummy connection is irrelevant as long
    as you have sufficient permissions to log onto it, because whatever value you
    enter will be overwritten by the `SQLServerInstance` variable at runtime. The
    database value does matter, however, because the database you select *must* exist
    on every server. Since Master is a system database, it is a natural choice.


    Click OK to close the Connection Manager Properties window. But you’re not done
    with this connection just yet. Right-click the newly created connection and select
    Properties. Change the Name property to **DynamicSQLServerInstance**, then click
    the [**…**] icon in the Expressions field. This will bring up the Property Expressions
    Editor. Select the Property value you wish to dynamically populate—ServerName,
    in this case—and enter **@[User::SQLServerInstance]** in the Expression field,
    as demonstrated in [Figure 1-13](#9781484200834_Ch01.xhtml#Fig13). Optionally,
    you can also click the [**…**] icon in the Expression field to open the Expression
    Builder, which is helpful if you are not very familiar with Expression syntax.


    ![9781484200834_Fig01-13.jpg](images/9781484200834_Fig01-13.jpg)


    [Figure 1-13](#9781484200834_Ch01.xhtml#_Fig13). Property Expressions Editor


    The properties of your connection should now resemble those shown in [Figure 1-14](#9781484200834_Ch01.xhtml#Fig14).


    ![9781484200834_Fig01-14.jpg](images/9781484200834_Fig01-14.jpg)


    [Figure 1-14](#9781484200834_Ch01.xhtml#_Fig14). Dynamic connection properties


    At this point, you now have a reusable framework for iterating through a list
    of SQL Server instances and doing *something* on each server. This in and of itself
    is a very valuable design pattern. However, because this is a chapter on metadata
    collection, we would be remiss if we did not actually demonstrate collecting and
    storing metadata. The next section will walk you through setting up two useful
    metadata extracts.


    Metadata Collection


    You’re now ready to retrieve metadata from your list of servers. But what should
    you collect? An incredible wealth of information is available for retrieval, including
    security information, usage data, table schema snapshots, failed job details,
    fragmentation levels, and performance counters, to name just a few. For this first
    example, let’s keep it simple and retrieve current database and log file size.
    This information is useful for historical database growth and capacity planning.


    To accomplish this, you will create data flows within your Foreach Loop container
    to retrieve the metadata from each server and store it in the `dbaCentralLogging`
    database. The Data Flow task is arguably the most frequently used task in Integration
    Services. It allows you to easily move data between servers and, if necessary,
    perform data conversions or cleansing.


    Drag a Data Flow task from the SSIS Toolbox into the Foreach Loop container and
    rename it **Database Size**. Double-clicking the Data Flow task will open the
    Data Flow Designer tab. Notice that the objects available within the toolbox change
    once you are inside the Data Flow designer. Drag the OLE DB Source icon onto the
    designer surface and rename it **Dynamic SQL Source**. Double-click the icon to
    edit its properties.


    Select DynamicSQLServerInstance in the OLE DB Connection Manager drop-down. Change
    the Data Access Mode to SQL Command, and then copy the code from [Listing 1-5](#9781484200834_Ch01.xhtml#list5)
    into the SQL Command text box.


    [***Listing 1-5***](#9781484200834_Ch01.xhtml#_list5). Example of T-SQL to Retrieve
    Current Data and Log File Sizes for All Databases on the Server


    ```

    SELECT GETDATE() AS [captureDate]

        , @@SERVERNAME AS [serverName]

        , instance_name AS [databaseName]

        , SUM(

            CASE

            WHEN counter_name = ''Data File(s) Size (KB)''

            THEN cntr_value

            END

        ) AS ''dataSizeInKB''

        , SUM(

            CASE

            WHEN counter_name = ''Log File(s) Size (KB)''

            THEN cntr_value

            END

        ) AS ''logSizeInKB''

    FROM sys.dm_os_performance_counters

    WHERE counter_name IN (''Data File(s) Size (KB)''

        ,''Log File(s) Size (KB)'')

    /* optional: remove _Total to avoid accidentally

    double-counting in queries */

        AND instance_name <> ''_Total''

    GROUP BY instance_name;

    ```


    This query will produce results similar to the following.


    ```

    captureDate             serverName databaseName               dataSizeInKB logSizeInKB

    ----------------------- ---------- -------------------------- ------------ -----------

    2014-06-29 19:52:21.543 LOCALHOST  _Total                     1320896      274288

    2014-06-29 19:52:21.543 LOCALHOST  AdventureWorks2012         193536       496

    2014-06-29 19:52:21.543 LOCALHOST  dbaCentralLogging          1048576      262136

    2014-06-29 19:52:21.543 LOCALHOST  master                     4096         760

    2014-06-29 19:52:21.543 LOCALHOST  model                      2112         760

    2014-06-29 19:52:21.543 LOCALHOST  msdb                       14080        760

    2014-06-29 19:52:21.543 LOCALHOST  mssqlsystemresource        40960        504

    2014-06-29 19:52:21.543 LOCALHOST  ReportServer$SQL2012       5184         7032

    2014-06-29 19:52:21.543 LOCALHOST  ReportServer$SQL2012TempDB 4160         1080

    2014-06-29 19:52:21.543 LOCALHOST  tempdb                     8192         760


    (10 row(s) affected)

    ```


    Your OLE DB Source Editor should now resemble the editor in [Figure 1-15](#9781484200834_Ch01.xhtml#Fig15).
    Click Parse Query to ensure the SQL syntax is correct, and then click Preview
    at the bottom of the editor to see a sample of the results. Click OK to exit the
    OLE DB Source Editor.


    ![9781484200834_Fig01-15.jpg](images/9781484200834_Fig01-15.jpg)


    [Figure 1-15](#9781484200834_Ch01.xhtml#_Fig15). OLE DB Source Editor


    Let’s take a moment to discuss this code. You are using the `sys.dm_os_performance_counters`
    DMV to retrieve data file and log file sizes. This DMV stores data and log sizes
    in a separate row for each database, so you are pivoting the data to return one
    row for each database, with the file size and log size in separate columns. As
    a reminder, DMVs were introduced in SQL Server 2005, so this example will only
    work in SQL Server 2005 and newer editions.'
  trans: "# 变量映射\n\n点击“确定”按钮关闭 Foreach 循环编辑器。\n\n让我们回顾一下你到目前为止完成的工作。你现在拥有一个变量 `SQLServerList`，其中包含了你插入到\
    \ `dba_monitor_SQLServerInstances` 表中的所有 SQL Server 实例的列表。然后，Foreach 循环容器会拆解这个变量，逐一遍历每个值——在本例中就是每个\
    \ SQL Server 实例。在每一次循环中，它会将其中一个 SQL Server 实例的值推送到另一个变量 `SQLServerInstance` 中。\n\
    \n现在，是时候设置动态连接了，该连接将用于连接到你正在监控的每个 SQL Server 实例。为此，你需要创建一个虚拟连接，并将其配置为使用存储在 `SQLServerInstance`\
    \ 中的服务器名称。\n\n在连接管理器窗口中右键单击，选择“新建 OLE DB 连接”。使用你之前使用的相同服务器和安全凭据创建一个新连接（图 1-7），但这次选择\
    \ Master 作为数据库。需要说明的是，你使用相同的服务器纯粹是为了方便。实际上，只要你有足够权限登录，虚拟连接中指定的服务器并不重要，因为你输入的任何值都将在运行时被\
    \ `SQLServerInstance` 变量覆盖。然而，数据库值很重要，因为你选择的数据库*必须*存在于每个服务器上。由于 Master 是系统数据库，它是一个自然的选择。\n\
    \n单击“确定”关闭“连接管理器属性”窗口。但这个连接你还没有完成。右键单击新创建的连接并选择“属性”。将“Name”属性更改为 `DynamicSQLServerInstance`，然后单击“表达式”字段中的\
    \ `...` 图标。这将打开“属性表达式编辑器”。选择你希望动态填充的属性值——本例中是 ServerName——并在“表达式”字段中输入 `@[User::SQLServerInstance]`，如图\
    \ 1-13 所示。或者，你也可以单击“表达式”字段中的 `...` 图标来打开“表达式生成器”，如果你对表达式语法不太熟悉，这会很有帮助。\n\n![9781484200834_Fig01-13.jpg](img/9781484200834_Fig01-13.jpg)\n\
    \n**图 1-13. 属性表达式编辑器**\n\n你的连接属性现在应该类似于图 1-14 所示。\n\n![9781484200834_Fig01-14.jpg](img/9781484200834_Fig01-14.jpg)\n\
    \n**图 1-14. 动态连接属性**\n\n至此，你已经拥有了一个可重用的框架，用于遍历 SQL Server 实例列表并在每个服务器上执行*某些操作*。这本身就是一个非常有价值的设计模式。然而，由于本章是关于元数据收集的，如果我们不实际演示收集和存储元数据，那就是失职了。下一节将引导你设置两个有用的元数据提取。\n\
    \n## 元数据收集\n\n现在你已准备好从你的服务器列表中检索元数据。但应该收集什么呢？有海量的信息可供检索，包括安全信息、使用数据、表架构快照、失败作业详情、碎片级别和性能计数器等等，不胜枚举。在第一个示例中，让我们保持简单，检索当前的数据库和日志文件大小。这些信息对于历史数据库增长和容量规划很有用。\n\
    \n为了实现这一点，你将在 Foreach 循环容器中创建数据流，以从每个服务器检索元数据并将其存储在 `dbaCentralLogging` 数据库中。数据流任务可以说是\
    \ Integration Services 中最常用的任务。它允许你在服务器之间轻松移动数据，并在必要时执行数据转换或清理。\n\n从 SSIS 工具箱中将一个数据流任务拖到\
    \ Foreach 循环容器中，并将其重命名为 `Database Size`。双击数据流任务将打开数据流设计器选项卡。请注意，一旦进入数据流设计器，工具箱中可用的对象就会改变。将\
    \ OLE DB 源图标拖到设计器 surface 上，并将其重命名为 `Dynamic SQL Source`。双击该图标以编辑其属性。\n\n在“OLE\
    \ DB 连接管理器”下拉菜单中选择 `DynamicSQLServerInstance`。将“数据访问模式”更改为“SQL 命令”，然后将清单 1-5 中的代码复制到“SQL\
    \ 命令”文本框中。\n\n### 清单 1-5. 检索服务器上所有数据库当前数据文件和日志文件大小的 T-SQL 示例\n\n```sql\nSELECT\
    \ GETDATE() AS [captureDate]\n    , @@SERVERNAME AS [serverName]\n    , instance_name\
    \ AS [databaseName]\n    , SUM(\n        CASE\n        WHEN counter_name = 'Data\
    \ File(s) Size (KB)'\n        THEN cntr_value\n        END\n    ) AS 'dataSizeInKB'\n\
    \    , SUM(\n        CASE\n        WHEN counter_name = 'Log File(s) Size (KB)'\n\
    \        THEN cntr_value\n        END\n    ) AS 'logSizeInKB'\nFROM sys.dm_os_performance_counters\n\
    WHERE counter_name IN ('Data File(s) Size (KB)'\n    ,'Log File(s) Size (KB)')\n\
    /* optional: remove _Total to avoid accidentally\ndouble-counting in queries */\n\
    \    AND instance_name <> '_Total'\nGROUP BY instance_name;\n```\n\n此查询将产生类似以下的结果：\n\
    \n```\ncaptureDate             serverName databaseName               dataSizeInKB\
    \ logSizeInKB\n----------------------- ---------- -------------------------- ------------\
    \ -----------\n2014-06-29 19:52:21.543 LOCALHOST  _Total                     1320896\
    \      274288\n2014-06-29 19:52:21.543 LOCALHOST  AdventureWorks2012         193536\
    \       496\n2014-06-29 19:52:21.543 LOCALHOST  dbaCentralLogging          1048576\
    \      262136\n2014-06-29 19:52:21.543 LOCALHOST  master                     4096\
    \         760\n2014-06-29 19:52:21.543 LOCALHOST  model                      2112\
    \         760\n2014-06-29 19:52:21.543 LOCALHOST  msdb                       14080\
    \        760\n2014-06-29 19:52:21.543 LOCALHOST  mssqlsystemresource        40960\
    \        504\n2014-06-29 19:52:21.543 LOCALHOST  ReportServer$SQL2012       5184\
    \         7032\n2014-06-29 19:52:21.543 LOCALHOST  ReportServer$SQL2012TempDB\
    \ 4160         1080\n2014-06-29 19:52:21.543 LOCALHOST  tempdb               \
    \      8192         760\n\n(10 row(s) affected)\n```\n\n你的 OLE DB 源编辑器现在应该类似于图\
    \ 1-15 中的编辑器。单击“解析查询”以确保 SQL 语法正确，然后单击编辑器底部的“预览”以查看结果样本。单击“确定”退出 OLE DB 源编辑器。\n\
    \n![9781484200834_Fig01-15.jpg](img/9781484200834_Fig01-15.jpg)\n\n**图 1-15. OLE\
    \ DB 源编辑器**\n\n让我们花点时间讨论一下这段代码。你正在使用 `sys.dm_os_performance_counters` DMV（动态管理视图）来检索数据文件和日志文件大小。这个\
    \ DMV 将每个数据库的数据和日志大小分别存储在单独的行中，因此你正在对数据进行透视，为每个数据库返回一行，文件大小和日志大小位于不同的列中。需要提醒的是，DMV\
    \ 是在 SQL Server 2005 中引入的，因此此示例仅适用于 SQL Server 2005 及更高版本。"
- fmt: "It is generally a best practice to create stored procedures for these types\
    \ of administrative queries and to deploy them to each server, typically into\
    \ a database like `dbaToolBox`. This introduces some maintenance overhead, but\
    \ benefits of stored procedures—such as improved security and visibility into\
    \ dependencies, usage, performance tuning, and troubleshooting—typically outweigh\
    \ the overhead. Also, it allows a DBA or developer to manually execute these same\
    \ queries on each server without having to search for the code within an Integration\
    \ Services package. However, in the interests of simplicity, you will just input\
    \ the code directly into your Data Flow task.\n\n![Image](images/sq.jpg) Tip:\
    \ The `sys.dm_os_performance_counters` DMV is very useful for database monitoring\
    \ and contains much more information than just data and log file sizes. You can\
    \ easily modify the preceding code to include additional performance counters.\
    \ However, you should be aware that there are three types of `cntr_type` values\
    \ (value/base, per second, and point-in-time), and the preceding code only works\
    \ for the point-in-time counter type (`cntr_type = 65792`). Refer to SQL Server\
    \ Books Online for more information on the types of information available in this\
    \ DMV and how to work with each counter type.\n\nNow that you understand the expected\
    \ output of the query, you need a table to store the results. From within SSMS,\
    \ execute the T-SQL statement in [Listing 1-6](#9781484200834_Ch01.xhtml#list6)\
    \ within the `dbaCentralLogging` database.\n\n[**Listing 1-6**](#9781484200834_Ch01.xhtml#_list6).\
    \ Example of T-SQL Code to Create a Table to Store Data and Log File Size Information\n\
    \n```\nUSE dbaCentralLogging;\nGO\n\nCREATE TABLE dbo.dba_monitor_databaseGrowth\n\
    (\n      log_id        INT IDENTITY(1,1)\n    , captureDate   DATETIME\n    ,\
    \ serverName    NVARCHAR(128)\n    , databaseName  SYSNAME\n    , dataSizeInKB\
    \  BIGINT\n    , logSizeInKB   BIGINT\n\nCONSTRAINT PK_dba_monitor_databaseGrowth\n\
    \        PRIMARY KEY NONCLUSTERED(log_id)\n);\n\nCREATE CLUSTERED INDEX CIX_dba_monitor_databaseGrowth\n\
    \    ON dbo.dba_monitor_databaseGrowth(captureDate,serverName,databaseName);\n\
    ```\n\nYou can now return to your Integration Services package. You do not need\
    \ to perform any data cleansing or data transformations in this Data Flow task,\
    \ so you’ll proceed straight to storing your results. Select the OLE DB Destination\
    \ item from the toolbox, drag it onto the designer surface, and rename it `Central\
    \ Logging Destination`. Connect it to the OLE DB Source by dragging the blue data\
    \ flow arrow from the source to the destination. Double-clicking the OLE DB destination\
    \ brings up another editor. This time, select your `dbaCentralLogging` connection\
    \ from the OLE DB Connection Manager drop-down. Leave Table or View – Fast Load\
    \ selected in the Data Access Mode drop-down. In the Name of the Table or the\
    \ Vew drop-down, select `[dbo].[dba_monitor_databaseGrowth]`, as seen in [Figure\
    \ 1-16](#9781484200834_Ch01.xhtml#Fig16).\n\n![9781484200834_Fig01-16.jpg](images/9781484200834_Fig01-16.jpg)\n\
    \n[Figure 1-16](#9781484200834_Ch01.xhtml#_Fig16). Editing the OLE DB Destination\
    \ Editor’s connection manager\n\nWhen you’re done with the Connection Manager\
    \ page, click the Mappings menu. You’ll notice that Integration Services has taken\
    \ the liberty of performming an initial mapping based on column names. Although\
    \ this is a nice time-saving feature, be wary in environments where the same column\
    \ name is used for multiple data elements. Because the `log_id` column is an identity\
    \ value that is populated during data insertion, you will ignore it in your mappings.\
    \ Confirm that your mappings resemble those shown in [Figure 1-17](#9781484200834_Ch01.xhtml#Fig17),\
    \ and then click OK to return to the Data Flow designer.\n\n![9781484200834_Fig01-17.jpg](images/9781484200834_Fig01-17.jpg)\n\
    \n[Figure 1-17](#9781484200834_Ch01.xhtml#_Fig17). Editing the OLE DB destination\
    \ mappings\n\nYour first data flow is complete, as seen in [Figure 1-18](#9781484200834_Ch01.xhtml#Fig18)."
  raw: 'It is generally a best practice to create stored procedures for these types
    of administrative queries and to deploy them to each server, typically into a
    database like `dbaToolBox`. This introduces some maintenance overhead, but benefits
    of stored procedures—such as improved security and visibility into dependencies,
    usage, performance tuning, and troubleshooting—typically outweigh the overhead.
    Also, it allows a DBA or developer to manually execute these same queries on each
    server without having to search for the code within an Integration Services package.
    However, in the interests of simplicity, you will just input the code directly
    into your Data Flow task.


    ![Image](images/sq.jpg) **Tip**  The `sys.dm_os_performance_counters` DMV is very
    useful for database monitoring and contains much more information than just data
    and log file sizes. You can easily modify the preceding code to include additional
    performance counters. However, you should be aware that there are three types
    of `cntr_type` values (value/base, per second, and point-in-time), and the preceding
    code only works for the point-in-time counter type (`cntr_type = 65792`). Refer
    to SQL Server Books Online for more information on the types of information available
    in this DMV and how to work with each counter type.


    Now that you understand the expected output of the query, you need a table to
    store the results. From within SSMS, execute the T-SQL statement in [Listing 1-6](#9781484200834_Ch01.xhtml#list6)
    within the `dbaCentralLogging` database.


    [***Listing 1-6***](#9781484200834_Ch01.xhtml#_list6). Example of T-SQL Code to
    Create a Table to Store Data and Log File Size Information


    ```

    USE dbaCentralLogging;

    GO


    CREATE TABLE dbo.dba_monitor_databaseGrowth

    (

          log_id        INT IDENTITY(1,1)

        , captureDate   DATETIME

        , serverName    NVARCHAR(128)

        , databaseName  SYSNAME

        , dataSizeInKB  BIGINT

        , logSizeInKB   BIGINT


    CONSTRAINT PK_dba_monitor_databaseGrowth

            PRIMARY KEY NONCLUSTERED(log_id)

    );


    CREATE CLUSTERED INDEX CIX_dba_monitor_databaseGrowth

        ON dbo.dba_monitor_databaseGrowth(captureDate,serverName,databaseName);

    ```


    You can now return to your Integration Services package. You do not need to perform
    any data cleansing or data transformations in this Data Flow task, so you’ll proceed
    straight to storing your results. Select the OLE DB Destination item from the
    toolbox, drag it onto the designer surface, and rename it **Central Logging Destination**.
    Connect it to the OLE DB Source by dragging the blue data flow arrow from the
    source to the destination. Double-clicking the OLE DB destination brings up another
    editor. This time, select your `dbaCentralLogging` connection from the OLE DB
    Connection Manager drop-down. Leave Table or View – Fast Load selected in the
    Data Access Mode drop-down. In the Name of the Table or the Vew drop-down, select
    [dbo].[dba_monitor_databaseGrowth], as seen in [Figure 1-16](#9781484200834_Ch01.xhtml#Fig16).


    ![9781484200834_Fig01-16.jpg](images/9781484200834_Fig01-16.jpg)


    [Figure 1-16](#9781484200834_Ch01.xhtml#_Fig16). Editing the OLE DB Destination
    Editor’s connection manager


    When you’re done with the Connection Manager page, click the Mappings menu. You’ll
    notice that Integration Services has taken the liberty of performming an initial
    mapping based on column names. Although this is a nice time-saving feature, be
    wary in environments where the same column name is used for multiple data elements.
    Because the `log_id` column is an identity value that is populated during data
    insertion, you will ignore it in your mappings. Confirm that your mappings resemble
    those shown in [Figure 1-17](#9781484200834_Ch01.xhtml#Fig17), and then click
    OK to return to the Data Flow designer.


    ![9781484200834_Fig01-17.jpg](images/9781484200834_Fig01-17.jpg)


    [Figure 1-17](#9781484200834_Ch01.xhtml#_Fig17). Editing the OLE DB destination
    mappings


    Your first data flow is complete, as seen in [Figure 1-18](#9781484200834_Ch01.xhtml#Fig18).'
  trans: "\n通常，最佳实践是为这类管理查询创建存储过程，并将它们部署到每个服务器上，通常存入如 `dbaToolBox` 这样的数据库中。这会带来一些维护开销，但存储过程的好处——例如提升安全性，以及便于查看依赖关系、使用情况、性能调优和故障排查——通常远超这些开销。此外，它允许数据库管理员或开发者手动在每个服务器上执行这些相同的查询，而无需在\
    \ Integration Services 包中搜寻代码。然而，为了保持简洁，你将直接在数据流任务中输入代码。\n\n![Image](img/sq.jpg)\
    \ 提示：`sys.dm_os_performance_counters` 这个 DMV 对于数据库监控非常有用，它包含的信息远不止数据和日志文件大小。你可以轻松修改前面的代码以包含额外的性能计数器。但是，你应该知道\
    \ `cntr_type` 值有三种类型（值/基数型、每秒型、时间点型），而前面的代码仅适用于时间点型计数器 (`cntr_type = 65792`)。关于此\
    \ DMV 中可用的信息类型以及如何处理每种计数器类型，请参阅 SQL Server 联机丛书。\n\n现在你已了解查询的预期输出，你需要一个表来存储结果。在\
    \ SSMS 中，在 `dbaCentralLogging` 数据库里执行 清单 1-6 中的 T-SQL 语句。\n\n**清单 1-6**. 创建表以存储数据和日志文件大小信息的\
    \ T-SQL 代码示例\n\n```\nUSE dbaCentralLogging;\nGO\n\nCREATE TABLE dbo.dba_monitor_databaseGrowth\n\
    (\n      log_id        INT IDENTITY(1,1)\n    , captureDate   DATETIME\n    ,\
    \ serverName    NVARCHAR(128)\n    , databaseName  SYSNAME\n    , dataSizeInKB\
    \  BIGINT\n    , logSizeInKB   BIGINT\n\nCONSTRAINT PK_dba_monitor_databaseGrowth\n\
    \        PRIMARY KEY NONCLUSTERED(log_id)\n);\n\nCREATE CLUSTERED INDEX CIX_dba_monitor_databaseGrowth\n\
    \    ON dbo.dba_monitor_databaseGrowth(captureDate,serverName,databaseName);\n\
    ```\n\n现在你可以返回到你的 Integration Services 包。在此数据流任务中，你不需要执行任何数据清理或数据转换，因此将直接进入存储结果的步骤。从工具箱中选择\
    \ OLE DB 目标项，将其拖放到设计图面上，并重命名为 `Central Logging 源`。通过将蓝色的数据流箭头从源拖到目标，将其连接到 OLE\
    \ DB 源。双击 OLE DB 目标会打开另一个编辑器。这次，从 OLE DB 连接管理器下拉列表中选择你的 `dbaCentralLogging` 连接。在数据访问模式下拉列表中保留“表或视图\
    \ – 快速加载”选项。在“表或视图的名称”下拉列表中，选择 `[dbo].[dba_monitor_databaseGrowth]`，如 图 1-16 所示。\n\
    \n![9781484200834_Fig01-16.jpg](img/9781484200834_Fig01-16.jpg)\n\n图 1-16. 编辑\
    \ OLE DB 目标编辑器的连接管理器\n\n完成连接管理器页面后，点击“映射”菜单。你会注意到 Integration Services 已根据列名自动执行了初步映射。虽然这是一个节省时间的好功能，但在相同列名用于多个数据元素的环境中需要谨慎。由于\
    \ `log_id` 列是在数据插入时填充的标识值，你将在映射中忽略它。确认你的映射类似于 图 1-17 所示，然后点击“确定”返回到数据流设计器。\n\n\
    ![9781484200834_Fig01-17.jpg](img/9781484200834_Fig01-17.jpg)\n\n图 1-17. 编辑 OLE\
    \ DB 目标映射\n\n你的第一个数据流已完成，如 图 1-18 所示。\n"
- fmt: "![9781484200834_Fig01-18.jpg](images/9781484200834_Fig01-18.jpg)\n\n[Figure\
    \ 1-18](#9781484200834_Ch01.xhtml#_Fig18). The completed Data Flow task\n\nYou\
    \ are now ready to create your second data flow. From the Control Flow tab, copy\
    \ and paste the existing data flow into the Foreach Loop container. Drag the green\
    \ arrow—the Success Precedence constraint—from the Database Size data flow to\
    \ your new data flow. Rename the new data flow **Unused Indexes**, and then double-click\
    \ it to return to the Data Flow designer.\n\nDouble-click the Dynamic SQL Source\
    \ icon to edit its properties. You need to change the SQL command to use the code\
    \ in [Listing 1-7](#9781484200834_Ch01.xhtml#list7).\n\n[***Listing 1-7***](#9781484200834_Ch01.xhtml#_list7).\
    \ Example of T-SQL Query to Retrieve Unused Indexes\n\n```sql\n/* Create a variable\
    \ to hold a list of indexes */\nDECLARE @Indexes TABLE\n(\n     serverName   \
    \   NVARCHAR(128)\n    ,schemaName      SYSNAME\n    ,schemaID        INT\n  \
    \  ,databaseName    SYSNAME\n    ,databaseID      INT\n    ,tableName       SYSNAME\n\
    \    ,objectID        INT\n    ,indexName       SYSNAME\n    ,indexID        \
    \ INT\n    ,indexType       NVARCHAR(60)\n    ,isPrimaryKey    BIT\n    ,isUnique\
    \        BIT\n    ,isFiltered      BIT\n    ,isPartitioned   BIT\n    ,numberOfRows\
    \    BIGINT\n    ,totalPages      BIGINT\n);\n\n/* Iterate through all databases\
    \ */\nINSERT INTO @Indexes (serverName,schemaName,schemaID,databaseName,databaseID,tableName,objectID,indexName,indexID,indexType,isUnique,isPrimaryKey,isFiltered,isPartitioned,numberOfRows,totalPages)\n\
    EXECUTE sys.sp_MSforeachdb\n' USE ?;\nSELECT @@SERVERNAME\n    , SCHEMA_NAME(t.schema_id)\n\
    \    , t.schema_id\n    , DB_NAME()\n    , DB_ID()\n    , t.name\n    , t.object_id\n\
    \    , i.name\n    , i.index_id\n    , i.type_desc\n    , i.is_primary_key\n \
    \   , i.is_unique\n    , i.has_filter\n    , CASE WHEN COUNT(p.partition_id) >\
    \ 1 THEN 1 ELSE 0 END\n    , SUM(p.rows)\n    , SUM(au.total_pages)\nFROM sys.tables\
    \             AS t WITH (NOLOCK)\nJOIN sys.indexes            AS i WITH (NOLOCK)\n\
    \  ON i.object_id = t.object_id\nJOIN sys.partitions         AS p WITH (NOLOCK)\n\
    \  ON p.object_id = i.object_id\n  AND p.index_id = i.index_id\nJOIN sys.allocation_units\
    \   AS au WITH (NOLOCK)\n  ON au.container_id = p.partition_id\nWHERE i.index_id\
    \ <> 0 /* exclude heaps */\nGROUP BY SCHEMA_NAME(t.schema_id)\n    , t.schema_id\n\
    \    , t.name\n    , t.object_id\n    , i.name\n    , i.index_id\n    , i.type_desc\n\
    \    , i.has_filter\n    , i.is_unique\n    , i.is_primary_key;';\n\n/* Retrieve\
    \ index stats for return to our central repository */\nSELECT GETDATE() AS [captureDate]\n\
    \    ,i.serverName\n    ,i.schemaName\n    ,i.databaseName\n    ,i.tableName\n\
    \    ,i.indexName\n    ,i.indexType\n    ,i.isFiltered\n    ,i.isPartitioned\n\
    \    ,i.numberOfRows\n    ,ddius.user_seeks AS [userSeeksSinceReboot]\n    ,ddius.user_scans\
    \ AS [userScansSinceReboot]\n    ,ddius.user_lookups AS [userLookupsSinceReboot]\n\
    \    ,ddius.user_updates AS [userUpdatesSinceReboot]\n    ,(i.totalPages * 8)/\
    \ 1024 AS [indexSizeInMB]/* pages are 8KB */\n    ,dosi.sqlserver_start_time AS\
    \ [lastReboot]\nFROM @Indexes AS i\nJOIN sys.dm_db_index_usage_stats AS ddius\n\
    \    ON i.databaseID = ddius.database_id\n    AND i.objectID = ddius.object_id\n\
    \    AND i.indexID = ddius.index_id\nCROSS APPLY sys.dm_os_sys_info AS dosi\n\
    WHERE /* exclude system databases */\n    i.databaseName NOT IN('master','msdb','tempdb','model')\n\
    /* exclude unique indexes; assume they are serving a business function */\n  \
    \  AND i.isUnique = 0\n/* exclude primary keys; assume they are serving a business\
    \ function */\n    AND i.isPrimaryKey = 0\n/* no seeks have been performed since\
    \ the last server reboot */\n    AND ddius.user_seeks = 0;\n```\n\n![Image](images/sq.jpg)\
    \ **Tip**  The T-SQL in [Listing 1-7](#9781484200834_Ch01.xhtml#list7) is just\
    \ a starting point. You can easily modify this query to return information such\
    \ as which clustered indexes may warrant redesign, which tables have the most\
    \ updates, and which tables are the most frequently queried.\n\nAn example of\
    \ the output follows.\n\n```\ncaptureDate             serverName schemaName databaseName\
    \       tableName\n----------------------- ---------- ---------- ------------------\
    \ ------------------\n2014-06-29 19:37:36.927 LOCALHOST  Production AdventureWorks2012\
    \ TransactionHistory\n2014-06-29 19:37:36.927 LOCALHOST  Production AdventureWorks2012\
    \ TransactionHistory\n2014-06-29 19:37:36.927 LOCALHOST  Sales      AdventureWorks2012\
    \ SalesOrderDetail\n\nindexName                                  indexType   \
    \ isFiltered isPartitioned numberOfRows\n------------------------------------------\
    \ ------------ ---------- ------------- ------------ IX_TransactionHistory_ProductID\
    \        NONCLUSTERED 0          0             1134431\nIX_TransactionHistory_ReferenceOrderID\
    \ NONCLUSTERED 0          0             1134431\nIX_SalesOrderDetail_ProductID\
    \          NONCLUSTERED 0          1             1213178\n\nuserSeeksSinceReboot\
    \ userScansSinceReboot userLookupsSinceReboot userUpdatesSinceReboot\n--------------------\
    \ -------------------- ---------------------- ----------------------\n0      \
    \              0                    0                      98\n0             \
    \       8                    0                      98\n0                    2\
    \                    0                      124\n\nindexSizeInMB lastReboot\n\
    ------------- -----------------------\n9             2014-06-28 19:15:28.837\n\
    21            2014-06-28 19:15:28.837\n28            2014-06-28 19:15:28.837\n\
    ```\n\nAs you can see, this query is a bit more complex than the last one. Let’s\
    \ discuss what you’re doing. Developers are usually very good at identifying performance\
    \ issues. Why? When a query is slow, someone is usually complaining about it!\
    \ It’s not uncommon for the fix to involve creating an index, which can reduce\
    \ IO and improve query duration. Over time, however, the query may change—resulting\
    \ in the optimizer using different indexing—or perhaps the query is no longer\
    \ needed. Unlike the user-impacting issues that garner so much attention, these\
    \ types of changes tend to creep up silently over time. Eventually that same index\
    \ that was so beneficial when it was first being used starts consuming unnecessary\
    \ resources—specifically, it slows down insert speed, consumes precious disk space,\
    \ and inflates backup sizes.\n\nOne way to stay on top of unused indexes is to\
    \ search the `sys.dm_db_index_usage_stats` DMV. This DMV keeps track of index\
    \ utilization statistics, including how many times an index has been seeked or\
    \ scanned and how many updates have been performed. This information is refreshed\
    \ after every reboot, so please note that a server that has been restarted recently\
    \ may show an inaccurately high number of “unused” indexes. Also, this information\
    \ is merely a starting point from which you can conduct further research into\
    \ whether an index should be dropped or redesigned; many organizations may have\
    \ indexes that are not called frequently but are necessary for important monthly\
    \ or annual reports.\n\nOne other important thing to note is that this script\
    \ makes use of the undocumented `sp_MSforeachdb` stored procedure. This stored\
    \ procedure performs a very useful task: it iterates through every database, executing\
    \ whatever command is passed to it. For numerous reasons—not the least of which\
    \ is the fact that it is an undocumented, and therefore unsupported, stored procedure\
    \ that may occasionally skip databases—we recommend using Aaron Bertrand’s `sp_foreachdb`\
    \ stored procedure instead for production workloads. However, to keep things simple,\
    \ you will use the `sp_MSforeachdb` procedure in your example.\n\n![Image](images/sq.jpg)\
    \ **Tip**  Aaron Bertrand’s `sp_foreachdb` stored procedure can be found at `www.mssqltips.com/sqlservertip/2201/making-a-more-reliable-and-flexible-spmsforeachdb`."
  raw: '![9781484200834_Fig01-18.jpg](images/9781484200834_Fig01-18.jpg)


    [Figure 1-18](#9781484200834_Ch01.xhtml#_Fig18). The completed Data Flow task


    You are now ready to create your second data flow. From the Control Flow tab,
    copy and paste the existing data flow into the Foreach Loop container. Drag the
    green arrow—the Success Precedence constraint—from the Database Size data flow
    to your new data flow. Rename the new data flow **Unused Indexes**, and then double-click
    it to return to the Data Flow designer.


    Double-click the Dynamic SQL Source icon to edit its properties. You need to change
    the SQL command to use the code in [Listing 1-7](#9781484200834_Ch01.xhtml#list7).


    [***Listing 1-7***](#9781484200834_Ch01.xhtml#_list7). Example of T-SQL Query
    to Retrieve Unused Indexes


    ```

    /* Create a variable to hold a list of indexes */

    DECLARE @Indexes TABLE

    (

         serverName      NVARCHAR(128)

        ,schemaName      SYSNAME

        ,schemaID        INT

        ,databaseName    SYSNAME

        ,databaseID      INT

        ,tableName       SYSNAME

        ,objectID        INT

        ,indexName       SYSNAME

        ,indexID         INT

        ,indexType       NVARCHAR(60)

        ,isPrimaryKey    BIT

        ,isUnique        BIT

        ,isFiltered      BIT

        ,isPartitioned   BIT

        ,numberOfRows    BIGINT

        ,totalPages      BIGINT

    );


    /* Iterate through all databases */

    INSERT INTO @Indexes (serverName,schemaName,schemaID,databaseName,databaseID,tableName,objectID,indexName,indexID,indexType,isUnique,isPrimaryKey,isFiltered,isPartitioned,numberOfRows,totalPages)

    EXECUTE sys.sp_MSforeachdb

    '' USE ?;

    SELECT @@SERVERNAME

        , SCHEMA_NAME(t.schema_id)

        , t.schema_id

        , DB_NAME()

        , DB_ID()

        , t.name

        , t.object_id

        , i.name

        , i.index_id

        , i.type_desc

        , i.is_primary_key

        , i.is_unique

        , i.has_filter

        , CASE WHEN COUNT(p.partition_id) > 1 THEN 1 ELSE 0 END

        , SUM(p.rows)

        , SUM(au.total_pages)

    FROM sys.tables             AS t WITH (NOLOCK)

    JOIN sys.indexes            AS i WITH (NOLOCK)

      ON i.object_id = t.object_id

    JOIN sys.partitions         AS p WITH (NOLOCK)

      ON p.object_id = i.object_id

      AND p.index_id = i.index_id

    JOIN sys.allocation_units   AS au WITH (NOLOCK)

      ON au.container_id = p.partition_id

    WHERE i.index_id <> 0 /* exclude heaps */

    GROUP BY SCHEMA_NAME(t.schema_id)

        , t.schema_id

        , t.name

        , t.object_id

        , i.name

        , i.index_id

        , i.type_desc

        , i.has_filter

        , i.is_unique

        , i.is_primary_key;'';


    /* Retrieve index stats for return to our central repository */

    SELECT GETDATE() AS [captureDate]

        ,i.serverName

        ,i.schemaName

        ,i.databaseName

        ,i.tableName

        ,i.indexName

        ,i.indexType

        ,i.isFiltered

        ,i.isPartitioned

        ,i.numberOfRows

        ,ddius.user_seeks AS [userSeeksSinceReboot]

        ,ddius.user_scans AS [userScansSinceReboot]

        ,ddius.user_lookups AS [userLookupsSinceReboot]

        ,ddius.user_updates AS [userUpdatesSinceReboot]

        ,(i.totalPages * 8)/ 1024 AS [indexSizeInMB]/* pages are 8KB */

        ,dosi.sqlserver_start_time AS [lastReboot]

    FROM @Indexes AS i

    JOIN sys.dm_db_index_usage_stats AS ddius

        ON i.databaseID = ddius.database_id

        AND i.objectID = ddius.object_id

        AND i.indexID = ddius.index_id

    CROSS APPLY sys.dm_os_sys_info AS dosi

    WHERE /* exclude system databases */

        i.databaseName NOT IN(''master'',''msdb'',''tempdb'',''model'')

    /* exclude unique indexes; assume they are serving a business function */

        AND i.isUnique = 0

    /* exclude primary keys; assume they are serving a business function */

        AND i.isPrimaryKey = 0

    /* no seeks have been performed since the last server reboot */

        AND ddius.user_seeks = 0;

    .

    ```


    ![Image](images/sq.jpg) **Tip**  The T-SQL in [Listing 1-7](#9781484200834_Ch01.xhtml#list7)
    is just a starting point. You can easily modify this query to return information
    such as which clustered indexes may warrant redesign, which tables have the most
    updates, and which tables are the most frequently queried.


    An example of the output follows.


    ```

    captureDate             serverName schemaName databaseName       tableName

    ----------------------- ---------- ---------- ------------------ ------------------

    2014-06-29 19:37:36.927 LOCALHOST  Production AdventureWorks2012 TransactionHistory

    2014-06-29 19:37:36.927 LOCALHOST  Production AdventureWorks2012 TransactionHistory

    2014-06-29 19:37:36.927 LOCALHOST  Sales      AdventureWorks2012 SalesOrderDetail


    indexName                              indexType    isFiltered isPartitioned numberOfRows

    -------------------------------------- ------------ ---------- ------------- ------------
    IX_TransactionHistory_ProductID        NONCLUSTERED 0          0             1134431

    IX_TransactionHistory_ReferenceOrderID NONCLUSTERED 0          0             1134431

    IX_SalesOrderDetail_ProductID          NONCLUSTERED 0          1             1213178


    userSeeksSinceReboot userScansSinceReboot userLookupsSinceReboot userUpdatesSinceReboot

    -------------------- -------------------- ---------------------- ----------------------

    0                    0                    0                      98

    0                    8                    0                      98

    0                    2                    0                      124


    indexSizeInMB lastReboot

    ------------- -----------------------

    9             2014-06-28 19:15:28.837

    21            2014-06-28 19:15:28.837

    28            2014-06-28 19:15:28.837

    ```


    As you can see, this query is a bit more complex than the last one. Let’s discuss
    what you’re doing. Developers are usually very good at identifying performance
    issues. Why? When a query is slow, someone is usually complaining about it! It’s
    not uncommon for the fix to involve creating an index, which can reduce IO and
    improve query duration. Over time, however, the query may change—resulting in
    the optimizer using different indexing—or perhaps the query is no longer needed.
    Unlike the user-impacting issues that garner so much attention, these types of
    changes tend to creep up silently over time. Eventually that same index that was
    so beneficial when it was first being used starts consuming unnecessary resources—specifically,
    it slows down insert speed, consumes precious disk space, and inflates backup
    sizes.


    One way to stay on top of unused indexes is to search the `sys.dm_db_index_usage_stats`
    DMV. This DMV keeps track of index utilization statistics, including how many
    times an index has been seeked or scanned and how many updates have been performed.
    This information is refreshed after every reboot, so please note that a server
    that has been restarted recently may show an inaccurately high number of “unused”
    indexes. Also, this information is merely a starting point from which you can
    conduct further research into whether an index should be dropped or redesigned;
    many organizations may have indexes that are not called frequently but are necessary
    for important monthly or annual reports.


    One other important thing to note is that this script makes use of the undocumented
    `sp_MSforeachdb` stored procedure. This stored procedure performs a very useful
    task: it iterates through every database, executing whatever command is passed
    to it. For numerous reasons—not the least of which is the fact that it is an undocumented,
    and therefore unsupported, stored procedure that may occasionally skip databases—we
    recommend using Aaron Bertrand’s `sp_foreachdb` stored procedure instead for production
    workloads. However, to keep things simple, you will use the `sp_MSforeachdb` procedure
    in your example.


    ![Image](images/sq.jpg) **Tip**  Aaron Bertrand’s `sp_foreachdb` stored procedure
    can be found at `www.mssqltips.com/sqlservertip/2201/making-a-more-reliable-and-flexible-spmsforeachdb`.'
  trans: "\n![9781484200834_Fig01-18.jpg](img/9781484200834_Fig01-18.jpg)\n\n图 1-18.\
    \ 已完成的数据流任务\n\n现在，您已准备好创建第二个数据流。在“控制流”选项卡中，将现有的数据流复制并粘贴到 Foreach 循环容器中。将绿色箭头——“成功优先约束”——从“数据库大小”数据流拖动到新的数据流。将新数据流重命名为**未使用的索引**，然后双击它以返回到数据流设计器。\n\
    \n双击“动态 SQL 源”图标以编辑其属性。您需要更改 SQL 命令以使用清单 1-7 中的代码。\n\n***清单 1-7***. 检索未使用索引的 T-SQL\
    \ 查询示例\n\n```sql\n/* 创建一个变量来保存索引列表 */\nDECLARE @Indexes TABLE\n(\n     serverName\
    \      NVARCHAR(128)\n    ,schemaName      SYSNAME\n    ,schemaID        INT\n\
    \    ,databaseName    SYSNAME\n    ,databaseID      INT\n    ,tableName      \
    \ SYSNAME\n    ,objectID        INT\n    ,indexName       SYSNAME\n    ,indexID\
    \         INT\n    ,indexType       NVARCHAR(60)\n    ,isPrimaryKey    BIT\n \
    \   ,isUnique        BIT\n    ,isFiltered      BIT\n    ,isPartitioned   BIT\n\
    \    ,numberOfRows    BIGINT\n    ,totalPages      BIGINT\n);\n\n/* 遍历所有数据库 */\n\
    INSERT INTO @Indexes (serverName,schemaName,schemaID,databaseName,databaseID,tableName,objectID,indexName,indexID,indexType,isUnique,isPrimaryKey,isFiltered,isPartitioned,numberOfRows,totalPages)\n\
    EXECUTE sys.sp_MSforeachdb\n' USE ?;\nSELECT @@SERVERNAME\n    , SCHEMA_NAME(t.schema_id)\n\
    \    , t.schema_id\n    , DB_NAME()\n    , DB_ID()\n    , t.name\n    , t.object_id\n\
    \    , i.name\n    , i.index_id\n    , i.type_desc\n    , i.is_primary_key\n \
    \   , i.is_unique\n    , i.has_filter\n    , CASE WHEN COUNT(p.partition_id) >\
    \ 1 THEN 1 ELSE 0 END\n    , SUM(p.rows)\n    , SUM(au.total_pages)\nFROM sys.tables\
    \             AS t WITH (NOLOCK)\nJOIN sys.indexes            AS i WITH (NOLOCK)\n\
    \  ON i.object_id = t.object_id\nJOIN sys.partitions         AS p WITH (NOLOCK)\n\
    \  ON p.object_id = i.object_id\n  AND p.index_id = i.index_id\nJOIN sys.allocation_units\
    \   AS au WITH (NOLOCK)\n  ON au.container_id = p.partition_id\nWHERE i.index_id\
    \ <> 0 /* 排除堆 */\nGROUP BY SCHEMA_NAME(t.schema_id)\n    , t.schema_id\n    ,\
    \ t.name\n    , t.object_id\n    , i.name\n    , i.index_id\n    , i.type_desc\n\
    \    , i.has_filter\n    , i.is_unique\n    , i.is_primary_key;';\n\n/* 检索索引统计信息以返回到我们的中央存储库\
    \ */\nSELECT GETDATE() AS [captureDate]\n    ,i.serverName\n    ,i.schemaName\n\
    \    ,i.databaseName\n    ,i.tableName\n    ,i.indexName\n    ,i.indexType\n \
    \   ,i.isFiltered\n    ,i.isPartitioned\n    ,i.numberOfRows\n    ,ddius.user_seeks\
    \ AS [userSeeksSinceReboot]\n    ,ddius.user_scans AS [userScansSinceReboot]\n\
    \    ,ddius.user_lookups AS [userLookupsSinceReboot]\n    ,ddius.user_updates\
    \ AS [userUpdatesSinceReboot]\n    ,(i.totalPages * 8)/ 1024 AS [indexSizeInMB]/*\
    \ 页大小为 8KB */\n    ,dosi.sqlserver_start_time AS [lastReboot]\nFROM @Indexes AS\
    \ i\nJOIN sys.dm_db_index_usage_stats AS ddius\n    ON i.databaseID = ddius.database_id\n\
    \    AND i.objectID = ddius.object_id\n    AND i.indexID = ddius.index_id\nCROSS\
    \ APPLY sys.dm_os_sys_info AS dosi\nWHERE /* 排除系统数据库 */\n    i.databaseName NOT\
    \ IN('master','msdb','tempdb','model')\n/* 排除唯一索引；假设它们服务于业务功能 */\n    AND i.isUnique\
    \ = 0\n/* 排除主键；假设它们服务于业务功能 */\n    AND i.isPrimaryKey = 0\n/* 自上次服务器重启以来未执行过查找操作\
    \ */\n    AND ddius.user_seeks = 0;\n```\n\n![Image](img/sq.jpg) **提示** 清单 1-7\
    \ 中的 T-SQL 只是一个起点。您可以轻松修改此查询以返回诸如哪些聚集索引可能需要重新设计、哪些表具有最多的更新以及哪些表被查询最频繁等信息。\n\n\
    输出示例如下。\n\n```\ncaptureDate             serverName schemaName databaseName   \
    \    tableName\n----------------------- ---------- ---------- ------------------\
    \ ------------------\n2014-06-29 19:37:36.927 LOCALHOST  Production AdventureWorks2012\
    \ TransactionHistory\n2014-06-29 19:37:36.927 LOCALHOST  Production AdventureWorks2012\
    \ TransactionHistory\n2014-06-29 19:37:36.927 LOCALHOST  Sales      AdventureWorks2012\
    \ SalesOrderDetail\n\nindexName                                  indexType   \
    \ isFiltered isPartitioned numberOfRows\n------------------------------------------\
    \ ------------ ---------- ------------- ------------ IX_TransactionHistory_ProductID\
    \        NONCLUSTERED 0          0             1134431\nIX_TransactionHistory_ReferenceOrderID\
    \ NONCLUSTERED 0          0             1134431\nIX_SalesOrderDetail_ProductID\
    \          NONCLUSTERED 0          1             1213178\n\nuserSeeksSinceReboot\
    \ userScansSinceReboot userLookupsSinceReboot userUpdatesSinceReboot\n--------------------\
    \ -------------------- ---------------------- ----------------------\n0      \
    \              0                    0                      98\n0             \
    \       8                    0                      98\n0                    2\
    \                    0                      124\n\nindexSizeInMB lastReboot\n\
    ------------- -----------------------\n9             2014-06-28 19:15:28.837\n\
    21            2014-06-28 19:15:28.837\n28            2014-06-28 19:15:28.837\n\
    ```\n\n如您所见，这个查询比上一个更复杂一些。让我们讨论一下您在做什么。开发人员通常非常擅长识别性能问题。为什么？因为当查询速度慢时，通常有人会抱怨！解决方法涉及创建索引的情况并不少见，这可以减少\
    \ I/O 并缩短查询时间。然而，随着时间的推移，查询可能会发生变化——导致优化器使用不同的索引——或者可能该查询不再需要。与那些备受关注的影响用户的问题不同，这类变化往往会随着时间的推移悄然累积。最终，那个最初使用时非常有益的同一索引开始消耗不必要的资源——具体来说，它会降低插入速度、消耗宝贵的磁盘空间并增大备份大小。\n\
    \n掌握未使用索引的一种方法是搜索 `sys.dm_db_index_usage_stats` DMV。此 DMV 跟踪索引使用统计信息，包括索引被查找或扫描的次数以及执行的更新次数。此信息会在每次重启后刷新，因此请注意，最近重启的服务器可能会显示不准确的高数量“未使用”索引。此外，此信息仅是起点，您可以由此进一步研究是否应删除或重新设计索引；许多组织可能拥有不常被调用但对于重要的月度或年度报告而言却必不可少的索引。\n\
    \n另一个需要注意的重要事项是，此脚本使用了未公开记录的 `sp_MSforeachdb` 存储过程。这个存储过程执行的任务非常有用：它遍历每个数据库，执行传递给它的任何命令。出于多种原因——尤其是因为它是一个未公开记录且因此不受支持的存储过程，偶尔可能会跳过数据库——我们建议对生产工作负载使用\
    \ Aaron Bertrand 的 `sp_foreachdb` 存储过程代替。然而，为了保持简单，您将在示例中使用 `sp_MSforeachdb` 过程。\n\
    \n![Image](img/sq.jpg) **提示** Aaron Bertrand 的 `sp_foreachdb` 存储过程可以在 `www.mssqltips.com/sqlservertip/2201/making-a-more-reliable-and-flexible-spmsforeachdb`\
    \ 找到。\n"
- fmt: 'Now that you better understand the query and the expected output, let’s return
    to your package. Click `Parse Query` to ensure you do not have any errors in your
    syntax, and then click `Preview` to see a sample of the results. Click the `Columns`
    page to ensure that the column list has been successfully updated; then click
    `OK` to return to the Data Flow designer.


    You should now see an error in your data flow, as illustrated in [Figure 1-19](#9781484200834_Ch01.xhtml#Fig19).
    This is expected because you’ve changed the columns that your data source is providing,
    but your destination still expects the old column list.


    ![9781484200834_Fig01-19.jpg](images/9781484200834_Fig01-19.jpg)


    [Figure 1-19](#9781484200834_Ch01.xhtml#_Fig19). The completed data flow task


    Before you can fix this error, you need to return to SSMS to create a table to
    store this data. Create this table now using the code in [Listing 1-8](#9781484200834_Ch01.xhtml#list8).


    ## [Listing 1-8](#9781484200834_Ch01.xhtml#_list8). T-SQL Code to Create the dba_monitor_unusedIndexes
    Table


    ```sql

    USE dbaCentralLogging;

    GO


    CREATE TABLE dbo.dba_monitor_unusedIndexes

    (

         log_id                    INT IDENTITY(1,1)

        ,captureDate               DATETIME

        ,serverName                NVARCHAR(128)

        ,schemaName                SYSNAME

        ,databaseName              SYSNAME

        ,tableName                 SYSNAME

        ,indexName                 SYSNAME

        ,indexType                 NVARCHAR(60)

        ,isFiltered                BIT

        ,isPartitioned             BIT

        ,numberOfRows              BIGINT

        ,userSeeksSinceReboot      BIGINT

        ,userScansSinceReboot      BIGINT

        ,userLookupsSinceReboot    BIGINT

        ,userUpdatesSinceReboot    BIGINT

        ,indexSizeInMB             BIGINT

        ,lastReboot                DATETIME


    CONSTRAINT PK_dba_monitor_unusedIndexes

            PRIMARY KEY NONCLUSTERED(log_id)

    );


    CREATE CLUSTERED INDEX CIX_dba_monitor_unusedIndexes

        ON dbo.dba_monitor_unusedIndexes(captureDate);

    ```


    Return to Visual Studio and double-click the `Central Logging Database` icon to
    edit its properties. Change the `Name of the Table or the View` value to `[dbo].[dba_monitor_unusedIndexes]`,
    and then click the `Mappings` page. Because your source and destination are using
    the same column names, you can easily update the mappings by right-clicking in
    the space between `Available Input Columns` and `Available Destination Columns`
    and selecting `Map Items by Matching Names`. [Figure 1-20](#9781484200834_Ch01.xhtml#Fig20)
    illustrates this option.


    ![9781484200834_Fig01-20.jpg](images/9781484200834_Fig01-20.jpg)


    [Figure 1-20](#9781484200834_Ch01.xhtml#_Fig20). The `Map Items by Matching Names`
    option in the `Mappings` page


    Once more, the `log_id` column will not map to anything because it is an identity
    column. Click `OK` to return to the Data Flow designer, and then click the `Control
    Flow` tab.


    See how quickly that second data flow went? You can continue to easily add more
    metadata collection tasks using this method. All that you have left to do is to
    update your `LastMonitored` column in the `dba_monitor_SQLServerInstances` table.


    ![Image](images/sq.jpg) **Tip**  It may be tempting to create a one-size-fits-all
    package. However, it is generally a better idea to separate metadata collections
    into separate packages organized by frequency requirements. For example, the metadata
    you have collected in this chapter only requires periodic samples, such as daily
    or weekly collection. Metadata that requires more frequent collection, such as
    an hourly check for failed SQL Server Agent jobs, should be stored in a separate
    package.


    Add an `Execute SQL` task to your `Foreach Loop` container and rename it `Update
    LastMonitored`. Connect the Unused Indexes data flow to the `Update LastMonitored`
    `Execute SQL` task. Double-click the `Execute SQL` task to edit its properties.
    Select the `dbaCentralLogging` connection in the `Connection` drop-down, and then
    enter the code from [Listing 1-9](#9781484200834_Ch01.xhtml#list9) in the `SQLStatement`
    field.


    ## [Listing 1-9](#9781484200834_Ch01.xhtml#_list9). T-SQL Code to Update the LastMonitored
    Value in dba_monitor_SQLServerInstances


    ```sql

    UPDATE dbo.dba_monitor_SQLServerInstances

    SET LastMonitored = GETDATE()

    WHERE SQLServerInstance= ?;

    ```


    The question mark (`?`) informs the `Execute SQL` task to use a parameter to complete
    the SQL statement. Now you just need to map a variable to the parameter. To do
    this, click the `Parameter Mapping` page and click `Add`. Edit the properties
    as follows:


    *   Variable Name = `User::SQLServerInstance`

    *   Direction = `Input`

    *   Data Type = `NVARCHAR`

    *   Parameter Name = `0`

    *   Parameter Size = `128`


    Confirm that your mappings match those shown in [Figure 1-21](#9781484200834_Ch01.xhtml#Fig21),
    and then click `OK`.


    ![9781484200834_Fig01-21.jpg](images/9781484200834_Fig01-21.jpg)


    [Figure 1-21](#9781484200834_Ch01.xhtml#_Fig21). Parameter mapping in the `Execute
    SQL Task Editor`


    You are now ready to execute your package! To do this, select `Debug` ![image](images/arrow.jpg)
    `Start Debugging` from the menu, click the green `Run` icon in the toolbar, or
    press `F5`. Your package should resemble [Figure 1-22](#9781484200834_Ch01.xhtml#Fig22)
    when successfully executed.


    ![9781484200834_Fig01-22.jpg](images/9781484200834_Fig01-22.jpg)


    [Figure 1-22](#9781484200834_Ch01.xhtml#_Fig22). Successful execution of the `MetadataCollection`
    package


    Congratulations! You have now collected metadata from a list of servers and stored
    the results in a single, centralized database.


    This concludes our walk-through on collecting metadata via SSIS. However, as a
    diligent developer or DBA, you may want to consider many more tasks. First, as
    we discussed early on in this chapter, this package does not contain any exception
    handling or logging, which is outside the scope of this chapter. However, a best
    practice is to include some sort of exception handling and logging on every package.
    Second, we have only tipped the proverbial iceberg when it comes to collecting
    metadata. There is much more information to consider, such as security audits,
    error logs, SQL Server Agent job statuses, and much, much more. If you’re not
    sure where to start, consider ranking metadata tasks by criticality and adding
    incremental monitoring in descending order of importance. As a last piece of homework,
    you may want to consider setting up monitors to alert you when unfavorable conditions
    are met (for example, a SQL Server Agent job has failed or available space is
    getting low).


    ## Summary


    In this chapter, we discussed the importance of metadata. We explored some of
    the metadata that exists within SQL Server and provided two examples of useful
    T-SQL metadata queries. We identified a very flexible and reusable pattern for
    collecting database metadata in an enterprise environment. Lastly, we created
    an `Integration Services` package that retrieves a list of SQL Server instances
    to monitor and then logs the results to a centralized repository.


    # CHAPTER 2


    ![image](images/frontdot.jpg)


    ## Execution Patterns


    To fully understand SQL Server 2014 `Integration Services` execution, you must
    first understand the different deployment models. There are two: the package deployment
    model and the project deployment model. Each exposes and supports a different
    functionality. The package deployment model primarily supports legacy functionality.
    It is the model used in SSIS 2005 through SSIS 2008 R2. The new way of doing things
    involves the project deployment model. Certain execution methods, but not all,
    are available to both deployment models.'
