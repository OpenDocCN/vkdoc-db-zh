    ## Conclusion


    In this chapter, we surveyed many ways to execute an SSIS package. We examined
    the many built-in ways for convenient execution of SSIS packages. Then we kicked
    things up a notch by extending the SSISDB functionality. In the end, we produced
    a simple, yet functional, custom execution framework and demonstrated how to couple
    it to the scheduling capabilities of SQL Server Agent jobs to produce a custom
    parallel-/serial-capable execution engine. We built a .NET application to demonstrate
    the flexibility (and complexity) of executing SSIS packages from managed code.


