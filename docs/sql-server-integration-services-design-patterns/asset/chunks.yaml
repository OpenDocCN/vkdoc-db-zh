  trans: "\n# DB2 参数化查询与动态查询\n\n一旦设置好 Derive Parameters 属性，您就可以使用问号来编写查询，类似于 Listing\
    \ 6-2 中的示例。将查询放入源组件的 SQL 命令中。\n\n***Listing 6-2***. 用于说明 DB2 参数的示例查询\n```sql\n\
    SELECT col1\n        , col2\n        , col3\nFROM tab1\nWHERE col4 = ?\n```\n\n\
    请务必点击源中查询旁边的 Parameters 按钮，为设置的每个参数分配变量。确保 Parameters 窗口中的变量列表与查询中的顺序正确匹配。\n\n\
    有些场景下使用查询参数可能无效。让我们来看看何时不能使用查询参数以及替代方案。\n\n## DB2 源组件动态查询\n\n如果源查询的内容因任何原因需要更改，参数化查询将无法工作。作为查询内容的一部分，表名、架构名或列名可能会改变。DB2\
    \ 中的一个典型例子是每个环境都有不同的架构。为了解决这个问题，我们在变量上设置表达式，并在 `SQLStatement` 属性中使用该变量。让我们逐步了解设置过程。\n\
    \n首先创建两个字符串变量：`environment` 和 `query`。在 `query` 变量上设置以下属性：\n```\nEvaluateAsExpression:\
    \ True\nValue: \"select col1, col2 from\" + @environment + \".tab1\"\n```\n\n\
    ![Image](img/sq.jpg) **注意** 在 SQL Server 2012 之前的 Integration Services 版本中，表达式有\
    \ 4000 个字符的限制。现在此限制已取消，允许您根据需要创建任意长度的字符串。\n\n在 OLE DB 源组件中，将查询类型更改为 SQL Command\
    \ from Variable，并选择您刚刚设置的 `query` 变量，如 Figure 6-8 所示。\n\n![9781484200834_Fig06-08.jpg](img/9781484200834_Fig06-08.jpg)\n\
    \nFigure 6-8. 配置了动态查询属性的 OLE DB 源编辑器\n\n当此包运行时，使用包参数传入正确的环境架构名称。`query` 变量上的表达式将被设置为新的查询并正确执行。确保将\
    \ OLE DB 源上的 `ValidateExternalMetadata` 属性设置为 `False`，以确保包验证成功。\n\n## 总结\n\n本章介绍了连接\
    \ IBM DB2 数据库不同类型所需的多种模式。您学习了如何确定您拥有的 DB2 数据库类型、如何选择合适的提供程序以及查询数据库的不同方法。请注意，有些组织在处理\
    \ DB2 时会采取不同的途径：将数据导出到文件，然后使用 SSIS 加载该文件。如果存在网络延迟或连接到 DB2 数据库的问题，这是一个完全有效的选项，对您来说可能更有意义。如果您决定采用此方法，可以学习如何使用扁平文件源模式加载数据，这将在第\
    \ 7 章中讨论。\n\n# 第 7 章\n\n![image](img/frontdot.jpg)\n\n## 扁平文件源模式\n\n在系统之间传输数据的一种常见方法是将源数据导出到扁平文件，然后将该文件的内容导入目标数据库。扁平文件有各种形状、大小和类型。没有行长度限制。文件大小受操作系统允许的最大大小限制。在检查扁平文件类型时，有两个初步考虑因素：文件格式和模式。扁平文件源的常见文件格式包括：\n\
    \n*   逗号分隔值 (CSV)\n*   制表符分隔文件 (TDF)\n*   固定宽度文件\n\n在扁平文件中，与数据库一样，模式包含列和数据类型。模式选项还允许更奇特的文件格式选项，例如“ragged\
    \ right”和“variable-length rows”扁平文件。\n\n在本章中，我们将研究将普通扁平文件源加载到 SQL Server 中的常见模式；然后扩展该模式以加载可变行长扁平文件源。接下来，我们将研究创建和使用某些扁平文件格式中常见的文件头行。最后，我们将构建一个非常有用的\
    \ SSIS 设计模式：归档文件。\n\n### 扁平文件源\n\n让我们从一个简单的扁平文件源开始。您可以将下面的数据复制并粘贴到记事本等文本编辑器中，并将其另存为\
    \ `MyFlatFile.csv`：\n```\nRecordType,Name,Value\nA,Simple One,11\nB,Simple Two,22\n\
    C,Simple Three,33\nA,Simple Four,44\nC,Simple Five,55\nB,Simple Six,66\n```\n\n\
    列名位于第一行。这很方便，但您并不总能在第一行获得列名——或者在源扁平文件中的任何地方获得。\n\n在离开演示项目的设置阶段之前，让我们创建一个名为 `StagingDB`\
    \ 的数据库，用作目标。我使用 Listing 7-1 中的可重复执行 T-SQL 脚本来创建 `StagingDB` 数据库。\n\n***Listing\
    \ 7-1***. 创建 StagingDB\n```sql\nuse master\ngo\n\nIf Not Exists(Select name\n\
    \              From sys.databases\n              Where name='StagingDB')\n begin\n\
    \  print 'Creating StagingDB database'\n  Create Database StagingDB\n  print 'StagingDB\
    \ database created'\n end\nElse\n print 'StagingDb database already exists.'\n\
    ```\n\n在可用于测试和开发的服务器上执行此脚本。现在您已准备好开始构建演示！\n\n### 转到 SSIS！\n\n打开 SQL Server Data\
    \ Tools - Business Intelligence (SSDT-BI) 并创建一个名为 **Chapter 7** 的新 SSIS 项目，并将初始包重命名为\
    \ **Chapter7.dtsx**。将数据流任务拖到控制流画布上，然后双击它以打开编辑选项卡。\n\n有几种方法可以为数据流创建扁平文件源：您可以使用源助手，也可以展开数据流\
    \ SSIS 工具箱中的其他源并配置扁平文件源适配器。让我们使用后一种方法：将扁平文件源适配器从数据流工具箱拖到数据流画布上并打开编辑器。Figure 7-1\
    \ 显示了扁平文件源编辑器的连接管理器页面。\n\n![9781484200834_Fig07-01.jpg](img/9781484200834_Fig07-01.jpg)\n\
    \nFigure 7-1. 扁平文件源编辑器连接管理器配置\n\n由于这个新的 SSIS 项目中没有定义连接管理器，请单击扁平文件连接管理器下拉列表旁边的“新建”按钮以打开扁平文件源编辑器。在“常规”页面上，将连接管理器命名为\
    \ **My Flat File**。单击“文件名”文本框旁的“浏览”按钮，并导航到保存 `MyFlatFile.csv` 的位置。\n\n请注意，默认情况下，“文件名”文本框仅显示\
    \ `.txt` 文件。将筛选器更改为 `*.csv` 以便查看并选择 `MyFlatFile.csv`。\n\n如 Figure 7-2 所示，选中“第一行数据中包含列名称”复选框：\n\
    \n![9781484200834_Fig07-02.jpg](img/9781484200834_Fig07-02.jpg)\n\nFigure 7-2.\
    \ 配置 My Flat File 连接管理器\n\n请注意窗口底部的警告：此连接管理器的列尚未定义。对于格式正确的简单 CSV 文件，SSIS 现在有足够的信息来读取扁平文件的模式并完成连接管理器的映射。Figure\
    \ 7-3 显示了用于定义列和行分隔符的“列”页面。\n\n![9781484200834_Fig07-03.jpg](img/9781484200834_Fig07-03.jpg)\n\
    \nFigure 7-3. 扁平文件连接管理器编辑器的“列”页面\n\n默认情况下，扁平文件中的所有数据都是文本。\n\n单击“确定”按钮关闭扁平文件连接管理器编辑器，然后单击“确定”按钮关闭扁平文件源编辑器。\n\
    \n### 强类型化数据\n"
- fmt: '## 为什么需要使用强类型数据？


    考虑我们示例中的 `Value` 列。目前，`Value` 是 `DT_STR` 数据类型，但该列包含的是数值数据。实际上，这些数值数据是整数。根据联机丛书，在
    SQL Server 中，`INT` 数据类型占用 4 字节，范围从 –2^31 (–2,147,483,648) 到 2^31 – 1 (2,147,483,647)。如果你想将整数值
    –2,147,483,600 存储为文本，这将至少消耗每个字符 1 字节。在本例中，这至少是 11 字节（不计算逗号），根据所选数据类型，可能还会占用更多字节。将这些数据转换为
    `DT_I4` 数据类型允许我用 4 字节存储该值。作为额外的好处，数据是数值型的，因此对此字段的排序性能将优于对字符串数据类型的排序。


    ## 操作数据类型


    让我们来操作平面文件连接管理器和源适配器提供的数据类型。将一个派生列转换拖放到数据流画布上，并从平面文件源到新的派生列转换连接一条数据流路径。双击它以打开编辑器。


    在派生列编辑器右上部分的列表框中，展开 SSIS 表达式语言函数中的 `Type Casts` 虚拟文件夹。将一个 `DT_STR` 类型转换拖放到编辑器下部区域派生列网格第一行的
    `Expression` 单元格中。网格的 `Derived Column` 列默认为 “<add as="" new="" column="">”，但允许你选择替换流经转换的任何行中的值。你可以在行流经派生列转换时更改其值，但不能更改数据类型（而这正是你将要做的），因此你需要向数据流中添加一个新列。默认的派生列名称是
    `Derived Column` *n*，其中 *n* 是在转换中配置的列的从 1 开始的数组。将默认的派生列名称更改为 `` `strRecordType`
    ``。返回到 `Expression` 单元格，并通过将 *«length»* 占位符文本替换为所需的字段长度：1，来完成 `DT_STR` 强制转换函数。接下来，将
    *«code_page»* 占位符替换为与你的 Windows 代码页标识符匹配的数字。对于美式英语，这个数字是 1252。要完成配置，请在派生列转换编辑器左上部分的“可用输入”列表框中展开
    `Columns` 虚拟文件夹，并将 `RecordType` 列拖放到你刚刚配置的 `DT_STR` 强制转换函数右侧的 `Expression` 单元格中。


    当你在编辑器中点击其他任何位置时，转换的逻辑会验证该表达式。这其实一直在发生；当表达式状态出现问题时，`Expression` 中的文本颜色会变为红色。当你现在离开
    `Expression` 单元格时，表达式 `(DT_STR, 1, 1252) [RecordType]` 应该能通过验证。文本应变回黑色，表示表达式有效。


    你可以类似地创建带有强制转换表达式的其他列，以操作流经数据流的其它字段的数据类型。[图 7-4](#9781484200834_Ch07.xhtml#Fig4)
    展示了我在完成派生列转换编辑后的示例情况。


    ![9781484200834_Fig07-04.jpg](images/9781484200834_Fig07-04.jpg)


    [图 7-4](#9781484200834_Ch07.xhtml#_Fig4). 已配置的派生列转换


    ## 引入数据暂存模式


    数据暂存是一个重要的概念。每个 ETL 开发人员对暂存数据的最佳方式都有自己的想法和意见，并且每个人都认为自己的方式最好！（这是应该的……我们需要自信的 ETL
    开发人员）。在我看来，数据集成需求决定了暂存的数量和类型。


    对于平面文件，将所有数据复制到暂存表中是一种模式。一旦数据被捕获为可查询格式（关系数据库），在加载到目标数据仓库或数据集市之前，它们可以通过大量转换进行操作和塑形。


    除了平面文件，暂存还支持任何 ETL 解决方案提取阶段的一个关键原则：尽可能少地影响源系统记录。通常，构建 ETL 解决方案的一个重要业务驱动因素是出于报告目的查询系统记录中的数据存在困难。ETL
    的首要目标类似于希波克拉底誓言：“*Primum non nocere*”（首先，不伤害）。


    一些 ETL 的暂存需求适合存储所有源数据的副本，无论是否来自平面文件。其他需求则允许在暂存前应用一些转换逻辑。正确的答案是什么？“视情况而定。”在我看来，将数据从文本源复制并放入关系数据库的行为本身就代表了一种转换。


    于是，这就形成了一种数据暂存模式：将数据直接从平面文件复制到数据库中。为此，让我们完成我们已经开始的示例。


    将一个 OLE DB 目标适配器拖放到数据流画布上，并从派生列转换到 OLE DB 目标连接一条数据流路径。在继续之前，双击数据流路径以打开其编辑器，然后点击“元数据”选项卡。你会看到类似
    [图 7-5](#9781484200834_Ch07.xhtml#Fig5) 的内容。


    ![9781484200834_Fig07-05.jpg](images/9781484200834_Fig07-05.jpg)


    [图 7-5](#9781484200834_Ch07.xhtml#_Fig5). 数据流路径内部


    我经常将数据流中的缓冲区描述为“类表的”。这是我编造的一个形容词，但它很贴切。数据流路径的这次窥视就是证据。我们稍后会回到这个题外话。点击“确定”关闭数据流路径编辑器。


    将 OLE DB 目标适配器重命名为 `` `FlatFileDest` ``。打开 OLE DB 目标编辑器，点击 OLE DB 连接管理器下拉列表旁的“新建”按钮以配置一个
    OLE DB 连接管理器。当“配置 OLE DB 连接管理器”窗口显示时，点击“新建”按钮创建一个新的 OLE DB 连接管理器。在“服务器名称”下拉列表中，添加你的测试和开发服务器/实例（与你之前用于创建
    `StagingDB` 数据库的服务器/实例相同）。在“选择或输入数据库名称”下拉列表中，选择 `StagingDB`。点击“确定”按钮完成 OLE DB
    连接管理器配置，并点击下一个“确定”按钮以选择此新连接管理器用于 OLE DB 目标适配器。将 `Data Access Mode` 属性设置为 `Table
    or View – Fast Load` 并接受配置的默认属性。点击“表或视图的名称”下拉列表旁的“新建”按钮。“创建表”窗口显示了如 [清单 7-2](#9781484200834_Ch07.xhtml#list2)
    所示的 T-SQL 数据定义语言（DDL）语句。


    [***清单 7-2***](#9781484200834_Ch07.xhtml#_list2). 从数据流路径元数据生成的 CREATE TABLE 语句


    ```

    CREATE TABLE [FlatFileDest] (

        [RecordType] varchar(50),

        [Name] varchar(50),

        [Value ] varchar(50),

        [strRecordType] varchar(1),

        [strName] varchar(50),

        [intValue] int

    )

    ```


    OLE DB 目标将要创建的表名为 `FlatFileDest`——也就是你给 OLE DB 目标适配器起的名字。列名是从哪里来的呢？没错！来自我们之前查看的数据流路径元数据。当你细想时，这个功能非常酷。'
  raw: 'Why would you want to use strongly typed data? Consider the `Value` column
    in our example. Right now, `Value` is a DT_STR data type but the column contains
    numeric data. In fact, the numeric data is integers. In SQL Server, the INT data
    type consumes 4 bytes and covers the range from –2^31 (–2,147,483,648) through
    2^31 – 1 (2,147,483,647) according to Books Online. If you wanted to store the
    integer value –2,147,483,600 as text, this would consume at least 1 byte per character.
    In this case, that’s a minimum of 11 bytes (not counting the commas), and it could
    be more bytes depending on the data type chosen. Converting these data to the
    DT_I4 data type allows me to store that value in 4 bytes. As an added bonus, the
    data are numeric, so sorts on this field will outperform sorts on a string data
    type.


    Let’s manipulate the data types provided by the Flat File connection manager and
    source adapter. Drag a Derived Column transformation onto the data flow canvas
    and connect a data flow path from the flat file source to the new Derived Column
    transformation. Double-click it to open the editor.


    Expand the Type Casts virtual folder in the SSIS Expression Language functions
    provided in the listbox in the upper-right section of the Derived Column Editor.
    Drag a DT_STR type cast into the `Expression` cell of the first row of the Derived
    Column grid in the lower section of the editor. The `Derived Column` column of
    the grid defaults to “<add as="" new="" column="">” but allows you to choose to
    replace the value in any of the rows flowing through the transformation. You can
    make changes to the values as rows flow through the Derived Column transformation,
    but you cannot change the data type (which is precisely what you’re going to do
    here), so you need to add a new column to the data flow. The default derived column
    name is Derived Column</add> *n*, where *n* is a one-based array of columns configured
    in the transformation. Change the default derived column name to **strRecordType**.
    Return to the `Expression` cell and complete the DT_STR cast function by replacing
    the *«length»* placeholder text with the desired length of the field: 1\. Next,
    replace the *«code_page»* placeholder with the number that matches your Window
    Code Page identifier. For U.S. English, this number is 1252\. To complete the
    configuration, expand the Columns virtual folder in the Available Inputs listbox
    located in the upper-left section of the Derived Column Transformation Editor,
    and drag the `RecordType` column into the `Expression` cell to the right of the
    DT_STR cast function that you just configured.


    When you click anywhere else in the editor, the logic of the transformation validates
    the expression. This has been happening all along; the text color was being changed
    to red in the `Expression` when an issue was encountered with the state of the
    expression. When you navigate off the `Expression` cell now, the expression `(DT_STR,
    1, 1252) [RecordType]` should pass muster. The text should return to black to
    indicate a valid expression.


    You can similarly create additional columns with casting expressions to manipulate
    the data types of the other fields moving through the data flow. [Figure 7-4](#9781484200834_Ch07.xhtml#Fig4)
    shows how my example looks when I’ve completed editing the Derived Column transformation.


    ![9781484200834_Fig07-04.jpg](images/9781484200834_Fig07-04.jpg)


    [Figure 7-4](#9781484200834_Ch07.xhtml#_Fig4). Derived Column transformation,
    configured


    Introducing a Data-Staging Pattern


    Data staging is an important concept. Every ETL developer has thoughts and opinions
    about the best way to stage data, and each thinks their way is best! (This is
    as it should be . . . we want and need confident ETL developers). In my opinion,
    the data integration requirements drive the amount and type of staging.


    For flat files, copying all the data into staging tables represents one pattern.
    Once the data are captured in a query-able format (a relational database), they
    can be manipulated and shaped by numerous transformations before they are loaded
    into the destination data warehouse or data mart.


    Beyond flat files, staging supports a key tenet of the Extraction phase of any
    ETL solution: impact the source system-of-record as little as possible. Often,
    an important business driver for building an ETL solution in the first place is
    the difficulty of querying data in the system-of-record for reporting purposes.
    ETL’s first goal is similar to that of the Hippocratic Oath: “*Primum non nocere*”
    (First, do no harm).


    Staging requirements for some ETL lend themselves to storing a copy of all source
    data, whether from flat files or not. Other requirements allow for applying some
    transformative logic prior to staging. Which is the correct answer? “It depends.”
    In my opinion, the very act of copying data from a text source and landing it
    in a relational database represents a transformation.


    This, then, becomes a pattern of staging data: copying data straight from a flat
    file into a database. To that end, let’s complete the example we’ve started.


    Drag an OLE DB Destination adapter onto the data flow canvas and connect a data
    flow path from the Derived Column transformation to the OLE DB destination. Before
    you proceed, double-click on the data flow path to open its editor, and then click
    on the Metadata page. You’ll see something that looks like [Figure 7-5](#9781484200834_Ch07.xhtml#Fig5).


    ![9781484200834_Fig07-05.jpg](images/9781484200834_Fig07-05.jpg)


    [Figure 7-5](#9781484200834_Ch07.xhtml#_Fig5). Inside the data flow path


    I often describe the buffers inside the data flow as “table-ish.” It’s an adjective
    I made up, but it fits. This peek under the hood of a data flow path is evidence.
    We’ll come back to this diversion shortly. Click OK to close the Data Flow Path
    Editor.


    Rename the OLE DB destination adapter `FlatFileDest`. Open the OLE DB Destination
    Editor and click the New button beside the OLE DB Connection Manager drop-down
    to configure an OLE DB connection manager. When the Configure OLE DB Connection
    Manager window displays, click the New button to create a new OLE DB connection
    manager. Add the name of your testing and development server/instance (the same
    server/instance you used earlier to create the `StagingDB` database) in the Server
    Name drop-down. In the Select or Enter a Database Name drop-down, select StagingDB.
    Click the OK button to complete the OLE DB connection manager configuration, and
    click the next OK button to select this new connection manager for use with the
    OLE DB destination adapter. Set the `Data Access Mode` property to `Table or View
    – Fast Load` and accept the default properties configured. Click the New button
    beside the Name of the Table or the View drop-down. The Create Table window displays
    the T-SQL data definition language (DDL) statement shown in [Listing 7-2](#9781484200834_Ch07.xhtml#list2).


    [***Listing 7-2***](#9781484200834_Ch07.xhtml#_list2). The CREATE TABLE Statement
    Generated from the Data Flow Path Metadata


    ```

    CREATE TABLE [FlatFileDest] (

        [RecordType] varchar(50),

        [Name] varchar(50),

        [Value ] varchar(50),

        [strRecordType] varchar(1),

        [strName] varchar(50),

        [intValue] int

    )

    ```


    The name of the table the OLE DB destination is going to create is `FlatFileDest`—the
    name you gave the OLE DB destination adapter. Where did the column names come
    from? That’s right! From the data flow path metadata we viewed earlier. This functionality
    is pretty cool, when you think about it.'
  trans: '

    ## 为何需要使用强类型数据？


    以我们示例中的 `Value` 列为例。目前，`Value` 是 `DT_STR` 数据类型，但该列包含的是数值数据。实际上，这些数值数据是整数。根据联机丛书，在
    SQL Server 中，`INT` 数据类型占用 4 字节，范围从 –2³¹ (–2,147,483,648) 到 2³¹ – 1 (2,147,483,647)。如果你想将整数值
    –2,147,483,600 存储为文本，这将至少消耗每个字符 1 字节。在本例中，这至少是 11 字节（不计算逗号），根据所选数据类型，可能还会占用更多字节。将这些数据转换为
    `DT_I4` 数据类型允许我用 4 字节存储该值。作为额外的好处，数据是数值型的，因此对此字段的排序性能将优于对字符串数据类型的排序。


    ## 操作数据类型


    让我们来操作平面文件连接管理器和源适配器提供的数据类型。将一个派生列转换拖放到数据流画布上，并从平面文件源到新的派生列转换连接一条数据流路径。双击它以打开编辑器。


    在派生列编辑器右上部分的列表框中，展开 SSIS 表达式语言函数中的 `Type Casts` 虚拟文件夹。将一个 `DT_STR` 类型转换拖放到编辑器下部区域派生列网格第一行的
    `Expression` 单元格中。网格的 `Derived Column` 列默认为 “<add as="" new="" column="">”，但允许你选择替换流经转换的任何行中的值。你可以在行流经派生列转换时更改其值，但不能更改数据类型（而这正是你将要做的），因此你需要向数据流中添加一个新列。默认的派生列名称是
    `Derived Column` *n*，其中 *n* 是在转换中配置的列的从 1 开始的数组。将默认的派生列名称更改为 `` `strRecordType`
    ``。返回到 `Expression` 单元格，并通过将 *«length»* 占位符文本替换为所需的字段长度：1，来完成 `DT_STR` 强制转换函数。接下来，将
    *«code_page»* 占位符替换为与你的 Windows 代码页标识符匹配的数字。对于美式英语，这个数字是 1252。要完成配置，请在派生列转换编辑器左上部分的“可用输入”列表框中展开
    `Columns` 虚拟文件夹，并将 `RecordType` 列拖放到你刚刚配置的 `DT_STR` 强制转换函数右侧的 `Expression` 单元格中。


    当你在编辑器中点击其他任何位置时，转换的逻辑会验证该表达式。这其实一直在发生；当表达式状态出现问题时，`Expression` 中的文本颜色会变为红色。当你现在离开
    `Expression` 单元格时，表达式 `(DT_STR, 1, 1252) [RecordType]` 应该能通过验证。文本应变回黑色，表示表达式有效。


    你可以类似地创建带有强制转换表达式的其他列，以操作流经数据流的其它字段的数据类型。图 7-4 展示了我在完成派生列转换编辑后的示例情况。


    ![9781484200834_Fig07-04.jpg](img/9781484200834_Fig07-04.jpg)


    图 7-4. 已配置的派生列转换


    ## 引入数据暂存模式


    数据暂存是一个重要的概念。每个 ETL 开发人员对暂存数据的最佳方式都有自己的想法和意见，并且每个人都认为自己的方式最好！（这是应该的……我们需要自信的 ETL
    开发人员）。在我看来，数据集成需求决定了暂存的数量和类型。


    对于平面文件，将所有数据复制到暂存表中是一种模式。一旦数据被捕获为可查询格式（关系数据库），在加载到目标数据仓库或数据集市之前，它们可以通过大量转换进行操作和塑形。


    除了平面文件，暂存还支持任何 ETL 解决方案提取阶段的一个关键原则：尽可能少地影响源系统记录。通常，构建 ETL 解决方案的一个重要业务驱动因素是出于报告目的查询系统记录中的数据存在困难。ETL
    的首要目标类似于希波克拉底誓言：“*Primum non nocere*”（首先，不伤害）。


    一些 ETL 的暂存需求适合存储所有源数据的副本，无论是否来自平面文件。其他需求则允许在暂存前应用一些转换逻辑。正确的答案是什么？“视情况而定。”在我看来，将数据从文本源复制并放入关系数据库的行为本身就代表了一种转换。


    于是，这就形成了一种数据暂存模式：将数据直接从平面文件复制到数据库中。为此，让我们完成我们已经开始的示例。


    将一个 OLE DB 目标适配器拖放到数据流画布上，并从派生列转换到 OLE DB 目标连接一条数据流路径。在继续之前，双击数据流路径以打开其编辑器，然后点击“元数据”选项卡。你会看到类似
    图 7-5 的内容。


    ![9781484200834_Fig07-05.jpg](img/9781484200834_Fig07-05.jpg)


    图 7-5. 数据流路径内部


    我经常将数据流中的缓冲区描述为“类表的”。这是我编造的一个形容词，但它很贴切。数据流路径的这次窥视就是证据。我们稍后会回到这个题外话。点击“确定”关闭数据流路径编辑器。


    将 OLE DB 目标适配器重命名为 `` `FlatFileDest` ``。打开 OLE DB 目标编辑器，点击 OLE DB 连接管理器下拉列表旁的“新建”按钮以配置一个
    OLE DB 连接管理器。当“配置 OLE DB 连接管理器”窗口显示时，点击“新建”按钮创建一个新的 OLE DB 连接管理器。在“服务器名称”下拉列表中，添加你的测试和开发服务器/实例（与你之前用于创建
    `StagingDB` 数据库的服务器/实例相同）。在“选择或输入数据库名称”下拉列表中，选择 `StagingDB`。点击“确定”按钮完成 OLE DB
    连接管理器配置，并点击下一个“确定”按钮以选择此新连接管理器用于 OLE DB 目标适配器。将 `Data Access Mode` 属性设置为 `Table
    or View – Fast Load` 并接受配置的默认属性。点击“表或视图的名称”下拉列表旁的“新建”按钮。“创建表”窗口显示了如 清单 7-2 所示的
    T-SQL 数据定义语言（DDL）语句。


    ***清单 7-2***. 从数据流路径元数据生成的 CREATE TABLE 语句


    ```

    CREATE TABLE [FlatFileDest] (

        [RecordType] varchar(50),

        [Name] varchar(50),

        [Value ] varchar(50),

        [strRecordType] varchar(1),

        [strName] varchar(50),

        [intValue] int

    )

    ```


    OLE DB 目标将要创建的表名为 `FlatFileDest`——也就是你给 OLE DB 目标适配器起的名字。列名是从哪里来的呢？没错！来自我们之前查看的数据流路径元数据。当你细想时，这个功能非常酷。

