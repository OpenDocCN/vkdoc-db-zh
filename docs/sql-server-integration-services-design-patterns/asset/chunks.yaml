    ## Summary


    At this point, we described why you would want to use certain `SQL Server` sources
    over others, how to set up the source, and how to clean up the source query to
    get the best performance out of your package. We also covered sources in general
    to set up the rest of the source chapters.


    Although all of the principles described in this chapter are patterns for `SQL
    Server`, you can apply many of them to other source types as well. Be sure to
    review the rest of the source chapters for patterns that you can use for `SQL
    Server` in addition to what we have already discussed.


    # CHAPTER 5


    ![image](images/frontdot.jpg)


    ## Data Correction with Data Quality Services


    `Data Quality Services` (`DQS`) was first introduced in `SQL Server 2012`. It
    provides data correction and data deduplication functionality—key components for
    most `Extract, Transform, and Load` (`ETL`) processes. This chapter describes
    how `DQS` integrates with `SSIS` and provides patterns that enable you to achieve
    reliable, low-effort data cleansing within your `ETL` packages.


    ![Image](images/sq.jpg) **Note** The `Data Quality Services` product requires
    some manual steps post-installation to create the `DQS` databases and set default
    permissions. See the “Install Data Quality Services” page in Books Online for
    more information: `http://msdn.microsoft.com/en-us/library/gg492277.aspx`.


    ### Overview of Data Quality Services


    The data cleansing and matching operations you perform with `DQS` revolve around
    the use of a knowledge base. A knowledge base (or `KB`) is made up of one or more
    domains. An example domain for doing address cleansing would be `City`, `State`,
    or `Country`. Each of these fields would be a separate domain. Two or more related
    domains can be grouped together to form a composite domain (or `CD`). Composite
    domains allow you to validate multiple fields as a single unit. For example, a
    `Company` composite domain could be made up of `Name`, `Address`, `City`, `State`,
    and `Country` domains. Using a composite domain would allow you to validate that
    `Microsoft Corporation` (`Name`) exists at `One Redmond Way` (`Address`), `Redmond`
    (`City`), `WA` (`State`), `USA` (`Country`). If the `DQS` `KB` has all of the
    relevant knowledge, it would be able to flag the entry as incorrect if you had
    `Las Vegas` as the `City`—even though `Las Vegas` is a valid city name, the knowledge
    base has defined that the Microsoft office is located in `Redmond`.


    `Data Quality Services` has three main components: the client utility (shown in
    [Figure 5-1](#9781484200834_Ch05.xhtml#Fig1)), which allows you to build and manage
    your knowledge bases; an `SSIS` data flow transform for bulk data cleansing; and
    a server component, where the actual cleansing and matching takes place. The `DQS`
    server is not a standalone instance. It is essentially a set of user databases
    (`DQS_MAIN`, `DQS_PROJECTS`, `DQS_STAGING_DATA`) with a stored procedure-based
    `API`, much like the `SSIS` Catalog that was introduced in `SQL Server 2012`.


    ![9781484200834_Fig05-01.jpg](images/9781484200834_Fig05-01.jpg)


    [Figure 5-1](#9781484200834_Ch05.xhtml#_Fig1). The Data Quality Client application


    ### Using the Data Quality Client


    The `Data Quality Client` application is used to build and manage your knowledge
    bases. It can also be used as a standalone tool for cleansing data. The tool is
    targeted toward data stewards and IT professionals who own and manage data within
    your organization. Users of the tool will fall into three different roles (shown
    in [Table 5-1](#9781484200834_Ch05.xhtml#Tab1)), which map to roles within the
    main `DQS` database. The functionality you can access through the tool will depend
    on what role you are currently assigned to.


    [Table 5-1](#9781484200834_Ch05.xhtml#_Tab1). Data Quality Services Roles


    | Name | SQL Role | Description |

    | --- | --- | --- |

    | `DQS KB Operator` | `dqs_kb_operator` | User can edit and execute an existing
    data quality project. |

    | `DQS KB Editor` | `dqs_kb_editor` | User can perform project functions and create
    and edit knowledge bases. |

    | `DQS Administrator` | `dqs_administrator` | User can perform project and knowledge
    functions, as well as administer the system. |


    ![Image](images/sq.jpg) **Note** Members of the `sysadmin` role on the `SQL Server`
    instance on which `DQS` is hosted have the same level of permissions as a `DQS
    Administrator` by default. It is recommended that you still associate users with
    one of the three `DQS` roles.


    ### Knowledge Base Management


    The options under the `Knowledge Base Management` section allow you to create
    and maintain your knowledge bases. When creating a new knowledge base, you have
    the option to create an empty knowledge base, or to base it on an existing knowledge
    base, which will prepopulate the new knowledge base with the domains from the
    original. Knowledge bases can also be created from a `DQS` file (`.dqs` extension),
    allowing you to back up or share knowledge bases across systems.


    You’ll perform three main activities when interacting with your knowledge bases
    through this `UI` (shown in [Figure 5-2](#9781484200834_Ch05.xhtml#Fig2)). These
    activities are available after you’ve created a new knowledge base or have opened
    an existing one.


    ![9781484200834_Fig05-02.jpg](images/9781484200834_Fig05-02.jpg)


    [Figure 5-2](#9781484200834_Ch05.xhtml#_Fig2). Knowledge base management activities


    When doing `Domain Management`, you can verify and modify the domains within the
    knowledge base. This includes changing domain properties (shown in [Figure 5-3](#9781484200834_Ch05.xhtml#Fig3)),
    configuring online reference data, as well as viewing and modifying rules and
    values. You also have the option to export the knowledge base or individual domains
    to a `DQS` file, as well as to import new domains from a `DQS` file.


    ![9781484200834_Fig05-03.jpg](images/9781484200834_Fig05-03.jpg)


    [Figure 5-3](#9781484200834_Ch05.xhtml#_Fig3). The Domain Properties tab of the
    Domain Management activity in the DQS Client


    `Knowledge Discovery` is a computer-assisted process to build knowledge base information.
    You supply source data (from a `SQL Server` table or view or `Excel` file), and
    map the input columns to knowledge base domains. This data will be imported into
    `DQS` and stored as a set of known domain values.'
