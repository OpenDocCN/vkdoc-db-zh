  trans: "\n脚本任务能够在运行时读取和修改包属性，包括变量值和所有连接管理器属性。清单 17-9 提供了一个脚本任务的示例代码，该任务在运行时设置连接管理器的\
    \ `ConnectionString`。\n\n## 清单 17-9. 使用脚本任务设置包属性的示例代码\n\n```csharp\npublic void\
    \ Main()\n{\n    // TODO: 从外部配置文件设置此值\n    const string SourceSystemConnectionString\
    \ = \"...\";\n\n    Dts.TaskResult = (int)ScriptResults.Success;\n\n    if (Dts.Connections.Contains(\"\
    SourceSystem\"))\n    {\n        ConnectionManager cm = Dts.Connections[\"SourceSystem\"\
    ];\n        cm.ConnectionString = SourceSystemConnectionString;\n    }\n    else\n\
    \    {\n        // 未找到预期的连接管理器 - 记录并设置错误状态\n        Dts.Events.FireError(0, \"\
    Script Task\",\n                            \"Could not find the SourceSystem\
    \ connection manager\",\n                            string.Empty, 0);\n\n   \
    \     Dts.TaskResult = (int)ScriptResults.Failure;\n    }\n}\n```\n\n## 动态包执行\n\
    \n在此方法中，您将使用清单 17-5 中的同一个表，但不是使用 SSIS 包读取配置值，而是使用 T-SQL 在 SSIS 目录上创建动态包执行。清单 17-10\
    \ 中的代码实现了以下步骤：\n\n1.  声明脚本变量。请注意，在实际脚本中，这些值将通过参数或外部源设置。\n2.  从 `PackageConfiguration`\
    \ 表读取要处理的文件列表，并将结果存储在表变量 (`@FileList`) 中。\n3.  遍历文件列表。对于每个文件，代码将执行以下操作：\n    1.\
    \  从表变量中检索 ID 和参数值。\n    2.  创建一个新的 SSIS 目录包执行。\n    3.  设置 `Directory` 和 `FileName`\
    \ 参数值。\n    4.  启动执行。\n    5.  更新 `PackageConfiguration` 表以标记该文件已处理。\n\n## 清单\
    \ 17-10. 动态包执行脚本\n\n```sql\nDECLARE @FolderName NVARCHAR(50) = N'ExecutionDemo'\n\
    DECLARE @ProjectName NVARCHAR(50) = N'ETL'\nDECLARE @DirectoryParameter NVARCHAR(50)\
    \ = N'Directory'\nDECLARE @FileNameParameter NVARCHAR(50) = N'FileName'\nDECLARE\
    \ @PackageName NVARCHAR(100) = N'LoadCustomers.dtsx'\n\nDECLARE @FileList TABLE\
    \ (\n  RowNum smallint,\n  Id int,\n  Directory nvarchar(255),\n  Name nvarchar(255)\n\
    )\n\nINSERT INTO @FileList (RowNum, Id, Directory, Name)\n                 SELECT\
    \ ROW_NUMBER() OVER (ORDER BY id), id, Directory, Name\n         FROM [dbo].[PackageConfiguration]\n\
    \         WHERE processed = 0\n\nDECLARE @maxCount int = (SELECT MAX(RowNum) FROM\
    \ @FileList)\nDECLARE @count int = (SELECT MIN(RowNum) FROM @FileList)\n\nWHILE\
    \ (@count <= @maxCount)\nBEGIN\n\n         DECLARE @Id NVARCHAR(255) = (SELECT\
    \ Id FROM @FileList WHERE RowNum = @count)\n         DECLARE @DirectoryValue NVARCHAR(255)\
    \ = (SELECT Directory FROM @FileList WHERE RowNum = @count)\n         DECLARE\
    \ @NameValue NVARCHAR(255) = (SELECT Name FROM @FileList WHERE RowNum = @count)\n\
    \n         -- 创建包执行\n         DECLARE @exec_id bigint\n         EXEC [SSISDB].[catalog].[create_execution]\n\
    \                   @execution_id = @exec_id OUTPUT,\n                   @package_name\
    \ = @PackageName,\n                   @folder_name = @FolderName,\n          \
    \         @project_name = @ProjectName\n\n         -- 设置 Directory 参数值\n     \
    \    EXEC [SSISDB].[catalog].[set_execution_parameter_value]\n               \
    \    @execution_id = @exec_id,\n                   @object_type = 20,\n      \
    \             @parameter_name = @DirectoryParameter,\n                   @parameter_value\
    \ = @DirectoryValue\n\n         -- 设置 File Name 参数值\n         EXEC [SSISDB].[catalog].[set_execution_parameter_value]\n\
    \                   @execution_id = @exec_id,\n                   @object_type\
    \ = 20,\n                   @parameter_name = @FileNameParameter,\n          \
    \         @parameter_value = @NameValue\n\n         -- 启动包执行\n         EXEC [SSISDB].[catalog].[start_execution]\
    \ @exec_id\n\n         -- 返回执行 ID\n         SELECT N'Started package execution\
    \ ' + CONVERT(nvarchar(20), @exec_id)\n\n         -- 标记文件为已处理\n         DECLARE\
    \ @UpdateSql nvarchar(1024) = N'UPDATE [dbo].[PackageConfiguration] SET processed\
    \ = 1\n         WHERE id = ' + CONVERT(nvarchar(20), @Id)\n         EXEC sp_sqlexec\
    \ @UpdateSql\n\n         SET @count = @count + 1\nEND\n```\n\n## 结论\n\n本章介绍了一些新参数模型的使用模式，以及一些动态配置场景。尽管在\
    \ SQL 2005 和 2008 中常用的配置模式和最佳实践在最新版本的 SSIS 中仍然有效，但大多数用户会发现迁移到新模型是有益的。参数模型的清晰性旨在帮助参与\
    \ SSIS 解决方案生命周期的每个人，从开发包的人员到部署和调度它们的人员。\n\n# 第 18 章 部署\n\n在 SQL Server 2012 中，Integration\
    \ Services 项目的部署过程得到了极大简化。Visual Studio 中的项目现在可以定位两种不同的部署模型——包部署模型（类似于该产品早期版本中使用的模型）和项目部署模型（专为新的\
    \ SSIS 目录设计）。\n\n本章将重点介绍与新的项目部署模型和基于服务器的部署相关的模式。虽然项目模型和 SSIS 目录是推荐的部署方式，但从早期版本升级的组织可能已经拥有依赖基于文件系统部署的包执行框架。\n\
    \n![Image](img/sq.jpg) **注意** SSIS 包部署在 SQL Server 2012 和 SQL Server 2014 之间没有变化。\n\
    \n## 项目部署模型\n\n新的项目模型是 SQL Server 2014 中创建 SSIS 项目时的默认目标。使用此模型，在项目的生成阶段，包和其他项目项（如共享连接管理器）会捆绑到扩展名为\
    \ `.ispac` 的单个文件中。然后可以使用部署向导将此文件部署到 SSIS 目录，或使用 `dtexec.exe` 直接执行。\n\n如果您的项目定位的是包部署模型，您可以在\
    \ Visual Studio 中转换为项目部署模型。在解决方案资源管理器窗口中右键单击项目名称，然后选择 **转换为项目部署模型**（如图 18-1 所示）。转换为项目部署模型将启动项目转换向导。该向导通过更新执行包任务以使用项目引用，并将配置更改为参数，帮助您转换到新模型。\n\
    \n![9781484200834_Fig18-01.jpg](img/9781484200834_Fig18-01.jpg)\n图 18-1. SSDT-BI\
    \ 提供了转换为项目部署模型的选项\n\n项目部署模型中的 Integration Services 项目可以利用参数、共享连接管理器和项目引用等新功能。项目引用允许执行包任务无需使用连接管理器即可定位子包，并大大简化了部署过程。\n\
    \n## SSIS 目录\n\nSSIS 目录在 SQL Server 2012 中添加，是 Integration Services 项目的推荐部署目标。部署到目录通常使用\
    \ SSIS 部署向导完成，该向导可以从 SSDT-BI、SSMS 内部启动，从 Windows 资源管理器双击 SSIS 项目文件 (`.ispac`)，或者通过运行\
    \ `ISDeploymentWizard` 来启动。\n"
- fmt: '# Deployment Methods


    This section describes the different deployment methods supported by the SSIS
    Catalog. The method you choose will depend on your environment, and what the people
    doing the deployment – whether they are developers, ETL operators, or DBAs – are
    most comfortable with. The deployment methods described here include:

    * Deployment from the command line

    * Deployment using custom code

    * Deployment using PowerShell

    * Deployment using SQL


    ## Deployment from the Command Line


    The Deployment Wizard (`ISDeploymentWizard.exe`) provides a command line interface,
    which allows you to deploy to the SSIS Catalog without a UI. This is very useful
    for deploying from scripts, or as part of a batch process.


    [Table 18-1](#9781484200834_Ch18.xhtml#_Tab1) shows the list of supported parameters.
    [Listing 18-1](#9781484200834_Ch18.xhtml#_list1) provides an example command line
    that deploys a project (`C:\ETL\Project.ispac`) to a folder named MyFolder on
    a local SSIS Catalog.


    ### Integration Services Deployment Wizard command line parameters


    | Parameter | Short Version | Description |

    | --- | --- | --- |

    | `Silent[+\|-]` | `S` | When this option is true, the deployment will be done
    in a UI-less mode (command line only). Use this option when deploying from batch
    files. The default value is ‘-‘, which will display the UI. Example: `/Silent+`
    |

    | `SourceType:{File\|Server}` | `ST` | This option specifies whether the source
    project comes from the file system, or another SSIS Catalog. The default value
    is "File." Example: `/SourceType:File` |

    | `SourcePath:path_to_project` | `SP` | The path to the `.ispac` file being deployed
    (when using the `File` source), or the path to the project name (when using the
    `Server` source). Example: `/SourcePath:C:\ETL\project.ispac` |

    | `SourceServer:server_instance` | `SS` | The name of the server instance when
    the `SourceType` is set to `Server`. Example: `/SourceServer:localhost\SQL1` |

    | `ProjectPassword:password` | `PP` | If the source `.ispac` file is password
    protected, this parameter can be used to supply the password. Note that specifying
    a password on the command line is not recommended, as other users on the system
    might be able to see the arguments. If your project file is using password encryption,
    consider specifying the password in the response file (see the `@<file>` option
    for more information) |

    | `DestinationServer:server_instance` | `DS` | The name of the server instance
    you are deploying to. Example: `/DestinationServer:localhost` |

    | `DestinationPath:path` | `DP` | The path you want to deploy the project to on
    the destination server. The format of the path is `"/<catalog>/<folder>/<project>"`.
    Example: `/DestinationPath:/SSISDB/MyFolder/Project` |

    | `@<file>` | | This option allows you to specify all of your command line arguments
    in a text file, instead of entering them directly on the command line. Example:
    `@arguments.txt` |


    ### Listing 18-1: Deploying a project from the command line

    ```

    ISDeploymentWizard.exe /Silent /SourcePath:"C:\ETL\Project.ispac" /DestinationServer:"localhost"
    /DestinationPath:"/SSISDB/MyFolder/Project"

    ```


    > **Note**: When the Deployment Wizard is run in interactive (UI) mode, the Review
    page displays the equivalent parameters to do a command line based deployment.
    This can be a handy shortcut – simply copy the command line arguments into a batch
    file to perform automatic deployments in the future.


    ## Deployment Using Custom Code


    The SSIS Catalog has a managed .NET API called the Management Object Model (or
    MOM). This API allows you to programmatically perform that same management tasks
    that would normally be done through SQL Server Management Studio (SSMS), including
    Folder creation, and deployment of projects.


    [Listing 18-2](#9781484200834_Ch18.xhtml#_list2) provides a sample C# application
    that makes use of the MOM to create a new Folder in an SSIS Catalog, and deploys
    a project to it. The core functionality can be found in the `Microsoft.SqlServer.Management.IntegrationServices`
    assembly, which is installed with SSMS and found in the Global Assembly Cache
    (GAC), along with all of its dependencies.


    > **Tip**: If you can’t find the `Microsoft.SQLServer.ManagedDTS.dll` file, then
    look in the .Net Framework 4.0 Global Assembly Cache (GAC) directory, which often
    in a default install will be `C:\Windows\Microsoft.NET\assembly`.


    ### Listing 18-2: Deploying a project using the Management Object Model

    ```

    using System;

    using System.Collections.Generic;

    using System.Linq;

    using System.Text;

    using Microsoft.SqlServer.Management.IntegrationServices;

    using Microsoft.SqlServer.Management.Smo;

    using Microsoft.SqlServer.Dts.Runtime;

    using System.IO;


    class Program

    {

        const string ProjectFileLocation = @"C:\ETL\Project.ispac";

        static void Main(string[] args)

        {

            // Connect to the default instance on localhost

            var server = new Server("localhost");

            var store = new IntegrationServices(server);

            // Check that we have a catalog

            if (store.Catalogs.Count == 0)

            {

                Console.WriteLine("SSIS catalog not found on localhost.");

            }

            // Get the SSISDB catalog - note that there should only

            // be one, but the API may support multiple catalogs

            // in the future

            var catalog = store.Catalogs["SSISDB"];

            // Create a new folder

            var folder = new CatalogFolder(catalog,

                                          "MyFolder",

                                          "Folder that holds projects");

            folder.Create();

            // Make sure the project file exists

            if (!File.Exists(ProjectFileLocation))

            {

                Console.WriteLine("Project file not found at: {0}",

                                  ProjectFileLocation);

            }

            // Load the project using the SSIS API

            var project = Project.OpenProject(ProjectFileLocation);

            // Deploy the project to the folder we just created

            folder.

    ```


    ## Launching the Deployment Wizard from SSDT-BI


    To launch the Deployment Wizard from SSDT-BI, right click on the project in the
    Solution Explorer and select the `Deploy` option. The wizard will automatically
    load your project file, putting you on the Select Destination page (as show in
    [Figure 18-2](#9781484200834_Ch18.xhtml#Fig2)).


    ![9781484200834_Fig18-02.jpg](images/9781484200834_Fig18-02.jpg)


    [Figure 18-2](#9781484200834_Ch18.xhtml#_Fig2). The Integration Services Deployment
    Wizard can be launched from SSDT-BI


    > **Note**: The Deployment Wizard is typically used to deploy files to the SSIS
    Catalog, but it can also be used to move projects between servers. To do this,
    choose the Integration Services catalog option on the Select Source page.


    The Deployment Wizard allows you to select the server and folder you wish to deploy
    the project to. On the final page, the project file is sent to the server and
    stored in the SSIS Catalog. Note that, during deployment, the wizard indicates
    that it is changing the project’s protection level ([Figure 18-3](#9781484200834_Ch18.xhtml#Fig3)).
    During this phase, sensitive data within the project is decrypted, and the project
    is converted to the `Server Storage` protection level. The server relies on database
    encryption to protect packages and parameter values – these tables are automatically
    encrypted in the SSIS Catalog.


    ![9781484200834_Fig18-03.jpg](images/9781484200834_Fig18-03.jpg)


    [Figure 18-3](#9781484200834_Ch18.xhtml#_Fig3). The Deployment Wizard status page


    > **Note**: More information about package protection levels and secure deployments
    can be found in Books Online at `http://msdn.microsoft.com/en-us/library/bb522558.aspx`.'
