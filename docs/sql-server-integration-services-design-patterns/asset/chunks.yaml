  trans: "\n\n# 创建 rpt 架构和 rpt.ReturnAppInstanceHeader 存储过程\n\n**清单 A-21** 包含了构建 `rpt`\
    \ 架构和 `rpt.ReturnAppInstanceHeader` 存储过程所需的 T-SQL 脚本。\n\n```sql\n/* rpt 架构 */\n\
    If Not Exists(Select name\n              From sys.schemas\n              Where\
    \ name = 'rpt')\n begin\n  print '正在创建 rpt 架构'\n  declare @sql varchar(100) =\
    \ 'Create Schema rpt'\n  exec(@sql)\n  print 'Rpt 架构已创建'\n end\nElse\n print 'Rpt\
    \ 架构已存在。'\nprint ''\n\n/* rpt.ReturnAppInstanceHeader 存储过程 */\nIf Exists(Select\
    \ s.name + '.' + p.name\n          From sys.procedures p\n          Join sys.schemas\
    \ s\n            On s.schema_id = p.schema_id\n          Where s.name = 'rpt'\n\
    \            And p.name = 'ReturnAppInstanceHeader')\n begin\n  print '正在删除 rpt.ReturnAppInstanceHeader\
    \ 存储过程'\n  Drop Procedure rpt.ReturnAppInstanceHeader\n  print 'Rpt.ReturnAppInstanceHeader\
    \ 存储过程已删除'\n end\nprint '正在创建 rpt.ReturnAppInstanceHeader 存储过程'\ngo\n\nCreate\
    \ Procedure rpt.ReturnAppInstanceHeader\n @ApplicationName varchar(255) = NULL\n\
    As\n\n  Select a.ApplicationID\n       ,ap.AppInstanceID\n       ,a.ApplicationName\n\
    \       ,ap.StartDateTime\n       ,DateDiff(ss,ap.StartDateTime,Coalesce(ap.EndDateTime,GetDate()))\
    \ As RunSeconds\n       ,ap.Status\n  From log.SSISAppInstance ap\n  Join cfg.Applications\
    \ a\n    On ap.ApplicationID = a.ApplicationID\n  Where a.ApplicationName = Coalesce(@ApplicationName,a.ApplicationName)\n\
    \  Order by AppInstanceID desc\n\ngo\nprint 'Rpt.ReturnAppInstanceHeader 存储过程已创建。'\n\
    print ''\n```\n\n## 在 SSDT 中创建报表\n\n返回 `SSDT`，在`解决方案资源管理器`中右键单击`报表`虚拟文件夹，然后单击`添加新报表`。如果显示欢迎屏幕，则单击`下一步`按钮。在`选择数据源`屏幕上，选择名为\
    \ `SSISConfig` 的共享数据源，然后单击`下一步`按钮。接下来显示`设计查询`窗口；将 `rpt.ReturnAppInstanceHeader`\
    \ 添加到`查询字符串`文本框中，然后单击`下一步`按钮。在`选择报表类型`页面上选择`表格`，然后单击`下一步`按钮。当`设计表`页面显示时，在`可用字段`列表框中多选所有列，然后单击`详细信息`按钮。报表向导将显示如\
    \ 图 A-20 所示。\n\n![9781484200834_FigAppA-20.jpg](img/9781484200834_FigAppA-20.jpg)\n\
    \n图 A-20. 将所有可用字段选择为详细信息\n\n单击`下一步`按钮。在`选择表样式`页面上选择一个主题，然后单击`下一步`按钮。在`完成向导`页面上，在`报表名称`属性文本框中输入**应用程序实例**，然后单击`完成`按钮。\n\
    \n`SSRS 报表向导`将生成报表，但它对存储过程的管理效率不高。你需要更改设置以使报表获得最佳性能。单击`视图` -> `报表数据`以显示`报表数据`侧边栏。展开`数据集`虚拟文件夹。右键单击\
    \ `DataSet1` 并单击`数据集属性`。当`数据集属性`窗口显示时，将数据集重命名为 `rpt_ReturnAppInstanceHeader`（`数据集名称`属性不喜欢句点）。将\
    \ `rpt.ReturnAppInstanceHeader` 从`查询`属性中复制出来，并单击`查询类型`下的`存储过程`选项。将 `rpt.ReturnAppInstanceHeader`\
    \ 粘贴到`选择或输入存储过程名称`下拉列表中。`数据集属性`窗口应类似于 图 A-21 所示。\n\n![9781484200834_FigAppA-21.jpg](img/9781484200834_FigAppA-21.jpg)\n\
    \n图 A-21. 配置数据集以使用 rpt.ReturnAppInstanceHeader 存储过程\n\n单击`确定`按钮关闭`数据集属性`窗口。\n\n\
    ## 配置报表参数\n\n如果单击`预览`选项卡，报表将提示您输入应用程序名称，如 图 A-22 所示。\n\n![9781484200834_FigAppA-22.jpg](img/9781484200834_FigAppA-22.jpg)\n\
    \n图 A-22. 提示输入应用程序名称\n\n在文本框中输入 **SSISApp1**，然后单击右上角的`查看报表`按钮。我们不希望用户每次使用报表时都提供\
    \ SSIS 应用程序名称，因此让我们配置名为 `@ApplicationName` 的报表参数。单击`设计`选项卡并返回到`报表数据`侧边栏。展开`参数`虚拟文件夹。双击\
    \ `@ApplicationName` 以打开`报表参数属性`窗口。在`常规`页面上，勾选`允许空值`复选框，并将`选择参数可见性`选项更改为`隐藏`。在`默认值`页面上，选择`指定值`选项，然后单击`添加`按钮。一个\
    \ `(Null)` 行将被添加到`值`网格中，这正是我们想要的。单击`确定`按钮关闭`报表参数属性`窗口。\n\n通过单击`预览`选项卡测试更改。报表应显示数据库中存储的所有应用程序实例行，如\
    \ 图 A-23 所示。\n\n![9781484200834_FigAppA-23.jpg](img/9781484200834_FigAppA-23.jpg)\n\
    \n图 A-23. 显示应用程序实例数据\n\n## 移除 0 行\n\n我们不想在这些报表中看到显示的 `0` 行。通过执行 清单 A-22 中所示的 T-SQL\
    \ 来修改 `rpt.ReturnAppInstanceHeader` 存储过程，以将这些记录从返回结果中排除。\n\n**清单 A-22**. 更新 rpt.ReturnAppInstanceHeader\
    \ 存储过程\n\n```sql\n/* rpt.ReturnAppInstanceHeader 存储过程 */\nIf Exists(Select s.name\
    \ + '.' + p.name\n          From sys.procedures p\n          Join sys.schemas\
    \ s\n            On s.schema_id = p.schema_id\n          Where s.name = 'rpt'\n\
    \            And p.name = 'ReturnAppInstanceHeader')\n begin\n  print '正在删除 rpt.ReturnAppInstanceHeader\
    \ 存储过程'\n  Drop Procedure rpt.ReturnAppInstanceHeader\n  print 'Rpt.ReturnAppInstanceHeader\
    \ 存储过程已删除'\n end\nprint '正在创建 rpt.ReturnAppInstanceHeader 存储过程'\ngo\n\nCreate\
    \ Procedure rpt.ReturnAppInstanceHeader\n @ApplicationName varchar(255) = NULL\n\
    As\n\n  Select a.ApplicationID\n       ,ap.AppInstanceID\n       ,a.ApplicationName\n\
    \       ,ap.StartDateTime\n       ,DateDiff(ss,ap.StartDateTime,Coalesce(ap.EndDateTime,GetDate()))\
    \ As RunSeconds\n       ,ap.Status\n  From log.SSISAppInstance ap\n  Join cfg.Applications\
    \ a\n    On ap.ApplicationID = a.ApplicationID\n  Where a.ApplicationName = Coalesce(@ApplicationName,a.ApplicationName)\n\
    \  And a.ApplicationID > 0\n  Order by AppInstanceID desc\n\ngo\nprint 'Rpt.ReturnAppInstanceHeader\
    \ 存储过程已创建。'\nprint ''\n```\n\n刷新应用程序实例报表预览，它现在显示如 图 A-24 所示。\n\n![9781484200834_FigAppA-24.jpg](img/9781484200834_FigAppA-24.jpg)\n\
    \n图 A-24. 刷新后的应用程序实例报表，不含 0 行\n\n## 添加条件背景色\n\n颜色比大多数视觉提示更能帮助识别状态。要为数据行添加背景色，请返回到`设计`选项卡并选择表中显示数据值的行（底部行）。按\
    \ `F4` 键显示`属性`，然后单击`背景色`属性。在`背景色`属性的值下拉列表中，选择`表达式`。当`表达式`窗口打开时，将`设置表达式 for: BackgroundColor`文本框中的文本从`无颜色`（默认值）更改为以下表达式：\n\
    \n```vb\n=Switch(Fields!Status.Value=\"Success\", \"LightGreen\" , Fields!Status.Value=\"\
    Failed\", \"LightCoral\" , Fields!Status.Value=\"Running\", \"LightBlue\" , Fields!Status.Value=\"\
    Cancelled\", \"LightYellow\")\n```\n\n"
- fmt: "Value=\"Running\", \"Yellow\")\n\n当您通过移除对用户意义不大的ID列、重置字体大小、更改文本对齐方式以及调整列宽来清理报告时，可以将报告修改为如[图\
    \ A-25](#9781484200834_AppA.xhtml#Fig25)所示的外观。\n\n![9781484200834_FigAppA-25.jpg](images/9781484200834_FigAppA-25.jpg)\n\
    \n[图 A-25](#9781484200834_AppA.xhtml#_Fig25). 应用程序实例——彩色显示！\n\n我称之为运营智能。企业运营人员查看此报告，可以获取有关当前企业数据集成过程状态的大量信息。\n\
    \n包实例报告非常相似。让我们首先将存储过程添加到数据库，如[清单 A-23](#9781484200834_AppA.xhtml#list23)所示。\n\
    \n### [清单 A-23](#9781484200834_AppA.xhtml#_list23). 添加 rpt.ReturnPkgInstanceHeader\
    \ 存储过程\n\n```sql\n/* rpt.ReturnPkgInstanceHeader stored procedure */\nIf Exists(Select\
    \ s.name + '.' + p.name\n          From sys.procedures p\n          Join sys.schemas\
    \ s\n            On s.schema_id = p.schema_id\n          Where s.name = 'rpt'\n\
    \            And p.name = 'ReturnPkgInstanceHeader')\n begin\n   print 'Dropping\
    \ rpt.ReturnPkgInstanceHeader stored procedure'\n   Drop Procedure rpt.ReturnPkgInstanceHeader\n\
    \   print 'Rpt.ReturnPkgInstanceHeader stored procedure dropped'\n end\n\nprint\
    \ 'Creating rpt.ReturnPkgInstanceHeader stored procedure'\ngo\n\nCreate Procedure\
    \ rpt.ReturnPkgInstanceHeader\n @AppInstanceID int\nAs\n              SELECT a.ApplicationName\n\
    \                     ,p.PackageFolder + p.PackageName As PackagePath\n      \
    \               ,cp.StartDateTime\n                     ,DateDiff(ss, cp.StartDateTime,\
    \ Coalesce(cp.EndDateTime,GetDate())) As RunSeconds\n                     ,cp.Status\n\
    \                     ,ai.AppInstanceID\n                     ,cp.PkgInstanceID\n\
    \                     ,p.PackageID\n                     ,p.PackageName\n    \
    \            FROM log.SSISPkgInstance cp\n                Join cfg.AppPackages\
    \ ap\n                    on ap.AppPackageID = cp.AppPackageID\n             \
    \  Join cfg.Packages p\n                    on p.PackageID = ap.PackageID\n  \
    \             Join log.SSISAppInstance ai\n                    on ai.AppInstanceID\
    \ = cp.AppInstanceID\n               Join cfg.Applications a\n               \
    \     on a.ApplicationID = ap.ApplicationID\n              WHERE ai.AppInstanceID\
    \ = Coalesce(@AppInstanceID,ai.AppInstanceID)\n                And a.ApplicationID\
    \ > 0\n              Order By cp.PkgInstanceID desc\ngo\n\nprint 'Rpt.ReturnPkgInstanceHeader\
    \ stored procedure created.'\nprint ''\n```\n\n在SSDT中，像添加应用程序实例报告一样，添加一个名为 `Package\
    \ Instance` 的新报告。确保使用 `rpt.ReturnPkgInstanceHeader` 存储过程。要让报表向导识别需要参数的查询，您需要在“设计查询”页面添加默认参数值。我的查询字符串文本框内容如下：\n\
    \n```sql\nexec rpt.ReturnPkgInstanceHeader NULL\n```\n\n这允许查询生成器定位从存储过程返回的列列表（这是报表向导继续操作所需要的）。报告构建完成后，请记住首先更新数据集，然后更新报告参数，就像您为应用程序实例报告所做的那样。此特定设计的一个很酷的地方是我们可以重用数据行上\
    \ `BackgroundColor` 的表达式。完成后，包实例报告显示如[图 A-26](#9781484200834_AppA.xhtml#Fig26)。\n\
    \n![9781484200834_FigAppA-26.jpg](images/9781484200834_FigAppA-26.jpg)\n\n[图 A-26](#9781484200834_AppA.xhtml#_Fig26).\
    \ 包实例报告\n\n包实例是应用程序实例的“子级”。为了反映这种关系，请返回到应用程序实例报告并向表中添加一列以包含“包”链接。在列标题和数据单元格的文本中输入\
