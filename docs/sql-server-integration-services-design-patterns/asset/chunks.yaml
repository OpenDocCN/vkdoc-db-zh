    `SQL Server`。


    # 第 5 章


    ![image](img/frontdot.jpg)


    ## 使用数据质量服务进行数据修正


    `数据质量服务` (`DQS`) 最早随 `SQL Server 2012` 引入。它提供了数据修正和数据去重功能——这是大多数 `提取、转换和加载` (`ETL`)
    流程的关键组件。本章介绍 `DQS` 如何与 `SSIS` 集成，并提供相关模式，使您能够在 `ETL` 包中实现可靠且低工作量的数据清理。


    ![Image](img/sq.jpg) **注意** `数据质量服务` 产品在安装后需要一些手动步骤来创建 `DQS` 数据库并设置默认权限。有关更多信息，请参阅联机丛书中的“安装数据质量服务”页面：`http://msdn.microsoft.com/en-us/library/gg492277.aspx`。


    ### 数据质量服务概述


    您使用 `DQS` 执行的数据清理和匹配操作围绕知识库的使用展开。知识库（或 `KB`）由一个或多个域组成。进行地址清理的示例域可以是 `城市`、`州/省`
    或 `国家`。这些字段中的每一个都将是一个独立的域。两个或更多相关域可以分组在一起形成复合域（或 `CD`）。复合域允许您将多个字段作为一个单元进行验证。例如，一个
    `公司` 复合域可以由 `名称`、`地址`、`城市`、`州/省` 和 `国家` 域组成。使用复合域可以让您验证 `Microsoft Corporation`
    (`名称`) 是否确实位于 `One Redmond Way` (`地址`)、`Redmond` (`城市`)、`WA` (`州/省`)、`USA` (`国家`)。如果
    `DQS` `KB` 拥有所有相关知识，即使 `Las Vegas` 是一个有效的城市名称，但知识库已定义 Microsoft 办公室位于 `Redmond`，那么当您填入
    `Las Vegas` 作为 `城市` 时，它就能标记该条目为错误。


    `数据质量服务` 有三个主要组件：客户端实用程序（如 图 5-1 所示），允许您构建和管理知识库；一个用于批量数据清理的 `SSIS` 数据流转换；以及一个服务器组件，实际的清理和匹配操作在此进行。`DQS`
    服务器并非独立实例。它本质上是一组用户数据库（`DQS_MAIN`、`DQS_PROJECTS`、`DQS_STAGING_DATA`），带有一个基于存储过程的
    `API`，非常类似于 `SQL Server 2012` 中引入的 `SSIS` 目录。


    ![9781484200834_Fig05-01.jpg](img/9781484200834_Fig05-01.jpg)


    图 5-1. 数据质量客户端应用程序


    ### 使用数据质量客户端


    `数据质量客户端` 应用程序用于构建和管理您的知识库。它也可以作为独立工具用于清理数据。该工具面向组织内拥有和管理数据的数据管理员和 IT 专业人员。该工具的用户将分为三种不同的角色（如
    表 5-1 所示），这些角色映射到主 `DQS` 数据库中的角色。您通过该工具可以访问的功能将取决于您当前被分配的角色。


    表 5-1. 数据质量服务角色


    | 名称 | SQL 角色 | 描述 |

    | --- | --- | --- |

    | `DQS KB 操作员` | `dqs_kb_operator` | 用户可以编辑和执行现有的数据质量项目。 |

    | `DQS KB 编辑器` | `dqs_kb_editor` | 用户可以执行项目功能，并创建和编辑知识库。 |

    | `DQS 管理员` | `dqs_administrator` | 用户可以执行项目和知识功能，以及管理系统。 |


    ![Image](img/sq.jpg) **注意** 默认情况下，托管 `DQS` 的 `SQL Server` 实例上 `sysadmin` 角色成员具有与
    `DQS 管理员` 相同的权限级别。但建议您仍然将用户与三种 `DQS` 角色之一相关联。


    ### 知识库管理


    `知识库管理` 部分下的选项允许您创建和维护知识库。创建新知识库时，您可以选择创建一个空的知识库，或者基于现有知识库创建，后者会用原始知识库中的域预填充新知识库。知识库也可以从
    `DQS` 文件（扩展名为 `.dqs`）创建，允许您备份知识库或在系统间共享。


    通过此 `UI` 与知识库交互时，您将执行三个主要活动（如 图 5-2 所示）。在您创建新知识库或打开现有知识库后，这些活动即会可用。


    ![9781484200834_Fig05-02.jpg](img/9781484200834_Fig05-02.jpg)


    图 5-2. 知识库管理活动


    在进行 `域管理` 时，您可以验证和修改知识库中的域。这包括更改域属性（如 图 5-3 所示）、配置联机参考数据，以及查看和修改规则和值。您还可以选择将知识库或单个域导出到
    `DQS` 文件，以及从 `DQS` 文件导入新域。


    ![9781484200834_Fig05-03.jpg](img/9781484200834_Fig05-03.jpg)


    图 5-3. DQS 客户端中“域管理”活动的“域属性”选项卡


    `知识发现` 是一个构建知识库信息的计算机辅助过程。您提供源数据（来自 `SQL Server` 表或视图或 `Excel` 文件），并将输入列映射到知识库域。这些数据将被导入
    `DQS` 并存储为一组已知的域值。

