  trans: "# 创建 CleanTemperature 表\n\n```\nCreate Table dbo.CleanTemperature\n   (ID\
    \ int identity(1,1)\n       Constraint PK_Cleantemperature_ID Primary Key Clustered\n\
    \  ,MeasDateTime datetime\n  ,MinT real\n  ,MaxT real\n  ,AvgT real\n  ,MinH smallint\n\
    \  ,MaxH smallint\n  ,AvgH smallint\n  ,ComfortZone smallint\n  ,MinDP real\n\
    \  ,MaxDP real\n  ,AvgDP real\n  ,MinHI varchar(7)\n  ,MaxHI varchar(7)\n  ,AvgHI\
    \ varchar(7)\n  ,LoadDate datetime\n  ,LowBatt bit\n  ,SensorID int)\n```\n\n\
    云表创建完成后，我们就可以开始构建 SSIS 加载器了。\n\n在本地，创建一个新的 SSIS 解决方案和项目，命名为 `CloudLoader`。将默认的\
    \ SSIS 包重命名为 `SimpleCloudLoader.dtsx`。添加一个 Sequence 容器，并将其重命名为 `SEQ Pre-Load Operations`。通过将\
    \ Execute SQL 任务放入 Sequence 容器中来添加一个，并将其重命名为 `Get AWCleanTempMaxID From AndyWeather`。将\
    \ `ResultSet` 属性设置为 `Single Row`，并将 `ConnectionType` 属性更改为 `ADO.Net`。使用你的 MASD\
    \ 帐户信息创建 ADO.Net 连接管理器。为了从 `LoadMetrics` 表中获取最新的 ID，我使用以下查询。\n\n```\nIF NOT EXISTS\
    \ (\n    Select *\n    From dbo.LoadMetrics\n    Where MetricName = 'CleanTempMaxID'\n\
    )\nBEGIN\n    INSERT INTO dbo.LoadMetrics (LoadDate, MetricName,MetricIntValue)\n\
    \    VALUES (NULL,'CleanTempMaxID',NULL);\nEND\nSelect Coalesce(MetricIntValue,\
    \ 0) As CleanTempMaxID\nFrom dbo.LoadMetrics\nWhere MetricName = 'CleanTempMaxID'\n\
    ```\n\n在 Result Set 页面，我将值存储在一个名为 `AWCleanLoadMaxID` 的 Int32 数据类型的 SSIS 变量中。\n\
    \n在 Sequence 容器中添加另一个 Execute SQL 任务，并将其重命名为 `Get CleanTempMaxID from the local\
    \ table`。配置连接到你的源数据库和表。对我来说，这是一个托管 `WeatherData` 数据库和 `dbo.CleanTemperature` 表的本地\
    \ SQL Server 默认实例。我使用以下 T-SQL 从表中提取当前的最大值，配置单行结果集以将此值推入名为 `CleanTempLocalMaxID`\
    \ 的 SSIS 变量（Int32 数据类型）。\n\n```\nSelect Max(ID) As CleanTempLocalMaxID\nFrom dbo.CleanTemperature\n\
    ```\n\n在 `SEQ Pre-Load Operations` Sequence 容器外部添加一个 Data Flow 任务，并将其重命名为 `Load\
    \ Windows Azure SQL Database`。在 Sequence 容器和 Data Flow 任务之间连接一个 `OnSuccess` 优先级约束。打开\
    \ Data Flow Task Editor 并添加一个 OLE DB 源适配器。将 OLE DB 源适配器连接到你希望加载到云中的本地源数据库，并编写查询以从所需表中提取最新数据。在我的例子中，我从我的\
    \ `dbo.CleanTemperature` 表中提取数据。为了完成加载，我使用 `Listing 14-3` 中显示的源查询。\n\n`Listing\
    \ 14-3`. WeatherData 源查询\n\n```\nSELECT ID\n      ,MeasDateTime\n      ,MinT\n\
    \      ,MaxT\n      ,AvgT\n      ,MinH\n      ,MaxH\n      ,AvgH\n      ,ComfortZone\n\
    \      ,MinDP\n      ,MaxDP\n      ,AvgDP\n      ,MinHI\n      ,MaxHI\n      ,AvgHI\n\
    \      ,LoadDate\n      ,LowBatt\n      ,SensorID\n  FROM dbo.CleanTemperature\n\
    \ WHERE ID Between ? And ?\n```\n\n点击 Parameters 按钮，将 `Parameter0` 和 `Parameter1`\
    \ 分别映射到 `AWCleanLoadMaxID` 和 `CleanTempLocalMaxID` 变量，如 `Figure 14-2` 所示。\n\n\
    ![9781484200834_Fig14-02.jpg](img/9781484200834_Fig14-02.jpg)\n\n`Figure 14-2`.\
    \ 将 `SQLAzureCleanLoadMaxID` 变量映射到 `Parameter0`\n\n`Listing 14-3` 中显示的源查询中的问号将被替换为相应映射变量中存储的值。此查询将仅返回\
    \ `ID` 大于云中存储值的行。为什么我们在加载前从源表获取最大 `ID`？简而言之，是延迟。在 `WeatherData` 数据库中，延迟是最小的。但想想加载高度活跃的系统——延迟可能成为问题。例如，假设每秒有几笔事务进入源表，而加载目标需要几秒钟。如果我们等到加载完成后再捕获源表的最大\
    \ `ID` 值，该值很可能包含了我们没有加载的数据。专业术语来说，这很“糟糕”。因此，我们将包设计为在加载开始前抓取最大 `ID` 值，并且只加载介于上次加载到\
    \ MASD 的 `ID` 和 SSIS 包开始时捕获的最大 `ID` 值之间的行。这样我们就永远不会错过任何一行。\n\n回到演示包，添加一个 ADO.Net\
    \ 目标适配器，并将其重命名为 `Windows Azure SQL Database ADO NET Destination`。连接一条从 OLE DB\
    \ 源适配器到 ADO.Net 目标适配器的数据流路径。为什么使用 ADO.Net 目标？MASD 仅允许 ADO.Net 和 ODBC 连接——在撰写本文时，尚不支持对\
    \ MASD 的 OLE DB 连接。在源和目标适配器之间连接一条数据流路径，编辑目标并映射列。\n\n最后一步是更新 MASD 数据库中的 `LoadMetrics`\
    \ 表。为了完成此更新，向控制流添加一个 Execute SQL 任务，并适当地重命名它。我将其命名为 `Update AndyWeather LoadMetrics\
    \ Table`，并配置为使用 ADO.Net 连接到我的 MASD 数据库。我的查询类似于 `Listing 14-4` 所示。\n\n`Listing\
    \ 14-4`. 更新 Azure SQL Database `LoadMetrics` 表\n\n```\nUpdate dbo.LoadMetrics\n\
    \ Set MetricIntValue = (@MaxID + 1)\n    , LoadDate = GetDate()\n Where MetricName\
    \ = 'CleanTempMaxID'\n```\n\n在 Parameter Mapping 页面，将 `CleanTempLocalMaxID` 的值映射到\
    \ `@MaxID` 参数。就这样，这个脚本将当前的最大 `ID` 设置为下一次加载的最小 `ID`。\n\n## 结论\n\n在本章中，我们研究了加载云目标的架构和设计方面。在权衡了架构和经济考虑后，我们设计了一个合理的解决方案。\n\
    \n# 第 15 章\n\n![image](img/frontdot.jpg)\n\n## 日志记录和报告模式\n\n管理任何应用程序的一个重要部分是了解应用程序在日常使用中发生的情况。这个主题在\
    \ ETL 解决方案中尤其重要，因为正在操作的数据可用于报告和分析。管理员通过记录和报告应用程序的执行、错误和状态来满足这一需求，这完美地契合了管理框架的概念。\n\
    \n前几章讨论了如何设置管理框架的其他部分，包括如何执行父子包以及如何实现集中式自定义日志记录。本章将描述如何使用 Integration Services\
    \ 中的内置日志记录来报告 Integration Services 应用程序的所有方面。\n\nIntegration Services 提供两种主要方法来帮助满足日志记录和报告需求。\n\
    \n*   包日志记录和报告\n*   目录日志记录和报告\n\n让我们逐步了解如何设置每种方法，然后利用最能突出这些方法的模式。\n\n### 包日志记录和报告\n\
    \n包日志记录和报告方法自 Integration Services 第一版以来就存在。此方法的特点是在包开发期间设置日志记录。日志提供程序可以记录到不同的输出，包括\
    \ SQL Server 表、文本文件等。日志信息存储在一个对象中，例如一个文件或 `sysssislog` 表。\n\n每个日志可以限制为仅存储某些类型的事件，例如\
    \ `OnError`、`OnPreExecute` 和 `OnVariableValueChanged`。然后，管理员可以查看日志以了解包执行期间发生了什么。"
- fmt: "# Package Logging and Catalog Logging in SSIS\n\nOnce the package has been\
    \ deployed to the server, you cannot change the type or amount of logging that\
    \ occurs. Package logging is the best and only option when you're using `Integration\
    \ Services 2005` or `2008` or `Integration Services 2012` or `2014` in package\
    \ deployment mode. In the project deployment model, you can use package logging\
    \ on a regular basis to keep track of errors that may occur or to ensure that\
    \ packages are executing when expected. For more in-depth logging and reporting,\
    \ you will want to use catalog logging and reporting, which we will discuss later\
    \ in this chapter.\n\nLet's take a look at setting up package logging and then\
    \ how to use the output.\n\n## Setting Up Package Logging\n\nTo set up logging\
    \ at a package level, you will go to the package itself and turn on logging. Each\
    \ package needs to be set up separately to log to the database. You can do this\
    \ by right-clicking on the package and selecting the `Logging` option or by going\
    \ to the `SSIS` menu at the top of the `SQL Server Data Tools (SSDT)` and selecting\
    \ the `Logging` option.\n\nWithin the logging menu, which you can see in [Figure\
    \ 15-1](#9781484200834_Ch15.xhtml#Fig1), you will decide what type of logging\
    \ you want to use. Among the options are text files, XML files, and SQL Server\
    \ tables. Once you have decided on the type of logging, you will select which\
    \ events you want to log and at what level you want to log these events. If you\
    \ select events at the highest package level, you will be able to see all events\
    \ for all lower containers, too.\n\n![9781484200834_Fig15-01.jpg](images/9781484200834_Fig15-01.jpg)\n\
    [Figure 15-1](#9781484200834_Ch15.xhtml#_Fig1). The SSIS logging menu\n\nWhen\
    \ the package runs, `Integration Services` creates a new table, if one is not\
    \ already available, and stores the logging information within it. The table `sysssislog`\
    \ contains the data for all recorded events.\n\n## Reporting on Package Logging\n\
    \nOnce you've run the package with logging, you'll want to know what happened!\
    \ The table that contains all of the information you need is called `sysssislog`.\
    \ By default, it will be created in the `msdb` database on the server of the connection\
    \ manager you selected in the logging menu; however, you can change the database\
    \ by specifying it directly in the connection manager.\n\nLet's take a look at\
    \ the data in the table once we've run the package by running the following SQL\
    \ query:\n\n```sql\nselect * from msdb.dbo.sysssislog\n```\n\nThis statement returns\
    \ results similar to those in [Figure 15-2](#9781484200834_Ch15.xhtml#Fig2).\n\
    \n![9781484200834_Fig15-02.jpg](images/9781484200834_Fig15-02.jpg)\n[Figure 15-2](#9781484200834_Ch15.xhtml#_Fig2).\
    \ Results from the SSIS log table\n\n### Design Pattern: Package Executions\n\n\
    Although it is possible to use the information in the table directly, you can\
    \ also combine the information to make it a little more readable. If you want\
    \ to see the package executions and how long each page took to run, you can use\
    \ the query in [Listing 15-1](#9781484200834_Ch15.xhtml#list1):\n\n[**Listing\
    \ 15-1**](#9781484200834_Ch15.xhtml#_list1). Query to Return Package Durations\n\
    \n```sql\nselect ssis.source\n        , min(starttime) as package_start\n    \
    \    , max(endtime) as package_end\n        ,DATEDIFF(ms, min(starttime), max(endtime))\
    \ as duration_ms\nfrom msdb.dbo.sysssislog ssis\nwhere event in ('PackageStart',\
    \ 'PackageEnd')\ngroup by ssis.source, ssis.executionid\n```\n\n## Catalog Logging\
    \ and Reporting\n\nThe catalog logging and reporting method was introduced in\
    \ `Integration Services 2012` and is the best logging method to use if it is available.\
    \ It can be used only if you have set up the project deployment model type. The\
    \ nice thing about this type of logging is you don't need to prepare anything\
    \ in the package to utilize it. Let's jump right into how to set up the logging\
    \ and design patterns to report on that data.\n\n### Setting Up Catalog Logging\n\
    \nAs I mentioned earlier, the benefit of catalog logging is that you don't need\
    \ to modify the package at all to use the logging output. The only preparation\
    \ you need to do is to make sure your package is set to the project deployment\
    \ type and deploy the package to the SSIS Catalog.\n\nTo begin setting up catalog\
    \ logging and reporting, you will create an SSIS Catalog. You can do this by connecting\
    \ to the database instance. If `Integration Services` is installed, you will see\
    \ a node entitled `Integration Services Catalogs`. If you create a new catalog\
    \ named `SSISDB`, it will look like [Figure 15-3](#9781484200834_Ch15.xhtml#Fig3).\n\
    \n![9781484200834_Fig15-03.jpg](images/9781484200834_Fig15-03.jpg)\n[Figure 15-3](#9781484200834_Ch15.xhtml#_Fig3).\
    \ The SSISDB catalog\n\nAt this point, you are ready to deploy your package. First,\
    \ though, you should make sure the project is set to use the project deployment\
    \ model. You can do this by right-clicking on the project. If you see the option\
    \ for `Convert to Package Deployment Model`, as shown in [Figure 15-4](#9781484200834_Ch15.xhtml#Fig4),\
    \ you are in this mode.\n\n![9781484200834_Fig15-04.jpg](images/9781484200834_Fig15-04.jpg)\n\
    [Figure 15-4](#9781484200834_Ch15.xhtml#_Fig4). A project in project deployment\
    \ mode\n\nFinally, you will deploy the package to the SSIS Catalog. This stores\
    \ the package in the `SSISDB` database and allows for some default and some configurable\
    \ logging.\n\nNext, we will look at the tables where the information for both\
    \ types of logging is stored.\n\n### Catalog Tables\n\nWhen a package runs, all\
    \ of the information is stored in a set of tables that reside in the `SSISDB`\
    \ database on the same server where the `Integration Services` package was deployed.\
    \ Although there is a series of internal tables, you will do most of your reporting\
    \ from the catalog views. [Figure 15-5](#9781484200834_Ch15.xhtml#Fig5) shows\
    \ a database diagram of the SSIS internal tables, whereas [Figure 15-6](#9781484200834_Ch15.xhtml#Fig6)\
    \ shows a list of the SSIS catalog views.\n\n![9781484200834_Fig15-05.jpg](images/9781484200834_Fig15-05.jpg)\n\
    [Figure 15-5](#9781484200834_Ch15.xhtml#_Fig5). SSIS catalog internal tables\n\
    \n![9781484200834_Fig15-06.jpg](images/9781484200834_Fig15-06.jpg)\n[Figure 15-6](#9781484200834_Ch15.xhtml#_Fig6).\
    \ SSIS catalog views\n\n## Changing Logging Levels After the Fact\n\nEven after\
    \ the package has been deployed to the `Integration Services` server, you can\
    \ change the amount of logging that occurs. But why would you want to do this?\
    \ If you initially set up your package with a defined set of logging events, you\
    \ will see only that set of data. However, you may want to include more events\
    \ if you are doing more advanced troubleshooting or if you have a specific error\
    \ you need to track down. On the other hand, you may want to increase the performance\
    \ of a package by reducing the number of events that are recorded.\n\nModifying\
    \ logging at the package level is not a best practice. By opening up the package\
    \ to change even the slightest item, you increase the risk of a breaking change,\
    \ whether by mistyping a value or choosing an unavailable logging option. In some\
    \ organizations, modifications to logging made at the package level may even result\
    \ in the package having to go through the change control process again. Ideally,\
    \ you want to make logging changes in an external location without touching the\
    \ package at all.\n\nIn `Integration Services 2012`, you can choose from four\
    \ different logging levels, as described in [Table 15-1](#9781484200834_Ch15.xhtml#Tab1).\n\
    \n[**Table 15-1**](#9781484200834_Ch15.xhtml#_Tab1). SSIS Logging Levels\n\n![Table15-1.jpg](images/Table15-1.jpg)\n\
    \n## Design Patterns\n\nNow that you know how to set up and log information, let's\
    \ walk through the following design patterns:\n\n1.  Changing the logging level\n\
    2.  Utilizing existing reports\n3."
  raw: 'Once the package has been deployed to the server, you cannot change the type
    or amount of logging that occurs.    Package logging is the best and only option
    when you’re using Integration Services 2005 or 2008 or Integration Services 2012
    or 2014 in package deployment mode. In the project deployment model, you can use
    package logging on a regular basis to keep track of errors that may occur or to
    ensure that packages are executing when expected. For more in-depth logging and
    reporting, you will want to use catalog logging and reporting, which we will discuss
    later in this chapter.    Let’s take a look at setting up package logging and
    then how to use the output.    Setting Up Package Logging    To set up logging
    at a package level, you will go to the package itself and turn on logging. Each
    package needs to be set up separately to log to the database. You can do this
    by right-clicking on the package and selecting the Logging option or by going
    to the SSIS menu at the top of the SQL Server Data Tools (SSDT) and selecting
    the Logging option.    Within the logging menu, which you can see in [Figure 15-1](#9781484200834_Ch15.xhtml#Fig1),
    you will decide what type of logging you want to use. Among the options are text
    files, XML files, and SQL Server tables. Once you have decided on the type of
    logging, you will select which events you want to log and at what level you want
    to log these events. If you select events at the highest package level, you will
    be able to see all events for all lower containers, too.    ![9781484200834_Fig15-01.jpg](images/9781484200834_Fig15-01.jpg)    [Figure
    15-1](#9781484200834_Ch15.xhtml#_Fig1). The SSIS logging menu    When the package
    runs, Integration Services creates a new table, if one is not already available,
    and stores the logging information within it. The table `sysssislog` contains
    the data for all recorded events.    Reporting on Package Logging    Once you’ve
    run the package with logging, you’ll want to know what happened! The table that
    contains all of the information you need is called `sysssislog`. By default, it
    will be created in the `msdb` database on the server of the connection manager
    you selected in the logging menu; however, you can change the database by specifying
    it directly in the connection manager.    Let’s take a look at the data in the
    table once we’ve run the package by running the following SQL query:    ``` select
    * from msdb.dbo.sysssislog ```    This statement returns results similar to those
    in [Figure 15-2](#9781484200834_Ch15.xhtml#Fig2).    ![9781484200834_Fig15-02.jpg](images/9781484200834_Fig15-02.jpg)    [Figure
    15-2](#9781484200834_Ch15.xhtml#_Fig2). Results from the SSIS log table    Design
    Pattern: Package Executions    Although it is possible to use the information
    in the table directly, you can also combine the information to make it a little
    more readable. If you want to see the package executions and how long each page
    took to run, you can use the query in [Listing 15-1](#9781484200834_Ch15.xhtml#list1):    [***Listing
    15-1***](#9781484200834_Ch15.xhtml#_list1). Query to Return Package Durations    ```
    select ssis.source         , min(starttime) as package_start         , max(endtime)
    as package_end         ,DATEDIFF(ms, min(starttime), max(endtime)) as duration_ms
    from msdb.dbo.sysssislog ssis where event in (''PackageStart'', ''PackageEnd'')
    group by ssis.source, ssis.executionid ```    Catalog Logging and Reporting    The
    catalog logging and reporting method was introduced in Integration Services 2012
    and is the best logging method to use if it is available. It can be used only
    if you have set up the project deployment model type. The nice thing about this
    type of logging is you don’t need to prepare anything in the package to utilize
    it. Let’s jump right into how to set up the logging and design patterns to report
    on that data.


    Setting Up Catalog Logging    As I mentioned earlier, the benefit of catalog logging
    is that you don’t need to modify the package at all to use the logging output.
    The only preparation you need to do is to make sure your package is set to the
    project deployment type and deploy the package to the SSIS Catalog.    To begin
    setting up catalog logging and reporting, you will create an SSIS Catalog. You
    can do this by connecting to the database instance. If Integration Services is
    installed, you will see a node entitled Integration Services Catalogs. If you
    create a new catalog named `SSISDB`, it will look like [Figure 15-3](#9781484200834_Ch15.xhtml#Fig3).    ![9781484200834_Fig15-03.jpg](images/9781484200834_Fig15-03.jpg)    [Figure
    15-3](#9781484200834_Ch15.xhtml#_Fig3). The SSISDB catalog    At this point, you
    are ready to deploy your package. First, though, you should make sure the project
    is set to use the project deployment model. You can do this by right-clicking
    on the project. If you see the option for Convert to Package Deployment Model,
    as shown in [Figure 15-4](#9781484200834_Ch15.xhtml#Fig4), you are in this mode.    ![9781484200834_Fig15-04.jpg](images/9781484200834_Fig15-04.jpg)    [Figure
    15-4](#9781484200834_Ch15.xhtml#_Fig4). A project in project deployment mode    Finally,
    you will deploy the package to the SSIS Catalog. This stores the package in the
    `SSISDB` database and allows for some default and some configurable logging.    Next,
    we will look at the tables where the information for both types of logging is
    stored.    Catalog Tables    When a package runs, all of the information is stored
    in a set of tables that reside in the `SSISDB` database on the same server where
    the Integration Services package was deployed. Although there is a series of internal
    tables, you will do most of your reporting from the catalog views. [Figure 15-5](#9781484200834_Ch15.xhtml#Fig5)
    shows a database diagram of the SSIS internal tables, whereas [Figure 15-6](#9781484200834_Ch15.xhtml#Fig6)
    shows a list of the SSIS catalog views.    ![9781484200834_Fig15-05.jpg](images/9781484200834_Fig15-05.jpg)    [Figure
    15-5](#9781484200834_Ch15.xhtml#_Fig5). SSIS catalog internal tables    ![9781484200834_Fig15-06.jpg](images/9781484200834_Fig15-06.jpg)    [Figure
    15-6](#9781484200834_Ch15.xhtml#_Fig6). SSIS catalog views    Changing Logging
    Levels After the Fact    Even after the package has been deployed to the Integration
    Services server, you can change the amount of logging that occurs. But why would
    you want to do this? If you initially set up your package with a defined set of
    logging events, you will see only that set of data. However, you may want to include
    more events if you are doing more advanced troubleshooting or if you have a specific
    error you need to track down. On the other hand, you may want to increase the
    performance of a package by reducing the number of events that are recorded.    Modifying
    logging at the package level is not a best practice. By opening up the package
    to change even the slightest item, you increase the risk of a breaking change,
    whether by mistyping a value or choosing an unavailable logging option. In some
    organizations, modifications to logging made at the package level may even result
    in the package having to go through the change control process again. Ideally,
    you want to make logging changes in an external location without touching the
    package at all.    In Integration Services 2012, you can choose from four different
    logging levels, as described in [Table 15-1](#9781484200834_Ch15.xhtml#Tab1).    [Table
    15-1](#9781484200834_Ch15.xhtml#_Tab1). SSIS Logging Levels    ![Table15-1.jpg](images/Table15-1.jpg)    Design
    Patterns    Now that you know how to set up and log information, let’s walk through
    the following design patterns:    1.  Changing the logging level 2.  Utilizing
    existing reports 3.'
  trans: "\n# SSIS 中的包日志与目录日志\n\n当包已部署到服务器后，你将无法更改其发生的日志记录类型或数量。如果你正在使用 `Integration\
    \ Services 2005`、`2008`、`2012` 或 `2014` 的包部署模式，那么包日志是最佳且唯一的选择。在项目部署模型中，你可以定期使用包日志来跟踪可能发生的错误，或确保包按预期执行。为了进行更深入的日志记录和报告，你将需要使用目录日志记录和报告，我们将在本章后面讨论。\n\
    \n让我们看看如何设置包日志，以及如何使用其输出。\n\n## 设置包日志\n\n要在包级别设置日志，你需要转到包本身并启用日志记录。每个包都需要单独设置，以便将日志记录到数据库。你可以通过右键单击包并选择\
    \ `日志记录` 选项，或者通过转到 `SQL Server Data Tools (SSDT)` 顶部的 `SSIS` 菜单并选择 `日志记录` 选项来完成此操作。\n\
    \n在日志记录菜单中（你可以在图 15-1 中看到），你将决定要使用的日志记录类型。选项包括文本文件、XML 文件和 SQL Server 表。一旦确定了日志记录类型，你将选择要记录哪些事件以及记录这些事件的级别。如果你在最高包级别选择事件，你将也能看到所有较低级别容器的所有事件。\n\
    \n![9781484200834_Fig15-01.jpg](img/9781484200834_Fig15-01.jpg)\n图 15-1. SSIS\
    \ 日志记录菜单\n\n当包运行时，`Integration Services` 会创建一个新表（如果尚无可用表），并将日志信息存储在其中。表 `sysssislog`\
    \ 包含了所有已记录事件的数据。\n\n## 包日志报告\n\n运行带有日志记录的包后，你会想知道发生了什么！包含你所需全部信息的表名为 `sysssislog`。默认情况下，它将在你在日志菜单中选择的连接管理器的服务器上的\
    \ `msdb` 数据库中创建；但是，你可以通过直接在连接管理器中指定数据库来更改它。\n\n让我们通过运行以下 SQL 查询，查看运行包后表中的数据：\n\
    \n```sql\nselect * from msdb.dbo.sysssislog\n```\n\n此语句返回的结果类似于图 15-2。\n\n![9781484200834_Fig15-02.jpg](img/9781484200834_Fig15-02.jpg)\n\
    图 15-2. 来自 SSIS 日志表的结果\n\n### 设计模式：包执行情况\n\n虽然可以直接使用表中的信息，但你也可以组合这些信息使其更具可读性。如果你想查看包的执行情况以及每个包运行了多长时间，可以使用清单\
    \ 15-1 中的查询：\n\n**清单 15-1**. 返回包持续时间的查询\n\n```sql\nselect ssis.source\n      \
    \  , min(starttime) as package_start\n        , max(endtime) as package_end\n\
    \        ,DATEDIFF(ms, min(starttime), max(endtime)) as duration_ms\nfrom msdb.dbo.sysssislog\
    \ ssis\nwhere event in ('PackageStart', 'PackageEnd')\ngroup by ssis.source, ssis.executionid\n\
    ```\n\n## 目录日志记录与报告\n\n目录日志记录和报告方法是在 `Integration Services 2012` 中引入的，如果可用，它是最好的日志记录方法。仅当你设置了项目部署模型类型时才能使用它。这种日志记录方法的优点是，你无需在包中准备任何内容即可使用它。让我们直接深入了解如何设置日志记录以及用于报告该数据的设计模式。\n\
    \n### 设置目录日志记录\n\n如前所述，目录日志记录的好处是，你根本无需修改包即可使用日志输出。你唯一需要做的准备工作是确保你的包设置为项目部署类型，并将包部署到\
    \ SSIS 目录。\n\n要开始设置目录日志记录和报告，你需要创建一个 SSIS 目录。你可以通过连接到数据库实例来完成此操作。如果安装了 `Integration\
    \ Services`，你将看到一个名为 `Integration Services 目录` 的节点。如果你创建一个名为 `SSISDB` 的新目录，它将看起来像图\
    \ 15-3。\n\n![9781484200834_Fig15-03.jpg](img/9781484200834_Fig15-03.jpg)\n图 15-3.\
    \ SSISDB 目录\n\n此时，你已准备好部署你的包。不过，首先你应该确保项目设置为使用项目部署模型。你可以通过右键单击项目来完成此操作。如果你看到 `转换为包部署模型`\
    \ 的选项，如图 15-4 所示，那么你就处于此模式。\n\n![9781484200834_Fig15-04.jpg](img/9781484200834_Fig15-04.jpg)\n\
    图 15-4. 处于项目部署模式的项目\n\n最后，你将包部署到 SSIS 目录。这会将包存储在 `SSISDB` 数据库中，并允许进行一些默认的和可配置的日志记录。\n\
    \n接下来，我们将查看存储两种类型日志信息的表。\n\n### 目录表\n\n当包运行时，所有信息都存储在部署 `Integration Services`\
    \ 包的同一服务器上的 `SSISDB` 数据库中的一组表中。虽然存在一系列内部表，但你的大多数报告将从目录视图生成。图 15-5 显示了 SSIS 内部表的数据库关系图，而图\
    \ 15-6 显示了 SSIS 目录视图的列表。\n\n![9781484200834_Fig15-05.jpg](img/9781484200834_Fig15-05.jpg)\n\
    图 15-5. SSIS 目录内部表\n\n![9781484200834_Fig15-06.jpg](img/9781484200834_Fig15-06.jpg)\n\
    图 15-6. SSIS 目录视图\n\n## 事后更改日志级别\n\n即使在包已部署到 `Integration Services` 服务器后，你也可以更改发生的日志记录数量。但为什么你想这样做呢？如果你最初设置包时定义了一组日志事件，你将只能看到该数据集。然而，如果你正在进行更高级别的故障排除，或者有一个特定的错误需要追踪，你可能希望包含更多事件。另一方面，你可能希望通过减少记录的事件数量来提高包的性能。\n\
    \n修改包级别的日志记录并非最佳实践。即使是更改最轻微的项，打开包也会增加发生破坏性更改的风险，无论是由于输入错误值还是选择了不可用的日志记录选项。在某些组织中，在包级别对日志记录进行的修改甚至可能导致包必须再次经历变更控制过程。理想情况下，你希望在完全不接触包的情况下，在外部位置进行日志记录更改。\n\
    \n在 `Integration Services 2012` 中，你可以从四种不同的日志记录级别中选择，如表 15-1 所述。\n\n**表 15-1**.\
    \ SSIS 日志记录级别\n\n![Table15-1.jpg](img/Table15-1.jpg)\n\n## 设计模式\n\n现在你知道如何设置和记录信息了，让我们逐步了解以下设计模式：\n\
    \n1.  更改日志级别\n2.  使用现有报告\n3.\n"
- fmt: "# Changing the Logging Level\n\nNow that you know what the different logging\
    \ levels are and when you would use each one, let’s walk through changing the\
    \ logging level. You can do this in either of two ways: through the execution\
    \ interface or through a command-line execution.\n\nTo modify the logging level\
    \ through the execution interface, you will connect your Integration Services\
    \ Catalog, right-click on the desired package, and select **Execute**. On the\
    \ Execute Package screen, you will see the Logging Level option on the Advanced\
    \ tab. By default, the option is set to Basic, as shown in [Figure 15-7](#9781484200834_Ch15.xhtml#Fig7).\
    \ Alternatively, you can modify this value to another logging level to see more\
    \ or less in the logging tables.\n\n![9781484200834_Fig15-07.jpg](images/9781484200834_Fig15-07.jpg)\n\
    \n[Figure 15-7](#9781484200834_Ch15.xhtml#_Fig7). Execute Package screen\n\nThe\
    \ other option is to modify logging through the command line. All packages can\
    \ be executed through the command line, and you can set a logging level associated\
    \ with an individual execution.\n\n> **Note** Much of the functionality associated\
    \ with administering Integration Services packages can be accessed through a command-line\
    \ interface. By using the command line, you can integrate your Integration Services\
    \ administration with your other maintenance tasks.\n\nRun the following code\
    \ in [Listing 15-2](#9781484200834_Ch15.xhtml#list2) to change the logging level\
    \ to log all Verbose records for a new execution.\n\n## Listing 15-2. Statement\
    \ to Modify the Logging Level for an Execution\n\n```sql\nDECLARE @execution_id\
    \ INT\nEXECUTE [catalog].[create_execution]\n    @folder_name = 'DesignPatterns'\n\
    \    ,@project_name = 'DesignPatterns'\n    ,@package_name = 'Ch15_Reporting.dtsx'\n\
    \    ,@reference_id = null\n    ,@use32bitruntime = false\n    ,@execution_id\
    \ = @execution_id OUTPUT\n\nEXECUTE [catalog].[set_execution_parameter_value]\n\
    \    @execution_id\n    ,@object_type = 50\n    ,@parameter_name = 'LOGGING_LEVEL'\n\
    \    ,@parameter_value = 3 --Verbose\n\nEXECUTE [catalog].[start_execution]\n\
    \    @execution_id\n```\n\nOnce you’ve done this, you can see the output from\
    \ the newly set logging level by running the query in [Listing 15-3](#9781484200834_Ch15.xhtml#list3).\n\
    \n## Listing 15-3. Query to Return All Messages\n\n```sql\nselect *\nfrom catalog.event_messages\n\
    where operation_id =\n    (select max(execution_id) from catalog.executions)\n\
    ```\n\n# Using the Existing Reports\n\nOur next design pattern is an important\
    \ one: use what is provided to you. Included in the SSIS Catalog are reports that\
    \ use the logging information we have just discussed. The information in these\
    \ reports includes an in-depth view of all of your packages’ executions. These\
    \ reports are a great start for you to see when your packages run, if any errors\
    \ occur, and potential trouble areas for you to investigate.\n\n[Figure 15-8](#9781484200834_Ch15.xhtml#Fig8)\
    \ shows all of the reports available to you. You can access all reports through\
    \ the Management Studio interface and the Integration Services Catalog node.\n\
    \n![9781484200834_Fig15-08.jpg](images/9781484200834_Fig15-08.jpg)\n\n[Figure\
    \ 15-8](#9781484200834_Ch15.xhtml#_Fig8). Available catalog reports\n\nIf you\
    \ are looking at a specific execution, you will always want to start with the\
    \ Overview report, which can be run by selecting the Overview link on any of the\
    \ provided reports. In fact, at the end of an execution through the interface,\
    \ you will be asked if you want to see this report. If you select yes, you will\
    \ see something similar to [Figure 15-9](#9781484200834_Ch15.xhtml#Fig9).\n\n\
    ![9781484200834_Fig15-09.jpg](images/9781484200834_Fig15-09.jpg)\n\n[Figure 15-9](#9781484200834_Ch15.xhtml#_Fig9).\
    \ An overview report\n\n# Creating New Reports\n\nNow that you’ve seen the reports\
    \ that are available to you without doing any work, you may be perfectly happy.\n\
    \nIf not, you may want to dig into the data a little deeper. You can create new\
    \ reports by looking at the catalog views that were described earlier. Particular\
    \ reasons why you may want to do this include:\n\n1.  Seeing the longest-running\
    \ executions\n2.  Finding out why a package failed\n3.  Understanding the inner\
    \ workings of a particular component\n\nLet’s start with the first reason. This\
    \ report is interesting because it uses the main output view, but based on the\
    \ query and transformations, it becomes a helpful little tool. [Listing 15-4](#9781484200834_Ch15.xhtml#list4)\
    \ shows the query that lists the five longest-running packages over the past day.\n\
    \n## Listing 15-4. Query for Five Longest-Running Packages\n\n```sql\nselect top\
    \ 5\n    e.execution_id,\n    e.package_name,\n    DATEDIFF(ms, start_time, end_time)\
    \ as duration_ms\nfrom catalog.executions e\nwhere e.start_time > DATEADD(dd,\
    \ -1, getdate())\norder by duration_ms desc\n```\n\nThe second reason you may\
    \ want a new report is to see why a package failed. You will use an additional\
    \ view for this information, the `catalog.event_messages` view. Restricting the\
    \ data on both the `executions` and the `event_messages` view will ensure that\
    \ you get only packages that failed entirely and see only the events that caused\
    \ them to fail. This query can be seen in [Listing 15-5](#9781484200834_Ch15.xhtml#list5).\n\
    \n## Listing 15-5. Failed-Packages Query\n\n```sql\nselect\n    e.execution_id,\n\
    \    e.package_name,\n    em.*\nfrom catalog.executions e\ninner join catalog.event_messages\
    \ em\n    on e.execution_id=em.operation_id\nwhere e.status = 4\n    and em.event_name\
    \ = 'OnError'\n```\n\nThe final reason is to understand the inner workings of\
    \ a particular component. You can see the individual steps that occurred during\
    \ the execution of each component in the data flow. For example, the query in\
    \ [Listing 15-6](#9781484200834_Ch15.xhtml#list6) returns each step that occurs\
    \ in the execution of the sources, transformations, and destinations and how long\
    \ each step takes.\n\n## Listing 15-6. Query to Return Component Phases and Times\n\
    \n```sql\nselect\n    subcomponent_name,\n    phase,\n    DATEDIFF(ms, start_time,\
    \ end_time) as duration_ms\nfrom catalog.execution_component_phases\nwhere package_name\
    \ = 'Ch16_Reporting.dtsx'\n    and task_name = 'Data Flow Task'\n```\n\nOnce you\
    \ have your desired query, you can either run it directly from Management Studio\
    \ or embed it into a Reporting Services report to make it look like the standard\
    \ reports available in the solution. To make the report through Management Studio,\
    \ you can store the folders in your local Documents folder, under the structure\
    \ `SQL Server Management Studio\\Custom Reports`. To access them, you will then\
    \ select the Custom Reports option under the Reports menu on the Integration Services\
    \ node, as shown in [Figure 15-10](#9781484200834_Ch15.xhtml#Fig10).\n\n![9781484200834_Fig15-10.jpg](images/9781484200834_Fig15-10.jpg)\n\
    \n[Figure 15-10](#9781484200834_Ch15.xhtml#_Fig10). Selection of custom reports\n\
    \n# Summary\n\nThis chapter has discussed many ways to monitor your Integration\
    \ Services packages. Whether you are using an older version of the tool or the\
    \ latest and greatest, you will be able to understand the internal workings of\
    \ the package by following the design patterns described here. Discussions of\
    \ both package logging and reporting and catalog logging and reporting have shown\
    \ you how to modify the types of events you log and how to retrieve that information.\n\
    \n# CHAPTER 16 Parent-Child Patterns\n\nIn earlier versions of Integration Services,\
    \ the data movement platform did not include a management framework, which is\
    \ the implementation of the execution, logging, and deployment of the Integration\
    \ Services packages. To try to fill this hole, developers created their own management\
    \ framework to use in their organizations."
