  trans: "\n如你所推断，你代表 SMP 系统，而那十个人则代表 MPP 系统。这种分而治之的策略正是 MPP 设备特别适合高容量、扫描密集型数据仓库环境的原因，尤其是那些需要扩展到数百\
    \ TB 甚至 PB 级存储的环境。除了 Microsoft，市面上还有其他 MPP 设备供应商；然而，凭借 PolyBase 能轻松将 HDInsight\
    \ 中的非结构化数据与 PDW 中的结构化数据进行关联、与 Microsoft 商业智能栈（`SQL Server`、`Integration Services`、`Analysis\
    \ Services`和`Reporting Services`）的紧密集成，以及极具吸引力的每 TB 成本，使得`APS`成为那些需要将其`SQL Server`数据仓库提升到新水平的组织的自然演进选择。在本章中，我们将逐步介绍如何使用`Integration\
    \ Services`高效地将数据加载到`APS`设备中的`PDW`区域。但在开始之前，我们将首先探讨`APS`的架构。`APS`本身的内容足以单独成书，因此我们仅涵盖最相关的部分，以确保你具备将数据高效加载到`PDW`所需的基础知识。\n\
    \n![Image](img/sq.jpg) `提示` 在`http://microsoft.com/aps`了解更多关于 Microsoft 的分析平台系统（`APS`）、并行数据仓库（`PDW`）和`HDInsight`的信息。\n\
    \n# `APS`设备概述\n\n通常，`ETL`开发人员和数据集成工程师无需担心他们交互的数据库系统的硬件规格。但当你加载`MPP`系统时，情况就不同了。由于`MPP`系统旨在利用分布式数据和并行化工作负载，设计充分利用`MPP`系统并行单元的`ETL`解决方案将带来巨大的性能优势。因此，在深入探讨加载模式之前，我们将简要回顾\
    \ Microsoft `APS`设备的一般硬件和软件架构。\n\n## 硬件架构\n\nMicrosoft 与`Dell`、`HP`和`Quanta`合作并密切协作，为客户提供硬件供应商的选择。`APS`设备的硬件规格会因你选择的硬件供应商和容量需求而异，尽管各供应商之间存在一些共通之处。\n\
    \n![Image](img/sq.jpg) `注意` 为简洁起见，我们将仅检查由`PDW`组成的`APS`配置。但值得注意的是，`PDW`和`HDInsight`可以通过为每个应用分配独立的硬件区域，在同一设备中并行运行。Microsoft\
    \ 将此配置称为`多区域设备`。\n\n`基础机架`是可供购买的最小单位，包含运行`SQL Server PDW`区域所需的一切。根据硬件供应商的不同，最低配置将包含两个或三个`计算节点`。类似地，`扩展单元`——即扩展设备容量所需的计算节点数量——取决于供应商，将是两个或三个`计算节点`。对于所有基础机架，无论硬件供应商如何，基础机架顶部都包含以下内容：\n\
    \n*   两个冗余的`InfiniBand`交换机\n*   两个冗余的`以太网`交换机\n*   一个活动服务器，其中包含用于以下功能的`虚拟机`：\n\
    \    *   `SQL Server PDW`控制节点\n    *   管理和`Active Directory`\n    *   基础结构`Active\
    \ Directory`\n    *   `Hyper-V`虚拟机管理器\n*   一个被动备用服务器\n\n基础机架底部包含额外的服务器和存储。要添加更多存储或处理能力，请向基础机架添加`扩展单元`，直到基础机架满载。\n\
    \n![Image](img/sq.jpg) `注意` 为简洁和一致起见，我们将使用`Dell`硬件配置的图示。但是，请不要误以为这是作者的背书。我们建议你查看每个硬件供应商的产品，并选择最符合你要求的方案。\n\
    \n一旦基础机架满载，你可以通过添加一个或多个`扩展机架`，继续为你的`APS`设备提供近乎线性的可扩展性。所有扩展机架，无论硬件供应商如何，都由以下部分组成：\n\
    \n*   两个冗余的`InfiniBand`交换机\n*   两个冗余的`以太网`交换机\n*   两或三个`计算节点`组成的`扩展单元`\n\n`扩展机架`与`基础机架`非常相似。就像基础机架一样，扩展机架底部包含以两或三个`计算节点`为单位的`扩展单元`中的服务器和存储。实际上，`基础机架`和`扩展机架`之间的唯一区别在于机架顶部缺少活动服务器和可选的备用服务器。\n\
    \n## 软件架构\n\n在上一节中，我们讨论了`基础机架`和`扩展机架`的主要区别在于机架顶部的活动服务器。让我们更详细地探讨一下该服务器。\n\n活动服务器由四个虚拟机（`虚拟机`）组成，这些虚拟机提供设备运行所必需的功能。这四个`虚拟机`分别是`PDW`控制节点（`CTL`）、管理和`Active\
    \ Directory`（`MAD`）、基础结构`Active Directory`（`AD`）和`Hyper-V`虚拟机管理器（`VMM`）。作为`ETL`开发人员或数据集成工程师，你将只直接与`PDW`控制节点`虚拟机`交互。图\
    \ 8-1 描绘了一个九节点机架以及驻留在活动服务器中的四个`虚拟机`。\n\n![9781484200834_Fig08-01.jpg](img/9781484200834_Fig08-01.jpg)\n\
    \n图 8-1。`APS`虚拟机\n\n`PDW`控制节点`虚拟机`提供以下关键功能：\n\n*   客户端连接和身份验证\n*   系统和数据库元数据\n\
    *   `SQL`请求处理\n*   执行计划准备\n*   分布式执行编排\n*   结果聚合\n\n你可以将`控制节点`视为`PDW`分布式和并行化处理背后的“大脑”。虽然元数据存储在`控制节点`上，但用户数据不会持久化在那里。相反，`控制节点`将用户数据的加载和检索定向到适当的`计算节点`和`\
    \ distribution`（数据分布）。这是我们第一次引入` distribution`这个术语，所以如果你还不熟悉，别担心。我们将在下一节介绍` distribution`。\n\
    \n## 无共享架构\n\n`PDW`的核心是`无共享架构`的概念。在`无共享架构`中，单个逻辑表被拆分成许多更小的物理片段。具体的片段数量取决于`PDW`区域中的`计算节点`数量。在单个`计算节点`内，每个数据片段又会被进一步拆分到八（`8`）个`\
    \ distribution`中。每个`计算节点`的` distribution`数量无法配置，并且在所有硬件供应商中都是一致的。\n\n` distribution`是`PDW`中最细粒度的物理层级。每个`\
    \ distribution`包含其专用的`CPU`、`内存`和存储（`LUN`），用于存储和检索数据。因为每个` distribution`都有其专用的硬件，它可以与其他`\
    \ distribution`并行执行加载和检索操作。这个概念就是我们所说的“无共享”。`无共享架构`带来了许多好处，例如更好的线性可扩展性。但也许`PDW`最强大的能力在于其以惊人速度扫描数据的能力。\n\
    \n让我们来计算一下。假设你有一个`PDW`设备，其`基础机架`包含`9 个计算节点`，你需要存储一个包含`10 亿行`的表。数据将被分散到所有`9 个计算节点`，而每个`计算节点`又会将其数据分散到`8\
    \ 个 distribution`中。因此，这`10 亿行`的表将被分散到`72 个 distribution`（`9 个计算节点` × `每个计算节点 8\
    \ 个 distribution`）。这意味着每个` distribution`将存储大约`13,900,000 行`。\n"
- fmt: 'But what does this mean from the end user’s standpoint? Let’s look at a hypothetical
    situation. You are a user at a retail company and you have a query that joins
    two tables together: a `Sales` table with 1 billion rows, and a `Customer` table
    with 50 million rows. And, as luck would have it, there are no indexes available
    that will cover your query. This means you will need to `scan`, or read, every
    row in each table.


    In an `SMP` system—where memory, storage, and CPU are shared—this query could
    take hours or days to run. On some systems, it might not even be feasible to attempt
    this query, depending on factors such as the server hardware and the amount of
    activity on the server. Suffice it to say, the query will take a considerable
    amount of time to return and will most likely have a negative impact on other
    activity on the server.


    In `PDW`, these kinds of queries often return in minutes, and a well-designed
    schema, where the rows you’re joining are stored together on the same distribution,
    can even execute this query in seconds. This is because the architecture is `optimized`
    for scans; `PDW` `expects` to scan every row in the table. Remember how we said
    that every distribution has its own dedicated CPU, memory, and storage? When you
    submit the query to join 1 billion rows to 50 million rows, each distribution
    is performing a scan on its own `Sales` table of 13,800,000 rows and `Customer`
    table with 695,000 rows. These smaller volumes are much more manageable, and an
    idle distribution can handle this workload with ease. The data is then sent back
    to the `Control` node across an ultra-fast dual-`InfiniBand` channel to consolidate
    the results and return the data to the end user. It is this divide-and-conquer
    strategy that allows `PDW` to significantly outperform `SMP` systems.


    ## Clustered Columnstore Indexes


    `Columnstore` refers to the storing of data in a columnar—or column-oriented—storage
    format. In traditional `RDBMS` systems, data is stored using a `rowstore`—or row-oriented—storage
    format. `Rowstores` are generally well suited for transactional applications where
    the application is concerned with most or all columns for one or a small number
    of rows. `Columnstores`, on the other hand, are better suited for analytical applications,
    which are generally concerned with a subset of columns and a large portion, or
    even all, of the rows in the table.


    For those of you familiar with indexing in `SQL Server`, you may think of a clustered
    columnstore index (`CCI`) as analogous to a clustered index in a row-oriented
    table. But unlike a clustered index, once a `CCI` has been defined, additional
    indexes such as nonclustered indexes may not be created on that table.


    `CCIs` offer several performance improvements over traditional `rowstores` in
    `PDW`. Some customers have seen up to ten times the query performance and up to
    seven times the data compression improvements. Because of the compression and
    related performance improvements, Microsoft recommends `CCI` as the standard storage
    format for tables in `PDW`.


    ![Image](images/sq.jpg) **Tip**  `Columnstores` are available in both `PDW` and
    `SQL Server Enterprise Edition`. For more information on columnstore indexes,
    refer to the “Columnstore Indexes Described” topic on `MSDN`, or navigate to `http://msdn.microsoft.com/en-us/library/gg492088`.


    ## Loading Data


    We discussed in the previous section that `PDW` is able to query data very efficiently
    because of its shared-nothing architecture. For the same reason, `PDW` is also
    able to load data very efficiently. Let’s briefly discuss how `PDW` can perform
    data imports so efficiently.


    As previously mentioned, the `Control VM` is the first stop for anything being
    written or retrieved from the appliance. The `Control` node determines which `Compute`
    nodes will be involved in the storage operation. Each `Compute` node then uses
    a hashing algorithm to determine where to store the data, down to the individual
    distribution and associated `LUNs`. This allows each distribution to load its
    data in parallel with other distributions. Again, dividing and conquering a large
    table import in parallel will be much faster than performing a single large import
    or performing several smaller imports serially.


    Data can be imported from numerous platforms, including from `Oracle`, `SQL Server`,
    `MySQL`, and flat files. There are two primary methods of loading data into the
    `PDW` appliance: `DWLoader` and `Integration Services`. We will briefly discuss
    when to use `DWLoader` vs. `Integration Services`. After that, we will walk through
    an example of loading data from `SQL Server` using `Integration Services`.


    ## DWLoader vs. Integration Services


    `DWLoader` is a command-line utility that ships with `PDW`. Those familiar with
    `SQL Server BCP` (bulk copy program) will have an easy time learning `DWLoader`,
    because both utilities share a very similar syntax. One very common pattern for
    loading data into `PDW` from `SQL Server` is to:


    ```

    1. Export data from SQL Server to a flat file using BCP.

    2. Store the flat file on the loading server.

    3. Import the data file from the loading server to PDW using DWLoader.

    ```


    This is a very efficient method for importing data, and it is very easy to generate
    scripts for table `DDL`, `BCP` commands, and `DWLoader` commands. For this reason,
    you may want to consider `DWLoader` for performing initial and incremental loading
    of the large quantity of small dimensional tables that often exist in data warehouses.
    Doing so can greatly speed up a data warehouse migration. This same load pattern
    can also be used with flat files generated from any system, not just `SQL Server`.


    For your larger tables, you may instead want to consider `Integration Services`.
    `Integration Services` offers greater functionality and arguably more end-to-end
    convenience. This is because `Integration Services` is able to connect directly
    to the data source and load the data into the `PDW` appliance without having to
    stop at a file share. Another important distinction is that `Integration Services`
    can also perform transformations in flight, which `DWLoader` does not support.


    It’s worth noting that each data flow within `Integration Services` is single-threaded
    and can bottleneck on `I/O`. Typically, a single-threaded `Integration Services`
    package will perform up to ten times slower than `DWLoader`. However, a multithreaded
    `Integration Services` package—similar to the one we will create shortly—can mitigate
    that limitation. For large tables requiring data type conversions, an `Integration
    Services` package with ten parallel data flows provides the best of both worlds:
    similar performance to `DWLoader` and all the advanced functionality that `Integration
    Services` offers.


    You should consider a number of variables when deciding whether to use `DWLoader`
    or `Integration Services`. In addition to table size, both network speed and table
    design can have an impact. At the end of the day, most `PDW` implementations will
    likely use a combination of both tools. The best idea is to test the performance
    of each method in your environment and use the tool that makes the most sense
    for each table pattern.


    ## ETL vs. ELT


    Many `Integration Services` packages are designed using an extract, transform,
    and load (`ETL`) process. This is a practical model that strives to lessen the
    impact of moving data on the source and destination servers, which are traditionally
    more resource-constrained, by placing the burden of data filtering, cleansing,
    and other such activities on the (arguably more easy-to-scale) `ETL` server. Extract,
    load, and transform (`ELT`) processes, in contrast, place the burden on the destination
    server.'
