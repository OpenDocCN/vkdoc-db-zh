    (this equates to `NOT [!] $Package::CopyOnly`, or when `$Package::CopyOnly` is
    `False`). For the `fsys Delete Original File` File System task to fire, the `fsys
    Move File` File System task must succeed and the `$Package::CopyOnly` package
