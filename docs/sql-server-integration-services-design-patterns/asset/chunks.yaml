    XML 源组件将为每个嵌套的 XML 元素生成一个单独的输出。对于清单 9-3 中的 XML 文档，将有三个输出：`Customers`、`Customer`
    和 `Name`。每个输出都包含模式中定义的元素和属性，以及一个 `<element_name>_Id` 列，该列充当行的主键。为子元素生成的输出将包含其父元素输出的
