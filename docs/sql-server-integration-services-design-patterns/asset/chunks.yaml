    [Figure 6-8](#9781484200834_Ch06.xhtml#_Fig8). 配置了动态查询属性的 OLE DB 源编辑器\n\n当此包运行时，使用包参数传入正确的环境架构名称。`query`\
    \ 变量上的表达式将被设置为新的查询并正确执行。确保将 OLE DB 源上的 `ValidateExternalMetadata` 属性设置为 `False`，以确保包验证成功。\n\
    \n## 总结\n\n本章介绍了连接 IBM DB2 数据库不同类型所需的多种模式。您学习了如何确定您拥有的 DB2 数据库类型、如何选择合适的提供程序以及查询数据库的不同方法。请注意，有些组织在处理\
    \ DB2 时会采取不同的途径：将数据导出到文件，然后使用 SSIS 加载该文件。如果存在网络延迟或连接到 DB2 数据库的问题，这是一个完全有效的选项，对您来说可能更有意义。如果您决定采用此方法，可以学习如何使用扁平文件源模式加载数据，这将在[第\
    \ 7 章](#9781484200834_Ch07.xhtml)中讨论。\n\n# 第 7 章\n\n![image](images/frontdot.jpg)\n\
    \n## 扁平文件源模式\n\n在系统之间传输数据的一种常见方法是将源数据导出到扁平文件，然后将该文件的内容导入目标数据库。扁平文件有各种形状、大小和类型。没有行长度限制。文件大小受操作系统允许的最大大小限制。在检查扁平文件类型时，有两个初步考虑因素：文件格式和模式。扁平文件源的常见文件格式包括：\n\
    \n*   逗号分隔值 (CSV)\n*   制表符分隔文件 (TDF)\n*   固定宽度文件\n\n在扁平文件中，与数据库一样，模式包含列和数据类型。模式选项还允许更奇特的文件格式选项，例如“ragged\
    \ right”和“variable-length rows”扁平文件。\n\n在本章中，我们将研究将普通扁平文件源加载到 SQL Server 中的常见模式；然后扩展该模式以加载可变行长扁平文件源。接下来，我们将研究创建和使用某些扁平文件格式中常见的文件头行。最后，我们将构建一个非常有用的\
    \ SSIS 设计模式：归档文件。\n\n### 扁平文件源\n\n让我们从一个简单的扁平文件源开始。您可以将下面的数据复制并粘贴到记事本等文本编辑器中，并将其另存为\
    \ `MyFlatFile.csv`：\n```\nRecordType,Name,Value\nA,Simple One,11\nB,Simple Two,22\n\
    C,Simple Three,33\nA,Simple Four,44\nC,Simple Five,55\nB,Simple Six,66\n```\n\n\
    列名位于第一行。这很方便，但您并不总能在第一行获得列名——或者在源扁平文件中的任何地方获得。\n\n在离开演示项目的设置阶段之前，让我们创建一个名为 `StagingDB`\
    \ 的数据库，用作目标。我使用 [Listing 7-1](#9781484200834_Ch07.xhtml#list1) 中的可重复执行 T-SQL 脚本来创建\
    \ `StagingDB` 数据库。\n\n[***Listing 7-1***](#9781484200834_Ch07.xhtml#_list1). 创建\
    \ StagingDB\n```sql\nuse master\ngo\n\nIf Not Exists(Select name\n           \
    \   From sys.databases\n              Where name='StagingDB')\n begin\n  print\
    \ 'Creating StagingDB database'\n  Create Database StagingDB\n  print 'StagingDB\
    \ database created'\n end\nElse\n print 'StagingDb database already exists.'\n\
    ```\n\n在可用于测试和开发的服务器上执行此脚本。现在您已准备好开始构建演示！\n\n### 转到 SSIS！\n\n打开 SQL Server Data\
    \ Tools - Business Intelligence (SSDT-BI) 并创建一个名为 **Chapter 7** 的新 SSIS 项目，并将初始包重命名为\
    \ **Chapter7.dtsx**。将数据流任务拖到控制流画布上，然后双击它以打开编辑选项卡。\n\n有几种方法可以为数据流创建扁平文件源：您可以使用源助手，也可以展开数据流\
    \ SSIS 工具箱中的其他源并配置扁平文件源适配器。让我们使用后一种方法：将扁平文件源适配器从数据流工具箱拖到数据流画布上并打开编辑器。[Figure 7-1](#9781484200834_Ch07.xhtml#Fig1)\
    \ 显示了扁平文件源编辑器的连接管理器页面。\n\n![9781484200834_Fig07-01.jpg](images/9781484200834_Fig07-01.jpg)\n\
    \n[Figure 7-1](#9781484200834_Ch07.xhtml#_Fig1). 扁平文件源编辑器连接管理器配置\n\n由于这个新的 SSIS\
    \ 项目中没有定义连接管理器，请单击扁平文件连接管理器下拉列表旁边的“新建”按钮以打开扁平文件源编辑器。在“常规”页面上，将连接管理器命名为 **My Flat\
    \ File**。单击“文件名”文本框旁的“浏览”按钮，并导航到保存 `MyFlatFile.csv` 的位置。\n\n请注意，默认情况下，“文件名”文本框仅显示\
    \ `.txt` 文件。将筛选器更改为 `*.csv` 以便查看并选择 `MyFlatFile.csv`。\n\n如 [Figure 7-2](#9781484200834_Ch07.xhtml#Fig2)\
    \ 所示，选中“第一行数据中包含列名称”复选框：\n\n![9781484200834_Fig07-02.jpg](images/9781484200834_Fig07-02.jpg)\n\
    \n[Figure 7-2](#9781484200834_Ch07.xhtml#_Fig2). 配置 My Flat File 连接管理器\n\n请注意窗口底部的警告：此连接管理器的列尚未定义。对于格式正确的简单\
    \ CSV 文件，SSIS 现在有足够的信息来读取扁平文件的模式并完成连接管理器的映射。[Figure 7-3](#9781484200834_Ch07.xhtml#Fig3)\
    \ 显示了用于定义列和行分隔符的“列”页面。\n\n![9781484200834_Fig07-03.jpg](images/9781484200834_Fig07-03.jpg)\n\
    \n[Figure 7-3](#9781484200834_Ch07.xhtml#_Fig3). 扁平文件连接管理器编辑器的“列”页面\n\n默认情况下，扁平文件中的所有数据都是文本。\n\
    \n单击“确定”按钮关闭扁平文件连接管理器编辑器，然后单击“确定”按钮关闭扁平文件源编辑器。\n\n### 强类型化数据"
  raw: 'Once the Derive Parameters property is set, you will write your query using
    question marks, similar to those in [Listing 6-2](#9781484200834_Ch06.xhtml#list2).
    Put the query in the SQL command in the source component.


    [***Listing 6-2***](#9781484200834_Ch06.xhtml#_list2). Sample Query to Illustrate
    DB2 Parameters


    ```

    SELECT col1

            , col2

            , col3

    FROM tab1

    WHERE col4 = ?

    ```


    Be sure to click the Parameters button next to the query in the source to assign
    variables to each parameter that you set. It is important that the list of variables
    in the Parameters window match the correct order in the query.


    There are some scenarios where using query parameters won’t work. Let’s look at
    when you can’t use query parameters and what to do instead.


    DB2 Source Component Dynamic Queries


    Parameterized queries will not work if the content of the source query needs to
    be changed for any reason. The table, schema, or column names could change as
    part of the query content. A typical example of this in DB2 is when you have different
    schemas in each environment. To fix this, we set an expression on a variable and
    use the variable in the `SQLStatement` property. Let’s walk through the steps
    of setting this up.


    Begin by creating two string variables: `environment` and `query`. Set the following
    properties on the `query` variable:


    ```

    EvaluateAsExpression: True

    Value: "select col1, col2 from" + @environment + ".tab1"

    ```


    ![Image](images/sq.jpg) **Note**  In Integration Services’s editions prior to
    SQL Server 2012, expressions had a limit of 4000 characters. This restriction
    is now removed, allowing you to create strings as long as you need them to be.


    In the OLE DB source component, change the query type to SQL Command from Variable,
    and pick the `query` variable that you just selected, as shown in [Figure 6-8](#9781484200834_Ch06.xhtml#Fig8).


    ![9781484200834_Fig06-08.jpg](images/9781484200834_Fig06-08.jpg)


    [Figure 6-8](#9781484200834_Ch06.xhtml#_Fig8). OLE DB Source Editor with dynamic
    query properties


    When this package runs, use a package parameter to pass in the correct environment
    schema name. The expression on the `query` variable will be set to the new query
    and execute correctly. Make sure to set the `ValidateExternalMetadata` property
    on the OLE DB source to `False` to ensure that the package will validate successfully.


    Summary


    This chapter has covered many of the patterns necessary to connect to the different
    types of the IBM DB2 database. You’ve learned how to determine what type of DB2
    database you own, how to pick the appropriate provider, and different ways of
    querying the database. Note that sometimes organizations go a different route
    when dealing with DB2: exporting the data into a file and then loading the file
    using SSIS. This is a perfectly valid option and might make sense for you if you
    have network latencies or problems with connectivity to your DB2 database. If
    you decide to go this route instead, you can learn how to load the data using
    Flat File source patterns, which we will discuss in [Chapter 7](#9781484200834_Ch07.xhtml).


    CHAPTER 7


    ![image](images/frontdot.jpg)


    Flat File Source Patterns


    A common way to transfer data between systems is to export the source data to
    a flat file and then import the contents of this file into the destination database.
    Flat files come in all shapes, sizes, and types. There are no row-length limitations.
    File size is limited by the maximum size allowed by the operating system. When
    examining flat file types, there are two initial considerations: file format and
    schema. Common file formats of flat file sources include these:


    *   Comma-separated values (CSV)

    *   Tab-delimited file (TDF)

    *   Fixed-width file


    In a flat file, as in a database, schema includes columns and data types. Schema
    options also allow for more exotic file format options such as “ragged right”
    and “variable-length rows” flat files.


    In this chapter, we’ll examine a common pattern for loading a vanilla flat file
    source into SQL Server; then we’ll expand that pattern to load a variable-length
    row flat file source. We will next examine creating and consuming flat file header
    rows, which are found in some flat file formats. Finally, we will construct an
    extremely useful SSIS design pattern: Archive File.


    Flat File Sources


    Let’s begin with a simple flat file source. You can copy and paste the data below
    into a text editor such as Notepad and save it as `MyFlatFile.csv`:


    ```

    RecordType,Name,Value

    A,Simple One,11

    B,Simple Two,22

    C,Simple Three,33

    A,Simple Four,44

    C,Simple Five,55

    B,Simple Six,66

    ```


    The column names are in the first row. This is convenient, but you don’t always
    get column names in the first row—or anywhere inside a source flat file, for that
    matter.


    Before leaving the setup phase of our demo project, let’s create a database named
    `StagingDB` that we can use as a destination. I use the re-executable T-SQL script
    in [Listing 7-1](#9781484200834_Ch07.xhtml#list1) to create the `StagingDB` database.


    [***Listing 7-1***](#9781484200834_Ch07.xhtml#_list1). Create StagingDB


    ```

    use master

    go


    If Not Exists(Select name

                  From sys.databases

                  Where name=''StagingDB'')

     begin

      print ''Creating StagingDB database''

      Create Database StagingDB

      print ''StagingDB database created''

     end

    Else

     print ''StagingDb database already exists.''

    ```


    Execute this script on a server you can use for testing and development. Now you’re
    all set to begin building the demo!


    Moving to SSIS!


    Open SQL Server Data Tools - Business Intelligence (SSDT-BI) and create a new
    SSIS project named **Chapter 7** and rename the initial package to **Chapter7.dtsx**.
    Drag a Data Flow task onto the control flow canvas and double-click it to open
    the Editing tab.


    There are a couple ways to create a flat file source for the data flow: you can
    use the Source Assistant or you can you can expand Other Sources in the Data Flow
    SSIS Toolbox and configure a Flat File source adapter. Let’s utilize the latter
    method: drag a Flat File source adapter from the Data Flow toolbox onto the data
    flow canvas and open the editor. [Figure 7-1](#9781484200834_Ch07.xhtml#Fig1)
    shows the Connection Manager page for the Flat File Source Editor.


    ![9781484200834_Fig07-01.jpg](images/9781484200834_Fig07-01.jpg)


    [Figure 7-1](#9781484200834_Ch07.xhtml#_Fig1). Flat File Source Editor Connection
    Manager configuration


    Since there are no connection managers defined in this new SSIS project, click
    the New button beside the Flat File Connection Manager drop-down to open the Flat
    File Source Editor. On the General page, name the connection manager **My Flat
    File**. Click the Browse button beside the File Name textbox and navigate to the
    location where you saved `MyFlatFile.csv`.


    Be aware that, by default, the File Name textbox shows only `.txt` files. Change
    the filter to `*.csv` in order to see and select `MyFlatFile.csv`.


    As shown in [Figure 7-2](#9781484200834_Ch07.xhtml#Fig2), check the Column Names
    in the First Data Row checkbox:


    ![9781484200834_Fig07-02.jpg](images/9781484200834_Fig07-02.jpg)


    [Figure 7-2](#9781484200834_Ch07.xhtml#_Fig2). Configuring the My Flat File connection
    manager


    Note the warning near the bottom of the window: Columns Are Not Defined for This
    Connection Manager. For a properly formatted simple CSV file, SSIS now has enough
    information to read the schema of the flat file and complete the mapping for the
    connection manager. [Figure 7-3](#9781484200834_Ch07.xhtml#Fig3) shows the Columns
    page used to define the column and row delimiters.


    ![9781484200834_Fig07-03.jpg](images/9781484200834_Fig07-03.jpg)


    [Figure 7-3](#9781484200834_Ch07.xhtml#_Fig3). The Flat File Connection Manager
    Editor’s Columns page


    All data in a flat file are text by default.


    Click the OK button to close the Flat File Connection Manager Editor, and then
    click the OK button to close the Flat File Source Editor.


