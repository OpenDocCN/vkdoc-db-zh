- fmt: "### 3.  Add a data flow to your package, and drag a `Script Component` transform\
    \ from the toolbox.\n### 4.  Select `Source` from the `Select Script Component\
    \ Type` dialog as shown in [Figure 9-9](#9781484200834_Ch09.xhtml#Fig9).\n\n![9781484200834_Fig09-09.jpg](images/9781484200834_Fig09-09.jpg)\n\
    \n[Figure 9-9](#9781484200834_Ch09.xhtml#_Fig9). Creating a new script component\
    \ source\n\n### 5.  Double-click the component to bring up the `Script Transform`\
    \ editor.\n### 6.  Click the `Inputs and Outputs` page.\n### 7.  Rename your output\
    \ from `Output 0` to something more meaningful. Since our sample XML is outputting\
    \ a set of `Customers`, that is the name we’ll use for this example.\n### 8. \
    \ Define the columns as you’d like them to be output. Make sure the data types\
    \ for the columns match what has been defined in your schema. [Table 9-1](#9781484200834_Ch09.xhtml#Tab1)\
    \ shows the column-to-data-type mappings you would use for the sample defined\
    \ in [Listing 9-3](#9781484200834_Ch09.xhtml#list3). Your column definition should\
    \ look similar to [Figure 9-10](#9781484200834_Ch09.xhtml#Fig10) when you are\
    \ done.\n\n[Table 9-1](#9781484200834_Ch09.xhtml#_Tab1). Column Data Ttype Mapping\
    \ for the XML Sample\n\n| Column | Data Type |\n| --- | --- |\n| `Key` | `DT_UI4`\
    \ |\n| `FirstName` | `DT_WSTR(255)` |\n| `LastName` | `DT_WSTR(255)` |\n| `BirthDate`\
    \ | `DT_DBTIMESTAMP` |\n| `Gender` | `DT_WSTR(255)` |\n| `YearlyIncome` | `DT_UI4`\
    \ |\n\n![9781484200834_Fig09-10.jpg](images/9781484200834_Fig09-10.jpg)\n\n[Figure\
    \ 9-10](#9781484200834_Ch09.xhtml#_Fig10). Configured output columns\n\n### 9.\
    \  Go to the `Connection Managers` page and add a reference to the file connection\
    \ manager you created in step 1.\n### 10.  Give the connection manager a meaningful\
    \ name, such as `CustomerFile`. The page will look similar to [Figure 9-11](#9781484200834_Ch09.xhtml#Fig11).\n\
    \n![9781484200834_Fig09-11.jpg](images/9781484200834_Fig09-11.jpg)\n\n[Figure\
    \ 9-11](#9781484200834_Ch09.xhtml#_Fig11). Configured connection manager\n\n###\
    \ 11.  Go to the `Script` page and click the `Edit Script` button to launch the\
    \ VSTA script editor.\n\nWe’ll be adding code to the `PreExecute` and `CreateNewOutputRows`\
    \ methods of the `ScriptMain` class, as well as overriding two additional methods\
    \ from the base class: `AcquireConnection` and `ReleaseConnection`.\n\nThe `AcquireConnection`\
    \ method will retrieve the path to our XML file from the connection manager we\
    \ configured in step 10.\n\nThe `PreExecute` method will verify that the file\
    \ actually exists, and it will raise an error if it is not found.\n\nThe `CreateNewOutputRows`\
    \ method does the majority of the script’s work. It is responsible for extracting\
    \ data from our source document and outputting it to the data flow. The code that\
    \ goes in here will depend on which pattern you select.\n\nFinally, the `ReleaseConnection`\
    \ method will release the file connection, indicating to the runtime that we are\
    \ finished with it.\n\n![Image](images/sq.jpg) **Note** Although you don’t need\
    \ to call `ReleaseConnection` for a file connection manager, it’s good to get\
    \ into the habit of calling `ReleaseConnection` anytime you have a matching call\
    \ to `AcquireConnection`. Certain connection managers, such as the OLE DB connection\
    \ manager, will leave the underlying database connections open and keep resources\
    \ in memory until the connection object has been released.\n\n[Listing 9-6](#9781484200834_Ch09.xhtml#list6)\
    \ shows the code that we will be using for both script component patterns.\n\n\
    [***Listing 9-6***](#9781484200834_Ch09.xhtml#_list6). Full Source Code Listing\n\
    ```csharp\nusing System;\nusing System.Data;\nusing Microsoft.SqlServer.Dts.Pipeline.Wrapper;\n\
    using Microsoft.SqlServer.Dts.Runtime.Wrapper;\nusing System.IO;\nusing System.Xml.Serialization;\n\
    using System.Xml;\n\n[Microsoft.SqlServer.Dts.Pipeline.SSISScriptComponentEntryPointAttribute]\n\
    public class ScriptMain : UserComponent\n{\n    string pathToXmlFile;\n\n    public\
    \ override void AcquireConnections(object Transaction)\n    {\n        // Call\
    \ the base class\n        base.AcquireConnections(Transaction);\n\n        //\
    \ The file connection manager's AcquireConnection() method returns us the path\
    \ as a string.\n        pathToXmlFile = (string)Connections.CustomerFile.AcquireConnection(Transaction);\n\
    \    }\n\n    public override void PreExecute()\n    {\n        // Call the base\
    \ class\n        base.PreExecute();\n\n        // Make sure the file path exists\n\
    \        if (!File.Exists(pathToXmlFile))\n        {\n            string errorMessage\
    \ = string.Format(\"Source XML file does not exist. Path: {0}\", pathToXmlFile);\n\
    \            bool bCancel;\n            ComponentMetaData.FireError(0, ComponentMetaData.Name,\
    \ errorMessage, string.Empty, 0, out bCancel);\n        }\n    }\n\n    public\
    \ override void CreateNewOutputRows()\n    {\n        // TODO - This is where\
    \ we will load our XML document\n    }\n\n    public override void ReleaseConnections()\n\
    \    {\n        // Call the base class\n        base.ReleaseConnections();\n\n\
    \        // Release our connection\n        Connections.CustomerFile.ReleaseConnection(pathToXmlFile);\n\
    \    }\n}\n```\n\nOnce your script component is configured, you can plug in the\
    \ `CreateNewOutputRows` logic from one of the following patterns.\n\n## Processing\
    \ XML with XmlSerializer\n\nTo process the XML file using the `XmlSerializer`\
    \ class, we’ll use the XML Schema Definition tool to generate a set of .NET classes\
    \ from our XML schema file. From the command line, we’ll specify that we want\
    \ to generate classes (`/classes`), the language we’d like to use (in this example,\
    \ we’ll use C#, but VB could be used as well), the namespace of the resulting\
    \ class, and the path to our schema file. We’ll use the schema file (`Customer.xsd`)\
    \ for the customer data XML from [Listing 9-3](#9781484200834_Ch09.xhtml#list3).\
    \ The command line and `xsd.exe` output is shown in [Listing 9-7](#9781484200834_Ch09.xhtml#list7).\n\
    \n[***Listing 9-7***](#9781484200834_Ch09.xhtml#_list7). XML Schema Definition\
    \ Tool Command Line\n```shell\nC:\\demos>xsd.exe /classes /language:CS /namespace:DesignPatterns.Samples\
    \ Customer.xsd\n\nMicrosoft (R) Xml Schemas/DataTypes support utility\n[Microsoft\
    \ (R) .NET Framework, Version 2.0.50727.3038]\nCopyright (C) Microsoft Corporation.\
    \ All rights reserved.\nWriting file 'Customer.cs'.\n```\n\n![Image](images/sq.jpg)\
    \ **Note** The XML Schema Definition tool is part of the Windows SDK. On most\
    \ machines, it will be found in the `C:\\Program Files (x86)\\Microsoft SDKs\\\
    Windows\\v7.0A\\Bin` directory. For more information on the XML Schema Definition\
    \ tool, see its MSDN entry at `http://msdn.microsoft.com/en-us/library/x6c1kb0s.aspx`.\n\
    \nThe resulting `Customer.cs` file will have the classes we’ll use in our script\
    \ component. When used with the `XmlSerializer` class, we can read the entire\
    \ XML Source file into an easy-to-manipulate set of objects.\n\nBefore we begin\
    \ writing the `CreateNewOutputRows` logic, we’ll need to include the `Customer.cs`\
    \ file that we generated using `xsd.exe`. To do this, perform the following steps\
    \ from within the VSTA script editor environment:\n\n1.  Right-click the project\
    \ node in the Solution Explorer (this will start with “sc_”, followed by a string\
    \ of numbers) and choose `Add Existing Item`.\n2.  Browse to the `Customer.cs`\
    \ file that you generated with `xsd.exe`.\n3.  Open `main.cs` from the Solution\
    \ Explorer.\n4.  Include the namespace for the `Extract` class by adding `using\
    \ DesignPatterns.Samples`; to the top of the file.\n\nOnce the file has been added\
    \ to your project, you can write the code in `CreateNewOutputRows` that will read\
    \ and manipulate the XML data. The source code for the `CreateNewOutputRows` function\
    \ is in [Listing 9-8](#9781484200834_Ch09.xhtml#list8).\n\n[***Listing 9-8***](#9781484200834_Ch09.xhtml#_list8).\
    \ Script Logic for Using the XmlSerializer Class\n```csharp\npublic override void\
    \ CreateNewOutputRows()\n{\n    // Load our XML document\n    Extract extract\
    \ = (Extract) new XmlSerializer(typeof(Extract)).Deserialize(XmlReader.Create(pathToXmlFile));\n\
    ```"
