    *   Staging operations (if used) each have their own package.

    *   Functional operations unrelated to data movement (for example, dropping or
    disabling indexes on tables before loading them with data) are separated as well.
    You can group some of these operations together in common packages where appropriate;
    for example, if you truncate tables and drop indexes in a staging database, those
    operations typically reside in the same package.


    Further, it’s often a good practice to isolate in separate packages any ETL logic
    that is significantly different in terms of scope or breadth of data. For example,
    a historical ETL process that retrieves a large chunk of old data will likely
    have different performance expectations, error-handling rules, and so on than
    a more frequently executed package that collects just the most recent incremental
    data. As such, by creating a separate package structure to address those larger
    sets of data, you help avoid the issue of trying to force a single package to
    handle these disparate scenarios.


    Conclusion


    SQL Server Integration Services isn’t just another ETL tool. At its root, it is
    ideally suited for the unique challenges of data warehouse ETL. This chapter has
    shown some specific methodologies for how to leverage SSIS against common and
    realistic DW challenges.


