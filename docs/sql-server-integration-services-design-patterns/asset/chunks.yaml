    2.  Inside of a Data Flow task, retrieve the data to be cleansed with the appropriate\
    \ source component. The source data should contain a `DateLastCleansed` column\
    \ to track when the row was last processed with the DQS Cleansing transform.\n\
    3.  Use a Conditional Split transform to compare the DQS knowledge base date against\
    \ the date the row was last processed. The expression might look like this: `[DateLastCleansed]\
    \ < @[User::DQS_KB_Date]`. Rows matching this expression will be directed to a\
    \ DQS Cleansing transformation.\n4.  Handle the cleansed rows according to their\
    \ status.\n5.  Use a Derived Column transform to set a new `DateLastCleansed`\
    \ value.\n6.  Update the destination table with any corrected values and the new\
    \ `DateLastCleansed` value.\n\nFiltering Rows with the Lookup Transform\n\nYou\
    \ can reduce the number of rows you need to cleanse by validating the data with\
    \ a faster data flow component, such as the Lookup transform. Using one or more\
    \ Lookup transforms, you can check if values exist in a reference table using\
    \ quick, in-memory comparisons. Rows that match existing values can be filtered\
    \ out. Rows with values that aren’t found in the reference table can then be sent\
    \ to Data Quality Services for cleansing. Prefiltering rows this way means you\
    \ won’t be able to take advantage of the standardized formatting that DQS provides,\
    \ and this makes it difficult to do complex validation that involves relationships\
    \ between multiple fields. This approach works best when you are working with\
    \ a small number of unrelated fields that don’t require any special formatting\
    \ as part of the cleansing process.\n\nTo use this pattern, your data flow will\
    \ use the following logic:\n\n1.  Retrieve the data containing the fields to be\
    \ cleansed using a source component.\n2.  Set the component to `Ignore failure`\
    \ when there are no matching entries.\n3.  Add a Lookup transform for each field\
    \ you are going to cleanse. Each Lookup transform will use a SQL query that pulls\
    \ in a unique set of values for that field and a static Boolean (bit) value. This\
    \ static value will be used as a flag to determine whether the value was found.\
    \ Since you are ignoring lookup failures, the flag value will be `NULL` if the\
    \ lookup failed to find a match. [Listing 5-2](#9781484200834_Ch05.xhtml#list2)\
    \ shows what the query would look like for the `CountryRegionCode` field, coming\
    \ from the `DimGeography` table.\n\n[***Listing 5-2***](#9781484200834_Ch05.xhtml#_list2).\
    \ Sample Lookup Query for the `CountryRegionCode` Field\n\n```\n    SELECT DISTINCT\
    \ CountryRegionCode, 1 as [RegionCodeFlag]\n    FROM [dbo].[DimGeography]\n  \
    \  ```\n\n4.  On the Columns tab, map the field to the related lookup column,\
    \ and add the static flag value as a new column in your data flow (as shown in\
    \ [Figure 5-13](#9781484200834_Ch05.xhtml#Fig13)).\n\n![9781484200834_Fig05-13.jpg](images/9781484200834_Fig05-13.jpg)\n\
    \n[Figure 5-13](#9781484200834_Ch05.xhtml#_Fig13). Column mapping for the Lookup\
    \ transform\n\n5.  Repeat steps 3-4 for each field you will be cleansing. The\
    \ Lookup transforms should be connected using the Lookup Match outputs.\n6.  Add\
    \ a Conditional Split transform with a single expression that checks each of the\
    \ flag fields. If any of the flag fields are `NULL`, the row should be sent to\
    \ DQS for proper cleansing. For example, the expression to check the `RegionCodeFlag`\
    \ for a `NULL` value would be `ISNULL([RegionCodeFlag])`.\n7.  Connect the Conditional\
    \ Split output you created to the DQS Cleansing transform. Rows going to the Conditional\
    \ Split’s default output can be ignored (since their values were successfully\
    \ validated using the Lookup transforms).\n8.  Complete the rest of the data flow\
    \ based on the appropriate logic for handling the output of the DQS Cleansing\
    \ transform."
