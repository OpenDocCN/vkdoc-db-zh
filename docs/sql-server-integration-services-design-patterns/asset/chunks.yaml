  trans: '

    如果您发现在多个数据流任务中需要查找相同的数据，请考虑使用`缓存转换`配合`缓存连接管理器`。`缓存连接管理器`提供了通过`缓存转换`所提供数据的内存驻留副本。缓存会在第一个将使用查找数据的数据流任务之前加载，而数据可以直接被`查找转换`使用。以此方式预缓存数据不仅支持查找操作，还提供了一种“标记”行集以供其他考虑（如加载）的方法。本章稍后，我们将探讨迟到数据并讨论管理它的模式。管理“加载操作开始后数据持续到达”场景的一种方法是，创建一个包含代表已完成事务的主键和外键的缓存，然后在整个加载过程的数据流任务中与这些键进行连接。通过这种方式，您会错过最后一秒的数据加载吗？是的，您会。但您的数据将包含完整的事务。使用表缓存执行增量加载的一个好处是，可以每月、每周、每晚或每五分钟执行一次加载；只有自上次加载执行以来到达的完整事务才会被加载。


    如果您发现需要在多个 SSIS 包中使用相同的查找数据（或者缓存大小超过了可用服务器 RAM 的容量），`缓存连接管理器`可以将其内容持久化到磁盘。`缓存连接管理器`利用了新的改进的
    RAW 文件格式，这是一种专有格式，用于将数据直接从数据流任务存储到磁盘，完全绕过连接管理器。因此，读写速度非常快，并且新格式会保留列名和数据类型。


    ## 加载暂存区


    这里值得提及的另一个模式是`加载暂存区`。考虑以下场景：数据仓库目标表很大且经常增长。由于目标表在加载窗口期间被使用，因此删除键和索引不是提高加载性能的选项。所有相关数据必须大致同时在数据仓库中可用，以保持源事务一致性。从本质上讲，这些数据不适合分区。该怎么办？


    考虑使用`加载暂存区`，将代表一个源事务所需的所有数据加载到目标服务器上的暂存表中。一旦这些表填充完毕，您可以使用`执行 SQL 任务`将暂存的行插入到数据仓库目标表中。如果时间安排得当，您也许可以使用批量插入来完成加载。通常，在同一
    SQL Server 实例中的表之间进行数据加载，使用 T-SQL 可能比使用缓冲的 SSIS 数据流任务更高效。如何判断哪个性能更好？进行测试！


    ## 缓慢变化维向导


    `缓慢变化维（SCD）向导`是 SSIS 增量加载武器库中的另一员老将。顾名思义，它专为管理数据仓库中的 SCD 元素而设计。然而，它的用途当然不仅限于维度处理。


    自 2005 年 SSIS 产品推出以来，`SCD 向导`就一直是其一部分。乍一看，它是处理 SSIS 中缓慢变化维数据的自然选择。该工具内置于 Integration
    Services 中，专为 SCD 处理目的而设计。


    `SCD 向导`在 SSIS 中以转换的形式呈现，通过将数据源的输出（传入数据）连接到 SCD 转换的输入来使用。编辑 SCD 转换将启动向导，如图 11-2
    所示。


    ![9781484200834_Fig11-02.jpg](img/9781484200834_Fig11-02.jpg)


    图 11-2. `SCD 向导`显示列的对齐


    从那里开始，向导将引导您完成 SCD 配置必要元素的选择，包括：


    *   哪些列应作为 SCD 的一部分参与，以及是将更改作为简单更新（`类型 1`）还是历史值（`类型 2`）来处理的选项。

    *   如果存在任何`类型 2`列，如何识别当前行与过期行；您可以指定一个标志或一个日期范围来表示 SCD 记录的时效性。

    *   如何处理推断成员（稍后将更深入讨论）。


    当您完成`SCD 向导`后，数据流中会自动添加几个新元素。图 11-3 显示了使用`类型 1`和`类型 2`字段、固定属性（静态）字段以及推断成员支持组合时，添加的转换和目标的示例。`SCD
    向导`只添加与指定设计相关的组件，因此最终结果可能与此图中的示例略有不同，具体取决于向导的配置方式。


    ![9781484200834_Fig11-03.jpg](img/9781484200834_Fig11-03.jpg)


    图 11-3. `SCD 向导`输出


    在所有 SCD 设计模式中，`SCD 向导`可以说是处理简单 SCD 场景最易用的，并且它在设计时提供了最快的周转速度。对于小型、简单的维度，该向导可以是管理变化数据的有效工具。


    然而，`SCD 向导`确实有一些显著的缺点。


    *   **性能：** 该向导在处理小数据集时表现尚可。但是，由于许多操作都是逐行执行的，在处理规模较大的维度时使用此转换可能会导致显著的性能瓶颈。一些数据仓库架构师对`SCD
    向导`有强烈的负面看法，而这通常是主要的抱怨点。

    *   **破坏性更改：** 正如我所提到的，当您运行向导时，所有必需的转换和目标都是自动创建的。同样地，如果您重新配置 SCD 转换（例如，将列类型从`类型
    1`更改为`类型 2`历史记录），现有的设计元素将被移除并重新添加到数据流中。因此，如果您对 SCD 转换进行更改，您对该数据路径所做的任何更改都将丢失。

    *   **没有直接的审核支持：** 虽然您可以添加自己的审核逻辑，但这并不是该组件的固有功能。此外，由于对 SCD 转换的任何更改都会删除并重新创建数据流的相关元素，因此如果对
    SCD 转换进行任何更改，您将必须重新配置该审核逻辑。


    由于这些缺点（尤其是性能方面的影响），`SCD 向导`在现实世界中使用得并不多。我不想过多批评这个工具，因为它确实有其用处，我也不一定建议您完全避免使用它。然而，像任何专用工具一样，它只应在适当的地方使用。对于不需要复杂逻辑或专门日志记录的小型
    SCD 数据集，它可能是 SCD 处理最有效的选项。


    ## MERGE 语句


    尽管从技术上讲它不是 SSIS 的功能，但`MERGE`语句已经成为增量数据加载中如此重要的一部分，以至于任何专注于数据仓库设计模式的讨论若不涵盖此工具都是不完整的。


    ### 一点背景


    在 2008 版本之前，Microsoft SQL Server 中没有原生的“更新插入”（`UPdate/inSERT`）操作。任何需要混合更新和插入的操作，要么需要使用游标（通常性能很差），要么需要两个独立的查询（通常导致逻辑重复和工作冗余）。其他关系数据库产品多年前就具备了此功能——事实上，自
    Oracle 9i 版本（大约 2001 年）起就存在了。自然，SQL Server 专业人士一直渴望获得这样的功能。

    '
- fmt: '# MERGE语句简介


    Fortunately, they got their wish with the release of SQL Server 2008. That version
    featured the debut of the new `MERGE` statement as part of the T-SQL arsenal.
    `MERGE` allows three simultaneous operations (`INSERT`, `UPDATE`, and `DELETE`)
    against the target table.


    The anatomy of a `MERGE` statement looks something like this:


    1.  Specify the source data.

    2.  Specify the target table.

    3.  Choose the columns on which to join the source and target data.

    4.  Indicate the column alignment between the two sets of data to be used for
    determining whether matched records are different in some way.

    5.  Define the logic for cases when the data is changed, or if it only exists
    in either the source or the destination.


    The new `MERGE` capabilities are useful for DBAs and database developers alike.
    However, for data warehouse professionals, `MERGE` was a game changer in terms
    of managing SCD data. Not only did this new capability provide an easier way to
    perform upsert operations, but it also performed very well.


    # MERGE详解


    ## 在SSIS中的实现


    Since there are no native (read: graphical) hooks to the `MERGE` statement in
    Integration Services, the implementation of `MERGE` in an SSIS package is done
    through an Execute SQL task.


    To explore this design pattern, let’s first examine the typical flow for using
    the T-SQL `MERGE` functionality within a data warehouse SSIS load package. Again,
    we’ll use the SCD scenario as a basis for exploration, but much of the same logic
    would apply to other uses of `MERGE`.


    As part of an SCD `MERGE` upsert process, our SSIS package would contain tasks
    to perform the following functions:


    1.  Remove previously staged data from the staging table.

    2.  Load the staging table from the source system.

    3.  Clean up the staged data (if required).

    4.  Execute the `MERGE` statement to upsert the staged data to the dimension table.

    5.  Log the upsert operation (optional).


    A typical control flow design pattern is shown in [Figure 11-4](#9781484200834_Ch11.xhtml#Fig4).


    ![9781484200834_Fig11-04.jpg](images/9781484200834_Fig11-04.jpg)


    [Figure 11-4](#9781484200834_Ch11.xhtml#_Fig4). Using MERGE against a SCD table


    ## `MERGE`语句关键点


    Also note the large callout in [Figure 11-4](#9781484200834_Ch11.xhtml#Fig4) with
    the T-SQL code used for the `MERGE` statement. In the interest of maintaining
    focus, I won’t try to provide comprehensive coverage of the `MERGE` statement
    here, but I’ll point out a couple of the high points:


    *   The `ON` clause (third line) indicates the field on which we join the source
    data with the destination data. Note that we can use multiple fields on which
    to align the two sets.

    *   The ten-line code block following `WHEN MATCHED AND NOT...` indicates which
    of the fields will be checked to see if the data in the destination table differs
    from the source data. In this case, we’re checking ten different fields, and we’ll
    process an update to the destination if any of those fields is different between
    the source and destination. Also note the liberal use of the `ISNULL()` function
    against the destination table. This is recommended to ensure that rows in the
    destination table containing `NULL` values are not inadvertently skipped during
    the `MERGE`.

    *   In the code block immediately following, we update rows in the target table
    that have a valid match against the source but have one or more values that differ
    between the two.

    *   In the code block beginning with `WHEN NOT MATCHED BY target...`, any source
    rows not matched to the specified key column(s) of an existing dimension record
    are written as new rows to that dimension table.

    *   Finally, we use the `OUTPUT` clause to select the action description and insert
    data. We can use the output of this to write to our auditing table (more on that
    momentarily).


    You’ll notice that we’re handling this dimension processing as a Type 1 dimension,
    in which we intentionally overwrite the previous values and do not maintain a
    historical record of past values. It is possible to use the `MERGE` command to
    process Type 2 dimensions that retain historical values, or even those with a
    mixture of Type 1 and Type 2 attributes. In the interest of brevity, I won’t try
    to cover the various other uses of `MERGE` as it applies to slowly changing dimensions,
    but I think you’ll find that it’s flexible enough to handle most Type 1 and Type
    2 dimensions.


    It is also worth noting that you can also use the `MERGE` statement to delete
    data in addition to performing inserts and updates. It’s not as common to delete
    data in data warehouse environments as it is in other settings, but you may occasionally
    find it necessary to delete data from the target table.


    # 使用MERGE进行审计


    As with other data warehouse operations, it’s considered a best practice to audit,
    at a minimum, the row counts of dimensional data that is added, deleted, or changed.
    This is especially true for `MERGE` operations. Because multiple operations can
    occur in the same statement, it’s important to be able to track those operations
    to assist with troubleshooting, even if comprehensive auditing is not used in
    a given operation.


    The `MERGE` statement does have a provision for auditing the various data operations.
    As shown in the example in [Figure 11-4](#9781484200834_Ch11.xhtml#Fig4), we can
    use the `OUTPUT` clause to select out of the `MERGE` statement the `INSERT`, `UPDATE`,
    or `DELETE` operations. This example shows a scenario where the data changes would
    be selected as a result set from the query, which could subsequently be captured
    into a package variable in SSIS and processed from there. Alternatively, you could
    modify the `OUTPUT` clause to insert data directly into an audit table without
    returning a result set to SSIS.


    # 变更数据捕获（CDC）


    Along with the `MERGE` capability, another significant incremental load feature
    first surfaced in SQL Server 2008: change data capture (CDC). CDC is a feature
    of the database engine that allows the collection of data changes to monitored
    tables.


    Without jumping too far off track, here’s just a bit about how CDC works. CDC
    is a supply-side incremental load tool that is enabled first at the database level
    and then implemented on a table-by-table basis via capture instances. Once CDC
    is enabled for a table, the database engine uses the transaction log to track
    all DML operations (`INSERT`s, `UPDATE`s, and `DELETE`s), logging each change
    to the change table for each monitored table. The change table contains not only
    the fact that there was a change to the data, but it also maintains the history
    of those changes. Downstream processes can then consume just the changes (rather
    than the entire set of data) and process the, `INSERT`s, `UPDATE`s, and `DELETE`s
    in any dependent systems.


    ## 在Integration Services中使用CDC


    SSIS can consume CDC data in a couple of different ways. First, using common native
    SSIS components, you can access the change table to capture the data changes.
    You can keeping track of which changes have been processed by SSIS by capturing
    and storing the log sequence number (LSN) by using a set of system stored procedures
    created when CDC is enabled.


    The manual methods are still valid; however, new to SSIS in SQL Server 2012 is
    an entirely new set of tools for interfacing with CDC data. Integration Services
    now comes packaged with a new task and two new components that help to streamline
    the processing of CDC data:'
  raw: 'Fortunately, they got their wish with the release of SQL Server 2008. That
    version featured the debut of the new `MERGE` statement as part of the T-SQL arsenal.
    `MERGE` allows three simultaneous operations (`INSERT`, `UPDATE`, and `DELETE`)
    against the target table.


    The anatomy of a `MERGE` statement looks something like this:


    1.  Specify the source data.

    2.  Specify the target table.

    3.  Choose the columns on which to join the source and target data.

    4.  Indicate the column alignment between the two sets of data to be used for
    determining whether matched records are different in some way.

    5.  Define the logic for cases when the data is changed, or if it only exists
    in either the source or the destination.


    The new `MERGE` capabilities are useful for DBAs and database developers alike.
    However, for data warehouse professionals, `MERGE` was a game changer in terms
    of managing SCD data. Not only did this new capability provide an easier way to
    perform upsert operations, but it also performed very well.


    MERGE in Action


    Since there are no native (read: graphical) hooks to the `MERGE` statement in
    Integration Services, the implementation of `MERGE` in an SSIS package is done
    through an Execute SQL task.


    To explore this design pattern, let’s first examine the typical flow for using
    the T-SQL `MERGE` functionality within a data warehouse SSIS load package. Again,
    we’ll use the SCD scenario as a basis for exploration, but much of the same logic
    would apply to other uses of `MERGE`.


    As part of an SCD `MERGE` upsert process, our SSIS package would contain tasks
    to perform the following functions:


    1.  Remove previously staged data from the staging table.

    2.  Load the staging table from the source system.

    3.  Clean up the staged data (if required).

    4.  Execute the `MERGE` statement to upsert the staged data to the dimension table.

    5.  Log the upsert operation (optional).


    A typical control flow design pattern is shown in [Figure 11-4](#9781484200834_Ch11.xhtml#Fig4).


    ![9781484200834_Fig11-04.jpg](images/9781484200834_Fig11-04.jpg)


    [Figure 11-4](#9781484200834_Ch11.xhtml#_Fig4). Using MERGE against a SCD table


    Also note the large callout in [Figure 11-4](#9781484200834_Ch11.xhtml#Fig4) with
    the T-SQL code used for the `MERGE` statement. In the interest of maintaining
    focus, I won’t try to provide comprehensive coverage of the `MERGE` statement
    here, but I’ll point out a couple of the high points:


    *   The `ON` clause (third line) indicates the field on which we join the source
    data with the destination data. Note that we can use multiple fields on which
    to align the two sets.

    *   The ten-line code block following `WHEN MATCHED AND NOT...` indicates which
    of the fields will be checked to see if the data in the destination table differs
    from the source data. In this case, we’re checking ten different fields, and we’ll
    process an update to the destination if any of those fields is different between
    the source and destination. Also note the liberal use of the `ISNULL()` function
    against the destination table. This is recommended to ensure that rows in the
    destination table containing `NULL` values are not inadvertently skipped during
    the `MERGE`.

    *   In the code block immediately following, we update rows in the target table
    that have a valid match against the source but have one or more values that differ
    between the two.

    *   In the code block beginning with `WHEN NOT MATCHED BY target...`, any source
    rows not matched to the specified key column(s) of an existing dimension record
    are written as new rows to that dimension table.

    *   Finally, we use the `OUTPUT` clause to select the action description and insert
    data. We can use the output of this to write to our auditing table (more on that
    momentarily).


    You’ll notice that we’re handling this dimension processing as a Type 1 dimension,
    in which we intentionally overwrite the previous values and do not maintain a
    historical record of past values. It is possible to use the `MERGE` command to
    process Type 2 dimensions that retain historical values, or even those with a
    mixture of Type 1 and Type 2 attributes. In the interest of brevity, I won’t try
    to cover the various other uses of `MERGE` as it applies to slowly changing dimensions,
    but I think you’ll find that it’s flexible enough to handle most Type 1 and Type
    2 dimensions.


    It is also worth noting that you can also use the `MERGE` statement to delete
    data in addition to performing inserts and updates. It’s not as common to delete
    data in data warehouse environments as it is in other settings, but you may occasionally
    find it necessary to delete data from the target table.


    Auditing with MERGE


    As with other data warehouse operations, it’s considered a best practice to audit,
    at a minimum, the row counts of dimensional data that is added, deleted, or changed.
    This is especially true for `MERGE` operations. Because multiple operations can
    occur in the same statement, it’s important to be able to track those operations
    to assist with troubleshooting, even if comprehensive auditing is not used in
    a given operation.


    The `MERGE` statement does have a provision for auditing the various data operations.
    As shown in the example in [Figure 11-4](#9781484200834_Ch11.xhtml#Fig4), we can
    use the `OUTPUT` clause to select out of the `MERGE` statement the `INSERT`, `UPDATE`,
    or `DELETE` operations. This example shows a scenario where the data changes would
    be selected as a result set from the query, which could subsequently be captured
    into a package variable in SSIS and processed from there. Alternatively, you could
    modify the `OUTPUT` clause to insert data directly into an audit table without
    returning a result set to SSIS.


    Change Data Capture (CDC)


    Along with the `MERGE` capability, another significant incremental load feature
    first surfaced in SQL Server 2008: change data capture (CDC). CDC is a feature
    of the database engine that allows the collection of data changes to monitored
    tables.


    Without jumping too far off track, here’s just a bit about how CDC works. CDC
    is a supply-side incremental load tool that is enabled first at the database level
    and then implemented on a table-by-table basis via capture instances. Once CDC
    is enabled for a table, the database engine uses the transaction log to track
    all DML operations (`INSERT`s, `UPDATE`s, and `DELETE`s), logging each change
    to the change table for each monitored table. The change table contains not only
    the fact that there was a change to the data, but it also maintains the history
    of those changes. Downstream processes can then consume just the changes (rather
    than the entire set of data) and process the, `INSERT`s, `UPDATE`s, and `DELETE`s
    in any dependent systems.


    CDC in Integration Services


    SSIS can consume CDC data in a couple of different ways. First, using common native
    SSIS components, you can access the change table to capture the data changes.
    You can keeping track of which changes have been processed by SSIS by capturing
    and storing the log sequence number (LSN) by using a set of system stored procedures
    created when CDC is enabled.


    The manual methods are still valid; however, new to SSIS in SQL Server 2012 is
    an entirely new set of tools for interfacing with CDC data. Integration Services
    now comes packaged with a new task and two new components that help to streamline
    the processing of CDC data:'
  trans: '# MERGE 语句简介


    幸运的是，随着 SQL Server 2008 的发布，他们的愿望得以实现。该版本首次引入了新的 `MERGE` 语句，成为 T-SQL 武器库的一部分。`MERGE`
    允许对目标表同时执行三种操作（`INSERT`、`UPDATE` 和 `DELETE`）。


    `MERGE` 语句的基本结构如下所示：


    1.  指定源数据。

    2.  指定目标表。

    3.  选择用于连接源数据和目标数据的列。

    4.  指明两组数据之间用于判断匹配记录是否存在差异的列对齐方式。

    5.  定义数据发生变化时，或者数据仅存在于源或目标一方时的处理逻辑。


    新的 `MERGE` 功能对 DBA 和数据库开发人员都很有用。然而，对于数据仓库专业人员来说，`MERGE` 在管理 SCD 数据方面是一个游戏规则改变者。这项新功能不仅提供了执行
    "upsert" 操作的更简便方法，而且性能也非常出色。


    # MERGE 详解


    ## 在 SSIS 中的实现


    由于 Integration Services 中没有原生的（即图形化的）对 `MERGE` 语句的钩子，因此在 SSIS 包中实现 `MERGE` 是通过
    Execute SQL 任务来完成的。


    为了探讨这种设计模式，让我们首先审视一下在数据仓库 SSIS 加载包中使用 T-SQL `MERGE` 功能的典型流程。同样，我们将以 SCD 场景作为探索的基础，但大部分相同的逻辑也适用于
    `MERGE` 的其他用途。


    作为 SCD `MERGE` upsert 过程的一部分，我们的 SSIS 包将包含执行以下功能的任务：


    1.  从暂存表中移除先前暂存的数据。

    2.  从源系统加载暂存表。

    3.  清理暂存数据（如果需要）。

    4.  执行 `MERGE` 语句，将暂存数据 upsert 到维度表。

    5.  记录 upsert 操作（可选）。


    典型的控制流设计模式如图 11-4 所示。


    ![9781484200834_Fig11-04.jpg](img/9781484200834_Fig11-04.jpg)


    图 11-4. 对 SCD 表使用 MERGE


    ## `MERGE`语句关键点


    另请注意图 11-4 中包含 `MERGE` 语句 T-SQL 代码的大型注释框。为了保持重点，我不会在此尝试全面覆盖 `MERGE` 语句，但会指出几个要点：


    *   `ON` 子句（第三行）指明了我们用于连接源数据与目标数据的字段。请注意，我们可以使用多个字段来对齐这两组数据。

    *   `WHEN MATCHED AND NOT...` 之后的十行代码块指明了将检查哪些字段，以确定目标表中的数据是否与源数据不同。在本例中，我们检查了十个不同的字段，如果其中任何字段在源和目标之间存在差异，我们将处理对目标的更新。另请注意大量使用了针对目标表的
    `ISNULL()` 函数。建议这样做，以确保目标表中包含 `NULL` 值的行不会在 `MERGE` 过程中被无意间跳过。

    *   在紧随其后的代码块中，我们更新目标表中与源有效匹配但存在一个或多个值差异的行。

    *   在以 `WHEN NOT MATCHED BY target...` 开头的代码块中，任何未与现有维度记录的指定键列匹配的源行都将作为新行写入该维度表。

    *   最后，我们使用 `OUTPUT` 子句来选择操作描述和插入的数据。我们可以使用此输出将其写入我们的审计表（稍后会详细介绍）。


    你会注意到，我们将此维度处理作为类型 1 维度来处理，即我们有意覆盖先前的值，不保留过去值的历史记录。也可以使用 `MERGE` 命令处理保留历史值的类型
    2 维度，甚至是混合了类型 1 和类型 2 属性的维度。为了简洁起见，我不会尝试涵盖 `MERGE` 在应用于缓慢变化维度时的其他各种用途，但我认为你会发现它足够灵活，可以处理大多数类型
    1 和类型 2 的维度。


    同样值得注意的是，除了执行插入和更新外，你还可以使用 `MERGE` 语句删除数据。在数据仓库环境中删除数据不如在其他场景中常见，但你可能偶尔会发现有必要从目标表中删除数据。


    # 使用 MERGE 进行审计


    与其他数据仓库操作一样，至少对添加、删除或更改的维度数据的行数进行审计被认为是最佳实践。这对于 `MERGE` 操作尤其重要。因为同一语句中可能发生多个操作，能够跟踪这些操作以帮助故障排除非常重要，即使在特定操作中未使用全面的审计。


    `MERGE` 语句确实提供了审计各种数据操作的规定。如图 11-4 中的示例所示，我们可以使用 `OUTPUT` 子句从 `MERGE` 语句中选择出 `INSERT`、`UPDATE`
    或 `DELETE` 操作。此示例展示了一个场景，其中数据更改将作为查询的结果集选出，随后可以在 SSIS 中捕获到包变量中并从那里进行处理。或者，你可以修改
    `OUTPUT` 子句，直接将数据插入审计表，而不向 SSIS 返回结果集。


    # 变更数据捕获（CDC）


    与 `MERGE` 功能一起，另一个重要的增量加载特性首次出现在 SQL Server 2008 中：变更数据捕获 (CDC)。CDC 是数据库引擎的一项功能，允许收集对受监控表的数据变更。


    不深入偏题太多，这里简单介绍一下 CDC 的工作原理。CDC 是一种供应端的增量加载工具，首先在数据库级别启用，然后通过捕获实例逐表实现。一旦为表启用了 CDC，数据库引擎就会使用事务日志来跟踪所有
    DML 操作（`INSERT`、`UPDATE` 和 `DELETE`），将每个更改记录到每个受监控表的更改表中。更改表不仅包含数据发生了更改这一事实，还维护了这些更改的历史记录。下游进程随后可以仅使用更改（而不是整个数据集）并在任何相关系统中处理
    `INSERT`、`UPDATE` 和 `DELETE`。


    ## 在 Integration Services 中使用 CDC


    SSIS 可以通过几种不同的方式使用 CDC 数据。首先，使用常见的原生 SSIS 组件，你可以访问更改表以捕获数据更改。你可以通过捕获和存储日志序列号 (LSN)
    来跟踪 SSIS 已处理了哪些更改，该 LSN 是使用启用 CDC 时创建的一组系统存储过程获取的。


    手动方法仍然有效；但是，SQL Server 2012 中的 SSIS 新增了一套全新的工具用于与 CDC 数据交互。Integration Services
    现在随附一个新任务和两个新组件，有助于简化 CDC 数据的处理：'
- fmt: '# Change Detection in General


    *   `CDC Control task`**：** 此任务用于管理与CDC加载相关的元数据。使用`CDC Control task`，可以跟踪初始（历史）加载的起点和终点，以及检索和存储增量加载的处理范围。

    *   `CDC Source`**：** `CDC Source`用于从CDC更改表中检索数据。它通过一个SSIS变量从`CDC Control task`接收CDC状态信息，并将使用该标记有选择地检索更改的数据。

    *   `CDC Splitter`**：** `CDC Splitter`是一种转换组件，它会将更改的数据分支到其各种操作中。它实质上是一个专门的`Conditional
    Split`转换，使用从`CDC Source`接收的CDC信息，并将行相应地发送到插入（Insert）、更新（Update）、删除（Delete）或错误路径。


    作为SSIS增量加载策略的一部分，为了审查CDC功能，我们将仅使用SSIS 2012中引入的新任务和组件。在使用SQL Server 2008的系统中，要知道可以通过采用先前简要描述的手动提取和LSN跟踪来实现相同的目标。


    检测数据变更是数据集成的一个子领域。关于这个主题的著述浩如烟海，不胜枚举。尽管CDC在SQL Server中提供了便捷的变更检测功能，但在CDC出现之前，实现变更检测是可能的（也是必要的！）。需要注意的是，并非所有版本的SQL
    Server都提供CDC；其他关系数据库引擎中也不可用。


    ## Checksum-Based Detection


    早期的一种变更检测模式是使用Transact-SQL的`Checksum`函数。`Checksum`接受一个字符串作为参数并生成一个数值哈希值。但`Checksum`的性能已被证明不尽理想，因为它会为不同的字符串值生成相同的数值。Steve
    Jones在一篇题为“SQL Server加密——哈希冲突”（`www.sqlservercentral.com/blogs/steve_jones/2009/06/01/sql-server-encryption-hashing-collisions/`）的博客文章中讨论了这种行为。Michael
    Coles在该文章的评论中（`www.sqlservercentral.com/blogs/steve_jones/2009/06/01/sql-server-encryption-hashing-collisions/#comments`）提供了丰富的证据来支持Steve的观点。简而言之，使用`Checksum`发生冲突的概率很高，因此不应使用`Checksum`函数进行变更检测。


    那么，可以用什么呢？


    ## Detection via Hashbytes


    `Checksum`函数的一个良好替代方案是`Hashbytes`函数。与`Checksum`类似，`Hashbytes`为字符串值或变量提供值哈希。`Checksum`返回一个整数值；`Hashbytes`返回一个二进制值。`Checksum`使用内部算法计算哈希；`Hashbytes`使用标准加密算法。`Hashbytes`是更好选择的一个原因是每个函数可用的值数量。`Checksum`的`int`数据类型可以返回
    +/- 2^31 个值，而`Hashbytes`对于MD2、MD4和MD5算法可以返回 +/- 2^127 个值，对于SHA和SHA1算法可以返回 +/-
    2^159 个值。


    ## Brute Force Detection


    信不信由你，对源和目标进行“暴力”值比较仍然是变更检测的一种可行选择。它是如何工作的？你通过第二个`Source`组件或SSIS`Data Flow task`中的`Lookup`转换获取目标值。你使用一个替代（或业务）键（在源和目标中唯一标识行的值或值组合）匹配源和目标中的行，然后比较源行中的非键列值与目标行中的非键值。


    请记住，你的目标是分离出变更。假定你已经分离出了新行（存在于源中但不存在于目标中的数据），甚至可能已经检测到了存在于目标中但在源中不再找到的已删除行。剩下的就是已更改和未更改的行。未更改的行就是那样：替代键对齐，源和目标中每个列的值也相同。而已更改的行具有相同的替代键，并且在源列和目标列中存在一个或多个差异。比较列值并考虑`NULL`的可能性仍然是一个选项。


    ## Historical Load


    应该有一个单独的流程来填充每个被跟踪的CDC表的历史数据。此历史加载设计为只执行一次，它将根据需要从尽可能早的时间开始加载数据到目标系统。如[图11-5](#9781484200834_Ch11.xhtml#Fig5)所示，需要两个`CDC
    Control task`。第一个（如标注所示配置）用于设置数据捕获的起始边界。利用此信息，`CDC Control task`将CDC状态写入指定的状态表。第二个`CDC
    Control task`标记初始加载的终点，更新状态表，以便在后续的增量加载中使用适当的起始点。在这两个任务之间是数据流，它促进了目标表的历史加载。


    ![9781484200834_Fig11-05.jpg](images/9781484200834_Fig11-05.jpg)


    **图11-5** 用于初始历史加载的`CDC Control task`


    ## Incremental Load


    由于历史加载和增量加载之间存在固有差异，几乎总是更倾向于为它们分别创建单独的程序包（或程序包组）。尽管有相似之处，但差异足够大，值得将逻辑分离到不同的“沙盒”中。


    对于历史加载的控制流元素，此增量加载模式也将使用两个`CDC Control task`，中间有一个数据流。我们需要稍微更改这些任务的配置，以便我们检索然后更新CDC操作的当前处理范围。如[图11-6](#9781484200834_Ch11.xhtml#Fig6)所示，我们将第一个任务的操作设置为“获取处理范围”（Get
    Processing Range），在增量加载完成后，随后执行“更新处理范围”（Update Processing Range）。


    ![9781484200834_Fig11-06.jpg](images/9781484200834_Fig11-06.jpg)


    **图11-6** 为CDC增量加载获取处理范围


    ![Image](images/sq.jpg) **注意** `CDC Control task`是一个多功能工具，包含多种处理模式以处理CDC的各个阶段，包括处理快照数据库或静态数据库作为源。处理模式的完整列表可以在这里找到：`http://msdn.microsoft.com/en-us/library/hh231079.aspx`。


    在数据流中，`CDC Source`应设置为要从中捕获的表、捕获实例和处理模式。在这种情况下，我们将使用“Net”来检索CDC表的净更改。参见[图11-7](#9781484200834_Ch11.xhtml#Fig7)。


    ![9781484200834_Fig11-07.jpg](images/9781484200834_Fig11-07.jpg)


    **图11-7** `CDC Source`


    `CDC Splitter`分解数据流并将行发送到插入、更新和删除输出。从那里，我们将更新和删除的行写入暂存表，以便我们可以将其作为高性能的基于集合的操作进行处理。插入记录可以直接进入输出表。'
  raw: '*   **CDC Control task****:** This task is used for managing the metadata
    around CDC loads. Using the CDC Control task, you can track the start and end
    points of the initial (historical) load, as well as retrieve and store the processing
    range for an incremental load.

    *   **CDC Source****:** The CDC Source is used to retrieve data from the CDC change
    table. It receives the CDC state information from the CDC Control task by way
    of an SSIS variable, and it will selectively retrieve the changed data using that
    marker.

    *   **CDC Splitter****:** The CDC Splitter is a transform that will branch the
    changed data out into its various operations. Effectively a specialized Conditional
    Split transform, it will use the CDC information received from the CDC Source
    and send the rows to the Insert, Update, Delete, or Error path accordingly.


    For the purposes of reviewing CDC capabilities as part of an SSIS incremental
    load strategy, we’ll stick with the new task and components present in SSIS 2012\.
    In systems using SQL Server 2008, know that you can meet the same objectives by
    employing the manual extraction and LSN tracking briefly described previously.


    Change Detection in General


    Detecting changes in data is a subscience of data integration. Much has been written
    on the topic from sources too numerous to list. Although CDC provides handy change
    detection in SQL Server, it was possible (and necessary!) to achieve change detection
    before the advent of CDC. It is important to note that CDC is not available in
    all editions of SQL Server; it is also not available in other relational database
    engines.


    Checksum-Based Detection


    One early pattern for change detection was using the Transact-SQL Checksum function.
    Checksum accepts a string as an argument and generates a numeric hash value. But
    Checksum performance has proven less than ideal, generating the same number for
    different string values. Steve Jones blogged about this behavior in a post entitled
    “SQL Server Encryption—Hashing Collisions” (`www.sqlservercentral.com/blogs/steve_jones/2009/06/01/sql-server-encryption-hashing-collisions/`).
    Michael Coles provided rich evidence to support Steve’s claims in the post’s comments
    (`www.sqlservercentral.com/blogs/steve_jones/2009/06/01/sql-server-encryption-hashing-collisions/#comments`).
    In short, the odds of collision with Checksums are substantial, and you should
    not use the Checksum function for change detection.


    So, what can you use?


    Detection via Hashbytes


    One good alternative to the Checksum function is the Hashbytes function. Like
    Checksum, Hashbytes provides value hashing for a string value or variable. Checksum
    returns an integer value; Hashbytes returns a binary value. Checksum uses an internal
    algorithm to calculate the hash; Hashbytes uses standard encryption algorithms.
    The sheer number of values available to each function is one reason Hashbytes
    is a better choice. Checksum’s int data type can return +/-231 values, whereas
    Hashbytes can return +/-2127 values for MD2, MD4, and MD5 algorithms and +/-2159
    values for SHA and SHA1 algorithms.


    Brute Force Detection


    Believe it or not, a “brute force” value comparison between sources and destinations
    remains a viable option for change detection. How does it work? You acquire the
    destination values by way of either a second Source component or a Lookup transform
    in the SSIS Data Flow task. You match the rows in the source and destination by
    using an alternate (or business) key—a value or combination of values that uniquely
    identifies the row in both source and destination—and then compare the non-key
    column values in the source row to the non-key values in the destination row.


    Remember, you are attempting to isolate changes. It is assumed that you have separated
    the new rows—data that exists in the source and not in the destination—and perhaps
    you have even detected deleted rows that exist in the destination but are no longer
    found in the source. Changed and unchanged rows remain. Unchanged rows are just
    that: the alternate keys align, as does every other value in each source and destination
    column. Changed rows, however, have identical alternate keys and one or more differences
    in the source and destination columns. Comparing the column values and accounting
    for the possibility of `NULL`s remains an option.


    Historical Load


    There should be a separate process to populate the historical data for each of
    the tracked CDC tables. This historical load is designed to be executed just once,
    and it would load data to the destination system from as far back as is required.
    As shown in [Figure 11-5](#9781484200834_Ch11.xhtml#Fig5), two CDC Control tasks
    are required. The first one (configured as shown in the callout) is used to set
    the beginning boundary of the data capture. With this information, the CDC Control
    task writes the CDC state to the specified state table. The second CDC Control
    task marks the end point of the initial load, updating the state table so the
    appropriate starting point will be used on subsequent incremental loads. Between
    these two tasks sits the data flow, which facilitates the historical load of the
    target table.


    ![9781484200834_Fig11-05.jpg](images/9781484200834_Fig11-05.jpg)


    [Figure 11-5](#9781484200834_Ch11.xhtml#_Fig5). CDC Control task for an initial
    historical load


    Incremental Load


    Because of the inherent differences between historical loads and incremental loads,
    it’s almost always preferable to create separate packages (or package groups)
    for each of these. Although there are similarities, there are enough differences
    to justify separating the logic into different sandboxes.


    For the control flow elements of the historical load, this incremental load pattern
    will also use two CDC Control tasks with a data flow between them. We’ll need
    to slightly change the configuration of these tasks so that we retrieve and then
    update the current processing range of the CDC operation. As shown in [Figure
    11-6](#9781484200834_Ch11.xhtml#Fig6), we’ll set the operation for the first of
    these as Get Processing Range, which would be followed by Update Processing Range
    after the incremental load is complete.


    ![9781484200834_Fig11-06.jpg](images/9781484200834_Fig11-06.jpg)


    [Figure 11-6](#9781484200834_Ch11.xhtml#_Fig6). Get processing range for CDC incremental
    load


    ![Image](images/sq.jpg) **Note**  The CDC Control task is a versatile tool that
    includes several processing modes to handle various CDC phases, including dealing
    with a snapshot database or quiescence database as a source. A complete listing
    of the processing modes can be found here: `http://msdn.microsoft.com/en-us/library/hh231079.aspx`.


    Within the data flow, the CDC Source should be set with the table from which to
    capture, the capture instance, and the processing mode. In this case, we’re going
    to use “Net” to retrieve the net changes to the CDC table. See [Figure 11-7](#9781484200834_Ch11.xhtml#Fig7).


    ![9781484200834_Fig11-07.jpg](images/9781484200834_Fig11-07.jpg)


    [Figure 11-7](#9781484200834_Ch11.xhtml#_Fig7). CDC Source


    The CDC Splitter breaks apart the data stream and sends rows out to the insert,
    update, and delete outputs. From there, we’ll write the update and delete rows
    to a staging table so we can process those as high-performance, set-based operations.
    The insert records can go directly into the output table.'
  trans: '# 变更检测概述


    *   `CDC 控制任务`**：** 此任务用于管理与 CDC 加载相关的元数据。使用`CDC 控制任务`，可以跟踪初始（历史）加载的起点和终点，以及检索和存储增量加载的处理范围。

    *   `CDC 源`**：** `CDC 源`用于从 CDC 更改表中检索数据。它通过一个 SSIS 变量从`CDC 控制任务`接收 CDC 状态信息，并将使用该标记有选择地检索更改的数据。

    *   `CDC 拆分器`**：** `CDC 拆分器`是一种转换组件，它会将更改的数据分支到其各种操作中。它实质上是一个专门的`条件拆分`转换，使用从`CDC
    源`接收的 CDC 信息，并将行相应地发送到插入、更新、删除或错误路径。


    作为 SSIS 增量加载策略的一部分，为了审查 CDC 功能，我们将仅使用 SSIS 2012 中引入的新任务和组件。在使用 SQL Server 2008
    的系统中，要知道可以通过采用先前简要描述的手动提取和 LSN 跟踪来实现相同的目标。


    检测数据变更是数据集成的一个子领域。关于这个主题的著述浩如烟海，不胜枚举。尽管 CDC 在 SQL Server 中提供了便捷的变更检测功能，但在 CDC
    出现之前，实现变更检测是可能的（也是必要的！）。需要注意的是，并非所有版本的 SQL Server 都提供 CDC；其他关系数据库引擎中也不可用。


    ## 基于校验和的检测


    早期的一种变更检测模式是使用 Transact-SQL 的`Checksum`函数。`Checksum`接受一个字符串作为参数并生成一个数值哈希值。但`Checksum`的性能已被证明不尽理想，因为它会为不同的字符串值生成相同的数值。Steve
    Jones 在一篇题为“SQL Server 加密——哈希冲突”（`www.sqlservercentral.com/blogs/steve_jones/2009/06/01/sql-server-encryption-hashing-collisions/`）的博客文章中讨论了这种行为。Michael
    Coles 在该文章的评论中（`www.sqlservercentral.com/blogs/steve_jones/2009/06/01/sql-server-encryption-hashing-collisions/#comments`）提供了丰富的证据来支持
    Steve 的观点。简而言之，使用`Checksum`发生冲突的概率很高，因此不应使用`Checksum`函数进行变更检测。


    那么，可以用什么呢？


    ## 通过 Hashbytes 检测


    `Checksum`函数的一个良好替代方案是`Hashbytes`函数。与`Checksum`类似，`Hashbytes`为字符串值或变量提供值哈希。`Checksum`返回一个整数值；`Hashbytes`返回一个二进制值。`Checksum`使用内部算法计算哈希；`Hashbytes`使用标准加密算法。`Hashbytes`是更好选择的一个原因是每个函数可用的值数量。`Checksum`的`int`数据类型可以返回
    +/- 2³¹ 个值，而`Hashbytes`对于 MD2、MD4 和 MD5 算法可以返回 +/- 2¹²⁷ 个值，对于 SHA 和 SHA1 算法可以返回
    +/- 2¹⁵⁹ 个值。


    ## 暴力检测


    信不信由你，对源和目标进行“暴力”值比较仍然是变更检测的一种可行选择。它是如何工作的？你通过第二个`源`组件或 SSIS`数据流任务`中的`查找`转换获取目标值。你使用一个替代（或业务）键（在源和目标中唯一标识行的值或值组合）匹配源和目标中的行，然后比较源行中的非键列值与目标行中的非键值。


    请记住，你的目标是分离出变更。假定你已经分离出了新行（存在于源中但不存在于目标中的数据），甚至可能已经检测到了存在于目标中但在源中不再找到的已删除行。剩下的就是已更改和未更改的行。未更改的行就是那样：替代键对齐，源和目标中每个列的值也相同。而已更改的行具有相同的替代键，并且在源列和目标列中存在一个或多个差异。比较列值并考虑`NULL`的可能性仍然是一个选项。


    ## 历史加载


    应该有一个单独的流程来填充每个被跟踪的 CDC 表的历史数据。此历史加载设计为只执行一次，它将根据需要从尽可能早的时间开始加载数据到目标系统。如图 11-5
    所示，需要两个`CDC 控制任务`。第一个（如标注所示配置）用于设置数据捕获的起始边界。利用此信息，`CDC 控制任务`将 CDC 状态写入指定的状态表。第二个`CDC
    控制任务`标记初始加载的终点，更新状态表，以便在后续的增量加载中使用适当的起始点。在这两个任务之间是数据流，它促进了目标表的历史加载。


    ![9781484200834_Fig11-05.jpg](img/9781484200834_Fig11-05.jpg)


    **图 11-5** 用于初始历史加载的`CDC 控制任务`


    ## 增量加载


    由于历史加载和增量加载之间存在固有差异，几乎总是更倾向于为它们分别创建单独的程序包（或程序包组）。尽管有相似之处，但差异足够大，值得将逻辑分离到不同的“沙盒”中。


    对于历史加载的控制流元素，此增量加载模式也将使用两个`CDC 控制任务`，中间有一个数据流。我们需要稍微更改这些任务的配置，以便我们检索然后更新 CDC 操作的当前处理范围。如图
    11-6 所示，我们将第一个任务的操作设置为“获取处理范围”，在增量加载完成后，随后执行“更新处理范围”。


    ![9781484200834_Fig11-06.jpg](img/9781484200834_Fig11-06.jpg)


    **图 11-6** 为 CDC 增量加载获取处理范围


    ![Image](img/sq.jpg) **注意** `CDC 控制任务`是一个多功能工具，包含多种处理模式以处理 CDC 的各个阶段，包括处理快照数据库或静态数据库作为源。处理模式的完整列表可以在这里找到：`http://msdn.microsoft.com/en-us/library/hh231079.aspx`。


    在数据流中，`CDC 源`应设置为要从中捕获的表、捕获实例和处理模式。在这种情况下，我们将使用“Net”来检索 CDC 表的净更改。参见图 11-7。


    ![9781484200834_Fig11-07.jpg](img/9781484200834_Fig11-07.jpg)


    **图 11-7** `CDC 源`


    `CDC 拆分器`分解数据流并将行发送到插入、更新和删除输出。从那里，我们将更新和删除的行写入暂存表，以便我们可以将其作为高性能的基于集合的操作进行处理。插入记录可以直接进入输出表。'
- fmt: '# It’s worth mentioning here that several CDC processing modes are available
    through the CDC Source component. The example in [Figure 11-7](#9781484200834_Ch11.xhtml#Fig7)
    illustrated the use of the Net setting, which is the most common mode in most
    data warehouse scenarios. However, depending on the ETL requirements and source
    system design, you may opt for one of the other processing modes, as follows:


    *   `All:` Lists each change in the source, not just the Net result

    *   `All with Old Values:` Includes each change plus the old values for updated
    records

    *   `Net with Update Mask:` Is for monitoring changes to a specific column in
    the monitored table

    *   `Net with Merge:` Is similar to Net, but the output is optimized for consumption
    by the T-SQL `MERGE` statement


    ## Typical Uses


    CDC represents a shift in the incremental load methodology. The other methods
    described here apply a downstream approach to incremental loading, with a minimally
    restrictive extraction from the source and a decision point late in the ETL flow.
    CDC, on the other hand, processes the change logic further upstream, which can
    help lighten the load on SSIS and other moving parts in the ETL.


    If CDC is in place (or could be implemented) in a source system, it’s certainly
    worth considering using this design pattern to process incremental loads. It can
    perform well, can reduce network loads due to processing fewer rows from the source,
    and requires fewer resources on the ETL side. It’s not appropriate for every situation,
    but CDC can be an excellent way to manage incremental loads in SQL Server Integration
    Services.


    Keep in mind that the use of CDC as a design pattern isn’t strictly limited to
    Microsoft SQL Server databases. CDC may also be leveraged against CDC-enabled
    Oracle database servers.


    ## Data Errors


    Henry Wadsworth Longfellow once wrote, “Into each life some rain must fall.” The
    world of ETL is no different, except that rain comes in the form of errors, often
    as a result of missing or invalid data. We don’t always know when they’re going
    to occur. However, given enough time, something is going to go wrong: late-arriving
    dimension members, packages executed out of order, or just plain old bad data.
    The good news is that there are data warehousing design patterns that can help
    mitigate the risk of data anomalies that interrupt the execution of Integration
    Services packages.


    To address patterns of handling missing data, we’re going to concentrate mostly
    on missing dimension members, as this is the most frequent cause of such errors.
    However, you can extend some of the same patterns to other elements that are part
    of or peripheral to data warehousing.


    ## Simple Errors


    The vast majority of errors can and should be handled inline, or simply prevented
    before they occur. Consider the common case of data truncation: you have a character
    type field that’s expected to contain no more than 50 characters, so you set the
    data length accordingly. Months later, you get a late-night phone call (most likely
    when you’re on vacation or when you’re out at a karaoke bar with your fellow ETL
    professionals) informing you that the SSIS package has failed because of a truncation
    error. Yep, the party’s over.


    We’ve all been bitten before by the truncation bug or one of its cousins—the invalid
    data type error, the unexpected `NULL`/blank value error, or the out-of-range
    error. In many cases, however, these types of errors can be handled through defensive
    ETL strategies. By using tasks and components that detect and subsequently correct
    or redirect nonconforming rows, we can handle minor data errors such as this without
    bubbling up a failure that stops the rest of the ETL from processing.


    ## Missing Data


    With respect to data warehousing, a more common example of handling errors inline
    is the case of late-arriving dimension data. As shown in [Figure 11-8](#9781484200834_Ch11.xhtml#Fig8),
    the typical pattern is to load the dimensions first, followed by a load of the
    fact tables. This helps to ensure that the fact records will find a valid dimension
    key when the former is loaded to the data warehouse.


    ![9781484200834_Fig11-08.jpg](images/9781484200834_Fig11-08.jpg)


    [Figure 11-8](#9781484200834_Ch11.xhtml#_Fig8). Typical data warehouse methodology
    of loading dimensions, then facts


    However, this pattern breaks down when you attempt to process fact records that
    reference dimension data that does not yet exist in the data warehouse. Consider
    the case of holiday retail sales: because things happen so quickly at the retail
    level during the end-of-year holiday season, it’s not uncommon for last-minute
    items to appear at a store’s dock with little or no advance notice. Large companies
    (retailers included) often have multiple systems used for different purposes that
    may or may not be in sync, so a last-minute item entered in the point-of-sale
    (POS) system may not yet be loaded in the sales forecasting system. As a result,
    an attempt to load a data warehouse with both POS and forecasting data may not
    fit this model because we would have fact data from the sales system that do not
    yet have the required dimension rows from the forecasting system.


    At this point, if the decision is made to handle this issue inline, there are
    a few different methodogies we can use. These are described next.


    ## Use the Unknown Member


    The fastest and simplest pattern to address the issue of missing dimension members
    is to push fact records with missing dimension data into the fact table while
    marking that dimension value as unknown. In this case, the fact records in question
    would be immediately available in the data warehouse; however, all of the unknowns
    would, by default, be grouped together for analytical purposes. This pattern generally
    works best when the fact record alone does not contain the required information
    to create a unique new dimension record.


    This design pattern is fleshed out in [Figure 11-9](#9781484200834_Ch11.xhtml#Fig9).
    Using the No Match output of the Lookup transform, we’re sending the fact records
    not matched to an existing `[Item]` dimension member to an instance of the Derived
    Column transform, which sets the value of the missing dimension record to the
    unknown member for that dimension (in most cases, represented by a key value of
    –1). The matched and unmatched records are then brought back together using the
    Union All transform.


    ![9781484200834_Fig11-09.jpg](images/9781484200834_Fig11-09.jpg)


    [Figure 11-9](#9781484200834_Ch11.xhtml#_Fig9). Using Unknown Member for missing
    dimension member


    It is important to note that this design pattern should also include a supplemental
    process (possibly consisting of just a simple SQL statement) to periodically attempt
    to match these modified facts with their proper dimension records. This follow-up
    step is required to prevent the fact data in question from being permanently linked
    to the unknown member for that dimension.


    ## Add the Missing Dimension Member


    Using this design pattern, you can add missing dimension records on the fly as
    part of the fact package using as much dimension data as is provided by the fact
    data. In this scenario, the fact records are immediately available in the data
    warehouse, just like they were for the previous design pattern, but this methodology
    has the added benefit of matching the fact record to its proper dimension member.
    In most cases, this allows you to immediately associate the correct dimension
    data rather than group the unmatched data into the unknown member bucket.'
