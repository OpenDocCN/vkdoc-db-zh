    where package_name = ''Ch16_Reporting.dtsx''                 and task_name = ''Data
    Flow Task'' ```    Once you have your desired query, you can either run it directly
    from Management Studio or embed it into a Reporting Services report to make it
    look like the standard reports available in the solution. To make the report through
    Management Studio, you can store the folders in your local Documents folder, under
    the structure SQL Server Management Studio\Custom Reports. To access them, you
    will then select the Custom Reports option under the Reports menu on the Integration
    Services node, as shown in [Figure 15-10](#9781484200834_Ch15.xhtml#Fig10).    ![9781484200834_Fig15-10.jpg](images/9781484200834_Fig15-10.jpg)    [Figure
    15-10](#9781484200834_Ch15.xhtml#_Fig10). Selection of custom reports    Summary    This
    chapter has discussed many ways to monitor your Integration Services packages.
    Whether you are using an older version of the tool or the latest and greatest,
    you will be able to understand the internal workings of the package by following
