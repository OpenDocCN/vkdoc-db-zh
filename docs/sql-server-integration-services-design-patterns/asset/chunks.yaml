    如果 `OkToProceed`（布尔型）包变量被设置为 `True`（这是在脚本代码的注释 4i 处完成的），则流程中剩余的步骤将由文件系统任务管理。


    将四个文件系统任务拖到控制流画布上。将第一个重命名为 `fsys Copy Working File` 并打开其编辑器。将 `Operation` 属性更改为
    `Copy File`。将 `IsSourcePathVariable` 属性设置为 `True`，并将 `SourceVariable` 属性设置为 `$Package::SourceFilePath`。将
    `IsDestinationPathVariable` 设置为 `True`，并将 `DestinationVariable` 属性设置为 `User::WorkingCopyFileName`。将
    `OverwriteDestination` 属性设置为 `True`。关闭文件系统任务编辑器。


    ![Image](img/sq.jpg) **注意** 由于我们没有为 `User::WorkingCopyFileName` 设置值，任务上会出现一个红色
    X。请不必担心。


    将第二个文件系统任务重命名为 `fsys Rename File` 并打开其编辑器。将 `Operation` 属性设置为 `Rename File`。将
    `IsSourcePathVariable` 属性设置为 `True`，并将 `SourceVariable` 属性设置为 `User::WorkingCopyFileName`。将
    `IsDestinationPathVariable` 设置为 `True`，并将 `DestinationVariable` 属性设置为 `User::FormattedFileName`。将
    `OverwriteDestination` 属性设置为 `True`。关闭文件系统任务编辑器。


    将第三个文件系统任务重命名为 `fsys Move File` 并打开其编辑器。将 `Operation` 属性设置为 `Move File`。将 `IsSourcePathVariable`
    属性设置为 `True`，并将 `SourceVariable` 属性设置为 `User::FormattedFileName`。将 `IsDestinationPathVariable`
    设置为 `True`，并将 `DestinationVariable` 属性设置为 `$Package::ArchiveDirectory`。将 `OverwriteDestination`
    属性设置为 `True`。关闭文件系统任务编辑器。


    将第四个文件系统任务重命名为 `fsys Delete Original File` 并打开其编辑器。将 `Operation` 属性设置为 `Delete
    File`。将 `IsSourcePathVariable` 属性设置为 `True`，并将 `SourceVariable` 属性设置为 `$Package::SourceFilePath`。关闭文件系统任务编辑器。


    使用成功优先级约束将 `scr Apply Format Script` 任务连接到 `fsys Copy Working File` 文件系统任务。双击优先级约束打开编辑器，将
    `Evaluation Option` 属性设置为 `Expression and Constraint`。将 `Value` 属性设置为 `Success`，并将
    `Expression` 属性设置为 `@[User::OkToProceed]`。仅当 `scr Apply Format Script` 任务成功完成执行并将
    `OkToProceed (Boolean)` 变量设置为 `True` 时，此约束才会触发。在 `fsys Copy Working File` 文件系统任务和
    `fsys Rename File` 文件系统任务之间、`fsys Rename File` 文件系统任务和 `fsys Move File` 文件系统任务之间，以及
    `fsys Move File` 文件系统任务和 `fsys Delete Original File` 文件系统任务之间连接成功优先级约束。双击 `fsys
    Move File` 文件系统任务和 `fsys Delete Original File` 文件系统任务之间的优先级约束以打开编辑器。将 `Evaluation
    Option` 属性设置为 `Expression and Constraint`。将 `Value` 属性设置为 `Success`，并将 `Expression`
    属性设置为 `!@[$Package::CopyOnly]`（这等同于 `NOT [!] $Package::CopyOnly`，或当 `$Package::CopyOnly`
    为 `False` 时）。要使 `fsys Delete Original File` 文件系统任务触发，`fsys Move File` 文件系统任务必须成功，并且
    `$Package::CopyOnly` 包参数必须为 `False`。这很合理，如果您只想将文件复制到存档目录；您不希望删除原始文件。


    在此设计模式的许多版本中，我还会将各种文件系统任务的 `OverwriteDestination` 属性“变量化”，通过在表达式页上使用布尔包参数设置 `OverwriteDestinationFile`
    动态属性表达式来管理这些值。我这样做是因为一些企业有关于保留或丢弃数据文件的要求，无论它们是否是临时的。


    您的文件系统任务可能会标有错误指示器（包含白色 X 的红色圆圈）。将鼠标悬停在标记的任务上将显示错误。例如，在 图 7-30 中，错误为：“变量 ''WorkingCopyFileName''
    被用作源或目标，且为空。”


    ![9781484200834_Fig07-30.jpg](img/9781484200834_Fig07-30.jpg)


    图 7-30. `WorkingCopyFileName` 变量为空


    问题在于 `WorkingCopyFileName` 变量的内容。这个错误是正确的；变量值当前为空。然而，由于代码是我编写的，我知道在代码清单的 4d 部分，脚本将填充一个名为
    `sWorkingCopyFile` 的内部字符串变量的内容。在代码的 4g 部分，这个内部变量的内容将被赋值给名为 `WorkingCopyFileName`
    的 SSIS 包变量。我知道这一点，但 SSIS 包不知道。它正在尽力向我告知此问题。事实上，如果我以当前状态执行包，将不可避免地引发错误消息，如 图 7-31
    所示。


    ![9781484200834_Fig07-31.jpg](img/9781484200834_Fig07-31.jpg)


    图 7-31. 包验证错误


    验证是准确的。现在怎么办？错误信息顶部附近有个线索。这是一个包验证错误。要解决此问题，请单击 `fsys Copy Working File` 文件系统任务并按
    F4 键显示属性。在属性的“执行”组中，列表顶部，您会找到 `DelayValidation` 属性。此属性的默认设置为 `False`，这是合理的。SSIS
    中有大量的设计时验证，这通常是件好事。将此属性值更改为 `True`。将 `fsys Rename File` 和 `fsys Move File` 文件系统任务的
    `DelayValidation` 也更改为 `True`。


    现在，尝试执行 `ArchiveFile.dtsx` SSIS 包。我的结果如 图 7-32 所示。


    ![9781484200834_Fig07-32.jpg](img/9781484200834_Fig07-32.jpg)


    图 7-32. `ArchiveFile.dtsx` SSIS 包成功执行


    ## 总结


    在本章中，我们研究了将基本平面源文件加载到 SQL Server 中的常见模式、加载可变长度行的模式、创建和使用平面文件标题和尾部行的模式，以及一个非常有用的用于归档平面文件的
    SSIS 设计模式。


