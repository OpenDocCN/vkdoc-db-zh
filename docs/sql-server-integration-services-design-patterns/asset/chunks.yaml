    Massively Parallel Processing


    As the name suggests, *massively parallel processing (MPP)* uses multiple servers
    working as one system, called an *appliance*, to achieve much greater performance
    and scan rates than in traditional SMP systems. SMP refers to *symmetric multiprocessing*;
    most database systems, such as all other versions of SQL Server, are SMP.


    To obtain a better understanding of the difference between SMP and MPP systems,
    let’s examine a common analogy. Imagine you are handed a shuffled deck of 52 playing
    cards and are asked to retrieve all of the queens. Even at your fastest, it would
