- fmt: '# Script Maintenance Patterns


    When SSIS first surfaced with SQL Server 2005, the ETL developer could choose
    to store the code text in a `Script task` or `Script component` without actually
    building (compiling) the script project. By opting not to precompile the script,
    a trivial amount of processing resources would be saved (or more specifically,
    delayed) by forcing the SSIS design environment to accept the code as written.
    Two problems arose from this behavior: first, there was a performance penalty,
    however slight, caused by compiling the script on the fly during the execution
    of the package; second, the risk of runtime errors increased, due to the minimized
    up-front validation in the designer.


    Starting with SQL Server 2008, script precompilation is required. Now when you
    write a script, it is compiled in the background and the resulting binary output
    is serialized and stored inline within the package XML. As soon as you modify
    your script and close the editor, the .NET compiler is invoked and creates the
    serialized binary data. If you’ve made an error in your code that prevents compilation,
    you’ll be presented with a validation error on the `Script task` or `Script component`
    indicating that the binary code cannot be found (see [Figure 3-3](#9781484200834_Ch03.xhtml#Fig3)).


    ![9781484200834_Fig03-03.jpg](images/9781484200834_Fig03-03.jpg)


    [Figure 3-3](#9781484200834_Ch03.xhtml#_Fig3). Compilation error with a `Script
    task`


    This validation step is a safety mechanism to make sure your packages don’t make
    it to deployment with uncompilable code. However, it’s also possible to build
    the script project from within the script editor, so you can periodically check
    your code for compilation errors before closing the editing window. In the menu
    bar of the script editor, you’ll find the option to `Build` ![image](images/arrow.jpg)
    `Build [*script project name*]` to compile all of the code in your script project.
    When you build the project in this manner, any errors found during compilation
    will be reported in the `Error List` window ([Figure 3-4](#9781484200834_Ch03.xhtml#Fig4)).


    ![9781484200834_Fig03-04.jpg](images/9781484200834_Fig03-04.jpg)


    [Figure 3-4](#9781484200834_Ch03.xhtml#_Fig4). `Error List`


    Also present in the `Error List` windows are any warnings generated by the compiler;
    although they don’t prevent the code from being compiled, it’s always a wise idea
    to perform a thorough review of any warnings that appear in this list before sending
    the code any further down the development process.


    ## The Script Task


    Within the control flow pane, the workspace for writing custom code is the `Script
    task`. Although it technically can be used for direct data manipulation, this
    tool is best suited for supporting operations that can’t easily be accomplished
    using native control flow tasks. Think of the `Script task` as a helper object
    to be used to tie together other data-centric operations within the package.


    The following are a few requirements frequently served by the `Script task`:


    *   Checking for the existence and accessibility of source or destination files

    *   Using a file archive utility API to zip or unzip files

    *   Generating custom event messages (such as HTML-formatted e-mail messages)

    *   Setting variable values

    *   Performing cleanup operations upon package completion or if an error occurs

    *   Inspecting environmental data, such as available disk space, the status of
    Windows services, and so on


    Because it’s not designed for manipulating data, there is no need to define input
    or output metadata, which makes the `Script task` relatively easy to configure.
    As shown in [Figure 3-5](#9781484200834_Ch03.xhtml#Fig5), there are just a few
    required configuration elements for this task: specify the programming language
    you want to use, choose the variables you want to make visible within the script,
    and you’re ready to write code!


    ![9781484200834_Fig03-05.jpg](images/9781484200834_Fig03-05.jpg)


    [Figure 3-5](#9781484200834_Ch03.xhtml#_Fig5). `Script Task Editor`


    ![Image](images/sq.jpg) `Note` For both the `Script task` and the `Script component`,
    the decision to use either `C#` or `VB.NET` should be considered permanent. Once
    you’ve selected a language and opened the script editor, the language selector
    is disabled. This behavior is by design; although both languages compile to the
    same intermediate language (`MSIL`) code, it would be difficult for any tool to
    convert source code from one language to another. The default language for both
    tools is `C#`, so those who prefer `VB.NET` will have to change the `ScriptLanguage`
    property.


    Once the language and variables are set, you’re ready to open up the code editor.
    When you click the `Edit Script` button, you’ll be presented with the familiar
    Visual Studio development environment. If you have written code using this IDE
    in the past (to develop Windows applications, web apps, etc.), you’ll recognize
    many entities—the `Solution Explorer`, the code window, the properties window,
    and many other common components. Although the behaviors will be a bit different
    in this minimized version of Visual Studio, the concepts remain the same.


    ## The Script Component


    Although both SSIS scripting tools have similar properties, they serve very different
    roles. Unlike the `Script task`, which is intended mostly for administrative and
    operational programmability, the `Script component` is designed for the more traditional
    moving parts of ETL: retrieving data from a source, performing some manner of
    transformation or validation on said data, and loading data to a destination.


    Common uses of the `Script component` include:


    *   Connecting to sources of data for which there is no native source component

    *   Sending data to destinations that do not offer a native destination or are
    structured differently than the typical tabular layout

    *   Performing advanced data manipulation that requires functionality not offered
    with the built-in SSIS transformations

    *   Complex splitting, filtering, or aggregating of the in-pipeline data


    The `Script component` is built with the versatility to behave in one of three
    modes: `transformation`, `source`, or `destination`. When you introduce an instance
    of the `Script component` into your data flow workspace, you’ll be prompted to
    select a configuration, as shown in [Figure 3-6](#9781484200834_Ch03.xhtml#Fig6).
    This is an important choice, since the selection you make will determine which
    code template is used to initially configure the component. I’ll dig more into
    each of these roles momentarily.


    ![9781484200834_Fig03-06.jpg](images/9781484200834_Fig03-06.jpg)


    [Figure 3-6](#9781484200834_Ch03.xhtml#_Fig6). `Script component` configuration


    ![Image](images/sq.jpg) `Note` You should consider the selection of the `Script
    component` role (`transformation`, `source`, or `destination`) to be permanent.
    If you mistakenly select the wrong configuration role, it’s usually easier to
    delete and re-create the script instance rather than trying to reconfigure it.


    Chances are good that you’ll use the `Script component` in each of these roles
    (`source`, `transformation`, and `destination`) from time to time. However, my
    experience has been that `transformation` is the most frequently used role for
    the `Script component`.


    Designing custom logic in your ETL processes is a hard, but rewarding, task. However,
    the job is not done once the code is promoted from development to testing or even
    to production. The effective ETL architect maintains a long-term vision when designing
    script solutions, because the packages often survive well beyond the tenures of
    those who create those solutions.


    To that end, an integral part of the solution design process should be evaluating
    the flexibility, maintainability, and reusability of the project as a whole, making
    specific allowances for the project-within-a-project instances of the script.


    ### Code Reuse'
  raw: 'When SSIS first surfaced with SQL Server 2005, the ETL developer could choose
    to store the code text in a Script task or Script component without actually building
    (compiling) the script project. By opting not to precompile the script, a trivial
    amount of processing resources would be saved (or more specifically, delayed)
    by forcing the SSIS design environment to accept the code as written. Two problems
    arose from this behavior: first, there was a performance penalty, however slight,
    caused by compiling the script on the fly during the execution of the package;
    second, the risk of runtime errors increased, due to the minimized up-front validation
    in the designer.


    Starting with SQL Server 2008, script precompilation is required. Now when you
    write a script, it is compiled in the background and the resulting binary output
    is serialized and stored inline within the package XML. As soon as you modify
    your script and close the editor, the .NET compiler is invoked and creates the
    serialized binary data. If you’ve made an error in your code that prevents compilation,
    you’ll be presented with a validation error on the Script task or Script component
    indicating that the binary code cannot be found (see [Figure 3-3](#9781484200834_Ch03.xhtml#Fig3)).


