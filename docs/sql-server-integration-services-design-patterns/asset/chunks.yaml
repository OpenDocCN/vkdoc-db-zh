  trans: '

    但从最终用户的角度来看，这意味着什么？让我们假设一个场景。假设你是一家零售公司的用户，有一个需要连接两个表的查询：一个包含 10 亿行的 `Sales` 表，以及一个包含
    5000 万行的 `Customer` 表。不巧的是，没有可用的索引能覆盖你的查询。这意味着你需要对每个表中的每一行进行 `扫描` 或读取。


    在一个 `SMP` 系统（内存、存储和 CPU 共享）中，这个查询可能需要运行数小时甚至数天。在某些系统上，根据服务器硬件和服务器活动量等因素，尝试执行此查询甚至可能不可行。简而言之，该查询将耗费相当长的时间才能返回结果，并且很可能对服务器上的其他活动产生负面影响。


    而在 `PDW` 中，这类查询通常能在几分钟内返回。如果模式设计良好——即将你要连接的行存储在同一个分布（distribution）上——甚至可以在几秒钟内执行完此查询。这是因为其架构是为扫描操作
    `优化` 的；`PDW` 本来就 `预期` 要扫描表中的每一行。还记得我们之前提到过每个分布都有其专用的 CPU、内存和存储吗？当你提交连接 10 亿行和
    5000 万行的查询时，每个分布都在扫描自己本地 `Sales` 表（1380 万行）和 `Customer` 表（69.5 万行）。这些较小的数据量更易于处理，一个空闲的分布可以轻松应对这样的工作负载。然后，数据通过超快的双
    `InfiniBand` 通道发送回 `控制` 节点，以合并结果并将数据返回给最终用户。正是这种分而治之的策略使得 `PDW` 能显著超越 `SMP` 系统。


    ## 聚集列存储索引


    `列存储` 指的是以列式（或面向列）的存储格式存储数据。在传统的 `RDBMS` 系统中，数据使用 `行存储`（或面向行）的存储格式。`行存储` 通常非常适合事务型应用，这类应用通常关注一行或少数几行的大多数或所有列。另一方面，`列存储`
    更适合分析型应用，这类应用通常关注表中列的子集以及大部分甚至全部的行。


    对于熟悉 `SQL Server` 中索引的人来说，你可以将聚集列存储索引（`CCI`）类比为面向行表中的聚集索引。但与聚集索引不同，一旦定义了 `CCI`，就不能再在该表上创建非聚集索引等额外索引。


    在 `PDW` 中，`CCI` 相比传统的 `行存储` 提供了多项性能改进。一些客户观察到查询性能提升高达十倍，数据压缩改善高达七倍。由于压缩及相关性能提升，微软推荐
    `CCI` 作为 `PDW` 中表的标准存储格式。


    ![Image](img/sq.jpg) **提示**  `列存储` 在 `PDW` 和 `SQL Server 企业版` 中均可用。有关列存储索引的更多信息，请参阅
    `MSDN` 上的“列存储索引详解”主题，或访问 `http://msdn.microsoft.com/en-us/library/gg492088`。


    ## 加载数据


    我们在上一节讨论过，`PDW` 由于其无共享架构，能够非常高效地查询数据。出于同样的原因，`PDW` 也能非常高效地加载数据。让我们简要讨论一下 `PDW`
    如何能如此高效地执行数据导入。


    如前所述，`控制虚拟机` 是写入或从设备检索任何数据的第一站。`控制` 节点决定哪些 `计算` 节点将参与存储操作。然后，每个 `计算` 节点使用哈希算法来确定数据存储位置，直至单个分布和关联的
    `LUN`。这使得每个分布可以与其他分布并行加载其数据。同样，并行分而治之地导入一个大表，将比执行单个大型导入或串行执行多个小型导入快得多。


    数据可以从众多平台导入，包括 `Oracle`、`SQL Server`、`MySQL` 和平面文件。将数据加载到 `PDW` 设备主要有两种方法：`DWLoader`
    和 `Integration Services`。我们将简要讨论何时使用 `DWLoader` 与 `Integration Services`。之后，我们将通过一个使用
    `Integration Services` 从 `SQL Server` 加载数据的示例。


    ## DWLoader 与 Integration Services


    `DWLoader` 是随 `PDW` 附带的命令行实用程序。熟悉 `SQL Server BCP`（大容量复制程序）的人会很容易学会 `DWLoader`，因为这两个实用程序的语法非常相似。从
    `SQL Server` 向 `PDW` 加载数据的一个非常常见的模式是：


    ```

    1. 使用 BCP 将数据从 SQL Server 导出到平面文件。

    2. 将平面文件存储在加载服务器上。

    3. 使用 DWLoader 将数据文件从加载服务器导入到 PDW。

    ```


    这是一种非常高效的数据导入方法，并且很容易生成表 `DDL`、`BCP` 命令和 `DWLoader` 命令的脚本。因此，对于数据仓库中常存在的大量小型维度表的初始和增量加载，你可能需要考虑使用
    `DWLoader`。这样做可以大大加快数据仓库迁移的速度。这种加载模式也可以用于从任何系统（不仅仅是 `SQL Server`）生成的平面文件。


    对于较大的表，你可能需要考虑 `Integration Services`。`Integration Services` 提供更强大的功能，并且可以说提供了更便捷的端到端体验。这是因为
    `Integration Services` 能够直接连接到数据源，并将数据加载到 `PDW` 设备中，而无需经过文件共享。另一个重要区别是，`Integration
    Services` 还能在数据传输过程中执行转换，这是 `DWLoader` 不支持的。


    值得注意的是，`Integration Services` 中的每个数据流都是单线程的，并且可能在 `I/O` 上形成瓶颈。通常，单线程的 `Integration
    Services` 包性能可能比 `DWLoader` 慢十倍。然而，多线程的 `Integration Services` 包——类似于我们稍后将创建的那个——可以缓解这一限制。对于需要数据类型转换的大表，具有十个并行数据流的
    `Integration Services` 包可以两全其美：性能与 `DWLoader` 相当，同时拥有 `Integration Services` 提供的所有高级功能。


    在决定使用 `DWLoader` 还是 `Integration Services` 时，你应该考虑许多变量。除了表大小，网络速度和表设计也会产生影响。归根结底，大多数
    `PDW` 实施可能会结合使用这两种工具。最好的方法是在你的环境中测试每种方法的性能，并为每种表模式选择最合适的工具。


    ## ETL 与 ELT


    许多 `Integration Services` 包是按照提取、转换和加载（`ETL`）流程设计的的。这是一个实用的模型，它力图减轻数据移动对源和目标服务器（传统上资源更受限）的影响，将数据过滤、清洗等此类活动的负担放在（可以说更容易扩展的）`ETL`
    服务器上。相比之下，提取、加载和转换（`ELT`）流程则将负担放在了目标服务器上。

    '
- fmt: 'Although both models have their place and `PDW` supports both, `ELT` makes
    more sense with `PDW` from both a technical and a business perspective. On the
    technical side, `PDW` is able to utilize its massively parallel processing (`MPP`)
    power to more efficiently load and transform large volumes of data. From the business
    aspect, having more data co-located allows more meaningful data to be gleaned
    during the transformation process. Organizations with `MPP` systems often find
    that the ability to co-locate and transform large quantities of disparate data
    enables them to make the leap from reactive data marts (*How much of this product
    did we sell?*) to predictive data modeling (*How can we sell* *more* *of this
    product?*).


    Just because you have decided on an `ELT` strategy does not necessarily mean your
    `Integration Services` package will not have to perform any transformations. In
    fact, many `Integration Services` packages may require data type transformations.
    [Table 8-1](#9781484200834_Ch08.xhtml#Tab1) illustrates the data types supported
    in `PDW` and the equivalent `Integration Services` data types.


    [Table 8-1](#9781484200834_Ch08.xhtml#_Tab1). Data Type Mappings for `PDW` and
    `Integration Services`


    | `SQL Server PDW` Data Type | `Integration Services` Data Type(s) That Map to
    the `SQL Server PDW` Data Type |

    | --- | --- |

    | `BIT` | `DT_BOOL` |

    | `BIGINT` | `DT_I1`, `DT_I2`, `DT_I4`, `DT_I8`, `DT_UI1`, `DT_UI2`, `DT_UI4`
    |

    | `CHAR` | `DT_STR` |

    | `DATE` | `DT_DBDATE` |

    | `DATETIME` | `DT_DATE`, `DT_DBDATE`, `DT_DBTIMESTAMP`, `DT_DBTIMESTAMP2` |

    | `DATETIME2` | `DT_DATE`, `DT_DBDATE`, `DT_DBTIMESTAMP`, `DT_DBTIMESTAMP2` |

    | `DATETIMEOFFSET` | `DT_WSTR` |

    | `DECIMAL` | `DT_DECIMAL`, `DT_I1`, `DT_I2`, `DT_I4`, `DT_I4`, `DT_I8`, `DT_NUMERIC`,
    `DT_UI1`, `DT_UI2`, `DT_UI4`, `DT_UI8` |

    | `FLOAT` | `DT_R4`, `DT_R8` |

    | `INT` | `DT_I1`, `DTI2`, `DT_I4`, `DT_UI1`, `DT_UI2` |

    | `MONEY` | `DT_CY` |

    | `NCHAR` | `DT_WSTR` |

    | `NUMERIC` | `DT_DECIMAL`, `DT_I1`, `DT_I2`, `DT_I4`, `DT_I8`, `DT_NUMERIC`,
    `DT_UI1`, `DT_UI2`, `DT_UI4`, `DT_UI8` |

    | `NVARCHAR` | `DT_WSTR`, `DT_STR` |

    | `REAL` | `DT_R4` |

    | `SMALLDATETIME` | `DT_DBTIMESTAMP2` |

    | `SMALLINT` | `DT_I1`, `DT_I2`, `DT_UI1` |

    | `SMALLMONEY` | `DT_R4` |

    | `TIME` | `DT_WSTR` |

    | `TINYINT` | `DT_I1` |

    | `VARBINARY` | `DT_BYTES` |

    | `VARCHAR` | `DT_STR` |


    Also, it is worth noting that `PDW` does not currently support the following data
    types at the time of this writing:


    *   `DT_DBTIMESTAMPOFFSET`

    *   `DT_DBTIME2`

    *   `DT_GUID`

    *   `DT_IMAGE`

    *   `DT_NTEXT`

    *   `DT_TEXT`


    Any of these unsupported data types will need to be converted to a compatible
    data type using the `Data Conversion` transformation. We will walk through how
    to perform such a transformation in just a moment.


    ## Data Import Pattern for PDW


    Now that you have a basic understanding of the architecture and loading concepts
    of an `APS` appliance, we’re ready to get started with the pattern for importing
    data into `PDW`.


    ### Prerequisites


    All `Integration Services` packages will be executed from a loading server. A
    *loading server* is a non-appliance server that resides on your network and runs
    `Windows Server 2008 R2` or newer. The loading server is connected to the `APS`
    appliance via `Ethernet` or `InfiniBand`, the latter of which is recommended for
    better performance. Additionally, the loading server will require permissions
    to access the Control node and must have `Integration Services` and the `PDW`
    destination adapter installed.


    The requirements for the `PDW` destination adapter will vary depending on the
    version of `PDW` and `Integration Services` you are running. The `PDW` documentation
    outlines the various requirements and installation instructions in great detail.
    Please refer to the “Install Integration Services Destination Adapters (SQL Server
    PDW)” section of your `PDW` documentation for more information.


    Once the `PDW` destination adapter is installed on the loading server, we’re ready
    to create mock data.


    ### Preparing the Data


    In preparation for moving data from `SQL Server` to `PDW`, you need to create
    a database in `SQL Server` and populate it with some test data. Execute the `T-SQL`
    code in [Listing 8-1](#9781484200834_Ch08.xhtml#list1) from your favorite query
    editor, such as `SQL Server Management Studio` (`SSMS`), to create a new database
    called `PDW_Example`.


    [***Listing 8-1***](#9781484200834_Ch08.xhtml#_list1). Example of `T-SQL` Code
    to Create a `SQL Server` Database


    ```sql

    USE [master];

    GO


    /* Create a database to experiment with */

    CREATE DATABASE [PDW_Example]

        ON PRIMARY

        (

            NAME = N''PDW_Example''

          , FILENAME = N''C:\Program Files\Microsoft SQL Server\MSSQL12.MSSQLSERVER\
    MSSQL\DATA\PDW_Example.mdf''

          , SIZE = 1024MB

          , MAXSIZE = UNLIMITED

          , FILEGROWTH = 1024MB

        )

        LOG ON

        (

            NAME = N''PDW_Example_Log''

          , FILENAME = N''C:\Program Files\Microsoft SQL Server\MSSQL12.MSSQLSERVER\
    MSSQL\DATA\PDW_Example_Log.ldf''

          , SIZE = 256MB

          , MAXSIZE = UNLIMITED

          , FILEGROWTH = 256MB

        );

    GO

    ```


    Please note that your database file path will vary depending on the details of
    your particular installation.


    Next, create a table and populate it with some data. As we discussed before, `Integration
    Services` works best with large tables that can be multithreaded. One good example
    of this is a `Sales` `Fact` table that is partitioned by year. [Listing 8-2](#9781484200834_Ch08.xhtml#list2)
    will provide the `T-SQL` code you need to create the table and partitioning dependencies.


    [***Listing 8-2***](#9781484200834_Ch08.xhtml#_list2). Example of `T-SQL` Code
    to Create a Partitioned Table in `SQL Server`


    ```sql

    USE PDW_Example;

    GO


    /* Create your partition function */

    CREATE PARTITION FUNCTION example_yearlyDateRange_pf

    (DATETIME) AS RANGE RIGHT

    FOR VALUES(''2013-01-01'', ''2014-01-01'', ''2015-01-01'');

    GO


    /* Associate your partition function with a partition scheme */

    CREATE PARTITION SCHEME example_yearlyDateRange_ps

    AS PARTITION example_yearlyDateRange_pf ALL TO([Primary]);

    GO


    /* Create a partitioned fact table to experiment with */

    CREATE TABLE PDW_Example.dbo.FactSales (

         orderID            INT IDENTITY(1,1)

       , orderDate          DATETIME

       , customerID         INT

       , webID              UNIQUEIDENTIFIER DEFAULT (NEWID())


    CONSTRAINT PK_FactSales

            PRIMARY KEY CLUSTERED

            (

                  orderDate

                , orderID

            )

    ) ON example_yearlyDateRange_ps(orderDate);

    ```


    ![Image](images/sq.jpg) **Note**  Getting an error on the above syntax? Partitioning
    is a feature only available in `SQL Server Enterprise` and `Developer Editions`.
    If you are not using `Enterprise` or `Developer Editions`, you can comment out
    the partitioning in the last line


    `ON example_yearlyDateRange_ps(orderDate);`


    and replace it with


    `ON [Primary];`


    Next, you need to generate data using the `T-SQL` in [Listing 8-3](#9781484200834_Ch08.xhtml#list3).
    This is the data you will be loading into `PDW`.


    [***Listing 8-3***](#9781484200834_Ch08.xhtml#_list3). Example of `T-SQL` Code
    to Populate a Table with Sample Data


    ```sql

    /* Declare variables and initialize with an arbitrary date */

    DECLARE @startDate DATETIME = ''2013-01-01'';


    /* Perform an iterative insert into the FactSales table */

    WHILE @startDate < ''2016-01-01''

    BEGIN


    INSERT INTO PDW_Example.dbo.FactSales (orderDate, customerID)

        SELECT @startDate

            , DATEPART(WEEK, @startDate) + DATEPART(HOUR, @startDate);


    /* Increment the date value by hour; for more test data,

     replace HOUR with MINUTE or SECOND */

        SET @startDate = DATEADD(HOUR, 1, @startDate);


    END;

    ```


    This script will generate roughly 26,000 rows in the `FactSales` table spanning
    3 years, although you can easily increase the number of rows generated by replacing
    `HOUR` in the `DATEADD` statement with `MINUTE` or even `SECOND`.


    Now that you have a data source to work with, you are ready to start working on
    your `Integration Services` package.


    ## Package Overview'
  raw: 'Although both models have their place and PDW supports both, ELT makes more
    sense with PDW from both a technical and a business perspective. On the technical
    side, PDW is able to utilize its massively parallel processing (MPP) power to
    more efficiently load and transform large volumes of data. From the business aspect,
    having more data co-located allows more meaningful data to be gleaned during the
    transformation process. Organizations with MPP systems often find that the ability
    to co-locate and transform large quantities of disparate data enables them to
    make the leap from reactive data marts (*How much of this product did we sell?*)
    to predictive data modeling (*How can we sell* ***more*** *of this product?*).


    Just because you have decided on an ELT strategy does not necessarily mean your
    Integration Services package will not have to perform any transformations. In
    fact, many Integration Services packages may require data type transformations.
    [Table 8-1](#9781484200834_Ch08.xhtml#Tab1) illustrates the data types supported
    in PDW and the equivalent Integration Services data types.


    [Table 8-1](#9781484200834_Ch08.xhtml#_Tab1). Data Type Mappings for PDW and Integration
    Services


    | SQL Server PDW Data Type | Integration Services Data Type(s) That Map to the
    SQL Server PDW Data Type |

    | --- | --- |

    | BIT | DT_BOOL |

    | BIGINT | DT_I1, DT_I2, DT_I4, DT_I8, DT_UI1, DT_UI2, DT_UI4 |

    | CHAR | DT_STR |

    | DATE | DT_DBDATE |

    | DATETIME | DT_DATE, DT_DBDATE, DT_DBTIMESTAMP, DT_DBTIMESTAMP2 |

    | DATETIME2 | DT_DATE, DT_DBDATE, DT_DBTIMESTAMP, DT_DBTIMESTAMP2 |

