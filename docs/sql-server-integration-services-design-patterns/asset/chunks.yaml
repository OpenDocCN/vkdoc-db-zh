    \ `Parent`（包的名称）。这确保了变量具有包作用域。在“名称”文本框中输入 `FolderName`。单击“确定”按钮，然后将“索引”属性更改为 `0`。将“值类型”属性保留为\
    \ `String`。我几乎总是以这种方式创建 SSIS 变量。这样我对作用域有更多控制，并且我是在变量将被使用的地方创建和配置它。此功能节省时间，简直太棒了。\n\
    \n按以下顺序创建变量：\n\n```\nContainer: Parent\nName: FolderName\nNamespace: User\nValue\
    \ Type: String\nValue:\n\nContainer: Parent\nName: ProjectName\nNamespace: User\n\
    Value Type: String\nValue:\n\nContainer: Parent\nName: ChildPackageName\nNamespace:\
    \ User\nValue Type: String\nValue:\n\nContainer: Parent\nName: ExecutionOrder\n\
    Namespace: User\nValue Type: Int32\nValue: 0\n```\n\n确保索引值对齐如下所示：\n\n```\nFolderName:\
    \ 0\nProjectName: 1\nChildPackageName: 2\nExecutionOrder: 3\n```\n\n字段不必按此顺序列出，但索引值必须与\
    \ `custom.GetApplicationPackages` 返回的字段的（从零开始的）序数值对齐。\n\n## 设置执行任务\n\n单击“确定”按钮关闭“Foreach\
    \ 循环容器编辑器”。将一个“执行 SQL”任务拖到“Foreach 循环容器”中，并将其重命名为 `Execute Package`。将 `ConnectionType`\
    \ 设置为 `ADO.NET`，并选择你之前创建的 `SSISDB` 连接。将 `IsQueryStoredProcedure` 属性设置为 `True`，并将\
    \ `SQL Statement` 属性设置为 `custom.execute_catalog_package`。在“参数映射”页上，添加并创建一个名为 `ExecutionID`\
    \ 的新变量，`Int32` 数据类型，包作用域，`默认值`：0。将参数的 `Direction` 更改为 `Output`，并通过提供参数名称 `ExecutionID`\
    \ 将你刚刚创建的 SSIS 变量与 `ExecutionID` 参数关联起来。再添加三个参数映射——分别对应 `FolderName`、`ProjectName`\
    \ 和 `ChildPackageName`。将它们分别映射到存储过程参数 `FolderName`、`ProjectName` 和 `PackageName`。`custom.execute_catalog_package`\
    \ 存储过程接受其他参数：`LoggingLevel`、`Use32BitRunTime`、`ReferenceID` 和 `ObjectType`；但这些参数都包含默认值，这些默认值将满足我们的目的。单击“确定”按钮关闭“执行\
    \ SQL 任务编辑器”。\n\n你的 `Parent.dtsx` SSIS 包应如图 2-3 所示。\n\n![9781484200834_Fig02-03.jpg](img/9781484200834_Fig02-03.jpg)\n\
    \n**图 2-3**. 父包控制流\n\n## 构建执行元数据\n\n返回到 `SSMS`。让我们为简单的执行框架提供要执行的元数据。执行清单 2-8 中的\
    \ T-SQL 语句。\n\n**清单 2-8**. 为 SSIS 应用程序构建元数据\n\n```\nUse SSISDB\nGo\n\nSet NoCount\
    \ On\n\nDeclare @ApplicationName nvarchar(256)\nDeclare @ApplicationDescription\
    \ nvarchar(512)\nDeclare @ApplicationID int\nDeclare @FolderName nvarchar(256)\n\
    Declare @ProjectName nvarchar(256)\nDeclare @PackageName nvarchar(256)\nDeclare\
    \ @PackageDescription nvarchar(512)\nDeclare @PackageID int\nDeclare @ExecutionOrder\
    \ int\nDeclare @ApplicationPackageEnabled bit\nDeclare @ApplicationTbl table(ApplicationID\
    \ int)\nDeclare @PackageTbl table(PackageID int)\n\nbegin tran\n\n-- Build Application\
    \ --\nSelect @ApplicationName = 'TestSSISApp'\n      ,@ApplicationDescription\
    \ = 'A test SSIS application'\n\nInsert Into @ApplicationTbl\nExec custom.AddApplication\n\
    \  @ApplicationName\n ,@ApplicationDescription\n\nSelect @ApplicationID = ApplicationID\n\
    \ From @ApplicationTbl\n\n-- Build Package --\nSelect @FolderName = 'Chapter2'\n\
    \      ,@ProjectName = 'Chapter2'\n      ,@PackageName = 'Chapter2.dtsx'\n   \
    \   ,@PackageDescription = 'A test SSIS package'\n\nInsert Into @PackageTbl\n\
    Exec custom.AddPackage\n  @FolderName\n ,@ProjectName\n ,@PackageName\n ,@PackageDescription\n\
    \nSelect @PackageID = PackageID\n From @PackageTbl\n\n-- Build ApplicationPackage\
    \ --\nSelect @ExecutionOrder = 10\n       ,@ApplicationPackageEnabled = 1\n\n\
    Exec custom.AddApplicationPackage\n   @ApplicationID\n  ,@PackageID\n  ,@ExecutionOrder\n\
    \  ,@ApplicationPackageEnabled\n\nDelete @PackageTbl\n\n-- Build Package --\n\
    Select @FolderName = 'Chapter2'\n      ,@ProjectName = 'Chapter2'\n      ,@PackageName\
    \ = 'Chapter2.dtsx'\n      ,@PackageDescription = 'Another test SSIS package'\n\
    \nInsert Into @PackageTbl\nExec custom.AddPackage\n  @FolderName\n ,@ProjectName\n\
    \ ,@PackageName\n ,@PackageDescription\n\nSelect @PackageID = PackageID\n From\
    \ @PackageTbl\n\n-- Build ApplicationPackage --\nSelect @ExecutionOrder = 20\n\
    \       ,@ApplicationPackageEnabled = 1\n\nExec custom.AddApplicationPackage\n\
    \   @ApplicationID\n  ,@PackageID\n  ,@ExecutionOrder\n  ,@ApplicationPackageEnabled\n\
    \nDelete @PackageTbl\n\nCommit\n```\n\n清单 2-8 中的 T-SQL 在执行框架中构建了一个简单的 SSIS 应用程序。它调用了我们的\
    \ `Chapter2.dtsx` SSIS 包两次。如果你回到 `SSDT-BI` 并执行父包，你会注意到 `Chapter2.dtsx` SSIS 包快速连续执行了两次。你可以在图\
    \ 2-4 中看到该执行情况。"
- fmt: '![9781484200834_Fig02-04.jpg](images/9781484200834_Fig02-04.jpg)


    [Figure 2-4](#9781484200834_Ch02.xhtml#_Fig4). `Chapter2.dtsx` executing twice
    without waiting


    It is important to understand that the framework is a “fire and forget” design.
    The screenshot in [Figure 2-4](#9781484200834_Ch02.xhtml#Fig4) shows both instances
    of `Chapter2.dtsx` showing their respective message boxes, yet the tasks in the
    background have completed. This approach works well if your SSIS packages can
    be executed in parallel. But what if there are dependencies between packages?
    This framework does not facilitate dependent package execution, but I will show
    you a way to couple the framework with the SQL Server Agent Job scheduler in the
    next section. Coupling will allow you to execute the parent package for each “step”
    of a process, calling an SSIS application each step, and in turn, calling one
    or more SSIS packages in parallel.


    ![Image](images/sq.jpg) **Note** Appendix A contains information on building a
    serial SSIS framework that was originally built for SSIS 2005. It works in SSIS
    2014 if you use the package deployment model.


    ## Scheduling SSIS Package Execution


    There are many commercially available software execution schedulers on the market.
    They range from relatively simple to highly complex, allowing time- or event-based
    execution. Many include metadata collection capabilities that track metrics such
    as execution time. SQL Server Agent is a fairly robust job scheduling application
    included with SQL Server. We will use SQL Server Agent to schedule the execution
    of our demo package.


    ![Image](images/sq.jpg) **Caution** Before proceeding, deploy the `Chapter2` project
    to the SSIS Catalog. Doing so will deploy `Chapter2.dtsx` and `Parent.dtsx`.


    ### Scheduling an SSIS Package


    Open SSMS and connect to an instance of SQL Server 2014. Open Object Explorer
    and expand the SQL Server Agent node, if possible. Why might expanding the SQL
    Server Agent node not be possible? By default, SQL Server Agent is installed as
    a manual startup service.


    Right-click the `Jobs` virtual folder and click New ![image](images/arrow.jpg)
    Job. When the New Job window displays, name the job `Ch2`. Click on the Steps
    page and click the New button. Name the new step `Execute Chapter 2 Package` and
    select SQL Server Integration Services Package from the Type drop-down.


    Select a Package Source from the drop-down. These are the options:


    *   SQL Server

    *   File system

    *   SSIS Package Store

    *   SSIS Catalog


    Let’s schedule an SSIS package from the catalog to start. Type `localhost`, or
    the name of the SSIS server that contains the SSIS Catalog, into the Server drop-down.
    Click the ellipsis beside the Package text box and navigate to the demonstration
    package, `Chapter2.dtsx`, as shown in [Figure 2-5](#9781484200834_Ch02.xhtml#Fig5).


    ![9781484200834_Fig02-05.jpg](images/9781484200834_Fig02-05.jpg)


    [Figure 2-5](#9781484200834_Ch02.xhtml#_Fig5). Configuring a SQL Server Agent
    Job to execute an SSIS package in the SSIS Catalog


    Clicking the OK button will complete the package selection procedure.


    ### Scheduling a File System Package


    To schedule a package stored in the file system, select File System in the Package
    Source drop-down. Click the ellipsis beside the Package text box and navigate
    to the desired SSIS package file. Once configured, the step will appear as shown
    in [Figure 2-6](#9781484200834_Ch02.xhtml#Fig6).


    ![9781484200834_Fig02-06.jpg](images/9781484200834_Fig02-06.jpg)


    [Figure 2-6](#9781484200834_Ch02.xhtml#_Fig6). SQL Server Agent job step configured
    to execute an SSIS package from the file system


    You can test the job by right-clicking the job name in SSMS and then clicking
    Start Job at Step. But the job execution may fail. Why? Because the `Chapter2.dtsx`
    package displays a message box, SQL Server Agent jobs are usually started by a
    service account, and service accounts are not allowed to display message boxes.
    If your SQL Server Agent service is started by a User account (or any account
    acting with the `InteractWithDesktop` role). This is discussed more in the next
    section.


    ### Running SQL Server Agent Jobs with the Custom Execution Framework


    We can run a SQL Server Agent job with our custom execution framework. To demonstrate,
    create a new SQL Server Agent job named `Framework Execution`. On the Steps page,
    add a new step named `TestSSISApp Framework Execution`. Select the SSIS Package
    Step Type and accept the default Package Source property of SSIS Catalog. Enter
    or select the name of your server in the Server drop-down and click the ellipsis
    beside the Package text box to open the Select an SSIS Package window. Navigate
    to the `Parent.dtsx` SSIS package, and then click the OK button.


    Click the Configuration tab on the New Job Step window. The package parameter
    `ApplicationName` should appear in the Parameters list. To enter a value for this
    parameter, click the ellipsis beside the Value text box, and then enter `TestSSISApp`.
    Click the OK button to close and save the New Job Step window, and then click
    the OK button again to close and save the New Job window.


    To test, right-click the framework execution SQL Server Agent job and click Start
    Job at Step. The SQL Server Agent job will execute and succeed, but I have bad
    news: the package executions will fail. I can hear you thinking, “Wait, what?”
    I kid you not. Remember about this being a “fire and forget” execution framework?
    That fact haunts us here— and elsewhere in SSIS execution. It’s better for you
    to become aware of this now—trust me on this. The other way to gain this knowledge
    involves arguing with your boss (or worse, your client) that “the job succeeded!”
    and being wrong.


    How do you know the package execution failed? Let’s go look. Expand the Integration
    Services Catalog’s virtual folder in SSMS Object Explorer. Right-click `SSISDB`
    and hover over Reports, then Standard Reports, and click Integration Services
    Dashboard. If you have followed my instructions, you will see a large, reddish-colored
    “2” above the word Failed. If you click the “2,” the reports will take you to
    a page containing a list of failed executions. If you then click the All Messages
    link, you will see an error message informing you that the Script task experienced
    an error (`Exception has been thrown by the target of an invocation`). That message
    means (among other things) that you used a message box in a Script task. No, I
    am not making this up.


    ![Image](images/sq.jpg) **Note** “Are message boxes bad?” Absolutely not! In fact,
    they’re the only way to troubleshoot a certain class of errors in SSIS. I use
    them all the time, but I qualify the message box calls in an If/Then statement.
    If you don’t do this, the message box calls will execute and cause SQL Server
    Agent jobs to either fail or lie to you about execution success.


    All is not lost. The problem here is that a service account is providing the security
    context for the execution. The account used to start the SQL Server Agent service
    is the account used to execute the packages from SQL Server Agent jobs. That account
    typically does not have the `InteractWithDesktop` role assigned, and you have
    to admit—a desktop is handy for displaying message boxes. The caveat is this:
    you cannot include unqualified calls to message box displays in SSIS packages.
    Use a parameter or variable (I use one called `Debug`) and make sure its value
    is external to the package so you can turn it on and off when you *want* to display
    message boxes.'
