                .Cursor = Cursors.WaitCursor

                .txtStatus.Text = "Loading " & sFullSSISPkgPath

                .Refresh()

                Dim oServer As New Server(.txtSSISCatalogServer.Text)

                Dim oIS As New IntegrationServices(oServer)

                Dim cat As Catalog = oIS.Catalogs(.txtCatalog.Text)

                Dim fldr As CatalogFolder = cat.Folders(.txtFolder.Text)

                Dim prj As ProjectInfo = fldr.Projects(.txtCatalogProject.Text)

                Dim pkg As PackageInfo = prj.Packages(.txtCatalogPackage.Text)

                .txtStatus.Text = sFullSSISPkgPath & " loaded. Starting validation..."

                .Refresh()

    pkg.Validate(False, PackageInfo.ReferenceUsage.UseAllReferences, Nothing)

                .txtStatus.Text = sFullSSISPkgPath & " validated. Starting execution..."

                .Refresh()

    pkg.Execute(False, Nothing)

                .txtStatus.Text = sFullSSISPkgPath & " execution started."

                .Cursor = Cursors.Default

            End With


    End Sub


    End Module

    ```


    Let’s walk through the portion of this code that executes an SSIS package in the
    file system. In [Figure 2-9](#9781484200834_Ch02.xhtml#Fig9), we are looking at
    the functionality represented in the upper group box.


    The application works when the user either enters the full path to an SSIS package
    in the file system or clicks the ellipsis to browse to a SSIS package (dtsx) file.
    After selecting a file, the full path will display in the Package Path text box.
    To execute the package, click the Start button in the SSIS Package in the File
    System group box. When the Start button is clicked, the form code in the `btnStartFile_Click`
    subroutine is executed, and it executes a single line of code that calls the `btnStartFileClick`
    subroutine in the `frmMainHelper` module.


    The `btnStartFileClick` subroutine first changes the form cursor to a `WaitCursor`.
    Next it updates the txtStatus text box to display the text Executing followed
    by the full path of the SSIS package in the Package Path text box. The Refresh
    statement causes the form to update, displaying the `WaitCursor` and the message
    in txtStatus. The code then creates an instance of an SSIS application (`Microsoft.SqlServer.Dts.Runtime.Wrapper.Application`)
    in the form of the `ssisApp` variable. `ssisPkg` is an instance of an SSIS Package
    object. It is created by calling the `LoadPackage` method of the SSIS Application
    object (`ssisApp`). We use the Package object’s `Execute` method to start the
    SSIS package. The remainder of the subroutine resets the form cursor and updates
    the txtStatus message to indicate the package executed.


    Were I to harden this code for production, I would wrap much of the code in this
    subroutine in a large Try-Catch block. In the Catch section, I would reset the
    cursor and update txtStatus with the error message. I like logging— a lot. In
    a Production-hardened version, I would log my intention to execute the package
    and include the full path displayed in the Package Path text box. I would also
    log the result of the attempted execution, whether it succeeded or failed.


    The code that executes an SSIS package stored in the SSIS Catalog is found in
    the `frmMainHelper` module’s `btnStartCatalogClick` subroutine. The code that
    manages the cursor and messaging to the txtStatus text box is comparable to that
    found in the `btnStartFileClick` subroutine.


    There are a few more moving parts to an SSIS package stored in the SSIS Catalog,
    shown in [Figure 2-10](#9781484200834_Ch02.xhtml#Fig10).


    ![9781484200834_Fig02-10.jpg](images/9781484200834_Fig02-10.jpg)


    [Figure 2-10](#9781484200834_Ch02.xhtml#_Fig10). A representation of the SSIS
    Catalog


    Integration Services is contained by a server and, in turn, it contains a catalog.
    In SQL Server 2014, Integration Services contains a single catalog named SSISDB.
    SSISDB is also the name of the database used to manage SSIS metadata in the catalog.
    A catalog contains one or more folders. Folders contain one or more projects,
    which contain one or more packages.


    In the `btnStartCatalogClick` subroutine, the code declares variables for the
    objects in this hierarchy (using `Dim` statements) and sets their value based
    on the names supplied in the five text boxes: txtSSISCatalogServer, txtCatalog,
    txtFolder, txtCatalogProject, and txtCatalogPackage. As you can see by comparing
    the names of the text boxes to [Figure 2-10](#9781484200834_Ch02.xhtml#Fig10),
    an SSIS package stored in the catalog can be uniquely identified using this hierarchy.
    How are the text boxes populated? The user can enter the information manually
    if desired. But the application contains a second form, launched by the ellipsis
    in the SSIS Package in the Catalog group box, to facilitate SSIS catalog navigation.


    To build it, add a second form to the application and name it **frmISTree**. Add
    a `GroupBox` control to the form and position it near the top. Change the Text
    property of the group box to **Connection**. Add a label, text box, and button
    to the group box. Change the Text property of the label to **Server:**. Name the
    text box **txtServer**. Name the button **btnConnect** and change its Text property
    to **Connect**. Add a `TreeView` control to the lower portion of the form and
    name it **tvCatalog**. Add a button just below the treeview, name it **btnSelect**,
    and change its Text property to **Select**. Add an `ImageList` control and name
    it **ilSSDB**. You will either have to rustle up your own images or download the
    demo project containing the four images I used for treeview node levels. Set the
    treeview’s ImageList property to **ilSSDB**. The form should appear as shown in
    [Figure 2-11](#9781484200834_Ch02.xhtml#Fig11).


    ![9781484200834_Fig02-11.jpg](images/9781484200834_Fig02-11.jpg)


    [Figure 2-11](#9781484200834_Ch02.xhtml#_Fig11). ISTree Form


