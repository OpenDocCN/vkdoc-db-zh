  trans: '# 脚本维护模式


    当 SSIS 首次随 SQL Server 2005 出现时，ETL 开发人员可以选择将代码文本存储在 `脚本任务` 或 `脚本组件` 中，而无需实际构建（编译）脚本项目。通过选择不对脚本进行预编译，可以节省（或更具体地说，推迟）少量处理资源，因为
    SSIS 设计环境会接受按原样编写的代码。这种行为引发了两个问题：首先，由于在包执行期间动态编译脚本，会带来轻微的性能损失；其次，由于设计器中的前期验证最小化，运行时错误的风险增加了。


    从 SQL Server 2008 开始，脚本预编译成为必需。现在，当你编写脚本时，它会在后台进行编译，生成的二进制输出被序列化并内联存储在包 XML 中。一旦你修改脚本并关闭编辑器，就会调用
    .NET 编译器并创建序列化的二进制数据。如果你在代码中犯了导致编译错误的错误，`脚本任务` 或 `脚本组件` 上将显示一个验证错误，指示找不到二进制代码（参见
    图 3-3）。


    ![9781484200834_Fig03-03.jpg](img/9781484200834_Fig03-03.jpg)


    图 3-3. `脚本任务` 的编译错误


    此验证步骤是一种安全机制，用于确保你的包不会在包含无法编译的代码的情况下部署。然而，也可以在脚本编辑器中从内部构建脚本项目，这样你就可以在关闭编辑窗口之前定期检查代码是否存在编译错误。在脚本编辑器的菜单栏中，你会发现
    `生成` ![image](img/arrow.jpg) `生成 [*脚本项目名称*]` 的选项，用于编译脚本项目中的所有代码。当你以这种方式生成项目时，编译过程中发现的任何错误都将在
    `错误列表` 窗口中报告（图 3-4）。


    ![9781484200834_Fig03-04.jpg](img/9781484200834_Fig03-04.jpg)


    图 3-4. `错误列表`


    `错误列表` 窗口中还包含编译器生成的任何警告；虽然它们不会阻止代码编译，但在将代码进一步推进开发流程之前，彻底审查此列表中出现的任何警告总是一个明智的做法。


    ## 脚本任务


    在控制流窗格中，用于编写自定义代码的工作区是 `脚本任务`。虽然从技术上讲它可以用于直接数据操作，但此工具最适用于支持使用原生控制流任务不易完成的操作。可以将
    `脚本任务` 视为一个辅助对象，用于在包中将其他以数据为中心的操作连接在一起。


    以下是 `脚本任务` 经常满足的一些需求：


    *   检查源或目标文件的存在性和可访问性

    *   使用文件归档实用程序 API 来压缩或解压缩文件

    *   生成自定义事件消息（例如 HTML 格式的电子邮件）

    *   设置变量值

    *   在包完成或发生错误时执行清理操作

    *   检查环境数据，例如可用磁盘空间、Windows 服务状态等


    由于它并非为操作数据而设计，因此无需定义输入或输出元数据，这使得 `脚本任务` 相对容易配置。如 图 3-5 所示，此任务只有几个必需的配置元素：指定你要使用的编程语言，选择要在脚本中可见的变量，然后就可以开始编写代码了！


    ![9781484200834_Fig03-05.jpg](img/9781484200834_Fig03-05.jpg)


    图 3-5. `脚本任务编辑器`


    ![Image](img/sq.jpg) `注意` 对于 `脚本任务` 和 `脚本组件`，选择使用 `C#` 或 `VB.NET` 的决定应被视为永久性的。一旦你选择了语言并打开了脚本编辑器，语言选择器就会被禁用。此行为是设计使然；尽管两种语言都编译为相同的中间语言
    (`MSIL`) 代码，但任何工具都难以将一种语言的源代码转换为另一种语言。这两种工具的默认语言都是 `C#`，因此偏好 `VB.NET` 的用户必须更改
    `ScriptLanguage` 属性。


    一旦语言和变量设置完毕，就可以打开代码编辑器了。当你单击 `编辑脚本` 按钮时，将会看到熟悉的 Visual Studio 开发环境。如果你过去曾使用此 IDE
    编写过代码（用于开发 Windows 应用程序、Web 应用程序等），你会认出许多实体——`解决方案资源管理器`、代码窗口、属性窗口以及许多其他常见组件。尽管在这个精简版的
    Visual Studio 中行为会有所不同，但概念保持不变。


    ## 脚本组件


    尽管两种 SSIS 脚本工具有相似的属性，但它们扮演着非常不同的角色。与主要用于管理和操作可编程性的 `脚本任务` 不同，`脚本组件` 专为 ETL 中更传统的活动部分而设计：从源检索数据，对所述数据执行某种转换或验证，以及将数据加载到目标。


    `脚本组件` 的常见用途包括：


    *   连接到没有原生源组件的源数据

    *   将数据发送到不提供原生目标或结构与典型表布局不同的目标

    *   执行需要内置 SSIS 转换未提供的功能的高级数据操作

    *   对管道中数据进行复杂的拆分、筛选或聚合


    `脚本组件` 构建时具有多功能性，可以以三种模式之一运行：`转换`、`源` 或 `目标`。当你将 `脚本组件` 实例引入数据流工作区时，系统会提示你选择一个配置，如
    图 3-6 所示。这是一个重要的选择，因为你所做的选择将决定用于初始配置组件的代码模板。我稍后会详细探讨每种角色。


    ![9781484200834_Fig03-06.jpg](img/9781484200834_Fig03-06.jpg)


    图 3-6. `脚本组件` 配置


    ![Image](img/sq.jpg) `注意` 你应将 `脚本组件` 角色（`转换`、`源` 或 `目标`）的选择视为永久性的。如果错误地选择了错误的配置角色，通常更容易删除并重新创建脚本实例，而不是尝试重新配置它。


    你很可能会在 `脚本组件` 的每种角色（`源`、`转换` 和 `目标`）中不时使用它。然而，根据我的经验，`转换` 是 `脚本组件` 最常用的角色。


    在 ETL 流程中设计自定义逻辑是一项艰巨但有回报的任务。然而，代码从开发阶段晋升到测试甚至生产阶段后，工作并未完成。高效的 ETL 架构师在设计脚本解决方案时会保持长远眼光，因为这些包通常在创建它们的人员离职后仍能长期存活。


    为此，解决方案设计过程的一个组成部分应该是评估整个项目的灵活性、可维护性和可重用性，并为脚本中的“项目内项目”实例做出具体考量。


    ### 代码重用'
- fmt: '# SSIS中的代码重用


    懒惰是件好事。（停顿以示强调。）澄清一下：所有伟大的技术人员都会想办法避免反复解决相同的问题。假设你花了一些时间处理脚本任务和脚本组件，并想出了一个关于“下一个伟大的ETL事物”的绝妙主意。这个事物专注于添加原生SSIS工具中没有的行为，但同时又足够通用，可以在多个域的多个包中使用。既然你曾经为此付出过努力，你就会希望避免再次重新发明它。解决方案是：找到一种方法使这个事物可复用。


    为此，在SSIS中有几种代码复用的方法，从老式的复制粘贴到花哨的模块化。


    ## 复制粘贴


    这里不需要进一步定义：通过复制粘贴进行代码复用正如其听起来的那样。尽管将代码复制粘贴作为一种复用机制有点粗糙和非结构化，但它也是在SSIS中最简单和最常用的方法。其优点是部署快速简单，管理限制少。然而，这种简单性是有代价的。以这种方式部署，每个代码副本都存在于自己的孤岛中，必须独立地手动维护。


    ## 外部程序集


    正如我在本章前面提到的，`Script task`和`Script component`都允许你引用外部程序集（从单独项目生成的编译代码），以将补充行为导入到`Script
    task`/`Script component`的实例中。创建外部程序集的细节超出了本章的范围，但简而言之，你会使用单独的开发环境来编码和编译将在ETL过程中使用的类、方法和事件。生成的二进制文件，称为**程序集**，将被部署到开发机器和任何将执行包的服务器机器上。然后，该程序集将被添加到脚本引用列表中，其结果是，程序集中定义的行为将可以从`Script
    task`或`Script component`的实例内部访问。


    这种方法有几个优点。首先，这是在包中处理代码复用的一种更模块化的方式。这种方法不是依赖于基本的复制粘贴操作，而是允许对ETL过程的共享自定义功能进行单点管理和开发。由于所有对自定义行为的引用在每台开发机器或服务器上都指向单个程序集，因此对代码的任何更新都将在机器级别解决，而不必触及每个包中的每个脚本。此外，构建到外部程序集中的行为可以被其他进程或应用程序使用；因为这些独立的程序集是使用公共语言运行时构建的，它们的用途可以扩展到SSIS的边界之外。


    这种方法也有一些限制。首先，你不能使用SSDT创建自定义程序集。虽然这两种工具都使用Visual Studio外壳，但它们仅安装了创建商业智能项目的模板，并不原生支持其他项目类型。要创建包含自定义代码的程序集，你需要使用配置为生成类库项目版本的Visual
    Studio（标准版和专业版，甚至是特定语言的免费Express版）——或者，对于经验非常丰富的开发人员，使用纯文本编辑器和.NET编译器。另一个限制是，在脚本中引用的任何程序集都必须部署到将执行包的机器上的全局程序集缓存中，并注册。这个部署和注册过程并不复杂，但它确实增加了ETL基础设施中活动部件的总数。


    ## 自定义任务/组件


    在SSIS可复用性食物链的顶端，你会找到自定义任务和自定义组件。与自定义程序集一样，能够将你自己的任务和组件添加到SSIS中，允许你在SSIS内创建高度定制的行为。此外，自定义任务和组件使你能够为这些行为创建更定制的用户界面，从而在你的SSIS包中进行相对简单的拖放使用。为了简洁起见，我们不会在本章中详细讨论自定义任务或自定义组件的使用，但值得一提的是，如果某个脚本行为在你的许多包中经常重复，那么值得考虑将`Script
    task`或`Script component`转换为可以轻松集成到SSDT中的自定义工具。


    ## 源代码控制


    询问任何优秀开发人员他们所需的项目要素简短列表，源代码控制几乎总是在列表的顶部。因为任何SSIS项目本质上都是软件开发——尽管主要是在图形环境中——ETL开发人员也必须做出同样的考虑。由于SSIS包的存储只是一个XML文件，因此将SSIS包添加到大多数现有的源代码控制系统并不困难。


    对一些人来说，`Script task`和`Script component`看起来像是驻留在SSIS包之外——毕竟，这两者都是通过看似独立的Visual
    Studio项目来管理的。这种想法有时会引出如何将SSIS脚本逻辑集成到源代码控制中的问题。简单的答案是，除了对包本身进行源代码控制之外，没有其他要求。因为所有代码都内联存储在包的XML中，所以不需要在源代码控制中单独跟踪`Script
    task`或`Script component`实例中的代码。


    ## 脚本设计模式


    作为一个土生土长的南方人，我总是被教导做事的方法不止一种。虽然我从未尝试过这个特定的练习，但我可以确认，对于任何给定的问题（在生活中，以及在SSIS中），可能有几十种甚至数百种正确的解决方案。


    由于脚本解决方案的高度灵活性，不可能预测可能进入SSIS代码的每一种逻辑排列组合。然而，随着集成服务的演变，一些常用的设计模式已经出现。在本节中，我将看看其中的一些模式。


    ### 连接管理器和脚本编写


    连接管理器内置于SQL Server集成服务中，作为一种模块化方式来复用到数据库、数据文件和其他信息源的连接。任何即使只有一点点SSIS使用经验的人都知道连接管理器以及它们与常规组件（如`OLE
    DB Source/Destination`和`Flat File Source/Destination`）以及任务（如`FTP task`和`Execute
    SQL task`）的关系。你可以将连接对象实例化为包级实体（如图3-7所示），并在包的其余部分使用它。


    ![9781484200834_Fig03-07.jpg](images/9781484200834_Fig03-07.jpg)


    图3-7. 连接管理器对象


    不太为人所知的是，你也可以在`Script task`和`Script component`的实例中访问大多数连接管理器对象。连接到数据源是SSIS脚本中非常常见的任务，特别是在用作源或目标的`Script
    component`实例中。然而，在实际使用中，我发现很多ETL开发人员会经历在脚本内以编程方式创建新连接的操作，即使包中已经有一个连接管理器。'
  raw: 'Laziness is a good thing. (Pause for effect.) To clarify: all great technologists
    find ways to avoid solving the same problems repeatedly. Let’s say you’ve spent
    some time working with script tasks and script components, and you come up with
    a whiz-bang idea for The Next Big ETL Thing. The Thing is so narrowly focused
    that it adds behavior not present in native SSIS tools, but it’s also versatile
    enough to be used in multiple packages across several domains. Since you worked
    so hard on it once, you’ll want to avoid reinventing The Thing again. The solution:
    find a way to make The Thing reusable.


    To that end, there are several ways to reuse code within SSIS, from the old-fashioned
    copy/paste to fancy modularization.


    Copy/Paste


    No further definition is needed here: code reuse via copy/paste is exactly as
    it sounds. Although copying and pasting code as a reuse mechanism is a bit crude
    and unstructured, it’s also the simplest and most commonly used means to do so
    within SSIS. The upside is a quick and easy deployment with few administrative
    limitations. However, this simplicity comes at a cost. Deployed in this manner,
    each copy of the code exists in its own silo and must be independently and manually
    maintained.


    External Assemblies


    As I mentioned earlier in the chapter, both the Script task and the Script component
    allow you to reference external assemblies (compiled code generated from a separate
    project) to import supplemental behavior into the instance of the Script task/component.
    The details of creating an external assembly are beyond the scope of this chapter,
    but in a nutshell, you would use a separate development environment to code and
    compile the classes, methods, and events to be used in your ETL processes. The
    resulting binary file, known as an *assembly*, would be deployed to the development
    machine and any server machine(s) that would execute the package. The assembly
    would then be added to the list of script references, and the result would be
    that the behaviors defined in the assembly would be accessible from within the
    instance of the Script task or Script component.


    There are several upsides to this approach. First of all, it’s a more modular
    way of handling code reuse within your package. Rather than relying on rudimentary
    copy/paste operations, this method permits a single point of administration and
    development for the shared custom functions of your ETL processes. Since all references
    to the custom behavior would point to a single assembly on each development machine
    or server, any updates to the code would be addressed at the machine level rather
    than having to touch every script in every package. In addition, the behaviors
    built into the external assemblies could be used by other processes or applications;
    because these standalone assemblies are built using the Common Language Runtime
    (CLR), their use could be leveraged beyond the borders of SSIS.


    There are a few limitations to this approach. First, you cannot use SSDT to create
    custom assemblies. Although both tools use the Visual Studio shell, they are only
    installed with the templates to create business intelligence projects and do not
    natively support other project types. To create an assembly containing custom
    code, you’d need to use a version of Visual Studio that was configured to generate
    class library projects (the Standard and Professional versions, or even the language-specific
    free Express versions)—or, for highly experienced developers, plain old Notepad
    and the .NET compiler. Another limitation is that any assemblies referenced in
    your script must be deployed to and registered in the Global Assembly Cache, or
    GAC, on the machine(s) that will execute the package. This deployment and registration
    process is not complex, but it does add to the total of moving parts in your ETL
    infrastructure.


    Custom Tasks/Components


    At the top of the SSIS reusability food chain you will find the custom task and
    custom component. As with a custom assembly, the ability to add your own tasks
    and components to SSIS allows you create highly customized behaviors within SSIS.
    In addition, custom tasks and components enable you to create a more customized
    user interface for these behaviors, allowing for relatively simple drag-and-drop
    use in your SSIS packages. In the interest of brevity, we won’t detail the use
    of custom tasks or custom components in this chapter, but it is worth mentioning
    that if there is script behavior that is often repeated in many of your packages,
    it’s worth considering converting the Script task or Script component into a custom
    tool that can easily integrate into SSDT.


    Source Control


    Ask any good developer for their short list of required project elements, and
    source control will almost always be near the top of the list. Because any SSIS
    project really is software development—albeit in a mostly graphical environment—
    the same consideration must be made by ETL developers as well. Being that the
    storage for an SSIS package is simply an XML file, it’s not difficult to add SSIS
    packages to most any existing source control system.


    To some, the Script task and Script component have the appearance of residing
    outside the SSIS package—after all, both of these are managed through what appears
    to be a separate Visual Studio project. This thinking sometimes brings up the
    question of how to integrate SSIS script logic into source control. The easy answer
    is that there is no requirement above and beyond source controlling the package
    itself. Because all of the code is stored inline within the package XML, there
    is no need to separately track in source control the code within instances of
    the Script task or Script component.


    Scripting Design Patterns


    As a born-and-raised Southerner, I was always taught that there’s more than one
    way to skin a cat. Although I’ve never attempted this particular exercise, I can
    confirm that for any given problem (in life, as well as in SSIS) there may be
    dozens or perhaps even hundreds of correct solutions.


    Because of the highly flexible nature of scripting solutions, it’s not possible
    to predict every possible permutation of logic that could find its way into SSIS
    code. However, as Integration Services has evolved, some commonly used design
    patterns have emerged. In this section, I’ll look at some of these patterns.


    Connection Managers and Scripting


    Connection managers are built into SQL Server Integration Services as a modular
    way to reuse connections to databases, data files, and other sources of information.
    Most everyone with even a little experience using SSIS is aware of connection
    managers and how they relate to conventional components such as OLE DB Source/Destination
    and Flat File Source/Destination, as well as tasks such as the FTP task and the
    Execute SQL task. You can instantiate a connection object once as a package-level
    entity (as shown in [Figure 3-7](#9781484200834_Ch03.xhtml#Fig7)) and use it throughout
    the remainder of the package.


    ![9781484200834_Fig03-07.jpg](images/9781484200834_Fig03-07.jpg)


    [Figure 3-7](#9781484200834_Ch03.xhtml#_Fig7). Connection manager objects


    Not as widely known is the fact that you can access most connection manager objects
    within instances of the Script task and the Script component as well. Connecting
    to a data source is a very common task in SSIS scripting, particularly within
    instances of the Script component used as a source or destination. However, in
    real-world usage, I find that a lot of ETL developers go through the exercise
    of programmatically creating a new connection within the script, even if the package
    already has a connection manager.'
  trans: '# SSIS 中的代码重用


    懒惰是件好事。（停顿以示强调。）澄清一下：所有伟大的技术人员都会想办法避免反复解决相同的问题。假设你花了一些时间处理脚本任务和脚本组件，并想出了一个关于"下一个伟大的
    ETL 事物"的绝妙主意。这个事物专注于添加原生 SSIS 工具中没有的行为，但同时又足够通用，可以在多个域的多个包中使用。既然你曾经为此付出过努力，你就会希望避免再次重新发明它。解决方案是：找到一种方法使这个事物可复用。


    为此，在 SSIS 中有几种代码复用的方法，从老式的复制粘贴到花哨的模块化。


    ## 复制粘贴


    这里不需要进一步定义：通过复制粘贴进行代码复用正如其听起来的那样。尽管将代码复制粘贴作为一种复用机制有点粗糙和非结构化，但它也是在 SSIS 中最简单和最常用的方法。其优点是部署快速简单，管理限制少。然而，这种简单性是有代价的。以这种方式部署，每个代码副本都存在于自己的孤岛中，必须独立地手动维护。


    ## 外部程序集


    正如我在本章前面提到的，`脚本任务`和`脚本组件`都允许你引用外部程序集（从单独项目生成的编译代码），以将补充行为导入到`脚本任务`/`脚本组件`的实例中。创建外部程序集的细节超出了本章的范围，但简而言之，你会使用单独的开发环境来编码和编译将在
    ETL 过程中使用的类、方法和事件。生成的二进制文件，称为**程序集**，将被部署到开发机器和任何将执行包的服务器机器上。然后，该程序集将被添加到脚本引用列表中，其结果是，程序集中定义的行为将可以从`脚本任务`或`脚本组件`的实例内部访问。


    这种方法有几个优点。首先，这是在包中处理代码复用的一种更模块化的方式。这种方法不是依赖于基本的复制粘贴操作，而是允许对 ETL 过程的共享自定义功能进行单点管理和开发。由于所有对自定义行为的引用在每台开发机器或服务器上都指向单个程序集，因此对代码的任何更新都将在机器级别解决，而不必触及每个包中的每个脚本。此外，构建到外部程序集中的行为可以被其他进程或应用程序使用；因为这些独立的程序集是使用公共语言运行时构建的，它们的用途可以扩展到
    SSIS 的边界之外。


    这种方法也有一些限制。首先，你不能使用 SSDT 创建自定义程序集。虽然这两种工具都使用 Visual Studio 外壳，但它们仅安装了创建商业智能项目的模板，并不原生支持其他项目类型。要创建包含自定义代码的程序集，你需要使用配置为生成类库项目版本的
    Visual Studio（标准版和专业版，甚至是特定语言的免费 Express 版）——或者，对于经验非常丰富的开发人员，使用纯文本编辑器和.NET 编译器。另一个限制是，在脚本中引用的任何程序集都必须部署到将执行包的机器上的全局程序集缓存中，并注册。这个部署和注册过程并不复杂，但它确实增加了
    ETL 基础设施中活动部件的总数。


    ## 自定义任务/组件


    在 SSIS 可复用性食物链的顶端，你会找到自定义任务和自定义组件。与自定义程序集一样，能够将你自己的任务和组件添加到 SSIS 中，允许你在 SSIS 内创建高度定制的行为。此外，自定义任务和组件使你能够为这些行为创建更定制的用户界面，从而在你的
    SSIS 包中进行相对简单的拖放使用。为了简洁起见，我们不会在本章中详细讨论自定义任务或自定义组件的使用，但值得一提的是，如果某个脚本行为在你的许多包中经常重复，那么值得考虑将`脚本任务`或`脚本组件`转换为可以轻松集成到
    SSDT 中的自定义工具。


    ## 源代码控制


    询问任何优秀开发人员他们所需的项目要素简短列表，源代码控制几乎总是在列表的顶部。因为任何 SSIS 项目本质上都是软件开发——尽管主要是在图形环境中——ETL
    开发人员也必须做出同样的考虑。由于 SSIS 包的存储只是一个 XML 文件，因此将 SSIS 包添加到大多数现有的源代码控制系统并不困难。


    对一些人来说，`脚本任务`和`脚本组件`看起来像是驻留在 SSIS 包之外——毕竟，这两者都是通过看似独立的 Visual Studio 项目来管理的。这种想法有时会引出如何将
    SSIS 脚本逻辑集成到源代码控制中的问题。简单的答案是，除了对包本身进行源代码控制之外，没有其他要求。因为所有代码都内联存储在包的 XML 中，所以不需要在源代码控制中单独跟踪`脚本任务`或`脚本组件`实例中的代码。


    ## 脚本设计模式


    作为一个土生土长的南方人，我总是被教导做事的方法不止一种。虽然我从未尝试过这个特定的练习，但我可以确认，对于任何给定的问题（在生活中，以及在 SSIS 中），可能有几十种甚至数百种正确的解决方案。


    由于脚本解决方案的高度灵活性，不可能预测可能进入 SSIS 代码的每一种逻辑排列组合。然而，随着集成服务的演变，一些常用的设计模式已经出现。在本节中，我将看看其中的一些模式。


    ### 连接管理器和脚本编写


    连接管理器内置于 SQL Server 集成服务中，作为一种模块化方式来复用到数据库、数据文件和其他信息源的连接。任何即使只有一点点 SSIS 使用经验的人都知道连接管理器以及它们与常规组件（如`OLE
    DB 源/目标`和`平面文件源/目标`）以及任务（如`FTP 任务`和`执行 SQL 任务`）的关系。你可以将连接对象实例化为包级实体（如图 3-7 所示），并在包的其余部分使用它。


    ![9781484200834_Fig03-07.jpg](img/9781484200834_Fig03-07.jpg)


    图 3-7. 连接管理器对象


    不太为人所知的是，你也可以在`脚本任务`和`脚本组件`的实例中访问大多数连接管理器对象。连接到数据源是 SSIS 脚本中非常常见的任务，特别是在用作源或目标的`脚本组件`实例中。然而，在实际使用中，我发现很多
    ETL 开发人员会经历在脚本内以编程方式创建新连接的操作，即使包中已经有一个连接管理器。'
- fmt: "If a connection manager object already exists in your SSIS package for a particular\
    \ connection, it’s preferable to use that existing connection manager object when\
    \ connecting to a data store from within a script. If the connection manager does\
    \ not yet exist, consider creating one: there are numerous benefits to abstracting\
    \ the connection from the script, including ease of change and the ability for\
    \ the connection to engage in transactions within SSIS.\n\n![Image](images/sq.jpg)\
    \ **Note** For an in-depth analysis on why to use connection manager objects as\
    \ opposed to connections created entirely in script, you can review an excellent\
    \ blog post on this topic by Todd McDermid here: `http://toddmcdermid.blogspot.com/2011/05/use-connections-properly-in-ssis-script.html`.\
    \ In this post, the author specifically discusses the use of connection managers\
    \ in the Script task, but most of the same principles would apply to the use of\
    \ connection managers within the Script component as well.\n\nAlthough it’s possible\
    \ to reuse connection managers for most any connection type within a script, to\
    \ keep things simple, I’ll limit my discussion to SQL Server database connections.\
    \ With some modification, many of these principles would apply to other connection\
    \ types as well.\n\n## Using Connection Managers in the Script Task\n\nAlthough\
    \ not entirely intuitive, the coding syntax to reference an existing connection\
    \ manager in the Script task is relatively easy to understand. I’ll look at examples\
    \ for the two most common ways to connect to SQL Server—through the OLE DB connection\
    \ and the ADO.NET connection.\n\nConnecting to an ADO.NET connection manager through\
    \ the Script task is a two-step process, as shown in [Listing 3-1](#9781484200834_Ch03.xhtml#list1).\
    \ First, create a reference to your existing `ConnectionManager` object (using\
    \ the name you gave it in the SSIS package), and acquire a connection from that\
    \ object in code.\n\n[***Listing 3-1***](#9781484200834_Ch03.xhtml#_list1). Use\
    \ an Existing ADO.NET Connection in the Script Task\n\n```\n// Create the ADO.NET\
    \ database connection\nConnectionManager connMgr = Dts.Connections[\"ADONET_PROD\"\
    ];\nSystem.Data.SqlClient.SqlConnection theConnection\n        = (System.Data.SqlClient.SqlConnection)connMgr.AcquireConnection(Dts.Transaction);\n\
    ```\n\nUsing an OLE DB connection manager in the Script task requires a little\
    \ more code but is a similar exercise to its ADO.NET counterpart. As shown in\
    \ [Listing 3-2](#9781484200834_Ch03.xhtml#list2), you have to add an intermediate\
    \ object to make the appropriate data type cast when using the OLE DB provider:\n\
    \n[***Listing 3-2***](#9781484200834_Ch03.xhtml#_list2). Using an Existing OLE\
    \ DB Connection in the Script Task\n\n```\n// Create the OLEDB database connection\n\
    // Note that we'll need to add references to Microsoft.CSharp and Microsoft.SqlServer.DTSRuntimeWrap\n\
    ConnectionManager cm = Dts.Connections[\"AdventureWorks2012\"];\nMicrosoft.SqlServer.Dts.Runtime.Wrapper.IDTSConnectionManagerDatabaseParameters100\
    \ cmParams\n   = cm.InnerObject as Microsoft.SqlServer.Dts.Runtime.Wrapper.IDTSConnectionManagerDatabaseParameters100;\n\
    System.Data.OleDb.OleDbConnection conn = (System.Data.OleDb.OleDbConnection)cmParams.GetConnectionForSchema();\n\
    ```\n\n![Image](images/sq.jpg) **Note** It’s worth mentioning that it is technically\
    \ possible to reference a connection by number rather than by name (e.g., using\
    \ `Dts.Connections[3]` rather than `Dts.Connections[\"Conn_Name\"]`). I strongly\
    \ recommend against this practice! It makes for rather ambiguous connection references,\
    \ and since the order of connection managers cannot be guaranteed, you might end\
    \ up with a runtime error at best—and at worst, wildly unexpected behavior in\
    \ your package.\n\n## Using Connection Managers in the Script Component\n\nAs\
    \ I mentioned in the previous section, many of the same concepts apply to the\
    \ reuse of connection managers, whether you’re working in the Script task or the\
    \ Script component. For the same reasons, it’s almost always a best practice to\
    \ reuse an existing connection manager object (or create a new one if necessary)\
    \ rather than to build a connection object from scratch within code.\n\nLogistically,\
    \ connection managers are a little easier to use in the Script component. Because\
    \ the purpose of this tool is to move data (which is not always the case with\
    \ the Script task), some additional functionality comes baked in to make the job\
    \ of reusing connection managers less cumbersome. In the Script component, you\
    \ can declare the use of one or more connections within the script’s graphical\
    \ editor (much like you declare the use of read-only or read-write variables,\
    \ to be discussed shortly). As shown in [Figure 3-8](#9781484200834_Ch03.xhtml#Fig8),\
    \ this interface allows you to easily reference an existing connection.\n\n![9781484200834_Fig03-08.jpg](images/9781484200834_Fig03-08.jpg)\n\
    \n[Figure 3-8](#9781484200834_Ch03.xhtml#_Fig8). Declaring connection managers\
    \ in the Script component\n\nOnce they are referenced here, the syntax to use\
    \ the connection within your code is much simpler as well. Rather than using the\
    \ connection name as an indexer, you can access any of these connections through\
    \ the `UserComponent.Connections` collection. Here’s an example:\n\n[**Listing\
    \ 3-3**]. Using a Previously Declared Connection Manager in Script Component\n\
    \n```\n// Connect to the ADO database connection\nSystem.Data.SqlClient.SqlConnection\
    \ conn = (System.Data.SqlClient.SqlConnection)Connections.OLEDBPROD.AcquireConnection(null);\n\
    ```\n\n## Variables\n\nIn many—if not most—instances of the Script task and Script\
    \ component, you’ll need to inspect or manipulate values stored in SSIS variables.\
    \ Because they are so prevalent in these implementations, it’s important to understand\
    \ how best to address SSIS variables within the scripting tools.\n\n![Image](images/sq.jpg)\
    \ **Note** It is important to draw a distinction between variables in SSIS and\
    \ variables declared within the Script task and Script component. Although there’s\
    \ some commonality in their usage, they are separate and distinct entities with\
    \ very different properties. SSIS variables are defined as part of the SSIS package\
    \ and may be used across many different tasks and components. Script variables,\
    \ on the other hand, are declared within individual instances of the Script task\
    \ or Script component and are only valid within the instance in which they are\
    \ defined.\n\n### Variable Visibility\n\nIn both the Script task and Script component,\
    \ you can explicitly expose one or more variables using the GUI editor for each.\
    \ In [Figure 3-9](#9781484200834_Ch03.xhtml#Fig9), you can see that we have the\
    \ option of including SSIS variables in the script and can specify whether those\
    \ variables will be surfaced as read-only or read-write.\n\n![9781484200834_Fig03-09.jpg](images/9781484200834_Fig03-09.jpg)\n\
    \n[Figure 3-9](#9781484200834_Ch03.xhtml#_Fig9). Including variables in script\n\
    \nIt is possible to read or modify SSIS variables with a script even if you don’t\
    \ explicitly include them. However, it’s usually preferable to declare any required\
    \ variables as shown, since the syntax within the script is much simpler when\
    \ references to the SSIS variables are declared ahead of time in this manner.\n\
    \n### Variable Syntax in Code\n\nDeclaring read-only or read-write variables is\
    \ a similar experience whether you’re using the Script task or the Script component.\
    \ However, the syntax to address these variables in code is different depending\
    \ on the tool you’re using. As shown in [Listing 3-4](#9781484200834_Ch03.xhtml#list4),\
    \ SSIS variables within a Script task instance are addressed by using a string\
    \ indexer to specify the name of the variable.\n\n[***Listing 3-4***](#9781484200834_Ch03.xhtml#_list4).\
    \ Script Task Variable Syntax"
  raw: 'If a connection manager object already exists in your SSIS package for for
    a particular connection, it’s preferable to use that existing connection manager
    object when connecting to a data store from within a script. If the connection
    manager does not yet exist, consider creating one: there are numerous benefits
    to abstracting the connection from the script, including ease of change and the
    ability for the connection to engage in transactions within SSIS.


    ![Image](images/sq.jpg) **Note**  For an in-depth analysis on why to use connection
    manager objects as opposed to connections created entirely in script, you can
    review an excellent blog post on this topic by Todd McDermid here: `http://toddmcdermid.blogspot.com/2011/05/use-connections-properly-in-ssis-script.html`.
    In this post, the author specifically discusses the use of connection managers
    in the Script task, but most of the same principles would apply to the use of
    connection managers within the Script component as well.


    Although it’s possible to reuse connection managers for most any connection type
    within a script, to keep things simple, I’ll limit my discussion to SQL Server
    database connections. With some modification, many of these principles would apply
    to other connection types as well.


    Using Connection Managers in the Script Task


    Although not entirely intuitive, the coding syntax to reference an existing connection
    manager in the Script task is relatively easy to understand. I’ll look at examples
    for the two most common ways to connect to SQL Server—through the OLE DB connection
    and the ADO.NET connection.


    Connecting to an ADO.NET connection manager through the Script task is a two-step
    process, as shown in [Listing 3-1](#9781484200834_Ch03.xhtml#list1). First, create
    a reference to your existing `ConnectionManager` object (using the name you gave
    it in the SSIS package), and acquire a connection from that object in code.


    [***Listing 3-1***](#9781484200834_Ch03.xhtml#_list1). Use an Existing ADO.NET
    Connection in the Script Task


    ```

    // Create the ADO.NET database connection

    ConnectionManager connMgr = Dts.Connections["ADONET_PROD"];

    System.Data.SqlClient.SqlConnection theConnection

            = (System.Data.SqlClient.SqlConnection)connMgr.AcquireConnection(Dts.Transaction);

    ```


    Using an OLE DB connection manager in the Script task requires a little more code
    but is a similar exercise to its ADO.NET counterpart. As shown in [Listing 3-2](#9781484200834_Ch03.xhtml#list2),
    you have to add an intermediate object to make the appropriate data type cast
    when using the OLE DB provider:


    [***Listing 3-2***](#9781484200834_Ch03.xhtml#_list2). Using an Existing OLE DB
    Connection in the Script Task


    ```

    // Create the OLEDB database connection

    // Note that we''ll need to add references to Microsoft.CSharp and Microsoft.SqlServer.DTSRuntimeWrap

    ConnectionManager cm = Dts.Connections["AdventureWorks2012"];

    Microsoft.SqlServer.Dts.Runtime.Wrapper.IDTSConnectionManagerDatabaseParameters100
    cmParams

       = cm.InnerObject as Microsoft.SqlServer.Dts.Runtime.Wrapper.IDTSConnectionManagerDatabaseParameters100;

    System.Data.OleDb.OleDbConnection conn = (System.Data.OleDb.OleDbConnection)cmParams.GetConnectionForSchema();

    ```


    ![Image](images/sq.jpg) **Note**  It’s worth mentioning that it is technically
    possible to reference a connection by number rather than by name (e.g., using
    `Dts.Connections[3]` rather than `Dts.Connections["Conn_Name"]`). I strongly recommend
    against this practice! It makes for rather ambiguous connection references, and
    since the order of connection managers cannot be guaranteed, you might end up
    with a runtime error at best—and at worst, wildly unexpected behavior in your
    package.


    Using Connection Managers in the Script Component


    As I mentioned in the previous section, many of the same concepts apply to the
    reuse of connection managers, whether you’re working in the Script task or the
    Script component. For the same reasons, it’s almost always a best practice to
    reuse an existing connection manager object (or create a new one if necessary)
    rather than to build a connection object from scratch within code.


    Logistically, connection managers are a little easier to use in the Script component.
    Because the purpose of this tool is to move data (which is not always the case
    with the Script task), some additional functionality comes baked in to make the
    job of reusing connection managers less cumbersome. In the Script component, you
    can declare the use of one or more connections within the script’s graphical editor
    (much like you declare the use of read-only or read-write variables, to be discussed
    shortly). As shown in [Figure 3-8](#9781484200834_Ch03.xhtml#Fig8), this interface
    allows you to easily reference an existing connection.


    ![9781484200834_Fig03-08.jpg](images/9781484200834_Fig03-08.jpg)


    [Figure 3-8](#9781484200834_Ch03.xhtml#_Fig8). Declaring connection managers in
    the Script component


    Once they are referenced here, the syntax to use the connection within your code
    is much simpler as well. Rather than using the connection name as an indexer,
    you can access any of these connections through the `UserComponent.Connections`
    collection. Here’s an example:


    ***Listing 3-3***. Using a Previously Declared Connection Manager in Script Component


    ```

    // Connect to the ADO database connection

    System.Data.SqlClient.SqlConnection conn = (System.Data.SqlClient.SqlConnection)Connections.OLEDBPROD.AcquireConnection(null);

    ```


    Variables


    In many—if not most—instances of the Script task and Script component, you’ll
    need to inspect or manipulate values stored in SSIS variables. Because they are
    so prevalent in these implementations, it’s important to understand how best to
    address SSIS variables within the scripting tools.


    ![Image](images/sq.jpg) **Note**  It is important to draw a distinction between
    variables in SSIS and variables declared within the Script task and Script component.
    Although there’s some commonality in their usage, they are separate and distinct
    entities with very different properties. SSIS variables are defined as part of
    the SSIS package and may be used across many different tasks and components. Script
    variables, on the other hand, are declared within individual instances of the
    Script task or Script component and are only valid within the instance in which
    they are defined.


    Variable Visibility


    In both the Script task and Script component, you can explicitly expose one or
    more variables using the GUI editor for each. In [Figure 3-9](#9781484200834_Ch03.xhtml#Fig9),
    you can see that we have the option of including SSIS variables in the script
    and can specify whether those variables will be surfaced as read-only or read-write.


    ![9781484200834_Fig03-09.jpg](images/9781484200834_Fig03-09.jpg)


    [Figure 3-9](#9781484200834_Ch03.xhtml#_Fig9). Including variables in script


    It is possible to read or modify SSIS variables with a script even if you don’t
    explicitly include them. However, it’s usually preferable to declare any required
    variables as shown, since the syntax within the script is much simpler when references
    to the SSIS variables are declared ahead of time in this manner.


    Variable Syntax in Code


    Declaring read-only or read-write variables is a similar experience whether you’re
    using the Script task or the Script component. However, the syntax to address
    these variables in code is different depending on the tool you’re using. As shown
    in [Listing 3-4](#9781484200834_Ch03.xhtml#list4), SSIS variables within a Script
    task instance are addressed by using a string indexer to specify the name of the
    variable.


    [***Listing 3-4***](#9781484200834_Ch03.xhtml#_list4). Script Task Variable Syntax'
  trans: "\n如果您的 SSIS 包中已经存在针对特定连接的连接管理器对象，那么在脚本中连接到数据存储时，最好使用该现有的连接管理器对象。如果连接管理器尚不存在，请考虑创建一个：将连接从脚本中抽象出来有许多好处，包括便于更改以及使连接能够在\
    \ SSIS 中参与事务。\n\n![Image](img/sq.jpg) **注意** 关于为何使用连接管理器对象而非完全在脚本中创建连接的深入分析，您可以查阅\
    \ Todd McDermid 关于此主题的精彩博文：`http://toddmcdermid.blogspot.com/2011/05/use-connections-properly-in-ssis-script.html`。在这篇博文中，作者专门讨论了在脚本任务中使用连接管理器，但大部分相同的原则也适用于在脚本组件中使用连接管理器。\n\
    \n虽然几乎可以为脚本中的任何连接类型重用连接管理器，但为了简化讨论，我将限制在 SQL Server 数据库连接的范围内。稍加修改，许多这些原则也适用于其他连接类型。\n\
    \n## 在脚本任务中使用连接管理器\n\n虽然不是完全直观，但在脚本任务中引用现有连接管理器的编码语法相对容易理解。我将通过最常见的两种连接 SQL Server\
    \ 的方式——通过 OLE DB 连接和 ADO.NET 连接——来查看示例。\n\n通过脚本任务连接到 ADO.NET 连接管理器是一个两步过程，如清单\
    \ 3-1 所示。首先，为现有的 `ConnectionManager` 对象创建引用（使用您在 SSIS 包中赋予它的名称），然后在代码中从该对象获取连接。\n\
    \n***清单 3-1***。在脚本任务中使用现有的 ADO.NET 连接\n\n```\n// 创建 ADO.NET 数据库连接\nConnectionManager\
    \ connMgr = Dts.Connections[\"ADONET_PROD\"];\nSystem.Data.SqlClient.SqlConnection\
    \ theConnection\n        = (System.Data.SqlClient.SqlConnection)connMgr.AcquireConnection(Dts.Transaction);\n\
    ```\n\n在脚本任务中使用 OLE DB 连接管理器需要稍多一些代码，但与其 ADO.NET 对应部分的练习类似。如清单 3-2 所示，使用 OLE DB\
    \ 提供程序时，必须添加一个中间对象来进行适当的数据类型转换：\n\n***清单 3-2***。在脚本任务中使用现有的 OLE DB 连接\n\n```\n\
    // 创建 OLEDB 数据库连接\n// 注意我们需要添加对 Microsoft.CSharp 和 Microsoft.SqlServer.DTSRuntimeWrap\
    \ 的引用\nConnectionManager cm = Dts.Connections[\"AdventureWorks2012\"];\nMicrosoft.SqlServer.Dts.Runtime.Wrapper.IDTSConnectionManagerDatabaseParameters100\
    \ cmParams\n   = cm.InnerObject as Microsoft.SqlServer.Dts.Runtime.Wrapper.IDTSConnectionManagerDatabaseParameters100;\n\
    System.Data.OleDb.OleDbConnection conn = (System.Data.OleDb.OleDbConnection)cmParams.GetConnectionForSchema();\n\
    ```\n\n![Image](img/sq.jpg) **注意** 值得一提的是，从技术上讲，可以通过编号而非名称来引用连接（例如，使用 `Dts.Connections[3]`\
    \ 而不是 `Dts.Connections[\"Conn_Name\"]`）。我强烈建议不要这样做！这会导致连接引用相当模糊，并且由于连接管理器的顺序无法保证，您可能会遇到运行时错误（最坏的情况），或者在包中出现完全意外的行为。\n\
    \n## 在脚本组件中使用连接管理器\n\n正如我在前一节提到的，无论您是在脚本任务还是脚本组件中工作，重用连接管理器的许多概念是相同的。出于同样的原因，重用现有的连接管理器对象（或在必要时创建一个新的）几乎总是一种最佳实践，而不是在代码中从头构建连接对象。\n\
    \n从操作上讲，在脚本组件中使用连接管理器稍微容易一些。因为此工具的目的是移动数据（对于脚本任务来说并非总是如此），所以内置了一些附加功能，使重用连接管理器的任务不那么繁琐。在脚本组件中，您可以在脚本的图形编辑器中声明使用一个或多个连接（就像声明使用只读或读写变量一样，稍后讨论）。如图\
    \ 3-8 所示，此界面允许您轻松引用现有连接。\n\n![9781484200834_Fig03-08.jpg](img/9781484200834_Fig03-08.jpg)\n\
    \n图 3-8。在脚本组件中声明连接管理器\n\n一旦在这里引用了它们，在代码中使用这些连接的语法也就简单得多。您可以通过 `UserComponent.Connections`\
    \ 集合访问这些连接，而不是使用连接名称作为索引器。这是一个例子：\n\n[**清单 3-3**]。在脚本组件中使用先前声明的连接管理器\n\n```\n\
    // 连接到 ADO 数据库连接\nSystem.Data.SqlClient.SqlConnection conn = (System.Data.SqlClient.SqlConnection)Connections.OLEDBPROD.AcquireConnection(null);\n\
    ```\n\n## 变量\n\n在许多（如果不是大多数）脚本任务和脚本组件实例中，您需要检查或操作存储在 SSIS 变量中的值。因为它们在这些实现中如此普遍，所以了解如何在脚本工具中最好地处理\
    \ SSIS 变量非常重要。\n\n![Image](img/sq.jpg) **注意** 区分 SSIS 中的变量与在脚本任务和脚本组件内声明的变量非常重要。尽管它们的用法有一些共性，但它们是独立且不同的实体，具有非常不同的属性。SSIS\
    \ 变量定义为 SSIS 包的一部分，可以在许多不同的任务和组件中使用。而脚本变量则在脚本任务或脚本组件的各个实例中声明，并且仅在定义它们的实例内有效。\n\
    \n### 变量可见性\n\n在脚本任务和脚本组件中，您都可以使用各自的 GUI 编辑器显式公开一个或多个变量。在图 3-9 中，您可以看到我们可以选择将\
    \ SSIS 变量包含在脚本中，并可以指定这些变量是作为只读还是读写变量公开。\n\n![9781484200834_Fig03-09.jpg](img/9781484200834_Fig03-09.jpg)\n\
    \n图 3-9。在脚本中包含变量\n\n即使没有显式包含它们，也可以通过脚本读取或修改 SSIS 变量。然而，通常更可取的方法是如所示那样声明任何所需的变量，因为当以这种方式提前在脚本中声明对\
    \ SSIS 变量的引用时，脚本内的语法要简单得多。\n\n### 代码中的变量语法\n\n无论您使用脚本任务还是脚本组件，声明只读或读写变量的体验是相似的。然而，根据您使用的工具，代码中引用这些变量的语法有所不同。如清单\
    \ 3-4 所示，脚本任务实例中的 SSIS 变量通过使用字符串索引器指定变量名称来引用。\n\n***清单 3-4***。脚本任务变量语法\n"
- fmt: "# CHAPTER 4\n\n## SQL Server Source Patterns\n\n在本书的第一部分，我们探讨了聚焦于 SQL Server\
    \ Integration Services 控制流区域的模式，包括元数据、工作流执行和脚本编写。第二部分将聚焦于 SQL Server Integration\
    \ Services 的数据流区域。本章及后续章节将讨论 Integration Services 包中管道区域的源、转换和日志记录模式。\n\nIntegration\
    \ Services 支持多种源，包括 SQL Server、Oracle 和 SAP。此外，开发者和第三方供应商能够为未随产品附带的提供程序创建自定义源。这种技术无关的方法为加载各种数据创建了一个非常灵活的系统。即使有所有这些潜在的源，将数据加载到\
    \ SQL Server 数据库或从中导出仍然非常常见，因为拥有 Integration Services 的公司通常使用所有微软产品。\n\n本章讨论与使用\
    \ SQL Server 作为源相关的不同模式。由于在使用 Integration Services 的环境中 SQL Server 数据库非常常见，我们定义了一套从\
    \ SQL Server 提取数据的模式。具体来说，我们将探讨连接到 SQL Server 数据库的最佳方式、如何选择要使用的数据，以及如何更轻松地使用数据流中的其余对象。最后，我们将看一下\
    \ SQL Server Denali 中的一个新组件，它有助于在连接到任何源时快速启动开发。\n\n### Setting Up a Source\n\n\
    当连接到外部数据时，Integration Services 使用几个对象来帮助建立连接、检索正确的数据并启动任何必要的数据操作。每次 Integration\
    \ Services 开发者创建一个包时，开发者都需要选择正确的对象并确保它们都已创建。需要设置的对象如下：\n\n*   **Connection Manager**：告诉\
    \ Integration Services 从何处获取数据的对象。可在控制流、数据流和事件处理程序中使用。\n*   **Provider**：连接管理器用来与数据源通信的对象。\n\
    *   **Source Component**：设置属性以告诉 Integration Services 要获取什么数据的对象。匹配的 `Connection\
    \ Manager` 对象在此对象中设置。\n*   **Source Component Query**：外部数据源需要提供给 Integration Services\
    \ 数据的信息。查询存储在 `Source Component` 对象中。\n\n让我们看看与这些项目中的每一项相关的重要因素。我们将在下一节开始探讨连接管理器。\n\
    \nWhen using an instance of the Script component, the syntax is noticeably different.\
    \ Rather than using an indexer to read from or write to the referenced SSIS variables,\
    \ you can use the `Variables.<Variable Name>` syntax as shown in [Listing 3-5](#9781484200834_Ch03.xhtml#list5):\n\
    \n**[Listing 3-5](#9781484200834_Ch03.xhtml#_list5). Script Component Variable\
    \ Syntax**\n\n```\npublic override void Input0_ProcessInputRow(Input0Buffer Row)\n\
    {\n        // Push the SSIS variable ClientName to the value in the current row\n\
    \        Row.ClientName = Variables.ClientName;\n}\n```\n\nIt is possible to access\
    \ variables within instances of the Script task or the Script component even if\
    \ you do not explicitly declare their use in the graphical settings editor. Within\
    \ the SSIS scripting toolset, you will find a couple of functions that will allow\
    \ you to programmatically lock and unlock variables for either read-only or read-write\
    \ access. As shown in[Listing 3-6](#9781484200834_Ch03.xhtml#list6), you can use\
    \ the `VariableDispenser.LockOneForRead()` function to capture the value of a\
    \ variable that was not previously declared.\n\n**[Listing 3-6](#9781484200834_Ch03.xhtml#_list6).\
    \ Manually Lock a Variable**\n\n```\n// Programmatically lock the variable we\
    \ need\nVariable vars = null;\nDts.VariableDispenser.LockOneForRead(\"RunID\"\
    , ref vars);\n\n// Assign to script variable\nrunID = int.Parse(vars[\"RunID\"\
    ].Value.ToString());\n\n// Unlock the variable object\nvars.Unlock();\n```\n\n\
    Using a method similar to the one shown in [Listing 3-6](#9781484200834_Ch03.xhtml#list6),\
    \ you can manipulate variable values by using the function `VariableDispenser.LockOneForWrite()`,\
    \ which would allow you to write to as well as read from the variable value.\n\
    \n### Variable Data Types\n\nAs you may have derived from [Listing 3-4](#9781484200834_Ch03.xhtml#list4)\
    \ and [Listing 3-5](#9781484200834_Ch03.xhtml#list5), the interpreted data type\
    \ for variable values will differ between the Script task and the Script component.\
    \ With the latter, any variable that you declare in the graphical settings editor\
    \ will surface as the .NET data type equivalent of the SSIS variable type, and\
    \ there is no need to perform a type cast. When using the Script task (and the\
    \ Script component, if you opt to use either the `LockOneForRead()` or `LockOneForWrite()`\
    \ method), variables are presented as the generic `Object` type, and most of the\
    \ time you’ll have to cast to an appropriate type any variable used in script\
    \ code. As shown in [Figure 3-10](#9781484200834_Ch03.xhtml#Fig10), you’ll get\
    \ a compiler error if you forget to cast a variable value to the appropriate type.\n\
    \n![9781484200834_Fig03-10.jpg](images/9781484200834_Fig03-10.jpg)\n\n[Figure\
    \ 3-10](#9781484200834_Ch03.xhtml#_Fig10). Script task variables must be cast\n\
    \n### Naming Patterns\n\nIf you have worked as a software developer in the past,\
    \ the following section will be nothing more than a review. If you haven’t, I’ll\
    \ share an important tidbit of information: naming conventions are important.\n\
    \nI’ve known many a developer in my time, and I’ve never found one who wasn’t\
    \ loyal to some type of naming convention. Why? It’s familiar. It’s predicListing.\
    \ When patterns emerge in the way you develop software, it becomes easier to maintain—by\
    \ others as well as yourself. Technically, there’s no difference between code\
    \ written in camel case, Hungarian notation, mnemonic notation, or Pascal style.\
    \ This is purely a matter of clarity, readability, and maintainability. By finding\
    \ and sticking with a style (even if it’s a hybrid of other styles), you’ll have\
    \ more navigable code and will likely find that your fellow developers appreciate\
    \ the approach.\n\nHere are a few suggestions regarding naming conventions:\n\n\
    *   **Be consistent:** This is the number-one rule and should be followed above\
    \ all others. Whatever style you develop, stick with it. You can change or modify\
    \ your naming convention style later, but at least be consistent within each project.\n\
    *   **Be clear:** I can’t tell you how many times I’ve had to debug code (and\
    \ yes, sometimes it was my own) littered with single-character object names, ambiguous\
    \ function names, and other pull-your-hair-out kinds of practices. Now, don’t\
    \ go overboard here. Most object names don’t need to read like `database_write_failed_and_could_not_display_interactive_error`,\
    \ but there’s probably some happy medium between that and variable names such\
    \ as `f`.\n*   **Be a follower:** If you don’t have your own style, do as those\
    \ around you do. Some organizations, especially larger ones, may dictate the naming\
    \ convention style you’ll use.\n\n### Conclusion\n\nThe scripting tools in SQL\
    \ Server Integration Services are both capable and complex. When scripting for\
    \ ETL first surfaced with DTS many years ago, it was a quick-and-dirty way to\
    \ solve some data movement and manipulation problems. With SSIS, the latest generation\
    \ of scripting tools is robust and enterprise-ready. With a few recommended practices,\
    \ scripting can be a great addition to any ETL developer’s toolkit.\n\n```\npublic\
    \ void main()\n{\n        // Get the current RunID\n        int runID = int.Parse(Dts.Variables[\"\
    RunID\"].Value.ToString());\n\n        // Set the ClientID\n        Dts.Variables[\"\
    ClientID\"].Value = ETL.GetClientID(runID);\n\n        Dts.TaskResult = (int)ScriptResults.Success;\n\
    }\n```"
