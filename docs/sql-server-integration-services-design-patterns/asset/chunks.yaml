  trans: "# 在 SSIS Catalog 中执行 SSIS 包\n\n以下 T-SQL 代码片段演示了如何在 SSIS Catalog 中初始化并执行一个\
    \ SSIS 包。\n\n```sql\n/* Call the catalog.create_execution stored procedure\n \
    \     to initialize execution location and parameters */\n  Exec catalog.create_execution\n\
    \   @package_name = @PackageName\n  ,@execution_id = @ExecutionID Output\n  ,@folder_name\
    \ = @FolderName\n  ,@project_name = @ProjectName\n  ,@use32bitruntime = @Use32BitRunTime\n\
    \  ,@reference_id = @ReferenceID\n\n/* Populate the @ExecutionID parameter for\
    \ OUTPUT */\n  Select @ExecutionID As Execution_Id\n\n/* Create a parameter (variable)\
    \ named @Sql */\n  Declare @logging_level smallint\n   /* Decode the Logging Level\
    \ */\n  Select @logging_level = Case\n                           When Upper(@LoggingLevel)\
    \ = 'BASIC'\n                           Then 1\n                           When\
    \ Upper(@LoggingLevel) = 'PERFORMANCE'\n                           Then 2\n  \
    \                          When Upper(@LoggingLevel) = 'VERBOSE'\n           \
    \                Then 3\n                           Else 0 /* 'None' */\n    \
    \                      End\n   /* Call the catalog.set_execution_parameter_value\
    \ stored\n      procedure to update the LOGGING_LEVEL parameter */\n  Exec catalog.set_execution_parameter_value\n\
    \    @ExecutionID\n   ,@object_type = @ObjectType\n   ,@parameter_name = N'LOGGING_LEVEL'\n\
    \   ,@parameter_value = @logging_level\n\n/* Call the catalog.start_execution\
    \ (self-explanatory) */\n  Exec catalog.start_execution\n    @ExecutionID\n\n\
    end\n\nGO\n```\n\n如果执行此脚本在您的 SSISDB 数据库实例中创建自定义架构和存储过程，可以使用 **清单 2-3** 中的语句进行测试。\n\
    \n**清单 2-3**. 测试 `SSISDB.custom.execute_catalog_package` 存储过程\n\n```sql\nDeclare\
    \ @ExecId bigint\nExec SSISDB.custom.execute_catalog_package 'Chapter2','Chapter2','Chapter2.dtsx',\n\
    @ExecId Output\n```\n\n## 添加数据捕获\n\n`SSISDB.custom.execute_catalog_package` 存储过程可以通过稍作修改来创建一个*数据捕获*功能——这是\
    \ SSIS 2014 中针对从 SSISDB 目录执行的包引入的一项新特性。向存储过程添加一些参数和 T-SQL，允许其执行 SSIS 包并导出一个逗号分隔值\
    \ (CSV) 文件，该文件包含流经数据流任务中某个点的部分或全部行。数据捕获为监控数据在 SSIS 数据流中的移动状态提供了一个急需的窗口，有助于在生产环境中进行根本原因分析和故障排除，而无需更改包代码。数据捕获是\
    \ Integration Services 2014 最重要的增强功能之一。Listing 2-4 包含了构建 `SSISDB.custom.execute_catalog_package_with_data_tap`\
    \ 的脚本：\n\n**清单 2-4**. 用于构建在 SSIS 目录中执行 SSIS 包的包装器存储过程的脚本\n\n```sql\n/* Select\
    \ the SSISDB database */\nUse SSISDB\nGo\n\n/* Create a parameter (variable) named\
    \ @Sql */\nDeclare @Sql varchar(2000)\n\n/* Create the Custom schema if it does\
    \ not already exist */\nprint 'Custom Schema'\nIf Not Exists(Select name\n   \
    \           From sys.schemas\nWhere name = 'custom')\n begin\n   /* Create Schema\
    \ statements must occur first in a batch */\n  print ' - Creating custom schema'\n\
    \  Set @Sql = 'Create Schema custom'\n  Exec(@Sql)\n  print ' - Custom schema\
    \ created'\n end\nElse\n print ' - Custom Schema already exists.'\nprint ''\n\n\
    /* Drop the Custom.execute_catalog_package_with_data_tap\n Stored Procedure if\
    \ it already exists */\nprint 'Custom.execute_catalog_package_with_data_tap Stored\
    \ Procedure'\n  If Exists(Select s.name + '.' +  p.name\n            From sys.procedures\
    \ p\n            Join sys.schemas s\n                On s.schema_id = p.schema_id\n\
    \        Where s.name = 'custom'\n           And p.name = 'execute_catalog_package_with_data_tap')\n\
    \   begin\n    print ' - Dropping custom.execute_catalog_package_with_data_tap'\n\
    \    Drop Procedure custom.execute_catalog_package_with_data_tap\n    print '\
    \ - Custom.execute_catalog_package_with_data_tap dropped'\n   end\n\n/* Create\
    \ the Custom.execute_catalog_package_with_data_tap Stored Procedure */\n  print\
    \ ' - Creating custom.execute_catalog_package_with_data_tap'\ngo\n\n/*\n\nStored\
    \ Procedure: custom.execute_catalog_package_with_data_tap\n  Author: Andy Leonard\n\
    \  Date: 4 Apr 2012\n  Description: Creates a wrapper around the SSISDB Catalog\
    \ procedures\n               used to start executing an SSIS Package and create\
    \ a\n               data tap. Packages in the\n               SSIS Catalog are\
    \ referenced by a multi-part identifier\n               - or path - that consists\
    \ of the following hierarchy:\n  Catalog Name: Implied by the database name in\
    \ Integration Server 2014\n  |-Folder Name: A folder created before or at Deployment\
    \ to contain the SSIS project\n    |-Project Name: The name of the SSIS Project\
    \ deployed\n      |-Package Name: The name(s) of the SSIS Package(s) deployed\n\
    \  Parameters:\n   @FolderName [nvarchar(128)] {No default} - contains the name\
    \ of the\n     Folder that holds the SSIS Project\n   @ProjectName [nvarchar(128)]\
    \ {No default} - contains the name of the\n    SSIS Project that holds the SSIS\
    \ Package\n   @PackageName [nvarchar(260)] {No default} - contains the name of\
    \ the\n    SSIS Package to be executed\n   @ExecutionID [bigint] {Output} - Output\
    \ parameter (variable) passed back\n    to the caller\n   @LoggingLevel [varchar(16)]\
    \ {Default} - contains the (case-insensitive)\n    name of the logging level to\
    \ apply to this execution instance\n   @Use32BitRunTime [bit] {Default} - 1 ==\
    \ Use 64-bit run-time\n                                      0 == Use 32-bit run-time\n\
    \   @ReferenceID [bigint] {Default} - contains a reference to an Execution Environment\n\
    \   @ObjectType [smallint] - contains an identifier that appears to be related\n\
    \    to the SSIS PackageType property\n\nGuessing: @ObjectType == PackageType.ordinal\
    \ (1-based-array) * 10\n    Must be 20, 30, or 50 for catalog.set_execution_parameter_value\n\
    \     stored procedure\n  @DataFlowTaskName [nvarchar(255)] - contains the name\
    \ of the Data Flow Task in which to\n   to apply the data tap.\n  @IdentificationString\
    \ [nvarchar(255)] - contains the Data Flow Path Identification string\n   in which\
    \ to apply the data tap.\n  @DataTapFileName [nvarchar(4000)] - contains the name\
    \ of the file to create to contain\n   the rows captured from the data tap.\n\
    \   Saved in the <drive>:\\Program Files\\Microsoft SQL Server\\120\\DTS\\DataDumps\
    \ folder.\n  @DataTapMaxRows [int] - contains the maximum number of rows to send\
    \ to the data tap file.\n\nTest:\n  1. Create and deploy an SSIS Package to the\
    \ SSIS Catalog.\n  2. Exec custom.execute_catalog_package_with_data_tap and pass\
    \ it the\n     following parameters: @FolderName, @ProjectName, @PackageName,\n\
    \     @DataFlowTaskName, @IdentificationString, @DataTapFileName,\n     @ExecutionID\
    \ Output\n  @LoggingLevel, @Use32BitRunTime, @ReferenceID, @ObjectType,\n   and\
    \ @DataTapMaxRows are optional and defaulted parameters.\n\nExample:\n  Declare\
    \ @ExecId bigint\n  Exec custom.execute_catalog_package_with_data_tap\n   'SSISConfig2014','SSISConfig2014','Child1.dtsx',\n\
    \   'Data Flow Task', 'OLESRC Temperature.OLE DB Source Output',\n   'Child1_DataFlowTask_OLESRCTemperature_OLEDBSourceOutput.csv',@ExecId\
    \ Output\n\n3. When execution completes, an Execution_Id value should be returned.\n\
    \     View the SSIS Catalog Reports to determine the status of the\n     execution\
    \ instance and the test.\n\n*/\nCreate Procedure [custom].[execute_catalog_package_with_data_tap]\n\
    \  @FolderName nvarchar(128)\n ,@ProjectName nvarchar(128)\n ,@PackageName nvarchar(260)\n\
    \ ,@DataFlowTaskName nvarchar(255)\n ,@IdentificationString nvarchar(255)\n ,@DataTapFileName\
    \ nvarchar(4000)\n ,@ExecutionID bigint Output\n ,@LoggingLevel varchar(16) =\
    \ 'Basic'\n ,@Use32BitRunTime bit = 0\n ,@ReferenceID bigint = NULL\n ,@ObjectType\
    \ smallint = 50\n ,@DataTapMaxRows int = NULL\nAs\n\nbegin\n\nSet NoCount ON\n\
    ```"
- fmt: "/* Call the `catalog.create_execution` stored procedure\n      to initialize\
    \ execution location and parameters */\n  Exec `catalog.create_execution`\n  \
    \ `@package_name` = `@PackageName`\n  ,`@execution_id` = `@ExecutionID` Output\n\
    \  ,`@folder_name` = `@FolderName`\n  ,`@project_name` = `@ProjectName`\n  ,`@use32bitruntime`\
    \ = `@Use32BitRunTime`\n  ,`@reference_id` = `@ReferenceID`\n\n/* Populate the\
    \ `@ExecutionID` parameter for OUTPUT */\n  Select `@ExecutionID` As Execution_Id\n\
    \n/* Configure Data Tap parameters */\n  If (Left(`@DataFlowTaskName`, 9) <> '\\\
    Package\\')\n   Set `@DataFlowTaskName` = '\\Package\\' + `@DataFlowTaskName`\n\
    \nIf Left(`@IdentificationString`,6) <> 'Paths['\n   Set `@IdentificationString`\
    \ = 'Paths[' + `@IdentificationString` + ']'\n\n/* Create the Data Tap */\n  Exec\
    \ `[SSISDB].[catalog].add_data_tap` `@ExecutionID`, `@DataFlowTaskName`,\n   `@IdentificationString`,\
    \ `@DataTapFileName`, `@DataTapMaxRows`\n\n/* Create a parameter (variable) named\
    \ `@Sql` */\n  Declare `@logging_level` smallint\n   /* Decode the Logging Level\
    \ */\n  Select `@logging_level` = Case\n                           When Upper(`@LoggingLevel`)\
    \ = 'BASIC'\n                                           Then 1\n             \
    \                              When Upper(`@LoggingLevel`) = 'PERFORMANCE'\n \
    \                                          Then 2\n                          \
    \                  When Upper(`@LoggingLevel`) = 'VERBOSE'\n                 \
    \                          Then 3\n                                          \
    \ Else 0 /* 'None' */\n                                          End\n   /* Call\
    \ the `catalog.set_execution_parameter_value` stored\n      procedure to update\
    \ the `LOGGING_LEVEL` parameter */\n  Exec `catalog.set_execution_parameter_value`\n\
    \    `@ExecutionID`\n   ,`@object_type` = `@ObjectType`\n   ,`@parameter_name`\
    \ = N'LOGGING_LEVEL'\n   ,`@parameter_value` = `@logging_level`\n\n/* Call the\
    \ `catalog.start_execution` (self-explanatory) */\n  Exec `catalog.start_execution`\n\
    \    `@ExecutionID`\n\nend\n```\n\n## Testing the Data Tap Procedure\n\nBefore\
    \ we begin this exercise, please visit `http://andyweather.com/data/WeatherData_Dec08.zip`\
    \ to obtain some real-world temperature and humidity weather data collected at\
    \ my weather station in Farmville, Virginia. The compressed file (`WeatherData_Dec08.zip`)\
    \ contains a single CSV file named `sensor1-all.csv`. The file is two folders\
    \ down, located at `Dec08\\TH\\sensor1-all.csv`. Unzip the compressed file and\
    \ store it in your file system. I prefer to store data related to test projects\
    \ inside a folder named `Data` in the SSIS solution directory. It doesn’t matter\
    \ where you store the file as long as you remember where you put it.\n\nAdd a\
    \ new SSIS package to the Chapter2 project and rename it `DataTapTest.dtsx`. Drag\
    \ a Data Flow task onto the control flow and rename it `DFT Load Temperature Data`.\
    \ Open the Data Flow Editor (tab) and drag a Flat File source adapter onto the\
    \ design surface. Rename the Flat File source adapter `FFSrc Temperature`. Open\
    \ the Flat File Source Adapter Editor and click the New button to the right of\
    \ the Flat File Connection Manager drop-down. Clicking the New button does a couple\
    \ things for you:\n\n1. It creates a new Flat File connection manager.\n2. It\
    \ opens the new Flat File Connection Manager Editor.\n\nSet the name of the Flat\
    \ File connection manager to `FFCM Temperature`. Click the Browse button and navigate\
    \ to the folder containing the `sensor1-all.csv` file (remember to change the\
    \ extension filter in the Open dialog from `*.txt` to `*.csv`). Select the `sensor1-all.csv`\
    \ file and then click the OK button on the Open dialog since we are accepting\
    \ the Flat File connection manager defaults for the purposes of this demo. Click\
    \ the OK button to close the Flat File Source Adapter Editor.\n\nBefore we proceed,\
    \ open SQL Server Management Studio (SSMS), connect to an instance of SQL Server\
    \ 2014, and create a database named `TestDB`.\n\nReturn to SQL Server Data Tools\
    \ - Business Intelligence (SSDT-BI) and drag an OLE DB destination adapter onto\
    \ the Data Flow task surface. Rename the OLE DB destination adapter `OLEDBDest\
    \ TemperatureStage` and connect a data flow path (blue arrow) between the `FFSrc\
    \ Temperature` Flat File source adapter and the `OLEDBDest TemperatureStage` OLE\
    \ DB destination adapter. Open the `OLEDBDest TemperatureStage` OLE DB Destination\
    \ Adapter Editor and click the New button to the right of the OLE DB Connection\
    \ Manager drop-down to create a new OLE DB connection manager and open its editor.\
    \ When the Configure OLE DB Connection Manager window displays, click the New\
    \ button to open the Connection Manager Editor window. Enter the server name and\
    \ user login credentials, then enter or select the `TestDB` database in the Select\
    \ or Enter a Database Name drop-down. Close the editor and the Configure OLE DB\
    \ Connection Manager window to return to the `OLEDBDest TemperatureStage` OLE\
    \ DB destination adapter.\n\nClick the New button to the right of the Name of\
    \ the Table or the View drop-down in the `OLEDBDest TemperatureStage` OLE DB destination\
    \ adapter. Modify the contents of the Create Table window to match the data definition\
    \ language (DDL) statement in [Listing 2-5](#9781484200834_Ch02.xhtml#list5).\n\
    \n### [Listing 2-5](#9781484200834_Ch02.xhtml#_list5). Data Definition Language\
    \ (DDL) Create Table Statement for Destination\n\n```sql\nCREATE TABLE [TemperatureStage]\
    \ (\n    [Date] varchar(50),\n    [Time] varchar(50),\n    [MinT] varchar(50),\n\
    \    [MaxT] varchar(50),\n    [AverageT] varchar(50),\n    [MinH] varchar(50),\n\
    \    [MaxH] varchar(50),\n    [AverageH] varchar(50),\n    [ComfortZone] varchar(50),\n\
    \    [MinDP] varchar(50),\n    [MaxDP] varchar(50),\n    [AverageDP] varchar(50),\n\
    \    [MinHI] varchar(50),\n    [MaxHI] varchar(50),\n    [AverageHI] varchar(50)\n\
    )\n```\n\nThis statement modifies the supplied statement by removing the `OLEDBDest`\
    \ prefix from the table name and by removing the spaces from the column names.\
    \ Click the OK button to create the table and close the Create Table window. Click\
    \ the Mappings page and map the available input columns to their matching available\
    \ destination columns. Close the `OLEDBDest TemperatureStage` OLE DB Destination\
    \ Adapter Editor.\n\nDouble-click the data flow path to open its editor. From\
    \ the General page, copy the `IdentificationString` property value. The `IdentificationString`\
    \ property should be `Paths[FFSrc Temperature.Flat File Source Output]`. We will\
    \ need this value and the value of the `PackagePath` property of the Data Flow\
    \ task (`Package\\DFT Load Temperature Data`) to execute this package with a data\
    \ tap.\n\nFirst, save the SSIS package and deploy it to the catalog. Next, execute\
    \ the statement in [Listing 2-6](#9781484200834_Ch02.xhtml#list6) to execute the\
    \ SSIS package with a data tap.\n\n### [Listing 2-6](#9781484200834_Ch02.xhtml#_list6).\
    \ Executing an SSIS Package with a Data Tap\n\n```sql\nDeclare @ExecId bigint\n\
    Exec SSISDB.custom.execute_catalog_package_with_Data_tap\n @FolderName = 'Chapter2'\n\
    ,@ProjectName = 'Chapter2'\n,@PackageName = 'DataTapTest.dtsx'\n,@DataFlowTaskName\
    \ = '\\Package\\DFT Load Temperature Data'\n,@IdentificationString = 'Paths[FFSrc\
    \ Temperature.Flat File Source Output]'\n,@DataTapFileName = 'TemperatureRows.csv'\n\
    ,@ExecutionID = @ExecId Output\n,@DataTapMaxRows = 25\n```\n\nOnce the package\
    \ executes (and you can test for rows in the `TestDB.dbo.TemperatureStage` table),\
    \ you should find a CSV file named `TemperatureRows.csv` in the `<drive>:\\Program\
    \ Files\\Microsoft SQL Server\\120\\DTS\\DataDumps` directory, and that file should\
    \ contain the first 25 rows of data that flowed through the `FFSrc Temperature.Flat\
    \ File Source Output` data flow path in the `DFT Load Temperature Data` in the\
    \ `DataTapTest.dtsx` SSIS package.\n\n## Creating a Custom Execution Framework"
