  trans: "\n**马特·马森** 是一位软件开发工程师，就职于 SQL Server 集成服务 (SSIS) 团队。马特参与了 SSIS 产品的诸多方面，包括升级、性能以及整体用户体验。他是微软技术会议的常客，并维护着\
    \ SSIS 团队博客 (`http://blogs.msdn.com/b/mattm/`)。2006 年加入微软之前，马特曾是多个商业智能报告与分析产品的开发者。他居住在魁北克省蒙特利尔市，与位于雷德蒙德的团队进行远程协作。\n\
    \n![9781484200834_unFM-02.jpg](img/9781484200834_unFM-02.jpg)\n\n**杰西卡·M·莫斯**\
    \ 是微软 SQL Server 商业智能领域知名的作家和演讲者。她为不同行业的公司创建了众多数据仓库和商业智能解决方案，并讲授有关集成服务、报表服务和分析服务的培训课程。在为一家大型服装零售商工作期间，杰西卡参与了\
    \ SQL Server 2005 TAP 计划，在那里她为集成服务制定了最佳实施实践。杰西卡为多家杂志、网站和书籍撰写了技术内容，并在 PASS 社区峰会、SharePoint\
    \ 连接大会和 SQLTeach 国际会议等国际会议上发表演讲。作为发展用户间社区关系的坚定倡导者，杰西卡积极参与弗吉尼亚州中部的地方用户组和代码训练营活动。此外，她还通过\
    \ PASS 组织志愿贡献时间，帮助教育大众。\n\n![9781484200834_unFM-03.jpg](img/9781484200834_unFM-03.jpg)\n\
    \n**米歇尔·阿福德** 是微软最有价值专家 (MVP)，也是 GoDaddy 公司数据平台团队的首席工程师。她在数据生命周期的所有阶段都有经验，从 OLTP\
    \ 到数据仓库，从关系型数据到大数据。米歇尔专注于超大型数据库 (VLDB) 的开发和可扩展数据库架构，并热衷于数据库自动化和数据变现。她是 SQL Server\
    \ 社区的活跃成员和频繁的演讲者，尤其以在 PASS 峰会上的演讲而闻名。米歇尔在 `SQLFool.com` 拥有一个非常受欢迎的博客，也可以在 Twitter\
    \ 上通过 `@sqlfool.com` 找到她。\n\n# 关于技术审校者\n\n![9781484200834_unFM-04.jpg](img/9781484200834_unFM-04.jpg)\n\
    \n**比尔·费洛斯** 是微软 SQL Server MVP，也是密苏里州堪萨斯城的一位商业智能专业人士。自 1999 年以来，他一直专注于数据集成、数据库设计和开发。他是堪萨斯城\
    \ SQL Saturday 活动的组织者，也是 SQL Server 社区活动的常任演讲嘉宾。\n\n# 第 1 章\n\n![image](img/frontdot.jpg)\n\
    \n## 元数据收集\n\n我们要介绍的第一个集成服务设计模式是元数据收集。我们所说的元数据收集是什么意思？问得好。本章也可以命名为“使用 SSIS 节省时间并成为出色的\
    \ DBA”。许多 DBA 将大量时间花在监控活动上，例如验证备份、对计划作业失败发出警忠、创建架构快照（“以防万一”）、检查空间利用情况以及记录数据库随时间增长的情况，等等。大多数关系数据库管理系统\
    \ (RDBMS) 都提供元数据来帮助 DBA 监控其系统。如果您已经当了几年的 DBA，您甚至可能拥有一个用于查询元数据的“工具箱”脚本集。当您只有一两台服务器时，手动运行这些脚本很容易；然而，随着企业的发展和数据库服务器数量的增加，这很快就会变得难以处理并占用您的大量时间。\n\
    \n本章将探讨如何使用集成服务和 SQL Server 中存在的元数据来自动化其中一些例行任务。\n\n## 关于 SQL Server 数据工具\n\n\
    SQL Server 数据工具 - 商业智能 (SSDT-BI) 是微软用于开发集成服务包的集成开发环境 (IDE)。它利用了 Visual Studio\
    \ 的成熟度和熟悉度，为 SQL Server 商业智能项目（包括集成服务、分析服务和报表服务项目）提供了一个统一的开发平台。本书使用 Visual Studio\
    \ 2013 的 `SSDT-BI` 和 `SSIS` 2014 编写。\n\n![Image](img/sq.jpg) **提示** 还没安装 `SSDT-BI`？`SSDT-BI`\
    \ 可从微软下载中心获取。请注意，`SSDT-BI` 不向下兼容，因此请务必验证您下载的版本是否适合您的环境。\n\n## 预览最终产品\n\n让我们讨论一下您将在本章中创建的集成服务包。\n\
    \n在 SQL Server 中，您将执行以下操作：\n\n1.  创建一个数据库，作为您数据库监控的中央存储库。\n2.  创建一个表，用于存储您希望监控的\
    \ SQL Server 实例列表。\n3.  为您希望监控的每个数据元素（未使用的索引和数据库增长）创建一个表。\n\n在集成服务中，您将执行以下操作：\n\
    \n1.  创建一个新的集成服务包。\n2.  检索 SQL Server 实例列表并将该列表存储在变量中。\n3.  创建一个带有动态填充服务器名称的 `OLE\
    \ DB` 连接。\n4.  遍历每个数据库，并\n    1.  检索当前数据库和日志文件大小以进行历史监控。\n    2.  检索索引候选列表，用于潜在的重新设计或删除。\n\
    \    3.  更新每个 SQL Server 实例的 `上次监控时间` 值。\n\n这是一个非常灵活的模型，您可以轻松扩展以包含更多监控任务。完成的包的屏幕截图显示在\
    \ 图 1-1 中。\n\n![9781484200834_Fig01-01.jpg](img/9781484200834_Fig01-01.jpg)\n\n\
    图 1-1. 元数据收集包\n\n如果这不是您的第一个集成服务包，也许您已经注意到此包缺少一些最佳实践，例如错误处理。为了清晰起见，您在本章中创建的包将仅专注于核心设计模式；但是，我们将在适用时指出最佳实践。\n\
    \n另外，请注意，`T-SQL` 示例仅适用于 SQL Server 2005 或更高版本。\n\n## SQL Server 元数据\n\ncatalog\n\
    \n虽然元数据可以从任何提供访问接口的 RDBMS 中收集，但本章使用 SQL Server 作为元数据源。本章的重点不是实际的元数据，而是元数据收集的模式。尽管如此，了解可用的元数据类型对您还是很有帮助的。\n\
    \nSQL Server 通过目录视图、系统函数、动态管理视图 (DMV) 和动态管理函数 (DMF) 公开了丰富的信息。让我们简要了解一下您将在本章中使用的一些元数据。\n\
    \n![Image](img/sq.jpg) **提示** SQL Server 联机丛书是了解 SQL Server 中可用元数据类型的绝佳资源。尝试搜索“元数据函数”、“目录视图”和“DMV”以获取更多信息。\n\
    \n### sys.dm_os_performance_counters\n\n`sys.dm_os_performance_counters` `DMV`\
    \ 返回服务器性能计数器，涵盖内存、等待统计信息和事务等领域。此 `DMV` 可用于报告文件大小、页面预期寿命、每秒页面读写次数和每秒事务数等。\n\n###\
    \ sys.dm_db_index_usage_stats\n"
- fmt: "# The `sys.dm_db_index_usage_stats` DMV\n\nThe `sys.dm_db_index_usage_stats`\
    \ DMV contains information on index utilization. Specifically, a counter is incremented\
    \ every time a seek, scan, lookup, or update is performed on an index. These counters\
    \ are reinitialized whenever the SQL Server service is started. If you do not\
    \ see a row in this DMV for a particular index, it means that a seek, scan, lookup,\
    \ or update has not yet been performed on that index since the last server reboot.\n\
    \n# The `sys.dm_os_sys_info` DMV\n\nThe `sys.dm_os_sys_info` DMV contains information\
    \ about server resources. Perhaps the most frequently used piece of information\
    \ in this DMV is the `sqlserver_start_time` column, which tells you the last time\
    \ the SQL Server service was started.\n\n# The `sys.tables` Catalog View\n\nThe\
    \ `sys.tables` catalog view contains information about every table that exists\
    \ within the database.\n\n# The `sys.indexes` Catalog View\n\nThe `sys.indexes`\
    \ catalog view contains information about every index in the database. This includes\
    \ information such as whether an index is clustered or nonclustered and whether\
    \ the index is unique or nonunique.\n\n# The `sys.partitions` Catalog View\n\n\
    The `sys.partitions` catalog view gives visibility into the partitioning structure\
    \ of an index. When an index has more than one partition, the data in the index\
    \ is split into multiple physical structures that can be accessed using the single\
    \ logical name. This technique is especially useful for dealing with large tables,\
    \ such as a transaction history table. If a table is not partitioned, the table\
    \ will still have a single row in `sys.partitions`.\n\n# The `sys.allocation_units`\
    \ Catalog View\n\nThe `sys.allocation_units` catalog view contains information\
    \ about the number of pages and rows that exist for an object. This information\
    \ can be joined to the `sys.partitions` catalog view by joining the `container_id`\
    \ to the `partition_id`.\n\n# Setting Up the Central Repository\n\nBefore you\
    \ can begin development on your Integration Services package, you need to set\
    \ up some prerequisites in SQL Server. First and foremost, you need to create\
    \ a database that will act as your central data repository. This is where your\
    \ list of SQL Server instances will reside and where you will store the metadata\
    \ you retrieve for each SQL Server instance. Many enterprises also find it convenient\
    \ to store all error and package logging to this same central database. This is\
    \ especially beneficial in environments where there are numerous DBAs, developers,\
    \ and servers, because it makes it easy for everyone to know where to look for\
    \ information. The T-SQL code in [Listing 1-1](#9781484200834_Ch01.xhtml#list1)\
    \ creates the database you will use throughout the rest of this chapter.\n\n[***Listing\
    \ 1-1***](#9781484200834_Ch01.xhtml#_list1). Example of T-SQL Code to Create a\
    \ SQL Server Database\n\n```sql\nUSE [master];\nGO\n\nCREATE DATABASE [dbaCentralLogging]\n\
    ON PRIMARY\n(\n      NAME = N'dbaCentralLogging'\n    , FILENAME = N'C:\\Program\
    \ Files\\Microsoft SQL Server\\MSSQL12.MSSQLSERVER\\MSSQL\\DATA\\dbaCentralLogging.mdf'\n\
    \    , SIZE = 1024MB\n    , MAXSIZE = UNLIMITED\n    , FILEGROWTH = 1024MB\n)\n\
    LOG ON\n(\n      NAME = N'dbaCentralLogging_log'\n    , FILENAME = N'C:\\Program\
    \ Files\\Microsoft SQL Server\\MSSQL12.MSSQLSERVER\\MSSQL\\DATA\\dbaCentralLogging_log.ldf'\n\
    \    , SIZE = 256MB\n    , MAXSIZE = UNLIMITED\n    , FILEGROWTH = 256MB\n);\n\
    GO\n```\n\nPlease note that your file directory may differ from the one in the\
    \ preceding example.\n\nThis code can be executed from SQL Server Management Studio\
    \ (`SSMS`), as demonstrated in [Figure 1-2](#9781484200834_Ch01.xhtml#Fig2), or\
    \ from your favorite query tool.\n\n![9781484200834_Fig01-02.jpg](images/9781484200834_Fig01-02.jpg)\n\
    \n[Figure 1-2](#9781484200834_Ch01.xhtml#_Fig2). SQL Server Management Studio\
    \ 2012\n\nNext, you need a list of SQL Server instances to monitor. The easiest\
    \ way to accomplish this is to store a list of database instance names in a file\
    \ or table. You will use the latter method. Using the code in [Listing 1-2](#9781484200834_Ch01.xhtml#list2),\
    \ create that table now inside your newly created database.\n\n[***Listing 1-2***](#9781484200834_Ch01.xhtml#_list2).\
    \ Example of T-SQL Code to Create a Table for Monitoring SQL Server Instances\n\
    \n```sql\nUSE dbaCentralLogging;\nGO\n\nCREATE TABLE dbo.dba_monitor_SQLServerInstances\n\
    (\n      SQLServerInstance   NVARCHAR(128)\n    , LastMonitored       SMALLDATETIME\
    \     NULL\n\nCONSTRAINT PK_dba_monitor_SQLServerInstances\n    PRIMARY KEY CLUSTERED(\
    \ SQLServerInstance )\n);\n```\n\nNow you’re ready to populate the table with\
    \ a list of SQL Server instances to monitor. The code in [Listing 1-3](#9781484200834_Ch01.xhtml#list3)\
    \ will walk you through how to do this, although you will need to update the placeholders\
    \ with SQL Server instances that exist in your environment.\n\n[***Listing 1-3***](#9781484200834_Ch01.xhtml#_list3).\
    \ Example of T-SQL Code to Insert Data into the `dba_monitor_SQLServerInstances`\
    \ Table\n\n```sql\nINSERT INTO dbo.dba_monitor_SQLServerInstances\n(\n    SQLServerInstance\n\
    )\nSELECT @@SERVERNAME-- The name of the server that hosts the central repository\n\
    UNION ALL\nSELECT 'YourSQLServerInstanceHere'-- Example of a SQL Server instance\n\
    UNION ALL\nSELECT 'YourSQLServerInstance\\Here';-- Example of a server with multiple\
    \ instances\n```\n\nYou still need to create two tables to store the metadata\
    \ you collect, but you will create these as you get to the relevant section in\
    \ this chapter. Next, you will create your Integration Services package.\n\n#\
    \ The Iterative Framework\n\nIn this section, you lay the foundation for your\
    \ iterative framework. Specifically, you will demonstrate a repeatable pattern\
    \ for populating a variable with a list of SQL Server instances and then iterating\
    \ through the list and performing an action on each server.\n\nFirst, open Visual\
    \ Studio. Create a new project by navigating to **File** ![image](images/arrow.jpg)\
    \ **New** ![image](images/arrow.jpg) **Project**. Expand the Business Intelligence\
    \ section (under **Installed** ![image](images/arrow.jpg) **Templates**), and\
    \ then click **Integration Services Project**. Name the project **MetadataCollection**,\
    \ as illustrated in [Figure 1-3](#9781484200834_Ch01.xhtml#Fig3).\n\n![9781484200834_Fig01-03.jpg](images/9781484200834_Fig01-03.jpg)\n\
    \n[Figure 1-3](#9781484200834_Ch01.xhtml#_Fig3). New integration services project\n\
    \nPlease note that your default **Location** will be different from the directory\
    \ pictured in [Figure 1-3](#9781484200834_Ch01.xhtml#Fig3).\n\nYou now need to\
    \ create two variables. The first variable will be used to store the list of SQL\
    \ Server instances you retrieve. The second variable will store the value of a\
    \ single instance as you iterate through your list.\n\nTo access the variable\
    \ menu, select **Variables** under the SSIS menu ([Figure 1-4](#9781484200834_Ch01.xhtml#Fig4));\
    \ you can also access the Variables menu by right-clicking the designer surface.\n\
    \n![9781484200834_Fig01-04.jpg](images/9781484200834_Fig01-04.jpg)\n\n[Figure\
    \ 1-4](#9781484200834_Ch01.xhtml#_Fig4). Opening the Variables menu\n\nAdd the\
    \ following variables by clicking the **Add Variable** icon on the far left of\
    \ the Variables menu, as illustrated in [Figure 1-5](#9781484200834_Ch01.xhtml#Fig5):\n\
    \n*   `SQLServerInstance`—String data type\n*   `SQLServerList`—Object data type\n\
    \n![9781484200834_Fig01-05.jpg](images/9781484200834_Fig01-05.jpg)\n\n[Figure\
    \ 1-5](#9781484200834_Ch01.xhtml#_Fig5). Package-scoped variables\n\nInitialize\
    \ the `SQLServerInstance` variable with a server that you have permissions to\
    \ connect to. For simplicity, we suggest using the server where the `dbaCentralLogging`\
    \ database was created. This value will be overwritten at runtime.\n\nNow that\
    \ you have a place to store your list of instances, you’re ready to populate the\
    \ variable. Drag a new **Execute SQL** task from the SSIS Toolbox onto the designer\
    \ surface. Rename the task **Retrieve SQL Server Instances** and double-click\
    \ it to open the **Execute SQL Task Editor**. Click the drop-down under **Connection**,\
    \ and then select **<New connection…>**, as seen in [Figure 1-6](#9781484200834_Ch01.xhtml#Fig6).\n\
    \n![9781484200834_Fig01-06.jpg](images/9781484200834_Fig01-06.jpg)"
  raw: 'The `sys.dm_db_index_usage_stats` DMV contains information on index utilization.
    Specifically, a counter is incremented every time a seek, scan, lookup, or update
    is performed on an index. These counters are reinitialized whenever the SQL Server
    service is started. If you do not see a row in this DMV for a particular index,
    it means that a seek, scan, lookup, or update has not yet been performed on that
    index since the last server reboot.


    sys.dm_os_sys_info


    The `sys.dm_os_sys_info` DMV contains information about server resources. Perhaps
    the most frequently used piece of information in this DMV is the `sqlserver_start_time`
    column, which tells you the last time the SQL Server service was started.


    sys.tables


    The `sys.tables` catalog view contains information about every table that exists
    within the database.


    sys.indexes


    The `sys.indexes` catalog view contains information about every index in the database.
    This includes information such as whether an index is clustered or nonclustered
    and whether the index is unique or nonunique.


    sys.partitions


    The `sys.partitions` catalog view gives visibility into the partitioning structure
    of an index. When an index has more than one partition, the data in the index
    is split into multiple physical structures that can be accessed using the single
    logical name. This technique is especially useful for dealing with large tables,
    such as a transaction history table. If a table is not partitioned, the table
    will still have a single row in `sys.partitions`.


    sys.allocation_units


    The `sys.allocation_units` catalog view contains information about the number
    of pages and rows that exist for an object. This information can be joined to
    the `sys.partitions` catalog view by joining the `container_id` to the `partition_id`.


    Setting Up the Central Repository


    Before you can begin development on your Integration Services package, you need
    to set up some prerequisites in SQL Server. First and foremost, you need to create
    a database that will act as your central data repository. This is where your list
    of SQL Server instances will reside and where you will store the metadata you
    retrieve for each SQL Server instance. Many enterprises also find it convenient
    to store all error and package logging to this same central database. This is
    especially beneficial in environments where there are numerous DBAs, developers,
    and servers, because it makes it easy for everyone to know where to look for information.
    The T-SQL code in [Listing 1-1](#9781484200834_Ch01.xhtml#list1) creates the database
    you will use throughout the rest of this chapter.


    [***Listing 1-1***](#9781484200834_Ch01.xhtml#_list1). Example of T-SQL Code to
    Create a SQL Server Database


    ```

    USE [master];

    GO


    CREATE DATABASE [dbaCentralLogging]

    ON PRIMARY

    (

          NAME = N''dbaCentralLogging''

        , FILENAME = N''C:\Program Files\Microsoft SQL Server\MSSQL12.MSSQLSERVER\MSSQL\DATA\dbaCentralLogging.mdf''

        , SIZE = 1024MB

        , MAXSIZE = UNLIMITED

        , FILEGROWTH = 1024MB

    )

    LOG ON

    (

          NAME = N''dbaCentralLogging_log''

        , FILENAME = N''C:\Program Files\Microsoft SQL Server\MSSQL12.MSSQLSERVER\MSSQL\DATA\dbaCentralLogging_log.ldf''

        , SIZE = 256MB

        , MAXSIZE = UNLIMITED

        , FILEGROWTH = 256MB

    );

    GO

    ```


    Please note that your file directory may differ from the one in the preceding
    example.


    This code can be executed from SQL Server Management Studio (SSMS), as demonstrated
    in [Figure 1-2](#9781484200834_Ch01.xhtml#Fig2), or from your favorite query tool.


    ![9781484200834_Fig01-02.jpg](images/9781484200834_Fig01-02.jpg)


    [Figure 1-2](#9781484200834_Ch01.xhtml#_Fig2). SQL Server Management Studio 2012


    Next, you need a list of SQL Server instances to monitor. The easiest way to accomplish
    this is to store a list of database instance names in a file or table. You will
    use the latter method. Using the code in [Listing 1-2](#9781484200834_Ch01.xhtml#list2),
    create that table now inside your newly created database.


    [***Listing 1-2***](#9781484200834_Ch01.xhtml#_list2). Example of T-SQL Code to
    Create a Table for Monitoring SQL Server Instances


    ```

    USE dbaCentralLogging;

    GO


    CREATE TABLE dbo.dba_monitor_SQLServerInstances

    (

          SQLServerInstance   NVARCHAR(128)

        , LastMonitored       SMALLDATETIME     NULL


    CONSTRAINT PK_dba_monitor_SQLServerInstances

        PRIMARY KEY CLUSTERED( SQLServerInstance )

    );

    ```


    Now you’re ready to populate the table with a list of SQL Server instances to
    monitor. The code in [Listing 1-3](#9781484200834_Ch01.xhtml#list3) will walk
    you through how to do this, although you will need to update the placeholders
    with SQL Server instances that exist in your environment.


    [***Listing 1-3***](#9781484200834_Ch01.xhtml#_list3). Example of T-SQL Code to
    Insert Data into the dba_monitor_SQLServerInstances Table


    ```

    INSERT INTO dbo.dba_monitor_SQLServerInstances

    (

        SQLServerInstance

    )

    SELECT @@SERVERNAME-- The name of the server that hosts the central repository

    UNION ALL

    SELECT ''YourSQLServerInstanceHere''-- Example of a SQL Server instance

    UNION ALL

    SELECT ''YourSQLServerInstance\Here'';-- Example of a server with multiple instances

    ```


    You still need to create two tables to store the metadata you collect, but you
    will create these as you get to the relevant section in this chapter. Next, you
    will create your Integration Services package.


    The Iterative Framework


    In this section, you lay the foundation for your iterative framework. Specifically,
    you will demonstrate a repeatable pattern for populating a variable with a list
    of SQL Server instances and then iterating through the list and performing an
    action on each server.


    First, open Visual Studio. Create a new project by navigating to File ![image](images/arrow.jpg)
    New ![image](images/arrow.jpg) Project. Expand the Business Intelligence section
    (under Installed ![image](images/arrow.jpg) Templates), and then click Integration
    Services Project. Name the project **MetadataCollection**, as illustrated in [Figure
    1-3](#9781484200834_Ch01.xhtml#Fig3).


    ![9781484200834_Fig01-03.jpg](images/9781484200834_Fig01-03.jpg)


    [Figure 1-3](#9781484200834_Ch01.xhtml#_Fig3). New integration services project


    Please note that your default Location will be different from the directory pictured
    in [Figure 1-3](#9781484200834_Ch01.xhtml#Fig3).


    You now need to create two variables. The first variable will be used to store
    the list of SQL Server instances you retrieve. The second variable will store
    the value of a single instance as you iterate through your list.


    To access the variable menu, select Variables under the SSIS menu ([Figure 1-4](#9781484200834_Ch01.xhtml#Fig4));
    you can also access the Variables menu by right-clicking the designer surface.


    ![9781484200834_Fig01-04.jpg](images/9781484200834_Fig01-04.jpg)


    [Figure 1-4](#9781484200834_Ch01.xhtml#_Fig4). Opening the Variables menu


    Add the following variables by clicking the Add Variable icon on the far left
    of the Variables menu, as illustrated in [Figure 1-5](#9781484200834_Ch01.xhtml#Fig5):


    *   `SQLServerInstance`—String data type

    *   `SQLServerList`—Object data type


    ![9781484200834_Fig01-05.jpg](images/9781484200834_Fig01-05.jpg)


    [Figure 1-5](#9781484200834_Ch01.xhtml#_Fig5). Package-scoped variables


    Initialize the `SQLServerInstance` variable with a server that you have permissions
    to connect to. For simplicity, we suggest using the server where the `dbaCentralLogging`
    database was created. This value will be overwritten at runtime.


    Now that you have a place to store your list of instances, you’re ready to populate
    the variable. Drag a new Execute SQL task from the SSIS Toolbox onto the designer
    surface. Rename the task **Retrieve SQL Server Instances** and double-click it
    to open the Execute SQL Task Editor. Click the drop-down under Connection, and
    then select <New connection…>, as seen in [Figure 1-6](#9781484200834_Ch01.xhtml#Fig6).


    ![9781484200834_Fig01-06.jpg](images/9781484200834_Fig01-06.jpg)'
  trans: "# `sys.dm_db_index_usage_stats` 动态管理视图\n\n`sys.dm_db_index_usage_stats`\
    \ 动态管理视图包含有关索引使用情况的信息。具体来说，每次在索引上执行查找、扫描、查找或更新时，计数器都会递增。每当 SQL Server 服务启动时，这些计数器都会重新初始化。如果在此动态管理视图中未看到特定索引的行，则意味着自上次服务器重启以来，尚未在该索引上执行过查找、扫描、查找或更新操作。\n\
    \n# `sys.dm_os_sys_info` 动态管理视图\n\n`sys.dm_os_sys_info` 动态管理视图包含有关服务器资源的信息。其中最常用的信息可能是\
    \ `sqlserver_start_time` 列，它显示了 SQL Server 服务上次启动的时间。\n\n# `sys.tables` 目录视图\n\
    \n`sys.tables` 目录视图包含数据库中存在的每个表的信息。\n\n# `sys.indexes` 目录视图\n\n`sys.indexes` 目录视图包含数据库中每个索引的信息。这包括诸如索引是聚集还是非聚集，以及索引是唯一还是非唯一等信息。\n\
    \n# `sys.partitions` 目录视图\n\n`sys.partitions` 目录视图提供了对索引分区结构的可见性。当一个索引有多个分区时，索引中的数据会被拆分到多个物理结构中，但可以通过单一逻辑名称访问。这种技术对于处理大型表（如事务历史表）特别有用。如果一个表未被分区，该表在\
    \ `sys.partitions` 中仍将只有一行。\n\n# `sys.allocation_units` 目录视图\n\n`sys.allocation_units`\
    \ 目录视图包含有关对象的页数和行数的信息。可以通过将 `container_id` 与 `partition_id` 连接，将此信息与 `sys.partitions`\
    \ 目录视图关联起来。\n\n# 设置中央存储库\n\n在开始开发 Integration Services 包之前，您需要在 SQL Server 中设置一些先决条件。首先也是最重要的，您需要创建一个数据库作为您的中央数据存储库。这将是您的\
    \ SQL Server 实例列表所在的位置，也是您存储从每个 SQL Server 实例检索到的元数据的地方。许多企业还发现将所有错误和包日志记录存储到这个中央数据库中非常方便。这在有众多\
    \ DBA、开发人员和服务器的环境中尤其有益，因为它使每个人都能轻松知道在哪里查找信息。清单 1-1 中的 T-SQL 代码创建了本章余下部分将使用的数据库。\n\
    \n***清单 1-1***. 创建 SQL Server 数据库的 T-SQL 代码示例\n\n```sql\nUSE [master];\nGO\n\n\
    CREATE DATABASE [dbaCentralLogging]\nON PRIMARY\n(\n      NAME = N'dbaCentralLogging'\n\
    \    , FILENAME = N'C:\\Program Files\\Microsoft SQL Server\\MSSQL12.MSSQLSERVER\\\
    MSSQL\\DATA\\dbaCentralLogging.mdf'\n    , SIZE = 1024MB\n    , MAXSIZE = UNLIMITED\n\
    \    , FILEGROWTH = 1024MB\n)\nLOG ON\n(\n      NAME = N'dbaCentralLogging_log'\n\
    \    , FILENAME = N'C:\\Program Files\\Microsoft SQL Server\\MSSQL12.MSSQLSERVER\\\
    MSSQL\\DATA\\dbaCentralLogging_log.ldf'\n    , SIZE = 256MB\n    , MAXSIZE = UNLIMITED\n\
    \    , FILEGROWTH = 256MB\n);\nGO\n```\n\n请注意，您的文件目录可能与前面示例中的不同。\n\n这段代码可以从 SQL\
    \ Server Management Studio (`SSMS`) 执行，如图 1-2 所示，也可以从您喜欢的查询工具执行。\n\n![9781484200834_Fig01-02.jpg](img/9781484200834_Fig01-02.jpg)\n\
    \n图 1-2. SQL Server Management Studio 2012\n\n接下来，您需要一个要监控的 SQL Server 实例列表。实现此目的最简单的方法是将数据库实例名称列表存储在文件或表中。您将使用后一种方法。使用清单\
    \ 1-2 中的代码，现在在新创建的数据库中创建该表。\n\n***清单 1-2***. 创建用于监控 SQL Server 实例的表的 T-SQL 代码示例\n\
    \n```sql\nUSE dbaCentralLogging;\nGO\n\nCREATE TABLE dbo.dba_monitor_SQLServerInstances\n\
    (\n      SQLServerInstance   NVARCHAR(128)\n    , LastMonitored       SMALLDATETIME\
    \     NULL\n\nCONSTRAINT PK_dba_monitor_SQLServerInstances\n    PRIMARY KEY CLUSTERED(\
    \ SQLServerInstance )\n);\n```\n\n现在您已准备好用要监控的 SQL Server 实例列表填充该表。清单 1-3 中的代码将引导您完成此操作，但您需要用您环境中存在的\
    \ SQL Server 实例更新占位符。\n\n***清单 1-3***. 向 `dba_monitor_SQLServerInstances` 表插入数据的\
    \ T-SQL 代码示例\n\n```sql\nINSERT INTO dbo.dba_monitor_SQLServerInstances\n(\n  \
    \  SQLServerInstance\n)\nSELECT @@SERVERNAME-- 承载中央存储库的服务器名称\nUNION ALL\nSELECT\
    \ 'YourSQLServerInstanceHere'-- SQL Server 实例示例\nUNION ALL\nSELECT 'YourSQLServerInstance\\\
    Here';-- 具有多个实例的服务器示例\n```\n\n您仍然需要创建两个表来存储收集到的元数据，但您将在本章相关部分介绍时创建这些表。接下来，您将创建您的\
    \ Integration Services 包。\n\n# 迭代框架\n\n在本节中，您将为迭代框架奠定基础。具体来说，您将展示一种可重复的模式，用于用\
    \ SQL Server 实例列表填充变量，然后遍历该列表并对每个服务器执行操作。\n\n首先，打开 Visual Studio。通过导航到 **文件**\
    \ ![image](img/arrow.jpg) **新建** ![image](img/arrow.jpg) **项目** 创建一个新项目。展开“商业智能”部分（位于\
    \ **已安装** ![image](img/arrow.jpg) **模板** 下），然后单击 **Integration Services 项目**。将项目命名为\
    \ **MetadataCollection**，如图 1-3 所示。\n\n![9781484200834_Fig01-03.jpg](img/9781484200834_Fig01-03.jpg)\n\
    \n图 1-3. 新建 Integration Services 项目\n\n请注意，您的默认 **位置** 将与图 1-3 中所示的目录不同。\n\n您现在需要创建两个变量。第一个变量将用于存储检索到的\
    \ SQL Server 实例列表。第二个变量将在您遍历列表时存储单个实例的值。\n\n要访问变量菜单，请选择 SSIS 菜单下的 **变量**（图 1-4）；您也可以通过右键单击设计器界面来访问变量菜单。\n\
    \n![9781484200834_Fig01-04.jpg](img/9781484200834_Fig01-04.jpg)\n\n图 1-4. 打开变量菜单\n\
    \n通过单击变量菜单最左侧的 **添加变量** 图标添加以下变量，如图 1-5 所示：\n\n*   `SQLServerInstance`—字符串数据类型\n\
    *   `SQLServerList`—对象数据类型\n\n![9781484200834_Fig01-05.jpg](img/9781484200834_Fig01-05.jpg)\n\
    \n图 1-5. 包作用域变量\n\n用您有权限连接的服务器初始化 `SQLServerInstance` 变量。为简单起见，建议使用创建 `dbaCentralLogging`\
    \ 数据库的服务器。此值将在运行时被覆盖。\n\n现在您有了存储实例列表的位置，您已准备好填充该变量。从 SSIS 工具箱中将一个新的 **执行 SQL 任务**\
    \ 拖到设计器界面上。将任务重命名为 **检索 SQL Server 实例**，然后双击它以打开 **执行 SQL 任务编辑器**。单击 **连接** 下的下拉菜单，然后选择\
    \ **<新建连接…>**，如图 1-6 所示。\n\n![9781484200834_Fig01-06.jpg](img/9781484200834_Fig01-06.jpg)\n"
- fmt: '## The Execute SQL Task Editor


    In the Configure OLE DB Connection Manager menu, click New. In the Server Name
    field, enter the database server where you created the database in [Listing 1-1](#9781484200834_Ch01.xhtml#list1).
    Regardless of whether you are using Windows or SQL Server authentication, make
    sure that the account has sufficient permissions to each of the instances in your
    `dba_monitor_SQLServerInstances` table. Under Select or Enter a Database Name,
    select `dbaCentralLogging` from the drop-down menu, as illustrated in [Figure
    1-7](#9781484200834_Ch01.xhtml#Fig7). Click OK to return to the Execute SQL Task
    Editor.


    ![9781484200834_Fig01-07.jpg](images/9781484200834_Fig01-07.jpg)


    ### The Connection Manager


    ![Image](images/sq.jpg) **Note** Permissions requirements vary depending on the
    type of metadata you wish to retrieve. For more information on the permissions
    necessary to access a specific object, please refer to the object type’s page
    within SQL Server Books Online.


    You now need to write the SQL statement that will retrieve the list of SQL Server
    instances. Click the [...] icon to the right of the `SQLStatement` field, and
    then enter the T-SQL code from [Listing 1-4](#9781484200834_Ch01.xhtml#list4).


    ### T-SQL Statement to Retrieve SQL Server Instances


    ```sql

    SELECT SQLServerInstance FROM dbo.dba_monitor_SQLServerInstances;

    ```


    Because you are retrieving an array of values, select Full Result Set from the
    `ResultSet` drop-down. Your Execute SQL Task Editor should now resemble [Figure
    1-8](#9781484200834_Ch01.xhtml#Fig8); however, your Connection values will likely
    be different.


    ![9781484200834_Fig01-08.jpg](images/9781484200834_Fig01-08.jpg)


    ### The SQL Task Editor


    You’re almost done configuring the Connection Manager. All you have left is to
    map your result set to your variable. Select Result Set on the left side of the
    Execute SQL Task Editor, and then click Add. Because you are using a full result
    set, you must replace the `Result Name` with `0`. You now need to tell Integration
    Services which variable to use. Select `User::SQLServerList` from the drop-down
    under Variable Name, as illustrated in [Figure 1-9](#9781484200834_Ch01.xhtml#Fig9).
    Click OK.


    ![9781484200834_Fig01-09.jpg](images/9781484200834_Fig01-09.jpg)


    ### Editing the result set


    The Execute SQL task is now complete. Next, you need to iterate through each server
    to retrieve the metadata you plan to monitor. This process will be encapsulated
    within a Foreach Loop container, which will shred the list of SQL Server instances
    stored in the `SQLServerList` variable.


    Add a Foreach Loop container to the Control Flow and rename it **Foreach SQL Server
    Instance**. Connect it to the Execute SQL task with a Success Precedence constraint—in
    other words, drag the green arrow from the Execute SQL task to the Foreach Loop
    container, as seen in [Figure 1-10](#9781484200834_Ch01.xhtml#Fig10).


    ![9781484200834_Fig01-10.jpg](images/9781484200834_Fig01-10.jpg)


    ### Connecting the Execute SQL task to the Foreach Loop container


    Double-click the Foreach Loop container to edit its properties. Click the Collection
    page, and then select Foreach ADO Enumerator in the Enumerator field. Under ADO
    Object Source Variable, select `User::SQLServerList`; leave Enumeration Mode set
    to Rows in the First Table. Your Collection properties should match those in [Figure
    1-11](#9781484200834_Ch01.xhtml#Fig11).


    ![9781484200834_Fig01-11.jpg](images/9781484200834_Fig01-11.jpg)


    ### The Foreach Loop Editor


    On the Variable Mappings page, map the `SQLServerInstance` variable to Index 0,
    as demonstrated in [Figure 1-12](#9781484200834_Ch01.xhtml#Fig12).


    ![9781484200834_Fig01-12.jpg](images/9781484200834_Fig01-12.jpg)'
