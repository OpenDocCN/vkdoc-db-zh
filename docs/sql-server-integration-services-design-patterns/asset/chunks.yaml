    PkgInstanceID\").Value)\n\n        Dim sMsg As String = \"ChildPackagePath: \"\
    \ & sChildPackagePath & vbCrLf & _\n                             \"AppPackageID:\
    \ \" & iAppPackageID.ToString & vbCrLf & _\n                             \"PkgInstanceID:\
    \ \" & iPkgInstanceID.ToString\n\n        Dts.Events.FireInformation(1001, sSubComponent,\
    \ sMsg, \"\", 0, True)\n\n        Dts.TaskResult = ScriptResults.Success\n   \
    \ End Sub\n```\n\n关闭脚本编辑器和脚本任务编辑器。从“日志开始包执行 SQL”任务到“日志开始包执行 SQL”任务连接一个优先约束。\n\n\
    如果现在执行 `Parent.dtsx`，在记录应用程序变量时可能会遇到外键约束错误。为什么？因为 `PkgInstanceID` 被设置为默认值 `0`，而\
    \ `log.SSISPkgInstance` 表中没有 ID 为 `0` 的行。现在让我们用 清单 A-20 中所示的脚本来解决这个问题。\n\n**清单\
    \ A-20. 在 SSISConfig 数据库的选定表中添加 ID 为 0 的行**\n\n```sql\n/* Add \"0\" rows */\n\
    If Not Exists(Select ApplicationID\n              From cfg.Applications\n    \
    \                 Where ApplicationID = 0)\n begin\n  print 'Adding 0 row for\
    \ cfg.Applications'\n  Set Identity_Insert cfg.Applications ON\n  Insert Into\
    \ cfg.Applications\n  (ApplicationID\n  ,ApplicationName)\n  Values\n  (0\n  ,'SSIS\
    \ Framework')\n  Set Identity_Insert cfg.Applications OFF\n  print '0 row for\
    \ cfg.Applications added'\n end\nElse\n print '0 row already exists for cfg.Applications'\n\
    print ''\n\nIf Not Exists(Select PackageID\n              From cfg.Packages\n\
    \                     Where PackageID = 0)\n begin\n  print 'Adding 0 row for\
    \ cfg.Packages'\n  Set Identity_Insert cfg.Packages ON\n  Insert Into cfg.Packages\n\
    \  (PackageID\n  ,PackageFolder\n  ,PackageName)\n  Values\n  (0\n  ,'\\'\n  ,'parent.dtsx')\n\
    \  Set Identity_Insert cfg.Packages OFF\n  print '0 row for cfg.Packages added'\n\
    \ end\nElse\n print '0 row already exists for cfg.Packages'\nprint ''\n\nIf Not\
    \ Exists(Select AppPackageID\n              From cfg.AppPackages\n           \
    \          Where AppPackageID = 0)\n begin\n  print 'Adding 0 row for cfg.Packages'\n\
    \  Set Identity_Insert cfg.AppPackages ON\n  Insert Into cfg.AppPackages\n  (AppPackageID\n\
    \  ,ApplicationID\n  ,PackageID\n  ,ExecutionOrder)\n  Values\n  (0\n  ,0\n  ,0\n\
    \  ,10)\n  Set Identity_Insert cfg.AppPackages OFF\n  print '0 row for cfg.AppPackages\
    \ added'\n end\nElse\n print '0 row already exists for cfg.AppPackages'\nprint\
    \ ''\n\nIf Not Exists(Select AppInstanceID\n              From [log].SSISAppInstance\n\
    \                     Where AppInstanceID = 0)\n begin\n  print 'Adding 0 row\
    \ for cfg.Packages'\n  Set Identity_Insert [log].SSISAppInstance ON\n  Insert\
    \ Into [log].SSISAppInstance\n  (AppInstanceID\n  ,ApplicationID\n  ,StartDateTime\n\
    \  ,EndDateTime\n  ,[Status])\n  Values\n  (0\n  ,0\n  ,'1/1/1900'\n  ,'1/1/1900'\n\
    \  ,'Unknown')\n  Set Identity_Insert [log].SSISAppInstance OFF\n  print '0 row\
    \ for log.SSISAppInstance added'\n end\nElse\n print '0 row already exists for\
    \ log.SSISAppInstance'\nprint ''\n\nIf Not Exists(Select PkgInstanceID\n     \
    \         From [log].SSISPkgInstance\n                     Where PkgInstanceID\
    \ = 0)\n begin\n  print 'Adding 0 row for cfg.Packages'\n  Set Identity_Insert\
    \ [log].SSISPkgInstance ON\n  Insert Into [log].SSISPkgInstance\n  (PkgInstanceID\n\
    \  ,AppInstanceID\n  ,AppPackageID\n  ,StartDateTime\n  ,EndDateTime\n  ,[Status])\n\
    \  Values\n  (0\n  ,0\n  ,0\n  ,'1/1/1900'\n  ,'1/1/1900'\n  ,'Unknown')\n  Set\
    \ Identity_Insert [log].SSISPkgInstance OFF\n  print '0 row for log.SSISPkgInstance\
    \ added'\n end\nElse\n print '0 row already exists for log.SSISPkgInstance'\n\
    print ''\n```\n\n现在这些生成事件的脚本任务已就绪，测试执行 `Parent.dtsx` 包，然后在 SSMS 中执行以下 T-SQL 来观察\
    \ `log.LogEvents` 表：\n\n```sql\nSelect * From [log].SSISEvents\n```\n\n我的结果显示在\
    \ 图 A-18 中。\n\n![9781484200834_FigAppA-18.jpg](img/9781484200834_FigAppA-18.jpg)\n\
