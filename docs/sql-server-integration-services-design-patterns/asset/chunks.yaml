    administration with your other maintenance tasks.    Run the following code in
    [Listing 15-2](#9781484200834_Ch15.xhtml#list2) to change the logging level to
    log all Verbose records for a new execution.    [***Listing 15-2***](#9781484200834_Ch15.xhtml#_list2).
    Statement to Modify the Logging Level for an Execution    ``` DECLARE @execution_id
    INT EXECUTE [catalog].[create_execution]    @folder_name = ''DesignPatterns''
      ,@project_name = ''DesignPatterns''   ,@package_name = ''Ch15_Reporting.dtsx''
      ,@reference_id = null   ,@use32bitruntime = false   ,@execution_id = @execution_id
    OUTPUT  EXECUTE [catalog].[set_execution_parameter_value]    @execution_id   ,@object_type
    = 50   ,@parameter_name = ''LOGGING_LEVEL''   ,@parameter_value = 3 --Verbose  EXECUTE
    [catalog].[start_execution]    @execution_id ```    Once you’ve done this, you
    can see the output from the newly set logging level by running the query in [Listing
    15-3](#9781484200834_Ch15.xhtml#list3).    [***Listing 15-3***](#9781484200834_Ch15.xhtml#_list3).
    Query to Return All Messages    ``` select * from catalog.event_messages where
    operation_id =         (select max(execution_id) from catalog.executions) ```    Using
    the Existing Reports    Our next design pattern is an important one: use what
    is provided to you. Included in the SSIS Catalog are reports that use the logging
    information we have just discussed. The information in these reports includes
    an in-depth view of all of your packages’ executions. These reports are a great
    start for you to see when your packages run, if any errors occur, and potential
    trouble areas for you to investigate.    [Figure 15-8](#9781484200834_Ch15.xhtml#Fig8)
    shows all of the reports available to you. You can access all reports through
    the Management Studio interface and the Integration Services Catalog node.    ![9781484200834_Fig15-08.jpg](images/9781484200834_Fig15-08.jpg)    [Figure
    15-8](#9781484200834_Ch15.xhtml#_Fig8). Available catalog reports    If you are
    looking at a specific execution, you will always want to start with the Overview
    report, which can be run by selecting the Overview link on any of the provided
    reports. In fact, at the end of an execution through the interface, you will be
    asked if you want to see this report. If you select yes, you will see something
    similar to [Figure 15-9](#9781484200834_Ch15.xhtml#Fig9).    ![9781484200834_Fig15-09.jpg](images/9781484200834_Fig15-09.jpg)    [Figure
    15-9](#9781484200834_Ch15.xhtml#_Fig9). An overview report    Creating New Reports    Now
    that you’ve seen the reports that are available to you without doing any work,
    you may be perfectly happy.


    If not, you may want to dig into the data a little deeper. You can create new
    reports by looking at the catalog views that were described earlier. Particular
    reasons why you may want to do this include    1.  Seeing the longest-running
    executions 2.  Finding out why a package failed 3.  Understanding the inner workings
    of a particular component    Let’s start with the first reason. This report is
    interesting because it uses the main output view, but based on the query and transformations,
    it becomes a helpful little tool. [Listing 15-4](#9781484200834_Ch15.xhtml#list4)
    shows the query that lists the five longest-running packages over the past day.    [***Listing
    15-4***](#9781484200834_Ch15.xhtml#_list4). Query for Five Longest-Running Packages    ```
    select top 5 e.execution_id, e.package_name, DATEDIFF(ms, start_time, end_time)
    as duration_ms from catalog.executions e where e.start_time > DATEADD(dd, -1,
    getdate()) order by duration_ms desc ```    The second reason you may want a new
    report is to see why a package failed. You will use an additional view for this
    information, the `catalog.event_messages` view. Restricting the data on both the
    `executions` and the `event_messages` view will ensure that you get only packages
    that failed entirely and see only the events that caused them to fail. This query
    can be seen in [Listing 15-5](#9781484200834_Ch15.xhtml#list5).    [***Listing
    15-5***](#9781484200834_Ch15.xhtml#_list5). Failed-Packages Query    ``` select
    e.execution_id, e.package_name, em.* from catalog.executions e inner join catalog.event_messages
    em on e.execution_id=em.operation_id where e.status = 4 and em.event_name = ''OnError''
    ```    The final reason is to understand the inner workings of a particular component.
    You can see the individual steps that occurred during the execution of each component
    in the data flow. For example, the query in [Listing 15-6](#9781484200834_Ch15.xhtml#list6)
    returns each step that occurs in the execution of the sources, transformations,
    and destinations and how long each step takes.    [***Listing 15-6***](#9781484200834_Ch15.xhtml#_list6).
