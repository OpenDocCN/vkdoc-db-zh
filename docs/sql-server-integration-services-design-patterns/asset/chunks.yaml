    ### 使用 XSLT 简化操作


    你可以通过使用 XSLT 预处理源文件来简化复杂 XML 文档的处理。使用 XSLT，你可以将 XML 塑造成与目标模式非常相似的格式，删除不需要捕获的字段，或者将其转换为易于被
    XML 源组件处理的简单格式。


    来自清单 9-3 的示例 XML 为 XML 源组件产生了三个独立的输出。为了将数据插入目标，我们必须将输出合并为所需的格式。使用清单 9-4 中的 XSLT
    脚本，我们可以“扁平化”或反规范化数据，以便 XML 源组件只有一个输出。


    ### 清单 9-4. 用于简化我们 XML 示例的 XSLT 脚本


