    This isn’t the only way to address loading files of this format. It is one way,
    and it has the advantage of offering a lot of flexibility.


    ### Header and Footer Rows


    `Header` and `footer` rows are included in extract files from many sources. I
    regularly see these rows in flat files delivered from mainframe-based database
    systems.


    A `header row` contains metadata about the contents of the extract file—a summary
    of information of the extract. At a minimum, it will include the extract date.
    Usually a field contains a row count for the extract. When you think about it,
    this is very practical instrumentation—it provides a way to check for the proper
    number of rows. This check can be performed immediately after the extract or immediately
    after loading the extract—both are valid uses of this metadata.


    A `footer row` is identical in concept. The only difference is location: `header`
    rows appear first in a file; `footer` rows appear last. If you’re including row
    counts to validate that the correct number of rows have been written or read,
    writing this information first is a good way to increase fault tolerance. Why?
    Imagine a failure: the write operation is interrupted or the extract ends abnormally.
    The `header` row may indicate 100 rows, for example, but only 70 rows of data
    follow. If the row count metadata is included in the `header` row, it’s possible
    to calculate exactly how many data rows are missing. In contrast, a `footer` row
    would simply be missing. Although a missing `footer` would indicate that the extract
    had failed, that’s *all* it would indicate. Having the row count metadata present
    would allow you to glean more and better information regarding the failure.


    In this section, we will look at creating and consuming `header` and `footer`
    rows using SQL Server 2014 Integration Services.


    ### Consuming a Footer Row


    We begin by looking at how to consume a `footer` row. To start, create a file
    containing a `footer` row. My file looks like this:


    ```

    ID,Name,Value

    11,Andy,12

    22,Christy,13

    33,Stevie Ray,14

    44,Emma Grace,15

    55,Riley Cooper,16

    5 rows, extracted 10/5/2011 10:22:12 AM

    ```


    To demonstrate, create your own file and name it `MyFileFooterSource.csv`. Create
    a new SSIS package and rename it `ParseFileFooter.dtsx`. Add a `Data Flow task`
    and switch to the Data Flow tab. Add a `Flat File source` adapter and double-click
    it to open the `Flat File Source Editor`. On the Connection Manager page, click
    the New button to create a new `Flat File connection manager` and open the editor.
    Name the `Flat File connection manager` `My File Footer Source File` and set the
    `File Path` property to the location of `MyFileFooterSource.csv`. Check the `Column
    Names in the First Data Row` checkbox. Navigate to the Columns page to verify
    your configuration matches, as shown here in [Figure 7-15](#9781484200834_Ch07.xhtml#Fig15).


    ![9781484200834_Fig07-15.jpg](images/9781484200834_Fig07-15.jpg)


    [Figure 7-15](#9781484200834_Ch07.xhtml#_Fig15). `Flat File connection manager`
    Columns page for a file containing a `footer` row


    You can see the `footer` row contents in the preview shown in [Figure 7-15](#9781484200834_Ch07.xhtml#Fig15).
    You may or may not be able to view the `footer` row on the Columns page of the
    `Flat File Connection Manager Editor`.


    The next step is to separate the `footer` row from the data rows. To accomplish
    this, you will use a `Conditional Split` transformation to isolate the `footer`
    row. There are a *lot* of different ways to detect the `footer` row, but the trick
    is to pick something unique about that row. In the SSIS Expression Language expression
    I define in [Figure 7-16](#9781484200834_Ch07.xhtml#Fig16), I search for the term
    `"rows"` in the `ID` column. This condition will work as long as there’s *never
    a chance* that the term `"rows"` will legitimately show up in the `ID` column
    of the data rows. Never is a very long time.


    ![9781484200834_Fig07-16.jpg](images/9781484200834_Fig07-16.jpg)


    [Figure 7-16](#9781484200834_Ch07.xhtml#_Fig16). Configuring the `Conditional
    Split` transformation


    To terminate the data rows pipeline—which flows from the `Conditional Split` transformation’s
    default output—I use a `Derived Column` transformation.


    The `footer` row output requires more parsing. We send it to another `Derived
    Column` transformation named `der Parse Footer`.


    **Note**  Jamie Thomson wrote a great post entitled “SSIS: Suggested Best Practices
    and Naming Conventions” (`http://sqlblog.com/blogs/jamie_thomson/archive/2012/01/29/suggested-best-practises-and-naming-conventions.aspx`).
    I often use Jamie’s naming conventions.


    We want the number of rows and the datetime of the extraction. I use the expressions
    in [Figure 7-17](#9781484200834_Ch07.xhtml#Fig17) to parse the `footer` row count
    and `footer` extract datetime:


    ![9781484200834_Fig07-17.jpg](images/9781484200834_Fig07-17.jpg)


    [Figure 7-17](#9781484200834_Ch07.xhtml#_Fig17). Parsing the row count and extract
    date


    Now we have the `footer` row metadata in the data flow pipeline. We can terminate
    this branch of the pipeline using another `Derived Column` transformation, `der
    Trash Destination Footer`. Connect `der Parse Footer` to `der Trash Destination
    Footer`. Right-click the data flow path and click `Enable Data Viewer`. Execute
    the package in the debugger to view the contents of the `footer` row, as shown
    in [Figure 7-18](#9781484200834_Ch07.xhtml#Fig18).


    ![9781484200834_Fig07-18.jpg](images/9781484200834_Fig07-18.jpg)


    [Figure 7-18](#9781484200834_Ch07.xhtml#_Fig18). `Footer` row, parsed


    You can see from [Figure 7-18](#9781484200834_Ch07.xhtml#Fig18) that five (5)
    data rows exited the `Conditional Split` transformation. We can observe the contents
    of the `footer` row after parsing in the `Data Viewer`.


    ### Consuming a Header Row


    `Header` rows are even easier to read. Let’s start with a look at the source file
    named `MyFileHeaderSource.csv`:


    ```

    5 rows, extracted 10/5/2011 10:22:12 AM


    ID,Name,Value

    11,Andy,12

    22,Christy,13

    33,Stevie Ray,14

    44,Emma Grace,15

    55,Riley Cooper,16

    ```'
