    '\ndeclare @PackageName varchar(255) = 'Child1.dtsx'\n```\n\nAdd to the `stringbuilder`\
    \ Transact-SQL to declare the parameters that will be used to insert SSIS package\
    \ metadata into the Framework, omitting some and adding some, as shown in [Listing\
    \ 20-6](#9781484200834_Ch20.xhtml#list6):\n\n**Listing 20-6**. Adding SSIS Package\
    \ Parameters to the Stringbuilder\n\n```csharp\nsb.AppendLine(\"declare @ExecutionOrder\
    \ int\");\nsb.AppendLine(\"declare @PackageID int\");\nsb.AppendLine(\"declare\
    \ @PackageFolder varchar(255) = '\" + packageFolder + \"'\");\nsb.AppendLine(\"\
    declare @PackageName varchar(255)\");\nsb.AppendLine();\nsb.AppendLine(\"/* Add\
    \ Packages */\");\nsb.AppendLine();\n```\n\n## Loading Package Metadata with a\
    \ Loop\n\nThe real work of this BimlScript is done inside a loop, shown in [Listing\
    \ 20-7](#9781484200834_Ch20.xhtml#list7):\n\n**Listing 20-7**. Starting the Loop\
