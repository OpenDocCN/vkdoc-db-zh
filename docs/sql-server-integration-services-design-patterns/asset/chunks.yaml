  trans: "\n## 表达式仅限于单值语句\n这几乎是不言而喻的，因为它是一种表达式语言，而非编程语言。不过，值得一提的是，例如，你不能用单个表达式来迭代列表或逐字符处理字符串。\n\
    \n## 无智能感知功能\n与其他脚本/表达式环境不同，原生表达式编辑器中没有内置的智能感知功能。尽管 SSIS 中的表达式编辑器确实提供了字段、变量和函数列表，但智能感知带来的便捷性和编码可靠性尚未融入该产品中。\n\
    \n## 无错误处理\n当尝试更改数据类型或长度时，这一限制最为明显。由于没有基于.NET 语言中常见的`try/catch`或`TryParse()`行为，例如，你无法在同一个表达式中尝试将文本值转换为数字并以编程方式处理任何类型转换错误。\n\
    \n## 不允许添加注释\n在使用冗长或复杂的表达式时，无法添加代码注释可能是一个显著的缺点。任何记录表达式目的的注释都必须在表达式之外完成——例如，在数据流或控制流表面上作为\
    \ SSIS 注释。\n\n### 复杂语句可能很困难\n简单的赋值或比较操作很容易实现，事后通常也易于理解。然而，即使给表达式引入适量的复杂性，也可能导致冗长且难以理解的语句。考虑一个多条件`If`语句的例子。在大多数其他方言中，可以简单地执行一个`If/Then/Else\
    \ If`操作来处理多个测试条件。但是，表达式语言没有这种行为，因此要构建这样的逻辑，你需要嵌套条件运算符。清单 10-1 展示了如何在 Transact-SQL\
    \ 的`CASE`操作中轻松处理四种可能的情况。相比之下，清单 10-2 展示了一个使用表达式语言的类似示例（注意我手动换行以适应页面）。尽管操作结果相同，但后者的条件运算符嵌套了两层，开发和维护起来更加困难。\n\
    \n***清单 10-1***. T-SQL 中的多条件求值\n\n```\nSELECT CASE WHEN @TestCase = 3 THEN 'Test\
    \ case = Solid'\n            WHEN @TestCase = 2 THEN 'Test case = Liquid'\n  \
    \          WHEN @TestCase = 1 THEN 'Test case = Gas'\n            ELSE 'Unknown\
    \ test case' END [TestCaseType]\n```\n\n***清单 10-2***. 表达式语言中的多条件求值\n\n```\n(TestCase\
    \ == 1) ? \"Test case = Gas\" : (TestCase == 2 ? \"Test case = Liquid\" : (TestCase\
    \ == 3 ? \"Test case = Solid\" : \"Unknown Test Case\"))\n```\n\n尽管存在这些微小的不足，SSIS\
    \ 表达式语言仍然是该产品不可或缺的一部分，并且正如你将在本章后面看到的，在一个精心设计的 ETL 生态系统中，它有一些非常实际的用途。\n\n## 让表达式语言发挥作用\n\
    既然你已经理解了表达式语言是什么（以及不是什么），现在我们来谈谈一些可以使用它来设计的模式。\n\n### 包表达式\n虽然不如其他用途常见，但可以使用 SSIS\
    \ 表达式来配置包级别的属性。以下是一些可以通过在包级别使用表达式来设置的属性：\n\n*   `Disable`（禁用）\n*   `DisableEventHandlers`（禁用事件处理程序）\n\
    *   `CheckpointFileName`（检查点文件名）\n*   `MaxConcurrentExecutables`（最大并发可执行文件数）\n\
    *   `DelayValidation`（延迟验证）\n*   `Description`（描述）\n\n以`MaxConcurrentExecutables`（最大并发可执行文件数）为例，该属性定义了可以同时运行的可执行文件（包、任务等）的数量。通过使用表达式设置此属性，ETL\
    \ 开发人员将能够基于表达式可见的任何标准动态控制此值。\n\n尽管这些属性可以通过使用表达式进行配置，但更常见的做法是使用包参数（在较新版本的 SSIS\
    \ 中）或包配置（SQL Server 2008 及更早版本）来设置包级别选项。通常最好使用参数或配置在包继承层次结构中共享常用值，这为你提供了更大的灵活性和更轻松的维护。我揭示这个特定的设计模式更多是为了将其识别为一种反模式，而非为其定义参数使用场景。除非有某些业务案例或法规另有规定，更好的长期解决方案是将这些值外部化，而不是依赖表达式。\n\
    \n### 变量表达式\n如图 10-1 所示，你可以在“值”字段中为每个变量配置一个静态值，或者定义一个在运行时求值的值表达式。请注意，从 SQL Server\
    \ 2012 开始，变量窗口得到了改进——在旧版本中，静态值显示在变量窗口中，但你必须使用属性窗口来查看或更改变量的表达式。\n\n![9781484200834_Fig10-01.jpg](img/9781484200834_Fig10-01.jpg)\n\
    \n图 10-1. 与变量一起使用的表达式\n\n在实践中，我经常看到表达式被应用于变量值，然后将结果变量用作任务或组件上的属性（而不是直接使用表达式来设置属性）。我之所以喜欢这种设计模式，原因很简单：可重用性。组件共享某些属性的情况并不少见，为每个适用组件的每个共享属性构建表达式既是冗余的，也是不必要的。对于那些将在多个任务或组件之间共享的属性，将表达式逻辑集中到一个变量中，然后使用该变量来设置共享属性，这种方法要容易得多。这种方法可以实现更快的开发，并且在未来逻辑需要变更时也更易于维护。\n\
    \n使用这种设计模式时，别忘了你也可以“堆叠”变量值。在表达式语句中，你可以利用其他变量来设置当前变量的值。\n\n### 连接管理器\n使用 SSIS 表达式最实用、最常见的场所之一是连接管理器托盘。一般来说，通常最好将动态连接属性存储为参数，而不是表达式，尤其是在处理结构化数据时。由于连接元数据（服务器名称、用户名和密码）的敏感性和频繁变动性，大多数\
    \ ETL 专业人员选择将这些设置外部化，以便安全地存储在包外部，从而可以全局更改（而不是逐个包进行修改）。\n\n这种模式的一个反复出现的例外是与文件系统交互的连接。在几种情况下，使用表达式有助于减轻处理基于文件的源或目标的负担：\n\
    \n*   处理平面文件时，需要根据当前日期和/或时间戳为文件命名（例如 `Medicare_2014_06_01.txt`）。\n*   预期文件将按日期归档到文件系统中（例如\
    \ `D:\\Data\\2014\\06\\01\\Medicare.txt`）。\n*   计划作业加载一个文件名始终相同的文本文件，但需要保存每天文件的副本，而不覆盖前一天处理的文件。\n"
- fmt: 'For these cases, you can use a little dab of expression language to dynamically
    build directory paths and file names that your connections in SSIS will use. For
    this example, let’s assume that you’re generating a flat text file from within
    your package, and you want to use a dynamic file name based on the current date.
    By setting the `ConnectionString` property from within the Properties window of
    the instance of the Flat File Connection Manager, you can manipulate the runtime
    value of the file name. As shown in [Figure 10-2](#9781484200834_Ch10.xhtml#Fig2),
    you’re specifying the base file name and then appending the elements of the current
    date to build a customized file name.


    ![9781484200834_Fig10-02.jpg](images/9781484200834_Fig10-02.jpg)


    [Figure 10-2](#9781484200834_Ch10.xhtml#_Fig2). Dynamic file name using expression


    Note that the pattern just discussed could be further extended to include elements
    of time (hours/minutes/seconds) should your ETL requirements include a restraint
    for that level of granularity.


    Since we’re not going in-depth into all the syntactical elements of the expression
    language, I’ll just point out a couple of things I’ve done here:


    *   Because the backslash (`\`) is a special character in the expression language,
    I have to “escape” it (to negate its status as a special character) by using a
    double backslash (`\\`) when I include it as a string literal.

    *   Using `(DT_STR, n, 1252)`, I’m converting the integer value returned by the
    `DATEPART` function to ASCII text. In this case, I’m using code page `1252` with
    a maximum length of either `2` or `4` depending on the component of the date element.

    *   Using the `RIGHT` function, I’ll pad any single-digit month or day value with
    zeroes (e.g., so that “`3`” becomes “`03`”) to maintain consistency.


    Remember that this pattern is highly flexible. It can be utilized with almost
    any file connection, whether it’s to be used as a source or a destination. You’re
    not limited to just flat file connections here either; you can extend this logic
    to some of the other SSIS connections as well. I’ve used this same design pattern
    when dealing with FTP data as both a source and destination. By embedding the
    same logic within the properties of an FTP source, you can programmatically “walk”
    the directory structure of a remote server when it is in a known and predictable
    format such as this.


    ## Project-Level Connection Managers


    When working with projects in the catalog deployment model, you can expose connection
    information across multiple packages in the same project by way of project connection
    managers. When you are using older versions of SSIS (2008 or earlier), or when
    you are working in the package deployment model in later versions of SSIS, any
    connection manager defined within a package is independent of those in other packages.
    Starting with SSIS in SQL Server 2012, however, you now have the ability to attach
    a connection manager to your workspace at the project level. These are accessible
    to all packages within the same project.


    We’ll not go deeply into the new deployment model in this chapter, but it is important
    to point out how the use of expressions impacts project connection managers. Because
    they are attached to the project and not one particular package, the properties
    of these shared connections are common to all packages in the project. As such,
    any property setting on these project connection managers—including the use of
    expressions—would be immediately reflected in all packages in the project. This
    is a welcome and much needed improvement to the way packages interact with one
    another, but for those of us who have worked with previous versions of SSIS, it’s
    a bit of a paradigm shift. Don’t get caught off guard when an expression applied
    to a project connection in one package gets applied to the other packages in the
    project!


    ## Control Flow


    Within the control flow, there are a couple of different ways to implement SSIS
    expressions. First, each of the tasks and containers will expose several properties
    that are configurable using expressions. In addition, the paths between them (known
    as *precedence constraints*) allow ETL developers to customize the decision path
    when moving from one task/container to another.


    ### Conditional Execution Through Expressions and Constraints


    The essential function of the control flow is to manage the execution of package
    elements. By using precedence constraints, you can design a package so that tasks
    and containers are fired in the proper order and with the correct dependencies
    intact. For a simple example of this, think about a package that truncates and
    then loads a staging table. You can perform both of these tasks in the same package,
    but without a precedence constraint to cause the insert operation to occur after
    the `TRUNCATE TABLE` execution, you run the risk of inadvertently *loading and
    then deleting* the same data.


    You can configure precedence constraints to manage flow-based successful completion
    of the preceding task (the default behavior), or you may set them to cause the
    task to execute only if the preceding task fails. In addition, you can set the
    constraint to `Completion`, allowing the downstream task to fire when the upstream
    task is finished, regardless of its outcome. Tasks may have multiple precedence
    constraints, and you may set these so that any or all of them must be satisfied
    before the task to which they are attached will execute. [Figure 10-3](#9781484200834_Ch10.xhtml#Fig3)
    shows a fairly typical use of precedence constraints; note that the unlabeled
    arrows represent `Success` constraints, and the others are labeled as to their
    purpose. The dashed lines indicate that the task is configured to execute upon
    completion of *either* of the preceding tasks.


    ![9781484200834_Fig10-03.jpg](images/9781484200834_Fig10-03.jpg)


    [Figure 10-3](#9781484200834_Ch10.xhtml#_Fig3). Precedence constraints


    As useful as precedence constraints are, the domain of variability that they address
    is fairly limited: the only conditions that can be tested are whether a task completed
    as well as the success or failure of said task. In the brief example shown in
    [Figure 10-3](#9781484200834_Ch10.xhtml#Fig3), you can probably infer that I’m
    downloading one or more files from an external source, loading the data from those
    files into staging tables, and then merging (upserting) the data into a database
    table. Although there’s nothing technically wrong here, there is room for improvement.
    For example, what happens if there are no files to be processed? In the example
    shown, the truncation of the staging table, the loop through the file system to
    find the downloaded files (even if none exist), and the merge operation will all
    be executed even if there are no files to process.


    In the first job I ever held, I was responsible for, among other things, gathering
    stray shopping carts from the store parking lot and bringing them back inside.
    My boss once told me, “This job requires an excessive amount of walking, so do
    what you can to save steps.” All these years later, that advice still holds true.
    Why run through extra steps when you can simply skip past them if they are not
    needed? For the previous example, you can include a relatively simple expression
    to bypass the execution of the majority of the package when no files are found
    to process. Saving those steps saves CPU cycles, disk I/O, and other resources.'
