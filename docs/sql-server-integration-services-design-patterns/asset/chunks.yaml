- fmt: '# DQS Cleansing Transformation


    The DQS Cleansing transformation logs information events that indicate when it
    sends rows to the DQS server. There will be one event for each batch, and one
    event at the end, with a summary for all records. The messages contain details
    about how long the cleansing process took to process the batch, and the counts
    for each status. [Listing 5-1](#9781484200834_Ch05.xhtml#list1) shows an example
    of what these messages look like. The transform processes data in 10,000 row chunks.
    The chunk size is currently hardcoded; there is no way to configure the size of
    the batch sent to the DQS server.


    **Listing 5-1**. DQS Cleansing Transform Log Messages


    ```

    [DQS Cleansing] Information: The DQS Cleansing component received 1000 records
    from the DQS server. The data cleansing process took 7 seconds.

    [DQS Cleansing] Information: DQS Cleansing component records chunk status count
    - Invalid: 0, Autosuggest: 21, Corrected: 979, Unknown: 0, Correct: 0.

    [DQS Cleansing] Information: DQS Cleansing component records total status count
    - Invalid: 0, Autosuggest: 115, Corrected: 4885, Unknown: 0, Correct: 0.

    ```


    ## DQS Extensions on CodePlex


    A number of DQS extensions are available from CodePlex. These are listed in [Table
    5-3](#9781484200834_Ch05.xhtml#Tab3). They do not come with SQL Server 2014, but
    they are very useful for automating data cleansing scenarios. A brief description
    on how to use each one is included here. You can find more information on how
    to use them from their project pages on CodePlex.


    **Table 5-3**. DQS Extensions on CodePlex


    | Extension | Description |

    | --- | --- |

    | DQS Matching | This transform allows you to do automated data deduplication
    within an SSIS data flow. It provides similar capabilities as the SSIS Fuzzy Grouping
    transform but also leverages the DQS matching policy defined within your knowledge
    base to give more accurate results. |

    | DQS Domain Value Import | This destination component allows you to bulk load
    values into a DQS domain. It is useful for automation scenarios where your domain
    values are defined within an external system (such as Master Data Services). |

    | Publish DQS Knowledge Base | This task is used to commit changes to your knowledge
    base (referred to as *publishing* in DQS terminology). The task is typically used
    in conjunction with the DQS Domain Value Import transform. |


    ![Image](images/sq.jpg) `Note` The CodePlex extensions for DQS were created by
    OH22 Data (`http://data.oh22.net/`) and are freely available. They are not officially
    supported by Microsoft. The extensions can be downloaded from `https://ssisdqsmatching.codeplex.com/`
    and `https://domainvalueimport.codeplex.com/`.


    ## Cleansing Data in the Data Flow


    The following section contains design patterns for cleansing data in the SSIS
    data flow using the DQS Cleansing transform. There are two key issues to keep
    in mind when cleansing data:


    *   The cleansing process is based on the rules within your knowledge base. The
    better the cleansing rules are, the more accurate your cleansing process will
    be. You may want to reprocess your data as the rules in your knowledge base improve.

    *   Cleansing large amounts of data can take a long time. See the “Performance
    Considerations” section later in this chapter for patterns that you can apply
    to reduce overall processing time.


    ### Handling the Output of the DQS Cleansing Transform


    The DQS Cleansing transform adds a number of new columns to the data flow (as
    described earlier in this chapter). The way you’ll handle the processed rows will
    usually depend on the status of the row, which is set in the `Record Status` column.
    A Conditional Split transformation can be used to redirect rows down the appropriate
    data flow path. [Figure 5-11](#9781484200834_Ch05.xhtml#Fig11) shows what the
    Conditional Split transformation would look like with a separate output for each
    `Record Status` value. [Table 5-4](#9781484200834_Ch05.xhtml#Tab4) contains a
    list of possible status values.


    ![9781484200834_Fig05-11.jpg](images/9781484200834_Fig05-11.jpg)


    **Figure 5-11**. Conditional Split transformation configured to process the DQS
    `Record Status`


    **Table 5-4**. Column Status Values


    | Option | Description |

    | --- | --- |

    | `Correct` | The value was already correct and needs no further modification.
    The `Corrected` column will contain the original value. |

    | `Invalid` | The domain contained validation rules that marked this value as
    invalid. |

    | `Corrected` | The value was incorrect, but DQS was able to correct it. The `Corrected`
    column will contain the modified value. |

    | `New` | The value wasn’t in the current domain and did not match any domain
    rules. DQS is unsure whether or not it is valid. The value should be redirected
    and manually inspected. |

    | `Auto suggest` | The value wasn’t an exact match, but DQS has provided a suggestion.
    If you include the `Confidence` field, you could automatically accept rows above
    a certain confidence level and redirect others to a separate table for later review.
    |


    ![Image](images/sq.jpg) `Note` The column status values are localized; the actual
    string will change depending on the language of your SQL Server installation.
    This might require you to add additional processing logic to your Conditional
    Split expressions if you expect your packages to run under different system locales.
    For more information about the status values, see the “Data Cleansing” page in
    books online: `http://msdn.microsoft.com/en-us/library/gg524800.aspx`.


    The status values you handle and the downstream data flow logic you use will depend
    on the goals of your data cleansing process. Typically, you will want to split
    your rows into two paths. `Correct`, `Corrected`, and `Auto suggest` rows will
    go down a path that will update your destination table with the cleansed data
    values (found in the `<column_name>_Output` column). `New` and `Invalid` rows
    will usually go into a separate table so that someone can examine them later on
    and either correct the data (in the case of `Invalid` rows), or update the knowledge
    base (in the case of `New` rows) so that these values can be handled automatically
    in the future. You may wish to include a check against the confidence level (`<column_name>_Confidence`)
    of the `Auto suggest` rows to make sure it meets a minimum threshold. [Figure
    5-12](#9781484200834_Ch05.xhtml#Fig12) shows an SSIS data flow with logic to process
    rows from the DQS Cleansing transform.


    ![9781484200834_Fig05-12.jpg](images/9781484200834_Fig05-12.jpg)


    **Figure 5-12**. Data Flow processing logic following a DQS Cleansing transform


    ![Image](images/sq.jpg) `Note` Although the `Confidence` column’s output by the
    DQS Cleansing transforms are numeric, they are output as `DT_WSTR(100)` columns
    (strings). To check the confidence level against a minimum threshold, you’ll need
    to cast the value to a `DT_R4` (float) or `DT_R8` (double).


    ## Performance Considerations'
  raw: 'The DQS Cleansing transformation logs information events that indicate when
    it sends rows to the DQS server. There will be one event for each batch, and one
    event at the end, with a summary for all records. The messages contain details
    about how long the cleansing process took to process the batch, and the counts
    for each status. [Listing 5-1](#9781484200834_Ch05.xhtml#list1) shows an example
    of what these messages look like. The transform processes data in 10,000 row chunks.
    The chunk size is currently hardcoded; there is no way to configure the size of
    the batch sent to the DQS server.


    [***Listing 5-1***](#9781484200834_Ch05.xhtml#_list1). DQS Cleansing Transform
    Log Messages


    ```

    [DQS Cleansing] Information: The DQS Cleansing component received 1000 records
    from the DQS server. The data cleansing process took 7 seconds.

    [DQS Cleansing] Information: DQS Cleansing component records chunk status count
    - Invalid: 0, Autosuggest: 21, Corrected: 979, Unknown: 0, Correct: 0.

    [DQS Cleansing] Information: DQS Cleansing component records total status count
    - Invalid: 0, Autosuggest: 115, Corrected: 4885, Unknown: 0, Correct: 0.

    ```


    DQS Extensions on CodePlex


    A number of DQS extensions are available from CodePlex. These are listed in [Table
    5-3](#9781484200834_Ch05.xhtml#Tab3). They do not come with SQL Server 2014, but
    they are very useful for automating data cleansing scenarios. A brief description
    on how to use each one is included here. You can find more information on how
    to use them from their project pages on CodePlex.


    [Table 5-3](#9781484200834_Ch05.xhtml#_Tab3). DQS Extensions on CodePlex


    | Extension | Description |

    | --- | --- |

    | DQS Matching | This transform allows you to do automated data deduplication
    within an SSIS data flow. It provides similar capabilities as the SSIS Fuzzy Grouping
    transform but also leverages the DQS matching policy defined within your knowledge
    base to give more accurate results. |

    | DQS Domain Value Import | This destination component allows you to bulk load
    values into a DQS domain. It is useful for automation scenarios where your domain
    values are defined within an external system (such as Master Data Services). |

    | Publish DQS Knowledge Base | This task is used to commit changes to your knowledge
    base (referred to as *publishing* in DQS terminology). The task is typically used
    in conjunction with the DQS Domain Value Import transform. |


    ![Image](images/sq.jpg) **Note**  The CodePlex extensions for DQS were created
    by OH22 Data (`http://data.oh22.net/`) and are freely available. They are not
    officially supported by Microsoft. The extensions can be downloaded from `https://ssisdqsmatching.codeplex.com/`
    and `https://domainvalueimport.codeplex.com/`.


    Cleansing Data in the Data Flow


    The following section contains design patterns for cleansing data in the SSIS
    data flow using the DQS Cleansing transform. There are two key issues to keep
    in mind when cleansing data:


    *   The cleansing process is based on the rules within your knowledge base. The
    better the cleansing rules are, the more accurate your cleansing process will
    be. You may want to reprocess your data as the rules in your knowledge base improve.

    *   Cleansing large amounts of data can take a long time. See the “Performance
    Considerations” section later in this chapter for patterns that you can apply
    to reduce overall processing time.


    Handling the Output of the DQS Cleansing Transform


    The DQS Cleansing transform adds a number of new columns to the data flow (as
    described earlier in this chapter). The way you’ll handle the processed rows will
    usually depend on the status of the row, which is set in the `Record Status` column.
    A Conditional Split transformation can be used to redirect rows down the appropriate
    data flow path. [Figure 5-11](#9781484200834_Ch05.xhtml#Fig11) shows what the
    Conditional Split transformation would look like with a separate output for each
    `Record Status` value. [Table 5-4](#9781484200834_Ch05.xhtml#Tab4) contains a
    list of possible status values.


    ![9781484200834_Fig05-11.jpg](images/9781484200834_Fig05-11.jpg)


    [Figure 5-11](#9781484200834_Ch05.xhtml#_Fig11). Conditional Split transformation
    configured to process the DQS `Record Status`


    [Table 5-4](#9781484200834_Ch05.xhtml#_Tab4). Column Status Values


    | Option | Description |

    | --- | --- |

    | `Correct` | The value was already correct and needs no further modification.
    The `Corrected` column will contain the original value. |

    | `Invalid` | The domain contained validation rules that marked this value as
    invalid. |

    | `Corrected` | The value was incorrect, but DQS was able to correct it. The `Corrected`
    column will contain the modified value. |

    | `New` | The value wasn’t in the current domain and did not match any domain
    rules. DQS is unsure whether or not it is valid. The value should be redirected
    and manually inspected. |

    | `Auto suggest` | The value wasn’t an exact match, but DQS has provided a suggestion.
    If you include the `Confidence` field, you could automatically accept rows above
    a certain confidence level and redirect others to a separate table for later review.
    |


    ![Image](images/sq.jpg) **Note**  The column status values are localized; the
    actual string will change depending on the language of your SQL Server installation.
    This might require you to add additional processing logic to your Conditional
    Split expressions if you expect your packages to run under different system locales.
    For more information about the status values, see the “Data Cleansing” page in
    books online: `http://msdn.microsoft.com/en-us/library/gg524800.aspx``.`


    The status values you handle and the downstream data flow logic you use will depend
    on the goals of your data cleansing process. Typically, you will want to split
    your rows into two paths. `Correct`, `Corrected`, and `Auto suggest` rows will
    go down a path that will update your destination table with the cleansed data
    values (found in the `<column_name>_Output` column). `New` and `Invalid` rows
    will usually go into a separate table so that someone can examine them later on
    and either correct the data (in the case of `Invalid` rows), or update the knowledge
    base (in the case of `New` rows) so that these values can be handled automatically
    in the future. You may wish to include a check against the confidence level (`<column_name>_Confidence`)
    of the `Auto suggest` rows to make sure it meets a minimum threshold. [Figure
    5-12](#9781484200834_Ch05.xhtml#Fig12) shows an SSIS data flow with logic to process
    rows from the DQS Cleansing transform.


    ![9781484200834_Fig05-12.jpg](images/9781484200834_Fig05-12.jpg)


    [Figure 5-12](#9781484200834_Ch05.xhtml#_Fig12). Data Flow processing logic following
    a DQS Cleansing transform


    ![Image](images/sq.jpg) **Note**  Although the `Confidence` column’s output by
    the DQS Cleansing transforms are numeric, they are output as `DT_WSTR(100)` columns
    (strings). To check the confidence level against a minimum threshold, you’ll need
    to cast the value to a `DT_R4` (float) or `DT_R8` (double).


