    \ T-SQL 元数据加载脚本。\n\n## 在 T-SQL 中检索 SSIS 应用程序\n\n现在，SSIS 应用程序元数据已存储在 `SSISConfig`\
    \ 数据库中。太好了，接下来呢？是时候构建一个存储过程，以便为给定的 SSIS 应用程序返回我们想要的 SSIS 包元数据了。清单 A-10 包含了用于构建名为\
    \ `cfg.GetSSISApplication` 的存储过程的 T-SQL 数据定义语言脚本。\n\n***清单 A-10***. 创建 `cfg.GetSSISApplication`\
    \ 存储过程\n\n```\n/* cfg.GetSSISApplication 存储过程 */\nIf Exists(Select s.name + '.'\
    \ + p.name\n          From sys.procedures p\n          Join sys.schemas s\n  \
    \          On s.schema_id = p.schema_id\n          Where s.name = 'cfg'\n    \
    \        And p.name = 'GetSSISApplication')\n begin\n  print '正在删除 cfg.GetSSISApplication\
    \ 存储过程'\n  Drop Procedure cfg.GetSSISApplication\n  print 'Cfg.GetSSISApplication\
    \ 存储过程已删除'\n end\n\nprint '正在创建 cfg.GetSSISApplication 存储过程'\ngo\n\nCreate Procedure\
    \ cfg.GetSSISApplication\n @ApplicationName varchar(255)\nAs\n Select p.PackageFolder\
    \ + p.PackageName As PackagePath\n     , ap.ExecutionOrder\n     , p.PackageName\n\
    \     , p.PackageFolder\n     , ap.AppPackageID\n From cfg.AppPackages ap\n Inner\
    \ Join cfg.Packages p on p.PackageID = ap.PackageID\n Inner Join cfg.Applications\
    \ a on a.ApplicationID = ap.ApplicationID\n Where ApplicationName = @ApplicationName\n\
    \ Order By ap.ExecutionOrder\ngo\n\nprint 'Cfg.GetSSISApplication 存储过程已创建.'\n\
    print ''\n```\n\n清单 A-10 中所示的 `cfg.GetSSISApplication` 存储过程接受一个参数——`ApplicationName`——并使用此值查找与该名称的\
    \ SSIS 应用程序关联的 SSIS 包。注意返回的列：\n\n*   `PackagePath`\n*   `ExecutionOrder`\n*  \
    \ `PackageName`\n*   `PackagePath`\n\n还需注意，SSIS 包是按照 `ExecutionOrder` 指定的顺序返回的。\n\
    \n现在，通过执行以下 T-SQL 语句，使用 `SSISConfig` 数据库中的现有元数据来测试该存储过程：\n\n```\nexec cfg.GetSSISApplication\
    \ 'SSISApp1'\n```\n\n我的结果显示如图 A-7 所示。\n\n![9781484200834_FigAppA-07.jpg](img/9781484200834_FigAppA-07.jpg)\n\
    \n图 A-7. `cfg.GetSSISApplication` 语句的结果\n\n图 A-7 展示了存储过程语句执行的结果——一个包含两行数据的结果集——这些数据代表了\
    \ `SSISConfig` 数据库中名为 `SSISApp1` 的 SSIS 应用程序所关联的 SSIS 包元数据。\n\n工作量真不小！幸运的是，我们大部分都不需要重复这些工作。将来当你想要添加\
    \ SSIS 包并将其与 SSIS 应用程序关联时，脚本看起来会像清单 A-11 中所示的 T-SQL 那样。\n\n***清单 A-11***. 添加 `SSISApp1`\
    \ 及相关 SSIS 包的完整 T-SQL 脚本\n\n```\nUse SSISConfig\ngo\n\n/* 变量声明 */\ndeclare @PackageFolder\
    \ varchar(255) = 'F:\\Andy\\Projects\\PublicFramework_PackageDeployment_2014\\\
    SSISConfig2014\\'\ndeclare @PackageName varchar(255) = 'Child1.dtsx'\ndeclare\
    \ @PackageID int\ndeclare @ExecutionOrder int = 10\n\n declare @ApplicationName\
    \ varchar(255) = 'SSISApp1'\n declare @ApplicationID int\n\n/* 添加第一个 SSIS 应用程序\
    \ */\nIf Not Exists(Select ApplicationName\n               From cfg.Applications\n\
    \               Where ApplicationName = @ApplicationName)\n begin\n  print '正在添加\
    \ ' + @ApplicationName\n  exec cfg.AddSSISApplication @ApplicationName, @ApplicationID\
    \ output\n  print @ApplicationName + ' 已添加.'\n end\nElse\n begin\n  Select @ApplicationID\
    \ = ApplicationID\n  From cfg.Applications\n  Where ApplicationName = @ApplicationName\n\
    \  print @ApplicationName + ' 已存在于框架中.'\n end\n\nprint ''\n\n/* 添加 Child1.dtsx\
    \ SSIS 包*/\nIf Not Exists(Select PackageFolder + PackageName\n               From\
    \ cfg.Packages\n               Where PackageFolder = @PackageFolder\n        \
    \         And PackageName = @PackageName)\n begin\n  print '正在添加 ' + @PackageFolder\
    \ + @PackageName\n  exec cfg.AddSSISPackage @PackageName, @PackageFolder, @PackageID\
    \ output\n end\nElse\n begin\n  Select @PackageID = PackageID\n  From cfg.Packages\n\
    \  Where PackageFolder = @PackageFolder\n    And PackageName = @PackageName\n\
    \  print @PackageFolder + @PackageName + ' 已存在于框架中.'\n end\n\n If Not Exists(Select\
    \ AppPackageID\n               From cfg.AppPackages\n               Where ApplicationID\
    \ = @ApplicationID\n                 And PackageID = @PackageID\n            \
    \     And ExecutionOrder = @ExecutionOrder)\n begin\n  print '正在将 ' + @ApplicationName\
    \ + '.' + @PackageName + ' 以 ExecutionOrder ' + convert(varchar, @ExecutionOrder)\
    \ + ' 添加到框架中'\n  exec cfg.AddSSISApplicationPackage @ApplicationID, @PackageID,\
    \ @ExecutionOrder\n  print @PackageName + ' 已添加并连接到 ' + @ApplicationName\n end\n\
    \ Else\n  print @ApplicationName + '.' + @PackageName + ' 已存在于框架中，ExecutionOrder\
    \ 为 ' + convert(varchar, @ExecutionOrder)\n\n/*Child2.dtsx */\nset @PackageName\
    \ = 'Child2.dtsx'\nset @ExecutionOrder = 20\n\nIf Not Exists(Select PackageFolder\
    \ + PackageName\n               From cfg.Packages\n               Where PackageFolder\
    \ = @PackageFolder\n                 And PackageName = @PackageName)\n begin\n\
    \  print '正在添加 ' + @PackageFolder + @PackageName\n  exec cfg.AddSSISPackage @PackageName,\
    \ @PackageFolder, @PackageID output\n end\nElse\n begin\n  Select @PackageID =\
    \ PackageID\n  From cfg.Packages\n  Where PackageFolder = @PackageFolder\n   \
    \ And PackageName = @PackageName\n  print @PackageFolder + @PackageName + ' 已存在于框架中.'\n\
    \ end\n\nIf Not Exists(Select AppPackageID\n               From cfg.AppPackages\n\
    \               Where ApplicationID = @ApplicationID\n                 And PackageID\
    \ = @PackageID\n                 And ExecutionOrder = @ExecutionOrder)\n begin\n\
    \  print '正在将 ' + @ApplicationName + '.' + @PackageName + ' 以 ExecutionOrder '\
    \ + convert(varchar, @ExecutionOrder) + ' 添加到框架中'\n  exec cfg.AddSSISApplicationPackage\
    \ @ApplicationID, @PackageID, @ExecutionOrder\n  print @PackageName + ' 已添加并连接到\
    \ ' + @ApplicationName\n end\n Else\n  print @ApplicationName + '.' + @PackageName\
    \ + ' 已存在于框架中，ExecutionOrder 为 ' + convert(varchar, @ExecutionOrder)\n```\n\n\
    ## 在 SSIS 中检索 SSIS 应用程序\n\n返回 SSDT-BI 并打开 \"获取包元数据执行 SQL 任务\" 的编辑器。将 \"结果集\" 属性从\
    \ \"单行\" 更改为 \"完整结果集\"，并将 \"SQLStatement\" 属性更改为 `cfg.GetSSISApplication`。将 \"\
    IsQueryStoredProcedure\" 属性设置为 `True`。在 \"参数映射\" 选项卡上，单击 \"添加\" 按钮。单击 \"变量名\"\
    \ 列中的下拉菜单，选择 `<新变量...>`（你可能需要向上滚动才能找到 `<新变量...>`）。\n"
- fmt: "在**Add Variable**窗口中，确保`Container`属性设置为`Parent`。将`Name`属性更改为`ApplicationName`。`Namespace`应设置为`User`，`Value\
    \ Type`属性应设置为`String`。对于`Value`属性，输入`SSISApp1`。**Add Variable**窗口应如图A-8所示。\n\n\
    ![9781484200834_FigAppA-08.jpg](images/9781484200834_FigAppA-08.jpg)\n\n[图 A-8](#9781484200834_AppA.xhtml#_Fig8).\
    \ 添加`ApplicationName`变量\n\n点击`OK`按钮关闭**Add Variable**窗口，并将`ApplicationName`变量的`Data\
    \ Type`更改为`String`。将`Parameter Name`更改为`ApplicationName`。导航到**Result Set**页面，将结果名为`0`的变量从`User::ChildPackagePath`更改为一个新变量，设置如下：\n\
    \n*   `Container`: `Parent`\n*   `Name`: `Packages`\n*   `Namespace`: `User`\n\
    *   `Value Type`: `Object`\n\n点击`OK`按钮关闭**Add Variable**窗口，然后再次点击`OK`按钮关闭**Execute\
    \ SQL Task Editor**。删除**Get Package Metadata Execute SQL**任务和**Execute Child Package\
    \ Execute Package**任务之间的优先级约束。将一个**Foreach Loop**容器拖到控制流上，然后将**Execute Child Package\
    \ Execute Package**任务拖到其内部。从**Get Package Metadata Execute SQL**任务到新的**Foreach\
    \ Loop**容器添加一个优先级约束，并将该**Foreach Loop**容器重命名为`Foreach Child Package`。打开`Foreach\
    \ Child Package` **Foreach Loop**容器的编辑器并导航到**Collection**页面。将`Enumerator`更改为`Foreach\
    \ ADO Enumerator`。在`ADO Object Source Variable`下拉列表中，选择`User::`Packages变量。接受默认的`Enumeration\
    \ Mode`: `Rows in the First Table`。\n\n导航到**Foreach Loop Editor**中的**Variable\
    \ Mappings**页面。点击`Variable`下拉列表并选择`User::ChildPackagePath`变量。`Index`属性将默认为`0`——请勿更改它。\n\
    \n我们刚刚所做的更改实现了以下功能：\n\n1.  在`SSISConfig`数据库中执行`cfg.GetSSISApplications`存储过程，向其传递`ApplicationName`变量中包含的值。\n\
    2.  将存储过程执行返回的完整结果集推入一个名为`Packages`的SSIS对象变量。\n3.  配置一个**Foreach Loop**，按返回的顺序指向`Packages`变量中存储的每一行。\n\
    4.  将**Foreach Loop**所指向行的第一列（`Column 0`）中包含的值推入`User::ChildPackagePath`变量。\n\n\
    当`ChildPackagePath`变量的值发生变化时，`Child.dtsx`文件连接管理器的`ConnectionString`属性会动态更新，将连接管理器指向`User::ChildPackagePath`中包含的路径。\n\
    \n点击`OK`按钮关闭**Foreach Loop Container Editor**，并在SSDT调试器中执行`Parent.dtsx` SSIS包。执行后，您会看到两个消息框。第一个显示“I\
    \ am Child1”，第二个如图A-9所示。\n\n![9781484200834_FigAppA-09.jpg](images/9781484200834_FigAppA-09.jpg)\n\
    \n[图 A-9](#9781484200834_AppA.xhtml#_Fig9). 执行一个测试序列化SSIS框架\n\n就目前而言，这段代码构成了一个SSIS执行框架。数据库包含元数据，父包执行SSIS包。接下来是监控。\n\
    \n## 监控执行\n\n大多数有经验的业务智能开发者会告诉您从报告开始，然后回溯到源数据。在这种情况下，源数据是从数据集成过程收集的信息。什么样的信息？比如开始和结束执行时间、执行状态以及错误和事件消息。\n\
    \n每个SSIS应用程序和SSIS包执行都会记录实例数据。每个条目代表一次执行，有两个表保存这些条目：`Log.SSISAppInstance`保存关于SSIS应用程序实例的执行指标，`Log.SSISPkgInstance`保存SSIS子包实例的执行指标。当一个SSIS应用程序启动时，会在`log.SSISAppInstance`表中插入一行。当SSIS应用程序完成时，该行会被更新。`log.SSISPkgInstance`对SSIS应用程序中的每个SSIS包以相同的方式工作。一个SSIS应用程序实例在逻辑上由应用程序ID和开始时间组成。一个SSIS包实例由应用程序实例ID、应用程序包ID和开始时间组成。\n\
    \n错误和事件记录相对简单。您存储错误或事件的描述、发生时间以及实例ID。这就是报告将反映的内容，记录也就这些了。\n\n## 构建应用程序实例记录\n\n\
    让我们回到SSMS来构建支持记录的表和存储过程。您需要执行[清单 A-12](#9781484200834_AppA.xhtml#list12)中显示的T-SQL脚本来构建实例表和存储过程。\n\
    \n[清单 A-12](#9781484200834_AppA.xhtml#_list12). 构建应用程序实例表和存储过程\n\n```sql\n/* log\
    \ schema */\nIf Not Exists(Select name\n              From sys.schemas\n     \
    \         Where name = 'log')\n begin\n  print 'Creating log schema'\n  declare\
    \ @sql varchar(100) = 'Create Schema [log]'\n  exec(@sql)\n  print 'Log schema\
    \ created'\n end\nElse\n print 'Log schema already exists.'\nprint ''\n\n/* log.SSISAppInstance\
    \ table */\nIf Not Exists(Select s.name + '.' + t.name\n              From sys.tables\
    \ t\n              Join sys.schemas s\n               On s.schema_id = t.schema_id\n\
    \              Where s.name = 'log'\n               And t.name = 'SSISAppInstance')\n\
    \ begin\n  print 'Creating log.SSISAppInstance table'\n  Create Table [log].SSISAppInstance\n\
    \  (\n    AppInstanceID int identity(1,1)\n     Constraint PK_SSISAppInstance\n\
    \      Primary Key Clustered\n  ,ApplicationID int Not Null\n  Constraint FK_logSSISAppInstance_cfgApplication_ApplicationID\n\
    \  Foreign Key References cfg.Applications(ApplicationID)\n  ,StartDateTime datetime\
    \ Not Null\n     Constraint DF_cfgSSISAppInstance_StartDateTime\n      Default(GetDate())\n\
    \  ,EndDateTime datetime Null\n  ,[Status] varchar(12) Null\n  )\n  print 'Log.SSISAppInstance\
    \ created'\n end\nElse\n print 'Log.SSISAppInstance table already exists.'\nprint\
    \ ''\n\n/* log.LogStartOfApplication stored procedure */\nIf Exists(Select s.name\
    \ + '.' + p.name\n          From sys.procedures p\n          Join sys.schemas\
    \ s\n           On s.schema_id = p.schema_id\n          Where s.name = 'log'\n\
    \           And p.name = 'LogStartOfApplication')\n begin\n  print 'Dropping log.LogStartOfApplication\
    \ stored procedure'\n  Drop Procedure [log].LogStartOfApplication\n  print 'Log.LogStartOfApplication\
    \ stored procedure dropped'\n end\nprint 'Creating log.LogStartOfApplication stored\
    \ procedure'\ngo\n\nCreate Procedure [log].LogStartOfApplication\n @ApplicationName\
    \ varchar(255)\nAs\n declare @ErrMsg varchar(255)\n declare @AppID int = (Select\
    \ ApplicationID\n                       From cfg.Applications\n              \
    \         Where ApplicationName = @ApplicationName)\n\n If (@AppID Is Null)\n\
    \  begin\n   set @ErrMsg = 'Cannot find ApplicationName ' + Coalesce(@ApplicationName,\
    \ '<NULL>')\n   raiserror(@ErrMsg,16,1)\n   return-1\n  end\n\n Insert Into [log].SSISAppInstance\n\
    \ (ApplicationID, StartDateTime, Status)\n Output inserted.AppInstanceID\n Values\n\
    \ (@AppID, GetDate(), 'Running')\ngo\nprint 'Log.LogStartOfApplication stored\
    \ procedure created.'\nprint ''\n\n/* log.LogApplicationSuccess stored procedure\
    \ */\nIf Exists(Select s.name + '.' + p.name\n          From sys.procedures p\n\
    \          Join sys.schemas s\n           On s.schema_id = p.schema_id\n     \
    \     Where s.name = 'log'\n           And p.name = 'LogApplicationSuccess')\n\
    \ begin\n  print 'Dropping log.LogApplicationSuccess stored procedure'\n  Drop\
    \ Procedure [log].LogApplicationSuccess\n  print 'Log.LogApplicationSuccess stored\
    \ procedure dropped'\n end\n```"
  raw: 'In the Add Variable window, make sure the Container property is set to Parent.
    Change the Name property to</new></new> **ApplicationName**. The Namespace should
    be **User** and the Value Type property should be set to String. For the Value
    property, enter **SSISApp1**. The Add Variable window should appear as shown in
    [Figure A-8](#9781484200834_AppA.xhtml#Fig8).    ![9781484200834_FigAppA-08.jpg](images/9781484200834_FigAppA-08.jpg)    [Figure
    A-8](#9781484200834_AppA.xhtml#_Fig8). Adding the ApplicationName variable    Click
    the OK button to close the Add Variable window and change the Data Type of the
    `ApplicationName` variable to String. Change the Parameter Name to `ApplicationName`.
    Navigate to the Result Set page and change the `0` result name variable from `User::``ChildPackagePath`
    to a new variable with the following settings:    *   Container: Parent *   Name:
    `Packages` *   Namespace: User *   Value Type: Object    Click the OK button to
    close the Add Variable window, and click the OK button to close the Execute SQL
    Task Editor. Delete the precedence constraint between the Get Package Metadata
    Execute SQL task and the Execute Child Package Execute Package task. Drag a Foreach
    Loop container onto the control flow and then drag the Execute Child Package Execute
    Package task inside it. Add a precedence constraint from the Get Package Metadata
    Execute SQL task to the new Foreach Loop container, and rename the Foreach Loop
    container **Foreach Child Package**. Open the Foreach Child Package Foreach Loop
    container’s editor and navigate to the Collection page. Change the Enumerator
    to Foreach ADO Enumerator. In the ADO Object Source Variable drop-down, select
    the `User::Packages` variable. Accept the default Enumeration Mode: Rows in the
    First Table.    Navigate to the Variable Mappings page in the Foreach Loop Editor.
    Click on the Variable drop-down and select the `User::ChildPackagePath` variable.
    The Index property will default to 0—do not change it.    The changes we just
    made accomplish the following:    1.  Execute the `cfg.GetSSISApplications` stored
    procedure in the `SSISConfig` database, passing it the value contained in the
    `ApplicationName` variable. 2.  Push the full result set returned by the stored
    procedure execution into an SSIS object variable named `Packages`. 3.  Configure
    a Foreach Loop to point at each row stored in the `Packages` variable in the order
    returned. 4.  Push the value contained in the first column (Column `0`) of the
    row to which the Foreach Loop points into the `User::ChildPackagePath` variable.    When
    the value of the `ChildPackagePath` variable changes, the `ConnectionString` property
    of the `Child.dtsx` file connection manager is dynamically updated, aiming the
    connection manager at the path contained in `User::ChildPackagePath`.    Click
    the OK button to close the Foreach Loop Container Editor and execute the `Parent.dtsx`
    SSIS package in the SSDT debugger. When you do this, you get two message boxes.
    The first states “I am Child1” and the second appears as shown in [Figure A-9](#9781484200834_AppA.xhtml#Fig9).    ![9781484200834_FigAppA-09.jpg](images/9781484200834_FigAppA-09.jpg)    [Figure
    A-9](#9781484200834_AppA.xhtml#_Fig9). Executing a test serial SSIS framework    This
    code, as it stands, composes an SSIS execution framework. The database contains
    the metadata and the parent package executes the SSIS packages. Monitoring is
    next.    Monitoring Execution    Most experienced business intelligence developers
    will tell you to start with the reports and work your way back to the source data.
    The source data in this particular case is information collected from the data
    integration process. What kind of information? Things like start and end execution
    times, execution status, and error and event messages.    Instance data is recorded
    for each SSIS application and SSIS package execution. Each entry represents an
    execution, and there are two tables that hold these entries: `Log.


    SSISAppInstance` holds execution metrics about SSIS application instances, and
    `Log.SSISPkgInstance` holds execution metrics for SSIS child package instances.
    When an SSIS application starts, a row is inserted into the `log.SSISAppInstance`
    table. When the SSIS application completes, the row is updated. `log.SSISPkgInstance`
    works the same way for each SSIS package in an SSIS application. An SSIS application
    instance is logically comprised of an application ID and a start time. An SSIS
    package instance is comprised of an application instance ID, application package
    ID, and a start time.    Error and event logging is relatively straightforward.
    You store a description of the error or event, the time it occurred, and the instance
    IDs. That’s what the reports will reflect, and that’s all there is to logging.    Building
    Application Instance Logging    Let’s return to SSMS to build the tables and stored
    procedures to support logging. You need to execute the T-SQL script shown in [Listing
    A-12](#9781484200834_AppA.xhtml#list12) to build the instance tables and stored
    procedures.    [***Listing A-12***](#9781484200834_AppA.xhtml#_list12). Building
    the Application Instance Tables and Stored Procedures    ``` /* log schema */
