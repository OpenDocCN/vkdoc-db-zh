    Finally, pick your new or existing connection manager and click the `OK` button.
    This will create the connection manager and add the `SQL Server` source to the
    `Data Flow` task. You can then immediately pick up your development by creating
    and optimizing the `SQL` query. The `Source Assistant` is a great way to get started
