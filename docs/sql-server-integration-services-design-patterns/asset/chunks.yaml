- fmt: '# CHAPTER 11


    ## Data Warehouse Patterns


    SQL Server Integration Services is an excellent all-purpose ETL tool. Because
    of its versatility, it is used by DBAs, developers, BI professionals, and even
    business principals in many different scenarios. Sometimes it’s a dump truck,
    used for the wholesale movement of enormous amounts of data. Other times it’s
    more like a scalpel, carving out with precision just the right amount of data.


    Though it is a great tool in other areas, SSIS truly excels when used as a data
    warehouse ETL tool. It would be hard to argue that data warehousing isn’t its
    primary purpose in life. From native slowly changing dimension (SCD) elements
    to recently added CDC processing tasks and components, SSIS has all the hooks
    it needs to compete with data warehouse ETL tools at much higher price points.


    In this chapter, we’ll discuss design patterns applicable to loading a data warehouse
    using SQL Server Integration Services. From incremental loads to error handling
    and general workflow, we’ll investigate methodologies and best practices that
    can be applied in SSIS data warehouse ETL.


    ## Conclusion


    ETL can be hard. Often, it’s not the big design problems but the small “how do
    I . . .?” tactical questions that collectively cause the most friction during
    SSIS development. The SSIS expression language was designed for these types of
    questions. Its small footprint, somewhat familiar syntax, and extensive usability
    across the breadth of SSIS make it an excellent addition to the capabilities within
    Integration Services. Used properly, it can help to address a variety of problem
    domains and hopefully ease the burden on the ETL developer.


    ## SSIS 表达式的使用场景


    ### 表达式过于复杂时


    *   **The expression will be exceptionally lengthy**: If the logic required in
    an expression would exceed more than a few hundred characters, a script or other
    tool is often a better choice.

    *   **The expression requires more than three levels of nesting**: Especially
    in cases where If/Then/Else logic is required, there’s frequently a need to respond
    to more than one condition (`if`/`then`/`elseif`/`then`/`else`), and unfortunately,
    the only way to accomplish this in the SSIS expression language is by nesting
    conditional operators.

    *   Complex string interrogation or manipulation is required: Simple string manipulation
    is easy enough through SSIS expressions with the use of well-known functions such
    as `SUBSTRING`, `REPLACE`, `LEFT/RIGHT`, `UPPER/LOWER`, and `REVERSE`. However,
    more advanced operations (extracting text from the middle of a string, replacing
    multiple patterns of character(s), extracting numbers embedded in text, etc.)
    usually requires overly complex expressions. Further, some text operations such
    as regular expression (RegEx) matching are not natively supported in the SSIS
    expression language.

    *   **The logic requires a volatile type cast**: Because the SSIS expression language
    has no error handling in itself, a conversion that is prone to failure (text to
    number, Unicode to ASCII, moving from a larger to smaller capacity of the same
    type) may cause an undesired interruption in your package flow. Often, I’ll wrap
    these into a Script task or Script component using a `TryParse()` method or a
    Try-Catch block, which allows a greater amount of flexibility in the event of
    a type cast failure.


    The bottom line is that not every ETL challenge within SSIS should be solved using
    expressions. The expression language was intended as a lightweight solution, and
    used in that context, it is an outstanding supplement to the product line. Try
    to think of SSIS expressions as spackle; small, light, elegant, and used pervasively,
    but in small doses. As effective as spackle is, a building contractor would never
    think of building an entire house using only spackle. As with any tool, expressions
    in SSIS are best used in proper context and should not be considered as a one-size-fits-all
    solution to every problem.


    ## Incremental Loads


    Anyone who has spent more than ten minutes working in the data warehouse space
    has heard the term *incremental load*. Before we demonstrate design patterns for
    performing incremental loads, let’s first touch on the need for an incremental
    load.


    ### What Is an Incremental Load?


    As the name implies, an *incremental load* is one that processes a partial set
    of data based only on what is new or changed since the last execution. Although
    many consider incremental loads to be purely time based (for example, grabbing
    just the data processed on the prior business day), it’s not always that simple.
    Sometimes, changes are made to historical data that should be reflected in downstream
    systems, and unfortunately it’s not always possible to detect when changes were
    made. (As an aside, those ubiquitous “last update timestamp” fields are notorious
    for being wrong.)


    Handling flexible data warehouse structures that allow not only inserts, but updates
    as well, can be a challenging proposition. In this chapter, we’ll surface a few
    design patterns in SSIS that you can use when dealing with changing data in your
    data warehouse.


    ### Why Incremental Loads?


    Imagine you are hired by a small shoe store to create a system through which the
    staff can analyze their sales data. Let’s say the store averages 50 transactions
    a day, amounting to an average of 100 items (2 items per transaction). If you
    do simple math on the row counts generated by the business, you’ll end up with
    fewer than 200 rows of data per day being sent to the analysis system. Even over
    the course of the entire year, you’re looking at less than 75,000 rows of data.
    With such a small volume of data, why would you want to perform an incremental
    load? After all, it would be almost as efficient to simply dump and reload the
    entire analytical database each night rather than try to calculate which rows
    are new, changed, or deleted.


    In a situation like the one just described, the best course of action might be
    to perform a full load each day. However, in the real world, few, if any, systems
    are so small and simple. In fact, it’s not at all uncommon for data warehouse
    developers to work in environments that generate millions of rows of data per
    day. Even with the best hardware money can buy, attempting to perform a daily
    full load on that volume of data simply isn’t practical. The incremental load
    seeks to solve this problem by allowing the systematic identification of data
    to be moved from transactional systems to the data warehouse. By selectively carving
    out only the data that requires manipulation—specifically, the rows that have
    been inserted, updated, or deleted since the last load—we can eliminate a lot
    of unnecessary and duplicate data processing.


    ### The Slowly Changing Dimension


    When you consider the application of incremental data loads in a data warehouse
    scenario, there’s no better example than the slowly changing dimension (SCD).
    The nature of dimensional data is such that it often does require updates by way
    of manipulating existing rows in the dimension table (SCD Type 1) or expiring
    the current record and adding a new row for that value, thus preserving the history
    for that dimension attribute (SCD Type 2).


    Although the slowly changing dimension is certainly not the only data warehouse
    structure to benefit from an incremental load, it is one of the most common species
    of that animal. As such, we’ll focus mostly on SCD structures for talking points
    around incremental loads.


    ### Incremental Loads of Fact Data


    Some data warehouse scenarios require the changing of fact data after it has been
    loaded to the data warehouse. This scenario is typically handled through a secondary
    load with a negating entry and a delta record, but some designs require the original
    fact record to be corrected.


    ![image](images/frontdot.jpg)'
