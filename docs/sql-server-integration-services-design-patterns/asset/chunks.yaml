  trans: "# 更改日志记录级别\n\n现在你已经了解了不同的日志记录级别以及各自的使用场景，接下来让我们逐步讲解如何更改日志记录级别。你可以通过以下两种方式之一来完成此操作：通过执行界面或通过命令行执行。\n\
    \n要通过执行界面修改日志记录级别，你需要连接到 Integration Services 目录，右键单击所需的包，然后选择**执行**。在“执行包”屏幕上，你将在“高级”选项卡上看到“日志记录级别”选项。默认情况下，该选项设置为“基本”，如图\
    \ 15-7 所示。或者，你可以将此值更改为另一个日志记录级别，以便在日志表中查看更多或更少的信息。\n\n![9781484200834_Fig15-07.jpg](img/9781484200834_Fig15-07.jpg)\n\
    \n图 15-7. 执行包屏幕\n\n另一种方法是通过命令行修改日志记录。所有包都可以通过命令行执行，并且你可以设置与单个执行关联的日志记录级别。\n\n\
    > **注意** 与管理 Integration Services 包相关的许多功能都可以通过命令行界面访问。使用命令行，你可以将 Integration\
    \ Services 管理与其他维护任务集成。\n\n运行清单 15-2 中的代码，将新执行的日志记录级别更改为记录所有详细记录。\n\n## 清单 15-2.\
    \ 修改执行日志记录级别的语句\n\n```sql\nDECLARE @execution_id INT\nEXECUTE [catalog].[create_execution]\n\
    \    @folder_name = 'DesignPatterns'\n    ,@project_name = 'DesignPatterns'\n\
    \    ,@package_name = 'Ch15_Reporting.dtsx'\n    ,@reference_id = null\n    ,@use32bitruntime\
    \ = false\n    ,@execution_id = @execution_id OUTPUT\n\nEXECUTE [catalog].[set_execution_parameter_value]\n\
    \    @execution_id\n    ,@object_type = 50\n    ,@parameter_name = 'LOGGING_LEVEL'\n\
    \    ,@parameter_value = 3 --Verbose\n\nEXECUTE [catalog].[start_execution]\n\
    \    @execution_id\n```\n\n完成此操作后，你可以通过运行清单 15-3 中的查询，查看新设置的日志记录级别产生的输出。\n\n##\
    \ 清单 15-3. 返回所有消息的查询\n\n```sql\nselect *\nfrom catalog.event_messages\nwhere operation_id\
    \ =\n    (select max(execution_id) from catalog.executions)\n```\n\n# 使用现有报告\n\
    \n我们的下一个设计模式很重要：利用提供给你的资源。SSIS 目录中包含了使用我们刚才讨论的日志记录信息的报告。这些报告中的信息包含对你的所有包执行的深入视图。这些报告是一个很好的起点，你可以从中查看包何时运行、是否发生错误以及需要调查的潜在问题区域。\n\
    \n图 15-8 显示了所有可用的报告。你可以通过 Management Studio 界面和 Integration Services 目录节点访问所有报告。\n\
    \n![9781484200834_Fig15-08.jpg](img/9781484200834_Fig15-08.jpg)\n\n图 15-8. 可用的目录报告\n\
    \n如果你正在查看特定的执行，你总是希望从“概述”报告开始，该报告可以通过选择任何已提供报告上的“概述”链接来运行。实际上，通过界面执行完成后，系统会询问你是否要查看此报告。如果选择“是”，你将看到类似于图\
    \ 15-9 的内容。\n\n![9781484200834_Fig15-09.jpg](img/9781484200834_Fig15-09.jpg)\n\
    \n图 15-9. 概述报告\n\n# 创建新报告\n\n既然你已经看到了无需任何操作即可使用的报告，你可能对此非常满意。\n\n如果不是，你可能希望更深入地挖掘数据。你可以通过查看前面描述的目录视图来创建新报告。你可能需要这样做的具体原因包括：\n\
    \n1.  查看运行时间最长的执行\n2.  找出包失败的原因\n3.  了解特定组件的内部工作原理\n\n让我们从第一个原因开始。这个报告很有趣，因为它使用了主要的输出视图，但基于查询和转换，它变成了一个有用的小工具。清单\
    \ 15-4 展示了列出过去一天内运行时间最长的五个包的查询。\n\n## 清单 15-4. 查询运行时间最长的五个包\n\n```sql\nselect\
    \ top 5\n    e.execution_id,\n    e.package_name,\n    DATEDIFF(ms, start_time,\
    \ end_time) as duration_ms\nfrom catalog.executions e\nwhere e.start_time > DATEADD(dd,\
    \ -1, getdate())\norder by duration_ms desc\n```\n\n你可能需要新报告的第二个原因是查看包失败的原因。你将为此信息使用一个额外的视图，即\
    \ `catalog.event_messages` 视图。同时对 `executions` 和 `event_messages` 视图限制数据，将确保你只获取完全失败的包，并且只看到导致它们失败的事件。可以在清单\
    \ 15-5 中看到此查询。\n\n## 清单 15-5. 失败包查询\n\n```sql\nselect\n    e.execution_id,\n \
    \   e.package_name,\n    em.*\nfrom catalog.executions e\ninner join catalog.event_messages\
    \ em\n    on e.execution_id=em.operation_id\nwhere e.status = 4\n    and em.event_name\
    \ = 'OnError'\n```\n\n最后一个原因是了解特定组件的内部工作原理。你可以查看数据流中每个组件执行期间发生的各个步骤。例如，清单 15-6\
    \ 中的查询返回源、转换和目标执行过程中发生的每个步骤以及每个步骤花费的时间。\n\n## 清单 15-6. 返回组件阶段和时间的查询\n\n```sql\n\
    select\n    subcomponent_name,\n    phase,\n    DATEDIFF(ms, start_time, end_time)\
    \ as duration_ms\nfrom catalog.execution_component_phases\nwhere package_name\
    \ = 'Ch16_Reporting.dtsx'\n    and task_name = 'Data Flow Task'\n```\n\n一旦你得到了所需的查询，你可以直接从\
    \ Management Studio 运行它，或者将其嵌入到 Reporting Services 报告中，使其看起来像解决方案中的标准报告。要通过 Management\
    \ Studio 制作报告，你可以将文件夹存储在本地“文档”文件夹中，路径结构为 `SQL Server Management Studio\\Custom\
    \ Reports`。要访问它们，然后你可以在 Integration Services 节点上的“报告”菜单下选择“自定义报告”选项，如图 15-10 所示。\n\
    \n![9781484200834_Fig15-10.jpg](img/9781484200834_Fig15-10.jpg)\n\n图 15-10. 自定义报告的选择\n\
    \n# 总结\n\n本章讨论了监控 Integration Services 包的多种方法。无论你使用的是工具的旧版本还是最新最强大的版本，通过遵循此处描述的设计模式，你都能够理解包的内部工作原理。关于包日志记录和报告以及目录日志记录和报告的讨论，向你展示了如何修改所记录的事件类型以及如何检索这些信息。\n\
    \n# 第 16 章 父子模式\n\n在早期版本的 Integration Services 中，数据移动平台不包括管理框架，该框架是 Integration\
    \ Services 包的执行、日志记录和部署的实现。为了填补这一空白，开发人员创建了自己的管理框架以在他们的组织中使用。"
- fmt: "# SSIS中的父子模式与管理框架\n\n## 引言\n\n与任何自定义解决方案一样，开发人员发现当新版本或新包引入系统时，管理框架需要维护和升级。\n\
    \n之前的章节涵盖了ETL工具化，重点关注元数据收集和验证。我们讨论的元数据包括管理包所需的关键信息。本章将介绍**父子模式**，即一个Integration\
    \ Services包可以从其自身执行中调用另一个包。这些模式是实现ETL框架的关键部分。\n\nIntegration Services 2014包含其自身的管理框架，其中包括通过SSIS目录进行的日志记录和执行。在本章及后续章节中，我们将向您展示如何使用可用的框架并对其进行增强，以在解决我们讨论的问题的同时提供更多信息。\n\
    \n本章我们将介绍以下三种父子模式：\n\n*   主包模式\n*   动态子包模式\n*   子包到父包变量模式\n\n使用这些模式，您可以实现开箱即用的Integration\
    \ Services管理功能。\n\n## 主包模式\n\n在设置框架时，您首先要做的事情之一是找到一种方法来组织包的执行方式。您的组织方式可以包括并行与串行处理、条件执行和分类批处理。尽管您可以让其中一些组织工作发生在作业调度器（如SQL\
    \ Server Agent或Tivoli）中，但如果能在您已经熟悉的环境中管理包的执行，岂不是更容易？\n\n幸运的是，Integration Services已经提供了这种能力！通过使用工作流设计器和“执行包任务”，您可以执行其他包，从而创建父子包关系。当您使用父子关系来执行一系列包时，这被称为主包。您需要完成两个步骤来为您的主包设置一个子包：\n\
    \n1.  指定子包。\n2.  配置参数绑定。\n\n### 指定子包\n\n创建初始包后，首先使用SSIS工具箱中的“执行包任务”。将该任务拖到控制流中，然后打开任务以查看可以修改的多个菜单。让我们从配置“包”页面开始，如**图16-1**所示。\n\
    \n![执行包任务编辑器 - 包页面](images/9781484200834_Fig16-01.jpg)\n\n**图16-1.** 执行包任务编辑器\
    \ - 包页面\n\n这是您设置要执行的包的地方。“执行包任务”的一个新增功能是`ReferenceType`属性，它使开发人员能够使用主包来运行包含在当前项目中的包或项目外部的包。在此示例中，您将使用解决方案中的现有包。\n\
    \n此时，您可以单击“确定”按钮，从而获得一个完全可接受的主包。但在这样做之前，您应该深入了解一下如何使用下一个菜单“参数绑定”在包之间传递信息。\n\n\
    ### 配置参数绑定\n\n仅仅调用子包并不那么令人兴奋。真正令人兴奋的是将子包与主包正在执行的操作联系起来！您可以通过父包参数来实现这一点。此选项仅在您使用与主包相同项目的子包时才可用。完成包参数的设置后，您应该看到如**图16-2**所示的屏幕。\n\
    \n![执行包任务编辑器 - 参数绑定页面](images/9781484200834_Fig16-02.jpg)\n\n**图16-2.** 执行包任务编辑器\
    \ - 参数绑定页面\n\n要实现**图16-2**所示的结果，您需要查看“执行包任务编辑器”并转到“参数绑定”页面。单击“添加”按钮以设置参数。对于“子包参数”，您可以选择一个已创建的参数，或者在您尚未创建子包参数的情况下添加自己的参数。请记住，这不会在子包中自动创建变量。这取决于您！接下来，您将分配来自主包的参数或变量以存储到子参数中。在**图16-2**所示的场景中，我们将父包的名称存储在子包的一个参数中，然后我们可以使用该参数来记录调用子包的包。\n\
    \n如果您想测试该包，可以使用**清单16-1**中所示的代码在子包中创建一个“脚本任务”。确保将`$Package::ParentPackageName`参数放入`ReadOnlyVariables`属性中。如果所有映射都正确，当您运行包时，您应该会在消息框中看到父包的名称，如**图16-3**所示。\n\
    \n**清单16-1.** 用于显示父包名称的Visual Basic代码\n\n```vb\nPublic Sub Main()\n    MsgBox(\"\
    The name of the parent package is: \" &\n          Dts.Variables(\"$Package::ParentPackageName\"\
    ).Value.ToString)\n    Dts.TaskResult = ScriptResults.Success\nEnd Sub\n```\n\n\
    ![显示父包名称的消息框](images/9781484200834_Fig16-03.jpg)\n\n**图16-3.** 显示父包名称的消息框\n\n\
    现在您已经有一个可工作的父子包，让我们通过创建一个动态子包将其提升到一个新的水平。\n\n## 动态子包模式\n\nIntegration Services的亮点之一是它提供的灵活性，如果您想做一些不同的事情。例如，如果您不确定具体需要运行哪些包，您可以创建一个具有动态子包的主包，该子包将仅执行所需的包。如果您有一系列文件传入，但不确定哪些文件在特定时间传入，这是一个很好的主意。您的最终目标是创建一个看起来像**图16-4**的包。让我们通过一个示例来创建主包和您希望执行的动态包列表。\n\
    \n![已完成的动态子包模式包](images/9781484200834_Fig16-04.jpg)\n\n**图16-4.** 已完成的动态子包模式包\n\
    \n要创建包含包名称的表，请运行**清单16-2**中找到的`CREATE`和`INSERT`语句。您可以创建一个名为`DesignPatterns`的数据库，或者修改脚本以针对您拥有并可用于实验的其他数据库运行。\n\
    \n**清单16-2.** 用于创建和填充包列表表的T-SQL代码\n\n```sql\nUSE [DesignPatterns]\nGO\n\nCREATE\
    \ TABLE [dbo].[PackageList](\n        [ChildPackageName] [varchar](50) NULL\n\
    )\nGO\n\nINSERT INTO [dbo].[PackageList] ([ChildPackageName])\n     VALUES ('ChildPackage.dtsx')\n\
    GO\n\nINSERT INTO [dbo].[PackageList] ([ChildPackageName])\n     VALUES ('ChildPackage2.dtsx')\n\
    GO\n```\n\n现在您将创建主包。从一个空白的SSIS包开始，创建一个作用域为包级别的变量。（在本章的示例中，SSIS包名为`Dynamic.dtsx`）。该变量应命名为`packageListObject`，数据类型为`Object`。您不需要为该变量提供值。其次，添加另一个同样作用域为包级别的变量，命名为`packageName`，数据类型为`String`。将此变量的值设置为项目中某个包的名称（例如`ChildPackage.dtsx`）。"
  raw: 'As with any custom solution, the developers found that the management framework
    needed to be cared for and upgraded when new versions or new packages were introduced
    into the system.    Previous chapters have covered ETL instrumentation, focusing
    on metadata collection and validation. The metadata we discussed included key
    information you need to manage your packages. This chapter covers parent-child
    patterns, where an Integration Services package can execute another package from
    within its own execution. These patterns are a critical part of implementing an
    ETL framework.    Integration Services 2014 contains its own management framework,
    which includes logging and execution through the SSIS Catalog. In this and subsequent
    chapters, we will show you how to use the available framework and enhance it to
    provide more information while still working around the issues we discuss.    The
    following are the three parent-child patterns we’ll cover in this chapter:    *   The
    master package pattern *   The dynamic child package pattern *   The child-to-parent
    variable pattern    Using these patterns, you can implement the Integration Services
    management functionality out of the box.    Master Package Pattern    When setting
    up a framework, one of the first things you want to do is find a way to organize
    how your packages execute. Your organization could include parallel versus serial
    processing, conditional execution, and categorical batching. And although you
    could have some of this organization occur in a job scheduler such as SQL Server
    Agent or Tivoli, wouldn’t it be easier if you could manage your package execution
    in an environment you already know?    Luckily for you, Integration Services already
    provides this ability! By using the workflow designer and the Execute Package
    task, you can execute other packages, creating a parent-child package relationship.
    When you use the parent-child relationship to execute a series of packages, you
    call this a master package. There are two steps you need to complete in order
    to set up one child package for your master package:    1.  Assign the child package.
    2.  Configure the parameter binding.    Assign the Child Package    Once you have
    created your initial package, begin by using the Execute Package task from the
    SSIS Toolbox. Drag the task to the control flow, and open the task to see multiple
    menus that you can modify. Let’s begin by configuring the Package page, as shown
    in [Figure 16-1](#9781484200834_Ch16.xhtml#Fig1).    ![9781484200834_Fig16-01.jpg](images/9781484200834_Fig16-01.jpg)    [Figure
    16-1](#9781484200834_Ch16.xhtml#_Fig1). Execute Package Task Editor Package page    This
    is where you set up the package that you want to execute. A new addition to the
    Execute Package task is the `ReferenceType` property, which enables developers
    to use the master package to run a package that is included in this project or
    a package that is external to the project. For this example, you will just use
    an existing package in your solution.    At this point, you could click the OK
    button and have a perfectly acceptable master package. Before you do that, however,
    you should delve into passing information between the packages using the parameters
    in the next menu, Parameter Bindings.    Configure Parameter Binding    Just calling
    a child package isn’t very exciting. What is exciting is tying the child package
    into something that the master package is doing! You do this through parent package
    parameters. This option can only be used if you are using a child package from
    the same project as the master package. Once you complete the setup for your package
    parameters, you should see the screen shown in [Figure 16-2](#9781484200834_Ch16.xhtml#Fig2).    ![9781484200834_Fig16-02.jpg](images/9781484200834_Fig16-02.jpg)    [Figure
    16-2](#9781484200834_Ch16.xhtml#_Fig2). Execute Package Task Editor Parameter
    Bindings page    To achieve the result shown in [Figure 16-2](#9781484200834_Ch16.


    xhtml#Fig2), you need to look at the Execute Package Task Editor and go to the
    Parameter Bindings page. Click the Add button to set up a parameter. For the Child
    Package Parameter, you can either select a parameter that has already been created
    or add your own parameter, in case you have not created the child package’s parameter
    yet. Keep in mind that this will not automatically create the variable in the
    child package. That is up to you! Next, you will assign either a parameter or
    variable from the master package to be stored in the child parameter. In the scenario
    shown in [Figure 16-2](#9781484200834_Ch16.xhtml#Fig2), we are storing the name
    of the parent package in a parameter in the child package, which we could then
    use to record the package that called the child package.    If you want to test
    the package, you can create a Script task in the child package using the code
    shown in [Listing 16-1](#9781484200834_Ch16.xhtml#list1). Make sure to put the
    `$Package::ParentPackageName` parameter in the `ReadOnlyVariables` property. If
    everything is mapped correctly, when you run the package, you should see the name
    of the parent package in a message box, as shown in [Figure 16-3](#9781484200834_Ch16.xhtml#Fig3).    [***Listing
    16-1***](#9781484200834_Ch16.xhtml#_list1). Visual Basic Code to Display the Parent
    Package Name    ``` Public Sub Main()     MsgBox("The name of the parent package
    is: " & _            Dts.Variables("$Package::ParentPackageName").Value.ToString)
        Dts.TaskResult = ScriptResults.Success End Sub ```    ![9781484200834_Fig16-03.jpg](images/9781484200834_Fig16-03.jpg)    [Figure
    16-3](#9781484200834_Ch16.xhtml#_Fig3). Message box showing the name of the parent
    package    Now that you have a working parent-child package, let’s take it to
    the next level by creating a dynamic child package.    Dynamic Child Package Pattern    One
    of the nice things about Integration Services is the flexibility it provides if
    you want to do something a little different. For example, if you are not sure
    exactly which packages need to run, you can create a master package that has a
    dynamic child package that will only execute the desired packages. This is a great
    idea if you have a series of files coming in, but you’re not sure which files
    come in at a certain time. Your end goal is to create a package that looks like
    [Figure 16-4](#9781484200834_Ch16.xhtml#Fig4). Let’s walk through an example of
    creating the master package and a list of the dynamic packages that you want to
    execute.    ![9781484200834_Fig16-04.jpg](images/9781484200834_Fig16-04.jpg)    [Figure
    16-4](#9781484200834_Ch16.xhtml#_Fig4). Completed dynamic child package pattern
    package    To create the table that contains the package names, run the `Create`
    and `Insert` statements found in [Listing 16-2](#9781484200834_Ch16.xhtml#list2).
    Either create a database named `DesignPatterns`, or modify the script to run against
    some other database that you have available and can use for experimenting.    [***Listing
    16-2***](#9781484200834_Ch16.xhtml#_list2). T-SQL Code to Create and Populate
    a Package List Table    ``` USE [DesignPatterns] GO  CREATE TABLE [dbo].[PackageList](
            [ChildPackageName] [varchar](50) NULL ) GO  INSERT INTO [dbo].[PackageList]
    ([ChildPackageName])      VALUES (''ChildPackage.dtsx'') GO  INSERT INTO [dbo].[PackageList]
    ([ChildPackageName])      VALUES (''ChildPackage2.dtsx'') GO ```    Now you will
    create the master package. Starting with a blank SSIS package, create a variable
    that is scoped to the package level. (In this chapter’s example, the SSIS package
    is named `Dynamic.dtsx`). The variable should be named `packageListObject` and
    have a data type of Object. You do not need to provide a value for the variable.
    Secondly, add a variable, also scoped to the package level, named `packageName`
    with a data type of String. Set the value of this variable to the same name as
    one of the packages in your project (i.e., `ChildPackage.'
  trans: "\n# SSIS 中的父子模式与管理框架\n\n## 引言\n\n与任何自定义解决方案一样，开发人员发现当新版本或新包引入系统时，管理框架需要维护和升级。\n\
    \n之前的章节涵盖了 ETL 工具化，重点关注元数据收集和验证。我们讨论的元数据包括管理包所需的关键信息。本章将介绍**父子模式**，即一个 Integration\
    \ Services 包可以从其自身执行中调用另一个包。这些模式是实现 ETL 框架的关键部分。\n\nIntegration Services 2014\
    \ 包含其自身的管理框架，其中包括通过 SSIS 目录进行的日志记录和执行。在本章及后续章节中，我们将向您展示如何使用可用的框架并对其进行增强，以在解决我们讨论的问题的同时提供更多信息。\n\
    \n本章我们将介绍以下三种父子模式：\n\n*   主包模式\n*   动态子包模式\n*   子包到父包变量模式\n\n使用这些模式，您可以实现开箱即用的\
    \ Integration Services 管理功能。\n\n## 主包模式\n\n在设置框架时，您首先要做的事情之一是找到一种方法来组织包的执行方式。您的组织方式可以包括并行与串行处理、条件执行和分类批处理。尽管您可以让其中一些组织工作发生在作业调度器（如\
    \ SQL Server Agent 或 Tivoli）中，但如果能在您已经熟悉的环境中管理包的执行，岂不是更容易？\n\n幸运的是，Integration\
    \ Services 已经提供了这种能力！通过使用工作流设计器和“执行包任务”，您可以执行其他包，从而创建父子包关系。当您使用父子关系来执行一系列包时，这被称为主包。您需要完成两个步骤来为您的主包设置一个子包：\n\
    \n1.  指定子包。\n2.  配置参数绑定。\n\n### 指定子包\n\n创建初始包后，首先使用 SSIS 工具箱中的“执行包任务”。将该任务拖到控制流中，然后打开任务以查看可以修改的多个菜单。让我们从配置“包”页面开始，如**图\
    \ 16-1**所示。\n\n![执行包任务编辑器 - 包页面](img/9781484200834_Fig16-01.jpg)\n\n**图 16-1.**\
    \ 执行包任务编辑器 - 包页面\n\n这是您设置要执行的包的地方。“执行包任务”的一个新增功能是`ReferenceType`属性，它使开发人员能够使用主包来运行包含在当前项目中的包或项目外部的包。在此示例中，您将使用解决方案中的现有包。\n\
    \n此时，您可以单击“确定”按钮，从而获得一个完全可接受的主包。但在这样做之前，您应该深入了解一下如何使用下一个菜单“参数绑定”在包之间传递信息。\n\n\
    ### 配置参数绑定\n\n仅仅调用子包并不那么令人兴奋。真正令人兴奋的是将子包与主包正在执行的操作联系起来！您可以通过父包参数来实现这一点。此选项仅在您使用与主包相同项目的子包时才可用。完成包参数的设置后，您应该看到如**图\
    \ 16-2**所示的屏幕。\n\n![执行包任务编辑器 - 参数绑定页面](img/9781484200834_Fig16-02.jpg)\n\n**图\
    \ 16-2.** 执行包任务编辑器 - 参数绑定页面\n\n要实现**图 16-2**所示的结果，您需要查看“执行包任务编辑器”并转到“参数绑定”页面。单击“添加”按钮以设置参数。对于“子包参数”，您可以选择一个已创建的参数，或者在您尚未创建子包参数的情况下添加自己的参数。请记住，这不会在子包中自动创建变量。这取决于您！接下来，您将分配来自主包的参数或变量以存储到子参数中。在**图\
    \ 16-2**所示的场景中，我们将父包的名称存储在子包的一个参数中，然后我们可以使用该参数来记录调用子包的包。\n\n如果您想测试该包，可以使用**清单\
    \ 16-1**中所示的代码在子包中创建一个“脚本任务”。确保将`$Package::ParentPackageName`参数放入`ReadOnlyVariables`属性中。如果所有映射都正确，当您运行包时，您应该会在消息框中看到父包的名称，如**图\
    \ 16-3**所示。\n\n**清单 16-1.** 用于显示父包名称的 Visual Basic 代码\n\n```vb\nPublic Sub Main()\n\
    \    MsgBox(\"The name of the parent package is: \" &\n          Dts.Variables(\"\
    $Package::ParentPackageName\").Value.ToString)\n    Dts.TaskResult = ScriptResults.Success\n\
    End Sub\n```\n\n![显示父包名称的消息框](img/9781484200834_Fig16-03.jpg)\n\n**图 16-3.** 显示父包名称的消息框\n\
    \n现在您已经有一个可工作的父子包，让我们通过创建一个动态子包将其提升到一个新的水平。\n\n## 动态子包模式\n\nIntegration Services\
    \ 的亮点之一是它提供的灵活性，如果您想做一些不同的事情。例如，如果您不确定具体需要运行哪些包，您可以创建一个具有动态子包的主包，该子包将仅执行所需的包。如果您有一系列文件传入，但不确定哪些文件在特定时间传入，这是一个很好的主意。您的最终目标是创建一个看起来像**图\
    \ 16-4**的包。让我们通过一个示例来创建主包和您希望执行的动态包列表。\n\n![已完成的动态子包模式包](img/9781484200834_Fig16-04.jpg)\n\
    \n**图 16-4.** 已完成的动态子包模式包\n\n要创建包含包名称的表，请运行**清单 16-2**中找到的`CREATE`和`INSERT`语句。您可以创建一个名为`DesignPatterns`的数据库，或者修改脚本以针对您拥有并可用于实验的其他数据库运行。\n\
    \n**清单 16-2.** 用于创建和填充包列表表的 T-SQL 代码\n\n```sql\nUSE [DesignPatterns]\nGO\n\nCREATE\
    \ TABLE [dbo].PackageList NULL\n)\nGO\n\nINSERT INTO [dbo].[PackageList] ([ChildPackageName])\n\
    \     VALUES ('ChildPackage.dtsx')\nGO\n\nINSERT INTO [dbo].[PackageList] ([ChildPackageName])\n\
    \     VALUES ('ChildPackage2.dtsx')\nGO\n```\n\n现在您将创建主包。从一个空白的 SSIS 包开始，创建一个作用域为包级别的变量。（在本章的示例中，SSIS\
    \ 包名为`Dynamic.dtsx`）。该变量应命名为`packageListObject`，数据类型为`Object`。您不需要为该变量提供值。其次，添加另一个同样作用域为包级别的变量，命名为`packageName`，数据类型为`String`。将此变量的值设置为项目中某个包的名称（例如`ChildPackage.dtsx`）。\n"
- fmt: "## Dynamic Package Execution Patterns\n\ndtsx`) so it can be used for design-time\
    \ configuration. Next, add an Execute SQL task in the control flow. Use the query\
    \ in the Execute SQL task shown in `Listing 16-3` against the database you just\
    \ created for your table. (Hint: You’ll need a Connection Manager named `Source`\
    \ that points to the `DesignPatterns` database).\n\n`Listing 16-3`. T-SQL Code\
    \ to Query the Package List Table\n\n```\nSELECT [ChildPackageName] FROM [dbo].[PackageList]\n\
    ```\n\nIn addition to the SQL query, ensure the `ResultSet` property is set to\
    \ return a Full Result Set and store it in the variable you just created called\
    \ `packageListObject`. This property page can be seen in `Figure 16-5`.\n\n![9781484200834_Fig16-05.jpg](images/9781484200834_Fig16-05.jpg)\n\
    `Figure 16-5`. Execute SQL Task Editor General page\n\nAttach a ForEach Loop container\
    \ to the Execute SQL task. This is where you will execute the package. Within\
    \ the Collection page of the ForEach Loop container, set the enumerator to use\
    \ Foreach ADO Enumerator, which will loop through the variable object. The ADO\
    \ object source variable field should contain `@[User::packageListObject]`. This\
    \ screen can be seen in `Figure 16-6`.\n\n![9781484200834_Fig16-06.jpg](images/9781484200834_Fig16-06.jpg)\n\
    `Figure 16-6`. Foreach Loop Editor General page that enumerates through each row\
    \ in the `packageListObject` variable\n\nThen you need to tell Integration Services\
    \ what to do with the value it retrieves when enumerating through the object list.\
    \ On the Variable Mappings page, set the variable to `@[User::packageName]` and\
    \ the Index to 0. This will put each value into the variable.\n\nFinally, you’re\
    \ at a point where you can add the part that executes the package. Similar to\
    \ the creation of the master-child package, you want to use an Execute Package\
    \ task. Begin by setting the `DelayValidation` property to `True`, which allows\
    \ you to decide what package to run at runtime.\n\nRather than walk through the\
    \ same steps as you did in the master-child package, go directly to the Expressions\
    \ page in the Execute Package Task Editor. This is where you set up the dynamic\
    \ portion of the package. Set the `PackageName` property to use the expression\
    \ `@[User::packageName]`. The final Expressions page should look like `Figure\
    \ 16-7`.\n\n![9781484200834_Fig16-07.jpg](images/9781484200834_Fig16-07.jpg)\n\
    `Figure 16-7`. Execute Package Task Editor Expressions page\n\nWhen the package\
    \ runs, it will loop through each row in the `PackageList` table; set the `PackageName`\
    \ property of the Execute SQL task to the current row, and execute only the packages\
    \ that you need. Keep in mind that this will always run the child packages serially\
    \ unless you create multiple loops and specifically code your master package to\
    \ handle parallelism.\n\nNext, we will describe how a child package can send information\
    \ back to the parent package in the child-to-parent variable pattern.\n\n## Child-to-Parent\
    \ Variable Pattern\n\nParent-child patterns are an essential part of a management\
    \ framework. For example, you could use the master package pattern to group similar\
    \ packages together and make sure they are executed in the correct order. You\
    \ could also use the dynamic child package pattern to run a variable number of\
    \ packages. To ensure that you store all of this information, it is vital that\
    \ you pass important information between packages, not only from the parent to\
    \ the child, but also from the child back to the parent. Although this feature\
    \ is not readily known, it is possible to do this using the Script task. Let’s\
    \ use your existing packages to show how to pass the name of a file from the child\
    \ package to its parent.\n\nThe first step is to create a variable in the parent\
    \ package.\n\nIn this example scenario, you are going to create a variable named\
    \ `ChildFileName` of data type String that is scoped at the package level. Attached\
    \ to the Execute Package task you created previously in this chapter, you’ll add\
    \ a Script task. Add the `ChildFileName` variable as a `ReadOnly` variable, and\
    \ add the code in `Listing 16-4` inside the Visual Basic script.\n\n`Listing 16-4`.\
    \ Visual Basic Script to Display the Child File Name\n\n```\nPublic Sub Main()\n\
    \    MsgBox(\"The name of the child file is: \" & _\n          Dts.Variables(\"\
    User::ChildFileName\").Value.ToString)\n    Dts.TaskResult = ScriptResults.Success\n\
    End Sub\n```\n\nNext, modify your child package. In the Script task, add the variable\
    \ `User::ChildFileName` to the `ReadWriteVariables` property list. You will have\
    \ to manually type this in, as it will not display in the menu. Thus, your full,\
    \ read-only variables list appears as:\n\n```\n$Package::ParentPackageName,User::ChildFileName\n\
    ```\n\nThen add the line of code found in `Listing 16-5` to the Visual Basic Script\
    \ task.\n\n`Listing 16-5`. Visual Basic Script to Set the Child File Name Value\n\
    \n```\nDts.Variables(\"User::ChildFileName\").Value = \"SalesFile.txt\"\n```\n\
    \nOnce you run it, the package will finish with the figure seen in `Figure 16-8`.\n\
    \n![9781484200834_Fig16-08.jpg](images/9781484200834_Fig16-08.jpg)\n`Figure 16-8`.\
    \ Child-to-parent variable pattern execution\n\nThe passing of variable values\
    \ from child to parent succeeds because of how containers work in Integration\
    \ Services. Inside of a package, any child container, such as a Sequence container,\
    \ can access its parent’s properties. Likewise, any child task, such as an Execute\
    \ SQL task, can access its parent’s properties. This paradigm allows you to use\
    \ variables and properties without having to re-create them for every object in\
    \ your package. When you add a child package using the Execute Package task, you\
    \ add another layer to the parent-child hierarchy and allow the child package\
    \ to set the parent package’s variable.\n\n## Conclusion\n\nSQL Server enthusiasts\
    \ everywhere embraced Integration Services when it was first introduced as part\
    \ of SQL Server 2005. The latest edition of Integration Services has been enhanced\
    \ to make ETL developers even more excited than before. Integration Services 2012\
    \ added the basis for a management framework and the ability to create parent-child\
    \ relationships, as this chapter discussed. We also discussed master package patterns\
    \ and management frameworks.\n\n## CHAPTER 17: Configuration\n\nSQL Server 2012\
    \ introduced a new, parameter-based configuration model for SSIS. This new model\
    \ is meant to simplify the configuration process and make it easier for users\
    \ to identify where values are coming from at runtime. Although 2005/2008-style\
    \ package configurations are still supported in SQL Server 2012 and SQL Server\
    \ 2014, the two configuration models are not meant to be mixed. In fact, the menu\
    \ option to use them will only appear when you are using the file deployment model\
    \ and on packages that have been upgraded from previous versions. New packages\
    \ created in SQL Server 2014 will use the new parameter model by default.\n\n\
    This chapter describes the new parameter model and how it can be used to configure\
    \ package properties at runtime. We’ll look at how parameters are exposed in the\
    \ SSIS Catalog and how you can set parameter values as part of your build process\
    \ using Visual Studio configurations. Finally, we’ll look at design patterns that\
    \ you can use to augment the functionality provided by the built-in parameter\
    \ model, providing dynamic runtime configuration."
