    # 匹配策略活动


    匹配策略活动用于为 DQS 准备数据去重过程。通过此用户界面，数据管理员可以创建一个包含一个或多个匹配规则的策略，DQS 将使用这些规则来确定应如何比较数据行。


    ## 数据质量项目


    数据质量项目是一个您可以在其中交互式地清理或匹配数据的项目。您将选择数据源（SQL Server 或 Excel 文件，可通过客户端上传），然后将源列映射到知识库中的域。图
    5-4 显示了一个数据质量项目，该项目将尝试对照默认 DQS 知识库中的域来清理 `EnglishCountryRegionName` 和 `CountryRegionCode`
    列。


    ![9781484200834_Fig05-04.jpg](img/9781484200834_Fig05-04.jpg)


    图 5-4. 创建新的数据清理项目


    将列映射到域后，DQS 将处理您的数据并提供清理操作的结果。当您查看结果时，可以选择批准或拒绝某些更正、向已知域值列表添加新值以及指定更正规则。例如，作为您组织的数据管理员，您知道
    "Jack Ryan" 和 "John Ryan" 是同一个人。批准更正后，您可以将结果导出到 SQL Server 表、Excel 文件或 CSV 文件。DQS
    不提供就地更正值的选项——您将需要一个单独的进程来更新您检查的原始源数据。


    在此过程中的不同时间点，您可以保存数据质量项目。项目状态会保存到 DQS 服务器，允许您在以后恢复。这在处理可能需要一段时间扫描的大型数据集时特别有用。它还允许您在需要研究特定域的正确值是什么时返回到更正结果。


    要管理活动的数据质量项目，请单击客户端主页上的“打开数据质量项目”按钮。从这里，您可以看到所有当前正在进行的项目。右键单击一个项目会为您提供管理选项，例如重命名项目或在不再需要时删除它。


    ## 管理


    管理部分对具有 DQS 管理员角色的用户可用。从这里，您可以监控 DQS 服务器上的所有活动（例如域管理和清理项目），并设置系统范围的配置选项。在这些页面上，您可以为各种操作设置日志记录级别，以及设置建议和自动更正的最低置信度分数。如果您使用的是
    Windows Azure Marketplace 的在线参考数据，您还将从此页面配置您的帐户信息和服务订阅（如图 5-5 所示）。


    ![9781484200834_Fig05-05.jpg](img/9781484200834_Fig05-05.jpg)


    图 5-5. Windows Azure Marketplace 中在线参考数据的配置


    ## 使用默认知识库


    DQS 附带一个默认知识库，其中包含与美国和境内位置的清理和验证相关的域。图 5-6 显示了“US - State”域的域值。在此图中，您可以看到“Alabama”定义了同义词——它会自动将“AL”更正为“Alabama”，并将“Ala.”标记为错误。


    ![9781484200834_Fig05-06.jpg](img/9781484200834_Fig05-06.jpg)


    图 5-6. 默认 DQS 知识库中的 US - State 域


    ## 在线参考数据服务


    DQS 使用两种类型的数据来执行清理和匹配操作：本地数据和参考数据。本地数据构成 DQS 客户端“域值”页面上显示的值——这些是作为知识发现过程的一部分导入
    DQS 的已知值。这些值与知识库一起存储在 `DQS_MAIN` 数据库中。如果这些值发生更改，您必须使用新值更新您的域。参考数据不存储在知识库中——它是从在线参考数据服务查询的。使用在线参考数据可能会影响性能，因为您的清理过程需要调用外部系统，但它需要的维护较少，因为您无需担心值的同步问题。


    可以链接到您的域的在线参考数据服务在 DQS 客户端的管理页面上进行配置。有两种类型的数据提供程序：来自 Windows Azure Marketplace
    的 DataMarket 提供程序，以及 Direct Online 第三方提供程序。DataMarket 提供程序要求您拥有 Windows Azure
    Marketplace 帐户 ID 以及对您希望使用的数据集的订阅。Direct Online 提供程序选项允许您指向支持 DQS 提供程序接口的其他第三方
    Web 服务。


    ## 将 DQS 与 SSIS 配合使用


    SQL Server 2014 附带用于 SSIS 的 DQS 清理转换。本节介绍如何在 SSIS 数据流中配置和使用此转换。本节还包含有关 DQS 的几个开源扩展的信息，这些扩展可在
    CodePlex 上获得。


    ### DQS 清理转换


    DQS 清理转换随 SSIS 2014 一起提供，可在数据流工具箱中找到（如图 5-7 所示）。默认情况下，它将出现在工具箱的“其他转换”部分下。


    ![9781484200834_Fig05-07.jpg](img/9781484200834_Fig05-07.jpg)


    图 5-7. DQS 清理转换


    将 DQS 清理转换添加到数据流后，可以双击该组件以打开其编辑器 UI。在 DQS 清理转换编辑器中需要设置的第一件事是数据质量连接管理器（如图 5-8 所示）。这将指向驻留在
    SQL Server 实例上的 DQS 安装。创建连接管理器后，选择要使用的知识库。选择要使用的知识库将显示其域列表。


    ![9781484200834_Fig05-08.jpg](img/9781484200834_Fig05-08.jpg)


    图 5-8. DQS 连接管理器和清理转换编辑器


    如本章前面所述，此列表中有两种类型的域：常规域（例如，`City`、`State`、`Zip`）和复合域，复合域由两个或多个常规域组成。使用 DQS 清理转换时，可以将数据流中的列映射到知识库中的域。您还可以通过两种方式利用复合域：


    1.  **单个（字符串）列：** 要使此方法生效，所有值必须按照域出现的顺序显示。因此，使用本章开头的 `Company` 示例，您的列值需要如下所示：Microsoft
    Corporation, One Redmond Way, Redmond, WA, USA。

    2.  **多个列：** 始终通过 DQS 知识库中存储的知识和规则单独清理各个列。如果将列映射到复合域的每个域，则该行也将使用复合域逻辑进行清理。


    ```

    注意  目前，DQS 清理转换 UI 中没有指示器显示您何时已将列映射到复合域内的所有域。您需要仔细检查每个域是否已映射；否则，每个列将被单独验证和清理。

    ```'
- fmt: '## 映射选项卡


    映射选项卡（[图 5-9](#9781484200834_Ch05.xhtml#Fig9)）允许您选择要清理的列，并将它们映射到知识库中的域。请注意，“域”下拉菜单会自动过滤掉数据类型不兼容的列。例如，如果您使用的是
    `DT_I4`（四字节有符号整数）列，则不会显示数据类型为 `String` 的域。一个域只能被映射一次——如果同一个域对应多个列，您需要在数据流中使用两个独立的
    DQS 清洗转换。


    ![9781484200834_Fig05-09.jpg](images/9781484200834_Fig05-09.jpg)


    [图 5-9](#9781484200834_Ch05.xhtml#_Fig9). 将 DQS 知识库域映射到数据流中的列


    ![Image](images/sq.jpg) **注意**  如果您的数据包含多个具有相同域值的列，请考虑在创建知识库时使用“链接域”功能。更多信息请参阅
    Books Online 中的“创建链接域”页面：`http://msdn.microsoft.com/en-us/library/hh479582.aspx`。


    您映射的每一列都会导致至少三个额外的列被添加到数据流中——`Source`、`Output` 和 `Status`。根据您选择的高级选项（稍后详述），可能还会添加更多列。DQS
    清洗转换创建的列列表见[表 5-2](#9781484200834_Ch05.xhtml#Tab2)。默认情况下，每个附加列都会以原始列名作为前缀，并可在映射选项卡上重命名。除了以原始列名为前缀的列之外，还会添加一个
    `Record Status` 列来记录行的整体状态。关于如何处理 DQS 清洗转换添加的列的详细信息将在本章后面介绍。


    [表 5-2](#9781484200834_Ch05.xhtml#_Tab2). DQS 清洗转换创建的附加列


    | 列 | 默认 | 描述 |

    | --- | --- | --- |

    | `Record Status` | 是 | 记录的整体状态，基于每个映射列的状态。整体状态基于以下算法：如果一列或多列为 `Invalid`，则记录状态为
    `Invalid`。如果为 `Auto suggest`，则记录状态为 `Auto suggest`。如果为 `Corrected`，则记录状态为 `Corrected`。如果所有列均为
    `Correct` 或 `New`，则记录状态为 `Correct`。如果所有列均为 `New`，则记录状态为 `New`。可能的 `Status` 列值参见[表
    5-3](#9781484200834_Ch05.xhtml#Tab3)。 |

    | `_Source` | 是 | 此列包含传递给转换的原始值。 |

    | `_Output` | 是 | 如果原始值在清理过程中被修改，此列包含更正后的值。如果值未被修改，则包含原始值。通过 SSIS 进行批量清理时，下游组件通常会使用此列。
    |

    | `_Status` | 是 | 值的验证或清理状态。`Status` 列的可能值参见[表 5-3](#9781484200834_Ch05.xhtml#Tab3)。
    |

    | `_Confidence` | 否 | 此列包含给予任何更正或建议的分数。该分数反映了 DQS 服务器（或相关数据源）对该更正/建议的置信程度。大多数
    ETL 包会希望包含此字段，并使用条件拆分将未达到最低置信度阈值的值重定向，以便进行手动检查。 |

    | `_Reason` | 否 | 此列解释列清理状态的原因。例如，如果一列被 `Corrected`，原因可能是 DQS 清理算法、知识库规则或标准化导致的更改。
    |

    | `_Appended Data` | 否 | 当有域附加到参考数据提供程序时，会填充此列。某些参考数据提供程序会返回额外的信息作为清理的一部分——不仅限于映射域关联的值。例如，在清理地址时，参考数据提供程序可能还会返回纬度和经度值。
    |

    | `_Appended Data Schema` | 否 | 此列与前面列出的 `Appended Data` 设置相关。如果数据源在 `Appended
    Data` 字段中返回了附加信息，此列包含一个可用于解释该数据的简单架构。 |


    ## 高级选项卡


    高级选项卡（如[图 5-10](#9781484200834_Ch05.xhtml#Fig10)所示）有许多不同的选项，其中大多数在选中时会向数据流中添加新列。“标准化输出”选项是个例外。启用后，DQS
    将根据在 DQS 客户端应用程序中定义的域设置修改输出值。您可以在 DQS 客户端的“域管理 -> 域属性”选项卡上查看标准化设置的定义方式（如前面[图 5-3](#9781484200834_Ch05.xhtml#Fig3)所示）。


    有两种标准化：


    *   **重新格式化操作：** 包括转换为大写、小写以及字符串中首字母大写等操作。

    *   **更正为主导值：** 例如，如果为某个术语定义了多个值（或同义词），当前值将被替换为主导术语（在知识库中定义）。


    ![9781484200834_Fig05-10.jpg](images/9781484200834_Fig05-10.jpg)


    [图 5-10](#9781484200834_Ch05.xhtml#_Fig10). DQS 清洗转换编辑器的高级选项卡'
  raw: 'The Mapping tab ([Figure 5-9](#9781484200834_Ch05.xhtml#Fig9)) allows you
    to select the columns you want to cleanse and map them to domains in your knowledge
    base. Note that the Domain dropdown will automatically filter out columns with
    incompatible data types. For example, it won’t show domains with a String data
    type if you are using a `DT_I4` (four-byte signed integer) column. A domain can
    only be mapped once—if you have multiple columns for the same domain, you’ll need
    to use two separate DQS Cleansing transforms in your data flow.


    ![9781484200834_Fig05-09.jpg](images/9781484200834_Fig05-09.jpg)


    [Figure 5-9](#9781484200834_Ch05.xhtml#_Fig9). Mapping DQS knowledge base domains
    to columns in your data flow


    ![Image](images/sq.jpg) **Note**  If your data contains multiple columns with
    values from the same domain, consider using the Linked Domain feature when creating
    your knowledge base. For more information, see the “Create a Linked Domain” page
    in Books Online: `http://msdn.microsoft.com/en-us/library/hh479582.aspx`.


    Each column you map causes at least three additional columns to be added to your
    data flow—`Source`, `Output`, and `Status`. More columns may be added, depending
    on the advanced options you select (more on that to follow). The list of columns
    created by the DQS Cleansing transform can be found in [Table 5-2](#9781484200834_Ch05.xhtml#Tab2).
    Each additional column will be prefixed with the name of the original column by
    default and can be renamed on the Mapping tab. In addition to the columns that
    are prefixed with the name of the original, a `Record Status` column is added
    to record the overall status of the row. Details on how to handle the columns
    added by the DQS Cleansing transform are covered later in this chapter.


    [Table 5-2](#9781484200834_Ch05.xhtml#_Tab2). Additional Columns Created by the
    DQS Cleansing Transform


    | Column | Default | Description |

    | --- | --- | --- |

    | `Record Status` | Yes | The overall status of the record, based on the status
    of each mapped column. The overall status is based on the following algorithm:If
    one or more columns is`Invalid`, the record status is `Invalid`.`Auto suggest`,
    the record status is `Auto suggest`.`Corrected`, the record status is `Corrected`.If
    all columns are `Correct` or `New`, then the record status will be `Correct`.
    If all columns are `New`, then the record status will be `New`.See [Table 5-3](#9781484200834_Ch05.xhtml#Tab3)
    for possible `Status` column values. |

    | `_Source` | Yes | This column contains the original value passed to the transform.
    |

    | `_Output` | Yes | If the original value was modified during the cleansing process,
    this column contains the corrected value. If the value was not modified, this
    column contains the original value. When doing bulk cleansing through SSIS, downstream
    components will typically make use of this column. |

    | `_Status` | Yes | The validation or cleansing status of the value.See [Table
    5-3](#9781484200834_Ch05.xhtml#Tab3) for possible values of the `Status` column.
    |

    | `_Confidence` | No | This column contains a score that is given to any correction
    or suggestion. The score reflects to what extent the DQS server (or the relevant
    data source) has confidence in the correction/suggestion. Most ETL packages will
    want to include this fieldand use a conditional split to redirect values that
    do not meet the minimum confidence threshold so that they can be manually inspected.
    |

    | `_Reason` | No | This column explains the reason for the column’s cleansing
    status. For example, if a column was `Corrected`, the reason might be due to the
    DQS Cleansing algorithm, knowledge base rules, or a change due to standardization.
    |

    | `_Appended Data` | No | This column is populated when there are domains attached
    to a reference data provider. Certain reference data providers will return additional
    information as part of the cleansing—not only values associated with the mapped
    domains. For example, when cleansing an address, the reference data provider might
    also return Latitude and Longitude values. |

    | `_Appended Data Schema` | No | This column is related to thepreviously listed
    `Appended Data` setting. If the data source returned additional information in
    the `Appended Data` field, this column contains a simple schema that can be used
    to interpret that data. |


    The Advanced tab (as shown in [Figure 5-10](#9781484200834_Ch05.xhtml#Fig10))
    has a number of different options, most of which add new columns to the data flow
    when selected. The Standardize output option is an exception to this. When enabled,
    DQS will modify the output values according to the domain settings defined in
    the DQS client application. You can see how the standardization settings are defined
    in the DQS Client on the Domain Management -> Domain Properties tab (shown earlier
    in [Figure 5-3](#9781484200834_Ch05.xhtml#Fig3)).


    There are two kinds of standardization:


    *   **Reformatting operations:** These include operations such as conversion to
    uppercase, to lowercase, and to capitalized words in a string.

    *   **Correction to a leading value:** For example, if multiple values (or synonyms)
    are defined for a term, the current value will be replaced with the leading term
    (as defined in the KB).


    ![9781484200834_Fig05-10.jpg](images/9781484200834_Fig05-10.jpg)


    [Figure 5-10](#9781484200834_Ch05.xhtml#_Fig10). Advanced tab of the DQS Cleansing
    Transformation Editor'
