    Then add the DSN name or connection string. For our local AdventureWorks2012 database,
    the connection string will look like [Listing 4-1](#9781484200834_Ch04.xhtml#list1).


    [***Listing 4-1***](#9781484200834_Ch04.xhtml#_list1). ODBC Connection String


    ```

    Driver={SQL Server Native Client 11.0};

    Server=localhost;

    Database=AdventureWorks2012;

    Trusted_Connection=yes

    ```


    Our completed Connection Manager screen for an ADO.NET connection with an ODBC
    provider looks like [Figure 4-4](#9781484200834_Ch04.xhtml#Fig4).


    ![9781484200834_Fig04-04.jpg](images/9781484200834_Fig04-04.jpg)


    [Figure 4-4](#9781484200834_Ch04.xhtml#_Fig4). ODBC ADO.NET connection manager
    property screen


    If you are using SQL Server 2012 or later, you can use the ODBC Source component.
    Configuring the ODBC Source is very similar to the ADO.NET Source, except that
    you use an ODBC connection manager. The ODBC Source provides additional performance
    benefits over ADO.NET; however, it requires SQL Server Enterprise Edition to run
    outside of the SQL Server Data Tools environment.


    OLE DB


    Finally, we move on to what is arguably the most common connection manager used
    to connect to SQL Server: OLE DB. The OLE DB protocol was written by Microsoft
    as the next version of the ODBC provider. In addition to SQL Server databases,
    you can use the OLE DB connection manager to connect to file-based databases or
    Excel spreadsheets.


    OLE DB tends to be my default when I’m connecting to a SQL Server database. If
    you do not fall into the category of using mostly components that use an ADO.NET
    connection manager, and you do not fall into the category of having an organization
    that wants to use a DSN, you will want to use an OLE DB connection manager.


    You can fill out the property screen of the OLE DB connection manager as shown
    in [Figure 4-5](#9781484200834_Ch04.xhtml#Fig5).


    ![9781484200834_Fig04-05.jpg](images/9781484200834_Fig04-05.jpg)


    [Figure 4-5](#9781484200834_Ch04.xhtml#_Fig5). OLE DB connection manager property
    screen


    Creating a SQL Server Source Component


    Once you’ve picked the correct connection manager and provider, you need to use
    them in a `Source Component` for our data pull. Begin by looking at the SSIS Toolbox
    when you are on the Data Flow tab. If you have not rearranged the SSIS Toolbox,
    you will see all possible sources under the Other Sources grouping, as seen in
    [Figure 4-6](#9781484200834_Ch04.xhtml#Fig6).


    ![9781484200834_Fig04-06.jpg](images/9781484200834_Fig04-06.jpg)


    [Figure 4-6](#9781484200834_Ch04.xhtml#_Fig6). Other Sources grouping in the SSIS
    Toolbox


    Now it’s time to choose one.


    Most of the hard decision-making was already completed when you set up the connection
    manager. If you use an OLE DB connection manager, then you must use the OLE DB
    source. If you decided to use an ADO.NET connection manager with either an ADO.NET
    or ODBC provider, you must use the ADO NET Source.


    Once you drag the desired source onto the Data Flow design window, the data flow
    contains one component, as shown in [Figure 4-7](#9781484200834_Ch04.xhtml#Fig7).
    Integration Services lets the developer know that there is an issue with the source
    by displaying the red circle with the white X in it. In this case, the issue is
    that you have not yet set any of the source’s properties, starting with the destination
    table, as shown in the tooltip.


    ![9781484200834_Fig04-07.jpg](images/9781484200834_Fig04-07.jpg)


    [Figure 4-7](#9781484200834_Ch04.xhtml#_Fig7). Data Flow task with new source


    To open the source component, either double-click the component or right-click
    and select Edit. Inside the source component, you can fill in the Connection Manager
    property. The first connection manager of the appropriate type will automatically
    be populated, but selecting the drop-down list arrow will let you select any of
    the other connection managers that match. You can see the OLE DB Source Editor
    screen up to this point in [Figure 4-8](#9781484200834_Ch04.xhtml#Fig8).


    ![9781484200834_Fig04-08.jpg](images/9781484200834_Fig04-08.jpg)


    [Figure 4-8](#9781484200834_Ch04.xhtml#_Fig8). Initial OLE DB Source Editor screen


    Although most of the decision-making work was already done when you created the
    connection manager, it is important to understand the part the source plays in
    the Integration Services package. The source is the glue that holds all of the
    other pieces together and ensures that you have one place to go to for future
    maintenance issues or changes. Setting up the SQL Server source was an easy step
    to get you warmed up before you move on to create and optimize the query that
    the source uses.


    Writing a SQL Server Source Component Query'
  trans: '

    # 选择 SQL Server 连接管理器与提供程序


    在 ADO.NET、ODBC 和 OLE DB 之间，有足够多的连接管理器让你眼花缭乱！所有这些连接管理器都能连接到 SQL Server，那么你如何知道该在何时使用哪一种呢？为了回答这个问题，让我们先谈谈连接管理器实际在做什么，然后看看你可以用来连接到
    SQL Server 的每种连接管理器类型。


    一个 `连接管理器` 是保存外部源连接信息的对象，类似于应用程序数据源或 Reporting Services 共享数据源。连接管理器在 Integration
    Services 与其余组件之间提供了一个抽象层，因此关于外部源的信息可以在一个地方修改，从而影响所有的任务和组件。要查看所有可用的连接管理器类型，请参阅图
    4-1。


    ![9781484200834_Fig04-01.jpg](img/9781484200834_Fig04-01.jpg)


    图 4-1. 连接管理器类型


    以下是可用于连接到 SQL Server 数据库的三种连接管理器类型：


    *   ADO.NET

    *   ODBC

    *   OLE DB


    让我们逐一看看每种连接管理器类型。


    ## ADO.NET


    ADO.NET 连接管理器类型用于通过 .NET Framework 建立连接。此类型不仅可用于 SQL Server，还提供对其他应用程序和其他数据库的访问。ADO.NET
    层使用 .NET Framework 中的 `DataReader` 对象快速从源检索数据。


    当你在包的其他地方使用 ADO.NET 连接管理器时，将其用于 SQL Server 是最佳选择。例如，`Lookup` 组件使用 ADO.NET 连接管理器进行连接，因此你也应将其用作源。另一方面，如果一个组件使用另一种连接管理器类型，就坚持使用该类型。**一致性**是这里的关键。有关设置为连接到同一服务器上
    AdventuresWorks2012 数据库的示例连接管理器属性窗口，请参见图 4-2。


    ![9781484200834_Fig04-02.jpg](img/9781484200834_Fig04-02.jpg)


    图 4-2. ADO.NET 连接管理器属性屏幕


    ## ODBC


    ODBC 是开放数据库连接标准。它的目的是允许从任何应用程序到任何数据库的连接，无论供应商是谁。通常，组织会使用 DSN（数据源名称）在应用程序和 ODBC
    提供程序使用的连接字符串之间创建一个抽象层。如果你的组织确实希望将 DSN 与 SQL Server 一起使用，那么 ODBC 是你的选择。否则，请坚持使用
    ADO.NET 或 OLE DB 连接管理器。


    在 SQL Server 2012 之前，SSIS 没有 ODBC 源组件。相反，你仍然可以（并且现在也可以）使用 ADO.NET 连接管理器，只需稍作调整。创建
    ADO.NET 连接管理器后，将窗口顶部的提供程序更改为 Odbc Data Provider，如图 4-3 所示。


    ![9781484200834_Fig04-03.jpg](img/9781484200834_Fig04-03.jpg)


    图 4-3. ADO.NET 提供程序


    然后添加 DSN 名称或连接字符串。对于我们本地的 AdventureWorks2012 数据库，连接字符串将如清单 4-1 所示。


    **清单 4-1**. ODBC 连接字符串


    ```

    Driver={SQL Server Native Client 11.0};

    Server=localhost;

    Database=AdventureWorks2012;

    Trusted_Connection=yes

    ```


    我们完成的、使用 ODBC 提供程序的 ADO.NET 连接管理器屏幕如图 4-4 所示。


    ![9781484200834_Fig04-04.jpg](img/9781484200834_Fig04-04.jpg)


    图 4-4. ODBC ADO.NET 连接管理器属性屏幕


    如果你使用的是 SQL Server 2012 或更高版本，可以使用 ODBC 源组件。配置 ODBC 源与配置 ADO.NET 源非常相似，只是你使用的是
    ODBC 连接管理器。ODBC 源提供了优于 ADO.NET 的额外性能优势；但是，它需要 SQL Server 企业版才能在 SQL Server Data
    Tools 环境之外运行。


    ## OLE DB


    最后，我们来看一看可以说是用于连接到 SQL Server 最常用的连接管理器：OLE DB。OLE DB 协议由 Microsoft 编写，作为 ODBC
    提供程序的下一个版本。除了 SQL Server 数据库，你还可以使用 OLE DB 连接管理器连接到基于文件的数据库或 Excel 电子表格。


    当我连接到 SQL Server 数据库时，OLE DB 往往是我的默认选择。如果你不属于主要使用 ADO.NET 连接管理器的组件的类别，也不属于希望使用
    DSN 的组织类别，那么你将需要使用 OLE DB 连接管理器。


    你可以如图 4-5 所示填写 OLE DB 连接管理器的属性屏幕。


    ![9781484200834_Fig04-05.jpg](img/9781484200834_Fig04-05.jpg)


    图 4-5. OLE DB 连接管理器属性屏幕


    # 创建 SQL Server 源组件


    一旦你选择了正确的连接管理器和提供程序，就需要在用于数据提取的 `源组件` 中使用它们。首先，当你在“数据流”选项卡上时，查看 SSIS 工具箱。如果你尚未重新排列
    SSIS 工具箱，你将在“其他源”分组下看到所有可能的源，如图 4-6 所示。


    ![9781484200834_Fig04-06.jpg](img/9781484200834_Fig04-06.jpg)


    图 4-6. SSIS 工具箱中的“其他源”分组


    现在是选择的时候了。


    大部分困难的决策在设置连接管理器时已经完成。如果你使用 OLE DB 连接管理器，那么你必须使用 OLE DB 源。如果你决定使用带有 ADO.NET 或
    ODBC 提供程序的 ADO.NET 连接管理器，则必须使用 ADO.NET 源。


    一旦将所需的源拖到数据流设计窗口，数据流就包含了一个组件，如图 4-7 所示。Integration Services 通过显示带有白色 X 的红色圆圈来告知开发人员源存在问题。在这种情况下，问题是你尚未设置源的任何属性，从目标表开始，如工具提示所示。


    ![9781484200834_Fig04-07.jpg](img/9781484200834_Fig04-07.jpg)


    图 4-7. 带有新源的数据流任务


    要打开源组件，请双击该组件或右键单击并选择“编辑”。在源组件内部，你可以填写 `连接管理器` 属性。适当类型的第一个连接管理器将自动填充，但选择下拉列表箭头将允许你选择任何其他匹配的连接管理器。到目前为止，你可以看到
    OLE DB 源编辑器屏幕，如图 4-8 所示。


    ![9781484200834_Fig04-08.jpg](img/9781484200834_Fig04-08.jpg)


    图 4-8. 初始的 OLE DB 源编辑器屏幕


    尽管在创建连接管理器时大部分决策工作已经完成，但理解源在 Integration Services 包中扮演的角色仍然很重要。源是将所有其他部分粘合在一起的粘合剂，并确保你有一个地方可以处理未来的维护问题或更改。设置
    SQL Server 源是一个简单的步骤，让你在继续创建和优化源所使用的查询之前先热身。


    # 编写 SQL Server 源组件查询

