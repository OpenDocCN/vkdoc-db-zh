    sys.tables               Where name = ''stgUpdates'')  CREATE TABLE dbo.stgUpdates
      (ColID int NULL   ,ColA varchar(10) NULL   ,ColB datetime NULL   ,ColC int NULL)  Use
    SSISIncrementalLoad_Source Go   -- insert an "unchanged", a "changed", and a "new"
    row INSERT INTO dbo.tblSource  (ColID,ColA,ColB,ColC)  VALUES  (0, ''A'', ''1/1/2007
    12:01 AM'', -1),  (1, ''B'', ''1/1/2007 12:02 AM'', -2),  (2, ''N'', ''1/1/2007
    12:03 AM'', -3)  Use SSISIncrementalLoad_Dest Go  -- insert a "changed" and an
    "unchanged" row INSERT INTO dbo.tblDest  (ColID,ColA,ColB,ColC)  VALUES  (0, ''A'',
    ''1/1/2007 12:01 AM'', -1),  (1, ''C'', ''1/1/2007 12:02 AM'', -2) ```    The
    T-SQL statements in [Listing 19-5](#9781484200834_Ch19.


