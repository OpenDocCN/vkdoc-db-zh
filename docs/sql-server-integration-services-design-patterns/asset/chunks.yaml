- fmt: "\n\n# Creating the rpt Schema and rpt.ReturnAppInstanceHeader Stored Procedure\n\
    \n[**Listing A-21**](#9781484200834_AppA.xhtml#_list21) contains the T-SQL script\
    \ required to build the `rpt` schema and the `rpt.ReturnAppInstanceHeader` stored\
    \ procedure.\n\n```sql\n/* rpt schema */\nIf Not Exists(Select name\n        \
    \      From sys.schemas\n              Where name = 'rpt')\n begin\n  print 'Creating\
    \ rpt schema'\n  declare @sql varchar(100) = 'Create Schema rpt'\n  exec(@sql)\n\
    \  print 'Rpt schema created'\n end\nElse\n print 'Rpt schema already exists.'\n\
    print ''\n\n/* rpt.ReturnAppInstanceHeader stored procedure */\nIf Exists(Select\
    \ s.name + '.' + p.name\n          From sys.procedures p\n          Join sys.schemas\
    \ s\n            On s.schema_id = p.schema_id\n          Where s.name = 'rpt'\n\
    \            And p.name = 'ReturnAppInstanceHeader')\n begin\n  print 'Dropping\
    \ rpt.ReturnAppInstanceHeader stored procedure'\n  Drop Procedure rpt.ReturnAppInstanceHeader\n\
    \  print 'Rpt.ReturnAppInstanceHeader stored procedure dropped'\n end\nprint 'Creating\
    \ rpt.ReturnAppInstanceHeader stored procedure'\ngo\n\nCreate Procedure rpt.ReturnAppInstanceHeader\n\
    \ @ApplicationName varchar(255) = NULL\nAs\n\n  Select a.ApplicationID\n     \
    \  ,ap.AppInstanceID\n       ,a.ApplicationName\n       ,ap.StartDateTime\n  \
    \     ,DateDiff(ss,ap.StartDateTime,Coalesce(ap.EndDateTime,GetDate())) As RunSeconds\n\
    \       ,ap.Status\n  From log.SSISAppInstance ap\n  Join cfg.Applications a\n\
    \    On ap.ApplicationID = a.ApplicationID\n  Where a.ApplicationName = Coalesce(@ApplicationName,a.ApplicationName)\n\
    \  Order by AppInstanceID desc\n\ngo\nprint 'Rpt.ReturnAppInstanceHeader stored\
    \ procedure created.'\nprint ''\n```\n\n## Creating the Report in SSDT\n\nReturn\
    \ to `SSDT`, right-click the `Reports` virtual folder in `Solution Explorer`,\
    \ and click `Add New Report`. If the welcome screen displays, then click the `Next`\
    \ button. On the `Select the Data Source` screen, select the shared data source\
    \ named `SSISConfig` and click the `Next` button. The `Design the Query` window\
    \ displays next; add `rpt.ReturnAppInstanceHeader` to the `Query String` textbox\
    \ and click the `Next` button. Select `Tabular` on the `Select the Report Type`\
    \ page and click the `Next` button. When the `Design the Table` page displays,\
    \ multiselect all the columns listed in the `Available Fields` listbox and click\
    \ the `Details` button. The Report Wizard will appear as shown in [Figure A-20](#9781484200834_AppA.xhtml#Fig20).\n\
    \n![9781484200834_FigAppA-20.jpg](images/9781484200834_FigAppA-20.jpg)\n\n[Figure\
    \ A-20](#9781484200834_AppA.xhtml#_Fig20). Selecting all available fields as details\n\
    \nClick the `Next` button. Select a theme on the `Choose the Table Style` page\
    \ and click the `Next` button. On the `Completing the Wizard` page, enter **Application\
    \ Instance** in the `Report Name` property textbox and click the `Finish` button.\n\
    \nThe `SSRS Report Wizard` will generate the report, but it doesn’t manage stored\
    \ procedures effectively. You need to change this so you get the maximum performance\
    \ out of the reports. Click `View` -> `Report Data` to display the `Report Data`\
    \ sidebar. Expand the `Datasets` virtual folder. Right-click `DataSet1` and click\
    \ `Dataset Properties`. When the `Dataset Properties` window displays, rename\
    \ the dataset `rpt_ReturnAppInstanceHeader` (the `Dataset Name` property does\
    \ not like periods). Copy `rpt.ReturnAppInstanceHeader` out of the `Query` property\
    \ and click the `Stored Procedure` option under `Query Type`. Paste `rpt.ReturnAppInstanceHeader`\
    \ into the `Select or Enter Stored Procedure Name` drop-down. The `Dataset Properties`\
    \ window should appear similar to what is shown in [Figure A-21](#9781484200834_AppA.xhtml#Fig21).\n\
    \n![9781484200834_FigAppA-21.jpg](images/9781484200834_FigAppA-21.jpg)\n\n[Figure\
    \ A-21](#9781484200834_AppA.xhtml#_Fig21). Configuring the dataset to use the\
    \ rpt.ReturnAppInstanceHeader stored procedure\n\nClick the `OK` button to close\
    \ the `Dataset Properties` window.\n\n## Configuring the Report Parameter\n\n\
    If you click the `Preview` tab, the report will prompt you for an application\
    \ name as shown in [Figure A-22](#9781484200834_AppA.xhtml#Fig22).\n\n![9781484200834_FigAppA-22.jpg](images/9781484200834_FigAppA-22.jpg)\n\
    \n[Figure A-22](#9781484200834_AppA.xhtml#_Fig22). Prompting for application name\n\
    \nType **SSISApp1** in the textbox and click the `View Report` button in the upper-right\
    \ corner. We don’t want the user to supply an SSIS application each time they\
    \ use the report, so let’s configure the report parameter named `@ApplicationName`.\
    \ Click the `Design` tab and return to the `Report Data` sidebar. Expand the `Parameters`\
    \ virtual folder. Double-click `@ApplicationName` to open the `Report Parameter\
    \ Properties` window. On the `General` page, check the `Allow Null Value` checkbox\
    \ and change the `Select Parameter Visibility` option to `Hidden`. On the `Default\
    \ Values` page, select the `Specify Values` option and click the `Add` button.\
    \ A `(Null)` row will be added to the `Value` grid, which is what we want. Click\
    \ the `OK` button to close the `Report Parameter Properties` window.\n\nTest the\
    \ changes by clicking the `Preview` tab. The report should display all application\
    \ instance rows stored in the database, as shown in [Figure A-23](#9781484200834_AppA.xhtml#Fig23).\n\
    \n![9781484200834_FigAppA-23.jpg](images/9781484200834_FigAppA-23.jpg)\n\n[Figure\
    \ A-23](#9781484200834_AppA.xhtml#_Fig23). Displaying the application instance\
    \ data\n\n## Removing the 0 Row\n\nWe do not want to see the `0` rows displayed\
    \ in these reports. Modify the `rpt.ReturnAppInstanceHeader` stored procedure\
    \ to eliminate these records from the returned results by executing the T-SQL\
    \ shown in [Listing A-22](#9781484200834_AppA.xhtml#list22).\n\n[**Listing A-22**](#9781484200834_AppA.xhtml#_list22).\
    \ Updating the rpt.ReturnAppInstanceHeader Stored Procedure\n\n```sql\n/* rpt.ReturnAppInstanceHeader\
    \ stored procedure */\nIf Exists(Select s.name + '.' + p.name\n          From\
    \ sys.procedures p\n          Join sys.schemas s\n            On s.schema_id =\
    \ p.schema_id\n          Where s.name = 'rpt'\n            And p.name = 'ReturnAppInstanceHeader')\n\
    \ begin\n  print 'Dropping rpt.ReturnAppInstanceHeader stored procedure'\n  Drop\
    \ Procedure rpt.ReturnAppInstanceHeader\n  print 'Rpt.ReturnAppInstanceHeader\
    \ stored procedure dropped'\n end\nprint 'Creating rpt.ReturnAppInstanceHeader\
    \ stored procedure'\ngo\n\nCreate Procedure rpt.ReturnAppInstanceHeader\n @ApplicationName\
    \ varchar(255) = NULL\nAs\n\n  Select a.ApplicationID\n       ,ap.AppInstanceID\n\
    \       ,a.ApplicationName\n       ,ap.StartDateTime\n       ,DateDiff(ss,ap.StartDateTime,Coalesce(ap.EndDateTime,GetDate()))\
    \ As RunSeconds\n       ,ap.Status\n  From log.SSISAppInstance ap\n  Join cfg.Applications\
    \ a\n    On ap.ApplicationID = a.ApplicationID\n  Where a.ApplicationName = Coalesce(@ApplicationName,a.ApplicationName)\n\
    \  And a.ApplicationID > 0\n  Order by AppInstanceID desc\n\ngo\nprint 'Rpt.ReturnAppInstanceHeader\
    \ stored procedure created.'\nprint ''\n```\n\nRefresh the Application Instance\
    \ report preview and it now appears as shown in [Figure A-24](#9781484200834_AppA.xhtml#Fig24).\n\
    \n![9781484200834_FigAppA-24.jpg](images/9781484200834_FigAppA-24.jpg)\n\n[Figure\
    \ A-24](#9781484200834_AppA.xhtml#_Fig24). Refreshed Application Instance report,\
    \ sans the 0 row\n\n## Adding Conditional Background Color\n\nColor helps identify\
    \ the state better than most visual cues. To add background color to the data\
    \ rows, return to the `Design` tab and select the row that displays data values\
    \ (the bottom row) in the table. Press the `F4` key to display `Properties` and\
    \ click on the `BackgroundColor` property. In the `BackgroundColor` property’s\
    \ value drop-down, select `Expression`. When the `Expression` window opens, change\
    \ the text in the `Set Expression for: BackgroundColor` textbox from `No Color`\
    \ (the default) to the following expression:\n\n```vb\n=Switch(Fields!Status.Value=\"\
    Success\", \"LightGreen\" , Fields!Status.Value=\"Failed\", \"LightCoral\" , Fields!Status.Value=\"\
    Running\", \"LightBlue\" , Fields!Status.Value=\"Cancelled\", \"LightYellow\"\
    )\n```\n\n"
