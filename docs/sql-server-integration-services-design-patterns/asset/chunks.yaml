    execution          EXEC [SSISDB].[catalog].[start_execution] @exec_id          
    -- Return the execution ID          SELECT N''Started package execution '' + CONVERT(nvarchar(20),
    @exec_id)           -- Mark the file as processed          DECLARE @UpdateSql
    nvarchar(1024) = N''UPDATE [dbo].[PackageConfiguration] SET processed = 1          WHERE
    id = '' + CONVERT(nvarchar(20), @Id)          EXEC sp_sqlexec @UpdateSql          
    SET @count = @count + 1 END ```    Conclusion    This chapter has covered some
    of the usage patterns for the new parameter model, as well as some dynamic configuration
    scenarios. Although the configuration patterns and best practices that were commonly
    used in SQL 2005 and 2008 continue to work in the latest version of SSIS, most
    users will see a benefit in migrating to the new model. The clarity of the parameter
    model was designed to help everyone involved with an SSIS solution life cycle,
    from those who develop the packages to those who deploy and schedule them.    CHAPTER
    18    ![image](images/frontdot.jpg)    Deployment    Great strides were made towards
    simplifying the deployment process for Integration Services projects in SQL Server
    2012\. Projects within Visual Studio can now target two different deployment models
    – the Package Deployment Model, which is similar to what was used in previous
    versions of the product, and the Project Deployment Model, which was designed
    for the new SSIS Catalog.    This chapter will focus on patterns associated with
