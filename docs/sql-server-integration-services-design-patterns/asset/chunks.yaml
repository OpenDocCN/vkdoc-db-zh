- fmt: "# 执行 SSIS 包\n\n你可以构建出色的 SQL Server Integration Services (SSIS) 包，但除非执行它们，否则它们毫无用处！SSIS\
    \ 提供了多种执行包的方法。在本章中，我们将探讨以下内容：\n\n*   调试执行\n*   命令行执行\n*   执行包实用工具\n*   SQL Server\
    \ 2014 Integration Services\n*   Integration Services 目录\n*   Integration Services\
    \ 目录存储过程\n*   计划 SSIS 包执行\n*   执行包任务\n*   元数据驱动执行\n*   从托管代码执行\n\n我们将首先创建一个简单的\
    \ SSIS 包用于演示。\n\n## 构建演示用的 SSIS 包\n\n创建一个名为 **Chapter2** 的新 SSIS 解决方案。重命名 SSIS\
    \ 包，将名称从 `Package.dtsx` 更改为 `Chapter2.dtsx`。\n\n![Image](images/sq.jpg) **提示**\
    \ *有关创建 SSIS 解决方案和包的更多信息，请参阅 Michael Coles 和 Francis Rodrigues 所著的《Professional\
    \ SQL Server 2014 Integration Services》(Apress, 2012)*。\n\n将脚本组件拖放到控制流画布上并打开编辑器。在“脚本”页面的\
    \ `ScriptLanguage` 属性中选择你偏好的语言。在 `ReadOnlyVariables` 中选择 `System::PackageName`\
    \ 变量，然后单击“编辑脚本”按钮。\n\n如果你为脚本任务的 `ScriptLanguage` 属性选择了 Microsoft Visual Basic\
    \ 2010，请将 `Public Sub Main()` 中的代码替换为以下内容：\n\n```vbnet\nPublic Sub Main()\n\n\
    Dim sPackageName As String = Dts.Variables(\"PackageName\").Value.ToString\nDim\
    \ sMsg As String = \"Package Name: \" & sPackageName\n\nMsgBox(sMsg, , sPackageName)\n\
    \nDts.TaskResult = ScriptResults.Success\nEnd Sub\n```\n\n如果你为脚本任务的 `ScriptLanguage`\
    \ 属性选择了 Microsoft Visual C# 2010，请将 `public void Main()` 中的代码替换为以下内容：\n\n```csharp\n\
    public void Main()\n{\n    string sPackageName = Dts.Variables[\"PackageName\"\
    ].Value.ToString();\n    string sMsg = \"Package Name: \" + sPackageName;\n\n\
    \    MessageBox.Show(sMsg, sPackageName);\n\n    Dts.TaskResult = (int)ScriptResults.Success;\n\
    }\n```\n\n保存包、项目和解决方案。准备运行！\n\n## 调试执行\n\n在 SQL Server Business Intelligence Development\
    \ Studio (BIDS) 内执行包非常简单。无论选择哪种部署模型，其工作方式都相同。然而，与 Visual Studio 集成开发环境 (VS IDE)\
    \ 中的所有操作一样，有多种方法可以实现。\n\n当你在 BIDS 内执行 SSIS 包时，你是在调用 SSIS 调试器。SSIS 调试器文件名为 `DtsDebugHost.exe`，存储在\
    \ `<drive>:\\Program Files\\Microsoft SQL Server\\120\\DTS\\Binn` 文件夹中。重要的是要认识到你是在调试宿主进程内执行\
    \ SSIS 包。为什么？因为调试会产生开销——那些框变色可不是免费的！\n\n要在 BIDS 中执行 `Chapter2.dtsx` 包，请按 F5 键。调试宿主加载，然后加载包并执行它。你应该会看到一个显示包名的消息框。当你单击消息框上的“确定”按钮时，Chapter2\
    \ 包控制流中的脚本任务会从黄色变为绿色。“连接管理器”选项卡下方会出现一个链接，指示包执行已完成。但是，`DtsDebugHost.exe` 进程仍在执行。它会继续执行，直到\
    \ BIDS 调试器停止。\n\n以下是一些启动 BIDS 调试器的方法：\n\n*   按 F5 键。\n*   单击工具栏上的 VCR 播放按钮（指向右的绿色箭头）。\n\
    *   单击“调试”下拉菜单并选择“开始调试”。\n\n![Image](images/sq.jpg) **注意** 实际上，从“调试”下拉菜单中选择“逐语句”或“逐过程”也会启动\
    \ BIDS 调试器。\n\n*   在解决方案资源管理器中，右键单击包并从菜单中选择“执行包”。\n*   当包在调试模式下完成执行后，可以通过以下方式之一重新启动包：\n\
    \    *   按住 Ctrl+Shift 并按 F5 键\n    *   使用工具栏上的 VCR 重新启动按钮\n    *   单击“调试”下拉菜单并单击“重新启动”\n\
    \n以下是一些在包执行完成后（或任何时候需要停止调试模式）停止调试器的方法：\n\n*   按住 Shift 并按 F5 键。\n*   单击工具栏上的 VCR\
    \ 停止按钮（方块）。\n*   单击“调试”下拉菜单并选择“停止调试”。\n*   单击“调试”下拉菜单并选择“终止所有”。\n*   单击“连接管理器”选项卡下方的“包执行已完成”链接。\n\
    \n## 命令行执行\n\nSSIS 包的命令行执行使用 DTEXEC 实用工具 (`DtExec.exe`)。DTEXEC 支持项目和包部署模型。你可以通过单击“调试”下拉菜单并选择“开始执行(不调试)”（或按住\
    \ Ctrl 键并按 F5）在 BIDS 内手动调用 DTEXEC。你也可以从命令提示符手动启动 DTEXEC。\n\nDTEXEC 通常不是手动调用的。相反，通常将\
    \ DTEXEC 命令行与计划软件结合使用，在生产环境中执行 SSIS 包。例如，当你使用 SQL Server Agent 计划 SSIS 包（本章稍后介绍）时，就会实例化\
    \ DTEXEC。\n\n要使用 DTEXEC 执行 `Chapter2.dtsx` SSIS 包，请打开命令提示符并输入以下命令：\n\n```\ndtexec\
    \ /FILE \"G:\\Projects\\SSIS Design Patterns\\SSIS Design Patterns\\Chapter2.dtsx\"\
    \n```\n\n此命令执行位于 `G:\\Projects\\SSIS Design Patterns\\SSIS Design Patterns` 文件夹中的\
    \ `Chapter2.dtsx` SSIS 包。如果你跟着做，请编辑命令行以反映你的 SSIS 包的位置。\n\n当你从命令行执行包时，消息框会显示包名——就像从\
    \ BIDS 调试器内执行包时一样。\n\n如果 SSIS 包已部署到新的 SSIS 目录，你仍然可以使用类似以下的命令从命令行执行它：\n\n```\n\
    dtexec.exe /ISSERVER \"\\\"\\SSISDB\\Chapter2\\Chapter2\\Chapter2.dtsx\\\"\" /SERVER\
    \ \"\\\"SSISMVP-RC0\\\"\" /Par \"\\\"$ServerOption::SYNCHRONIZED(Boolean)\\\"\"\
    ;True /REPORTING E /CALLERINFO Andy\n```\n\n## 执行包实用工具\n\n执行包实用工具 (DtExecUI) 在其自身进程中运行并执行\
    \ SSIS 包。我喜欢使用执行包实用工具来构建 DTEXEC 命令行，但它仅支持包部署模型。你至少可以通过三种方式调用执行包实用工具：\n\n*   单击“开始”\
    \ ![image](images/arrow.jpg) “所有程序” ![image](images/arrow.jpg) “Microsoft SQL\
    \ Server” ![image](images/arrow.jpg) “Integration Services” ![image](images/arrow.jpg)\
    \ “执行包实用工具”。\n*   单击“开始” ![image](images/arrow.jpg) “运行”，在“打开”文本框中键入 **dtexecui**。\n\
    *   双击一个 dtsx 文件（如果你没有为 dtsx 文件重新映射默认应用程序设置）。\n\n我最喜欢的选项是双击 dtsx 文件。这不仅会打开执行包实用工具，还会将“常规”页的设置设置为指示包源是文件系统，并使用双击的\
    \ dtsx 文件的完整路径配置“包路径”文本框。很棒。\n\n如果我使用执行包实用工具执行 `Package2.dtsx`，将显示“包执行进度”表单，通知我包的执行进度（多么贴切），并且消息框会出现，就像我使用\
    \ BIDS 调试器和命令行执行时一样。\n\n![Image](images/sq.jpg) **注意** *有关执行包实用工具的更多信息，请参阅 Michael\
    \ Coles 和 Francis Rodrigues 所著的《Professional SQL Server 11 Integration Services》(Apress,\
    \ 2012)*。\n\n## SQL Server 2014 Integration Services 服务"
  raw: "You can build awesome SQL Server Integration Services (SSIS) packages, but\
    \ they do you no good until you execute them! SSIS provides several methods for\
    \ package execution. In this chapter, we will examine the following:\n\n*   Debug\
    \ execution\n*   Command-line execution\n*   The Execute Package utility\n*  \
    \ SQL Server 2014 Integration Services\n*   Integration Services catalogs\n* \
    \  Integration Services catalog stored procedures\n*   Scheduling SSIS package\
    \ execution\n*   The Execute Package task\n*   Metadata-driven execution\n*  \
    \ Execution from managed code\n\nWe’ll begin by creating a simple SSIS package\
    \ to use for demonstration purposes.\n\nBuilding the Demonstration SSIS Package\n\
    \nCreate a new SSIS solution named **Chapter2**. Rename the SSIS package, changing\
    \ the name from `Package.dtsx` to `Chapter2.dtsx`.\n\n![Image](images/sq.jpg) **Tip**  *For\
    \ more information on creating SSIS solutions and packages, see* Professional\
    \ SQL Server 2014 Integration Services *by Michael Coles and Francis Rodrigues\
    \ (Apress, 2012)*.\n\nDrag a script component onto the control flow canvas and\
    \ open the editor. Choose your language of choice in the ScriptLanguage property\
    \ on the Script page. Select the `System::PackageName` variable in ReadOnlyVariables,\
    \ and then click the Edit Script button.\n\nIf you selected Microsoft Visual Basic\
    \ 2010 as the ScriptLanguage property setting for the Script task, replace the\
    \ code in `Public Sub Main()` with the following:\n\n```\nPublic Sub Main()\n\n\
    Dim sPackageName As String = Dts.Variables(\"PackageName\").Value.ToString\nDim\
    \ sMsg As String = \"Package Name: \"& sPackageName\n\nMsgBox(sMsg, , sPackageName)\n\
    \nDts.TaskResult = ScriptResults.Success\nEnd Sub\n```\n\nIf you selected Microsoft\
    \ Visual C# 2010 as the ScriptLanguage property setting for the Script task, replace\
    \ the code in `public void Main()` with the following :\n\n```\npublic void Main()\n\
    {\n    string sPackageName = Dts.Variables[\"PackageName\"].Value.ToString();\n\
        string sMsg = \"Package Name: \" + sPackageName;\n\nMessageBox.Show(sMsg,\
    \ sPackageName);\n\nDts.TaskResult = (int)ScriptResults.Success;\n}\n```\n\nSave\
    \ the package, project, and solution. You’re ready to run!\n\nDebug Execution\n\
    \nExecuting the package from within SQL Server Business Intelligence Development\
    \ Studio (BIDS) is straightforward. It works the same regardless of the deployment\
    \ model selected. However, as with everything in the Visual Studio Integrated\
    \ Development Environment (VS IDE), you have several ways to accomplish this.\n\
    \nWhen you execute an SSIS package inside BIDS, you are invoking the SSIS debugger.\
    \ The SSIS debugger file is named `DtsDebugHost.exe` and it’s stored in the `<`*drive*`>:\\\
    Program Files\\Microsoft SQL Server\\120\\DTS\\Binn` folder. It’s important to\
    \ realize you’re executing the SSIS package inside a debug host process. Why?\
    \ There is overhead associated with debugging— those boxes don’t change color\
    \ for free!\n\nTo execute the `Chapter2.dtsx` package in BIDS, press the F5 key.\
    \ The debug host loads, then it loads the package and executes it. You should\
    \ see a message box proclaiming the package name. When you click the OK button\
    \ on the message box, the Script task in the Chapter2 package control flow turns\
    \ from yellow to green. A link appears beneath the Connections Managers tab to\
    \ indicate package execution has completed. However, the `DtsDebugHost.exe` process\
    \ is still executing. It continues executing until the BIDS debugger is stopped.\n\
    \nHere are some ways to start the BIDS debugger:\n\n*   Press the F5 key.\n* \
    \  Click the VCR Play button (the green arrow pointing right) on the toolbar.\n\
    *   Click the Debug drop-down menu and select Start Debugging.\n\n![Image](images/sq.jpg) **Note**  Actually,\
    \ selecting Step Into or Step Over from the Debug drop-down menu also starts the\
    \ BIDS debugger.\n\n*   In Solution Explorer, right-click the package and select\
    \ Execute Package from the menu.\n*   When the package has completed execution\
    \ in Debug mode, restart the package in one of these ways:\n    *   By holding\
    \ Ctrl+Shift and pressing the F5 key\n    *   Using the VCR Restart button on\
    \ the toolbar\n    *   Clicking the Debug drop-down menu and clicking Restart\n\
    \nHere are some ways to stop the debugger once the package execution completes\
    \ (or whenever a Debug mode Stop is desired):\n\n*   Hold Shift and press the\
    \ F5 key.\n*   Click the VCR Stop button (the square) on the toolbar.\n*   Click\
    \ the Debug drop-down menu and select Stop Debugging.\n*   Click the Debug drop-down\
    \ menu and select Terminate All.\n*   Click the Package Execution Completed link\
    \ beneath the Connection Managers tab.\n\nCommand-Line Execution\n\nCommand-line\
    \ SSIS package execution uses the DTEXEC utility (`DtExec.exe`). DTEXEC supports\
    \ project and package deployment models. You can manually invoke DTEXEC from inside\
    \ BIDS by clicking the Debug drop-down menu and selecting Start Without Debugging\
    \ (or by holding the Ctrl key and pressing F5). You can also manually start DTEXEC\
    \ from a command prompt.\n\nDTEXEC isn’t often invoked manually. Instead it’s\
    \ common to see DTEXEC command lines used with scheduling software to execute\
    \ SSIS packages in production environments. For example, when you schedule an\
    \ SSIS package using SQL Server Agent (covered later in this chapter), DTEXEC\
    \ is instantiated.\n\nTo execute the `Chapter2.dtsx` SSIS package using DTEXEC,\
    \ open a command prompt and enter the following command:\n\n```\ndtexec /FILE\
    \ \"G:\\Projects\\SSIS Design Patterns\\SSIS Design Patterns\\Chapter2.dtsx\"\n\
    ```\n\nThis command executes the `Chapter2.dtsx` SSIS package located in the G`:\\\
    Projects\\SSIS Design Patterns\\SSIS Design Patterns` folder. Edit the command\
    \ line to reflect the location of your SSIS package if you’re playing along at\
    \ home.\n\nWhen you execute the package from the command line, the message box\
    \ displays the package name—as it does when the package is executed from inside\
    \ the BIDS debugger.\n\nIf the SSIS package is deployed to the new SSIS catalog,\
    \ you can still execute it from the command line using a command similar to this\
    \ one:\n\n```\ndtexec.exe /ISSERVER \"\\\"\\SSISDB\\Chapter2\\Chapter2\\Chapter2.dtsx\\\
    \"\" /SERVER \"\\\"SSISMVP-RC0\\\"\" /Par \"\\\"$ServerOption::SYNCHRONIZED(Boolean)\\\
    \"\";True /REPORTING E /CALLERINFO Andy\n```\n\nExecute Package Utility\n\nThe\
    \ Execute Package Utility (DtExecUI) runs in its own process and executes SSIS\
    \ packages. I like using the Execute Package Utility to build DTEXEC command lines,\
    \ but it only supports the package deployment model. You can invoke the Execute\
    \ Package Utility in at least three ways:\n\n*   Click Start ![image](images/arrow.jpg)\
    \ All Programs ![image](images/arrow.jpg) Microsoft SQL Server ![image](images/arrow.jpg)\
    \ Integration Services ![image](images/arrow.jpg) Execute Package Utility.\n*\
    \   Click Start ![image](images/arrow.jpg) Run and type **dtexecui** in the Open\
    \ text box.\n*   Double-click on a dtsx file (if you haven’t remapped the default\
    \ application settings for dtsx files).\n\nMy favorite option is double-clicking\
    \ the dtsx file. This not only opens the Execute Package Utility, but it sets\
    \ the General page settings to indicate that the package source is the file system\
    \ and configures the package path text box with the full path of the dtsx file\
    \ I double-clicked. Neat.\n\nIf I execute `Package2.dtsx` using the Execute Package\
    \ Utility, the Package Execution Progress form displays, informing me of the package’s\
    \ execution progress (how appropriate) and the message box appears as it did when\
    \ I executed using the BIDS debugger and the command line.\n\n![Image](images/sq.jpg) **Note**  *See*\
    \ Professional SQL Server 11 Integration Services *by Michael Coles and Francis\
    \ Rodrigues (Apress, 2012) for more information about the Execute Package Utility*.\n\
    \nThe SQL Server 2014 Integration Services Service"
  trans: "\n# 执行 SSIS 包\n\n你可以构建出色的 SQL Server Integration Services (SSIS) 包，但除非执行它们，否则它们毫无用处！SSIS\
    \ 提供了多种执行包的方法。在本章中，我们将探讨以下内容：\n\n*   调试执行\n*   命令行执行\n*   执行包实用工具\n*   SQL Server\
