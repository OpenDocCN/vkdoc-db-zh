    这不是处理此格式文件加载的唯一方法。它是一种方法，其优点是提供了很大的灵活性。


    ### 标题行和页脚行


    许多来源的提取文件都包含 `标题` 行和 `页脚` 行。我经常在基于大型机的数据库系统提供的平面文件中看到这些行。


    `标题行` 包含有关提取文件内容的元数据——提取信息的摘要。至少，它会包含提取日期。通常有一个字段包含提取的行计数。细想一下，这是非常实用的工具——它提供了一种检查行数是否正确的方法。这种检查可以在提取后立即进行，也可以在加载提取后立即进行——两者都是此元数据的有效用途。


    `页脚行` 在概念上是相同的。唯一的区别是位置：`标题` 行出现在文件开头；`页脚` 行出现在文件末尾。如果您包含行计数以验证写入或读取的行数是否正确，首先写入此信息是提高容错性的好方法。为什么？想象一下失败：写入操作中断或提取异常结束。`标题`
    行可能指示 100 行，例如，但随后只有 70 行数据。如果行计数元数据包含在 `标题` 行中，就可以精确计算出缺少多少数据行。相比之下，`页脚` 行会直接缺失。尽管缺失的
    `页脚` 会表明提取失败，但那*仅能*表明这一点。拥有行计数元数据可以让您获取更多关于故障的更好信息。


    在本节中，我们将研究如何使用 SQL Server 2014 Integration Services 创建和使用 `标题` 行和 `页脚` 行。


    ### 使用页脚行


    我们首先研究如何使用 `页脚` 行。首先，创建一个包含 `页脚` 行的文件。我的文件如下所示：


    ```

    ID,Name,Value

    11,Andy,12

    22,Christy,13

    33,Stevie Ray,14

    44,Emma Grace,15

    55,Riley Cooper,16

    5 rows, extracted 10/5/2011 10:22:12 AM

    ```


    为了演示，请创建您自己的文件并将其命名为 `MyFileFooterSource.csv`。创建一个新的 SSIS 包并将其重命名为 `ParseFileFooter.dtsx`。添加一个
    `数据流任务` 并切换到数据流选项卡。添加一个 `平面文件源` 适配器并双击它以打开 `平面文件源编辑器`。在“连接管理器”页面上，单击“新建”按钮以创建新的
    `平面文件连接管理器` 并打开编辑器。将 `平面文件连接管理器` 命名为 `My File Footer Source File`，并将 `文件路径` 属性设置为
    `MyFileFooterSource.csv` 的位置。勾选 `首行数据包含列名` 复选框。转到“列”页面以验证您的配置是否匹配，如 图 7-15 所示。


    ![9781484200834_Fig07-15.jpg](img/9781484200834_Fig07-15.jpg)


    图 7-15. 包含 `页脚` 行的文件的 `平面文件连接管理器` 列页面


    您可以在 图 7-15 所示的预览中看到 `页脚` 行内容。您可能能够在也可能无法在 `平面文件连接管理器编辑器` 的“列”页面上查看 `页脚` 行。


    下一步是将 `页脚` 行与数据行分开。为此，您将使用 `条件拆分` 转换来隔离 `页脚` 行。检测 `页脚` 行有*很多*不同的方法，但诀窍是选择该行的某个独特之处。在
    图 7-16 中定义的 SSIS 表达式语言表达式中，我在 `ID` 列中搜索术语 `"rows"`。只要数据行的 `ID` 列中*永远没有机会*合法出现术语
    `"rows"`，这个条件就会有效。“永远”是很长的时间。


    ![9781484200834_Fig07-16.jpg](img/9781484200834_Fig07-16.jpg)


    图 7-16. 配置 `条件拆分` 转换


    为了终止数据行管道——该管道从 `条件拆分` 转换的默认输出流出——我使用了一个 `派生列` 转换。


    `页脚` 行输出需要更多解析。我们将其发送到另一个名为 `der Parse Footer` 的 `派生列` 转换。


    **注意** Jamie Thomson 写了一篇题为“SSIS：建议的最佳实践和命名约定”的精彩文章 (`http://sqlblog.com/blogs/jamie_thomson/archive/2012/01/29/suggested-best-practises-and-naming-conventions.aspx`)。我经常使用
    Jamie 的命名约定。


    我们想要行数和提取的日期时间。我使用 图 7-17 中的表达式来解析 `页脚` 行计数和 `页脚` 提取日期时间：


    ![9781484200834_Fig07-17.jpg](img/9781484200834_Fig07-17.jpg)


    图 7-17. 解析行计数和提取日期


    现在我们已经在数据流管道中获得了 `页脚` 行元数据。我们可以使用另一个 `派生列` 转换 `der Trash Destination Footer` 来终止此分支管道。将
    `der Parse Footer` 连接到 `der Trash Destination Footer`。右键单击数据流路径，然后单击 `启用数据查看器`。在调试器中执行包以查看
    `页脚` 行的内容，如 图 7-18 所示。


    ![9781484200834_Fig07-18.jpg](img/9781484200834_Fig07-18.jpg)


    图 7-18. 已解析的 `页脚` 行


    从 图 7-18 可以看出，五 (5) 个数据行退出了 `条件拆分` 转换。我们可以在 `数据查看器` 中观察到解析后的 `页脚` 行内容。


    ### 使用标题行


    `标题` 行更容易读取。让我们从查看名为 `MyFileHeaderSource.csv` 的源文件开始：


    ```

    5 rows, extracted 10/5/2011 10:22:12 AM


    ID,Name,Value

    11,Andy,12

    22,Christy,13

    33,Stevie Ray,14

    44,Emma Grace,15

    55,Riley Cooper,16

    ```

    '
- fmt: "# 处理文档格式\n\n本文介绍如何使用 SSIS 处理文件的标题行与页脚行。\n\n## 解析文件标题行\n\n您可以通过几种不同的方式读取标题行。在此解决方案中，我们利用一个平面文件连接管理器和一个数据流来解析数据的标题行。我们严重依赖脚本组件逻辑来进行解析和缓冲操作。\n\
    \n首先创建一个新的 SSIS 包。我将其命名为 `ParseFileHeader.dtsx`。\n\n添加一个数据流任务并打开数据流任务编辑器。添加一个平面文件源适配器并打开其编辑器。使用“新建”按钮创建一个新的平面文件连接管理器，指向\
    \ `MyFileHeaderSource.csv`。取消选中“数据流首行包含列名”复选框。请务必单击连接管理器编辑器的“高级”页面，并将 `Column\
    \ 0` 和 `Column 1` 的名称分别更改为 `ID` 和 `Name`。\n\n关闭连接管理器和源适配器编辑器，将一个脚本组件拖到数据流画布上。系统提示时，选择“转换”作为此脚本组件的用途。打开脚本组件编辑器，将\
    \ `Name` 属性更改为 `scr Parse Header and Data`。单击“输入列”页面并选择两列（`ID` 和 `Name`）。单击“输入和输出”页面。将\
    \ Output 0 重命名为 `Header`，并将 `SynchronousInputID` 属性更改为 `None`。展开 `Header` 输出并单击“输出列”虚拟文件夹。单击“添加列”按钮，将其命名为\
    \ `ExtractDateTime`，并将数据类型更改为 `database timestamp [DT_DBTIMESTAMP]`。再次单击“添加列”按钮，将新列命名为\
    \ `RowCount`，并将数据类型保留为默认值（四字节有符号整数 [DT_I4]）。\n\n单击“添加输出”按钮，并将此新输出命名为 `Data`。展开输出虚拟文件夹并选择“输出列”虚拟文件夹。像处理标题输出那样，创建两个具有以下属性的列：\n\
    \n*   `ID, four-byte signed integer [DT_I4]`\n*   `Name, string [DT_STR]`\n\n\
    返回到“脚本”页面，将 `ScriptLanguage` 属性设置为 `Microsoft Visual Basic 2012`。单击“编辑脚本”按钮。编辑器打开后，在类的顶部添加一个变量声明（参见\
    \ [Listing 7-4](#9781484200834_Ch07.xhtml#list4)）。\n\n### [Listing 7-4](#9781484200834_Ch07.xhtml#_list4).\
    \ 添加 iRowNum 整型变量\n\n```\nPublic Class ScriptMain\n    Inherits UserComponent\n\
    \n    Dim iRowNum As Integer = 0\n```\n\n用 [Listing 7-5](#9781484200834_Ch07.xhtml#list5)\
    \ 中的代码替换 `Input0_ProcessInputRow` 子例程中的代码。\n\n### [Listing 7-5](#9781484200834_Ch07.xhtml#_list5).\
    \ 构建 Input0_ProcessInputRow 子例程\n\n```\nPublic Overrides Sub Input0_ProcessInputRow(ByVal\
    \ Row As Input0Buffer)\n\n    ' increment rownum\n    iRowNum += 1\n\n    Select\
    \ Case iRowNum\n        Case 1\n            ' parse\n            Dim sTmpCount\
    \ As String = Row.ID\n            sTmpCount = Strings.Trim(Strings.Left(Row.ID,\
    \ Strings.InStr(Row.ID, \" \")))\n            Dim sTmpDate As String = Row.Name\n\
    \            sTmpDate = Strings.Replace(Row.Name, \" extracted \", \"\")\n\n \
    \           ' header row\n            With HeaderBuffer\n                .AddRow()\n\
    \                .RowCount = Convert.ToInt32(sTmpCount)\n                .ExtractDateTime\
    \ = Convert.ToDateTime(sTmpDate)\n            End With\n        Case 2\n     \
    \       ' ignore\n        Case 3\n            'column names\n        Case Else\n\
    \            ' data rows\n            With DataBuffer\n                .AddRow()\n\
    \                .ID = Convert.ToInt32(Row.ID)\n                .Name = Row.Name\n\
    \            End With\n    End Select\nEnd Sub\n```\n\n此脚本统计流经脚本组件的行数，并使用行号来决定输出行的处理方式。`Select\
    \ Case` 语句由行号检测驱动，每一行都使行号递增器（`iRowNum`）递增。第一行是标题行，包含提取元数据。接下来的两行分别包含一串破折号和列名。文件的其余部分包含数据行，由\
    \ `Select Case` 语句的 `Select Case Else` 条件处理。\n\n关闭 VSTA 项目脚本编辑器，然后单击脚本组件编辑器上的“确定”按钮。使用您选择的数据流组件（我使用了名为\
    \ `der Header` 和 `der Data` 的派生列转换）终止标题和数据管道。\n\n在调试器中执行包以进行测试。您的结果应类似于 [Figure\
    \ 7-19](#9781484200834_Ch07.xhtml#Fig19) 所示。\n\n![9781484200834_Fig07-19.jpg](images/9781484200834_Fig07-19.jpg)\n\
    \n**[Figure 7-19](#9781484200834_Ch07.xhtml#_Fig19). 绿色的勾选标记很棒！**\n\n## 生成页脚行\n\
    \n让我们看看如何生成页脚行并将其添加到数据文件中。对于此模式，我们将利用项目和包参数。我们还将利用父子模式，该模式将在 [Chapter 16](#9781484200834_Ch16.xhtml)\
    \ 中详细讨论。我们不会构建创建包含数据的平面文件的包。我们将从以下假设开始：提取文件存在，并且我们知道行数和提取日期。我们将使用参数将元数据从父包传输到子包。让我们开始吧！\n\
    \n创建一个新的 SSIS 包并将其命名为 `WriteFileFooter.dtsx`。单击“参数”选项卡并添加以下包参数：\n\n```\nName \
    \                     Data Type        Value                Required\n-----------------------\
    \   --------------   ------------------   ----------\nAmountSum              \
    \   Decimal          0                    False\nDateFormat                String\
    \                                True\nDebug                     Boolean     \
    \     True                 False\nDelimiter                 String           ,\
    \                    True\nExtractFilePath           String                  \
    \              True\nLastUpdateDateTime        DateTime         1/1/1900     \
    \        True\nRecordCount               Int32            0                  \
    \  True\n```\n\n输入参数后，它们会显示为 [Figure 7-20](#9781484200834_Ch07.xhtml#Fig20) 所示。\n\
    \n![9781484200834_Fig07-20.jpg](images/9781484200834_Fig07-20.jpg)\n\n**[Figure\
    \ 7-20](#9781484200834_Ch07.xhtml#_Fig20). WriteFileFooter.dtsx 包的参数**\n\n每个参数的\
    \ `Sensitive` 属性都设置为 `False`。描述是可选的，并且在图像中提供。\n\n我们将在脚本任务中完成主要工作。返回到控制流，将一个脚本任务拖到画布上。将名称更改为\
    \ `scr Append File Footer` 并打开编辑器。在“脚本”页面上，单击 `ReadOnlyVariables` 属性值文本框中的省略号。当“选择变量”窗口显示时，选择以下变量：\n\
    \n*   `System::PackageName`\n*   `System::TaskName`\n*   `$Package::AmountSum`\n\
    *   `$Package::DateFormat`\n*   `$Package::Debug`\n*   `$Package::Delimiter`\n\
    *   `$Package::ExtractFilePath`\n*   `$Package::LastUpdateDateTime`\n*   `$Package::RecordCount`\n\
    \n“选择变量”窗口不会完全如 [Figure 7-21](#9781484200834_Ch07.xhtml#Fig21) 所示，但这些是您需要在 scr\
    \ Append File Footer 脚本任务内选择使用的变量。\n\n![9781484200834_Fig07-21.jpg](images/9781484200834_Fig07-21.jpg)\n\
    \n**[Figure 7-21](#9781484200834_Ch07.xhtml#_Fig21). 为页脚文件选择变量**"
  raw: 'You can read header rows a few different ways. In this solution, we utilize
    one Flat File connection manager and one data flow to parse the header row of
    the data. We rely heavily on Script component logic for parsing and buffering
    operations.


    Begin by creating a new SSIS package. I named mine `ParseFileHeader.dtsx`.


    Add a Data Flow task and open the Data Flow Task Editor. Add a Flat File source
    adapter and open its editor. Use the New button to create a new Flat File connection
    manager aimed at `MyFileHeaderSource.csv`. Uncheck the Column Names in the First
    Data Row checkbox. Be sure to click the Advanced page of the Connection Manager
    Editor and change the names of `Column 0` and `Column 1` to `ID` and `Name`, respectively.


    Close the Connection Manager and Source Adapter Editors and drag a Script component
    onto the data flow canvas. When prompted, select Transformation as the use of
    this Script component. Open the Script Component Editor and change the `Name`
    property to `scr Parse Header and Data`. Click the Input Columns page and select
    both columns (`ID` and `Name`). Click on the Inputs and Outputs page. Rename Output
    0 to **Header** and change the `SynchronousInputID` property to `None`. Expand
    the Header output and click the Output Columns virtual folder. Click the Add Column
    button, name it `ExtractDateTime`, and change the data type to **database timestamp
    [DT_DBTIMESTAMP]**. Click the Add Column button again, name this new column `RowCount`,
    and leave the data type set to the default (four-byte signed integer [DT_I4]).


    Click the Add Output button and name this new output **Data**. Expand the output
    virtual folder and select the Output Columns virtual folder. As you did for the
    header output, create two columns with the following properties:


    *   `ID, four-byte signed integer [DT_I4]`

    *   `Name, string [DT_STR]`


    Return to the Script page and set the `ScriptLanguage` property to `Microsoft
    Visual Basic 2012`. Click the Edit Script button. When the editor opens, add a
    variable declaration at the top of the class (see [Listing 7-4](#9781484200834_Ch07.xhtml#list4)).


    [***Listing 7-4***](#9781484200834_Ch07.xhtml#_list4). Adding iRowNum Integer
    Variable


    ```

    Public Class ScriptMain

        Inherits UserComponent


    Dim iRowNum As Integer = 0

    ```


    Replace the code in the `Input0_ProcessInputRow` subroutine with the code in [Listing
    7-5](#9781484200834_Ch07.xhtml#list5).


    [***Listing 7-5***](#9781484200834_Ch07.xhtml#_list5). Building Input0_ProcessInputRow
    Subroutine


    ```

    Public Overrides Sub Input0_ProcessInputRow(ByVal Row As Input0Buffer)


    '' increment rownum

            iRowNum += 1


    Select Case iRowNum

                Case 1

                    '' parse

                    Dim sTmpCount As String = Row.ID

                    sTmpCount = Strings.Trim(Strings.Left(Row.ID, Strings.InStr(Row.ID,
    " ")))

                    Dim sTmpDate As String = Row.Name

                    sTmpDate = Strings.Replace(Row.Name, " extracted ", "")


    '' header row

                    With HeaderBuffer

                        .AddRow()

                        .RowCount = Convert.ToInt32(sTmpCount)

                        .ExtractDateTime = Convert.ToDateTime(sTmpDate)

                    End With

                Case 2

                    '' ignore

                Case 3

                    ''column names

                Case Else

                    '' data rows

                    With DataBuffer

                        .AddRow()

                        .ID = Convert.ToInt32(Row.ID)

                        .Name = Row.Name

                    End With

            End Select

        End Sub

    ```


    This script counts the rows flowing through the Script component and uses the
    number of the row to decide the disposition of the output row. A `Select Case`
    statement is driven by row number detection and each row increments the row number
    incrementor (`iRowNum`). The first row is the header row and it contains the extract
    metadata. The next two rows contain a scratch row of dashes and the column names,
    respectively. The remainder of the file contains data rows and is addressed in
    the `Select Case Else` condition of the `Select Case` statement.


    Close the VSTA Projects Script Editor and click the OK button on the Script Component
    Editor. Terminate the Header and Data pipelines with the data flow component of
    your choice (I use Derived Column transformations named der Header and der Data).


    Test the package by executing it in the debugger. Your results should be similar
    to those shown in [Figure 7-19](#9781484200834_Ch07.xhtml#Fig19).


    ![9781484200834_Fig07-19.jpg](images/9781484200834_Fig07-19.jpg)


    [Figure 7-19](#9781484200834_Ch07.xhtml#_Fig19). Green checks rock!


    Producing a Footer Row


    Let’s look at producing a footer row and adding it to the data file. For this
    pattern, we will leverage project and package parameters. We will also leverage
    the Parent-Child pattern, which is discussed in detail in [Chapter 16](#9781484200834_Ch16.xhtml).
    We are not going to build the package that creates a flat file containing data.
    We will start with the assumptions that an extract file exists and we know the
    number of rows and the extract date. We will use parameters to transmit metadata
    from the parent package to the child package. Let’s get started!


    Create a new SSIS package and name it `WriteFileFooter.dtsx`. Click on the Parameters
    tab and add the following package parameters:


    ```

    Name                     Data Type        Value                Required

    AmountSum                Decimal          0                    False

    DateFormat               String                                True

    Debug                    Boolean          True                 False

    Delimiter                String            ,                   True

    ExtractFilePath          String                                True

    LastUpdateDateTime       DateTime        1/1/1900              True

    RecordCount              Int32           0                     True

    ```


    The parameters, when entered, appear as shown in [Figure 7-20](#9781484200834_Ch07.xhtml#Fig20).


    ![9781484200834_Fig07-20.jpg](images/9781484200834_Fig07-20.jpg)


    [Figure 7-20](#9781484200834_Ch07.xhtml#_Fig20). Parameters for the WriteFileFooter.dtsx
    package


    The `Sensitive` property for each parameter is set to `False`. The Description
    is optional and available in the image.


    We’re going to do the heavy lifting in a Script task. Return to the control flow
    and drag a Script task onto the canvas. Change the name to **scr Append File Footer**
    and open the editor. On the Script page, click the ellipsis in the `ReadOnlyVariables`
    property’s Value textbox. When the Select Variables window displays, select the
    following variables:


    *   `System::PackageName`

    *   `System::TaskName`

    *   `$Package::AmountSum`

    *   `$Package::DateFormat`

    *   `$Package::Debug`

    *   `$Package::Delimiter`

    *   `$Package::ExtractFilePath`

    *   `$Package::LastUpdateDateTime`

    *   `$Package::RecordCount`


    The Select Variables window will not appear exactly as shown in [Figure 7-21](#9781484200834_Ch07.xhtml#Fig21),
    but these are the variables you need to select for use inside the scr Append File
    Footer Script task.


    ![9781484200834_Fig07-21.jpg](images/9781484200834_Fig07-21.jpg)


    [Figure 7-21](#9781484200834_Ch07.xhtml#_Fig21). Selecing variables for the footer
    file'
