    application instance logging to the `Parent.dtsx` package. Drag a new Execute
    SQL task to the control flow and rename it **Log Start of Application**. Set the
    ResultSet property to Single Row. Set the ConnectionType property to ADO.Net and
    Connection to the `SSISConfig` connection manager. Set the SQLStatement property
    to `log.LogStartOfApplication` and the IsQueryStoredProcedure property to `True`.
    Navigate to the Parameter Mapping page and add a new parameter: mapping the `User::ApplicationName`
    SSIS variable to the `ApplicationName` parameter for the `log.LogStartOfApplication`
    stored procedure. Change the Data Type property of the `ApplicationName` parameter
    to String. On the Result Set page, add a new result named `0` and map it to a
    new Int32 variable named `AppInstanceID`. Set the default value of the `AppInstanceID`
    variable to `0`. Close the Execute SQL Task Editor and connect a precedence constraint
    from the Log Start of Application Execute SQL task to the Get Package Metadata
    Execute SQL task.    Drag another Execute SQL task onto the control flow beneath
    the Foreach Child Package Foreach Loop container and rename it **Log Application
    Success**. Open the editor, change the ConnectionType property to ADO.Net, and
    set the Connection property to the `SSISConfig` connection manager. Enter `log.LogApplicationSuccess`
    in the SQLStatement property and set the IsQueryStoredProcedure property to `True`.
    Navigate to the Parameter Mapping page and add a mapping between the `User::AppInstanceID`
    SSIS variable and the `Int32 AppInstanceID` parameter for the `log.LogApplicationSuccess`
    stored procedure. Close the Execute SQL Task Editor and connect a precedence constraint
    from the Foreach Child Package Foreach Loop container to the Log Application Success
    Execute SQL task.    What did you just accomplish? You added SSIS application
    instance logging to the control flow of the `Parent.dtsx` SSIS package. To test
    this, you need to execute `Parent.dtsx` in the SSDT debugger.    Once execution
    completes, execute the following query to observe the logged results:    ``` Select
    * From [log].SSISAppInstance ```    When I execute this query, I get the results
    that are shown in [Figure A-10](#9781484200834_AppA.xhtml#Fig10).    ![9781484200834_FigAppA-10.jpg](images/9781484200834_FigAppA-10.jpg)    [Figure
    A-10](#9781484200834_AppA.xhtml#_Fig10). Observing the results of querying the
    application instance log    What happens when an SSIS application fails? You want
    to update the `log.SSISAppInstance` row with an `EndDateTime` and set the Status
    to Failed. For this, you will use an Execute SQL task configured to execute the
    `log.LogApplicationFailure` stored procedure. The question is: Where? The answer
    is: the `Parent.dtsx` package’s OnError event handler.


    In SSDT, click the Event Handlers tab on `Parent.dtsx`. In the Executable drop-down,
    select Parent; in the Event Handler drop-down, select OnError as shown in [Figure
    A-11](#9781484200834_AppA.xhtml#Fig11).    ![9781484200834_FigAppA-11.jpg](images/9781484200834_FigAppA-11.jpg)    [Figure
    A-11](#9781484200834_AppA.xhtml#_Fig11). Configuring the Parent package’s OnError
    event handler    Click the Click Here to Create an “OnError” Event Handler for
    Executable “Parent” link on the surface of the event handler to create the OnError
    event handler for the `Parent.dtsx` package. I could walk you through building
    another Execute SQL task to log the SSIS application failure; however, it’s easier
    and simpler to just copy the Log Application Success Execute SQL task from the
    bottom of the control flow and paste it into the `Parent.dtsx` OnError event handler.
    When you do, change the name to **Log Application Failure** and the SQLStatement
    property to `log.LogApplicationFailure`.    You are now ready to test, but you
    have no real way to test the application failure unless you modify a package—and
    that just seems tragic. You’re likely going to need to test errors after this,
    too. So why not build an `ErrorTest.dtsx` SSIS package and add it to the SSIS
    application? I like this plan!    Create a new SSIS package and rename it `ErrorTest.dtsx`.
    Add a Script task to the control flow and rename it **Succeed or Fail?** Change
    the ScriptLanguage property to Microsoft Visual Basic 2012\. Open the editor and
    add the `System::TaskName` and `System::PackageName` variables to the `ReadOnlyVariables`
    property. Open the Script Editor and add the code shown in [Listing A-13](#9781484200834_AppA.xhtml#list13)
    to `SubMain()`.    [***Listing A-13***](#9781484200834_AppA.xhtml#_list13). Code
    to Succeed or Fail SSIS Package    ``` Public Sub Main()          Dim sPackageName
