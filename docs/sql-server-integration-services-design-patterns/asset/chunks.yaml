- fmt: 'If you find you need to look up the same data in multiple Data Flow tasks,
    consider using the `Cache transform` along with the `Cache connection manager`.
    The `Cache connection manager` provides a memory-resident copy of the data supplied
    via the `Cache transform`. The cache is loaded prior to the first Data Flow task
    that will consume the lookup data, and the data can be consumed directly by a
    `Lookup transform`. Precaching data in this manner supports lookups, but it also
    provides a way to “mark” sets of rows for other considerations such as loading.
    Later in this chapter, we will explore late-arriving data and discuss patterns
    for managing it. One way to manage the scenario of data continuing to arrive after
    the load operation has started is to create a cache of primary and foreign keys
    that represent completed transactions, and then join to those keys in Data Flow
    tasks throughout the load process. Will you miss last-second data loading in this
    way? Yes, you will. But your data will contain complete transactions. One benefit
    of executing incremental loads with table caches is the ability to execute the
    load each month, week, evening, or every five minutes; only complete transactions
    that have arrived since the last load executed will be loaded.


    If you find you need to use the same lookup data across many SSIS packages (or
    that the cache is larger than the amount of available server RAM), the `Cache
    connection manager` can persist its contents to disk. The `Cache connection manager`
    makes use of the new and improved RAW file format, a proprietary format for storing
    data directly from a Data Flow task to disk, completely bypassing connection managers.
    Reads and writes are very fast as a result, and the new format persists column
    names and data types.


    ## Load Staging


    Another pattern worth mentioning here is `load staging`. Consider the following
    scenario: a data warehouse destination table is large and grows often. Since the
    destination is used during the load window, dropping keys and indexes is not an
    option to improve load performance. All related data must become available in
    the data warehouse at roughly the same time to maintain source-transactional consistency.
    By nature, the data does not lend itself to partitioning. What to do?


    Consider `load staging`, where all the data required to represent a source transaction
    is loaded into stage tables on the destination. Once these tables are populated,
    you can use `Execute SQL tasks` to insert the staged rows into the data warehouse
    destination table. If timed properly, you may be able to use a bulk insert to
    accomplish the load. Often, data loads between tables in the same SQL Server instance
    can be accomplished more efficiently using T-SQL rather than the buffered SSIS
    Data Flow task. How can you tell which will perform better? Test it!


    ## The Slowly Changing Dimension Wizard


    The `Slowly Changing Dimension (SCD) Wizard` is another veteran of the SSIS incremental
    load arsenal. As its name implies, it is designed specifically for managing SCD
    elements in a data warehouse. However, its use is certainly not limited to dimension
    processing.


    The `SCD Wizard` has been a part of SSIS ever since the product’s introduction
    in 2005\. At first glance, it is the natural choice for handling slowly changing
    dimension data in SSIS. This tool is built right into Integration Services, and
    it is designed specifically for the purpose of SCD processing.


    The `SCD Wizard` is surfaced as a transformation in SSIS and is leveraged by connecting
    the output of a data source (the incoming data) to the input of the SCD transformation.
    Editing the SCD transformation will kick off the wizard, as shown in [Figure 11-2](#9781484200834_Ch11.xhtml#Fig2).


    ![9781484200834_Fig11-02.jpg](images/9781484200834_Fig11-02.jpg)


    [Figure 11-2](#9781484200834_Ch11.xhtml#_Fig2). The `SCD Wizard` showing alignment
    of columns


    From there, the wizard will guide you through the selection of the necessary elements
    of the SCD configuration, including the following:


    *   Which columns should be engaged as part of the SCD, along with the option
    to handle changes as simple updates (`Type 1`) or historical values (`Type 2`).

    *   How to identify current vs. expired rows, if any `Type 2` columns are present;
    you can specify either a flag or a date span to indicate currency of SCD records.

    *   How to handle inferred members (discussed in more depth shortly).


    When you’ve completed the `SCD Wizard`, several new elements are automatically
    added to the data flow. [Figure 11-3](#9781484200834_Ch11.xhtml#Fig3) shows an
    example of the transforms and destinations added when using a combination of `Type
    1` and `Type 2` fields, fixed-attribute (static) fields, and inferred member support.
    The `SCD Wizard` adds only those components pertinent to the design specified,
    so the final result may look a bit different than the example in this figure,
    depending on how the wizard is configured.


    ![9781484200834_Fig11-03.jpg](images/9781484200834_Fig11-03.jpg)


    [Figure 11-3](#9781484200834_Ch11.xhtml#_Fig3). `SCD Wizard` output


    Of all of the SCD design patterns, the `SCD Wizard` is arguably the easiest to
    use for simple SCD scenarios, and it offers the fastest turnaround at design time.
    For small, simple dimensions, the wizard can be an effective tool for managing
    changing data.


    However, the `SCD Wizard` does have some significant drawbacks.


    *   **Performance:** The wizard performs reasonably well against small sets of
    data. However, because many of the operations are performed on a row-by-row basis,
    leveraging this transform against sizeable dimensions can cause a significant
    performance bottleneck. Some data warehouse architects have strong feelings against
    the `SCD Wizard`, and this is often the chief complaint.

    *   **Destructive changes:** As I mentioned, when you run the wizard, all of the
    required transforms and destinations are created automatically. Similarly, if
    you reconfigure the SCD transform (for example, changing a column type from a
    `Type 1` to a `Type 2` historical), the existing design elements are removed and
    added back to the data flow. As a result, any changes that you’ve made to that
    data path will be lost if you make a change to the SCD transform.

    *   **No direct support for auditing:** Although you can add your own auditing
    logic, it’s not a native function of this component. Further, because any changes
    to the SCD transformation will delete and re-create the relevant elements of the
    data flow, you’ll have to reconfigure that auditing logic if any changes are made
    to the SCD transform.


    As a result of these shortcomings (especially the performance implications), the
    `SCD Wizard` doesn’t see a lot of action in the real world. I don’t want to beat
    up on this tool too much because it does have some usefulness, and I don’t necessarily
    recommend that you avoid it completely. However, like any specialty tool, it should
    be used only where appropriate. For small sets of SCD data that do not require
    complex logic or specialized logging, it can be the most effective option for
    SCD processing.


    ## The MERGE Statement


    Although technically not a function of SSIS, the `MERGE` statement has become
    such a large part of incremental data loads that any discussion focused on data
    warehousing design patterns would not be complete without this tool being covered.


    ### A Little Background


    Prior to version 2008, there were no native upserts (`UPdate/inSERT`) in Microsoft
    SQL Server. Any operation that blended updates and inserts required either the
    use of a cursor (which often performs very poorly) or two separate queries (usually
    resulting in duplicate logic and redundant effort). Other relational database
    products have had this capability for years—in fact, it has been present in Oracle
    since version 9i (around 2001). Naturally, SQL Server professionals were chomping
    at the bit for such capabilities.'
