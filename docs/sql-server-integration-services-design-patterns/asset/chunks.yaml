    Testing the Data Tap Procedure


    Before we begin this exercise, please visit `http://andyweather.com/data/WeatherData_Dec08.zip`
    to obtain some real-world temperature and humidity weather data collected at my
    weather station in Farmville, Virginia. The compressed file (`WeatherData_Dec08.zip`)
    contains a single CSV file named `sensor1-all.csv`. The file is two folders down,
    located at `Dec08\TH\sensor1-all.csv`. Unzip the compressed file and store it
    in your file system. I prefer to store data related to test projects inside a
    folder named Data in the SSIS solution directory. It doesn’t matter where you
    store the file as long as you remember where you put it.


