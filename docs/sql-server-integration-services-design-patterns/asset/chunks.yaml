- fmt: "As you may have inferred, you represent the SMP system, and the ten people\
    \ represent the MPP system. This divide-and-conquer strategy is why MPP appliances\
    \ are particularly well suited for high-volume, scan-intensive data warehousing\
    \ environments, especially ones that need to scale to hundreds of terabytes—or\
    \ even petabytes!—of storage. There are other MPP appliance vendors available\
    \ besides Microsoft; however, the ability to easily join unstructured data in\
    \ HDInsight with structured data in PDW via PolyBase, close integration with the\
    \ Microsoft business intelligence stack (`SQL Server`, `Integration Services`,\
    \ `Analysis Services`, and `Reporting Services`), and a compelling cost-per-terabyte\
    \ makes `APS` a natural progression for organizations that need to take their\
    \ `SQL Server` data warehouse to the next level. In this chapter, we will walk\
    \ through how to efficiently load data into a `PDW` region in an `APS` appliance\
    \ using `Integration Services`. But before we do that, we will first explore the\
    \ architecture of `APS`. `APS` could easily consume a book in its own right, so\
    \ we will only be covering the most pertinent parts to ensure that you have the\
    \ foundation necessary for efficiently loading data into `PDW`.\n\n![Image](images/sq.jpg)\
    \ `Tip` Learn more about Microsoft’s Analytics Platform System (`APS`), Parallel\
    \ Data Warehouse (`PDW`), and `HDInsight` at `http://microsoft.com/aps`.\n\n#\
    \ `APS` Appliance Overview\n\nGenerally, `ETL` developers and data integration\
    \ engineers need not worry about the hardware specifications of the database systems\
    \ they interact with. This isn’t the case when you are loading `MPP` systems.\
    \ Because `MPP` systems are designed to take advantage of distributed data and\
    \ parallelized workloads, you will find tremendous performance benefits in designing\
    \ `ETL` solutions that take advantage of the parallelization units of an `MPP`\
    \ system. For that reason, we will briefly review general hardware and software\
    \ architectures for Microsoft’s `APS` appliance before we dive into load patterns.\n\
    \n## Hardware Architecture\n\nMicrosoft has partnered and closely collaborated\
    \ with `Dell`, `HP`, and `Quanta` to provide customers with a choice in hardware\
    \ vendors. The hardware specifications of an `APS` appliance will vary depending\
    \ on your chosen hardware vendor and capacity requirements, although there are\
    \ some consistencies across the vendors.\n\n![Image](images/sq.jpg) `Note` For\
    \ simplicity, we will examine `APS` configurations comprised only of `PDW`. It’s\
    \ worth noting, however, that both `PDW` and `HDInsight` can run side-by-side\
    \ in the same appliance through the use of separate hardware regions dedicated\
    \ to each application. Microsoft calls this configuration a `multi-region appliance`.\n\
    \nThe `base rack` is the smallest unit available for purchase and contains everything\
    \ required to run a `SQL Server PDW` region. Depending on the hardware vendor,\
    \ the minimum configuration will include either two or three `Compute nodes`.\
    \ Similarly, the `scale unit`—that is, the number of compute nodes required to\
    \ increase the capacity of the appliance—is dependent on vendor and will either\
    \ be two or three `Compute nodes`. For all base racks, irrespective of hardware\
    \ vendor, the top of the base rack includes the following:\n\n*   Two redundant\
    \ `InfiniBand` switches\n*   Two redundant `Ethernet` switches\n*   One active\
    \ server, which contains `VMs` for\n    *   `SQL Server PDW` Control node\n  \
    \  *   Management and `Active Directory`\n    *   Fabric `Active Directory`\n\
    \    *   `Hyper-V` Virtual Machine Manager\n    *   One passive spare server\n\
    \nThe bottom of the base rack includes additional servers and storage. To add\
    \ more storage or processing capacity, add `scale units` to the base rack until\
    \ the base rack is full.\n\n![Image](images/sq.jpg) `Note` For simplicity and\
    \ consistency, we will use depictions of `Dell`’s hardware configurations. However,\
    \ please do not mistake that as an endorsement on the part of the authors. We\
    \ suggest you review the offerings of each hardware vendor and make the selection\
    \ that best meets your requirements.\n\nOnce the base rack is full, you can continue\
    \ to add near-linear scalability to your `APS` appliance by adding one or more\
    \ `expansion racks`. All expansion racks, irrespective of hardware vendor, are\
    \ comprised of the following:\n\n*   Two redundant `InfiniBand` switches\n*  \
    \ Two redundant `Ethernet` switches\n*   `Scale units` of either two or three\
    \ `Compute nodes`\n\nThe `expansion rack` is very similar to the `base rack`.\
    \ Just like the base rack, the bottom of the expansion rack includes servers and\
    \ storage in `scale units` of either two or three `Compute nodes`. In fact, the\
    \ only difference between the `base rack` and the `expansion rack` is the absence\
    \ of the active server and optional spare server at the top of the rack.\n\n##\
    \ Software Architecture\n\nIn the previous section, we discussed that the primary\
    \ difference between the `base rack` and the `expansion rack` is the active server\
    \ at the top of the rack. Let’s dig into that server in a little more detail.\n\
    \nThe active server is comprised of four virtual machines (`VMs`) that provide\
    \ functionality essential to the operation of the appliance. The four `VMs` are\
    \ the `PDW` Control node (`CTL`), the Management and `Active Directory` (`MAD`),\
    \ the Fabric `Active Directory` (`AD`), and `Hyper-V` Virtual Machine Manager\
    \ (`VMM`). As an `ETL` developer or data integration engineer, you will only interact\
    \ directly with the `PDW` Control node `VM`. [Figure 8-1](#9781484200834_Ch08.xhtml#Fig1)\
    \ depicts a nine-node rack and the four `VMs` that reside in the Active Server.\n\
    \n![9781484200834_Fig08-01.jpg](images/9781484200834_Fig08-01.jpg)\n\n[Figure\
    \ 8-1](#9781484200834_Ch08.xhtml#_Fig1). `APS` virtual machines\n\nThe `PDW` Control\
    \ node `VM` provides the following critical functionality:\n\n*   Client connectivity\
    \ and authentication\n*   System and database metadata\n*   `SQL` request processing\n\
    *   Execution plan preparation\n*   Distributed execution orchestration\n*   Result\
    \ aggregation\n\nYou can think of the `Control node` as the “brains” behind the\
    \ distribution and parallelization of `PDW`. Although metadata resides on the\
    \ `Control node`, no user data is persisted there. Rather, the `Control node`\
    \ directs the loading and retrieval of user data to the appropriate `Compute node`\
    \ and `distribution`. This is the first time we’ve introduced the term `distribution`,\
    \ so if you’re not yet familiar with the term, don’t worry. We’ll cover `distributions`\
    \ in the next section.\n\n## Shared-Nothing Architecture\n\nAt the core of `PDW`\
    \ is the concept of `shared-nothing architecture`. In a `shared-nothing architecture`,\
    \ a single logical table is broken up into numerous smaller physical pieces. The\
    \ exact number of pieces depends on the number of `Compute nodes` in the `PDW`\
    \ region. Within a single `Compute node`, each data piece is then split across\
    \ eight (`8`) `distributions`. The number of `distributions` per `Compute node`\
    \ cannot be configured and is consistent across all hardware vendors.\n\nA `distribution`\
    \ is the most granular physical level within `PDW`. Each `distribution` contains\
    \ its own dedicated `CPU`, `memory`, and storage (`LUNs`), which it uses to store\
    \ and retrieve data. Because each `distribution` contains its own dedicated hardware,\
    \ it can perform load and retrieval operations in parallel with other `distributions`.\
    \ This concept is what we mean by “shared-nothing.” There are numerous benefits\
    \ that a `shared-nothing architecture` enables, such as more linear scalability.\
    \ But perhaps `PDW`’s greatest power is its ability to scan data at incredible\
    \ speeds.\n\nLet’s do some math. Assume you have a `PDW` appliance with a `base\
    \ rack` containing `9 Compute nodes`, and you need to store a table with `1 billion\
    \ rows`. The data will be split across all `9 Compute nodes`, and each `Compute\
    \ node` will split its data across `8 distributions`. Thus, the `1-billion-row`\
    \ table will be split into `72 distributions` (`9 Compute nodes` × `8 distributions\
    \ per Compute node`). That means each `distribution` will store roughly `13,900,000\
    \ rows`."
