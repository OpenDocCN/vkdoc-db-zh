    (\n     orderID            INT\n   , orderDate          DATETIME\n   , customerID\
    \         INT\n   , webID              CHAR(38)\n)\nWITH\n(\n      DISTRIBUTION\
    \ = HASH (orderID)\n    , CLUSTERED COLUMNSTORE INDEX\n);\n```\n\n现在目标对象已经创建，我们可以回到\
    \ Integration Services 包。将 **SQL Server PDW Destination** 从工具箱拖到数据流 pane 中。双击图\
    \ 8-6 所示的 **SQL Server PDW Destination** 来编辑其配置。\n\n![9781484200834_Fig08-06.jpg](img/9781484200834_Fig08-06.jpg)\n\
    \n**图 8-6**. SQL Server PDW Destination\n\n接下来，单击 **Connection Manager** 旁边的下拉箭头，并选择\
    \ **<Create New Connection. . .>**，如图 8-7 所示。\n\n![9781484200834_Fig08-07.jpg](img/9781484200834_Fig08-07.jpg)\n\
    \n**图 8-7**. SQL Server PDW Destination Editor\n\n在 **SQL Server PDW Connection\
