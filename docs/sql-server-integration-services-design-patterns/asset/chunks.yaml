- fmt: 'Now that you have walked through the creation of the connection manager and
    provider and decided which source component to use, you need to set up the metadata
    for pulling the data. You do this by selecting what type of access you want to
    make and then adding the query information to the source component. In addition,
    you will want to review a few patterns when you’re setting up the query and column
    metadata. Let’s get started.


    ## ADO.NET Data Access


    If you decided to use the ADO.NET source component, either with the ADO.NET or
    ODBC provider, you have two options to select what data you want to see:


    *   **Table or View:** Select which table or view from which you want to receive
    data. The list of tables and views should be prepopulated and listed based on
    your access. We do not recommend this option because it includes unnecessary columns,
    even if you restrict the column list in the component.

    *   **SQL Command:** Enter text that will be executed on the SQL Server database.


    Because the Table or View option is not our recommended option, let’s dig into
    the SQL Command option a little deeper. You can enter either a direct SQL query
    that returns a dataset or a stored procedure using the `EXEC` statement.


    Whether you are using a SQL query or executing a stored procedure, you will need
    to be aware that the ADO.NET source does not allow you to use parameters in your
    query. If you need to modify the query that gets used, you will need to use an
    expression. Expressions are only set at the control flow level, so you will need
    to take a look there to set up your expression. Follow these steps to set a new
    SQL command at design time:


    1.  When in the Data Flow task, click the background to ensure no components are
    selected and look in the Properties menu for the `Expressions` property.

    2.  Once the Expression Property window is open, select the `[ADO NET Source].[SqlCommand]`
    option in the Property field and click the ellipses button next to the Expression
    field.

    3.  In the Expression Editor, create your command using variables. For example,
    if you were to run a stored procedure where you wanted to pass in an end date,
    you could use the following expression: `"EXEC GetCustomerData ''" + (DT_STR,
    29, 1252)@[System::ContainerStartTime] + "''"`

    4.  Once the expression has been validated, click the OK button. The final Property
    Expressions Editor screen should look like [Figure 4-9](#9781484200834_Ch04.xhtml#Fig9).


    ![9781484200834_Fig04-09.jpg](images/9781484200834_Fig04-09.jpg)


    [Figure 4-9](#9781484200834_Ch04.xhtml#_Fig9). Property Expressions Editor with
    SQLCommand property


    When the package runs, it will now use the expression you just created.


    ## OLE DB Data Access


    If you’ve selected the OLE DB source component, you have four options for how
    to retrieve data:


    *   **Table or View:** Similar to access in the ADO.NET source, this option allows
    you to select a table or view from which to pull all columns of data into the
    package. This option is not recommended for the same reason explained in the ADO.NET
    source.

    *   **Table Name or View Name Variable:** Instead of hardcoding the name of the
    table or view, you can instead point to a user-created variable that contains
    that information. This option is not recommended.

    *   **SQL Command:** Similar to access in the ADO.NET source, you can enter the
    SQL query or execution of a stored procedure once you’ve selected this option.

    *   **SQL Command from Variable:** If you want to create a query to change at
    runtime or to pass a variable to a stored procedure, this is the option you will
    want to use. Instead of creating an expression to modify the SQL Command, as you
    did with ADO.NET, you will create a variable that creates your expression. You
    can then select the variable you created after you select this option.


    By picking one of these options, you will determine how the data is returned from
    SQL Server. After you select the type of data retrieval, you’ll want to add the
    appropriate properties. For example, if you select the Table or View option, you’ll
    need to select the object that contains the data. If you select the SQL Command
    option, you’ll need to enter the SQL query or stored procedure execution that
    returns the data. Once that is set, you can move on to designing the rest of your
    data flow.


    ## Waste Not, Want Not


    As data professionals, we often think that the more data we can get, the better.
    This isn’t always the best scenario when you are dealing with sources. When you
    are talking about the amount of data to pull, you will want to follow a different
    pattern.


    No matter which query option you selected, it is important to only ask for the
    columns that you need in your data load process. Requesting all columns is similar
    to running a `select * from` table query against a database. Not only are you
    asking the database and network to do more work, but you are also asking Integration
    Services to do more work. All of that unnecessary data will get stored in memory,
    or even cause paging if there isn’t enough memory, using up space that could be
    used to grab more data for the important columns and slowing down the overall
    package execution.


    All source components give you the option to pick a subset of columns on the Columns
    menu. Be sure to make the column reduction in the query itself rather than in
    the Columns menu to reap the full benefit of a faster package.


    ## Data Translations


    Another Integration Services source trap that is easy to fall into is to perform
    the majority of the data transformations in the source query itself. Because Integration
    Services developers often have a SQL background, we tend to want to use a familiar
    tool to accomplish our tasks.


    The types of data transformations that can be undertaken in either the source
    query or the rest of the data flow include merging of datasets, case statements,
    string concatenation, and more. Remember that SQL Server is very good at set-based
    actions, whereas Integration Services is very good at computationally expensive
    tasks that use a lot of memory. Although you should test your individual situation,
    these are good rules of thumb to follow.


    Follow the pattern listed in [Table 4-1](#9781484200834_Ch04.xhtml#Tab1) when
    you are deciding where to put your data translation logic.


    [Table 4-1](#9781484200834_Ch04.xhtml#_Tab1). Data Translation Locations


    | Data Translation | Concern | Location |

    | --- | --- | --- |

    | Merge datasets | Set-based | Source component |

    | Case statements | Memory intensive | Data flow |

    | String concatenation | Procedural | Data flow |

    | Sorting data | Set-based | Source component |


    ## Source Assistant


    Now that you have retrieved data from SQL Server the hard way, you’re going to
    learn the easy way to do the same thing. The Source Assistant is a new wizard
    introduced in SQL Server 2012 that takes you through the steps of setting up your
    `Source` objects without having to make many of the same decisions that you just
    had to go through. This is a great way for people who are just getting started
    with Integration Services to get up and running quickly.


    To begin, create a new Data Flow task. As seen in [Figure 4-10](#9781484200834_Ch04.xhtml#Fig10),
    the Source Assistant appears in the SSIS Toolbox. Initially it will be in the
    `Favorites` grouping, unless you have moved the items around.


    ![9781484200834_Fig04-10.jpg](images/9781484200834_Fig04-10.jpg)


    [Figure 4-10](#9781484200834_Ch04.xhtml#_Fig10). Source Assistant in Favorites
    grouping in SSIS Toolbox


    Drag the Source Assistant component onto the Data Flow design area to start the
    wizard. The first screen can be seen in [Figure 4-11](#9781484200834_Ch04.xhtml#Fig11).


    ![9781484200834_Fig04-11.jpg](images/9781484200834_Fig04-11.jpg)


    [Figure 4-11](#9781484200834_Ch04.xhtml#_Fig11). Add New Source screen in Source
    Assistant'
