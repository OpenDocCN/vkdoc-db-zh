    A-13](#9781484200834_AppA.xhtml#_Fig13). I have mixed emotions about successful
    OnError event handlers    A couple successful and failed executions later, the
    `log.SSISAppInstance` table contains the rows shown in [Figure A-14](#9781484200834_AppA.xhtml#Fig14)    ![9781484200834_FigAppA-14.jpg](images/9781484200834_FigAppA-14.jpg)    [Figure
    A-14](#9781484200834_AppA.xhtml#_Fig14). Successes and failures of SSISApp1    That’s
    a wrap on application instance logging! Next, let’s build out child package instance
    logging.    Building Package Instance Logging    Package instance logging works
    like application instance logging, only on a different scale. An application instance
    consists of an application ID and an execution start time. A package instance
    consists of an application package ID, an application instance ID, and an execution
    start time.    Let’s start by creating the `log.SSISPkgInstance` table and stored
    procedures. [Listing A-15](#9781484200834_AppA.xhtml#list15) contains these database
    objects.    [***Listing A-15***](#9781484200834_AppA.xhtml#_list15). Building
    the Package Instance Logging Table and Stored Procedures    ``` /* log.SSISPkgInstance
    table */ If Not Exists(Select s.name + ''.'' + t.name               From sys.tables
    t               Join sys.schemas s                 On s.schema_id = t.schema_id
                  Where s.name = ''log''                 And t.name = ''SSISPkgInstance'')
     begin   print ''Creating log.SSISPkgInstance table''   Create Table [log].SSISPkgInstance
      (     PkgInstanceID int identity(1,1)      Constraint PK_SSISPkgInstance Primary
    Key Clustered    ,AppInstanceID int Not Null         Constraint FK_logSSISPkgInstance_logSSISAppInstance_AppInstanceID
             Foreign Key References [log].SSISAppInstance(AppInstanceID)    ,AppPackageID
    int Not Null         Constraint FK_logSSISPkgInstance_cfgAppPackages_AppPackageID
             Foreign Key References cfg.AppPackages(AppPackageID)    ,StartDateTime
    datetime Not Null      Constraint DF_cfgSSISPkgInstance_StartDateTime       Default(GetDate())
       ,EndDateTime datetime Null    ,[Status] varchar(12) Null   )   print ''Log.SSISPkgInstance
    created''  end Else  print ''Log.SSISPkgInstance table already exists.'' print
    ''''  /* log.LogStartOfPackage stored procedure */ If Exists(Select s.name + ''.''
    + p.name           From sys.procedures p           Join sys.


    schemas s             On s.schema_id = p.schema_id           Where s.name = ''log''
                And p.name = ''LogStartOfPackage'')  begin   print ''Dropping log.LogStartOfPackage
    stored procedure''   Drop Procedure [log].LogStartOfPackage   print ''Log.LogStartOfPackage
    stored procedure dropped''  end print ''Creating log.LogStartOfPackage stored
    procedure'' go  Create Procedure [log].LogStartOfPackage  @AppInstanceID int ,@AppPackageID
    int As  declare @ErrMsg varchar(255)  Insert Into log.SSISPkgInstance  (AppInstanceID,
    AppPackageID, StartDateTime, Status)  Output inserted.PkgInstanceID  Values  (@AppInstanceID,
    @AppPackageID, GetDate(), ''Running'') go print ''Log.SSISPkgInstance stored procedure
    created.'' print ''''  /* log.LogPackageSuccess stored procedure */ If Exists(Select
    s.name + ''.'' + p.name           From sys.procedures p           Join sys.schemas
    s             On s.schema_id = p.schema_id           Where s.name = ''log''             And
    p.name = ''LogPackageSuccess'')  begin   print ''Dropping log.LogPackageSuccess
    stored procedure''   Drop Procedure [log].LogPackageSuccess   print ''Log.LogPackageSuccess
    stored procedure dropped''  end print ''Creating log.LogPackageSuccess stored
    procedure'' go  Create Procedure [log].LogPackageSuccess  @PkgInstanceID int As   update
    log.SSISPkgInstance  set EndDateTime = GetDate()    , Status = ''Success''  where
    PkgInstanceID = @PkgInstanceID go print ''Log.LogPackageSuccess stored procedure
    created.'' print ''''  /* log.LogPackageFailure stored procedure */ If Exists(Select
    s.name + ''.'' + p.name           From sys.procedures p           Join sys.schemas
    s             On s.schema_id = p.schema_id           Where s.name = ''log''             And
    p.name = ''LogPackageFailure'')  begin   print ''Dropping log.LogPackageFailure
    stored procedure''   Drop Procedure [log].LogPackageFailure   print ''Log.LogPackageFailure
    stored procedure dropped''  end print ''Creating log.LogPackageFailure stored
    procedure'' go  Create Procedure [log].LogPackageFailure  @PkgInstanceID int As   update
    log.SSISPkgInstance  set EndDateTime = GetDate()    , Status = ''Failed''  where
    PkgInstanceID = @PkgInstanceID go print ''Log.LogPackageFailure stored procedure
    created.'' print '''' ```    The `log.SSISPkgInstance` table will hold the SSIS
    package instance data. `Log.LogStartofPackage` inserts a row into the `SSISPkgInstance`
    table; `log.LogPackageSuccess` updates the row with an `EndDateTime` and a `''Success''`
    status, while `log.LogPackageFailure` updates the record with an `EndDateTime`
    and a `''Failed''` status.    In `Parent.dtsx`, open the editor for the Foreach
    Child Package Foreach Loop container. Navigate to the Variable Mappings page and
    add a new variable. Configure the following settings in the Add Variable window:    *   Container:
    Parent *   Name: `AppPackageID` *   Namespace: User *   Value Type: Int32 *   Value:
    `0`    Click the OK button to close the Add Variable window. The `AppInstanceID`—which
    exists in the dataset inside the `User::Packages` SSIS variable—is returned from
    executing the `cfg.GetSSISApplication` stored procedure. The `AppPackageID` column
    is returned as the fifth column. Therefore, the `AppPackageID` variable’s `Index`
    column on the Variable Mappings page of the Foreach Child Package Foreach Loop
    container should be set to `4` (the fifth value in a 0-based array). Click the
    OK button to close the Foreach Child Package Foreach Loop Container Editor.    Add
    an Execute SQL task to the Foreach Child Package Foreach Loop container. Rename
    the new Execute SQL task **Log Start of Package**. Open the editor and set the
    ResultSet property to Single Row. Set the ConnectionType property to ADO.Net and
    the Connection to the `SSISConfig` connection manager. Set the SQLStatement property
    to `log.LogStartOfPackage` and the IsQueryStoredProcedure property to `True`.'
  trans: "\n# SSIS 应用程序日志配置\n\ndtsx' 设置 `@ExecutionOrder` = 30\n如果不存在（选择 `PackageFolder`\
    \ + `PackageName`\n               从 `cfg.Packages`\n               其中 `PackageFolder`\
    \ = `@PackageFolder`\n                 且 `PackageName` = `@PackageName`）\n begin\n\
    \  打印 '正在添加 ' + `@PackageFolder` + `@PackageName`\n  执行 `cfg.AddSSISPackage` `@PackageName`,\
    \ `@PackageFolder`, `@PackageID` output\n end\n否则\n begin\n  选择 `@PackageID` =\
    \ `PackageID`\n  从 `cfg.Packages`\n  其中 `PackageFolder` = `@PackageFolder`\n \
    \   且 `PackageName` = `@PackageName`\n  打印 `@PackageFolder` + `@PackageName` +\
    \ ' 已存在于 Framework 中。'\n end\n\n如果不存在（选择 `AppPackageID`\n               从 `cfg.AppPackages`\n\
    \               其中 `ApplicationID` = `@ApplicationID`\n                 且 `PackageID`\
    \ = `@PackageID`\n                 且 `ExecutionOrder` = `@ExecutionOrder`）\n begin\n\
    \  打印 '正在以执行顺序 ' + convert(varchar, `@ExecutionOrder`) + ' 将 ' + `@ApplicationName`\
    \ + '.' + `@PackageName` + ' 添加到 Framework'\n  执行 `cfg.AddSSISApplicationPackage`\
    \ `@ApplicationID`, `@PackageID`, `@ExecutionOrder`\n  打印 `@PackageName` + ' 已添加并连接到\
    \ ' + `@ApplicationName`\n end\n否则\n 打印 `@ApplicationName` + '.' + `@PackageName`\
    \ + ' 已以执行顺序 ' + convert(varchar, `@ExecutionOrder`) + ' 存在于 Framework 中。'\n\n\
    现在打开 `Parent.dtsx` 并在 SSDT 调试器中执行它。一旦出现 `ErrorTest.dtsx` 消息框，单击 **No** 按钮以导致 `ErrorTest.dtsx`\
    \ 失败。这应该会触发 `Parent.dtsx` 包的 OnError 事件处理程序，如 图 A-13 所示。\n\n![9781484200834_FigAppA-13.jpg](img/9781484200834_FigAppA-13.jpg)\n\
    \n图 A-13. 我对成功的 OnError 事件处理程序感觉复杂。\n\n经过几次成功和失败的执行后，`log.SSISAppInstance` 表包含如\
    \ 图 A-14 所示的行。\n\n![9781484200834_FigAppA-14.jpg](img/9781484200834_FigAppA-14.jpg)\n\
    \n图 A-14. SSISApp1 的成功与失败\n\n关于应用程序实例日志的介绍到此结束！接下来，让我们构建子包实例日志。\n\n## 构建包实例日志\n\
    \n包实例日志的工作方式类似于应用程序实例日志，只是规模不同。一个应用程序实例由一个应用程序 ID 和一个执行开始时间组成。一个包实例则由一个应用程序包 ID、一个应用程序实例\
    \ ID 和一个执行开始时间组成。\n\n让我们从创建 `log.SSISPkgInstance` 表和相关存储过程开始。清单 A-15 包含了这些数据库对象。\n\
    \n清单 A-15. 构建包实例日志表和存储过程\n\n```sql\n/* log.SSISPkgInstance 表 */\n如果不存在（选择 s.name\
    \ + '.' + t.name\n               从 sys.tables t\n               内连接 sys.schemas\
    \ s\n                 on s.schema_id = t.schema_id\n               其中 s.name =\
    \ 'log'\n                 且 t.name = 'SSISPkgInstance'）\n begin\n  打印 '正在创建 log.SSISPkgInstance\
    \ 表'\n  创建表 [log].SSISPkgInstance\n  (\n    PkgInstanceID int identity(1,1) \n\
    \     约束 PK_SSISPkgInstance 主键聚集索引\n   ,AppPackageID int 非空\n        约束 FK_logSSISPkgInstance_cfgAppPackages_AppPackageID\n\
    \         外键引用 cfg.AppPackages(AppPackageID)\n   ,StartDateTime datetime 非空\n\
    \     约束 DF_cfgSSISPkgInstance_StartDateTime\n      默认值(GetDate())\n   ,EndDateTime\
    \ datetime 空\n   ,[状态] varchar(12) 空\n  )\n  打印 'Log.SSISPkgInstance 已创建'\n end\n\
    否则\n 打印 'Log.SSISPkgInstance 表已存在。'\n打印 ''\n\n/* log.LogStartOfPackage 存储过程 */\n\
    如果存在（选择 s.name + '.' + p.name\n           从 sys.procedures p\n           内连接 sys.schemas\
    \ s\n             on s.schema_id = p.schema_id\n           其中 s.name = 'log'\n\
    \             且 p.name = 'LogStartOfPackage'）\n begin\n  打印 '正在删除 log.LogStartOfPackage\
    \ 存储过程'\n  删除过程 [log].LogStartOfPackage\n  打印 'Log.LogStartOfPackage 存储过程已删除'\n\
    \ end\n打印 '正在创建 log.LogStartOfPackage 存储过程'\ngo\n\n创建过程 [log].LogStartOfPackage\n\
    \ @AppInstanceID int\n ,@AppPackageID int\nAs\n 声明 @ErrMsg varchar(255)\n 插入到\
    \ log.SSISPkgInstance\n  (AppInstanceID, AppPackageID, StartDateTime, 状态)\n  输出\
    \ inserted.PkgInstanceID\n  值\n  (@AppInstanceID, @AppPackageID, GetDate(), '运行中')\n\
    go\nprint 'Log.SSISPkgInstance 存储过程已创建。'\nprint ''\n\n/* log.LogPackageSuccess\
    \ 存储过程 */\n如果存在（选择 s.name + '.' + p.name\n           从 sys.procedures p\n    \
    \       内连接 sys.schemas s\n             on s.schema_id = p.schema_id\n       \
    \    其中 s.name = 'log'\n             且 p.name = 'LogPackageSuccess'）\n begin\n\
    \  打印 '正在删除 log.LogPackageSuccess 存储过程'\n  删除过程 [log].LogPackageSuccess\n  打印\
    \ 'Log.LogPackageSuccess 存储过程已删除'\n end\n打印 '正在创建 log.LogPackageSuccess 存储过程'\n\
    go\n\n创建过程 [log].LogPackageSuccess\n @PkgInstanceID int\nAs\n 更新 log.SSISPkgInstance\n\
    \ set EndDateTime = GetDate()\n   , 状态 = '成功'\n where PkgInstanceID = @PkgInstanceID\n\
    go\nprint 'Log.LogPackageSuccess 存储过程已创建。'\nprint ''\n\n/* log.LogPackageFailure\
    \ 存储过程 */\n如果存在（选择 s.name + '.' + p.name\n           从 sys.procedures p\n    \
    \       内连接 sys.schemas s\n             on s.schema_id = p.schema_id\n       \
    \    其中 s.name = 'log'\n             且 p.name = 'LogPackageFailure'）\n begin\n\
    \  打印 '正在删除 log.LogPackageFailure 存储过程'\n  删除过程 [log].LogPackageFailure\n  打印\
    \ 'Log.LogPackageFailure 存储过程已删除'\n end\n打印 '正在创建 log.LogPackageFailure 存储过程'\n\
    go\n\n创建过程 [log].LogPackageFailure\n @PkgInstanceID int\nAs\n 更新 log.SSISPkgInstance\n\
    \ set EndDateTime = GetDate()\n   , 状态 = '失败'\n where PkgInstanceID = @PkgInstanceID\n\
    go\nprint 'Log.LogPackageFailure 存储过程已创建。'\nprint ''\n```\n\n`log.SSISPkgInstance`\
    \ 表将保存 SSIS 包实例数据。`Log.LogStartofPackage` 向 `SSISPkgInstance` 表插入一行；`log.LogPackageSuccess`\
    \ 用 `EndDateTime` 和 `'成功'` 状态更新该行，而 `log.LogPackageFailure` 用 `EndDateTime` 和\
    \ `'失败'` 状态更新该记录。\n\n在 `Parent.dtsx` 中，打开 **Foreach Child Package** Foreach 循环容器的编辑器。导航到\
    \ **Variable Mappings** 页面并添加一个新变量。在 **Add Variable** 窗口中配置以下设置：\n*   Container:\
    \ `Parent`\n*   Name: `AppPackageID`\n*   Namespace: `User`\n*   Value Type: `Int32`\n\
    *   Value: `0`\n\n单击 **OK** 按钮关闭 **Add Variable** 窗口。`AppInstanceID`——存在于 `User::Packages`\
    \ SSIS 变量内的数据集中——是从执行 `cfg.GetSSISApplication` 存储过程返回的。`AppPackageID` 列作为第五列返回。因此，**Foreach\
    \ Child Package** Foreach 循环容器的 **Variable Mappings** 页面上 `AppPackageID` 变量的 `Index`\
    \ 列应设置为 `4`（0 基数组中的第五个值）。单击 **OK** 按钮关闭 **Foreach Child Package Foreach Loop Container\
    \ Editor**。\n\n向 **Foreach Child Package** Foreach 循环容器添加一个 **Execute SQL** 任务。将新的\
    \ **Execute SQL** 任务重命名为 **Log Start of Package**。打开编辑器并将 **ResultSet** 属性设置为\
    \ **Single Row**。将 **ConnectionType** 属性设置为 **ADO.Net**，并将 **Connection** 设置为\
    \ `SSISConfig` 连接管理器。将 **SQLStatement** 属性设置为 `log.LogStartOfPackage`，并将 **IsQueryStoredProcedure**\
    \ 属性设置为 `True`。\n"
- fmt: "Navigate to the Parameter Mapping page and add two new parameters:\n*   Variable\
    \ Name: `User::AppInstanceID`\n*   Direction: Input\n*   Data Type: Int32\n* \
    \  Parameter Name: `AppInstanceID`\n*   Variable Name: `User::AppPackageID`\n\
    *   Direction: Input\n*   Data Type: Int32\n*   Parameter Name: `AppPackageID`\n\
    \nOn the Result Set page, add a new result named `0` and map it to a new Parent-level\
    \ Int32 variable named `PkgInstanceID`, with a default value of `0`. Close the\
    \ Execute SQL Task Editor. Connect a precedence constraint from the Log Start\
    \ of Package Execute SQL task to the Execute Child Package Execute Package task.\n\
    \nAdd two more Execute SQL tasks to the Foreach Child Package Foreach Loop container.\
    \ Rename the first `Log Package Success`, set the connection properties from the\
    \ ADO.Net connection manager used to connect to the `SSISConfig` database, the\
    \ `SQLStatement` property to `log.LogPackageSuccess`, and the `IsQueryStoredProcedure`\
    \ property to `True`. On the Parameter Mapping page, add a parameter and map the\
    \ `User::PkgInstanceID` variable to the `PkgInstanceID` parameter for the `log.LogStartofPackage`\
    \ stored procedure. Connect a precedence constraint (`OnSuccess`) from the Execute\
    \ Child Package Execute Package task to the Log Package Success Execute SQL task.\n\
    \nRename the second `Log Package Failure`, set the connection properties from\
    \ the ADO.Net connection manager used to connect to the `SSISConfig` database,\
    \ set the `SQLStatement` property to `log.LogPackageFailure`, and set the `IsQueryStoredProcedure`\
    \ property to `True`. On the Parameter Mapping page, add a parameter and map the\
    \ `User::PkgInstanceID` variable to the `PkgInstanceID` parameter for the `log.LogStartofPackage`\
    \ stored procedure. Connect a precedence constraint (`OnFailure`) from the Execute\
    \ Child Package Execute Package task to the Log Package Failure Execute SQL task.\n\
    \nTest the package instance logging by running a few test executions. Allow one\
    \ to succeed and the other to fail. When you check the Application and Package\
    \ Instance tables, the results should appear as shown in `Figure A-15`.\n\n![9781484200834_FigAppA-15.jpg](images/9781484200834_FigAppA-15.jpg)\n\
    \n`Figure A-15`. Examining the application and package instance logs\n\nYou can\
    \ tell by examining the Application Instance and Package Instance log tables that\
    \ `AppInstanceID8` started at 6:47:24 PM 29 Jun 2014. You can also see three SSIS\
    \ packages—with `PkgInstanceID`’s 10, 11, and 12—were executed as part of the\
    \ SSIS application. Each package succeeded, and the SSIS application succeeded\
    \ as well. You also know `AppInstanceID7` started at 6:14:15 PM 29 Jun 2014 and\
    \ executed `PkgInstanceID`’s 7, 8, and 9. `PkgInstanceID`’s 7 and 8 succeeded,\
    \ but `PkgInstanceID` 9 failed; failing the SSIS application.\n\nCool? Cool. Let’s\
    \ move to error and event logging.\n\nBuilding Error Logging\n\nInstrumenting\
    \ data integration processes to capture and preserve error and exception metadata\
    \ is the most important and useful type of logging. Exceptions and errors are\
    \ going to happen. SSIS provides a fairly robust model for capturing and reporting\
    \ errors as long as you realize you can mostly ignore the error codes. The error\
    \ descriptions, however, are mostly good. So it balances out.\n\nBefore I demonstrate\
    \ how to capture error messages in SSIS, let’s discuss why. I used to manage a\
    \ team of data integration developers. The team ranged in size from 28 to 40 developers,\
    \ and I built very large ETL solutions for US state government interests. Part\
    \ of my job was to figure out best practices. Having all SSIS packages log error\
    \ data in the same format to the same location is a best practice. But how do\
    \ you do this with 40 developers? Have you ever tried to get 40 developers to\
    \ do the same thing the same way? It’s like herding cats. The problem was half\
    \ of them thought they were smarter than me; and half of those were correct in\
    \ thinking that. But this wasn’t the kind of problem that required deep thinking;\
    \ this required strategy. So what’s the best strategy for getting every developer\
    \ to build the exact same kind of log for every SSIS package every time? You guessed\
    \ it: don’t let them. Take error logging completely out of their hands.\n\nSoon\
    \ after learning how to use the Execute Package task, I learned events “bubble”\
    \ from child to parent packages. For the purposes of error logging, this means\
    \ I can capture and record any error at the parent package. Even better, it means\
    \ I can do this *with no code in the child package*. Problem solved.\n\nLet’s\
    \ take a look at how to implement this functionality into an SSIS framework. First,\
    \ let’s add a table and a stored procedure to record and preserve errors, as shown\
    \ in `Listing A-16`.\n\n`Listing A-16`. Building the Error Logging Table and Stored\
    \ Procedure\n\n```\n/* log.SSISErrors table */\nIf Not Exists(Select s.name +\
    \ '.' + t.name\n              From sys.tables t\n              Join sys.schemas\
    \ s\n                On s.schema_id = t.schema_id\n              Where s.name\
    \ = 'log'\n                And t.name = 'SSISErrors')\n begin\n  print 'Creating\
    \ log.SSISErrors table'\n  Create Table [log].SSISErrors\n  (\n    ID int identity(1,1)\n\
    \     Constraint PK_SSISErrors Primary Key Clustered\n  ,AppInstanceID int Not\
    \ Null  Constraint FK_logSSISErrors_logSSISAppInstance_AppInstanceID\n Foreign\
    \ Key References [log].SSISAppInstance(AppInstanceID)\n  ,PkgInstanceID int Not\
    \ Null  Constraint FK_logSSISErrors_logPkgInstance_PkgInstanceID\n Foreign Key\
    \ References [log].SSISPkgInstance(PkgInstanceID)\n  ,ErrorDateTime datetime Not\
    \ Null\n     Constraint DF_logSSISErrors_ErrorDateTime\n      Default(GetDate())\n\
    \  ,ErrorDescription varchar(max) Null\n  ,SourceName varchar(255) Null\n  )\n\
    \  print 'Log.SSISErrors created'\n end\nElse\n print 'Log.SSISErrors table already\
    \ exists.'\nprint ''\n\n/* log.LogError stored procedure */\nIf Exists(Select\
    \ s.name + '.' + p.name\n          From sys.procedures p\n          Join sys.schemas\
    \ s\n            On s.schema_id = p.schema_id\n          Where s.name = 'log'\n\
    \            And p.name = 'LogError')\n begin\n  print 'Dropping log.LogError\
    \ stored procedure'\n  Drop Procedure [log].LogError\n  print 'Log.LogError stored\
    \ procedure dropped'\n end\nprint 'Creating log.LogError stored procedure'\ngo\n\
    \nCreate Procedure [log].LogError\n @AppInstanceID int\n ,@PkgInstanceID int\n\
    \ ,@SourceName varchar(255)\n ,@ErrorDescription varchar(max)\nAs\n\n insert into\
    \ log.SSISErrors\n (AppInstanceID, PkgInstanceID, SourceName, ErrorDescription)\n\
    \ Values\n (@AppInstanceID\n ,@PkgInstanceID\n ,@SourceName\n ,@ErrorDescription)\n\
    go\nprint 'Log.LogError stored procedure created.'\nprint ''\n```\n\nEach row\
    \ in the `log.SSISErrors` table contains an `AppInstanceID` and `PkgInstanceID`\
    \ for identification purposes. Why both? It is designed to capture and preserve\
    \ errors that originate in both the parent and child packages. An error in the\
    \ `Parent.dtsx` package will have a `PkgInstanceID` of `0`. The remaining columns\
    \ capture metadata about the error proper: the date and time the error occurred\
    \ (`ErrorDateTime`), the error message (`ErrorDescription`), and the SSIS task\
    \ from which the error originated (`SourceName`).\n\n![Image](images/sq.jpg) **Caution**\
    \ Adding a row to the `log.SSISErrors` table with a `PkgInstanceID` of `0` will\
    \ actually raise a foreign key constraint violation at this time, but I will address\
    \ this matter later in the appendix.\n\nIt is important to note that error events\
    \ are “raised” by SSIS tasks. When an error event is instantiated, its fields\
    \ are populated with information such as the error description and source name\
    \ (the name of the task raising the error). These data do not change as the event\
    \ navigates, or bubbles, inside the SSIS package execution stack. When the event\
    \ arrives at the `Parent`."
