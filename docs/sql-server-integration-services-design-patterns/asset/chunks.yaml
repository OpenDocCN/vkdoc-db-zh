  trans: "\n# 我已连接到本地 SQL Server 默认实例上的 AdventureWorks2012 数据库。\n\n一旦配置好 `Connection`\
    \ 元数据，我便向 `ExecuteSQL` 标签添加了 `ConnectionName` 属性。我的 `BimlScript.biml` 文件现在包含如\
    \ 清单 19-4 所列的代码。\n\n**清单 19-4. 添加连接元数据后的 Biml**\n\n```xml\n<Biml xmlns=\"http://schemas.varigence.com/biml.xsd\"\
    >\n  <Connections>\n    <Connection Name=\"AdventureWorks2012\" ConnectionString=\"\
    Data Source=.;Initial Catalog=AdventureWorks2012;Provider= SQLNCLI10.1;Integrated\
    \ Security=SSPI;Auto Translate=False;\" />\n  </Connections>\n  <Packages>\n \
    \   <Package Name=\"TestBimlPackage\" ConstraintMode=\"Parallel\">\n      <Tasks>\n\
    \        <ExecuteSQL Name=\"Test Select\" ConnectionName=\"AdventureWorks2012\"\
    >\n          <DirectInput>Select 1 As One</DirectInput>\n        </ExecuteSQL>\n\
    \      </Tasks>\n    </Package>\n  </Packages>\n</Biml>\n```\n\n让我们通过从 `BimlScript.biml`\
    \ 重新生成 `TestBimlPackage.dtsx` SSIS 包来测试。当你尝试生成 SSIS 包时，会看到一个确认对话框，询问你是否要覆盖现有的\
    \ `TestBimlPackage.dtsx` SSIS 包。确认此操作后，将从更新后的 `BimlScript.biml` 文件中包含的元数据重新生成\
    \ `TestBimlPackage.dtsx` SSIS 包。打开 `TestBimlPackage.dtsx` SSIS 包：它应显示为如 图 19-3\
    \ 所示。\n\n![9781484200834_Fig19-03.jpg](img/9781484200834_Fig19-03.jpg)\n\n**图\
    \ 19-3. 一个由 Biml 生成的 SSIS 包**\n\n## 构建基本的增量加载 SSIS 包\n\n增量加载模式在数据集成解决方案中至关重要，尤其是在抽取、转换和加载解决方案中。Biml\
    \ 提供了一种机制，可以以可重复的方式对增量加载模式进行编码。\n\n### 创建数据库和表\n\n让我们通过构建几个数据库和表来准备此演示。执行 清单 19-5\
    \ 中的 T-SQL 语句来构建和填充测试数据库和表。\n\n**清单 19-5. 构建和填充演示数据库和表**\n\n```sql\nUse master\n\
    Go\n\nIf Not Exists(Select name\n              From sys.databases\n          \
    \    Where name = 'SSISIncrementalLoad_Source')\n CREATE DATABASE [SSISIncrementalLoad_Source]\n\
    \nIf Not Exists(Select name\n              From sys.databases\n              Where\
    \ name = 'SSISIncrementalLoad_Dest')\n CREATE DATABASE [SSISIncrementalLoad_Dest]\n\
    Go\nUse SSISIncrementalLoad_Source\nGo\n\nIf Not Exists(Select name\n        \
    \      From sys.tables\n              Where name = 'tblSource')\nCREATE TABLE\
    \ dbo.tblSource\n (ColID int NOT NULL\n ,ColA varchar(10) NULL\n ,ColB datetime\
    \ NULL constraint df_ColB default (getDate())\n ,ColC int NULL\n ,constraint PK_tblSource\
    \ primary key clustered (ColID))\n\nUse SSISIncrementalLoad_Dest\nGo\n\nIf Not\
    \ Exists(Select name\n              From sys.tables\n              Where name\
    \ = 'tblDest')\nCREATE TABLE dbo.tblDest\n (ColID int NOT NULL\n ,ColA varchar(10)\
    \ NULL\n ,ColB datetime NULL\n ,ColC int NULL)\n\nIf Not Exists(Select name\n\
    \              From sys.tables\n              Where name = 'stgUpdates')\n CREATE\
    \ TABLE dbo.stgUpdates\n  (ColID int NULL\n  ,ColA varchar(10) NULL\n  ,ColB datetime\
    \ NULL\n  ,ColC int NULL)\n\nUse SSISIncrementalLoad_Source\nGo\n\n-- insert an\
    \ \"unchanged\", a \"changed\", and a \"new\" row\nINSERT INTO dbo.tblSource\n\
    \ (ColID,ColA,ColB,ColC)\n VALUES\n (0, 'A', '1/1/2007 12:01 AM', -1),\n (1, 'B',\
    \ '1/1/2007 12:02 AM', -2),\n (2, 'N', '1/1/2007 12:03 AM', -3)\n\nUse SSISIncrementalLoad_Dest\n\
    Go\n\n-- insert a \"changed\" and an \"unchanged\" row\nINSERT INTO dbo.tblDest\n\
    \ (ColID,ColA,ColB,ColC)\n VALUES\n (0, 'A', '1/1/2007 12:01 AM', -1),\n (1, 'C',\
    \ '1/1/2007 12:02 AM', -2)\n```\n\n清单 19-5 中的 T-SQL 语句创建了两个数据库：`SSISIncrementalLoad_Source`\
    \ 和 `SSISIncrementalLoad_Dest`。在 `SSISIncrementalLoad_Source` 数据库中创建了一个名为 `tblSource`\
    \ 的表，并填充了三行数据。在 `SSISIncrementalLoad_Dest` 数据库中创建了另一个名为 `tblDest` 的表，并填充了两行数据。\n\
    \n清单 19-5 创建的配置是增量加载的基本设置。`ColID` 是业务键。此值不应更改，并且应唯一标识源系统和目标系统中的行。源表和目标表中 `ColA`\
    \ 的字符值指示了行的类型线索。A 行在源和目标表中都存在且相同。它是一个*未更改*的行。`ColID` 值为 `1` 的行在源表中包含 `ColA` 值\
    \ `B`，在目标表中包含 `ColA` 值 `C`。此行自最初加载到目标表以来，在源中已*更改*。`ColID` 值为 `2` 的行仅存在于源中。它是一个*新*行。\n\
    \n### 添加元数据\n\n在本节中，我们将：\n*   添加定义增量加载 SSIS 设计模式中使用的连接管理器的元数据。\n*   向 Biml 项目添加一个新的\
    \ Biml 文件，并将其重命名为 `IncrementalLoad.biml`。\n*   在 `<Biml>` 标签后立即添加一个 `Connections`\
    \ XML 节点。\n*   添加两个 `Connection` XML 节点，配置为连接到 `SSISIncremental_Source` 和 `SSISIncremental_Dest`\
    \ 数据库。\n\n你的代码应如 清单 19-6 所示。\n\n**清单 19-6. IncrementalLoad.biml 中配置的连接**\n\n```xml\n\
    <Biml xmlns=\"http://schemas.varigence.com/biml.xsd\">\n  <Connections>\n    <Connection\
    \ Name=\"SSISIncrementalLoad_Source\" ConnectionString=\n      \"Data Source=(local);Initial\
    \ Catalog=SSISIncrementalLoad_Source;Provider=\n       SQLNCLI11.1;Integrated\
    \ Security=SSPI;\" />\n    <Connection Name=\"SSISIncrementalLoad_Dest\" ConnectionString=\n\
    \      \"Data Source=(local);Initial Catalog=SSISIncrementalLoad_Dest;Provider=\n\
    \       SQLNCLI11.1;OLE DB Services=1;Integrated Security=SSPI;\" />\n  </Connections>\n\
    </Biml>\n```\n\n在 `</Connections>` 和 `</Biml>` 标签之间添加一个 `Packages` 节点。紧接着，添加一个\
    \ `Package` XML 节点，后跟一个 `Tasks` 节点。随后，立即添加一个配置为如 清单 19-7 所示的 `ExecuteSQL` 节点。\n\
    \n**清单 19-7. 配置好的 Packages、Package、Tasks 和 ExecuteSQL 节点**\n\n```xml\n<Packages>\n\
    \  <Package Name=\"IncrementalLoadPackage\" ConstraintMode=\n    \"Parallel\"\
    \ ProtectionLevel=\"EncryptSensitiveWithUserKey\">\n    <Tasks>\n      <ExecuteSQL\
    \ Name=\"Truncate stgUpdates\" ConnectionName=\"SSISIncrementalLoad_Dest\">\n\
    \        <DirectInput>Truncate Table stgUpdates</DirectInput>\n      </ExecuteSQL>\n\
    \    </Tasks>\n  </Package>\n</Packages>\n```\n\n清单 19-7 中 Biml 定义的 `Execute SQL`\
    \ 任务将截断一个暂存表，该表将保存自加载到目标表以来在源表中发生更改的行。\n\n### 指定数据流任务\n\n在 `</ExecuteSQL>` 标签后，添加一个\
    \ `Dataflow` XML 节点。包含一个 `Name` 属性，并将 `Name` 属性的值设置为 \"`Load tblDest`\"。在 `<Dataflow>`\
    \ 标签内，添加一个 `PrecedenceConstraints` 节点。在 `<PrecedenceConstraints>` 标签内放置一个 `Inputs`\
    \ 节点，并在 `<Inputs>` 标签内放置一个包含 `OutputPathName` 属性（值为 \"`Truncate stgUpdates.Output`\"\
    ）的 `Input` 节点，如 清单 19-8 所示。\n\n**清单 19-8.**\n"
- fmt: "Adding a Precedence Constraint from the Truncate stgUpdates Execute SQL Task\
    \ to the \"Load tblDest\" Data Flow Task\n\n```xml\n<Dataflow Name=\"Load tblDest\"\
    >\n  <PrecedenceConstraints>\n    <Inputs>\n      <Input OutputPathName=\"Truncate\
    \ stgUpdates.Output\" />\n    </Inputs>\n  </PrecedenceConstraints>\n</Dataflow>\n\
    ```\n\nThis code defines an `OnSuccess` precedence constraint between the `Truncate\
    \ stgUpdates` Execute SQL task and the `Load tblDest` Data Flow task.\n\n## Adding\
    \ Transforms\n\nWe are now ready to add metadata that define transforms, which\
    \ are the heart of a Data Flow task. In this section, we will design an incremental\
    \ load that includes an `OleDbSource` adapter, a `Lookup` transform, a `Condition\
    \ Split` transform, and a couple of `OleDbDestination` adapters.\n\nTo begin,\
    \ add a `Transformations` node just after the `</PrecedenceConstraints>` tag.\
    \ Inside the `<Transformations>` tags, add an `OleDbSource` tag with the following\
    \ attribute and value pairs:\n\n*   `Name`: `tblSource Source`\n*   `ConnectionName`:\
    \ `SSISIncrementalLoad_Source`\n\nInside the `<OleDbSource>` tag, add an `ExternalTableInput`\
    \ node with a `Table` attribute whose value is `\"dbo.tblSource\"`. This metadata\
    \ constructs an `OleDbSource` adapter named `\"tblSource Source\"` that connects\
    \ to the `SSISIncrementalLoad_Source` connection defined earlier inside the `<Connections>`\
    \ tag. The `OleDbSource` adapter will connect to the table `\"dbo.tblSource\"\
    ` as specified in the `ExternalTableInput` tag. The `Dataflow` XML node will now\
    \ appear, as shown in `Listing 19-9`.\n\n`Listing 19-9`. The Dataflow Node Containing\
    \ an OLE DB Source Adapter\n\n```xml\n<Dataflow Name=\"Load tblDest\">\n  <PrecedenceConstraints>\n\
    \    <Inputs>\n      <Input OutputPathName=\"Truncate stgUpdates.Output\" />\n\
    \    </Inputs>\n  </PrecedenceConstraints>\n  <Transformations>\n    <OleDbSource\
    \ Name=\"tblSource Source\" ConnectionName=\"SSISIncrementalLoad_Source\">\n \
    \     <ExternalTableInput Table=\"dbo.tblSource\" />\n    </OleDbSource>\n  </Transformations>\n\
    </Dataflow>\n```\n\nTo continue, add a `Lookup` XML node immediately after the\
    \ `</OleDbSource>` tag. Include the following attribute and value pairs in the\
    \ `<Lookup>` tag:\n\n*   `Name`: `Correlate`\n*   `OleDbConnectionName`: `SSISIncrementalLoad_Dest`\n\
    *   `NoMatchBehavior`: `RedirectRowsToNoMatchOutput`\n\nThe `Name` attribute sets\
    \ the name of the `Lookup` transform. The `OleDbConnectionName` instructs Biml\
    \ to use the connection manager defined in the `<Connections>` tag in the listing.\
    \ The `NoMatchBehavior` attribute is configured to redirect nonmatching rows to\
    \ the NoMatch output of the `Lookup` transform.\n\nContinue configuring the metadata\
    \ that define the `Lookup` transform by adding a `DirectInput` node immediately\
    \ after the `<InputPath>` tag. Enter the following T-SQL statement between the\
    \ `<DirectInput>` and `</DirectInput>` tags.\n\n```sql\nSELECT ColID, ColA, ColB,\
    \ ColC\nFROM dbo.tblDest\n```\n\nAdd an `Inputs` node immediately following the\
    \ `</DirectInput>` tag. Inside the `<Inputs>` tag, add a `Column` node. Include\
    \ the following attribute name and value pairs.\n\n*   `SourceColumn`: `ColID`\n\
    *   `TargetColumn`: `ColID`\n\nThe preceding metadata provides the mapping between\
    \ the Available Input columns and Available Lookup columns on the Columns page\
    \ of the `Lookup` transform.\n\nAdd an `Outputs` node immediately following the\
    \ `</Inputs>` tag. Inside the `<Outputs>` tag, add three `Column` nodes with the\
    \ following attribute name and value pairs.\n\n1.  `SourceColumn`: `ColA`\n  \
    \  `TargetColumn`: `Dest_ColA`\n2.  `SourceColumn`: `ColB`\n    `TargetColumn`:\
    \ `Dest_ColB`\n3.  `SourceColumn`: `ColC`\n    `TargetColumn`: `Dest_ColC`\n\n\
    The preceding metadata \"selects\" the columns returned from the `Lookup` transform's\
    \ Available Lookup columns on the Columns page. Once added, the `Lookup` transform\
    \ metadata should appear as shown in `Listing 19-10`.\n\n`Listing 19-10`. Transformations\
    \ Including Lookup Metadata\n\n```xml\n<Transformations>\n  <OleDbSource Name=\"\
    tblSource Source\" ConnectionName=\"SSISIncrementalLoad_Source\">\n    <ExternalTableInput\
    \ Table=\"dbo.tblSource\" />\n  </OleDbSource>\n  <Lookup Name=\"Correlate\" OleDbConnectionName=\"\
    SSISIncrementalLoad_Dest\"\n     NoMatchBehavior=\"RedirectRowsToNoMatchOutput\"\
    >\n    <InputPath OutputPathName=\"tblSource Source.Output\" />\n    <DirectInput>SELECT\
    \ ColID, ColA, ColB, ColC FROM dbo.tblDest</DirectInput>\n    <Inputs>\n     \
    \ <Column SourceColumn=\"ColID\" TargetColumn=\"ColID\" />\n    </Inputs>\n  \
    \  <Outputs>\n      <Column SourceColumn=\"ColA\" TargetColumn=\"Dest_ColA\" />\n\
    \      <Column SourceColumn=\"ColB\" TargetColumn=\"Dest_ColB\" />\n      <Column\
    \ SourceColumn=\"ColC\" TargetColumn=\"Dest_ColC\" />\n    </Outputs>\n  </Lookup>\n\
    </Transformations>\n```\n\nImmediately following the `</Lookup>` tag, add an `OleDbDestination`\
    \ XML node with the following attribute name and value pairs.\n\n*   `Name`: `tblDest\
    \ Destination`\n*   `ConnectionName`: `SSISIncrementalLoad_Dest`\n\nInside the\
    \ `<OleDbDestination>` tag, add an `InputPath` node with an `OutputPathName` attribute\
    \ set to the value `\"Correlate.NoMatch\"`. After the `<InputPath>` tag, add an\
    \ `ExternalTableOutput` node with a `Table` attribute set to the value `\"dbo.tblDest\"\
    `.\n\nThe preceding metadata defines an `OleDbDestination` adapter and configures\
    \ it to connect the `Lookup` transform's NoMatch output to the `SSISIncrementalLoad_Dest`\
    \ connection defined earlier.\n\nAdd a `ConditionalSplit` XML node immediately\
    \ after the `</OleDbDestination>` tag. Add an attribute called `Name` and set\
    \ its value to `\"Filter\"`. Inside the `<ConditionalSplit>` tags, add an `InputPath`\
    \ XML node with an `OutputPathName` attribute set to `\"Correlate.Match\"`. Now\
    \ we need to add a conditional output path. Immediately following the `<InputPath>`\
    \ tag, add an `OutputPaths` node, followed in turn by an `OutputPath` node containing\
    \ a `Name` attribute set to `\"Changed Rows\"`. Inside the `<OutputPaths>` tags,\
    \ create an `Expression` node. Between the `<Expression>` and `</Expression>`\
    \ tags, add the following SSIS expression.\n\n```expression\n(ColA != Dest_ColA)\
    \ || (ColB != Dest_ColB) || (ColC != Dest_ColC)\n```\n\nOnce this step is complete,\
    \ the `Transformations` XML should appear as shown in `Listing 19-11`.\n\n`Listing\
    \ 19-11`. Transformations Node Including an OLE DB Source, Lookup, Conditional\
    \ Split, and one OLE DB Destination\n\n```xml\n<Transformations>\n  <OleDbSource\
    \ Name=\"tblSource Source\" ConnectionName=\"SSISIncrementalLoad_Source\">\n \
    \   <ExternalTableInput Table=\"dbo.tblSource\" />\n  </OleDbSource>\n  <Lookup\
    \ Name=\"Correlate\" OleDbConnectionName=\"SSISIncrementalLoad_Dest\"\n     NoMatchBehavior=\"\
    RedirectRowsToNoMatchOutput\">\n    <InputPath OutputPathName=\"tblSource Source.Output\"\
    \ />\n    <DirectInput>SELECT ColID, ColA, ColB, ColC FROM dbo.tblDest</DirectInput>\n\
    \    <Inputs>\n      <Column SourceColumn=\"ColID\" TargetColumn=\"ColID\" />\n\
    \    </Inputs>\n    <Outputs>\n      <Column SourceColumn=\"ColA\" TargetColumn=\"\
    Dest_ColA\" />\n      <Column SourceColumn=\"ColB\" TargetColumn=\"Dest_ColB\"\
    \ />\n      <Column SourceColumn=\"ColC\" TargetColumn=\"Dest_ColC\" />\n    </Outputs>\n\
    \  </Lookup>\n  <OleDbDestination Name=\"tblDest Destination\" ConnectionName=\"\
    SSISIncrementalLoad_Dest\">\n    <InputPath OutputPathName=\"Correlate.NoMatch\"\
    \ />\n    <ExternalTableOutput Table=\"dbo.tblDest\" />\n  </OleDbDestination>\n\
    \  <ConditionalSplit Name=\"Filter\">\n    <InputPath OutputPathName=\"Correlate.Match\"\
    />\n    <OutputPaths>\n      <OutputPath Name=\"Changed Rows\">\n        <Expression>(ColA\
    \ != Dest_ColA) || (ColB != Dest_ColB) ||\n          (ColC != Dest_ColC)</Expression>\n\
    \      </OutputPath>\n    </OutputPaths>\n  </ConditionalSplit>\n</Transformations>\n\
    ```"
