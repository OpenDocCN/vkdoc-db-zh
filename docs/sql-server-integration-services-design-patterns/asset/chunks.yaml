  trans: "\n## 动态包执行模式\n\ndtsx`），以便用于设计时配置。接下来，在控制流中添加一个“执行 SQL 任务”。使用`清单 16-3`中所示的针对您刚刚为表创建的数据库执行查询的“执行\
    \ SQL 任务”。（提示：您需要一个名为`Source`的连接管理器，该管理器指向`DesignPatterns`数据库）。\n\n**清单 16-3**。查询包列表表的\
    \ T-SQL 代码\n\n```\nSELECT [ChildPackageName] FROM [dbo].[PackageList]\n```\n\n\
    除了 SQL 查询外，还需确保`ResultSet`属性设置为返回完整结果集，并将其存储到您刚刚创建的名为`packageListObject`的变量中。此属性页可在`图\
    \ 16-5`中查看。\n\n![9781484200834_Fig16-05.jpg](img/9781484200834_Fig16-05.jpg)\n\
    **图 16-5**。执行 SQL 任务编辑器常规页\n\n将一个 ForEach 循环容器附加到执行 SQL 任务上。这将是您执行包的地方。在 ForEach\
    \ 循环容器的“集合”页中，将枚举器设置为使用 Foreach ADO 枚举器，它将循环遍历变量对象。ADO 对象源变量字段应包含`@[User::packageListObject]`。此屏幕可在`图\
    \ 16-6`中查看。\n\n![9781484200834_Fig16-06.jpg](img/9781484200834_Fig16-06.jpg)\n\
    **图 16-6**。枚举`packageListObject`变量中每一行的 Foreach 循环编辑器常规页\n\n然后，您需要告诉 Integration\
    \ Services 如何处理它在枚举对象列表时检索到的值。在“变量映射”页，将变量设置为`@[User::packageName]`，索引设置为 0。这将把每个值放入变量中。\n\
    \n最后，您到了可以添加执行包部分的环节。与创建主-子包类似，您需要使用“执行包任务”。首先将`DelayValidation`属性设置为`True`，这允许您在运行时决定运行哪个包。\n\
    \n无需重复在主-子包中执行的相同步骤，直接转到“执行包任务编辑器”中的“表达式”页。这是您设置包动态部分的地方。将`PackageName`属性设置为使用表达式`@[User::packageName]`。最终的“表达式”页应如`图\
    \ 16-7`所示。\n\n![9781484200834_Fig16-07.jpg](img/9781484200834_Fig16-07.jpg)\n\
    **图 16-7**。执行包任务编辑器表达式页\n\n当包运行时，它将循环遍历`PackageList`表中的每一行；将执行 SQL 任务的`PackageName`属性设置为当前行，并仅执行您需要的包。请记住，除非您创建多个循环并专门编写主包代码来处理并行性，否则它总是会串行运行子包。\n\
    \n接下来，我们将描述在“子到父变量模式”中，子包如何将信息发送回父包。\n\n## 子到父变量模式\n\n父-子模式是管理框架的重要组成部分。例如，您可以使用主包模式将类似的包分组在一起，并确保它们按正确的顺序执行。您还可以使用动态子包模式来运行可变数量的包。为了确保存储所有这些信息，在包之间传递重要信息至关重要，不仅从父到子，也要从子到父。虽然此功能并不广为人知，但使用脚本任务是可以实现的。让我们使用您现有的包来演示如何将文件名从子包传递到其父包。\n\
    \n第一步是在父包中创建一个变量。\n\n在此示例场景中，您将创建一个名为`ChildFileName`的字符串数据类型变量，其作用域为包级别。在您先前在本章创建的执行包任务上，您将添加一个脚本任务。将`ChildFileName`变量添加为`ReadOnly`变量，并将`清单\
    \ 16-4`中的代码添加到 Visual Basic 脚本中。\n\n**清单 16-4**。显示子文件名的 Visual Basic 脚本\n\n```\n\
    Public Sub Main()\n    MsgBox(\"The name of the child file is: \" & _\n      \
    \    Dts.Variables(\"User::ChildFileName\").Value.ToString)\n    Dts.TaskResult\
    \ = ScriptResults.Success\nEnd Sub\n```\n\n接下来，修改您的子包。在脚本任务中，将变量`User::ChildFileName`添加到`ReadWriteVariables`属性列表中。您必须手动键入此内容，因为它不会显示在菜单中。因此，完整的只读变量列表显示为：\n\
    \n```\n$Package::ParentPackageName,User::ChildFileName\n```\n\n然后将`清单 16-5`中的一行代码添加到\
    \ Visual Basic 脚本任务中。\n\n**清单 16-5**。设置子文件名值的 Visual Basic 脚本\n\n```\nDts.Variables(\"\
    User::ChildFileName\").Value = \"SalesFile.txt\"\n```\n\n运行后，包将完成，效果如`图 16-8`所示。\n\
    \n![9781484200834_Fig16-08.jpg](img/9781484200834_Fig16-08.jpg)\n**图 16-8**。子到父变量模式执行\n\
    \n变量值从子到父的传递之所以成功，是因为 Integration Services 中容器的工作方式。在包内部，任何子容器（如 Sequence 容器）都可以访问其父容器的属性。同样，任何子任务（如执行\
    \ SQL 任务）都可以访问其父容器的属性。这种范式允许您使用变量和属性，而无需为包中的每个对象重新创建它们。当您使用“执行包任务”添加子包时，您就在父-子层次结构中添加了另一个层级，并允许子包设置父包的变量。\n\
    \n## 结论\n\n当 Integration Services 作为 SQL Server 2005 的一部分首次推出时，各地的 SQL Server\
    \ 爱好者都欣然接受了它。最新版的 Integration Services 经过增强，让 ETL 开发人员比以前更加兴奋。如本章所讨论的，Integration\
    \ Services 2012 增加了管理框架的基础和创建父-子关系的能力。我们还讨论了主包模式和管理框架。\n\n## 第 17 章：配置\n\nSQL\
    \ Server 2012 为 SSIS 引入了一种新的、基于参数的配置模型。这个新模型旨在简化配置过程，并使用户更容易在运行时识别值的来源。尽管 2005/2008\
    \ 样式的包配置在 SQL Server 2012 和 SQL Server 2014 中仍受支持，但两种配置模型并不旨在混合使用。事实上，使用它们的菜单选项仅在您使用文件部署模型以及包是从早期版本升级而来时才会出现。在\
    \ SQL Server 2014 中创建的新包将默认使用新的参数模型。\n\n本章描述了新的参数模型以及如何使用它在运行时配置包属性。我们将探讨参数如何在\
    \ SSIS 目录中公开，以及如何使用 Visual Studio 配置在构建过程中设置参数值作为构建过程的一部分。最后，我们将探讨可用于扩展内置参数模型提供的功能的模式，以实现动态的运行时配置。\n"
- fmt: '# SSIS 参数概述


    `SSIS` 参数允许包定义一个明确的契约，很像 `C#` 等编程语言中的函数参数。与包配置不同，参数对调用者（如 `SQL Server Agent` 或执行包任务）是公开的，因此用户能够准确看到包运行所需的内容。参数本质上是特殊命名空间中的只读包变量。它们遵循与包变量相同的类型系统，并会出现在变量出现的所有用户界面中（例如，用于设置属性表达式）。你将通过表达式或在脚本任务中读取来使用参数值。参数值在包执行开始之前设置，并且在包运行时无法更改。


    参数可以在包级别和项目级别定义。包级别参数仅对该包内的任务和组件可见——很像包变量。包参数在 `$Package` 命名空间中定义。在项目级别定义的参数是全局的——项目中的所有包都可以使用它们。项目参数在
    `$Project` 命名空间中定义。


    [图 17-1](#9781484200834_Ch17.xhtml#Fig1) 显示了 `SQL Server Data Tools for Business
    Intelligence` (`SSDT-BI`) 中新的“参数”选项卡，该选项卡显示在包级别定义的参数。除了在包变量上可以找到的标准属性（如 `Name`、`Type`
    和 `Value`）之外，“参数”选项卡还公开了三个新属性：`Description`、`Sensitive` 和 `Required`。


    ![9781484200834_Fig17-01.jpg](images/9781484200834_Fig17-01.jpg)

    [图 17-1](#9781484200834_Ch17.xhtml#_Fig1)。包级别参数在 `SSDT-BI` 中有自己的选项卡上创建和显示


    `Description` 字段为 `SSIS` 包开发人员提供了一种便捷的方式来记录其包的参数。建议你为参数提供描述，特别是在运行或配置包的人与开发包的人不是同一个人的情况下。


    如果一个参数被标记为 `Sensitive`，其值将在包中以加密格式存储（或者根本不存储，具体取决于包的 `ProtectionLevel` 设置）。其值在用户界面中显示时也会被屏蔽，并且不会出现在执行日志中。敏感参数只能用于标记为
    `Sensitive` 的属性的表达式中（例如连接管理器的 `Password` 属性）。敏感参数值也可以通过 `Variable.GetSensitiveValue()`
    方法在脚本任务或脚本组件中检索。


    标记为 `Required` 的参数必须在运行时指定其值。所有参数（和变量）在设计时都需要设置值以用于验证。必需参数在包运行时不会使用此设计时值——必须由调用者（即
    `SQL Server Agent` 或父执行包任务）指定一个新值。如果参数的 `Required` 属性设置为 `False`，则该参数变为可选——如果没有提供其他值，则将使用其设计时值。没有逻辑默认值（如
    `BatchID` 或输入文件路径）的参数应标记为 `Required`。


    项目级别参数可以通过访问解决方案资源管理器中的新节点找到（如[图 17-2](#9781484200834_Ch17.xhtml#Fig2)所示）。项目参数出现在它们自己的节点中，因为它们存储在解决方案目录中的一个单独文件
    (`Project.params`) 中。双击此节点会打开与包参数相同使用的参数设计器，具有所有相同的属性和选项。


    ![9781484200834_Fig17-02.jpg](images/9781484200834_Fig17-02.jpg)

    [图 17-2](#9781484200834_Ch17.xhtml#_Fig2)。项目级别参数可以在解决方案资源管理器中的 `Project.params`
    节点中找到


    # 使用参数配置你的包


    参数值通过 `SSIS` 表达式在你的包中使用。表达式可以设置在大多数任务属性、变量以及数据流任务中的某些组件属性上。要在任务上设置表达式，请单击任务“属性”窗口中表达式的属性，打开“属性表达式编辑器”对话框（如[图
    17-3](#9781484200834_Ch17.xhtml#Fig3)所示）。


    ![9781484200834_Fig17-03.jpg](images/9781484200834_Fig17-03.jpg)

    [图 17-3](#9781484200834_Ch17.xhtml#_Fig3)。“属性表达式编辑器”对话框显示所有设置了表达式的属性


    表达式可以直接从“变量”窗口设置在变量上（如[图 17-4](#9781484200834_Ch17.xhtml#Fig4)所示）。在 `SQL Server
    2012` 中，向变量添加表达式会自动将其 `EvaluateAsExpression` 属性设置为 `True`——在产品的早期版本中，你必须自己执行此步骤。你可以通过将此属性设置回
    `False` 来禁用变量的表达式求值。


    ![9781484200834_Fig17-04.jpg](images/9781484200834_Fig17-04.jpg)

    [图 17-4](#9781484200834_Ch17.xhtml#_Fig4)。在 `SQL Server 2012` 中，表达式可以直接从“变量”窗口设置。设置了表达式的变量会显示一个特殊图标


    [图 17-4](#9781484200834_Ch17.xhtml#Fig4) 还展示了 `SQL Server 2012` 中的一项新功能——表达式修饰器。如果任务的任何属性通过表达式设置，任务、连接管理器和变量的图标将会改变，为开发人员提供了一种视觉方式来识别包的哪些部分是动态设置的。


    为数据流组件设置表达式不如为任务设置那么直接。主要区别在于表达式是设置在数据流任务本身上，并且并非所有组件属性都是可表达的。[图 17-5](#9781484200834_Ch17.xhtml#Fig5)
    展示了查找转换上的可表达属性如何“冒泡”并显示为数据流任务的属性。


    ![9781484200834_Fig17-05.jpg](images/9781484200834_Fig17-05.jpg)

    [图 17-5](#9781484200834_Ch17.xhtml#_Fig5)。可表达的数据流组件属性将显示为数据流任务上的属性


    包和项目级别的参数将出现在显示可用变量列表的所有用户界面中。在“表达式生成器”对话框（[图 17-6](#9781484200834_Ch17.xhtml#Fig6)）中，所有参数都显示在“变量和参数”文件夹下。


    ![9781484200834_Fig17-06.jpg](images/9781484200834_Fig17-06.jpg)

    [图 17-6](#9781484200834_Ch17.xhtml#_Fig6)。参数与变量一起出现在“表达式生成器”对话框中


    某些任务和数据流组件能够不使用表达式就利用变量和参数值。例如，`OLE DB` 源提供了一种“来自变量的 `SQL` 命令”数据访问模式，允许你从变量设置源查询。对于所有此类属性，可以使用参数代替变量。


    # 使用参数化对话框


    `SSIS` 提供了一个参数化用户界面（如[图 17-7](#9781484200834_Ch17.xhtml#Fig7)所示），它充当在你的包中使用参数的快捷方式。从这个界面，你可以创建一个新参数或使用一个已经存在的参数。要启动参数化界面，请右键单击任务、容器或控制流，然后从上下文菜单中选择“参数化”。当你单击“确定”时，`SSIS`
    将自动向所选属性添加一个表达式。


    ![9781484200834_Fig17-07.jpg](images/9781484200834_Fig17-07.jpg)

    [图 17-7](#9781484200834_Ch17.xhtml#_Fig7)。参数化界面是在你的包中使用参数的快捷方式


    # 创建 Visual Studio 配置


    你可以使用 `Visual Studio` 配置在 `SSDT-BI` 中创建多组参数值。'
  raw: 'Parameters    SSIS parameters allow packages to define an explicit contract,
    much like function parameters do in programming languages like C#. Unlike package
    configurations, parameters are exposed to the callers, like SQL Server Agent,
    or the Execute Package task, so users are able to see exactly what a package needs
    to run. Parameters are essentially read-only package variables in a special namespace.
    They follow the same type system as package variables and will appear in all of
    the same UIs that variables do (for example, for setting property expressions).
    You’ll make use of parameter values through expressions or by reading them in
    a Script task. Parameter values are set before package execution begins, and their
    value cannot be changed while the package is running.    Parameters can be defined
    at the package level and at the project level. Package-level parameters are visible
    only to tasks and components within that package—much like package variables.
    Package parameters are defined in the `$Package` namespace. Parameters defined
    at the project level are global—all packages within the project are able to make
    use of them. Project parameters are defined in the `$Project` namespace.    [Figure
    17-1](#9781484200834_Ch17.xhtml#Fig1) shows the new Parameters tab in SQL Server
    Data Tools for Business Inteligence (SSDT-BI), which displays parameters defined
    at the package level. In addition to the standard properties you’d find on a package
    variable (such as `Name`, `Type`, and `Value`), the Parameters tab expose three
    new properties: `Description`, `Sensitive`, and `Required`.    ![9781484200834_Fig17-01.jpg](images/9781484200834_Fig17-01.jpg)    [Figure
    17-1](#9781484200834_Ch17.xhtml#_Fig1). Package-level parameters are created and
    displayed on their own tab in SSDT-BI    The `Description` field provides an easy
    way for the SSIS package developers to document the arguments for their packages.
    It’s recommended that you provide descriptions for your parameters, especially
    in cases where the person running or configuring the packages is not the same
    person who developed them.    If a parameter is marked as `Sensitive`, its value
    will be stored in an encrypted format within the package (or it will not be stored
    at all, depending on the package’s `ProtectionLevel` setting). Its value will
    also be masked when it is displayed in the UI and will not be displayed in execution
    logs. Sensitive parameters can only be used in expressions for properties that
    are marked as `Sensitive` (such as the `Password` property of a connection manager).
    Sensitive parameter values can also be retrieved in a Script task or script component
    with the `Variable.GetSensitiveValue()` method.    Parameters that are marked
    as `Required` must have their values specified at runtime. All parameters (and
    variables) need values set at design time for validation purposes. Required parameters
    will not use this design time value when the package runs—a new value must be
    specified by the caller (i.e., SQL Server Agent or the parent Execute Package
    task). If a parameter’s `Required` property is set to `False`, the parameter becomes
    optional—its design time value will be used if no other value is supplied. Parameters
    that have no logical default value (such as a `BatchID` or path to an input file)
    should be marked as `Required`.    Project-level parameters can be found by accessing
    the new node in the Solution Explorer (as shown in [Figure 17-2](#9781484200834_Ch17.xhtml#Fig2)).
    Project parameters appear in their own node because they are stored in a separate
    file (`Project.params`) within the solution directory. Double-clicking this node
    brings up the same parameter designer used for package parameters with all of
    the same properties and options.    ![9781484200834_Fig17-02.jpg](images/9781484200834_Fig17-02.jpg)    [Figure
    17-2](#9781484200834_Ch17.xhtml#_Fig2). Project-level parameters can be found
    in the Project.


    params node in Solution Explorer    Configuring Your Package Using Parameters    Parameter
    values are used in your package via SSIS Expressions. Expressions can be set on
    most task properties, variables, and certain component properties in a Data Flow
    task. To set an expression on a task, open the Property Expressions Editor dialog
    (shown in [Figure 17-3](#9781484200834_Ch17.xhtml#Fig3)) by clicking on the expression’s
    property in a task’s Properties window.    ![9781484200834_Fig17-03.jpg](images/9781484200834_Fig17-03.jpg)    [Figure
    17-3](#9781484200834_Ch17.xhtml#_Fig3). The Property Expressions Editor dialog
    shows all properties that have expressions set on them    Expressions can be set
    on variables directly from the Variables window (as shown in [Figure 17-4](#9781484200834_Ch17.xhtml#Fig4)).
    In SQL Server 2012, adding an expression to a variable automatically sets its
    `EvaluateAsExpression` property to `True`—in previous versions of the product,
    you had to perform this step yourself. You can disable expression evaluation for
    a variable by setting this property back to `False`.    ![9781484200834_Fig17-04.jpg](images/9781484200834_Fig17-04.jpg)    [Figure
    17-4](#9781484200834_Ch17.xhtml#_Fig4). Expressions can be set directly from the
    Variables window in SQL Server 2012\. Variables that have an expression set on
    them appear with a special icon    [Figure 17-4](#9781484200834_Ch17.xhtml#Fig4)
    also shows a new feature in SQL Server 2012—expression adorners. The icons for
    tasks, connection managers, and variables will change if any of the object’s properties
    are set via expression, providing a visual way for a developer to identify which
    parts of a package are being set dynamically.    Setting expressions for data
    flow components is less straightforward than setting them on tasks. The main differences
    are that the expressions are set on the Data Flow task itself and that not all
    component properties are expressionable. [Figure 17-5](#9781484200834_Ch17.xhtml#Fig5)
    shows how expressionable properties on a Lookup transform “bubble up” and appear
    as properties on the Data Flow task.    ![9781484200834_Fig17-05.jpg](images/9781484200834_Fig17-05.jpg)    [Figure
    17-5](#9781484200834_Ch17.xhtml#_Fig5). Expressionable data flow component properties
    will show up as properties on the Data Flow task    Package and project-level
    parameters will appear in all of the UIs that display the list of available variables.
    On the Expression Builder dialog ([Figure 17-6](#9781484200834_Ch17.xhtml#Fig6)),
    all parameters appear under the Variables and Parameters folder.    ![9781484200834_Fig17-06.jpg](images/9781484200834_Fig17-06.jpg)    [Figure
    17-6](#9781484200834_Ch17.xhtml#_Fig6). Parameters appear alongside variables
    in the Expression Builder dialog    Certain tasks and data flow components are
    able to make use of variable and parameter values without the use of expressions.
    For example, the OLE DB Source provides a “SQL command from variable” data access
    mode that allows you to set the source query from a variable. Parameters can be
    used instead of variables for all such properties.    Using the Parametrize Dialog    SSIS
    provides a Parameterize UI (shown in [Figure 17-7](#9781484200834_Ch17.xhtml#Fig7))
    that acts as a shortcut for making use of parameters in your packages. From this
    UI, you can create a new parameter or use one that already exists. To launch the
    Parameterize UI, right-click on the task, container, or control flow, and select
    Parameterize from the context menu. When you click OK, SSIS will automatically
    add an expression to the selected property.    ![9781484200834_Fig17-07.jpg](images/9781484200834_Fig17-07.jpg)    [Figure
    17-7](#9781484200834_Ch17.xhtml#_Fig7). The Parameterize UI is a shortcut for
    making use of parameters in your package    Creating Visual Studio Configurations    You
    can use Visual Studio configurations to create multiple sets of parameter values
    within SSDT-BI.'
