- fmt: 'You can also execute the `Parent.dtsx` package from the SSIS Catalog. In SSMS
    Object Explorer, continue drilling into the Chapter2 folder. Open Projects, then
    Chapter2, then Packages, and right-click the `Parent.dtsx` package. Click Execute
    and supply `TestSSISApp` for the `ApplicationName` parameter. When you click the
    OK button, the package executes and the two message boxes appear. Why? Because
    you are no longer running the security context of the service account that starts
    the SQL Server Agent service; you are running in the security context with which
    you connected to SSMS Object Explorer. This is most likely a domain or machine
    account that uses Windows Authentication and your personal credentials. If you’ve
    been watching a desktop all this time, you (and all the other users in your domain
    or machine) have the `InteractWithDesktop` role assigned. But almost all service
    accounts do not participate in the `InteractWithDesktop` role.


    ## Running the Custom Execution Framework with SQL Server Agent


    You can run SQL Server Agent jobs with the custom execution framework. You just
    cannot pop up message boxes. For example, you can create an SSIS application for
    each “step” in your process. The SSIS application can contain SSIS packages that
    can execute in parallel. You then build a SQL Server Agent job with several job
    steps—one for each SSIS application. A SQL Server Agent job executes its steps
    serially, waiting for one to succeed (by default) before starting the next.


    Most data warehouses require an extraction step that stages all data—from dimension
    and fact sources— to a staging database. Next, dimension data are loaded into
    the data warehouse. Finally, fact data are loaded from the staging database into
    the data warehouse.


    The precedence of operations is as follows: extract fact and extract dimensions
    can run concurrently (in parallel). You can design one package for each dimension
    and fact source table extract operation, add them to the extract SSIS application,
    and execute that SSIS application as Step 1 of your DW ETL job. Once that completes,
    Step 2 can load the dimension data from the stage database to the data warehouse.
    Once that completes, Step 3 can load the fact data from the staging database to
    the data warehouse. So while relatively simple and somewhat limited, our custom
    execution framework can facilitate configurable parallel and serial ETL operations.


    ## Execute Package Task


    The Execute Package task is best understood in action. To demonstrate, create
    a new SSIS package and rename it `Parent2.dtsx`. Add an Execute Package task to
    the control flow. Open the editor and observe the selections for the ReferenceType
    property as shown in [Figure 2-7](#9781484200834_Ch02.xhtml#Fig7).


    ![9781484200834_Fig02-07.jpg](images/9781484200834_Fig02-07.jpg)


    [Figure 2-7](#9781484200834_Ch02.xhtml#_Fig7). The Execute Package Task Reference
    Property


    If the ReferenceType package is set to Project Reference, the Execute Package
    task can be used to start packages in the SSIS project, supporting the project
    deployment model. Setting this property to External Reference allows executing
    SSIS packages to be stored in either the MSDB database or file system, supporting
    the package deployment model. [Figure 2-8](#9781484200834_Ch02.xhtml#Fig8) shows
    the Execute Package task configured to execute the `Chapter2.dtsx` package.


    ![9781484200834_Fig02-08.jpg](images/9781484200834_Fig02-08.jpg)


    [Figure 2-8](#9781484200834_Ch02.xhtml#_Fig8). Selecting the Project Reference
    Package


    You can close the editor after selecting the package. Test it by executing `Parent2.dtsx`
    in the SSIS debugger.


    ## METADATA-DRIVEN EXECUTION


    I have used all of the methods for SSIS package execution listed in this chapter.
    They each have advantages and disadvantages. How then, do you select which method
    to use? That is an excellent question and I’m glad you asked! I consider the following:


    *   **Troubleshooting:** At some time in the future, someone will have to figure
    out why a package failed to execute. Facilitating troubleshooting is not something
    to be tacked onto the end of a data integration development project; you need
    to consider it up front. It is as important as security. I select an SSIS package
    execution method that supports troubleshooting in each enterprise.

    *   **Code maintenance:** The SSIS project will possibly be modified in the future.
    This means the packages, projects, and execution methodology need to be documented.
    It also means I need to consider the skills and comfort levels of the individuals
    or team maintaining this code. If the individuals or team are skilled .NET developers,
    I lean toward using the Script task and component for complex operations. I also
    attempt to develop in the .NET language of their choice, if this is the case.
    If they found their way to SSIS via a role as a database administrator, I use
    more T-SQL in Execute SQL tasks and OLE DB Source adapters when developing the
    solution. If they have DTS, SSIS, or other ETL development platform experience,
    I develop packages slightly differently to match their comfort zones. Again, this
    is different for different enterprises.

    *   **Enterprise requirements:** I often encounter “best practices” at enterprises.
    I enclose the terms in quotations because, well, some of them aren’t actually
    best. They exist because something bad happened and someone reacted. Sometimes
    the reactions make sense from an SSIS point of view, sometimes they are security
    matters that vex the SSIS developers, and sometimes they just do not make good
    sense for anyone.

    *   **Complexity:** I do not like complex solutions. I tolerate them if they are
    the only way to accomplish what needs to be done, but I strive to keep solutions
    as simple as possible. Fewer moving parts means there is less to break, less to
    troubleshoot, and less to maintain. That said, flexibility and complexity are
    often proportional. That means highly flexible solutions are likely to be complex
    solutions.


    I write this here, especially the bullet about complexity, to introduce execution
    from managed code. Complexity is the only disadvantage of executing SSIS from
    .NET. Executing SSIS from managed code offers maximum flexibility: If you can
    think it, you can find a way to build it in .NET. In my opinion, knowing a .NET
    language is no longer optional for the data integration developer in the Microsoft
    space.


    ## Execution from Managed Code


    There is a ton (or tonne, if you prefer) of benefit from executing SSIS packages
    from .NET managed code. There are various limitations to executing SSIS in other
    ways. Without exception, they can all be overcome by controlling execution from
    .NET. In this section, we will demonstrate the basics of using VB.NET to execute
    SSIS packages.


    ### The Demo Application


    For this demonstration, I used Visual Basic 2013 and the .NET Framework 4.5.1.
    I downloaded a copy from `www.microsoft.com/en-us/download/details.aspx?id=40787`.
    Unless otherwise specified, I accepted the default settings for VB applications
    in the Visual Studio 2013 Integrated Development Environment (IDE).


    To begin, create a new VB Windows Forms project in Visual Studio 2013. Add references
    for the following assemblies:


    *   `Microsoft.SqlServer.ConnectionInfo`

    *   `Microsoft.SqlServer.DTSRuntimeWrap`

    *   `Microsoft.SqlServer.Management.IntegrationServices`

    *   `Microsoft.SqlServer.Management.Sdk.Sfc`

    *   `Microsoft.SqlServer.Smo`


    You will have to search for `Microsoft.SqlServer.Management.IntegrationServices`
    and `Microsoft.SqlServer.SMO` in the global assembly cache (GAC). The GAC is located
    in the Windows\Assembly folder, and these libraries are in the MSIL folder. Click
    Browse when adding references to the Visual Studio project.


