  trans: "\n从“截断 stgUpdates”执行 SQL 任务到“加载 tblDest”数据流任务添加优先级约束\n\n```xml\n<Dataflow\
    \ Name=\"Load tblDest\">\n  <PrecedenceConstraints>\n    <Inputs>\n      <Input\
    \ OutputPathName=\"Truncate stgUpdates.Output\" />\n    </Inputs>\n  </PrecedenceConstraints>\n\
    </Dataflow>\n```\n\n此代码定义了`截断 stgUpdates`执行 SQL 任务和`加载 tblDest`数据流任务之间的`OnSuccess`优先级约束。\n\
    \n## 添加转换\n\n现在我们准备添加定义转换的元数据，这些转换是数据流任务的核心。在本节中，我们将设计一个增量加载，其中包括一个`OleDbSource`适配器、一个`Lookup`转换、一个`条件拆分`转换和两个`OleDbDestination`适配器。\n\
    \n首先，在`</PrecedenceConstraints>`标签之后添加一个`<Transformations>`节点。在`<Transformations>`标签内，添加一个`<OleDbSource>`标签，并包含以下属性及值对：\n\
    \n*   `Name`： `tblSource Source`\n*   `ConnectionName`： `SSISIncrementalLoad_Source`\n\
    \n在`<OleDbSource>`标签内，添加一个`<ExternalTableInput>`节点，该节点包含一个值为`\"dbo.tblSource\"\
    `的`Table`属性。此元数据构建了一个名为`\"tblSource Source\"`的`OleDbSource`适配器，它连接到之前在`<Connections>`标签内定义的`SSISIncrementalLoad_Source`连接。`OleDbSource`适配器将按照`ExternalTableInput`标签中的指定连接到表`\"\
    dbo.tblSource\"`。`数据流`XML 节点现在将如`清单 19-9`所示出现。\n\n`清单 19-9`. 包含 OLE DB 源适配器的数据流节点\n\
    \n```xml\n<Dataflow Name=\"Load tblDest\">\n  <PrecedenceConstraints>\n    <Inputs>\n\
    \      <Input OutputPathName=\"Truncate stgUpdates.Output\" />\n    </Inputs>\n\
    \  </PrecedenceConstraints>\n  <Transformations>\n    <OleDbSource Name=\"tblSource\
    \ Source\" ConnectionName=\"SSISIncrementalLoad_Source\">\n      <ExternalTableInput\
    \ Table=\"dbo.tblSource\" />\n    </OleDbSource>\n  </Transformations>\n</Dataflow>\n\
    ```\n\n接下来，在`</OleDbSource>`标签之后立即添加一个`<Lookup>` XML 节点。在`<Lookup>`标签中包含以下属性及值对：\n\
    \n*   `Name`： `Correlate`\n*   `OleDbConnectionName`： `SSISIncrementalLoad_Dest`\n\
    *   `NoMatchBehavior`： `RedirectRowsToNoMatchOutput`\n\n`Name`属性设置`Lookup`转换的名称。`OleDbConnectionName`指示\
    \ Biml 使用清单中在`<Connections>`标签内定义的连接管理器。`NoMatchBehavior`属性被配置为将不匹配的行重定向到`Lookup`转换的\
    \ NoMatch 输出。\n\n继续通过在`<InputPath>`标签之后立即添加一个`<DirectInput>`节点来配置定义`Lookup`转换的元数据。在`<DirectInput>`和`</DirectInput>`标签之间输入以下\
    \ T-SQL 语句。\n\n```sql\nSELECT ColID, ColA, ColB, ColC\nFROM dbo.tblDest\n```\n\
    \n在`</DirectInput>`标签之后立即添加一个`<Inputs>`节点。在`<Inputs>`标签内，添加一个`<Column>`节点。包含以下属性名和值对。\n\
    \n*   `SourceColumn`： `ColID`\n*   `TargetColumn`： `ColID`\n\n前面的元数据提供了在`Lookup`转换的“列”页面上“可用输入”列和“可用查找”列之间的映射。\n\
    \n在`</Inputs>`标签之后立即添加一个`<Outputs>`节点。在`<Outputs>`标签内，添加三个`<Column>`节点，并包含以下属性名和值对。\n\
    \n1.  `SourceColumn`： `ColA`\n    `TargetColumn`： `Dest_ColA`\n2.  `SourceColumn`：\
    \ `ColB`\n    `TargetColumn`： `Dest_ColB`\n3.  `SourceColumn`： `ColC`\n    `TargetColumn`：\
    \ `Dest_ColC`\n\n前面的元数据在`Lookup`转换的“列”页面上“选择”了从“可用查找”列返回的列。添加后，`Lookup`转换元数据应如`清单\
    \ 19-10`所示。\n\n`清单 19-10`. 包含查找元数据的转换\n\n```xml\n<Transformations>\n  <OleDbSource\
    \ Name=\"tblSource Source\" ConnectionName=\"SSISIncrementalLoad_Source\">\n \
    \   <ExternalTableInput Table=\"dbo.tblSource\" />\n  </OleDbSource>\n  <Lookup\
    \ Name=\"Correlate\" OleDbConnectionName=\"SSISIncrementalLoad_Dest\"\n     NoMatchBehavior=\"\
    RedirectRowsToNoMatchOutput\">\n    <InputPath OutputPathName=\"tblSource Source.Output\"\
    \ />\n    <DirectInput>SELECT ColID, ColA, ColB, ColC FROM dbo.tblDest</DirectInput>\n\
    \    <Inputs>\n      <Column SourceColumn=\"ColID\" TargetColumn=\"ColID\" />\n\
    \    </Inputs>\n    <Outputs>\n      <Column SourceColumn=\"ColA\" TargetColumn=\"\
    Dest_ColA\" />\n      <Column SourceColumn=\"ColB\" TargetColumn=\"Dest_ColB\"\
    \ />\n      <Column SourceColumn=\"ColC\" TargetColumn=\"Dest_ColC\" />\n    </Outputs>\n\
    \  </Lookup>\n</Transformations>\n```\n\n在`</Lookup>`标签之后，立即添加一个`<OleDbDestination>`\
    \ XML 节点，包含以下属性名和值对。\n\n*   `Name`： `tblDest Destination`\n*   `ConnectionName`：\
    \ `SSISIncrementalLoad_Dest`\n\n在`<OleDbDestination>`标签内，添加一个`<InputPath>`节点，其`OutputPathName`属性设置为值`\"\
    Correlate.NoMatch\"`。在`<InputPath>`标签之后，添加一个`<ExternalTableOutput>`节点，其`Table`属性设置为值`\"\
    dbo.tblDest\"`。\n\n前面的元数据定义了一个`OleDbDestination`适配器，并将其配置为将`Lookup`转换的 NoMatch\
    \ 输出连接到之前定义的`SSISIncrementalLoad_Dest`连接。\n\n在`</OleDbDestination>`标签之后立即添加一个`<ConditionalSplit>`\
    \ XML 节点。添加一个名为`Name`的属性并将其值设置为`\"Filter\"`。在`<ConditionalSplit>`标签内，添加一个`<InputPath>`\
    \ XML 节点，其`OutputPathName`属性设置为`\"Correlate.Match\"`。现在我们需要添加一个条件输出路径。在`<InputPath>`标签之后立即添加一个`<OutputPaths>`节点，然后依次添加一个包含`Name`属性（设置为`\"\
    Changed Rows\"`）的`<OutputPath>`节点。在`<OutputPaths>`标签内，创建一个`<Expression>`节点。在`<Expression>`和`</Expression>`标签之间，添加以下\
    \ SSIS 表达式。\n\n```expression\n(ColA != Dest_ColA) || (ColB != Dest_ColB) || (ColC\
    \ != Dest_ColC)\n```\n\n此步骤完成后，`Transformations` XML 应如`清单 19-11`所示。\n\n`清单 19-11`.\
    \ 包含 OLE DB 源、查找、条件拆分和一个 OLE DB 目标的转换节点\n\n```xml\n<Transformations>\n  <OleDbSource\
    \ Name=\"tblSource Source\" ConnectionName=\"SSISIncrementalLoad_Source\">\n \
    \   <ExternalTableInput Table=\"dbo.tblSource\" />\n  </OleDbSource>\n  <Lookup\
    \ Name=\"Correlate\" OleDbConnectionName=\"SSISIncrementalLoad_Dest\"\n     NoMatchBehavior=\"\
    RedirectRowsToNoMatchOutput\">\n    <InputPath OutputPathName=\"tblSource Source.Output\"\
    \ />\n    <DirectInput>SELECT ColID, ColA, ColB, ColC FROM dbo.tblDest</DirectInput>\n\
    \    <Inputs>\n      <Column SourceColumn=\"ColID\" TargetColumn=\"ColID\" />\n\
    \    </Inputs>\n    <Outputs>\n      <Column SourceColumn=\"ColA\" TargetColumn=\"\
    Dest_ColA\" />\n      <Column SourceColumn=\"ColB\" TargetColumn=\"Dest_ColB\"\
    \ />\n      <Column SourceColumn=\"ColC\" TargetColumn=\"Dest_ColC\" />\n    </Outputs>\n\
    \  </Lookup>\n  <OleDbDestination Name=\"tblDest Destination\" ConnectionName=\"\
    SSISIncrementalLoad_Dest\">\n    <InputPath OutputPathName=\"Correlate.NoMatch\"\
    \ />\n    <ExternalTableOutput Table=\"dbo.tblDest\" />\n  </OleDbDestination>\n\
    \  <ConditionalSplit Name=\"Filter\">\n    <InputPath OutputPathName=\"Correlate.Match\"\
    />\n    <OutputPaths>\n      <OutputPath Name=\"Changed Rows\">\n        <Expression>(ColA\
    \ != Dest_ColA) || (ColB != Dest_ColB) ||\n          (ColC != Dest_ColC)</Expression>\n\
    \      </OutputPath>\n    </OutputPaths>\n  </ConditionalSplit>\n</Transformations>\n\
    ```\n"
- fmt: "# 条件分割组件配置\n\n在条件分割元数据中，最近添加的配置将单个输出命名为 `\"Changed Rows\"`，并分配了一个 SSIS 表达式，该表达式旨在检测同时存在于源表和目标表中的行变化。\n\
    \n# 添加 OLE DB 目标适配器\n\n我们数据流任务中的最后一个组件是一个 OLE DB 目标适配器，用于暂存将在数据流执行完成后进行更新的行。在\
    \ `</ConditionalSplit>` 标签之后，立即添加一个 `OleDbDestination` 节点及其属性：\n\n*   `Name`:\
    \ `stgUpdates`\n*   `ConnectionName`: `SSISIncrementalLoad_Dest`\n\n在 `<OleDbDestination>`\
    \ 标签内，添加一个名为 `InputPath` 的新节点，其属性 `OutputPathName` 的值设置为 `\"Filter.Changed Rows\"\
    `。随后，添加一个名为 `ExternalTableOutput` 的节点，其中包含一个 `Table` 属性，设置为 `\"dbo.stgUpdates\"\
    `。此元数据定义了一个 OLE DB 目标适配器，该适配器将名为 `Filter` 的条件分割的“Changed Rows”输出连接到之前定义的 `SSISIncrementalLoad_Dest`\
    \ 连接所指向数据库中的 `dbo.stgUpdates` 表。\n\n# 完整的数据流任务元数据\n\n完整的数据流任务元数据如 [Listing 19-12](#9781484200834_Ch19.xhtml#list12)\
    \ 所示。\n\n## Listing 19-12. 完成的数据流 XML 节点\n\n```xml\n<Dataflow Name=\"Load tblDest\"\
    >\n  <PrecedenceConstraints>\n    <Inputs>\n      <Input OutputPathName=\"Truncate\
    \ stgUpdates.Output\" />\n    </Inputs>\n  </PrecedenceConstraints>\n  <Transformations>\n\
    \    <OleDbSource Name=\"tblSource Source\" ConnectionName=\"SSISIncrementalLoad_Source\"\
    >\n      <ExternalTableInput Table=\"dbo.tblSource\" />\n    </OleDbSource>\n\
    \    <Lookup Name=\"Correlate\" OleDbConnectionName=\"SSISIncrementalLoad_Dest\"\
    \n        NoMatchBehavior=\"RedirectRowsToNoMatchOutput\">\n      <InputPath OutputPathName=\"\
    tblSource Source.Output\" />\n      <DirectInput>SELECT ColID, ColA, ColB, ColC\
    \ FROM dbo.tblDest</DirectInput>\n      <Inputs>\n        <Column SourceColumn=\"\
    ColID\" TargetColumn=\"ColID\" />\n      </Inputs>\n      <Outputs>\n        <Column\
    \ SourceColumn=\"ColA\" TargetColumn=\"Dest_ColA\" />\n        <Column SourceColumn=\"\
    ColB\" TargetColumn=\"Dest_ColB\" />\n        <Column SourceColumn=\"ColC\" TargetColumn=\"\
    Dest_ColC\" />\n      </Outputs>\n    </Lookup>\n    <OleDbDestination Name=\"\
    tblDest Destination\" ConnectionName=\"SSISIncrementalLoad_Dest\">\n      <InputPath\
    \ OutputPathName=\"Correlate.NoMatch\" />\n      <ExternalTableOutput Table=\"\
    dbo.tblDest\" />\n    </OleDbDestination>\n    <ConditionalSplit Name=\"Filter\"\
    >\n      <InputPath OutputPathName=\"Correlate.Match\"/>\n      <OutputPaths>\n\
    \        <OutputPath Name=\"Changed Rows\">\n          <Expression>(ColA != Dest_ColA)\
    \ || (ColB != Dest_ColB) ||\n              (ColC != Dest_ColC)</Expression>\n\
    \        </OutputPath>\n      </OutputPaths>\n    </ConditionalSplit>\n    <OleDbDestination\
    \ Name=\"stgUpdates\" ConnectionName=\"SSISIncrementalLoad_Dest\">\n      <InputPath\
    \ OutputPathName=\"Filter.Changed Rows\" />\n      <ExternalTableOutput Table=\"\
    dbo.stgUpdates\" />\n    </OleDbDestination>\n  </Transformations>\n</Dataflow>\n\
    ```\n\n# 添加执行 SQL 任务\n\n还有一个执行 SQL 任务需要完成我们的增量加载 SSIS 包。此任务将通过使用单个 `Update` T-SQL\
    \ 语句应用存储在 `\"dbo.stgUpdates\"` 表中的行来更新目标表。以这种方式应用更新通常比逐行更新更快。\n\n为了继续开发演示代码，在\
    \ `</Dataflow>` 标签之后立即添加一个 `ExecuteSQL` XML 节点及其属性：\n\n*   `Name`: `Apply stgUpdates`\n\
    *   `ConnectionName`: `SSISIncrementalLoad_Dest`\n\n在 `<ExecuteSQL>` 标签之后，立即添加一个\
    \ `PrecedenceConstraints` 节点，然后是 `Inputs` 节点。\n\n在 `<Inputs>` 标签内添加一个 `Input`\
    \ 节点，其中包含一个属性 `OutputPathName`，其值设置为 `\"Load tblDest.Output\"`。在 `</PrecedenceConstraints>`\
    \ 标签之后立即添加一个 `DirectInput` 节点。在 `<DirectInput>` 标签内，添加以下 T-SQL 语句。\n\n```sql\n\
