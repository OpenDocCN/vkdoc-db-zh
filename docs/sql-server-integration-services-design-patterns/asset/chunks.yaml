    ![image](images/frontdot.jpg)


    ## OData Source


    The Open Data (`OData`) protocol is a data access protocol that provides a standardized
    way to create and consume data APIs via the web. The technology builds upon common
    protocols and methodologies, such as `HTTP`, `REST`, `AtomPub`, and `JSON`. The
    initial versions were defined by Microsoft as open standard, and `OData` has since
    been picked up by an `OASIS` committee with sponsors from many industry giants,
    such as `IBM`, `Red Hat`, and `SAP AG`. `OASIS` approved the latest version of
    the standard (Version 4) in February 2014.


    Microsoft has embraced `OData` as the primary way to expose data APIs for many
    of its products. `SharePoint`, `Project Online`, and many `Azure` services expose
    `OData` APIs for retrieving data, and performing `CRUD` operations. `WCF Data
    Services` (previously known as `ADO.NET Data Services`) provides a quick and easy
    way for anyone to developer their own `OData` services based on an `Entity Data
    Model (EDM)` and the `ADO.NET Entity Framework`. Given the proliferation of the
    technology, it made sense for Microsoft to add support for `OData` within `SSIS`.


    This chapter describes the newly added `OData Source` for `SSIS`.


    ![Image](images/sq.jpg) **Note** The `OData Source` is not included with the `SQL
    Server 2014` or `SQL Server 2012` installation package and must be downloaded
    separately. The `SQL Server 2012` version is available as a download from the
    Microsoft Download Center: `www.microsoft.com/en-us/download/details.aspx?id=42280`.
    The `SQL Server 2014` version is part of the `SQL Server 2014` feature pack, which
    can be found at `www.microsoft.com/en-us/download/details.aspx?id=42295`.


    ### Understanding the OData Protocol


    The `OData` protocol is a fairly extensive protocol and exposes a wide range of
    capabilities. This section describes the key features of the `OData` protocol
    that an `SSIS` developer should be aware of. If you are interested in learning
    more about the protocol, the full specification and documentation is available
    from the `www.odata.org` web site.


    ![Image](images/sq.jpg) **Note** The `SSIS OData Source` for `SQL Server 2012`
    and `2014` supports version 3 of the `OData` protocol, and not version 4. More
    information about the `OData` protocol can be found at `www.odata.org/`.


    There are two main features of `OData` from an `SSIS` perspective: the metadata
    document and the data you get back from accessing an `OData` resource.


    The metadata document is an `EDM` description of the `OData` service that describes
    the entity sets exposed by the service. The `SSIS OData Source` uses the metadata
    document to figure out the schema of the source data. This document is located
    at a standard location for each service—`http://<base_url>/$metadata`. [Table
    12-1](#9781484200834_Ch12.xhtml#Tab1) shows a mapping of `OData` and `EDM` concepts.


    **Table 12-1.** OData v3 Concepts Mapped to Relational Terms


    | OData | Relational | Comments |

    | --- | --- | --- |

    | Entity set | Table or view | *Entity sets* (also known as collections or feeds)
    define the objects you’ll be receiving in `SSIS`. When using the *Collection mode*,
    the `OData Source` provides a drop-down box allowing you to select one of the
    entity sets defined by the service. |

    | Entity | Row of data | Defines the schema for the rows of data within an entity
    set. |

    | Operation | Stored procedure or function | The `OData Source` UI does not expose
    a way to select operations, but it is possible to invoke an operation by specifying
    its resource path. |

    | Navigation property | Foreign key relationship | Navigation properties define
    relationships between entities. The `OData Source` does not support these directly,
    but you can access subentities by entering their resource path. |


    At runtime, `SSIS` retrieves data from the `OData` service using standard `HTTP`
    URLs. That means you can see the same data being returned to `SSIS` by entering
    the URL into a web browser, which can be very useful for debugging purposes. The
    `OData Source` has two modes: when accessing the service using the *Collection
    mode*, `SSIS` will automatically generate the resource URL for you; when using
    the *Resource Path mode*, you will supply the full URL.


    #### Data Type Mappings


    The `OData Source` will attempt to map the fields of complex types defined within
    the service’s metadata document to `SSIS` data flow types. When configuring the
    `OData Source`, the fields in the entity or resource collection or entity set
    you reference will be added as external metadata columns for the component. [Table
    12-2](#9781484200834_Ch12.xhtml#Tab2) shows the `EDM` to `SSIS` data type mappings.
    Given the flexibility of the `Entity Data Model`, you may find that certain complex
    types will not work with the `SSIS OData Source`.


    **Table 12-2.** EDM Data Type Mapping to SSIS Types


    | EDM Type | CLR Type | SSIS Type |

    | --- | --- | --- |

    | Edm.Binary | byte[] | DT_BYTES |

    | Edm.Boolean | bool | DT_BOOL |

    | Edm.DateTime | DateTime | DT_DBTIMESTAMP |

    | Edm.DateTimeOffset | DateTimeOffset | DT_DBTIMESTAMPOFFSET |

    | Edm.Decimal | decimal | DT_NUMERIC |

    | Edm.Double | double | DT_R8 |

    | Edm.Guid | Guid | DT_GUID |

    | Edm.Int16 | Int16 | DT_I2 |

    | Edm.Int32 | Int32 | DT_I4 |

    | Edm.Int64 | Int64 | DT_I8 |

    | Edm.SByte | sbyte | DT_I1 |

    | Edm.Single | float | DT_R4 |

    | Edm.String | string | DT_WSTR |

    | Edm.Time | TimeSpan | DT_DBTIME2 |


    #### Query Options


    `OData` supports multiple query options that can be included with a request. Query
    options start with a dollar sign (`$`) and are added to the query string portion
    of the URL, following the resource path. These options are typically used to pass
    filters to the service or to limit the number of rows or columns in the result
    set. Some `OData` services may not support all of the available query options,
    so sometimes you will need to experiment. [Table 12-3](#9781484200834_Ch12.xhtml#Tab3)
    shows some of the more commonly used query options you will use when working with
    `SSIS`. You can use the query options in `SSIS` by specifying them in the `Query
    Options` box in the `OData Source Editor`, or by directly setting the `Query`
    property value on the component.


    **Table 12-3.** OData Query Options


    | Query Option | Description |

    | --- | --- |

    | `$filter` | Specifies which rows to return based on filter expressions. |

    | `$select` | Specifies which properties (columns) to return. |

    | `$orderby` | Specifies the order in which items are returned. |

    | `$top` | Specifies the maximum number of items to return. |

    | `$skip` | Specifies the number of items to skip before returning results. |

    | `$expand` | Specifies related entities to be included in the result. |

    | `$count` | Specifies whether to include a count of items in the result. |


    Additionally, it is a best practice to organize your ETL packages by the type
    of work they perform. For example:


    *   Each dimension has a separate package.

    *   Each fact table has a separate package.

    *   Staging operations (if used) each have their own package.

    *   Functional operations unrelated to data movement (for example, dropping or
    disabling indexes on tables before loading them with data) are separated as well.
    You can group some of these operations together in common packages where appropriate;
    for example, if you truncate tables and drop indexes in a staging database, those
    operations typically reside in the same package.


    Further, it’s often a good practice to isolate in separate packages any `ETL`
    logic that is significantly different in terms of scope or breadth of data. For
    example, a historical `ETL` process that retrieves a large chunk of old data will
    likely have different performance expectations, error-handling rules, and so on
    than a more frequently executed package that collects just the most recent incremental
    data. As such, by creating a separate package structure to address those larger
    sets of data, you help avoid the issue of trying to force a single package to
    handle these disparate scenarios.


    ### Conclusion


    `SQL Server Integration Services` isn’t just another `ETL` tool. At its root,
    it is ideally suited for the unique challenges of data warehouse `ETL`. This chapter
    has shown some specific methodologies for how to leverage `SSIS` against common
    and realistic `DW` challenges.'
