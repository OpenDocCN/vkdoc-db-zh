- fmt: '# Visual Studio 配置与 SSIS 包管理


    在开发过程中，切换配置可以轻松地更改参数值，并允许你构建具有不同默认参数值的多个项目部署文件版本。Visual Studio 配置是开发人员在多开发者或团队环境中维护各自设置的一种方式。


    当首次在 SSDT-BI 中创建项目时，会有一个名为 `Development` 的默认配置。你可以从“配置管理器”对话框（如图 [17-8](#9781484200834_Ch17.xhtml#Fig8)
    所示）创建额外的配置。你可以从“标准”工具栏上的“解决方案配置”组合框，或者通过右键单击“解决方案资源管理器”中的项目节点，选择“属性”，然后单击“配置管理器”按钮来启动“配置管理器”对话框。要创建新配置，请从“活动解决方案配置”下拉列表中选择“<新建...>”选项。


    ![9781484200834_Fig17-08.jpg](images/9781484200834_Fig17-08.jpg)


    图 17-8. Visual Studio 配置可以通过“配置管理器”对话框进行管理


    要向配置添加参数，请单击包“参数”选项卡上的“将参数添加到配置”按钮。图 [17-9](#9781484200834_Ch17.xhtml#Fig9) 显示了当向配置添加包参数时将显示的“管理参数值”对话框。单击“添加”按钮允许你选择一个参数——一旦添加了一个参数，它将出现在解决方案的所有配置中。“删除”按钮将从配置中删除所选参数（这意味着在设计时它总是具有相同的默认值）。“同步”按钮会将相同的值应用于所有配置——当你确定参数的默认值应在所有配置中更改时，请使用此按钮作为快捷方式。目前，你只能向
    Visual Studio 配置添加包参数和项目参数，但它们是从不同的对话框配置的。要管理项目级参数，请从项目参数设计器 (`Project.params`)
    中单击“将参数添加到配置”按钮。要使用 Visual Studio 配置管理连接管理器的设置，你首先需要将连接管理器参数化。共享连接管理器无法使用 Visual
    Studio 配置进行配置。


    ![9781484200834_Fig17-09.jpg](images/9781484200834_Fig17-09.jpg)


    图 17-9. “管理参数值”对话框显示当前通过配置设置的所有参数


    ![Image](images/sq.jpg) **注意** 当参数由 Visual Studio 配置控制时，其值将保存到 Visual Studio 项目文件
    (`.dtproj`) 中。在更新配置后务必保存项目文件，以确保不会丢失更改。


    ## 指定入口点包


    SQL Server 2012 为 SSIS 引入了另一个新概念——`entry-point package`。此功能允许包开发人员指出应特别注意某些包。这在包含少量主包（这些主包运行许多子包）的项目中非常有用。请注意，未标记为入口点包的包仍可运行——该设置旨在为在
    SSIS 目录中配置参数值的人员提供提示。SQL Server Management Studio (SSMS) 中的大多数 SSIS UI 都允许你快速过滤掉非入口点包上的参数，从而只查看需要设置的参数。


    包默认标记为入口点。要删除此设置，请右键单击“解决方案资源管理器”中的包名称，并取消选择“入口点包”选项。


    ## 连接管理器


    大多数连接管理器都需要某种形式的配置，在 SQL Server 2012 中，当通过 SSIS 目录运行包时，所有连接管理器属性都是可配置的。由于这些属性已经公开，在大多数情况下，你将不需要为连接管理器公开额外的参数。但是，你可能会遇到一些情况，其中参数化的连接管理器将是有益的。请注意，任何通过表达式设置的连接管理器属性都不会通过
    SSIS 目录公开，这可以防止 DBA 意外覆盖在运行时设置的属性值。


    ![Image](images/sq.jpg) **注意** 在早期版本的 SQL Server Integration Services 中，子包通常使用父包的变量值来配置连接管理器。如果连接字符串是在运行时确定的，你可能希望在
    SQL Server 2014 中保留此模式；然而，在许多情况下，你会希望改用共享连接管理器。


    可以使用属性表达式在连接管理器上设置参数。通过表达式设置的最常见属性是 `ConnectionString`，因为许多连接管理器通过解析 `ConnectionString`
    值来获取其属性。配置连接管理器时，请务必在 `ConnectionString` 或单个属性上设置表达式——无法保证表达式的解析顺序，并且在应用 `ConnectionString`
    时某些属性可能会被覆盖。


    要参数化共享连接管理器，请打开项目中的一个包，并右键单击设计图面“连接管理器”区域中共享连接管理器的名称。请注意，由于共享连接管理器是在项目级别声明的，因此你只能在共享连接管理器的任何属性表达式中使用项目级参数或静态字符串。表达式对话框不会为你提供使用包参数或变量的选项。


    ## 服务器上的参数配置


    参数的设计目的是使调度和运行 SSIS 包的人员工作起来更轻松。在许多环境中，这通常是 DBA 或 IT 运维人员——而不是最初开发包的人员。通过包含参数的描述，ETL
    开发人员可以创建自文档化的包，使配置包的人员能够非常容易地看到它运行所需的确切内容。


    本节介绍如何通过 SSIS 目录配置包以及如何通过 SSMS 公开参数。它涵盖了项目部署后如何设置默认参数值、各种包执行选项，以及 SQL Server 2012
    中内置的报告功能如何更轻松地确定包运行时设置的精确配置值。


    ## 默认配置


    所有参数和连接管理器的默认值在构建时保存在 SSIS 项目部署文件 (`.ispac`) 中。一旦项目部署到 SSIS 目录，这些就成为项目的默认值。要更改默认配置，请在
    SSMS 对象资源管理器中右键单击项目名称（或单个包名称）并选择“配置”（如图 [17-10](#9781484200834_Ch17.xhtml#Fig10)
    所示）。


    ![9781484200834_Fig17-10.jpg](images/9781484200834_Fig17-10.jpg)


    图 17-10. 项目部署后，可以通过 SSMS 更改项目的默认配置


    图 [17-11](#9781484200834_Ch17.xhtml#Fig11) 显示了 SSMS 中的参数配置对话框。通过此对话框，你可以为此项目内的所有包设置所有参数和连接管理器属性的默认值。“范围”下拉列表允许你筛选参数和连接管理器的视图。'
  raw: 'Switching between configurations allows you to easily change parameter values
    during development and also allows you to build multiple versions of your project
    deployment file with different default parameter values. Visual Studio configurations
    are a way for developers to maintain their own settings in multideveloper or team
    environments.    When you first create a project within SSDT-BI, you will have
    a default configuration called `Development`. You can create additional configurations
    from the Configuration Manager dialog (shown in [Figure 17-8](#9781484200834_Ch17.xhtml#Fig8)).
    You can launch the Configuration Manager dialog from the Solution Configurations
    combo box on the Standard toolbar or by right-clicking on the project node in
    the Solution Explorer, selecting Properties, and clicking the Configuration Managers
    button. To create a new configuration, select the <New...>option from the Active
    Solution Configuration dropdown.    ![9781484200834_Fig17-08.jpg](images/9781484200834_Fig17-08.jpg)    [Figure
    17-8](#9781484200834_Ch17.xhtml#_Fig8). Visual Studio configurations can be managed
    from the Configuration Manager dialog    To add a parameter to a configuration,
    click the Add Parameters to Configurations button on the package Parameters tab.
    [Figure 17-9](#9781484200834_Ch17.xhtml#Fig9) shows the Manage Parameter Values
    dialog that will be displayed when you add package parameters to configurations.
    Clicking the Add button allows you to select a parameter–once a parameter is added,
    it will appear in all configurations in the solution. The Remove button will remove
    the selected parameter from configurations (which means it will always have the
    same default value at design time). The Sync button will apply the same value
    to all configurations—use this button as a shortcut when you’re sure that the
    parameter’s default value should change across all configurations. Currently you
    can only add package parameters and project parameters to Visual Studio configurations,
    but they are configured from separate dialogs. To manage project-level parameters,
    click the Add Parameters to Configurations button from the Project Parameters
    designer (`Project.params`). To manage a connection manager’s settings with Visual
    Studio configurations, you will first need to parameterize the Connection Manager.
    Shared connection managers cannot be configured using Visual Studio configurations.    ![9781484200834_Fig17-09.jpg](images/9781484200834_Fig17-09.jpg)    [Figure
    17-9](#9781484200834_Ch17.xhtml#_Fig9). The Manage Parameter Values dialog displays
    all parameters currently set via configurations    ![Image](images/sq.jpg) **Note**  When
    a parameter is controlled by Visual Studio configurations, its value is saved
    out to the Visual Studio project file (`.dtproj`). Be sure to save the project
    file after making updates to your configurations to make sure that you do not
    lose the changes.    Specifying Entry-Point Packages    SQL Server 2012 introduces
    another new concept for SSIS—the *entry-point package*. This feature allows the
    package developer to indicate that special attention should be paid to certain
    packages. This is very useful in projects that contain a small number of master
    packages that run a number of child packages. Note that packages that are not
    marked as entry-point packages can still be run—the setting is meant to be a hint
    for the person configuring parameter values in the SSIS Catalog. Most SSIS UIs
    in SQL Server Management Studio (SSMS) allow you to quickly filter out parameters
    on non-entry-point packages, allowing you to view only the parameters they need
    to set.    Packages are marked as entry points by default. To remove this setting,
    right-click on the package name in the Solution Explorer, and unselect the Entry-Point
    Package option.


    Connection Managers    Most connection managers will require some form of configuration,
    and in SQL Server 2012, all connection manager properties are configurable when
    packages are run through the SSIS Catalog. Since these properties are already
    exposed, in most cases, you will not need to expose additional parameters for
    your connection managers. However, you may encounter some scenarios where parameterized
    connection managers will be beneficial. Note that any connection manager property
    that is set via expression will not be exposed through the SSIS Catalog, which
    prevents a DBA from accidentally overriding property values that are set at runtime.    ![Image](images/sq.jpg) **Note**  In
    previous versions of SQL Server Integration Services, it was common for child
    packages to configure connection managers with variable values from the parent
    package. You may wish to keep this pattern in SQL Server 2014 if the connection
    string is determined at runtime; however, in many cases, you’ll want to use shared
    connection managers instead.    Parameters can be set on connection managers using
    property expressions. The most common property to set via expression is the `ConnectionString`,
    because many connection managers derive their properties by parsing the `ConnectionString`
    value. When configuring connection managers, be sure to set expressions on either
    the `ConnectionString` or individual properties—the order in which expressions
    are resolved cannot be guaranteed, and certain properties may be overwritten when
    the `ConnectionString` is applied.    To parameterize a shared connection manager,
    open one of the packages in the project and right-click on the shared connection
    manager’s name in the Connection Managers area of the design surface. Note that
    since shared connection managers are declared at the project level, you can only
    use project-level parameters or static strings in any property expressions on
    shared connection managers. The expression dialog will not give you the option
    to use package parameters or variables.    Parameter Configuration on the Server    Parameters
    were designed to make it easier for the person scheduling and running SSIS packages.
    In many environments, this is typically a DBA or IT operations person—not the
    person who originally developed the package. By including descriptions with the
    parameters, an ETL developer can create self-documenting packages, making it very
    easy for whoever is configuring the package to see exactly what it needs to run.    This
    section describes how to configure packages through the SSIS Catalog and how to
    surface parameters through SSMS. It covers how to set default parameter values
    after a project is deployed, the various package execution options, and how the
    built-in reporting functionality in SQL Server 2012 makes it easier to determine
    the exact configuration values set when the package was run.    Default Configuration    Default
    values for all parameters and connection managers are saved within the SSIS project
    deployment file (`.ispac`) when the file is built. These become the default values
    for the project once it is deployed to the SSIS Catalog. To change the default
    configuration, right-click on the project name (or individual package names) and
    select Configure within the SSMS Object Explorer (as shown in [Figure 17-10](#9781484200834_Ch17.xhtml#Fig10)).    ![9781484200834_Fig17-10.jpg](images/9781484200834_Fig17-10.jpg)    [Figure
    17-10](#9781484200834_Ch17.xhtml#_Fig10). The default configuration for a project
    can be changed through SSMS after the project is deployed    [Figure 17-11](#9781484200834_Ch17.xhtml#Fig11)
    shows the parameter configuration dialog in SSMS. Through this dialog, you can
    set default values for all parameters and connection manager properties for packages
    within this project. The Scope dropdown allows you to filter your view of the
    parameters and connection managers.'
