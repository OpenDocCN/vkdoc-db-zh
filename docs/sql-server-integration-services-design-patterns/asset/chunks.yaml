  trans: "/* 调用 `catalog.create_execution` 存储过程\n      以初始化执行位置和参数 */\n  执行 `catalog.create_execution`\n\
    \   `@package_name` = `@PackageName`\n  ,`@execution_id` = `@ExecutionID` 输出\n\
    \  ,`@folder_name` = `@FolderName`\n  ,`@project_name` = `@ProjectName`\n  ,`@use32bitruntime`\
    \ = `@Use32BitRunTime`\n  ,`@reference_id` = `@ReferenceID`\n\n/* 填充用于输出的 `@ExecutionID`\
    \ 参数 */\n  选择 `@ExecutionID` 作为 Execution_Id\n\n/* 配置数据钩子参数 */\n  如果 (左侧(`@DataFlowTaskName`,\
    \ 9) <> '\\Package\\')\n   设置 `@DataFlowTaskName` = '\\Package\\' + `@DataFlowTaskName`\n\
    \n如果 左侧(`@IdentificationString`,6) <> 'Paths['\n   设置 `@IdentificationString`\
    \ = 'Paths[' + `@IdentificationString` + ']'\n\n/* 创建数据钩子 */\n  执行 `[SSISDB].[catalog].add_data_tap`\
    \ `@ExecutionID`, `@DataFlowTaskName`,\n   `@IdentificationString`, `@DataTapFileName`,\
    \ `@DataTapMaxRows`\n\n/* 创建一个名为 `@Sql` 的参数（变量） */\n  声明 `@logging_level` smallint\n\
    \   /* 解码日志记录级别 */\n  选择 `@logging_level` = 情况\n                           当 上层(`@LoggingLevel`)\
    \ = 'BASIC'\n                                           则 1\n                \
    \                           当 上层(`@LoggingLevel`) = 'PERFORMANCE'\n          \
    \                                 则 2\n                                      \
    \      当 上层(`@LoggingLevel`) = 'VERBOSE'\n                                   \
    \        则 3\n                                           否则 0 /* '无' '\n     \
    \                                     结束\n   /* 调用 `catalog.set_execution_parameter_value`\
    \ 存储\n      过程以更新 `LOGGING_LEVEL` 参数 */\n  执行 `catalog.set_execution_parameter_value`\n\
    \    `@ExecutionID`\n   ,`@object_type` = `@ObjectType`\n   ,`@parameter_name`\
    \ = N'LOGGING_LEVEL'\n   ,`@parameter_value` = `@logging_level`\n\n/* 调用 `catalog.start_execution`（不言自明）\
    \ */\n  执行 `catalog.start_execution`\n    `@ExecutionID`\n\n结束\n```\n\n## 测试数据钩子存储过程\n\
    \n在开始此练习之前，请访问 `http://andyweather.com/data/WeatherData_Dec08.zip` 以获取一些真实世界温度和湿度的天气数据，这些数据收集自我位于弗吉尼亚州法姆维尔的气象站。压缩文件（`WeatherData_Dec08.zip`）包含一个名为\
    \ `sensor1-all.csv` 的 CSV 文件。该文件位于两层文件夹之下，路径为 `Dec08\\TH\\sensor1-all.csv`。解压缩该文件并将其存储在您的文件系统中。我更倾向于将与测试项目相关的数据存储在\
    \ SSIS 解决方案目录中一个名为 `Data` 的文件夹内。只要您记得文件存放的位置，具体存放在哪里并不重要。\n\n向 Chapter2 项目添加一个新的\
    \ SSIS 包，并将其重命名为 `DataTapTest.dtsx`。将一个数据流任务拖到控制流上，并将其重命名为 `DFT 加载温度数据`。打开数据流编辑器（选项卡），并将一个平面文件源适配器拖到设计图面上。将平面文件源适配器重命名为\
    \ `FFSrc 温度`。打开平面文件源适配器编辑器，单击平面文件连接管理器下拉列表右侧的 `新建` 按钮。单击 `新建` 按钮会为您做几件事：\n\n1.\
    \  它创建一个新的平面文件连接管理器。\n2.  它打开新的平面文件连接管理器编辑器。\n\n将平面文件连接管理器的名称设置为 `FFCM 温度`。单击\
    \ `浏览` 按钮，并导航到包含 `sensor1-all.csv` 文件的文件夹（记得在 `打开` 对话框中将扩展名筛选器从 `*.txt` 更改为 `*.csv`）。选择\
    \ `sensor1-all.csv` 文件，然后单击 `打开` 对话框上的 `确定` 按钮，因为在此演示中，我们接受平面文件连接管理器的默认设置。单击 `确定`\
    \ 按钮关闭平面文件源适配器编辑器。\n\n在继续之前，打开 SQL Server Management Studio (SSMS)，连接到 SQL Server\
    \ 2014 实例，并创建一个名为 `TestDB` 的数据库。\n\n返回到 SQL Server Data Tools - Business Intelligence\
    \ (SSDT-BI)，并将一个 OLE DB 目标适配器拖到数据流任务设计图面上。将 OLE DB 目标适配器重命名为 `OLEDBDest 温度暂存区`，并在\
    \ `FFSrc 温度` 平面文件源适配器和 `OLEDBDest 温度暂存区` OLE DB 目标适配器之间连接一条数据流路径（蓝色箭头）。打开 `OLEDBDest\
    \ 温度暂存区` OLE DB 目标适配器编辑器，并单击 OLE DB 连接管理器下拉列表右侧的 `新建` 按钮，以创建一个新的 OLE DB 连接管理器并打开其编辑器。当\
    \ `配置 OLE DB 连接管理器` 窗口显示时，单击 `新建` 按钮以打开 `连接管理器编辑器` 窗口。输入服务器名称和用户登录凭据，然后在 `选择或输入数据库名称`\
    \ 下拉列表中输入或选择 `TestDB` 数据库。关闭编辑器和 `配置 OLE DB 连接管理器` 窗口以返回到 `OLEDBDest 温度暂存区` OLE\
    \ DB 目标适配器。\n\n在 `OLEDBDest 温度暂存区` OLE DB 目标适配器中，单击 `表或视图的名称` 下拉列表右侧的 `新建` 按钮。修改\
    \ `创建表` 窗口中的内容，使其与 清单 2-5 中的数据定义语言 (DDL) 语句相匹配。\n\n### 清单 2-5. 用于目标的数据定义语言 (DDL)\
    \ 创建表语句\n\n```sql\n创建表 [温度暂存区] (\n    [日期] varchar(50),\n    [时间] varchar(50),\n\
    \    [最低温度] varchar(50),\n    [最高温度] varchar(50),\n    [平均温度] varchar(50),\n \
    \   [最低湿度] varchar(50),\n    [最高湿度] varchar(50),\n    [平均湿度] varchar(50),\n  \
    \  [舒适区] varchar(50),\n    [最低露点] varchar(50),\n    [最高露点] varchar(50),\n    [平均露点]\
    \ varchar(50),\n    [最低体感温度] varchar(50),\n    [最高体感温度] varchar(50),\n    [平均体感温度]\
    \ varchar(50)\n)\n```\n\n此语句通过移除表名中的 `OLEDBDest` 前缀以及移除列名中的空格来修改提供的语句。单击 `确定`\
    \ 按钮创建表并关闭 `创建表` 窗口。单击 `映射` 页，并将可用的输入列映射到其匹配的可用目标列。关闭 `OLEDBDest 温度暂存区` OLE DB\
    \ 目标适配器编辑器。\n\n双击数据流路径以打开其编辑器。从 `常规` 页，复制 `IdentificationString` 属性值。`IdentificationString`\
    \ 属性应为 `Paths[FFSrc 温度.平面文件源输出]`。我们需要此值以及数据流任务的 `PackagePath` 属性值（`Package\\DFT\
    \ 加载温度数据`）来执行带有数据钩子的此包。\n\n首先，保存 SSIS 包并将其部署到目录。接下来，执行 清单 2-6 中的语句以执行带有数据钩子的 SSIS\
    \ 包。\n\n### 清单 2-6. 使用数据钩子执行 SSIS 包\n\n```sql\n声明 @ExecId bigint\n执行 SSISDB.custom.execute_catalog_package_with_Data_tap\n\
    \ @文件夹名 = 'Chapter2'\n,@项目名 = 'Chapter2'\n,@包名 = 'DataTapTest.dtsx'\n,@数据流任务名\
    \ = '\\Package\\DFT 加载温度数据'\n,@标识字符串 = 'Paths[FFSrc 温度.平面文件源输出]'\n,@数据钩子文件名 =\
    \ 'TemperatureRows.csv'\n,@执行 ID = @ExecId 输出\n,@数据钩子最大行数 = 25\n```\n\n一旦包执行完成（并且您可以在\
    \ `TestDB.dbo.温度暂存区` 表中测试行数），您应该在 `<驱动器>:\\Program Files\\Microsoft SQL Server\\\
    120\\DTS\\DataDumps` 目录中找到一个名为 `TemperatureRows.csv` 的 CSV 文件，并且该文件应包含流经 `DataTapTest.dtsx`\
    \ SSIS 包中 `DFT 加载温度数据` 任务内 `FFSrc 温度.平面文件源输出` 数据流路径的前 25 行数据。\n\n## 创建自定义执行框架"
- fmt: "SSIS 执行框架支持可重复且可靠的 SSIS 包执行。`SSISDB.custom.execute_catalog_package` 存储过程可以用作\
    \ SSIS 执行框架的核心。要创建支持此框架的表，请执行[列表 2-7](#9781484200834_Ch02.xhtml#list7)中的语句。\n\n\
    ## [列表 2-7](#9781484200834_Ch02.xhtml#_list7). 支持自定义 SSIS 执行框架的表\n\n```sql\n/*\
    \ Switch to SSISDB database */\nUse SSISDB\nGo\n\n/* Build custom Schema */\n\
    print 'Custom Schema'\n/* Check for existence of custom Schema */\nIf Not Exists(Select\
    \ name\n              From sys.schemas\n                         Where name =\
    \ 'custom')\n begin\n  /* Build and execute custom Schema SQL\n     if it does\
    \ not exist */\n  print ' - Creating custom schema'\n  declare @CustomSchemaSql\
    \ varchar(32) = 'Create Schema custom'\n  exec(@CustomSchemaSql)\n  print ' -\
    \ Custom schema created'\n end\nElse\n  /* If the custom schema exists, tell us\
    \ */\n print ' - Custom schema already exists.'\n print ''\nGo\n\n/* Build custom.Application\
    \ table */\nprint 'Custom.Application Table'\n/* Check for existence of custom.Application\
    \ table */\nIf Not Exists(Select s.name + '.' + t.name\n              From sys.tables\
    \ t\n                         Join sys.schemas s\n                           On\
    \ s.schema_id = t.schema_id\n                         Where s.name = 'custom'\n\
    \                           And t.name = 'Application')\n begin\n  /* Create custom.Application\
    \ table\n     if it does not exist */\n  print ' - Creating custom.Application\
    \ Table'\n  Create Table custom.Application\n  (\n    ApplicationID int identity(1,1)\n\
    \         Constraint PK_custom_Application Primary Key Clustered\n   ,ApplicationName\
    \ nvarchar(256) Not Null\n     Constraint U_custom_ApplicationName Unique\n  \
    \ ,ApplicationDescription nvarchar(512) Null\n  )\n  print ' - Custom.Application\
    \ Table created'\n end\nElse\n  /* If the custom.Application table exists, tell\
    \ us */\n print ' - Custom.Application Table already exists.'\nprint ''\n\n/*\
    \ Build custom.Package table */\nprint 'Custom.Package Table'\n/* Check for existence\
    \ of custom.Package table */\nIf Not Exists(Select s.name + '.' + t.name\n   \
    \           From sys.tables t\n                         Join sys.schemas s\n \
    \                          On s.schema_id = t.schema_id\n                    \
    \     Where s.name = 'custom'\n                           And t.name = 'Package')\n\
    \ begin\n  /* Create custom.Package table\n     if it does not exist */\n  print\
    \ ' - Creating custom.Package Table'\n  Create Table custom.Package\n  (\n   \
    \ PackageID int identity(1,1)\n         Constraint PK_custom_Package Primary Key\
    \ Clustered\n   ,FolderName nvarchar(128) Not Null\n   ,ProjectName nvarchar(128)\
    \ Not Null\n   ,PackageName nvarchar(256) Not Null\n   ,PackageDescription nvarchar(512)\
    \ Null\n  )\n  print ' - Custom.Package Table created'\n end\nElse\n  /* If the\
    \ custom.Package table exists, tell us */\n print ' - Custom.Package Table already\
    \ exists.'\nprint ''\n\n/* Build custom.ApplicationPackage table */\nprint 'Custom.ApplicationPackage\
    \ Table'\n/* Check for existence of custom.ApplicationPackage table */\nIf Not\
    \ Exists(Select s.name + '.' + t.name\n              From sys.tables t\n     \
    \                    Join sys.schemas s\n                           On s.schema_id\
    \ = t.schema_id\n                         Where s.name = 'custom'\n          \
    \                 And t.name = 'ApplicationPackage')\n begin\n  /* Create custom.ApplicationPackage\
    \ table\n     if it does not exist */\n  print ' - Creating custom.ApplicationPackage\
    \ Table'\n  Create Table custom.ApplicationPackage\n  (\n    ApplicationPackageID\
    \ int identity(1,1)\n         Constraint PK_custom_ApplicationPackage Primary\
    \ Key Clustered\n   ,ApplicationID int Not Null\n     Constraint FK_custom_ApplicationPackage_Application\n\
    \          Foreign Key References custom.Application(ApplicationID)\n   ,PakcageID\
    \ int Not Null\n     Constraint FK_custom_ApplicationPackage_Package\n       \
    \   Foreign Key References custom.Package(PackageID)\n   ,ExecutionOrder int Not\
    \ Null\n     Constraint DF_custom_ApplicationPackage_ExecutionOrder\n        \
    \  Default(10)\n   ,ApplicationPackageEnabled bit Not Null\n     Constraint DF_custom_ApplicationPackage_ApplicationPackageEnabled\n\
    \          Default(1)\n  )\n  print ' - Custom.ApplicationPackage Table created'\n\
    \ end\nElse\n  /* If the custom.ApplicationPackage table exists, tell us */\n\
    \ print ' - Custom.ApplicationPackage Table already exists.'\nprint ''\n\n/* Build\
    \ custom.GetApplicationPackages stored procedure */\nprint 'Custom.GetApplicationPackages'\n\
    /* Check for existence of custom.GetApplicationPackages stored procedure */\n\
    If Exists(Select s.name + '.' + p.name\n          From sys.procedures p\n    \
    \              Join sys.schemas s\n                    On s.schema_id = p.schema_id\n\
    \                  Where s.name = 'custom'\n                    And p.name = 'GetApplicationPackages')\n\
    \ begin\n  /* If custom.GetApplicationPackages stored procedure\n     exists,\
    \ drop it */\n  print ' - Dropping custom.GetApplicationPackages Stored Procedure'\n\
    \  Drop Procedure custom.GetApplicationPackages\n  print ' - custom.GetApplicationPackages\
    \ Stored Procedure dropped'\n end\nprint ' - Creating custom.GetApplicationPackages\
    \ Stored Procedure'\ngo\n\n/*\n\nProcedure: custom.GetApplicationPackages\n  \
    \         Author: Andy Leonard\n Parameter(s): ApplicationName [nvarchar(256)]\n\
    \               - contains the name of the SSIS Application\n                \
    \             for which to retrieve SSIS Packages.\n  Description: Executes against\
    \ the custom.ApplicationPackages\n                table joined to the custom.Application\n\
    \                        and custom.Packages tables. Returns a\n             \
    \           list of enabled Packages related to the\n                        Application\
    \ ordered by ExecutionOrder.\n          Example: exec custom.GetApplicationPackages\
    \ 'TestSSISApp'\n\n*/\nCreate Procedure custom.GetApplicationPackages\n @ApplicationName\
    \ nvarchar(256)\nAs\n  begin\n\nSet NoCount On\n\nSelect p.FolderName, p.ProjectName,\
    \ p.PackageName, ap.ExecutionOrder\n        From custom.ApplicationPackage ap\n\
    \        Join custom.Package p\n          On p.PackageID = ap.PackageID\n    \
    \    Join custom.Application a\n          On a.ApplicationID = ap.ApplicationID\n\
    \        Where a.ApplicationName = @ApplicationName\n          And ap.ApplicationPackageEnabled\
    \ = 1\n        Order By ap.ExecutionOrder\n  end\ngo\nprint ' - Custom.GetApplicationPackages\
    \ Stored Procedure created.'\nprint ''\n```"
