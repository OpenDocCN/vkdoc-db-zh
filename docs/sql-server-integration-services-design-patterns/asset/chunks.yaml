    \       Dim sFooterRow As String\n        Dim s As Integer = 0\n\n' 3: 记录值...\n\
    \        sMsg = \"包名.任务名: \" & sSubComponent & ControlChars.CrLf & _\n ControlChars.CrLf\
    \ & _\n            \"提取文件路径: \" & sExtractFilePath & ControlChars.CrLf & _\n ControlChars.CrLf\
    \ & _\n            \"记录数: \" & iRecordCount.ToString & ControlChars.CrLf & _\n\
    \ ControlChars.CrLf & _\n               \"金额总和: \" & sAmountSum & ControlChars.CrLf\
    \ & ControlChars.CrLf & _\n               \"日期格式: \" & sDateFormat & ControlChars.CrLf\
    \ & ControlChars.CrLf & _\n               \"分隔符: \" & sDelimiter & ControlChars.CrLf\
    \ & ControlChars.CrLf & _\n            \"最后更新日期时间: \" & sLastUpdateDateTime &\
    \ ControlChars.CrLf & _\n ControlChars.CrLf & _\n               \"调试: \" & bDebug.ToString\n\
    \        Dts.Events.FireInformation(0, sSubComponent, sMsg, \"\", 0, True)\n \
    \       If bDebug Then MsgBox(sMsg)\n\n' 4: 创建页脚行...\n        sFooterRow = iRecordCount.ToString\
    \ & sDelimiter & sAmountSum & sDelimiter & _\n sLastUpdateDateTime\n        '\
    \ 5: 记录...\n        sMsg = \"页脚行: \" & sFooterRow\n        Dts.Events.FireInformation(0,\
    \ sSubComponent, sMsg, \"\", 0, True)\n        If bDebug Then MsgBox(sMsg)\n\n\
    ' 6: 检查文件是否正在使用...\n        While FileInUse(sExtractFilePath)\n            ' 6a:\
    \ 如果文件正在使用，休眠一秒钟...\n            System.Threading.Thread.Sleep(1000)\n       \
    \     ' 6b: 递增计数器...\n            s += 1\n            ' 6c: 如果计数器达到 10（10 秒），\n\
    \            If s > 10 Then\n                ' 则退出循环...\n                Exit\
    \ While\n            End If 's > 10\n        End While 'FileInUse(sExtractFilePath)\n\
    \        ' 7: 记录...\n        If s = 1 Then\n            sMsg = \"文件被占用 \" & s.ToString\
    \ & \" 次。\"\n        Else ' s = 1\n            sMsg = \"文件被占用 \" & s.ToString\
    \ & \" 次。\"\n        End If ' s = 1\n        Dts.Events.FireInformation(0, sSubComponent,\
    \ sMsg, \"\", 0, True)\n        If bDebug Then MsgBox(sMsg)\n\n' 8: 如果文件存在...\n\
    \        If File.Exists(sExtractFilePath) Then\n            Try\n            \
    \    ' 8a: 以追加模式打开它，使用默认编码，通过 StreamWriter...\n                Dim writer As StreamWriter\
    \ = New StreamWriter(sExtractFilePath, True, _\n Encoding.Default)\n         \
    \       ' 8b: 添加页脚行...\n                writer.WriteLine(sFooterRow)\n       \
    \         ' 8c: 清理...\n                writer.Flush()\n                ' 8d: 退出...\n\
    \                writer.Close()\n                ' 8e: 记录...\n               \
    \ sMsg = \"文件 \" & sExtractFilePath & \" 存在，且页脚行已 \" & _\n \"被追加。\"\n        \
    \        Dts.Events.FireInformation(0, sSubComponent, sMsg, \"\", 0, True)\n \
    \               If bDebug Then MsgBox(sMsg)\n            Catch ex As Exception\n\
    \                ' 8f: 记录...\n                sMsg = \"向 \" & sExtractFilePath\
    \ & _\n \" 文件追加页脚行时出现问题: \" & ControlChars.CrLf & ex.Message\n               \
    \ Dts.Events.FireInformation(0, sSubComponent, sMsg, \"\", 0, True)\n        \
    \        If bDebug Then MsgBox(sMsg)\n            End Try\n        Else\n    \
    \        ' 8g: 记录...\n            sMsg = \"找不到文件: \" & sExtractFilePath\n    \
    \        Dts.Events.FireInformation(0, sSubComponent, sMsg, \"\", 0, True)\n \
    \           If bDebug Then MsgBox(sMsg)\n        End If ' File.Exists(sExtractFilePath)\n\
    \n'  9: 返回成功...\n        Dts.TaskResult = ScriptResults.Success\n\nEnd Sub\n```\n\
    \n然后在 `Public Sub Main()` 之后添加代码清单 7-9 中的函数。\n\n**代码清单 7-9**. FileInUse 函数的代码\n\
    \n```\n    Function FileInUse(ByVal sFile As String) As Boolean\n\nIf File.Exists(sFile)\
    \ Then\n            Try\n                Dim f As Integer = FreeFile()\n     \
    \           FileOpen(f, sFile, OpenMode.Binary, OpenAccess.ReadWrite, _\n OpenShare.LockReadWrite)\n\
    \                FileClose(f)\n            Catch ex As Exception\n           \
    \     Return True\n            End Try\n        End If\n    End Function\n```\n\
    \n现在脚本会构建页脚行并将其追加到**提取**文件。我们要做的第一件事——在标记为 1 的注释处——是给 `Debug` 变量赋值。我使用 `Debug`\
    \ 变量来控制显示变量值和其他相关信息的消息框。我在第 2 章关于执行模式的部分解释了原因。\n\n在注释 2 处，我们声明并初始化变量。我将变量分为两类：通用变量和特定于任务的变量。在注释\
    \ 3 处，我们在变量 `sMsg` 中构建一条消息。此消息包含脚本中至今使用的每个变量的值。如果我们以**调试**模式运行（如果 `bDebug` 为 `True`），代码会显示一个包含\
    \ `sMsg` 内容的消息框（通过 `MsgBox` 函数）。无论我们是否以**调试**模式运行，我都使用 `Dts.Events.FireInformation`\
    \ 方法引发 **OnInformation** 事件，并将 `sMsg` 的内容传递给它。这意味着信息始终会被记录，并可以选择性地通过消息框显示。我非常喜欢这种选项（非常）。\n"
- fmt: "Comment 4 has us constructing the actual footer row and placing its text in\
    \ the String variable `sFooterRow`. Note the delimiter is also dynamic. The String\
    \ variable `sDelimiter` contains the value passed to the `WriteFileFooter` into\
    \ the `Package` parameter named `$Package::Delimiter`. At comment 5, we log the\
    \ contents of the footer row.\n\nAt comment 6, we initiate a check to make sure\
    \ the extract file is not marked as “in use” by the operating system. There are\
    \ many ways to detect the state of the file in the file system, so I created a\
    \ Boolean function named `FileInUse` to encapsulate this test. If the function\
    \ I created doesn’t work for you, you can construct your own. If the file is in\
    \ use, the code initiates a `While` loop that sleeps the thread for one second.\
    \ Each iteration through the loop causes the variable `s` (the incrementor in\
    \ this example) to increment at comment 6b. If `s` exceeds ten, the loop exits.\
    \ We will only wait 10 seconds for the file to be usable. Note that if the file\
    \ remains in use at this juncture, we *still* move on. We’ll deal with the file-in-use\
    \ matter later, but we will not hang ourselves in a potentially endless loop waiting\
    \ for the file’s availability. We will instead fail. Whether the file is in use\
    \ or not in use, the script logs its state at comment 7.\n\nAt comment 8, we check\
    \ for the existence of the file and begin a `Try-Catch`. If the file doesn’t exist,\
    \ I opt to log a status message (via `Dts.Events.FireInformation`) and continue\
    \ (see comment 8g). The `Try-Catch` enforces the final test of the file’s usability.\
    \ If the file remains in use here, the `Catch` fires and logs the status message\
    \ at comment 8f. At 8f and/or 8g, you may very well decide to raise an error using\
    \ the `Dts.Events.FireError` method. Raising an error causes the Script task to\
    \ fail, and you may want this to happen. At comments 8a through 8d, we open the\
    \ file, append the footer row, close the file, and clean up. At comment 8e, the\
    \ code logs a status message. If anything fails when we are executing 8a through\
    \ 8e, code execution jumps to the `Catch` block.\n\nIf all goes well, the code\
    \ returns `Success` to the SSIS control flow via the `Dts.TaskResult` function\
    \ (comment 9).\n\nThe Script task does all the work in this pattern. Close the\
    \ Script Task Editor. Click OK. Then save the package.\n\nI created a test package\
    \ called `TestParent.dtsx` to test this package. The package has variables that\
    \ align with the parameters of the `WriteFileFooter.dtsx` package, as shown in\
    \ [Figure 7-22](#9781484200834_Ch07.xhtml#Fig22).\n\n![9781484200834_Fig07-22.jpg](images/9781484200834_Fig07-22.jpg)\n\
    \n[Figure 7-22](#9781484200834_Ch07.xhtml#_Fig22). Variables in the TestParent.dtsx\
    \ package\n\nIf you’re playing along at home, you should adjust the path of the\
    \ `ExtractFooterFilePath` variable.\n\nI added a `Sequence` container named `seq\
    \ Test WriteFileFooter` and included an `Execute Package` task named `ept Execute\
    \ WriteFileFooter Package`. On the Package page of the Execute Package Task Editor,\
    \ set the `ReferenceType` property to `Project Reference` and select `WriteFileFooter.dtsx`\
    \ from the `PackageNameFromProjectReference` property drop-down. Map the `TestParent`\
    \ package variables to the `WriteFileFooter` package parameters as shown in [Figure\
    \ 7-23](#9781484200834_Ch07.xhtml#Fig23).\n\n![9781484200834_Fig07-23.jpg](images/9781484200834_Fig07-23.jpg)\n\
    \n[Figure 7-23](#9781484200834_Ch07.xhtml#_Fig23). Mapping package parameters\n\
    \nExecute `TestParent.dtsx` to test the functionality. The package executes successfully\
    \ and the footer row is appended to the file as shown in [Figure 7-24](#9781484200834_Ch07.xhtml#Fig24).\n\
    \n![9781484200834_Fig07-24.jpg](images/9781484200834_Fig07-24.jpg)\n\n[Figure\
    \ 7-24](#9781484200834_Ch07.xhtml#_Fig24). Mission accomplished\n\n### Producing\
    \ a Header Row\n\nProducing a header row is a very simple operation in SSIS 2014,\
    \ provided you know the number of rows to be loaded in advance. You simply load\
    \ the destination flat file with the header row in one `Data Flow` task, and then\
    \ load the data rows to the same flat file in a subsequent `Data Flow` task. As\
    \ we say in Farmville, Virginia: “dog simple.” There are some subtle complexities\
    \ in this design, though.\n\nWe’ll start with a simple file named `MyFileHeaderExtract.csv`\
    \ that contains the following data:\n\n```\nID,Name,Value\n11,Andy,12\n22,Christy,13\n\
    33,Stevie Ray,14\n44,Emma Grace,15\n55,Riley Cooper,16\n```\n\nAdd a new SSIS\
    \ package named `WriteFileHeader.dtsx` to your SSIS project. Add the package parameters\
    \ shown in [Figure 7-25](#9781484200834_Ch07.xhtml#Fig25).\n\n![9781484200834_Fig07-25.jpg](images/9781484200834_Fig07-25.jpg)\n\
    \n[Figure 7-25](#9781484200834_Ch07.xhtml#_Fig25). WriteFileHeader.dtsx parameters\n\
    \nAdd two `Data Flow` tasks to the control flow. Name the first `dft Write Header\
    \ Row` and the second `dft Write Data Rows`. Open the editor for `dft Write Header\
    \ Row` and add a `Script` component named `scrc Build Header Row` to the `Data\
    \ Flow` task. When prompted, configure the `Script` component to act as a source.\
    \ Open the editor and set the `ScriptLanguage` property to `Microsoft Visual Basic\
    \ 2012`. Set the `ReadOnlyVariables` property to reference the following:\n\n\
    *   `$Package::AmountSum`\n*   `$Package::Delimiter`\n*   `$Package::LastUpdateDateTime`\n\
    *   `$Package::RecordCount`\n\nOn the Inputs and Outputs page, ensure the `SynchronousInputID`\
    \ property of Output 0 is set to `None` and add an output column named `HeaderRow`\
    \ (String data type, 500 length) to Output 0\\. Click the Script page and the\
    \ Edit Script button. Replace the code in the `CreateNewOutputRows()` subroutine\
    \ with that from [Listing 7-10](#9781484200834_Ch07.xhtml#list10).\n\n[***Listing\
    \ 7-10***](#9781484200834_Ch07.xhtml#_list10). Code for the CreateNewOutputRows\
    \ Subroutine\n\n```\nPublic Overrides Sub CreateNewOutputRows()\n\n    ' create\
    \ header row...        ' Get variable values...\n        Dim iRecordCount As Integer\
    \ = Me.Variables.RecordCount\n        Dim sDelimiter As String = Me.Variables.Delimiter\n\
    \        Dim dAmountSum As Decimal = Convert.ToDecimal(Me.Variables.AmountSum)\n\
    \        Dim dtLastUpdateDateTime As DateTime = _\n            Convert.ToDateTime(Me.Variables.LastUpdateDateTime)\n\
    \n    Dim sHeaderRow As String = iRecordCount.ToString & sDelimiter & _\n    \
    \                            dAmountSum.ToString & sDelimiter & _\n          \
    \                      dtLastUpdateDateTime.ToString\n\n        With Output0Buffer\n\
    \            .AddRow()\n            .HeaderRow = sHeaderRow\n        End With\n\
    \    End Sub\n```\n\nAdd a `Flat File` destination adapter and connect a data\
    \ flow path from the `Script` component to it. Open the `Flat File Destination\
    \ Editor` and click the `New` button beside the Flat File Connection Manager drop-down.\
    \ When the `Flat File Format` window displays, select `Delimited` and click the\
    \ `OK` button. Name the Flat File connection manager `Flat File Header Output`\
    \ and supply (or select) a file path. On the Columns page, configure a landing\
    \ column for the `HeaderRow` column from the `scrc Build Header Row` Script component.\
    \ Click the OK button to return to the `Flat File Destination Editor`. Make sure\
    \ the Overwrite Data in the File checkbox (in the Connection Manager page) is\
    \ checked. It should be; this is the default. Click on the Mappings page and complete\
    \ the destination configuration. This `Data Flow` task will construct and load\
    \ the header row."
  raw: 'Comment 4 has us constructing the actual footer row and placing its text in
    the String variable `sFooterRow`. Note the delimiter is also dynamic. The String
    variable `sDelimiter` contains the value passed to the `WriteFileFooter` into
    the `Package` parameter named `$Package::Delimiter`. At comment 5, we log the
    contents of the footer row.


    At comment 6, we initiate a check to make sure the extract file is not marked
    as “in use” by the operating system. There are many ways to detect the state of
    the file in the file system, so I created a Boolean function named `FileInUse`
    to encapsulate this test. If the function I created doesn’t work for you, you
    can construct your own. If the file is in use, the code initiates a While loop
    that sleeps the thread for one second. Each iteration through the loop causes
    the variable `s` (the incrementor in this example) to increment at comment 6b.
    If `s` exceeds ten, the loop exits. We will only wait 10 seconds for the file
    to be usable. Note that if the file remains in use at this juncture, we *still*
    move on. We’ll deal with the file-in-use matter later, but we will not hang ourselves
    in a potentially endless loop waiting for the file’s availability. We will instead
    fail. Whether the file is in use or not in use, the script logs its state at comment
    7.


    At comment 8, we check for the existence of the file and begin a Try-Catch. If
    the file doesn’t exist, I opt to log a status message (via `Dts.Events.FireInformation`)
    and continue (see comment 8g). The Try-Catch enforces the final test of the file’s
    usability. If the file remains in use here, the `Catch` fires and logs the status
    message at comment 8f. At 8f and/or 8g, you may very well decide to raise an error
    using the `Dts.Events.FireError` method. Raising an error causes the Script task
    to fail, and you may want this to happen. At comments 8a through 8d, we open the
    file, append the footer row, close the file, and clean up. At comment 8e, the
    code logs a status message. If anything fails when we are executing 8a through
    8e, code execution jumps to the `Catch` block.


    If all goes well, the code returns `Success` to the SSIS control flow via the
    `Dts.TaskResult` function (comment 9).


    The Script task does all the work in this pattern. Close the Script Task Editor.
    Click OK. Then save the package.


    I created a test package called `TestParent.dtsx` to test this package. The package
    has variables that align with the parameters of the `WriteFileFooter.dtsx` package,
    as shown in [Figure 7-22](#9781484200834_Ch07.xhtml#Fig22).


    ![9781484200834_Fig07-22.jpg](images/9781484200834_Fig07-22.jpg)


    [Figure 7-22](#9781484200834_Ch07.xhtml#_Fig22). Variables in the TestParent.dtsx
    package


    If you’re playing along at home, you should adjust the path of the `ExtractFooterFilePath`
    variable.


    I added a Sequence container named seq Test WriteFileFooter and included an Execute
    Package task named ept Execute WriteFileFooter Package. On the Package page of
    the Execute Package Task Editor, set the `ReferenceType` property to `Project
    Reference` and select `WriteFileFooter.dtsx` from the `PackageNameFromProjectReference`
    property drop-down. Map the `TestParent` package variables to the `WriteFileFooter`
    package parameters as shown in [Figure 7-23](#9781484200834_Ch07.xhtml#Fig23).


    ![9781484200834_Fig07-23.jpg](images/9781484200834_Fig07-23.jpg)


    [Figure 7-23](#9781484200834_Ch07.xhtml#_Fig23). Mapping package parameters


    Execute `TestParent.dtsx` to test the functionality. The package executes successfully
    and the footer row is appended to the file as shown in [Figure 7-24](#9781484200834_Ch07.xhtml#Fig24).


    ![9781484200834_Fig07-24.jpg](images/9781484200834_Fig07-24.jpg)


    [Figure 7-24](#9781484200834_Ch07.xhtml#_Fig24). Mission accomplished


    Producing a Header Row


    Producing a header row is a very simple operation in SSIS 2014, provided you know
    the number of rows to be loaded in advance. You simply load the destination flat
    file with the header row in one Data Flow task, and then load the data rows to
    the same flat file in a subsequent Data Flow task. As we say in Farmville, Virginia:
    “dog simple.” There are some subtle complexities in this design, though.


    We’ll start with a simple file named `MyFileHeaderExtract.csv` that contains the
    following data:


    ```

    ID,Name,Value

    11,Andy,12

    22,Christy,13

    33,Stevie Ray,14

    44,Emma Grace,15

    55,Riley Cooper,16

    ```


    Add a new SSIS package named `WriteFileHeader.dtsx` to your SSIS project. Add
    the package parameters shown in [Figure 7-25](#9781484200834_Ch07.xhtml#Fig25).


    ![9781484200834_Fig07-25.jpg](images/9781484200834_Fig07-25.jpg)


    [Figure 7-25](#9781484200834_Ch07.xhtml#_Fig25). WriteFileHeader.dtsx parameters


    Add two Data Flow tasks to the control flow. Name the first **dft Write Header
    Row** and the second **dft Write Data Rows**. Open the editor for dft Write Header
    Row and add a Script component named **scrc Build Header Row** to the Data Flow
    task. When prompted, configure the Script component to act as a source. Open the
    editor and set the `ScriptLanguage` property to `Microsoft Visual Basic 2012`.
    Set the `ReadOnlyVariables` property to reference the following:


    *   `$Package::AmountSum`

    *   `$Package::Delimiter`

    *   `$Package::LastUpdateDateTime`

    *   `$Package::RecordCount`


    On the Inputs and Outputs page, ensure the `SynchronousInputID` property of Output
    0 is set to `None` and add an output column named `HeaderRow` (String data type,
    500 length) to Output 0\. Click the Script page and the Edit Script button. Replace
    the code in the `CreateNewOutputRows()` subroutine with that from [Listing 7-10](#9781484200834_Ch07.xhtml#list10).


    [***Listing 7-10***](#9781484200834_Ch07.xhtml#_list10). Code for the CreateNewOutputRows
    Subroutine


    ```

    Public Overrides Sub CreateNewOutputRows()


    '' create header row...        '' Get variable values...

            Dim iRecordCount As Integer = Me.Variables.RecordCount

            Dim sDelimiter As String = Me.Variables.Delimiter

            Dim dAmountSum As Decimal = Convert.ToDecimal(Me.Variables.AmountSum)

            Dim dtLastUpdateDateTime As DateTime = _

    Convert.ToDateTime(Me.Variables.LastUpdateDateTime)


    Dim sHeaderRow As String = iRecordCount.ToString & sDelimiter & _

                                       dAmountSum.ToString & sDelimiter & _

    dtLastUpdateDateTime.ToString


    With Output0Buffer

                .AddRow()

                .HeaderRow = sHeaderRow

            End With

        End Sub

    ```


    Add a Flat File destination adapter and connect a data flow path from the Script
    component to it. Open the Flat File Destination Editor and click the New button
    beside the Flat File Connection Manager drop-down. When the Flat File Format window
    displays, select Delimited and click the OK button. Name the Flat File connection
    manager **Flat File Header Output** and supply (or select) a file path. On the
    Columns page, configure a landing column for the `HeaderRow` column from the scrc
    Build Header Row Script component. Click the OK button to return to the Flat File
    Destination Editor. Make sure the Overwrite Data in the File checkbox (in the
    Connection Manager page) is checked. It should be; this is the default. Click
    on the Mappings page and complete the destination configuration. This Data Flow
    task will construct and load the header row.'
  trans: "\n注释 4 指导我们构建实际的页脚行，并将其文本存储在字符串变量 `sFooterRow` 中。请注意，分隔符也是动态的。字符串变量 `sDelimiter`\
    \ 包含了传递给 `WriteFileFooter` 包中名为 `$Package::Delimiter` 的参数的值。在注释 5 处，我们记录了页脚行的内容。\n\
    \n在注释 6 处，我们启动一项检查，以确保提取文件未被操作系统标记为“正在使用”。检测文件在文件系统中的状态有多种方法，因此我创建了一个名为 `FileInUse`\
    \ 的布尔函数来封装此测试。如果我创建的函数对您不起作用，您可以构建自己的函数。如果文件正在使用中，代码将启动一个 `While` 循环，使线程休眠一秒钟。每次循环迭代都会导致变量\
    \ `s`（本例中的增量器）在注释 6b 处递增。如果 `s` 超过十，则退出循环。我们只会等待 10 秒，以便文件变为可用。请注意，如果此时文件仍在使用中，我们*仍然*会继续执行后续操作。我们稍后会处理文件占用的问题，但我们不会为了等待文件可用而让自己陷入可能无尽的循环中。相反，我们将报错失败。无论文件是否正在使用，脚本都会在注释\
    \ 7 处记录其状态。\n\n在注释 8 处，我们检查文件是否存在，并开始一个 `Try-Catch` 块。如果文件不存在，我选择记录一条状态消息（通过 `Dts.Events.FireInformation`）并继续执行（参见注释\
    \ 8g）。`Try-Catch` 块用于执行对文件可用性的最终测试。如果文件在此处仍处于使用状态，则会触发 `Catch` 块，并在注释 8f 处记录状态消息。在\
    \ 8f 和/或 8g 处，您很可能决定使用 `Dts.Events.FireError` 方法引发错误。引发错误会导致脚本任务失败，而您可能正希望如此。在注释\
    \ 8a 至 8d 处，我们打开文件，追加页脚行，关闭文件并进行清理。在注释 8e 处，代码记录一条状态消息。如果在执行 8a 至 8e 时有任何操作失败，代码执行将跳转到\
    \ `Catch` 块。\n\n如果一切顺利，代码将通过 `Dts.TaskResult` 函数（注释 9）向 SSIS 控制流返回 `Success`（成功）。\n\
    \n在这个模式中，所有的实际工作都由脚本任务完成。关闭脚本任务编辑器。点击“确定”。然后保存该包。\n\n我创建了一个名为 `TestParent.dtsx`\
    \ 的测试包来测试此包。该包包含与 `WriteFileFooter.dtsx` 包的参数相对应的变量，如图 7-22 所示。\n\n![9781484200834_Fig07-22.jpg](img/9781484200834_Fig07-22.jpg)\n\
    \n图 7-22. TestParent.dtsx 包中的变量\n\n如果您想亲自实践，应该调整 `ExtractFooterFilePath` 变量的路径。\n\
    \n我添加了一个名为 `seq Test WriteFileFooter` 的 `Sequence` 容器，并包含了一个名为 `ept Execute WriteFileFooter\
    \ Package` 的 `Execute Package`（执行包）任务。在执行包任务编辑器的“包”页面上，将 `ReferenceType` 属性设置为\
    \ `Project Reference`（项目引用），并从 `PackageNameFromProjectReference` 属性的下拉列表中选择 `WriteFileFooter.dtsx`。将\
    \ `TestParent` 包的变量映射到 `WriteFileFooter` 包的参数，如图 7-23 所示。\n\n![9781484200834_Fig07-23.jpg](img/9781484200834_Fig07-23.jpg)\n\
    \n图 7-23. 映射包参数\n\n执行 `TestParent.dtsx` 以测试其功能。包成功执行，页脚行如图 7-24 所示被追加到文件中。\n\n\
    ![9781484200834_Fig07-24.jpg](img/9781484200834_Fig07-24.jpg)\n\n图 7-24. 任务完成\n\
    \n### 生成页眉行\n\n生成页眉行在 SSIS 2014 中是一个非常简单的操作，前提是您预先知道要加载的行数。您只需在一个 `Data Flow`（数据流）任务中将页眉行加载到目标平面文件中，然后在后续的\
    \ `Data Flow` 任务中将数据行加载到同一个平面文件中。正如我们在弗吉尼亚州法姆维尔常说的：“简单至极”。不过，这种设计也存在一些微妙的复杂性。\n\
    \n我们将从一个名为 `MyFileHeaderExtract.csv` 的简单文件开始，该文件包含以下数据：\n```\nID,Name,Value\n\
    11,Andy,12\n22,Christy,13\n33,Stevie Ray,14\n44,Emma Grace,15\n55,Riley Cooper,16\n\
    ```\n\n在您的 SSIS 项目中添加一个新的名为 `WriteFileHeader.dtsx` 的 SSIS 包。添加如图 7-25 所示的包参数。\n\
    \n![9781484200834_Fig07-25.jpg](img/9781484200834_Fig07-25.jpg)\n\n图 7-25. WriteFileHeader.dtsx\
    \ 参数\n\n向控制流中添加两个 `Data Flow` 任务。将第一个命名为 `dft Write Header Row`，第二个命名为 `dft Write\
    \ Data Rows`。打开 `dft Write Header Row` 的编辑器，并向 `Data Flow` 任务中添加一个名为 `scrc Build\
    \ Header Row` 的 `Script` 组件。在提示时，将 `Script` 组件配置为源。打开编辑器并将 `ScriptLanguage` 属性设置为\
    \ `Microsoft Visual Basic 2012`。将 `ReadOnlyVariables` 属性设置为引用以下变量：\n\n*   `$Package::AmountSum`\n\
    *   `$Package::Delimiter`\n*   `$Package::LastUpdateDateTime`\n*   `$Package::RecordCount`\n\
    \n在“输入和输出”页面上，确保 Output 0 的 `SynchronousInputID` 属性设置为 `None`，并向 Output 0 添加一个名为\
    \ `HeaderRow` 的输出列（字符串数据类型，长度 500）。点击“脚本”页面和“编辑脚本”按钮。用列表 7-10 中的代码替换 `CreateNewOutputRows()`\
    \ 子例程中的代码。\n\n***列表 7-10***. CreateNewOutputRows 子例程的代码\n```\nPublic Overrides\
    \ Sub CreateNewOutputRows()\n\n    ' 创建页眉行...\n    ' 获取变量值...\n    Dim iRecordCount\
    \ As Integer = Me.Variables.RecordCount\n    Dim sDelimiter As String = Me.Variables.Delimiter\n\
    \    Dim dAmountSum As Decimal = Convert.ToDecimal(Me.Variables.AmountSum)\n \
    \   Dim dtLastUpdateDateTime As DateTime = _\n        Convert.ToDateTime(Me.Variables.LastUpdateDateTime)\n\
    \n    Dim sHeaderRow As String = iRecordCount.ToString & sDelimiter & _\n    \
    \                            dAmountSum.ToString & sDelimiter & _\n          \
    \                      dtLastUpdateDateTime.ToString\n\n    With Output0Buffer\n\
    \        .AddRow()\n        .HeaderRow = sHeaderRow\n    End With\nEnd Sub\n```\n\
    \n添加一个 `Flat File`（平面文件）目标适配器，并将数据流路径从 `Script` 组件连接到它。打开“平面文件目标编辑器”，点击“平面文件连接管理器”下拉列表旁边的“新建”按钮。当“平面文件格式”窗口显示时，选择\
    \ `Delimited`（带分隔符），然后点击“确定”按钮。将平面文件连接管理器命名为 `Flat File Header Output`，并提供（或选择）一个文件路径。在“列”页面上，为来自\
    \ `scrc Build Header Row` 脚本组件的 `HeaderRow` 列配置一个落地区列。点击“确定”按钮返回“平面文件目标编辑器”。确保选中“覆盖文件中的数据”复选框（在“连接管理器”页面中）。它应该是默认选中的。点击“映射”页面并完成目标配置。这个\
    \ `Data Flow` 任务将构建并加载页眉行。\n"
- fmt: '# 控制流与数据流配置


    在控制流中，从 `dft Write Header Row` 到 `dft Write Data Rows Data Flow` 任务添加一个“Success
    Precedence”约束。打开 `dft Write Data Rows` 的编辑器，添加一个 Flat File 源适配器。打开 Flat File Source
    Editor，点击 `New` 按钮创建一个新的 Flat File 连接管理器。系统提示时，选择 `Delimited`。将其命名为 `Extract File
    Input`，并导航到您之前创建的 `MyFileHeaderExtract.csv` 文件。在 `Columns` 页面，删除 `Column Delimiter`
    下拉列表中的值。点击 `Refresh` 按钮以刷新视图。在 `Advanced` 页面，将列名从 `ID,Name,Value` 重命名为 `Row`，并将
    `OutputColumnWidth` 属性设置为 `500`。点击 `OK` 按钮关闭 Flat File Connection Manager Editor
    和 Flat File Source Editor。


    添加一个 Flat File 目标适配器，并从 Flat File 源适配器到 Flat File 目标适配器连接一条数据流路径。打开 Flat File
    目标适配器，将其连接管理器设置为 flat file header output。请务必在 `Connection Manager` 页面取消选中 `Overwrite
    the Data in the File` 复选框。在 `Mappings` 页面，将 `Available Input Columns` 中的 `Row`
    列映射到 `Available Destination Columns` 中的 `HeaderRow`。关闭 Flat File Destination Editor。


    让我们将这些连接管理器变为动态的！点击 `Extract File Input` Flat File 连接管理器，然后按 `F4` 键显示属性。点击 `Expressions`
    属性，然后点击 `Value` 文本框中的省略号（`...`）。点击第一行 `Property` 列的下拉箭头，选择 `ConnectionString`。在对应的
    `Expression` 值文本框中，点击省略号（`...`）打开 Expression Builder。在 Expression Builder 中展开
    `Variables and Parameters` 虚拟文件夹，并将 `$Package::ExtractFilePath` 拖到 `Expression`
    文本框中。点击 `OK` 按钮关闭 Expression Builder。此时将出现 Property Expressions Editor 窗口，如 [Figure
    7-26](#9781484200834_Ch07.xhtml#Fig26) 所示。


    ![9781484200834_Fig07-26.jpg](images/9781484200834_Fig07-26.jpg)


    [Figure 7-26](#9781484200834_Ch07.xhtml#_Fig26). 动态 ConnectionString 属性


    关闭 Property Expressions Editor。您现在已经将 `ConnectionString` 属性的值分配给了从另一个包调用此包时传递的
    `ExtractFilePath` 包参数。重复此过程，将 `$Package::OutputFilePath` 包参数的值动态分配给 Flat File
    Header Output Flat File 连接管理器的 `ConnectionString` 属性。


    要测试此包，请返回到 `TestParent.dtsx`。让我们添加几个变量，用于与刚刚映射到连接管理器表达式的参数：`ExtractHeaderFilePath`
    和 `OutputPath`。为 `OutputPath` 变量提供一个值，该值代表您要创建的文件的位置。（注意：此文件可能不存在！）同时，为 `ExatrctHeaderFilePath`
    变量提供 `MyFileHeaderExtract.csv` 的路径作为默认值。在控制流中，添加一个 Sequence 容器并将其重命名为 `seq Test
    WriteHeader`。向 Sequence 容器添加一个 Execute Package 任务，并将其重命名为 `ept Execute WriteFileHeader
    Package`。打开 Execute Package Task Editor，并配置一个项目引用以执行 `WriteFileHeader.dtsx` 包。按照
    [Figure 7-27](#9781484200834_Ch07.xhtml#Fig27) 所示配置 Parameter Bindings 页面。


    ![9781484200834_Fig07-27.jpg](images/9781484200834_Fig07-27.jpg)


    [Figure 7-27](#9781484200834_Ch07.xhtml#_Fig27). Execute Package 任务中的参数映射


    关闭 Execute Package Task Editor 并禁用 `seq Test WriteFileFooter` Sequence 容器。执行该包并观察结果。您应该得到如
    [Figure 7-28](#9781484200834_Ch07.xhtml#Fig28) 所示的结果。


    ![9781484200834_Fig07-28.jpg](images/9781484200834_Fig07-28.jpg)


    [Figure 7-28](#9781484200834_Ch07.xhtml#_Fig28). 成功！


    我喜欢这个模式，因为它利用了 SSIS 组件，而无需过多依赖脚本。不过，我并不喜欢这个模式的全部。我需要在调用此包之前知道行数，这并不难获取——我只需向数据流添加一个
    Row Count 转换，并在行加载到提取文件时计数。但之后我必须在事后重新加载提取文件。对于大文件和可伸缩性，我会尝试在加载文件之前确定行数，然后将此包中演示的功能集成到加载器包中。对于不会扩展的小数据加载，此包是可以接受的。


    # 归档文件模式


    Archive File 模式很大程度上促成了您现在正在阅读的这本书。为什么？因为它是我构建的第一个被广泛采用的设计模式包。在多个位置重复使用此模式后，我确信
    SSIS 适合基于设计模式的架构。在此认识后不久，我在华盛顿州贝尔维尤与同样使用 SSIS 并写书的朋友共进晚餐时讨论了这个想法。我们一致认为，设计模式为许多数据集成问题提供了有趣的解决方案。


    `ArchiveFile` 包旨在将平面数据文件从一个目录复制到另一个目录，并在原始文件名后附加一个日期时间戳。源文件的完整路径由 `SourceFilePath`
    参数提供，日期时间戳的格式由 `DateStampFormat` 参数提供。目标目录（或归档目录）由 `ArchiveDirectory` 参数提供。如果目标文件已存在，您可以通过
    `OverwriteDestination` 参数控制是否覆盖目标文件。该包通常会删除原始文件，但 `CopyOnly` 参数控制此功能。如果找不到 `SourceFilePath`，您可以引发错误或仅记录此情况。`ExceptionOnFileNotFound`
    参数控制在找不到源文件时包是否引发错误。最后，`Debug` 参数控制包是否以调试模式执行（我在 [Chapter 2](#9781484200834_Ch02.xhtml)
    中对此有更详细的介绍）。配置后，`ArchiveFile` 包参数将如 [Figure 7-29](#9781484200834_Ch07.xhtml#Fig29)
    所示。


    ![9781484200834_Fig07-29.jpg](images/9781484200834_Fig07-29.jpg)


    [Figure 7-29](#9781484200834_Ch07.xhtml#_Fig29). ArchiveFile 包参数


    请务必为 `ArchiveDirectory` 参数提供一个现有文件夹的默认值，并为 `SourceFilePath` 参数提供一个有效文件的路径作为默认值。对于所有其他参数默认值，请使用我在
    [Figure 7-29](#9781484200834_Ch07.xhtml#Fig29) 中提供的值。


    设计此包有几种方法。您可以严重依赖脚本，或者利用 File System 任务。您应该选择哪一个？在咨询时，我会通过提问来确定负责维护包的人员的舒适程度。一些数据集成开发人员熟悉
    .NET 编码；其他人则不熟悉。由于 SSIS 给了我选择，我构建包的方式使其易于由负责维护的团队维护。


    在此包中，我选择脚本和 File System 任务的混合方式，倾向于减少脚本的使用。让我们向包添加以下变量：


    *   `User::FormattedFileName [String]`

    *   `User::OkToProceed [Boolean]`

    *   `User::SourceFileDirectory [String]`

    *   `User::WorkingCopyFileName [String]`


    向控制流添加一个 Script 任务，并将其命名为 `scr Apply Format`。打开编辑器，并将 `ScriptLanguage` 属性更改为 `Microsoft
    Visual Basic 2012`。将以下变量和参数添加到 `ReadOnlyVariables` 属性：


    *   `System::TaskName`

    *   `System::PackageName`

    *   `$Package::CopyOnly`

    *   `$Package::DateStampFormat`

    *   `$Package::Debug`

    *   `$Package::ExceptionOnFileNotFound`

    *   `$Package::SourceFilePath`


    在表达式 `cvar = avar + bvar` 中，加法运算符（`+`）将 `avar` 与 `bvar` 相加，得到它们的和 `cvar`。


    ```

    if (condVar > someVal) {console.log("xxx")}

    ```'
  raw: 'On the control flow, add a Success Precedence constraint from dft Write Header
    Row to the dft Write Data Rows Data Flow task. Open the editor for dft Write Data
    Rows and add a Flat File source adapter. Open the Flat File Source Editor and
    click the New button to create a new Flat File connection manager. When prompted,
    select Delimited. Name it **Extract File Input** and navigate to the `MyFileHeaderExtract.csv`
    file you created earlier. On the Columns page, delete the value in the Column
    Delimiter drop-down. To refresh the view, click the Refresh button. On the Advanced
    page, rename the column from `ID,Name,Value` to `Row` and set the `OutputColumnWidth`
    property to `500`. Click the OK buttons to close the Flat File Connection Manager
    Editor and the Flat File Source Editor.


    Add a Flat File destination adapter and connect a data flow path from the Flat
    File source adapter to the Flat File destination adapter. Open the Flat File destination
    adapter and set its connection manager to the flat file header output. Be sure
    to uncheck the Overwrite the Data in the File checkbox on the Connection Manager
    page. On the Mappings page, map the `Row` column from the Available Input Columns
    to the `HeaderRow` in the Available Destination Columns. Close the Flat File Destination
    Editor.


    Let’s make these connection managers dynamic! Click the Extract File Input Flat
    File Connection Manager, and then press the F4 key to display properties. Click
    the `Expressions` property and click the ellipsis in the Value textbox. Click
    the drop-down in the `Property` column of the first row and click `ConnectionString`.
    In the corresponding Expression value textbox, click the ellipsis to display the
    Expression Builder. Expand the Variables and Parameters virtual folder in Expression
    Builder and drag `$Package::ExtractFilePath` into the Expression textbox. Click
    the OK button to close the Expression Builder. The Property Expressions Editor
    window will appear, as shown in [Figure 7-26](#9781484200834_Ch07.xhtml#Fig26).


    ![9781484200834_Fig07-26.jpg](images/9781484200834_Fig07-26.jpg)


    [Figure 7-26](#9781484200834_Ch07.xhtml#_Fig26). Dynamic ConnectionString property


    Close the Property Expressions Editor. You have now assigned the `ConnectionString`
    property to the value passed to the `ExtractFilePath` package parameter passed
    to this package when it is called from another package. Repeat this process to
    dynamically assign the value of the `$Package::OutputFilePath` package parameter
    to the `ConnectionString` property of the Flat File Header Output Flat File Connection
    Manager.


    To test this package, return to `TestParent.dtsx`. Let’s add a couple of variables
    to use with the parameters we just mapped to connection manager expressions: `ExtractHeaderFilePath`
    and `OutputPath`. Supply a value for the `OutputPath` variable that represents
    the location of the file you want to create. (Note: this file may not exist!)
    Also, supply the path to the `MyFileHeaderExtract.csv` as the default value for
    the `ExatrctHeaderFilePath` variable. On the control flow, add a Sequence container
    and rename it **seq Test WriteHeader**. Add an Execute Package task to the Sequence
    container and rename it **ept Execute WriteFileHeader Package**. Open the Execute
    Package Task Editor and configure a project reference to execute the `WriteFileHeader.dtsx`
    package. Configure the Parameter Bindings page as shown in [Figure 7-27](#9781484200834_Ch07.xhtml#Fig27).


    ![9781484200834_Fig07-27.jpg](images/9781484200834_Fig07-27.jpg)


    [Figure 7-27](#9781484200834_Ch07.xhtml#_Fig27). Parameter mapping in the Execute
    Package task


    Close the Execute Package Task Editor and disable the seq Test WriteFileFooter
    Sequence container. Execute the package and observe the results. You should get
    results like those shown in [Figure 7-28](#9781484200834_Ch07.xhtml#Fig28).


    ![9781484200834_Fig07-28.jpg](images/9781484200834_Fig07-28.jpg)


    [Figure 7-28](#9781484200834_Ch07.xhtml#_Fig28). Success!


    I like this pattern because it utilizes SSIS components without resorting to too
    much scripting. I don’t like everything about this pattern, though. I need to
    know the number of rows before calling this package, which isn’t hard to acquire—I
    can simply add a Row Count transformation to a data flow and count the rows as
    they are loaded into the extract file. But then I must *reload* the extract file,
    after the fact. For large files and scalability, I would attempt to ascertain
    the number of rows before loading the file and then integrate the functionality
    demonstrated in this package into the loader package. For smaller loads of data
    that will not scale, this package is acceptable.


    The Archive File Pattern


    The Archive File pattern is largely responsible for the book you are now reading.
    How? It was the first widely adopted design pattern package that I built. After
    re-using this pattern in several locations, I became convinced SSIS lent itself
    to design pattern-based architectures. Shortly after this realization, I discussed
    the idea over dinner in Bellevue, Washington with friends who work with SSIS and
    who also write books. We agreed design patterns offer interesting solutions to
    many data integration problems.


    The `ArchiveFile` package is designed to copy a flat data file from one directory
    to another, appending a datetime stamp to the original file name. The full path
    of the original file is supplied in the `SourceFilePath` parameter, the format
    of the datetime stamp in the `DateStampFormat` parameter. The destination, or
    Archive, directory is supplied to the `ArchiveDirectory` parameter. Should the
    target file already exist, you can control overwrites of the destination file
    via the `OverwriteDestination` parameter. The package usually deletes the original
    file, but the `CopyOnly` parameter controls this function. If the `SourceFilePath`
    is not found, you can raise an error or simply log this condition. The `ExceptionOnFileNotFound`
    parameter controls whether the package raises an error if the source file is not
    found. Finally, the `Debug` parameter controls whether the package is being executed
    in Debug mode (something I cover in more detail in [Chapter 2](#9781484200834_Ch02.xhtml)).
    The `ArchiveFile` package parameters, when configured, will appear as in [Figure
    7-29](#9781484200834_Ch07.xhtml#Fig29).


    ![9781484200834_Fig07-29.jpg](images/9781484200834_Fig07-29.jpg)


    [Figure 7-29](#9781484200834_Ch07.xhtml#_Fig29). ArchiveFile package parameters


    Be sure you include default values for an existing folder for the `ArchiveDirectory`
    parameter and a path to a valid file for the `SourceFilePath` parameter. For all
    other parameter default values, use what I have supplied in [Figure 7-29](#9781484200834_Ch07.xhtml#Fig29).


    There are a couple ways to design this package. You can rely heavily on scripting
    or utilize the File System task. Which should you choose? When consulting, I ask
    questions to determine the comfort-level of those charged with maintaining the
    packages. Some data integration developers are comfortable with .NET coding; others
    are not. Since SSIS gives me a choice, I build packages so they are easily maintained
    by the team charged with maintenance.


    In this package, I am choosing a hybrid of scripting and the File System task,
    leaning away from scripting. Let’s add the following variables to the package:


    *   `User::FormattedFileName [String]`

    *   `User::OkToProceed [Boolean]`

    *   `User::SourceFileDirectory [String]`

    *   `User::WorkingCopyFileName [String]`


    Add a Script task to the control flow and name it **scr Apply Format**. Open the
    editor and change the `ScriptLanguage` property to Microsoft Visual Basic 2012\.
    Add the following variables and parameters to the `ReadOnlyVariables` property:


    *   `System::TaskName`

    *   `System::PackageName`

    *   `$Package::CopyOnly`

    *   `$Package::DateStampFormat`

    *   `$Package::Debug`

    *   `$Package::ExceptionOnFileNotFound`

    *   `$Package::SourceFilePath`'
