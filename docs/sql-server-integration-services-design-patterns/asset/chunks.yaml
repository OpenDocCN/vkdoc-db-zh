    that rely on file system based deployment.    ![Image](images/sq.jpg) **Note**  SSIS
    package deployment was not changed between SQL Server 2012 and SQL Server 2014.    Project
    Deployment Model    The new Project Model is the default target when creating
    SSIS projects in SQL Server 2014\. With this model, packages and other project
    items such as Shared Connection Managers are bundled into a single file with an
