- fmt: "# 配置SSIS报告中的超链接与装饰\n\n## 修改Application Instance报告的状态字段\n\n首先，在Application\
    \ Instance报告中修改`Status`字段。\n\n在`Set Expression for: Color`文本框中输入以下表达式，将状态文本颜色改为蓝色：\n\
    ```\n=Iif(Fields!Status.Value=\"Failed\", \"Blue\", \"Black\")\n```\n\n如果状态是`\"\
    Failed\"`，此表达式会将状态文本颜色更改为蓝色。\n\n点击效果属性下拉列表旁的f(x)按钮。在`Set Expression for: TextDecoration`文本框中，添加以下表达式：\n\
    ```\n=Iif(Fields!Status.Value=\"Failed\", \"Underline\", \"Default\")\n```\n\n\
    此表达式将为`\"Failed\"`状态添加下划线。它与前一个属性结合，使`\"Failed\"`状态显示为超链接。\n\n## 配置超链接目标\n\n现在配置该超链接的导航属性。转到“操作”页面，在“启用为操作”属性中选择“转到报表”选项。\n\
    \n点击“指定报表”下拉列表旁的f(x)按钮，并在`Set Expression for: ReportName`文本框中添加以下表达式：\n```\n=Iif(Fields!Status.Value=\"\
    Failed\", \"Errors\", Nothing)\n```\n\n点击“添加”按钮，将`AppInstanceID`参数名称映射到`[AppInstanceID]`参数值。\n\
    \n点击参数映射中`Omit`列的f(x)按钮，并在`Set Expression for: Omit`文本框中添加以下表达式：\n```\n=Iif(Fields!Status.Value=\"\
    Failed\", False, True)\n```\n\n以上两个属性设置配置了`Status`值的“操作”属性。如果状态是`\"Failed\"`，点击将显示为超链接的单词*Failed*，将导致显示“错误”报表。显示时，它将仅显示与该数据行中应用程序实例相关联的错误行。\n\
    \n## 测试Application Instance报告\n\n测试一下！当我运行“应用程序实例”报表时，它现在显示如[图A-28](#9781484200834_AppA.xhtml#Fig28)所示。\n\
    ![9781484200834_FigAppA-28.jpg](images/9781484200834_FigAppA-28.jpg)\n[图A-28](#9781484200834_AppA.xhtml#_Fig28)。包含状态和包装饰的“应用程序实例”报表。\n\
    \n点击一个“失败”超链接会将我们带到该应用程序实例的“错误”报表。报表应类似于[图A-29](#9781484200834_AppA.xhtml#Fig29)所示。\n\
    ![9781484200834_FigAppA-29.jpg](images/9781484200834_FigAppA-29.jpg)\n[图A-29](#9781484200834_AppA.xhtml#_Fig29)。显示一个错误。\n\
    \n在SSIS包中快速定位错误来源是提高整体运营效率的一种方法。这些报表协同工作，有助于进行高效的根源分析。\n\n## 创建Events报表\n\n“事件”报表与“错误”报表非常相似。创建`rpt.ReturnEvents`存储过程的T-SQL脚本如[清单A-25](#9781484200834_AppA.xhtml#list25)所示。\n\
    [**清单A-25**](#9781484200834_AppA.xhtml#_list25)。构建`rpt.ReturnEvents`存储过程。\n\n\
    ```\n/* rpt.ReturnEvents stored procedure */\nIf Exists(Select s.name + '.' +\
    \ p.name\n          From sys.procedures p\n          Join sys.schemas s\n    \
    \        On s.schema_id = p.schema_id\n          Where s.name = 'rpt'\n      \
    \      And p.name = 'ReturnEvents')\n begin\n  print 'Dropping rpt.ReturnEvents\
    \ stored procedure'\n  Drop Procedure rpt.ReturnEvents\n  print 'Rpt.ReturnEvents\
    \ stored procedure dropped'\n end\nprint 'Creating rpt.ReturnEvents stored procedure'\n\
    go\n\nCreate Procedure rpt.ReturnEvents\n  @AppInstanceID int\n ,@PkgInstanceID\
    \ int = NULL\nAs\n  Select\n    a.ApplicationName\n   ,p.PackageName\n   ,ev.SourceName\n\
    \   ,ev.EventDateTime\n   ,ev.EventDescription\n  From log.SSISEvents ev\n  Join\
    \ log.SSISAppInstance ai\n    On ai.AppInstanceID = ev.AppInstanceID\n  Join cfg.Applications\
    \ a\n    On a.ApplicationID = ai.ApplicationID\n  Join log.SSISPkgInstance cp\n\
    \    On cp.PkgInstanceID = ev.PkgInstanceID\n        And cp.AppInstanceID = ev.AppInstanceID\n\
    \  Join cfg.AppPackages ap\n    On ap.AppPackageID = cp.AppPackageID\n  Join cfg.Packages\
    \ p\n    On p.PackageID = ap.PackageID\n  Where ev.AppInstanceID = Coalesce(@AppInstanceID,\
    \ ev.AppInstanceID)\n    And ev.PkgInstanceID = Coalesce(@PkgInstanceID, ev.PkgInstanceID)\n\
    \  Order By EventDateTime Desc\ngo\nprint 'Rpt.ReturnEvents stored procedure created.'\n\
    print ''\n```\n\n添加一个名为**Events**的新报表，使用`rpt.ReturnEvents`存储过程，并记得配置数据集和报表参数。添加我在“错误”报表中演示的交替行底纹。相同的表达式在“事件”报表中也适用：\n\
    ```\n=Iif(RowNumber(Nothing) Mod 2 = 0,\"White\",\"WhiteSmoke\")\n```\n\n## 为Events配置超链接\n\
    \n返回到“应用程序实例”报表，并向数据表中添加另一列。将其标记为**Events**，并将数据网格值也设置为`Events`。打开`Events`数据字段的“文本框属性”窗口，并导航到“字体”页面。将“颜色”属性更改为蓝色，将“效果”属性更改为下划线。\n\
    \n在“操作”页面，将“启用为操作”属性更改为“转到报表”，并将“指定报表”下拉列表更改为`Events`。添加一个参数映射，将`AppInstanceID`参数名称映射到`[AppinstanceID]`参数值。点击“确定”按钮关闭“文本框属性编辑器”。\n\
    \n测试一下！“应用程序实例”报表现在显示如[图A-30](#9781484200834_AppA.xhtml#Fig30)所示。\n![9781484200834_FigAppA-30.jpg](images/9781484200834_FigAppA-30.jpg)\n\
    [图A-30](#9781484200834_AppA.xhtml#_Fig30)。新增和改进的“应用程序实例”报表。\n\n点击“事件”超链接将带我们到“事件”报表，该报表应类似于[图A-31](#9781484200834_AppA.xhtml#Fig31)所示的报表。\n\
    ![9781484200834_FigAppA-31.jpg](images/9781484200834_FigAppA-31.jpg)\n[图A-31](#9781484200834_AppA.xhtml#_Fig31)。应用程序实例的“事件”报表。\n\
    \n这一轮的最新报表和对“应用程序实例”报表的更新强化了其作为运营智能仪表板的地位。类似的更改也可以应用于“包实例”报表。\n\n## 在Package Instance报告中应用相同配置\n\
    \n现在为“包实例”报表添加“失败”链接功能和“事件”列。\n\n在“包实例”报表中，打开`Status`数据字段的“文本框属性编辑器”。像在“应用程序实例”报表中处理`Status`数据字段一样，导航到“字体”页面并点击颜色属性下拉列表旁的f(x)按钮。在`Set\
    \ Expression for: Color`文本框中，输入以下表达式：\n```\n=Iif(Fields!Status.Value=\"Failed\"\
    , \"Blue\", \"Black\")\n```\n\n此表达式将在状态为`\"Failed\"`时将状态文本颜色更改为蓝色。\n\n点击效果属性下拉列表旁的f(x)按钮。在`Set\
    \ Expression for: TextDecoration`文本框中，添加以下表达式：\n=Iif(Fields!Status.Value=“Failed”,\
    \ “Underline”, “Default”)\n\n与“应用程序实例”报表一样，此表达式将为`Failed`状态添加下划线。它与前一个属性结合，使`Failed`状态显示为超链接。\n\
    \n## 配置Package Instance的超链接目标\n\n现在配置该属性。转到“操作”页面，在“启用为操作”属性中选择“转到报表”选项。\n\n点击“指定报表”下拉列表旁的f(x)按钮，并在`Set\
    \ Expression for: ReportName`文本框中添加以下表达式：\n```\n=Iif(Fields!Status.Value=\"Failed\"\
    , \"Errors\", Nothing)\n```\n\n点击“添加”按钮，将`AppInstanceID`参数名称映射到`[AppInstanceID]`参数值。再次点击“添加”按钮，将`PkgInstanceID`参数名称映射到`[PkgInstanceID]`参数值。\n\
    \n点击每个参数映射中`Omit`列的f(x)按钮，并在每个`Set Expression for: Omit`文本框中添加以下表达式：\n```\n=Iif(Fields!Status.Value=\"\
    Failed\", False, True)\n```\n\n与“应用程序实例”报表一样，以上两个属性设置配置了`Status`值的“操作”属性。如果状态是`\"\
    Failed\"`，点击将显示为超链接的单词Failed，将导致显示“错误”报表。显示时，它将仅显示与该数据行中应用程序实例相关联的错误行。\n\n测试一下！"
  raw: 'Value="Failed", "Blue", "Black") ```    If the status is "`Failed`", then
    this expression will change the color of the Status text to `Blue`. Click the
    f(x) button beside the Effects property drop-down. In the Set Expression for:
    TextDecoration textbox, add the following expression:    ``` =Iif(Fields!Status.Value="Failed",
    "Underline", "Default") ```    This expression will decorate a `"Failed"` status
    with an underline. This and the previous property combine to make `"Failed"` status
    appear as a hyperlink. Where does the hyperlink take us? Let’s configure that
    property now. Navigate to the Action page and select the Go to Report option for
    the Enable as an Action property. Click the f(x) button beside the Specify a Report
    drop-down and add the following expression to the Set Expression for: ReportName
    textbox:    ``` =Iif(Fields!Status.Value="Failed", "Errors", Nothing) ```    Click
    the Add button and map the `AppInstanceID` parameter name to the `[AppInstanceID]`
    parameter value. Click the f(x) button in the `Omit` column of the parameter mapping
    and add the following expression to the Set Expression for: Omit textbox:    ```
    =Iif(Fields!Status.Value="Failed", False, True) ```    The two previous property
    settings configure the Action property of the Status value. If the Status is `"Failed"`,
    clicking the word *Failed*, which will appear to be a hyperlink, will cause the
    Errors report to display. When it displays, it will only show those error rows
    associated with the application instance displayed in that row of data.    Let’s
    test it! When I run the Application Instance report, it now appears as shown in
    [Figure A-28](#9781484200834_AppA.xhtml#Fig28).    ![9781484200834_FigAppA-28.jpg](images/9781484200834_FigAppA-28.jpg)    [Figure
    A-28](#9781484200834_AppA.xhtml#_Fig28). The Application Instance report, including
    Status and Packages decoration    Clicking one of the Failed hyperlinks takes
    us to the Errors report for that application instance. The report should appear
    similar to that shown in [Figure A-29](#9781484200834_AppA.xhtml#Fig29).    ![9781484200834_FigAppA-29.jpg](images/9781484200834_FigAppA-29.jpg)    [Figure
    A-29](#9781484200834_AppA.xhtml#_Fig29). Displaying an error    Quickly isolating
    the source of an error in an SSIS package is one way to improve overall operational
    efficiency. These reports, working in tandem, facilitate efficient root cause
    analysis.    The Events report is very similar to the Errors report. The T-SQL
    script for creating the `rpt.ReturnEvents`" stored procedure is shown in [Listing
    A-25](#9781484200834_AppA.xhtml#list25).    [***Listing A-25***](#9781484200834_AppA.xhtml#_list25).
    Building the rpt.ReturnEvents Stored Procedure    ``` /* rpt.ReturnEvents stored
    procedure */ If Exists(Select s.name + ''.'' + p.name           From sys.procedures
    p           Join sys.schemas s             On s.schema_id = p.schema_id           Where
    s.name = ''rpt''             And p.name = ''ReturnEvents'')  begin   print ''Dropping
    rpt.ReturnEvents stored procedure''   Drop Procedure rpt.ReturnEvents   print
    ''Rpt.ReturnEvents stored procedure dropped''  end print ''Creating rpt.ReturnEvents
    stored procedure'' go  Create Procedure rpt.ReturnEvents   @AppInstanceID int
     ,@PkgInstanceID int = NULL As    Select     a.ApplicationName    ,p.PackageName
       ,ev.SourceName    ,ev.EventDateTime    ,ev.EventDescription   From log.SSISEvents
    ev   Join log.SSISAppInstance ai     On ai.AppInstanceID = ev.AppInstanceID   Join
    cfg.Applications a     On a.ApplicationID = ai.ApplicationID   Join log.SSISPkgInstance
    cp     On cp.PkgInstanceID = ev.PkgInstanceID         And cp.AppInstanceID = ev.AppInstanceID
      Join cfg.AppPackages ap     On ap.AppPackageID = cp.AppPackageID   Join cfg.Packages
    p     On p.PackageID = ap.PackageID   Where ev.AppInstanceID = Coalesce(@AppInstanceID,
    ev.AppInstanceID)     And ev.PkgInstanceID = Coalesce(@PkgInstanceID, ev.PkgInstanceID)
      Order By EventDateTime Desc go print ''Rpt.


    ReturnEvents stored procedure created.'' print '''' ```    Add a new report named
    **Events**, use the `rpt.ReturnEvents` stored procedure, and remember to configure
    the dataset and report parameters. Add the alternating row shading I demonstrated
    in the Errors report. The same expression will work in the Events report:    ```
    =Iif(RowNumber(Nothing) Mod 2 = 0,"White","WhiteSmoke") ```    Return to the Application
    Instance report and add another column to the data table. Label it **Events**
    and set the data grid value to Events as well. Open the Text Box Properties window
    for the Events data field and navigate to the Font page. Change the Color property
    to Blue and the Effects property to Underline. On the Actions page, change the
    Enable as an Action property to “Go to Report and the Specify a Report drop-down
    to Events. Add a parameter mapping and map the `AppInstanceID` parameter `n`ame
    to the `[AppinstanceID]` parameter value. Click the OK button to close the Text
    Box Properties Editor. Let’s test it!    The Application Instance report now appears,
    as shown in [Figure A-30](#9781484200834_AppA.xhtml#Fig30).    ![9781484200834_FigAppA-30.jpg](images/9781484200834_FigAppA-30.jpg)    [Figure
    A-30](#9781484200834_AppA.xhtml#_Fig30). The new and improved Application Instance
    report    Clicking the Events hyperlink takes us to the Events report, which should
    be similar the report shown in [Figure A-31](#9781484200834_AppA.xhtml#Fig31).    ![9781484200834_FigAppA-31.jpg](images/9781484200834_FigAppA-31.jpg)    [Figure
    A-31](#9781484200834_AppA.xhtml#_Fig31). The Events report for an application
    instance    This latest round of reports and updates to the Application Instance
    report reinforce its status as the Operational Intelligence Dashboard. Similar
    changes can be made to the Package Instance report. Let’s add the Failed link
    functionality and the Events column now.    On the Package Instance report, open
    the Text Box Properties Editor for the Status data field. As I did for the Status
    data field in the Application Instance report, navigate to the Font page and click
    the f(x) button beside the Color property drop-down. In the Set Expression for:
    Color textbox, enter the following expression:    ``` =Iif(Fields!Status.Value="Failed",
    "Blue", "Black") ```    This expression will change the color of the status text
    to blue if the status is `"Failed"`. Click the f(x) button beside the Effects
    property drop-down. In the Set Expression for: TextDecoration textbox, add the
    following expression:    =Iif(Fields!Status. Value=“Failed”, “Underline”, “Default”)As
    with the Application Instance report, this expression will decorate a `Failed`
    status with an underline. This and the previous property combine to make the `Failed`
    status appear as a hyperlink. Where does the hyperlink take us? Let’s configure
    that property now. Navigate to the Action page and select the Go to Report option
    for the Enable as an Action property. Click the f(x) button beside the Specify
    a Report” drop-down and add the following expression to the Set Expression for:
    ReportName textbox:    ``` =Iif(Fields!Status.Value="Failed", "Errors", Nothing)
    ```    Click the Add button and map the `AppInstanceID` parameter name to the
    `[AppInstanceID]` parameter value. Click the Add button again and map the `PkgInstanceID`
    parameter name to the `[PkgInstanceID]` parameter value. Click the f(x) button
    in the `Omit` column of each parameter mapping and add the following expression
    to each Set Expression for: Omit textbox:    ``` =Iif(Fields!Status.Value="Failed",
    False, True) ```    As with the Application Instance report, the two previous
    property settings configure the Action property of the `Status` value. If the
    status is `"Failed"`, clicking the word Failed, which will appear to be a hyperlink,
    will cause the Errors report to display. When it displays, it will only show those
    error rows associated with the application instance displayed in that row of data.    Let’s
