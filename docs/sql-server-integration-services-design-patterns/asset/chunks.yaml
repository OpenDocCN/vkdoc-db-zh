    \ 和 `txtCatalogPackage`。将其中一个按钮命名为 `btnOpenSSISPkgInCatalog`，并将其 `Text` 属性设置为\
    \ `...`。将另一个按钮命名为 `btnStartCatalog`，并将其 `Text` 属性设置为 `开始`。\n\n在 `目录中的 SSIS 包`\
