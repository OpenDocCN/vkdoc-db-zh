    execution          DECLARE @exec_id bigint          EXEC [SSISDB].[catalog].[create_execution]
                      @execution_id = @exec_id OUTPUT,                   @package_name
    = @PackageName,                   @folder_name = @FolderName,                   @project_name
    = @ProjectName           -- Set the Directory parameter value          EXEC [SSISDB].[catalog].[set_execution_parameter_value]
                      @execution_id = @exec_id,                   @object_type = 20,
                      @parameter_name = @DirectoryParameter,                   @parameter_value
    = @DirectoryValue           -- Set the File Name parameter value          EXEC
