    \ SSIS 包集合，因此 SSIS 应用程序与 SSIS 包之间的关系是一对多，这是相当明显的。可能不那么明显的是 SSIS 包与 SSIS 应用程序之间的关系。这里体现了选择基于模式开发的一个关键好处：代码可重用性，特别是针对\
    \ SSIS 包代码。考虑第 7 章末尾关于平面文件设计模式的归档文件模式。在一个从几十或数百个平面文件源加载数据的企业中，这个包可能会被不同的 SSIS\
    \ 应用程序多次调用。因此，SSIS 包与 SSIS 应用程序之间的关系*也*是一对多。如果你做集合运算，这些关系结合起来会在应用程序表和包表之间创建一个多对多关系。这意味着你需要一个桥接表或解析器表在它们之间来创建\
    \ SSIS 应用程序和 SSIS 包之间的映射。\n\n我称这个表为 `cfg.AppPackages`。清单 A-8 包含创建 `cfg.AppPackages`\
    \ 及其加载存储过程的 T-SQL 脚本。\n\n### 清单 A-8. 创建 cfg.AppPackages 和 cfg.AddSSISApplicationPackage\n\
    \n```sql\n/* cfg.AppPackages 表 */\n如果不存在(选择 s.name + '.' + t.name\n 从系统表 t\n 连接系统架构\
    \ s\n 在 s.schema_id = t.schema_id 处\n 其中 s.name = 'cfg'\n 并且 t.name = 'AppPackages')\n\
    \ 开始\n 打印 '正在创建 cfg.AppPackages 表'\n 创建表 cfg.AppPackages\n (\n AppPackageID int\
    \ 标识(1,1)\n 约束 PK_AppPackages\n 主键 聚集\n ,ApplicationID int 非空\n 约束 FK_cfgAppPackages_cfgApplications_ApplicationID\n\
    \ 外键 引用 cfg.Applications(ApplicationID)\n ,PackageID int 非空\n 约束 FK_cfgAppPackages_cfgPackages_PackageID\n\
    \ 外键 引用 cfg.Packages(PackageID)\n ,ExecutionOrder int 空\n )\n 打印 'Cfg.AppPackages\
    \ 已创建'\n 结束\n否则\n 打印 'Cfg.AppPackages 表已存在。'\n打印 ''\n\n/* cfg.AddSSISApplicationPackage\
    \ 存储过程 */\n如果存在(选择 s.name + '.' + p.name\n 从系统过程 p\n 连接系统架构 s\n 在 s.schema_id\
    \ = p.schema_id 处\n 其中 s.name = 'cfg'\n 并且 p.name = 'AddSSISApplicationPackage')\n\
    \ 开始\n 打印 '正在删除 cfg.AddSSISApplicationPackage 存储过程'\n 删除过程 cfg.AddSSISApplicationPackage\n\
    \ 打印 'Cfg.AddSSISApplicationPackage 存储过程已删除'\n 结束\n打印 '正在创建 cfg.AddSSISApplicationPackage\
    \ 存储过程'\nGo\n\n创建过程 cfg.AddSSISApplicationPackage\n @ApplicationID int\n ,@PackageID\
    \ int\n ,@ExecutionOrder int = 10\nAs\n 设置 NoCount 开启\n 如果不存在(选择 AppPackageID\n\
    \ 从 cfg.AppPackages\n 其中 ApplicationID = @ApplicationID\n 并且 PackageID = @PackageID)\n\
    \ 开始\n 插入到 cfg.AppPackages\n (ApplicationID\n ,PackageID\n ,ExecutionOrder)\n\
    \ 值 (@ApplicationID, @PackageID, @ExecutionOrder)\n 结束\nGo\n打印 'Cfg.AddSSISApplicationPackage\
    \ 存储过程已创建。'\n打印 ''\n```\n\n要创建 SSIS 应用程序和 SSIS 包之间的映射，你需要两者的 ID。执行以下查询返回你所需的信息：\n\
    \n```sql\n选择 * 从 cfg.Applications\n选择 * 从 cfg.Packages\n```\n\n你现在将使用该信息来执行 `cfg.AddSSISApplicationPackage`\
    \ 存储过程，在 `SSISConfig` 数据库的元数据中构建 `SSISApp1` 并为其分配 `Child1.dtsx` 和 `Child2.dtsx`——按此顺序。我使用\
    \ 清单 A-9 中所示的 T-SQL 脚本来完成映射。\n\n### 清单 A-9. 将 Child1 和 Child2 SSIS 包耦合到 SSISApp1\
    \ SSIS 应用程序\n\n```sql\n声明 @ExecutionOrder int = 10\n声明 @ApplicationID int = 1\n\
    声明 @PackageID int = 1\n声明 @ApplicationName varchar(255) = 'SSISApp1'\n声明 @PackageFolder\
    \ varchar(255) = 'F:\\Andy\\Projects\\PublicFramework_PackageDeployment_2014\\\
    SSISConfig2014\\'\n声明 @PackageName varchar(255) = 'Child1.dtsx'\n\n如果不存在(选择 AppPackageID\n\
    \ 从 cfg.AppPackages\n 其中 ApplicationID = @ApplicationID\n 并且 PackageID = @PackageID\n\
    \ 并且 ExecutionOrder = @ExecutionOrder)\n 开始\n 打印 '正在添加 ' + @ApplicationName +\
    \ '.' + @PackageName\n + ' 到框架中，执行顺序为 ' + convert(varchar, @ExecutionOrder)\n\
    \ 执行 cfg.AddSSISApplicationPackage @ApplicationID, @PackageID, @ExecutionOrder\n\
    \ 打印 @PackageName + ' 已添加并连接到 ' + @ApplicationName\n 结束\n否则\n 打印 @ApplicationName\
    \ + '.' + @PackageName + ' 已存在于框架中，执行顺序为 '\n + convert(varchar, @ExecutionOrder)\n\
    \n/*Child2.dtsx */\n设置 @PackageName = 'Child2.dtsx'\n设置 @ExecutionOrder = 20\n\
    设置 @PackageID = 2\n\n如果不存在(选择 AppPackageID\n 从 cfg.AppPackages\n 其中 ApplicationID\
    \ = @ApplicationID\n 并且 PackageID = @PackageID\n 并且 ExecutionOrder = @ExecutionOrder)\n\
    \ 开始\n 打印 '正在添加 ' + @ApplicationName + '.' + @PackageName + ' 到框架中，执行顺序为 ' + convert(varchar,\
    \ @ExecutionOrder)\n 执行 cfg.AddSSISApplicationPackage @ApplicationID, @PackageID,\
    \ @ExecutionOrder\n 打印 @PackageName + ' 已添加并连接到 ' + @ApplicationName\n 结束\n否则\n\
    \ 打印 @ApplicationName + '.' + @PackageName + ' 已存在于框架中，执行顺序为 '\n + convert(varchar,\
    \ @ExecutionOrder)\n```\n\n"
