    \      - 包含此 SSIS 包的\n                             SSISDB 目录名称。\n            \
    \       PackageDescription [nvarchar(512)]\n                   - 包含 SSIS 包的描述。\n\
    \        描述: 存储一个 SSIS 包。\n          示例: exec custom.AddPackage 'Chapter2', 'Chapter2'\n\
    \                                        , 'Chapter2.dtsx', '一个测试 SSIS 包。'\n\n\
    */\nCreate Procedure custom.AddPackage\n  @FolderName nvarchar(128)\n ,@ProjectName\
