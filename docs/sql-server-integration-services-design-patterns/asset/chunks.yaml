    2.  Add an XML task to your package.

    3.  Double-click the task to open the editor.

    4.  Set the `OperationType` property to XSLT and the `SaveOperationResult` property
    to `True`.

    5.  Set the `SecondOperandType` and `SecondOperand` properties to point to your
    XSLT script file.

    6.  Enter the appropriate connection information for `SourceType`, `Source`, `DestinationType`,
    and `Destination`, similar to what is shown in [Figure 9-7](#9781484200834_Ch09.xhtml#Fig7).


    ![9781484200834_Fig09-07.jpg](images/9781484200834_Fig09-07.jpg)


    [Figure 9-7](#9781484200834_Ch09.xhtml#_Fig7). XML task configuration


    ![Image](images/sq.jpg) **Note**  The XML task was updated in the SQL Server 2012
    release to use the latest .NET XML technologies. The performance of applying XSLT
    scripts is much better than in previous versions.


    [Listing 9-5](#9781484200834_Ch09.xhtml#list5) shows us what our sample XML document
    looks like after applying the XSLT script from [Listing 9-4](#9781484200834_Ch09.xhtml#list4).
    We can see that all of the fields we need to extract are now under a single `parent`
    element. The schema for this new XML format gives us a single output with the
    XML Source component, removing the need to join outputs later on in the data flow.


    [***Listing 9-5***](#9781484200834_Ch09.xhtml#_list5). Simplified XML Document


    ```

    <?xml version="1.0" encoding="utf-8"?>

    <Customers>

      <Customer>

        <Key>11000</Key>

        <FirstName>Jon</FirstName>

        <LastName>Yang</LastName>

        <BirthDate>1966-04-08</BirthDate>

        <Gender>M</Gender>

        <YearlyIncome>90000</YearlyIncome>

      </Customer>

      <Customer>

        <Key>11001</Key>

        <FirstName>Eugene</FirstName>

        <LastName>Huang</LastName>

        <BirthDate>1965-05-14</BirthDate>

        <Gender>M</Gender>

        <YearlyIncome>60000</YearlyIncome>

      </Customer>

    </Customers>

    ```


    Using a Script Component


    An alternatve to processing an XML document with the XML Source is to use a script
    component. This pattern requires some custom coding, but it gives you full control
    over the way the data is output. The .NET Framework provides a number of ways
    to parse and load an XML document, each with their own strengths and performance
    characteristics. This section describes two separate patterns for processing XML
    documents with a script component.


    The first pattern uses the XML Schema Definition Tool (`Xsd.exe`) to generate
    a set of .NET classes that can be used by an SSIS script component. It uses the
    `XmlSerializer` class to convert the source XML document into a set of easy-to-use
    .NET objects. Although `XmlSerializer` is not the fastest way to process an XML
    document in .NET, the strongly typed classes allow for code that is straightforward
    and easy to maintain. This approach is a recommended alternative to the XML Source
    when you’re working with complex XML documents that can easily fit into memory
    (for example, smaller than 100MB).


    The second pattern uses a combination of LINQ to XML and the `XmlReader` class
    to process XML documents in a streaming manner. This approach is more sensitive
    to changes to the XML format; it may be harder to maintain, but it will output
    scripts that use the `XmlSerializer` class. This pattern is recommended when you
    are processing very large XML documents or when performance is critical.


    Configuring the Script Component


    The script components in both patterns are configured the same way, but they will
    contain different code. Both will use a file connection manager to locate the
    source XML file at runtime, and both will define the same set of output columns.
    Use the following steps to configure your script component:


    1.  Add a file connection manager to your package.

    2.  Set Usage Type to Existing File and set the path to our XML source file as
    shown in [Figure 9-8](#9781484200834_Ch09.xhtml#Fig8).


    ![9781484200834_Fig09-08.jpg](images/9781484200834_Fig09-08.jpg)


    [Figure 9-8](#9781484200834_Ch09.xhtml#_Fig8). Configure the File Connection Manager
    editor'
