    The result is a collaborative work by experts, suitable for beginners and advanced
    users alike.


    Even though I moved on from the SSIS team, and from Microsoft, some years ago
    now, it is a pleasure for me to remain in touch with the user community I admire
    so much. And it is an honor for me to introduce you to this much-anticipated and
    valuable book.


    Happy integrating!


    —Donald Farmer

    VP Product Management, **QlikTech**


    About the Authors


    ![9781484200834_unFM-01.jpg](images/9781484200834_unFM-01.jpg)


    **Andy Leonard** is an SSIS trainer and consultant, SQL Server database and Integration
    Services developer, SQL Server data warehouse developer, community mentor, SQL
    Server Most Valuable Professional (MVP), `SQLBlog.com` blogger, and engineer.
    He is co-author of *Professional SQL Server 2005 Integration Services* and *SQL
    Server MVP Deep Dives*. His background includes web application architecture and
    development, Visual Basic, ASP, SQL Server Integration Services (SSIS), and data
    warehouse development using SQL Server 2000, 2005, and 2008.


    **Tim Mitchell** is a business intelligence consultant, database developer, speaker,
    and trainer. He has been working with SQL Server for more than eight years, primarily
    in business intelligence, ETL/SSIS, database development, and reporting. He has
    earned a number of industry certifications, holds a bachelor’s degree in computer
    science from Texas A&M University at Commerce, and is a Microsoft SQL Server Most
    Valuable Professional (MVP). Tim is a business intelligence consultant for Artis
    Consulting in the Dallas, Texas area. As an active member of the community, Tim
    has spoken at venues including numerous SQL Saturday events, Houston Tech Fest,
    and various user groups and PASS virtual chapters. He is a board member and speaker
    at the North Texas SQL Server User Group in Dallas, serves as the co-chair of
    the PASS BI Virtual Chapter, and is an active volunteer for PASS. Tim is an author
    and forum contributor on `SQLServerCentral.com` and has published dozens of SQL
    Server training videos on `SQLShare.com`. You can visit his website and blog at
    `TimMitchell.net` or follow him on Twitter at `@Tim_Mitchell`.'
  trans: "\n# 第 18 章：SQL Server Integration Services 设计模式\n\n## 项目部署模型\n\n## SSIS\
    \ 目录\n\n## 部署方法\n\n### 从命令行部署\n\n### 使用自定义代码部署\n\n### 使用 PowerShell 部署\n\n###\
    \ 使用 SQL 部署\n\n## 包部署模型\n\n## 结论\n\n# 第 19 章：商业智能标记语言\n\n## 商业智能标记语言简史\n\n## 构建你的第一个\
    \ Biml 文件\n\n## 构建一个基本的增量加载 SSIS 包\n\n### 创建数据库和表\n\n### 添加元数据\n\n### 指定数据流任务\n\
    \n### 添加转换\n\n### 测试 Biml\n\n## 将 Biml 用作 SSIS 设计模式引擎\n\n## 是时候测试了\n\n## 结论\n\n\
    # 第 20 章：Biml 与 SSIS 框架\n\n## 将 Biml 与 SSIS 框架结合使用\n\n## 向框架添加 SSIS 包元数据\n\n##\
    \ 执行 Biml 文件\n\n## 生成 SSIS 命令行\n\n## 总结\n\n# 附录 A：SSIS 框架的演进\n\n## 从中途开始\n\n##\
    \ 介绍 SSIS 应用程序\n\n## 关于关系的说明\n\n## 在 T-SQL 中检索 SSIS 应用程序\n\n## 在 SSIS 中检索 SSIS\
    \ 应用程序\n\n## 监控执行\n\n### 构建应用程序实例日志\n\n### 构建包实例日志\n\n### 构建错误日志\n\n## 报告执行指标\n\
    \n## 结论\n\n# 索引\n\n# 第一版前言\n\n对我来说，在微软工作的最大乐趣之一就是引导新产品从概念走向发布。然而，更令人欣慰的是见证新的用户社区的诞生和发展，因为没有用户的产品算什么？不过是磁盘上的比特和字节。作为\
    \ SQL Server Integration Services 团队的集团产品经理，我很荣幸见证了 SSIS 应用程序及其用户社交网络的演变。\n\n\
    在 Kamal Hathi 的卓越领导下，Integration Services 团队在 2005 年交付了一款产品——SQL Server Integration\
    \ Services——它不仅旨在成为一个强大的应用程序本身，更希望成为一个平台，让客户和合作伙伴能够随着数据集成需求随时间的变化和增长而进行扩展和扩展。多年来（经历了该产品的多个版本），SQL\
    \ Server Integration Services 已发展成为行业领先的技术。\n\n当我们开始开发用户现在所称的 SSIS 时，任何构建数据仓库的人只有两个选择：昂贵、高度专业的提取、转换和加载\
    \ (ETL) 工具，或者繁琐、难以维护的自定义编码。通过 SSIS，我们希望突破这些传统限制：提供一个真正可扩展的工具，对初学者足够简单，但对专家而言，又具备平台的扩展性和可编程性。\n\
    \n我们几乎没有预料到 SQL Server 用户社区会如此热情地接纳这个工具！我们的用户群迅速增长，如同任何群体努力一样，自然的领导者涌现出来。这本杰出著作的作者们，简而言之，是\
    \ SSIS 社交网络中最杰出的贡献者之一。他们之所以成为领导者，不仅因为他们的技能，更因为他们不知疲倦地支持和承诺帮助他人。本书提炼了这些学习成果和社区焦点，汇编成一卷，可以放在你的键盘旁多年。\n\
    \n像 SSIS 这样的工具面临的挑战是，用户面前有太多的可能性。如果我可以选择一个预先构建的组件，我该选哪一个？如果我可以用脚本扩展功能，我应该在什么时候这样做？在加载缓慢变化维度表或处理\
    \ XML 的众多方法中，我该如何选择？\n\n*SQL Server 2012 Integration Services 设计模式* 不仅提供了此类问题的解决方案；更有用的是，这本书将作者的广泛经验引导成*模式*。近年来，设计模式已经证明了它们对软件开发人员的价值，作为解决重复出现但仍需特定实现细节问题的灵活模板。*SSIS\
    \ 设计模式* 独特地将这种方法带入了数据仓库和 ETL 的世界。\n\n其结果是专家们的协作成果，适合初学者和高级用户。\n\n尽管我在几年前就已经离开了\
    \ SSIS 团队，也离开了微软，但能与我非常钦佩的用户社区保持联系，对我来说是件乐事。能够向你介绍这本备受期待且有价值的书，是我的荣幸。\n\n集成愉快！\n\
    \n—Donald Farmer  \nQlikTech 产品管理副总裁\n\n# 关于作者\n\n![9781484200834_unFM-01.jpg](img/9781484200834_unFM-01.jpg)\n\
    \n**Andy Leonard** 是一名 SSIS 培训师和顾问、SQL Server 数据库和 Integration Services 开发人员、SQL\
    \ Server 数据仓库开发人员、社区导师、SQL Server 最有价值专家 (MVP)、`SQLBlog.com` 博主和工程师。他是 *Professional\
    \ SQL Server 2005 Integration Services* 和 *SQL Server MVP Deep Dives* 的合著者。他的背景包括\
    \ Web 应用程序架构和开发、Visual Basic、ASP、SQL Server Integration Services (SSIS) 以及使用 SQL\
    \ Server 2000、2005 和 2008 的数据仓库开发。\n\n**Tim Mitchell** 是一名商业智能顾问、数据库开发人员、演讲者和培训师。他使用\
    \ SQL Server 已有八年多，主要涉及商业智能、ETL/SSIS、数据库开发和报告。他获得了多项行业认证，拥有德克萨斯农工大学 Commerce 分校的计算机科学学士学位，并且是\
    \ Microsoft SQL Server 最有价值专家 (MVP)。Tim 是位于德克萨斯州达拉斯地区的 Artis Consulting 公司的商业智能顾问。作为社区的活跃成员，Tim\
    \ 曾在众多 SQL Saturday 活动、休斯顿科技节以及各种用户组和 PASS 虚拟分会场发表演讲。他是达拉斯北德克萨斯 SQL Server 用户组的董事会成员和演讲者，担任\
    \ PASS BI 虚拟分会场的联合主席，并且是 PASS 的活跃志愿者。Tim 是 `SQLServerCentral.com` 的作者和论坛贡献者，并在\
    \ `SQLShare.com` 上发布了数十个 SQL Server 培训视频。你可以访问他的网站和博客 `TimMitchell.net` 或在 Twitter\
    \ 上关注他 `@Tim_Mitchell`。\n"
- fmt: "**Matt Masson** is a software development engineer working with the SQL Server\
    \ Integration Services (SSIS) team. Matt has worked on many aspects of the SSIS\
    \ product, including upgrade, performance, and overall user experience. He is\
    \ a frequent presenter at Microsoft conferences and maintains the SSIS Team blog\
    \ (`http://blogs.msdn.com/b/mattm/`). Prior to joining Microsoft in 2006, Matt\
    \ was a developer on a number of business intelligence reporting and analytical\
    \ products. He lives in Montreal, Quebec, and works remotely with his Redmond-based\
    \ team.\n\n![9781484200834_unFM-02.jpg](images/9781484200834_unFM-02.jpg)\n\n\
    **Jessica M. Moss** is a well-known author, and speaker on Microsoft SQL Server\
    \ business intelligence. She has created numerous data warehouse and business\
    \ intelligence solutions for companies in different industries, and has delivered\
    \ training courses on Integration Services, Reporting Services, and Analysis Services.\
    \ While working for a major clothing retailer, Jessica participated in the SQL\
    \ Server 2005 TAP program, where she developed best implementation practices for\
    \ Integration Services. Jessica has authored technical content for multiple magazines,\
    \ websites, and books, and has spoken internationally at conferences such as the\
    \ PASS Community Summit, SharePoint Connections, and the SQLTeach International\
    \ Conference. As a strong proponent of developing user-to-user community relations,\
    \ Jessica actively participates in local user groups and code camps in central\
    \ Virginia. In addition, Jessica volunteers her time to help educate people through\
    \ the PASS organization.\n\n![9781484200834_unFM-03.jpg](images/9781484200834_unFM-03.jpg)\n\
    \n**Michelle Ufford** is a Microsoft Most Valuable Professional (MVP) and principal\
    \ engineer on the Data Platform team at GoDaddy. She has experience with all stages\
    \ of the data lifecycle, from OLTP to data warehousing, and from relational data\
    \ to Big Data. Michelle specializes in development of very large databases (VLDB)\
    \ and scalable database architecture, and enjoys database automation and data\
    \ monetization. She is an active member of the SQL Server community and a frequent\
    \ presenter, most notably at PASS Summit. Michelle has a very popular blog at\
    \ `SQLFool.com` and can be found on Twitter `@sqlfool.com`.\n\n# About the Technical\
    \ Reviewer\n\n![9781484200834_unFM-04.jpg](images/9781484200834_unFM-04.jpg)\n\
    \n**Bill Fellows** is a Microsoft SQL Server MVP and a business intelligence professional\
    \ in Kansas City, Missouri. He’s been focused on data integration, database design,\
    \ and development since 1999\\. He is the organizer of the Kansas City SQL Saturdays\
    \ and a regular speaker at SQL Server community events.\n\n# CHAPTER 1\n\n![image](images/frontdot.jpg)\n\
    \n## Metadata Collection\n\nThe first Integration Services design pattern we will\
    \ cover is metadata collection. What do we mean by metadata collection? Good question.\
    \ This chapter could also be called “Using SSIS to Save Time and Become an Awesome\
    \ DBA.” Many DBAs spend a large portion of time monitoring activities such as\
    \ verifying backups, alerting on scheduled job failures, creating schema snapshots\
    \ (“just in case”), examining space utilization, and logging database growth over\
    \ time, to name just a very few. Most Relational Database Management Systems (RDBMS’s)\
    \ provide metadata to help DBAs monitor their systems. If you’ve been a DBA for\
    \ a few years, you may even have a “tool bag” of scripts that you use to interrogate\
    \ metadata. Running these scripts manually is easy when you have just one or two\
    \ servers; however, this can quickly become unwieldy and consume a large portion\
    \ of your time as your enterprise grows and as the number of database servers\
    \ increases.\n\nThis chapter examines how to use Integration Services and the\
    \ metadata that exists within SQL Server to automate some of these routine tasks.\n\
    \n## About SQL Server Data Tools\n\nSQL Server Data Tools - Business Intelligence\
    \ (SSDT-BI) is Microsoft’s IDE for developing Integration Services packages. It\
    \ leverages the maturity and familiarity of Visual Studio to provide a unified\
    \ development platform for SQL Server Business Intelligence projects, including\
    \ Integration Services, Analysis Services, and Reporting Services projects. This\
    \ book is written using `SSDT-BI` for Visual Studio 2013 and `SSIS` 2014.\n\n\
    ![Image](images/sq.jpg) **Tip** Don’t have `SSDT-BI` installed yet? `SSDT-BI`\
    \ is available from Microsoft’s Download Center. Please note that `SSDT-BI` is\
    \ not backward compatible, so make sure you verify that the version you download\
    \ is appropriate for your environment.\n\n## A Peek at the Final Product\n\nLet’s\
    \ discuss the Integration Services package you will be creating in this chapter.\n\
    \nIn SQL Server, you will do the following:\n\n1.  Create a database to act as\
    \ your central repository for database monitoring.\n2.  Create a table to store\
    \ a list of SQL Server instances that you wish to monitor.\n3.  Create a table\
    \ for each of the data elements you wish to monitor (unused indexes and database\
    \ growth).\n\nIn Integration Services, you will do the following:\n\n1.  Create\
    \ a new Integration Services package.\n2.  Retrieve a list of SQL Server instances\
    \ and store the list in a variable.\n3.  Create an `OLE DB` connection with a\
    \ dynamically populated server name.\n4.  Iterate through each database and\n\
    \    1.  Retrieve current database and log file sizes for historical monitoring.\n\
    \    2.  Retrieve a list of index candidates for potential redesign or dropping.\n\
    \    3.  Update the `Last Monitored` value for each SQL Server instance.\n\nThis\
    \ is a very flexible model that you can easily expand to include many more monitoring\
    \ tasks. A screenshot of the completed package is displayed in [Figure 1-1](#9781484200834_Ch01.xhtml#Fig1).\n\
    \n![9781484200834_Fig01-01.jpg](images/9781484200834_Fig01-01.jpg)\n\n[Figure\
    \ 1-1](#9781484200834_Ch01.xhtml#_Fig1). The MetadataCollection package\n\nIf\
    \ this is not your first Integration Services package, maybe you’ve noticed that\
    \ this package is missing a few best practices, such as error handling. In the\
    \ interest of clarity, the package you create in this chapter will focus only\
    \ on core design patterns; however, we will call out best practices when applicable.\n\
    \nAlso, please note that the `T-SQL` examples will only work with SQL Server 2005\
    \ or later.\n\n## SQL Server Metadata\n\ncatalog\n\nAlthough metadata can be collected\
    \ from any RDBMS that provides an interface for accessing it, this chapter uses\
    \ SQL Server as its metadata source. The focus of this chapter is not on the actual\
    \ metadata, but rather the pattern of metadata collection. Still, it is useful\
    \ for you to have a basic understanding of the type of metadata that is available.\n\
    \nSQL Server exposes a wealth of information through catalog views, system functions,\
    \ dynamic management views (DMVs), and dynamic management functions (DMFs). Let’s\
    \ briefly examine some of the metadata you will be using in this chapter.\n\n\
    ![Image](images/sq.jpg) **Tip** SQL Server Books Online is a great resource for\
    \ learning more about the types of metadata available in SQL Server. Try searching\
    \ for “metadata functions,” “catalog views,” and “DMVs” for more information.\n\
    \n### sys.dm_os_performance_counters\n\nThe `sys.dm_os_performance_counters` `DMV`\
    \ returns server performance counters on areas including memory, wait stats, and\
    \ transactions. This `DMV` is useful for reporting file sizes, page life expectancy,\
    \ page reads and writes per second, and transactions per second, to name but a\
    \ few.\n\n### sys.dm_db_index_usage_stats"
