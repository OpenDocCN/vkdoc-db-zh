    \n## 实现辅助器模式\n\n我最初是在担任软件开发人员时接触设计模式的，这大概不会让任何人感到惊讶。我在本应用程序中使用的模式使窗体背后的代码量最少。窗体中的代码调用特定于窗体的模块中的代码。您可以通过在解决方案资源管理器中右键单击\
    \ `frmMain` 并选择查看代码来查看 `frmMain` 的代码。用以下代码替换显示的代码：\n\n```\n'\n' frmMain 代码\n'\n\
    ' 在开发界面时，我使用一种辅助器模式。\n' 每个窗体命名为 frm_____，并且有一个对应的模块命名为 frm_____Helper.vb。\n' 每个事件方法都调用辅助器模块中的一个子程序。\n\
    '\n\nPublic Class frmMain\n\nPrivate Sub frmMain_Load(ByVal sender As System.Object,\
    \ ByVal e As System.EventArgs) _ Handles MyBase.Load\n        InitFrmMain()\n\
    \    End Sub\n\nPrivate Sub btnStartFile_Click(ByVal sender As System.Object,\
    \ _\n                                ByVal e As System.EventArgs) Handles btnStartFile.Click\n\
    \        btnStartFileClick()\n    End Sub\n\nPrivate Sub btnOpenSSISPkg_Click(ByVal\
    \ sender As System.Object, _\n                                  ByVal e As System.EventArgs)\
    \ Handles _ btnOpenSSISPkg.Click\n        btnOpenSSISPkgClick()\n    End Sub\n\
    \nPrivate Sub btnStartCatalog_Click(ByVal sender As System.Object, _\n       \
    \                            ByVal e As System.EventArgs) Handles _ btnStartCatalog.Click\n\
    \        btnStartCatalogClick()\n    End Sub\n\nPrivate Sub btnOpenSSISPkgInCatalog_Click(ByVal\
