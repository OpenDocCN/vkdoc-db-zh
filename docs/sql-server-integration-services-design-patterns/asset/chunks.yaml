    ## 结论


    在本章中，我们探讨了执行 SSIS 包的多种方法。我们研究了用于方便执行 SSIS 包的众多内置方法。然后，我们通过扩展 SSISDB 功能将事情提升了一个档次。最终，我们构建了一个简单但功能完整的自定义执行框架，并演示了如何将其与
    SQL Server 代理作业的调度功能耦合，以生成一个支持并行/串行的自定义执行引擎。我们构建了一个 .NET 应用程序来演示从托管代码执行 SSIS 包的灵活性（和复杂性）。


    # 第三章


    ![image](img/frontdot.jpg)


    ## 脚本模式


    正如本书通篇所示，SQL Server Integration Services (SSIS) 是一个具有多面性的产品，具备许多原生功能，可以处理最困难的数据挑战。凭借高度灵活的转换组件，如
    `Lookup`（查找）、`Conditional Split`（条件拆分）、`Derived Column`（派生列）和 `Merge Join`（合并连接），数据流组件能够对传输中的数据执行无限数量的转换。在控制流方面，包括
    `File System Task`（文件系统任务）、`For Each Loop`（For Each 循环）及其近亲 `For Loop`（For 循环）、`File
    System Task`（文件系统任务）和 `Data Profiling Task`（数据剖析任务）在内的工具，为支持基本的 ETL 操作提供了关键服务。开箱即用，您就拥有一个充满灵活且强大对象的工具箱。


    然而，即使是最随意的 ETL 开发者最终也会遇到需要比原生组件提供更多灵活性的场景。处理数据移动和转换通常既繁琐又不可预测，并且需要一种难以内置于通用工具中的可扩展级别。幸运的是，对于这些不常见的
    ETL 需求，有一个解决方案：自定义 .NET 脚本。


    ### 工具集


    SQL Server Integration Services 能够将非常强大的 ETL 逻辑直接构建到您的 SSIS 包中。通过 Visual Studio
    及其各种便利功能（熟悉的开发环境、IntelliSense、基于项目的开发等），在 ETL 过程中嵌入自定义逻辑的负担大大减轻。


    与其前身数据转换服务 (DTS) 不同，SQL Server Integration Services 在其脚本工具中公开了整个 .NET 运行时。不再要求仅在
    ETL 包中使用 ActiveX 脚本（尽管 SSIS 中仍保留了此功能，适用于那些钟爱 VBScript 的人）。随着 SSIS 中丰富脚本环境的引入，您现在能够访问在“真实”软件开发中使用的相同框架特性。真正的面向对象开发、事件、正确的错误处理以及其他功能现在都可以在
    SSIS 的自定义脚本中完全访问。


    SQL Server Integration Services 包含两种在您的包中利用 .NET 代码的工具，每种都旨在实现不同类型的自定义行为。位于控制流工具箱中的
    `Script Task`（脚本任务）是一个广泛的通用工具，旨在执行支持和管理任务。在数据流工具箱中，您会找到 `Script Component`（脚本组件），它是一个多功能且精确的数据移动和操作工具。

    '
- fmt: '# SSIS中的脚本工具：Script Task与Script Component


    如果你刚接触SSIS中的脚本编写，可能会好奇为什么SSIS中有两个不同的脚本工具。更进一步，在给定场景下选择使用哪个工具，将成为关键的设计决策。简短的答案是？视情况而定。如前所述，`Script
    Task`通常是处理操作行为（与数据移动相对）的更好选择，最常用于影响整个包流程的操作。另一方面，如果你的ETL需求需要生成、消费或操作数据行，那么`Script
    Component`通常是更好的工具。


    尽管它们的接口几乎相同，`Script Task`和`Script Component`在默认设计上却大相径庭。当你探索这些工具时，会发现将它们引入工作区时，脚本项目会自动添加大量代码。作为旨在直接进行数据交互的工具，`Script
    Component`会包含预配置的代码，用于定义输入和/或输出，以允许数据流经该组件。相比之下，内置在`Script Task`中的行为没有提供任何输入或输出的设施，进一步说明此工具并非为直接数据操作而构建。


    `Script Task`和`Script Component`有许多相似之处。这两种工具都提供了一个类似于主流软件开发中熟悉的Visual Studio开发环境的脚本设计器。在这两种工具中，你会发现工作区被组织成一个虚拟解决方案（其显示方式与Visual
    Studio开发中的解决方案容器非常相似），其中可能包含多个文件和文件夹。这两个脚本工具的另一个共同点是，能够在虚拟解决方案中包含外部代码或服务。此功能允许你利用在其他地方已经编写和编译好的代码，无论是随项目包含的DLL文件，还是诸如Web服务之类的外部资源。两种工具中的语言行为将是相同的；诸如错误处理、编译器指令和核心框架功能等功能对于`Script
    Task`和`Script Component`来说都是通用的。


    ## 我该使用脚本吗？


    在我们开始探索在SSIS中使用脚本的设计模式之前，应该回答一个基本问题：“我是否应该使用脚本工具？”


    尽管我坚信使用SSIS中的脚本工具来解决难题，但在谈论或撰写此主题时，我几乎总是给出一条建议：**仅在现有工具无法轻松解决你所面临的问题的情况下，才使用`Script
    Task`或`Script Component`**。虽然你在灵活性上获益良多，但在将脚本实例部署到包中时，也会失去一些东西——例如设计时验证、易于重用性和GUI设置编辑器等。


    请不要将此理解为脚本不好，或者它反映了糟糕的包设计（毕竟，本章描述的是使用脚本的推荐实践！）。事实上，恰恰相反——我遇到过许多情况，唯一能满足ETL需求的工具就是一个精心设计的脚本实例。关键在于，`Script
    Task`和`Script Component`是复杂的工具，旨在用于非典型情况。原生组件更易于使用和维护。在SSIS的一个或多个原生组件能够轻松处理任何ETL问题的情况下，不要通过用脚本重新发明轮子来使问题复杂化。


    ## 脚本编辑器


    尽管它们的用途大不相同，但`Script Task`和`Script Component`工具的脚本编辑器能提供相似的体验。两种工具的特点包括：


    *   无处不在的代码窗口

    *   项目资源管理器（`Project Explorer`）

    *   完整的`.NET`运行时

    *   编译器


    我将在本章后面介绍在每种工具中编写代码的语义。现在，我将探讨`Script Task`和`Script Component`共有的一些其他功能。


    ### 项目资源管理器


    Visual Studio中的软件开发元素存储在称为项目的逻辑组中。SQL Server Data Tools（`SSDT`）中的Visual Studio环境的行为方式也大致相同；如图3-1所示，给定脚本的文件在“项目资源管理器”窗口中表示。在同一图中，你可以看到该项目有一个相当长且任意的名称。这是一个系统生成的标识符，用于标识项目及其所在的命名空间，但如果你希望在脚本中采用更标准化的命名约定，可以更改它。


    ![9781484200834_Fig03-01.jpg](images/9781484200834_Fig03-01.jpg)


    **图 3-1** `Script Task`项目资源管理器


    值得指出的是，你在`Project Explorer`中创建的C#和VB.NET代码文件并非物理地实现在你的项目中。相反，文件名仅用于在项目内逻辑分隔代码文件——代码本身以内联方式嵌入到包的XML（dtsx文件）中。


    `Project Explorer`中还包含一个名为`References`的虚拟文件夹。在此文件夹中，你将找到脚本所需核心功能的程序集引用。此外，你可以将自己的引用添加到此列表中，以进一步扩展`Script
    Task`或`Script Component`的功能。


    由于包中每个`Script Task`或`Script Component`实例都以Visual Studio项目的形式呈现，因此你对该项目的属性拥有大量的控制权。与功能齐全的软件开发项目非常相似，`Script
    Task`或`Script Component`的实例允许ETL开发人员控制各种行为参数，包括`.NET Framework`的版本、编译警告级别和程序集名称。项目属性窗口如图3-2所示，可以通过在`Project
    Explorer`中右键单击项目名称并选择“属性”来访问。但请记住，你所做的任何更改的范围仅限于你当前正在处理的那个`Script Task`或`Script
    Component`实例。


    在实践中，很少需要修改`Script Task`或`Script Component`实例的项目级属性。在大多数情况下，默认的项目设置就足够了。


    ![9781484200834_Fig03-02.jpg](images/9781484200834_Fig03-02.jpg)


    **图 3-2** `Script Task`项目属性


    ### 完整的 .NET 运行时


    SSIS中的两种脚本工具都可以完全访问`.NET Framework`运行时内的对象、方法和事件。这种可访问性级别允许ETL开发人员利用现有的程序集——包括网络库、文件系统工具、高级数学运算和结构化错误处理等——作为其脚本的一部分。需要创建复杂的多维数组？寻找一种更简单的方法来执行字符串操作技巧？所有这些以及更多功能，在`.NET`运行时环境的底层都很容易访问。


    ### 编译器


    在代码中发现错误至关重要，而且通常在开发过程早期更容易做到。要了解这在SSIS脚本中如何工作，理解脚本开发的生命周期是很有用的。'
  raw: 'If you’re new to scripting in SSIS, you might wonder why there are two different
    script tools in SSIS. Beyond that, the critical design pattern will include a
    decision on which of these tools to use in a given scenario. The short answer?
    It depends. As mentioned, the Script task is typically the better choice for operational
    behavior and is most commonly used for operations affecting overall package flow
    (as opposed to data movement). On the other hand, if your ETL needs require generating,
    consuming, or manipulating rows of data, then the Script component is normally
    the better tool.


    Although they have nearly identical interfaces, the Script task and Script component
    differ greatly in their default design. As you explore each of these tools, you’ll
    find that there is a significant amount of code automatically added to the script
    project when you introduce it to your work surface. As a tool designed for direct
    data interaction, the Script component will include preconfigured code defining
    inputs and/or outputs to allow data to flow through the component. In contrast,
    the behaviors built into the Script task have no facilities for either inputs
    or puts, further illustrating that this tool was built for purposes other than
    direct data manipulation.


    The Script task and Script component share many similarities. Both tools feature
    a script designer that resembles the familiar Visual Studio development environment
    used for mainstream software development. In both tools, you’ll find the workspace
    organized into a virtual solution (displayed very similarly to the solution container
    found in Visual Studio development) that may include multiple files and folders.
    Also common to both script tools is the ability to include external code or services
    within the virtual solution. This capability allows you to leverage code that
    has already been written and compiled elsewhere, whether it’s a DLL file you include
    with the project or some external resource such as a web service. The language
    behaviors in both tools will be identical; functionality such as error handling,
    compiler directives, and core framework functionality is common to both the Script
    task and the Script component.


    Should I Use Script?


    Before we get started exploring the design patterns for using scripting in SSIS,
    a fundamental question should be answered: “Should I be using the scripting tools
    at all?”


    As much as I believe in using the script tools in SSIS to solve difficult problems,
    there’s one piece of advice I almost always dish out when talking or writing about
    this topic: only use the Script task or Script component in situations where existing
    tools can’t easily address the problem you’re trying to solve. Although you gain
    a great deal in terms of flexibility, you also lose a few things—design-time validation,
    easy reusability, and a GUI settings editor, among others—when you deploy an instance
    of script into your packages.


    Now don’t take any of this to mean that scripting is bad, or that it is reflective
    of poor package design (after all, this is a chapter describing recommended practices
    for using script!). Quite the opposite, in fact—I’ve found many situations where
    the only tool that could satisfy the ETL requirement was a well-designed script
    instance. The point is that the Script task and Script component are complex tools
    intended for use in atypical situations. Native components are much simpler to
    use and maintain. In situations where one or more native elements of SSIS can
    easily dispatch any ETL issues, don’t complicate the issue by reinventing the
    wheel with a script.


    The Script Editor


    Though their purposes differ greatly, you can expect a similar experience in the
    script editor for both the Script task and the Script component tools. Features
    of both tools include


    *   The ubiquitous code window

    *   Project Explorer

    *   Full .NET runtime

    *   Compiler


    I’ll cover the semantics of writing code in each of these tools later in the chapter.
    Now, I’ll explore some of the other features shared by the Script task and the
    Script component.


    Project Explorer


    Software development elements in Visual Studio are stored in logical groups called
    projects. The Visual Studio environment in SQL Server Data Tools (SSDT) will behave
    in much the same way; as shown in [Figure 3-1](#9781484200834_Ch03.xhtml#Fig1),
    the file(s) for a given script is represented in the Project Explorer window.
    In the same figure, you can see that the project has a rather lengthy and arbitrary
    name. This is a system-generated identifier used to identify the project and the
    namespace in which it resides, but it can be changed if you prefer to have a more
    standardized naming convention in your script.


    ![9781484200834_Fig03-01.jpg](images/9781484200834_Fig03-01.jpg)


    [Figure 3-1](#9781484200834_Ch03.xhtml#_Fig1). Script task Project Explorer


    It’s worth pointing out that the C# and VB.NET code files that you create in Project
    Explorer are not physically materialized in your project. Rather, the filenames
    exist only to logically separate the code files within the project—the code itself
    is embedded inline within the XML of the package (the dtsx file).


    Also included in the Project Explorer is a virtual folder named References. In
    this folder, you will find the assembly references for core functionality required
    by the script. In addition, you can add your own references to this list to further
    extend the capability of the Script task or Script component.


    Because each instance of the Script task or Script component in your package is
    surfaced as a Visual Studio project, you have a significant amount of control
    over the properties of that project. Much like a full-featured software development
    project, an instance of the Script task or Script component allows the ETL developer
    the ability to control various parameters of behavior, including the version of
    the .NET Framework, the compilation warning level, and the assembly name. The
    project properties window is shown in [Figure 3-2](#9781484200834_Ch03.xhtml#Fig2),
    and it can be accessed by right-clicking the project name in Project Explorer
    and choosing Properties. Do keep in mind, however, that the scope of any changes
    you make is limited to the single instance of the Script task or Script component
    you’re currently working with.


    In practice, it’s quite rare to have to modify the project-level properties of
    instances of the Script task or Script component. In the majority of cases, the
    default project settings will suffice.


    ![9781484200834_Fig03-02.jpg](images/9781484200834_Fig03-02.jpg)


    [Figure 3-2](#9781484200834_Ch03.xhtml#_Fig2). Script task project properties


    Full .NET Runtime


    Both scripting tools in SSIS have full access to the objects, methods, and events
    within the .NET Framework runtime. This level of accessibility allows the ETL
    developer to leverage exiting assemblies—including network libraries, file system
    tools, advanced mathematical operations, and structured error handling, among
    many others—as part of their scripts. Need to create a complex multidimensional
    array? Looking for an easier way to perform tricks with string manipulation? All
    this and more is easily accessible, just below the covers of the .NET runtime
    environment.


    Compiler


    Finding errors in code is critical and is generally easier to do early in the
    development process. To understand how this works in SSIS scripting, it’s useful
    to understand the life cycle of script development.'
