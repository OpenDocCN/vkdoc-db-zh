    # DQS 清洗转换


    DQS 清洗转换会记录信息事件，以指示何时将行发送到 DQS 服务器。每个批次会记录一个事件，最后会有一个包含所有记录汇总的事件。这些消息包含有关清洗过程处理该批次所耗时长以及各状态计数的详细信息。清单
    5-1 显示了这些消息的示例。该转换以 10,000 行为一块处理数据。目前块大小是硬编码的；无法配置发送到 DQS 服务器的批次大小。


    **清单 5-1**. DQS 清洗转换日志消息


    ```

    [DQS 清洗] 信息：DQS 清洗组件从 DQS 服务器接收到 1000 条记录。数据清洗过程耗时 7 秒。

    [DQS 清洗] 信息：DQS 清洗组件记录块状态计数 - 无效：0，自动建议：21，已更正：979，未知：0，正确：0。

    [DQS 清洗] 信息：DQS 清洗组件记录总状态计数 - 无效：0，自动建议：115，已更正：4885，未知：0，正确：0。

    ```


    ## CodePlex 上的 DQS 扩展


    许多 DQS 扩展可从 CodePlex 获取。这些扩展列于表 5-3。它们不随 SQL Server 2014 一同提供，但对于自动化数据清洗场景非常有用。这里简要说明了如何使用每个扩展。您可以在
    CodePlex 上它们各自的项目页面找到有关如何使用的更多信息。


    **表 5-3**. CodePlex 上的 DQS 扩展


    | 扩展 | 描述 |

    | --- | --- |

    | DQS 匹配 | 此转换允许您在 SSIS 数据流中执行自动数据去重。它提供了与 SSIS 模糊分组转换类似的功能，但还利用了在您知识库中定义的 DQS
    匹配策略以提供更准确的结果。 |

    | DQS 域值导入 | 此目标组件允许您批量将值加载到 DQS 域中。对于您的域值定义在外部系统（如 Master Data Services）中的自动化场景非常有用。
    |

    | 发布 DQS 知识库 | 此任务用于提交对知识库的更改（在 DQS 术语中称为*发布*）。该任务通常与 DQS 域值导入转换结合使用。 |


    ![Image](img/sq.jpg) `注意` DQS 的 CodePlex 扩展由 OH22 Data (`http://data.oh22.net/`)
    创建并免费提供。它们不受 Microsoft 官方支持。这些扩展可从 `https://ssisdqsmatching.codeplex.com/` 和 `https://domainvalueimport.codeplex.com/`
    下载。


    ## 在数据流中清洗数据


    以下部分包含使用 DQS 清洗转换在 SSIS 数据流中清洗数据的设计模式。清洗数据时需要牢记两个关键问题：


    *   清洗过程基于您知识库中的规则。清洗规则越好，您的清洗过程就越准确。随着知识库中规则的改进，您可能需要重新处理数据。

    *   清洗大量数据可能耗时较长。有关可应用于减少总体处理时间的模式，请参阅本章后面的“性能注意事项”部分。


    ### 处理 DQS 清洗转换的输出


    DQS 清洗转换会向数据流添加若干新列（如本章前面所述）。处理已处理行的方式通常取决于该行的状态，该状态在 `记录状态` 列中设置。可以使用条件拆分转换将行重定向到适当的数据流路径。图
    5-11 显示了条件拆分转换为每个 `记录状态` 值设置单独输出时的外观。表 5-4 包含了可能的状态值列表。


    ![9781484200834_Fig05-11.jpg](img/9781484200834_Fig05-11.jpg)


    **图 5-11**. 配置为处理 DQS `记录状态` 的条件拆分转换


    **表 5-4**. 列状态值


    | 选项 | 描述 |

    | --- | --- |

    | `正确` | 该值已经正确，无需进一步修改。`已更正` 列将包含原始值。 |

    | `无效` | 域包含将此值标记为无效的验证规则。 |

    | `已更正` | 该值不正确，但 DQS 能够纠正它。`已更正` 列将包含修改后的值。 |

    | `新建` | 该值不在当前域中，且与任何域规则都不匹配。DQS 无法确定其是否有效。该值应被重定向并手动检查。 |

    | `自动建议` | 该值不是完全匹配项，但 DQS 提供了建议。如果您包含 `置信度` 字段，则可以自动接受高于特定置信度阈值的行，并将其他行重定向到单独的表以供后续审查。
    |


    ![Image](img/sq.jpg) `注意` 列状态值是本地化的；实际字符串会根据 SQL Server 安装的语言而改变。如果您的包需要在不同的系统区域设置下运行，这可能要求您在条件拆分表达式中添加额外的处理逻辑。有关状态值的更多信息，请参阅联机丛书中的“数据清洗”页面：`http://msdn.microsoft.com/en-us/library/gg524800.aspx`。


    您处理的状态值以及使用的下游数据流逻辑将取决于数据清洗过程的目标。通常，您会希望将行拆分为两条路径。`正确`、`已更正` 和 `自动建议` 行将走一条路径，该路径将使用清洗后的数据值（在
    `<列名>_ 输出` 列中找到）更新您的目标表。`新建` 和 `无效` 行通常会进入一个单独的表，以便之后有人可以检查它们，并相应地更正数据（对于 `无效`
    行）或更新知识库（对于 `新建` 行），以便将来可以自动处理这些值。您可能希望检查 `自动建议` 行的置信度级别 (`<列名>_ 置信度`)，以确保其达到最低阈值。图
    5-12 显示了一个 SSIS 数据流，其中包含处理 DQS 清洗转换后行的逻辑。


    ![9781484200834_Fig05-12.jpg](img/9781484200834_Fig05-12.jpg)


    **图 5-12**. DQS 清洗转换后的数据流处理逻辑


    ![Image](img/sq.jpg) `注意` 虽然 DQS 清洗转换输出的 `置信度` 列是数值型的，但它们作为 `DT_WSTR(100)` 列（字符串）输出。要检查置信度级别是否高于最低阈值，您需要将该值强制转换为
    `DT_R4`（单精度浮点数）或 `DT_R8`（双精度浮点数）。


    ## 性能注意事项

