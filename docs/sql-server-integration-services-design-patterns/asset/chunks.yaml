    通过运行几次测试执行来测试包实例日志记录。允许一次成功，另一次失败。当你检查应用程序和包实例表时，结果应如 `图 A-15` 所示。\n\n![9781484200834_FigAppA-15.jpg](img/9781484200834_FigAppA-15.jpg)\n\
    \n`图 A-15`. 检查应用程序和包实例日志\n\n通过检查应用程序实例和包实例日志表，你可以看出 `AppInstanceID8` 启动于 2014\
    \ 年 6 月 29 日 下午 6:47:24。你还可以看到三个 SSIS 包——其 `PkgInstanceID` 为 10、11 和 12——作为 SSIS\
    \ 应用程序的一部分被执行。每个包都成功了，SSIS 应用程序也成功了。你还知道 `AppInstanceID7` 启动于 2014 年 6 月 29 日\
    \ 下午 6:14:15，并执行了 `PkgInstanceID` 7、8 和 9。`PkgInstanceID` 7 和 8 成功了，但 `PkgInstanceID`\
    \ 9 失败了；导致 SSIS 应用程序失败。\n\n酷吗？确实酷。让我们进入错误和事件日志记录。\n\n构建错误日志记录\n\n在数据集成流程中嵌入机制以捕获和保留错误及异常元数据，是最重要的、也是最有用的日志记录类型。异常和错误总会发生。SSIS\
    \ 提供了一个相当健壮的模型来捕获和报告错误，只要你意识到大多数错误代码可以忽略。不过，错误描述大多很有效。所以它达到了平衡。\n\n在我演示如何在 SSIS\
    \ 中捕获错误消息之前，让我们先讨论一下为什么这样做。我曾经管理一个数据集成开发团队。团队规模从 28 人到 40 人不等，我为美国州政府利益相关方构建了非常庞大的\
    \ ETL 解决方案。我工作的一部分就是找出最佳实践。让所有 SSIS 包以相同格式将错误数据记录到同一位置，是一项最佳实践。但如何让 40 个开发人员都做到呢？你曾尝试过让\
    \ 40 个开发人员以同样的方式做同样的事情吗？就像赶猫一样。问题在于，他们中一半人认为比我聪明；而其中一半人确实如此。但这类问题并不需要深奥的思考；它需要的是策略。那么，让每个开发人员每次都能为每个\
    \ SSIS 包构建完全相同类型日志的最佳策略是什么？你猜对了：别让他们做。将错误日志记录完全从他们手中拿走。\n\n在学会使用“执行包任务”后不久，我了解到事件会从子包“冒泡”到父包。就错误日志记录而言，这意味着我可以在父包捕获并记录任何错误。更好的是，这意味着我*可以在子包中不写任何代码*就完成这件事。问题解决了。\n\
    \n让我们看看如何将此功能实现到 SSIS 框架中。首先，让我们添加一个表和一个存储过程来记录和保存错误，如 `清单 A-16` 所示。\n\n`清单 A-16`.\
    \ 构建错误日志记录表和存储过程\n\n```\n/* log.SSISErrors table */\nIf Not Exists(Select s.name\
    \ + '.' + t.name\n              From sys.tables t\n              Join sys.schemas\
    \ s\n                On s.schema_id = t.schema_id\n              Where s.name\
    \ = 'log'\n                And t.name = 'SSISErrors')\n begin\n  print 'Creating\
    \ log.SSISErrors table'\n  Create Table [log].SSISErrors\n  (\n    ID int identity(1,1)\n\
    \     Constraint PK_SSISErrors Primary Key Clustered\n  ,AppInstanceID int Not\
    \ Null  Constraint FK_logSSISErrors_logSSISAppInstance_AppInstanceID\n Foreign\
    \ Key References [log].SSISAppInstance(AppInstanceID)\n  ,PkgInstanceID int Not\
    \ Null  Constraint FK_logSSISErrors_logPkgInstance_PkgInstanceID\n Foreign Key\
    \ References [log].SSISPkgInstance(PkgInstanceID)\n  ,ErrorDateTime datetime Not\
    \ Null\n     Constraint DF_logSSISErrors_ErrorDateTime\n      Default(GetDate())\n\
    \  ,ErrorDescription varchar(max) Null\n  ,SourceName varchar(255) Null\n  )\n\
    \  print 'Log.SSISErrors created'\n end\nElse\n print 'Log.SSISErrors table already\
    \ exists.'\nprint ''\n\n/* log.LogError stored procedure */\nIf Exists(Select\
    \ s.name + '.' + p.name\n          From sys.procedures p\n          Join sys.schemas\
    \ s\n            On s.schema_id = p.schema_id\n          Where s.name = 'log'\n\
    \            And p.name = 'LogError')\n begin\n  print 'Dropping log.LogError\
    \ stored procedure'\n  Drop Procedure [log].LogError\n  print 'Log.LogError stored\
    \ procedure dropped'\n end\nprint 'Creating log.LogError stored procedure'\ngo\n\
    \nCreate Procedure [log].LogError\n @AppInstanceID int\n ,@PkgInstanceID int\n\
    \ ,@SourceName varchar(255)\n ,@ErrorDescription varchar(max)\nAs\n\n insert into\
    \ log.SSISErrors\n (AppInstanceID, PkgInstanceID, SourceName, ErrorDescription)\n\
    \ Values\n (@AppInstanceID\n ,@PkgInstanceID\n ,@SourceName\n ,@ErrorDescription)\n\
    go\nprint 'Log.LogError stored procedure created.'\nprint ''\n```\n\n`log.SSISErrors`\
    \ 表中的每一行都包含一个 `AppInstanceID` 和一个 `PkgInstanceID` 用于标识。为什么两者都要？因为它旨在捕获并保存同时起源于父包和子包的错误。`Parent.dtsx`\
    \ 包中的错误将具有 `0` 的 `PkgInstanceID`。其余列捕获错误本身的元数据：错误发生的日期和时间（`ErrorDateTime`）、错误消息（`ErrorDescription`）以及错误起源的\
    \ SSIS 任务（`SourceName`）。\n\n![Image](img/sq.jpg) **注意** 此时，向 `log.SSISErrors`\
    \ 表添加一行 `PkgInstanceID` 为 `0` 的记录实际上会引发外键约束冲突，但我将在本附录稍后处理此事。\n\n需要注意的是，错误事件是由\
    \ SSIS 任务“引发”的。当实例化错误事件时，其字段会被填充信息，例如错误描述和源名称（引发错误的任务名称）。当事件在 SSIS 包执行堆栈内部导航或冒泡时，这些数据不会更改。当事件到达\
    \ `Parent`。\n"
- fmt: "# SSIS 错误与事件日志记录\n\n当 `dtsx` 包中的任务出错时，它将包含引发错误的任务名称（`SourceName`）以及该任务的错误描述（`ErrorDescription`）。当错误冒泡到\
    \ `Parent.dtsx` 包时，你将调用 `log.LogError` 存储过程来填充 `log.SSISErrors` 表。\n\n在 SSDT 中，返回到我们之前配置的\
    \ `Parent.dtsx` 包的 OnError 事件处理程序。添加一个 Execute SQL 任务并将其重命名为 `Log Error`。打开编辑器，将\
    \ ConnectionType 和 Connection 属性配置为通过 ADO.Net 连接到 `SSISConfig` 数据库。将 SQLStatement\
    \ 属性设置为 `log.LogError`，并将 IsQueryStoredProcedure 属性设置为 `True`。导航到 Parameter Mapping\
    \ 页面并添加以下参数：\n\n*   Variable Name: `User::AppInstanceID`\n*   Direction: Input\n\
    *   Data Type: Int32\n*   Parameter Name: `AppInstanceID`\n*   Variable Name:\
    \ `User::PkgInstanceID`\n*   Direction: Input\n*   Data Type: Int32\n*   Parameter\
    \ Name: `PkgInstanceID`\n*   Variable Name: `System::SourceName`\n*   Direction:\
    \ Input\n*   Data Type: String\n*   Parameter Name: `SourceName`\n*   Variable\
    \ Name: `System::ErrorDescription`\n*   Direction: Input\n*   Data Type: String\n\
    *   Parameter Name: `ErrorDescription`\n\n我们已在本附录前面创建了 `AppInstanceID` 和 `PkgInstanceID`\
    \ SSIS 变量。你现在使用的是来自 System 命名空间的两个变量——`SourceName` 和 `ErrorDescription`——它们是错误事件最初由引发任务填充的两个字段。\n\
    \n映射完这些参数后，关闭 Execute SQL Task Editor，并从 Log Error Execute SQL 任务连接一个优先约束到 Log\
    \ Application Failure Execute SQL 任务，如 [图 A-16](#9781484200834_AppA.xhtml#Fig16)\
    \ 所示。\n\n![9781484200834_FigAppA-16.jpg](images/9781484200834_FigAppA-16.jpg)\n\
    \n[图 A-16](#9781484200834_AppA.xhtml#_Fig16). 在父包 OnError 事件处理程序中添加 Log Error\
    \ Execute SQL 任务\n\n通过在 SSDT 调试器中运行 `Parent.dtsx` 来测试新的错误日志记录功能。当从 `ErrorTest.dtsx`\
    \ 包提示时，单击“否”按钮以生成错误。在 SSMS 中，执行以下查询以检查错误元数据：\n\n```\nSelect * From log.SSISErrors\n\
    ```\n\n结果应类似于 [图 A-17](#9781484200834_AppA.xhtml#Fig17) 中所示的结果。\n\n![9781484200834_FigAppA-17.jpg](images/9781484200834_FigAppA-17.jpg)\n\
    \n[图 A-17](#9781484200834_AppA.xhtml#_Fig17). log.SSISErrors 表中的错误元数据\n\n正如你从上图中看到的（希望如果你在家跟着做，你自己的代码也是如此），错误日志记录可以使\
    \ SSIS 问题的故障排除变得简单得多。\n\n事件日志记录与 SSIS 中的错误日志记录非常相似。部分原因是 SSIS 在 OnInformation\
    \ 事件处理程序中重用了 OnError 事件处理程序的对象模型。\n\n让我们首先向 `SSISConfig` 数据库添加另一个表和存储过程。[清单 A-17](#9781484200834_AppA.xhtml#list17)\
    \ 中的 T-SQL 脚本完成了此任务。\n\n[***清单 A-17***](#9781484200834_AppA.xhtml#_list17). 构建事件日志记录表和存储过程\n\
    \n```\n/* log.SSISEvents table */\nIf Not Exists(Select s.name + '.' + t.name\n\
    \              From sys.tables t\n              Join sys.schemas s\n         \
    \       On s.schema_id = t.schema_id\n              Where s.name = 'log'\n   \
    \             And t.name = 'SSISEvents')\n begin\n  print 'Creating log.SSISEvents\
    \ table'\n  Create Table [log].SSISEvents\n  (\n    ID int identity(1,1)\n   \
    \  Constraint PK_SSISEvents Primary Key Clustered\n  ,AppInstanceID int Not Null\n\
    \       Constraint FK_logSSISEvents_logSSISAppInstance_AppInstanceID\n       \
    \ Foreign Key References [log].SSISAppInstance(AppInstanceID)\n  ,PkgInstanceID\
    \ int Not Null\n       Constraint FK_logSSISEvents_logPkgInstance_PkgInstanceID\n\
    \        Foreign Key References [log].SSISPkgInstance(PkgInstanceID)\n  ,EventDateTime\
    \ datetime Not Null\n     Constraint DF_logSSISEvents_ErrorDateTime\n      Default(GetDate())\n\
    \  ,EventDescription varchar(max) Null\n  ,SourceName varchar(255) Null\n  )\n\
    \  print 'Log.SSISEvents created'\n end\nElse\n print 'Log.SSISEvents table already\
    \ exists.'\nprint ''\n\n/* log.LogEvent stored procedure */\nIf Exists(Select\
    \ s.name + '.' + p.name\n          From sys.procedures p\n          Join sys.schemas\
    \ s\n            On s.schema_id = p.schema_id\n          Where s.name = 'log'\n\
    \            And p.name = 'LogEvent')\n begin\n  print 'Dropping log.LogEvent\
    \ stored procedure'\n  Drop Procedure [log].LogEvent\n  print 'Log.LogEvent stored\
    \ procedure dropped'\n end\nprint 'Creating log.LogEvent stored procedure'\ngo\n\
    \nCreate Procedure [log].LogEvent\n @AppInstanceID int\n,@PkgInstanceID int\n\
    ,@SourceName varchar(255)\n,@EventDescription varchar(max)\nAs\n insert into [log].SSISEvents\n\
    \ (AppInstanceID, PkgInstanceID, SourceName, EventDescription)\n Values\n (@AppInstanceID\n\
    \ ,@PkgInstanceID\n ,@SourceName\n ,@EventDescription)\ngo\nprint 'Log.LogEvent\
    \ stored procedure created.'\nprint ''\n```\n\n除了列名，`log.SSISEvents` 表的设计与 `log.SSISErrors`\
    \ 表完全相同。返回到 SSDT，从 `Parent.dtsx` OnError 事件处理程序中复制 Log Error Execute SQL 任务。将事件处理程序下拉列表从\
    \ OnError 更改为 OnInformation，并单击链接创建 OnInformation 事件处理程序。接下来，将剪贴板的内容粘贴到 OnInformation\
    \ 事件处理程序 surface 上。打开编辑器并将任务的名称更改为 `Log Event`。将 `SQLStatement` 属性编辑为 `log.LogEvent`。在\
    \ Parameter Mapping 页面，将 `ErrorDescription` 参数名称从 `ErrorDescription` 更改为 `EventDescription`。关闭\
    \ Execute SQL Task Editor，就完成了。\n\n但是参数映射中的所有“Error”内容怎么办？OnInformation 事件处理程序消息是通过名为\
    \ `System::ErrorDescription` 的 SSIS 变量传递的。*这不是错字*。你可能期望它是 `InformationDescription`，但事实并非如此，这让我（和你）省了些工作。\n\
    \n如果你现在执行 `Parent.dtsx` 来测试新的事件日志记录功能，你将不会看到任何记录的事件。真糟糕。如何从 SSIS 获取事件？几个任务通过 OnInformation\
    \ 事件提供信息。例如，数据流任务提供了许多有用的元数据，包括从源读取和写入目标的行数、查找缓存大小、行数以及填充时间。你还可以使用脚本任务将 OnInformation\
    \ 事件注入执行流。\n\n我喜欢在 SSIS 框架父包中包含脚本任务来总结我已有的关于 SSIS 应用程序和包的信息。现在让我们添加它们。\n\n将一个脚本任务拖到\
    \ `Parent.dtsx` 包的控制流上，并将其重命名为 `Log Application Variables`。打开编辑器，将 ScriptLanguage\
    \ 更改为 Microsoft Visual Basic 2012。将以下变量添加到 `ReadOnlyVariables` 属性：\n\n*   `System::TaskName`\n\
    *   `System::PackageName`\n*   `User::AppInstanceID`\n*   `User::ApplicationName`\n\
    \n编辑脚本并将 [清单 A-18](#9781484200834_AppA.xhtml#list18) 中所示的代码放入 `Sub Main()`。\n\n\
    [***清单 A-18***](#9781484200834_AppA.xhtml#_list18). 从脚本任务引发信息事件\n\n```vb\nPublic\
    \ Sub Main()\n        Dim sPackageName As String = Dts.Variables(\"PackageName\"\
    ).Value.ToString\n        Dim sTaskName As String = Dts.Variables(\"TaskName\"\
    ).Value.ToString\n        Dim sSubComponent As String = sPackageName & \".\" &\
    \ sTaskName\n        Dim sApplicationName As String = Dts.Variables(\"ApplicationName\"\
    ).Value.ToString\n        Dim iAppInstanceID As Integer = _\n            Convert.ToInt32(Dts.Variables(\"\
    AppInstanceID\").Value)\n\n        Dim sMsg As String = \"ApplicationName: \"\
    \ & sApplicationName & vbCrLf & _\n                             \"AppInstanceID:\
    \ \" & iAppInstanceID.\n```"
  raw: 'dtsx` package in the framework, it will contain the name of the task that
    originated the error (`SourceName`) and the description of the error from that
    task (`ErrorDescription`).    When the error bubbles to the `Parent.dtsx` package,
    you will call the `log.LogError` stored procedure to populate the `log.SSISErrors`
    table. In SSDT, return to the `Parent.dtsx` package’s OnError event handler that
    we configured earlier. Add an Execute SQL task and rename it **Log Error**. Open
    the editor and configure the ConnectionType and Connection properties to connect
    to the `SSISConfig` database via ADO.Net. Set the SQLStatement property to `log.LogError`
    and the IsQueryStoredProcedure property to `True`. Navigate to the Parameter Mapping
    page and add the following parameters:    *   Variable Name: `User::AppInstanceID`
    *   Direction: Input *   Data Type: Int32 *   Parameter Name: `AppInstanceID`
    *   Variable Name: `User::PkgInstanceID` *   Direction: Input *   Data Type: Int32
    *   Parameter Name: `PkgInstanceID` *   Variable Name: `System::SourceName` *   Direction:
    Input *   Data Type: String *   Parameter Name: `SourceName` *   Variable Name:
    `System::ErrorDescription` *   Direction: Input *   Data Type: String *   Parameter
    Name: `ErrorDescription`    We created the `AppInstanceID` and `PkgInstanceID`
    SSIS variables earlier in this appendix. You are now using the two variables from
    the System namespace—`SourceName` and `ErrorDescription`—which are two of the
    fields populated when an error event is first raised by the originating task.    Once
    these parameters are mapped, close the Execute SQL Task Editor and connect a precedence
    constraint from the Log Error Execute SQL task to the Log Application Failure
    Execute SQL task, as shown in [Figure A-16](#9781484200834_AppA.xhtml#Fig16).    ![9781484200834_FigAppA-16.jpg](images/9781484200834_FigAppA-16.jpg)    [Figure
    A-16](#9781484200834_AppA.xhtml#_Fig16). Adding the Log Error Execute SQL task
    to the Parent Package OnError event handler    Test the new error logging functionality
    by running `Parent.dtsx` in the SSDT debugger. When prompted from the `ErrorTest.dtsx`
    package, click the No button to generate an error. In SSMS, execute the following
    query to examine the error metadata:    ``` Select * From log.SSISErrors ```    The
    results should appear similar to those shown in [Figure A-17](#9781484200834_AppA.xhtml#Fig17).    ![9781484200834_FigAppA-17.jpg](images/9781484200834_FigAppA-17.jpg)    [Figure
    A-17](#9781484200834_AppA.xhtml#_Fig17). Error metadata in the log.SSISErrors
    table    As you can see from the preceding image (and hopefully your own code
    if you are following along at home), error logging can make trouble shooting SSIS
    issues much simpler.    Event logging is very similar to error logging in SSIS.
    Part of the reason is that SSIS reuses the object model for the OnError event
    handler in the OnInformation event handler.    Let’s begin by adding another table
    and stored procedure to the `SSISConfig` database. The T-SQL script in [Listing
    A-17](#9781484200834_AppA.xhtml#list17) accomplishes this task.    [***Listing
    A-17***](#9781484200834_AppA.xhtml#_list17). Building the Event Logging Table
    and Stored Procedure    ``` /* log.SSISEvents table */ If Not Exists(Select s.name
    + ''.'' + t.name               From sys.tables t               Join sys.schemas
    s                 On s.schema_id = t.schema_id               Where s.name = ''log''
                    And t.name = ''SSISEvents'')  begin   print ''Creating log.SSISEvents
    table''   Create Table [log].SSISEvents   (     ID int identity(1,1)      Constraint
    PK_SSISEvents Primary Key Clustered    ,AppInstanceID int Not Null         Constraint
    FK_logSSISEvents_logSSISAppInstance_AppInstanceID          Foreign Key References
    [log].SSISAppInstance(AppInstanceID)    ,PkgInstanceID int Not Null         Constraint
    FK_logSSISEvents_logPkgInstance_PkgInstanceID          Foreign Key References
    [log].


    SSISPkgInstance(PkgInstanceID)    ,EventDateTime datetime Not Null      Constraint
    DF_logSSISEvents_ErrorDateTime       Default(GetDate())    ,EventDescription varchar(max)
    Null    ,SourceName varchar(255) Null   )   print ''Log.SSISEvents created''  end
    Else  print ''Log.SSISEvents table already exists.'' print ''''  /* log.LogEvent
    stored procedure */ If Exists(Select s.name + ''.'' + p.name           From sys.procedures
    p           Join sys.schemas s             On s.schema_id = p.schema_id           Where
    s.name = ''log''             And p.name = ''LogEvent'')  begin   print ''Dropping
    log.LogEvent stored procedure''   Drop Procedure [log].LogEvent   print ''Log.LogEvent
    stored procedure dropped''  end print ''Creating log.LogEvent stored procedure''
    go  Create Procedure [log].LogEvent  @AppInstanceID int ,@PkgInstanceID int ,@SourceName
    varchar(255) ,@EventDescription varchar(max) As   insert into [log].SSISEvents
     (AppInstanceID, PkgInstanceID, SourceName, EventDescription)  Values  (@AppInstanceID
    ,@PkgInstanceID ,@SourceName ,@EventDescription) go print ''Log.LogEvent stored
    procedure created.'' print '''' ```    With the exception of the column names,
    the `log.SSISEvents` table is precisely the same design as the `log.SSISErrors`
    table. Return to SSDT and copy the Log Error Execute SQL task from the `Parent.dtsx`
    OnError event handler. Change the Event Handler drop-down from OnError to OnInformation
    and create the OnInformation event handler by clicking the link. Next, paste the
    contents of the clipboard onto the OnInformation event handler surface. Open the
    editor and change the name of the task to **Log Event**. Edit the `SQLStatement`
    property to read `log.LogEvent`. On the Parameter Mapping page, change the `ErrorDescription`
    parameter name from `ErrorDescription` to `EventDescription`. Close the Execute
    SQL Task Editor and you are done.    But what about all that “Error” stuff in
    the parameter mapping? The OnInformation event handler message is conveyed via
    an SSIS variable named `System::ErrorDescription`. *That is not a typo*. You might
    expect it to be `InformationDescription`, but it’s not, which makes less work
    for me (and you).    If you execute `Parent.dtsx` now to test the new event logging
    functionality, then you won’t see any events logged. Bummer. How do you get events
    from SSIS? Several tasks provide information via OnInformation events. The Data
    Flow task, for example, provides lots of helpful metadata about rows read from
    sources and written to destinations, and lookup cache sizes, rows, and time to
    populate. You can also inject OnInformation events into the execution stream using
    a Script task.    I like to include Script tasks that summarize the information
    I have about SSIS applications and packages in SSIS framework parent packages.
    Let’s add those now.    Drag a Script task onto the `Parent.dtsx` package’s control
    flow and rename it **Log Application Variables**. Open the editor and change the
    ScriptLanguage to Microsoft Visual Basic 2012\. Add the following variables to
    the `ReadOnlyVariables` property:    *   `System::TaskName` *   `System::PackageName`
    *   `User::AppInstanceID` *   `User::ApplicationName`    Edit the script and place
    the code shown in [Listing A-18](#9781484200834_AppA.xhtml#list18) in `Sub Main()`.    [***Listing
    A-18***](#9781484200834_AppA.xhtml#_list18). Raising an Information Event from
    a Script Task    ``` Public Sub Main()          Dim sPackageName As String = Dts.Variables("PackageName").Value.ToString
            Dim sTaskName As String = Dts.Variables("TaskName").Value.ToString         Dim
    sSubComponent As String = sPackageName & "." & sTaskName         Dim sApplicationName
    As String = Dts.Variables("ApplicationName").Value.ToString         Dim iAppInstanceID
    As Integer = _             Convert.ToInt32(Dts.Variables("AppInstanceID").Value)          Dim
    sMsg As String = "ApplicationName: " & sApplicationName & vbCrLf & _                             
    "AppInstanceID: " & iAppInstanceID.'
  trans: "\n# SSIS 错误与事件日志记录\n\n当 `dtsx` 包中的任务出错时，它将包含引发错误的任务名称（`SourceName`）以及该任务的错误描述（`ErrorDescription`）。当错误冒泡到\
    \ `Parent.dtsx` 包时，你将调用 `log.LogError` 存储过程来填充 `log.SSISErrors` 表。\n\n在 SSDT 中，返回到我们之前配置的\
    \ `Parent.dtsx` 包的 OnError 事件处理程序。添加一个 Execute SQL 任务并将其重命名为 `Log Error`。打开编辑器，将\
    \ ConnectionType 和 Connection 属性配置为通过 ADO.Net 连接到 `SSISConfig` 数据库。将 SQLStatement\
    \ 属性设置为 `log.LogError`，并将 IsQueryStoredProcedure 属性设置为 `True`。导航到 Parameter Mapping\
    \ 页面并添加以下参数：\n\n*   变量名：`User::AppInstanceID`\n*   方向：Input\n*   数据类型：Int32\n\
    *   参数名：`AppInstanceID`\n*   变量名：`User::PkgInstanceID`\n*   方向：Input\n*   数据类型：Int32\n\
    *   参数名：`PkgInstanceID`\n*   变量名：`System::SourceName`\n*   方向：Input\n*   数据类型：String\n\
    *   参数名：`SourceName`\n*   变量名：`System::ErrorDescription`\n*   方向：Input\n*   数据类型：String\n\
    *   参数名：`ErrorDescription`\n\n我们已在本附录前面创建了 `AppInstanceID` 和 `PkgInstanceID` SSIS\
    \ 变量。你现在使用的是来自 System 命名空间的两个变量——`SourceName` 和 `ErrorDescription`——它们是错误事件最初由引发任务填充的两个字段。\n\
    \n映射完这些参数后，关闭 Execute SQL Task Editor，并从 Log Error Execute SQL 任务连接一个优先约束到 Log\
    \ Application Failure Execute SQL 任务，如 图 A-16 所示。\n\n![9781484200834_FigAppA-16.jpg](img/9781484200834_FigAppA-16.jpg)\n\
    \n图 A-16. 在父包 OnError 事件处理程序中添加 Log Error Execute SQL 任务\n\n通过在 SSDT 调试器中运行 `Parent.dtsx`\
    \ 来测试新的错误日志记录功能。当从 `ErrorTest.dtsx` 包提示时，单击“否”按钮以生成错误。在 SSMS 中，执行以下查询以检查错误元数据：\n\
    \n```\nSelect * From log.SSISErrors\n```\n\n结果应类似于 图 A-17 中所示的结果。\n\n![9781484200834_FigAppA-17.jpg](img/9781484200834_FigAppA-17.jpg)\n\
    \n图 A-17. log.SSISErrors 表中的错误元数据\n\n正如你从上图中看到的（希望如果你在家跟着做，你自己的代码也是如此），错误日志记录可以使\
    \ SSIS 问题的故障排除变得简单得多。\n\n事件日志记录与 SSIS 中的错误日志记录非常相似。部分原因是 SSIS 在 OnInformation\
    \ 事件处理程序中重用了 OnError 事件处理程序的对象模型。\n\n让我们首先向 `SSISConfig` 数据库添加另一个表和存储过程。清单 A-17\
    \ 中的 T-SQL 脚本完成了此任务。\n\n***清单 A-17***. 构建事件日志记录表和存储过程\n\n```\n/* log.SSISEvents\
    \ table */\nIf Not Exists(Select s.name + '.' + t.name\n              From sys.tables\
    \ t\n              Join sys.schemas s\n                On s.schema_id = t.schema_id\n\
    \              Where s.name = 'log'\n                And t.name = 'SSISEvents')\n\
    \ begin\n  print 'Creating log.SSISEvents table'\n  Create Table [log].SSISEvents\n\
    \  (\n    ID int identity(1,1)\n     Constraint PK_SSISEvents Primary Key Clustered\n\
    \  ,AppInstanceID int Not Null\n       Constraint FK_logSSISEvents_logSSISAppInstance_AppInstanceID\n\
    \        Foreign Key References [log].SSISAppInstance(AppInstanceID)\n  ,PkgInstanceID\
    \ int Not Null\n       Constraint FK_logSSISEvents_logPkgInstance_PkgInstanceID\n\
    \        Foreign Key References [log].SSISPkgInstance(PkgInstanceID)\n  ,EventDateTime\
    \ datetime Not Null\n     Constraint DF_logSSISEvents_ErrorDateTime\n      Default(GetDate())\n\
    \  ,EventDescription varchar(max) Null\n  ,SourceName varchar(255) Null\n  )\n\
    \  print 'Log.SSISEvents created'\n end\nElse\n print 'Log.SSISEvents table already\
    \ exists.'\nprint ''\n\n/* log.LogEvent stored procedure */\nIf Exists(Select\
    \ s.name + '.' + p.name\n          From sys.procedures p\n          Join sys.schemas\
    \ s\n            On s.schema_id = p.schema_id\n          Where s.name = 'log'\n\
    \            And p.name = 'LogEvent')\n begin\n  print 'Dropping log.LogEvent\
    \ stored procedure'\n  Drop Procedure [log].LogEvent\n  print 'Log.LogEvent stored\
    \ procedure dropped'\n end\nprint 'Creating log.LogEvent stored procedure'\ngo\n\
    \nCreate Procedure [log].LogEvent\n @AppInstanceID int\n,@PkgInstanceID int\n\
    ,@SourceName varchar(255)\n,@EventDescription varchar(max)\nAs\n insert into [log].SSISEvents\n\
    \ (AppInstanceID, PkgInstanceID, SourceName, EventDescription)\n Values\n (@AppInstanceID\n\
    \ ,@PkgInstanceID\n ,@SourceName\n ,@EventDescription)\ngo\nprint 'Log.LogEvent\
    \ stored procedure created.'\nprint ''\n```\n\n除了列名，`log.SSISEvents` 表的设计与 `log.SSISErrors`\
    \ 表完全相同。返回到 SSDT，从 `Parent.dtsx` OnError 事件处理程序中复制 Log Error Execute SQL 任务。将事件处理程序下拉列表从\
    \ OnError 更改为 OnInformation，并单击链接创建 OnInformation 事件处理程序。接下来，将剪贴板的内容粘贴到 OnInformation\
    \ 事件处理程序 surface 上。打开编辑器并将任务的名称更改为 `Log Event`。将 `SQLStatement` 属性编辑为 `log.LogEvent`。在\
    \ Parameter Mapping 页面，将 `ErrorDescription` 参数名称从 `ErrorDescription` 更改为 `EventDescription`。关闭\
    \ Execute SQL Task Editor，就完成了。\n\n但是参数映射中的所有“Error”内容怎么办？OnInformation 事件处理程序消息是通过名为\
    \ `System::ErrorDescription` 的 SSIS 变量传递的。*这不是错字*。你可能期望它是 `InformationDescription`，但事实并非如此，这让我（和你）省了些工作。\n\
    \n如果你现在执行 `Parent.dtsx` 来测试新的事件日志记录功能，你将不会看到任何记录的事件。真糟糕。如何从 SSIS 获取事件？几个任务通过 OnInformation\
    \ 事件提供信息。例如，数据流任务提供了许多有用的元数据，包括从源读取和写入目标的行数、查找缓存大小、行数以及填充时间。你还可以使用脚本任务将 OnInformation\
    \ 事件注入执行流。\n\n我喜欢在 SSIS 框架父包中包含脚本任务来总结我已有的关于 SSIS 应用程序和包的信息。现在让我们添加它们。\n\n将一个脚本任务拖到\
    \ `Parent.dtsx` 包的控制流上，并将其重命名为 `Log Application Variables`。打开编辑器，将 ScriptLanguage\
    \ 更改为 Microsoft Visual Basic 2012。将以下变量添加到 `ReadOnlyVariables` 属性：\n\n*   `System::TaskName`\n\
    *   `System::PackageName`\n*   `User::AppInstanceID`\n*   `User::ApplicationName`\n\
    \n编辑脚本并将 清单 A-18 中所示的代码放入 `Sub Main()`。\n\n***清单 A-18***. 从脚本任务引发信息事件\n\n```vb\n\
    Public Sub Main()\n        Dim sPackageName As String = Dts.Variables(\"PackageName\"\
    ).Value.ToString\n        Dim sTaskName As String = Dts.Variables(\"TaskName\"\
    ).Value.ToString\n        Dim sSubComponent As String = sPackageName & \".\" &\
    \ sTaskName\n        Dim sApplicationName As String = Dts.Variables(\"ApplicationName\"\
    ).Value.ToString\n        Dim iAppInstanceID As Integer = _\n            Convert.ToInt32(Dts.Variables(\"\
    AppInstanceID\").Value)\n\n        Dim sMsg As String = \"ApplicationName: \"\
    \ & sApplicationName & vbCrLf & _\n                             \"AppInstanceID:\
    \ \" & iAppInstanceID.\n```\n"
- fmt: "# 在SSIS框架中记录事件\n\n`ToString` 函数 `Dts.Events.FireInformation(1001, sSubComponent,\
    \ sMsg, \"\", 0, True)` 之后是 `Dts.TaskResult = ScriptResults.Success`，最后是 `End\
    \ Sub`。\n\n脚本的目的在于调用 `Dts.Events.FireInformation`。该函数的第一个参数是 `InformationCode`。根据SSIS框架的性质和目的，我可能会在这里输入一个值（除了\
    \ `0`）。接下来是 `SubComponent` 参数，我通常会构建一个包含包和任务名称的字符串。随后是描述参数，这里包含了我想注入到 `log.SSISEvents`\
    \ 表中的消息。接下来的两个参数是帮助相关的——我通常分别将它们留空并设为零。最后一个参数是 `FireAgain`，我不确定它是否（仍然）起作用；我总是将其设置为\
    \ `True`。\n\n关闭脚本编辑器和脚本任务编辑器。从“日志开始应用程序执行SQL”任务到“日志应用程序变量脚本”任务连接一个优先约束，再从“日志应用程序变量脚本”任务到“获取包元数据执行SQL”任务连接另一个优先约束。\n\
    \n将另一个脚本任务拖到“Foreach子包Foreach循环容器”中，并将其重命名为 **Log Package Variables**。打开编辑器，将\
    \ `ScriptLanguage` 更改为 Microsoft Visual Basic 2012。将以下变量添加到 `ReadOnlyVariables`\
    \ 属性中：\n* `System::TaskName`\n* `System::PackageName`\n* `User::PkgInstanceID`\n\
    * `User::ChildPackagePath`\n* `User::AppPackageID`\n\n编辑脚本，并将 [Listing A-19](#9781484200834_AppA.xhtml#list19)\
    \ 中所示的代码放入 `Sub Main()` 中。\n\n**[Listing A-19](#9781484200834_AppA.xhtml#_list19).\
    \ 从脚本任务引发信息事件**\n\n```vbnet\nPublic Sub Main()\n        Dim sPackageName As String\
    \ = Dts.Variables(\"PackageName\").Value.ToString\n        Dim sTaskName As String\
    \ = Dts.Variables(\"TaskName\").Value.ToString\n        Dim sSubComponent As String\
    \ = sPackageName & \".\" & sTaskName\n        Dim sChildPackagePath As String\
    \ = Dts.Variables(\"ChildPackagePath\").Value.ToString\n        Dim iAppPackageID\
    \ As Integer = Convert.ToInt32(Dts.Variables(\"AppPackageID\").Value)\n      \
    \  Dim iPkgInstanceID As Integer = _\n Convert.ToInt32(Dts.Variables(\"PkgInstanceID\"\
    ).Value)\n\n        Dim sMsg As String = \"ChildPackagePath: \" & sChildPackagePath\
    \ & vbCrLf & _\n                             \"AppPackageID: \" & iAppPackageID.ToString\
    \ & vbCrLf & _\n                             \"PkgInstanceID: \" & iPkgInstanceID.ToString\n\
    \n        Dts.Events.FireInformation(1001, sSubComponent, sMsg, \"\", 0, True)\n\
    \n        Dts.TaskResult = ScriptResults.Success\n    End Sub\n```\n\n关闭脚本编辑器和脚本任务编辑器。从“日志开始包执行SQL”任务到“日志开始包执行SQL”任务连接一个优先约束。\n\
    \n如果现在执行 `Parent.dtsx`，在记录应用程序变量时可能会遇到外键约束错误。为什么？因为 `PkgInstanceID` 被设置为默认值 `0`，而\
    \ `log.SSISPkgInstance` 表中没有ID为 `0` 的行。让我们现在用 [Listing A-20](#9781484200834_AppA.xhtml#list20)\
    \ 中所示的脚本来补救这个问题。\n\n**[Listing A-20](#9781484200834_AppA.xhtml#_list20). 在SSISConfig数据库的选定表中添加ID为0的行**\n\
    \n```sql\n/* Add \"0\" rows */\nIf Not Exists(Select ApplicationID\n         \
    \     From cfg.Applications\n                     Where ApplicationID = 0)\n begin\n\
    \  print 'Adding 0 row for cfg.Applications'\n  Set Identity_Insert cfg.Applications\
    \ ON\n  Insert Into cfg.Applications\n  (ApplicationID\n  ,ApplicationName)\n\
    \  Values\n  (0\n  ,'SSIS Framework')\n  Set Identity_Insert cfg.Applications\
    \ OFF\n  print '0 row for cfg.Applications added'\n end\nElse\n print '0 row already\
    \ exists for cfg.Applications'\nprint ''\n\nIf Not Exists(Select PackageID\n \
    \             From cfg.Packages\n                     Where PackageID = 0)\n begin\n\
    \  print 'Adding 0 row for cfg.Packages'\n  Set Identity_Insert cfg.Packages ON\n\
    \  Insert Into cfg.Packages\n  (PackageID\n  ,PackageFolder\n  ,PackageName)\n\
    \  Values\n  (0\n  ,'\\'\n  ,'parent.dtsx')\n  Set Identity_Insert cfg.Packages\
    \ OFF\n  print '0 row for cfg.Packages added'\n end\nElse\n print '0 row already\
    \ exists for cfg.Packages'\nprint ''\n\nIf Not Exists(Select AppPackageID\n  \
    \            From cfg.AppPackages\n                     Where AppPackageID = 0)\n\
    \ begin\n  print 'Adding 0 row for cfg.Packages'\n  Set Identity_Insert cfg.AppPackages\
    \ ON\n  Insert Into cfg.AppPackages\n  (AppPackageID\n  ,ApplicationID\n  ,PackageID\n\
    \  ,ExecutionOrder)\n  Values\n  (0\n  ,0\n  ,0\n  ,10)\n  Set Identity_Insert\
    \ cfg.AppPackages OFF\n  print '0 row for cfg.AppPackages added'\n end\nElse\n\
    \ print '0 row already exists for cfg.AppPackages'\nprint ''\n\nIf Not Exists(Select\
    \ AppInstanceID\n              From [log].SSISAppInstance\n                  \
    \   Where AppInstanceID = 0)\n begin\n  print 'Adding 0 row for cfg.Packages'\n\
    \  Set Identity_Insert [log].SSISAppInstance ON\n  Insert Into [log].SSISAppInstance\n\
    \  (AppInstanceID\n  ,ApplicationID\n  ,StartDateTime\n  ,EndDateTime\n  ,[Status])\n\
    \  Values\n  (0\n  ,0\n  ,'1/1/1900'\n  ,'1/1/1900'\n  ,'Unknown')\n  Set Identity_Insert\
    \ [log].SSISAppInstance OFF\n  print '0 row for log.SSISAppInstance added'\n end\n\
    Else\n print '0 row already exists for log.SSISAppInstance'\nprint ''\n\nIf Not\
    \ Exists(Select PkgInstanceID\n              From [log].SSISPkgInstance\n    \
    \                 Where PkgInstanceID = 0)\n begin\n  print 'Adding 0 row for\
    \ cfg.Packages'\n  Set Identity_Insert [log].SSISPkgInstance ON\n  Insert Into\
    \ [log].SSISPkgInstance\n  (PkgInstanceID\n  ,AppInstanceID\n  ,AppPackageID\n\
    \  ,StartDateTime\n  ,EndDateTime\n  ,[Status])\n  Values\n  (0\n  ,0\n  ,0\n\
    \  ,'1/1/1900'\n  ,'1/1/1900'\n  ,'Unknown')\n  Set Identity_Insert [log].SSISPkgInstance\
    \ OFF\n  print '0 row for log.SSISPkgInstance added'\n end\nElse\n print '0 row\
    \ already exists for log.SSISPkgInstance'\nprint ''\n```\n\n现在这些生成事件的脚本任务已经就位，测试执行\
    \ `Parent.dtsx` 包，然后在SSMS中执行以下T-SQL来观察 `log.LogEvents` 表：\n\n```sql\nSelect *\
    \ From [log].SSISEvents\n```\n\n我的结果显示在 [Figure A-18](#9781484200834_AppA.xhtml#Fig18)\
    \ 中。\n\n![9781484200834_FigAppA-18.jpg](images/9781484200834_FigAppA-18.jpg)\n\
    \n**[Figure A-18](#9781484200834_AppA.xhtml#_Fig18). SSIS框架事件！**\n\n在SSMS中查看 `log.SSISEvents`\
    \ 表令人失望。数据是准确的，SSMS也完成了它的工作，但对于这类数据，用户体验本可以更好。幸运的是，SQL Server 2014附带了SQL Server\
    \ Reporting Services，它提供了更好的用户体验！让我们来看看如何构建报告来显示这些数据。\n\n## 报告执行指标\n\nSQL Server\
    \ Reporting Services (SSRS) 允许我们创建报告，以更用户友好的格式显示SSIS框架的元数据和指标。我们可以在报告中添加可视化效果，以帮助识别SSIS应用程序和SSIS包的状态。\n\
    \n打开一个新的SSDT-BI实例，并创建一个名为 `PublicFrameworkReports_PackageDeployment_2014` 的新报表服务器项目。在解决方案资源管理器中，右键单击“共享数据源”，然后单击“添加新数据源”。当“共享数据源属性”窗口显示时，将\
    \ `Name` 属性设置为 **SSISConfig**，然后单击“编辑”按钮以配置到您的 `SSISConfig` 数据库实例的连接。当我配置共享数据源时，它如\
    \ [Figure A-19](#9781484200834_AppA.xhtml#Fig19) 所示。\n\n![9781484200834_FigAppA-19.jpg](images/9781484200834_FigAppA-19.jpg)\n\
    \n**[Figure A-19](#9781484200834_AppA.xhtml#_Fig19). 配置SSISConfig共享数据源**\n\n您现在准备好构建报告了！让我们从创建一个显示应用程序实例数据的报告开始。\n\
    \n在我们投入报告开发之前，我们将在 `SSISConfig` 数据库中创建支持对象。[Listing A-21](#9781484200834_AppA.xhtml#list21)……"
  raw: 'ToString         Dts.Events.FireInformation(1001, sSubComponent, sMsg, "",
    0, True)          Dts.TaskResult = ScriptResults.Success     End Sub ```    The
    purpose of the script is the `Dts.Events.FireInformation` call near the end. The
    first argument for this function is the `InformationCode`. Depending on the nature
    and purpose of the SSIS framework, I may or may not enter a value (other than
    `0`) here. The `SubComponent` argument is next and I usually construct a string
    identifying the names of the package and task. The description argument follows,
    and this contains the message I want to inject into the `log.SSISEvents` table.
    The next two arguments are help-related—I usually blank and zero them, respectively.
    The last argument is `FireAgain`, and I am uncertain if it does anything (anymore);
    I always set it to `True`.    Close the script editor and the Script Task Editor.
    Connect a precedence constraint from the Log Start of Application Execute SQL
    task to the Log Application Variables Script task and another precedence constraint
    from the Log Application Variables Script task to the Get Package Metadata Execute
    SQL task.    Drag another Script task into the Foreach Child Package Foreach Loop
    container and rename it **Log Package Variables**. Open the editor and change
    the ScriptLanguage to Microsoft Visual Basic 2012\. Add the following variables
    to the ReadOnlyVariables property:    *   `System::TaskName` *   `System::PackageName`
    *   `User::PkgInstanceID` *   `User::ChildPackagePath` *   `User::AppPackageID`    Edit
    the script and place the code shown in [Listing A-19](#9781484200834_AppA.xhtml#list19)
    in `Sub Main()`.    [***Listing A-19***](#9781484200834_AppA.xhtml#_list19). Raising
    an Information Event from a Script Task    ``` Public Sub Main()          Dim
    sPackageName As String = Dts.Variables("PackageName").Value.ToString         Dim
    sTaskName As String = Dts.Variables("TaskName").Value.ToString         Dim sSubComponent
    As String = sPackageName & "." & sTaskName         Dim sChildPackagePath As String
    = Dts.Variables("ChildPackagePath").Value.ToString         Dim iAppPackageID As
    Integer = Convert.ToInt32(Dts.Variables("AppPackageID").Value)         Dim iPkgInstanceID
    As Integer = _ Convert.ToInt32(Dts.Variables("PkgInstanceID").Value)          Dim
    sMsg As String = "ChildPackagePath: " & sChildPackagePath & vbCrLf & _                             
    "AppPackageID: " & iAppPackageID.ToString & vbCrLf & _                             
    "PkgInstanceID: " & iPkgInstanceID.ToString         Dts.Events.FireInformation(1001,
    sSubComponent, sMsg, "", 0, True)          Dts.TaskResult = ScriptResults.Success
        End Sub ```    Close the script editor and the Script Task Editor. Connect
    a precedence constraint from the Log Start of Package Execute SQL task to the
    Log Start of Package Execute SQL task.    If you execute `Parent.dtsx` now, you
    may get a foreign key constraint error when you try to log the application variables.
    Why? `PkgInstanceID` is set to a default value, `0`, and there is no `0` row in
    the `log.SSISPkgInstance` table. Let’s remedy that now with the following script
    shown in [Listing A-20](#9781484200834_AppA.xhtml#list20).    [***Listing A-20***](#9781484200834_AppA.xhtml#_list20).
    Adding0 ID Rows to Selected Tables in the SSISConfig Database    ``` /* Add "0"
    rows */ If Not Exists(Select ApplicationID               From cfg.Applications
                          Where ApplicationID = 0)  begin   print ''Adding 0 row for
    cfg.Applications''   Set Identity_Insert cfg.Applications ON   Insert Into cfg.Applications
      (ApplicationID   ,ApplicationName)   Values   (0   ,''SSIS Framework'')   Set
    Identity_Insert cfg.Applications OFF   print ''0 row for cfg.Applications added''
     end Else  print ''0 row already exists for cfg.Applications'' print ''''  If
    Not Exists(Select PackageID               From cfg.Packages                       Where
    PackageID = 0)  begin   print ''Adding 0 row for cfg.Packages''   Set Identity_Insert
    cfg.


    Packages ON   Insert Into cfg.Packages   (PackageID   ,PackageFolder   ,PackageName)
      Values   (0   ,''\''   ,''parent.dtsx'')   Set Identity_Insert cfg.Packages
    OFF   print ''0 row for cfg.Packages added''  end Else  print ''0 row already
    exists for cfg.Packages'' print ''''  If Not Exists(Select AppPackageID               From
    cfg.AppPackages                       Where AppPackageID = 0)  begin   print ''Adding
    0 row for cfg.Packages''   Set Identity_Insert cfg.AppPackages ON   Insert Into
    cfg.AppPackages   (AppPackageID   ,ApplicationID   ,PackageID   ,ExecutionOrder)
      Values   (0   ,0   ,0   ,10)   Set Identity_Insert cfg.AppPackages OFF   print
    ''0 row for cfg.AppPackages added''  end Else  print ''0 row already exists for
    cfg.AppPackages'' print ''''  If Not Exists(Select AppInstanceID               From
    [log].SSISAppInstance                       Where AppInstanceID = 0)  begin   print
    ''Adding 0 row for cfg.Packages''   Set Identity_Insert [log].SSISAppInstance
    ON   Insert Into [log].SSISAppInstance   (AppInstanceID   ,ApplicationID   ,StartDateTime
      ,EndDateTime   ,[Status])   Values   (0   ,0   ,''1/1/1900''   ,''1/1/1900''
      ,''Unknown'')   Set Identity_Insert [log].SSISAppInstance OFF   print ''0 row
    for log.SSISAppInstance added''  end Else  print ''0 row already exists for log.SSISAppInstance''
    print ''''  If Not Exists(Select PkgInstanceID               From [log].SSISPkgInstance
                          Where PkgInstanceID = 0)  begin   print ''Adding 0 row for
    cfg.Packages''   Set Identity_Insert [log].SSISPkgInstance ON   Insert Into [log].SSISPkgInstance
      (PkgInstanceID   ,AppInstanceID   ,AppPackageID   ,StartDateTime   ,EndDateTime
      ,[Status])   Values   (0   ,0   ,0   ,''1/1/1900''   ,''1/1/1900''   ,''Unknown'')
      Set Identity_Insert [log].SSISPkgInstance OFF  print ''0 row for log.SSISPkgInstance
    added''  end Else  print ''0 row already exists for log.SSISPkgInstance'' print
    '''' ```    Now that these event-generating Script tasks are in place, test-execute
    the `Parent.dtsx` package and then observe the `log.LogEvents` table by executing
    the following T-SQL in SSMS:    ``` Select * From [log].SSISEvents ```    My results
    appear as shown in [Figure A-18](#9781484200834_AppA.xhtml#Fig18).    ![9781484200834_FigAppA-18.jpg](images/9781484200834_FigAppA-18.jpg)    [Figure
    A-18](#9781484200834_AppA.xhtml#_Fig18). SSIS framework events!    Viewing the
    `log.SSISEvents` table in SSMS is disappointing. The data is accurate and SSMS
    is doing its job, but the user experience could be better for this type of data.
    Fortunately, SQL Server 2014 ships with SQL Server Reporting Services, which provides
    a better user experience! Let’s look at building reports to display this data.    Reporting
    Execution Metrics    SQL Server Reporting Services (SSRS) allows us to create
    reports that display SSIS framework metadata and metrics in a more user-friendly
    format. We can add visualizations to the reports that will assist in identifying
    the status of SSIS applications and SSIS packages.    Open a new instance of SSDT-BI
    and create a new Report Server project named `PublicFrameworkReports_PackageDeployment_2014`.
    In Solution Explorer, right-click Shared Data Source and click Add New Data Source.
    When the Shared Data Source Properties window displays, set the Name property
    to **SSISConfig** and click the Edit button to configure the connection to your
    instance of the `SSISConfig` database. When I configure the shared data source,
    it appears as shown in [Figure A-19](#9781484200834_AppA.xhtml#Fig19).    ![9781484200834_FigAppA-19.jpg](images/9781484200834_FigAppA-19.jpg)    [Figure
    A-19](#9781484200834_AppA.xhtml#_Fig19). Configuring the SSISConfig shared data
    source    You’re now ready to build reports! Let’s begin by creating a report
    to display application instance data.    Before we jump into report development,
    we will create supporting objects in the `SSISConfig` database. [Listing A-21](#9781484200834_AppA.'
  trans: "# 在 SSIS 框架中记录事件\n\n`ToString` 函数 `Dts.Events.FireInformation(1001, sSubComponent,\
    \ sMsg, \"\", 0, True)` 之后是 `Dts.TaskResult = ScriptResults.Success`，最后是 `End\
    \ Sub`。\n\n该脚本的目的在于调用 `Dts.Events.FireInformation`。此函数的第一个参数是 `InformationCode`。根据\
    \ SSIS 框架的性质与用途，我可能会在此处输入一个值（除 `0` 外）。接下来是 `SubComponent` 参数，我通常会构建一个包含包名和任务名称的字符串。随后是描述参数，这里包含了我想要注入到\
    \ `log.SSISEvents` 表中的消息。再接下来的两个参数与帮助相关——我通常分别将它们留空并设为零。最后一个参数是 `FireAgain`，我不确定它是否（仍然）有效；我总是将其设置为\
    \ `True`。\n\n关闭脚本编辑器和脚本任务编辑器。从“日志开始应用程序执行 SQL”任务到“日志应用程序变量脚本”任务连接一个优先约束，再从“日志应用程序变量脚本”任务到“获取包元数据执行\
    \ SQL”任务连接另一个优先约束。\n\n将另一个脚本任务拖到“Foreach 子包 Foreach 循环容器”中，并将其重命名为 **Log Package\
    \ Variables**。打开编辑器，将 `ScriptLanguage` 更改为 Microsoft Visual Basic 2012。将以下变量添加到\
    \ `ReadOnlyVariables` 属性中：\n* `System::TaskName`\n* `System::PackageName`\n* `User::PkgInstanceID`\n\
    * `User::ChildPackagePath`\n* `User::AppPackageID`\n\n编辑脚本，并将 清单 A-19 中所示的代码放入\
    \ `Sub Main()` 中。\n\n**清单 A-19. 从脚本任务引发信息事件**\n\n```vbnet\nPublic Sub Main()\n\
    \        Dim sPackageName As String = Dts.Variables(\"PackageName\").Value.ToString\n\
