- fmt: 'Like the previous pattern, this method does come with a couple of caveats.
    First of all, the fact record must contain all of the information to 1) satisfy
    the table constraints (such as `NOT NULL` restrictions) on the dimension table,
    and 2) create a uniquely identifiable dimension row using the business key column(s).
    Also, since we’re deriving the newly added dimension member from the incoming
    fact records, in most cases, it can be reasonably assumed that the incoming fact
    data will not completely describe the dimension member. For that reason, you should
    also complement this design pattern with a process that attempts to fill in the
    missing dimension elements (which may already be addressed as part of a comprehensive
    slowly changing dimension strategy).


    As shown in [Figure 11-10](#9781484200834_Ch11.xhtml#Fig10), here we use a methodology
    similar to the previous example. However, instead of simply assigning the value
    of the unknown member using the `Derived Column` transform, we leverage an instance
    of the `OLE DB Command` transform to insert the data for the missing dimension
    record in the fact table into the dimension table. The SQL statement is shown
    in the callout, and in the properties of the `OLE DB` command, we map the placeholders
    (indicated by question marks) to the appropriate values from the fact record.


    ![9781484200834_Fig11-10.jpg](images/9781484200834_Fig11-10.jpg)


    [Figure 11-10](#9781484200834_Ch11.xhtml#_Fig10). Adding the missing dimension
    member


    After adding the missing member, we send those rows to a secondary `ItemID` lookup,
    which will attempt (successfully, unless something goes terribly wrong) to match
    the previously unmatched data with the newly added dimension records in the `DimItem`
    table. It is important that you remember to set the cache mode to either `Partial
    Cache` or `No Cache` when using a secondary lookup in this manner. The default
    lookup cache setting (`Full Cache`) will buffer the contents of the `Item` dimension
    table before the data flow is initiated, and as a result, none of the rows added
    during package execution would be present in this secondary lookup. To prevent
    all of these redirected fact rows from failing the secondary `Item` dimension
    lookup, use one of the non-default cache methods to force the package to perform
    an on-demand lookup to include the newly added dimension values.


    Regarding the secondary lookup transformation methodology, you might wonder if
    the second lookup is even necessary. After all, if we perform the insert in the
    previous step (`OLE DB` command), couldn’t we just collect the new `Item` dimension
    key value (a SQL Server table identity value, in most cases) using that SQL statement?
    The answer is a qualified yes, and in my experience, that is the simpler of the
    two options. However, I’ve also found that some ETL situations—in particular,
    the introduction of parallel processes performing the same on-the-fly addition
    of dimension members—can cloud the issue of collecting the identity value of the
    most recently inserted record. From that perspective, I lean toward using the
    secondary lookup in cases such as this.


    ## Triage the Lookup Failures


    For missing dimension records, the most common approaches typically involve one
    of the preceding. However, on occasion it will be necessary to delay the processing
    of fact records that do not match an existing dimension record. In cases such
    as this, you’ll need to create a triage table that will store the interim records
    until they can be successfully matched to the proper dimension.


    As shown in [Figure 11-11](#9781484200834_Ch11.xhtml#Fig11), we’re adding a couple
    of additional components to the ETL pipeline for this design pattern. At the outset,
    we need to use two separate sources of data: one to bring in the new data from
    the source system, and the other for reintroducing previously triaged data into
    the pipeline. Further into the data flow, the example shows that we are redirecting
    the unmatched fact records to another table rather than trying to fix the data
    inline.


    ![9781484200834_Fig11-11.jpg](images/9781484200834_Fig11-11.jpg)


    [Figure 11-11](#9781484200834_Ch11.xhtml#_Fig11). Use a triage table to store
    unmatched fact data


    As an aside, this pattern could be modified to support manual intervention for
    correcting failed lookups as well. If the business and technical requirements
    are such that the unmatched fact data must be reviewed and corrected by hand (as
    opposed to a systematic cleanup), you could eliminate the triage source so that
    the triage data is not reintroduced into the data flow.


    ## Coding to Allow Errors


    Although it may sound like an oxymoron, it’s actually a common practice to code
    for known errors. In my experience, the nature of most ETL errors dictates that
    the package execution can continue, and any errors or anomalies that cannot be
    addressed inline are triaged, as shown in the previous example (with the appropriate
    notification to the person responsible, if manual intervention is required), for
    later resolution. However, there are situations where the data warehouse ETL process
    should be designed to fail if error conditions arise.


    Consider the case of financial data. Institutions that store or process financial
    data are subject to frequent and comprehensive audits, and if inconsistent data
    appeared in a governmental review of the data, it could spell disaster for the
    organization and its officers. Even though a data warehouse may not be subject
    to the same to-the-penny auditing scrutiny as OLTP systems, there is still an
    expectation of consistency when matters of money and governmental regulation are
    involved. In the case of a data warehouse load where nonconforming data is encountered,
    quite possibly the best thing to occur is that the package fails gracefully, rolling
    back any changes made as part of the load.


    ## Fail Package on Error


    Extending the financial data example mentioned previously, let’s examine the design
    pattern to facilitate a failure in the event of a lookup error. In reality, this
    is the default behavior. As shown in [Figure 11-12](#9781484200834_Ch11.xhtml#Fig12),
    we use the default setting of `Fail Component` on the lookup components, which
    stops the execution of the package if a row is encountered that cannot be matched
    to either the `GL Account` or `GL Subaccount` lookup.


    ![9781484200834_Fig11-12.jpg](images/9781484200834_Fig11-12.jpg)


    [Figure 11-12](#9781484200834_Ch11.xhtml#_Fig12). Allow the package to fail upon
    error


    It’s worth noting here that to properly use this design pattern, you must include
    some logic to roll back changes due to a partial load. If you encounter a fact
    row that does not match one of the lookup components, the package will still fail;
    however, you may commit rows preceding the errored row that have already been
    sent to the destination to that table before the failure and can cause all the
    data to be in an inconsistent state.


    There are several ways to accomplish this rollback behavior:'
