    \ 属性下拉列表中，选择（或创建一个到）SSISDB 数据库的连接。在 SQLStatement 属性中，输入 `custom.GetApplicationPackages`。将\
    \ `IsQueryStoredProcedure` 属性设置为 `True`。将 ResultSet 属性更改为 `Full result set`。\n\
    \n导航到 Parameter Mapping 页面并点击 Add 按钮。点击 Variable Name 下拉列表并选择列表最顶部的 `$Package::ApplicationName`。将\
    \ Data Type 更改为 String，将 Parameter Name 更改为 `ApplicationName`。这将父包参数中的值映射到 `ApplicationName`\
    \ 参数，该参数在 Execute SQL 任务调用 `custom.GetApplicationPackages` 存储过程时传递。\n\n导航到 Result\
    \ Set 页面并点击 Add 按钮。如果 Add 按钮是禁用的，说明你没有将 General 页面上的 ResultSet 属性从默认设置（None）更改。如果\
    \ ResultSet 设置为任何其他设置，Add 按钮就会启用。为 Result Name 输入 `0`。在 Variable Name 下拉列表中，创建一个名为\
    \ `Packages` 的变量。对于这个变量，将 Value Type 属性设置为 `Object`。"
