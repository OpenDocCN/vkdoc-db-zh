  trans: '

    尽管两种模型各有其适用场景，且 `PDW` 同时支持两者，但从技术和业务角度来看，`ELT` 与 `PDW` 的搭配更具优势。在技术层面，`PDW` 能够利用其大规模并行处理（`MPP`）能力，更高效地加载和转换海量数据。从业务角度而言，让更多数据共置一处，能在转换过程中提取出更有价值的信息。拥有
    `MPP` 系统的企业常常发现，能够共置并转换大量异构数据，使它们能够从被动响应的数据集市（*这款产品我们卖出了多少？*）跃升至预测性数据建模（*我们如何才能卖出*
    *更多* *这款产品？*）。


    决定采用 `ELT` 策略并不意味着你的 `Integration Services` 包就完全不需要执行任何转换。事实上，许多 `Integration
    Services` 包可能需要进行数据类型转换。表 8-1 展示了 `PDW` 支持的数据类型及其对应的 `Integration Services` 数据类型。


    表 8-1. `PDW` 与 `Integration Services` 的数据类型映射


    | `SQL Server PDW` 数据类型 | 映射到 `SQL Server PDW` 数据类型的 `Integration Services` 数据类型
    |

    | --- | --- |

    | `BIT` | `DT_BOOL` |

    | `BIGINT` | `DT_I1`, `DT_I2`, `DT_I4`, `DT_I8`, `DT_UI1`, `DT_UI2`, `DT_UI4`
    |

    | `CHAR` | `DT_STR` |

    | `DATE` | `DT_DBDATE` |

    | `DATETIME` | `DT_DATE`, `DT_DBDATE`, `DT_DBTIMESTAMP`, `DT_DBTIMESTAMP2` |

    | `DATETIME2` | `DT_DATE`, `DT_DBDATE`, `DT_DBTIMESTAMP`, `DT_DBTIMESTAMP2` |

    | `DATETIMEOFFSET` | `DT_WSTR` |

    | `DECIMAL` | `DT_DECIMAL`, `DT_I1`, `DT_I2`, `DT_I4`, `DT_I4`, `DT_I8`, `DT_NUMERIC`,
    `DT_UI1`, `DT_UI2`, `DT_UI4`, `DT_UI8` |

    | `FLOAT` | `DT_R4`, `DT_R8` |

    | `INT` | `DT_I1`, `DTI2`, `DT_I4`, `DT_UI1`, `DT_UI2` |

    | `MONEY` | `DT_CY` |

    | `NCHAR` | `DT_WSTR` |

    | `NUMERIC` | `DT_DECIMAL`, `DT_I1`, `DT_I2`, `DT_I4`, `DT_I8`, `DT_NUMERIC`,
    `DT_UI1`, `DT_UI2`, `DT_UI4`, `DT_UI8` |

    | `NVARCHAR` | `DT_WSTR`, `DT_STR` |

    | `REAL` | `DT_R4` |

    | `SMALLDATETIME` | `DT_DBTIMESTAMP2` |

    | `SMALLINT` | `DT_I1`, `DT_I2`, `DT_UI1` |

    | `SMALLMONEY` | `DT_R4` |

    | `TIME` | `DT_WSTR` |

    | `TINYINT` | `DT_I1` |

    | `VARBINARY` | `DT_BYTES` |

    | `VARCHAR` | `DT_STR` |


    另外，值得注意的是，在撰写本文时，`PDW` 目前不支持以下数据类型：


    *   `DT_DBTIMESTAMPOFFSET`

    *   `DT_DBTIME2`

    *   `DT_GUID`

    *   `DT_IMAGE`

    *   `DT_NTEXT`

    *   `DT_TEXT`


    任何这些不受支持的数据类型都需要使用 `Data Conversion` 转换组件转换为兼容的数据类型。稍后我们将逐步演示如何执行此类转换。


    ## PDW 的数据导入模式


    现在你已经对 `APS` 设备的架构和加载概念有了基本了解，我们准备好开始介绍将数据导入 `PDW` 的模式。


    ### 先决条件


    所有 `Integration Services` 包都将从加载服务器执行。*加载服务器* 是驻留在你的网络上、运行 `Windows Server 2008
    R2` 或更新版本的非设备服务器。加载服务器通过 `Ethernet` 或 `InfiniBand`（推荐后者以获得更好性能）连接到 `APS` 设备。此外，加载服务器需要访问控制节点的权限，并且必须安装
    `Integration Services` 和 `PDW` 目标适配器。


    `PDW` 目标适配器的要求会因你运行的 `PDW` 和 `Integration Services` 版本而异。`PDW` 文档详细概述了各种要求和安装说明。有关更多信息，请参阅你的
    `PDW` 文档中的“安装 Integration Services 目标适配器 (SQL Server PDW)”部分。


    在加载服务器上安装好 `PDW` 目标适配器后，我们就可以开始创建模拟数据了。


    ### 准备数据


    为了准备将数据从 `SQL Server` 移动到 `PDW`，你需要在 `SQL Server` 中创建一个数据库并用一些测试数据填充它。在你最喜欢的查询编辑器（如
    `SQL Server Management Studio` (`SSMS`)）中执行 清单 8-1 中的 `T-SQL` 代码，以创建一个名为 `PDW_Example`
    的新数据库。


    ***清单 8-1***. 创建 `SQL Server` 数据库的 `T-SQL` 代码示例


    ```sql

    USE [master];

    GO


    /* 创建一个用于实验的数据库 */

    CREATE DATABASE [PDW_Example]

        ON PRIMARY

        (

            NAME = N''PDW_Example''

          , FILENAME = N''C:\Program Files\Microsoft SQL Server\MSSQL12.MSSQLSERVER\
    MSSQL\DATA\PDW_Example.mdf''

          , SIZE = 1024MB

          , MAXSIZE = UNLIMITED

          , FILEGROWTH = 1024MB

        )

        LOG ON

        (

            NAME = N''PDW_Example_Log''

          , FILENAME = N''C:\Program Files\Microsoft SQL Server\MSSQL12.MSSQLSERVER\
    MSSQL\DATA\PDW_Example_Log.ldf''

          , SIZE = 256MB

          , MAXSIZE = UNLIMITED

          , FILEGROWTH = 256MB

        );

    GO

    ```


    请注意，你的数据库文件路径会因具体安装细节而有所不同。


    接下来，创建一个表并用一些数据填充它。正如我们之前讨论的，`Integration Services` 最适合处理可以多线程操作的大型表。一个很好的例子是按年份分区的
    `销售` `事实` 表。清单 8-2 将提供创建表和分区依赖项所需的 `T-SQL` 代码。


    ***清单 8-2***. 在 `SQL Server` 中创建分区表的 `T-SQL` 代码示例


    ```sql

    USE PDW_Example;

    GO


    /* 创建分区函数 */

    CREATE PARTITION FUNCTION example_yearlyDateRange_pf

    (DATETIME) AS RANGE RIGHT

    FOR VALUES(''2013-01-01'', ''2014-01-01'', ''2015-01-01'');

    GO


    /* 将分区函数与分区方案关联 */

    CREATE PARTITION SCHEME example_yearlyDateRange_ps

    AS PARTITION example_yearlyDateRange_pf ALL TO([Primary]);

    GO


    /* 创建一个用于实验的分区事实表 */

    CREATE TABLE PDW_Example.dbo.FactSales (

         orderID            INT IDENTITY(1,1)

       , orderDate          DATETIME

       , customerID         INT

       , webID              UNIQUEIDENTIFIER DEFAULT (NEWID())


    CONSTRAINT PK_FactSales

            PRIMARY KEY CLUSTERED

            (

                  orderDate

                , orderID

            )

    ) ON example_yearlyDateRange_ps(orderDate);

    ```


    ![Image](img/sq.jpg) **注意** 上面的语法报错？分区功能仅在 `SQL Server 企业版` 和 `开发人员版` 中可用。如果你使用的是非
    `企业版` 或 `开发人员版`，可以注释掉最后一行中的分区设置


    `ON example_yearlyDateRange_ps(orderDate);`


    并将其替换为


    `ON [Primary];`


    接下来，你需要使用 清单 8-3 中的 `T-SQL` 生成数据。这将是你加载到 `PDW` 的数据。


    ***清单 8-3***. 用示例数据填充表的 `T-SQL` 代码示例


    ```sql

    /* 声明变量并用一个任意日期初始化 */

    DECLARE @startDate DATETIME = ''2013-01-01'';


    /* 对 FactSales 表执行迭代插入 */

    WHILE @startDate < ''2016-01-01''

    BEGIN


    INSERT INTO PDW_Example.dbo.FactSales (orderDate, customerID)

        SELECT @startDate

            , DATEPART(WEEK, @startDate) + DATEPART(HOUR, @startDate);


    /* 将日期值增加一小时；如需更多测试数据，

    可将 HOUR 替换为 MINUTE 或 SECOND */

        SET @startDate = DATEADD(HOUR, 1, @startDate);


    END;

    ```


    此脚本将在 `FactSales` 表中生成大约 26,000 行数据，跨越 3 年，不过你可以通过将 `DATEADD` 语句中的 `HOUR` 替换为
    `MINUTE` 甚至 `SECOND` 来轻松增加生成的行数。


    现在你有了一个可用的数据源，可以开始处理你的 `Integration Services` 包了。


    ## 包概述

    '
- fmt: "Let’s discuss what your package will do. You are going to configure a data\
    \ flow that will move data from SQL Server to PDW. You will create a connection\
    \ to your data source via an OLE DB Source. Because `UNIQUEIDENTIFIER` (also known\
    \ as a `GUID`) is not yet supported as a data type in PDW, you will transform\
    \ the `UNIQUEIDENTIFIER` to a Unicode `string (DT_WSTR)` using a data conversion.\
    \ You will then configure the PDW destination adapter to load data into the APS\
    \ appliance. Lastly, you will multithread the package, which takes advantage of\
    \ PDW’s parallelization to improve load performance.\n\nOne easy way to multithread\
    \ is to create multiple data flows that execute in parallel for the same table.\
    \ You can have up to ten simultaneous loads—ten data flows—for a table. The challenge\
    \ with simultaneous loading, however, is to avoid causing too much contention\
    \ on the source system. You can minimize contention by isolating each data flow\
    \ to a separate, equal portion of the clustered index. Better yet, if you have\
    \ SQL Server Enterprise Edition, you can isolate each data flow by loading by\
    \ partition. This latter method is preferable and is the approach our example\
    \ will use.\n\nNow that you understand the general structure of the Integration\
    \ Services package, let’s create it.\n\n## The Data Source\n\nIf you have not\
    \ already done so, create a new Integration Services project named `PDW_Example`\
    \ (File ![image](images/arrow.jpg) New ![image](images/arrow.jpg) Project ![image](images/arrow.jpg)\
    \ Integration Services Project).\n\nAdd a Data Flow task to the control flow designer\
    \ surface. Name it `PDW Import`.\n\nAdd an OLE DB Source to the designer surface\
    \ from the SSIS Toolbox. Edit the properties of the OLE DB Source by double-clicking\
    \ on the icon. You should see the source editor shown in [Figure 8-2](#9781484200834_Ch08.xhtml#Fig2).\n\
    \n![9781484200834_Fig08-02.jpg](images/9781484200834_Fig08-02.jpg)\n\n[Figure\
    \ 8-2](#9781484200834_Ch08.xhtml#_Fig2). The OLE DB Source Editor\n\nYou will\
    \ need to create an OLE DB Connection Manager that points to the `PDW_Example`\
    \ database. Once this is done, change the data access mode to `SQL Command`; then\
    \ enter the code in [Listing 8-4](#9781484200834_Ch08.xhtml#list4).\n\n[**Listing\
    \ 8-4**](#9781484200834_Ch08.xhtml#list4). Example SQL Command\n\n```\n/* Retrieve\
    \ sales for 2013 */\nSELECT\n      orderID\n    , orderDate\n    , customerID\n\
    \    , webID\nFROM PDW_Example.dbo.FactSales\nWHERE orderDate >= '2013-01-01'\n\
    \    AND orderDate < '2014-01-01';\n```\n\nYour OLE DB Source Editor should look\
    \ similar to [Figure 8-2](#9781484200834_Ch08.xhtml#Fig2). Click `Preview` to\
    \ verify the results, then click `OK` to close the editor.\n\nThis code is simple,\
    \ but it’s doing something pretty important. By searching the `FactSales` table\
    \ on `orderDate`—the column specified as the partitioning key in [Listing 8-2](#9781484200834_Ch08.xhtml#list2)—SQL\
    \ Server is able to perform partition elimination, which is important for minimizing\
    \ I/O contention. This provides a natural boundary for each data flow that is\
    \ both easy to understand and performs well. You can achieve a similar result\
    \ even without partitioning `FactSales` by performing a sequential seek on the\
    \ clustered index, `orderDate`. But what if `FactSales` was clustered on just\
    \ `orderID` instead? You can apply the same principles and achieve good performance\
    \ by searching for an evenly distributed number of sequential rows in each data\
    \ flow. For example, if `FactSales` has 1,000,000 rows and we are using 10 data\
    \ flows, each OLE DB Source should search for 100,000 rows (i.e., `orderID >=\
    \ 1 and orderID < 100000; orderID >= 100000 and orderID < 200000;` and so on).\
    \ These types of design considerations can have a significant impact on the overall\
    \ performance of your Integration Services package.\n\n> **Tip** Not familiar\
    \ with partitioning? Table partitioning is particularly well suited for large\
    \ data warehouse environments and offers more than just the benefits briefly mentioned\
    \ here. More information is available in the whitepaper, “Partitioned Table and\
    \ Index Strategies Using SQL Server 2008,” at `http://msdn.microsoft.com/en-us/library/dd578580.aspx`.\n\
    \n## The Data Transformation\n\nAs you may recall, the source table has a `UNIQUEIDENTIFIER`\
    \ column that is stored as a `CHAR(38)` column in PDW. In order to load this data,\
    \ we will need to transform the `UNIQUEIDENTIFER` to a Unicode string. To do this,\
    \ drag the `Data Conversion` icon from the SSIS Toolbox to the designer surface.\
    \ Next, connect the blue data flow arrow from `OLE DB Source` to `Data Conversion`,\
    \ as shown in [Figure 8-3](#9781484200834_Ch08.xhtml#Fig3).\n\n![9781484200834_Fig08-03.jpg](images/9781484200834_Fig08-03.jpg)\n\
    \n[Figure 8-3](#9781484200834_Ch08.xhtml#_Fig3). Connecting the OLE DB Source\
    \ to the Data Conversion\n\nDouble-click on the `Data Conversion` icon to open\
    \ the Data Conversion Transformation Editor. Click on the box to the left of `webID`;\
    \ then edit its properties to reflect the following values:\n\n*   **Input Column:**\
    \ `webID`\n*   **Output Alias:** `webID_converted`\n*   **Data Type:** `string\
    \ [DT_WSTR]`\n*   **Length:** `38`\n\nConfirm that the settings match those in\
    \ [Figure 8-4](#9781484200834_Ch08.xhtml#Fig4), then click `OK`.\n\n![9781484200834_Fig08-04.jpg](images/9781484200834_Fig08-04.jpg)\n\
    \n[Figure 8-4](#9781484200834_Ch08.xhtml#_Fig4). The Data Conversion Transformation\
    \ Editor\n\n> **Tip** Wonder why we use a string length of 38 when converting\
    \ a `UNIQUEIDENTIFIER` to a `CHAR`? This is because the global representation\
    \ of a GUID is `{00000000-0000-0000-0000-000000000000}`. The curly brackets are\
    \ stored implicitly in SQL Server for `UNIQUEIDENTIFIER` columns. Thus, during\
    \ conversion, Integration Services materializes the curly brackets for export\
    \ to the destination system. That is why, although a `UNIQUEIDENTIFIER` may *look*\
    \ like it would only consume 36 bytes, it actually requires 38 bytes to store\
    \ in PDW.\n\n## The Data Destination\n\nThe next few tasks, which prepare the\
    \ PDW appliance for receiving `FactSales` data, will take place in SQL Server\
    \ Data Tools—or just SSDT for short. Please refer to the section, “Install SQL\
    \ Server Data Tools for Visual Studio (SQL Server PDW),” in the PDW documentation\
    \ for more information on connecting to PDW from SSDT.\n\nBefore we go any further,\
    \ we should discuss the use of a *staging database*. Although it is not required,\
    \ Microsoft recommends that you use a staging database during incremental loads\
    \ to reduce table fragmentation. When you use a staging database, the data is\
    \ first loaded into a temporary table in the staging database before it is inserted\
    \ into the permanent table in the destination database.\n\n> **Tip** Using a staging\
    \ database? Make sure your staging database has enough space available to accommodate\
    \ all tables being loaded concurrently. If you do not allocate enough space initially,\
    \ don’t worry; you’ll still be okay—the staging database will autogrow. Your loads\
    \ may just slow down while the autogrow is occurring. Also, your staging database\
    \ will likely need to be larger when you perform the initial table loads during\
    \ system deployment and migration. However, once your system becomes more mature\
    \ and the initial ramp-up is complete, you can recover some space by dropping\
    \ and re-creating a smaller staging database.\n\nFrom within SSDT, execute the\
    \ code in [Listing 8-5](#9781484200834_Ch08.xhtml#list5) on your PDW appliance\
    \ to create a staging database.\n\n[**Listing 8-5**](#9781484200834_Ch08.xhtml#_list5).\
    \ PDW Code to Run from SSDT to Create a Staging Database\n\n```\nCREATE DATABASE\
    \ StageDB_Example\nWITH\n(\n      AUTOGROW                 = ON\n    , REPLICATED_SIZE\
    \          = 1 GB\n    , DISTRIBUTED_SIZE         = 5 GB\n    , LOG_SIZE     \
    \            = 1 GB\n);\n```"
  raw: 'Let’s discuss what your package will do. You are going to configure a data
    flow that will move data from SQL Server to PDW. You will create a connection
    to your data source via an OLE DB Source. Because `UNIQUEIDENTIFIER` (also known
    as a `GUID`) is not yet supported as a data type in PDW, you will transform the
    `UNIQUEIDENTIFIER` to a Unicode `string (DT_WSTR)` using a data conversion. You
    will then configure the PDW destination adapter to load data into the APS appliance.
    Lastly, you will multithread the package, which takes advantage of PDW’s parallelization
    to improve load performance.


    One easy way to multithread is to create multiple data flows that execute in parallel
    for the same table. You can have up to ten simultaneous loads—ten data flows—for
    a table. The challenge with simultaneous loading, however, is to avoid causing
    too much contention on the source system. You can minimize contention by isolating
    each data flow to a separate, equal portion of the clustered index. Better yet,
    if you have SQL Server Enterprise Edition, you can isolate each data flow by loading
    by partition. This latter method is preferable and is the approach our example
    will use.


    Now that you understand the general structure of the Integration Services package,
    let’s create it.


    The Data Source


    If you have not already done so, create a new Integration Services project named
    `PDW_Example` (File ![image](images/arrow.jpg) New ![image](images/arrow.jpg)
    Project ![image](images/arrow.jpg) Integration Services Project).


    Add a Data Flow task to the control flow designer surface. Name it **PDW Import***.*


    Add an OLE DB Source to the designer surface from the SSIS Toolbox. Edit the properties
    of the OLE DB Source by double-clicking on the icon. You should see the source
    editor shown in [Figure 8-2](#9781484200834_Ch08.xhtml#Fig2).


    ![9781484200834_Fig08-02.jpg](images/9781484200834_Fig08-02.jpg)


    [Figure 8-2](#9781484200834_Ch08.xhtml#_Fig2). The OLE DB Source Editor


    You will need to create an OLE DB Connection Manager that points to the `PDW_Example`
    database. Once this is done, change the data access mode to **SQL Command**; then
    enter the code in [Listing 8-4](#9781484200834_Ch08.xhtml#list4).


    [***Listing 8-4***](#9781484200834_Ch08.xhtml#list4). Example SQL Command


    ```

    /* Retrieve sales for 2013 */


    SELECT

          orderID

        , orderDate

        , customerID

        , webID

    FROM PDW_Example.dbo.FactSales

    WHERE orderDate >= ''2013-01-01''

        AND orderDate < ''2014-01-01'';

    ```


    Your OLE DB Source Editor should look similar to [Figure 8-2](#9781484200834_Ch08.xhtml#Fig2).
    Click Preview to verify the results, then click OK to close the editor.


    This code is simple, but it’s doing something pretty important. By searching the
    `FactSales` table on `orderDate`—the column specified as the partitioning key
    in [Listing 8-2](#9781484200834_Ch08.xhtml#list2)—SQL Server is able to perform
    partition elimination, which is important for minimizing I/O contention. This
    provides a natural boundary for each data flow that is both easy to understand
    and performs well. You can achieve a similar result even without partitioning
    `FactSales` by performing a sequential seek on the clustered index, `orderDate`.
    But what if `FactSales` was clustered on just `orderID` instead? You can apply
    the same principles and achieve good performance by searching for an evenly distributed
    number of sequential rows in each data flow. For example, if `FactSales` has 1,000,000
    rows and we are using 10 data flows, each OLE DB Source should search for 100,000
    rows (i.e., `orderID >= 1 and orderID < 100000; orderID >= 100000 and orderID
    < 200000;` and so on). These types of design considerations can have a significant
    impact on the overall performance of your Integration Services package.


    ![Image](images/sq.jpg) **Tip**  Not familiar with partitioning? Table partitioning
    is particularly well suited for large data warehouse environments and offers more
    than just the benefits briefly mentioned here. More information is available in
    the whitepaper, “Partitioned Table and Index Strategies Using SQL Server 2008,”
    at `http://msdn.microsoft.com/en-us/library/dd578580.aspx`.


    The Data Transformation


    As you may recall, the source table has a `UNIQUEIDENTIFIER` column that is stored
    as a `CHAR(38)` column in PDW. In order to load this data, we will need to transform
    the UNIQUEIDENTIFER to a Unicode string. To do this, drag the Data Conversion
    icon from the SSIS Toolbox to the designer surface. Next, connect the blue data
    flow arrow from OLE DB Source to Data Conversion, as shown in [Figure 8-3](#9781484200834_Ch08.xhtml#Fig3).


    ![9781484200834_Fig08-03.jpg](images/9781484200834_Fig08-03.jpg)


    [Figure 8-3](#9781484200834_Ch08.xhtml#_Fig3). Connecting the OLE DB Source to
    the Data Conversion


    Double-click on the Data Conversion icon to open the Data Conversion Transformation
    Editor. Click on the box to the left of `webID`; then edit its properties to reflect
    the following values:


    *   **Input Column:** `webID`

    *   **Output Alias:**

    *   **Data Type:** string [DT_WSTR]

    *   **Length:** 38


    Confirm that the settings match those in [Figure 8-4](#9781484200834_Ch08.xhtml#Fig4),
    then click OK.


    ![9781484200834_Fig08-04.jpg](images/9781484200834_Fig08-04.jpg)


    [Figure 8-4](#9781484200834_Ch08.xhtml#_Fig4). The Data Conversion Transformation
    Editor


    ![Image](images/sq.jpg) **Tip**  Wonder why we use a string length of 38 when
    converting a `UNIQUEIDENTIFIER` to a `CHAR`? This is because the global representation
    of a GUID is `{00000000-0000-0000-0000-000000000000}`. The curly brackets are
    stored implicitly in SQL Server for `UNIQUEIDENTIFIER` columns. Thus, during conversion,
    Integration Services materializes the curly brackets for export to the destination
    system. That is why, although a `UNIQUEIDENTIFIER` may *look* like it would only
    consume 36 bytes, it actually requires 38 bytes to store in PDW.


    The Data Destination


    The next few tasks, which prepare the PDW appliance for receiving `FactSales`
    data, will take place in SQL Server Data Tools—or just SSDT for short. Please
    refer to the section, “Install SQL Server Data Tools for Visual Studio (SQL Server
    PDW),” in the PDW documentation for more information on connecting to PDW from
    SSDT.


    Before we go any further, we should discuss the use of a *staging database*. Although
    it is not required, Microsoft recommends that you use a staging database during
    incremental loads to reduce table fragmentation. When you use a staging database,
    the data is first loaded into a temporary table in the staging database before
    it is inserted into the permanent table in the destination database.


    ![Image](images/sq.jpg) **Tip**  Using a staging database? Make sure your staging
    database has enough space available to accommodate all tables being loaded concurrently.
    If you do not allocate enough space initially, don’t worry; you’ll still be okay—the
    staging database will autogrow. Your loads may just slow down while the autogrow
    is occurring. Also, your staging database will likely need to be larger when you
    perform the initial table loads during system deployment and migration. However,
    once your system becomes more mature and the initial ramp-up is complete, you
    can recover some space by dropping and re-creating a smaller staging database.


    From within SSDT, execute the code in [Listing 8-5](#9781484200834_Ch08.xhtml#list5)
    on your PDW appliance to create a staging database.


    [***Listing 8-5***](#9781484200834_Ch08.xhtml#_list5). PDW Code to Run from SSDT
    to Create a Staging Database


    ```

    CREATE DATABASE StageDB_Example

    WITH

    (

          AUTOGROW                  = ON

        , REPLICATED_SIZE           = 1 GB

        , DISTRIBUTED_SIZE          = 5 GB

        , LOG_SIZE                  = 1 GB

    );

    ```'
  trans: "\n让我们来讨论你的数据包将要实现的功能。你将配置一个数据流，将数据从 SQL Server 移动到 PDW。你将通过一个 OLE DB 源创建与数据源的连接。由于\
    \ `UNIQUEIDENTIFIER`（也称为 `GUID`）在 PDW 中尚未作为数据类型得到支持，你将使用数据转换将 `UNIQUEIDENTIFIER`\
    \ 转换为 Unicode 字符串 `string (DT_WSTR)`。接着，你将配置 PDW 目标适配器，以将数据加载到 APS 设备中。最后，你将对数据包进行多线程处理，这利用了\
    \ PDW 的并行处理能力来提升加载性能。\n\n实现多线程的一个简单方法是为同一张表创建多个并行执行的数据流。一张表最多可以同时进行十次加载——即十个数据流。然而，同时加载面临的挑战在于避免对源系统造成过多争用。你可以通过将每个数据流隔离到集群索引的独立、均等部分来最小化争用。更好的做法是，如果你拥有\
    \ SQL Server 企业版，你可以通过按分区加载来隔离每个数据流。后一种方法更为可取，也是我们的示例将采用的方法。\n\n既然你已经理解了 Integration\
    \ Services 数据包的总体结构，让我们开始创建它吧。\n\n## 数据源\n\n如果尚未完成，请创建一个名为 `PDW_Example` 的新 Integration\
    \ Services 项目（文件 ![image](img/arrow.jpg) 新建 ![image](img/arrow.jpg) 项目 ![image](img/arrow.jpg)\
    \ Integration Services 项目）。\n\n将数据流任务添加到控制流设计器界面。将其命名为 `PDW Import`。\n\n从 SSIS\
    \ 工具箱中将 OLE DB 源添加到设计器界面。双击图标以编辑 OLE DB 源的属性。你应该会看到如 图 8-2 所示的源编辑器。\n\n![9781484200834_Fig08-02.jpg](img/9781484200834_Fig08-02.jpg)\n\
    \n图 8-2. OLE DB 源编辑器\n\n你需要创建一个指向 `PDW_Example` 数据库的 OLE DB 连接管理器。完成后，将数据访问模式更改为\
    \ `SQL 命令`；然后在 清单 8-4 中输入代码。\n\n**清单 8-4**. SQL 命令示例\n\n```\n/* 检索 2013 年的销售数据\
    \ */\nSELECT\n      orderID\n    , orderDate\n    , customerID\n    , webID\n\
    FROM PDW_Example.dbo.FactSales\nWHERE orderDate >= '2013-01-01'\n    AND orderDate\
    \ < '2014-01-01';\n```\n\n你的 OLE DB 源编辑器应与 图 8-2 类似。点击 `预览` 以验证结果，然后点击 `确定` 关闭编辑器。\n\
    \n这段代码很简单，但它实现了一个相当重要的功能。通过按 `orderDate`（在 清单 8-2 中指定为分区键的列）搜索 `FactSales` 表，SQL\
    \ Server 能够执行分区消除，这对于最小化 I/O 争用非常重要。这为每个数据流提供了一个既易于理解又性能良好的自然边界。即使不对 `FactSales`\
    \ 进行分区，你也可以通过执行集群索引 `orderDate` 上的顺序查找来实现类似的结果。但如果 `FactSales` 仅以 `orderID` 作为集群键呢？你可以应用相同的原理，通过在每个数据流中搜索均匀分布的连续行数来获得良好的性能。例如，如果\
    \ `FactSales` 有 1,000,000 行，而我们使用 10 个数据流，那么每个 OLE DB 源应搜索 100,000 行（即 `orderID\
    \ >= 1 and orderID < 100000; orderID >= 100000 and orderID < 200000;` 等）。这类设计考虑因素可能对\
    \ Integration Services 数据包的整体性能产生重大影响。\n\n> **提示** 不熟悉分区？表分区特别适合大型数据仓库环境，并且提供的益处远不止这里简要提到的。更多信息请参阅白皮书《使用\
    \ SQL Server 2008 的分区表和索引策略》，网址为 `http://msdn.microsoft.com/en-us/library/dd578580.aspx`。\n\
    \n## 数据转换\n\n你可能还记得，源表中有一个 `UNIQUEIDENTIFIER` 列，在 PDW 中存储为 `CHAR(38)` 列。为了加载此数据，我们需要将\
    \ `UNIQUEIDENTIFER` 转换为 Unicode 字符串。为此，将 `数据转换` 图标从 SSIS 工具箱拖到设计器界面。接下来，将蓝色数据流箭头从\
    \ `OLE DB 源` 连接到 `数据转换`，如 图 8-3 所示。\n\n![9781484200834_Fig08-03.jpg](img/9781484200834_Fig08-03.jpg)\n\
    \n图 8-3. 将 OLE DB 源连接到数据转换\n\n双击 `数据转换` 图标以打开数据转换转换编辑器。点击 `webID` 左侧的框；然后编辑其属性以反映以下值：\n\
    \n*   **输入列:** `webID`\n*   **输出别名:** `webID_converted`\n*   **数据类型:** `string\
    \ [DT_WSTR]`\n*   **长度:** `38`\n\n确认设置与 图 8-4 中的相符，然后点击 `确定`。\n\n![9781484200834_Fig08-04.jpg](img/9781484200834_Fig08-04.jpg)\n\
    \n图 8-4. 数据转换转换编辑器\n\n> **提示** 疑惑为什么将 `UNIQUEIDENTIFIER` 转换为 `CHAR` 时要使用字符串长度\
    \ 38？这是因为 GUID 的全局表示形式是 `{00000000-0000-0000-0000-000000000000}`。在 SQL Server\
    \ 中，`UNIQUEIDENTIFIER` 列隐式存储了花括号。因此，在转换过程中，Integration Services 会具体化这些花括号以便导出到目标系统。这就是为什么，尽管一个\
    \ `UNIQUEIDENTIFIER` 看起来可能只占用 36 个字节，但它在 PDW 中实际存储需要 38 个字节。\n\n## 数据目标\n\n接下来的几项任务将在\
    \ SQL Server Data Tools（简称 SSDT）中进行，这些任务为接收 `FactSales` 数据准备 PDW 设备。有关从 SSDT 连接到\
    \ PDW 的更多信息，请参阅 PDW 文档中的“为 Visual Studio 安装 SQL Server Data Tools (SQL Server\
    \ PDW)”部分。\n\n在继续之前，我们应该讨论一下*暂存数据库*的使用。虽然不是必须的，但 Microsoft 建议你在增量加载期间使用暂存数据库以减少表碎片。当你使用暂存数据库时，数据首先被加载到暂存数据库中的临时表，然后再插入到目标数据库的永久表中。\n\
    \n> **提示** 使用暂存数据库？请确保你的暂存数据库有足够的可用空间来容纳所有同时加载的表。如果最初分配的空间不足，请不要担心；你仍然可以继续——暂存数据库会自动增长。只是你的加载速度可能会在自动增长发生时变慢。此外，在系统部署和迁移期间执行初始表加载时，你的暂存数据库可能需要更大。然而，一旦你的系统变得更加成熟且初始爬坡期完成，你可以通过删除并重新创建一个更小的暂存数据库来回收一些空间。\n\
    \n在 SSDT 中，在你的 PDW 设备上执行 清单 8-5 中的代码以创建一个暂存数据库。\n\n**清单 8-5**. 从 SSDT 运行以创建暂存数据库的\
    \ PDW 代码\n\n```\nCREATE DATABASE StageDB_Example\nWITH\n(\n      AUTOGROW    \
    \             = ON\n    , REPLICATED_SIZE          = 1 GB\n    , DISTRIBUTED_SIZE\
    \         = 5 GB\n    , LOG_SIZE                 = 1 GB\n);\n```\n"
- fmt: "# PDW 中的表分布与复制\n\nPDW 引入了复制表和分布式表的概念。在一个 `distributed table` 中，数据通过在创建表时指定的分布哈希值，被分割存储到所有节点上。在一个\
    \ `replicated table` 中，完整的表数据存在于每一个计算节点上。如果使用得当，复制表通常可以提升连接性能。作为一个假设性的例子，考虑一个只有\
    \ 200 行的小型 `DimCountry` 维度表。`DimCountry` 很可能会被复制，而大得多的 `FactSales` 表则会被分布。这种设计允许\
    \ `FactSales` 和 `DimCountry` 之间的任何连接在每个节点上本地进行。虽然你本质上会创建十个 `DimCountry` 的副本（每个计算节点一个），但本地连接带来的性能提升，远超存储这样一个小表的重复副本所带来的微小成本。\n\
    \n让我们再看一下[清单 8-5](#9781484200834_Ch08.xhtml#list5)中的`CREATE DATABASE`代码。`REPLICATED_SIZE`指定了*每个计算节点*上复制表的空间分配，而`DISTRIBUTED_SIZE`指定了*整个设备*上分布式表的空间分配。这意味着`StageDB_Example`实际上分配了\
    \ 16GB 空间：10GB 用于复制表（10 个计算节点，每个节点 1GB），5GB 用于分布式表，以及 1GB 用于日志。\n\n在 PDW 加载过程中，所有数据都会自动使用页面级压缩进行压缩。这不是可选的，压缩量会因客户和表的不同而有很大差异。如果你使用的是\
    \ SQL Server 企业版或开发版，可以执行[清单 8-6](#9781484200834_Ch08.xhtml#list6)中的语句来估算压缩结果。\n\
    \n**[清单 8-6](#9781484200834_Ch08.xhtml#_list6)**. 估算压缩节省空间的代码\n\n```sql\n/* Estimate\
    \ compression ratio */\nEXECUTE sp_estimate_data_compression_savings\n'dbo', 'FactSales',\
    \ NULL, NULL, 'PAGE';\n```\n\n`sp_estimate_data_compression_savings`的示例结果如[图 8-5](#9781484200834_Ch08.xhtml#Fig5)所示。\n\
    \n![9781484200834_Fig08-05.jpg](images/9781484200834_Fig08-05.jpg)\n\n**[图 8-5](#9781484200834_Ch08.xhtml#_Fig5)**.\
    \ 压缩节省空间示例\n\n通常可以使用 2:1 作为粗略估计。按照 2:1 的压缩比，[清单 8-5](#9781484200834_Ch08.xhtml#list5)中指定的\
    \ 5GB 分布式数据实际上存储了 10GB 未压缩的 SQL Server 数据。\n\n你仍然需要在 PDW 中为导入的数据找一个存储位置。在 SSDT\
    \ 中执行[清单 8-7](#9781484200834_Ch08.xhtml#list7)中的代码，为`FactSales`创建目标数据库和表。\n\n\
    **[清单 8-7](#9781484200834_Ch08.xhtml#_list7)**. 用于创建目标数据库和表的 PDW 代码\n\n```sql\n\
    CREATE DATABASE PDW_Destination_Example\nWITH\n(\n      REPLICATED_SIZE      \
    \     = 1 GB\n    , DISTRIBUTED_SIZE          = 5 GB\n    , LOG_SIZE         \
    \         = 1 GB\n);\n\nCREATE TABLE PDW_Destination_Example.dbo.FactSales\n(\n\
    \     orderID            INT\n   , orderDate          DATETIME\n   , customerID\
    \         INT\n   , webID              CHAR(38)\n)\nWITH\n(\n      DISTRIBUTION\
    \ = HASH (orderID)\n    , CLUSTERED COLUMNSTORE INDEX\n);\n```\n\n现在目标对象已经创建，我们可以回到\
    \ Integration Services 包。将 **SQL Server PDW Destination** 从工具箱拖到数据流 pane 中。双击[图\
    \ 8-6](#9781484200834_Ch08.xhtml#Fig6)所示的 **SQL Server PDW Destination** 来编辑其配置。\n\
    \n![9781484200834_Fig08-06.jpg](images/9781484200834_Fig08-06.jpg)\n\n**[图 8-6](#9781484200834_Ch08.xhtml#_Fig6)**.\
    \ SQL Server PDW Destination\n\n接下来，单击 **Connection Manager** 旁边的下拉箭头，并选择 **<Create\
    \ New Connection. . .>**，如[图 8-7](#9781484200834_Ch08.xhtml#Fig7)所示。\n\n![9781484200834_Fig08-07.jpg](images/9781484200834_Fig08-07.jpg)\n\
    \n**[图 8-7](#9781484200834_Ch08.xhtml#_Fig7)**. SQL Server PDW Destination Editor\n\
    \n在 **SQL Server PDW Connection Manager Editor** 中使用以下项目输入你的连接信息：\n\n*   **Server:**\
    \ 你设备上控制节点的 IP 地址（最佳实践是使用集群 IP 地址以支持控制节点故障转移。）\n*   **User:** 用于向设备进行身份验证的登录名\n\
    *   **Password:** 你的登录密码\n*   **Destination Database:** `PDW_Destination_Example`\n\
    *   **Staging Database:** `StageDB_Example`\n\n让我们讨论一下与此连接信息相关的一些最佳实践。首先，你应该指定控制节点集群的\
    \ IP 地址，而不是活动控制节点服务器的 IP 地址。使用集群 IP 地址将使你的连接在控制节点发生故障转移时，无需手动干预即可继续解析。\n\n其次，PDW\
    \ 支持 SQL Server 和 Active Directory 身份验证。使用 SQL Server 身份验证时，最佳实践是使用 `sa` 以外的账户。这样做将提高\
    \ PDW 设备的安全性。\n\n最后，正如我们之前讨论的，Microsoft 建议为数据加载使用暂存数据库。在 **Staging Database Name**\
    \ 下拉列表中选择暂存数据库。这会指示 PDW 先将数据加载到指定暂存数据库中的临时表，然后再将数据加载到最终的目标数据库。这是可选的，但直接加载到目标数据库会增加碎片。\n\
    \n完成后，你的 **SQL Server PDW Connection Manager Editor** 应类似于[图 8-8](#9781484200834_Ch08.xhtml#Fig8)。单击\
    \ **Test Connection** 以确认你的信息输入正确，然后单击 **OK** 返回到 **SQL Server PDW Destination\
    \ Editor**。\n\n![9781484200834_Fig08-08.jpg](images/9781484200834_Fig08-08.jpg)\n\
    \n**[图 8-8](#9781484200834_Ch08.xhtml#_Fig8)**. SQL Server PDW Connection Manager\
    \ Editor\n\n![Image](images/sq.jpg) **注意**  如果未指定暂存数据库，SQL Server PDW 将直接在目标数据库内执行加载操作，这可能导致高水平的表碎片。\n\
    \n单击 **Destination Table** 字段将弹出 **Select Destination Table** 模型。单击 `FactSales`。有四种可用的加载模式：\n\
    \n*   **Append:** 将行插入到目标表中现有数据的末尾。这可能是你最常用的模式。\n*   **Reload:** 在加载前截断表。\n* \
    \  **Upsert:** 对目标表执行 `MERGE`，其中新数据被插入，现有数据被更新。你需要指定一个或多个用于连接数据的列。\n*   **FastAppend:**\
    \ 顾名思义，FastAppend 是将数据加载到目标表中的最快方式。代价是它不支持回滚；在失败的情况下，你需要负责删除任何部分插入的行。FastAppend\
    \ 还将绕过暂存数据库，导致高水平的碎片。\n\n让我们花点时间讨论一下如何将这两种常见加载模式与这些模式结合使用。如果你正在对大表执行定期的增量加载（例如，用前一天的订单更新事务性销售表），你应该直接使用\
    \ `Append` 模式加载数据，因为不需要转换。现在假设你加载的是相同的数据，但你计划转换数据并加载到集市中，然后再删除临时数据。第二个例子更适合使用\
    \ `FastAppend` 模式。或者更简洁地说，任何时候你加载到一个空的、中间的工作表中时，都可以使用 `FastAppend`。"
  raw: 'PDW introduces the concept of replicated and distributed tables. In a *distributed
    table*, the data is split across all nodes using a distribution hash specified
    during table creation. In a *replicated table*, the full table data exist on every
    Compute node. When used correctly, a replicated table can often improve join performance.
    As a hypothetical example, consider a small `DimCountry` dimension table with
    200 rows. `DimCountry` would likely be replicated, whereas a much larger `FactSales`
    table would be distributed. This design allows any joins between `FactSales` and
    `DimCountry` to take place locally on each node. Although you would essentially
    be creating ten copies of `DimCountry`, one on each Compute node, the performance
    benefit of a local join outweighs the minimal cost of storing duplicate copies
    of such a small table.


    Let’s take another look at the `CREATE DATABASE` code in [Listing 8-5](#9781484200834_Ch08.xhtml#list5).
    `REPLICATED_SIZE` specifies space allocation for replicated tables *on each Compute
    node*, whereas `DISTRIBUTED_SIZE` specifies space allocation for distributed tables
    *across the appliance*. That means `StageDB_Example` actually has 16GB of space
    allocated: 10GB for replicated tables (10 Compute nodes with 1GB each), 5GB for
    distributed tables, and 1GB for the log.


    All data is automatically compressed using page-level compression during the PDW
    load process. This is not optional, and the amount of compression will vary greatly
    from customer to customer and table to table. If you have SQL Server Enterprise
    or Developer Editions, you can execute the statement in [Listing 8-6](#9781484200834_Ch08.xhtml#list6)
    to estimate compression results.


    [***Listing 8-6***](#9781484200834_Ch08.xhtml#_list6). Code to Estimate Compression
    Savings


    ```

    /* Estimate compression ratio */

    EXECUTE sp_estimate_data_compression_savings

    ''dbo'', ''FactSales'', NULL, NULL, ''PAGE'';

    ```


    Example results of `sp_estimate_data_compression_savings` are shown in [Figure
    8-5](#9781484200834_Ch08.xhtml#Fig5).


    ![9781484200834_Fig08-05.jpg](images/9781484200834_Fig08-05.jpg)


    [Figure 8-5](#9781484200834_Ch08.xhtml#_Fig5). Example compression savings


    You can generally use 2:1 as a rough estimate. With a 2:1 compression ratio, the
    5GB of distributed data specified in [Listing 8-5](#9781484200834_Ch08.xhtml#list5)
    actually stores 10GB of uncompressed SQL Server data.


    You still need a place in PDW to store the data you’re importing. Execute the
    code in [Listing 8-7](#9781484200834_Ch08.xhtml#list7) in SSDT to create the destination
    database and table for `FactSales`.


    [***Listing 8-7***](#9781484200834_Ch08.xhtml#_list7). PDW Code to Create the
    Destination Database and Table


    ```

    CREATE DATABASE PDW_Destination_Example

    WITH

    (

          REPLICATED_SIZE           = 1 GB

        , DISTRIBUTED_SIZE          = 5 GB

        , LOG_SIZE                  = 1 GB

    );


    CREATE TABLE PDW_Destination_Example.dbo.FactSales

    (

         orderID            INT

       , orderDate          DATETIME

       , customerID         INT

       , webID              CHAR(38)

    )

    WITH

    (

          DISTRIBUTION = HASH (orderID)

        , CLUSTERED COLUMNSTORE INDEX

    );

    ```


    Now that the destination objects are created, we can return to the Integration
    Services package. Drag the SQL Server PDW Destination from the Toolbox to the
    Data Flow pane. Double-click on the SQL Server PDW Destination, illustrated in
    [Figure 8-6](#9781484200834_Ch08.xhtml#Fig6), to edit its configuration.


    ![9781484200834_Fig08-06.jpg](images/9781484200834_Fig08-06.jpg)


    [Figure 8-6](#9781484200834_Ch08.xhtml#_Fig6). The SQL Server PDW Destination


    Next, click on the down arrow next to Connection Manager and select <Create New
    Connection. . .>, as shown in [Figure 8-7](#9781484200834_Ch08.xhtml#Fig7).


    ![9781484200834_Fig08-07.jpg](images/9781484200834_Fig08-07.jpg)


    [Figure 8-7](#9781484200834_Ch08.xhtml#_Fig7). The SQL Server PDW Destination
    Editor


    Enter your connection information in the SQL Server PDW Connection Manager Editor
    using these items:


    *   **Server:** The IP address of the Control node on your appliance (Best practice
    is to use the clustered IP address to support Control node failover.)

    *   **User:** Your login name for authenticating to the appliance

    *   **Password:** Your login password

    *   **Destination Database:** `PDW_Destination_Example`

    *   **Staging Database:** `StageDB_Example`


    Let’s discuss a few best practices relating to this connection information. First,
    you should specify the IP address of the Control node cluster instead of the IP
    address of the active Control node server. Using the clustered IP address will
    allow your connection to still resolve without manual intervention in the event
    of a Control node failover.


    Secondly, PDW supports both SQL Server and Active Directory authentication. When
    using SQL Server authentication, best practice is to use an account other than
    `sa`. Doing so will improve the security of your PDW appliance.


    Lastly, as we previously discussed, Microsoft recommends the use of a staging
    database for data loads. The staging database is selected in the Staging Database
    Name drop-down. This tells PDW to first load the data to a temporary table in
    the specified staging database before loading the data into the final destination
    database. This is optional, but loading directly into the destination database
    will increase fragmentation.


    When you are done, your SQL Server PDW Connection Manager Editor should resemble
    [Figure 8-8](#9781484200834_Ch08.xhtml#Fig8). Click on Test Connection to confirm
    your information was entered correctly, then click OK to return to the SQL Server
    PDW Destination Editor.


    ![9781484200834_Fig08-08.jpg](images/9781484200834_Fig08-08.jpg)


    [Figure 8-8](#9781484200834_Ch08.xhtml#_Fig8). The SQL Server PDW Connection Manager
    Editor


    ![Image](images/sq.jpg) **Note**  If the staging database is not specified, SQL
    Server PDW will perform the load operation directly within the destination database,
    which can lead to high levels of table fragmentation.


    Clicking on the Destination Table field will bring up a model for Select Destination
    Table. Click on `FactSales`. There are four loading modes available:


    *   **Append:** Inserts the rows at the end of existing data in the destination
    table. This is the mode you are probably most used to.

    *   **Reload:** Truncates the table before load.

    *   **Upsert:** Performs a `MERGE` on the destination table, where new data is
    inserted and existing data is updated. You will need to specify one or more columns
    that will be used to join the data.

    *   **FastAppend:** As its name implies, FastAppend is the fastest way to load
    data into a destination table. The trade-off is that it does not support rollback;
    in the case of a failure, you are responsible for removing any partially inserted
    rows. FastAppend will also bypass the staging database, causing high levels of
    fragmentation.


    Let’s take a moment to discuss how to use these modes with two common load patterns.
    If you are performing regular, incremental loads on a large table (say, updating
    a transactional sales table with the previous day’s orders), you should load the
    data directly using Append, since no transformations are required. Now let’s say
    you’re loading the same data, but you plan to instead transform the data and load
    into a mart before deleting the temporary data. This second example would be better
    suited to the FastAppend mode. Or, to say it more concisely, use FastAppend any
    time you are loading into an empty, intermediate working table.'
