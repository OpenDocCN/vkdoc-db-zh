    \ to XML\n\nThis pattern makes use of the `XmlReader` class to stream in an XML\
    \ document, as well as LINQ to XML functionality to extract the values you want\
    \ to keep. It is ideal for processing large XML documents, since it does not require\
    \ the entire document to be read into memory. It is also well suited for scenarios\
    \ where you want to extract certain fields from the XML document and ignore the\
    \ rest.\n\n![Image](images/sq.jpg) **Note** The idea for this pattern came from\
    \ a post from SQL Server MVP, Simon Sabin. Sample code and other great SSIS content\
    \ can be found on his blog at `http://sqlblogcasts.com/blogs/simons/`.\n\nThe\
    \ key to this pattern is the use of the `XmlReader` class. Instead of using the\
    \ `XDocument` class to read our source XML file (which is the typical approach\
    \ when using LINQ to XML), we’ll create a special function that returns the XML\
    \ as a collection of `XElement`s. This allows us to make use of the LINQ syntax\
    \ while taking advantage of the streaming functionality provided by `XmlReader`.\n\
    \nBefore adding the code, you’ll need to add the following namespaces to your\
    \ `using` statements:\n\n*   `System.Collections.Generic`\n*   `System.Linq`\n\
    *   `System.Xml.Linq`\n\n[Listing 9-9](#9781484200834_Ch09.xhtml#list9) contains\
    \ the code for the `XmlReader` function (`StreamReader`), as well as the `CreateNewOutputRows`\
    \ logic to consume the XML document.\n\n[***Listing 9-9***](#9781484200834_Ch09.xhtml#_list9).\
    \ Script Logic for Using the XmlReader Class\n\n```csharp\npublic override void\
    \ CreateNewOutputRows()\n{\n    foreach (var xdata in (\n        from customer\
    \ in StreamReader(pathToXmlFile, \"Customer\")\n        select new\n        {\n\
    \          Key = customer.Attribute(\"Key\").Value,\n          FirstName = customer.Element(\"\
    Name\").Element(\"FirstName\").Value,\n          LastName = customer.Element(\"\
    Name\").Element(\"LastName\").Value,\n          BirthDate = customer.Element(\"\
    BirthDate\").Value,\n          Gender = customer.Element(\"Gender\").Value,\n\
    \          YearlyIncome = customer.Element(\"YearlyIncome\").Value,\n        }\n\
    \    ))\n    {\n        try\n        {\n          CustomersBuffer.AddRow();\n\
    \          CustomersBuffer.Key = Convert.ToInt32(xdata.Key);\n          CustomersBuffer.FirstName\
    \ = xdata.FirstName;\n          CustomersBuffer.LastName = xdata.LastName;\n \
    \         CustomersBuffer.BirthDate = Convert.ToDateTime(xdata.BirthDate);\n \
    \         CustomersBuffer.Gender = xdata.Gender;\n          CustomersBuffer.YearlyIncome\
    \ = Convert.ToDecimal(xdata.YearlyIncome);\n        }\n        catch (Exception\
    \ e)\n        {\n            string errorMessage = string.Format(\"Error retrieving\
    \ data. Exception message: {0}\",\n                                          \
    \       e.Message);\n            bool bCancel;\n            ComponentMetaData.FireError(0,\
    \ ComponentMetaData.Name, errorMessage, string.Empty, 0,\n                   \
    \                     out bCancel);\n        }\n    }\n}\n\nstatic IEnumerable<XElement>\
    \ StreamReader(String filename, string elementName)\n{\n  using (XmlReader xr\
    \ = XmlReader.Create(filename))\n  {\n      xr.MoveToContent();\n      while (xr.Read())\n\
    \      {\n          while (xr.NodeType == XmlNodeType.Element && xr.Name == elementName)\n\
    \          {\n              XElement node = (XElement)XElement.ReadFrom(xr);\n\
    \              yield return node;\n          }\n      }\n      xr.Close();\n \
    \ }\n}\n```\n\n## Conclusion\n\nThe `XML Source` component lets you process XML\
    \ documents from an SSIS data flow without writing any code. Although it can handle\
    \ most XML schemas, it tends to work best with simple XML documents. When dealing\
    \ with complex XML formats, consider using XSLT to reformat the source document\
    \ to a format that is easily parsed. If you don’t mind writing and maintaining\
    \ .NET code, consider using one of the script component patterns described in\
    \ this chapter when you need more control over how a document is parsed, are working\
    \ with large XML documents, or have specific performance requirements.\n\n# CHAPTER\
    \ 10\n\n![image](images/frontdot.jpg)\n\n# Expression Language Patterns\n\nThe\
    \ expression language in SSIS might appropriately be referred to as the glue that\
    \ holds the product together. Expressions in SSIS provide a relatively simple\
    \ and easy-to-use interface to allow data developers to introduce dynamic logic\
    \ into the ETL infrastructure. When you think through the various moving parts\
    \ within Integration Services, you’ll likely discover that you can manipulate\
    \ all of them in one way or another by using expressions.\n\nExpressions provide\
    \ a fast, effective, and, dare I say, fun way to solve specific ETL challenges.\
    \ In this chapter, we’ll look into some of the basics of the expression language\
    \ and I’ll describe a few instances where SSIS expressions are ideal (and a few\
    \ where they might not be) for effectively solving difficult ETL problems.\n\n\
    ## Getting to Know the Expression Language\n\nBefore we dive into the design patterns\
    \ surrounding the SSIS expression language, let’s spend a little time defining\
    \ and becoming familiar with the nuances of the language. Reviewing the language-specific\
    \ patterns can help you get up to speed and use the language correctly.\n\n###\
    \ What Is the Expression Language?\n\nThe *SSIS expression language* is an interpreted\
    \ language that has been built into the SSIS runtime environment. This specialized\
    \ language is used to craft scalar-valued snippets of code (individually referred\
    \ to as *expressions*) that you may use at various points within the SSIS environment.\n\
    \nThe SSIS designer exposes dozens of interfaces where expressions can be used\
    \ in place of hard-coded values, allowing the BI professional to leverage that\
    \ flexibility to create dynamic and reusable elements within SSIS. Conceptually,\
    \ it’s not unlike the product-specific dialects that exist in other Microsoft\
    \ development environments. For example, when you are developing reports in SSDT\
    \ or BIDS that you want to deploy to SQL Server Reporting Services, you can use\
    \ Visual Basic for Applications (VBA) code to generate dynamic behavior during\
    \ report execution and rendering.\n\nAs you explore the expression language, you’ll\
    \ find it to be a very powerful addition to the natural capabilities of SQL Server\
    \ Integration Services. It has a rich library of functionality that will be familiar\
    \ to both developers and DBAs. Among the functional domains of the SSIS expression\
    \ language are\n\n*   A full complement of mathematical functions and operators\n\
    *   An impressive set of string functions that may be used in comparisons, analysis,\
    \ and value manipulation\n*   Common date and time functionality, including date\
    \ part extraction, date arithmetic, and comparison\n\nThe expression language\
    \ serves two different roles within the package life cycle:\n```"
