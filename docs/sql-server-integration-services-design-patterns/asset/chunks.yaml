    \ 值。单击“确定”按钮关闭“文本框属性编辑器”。\n\n单击“预览”选项卡以显示应用程序实例报告。选择一个“包”链接导航到将仅包含与该特定应用程序实例相关的包实例的包实例报告。包实例报告应显示为类似于[图\
