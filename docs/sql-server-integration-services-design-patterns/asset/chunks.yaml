    Once the package executes (and you can test for rows in the `TestDB.dbo.TemperatureStage`
    table), you should find a CSV file named `TemperatureRows.csv` in the `<`*drive*`>:\Program
    Files\Microsoft SQL Server\120\DTS\DataDumps` directory, and that file should
    contain the first 25 rows of data that flowed through the `"FFSrc Temperature.Flat
    File Source Output"` data flow path in the `"DFT Load Temperature Data"` in the
    `DataTapTest.dtsx` SSIS package.


