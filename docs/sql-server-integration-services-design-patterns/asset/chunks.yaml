                '' 4n: 记录错误消息...

                Dts.Events.FireError(1001, sSubComponent, ex.Message, "", 0)

            End Try


    '' 5: 记录信息

            sMsg = "DateStampFormat: " & sDateStampFormat & ControlChars.CrLf & _

    ControlChars.CrLf & _

                   "ExceptionOnFileNotFound: " & bExceptionOnFileNotFound.ToString
    & _

    ControlChars.CrLf & ControlChars.CrLf & _

                   "CopyOnly: " & bCopyOnly.ToString & ControlChars.CrLf & ControlChars.CrLf
    & _

                   "OkToProceed: " & Dts.Variables("OkToProceed").Value.ToString &
    _

    ControlChars.CrLf & ControlChars.CrLf & _

                   "SourceFileDirectory: " & sSourceFileDirectory & ControlChars.CrLf
    & _

    ControlChars.CrLf & _

                   "FileName: " & sFileName & ControlChars.CrLf & ControlChars.CrLf
    & _

                   "Extension: " & sExtension & ControlChars.CrLf & ControlChars.CrLf
    & _

                   "BaseFileName: " & sBaseFileName & ControlChars.CrLf & ControlChars.CrLf
    & _

                   "FormattedFileName: " & sFormattedFileName & ControlChars.CrLf
    & _

    ControlChars.CrLf & _

                   "WorkingCopyFileName: " & sWorkingCopyFileName & ControlChars.CrLf
    & _

    ControlChars.CrLf


    If bDebug Then MsgBox(sMsg, MsgBoxStyle.OkOnly, sSubComponent)

            Dts.Events.FireInformation(2001, sSubComponent, sMsg, "", 0, True)

            '' 6: 输出

            Dts.TaskResult = ScriptResults.Success

        End Sub

    ```


    与其他脚本一样，我们在注释 1 和 2 处声明（`Dim`）了一个名为 `bDebug` 的变量，用于检测包是否在调试模式下执行。在注释 3 处，脚本声明了其余使用的变量，其中一些值是从
    SSIS 包变量和参数传入的。在注释 4a 到 4c 处，代码拆解了 `Source File Path` 变量，解析出源目录、带扩展名的文件名以及不带扩展名的文件名。在注释
    4d 到 4f 处，解析了文件名扩展名，并创建了一个“工作副本”文件名，该文件名使用从 SSIS 包参数提供的时间戳进行了格式化。在注释 4g 处，脚本将变量值赋给
    SSIS 包变量。注释 4h 和 4m 之间的代码测试源文件的存在并做出响应。如果在注释 4a 到 4m 之间的任何步骤遇到异常，则会执行注释 4n 处的
    `Catch` 代码块，并将异常记录为错误，这将停止脚本任务的执行。注释 5 处的代码构建、显示（如果在调试模式下运行）并记录一条包含脚本任务内部变量值的消息。这对于故障排除是非常有用的信息。在注释
    6 处，脚本向 `Dts.TaskResult` 对象返回一个 `Success`（成功）结果。


    文件归档过程的其余步骤如下：

    1.  创建源文件的工作副本。

    2.  将工作副本重命名为 `Formatted File Name`（包括时间戳）。

    3.  将新重命名的文件移动到归档目录。

    4.  删除原始文件（除非这是 `CopyOnly` 操作）。'
