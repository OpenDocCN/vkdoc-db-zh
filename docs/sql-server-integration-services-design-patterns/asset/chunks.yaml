    \ @PackageName + ' added and wired to ' + @ApplicationName  end Else  print @ApplicationName\
    \ + '.' + @PackageName + ' already exists in the Framework with ExecutionOrder\
    \ ' + convert(varchar, @ExecutionOrder) ```    One note about the T-SQL script\
    \ shown in [Listing A-9](#9781484200834_AppA.xhtml#list9). This is not the way\
    \ I would load this metadata into production (or even test) environments. I would\
    \ not re-declare the `ApplicationName`, `PackageFolder`, `PackageName`, `ApplicationID`,\
    \ and `PackageID` variables; rather, I would reuse these values from the previous\
    \ T-SQL scripts. I alluded to this earlier when I mentioned we will use the `ApplicationID`\
    \ and `PackageID` values later. I will provide a full T-SQL Metadata Load script\
    \ later in this appendix.\n\n## Retrieving SSIS Applications in T-SQL\n\nWe now\
    \ have SSIS application metadata stored in the `SSISConfig` database. Awesome,\
    \ now what? It’s time to build a stored procedure to return the SSIS package metadata\
    \ we want for a given SSIS application. [Listing A-10](#9781484200834_AppA.xhtml#list10)\
    \ contains the T-SQL data definition language (DDL) script to build such a stored\
    \ procedure named `cfg.GetSSISApplication`.\n\n[***Listing A-10***](#9781484200834_AppA.xhtml#_list10).\
    \ Creating the `cfg.GetSSISApplication` Stored Procedure\n\n```\n/* cfg.GetSSISApplication\
    \ stored procedure */\nIf Exists(Select s.name + '.' + p.name\n          From\
    \ sys.procedures p\n          Join sys.schemas s\n            On s.schema_id = p.schema_id\n\
    \          Where s.name = 'cfg'\n            And p.name = 'GetSSISApplication')\n\
    \ begin\n  print 'Dropping cfg.GetSSISApplication stored procedure'\n  Drop Procedure\
    \ cfg.GetSSISApplication\n  print 'Cfg.GetSSISApplication stored procedure dropped'\n\
    \ end\n\nprint 'Creating cfg.GetSSISApplication stored procedure'\ngo\n\nCreate\
    \ Procedure cfg.GetSSISApplication\n @ApplicationName varchar(255)\nAs\n Select\
    \ p.PackageFolder + p.PackageName As PackagePath\n     , ap.ExecutionOrder\n     ,\
    \ p.PackageName\n     , p.PackageFolder\n     , ap.AppPackageID\n From cfg.AppPackages\
    \ ap\n Inner Join cfg.Packages p on p.PackageID = ap.PackageID\n Inner Join cfg.Applications\
    \ a on a.ApplicationID = ap.ApplicationID\n Where ApplicationName = @ApplicationName\n\
    \ Order By ap.ExecutionOrder\ngo\n\nprint 'Cfg.GetSSISApplication stored procedure\
    \ created.'\nprint ''\n```\n\nThe `cfg.GetSSISApplication` stored procedure shown\
    \ in [Listing A-10](#9781484200834_AppA.xhtml#list10) accepts a single parameter—`ApplicationName`—and\
    \ uses this value to look up the SSIS packages associated with the SSIS application\
    \ of that name. Note the columns that are returned:\n\n*   `PackagePath`\n*  \
    \ `ExecutionOrder`\n*   `PackageName`\n*   `PackagePath`\n\nAlso note that the\
    \ SSIS packages are returned in the order specified by `ExecutionOrder`.\n\nNow\
    \ test the stored procedure using the existing metadata in the `SSISConfig` database\
    \ by executing the following T-SQL statement:\n\n```\nexec cfg.GetSSISApplication\
    \ 'SSISApp1'\n```\n\nMy results appear as shown in [Figure A-7](#9781484200834_AppA.xhtml#Fig7).\n\
    \n![9781484200834_FigAppA-07.jpg](images/9781484200834_FigAppA-07.jpg)\n\n[Figure\
    \ A-7](#9781484200834_AppA.xhtml#_Fig7). Results of `cfg.GetSSISApplication` statement\n\
    \n[Figure A-7](#9781484200834_AppA.xhtml#Fig7) shows the results of the stored\
    \ procedure statement execution—a result containing two rows of data—and this\
    \ data represents the SSIS package’s metadata associated with the SSIS application\
    \ named `SSISApp1` in the `SSISConfig` database.\n\nThat was a lot of work! Fortunately,\
    \ we will not need to repeat most of it. When you want to add SSIS packages and\
    \ associate them with SSIS applications in the future, the script will look like\
    \ the T-SQL shown in [Listing A-11](#9781484200834_AppA.xhtml#list11).\n\n[***Listing\
    \ A-11***](#9781484200834_AppA.xhtml#_list11). The Complete T-SQL Script for Adding\
    \ `SSISApp1` and Associated SSIS Packages\n\n```\nUse SSISConfig\ngo\n\n/* Variable\
    \ Declaration */\ndeclare @PackageFolder varchar(255) = 'F:\\Andy\\Projects\\\
    PublicFramework_PackageDeployment_2014\\SSISConfig2014\\'\ndeclare @PackageName\
    \ varchar(255) = 'Child1.dtsx'\ndeclare @PackageID int\ndeclare @ExecutionOrder\
    \ int = 10\n\n declare @ApplicationName varchar(255) = 'SSISApp1'\n declare @ApplicationID\
    \ int\n\n/* Add the SSIS First Application */\nIf Not Exists(Select ApplicationName\n\
    \              From cfg.Applications\n              Where ApplicationName = @ApplicationName)\n\
    \ begin\n  print 'Adding ' + @ApplicationName\n  exec cfg.AddSSISApplication @ApplicationName,\
    \ @ApplicationID output\n  print @ApplicationName + ' added.'\n end\nElse\n begin\n\
    \  Select @ApplicationID = ApplicationID\n  From cfg.Applications\n  Where ApplicationName\
    \ = @ApplicationName\n  print @ApplicationName + ' already exists in the Framework.'\n\
    \ end\n\nprint ''\n\n/* Add the Child1.dtsx SSIS Package*/\nIf Not Exists(Select\
    \ PackageFolder + PackageName\n              From cfg.Packages\n              Where\
    \ PackageFolder = @PackageFolder\n                And PackageName = @PackageName)\n\
    \ begin\n  print 'Adding ' + @PackageFolder + @PackageName\n  exec cfg.AddSSISPackage\
    \ @PackageName, @PackageFolder, @PackageID output\n end\nElse\n begin\n  Select\
    \ @PackageID = PackageID\n  From cfg.Packages\n  Where PackageFolder = @PackageFolder\n\
    \    And PackageName = @PackageName\n  print @PackageFolder + @PackageName + '\
    \ already exists in the Framework.'\n end\n\n If Not Exists(Select AppPackageID\n\
    \              From cfg.AppPackages\n              Where ApplicationID = @ApplicationID\n\
    \                And PackageID = @PackageID\n                And ExecutionOrder\
    \ = @ExecutionOrder)\n begin\n  print 'Adding ' + @ApplicationName + '.' + @PackageName\
    \ + ' to Framework with ExecutionOrder ' + convert(varchar, @ExecutionOrder)\n\
    \  exec cfg.AddSSISApplicationPackage @ApplicationID, @PackageID, @ExecutionOrder\n\
    \  print @PackageName + ' added and wired to ' + @ApplicationName\n end\n Else\n\
    \  print @ApplicationName + '.' + @PackageName + ' already exists in the Framework\
    \ with ExecutionOrder ' + convert(varchar, @ExecutionOrder)\n\n/*Child2.dtsx */\n\
    set @PackageName = 'Child2.dtsx'\nset @ExecutionOrder = 20\n\nIf Not Exists(Select\
    \ PackageFolder + PackageName\n              From cfg.Packages\n              Where\
    \ PackageFolder = @PackageFolder\n                And PackageName = @PackageName)\n\
    \ begin\n  print 'Adding ' + @PackageFolder + @PackageName\n  exec cfg.AddSSISPackage\
    \ @PackageName, @PackageFolder, @PackageID output\n end\nElse\n begin\n  Select\
    \ @PackageID = PackageID\n  From cfg.Packages\n  Where PackageFolder = @PackageFolder\n\
    \    And PackageName = @PackageName\n  print @PackageFolder + @PackageName + '\
    \ already exists in the Framework.'\n end\n\nIf Not Exists(Select AppPackageID\n\
    \              From cfg.AppPackages\n              Where ApplicationID = @ApplicationID\n\
    \                And PackageID = @PackageID\n                And ExecutionOrder\
    \ = @ExecutionOrder)\n begin\n  print 'Adding ' + @ApplicationName + '.' + @PackageName\
    \ + ' to Framework with ExecutionOrder ' + convert(varchar, @ExecutionOrder)\n\
    \  exec cfg.AddSSISApplicationPackage @ApplicationID, @PackageID, @ExecutionOrder\n\
    \  print @PackageName + ' added and wired to ' + @ApplicationName\n end\n Else\n\
    \  print @ApplicationName + '.' + @PackageName + ' already exists in the Framework\
    \ with ExecutionOrder ' + convert(varchar, @ExecutionOrder)\n```\n\n## Retrieving\
    \ SSIS Applications in SSIS\n\nReturn to SSDT-BI and open the editor for the Get\
    \ Package Metadata Execute SQL task. Change the ResultSet property from Single\
    \ Row to Full Result Set and change the SQLStatement property to `cfg.GetSSISApplication`.\
    \ Set the IsQueryStoredProcedure property to `True`. On the Parameter Mapping\
    \ page, click the Add button. Click the drop-down in the Variable Name column\
    \ and select `<new variable>` (you will probably need to scroll up to find `<new\
    \ variable...>`)."
