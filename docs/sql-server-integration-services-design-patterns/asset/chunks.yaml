- fmt: "You don’t need all these columns to store your data in your `StagingDB`. Since\
    \ you are using this table to stage data from the flat file, use the same column\
    \ names you found in the source file. However, you should also use the strong\
    \ data types you created in our Derived Column transformation. Fortunately for\
    \ you, our naming convention makes these changes relatively painless. Simply delete\
    \ the DDL for the first three columns (`RecordType`, `Name`, and `Value`), and\
    \ then remove the first three letters of the remaining columns, which will rename\
    \ them to `RecordType`, `Name`, and `Value`. [Listing 7-3](#9781484200834_Ch07.xhtml#list3)\
    \ shows the result.\n\n[***Listing 7-3***](#9781484200834_Ch07.xhtml#_list3).\
    \ The Modified CREATE TABLE Statement\n\n```sql\nCREATE TABLE [FlatFileDest] (\n\
    \    [RecordType] varchar(1),\n    [Name] varchar(50),\n    [Value] int\n)\n```\n\
    \nWhen you click the OK button, the DDL statement is executed against `StagingDB`—creating\
    \ the `FlatFileDest` table. That’s a good thing, because your OLE DB destination\
    \ adapter is warning you that you need to complete Input-to-Output mappings (shown\
    \ in [Figure 7-6](#9781484200834_Ch07.xhtml#Fig6)).\n\n![9781484200834_Fig07-06.jpg](images/9781484200834_Fig07-06.jpg)\n\
    \n[Figure 7-6](#9781484200834_Ch07.xhtml#_Fig6). The columns have not been mapped\n\
    \nAs shown in [Figure 7-7](#9781484200834_Ch07.xhtml#Fig7), when you click on\
    \ the Mappings page to begin this mapping, auto-mapping kicks in and finds it\
    \ can auto-complete some of the mappings:\n\n![9781484200834_Fig07-07.jpg](images/9781484200834_Fig07-07.jpg)\n\
    \n[Figure 7-7](#9781484200834_Ch07.xhtml#_Fig7). OLE DB destination auto-mapping\n\
    \nOne issue is that these fields don’t contain the data you want to load. You\
    \ want to load the derived columns instead. There a couple ways to correct the\
    \ mapping, but I like dragging and dropping the fields I want mapped to the columns\
    \ where I wish them to be mapped. Since mapping is, by definition, field-to-field,\
    \ the existing (auto-) mappings will be overwritten by the new. Try it! Drag the\
    \ `strRecordType` field from Available Input Columns to the `RecordType` cell\
    \ in Available Output Columns. See? The old mapping is updated. Now map `strName`\
    \ to `Name` and `itnValue` to `Value`, as shown in [Figure 7-8](#9781484200834_Ch07.xhtml#Fig8):\n\
    \n![9781484200834_Fig07-08.jpg](images/9781484200834_Fig07-08.jpg)\n\n[Figure\
    \ 7-8](#9781484200834_Ch07.xhtml#_Fig8). Overwriting the auto-mappings\n\nClick\
    \ the OK button; you’re finished configuring the OLE DB destination adapter. Press\
    \ the `F5` key to execute the SSIS package in the `SSDT` debugger. Hopefully,\
    \ your Data Flow task succeeds and appears as in [Figure 7-9](#9781484200834_Ch07.xhtml#Fig9).\n\
    \n![9781484200834_Fig07-09.jpg](images/9781484200834_Fig07-09.jpg)\n\n[Figure\
    \ 7-9](#9781484200834_Ch07.xhtml#_Fig9). A successful data flow!\n\nIn this introductory\
    \ section, I’ve introduced concepts of staging and we built a pattern to stage\
    \ data from a flat file into a database table. Along the way, we delved into some\
    \ data warehousing thinking and peeked under the hood of the Data Flow task. Next\
    \ up: loading another format of flat file—one with variable-length rows.\n\n##\
    \ Variable-Length Rows\n\nA variable-length row flat file is a text source file.\
    \ It can be a comma-separated values (CSV) file or a tab-delimited file (TDF).\
    \ It can be a fixed-length file where columns are identified positionally or by\
    \ ordinal. The major difference between a “normal” flat file and a variable-length\
    \ row flat file is that the number of text positions is fixed in a normal flat\
    \ file, and that number can change with each row in a variable-length flat file.\n\
    \nLet’s look at an example of a variable-length flat file:\n\n```csv\nRecordType,Name1,Value1,Name2,Value2,Name3,Value3\n\
    \nA,Multi One,11\nB,Multi Two,22,Multi Two A,23\nC,Multi Three,33,Multi Three\
    \ A,34,Multi Three B,345\nA,Multi Four,44\nC,Multi Five,55,Multi Five A,56,Multi\
    \ Five B,567\nB,Multi Six,66,Multi Six A,67\n```\n\nThere are seven potential\
    \ columns: `RecordType`, `Name1`, `Value1`, `Name2`, `Value2`, `Name3`, and `Value3`.\
    \ Not all rows contain seven values. In fact, the first row contains only three\
    \ values:\n\n```csv\nA, Multi One,11\n```\n\nIn this format, the `RecordType`\
    \ is in the first column and this indicates how many columns of data to expect\
    \ in the row. Rows of `RecordType` `A` contain three values, rows of `RecordType`\
    \ `B` contain five values, and those of `RecordType` `C` contain seven values.\n\
    \n### Reading into a Data Flow\n\nIt’s typical to load data from a flat file into\
    \ an SSIS data flow using a Flat File connection manager. Let’s walk through configuring\
    \ a Flat File connection manager for this file.\n\nIf you want to sing along,\
    \ add a new SSIS package named `VariableLengthRows.dtsx` to your SSIS project.\
    \ Add a Data Flow task to the control flow and open the Data Flow Editor (tab).\
    \ Drag a Flat File source adapter onto the Data Flow task canvas and open its\
    \ editor. Click the New button to create a new Flat File connection manager.\n\
    \nI named my Flat File connection manager `Variable-Length File`. I created a\
    \ text file with the data from the example above and named it `VarLenRows.csv`.\
    \ I saved it and browsed to that location for the `File Name` property. I also\
    \ checked the Column Names in the First Data Row checkbox. When I click on the\
    \ Columns page, the Flat File Connection Manager Editor appears as shown in [Figure\
    \ 7-10](#9781484200834_Ch07.xhtml#Fig10).\n\n![9781484200834_Fig07-10.jpg](images/9781484200834_Fig07-10.jpg)\n\
    \n[Figure 7-10](#9781484200834_Ch07.xhtml#_Fig10). Configuring the Flat File connection\
    \ manager for a flat file with variable-length rows\n\nThis behavior is different\
    \ from earlier editions of SSIS. In previous versions, the Flat File connection\
    \ manager would raise an error. I blogged about this in a post entitled *SSIS\
    \ Design Pattern: Loading Variable-Length Rows* (`http://sqlblog.com/blogs/andy_leonard/archive/2010/05/18/ssis-design-pattern-loading-variable-length-rows.aspx`).\
    \ That post inspired this chapter.\n\n### Splitting Record Types\n\nThanks to\
    \ the new functionality in the SSIS 2014 version of the Flat File connection manager,\
    \ we have all the data coming in as separate rows. But the data rows contain information\
    \ of different types. The rows need to be filtered based on record type. I can\
    \ hear you thinking, “Great, Andy. Now what?” I’m glad you asked! Now we need\
    \ to parse the data as it flows through the Data Flow task. There are a couple\
    \ ways to approach this, but I like the conditional split.\n\nDrag a Conditional\
    \ Split transformation onto the Data Flow task canvas and connect a data flow\
    \ path from the Flat File source adapter to the conditional split. Open the editor\
    \ for the transformation. In the `Output Name` column of the grid, enter `TypeA`.\
    \ Into the corresponding `Condition`, drag (or type) the `RecordType` column,\
    \ appending the text `== “A”` (note that the “A” is in double-quotes). Repeat\
    \ this for each record type, `== “B”` and `== “C”`, as shown in [Figure 7-11](#9781484200834_Ch07.xhtml#Fig11).\n\
    \n![9781484200834_Fig07-11.jpg](images/9781484200834_Fig07-11.jpg)\n\n[Figure\
    \ 7-11](#9781484200834_Ch07.xhtml#_Fig11). Configuring the Script component inputs\n\
    \nClick the OK button to close the Conditional Split Transformation Editor. It\
    \ is important to note that this would have required a Script component in earlier\
    \ versions of SSIS because the Flat File connection manager in previous versions\
    \ couldn’t parse files containing rows with a varying number of columns.\n\n###\
    \ Terminating the Streams\n\nYou can use several data flow components to terminate\
    \ a data flow path. In a production environment, this would likely be an OLE DB\
    \ destination adapter. In a development or test environment, you may want to terminate\
    \ with a component that doesn’t require database connectivity or database object\
    \ creation."
