    `Dest_ColA` 2.  1.  `SourceColumn`: `ColB`     2.  `TargetColumn`: `Dest_ColB`
    3.  1.  `SourceColumn`: `ColC`     2.  `TargetColumn`: `Dest_ColC`    The preceding
    metadata “selects” the columns returned from the Lookup transform’s Available
    Lookup columns on the Columns page. Once added, the Lookup transform metadata
    should appear as shown in [Listing 19-10](#9781484200834_Ch19.xhtml#list10).


    [***Listing 19-10***](#9781484200834_Ch19.xhtml#_list10). Transformations Including
