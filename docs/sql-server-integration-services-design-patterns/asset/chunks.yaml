    \ and Namespaces\n\nThe “include file” directive is next and points to the `i-FrameworkSQLGen.biml`\
    \ I built first. Including this file means the variables defined in `i-FrameworkSQLGen.biml`\
    \ are available in the `FrameworkSQLGen.biml` file. I next include four namespaces:\
    \ `System.Data`, `System.IO`, `System.Text`, and `Varigence.Hadron.CoreLowerer.SchemaManagement`.\
    \ The first three refer to .Net libraries; the fourth supplies a reference to\
    \ a Biml assembly.\n\n## C# Application Logic\n\nThe C# application logic begins\
    \ in earnest starting with Line 7 with the declaration and initialization of the\
    \ variable named `connection`. `Connection` is set to the `SchemaManager` object’s\
    \ `ConnectionNode` object via the `CreateConnectionNode` method. The `ConnectionNode`\
    \ is aimed at the `ConnectionString` supplied from the variable `connectionString`\
    \ contained in the `i-FrameworkSQLGen.biml` include file.\n\nAnother C# variable\
    \ named `tables` is declared and initialized using the `connection` variable’s\
    \ `GenerateTableNodes` method. The `GenerateTableNodes` method creates a collection\
    \ of table objects ready for consumption by BimlScript.\n\nTwo additional variables\
    \ are declared and initialized: an `int` variable named `e` which will be used\
    \ to enumerate the execution order of packages in the Framework, and a `StringBuilder`\
    \ variable named `sb` which will be used to build the Transact-SQL command to\
    \ load the Framework metadata for the SSIS Application.\n\n## Adding SSIS Application\
    \ Metadata\n\nThe Transact-SQL script for adding an SSIS Application to the Framework\
    \ is listed in Figure A-7 in Appendix A and is shown in [Listing 20-3](#9781484200834_Ch20.xhtml#list3).\n\
    \n**Listing 20-3**. Manually Adding SSIS Application Metadata to the Framework\n\
    \n```sql\nUse SSISConfig\nGo\n\ndeclare @ApplicationName varchar(255) = 'SSISApp1'\n\
    declare @ApplicationID int\n\n/* Add the SSIS First Application */\nIf Not Exists(Select\
    \ ApplicationName\n              From cfg.Applications\n              Where ApplicationName\
    \ = @ApplicationName)\n begin\n  print 'Adding ' + @ApplicationName\n  exec cfg.AddSSISApplication\
    \ @ApplicationName, @ApplicationID output\n  print @ApplicationName + ' added.'\n\
    \ end\nElse\n begin\n  Select @ApplicationID = ApplicationID\n  From cfg.Applications\n\
    \  Where ApplicationName = @ApplicationName\n  print @ApplicationName + ' already\
    \ exists in the Framework.'\n end\nprint ''\n```\n\nPlace this code into the `FrameworkSQLGen.biml`\
    \ after the code in Listing 2. I need to load this Transact-SQL into the `stringbuilder`\
    \ variable (`sb`) and I need to make it generic by leveraging the variables in\
    \ the include file. Accomplish this by loading the code into the `stringbuilder`\
    \ as shown in [Listing 20-4](#9781484200834_Ch20.xhtml#list4):\n\n**Listing 20-4**.\
    \ Adding SSIS Application Metadata to the Stringbuilder\n\n```csharp\nsb.AppendLine(\"\
    Use SSISConfig\");\nsb.AppendLine(\"Go\");\nsb.AppendLine();\nsb.AppendLine(\"\
