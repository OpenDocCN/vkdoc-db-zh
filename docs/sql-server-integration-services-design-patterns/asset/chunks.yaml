     CREATE DATABASE [SSISIncrementalLoad_Source]  If Not Exists(Select name               From
    sys.databases               Where name = ''SSISIncrementalLoad_Dest'')  CREATE
    DATABASE [SSISIncrementalLoad_Dest] Go Use SSISIncrementalLoad_Source Go  If Not
    Exists(Select name               From sys.tables               Where name = ''tblSource'')
    CREATE TABLE dbo.tblSource  (ColID int NOT NULL  ,ColA varchar(10) NULL  ,ColB
    datetime NULL constraint df_ColB default (getDate())  ,ColC int NULL  ,constraint
    PK_tblSource primary key clustered (ColID))  Use SSISIncrementalLoad_Dest Go  If
    Not Exists(Select name               From sys.tables               Where name
    = ''tblDest'') CREATE TABLE dbo.tblDest  (ColID int NOT NULL  ,ColA varchar(10)
