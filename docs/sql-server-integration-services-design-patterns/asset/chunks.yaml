    Create Table dbo.LoadMetrics   (ID int identity(1,1)     Constraint PK_LoadMetrics_ID
    Primary Key Clustered   ,LoadDate datetime     Constraint DF_LoadMetrics_LoadDate
    Default(GetDate())   ,MetricName varchar(25)   ,MetricIntValue int) ```    The
    LoadMetrics table will hold the last ID loaded for each table in the cloud destination.
    We will write this row once, and read and update it each load cycle. Accessing
    this table in this manner is the simplest and least processor-intensive manner
    in which to acquire the information we seek: the value of the last ID column loaded
    for a particular table. Why store this value in a table? Why not simply execute
    a `Max(ID)` select statement on the data table? Again, MASD charges for reads
    and not writes. Billing may change—it has in the past. What if we’re billed according
    to cycles or execution plans? You never know.    While connected to the MASD instance,
    create a table to hold your data. My data table will hold temperature information
    collected from my weather station in Farmville, Virginia. The table I use contains
    temperature- and humidity-related data and is shown in [Listing 14-2](#9781484200834_Ch14.xhtml#list2).    [***Listing
    14-2***](#9781484200834_Ch14.xhtml#_list2).'
  trans: "\n# 与云交互\n\n在本章中，**云（the cloud）** 指的是满足以下条件的数据容器或数据存储库：\n\n*   位于企业场所之外\n\
    *   由第三方托管\n*   位于物理企业域之外\n\n我理解这些观点存在争议。在此我不作辩论。这个定义很可能在本文写作（2012 年）和修订（2014\
    \ 年）之后的几年里就不再适用。即使在现在，何为“在云中”也存在模糊性和界限不清的情况。\n\n作为演示，我使用的是从我在弗吉尼亚州法姆维尔的本地气象站收集的数据。这些天气数据在\
    \ `AndyWeather.com` 上公开可用。`AndyWeather.com` 由一家大型托管公司托管，该公司提供可远程访问的 SQL Server\
    \ 数据库连接。因此，根据我的定义，这些数据存储在云端。\n\n我还使用 Microsoft Azure SQL Database 托管天气数据：相同的数据，存储在不同的位置。“为什么？”简单的答案是：容错性。容错性也是数据库管理员（DBA）执行数据库备份和测试数据库恢复的原因。技术人员与工程师——或开发人员与架构师——之间的区别在于，技术人员构建能运行的系统，而工程师构建不会失败的系统。这关乎思维方式。技术人员让系统运行起来就停止了。工程师会考虑系统可能以多种方式失效，并尝试在故障发生前修复它们。\n\
    \n## 增量加载到 Azure SQL 数据库\n\n**增量加载** 是指仅加载或更改新的或更新的行（有时也包括已删除的行）的加载方式。增量加载可以与\
    \ **截断并加载** 模式形成对比，后者会删除目标中的现有数据，并从源重新加载所有数据。有时截断并加载是最有效的方式。随着数据规模的扩大——尤其是在目标端——截断并加载的性能往往会下降。如何知道哪种方式性能最好？测试、衡量、重复。\n\
    \n截断并加载的一个好处是简单。一个简单的机制不容易搞砸。增量加载引入了复杂性，而变更检测是复杂性进入解决方案的第一个环节。\n\n## 变更检测\n\n\
    **变更检测** 是一种旨在区分从未从源发送到目标的行（新行）与已发送行的功能。变更检测还会将存在于目标中的源行，区分为已在源中更改的行（已更改行）和自上次加载或更新到目标以来未更改的行（未更改行）。变更检测还可以包含已从目标中删除、需要从源中删除（或“软删除”）的行。在本章中，我们将忽略已删除行的用例。\n\
    \n我们将考虑使用变更检测来识别和区分未更改行、已更改行和新行。增量加载模式的框图如图 14-1 所示。\n\n![9781484200834_Fig14-01.jpg](img/9781484200834_Fig14-01.jpg)\n\
    \n图 14-1. 增量加载框图\n\n## 仅新行\n\n你可能会认为，无论目标数据库背后的技术如何，检测新行应该是简单的。你是对的。但是，当加载 MASD\
    \ 时，存在经济考量。在我撰写本文时（2011 年，并于 2014 年修订），上传是免费的。作为数据提供者，当你的数据被使用时，你才会被收费。这个事实如何影响你的增量加载？\n\
    \n这正是良好的数据集成架构和设计发挥作用的地方。数据集成架构师的部分工作是了解你的数据。这不仅仅是知道`CleanTemperature`表中有一个包含特定小时平均露点的列。了解你的数据意味着你理解它是如何以及何时变化的——甚至是否变化。某些类型的数据，如天气数据，在被捕获和记录后不会被更新。\n\
    \n如果你阅读了 Tim Mitchell 在第 11 章中对典型增量加载模式的描述，你会注意到一个配置为连接到目标并读取数据的查找（Lookup）转换。在\
    \ MASD 中，你将为那次数据读取付费。在我的 MASD AndyWeather 数据库中，存在近 30,000 行数据。如果我将所有源行加载到数据流任务中，并使用查找转换在源和\
    \ MASD 之间进行“连接”，我需要为读取未更改的行付费。更重要的是，我知道它们**永远不会改变**。因为天气数据一旦记录就永远不会更新，所以根本不会存在已更改行。\n\
    \n每小时，AndyWeather 数据库中的每个主题区域都会生成几行新数据。如果我使用查找，我会毫无理由地加载所有 30,000 行——并且我还得为这种特权付费。不，谢谢。\n\
    \n为了限制数据读取量，从而降低解决方案的总成本，我可以执行一个查询，选择一个表示最新或最后加载行的“标记”。为此，我可以从包含表上次加载日期和时间的字段中选择最大值；类似于`Max(LastUpdatedDateTime)`，或者甚至是数据集成沿袭或元数据字段如`Max(LoadDate)`。同样地，我可以选择另一个标记，例如由序列、标识、触发器或其他机制可靠维护的整数列中的`Max(ID)`。该机制的可靠性代表了数据集成架构师对该值可以给予的最大置信度。我将演示如何使用源数据上维护的标识列来构建增量加载器。\n\
    \n在此之前，我希望指出第 11 章包含关于增量加载设计模式的精彩章节。其中讨论了另一种我不会涉及的解决方案：变更数据捕获。在完成数据集成设计之前，我鼓励你回顾第\
    \ 11 章。\n\n## 构建云加载器\n\n要完成接下来的演示，你需要一个 MASD 账户和数据库。创建账户和数据库超出了本书的范围，但你可以在 `www.windowsazure.com/en-us/home/features/sql-azure`\
    \ 了解更多信息。一旦 MASD 设置并配置好，创建一个数据库。在此数据库中，使用清单 14-1 所示的 T-SQL 创建一个名为`dbo.LoadMetrics`的表。\n\
    \n**清单 14-1**. 创建 LoadMetrics 表\n\n```sql\nCreate Table dbo.LoadMetrics\n  (ID\
    \ int identity(1,1)\n    Constraint PK_LoadMetrics_ID Primary Key Clustered\n\
    \  ,LoadDate datetime\n    Constraint DF_LoadMetrics_LoadDate Default(GetDate())\n\
    \  ,MetricName varchar(25)\n  ,MetricIntValue int)\n```\n\n`LoadMetrics`表将保存云目标中每个表最后加载的\
    \ ID。我们将写入此行一次，并在每个加载周期读取和更新它。以这种方式访问此表是获取我们所需信息（特定表的最后加载的 ID 列值）的最简单且最不占用处理器的方式。为什么将此值存储在表中？为什么不直接在数据表上执行`Max(ID)`的\
    \ select 语句呢？再次强调，MASD 对读取收费，对写入不收费。收费方式可能会改变——过去就曾改变过。如果我们按照周期或执行计划收费怎么办？你永远不知道。\n\
    \n在连接到 MASD 实例时，创建一个表来保存你的数据。我的数据表将保存从我在弗吉尼亚州法姆维尔的气象站收集的温度信息。我使用的表包含与温度和湿度相关的数据，如清单\
    \ 14-2 所示。\n\n**清单 14-2**.\n"
- fmt: "# Creating the CleanTemperature Table\n\n```\nCreate Table dbo.CleanTemperature\n\
    \   (ID int identity(1,1)\n       Constraint PK_Cleantemperature_ID Primary Key\
    \ Clustered\n  ,MeasDateTime datetime\n  ,MinT real\n  ,MaxT real\n  ,AvgT real\n\
    \  ,MinH smallint\n  ,MaxH smallint\n  ,AvgH smallint\n  ,ComfortZone smallint\n\
    \  ,MinDP real\n  ,MaxDP real\n  ,AvgDP real\n  ,MinHI varchar(7)\n  ,MaxHI varchar(7)\n\
    \  ,AvgHI varchar(7)\n  ,LoadDate datetime\n  ,LowBatt bit\n  ,SensorID int)\n\
    ```\n\nOnce the cloud tables have been created, we can begin work on an SSIS loader.\n\
    \nLocally, create a new SSIS solution and project named `CloudLoader`. Rename\
    \ the default SSIS package `SimpleCloudLoader.dtsx`. Add a Sequence container\
    \ and rename it `SEQ Pre-Load Operations`. Add an Execute SQL task by placing\
    \ it into the Sequence container and rename it `Get AWCleanTempMaxID From AndyWeather`.\
    \ Set the `ResultSet` property to `Single Row` and change the `ConnectionType`\
    \ property to `ADO.Net`. Create the ADO.Net connection manager using information\
    \ from your MASD account. To acquire the latest ID from the `LoadMetrics` table,\
    \ I use the following query.\n\n```\nIF NOT EXISTS (\n    Select *\n    From dbo.LoadMetrics\n\
    \    Where MetricName = 'CleanTempMaxID'\n)\nBEGIN\n    INSERT INTO dbo.LoadMetrics\
    \ (LoadDate, MetricName,MetricIntValue)\n    VALUES (NULL,'CleanTempMaxID',NULL);\n\
    END\nSelect Coalesce(MetricIntValue, 0) As CleanTempMaxID\nFrom dbo.LoadMetrics\n\
    Where MetricName = 'CleanTempMaxID'\n```\n\nOn the Result Set page, I store the\
    \ value in an SSIS variable of an Int32 data type named `AWCleanLoadMaxID`.\n\n\
    Add another Execute SQL task into the Sequence container and rename it `Get CleanTempMaxID\
    \ from the local table`. Configure the connection to your source database and\
    \ table. For me, it’s a local default instance of SQL Server hosting the `WeatherData`\
    \ database and the `dbo.CleanTemperature` table. I use the following T-SQL to\
    \ extract the current maximum value from the table, configuring a single row result\
    \ set to push this value into the `CleanTempLocalMaxID` SSIS variable (Int32 data\
    \ type).\n\n```\nSelect Max(ID) As CleanTempLocalMaxID\nFrom dbo.CleanTemperature\n\
    ```\n\nAdd a Data Flow task outside the `SEQ Pre-Load Operations` Sequence container\
    \ and rename it `Load Windows Azure SQL Database`. Connect an `OnSuccess` precedence\
    \ constraint between the Sequence container and the Data Flow task. Open the Data\
    \ Flow Task Editor and add an OLE DB source adapter. Connect the OLE DB source\
    \ adapter to a local source database you wish to load in the cloud and write a\
    \ query to pull the latest data from the desired table. In my case, I am pulling\
    \ data from my `dbo.CleanTemperature` table. To accomplish the load, I use the\
    \ source query shown in `Listing 14-3`.\n\n`Listing 14-3`. WeatherData Source\
    \ Query\n\n```\nSELECT ID\n      ,MeasDateTime\n      ,MinT\n      ,MaxT\n   \
    \   ,AvgT\n      ,MinH\n      ,MaxH\n      ,AvgH\n      ,ComfortZone\n      ,MinDP\n\
    \      ,MaxDP\n      ,AvgDP\n      ,MinHI\n      ,MaxHI\n      ,AvgHI\n      ,LoadDate\n\
    \      ,LowBatt\n      ,SensorID\n  FROM dbo.CleanTemperature\n WHERE ID Between\
    \ ? And ?\n```\n\nClick the Parameters button and map `Parameter0` and `Parameter1`\
    \ to the `AWCleanLoadMaxID` and `CleanTempLocalMaxID` variables as shown in `Figure\
    \ 14-2`.\n\n![9781484200834_Fig14-02.jpg](images/9781484200834_Fig14-02.jpg)\n\
    \n`Figure 14-2`. Mapping the `SQLAzureCleanLoadMaxID` variable to `Parameter0`\n\
    \nThe question marks in the source query shown in `Listing 14-3` are replaced\
    \ with the values stored in the respective mapped variables. This query will only\
    \ return rows where the `ID` is greater than the value stored in the cloud. Why\
    \ do we grab the maximum `ID` from the source table before the load? In a word,\
    \ latency. In the `WeatherData` database, the latency is minimal. But think about\
    \ loading highly active systems—latency can be an issue. For example, suppose\
    \ several transactions per second are entering the source table and it takes a\
    \ few seconds to load the destination. If we wait until the load is complete to\
    \ capture the source table’s Max `ID` value, that value will likely include data\
    \ we didn’t load. The technical term for that is “bad.” So we design the package\
    \ to grab the Max `ID` value before the load starts and only load rows between\
    \ the last `ID` loaded into MASD and the Max `ID` value captured at the start\
    \ of the SSIS package. And we never miss a row.\n\nReturning to the demo package,\
    \ add an ADO.Net destination adapter and rename it `Windows Azure SQL Database\
    \ ADO NET Destination`. Connect a data flow path from the OLE DB source adapter\
    \ to the ADO.Net destination adapter. Why an ADO.Net destination? MASD allows\
    \ only ADO.Net and ODBC connections—there is no support at the time of this writing\
    \ for OLE DB connections to MASDs. Connect a data flow path between the source\
    \ and destination adapters, edit the destination, and map the columns.\n\nThe\
    \ last step is to update the `LoadMetrics` table in the MASD database. To accomplish\
    \ this update, add an Execute SQL task to the control flow and rename it appropriately\
    \ and descriptively. I named mine `Update AndyWeather LoadMetrics Table` and configured\
    \ it to use ADO.Net to connect to my MASD database. My query looks like this one\
    \ shown in `Listing 14-4`.\n\n`Listing 14-4`. Updating the Azure SQL Database\
    \ `LoadMetrics` Table\n\n```\nUpdate dbo.LoadMetrics\n Set MetricIntValue = (@MaxID\
    \ + 1)\n    , LoadDate = GetDate()\n Where MetricName = 'CleanTempMaxID'\n```\n\
    \nMap the value of `CleanTempLocalMaxID` into the `@MaxID` parameter on the Parameter\
    \ Mapping page. And that’s it. This script makes the current maximum `ID` the\
    \ minimum `ID` of the next load.\n\n## Conclusion\n\nIn this chapter we examined\
    \ aspects of the architecture and design for loading cloud destinations. We designed\
    \ a sound solution after weighing the architectural and economic considerations.\n\
    \n# CHAPTER 15\n\n![image](images/frontdot.jpg)\n\n## Logging and Reporting Patterns\n\
    \nAn essential part of managing any application is knowing what happens during\
    \ the day-to-day usage of the application. This theme holds especially true in\
    \ ETL solutions in which the data being manipulated can be used for reporting\
    \ and analysis. Administrators satisfy this need through logging and reporting\
    \ of the executions, errors, and statuses of the applications, which fits perfectly\
    \ into the management framework concept.\n\nThe past few chapters have discussed\
    \ how to set up other pieces of the management framework, including how to execute\
    \ parent-child packages and how to implement centralized custom logging. This\
    \ chapter will describe how to use the built-in logging in Integration Services\
    \ to report on all aspects of an Integration Services application.\n\nIntegration\
    \ Services provides two primary methods to help satisfy the logging and reporting\
    \ need.\n\n*   Package logging and reporting\n*   Catalog logging and reporting\n\
    \nLet’s walk through how to set up each of these methods and then utilize patterns\
    \ that best highlight these methods.\n\n### Package Logging and Reporting\n\n\
    The package logging and reporting method has been around since the first edition\
    \ of Integration Services. This method is characterized by setting up logging\
    \ during development of the package. A logging provider can log to different outputs,\
    \ including SQL Server tables, text files, and more. The log information is stored\
    \ in one object, such as one file or the `sysssislog` table.\n\nEach log can be\
    \ restricted to store only certain types of events, such as `OnError`, `OnPreExecute`,\
    \ and `OnVariableValueChanged`. An administrator can then look at the logs to\
    \ see what happened during the execution of the package."
