    Varigence.Hadron.CoreLowerer.SchemaManagement\" #> <# var connection = SchemaManager.CreateConnectionNode(\"\
    SchemaProvider\", connectionString); #> <# var tables = connection.GenerateTableNodes();\
    \     int e = 10;     StringBuilder sb = new StringBuilder(); #>\n\n第 1 行的模板指令指明了我将在此文件中使用的\
    \ .Net 语言（C#）以及该文件的“层级”。\n\n![Image](img/sq.jpg) **注意** 了解更多关于 Biml 层级和语言元素的信息，请参阅\
    \ Reeves Smith 在 SQLServerCentral.com 上的优秀文章《Stairway to Biml Level 5 - Biml Language\
    \ Elements》(`http://www.sqlservercentral.com/articles/BIML/111305/`)。\n\n## 包含文件和命名空间\n\
    \n接下来是“包含文件”指令，它指向我先构建的 `i-FrameworkSQLGen.biml` 文件。包含此文件意味着在 `i-FrameworkSQLGen.biml`\
    \ 中定义的变量在 `FrameworkSQLGen.biml` 文件中也可用。然后我包含了四个命名空间：`System.Data`、`System.IO`、`System.Text`\
    \ 和 `Varigence.Hadron.CoreLowerer.SchemaManagement`。前三个指的是 .Net 库；第四个提供了对 Biml\
    \ 程序集的引用。\n\n## C# 应用程序逻辑\n\n从第 7 行开始，C# 应用程序逻辑正式开始，首先是声明并初始化名为 `connection` 的变量。`connection`\
    \ 通过 `CreateConnectionNode` 方法被设置为 `SchemaManager` 对象的 `ConnectionNode` 对象。这个\
    \ `ConnectionNode` 指向从 `i-FrameworkSQLGen.biml` 包含文件中的 `connectionString` 变量提供的连接字符串。\n\
    \n另一个名为 `tables` 的 C# 变量使用 `connection` 变量的 `GenerateTableNodes` 方法进行声明和初始化。`GenerateTableNodes`\
    \ 方法创建一个表对象的集合，以供 BimlScript 使用。\n\n另外声明并初始化了两个变量：一个名为 `e` 的 `int` 变量，将用于枚举框架中包的执行顺序；以及一个名为\
    \ `sb` 的 `StringBuilder` 变量，将用于构建用于加载 SSIS 应用程序框架元数据的 Transact-SQL 命令。\n\n## 添加\
    \ SSIS 应用程序元数据\n\n用于向框架添加 SSIS 应用程序的 Transact-SQL 脚本列在附录 A 的图 A-7 中，并在 清单 20-3\
    \ 中展示。\n\n**清单 20-3**. 手动向框架添加 SSIS 应用程序元数据\n\n```sql\nUse SSISConfig\nGo\n\n\
    declare @ApplicationName varchar(255) = 'SSISApp1'\ndeclare @ApplicationID int\n\
    \n/* Add the SSIS First Application */\nIf Not Exists(Select ApplicationName\n\
    \              From cfg.Applications\n              Where ApplicationName = @ApplicationName)\n\
    \ begin\n  print 'Adding ' + @ApplicationName\n  exec cfg.AddSSISApplication @ApplicationName,\
    \ @ApplicationID output\n  print @ApplicationName + ' added.'\n end\nElse\n begin\n\
    \  Select @ApplicationID = ApplicationID\n  From cfg.Applications\n  Where ApplicationName\
    \ = @ApplicationName\n  print @ApplicationName + ' already exists in the Framework.'\n\
    \ end\nprint ''\n```\n\n将此代码放在 `FrameworkSQLGen.biml` 中清单 2 的代码之后。我需要将此 Transact-SQL\
    \ 加载到 `stringbuilder` 变量 (`sb`) 中，并且需要通过利用包含文件中的变量使其通用化。通过如 清单 20-4 所示将代码加载到 `stringbuilder`\
    \ 中来实现这一点：\n\n**清单 20-4**. 将 SSIS 应用程序元数据添加到 StringBuilder\n\n```csharp\nsb.AppendLine(\"\
    Use SSISConfig\");\nsb.AppendLine(\"Go\");\nsb.AppendLine();\nsb.AppendLine(\"\
    declare @ApplicationName varchar(255) = '\" + applicationName + \"'\");\nsb.AppendLine(\"\
    declare @ApplicationID int\");\nsb.AppendLine();\nsb.AppendLine(\"/* Add the SSIS\
    \ First Application */\");\nsb.AppendLine(\"If Not Exists(Select ApplicationName\"\
    );\nsb.AppendLine(\"              From cfg.Applications\");\nsb.AppendLine(\"\
    \              Where ApplicationName = @ApplicationName) \");\nsb.AppendLine(\"\
    \ begin\");\nsb.AppendLine(\"  print 'Adding ' + @ApplicationName\");\nsb.AppendLine(\"\
    \  exec cfg.AddSSISApplication @ApplicationName, @ApplicationID output\");\nsb.AppendLine(\"\
    \  print @ApplicationName + ' added.'\");\nsb.AppendLine(\" end\");\nsb.AppendLine(\"\
    Else\");\nsb.AppendLine(\" begin\");\nsb.AppendLine(\"  Select @ApplicationID\
    \ = ApplicationID\");\nsb.AppendLine(\"  From cfg.Applications\");\nsb.AppendLine(\"\
    \  Where ApplicationName = @ApplicationName\");\nsb.AppendLine(\"  print @ApplicationName\
    \ + ' already exists in the Framework.'\");\nsb.AppendLine(\" end\");\nsb.AppendLine(\"\
    print ''\");\nsb.AppendLine();\n```\n\n## SSIS 框架包参数\n\n用于构建参数以管理包元数据的 Transact-SQL\
    \ 可在 清单 A-5 和 A-9 的前面部分找到，并在此处的 清单 20-5 中展示：\n\n**清单 20-5**. SSIS 框架包参数\n\n```sql\n\
    declare @ExecutionOrder int = 10\ndeclare @ApplicationID int = 1\ndeclare @PackageID\
    \ int = 1\ndeclare @ApplicationName varchar(255) = 'SSISApp1'\ndeclare @PackageFolder\
    \ varchar(255) = 'F:\\Andy\\Projects\\PublicFramework_PackageDeployment_2014\\\
    SSISConfig2014\\'\ndeclare @PackageName varchar(255) = 'Child1.dtsx'\n```\n\n\
    向 `stringbuilder` 的 Transact-SQL 中添加声明，这些参数将用于将 SSIS 包元数据插入框架，省略了一些参数并添加了一些，如\
    \ 清单 20-6 所示：\n\n**清单 20-6**. 将 SSIS 包参数添加到 StringBuilder\n\n```csharp\nsb.AppendLine(\"\
    declare @ExecutionOrder int\");\nsb.AppendLine(\"declare @PackageID int\");\n\
    sb.AppendLine(\"declare @PackageFolder varchar(255) = '\" + packageFolder + \"\
    '\");\nsb.AppendLine(\"declare @PackageName varchar(255)\");\nsb.AppendLine();\n\
    sb.AppendLine(\"/* Add Packages */\");\nsb.AppendLine();\n```\n\n## 通过循环加载包元数据\n\
    \n此 BimlScript 的实际工作是在一个循环内完成的，如 清单 20-7 所示：\n\n**清单 20-7**. 开始循环以加载 SSIS 框架包元数据\n\
    \n```csharp\nforeach (var table in tables)\n{\n        string tbl = \"IncrementalLoad_\"\
    \ + table.Name + \".dtsx\";\n```\n\n`foreach` 循环定义创建一个名为 `table` 的新变量，该变量将代表先前填充的\
    \ `tables` 集合中的每个 Biml 表。`tbl` 字符串变量被创建用于按名称标识 SSIS 包。\n\n附录 A 中的 清单 A-5 和 A-9\
    \ 的其余部分被整合并显示在 清单 20-8 中：\n\n**清单 20-8**. 将 SSIS 框架包元数据添加到 StringBuilder\n\n```csharp\n\
    sb.AppendLine(\"/* \" + tbl +  \" */\");\nsb.AppendLine();\nsb.AppendLine(\"Set\
    \ @PackageName = '\" + tbl + \"'\");\nsb.AppendLine(\"Set @ExecutionOrder = \"\
    \ + e.ToString());\nsb.AppendLine(\"If Not Exists(Select PackageFolder + PackageName\"\
    );\nsb.AppendLine(\"              From cfg.Packages\");\nsb.AppendLine(\"    \
    \          Where PackageFolder = @PackageFolder\");\nsb.AppendLine(\"        \
    \        And PackageName = @PackageName)\");\nsb.AppendLine(\" begin\");\nsb.AppendLine(\"\
    \  print 'Adding ' + @PackageFolder + @PackageName\");\nsb.AppendLine(\"  exec\
    \ cfg.AddSSISPackage @PackageName, @PackageFolder, @PackageID output\");\nsb.AppendLine(\"\
    \ end\");\nsb.AppendLine(\"Else\");\nsb.AppendLine(\" begin\");\nsb.AppendLine(\"\
    \  Select @PackageID = PackageID\");\nsb.AppendLine(\"  From cfg.Packages\");\n\
    sb.AppendLine(\"  Where PackageFolder = @PackageFolder\");\nsb.AppendLine(\" \
    \   And PackageName = @PackageName\");\nsb.AppendLine(\"  print @PackageFolder\
    \ + @PackageName + ' already exists in the Framework.'\");\nsb.AppendLine(\" end\"\
    );\nsb.AppendLine();\nsb.AppendLine(\"        If Not Exists(Select AppPackageID\"\
    );\nsb.AppendLine(\"              From cfg.AppPackages\");\nsb.AppendLine(\" \
    \             Where ApplicationID = @ApplicationID\");\nsb.AppendLine(\"     \
    \           And PackageID = @PackageID)\");\nsb.AppendLine(\" begin\");\nsb.AppendLine(\"\
    \  exec cfg.AddSSISApplicationPackage @ApplicationID, @PackageID, @ExecutionOrder\"\
    );\nsb.AppendLine(\"  print @PackageName + ' added to ' + @ApplicationName + '\
    \ application.'\");\nsb.AppendLine(\" end\");\nsb.AppendLine(\"Else\");\nsb.AppendLine(\"\
    \ begin\");\nsb.AppendLine(\"  Update cfg.AppPackages\");\nsb.AppendLine(\"  Set\
    \ ExecutionOrder = @ExecutionOrder\");\nsb.AppendLine(\"  Where ApplicationID\
    \ = @ApplicationID\");\nsb.AppendLine(\"    And PackageID = @PackageID\");\nsb.AppendLine(\"\
    \  print @PackageName + ' execution order updated in the Framework.'\");\nsb.AppendLine(\"\
    \ end\");\nsb.AppendLine();\ne = e + 10;\n}\n```\n"
- fmt: "# 执行 Biml 文件\n\n让我们通过生成 Transact-SQL 文件来进行测试，如 [Figure 20-1](#9781484200834_Ch20.xhtml#Fig1)\
    \ 所示：\n\n![9781484200834_Fig20-01.jpg](images/9781484200834_Fig20-01.jpg)\n\n\
    **[Figure 20-1](#9781484200834_Ch20.xhtml#_Fig1). 执行 FrameworkSQLGen.biml 文件**\n\
    \n右键单击 `FrameworkSQLGen.biml` 文件并单击“生成 SSIS 包”。文件 `MyFile.sql` 应该在 `i-FrameworkSQLGen.biml`\
    \ 包含文件中指定的位置生成。在 SQL Server Management Studio (SSMS) 中打开该文件并执行 SQL 语句。您的输出应类似于\
    \ [Figure 20-2](#9781484200834_Ch20.xhtml#Fig2) 所示：\n\n![9781484200834_Fig20-02.jpg](images/9781484200834_Fig20-02.jpg)\n\
    \n**[Figure 20-2](#9781484200834_Ch20.xhtml#_Fig2). 执行由 FrameworkSQLGen.biml 文件生成的\
    \ SQL 文件**\n\n# 生成 SSIS 命令行\n\n然而，使用 BimlScript 我们可以做更多的事情。我们可以生成使用 Framework\
    \ 的 `Parent.dtsx` 包执行 SSIS 应用程序的命令行。\n\n打开 `i-FrameworkSQLGen.biml` 文件并再添加几个变量，如\
    \ [Listing 20-10](#9781484200834_Ch20.xhtml#list10) 所示：\n\n**[Listing 20-10](#9781484200834_Ch20.xhtml#_list10).\
    \ 向 i-FrameworkSQLGen.biml 文件添加变量**\n\n```\nstring FrameworkParentPkgPath = @\"\
    E:\\Projects\\SSISConfig2014\\SSISConfig2014\\Parent.dtsx\";\nstring CmdFilename\
    \ = @\"G:\\out\\MyCmd.cmd\";\n```\n\n您的文件位置将与 [Listing 20-10](#9781484200834_Ch20.xhtml#list10)\
    \ 中所示的不同。\n\n向您的解决方案中添加一个新的 Biml 文件并将其重命名为 `\"GenerateExecCmd.biml\"`。将以下语句添加到\
    \ `GenerateExecCmd.biml` 中，如 [Listing 20-11](#9781484200834_Ch20.xhtml#list11)\
    \ 所示：\n\n**[Listing 20-11](#9781484200834_Ch20.xhtml#_list11). 构建 GenerateExecCmd.biml\
    \ 文件**\n\n```\n<#@ template language=\"C#\" tier=\"2\" #>\n<#@ include file=\"\
    i-FrameworkSQLGen.biml\" #>\n<#@ import namespace=\"System.Text\" #>\n<#@ import\
    \ namespace=\"System.IO\" #>\n<#  StringBuilder sb = new StringBuilder();\n  \
    \  sb.AppendLine(\"dtexec /FILE \" + FrameworkParentPkgPath + \" /SET \\\\Package.Variables[ApplicationName].Properties[Value];\"\
    \ + applicationName);\n    using (StreamWriter outfile = new StreamWriter(CmdFilename))\n\
    \                {\n                outfile.Write(sb.ToString());\n          \
    \      }\n#>\n```\n\n在解决方案资源管理器中右键单击 `GenerateExecCmd.biml` 文件，然后单击“生成 SSIS 包”。打开\
    \ Windows 资源管理器并浏览到您在 `i_FrameworkSQLGen.biml` 文件中为 `CmdFilename` 变量提供的文件夹。打开刚刚生成的文件，您应该观察到一个类似于\
    \ [Listing 20-12](#9781484200834_Ch20.xhtml#list12) 中所示的字符串：\n\n**[Listing 20-12](#9781484200834_Ch20.xhtml#_list12).\
    \ GenerateExecCmd.biml 文件生成的命令行**\n\n```\ndtexec /FILE E:\\Projects\\SSISConfig2014\\\
    SSISConfig2014\\Parent.dtsx /SET \\Package.Variables[ApplicationName].Properties[Value];Staging_Application\n\
    ```\n\n因为此命令行包含在一个“cmd”文件中，您应该能够双击它并在命令提示符窗口中观察其执行情况，类似于 [Figure 20-3](#9781484200834_Ch20.xhtml#Fig3)\
    \ 所示：\n\n![9781484200834_Fig20-03.jpg](images/9781484200834_Fig20-03.jpg)\n\n\
    **[Figure 20-3](#9781484200834_Ch20.xhtml#_Fig3). 执行由 GenerateExecCmd.biml 生成的命令行**\n\
    \n这有多酷？\n\n## 总结\n\n在本章中，我们扩展了关于业务 Intelligence 标记语言 (Business Intelligence Markup\
    \ Language) 功能的知识。我们已经演示了如何使用 Biml 动态生成 Transact-SQL 语句和执行命令行。\n\n# 附录 A\n\n![image](images/frontdot.jpg)\n\
    \n## SSIS 框架的演进\n\nSSIS 框架是 SSIS 设计模式之后合乎逻辑的下一步，因为框架包含许多模式。至少，一个 SSIS 框架应该提供包执行控制和监控。这听起来很简单，但我向您保证，事实并非如此。执行控制需要对\
    \ Integration Services 运行时 API 有工作知识。理解紧耦合和松耦合的微妙之处不仅有帮助，它可能成就或毁掉您的日子（或数据集成解决方案）。\n\
    \n如果 SSIS 2012 和 2014 包含 SSIS 目录，为什么还需要 SSIS 框架？这是一个很好的问题。SSIS 2012 和 2014 目录使用项目部署模型——这是在\
    \ SQL Server Data Tools - Business Intelligence (SSDT-BI) 中开发的 SSIS 项目的默认模型。但\
    \ SSIS 2012 和 2014 也包含包部署模型，因此它们支持将传统 SSIS 项目升级到 SSIS 2012 或 2014。此外，有使用案例既使用\
    \ SSIS 目录进行执行和监控，也使用自定义框架和包部署模型。作为数据集成架构师，我非常感谢 Microsoft SSIS 团队提供了这两种选项。\n\n\
    在本附录中，我将引导您设计和构建一个自定义的、串行的 SSIS 框架，我将其命名为 SSIS 执行和监控框架。该框架将与 SSIS 2012/2014 的包部署模型配合使用，并包含一个\
    \ SQL Server Reporting Services 解决方案。构建 SSIS 框架是一项高级任务。我将帮助您从头开始构建它，使用本书前面介绍的许多设计模式。\n\
    \n## 从中间开始\n\n我们从执行控制的核心开始，即父-子模式。\n\n```\nAppendLine(\"                And PackageID\
    \ = @PackageID\");\nsb.AppendLine(\"                And ExecutionOrder = @ExecutionOrder)\"\
    );\nsb.AppendLine(\" begin\");\nsb.AppendLine(\"  print 'Adding ' + @ApplicationName\
    \ + '.' + @PackageName + ' to Framework with ExecutionOrder ' + convert(varchar,\
    \ @ExecutionOrder)\");\nsb.AppendLine(\"  exec cfg.AddSSISAppPackage @ApplicationID,\
    \ @PackageID, @ExecutionOrder\");\nsb.AppendLine(\"  print @PackageName + ' added\
    \ and wired to ' + @ApplicationName\");\nsb.AppendLine(\" end\");\nsb.AppendLine(\"\
    Else\");\nsb.AppendLine(\" print @ApplicationName + '.' + @PackageName + ' already\
    \ exists in the Framework with ExecutionOrder ' + convert(varchar, @ExecutionOrder)\"\
    );\nsb.AppendLine();\ne += 10;\n}\n```\n\n此循环内的代码针对从连接对象的 `GenerateTableNodes()`\
    \ 方法调用填充的表集合中包含的每个包执行。每次迭代以一条注释开始以标识 SSIS 包的名称，随后设置 `PackageName` 和 `ExecutionOrder`\
    \ 参数值。`PackageName` 设置为字符串变量 `tbl` 中包含的 SSIS 包的名称；`ExecutionOrder` 设置为整数变量 `e`\
    \ 中包含的值的字符串版本。\n\n接下来，一条检查包是否存在于 Framework 中的条件语句被添加到 `StringBuilder` 变量 `\"sb\"\
    ` 中。如果包元数据不存在，则通过执行 `cfg.AddSSISPackage` 存储过程来添加它，该过程返回 `PackageID` 参数。如果包元数据存在，则执行一条填充\
    \ `PackageID` 参数的语句。\n\n添加到 `stringbuilder` 中的 Transact-SQL 的下一部分是一个类似的部分，用于关联\
    \ SSIS 包和应用程序元数据。这是通过向 `cfg.AppPackages` “桥接”表添加行来实现的——或者告知用户此关系已经存在。\n\n循环的最后一条语句将变量\
    \ `e` 的值增加 10。\n\nBimlScript 的最后部分将 `stringbuilder` 的内容写入到 `i-FrameworkSQLGen.biml`\
    \ 文件中由 `filename` 变量指定的文件中，如 [Listing 20-9](#9781484200834_Ch20.xhtml#list9) 所示：\n\
    \n**[Listing 20-9](#9781484200834_Ch20.xhtml#_list9). 将 Stringbuilder 中的 Transact-SQL\
    \ 写入输出文件**\n\n```\nusing (StreamWriter outfile = new StreamWriter(filename))\n\
    {\n    outfile.Write(sb.ToString());\n}\n    #>\n```"
  raw: 'AppendLine("                And PackageID = @PackageID"); sb.AppendLine("                And
    ExecutionOrder = @ExecutionOrder)"); sb.AppendLine(" begin"); sb.AppendLine("  print
    ''Adding '' + @ApplicationName + ''.'' + @PackageName + '' to Framework with ExecutionOrder
    '' + convert(varchar, @ExecutionOrder)"); sb.AppendLine("  exec cfg.AddSSISAppPackage
    @ApplicationID, @PackageID, @ExecutionOrder"); sb.AppendLine("  print @PackageName
    + '' added and wired to '' + @ApplicationName"); sb.AppendLine(" end"); sb.AppendLine("Else");
    sb.AppendLine(" print @ApplicationName + ''.'' + @PackageName + '' already exists
    in the Framework with ExecutionOrder '' + convert(varchar, @ExecutionOrder)");
    sb.AppendLine(); e += 10; } ```    This code inside the loop executes for every
    package contained in the tables collection populated from the call against the
    connection object’s GenerateTableNodes() method. Each iteration begins with a
    comment to identify the name of the SSIS package followed by the setting of the
    PackageName and ExecutionOrder parameter values. PackageName is set to the name
    of the SSIS Package contained in the string variable tbl; ExecutionOrder is set
    to the string version of the integer value contained in the e variable.    Next,
    a conditional statement which checks for the existence of a package in the Framework
    is added to the StringBuilder variable, “sb.” If the package metadata is not present,
    it is added by executing the cfg.AddSSISPackage stored procedure which returns
    the PackageID parameter. If the package metadata is present, a statement populating
    the PackageID parameter is executed.    The next portion of the Transact-SQL added
    to the stringbuilder is a similar section which associates SSIS Package and Application
    metadata. This is accomplished by adding rows to the cfg.AppPackages “bridge”
    table – or informing the user that this relationship already exists.    The final
    statement of the loop increments the value of the variable e by 10.    The last
    section of BimlScript writes the contents of the stringbuilder to the file specified
    in the i-FrameworkSQLGen.biml file with the filename variable, as shown in [Listing
    20-9](#9781484200834_Ch20.xhtml#list9):    [***Listing 20-9***](#9781484200834_Ch20.xhtml#_list9).
    Writing the Transact-SQL in the Stringbuilder to the Output File    ``` using
    (StreamWriter outfile = new StreamWriter(filename)) {     outfile.Write(sb.ToString());
    }     #> ```    Executing the Biml File    Let’s test by generating the Transact-SQL
    file, as shown in [Figure 20-1](#9781484200834_Ch20.xhtml#Fig1):    ![9781484200834_Fig20-01.jpg](images/9781484200834_Fig20-01.jpg)    [Figure
    20-1](#9781484200834_Ch20.xhtml#_Fig1). Execute the FrameworkSQLGen.biml File    Right-click
    the FrameworkSQLGen.biml file and click Generate SSIS Packages. The file with
    the filename MyFile.sql should be generated in the location contained in the i-FrameworkSQLGen.biml
    include file. Open that file in SQL Server Management Studio (SSMS) and execute
    the SQL statements. Your output should appear similar to that shown in [Figure
    20-2](#9781484200834_Ch20.xhtml#Fig2):    ![9781484200834_Fig20-02.jpg](images/9781484200834_Fig20-02.jpg)    [Figure
    20-2](#9781484200834_Ch20.xhtml#_Fig2). Execute the SQL File Generated by the
    FrameworkSQLGen.biml File    Generating the SSIS Command-Line    We can do even
    more using BimlScript, though. We can generate the command-line to execute the
    SSIS Application using the Framework’s Parent.dtsx package.    Open the i-FrameworkSQLGen.biml
    file and add a couple more variables, as shown in [Listing 20-10](#9781484200834_Ch20.xhtml#list10):    [***Listing
    20-10***](#9781484200834_Ch20.xhtml#_list10). Adding Variables to the i-FrameworkSQLGen.biml
    File    ``` string FrameworkParentPkgPath = @"E:\Projects\SSISConfig2014\SSISConfig2014\Parent.dtsx";
    string CmdFilename = @"G:\out\MyCmd.cmd"; ```    Your file locations will be different
    from those shown in [Listing 20-10](#9781484200834_Ch20.xhtml#list10).


    Add a new Biml file to your solution and rename it “GenerateExecCmd.biml.” Add
    the following statements to GenerateExecCmd.biml, shown in [Listing 20-11](#9781484200834_Ch20.xhtml#list11):    [***Listing
    20-11***](#9781484200834_Ch20.xhtml#_list11). Building the GenerateExecCmd.biml
    File    ``` <#@ template language="C#" tier="2" #> <#@ include file="i-FrameworkSQLGen.biml"
    #> <#@ import namespace="System.Text" #> <#@ import namespace="System.IO" #> <#  StringBuilder
    sb = new StringBuilder();     sb.AppendLine("dtexec /FILE " + FrameworkParentPkgPath
    + " /SET \\Package.Variables[ApplicationName].Properties[Value];" + applicationName);
        using (StreamWriter outfile = new StreamWriter(CmdFilename))                 {
                    outfile.Write(sb.ToString());                 } #> ```    Right-click
    the GenerateExecCmd.biml file in Solution Explorer and click “Generate SSIS Packages.”
    Open Windows Explorer and browse to the folder you supplied for the CmdFilename
    variable in the i_FrameworkSQLGen.biml file. Open the file that was just generated
    and you should observe a string similar to the one shown in [Listing 20-12](#9781484200834_Ch20.xhtml#list12):    [***Listing
    20-12***](#9781484200834_Ch20.xhtml#_list12). The Command Line Generated by the
    GenerateExecCmd.biml File    ``` dtexec /FILE E:\Projects\SSISConfig2014\SSISConfig2014\Parent.dtsx
    /SET \Package.Variables[ApplicationName].Properties[Value];Staging_Application
    ```    Because this command line is contained in a “cmd” file, you should be able
    to double-click it watch it execute in a command prompt window, similar to that
    pictured in [Figure 20-3](#9781484200834_Ch20.xhtml#Fig3):    ![9781484200834_Fig20-03.jpg](images/9781484200834_Fig20-03.jpg)    [Figure
    20-3](#9781484200834_Ch20.xhtml#_Fig3). Executing the Command Line Generated by
    GenerateExecCmd.biml    How cool is that?    Summarizing    In this chapter, we
    have extended our knowledge regarding the functionality of Business Intelligence
    Markup Language. We have demonstrated how to use Biml to dynamically generate
    Transact-SQL statements and execution command lines.    APPENDIX A    ![image](images/frontdot.jpg)    Evolution
    of an SSIS Framework    SSIS frameworks are the next logical step after SSIS design
    patterns because frameworks comprise many patterns. At a minimum, an SSIS framework
    should provide package execution control and monitoring. That sounds simple, but
    I assure you, it is not. Execution control requires a working knowledge of the
    Integration Services runtime API. Understanding the subtleties of tight—and loose—coupling
    is not merely helpful, it can make or ruin your day (or data integration solution).    Why
    would anyone need an SSIS framework if SSIS 2012 and 2014 include the SSIS Catalog?
    That is an excellent question. The SSIS 2012 and 2014 Catalogs utilize the project
    deployment model—the default for SSIS projects developed in SQL Server Data Tools
    - Business Intelligence (SSDT-BI). But SSIS 2012 and 2014 also include the package
    deployment model so they support upgrading legacy SSIS projects to SSIS 2012 or
    2014\. In addition, there are use cases for using the SSIS Catalog for execution
    and monitoring and also for using a custom framework and the package deployment
    model. As a data integration architect, I am very grateful to the Microsoft SSIS
    Team for both options.    In this appendix, I will walk you through designing
    and building a custom, serial SSIS framework that I’ve named the SSIS Execution
    and Monitoring Framework. This framework will work with SSIS 2012/2014’s package
    deployment model, complete with a SQL Server Reporting Services solution. Building
    an SSIS framework is an advanced task. I will help you build it from the ground
    up using many of the design patterns covered earlier in this book.    Starting
    in the Middle    We begin at the heart of execution control with the parent–child
    pattern.'
