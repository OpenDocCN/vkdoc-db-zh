    you are using this table to stage data from the flat file, use the same column
    names you found in the source file. However, you should also use the strong data
    types you created in our Derived Column transformation. Fortunately for you, our
    naming convention makes these changes relatively painless. Simply delete the DDL
    for the first three columns (`RecordType`, `Name`, and `Value`), and then remove
    the first three letters of the remaining columns, which will rename them to `RecordType`,
    `Name`, and `Value`. [Listing 7-3](#9781484200834_Ch07.xhtml#list3) shows the
    result.


    [***Listing 7-3***](#9781484200834_Ch07.xhtml#_list3). The Modified CREATE TABLE
    Statement


    ```

    CREATE TABLE [FlatFileDest] (

        [RecordType] varchar(1),

        [Name] varchar(50),

        [Value] int

    )

    ```


    When you click the OK button, the DDL statement is executed against `StagingDB`—creating
    the `FlatFileDest` table. That’s a good thing, because your OLE DB destination
    adapter is warning you that you need to complete Input-to-Output mappings (shown
    in [Figure 7-6](#9781484200834_Ch07.xhtml#Fig6)).


    ![9781484200834_Fig07-06.jpg](images/9781484200834_Fig07-06.jpg)


