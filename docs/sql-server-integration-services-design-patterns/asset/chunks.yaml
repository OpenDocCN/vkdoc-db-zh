    The XML Source component will generate a separate output for each nested XML element.
    There will be three outputs for the XML document in [Listing 9-3](#9781484200834_Ch09.xhtml#list3):
    `Customers`, `Customer`, and `Name`. Each output contains the elements and attributes
    that were defined in the schema, as well as an `<element_name>_Id` column, which
    acts as a primary key for the row. Outputs generated for child elements will contain
    an `_Id` column for their parent element’s output, which allows the data to be
    joined later in your data flow if needed.


