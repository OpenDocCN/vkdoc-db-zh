    # 部署方法


    本节介绍 SSIS 目录支持的不同部署方法。你选择哪种方法取决于你的环境以及执行部署的人员（无论是开发人员、ETL 操作员还是 DBA）最习惯使用的方式。此处描述的部署方法包括：

    *   从命令行部署

    *   使用自定义代码部署

    *   使用 PowerShell 部署

    *   使用 SQL 部署


    ## 从命令行部署


    部署向导（`ISDeploymentWizard.exe`）提供了命令行界面，允许你在没有 UI 的情况下部署到 SSIS 目录。这对于从脚本部署或作为批处理过程的一部分非常有用。


    表 18-1 显示了支持的参数列表。清单 18-1 提供了一个命令行示例，用于将一个项目（`C:\ETL\Project.ispac`）部署到本地 SSIS
    目录中名为 MyFolder 的文件夹。


    ### Integration Services 部署向导命令行参数


    | 参数 | 缩写版本 | 描述 |

    | --- | --- | --- |

    | `Silent[+\|-]` | `S` | 当此选项为 true 时，部署将在无 UI 模式下（仅命令行）进行。从批处理文件部署时使用此选项。默认值为‘-’，将显示
    UI。示例：`/Silent+` |

    | `SourceType:{File\|Server}` | `ST` | 此选项指定源项目来自文件系统还是另一个 SSIS 目录。默认值为 "File."
    示例：`/SourceType:File` |

    | `SourcePath:path_to_project` | `SP` | 要部署的 `.ispac` 文件的路径（当使用 `File` 源时），或项目名称的路径（当使用
    `Server` 源时）。示例：`/SourcePath:C:\ETL\project.ispac` |

    | `SourceServer:server_instance` | `SS` | 当 `SourceType` 设置为 `Server` 时的服务器实例名称。示例：`/SourceServer:localhost\SQL1`
    |

    | `ProjectPassword:password` | `PP` | 如果源 `.ispac` 文件受密码保护，此参数可用于提供密码。请注意，在命令行上指定密码不推荐，因为系统上的其他用户可能能够看到参数。如果你的项目文件使用密码加密，请考虑在响应文件中指定密码（有关更多信息，请参见
    `@<file>` 选项） |

    | `DestinationServer:server_instance` | `DS` | 你要部署到的服务器实例名称。示例：`/DestinationServer:localhost`
    |

    | `DestinationPath:path` | `DP` | 你希望在目标服务器上部署项目的路径。路径格式为 `"/<catalog>/<folder>/<project>"`。示例：`/DestinationPath:/SSISDB/MyFolder/Project`
    |

    | `@<file>` | | 此选项允许你在文本文件中指定所有命令行参数，而不是直接在命令行输入。示例：`@arguments.txt` |


    ### 清单 18-1：从命令行部署项目

    ```

    ISDeploymentWizard.exe /Silent /SourcePath:"C:\ETL\Project.ispac" /DestinationServer:"localhost"
    /DestinationPath:"/SSISDB/MyFolder/Project"

    ```


    > **注意**：当部署向导以交互式（UI）模式运行时，“审阅”页面会显示用于执行基于命令行部署的等效参数。这可以是一个方便的快捷方式——只需将命令行参数复制到批处理文件中，即可在未来执行自动部署。


    ## 使用自定义代码部署


    SSIS 目录有一个名为管理对象模型（或 MOM）的托管 .NET API。此 API 允许你以编程方式执行通常通过 SQL Server Management
    Studio (SSMS) 完成的相同管理任务，包括文件夹创建和项目部署。


    清单 18-2 提供了一个使用 MOM 在 SSIS 目录中创建新文件夹并将项目部署到其中的 C# 应用程序示例。核心功能可以在 `Microsoft.SqlServer.Management.IntegrationServices`
    程序集中找到，该程序集随 SSMS 安装，并与所有依赖项一起位于全局程序集缓存 (GAC) 中。


    > **提示**：如果你找不到 `Microsoft.SQLServer.ManagedDTS.dll` 文件，请查看 .Net Framework 4.0
    全局程序集缓存 (GAC) 目录，在默认安装中，该目录通常是 `C:\Windows\Microsoft.NET\assembly`。


    ### 清单 18-2：使用管理对象模型部署项目

    ```

    using System;

    using System.Collections.Generic;

    using System.Linq;

    using System.Text;

    using Microsoft.SqlServer.Management.IntegrationServices;

    using Microsoft.SqlServer.Management.Smo;

    using Microsoft.SqlServer.Dts.Runtime;

    using System.IO;


    class Program

    {

        const string ProjectFileLocation = @"C:\ETL\Project.ispac";

        static void Main(string[] args)

        {

            // Connect to the default instance on localhost

            var server = new Server("localhost");

            var store = new IntegrationServices(server);

            // Check that we have a catalog

            if (store.Catalogs.Count == 0)

            {

                Console.WriteLine("SSIS catalog not found on localhost.");

            }

            // Get the SSISDB catalog - note that there should only

            // be one, but the API may support multiple catalogs

            // in the future

            var catalog = store.Catalogs["SSISDB"];

            // Create a new folder

            var folder = new CatalogFolder(catalog,

                                          "MyFolder",

                                          "Folder that holds projects");

            folder.Create();

            // Make sure the project file exists

            if (!File.Exists(ProjectFileLocation))

            {

                Console.WriteLine("Project file not found at: {0}",

                                  ProjectFileLocation);

            }

            // Load the project using the SSIS API

            var project = Project.OpenProject(ProjectFileLocation);

            // Deploy the project to the folder we just created

            folder.

    ```


    ## 从 SSDT-BI 启动部署向导


    要从 SSDT-BI 启动部署向导，请在解决方案资源管理器中右键单击项目，然后选择 `部署` 选项。向导将自动加载你的项目文件，将你带到“选择目标”页面（如
    图 18-2 所示）。


    ![9781484200834_Fig18-02.jpg](img/9781484200834_Fig18-02.jpg)


    图 18-2。可以从 SSDT-BI 启动 Integration Services 部署向导


    > **注意**：部署向导通常用于将文件部署到 SSIS 目录，但它也可用于在服务器之间移动项目。为此，请在“选择源”页面选择 Integration Services
    目录选项。


    部署向导允许你选择要将项目部署到的服务器和文件夹。在最后一页上，项目文件被发送到服务器并存储在 SSIS 目录中。请注意，在部署过程中，向导指示它正在更改项目的保护级别（图
    18-3）。在此阶段，项目内的敏感数据被解密，项目被转换为 `服务器存储` 保护级别。服务器依赖于数据库加密来保护包和参数值——这些表在 SSIS 目录中会自动加密。


    ![9781484200834_Fig18-03.jpg](img/9781484200834_Fig18-03.jpg)


    图 18-3。部署向导状态页面


    > **注意**：有关包保护级别和安全部署的更多信息，请参阅联机丛书 `http://msdn.microsoft.com/en-us/library/bb522558.aspx`。

