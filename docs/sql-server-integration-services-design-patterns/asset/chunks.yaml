    \n[图 A-27](#9781484200834_AppA.xhtml#_Fig27). 单个应用程序实例的包实例\n\n以这种方式构建报告是有意义的。应用程序实例报告成为包实例报告的“网关”——可以说是“仪表盘”。稍后会详细介绍……\n\
    \n让我们将注意力转向错误日志数据。要检索它，请使用[清单 A-24](#9781484200834_AppA.xhtml#list24)中所示的T-SQL脚本。\n\
    \n### [清单 A-24](#9781484200834_AppA.xhtml#_list24). 构建 rpt.ReturnErrors 存储过程\n\
    \n```sql\n/* rpt.ReturnErrors stored procedure */\nIf Exists(Select s.name + '.'\
    \ + p.name\n          From sys.procedures p\n          Join sys.schemas s\n  \
    \          On s.schema_id = p.schema_id\n          Where s.name = 'rpt'\n    \
    \        And p.name = 'ReturnErrors')\n begin\n   print 'Dropping rpt.ReturnErrors\
    \ stored procedure'\n   Drop Procedure rpt.ReturnErrors\n   print 'Rpt.ReturnErrors\
    \ stored procedure dropped'\n end\n\nprint 'Creating rpt.ReturnErrors stored procedure'\n\
    go\n\nCreate Procedure rpt.ReturnErrors\n  @AppInstanceID int\n ,@PkgInstanceID\
    \ int = NULL\nAs\n  Select\n     a.ApplicationName\n   ,p.PackageName\n   ,er.SourceName\n\
    \   ,er.ErrorDateTime\n   ,er.ErrorDescription\n From log.SSISErrors er\n Join\
    \ log.SSISAppInstance ai\n     On ai.AppInstanceID = er.AppInstanceID\n Join cfg.Applications\
    \ a\n     On a.ApplicationID = ai.ApplicationID\n Join log.SSISPkgInstance cp\n\
    \     On cp.PkgInstanceID = er.PkgInstanceID\n         And cp.AppInstanceID =\
    \ er.AppInstanceID\n Join cfg.AppPackages ap\n     On ap.AppPackageID = cp.AppPackageID\n\
    \ Join cfg.Packages p\n     On p.PackageID = ap.PackageID\n Where er.AppInstanceID\
    \ = Coalesce(@AppInstanceID, er.AppInstanceID)\n     And er.PkgInstanceID = Coalesce(@PkgInstanceID,\
    \ er.PkgInstanceID)\n Order By ErrorDateTime Desc\ngo\n\nprint 'Rpt.ReturnErrors\
    \ stored procedure created.'\nprint ''\n```\n\n[清单 A-24](#9781484200834_AppA.xhtml#list24)中的T-SQL构建了\
    \ `rpt.ReturnErrors` 存储过程，它将为新的报告提供数据。现在让我们在SSDT中构建该报告。\n\n在 `SSISConfig2012Reports`\
    \ 解决方案中添加一个名为 `Errors` 的新报告。使用 `rpt.ReturnErrors` 存储过程作为源。请记住更新数据集和两个报告参数：`AppinstanceID`\
    \ 和 `PkgInstanceID`。\n\n在表的数据行上，编辑 `BackgroundColor` 属性，添加以下表达式：\n\n```vbnet\n\
    =Iif(RowNumber(Nothing) Mod 2 = 0,\"White\",\"WhiteSmoke\")\n```\n\n我们在这里不是为了反映状态而对每个单元格的背景进行着色；如果我们这样做，报告将充满\
