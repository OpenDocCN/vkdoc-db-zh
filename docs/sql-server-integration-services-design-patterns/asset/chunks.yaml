    SourceColumn="ColA" TargetColumn="Dest_ColA" />         <Column SourceColumn="ColB"
    TargetColumn="Dest_ColB" />         <Column SourceColumn="ColC" TargetColumn="Dest_ColC"
    />       </Outputs>     </Lookup>     <OleDbDestination Name="tblDest Destination"
    ConnectionName="SSISIncrementalLoad_Dest">       <InputPath OutputPathName="Correlate.NoMatch"
    />       <ExternalTableOutput Table="dbo.tblDest" />     </OleDbDestination>     <ConditionalSplit
    Name="Filter">       <InputPath OutputPathName="Correlate.Match"/>       <OutputPaths>
            <OutputPath Name="Changed Rows">           <Expression>(ColA != Dest_ColA)
    || (ColB != Dest_ColB) ||           (ColC != Dest_ColC)</Expression>         </OutputPath>
          </OutputPaths>     </ConditionalSplit>     <OleDbDestination Name="stgUpdates"
    ConnectionName="SSISIncrementalLoad_Dest">       <InputPath OutputPathName="Filter.Changed
    Rows" />       <ExternalTableOutput Table="dbo.stgUpdates" />     </OleDbDestination>
      </Transformations> </Dataflow> ```    There remains one more Execute SQL task
    to complete our incremental load SSIS package. This task will update the Destination
    table by applying the rows stored in the `"dbo.stgUpdates"` table using a single
    Update T-SQL statement. Applying the updates in this fashion is generally faster
    than updating each row individually.    To continue developing the demo code,
    add an ExecuteSQL XML node immediately following the `</Dataflow>` tag with the
    following attribute name and value pairs.    *   `Name`: `Apply stgUpdates` *   `ConnectionName`:
    `SSISIncrementalLoad_Dest`    Immediately following the `<ExecuteSQL>` tag, add
    a PrecedenceConstraints node, followed by an Inputs node.


    Inside the `<Inputs>` tag add an Input node containing an attribute named `OutputPathName`
    set to the value `"Load tblDest.Output"`. Add a DirectInput node immediately following
    the `</PrecedenceConstraints>` tag. Inside the `<DirectInput>` tags, add the following
    T-SQL statement.    ``` Update Dest Set Dest.ColA = Upd.ColA    ,Dest.ColB = Upd.ColB
       ,Dest.ColC = Upd.ColC From tblDest Dest Join stgUpdates Upd   On Upd.ColID
    = Dest.ColID ```    Believe it or not, that’s it! If your Biml looks like [Listing
