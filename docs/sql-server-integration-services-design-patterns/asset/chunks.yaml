    The first step in pulling data from DB2 is to select a provider that can be used
    in your environment. There are two steps to accomplishing this:


    1.  Find the database version.

    2.  Pick the provider vendor.


    Find the Database Version


    The first step in selecting your DB2 provider is to learn what version you own.
    Combining the version information with the product type will help you choose what
    provider to use. If you’re not sure what type of server you’re working with, you
    have a couple of options. The first option is to use a DB2 administration tool
    to check the properties of your instance. For example, if you use Control Center,
    you can right-click on the instance name, and click the About menu option. This
    will show you something similar to [Figure 6-1](#9781484200834_Ch06.xhtml#Fig1).


