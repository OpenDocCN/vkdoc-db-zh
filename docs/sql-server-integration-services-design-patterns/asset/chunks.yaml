- fmt: "There is one last option we need to discuss. Underneath the Loading Mode is\
    \ a checkbox for `Roll-Back Load on Table Update or Insert Failure`. In order\
    \ to understand this option, you need to understand a little about how data is\
    \ loaded into PDW. When data is loaded using the Append, Reload, or Upsert modes,\
    \ PDW performs a two-phase load. In Phase 1, the data is loaded into the staging\
    \ database. In Phase 2, PDW performs an `INSERT`/`SELECT` of the sorted data into\
    \ the final destination table. By default, data is loaded in parallel on all Compute\
    \ nodes, but it is loaded serially within a Compute node to each distribution.\
    \ This is necessary in order to support rollback. Roughly 85–95% of the load process\
    \ is spent in Phase 1. When `Roll-Back Load on Table Update or Insert Failure`\
    \ is deselected, each distribution is loaded in parallel instead of serially during\
    \ Phase 2. So, in other words, deselecting this option will improve performance\
    \ but only affects 5–15% of the overall process. Also, deselecting this option\
    \ removes PDW’s ability to roll back; in the event of a failure during Phase 2,\
    \ you would be responsible for cleaning up any partially inserted data.\n\nBecause\
    \ of the potential risk and minimal gain, it is best practice to deselect this\
    \ option only when you are loading to an empty table. FastAppend is unaffected\
    \ by this option because it always skips Phase 2 and loads directly into the final\
    \ table, which is why FastAppend also does not support rollback.\n\n![Image](images/sq.jpg)\
    \ **Tip** `Roll-Back Load on Table Update or Insert Failure` is also available\
    \ in DWLoader using the `–m` option.\n\nReturn to the PDW Destination Editor and\
    \ select Append in the Loading Mode field. Because the destination table is currently\
    \ empty, deselect the `Roll-Back Load on Table Update or Insert Failure` option\
    \ to receive a small, risk-free performance boost.\n\nYou are almost done with\
    \ your first data flow. All you have left to do is to map your data. Drag the\
    \ blue arrow from the Data Conversion box to the SQL Server PDW Destination box,\
    \ and then double-click on `SQL Server PDW Destination`. Map your input and destination\
    \ columns. Make sure to map `webID` to your transformed `converted_webID` column.\
    \ Click OK.\n\nYou have now successfully completed your first data flow connecting\
    \ SQL Server to PDW. All you have left is to multithread the package.\n\n## Multithreading\n\
    \nYou have completed the data flow for 2013, but you still need to create identical\
    \ data flows for 2014 and 2015. You can do this easily by using copy and paste.\n\
    \nFirst, click on the Control Flow tab and rename the first Data Flow `SalesMart\
    \ 2013`. Then, copy and paste the first data flow and rename it `SalesMart 2014`.\n\
    \nDouble-click on `SalesMart 2014` to return to the Data Flow designer, then double-click\
    \ on the `OLE DB Source`. Replace the SQL Command with the code in [Listing 8-8](#9781484200834_Ch08.xhtml#list8).\n\
    \n**Listing 8-8. SQL Command for 2014 Data**\n\n```\n/* Retrieve sales for 2014\
    \ */\nSELECT\n      orderID\n    , orderDate\n    , customerID\n    , webID\n\
    FROM PDW_Example.dbo.FactSales\nWHERE orderDate >= '2014-01-01'\n    AND orderDate\
    \ < '2015-01-01';\n```\n\nReturn to the Control Flow tab and copy the `SalesMart\
    \ 2013` data flow again. Rename it `Sales Mart 2015`. Using the code in [Listing\
    \ 8-9](#9781484200834_Ch08.xhtml#list9), replace the SQL command in the `OLE DB\
    \ Source`.\n\n**Listing 8-9. SQL Command for 2015 Data**\n\n```\n/* Retrieve sales\
    \ for 2015 */\nSELECT\n      orderID\n    , orderDate\n    , customerID\n    ,\
    \ webID\nFROM PDW_Example.dbo.FactSales\nWHERE orderDate >= '2015-01-01'\n   \
    \ AND orderDate < '2016-01-01';\n```\n\nYou are now ready to execute the package!\
    \ Press `F5` or navigate to Debug ![image](images/arrow.jpg) Start Debugging.\
    \ Your package should execute, and you should see a successful result.\n\n## Limitations\n\
    \nETL developers and data integration engineers should be aware of the following\
    \ limitations and behaviors in PDW when developing ETL solutions:\n\n*   PDW is\
    \ limited to a maximum of ten (10) active, concurrent loads. This number applies\
    \ to the appliance as a whole, regardless of the number of Compute nodes, and\
    \ cannot be changed.\n*   Each PDW destination adapter defined in an Integration\
    \ Services package counts as one concurrent load. An Integration Services package\
    \ with more than ten PDW destination adapters defined will not execute.\n*   As\
    \ previously mentioned, not all SQL Server data types are supported in PDW. Refer\
    \ to the list in [Table 8-1](#9781484200834_Ch08.xhtml#Tab1) under “ETL vs. ELT,”\
    \ or in your PDW documentation, for more details.\n\nA small amount of overhead\
    \ is associated with each load operation. This overhead is a necessary part of\
    \ operating in a distributed environment. For example, the loading server needs\
    \ to communicate with the Control node to identify which Compute nodes should\
    \ receive data. Because this overhead is incurred on every single load, transactional\
    \ load patterns (such as singleton inserts) should be avoided. PDW performs at\
    \ its best when data is loaded in large, incremental batches. You will see much\
    \ better performance loading 10 files with a 100,000 rows each, or a single file\
    \ with 1,000,000 rows, than loading 1,000,000 rows individually.\n\n## Summary\n\
    \nWe’ve covered a lot of material in this chapter. You have learned about the\
    \ architectures of Microsoft’s Analytics Platform System (APS) and SQL Server\
    \ Parallel Data Warehouse (PDW). You’ve learned about the differences between\
    \ SMP and MPP systems and why MPP systems are better suited for large analytical\
    \ workloads. You have learned about different methods for loading PDW and ways\
    \ to improve load performance. You have also discovered some best practices along\
    \ the way. Lastly, you walked through a step-by-step exercise to parallelize loading\
    \ data from SQL Server into PDW using SSIS.\n\n## CHAPTER 9\n\n![image](images/frontdot.jpg)\n\
    \n### XML Patterns\n\nXML is a popular format for exchanging data between systems.\
    \ SSIS provides an `XML Source` adapter, but because of the flexible nature of\
    \ XML, it can sometimes be tricky to get your data to fit into the tabular format\
    \ that the SSIS data flow expects. This chapter describes the formats that work\
    \ best with the `XML Source` and two alternative patterns for reading XML data\
    \ with SSIS.\n\n### Using the XML Source\n\nLike most Data Flow components, the\
    \ `XML Source` component requires column metadata to be set at design time. This\
    \ is done using an XML schema file (`.xsd`). The `XML Source` component uses the\
    \ XML structure defined in the schema to create one or more outputs, and it also\
    \ uses the element and attribute data types to set the column metadata. Changing\
    \ the schema file will refresh the component’s metadata and may cause validation\
    \ errors if you have already mapped some of its outputs.\n\nIf you don’t already\
    \ have an XML schema defined for your document, SSIS can generate one for you.\
    \ Click the Generate Schema button on the `XML Source` editor UI, and the component\
    \ will infer the schema from the current document. Note that although this schema\
    \ is guaranteed to work with the current XML file, it might not work for others\
    \ if optional elements or values are longer than expected. You may need to modify\
    \ the generated schema file by hand to ensure that the `minOccurs` and `maxOccurs`\
    \ attribute values are correct for each element and that the data types were set\
    \ correctly.\n\nThe `XML Source` is easiest to use when your input file has a\
    \ simple element/subelement structure. [Listing 9-1](#9781484200834_Ch09.xhtml#list1)\
    \ shows an example of that structure.\n\n**Listing 9-1. Simple XML Format Using\
    \ Elements**\n\n```\n<root>\n    <node>\n        <subnode>value</subnode>\n  \
    \      <anothersubnode>1</anothersubnode>\n    </node>\n    <node>\n        <subnode>value</subnode>\n\
    \        <anothersubnode>2</anothersubnode>\n    </node>\n</root>\n```"
  raw: 'There is one last option we need to discuss. Underneath the Loading Mode is
    a checkbox for Roll-Back Load on Table Update or Insert Failure. In order to understand
    this option, you need to understand a little about how data is loaded into PDW.
    When data is loaded using the Append, Reload, or Upsert modes, PDW performs a
    two-phase load. In Phase 1, the data is loaded into the staging database. In Phase
    2, PDW performs an `INSERT`/`SELECT` of the sorted data into the final destination
    table. By default, data is loaded in parallel on all Compute nodes, but it is
    loaded serially within a Compute node to each distribution. This is necessary
    in order to support rollback. Roughly 85–95% of the load process is spent in Phase
    1\. When Roll-Back Load on Table Update or Insert Failure is deselected, each
    distribution is loaded in parallel instead of serially during Phase 2\. So, in
    other words, deselecting this option will improve performance but only affects
    5–15% of the overall process. Also, deselecting this option removes PDW’s ability
    to roll back; in the event of a failure during Phase 2, you would be responsible
    for cleaning up any partially inserted data.


    Because of the potential risk and minimal gain, it is best practice to deselect
    this option only when you are loading to an empty table. FastAppend is unaffected
    by this option because it always skips Phase 2 and loads directly into the final
    table, which is why FastAppend also does not support rollback.


    ![Image](images/sq.jpg) **Tip**  Roll-Back Load on Table Update or Insert Failure
    is also available in DWLoader using the `–m` option.


    Return to the PDW Destination Editor and select Append in the Loading Mode field.
    Because the destination table is currently empty, deselect the Roll-Back Load
    on Table Update or Insert Failure option to receive a small, risk-free performance
    boost.


    You are almost done with your first data flow. All you have left to do is to map
    your data. Drag the blue arrow from the Data Conversion box to the SQL Server
    PDW Destination box, and then double-click on SQL Server PDW Destination. Map
    your input and destination columns. Make sure to map `webID` to your transformed
    `converted_webID` column. Click OK.


    You have now successfully completed your first data flow connecting SQL Server
    to PDW. All you have left is to multithread the package.


    Multithreading


    You have completed the data flow for 2013, but you still need to create identical
    data flows for 2014 and 2015\. You can do this easily by using copy and paste.


    First, click on the Control Flow tab and rename the first Data Flow **SalesMart
    2013**. Then, copy and paste the first data flow and rename it **SalesMart 2014**.


    Double-click on SalesMart 2014 to return to the Data Flow designer, then double-click
    on the OLE DB Source. Replace the SQL Command with the code in [Listing 8-8](#9781484200834_Ch08.xhtml#list8).


    [***Listing 8-8***](#9781484200834_Ch08.xhtml#_list8). SQL Command for 2014 Data


    ```

    /* Retrieve sales for 2014 */

    SELECT

          orderID

        , orderDate

        , customerID

        , webID

    FROM PDW_Example.dbo.FactSales

    WHERE orderDate >= ''2014-01-01''

        AND orderDate < ''2015-01-01'';

    ```


    Return to the Control Flow tab and copy the SalesMart 2013 data flow again. Rename
    it **Sales Mart 2015**. Using the code in [Listing 8-9](#9781484200834_Ch08.xhtml#list9),
    replace the SQL command in the OLE DB Source.


    [***Listing 8-9***](#9781484200834_Ch08.xhtml#_list9). SQL Command for 2015 Data


    ```

    /* Retrieve sales for 2015 */

    SELECT

          orderID

        , orderDate

        , customerID

        , webID

    FROM PDW_Example.dbo.FactSales

    WHERE orderDate >= ''2015-01-01''

        AND orderDate < ''2016-01-01'';

    ```


    You are now ready to execute the package! Press F5 or navigate to Debug ![image](images/arrow.jpg)
    Start Debugging. Your package should execute, and you should see a successful
    result.


    Limitations


    ETL developers and data integration engineers should be aware of the following
    limitations and behaviors in PDW when developing ETL solutions:


    *   PDW is limited to a maximum of ten (10) active, concurrent loads. This number
    applies to the appliance as a whole, regardless of the number of Compute nodes,
    and cannot be changed.

    *   Each PDW destination adapter defined in an Integration Services package counts
    as one concurrent load. An Integration Services package with more than ten PDW
    destination adapters defined will not execute.

    *   As previously mentioned, not all SQL Server data types are supported in PDW.
    Refer to the list in [Table 8-1](#9781484200834_Ch08.xhtml#Tab1) under “ETL vs.
    ELT,” or in your PDW documentation, for more details.


    A small amount of overhead is associated with each load operation. This overhead
    is a necessary part of operating in a distributed environment. For example, the
    loading server needs to communicate with the Control node to identify which Compute
    nodes should receive data. Because this overhead is incurred on every single load,
    transactional load patterns (such as singleton inserts) should be avoided. PDW
    performs at its best when data is loaded in large, incremental batches. You will
    see much better performance loading 10 files with a 100,000 rows each, or a single
    file with 1,000,000 rows, than loading 1,000,000 rows individually.


    Summary


    We’ve covered a lot of material in this chapter. You have learned about the architectures
    of Microsoft’s Analytics Platform System (APS) and SQL Server Parallel Data Warehouse
    (PDW). You’ve learned about the differences between SMP and MPP systems and why
    MPP systems are better suited for large analytical workloads. You have learned
    about different methods for loading PDW and ways to improve load performance.
    You have also discovered some best practices along the way. Lastly, you walked
    through a step-by-step exercise to parallelize loading data from SQL Server into
    PDW using SSIS.


    CHAPTER 9


    ![image](images/frontdot.jpg)


    XML Patterns


    XML is a popular format for exchanging data between systems. SSIS provides an
    XML Source adapter, but because of the flexible nature of XML, it can sometimes
    be tricky to get your data to fit into the tabular format that the SSIS data flow
    expects. This chapter describes the formats that work best with the XML Source
    and two alternative patterns for reading XML data with SSIS.


    Using the XML Source


    Like most Data Flow components, the XML Source component requires column metadata
    to be set at design time. This is done using an XML schema file (`.xsd`). The
    XML Source component uses the XML structure defined in the schema to create one
    or more outputs, and it also uses the element and attribute data types to set
    the column metadata. Changing the schema file will refresh the component’s metadata
    and may cause validation errors if you have already mapped some of its outputs.


    If you don’t already have an XML schema defined for your document, SSIS can generate
    one for you. Click the Generate Schema button on the XML Source editor UI, and
    the component will infer the schema from the current document. Note that although
    this schema is guaranteed to work with the current XML file, it might not work
    for others if optional elements or values are longer than expected. You may need
    to modify the generated schema file by hand to ensure that the `minOccurs` and
    `maxOccurs` attribute values are correct for each element and that the data types
    were set correctly.


    The XML Source is easiest to use when your input file has a simple element/subelement
    structure. [Listing 9-1](#9781484200834_Ch09.xhtml#list1) shows an example of
    that structure.


    [***Listing 9-1***](#9781484200834_Ch09.xhtml#_list1). Simple XML Format Using
    Elements


    ```

    <root>

        <node>

            <subnode>value</subnode>

            <anothersubnode>1</anothersubnode>

        </node>

        <node>

            <subnode>value</subnode>

            <anothersubnode>2</anothersubnode>

        </node>

    </root>

    ```'
  trans: "\n我们需要讨论最后一个选项。在加载模式下方，有一个名为 `在表更新或插入失败时回滚加载` 的复选框。要理解此选项，你需要对数据如何加载到 PDW\
    \ 有所了解。当使用追加、重新加载或更新插入模式加载数据时，PDW 会执行两阶段加载。在第一阶段，数据被加载到暂存数据库中。在第二阶段，PDW 对排序后的数据执行\
    \ `INSERT`/`SELECT` 操作，将其加载到最终的目标表中。默认情况下，数据会在所有计算节点上并行加载，但在每个计算节点内，数据是按分配顺序串行加载的。这对于支持回滚是必要的。加载过程的大约\
    \ 85-95%的时间都花在了第一阶段。当 `在表更新或插入失败时回滚加载` 选项被取消选中时，在第二阶段，每个分配将并行加载而不是串行加载。所以，换句话说，取消选择此选项将提高性能，但仅影响整个过程的\
    \ 5-15%。此外，取消选择此选项会移除 PDW 的回滚能力；如果在第二阶段发生失败，你需要自行清理任何部分插入的数据。\n\n鉴于潜在的风险和微小的收益，最佳实践是仅在向空表加载数据时才取消选择此选项。FastAppend\
    \ 不受此选项影响，因为它总是跳过第二阶段并直接加载到最终表中，这也是为什么 FastAppend 也不支持回滚。\n\n![Image](img/sq.jpg)\
    \ **提示** 在 DWLoader 中，通过使用 `–m` 选项也可以使用 `在表更新或插入失败时回滚加载` 功能。\n\n回到 PDW 目标编辑器，在加载模式字段中选择追加。由于目标表当前为空，取消选择\
    \ `在表更新或插入失败时回滚加载` 选项，以获得一点无风险的性能提升。\n\n你几乎完成了你的第一个数据流任务。剩下要做的就是映射你的数据。将蓝色箭头从数据转换框拖到\
    \ SQL Server PDW 目标框，然后双击 `SQL Server PDW Destination`。映射你的输入列和目标列。确保将 `webID`\
    \ 映射到你转换后的 `converted_webID` 列。点击确定。\n\n现在，你已经成功完成了连接 SQL Server 到 PDW 的第一个数据流。剩下的任务就是为该包设置多线程。\n\
    \n## 多线程\n\n你已经完成了 2013 年的数据流，但仍需要为 2014 年和 2015 年创建相同的数据流。通过复制和粘贴，你可以轻松地做到这一点。\n\
    \n首先，点击控制流选项卡，并将第一个数据流重命名为 `SalesMart 2013`。然后，复制并粘贴第一个数据流，并将其重命名为 `SalesMart\
    \ 2014`。\n\n双击 `SalesMart 2014` 返回到数据流设计器，然后双击 `OLE DB Source`。用 Listing 8-8 中的代码替换\
    \ SQL 命令。\n\n**代码清单 8-8. 用于 2014 年数据的 SQL 命令**\n\n```\n/* 检索 2014 年的销售数据 */\n\
    SELECT\n      orderID\n    , orderDate\n    , customerID\n    , webID\nFROM PDW_Example.dbo.FactSales\n\
    WHERE orderDate >= '2014-01-01'\n    AND orderDate < '2015-01-01';\n```\n\n返回到控制流选项卡，再次复制\
    \ `SalesMart 2013` 数据流。将其重命名为 `Sales Mart 2015`。使用 Listing 8-9 中的代码，替换 `OLE DB\
    \ Source` 中的 SQL 命令。\n\n**代码清单 8-9. 用于 2015 年数据的 SQL 命令**\n\n```\n/* 检索 2015 年的销售数据\
    \ */\nSELECT\n      orderID\n    , orderDate\n    , customerID\n    , webID\n\
    FROM PDW_Example.dbo.FactSales\nWHERE orderDate >= '2015-01-01'\n    AND orderDate\
    \ < '2016-01-01';\n```\n\n现在你已准备好执行该包！按 `F5` 或导航到调试 ![image](img/arrow.jpg) 开始调试。你的包应该会执行，并且你应该能看到一个成功的结果。\n\
    \n## 限制\n\nETL 开发人员和数据集成工程师在开发 ETL 解决方案时，应注意 PDW 中的以下限制和行为：\n\n*   PDW 最多只允许十个（10）个活动的、并发的加载操作。此数字适用于整个设备，与计算节点的数量无关，并且无法更改。\n\
    *   在 Integration Services 包中定义的每个 PDW 目标适配器都计为一个并发加载操作。定义了超过十个 PDW 目标适配器的 Integration\
    \ Services 包将无法执行。\n*   如前所述，并非所有 SQL Server 数据类型都在 PDW 中受支持。更多详情，请参考“ETL 与 ELT”部分下的\
    \ Table 8-1 中的列表，或查阅你的 PDW 文档。\n\n每次加载操作都伴随着少量开销。这是在分布式环境中操作的必要部分。例如，加载服务器需要与控制节点通信，以确定哪些计算节点应接收数据。由于每次加载都会产生此开销，因此应避免事务性加载模式（如单例插入）。当以大型、增量的批次加载数据时，PDW\
    \ 的性能最佳。加载 10 个各有 10 万行的文件，或一个包含 100 万行的单个文件，其性能会远胜于加载 100 万个单独的行。\n\n## 总结\n\n\
    我们在本章中涵盖了大量的内容。你了解了 Microsoft 分析平台系统（APS）和 SQL Server 并行数据仓库（PDW）的架构。你了解了 SMP\
    \ 和 MPP 系统之间的区别，以及为什么 MPP 系统更适合大型分析工作负载。你学习了加载 PDW 的不同方法以及提高加载性能的途径。在此过程中，你还发现了一些最佳实践。最后，你通过一个逐步练习，使用\
    \ SSIS 实现了将数据从 SQL Server 并行加载到 PDW。\n\n## 第 9 章\n\n![image](img/frontdot.jpg)\n\
    \n### XML 模式\n\nXML 是系统之间交换数据的流行格式。SSIS 提供了一个 `XML 源` 适配器，但由于 XML 的灵活性，有时将你的数据转换成\
    \ SSIS 数据流所需的表格格式可能有点棘手。本章描述了最适合与 `XML 源` 配合使用的格式，以及两种使用 SSIS 读取 XML 数据的替代模式。\n\
    \n### 使用 XML 源\n\n与大多数数据流组件一样，`XML 源` 组件需要在设计时设置列元数据。这是通过 XML 模式文件（`.xsd`）完成的。`XML\
    \ 源` 组件使用模式中定义的结构来创建一个或多个输出，并使用元素和属性数据类型来设置列元数据。更改模式文件将刷新组件的元数据，如果你已经映射了其某些输出，则可能导致验证错误。\n\
    \n如果你的文档尚未定义 XML 模式，SSIS 可以为你生成一个。点击 `XML 源` 编辑器 UI 上的生成模式按钮，该组件将从当前文档推断出模式。请注意，虽然此模式保证适用于当前的\
    \ XML 文件，但如果可选元素或值长于预期，它可能不适用于其他文件。你可能需要手动修改生成的模式文件，以确保每个元素的 `minOccurs` 和 `maxOccurs`\
    \ 属性值正确，并且数据类型设置正确。\n\n当你的输入文件具有简单的元素/子元素结构时，`XML 源` 最容易使用。Listing 9-1 展示了这种结构的一个例子。\n\
    \n**代码清单 9-1. 使用元素的简单 XML 格式**\n\n```\n<root>\n    <node>\n        <subnode>value</subnode>\n\
    \        <anothersubnode>1</anothersubnode>\n    </node>\n    <node>\n       \
    \ <subnode>value</subnode>\n        <anothersubnode>2</anothersubnode>\n    </node>\n\
    </root>\n```\n"
- fmt: 'Alternatively, the XML Source works well when values are listed as attributes,
    as shown in [Listing 9-2](#9781484200834_Ch09.xhtml#list2). This format is similar
    to the output you would get from a `SELECT ... FROM XML RAW` statement in SQL
    Server.


    ### Listing 9-2. Simple XML Format Using Attributes


    ```xml

    <root>

       <row CustomerID="1" TerritoryID="1" AccountNumber="AW00000001" />

       <row CustomerID="2" TerritoryID="1" AccountNumber="AW00000002" />

    </root>

    ```


    ### Dealing with Multiple Outputs


    The XML samples in [Listings 9-1](#9781484200834_Ch09.xhtml#list1) and [9-2](#9781484200834_Ch09.xhtml#list2)
    will produce a single output in the XML Source. If your XML format has multiple
    levels of nested elements, the XML Source will start to produce more than one
    output. These outputs will be linked by automatically generated `_Id` columns,
    which you may need to join further downstream using a Merge Join transform.


    > **Note**

    > This pattern works well if you have a single level of nested XML elements that
    you need to join. If you have multiple levels of XML elements and you need to
    join more than two of the XML Source outputs, you’ll need to use the Sort transform.


    [Listing 9-3](#9781484200834_Ch09.xhtml#list3) contains an XML document with customer
    information. We’ll use this document as our example for the remainder of the chapter.


    ### Listing 9-3. Sample XML Document


    ```xml

    <?xml version="1.0" encoding="utf-8"?>

    <Extract Date="2011-07-04">

      <Customers>

        <Customer Key="11000">

          <Name>

            <FirstName>Jon</FirstName>

            <LastName>Yang</LastName>

          </Name>

          <BirthDate>1966-04-08</BirthDate>

          <Gender>M</Gender>

          <YearlyIncome>90000</YearlyIncome>

        </Customer>

        <Customer Key="11001">

          <Name>

            <FirstName>Eugene</FirstName>

            <LastName>Huang</LastName>

          </Name>

          <BirthDate>1965-05-14</BirthDate>

          <Gender>M</Gender>

          <YearlyIncome>60000</YearlyIncome>

        </Customer>

      </Customers>

