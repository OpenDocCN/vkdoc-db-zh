    \ SSIS 2012 和 2014 也包含包部署模型，因此它们支持将传统 SSIS 项目升级到 SSIS 2012 或 2014。此外，有使用案例既使用\
    \ SSIS 目录进行执行和监控，也使用自定义框架和包部署模型。作为数据集成架构师，我非常感谢 Microsoft SSIS 团队提供了这两种选项。\n\n\
    在本附录中，我将引导您设计和构建一个自定义的、串行的 SSIS 框架，我将其命名为 SSIS 执行和监控框架。该框架将与 SSIS 2012/2014 的包部署模型配合使用，并包含一个\
    \ SQL Server Reporting Services 解决方案。构建 SSIS 框架是一项高级任务。我将帮助您从头开始构建它，使用本书前面介绍的许多设计模式。\n\
    \n## 从中间开始\n\n我们从执行控制的核心开始，即父-子模式。\n\n```\nAppendLine(\"                And PackageID\
    \ = @PackageID\");\nsb.AppendLine(\"                And ExecutionOrder = @ExecutionOrder)\"\
    );\nsb.AppendLine(\" begin\");\nsb.AppendLine(\"  print 'Adding ' + @ApplicationName\
    \ + '.' + @PackageName + ' to Framework with ExecutionOrder ' + convert(varchar,\
    \ @ExecutionOrder)\");\nsb.AppendLine(\"  exec cfg.AddSSISAppPackage @ApplicationID,\
    \ @PackageID, @ExecutionOrder\");\nsb.AppendLine(\"  print @PackageName + ' added\
    \ and wired to ' + @ApplicationName\");\nsb.AppendLine(\" end\");\nsb.AppendLine(\"\
    Else\");\nsb.AppendLine(\" print @ApplicationName + '.' + @PackageName + ' already\
    \ exists in the Framework with ExecutionOrder ' + convert(varchar, @ExecutionOrder)\"\
    );\nsb.AppendLine();\ne += 10;\n}\n```\n\n此循环内的代码针对从连接对象的 `GenerateTableNodes()`\
    \ 方法调用填充的表集合中包含的每个包执行。每次迭代以一条注释开始以标识 SSIS 包的名称，随后设置 `PackageName` 和 `ExecutionOrder`\
    \ 参数值。`PackageName` 设置为字符串变量 `tbl` 中包含的 SSIS 包的名称；`ExecutionOrder` 设置为整数变量 `e`\
    \ 中包含的值的字符串版本。\n\n接下来，一条检查包是否存在于 Framework 中的条件语句被添加到 `StringBuilder` 变量 `\"sb\"\
    ` 中。如果包元数据不存在，则通过执行 `cfg.AddSSISPackage` 存储过程来添加它，该过程返回 `PackageID` 参数。如果包元数据存在，则执行一条填充\
    \ `PackageID` 参数的语句。\n\n添加到 `stringbuilder` 中的 Transact-SQL 的下一部分是一个类似的部分，用于关联\
    \ SSIS 包和应用程序元数据。这是通过向 `cfg.AppPackages` “桥接”表添加行来实现的——或者告知用户此关系已经存在。\n\n循环的最后一条语句将变量\
    \ `e` 的值增加 10。\n\nBimlScript 的最后部分将 `stringbuilder` 的内容写入到 `i-FrameworkSQLGen.biml`\
    \ 文件中由 `filename` 变量指定的文件中，如 清单 20-9 所示：\n\n**清单 20-9. 将 Stringbuilder 中的 Transact-SQL\
    \ 写入输出文件**\n\n```\nusing (StreamWriter outfile = new StreamWriter(filename))\n\
    {\n    outfile.Write(sb.ToString());\n}\n    #>\n```\n"
- fmt: "You need to start by creating a new SSIS solution and project named `SSISConfig2014`.\
    \ Rename the default `Package.dtsx` to `Child1.dtsx`.\n\n## Configure the Child\
    \ Package\n\nOpen the `Child1` SSIS package and add a Script task to the control\
    \ flow. Rename the Script task `Who Am I?` and open the Script task’s editor.\n\
    \nOn the Script page, set the `ScriptLanguage` property to `Microsoft Visual Basic\
    \ 2012`. Click the ellipsis in the `ReadOnlyVariables` property value textbox\
    \ and add the `System::TaskName` and `System::PackageName` variables.\n\nOpen\
    \ the script editor and add the following code in `Sub Main()`.\n\n**Listing A-1.**\
    \ Sub Main from Who Am I? Script Task in Child1.dtsx Package\n```vb\nPublic Sub\
    \ Main()\n    Dim sPackageName As String = Dts.Variables(\"PackageName\").Value.ToString\n\
    \    Dim sTaskName As String = Dts.Variables(\"TaskName\").Value.ToString\n  \
    \  MsgBox(\"I am \" & sPackageName, , sTaskName)\n    Dts.TaskResult = ScriptResults.Success\n\
    End Sub\n```\n\nThe code shown in Listing A-1 pops up a message box that informs\
    \ an observer of the name of the package from which the message box originates.\
    \ This is reusable code. You can copy and paste this Script task into any SSIS\
    \ package and it will perform the same way each time.\n\nNow close the editor\
    \ and execute the `Child1.dtsx` package in the SSDT debugger. When I execute the\
    \ package, I see a message box similar to the one shown in Figure A-1.\n\n![9781484200834_FigAppA-01.jpg](images/9781484200834_FigAppA-01.jpg)\n\
    **Figure A-1.** Message box from Child1.dtsx\n\n`Child1.dtsx` will be your first\
    \ test package. We will use `Child1.dtsx` going forward to conduct tests of the\
    \ SSIS Execution and Monitoring Framework.\n\n## Convert the Deployment Model\n\
    \nBefore we proceed, change the deployment model for the SSIS from project deployment\
    \ model—the default—to package deployment model.\n\nTo accomplish the conversion,\
    \ right-click the SSIS project in Solution Explorer and click **Convert to Package\
    \ Deployment Model**, as shown in Figure A-2.\n\n![9781484200834_FigAppA-02.jpg](images/9781484200834_FigAppA-02.jpg)\n\
    **Figure A-2.** Converting the project to the package deployment model\n\nYou\
    \ will need to click the OK button on the dialog to acknowledge that you understand\
    \ that this will change the features that are available for you to use in SSIS.\
    \ Once the conversion is complete, you will see a result pane informing you that\
    \ the project `Child1.dtsx` was converted to the package deployment model. The\
    \ project in Solution Explorer will also indicate that the non-default deployment\
    \ model has been selected, as shown in Figure A-3.\n\n![9781484200834_FigAppA-03.jpg](images/9781484200834_FigAppA-03.jpg)\n\
    **Figure A-3.** Package deployment model\n\n## Create the Parent Package\n\nAdd\
    \ a new SSIS package and rename it `Parent.dtsx`. Add an Execute Package task\
    \ to the control flow of `Parent.dtsx`.\n\nRename the Execute Package task `Execute\
    \ Child Package` and open the editor. On the Package page, set the `Location`\
    \ property to **File System** and click the drop-down for the `Connection` property\
    \ value. Click **<New connection…>** to configure a new file connection manager.\
    \ Set the File Connection Manager Editor’s `Usage Type` property to **Existing\
    \ File**.\n\nBrowse to the location of the `SSISConfig2014` project and select\
    \ `Child1.dtsx`. Click the OK button to close the File Connection Manager Editor\
    \ and click OK again to close the Execute Package Task Editor.\n\nNote the file\
    \ connection manager that was created when you were configuring the Execute Package\
    \ task. It is named `Child1.dtsx`; rename it `Child.dtsx`.\n\nTest the `Parent.dtsx`\
    \ package by executing it in the SSDT debugger. If all goes as planned, `Child1.dtsx`\
    \ will execute and display the message box shown in Figure A-1. Acknowledge the\
    \ message box and stop the debugger.\n\n## Implement Dynamic Path Management\n\
    \nThis is the parent-child pattern in action. You can improve upon the parent-child\
    \ with a little metadata. How? I’m glad you asked.\n\nFirst, add an SSIS variable\
    \ named `ChildPackagePath` (String). Click on the `Child.dtsx` connection manager,\
    \ and then press F4 to display properties. The `ConnectionString` property of\
    \ the file connection manager is the path to the file. Select the `ConnectionString`\
    \ property, copy it to the clipboard, and then paste it into the `Value` property\
    \ of the `ChildPackagePath` SSIS variable.\n\nReturn to the properties of the\
    \ file connection manager named `Child.dtsx` and click the ellipsis in the Value\
    \ textbox of the `Expressions` property. When the Property Expressions Editor\
    \ displays, select `ConnectionString` from the Property drop-down, as shown in\
    \ Figure A-4.\n\n![9781484200834_FigAppA-04.jpg](images/9781484200834_FigAppA-04.jpg)\n\
    **Figure A-4.** The file connection manager Property Expressions Editor\n\nClick\
    \ the ellipsis in the Expression textbox beside `ConnectionString`. Expand the\
    \ Variables and Parameters virtual folder in the upper left of the Expression\
    \ Builder. Drag the variable `User::ChildPackagePath` from the virtual folder\
    \ to the Expression textbox and click the Evaluate Expression button, as shown\
    \ in Figure A-5.\n\n![9781484200834_FigAppA-05.jpg](images/9781484200834_FigAppA-05.jpg)\n\
    **Figure A-5.** Assigning the User::ChildPackagePath variable to the ConnectionString\
    \ expression\n\nClick the OK button to close the Expression Builder and then click\
    \ the OK button to close the Property Expressions Editor. At this point, the `ConnectionString`\
    \ property of the `Child.dtsx` file connection manager is managed by the `User::ChildPackagePath`\
    \ SSIS variable.\n\n## Test with a Second Child Package\n\nYou can test this functionality\
    \ by creating a second test child package. Fortunately, creating a second test\
    \ child package is relatively simple.\n\nIn Solution Explorer, right-click the\
    \ `Child1.dtsx` SSIS package and then click Copy. Right-click the SSIS Packages\
    \ virtual folder and click Paste. Change the name of the new package from `Child1\
    \ 1.dtsx` to `Child2.dtsx`.\n\nReturn to the `Parent.dtsx` package and change\
    \ the value of the `ChildPackagePath` variable, substituting `Child2.dtsx` for\
    \ `Child1.dtsx`. Execute `Parent.dtsx` in the SSDT debugger and observe the results,\
    \ as shown in Figure A-6.\n\n![9781484200834_FigAppA-06.jpg](images/9781484200834_FigAppA-06.jpg)\n\
    **Figure A-6.** Executing Child2.dtsx in the parent-child pattern\n\nPretty cool,\
    \ huh? We’re just getting started!\n\n## Create the Metadata Database\n\nLet’s\
    \ create a database to hold package metadata. Open SQL Server Management Studio\
    \ (SSMS) and execute the T-SQL script shown in Listing A-2.\n\n**Listing A-2.**\
    \ Creating the SSISConfig Database\n```sql\nUse master\ngo\n\n/* SSISConfig database\
    \ */\nIf Not Exists(Select name\n              From sys.databases\n          \
    \    Where name = 'SSISConfig')\n begin\n  print 'Creating SSISConfig database'\n\
    \  Create Database SSISConfig\n  print 'SSISConfig database created'\n end\nElse\n\
    \ print 'SSISConfig database already exists.'\nprint ''\ngo\n```\n\nThe script\
    \ in Listing A-2 is re-executable. Plus, it informs the person executing the script\
    \ about its actions via `Print` statements. The first time you execute this script,\
    \ you will see the following messages in the SSMS Messages tab:\n```\nCreating\
    \ SSISConfig database\nSSISConfig database created\n```\n\nThe second time—and\
    \ each subsequent time—you execute the same script, you will see this message:\n\
    ```\nSSISConfig database already exists.\n```\n\nWriting re-executable T-SQL is\
    \ not always feasible, but when feasible, it is a good idea."
