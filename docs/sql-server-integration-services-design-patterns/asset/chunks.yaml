- fmt: "# 测试Biml\n\n我们现在已经准备好进行测试了！\n\n## 测试Biml\n\n测试Biml包括生成SSIS包，然后执行它。我们将查看数据，以确认增量加载是否按预期运行。首先，我准备了一个用于重置行的T-SQL脚本，如`[Listing\
    \ 19-14](#9781484200834_Ch19.xhtml#list14)`所示。\n\n**[Listing 19-14](#9781484200834_Ch19.xhtml#_list14)。重置增量加载源和目标值**\n\
    \n```sql\nUse SSISIncrementalLoad_Source\nGo\n\nTRUNCATE TABLE dbo.tblSource\n\
    \n-- insert an \"unchanged\" row, a \"changed\" row, and a \"new\" row\nINSERT\
    \ INTO dbo.tblSource (ColID,ColA,ColB,ColC)\nVALUES\n(0, 'A', '1/1/2007 12:01\
