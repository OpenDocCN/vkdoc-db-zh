        <Inputs>       <Input OutputPathName="Truncate stgUpdates.Output" />     </Inputs>
      </PrecedenceConstraints> </Dataflow> ```    This code defines an OnSuccess precedence
    constraint between the Truncate stgUpdates Execute SQL task and the Load tblDest
    Data Flow task.    Adding Transforms    We are now ready to add metadata that
    define transforms, which are the heart of a Data Flow task. In this section, we
    will design an incremental load that includes an OLE DB Source adapter, a Lookup
    transform, a Condition Split transform, and a couple of OLE DB Destination adapters.    To
    begin, Add a Transformations node just after the `</PrecedenceConstraints>` tag.
    Inside the `<Transformations>` tags, add an `OleDbSource` tag with following the
    attribute and value pairs:    *   `Name`: `tblSource Source` *   `ConnectionName`:
    `SSISIncrementalLoad_Source`    Inside the `<OleDbSource>` tag, add an ExternalTableInput
    node with a `Table` attribute whose value is "`dbo.tblSource`". This metadata
    constructs an OLE DB Source adapter named "`tblSource Source`" that connects to
    the SSISIncrementalLoad_Source connection defined earlier inside the `<Connections>`
    tag. The OLE DB Source adapter will connect to the table `"dbo.tblSource"` as
    specified in the `ExternalTableInput` tag. The Dataflow XML node will now appear,
    as shown in [Listing 19-9](#9781484200834_Ch19.xhtml#list9).    [***Listing 19-9***](#9781484200834_Ch19.xhtml#_list9).
    The Dataflow Node Containing an OLE DB Source Adapter    ``` <Dataflow Name="Load
    tblDest">   <PrecedenceConstraints>     <Inputs>       <Input OutputPathName="Truncate
    stgUpdates.Output" />     </Inputs>   </PrecedenceConstraints>   <Transformations>
        <OleDbSource Name="tblSource Source" ConnectionName="SSISIncrementalLoad_Source">
          <ExternalTableInput Table="dbo.tblSource" />     </OleDbSource>   </Transformations>
    </Dataflow> ```    To continue, add a Lookup XML node immediately after the `</OleDbSource>`
    tag. Include the following attribute and value pairs in the `<Lookup>` tag:    *   `Name`:
