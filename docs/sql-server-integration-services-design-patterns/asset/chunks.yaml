    Failed\", \"Blue\", \"Black\")\n```\n\n此表达式将在状态为`\"Failed\"`时将状态文本颜色更改为蓝色。\n\n\
    点击效果属性下拉列表旁的 f(x)按钮。在`Set Expression for: TextDecoration`文本框中，添加以下表达式：\n=Iif(Fields!Status.Value=“Failed”,\
    \ “Underline”, “Default”)\n\n与“应用程序实例”报表一样，此表达式将为`Failed`状态添加下划线。它与前一个属性结合，使`Failed`状态显示为超链接。\n\
    \n## 配置 Package Instance 的超链接目标\n\n现在配置该属性。转到“操作”页面，在“启用为操作”属性中选择“转到报表”选项。\n\n\
    点击“指定报表”下拉列表旁的 f(x)按钮，并在`Set Expression for: ReportName`文本框中添加以下表达式：\n```\n=Iif(Fields!Status.Value=\"\
    Failed\", \"Errors\", Nothing)\n```\n\n点击“添加”按钮，将`AppInstanceID`参数名称映射到`[AppInstanceID]`参数值。再次点击“添加”按钮，将`PkgInstanceID`参数名称映射到`[PkgInstanceID]`参数值。\n\
    \n点击每个参数映射中`Omit`列的 f(x)按钮，并在每个`Set Expression for: Omit`文本框中添加以下表达式：\n```\n=Iif(Fields!Status.Value=\"\
    Failed\", False, True)\n```\n\n与“应用程序实例”报表一样，以上两个属性设置配置了`Status`值的“操作”属性。如果状态是`\"\
    Failed\"`，点击将显示为超链接的单词 Failed，将导致显示“错误”报表。显示时，它将仅显示与该数据行中应用程序实例相关联的错误行。\n\n测试一下！\n"
- fmt: 'When we run the Package Instance report, it now appears as shown in [Figure
    A-32](#9781484200834_AppA.xhtml#Fig32).    ![9781484200834_FigAppA-32.jpg](images/9781484200834_FigAppA-32.jpg)    [Figure
    A-32](#9781484200834_AppA.xhtml#_Fig32). “Failed hyperlinks” for the Package Instance
    report


    Clicking a Failed link takes us to the Errors report for that package instance.
    Cool. Now let’s add the `Events` column to the Package Instance report. Add a
    column with the header and data field hard-coded `Events`. Open the Text Box Properties
    window for the `Events` data field and navigate to the Font page. Set the Color
    property to `Blue` and the Effects property to `Underline`. Navigate to the Action
    page and set the Enable as an Action property to `Go to Report`. Select the `Events`
    report from the Specify a Report drop-down and click the Add button twice to map
    two parameters. Map the `AppInstanceID` parameter name to the `[AppInstanceID]`
    parameter value and the `PkgInstanceID` parameter name to the `[PkgInstanceID]`
    parameter value. Close the Text Box Properties window and click the Preview tab
    to test. The Package Instance report should appear as shown in [Figure A-33](#9781484200834_AppA.xhtml#Fig33).    ![9781484200834_FigAppA-33.jpg](images/9781484200834_FigAppA-33.jpg)    [Figure
    A-33](#9781484200834_AppA.xhtml#_Fig33). The finished Package Instance report


    Clicking the `Events` link will take me to the `Events` report and display only
    the events for the package instance on the referenced row.


    To wrap it up, you can start at the Application Instance report; it is on the
    dashboard. Click the Packages link to view all the SSIS child packages that executed
    as part of the selected SSIS application instance. From there, drill into the
    Errors report and observe the errors that caused a package to fail, or view all
    of the events recorded by the `OnInformation` event handler for the selected package
    instance on the `Events` report. You can reach all errors and events for an SSIS
    application instance from the Application Instance report, as well.


    ## Conclusion


    This example isn’t an exhaustive example of an SSIS framework, but it demonstrates
    the utility of patterns-based data integration development using SSIS. The sample
    framework provides repeatable, metadata-driven SSIS execution without leaving
    the SSIS and SQL Server database domains. Monitoring is provided by a set of SQL
    Server Reporting Services reports driven by stored procedures that read metadata
    automatically captured by the framework’s `Parent.dtsx` SSIS package. Zero lines
    of code are required in child packages to capture error and event information,
    and this information is logged centrally in a consistent format, which makes it
    perfect for reporting.


