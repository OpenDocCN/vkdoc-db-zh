    \ e As System.EventArgs)         Handles _ btnOpenSSISPkgInCatalog.Click\n   \
    \     btnOpenSSISPkgInCatalogClick()\n    End Sub\nEnd Class\n```\n\n同样，窗体背后的代码很少。大部分实际工作是在别处完成的。现在让我们构建那部分。\n\
    \n## 创建辅助器模块\n\n向解决方案添加一个模块并命名为 `frmMainHelper`。将以下代码添加到新模块：\n\n```\n'\n' frmMainHelper\
    \ 模块\n'\n' 在开发界面时，我使用一种辅助器模式。\n' 每个窗体命名为 frm_____，并且有一个对应的模块命名为 frm_____Helper.vb。\n\
    ' 每个事件方法都调用辅助器模块中的一个子程序。\n'\n' 此模块支持 frmMain。\n'\nImports System\nImports System.Windows\n\
    Imports System.Windows.Forms\nImports Microsoft.SqlServer.Dts.Runtime.Wrapper\n\
    Imports Microsoft.SqlServer.Management.IntegrationServices\nImports Microsoft.SqlServer.Management.Smo\n\
    \nModule frmMainHelper\n\nPublic Sub InitFrmMain()\n\n' 初始化并加载 frmISTree\n\n'\
    \ 定义版本\n        Dim sVer As String = System.Windows.Forms.Application.ProductName\
    \ & \"  v\" & _\n        System.Windows.Forms.Application.ProductVersion\n\n'\
    \ 显示版本和启动状态\n        With frmMain\n            .Text = sVer\n            .txtStatus.Text\
    \ = sVer & ControlChars.CrLf & \"就绪\"\n        End With\n\nEnd Sub\n\nPublic Sub\
    \ btnStartFileClick()\n\n' 配置一个 SSIS 应用程序并执行选定的 SSIS 包文件\n\nWith frmMain\n   \
    \         .Cursor = Cursors.WaitCursor\n            .txtStatus.Text = \"正在执行 \"\
    \ & .txtSSISPkgPath.Text\n            .Refresh()\n            Dim ssisApp As New\
    \ Microsoft.SqlServer.Dts.Runtime.Wrapper.Application\n            Dim ssisPkg\
    \ As Package = ssisApp.LoadPackage(.txtSSISPkgPath.Text, _\n            AcceptRejectRule.None,\
    \ Nothing)\n            ssisPkg.Execute()\n            .Cursor = Cursors.Default\n\
    \            .txtStatus.Text = .txtSSISPkgPath.Text & \" 已执行。\"\n        End With\n\
    \nEnd Sub\n\nPublic Sub btnOpenSSISPkgClick()\n\n' 允许用户导航到 SSIS 包文件\n\nWith frmMain\n\
    \            .OpenFileDialog1.DefaultExt = \"dtsx\"\n            .OpenFileDialog1.ShowDialog()\n\
    \            .txtSSISPkgPath.Text = .OpenFileDialog1.FileName\n            .txtStatus.Text\
    \ = .txtSSISPkgPath.Text & \" 包路径已加载。\"\n        End With\n\nEnd Sub\n\nSub btnOpenSSISPkgInCatalogClick()\n\
    \n' 允许用户导航到存储在目录中的 SSIS 包\n\nfrmISTreeInit()\n\nDim sTmp As String = sFullSSISPkgPath\n\
    \        Dim sServerName As String = Strings.Left(sTmp, Strings.InStr(sTmp, \"\
    .\") - 1)\n        Dim iStart As Integer = Strings.InStr(sTmp, \".\") + 1\n  \
