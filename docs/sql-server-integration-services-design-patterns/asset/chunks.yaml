    \ language and I’ll describe a few instances where SSIS expressions are ideal\
    \ (and a few where they might not be) for effectively solving difficult ETL problems.\n\
    \nGetting to Know the Expression Language\n\nBefore we dive into the design patterns\
    \ surrounding the SSIS expression language, let’s spend a little time defining\
    \ and becoming familiar with the nuances of the language. Reviewing the language-specific\
    \ patterns can help you get up to speed and use the language correctly.\n\nWhat\
    \ Is the Expression Language?\n\nThe *SSIS* *expression language* is an interpreted\
    \ language that has been built into the SSIS runtime environment. This specialized\
    \ language is used to craft scalar-valued snippets of code (individually referred\
    \ to as *expressions*) that you may use at various points within the SSIS environment.\n\
    \nThe SSIS designer exposes dozens of interfaces where expressions can be used\
    \ in place of hard-coded values, allowing the BI professional to leverage that\
    \ flexibility to create dynamic and reusable elements within SSIS. Conceptually,\
    \ it’s not unlike the product-specific dialects that exist in other Microsoft\
    \ development environments. For example, when you are developing reports in SSDT\
    \ or BIDS that you want to deploy to SQL Server Reporting Services, you can use\
    \ Visual Basic for Applications (VBA) code to generate dynamic behavior during\
    \ report execution and rendering.\n\nAs you explore the expression language, you’ll\
    \ find it to be a very powerful addition to the natural capabilities of SQL Server\
    \ Integration Services. It has a rich library of functionality that will be familiar\
    \ to both developers and DBAs. Among the functional domains of the SSIS expression\
    \ language are\n\n*   A full complement of mathematical functions and operators\n\
    *   An impressive set of string functions that may be used in comparisons, analysis,\
    \ and value manipulation\n*   Common date and time functionality, including date\
    \ part extraction, date arithmetic, and comparison\n\nThe expression language\
    \ serves two different roles within the package life cycle:"
  trans: "\n```csharp\n// 为文件中的每个客户输出一个新行\nforeach (ExtractCustomer customer in extract.Customers)\n\
    {\n    CustomersBuffer.AddRow();\n\n    CustomersBuffer.Key = customer.Key;\n\
    \    CustomersBuffer.FirstName = customer.Name.FirstName;\n    CustomersBuffer.LastName\
    \ = customer.Name.LastName;\n    CustomersBuffer.BirthDate = customer.BirthDate;\n\
    \    CustomersBuffer.Gender = customer.Gender;\n    CustomersBuffer.YearlyIncome\
    \ = customer.YearlyIncome;\n}\n```\n\n# 使用 XmlReader 和 LINQ to XML 处理 XML\n\n\
    此模式利用 `XmlReader` 类来流式读入 XML 文档，并结合 LINQ to XML 功能来提取你想要保留的值。它非常适合处理大型 XML 文档，因为它不需要将整个文档读入内存。它也适用于你只想从\
    \ XML 文档中提取某些字段而忽略其余部分的情况。\n\n![Image](img/sq.jpg) **注意** 该模式的灵感来自 SQL Server\
    \ MVP Simon Sabin 的一篇帖子。示例代码和其他精彩的 SSIS 内容可以在他的博客 `http://sqlblogcasts.com/blogs/simons/`\
    \ 上找到。\n\n此模式的关键在于使用 `XmlReader` 类。我们将创建一个特殊的函数，该函数以 `XElement` 集合的形式返回 XML，而不是使用\
    \ `XDocument` 类来读取源 XML 文件（这是使用 LINQ to XML 时的典型方法）。这使得我们能够利用 LINQ 语法，同时受益于 `XmlReader`\
    \ 提供的流式处理功能。\n\n在添加代码之前，你需要将以下命名空间添加到你的 `using` 语句中：\n\n*   `System.Collections.Generic`\n\
    *   `System.Linq`\n*   `System.Xml.Linq`\n\n清单 9-9 包含了 `XmlReader` 函数 (`StreamReader`)\
    \ 以及用于处理 XML 文档的 `CreateNewOutputRows` 逻辑的代码。\n\n***清单 9-9***. 使用 XmlReader 类的脚本逻辑\n\
    \n```csharp\npublic override void CreateNewOutputRows()\n{\n    foreach (var xdata\
    \ in (\n        from customer in StreamReader(pathToXmlFile, \"Customer\")\n \
    \       select new\n        {\n          Key = customer.Attribute(\"Key\").Value,\n\
    \          FirstName = customer.Element(\"Name\").Element(\"FirstName\").Value,\n\
    \          LastName = customer.Element(\"Name\").Element(\"LastName\").Value,\n\
    \          BirthDate = customer.Element(\"BirthDate\").Value,\n          Gender\
    \ = customer.Element(\"Gender\").Value,\n          YearlyIncome = customer.Element(\"\
    YearlyIncome\").Value,\n        }\n    ))\n    {\n        try\n        {\n   \
    \       CustomersBuffer.AddRow();\n          CustomersBuffer.Key = Convert.ToInt32(xdata.Key);\n\
    \          CustomersBuffer.FirstName = xdata.FirstName;\n          CustomersBuffer.LastName\
    \ = xdata.LastName;\n          CustomersBuffer.BirthDate = Convert.ToDateTime(xdata.BirthDate);\n\
    \          CustomersBuffer.Gender = xdata.Gender;\n          CustomersBuffer.YearlyIncome\
    \ = Convert.ToDecimal(xdata.YearlyIncome);\n        }\n        catch (Exception\
    \ e)\n        {\n            string errorMessage = string.Format(\"检索数据时出错。异常消息：{0}\"\
    ,\n                                                 e.Message);\n            bool\
    \ bCancel;\n            ComponentMetaData.FireError(0, ComponentMetaData.Name,\
    \ errorMessage, string.Empty, 0,\n                                        out\
    \ bCancel);\n        }\n    }\n}\n\nstatic IEnumerable<XElement> StreamReader(String\
    \ filename, string elementName)\n{\n  using (XmlReader xr = XmlReader.Create(filename))\n\
    \  {\n      xr.MoveToContent();\n      while (xr.Read())\n      {\n          while\
    \ (xr.NodeType == XmlNodeType.Element && xr.Name == elementName)\n          {\n\
    \              XElement node = (XElement)XElement.ReadFrom(xr);\n            \
    \  yield return node;\n          }\n      }\n      xr.Close();\n  }\n}\n```\n\n\
    ## 结论\n\n`XML 源` 组件让你无需编写任何代码即可在 SSIS 数据流中处理 XML 文档。尽管它可以处理大多数 XML 模式，但它通常最适用于简单的\
    \ XML 文档。当处理复杂的 XML 格式时，考虑使用 XSLT 将源文档重新格式化为易于解析的格式。如果你不介意编写和维护 .NET 代码，那么当你需要更精细地控制文档解析方式、处理大型\
    \ XML 文档或有特定的性能要求时，可以考虑使用本章描述的其中一种脚本组件模式。\n\n# 第 10 章\n\n![image](img/frontdot.jpg)\n\
    \n# 表达式语言模式\n\nSSIS 中的表达式语言或许可以恰当地被称为将产品粘合在一起的“粘合剂”。SSIS 中的表达式提供了一个相对简单且易于使用的界面，使数据开发人员能够将动态逻辑引入\
    \ ETL 基础架构中。当你仔细思考 Integration Services 中的各个活动部件时，你很可能会发现，你可以通过某种方式使用表达式来操作它们。\n\
    \n表达式提供了一种快速、有效，甚至可以说有趣的方式来解决特定的 ETL 挑战。在本章中，我们将探讨表达式语言的一些基础知识，并介绍一些 SSIS 表达式非常理想（以及一些可能不太理想）地用于有效解决困难\
    \ ETL 问题的实例。\n\n## 了解表达式语言\n\n在我们深入探讨 SSIS 表达式语言的设计模式之前，让我们花点时间定义并熟悉该语言的细微差别。回顾语言特定的模式可以帮助你快速上手并正确使用该语言。\n\
    \n### 什么是表达式语言？\n\n*SSIS 表达式语言* 是一种内置于 SSIS 运行时环境中的解释型语言。这种专门用于编写标量值代码片段（各自称为*表达式*）的语言，可在\
    \ SSIS 环境中的多个位置使用。\n\nSSIS 设计器公开了数十个可以用表达式代替硬编码值的接口，使 BI 专业人员能够利用这种灵活性在 SSIS 中创建动态且可重用的元素。从概念上讲，它与存在于其他\
    \ Microsoft 开发环境中的特定产品方言并无不同。例如，当你在 SSDT 或 BIDS 中开发希望部署到 SQL Server Reporting\
    \ Services 的报表时，你可以使用 Visual Basic for Applications (VBA) 代码在报表执行和渲染过程中生成动态行为。\n\
    \n在你探索表达式语言的过程中，你会发现它是 SQL Server Integration Services 原生功能的一个非常强大的补充。它拥有丰富的函数库，对开发人员和\
    \ DBA 来说都很熟悉。SSIS 表达式语言的功能领域包括：\n\n*   全套的数学函数和运算符\n*   一组令人印象深刻的字符串函数，可用于比较、分析和值操作\n\
    *   常见的日期和时间功能，包括日期部分提取、日期算术和比较\n\n表达式语言在包生命周期中扮演两个不同的角色：\n```"
- fmt: '### Why Use Expressions?


    *   **Evaluation**: You can use expressions to determine whether a specified condition
    is true and to change the behavior of the package accordingly. When it is used
    as part of the control flow, an expression used as an evaluation may check a certain
    value and dynamically alter the execution path based on the results of that comparison.
    Within the data flow, expressions allow you to evaluate data a row at a time to
    determine how to proceed in the ETL.

    *   **Assignment**: In addition to using expressions as decision-making elements,
    you can use SSIS expressions to programmatically modify data during package execution.
    Typically you might use them as expression-based property settings and to transform
    in-process data within the data flow.


    Expressions in SSIS may derive their comparisons or assignments from several fronts.
    Built-in system variables permit visibility into software environmental data such
    as package and container start times, machine environment information, package
    versioning metadata, and more. You can interrogate and manipulate the values of
    user-defined SSIS variables by using expressions and access values of package
    parameters to be leveraged elsewhere during package execution. In the data flow,
    expressions may interact with running data at the cellular level.


    Expressions are value-driven at runtime. Unlike settings that are generally only
    configurable at design time (think data flow column definitions), expressions
    will calculate their values when the package is actually executed. Furthermore,
    a single expression may be evaluated many times (perhaps with a different result
    each time) during the execution life cycle of the package. Consider the case of
    the `ForEach Loop`, a container that loops through a specified set of objects
    or values until it reaches the end of said collection. Expressions that are manipulated
    within the loop may be updated dozens or even hundreds of times during this process.


    The ability to use expressions is one of the greatest strengths of SQL Server
    Integration Services. Simply put, expressions help to fill in the small gaps.
    The expression language isn’t a tool in itself, but rather, it is an interface
    that helps other SSIS tools more effectively perform their respective functions.
    That’s all well and good, but in the interests of simplicity, why would an ETL
    developer choose to use expressions instead of other languages such as T-SQL,
    C#, or VB.NET? Here are a few compelling reasons to employ the expression language
    in your SSIS packages:


    *   **Simplicity**: Expressions language can be used to quickly add flow logic
    or make small changes to in-pipeline data in the data flow. You can often handle
    small ETL changes that might otherwise be relegated to a Script task or component
    inline without needing to introduce extra code to the package.

    *   **Consistency**: Use of the expression language can lead to a consistent approach
    to data or program flow challenges. For example, if your ETL requires that you
    convert blank strings to ``NULL``s, the approach and syntax would otherwise be
    different for flat files, Access databases, and relational database sources. By
    applying the expression language to the same task, you reduce the amount of distinct
    code you have to write by relying on the built-in string manipulation functions
    in the expression language.

    *   **Maintenance scope**: By applying the design pattern of using the expression
    language for cleansing needs, you can eliminate much of the sleuth work you need
    to do to track down and change cleansing rules as your business expectations change.
    Using expressions in the package itself provides you with a single point of maintenance
    rather than forcing you to inspect the upstream data sources each time you need
    to make a change.


    I’ve done a number of presentations for novice SSIS developers, and when I bring
    up the topic of the expression language, one question almost always seems to come
    up: “Where do I use this expression language stuff?” My answer: “Everywhere!”
    Part of the beauty of expressions is that they can be used almost anywhere within
    SSIS packages. You can employ expressions on the control flow in precedence constraints.
    It’s convenient to make your SSIS package variables dynamic by replacing their
    static values with expressions. You can leverage expressions within the data flow
    to manipulate data and even control the execution path. The bottom line is that
    you can manipulate many of the common properties of packages, tasks, constraints,
    and data flow elements by using expressions.


    Although its syntax may seem unusual, the expression language isn’t difficult
    to learn. Anyone with logical scripting experience (even if that experience is
    limited to T-SQL) can quickly pick up on the basics and should be able to master
    the language with a reasonable amount of practice.


    ### Language Essentials


    Even for those who have experience scripting in other Microsoft development environments,
    the first exposure to the SSIS expression language can be a little unsettling.
    The syntax and functionality are unlike any other language, either interpreted
    or compiled. It appears to be a strange hybrid of several languages and is certainly
    a dialect all of its own.


    Developers who have spent time using the C-style languages (C, C++, C#, Java)
    will recognize some of the syntactical nuances within the expression language:


    *   Case-sensitive column and variable names

    *   Case-sensitive string comparisons

    *   Double-equal (`==`) comparison operators

    *   Simplified conditional (`if`/`then`/`else`) operators


    Similarly, anyone experienced in T-SQL will find a great deal of familiar behavior
    within the SSIS expression language:


    *   Case-insensitive function names

    *   Date arithmetic and string manipulation functions much like those in T-SQL


    The SSIS expression language is quite powerful, with its wide variety of functions
    and operators. With native behavior including equality tests, type casts, string
    manipulation, and date arithmetic, the use of expressions within SSIS packages
    can help to overcome ETL challenges both large and small.


    ### Limitations


    As useful as the expression language is, there are a few key limitations to its
    use. Bear in mind that these are relatively minor hang-ups; the SSIS expression
    language is not intended to be a full-featured programming language, but rather
    a lightweight tool to supplement the behavior of existing SSIS tasks and components.
    Among some of the challenges are the following:'
