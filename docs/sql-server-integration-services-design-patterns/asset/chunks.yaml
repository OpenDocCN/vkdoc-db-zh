    现在你对查询和预期输出有了更深入的了解，让我们回到你的包。点击 `解析查询` 以确保语法中没有任何错误，然后点击 `预览` 查看结果的示例。点击 `列` 页面以确保列列表已成功更新；然后点击
    `确定` 返回数据流设计器。


    你现在应该会看到数据流中存在错误，如 图 1-19 所示。这是预期的，因为你已经更改了数据源提供的列，但你的目标仍然期望旧的列列表。


    ![9781484200834_Fig01-19.jpg](img/9781484200834_Fig01-19.jpg)


    图 1-19. 已完成的数据流任务


    在修复此错误之前，你需要返回 SSMS 创建一个表来存储这些数据。现在请使用 清单 1-8 中的代码创建此表。


    ## 清单 1-8. 用于创建 dba_monitor_unusedIndexes 表的 T-SQL 代码


    ```sql

    USE dbaCentralLogging;

    GO


    CREATE TABLE dbo.dba_monitor_unusedIndexes

    (

         log_id                    INT IDENTITY(1,1)

        ,captureDate               DATETIME

        ,serverName                NVARCHAR(128)

        ,schemaName                SYSNAME

        ,databaseName              SYSNAME

        ,tableName                 SYSNAME

        ,indexName                 SYSNAME

        ,indexType                 NVARCHAR(60)

        ,isFiltered                BIT

        ,isPartitioned             BIT

        ,numberOfRows              BIGINT

        ,userSeeksSinceReboot      BIGINT

        ,userScansSinceReboot      BIGINT

        ,userLookupsSinceReboot    BIGINT

        ,userUpdatesSinceReboot    BIGINT

        ,indexSizeInMB             BIGINT

        ,lastReboot                DATETIME


    CONSTRAINT PK_dba_monitor_unusedIndexes

            PRIMARY KEY NONCLUSTERED(log_id)

    );


    CREATE CLUSTERED INDEX CIX_dba_monitor_unusedIndexes

        ON dbo.dba_monitor_unusedIndexes(captureDate);

    ```


    返回 Visual Studio，双击 `中央日志数据库` 图标以编辑其属性。将 `表或视图的名称` 值更改为 `[dbo].[dba_monitor_unusedIndexes]`，然后点击
    `映射` 页面。由于你的源和目标使用相同的列名，你可以通过右键单击 `可用输入列` 和 `可用目标列` 之间的空白区域并选择 `按匹配名称映射项目` 来轻松更新映射。图
    1-20 展示了此选项。


    ![9781484200834_Fig01-20.jpg](img/9781484200834_Fig01-20.jpg)


    图 1-20. `映射` 页面中的 `按匹配名称映射项目` 选项


    再次说明，`log_id` 列将不会映射到任何内容，因为它是一个标识列。点击 `确定` 返回数据流设计器，然后点击 `控制流` 选项卡。


    看到第二个数据流进行得有多快了吗？你可以继续使用此方法轻松添加更多的元数据收集任务。剩下要做的就是在 `dba_monitor_SQLServerInstances`
    表中更新你的 `LastMonitored` 列。


    ![Image](img/sq.jpg) **提示** 创建一个“一刀切”的包可能很诱人。然而，通常更好的做法是将元数据收集按频率要求分离到不同的包中。例如，本章收集的元数据只需要定期采样，例如每天或每周收集。需要更频繁收集的元数据，例如每小时检查失败的
    SQL Server Agent 作业，应存储在单独的包中。


    向你的 `Foreach 循环` 容器中添加一个 `执行 SQL` 任务，并将其重命名为 `更新 LastMonitored`。将未使用索引数据流连接到 `更新
    LastMonitored` `执行 SQL` 任务。双击 `执行 SQL` 任务以编辑其属性。在 `连接` 下拉菜单中选择 `dbaCentralLogging`
    连接，然后在 `SQLStatement` 字段中输入 清单 1-9 中的代码。


    ## 清单 1-9. 用于更新 dba_monitor_SQLServerInstances 中 LastMonitored 值的 T-SQL 代码


    ```sql

    UPDATE dbo.dba_monitor_SQLServerInstances

    SET LastMonitored = GETDATE()

    WHERE SQLServerInstance= ?;

    ```


    问号 (`?`) 通知 `执行 SQL` 任务使用参数来完成 SQL 语句。现在你只需要将变量映射到参数。为此，点击 `参数映射` 页面并点击 `添加`。按如下方式编辑属性：


    *   变量名称 = `User::SQLServerInstance`

    *   方向 = `输入`

    *   数据类型 = `NVARCHAR`

    *   参数名称 = `0`

    *   参数大小 = `128`


    确认你的映射与 图 1-21 中所示的匹配，然后点击 `确定`。


    ![9781484200834_Fig01-21.jpg](img/9781484200834_Fig01-21.jpg)


    图 1-21. `执行 SQL 任务编辑器` 中的参数映射


    现在你已准备好执行你的包！为此，从菜单中选择 `调试` ![image](img/arrow.jpg) `开始调试`，点击工具栏中的绿色 `运行` 图标，或按
    `F5`。成功执行后，你的包应类似于 图 1-22。


    ![9781484200834_Fig01-22.jpg](img/9781484200834_Fig01-22.jpg)


    图 1-22. `MetadataCollection` 包的成功执行


    恭喜！你现在已经从服务器列表中收集了元数据，并将结果存储在一个集中式的数据库中。


    至此，我们通过 SSIS 收集元数据的演练就结束了。然而，作为一个勤奋的开发人员或 DBA，你可能需要考虑更多的任务。首先，正如我们在本章开头所讨论的，此包不包含任何异常处理或日志记录，这超出了本章的范围。然而，最佳实践是每个包都包含某种形式的异常处理和日志记录。其次，在收集元数据方面，我们只是触及了冰山一角。还有更多信息需要考虑，例如安全审计、错误日志、SQL
    Server Agent 作业状态等等。如果你不确定从哪里开始，可以考虑按关键性对元数据任务进行排序，并按重要性降序添加增量监控。作为最后一项家庭作业，你可能需要考虑设置监视器，以便在遇到不利情况时（例如
    SQL Server Agent 作业失败或可用空间不足）提醒你。


    ## 本章小结


    在本章中，我们讨论了元数据的重要性。我们探讨了 SQL Server 中存在的一些元数据，并提供了两个有用的 T-SQL 元数据查询示例。我们确定了一个非常灵活且可重用的模式，用于在企业环境中收集数据库元数据。最后，我们创建了一个
    `Integration Services` 包，该包检索要监视的 SQL Server 实例列表，然后将结果记录到中央存储库。


    # 第 2 章


    ![image](img/frontdot.jpg)


    ## 执行模式


    要完全理解 SQL Server 2014 `Integration Services` 的执行，你必须首先理解不同的部署模型。有两种：包部署模型和项目部署模型。每种模型都暴露并支持不同的功能。包部署模型主要支持传统功能。它是
    SSIS 2005 到 SSIS 2008 R2 使用的模型。新的方式涉及项目部署模型。某些执行方法（但不是全部）对两种部署模型都可用。

