    end\ngo\nprint ' - Custom.AddPackage 存储过程已创建。'\nprint ''\n\n/* 构建 custom.AddApplicationPackage\
    \ 存储过程 */\nprint 'Custom.AddApplicationPackage'\nIf Exists(Select s.name + '.'\
    \ + p.name\n          From sys.procedures p\n                  Join sys.schemas\
    \ s\n                    On s.schema_id = p.schema_id\n                  Where\
    \ s.name = 'custom'\n                    And p.name = 'AddApplicationPackage')\n\
    \ begin\n  /* 如果 custom.AddApplicationPackage 存储过程\n     已存在，则删除它 */\n  print\
    \ ' - 正在删除 custom.AddApplicationPackage 存储过程'\n  Drop Procedure custom.AddApplicationPackage\n\
    \  print ' - custom.AddApplicationPackage 存储过程已删除'\n end\nprint ' - 正在创建 custom.AddApplicationPackage\
    \ 存储过程'\ngo\n\n/*\n\n存储过程: custom.AddApplicationPackage\n        作者: Andy Leonard\n\
    \        参数: ApplicationID [int]\n               - 包含从执行 custom.AddApplication\n\
    \                             返回的 ID。\n                   PackageID [int]\n  \
    \             - 包含从执行 custom.AddPackage\n                             返回的 ID。\n\
    \                   ExecutionOrder [int]\n               - 包含此包在 SSIS 应用程序中\n\
    \                             执行的顺序。\n                   ApplicationPackageEnabled\
    \ [bit]\n                   - 1 == 已启用，将作为 SSIS 应用程序的一部分运行。\n                \
    \     0 == 已禁用，不会作为 SSIS 应用程序的一部分运行。\n        描述: 将一个 SSIS 包链接到 SSIS 应用程序。\n \
    \         示例: exec custom.AddApplicationPackage 1, 1, 10, 1\n\n*/\nCreate Procedure\
    \ custom.AddApplicationPackage\n  @ApplicationID int\n ,@PackageID int\n ,@ExecutionOrder\
    \ int = 10\n ,@ApplicationPackageEnabled bit = 1\nAs\n  begin\n\nSet NoCount On\n\
    \nInsert Into custom.ApplicationPackage\n        (ApplicationID\n        ,PackageID\n\
    \        ,ExecutionOrder\n        ,ApplicationPackageEnabled)\n        Values\n\
    \        (@ApplicationID\n        ,@PackageID\n        ,@ExecutionOrder\n    \
    \    ,@ApplicationPackageEnabled)\n\nend\ngo\nprint ' - Custom.AddApplicationPackage\
    \ 存储过程已创建。'\nprint ''\n```\n\n## 配置 SSIS 包\n\n在 Chapter2 项目中创建一个新的 SSIS 包并重命名为\
    \ `Parent.dtsx`。点击包上的 Parameters 选项卡——它是从左数第三个选项卡（Control Flow, Data Flow, Parameters）。点击\
    \ Add Parameter 按钮并创建一个名为 *ApplicationName，字符串数据类型* 的参数，默认值为 `testSSISApp`。将 `Required`\
    \ 属性设置为 `True`。\n\n添加一个 Execute SQL 任务到控制流并重命名为 `Get Packages`。打开编辑器并将 ConnectionType\
    \ 属性设置为 `ADO.NET`。在 Connection 属性下拉列表中，选择（或创建一个到）SSISDB 数据库的连接。在 SQLStatement\
    \ 属性中，输入 `custom.GetApplicationPackages`。将 `IsQueryStoredProcedure` 属性设置为 `True`。将\
    \ ResultSet 属性更改为 `Full result set`。\n\n导航到 Parameter Mapping 页面并点击 Add 按钮。点击\
    \ Variable Name 下拉列表并选择列表最顶部的 `$Package::ApplicationName`。将 Data Type 更改为 String，将\
    \ Parameter Name 更改为 `ApplicationName`。这将父包参数中的值映射到 `ApplicationName` 参数，该参数在\
    \ Execute SQL 任务调用 `custom.GetApplicationPackages` 存储过程时传递。\n\n导航到 Result Set\
    \ 页面并点击 Add 按钮。如果 Add 按钮是禁用的，说明你没有将 General 页面上的 ResultSet 属性从默认设置（None）更改。如果\
    \ ResultSet 设置为任何其他设置，Add 按钮就会启用。为 Result Name 输入 `0`。在 Variable Name 下拉列表中，创建一个名为\
    \ `Packages` 的变量。对于这个变量，将 Value Type 属性设置为 `Object`。\n"
- fmt: "![Image](images/sq.jpg) Note `Object` 是一个有趣的数据类型。类似于变体，`Object` 可以包含像日期或整数这样的标量。它也可以容纳一个集合或字符串数组。在这个例子中，`Object`\
    \ 将包含一个 `ADO.Net Dataset` 值。如果我们将 `ConnectionType` 属性设置为 `OLEDB`（默认值），那么这个结果集变量将填充一个\
    \ `ADO Recordset`。是的，那是一个 COM 对象——在 2014 年，COM（和 COBOL）永远不会消亡……\n\n## 回顾与设置\n\n\
    首先，任务将使用 ADO.NET 连接到 `SSISDB` 数据库，以执行我们之前创建的 `custom.GetApplicationPackages` 存储过程。因为我们已将\
    \ `IsQueryStoredProcedure` 设置为 `True`，所以我们不需要为参数添加占位符或 `exec` 命令。由于我们使用了 ADO.NET，我们可以在参数映射页上通过名称而不是序数（`ApplicationName`\
    \ 而不是 `0`）来寻址参数。最后，我们配置了执行 SQL 任务，将存储过程执行的结果推送到名为 `Packages` 的对象变量中。\n\n单击“确定”按钮关闭“执行\
    \ SQL 任务编辑器”。将一个 Foreach 循环容器拖到控制流界面并打开其编辑器。在“常规”页上，将“名称”属性更改为 `Foreach Package\
    \ in Packages`。在“集合”页上，选择 `Foreach ADO Enumerator`。在 `ADO` 对象源变量下拉列表中，选择 `Packages`\
    \ 变量。将“枚举模式”默认选项保留为“第一个表中的行”。\n\n## 创建变量\n\n我听到你在想，“如果我有一个 ADO Recordset 在 `Packages`\
    \ 对象变量中，我需要做什么？” 这是一个很好的问题。答案是，“什么都不用做。” 即使对象变量可以保存 `ADO Recordsets` 和 `ADO.NET`\
    \ 数据集（以及其他集合和标量），`Foreach ADO Enumerator` 也足够智能，能够*检测* SSIS 对象变量内部对象的类型——然后读取它。这不是很酷吗？我也这么认为。\n\
    \n导航到“变量映射”页。在包作用域创建四个变量。这些变量与从 `custom.GetApplicationPackages` 存储过程返回的字段相匹配；并且随后加载到\
    \ `ADO.NET` 数据集的第一个表中，该数据集现在位于 `Packages` SSIS 变量内。如果你没理解那句话，请重读一遍（我会等你）。虽然内容很多，但理解我们在这里做什么至关重要。明白了吗？很好。\n\
    \n我将按照我偏好的变量创建方法，引导你创建下面列出的第一个变量。单击“变量”下拉列表并选择列表最顶部的“新建变量...”。当“添加变量”窗口显示时，确保“容器”属性设置为\
    \ `Parent`（包的名称）。这确保了变量具有包作用域。在“名称”文本框中输入 `FolderName`。单击“确定”按钮，然后将“索引”属性更改为 `0`。将“值类型”属性保留为\
    \ `String`。我几乎总是以这种方式创建 SSIS 变量。这样我对作用域有更多控制，并且我是在变量将被使用的地方创建和配置它。此功能节省时间，简直太棒了。\n\
    \n按以下顺序创建变量：\n\n```\nContainer: Parent\nName: FolderName\nNamespace: User\nValue\
    \ Type: String\nValue:\n\nContainer: Parent\nName: ProjectName\nNamespace: User\n\
    Value Type: String\nValue:\n\nContainer: Parent\nName: ChildPackageName\nNamespace:\
    \ User\nValue Type: String\nValue:\n\nContainer: Parent\nName: ExecutionOrder\n\
    Namespace: User\nValue Type: Int32\nValue: 0\n```\n\n确保索引值对齐如下所示：\n\n```\nFolderName:\
    \ 0\nProjectName: 1\nChildPackageName: 2\nExecutionOrder: 3\n```\n\n字段不必按此顺序列出，但索引值必须与\
    \ `custom.GetApplicationPackages` 返回的字段的（从零开始的）序数值对齐。\n\n## 设置执行任务\n\n单击“确定”按钮关闭“Foreach\
    \ 循环容器编辑器”。将一个“执行 SQL”任务拖到“Foreach 循环容器”中，并将其重命名为 `Execute Package`。将 `ConnectionType`\
    \ 设置为 `ADO.NET`，并选择你之前创建的 `SSISDB` 连接。将 `IsQueryStoredProcedure` 属性设置为 `True`，并将\
    \ `SQL Statement` 属性设置为 `custom.execute_catalog_package`。在“参数映射”页上，添加并创建一个名为 `ExecutionID`\
    \ 的新变量，`Int32` 数据类型，包作用域，`默认值`：0。将参数的 `Direction` 更改为 `Output`，并通过提供参数名称 `ExecutionID`\
    \ 将你刚刚创建的 SSIS 变量与 `ExecutionID` 参数关联起来。再添加三个参数映射——分别对应 `FolderName`、`ProjectName`\
    \ 和 `ChildPackageName`。将它们分别映射到存储过程参数 `FolderName`、`ProjectName` 和 `PackageName`。`custom.execute_catalog_package`\
    \ 存储过程接受其他参数：`LoggingLevel`、`Use32BitRunTime`、`ReferenceID` 和 `ObjectType`；但这些参数都包含默认值，这些默认值将满足我们的目的。单击“确定”按钮关闭“执行\
    \ SQL 任务编辑器”。\n\n你的 `Parent.dtsx` SSIS 包应如图 2-3 所示。\n\n![9781484200834_Fig02-03.jpg](images/9781484200834_Fig02-03.jpg)\n\
    \n**图 2-3**. 父包控制流\n\n## 构建执行元数据\n\n返回到 `SSMS`。让我们为简单的执行框架提供要执行的元数据。执行清单 2-8 中的\
    \ T-SQL 语句。\n\n**清单 2-8**. 为 SSIS 应用程序构建元数据\n\n```\nUse SSISDB\nGo\n\nSet NoCount\
    \ On\n\nDeclare @ApplicationName nvarchar(256)\nDeclare @ApplicationDescription\
    \ nvarchar(512)\nDeclare @ApplicationID int\nDeclare @FolderName nvarchar(256)\n\
    Declare @ProjectName nvarchar(256)\nDeclare @PackageName nvarchar(256)\nDeclare\
    \ @PackageDescription nvarchar(512)\nDeclare @PackageID int\nDeclare @ExecutionOrder\
    \ int\nDeclare @ApplicationPackageEnabled bit\nDeclare @ApplicationTbl table(ApplicationID\
    \ int)\nDeclare @PackageTbl table(PackageID int)\n\nbegin tran\n\n-- Build Application\
    \ --\nSelect @ApplicationName = 'TestSSISApp'\n      ,@ApplicationDescription\
    \ = 'A test SSIS application'\n\nInsert Into @ApplicationTbl\nExec custom.AddApplication\n\
    \  @ApplicationName\n ,@ApplicationDescription\n\nSelect @ApplicationID = ApplicationID\n\
    \ From @ApplicationTbl\n\n-- Build Package --\nSelect @FolderName = 'Chapter2'\n\
    \      ,@ProjectName = 'Chapter2'\n      ,@PackageName = 'Chapter2.dtsx'\n   \
    \   ,@PackageDescription = 'A test SSIS package'\n\nInsert Into @PackageTbl\n\
    Exec custom.AddPackage\n  @FolderName\n ,@ProjectName\n ,@PackageName\n ,@PackageDescription\n\
    \nSelect @PackageID = PackageID\n From @PackageTbl\n\n-- Build ApplicationPackage\
    \ --\nSelect @ExecutionOrder = 10\n       ,@ApplicationPackageEnabled = 1\n\n\
    Exec custom.AddApplicationPackage\n   @ApplicationID\n  ,@PackageID\n  ,@ExecutionOrder\n\
    \  ,@ApplicationPackageEnabled\n\nDelete @PackageTbl\n\n-- Build Package --\n\
    Select @FolderName = 'Chapter2'\n      ,@ProjectName = 'Chapter2'\n      ,@PackageName\
    \ = 'Chapter2.dtsx'\n      ,@PackageDescription = 'Another test SSIS package'\n\
    \nInsert Into @PackageTbl\nExec custom.AddPackage\n  @FolderName\n ,@ProjectName\n\
    \ ,@PackageName\n ,@PackageDescription\n\nSelect @PackageID = PackageID\n From\
    \ @PackageTbl\n\n-- Build ApplicationPackage --\nSelect @ExecutionOrder = 20\n\
    \       ,@ApplicationPackageEnabled = 1\n\nExec custom.AddApplicationPackage\n\
    \   @ApplicationID\n  ,@PackageID\n  ,@ExecutionOrder\n  ,@ApplicationPackageEnabled\n\
    \nDelete @PackageTbl\n\nCommit\n```\n\n清单 2-8 中的 T-SQL 在执行框架中构建了一个简单的 SSIS 应用程序。它调用了我们的\
    \ `Chapter2.dtsx` SSIS 包两次。如果你回到 `SSDT-BI` 并执行父包，你会注意到 `Chapter2.dtsx` SSIS 包快速连续执行了两次。你可以在图\
    \ 2-4 中看到该执行情况。"
  raw: '![Image](images/sq.jpg) **Note**  `Object` is an interesting data type. Akin
    to a variant, `Object` can contain a scalar like a date or integer. It can also
    hold a collection or string array. In this example, `Object` will contain an `ADO.Net
    Dataset` value. If we had set the ConnectionType property to OLEDB (the default),
    this result set variable would be populated with an ADO Recordset. Yes, that is
    a COM object—in 2014\. COM (and COBOL) will never die....


    Let’s review. First, the task will use an ADO.NET connection to the SSISDB database
    to execute the `custom.GetApplicationPackages` stored procedure we created earlier.
    Because we set the `IsQueryStoredProcedure` to `True`, we do not need to add placeholders
    for parameters or the `exec` command. Since we used ADO.NET, we can address parameters
    by name instead of ordinal (*ApplicationName* instead of `0`) on the Parameter
    Mapping page. Finally, we configured the Execute SQL task to push the results
    of the stored procedure execution into an object variable named `Packages`.


    Click the OK button to close the Execute SQL Task Editor. Drag a Foreach Loop
    container onto the control flow surface and open its editor. On the General page,
    change the Name property to **Foreach Package in Packages**. On the Collection
    page, select the Foreach ADO Enumerator. In the ADO Object Source Variable drop-down,
    select the `Packages` variable. Leave the Enumeration Mode default option Rows
    in the First Table selected.


    I can hear you thinking, “So what would I need to do if I had an ADO Recordset
    in the `Packages` object variable?” That is an excellent question. The answer
    is, “Nothing different.” Even though object variables can hold ADO Recordsets
    and ADO.NET datasets (and other collections and scalars), the Foreach ADO Enumerator
    is smart enough to *detect* the type of object inside the SSIS object variable—
    and then read it. Isn’t that cool? I thought so too.


    Navigate to the Variable Mappings page. Create four variables at package scope.
    These variables match the fields returned from the `custom.GetApplicationPackages`
    stored procedure; and subsequently loaded into the first table in an ADO.NET dataset
    now housed inside the `Packages` SSIS variable. If you didn’t get that sentence,
    reread it (I’ll wait). That’s a lot to take in, but it is vital to understanding
    what we’re doing here. Got it? Good.


    I will walk you through creating the first variable listed as follows using the
    method I prefer for variable creation. Click the Variable drop-down and select
    <New variable...> at the very top of the list. When the Add Variable window displays,
    make sure the Container property is set to Parent (the name of the package). This
    ensures the variable has package scope. Enter **FolderName** in the Name text
    box. Click the OK button and change the Index property to **0**. Leave the Value
    Type property set to String. I almost always create SSIS variables in this fashion.
    I have more control over scope, and I am creating and configuring the variable
    where it will be used. This functionality saves time and simply rocks.


    Create the variables in the following order:


    ```

    Container: Parent

    Name: FolderName

    Namespace: User

    Value Type: String

    Value:


    Container: Parent

    Name: ProjectName

    Namespace: User

    Value Type: String

    Value:


    Container: Parent

    Name: ChildPackageName

    Namespace: User

    Value Type: String

    Value:


    Container: Parent

    Name: ExecutionOrder

    Namespace: User

    Value Type: Int32

    Value: 0

    ```


    Make sure the index values align as shown here:


    ```

    FolderName: 0

    ProjectName: 1

    ChildPackageName: 2

    ExecutionOrder: 3

    ```


    The fields do not *have* to be listed in this order, but the index values have
    to align with the (zero-based) ordinal value of the fields returned by the `custom.GetApplicationPackages`.


    Click the OK button to close the Foreach Loop Container Editor. Drag an Execute
    SQL task into the Foreach Loop container and rename it **Execute Package**. Set
    the ConnectionType to `ADO.NET` and select the SSISDB connection you created earlier.
    Set the `IsQueryStoredProcedure` property to `True` and the SQL Statement property
    to `custom.execute_catalog_package`. On the Parameter Mapping page, add and create
    a new variable named ExecutionID, Int32 data type, package scope, default value:
    0\. Change the Direction of the parameter to Output and couple the SSIS variable
    you just created to the `ExecutionID` parameter by supplying the Parameter Name:
    `ExecutionID`. Add three more parameter mappings—one each for `FolderName`, `ProjectName`,
    and `ChildPackageName`. Map them to the stored procedure parameters `FolderName`,
    `ProjectName`, and `PackageName`; respectively. The `custom.execute_catalog_package`
    stored procedure accepts other parameters: `LoggingLevel`, `Use32BitRunTime`,
    `ReferenceID`, and `ObjectType`; but these parameters all contain default values
    that will serve our purposes. Click the OK button to close the Execute SQL Task
    Editor.


    Your `Parent.dtsx` SSIS package should appear as shown in [Figure 2-3](#9781484200834_Ch02.xhtml#Fig3).


    ![9781484200834_Fig02-03.jpg](images/9781484200834_Fig02-03.jpg)


    [Figure 2-3](#9781484200834_Ch02.xhtml#_Fig3). Parent package control flow


    Return to SSMS. Let’s provide our simple execution framework with metadata to
    execute. Execute the T-SQL statements in [Listing 2-8](#9781484200834_Ch02.xhtml#list8).


    [***Listing 2-8***](#9781484200834_Ch02.xhtml#_list8). Building the Metadata for
    an SSIS Application


    ```

    Use SSISDB

    Go


    Set NoCount On


    Declare @ApplicationName nvarchar(256)

    Declare @ApplicationDescription nvarchar(512)

    Declare @ApplicationID int

    Declare @FolderName nvarchar(256)

    Declare @ProjectName nvarchar(256)

    Declare @PackageName nvarchar(256)

    Declare @PackageDescription nvarchar(512)

    Declare @PackageID int

    Declare @ExecutionOrder int

    Declare @ApplicationPackageEnabled bit

    Declare @ApplicationTbl table(ApplicationID int)

    Declare @PackageTbl table(PackageID int)


    begin tran


    -- Build Application --

    Select @ApplicationName = ''TestSSISApp''

          ,@ApplicationDescription = ''A test SSIS application''


    Insert Into @ApplicationTbl

    Exec custom.AddApplication

      @ApplicationName

     ,@ApplicationDescription


    Select @ApplicationID = ApplicationID

     From @ApplicationTbl


    -- Build Package --

    Select @FolderName = ''Chapter2''

          ,@ProjectName = ''Chapter2''

          ,@PackageName = ''Chapter2.dtsx''

          ,@PackageDescription = ''A test SSIS package''


    Insert Into @PackageTbl

    Exec custom.AddPackage

      @FolderName

     ,@ProjectName

     ,@PackageName

     ,@PackageDescription


    Select @PackageID = PackageID

     From @PackageTbl


    -- Build ApplicationPackage --

    Select @ExecutionOrder = 10

           ,@ApplicationPackageEnabled = 1


    Exec custom.AddApplicationPackage

       @ApplicationID

      ,@PackageID

      ,@ExecutionOrder

      ,@ApplicationPackageEnabled


    Delete @PackageTbl


    -- Build Package --

    Select @FolderName = ''Chapter2''

          ,@ProjectName = ''Chapter2''

          ,@PackageName = ''Chapter2.dtsx''

          ,@PackageDescription = ''Another test SSIS package''


    Insert Into @PackageTbl

    Exec custom.AddPackage

      @FolderName

     ,@ProjectName

     ,@PackageName

     ,@PackageDescription


    Select @PackageID = PackageID

     From @PackageTbl


    -- Build ApplicationPackage --

    Select @ExecutionOrder = 20

           ,@ApplicationPackageEnabled = 1


    Exec custom.AddApplicationPackage

       @ApplicationID

      ,@PackageID

      ,@ExecutionOrder

      ,@ApplicationPackageEnabled


    Delete @PackageTbl


    Commit

    ```


    The T-SQL in [Listing 2-8](#9781484200834_Ch02.xhtml#list8) builds a simple SSIS
    application in the execution framework. It calls our `Chapter2.dtsx` SSIS package
    twice. If you return to SSDT-BI and execute the parent package, you will note
    the `Chapter2.dtsx` SSIS package executes twice in quick succession. You can see
    that execution in [Figure 2-4](#9781484200834_Ch02.xhtml#Fig4).'
