    \ SSIS 包用于演示。\n\n## 构建演示用的 SSIS 包\n\n创建一个名为 **Chapter2** 的新 SSIS 解决方案。重命名 SSIS\
    \ 包，将名称从 `Package.dtsx` 更改为 `Chapter2.dtsx`。\n\n![Image](img/sq.jpg) **提示** *有关创建\
    \ SSIS 解决方案和包的更多信息，请参阅 Michael Coles 和 Francis Rodrigues 所著的《Professional SQL\
    \ Server 2014 Integration Services》(Apress, 2012)*。\n\n将脚本组件拖放到控制流画布上并打开编辑器。在“脚本”页面的\
    \ `ScriptLanguage` 属性中选择你偏好的语言。在 `ReadOnlyVariables` 中选择 `System::PackageName`\
    \ 变量，然后单击“编辑脚本”按钮。\n\n如果你为脚本任务的 `ScriptLanguage` 属性选择了 Microsoft Visual Basic\
    \ 2010，请将 `Public Sub Main()` 中的代码替换为以下内容：\n\n```vbnet\nPublic Sub Main()\n\n\
    Dim sPackageName As String = Dts.Variables(\"PackageName\").Value.ToString\nDim\
    \ sMsg As String = \"Package Name: \" & sPackageName\n\nMsgBox(sMsg, , sPackageName)\n\
    \nDts.TaskResult = ScriptResults.Success\nEnd Sub\n```\n\n如果你为脚本任务的 `ScriptLanguage`\
    \ 属性选择了 Microsoft Visual C# 2010，请将 `public void Main()` 中的代码替换为以下内容：\n\n```csharp\n\
    public void Main()\n{\n    string sPackageName = Dts.Variables[\"PackageName\"\
    ].Value.ToString();\n    string sMsg = \"Package Name: \" + sPackageName;\n\n\
    \    MessageBox.Show(sMsg, sPackageName);\n\n    Dts.TaskResult = (int)ScriptResults.Success;\n\
    }\n```\n\n保存包、项目和解决方案。准备运行！\n\n## 调试执行\n\n在 SQL Server Business Intelligence Development\
    \ Studio (BIDS) 内执行包非常简单。无论选择哪种部署模型，其工作方式都相同。然而，与 Visual Studio 集成开发环境 (VS IDE)\
    \ 中的所有操作一样，有多种方法可以实现。\n\n当你在 BIDS 内执行 SSIS 包时，你是在调用 SSIS 调试器。SSIS 调试器文件名为 `DtsDebugHost.exe`，存储在\
    \ `<drive>:\\Program Files\\Microsoft SQL Server\\120\\DTS\\Binn` 文件夹中。重要的是要认识到你是在调试宿主进程内执行\
    \ SSIS 包。为什么？因为调试会产生开销——那些框变色可不是免费的！\n\n要在 BIDS 中执行 `Chapter2.dtsx` 包，请按 F5 键。调试宿主加载，然后加载包并执行它。你应该会看到一个显示包名的消息框。当你单击消息框上的“确定”按钮时，Chapter2\
    \ 包控制流中的脚本任务会从黄色变为绿色。“连接管理器”选项卡下方会出现一个链接，指示包执行已完成。但是，`DtsDebugHost.exe` 进程仍在执行。它会继续执行，直到\
    \ BIDS 调试器停止。\n\n以下是一些启动 BIDS 调试器的方法：\n\n*   按 F5 键。\n*   单击工具栏上的 VCR 播放按钮（指向右的绿色箭头）。\n\
    *   单击“调试”下拉菜单并选择“开始调试”。\n\n![Image](img/sq.jpg) **注意** 实际上，从“调试”下拉菜单中选择“逐语句”或“逐过程”也会启动\
    \ BIDS 调试器。\n\n*   在解决方案资源管理器中，右键单击包并从菜单中选择“执行包”。\n*   当包在调试模式下完成执行后，可以通过以下方式之一重新启动包：\n\
    \    *   按住 Ctrl+Shift 并按 F5 键\n    *   使用工具栏上的 VCR 重新启动按钮\n    *   单击“调试”下拉菜单并单击“重新启动”\n\
    \n以下是一些在包执行完成后（或任何时候需要停止调试模式）停止调试器的方法：\n\n*   按住 Shift 并按 F5 键。\n*   单击工具栏上的 VCR\
    \ 停止按钮（方块）。\n*   单击“调试”下拉菜单并选择“停止调试”。\n*   单击“调试”下拉菜单并选择“终止所有”。\n*   单击“连接管理器”选项卡下方的“包执行已完成”链接。\n\
    \n## 命令行执行\n\nSSIS 包的命令行执行使用 DTEXEC 实用工具 (`DtExec.exe`)。DTEXEC 支持项目和包部署模型。你可以通过单击“调试”下拉菜单并选择“开始执行(不调试)”（或按住\
    \ Ctrl 键并按 F5）在 BIDS 内手动调用 DTEXEC。你也可以从命令提示符手动启动 DTEXEC。\n\nDTEXEC 通常不是手动调用的。相反，通常将\
    \ DTEXEC 命令行与计划软件结合使用，在生产环境中执行 SSIS 包。例如，当你使用 SQL Server Agent 计划 SSIS 包（本章稍后介绍）时，就会实例化\
    \ DTEXEC。\n\n要使用 DTEXEC 执行 `Chapter2.dtsx` SSIS 包，请打开命令提示符并输入以下命令：\n\n```\ndtexec\
    \ /FILE \"G:\\Projects\\SSIS Design Patterns\\SSIS Design Patterns\\Chapter2.dtsx\"\
    \n```\n\n此命令执行位于 `G:\\Projects\\SSIS Design Patterns\\SSIS Design Patterns` 文件夹中的\
    \ `Chapter2.dtsx` SSIS 包。如果你跟着做，请编辑命令行以反映你的 SSIS 包的位置。\n\n当你从命令行执行包时，消息框会显示包名——就像从\
    \ BIDS 调试器内执行包时一样。\n\n如果 SSIS 包已部署到新的 SSIS 目录，你仍然可以使用类似以下的命令从命令行执行它：\n\n```\n\
    dtexec.exe /ISSERVER \"\\\"\\SSISDB\\Chapter2\\Chapter2\\Chapter2.dtsx\\\"\" /SERVER\
    \ \"\\\"SSISMVP-RC0\\\"\" /Par \"\\\"$ServerOption::SYNCHRONIZED(Boolean)\\\"\"\
    ;True /REPORTING E /CALLERINFO Andy\n```\n\n## 执行包实用工具\n\n执行包实用工具 (DtExecUI) 在其自身进程中运行并执行\
    \ SSIS 包。我喜欢使用执行包实用工具来构建 DTEXEC 命令行，但它仅支持包部署模型。你至少可以通过三种方式调用执行包实用工具：\n\n*   单击“开始”\
    \ ![image](img/arrow.jpg) “所有程序” ![image](img/arrow.jpg) “Microsoft SQL Server”\
    \ ![image](img/arrow.jpg) “Integration Services” ![image](img/arrow.jpg) “执行包实用工具”。\n\
    *   单击“开始” ![image](img/arrow.jpg) “运行”，在“打开”文本框中键入 **dtexecui**。\n*   双击一个 dtsx\
    \ 文件（如果你没有为 dtsx 文件重新映射默认应用程序设置）。\n\n我最喜欢的选项是双击 dtsx 文件。这不仅会打开执行包实用工具，还会将“常规”页的设置设置为指示包源是文件系统，并使用双击的\
    \ dtsx 文件的完整路径配置“包路径”文本框。很棒。\n\n如果我使用执行包实用工具执行 `Package2.dtsx`，将显示“包执行进度”表单，通知我包的执行进度（多么贴切），并且消息框会出现，就像我使用\
    \ BIDS 调试器和命令行执行时一样。\n\n![Image](img/sq.jpg) **注意** *有关执行包实用工具的更多信息，请参阅 Michael\
    \ Coles 和 Francis Rodrigues 所著的《Professional SQL Server 11 Integration Services》(Apress,\
    \ 2012)*。\n\n## SQL Server 2014 Integration Services 服务\n"
- fmt: "# The SQL Server Integration Services 11.0 Service\n\nThe SQL Server Integration\
    \ Services 11.0 service installs with SQL Server 2014. To connect, open SQL Server\
    \ Management Studio (`SSMS`). If prompted to connect with the `Connect To Server`\
    \ window at `SSMS` startup, make sure `Server Type` is set to `Integration Services`.\
    \ Enter the name of the server in the `Server Name` drop-down. Please note there\
    \ aren’t named instances of SSIS: there’s one per server (for now, anyway). You\
    \ can also enter `localhost` to connect to the local server’s default instance\
    \ of SSIS.\n\nOnce the connection is configured, click the `Connect` button. Navigate\
    \ to the package you desire to execute. SSIS packages stored in the file system\
    \ or the `MSDB` database can be executed from the SSIS 2014 service.\n\nSQL Server\
    \ 2014 provides a new way to manage and execute Integration Services packages:\
    \ Integration Services catalogs. We explore this method next.\n\n## Integration\
    \ Services Catalogs\n\nYou can only manage SSIS projects that use the project\
    \ deployment model in Integration Services catalogs. To execute a package in the\
    \ catalog, use `SSMS` to connect to the instance of SQL Server hosting the `SSISDB`\
    \ database. Expand the `Integration Services Catalogs` node and then expand the\
    \ `SSISDB` node. Drill into the folder containing the SSIS project and package(s).\
    \ Right-click the package you wish to execute and click `Execute`, as shown in\
    \ [Figure 2-1](#9781484200834_Ch02.xhtml#Fig1).\n\n![9781484200834_Fig02-01.jpg](images/9781484200834_Fig02-01.jpg)\n\
    \n[Figure 2-1](#9781484200834_Ch02.xhtml#_Fig1). Executing an SSIS package deployed\
    \ to the SSIS Catalog\n\nThe `Execute Package` window displays, as shown in [Figure\
    \ 2-2](#9781484200834_Ch02.xhtml#Fig2). It allows you to override parameter values,\
    \ `ConnectionString` properties of connection managers built at design-time, or\
    \ any other externalize-able property accessible from a package path (via the\
    \ `Advanced` tab) for this execution instance of the SSIS package stored in the\
    \ SSIS Catalog.\n\n![9781484200834_Fig02-02.jpg](images/9781484200834_Fig02-02.jpg)\n\
    \n[Figure 2-2](#9781484200834_Ch02.xhtml#_Fig2). Execute Package window\n\n##\
    \ Integration Server Catalog Stored Procedures\n\nPlease note the `Script` button\
    \ above the `Parameters` tab in [Figure 2-2](#9781484200834_Ch02.xhtml#Fig2).\
    \ This button allows you to generate Transact-SQL (`T-SQL`) statements that will\
    \ execute the SSIS package. For the `Chapter2.dtsx` package stored in the SSIS\
    \ Catalog, the scripts will appear similar to those in [Listing 2-1](#9781484200834_Ch02.xhtml#list1).\n\
    \n`Listing 2-1`. T-SQL Script Generated from the Execute Package Window\n\n```sql\n\
    Declare @execution_id bigint\nEXEC [SSISDB].[catalog].[create_execution]\n   @package_name=N'Chapter2.dtsx'\n\
    \  ,@execution_id=@execution_id OUTPUT\n  ,@folder_name=N'Chapter2'\n  ,@project_name=N'Chapter2'\n\
    \  ,@use32bitruntime=False\n  ,@reference_id=Null\nSelect @execution_id\nDECLARE\
    \ @var0 smallint = 1\nEXEC [SSISDB].[catalog].[set_execution_parameter_value]\n\
    \   @execution_id\n  ,@object_type=50\n  ,@parameter_name=N'LOGGING_LEVEL'\n \
    \ ,@parameter_value=@var0\nEXEC [SSISDB].[catalog].[start_execution] @execution_id\n\
    GO\n```\n\nYou can use these same stored procedures to execute SSIS packages in\
    \ the SSIS Catalog! In fact, I designed a script to create a wrapper-stored procedure\
    \ that will call the `T-SQL` statements executed when an SSIS package is executed\
    \ in the SSIS Catalog. You can see that script in [Listing 2-2](#9781484200834_Ch02.xhtml#list2).\n\
    \n`Listing 2-2`. Script to Build a Wrapper-Stored Procedure for Executing SSIS\
    \ Packages in the SSIS Catalog\n\n```sql\n /* Select the SSISDB database */\n\
    Use SSISDB\nGo\n\n/* Create a parameter (variable) named @Sql */\nDeclare @Sql\
    \ varchar(2000)\n\n/* Create the Custom schema if it does not already exist */\n\
    print 'Custom Schema'\nIf Not Exists(Select name\n              From sys.schemas\n\
    \                Where name = 'custom')\n begin\n   /* Create Schema statements\
    \ must occur first in a batch */\n  print ' - Creating custom schema'\n  Set @Sql\
    \ = 'Create Schema custom'\n  Exec(@Sql)\n  print ' - Custom schema created'\n\
    \ end\nElse\n print ' - Custom Schema already exists.'\nprint ''\n\n/* Drop the\
    \ Custom.execute_catalog_package Stored Procedure if it already exists */\nprint\
    \ 'Custom.execute_catalog_package Stored Procedure'\n  If Exists(Select s.name\
    \ + '.' + p.name\n            From sys.procedures p\n            Join sys.schemas\
    \ s\n                On s.schema_id = p.schema_id\n         Where s.name = 'custom'\n\
    \           And p.name = 'execute_catalog_package')\n   begin\n    print ' - Dropping\
    \ custom.execute_catalog_package'\n    Drop Procedure custom.execute_catalog_package\n\
    \    print ' - Custom.execute_catalog_package dropped'\n   end\n\n/* Create the\
    \ Custom.execute_catalog_package Stored Procedure */\n  print ' - Creating custom.execute_catalog_package'\n\
    go\n\n/*\n\nStored Procedure: custom.execute_catalog_package\n     Author: Andy\
    \ Leonard\n     Date: 4 Mar 2012\n     Description: Creates a wrapper around the\
    \ SSISDB Catalog procedures\n                  used to start executing an SSIS\
    \ Package. Packages in the\n                SSIS Catalog are referenced by a multi-part\
    \ identifier\n                 - or path - that consists of the following hierarchy:\n\
    \        Catalog Name: Implied by the database name in Integration Server 2014\n\
    \        |-Folder Name: A folder created before or at Deployment to contain the\
    \ SSIS project\n        |-Project Name: The name of the SSIS Project deployed\n\
    \        |-Package Name: The name(s) of the SSIS Package(s) deployed\n\nParameters:\n\
    \        @FolderName [nvarchar(128)] {No default} –\n         contains the name\
    \ of the Folder that holds the SSIS Project\n        @ProjectName [nvarchar(128)]\
    \ {No default} –\n         contains the name of the SSIS Project that holds the\
    \ SSIS Package\n        @PackageName [nvarchar(260)] {No default} –\n        \
    \ contains the name of the SSIS Package to be executed\n        @ExecutionID [bigint]\
    \ {Output} –\n         Output parameter (variable) passed back to the caller\n\
    \        @LoggingLevel [varchar(16)] {Default} –\n         contains the (case-insensitive)\
    \ name of the logging level\n         to apply to this execution instance\n  \
    \      @Use32BitRunTime [bit] {Default} –\n         1 == Use 64-bit run-time\n\
    \                                                  0 == Use 32-bit run-time\n\
    \        @ReferenceID [bigint] {Default} –reference to Execution Environment\n\
    \        @ObjectType [smallint] –identifier related to PackageType property\n\
    \        Guessing: @ObjectType == PackageType.ordinal (1-based-array) * 10\n \
    \        Must be 20, 30, or 50 for catalog.set_execution_parameter_value\n   \
    \      stored procedure\n\nTest:\n        1. Create and deploy an SSIS Package\
    \ to the SSIS Catalog.\n        2. Exec custom.execute_catalog_package and pass\
    \ it the\n          following parameters: @FolderName, @ProjectName, @PackageName,\
    \ @ExecutionID Output\n        @LoggingLevel, @Use32BitRunTime, @ReferenceID,\
    \ and @ObjectType are optional and\n        defaulted parameters.\n\nExample:\n\
    \           Declare @ExecId bigint\n           Exec custom.execute_catalog_package\n\
    \         'Chapter2'\n        ,'Chapter2'\n        ,'Chapter2.dtsx'\n        ,@ExecId\
    \ Output\n        3. When execution completes, an Execution_Id value should be\
    \ returned.\n        View the SSIS Catalog Reports to determine the status of\
    \ the execution\n        instance and the test.\n\n*/\nCreate Procedure custom.execute_catalog_package\n\
    \  @FolderName nvarchar(128)\n ,@ProjectName nvarchar(128)\n ,@PackageName nvarchar(260)\n\
    \ ,@ExecutionID bigint Output\n ,@LoggingLevel varchar(16) = 'Basic'\n ,@Use32BitRunTime\
    \ bit = 0\n ,@ReferenceID bigint = NULL\n ,@ObjectType smallint = 50\nAs\n\nbegin\n\
    \nSet NoCount ON\n```"
  raw: 'The SQL Server Integration Services 11.0 service installs with SQL Server
    2014\. To connect, open SQL Server Management Studio (SSMS). If prompted to connect
    with the Connect To Server window at SSMS startup, make sure Server Type is set
    to Integration Services. Enter the name of the server in the Server Name drop-down.
    Please note there aren’t named instances of SSIS: there’s one per server (for
    now, anyway). You can also enter **localhost** to connect to the local server’s
    default instance of SSIS.


    Once the connection is configured, click the Connect button. Navigate to the package
    you desire to execute. SSIS packages stored in the file system or the MSDB database
    can be executed from the SSIS 2014 service.


    SQL Server 2014 provides a new way to manage and execute Integration Services
    packages: Integration Services catalogs. We explore this method next.


    Integration Services Catalogs


    You can only manage SSIS projects that use the project deployment model in Integration
    Services catalogs. To execute a package in the catalog, use SSMS to connect to
    the instance of SQL Server hosting the SSISDB database. Expand the Integration
    Services Catalogs node and then expand the SSISDB node. Drill into the folder
    containing the SSIS project and package(s). Right-click the package you wish to
    execute and click Execute, as shown in [Figure 2-1](#9781484200834_Ch02.xhtml#Fig1).


    ![9781484200834_Fig02-01.jpg](images/9781484200834_Fig02-01.jpg)


    [Figure 2-1](#9781484200834_Ch02.xhtml#_Fig1). Executing an SSIS package deployed
    to the SSIS Catalog


    The Execute Package window displays, as shown in [Figure 2-2](#9781484200834_Ch02.xhtml#Fig2).
    It allows you to override parameter values, ConnectionString properties of connection
    managers built at design-time, or any other externalize-able property accessible
    from a package path (via the Advanced tab) for this execution instance of the
    SSIS package stored in the SSIS Catalog.


    ![9781484200834_Fig02-02.jpg](images/9781484200834_Fig02-02.jpg)


    [Figure 2-2](#9781484200834_Ch02.xhtml#_Fig2). Execute Package window


    Integration Server Catalog Stored Procedures


    Please note the Script button above the Parameters tab in [Figure 2-2](#9781484200834_Ch02.xhtml#Fig2).
    This button allows you to generate Transact-SQL (T-SQL) statements that will execute
    the SSIS package. For the `Chapter2.dtsx` package stored in the SSIS Catalog,
    the scripts will appear similar to those in [Listing 2-1](#9781484200834_Ch02.xhtml#list1).


    [***Listing 2-1***](#9781484200834_Ch02.xhtml#_list1). T-SQL Script Generated
    from the Execute Package Window


    ```

    Declare @execution_id bigint

    EXEC [SSISDB].[catalog].[create_execution]

       @package_name=N''Chapter2.dtsx''

      ,@execution_id=@execution_id OUTPUT

      ,@folder_name=N''Chapter2''

      ,@project_name=N''Chapter2''

      ,@use32bitruntime=False

      ,@reference_id=Null

    Select @execution_id

    DECLARE @var0 smallint = 1

    EXEC [SSISDB].[catalog].[set_execution_parameter_value]

       @execution_id

      ,@object_type=50

      ,@parameter_name=N''LOGGING_LEVEL''

      ,@parameter_value=@var0

    EXEC [SSISDB].[catalog].[start_execution] @execution_id

    GO

    ```


    You can use these same stored procedures to execute SSIS packages in the SSIS
    Catalog! In fact, I designed a script to create a wrapper-stored procedure that
    will call the T-SQL statements executed when an SSIS package is executed in the
    SSIS Catalog. You can see that script in [Listing 2-2](#9781484200834_Ch02.xhtml#list2).


    [***Listing 2-2***](#9781484200834_Ch02.xhtml#_list2). Script to Build a Wrapper-Stored
    Procedure for Executing SSIS Packages in the SSIS Catalog


    ```

     /* Select the SSISDB database */

    Use SSISDB

    Go


    /* Create a parameter (variable) named @Sql */

    Declare @Sql varchar(2000)


    /* Create the Custom schema if it does not already exist */

    print ''Custom Schema''

    If Not Exists(Select name

                  From sys.schemas

                    Where name = ''custom'')

     begin

       /* Create Schema statements must occur first in a batch */

      print '' - Creating custom schema''

      Set @Sql = ''Create Schema custom''

      Exec(@Sql)

      print '' - Custom schema created''

     end

    Else

     print '' - Custom Schema already exists.''

    print ''''


    /* Drop the Custom.execute_catalog_package Stored Procedure if it already exists
    */

    print ''Custom.execute_catalog_package Stored Procedure''

      If Exists(Select s.name + ''.'' + p.name

                From sys.procedures p

                Join sys.schemas s

                    On s.schema_id = p.schema_id

             Where s.name = ''custom''

               And p.name = ''execute_catalog_package'')

       begin

        print '' - Dropping custom.execute_catalog_package''

        Drop Procedure custom.execute_catalog_package

        print '' - Custom.execute_catalog_package dropped''

       end


    /* Create the Custom.execute_catalog_package Stored Procedure */

      print '' - Creating custom.execute_catalog_package''

    go


    /*


    Stored Procedure: custom.execute_catalog_package

         Author: Andy Leonard

         Date: 4 Mar 2012

         Description: Creates a wrapper around the SSISDB Catalog procedures

                      used to start executing an SSIS Package. Packages in the

                    SSIS Catalog are referenced by a multi-part identifier

                     - or path - that consists of the following hierarchy:

            Catalog Name: Implied by the database name in Integration Server 2014

            |-Folder Name: A folder created before or at Deployment to contain the
    SSIS project

            |-Project Name: The name of the SSIS Project deployed

            |-Package Name: The name(s) of the SSIS Package(s) deployed


    Parameters:

            @FolderName [nvarchar(128)] {No default} –

             contains the name of the Folder that holds the SSIS Project

            @ProjectName [nvarchar(128)] {No default} –

             contains the name of the SSIS Project that holds the SSIS Package

            @PackageName [nvarchar(260)] {No default} –

             contains the name of the SSIS Package to be executed

            @ExecutionID [bigint] {Output} –

             Output parameter (variable) passed back to the caller

            @LoggingLevel [varchar(16)] {Default} –

             contains the (case-insensitive) name of the logging level

             to apply to this execution instance

            @Use32BitRunTime [bit] {Default} –

             1 == Use 64-bit run-time

                                                          0 == Use 32-bit run-time

            @ReferenceID [bigint] {Default} –reference to Execution Environment

            @ObjectType [smallint] –identifier related to PackageType property

            Guessing: @ObjectType == PackageType.ordinal (1-based-array) * 10

             Must be 20, 30, or 50 for catalog.set_execution_parameter_value

             stored procedure


    Test:

            1\. Create and deploy an SSIS Package to the SSIS Catalog.

            2\. Exec custom.execute_catalog_package and pass it the

              following parameters: @FolderName, @ProjectName, @PackageName, @ExecutionID
    Output

            @LoggingLevel, @Use32BitRunTime, @ReferenceID, and @ObjectType are optional
    and

            defaulted parameters.


    Example:

               Declare @ExecId bigint

               Exec custom.execute_catalog_package

             ''Chapter2''

            ,''Chapter2''

            ,''Chapter2.dtsx''

            ,@ExecId Output

            3\. When execution completes, an Execution_Id value should be returned.

            View the SSIS Catalog Reports to determine the status of the execution

            instance and the test.


    */

    Create Procedure custom.execute_catalog_package

      @FolderName nvarchar(128)

     ,@ProjectName nvarchar(128)

     ,@PackageName nvarchar(260)

     ,@ExecutionID bigint Output

     ,@LoggingLevel varchar(16) = ''Basic''

     ,@Use32BitRunTime bit = 0

     ,@ReferenceID bigint = NULL

     ,@ObjectType smallint = 50

    As


    begin


    Set NoCount ON'
  trans: "\n# SQL Server Integration Services 11.0 服务\n\nSQL Server Integration Services\
    \ 11.0 服务随 SQL Server 2014 一起安装。要连接，请打开 SQL Server Management Studio (`SSMS`)。如果在\
    \ `SSMS` 启动时出现 `连接到服务器` 窗口提示连接，请确保将 `服务器类型` 设置为 `Integration Services`。在 `服务器名称`\
    \ 下拉框中输入服务器名称。请注意，SSIS 没有命名实例：每个服务器只有一个实例（至少目前如此）。你也可以输入 `localhost` 来连接本地服务器的默认\
    \ SSIS 实例。\n\n配置好连接后，单击 `连接` 按钮。导航到你希望执行的包。存储在文件系统或 `MSDB` 数据库中的 SSIS 包可以通过 SSIS\
    \ 2014 服务执行。\n\nSQL Server 2014 提供了一种管理 Integration Services 包的新方法：Integration\
    \ Services 目录。我们接下来将探讨这种方法。\n\n## Integration Services 目录\n\n你只能在 Integration\
    \ Services 目录中管理使用项目部署模型的 SSIS 项目。要在目录中执行包，请使用 `SSMS` 连接到托管 `SSISDB` 数据库的 SQL\
    \ Server 实例。展开 `Integration Services 目录` 节点，然后展开 `SSISDB` 节点。深入包含 SSIS 项目和包的文件夹。右键单击你希望执行的包，然后单击\
    \ `执行`，如 图 2-1 所示。\n\n![9781484200834_Fig02-01.jpg](img/9781484200834_Fig02-01.jpg)\n\
    \n图 2-1. 执行已部署到 SSIS 目录的 SSIS 包\n\n`执行包` 窗口将显示，如 图 2-2 所示。它允许你为此存储在 SSIS 目录中的\
    \ SSIS 包的此执行实例覆盖参数值、设计时构建的连接管理器的 `ConnectionString` 属性，或任何其他可通过包路径访问的可外部化属性（通过\
    \ `高级` 选项卡）。\n\n![9781484200834_Fig02-02.jpg](img/9781484200834_Fig02-02.jpg)\n\
    \n图 2-2. 执行包窗口\n\n## Integration Server 目录存储过程\n\n请注意 图 2-2 中 `参数` 选项卡上方的 `脚本`\
    \ 按钮。此按钮允许你生成将执行 SSIS 包的 Transact-SQL (`T-SQL`) 语句。对于存储在 SSIS 目录中的 `Chapter2.dtsx`\
    \ 包，脚本将类似于 清单 2-1 中的那些。\n\n`清单 2-1`. 从执行包窗口生成的 T-SQL 脚本\n\n```sql\nDeclare @execution_id\
    \ bigint\nEXEC [SSISDB].[catalog].[create_execution]\n   @package_name=N'Chapter2.dtsx'\n\
    \  ,@execution_id=@execution_id OUTPUT\n  ,@folder_name=N'Chapter2'\n  ,@project_name=N'Chapter2'\n\
    \  ,@use32bitruntime=False\n  ,@reference_id=Null\nSelect @execution_id\nDECLARE\
    \ @var0 smallint = 1\nEXEC [SSISDB].[catalog].[set_execution_parameter_value]\n\
    \   @execution_id\n  ,@object_type=50\n  ,@parameter_name=N'LOGGING_LEVEL'\n \
    \ ,@parameter_value=@var0\nEXEC [SSISDB].[catalog].[start_execution] @execution_id\n\
    GO\n```\n\n你可以使用这些相同的存储过程来执行 SSIS 目录中的 SSIS 包！事实上，我设计了一个脚本来创建一个包装器存储过程，该过程将调用在\
    \ SSIS 目录中执行 SSIS 包时执行的 `T-SQL` 语句。你可以在 清单 2-2 中看到该脚本。\n\n`清单 2-2`. 用于构建在 SSIS\
    \ 目录中执行 SSIS 包的包装器存储过程的脚本\n\n```sql\n /* Select the SSISDB database */\nUse SSISDB\n\
    Go\n\n/* Create a parameter (variable) named @Sql */\nDeclare @Sql varchar(2000)\n\
    \n/* Create the Custom schema if it does not already exist */\nprint 'Custom Schema'\n\
    If Not Exists(Select name\n              From sys.schemas\n                Where\
    \ name = 'custom')\n begin\n   /* Create Schema statements must occur first in\
    \ a batch */\n  print ' - Creating custom schema'\n  Set @Sql = 'Create Schema\
    \ custom'\n  Exec(@Sql)\n  print ' - Custom schema created'\n end\nElse\n print\
    \ ' - Custom Schema already exists.'\nprint ''\n\n/* Drop the Custom.execute_catalog_package\
    \ Stored Procedure if it already exists */\nprint 'Custom.execute_catalog_package\
    \ Stored Procedure'\n  If Exists(Select s.name + '.' + p.name\n            From\
    \ sys.procedures p\n            Join sys.schemas s\n                On s.schema_id\
    \ = p.schema_id\n         Where s.name = 'custom'\n           And p.name = 'execute_catalog_package')\n\
    \   begin\n    print ' - Dropping custom.execute_catalog_package'\n    Drop Procedure\
    \ custom.execute_catalog_package\n    print ' - Custom.execute_catalog_package\
    \ dropped'\n   end\n\n/* Create the Custom.execute_catalog_package Stored Procedure\
    \ */\n  print ' - Creating custom.execute_catalog_package'\ngo\n\n/*\n\nStored\
    \ Procedure: custom.execute_catalog_package\n     Author: Andy Leonard\n     Date:\
    \ 4 Mar 2012\n     Description: Creates a wrapper around the SSISDB Catalog procedures\n\
    \                  used to start executing an SSIS Package. Packages in the\n\
    \                SSIS Catalog are referenced by a multi-part identifier\n    \
    \             - or path - that consists of the following hierarchy:\n        Catalog\
    \ Name: Implied by the database name in Integration Server 2014\n        |-Folder\
    \ Name: A folder created before or at Deployment to contain the SSIS project\n\
    \        |-Project Name: The name of the SSIS Project deployed\n        |-Package\
    \ Name: The name(s) of the SSIS Package(s) deployed\n\nParameters:\n        @FolderName\
    \ [nvarchar(128)] {No default} –\n         contains the name of the Folder that\
    \ holds the SSIS Project\n        @ProjectName [nvarchar(128)] {No default} –\n\
    \         contains the name of the SSIS Project that holds the SSIS Package\n\
    \        @PackageName [nvarchar(260)] {No default} –\n         contains the name\
    \ of the SSIS Package to be executed\n        @ExecutionID [bigint] {Output} –\n\
    \         Output parameter (variable) passed back to the caller\n        @LoggingLevel\
    \ [varchar(16)] {Default} –\n         contains the (case-insensitive) name of\
    \ the logging level\n         to apply to this execution instance\n        @Use32BitRunTime\
    \ [bit] {Default} –\n         1 == Use 64-bit run-time\n                     \
    \                             0 == Use 32-bit run-time\n        @ReferenceID [bigint]\
    \ {Default} –reference to Execution Environment\n        @ObjectType [smallint]\
    \ –identifier related to PackageType property\n        Guessing: @ObjectType ==\
    \ PackageType.ordinal (1-based-array) * 10\n         Must be 20, 30, or 50 for\
    \ catalog.set_execution_parameter_value\n         stored procedure\n\nTest:\n\
    \        1. Create and deploy an SSIS Package to the SSIS Catalog.\n        2.\
    \ Exec custom.execute_catalog_package and pass it the\n          following parameters:\
    \ @FolderName, @ProjectName, @PackageName, @ExecutionID Output\n        @LoggingLevel,\
    \ @Use32BitRunTime, @ReferenceID, and @ObjectType are optional and\n        defaulted\
    \ parameters.\n\nExample:\n           Declare @ExecId bigint\n           Exec\
    \ custom.execute_catalog_package\n         'Chapter2'\n        ,'Chapter2'\n \
    \       ,'Chapter2.dtsx'\n        ,@ExecId Output\n        3. When execution completes,\
    \ an Execution_Id value should be returned.\n        View the SSIS Catalog Reports\
    \ to determine the status of the execution\n        instance and the test.\n\n\
    */\nCreate Procedure custom.execute_catalog_package\n  @FolderName nvarchar(128)\n\
    \ ,@ProjectName nvarchar(128)\n ,@PackageName nvarchar(260)\n ,@ExecutionID bigint\
    \ Output\n ,@LoggingLevel varchar(16) = 'Basic'\n ,@Use32BitRunTime bit = 0\n\
    \ ,@ReferenceID bigint = NULL\n ,@ObjectType smallint = 50\nAs\n\nbegin\n\nSet\
    \ NoCount ON\n```"
- fmt: "# 在 SSIS Catalog 中执行 SSIS 包\n\n以下 T-SQL 代码片段演示了如何在 SSIS Catalog 中初始化并执行一个\
    \ SSIS 包。\n\n```sql\n/* Call the catalog.create_execution stored procedure\n \
    \     to initialize execution location and parameters */\n  Exec catalog.create_execution\n\
    \   @package_name = @PackageName\n  ,@execution_id = @ExecutionID Output\n  ,@folder_name\
    \ = @FolderName\n  ,@project_name = @ProjectName\n  ,@use32bitruntime = @Use32BitRunTime\n\
    \  ,@reference_id = @ReferenceID\n\n/* Populate the @ExecutionID parameter for\
    \ OUTPUT */\n  Select @ExecutionID As Execution_Id\n\n/* Create a parameter (variable)\
    \ named @Sql */\n  Declare @logging_level smallint\n   /* Decode the Logging Level\
    \ */\n  Select @logging_level = Case\n                           When Upper(@LoggingLevel)\
    \ = 'BASIC'\n                           Then 1\n                           When\
    \ Upper(@LoggingLevel) = 'PERFORMANCE'\n                           Then 2\n  \
    \                          When Upper(@LoggingLevel) = 'VERBOSE'\n           \
    \                Then 3\n                           Else 0 /* 'None' */\n    \
    \                      End\n   /* Call the catalog.set_execution_parameter_value\
    \ stored\n      procedure to update the LOGGING_LEVEL parameter */\n  Exec catalog.set_execution_parameter_value\n\
    \    @ExecutionID\n   ,@object_type = @ObjectType\n   ,@parameter_name = N'LOGGING_LEVEL'\n\
    \   ,@parameter_value = @logging_level\n\n/* Call the catalog.start_execution\
    \ (self-explanatory) */\n  Exec catalog.start_execution\n    @ExecutionID\n\n\
    end\n\nGO\n```\n\n如果执行此脚本在您的 SSISDB 数据库实例中创建自定义架构和存储过程，可以使用 [Listing 2-3](#9781484200834_Ch02.xhtml#list3)\
    \ 中的语句进行测试。\n\n[**Listing 2-3**](#9781484200834_Ch02.xhtml#_list3). 测试 `SSISDB.custom.execute_catalog_package`\
    \ 存储过程\n\n```sql\nDeclare @ExecId bigint\nExec SSISDB.custom.execute_catalog_package\
    \ 'Chapter2','Chapter2','Chapter2.dtsx',\n@ExecId Output\n```\n\n## 添加数据捕获\n\n\
    `SSISDB.custom.execute_catalog_package` 存储过程可以通过稍作修改来创建一个*数据捕获*功能——这是 SSIS 2014\
    \ 中针对从 SSISDB 目录执行的包引入的一项新特性。向存储过程添加一些参数和 T-SQL，允许其执行 SSIS 包并导出一个逗号分隔值 (CSV) 文件，该文件包含流经数据流任务中某个点的部分或全部行。数据捕获为监控数据在\
    \ SSIS 数据流中的移动状态提供了一个急需的窗口，有助于在生产环境中进行根本原因分析和故障排除，而无需更改包代码。数据捕获是 Integration Services\
    \ 2014 最重要的增强功能之一。[Listing 2-4](#9781484200834_Ch02.xhtml#list4) 包含了构建 `SSISDB.custom.execute_catalog_package_with_data_tap`\
    \ 的脚本：\n\n[**Listing 2-4**](#9781484200834_Ch02.xhtml#_list4). 用于构建在 SSIS 目录中执行\
    \ SSIS 包的包装器存储过程的脚本\n\n```sql\n/* Select the SSISDB database */\nUse SSISDB\n\
    Go\n\n/* Create a parameter (variable) named @Sql */\nDeclare @Sql varchar(2000)\n\
    \n/* Create the Custom schema if it does not already exist */\nprint 'Custom Schema'\n\
    If Not Exists(Select name\n              From sys.schemas\nWhere name = 'custom')\n\
    \ begin\n   /* Create Schema statements must occur first in a batch */\n  print\
    \ ' - Creating custom schema'\n  Set @Sql = 'Create Schema custom'\n  Exec(@Sql)\n\
    \  print ' - Custom schema created'\n end\nElse\n print ' - Custom Schema already\
    \ exists.'\nprint ''\n\n/* Drop the Custom.execute_catalog_package_with_data_tap\n\
    \ Stored Procedure if it already exists */\nprint 'Custom.execute_catalog_package_with_data_tap\
    \ Stored Procedure'\n  If Exists(Select s.name + '.' +  p.name\n            From\
    \ sys.procedures p\n            Join sys.schemas s\n                On s.schema_id\
    \ = p.schema_id\n        Where s.name = 'custom'\n           And p.name = 'execute_catalog_package_with_data_tap')\n\
    \   begin\n    print ' - Dropping custom.execute_catalog_package_with_data_tap'\n\
    \    Drop Procedure custom.execute_catalog_package_with_data_tap\n    print '\
    \ - Custom.execute_catalog_package_with_data_tap dropped'\n   end\n\n/* Create\
    \ the Custom.execute_catalog_package_with_data_tap Stored Procedure */\n  print\
    \ ' - Creating custom.execute_catalog_package_with_data_tap'\ngo\n\n/*\n\nStored\
    \ Procedure: custom.execute_catalog_package_with_data_tap\n  Author: Andy Leonard\n\
    \  Date: 4 Apr 2012\n  Description: Creates a wrapper around the SSISDB Catalog\
    \ procedures\n               used to start executing an SSIS Package and create\
    \ a\n               data tap. Packages in the\n               SSIS Catalog are\
    \ referenced by a multi-part identifier\n               - or path - that consists\
    \ of the following hierarchy:\n  Catalog Name: Implied by the database name in\
    \ Integration Server 2014\n  |-Folder Name: A folder created before or at Deployment\
    \ to contain the SSIS project\n    |-Project Name: The name of the SSIS Project\
    \ deployed\n      |-Package Name: The name(s) of the SSIS Package(s) deployed\n\
    \  Parameters:\n   @FolderName [nvarchar(128)] {No default} - contains the name\
    \ of the\n     Folder that holds the SSIS Project\n   @ProjectName [nvarchar(128)]\
    \ {No default} - contains the name of the\n    SSIS Project that holds the SSIS\
    \ Package\n   @PackageName [nvarchar(260)] {No default} - contains the name of\
    \ the\n    SSIS Package to be executed\n   @ExecutionID [bigint] {Output} - Output\
    \ parameter (variable) passed back\n    to the caller\n   @LoggingLevel [varchar(16)]\
    \ {Default} - contains the (case-insensitive)\n    name of the logging level to\
    \ apply to this execution instance\n   @Use32BitRunTime [bit] {Default} - 1 ==\
    \ Use 64-bit run-time\n                                      0 == Use 32-bit run-time\n\
    \   @ReferenceID [bigint] {Default} - contains a reference to an Execution Environment\n\
    \   @ObjectType [smallint] - contains an identifier that appears to be related\n\
    \    to the SSIS PackageType property\n\nGuessing: @ObjectType == PackageType.ordinal\
    \ (1-based-array) * 10\n    Must be 20, 30, or 50 for catalog.set_execution_parameter_value\n\
    \     stored procedure\n  @DataFlowTaskName [nvarchar(255)] - contains the name\
    \ of the Data Flow Task in which to\n   to apply the data tap.\n  @IdentificationString\
    \ [nvarchar(255)] - contains the Data Flow Path Identification string\n   in which\
    \ to apply the data tap.\n  @DataTapFileName [nvarchar(4000)] - contains the name\
    \ of the file to create to contain\n   the rows captured from the data tap.\n\
    \   Saved in the <drive>:\\Program Files\\Microsoft SQL Server\\120\\DTS\\DataDumps\
    \ folder.\n  @DataTapMaxRows [int] - contains the maximum number of rows to send\
    \ to the data tap file.\n\nTest:\n  1. Create and deploy an SSIS Package to the\
    \ SSIS Catalog.\n  2. Exec custom.execute_catalog_package_with_data_tap and pass\
    \ it the\n     following parameters: @FolderName, @ProjectName, @PackageName,\n\
    \     @DataFlowTaskName, @IdentificationString, @DataTapFileName,\n     @ExecutionID\
    \ Output\n  @LoggingLevel, @Use32BitRunTime, @ReferenceID, @ObjectType,\n   and\
    \ @DataTapMaxRows are optional and defaulted parameters.\n\nExample:\n  Declare\
    \ @ExecId bigint\n  Exec custom.execute_catalog_package_with_data_tap\n   'SSISConfig2014','SSISConfig2014','Child1.dtsx',\n\
    \   'Data Flow Task', 'OLESRC Temperature.OLE DB Source Output',\n   'Child1_DataFlowTask_OLESRCTemperature_OLEDBSourceOutput.csv',@ExecId\
    \ Output\n\n3. When execution completes, an Execution_Id value should be returned.\n\
    \     View the SSIS Catalog Reports to determine the status of the\n     execution\
    \ instance and the test.\n\n*/\nCreate Procedure [custom].[execute_catalog_package_with_data_tap]\n\
    \  @FolderName nvarchar(128)\n ,@ProjectName nvarchar(128)\n ,@PackageName nvarchar(260)\n\
    \ ,@DataFlowTaskName nvarchar(255)\n ,@IdentificationString nvarchar(255)\n ,@DataTapFileName\
    \ nvarchar(4000)\n ,@ExecutionID bigint Output\n ,@LoggingLevel varchar(16) =\
    \ 'Basic'\n ,@Use32BitRunTime bit = 0\n ,@ReferenceID bigint = NULL\n ,@ObjectType\
    \ smallint = 50\n ,@DataTapMaxRows int = NULL\nAs\n\nbegin\n\nSet NoCount ON\n\
    ```"
  raw: '/* Call the catalog.create_execution stored procedure

          to initialize execution location and parameters */

      Exec catalog.create_execution

       @package_name = @PackageName

      ,@execution_id = @ExecutionID Output

      ,@folder_name = @FolderName

      ,@project_name = @ProjectName

      ,@use32bitruntime = @Use32BitRunTime

      ,@reference_id = @ReferenceID


    /* Populate the @ExecutionID parameter for OUTPUT */

      Select @ExecutionID As Execution_Id


    /* Create a parameter (variable) named @Sql */

      Declare @logging_level smallint

       /* Decode the Logging Level */

      Select @logging_level = Case

                               When Upper(@LoggingLevel) = ''BASIC''

                               Then 1

                               When Upper(@LoggingLevel) = ''PERFORMANCE''

                               Then 2

                                When Upper(@LoggingLevel) = ''VERBOSE''

                               Then 3

                               Else 0 /* ''None'' */

                              End

       /* Call the catalog.set_execution_parameter_value stored

          procedure to update the LOGGING_LEVEL parameter */

      Exec catalog.set_execution_parameter_value

        @ExecutionID

       ,@object_type = @ObjectType

       ,@parameter_name = N''LOGGING_LEVEL''

       ,@parameter_value = @logging_level


    /* Call the catalog.start_execution (self-explanatory) */

      Exec catalog.start_execution

        @ExecutionID


    end


    GO

    ```


    If you execute this script to create the custom schema and stored procedure in
    your instance of the SSISDB database, you can test it using the statement in [Listing
    2-3](#9781484200834_Ch02.xhtml#list3).


    [***Listing 2-3***](#9781484200834_Ch02.xhtml#_list3). Testing the SSISDB.custom.execute_catalog_package
    Stored Procedure


    ```

    Declare @ExecId bigint

    Exec SSISDB.custom.execute_catalog_package ''Chapter2'',''Chapter2'',''Chapter2.dtsx'',

    @ExecId Output

    ```


    Adding a Data Tap


    The `SSISDB.custom.execute_catalog_package` stored procedure can be modified slightly
    to create a *data tap*— a new feature for packages executed from the SSISDB Catalog
    in SSIS 2014. Adding a few parameters and some T-SQL to the stored procedure allows
    it to execute an SSIS package and export a comma-separated values (CSV) file filled
    with some or all of the rows that flowed through a point in a Data Flow task.
    Data taps provide a much-needed window on the state of data as they move through
    an SSIS data flow, facilitating root-cause analysis and troubleshooting in production
    environments without altering the package code. Data taps are one of the most
    important enhancements to Integration Services 2014\. [Listing 2-4](#9781484200834_Ch02.xhtml#list4)
    contains the script to build `SSISDB.custom.execute_catalog_package_with_data_tap`:


    [***Listing 2-4***](#9781484200834_Ch02.xhtml#_list4). Script to Build a Wrapper-Stored
    Procedure for Executing SSIS Packages in the SSIS Catalog


    ```

    /* Select the SSISDB database */

    Use SSISDB

    Go


    /* Create a parameter (variable) named @Sql */

    Declare @Sql varchar(2000)


    /* Create the Custom schema if it does not already exist */

    print ''Custom Schema''

    If Not Exists(Select name

                  From sys.schemas

    Where name = ''custom'')

     begin

       /* Create Schema statements must occur first in a batch */

      print '' - Creating custom schema''

      Set @Sql = ''Create Schema custom''

      Exec(@Sql)

      print '' - Custom schema created''

     end

    Else

     print '' - Custom Schema already exists.''

    print ''''


    /* Drop the Custom.execute_catalog_package_with_data_tap

     Stored Procedure if it already exists */

    print ''Custom.execute_catalog_package_with_data_tap Stored Procedure''

      If Exists(Select s.name + ''.'' +  p.name

                From sys.procedures p

                Join sys.schemas s

                    On s.schema_id = p.schema_id

            Where s.name = ''custom''

               And p.name = ''execute_catalog_package_with_data_tap'')

       begin

        print '' - Dropping custom.execute_catalog_package_with_data_tap''

        Drop Procedure custom.execute_catalog_package_with_data_tap

        print '' - Custom.execute_catalog_package_with_data_tap dropped''

       end


    /* Create the Custom.execute_catalog_package_with_data_tap Stored Procedure */

      print '' - Creating custom.execute_catalog_package_with_data_tap''

    go


    /*


    Stored Procedure: custom.execute_catalog_package_with_data_tap

     Author: Andy Leonard

     Date: 4 Apr 2012

     Description: Creates a wrapper around the SSISDB Catalog procedures

                  used to start executing an SSIS Package and create a

                  data tap. Packages in the

                  SSIS Catalog are referenced by a multi-part identifier

                  - or path - that consists of the following hierarchy:

      Catalog Name: Implied by the database name in Integration Server 2014

      |-Folder Name: A folder created before or at Deployment to contain the SSIS
    project

        |-Project Name: The name of the SSIS Project deployed

          |-Package Name: The name(s) of the SSIS Package(s) deployed

     Parameters:

       @FolderName [nvarchar(128)] {No default} - contains the name of the

         Folder that holds the SSIS Project

       @ProjectName [nvarchar(128)] {No default} - contains the name of the

        SSIS Project that holds the SSIS Package

       @PackageName [nvarchar(260)] {No default} - contains the name of the

        SSIS Package to be executed

       @ExecutionID [bigint] {Output} - Output parameter (variable) passed back

        to the caller

       @LoggingLevel [varchar(16)] {Default} - contains the (case-insensitive)

        name of the logging level to apply to this execution instance

       @Use32BitRunTime [bit] {Default} - 1 == Use 64-bit run-time

                                          0 == Use 32-bit run-time

       @ReferenceID [bigint] {Default} - contains a reference to an Execution Environment

       @ObjectType [smallint] - contains an identifier that appears to be related

        to the SSIS PackageType property


    Guessing: @ObjectType == PackageType.ordinal (1-based-array) * 10

        Must be 20, 30, or 50 for catalog.set_execution_parameter_value

         stored procedure

     @DataFlowTaskName [nvarchar(255)] - contains the name of the Data Flow Task in
    which to

       to apply the data tap.

     @IdentificationString [nvarchar(255)] - contains the Data Flow Path Identification
    string

       in which to apply the data tap.

     @DataTapFileName [nvarchar(4000)] - contains the name of the file to create to
    contain

       the rows captured from the data tap.

       Saved in the <drive>:\Program Files\Microsoft SQL Server\120\DTS\DataDumps
    folder.

     @DataTapMaxRows [int] - contains the maximum number of rows to send to the data
    tap file.


    Test:

      1\. Create and deploy an SSIS Package to the SSIS Catalog.

      2\. Exec custom.execute_catalog_package_with_data_tap and pass it the

         following parameters: @FolderName, @ProjectName, @PackageName,

         @DataFlowTaskName, @IdentificationString, @DataTapFileName,

         @ExecutionID Output

      @LoggingLevel, @Use32BitRunTime, @ReferenceID, @ObjectType,

       and @DataTapMaxRows are optional and defaulted parameters.


    Example:

      Declare @ExecId bigint

      Exec custom.execute_catalog_package_with_data_tap

       ''SSISConfig2014'',''SSISConfig2014'',''Child1.dtsx'',

       ''Data Flow Task'', ''OLESRC Temperature.OLE DB Source Output'',

       ''Child1_DataFlowTask_OLESRCTemperature_OLEDBSourceOutput.csv'',@ExecId Output


    3\. When execution completes, an Execution_Id value should be returned.

         View the SSIS Catalog Reports to determine the status of the

         execution instance and the test.


    */

