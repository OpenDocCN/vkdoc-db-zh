- fmt: '# Incremental Loads in SSIS


    Microsoft SQL Server，以及SSIS本身，提供了多种工具和方法来管理增量数据加载。本节讨论围绕以下工具的设计模式：


    *   原生SSIS组件（`Lookup`转换、条件拆分等）

    *   缓慢变化维度向导

    *   T-SQL中的`MERGE`语句

    *   变更数据捕获（`CDC`）


    这些工具在正确使用时都是有效的，尽管有些比其他工具更适合不同的场景。我们现在将逐步介绍使用每种工具的设计模式。


    ## Native SSIS Components


    我们将探讨的第一个增量加载模式是使用SSIS内的原生组件来执行加载。通过使用查找（`lookup`）、条件拆分（`conditional split`）和`OLE
    DB`命令组件，我们可以创建一个简单的数据路径，通过该路径可以处理来自源系统的新数据和更改数据。


    采用这种设计模式是使用SSIS执行增量加载的最常见方式之一。因为此模式中使用的所有组件自2005年SSIS推出以来就已存在，所以它是一种非常成熟且经过时间考验的方法。在我们将要探索的所有增量方法中，这无疑是最灵活的。如果配置得当，它的性能相当不错。这也是外部依赖最少的设计模式；几乎任何数据都可以用作源，它不需要启用`CDC`等数据库引擎功能，也不需要安装任何第三方组件。


    ### The Moving Parts


    当你使用这种设计模式时，最常见的操作将包括以下步骤：


    1.  从数据源提取数据。如果使用多个源，可以使用适当的连接组件（`Merge`、`Merge Join`或`Union All`转换）将它们合并在一起。

    2.  使用`Lookup`转换，基于业务键（`business key(s)`）将源数据与目标表连接。

    3.  将更改的行路由到目标表。步骤2中未匹配的行然后可以直接使用适当的数据库目标组件路由到目标表。

    4.  对于在目标表中具有业务键匹配的源行，比较其他可能更改的值。如果这些源值中的任何一个与目标表中该行的值不同，则目标表中的这些行将使用新值进行更新。


    [Figure 11-1](#9781484200834_Ch11.xhtml#Fig1) 显示了这些操作的典型数据流设计。在第一个标注中，您可以看到我们需要在`Lookup`转换上将选项设置为“将行重定向到无匹配输出”。使用此设置时，任何未解析为目标表中现有行的源行都将沿着替代路径发送——在本例中，直接发送到目标表。


    ![9781484200834_Fig11-01.jpg](images/9781484200834_Fig11-01.jpg)


    **Figure 11-1.** 使用原子SSIS组件进行增量加载


    接下来，我们将对匹配的行应用`Conditional Split`转换。如[Figure 11-1](#9781484200834_Ch11.xhtml#Fig1)左下角所示，我们将使用一点SSIS表达式语言来比较源和目标之间的等效列。任何完全匹配的行将不会进行进一步的处理（尽管如果您想捕获未采取任何操作的源行计数，可以将它们发送到`Row
    Count`转换）。


    最后，那些匹配了业务键但未匹配后续属性值的行将被发送到`OLE DB Command`转换。[Figure 11-1](#9781484200834_Ch11.xhtml#Fig1)右下角的代码显示了SQL代码片段，我们通过它对目标表中的每一行执行参数化更新。需要注意的是，`OLE
    DB Command`转换对目标表执行逐行更新。您可以如图所示利用此模式，因为大多数增量操作主要涉及新行，更新远少于插入。但是，如果特定实现需要处理非常大量的数据，或者您的数据分析表明更新的比例很高，请考虑修改此设计模式，将那些需要更新的行发送到暂存表，在那里可以通过基于集合的操作更高效地处理。


    ### Typical Uses


    如前所述，这种增量加载设计模式非常有用且成熟。当您处理非关系源数据，或者无法在处理前对传入数据进行暂存时，此模式特别适用。这通常是增量加载的首选设计，并且它能相当好地适应大多数此类场景。


    请务必记住，由于我们是在SSIS内执行业务键查找和列等效性测试，因此将数据导入SSIS内存空间然后对数据执行所述操作会产生一些资源成本。因此，如果特定实现涉及非常大量的数据，并且源数据已在SQL
    Server数据库中（或可以暂存到其中），那么其他设计模式（如稍后将介绍的T-SQL `MERGE`操作）可能是更好的选择。


    以下小节描述了增量加载模式的组件及其各自的配置选项。


    ### Lookup Caching Options


    在执行查找操作时，您需要考虑可用于管理查找缓存的许多选项。根据您处理的数据量，以下缓存设计模式之一可能有助于减少性能瓶颈。


    **Table Cache**


    在需要查找操作的数据流任务执行之前，会填充用于查找的表缓存。SSIS可以根据需要使用执行SQL任务创建和删除该表。它可以通过执行SQL任务或数据流任务来填充。大多数时候，构建表缓存所需的数据在本地位于目标，并包含来自目标的数据，因此我经常在执行SQL任务中使用T-SQL来填充它。


    您可以通过使用截断并加载（`truncate-and-load`）来维护表缓存。但是，对于较大的查找数据集，您可能希望考虑使用增量加载技术来维护表缓存。这听起来可能有些过头，但当您需要针对包含十亿行表的查找时（这种情况会发生，请相信我），增量方法就开始变得有意义了。


    **Cache Transformation and Cache Connection Manager**'
  raw: 'In such cases, the same methodology used for SCD data may also apply to fact
    data. However, pay careful consideration to performance when applying SCD methods
    to fact data. Fact data is exponentially more voluminous than dimension data and
    typically involves millions, and sometimes billions, of records. Therefore, apply
    the SCD pattern to fact data only if you must. If there’s any flexibility at all
    in the data warehouse (DW) design, use the delta record approach instead.


    Incremental Loads in SSIS


    Microsoft SQL Server, and SSIS specifically, have several tools and methodologies
    available for managing incremental data loads. This section discusses design patterns
    around the following vehicles:


    *   Native SSIS components (Lookup transform, conditional split, etc.)

    *   Slowly Changing Dimension Wizard

    *   `MERGE` statement in T-SQL

    *   Change data capture (CDC)


    Each of these tools is effective when used properly, though some are better suited
    than others for different scenarios. We’ll now step through the design patterns
    with each of these.


    Native SSIS Components


    The first incremental load pattern we’ll explore is that of using native components
    within SSIS to perform the load. Through the use of lookups, conditional splits,
    and OLE DB command components, we can create a simple data path through which
    we can processes new and changed data from our source system(s).


    Employing this design pattern is one of the most common ways to perform an incremental
    load using SSIS. Because all of the components used in this pattern have been
    around since SSIS was introduced in 2005, it’s a very mature and time-tested methodology.
    Of all of the incremental methodologies we’ll explore, this is certainly the most
    flexible. When properly configured, it can perform reasonably well. This is also
    the design pattern with the fewest external dependencies; almost any data can
    be used as a source, it does not require database engine features such as CDC
    to be enabled, and it does not require any third-party components to be installed.


    The Moving Parts


    When you are using this design pattern, the most common operations you will perform
    will include the following steps:


    1.  Extract data from the data source(s). If more than one source is used, they
    can be brought together using the appropriate junction component (Merge, Merge
    Join, or Union All transforms).

    2.  Using the Lookup transform, join the source data with the target table based
    on the business key(s).

    3.  Route changed rows to the target table. Unmatched rows from the step 2 can
    then be routed directly to the target table using the appropriate database destination
    component.

    4.  For the source rows that have a business key match in the target table, compare
    the other values that may change. If any of those source values differs from the
    value found for that row in the destination table, those rows in the destination
    table will be updated with the new values.


    [Figure 11-1](#9781484200834_Ch11.xhtml#Fig1) shows a typical data flow design
    for these operations. In the first callout, you can see that we need to set the
    option on the Lookup transform to Redirect Rows to No Match Output. When you use
    this setting, any source rows that are not resolved to an existing row in the
    destination table are sent down an alternate path—in this case, directly to the
    destination table.


    ![9781484200834_Fig11-01.jpg](images/9781484200834_Fig11-01.jpg)


    [Figure 11-1](#9781484200834_Ch11.xhtml#_Fig1). Incremental load using atomic
    SSIS components


    Next, we’ll apply the Conditional Split transform to the matched rows. As shown
    in the snippet on the lower left of [Figure 11-1](#9781484200834_Ch11.xhtml#Fig1),
    we’ll use a bit of the SSIS expression language to compare equivalent columns
    between source and destination. Any rows with an exact match will not go through
    any further processing (though you could send them to a Row Count transform if
    you want to capture the count of source rows with no action taken).


    Finally, the rows that matched the business key but not the subsequent attribute
    values will be sent to the OLE DB Command transform. The code on the lower right
    in [Figure 11-1](#9781484200834_Ch11.xhtml#Fig1) shows a snippet of the SQL code
    in which we perform a parameterized update of each row in the destination table.
    It is important to note that the OLE DB Command transform performs a row-by-row
    update against the target table. You can typically leverage this pattern as shown
    because most incremental operations are heavy on new rows and have far fewer updates
    than inserts. However, if a particular implementation requires the processing
    of a very large amount of data, or if your data exploration indicates that the
    number of updates is proportionally high, consider modifying this design pattern
    to send those rows meant for update out to a staging table where they can be more
    efficiently processed in a set-based operation.


    Typical Uses


    As mentioned previously, this incremental load design pattern is quite useful
    and mature. This pattern fits especially well when you are dealing with nonrelational
    source data, or when it’s not possible to stage incoming data before processing.
    This is often the go-to design for incremental loads, and it fits most of this
    type of scenario reasonably well.


    Make sure you keep in mind that, because we’re performing the business key lookup
    and the column equivalency tests within SSIS, some resource costs are associated
    with getting the data into the SSIS memory space and then performing said operations
    against the data. Therefore, if a particular implementation involves a very large
    amount of data, and the source data is already in a SQL Server database (or could
    be staged there), another design pattern such as the T-SQL `MERGE` operation (to
    be covered shortly) might be a better option.


    The following subsections describe components of the incremental load pattern
    and configuration options for each.


    Lookup Caching Options


    When performing lookup operations, you want to consider the many options available
    for managing lookup caching. Depending on the amount of data you’re dealing with,
    one of the following caching design patterns may help reduce performance bottlenecks.


    Table Cache


    A table cache for lookups is populated prior to executing a Data Flow task that
    requires the lookup operation. SSIS can create and drop the table as needed using
    Execute SQL tasks. It can be populated via the Execute SQL task or a Data Flow
    task. Most of the time, the data I need to build a table cache is local to the
    destination and contains data from the destination, so I often use T-SQL in an
    Execute SQL task to populate it.


    You can maintaining the table cache by using truncate-and-load. However, for larger
    sets of lookup data, you may wish to consider maintaining the table cache using
    incremental load techniques. This may sound like overkill, but when you need to
    perform a lookup against a billion-row table (it happens, trust me), the incremental
    approach starts to make sense.


    Cache Transformation and Cache Connection Manager'
