  trans: '

    ### 为何使用表达式？


    *   **求值**：你可以使用表达式来判断指定条件是否为真，并据此相应地更改包的行为。当作为控制流的一部分使用时，用作求值的表达式可能会检查某个值，并基于该比较的结果动态改变执行路径。在数据流内部，表达式允许你逐行评估数据，以决定在
    ETL 中如何继续处理。

    *   **赋值**：除了将表达式用作决策元素外，你还可以使用 SSIS 表达式在包执行期间以编程方式修改数据。通常，你可以将它们用作基于表达式的属性设置，并在数据流内部转换正在处理中的数据。


    SSIS 中的表达式可以从多个方面派生其比较或赋值。内置系统变量允许你查看软件环境数据，例如包和容器的启动时间、计算机环境信息、包版本元数据等。你可以通过表达式查询和操作用户定义的
    SSIS 变量的值，并访问包参数的值以在包执行期间的其他地方加以利用。在数据流中，表达式可以在单元格级别与运行中的数据进行交互。


    表达式在运行时是值驱动的。与通常仅在设计时可配置的设置（想象数据流列定义）不同，表达式会在包实际执行时计算其值。此外，在包的执行生命周期内，单个表达式可能会被多次求值（每次结果可能不同）。考虑
    `ForEach Loop` 的情况，这是一个循环遍历指定对象集合或值直到该集合末尾的容器。在循环内被操作的表达式在此过程中可能会被更新数十次甚至数百次。


    使用表达式的能力是 SQL Server Integration Services 的最大优势之一。简而言之，表达式有助于填补细小的空白。表达式语言本身并非一个工具，而是一个接口，有助于其他
    SSIS 工具更有效地履行各自的职能。这固然很好，但为了简单起见，为什么 ETL 开发者会选择使用表达式语言，而不是其他语言如 T-SQL、C#或 VB.NET
    呢？以下是在你的 SSIS 包中使用表达式语言的一些令人信服的理由：


    *   **简单性**：表达式语言可用于在数据流中快速添加流程逻辑或对流水线中的数据进行小的更改。你通常可以处理那些原本可能需要交给脚本任务或组件的小型 ETL
    更改，而无需向包中引入额外的代码。

    *   **一致性**：使用表达式语言可以为数据或程序流挑战带来一致的处理方法。例如，如果你的 ETL 要求将空字符串转换为 ``NULL``，那么对于平面文件、Access
    数据库和关系数据库源，其方法和语法原本会有所不同。通过对同一任务应用表达式语言，你可以依靠表达式语言中内置的字符串操作函数，减少需要编写的独立代码量。

    *   **维护范围**：通过应用使用表达式语言处理清洗需求的设计模式，你可以消除大量需要追踪和更改清洗规则的工作，以适应业务期望的变化。在包本身中使用表达式为你提供了单一的维护点，而不必强迫你在每次需要更改时都去检查上游数据源。


    我曾为 SSIS 新手开发者做过多次演示，当我提到表达式语言这个话题时，似乎总会出现一个问题：“我在哪里使用这个表达式语言的东西？”我的回答是：“任何地方！”表达式之美的部分在于，它们几乎可以在
    SSIS 包中的任何地方使用。你可以在控制流的优先级约束上使用表达式。用表达式替换静态值来使你的 SSIS 包变量动态化是很方便的。你可以在数据流内部利用表达式来操作数据，甚至控制执行路径。归根结底，你可以通过使用表达式来操作包、任务、约束和数据流元素的许多常见属性。


    尽管其语法可能看起来不寻常，但表达式语言并不难学。任何有逻辑脚本经验的人（即使仅限于 T-SQL 经验）都能快速掌握基础知识，并且应该能够通过合理数量的练习来掌握这门语言。


    ### 语言基础


    即使对于那些有其他 Microsoft 开发环境脚本编写经验的人来说，初次接触 SSIS 表达式语言也可能有点不适应。其语法和功能不同于任何其他语言，无论是解释型还是编译型。它看起来像是几种语言的奇怪混合体，并且无疑是一种独特的方言。


    花时间使用 C 风格语言（C、C++、C#、Java）的开发者会认识到表达式语言中的一些语法细微差别：


    *   区分大小写的列名和变量名

    *   区分大小写的字符串比较

    *   双等号 (`==`) 比较运算符

    *   简化的条件（`if`/`then`/`else`）运算符


    同样，任何熟悉 T-SQL 的人都会在 SSIS 表达式语言中发现大量相似的行为：


    *   不区分大小写的函数名

    *   与 T-SQL 中非常相似的日期算术和字符串操作函数


    SSIS 表达式语言功能相当强大，拥有各种各样的函数和运算符。其原生行为包括相等测试、类型转换、字符串操作和日期算术，因此在 SSIS 包中使用表达式可以帮助克服大大小小的
    ETL 挑战。


    ### 局限性


    尽管表达式语言非常有用，但在使用上存在一些关键限制。请记住，这些都是相对较小的障碍；SSIS 表达式语言并非旨在成为一个功能齐全的编程语言，而是一个轻量级工具，用于补充现有
    SSIS 任务和组件的行为。其中的一些挑战包括：

    '
- fmt: "## Expressions are limited to single-value statements\nThis almost goes without\
    \ saying since it’s an expression language and not a programming language. Still,\
    \ it’s worth mentioning that you can’t, for example, use a single expression to\
    \ iterate through a list or process a string character-by-character.\n\n## No\
    \ IntelliSense\nUnlike other scripting/expression environments, there is no built-in\
    \ IntelliSense within the native expression editors. Although the expression editor\
    \ in SSIS does have field, variable, and function lists, the convenience and coding\
    \ reliability of IntelliSense has not yet made it into the product.\n\n## No error\
    \ handling\nThis limitation is most visible when you attempt to change data type\
    \ or length. Because there is no `try/catch` or `TryParse()` behavior found in\
    \ the .NET-based languages, you cannot, for example, attempt to cast a text value\
    \ to a number and programmatically handle any type cast errors in the same expression.\n\
    \n## No comments allowed\nThe fact that there is no provision for code comments\
    \ can be a significant downside when you are using lengthy or complex expressions.\
    \ Any comments documenting the purpose of the expression have to be done peripherally—for\
    \ example, on the data flow or control flow surface as an SSIS annotation.\n\n\
    ### Complex statements can be difficult\nSimple assignments or comparisons are\
    \ easy to do and are usually easy to understand after the fact. However, introducing\
    \ even a moderate amount of complexity to an expression can make for a lengthy\
    \ and convoluted statement. Consider the case of a multiconditional If statement.\
    \ In most other dialects, one could simply perform an If/Then/Else If operation\
    \ to account for more than one test condition. However, the expression language\
    \ doesn’t have such behavior, so to build such logic you need to nest conditional\
    \ operators. [Listing 10-1](#9781484200834_Ch10.xhtml#list1) shows how you might\
    \ easily address four possible conditions in a `CASE` operation in Transact-SQL.\
    \ By contrast, [Listing 10-2](#9781484200834_Ch10.xhtml#list2) shows a similar\
    \ example using the expression language (note that I manually wrapped the text\
    \ to fit it on the page). Although the result of the operation is the same, the\
    \ latter has conditional operators nested two levels deep and is more difficult\
    \ to develop and maintain.\n\n[***Listing 10-1***](#9781484200834_Ch10.xhtml#_list1).\
    \ Multiconditional Evaluation in T-SQL\n\n```\nSELECT CASE WHEN @TestCase = 3\
    \ THEN 'Test case = Solid'\n            WHEN @TestCase = 2 THEN 'Test case = Liquid'\n\
    \            WHEN @TestCase = 1 THEN 'Test case = Gas'\n            ELSE 'Unknown\
    \ test case' END [TestCaseType]\n```\n\n[***Listing 10-2***](#9781484200834_Ch10.xhtml#_list2).\
    \ Multiconditional Evaluation in the Expression Language\n\n```\n(TestCase ==\
    \ 1) ? \"Test case = Gas\" : (TestCase == 2 ? \"Test case = Liquid\" : (TestCase\
    \ == 3 ? \"Test case = Solid\" : \"Unknown Test Case\"))\n```\n\nDespite its minor\
    \ shortcomings, the SSIS expression language remains an integral part of the product,\
    \ and as you’ll see later in this chapter, it has some very practical uses in\
    \ a well-designed ETL ecosystem.\n\n## Putting the Expression Language to Work\n\
    Now that you understand what the expression language is (and is not), let’s talk\
    \ about some design patterns where you might use it.\n\n### Package Expressions\n\
    Although not as common as other uses, it is possible to use SSIS expressions to\
    \ configure package-level properties. Here are a handful of properties that may\
    \ be set at the package level by using expressions:\n\n*   `Disable`\n*   `DisableEventHandlers`\n\
    *   `CheckpointFileName`\n*   `MaxConcurrentExecutables`\n*   `DelayValidation`\n\
    *   `Description`\n\nConsider the example of `MaxConcurrentExecutables`, which\
    \ defines how many executables (packages, tasks, etc.) can run concurrently. By\
    \ setting this property through an expression, the ETL developer would be able\
    \ to dynamically control this value based on any criteria visible through an expression.\n\
    \nAlthough these properties are configurable by using expressions, it’s far more\
    \ common to find package-level options set by using package parameters (with later\
    \ versions of SSIS) or package configurations (SQL Server 2008 and earlier). It\
    \ is usually best to share common values across package ancestries using parameters\
    \ or configurations, which allow you greater flexibility and easier maintenance.\
    \ I expose this particular design pattern more for the purpose of identifying\
    \ it as an antipattern than for defining parameters for its use. Unless there’s\
    \ some business case or regulation dictating otherwise, it’s a better long-term\
    \ solution to externalize these values rather than rely on expressions.\n\n###\
    \ Variable Expressions\nAs shown in [Figure 10-1](#9781484200834_Ch10.xhtml#Fig1),\
    \ you can configure each variable with a static value in the Value field or define\
    \ a value expression that will be evaluated at runtime. Note that the variable\
    \ window was improved starting in SQL Server 2012—in older versions, static values\
    \ were shown in the Variable window, but you had to use the Properties window\
    \ to view or alter an expression for a variable.\n\n![9781484200834_Fig10-01.jpg](images/9781484200834_Fig10-01.jpg)\n\
    \n[Figure 10-1](#9781484200834_Ch10.xhtml#_Fig1). Expressions with variables\n\
    \nIn practice, I often see expressions applied to variable values, and then the\
    \ resulting variable is used as a property on a task or component (as opposed\
    \ to it being used as an expression to set the property directly). I’m a fan of\
    \ this design pattern for one simple reason: reusability. It’s not uncommon for\
    \ components to share certain properties, and building expressions on each of\
    \ those shared properties for every applicable component is both redundant and\
    \ unnecessary. For those properties that will be shared across multiple tasks\
    \ or components, it’s far easier to centralize the expression logic into a variable\
    \ and then use that variable to set the shared properties. This approach allows\
    \ for faster development as well as easier maintenance should the logic require\
    \ changes down the road.\n\nWhen using this design pattern, don’t forget that\
    \ you can also “stack” variable values. In the expression statement, you can leverage\
    \ other variables to set the value of the current variable.\n\n### Connection\
    \ Managers\nOne of the most practical and common places to use SSIS expressions\
    \ is the Connection Managers tray. Generally speaking, it’s typically preferable\
    \ to store dynamic connection properties not in expressions, but rather as parameters,\
    \ particularly when you’re dealing with structured data. Because of the sensitive\
    \ and frequently changing nature of connection metadata (server names, user names,\
    \ and passwords), most ETL professionals choose to externalize those settings\
    \ to keep them stored securely and externally to the package so they can be globally\
    \ changed (rather than modified package by package).\n\nOne recurring exception\
    \ to this pattern is connections that interact with the file system. There are\
    \ several cases where using expressions helps to lighten the load of processing\
    \ file-based sources or destinations:\n\n*   When working with flat files, the\
    \ files are to be named according to the current date and/or time stamp (such\
    \ as `Medicare_2014_06_01.txt`, for example).\n*   The files are expected to be\
    \ filed in the file system according to the date (such as `D:\\Data\\2014\\06\\\
    01\\Medicare.txt`).\n*   A scheduled job loads a text file that always has the\
    \ same file name, but a copy of each day’s file needs to be saved without overwriting\
    \ the file processed on the previous day."
