    As shown in [Figure 7-7](#9781484200834_Ch07.xhtml#Fig7), when you click on the
    Mappings page to begin this mapping, auto-mapping kicks in and finds it can auto-complete
    some of the mappings:


    ![9781484200834_Fig07-07.jpg](images/9781484200834_Fig07-07.jpg)


    [Figure 7-7](#9781484200834_Ch07.xhtml#_Fig7). OLE DB destination auto-mapping


    One issue is that these fields don’t contain the data you want to load. You want
    to load the derived columns instead. There a couple ways to correct the mapping,
    but I like dragging and dropping the fields I *want* mapped to the columns where
    I wish them to be mapped. Since mapping is, by definition, field-to-field, the
    existing (auto-) mappings will be overwritten by the new. Try it! Drag the `strRecordType`
    field from Available Input Columns to the `RecordType` cell in Available Output
    Columns. See? The old mapping is updated. Now map `strName` to `Name` and `itnValue`
    to `Value`, as shown in [Figure 7-8](#9781484200834_Ch07.xhtml#Fig8):


    ![9781484200834_Fig07-08.jpg](images/9781484200834_Fig07-08.jpg)


    [Figure 7-8](#9781484200834_Ch07.xhtml#_Fig8). Overwriting the auto-mappings


    Click the OK button; you’re finished configuring the OLE DB destination adapter.
    Press the F5 key to execute the SSIS package in the SSDT debugger. Hopefully,
    your Data Flow task succeeds and appears as in [Figure 7-9](#9781484200834_Ch07.xhtml#Fig9).


    ![9781484200834_Fig07-09.jpg](images/9781484200834_Fig07-09.jpg)


    [Figure 7-9](#9781484200834_Ch07.xhtml#_Fig9). A successful data flow!


    In this introductory section, I’ve introduced concepts of staging and we built
    a pattern to stage data from a flat file into a database table. Along the way,
    we delved into some data warehousing thinking and peeked under the hood of the
    Data Flow task. Next up: loading another format of flat file—one with variable-length
    rows.


    Variable-Length Rows


    A variable-length row flat file is a text source file. It can be a comma-separated
    values (CSV) file or a tab-delimited file (TDF). It can be a fixed-length file
    where columns are identified positionally or by ordinal. The major difference
    between a “normal” flat file and a variable-length row flat file is that the number
    of text positions is fixed in a normal flat file, and that number can change with
    each row in a variable-length flat file.


    Let’s look at an example of a variable-length flat file:


    ```

    RecordType,Name1,Value1,Name2,Value2,Name3,Value3


    A,Multi One,11

    B,Multi Two,22,Multi Two A,23

    C,Multi Three,33,Multi Three A,34,Multi Three B,345

    A,Multi Four,44

    C,Multi Five,55,Multi Five A,56,Multi Five B,567

    B,Multi Six,66,Multi Six A,67

    ```


    There are seven potential columns: `RecordType`, `Name1`, `Value1`, `Name2`, `Value2`,
    `Name3`, and `Value3`. Not all rows contain seven values. In fact, the first row
    contains only three values:


    ```

    A, Multi One,11

    ```


    In this format, the `RecordType` is in the first column and this indicates how
    many columns of data to expect in the row. Rows of `RecordType A` contain three
    values, rows of `RecordType B` contain five values, and those of `RecordType C`
    contain seven values.


    Reading into a Data Flow


    It’s typical to load data from a flat file into an SSIS data flow using a Flat
    File connection manager. Let’s walk through configuring a Flat File connection
    manager for this file.


    If you want to sing along, add a new SSIS package named `VariableLengthRows.dtsx`
    to your SSIS project. Add a Data Flow task to the control flow and open the Data
    Flow Editor (tab). Drag a Flat File source adapter onto the Data Flow task canvas
    and open its editor. Click the New button to create a new Flat File connection
    manager.


    I named my Flat File connection manager **Variable-Length File**. I created a
    text file with the data from the example above and named it `VarLenRows.csv`.
    I saved it and browsed to that location for the `File Name` property. I also checked
    the Column Names in the First Data Row checkbox. When I click on the Columns page,
    the Flat File Connection Manager Editor appears as shown in [Figure 7-10](#9781484200834_Ch07.xhtml#Fig10).


    ![9781484200834_Fig07-10.jpg](images/9781484200834_Fig07-10.jpg)


    [Figure 7-10](#9781484200834_Ch07.xhtml#_Fig10). Configuring the Flat File connection
    manager for a flat file with variable-length rows


    This behavior is different from earlier editions of SSIS. In previous versions,
    the Flat File connection manager would raise an error. I blogged about this in
    a post entitled *SSIS Design Pattern: Loading Variable-Length Rows* (`http://sqlblog.com/blogs/andy_leonard/archive/2010/05/18/ssis-design-pattern-loading-variable-length-rows.aspx`).
    That post inspired this chapter.


    Splitting Record Types


    Thanks to the new functionality in the SSIS 2014 version of the Flat File connection
    manager, we have all the data coming in as separate rows. But the data rows contain
    information of different types. The rows need to be filtered based on record type.
    I can hear you thinking, “Great, Andy. Now what?” I’m glad you asked! Now we need
    to parse the data as it flows through the Data Flow task. There are a couple ways
    to approach this, but I like the conditional split.


    Drag a Conditional Split transformation onto the Data Flow task canvas and connect
    a data flow path from the Flat File source adapter to the conditional split. Open
    the editor for the transformation. In the `Output Name` column of the grid, enter
    **TypeA**. Into the corresponding `Condition`, drag (or type) the `RecordType`
    column, appending the text  **== “A”** (note that the “A” is in double-quotes).
    Repeat this for each record type, **== “B”** and **== “C”**, as shown in [Figure
    7-11](#9781484200834_Ch07.xhtml#Fig11).


    ![9781484200834_Fig07-11.jpg](images/9781484200834_Fig07-11.jpg)


    [Figure 7-11](#9781484200834_Ch07.xhtml#_Fig11). Configuring the Script component
    inputs


    Click the OK button to close the Conditional Split Transformation Editor. It is
    important to note that this would have required a Script component in earlier
    versions of SSIS because the Flat File connection manager in previous versions
    couldn’t parse files containing rows with a varying number of columns.


    Terminating the Streams


    You can use several data flow components to terminate a data flow path. In a production
    environment, this would likely be an OLE DB destination adapter. In a development
    or test environment, you may want to terminate with a component that doesn’t require
    database connectivity or database object creation.'
