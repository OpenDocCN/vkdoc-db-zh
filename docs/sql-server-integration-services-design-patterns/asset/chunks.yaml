  trans: '# 使用 DTEXEC 的参数


    用于运行 SSIS 包的命令行实用工具 (`DTEXEC`) 已更新，以支持项目和参数。`DTEXEC` 能够运行存储在 SSIS 项目文件 (`.ispac`)
    内的包，也能启动对存储在 SSIS 目录（本地或远程）中的包执行基于服务器的运行。两种模式使用不同的命令行开关来设置参数值，并在后续页面的独立章节中进行描述。


    **注意：** 当处理单个 SSIS 包文件 (`.dtsx`) 时，`DTEXEC` 的行为与 SQL Server 早期版本中的行为相同。有关 `DTEXEC`
    各种命令行选项的更多信息，请参阅其联机丛书条目：`http://msdn.microsoft.com/en-us/library/ms162810.aspx`。


    ## 文件系统上的项目


    尽管新的项目部署模型主要用于与 SSIS 目录配合使用，但也可以使用 `DTEXEC` 在项目文件内运行包。以这种方式运行的包由 `DTEXEC` 进程在本地执行。可以使用
    `/Set` 选项设置单个参数值，而 `/ConfigFile` 可用于从 2005/2008 风格的 XML 配置文件设置多个参数值。表 17-1 总结了与运行存储在文件系统上的项目中的包相关的选项。


    表 17-1. 用于使用项目文件 (`.ispac`) 的 `DTEXEC` 命令行选项


    | 参数 | 描述 |

    | --- | --- |

    | `Proj[ect]=*项目路径*` | 此选项提供 SSIS 项目文件 (`.ispac`) 的路径。<br>示例：`/Proj c:\demo\project.ispac`
    |

    | `Pack[age]=*包名称*` | 您想要运行的项目文件内的包的名称。该值应包含 `.dtsx` 扩展名。<br>示例：`/Pack MyPackage.dtsx`
    |

    | `Set=*参数名称;值*` | 此选项允许您为项目内的参数设置值。其语法类似于您在命令行上覆盖包变量值时使用的语法。使用 `$Project` 命名空间为项目作用域定义的参数设置值，使用
    `$Package` 为包作用域定义的参数设置值。<br>示例：`/Set=\Package.Variables[$Project::IntParameter];1`
    |

    | `Conf[igFile]=*文件路径*` | 此选项允许您从 XML 配置文件设置多个参数值。每个参数值的语法类似于 `/Set` 选项中使用的语法。<br>示例：`/Conf
    parameters.xml` |


    清单 17-3 提供了运行包含在项目文件 (`project.ispac`) 中的包 (`MyPackage.dtsx`) 的示例。它设置了两个参数的值：`BatchNumber`（一个在项目级别定义的整数参数）和
    `HostName`（一个在包级别定义的字符串参数）。


    [**清单 17-3.** 使用 `DTEXEC` 在项目文件内运行包]


    ```

    dtexec.exe /Project c:\demo\project.ispac /Package MyPackage.dtsx /Set \Package.Variables[$Project::BatchNumber];432
    /Set \Package.Variables[$Package::HostName];localhost

    ```


    **注意：** 虽然设置参数值的语法类似于设置变量和其他包属性的值，但有一个关键区别。要设置参数值，不应包含属性的名称——您只需指定参数本身的名称。


    ## SSIS 目录中的项目


    `DTEXEC` 在 SQL Server 2012 中进行了扩展，以支持运行包含在 SSIS 目录中的包。与其他执行模式不同，当从目录运行包时，执行发生在
    SSIS 目录的服务器上，而不是由 `DTEXEC` 进程执行。在此模式下，您将使用 `/ISServer` 命令行选项指定要运行的包的路径，使用 `/Parameter`
    选项设置参数值，如果希望在特定的服务器环境中运行包，则使用 `/EnvReference` 选项。


    表 17-2 包含了使用 `DTEXEC` 进行基于 SSIS 目录执行的所有命令行选项列表。


    表 17-2. 用于 SSIS 目录的 `DTEXEC` 命令行选项


    | 参数 | 描述 |

    | --- | --- |

    | `Ser[ver]=*服务器实例*` | 包含 SSIS 目录的 SQL 实例的名称。如果未指定此选项，则假定为 `localhost` 上的默认实例。<br>示例：`/Ser
    ETLSERVER1` |

    | `IS[Server]=*包路径*` | SSIS 目录中包的路径。这将包含目录名称 (`SSISDB`)、文件夹名称、项目名称以及您要运行的包的名称。此选项不能与
    `/DTS`、`/SQL` 或 `/FILE` 选项一起使用。<br>示例：`/IS \SSISDB\MyFolder\ETLProject\MyPackage.dtsx`
    |

    | `Par[ameter]= *名称[(类型)];值*` | 为给定参数设置值。在名称中包含参数的命名空间以区分参数作用域（项目级别参数使用 `$Project`，包级别参数使用
    `$Package`，连接管理器属性使用 `$CM`，服务器特定选项使用 `$ServerOption`）。如果未包含命名空间，则假定参数位于包作用域。<br>示例：`/Par
    $Project::BatchNumber;432` |

    | `Env[Reference]=*环境 ID*` | 此选项允许您指定运行包时要使用的服务器环境。任何已绑定到服务器环境变量的参数值都将自动解析。要获取环境的
    ID，请在 `SSISDB` 的 `[catalog].[environments]` 视图中查询其名称。<br>示例：`/Env 20` |


    清单 17-4 提供了在远程 SSIS 目录服务器 (`ETLServer`) 上的文件夹 (`MyFolder`) 内的项目 (`ETLProject`)
    中运行包 (`MyPackage.dtsx`) 的示例。它设置了两个参数的值：`BatchNumber`（一个在项目级别定义的整数参数）和 `HostName`（一个在包级别定义的字符串参数）。它还将
    `SYNCHRONIZED` 服务器选项设置为 `True`，这告诉 `DTEXEC` 以同步模式运行——关于同步与异步执行的更多细节将在后续页面中介绍。


    [**清单 17-4.** 使用 `DTEXEC` 在 SSIS 目录内运行包]


    ```

    C:\>dtexec.exe /Ser ETLServer /IS \SSISDB\MyFolder\ETLProject\MyPackage.dtsx /Par
    $Project::BatchNumber;432 /Par $Package::HostName;localhost /Par "$ServerOption::SYNCHRONIZED(Boolean)";True


    Microsoft (R) SQL Server Execute Package Utility Version 12.0.2000.8 for 64-bit

    Copyright (C) Microsoft Corporation. All rights reserved.


    Started:  4:46:44 PM

    Execution ID: 4. To view the details for the execution, right-click on the Integration
    Services Catalog, and open the [All Executions] report

    Started:  4:46:44 PM

    Finished: 4:49:45 PM

    Elapsed:  3 seconds

    ```


    **注意：** 当您运行包含在 SSIS 目录中的包时，必须使用 Windows 身份验证连接到 SQL Server 实例。`/User` 和 `/Password`
    命令行选项不能与 `/ISServer` 选项一起使用。如果您需要模拟其他用户帐户，可以将 `RunAs` DOS 命令与 `DTEXEC` 配合使用。


    当您使用 `DTEXEC` 运行 SSIS 目录包时，默认情况下它将以异步模式运行。这意味着进程将立即返回，并且不会告诉您包是否实际成功运行。要获得同步执行行为（例如，与从文件系统或
    `MSDB` 运行包时相同的行为），您需要包含 `/Par "$ServerOption::SYNCHRONIZED(Boolean)";True` 命令行开关。当使用同步执行时，`DTEXEC`
    进程在包运行完成之前不会返回。'
- fmt: "## SSIS Catalog与DTEXEC执行的事件显示差异\n\nSSIS Catalog与使用DTEXEC执行包的另一个区别在于，包运行时发生的事件不会显示在命令行上。[清单\
    \ 17-4](#9781484200834_Ch17.xhtml#list4) 展示了在SSIS Catalog中运行包的示例输出——如你所见，只有一条消息告诉你服务器执行ID，并指向目录报告。\n\
    \n## 动态配置\n\n入口点包上的参数允许用户指定值，但这要求这些值在包开始运行前就已知。有时你可能需要在运行时确定配置，或从其他源（如外部文件或数据库表）动态获取值。以下各节提供了可用于增强参数模型所提供功能的设计模式。\n\
    \n### 从数据库表配置\n\nSSIS Catalog为包配置值提供了一个中心位置，但你的环境可能已有其他存储包运行时所需元数据的位置。此模式展示了如何使用执行SQL任务从数据库表中检索值，以及如何使用属性表达式配置包中的属性。在此示例中，你将从数据库读取目录和文件名，将值存储到变量中，然后使用它们动态设置平面文件连接管理器的\
    \ `ConnectionString`。\n\n#### 创建数据库表\n\n[清单 17-5](#9781484200834_Ch17.xhtml#list5)\
    \ 显示了你将从中读取配置值的表的SQL定义。表中的每一行都代表一个你希望使用此包处理的新平面文件。你感兴趣的两个主要列是 `directory` 和 `name`——`id`\
    \ 列是代理键，用于唯一标识表中的每一行，`processed` 列让我们可以轻松过滤掉已处理的文件。示例值如[表 17-3](#9781484200834_Ch17.xhtml#Tab3)所示。\n\
    \n**[清单 17-5](#9781484200834_Ch17.xhtml#_list5).** 包将读取其配置值的表的SQL定义\n```sql\n\
    CREATE TABLE [dbo].[PackageConfiguration] (\n         [id] int IDENTITY(1,1) NOT\
    \ NULL,\n         [directory] nvarchar(255) NOT NULL,\n         [name] nvarchar(255)\
    \ NOT NULL,\n         [processed] bit NOT NULL\n)\n```\n\n**[表 17-3](#9781484200834_Ch17.xhtml#_Tab3).**\
    \ 来自`PackageConfiguration`表的示例行\n![Table17-3.jpg](images/Table17-3.jpg)\n\n####\
    \ 使用执行SQL任务检索配置值\n\n你将使用执行SQL任务，从你创建的 `PackageConfiguration` 表中检索需要处理的文件列表。你将把结果集存储到包变量中，然后使用Foreach循环容器遍历每一行。你将使用\
    \ `processed` 字段来标记已处理的文件——一旦成功加载文件，你就将 `processed` 值设置为 `True`。\n\n![Image](images/sq.jpg)\
    \ **注意**  此示例假设`PackageConfiguration`表中列出的所有平面文件都具有相同的模式。它不涵盖实际将平面文件加载到数据库所需的逻辑——它旨在说明你可以用作模板，用于在循环中处理多个项目的模式。\n\
    \n设置包需要执行以下步骤：\n\n1.  添加四个包变量。\n    *   **`FileID` (`Int32`):** 当前正在处理文件的行ID\n\
    \    *   **`Directory` (`String`):** 包含你需要处理的平面文件的目录\n    *   **`FileName` (`String`):**\
    \ 你正在处理的文件的名称\n    *   **`FilesToProcess` (`Object`):** 执行SQL任务的结果集\n2.  向包中添加一个执行SQL任务；将其命名为\
    \ **`Retrieve File List`**。\n3.  双击该任务以打开其编辑器。\n4.  确保 `ConnectionType` 为 `OLE\
    \ DB`。\n5.  点击 `Connection` 下拉菜单并选择 `New connection...`。\n6.  点击 `New` 并配置连接管理器，使其指向包含\
    \ `PackageConfiguration` 表的数据库。\n7.  从`PackageConfiguration`表中选择所有未处理的文件（如[清单\
    \ 17-6](#9781484200834_Ch17.xhtml#list6)所示）。\n    **[清单 17-6](#9781484200834_Ch17.xhtml#_list6).**\
    \ 从配置表中提取所有尚未处理的条目的查询\n    ```sql\n    SELECT * FROM [dbo].[PackageConfiguration]\
    \ WHERE [processed] = 0\n    ```\n8.  将 `ResultSet` 值设置为 `Full Result Set`。这意味着执行SQL任务将检索值作为可供Foreach循环处理的ADO记录集。请注意，你也可以在这里使用ADO.NET连接管理器，这将导致结果作为ADO.NET数据表返回。\n\
    9.  点击 `Result Set` 选项卡。\n10. 点击 `Add`，并使用以下映射：\n    1.  **Result Name:** `0`\n\
    \    2.  **Variable Name:** `User::FilesToProcess`\n11. 点击 `OK` 以保存对执行SQL任务的更改。\n\
    12. 向包中添加一个Foreach循环容器。\n13. 将执行SQL任务连接到Foreach循环容器。\n14. 在Foreach循环容器内添加一个数据流任务。\n\
    15. 在Foreach循环容器内添加一个新的执行SQL任务。\n16. 将数据流任务连接到执行SQL任务。\n17. 双击执行SQL任务以打开其编辑器。\n\
    18. 将连接设置为你在第5步创建的同一连接管理器。\n19. [清单 17-7](#9781484200834_Ch17.xhtml#list7) 显示了将表中行标记为已处理的\
    \ `SQLStatement`。请注意，该语句包含一个参数标记（问号）。你将在下一步将变量值映射到此参数。\n    **[清单 17-7](#9781484200834_Ch17.xhtml#_list7).**\
    \ 将文件标记为已处理的SQL语句\n    ```sql\n    UPDATE [dbo].[PackageConfiguration] SET [processed]\
    \ = 1 WHERE   id = ?\n    ```\n20. 点击 `Parameter Mapping` 选项卡。\n21. 点击 `Add`，并使用以下映射：\n\
    \    1.  **Variable name:** `User::FileID`\n    2.  **Data Type:** `LONG`\n  \
    \  3.  **Parameter Name:** `0`\n22. 点击 `OK` 以保存对执行SQL任务的更改。\n23. 添加一个新的平面文件连接管理器，并将其指向一个现有的平面文件。\n\
    24. 右键单击平面文件连接管理器，然后选择 `Properties`。\n25. 选择 `Expression` 属性，并打开属性表达式编辑器。\n26.\
    \ 在 `ConnectionString` 属性上设置一个表达式，该表达式利用从 `PackageConfiguration` 表中检索到的变量值。[清单\
    \ 17-8](#9781484200834_Ch17.xhtml#list8) 提供了该表达式的示例。\n    **[清单 17-8](#9781484200834_Ch17.xhtml#_list8).**\
    \ 在`ConnectionString`属性上设置输入文件路径的表达式\n    ```text\n    @[User::Directory] + \"\
    \\\\\" +  @[User::FileName]\n    ```\n\n你的包现在应该如[图 17-14](#9781484200834_Ch17.xhtml#Fig14)所示。\n\
    ![9781484200834_Fig17-14.jpg](images/9781484200834_Fig17-14.jpg)\n**[图 17-14](#9781484200834_Ch17.xhtml#_Fig14).**\
    \ 配置为基于执行SQL任务的动态配置的包\n\n### 使用脚本任务设置值\n\n除了使用执行SQL任务检索配置并通过表达式设置包属性外，另一种方法是使用脚本任务。如果你的值不是来自数据库，或者它们需要额外的处理逻辑（例如，来自加密源），这种方法可能很有用。在脚本任务中，你可以轻松地从外部配置文件（如XML文件）读取值，并访问可能被数据集成解决方案中其他非SSIS部分使用的共享配置资源。"
  raw: 'Another difference between the SSIS Catalog and other forms of DTEXEC execution
    is that the events that occur while the package is running are not displayed on
    the command line. [Listing 17-4](#9781484200834_Ch17.xhtml#list4) shows a sample
    output from running a package in the SSIS Catalog—as you can see, there is only
    a single message telling you the server execution ID and pointing you to the catalog
    reports.    Dynamic Configurations    Parameters on an entry-point package allow
    a user to specify values, but they require that the values be known before the
    package starts running. There may be times where you’ll need to determine configurations
    at runtime or dynamically pull in values from other sources (such as an external
    file or a database table). The following sections provide design patterns that
    you can use to augment the capabilities provided by the parameter model.    Configuring
    from a Database Table    The SSIS Catalog provides a central location for package
    configuration values, but your environment may already have alternative locations
    that store metadata that your packages need at runtime. This pattern shows you
    how to retrieve values from a database table using an Execute SQL task and how
    to configure properties within the package using property expressions. For this
    example, you’ll be reading a directory and file name from a database, storing
    the values in variables, and then using them to dynamically set the `ConnectionString`
    for a flat file connection manager.    Creating the Database Table    [Listing
    17-5](#9781484200834_Ch17.xhtml#list5) shows the SQL for the table that you will
    be reading your configuration values from. Each row in the table is a new flat
    file that you will want to process with this package. The two main columns you
    are interested in are `directory` and `name`—the `id` column is a surrogate key
    to uniquely identify each row in the table, and the `processed` column lets us
    easily filter out files that have already been processed. Sample values are shown
    in [Table 17-3](#9781484200834_Ch17.xhtml#Tab3).    [***Listing 17-5***](#9781484200834_Ch17.xhtml#_list5).
    SQL Definition of the Table Our Package Will Read Its Configuration Values From    ```
    CREATE TABLE [dbo].[PackageConfiguration] (          [id] int IDENTITY(1,1) NOT
    NULL,          [directory] nvarchar(255) NOT NULL,          [name] nvarchar(255)
    NOT NULL,          [processed] bit NOT NULL ) ```    [Table 17-3](#9781484200834_Ch17.xhtml#_Tab3).
    Sample Rows from the PackageConfiguration Table    ![Table17-3.jpg](images/Table17-3.jpg)    Retrieving
    Configuration Values with an Execute SQL Task    You will retrieve the list of
    files you need to process from the `PackageConfiguration` table you created using
    an Execute SQL task. You will store the result set in a package variable, and
    then loop through each row with a Foreach loop container. You will use the processed
    field to mark the files that have already been processed—you will set the processed
    value to `True` once you have successfully loaded the file.    ![Image](images/sq.jpg) **Note**  This
    example assumes that all of the flat files listed in the `PackageConfiguration`
    table have the same schema. It does not cover the logic needed to actually load
    the flat file into the database—it is meant to illustrate the pattern that you’d
    use as a template for processing a number of items in a loop.    Setting up the
    package takes the following steps:    1.  Add four package variables.     *   **FileID
    (Int32):** The row ID for the file you are currently processing     *   **Directory
    (String):** The directory containing the flat file you need to process     *   **FileName
    (String):** The name of the file you are processing     *   **FilesToProcess (Object):**
    The result set of the Execute SQL task 2.  Add an Execute SQL task to your package;
    name it **Retrieve File List**. 3.  Double-click the task to open its editor.
    4.  Ensure the `ConnectionType` is `OLE DB`. 5.


    Click on the Connection dropdown and select New connection.... 6.  Click New and
    configure the connection manager to point to the database containing the `PackageConfiguration`
    table. 7.  Select all of the files that have not been processed from the `PackageConfiguration`
    table (as shown in [Listing 17-6](#9781484200834_Ch17.xhtml#list6)).                    [***Listing
    17-6***](#9781484200834_Ch17.xhtml#_list6). Query to Pull Out All Entries in the
    Configuration Table That Have NotBeen Processed Yet                    ```     SELECT
    * FROM [dbo].[PackageConfiguration] WHERE [processed] = 0     ```           8.  Set
    the `ResultSet` value to Full Result Set. This means that the Execute SQL task
    will retrieve the values as an ADO Recordset that can be processed by the Foreach
    loop. Note that you could also use an ADO.NET connection manager here, which would
    cause the results to be returned as an ADO.NET data table. 9.  Click on the Result
    Set tab. 10.  Click Add, and use these mappings:     1.  **Result Name:**`0`     2.  **Variable
    Name:**`User::FilesToProcess` 11.  Click OK to save the changes to the Execute
    SQL task. 12.  Add a Foreach loop container to your package. 13.  Connect the
    Execute SQL task to the Foreach loop container. 14.  Add a Data Flow task inside
    of the Foreach loop container. 15.  Add a new Execute SQL task inside of the Foreach
    loop container. 16.  Connect the Data Flow task to the Execute SQL task. 17.  Double-click
    the Execute SQL task to open its editor. 18.  Set the connection to the same connection
    manager you created in step 5. 19.  [Listing 17-7](#9781484200834_Ch17.xhtml#list7)
    shows the `SQLStatement` to mark a row in the table as processed. Note that the
    statement contains a parameter marker (the question mark). You will map a variable
    value to this parameter in the next step.                    [***Listing 17-7***](#9781484200834_Ch17.xhtml#_list7).
    SQL Statement to Mark the File as Processed                    ```     UPDATE
    [dbo].[PackageConfiguration] SET [processed] = 1 WHERE  id = ?     ```           20.  Click
    the Parameter Mapping tab. 21.  Click Add, and use these mappings:     1.  **Variable
    name:**`User::FileID`     2.  **Data Type:**`LONG`     3.  **Parameter Name:**`0`
    22.  Click OK to save the changes to the Execute SQL task. 23.  Add a new Flat
    File connection manager, and point it to an existing flat file. 24.  Right-click
    on the Flat File connection manager, and select Properties. 25.  Select the `Expression`
    property, and bring up the Property Expression editor. 26.  Set an expression
    on the `ConnectionString` property that makes use of the variable values retrieved
    from the `PackageConfiguration` table. [Listing 17-8](#9781484200834_Ch17.xhtml#list8)
    provides an example of the expression.                    [***Listing 17-8***](#9781484200834_Ch17.xhtml#_list8).
    Expression to Set the Path to the Input File on the ConnectionString Property                    ```     @[User::Directory]
    + "\\" +  @[User::FileName]     ```              Your package should now look
    like [Figure 17-14](#9781484200834_Ch17.xhtml#Fig14).    ![9781484200834_Fig17-14.jpg](images/9781484200834_Fig17-14.jpg)    [Figure
    17-14](#9781484200834_Ch17.xhtml#_Fig14). Package configured for Execute SQL task–based
    dynamic configurations    Setting Values Using a Script Task    An alternative
    to retrieving your configuration with an Execute SQL task and setting package
    properties through expressions is to use a Script task. This approach can be useful
    if your values aren’t coming from a database or they require additional processing
    logic—for example, if they are coming from an encrypted source. From within a
    Script task, you can easily read values from external configuration files (such
    as an XML file) and access shared configuration resources that might be used by
    other, non-SSIS parts of your data integration solution.'
  trans: "\n## SSIS Catalog 与 DTEXEC 执行的事件显示差异\n\nSSIS Catalog 与使用 DTEXEC 执行包的另一个区别在于，包运行时发生的事件不会显示在命令行上。清单\
    \ 17-4 展示了在 SSIS Catalog 中运行包的示例输出——如你所见，只有一条消息告诉你服务器执行 ID，并指向目录报告。\n\n## 动态配置\n\
    \n入口点包上的参数允许用户指定值，但这要求这些值在包开始运行前就已知。有时你可能需要在运行时确定配置，或从其他源（如外部文件或数据库表）动态获取值。以下各节提供了可用于增强参数模型所提供功能的设计模式。\n\
    \n### 从数据库表配置\n\nSSIS Catalog 为包配置值提供了一个中心位置，但你的环境可能已有其他存储包运行时所需元数据的位置。此模式展示了如何使用执行\
    \ SQL 任务从数据库表中检索值，以及如何使用属性表达式配置包中的属性。在此示例中，你将从数据库读取目录和文件名，将值存储到变量中，然后使用它们动态设置平面文件连接管理器的\
    \ `ConnectionString`。\n\n#### 创建数据库表\n\n清单 17-5 显示了你将从中读取配置值的表的 SQL 定义。表中的每一行都代表一个你希望使用此包处理的新平面文件。你感兴趣的两个主要列是\
    \ `directory` 和 `name`——`id` 列是代理键，用于唯一标识表中的每一行，`processed` 列让我们可以轻松过滤掉已处理的文件。示例值如表\
    \ 17-3 所示。\n\n**清单 17-5.** 包将读取其配置值的表的 SQL 定义\n```sql\nCREATE TABLE [dbo].[PackageConfiguration]\
    \ (\n         [id] int IDENTITY(1,1) NOT NULL,\n         [directory] nvarchar(255)\
    \ NOT NULL,\n         [name] nvarchar(255) NOT NULL,\n         [processed] bit\
    \ NOT NULL\n)\n```\n\n**表 17-3.** 来自`PackageConfiguration`表的示例行\n![Table17-3.jpg](img/Table17-3.jpg)\n\
    \n#### 使用执行 SQL 任务检索配置值\n\n你将使用执行 SQL 任务，从你创建的 `PackageConfiguration` 表中检索需要处理的文件列表。你将把结果集存储到包变量中，然后使用\
    \ Foreach 循环容器遍历每一行。你将使用 `processed` 字段来标记已处理的文件——一旦成功加载文件，你就将 `processed` 值设置为\
    \ `True`。\n\n![Image](img/sq.jpg) **注意**  此示例假设`PackageConfiguration`表中列出的所有平面文件都具有相同的模式。它不涵盖实际将平面文件加载到数据库所需的逻辑——它旨在说明你可以用作模板，用于在循环中处理多个项目的模式。\n\
    \n设置包需要执行以下步骤：\n\n1.  添加四个包变量。\n    *   **`FileID` (`Int32`):** 当前正在处理文件的行 ID\n\
    \    *   **`Directory` (`String`):** 包含你需要处理的平面文件的目录\n    *   **`FileName` (`String`):**\
    \ 你正在处理的文件的名称\n    *   **`FilesToProcess` (`Object`):** 执行 SQL 任务的结果集\n2.  向包中添加一个执行\
    \ SQL 任务；将其命名为 **`Retrieve File List`**。\n3.  双击该任务以打开其编辑器。\n4.  确保 `ConnectionType`\
    \ 为 `OLE DB`。\n5.  点击 `Connection` 下拉菜单并选择 `New connection...`。\n6.  点击 `New`\
    \ 并配置连接管理器，使其指向包含 `PackageConfiguration` 表的数据库。\n7.  从`PackageConfiguration`表中选择所有未处理的文件（如清单\
    \ 17-6 所示）。\n    **清单 17-6.** 从配置表中提取所有尚未处理的条目的查询\n    ```sql\n    SELECT * FROM\
    \ [dbo].[PackageConfiguration] WHERE [processed] = 0\n    ```\n8.  将 `ResultSet`\
    \ 值设置为 `Full Result Set`。这意味着执行 SQL 任务将检索值作为可供 Foreach 循环处理的 ADO 记录集。请注意，你也可以在这里使用\
    \ ADO.NET 连接管理器，这将导致结果作为 ADO.NET 数据表返回。\n9.  点击 `Result Set` 选项卡。\n10. 点击 `Add`，并使用以下映射：\n\
    \    1.  **Result Name:** `0`\n    2.  **Variable Name:** `User::FilesToProcess`\n\
    11. 点击 `OK` 以保存对执行 SQL 任务的更改。\n12. 向包中添加一个 Foreach 循环容器。\n13. 将执行 SQL 任务连接到 Foreach\
    \ 循环容器。\n14. 在 Foreach 循环容器内添加一个数据流任务。\n15. 在 Foreach 循环容器内添加一个新的执行 SQL 任务。\n\
    16. 将数据流任务连接到执行 SQL 任务。\n17. 双击执行 SQL 任务以打开其编辑器。\n18. 将连接设置为你在第 5 步创建的同一连接管理器。\n\
    19. 清单 17-7 显示了将表中行标记为已处理的 `SQLStatement`。请注意，该语句包含一个参数标记（问号）。你将在下一步将变量值映射到此参数。\n\
    \    **清单 17-7.** 将文件标记为已处理的 SQL 语句\n    ```sql\n    UPDATE [dbo].[PackageConfiguration]\
    \ SET [processed] = 1 WHERE   id = ?\n    ```\n20. 点击 `Parameter Mapping` 选项卡。\n\
    21. 点击 `Add`，并使用以下映射：\n    1.  **Variable name:** `User::FileID`\n    2.  **Data\
    \ Type:** `LONG`\n    3.  **Parameter Name:** `0`\n22. 点击 `OK` 以保存对执行 SQL 任务的更改。\n\
    23. 添加一个新的平面文件连接管理器，并将其指向一个现有的平面文件。\n24. 右键单击平面文件连接管理器，然后选择 `Properties`。\n25.\
    \ 选择 `Expression` 属性，并打开属性表达式编辑器。\n26. 在 `ConnectionString` 属性上设置一个表达式，该表达式利用从\
    \ `PackageConfiguration` 表中检索到的变量值。清单 17-8 提供了该表达式的示例。\n    **清单 17-8.** 在`ConnectionString`属性上设置输入文件路径的表达式\n\
    \    ```text\n    @[User::Directory] + \"\\\\\" +  @[User::FileName]\n    ```\n\
    \n你的包现在应该如图 17-14 所示。\n![9781484200834_Fig17-14.jpg](img/9781484200834_Fig17-14.jpg)\n\
    **图 17-14.** 配置为基于执行 SQL 任务的动态配置的包\n\n### 使用脚本任务设置值\n\n除了使用执行 SQL 任务检索配置并通过表达式设置包属性外，另一种方法是使用脚本任务。如果你的值不是来自数据库，或者它们需要额外的处理逻辑（例如，来自加密源），这种方法可能很有用。在脚本任务中，你可以轻松地从外部配置文件（如\
    \ XML 文件）读取值，并访问可能被数据集成解决方案中其他非 SSIS 部分使用的共享配置资源。\n"
- fmt: "The Script task is able to read and modify package properties at runtime,\
    \ including the variable values and all connection manager properties. [Listing\
    \ 17-9](#9781484200834_Ch17.xhtml#list9) provides sample code of a Script task\
    \ that sets a connection manager’s `ConnectionString` at runtime.\n\n## Listing\
    \ 17-9. Sample Code to Set Package Properties Using a Script Task\n\n```csharp\n\
    public void Main()\n{\n    // TODO: This would be set from an external configuration\
    \ file\n    const string SourceSystemConnectionString = \"...\";\n\n    Dts.TaskResult\
    \ = (int)ScriptResults.Success;\n\n    if (Dts.Connections.Contains(\"SourceSystem\"\
    ))\n    {\n        ConnectionManager cm = Dts.Connections[\"SourceSystem\"];\n\
    \        cm.ConnectionString = SourceSystemConnectionString;\n    }\n    else\n\
    \    {\n        // The expected connection manager wasn't found - log and set\
    \ an error status\n        Dts.Events.FireError(0, \"Script Task\",\n        \
    \                    \"Could not find the SourceSystem connection manager\",\n\
    \                            string.Empty, 0);\n\n        Dts.TaskResult = (int)ScriptResults.Failure;\n\
    \    }\n}\n```\n\n## Dynamic Package Executions\n\nIn this approach, you will\
    \ use the same table from [Listing 17-5](#9781484200834_Ch17.xhtml#list5), but\
    \ instead of reading the configuration values with an SSIS package, you’ll use\
    \ T-SQL to create dynamic package executions on the SSIS Catalog. The code in\
    \ [Listing 17-10](#9781484200834_Ch17.xhtml#list10) implements the following steps:\n\
    \n1.  Declare script variables. Note that in a real-world script, these values\
    \ would be set through parameters or from an external source.\n2.  Read the list\
    \ of files to process from the `PackageConfiguration` table, and store the results\
    \ in a table variable (`@FileList`).\n3.  Loop through the list of files. For\
    \ each file, the code will do the following:\n    1.  Retrieve the ID and parameter\
    \ values from the table variable.\n    2.  Create a new SSIS Catalog package execution.\n\
    \    3.  Set the parameter `Directory` and `FileName` parameter values.\n    4.\
    \  Start the execution.\n    5.  Update the `PackageConfiguration` table to mark\
    \ that the file has been processed.\n\n## Listing 17-10. Dynamic Package Execution\
    \ Script\n\n```sql\nDECLARE @FolderName NVARCHAR(50) = N'ExecutionDemo'\nDECLARE\
    \ @ProjectName NVARCHAR(50) = N'ETL'\nDECLARE @DirectoryParameter NVARCHAR(50)\
    \ = N'Directory'\nDECLARE @FileNameParameter NVARCHAR(50) = N'FileName'\nDECLARE\
    \ @PackageName NVARCHAR(100) = N'LoadCustomers.dtsx'\n\nDECLARE @FileList TABLE\
    \ (\n  RowNum smallint,\n  Id int,\n  Directory nvarchar(255),\n  Name nvarchar(255)\n\
    )\n\nINSERT INTO @FileList (RowNum, Id, Directory, Name)\n                 SELECT\
    \ ROW_NUMBER() OVER (ORDER BY id), id, Directory, Name\n         FROM [dbo].[PackageConfiguration]\n\
    \         WHERE processed = 0\n\nDECLARE @maxCount int = (SELECT MAX(RowNum) FROM\
    \ @FileList)\nDECLARE @count int = (SELECT MIN(RowNum) FROM @FileList)\n\nWHILE\
    \ (@count <= @maxCount)\nBEGIN\n\n         DECLARE @Id NVARCHAR(255) = (SELECT\
    \ Id FROM @FileList WHERE RowNum = @count)\n         DECLARE @DirectoryValue NVARCHAR(255)\
    \ = (SELECT Directory FROM @FileList WHERE RowNum = @count)\n         DECLARE\
    \ @NameValue NVARCHAR(255) = (SELECT Name FROM @FileList WHERE RowNum = @count)\n\
    \n         -- Create the package execution\n         DECLARE @exec_id bigint\n\
    \         EXEC [SSISDB].[catalog].[create_execution]\n                   @execution_id\
    \ = @exec_id OUTPUT,\n                   @package_name = @PackageName,\n     \
    \              @folder_name = @FolderName,\n                   @project_name =\
    \ @ProjectName\n\n         -- Set the Directory parameter value\n         EXEC\
    \ [SSISDB].[catalog].[set_execution_parameter_value]\n                   @execution_id\
    \ = @exec_id,\n                   @object_type = 20,\n                   @parameter_name\
    \ = @DirectoryParameter,\n                   @parameter_value = @DirectoryValue\n\
    \n         -- Set the File Name parameter value\n         EXEC [SSISDB].[catalog].[set_execution_parameter_value]\n\
    \                   @execution_id = @exec_id,\n                   @object_type\
    \ = 20,\n                   @parameter_name = @FileNameParameter,\n          \
    \         @parameter_value = @NameValue\n\n         -- Start the package execution\n\
    \         EXEC [SSISDB].[catalog].[start_execution] @exec_id\n\n         -- Return\
    \ the execution ID\n         SELECT N'Started package execution ' + CONVERT(nvarchar(20),\
    \ @exec_id)\n\n         -- Mark the file as processed\n         DECLARE @UpdateSql\
    \ nvarchar(1024) = N'UPDATE [dbo].[PackageConfiguration] SET processed = 1\n \
    \        WHERE id = ' + CONVERT(nvarchar(20), @Id)\n         EXEC sp_sqlexec @UpdateSql\n\
    \n         SET @count = @count + 1\nEND\n```\n\n## Conclusion\n\nThis chapter\
    \ has covered some of the usage patterns for the new parameter model, as well\
    \ as some dynamic configuration scenarios. Although the configuration patterns\
    \ and best practices that were commonly used in SQL 2005 and 2008 continue to\
    \ work in the latest version of SSIS, most users will see a benefit in migrating\
    \ to the new model. The clarity of the parameter model was designed to help everyone\
    \ involved with an SSIS solution life cycle, from those who develop the packages\
    \ to those who deploy and schedule them.\n\n# CHAPTER 18. Deployment\n\nGreat\
    \ strides were made towards simplifying the deployment process for Integration\
    \ Services projects in SQL Server 2012. Projects within Visual Studio can now\
    \ target two different deployment models – the Package Deployment Model, which\
    \ is similar to what was used in previous versions of the product, and the Project\
    \ Deployment Model, which was designed for the new SSIS Catalog.\n\nThis chapter\
    \ will focus on patterns associated with the new Project Deployment Model and\
    \ server based deployment. While the Project Model and SSIS Catalog are the recommended\
    \ way to do deployment, organizations upgrading from previous versions may already\
    \ have package execution frameworks that rely on file system based deployment.\n\
    \n![Image](images/sq.jpg) **Note** SSIS package deployment was not changed between\
    \ SQL Server 2012 and SQL Server 2014.\n\n## Project Deployment Model\n\nThe new\
    \ Project Model is the default target when creating SSIS projects in SQL Server\
    \ 2014. With this model, packages and other project items such as Shared Connection\
    \ Managers are bundled into a single file with an `.ispac` extension during the\
    \ project’s Build phase. This file can then be deployed to the SSIS Catalog using\
    \ the Deployment Wizard, or executed directly using `dtexec.exe`.\n\nIf your project\
    \ is targeting the Package Deployment Model, you can convert to the Project Deployment\
    \ Model within Visual Studio. Right click on the project name in the Solution\
    \ Explorer window, and select **Convert to Project Deployment Model** (as shown\
    \ in [Figure 18-1](#9781484200834_Ch18.xhtml#Fig1)). Converting to the Project\
    \ Deployment Model brings up the Project Conversion Wizard. The wizard helps you\
    \ convert to the new model by updating Execute Package Tasks to use Project References,\
    \ and changing Configurations to Parameters.\n\n![9781484200834_Fig18-01.jpg](images/9781484200834_Fig18-01.jpg)\n\
    [Figure 18-1](#9781484200834_Ch18.xhtml#_Fig1). SSDT-BI provides an option to\
    \ convert to the Project Deployment Model\n\nIntegration Services projects in\
    \ the Project Deployment Model can make use of new features such as Parameters,\
    \ Shared Connection Managers, and Project References. Project References allow\
    \ the Execute Package Task to locate child packages without the use of connection\
    \ managers, and greatly simply the deployment process.\n\n## SSIS Catalog\n\n\
    The SSIS Catalog was added in SQL Server 2012, and is the recommended deployment\
    \ target for Integration Services projects. Deployment to the catalog is typically\
    \ done using the SSIS Deployment Wizard, which can be launched from within SSDT-BI,\
    \ SSMS, double clicking an SSIS project file (`.ispac`) from windows explorer,\
    \ or by running `ISDeploymentWizard`."
