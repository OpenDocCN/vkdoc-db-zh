    Create a new SSIS Package in the Chapter2 project and rename it `Parent.dtsx`.
    Click the Parameters tab on the package—it’s the third tab from the left (Control
    Flow, Data Flow, Parameters). Click the Add Parameter button and create a parameter
    named *ApplicationName, String data type*, with a default value of `testSSISApp`.
    Set the `Required` property to `True`.


    Add an Execute SQL task to the control flow and rename it **Get Packages**. Open
    the editor and set the ConnectionType property to `ADO.NET`. In the Connection
    property drop-down, select (or create a connection to) the SSISDB database. In
    the SQLStatement property, enter **custom.GetApplicationPackages**. Set the `IsQueryStoredProcedure`
    property to `True`. Change the ResultSet property to **Full result set**.


    Navigate to the Parameter Mapping page and click the Add button. Click the Variable
    Name drop-down and select $Package::ApplicationName at the very top of the list.
    Change the Data Type to String and the Parameter Name to **ApplicationName**.
    This maps the value in the parent package parameters into the `ApplicationName`
    parameter sent to the `custom.GetApplicationPackages` stored procedure when it
    is called by the Execute SQL task.


    Navigate to the Result Set page and click the Add button. If the Add button is
    disabled, you did not change the ResultSet property on the General page from the
    default setting (None). If ResultSet is set to any other setting, the Add button
    is enabled. Enter **0** for the Result Name. In the Variable Name drop-down, create
    a variable named `Packages`. For this variable, set the Value Type property to
    `Object`.'
