- fmt: 'Data cleansing can be a `CPU` and memory intensive operation and may take
    some time to complete. Domains that rely on online reference data services may
    round trip incoming data to the `Azure Data Marketplace`, which will have a further
    impact on the time it takes to cleanse your data. As a result, when processing
    large amounts of data, you will typically want to reduce your dataset before passing
    it through the `DQS Cleansing` transform.


    The `DQS Cleansing` transform sends incoming data to the `DQS` server (running
    within a `SQL Server` instance), where the actual cleansing operations are performed.
    Although this may offload a lot of the work being done by the `SSIS` machine,
    there may be some overhead in sending the data across the network to another server.
    Another thing to note is that the `DQS Cleansing` transform is an asynchronous
    component, which means it makes copies of data flow buffers at runtime. This can
    further impact the performance of your data flow and is another reason for only
    passing through the rows that need to be cleansed.


    The following sections describe some package design tips that can be used to improve
    overall performance when cleansing data with the `DQS Cleansing` transform.


    ## Parallel Processing


    The `DQS Cleansing` transform sends its rows to the `DQS` server one batch at
    a time. This single threaded approach isn’t ideal if you have a lot of spare `CPU`
    power on your system, so designing your packages in a way that allows `DQS` to
    send multiple batches to the server in parallel will give you a performance boost.
    You have two main options for parallel processing. First, you can split the incoming
    rows down multiple paths and have a separate `DQS Cleansing` transform on each
    path performing the same set of work. If your data set has a key or row that can
    be easily split using `SSIS` Expressions, you can use a `Conditional Split` transform.
    Otherwise, you can consider using a third party component like the `Balanced Data
    Distributor`. The second approach is to design your data flow in such a way that
    multiple instances of your package can be run in parallel. For this approach to
    work, you will need to partition your source query so that it pulls back a certain
    key range, and each instance of the package will work on a different range. This
    approach gives you a bit more flexibility, because you can dynamically control
    how many package instances you run in parallel by playing with the key ranges.


    ![Image](images/sq.jpg) **Note**  You might find that the `DQS Client` performs
    its cleansing operations faster than the `DQS Cleansing` transform in `SSIS`.
    This is because the client processes multiple batches in parallel by default,
    whereas the `DQS Cleansing` transform processes them one at a time. To get the
    same performance in `SSIS` as you do in the `DQS Client`, you’ll need to add your
    own parallelism.


    ## Tracking Which Rows Have Been Cleansed


    You can track which rows have already been cleansed and when the cleansing operation
    was performed. This allows you to filter out rows that have already been cleansed
    so you don’t need to process them a second time. By using a date value for this
    marker, you can also determine which rows need to be reprocessed if your knowledge
    base gets updated. Remember, as your knowledge base changes and your cleansing
    rules improve, you will get more accurate results each time data is processed
    by the `DQS Cleansing` transform.


    To track when a row has been cleansed, add a new `datetime` column to your destination
    table (`DateLastCleansed`). A `NULL` or very early date value can be used to indicate
    that a row has never been processed. Alternatively, you can track dates in a separate
    table, linked to the original row with a foreign key constraint. Your `SSIS` package
    will contain the following logic:


    1.  Retrieve the date the `DQS` knowledge base was last updated using an `Execute
    SQL` task. This value should be stored in a package variable (`@[User::DQS_KB_Date]`).

    2.  Inside of a `Data Flow` task, retrieve the data to be cleansed with the appropriate
    source component. The source data should contain a `DateLastCleansed` column to
    track when the row was last processed with the `DQS Cleansing` transform.

    3.  Use a `Conditional Split` transform to compare the `DQS` knowledge base date
    against the date the row was last processed. The expression might look like this:
    `[DateLastCleansed] < @[User::DQS_KB_Date]`. Rows matching this expression will
    be directed to a `DQS Cleansing` transformation.

    4.  Handle the cleansed rows according to their status.

    5.  Use a `Derived Column` transform to set a new `DateLastCleansed` value.

    6.  Update the destination table with any corrected values and the new `DateLastCleansed`
    value.


    ## Filtering Rows with the Lookup Transform


    You can reduce the number of rows you need to cleanse by validating the data with
    a faster data flow component, such as the `Lookup` transform. Using one or more
    `Lookup` transforms, you can check if values exist in a reference table using
    quick, in-memory comparisons. Rows that match existing values can be filtered
    out. Rows with values that aren’t found in the reference table can then be sent
    to `Data Quality Services` for cleansing. Prefiltering rows this way means you
    won’t be able to take advantage of the standardized formatting that `DQS` provides,
    and this makes it difficult to do complex validation that involves relationships
    between multiple fields. This approach works best when you are working with a
    small number of unrelated fields that don’t require any special formatting as
    part of the cleansing process.


    To use this pattern, your data flow will use the following logic:


    1.  Retrieve the data containing the fields to be cleansed using a source component.

    2.  Set the component to `Ignore failure` when there are no matching entries.

    3.  Add a `Lookup` transform for each field you are going to cleanse. Each `Lookup`
    transform will use a `SQL` query that pulls in a unique set of values for that
    field and a static `Boolean` (`bit`) value. This static value will be used as
    a flag to determine whether the value was found. Since you are ignoring lookup
    failures, the flag value will be `NULL` if the lookup failed to find a match.
    [Listing 5-2](#9781484200834_Ch05.xhtml#list2) shows what the query would look
    like for the `CountryRegionCode` field, coming from the `DimGeography` table.


    [**Listing 5-2**](#9781484200834_Ch05.xhtml#_list2). Sample Lookup Query for the
    `CountryRegionCode` Field


    ```sql

    SELECT DISTINCT CountryRegionCode, 1 as [RegionCodeFlag]

    FROM [dbo].[DimGeography]

    ```


    4.  On the `Columns` tab, map the field to the related lookup column, and add
    the static flag value as a new column in your data flow (as shown in [Figure 5-13](#9781484200834_Ch05.xhtml#Fig13)).


    ![9781484200834_Fig05-13.jpg](images/9781484200834_Fig05-13.jpg)


    [Figure 5-13](#9781484200834_Ch05.xhtml#_Fig13). Column mapping for the `Lookup`
    transform


    5.  Repeat steps 3-4 for each field you will be cleansing. The `Lookup` transforms
    should be connected using the `Lookup Match` outputs.

    6.  Add a `Conditional Split` transform with a single expression that checks each
    of the flag fields. If any of the flag fields are `NULL`, the row should be sent
    to `DQS` for proper cleansing. For example, the expression to check the `RegionCodeFlag`
    for a `NULL` value would be `ISNULL([RegionCodeFlag])`.

    7.  Connect the `Conditional Split` output you created to the `DQS Cleansing`
    transform. Rows going to the `Conditional Split`’s default output can be ignored
    (since their values were successfully validated using the `Lookup` transforms).

    8.  Complete the rest of the data flow based on the appropriate logic for handling
    the output of the `DQS Cleansing` transform.'
