  trans: '与上一模式类似，这种方法确实伴随着几个注意事项。首先，事实记录必须包含所有信息，以 1) 满足维度表上的表约束（如 `NOT NULL` 限制），以及
    2) 使用业务键列创建可唯一标识的维度行。此外，由于我们是从传入的事实记录中派生新增的维度成员，在大多数情况下，可以合理地假设传入的事实数据不会完整地描述该维度成员。因此，你还应为此设计模式补充一个流程，尝试填充缺失的维度元素（这可能已作为全面缓慢变化维度策略的一部分得到处理）。


    如 图 11-10 所示，这里我们使用了与上一个示例类似的方法。然而，我们不是简单地使用 `Derived Column` 转换来分配未知成员的值，而是利用一个
    `OLE DB Command` 转换的实例，将事实表中缺失维度记录的数据插入到维度表中。SQL 语句显示在标注框中，并且在 `OLE DB` 命令的属性中，我们将占位符（用问号表示）映射到事实记录中的相应值。


    ![9781484200834_Fig11-10.jpg](img/9781484200834_Fig11-10.jpg)


    图 11-10. 添加缺失的维度成员


    添加缺失的成员后，我们将这些行发送到一个次要的 `ItemID` 查找，它将尝试（除非出现严重问题，否则会成功）将之前未匹配的数据与 `DimItem` 表中新增的维度记录进行匹配。重要的是，当以这种方式使用次要查找时，请记住将缓存模式设置为
    `Partial Cache` 或 `No Cache`。默认的查找缓存设置 (`Full Cache`) 会在数据流启动前缓冲 `Item` 维度表的内容，因此，在包执行期间添加的任何行都不会出现在这个次要查找中。为了防止所有这些被重定向的事实行在次要
    `Item` 维度查找中失败，请使用一种非默认缓存方法来强制包执行按需查找，以包含新增的维度值。


    关于次要查找转换方法，你可能会想第二次查找是否真的必要。毕竟，如果我们在上一步 (`OLE DB` 命令) 执行了插入操作，难道我们不能直接通过该 SQL
    语句收集新的 `Item` 维度键值（在大多数情况下是 SQL Server 表的标识值）吗？答案是肯定的，根据我的经验，这是两种选项中较简单的一种。然而，我也发现，某些
    ETL 情况——特别是引入并行进程来执行相同的即时维度成员添加——可能会使收集最近插入记录的标识值这个问题变得复杂。从这个角度来看，在此类情况下，我倾向于使用次要查找。


    ## 分类处理查找失败


    对于缺失的维度记录，最常见的方法通常涉及前述方法之一。然而，偶尔会有必要延迟处理那些与现有维度记录不匹配的事实记录。在这种情况下，你需要创建一个分类表，用于存储临时记录，直到它们能成功匹配到正确的维度。


    如 图 11-11 所示，我们为此设计模式的 ETL 管道添加了几个额外的组件。首先，我们需要使用两个独立的数据源：一个用于从源系统引入新数据，另一个用于将先前分类的数据重新引入管道。在数据流更深入的部分，该示例显示我们将未匹配的事实记录重定向到另一个表，而不是尝试在行内修复数据。


    ![9781484200834_Fig11-11.jpg](img/9781484200834_Fig11-11.jpg)


    图 11-11. 使用分类表存储未匹配的事实数据


    附带说明一下，此模式也可以修改为支持手动干预来更正查找失败的记录。如果业务和技术要求规定未匹配的事实数据必须由人工审查和更正（而不是系统性清理），你可以移除分类源，这样分类数据就不会重新引入数据流。


    ## 编写允许错误的代码


    尽管听起来像是矛盾修辞法，但为已知错误编写代码实际上是一种常见做法。根据我的经验，大多数 ETL 错误的性质决定了包执行可以继续，并且任何无法在行内处理的错误或异常都会被分类，如前一个示例所示（如果需要手动干预，则通知负责人），以便后续解决。然而，有些情况下，数据仓库
    ETL 过程应设计为在出现错误条件时失败。


    考虑财务数据的例子。存储或处理财务数据的机构会接受频繁而全面的审计，如果在政府审查数据时出现不一致的数据，可能会给组织及其负责人带来灾难。尽管数据仓库可能不会受到像
    OLTP 系统那样精确到分的审计审查，但在涉及资金和政府监管的问题时，仍然期望数据保持一致。在数据仓库加载过程中遇到不符合要求的数据时，可能最好的情况是包能够优雅地失败，回滚作为加载一部分所做的任何更改。


    ## 出错时使包失败


    扩展前面提到的财务数据示例，让我们研究一下在发生查找错误时促进失败的设计模式。实际上，这是默认行为。如 图 11-12 所示，我们在查找组件上使用默认设置
    `Fail Component`，如果遇到无法与 `GL Account` 或 `GL Subaccount` 查找匹配的行，则会停止包的执行。


    ![9781484200834_Fig11-12.jpg](img/9781484200834_Fig11-12.jpg)


    图 11-12. 允许包在出错时失败


    这里值得注意的是，要正确使用此设计模式，你必须包含一些逻辑来回滚由于部分加载而做的更改。如果你遇到一个与任何查找组件都不匹配的事实行，包仍然会失败；然而，你可能已经将在出错行之前发送到目标表的行提交了，这会导致所有数据处于不一致状态。


    有几种方法可以实现这种回滚行为：'
- fmt: '# SSIS中的事务处理与ETL工作流设计


    ## SSIS原生事务

    SSIS原生支持将任务和容器包装到事务中，理论上，在事务范围内发生错误时，它会回滚对关系数据库所做的任何持久性更改。然而，在实践中，即使在最理想的情况下，使用SSIS事务功能也可能充满挑战。直接在SSIS中利用事务需要许多条件同时满足：所有涉及的系统必须支持DTC事务，DTC服务必须在这些端点运行且可访问，并且SSIS中所有相关的任务和连接都必须支持事务。


    ## 显式SQL事务

    此方法涉及在SSIS中手动创建事务，通过执行T-SQL命令在数据库引擎上启动关系事务。使用这种方法，你实际上是通过使用“执行SQL”任务显式声明初始化和`COMMIT`点（或者在发生错误时`ROLLBACK`）来创建自己的事务容器。在数据库连接上，你需要将`RetainSameConnection`属性设置为`True`，以确保所有操作都重用同一个连接，进而重用同一个事务。虽然这种方法确实需要一些额外的工作，但它是两种支持战略性回滚的事务方法中更直接可靠的一种。


    ## 显式清理

    这种设计模式涉及创建自己的、针对特定环境的清理例程，以回滚因部分加载失败而导致的更改，并且通常不使用数据库事务进行回滚。这种方法在开发和维护方面需要付出最多的努力，但如果你需要有选择地撤销在失败的包执行期间所做的更改，它也为你提供了最大的灵活性。


    ## 未处理错误

    我确信提出墨菲定律的那位先生当时一定是在做数据仓库ETL开发者。处理来自不同系统的数据常常是一个混乱的过程！虽然我们可以防御性地编写代码来处理许多常见问题，但最终某些数据异常还是会引入意外的错误。


    为了确保任何错误或其他数据异常不会导致ETL进程突然终止，建议内置一些安全网来处理任何意外的错误。


    ## 数据仓库ETL工作流

    到目前为止，本章涵盖的大部分内容都是关于数据仓库加载的核心概念。我想简要地转换一下话题，谈谈关于工作流的SSIS包设计。数据仓库ETL系统往往包含许多活动的部分，而开发这些部分的工作量通常分配给多个开发人员。由于吸取了一些惨痛的教训，我开发了一种基于“包原子性”的工作流设计模式。


    ## 工作划分

    我在几次演讲中讲过这个故事，现在想起来依然觉得有趣（至少对我来说）。我部署的第一个重要的生产环境SSIS包，是为了将大量数据从多个遗留系统移动到一个新的SQL
    Server数据库中。起初它看起来相当无害；最初预计ETL逻辑会比最终实际情况简单得多，所以我把所有东西都包装进了一个单独的包里。


    最终，生成的SSIS包变得异常庞大。里面有大约30到40个不同的数据流（有些包含多个源/目标和复杂的转换逻辑），以及几十个其他辅助任务交织在一起。生成的`.dtsx`文件仅XML元数据就大约有5MB！不用说，每次在Visual
    Studio中打开这个包，都需要好几分钟才能完成所有的验证步骤。


    这个极其庞大的SSIS包运行良好，从技术上讲，设计上也没有任何问题。但它的巨大体积确实揭示了一些在使用庞大、包罗万象的包时会遇到的挑战，基于那次经历，我重新设计了我的原子化包设计方法。


    ## 一个包 = 一个工作单元

    关于数据仓库ETL，我发现大多数情况下最佳的解决方案是将逻辑工作单元拆分成独立的包，使每个包只做一件事。通过划分工作量，你可以避免许多潜在的障碍，并提高作为ETL开发人员的生产力。考虑使用较小的SSIS包的一些理由包括：


    *   **减少设计时验证的等待时间：** SQL Server Data Tools拥有一个丰富的界面，除了其他功能外，它在SSDT设计器中提供了近乎实时的潜在元数据问题评估。例如，如果SSIS包访问的某个表被更改，开发人员将在SSDT中看到一个警告（或者在适用时看到一个错误），指示包访问的元数据已更改。这种持续的元数据验证是有益的，因为它可以帮助在问题被推送测试之前识别出潜在问题。然而，这也伴随着性能成本。验证所需的时间随着包大小的增加而增加，因此，将包保持在合理的小尺寸，自然可以减少你坐在桌前等待验证完成的时间。

    *   **更轻松的测试与部署：** 一个加载了，比如说，十个维度的单一包包含很多活动部件。当你在包内开发每个维度时，没有简单的方法来测试包的单个元素（除了在SSDT设计器中手动运行它，这对于最终将部署到服务器的包来说并不是一个完全真实的测试）。对于这样的包，唯一现实的测试是作为基于服务器的执行来测试整个包，如果你只对一两个更改的属性感兴趣，这可能是大材小用。此外，拥有正式软件测试和发布流程的组织通常要求重新测试整个包，而不仅仅是新的或更改的元素。通过将操作分解成更小的单元，你通常可以减轻测试和部署的负担，因为你一次只操作一个组件。

    *   **分布式开发：** 如果你在一个只有你一个人开发SSIS包的环境中工作，这就不那么令人担忧。然而，如果你的工作场所有多个ETL开发人员，那些包罗万象的包就相当不方便了。尽管在SQL
    Server 2012中比较同一包文件的不同版本比之前的版本容易得多，但这仍然是一个基本手动的过程。通过将工作量分割成多个包，将开发任务分配给多个人会容易得多，而无需协调同一包的多个版本。

    *   **可重用性：** 在同一次ETL执行中多次使用相同的逻辑，或者在多个ETL进程之间共享相同的逻辑，这种情况并不少见。当你将这些逻辑工作单元封装在它们自己的包中时，共享该逻辑并避免重复开发就会容易得多。


    这里有可能做得过头。例如，如果在ETL执行过程中，你需要删除或禁用20个表上的索引，你可能不需要为每个索引创建一个包！将操作分解成独立的包，但要现实地看待什么构成一个逻辑工作单元。


    这些并非一成不变的规则，但关于将ETL工作分解为包，在填充数据仓库时，以下是我发现效果良好的几种设计模式：'
  raw: '*   **SSIS transactions:** Integration Services natively has the ability to
    wrap tasks and containers into transactions and, in theory, will reverse any durable
    changes to the relational database in the event of an error in the scope of that
    transaction. In practice, however, I’ve found that using the SSIS transaction
    functionality can be challenging even on a good day. Leveraging transactions directly
    in SSIS requires a lot of things to align at once: all involved systems must support
    DTC transactions, the DTC service must be running and accessible at each of those
    endpoints, and all relevant tasks and connections in SSIS must support transactions.

    *   **Explicit SQL transactions:** This method involves manually creating a transaction
    in SSIS by executing the T-SQL command to engage a relational transaction on the
    database engine. Using this method, you essentially create your own transaction
    container by explicitly declaring the initialization and `COMMIT` point (or `ROLLBACK`,
    in the event of an error) using the Execute SQL task. On the database connection,
    you’ll need to set the `RetainSameConnection` property to `True` to ensure that
    all operations reuse the same connection and, by extension, the same transaction.
    Although this method does require some additional work, it’s the more straightforward
    and reliable of the two transactional methods of strategic rollback.

    *   **Explicit cleanup:** This design pattern involves creating your own environment-specific
    cleanup routines to reverse the changes due to a failed partial load, and it typically
    does not engage database transactions for rollback purposes. This method requires
    the most effort in terms of development and maintenance, but it also allows you
    the greatest amount of flexibility if you need to selectively undo changes made
    during a failed package execution.


    Unhandled Errors


    I’m certain that the gentleman who came up with Murphy’s Law was working as a
    data warehouse ETL developer. Dealing with data from disparate systems is often
    an ugly process! Although we can defensively code around many common issues, eventually
    some data anomaly will introduce unexpected errors.


    To make sure that any error or other data anomaly does not cause the ETL process
    to abruptly terminate, it’s advisable to build in some safety nets to handle any
    unexpected errors.


    Data Warehouse ETL Workflow


    Most of what has been covered in this chapter so far has been core concepts about
    the loading of data warehouses. I’d like to briefly change gears and touch on
    the topic of SSIS package design with respect to workflow. Data warehouse ETL
    systems tend to have a lot of moving parts, and the workload to develop those
    pieces is often distributed to multiple developers. Owing to a few lessons learned
    the hard way, I’ve developed a workflow design pattern of package atomicity.


    Dividing Up the Work


    I’ve told this story in a couple of presentations I’ve done, and it continues
    to be amusing (to me, anyway) to think about ever having done things this way.
    The first production SSIS package of any significance that I deployed was created
    to move a large amount of data from multiple legacy systems into a new SQL Server
    database. It started off rather innocently; it initially appeared that the ETL
    logic would be much simpler than what it eventually became, so I wrapped everything
    into a single package.


    In the end, the resulting SSIS package was enormous. There were 30, maybe 40,
    different data flows (some with multiple sources/destinations and complex transformation
    logic) and dozens of other helper tasks intermingled. The resulting `.dtsx` file
    size was about 5MB just for the XML metadata! Needless to say, every time I opened
    this package in Visual Studio, it would take several minutes to run through all
    of the validation steps.


    This extremely large SSIS package worked fine, and technically there was nothing
    wrong with the design. Its sheer size did bring to light some challenges that
    are present in working with large, do-everything packages, and as a result of
    that experience, I reengineered my methodology for atomic package design.


    One Package = One Unit of Work


    With respect to data warehouse ETL, I’ve found that the best solution in most
    cases is to break apart logical units of work into separate packages in which
    each package does just one thing. By splitting up the workload, you can avoid
    a number of potential snags and increase your productivity as an ETL developer.
    Some of the considerations for smaller SSIS packages include the following:


    *   **Less time spent waiting on design-time validation:** SQL Server Data Tools
    has a rich interface that provides, among other things, a near real-time evaluation
    of potential metadata problems in the SSDT designer. If, for example, a table
    that is accessed by the SSIS package is changed, the developer will be presented
    with a warning (or an error, if applicable) in SSDT indicating that metadata accessed
    by the package has changed. This constant metadata validation is beneficial in
    that it can help to identify potential problems before they are pushed out for
    testing. There’s also a performance cost associated with this. The length of time
    required for validation increases as the size of the package increases, so naturally
    keeping the packages as small as practical will cut down on the amount of time
    you’re drumming your fingers on your desk waiting for validation to complete.

    *   **Easier testing and deployment:** A single package that loads, say, ten dimensions
    has a lot of moving parts. When you are developing each of the dimensions within
    the package, there is no easy way to test just one element of the package (apart
    from manually running it in the SSDT designer, which isn’t a completely realistic
    test for a package that will eventually be deployed to the server). The only realistic
    test for such a package is to test the entire package as a server-based execution,
    which may be overkill if you’re only interested in one or two changed properties.
    Further, it’s not uncommon for organizations with formal software testing and
    promotion procedures to require that the entire thing be retested, not just the
    new or changed elements. By breaking up operations into smaller units, you can
    usually make testing and deployment less of a burden because you are only operating
    on one component at a time.

    *   **Distributed development:** If you work in an environment where you are the
    only person developing SSIS packages, this is less of a concern. However, if your
    shop has multiple ETL developers, those do-everything packages are quite inconvenient.
    Although it’s much easier in SQL Server 2012 than in previous releases to compare
    differences between versions of the same package file, it’s still a mostly manual
    process. By segmenting the workload into multiple packages, it’s much easier to
    farm out development tasks to multiple people without having to reconcile multiple
    versions of the same package.

    *   **Reusability:** It’s not uncommon for the same logic to be used more than
    once in the same ETL execution, or for that same logic to be shared among multiple
    ETL processes. When you encapsulate these logical units of work into their own
    packages, it’s much easier to share that logic and avoid duplicate development.


    It is possible to go overboard here. For example, if, during the course of the
    ETL execution, you need to drop or disable indexes on 20 tables, you probably
    don’t need to create a package for each index! Break operations up into individual
    packages, but be realistic about what constitutes a logical unit of work.


    These aren’t hard and fast rules, but with respect to breaking up ETL work into
    packages, here are a few design patterns that I’ve found work well when populating
    a data warehouse:'
