- fmt: "# SSIS 包部署\n\n## 使用 PowerShell 部署\n\nSSIS 管理对象模型（MOM）可通过 PowerShell 访问，这使得使用\
    \ PowerShell 脚本完全自动化你的部署（及其他管理任务）成为可能。`Listing 18-3` 展示了 `Listing 18-2` 中简单部署应用程序的\
    \ PowerShell 版本。\n\n**Listing 18-3**. 使用 PowerShell 部署项目\n\n```powershell\n# Variables\n\
    $ProjectFilePath = \"C:\\ETL\\Project.ispac\"\n$ProjectName = \"Project\"\n$FolderName\
    \ = \"MyFolder\"\n\n# Load the IntegrationServices Assembly\n$loadStatus = [Reflection.Assembly]::Load(\"\
    Microsoft.SqlServer.Management.IntegrationServices, Version=12.0.0.0, Culture=neutral,\
    \ PublicKeyToken=89845dcd8080cc91\")\n\n# Store the IntegrationServices Assembly\
    \ namespace to avoid typing it every time\n$ISNamespace = \"Microsoft.SqlServer.Management.IntegrationServices\"\
    \n\nWrite-Host \"Connecting to server ...\"\n\n# Create a connection to the server\n\
    $sqlConnectionString = \"Data Source=localhost;Initial Catalog=master;Integrated\
    \ Security=SSPI;\"\n$sqlConnection = New-Object System.Data.SqlClient.SqlConnection\
    \ $sqlConnectionString\n\n# Create the Integration Services object\n$integrationServices\
    \ = New-Object $ISNamespace\".IntegrationServices\" $sqlConnection\n$catalog =\
    \ $integrationServices.Catalogs[\"SSISDB\"]\n\nWrite-Host \"Creating Folder\"\
    \ $FolderName \"...\"\n\n# Create a new folder\n$folder = New-Object $ISNamespace\"\
    .CatalogFolder\" ($catalog, $FolderName, \"This is a folder description\")\n$folder.Create()\n\
    \nWrite-Host \"Deploying\" $ProjectName \"project ...\"\n\n# Read the project\
    \ file, and deploy it to the folder\n[byte[]] $projectFile = [System.IO.File]::ReadAllBytes($ProjectFilePath)\n\
    $project = $folder.DeployProject($ProjectName, $projectFile)\n\nWrite-Host \"\
    All done.\"\n```\n\n## 使用 SQL 部署\n\n如果你更喜欢使用 T-SQL 完成所有数据库管理和部署，SSIS 目录通过一组视图和存储过程暴露了完整的管理接口。`Listing\
    \ 18-4` 提供了一个示例，它以二进制格式加载项目文件，使用 `[catalog].[deploy_project]` 存储过程将其部署到文件夹中，然后从\
    \ `[catalog].[operations]` 视图查询部署状态。\n\n**Listing 18-4**. 使用 SQL API 部署项目\n\n\
    ```sql\nuse SSISDB\n\nDECLARE @ProjectBinary as varbinary(max)\nDECLARE @OperationID\
    \ as bigint\n\n-- load the project file\nSET @ProjectBinary = (\n  SELECT *\n\
    \  FROM OPENROWSET\n  (\n    BULK 'C:\\ETL\\Project.ispac',\n    SINGLE_BLOB\n\
    \  ) as BinaryData\n)\n\n-- deploy the project\nEXEC [catalog].[deploy_project]\n\
    \        'MyFolder',      -- folder\n        'Project',       -- project name\n\
    \        @ProjectBinary,  -- binary data\n        @OperationID out -- operation\
    \ id\n\n-- -- Get the status of the last deployment --\nDECLARE @LastDeployment_id\
    \ bigint;\nSET @LastDeployment_id = (\n  SELECT MAX(operation_id)\n  FROM   [catalog].[operations]\n\
    \  WHERE  operation_type = 101 -- deploy\n)\n\nSELECT [object_name], start_time,\
    \ end_time, [status], [value] =\n  case\n        when [status] = 1 then N'Created'\n\
    \        when [status] = 2 then N'Running'\n        when [status] = 3 then N'Canceled'\n\
    \        when [status] = 4 then N'Failed'\n        when [status] = 5 then N'Pending'\n\
    \        when [status] = 6 then N'Unexpected Termination'\n        when [status]\
    \ = 7 then N'Succeeded'\n        when [status] = 8 then N'Stopping'\n        when\
    \ [status] = 9 then N'Completed'\n  end\nFROM   [catalog].[operations]\nWHERE\
    \  [operation_id] = @LastDeployment_id\n```\n\n## 包部署模型\n\n在 SQL Server 2012 中创建的\
    \ SSIS 项目默认使用项目部署模型，但有些用户可能希望继续使用 SQL Server 2005 和 2008 的包部署模型。\n\n你可以在 Visual\
    \ Studio 中通过右键单击解决方案资源管理器中的项目名称并选择“转换为包部署模型”（如 `Figure 18-4` 所示）来将项目部署模型转换为包部署模型。最初在早期版本的\
    \ SQL Server 中创建的项目在 SSDT-BI 中打开时，会自动以包部署模型开始。\n\n![9781484200834_Fig18-04.jpg](images/9781484200834_Fig18-04.jpg)\n\
    \n**Figure 18-4**. 转换为包部署模型\n\n> **注意**  当使用包部署模型时，你将无法使用 SQL Server 2012 引入的一些新功能，例如参数和项目引用。如果你的任何包使用了这些功能，SSDT-BI\
    \ 将不允许你转换为包部署模型。\n\n`Table 18-2` 列出了使用包部署模型时会用到的部署位置，并简要描述了每种方法的优点。\n\n**Table\
    \ 18-2**. 使用包部署模型时的部署位置\n\n| 位置 | 说明 |\n| --- | --- |\n| 文件系统 | • 镜像你在 SSDT-BI\
    \ 中开发时的结构<br>• 不需要数据库权限<br>• 部署是简单的文件复制 |\n| SQL Server (MSDB) | • 备份和维护是常规 SQL\
    \ 功能的一部分<br>• 对包访问和安全性有更细粒度的控制<br>• 通过 `DTSInstall.exe`（旧版部署向导）、SSIS 对象模型或 `dtutil.exe`\
    \ 进行部署 |\n| 包存储 (SSIS 服务) | • 提供文件系统和 MSDB 存储位置之上的一个外观，允许你更改包的物理位置，但保持相同的逻辑路径<br>•\
    \ 从一个位置管理多个存储位置<br>• 通过 SSMS、SSIS 对象模型或 `dtutil.exe` 进行部署<br>• 访问需要特殊的 DCOM 权限配置\
    \ |\n\n> **注意**  你不能使用包存储接口来管理部署到 SSIS 目录的包。该服务只能与存储在 MSDB（2005 和 2008 部署模型）中的包交互，并且是为了继续支持尚未迁移到新项目部署模型的用户而存在的。未来可能会被弃用。\n\
    \n## 结论\n\n在 SQL Server 2012 中，SSIS 包的部署过程被大大简化了。虽然 SQL Server 2005 和 2008 中使用的部署模型（现在称为包部署模型）仍然完全受支持，但对于新的数据集成项目，强烈建议迁移到新的项目部署模型。SSIS\
    \ 提供了多种部署到 SSIS 目录的方法，为你提供了将部署过程融入你的环境所需的灵活性。\n\n# 第 19 章\n\n## 商业智能标记语言\n\n你购买这本书很可能是为了学习如何成为更高效的\
    \ SQL Server Integration Services (SSIS) 开发人员。我赞赏你的愿望和决定，并真诚地希望本书中包含的信息提供了帮助你提高生产力的想法和方法。我一直在寻找成为更好的数据集成开发人员的方法。具体来说，我寻求提高代码质量和减少构建解决方案所需时间的方法。这些目标最初促使我开始实践基于模式的开发，这最终催生了本书的想法。\n\
    \n商业智能标记语言（Business Intelligence Markup Language）或 Biml，使用 XML 表示 SSIS 包。通过将描述\
    \ SSIS 包的元数据存储在 XML 中，Biml 从特定领域语言的角度处理数据集成开发。Biml 提供了另一种实现 SSIS 设计模式的方法——除了包含模板包的\
    \ SSIS 包库之外的方法。"
  raw: 'DeployProject(project);     } } ```    Deployment Using PowerShell    The
    SSIS Management Object Model (MOM) is accessible via PowerShell, which makes it
    possible to fully automate your deployment (and other management tasks) using
    PowerShell scripts. [Listing 18-3](#9781484200834_Ch18.xhtml#list3) shows the
    PowerShell version of the simple deployment application from [Listing 18-2](#9781484200834_Ch18.xhtml#list2).    [***Listing
    18-3***](#9781484200834_Ch18.xhtml#_list3). Deploying a project using PowerShell    ```
    # Variables $ProjectFilePath = "C:\ETL\Project.ispac" $ProjectName = "Project"
    $FolderName = "MyFolder"  # Load the IntegrationServices Assembly $loadStatus
    = [Reflection.Assembly]::Load("Microsoft.SqlServer.Management.IntegrationServices,
    Version=12.0.0.0, Culture=neutral, PublicKeyToken=89845dcd8080cc91")  # Store
    the IntegrationServices Assembly namespace to avoid typing it every time $ISNamespace
    = "Microsoft.SqlServer.Management.IntegrationServices"  Write-Host "Connecting
    to server ..."  # Create a connection to the server $sqlConnectionString = "Data
    Source=localhost;Initial Catalog=master;Integrated Security=SSPI;" $sqlConnection
    = New-Object System.Data.SqlClient.SqlConnection $sqlConnectionString  # Create
    the Integration Services object $integrationServices = New-Object $ISNamespace".IntegrationServices"
    $sqlConnection $catalog = $integrationServices.Catalogs["SSISDB"]  Write-Host
    "Creating Folder" $FolderName "..."  # Create a new folder $folder = New-Object
    $ISNamespace".CatalogFolder" ($catalog, $FolderName, "This is a folder description")
    $folder.Create()  Write-Host "Deploying" $ProjectName "project ..."  # Read the
    project file, and deploy it to the folder [byte[]] $projectFile = [System.IO.File]::ReadAllBytes($ProjectFilePath)
    $project = $folder.DeployProject($ProjectName, $projectFile)  Write-Host "All
    done." ```    Deployment Using SQL    If you prefer to do all of your database
    management and deployments using T-SQL, the SSIS Catalog exposes a full management
    interface through a set of Views and Stored Procedures. [Listing 18-4](#9781484200834_Ch18.xhtml#list4)
    provides a sample that loads a project file in binary format, deploys it to a
    folder using the `[catalog].[deploy_project]` stored procedure, and then queries
    the status of the deployment from the `[catalog].[operations]` view.    [***Listing
    18-4***](#9781484200834_Ch18.xhtml#_list4). Deploying a project using the SQL
    API    ``` use SSISDB  DECLARE @ProjectBinary as varbinary(max) DECLARE @OperationID
    as bigint  -- load the project file SET @ProjectBinary = (   SELECT *   FROM OPENROWSET
      (     BULK ''C:\ETL\Project.ispac'',     SINGLE_BLOB   ) as BinaryData )  --
    deploy the project EXEC [catalog].[deploy_project]         ''MyFolder'',      
    -- folder         ''Project'',        -- project name         @ProjectBinary,  
    -- binary data         @OperationID out  -- operation id  -- -- Get the status
    of the last deployment --  DECLARE @LastDeployment_id bigint; SET @LastDeployment_id
    = (   SELECT MAX(operation_id)   FROM   [catalog].[operations]   WHERE  operation_type
    = 101  -- deploy )  SELECT [object_name], start_time, end_time, [status], [value]
    =   case         when [status] = 1 then N''Created''         when [status] = 2
    then N''Running''         when [status] = 3 then N''Canceled''         when [status]
    = 4 then N''Failed''         when [status] = 5 then N''Pending''         when
    [status] = 6 then N''Unexpected Termination''         when [status] = 7 then N''Succeeded''
            when [status] = 8 then N''Stopping''         when [status] = 9 then N''Completed''
      end FROM   [catalog].[operations] WHERE  [operation_id] = @LastDeployment_id
    ```    Package Deployment Model    SSIS projects created in SQL Server 2012 will
    default to the Project Deployment Model, but some users may want to continue using
    the Package Deployment Model from SQL Server 2005 and 2008\.


    You can convert from the Project Deployment Model to the Package Deployment Model
    in Visual Studio by right clicking on the project name in Solution Explorer, and
    selecting Convert to Package Deployment Model (as shown in [Figure 18-4](#9781484200834_Ch18.xhtml#Fig4)).
    Projects that were originally created in previous versions of SQL Server will
    automatically start off in the Package Deployment Model when you open them in
    SSDT-BI.    ![9781484200834_Fig18-04.jpg](images/9781484200834_Fig18-04.jpg)    [Figure
    18-4](#9781484200834_Ch18.xhtml#_Fig4). Converting to the Package Deployment Model    ![Image](images/sq.jpg) **Note**  When
    using the Package Deployment Model, you will not be able to use some of the new
    functionality introduced in SQL Server 2012, such as Parameters and Project References.
    If any of your packages are using these features, SSDT-BI will not let you convert
    to the Package Deployment Model.    [Table 18-2](#9781484200834_Ch18.xhtml#Tab2)
    lists the deployment locations you would use with the Package Deployment Model,
    and briefly describes the advantages of each approach.    [Table 18-2](#9781484200834_Ch18.xhtml#_Tab2).
    Deployment locations when using the Package Deployment Model     | Location |
    Notes | | --- | --- | | File System | •    Mirrors the structure you have when
    developing in SSDT-BI•    Doesn’t require database permissions•    Deployment
    is a simple file copy | | SQL Server (MSDB) | •    Backup and maintenance part
    of regular SQL functionality•    Finer control over package access and security•    Deploys
    through DTSInstall.exe (legacy deployment wizard), the SSIS object model, or dtutil.exe
    | | Package Store (SSIS Service) | •    Provides a façade over the File System
    and MSDB storage locations, allowing you to change the physical location of a
    package, yet keep the same logical path•    Manages multiple storage locations
    from a single place•    Deploys through SSMS, the SSIS object model, or dtutil.exe•    Requires
    special DCOM permission configuration for access |    ![Image](images/sq.jpg) **Note**  You
    cannot use the Package Store interface to manage packages deployed to the SSIS
    Catalog. The service is only able to interact with packages stored in MSDB (the
    2005, and 2008 deployment model), and is there to continue supporting users who
    have not migrated to the new Project Deployment Model. It may be depreciated in
    the future.    Conclusion    The deployment process for SSIS packages was greatly
    simplified in SQL Server 2012\. Although the deployment model used in SQL Server
    2005 and 2008 (now called the Package Deployment Model) is still fully supported,
    moving to the new Project Deployment Model is highly recommended for new data
    integration projects. SSIS provides a number of ways to deploy to the SSIS Catalog,
    providing the flexibility you need to fit the deployment process into your environment.    CHAPTER
    19    ![image](images/frontdot.jpg)    Business Intelligence Markup Language    You
    likely purchased this book to learn how to be a more productive SQL Server Integration
    Services (SSIS) developer. I applaud your desire and decision, and I sincerely
    hope the information contained herein has provided ideas and information to help
    you be more productive. I am always on the lookout for ways to become a better
    data integration developer. Specifically, I seek out ways to improve code quality
    and reduce the amount of time required to build solutions. Those goals are what
    motivated me to begin practicing patterns-based development in the first place,
    which eventually led to the idea for this book.    Business Intelligence Markup
    Language—or Biml—represents SSIS packages using XML. By storing metadata that
    describes SSIS packages in XML, Biml approaches data integration development from
    the perspective of a domain-specific language. Biml provides another means to
    materialize SSIS design patterns—something other than an SSIS package library
    containing template packages.'
  trans: "# SSIS 包部署\n\n## 使用 PowerShell 部署\n\nSSIS 管理对象模型（MOM）可通过 PowerShell 访问，这使得使用\
    \ PowerShell 脚本完全自动化你的部署（及其他管理任务）成为可能。`Listing 18-3` 展示了 `Listing 18-2` 中简单部署应用程序的\
    \ PowerShell 版本。\n\n**Listing 18-3**. 使用 PowerShell 部署项目\n\n```powershell\n# Variables\n\
    $ProjectFilePath = \"C:\\ETL\\Project.ispac\"\n$ProjectName = \"Project\"\n$FolderName\
    \ = \"MyFolder\"\n\n# Load the IntegrationServices Assembly\n$loadStatus = [Reflection.Assembly]::Load(\"\
    Microsoft.SqlServer.Management.IntegrationServices, Version=12.0.0.0, Culture=neutral,\
    \ PublicKeyToken=89845dcd8080cc91\")\n\n# Store the IntegrationServices Assembly\
    \ namespace to avoid typing it every time\n$ISNamespace = \"Microsoft.SqlServer.Management.IntegrationServices\"\
    \n\nWrite-Host \"Connecting to server ...\"\n\n# Create a connection to the server\n\
    $sqlConnectionString = \"Data Source=localhost;Initial Catalog=master;Integrated\
    \ Security=SSPI;\"\n$sqlConnection = New-Object System.Data.SqlClient.SqlConnection\
    \ $sqlConnectionString\n\n# Create the Integration Services object\n$integrationServices\
    \ = New-Object $ISNamespace\".IntegrationServices\" $sqlConnection\n$catalog =\
    \ $integrationServices.Catalogs[\"SSISDB\"]\n\nWrite-Host \"Creating Folder\"\
    \ $FolderName \"...\"\n\n# Create a new folder\n$folder = New-Object $ISNamespace\"\
    .CatalogFolder\" ($catalog, $FolderName, \"This is a folder description\")\n$folder.Create()\n\
    \nWrite-Host \"Deploying\" $ProjectName \"project ...\"\n\n# Read the project\
    \ file, and deploy it to the folder\n[byte[]] $projectFile = [System.IO.File]::ReadAllBytes($ProjectFilePath)\n\
    $project = $folder.DeployProject($ProjectName, $projectFile)\n\nWrite-Host \"\
    All done.\"\n```\n\n## 使用 SQL 部署\n\n如果你更喜欢使用 T-SQL 完成所有数据库管理和部署，SSIS 目录通过一组视图和存储过程暴露了完整的管理接口。`Listing\
    \ 18-4` 提供了一个示例，它以二进制格式加载项目文件，使用 `[catalog].[deploy_project]` 存储过程将其部署到文件夹中，然后从\
    \ `[catalog].[operations]` 视图查询部署状态。\n\n**Listing 18-4**. 使用 SQL API 部署项目\n\n\
    ```sql\nuse SSISDB\n\nDECLARE @ProjectBinary as varbinary(max)\nDECLARE @OperationID\
    \ as bigint\n\n-- load the project file\nSET @ProjectBinary = (\n  SELECT *\n\
    \  FROM OPENROWSET\n  (\n    BULK 'C:\\ETL\\Project.ispac',\n    SINGLE_BLOB\n\
    \  ) as BinaryData\n)\n\n-- deploy the project\nEXEC [catalog].[deploy_project]\n\
    \        'MyFolder',      -- folder\n        'Project',       -- project name\n\
    \        @ProjectBinary,  -- binary data\n        @OperationID out -- operation\
    \ id\n\n-- -- Get the status of the last deployment --\nDECLARE @LastDeployment_id\
    \ bigint;\nSET @LastDeployment_id = (\n  SELECT MAX(operation_id)\n  FROM   [catalog].[operations]\n\
    \  WHERE  operation_type = 101 -- deploy\n)\n\nSELECT [object_name], start_time,\
    \ end_time, [status], [value] =\n  case\n        when [status] = 1 then N'Created'\n\
    \        when [status] = 2 then N'Running'\n        when [status] = 3 then N'Canceled'\n\
    \        when [status] = 4 then N'Failed'\n        when [status] = 5 then N'Pending'\n\
    \        when [status] = 6 then N'Unexpected Termination'\n        when [status]\
    \ = 7 then N'Succeeded'\n        when [status] = 8 then N'Stopping'\n        when\
    \ [status] = 9 then N'Completed'\n  end\nFROM   [catalog].[operations]\nWHERE\
    \  [operation_id] = @LastDeployment_id\n```\n\n## 包部署模型\n\n在 SQL Server 2012 中创建的\
    \ SSIS 项目默认使用项目部署模型，但有些用户可能希望继续使用 SQL Server 2005 和 2008 的包部署模型。\n\n你可以在 Visual\
    \ Studio 中通过右键单击解决方案资源管理器中的项目名称并选择“转换为包部署模型”（如 `Figure 18-4` 所示）来将项目部署模型转换为包部署模型。最初在早期版本的\
    \ SQL Server 中创建的项目在 SSDT-BI 中打开时，会自动以包部署模型开始。\n\n![9781484200834_Fig18-04.jpg](img/9781484200834_Fig18-04.jpg)\n\
    \n**Figure 18-4**. 转换为包部署模型\n\n> **注意**  当使用包部署模型时，你将无法使用 SQL Server 2012 引入的一些新功能，例如参数和项目引用。如果你的任何包使用了这些功能，SSDT-BI\
    \ 将不允许你转换为包部署模型。\n\n`Table 18-2` 列出了使用包部署模型时会用到的部署位置，并简要描述了每种方法的优点。\n\n**Table\
    \ 18-2**. 使用包部署模型时的部署位置\n\n| 位置 | 说明 |\n| --- | --- |\n| 文件系统 | • 镜像你在 SSDT-BI\
    \ 中开发时的结构<br>• 不需要数据库权限<br>• 部署是简单的文件复制 |\n| SQL Server (MSDB) | • 备份和维护是常规 SQL\
    \ 功能的一部分<br>• 对包访问和安全性有更细粒度的控制<br>• 通过 `DTSInstall.exe`（旧版部署向导）、SSIS 对象模型或 `dtutil.exe`\
    \ 进行部署 |\n| 包存储 (SSIS 服务) | • 提供文件系统和 MSDB 存储位置之上的一个外观，允许你更改包的物理位置，但保持相同的逻辑路径<br>•\
    \ 从一个位置管理多个存储位置<br>• 通过 SSMS、SSIS 对象模型或 `dtutil.exe` 进行部署<br>• 访问需要特殊的 DCOM 权限配置\
    \ |\n\n> **注意**  你不能使用包存储接口来管理部署到 SSIS 目录的包。该服务只能与存储在 MSDB（2005 和 2008 部署模型）中的包交互，并且是为了继续支持尚未迁移到新项目部署模型的用户而存在的。未来可能会被弃用。\n\
    \n## 结论\n\n在 SQL Server 2012 中，SSIS 包的部署过程被大大简化了。虽然 SQL Server 2005 和 2008 中使用的部署模型（现在称为包部署模型）仍然完全受支持，但对于新的数据集成项目，强烈建议迁移到新的项目部署模型。SSIS\
    \ 提供了多种部署到 SSIS 目录的方法，为你提供了将部署过程融入你的环境所需的灵活性。\n\n# 第 19 章\n\n## 商业智能标记语言\n\n你购买这本书很可能是为了学习如何成为更高效的\
    \ SQL Server Integration Services (SSIS) 开发人员。我赞赏你的愿望和决定，并真诚地希望本书中包含的信息提供了帮助你提高生产力的想法和方法。我一直在寻找成为更好的数据集成开发人员的方法。具体来说，我寻求提高代码质量和减少构建解决方案所需时间的方法。这些目标最初促使我开始实践基于模式的开发，这最终催生了本书的想法。\n\
    \n商业智能标记语言（Business Intelligence Markup Language）或 Biml，使用 XML 表示 SSIS 包。通过将描述\
    \ SSIS 包的元数据存储在 XML 中，Biml 从特定领域语言的角度处理数据集成开发。Biml 提供了另一种实现 SSIS 设计模式的方法——除了包含模板包的\
    \ SSIS 包库之外的方法。"
- fmt: "Regardless of which mechanism is used, storing design patterns facilitates\
    \ code production at a consistent and repeatable quality. That may sound innocuous,\
    \ but I assure you it is important; and it is one of the primary reasons to use\
    \ design patterns in the first place.\n\n`Biml` is a complex language. You would\
    \ do well to gain an understanding of domain-specific languages, `XML`, and `.NET`\
    \ development before diving into `Biml` development proper. I will not delve into\
    \ the underlying architecture of `Biml` in this chapter. I will show you some\
    \ of the mechanisms and direct you to the `Biml` documentation websites: the `Biml`\
    \ Language (`www.varigence.com/Documentation/Language/Index`) and the `Biml` Api\
    \ (`www.varigence.com/Documentation/Api/Index`). I believe this is enough to whet\
    \ your appetite while I am demonstrating the power of `Biml`.\n\n## A Brief History\
    \ of Business Intelligence Markup Language\n\nIn early 2007, the Microsoft Customer\
    \ Service and Support (`CSS`) business incubated a new approach to building business\
    \ intelligence (`BI`) solutions. As the organization responsible for managing\
    \ all frontline customer support interactions, `CSS` has significant analytical\
    \ and predictive needs—across data from a wide variety of sources. To accelerate\
    \ the development of its internal solutions, `CSS` began developing the `Vulcan`\
    \ project, which used an `XML`-based markup language to describe a subset of `SISS`\
    \ packages. This created a model where business intelligence solutions could be\
    \ developed more rapidly and iteratively by globally distributed teams of `BI`\
    \ developers.\n\nAfter a period of significant success building new `BI` capabilities,\
    \ the `CSS` and the `SQL Server` product team decided to publish the source code\
    \ for the `Vulcan` project on `CodePlex` to enable customers to try the technology\
    \ and begin building a community around it (`http://vulcan.codeplex.com`). Feedback\
    \ from customers showed that they recognized that the approach was powerful and\
    \ promising, but that the implementation reflected the project’s status as an\
    \ internal tool used to accelerate an operational delivery team. Without documentation\
    \ and training resources, usability considerations, and additional features, the\
    \ cost of adopting `Vulcan` was prohibitive for all but the most determined customers.\n\
    \nIn late 2008, Scott Currie, who worked with the `Vulcan` technology in `CSS`,\
    \ founded `Varigence`, Inc. `Varigence` created the Business Intelligence Markup\
    \ Language (`Biml`), along with tools to enable its design and development. Although\
    \ `Biml` didn’t directly use any code or technology from `Vulcan`, the approach\
    \ taken by the `Vulcan` project inspired the `Varigence` team to build `Biml`\
    \ as an `XML`-based markup language with rapid, iterative global team development\
    \ capabilities in mind.\n\n`Biml` is now available in proprietary products and\
    \ open source projects and has been published as an open language specification.\
    \ `Varigence` has developed a `Biml` compiler that enables a wide variety of automation\
    \ and multitargeting capabilities. Additionally, `Varigence` offers an Integrated\
    \ Development Environment (`IDE`) for `Biml` called `Mist`. `Mist` enables rapid\
    \ and visual design and debugging features for `Biml`. The open source `BIDS Helper`\
    \ project includes `Biml` functionality, enabling anyone to write and execute\
    \ `Biml` code for free.\n\nIn this chapter, we will leverage the free `Biml` functionality\
    \ included with `BIDS Helper` to dynamically generate `SSIS` packages.\n\n![Image](images/sq.jpg)\
    \ **Note** An object containing Business Intelligence Markup Language is a *Biml\
    \ file*. `Biml` files are “executed” to generate `SSIS` packages.\n\n## Building\
    \ Your First Biml File\n\nBefore we get started with Business Intelligence Markup\
    \ Language, you will need to download and install the latest version of `BIDS\
    \ Helper` from `http://bidshelper.codeplex.com`. Once it is installed, create\
    \ a new `SSIS` solution and project named **Biml2014**. In Solution Explorer,\
    \ right-click the project name and click Add New Biml File. The new file, `BimlScript.biml`,\
    \ will be created and assigned to the Miscellaneous virtual folder in Solution\
    \ Explorer. Double-click the file to open it in the editor.\n\nThe file begins\
    \ with the most basic `Biml` construct, as shown in [Listing 19-1](#9781484200834_Ch19.xhtml#list1).\n\
    \n[***Listing 19-1***](#9781484200834_Ch19.xhtml#_list1). Initial Biml Code\n\n\
    ```xml\n<Biml xmlns=\"http://schemas.varigence.com/biml.xsd\">\n</Biml>\n```\n\
    \nAdd `XML` so that your `Biml` file reads as shown in [Listing 19-2](#9781484200834_Ch19.xhtml#list2).\
    \ As you type, note `IntelliSense` auto-indents `XML` tags to produce well-formed\
    \ code that is easier to read.\n\n[***Listing 19-2***](#9781484200834_Ch19.xhtml#_list2).\
    \ Biml After Adding Package XML Metadata\n\n```xml\n<Biml xmlns=\"http://schemas.varigence.com/biml.xsd\"\
    >\n  <Packages>\n    <Package Name=\"TestBimlPackage\" ConstraintMode=\"Parallel\"\
    >\n    </Package>\n  </Packages>\n</Biml>\n```\n\nSave the file, right-click `BimlScript.biml`\
    \ in Solution Explorer, and then click Generate SSIS Packages. [Figure 19-1](#9781484200834_Ch19.xhtml#Fig1)\
    \ shows that a new `SSIS` package named `TestBimlPackage.dtsx` is created in the\
    \ project and file system. The package shows up in Solution Explorer as part of\
    \ this project.\n\n![9781484200834_Fig19-01.jpg](images/9781484200834_Fig19-01.jpg)\n\
    \n[Figure 19-1](#9781484200834_Ch19.xhtml#_Fig1). TestBimlPackage.dtsx\n\nLet’s\
    \ return to the `BimlScript.biml` file and add a task. Create a new `XML` node\
    \ beneath the `<Package>` tag named **Tasks**. Between the `<Tasks>` and `</Tasks>`\
    \ tags, add a new node named **ExecuteSQL**.\n\n![Image](images/sq.jpg) **Tip**\
    \ If you are not seeing `IntelliSense` with `Biml`, follow this link: `http://bidshelper.codeplex.com/wikipage?title=Manually%20Configuring%20Biml%20Package%20Generator&referringTitle=xcopy%20deploy`\
    \ for `Biml` `IntelliSense` configuration instructions.\n\nAdd an attribute to\
    \ the `ExecuteSQL` root node named `Name` and set its value to **“Test Select”**.\
    \ Create a new `XML` node between the `<ExecuteSQL>` and `</ExecuteSQL>` tags\
    \ named **DirectInput**. Between the `<DirectInput>` and `</DirectInput>` tags,\
    \ add the `T-SQL` statement **Select 1 As One**. If you are playing along at home,\
    \ your `BimlScript.biml` file should look like [Listing 19-3](#9781484200834_Ch19.xhtml#list3).\n\
    \n[***Listing 19-3***](#9781484200834_Ch19.xhtml#_list3). Biml After Adding Initial\
    \ Metadata Describing an Execute SQL Task\n\n```xml\n<Biml xmlns=\"http://schemas.varigence.com/biml.xsd\"\
    >\n  <Packages>\n    <Package Name=\"TestBimlPackage\" ConstraintMode=\"Parallel\"\
    >\n      <Tasks>\n        <ExecuteSQL Name=\"Test Select\">\n          <DirectInput>Select\
    \ 1 As One</DirectInput>\n        </ExecuteSQL>\n      </Tasks>\n    </Package>\n\
    \  </Packages>\n</Biml>\n```\n\nTo test, save the file and generate the `SSIS`\
    \ package from `BimlScript.biml` in Solution Explorer. (Generate the package by\
    \ right-clicking on the Biml file and selecting Generate SSIS Packages from the\
    \ context-sensitive menu). Do you get an error similar to that displayed in [Figure\
    \ 19-2](#9781484200834_Ch19.xhtml#Fig2)? You should get such an error.\n\n![9781484200834_Fig19-02.jpg](images/9781484200834_Fig19-02.jpg)\n\
    \n[Figure 19-2](#9781484200834_Ch19.xhtml#_Fig2). Missing ConnectionName attribute\n\
    \nThe Business Intelligence Markup Language engine includes validation functionality\
    \ and it caught the error in [Figure 19-2](#9781484200834_Ch19.xhtml#Fig2). You\
    \ can invoke a validation from Solution Explorer; simply right-click `BimlScript.biml`\
    \ and then click Check Biml For Errors.\n\nTo fix the error, we need to add a\
    \ `ConnectionName` attribute to the `ExecuteSQL` tag. But we don’t have a connection\
    \ specified at this time. To create a connection, return to the top of `BimlScript.biml`\
    \ and add a new line just after the `Biml` tag and before the `Packages` tag.\
    \ On this line, add the `Connections` `XML` node. Inside the `<Connections>` and\
    \ `</Connections>` tags, add a `Connection` `XML` node. A `Connection` `XML` node\
    \ requires two attributes, `Name` and `ConnectionString`."
  raw: 'Regardless of which mechanism is used, storing design patterns facilitates
    code production at a consistent and repeatable quality. That may sound innocuous,
    but I assure you it is important; and it is one of the primary reasons to use
    design patterns in the first place.    Biml is a complex language. You would do
    well to gain an understanding of domain-specific languages, XML, and .NET development
    before diving into Biml development proper. I will not delve into the underlying
    architecture of Biml in this chapter. I will show you some of the mechanisms and
    direct you to the Biml documentation websites: the Biml Language (`www.varigence.com/Documentation/Language/Index``)`
    and the Biml Api (`www.varigence.com/Documentation/Api/Index``)`. I believe this
    is enough to whet your appetite while I am demonstrating the power of Biml.    A
    Brief History of Business Intelligence Markup Language    In early 2007, the Microsoft
    Customer Service and Support (CSS) business incubated a new approach to building
    business intelligence (BI) solutions. As the organization responsible for managing
    all frontline customer support interactions, CSS has significant analytical and
    predictive  needs—across data from a wide variety of sources. To accelerate the
    development of its internal solutions, CSS began developing the Vulcan project,
    which used an XML-based markup language to describe a subset of SISS packages.
    This created a model where business intelligence solutions could be developed
    more rapidly and iteratively by globally distributed teams of BI developers.    After
    a period of significant success building new BI capabilities, the CSS and the
    SQL Server product team decided to publish the source code for the Vulcan project
    on CodePlex to enable customers to try the technology and begin building a community
    around it (`http://vulcan.codeplex.com`). Feedback from customers showed that
    they recognized that the approach was powerful and promising, but that the implementation
    reflected the project’s status as an internal tool used to accelerate an operational
    delivery team. Without documentation and training resources, usability considerations,
    and additional features, the cost of adopting Vulcan was prohibitive for all but
    the most determined customers.    In late 2008, Scott Currie, who worked with
    the Vulcan technology in CSS, founded Varigence, Inc. Varigence created the Business
    Intelligence Markup Language (Biml), along with tools to enable its design and
    development. Although Biml didn’t directly use any code or technology from Vulcan,
    the approach taken by the Vulcan project inspired the Varigence team to build
    Biml as an XML-based markup language with rapid, iterative global team development
    capabilities in mind.    Biml is now available in proprietary products and open
    source projects and has been published as an open language specification. Varigence
    has developed a Biml compiler that enables a wide variety of automation and multitargeting
    capabilities. Additionally, Varigence offers an Integrated Development Environment
    (IDE) for Biml called Mist. Mist enables rapid and visual design and debugging
    features for Biml. The open source BIDS Helper project includes Biml functionality,
    enabling anyone to write and execute Biml code for free.    In this chapter, we
    will leverage the free Biml functionality included with BIDS Helper to dynamically
    generate SSIS packages.    ![Image](images/sq.jpg) **Note**  An object containing
    Business Intelligence Markup Language is a *Biml file*. Biml files are “executed”
    to generate SSIS packages.    Building Your First Biml File    Before we get started
    with Business Intelligence Markup Language, you will need to download and install
    the latest version of BIDS Helper from `http://bidshelper.codeplex.com`. Once
    it is installed, create a new SSIS solution and project named **Biml2014**. In
    Solution Explorer, right-click the project name and click Add New Biml File. The
    new file, `BimlScript.


    biml`, will be created and assigned to the Miscellaneous virtual folder in Solution
    Explorer. Double-click the file to open it in the editor.    The file begins with
    the most basic Biml construct, as shown in [Listing 19-1](#9781484200834_Ch19.xhtml#list1).    [***Listing
    19-1***](#9781484200834_Ch19.xhtml#_list1). Initial Biml Code    ``` <Biml xmlns="http://schemas.varigence.com/biml.xsd">
    </Biml> ```    Add XML so that your Biml file reads as shown in [Listing 19-2](#9781484200834_Ch19.xhtml#list2).
    As you type, note IntelliSense auto-indents XML tags to produce well-formed code
    that is easier to read.    [***Listing 19-2***](#9781484200834_Ch19.xhtml#_list2).
    Biml After Adding Package XML Metadata    ``` <Biml xmlns="http://schemas.varigence.com/biml.xsd">
      <Packages>     <Package Name="TestBimlPackage" ConstraintMode="Parallel">     </Package>
      </Packages> </Biml> ```    Save the file, right-click `BimlScript.biml` in Solution
    Explorer, and then click Generate SSIS Packages. [Figure 19-1](#9781484200834_Ch19.xhtml#Fig1)
    shows that a new SSIS package named `TestBimlPackage.dtsx` is created in the project
    and file system. The package shows up in Solution Explorer as part of this project.    ![9781484200834_Fig19-01.jpg](images/9781484200834_Fig19-01.jpg)    [Figure
    19-1](#9781484200834_Ch19.xhtml#_Fig1). TestBimlPackage.dtsx    Let’s return to
    the `BimlScript.biml` file and add a task. Create a new XML node beneath the `<Package>`
    tag named **Tasks**. Between the `<Tasks>` and `</Tasks>` tags, add a new node
    named **ExecuteSQL**.    ![Image](images/sq.jpg) **Tip**  If you are not seeing
    IntelliSense with Biml, follow this link: `http://bidshelper.codeplex.com/wikipage?title=Manually%20Configuring%20Biml%20Package%20Generator&referringTitle=xcopy%20deploy`
    for Biml IntelliSense configuration instructions.    Add an attribute to the ExecuteSQL
    root node named `Name` and set its value to **“Test Select”**. Create a new XML
    node between the `<ExecuteSQL>` and `</ExecuteSQL>` tags named **DirectInput**.
    Between the `<DirectInput>` and`</DirectInput>` tags, add the T-SQL statement
    **Select 1 As One**. If you are playing along at home, your `BimlScript.``biml`
    file should look like [Listing 19-3](#9781484200834_Ch19.xhtml#list3).    [***Listing
    19-3***](#9781484200834_Ch19.xhtml#_list3). Biml After Adding Initial Metadata
    Describing an Execute SQL Task    ``` <Biml xmlns="http://schemas.varigence.com/biml.xsd">
      <Packages>     <Package Name="TestBimlPackage" ConstraintMode="Parallel">       <Tasks>
            <ExecuteSQL Name="Test Select">           <DirectInput>Select 1 As One</DirectInput>
            </ExecuteSQL>       </Tasks>     </Package>   </Packages> </Biml> ```    To
    test, save the file and generate the SSIS package from `BimlScript.biml` in Solution
    Explorer. (Generate the package by right-clicking on the Biml file and selecting
    Generate SSIS Packages from the context-sensitive menu). Do you get an error similar
    to that displayed in [Figure 19-2](#9781484200834_Ch19.xhtml#Fig2)? You should
    get such an error.    ![9781484200834_Fig19-02.jpg](images/9781484200834_Fig19-02.jpg)    [Figure
    19-2](#9781484200834_Ch19.xhtml#_Fig2). Missing ConnectionName attribute    The
    Business Intelligence Markup Language engine includes validation functionality
    and it caught the error in [Figure 19-2](#9781484200834_Ch19.xhtml#Fig2). You
    can invoke a validation from Solution Explorer; simply right-click `BimlScript.biml`
    and then click Check Biml For Errors.    To fix the error, we need to add a `ConnectionName`
    attribute to the `ExecuteSQL` tag. But we don’t have a connection specified at
    this time. To create a connection, return to the top of `BimlScript.biml` and
    add a new line just after the `Biml` tag and before the `Packages` tag. On this
    line, add the Connections XML node. Inside the `<Connections>` and `</Connections>`
    tags, add a Connection XML node. A Connection XML node requires two attributes,
    `Name` and `ConnectionString`.'
  trans: "无论采用哪种机制，存储设计模式都有助于以一致且可重复的质量进行代码生成。这听起来或许无足轻重，但我向你保证它很重要；这正是首先使用设计模式的主要原因之一。\n\
    \n`Biml` 是一门复杂的语言。在正式投入 `Biml` 开发之前，最好先理解领域特定语言、`XML` 和 `.NET` 开发。本章我不会深入探讨 `Biml`\
    \ 的底层架构。我会向你展示其部分机制，并指引你查阅 `Biml` 文档网站：`Biml` 语言 (`www.varigence.com/Documentation/Language/Index`)\
    \ 和 `Biml` API (`www.varigence.com/Documentation/Api/Index`)。我相信，在我展示 `Biml` 强大功能的同时，这足以激发你的兴趣。\n\
    \n## 商业智能标记语言简史\n\n2007 年初，微软客户服务与支持部 (`CSS`) 孵化了一种构建商业智能 (`BI`) 解决方案的新方法。作为负责管理所有一线客户支持互动的部门，`CSS`\
    \ 拥有大量分析和预测需求——涉及来自各种来源的数据。为了加速内部解决方案的开发，`CSS` 开始开发 `Vulcan` 项目，该项目使用一种基于 `XML`\
    \ 的标记语言来描述一部分 `SSIS` 包。这创建了一个模型，使得商业智能解决方案能够由全球分布的 `BI` 开发人员团队更快速、更迭代地进行开发。\n\n\
    在成功构建了新的 `BI` 能力一段时间后，`CSS` 和 `SQL Server` 产品团队决定将 `Vulcan` 项目的源代码发布在 `CodePlex`\
    \ 上，以便客户试用该技术并开始围绕其建立社区 (`http://vulcan.codeplex.com`)。来自客户的反馈表明，他们认识到该方法强大且有前景，但实现方式反映了该项目作为内部工具的状态，用于加速运营交付团队的工作。由于缺乏文档和培训资源、可用性考虑以及附加功能，除了最有决心的客户外，采用\
    \ `Vulcan` 的成本高得令人望而却步。\n\n2008 年底，曾在 `CSS` 使用 `Vulcan` 技术的 Scott Currie 创立了 `Varigence`\
    \ 公司。`Varigence` 创建了商业智能标记语言 (`Biml`) 以及用于其设计和开发的工具。尽管 `Biml` 并未直接使用来自 `Vulcan`\
    \ 的任何代码或技术，但 `Vulcan` 项目采用的方法启发了 `Varigence` 团队，将 `Biml` 构建为一种基于 `XML` 的标记语言，并特别考虑了快速、迭代的全球团队开发能力。\n\
    \n`Biml` 现已可用于专有产品和开源项目，并已被发布为开放语言规范。`Varigence` 开发了一个 `Biml` 编译器，支持广泛的自动化和多目标定位能力。此外，`Varigence`\
    \ 提供了一个名为 `Mist` 的 `Biml` 集成开发环境 (`IDE`)。`Mist` 提供了 `Biml` 的快速、可视化设计和调试功能。开源的\
    \ `BIDS Helper` 项目包含 `Biml` 功能，使任何人都可以免费编写和执行 `Biml` 代码。\n\n在本章中，我们将利用 `BIDS Helper`\
    \ 中包含的免费 `Biml` 功能来动态生成 `SSIS` 包。\n\n![Image](img/sq.jpg) **注意** 包含商业智能标记语言的对象是一个\
    \ *Biml 文件*。`Biml` 文件通过“执行”来生成 `SSIS` 包。\n\n## 构建你的第一个 Biml 文件\n\n在开始使用商业智能标记语言之前，你需要从\
    \ `http://bidshelper.codeplex.com` 下载并安装最新版本的 `BIDS Helper`。安装完成后，创建一个新的名为 **Biml2014**\
    \ 的 `SSIS` 解决方案和项目。在解决方案资源管理器中，右键单击项目名称，然后单击“添加新建 Biml 文件”。新文件 `BimlScript.biml`\
    \ 将被创建并分配给解决方案资源管理器中的“杂项”虚拟文件夹。双击该文件以在编辑器中打开。\n\n该文件以最基本的 `Biml` 结构开始，如清单 19-1\
    \ 所示。\n\n***清单 19-1***. 初始 Biml 代码\n\n```xml\n<Biml xmlns=\"http://schemas.varigence.com/biml.xsd\"\
    >\n</Biml>\n```\n\n添加 `XML`，使你的 `Biml` 文件内容如清单 19-2 所示。在键入时，请注意 `IntelliSense`\
    \ 会自动缩进 `XML` 标签，以生成更易于阅读的格式良好的代码。\n\n***清单 19-2***. 添加包 XML 元数据后的 Biml\n\n```xml\n\
    <Biml xmlns=\"http://schemas.varigence.com/biml.xsd\">\n  <Packages>\n    <Package\
    \ Name=\"TestBimlPackage\" ConstraintMode=\"Parallel\">\n    </Package>\n  </Packages>\n\
    </Biml>\n```\n\n保存文件，在解决方案资源管理器中右键单击 `BimlScript.biml`，然后单击“生成 SSIS 包”。图 19-1\
    \ 显示，项目中及文件系统中创建了一个名为 `TestBimlPackage.dtsx` 的新 `SSIS` 包。该包作为此项目的一部分显示在解决方案资源管理器中。\n\
    \n![9781484200834_Fig19-01.jpg](img/9781484200834_Fig19-01.jpg)\n\n图 19-1. TestBimlPackage.dtsx\n\
    \n让我们回到 `BimlScript.biml` 文件并添加一个任务。在 `<Package>` 标签下方创建一个名为 **Tasks** 的新 `XML`\
    \ 节点。在 `<Tasks>` 和 `</Tasks>` 标签之间，添加一个名为 **ExecuteSQL** 的新节点。\n\n![Image](img/sq.jpg)\
    \ **提示** 如果你没有看到 `Biml` 的 `IntelliSense`，请按照此链接的说明配置 `Biml` `IntelliSense`：`http://bidshelper.codeplex.com/wikipage?title=Manually%20Configuring%20Biml%20Package%20Generator&referringTitle=xcopy%20deploy`。\n\
    \n向 `ExecuteSQL` 根节点添加一个名为 `Name` 的属性，并将其值设置为 **“Test Select”**。在 `<ExecuteSQL>`\
    \ 和 `</ExecuteSQL>` 标签之间创建一个名为 **DirectInput** 的新 `XML` 节点。在 `<DirectInput>` 和\
    \ `</DirectInput>` 标签之间，添加 `T-SQL` 语句 **Select 1 As One**。如果你正在动手实践，你的 `BimlScript.biml`\
    \ 文件应如清单 19-3 所示。\n\n***清单 19-3***. 添加描述执行 SQL 任务的初始元数据后的 Biml\n\n```xml\n<Biml\
    \ xmlns=\"http://schemas.varigence.com/biml.xsd\">\n  <Packages>\n    <Package\
    \ Name=\"TestBimlPackage\" ConstraintMode=\"Parallel\">\n      <Tasks>\n     \
    \   <ExecuteSQL Name=\"Test Select\">\n          <DirectInput>Select 1 As One</DirectInput>\n\
    \        </ExecuteSQL>\n      </Tasks>\n    </Package>\n  </Packages>\n</Biml>\n\
    ```\n\n为了测试，请保存文件并从解决方案资源管理器中的 `BimlScript.biml` 生成 `SSIS` 包。（通过右键单击 Biml 文件并从上下文相关菜单中选择“生成\
    \ SSIS 包”来生成包）。你是否遇到了类似图 19-2 所示的错误？你应该会遇到这样的错误。\n\n![9781484200834_Fig19-02.jpg](img/9781484200834_Fig19-02.jpg)\n\
    \n图 19-2. 缺少 ConnectionName 属性\n\n商业智能标记语言引擎包含验证功能，它捕获了图 19-2 中的错误。你可以从解决方案资源管理器调用验证；只需右键单击\
    \ `BimlScript.biml`，然后单击“检查 Biml 是否有错误”。\n\n要修复错误，我们需要向 `ExecuteSQL` 标签添加一个 `ConnectionName`\
    \ 属性。但目前我们还没有指定连接。要创建连接，请返回到 `BimlScript.biml` 的顶部，在 `Biml` 标签之后、`Packages` 标签之前添加一个新行。在这一行上，添加\
    \ `Connections` `XML` 节点。在 `<Connections>` 和 `</Connections>` 标签内，添加一个 `Connection`\
    \ `XML` 节点。一个 `Connection` `XML` 节点需要两个属性：`Name` 和 `ConnectionString`。"
- fmt: "# I created a connection to the AdventureWorks2012 database on the default\
    \ instance of the local SQL Server.\n\nOnce the `Connection` metadata is configured,\
    \ I added a `ConnectionName` attribute to the `ExecuteSQL` tag. My `BimlScript.biml`\
    \ file now contains the code listed in [Listing 19-4](#9781484200834_Ch19.xhtml#list4).\n\
    \n**Listing 19-4. Biml After Adding Connection Metadata**\n\n```xml\n<Biml xmlns=\"\
    http://schemas.varigence.com/biml.xsd\">\n  <Connections>\n    <Connection Name=\"\
    AdventureWorks2012\" ConnectionString=\"Data Source=.;Initial Catalog=AdventureWorks2012;Provider=\
    \ SQLNCLI10.1;Integrated Security=SSPI;Auto Translate=False;\" />\n  </Connections>\n\
    \  <Packages>\n    <Package Name=\"TestBimlPackage\" ConstraintMode=\"Parallel\"\
    >\n      <Tasks>\n        <ExecuteSQL Name=\"Test Select\" ConnectionName=\"AdventureWorks2012\"\
    >\n          <DirectInput>Select 1 As One</DirectInput>\n        </ExecuteSQL>\n\
    \      </Tasks>\n    </Package>\n  </Packages>\n</Biml>\n```\n\nLet’s test by\
    \ regenerating the `TestBimlPackage.dtsx` SSIS package from `BimlScript.biml`.\
    \ When you attempt to generate the SSIS package, you see a dialog that confirms\
    \ you would like to overwrite the existing `TestBimlPackage.dtsx` SSIS package.\
    \ When you confirm this intention, the `TestBimlPackage.dtsx` SSIS package is\
    \ regenerated from the metadata contained in the updated `BimlScript.biml` file.\
    \ Open the `TestBimlPackage.dtsx` SSIS package: it should appear as shown in [Figure\
    \ 19-3](#9781484200834_Ch19.xhtml#Fig3).\n\n![9781484200834_Fig19-03.jpg](images/9781484200834_Fig19-03.jpg)\n\
    \n**Figure 19-3. A Biml-generated SSIS package**\n\n## Building a Basic Incremental\
    \ Load SSIS Package\n\nThe incremental load pattern is fundamental in data integration\
    \ solutions; especially Extract, Transform, and Load (ETL) solutions. Biml provides\
    \ a mechanism for codifying the incremental load pattern in a repeatable fashion.\n\
    \n### Creating Databases and Tables\n\nLet’s prepare for this demo by building\
    \ a couple databases and tables. Execute the T-SQL statements from [Listing 19-5](#9781484200834_Ch19.xhtml#list5)\
    \ to build and populate the test databases and tables.\n\n**Listing 19-5. Building\
    \ and Populating Demo Databases and Tables**\n\n```sql\nUse master\nGo\n\nIf Not\
    \ Exists(Select name\n              From sys.databases\n              Where name\
    \ = 'SSISIncrementalLoad_Source')\n CREATE DATABASE [SSISIncrementalLoad_Source]\n\
    \nIf Not Exists(Select name\n              From sys.databases\n              Where\
    \ name = 'SSISIncrementalLoad_Dest')\n CREATE DATABASE [SSISIncrementalLoad_Dest]\n\
    Go\nUse SSISIncrementalLoad_Source\nGo\n\nIf Not Exists(Select name\n        \
    \      From sys.tables\n              Where name = 'tblSource')\nCREATE TABLE\
    \ dbo.tblSource\n (ColID int NOT NULL\n ,ColA varchar(10) NULL\n ,ColB datetime\
    \ NULL constraint df_ColB default (getDate())\n ,ColC int NULL\n ,constraint PK_tblSource\
    \ primary key clustered (ColID))\n\nUse SSISIncrementalLoad_Dest\nGo\n\nIf Not\
    \ Exists(Select name\n              From sys.tables\n              Where name\
    \ = 'tblDest')\nCREATE TABLE dbo.tblDest\n (ColID int NOT NULL\n ,ColA varchar(10)\
    \ NULL\n ,ColB datetime NULL\n ,ColC int NULL)\n\nIf Not Exists(Select name\n\
    \              From sys.tables\n              Where name = 'stgUpdates')\n CREATE\
    \ TABLE dbo.stgUpdates\n  (ColID int NULL\n  ,ColA varchar(10) NULL\n  ,ColB datetime\
    \ NULL\n  ,ColC int NULL)\n\nUse SSISIncrementalLoad_Source\nGo\n\n-- insert an\
    \ \"unchanged\", a \"changed\", and a \"new\" row\nINSERT INTO dbo.tblSource\n\
    \ (ColID,ColA,ColB,ColC)\n VALUES\n (0, 'A', '1/1/2007 12:01 AM', -1),\n (1, 'B',\
    \ '1/1/2007 12:02 AM', -2),\n (2, 'N', '1/1/2007 12:03 AM', -3)\n\nUse SSISIncrementalLoad_Dest\n\
    Go\n\n-- insert a \"changed\" and an \"unchanged\" row\nINSERT INTO dbo.tblDest\n\
    \ (ColID,ColA,ColB,ColC)\n VALUES\n (0, 'A', '1/1/2007 12:01 AM', -1),\n (1, 'C',\
    \ '1/1/2007 12:02 AM', -2)\n```\n\nThe T-SQL statements in [Listing 19-5](#9781484200834_Ch19.xhtml#list5)\
    \ create two databases; `SSISIncrementalLoad_Source` and `SSISIncrementalLoad_Dest`.\
    \ A table named `tblSource` is created in the `SSISIncrementalLoad_Source` database\
    \ and is populated with three rows. Another table named `tblDest` is created in\
    \ the `SSISIncrementalLoad_Dest` database and is populated with two rows.\n\n\
    The configuration created by [Listing 19-5](#9781484200834_Ch19.xhtml#list5) is\
    \ a basic setup for an incremental load. `ColID` is the business key. This value\
    \ should never change and should also uniquely identify the row in the Source\
    \ and Destination systems. The character values in `ColA` of the Source and Destination\
    \ tables indicate clues to the type of row. The A row is present and identical\
    \ in both the Source and Destination tables. It is an *Unchanged* row. The row\
    \ with a `ColID` value of `1` contains the `ColA` value `B` in the Source and\
    \ the `ColA` value `C` in the Destination table. This row has *Changed* in the\
    \ Source since it was initially loaded into the Destination table. The row with\
    \ a `ColID` value of `2` exists only in the Source. It is a *New* row.\n\n###\
    \ Adding Metadata\n\nIn this section, we will:\n*   Add metadata that defines\
    \ the connection managers used in the incremental load SSIS design pattern.\n\
    *   Add a new Biml file to the Biml project and rename it `IncrementalLoad.biml`.\n\
    *   Add a `Connections` XML node just after the `<Biml>` tag.\n*   Add two `Connection`\
    \ XML nodes configured to connect with the `SSISIncremental_Source` and `SSISIncremental_Dest`\
    \ databases.\n\nYour code should appear as shown in [Listing 19-6](#9781484200834_Ch19.xhtml#list6).\n\
    \n**Listing 19-6. Configured Connections for IncrementalLoad.biml**\n\n```xml\n\
    <Biml xmlns=\"http://schemas.varigence.com/biml.xsd\">\n  <Connections>\n    <Connection\
    \ Name=\"SSISIncrementalLoad_Source\" ConnectionString=\n      \"Data Source=(local);Initial\
    \ Catalog=SSISIncrementalLoad_Source;Provider=\n       SQLNCLI11.1;Integrated\
    \ Security=SSPI;\" />\n    <Connection Name=\"SSISIncrementalLoad_Dest\" ConnectionString=\n\
    \      \"Data Source=(local);Initial Catalog=SSISIncrementalLoad_Dest;Provider=\n\
    \       SQLNCLI11.1;OLE DB Services=1;Integrated Security=SSPI;\" />\n  </Connections>\n\
    </Biml>\n```\n\nAdd a `Packages` node between the `</Connections>` and `</Biml>`\
    \ tags. Just after, add a `Package` XML node followed by a `Tasks` node. Immediately\
    \ thereafter, add an `ExecuteSQL` node configured as shown in [Listing 19-7](#9781484200834_Ch19.xhtml#list7).\n\
    \n**Listing 19-7. Configured Packages, Package, Tasks, and ExecuteSQL Nodes**\n\
    \n```xml\n<Packages>\n  <Package Name=\"IncrementalLoadPackage\" ConstraintMode=\n\
    \    \"Parallel\" ProtectionLevel=\"EncryptSensitiveWithUserKey\">\n    <Tasks>\n\
    \      <ExecuteSQL Name=\"Truncate stgUpdates\" ConnectionName=\"SSISIncrementalLoad_Dest\"\
    >\n        <DirectInput>Truncate Table stgUpdates</DirectInput>\n      </ExecuteSQL>\n\
    \    </Tasks>\n  </Package>\n</Packages>\n```\n\nThe `Execute SQL` task defined\
    \ in the Biml in [Listing 19-7](#9781484200834_Ch19.xhtml#list7) will truncate\
    \ a staging table that will hold rows that have been changed in the Source table\
    \ since being loaded into the Destination table.\n\n### Specifying a Data Flow\
    \ Task\n\nAfter the `</ExecuteSQL>` tag, add a `Dataflow` XML node. Include a\
    \ `Name` attribute and set the value of the `Name` attribute to \"`Load tblDest`\"\
    . Inside the `<Dataflow>` tag, add a `PrecedenceConstraints` node. Place an `Inputs`\
    \ node inside the `<PrecedenceConstraints>` tag, and an `Input` node that includes\
    \ an `OutputPathName` attribute with the value \"`Truncate stgUpdates.Output`\"\
    \ inside the `<Inputs>` tag, as shown in [Listing 19-8](#9781484200834_Ch19.xhtml#list8).\n\
    \n**Listing 19-8.**"
