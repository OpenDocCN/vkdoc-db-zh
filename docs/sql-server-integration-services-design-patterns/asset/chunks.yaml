    CHAPTER 13


    ![image](images/frontdot.jpg)


    Slowly Changing Dimensions


    Processing slowly changing dimensions (SCDs) is a common ETL operation when you
    are dealing with data warehouses. The SSIS data flow has a SCD transform, which
    provides a wizard that outputs a set of transforms you need to handle the multiple
    steps of processing SCDs. Although the built-in SCD transform can be useful, it
    is not ideal for all data loading scenarios. This chapter describes how to make
    the most of the SCD transform and provides a couple of alternative patterns you
    can use.


    ![Image](images/sq.jpg) **Note**  There are many different types of SCD, but this
    chapter will focus on the two most common types: Type 1 and Type 2\. For more
    information about the different types of SCDs, see the Wikipedia entry at `http://en.wikipedia.org/wiki/Slowly_changing_dimensions`.


    The Slowly Changing Dimension Transform


    To best understand the SCD transform, let’s consider two key scenarios it was
    designed for:


    *   **A small number of change rows:** You are performing change data capture
    (CDC) at the source, or as close to the source as possible. Unless you are dealing
    with a very active dimension, most SCD processing batches will contain a small
    number of rows.

    *   **Large dimension:** You are working against large dimensions but are only
    processing a small number of change rows. You will want to avoid operations that
    cause full table scans of your dimension.


    Because of these target scenarios, the SCD transform does not cache the existing
    dimension data (like a Lookup transform does) and performs all of its comparisons
    row by row against the destination table. Although this allows the transform to
    avoid full scans of the destination dimension and reduces memory usage, it does
    affect performance when you are processing a large number of rows. If your scenario
    does not match one of thsee, you might want to consider using one of the other
    patterns in this chapter. If it does match, or if you prefer using out-of-the-box
    components over third-party solutions (or you would just like to avoid hand-crafted
    SQL statements required for the Merge pattern), consider applying the optimizations
    listed at the end of this pattern.


    Running the Wizard


    Unlike other SSIS data flow components, when you drop the SCD transform onto the
    design surface in Business Intelligence Development Studio (BIDS), a wizard pops
    up and walks you through the steps of setting up your SCD processing.


    The first page of the wizard ([Figure 13-1](#9781484200834_Ch13.xhtml#Fig1)) allows
    you to select the dimension you’ll be updating and the column or columns that
    make up the business key (also known as the natural key).


    ![9781484200834_Fig13-01.jpg](images/9781484200834_Fig13-01.jpg)


    [Figure 13-1](#9781484200834_Ch13.xhtml#_Fig1). Selecting the dimension table
    and keys in the Slowly Changing Dimension Wizard


    On the next page ([Figure 13-2](#9781484200834_Ch13.xhtml#Fig2)), you specify
    the columns that you’ll be processing and determine how you’d like the wizard
    to treat them. You have the three choices (as shown in [Table 13-1](#9781484200834_Ch13.xhtml#Tab1)).


    ![9781484200834_Fig13-02.jpg](images/9781484200834_Fig13-02.jpg)


    [Figure 13-2](#9781484200834_Ch13.xhtml#_Fig2). Selecting the dimension table
    and keys in the Slowly Changing Dimension Wizard


    [Table 13-1](#9781484200834_Ch13.xhtml#_Tab1). Column Change Types


    | Change Type | Dimension Type | When to Use |

    | --- | --- | --- |

    | Fixed attribute | — | Fixed attributes are columns that should not change or
    that require special handling when you make changes. By default, a change on one
    of these columns is treated as an error. |

    | Changing attribute | Type 1 | When a change is made to a changing attribute
    column, existing records are updated to reflect the new value. These are typically
    columns that aren’t used as part of business logic or time-sensitive reporting
    queries, such as a product description. |

    | Historical attribute | Type 2 | Historical attributes are columns for which
    you need to maintain history. These are frequently numeric columns that are used
    in time-sensitive reporting queries, such as a Sales Price, or Weight. |


    On this page, you should not map columns that will not be updated as part of your
    SCD processing, such as foreign keys to other dimension tables or columns related
    to the tracking of historical changes—for example, Start and End Date columns,
    an expiry flag, or the surrogate key. The SCD transform does not support Large
    Object (LOB) columns (columns that would be treated as `DT_IMAGE`, `DT_TEXT`,
    and `DT_NTEXT` types in the SSIS data flow), so these columns should be handled
    separately and also should not be mapped here.'
  trans: '# 第 13 章


    ## 缓慢变化维度


    处理缓慢变化维度（SCD）是处理数据仓库时常见的 ETL 操作。SSIS 数据流提供了一个 SCD 转换组件，该组件通过一个向导输出一组转换，用于处理处理
    SCD 的多个步骤。虽然内置的 SCD 转换很有用，但它并不适用于所有数据加载场景。本章将介绍如何充分利用 SCD 转换，并提供几种可供使用的替代模式。


    ![Image](img/sq.jpg) **注意** SCD 有多种不同类型，但本章将重点介绍两种最常见的类型：类型 1 和类型 2。有关不同类型的 SCD
    的更多信息，请参见维基百科条目 `http://en.wikipedia.org/wiki/Slowly_changing_dimensions`。


    ## 缓慢变化维度转换组件


    为了最好地理解 SCD 转换，让我们考虑它所设计的两个关键场景：


    *   **少量变更行：** 你在源头或尽可能靠近源头的地方执行变更数据捕获（CDC）。除非你处理的是一个非常活跃的维度，否则大多数 SCD 处理批次只会包含少量行。

    *   **大型维度：** 你正在处理大型维度，但只处理少量变更行。你需要避免执行对维度进行全表扫描的操作。


    由于这些目标场景，SCD 转换不会缓存现有的维度数据（像查找转换那样），而是针对目标表逐行执行所有比较。虽然这使得该转换能够避免对目标维度进行全表扫描并减少内存使用，但当你处理大量行时，它确实会影响性能。如果你的场景不符合这些情况，你可能需要考虑使用本章中的其他模式。如果符合，或者如果你更喜欢使用开箱即用的组件而非第三方解决方案（或者你只是想避免合并模式所需的自定义
    SQL 语句），那么可以考虑应用本模式末尾列出的优化措施。


    ## 运行向导


    与其他 SSIS 数据流组件不同，当你将 SCD 转换拖放到商业智能开发工作室（BIDS）中的设计界面时，会弹出一个向导，引导你完成设置 SCD 处理的步骤。


    向导的第一页（图 13-1）允许你选择要更新的维度以及构成业务键（也称自然键）的一个或多个列。


    ![9781484200834_Fig13-01.jpg](img/9781484200834_Fig13-01.jpg)


    图 13-1. 在缓慢变化维度向导中选择维度表和键


    在下一页（图 13-2）上，你需要指定要处理的列，并确定希望向导如何对待它们。你有三种选择（如表 13-1 所示）。


    ![9781484200834_Fig13-02.jpg](img/9781484200834_Fig13-02.jpg)


    图 13-2. 在缓慢变化维度向导中选择维度表和键


    表 13-1. 列变更类型


    | 变更类型 | 维度类型 | 何时使用 |

    | --- | --- | --- |

    | 固定属性 | — | 固定属性是指不应更改或在更改时需要特殊处理的列。默认情况下，对这些列之一的更改将被视为错误。 |

    | 可变属性 | 类型 1 | 当对可变属性列进行更改时，现有记录将被更新以反映新值。这些通常是不用作业务逻辑或时间敏感报告查询的一部分的列，例如产品描述。
    |

    | 历史属性 | 类型 2 | 历史属性是指你需要维护其历史的列。这些通常是用于时间敏感报告查询的数值列，例如销售价格或重量。 |


    在此页面上，你不应映射那些不会作为 SCD 处理的一部分而更新的列，例如指向其他维度表的外键或与跟踪历史变更相关的列——例如开始日期和结束日期列、过期标志或代理键。SCD
    转换不支持大对象（LOB）列（在 SSIS 数据流中被视为 `DT_IMAGE`、`DT_TEXT` 和 `DT_NTEXT` 类型的列），因此这些列应单独处理，也不应在此处映射。


    # 第 12 章


    ![9781484200834_Fig12-04.jpg](img/9781484200834_Fig12-04.jpg)


    图 12-4. OData 源编辑器中的预览对话框


    配置集合或资源路径值后，你可以通过单击“列”页面（如图 12-5 所示）来选择要为数据流检索的列。此对话框使用标准的 SSIS 外部列对话框，SSIS 开发人员应该很熟悉。请注意，此页面上未选中的列不会添加到你的数据流中，但它们仍会通过请求被下拉到服务中。如果你只选择某个源中的少数几列，你可能希望使用
    `$select` 查询选项预先限制列。有关查询选项的更多信息可在表 12-3 中找到。


    ![9781484200834_Fig12-05.jpg](img/9781484200834_Fig12-05.jpg)


    图 12-5. OData 源编辑器的“列”页面


    ## 覆盖数据类型


    OData 源允许你为某些类型手动覆盖输出列的数据类型。当你使用的 OData 服务未为字符串和二进制字段指定最大长度值时，这会非常方便。SSIS 会分别映射到
    `DT_NTEXT` 和 `DT_IMAGE` 类型，这可能会对性能产生负面影响。你可以使用高级编辑器（如图 12-6 所示）更改列的默认数据类型。


    ![9781484200834_Fig12-06.jpg](img/9781484200834_Fig12-06.jpg)


    图 12-6. OData 源的高级编辑器


    以下是修改默认数据类型的方法：


    1.  向数据流添加一个 OData 源，并配置其连接管理器以及要访问的数据。

    2.  单击“确定”保存设置。

    3.  在数据流的设计界面上，右键单击 OData 源组件，然后选择“显示高级编辑器”。

    4.  选择“输入和输出属性”选项卡。

    5.  展开“输出”文件夹。

    6.  展开“输出列”文件夹。

    7.  选择要修改的列。

    8.  选择 `DataType` 属性。

    9.  将值更改为新的 SSIS 数据类型，并在适用时更改 `Length` 值。


    你只能更改某些类型的 `DataType` 属性。表 12-5 包含可互换数据类型的列表。为不支持的数据类型更改值将导致错误消息（`COMException
    0xC020837D`）。


    表 12-5. 可更改的数据类型


    | 数据类型 | 兼容类型 |

    | --- | --- |

    | `DT_NTEXT` | `DT_WSTR` |

    | `DT_IMAGE` | `DT_BYTES` |

    | `DT_DBTIMESTAMP2` | `DT_DBTIMESTAMP` |


    ## 总结


    本章介绍了 SSIS 中新的 OData 源组件。过去几年中，OData 的采用率稳步增长，而 OData 源提供了一个开箱即用的解决方案，用于从各种源（如
    SharePoint 和 Windows Azure 存储 API）读取数据。'
- fmt: '# Using the Slowly Changing Dimension Wizard


    The next pages of the wizard allow you to configure options for how you’d like
    to handle fixed attributes ([Figure 13-3](#9781484200834_Ch13.xhtml#Fig3)), as
    well as Type 1 and Type 2 changes ([Figure 13-4](#9781484200834_Ch13.xhtml#Fig4)).
    When dealing with historical attributes, the wizard knows how to generate the
    logic needed to update the dimension in two different ways: by using a single
    column or by using Start and End Date columns to indicate whether the record is
    current or expired. If your table is using a combination of these, or some other
    method of tracking the current record, you will need to update the generated transforms
    to contain this logic.


    ![9781484200834_Fig13-03.jpg](images/9781484200834_Fig13-03.jpg)

    [Figure 13-3](#9781484200834_Ch13.xhtml#_Fig3). Fixed and changing attribute options


    ![9781484200834_Fig13-04.jpg](images/9781484200834_Fig13-04.jpg)

    [Figure 13-4](#9781484200834_Ch13.xhtml#_Fig4). Historical attribute options


    The final page of the wizard ([Figure 13-5](#9781484200834_Ch13.xhtml#Fig5)) lets
    you enable support for inferred members. An inferred member is created with minimal
    information—typically just the business and surrogate keys. It’s expected that
    the remaining fields will be populated in subsequent loading of the dimension
    data. Although the wizard enables inferred member support by default, for most
    forms of SCD processing, you will not need it.


    ![9781484200834_Fig13-05.jpg](images/9781484200834_Fig13-05.jpg)

    [Figure 13-5](#9781484200834_Ch13.xhtml#_Fig5). Inferred dimension members


    ## Using the Transformations


    When the wizard completes, it will output a number of different data flow components
    in addition to the main Slowly Changing Dimension component ([Figure 13-6](#9781484200834_Ch13.xhtml#Fig6)).
    The main component checks incoming data against the destination table and sends
    incoming rows down one of its outputs if the record is new or modified. Records
    without any changes are ignored. The components connected to these outputs will
    be configured according to the options you selected in the wizard dialogs.


    ![9781484200834_Fig13-06.jpg](images/9781484200834_Fig13-06.jpg)

    [Figure 13-6](#9781484200834_Ch13.xhtml#_Fig6). Wizard output for Type 1 and Type
    2 changes, and no inferred member support


    You can further customize the SCD processing logic by modifying these components.
    Double-clicking the main Slowly Changing Dimension transform relaunches the wizard.
    The wizard remembers your settings from the previous run; however, it will overwrite
    any changes or customizations you’ve made to the existing transforms. This includes
    any layout and resizing changes you might have performed.


    `Note`: When you re-run the Slowly Changing Dimension Wizard, the default options
    selected in the UI are not inferred from the components. Instead, they are persisted
    as part of the package in `<designTime>` elements. If you have a deployment process
    that removes package layout information, note that you will also lose your choices
    in the wizard.


    ## Optimizing Performance


    The components output from the Slowly Changing Dimension Wizard are not configured
    for optimal performance. By changing some settings and moving to a set-based pattern,
    you can drastically improve the performance of your SCD processing.


    ### The Slowly Changing Dimension Transform


    The main transform does not cache any row results from the reference dimension,
    so every incoming row results in a query against the database. By default, the
    wizard will open a new connection to the database on each query. For a gain in
    performance (as well as lower resource usage), you can set the `RetainSameConnection`
    property of the connection manager used by the wizard to `True` so that the same
    connection is reused on each query.


    ### OLE DB Command Transforms


    The wizard will output two (or three, if you’re processing inferred members) OLE
    DB Command transforms. These transforms perform row-by-row updates, which greatly
    degrade performance. You will get a big performance boost by placing these rows
    in staging tables and performing the updates in a single batch once the data flow
    completes.


    ### OLE DB Destination


    Since the main Slowly Changing Dimension transform and the destination use the
    same connection manager, the destination component will have the Fast Load option
    disabled by default to avoid deadlocking your data flow. If you are processing
    a small number of rows (for example, a single data flow buffer’s worth of data),
    you can enable Fast Load on the destination component for an immediate performance
    gain. To avoid deadlocking issues when processing a larger number of rows, consider
    using a staging table. Bulk load the data into a temporary staging table and update
    the final destination once the data flow is complete using an `INSERT INTO ...
    SELECT` statement.


    ## Third-Party SCD Components


    A couple of popular third-party alternatives to the SCD transform are available.
    Both have similar architectures and usage patterns but offer different capabilities.


    *   **The Table Difference component is available through CozyRoc.com:** This
    transform takes in the source and destination tables as inputs and does row-by-row
    comparisons in memory. It has three outputs—New, Updated, and Deleted. It can
    also be used to do general-purpose table comparisons in addition to SCD processing.


    `Note`: For more information about the Table Difference component, please see
    the CozyRoc web page at `www.cozyroc.com/ssis/table-difference`.


    *   **The Dimension Merge SCD component is available through PragmaticWorks.com:**
    This component was designed to handle dimension loading as per the Kimball method.
    Like the Table Difference component, it takes in the source and destination dimension
    tables and does the comparisons in memory. Also like the Table Difference component,
    it does not modify the destination table directly. It will apply row updates in
    memory and provides a number of outputs to feed your destination tables.


    `Note`: For more information about the Dimension Merge SCD component, please see
    the Pragmatic Works web page at `http://pragmaticworks.com/Products/Business-Intelligence/TaskFactory/Features.aspx#TSDimensionMergeSCD`.'
  raw: 'The next pages of the wizard allow you to configure options for how you’d
    like to handle fixed attributes ([Figure 13-3](#9781484200834_Ch13.xhtml#Fig3)),
    as well as Type 1 and Type 2 changes ([Figure 13-4](#9781484200834_Ch13.xhtml#Fig4)).
    When dealing with historical attributes, the wizard knows how to generate the
    logic needed to update the dimension in two different ways: by using a single
    column or by using Start and End Date columns to indicate whether the record is
    current or expired. If your table is using a combination of these, or some other
    method of tracking the current record, you will need to update the generated transforms
    to contain this logic.


    ![9781484200834_Fig13-03.jpg](images/9781484200834_Fig13-03.jpg)


    [Figure 13-3](#9781484200834_Ch13.xhtml#_Fig3). Fixed and changing attribute options


    ![9781484200834_Fig13-04.jpg](images/9781484200834_Fig13-04.jpg)


    [Figure 13-4](#9781484200834_Ch13.xhtml#_Fig4). Historical attribute options


    The final page of the wizard ([Figure 13-5](#9781484200834_Ch13.xhtml#Fig5)) lets
    you enable support for inferred members. An inferred member is created with minimal
    information—typically just the business and surrogate keys. It’s expected that
    the remaining fields will be populated in subsequent loading of the dimension
    data. Although the wizard enables inferred member support by default, for most
    forms of SCD processing, you will not need it.


    ![9781484200834_Fig13-05.jpg](images/9781484200834_Fig13-05.jpg)


    [Figure 13-5](#9781484200834_Ch13.xhtml#_Fig5). Inferred dimension members


    Using the Transformations


    When the wizard completes, it will output a number of different data flow components
    in addition to the main Slowly Changing Dimension component ([Figure 13-6](#9781484200834_Ch13.xhtml#Fig6)).
    The main component checks incoming data against the destination table and sends
    incoming rows down one of its outputs if the record is new or modified. Records
    without any changes are ignored. The components connected to these outputs will
    be configured according to the options you selected in the wizard dialogs.


    ![9781484200834_Fig13-06.jpg](images/9781484200834_Fig13-06.jpg)


    [Figure 13-6](#9781484200834_Ch13.xhtml#_Fig6). Wizard output for Type 1 and Type
    2 changes, and no inferred member support


    You can further customize the SCD processing logic by modifying these components.
    Double-clicking the main Slowly Changing Dimension transform relaunches the wizard.
    The wizard remembers your settings from the previous run; however, it will overwrite
    any changes or customizations you’ve made to the existing transforms. This includes
    any layout and resizing changes you might have performed.


    ![Image](images/sq.jpg) **Note**  When you re-run the Slowly Changing Dimension
    Wizard, the default options selected in the UI are not ­inferred from the components.
    Instead, they are persisted as part of the package in `<designTime>` elements.
    If you have a ­deployment process that removes package layout information, note
    that you will also lose your choices in the wizard.


    Optimizing Performance


    The components output from the Slowly Changing Dimension Wizard are not configured
    for optimal performance. By changing some settings and moving to a set-based pattern,
    you can drastically improve the performance of your SCD processing.


    The Slowly Changing Dimension Transform


    The main transform does not cache any row results from the reference dimension,
    so every incoming row results in a query against the database. By default, the
    wizard will open a new connection to the database on each query. For a gain in
    performance (as well as lower resource usage), you can set the `RetainSameConnection`
    property of the connection manager used by the wizard to `True` so that the same
    connection is reused on each query.


    OLE DB Command Transforms


    The wizard will output two (or three, if you’re processing inferred members) OLE
    DB Command transforms. These transforms perform row-by-row updates, which greatly
    degrade performance. You will get a big performance boost by placing these rows
    in staging tables and performing the updates in a single batch once the data flow
    completes.


    OLE DB Destination


    Since the main Slowly Changing Dimension transform and the destination use the
    same connection manager, the destination component will have the Fast Load option
    disabled by default to avoid deadlocking your data flow. If you are processing
    a small number of rows (for example, a single data flow buffer’s worth of data),
    you can enable Fast Load on the destination component for an immediate performance
    gain. To avoid deadlocking issues when processing a larger number of rows, consider
    using a staging table. Bulk load the data into a temporary staging table and update
    the final destination once the data flow is complete using an `INSERT INTO ...
    SELECT` statement.


    Third-Party SCD Components


    A couple of popular third-party alternatives to the SCD transform are available.
    Both have similar architectures and usage patterns but offer different capabilities.


    *   **The Table Difference component is available through CozyRoc.com:** This
    transform takes in the source and destination tables as inputs and does row-by-row
    comparisons in memory. It has three outputs—New, Updated, and Deleted. It can
    also be used to do general-purpose table comparisons in addition to SCD processing.


    ![Image](images/sq.jpg) **Note**  For more information about the Table Difference
    component, please see the CozyRoc web page at `www.cozyroc.com/ssis/table-difference`.


    *   **The Dimension Merge SCD component is available through PragmaticWorks.com:**
    This component was designed to handle dimension loading as per the Kimball method.
    Like the Table Difference component, it takes in the source and destination dimension
    tables and does the comparisons in memory. Also like the Table Difference component,
    it does not modify the destination table directly. It will apply row updates in
    memory and provides a number of outputs to feed your destination tables.


    ![Image](images/sq.jpg) **Note**  For more information about the Dimension Merge
    SCD component, please see the Pragmatic Works web page at `http://pragmaticworks.com/Products/Business-Intelligence/TaskFactory/Features.aspx#TSDimensionMergeSCD``.`'
  trans: '# 使用缓慢变化维度向导


    向导的后续页面允许您配置如何处理固定属性（图 13-3）以及类型 1 和类型 2 变化（图 13-4）的选项。在处理历史属性时，向导知道如何以两种不同方式生成更新维度所需的逻辑：使用单个列，或使用开始日期和结束日期列来指示记录是当前的还是已过期的。如果您的表使用这些方法的组合，或使用其他方法来跟踪当前记录，则需要更新生成的转换以包含此逻辑。


    ![9781484200834_Fig13-03.jpg](img/9781484200834_Fig13-03.jpg)

    图 13-3。固定属性和变化属性选项


    ![9781484200834_Fig13-04.jpg](img/9781484200834_Fig13-04.jpg)

    图 13-4。历史属性选项


    向导的最后一个页面（图 13-5）允许您启用对推断成员的支持。推断成员是以最少的信息创建的——通常只有业务键和代理键。预计在后续加载维度数据时会填充剩余字段。虽然向导默认启用推断成员支持，但对于大多数形式的
    SCD 处理，您并不需要它。


    ![9781484200834_Fig13-05.jpg](img/9781484200834_Fig13-05.jpg)

    图 13-5。推断维度成员


    ## 使用转换


    向导完成后，除了主要的缓慢变化维度组件外，它还会输出多个不同的数据流组件（图 13-6）。主组件将传入数据与目标表进行比较，如果记录是新的或已修改的，则将传入的行发送到其某个输出。没有任何更改的记录将被忽略。连接到这些输出的组件将根据您在向导对话框中选择的选项进行配置。


    ![9781484200834_Fig13-06.jpg](img/9781484200834_Fig13-06.jpg)

    图 13-6。向导输出（用于类型 1 和类型 2 变化，且无推断成员支持）


    您可以通过修改这些组件来进一步自定义 SCD 处理逻辑。双击主要的缓慢变化维度转换将重新启动向导。向导会记住您上一次运行的设置；但是，它会覆盖您对现有转换所做的任何更改或自定义。这包括您可能执行的任何布局和大小调整更改。


    `注意`：当您重新运行缓慢变化维度向导时，UI 中选择的默认选项不是从组件推断出来的。相反，它们作为包的一部分持久保存在 `<designTime>` 元素中。如果您的部署过程会删除包布局信息，请注意您也将失去在向导中所做的选择。


    ## 优化性能


    缓慢变化维度向导输出的组件并未配置为最佳性能。通过更改某些设置并转向基于集合的模式，您可以显著提高 SCD 处理的性能。


    ### 缓慢变化维度转换


    主转换不会缓存来自参考维度的任何行结果，因此每个传入行都会导致对数据库的一次查询。默认情况下，向导将在每次查询时打开一个新的数据库连接。为了提高性能（以及降低资源使用），您可以将向导使用的连接管理器的
    `RetainSameConnection` 属性设置为 `True`，以便在每次查询时重用同一连接。


    ### OLE DB 命令转换


    向导将输出两个（或者三个，如果您正在处理推断成员）OLE DB 命令转换。这些转换逐行执行更新，这会大大降低性能。通过将这些行放入暂存表并在数据流完成后以单个批次执行更新，您将获得巨大的性能提升。


    ### OLE DB 目标


    由于主要的缓慢变化维度转换和目标使用相同的连接管理器，默认情况下目标组件将禁用快速加载选项以避免数据流死锁。如果您正在处理少量行（例如，单个数据流缓冲区的数据量），可以在目标组件上启用快速加载以获得即时的性能提升。为避免在处理大量行时出现死锁问题，请考虑使用暂存表。将数据批量加载到临时暂存表中，并在数据流完成后使用
    `INSERT INTO ... SELECT` 语句更新最终目标。


    ## 第三方 SCD 组件


    有几种流行的第三方 SCD 转换替代方案可用。两者具有相似的架构和使用模式，但提供不同的功能。


    *   **Table Difference 组件可通过 CozyRoc.com 获取**：此转换将源表和目标表作为输入，并在内存中逐行进行比较。它有三个输出——新建、已更新和已删除。除了
    SCD 处理外，它还可用于执行通用表比较。


    `注意`：有关 Table Difference 组件的更多信息，请参阅 CozyRoc 网页 `www.cozyroc.com/ssis/table-difference`。


    *   **Dimension Merge SCD 组件可通过 PragmaticWorks.com 获取**：此组件旨在按照 Kimball 方法处理维度加载。与
    Table Difference 组件类似，它将源维度表和目标维度表作为输入，并在内存中进行比较。同样与 Table Difference 组件类似，它不直接修改目标表。它将在内存中应用行更新，并提供多个输出来填充您的目标表。


    `注意`：有关 Dimension Merge SCD 组件的更多信息，请参阅 Pragmatic Works 网页 `http://pragmaticworks.com/Products/Business-Intelligence/TaskFactory/Features.aspx#TSDimensionMergeSCD`。'
- fmt: "``````markdown\n# Merge Pattern\n\n这些组件的主要优势在于其性能。由于转换将源表和目标表都加载到内存中，它们能够进行快速的内存中比较，而无需多次查询目标服务器。它们还提供了比\
    \ SCD 转换更多的功能，例如检测已删除的行，并且可能更易于维护，因为所有逻辑都包含在一个组件中。\n\n然而，同时加载源和目标维度表意味着您正在对目标进行全表扫描（通常源表也是如此）。由于数据流在读取完所有源行之后才结束，即使您只处理少量更改的源行，整个目标维度也将被读取。尽管第三方组件在许多情况下表现良好，但您应该考虑它们是否适合您的场景。\n\
    \n## Merge Pattern\n\nSQL Server 2008 引入了对 T-SQL `MERGE` 语句的支持。该语句将根据与源表连接的结果，在目标表上执行插入、更新和删除操作。它非常高效，并为\
    \ SCD 处理提供了一个良好的替代方案。\n\n![Image](images/sq.jpg) **注意** 有关 `MERGE` 的更多信息，请参阅在线手册中的“在\
    \ Integration Services 包中使用 MERGE”条目，网址为 `http://technet.microsoft.com/en-us/library/cc280522.aspx`。\n\
    \n在 SSIS 中使用 `MERGE` 有三个步骤：\n\n1. 在数据流中暂存数据。\n2. 优化暂存表（可选）。\n3. 使用执行 SQL 任务运行\
    \ `MERGE` 语句。\n\n`MERGE` 允许在检测到行已更新（使用 `MERGE` 术语为“匹配”）和行是新的（“未匹配”）时运行单个语句。由于类型\
    \ 1 和类型 2 的更改需要不同类型的处理，我们将使用两个 `MERGE` 语句来完成 SCD 处理（如 [图 13-7](#9781484200834_Ch13.xhtml#Fig7)\
    \ 所示）。\n\n![9781484200834_Fig13-07.jpg](images/9781484200834_Fig13-07.jpg)\n\n\
    [图 13-7](#9781484200834_Ch13.xhtml#_Fig7). Merge 模式的控制流\n\n## Handling Type 1\
    \ Changes\n\n[列表 13-1](#9781484200834_Ch13.xhtml#list1) 显示了我们将运行的第一个 `MERGE` 语句，用于更新目标表中的所有类型\
    \ 1 列。`ON ( )` 部分指定了我们将要匹配的键（在本例中是表的业务键）。在 `WHEN MATCHED` 部分，我们包含了 `DEST.EndDate\
    \ is NULL` 以确保我们只更新当前记录（这是可选的——在许多情况下，您确实希望更新所有记录，而不仅仅是当前记录）。`THEN UPDATE` 部分包含我们想要更新的类型\
    \ 1 列的列表。\n\n[***列表 13-1***](#9781484200834_Ch13.xhtml#_list1). 用于类型 1 列的 MERGE\
    \ 语句\n\n```sql\nMERGE INTO [DimProduct] AS DEST\nUSING [Staging] AS SRC\nON (\n\
    \        DEST.ProductAlternateKey = SRC.ProductAlternateKey\n)\nWHEN MATCHED AND\
    \ DEST.EndDate is NULL -- update the current record\nTHEN UPDATE\nSET\n      \
    \   DEST.[ArabicDescription] = SRC.ArabicDescription\n        ,DEST.[ChineseDescription]\
    \ = SRC.ChineseDescription\n        ,DEST.[EnglishDescription] = SRC.EnglishDescription\n\
    \        ,DEST.[FrenchDescription] = SRC.FrenchDescription\n        ,DEST.[GermanDescription]\
    \ = SRC.GermanDescription\n        ,DEST.[HebrewDescription] = SRC.HebrewDescription\n\
    \        ,DEST.[JapaneseDescription] = SRC.JapaneseDescription\n        ,DEST.[ThaiDescription]\
    \ = SRC.ThaiDescription\n        ,DEST.[TurkishDescription] = SRC.TurkishDescription\n\
    \        ,DEST.[ReorderPoint] = SRC.ReorderPoint\n        ,DEST.[SafetyStockLevel]\
    \ = SRC.SafetyStockLevel;\n```\n\n## Handling Type 2 Changes\n\n由于 `MERGE` 语句允许每个操作使用单个语句，更新类型\
    \ 2 列更具挑战性。\n\n请记住，对于类型 2 更改，您需要执行两个操作：1) 将当前记录标记为过期，以及 2) 插入新记录作为当前记录。为此，您将把\
    \ `MERGE` 语句放在 `FROM` 子句内，并使用其 `OUTPUT` 为 `INSERT INTO` 语句提供数据（如 [列表 13-2](#9781484200834_Ch13.xhtml#list2)\
    \ 所示）。\n\n[***列表 13-2***](#9781484200834_Ch13.xhtml#_list2). 用于类型 2 列的 MERGE 语句\n\
    \n```sql\nINSERT INTO [DimProduct]\n    ([ProductAlternateKey],[ListPrice],[EnglishDescription],[StartDate])\n\
    SELECT\n    [ProductAlternateKey],[ListPrice],[EnglishDescription],[StartDate]\n\
    FROM (\n        MERGE INTO [DimProduct] AS FACT\n        USING [Staging] AS SRC\n\
    \        ON ( FACT.ProductAlternateKey = SRC.ProductAlternateKey )\n        WHEN\
    \ NOT MATCHED THEN\n        INSERT VALUES (\n                 SRC.ProductAlternateKey\n\
    \                ,SRC.ListPrice\n                ,SRC.EnglishDescription\n   \
    \             ,GETDATE()      -- StartDate\n                ,NULL           --\
    \ EndDate\n        )\n        WHEN MATCHED AND FACT.EndDate is NULL\n        THEN\
    \ UPDATE SET FACT.EndDate = GETDATE()\n        OUTPUT $Action Action_Out\n   \
    \             ,SRC.ProductAlternateKey\n                ,SRC.ListPrice\n     \
    \           ,SRC.EnglishDescription\n                ,GETDATE() StartDate\n) AS\
    \ MERGE_OUT\nWHERE MERGE_OUT.Action_Out = 'UPDATE';\n```\n\n## Conclusion\n\n\
    在 SSIS 中处理 SCD 有多种方法。虽然内置的 SCD 转换可以让你快速开始运行，但其性能可能不如替代方案。您可能更喜欢使用 Merge 模式，因为它整体性能更好，但维护\
    \ SQL 语句可能是一个长期的障碍。如果您更喜欢可视化设计器体验，可以考虑尝试第三方组件选项之一。\n\n[表 13-2](#9781484200834_Ch13.xhtml#Tab2)\
    \ 总结了本章描述的优缺点。\n\n[表 13-2](#9781484200834_Ch13.xhtml#_Tab2). 缓慢变化维度处理模式\n\n| 模式\
    \ | 用途 |\n| --- | --- |\n| 缓慢变化维度转换 | 快速原型设计<br>处理少量行<br>非常大的维度 |\n| 第三方组件 | 完整或历史维度加载<br>中小型维度<br>非\
    \ SQL Server 目标 |\n| Merge 模式 | 最佳整体性能<br>不介意手工编写 SQL 语句的情况 |\n\n# CHAPTER 14\n\
    \n![image](images/frontdot.jpg)\n\n# Loading the Cloud\n\n现在是 2014 年，云技术正变得无处不在。随着越来越多的应用程序托管在各种云服务提供商中，将相关数据定位在云中的需求也在增加。得益于远见和良好的工程设计，Microsoft\
    \ SQL Server 处于有利地位，可以提供帮助。与 Microsoft Azure SQL Database (MASD) 数据库交互的用户体验与与本地服务器或企业网络上的服务器交互几乎相同。毫无疑问，这是精心设计的——而且是好的设计。\n\
    \n在本章中，我们将考虑用于集成云中数据的 SSIS 设计模式。这些模式在连接到任何具有云技术特征的存储库时都很有用。因为与云中数据交互与与更本地的数据交互相似，所以这些模式并不具有革命性。“那么为什么要写一章关于加载云的内容呢？”很好的问题。\n\
    \n首先，云将长期存在——精灵不会回到瓶子里。我们作为数据专业人员，对使用云了解得越多越好。其次，云为数据集成带来了有趣的挑战；这些是数据集成开发人员需要解决和解决的挑战。加载云不仅仅是与热门技术交互。这是一个设计良好架构的机会。\n\
    ``````"
  raw: '````The main draw of these components is their performance. Since the transforms
    take both source and destination tables into memory, they are able to do fast
    in-memory comparisons, without multiple queries to the destination server. They
    also provide additional functionality over the SCD transform, such as detecting
    deleted rows, and can be easier to maintain because all of the logic is contained
    within a single component.    However, bringing in both the source and destination
    dimension tables means that you’re doing a full table scan of the destination
    (and typically the source, as well). Since the data fow does not end until all
    sources are done reading their rows, the entire destination dimension will be
    read, even if you are only processing a small number of changed source rows. Although
    the third-party components will perform well in many cases, you should consider
    if they will be ideal for your scenario.    Merge Pattern    SQL Server 2008 introduced
    support for the T-SQL `MERGE` statement. This statement will perform insert, update,
    and delete operations on a destination table based on the results of a join with
    a source table. It is very efficient and provides a good alternative for SCD processing.    ![Image](images/sq.jpg) **Note**  For
    more information about `MERGE`, please see the Books Online entry “Using MERGE
    in Integration Services Packages” at `http://technet.microsoft.com/en-us/library/cc280522.aspx`.    There
    are three steps to using `MERGE` from within SSIS:    1.  Stage the data in a
    data flow. 2.  Optimize the staging table (optional). 3.  Run the `MERGE` statement(s)
    using an Execute SQL task.    `MERGE` allows a single statement to be run when
    it detects a row has been updated (“matched” using the `MERGE` terminology) and
    when a row is new (“not matched”). Since Type 1 and Type 2 changes require different
    types of processing, we’ll use two `MERGE` statements to complete the SCD processing
    (as shown in [Figure 13-7](#9781484200834_Ch13.xhtml#Fig7)).    ![9781484200834_Fig13-07.jpg](images/9781484200834_Fig13-07.jpg)    [Figure
    13-7](#9781484200834_Ch13.xhtml#_Fig7). Control flow for the Merge pattern    Handling
    Type 1 Changes    [Listing 13-1](#9781484200834_Ch13.xhtml#list1) shows the first
    `MERGE` statement we’ll run to update all of our Type 1 columns in the destination
    table. The `ON ( )` section specifies the keys that we’ll be matching on (in this
    case, the business key for the table). In the `WHEN MATCHED` section, we include
    `DEST.EndDate is NULL` to ensure that we are only updating the current record
    (this is optional—in many cases, you do want to update all records and not just
    the current one). The `THEN UPDATE` section contains the list of our Type 1 columns
    that we want to update.    [***Listing 13-1***](#9781484200834_Ch13.xhtml#_list1).
    MERGE Statement for Type 1 Columns    ``` MERGE INTO [DimProduct] AS DEST USING
    [Staging] AS SRC ON (         DEST.ProductAlternateKey = SRC.ProductAlternateKey
    ) WHEN MATCHED AND DEST.EndDate is NULL -- update the current record THEN UPDATE
    SET          DEST.[ArabicDescription] = SRC.ArabicDescription         ,DEST.[ChineseDescription]
    = SRC.ChineseDescription         ,DEST.[EnglishDescription] = SRC.EnglishDescription
            ,DEST.[FrenchDescription] = SRC.FrenchDescription         ,DEST.[GermanDescription]
    = SRC.GermanDescription         ,DEST.[HebrewDescription] = SRC.HebrewDescription
            ,DEST.[JapaneseDescription] = SRC.JapaneseDescription         ,DEST.[ThaiDescription]
    = SRC.ThaiDescription         ,DEST.[TurkishDescription] = SRC.TurkishDescription
            ,DEST.[ReorderPoint] = SRC.ReorderPoint         ,DEST.[SafetyStockLevel]
    = SRC.SafetyStockLevel ; ```    Handling Type 2 Changes    Since the `MERGE` statement
    allows a single statement for each action, updating Type 2 columns is a little
    more challenging.


    Remember, for Type 2 changes, you need to perform two operations: 1) mark the
    current record as expired, and 2) insert the new record as current. To accomplish
    this, you’ll use the `MERGE` statement inside of a `FROM` clause and use its `OUTPUT`
    to feed an `INSERT INTO` statement (as shown in [Listing 13-2](#9781484200834_Ch13.xhtml#list2)).    [***Listing
    13-2***](#9781484200834_Ch13.xhtml#_list2). MERGE Statement for Type 2 Columns    ```
    INSERT INTO [DimProduct] ([ProductAlternateKey],[ListPrice],[EnglishDescription],[StartDate])
    SELECT [ProductAlternateKey],[ListPrice],[EnglishDescription],[StartDate] FROM
    (         MERGE INTO [DimProduct] AS FACT         USING [Staging] AS SRC         ON
    ( FACT.ProductAlternateKey = SRC.ProductAlternateKey )         WHEN NOT MATCHED
    THEN         INSERT VALUES (                  SRC.ProductAlternateKey                 ,SRC.ListPrice
                    ,SRC.EnglishDescription                 ,GETDATE()      -- StartDate
                    ,NULL           -- EndDate         )         WHEN MATCHED AND
    FACT.EndDate is NULL         THEN UPDATE SET FACT.EndDate = GETDATE()         OUTPUT
    $Action Action_Out                 ,SRC.ProductAlternateKey                 ,SRC.ListPrice
                    ,SRC.EnglishDescription                 ,GETDATE() StartDate )
    AS MERGE_OUT WHERE MERGE_OUT.Action_Out = ''UPDATE'' ```    Conclusion    There
    are many ways to process SCDs in SSIS. Although the built-in SCD transform can
    get you up and running quickly, it may not perform as well as the alternatives.
    You may prefer using the Merge pattern due to its overall performance, but having
    to maintain the SQL statements may be an inhibitor in the long run. If you prefer
    a visual designer experience, consider trying one of the third-party component
    options.    [Table 13-2](#9781484200834_Ch13.xhtml#Tab2) summarizes the advantages
    and disadvantages described in this chapter.    [Table 13-2](#9781484200834_Ch13.xhtml#_Tab2).
    Slowly Changing Dimension Processing Patterns     | Pattern | Use For | | ---
    | --- | | Slowly Changing Dimension transform | Quick prototypingProcessing a
    small number of rowsVery large dimensions | | Third-party components | Full or
    historical dimension loadsSmall-medium sized dimensionsNon–SQL Server destinations
    | | Merge pattern | Best overall performanceCases in which you don’t mind hand-crafting
    SQL statements |    CHAPTER 14    ![image](images/frontdot.jpg)    Loading the
    Cloud    It is 2014 and cloud technology is becoming ubiquitous. As more applications
    are hosted in various cloud service providers, the desire to locate their associated
    data in the cloud increases. Thanks to forethought and good engineering, Microsoft
    SQL Server is well-positioned to assist. The user experience when interacting
    with Microsoft Azure SQL Database (MASD) databases is nearly identical to interacting
    with local servers or servers on the enterprise network. Make no mistake, this
    is by design—and it is good design.    In this chapter, we will consider SSIS
    design patterns used to integrate data in the cloud. These patterns are useful
    when connecting to any repository that shares cloud technology characteristics.
    Because interacting with data in the cloud is similar to interacting with data
    that are more local, the patterns aren’t revolutionary. “So why write a chapter
    about loading the cloud?” Excellent question.    First, the cloud is here to stay—the
    djinni will not fit back into the bottle. The more we, as data professionals,
    learn about using the cloud, the better. Second, the cloud offers interesting
    challenges to data integration; these are challenges to be addressed and solved
    by the data integration developer. Loading the cloud isn’t just about interacting
    with buzz-worthy technology. It is an opportunity to design good architecture.'
  trans: "``````markdown\n# 合并模式\n\n这些组件的主要优势在于其性能。由于转换将源表和目标表都加载到内存中，它们能够进行快速的内存中比较，而无需多次查询目标服务器。它们还提供了比\
    \ SCD（缓慢变化维度）转换更多的功能，例如检测已删除的行，并且可能更易于维护，因为所有逻辑都包含在一个组件中。\n\n然而，同时加载源和目标维度表意味着您正在对目标进行全表扫描（通常源表也是如此）。由于数据流在读取完所有源行之后才结束，即使您只处理少量更改的源行，整个目标维度也将被读取。尽管第三方组件在许多情况下表现良好，但您应该考虑它们是否适合您的场景。\n\
    \n## 合并模式\n\nSQL Server 2008 引入了对 T-SQL `MERGE` 语句的支持。该语句将根据与源表连接的结果，在目标表上执行插入、更新和删除操作。它非常高效，并为\
    \ SCD 处理提供了一个良好的替代方案。\n\n![Image](img/sq.jpg) **注意** 有关 `MERGE` 的更多信息，请参阅在线手册中的“在\
    \ Integration Services 包中使用 MERGE”条目，网址为 `http://technet.microsoft.com/en-us/library/cc280522.aspx`。\n\
    \n在 SSIS 中使用 `MERGE` 有三个步骤：\n\n1. 在数据流中暂存数据。\n2. 优化暂存表（可选）。\n3. 使用执行 SQL 任务运行\
    \ `MERGE` 语句。\n\n`MERGE` 允许在检测到行已更新（使用 `MERGE` 术语为“匹配”）和行是新的（“未匹配”）时运行单个语句。由于类型\
    \ 1 和类型 2 的更改需要不同类型的处理，我们将使用两个 `MERGE` 语句来完成 SCD 处理（如 图 13-7 所示）。\n\n![9781484200834_Fig13-07.jpg](img/9781484200834_Fig13-07.jpg)\n\
    \n图 13-7. 合并模式的控制流\n\n## 处理类型 1 更改\n\n列表 13-1 显示了我们将运行的第一个 `MERGE` 语句，用于更新目标表中的所有类型\
    \ 1 列。`ON ( )` 部分指定了我们将要匹配的键（在本例中是表的业务键）。在 `WHEN MATCHED` 部分，我们包含了 `DEST.EndDate\
    \ is NULL` 以确保我们只更新当前记录（这是可选的——在许多情况下，您确实希望更新所有记录，而不仅仅是当前记录）。`THEN UPDATE` 部分包含我们想要更新的类型\
    \ 1 列的列表。\n\n***列表 13-1***. 用于类型 1 列的 MERGE 语句\n\n```sql\nMERGE INTO [DimProduct]\
    \ AS DEST\nUSING [Staging] AS SRC\nON (\n        DEST.ProductAlternateKey = SRC.ProductAlternateKey\n\
    )\nWHEN MATCHED AND DEST.EndDate is NULL -- 更新当前记录\nTHEN UPDATE\nSET\n       \
    \  DEST.[ArabicDescription] = SRC.ArabicDescription\n        ,DEST.[ChineseDescription]\
    \ = SRC.ChineseDescription\n        ,DEST.[EnglishDescription] = SRC.EnglishDescription\n\
    \        ,DEST.[FrenchDescription] = SRC.FrenchDescription\n        ,DEST.[GermanDescription]\
    \ = SRC.GermanDescription\n        ,DEST.[HebrewDescription] = SRC.HebrewDescription\n\
    \        ,DEST.[JapaneseDescription] = SRC.JapaneseDescription\n        ,DEST.[ThaiDescription]\
    \ = SRC.ThaiDescription\n        ,DEST.[TurkishDescription] = SRC.TurkishDescription\n\
    \        ,DEST.[ReorderPoint] = SRC.ReorderPoint\n        ,DEST.[SafetyStockLevel]\
    \ = SRC.SafetyStockLevel;\n```\n\n## 处理类型 2 更改\n\n由于 `MERGE` 语句允许每个操作使用单个语句，更新类型\
    \ 2 列更具挑战性。\n\n请记住，对于类型 2 更改，您需要执行两个操作：1) 将当前记录标记为过期，以及 2) 插入新记录作为当前记录。为此，您将把\
    \ `MERGE` 语句放在 `FROM` 子句内，并使用其 `OUTPUT` 为 `INSERT INTO` 语句提供数据（如 列表 13-2 所示）。\n\
    \n***列表 13-2***. 用于类型 2 列的 MERGE 语句\n\n```sql\nINSERT INTO [DimProduct]\n    ([ProductAlternateKey],[ListPrice],[EnglishDescription],[StartDate])\n\
    SELECT\n    [ProductAlternateKey],[ListPrice],[EnglishDescription],[StartDate]\n\
    FROM (\n        MERGE INTO [DimProduct] AS FACT\n        USING [Staging] AS SRC\n\
    \        ON ( FACT.ProductAlternateKey = SRC.ProductAlternateKey )\n        WHEN\
    \ NOT MATCHED THEN\n        INSERT VALUES (\n                 SRC.ProductAlternateKey\n\
    \                ,SRC.ListPrice\n                ,SRC.EnglishDescription\n   \
    \             ,GETDATE()      -- StartDate\n                ,NULL           --\
    \ EndDate\n        )\n        WHEN MATCHED AND FACT.EndDate is NULL\n        THEN\
    \ UPDATE SET FACT.EndDate = GETDATE()\n        OUTPUT $Action Action_Out\n   \
    \             ,SRC.ProductAlternateKey\n                ,SRC.ListPrice\n     \
    \           ,SRC.EnglishDescription\n                ,GETDATE() StartDate\n) AS\
    \ MERGE_OUT\nWHERE MERGE_OUT.Action_Out = 'UPDATE';\n```\n\n## 结论\n\n在 SSIS 中处理\
    \ SCD 有多种方法。虽然内置的 SCD 转换可以让你快速开始运行，但其性能可能不如替代方案。您可能更喜欢使用合并模式，因为它整体性能更好，但维护 SQL\
    \ 语句可能是一个长期的障碍。如果您更喜欢可视化设计器体验，可以考虑尝试第三方组件选项之一。\n\n表 13-2 总结了本章描述的优缺点。\n\n表 13-2.\
    \ 缓慢变化维度处理模式\n\n| 模式 | 用途 |\n| --- | --- |\n| 缓慢变化维度转换 | 快速原型设计<br>处理少量行<br>非常大的维度\
    \ |\n| 第三方组件 | 完整或历史维度加载<br>中小型维度<br>非 SQL Server 目标 |\n| 合并模式 | 最佳整体性能<br>不介意手工编写\
    \ SQL 语句的情况 |\n\n# 第 14 章\n\n![image](img/frontdot.jpg)\n\n# 加载到云端\n\n现在是 2014\
    \ 年，云技术正变得无处不在。随着越来越多的应用程序托管在各种云服务提供商中，将相关数据定位在云中的需求也在增加。得益于远见和良好的工程设计，Microsoft\
    \ SQL Server 处于有利地位，可以提供帮助。与 Microsoft Azure SQL Database (MASD) 数据库交互的用户体验与与本地服务器或企业网络上的服务器交互几乎相同。毫无疑问，这是精心设计的——而且是好的设计。\n\
    \n在本章中，我们将考虑用于集成云中数据的 SSIS 设计模式。这些模式在连接到任何具有云技术特征的存储库时都很有用。因为与云中数据交互与与更本地的数据交互相似，所以这些模式并不具有革命性。“那么为什么要写一章关于加载云的内容呢？”很好的问题。\n\
    \n首先，云将长期存在——精灵不会回到瓶子里。我们作为数据专业人员，对使用云了解得越多越好。其次，云为数据集成带来了有趣的挑战；这些是数据集成开发人员需要解决和解决的挑战。加载云不仅仅是与热门技术交互。这是一个设计良好架构的机会。\n\
    ``````"
- fmt: "# Interacting with the Cloud\n\nFor the purposes of this chapter, **the cloud**\
    \ will refer to containers of data or data repositories that\n\n*   Reside off-enterprise-premises\n\
    *   Are hosted by a third party\n*   Are outside of the physical enterprise domain\n\
    \nI understand these points are subject to debate. I will not debate them here.\
    \ This definition will likely not survive the years following this writing (2012)\
    \ and revision (2014). And even now, there is ambiguity and a blurring of lines\
    \ between what is and is not considered “in the cloud.”\n\nFor demonstration,\
    \ I am using data collected from my local weather station in Farmville, Virginia.\
    \ The weather data are exposed and available at `AndyWeather.com`. `AndyWeather.com`\
    \ is hosted by a large hosting company that provides remotely-accessible SQL Server\
    \ database connectivity. As such, the data are stored in the cloud (according\
    \ to my definition).\n\nI also host weather data using a Microsoft Azure SQL Database:\
    \ the same data, stored in a different location. “Why?” The simple answer: fault\
    \ tolerance. Fault tolerance is the same reason DBAs perform database backups\
    \ and test database restores. The difference between a technician and an engineer—or\
    \ a developer and an architect—is that a technician builds systems that succeed\
    \ whereas engineers build systems that don’t fail. It’s about mindset. Technicians\
    \ get it working and stop there. Engineers consider many ways the system can fail\
    \ and try to fix these things before they break.\n\n## Incremental Loads to Azure\
    \ SQL Database\n\nAn **incremental load** is one in which only new or updated\
    \ rows (and sometimes deleted) rows are loaded or changed. Incremental loads can\
    \ be contrasted with the **truncate-and-load** pattern, where the existing data\
    \ in the destination is deleted and all data is reloaded from the source. Sometimes\
    \ truncate-and-load is most efficient. As data scale—especially at the destination—truncate-and-load\
    \ performance often suffers. How do you know which will perform best? Test, measure,\
    \ rinse, and repeat.\n\nOne benefit to truncate-and-load is simplicity. It is\
    \ difficult to mess up a simple mechanism. Incremental loads introduce complexity,\
    \ and change detection is the first place complexity enters the solution.\n\n\
    ## Change Detection\n\n**Change detection** is functionality designed to separate\
    \ rows that have never been sent from the source (New Rows) to the destination\
    \ from rows that have been sent. Change detection also separates source rows that\
    \ exist in the destination into rows that have changed in the source (Changed\
    \ Rows) and rows that remain unchanged since they were last loaded or updated\
    \ in the destination (Unchanged Rows). Change detection can also encompass rows\
    \ that have been deleted from the destination that need to be deleted (or “soft-deleted”)\
    \ from the source. We will ignore the Deleted Rows use case in this chapter.\n\
    \nWe will consider using change detection to determine and discriminate between\
    \ Unchanged Rows, Changed Rows, and New Rows. The block diagram for an incremental\
    \ load pattern is shown in [Figure 14-1](#9781484200834_Ch14.xhtml#Fig1).\n\n\
    ![9781484200834_Fig14-01.jpg](images/9781484200834_Fig14-01.jpg)\n\n[Figure 14-1](#9781484200834_Ch14.xhtml#_Fig1).\
    \ Incremental load block diagram\n\n## New Rows (Only)\n\nYou would think detecting\
    \ new rows would be simple, regardless of the technology behind the destination\
    \ database. You would be right. But when loading MASD, there is an economic consideration.\
    \ As I write this in 2011 (and revise it in 2014), uploads are free. As a data\
    \ provider, you are charged when your data is consumed. How does this fact impact\
    \ your incremental load?\n\nHere is where good data integration architecture and\
    \ design comes in. Part of the job of the data integration architect is to know\
    \ your data. This goes beyond knowing there is a column in the `CleanTemperature`\
    \ table that contains the Average Dew Point for a given hour. Knowing your data\
    \ means that you understand how and when it changes—or even if it changes. Certain\
    \ types of data, like weather data, do not get updated after they are captured\
    \ and recorded.\n\nIf you have read Tim Mitchell’s description of a typical incremental\
    \ load pattern in [Chapter 11](#9781484200834_Ch11.xhtml), you will note a Lookup\
    \ transform configured to connect to the destination and read data. In MASD, you\
    \ will pay for that data read. There are almost 30,000 rows present in my MASD\
    \ AndyWeather database. If I load all the rows from my source into a Data Flow\
    \ task and use a Lookup transform to “join” between my source and MASD, I pay\
    \ for reading rows that haven’t changed. What’s more, I know they **will never\
    \ change**. Since weather data is never updated once recorded, there will simply\
    \ be no Changed Rows.\n\nEach hour, a few rows of new data are generated for each\
    \ subject area in the AndyWeather database. If I use a Lookup, I load all 30,000\
    \ rows for no good reason—and I pay for the privilege. No thank you.\n\nTo limit\
    \ the amount of data read, and thereby lower the total cost of the solution, I\
    \ could execute a query that selects a “marker” indicating the latest or last\
    \ row loaded. For this, I could select the maximum value from a field containing\
    \ the date and time the table was last loaded; something like `Max(LastUpdatedDateTime)`\
    \ or even a data integration lineage or metadata field like `Max(LoadDate)`. I\
    \ could similarly select another marker such as the `Max(ID)` from an integer\
    \ column reliably maintained by a sequence, identity, trigger, or other mechanism.\
    \ The reliability of the mechanism represents the maximum confidence a data integration\
    \ architect can place in the value. I will demonstrate building an incremental\
    \ loader using an identity column maintained on the source data.\n\nBefore I do,\
    \ I wish to point out that [Chapter 11](#9781484200834_Ch11.xhtml) contains a\
    \ great section on the incremental load design pattern. There is a discussion\
    \ of another solution I will not touch upon: change data capture. I encourage\
    \ you to review [Chapter 11](#9781484200834_Ch11.xhtml) before you complete your\
    \ data integration design.\n\n## Building the Cloud Loader\n\nTo work through\
    \ the demonsration that follows, you will need a MASD account and database. Creating\
    \ the account and database is beyond the scope of this book, but you can learn\
    \ more at `www.windowsazure.com/en-us/home/features/sql-azure`. Once MASD is set\
    \ up and configured, create a database. In this database, create a table named\
    \ `dbo.LoadMetrics` using the T-SQL shown in [Listing 14-1](#9781484200834_Ch14.xhtml#list1).\n\
    \n[**Listing 14-1**](#9781484200834_Ch14.xhtml#_list1). Creating the LoadMetrics\
    \ Table\n\n```sql\nCreate Table dbo.LoadMetrics\n  (ID int identity(1,1)\n   \
    \ Constraint PK_LoadMetrics_ID Primary Key Clustered\n  ,LoadDate datetime\n \
    \   Constraint DF_LoadMetrics_LoadDate Default(GetDate())\n  ,MetricName varchar(25)\n\
    \  ,MetricIntValue int)\n```\n\nThe `LoadMetrics` table will hold the last ID\
    \ loaded for each table in the cloud destination. We will write this row once,\
    \ and read and update it each load cycle. Accessing this table in this manner\
    \ is the simplest and least processor-intensive manner in which to acquire the\
    \ information we seek: the value of the last ID column loaded for a particular\
    \ table. Why store this value in a table? Why not simply execute a `Max(ID)` select\
    \ statement on the data table? Again, MASD charges for reads and not writes. Billing\
    \ may change—it has in the past. What if we’re billed according to cycles or execution\
    \ plans? You never know.\n\nWhile connected to the MASD instance, create a table\
    \ to hold your data. My data table will hold temperature information collected\
    \ from my weather station in Farmville, Virginia. The table I use contains temperature-\
    \ and humidity-related data and is shown in [Listing 14-2](#9781484200834_Ch14.xhtml#list2).\n\
    \n[**Listing 14-2**](#9781484200834_Ch14.xhtml#_list2)."
