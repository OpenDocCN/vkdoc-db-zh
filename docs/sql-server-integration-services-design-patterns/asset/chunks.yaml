    Set the `Operation` property to `Delete File`. Set the `IsSourcePathVariable`
    property to `True` and the `SourceVariable` property to `$Package::SourceFilePath`.
    Close the File System Task Editor.


    Use a Success Precedence constraint to connect the `scr Apply Format Script` task
    to the `fsys Copy Working File` File System task. Double-click the Precedence
    constraint to open the editor and set the `Evaluation Option` property to `Expression
    and Constraint`. Set the `Value` property to `Success` and the `Expression` property
    to `@[User::OkToProceed]`. This constraint will only fire if the `scr Apply Format
    Script` task completes execution successfully and sets the `OkToProceed (Boolean)`
    variable to `True`. Connect Success Precedence constraints between the `fsys Copy
    Working File` File System task and the `fsys Rename File` File System task, the
