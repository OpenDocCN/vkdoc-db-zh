    in [Figure 19-3](#9781484200834_Ch19.xhtml#Fig3).    ![9781484200834_Fig19-03.jpg](images/9781484200834_Fig19-03.jpg)    [Figure
    19-3](#9781484200834_Ch19.xhtml#_Fig3). A Biml-generated SSIS package    Building
    a Basic Incremental Load SSIS Package    The incremental load pattern is fundamental
    in data integration solutions; especially Extract, Transform, and Load (ETL) solutions.
    Biml provides a mechanism for codifying the incremental load pattern in a repeatable
    fashion.    Creating Databases and Tables    Let’s prepare for this demo by building
    a couple databases and tables. Execute the T-SQL statements from [Listing 19-5](#9781484200834_Ch19.xhtml#list5)
    to build and populate the test databases and tables.    [***Listing 19-5***](#9781484200834_Ch19.xhtml#_list5).
    Building and Populating Demo Databases and Tables    ``` Use master Go  If Not
