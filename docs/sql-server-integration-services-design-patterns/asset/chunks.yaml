    ## Scripting Patterns


    As shown throughout this book, SQL Server Integration Services (SSIS) is a multifaceted
    product with many native capabilities that can handle even the most difficult
    of data challenges. With highly flexible transformations, such as the `Lookup`,
    `Conditional Split`, `Derived Column`, and `Merge Join`, the data flow is well-equipped
    to perform a limitless number of transformations to in-flight data. On the control
    flow side, tools including the `File System task`, the `For Each Loop` (and its
    cousin, the `For Loop`), the `File System task`, and the `Data Profiling task`
    provide critical services to support fundamental ETL operations. Right out of
    the box, you get a toolbox that’s full of flexible and powerful objects.


    However, even the most casual ETL developer will eventually encounter scenarios
    that require more flexibility than what is afforded in the native components.
    Dealing with data movement and transformation is often ugly and unpredictable,
    and requires a level of extensibility that would be difficult to build into general-purpose
    tools. Fortunately, there is a solution for these uncommon ETL needs: custom .NET
    scripting.


    ### The Toolset


    SQL Server Integration Services has the capability to build very powerful ETL
    logic directly into your SSIS packages. Through Visual Studio and its various
    niceties (familiar development environment, IntelliSense, and project-based development,
    among many others), the burden of embedding custom logic in your ETL processes
    is made significantly easier.


    Unlike its predecessor Data Transformation Services (DTS), SQL Server Integration
    Services exposes the entire .NET runtime within its scripting tools. Gone is the
    requirement to use only ActiveX scripts within ETL packages (although this capability
    does still exist in SSIS, for those loyal to VBScript). With the introduction
    of the rich scripting environments in SSIS, you now have the ability to access
    the same framework features used in “real” software development. True object-oriented
    development, events, proper error handling, and other capabilities are now fully
    accessible within custom scripts in SSIS.


    SQL Server Integration Services includes two different vehicles for leveraging
    .NET code into your packages, each designed to allow different types of custom
    behaviors. The `Script task`, which resides in the control flow toolbox, is a
    broad, general-purpose tool intended to perform support and administrative tasks.
    Within the data flow toolbox, you’ll find the `Script component`, a versatile
    yet precise data movement and manipulation tool.'
