  trans: "\n默认视图将仅显示入口点包，但您也可以查看单个包以及整个项目的参数。要更改参数或连接管理器属性的值，请单击行末尾的省略号按钮。更改值时，您将有三个选项：使用项目默认值、设置字面值或使用服务器环境变量。有关环境的更多信息，请参阅下一节。\n\
    \n![9781484200834_Fig17-11.jpg](img/9781484200834_Fig17-11.jpg)\n\n### 图 17-11.\
    \ 参数配置对话框\n\n## 服务器环境\n\n服务器环境包含一组变量——本质上是名称-值对——您可以将它们映射到项目中的参数和连接管理器属性。当您通过\
    \ `SSIS 目录` 运行包时，可以选择一个环境来运行它。当一个值映射到服务器环境变量时，其值将由其当前运行的运行环境决定。\n\n在将值映射到服务器环境变量之前，必须先将环境与项目关联。图\
    \ 17-12 显示了项目配置对话框的“引用”页面，该页面允许您将项目与一个或多个环境关联。\n\n![9781484200834_Fig17-12.jpg](img/9781484200834_Fig17-12.jpg)\n\
    \n### 图 17-12. 配置对话框的“引用”页面允许您将项目与环境关联\n\n与项目类似，环境也包含在 `SSIS 目录` 中的一个文件夹内。项目可以引用目录中任何文件夹中的环境——引用不限于当前文件夹。如果您计划在项目中使用环境，可以考虑创建一个单独的文件夹作为存储所有公共环境的区域。\n\
    \n环境支持行级安全性。与项目和文件夹类似，您可以配置哪些用户或角色有权访问单个环境。用户将无法看到他们无权访问的环境。\n\n一旦项目与一个或多个服务器环境关联，您就能够将参数和连接管理器的值映射到这些环境中包含的变量。\n\
    \n![Image](img/sq.jpg) `注意` 环境可以包含任意数量的服务器变量，并且两个环境可能不包含同名的变量。如果参数或连接管理器的值映射到一个服务器变量，那么在您选择要运行包的环境时，只有包含该名称变量（且数据类型匹配！）的环境才可用。\n\
    \n## 使用 T-SQL 设置默认参数值\n\n默认参数值和连接管理器属性可以通过 `SSIS 目录` 的 `T-SQL` API 进行设置。这使得 `DBA`\
    \ 能够在部署后或项目移动到新的 `SSIS 目录` 后自动设置参数值。创建脚本的一种简单方法是通过参数配置 `UI` 进行更改，然后单击 `脚本` 按钮。清单\
    \ 17-1 展示了用于为两个项目设置默认值的 `T-SQL`：一个包参数 (`MaxCount`) 被设置为 `100`，一个连接管理器属性 (`CM.SourceFile.ConnectionString`)\
    \ 被设置为 `'C:\\Demos\\Data\\RaggedRight.txt'`。\n\n### ***清单 17-1***. 使用 T-SQL 设置参数值\n\
    \n```sql\nDECLARE @var sql_variant = N'C:\\Demos\\Data\\RaggedRight.txt'\nEXEC\
    \ [SSISDB].[catalog].[set_object_parameter_value]\n        @object_type=20,\n\
    \        @parameter_name=N'CM.SourceFile.ConnectionString',\n        @object_name=N'ExecutionDemo',\n\
    \        @folder_name=N'ETL',\n        @project_name=N'ExecutionDemo',\n     \
    \   @value_type=V,\n        @parameter_value=@var\nGO\n\nDECLARE @var bigint =\
    \ 100\nEXEC [SSISDB].[catalog].[set_object_parameter_value]\n        @object_type=30,\n\
    \        @parameter_name=N'MaxCount',\n        @object_name=N'LongRunning.dtsx',\n\
    \        @folder_name=N'ETL',\n        @project_name=N'ExecutionDemo',\n     \
    \   @value_type=V,\n        @parameter_value=@var\nGO\n```\n\n![Image](img/sq.jpg)\
    \ `注意` 有关更多信息，请参阅 SQL Server 联机丛书中关于 `set_object_parameter_value` 存储过程的条目：`http://msdn.microsoft.com/en-us/library/ff878162(sql.110).aspx`。\n\
    \n## 通过 SSIS 目录执行包\n\n执行包时，可以覆盖参数和连接管理器属性的默认值。`SSMS` 中的执行包 `UI`（如图 17-13 所示）允许您为该特定包执行指定要使用的值。项目和包级别的参数显示在“参数”选项卡上，共享连接管理器和包级别的连接管理器显示在“连接管理器”选项卡上。“高级”选项卡允许您覆盖未作为参数公开的属性值。此功能（称为属性覆盖）允许\
    \ `DBA` 快速配置包内值的更改，而无需重新部署整个项目。该功能类似于使用 `DTEXEC` 实用程序的 `/Set` 命令行选项。\n\n![9781484200834_Fig17-13.jpg](img/9781484200834_Fig17-13.jpg)\n\
    \n### 图 17-13. 通过 SSMS 进行交互式包执行\n\n执行包 `UI` 还有一个 `脚本` 菜单，允许您将创建包执行的操作脚本化为 `T-SQL`。清单\
    \ 17-2 提供了一个创建新包执行并覆盖多项设置的示例。此过程涉及多个步骤：\n\n1.  使用 `[catalog].[create_execution]`\
    \ 创建新的执行实例。\n2.  使用 `[catalog].[set_execution_parameter_value]` 覆盖参数或连接管理器值。\n\
    3.  使用 `[catalog].[set_execution_property_override_value]` 设置属性覆盖。\n4.  使用 `[catalog].[start_execution]`\
    \ 启动包执行。\n\n### ***清单 17-2***. 使用 T-SQL 运行包\n\n```sql\n-- 创建包执行\nDECLARE @exec_id\
    \ bigint\nEXEC [SSISDB].[catalog].[create_execution]\n        @execution_id=@exec_id\
    \ OUTPUT,\n        @package_name=N'LoadCustomers.dtsx',\n        @folder_name=N'ETL',\n\
    \        @project_name=N'ExecutionDemo',\n        @use32bitruntime=0\n\n-- 为 SourceFile\
    \ 连接管理器的 AlwaysCheckForRowDelimiters 属性设置新值\nEXEC [SSISDB].[catalog].[set_execution_parameter_value]\n\
    \        @execution_id=@exec_id,\n        @object_type=20,\n        @parameter_name=N'CM.SourceFile.AlwaysCheckForRowDelimiters',\n\
    \        @parameter_value=0\n\n-- 设置此执行的日志记录级别\nEXEC [SSISDB].[catalog].[set_execution_parameter_value]\n\
    \        @execution_id=@exec_id,\n        @object_type=50,\n        @parameter_name=N'LOGGING_LEVEL',\n\
    \        @parameter_value=1\n\n-- 为 MaxConcurrentExecutables 属性创建属性覆盖\nEXEC [SSISDB].[catalog].[set_execution_property_override_value]\n\
    \        @execution_id=@exec_id,\n        @property_path=N'\\Package.Properties[MaxConcurrentExecutables]',\n\
    \        @property_value=N'1',\n        @sensitive=0\n\n-- 启动包执行\nEXEC [SSISDB].[catalog].[start_execution]\
    \ @exec_id\n\n-- 返回执行 ID\nSELECT @exec_id\nGO\n```\n\n`SQL Server 代理` 中的 `Integration\
    \ Services` 作业步骤在 `SQL Server 2012` 中得到了增强，以支持运行存储在 `SSIS 目录` 中的包。其用户界面与通过 `SSMS`\
    \ 交互式运行包时相同，并提供相同的配置选项。或者，您可以使用 `T-SQL` 作业步骤运行 `SSIS` 包。但是，由于此步骤不支持使用代理账户，您将只能以\
    \ `SQL Server 代理` 服务账户的身份运行包。\n"
- fmt: '# Parameters with DTEXEC


    The command prompt utility to run SSIS packages (`DTEXEC`) has been updated to
    support projects and parameters. `DTEXEC` is able to run packages stored within
    an SSIS project file (`.ispac`) as well as start a server-based execution of a
    package stored within an SSIS Catalog (local or remote). Both modes use different
    command-line switches to set parameter values and are described in separate sections
    in the following pages.


    **Note:** When working with individual SSIS package files (`.dtsx`), `DTEXEC`
    behaves the same as it did in previous versions of SQL Server. For more information
    on the various command-line options for `DTEXEC`, see its entry in Books Online:
    `http://msdn.microsoft.com/en-us/library/ms162810.aspx`.


    ## Projects on the File System


    Although the new project deployment model is primarily meant to be used with the
    SSIS Catalog, it is possible to run packages within a project file using `DTEXEC`.
    Packages run this way are executed locally by the `DTEXEC` process. Individual
    parameter values can be set using the `/Set` option, and `/ConfigFile` can be
    used to set a number of parameter values from a 2005/2008-style XML configuration
    file. [Table 17-1](#9781484200834_Ch17.xhtml#Tab1) provides a summary of the options
    related to running packages from projects stored on the file system.


    Table 17-1. `DTEXEC` Command-Line Options for Using Project Files (`.ispac`)


    | Parameter | Description |

    | --- | --- |

    | `Proj[ect]=*path_to_project*` | This option provides the path to the SSIS project
    file (`.ispac`).Example: `/Proj c:\demo\project.ispac` |

    | `Pack[age]=*package_name*` | The name of the package within the project file
    you want to run. The value should include the `.dtsx` extension.Example: `/Pack
    MyPackage.dtsx` |

    | `Set=*parameter_name;value*` | This option allows you to set a value for a parameter
    within the project. The syntax is similar to what you’d use to override package
    variable values on the command line. Use the `$Project` namespace to set values
    for parameters defined at the project scope, and `$Package` for parameters defined
    at the package scope.Example: `/Set=\Package.Variables[$Project::IntParameter];1`
    |

    | `Conf[igFile]=*path_to_file*` | This option allows you to set multiple parameter
    values from an XML configuration file. The syntax for each parameter value is
    similar to what is used for the `/Set` option.Example: `/Conf parameters.xml`
    |


    [Listing 17-3](#9781484200834_Ch17.xhtml#list3) provides an example of running
    a package (`MyPackage.dtsx`) contained within a project file (`project.ispac`).
    It sets the values for two parameters—`BatchNumber`, an integer parameter defined
    at the project level, and `HostName`, a string parameter defined at the package
    level.


    [**Listing 17-3.** Running Packages Within a Project File Using `DTEXEC`]


    ```

    dtexec.exe /Project c:\demo\project.ispac /Package MyPackage.dtsx /Set \Package.Variables[$Project::BatchNumber];432
    /Set \Package.Variables[$Package::HostName];localhost

    ```


    **Note:** Although the syntax for setting parameter values is similar to setting
    values for variables and other package properties, there is one key difference.
    To set parameter values, you should not include the name of the property—you only
    specify the name of the parameter itself.


    ## Projects in the SSIS Catalog


    `DTEXEC` has been extended in SQL Server 2012 to support running packages contained
    within an SSIS Catalog. Unlike other execution modes, when running a package from
    a catalog, the execution takes place on the SSIS Catalog’s server and not by the
    `DTEXEC` process. In this mode, you will use the `/ISServer` command-line option
    to specify the path to the package you want to run, the `/Parameter` option to
    set parameter values, and the `/EnvReference` option if you wish to run your package
    in a specific server environment.


    [Table 17-2](#9781484200834_Ch17.xhtml#Tab2) contains a full list of command-line
    options for SSIS Catalog-based execution with `DTEXEC`.


    Table 17-2. `DTEXEC` Command-Line Options for the SSIS Catalog


    | Parameter | Description |

    | --- | --- |

    | `Ser[ver]=*server_instance*` | The name of the SQL instance containing the SSIS
    Catalog. If this option is not specified, the default instance on the `localhost`
    is assumed.Example: `/Ser ETLSERVER1` |

    | `IS[Server]=*path_to_package*` | The path of the package in the SSIS Catalog.
    This will contain the name of the catalog (`SSISDB`), the folder name, the project
    name, and the name of the package you want to run. This option cannot be used
    with the `/DTS`, `/SQL`, or `/FILE` options.Example: `/IS \SSISDB\MyFolder\ETLProject\MyPackage.dtsx`
    |

    | `Par[ameter]= *name[(type)];value*` | Set a value for the given parameter. Include
    the namespace of the parameter along with the name to distinguish parameter scope
    (`$Project` for project level parameters, `$Package` for package level parameters,
    `$CM` for connection manager properties, and `$ServerOption` for server specific
    options). If the namespace is not included, the parameter is assumed to be at
    the package scope.Example: `/Par $Project::BatchNumber;432` |

    | `Env[Reference]=*environment_id*` | This option allows you to specify a server
    environment to use when running a package. Any parameter values that have been
    bound to server environment variables will be resolved automatically. To get the
    ID for an environment, query for its name in the `[catalog].[environments]` view
    in `SSISDB`.Example: `/Env 20` |


    [Listing 17-4](#9781484200834_Ch17.xhtml#list4) provides an example of running
    a package (`MyPackage.dtsx`) contained within a project (`ETLProject`) in a folder
    (`MyFolder`) on a remote SSIS Catalog server (`ETLServer`). It sets the values
    for two parameters—`BatchNumber`, an integer parameter defined at the project
    level, and `HostName`, a string parameter defined at the package level. It also
    sets the `SYNCHRONIZED` server option to `True`, which tells `DTEXEC` to run in
    a synchronous mode—more details on synchronous vs. asynchronous execution will
    come in the following pages.


    [**Listing 17-4.** Running Packages Within an SSIS Catalog Using `DTEXEC`]


    ```

    C:\>dtexec.exe /Ser ETLServer /IS \SSISDB\MyFolder\ETLProject\MyPackage.dtsx /Par
    $Project::BatchNumber;432 /Par $Package::HostName;localhost /Par "$ServerOption::SYNCHRONIZED(Boolean)";True


    Microsoft (R) SQL Server Execute Package Utility Version 12.0.2000.8 for 64-bit

    Copyright (C) Microsoft Corporation. All rights reserved.


    Started:  4:46:44 PM

    Execution ID: 4. To view the details for the execution, right-click on the Integration
    Services Catalog, and open the [All Executions] report

    Started:  4:46:44 PM

    Finished: 4:49:45 PM

    Elapsed:  3 seconds

    ```


    **Note:** You must use Windows Authentication to connect to your SQL Server instance
    when you are running packages contained in an SSIS Catalog. The `/User` and `/Password`
    command-line options cannot be used with the `/ISServer` option. If you need to
    impersonate another user account, you can use the `RunAs` DOS command with `DTEXEC`.


    When you run an SSIS Catalog package with `DTEXEC`, it will run in an asynchronous
    mode by default. This means that the process will return immediately and will
    not tell you whether the package actually ran successfully. To get synchronous
    execution behavior (e.g., the same that you would get when running packages from
    the file system or `MSDB`), you need to include the `/Par "$ServerOption::SYNCHRONIZED(Boolean)";True`
    command-line switch. When synchronous execution is used, the `DTEXEC` process
    will not return until the package has finished running.'
