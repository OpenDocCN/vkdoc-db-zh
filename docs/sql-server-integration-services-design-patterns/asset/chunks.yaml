  trans: "\n当我们运行包实例报告时，现在它如图 A-32 所示。\n    ![9781484200834_FigAppA-32.jpg](img/9781484200834_FigAppA-32.jpg)\n\
    \    图 A-32。包实例报告的“失败超链接”\n\n点击一个失败链接会带我们进入该包实例的错误报告。很好。现在让我们在包实例报告中添加一个 `Events`\
    \ 列。添加一个列，其标题和数据字段都硬编码为 `Events`。为 `Events` 数据字段打开“文本框属性”窗口并导航到“字体”页面。将“颜色”属性设置为\
    \ `Blue`，将“效果”属性设置为 `Underline`。导航到“操作”页面，并将“启用为操作”属性设置为 `Go to Report`。从“指定报表”下拉菜单中选择\
    \ `Events` 报告，然后单击“添加”按钮两次以映射两个参数。将 `AppInstanceID` 参数名映射到 `[AppInstanceID]` 参数值，将\
    \ `PkgInstanceID` 参数名映射到 `[PkgInstanceID]` 参数值。关闭“文本框属性”窗口并单击“预览”选项卡进行测试。包实例报告应如图\
    \ A-33 所示。\n    ![9781484200834_FigAppA-33.jpg](img/9781484200834_FigAppA-33.jpg)\n\
    \    图 A-33。完成的包实例报告\n\n点击 `Events` 链接将带我进入 `Events` 报告，并仅显示引用行上包实例的事件。\n\n总结一下，你可以从应用程序实例报告开始；它位于仪表板上。点击“包”链接可查看作为选定\
    \ SSIS 应用程序实例一部分执行的所有 SSIS 子包。从那里，可以深入查看错误报告，并观察导致包失败的错误，或者在 `Events` 报告中查看所选包实例的\
    \ `OnInformation` 事件处理程序记录的所有事件。你也可以从应用程序实例报告中访问 SSIS 应用程序实例的所有错误和事件。\n\n## 结论\n\
    \n此示例并非 SSIS 框架的详尽示例，但它展示了使用 SSIS 进行基于模式的数据集成开发的实用性。该示例框架提供了可重复的、元数据驱动的 SSIS 执行，而无需离开\
    \ SSIS 和 SQL Server 数据库领域。监控由一组 SQL Server Reporting Services 报告提供，这些报告由存储过程驱动，这些存储过程读取框架的\
    \ `Parent.dtsx` SSIS 包自动捕获的元数据。在子包中捕获错误和事件信息无需编写代码行，并且这些信息以一致的格式集中记录，这使其非常适合进行报告。\n\
