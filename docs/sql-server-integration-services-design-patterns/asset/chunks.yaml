- fmt: "# DB2 参数化查询与动态查询\n\n一旦设置好 Derive Parameters 属性，您就可以使用问号来编写查询，类似于 [Listing\
    \ 6-2](#9781484200834_Ch06.xhtml#list2) 中的示例。将查询放入源组件的 SQL 命令中。\n\n[***Listing\
    \ 6-2***](#9781484200834_Ch06.xhtml#_list2). 用于说明 DB2 参数的示例查询\n```sql\nSELECT\
    \ col1\n        , col2\n        , col3\nFROM tab1\nWHERE col4 = ?\n```\n\n请务必点击源中查询旁边的\
    \ Parameters 按钮，为设置的每个参数分配变量。确保 Parameters 窗口中的变量列表与查询中的顺序正确匹配。\n\n有些场景下使用查询参数可能无效。让我们来看看何时不能使用查询参数以及替代方案。\n\
    \n## DB2 源组件动态查询\n\n如果源查询的内容因任何原因需要更改，参数化查询将无法工作。作为查询内容的一部分，表名、架构名或列名可能会改变。DB2\
    \ 中的一个典型例子是每个环境都有不同的架构。为了解决这个问题，我们在变量上设置表达式，并在 `SQLStatement` 属性中使用该变量。让我们逐步了解设置过程。\n\
    \n首先创建两个字符串变量：`environment` 和 `query`。在 `query` 变量上设置以下属性：\n```\nEvaluateAsExpression:\
    \ True\nValue: \"select col1, col2 from\" + @environment + \".tab1\"\n```\n\n\
    ![Image](images/sq.jpg) **注意** 在 SQL Server 2012 之前的 Integration Services 版本中，表达式有\
    \ 4000 个字符的限制。现在此限制已取消，允许您根据需要创建任意长度的字符串。\n\n在 OLE DB 源组件中，将查询类型更改为 SQL Command\
    \ from Variable，并选择您刚刚设置的 `query` 变量，如 [Figure 6-8](#9781484200834_Ch06.xhtml#Fig8)\
