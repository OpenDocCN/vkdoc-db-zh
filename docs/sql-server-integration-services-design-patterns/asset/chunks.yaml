- fmt: '# The Matching Policy Activity


    The Matching Policy activity is used to prepare DQS for the data deduplication
    process. From this UI, a data steward can create a policy that contains one or
    more matching rules that DQS will use to determine how rows of data should be
    compared.


    ## Data Quality Projects


    A data quality project is one where you interactively cleanse or match your data.
    You’ll select the source of your data (SQL Server or an Excel file, which you
    can upload through the client), and then map source columns to domains within
    your knowledge base. [Figure 5-4](#9781484200834_Ch05.xhtml#Fig4) shows a data
    quality project that will attempt to cleanse the `EnglishCountryRegionName` and
    `CountryRegionCode` columns against domains from the default DQS knowledge base.


    ![9781484200834_Fig05-04.jpg](images/9781484200834_Fig05-04.jpg)


    [Figure 5-4](#9781484200834_Ch05.xhtml#_Fig4). Creating a new data cleansing project


    After you’ve mapped your columns to domains, DQS will process your data and provide
    you with the results of the cleansing operation. When you review the results,
    you have the option to approve or reject certain corrections, add new values to
    the list of known domain values, and specify correction rules. For example, as
    the data steward for your organization, you know that “Jack Ryan” and “John Ryan”
    are the same person. After approving the corrections, you can export the results
    to a SQL Server table, Excel file, or CSV file. DQS does not give you the option
    to correct the value in-place—you will need a separate process to update the original
    source data you examined.


    At various times during the process you can save your data quality project. The
    project status is saved to the DQS server, allowing you to resume at a later point.
    This is especially useful when working with large sets of data that can take awhile
    to scan. It also allows you to come back to the correction results in case you
    need to do some research on what the correct values should be for a particular
    domain.


    To manage your active data quality projects, click on the Open Data Quality Project
    button on the home page of the client. From here, you can see all projects that
    are currently in progress. Right clicking on a project gives you management options,
    such as renaming the project or deleting it if it is no longer needed.


    ## Administration


    The Administration section is available to users in the DQS Administrator’s role.
    From here, you can monitor all activity on the DQS server (such as Domain Management
    and Cleansing projects), and set system wide configuration options. From these
    pages, you can set logging levels for various operations, as well as set the minimum
    confidence scores for suggestions and automatic corrections. If you are using
    online reference data from the Windows Azure Marketplace, you will configure your
    account information and service subscriptions from this page as well (as shown
    in [Figure 5-5](#9781484200834_Ch05.xhtml#Fig5)).


    ![9781484200834_Fig05-05.jpg](images/9781484200834_Fig05-05.jpg)


    [Figure 5-5](#9781484200834_Ch05.xhtml#_Fig5). Configuration for online reference
    data in the Windows Azure Marketplace


    ## Using the Default Knowledge Base


    DQS comes with a default knowledge base containing domains related to cleansing
    and validation of countries and locations within the United States. [Figure 5-6](#9781484200834_Ch05.xhtml#Fig6)
    shows the domain values for the “US – State” domain. In this figure, you can see
    that “Alabama” has synonyms defined for it—it will automatically correct “AL”
    to “Alabama,” and mark “Ala.” as an error.


    ![9781484200834_Fig05-06.jpg](images/9781484200834_Fig05-06.jpg)


    [Figure 5-6](#9781484200834_Ch05.xhtml#_Fig6). The US – State domain from the
    default DQS knowledge base


    ## Online Reference Data Services


    DQS has two types of data it will use to perform cleansing and matching operations;
    local data and reference data. Local data make up the values shown on the Domain
    Values page in the DQS Client—these are known values that are imported into DQS
    as part of the Knowledge Discovery process. The values are stored along with the
    knowledge base in the `DQS_MAIN` database. If these values change, you must update
    your domain with the new values. Reference data is not stored in the knowledge
    base—it is queried from an online reference data service. Using online reference
    data may impact performance, because your cleansing process will need to call
    out to an external system, but it requires less maintenance since you don’t need
    to worry about keeping values in sync.


    The online, Reference Data Services (RDS) that can be linked to your domains are
    configured on the Administration page in the DQS Client. There are two types of
    data providers: DataMarket providers from the Windows Azure Marketplace, and Direct
    Online third party providers. DataMarket providers require that you have a Windows
    Azure Marketplace Account ID and subscription to the data set you wish to use.
    The Direct Online provider option allows you to point to other third party web
    services that support the DQS provider interface.


    ## Using DQS with SSIS


    SQL Server 2014 comes with the DQS Cleansing transform for SSIS. This section
    describes how to configure and use this transform as part of your SSIS data flow.
    This section also contains information on a few open source extensions for DQS,
    which are available on CodePlex.


    ### DQS Cleansing Transform


    The DQS Cleansing transform is included with SSIS 2014 and can be found in the
    Data Flow toolbox (shown in [Figure 5-7](#9781484200834_Ch05.xhtml#Fig7)). It
    will appear under the Other Transforms section of the toolbox by default.


    ![9781484200834_Fig05-07.jpg](images/9781484200834_Fig05-07.jpg)


    [Figure 5-7](#9781484200834_Ch05.xhtml#_Fig7). The DQS Cleansing transform


    After adding the DQS Cleansing transform to your data flow, you can double click
    the component to bring up its editor UI. The first thing you need to set in the
    DQS Cleansing Transformation Editor is the Data Quality Connection Manager (as
    shown in [Figure 5-8](#9781484200834_Ch05.xhtml#Fig8)). This will point to a DQS
    installation residing on a SQL Server instance. Once the connection manager has
    been created, you select the knowledge base you want to use. Selecting the knowledge
    base you want to use will bring up its list of domains.


    ![9781484200834_Fig05-08.jpg](images/9781484200834_Fig05-08.jpg)


    [Figure 5-8](#9781484200834_Ch05.xhtml#_Fig8). The DQS Connection Manager and
    Cleansing Transformation Editor


    As mentioned earlier in the chapter, there are two types of domains in this list;
    regular domains (e.g., `City`, `State`, `Zip`), and composite domains, which are
    made up of two or more regular domains. When using the DQS Cleansing transform,
    you can map columns from your data flow to domains in the knowledge base. You
    can also make use of composite domains in two ways:


    1.  **A single (string) column:** For this to work, all values must appear in
    the same order as the domains do. So using the `Company` example from the begining
    of this chapter, your column values would need to look like this: Microsoft Corporation,
    One Redmond Way, Redmond, WA, USA.

    2.  **Multiple columns:** Individual columns are always cleansed by the knowledge
    and rules stored within the DQS knowledge base. If you map a column to each domain
    of a composite domain, the row will also be cleansed using the composite domain
    logic.


    ```

    Note  There is currently no indicator in the DQS Cleansing transform UI to show
    when you’ve mapped columns to all domains within a composite domain. You need
    to double check that each domain is mapped; otherwise, each column will be validated
    and cleansed individually.

    ```'
