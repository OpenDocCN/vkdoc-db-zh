  trans: "# SSIS 应用程序实例日志记录与错误处理\n\n## 存储过程设置\n\n以下 SQL 脚本创建了用于记录 SSIS 应用程序实例状态的存储过程。\n\
    \n```sql\nPrint 'Dropping log.LogApplicationSuccess stored procedure'\ngo\nDrop\
    \ Procedure [log].LogApplicationSuccess\nPrint 'Log.LogApplicationSuccess stored\
    \ procedure dropped'\nend\nPrint 'Creating log.LogApplicationSuccess stored procedure'\n\
    go\n\nCreate Procedure [log].LogApplicationSuccess\n\t@AppInstanceID int\nAs\n\
    \tupdate log.SSISAppInstance\n\tset EndDateTime = GetDate()\n\t  , Status = 'Success'\n\
    \twhere AppInstanceID = @AppInstanceID\ngo\nPrint 'Log.LogApplicationSuccess stored\
    \ procedure created.'\nPrint ''\n\n/* log.LogApplicationFailure stored procedure\
    \ */\nIf Exists(Select s.name + '.' + p.name\n          From sys.procedures p\n\
    \          Join sys.schemas s\n            On s.schema_id = p.schema_id\n    \
    \      Where s.name = 'log'\n            And p.name = 'LogApplicationFailure')\n\
    begin\n\tprint 'Dropping log.LogApplicationFailure stored procedure'\n\tDrop Procedure\
    \ [log].LogApplicationFailure\n\tPrint 'Log.LogApplicationFailure stored procedure\
    \ dropped'\nend\nPrint 'Creating log.LogApplicationFailure stored procedure'\n\
    go\n\nCreate Procedure [log].LogApplicationFailure\n\t@AppInstanceID int\nAs\n\
    \tupdate log.SSISAppInstance\n\tset EndDateTime = GetDate()\n\t  , Status = 'Failed'\n\
    \twhere AppInstanceID = @AppInstanceID\ngo\nPrint 'Log.LogApplicationFailure stored\
    \ procedure created.'\nPrint ''\n```\n\n## 在 SSDT 中配置日志记录\n\n现在让我们回到 SSDT，将应用程序实例日志记录添加到\
    \ `Parent.dtsx` 包中。\n\n### 记录应用程序开始\n\n1.  在控制流中拖入一个新的执行 SQL 任务，并将其重命名为 `Log Start\
    \ of Application`。\n2.  将 `ResultSet` 属性设置为 Single Row。\n3.  将 `ConnectionType`\
    \ 属性设置为 ADO.Net，并将 `Connection` 设置为 `SSISConfig` 连接管理器。\n4.  将 `SQLStatement`\
    \ 属性设置为 `log.LogStartOfApplication`，并将 `IsQueryStoredProcedure` 属性设置为 `True`。\n\
    5.  导航到“参数映射”页面并添加一个新参数：将 `User::ApplicationName` SSIS 变量映射到 `log.LogStartOfApplication`\
    \ 存储过程的 `ApplicationName` 参数。\n6.  将 `ApplicationName` 参数的“数据类型”属性更改为 String。\n\
    7.  在“结果集”页面上，添加一个名为 `0` 的新结果，并将其映射到名为 `AppInstanceID` 的新 Int32 变量。\n8.  将 `AppInstanceID`\
    \ 变量的默认值设置为 `0`。\n9.  关闭“执行 SQL 任务编辑器”，并从“Log Start of Application”执行 SQL 任务到“Get\
    \ Package Metadata”执行 SQL 任务连接一个优先约束。\n\n### 记录应用程序成功\n\n1.  在控制流中“Foreach Child\
    \ Package”Foreach 循环容器下方拖入另一个执行 SQL 任务，并将其重命名为 `Log Application Success`。\n2.\
    \  打开编辑器，将 `ConnectionType` 属性更改为 ADO.Net，并将 `Connection` 属性设置为 `SSISConfig` 连接管理器。\n\
    3.  在 `SQLStatement` 属性中输入 `log.LogApplicationSuccess`，并将 `IsQueryStoredProcedure`\
    \ 属性设置为 `True`。\n4.  导航到“参数映射”页面，添加 `User::AppInstanceID` SSIS 变量与 `log.LogApplicationSuccess`\
    \ 存储过程的 `Int32 AppInstanceID` 参数之间的映射。\n5.  关闭“执行 SQL 任务编辑器”，并从“Foreach Child\
    \ Package”Foreach 循环容器到“Log Application Success”执行 SQL 任务连接一个优先约束。\n\n你刚刚完成了什么？你将\
    \ SSIS 应用程序实例日志记录添加到了 `Parent.dtsx` SSIS 包的控制流中。\n\n### 测试与验证\n\n要测试这一点，你需要在 SSDT\
    \ 调试器中执行 `Parent.dtsx`。\n\n执行完成后，执行以下查询以观察记录的结果：\n\n```sql\nSelect * From [log].SSISAppInstance\n\
    ```\n\n当我执行此查询时，得到如图 A-10 所示的结果。\n\n![9781484200834_FigAppA-10.jpg](img/9781484200834_FigAppA-10.jpg)\n\
    图 A-10. 观察查询应用程序实例日志的结果\n\n## 处理应用程序失败\n\n当 SSIS 应用程序失败时会发生什么？你需要用 `EndDateTime`\
    \ 更新 `log.SSISAppInstance` 行，并将状态设置为 Failed。为此，你将使用一个配置为执行 `log.LogApplicationFailure`\
    \ 存储过程的执行 SQL 任务。问题是：放在哪里？答案是：`Parent.dtsx` 包的 OnError 事件处理程序。\n\n在 SSDT 中，单击\
    \ `Parent.dtsx` 上的“事件处理程序”选项卡。在“可执行文件”下拉列表中，选择 Parent；在“事件处理程序”下拉列表中，选择 OnError，如图\
    \ A-11 所示。\n\n![9781484200834_FigAppA-11.jpg](img/9781484200834_FigAppA-11.jpg)\n\
    图 A-11. 配置 Parent 包的 OnError 事件处理程序\n\n单击事件处理程序表面上的“单击此处为可执行文件“Parent”创建“OnError”事件处理程序”链接，为\
    \ `Parent.dtsx` 包创建 OnError 事件处理程序。\n\n我可以引导你构建另一个执行 SQL 任务来记录 SSIS 应用程序失败；但是，更简单的方法是直接从控制流底部复制“Log\
    \ Application Success”执行 SQL 任务，并将其粘贴到 `Parent.dtsx` OnError 事件处理程序中。粘贴后，将名称更改为\
    \ `Log Application Failure`，并将 `SQLStatement` 属性更改为 `log.LogApplicationFailure`。\n\
    \n## 构建错误测试包\n\n现在你准备好测试了，但除非修改一个包，否则你无法真正测试应用程序失败，这似乎有点不幸。你之后可能还需要测试错误。那么为什么不构建一个\
    \ `ErrorTest.dtsx` SSIS 包并将其添加到 SSIS 应用程序中呢？我喜欢这个计划！\n\n1.  创建一个新的 SSIS 包并将其重命名为\
    \ `ErrorTest.dtsx`。\n2.  在控制流中添加一个脚本任务，并将其重命名为 `Succeed or Fail?`。\n3.  将 `ScriptLanguage`\
    \ 属性更改为 Microsoft Visual Basic 2012。\n4.  打开编辑器并将 `System::TaskName` 和 `System::PackageName`\
    \ 变量添加到 `ReadOnlyVariables` 属性中。\n5.  打开脚本编辑器，并将清单 A-13 中所示的代码添加到 `Sub Main()`\
    \ 中。\n\n**清单 A-13.** 使 SSIS 包成功或失败的代码\n\n```vb\nPublic Sub Main()\n        Dim\
    \ sPackageName As String = Dts.Variables(\"PackageName\").Value.ToString\n   \
    \     Dim sTaskName As String = Dts.Variables(\"TaskName\").Value.ToString\n \
    \       Dim sSubComponent As String = sPackageName & \".\" & sTaskName\n\n   \
    \     Dim iResponse As Integer = MsgBox(\"Succeed Package?\", MsgBoxStyle.YesNo,\
    \ sSubComponent)\n        If iResponse = vbYes Then\n            Dts.TaskResult\
    \ = ScriptResults.Success\n        Else\n            Dts.TaskResult = ScriptResults.Failure\n\
    \        End If\n\n    End Sub\n```\n\n通过在 SSDT 调试器中执行 `ErrorTest.dtsx` 进行单元测试，如图\
    \ A-12 所示。\n\n![9781484200834_FigAppA-12.jpg](img/9781484200834_FigAppA-12.jpg)\n\
    图 A-12. 对 ErrorTest.dtsx SSIS 包进行单元测试\n\n要将此 SSIS 包添加到 SSISApp1 SSIS 应用程序，请将清单\
    \ A-14 中的 T-SQL 脚本附加到清单 A-11 中的 T-SQL 脚本之后。\n\n**清单 A-14.** 将此 T-SQL 脚本附加到清单 A-11\
    \ 之后，以将 ErrorTest.dtsx SSIS 包添加到 SSISApp1 SSIS 应用程序\n\n```sql\n/*ErrorTest.dtsx\
    \ */\n\n/* Variable Declaration */\ndeclare @PackageFolder varchar(255) = 'F:\\\
    Andy\\Projects\\PublicFramework_PackageDeployment_2014\\SSISConfig2014\\'\ndeclare\
    \ @PackageName varchar(255) = 'Child1.dtsx'\ndeclare @PackageID int\ndeclare @ExecutionOrder\
    \ int = 10\n\ndeclare @ApplicationName varchar(255) = 'SSISApp1'\ndeclare @ApplicationID\
    \ int\n\n/* Add the SSIS First Application */\nIf Not Exists(Select ApplicationName\n\
    \              From cfg.Applications\n              Where ApplicationName = @ApplicationName)\n\
    begin\n\tprint 'Adding ' + @ApplicationName\n\texec cfg.AddSSISApplication @ApplicationName,\
    \ @ApplicationID output\n\tprint @ApplicationName + ' added.'\nend\nElse\nbegin\n\
    \tSelect @ApplicationID = ApplicationID\n\tFrom cfg.Applications\n\tWhere ApplicationName\
    \ = @ApplicationName\n\tprint @ApplicationName + ' already exists in the Framework.'\n\
    end\nprint ''\n\nset @PackageName = 'ErrorTest.\n```"
- fmt: "# SSIS 应用程序日志配置\n\ndtsx' set `@ExecutionOrder` = 30\nIf Not Exists(Select\
    \ `PackageFolder` + `PackageName`\n              From `cfg.Packages`\n       \
    \       Where `PackageFolder` = `@PackageFolder`\n                And `PackageName`\
    \ = `@PackageName`)\n begin\n  print 'Adding ' + `@PackageFolder` + `@PackageName`\n\
    \  exec `cfg.AddSSISPackage` `@PackageName`, `@PackageFolder`, `@PackageID` output\n\
    \ end\nElse\n begin\n  Select `@PackageID` = `PackageID`\n  From `cfg.Packages`\n\
    \  Where `PackageFolder` = `@PackageFolder`\n    And `PackageName` = `@PackageName`\n\
    \  print `@PackageFolder` + `@PackageName` + ' already exists in the Framework.'\n\
    \ end\n\nIf Not Exists(Select `AppPackageID`\n              From `cfg.AppPackages`\n\
    \              Where `ApplicationID` = `@ApplicationID`\n                And `PackageID`\
    \ = `@PackageID`\n                And `ExecutionOrder` = `@ExecutionOrder`)\n\
    \ begin\n  print 'Adding ' + `@ApplicationName` + '.' + `@PackageName` + ' to\
    \ Framework with ExecutionOrder ' + convert(varchar, `@ExecutionOrder`)\n  exec\
    \ `cfg.AddSSISApplicationPackage` `@ApplicationID`, `@PackageID`, `@ExecutionOrder`\n\
    \  print `@PackageName` + ' added and wired to ' + `@ApplicationName`\n end\n\
    Else\n print `@ApplicationName` + '.' + `@PackageName` + ' already exists in the\
    \ Framework with ExecutionOrder ' + convert(varchar, `@ExecutionOrder`)\n\n现在打开\
    \ `Parent.dtsx` 并在 SSDT 调试器中执行它。一旦被 `ErrorTest.dtsx` 消息框提示，单击 No 按钮以导致 `ErrorTest.dtsx`\
    \ 失败。这应该会触发 `Parent.dtsx` 包的 OnError 事件处理程序，如 [Figure A-13](#9781484200834_AppA.xhtml#Fig13)\
    \ 所示。\n\n![9781484200834_FigAppA-13.jpg](images/9781484200834_FigAppA-13.jpg)\n\
    \n[Figure A-13](#9781484200834_AppA.xhtml#_Fig13). 我对成功的 OnError 事件处理程序感觉复杂。\n\
    \n几次成功和失败的执行后，`log.SSISAppInstance` 表包含如 [Figure A-14](#9781484200834_AppA.xhtml#Fig14)\
    \ 所示的行。\n\n![9781484200834_FigAppA-14.jpg](images/9781484200834_FigAppA-14.jpg)\n\
    \n[Figure A-14](#9781484200834_AppA.xhtml#_Fig14). SSISApp1 的成功与失败\n\n关于应用程序实例日志到此结束！接下来，让我们构建子包实例日志。\n\
    \n## 构建包实例日志\n\n包实例日志的工作方式类似于应用程序实例日志，只是规模不同。一个应用程序实例由一个应用程序 ID 和一个执行开始时间组成。一个包实例由一个应用程序包\
    \ ID、一个应用程序实例 ID 和一个执行开始时间组成。\n\n让我们从创建 `log.SSISPkgInstance` 表和存储过程开始。[Listing\
    \ A-15](#9781484200834_AppA.xhtml#list15) 包含了这些数据库对象。\n\n[Listing A-15](#9781484200834_AppA.xhtml#_list15).\
    \ 构建包实例日志表和存储过程\n\n```sql\n/* log.SSISPkgInstance table */\nIf Not Exists(Select\
    \ s.name + '.' + t.name\n              From sys.tables t\n              Join sys.schemas\
    \ s\n                On s.schema_id = t.schema_id\n              Where s.name\
    \ = 'log'\n                And t.name = 'SSISPkgInstance')\n begin\n  print 'Creating\
    \ log.SSISPkgInstance table'\n  Create Table [log].SSISPkgInstance\n  (\n    PkgInstanceID\
    \ int identity(1,1) \n     Constraint PK_SSISPkgInstance Primary Key Clustered\n\
    \   ,AppInstanceID int Not Null\n        Constraint FK_logSSISPkgInstance_logSSISAppInstance_AppInstanceID\n\
    \         Foreign Key References [log].SSISAppInstance(AppInstanceID)\n   ,AppPackageID\
    \ int Not Null\n        Constraint FK_logSSISPkgInstance_cfgAppPackages_AppPackageID\n\
    \         Foreign Key References cfg.AppPackages(AppPackageID)\n   ,StartDateTime\
    \ datetime Not Null\n     Constraint DF_cfgSSISPkgInstance_StartDateTime\n   \
    \   Default(GetDate())\n   ,EndDateTime datetime Null\n   ,[Status] varchar(12)\
    \ Null\n  )\n  print 'Log.SSISPkgInstance created'\n end\nElse\n print 'Log.SSISPkgInstance\
    \ table already exists.'\nprint ''\n\n/* log.LogStartOfPackage stored procedure\
    \ */\nIf Exists(Select s.name + '.' + p.name\n          From sys.procedures p\n\
    \          Join sys.schemas s\n            On s.schema_id = p.schema_id\n    \
    \      Where s.name = 'log'\n            And p.name = 'LogStartOfPackage')\n begin\n\
    \  print 'Dropping log.LogStartOfPackage stored procedure'\n  Drop Procedure [log].LogStartOfPackage\n\
    \  print 'Log.LogStartOfPackage stored procedure dropped'\n end\nprint 'Creating\
    \ log.LogStartOfPackage stored procedure'\ngo\n\nCreate Procedure [log].LogStartOfPackage\n\
    \ @AppInstanceID int\n ,@AppPackageID int\nAs\n declare @ErrMsg varchar(255)\n\
    \ Insert Into log.SSISPkgInstance\n  (AppInstanceID, AppPackageID, StartDateTime,\
    \ Status)\n  Output inserted.PkgInstanceID\n  Values\n  (@AppInstanceID, @AppPackageID,\
    \ GetDate(), 'Running')\ngo\nprint 'Log.SSISPkgInstance stored procedure created.'\n\
    print ''\n\n/* log.LogPackageSuccess stored procedure */\nIf Exists(Select s.name\
    \ + '.' + p.name\n          From sys.procedures p\n          Join sys.schemas\
    \ s\n            On s.schema_id = p.schema_id\n          Where s.name = 'log'\n\
    \            And p.name = 'LogPackageSuccess')\n begin\n  print 'Dropping log.LogPackageSuccess\
    \ stored procedure'\n  Drop Procedure [log].LogPackageSuccess\n  print 'Log.LogPackageSuccess\
    \ stored procedure dropped'\n end\nprint 'Creating log.LogPackageSuccess stored\
    \ procedure'\ngo\n\nCreate Procedure [log].LogPackageSuccess\n @PkgInstanceID\
    \ int\nAs\n update log.SSISPkgInstance\n set EndDateTime = GetDate()\n   , Status\
    \ = 'Success'\n where PkgInstanceID = @PkgInstanceID\ngo\nprint 'Log.LogPackageSuccess\
    \ stored procedure created.'\nprint ''\n\n/* log.LogPackageFailure stored procedure\
    \ */\nIf Exists(Select s.name + '.' + p.name\n          From sys.procedures p\n\
    \          Join sys.schemas s\n            On s.schema_id = p.schema_id\n    \
    \      Where s.name = 'log'\n            And p.name = 'LogPackageFailure')\n begin\n\
    \  print 'Dropping log.LogPackageFailure stored procedure'\n  Drop Procedure [log].LogPackageFailure\n\
    \  print 'Log.LogPackageFailure stored procedure dropped'\n end\nprint 'Creating\
    \ log.LogPackageFailure stored procedure'\ngo\n\nCreate Procedure [log].LogPackageFailure\n\
    \ @PkgInstanceID int\nAs\n update log.SSISPkgInstance\n set EndDateTime = GetDate()\n\
    \   , Status = 'Failed'\n where PkgInstanceID = @PkgInstanceID\ngo\nprint 'Log.LogPackageFailure\
    \ stored procedure created.'\nprint ''\n```\n\n`log.SSISPkgInstance` 表将保存 SSIS\
    \ 包实例数据。`Log.LogStartofPackage` 向 `SSISPkgInstance` 表插入一行；`log.LogPackageSuccess`\
    \ 用 `EndDateTime` 和 `'Success'` 状态更新该行，而 `log.LogPackageFailure` 用 `EndDateTime`\
    \ 和 `'Failed'` 状态更新记录。\n\n在 `Parent.dtsx` 中，打开 Foreach Child Package Foreach Loop\
    \ 容器的编辑器。导航到 Variable Mappings 页面并添加一个新变量。在 Add Variable 窗口中配置以下设置：\n*   Container:\
    \ `Parent`\n*   Name: `AppPackageID`\n*   Namespace: `User`\n*   Value Type: `Int32`\n\
    *   Value: `0`\n\n单击 OK 按钮关闭 Add Variable 窗口。`AppInstanceID`——存在于 `User::Packages`\
    \ SSIS 变量内的数据集中——是从执行 `cfg.GetSSISApplication` 存储过程返回的。`AppPackageID` 列作为第五列返回。因此，Foreach\
    \ Child Package Foreach Loop 容器的 Variable Mappings 页面上 `AppPackageID` 变量的 `Index`\
    \ 列应设置为 `4`（0 基数组中的第五个值）。单击 OK 按钮关闭 Foreach Child Package Foreach Loop Container\
    \ Editor。\n\n向 Foreach Child Package Foreach Loop 容器添加一个 Execute SQL 任务。将新的 Execute\
    \ SQL 任务重命名为 **Log Start of Package**。打开编辑器并将 ResultSet 属性设置为 Single Row。将 ConnectionType\
    \ 属性设置为 ADO.Net，并将 Connection 设置为 `SSISConfig` 连接管理器。将 SQLStatement 属性设置为 `log.LogStartOfPackage`，并将\
    \ IsQueryStoredProcedure 属性设置为 `True`。"
