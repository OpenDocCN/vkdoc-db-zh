    \ Server PDW 将直接在目标数据库内执行加载操作，这可能导致高水平的表碎片。\n\n单击 **Destination Table** 字段将弹出\
    \ **Select Destination Table** 模型。单击 `FactSales`。有四种可用的加载模式：\n\n*   **Append:**\
    \ 将行插入到目标表中现有数据的末尾。这可能是你最常用的模式。\n*   **Reload:** 在加载前截断表。\n*   **Upsert:** 对目标表执行\
    \ `MERGE`，其中新数据被插入，现有数据被更新。你需要指定一个或多个用于连接数据的列。\n*   **FastAppend:** 顾名思义，FastAppend\
    \ 是将数据加载到目标表中的最快方式。代价是它不支持回滚；在失败的情况下，你需要负责删除任何部分插入的行。FastAppend 还将绕过暂存数据库，导致高水平的碎片。\n\
