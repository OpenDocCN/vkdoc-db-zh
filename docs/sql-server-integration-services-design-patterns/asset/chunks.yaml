- fmt: "The default view will display entry-point packages only, but you can also\
    \ view parameters for individual packages and for the entire project. To change\
    \ the value for a parameter or connection manager property, click the ellipses\
    \ button at the end of the row. You will have three options when you go to change\
    \ a value: use the project default, set a literal value, or use a server environment\
    \ variable. For more information about environments, see the next section.\n\n\
    ![9781484200834_Fig17-11.jpg](images/9781484200834_Fig17-11.jpg)\n\n### [Figure\
    \ 17-11](#9781484200834_Ch17.xhtml#_Fig11). Parameter configuration dialog\n\n\
    ## Server Environments\n\nServer environments contain a set of variables—essentially\
    \ name-value pairs—that you can map to parameters and connection manager properties\
    \ within your project. When you run a package through the `SSIS Catalog`, you\
    \ can select an environment to run it in. When a value is mapped to a server environment\
    \ variable, its value will be determined by the environment it is currently running\
    \ in.\n\nBefore you can map a value to a server environment variable, you must\
    \ associate the environment with the project. [Figure 17-12](#9781484200834_Ch17.xhtml#Fig12)\
    \ shows the References page of the project Configure dialog, which allows you\
    \ to associate a project with one or more environments.\n\n![9781484200834_Fig17-12.jpg](images/9781484200834_Fig17-12.jpg)\n\
    \n### [Figure 17-12](#9781484200834_Ch17.xhtml#_Fig12). The References page of\
    \ the Configure dialog lets you associate a project with environments\n\nLike\
    \ projects, environments are contained within a folder in the `SSIS Catalog`.\
    \ A project may reference an environment in any folder in the catalog—references\
    \ are not limited to the current folder only. If you plan to use environments\
    \ throughout your projects, you might consider creating a separate folder as an\
    \ area to store all of the common environments.\n\nEnvironments support row-level\
    \ security. Like projects and folders, you can configure which users or roles\
    \ have access to individual environments. Users will not be able to see environments\
    \ they do not have access to.\n\nOnce a project has been associated with one or\
    \ more server environments, you are able to map parameter and connection manager\
    \ values to variables contained within those environments.\n\n![Image](images/sq.jpg)\
    \ `Note` Environments can contain any number of server variables, and two environments\
    \ might not contain variables with the same name. If a parameter or connection\
    \ manager value is mapped to a server variable, only environments that contain\
    \ a variable with that name (and matching data type!) will be available when you\
    \ go to select the environment to run the package in.\n\n## Default Parameter\
    \ Values Using T-SQL\n\nDefault parameter values and connection manager properties\
    \ can be set through the `SSIS Catalog`’s `T-SQL` API. This allows a `DBA` to\
    \ automate the setting of parameter values after a deployment or after a project\
    \ is moved to a new `SSIS Catalog`. An easy way to create a script is to make\
    \ the changes through the parameter configuration `UI`, and then click the `Script`\
    \ button. [Listing 17-1](#9781484200834_Ch17.xhtml#list1) shows the `T-SQL` used\
    \ to set default values for a two items: a package parameter (`MaxCount`) is set\
    \ to `100`, and a connection manager property (`CM.SourceFile.ConnectionString`)\
    \ is set to `'C:\\Demos\\Data\\RaggedRight.txt'`.\n\n### [***Listing 17-1***](#9781484200834_Ch17.xhtml#_list1).\
    \ Setting Parameter Values Using T-SQL\n\n```sql\nDECLARE @var sql_variant = N'C:\\\
    Demos\\Data\\RaggedRight.txt'\nEXEC [SSISDB].[catalog].[set_object_parameter_value]\n\
    \        @object_type=20,\n        @parameter_name=N'CM.SourceFile.ConnectionString',\n\
    \        @object_name=N'ExecutionDemo',\n        @folder_name=N'ETL',\n      \
    \  @project_name=N'ExecutionDemo',\n        @value_type=V,\n        @parameter_value=@var\n\
    GO\n\nDECLARE @var bigint = 100\nEXEC [SSISDB].[catalog].[set_object_parameter_value]\n\
    \        @object_type=30,\n        @parameter_name=N'MaxCount',\n        @object_name=N'LongRunning.dtsx',\n\
    \        @folder_name=N'ETL',\n        @project_name=N'ExecutionDemo',\n     \
    \   @value_type=V,\n        @parameter_value=@var\nGO\n```\n\n![Image](images/sq.jpg)\
    \ `Note` For more information, see the `set_object_parameter_value` stored procedure\
    \ entry in Books Online: `http://msdn.microsoft.com/en-us/library/ff878162(sql.110).aspx`.\n\
    \n## Package Execution Through the SSIS Catalog\n\nDefault values for parameters\
    \ and connection manager properties can be overridden when a package is executed.\
    \ The Execute Package `UI` in `SSMS` (shown in [Figure 17-13](#9781484200834_Ch17.xhtml#Fig13))\
    \ allows you to specify the values to use for that specific execution of the package.\
    \ Project and package-level parameters are displayed on the `Parameters` tab and\
    \ shared connection managers and package-level connection managers are shown in\
    \ the `Connection Managers` tab. The `Advanced` tab allows you to override property\
    \ values that were not exposed as parameters. This feature—called Property Overrides—allows\
    \ a `DBA` to make a quick configuration change to a value within a package without\
    \ having to redeploy the entire project. The functionality is similar to using\
    \ the `/Set` command line option with the `DTEXEC` utility.\n\n![9781484200834_Fig17-13.jpg](images/9781484200834_Fig17-13.jpg)\n\
    \n### [Figure 17-13](#9781484200834_Ch17.xhtml#_Fig13). Interactive package execution\
    \ through SSMS\n\nThe Execute Package `UI` also has a `Script` menu which allows\
    \ you to script out the creation of a package execution to `T-SQL`. [Listing 17-2](#9781484200834_Ch17.xhtml#list2)\
    \ provides an example of creating a new package execution and overriding a number\
    \ of settings. This procedure involves a number of steps:\n\n1.  Create a new\
    \ execution instance using `[catalog].[create_execution]`.\n2.  Override parameter\
    \ or connection manager values using `[catalog].[set_execution_parameter_value]`.\n\
    3.  Set property overrides using `[catalog].[set_execution_property_override_value]`.\n\
    4.  Start the package execution using `[catalog].[start_execution]`.\n\n### [***Listing\
    \ 17-2***](#9781484200834_Ch17.xhtml#_list2). Running a Package Using T-SQL\n\n\
    ```sql\n-- Create the package execution\nDECLARE @exec_id bigint\nEXEC [SSISDB].[catalog].[create_execution]\n\
    \        @execution_id=@exec_id OUTPUT,\n        @package_name=N'LoadCustomers.dtsx',\n\
    \        @folder_name=N'ETL',\n        @project_name=N'ExecutionDemo',\n     \
    \   @use32bitruntime=0\n\n-- Set a new value for the AlwaysCheckForRowDelimiters\
    \ property of the\n-- SourceFile connection manager\nEXEC [SSISDB].[catalog].[set_execution_parameter_value]\n\
    \        @execution_id=@exec_id,\n        @object_type=20,\n        @parameter_name=N'CM.SourceFile.AlwaysCheckForRowDelimiters',\n\
    \        @parameter_value=0\n\n-- Set the logging level for this execution\nEXEC\
    \ [SSISDB].[catalog].[set_execution_parameter_value]\n        @execution_id=@exec_id,\n\
    \        @object_type=50,\n        @parameter_name=N'LOGGING_LEVEL',\n       \
    \ @parameter_value=1\n\n-- Create a property override for the MaxConcurrentExecutables\
    \ property\nEXEC [SSISDB].[catalog].[set_execution_property_override_value]\n\
    \        @execution_id=@exec_id,\n        @property_path=N'\\Package.Properties[MaxConcurrentExecutables]',\n\
    \        @property_value=N'1',\n        @sensitive=0\n\n-- Start the package execution\n\
    EXEC [SSISDB].[catalog].[start_execution] @exec_id\n\n-- Return the execution\
    \ ID\nSELECT @exec_id\nGO\n```\n\nThe `Integration Services` job steps in `SQL\
    \ Server Agent` have been enhanced in `SQL Server 2012` to support running packages\
    \ stored in an `SSIS Catalog`. The user interface is the same as when you run\
    \ a package interactively through `SSMS`, and it provides the same configuration\
    \ options. Alternatively, you can run `SSIS` packages using the `T-SQL` job step.\
    \ However, since this step does not support the use of proxy accounts, you will\
    \ be limited to running the packages as the `SQL Server Agent` service account."
