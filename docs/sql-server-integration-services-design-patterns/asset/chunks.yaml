    ![Image](images/sq.jpg) **Note** This approach works especially well when looking
    up key fields that are part of an entity in Master Data Services (MDS), another
    product that ships with SQL Server 2014\. Using an MDS Subscription View, you
    can expose your dimension as a view that can be queried by a Lookup transform.
    For more information about Master Data Services, see the books online entry: `http://msdn.microsoft.com/en-us/library/ee633763.aspx`.


    ## Approving and Importing Cleansing Rules


    When a data flow with a DQS Cleansing transform is run, a cleansing project is
    created on the DQS server. This allows the KB editor to view the corrections performed
    by the transform and approve or reject rules. A new project is created automatically
    each time the package is run and can be viewed using the DQS client. When performing
    parallel cleansing with multiple DQS Cleansing transforms in a single data flow,
    a project will be created for each transform you are using.


    Once correction rules have been approved by the KB editor, they can be imported
    into the knowledge base so they can be automatically applied the next time cleansing
    is performed. This process can be done with the following steps:


    1.  Run the SSIS package containing the DQS Cleansing transform.

    2.  Open the DQS client, and connect to the DQS server used by the SSIS package.

    3.  Click on the Open Data Quality Project button.

    4.  The newly created project will be listed on the left hand pane (as shown in
    [Figure 5-15](#9781484200834_Ch05.xhtml#Fig15)). The project’s name will be generated
    using the name of the package, the name of the DQS Cleansing transform, a timestamp
    of when the package was executed, the unique identifier of the Data Flow task
    that contained the transformation, and another unique identifier for the specific
    execution of the package.


    ![9781484200834_Fig05-15.jpg](images/9781484200834_Fig05-15.jpg)


    [Figure 5-15](#9781484200834_Ch05.xhtml#_Fig15). Running the DQS Cleansing transform
    will create a project on the DQS server


    5.  Selecting the project name will display details in the right hand pane (shown
    in [Figure 5-16](#9781484200834_Ch05.xhtml#Fig16)), such as the domains that were
    used in this cleansing activity.


    ![9781484200834_Fig05-16.jpg](images/9781484200834_Fig05-16.jpg)


    [Figure 5-16](#9781484200834_Ch05.xhtml#_Fig16). Selecting the project will display
    the domains used in this activity


    6.  Click Next to open the project.

    7.  Select the domains for which you would like to review the corrections.

    8.  Click the Approve or Reject radio buttons for each correction, or change the
    Correct to value for the entry.

    9.  Click the Next button when you have finished with the rules.

    10. (Optional) Export the corrected data to SQL Server, CSV, or Excel. You will
    be able to skip this step in most scenarios, since your SSIS package will be responsible
    for handling the corrected data.

    11. Click the Finish button to close the project.

    12. From the home screen, select your knowledge base, and choose the Domain Management
    activity.

    13. Select the domain you have defined new rules for.

    14. Click the Domain Values tab.

    15. Click the Import Values button, and select Import project values (as shown
    in [Figure 5-17](#9781484200834_Ch05.xhtml#Fig17)).


    ![9781484200834_Fig05-17.jpg](images/9781484200834_Fig05-17.jpg)


    [Figure 5-17](#9781484200834_Ch05.xhtml#_Fig17). Importing domain values from
    an existing project


    16. Repeat steps 13-15 for each domain you wish to update.

    17. Click the Finish button to publish your knowledge base changes.

    18. If you have modified any of the correction rules, you may want to re-run your
    SSIS package to pick up the new values.


    ## Conclusion


    This chapter described the new DQS Cleansing transform and how you can use it
    to take advantage of the advanced data cleansing functionality provided by Data
    Quality Services in SQL Server 2014\. The design patterns detailed in this chapter
    will help you get the best possible performance while doing data cleansing with
    SSIS.


    # CHAPTER 6


    ![image](images/frontdot.jpg)


    ## DB2 Source Patterns


    In a previous chapter you learned about patterns related to SQL Server sources.
    In this chapter, we will move on to patterns that relate to sourcing data from
    the IBM DB2 database. DB2 describes a variety of databases, so it is essential
    to learn about the different databases we will discuss, as well as how to use
    each database as an Integration Services source.


    As we described in [Chapter 4](#9781484200834_Ch04.xhtml), setting up a source
    entails four different objects: `Connection Manager`, `Provider`, `Source Component`,
    and a `Source Component Query`. While this remains true for the DB2 database,
    you need to take the additional first step of determining what type of database
    you own. DB2 has a number of types, providers, and ways to query data. As we look
    at the different patterns associated with each of these components, picture how
    they will work with other sources as well. Combining these steps will put you
    on the right path to pulling data from your DB2 database.


    This chapter highlights patterns that you may find useful while connecting to
    a DB2 database, but it does not cover every possible scenario that you may run
    into in your environment.


    ### DB2 Database Family


    There are several different types of DB2 databases available on the market today.
    How you connect to the database depends on the DB2 version. DB2 separates its
    products into three groups:


    *   `DB2 for i`: This version has gone through multiple names over the years,
    including DB2 for AS/400, iSeries, System I, and Power Systems. DB2 is included
    in this server, so people commonly refer to this version when they think of DB2.

    *   `DB2 for z/OS`: This DB2 version is the main database available for the z/OS
    platform and is only available in 64-bit mode.

    *   `DB2 for LUW`: This version of DB2 is a later addition to the DB2 family.
    The Linux, UNIX, and Windows (LUW) version comes in multiple editions, depending
    on the purpose of your database instance. More information on these editions can
    be found on IBM’s website.


    The different product types affect how you query data from Integration Services.
    As we walk you through setting up your connection, we will point out some of the
    differences you need to be aware of based on the product type. The first thing
    you need to do is pick a provider to use in your connection manager.


    ### Selecting a DB2 Provider


    The first step in pulling data from DB2 is to select a provider that can be used
    in your environment. There are two steps to accomplishing this:


    1.  Find the database version.

    2.  Pick the provider vendor.


    #### Find the Database Version


    The first step in selecting your DB2 provider is to learn what version you own.
    Combining the version information with the product type will help you choose what
    provider to use. If you’re not sure what type of server you’re working with, you
    have a couple of options. The first option is to use a DB2 administration tool
    to check the properties of your instance. For example, if you use Control Center,
    you can right-click on the instance name, and click the About menu option. This
    will show you something similar to [Figure 6-1](#9781484200834_Ch06.xhtml#Fig1).


    ![9781484200834_Fig06-01.jpg](images/9781484200834_Fig06-01.jpg)


    [Figure 6-1](#9781484200834_Ch06.xhtml#_Fig1). Control Center About System window
    showing database version and information'
