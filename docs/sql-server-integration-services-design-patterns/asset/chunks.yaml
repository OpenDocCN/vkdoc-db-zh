  trans: "\n首先，您需要创建一个名为 `SSISConfig2014` 的新 SSIS 解决方案和项目。将默认的 `Package.dtsx` 重命名为\
    \ `Child1.dtsx`。\n\n## 配置子包\n\n打开 `Child1` SSIS 包，并向控制流添加一个脚本任务。将该脚本任务重命名为 `Who\
    \ Am I?`，然后打开其编辑器。\n\n在“脚本”页面上，将 `ScriptLanguage` 属性设置为 `Microsoft Visual Basic\
    \ 2012`。单击 `ReadOnlyVariables` 属性值文本框中的省略号，并添加 `System::TaskName` 和 `System::PackageName`\
    \ 变量。\n\n打开脚本编辑器，并在 `Sub Main()` 中添加以下代码。\n\n**清单 A-1.** Child1.dtsx 包中“Who Am\
    \ I?”脚本任务的 Sub Main\n```vb\nPublic Sub Main()\n    Dim sPackageName As String\
    \ = Dts.Variables(\"PackageName\").Value.ToString\n    Dim sTaskName As String\
    \ = Dts.Variables(\"TaskName\").Value.ToString\n    MsgBox(\"I am \" & sPackageName,\
    \ , sTaskName)\n    Dts.TaskResult = ScriptResults.Success\nEnd Sub\n```\n\n清单\
    \ A-1 中显示的代码会弹出一个消息框，通知观察者该消息框源自哪个包。这是一段可重用的代码。您可以将此脚本任务复制并粘贴到任何 SSIS 包中，每次执行方式都相同。\n\
    \n现在关闭编辑器，并在 SSDT 调试器中执行 `Child1.dtsx` 包。当我执行该包时，我会看到一个类似于图 A-1 所示的消息框。\n\n![9781484200834_FigAppA-01.jpg](img/9781484200834_FigAppA-01.jpg)\n\
    **图 A-1.** 来自 Child1.dtsx 的消息框\n\n`Child1.dtsx` 将是您的第一个测试包。我们将继续使用 `Child1.dtsx`\
    \ 来对 SSIS 执行和监控框架进行测试。\n\n## 转换部署模型\n\n在继续之前，将 SSIS 的部署模型从项目部署模型（默认）更改为包部署模型。\n\
    \n要完成转换，请在解决方案资源管理器中右键单击 SSIS 项目，然后单击 **“转换为包部署模型”**，如图 A-2 所示。\n\n![9781484200834_FigAppA-02.jpg](img/9781484200834_FigAppA-02.jpg)\n\
    **图 A-2.** 将项目转换为包部署模型\n\n您需要在对话框中单击“确定”按钮，以确认您了解这将更改您可在 SSIS 中使用的功能。转换完成后，您将看到一个结果窗格，通知您项目\
    \ `Child1.dtsx` 已转换为包部署模型。解决方案资源管理器中的项目也会指示已选择非默认部署模型，如图 A-3 所示。\n\n![9781484200834_FigAppA-03.jpg](img/9781484200834_FigAppA-03.jpg)\n\
    **图 A-3.** 包部署模型\n\n## 创建父包\n\n添加一个新的 SSIS 包并将其重命名为 `Parent.dtsx`。向 `Parent.dtsx`\
    \ 的控制流添加一个“执行包任务”。\n\n将“执行包任务”重命名为 `Execute Child Package`，然后打开其编辑器。在“包”页面上，将\
    \ `Location` 属性设置为 **文件系统**，然后单击 `Connection` 属性值的下拉菜单。单击 **<新建连接…>** 以配置新的文件连接管理器。将文件连接管理器编辑器的\
    \ `Usage Type` 属性设置为 **现有文件**。\n\n浏览到 `SSISConfig2014` 项目的位置并选择 `Child1.dtsx`。单击“确定”按钮关闭文件连接管理器编辑器，然后再次单击“确定”关闭“执行包任务编辑器”。\n\
    \n请注意在配置“执行包任务”时创建的文件连接管理器。它被命名为 `Child1.dtsx`；将其重命名为 `Child.dtsx`。\n\n在 SSDT\
    \ 调试器中执行 `Parent.dtsx` 包进行测试。如果一切按计划进行，`Child1.dtsx` 将执行并显示图 A-1 所示的消息框。确认该消息框并停止调试器。\n\
    \n## 实现动态路径管理\n\n这就是父-子模式的实际应用。您可以通过一点元数据来改进父-子模式。怎么做？很高兴您这么问。\n\n首先，添加一个名为 `ChildPackagePath`（字符串类型）的\
    \ SSIS 变量。单击 `Child.dtsx` 连接管理器，然后按 F4 显示属性。文件连接管理器的 `ConnectionString` 属性是文件的路径。选择\
    \ `ConnectionString` 属性，将其复制到剪贴板，然后将其粘贴到 `ChildPackagePath` SSIS 变量的 `Value` 属性中。\n\
    \n返回到名为 `Child.dtsx` 的文件连接管理器的属性，单击 `Expressions` 属性值文本框中的省略号。当“属性表达式编辑器”显示时，从“属性”下拉菜单中选择\
    \ `ConnectionString`，如图 A-4 所示。\n\n![9781484200834_FigAppA-04.jpg](img/9781484200834_FigAppA-04.jpg)\n\
    **图 A-4.** 文件连接管理器属性表达式编辑器\n\n单击 `ConnectionString` 旁边的“表达式”文本框中的省略号。在“表达式生成器”左上角展开“变量和参数”虚拟文件夹。将变量\
    \ `User::ChildPackagePath` 从虚拟文件夹拖到“表达式”文本框中，然后单击“计算表达式”按钮，如图 A-5 所示。\n\n![9781484200834_FigAppA-05.jpg](img/9781484200834_FigAppA-05.jpg)\n\
    **图 A-5.** 将 User::ChildPackagePath 变量赋给 ConnectionString 表达式\n\n单击“确定”关闭表达式生成器，然后再次单击“确定”关闭属性表达式编辑器。至此，`Child.dtsx`\
    \ 文件连接管理器的 `ConnectionString` 属性已由 `User::ChildPackagePath` SSIS 变量管理。\n\n## 用第二个子包测试\n\
    \n您可以通过创建第二个测试子包来测试此功能。幸运的是，创建第二个测试子包相对简单。\n\n在解决方案资源管理器中，右键单击 `Child1.dtsx` SSIS\
    \ 包，然后单击“复制”。右键单击“SSIS 包”虚拟文件夹，然后单击“粘贴”。将新包的名称从 `Child1 1.dtsx` 更改为 `Child2.dtsx`。\n\
    \n返回到 `Parent.dtsx` 包，将 `ChildPackagePath` 变量的值更改为 `Child2.dtsx` 替换 `Child1.dtsx`。在\
    \ SSDT 调试器中执行 `Parent.dtsx` 并观察结果，如图 A-6 所示。\n\n![9781484200834_FigAppA-06.jpg](img/9781484200834_FigAppA-06.jpg)\n\
    **图 A-6.** 在父-子模式中执行 Child2.dtsx\n\n非常酷，对吧？我们才刚刚开始！\n\n## 创建元数据数据库\n\n让我们创建一个数据库来保存包元数据。打开\
    \ SQL Server Management Studio (SSMS) 并执行清单 A-2 中所示的 T-SQL 脚本。\n\n**清单 A-2.**\
    \ 创建 SSISConfig 数据库\n```sql\nUse master\ngo\n\n/* SSISConfig database */\nIf Not\
    \ Exists(Select name\n              From sys.databases\n              Where name\
    \ = 'SSISConfig')\n begin\n  print 'Creating SSISConfig database'\n  Create Database\
    \ SSISConfig\n  print 'SSISConfig database created'\n end\nElse\n print 'SSISConfig\
    \ database already exists.'\nprint ''\ngo\n```\n\n清单 A-2 中的脚本是可重复执行的。此外，它通过 `Print`\
    \ 语句告知执行脚本的人员其操作。首次执行此脚本时，您将在 SSMS 的“消息”选项卡中看到以下消息：\n```\nCreating SSISConfig\
    \ database\nSSISConfig database created\n```\n\n第二次及之后每次执行相同的脚本时，您将看到此消息：\n```\n\
    SSISConfig database already exists.\n```\n\n编写可重复执行的 T-SQL 并不总是可行，但在可行时，这是一个好主意。\n"
- fmt: "# 构建 SSIS 配置数据库\n\n现在我们有了数据库，我们将构建一个表来保存 SSIS 包元数据。[清单 A-3](#9781484200834_AppA.xhtml#list3)\
    \ 包含了这样一个表的 T-SQL。\n\n### 清单 A-3. 构建 cfg 模式和 cfg.Packages 表\n\n```sql\nUse SSISConfig\n\
    go\n\n/* cfg schema */\nIf Not Exists(Select name\n              From sys.schemas\n\
    \              Where name = 'cfg')\n begin\n  print 'Creating cfg schema'\n  declare\
    \ @sql varchar(100) = 'Create Schema cfg'\n  exec(@sql)\n  print 'Cfg schema created'\n\
    \ end\nElse\n print 'Cfg schema already exists.'\nprint ''\n\n/* cfg.Packages\
    \ table */\nIf Not Exists(Select s.name + '.' + t.name\n              From sys.tables\
    \ t\n              Join sys.schemas s\n                On s.schema_id = t.schema_id\n\
    \              Where s.name = 'cfg'\n                And t.name = 'Packages')\n\
    \ begin\n  print 'Creating cfg.Packages table'\n  Create Table cfg.Packages\n\
    \  (\n    PackageID int identity(1,1)\n     Constraint PK_Packages\n      Primary\
    \ Key Clustered\n   ,PackageFolder varchar(255) Not Null\n   ,PackageName varchar(255)\
    \ Not Null\n  )\n  print 'Cfg.Packages created'\n end\nElse\n print 'Cfg.Packages\
    \ table already exists.'\nprint ''\n```\n\n[清单 A-3](#9781484200834_AppA.xhtml#list3)\
    \ 中的脚本创建了一个名为 `cfg` 的模式（如果它不存在的话）；然后它创建了一个名为 `cfg.Packages` 的表，该表包含三列：\n\n*  \
    \ `PackageID` 是一个标识列，用作主键。\n*   `PackageFolder` 是一个 `VarChar(255)` 列，用于保存包含 SSIS\
    \ 包的文件夹路径。\n*   `PackageName` 是一个 `VarChar(255)` 列，包含 SSIS 包的名称。\n\n我最近开始将支持此类存储库的存储过程、函数和视图称为数据库编程接口（DPI），而不是应用程序编程接口（API），因为数据库*不是*应用程序。在这里，您应该开始构建\
    \ `SSISConfig` DPI，首先创建一个存储过程来将数据加载到 `cfg.Packages` 表中，如[清单 A-4](#9781484200834_AppA.xhtml#list4)所示。\n\
    \n### 清单 A-4. cfg.AddSSISPackages 存储过程\n\n```sql\n/* cfg.AddSSISPackage stored\
    \ procedure */\nIf Exists(Select s.name + '.' + p.name\n          From sys.procedures\
    \ p\n          Join sys.schemas s\n            On s.schema_id = p.schema_id\n\
    \          Where s.name = 'cfg'\n            And p.name = 'AddSSISPackage')\n\
    \ begin\n  print 'Dropping cfg.AddSSISPackage stored procedure'\n  Drop Procedure\
    \ cfg.AddSSISPackage\n  print 'Cfg.AddSSISPackage stored procedure dropped'\n\
    \ end\nprint 'Creating cfg.AddSSISPackage stored procedure'\nprint ''\ngo\n\n\
    Create Procedure cfg.AddSSISPackage\n  @PackageName varchar(255)\n ,@PackageFolder\
    \ varchar(255)\n ,@PkgID int output\nAs\n\n  Set NoCount On\n\n  declare @tbl\
    \ table (PkgID int)\n\n  If Not Exists(Select PackageFolder + PackageName\n  \
    \              From cfg.Packages\n                Where PackageFolder = @PackageFolder\n\
    \                  And PackageName = @PackageName)\n   begin\n    Insert Into\
    \ cfg.Packages\n    (PackageName\n    ,PackageFolder)\n    Output inserted.PackageID\
    \ Into @tbl\n    Values (@PackageName, @PackageFolder)\n   end\n  Else\n   insert\
    \ into @tbl\n   (PkgID)\n   (Select PackageID\n    From cfg.Packages\n    Where\
    \ PackageFolder = @PackageFolder\n      And PackageName = @PackageName)\n\n  \
    \ Select @PkgID = PkgID From @tbl\ngo\nprint 'Cfg.AddSSISPackage stored procedure\
    \ created.'\nprint ''\n```\n\n请注意，`cfg.AddSSISPackage` 存储过程返回一个整数值，该值表示 `cfg.Packages`\
    \ 表中的标识列——`PackageID`。您稍后将使用此整数值。一旦此存储过程就位，您就可以使用[清单 A-5](#9781484200834_AppA.xhtml#list5)中的\
    \ T-SQL 脚本来添加项目中的包。\n\n### 清单 A-5. 将包添加到 cfg.Packages 表\n\n```sql\n/* Variable\
    \ Declaration */\ndeclare @PackageFolder varchar(255) = 'F:\\Andy\\Projects\\\
    PublicFramework_PackageDeployment_2014\\SSISConfig2014\\'\ndeclare @PackageName\
    \ varchar(255) = 'Child1.dtsx'\ndeclare @PackageID int\n\n/* Add the Child1.dtsx\
    \ SSIS Package*/\nIf Not Exists(Select PackageFolder + PackageName\n         \
    \     From cfg.Packages\n              Where PackageFolder = @PackageFolder\n\
    \                And PackageName = @PackageName)\n begin\n  print 'Adding ' +\
    \ @PackageFolder + @PackageName\n  exec cfg.AddSSISPackage @PackageName, @PackageFolder,\
    \ @PackageID output\n end\nElse\n begin\n  Select @PackageID = PackageID\n  From\
    \ cfg.Packages\n  Where PackageFolder = @PackageFolder\n    And PackageName =\
    \ @PackageName\n  print @PackageFolder + @PackageName + ' already exists in the\
    \ Framework.'\n end\n\nset @PackageName = 'Child2.dtsx'\n/* Add the Child2.dtsx\
    \ SSIS Package*/\nIf Not Exists(Select PackageFolder + PackageName\n         \
    \     From cfg.Packages\n              Where PackageFolder = @PackageFolder\n\
    \                And PackageName = @PackageName)\n begin\n  print 'Adding ' +\
    \ @PackageFolder + @PackageName\n  exec cfg.AddSSISPackage @PackageName, @PackageFolder,\
    \ @PackageID output\n end\nElse\n begin\n  Select @PackageID = PackageID\n  From\
    \ cfg.Packages\n  Where PackageFolder = @PackageFolder\n    And PackageName =\
    \ @PackageName\n  print @PackageFolder + @PackageName + ' already exists in the\
    \ Framework.'\n End\n```\n\n我们现在有足够的条件来测试我的 SSIS 执行和监控框架的下一步，所以让我们回到 SSDT。在控制流中添加一个执行\
    \ SQL 任务，并将其重命名为 **Get PackageMetadata**。打开编辑器并将 `ResultSet` 属性更改为 `Single row`。将\
    \ `ConnectionType` 属性更改为 `ADO.Net`。单击 `Connection` 属性中的下拉菜单，然后单击 <New connection…>。配置一个指向\
    \ `SSISConfig` 数据库的 ADO.Net 连接。将 `SQLStatement` 属性设置为以下 T-SQL 脚本：\n\n```sql\n\
    Select PackageFolder + PackageName\nFrom cfg.Packages\nWhere PackageName = 'Child1.dtsx'\n\
    ```\n\n在 `Result Set` 页面上，添加一个结果集。将 `Result Name` 设置为 `0`，将 `Variable Name` 设置为\
    \ `User::ChildPackagePath`。在 Get Package Metadata 执行 SQL 任务和 Execute Child Package\
    \ 执行包任务之间连接一个优先约束。执行 `Parent.dtsx` 包进行测试。会发生什么？Get Package Metadata 执行 SQL 任务运行一个查询，返回存储在\
    \ `SSISConfig.cfg.Packages` 表中的 `Child1.dtsx` 包的完整路径。返回的路径被发送到 `ChildPackagePath`\
    \ 变量。请记住，此变量控制着 `Child.dtsx` 文件连接管理器，该管理器由执行包任务使用。\n\n修改 Get Package Metadata\
    \ 执行 SQL 任务中的查询以返回 `Child2.dtsx` 并重新测试。\n\n## 引入 SSIS 应用程序\n\nSSIS 应用程序是按预定顺序执行的\
    \ SSIS 包的集合。让我们首先向 `SSISConfig` 数据库添加几个表和支持它们的存储过程。\n\n首先，在 `SSISConfig` 中使用[清单\
    \ A-6](#9781484200834_AppA.xhtml#list6)中的 T-SQL 创建一个名为 `cfg.Applications` 的表，以及一个将应用程序添加到该表的存储过程。\n\
    \n### 清单 A-6. 构建 cfg.Applications 和 cfg.AddSSISApplication\n\n```sql\n/* cfg.Applications\
    \ table */\nIf Not Exists(Select s.name + '.' + t.name\n              From sys.tables\
    \ t\n              Join sys.schemas s\n                On s.schema_id = t.schema_id\n\
    \              Where s.name = 'cfg'\n                And t.name = 'Applications')\n\
    \ begin\n  print 'Creating cfg.Applications table'\n  Create Table cfg.Applications\n\
    \  (\n    ApplicationID int identity(1,1)\n     Constraint PK_Applications\n \
    \     Primary Key Clustered\n   ,ApplicationName varchar(255) Not Null\n    Constraint\
    \ U_Applications_ApplicationName\n     Unique\n  )\n  print 'Cfg.Applications\
    \ created'\n end\nElse\n print 'Cfg.Applications table already exists.'\nprint\
    \ ''\n```"
  raw: 'Now that we have the database, we’ll build a table to hold SSIS package metadata.
    [Listing A-3](#9781484200834_AppA.xhtml#list3) contains T-SQL for such a table.    [***Listing
    A-3***](#9781484200834_AppA.xhtml#_list3). Building the cfg Schema and cfg.Packages
    Table    ``` Use SSISConfig go  /* cfg schema */ If Not Exists(Select name               From
    sys.schemas               Where name = ''cfg'')  begin   print ''Creating cfg
    schema''   declare @sql varchar(100) = ''Create Schema cfg''   exec(@sql)   print
    ''Cfg schema created''  end Else  print ''Cfg schema already exists.'' print ''''  /*
    cfg.Packages table */ If Not Exists(Select s.name + ''.'' + t.name               From
    sys.tables t               Join sys.schemas s                 On s.schema_id = t.schema_id
                  Where s.name = ''cfg''                 And t.name = ''Packages'')
     begin   print ''Creating cfg.Packages table''   Create Table cfg.Packages   (
        PackageID int identity(1,1)      Constraint PK_Packages       Primary Key
    Clustered    ,PackageFolder varchar(255) Not Null    ,PackageName varchar(255)
    Not Null   )   print ''Cfg.Packages created''  end Else  print ''Cfg.Packages
    table already exists.'' print '''' ```    The script in [Listing A-3](#9781484200834_AppA.xhtml#list3)
    creates a schema named `cfg` if one doesn’t already exist; it then creates a table
    named `cfg.Packages`, which contains three columns:    *   `PackageID` is an identity
    column that serves as the primary key. *   `PackageFolder` is a `VarChar(255)`
    column that holds the path to the folder containing the SSIS package. *   `PackageName`
    is a `VarChar(255)` column that contains the name of the SSIS package.    I recently
    began identifying the stored procedures, functions, and views that support such
    a repository as a database programming interface (DPI), and not as an application
    programming interface, or API, because databases are *not* applications. Here,
    you should begin building the `SSISConfig` DPI with a stored procedure to load
    data into the `cfg.Packages` table, as shown in [Listing A-4](#9781484200834_AppA.xhtml#list4).    [***Listing
    A-4***](#9781484200834_AppA.xhtml#_list4). The cfg.AddSSISPackages Stored Procedure    ```
    /* cfg.AddSSISPackage stored procedure */ If Exists(Select s.name + ''.'' + p.name
              From sys.procedures p           Join sys.schemas s             On s.schema_id
    = p.schema_id           Where s.name = ''cfg''             And p.name = ''AddSSISPackage'')
     begin   print ''Dropping cfg.AddSSISPackage stored procedure''   Drop Procedure
    cfg.AddSSISPackage   print ''Cfg.AddSSISPackage stored procedure dropped''  end
    print ''Creating cfg.AddSSISPackage stored procedure'' print '''' go  Create Procedure
    cfg.AddSSISPackage   @PackageName varchar(255)  ,@PackageFolder varchar(255)  ,@PkgID
    int output As    Set NoCount On    declare @tbl table (PkgID int)    If Not Exists(Select
    PackageFolder + PackageName                 From cfg.Packages                 Where
    PackageFolder = @PackageFolder                   And PackageName = @PackageName)
       begin     Insert Into cfg.Packages     (PackageName     ,PackageFolder)     Output
    inserted.PackageID Into @tbl     Values (@PackageName, @PackageFolder)    end
      Else    insert into @tbl    (PkgID)    (Select PackageID     From cfg.Packages
        Where PackageFolder = @PackageFolder       And PackageName = @PackageName)    
    Select @PkgID = PkgID From @tbl go print ''Cfg.AddSSISPackage stored procedure
    created.'' print '''' ```    Note the `cfg.AddSSISPackage` stored procedure returns
    an integer value that represents the identity column—`PackageID`—from the `cfg.Packages`
    table. You will use this integer value later. Once this stored procedure is in
    place, you can use the T-SQL script in [Listing A-5](#9781484200834_AppA.xhtml#list5)
    to add the packages in the project.    [***Listing A-5***](#9781484200834_AppA.xhtml#_list5).
    Adding the Packages to the cfg.


    Packages Table    ``` /* Variable Declaration */ declare @PackageFolder varchar(255)
    = F:\Andy\Projects\PublicFramework_PackageDeployment_2014\SSISConfig2014\F:\Andy\Projects\
    PublicFramework_PackageDeployment_2014\SSISConfig2014\'' declare @PackageName
    varchar(255) = ''Child1.dtsx'' declare @PackageID int  /* Add the Child1.dtsx
    SSIS Package*/ If Not Exists(Select PackageFolder + PackageName               From
    cfg.Packages               Where PackageFolder = @PackageFolder                 And
    PackageName = @PackageName)  begin   print ''Adding '' + @PackageFolder + @PackageName
      exec cfg.AddSSISPackage @PackageName, @PackageFolder, @PackageID output  end
    Else  begin   Select @PackageID = PackageID   From cfg.Packages   Where PackageFolder
    = @PackageFolder     And PackageName = @PackageName   print @PackageFolder + @PackageName
    + '' already exists in the Framework.''  end  set @PackageName = ''Child2.dtsx''
    /* Add the Child2.dtsx SSIS Package*/ If Not Exists(Select PackageFolder + PackageName
                  From cfg.Packages               Where PackageFolder = @PackageFolder
                    And PackageName = @PackageName)  begin   print ''Adding '' + @PackageFolder
    + @PackageName   exec cfg.AddSSISPackage @PackageName, @PackageFolder, @PackageID
    output  end Else  begin   Select @PackageID = PackageID   From cfg.Packages   Where
    PackageFolder = @PackageFolder     And PackageName = @PackageName   print @PackageFolder
    + @PackageName + '' already exists in the Framework.''  End ```    We now have
    enough to test the next step of my SSIS Execution and Monitoring Framework, so
    let’s returning to SSDT. Add an Execute SQL task to the control flow and rename
    it **Get PackageMetadata**. Open the editor and change the ResultSet property
    to Single row. Change the ConnectionType property to ADO.Net. Click the drop-down
    in the Connection property and click <New connection…>. Configure an ADO.Net connection
    to the `SSISConfig` database. Set the `SQLStatement` property to the following
    T-SQL script:    ``` Select PackageFolder + PackageName From cfg.Packages Where
    PackageName = ''Child1.dtsx'' ```    On the Result Set page, add a resultset.
    Set the Result Name to `0` and the Variable Name to `User::ChildPackagePath`.
    Connect a precedence constraint between the Get Package Metadata Execute SQL task
    and the Execute Child Package Execute Package task. Execute the `Parent.dtsx`
    package to test it. What happens? The Get Package Metadata Execute SQL task runs
    a query that returns the full path to the `Child1.dtsx` package stored in the
    `SSISConfig.cfg.Packages` table. The returned path is sent into the `ChildPackagePath`
    variable. Remember, this variable controls the `Child.dtsx` file connection manager,
    which is used by the Execute Package task.    Alter the query in the Get Package
    Metadata Execute SQL task to return `Child2.dtsx` and retest.    Introducing SSIS
    Applications    An SSIS application is a collection of SSIS packages that execute
    in a prescribed order. Let’s start by adding a couple of tables and supporting
    stored procedures to the `SSISConfig` database.    First, create a table named
    `cfg.Applications`, and a stored procedure to add them applications to the table,
    in `SSISConfig` using the T-SQL in [Listing A-6](#9781484200834_AppA.xhtml#list6).    [***Listing
    A-6***](#9781484200834_AppA.xhtml#_list6). Building cfg.Applications and cfg.AddSSISApplication    ```
    /* cfg.Applications table */ If Not Exists(Select s.name + ''.'' + t.name               From
    sys.tables t               Join sys.schemas s                 On s.schema_id = t.schema_id
                  Where s.name = ''cfg''                 And t.name = ''Applications'')
     begin   print ''Creating cfg.Applications table''   Create Table cfg.Applications
      (     ApplicationID int identity(1,1)      Constraint PK_Applications       Primary
    Key Clustered    ,ApplicationName varchar(255) Not Null     Constraint U_Applications_ApplicationName
         Unique   )   print ''Cfg.'
