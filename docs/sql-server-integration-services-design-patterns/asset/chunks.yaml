    It is possible to access variables within instances of the Script task or the
    Script component even if you do not explicitly declare their use in the graphical
    settings editor. Within the SSIS scripting toolset, you will find a couple of
    functions that will allow you to programmatically lock and unlock variables for
    either read-only or read-write access. As shown in[Listing 3-6](#9781484200834_Ch03.xhtml#list6),
    you can use the `VariableDispenser.LockOneForRead()` function to capture the value
    of a variable that was not previously declared.


    [***Listing 3-6***](#9781484200834_Ch03.xhtml#_list6). Manually Lock a Variable


    ```

    // Programmatically lock the variable we need

    Variable vars = null;

    Dts.VariableDispenser.LockOneForRead("RunID", ref vars);


    // Assign to script variable

    runID = int.Parse(vars["RunID"].Value.ToString());


    // Unlock the variable object

    vars.Unlock();

    ```


    Using a method similar to the one shown in [Listing 3-6](#9781484200834_Ch03.xhtml#list6),
    you can manipulate variable values by using the function `VariableDispenser.LockOneForWrite()`,
    which would allow you to write to as well as read from the variable value.


    Variable Data Types


    As you may have derived from [Listing 3-4](#9781484200834_Ch03.xhtml#list4) and
    [Listing 3-5](#9781484200834_Ch03.xhtml#list5), the interpreted data type for
    variable values will differ between the Script task and the Script component.
    With the latter, any variable that you declare in the graphical settings editor
    will surface as the .NET data type equivalent of the SSIS variable type, and there
    is no need to perform a type cast. When using the Script task (and the Script
    component, if you opt to use either the `LockOneForRead()` or `LockOneForWrite()`
    method), variables are presented as the generic `Object` type, and most of the
    time you’ll have to cast to an appropriate type any variable used in script code.
    As shown in [Figure 3-10](#9781484200834_Ch03.xhtml#Fig10), you’ll get a compiler
    error if you forget to cast a variable value to the appropriate type.


    ![9781484200834_Fig03-10.jpg](images/9781484200834_Fig03-10.jpg)


    [Figure 3-10](#9781484200834_Ch03.xhtml#_Fig10). Script task variables must be
    cast


    Naming Patterns


    If you have worked as a software developer in the past, the following section
    will be nothing more than a review. If you haven’t, I’ll share an important tidbit
    of information: naming conventions are important.


    I’ve known many a developer in my time, and I’ve never found one who wasn’t loyal
    to some type of naming convention. Why? It’s familiar. It’s predicListing. When
    patterns emerge in the way you develop software, it becomes easier to maintain—by
    others as well as yourself. Technically, there’s no difference between code written
    in camel case, Hungarian notation, mnemonic notation, or Pascal style. This is
    purely a matter of clarity, readability, and maintainability. By finding and sticking
    with a style (even if it’s a hybrid of other styles), you’ll have more navigable
    code and will likely find that your fellow developers appreciate the approach.


    Here are a few suggestions regarding naming conventions:


    *   **Be consistent:** This is the number-one rule and should be followed above
    all others. Whatever style you develop, stick with it. You can change or modify
    your naming convention style later, but at least be consistent within each project.

    *   **Be clear:** I can’t tell you how many times I’ve had to debug code (and
    yes, sometimes it was my own) littered with single-character object names, ambiguous
    function names, and other pull-your-hair-out kinds of practices. Now, don’t go
    overboard here. Most object names don’t need to read like `database_write_failed_and_could_not_display_interactive_error`,
    but there’s probably some happy medium between that and variable names such as
    `f`.

    *   **Be a follower:** If you don’t have your own style, do as those around you
    do. Some organizations, especially larger ones, may dictate the naming convention
    style you’ll use.


    Conclusion


    The scripting tools in SQL Server Integration Services are both capable and complex.
    When scripting for ETL first surfaced with DTS many years ago, it was a quick-and-dirty
    way to solve some data movement and manipulation problems. With SSIS, the latest
    generation of scripting tools is robust and enterprise-ready. With a few recommended
    practices, scripting can be a great addition to any ETL developer’s toolkit.


    CHAPTER 4


    ![image](images/frontdot.jpg)


    SQL Server Source Patterns


    In the first section of this book, we looked at patterns focused on the control
    flow area of SQL Server Integration Services, including metadata, workflow execution,
    and scripting. The second section focuses on the data flow area of SQL Server
    Integration Services. This and the following chapters will discuss source, transformation,
    and logging patterns in the pipeline area of an Integration Services package.


    Integration Services supports a wide variety of sources, including SQL Server,
    Oracle, and SAP. In addition, developers and third-party vendors have the ability
    to create custom sources for providers not included out-of-the-box. This technology-agnostic
    approach creates a very flexible system for loading all sorts of data. Even with
    all of the potential sources, loading data into or out of a SQL Server database
    is a very common occurrence, since a company that owns Integration Services typically
    uses all Microsoft products.


    This chapter discusses different patterns associated with using SQL Server as
    a source. Due to the common occurrence of SQL Server databases in shops using
    Integration Services, we have a defined set of patterns for extracting data from
    SQL Server. Specifically, we will look at the best way to connect to a SQL Server
    database, how to choose the data you will use, and how to more easily use the
    rest of the data flow’s objects. Finally, we will look at a new component in SQL
    Server Denali that helps jump-start your development when connecting to any source.


    Setting Up a Source


    When connecting to external data, Integration Services uses a few objects to help
    make the connection, retrieve the correct data, and start any necessary data manipulations.
    Every time an Integration Services developer creates a package, the developer
    will need to select the correct objects and ensure they have all been created.
    The objects that will need to be set up are as follows:


    *   **Connection Manager:** The object that tells Integration Services where to
    get data. Can be used in the control flow, data flow, and event handlers.

    *   **Provider:** The object that the connection manager uses to talk to the data
    source.

    *   **Source Component:** The object that sets the properties to tell Integration
    Services what data to get. The matching `Connection Manager` object is set in
    this object.

    *   **Source Component Query:** The information the external data source needs
    to give Integration Services data. The query is stored in the `Source Component`
    object.


    Let’s take a look at the important factors associated with each of these items.
    We’ll begin in the next section by looking at connection managers.'
  trans: "\n# 第四章\n\n## SQL Server 源模式\n\n在本书的第一部分，我们探讨了聚焦于 SQL Server Integration\
    \ Services 控制流区域的模式，包括元数据、工作流执行和脚本编写。第二部分将聚焦于 SQL Server Integration Services\
    \ 的数据流区域。本章及后续章节将讨论 Integration Services 包中管道区域的源、转换和日志记录模式。\n\nIntegration Services\
    \ 支持多种源，包括 SQL Server、Oracle 和 SAP。此外，开发者和第三方供应商能够为未随产品附带的提供程序创建自定义源。这种技术无关的方法为加载各种数据创建了一个非常灵活的系统。即使有所有这些潜在的源，将数据加载到\
    \ SQL Server 数据库或从中导出仍然非常常见，因为拥有 Integration Services 的公司通常使用所有微软产品。\n\n本章讨论与使用\
    \ SQL Server 作为源相关的不同模式。由于在使用 Integration Services 的环境中 SQL Server 数据库非常常见，我们定义了一套从\
    \ SQL Server 提取数据的模式。具体来说，我们将探讨连接到 SQL Server 数据库的最佳方式、如何选择要使用的数据，以及如何更轻松地使用数据流中的其余对象。最后，我们将看一下\
    \ SQL Server Denali 中的一个新组件，它有助于在连接到任何源时快速启动开发。\n\n### 设置源\n\n当连接到外部数据时，Integration\
    \ Services 使用几个对象来帮助建立连接、检索正确的数据并启动任何必要的数据操作。每次 Integration Services 开发者创建一个包时，开发者都需要选择正确的对象并确保它们都已创建。需要设置的对象如下：\n\
    \n*   **连接管理器**：告诉 Integration Services 从何处获取数据的对象。可在控制流、数据流和事件处理程序中使用。\n*   **提供程序**：连接管理器用来与数据源通信的对象。\n\
    *   **源组件**：设置属性以告诉 Integration Services 要获取什么数据的对象。匹配的 `Connection Manager` 对象在此对象中设置。\n\
    *   **源组件查询**：外部数据源需要提供给 Integration Services 数据的信息。查询存储在 `Source Component` 对象中。\n\
    \n让我们看看与这些项目中的每一项相关的重要因素。我们将在下一节开始探讨连接管理器。\n\n当使用脚本组件实例时，语法明显不同。您无需使用索引器来读取或写入引用的\
    \ SSIS 变量，而是可以使用 `Variables.<Variable Name>` 语法，如清单 3-5 所示：\n\n**清单 3-5. 脚本组件变量语法**\n\
    \n```\npublic override void Input0_ProcessInputRow(Input0Buffer Row)\n{\n    \
    \    // 将 SSIS 变量 ClientName 推送到当前行中的值\n        Row.ClientName = Variables.ClientName;\n\
    }\n```\n\n即使您没有在图形设置编辑器中显式声明其使用，也可以访问脚本任务或脚本组件实例中的变量。在 SSIS 脚本工具集中，您会发现一些函数，允许您以编程方式锁定和解锁变量以进行只读或读写访问。如清单\
    \ 3-6 所示，您可以使用 `VariableDispenser.LockOneForRead()` 函数来捕获先前未声明的变量的值。\n\n**清单 3-6.\
    \ 手动锁定变量**\n\n```\n// 以编程方式锁定我们需要的变量\nVariable vars = null;\nDts.VariableDispenser.LockOneForRead(\"\
    RunID\", ref vars);\n\n// 分配给脚本变量\nrunID = int.Parse(vars[\"RunID\"].Value.ToString());\n\
    \n// 解锁变量对象\nvars.Unlock();\n```\n\n使用类似于清单 3-6 中所示的方法，您可以使用 `VariableDispenser.LockOneForWrite()`\
    \ 函数来操作变量值，这将允许您对变量值进行写入以及读取。\n\n### 变量数据类型\n\n正如您可能从清单 3-4 和清单 3-5 中推导出的那样，脚本任务和脚本组件之间变量值的解释数据类型会有所不同。对于后者，您在图形设置编辑器中声明的任何变量都将显示为\
    \ SSIS 变量类型的 .NET 数据类型等效项，并且无需执行类型转换。当使用脚本任务（以及脚本组件，如果您选择使用 `LockOneForRead()`\
    \ 或 `LockOneForWrite()` 方法）时，变量呈现为通用的 `Object` 类型，并且大多数时候，您必须将脚本代码中使用的任何变量强制转换为适当的类型。如图\
    \ 3-10 所示，如果您忘记将变量值强制转换为适当的类型，将会出现编译器错误。\n\n![9781484200834_Fig03-10.jpg](img/9781484200834_Fig03-10.jpg)\n\
    \n图 3-10. 脚本任务变量必须强制转换\n\n### 命名模式\n\n如果您过去曾担任软件开发人员，那么下面的部分只不过是一次复习。如果您没有，我将分享一条重要的信息：命名约定很重要。\n\
    \n在我认识的许多开发人员中，我从未发现有人不忠于某种命名约定。为什么？因为它熟悉。它可预测。当您开发软件的方式出现模式时，维护起来会变得更容易——无论是对他人还是对自己。从技术上讲，用驼峰式、匈牙利记法、助记符记法或\
    \ Pascal 样式编写的代码没有区别。这纯粹是关于清晰度、可读性和可维护性的问题。通过找到并坚持一种风格（即使它是其他风格的混合体），您将拥有更易于导航的代码，并且很可能会发现您的开发同事欣赏这种方法。\n\
    \n以下是一些关于命名约定的建议：\n\n*   **保持一致：** 这是第一规则，应优先于其他所有规则。无论您开发什么风格，请坚持下去。您可以稍后更改或修改您的命名约定风格，但至少在每个项目内要保持一致。\n\
    *   **清晰明了：** 我无法告诉您我不得不调试过多少次代码（是的，有时是我自己的），里面充斥着单字符对象名称、模糊的函数名称以及其他让人抓狂的做法。现在，不要在这方面过分。大多数对象名称不需要像\
    \ `database_write_failed_and_could_not_display_interactive_error` 那样阅读，但在那个和像\
    \ `f` 这样的变量名之间可能存在着某种愉快的折中。\n*   **跟随主流：** 如果您没有自己的风格，就随大流。一些组织，尤其是较大的组织，可能会规定您将使用的命名约定风格。\n\
    \n### 结论\n\nSQL Server Integration Services 中的脚本工具既强大又复杂。许多年前，当脚本首次在 DTS 中伴随 ETL\
    \ 出现时，它是一种快速而简陋的方法来解决一些数据移动和操作问题。对于 SSIS，最新一代的脚本工具健壮且适合企业使用。遵循一些推荐实践，脚本可以成为任何\
    \ ETL 开发人员工具包中的一大补充。\n\n```\npublic void main()\n{\n        // 获取当前的 RunID\n \
    \       int runID = int.Parse(Dts.Variables[\"RunID\"].Value.ToString());\n\n\
    \        // 设置 ClientID\n        Dts.Variables[\"ClientID\"].Value = ETL.GetClientID(runID);\n\
    \n        Dts.TaskResult = (int)ScriptResults.Success;\n}\n```\n"
- fmt: '# Selecting a SQL Server Connection Manager and Provider


    Between ADO.NET, ODBC, and OLE DB, there are enough connection managers to make
    you want to pull your hair out! All of these connection managers will connect
    to SQL Server, so how do you know when you should use which one? To answer that
    question, let’s talk about what the connection manager is actually doing and then
    look at each connection manager type that you can use to connect to SQL Server.


    A `connection manager` is the object that holds connection information for an
    external source, akin to an application data source or a Reporting Services shared
    data source. The connection manager provides an abstraction layer between Integration
    Services and the rest of the components so that information about the external
    source can be modified in one place to affect all tasks and components. To see
    all of the connection manager types available, take a look at [Figure 4-1](#9781484200834_Ch04.xhtml#Fig1).


    ![9781484200834_Fig04-01.jpg](images/9781484200834_Fig04-01.jpg)


    [Figure 4-1](#9781484200834_Ch04.xhtml#_Fig1). Connection manager types


    These are the three connection manager types that you can use to connect to a
    SQL Server database:


    *   ADO.NET

    *   ODBC

    *   OLE DB


    Let’s take a look at each connection manager type individually.


    ## ADO.NET


    The ADO.NET connection manager type is used to make a connection through the .NET
    Framework. Not only can this type be used for SQL Server, but it also provides
    access to other applications and other databases. The ADO.NET layer quickly retrieves
    data from the source using a `DataReader` object in the .NET Framework.


    The ADO.NET connection manager for SQL Server is best used as a source when you
    are using it elsewhere in the package. For example, the `Lookup` component uses
    an ADO.NET connection manager to connect, so then you should use it as a source.
    On the other hand, if a component uses another connection manager type, stick
    with that connection manager type. Consistency is really the key here. For a sample
    connection manager property window set to connect to the AdventuresWorks2012 database
    on the same server, see [Figure 4-2](#9781484200834_Ch04.xhtml#Fig2).


    ![9781484200834_Fig04-02.jpg](images/9781484200834_Fig04-02.jpg)


    [Figure 4-2](#9781484200834_Ch04.xhtml#_Fig2). ADO.NET connection manager property
    screen


    ## ODBC


    ODBC is the open database connectivity standard. Its purpose is to allow connections
    from any application to any database, regardless of the vendor. Often, an organization
    will use DSNs (data source names) to create an abstraction layer between the application
    and the connection string the ODBC provider uses. If you have an organization
    that really wants to use DSNs with SQL Server, ODBC is the option for you. Otherwise,
    stick with an ADO.NET or OLE DB connection manager.


    SSIS did not have an ODBC Source component prior to SQL Server 2012. Instead,
    you could and still can use the ADO.NET connection manager with a few tweaks.
    After you create the ADO.NET connection manager, change the provider at the top
    of the window to Odbc Data Provider, as shown in [Figure 4-3](#9781484200834_Ch04.xhtml#Fig3).


    ![9781484200834_Fig04-03.jpg](images/9781484200834_Fig04-03.jpg)


    [Figure 4-3](#9781484200834_Ch04.xhtml#_Fig3). ADO.NET providers


    Then add the DSN name or connection string. For our local AdventureWorks2012 database,
    the connection string will look like [Listing 4-1](#9781484200834_Ch04.xhtml#list1).


    [**Listing 4-1**](#9781484200834_Ch04.xhtml#_list1). ODBC Connection String


    ```

    Driver={SQL Server Native Client 11.0};

    Server=localhost;

    Database=AdventureWorks2012;

    Trusted_Connection=yes

    ```


    Our completed Connection Manager screen for an ADO.NET connection with an ODBC
    provider looks like [Figure 4-4](#9781484200834_Ch04.xhtml#Fig4).


    ![9781484200834_Fig04-04.jpg](images/9781484200834_Fig04-04.jpg)


    [Figure 4-4](#9781484200834_Ch04.xhtml#_Fig4). ODBC ADO.NET connection manager
    property screen


    If you are using SQL Server 2012 or later, you can use the ODBC Source component.
    Configuring the ODBC Source is very similar to the ADO.NET Source, except that
    you use an ODBC connection manager. The ODBC Source provides additional performance
    benefits over ADO.NET; however, it requires SQL Server Enterprise Edition to run
    outside of the SQL Server Data Tools environment.


    ## OLE DB


    Finally, we move on to what is arguably the most common connection manager used
    to connect to SQL Server: OLE DB. The OLE DB protocol was written by Microsoft
    as the next version of the ODBC provider. In addition to SQL Server databases,
    you can use the OLE DB connection manager to connect to file-based databases or
    Excel spreadsheets.


    OLE DB tends to be my default when I’m connecting to a SQL Server database. If
    you do not fall into the category of using mostly components that use an ADO.NET
    connection manager, and you do not fall into the category of having an organization
    that wants to use a DSN, you will want to use an OLE DB connection manager.


    You can fill out the property screen of the OLE DB connection manager as shown
    in [Figure 4-5](#9781484200834_Ch04.xhtml#Fig5).


    ![9781484200834_Fig04-05.jpg](images/9781484200834_Fig04-05.jpg)


    [Figure 4-5](#9781484200834_Ch04.xhtml#_Fig5). OLE DB connection manager property
    screen


    # Creating a SQL Server Source Component


    Once you’ve picked the correct connection manager and provider, you need to use
    them in a `Source Component` for our data pull. Begin by looking at the SSIS Toolbox
    when you are on the Data Flow tab. If you have not rearranged the SSIS Toolbox,
    you will see all possible sources under the Other Sources grouping, as seen in
    [Figure 4-6](#9781484200834_Ch04.xhtml#Fig6).


    ![9781484200834_Fig04-06.jpg](images/9781484200834_Fig04-06.jpg)


    [Figure 4-6](#9781484200834_Ch04.xhtml#_Fig6). Other Sources grouping in the SSIS
    Toolbox


    Now it’s time to choose one.


    Most of the hard decision-making was already completed when you set up the connection
    manager. If you use an OLE DB connection manager, then you must use the OLE DB
    source. If you decided to use an ADO.NET connection manager with either an ADO.NET
    or ODBC provider, you must use the ADO NET Source.


    Once you drag the desired source onto the Data Flow design window, the data flow
    contains one component, as shown in [Figure 4-7](#9781484200834_Ch04.xhtml#Fig7).
    Integration Services lets the developer know that there is an issue with the source
    by displaying the red circle with the white X in it. In this case, the issue is
    that you have not yet set any of the source’s properties, starting with the destination
    table, as shown in the tooltip.


    ![9781484200834_Fig04-07.jpg](images/9781484200834_Fig04-07.jpg)


    [Figure 4-7](#9781484200834_Ch04.xhtml#_Fig7). Data Flow task with new source


    To open the source component, either double-click the component or right-click
    and select Edit. Inside the source component, you can fill in the `Connection
    Manager` property. The first connection manager of the appropriate type will automatically
    be populated, but selecting the drop-down list arrow will let you select any of
    the other connection managers that match. You can see the OLE DB Source Editor
    screen up to this point in [Figure 4-8](#9781484200834_Ch04.xhtml#Fig8).


    ![9781484200834_Fig04-08.jpg](images/9781484200834_Fig04-08.jpg)


    [Figure 4-8](#9781484200834_Ch04.xhtml#_Fig8). Initial OLE DB Source Editor screen


    Although most of the decision-making work was already done when you created the
    connection manager, it is important to understand the part the source plays in
    the Integration Services package. The source is the glue that holds all of the
    other pieces together and ensures that you have one place to go to for future
    maintenance issues or changes. Setting up the SQL Server source was an easy step
    to get you warmed up before you move on to create and optimize the query that
    the source uses.


    # Writing a SQL Server Source Component Query'
