    a query against the database instead to pull the same information. A sample query
    that shows this information can be seen in [Listing 6-1](#9781484200834_Ch06.xhtml#list1);
    the results are shown in [Figure 6-2](#9781484200834_Ch06.xhtml#Fig2).


    **Listing 6-1**. Sample Query to Show Database Version and Information


    ```sql

    SELECT inst_name

    , release_num

    , service_level

    , bld_level

    , ptf

    , fixpack_num

    FROM TABLE (sysproc.env_get_inst_info())

    ```


    ![9781484200834_Fig06-02.jpg](images/9781484200834_Fig06-02.jpg)


    [Figure 6-2](#9781484200834_Ch06.xhtml#_Fig2). Query results showing database
    version and information


    ## Pick Provider Vendor


    Although it is possible to use ODBC and ADO.NET to connect to a DB2 database,
    we will focus on OLE DB providers in this chapter to ensure that we can use the
    connection for all transformations. Here are two of the more common providers
    and when you would use each one.


    *   **IBM OLE DB Provider for DB2:** IBM produces their own OLE DB provider, which
    can be used in applications such as Integration Services. This provider can be
    used for all versions and the latest products.

    *   **Microsoft OLE DB Provider for DB2 Version 4.0:** Microsoft created a provider
    that uses OLE DB to connect to DB2. This provider can be used for all versions
    of DB2. See the latest documentation for which product numbers it supports.


    Don’t forget to make sure you’ve selected either the 32-bit or 64-bit version,
    based on the database server. Also ensure that the database version matches the
    supported version and product for the provider you want to use. We recommend using
    the provider most often used in your organization to facilitate ease of development
    and maintenance. If you are trying a provider for the first time, try the different
    versions to see what works best for you, since the performance and security discrepancies
    may vary per environment.


    ## Connecting to a DB2 Database


    For this chapter, we’ll use the Microsoft OLE DB Provider for DB2. No matter what
    provider you choose, the next step is to make a connection to the DB2 database.
    To do this, you need to create a connection manager, select the correct provider,
    and fill out the appropriate server information.


    Once you download your desired provider, you will install it on the server where
    you will develop and execute your Integration Services packages. If the provider
    has installed correctly, you can see it by opening up the Source Assistant. A
    correctly installed provider can be seen in [Figure 6-3](#9781484200834_Ch06.xhtml#Fig3).


    ![9781484200834_Fig06-03.jpg](images/9781484200834_Fig06-03.jpg)


    [Figure 6-3](#9781484200834_Ch06.xhtml#_Fig3). Source Assistant’s Add New Source
    window


    Begin by creating a shared OLE DB connection manager in the Solution Explorer
    of your package. In the provider drop-down list at the top of the Connection Manager
    window, change the provider to Microsoft OLE DB Provider for DB2, as seen in [Figure
    6-4](#9781484200834_Ch06.xhtml#Fig4).


    ![9781484200834_Fig06-04.jpg](images/9781484200834_Fig06-04.jpg)


    [Figure 6-4](#9781484200834_Ch06.xhtml#_Fig4). Connection Manager window Provider
    list


    Next, you can add the name of the database instance, the correct authentication
    method, and the database you want to connect to. If you prefer, you can directly
    enter a connection string in the Connection property of the source.


    ![Image](images/sq.jpg) **Note** If you ever have a question on the correct connection
    string to use, `www.connectionstrings.com` is a great resource to answer your
    question.


    In additional to telling Integration Services how to connect to the DB2 database,
    you also need to tell Integration Services how to view the data. To store data,
    databases use an encoding scheme and character codeset. These are the two encoding
    schemes that you need to understand:


    *   **ASCII:** The American Standard Code for Information Interchange is a 7-bit
    encoding scheme that contains 128 printable and non-printable characters.

    *   **EBCDIC:** The Extended Binary Coded Decimal Interchange Code was created
    by IBM and is an 8-bit encoding scheme used in their mainframe servers.


    Both DB2 for i and DB2 for z/OS use the EBCDIC encoding scheme, and DB2 for LUW
    uses the ASCII encoding scheme. Typically, the EBCDIC schemes use the codeset
    number 37, and the DB2 for LUW uses the ANSI-1252 codeset. Using the Microsoft
    OLE DB Provider for DB2, the next step is to modify the codeset for whichever
    version you are using.


    Begin by clicking on the Data Links button next to the OLE DB Provider name in
    the Connection Manager, seen in [Figure 6-5](#9781484200834_Ch06.xhtml#Fig5).


    ![9781484200834_Fig06-05.jpg](images/9781484200834_Fig06-05.jpg)


    [Figure 6-5](#9781484200834_Ch06.xhtml#_Fig5). Data Links button on the Connection
    Manager window


    The Data Link Properties window should open. On the Advanced tab, under the Host
    CCSID property, you can use the default value of EBCDIC - U.S./Canada [37] or
    change it to ANSI - Latin I [1252], as shown in [Figure 6-6](#9781484200834_Ch06.xhtml#Fig6).
    In addition, you may find it necessary to check the Process Binary as Character
    option if you are seeing output that looks like data type names rather than your
    data.


    ![9781484200834_Fig06-06.jpg](images/9781484200834_Fig06-06.jpg)


    [Figure 6-6](#9781484200834_Ch06.xhtml#_Fig6). Data Link Properties window with
    Host CCSID list


    ## Querying the DB2 Database


    The final set of DB2 source patterns covers querying the DB2 database. Because
    the Integration Services package uses an OLE DB provider, it will also need an
    OLE DB source component. As with any other database, the source component should
    point to the DB2 connection manager already created. Once the package successfully
    connects to the database, it is time to query the database.


    ![Image](images/sq.jpg) **Note** A number of companies provide alternatives to
    the Integration Services connection managers and source components. They provide
    a different interface and different functionality than the OLE DB source component.
    If you need additional functionality, such as EBCDIC to ASCII conversion, see
    aminoSoftware’s Lysine EBCDIC source.


    All source component queries are written in whatever brand of SQL the database
    uses. DB2’s RDBMS-specific language is called SQL PL, and PL/SQL can also be used
    for later versions. If you receive an error message about syntax, be sure that
    your syntax matches the guidelines found on IBM’s website: `http://publib.boulder.ibm.com/infocenter/db2luw/v9r7/index.jsp?topic=/com.ibm.db2.luw.apdv.plsql.doc/doc/c0053607.html`.


    In certain cases, you may want to use parameters to limit the data returned from
    the database. Let’s take a look at parameterizing your queries now.


    ### DB2 Source Component Parameters


    An important part of writing source queries is that doing so allows you to filter
    the data that enters the pipeline. There are a number of reasons why you would
    want to do this, including loading data incrementally, reusing the same package
    for different departments, or reducing the amount of data that is run at one time.
    When using the Microsoft OLE DB Provider for DB2, you need to set the Derive Parameters
    property to `True`. You find this property in the connection manager, by clicking
    the Data Links button, and on the resulting Data Link Properties window, choosing
    the All tab. When you click on Derive Parameters in the properties list, an Edit
    Property Value window appears, as shown in [Figure 6-7](#9781484200834_Ch06.xhtml#Fig7).


    ![9781484200834_Fig06-07.jpg](images/9781484200834_Fig06-07.jpg)


    [Figure 6-7](#9781484200834_Ch06.xhtml#_Fig7). Edit Property Value window on the
    Data Link Properties window'
