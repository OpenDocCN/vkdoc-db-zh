- fmt: "Then you can choose to apply this right away or wait for a maintenance window.\n\
    \nClick **Add option** as shown in `Figure 15-16`.\n\n`Figure 15-16.` Schedule\
    \ and add option\n\n![](index-280_1.png)\n\n![](index-280_2.png)\n\nAfter clicking\
    \ **Add option**, you are taken back to your option group listing page. Click\
    \ on the option group you just created and verify the settings you implemented\
    \ as shown in `Figure 15-17`.\n\n`Figure 15-17.` Verify new option group settings\n\
    \n## Adding the New Option Group to RDS Instance\n\nNavigate to your RDS instance.\
    \ You will need to modify it to use this new option group. Click **Modify** on\
    \ your database instance as shown in `Figure 15-18`.\n\n`Figure 15-18.` Modify\
    \ RDS instance\n\nScroll down to the database options settings. Change the option\
    \ group to the new group you just created as shown in `Figure 15-19`.\n\n![](index-281_1.png)\n\
    \n![](index-281_2.png)\n\n`Figure 15-19.` Choose the new option group\n\nScroll\
    \ down and click **Continue**. Choose whether to apply this during the next maintenance\
    \ window or immediately. Then click **Modify DB Instance** as shown in `Figure\
    \ 15-20`.\n\n`Figure 15-20.` Modify RDS instance with new option group immediately\n\
    \n![](index-282_1.jpg)\n\n![](index-282_2.jpg)\n\n**Caution** apply immediately\
    \ can cause your database to be unavailable for some time while the change is\
    \ applied.\n\nClick back to the **Configuration** page of the RDS instance. You\
    \ will see the new option group is in a status of `Pending apply` as shown in\
    \ `Figure 15-21`.\n\n`Figure 15-21.` Option group pending apply\n\nOn the database\
    \ listing page, you will see the database is in a status of `Modifying` as shown\
    \ in `Figure 15-22`.\n\n`Figure 15-22.` RDS instance modifying to apply the new\
    \ option group\n\nOnce the state of the database is `Available`, you can proceed\
    \ to set up SQL Server Audit.\n\n## Setting Up SQL Server Audit\n\nSome guidelines\
    \ need to be followed on an RDS instance when setting up SQL Server Audit. These\
    \ are in addition to any other guidance I’ve provided on SQL Server Audit in earlier\
    \ chapters of this book.\n\n*   Don’t use `RDS_` as a prefix in the server audit\
    \ name.\n*   For `FILEPATH`, specify `D:\\rdsdbdata\\SQLAudit`. This path is required\
    \ by AWS and no other path will work.\n*   For `MAXSIZE`, specify a size between\
    \ 2 MB and 50 MB.\n*   Don’t configure `MAX_ROLLOVER_FILES` or `MAX_FILES`. This\
    \ is not allowed and you will receive an error if you try. Leave `MAX_ROLLOVER_FILES`\
    \ set to `2147483647`. Don’t use `MAX_FILES` at all. This is why it will be particularly\
    \ important to not audit everything under the sun. The more audit files you have,\
    \ the harder it will be to query the audit data.\n*   Don’t configure SQL Server\
    \ to shut down the DB instance if it fails to write the audit record. I don’t\
    \ normally recommend this anyway, but definitely, don’t do this in AWS.\n\n**Note**\
    \ SQL Server audit in RDS will work on any edition of SQL Server, including Express.\n\
    \nTo set up SQL Server Audit, you need to connect to your RDS instance with SSMS.\
    \ I recommend setting up your audit with the script in `Listing 15-1`.\n\n`Listing\
    \ 15-1.` Create server audit\n```sql\nUSE [master];\n\nCREATE SERVER AUDIT [AuditSpecification]\n\
    TO FILE\n(   FILEPATH = N'D:\\rdsdbdata\\SQLAudit\\'\n    ,MAXSIZE = 10 MB\n \
    \   ,MAX_ROLLOVER_FILES = 2147483647\n    ,RESERVE_DISK_SPACE = OFF\n) WITH (QUEUE_DELAY\
    \ = 1000, ON_FAILURE = CONTINUE)\nWHERE ([database_name]<>'rdsadmin');\n```\n\n\
    Next, you will need to set up a server or database audit so it will collect audit\
    \ data as shown in `Listing 15-2`.\n\n`Listing 15-2.` Create server audit specification\n\
    ```sql\nUSE [master];\n\nCREATE SERVER AUDIT SPECIFICATION [ServerAuditSpecification]\n\
    FOR SERVER AUDIT [AuditSpecification]\n```"
