- fmt: '# Chapter 11 Centralizing audit data


    audit files on data drives or log drives either. We have an E drive for applications
    where I work. That’s a great place for audit files to go.


    Once the registered servers list query window is open, you will need to check
    the drives you have available on your servers as shown in `Listing 11-1`.


    ### Listing 11-1. Check disk


    ```sql

    DECLARE @drives TABLE

    (driveletter VARCHAR(1), size INT);


    INSERT INTO @drives

    EXEC MASTER..xp_fixeddrives;


    SELECT * FROM @drives

    WHERE driveletter = ''E'';

    ```


    ![](index-190_1.png)


    You will see something like the results in `Figure 11-3`. You may not have an
    E drive. In that case, you might want to consider adding a small drive for your
    audit files.


    ### Figure 11-3. Drive space on registered servers


    The query results from `Listing 11-1` does not show you how much disk space is
    free. You won’t be using a lot of space, up to 200 MB, if you follow the instructions
    in Chapter 5, “Implementing SQL Server Audit via SQL Scripts.” I recommended creating
    a folder on your drive for your audit files to live in. You will need to create
    this folder manually. If you want to automate this, you may be able to use `PowerShell`
    for this.


    Once you have the drive folders in place, you can add the audit components with
    your registered server list query, as shown in `Listing 11-2`. This script will
    dynamically name your audit with the string `_servername` where server name will
    be the actual name of the server.


    ### Listing 11-2. Setting up an audit on all your servers


    ```sql

    USE [master];


    DECLARE @statement NVARCHAR(max);

    DECLARE @servername VARCHAR(50);

    SET @servername = @@servername;


    SELECT @statement = ''

    CREATE SERVER AUDIT [Audit_''+@servername+'']

    TO FILE

    ( FILEPATH = N''''E:\sqlaudit\''''

    ,MAXSIZE = 50 MB

    ,MAX_ROLLOVER_FILES = 4

    ,RESERVE_DISK_SPACE = OFF

    )

    WITH

    ( QUEUE_DELAY = 1000

    ,ON_FAILURE = CONTINUE

    )

    ALTER SERVER AUDIT [Audit_''+@servername+''] WITH (STATE = ON);'';


    EXEC sp_executesql @statement;

    ```


    ![](index-191_1.png)


    `Figure 11-4` shows what the audit name may look like. It depends on what your
    server is named.


    ### Figure 11-4. Audit setup on server with script


    Next, you will need to set up the server audit specification on all your servers
    using the script in `Listing 11-3`. This script will dynamically name your server
    audit specification with the string `_servername`.


    ### Listing 11-3. Set up server audit specification on all your servers


    ```sql

    USE [master];


    DECLARE @statement NVARCHAR(max)

    DECLARE @servername VARCHAR(50)

    SET @servername = @@servername


    SELECT @statement = ''CREATE SERVER AUDIT SPECIFICATION

    [ServerAuditSpecification_''+@servername+'']

    FOR SERVER AUDIT [Audit_''+@servername+'']

    ADD (DATABASE_CHANGE_GROUP),

    ADD (AUDIT_CHANGE_GROUP),

    ADD (APPLICATION_ROLE_CHANGE_PASSWORD_GROUP),

    ADD (DATABASE_OBJECT_CHANGE_GROUP),

    ADD (DATABASE_OWNERSHIP_CHANGE_GROUP),

    ADD (DATABASE_PERMISSION_CHANGE_GROUP),

    ADD (DATABASE_PRINCIPAL_CHANGE_GROUP),

    ADD (DATABASE_ROLE_MEMBER_CHANGE_GROUP),

    ADD (LOGIN_CHANGE_PASSWORD_GROUP),

    ADD (SCHEMA_OBJECT_CHANGE_GROUP),

    ADD (SCHEMA_OBJECT_OWNERSHIP_CHANGE_GROUP),

    ADD (SCHEMA_OBJECT_PERMISSION_CHANGE_GROUP),

    ADD (SERVER_OBJECT_CHANGE_GROUP),

    ADD (SERVER_OBJECT_OWNERSHIP_CHANGE_GROUP),

    ADD (SERVER_OBJECT_PERMISSION_CHANGE_GROUP),

    ADD (SERVER_OPERATION_GROUP),

    ADD (SERVER_PERMISSION_CHANGE_GROUP),

    ADD (SERVER_PRINCIPAL_CHANGE_GROUP),

    ADD (SERVER_ROLE_MEMBER_CHANGE_GROUP),

    ADD (SERVER_STATE_CHANGE_GROUP),

    ADD (USER_CHANGE_PASSWORD_GROUP)

    WITH (STATE = ON);''


    exec sp_executesql @statement;

    ```


    ![](index-192_1.png)


    `Figure 11-5` shows what the server audit specification name may look like. It
    depends on what your server is named.


    ### Figure 11-5. Server audit specification setup on server with script'
