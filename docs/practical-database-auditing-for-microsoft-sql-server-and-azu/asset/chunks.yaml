    \ 所示。\n\n***图 7-38.** 删除扩展事件*\n\n您将看到如图 7-39 所示的对话框。点击此对话框中的“确定”按钮将删除扩展事件。\n\n\
    ![](img/index-144_1.png)\n\n***图 7-39.** 删除扩展事件对话框*\n\n当您删除扩展事件时，文件会保留在磁盘上。我删除了扩展事件，以为文件也一并消失了。不，文件仍然在那里。这是为了方便您日后可能需要它们进行审计。您必须手动去删除它们。\n\
    \n在下一章中，您将学习如何通过为您想要部署在服务器上的扩展事件编写脚本来简化工作。\n\n# 第 8 章 通过 SQL 脚本实现扩展事件\n\n要使扩展事件生效，您需要设置一个会话。[第\
    \ 6 章](https://doi.org/10.1007/978-1-4842-8634-0_6)“什么是扩展事件？”涵盖了构成会话的各个部分。[第 7\
    \ 章](https://doi.org/10.1007/978-1-4842-8634-0_7)“通过图形界面实现扩展事件”介绍了如何在图形界面中设置会话。在本章中，您将学习如何使用\
    \ SQL 脚本设置扩展事件会话。\n\n**注意** 仅仅因为您可以审计一切，并不意味着您应该这样做。如果您审计所有事情，您将很难从中筛选出有用信息，并且可能会导致系统出现性能问题。\n\
    \n## 为现有扩展事件编写脚本\n\n学习如何为扩展事件编写脚本的一个简单方法是为现有的事件编写脚本。您可以右键单击在[第 7 章](https://doi.org/10.1007/978-1-4842-8634-0_7)“通过图形界面实现扩展事件”中创建的会话，选择“编写脚本为”，然后选择“CREATE\
    \ 到”，再选择“新建查询编辑器窗口”，如图 8-1 所示。\n\n© Josephine Bush 2022\nJ. Bush, *Practical Database\
