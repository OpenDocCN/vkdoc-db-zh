    ## 筛选 SQL Server 审计


    你可以使用审计对话框进行筛选，如图 4-21 所示。


    ![](img/index-65_1.png)


    第 4 章 通过 GUI 实现 SQL Server 审计


    ***图 4-21.** 为审计添加筛选器*


    你可以基于审计收集中任何可用的列进行筛选。这样，你可以过滤掉诸如监控工具或服务账户之类的内容。SQL Server 有一个 `servername$` 账户，在后台执行各种操作。这类账户会快速填满你的审计文件，导致难以找到你想要审计的内容。进行筛选时，使用列的名称以及你**不希望它等于**或**希望它等于**的值。例如，如果你只想审计
    `sa`，可以在这里进行筛选。这类似于 SQL 语句中的 `WHERE` 子句，因此你可以做任何能在 WHERE 子句中做的事情，只是不使用 `WHERE`
    关键字。


    ![](img/index-66_1.png)


    第 4 章 通过 GUI 实现 SQL Server 审计


    **提示** 如果你审计的 SQL Server 版本没有你需要的列，例如 `client_ip` 或 `host_name`，你可以尝试改用扩展事件来实现。第
    7 章“通过 GUI 实现扩展事件”涵盖了这方面的信息。


    ## 删除审计


    要删除审计，请右键单击该审计，如图 4-22 所示。


    ***图 4-22.** 删除审计*


    你将看到一个对话框，这个对话框非常有用之处在于，你可以通过一个复选框选择禁用它，如图 4-23 所示。在删除审计之前，你需要先将其禁用。


    ![](img/index-67_1.jpg)


    第 4 章 通过 GUI 实现 SQL Server 审计


    ***图 4-23.** 在删除前禁用审计*


    当你删除审计后，文件仍会保留在磁盘上。我删除了审计，以为文件也随之消失了。不，文件还在那里。这是为了方便你日后可能出于审计目的需要它们。你必须手动去删除它们。


    删除审计时，可能会使你的服务器和数据库审计成为孤立状态。服务器和数据库审计会保留并看似正常，但由于审计已被删除，将不会收集任何数据。图 4-24 显示即使没有审计，服务器和数据库审计仍然存在。


    ![](img/index-68_1.png)


    ![](img/index-68_2.jpg)


    第 4 章 通过 GUI 实现 SQL Server 审计


    ***图 4-24.** 审计已消失，但服务器和数据库审计看似正常*


    如果你进入服务器或数据库审计，它们会显示审计为空，如图 4-25 所示。


    ***图 4-25.** 服务器审计规范缺少审计*


    ![](img/index-69_1.png)


    第 4 章 通过 GUI 实现 SQL Server 审计


    在图 4-25 的左上角有一条消息，告诉你“未提供服务器审计”，而它需要这个才能收集数据。


    即使你使用相同的名称重新创建审计，服务器和数据库审计也不会自动与新审计关联。服务器和数据库审计依赖于审计的 `GUID`。有一种方法可以使用相同的 `GUID`
    重新创建审计。这将在第 5 章“通过 SQL 脚本实现 SQL Server 审计”中介绍。


    ## 禁用审计


    你可以通过在 GUI 中右键单击审计并选择禁用，如图 4-26 所示，来禁用审计。


    ***图 4-26.** 禁用审计*


    **注意** 如果你想禁用审计，在它完成正在审计的操作之前，审计不会被禁用。如果你正在审计大量操作，这可能会很困难。从技术上讲，你...

