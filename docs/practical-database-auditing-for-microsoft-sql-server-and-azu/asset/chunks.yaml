- fmt: '# database


    *   `DATABASE_PERMISSION_CHANGE_GROUP` – Captures when a `GRANT`, `REVOKE`, or
    `DENY` is issued for a statement permission.

    *   `DATABASE_PRINCIPAL_CHANGE_GROUP` – Captures when principals, such as users,
    are created, altered, or dropped from a database.

    *   `DATABASE_ROLE_MEMBER_CHANGE_GROUP` – Captures when a login is added to or
    removed from a database role.

    *   `APPLICATION_ROLE_CHANGE_PASSWORD_GROUP` – Captures whenever a password is
    changed for an application role.

    *   `DBCC_GROUP` – Captures when a user executes a `DBCC` command.

    *   `SCHEMA_OBJECT_CHANGE_GROUP` – Captures when a `CREATE`, `ALTER`, or `DROP`
    operation is performed on a schema.

    *   `SCHEMA_OBJECT_OWNERSHIP_CHANGE_GROUP` – Captures when the permissions change
    to the owner of a schema object.

    *   `SCHEMA_OBJECT_PERMISSION_CHANGE_GROUP` – Captures whenever a grant, deny,
    or revoke is issued for a schema object.


    The following actions can be used when you want to capture everything happening
    in a database or on a database server. I only use these action types if I’m filtering
    the audit to get only one user or to see if a schema or database is no longer
    in use. Be very careful with these actions, though. They can quickly get out of
    control collecting so much audit data that you will never be able to weed through.


    *   `DATABASE_OBJECT_ACCESS_GROUP` – Captures when any action is taken in the
    database being audited.

    *   `SCHEMA_OBJECT_ACCESS_GROUP` – Captures when any action is taken in the schema
    being audited.


    ## Chapter 3 What Is SQL Server Audit?


    **Note** Additional database audit action groups can be used. descriptions of
    each are available in the following link: [https://docs.microsoft.com/en-us/sql/relational-databases/security/auditing/sql-server-audit-action-groups-and-actions?view=sql-server-ver15#database-level-audit-action-groups](https://docs.microsoft.com/en-us/sql/relational-databases/security/auditing/sql-server-audit-action-groups-and-actions?view=sql-server-ver15#database-level-audit-action-groups)


    When you are working with database audits, you have some actions that aren’t available
    at the server audit level. These will capture actions taken on the database schema
    and schema objects such as tables, views, stored procedures, and functions. The
    following list outlines these groups:


    *   `SELECT` – Captures `SELECT` statements.

    *   `UPDATE` – Captures `UPDATE` statements.

    *   `INSERT` – Captures `INSERT` statements.

    *   `DELETE` – Captures `DELETE` statements.

    *   `EXECUTE` – Captures `EXECUTE` statements.


    **Note** Additional database audit actions can be used. descriptions of each are
    available in the following link: [https://docs.microsoft.com/en-us/sql/relational-databases/security/auditing/sql-server-audit-action-groups-and-actions?view=sql-server-ver15#database-level-audit-actions](https://docs.microsoft.com/en-us/sql/relational-databases/security/auditing/sql-server-audit-action-groups-and-actions?view=sql-server-ver15#database-level-audit-actions)


    ## SQL Server Audit Examples


    Here are some concrete examples of how you can implement the use cases I outlined
    in this chapter.'
