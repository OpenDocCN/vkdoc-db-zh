    \           sqlserver.sql_text)\n    WHERE ([sqlserver].[server_principal_name]=N'sa'))\n\
    ADD TARGET package0.event_file(\n    SET filename=N'e:\\audits\\audit_sa',\n \
    \   max_file_size=(10),\n    max_rollover_files=(5))\nWITH (STARTUP_STATE=ON);\n\
