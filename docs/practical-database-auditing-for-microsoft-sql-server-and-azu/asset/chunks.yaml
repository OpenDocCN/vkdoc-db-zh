  trans: "# 第 14 章：审计 Azure SQL 托管实例\n\n![](img/index-260_1.jpg)\n\n![](img/index-260_2.png)\n\
    \n**图 14-12.** Azure 存储账户中的 SQL 审计文件\n\n您会看到它们被保存为 `.xel` 文件，而在虚拟机上的 SQL Server\
    \ 中，它们会保存为 `.sqlaudit` 文件。另外，请注意文件按服务器、数据库、容器和日期组织成了文件夹结构。查询多个文件很困难，因为您必须循环遍历它们。\n\
    \n与虚拟机上的 SQL Server 一样，您可以右键单击审计项以查看审计日志，如图 14-13 所示。\n\n**图 14-13.** 查看审计日志\n\
    \n有一种方法可以通过单击 `文件` ➤ `打开` ➤ `合并审计文件` 来合并审计文件，如图 14-14 所示。\n\n![](img/index-261_1.jpg)\n\
    \n![](img/index-261_2.png)\n\n**图 14-14.** “合并审计文件”菜单项\n\n`合并审计文件` 将打开一个对话框。单击\
    \ `添加`。这将打开另一个对话框，您可以在其中添加您的审计文件，如图 14-15 所示。\n\n**图 14-15.** 合并审计文件\n\n您只能合并一个数据库的审计文件。如果您正在审计多个数据库，这可能不是很有用。这就是为什么我喜欢诊断设置，它允许您将审计数据存储在\
    \ Log Analytics 工作区中。这样便于跨多个数据库或服务器进行轻松查询。\n\n## 使用扩展事件审计 Azure SQL 托管实例\n\nAzure\
    \ SQL 托管实例上的扩展事件与虚拟机上的 SQL Server 非常相似。主要区别在于存储位置。您需要使用存储帐户来写入审计文件。除此之外，设置与 SQL\
    \ Server 相同。有关如何设置扩展事件，请参阅本书前面的章节。\n\n您需要创建一个存储帐户和容器来保存您的审计文件。可以使用上一节中的存储帐户、容器、容器\
    \ URL、SAS 令牌和凭据。此设置将与上一节中 SQL Server 审计的设置相同。\n\n在创建扩展事件时，您需要在文件名中指定 URL，如代码清单\
    \ 14-8 所示。\n\n**代码清单 14-8.** 在 SSMS 中创建服务器审计\n\n```sql\nCREATE EVENT SESSION [auditxel]\
    \ ON SERVER\nADD EVENT sqlserver.rpc_completed(\n    ACTION(sqlserver.client_app_name,\
    \ sqlserver.client_hostname, sqlserver.database_name, sqlserver.sql_text, sqlserver.username)\n\
    \    WHERE ([sqlserver].[username]=N'josephine')),\nADD EVENT sqlserver.sql_batch_completed(\n\
    \    ACTION(sqlserver.client_app_name, sqlserver.client_hostname, sqlserver.database_name,\
    \ sqlserver.sql_text, sqlserver.username)\n    WHERE ([sqlserver].[username]=N'josephine'))\n\
    ADD TARGET package0.event_file(SET filename=N'https://azuremiauditing.blob.core.windows.net/miauditfiles/xelauditdata.xel',\
    \ max_file_size=(10), max_rollover_files=(5))\nWITH (MAX_MEMORY=4096 KB, EVENT_RETENTION_MODE=ALLOW_SINGLE_EVENT_LOSS,\
    \ MAX_DISPATCH_LATENCY=30 SECONDS, MAX_EVENT_SIZE=0 KB, MEMORY_PARTITION_MODE=NONE,\
    \ TRACK_CAUSALITY=OFF, STARTUP_STATE=ON);\n\nALTER EVENT SESSION [auditxel] ON\
    \ SERVER STATE=START;\n```\n\n![](img/index-263_1.jpg)\n\n![](img/index-263_2.png)\n\
    \n请务必将 `filename` 更新为您的存储帐户和容器的路径。这应该是您为其设置了凭据的那个。有关更多详情，请参阅本章中的 SQL Server 审计部分。\n\
    \n一旦扩展事件启动，它将把一个文件放入 Azure 存储帐户，如图 14-16 所示。将放置五个每个最大 10 MB 的文件，因为这是代码清单 14-8\
    \ 脚本中指定的。\n\n**图 14-16.** Azure 存储账户中的 `.xel` 文件\n\n要查询 `.xel` 文件，您需要知道确切的文件名。您可以使用\
    \ SSMS 中的 Azure 存储连接来查明名称，如图 14-17 所示。\n\n**图 14-17.** Azure 存储连接\n\n![](img/index-264_1.jpg)"
- fmt: "# Chapter 14 Auditing Azure SQL Managed Instance\n\n![](index-264_2.png)\n\
    \nSign in to Azure and pick the right storage account and container from the drop-down\
    \ as shown in [Figure 14-18](#index_split_002.html#p264).\n\n**Figure 14-18.**\
    \ Log in to Azure and select a storage account and container\n\nClick OK. This\
    \ connects you to this storage account and it lists the files in the container\
    \ as shown in [Figure 14-19](#index_split_002.html#p264).\n\n**Figure 14-19.**\
    \ Container list of files\n\n![](index-265_1.png)\n\nOnce you know the names of\
    \ the files, you can query them with the script in [Listing 14-9](#index_split_002.html#p265).\n\
    \n**Listing 14-9.** Query .xel files\n\n```sql\nSELECT n.value('(@timestamp)[1]',\
    \ 'datetime') as timestamp,\n    n.value('(action[@name=\"sql_text\"]/value)[1]',\
    \ 'nvarchar(max)') as [sql],\n    n.value('(action[@name=\"client_hostname\"]/value)[1]',\
    \ 'nvarchar(50)') as [client_hostname],\n    n.value('(action[@name=\"username\"\
    ]/value)[1]', 'nvarchar(50)') as [user],\n    n.value('(action[@name=\"database_name\"\
    ]/value)[1]', 'nvarchar(50)') as [database_name],\n    n.value('(action[@name=\"\
    client_app_name\"]/value)[1]', 'nvarchar(50)') as [client_app_name]\nFROM (SELECT\
    \ CAST(event_data as XML) as event_data\n      FROM sys.fn_xe_file_target_read_file(N'https://azuremiauditing.blob.core.windows.net/miauditfiles/xelauditdata_0_132972103478750000.xel',\
    \ NULL, NULL, NULL)) ed\nCROSS APPLY ed.event_data.nodes('event') as q(n)\nWHERE\
    \ n.value('(@timestamp)[1]', 'datetime')\n    >= DATEADD(HOUR, -4, GETDATE())\n\
    ORDER BY timestamp DESC;\n```\n\nThe query in [Listing 14-9](#index_split_002.html#p265)\
    \ will return results like [Figure 14-20](#index_split_002.html#p265).\n\n**Figure\
    \ 14-20.** .xel files results\n\n![](index-266_1.jpg)\n\nQuerying the `.xel` files\
    \ is difficult because you need to know the exact file name. You can’t easily\
    \ query multiple `.xel` files at the same time. This is why I like the diagnostic\
    \ settings that allow you to store your audit data in a `Log Analytics workspace`.\
    \ This makes for easy querying across multiple databases or servers.\n\n## Centralizing\
    \ and Reporting on Azure SQL Managed Instance Audit Data\n\nCentralizing is as\
    \ easy as putting all your audit data in the same `Log Analytics workspace`. This\
    \ makes for easy querying and reporting on audit data.\n\nTo report on data, I\
    \ use a `Logic App`. This way, I can send an email attachment with any changes\
    \ captured by the audit daily. [Figure 14-21](#index_split_002.html#p266) shows\
    \ you the high-level setup of the `Logic App`.\n\n**Figure 14-21.** Logic app\
    \ to report on audit data\n\n![](index-267_1.png)\n\n**Tip** To learn how to create\
    \ a logic app, [visit https://docs.microsoft.com/en-us/azure/logic-apps/quickstart-create-first-logic-app-workflow](https://docs.microsoft.com/en-us/azure/logic-apps/quickstart-create-first-logic-app-workflow).\n\
    \nThe logic app consists of four steps. Let’s walk through them one by one. The\
    \ `Recurrence` step determines how often this app will run as shown in [Figure\
    \ 14-22](#index_split_002.html#p267). This logic app will run once a day at 10.\
    \ This is in UTC, so make sure to account for that if you want it to run at 10\
    \ in another time zone instead.\n\n**Figure 14-22.** Recurrence step\n\nThe `Run\
    \ query and list results` step runs the Kusto query I mentioned in [Listing 14-3](#index_split_002.html#p250).\
    \ This step is shown in [Figure 14-23](#index_split_002.html#p268).\n\n![](index-268_1.jpg)\n\
    \n**Figure 14-23.** Run query and list results step\n\nThe `Create CSV table`\
    \ step creates a CSV file of the results as shown in [Figure 14-24](#index_split_002.html#p269).\
    \ The contents of the CSV come from the previous step. I create a CSV file because\
    \ the Kusto query results are not easily formatted into the body of an email."
