    # 第 1 章 审计为何重要


    J. Bush，《Microsoft SQL Server 和 Azure SQL 实用数据库审计》，


    [`doi.org/10.1007/978-1-4842-8634-0_1`](https://doi.org/10.1007/978-1-4842-8634-0_1#DOI)


    变化的事情太多了。通过建立和配置审计，我能够看到是谁在更改什么。真是松了一口气！不再有“为什么会发生这种事？”而我却无法提供任何线索的情况。我可以对他们说：“我在数据库中没有看到任何更改，或者这个用户在
    5 号修改了架构。”


    最终，我的公司被一家监管更严格的公司收购了，他们需要系统经过审计，并每周审查合适的报告。我的新公司对我已经完成了这些基础工作感到非常满意，这使我们能够轻松地进行审计。最初，我公司的管理层并不认为这是优先事项，但我在其他项目间隙坚持做这件事，并且正好构建了新母公司所需的东西，尽管我事先并不知道他们会需要这个。我所做的并不是什么魔法，我也无法预知未来。我只是遵循了基本的审计原则。这些原则得到了回报！


    ## 审计类型


    你需要进行的审计类型将取决于你所从事的业务。无论你身处何种行业，审计都会对你有所帮助。以下列出了你可能遇到的审计类型：


    **内部审计** – 这种类型的审计由企业自身发起。它帮助企业维持可能并非外部审计师或政府法规所要求的标准。即使没有被要求进行更正式的审计，你可能仍希望进行此类审计的原因，是为了确保你的业务尽可能顺畅高效地运行。内部审计也可用于确保你已为外部审计做好准备。


    **外部审计** – 这种类型的审计由第三方进行，例如政府监管机构或会计师。这些外部审计师将熟悉你需要遵守的各类规则和法规，并会确保你严格遵循它们。


    **税务审计** – 在美国，美国国税局（IRS）有时会审计个人或企业的纳税申报表，以确保准确性，确认你没有多缴或少缴税款。这类审计往往是随机选取的，但某些纳税事项可能会增加你被审计的可能性。


    **财务审计** – 这种类型的审计由外部审计师进行，以确保财务报表和/或工资支付的准确性。


    **合规审计** – 这种类型的审计可由内部或外部审计师进行，旨在确保企业符合内部或外部的审计标准。这可以细分为监管合规和公司合规。公司合规是指内部规则和准则，而监管合规是指遵守政府法律和法规。


    **运营审计** – 这种类型的审计通常由内部审计师进行，但在某些情况下也可能由外部审计师执行。此项审计旨在帮助确定改进业务运营的方法。


    **信息系统审计** – 这种类型的审计可由内部或外部审计师进行，以确保系统向用户提供准确的数据，并确保系统安全，防止未经授权的用户访问或篡改。


    ## 监管合规类型


    *监管合规*是指企业必须遵守与其运营相关的州、联邦和国际法律。具体的法规要求因企业而异。以下列出了你可能遇到的监管合规类型：


    **《加州消费者隐私法案》（CCPA）** – 该法案于 2018 年颁布，旨在保护消费者的个人信息以及收集这些信息的企业如何使用这些信息。

    '
- fmt: '# 第一章 审计的重要性


    ## 法规与标准概述


    **通用数据保护条例（GDPR）** – 该条例加强了对欧盟（EU）公民的数据保护。它于2018年颁布，要求企业为在欧盟成员国发生的任何交易保护欧盟公民的隐私。


    **健康保险流通与责任法案（HIPAA）** – 该法案于1996年颁布，是保护敏感健康相关信息的标准。它要求任何持有医疗数据的人确保数据安全，防止意外泄露或黑客攻击。


    **支付卡行业数据安全标准（PCI DSS）** – 这是一套确保持用卡数据安全的标准。它于2004年颁布，概述了支付数据的存储、传输和处理方式。


    **萨班斯-奥克斯利法案（SOX）** – 该法案于2002年颁布，是一个会计和合规框架。上市公司必须遵守创建和维护安全计算系统的规定。


    ## 什么是数据库审计？


    **数据库审计**是指利用数据库工具和审计策略来记录数据库服务器上的更改。数据库审计通常用于：

    * 收集特定数据库活动的数据

    * 跟踪数据库服务器的更改

    * 向审计员报告更改

    * 调查可疑活动


    你可以进行的数据库审计类型包括：

    * **服务器级审计** – 包括跟踪链接服务器、`SQL Agent`作业或数据库的创建。

    * **安全审计** – 包括创建登录名或修改用户权限。

    * **数据定义语言（DDL）审计** – 包括创建或删除表等操作。

    * **数据操作语言（DML）审计** – 包括从表中选择、插入、删除或更新等操作。


    ## 数据库审计能解决的问题


    审计可以帮助你解决很多问题。以下列表概述了审计可以处理的一些场景：

    * **谁弄坏了这个？** 人们来找你，说东西坏了，为什么？没有审计，你一无所知。如果你设置了审计，就可以看到谁更改了某个东西，这可能就是导致问题的更改。

    * **谁在使用这个登录名？** 你还可以查看是否有人使用了某个东西，比如一个表或登录名。我们遇到过一个情况，`SQL Server`的系统管理员（`sa`）密码被随意分发。一个`SQL`登录名可能为特定目的设置，但现在被共享了，而我们绝对不希望不同用户使用同一个登录名。为此，我们必须知道谁在使用`sa`。你不能直接问：“你在这台服务器上使用`sa`吗？”要么得不到回应，要么对方不知道，要么说没时间查。我们审计了`sa`，得到了一个用户列表，然后联系了这些用户及其经理，告诉他们：“我们必须让你停用`sa`。我们看到你用`sa`做这些事，所以让我们为你设置一个用户名/密码，这样你就可以继续完成你需要做的工作。”

    * **谁在使用这个数据库对象？** 还有一个案例，开发团队试图弄清楚是哪个登录名在向一个表写入数据。他们可以看到更新后的数据，但不知道来源，这是审计能帮助你的另一种方式。

    * **用户需要什么权限？** 作为这次`sa`审计的一部分，我们还检查了人们在做什么，看看能否减少他们在生产系统中被授予的权限级别，目标是只授予所需的最小权限。大多数用户甚至没有意识到使用`sa`所拥有的权力，而且所有人都只是以符合他们自己工作的方式使用它。

    * **用户是否在滥用数据库？** 我们确实抓到一个人共享他的域用户名和密码，以便在他不在办公室时让别人代行职责，这是绝对禁止的。

    * **什么发生了更改？** 很多时候，内部或外部审计员需要……'
