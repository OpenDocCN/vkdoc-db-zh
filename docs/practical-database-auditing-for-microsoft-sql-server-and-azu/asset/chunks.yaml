    shows up that way in the audit.


    ***Figure 9-8.** Set up database audit specification in the master database*


    In the next chapter, you will learn about the additional SQL Server auditing options


    like Common Criteria compliance, C2 audit trace, change data capture, successful/failed


    logins, and DDL triggers.


    **CHAPTER 10**


    **Additional SQL Server**


    **Auditing and Tracking**


    **Methods**


    In this chapter, you will learn about additional SQL Server auditing options.
    I don’t use


    most of these very much, if at all. They can cause performance issues or create
    so much


    data you can’t weed through it all. I want to show you these options to help you
    make an


    informed decision on whether to use them at all. Depending on your use cases,
    they may


    prove valuable when used with caution.


    **Common Criteria Compliance**


    If you don’t have an auditor requiring you to turn this on, leave it off. It can
    be


    very impactful to server performance. Even if an auditor thinks you need it, have
    a


    conversation with them. Explain the implications of turning it.


    I will only briefly mention C2 audit mode here because C2 will be removed in a


    future version of SQL Server. Microsoft says to use Common Criteria compliance.


    Common Criteria compliance was developed by the European Union. It’s an


    internationally recognized set of guidelines for security. The SQL Server functionality
    is


    only available in Enterprise and Datacenter editions.


    © Josephine Bush 2022


    J. Bush, *Practical Database Auditing for Microsoft SQL Server and Azure SQL*,


    [https://doi.org/10.1007/978-1-4842-8634-0_10](https://doi.org/10.1007/978-1-4842-8634-0_10#DOI)


    ![](index-169_1.png)


    Chapter 10 additional SQl Server auditing and traCking MethodS


    With Common Criteria compliance


    • Memory allocation is overwritten with a known pattern of bits


    before being reallocated to a new resource. This can cause slow


    performance.


    • Login auditing is enabled. The login statistics can be viewed by


    querying the sys.dm_exec_sessions view.


    • Table-level DENY takes precedence over a column-level GRANT.


    To enable Common Criteria compliance, right-click the server connection and


    choose Properties as shown in Figure [10-1](#index_split_001.html#p169).


    ***Figure 10-1.** Opening server properties*'
  trans: "# 第 9 章 追踪 SQL Server 配置变更\n\n## 清单 9-2. 使用 SQL 脚本创建数据库审计规范\n\n```sql\n\
    USE [master];\n\nCREATE DATABASE AUDIT SPECIFICATION [DatabaseAuditSpecification_spconfigure]\n\
    FOR SERVER AUDIT [AuditSpecification]\nADD (EXECUTE ON OBJECT::[sys].[sp_configure]\
    \ BY [public])\nWITH (STATE = ON);\n```\n\n虽然可以通过图形用户界面查询审计（这在第 4 章“通过图形用户界面实现\
    \ SQL Server 审计”中已涵盖），但让我们使用 SQL 脚本来查询审计数据（这在第 5 章“通过 SQL 脚本实现 SQL Server 审计”中已涵盖）。首先进行配置更改，然后执行清单\
    \ 9-3 中的脚本。\n\n## 清单 9-3. 使用 SQL 脚本查询审计\n\n```sql\nUSE master;\nSELECT DISTINCT\n\
    \    event_time,\n    aa.name as audit_action,\n    statement,\n    succeeded,\n\
    \    database_name,\n    server_instance_name,\n    schema_name,\n    session_server_principal_name,\n\
    \    server_principal_name,\n    object_Name,\n    file_name,\n    client_ip,\n\
    \    application_name,\n    host_name,\n    file_name\nFROM sys.fn_get_audit_file\
    \ ('E:\\audits\\*.sqlaudit',default,default) af\nINNER JOIN sys.dm_audit_actions\
    \ aa\n    ON aa.action_id = af.action_id\nWHERE event_time > DATEADD(HOUR, -4,\
    \ GETDATE())\nORDER BY event_time DESC;\n```\n\n![图 9-8](img/index-167_1.jpg)\n\
    \n**图 9-8.** 在 master 数据库中设置数据库审计规范\n\n图 9-8 展示了清单 9-3 的查询结果。请确保你在创建审计规范**之后**进行配置更改。数据库审计规范不会拾取在它创建之前的更改。即使你通过\
    \ SSMS 图形用户界面进行更改，它仍然会在后台使用 `sp_configure`，因此该操作会以这种方式显示在审计中。\n\n下一章，你将了解额外的 SQL\
    \ Server 审计选项，如通用准则合规性、C2 审计跟踪、变更数据捕获、成功/失败登录以及 DDL 触发器。\n\n# 第 10 章 其他 SQL Server\
    \ 审计与跟踪方法\n\n在本章中，你将了解额外的 SQL Server 审计选项。我很少（如果有的话）使用其中大部分。它们可能导致性能问题，或产生过多数据而无法梳理。我希望向你展示这些选项，以帮助你就在是否使用它们上做出明智决定。根据你的用例，谨慎使用时，它们可能被证明是有价值的。\n\
    \n## 通用准则合规性\n\n如果你没有审计员要求你开启此功能，请保持关闭。它可能对服务器性能产生很大影响。即使审计员认为你需要它，也要与他们沟通，解释开启它的影响。\n\
    \n我在此仅简要提及 C2 审计模式，因为 C2 将在未来版本的 SQL Server 中被移除。微软建议使用通用准则合规性。\n\n通用准则合规性由欧盟开发。它是一套国际认可的安全指南。SQL\
    \ Server 的此功能仅在 Enterprise 和 Datacenter 版本中可用。\n\n![图 10-1](img/index-169_1.png)\n\
    \n**图 10-1.** 打开服务器属性\n\n启用通用准则合规性后：\n*   内存分配在重新分配给新资源前，会被已知的比特模式覆盖。这可能导致性能缓慢。\n\
    *   登录审计被启用。可以通过查询 `sys.dm_exec_sessions` 视图查看登录统计信息。\n*   表级别的 `DENY` 优先于列级别的\
    \ `GRANT`。\n\n要启用通用准则合规性，请右键单击服务器连接并选择“属性”，如图 10-1 所示。"
- fmt: '# Chapter 10: Additional SQL Server Auditing and Tracking Methods


    ## Change Tracking


    一旦属性对话框打开，点击“安全”页面。然后勾选“启用公共标准合规性”复选框，如图 10-2 所示。


    ![图 10-2](index-170_1.png)


    ***图 10-2.** 勾选“启用公共标准合规性”复选框*


    当你在对话框上点击“确定”时，会收到一个弹出消息，警告你需要重启 SQL Server，如图 10-3 所示。


    ![图 10-3](index-171_1.jpg)


    ***图 10-3.** 弹出警告：某些配置更改直到 SQL Server 重启后才会生效*


    重启 SQL Server 服务后，公共标准合规性功能即被启用。


    **变更跟踪**


    变更跟踪是一种跟踪 DML 变更的轻量级方法。通常由应用程序用来查询数据库变更。变更跟踪已经过优化以最小化性能影响，但仍有开销，因此在实施时需谨慎，特别是在变更频繁的表上。此外，当变更跟踪清理发生时，可能会导致锁定和阻塞。换句话说，在启用前请仔细考虑。


    在使用变更跟踪之前，你需要在数据库级别启用它，如图 10-4 所示。你可以通过右键单击数据库并选择“属性”来访问此对话框。“保留期”、“保留期单位”和“自动清理”选项保留默认值即可。


    ![图 10-4](index-172_1.jpg)


    ***图 10-4.** 在数据库级别启用变更跟踪*


    你也可以通过 SQL 脚本启用变更跟踪，如清单 10-1 所示。


    ***清单 10-1.*** 在数据库级别启用变更跟踪


    ```sql

    USE [master];

    ALTER DATABASE [YourDBName] SET CHANGE_TRACKING = ON

    (CHANGE_RETENTION = 2 DAYS, AUTO_CLEANUP = ON);

    ```


    ![图示](index-173_1.png)


    **注意**：Microsoft 建议任何启用了变更跟踪的数据库都应处于快照隔离级别。这确保了变更跟踪的一致性。更改隔离级别时需谨慎，因为它可能产生意想不到的后果。


    在数据库级别启用变更跟踪后，你必须为要跟踪的每个表启用它。图 10-5 展示了如何启用。你可以通过右键单击表并选择“属性”来访问此对话框。


    ***图 10-5.** 在表级别启用变更跟踪*


    ![图 10-5](index-174_1.png)


    **注意**：任何你想使用变更跟踪的表都需要有一个主键。


    你也可以通过 SQL 脚本启用变更跟踪，如清单 10-2 所示，确保将数据库和表名更改为你要使用的名称。


    ***清单 10-2.*** 通过脚本在表级别启用变更跟踪


    ```sql

    USE [YourDBName];

    ALTER TABLE [dbo].[YourTableName] ENABLE CHANGE_TRACKING

    WITH (TRACK_COLUMNS_UPDATED = OFF);

    ```


    **注意**：`TRACK_COLUMNS_UPDATED` 会使用额外的存储空间。因此，默认情况下它是禁用的。


    要查看变更跟踪数据，请执行清单 10-3 中的查询。


    ***清单 10-3.*** 查询变更跟踪数据


    ```sql

    USE YourDBName;

    SELECT CT.SYS_CHANGE_VERSION,

    CT.SYS_CHANGE_OPERATION, EM.*

    FROM CHANGETABLE

    (CHANGES [AuditData],0) as CT

    LEFT JOIN [dbo].[AuditData] EM

    ON CT.ID = EM.ID

    ORDER BY SYS_CHANGE_VERSION;

    ```


    清单 10-3 返回启用了变更跟踪的表的更改结果。这些结果显示在图 10-6 中。你的结果会有所不同。


    ***图 10-6.** 变更跟踪查询结果*'
  raw: 'Once the properties dialog box opens, click the Security page. Then check
    the Enable


    Common Criteria compliance box as shown in Figur[e 10-2.](#index_split_001.html#p170)


    ![](index-170_1.png)


    Chapter 10 additional SQl Server auditing and traCking MethodS


    ***Figure 10-2.** Checking Enable Common Criteria compliance box*


    When you click OK on the dialog box, you will receive a pop-up message warning


    you that you need to restart SQL Server as shown in Figure [10-3](#index_split_001.html#p171).


    ![](index-171_1.jpg)


    Chapter 10 additional SQl Server auditing and traCking MethodS


    ***Figure 10-3.** Pop-up warning that some configuration changes won’t take effect*


    *until SQL Server is restarted*


    Once you restart the SQL Server service, Common Criteria compliance will be


    enabled.


    **Change Tracking**


    Change tracking is a lightweight method to track DML changes. This is typically
    used


    by applications to query database changes. Change tracking has been optimized
    to


    minimize performance impacts, but there is overhead, so be careful implementing


    this, especially on tables with a lot of changes. Also, when the cleanup of change


    tracking occurs, it can cause locking and blocking. In other words, think carefully
    before


    enabling this.


    Before you can use change tracking, you need to enable it at the database level
    as


    shown in Figure [10-4\. Y](#index_split_001.html#p172)ou can access this dialog
    box by right-clicking on the database and choosing Properties. The Retention Period,
    Retention Period Units, and Auto


    Cleanup options are left as is with the default values.


    ![](index-172_1.jpg)


    Chapter 10 additional SQl Server auditing and traCking MethodS


    ***Figure 10-4.** Enabling change tracking at the database level*


    You can also enable change tracking with a SQL script as shown in Listing [10-1.](#index_split_001.html#p172)


    ***Listing 10-1.*** Enabling change tracking at the database level


    USE [master];


    ALTER DATABASE [YourDBName] SET CHANGE_TRACKING = ON


    (CHANGE_RETENTION = 2 DAYS, AUTO_CLEANUP = ON);


    ![](index-173_1.png)


    Chapter 10 additional SQl Server auditing and traCking MethodS


    **Note** Microsoft advises that any database with change tracking enabled should


    be in snapshot isolation level. this ensures change tracking is consistent. Be


    careful changing isolation levels because it can have unintended consequences.


    Once change tracking is enabled at the database level, you must enable it for
    each


    table you want to track. Figure [10-5 sho](#index_split_001.html#p173)ws you how
    to enable it. You can access this dialog box by right-clicking on the table and
    choosing Properties.


    ***Figure 10-5.** Enabling change tracking at the table level*


    ![](index-174_1.png)


    Chapter 10 additional SQl Server auditing and traCking MethodS


    **Note** You need a primary key on any table you want to use change tracking on.


    You can also enable change tracking with a SQL script as shown in Listing [10-2,](#index_split_001.html#p174)


    making sure to change the database and table name to match what you want to use.


    ***Listing 10-2.*** Enabling change tracking at the table level via script


    USE [YourDBName];


    ALTER TABLE [dbo].[YourTableName] ENABLE CHANGE_TRACKING


    WITH (TRACK_COLUMNS_UPDATED = OFF);


    **Note** track Columns updated uses additional storage. it’s disabled by default
    for


    this reason.


    To view the change tracking data, execute the query in Listin[g 10-3](#index_split_001.html#p174).


    ***Listing 10-3.*** Querying change tracking data


    USE YourDBName;


    SELECT CT.SYS_CHANGE_VERSION,


    CT.SYS_CHANGE_OPERATION, EM.*


    FROM CHANGETABLE


    (CHANGES [AuditData],0) as CT


    LEFT JOIN [dbo].[AuditData] EM


    ON CT.ID = EM.ID


    ORDER BY SYS_CHANGE_VERSION;


    Listin[g 10-3 r](#index_split_001.html#p174)eturns results of the changes to the
    table with change tracking enabled.


    Those results are shown in Figure [10-6](#index_split_001.html#p174). Your results
    will vary.


    ***Figure 10-6.** Change tracking query results*


    Chapter 10 additional SQl Server auditing and traCking MethodS'
  trans: '# 第 10 章：其他 SQL Server 审计与跟踪方法


    ## 更改跟踪


    一旦属性对话框打开，点击“安全”页面。然后勾选“启用公共标准合规性”复选框，如图 10-2 所示。


    ![图 10-2](img/index-170_1.png)


    ***图 10-2.** 勾选“启用公共标准合规性”复选框*


    当你在对话框上点击“确定”时，会收到一个弹出消息，警告你需要重启 SQL Server，如图 10-3 所示。


    ![图 10-3](img/index-171_1.jpg)


    ***图 10-3.** 弹出警告：某些配置更改直到 SQL Server 重启后才会生效*


    重启 SQL Server 服务后，公共标准合规性功能即被启用。


    **变更跟踪**


    变更跟踪是一种跟踪 DML 变更的轻量级方法。通常由应用程序用来查询数据库变更。变更跟踪已经过优化以最小化性能影响，但仍有开销，因此在实施时需谨慎，特别是在变更频繁的表上。此外，当变更跟踪清理发生时，可能会导致锁定和阻塞。换句话说，在启用前请仔细考虑。


    在使用变更跟踪之前，你需要在数据库级别启用它，如图 10-4 所示。你可以通过右键单击数据库并选择“属性”来访问此对话框。“保留期”、“保留期单位”和“自动清理”选项保留默认值即可。


    ![图 10-4](img/index-172_1.jpg)


    ***图 10-4.** 在数据库级别启用变更跟踪*


    你也可以通过 SQL 脚本启用变更跟踪，如清单 10-1 所示。


    ***清单 10-1.*** 在数据库级别启用变更跟踪


    ```sql

    USE [master];

    ALTER DATABASE [YourDBName] SET CHANGE_TRACKING = ON

    (CHANGE_RETENTION = 2 DAYS, AUTO_CLEANUP = ON);

    ```


    ![图示](img/index-173_1.png)


    **注意**：Microsoft 建议任何启用了变更跟踪的数据库都应处于快照隔离级别。这确保了变更跟踪的一致性。更改隔离级别时需谨慎，因为它可能产生意想不到的后果。


    在数据库级别启用变更跟踪后，你必须为要跟踪的每个表启用它。图 10-5 展示了如何启用。你可以通过右键单击表并选择“属性”来访问此对话框。


    ***图 10-5.** 在表级别启用变更跟踪*


    ![图 10-5](img/index-174_1.png)


    **注意**：任何你想使用变更跟踪的表都需要有一个主键。


    你也可以通过 SQL 脚本启用变更跟踪，如清单 10-2 所示，确保将数据库和表名更改为你要使用的名称。


    ***清单 10-2.*** 通过脚本在表级别启用变更跟踪


    ```sql

    USE [YourDBName];

    ALTER TABLE [dbo].[YourTableName] ENABLE CHANGE_TRACKING

    WITH (TRACK_COLUMNS_UPDATED = OFF);

    ```


    **注意**：`TRACK_COLUMNS_UPDATED` 会使用额外的存储空间。因此，默认情况下它是禁用的。


    要查看变更跟踪数据，请执行清单 10-3 中的查询。


    ***清单 10-3.*** 查询变更跟踪数据


