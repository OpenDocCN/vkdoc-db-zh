    ## 附录 A：数据库审计选项对比


    规范。更多信息，请查阅[第 4 章](https://doi.org/10.1007/978-1-4842-8634-0_4)“通过图形界面实施 SQL Server
    审计”和[第 5 章](https://doi.org/10.1007/978-1-4842-8634-0_5)“通过 SQL 脚本实施 SQL Server
    审计”。


    *   **扩展事件** – 捕获 `rpc_completed` 和 `sql_batch_completed`。此外，为您选定的每个事件在 `server_principal_name`
    上设置筛选器。更多信息，请查阅[第 7 章](https://doi.org/10.1007/978-1-4842-8634-0_7)“通过图形界面实施扩展事件”和[第
    8 章](https://doi.org/10.1007/978-1-4842-8634-0_8)“通过 SQL 脚本实施扩展事件”。

    *   **每个执行存储过程的人**


    ### SQL Server 审计

    这将需要一个审计和一个数据库审计规范，用于捕获对您存储过程的 `execute` 操作。更多信息，请查阅[第 4 章](https://doi.org/10.1007/978-1-4842-8634-0_4)“通过图形界面实施
    SQL Server 审计”和[第 5 章](https://doi.org/10.1007/978-1-4842-8634-0_5)“通过 SQL 脚本实施
    SQL Server 审计”。


    ### 扩展事件

    捕获 `rpc_completed`，并在 `object_name` 上设置筛选器。更多信息，请查阅[第 7 章](https://doi.org/10.1007/978-1-4842-8634-0_7)“通过图形界面实施扩展事件”和[第
    8 章](https://doi.org/10.1007/978-1-4842-8634-0_8)“通过 SQL 脚本实施扩展事件”。


    ## 附录 A：数据库审计选项对比


    *   **配置更改**


    ### SQL Server 审计

    这将需要一个审计和一个数据库审计规范，用于捕获对 `sp_configure` 的 `execute` 操作。更多信息，请查阅[第 9 章](https://doi.org/10.1007/978-1-4842-8634-0_9)“跟踪
    SQL Server 配置更改”。


    *   **DML 更改**


    ### SQL Server 审计

    如果您不需要跟踪实际的数据更改本身，而是 DML 语句本身。这将需要一个审计和一个数据库审计规范，用于在您想要审计的每个表上捕获 `INSERT`、`UPDATE`
    和/或 `DELETE` 操作。更多信息，请查阅[第 4 章](https://doi.org/10.1007/978-1-4842-8634-0_4)“通过图形界面实施
    SQL Server 审计”和[第 5 章](https://doi.org/10.1007/978-1-4842-8634-0_5)“通过 SQL 脚本实施
    SQL Server 审计”。


    ### 更改跟踪

    如果应用程序需要跟踪数据是否更改，而不是数据的确切值。更多信息，请查阅[第 10 章](https://doi.org/10.1007/978-1-4842-8634-0_10)“其他
    SQL Server 审计和跟踪方法”。


    ### 变更数据捕获

    如果您需要跟踪数据更改前后的确切值。更多信息，请查阅[第 10 章](https://doi.org/10.1007/978-1-4842-8634-0_10)“其他
    SQL Server 审计和跟踪方法”。


    *   **成功和失败的登录**


    ### SQL Server 审计

    您将需要一个审计来存储审计数据，以及一个服务器审计规范来收集登录信息。更多信息，请查阅[第 10 章](https://doi.org/10.1007/978-1-4842-8634-0_10)“其他
    SQL Server 审计和跟踪方法”。


    ### 扩展事件

    您将需要创建一个使用 `login` 事件和 `error_reported` 事件的会话。更多信息，请查阅[第 10 章](https://doi.org/10.1007/978-1-4842-8634-0_10)“其他
    SQL Server 审计和跟踪方法”。


    ## 附录 A：数据库审计选项对比


    *   **审计 Azure SQL 数据库**


    ### 通过 Azure 门户审计 Azure SQL 数据库

    这与 SQL Server 审计类似。它使得在 Log Analytics 工作区中集中审计数据变得容易。更多信息，请查阅[第 13 章](https://doi.org/10.1007/978-1-4842-8634-0_13)“审计
    Azure SQL 数据库”。


    ### 扩展事件

    这与 SQL Server 中的扩展事件类似。唯一的问题是，很难遍历多个 `.xel` 文件来一次性查询所有 XEvent 数据。更多信息，请查阅[第 13
    章](https://doi.org/10.1007/978-1-4842-8634-0_13)“审计 Azure SQL 数据库”。


    *   **审计 Azure SQL 托管实例**

