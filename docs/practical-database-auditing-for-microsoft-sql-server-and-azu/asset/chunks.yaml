    ## Chapter 4 Implementing SQL Server Audit via the GUI


    *   **Audit destination**


    *   **File** – I always write to the file choice because it’s easiest for me.
    I don’t have a lot of auditing restrictions. Yes, the auditors want to know what
    happened, but they don’t think that we’re going in there secretly deleting audit
    files and not reporting on audit data.


    *   **Application log** – I could see storing audit data in the application log
    if you have a log scraping application like `Splunk` that reads all the logs and
    gathers them in a central repository.


    *   **Security log** – This has more restrictions than writing to the application
    log, but the same concept applies. This is the most secure option for storing
    audit data because it’s the least likely to have anyone tamper with it.


    *   **Path** – If you chose `File` for `Audit Destination`, you need to choose
    a path. Make sure don’t put audit files on the `C drive`. Even though we’re going
    to limit the audit file sizes in the next steps, you don’t want it accidentally
    filling up the `C drive`. I don’t recommend putting audit files on data drives
    or log drives either. We have an `E drive` for applications where I work; that’s
    a great place for audit files to go.


    *   **Maximum files** – 4


    *   **Maximum file size** – 50 MB


    I never let the audit collect unlimited files and unlimited file sizes. This makes
    it difficult to query them. I’ve found 4 files of 50 MB each is good for my needs
    when collecting permissions and schema changes. Your number and sizing of files
    depend on your needs.


    *   **Reserve disk space** – Since my files are quite small, I never check that.


    `Caution` don’t set `SQL Server audit` to collect unlimited files or allow unlimited
    file sizes. they will be gigantic and next to impossible to query.


