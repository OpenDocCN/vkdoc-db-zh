- fmt: "图10-6显示插入了一行，由`SYS_CHANGE_OPERATION = I`标明。\n\n它也显示删除了一行，由`SYS_CHANGE_OPERATION\
    \ = D`标明。\n\n**提示** 关于变更跟踪的更多信息，请访问[https://docs.microsoft.com/en-us/sql/relational-databases/track-changes/work-with-change-tracking-sql-server?view=sql-server-ver15](https://docs.microsoft.com/en-us/sql/relational-databases/track-changes/work-with-change-tracking-sql-server?view=sql-server-ver15)。\n\
    \n变更跟踪无法让你查看数据被更改的次数或每次更改的值。如果你需要确切知道做了哪些更改以及更改发生的频率，那么你需要使用变更数据捕获。\n\n**提示**\
    \ 关于变更跟踪和变更数据捕获的比较，请访问[https://docs.microsoft.com/en-us/sql/relational-databases/track-changes/track-data-changes-sql-server?view=sql-server-ver15#feature-differences-between-change-data-capture-and-change-tracking](https://docs.microsoft.com/en-us/sql/relational-databases/track-changes/track-data-changes-sql-server?view=sql-server-ver15#feature-differences-between-change-data-capture-and-change-tracking)。\n\
    \n**变更数据捕获**\n\n变更数据捕获（CDC）使用SQL Server Agent来跟踪对表进行的DML更改。这使你可以查看对数据所做的更改，其细节以一种易于使用的格式呈现。这对于提取、转换和加载（ETL）应用程序或过程特别有用。\n\
    \nCDC已经过优化以最小化性能影响，但仍存在开销，因此在实施时需谨慎，尤其是在更改频繁的表上。换句话说，在启用前要仔细考虑。它还会占用数据库中的存储空间，因此你需要仔细跟踪存储使用情况。\n\
    \n要确定数据库上是否启用了CDC，请执行清单10-4中的查询。\n\n***清单10-4.*** 确定CDC是否已启用\n\n```sql\nSELECT\
    \ name, is_cdc_enabled\nFROM sys.databases;\n```\n\n如果已启用，你会看到`is_cdc_enabled\
    \ = 1`；否则为0。\n\n**注意** CDC需要独占使用`cdc`架构和用户，因为它们是CDC进程的一部分。CDC还需要使用SQL Agent，请确保该服务正在运行，并且Agent已启用并启动。\n\
    \n要启用CDC，请执行清单10-5中的查询，确保使用你希望在其上启用CDC的数据库名称。\n\n***清单10-5.*** 在数据库级别启用CDC\n\n\
    ```sql\nUSE YourDBName;\nEXEC sys.sp_cdc_enable_db;\n```\n\n在数据库上启用CDC后，你可以使用清单10-6中的查询在表上启用它。\n\
    \n***清单10-6.*** 在表级别启用CDC\n\n```sql\nUSE [YourDBName];\nEXEC sys.sp_cdc_enable_table\n\
    \    @source_schema = N'dbo',\n    @source_name = N'YourTableName',\n    @role_name\
    \ = NULL,\n    @filegroup_name = NULL,\n    @supports_net_changes = 0;\n```\n\n\
    要确定表上是否启用了CDC，请执行清单10-7中的查询。\n\n***清单10-7.*** 确定哪些表上启用了CDC"
  raw: 'Figur[e 10-6 sho](#index_split_001.html#p174)ws one row was inserted as noted
    by SYS_CHANGE_OPERATION = I.


    It also shows that one row was deleted as noted by SYS_CHANGE_OPERATION = D.


    **Tip** For more information on change tracking, [visit https://docs.](https://docs.microsoft.com/en-us/sql/relational-databases/track-changes/work-with-change-tracking-sql-server?view=sql-server-ver15)


    [microsoft.com/en- us/sql/relational- databases/track- changes/](https://docs.microsoft.com/en-us/sql/relational-databases/track-changes/work-with-change-tracking-sql-server?view=sql-server-ver15)


    [work- with- change- tracking- sql- server?view=sql- server- ver15](https://docs.microsoft.com/en-us/sql/relational-databases/track-changes/work-with-change-tracking-sql-server?view=sql-server-ver15)


    Change tracking doesn’t allow you to see how many times it’s changed or the values


    of each change. If you need to know the exact changes made and how often they
    were


    made, then you need to use change data capture.


    **Tip** For a comparison of change tracking and change data capture, visit


    [https://docs.microsoft.com/en- us/sql/relational- databases/](https://docs.microsoft.com/en-us/sql/relational-databases/track-changes/track-data-changes-sql-server?view=sql-server-ver15#feature-differences-between-change-data-capture-and-change-tracking)


    [track- changes/track- data- changes- sql- server?view=sql- server-](https://docs.microsoft.com/en-us/sql/relational-databases/track-changes/track-data-changes-sql-server?view=sql-server-ver15#feature-differences-between-change-data-capture-and-change-tracking)


    [ver15#feature- differences- between- change- data- capture- and-](https://docs.microsoft.com/en-us/sql/relational-databases/track-changes/track-data-changes-sql-server?view=sql-server-ver15#feature-differences-between-change-data-capture-and-change-tracking)


    [change- tracking](https://docs.microsoft.com/en-us/sql/relational-databases/track-changes/track-data-changes-sql-server?view=sql-server-ver15#feature-differences-between-change-data-capture-and-change-tracking)


    **Change Data Capture**


    Change data capture (CDC) uses the SQL Server Agent to track DML changes made
    to


    a table. This allows you to see the changes made to data, the details of which
    are in a


    format that is easily consumed. This can be particularly useful to extract, transform,
    and


    load (ETL) applications or processes.


    CDC has been optimized to minimize performance impacts, but there is overhead,


    so be careful implementing this, especially on tables with a lot of changes. In
    other


    words, think carefully before turning this on. It will also take up storage in
    the database,


    so you need to track storage usage carefully.


    To determine if you have CDC enabled on a database, execute the query in Listing
    [10-4.](#index_split_002.html#p175)


    ***Listing 10-4.*** Determining if CDC is enabled


    SELECT name, is_cdc_enabled


    FROM sys.databases;


    Chapter 10 additional SQl Server auditing and traCking MethodS


    If it’s enabled, you will see is_cdc_enabled = 1; if not, it will be 0.


    **Note** CdC requires exclusive use of the cdc schema and user because they are


    used as part of the CdC processes. CdC also requires use of the SQl agent, so


    make sure that service is running and the agent is enabled and started.


    To enable CDC, execute the query in Listin[g 10-5, m](#index_split_002.html#p176)aking
    sure to use the database name you want to enable CDC on.


    ***Listing 10-5.*** Enabling CDC at the database level


    USE YourDBName;


    EXEC sys.sp_cdc_enable_db;


    After you enable CDC on the database, you can enable it on a table with the query
    in


    Listin[g 10-6.](#index_split_002.html#p176)


    ***Listing 10-6.*** Enabling CDC at the table level


    USE [YourDBName];


    EXEC sys.sp_cdc_enable_table


    @source_schema = N''dbo'',


    @source_name = N''YourTableName'',


    @role_name = NULL,


    @filegroup_name = NULL,


    @supports_net_changes = 0;


    To determine if you have CDC enabled on a table, execute the query in Listing
    [10-7](#index_split_002.html#p176).


    ***Listing 10-7.*** Determining if CDC is enabled on any tables'
