    row filter option ''all update old'' is specified. To set this, you need to


    specify N''all update old’ instead of N''all'' in Listing [10-8.](#index_split_002.html#p178)


    • **4** – Update, but only includes the column values after the update.


    **Tip** to get more information on cdc.fn_cdc_get_all_changes, [visit https://](https://docs.microsoft.com/en-us/sql/relational-databases/system-functions/cdc-fn-cdc-get-all-changes-capture-instance-transact-sql?view=sql-server-ver15)


    [docs.microsoft.com/en- us/sql/relational- databases/system-](https://docs.microsoft.com/en-us/sql/relational-databases/system-functions/cdc-fn-cdc-get-all-changes-capture-instance-transact-sql?view=sql-server-ver15)


    [functions/cdc- fn- cdc- get- all- changes- capture- instance-](https://docs.microsoft.com/en-us/sql/relational-databases/system-functions/cdc-fn-cdc-get-all-changes-capture-instance-transact-sql?view=sql-server-ver15)


    [transact- sql?view=sql- server- ver15](https://docs.microsoft.com/en-us/sql/relational-databases/system-functions/cdc-fn-cdc-get-all-changes-capture-instance-transact-sql?view=sql-server-ver15)


    **Temporal Tables**


    This built-in database feature allows you to see data stored in the table at any
    point in


    time. It’s a system-versioned table that keeps a full history of data changes.
    The validity


    of each row is managed by the system, which is the database engine. The versioning


    is implemented as a pair of tables, current and history. Each of these tables
    has two


    datetime2 type columns to define the period of validity for each row. They are
    called the


    PERIOD columns. The current table contains the current value for each row. The
    history


    table contains each previous value for each row and the start time and end time
    for


    which it was valid.


    ![](index-180_1.png)


    Chapter 10 additional SQl Server auditing and traCking MethodS


    **Creating a Temporal Table**


    To create a temporal table with a default history table, use the script in Listin[g
    10-9](#index_split_002.html#p180).


    ***Listing 10-9.*** Creating a temporal table with a default history table


    CREATE TABLE dbo.AuditChangesTemporal


    (


    AuditID INT NOT NULL PRIMARY KEY CLUSTERED IDENTITY(1,1),


    [event_time] [datetime2](7) NOT NULL,


    [statement] [nvarchar](4000) NULL,


    ValidFrom DATETIME2 GENERATED ALWAYS AS ROW START NOT NULL,


    ValidTo DATETIME2 GENERATED ALWAYS AS ROW END NOT NULL,


    PERIOD FOR SYSTEM_TIME (ValidFrom, ValidTo)


    )


    WITH (SYSTEM_VERSIONING = ON (HISTORY_TABLE = dbo.


    AuditChangesTemporalHistory));


    The script in Listin[g 10-9](#index_split_002.html#p180) will create a temporal
    table, and the history table is accessible from under the table, as shown in Figure
    [10-8.](#index_split_002.html#p180)


    ***Figure 10-8.** Temporal table with its history table*


    Chapter 10 additional SQl Server auditing and traCking MethodS


    **Modifying Data in a Temporal Table**


    If you don’t hide the PERIOD columns, ValidTo and ValidFrom, you will need to
    account


    for them when modifying data. You can do this by specifying only the columns you
    want


    to INSERT into as shown in Listing [10-10\. T](#index_split_002.html#p181)his
    will set default values for ValidTo and ValidFrom for you.


    ***Listing 10-10.*** Inserting into a temporal table


    INSERT INTO Auditing.dbo.AuditChangesTemporal


    (event_time, statement)


    SELECT DATEADD(mi, DATEPART(TZ, SYSDATETIMEOFFSET()), event_time) as event_


    time, statement


    FROM sys.fn_get_audit_file (''e:\sqlaudit\*.sqlaudit'',default,default) af


    WHERE DATEADD(mi, DATEPART(TZ, SYSDATETIMEOFFSET()), event_time) >


    DATEADD(HOUR, -4, GETDATE());


    If you do hide the PERIOD columns, ValidTo and ValidFrom, you won’t need to


    account for them when modifying data. In other words, you can INSERT without having


    to specify columns.


    **Note** there are more rules around modifying data in temporal tables, such as
    for


    update and delete. For more information on modifying data in a temporal table,


    [visit https://docs.microsoft.com/en- us/sql/relational- databases/](https://docs.microsoft.com/en-us/sql/relational-databases/tables/modifying-data-in-a-system-versioned-temporal-table?view=sql-server-ver16)


    [tables/modifying- data- in- a- system- versioned- temporal-](https://docs.microsoft.com/en-us/sql/relational-databases/tables/modifying-data-in-a-system-versioned-temporal-table?view=sql-server-ver16)


    [table?view=sql- server- ver16](https://docs.microsoft.com/en-us/sql/relational-databases/tables/modifying-data-in-a-system-versioned-temporal-table?view=sql-server-ver16)


    ![](index-182_1.png)


    Chapter 10 additional SQl Server auditing and traCking MethodS


    **Querying a Temporal Table**


    When you want the current data in a temporal table, you can query it the same
    way as


    any other table as shown in Figure [10-9.](#index_split_002.html#p182)


    ***Figure 10-9.** Querying current data in temporal table*


    If you want to query historical data, you will need to specify FOR SYSTEM_TIME
    AS


    OF, as shown in Listin[g 10-11](#index_split_002.html#p182).


    ***Listing 10-11.*** Inserting into a temporal table


    SELECT TOP (10) *


    FROM [Auditing].[dbo].[AuditChangesTemporal]


    FOR SYSTEM_TIME AS OF ''2022-06-01 T10:00:00.7230011'';


    Nothing may return from that table based on whether there is actually something
    in


    the historical data for that SYSTEM_TIME.


    **Note** For more information about temporal tables, visit [https://docs.](https://docs.microsoft.com/en-us/sql/relational-databases/tables/getting-started-with-system-versioned-temporal-tables?view=sql-server-ver16)


    [microsoft.com/en- us/sql/relational- databases/tables/getting-](https://docs.microsoft.com/en-us/sql/relational-databases/tables/getting-started-with-system-versioned-temporal-tables?view=sql-server-ver16)


    [started- with- system- versioned- temporal- tables?view=sql-](https://docs.microsoft.com/en-us/sql/relational-databases/tables/getting-started-with-system-versioned-temporal-tables?view=sql-server-ver16)


    [server- ver16](https://docs.microsoft.com/en-us/sql/relational-databases/tables/getting-started-with-system-versioned-temporal-tables?view=sql-server-ver16)


    ![](index-183_1.png)


    ![](index-183_2.png)


    Chapter 10 additional SQl Server auditing and traCking MethodS


    **Successful and Failed Logins**


    One way to audit successful and/or failed logins is by enabling the login auditing
    in


    SSMS, which will write to the SQL Server Log. You can enable this in SSMS by right-


    clicking on the server connection and choosing properties. Then click on the Security


    page, as shown in Figur[e 10-10](#index_split_002.html#p183).


    ***Figure 10-10.** Login auditing configuration*


    Only failed logins are being captured on this server. If you change this setting,
    you


    will need to restart SQL Server. Figure [10-11](#index_split_002.html#p183) shows
    you what a failed login message will look like in the log.


    ***Figure 10-11.** Failed login in the SQL Server Log*


    You can also query the log if you want to extract records from it, which was covered'
  trans: "\n# 第 10 章：其他 SQL Server 审计与跟踪方法\n\n## 清单 10-8. 查询 CDC 数据\n\n```sql\nUSE\
    \ YourDBName;\n\nDECLARE @from_lsn binary(10), @to_lsn binary(10);\n\nSET @from_lsn\
    \ = sys.fn_cdc_get_min_lsn('dbo_YourTableName');\n\nSET @to_lsn = sys.fn_cdc_get_max_lsn();\n\
    \nSELECT *\n\nFROM cdc.fn_cdc_get_all_changes_dbo_AuditData\n\n(@from_lsn, @to_lsn,\
    \ N'all');\n```\n\n**注意：** CDC 要捕获数据，需要启用并启动 SQL Server 代理。\n\n查询结果会根据表上发生的变化而有所不同。图\
    \ 10-7 展示了结果可能的样子。\n\n![CDC 查询结果](img/index-179_1.png)\n\n### 图 10-7. CDC 查询结果\n\
    \n`__$operation` 列的值含义如下：\n\n*   **1** – 删除。\n*   **2** – 插入。\n*   **3** – 更新。这将返回旧值。仅当指定了行过滤选项\
    \ `'all update old'` 时有效。要设置此选项，你需要在清单 10-8 中指定 `N'all update old'` 而不是 `N'all'`。\n\
    *   **4** – 更新，但仅包含更新后的列值。\n\n**提示：** 要获取关于 `cdc.fn_cdc_get_all_changes` 函数的更多信息，请访问\
    \ [`https://docs.microsoft.com/en-us/sql/relational-databases/system-functions/cdc-fn-cdc-get-all-changes-capture-instance-transact-sql?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/relational-databases/system-functions/cdc-fn-cdc-get-all-changes-capture-instance-transact-sql?view=sql-server-ver15)。\n\
    \n## 时态表\n\n此内置数据库功能允许你查看表中任何时间点存储的数据。它是一个系统版本控制表，保存了数据变更的完整历史。每一行的有效性由系统（即数据库引擎）管理。版本控制通过一对表（当前表和历史表）实现。每个表都有两个\
    \ `datetime2` 类型的列，用于定义每行的有效期。它们被称为期间列（PERIOD columns）。当前表包含每行的当前值。历史表包含每行的每个先前值及其有效的开始时间和结束时间。\n\
    \n### 创建时态表\n\n要创建带有默认历史表的时态表，请使用清单 10-9 中的脚本。\n\n#### 清单 10-9. 创建带有默认历史表的时态表\n\
    \n```sql\nCREATE TABLE dbo.AuditChangesTemporal\n(\n    AuditID INT NOT NULL PRIMARY\
    \ KEY CLUSTERED IDENTITY(1,1),\n    [event_time] datetime2 NOT NULL,\n    [statement]\
    \ nvarchar NULL,\n    ValidFrom DATETIME2 GENERATED ALWAYS AS ROW START NOT NULL,\n\
    \    ValidTo DATETIME2 GENERATED ALWAYS AS ROW END NOT NULL,\n    PERIOD FOR SYSTEM_TIME\
    \ (ValidFrom, ValidTo)\n)\nWITH (SYSTEM_VERSIONING = ON (HISTORY_TABLE = dbo.AuditChangesTemporalHistory));\n\
    ```\n\n清单 10-9 中的脚本将创建一个时态表，其历史表可以从该表下访问，如图 10-8 所示。\n\n![带有历史表的时态表](img/index-180_1.png)\n\
    \n#### 图 10-8. 带有历史表的时态表\n\n### 修改时态表中的数据\n\n如果你不隐藏期间列 `ValidTo` 和 `ValidFrom`，那么在修改数据时需要考虑它们。你可以通过仅指定要\
    \ `INSERT` 的列来做到这一点，如清单 10-10 所示。这将为你设置 `ValidTo` 和 `ValidFrom` 的默认值。\n\n####\
    \ 清单 10-10. 向时态表中插入数据\n\n```sql\nINSERT INTO Auditing.dbo.AuditChangesTemporal\n\
    \    (event_time, statement)\nSELECT DATEADD(mi, DATEPART(TZ, SYSDATETIMEOFFSET()),\
    \ event_time) as event_time, statement\nFROM sys.fn_get_audit_file ('e:\\sqlaudit\\\
    *.sqlaudit',default,default) af\nWHERE DATEADD(mi, DATEPART(TZ, SYSDATETIMEOFFSET()),\
    \ event_time) > DATEADD(HOUR, -4, GETDATE());\n```\n\n如果你隐藏了期间列 `ValidTo` 和 `ValidFrom`，那么在修改数据时就不需要考虑它们。换句话说，你可以在不必指定列的情况下进行\
    \ `INSERT`。\n\n**注意：** 修改时态表中的数据还有更多规则，例如更新和删除操作。有关在时态表中修改数据的更多信息，请访问 [`https://docs.microsoft.com/en-us/sql/relational-databases/tables/modifying-data-in-a-system-versioned-temporal-table?view=sql-server-ver16`](https://docs.microsoft.com/en-us/sql/relational-databases/tables/modifying-data-in-a-system-versioned-temporal-table?view=sql-server-ver16)。\n\
    \n### 查询时态表\n\n当你想要获取时态表中的当前数据时，可以像查询任何其他表一样查询它，如图 10-9 所示。\n\n![查询时态表中的当前数据](img/index-182_1.png)\n\
    \n#### 图 10-9. 查询时态表中的当前数据\n\n如果你想查询历史数据，则需要指定 `FOR SYSTEM_TIME AS OF` 子句，如清单\
    \ 10-11 所示。\n\n#### 清单 10-11. 查询时态表的历史数据\n\n```sql\nSELECT TOP (10) *\nFROM [Auditing].[dbo].[AuditChangesTemporal]\n\
    FOR SYSTEM_TIME AS OF '2022-06-01 T10:00:00.7230011';\n```\n\n根据该 `SYSTEM_TIME`\
    \ 的历史数据中是否确实存在内容，此查询可能不返回任何行。\n\n**注意：** 有关时态表的更多信息，请访问 [`https://docs.microsoft.com/en-us/sql/relational-databases/tables/getting-started-with-system-versioned-temporal-tables?view=sql-server-ver16`](https://docs.microsoft.com/en-us/sql/relational-databases/tables/getting-started-with-system-versioned-temporal-tables?view=sql-server-ver16)。\n\
    \n![时态表示例 1](img/index-183_1.png)\n\n![时态表示例 2](img/index-183_2.png)\n\n## 成功与失败的登录\n\
    \n审计成功和/或失败登录的一种方法是在 SSMS 中启用登录审计，这将把信息写入 SQL Server 日志。你可以在 SSMS 中右键单击服务器连接并选择“属性”，然后点击“安全性”页面来启用此功能，如图\
    \ 10-10 所示。\n\n![登录审计配置](img/index-183_1.png)\n\n#### 图 10-10. 登录审计配置\n\n此服务器仅捕获失败的登录。如果更改此设置，你需要重启\
    \ SQL Server。图 10-11 展示了日志中失败登录消息的样子。\n\n![SQL Server 日志中的失败登录](img/index-183_2.png)\n\
    \n#### 图 10-11. SQL Server 日志中的失败登录\n\n你也可以查询日志以提取其中的记录，这将在下文涵盖...\n"
- fmt: "# Chapter 10 Additional SQL Server Auditing and Tracking Methods\n\n## SQL\
    \ Server Audit for Successful and Failed Login Auditing\n\n在第 9 章 “Tracking SQL\
    \ Server Configuration Changes” 中有所涉及。然而，日志并不是跟踪登录的最佳方式。跟踪成功和失败登录的更好方法是使用 SQL\
    \ Server Audit 或扩展事件。\n\nSQL Server Audit（在第 3 章 “What Is SQL Server Audit?” 到第\
    \ 5 章 “Implementing SQL Server Audit via SQL Scripts” 中有更详细的介绍）允许你审计成功和失败的登录。你需要一个审计（Audit）来存储审计数据，以及一个服务器审计规范（Server\
    \ Audit Specification）来收集登录信息。服务器审计规范如清单 [10-12](#index_split_002.html#p184) 所示。\n\
    \n***Listing 10-12.*** 用于捕获成功和失败登录的服务器审计规范\n\n```sql\nUSE [master];\n\nCREATE\
    \ SERVER AUDIT SPECIFICATION [ServerAuditSpecification]\nFOR SERVER AUDIT [AuditSpecification]\n\
    ADD (FAILED_LOGIN_GROUP),\nADD (SUCCESSFUL_LOGIN_GROUP)\nWITH (STATE = ON);\n\
    ```\n\n你可以使用清单 [10-13](#index_split_002.html#p184) 中的查询来查看你的审计结果。\n\n***Listing\
    \ 10-13.*** 查看审计结果的查询\n\n```sql\nUSE master;\nSELECT\n    event_time,\n    aa.name\
    \ as audit_action,\n    server_instance_name,\n    server_principal_name,\n  \
    \  client_ip,\n    application_name,\n    host_name\nFROM sys.fn_get_audit_file\
    \ ('E:\\audits\\*.sqlaudit',default,default) af\nINNER JOIN sys.dm_audit_actions\
    \ aa\n    ON aa.action_id = af.action_id\nWHERE event_time > DATEADD(HOUR, -4,\
    \ GETDATE())\nORDER BY event_time DESC;\n```\n\n在发生一些成功和失败的登录后，你的审计结果将类似于图 [10-12](#index_split_002.html#p185)。\n\
    \n![](index-185_1.png)\n\n***Figure 10-12.*** SQL Server Audit 成功和失败登录结果\n\n你只会看到有关登录来源的信息，例如\
    \ `client_ip` 和 `hostname`，但这些信息仅在较新版本的 SQL Server 中可用。然而，确定登录来源是审计的重要组成部分。如果你使用的\
    \ SQL Server 版本低于 2016 SP1，你可能需要考虑改用扩展事件。\n\n## Extended Events for Successful\
    \ and Failed Login Auditing\n\n扩展事件（在第 6 章 “What Is Extended Events?” 到第 8 章 “Implementing\
    \ Extended Events via SQL Scripts” 中有更详细的介绍）同样允许你审计成功和失败的登录。扩展事件的好处是，无论你使用哪个版本的\
    \ SQL Server，你都可以获取客户端主机名。\n\n你需要创建一个使用 `login` 事件和 `error_reported` 事件的会话，如清单\
    \ [10-14](#index_split_002.html#p185) 所示。\n\n***Listing 10-14.*** 创建扩展事件以捕获成功和失败登录\n\
    \n```sql\nCREATE EVENT SESSION [AuditLogins] ON SERVER\nADD EVENT sqlserver.error_reported(\n\
    \    ACTION(sqlserver.client_app_name,\n           sqlserver.client_hostname,\n\
    \           sqlserver.server_principal_name)\n    WHERE ((([severity]=(14))\n\
    \        AND ([error_number]=(18456)))\n        AND ([state]>(1)))),\nADD EVENT\
    \ sqlserver.login(\n    ACTION(sqlserver.client_app_name,\n           sqlserver.client_hostname,\n\
    \           sqlserver.server_principal_name))\nADD TARGET package0.event_file(\n\
    \    SET filename=N'E:\\audits\\AuditLogins.xel',\n        max_file_size=(10),\n\
    \        max_rollover_files=(10))\nWITH (STARTUP_STATE=ON);\n\nALTER EVENT SESSION\
    \ [AuditLogins] ON SERVER\nSTATE=START;\n```\n\n在发生一些成功和失败的登录后，你可以执行清单 [10-15](#index_split_002.html#p186)\
    \ 中的查询来查询你的扩展事件。\n\n***Listing 10-15.*** 查询你的扩展事件\n\n```sql\nSELECT\n    n.value('(@timestamp)[1]',\
    \ 'datetime') as timestamp,\n    n.value('(@name)[1]', 'nvarchar(15)') as name,\n\
    \    n.value('(action[@name=\"client_hostname\"]/value)[1]',\n             'nvarchar(50)')\
    \ as [client_hostname],\n    n.value('(action[@name=\"server_principal_name\"\
    ]/value)[1]',\n```"
  raw: 'in Chapter [9](https://doi.org/10.1007/978-1-4842-8634-0_9), “Tracking SQL
    Server Configuration Changes.” The log isn’t the best way to track logins, though.
    A better way to track successful and failed logins is with either SQL


    Server Audit or extended events.


    Chapter 10 additional SQl Server auditing and traCking MethodS


    **SQL Server Audit for Successful and Failed Login Auditing**


    SQL Server Audit, covered in more detail in Chapter [3](https://doi.org/10.1007/978-1-4842-8634-0_3),
    “What Is SQL Server Audit?”, through Chapt[er 5](https://doi.org/10.1007/978-1-4842-8634-0_5),
    “Implementing SQL Server Audit via SQL Scripts,” allows you to audit successful
    and failed logins. You will need an audit to store the audit data and a server


    audit specification to collect the login information. The server audit specification
    is


    shown in Listing [10-12.](#index_split_002.html#p184)


    ***Listing 10-12.*** Server audit specification to capture successful and failed
    logins


    USE [master];


    CREATE SERVER AUDIT SPECIFICATION [ServerAuditSpecification]


    FOR SERVER AUDIT [AuditSpecification]


    ADD (FAILED_LOGIN_GROUP),


    ADD (SUCCESSFUL_LOGIN_GROUP)


    WITH (STATE = ON);


    You can query your audit with the query in Listing [10-13.](#index_split_002.html#p184)


    ***Listing 10-13.*** Query to see audit results


    USE master;


    SELECT


    event_time,


    aa.name as audit_action,


    server_instance_name,


    server_principal_name,


    client_ip,


    application_name,


    host_name


    FROM sys.fn_get_audit_file (''E:\audits\*.sqlaudit'',default,default) af


    INNER JOIN sys.dm_audit_actions aa


    ON aa.action_id = af.action_id


    WHERE event_time > DATEADD(HOUR, -4, GETDATE())


    ORDER BY event_time DESC;


    After having some logins fail and succeed, your audit results will look something
    like


    Figur[e 10-12](#index_split_002.html#p185).


    ![](index-185_1.png)


    Chapter 10 additional SQl Server auditing and traCking MethodS


    ***Figure 10-12.** SQL Server Audit successful and failed login results*


    You will see information about where the login came from such as client_ip and


    hostname only in more recent versions of SQL Server. Determining where a login
    came


    from is an important part of auditing, though. If you are on a SQL Server version
    older


    than 2016 SP1, you may want to consider using extended events instead.


    **Extended Events for Successful and Failed Login Auditing**


    Extended events, covered in more detail in Chapt[er 6](https://doi.org/10.1007/978-1-4842-8634-0_6),
    “What Is Extended Events?”, through Chapt[er 8](https://doi.org/10.1007/978-1-4842-8634-0_8),
    “Implementing Extended Events via SQL Scripts,” allows you to audit successful
    and failed logins, as well. The good thing about extended events is that no


    matter what version of SQL Server you are on, you can get the client hostname.


    You will need to create a session that uses the login event and the error_reported


    event as shown in Listin[g 10-14](#index_split_002.html#p185).


    ***Listing 10-14.*** Create an extended event to capture successful and failed
    logins


    CREATE EVENT SESSION [AuditLogins] ON SERVER


    ADD EVENT sqlserver.error_reported(


    ACTION(sqlserver.client_app_name,


    sqlserver.client_hostname,


    sqlserver.server_principal_name)


    WHERE ((([severity]=(14))


    AND ([error_number]=(18456)))


    AND ([state]>(1)))),


    Chapter 10 additional SQl Server auditing and traCking MethodS


    ADD EVENT sqlserver.login(


    ACTION(sqlserver.client_app_name,


    sqlserver.client_hostname,


    sqlserver.server_principal_name))


    ADD TARGET package0.event_file(


    SET filename=N''E:\audits\AuditLogins.xel'',


    max_file_size=(10),


    max_rollover_files=(10))


    WITH (STARTUP_STATE=ON);


    ALTER EVENT SESSION [AuditLogins] ON SERVER


    STATE=START;


    After having some logins fail and succeed, you can execute the query in Listing
    [10-15](#index_split_002.html#p186)


    to query your extended event.


    ***Listing 10-15.*** Query your extended event


    SELECT n.value(''(@timestamp)[1]'', ''datetime'') as timestamp,


    n.value(''(@name)[1]'', ''nvarchar(15)'') as name,


    n.value(''(action[@name="client_hostname"]/value)[1]'',


    ''nvarchar(50)'') as [client_hostname],


    n.value(''(action[@name="server_principal_name"]/value)[1]'','
  trans: "\n# 第 10 章 附加的 SQL Server 审计与跟踪方法\n\n## 用于成功和失败登录审计的 SQL Server 审计\n\n在第\
    \ 9 章“跟踪 SQL Server 配置更改”中有所涉及。然而，日志并不是跟踪登录的最佳方式。跟踪成功和失败登录的更好方法是使用 SQL Server\
    \ 审计或扩展事件。\n\nSQL Server 审计（在第 3 章“什么是 SQL Server 审计？”到第 5 章“通过 SQL 脚本实现 SQL Server\
    \ 审计”中有更详细的介绍）允许你审计成功和失败的登录。你需要一个审计来存储审计数据，以及一个服务器审计规范来收集登录信息。服务器审计规范如清单 10-12\
    \ 所示。\n\n***清单 10-12.*** 用于捕获成功和失败登录的服务器审计规范\n\n```sql\nUSE [master];\n\nCREATE\
    \ SERVER AUDIT SPECIFICATION [ServerAuditSpecification]\nFOR SERVER AUDIT [AuditSpecification]\n\
    ADD (FAILED_LOGIN_GROUP),\nADD (SUCCESSFUL_LOGIN_GROUP)\nWITH (STATE = ON);\n\
    ```\n\n你可以使用清单 10-13 中的查询来查看你的审计结果。\n\n***清单 10-13.*** 查看审计结果的查询\n\n```sql\nUSE\
    \ master;\nSELECT\n    event_time,\n    aa.name as audit_action,\n    server_instance_name,\n\
    \    server_principal_name,\n    client_ip,\n    application_name,\n    host_name\n\
    FROM sys.fn_get_audit_file ('E:\\audits\\*.sqlaudit',default,default) af\nINNER\
    \ JOIN sys.dm_audit_actions aa\n    ON aa.action_id = af.action_id\nWHERE event_time\
    \ > DATEADD(HOUR, -4, GETDATE())\nORDER BY event_time DESC;\n```\n\n在发生一些成功和失败的登录后，你的审计结果将类似于图\
    \ 10-12。\n\n![](img/index-185_1.png)\n\n***图 10-12.*** SQL Server 审计成功和失败登录结果\n\
    \n你只会看到有关登录来源的信息，例如 `client_ip` 和 `hostname`，但这些信息仅在较新版本的 SQL Server 中可用。然而，确定登录来源是审计的重要组成部分。如果你使用的\
    \ SQL Server 版本低于 2016 SP1，你可能需要考虑改用扩展事件。\n\n## 用于成功和失败登录审计的扩展事件\n\n扩展事件（在第 6\
    \ 章“什么是扩展事件？”到第 8 章“通过 SQL 脚本实现扩展事件”中有更详细的介绍）同样允许你审计成功和失败的登录。扩展事件的好处是，无论你使用哪个版本的\
    \ SQL Server，你都可以获取客户端主机名。\n\n你需要创建一个使用 `login` 事件和 `error_reported` 事件的会话，如清单\
    \ 10-14 所示。\n\n***清单 10-14.*** 创建扩展事件以捕获成功和失败登录\n\n```sql\nCREATE EVENT SESSION\
    \ [AuditLogins] ON SERVER\nADD EVENT sqlserver.error_reported(\n    ACTION(sqlserver.client_app_name,\n\
    \           sqlserver.client_hostname,\n           sqlserver.server_principal_name)\n\
    \    WHERE ((([severity]=(14))\n        AND ([error_number]=(18456)))\n      \
    \  AND ([state]>(1)))),\nADD EVENT sqlserver.login(\n    ACTION(sqlserver.client_app_name,\n\
    \           sqlserver.client_hostname,\n           sqlserver.server_principal_name))\n\
    ADD TARGET package0.event_file(\n    SET filename=N'E:\\audits\\AuditLogins.xel',\n\
    \        max_file_size=(10),\n        max_rollover_files=(10))\nWITH (STARTUP_STATE=ON);\n\
    \nALTER EVENT SESSION [AuditLogins] ON SERVER\nSTATE=START;\n```\n\n在发生一些成功和失败的登录后，你可以执行清单\
    \ 10-15 中的查询来查询你的扩展事件。\n\n***清单 10-15.*** 查询你的扩展事件\n\n```sql\nSELECT\n    n.value('(@timestamp)[1]',\
    \ 'datetime') as timestamp,\n    n.value('(@name)[1]', 'nvarchar(15)') as name,\n\
    \    n.value('(action[@name=\"client_hostname\"]/value)[1]',\n             'nvarchar(50)')\
    \ as [client_hostname],\n    n.value('(action[@name=\"server_principal_name\"\
    ]/value)[1]',\n```\n"
- fmt: '# Chapter 10 Additional SQL Server Auditing and Tracking Methods


    The query in `Listing 10-15` will produce results like the results in `Figure
    10-13`. Note that the `error_reported` events, which are failed logins, don’t
    have a user, but do have a message. The login events do have a user, but no message
    because there is no error message with successful logins.


    ```sql

    ''nvarchar(50)'') as [user],

    n.value(''(action[@name="client_app_name"]/value)[1]'',

    ''nvarchar(50)'') as [client_app_name],

    n.value(''(data[@name="message"]/value)[1]'', ''nvarchar(50)'') as

    [message]

    FROM (SELECT CAST(event_data as XML) as event_data

    FROM sys.fn_xe_file_target_read_file(''e:\audits\AuditLogins*.xel'', NULL,

    NULL, NULL)) ed

    CROSS APPLY ed.event_data.nodes(''event'') as q(n)

    WHERE n.value(''(@timestamp)[1]'', ''datetime'') >= DATEADD(HOUR, -1,

    GETDATE())

    ORDER BY timestamp DESC;

    ```


    ![Audit results](index-187_1.png)


    `Figure 10-13.` Audit results


    ## DDL Triggers


    DDL triggers can be used to prevent changes, have something occur in response
    to a change, and record changes. You can do this at the server level or the database
    level. Triggers are much more useful for preventing changes or having something
    occur in response to a change. They are less useful for recording changes. I recommend
    using SQL Server Audit or extended events for those changes.


    `Tip` To learn more about DDL triggers, visit [https://docs.microsoft.com/en-us/sql/relational-databases/triggers/ddl-triggers?view=sql-server-ver15](https://docs.microsoft.com/en-us/sql/relational-databases/triggers/ddl-triggers?view=sql-server-ver15).


    In the next chapter, I will show you how to centralize your SQL Server audits
    and extended events data. This will make it much easier to query and report on
    because it’s in one central location.


    # Chapter 11 Centralizing Audit Data


    An important part of auditing is being able to easily query and report on multiple
    servers’ audit data. In this chapter, you will learn how to centralize audit data
    with SQL Server Agent and linked servers. You will also learn how to set up audits
    on multiple servers with a registered servers list.


    To centralize audit data, you will need these items:


    -   **Centralized audit database** – This is used to store the auditing data from
    all the audited servers.

    -   **Auditing user on the central server** – This user will be used on the linked
    server to connect back to the central server.

    -   **Linked server on audited servers** – This links to the centralized server
    that has the audit database.

    -   **SQL Server Agent audit collection job on audited servers** – This will send
    the audit data via the linked server to the centralized audit database.

    -   **SQL Server Agent job to clean up audit data on the centralized audit database**
    – This ensures you set a retention policy and enforce it.


    ## Setting Up Audits on Multiple Servers


    Setting up audits on multiple servers is easy with a registered servers list.
    `Figure 11-1` shows you an example of a registered servers list.


    ![Registered servers list](index-189_1.png)


    `Figure 11-1.` Registered servers list


    Once you have the list set up, you can right-click on the folder that has all
    the servers you want to audit, and choose New Query as shown in `Figure 11-2`.


    ![Registered servers list New Query](index-189_2.png)


    `Figure 11-2.` Registered servers list New Query


    I like to keep all my audit data on the same drive letter across all the servers
    I’m auditing. Make sure you don’t put audit files on the C drive. I don’t recommend
    putting


