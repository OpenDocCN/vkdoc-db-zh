- fmt: '# Chapter 2 types of Database auDiting


    Once you have Change Tracking enabled at the database level, you can enable it
    for a table. Figure 2-9 shows how to enable Change Tracking on a database table.


    **Figure 2-9.** Enabling SQL Server Change Tracking on a database table


    To see the changes that are captured, you will query an internal table to get
    results. This query is covered in Chapter 10, “Additional SQL Server Auditing
    and Tracking Methods.” Figure 2-10 shows how DML changes would be captured in
    this internal table.


    The first row in the results is an insert statement, and the second and third
    rows are update statements.


    **Figure 2-10.** Querying Change Tracking information


    Additional information about Change Tracking is covered in Chapter 10, “Additional
    SQL Server Auditing and Tracking Methods.”


    ## C2 Audit and Common Criteria Compliance


    `C2` and `Common Criteria compliance` are internationally recognized to follow
    specific security guidelines when auditing. These types of auditing are a comprehensive
    type of logging of all activities on your database server. If you don’t have an
    auditor requiring you to turn this on, leave it off. It can be very impactful
    to server performance. They assign a unique generated ID to each group of related
    auditing activities. You can enable these at the server level. Figure 2-11 shows
    you where you can enable these.


    **Figure 2-11.** Enabling C2 or Common Criteria compliance


    Additional information about C2 and Common Criteria compliance is covered in Chapter
    10, “Additional SQL Server Auditing and Tracking Methods.”


    ## Temporal Tables


    This built-in database feature allows you to see data stored in the table at any
    point in time. It’s a system-versioned table that keeps a full history of data
    changes. The validity of each row is managed by the system, which is the database
    engine. The versioning is implemented as a pair of tables, current and history.
    Each of these tables has two `datetime2` type columns to define the period of
    validity for each row. They are called the `PERIOD` columns. The current table
    contains the current value for each row. The history table contains each previous
    value for each row and the start time and end time for which it was valid.


    Figure 2-12 shows you a temporal table and its history table.


    **Figure 2-12.** Temporal table with its history table


    Additional information about temporal tables is covered in Chapter 10, “Additional
    SQL Server Auditing and Tracking Methods.”


    ## Successful and Failed Login Auditing


    There are a couple of ways you can implement `successful and failed login auditing`.
    When you track logins, you will see any successful logins, failed logins, or both
    in the SQL Server Log. One way is via `SSMS` in the Server Properties as shown
    in Figure 2-13. Once configured, the successful and/or failed logins will appear
    in the SQL Server Log.


    **Figure 2-13.** Changing login auditing


    Another way you can capture this information is with `extended events`. Additional
    information about login auditing is covered in Chapter 10, “Additional SQL Server
    Auditing and Tracking Methods.”


    ## Auditing Azure SQL Databases


    Auditing Azure SQL databases is quite a bit different than auditing SQL Server
    databases, especially when it comes to `SQL Server Audit`. `SQL Server Audit`
    isn’t available in `Azure SQL Database`. You need to use the Azure portal to set
    up your audits. You can’t use `SQL Server Audit`.'
