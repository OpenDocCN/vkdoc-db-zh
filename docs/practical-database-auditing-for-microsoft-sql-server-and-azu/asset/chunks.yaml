    `sys.dm_xe_objects`, with a filter on ‘Event’, will list the actions you can use
    in your extended event session. A cross-section of the query results from Listing
    8-2 are shown in Figure 8-3. There 68 actions available in SQL Server 2019\. The
    number of actions available to you depends on your version of SQL Server.


    ![](index-151_1.png)


    ![](index-151_2.png)


    **Figure 8-3.** Extended events listing of actions


    You can also query system views to see the settings of your extended events sessions.
    This can make it easier to see the settings without having to go in via the GUI
    prompts. Listing 8-3 gives you the query to get a listing of the extended events
    and some of their settings. There are more columns included in `sys.server_event_sessions`,
    but they are advanced settings that I recommend you never change.


    **Listing 8-3.** Querying system table to list extended events


    ```sql

    SELECT event_session_id, name, startup_state

    FROM sys.server_event_sessions;

    ```


    Figure 8-4 shows you the results from the `sys.server_event_sessions` query. You
    may have a different list of extended events depending on your version of SQL
    Server.


    **Figure 8-4.** Extended events listing


    ![](index-152_1.png)


    Once you get the `event_session_id` for the `audit_sa` extended event from the
    query in Listing 8-3, you can place it into the `WHERE` clause in the queries
    in Listings 8-4, 8-5, and 8-6.


    **Listing 8-4.** Querying system tables to list extended events details


    ```sql

    SELECT es.name AS ExtendedEventName,

    se.name AS EventName,

    sa.name AS GlobalFieldName,

    se.predicate AS Filter

    FROM sys.server_event_session_events se

    INNER JOIN sys.server_event_sessions es

    ON se.event_session_id = es.event_session_id

    INNER JOIN sys.server_event_session_actions sa

    ON sa.event_session_id = es.event_session_id

    AND sa.event_id = se.event_id

    WHERE es.event_session_id = 70049;

    ```


    Listing 8-4 returns the results for the extended event session’s settings configured
    events, global fields, and filters. Figure 8-5 shows you what the query in Listing
    8-4 returns.


    **Figure 8-5.** Extended events details about events and their global fields and
    filters


    ![](index-153_1.png)


    Figure 8-5 shows you that the extended event named `audit_sa` has two events associated
    with it. Those events each have six global fields associated with them. Also,
    each event has a filter to only capture events if the event action was done by
    the `sa` user. Listing 8-5 shows you how to query the target for the extended
    event.


    **Listing 8-5.** Querying system tables to list extended event target


    ```sql

    SELECT es.name AS ExtendedEventName,

    st.name AS TargetLocation

    FROM sys.server_event_session_targets st

    INNER JOIN sys.server_event_sessions es

    ON st.event_session_id = es.event_session_id

    WHERE es.event_session_id = 70049;

    ```


    Figure 8-6 shows you what the query in Listing 8-5 returns.


    **Figure 8-6.** Extended events target


    Figure 8-6 shows you that the extended event named `audit_sa` has a target location
    of `event_file`. Listing 8-6 shows you how to query additional settings for the
    extended event like filename and max file size.


    **Listing 8-6.** Querying system tables to list extended events settings


    ```sql

    SELECT es.name AS ExtendedEventName,

    sf.name AS SettingName,

    sf.value AS SettingValue

    FROM sys.server_event_session_fields sf

    INNER JOIN sys.server_event_sessions es

    ON sf.event_session_id = es.event_session_id

    WHERE es.event_session_id = 70049;

    ```'
