  trans: "\n## 筛选 SQL Server 审计\n\n您可以针对审计收集中可用的任何列进行筛选。这样，您就可以过滤掉诸如监控工具或服务账户之类的内容。SQL\
    \ Server 有一个 `servername$` 账户，在后台执行各种操作。这类账户会迅速填满您的审计文件，导致难以找到您想要审计的内容。\n\n进行筛选时，请使用列名，并指定您不希望它等于的值或您希望它等于的值。例如，如果您只想审计\
    \ `sa`，可以在此处进行筛选。这类似于 SQL 语句中的 `WHERE` 子句，因此您可以使用审计中可用的列，执行任何可以在 `WHERE` 子句中完成的操作。\n\
    \n清单 5-12 使用 `WHERE` 子句为审计添加了一个筛选器。\n\n***清单 5-12.*** 添加 `WHERE` 子句以筛选审计\n```\n\
    USE [master];\n\nCREATE SERVER AUDIT [Audit_AuditingUser]\nTO FILE\n(   FILEPATH\
    \ = N'E:\\sqlaudit\\auditinguser\\'\n    ,MAXSIZE = 100 MB\n    ,MAX_FILES = 4\n\
    \    ,RESERVE_DISK_SPACE = OFF\n) WITH (QUEUE_DELAY = 1000, ON_FAILURE = CONTINUE)\n\
    WHERE ([server_principal_name]='auditing'\n    AND [schema_name]<>'sys')\n\nALTER\
    \ SERVER AUDIT [Audit_AuditingUser] WITH (STATE = ON);\n```\n\n在清单 5-12 中，`WHERE`\
    \ 子句将进行筛选，使得只审计 auditing 数据库，并且会排除 `sys` 架构。\n\n`提示` 如果您想在某个 SQL Server 版本上进行审计，但该版本没有您需要的列（如\
    \ `client_ip` 或 `host_name`），您可以尝试改用扩展事件来实现。第 7 章“通过 GUI 实现扩展事件”涵盖了这方面的信息。\n\n\
    ## 删除审计\n\n要删除审计，您可以执行清单 5-13 中的查询。\n\n![](img/index-92_1.png)\n\n![](img/index-92_2.png)\n"
- fmt: '# Chapter 5 Implementing SQL Server Audit via SQL Scripts


    ## Listing 5-13. Deleting an audit


    ```sql

    USE [master];


    DROP SERVER AUDIT [AuditSpecification];

    ```


    The query in `Listing 5-13` will produce an error if the audit isn''t disabled
    first, as shown in `Figure 5-9`.


    ## Figure 5-9. Error deleting an audit while it’s enabled


    When you delete the audit, the files remain on disk. I deleted the audit and thought
    the files were gone, too. No, the files are still there. This is in case you need
    them later for auditing purposes. You must go manually delete them.


    When deleting audits, you can orphan your server and database audits. The server
    and database audits will stay there and seem fine, but no data will collect because
    the audit is gone. `Figure 5-10` shows you server and database audits are still
    in place even though there is no audit.


    ## Figure 5-10. Audit is gone, but server and database audits seem fine


    If you go into the server or database audits via the GUI, they will have a blank
    audit as shown in `Figure 5-11`.


    ![](index-93_1.jpg)


    ## Figure 5-11. Server audit specification is missing the audit


    There is a message at the top left of `Figure 5-11` telling you "Server audit
    was not provided" and it needs that to collect data.


    Even if you recreate the audit with the same name, the server and database audits
    don''t automatically associate with the new audit. The server and database audits
    rely on the GUID of the audit. There is a way to recreate an audit with the same
    GUID as shown in `Listing 5-14`.


    ## Listing 5-14. Recreating audit with the same GUID


    ```sql

    USE [master];


    CREATE SERVER AUDIT [AuditSpecification]

    TO FILE

    ( FILEPATH = N''C:\audits\''

    ,MAXSIZE = 50 MB

    ,MAX_FILES = 4

    ,RESERVE_DISK_SPACE = OFF

    ) WITH (QUEUE_DELAY = 1000, ON_FAILURE = CONTINUE,

    AUDIT_GUID = ''a39b90ef-dc26-486b-b297-1571161dfda1'')


    ALTER SERVER AUDIT [AuditSpecification] WITH (STATE = ON);

    ```


    You can get the GUID by scripting out an existing audit in the GUI as discussed
    earlier in this chapter.


    There''s slightly different syntax for deleting server and database audits. `Listing
    5-15` shows these scripts.


    ## Listing 5-15. Deleting server and database audits


    ```sql

    USE [master];


    DROP SERVER AUDIT SPECIFICATION [ServerAuditSpecification];


    USE [Auditing];


    DROP DATABASE AUDIT SPECIFICATION [DatabaseAuditSpecification_Auditing];

    ```


    The scripts in `Listing 5-15` will also produce an error if the specifications
    aren''t disabled as shown in `Figure 5-9` earlier in this section.


    ## Disabling Audits


    You can disable the audits via script as shown in `Listing 5-16`.


    ## Listing 5-16. Disabling an audit


    ```sql

    USE master;


    ALTER SERVER AUDIT AuditSpecification

    WITH (STATE = OFF);


    USE master;


    ALTER SERVER AUDIT SPECIFICATION [ServerAuditSpecification]

    WITH (STATE = OFF);


    USE Auditing;


    ALTER DATABASE AUDIT SPECIFICATION [DatabaseAuditSpecification_Auditing]

    WITH (STATE = OFF);

    ```


    `Listing 5-16` shows the different variations for disabling the server and database
    audit specifications.


    **Caution:** If you want to disable the audit, it won''t disable until it''s done
    auditing actions. This can prove difficult if you are auditing a lot of actions.
    Technically, you are able to disable any audit, but it may take a while for the
    audit to finish auditing before it can disable itself.


    ## Modifying Audits


    Once an audit is created, you can modify it by executing an `ALTER` statement
    on it. You will need to disable it first. The only thing you can''t change is
    the name of the audit. To change the name, you need to delete and recreate it.
    `Listing 5-17` shows the script you can use to modify an audit.


    ## Listing 5-17. Modifying an audit'
