    \ SESSION [audit_sa]\nON SERVER STATE = START;\n```\n\n> **注意** 与 `SQL Server\
    \ 审核` 不同，即使扩展事件正在审核事件，你也可以将其停止。\n\n## 删除扩展事件\n\n要删除扩展事件，你可以执行清单 8-11 所示的查询。\n\n\
