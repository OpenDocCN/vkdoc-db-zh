- fmt: '## Chapter 13 Auditing Azure SQL Databases


    ### Database-Level Audit Action Groups


    - `SCHEMA_OBJECT_OWNERSHIP_CHANGE_GROUP`

    - `SCHEMA_OBJECT_PERMISSION_CHANGE_GROUP`

    - `USER_CHANGE_PASSWORD_GROUP`


    **Tip** To find out more information about these audit action groups, [visit https://docs.microsoft.com/en-us/sql/relational-databases/security/auditing/sql-server-audit-action-groups-and-actions?view=sql-server-ver15#database-level-audit-action-groups](https://docs.microsoft.com/en-us/sql/relational-databases/security/auditing/sql-server-audit-action-groups-and-actions?view=sql-server-ver15#database-level-audit-action-groups)


    Those audit actions will get schema and security changes. To use these audit actions,
    you will need to execute the script in Listing [13-4.](#index_split_002.html#p230)


    ![](index-230_1.png)


    ### Listing 13-4. Modify auditing policy


    ```powershell

    Set-AzSqlServerAudit -ResourceGroupName ''yourresourcegroup'' -Servername ''yourservername''
    -AuditActionGroup APPLICATION_ROLE_CHANGE_PASSWORD_GROUP, DATABASE_CHANGE_GROUP,
    DATABASE_OBJECT_CHANGE_GROUP, DATABASE_OBJECT_OWNERSHIP_CHANGE_GROUP, DATABASE_OBJECT_PERMISSION_CHANGE_GROUP,
    DATABASE_OWNERSHIP_CHANGE_GROUP, DATABASE_PERMISSION_CHANGE_GROUP, DATABASE_PRINCIPAL_CHANGE_GROUP,
    DATABASE_PRINCIPAL_IMPERSONATION_GROUP, DATABASE_ROLE_MEMBER_CHANGE_GROUP, SCHEMA_OBJECT_CHANGE_GROUP,
    SCHEMA_OBJECT_OWNERSHIP_CHANGE_GROUP, SCHEMA_OBJECT_PERMISSION_CHANGE_GROUP, USER_CHANGE_PASSWORD_GROUP

    ```


    Make sure to change the variables to the correct resource group and server name
    in your Azure account.


    Figure [13-20](#index_split_002.html#p230) shows you the results of executing
    the `Set-AzSqlServerAudit` after changing the auditing policy.


    **Figure 13-20.** Get the current auditing policy results after you modify it


    You can choose to keep the default auditing policy. Depending on what you want
    to capture with auditing, this may be a good idea for you. I don’t want to see
    everything happening and think this modified policy is a better way to audit.


    ### Auditing Azure SQL Database with Extended Events


    Another way to audit Azure SQL Databases is with extended events. You can set
    up an extended event via SSMS. The main difference between extended events on
    SQL Server and Azure SQL Database is the storage location.


    ### Creating Storage Account and Container


    With Azure SQL Database, you will need to store your `.xel` files in a storage
    account and then set up a credential to access the storage account. In the Azure
    portal, search for storage accounts. Click **Create**. At this point, you need
    to choose the following:


    - **Subscription** – Select a subscription.

    - **Resource group** – You may want to put it in the same resource group as the
    SQL database.

    - **Storage account name** – Must be unique across Azure.

    - **Region** – I recommend putting this storage account in the same region as
    the database.

    - **Performance** – **Standard** is fine for performance.

    - **Redundancy** – Choose based on how important the audit data is for you.


    Click **Review + Create**. Then click **Create**. Figure [13-21](#index_split_002.html#p232)
    shows an example of the settings I chose.


    ![](index-232_1.png)


    **Figure 13-21.** Configure storage account


    ![](index-233_1.png)


    **Note** You will want to set up life cycle management for your storage account.
    This ensures you don’t wind up with tons of files stored in there forever.'
