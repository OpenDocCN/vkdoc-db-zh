- fmt: "# Chapter 14: Auditing Azure SQL Managed Instance\n\n## Navigate to Storage\
    \ Account Containers\n\nNavigate to your audit files. Navigate to the storage\
    \ account you just created and click `Containers`.\n\nThen click the **+ Container**\
    \ button. Name your container and leave **Public access level** on **Private (no\
    \ anonymous access)**. Click **Create**. This is shown in Figure 14-8.\n\n###\
    \ Figure 14-8. Container creation\n\nAfter clicking **Create**, you will see your\
    \ container listed. Click on the container and choose **Properties**. Copy the\
    \ URL for the next steps as shown in Figure 14-9.\n\n![Figure 14-9. Copy container\
    \ URL](index-256_1.png)\n\n## Configure Shared Access Signature\n\nNavigate back\
    \ up to the storage account and click **Shared access signature**. Make sure to\
    \ create your settings for this key based on the screenshot in Figure 14-10. You\
    \ will need to set the expiry date for longer than the default if you want to\
    \ continue using this storage account for your audit files for longer than just\
    \ eight hours.\n\n![Figure 14-10. Create a shared access signature](index-257_1.jpg)\n\
    \nThe settings I’ve chosen for my shared access signature are:\n\n*   **Allowed\
    \ services** – `Blob`.\n*   **Allowed resource types** – `Service`, `Container`,\
    \ `Object`.\n*   **Allowed permissions** – `Read`, `Write`, `Delete`, `List`,\
    \ `Add`, `Create`.\n*   **Blob versioning permissions** – Allows version deletion.\n\
    *   **Allowed blob index permissions** – `Read/Write`, `Filter`.\n*   **Start\
    \ and expiry date/time** – If it expires, your managed instance will not be able\
    \ to access the container anymore. You will need to generate a new shared access\
    \ signature. Then update your managed instance credential with the new token.\
    \ I tend to set the expiry out for years out to avoid issues with not being able\
    \ to access the storage account.\n*   **Allowed protocols** – `HTTPS only`.\n\
    *   **Preferred routing tier** – `Basic (default)`.\n*   **Signing key** – `Key\
    \ 1`.\n\nClick **Generate SAS and connection string**. The SAS token will load\
    \ on that page. Do not navigate off of this page. You can’t get the SAS token\
    \ ever again. If you need a new token, you have to generate a new SAS setup. Copy\
    \ the SAS token for the next steps as shown in Figure 14-11.\n\n**Note:** You\
    \ need to remove the question mark (`?`) from the beginning of the token when\
    \ adding it to the SQL Server credential.\n\n### Figure 14-11. Copy the SAS token\n\
    \n## Creating Database Credential\n\nConnect to your managed instance in `SSMS`.\
    \ You need to create a credential so your managed instance can access your storage\
    \ account as shown in Listing 14-5.\n\n### Listing 14-5. Create credential in\
    \ SSMS\n\n```sql\nCREATE CREDENTIAL [URL from Figure 14-9]\nWITH IDENTITY='SHARED\
    \ ACCESS SIGNATURE',\nSECRET = 'token from Figure 14-11';\n```\n\n## Creating\
    \ SQL Server Audit\n\nYou can create your SQL Server Audit using the script in\
    \ Listing 14-6.\n\n### Listing 14-6. Create audit in SSMS\n\n```sql\nCREATE SERVER\
    \ AUDIT miauditstorage\nTO URL\n(\n    PATH = 'URL from Figure 14-9',\n    RETENTION_DAYS\
    \ = 30\n);\n\nALTER SERVER AUDIT [miauditstorage] WITH (STATE = ON);\n```\n\n\
    `RETENTION_DAYS = 30` means that the storage account will only store 30 days’\
    \ worth of audit files before they are deleted. `0` means forever. I like 30 because\
    \ it’s enough time for me to analyze audit data before it goes away.\n\nNo audit\
    \ data will be collected until you set up either a server or database audit. You\
    \ can set up a server audit with the script in Listing 14-7.\n\n### Listing 14-7.\
    \ Create server audit in SSMS\n\n```sql\nUSE [master];\nCREATE SERVER AUDIT SPECIFICATION\
    \ [miserverauditstorage]\nFOR SERVER AUDIT [miauditstorage]\nADD (DATABASE_OBJECT_ACCESS_GROUP),\n\
    ADD (SCHEMA_OBJECT_ACCESS_GROUP),\nADD (AUDIT_CHANGE_GROUP),\nADD (SERVER_OPERATION_GROUP)\n\
    WITH (STATE = ON);\n```\n\n## Querying SQL Server Audit Files\n\nThis starts writing\
    \ `.xel` files to your Azure storage account as shown in Figure 14-12."
