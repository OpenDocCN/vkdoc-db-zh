- fmt: '# ChapTer 9 TraCking SQL Server ConfiguraTion ChangeS


    can also include things like changing max and min memory. There are a lot of different
    configuration settings. Most server configuration options are available via `SSMS`.
    Some of you can only access with `sp_configure`.


    **Tip** To see a list of configuration options, visit [https://docs.microsoft.com/en-us/sql/database-engine/configure-windows/server-configuration-options-sql-server?view=sql-server-ver15#configuration-options-table](https://docs.microsoft.com/en-us/sql/database-engine/configure-windows/server-configuration-options-sql-server?view=sql-server-ver15#configuration-options-table)


    © Josephine Bush 2022


    J. Bush, *Practical Database Auditing for Microsoft SQL Server and Azure SQL*,
    [https://doi.org/10.1007/978-1-4842-8634-0_9](https://doi.org/10.1007/978-1-4842-8634-0_9)


    ![](index-160_1.png)


    ![](index-160_2.png)


    ## Configuration Changes History in SSMS


    To see the configuration changes history in `SSMS`, right-click on the server
    connection. Then navigate to Reports ➤ Standard Reports ➤ Configuration Changes
    History as shown in Figure 9-1.


    ### Figure 9-1. Configuration Changes History navigation


    Once the Configuration Changes History Report opens, you will see any recent changes.
    The screenshot in Figure 9-2 shows you this report. It’s important to note that
    you may not see ten days of history as I have in my report. This will depend on
    how much is written to the default trace and how fast those files roll over. The
    default trace is enabled by default in `SQL Server`. It collects a log of activity
    including configuration changes. I don’t recommend querying it, though, because
    this feature will be removed in a future version of `SQL Server`, per Microsoft.


    ### Figure 9-2. Configuration Changes History report


    ![](index-161_1.png)


    Figure 9-2 shows that max server memory (MB) was changed to 5666 by sa. It also
    shows it was changed to 5667 by another user. This report is useful to have a
    quick look at recent changes, but it’s not a great way to track changes in the
    long term.


    ## Querying Configuration Changes in the SQL Server Logs


    You can also see configuration changes in the `SQL Server Log`. To access this
    log, right-click `SQL Server Logs` under Management. Then choose View ➤ `SQL Server
    Log` as shown in Figure 9-3.


    ### Figure 9-3. SQL Server Log navigation


    Figure 9-4 shows the log with the last memory configuration change. The availability
    of this information depends on how long it takes your log to fill up and how many
    log files you are keeping.


    ![](index-162_1.png)


    ### Figure 9-4. SQL Server Log showing configuration change


    There is also a way to query the log with a `SQL` script. Use the query in Listing
    9-1 to query the log for configuration changes. The comments included with the
    query help you to understand what each value means.


    ### Listing 9-1. Querying the log for configuration changes


    ```

    USE master;


    EXEC sys.xp_readerrorlog

    0, --0 = current log file, 1 = archive file #1, etc

    1, --1 or NULL = error log, 2 = SQL Agent log

    N''Configuration option'', --String you want to find

    NULL, --String you can set to further refine results

    NULL, --Start time

    NULL, --End time

    N''asc''; --orders results asc = ascending, desc = descending

    ```


