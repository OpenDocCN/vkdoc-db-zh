    \ Deleting extended event dialog box*\n\nWhen you delete the extended event, the\
    \ files remain on disk. I deleted the extended event and thought the files were\
    \ gone, too. No, the files are still there. This is in case you need them later\
    \ for auditing purposes. You must go manually delete them.\n\nIn the next chapter,\
    \ you will learn how to make your life easier by scripting out the extended events\
    \ you want to place on your servers.\n\n# CHAPTER 8 Implementing Extended Events\
    \ via SQL Scripts\n\nTo make extended events work, you need to set up a session.\
