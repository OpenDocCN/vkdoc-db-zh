    ## DDL 触发器


    DDL 触发器可用于阻止更改、响应更改执行某些操作以及记录更改。您可以在服务器级别或数据库级别执行此操作。触发器在阻止更改或响应更改执行某些操作方面非常有用。但用于记录更改则不太有效。我建议对这些更改使用
    SQL Server 审计或扩展事件。


    `提示` 要了解有关 DDL 触发器的更多信息，请访问 [`docs.microsoft.com/en-us/sql/relational-databases/triggers/ddl-triggers?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/relational-databases/triggers/ddl-triggers?view=sql-server-ver15)。


    在下一章中，我将向您展示如何集中您的 SQL Server 审计和扩展事件数据。这将使查询和报告变得容易得多，因为它集中在一个位置。


    # 第十一章 集中审计数据


    审计的一个重要部分是能够轻松查询和报告来自多台服务器的审计数据。在本章中，您将学习如何使用 SQL Server 代理和链接服务器来集中审计数据。您还将学习如何使用已注册的服务器列表在多台服务器上设置审计。


    要集中审计数据，您需要以下项目：


    -   **集中审计数据库** – 用于存储所有受审核服务器的审计数据。

    -   **中心服务器上的审计用户** – 此用户将用于在链接服务器上连接回中心服务器。

    -   **受审核服务器上的链接服务器** – 链接到包含审计数据库的中心服务器。

    -   **受审核服务器上的 SQL Server 代理审计收集作业** – 通过链接服务器将审计数据发送到集中审计数据库。

    -   **集中审计数据库上用于清理审计数据的 SQL Server 代理作业** – 确保您设置并强制执行保留策略。


    ## 在多台服务器上设置审计


    使用已注册的服务器列表，可以在多台服务器上轻松设置审计。`图 11-1` 显示了一个已注册服务器列表的示例。


    ![已注册服务器列表](img/index-189_1.png)


    `图 11-1.` 已注册服务器列表


    设置好列表后，您可以右键单击包含所有要审计服务器的文件夹，然后选择“新建查询”，如`图 11-2`所示。


    ![已注册服务器列表 新建查询](img/index-189_2.png)


    `图 11-2.` 已注册服务器列表 新建查询


