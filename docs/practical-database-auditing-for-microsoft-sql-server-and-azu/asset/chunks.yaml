    ADD (AUDIT_CHANGE_GROUP),


    ADD (DBCC_GROUP),


    ADD (DATABASE_PERMISSION_CHANGE_GROUP),


    ADD (SCHEMA_OBJECT_PERMISSION_CHANGE_GROUP),


    ADD (SERVER_OBJECT_PERMISSION_CHANGE_GROUP),


    ADD (SERVER_PERMISSION_CHANGE_GROUP),


    ADD (DATABASE_CHANGE_GROUP),


    ADD (DATABASE_OBJECT_CHANGE_GROUP),


    ADD (DATABASE_PRINCIPAL_CHANGE_GROUP),


    ADD (SCHEMA_OBJECT_CHANGE_GROUP),


    ADD (SERVER_OBJECT_CHANGE_GROUP),


    ADD (SERVER_PRINCIPAL_CHANGE_GROUP),


    ADD (SERVER_OPERATION_GROUP),


    ADD (APPLICATION_ROLE_CHANGE_PASSWORD_GROUP),


    ADD (LOGIN_CHANGE_PASSWORD_GROUP),


    ADD (SERVER_STATE_CHANGE_GROUP),


    ADD (DATABASE_OWNERSHIP_CHANGE_GROUP),


    ADD (SCHEMA_OBJECT_OWNERSHIP_CHANGE_GROUP),


    ADD (SERVER_OBJECT_OWNERSHIP_CHANGE_GROUP),


    ADD (USER_CHANGE_PASSWORD_GROUP)


    WITH (STATE = ON);


    The server audit in Listin[g 15-2 w](#index_split_002.html#p283)ill only get the
    schema and permissions changes.


    This will keep your audit files smaller and fewer in number.


    **Querying SQL Server Audit Data**


    Until each file reaches its max size, it will be stored on the database instance.
    Those


    audit files are stored in D:\rdsdbdata\SQLAudit\. Once it reaches its max size,
    it will


    be uploaded into S3\. At that point, the file is moved into the retention folder,
    which is


    named transmitted. Then, your audit files will be stored in D:\rdsdbdata\SQLAudit\


    transmitted.


    Chapter 15 Other ClOud prOvider auditing OptiOnS


    To query the audit data, use the script in Listin[g 15-3.](#index_split_002.html#p285)


    ***Listing 15-3.*** Query audit data not transmitted to S3


    SELECT DISTINCT


    event_time,


    aa.name as audit_action,


    statement,


    succeeded,


    database_name,


    server_instance_name,


    schema_name,


    session_server_principal_name,


    server_principal_name,


    object_Name,


    file_name,


    client_ip,


    application_name,


    file_name


    FROM msdb.dbo.rds_fn_get_audit_file (''D:\rdsdbdata\SQLAudit\*.


    sqlaudit'',default,default) af


    INNER JOIN sys.dm_audit_actions aa


    ON aa.action_id = af.action_id


    WHERE event_time > DATEADD(HOUR, -1, GETDATE())


    ORDER BY event_time DESC;


    **Tip** aWS has done a good job with auditing to mimic SQl Server as much as


    possible. You can use *.sqlaudit to query all the audit files at once. it’s harder


    to query audit data in azure SQl database Managed instance. this is because you


    have to know the exact names of the files. You can’t use *.sqlaudit to query all


    the files at once in azure SQl database Managed instance.


    Even with the audit set up in Listings [15-1 and 15-2, it](#index_split_002.html#p283)’s
    going to capture a lot of actions happening in the background. You will need to
    filter it. There’s going to be a user


    something like WORKGROUP\EC2AMAZ-QG7G9L3$, depending on your instance.


    Chapter 15 Other ClOud prOvider auditing OptiOnS


    You will need to filter that user out to avoid having issues with too much audit
    data. You


    may also be seeing a lot of sys schema, which you won’t need to audit. Also, rdsa
    may


    be audited a lot, and that will be more background actions you don’t need to audit.
    The


    filter you need will depend on what you see coming through cluttering up your
    audit.


    Listin[g 15-4 giv](#index_split_002.html#p286)es you a way to filter your audit.


    ***Listing 15-4.*** Filtering your audit


    USE [master];


    ALTER SERVER AUDIT [AuditSpecification] WITH (STATE = OFF);


    ALTER SERVER AUDIT [AuditSpecification]


    WHERE [database_name]<>''rdsadmin''


    AND session_server_principal_name <>''WORKGROUP\EC2AMAZ-QG7G9L3$''


    and schema_name <> ''sys''


    and server_principal_name <> ''rdsa'';


    ALTER SERVER AUDIT [AuditSpecification] WITH (STATE = ON);


    If you need to query audit data that has already been moved to S3, you will need
    to


    change your query as shown in Listing [15-5](#index_split_002.html#p286). The
    only difference from Listin[g 15-3](#index_split_002.html#p285) is the filename
    path.


    ***Listing 15-5.*** Query audit data transmitted to S3


    SELECT DISTINCT


    event_time,


    aa.name as audit_action,


    statement,


    succeeded,'
  trans: "# 第 15 章 其他云提供商审计选项\n\n## 审计组\n要配置审计，可以使用 `ADD` 语句添加各种操作组：\n\n- `ADD (DATABASE_OBJECT_ACCESS_GROUP)`\n\
    - `ADD (SCHEMA_OBJECT_ACCESS_GROUP)`\n- `ADD (DATABASE_ROLE_MEMBER_CHANGE_GROUP)`\n\
    - `ADD (SERVER_ROLE_MEMBER_CHANGE_GROUP)`\n- `ADD (AUDIT_CHANGE_GROUP)`\n- `ADD\
    \ (DBCC_GROUP)`\n- `ADD (DATABASE_PERMISSION_CHANGE_GROUP)`\n- `ADD (SCHEMA_OBJECT_PERMISSION_CHANGE_GROUP)`\n\
    - `ADD (SERVER_OBJECT_PERMISSION_CHANGE_GROUP)`\n- `ADD (SERVER_PERMISSION_CHANGE_GROUP)`\n\
    - `ADD (DATABASE_CHANGE_GROUP)`\n- `ADD (DATABASE_OBJECT_CHANGE_GROUP)`\n- `ADD\
    \ (DATABASE_PRINCIPAL_CHANGE_GROUP)`\n- `ADD (SCHEMA_OBJECT_CHANGE_GROUP)`\n-\
    \ `ADD (SERVER_OBJECT_CHANGE_GROUP)`\n- `ADD (SERVER_PRINCIPAL_CHANGE_GROUP)`\n\
    - `ADD (SERVER_OPERATION_GROUP)`\n- `ADD (APPLICATION_ROLE_CHANGE_PASSWORD_GROUP)`\n\
    - `ADD (LOGIN_CHANGE_PASSWORD_GROUP)`\n- `ADD (SERVER_STATE_CHANGE_GROUP)`\n-\
    \ `ADD (DATABASE_OWNERSHIP_CHANGE_GROUP)`\n- `ADD (SCHEMA_OBJECT_OWNERSHIP_CHANGE_GROUP)`\n\
    - `ADD (SERVER_OBJECT_OWNERSHIP_CHANGE_GROUP)`\n- `ADD (USER_CHANGE_PASSWORD_GROUP)`\n\
    \n`WITH (STATE = ON)`\n\n清单 15-2 中的服务器审计将仅捕获架构和权限变更。这将使您的审计文件更小，数量更少。\n\n## 查询\
    \ SQL Server 审计数据\n在每个文件达到其最大大小之前，它将存储在数据库实例上。这些审计文件存储在 `D:\\rdsdbdata\\SQLAudit\\\
    ` 中。一旦文件达到最大大小，它将被上传到 S3。此时，该文件会被移入名为 `transmitted` 的保留文件夹。然后，您的审计文件将存储在 `D:\\\
    rdsdbdata\\SQLAudit\\transmitted` 中。\n\n要查询审计数据，请使用清单 15-3 中的脚本。\n\n**清单 15-3.**\
    \ 查询尚未传输到 S3 的审计数据\n\n```sql\nSELECT DISTINCT\n    event_time,\n    aa.name as\
    \ audit_action,\n    statement,\n    succeeded,\n    database_name,\n    server_instance_name,\n\
    \    schema_name,\n    session_server_principal_name,\n    server_principal_name,\n\
    \    object_Name,\n    file_name,\n    client_ip,\n    application_name,\n   \
    \ file_name\nFROM msdb.dbo.rds_fn_get_audit_file('D:\\rdsdbdata\\SQLAudit\\*.sqlaudit',\
    \ default, default) af\nINNER JOIN sys.dm_audit_actions aa\n    ON aa.action_id\
    \ = af.action_id\nWHERE event_time > DATEADD(HOUR, -1, GETDATE())\nORDER BY event_time\
    \ DESC;\n```\n\n**提示：** AWS 在审计功能方面做得很好，尽可能地模仿了 SQL Server 的行为。您可以使用 `*.sqlaudit`\
    \ 一次性查询所有审计文件。在 Azure SQL 数据库托管实例中查询审计数据则较为困难，因为您必须知道文件的确切名称。在 Azure SQL 数据库托管实例中，您无法使用\
    \ `*.sqlaudit` 一次性查询所有文件。\n\n即使按照清单 15-1 和 15-2 设置了审计，它仍会捕获大量在后台发生的操作。您需要对其进行过滤。可能会存在类似\
    \ `WORKGROUP\\EC2AMAZ-QG7G9L3$` 的用户，具体取决于您的实例。\n\n## 过滤审计数据\n您需要过滤掉该用户，以避免审计数据过多的问题。您可能还会看到大量\
    \ `sys` 架构的活动，而这些您无需审计。此外，`rdsa` 可能会被大量审计，其中很多是您不需要审计的后台操作。您需要的过滤器将取决于您看到的、使审计变得杂乱的内容。清单\
    \ 15-4 提供了一种过滤审计的方法。\n\n**清单 15-4.** 过滤您的审计\n\n```sql\nUSE [master];\nALTER SERVER\
    \ AUDIT [AuditSpecification] WITH (STATE = OFF);\n\nALTER SERVER AUDIT [AuditSpecification]\n\
    WHERE [database_name] <> 'rdsadmin'\n    AND session_server_principal_name <>\
    \ 'WORKGROUP\\EC2AMAZ-QG7G9L3$'\n    AND schema_name <> 'sys'\n    AND server_principal_name\
    \ <> 'rdsa';\n\nALTER SERVER AUDIT [AuditSpecification] WITH (STATE = ON);\n```\n\
    \n如果您需要查询已经移动到 S3 的审计数据，则需要像清单 15-5 那样更改您的查询。与清单 15-3 的唯一区别在于文件名路径。\n\n**清单 15-5.**\
    \ 查询已传输到 S3 的审计数据\n\n```sql\nSELECT DISTINCT\n    event_time,\n    aa.name as\
    \ audit_action,\n    statement,\n    succeeded,\n```"
- fmt: "# Chapter 15 Other Cloud Provider Auditing Options\n\nMy recommendation is\
    \ to query the audit data while it’s still in the database instance and not yet\
    \ transmitted to S3. If you set up your server audit like Listing 15-2 and added\
    \ an appropriate filter like in Listing 15-4, you won’t be getting a lot of audit\
    \ data. You could probably collect it every hour and never miss any audit data.\
    \ The best way to make sure you don’t miss audit data is to keep a close eye on\
    \ how fast it collects. Then you can set the schedule for querying it based on\
    \ that.\n\n**Note** For more information about SQL Server audit in RDS, visit\
    \ https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/Appendix.SQLServer.Options.Audit.html\n\
    \nNicely, AWS RDS allows you to use SQL Server Agent and Linked Servers. You could\
    \ do a centralization setup like in Chapter 11, “Centralizing Audit Data.” This\
    \ will make it easier to query and report on multiple RDS instances.\n\n## AWS\
    \ RDS Extended Events\n\nIt’s pretty straightforward to use extended events in\
    \ AWS RDS. The main thing to note is the filename. You have to put your extended\
    \ events in the path `D:\\rdsdbdata\\Log\\` as I’ve done in Listing 15-6.\n\n\
    ***Listing 15-6.*** Extended event setup in RDS\n\n```sql\nCREATE EVENT SESSION\
    \ [auditxel] ON SERVER\nADD EVENT sqlserver.rpc_completed(\n    ACTION(\n    \
    \    sqlserver.client_app_name,\n        sqlserver.client_hostname,\n        sqlserver.database_name,\n\
    \        sqlserver.sql_text,\n        sqlserver.username\n    )\n    WHERE ([sqlserver].[username]=N'josephine')\n\
    ),\nADD EVENT sqlserver.sql_batch_completed(\n    ACTION(\n        sqlserver.client_app_name,\n\
    \        sqlserver.client_hostname,\n        sqlserver.database_name,\n      \
    \  sqlserver.sql_text,\n        sqlserver.username\n    )\n    WHERE ([sqlserver].[username]=N'josephine')\n\
    )\nADD TARGET package0.event_file\n(\n    SET filename=N'D:\\rdsdbdata\\Log\\\
    auditxel',\n    max_file_size=(10),\n    max_rollover_files=(5)\n)\nWITH (\n \
    \   MAX_MEMORY=4096 KB,\n    EVENT_RETENTION_MODE=ALLOW_SINGLE_EVENT_LOSS,\n \
    \   MAX_DISPATCH_LATENCY=30 SECONDS,\n    MAX_EVENT_SIZE=0 KB,\n    MEMORY_PARTITION_MODE=NONE,\n\
    \    TRACK_CAUSALITY=OFF,\n    STARTUP_STATE=ON\n);\n\nALTER EVENT SESSION [auditxel]\
    \ ON SERVER STATE=START;\n```\n\n**Note** extended events will only work on enterprise\
    \ and Standard editions.\n\nTo query your extended event, use the script in Listing\
    \ 15-7.\n\n***Listing 15-7.*** Query extended event data in RDS\n\n```sql\nSELECT\n\
    \    n.value('(@timestamp)[1]', 'datetime') as timestamp,\n    n.value('(action[@name=\"\
    sql_text\"]/value)[1]', 'nvarchar(max)') as [sql],\n    n.value('(action[@name=\"\
    client_hostname\"]/value)[1]', 'nvarchar(50)') as [client_hostname],\n    n.value('(action[@name=\"\
    username\"]/value)[1]', 'nvarchar(50)') as [user],\n    n.value('(action[@name=\"\
    database_name\"]/value)[1]', 'nvarchar(50)') as [database_name],\n    n.value('(action[@name=\"\
    client_app_name\"]/value)[1]', 'nvarchar(50)') as [client_app_name]\nFROM\n  \
    \  (SELECT CAST(event_data as XML) as event_data\n     FROM sys.fn_xe_file_target_read_file('D:\\\
    rdsdbdata\\log\\auditxel*.xel', NULL, NULL, NULL)) as ed\nCROSS APPLY ed.event_data.nodes('event')\
    \ as q(n)\nWHERE n.value('(@timestamp)[1]', 'datetime') >= DATEADD(HOUR, -4, GETDATE())\n\
    ORDER BY timestamp DESC;\n```\n\n**Tip** AWS has done a good job with Xevents\
    \ to mimic SQL Server as much as possible."
