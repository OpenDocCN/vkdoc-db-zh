- fmt: "# Chapter 10: Additional SQL Server Auditing and Tracking Methods\n\n## Listing\
    \ 10-8. Querying CDC data\n\n```sql\nUSE YourDBName;\n\nDECLARE @from_lsn binary(10),\
    \ @to_lsn binary(10);\n\nSET @from_lsn = sys.fn_cdc_get_min_lsn('dbo_YourTableName');\n\
    \nSET @to_lsn = sys.fn_cdc_get_max_lsn();\n\nSELECT *\n\nFROM cdc.fn_cdc_get_all_changes_dbo_AuditData\n\
    \n(@from_lsn, @to_lsn, N'all');\n```\n\n**Note:** SQL agent needs to be enabled\
    \ and started for CDC to capture data.\n\nYour results will vary based on what\
    \ changes happened on your table. Figure 10-7 shows you what the results could\
    \ look like.\n\n![CDC query results](index-179_1.png)\n\n### Figure 10-7. CDC\
    \ query results\n\nThe `__$operation` column values are:\n\n*   **1** – Delete.\n\
    *   **2** – Insert.\n*   **3** – Update. This will return the old value. It only\
    \ works when the row filter option `'all update old'` is specified. To set this,\
    \ you need to specify `N'all update old'` instead of `N'all'` in Listing 10-8.\n\
    *   **4** – Update, but only includes the column values after the update.\n\n\
    **Tip:** To get more information on `cdc.fn_cdc_get_all_changes`, visit [`https://docs.microsoft.com/en-us/sql/relational-databases/system-functions/cdc-fn-cdc-get-all-changes-capture-instance-transact-sql?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/relational-databases/system-functions/cdc-fn-cdc-get-all-changes-capture-instance-transact-sql?view=sql-server-ver15).\n\
    \n## Temporal Tables\n\nThis built-in database feature allows you to see data\
    \ stored in the table at any point in time. It’s a system-versioned table that\
    \ keeps a full history of data changes. The validity of each row is managed by\
    \ the system, which is the database engine. The versioning is implemented as a\
    \ pair of tables, current and history. Each of these tables has two `datetime2`\
    \ type columns to define the period of validity for each row. They are called\
    \ the PERIOD columns. The current table contains the current value for each row.\
    \ The history table contains each previous value for each row and the start time\
    \ and end time for which it was valid.\n\n### Creating a Temporal Table\n\nTo\
    \ create a temporal table with a default history table, use the script in Listing\
    \ 10-9.\n\n#### Listing 10-9. Creating a temporal table with a default history\
    \ table\n\n```sql\nCREATE TABLE dbo.AuditChangesTemporal\n(\n    AuditID INT NOT\
    \ NULL PRIMARY KEY CLUSTERED IDENTITY(1,1),\n    [event_time] [datetime2](7) NOT\
    \ NULL,\n    [statement] [nvarchar](4000) NULL,\n    ValidFrom DATETIME2 GENERATED\
    \ ALWAYS AS ROW START NOT NULL,\n    ValidTo DATETIME2 GENERATED ALWAYS AS ROW\
    \ END NOT NULL,\n    PERIOD FOR SYSTEM_TIME (ValidFrom, ValidTo)\n)\nWITH (SYSTEM_VERSIONING\
    \ = ON (HISTORY_TABLE = dbo.AuditChangesTemporalHistory));\n```\n\nThe script\
    \ in Listing 10-9 will create a temporal table, and the history table is accessible\
    \ from under the table, as shown in Figure 10-8.\n\n![Temporal table with its\
    \ history table](index-180_1.png)\n\n#### Figure 10-8. Temporal table with its\
    \ history table\n\n### Modifying Data in a Temporal Table\n\nIf you don’t hide\
    \ the PERIOD columns, `ValidTo` and `ValidFrom`, you will need to account for\
    \ them when modifying data. You can do this by specifying only the columns you\
    \ want to `INSERT` into as shown in Listing 10-10. This will set default values\
    \ for `ValidTo` and `ValidFrom` for you.\n\n#### Listing 10-10. Inserting into\
    \ a temporal table\n\n```sql\nINSERT INTO Auditing.dbo.AuditChangesTemporal\n\
    \    (event_time, statement)\nSELECT DATEADD(mi, DATEPART(TZ, SYSDATETIMEOFFSET()),\
    \ event_time) as event_time, statement\nFROM sys.fn_get_audit_file ('e:\\sqlaudit\\\
    *.sqlaudit',default,default) af\nWHERE DATEADD(mi, DATEPART(TZ, SYSDATETIMEOFFSET()),\
    \ event_time) > DATEADD(HOUR, -4, GETDATE());\n```\n\nIf you do hide the PERIOD\
    \ columns, `ValidTo` and `ValidFrom`, you won’t need to account for them when\
    \ modifying data. In other words, you can `INSERT` without having to specify columns.\n\
    \n**Note:** There are more rules around modifying data in temporal tables, such\
    \ as for update and delete. For more information on modifying data in a temporal\
    \ table, visit [`https://docs.microsoft.com/en-us/sql/relational-databases/tables/modifying-data-in-a-system-versioned-temporal-table?view=sql-server-ver16`](https://docs.microsoft.com/en-us/sql/relational-databases/tables/modifying-data-in-a-system-versioned-temporal-table?view=sql-server-ver16).\n\
    \n### Querying a Temporal Table\n\nWhen you want the current data in a temporal\
    \ table, you can query it the same way as any other table as shown in Figure 10-9.\n\
    \n![Querying current data in temporal table](index-182_1.png)\n\n#### Figure 10-9.\
    \ Querying current data in temporal table\n\nIf you want to query historical data,\
    \ you will need to specify `FOR SYSTEM_TIME AS OF`, as shown in Listing 10-11.\n\
    \n#### Listing 10-11. Inserting into a temporal table\n\n```sql\nSELECT TOP (10)\
    \ *\nFROM [Auditing].[dbo].[AuditChangesTemporal]\nFOR SYSTEM_TIME AS OF '2022-06-01\
    \ T10:00:00.7230011';\n```\n\nNothing may return from that table based on whether\
    \ there is actually something in the historical data for that `SYSTEM_TIME`.\n\
    \n**Note:** For more information about temporal tables, visit [`https://docs.microsoft.com/en-us/sql/relational-databases/tables/getting-started-with-system-versioned-temporal-tables?view=sql-server-ver16`](https://docs.microsoft.com/en-us/sql/relational-databases/tables/getting-started-with-system-versioned-temporal-tables?view=sql-server-ver16).\n\
    \n![Temporal tables example 1](index-183_1.png)\n\n![Temporal tables example 2](index-183_2.png)\n\
    \n## Successful and Failed Logins\n\nOne way to audit successful and/or failed\
    \ logins is by enabling the login auditing in SSMS, which will write to the SQL\
    \ Server Log. You can enable this in SSMS by right-clicking on the server connection\
    \ and choosing properties. Then click on the Security page, as shown in Figure\
    \ 10-10.\n\n![Login auditing configuration](index-183_1.png)\n\n#### Figure 10-10.\
    \ Login auditing configuration\n\nOnly failed logins are being captured on this\
    \ server. If you change this setting, you will need to restart SQL Server. Figure\
    \ 10-11 shows you what a failed login message will look like in the log.\n\n![Failed\
    \ login in the SQL Server Log](index-183_2.png)\n\n#### Figure 10-11. Failed login\
    \ in the SQL Server Log\n\nYou can also query the log if you want to extract records\
    \ from it, which was covered..."
