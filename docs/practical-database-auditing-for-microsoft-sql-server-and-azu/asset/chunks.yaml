  trans: "\n如果你尝试向已包含服务器审计的现有审计中添加另一个服务器审计，操作将会失败，并显示错误提示该审计已存在，如图 5-7 所示。这意味着你无法为其添加另一个服务器审计。\n\
    \n**图 5-7.** 尝试向审计中添加第二个服务器审计规范时出现的错误\n\n这并不妨碍你拥有多个服务器和数据库审计，因为你可以设置多个审计。第 3 章“什么是\
    \ SQL Server 审计？”中有一节专门讨论多审计设置，并提供了一些你可以参考的示例场景。\n\n## SQL Server 审计中可用的列\n\n\
    审计中提供了许多列。这些列可在你查询或筛选审计时使用。不同版本可用的列有所不同。以下列表包含了我最常用的一些列：\n\n*   **SQL Server 2012/2014/2016**\n\
    \    *   `event_time`\n    *   `action_id`\n    *   `succeeded`\n    *   `server_principal_name`\n\
    \    *   `server_instance_name`\n    *   `database_name`\n    *   `schema_name`\n\
    \    *   `object_name`\n    *   `statement`\n    *   `file_name`\n*   **SQL Server\
    \ 2017 – 包含 2016 及更早版本的所有列，外加以下新增列**\n    *   `client_ip`\n    *   `application_name`\n\
    *   **SQL Server 2019 – 包含 2017 及更早版本的所有列，外加以下新增列**\n    *   `host_name`\n\n**请注意**，实际列远多于上述列表，并且每个版本都会增加新列。根据你选择存储审计数据的位置，以下链接提供了有关审计数据中可用列的更多信息：\n\
    *   [`docs.microsoft.com/en-us/sql/relational-databases/security/auditing/sql-server-audit-records?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/relational-databases/security/auditing/sql-server-audit-records?view=sql-server-ver15)\n\
    *   [`docs.microsoft.com/en-us/sql/relational-databases/system-functions/sys-fn-get-audit-file-transact-sql?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/relational-databases/system-functions/sys-fn-get-audit-file-transact-sql?view=sql-server-ver15)\n\
    \n## 查询审计日志\n\n你可以使用 SQL Server 系统函数 `sys.fn_get_audit_file` 来查询审计文件。该函数将返回关于审计及其关联元数据的大量不同信息。代码清单\
    \ 5-11 提供了一个查询，用于获取过去四小时内审计中最相关的列。\n\n**代码清单 5-11.** 查询审计日志\n\n```sql\nUSE master;\n\
    SELECT DISTINCT\n    event_time,\n    aa.name as audit_action,\n    statement,\n\
    \    succeeded,\n    database_name,\n    server_instance_name,\n    schema_name,\n\
    \    session_server_principal_name,\n    server_principal_name,\n    object_Name,\n\
    \    file_name,\n    client_ip,\n    application_name,\n    host_name,\n    file_name\n\
    FROM sys.fn_get_audit_file ('E:\\audits\\*.sqlaudit',default,default) af\nINNER\
    \ JOIN sys.dm_audit_actions aa\n    ON aa.action_id = af.action_id\nWHERE event_time\
    \ > DATEADD(HOUR, -4, GETDATE())\nORDER BY event_time DESC;\n```\n\n图 5-8 展示了代码清单\
    \ 5-11 中查询结果的一个横截面。\n\n![](img/index-90_1.png)\n\n**图 5-8.** 审计查询结果\n\n**提示**\
    \ 通过访问以下链接了解更多关于 `sys.fn_get_audit_file` 的信息：[`docs.microsoft.com/en-us/sql/relational-databases/system-functions/sys-fn-get-audit-file-transact-sql?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/relational-databases/system-functions/sys-fn-get-audit-file-transact-sql?view=sql-server-ver15)\n"
- fmt: "## Filtering SQL Server Audits\n\nYou can filter on any column that’s available\
    \ in the audit collection. This way, you can filter out things like monitoring\
    \ tools or service accounts. SQL Server has a `servername$` account that does\
    \ all kinds of stuff in the background. These types of accounts can fill up your\
    \ auditing files fast, making it hard to find the things you wanted to audit.\n\
    \nFor filtering, use the name of the column and what you don’t want it equal to\
    \ or what you want it equal to. For example, if you wanted to audit only `sa`,\
    \ you can filter on that here. This is like a `WHERE` clause in a SQL statement,\
    \ so you can do anything you can do in a `WHERE` clause using the columns that\
    \ are available in the audit.\n\nListing 5-12 uses a `WHERE` clause to add a filter\
    \ to the audit.\n\n***Listing 5-12.*** Adding a `WHERE` clause to filter an audit\n\
    ```\nUSE [master];\n\nCREATE SERVER AUDIT [Audit_AuditingUser]\nTO FILE\n(   FILEPATH\
    \ = N'E:\\sqlaudit\\auditinguser\\'\n    ,MAXSIZE = 100 MB\n    ,MAX_FILES = 4\n\
    \    ,RESERVE_DISK_SPACE = OFF\n) WITH (QUEUE_DELAY = 1000, ON_FAILURE = CONTINUE)\n\
    WHERE ([server_principal_name]='auditing'\n    AND [schema_name]<>'sys')\n\nALTER\
    \ SERVER AUDIT [Audit_AuditingUser] WITH (STATE = ON);\n```\n\nIn Listing 5-12,\
    \ the `WHERE` clause will filter such that only the auditing database is audited\
    \ and it will filter out the `sys` schema.\n\n`Tip` If you want to audit on a\
    \ version of SQL Server that doesn’t have the columns you need like `client_ip`\
    \ or `host_name`, you can try using extended events for that instead. Chapter\
    \ 7, “Implementing extended events via the GUI,” covers this information.\n\n\
    ## Deleting Audits\n\nTo delete an audit, you can execute the query in Listing\
    \ 5-13.\n\n![](index-92_1.png)\n\n![](index-92_2.png)"
