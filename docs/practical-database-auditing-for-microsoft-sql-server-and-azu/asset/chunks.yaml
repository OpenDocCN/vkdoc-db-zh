  trans: "# 第 6 章 什么是扩展事件？\n\n## 扩展事件用例\n\n以下列表为你介绍了一些使用扩展事件进行审计的场景：\n\n### 审计用户的所有操作\n\
    \n- 要捕获的事件：`rpc_completed` 和 `sql_batch_completed`\n- 全局字段：\n    - `client_app_name`\n\
    \    - `client_hostname`\n    - `database_name`\n    - `server_instance_name`\n\
    \    - `server_principal_name`\n    - `sql_text`\n\n这需要在你选择的每个事件上对 `server_principal_name`\
    \ 设置筛选器。\n\n### 审计特定数据库中的所有活动\n\n- 要捕获的事件：`rpc_completed` 和 `sql_batch_completed`\n\
    - 全局字段：\n    - `client_app_name`\n    - `client_hostname`\n    - `database_name`\n\
    \    - `server_instance_name`\n    - `server_principal_name`\n    - `sql_text`\n\
    \n这需要在你选择的每个事件上对 `database_name` 设置筛选器，但请谨慎使用，因为它会产生大量审计数据。我通常只在试图确认某个数据库是否不再使用时才这样做。\n\
    \n### 审计数据库服务器上的所有活动\n\n- 要捕获的事件：`rpc_completed` 和 `sql_batch_completed`\n- 全局字段：\n\
    \    - `client_app_name`\n    - `client_hostname`\n    - `database_name`\n   \
    \ - `server_instance_name`\n    - `server_principal_name`\n    - `sql_text`\n\n\
    这不需要设置筛选器，但请谨慎使用，因为它会产生大量审计数据。我通常只在试图确认某个 SQL Server 是否不再使用时才这样做。\n\n### 审计使用存储过程或表的所有人\n\
    \n- 要捕获的事件：`rpc_completed`\n- 全局字段：\n    - `client_app_name`\n    - `client_hostname`\n\
    \    - `database_name`\n    - `server_instance_name`\n    - `server_principal_name`\n\
    \    - `sql_text`\n\n这需要在你选择的每个事件上对 `object_name` 设置筛选器。\n\n在下一章中，你将学习如何在 SQL\
    \ Server Management Studio 中设置和配置扩展事件。你还将学习如何查询扩展事件以了解数据库服务器上正在发生的事情。\n\n# 第 7\
    \ 章 通过图形用户界面实现扩展事件\n\n要使扩展事件工作，你需要设置一个会话。第 6 章“什么是扩展事件？”涵盖了构成会话的各个部分。在本章中，你将学习如何在\
    \ SQL Server Management Studio (`SSMS`) 中设置一个扩展事件。\n\n**注意** 仅仅因为你可以审计一切，并不意味着你应该这样做。如果你审计所有任何事情，你将很难从海量数据中梳理出有用信息，并且可能会导致系统出现性能问题。\n\
    \n## 使用“新建会话向导”选项设置扩展事件\n\n`新建会话向导` 将帮助你逐步完成扩展事件的设置。图 7-1 展示了如何在 `SSMS` 中创建扩展事件：在“管理”部分下的“扩展事件”中，右键单击“会话”。在此设置过程中，你将学习如何使用扩展事件审计一个用户。\n\
    \n© Josephine Bush 2022\nJ. Bush, *Microsoft SQL Server 和 Azure SQL 实用数据库审计指南*,\
    \ [`doi.org/10.1007/978-1-4842-8634-0_7`](https://doi.org/10.1007/978-1-4842-8634-0_7#DOI)\n\
    \n![](img/index-112_1.png)\n\n***图 7-1.** 使用新建会话向导创建扩展事件*\n\n**注意** 并非所有扩展事件选项都在\
    \ `新建会话向导` 中可用；大部分都有，但并非全部。如果你想查看所有可用选项，请改用 `新建会话` 选项。\n\n选择 `新建会话向导` 后，你将看到一个对话框，它会引导你逐步填写扩展事件的详细信息和选项，如图\
    \ 7-2 所示。\n\n![](img/index-113_1.png)\n\n***图 7-2.** 新建会话向导介绍屏幕*\n\n`介绍` 屏幕为你概述了如何使用扩展事件。单击\
    \ `下一步` 将带你进入第一个配置屏幕，即 `设置会话属性`。"
- fmt: '# Chapter 7. Implementing Extended Events via the GUI


    This chapter describes using the graphical user interface (GUI) to configure Extended
    Events.


    Shown in Figure [7-3](#index_split_001.html#p114), this screen requires you to
    name your extended event session. You can also choose whether you want it to start
    the session at server startup. I recommend you check this box; otherwise, your
    extended event will be stopped on a restart, and you will have to manually start
    it.


    ![](index-114_1.png)


    ***Figure 7-3.** New Session Wizard Set Session Properties screen*


    ## Set Session Properties


    After you click **Next** on the **Set Session Properties** screen, you will see
    the **Choose Template** screen as shown in Figure [7-4](#index_split_001.html#p115).
    I’ve chosen **Do not use a template** because I want to capture all the activity
    from one user, and most of these templates won’t accomplish that. Chapter 6, "What
    Is Extended Events?", covers a bit more on templates.


    ![](index-115_1.png)


    ***Figure 7-4.** New Session Wizard Choose Template screen*


    ## Choose Template


    After you click **Next** on the **Choose Template** screen, you will see the **Select
    Events to Capture** screen as shown in Figure [7-5](#index_split_001.html#p116).
    On this screen, you will choose `rpc_completed` and `sql_batch_completed`. These
    events are covered in more detail in Chapter 6, "What Is Extended Events?". You
    can search for each of these events in the `Event Library` text box. Select them,
    and then click the right arrow (`>`) to move them to the **Selected events** panel.


    ![](index-116_1.png)


    ***Figure 7-5.** New Session Wizard Select Events To Capture screen*


    ## Select Events to Capture


    After clicking **Next** on the **Select Events to Capture** screen, you will see
    the **Capture Global Fields** screen as shown in Figure [7-6](#index_split_001.html#p117).
    When you first come to this screen, nothing will be checked. At this point, you
    must select the global fields you want to collect for each of your selected events.


    ![](index-117_1.png)


    ***Figure 7-6.** New Session Wizard Capture Global Fields screen*


    ## Capture Global Fields


    I recommend using these global fields to capture the information you will need
    for your event:

    *   `client_app_name`

    *   `client_hostname`

    *   `database_name`

    *   `server_instance_name`

    *   `server_principal_name`

    *   `sql_text`


    These global fields are covered in more detail in Chapter 6, "What Is Extended
    Events?".


    If you don’t select any global fields, your extended event will still collect
    event data, but it may not include everything you may want to see associated with
    that event. This is why I like to select specific global fields to ensure I’m
    getting the global fields I need.


    ## Set Session Event Filters


    After clicking **Next** on the **Capture Global Fields** screen, you will see
    the **Set Session Event Filters** screen as shown in Figure [7-7](#index_split_001.html#p118).
    When this screen loads, there will be no filters set. This is where you can filter
    your extended events to capture only certain users, databases, objects, and many
    more. I’ve set a filter on `sqlserver.session_server_principal = sa`. This will
    ensure only actions taken by `sa` will be audited. Of course, you may want or
    need to audit different users or objects. You can add multiple filters by adding
    another line on this screen also shown in Figure [7-7](#index_split_001.html#p118).


    ***Figure 7-7.** New Session Wizard Set Session Event Filters screen*


    If you want a different operator than equal (`=`), you can click the **Operator**
    drop-down and see all the different choices as shown in Figure [7-8](#index_split_001.html#p119).
    You can think of this like a `WHERE` clause in a SQL query.


    ![](index-119_1.png)


    ***Figure 7-8.** New Session Wizard Set Session Event Filters Operator drop-down*


    You can have multiple filters. For example, you could add another filter on `sqlserver.session_server_principal`.'
