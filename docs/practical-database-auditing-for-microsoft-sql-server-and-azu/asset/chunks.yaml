    ## What’s in This Book?


    This book gives you concrete examples of how auditing can make your life easier.


    You aren’t in the dark after setting up auditing. I set up auditing at my current
    job because I got tired of people blaming problems on database changes. I had
    no idea if there were any changes at all because I wasn’t auditing. Now, I can
    say exactly what changed and work with users to determine if this change broke
    something.


    This book gives you a high-level overview of why you need auditing and what types
    of auditing exist. It goes into detail on the types of auditing available in SQL
    Server, Azure SQL, and AWS RDS SQL Server. You will learn how to use SQL Server
    Audit and extended events to track changes to schema, security, and configurations.
    Not all changes can be captured with these features, so the book covers other
    features like change data capture (CDC), temporal tables, and common criteria
    compliance.


    Next, the book covers auditing methods in both Azure SQL Database and Azure SQL
    Managed Instance. There are differences in how you audit those compared to SQL
    Server. Additionally, you will learn how to use SQL Server Audit and extended
    events in AWS RDS SQL Server.


    After reading this book, you will have many use cases and scripts at your disposal
    to help you implement your auditing strategy.


    xvii


    # InTroduCTIon


    ### Intended Audience


    For database administrators who need to know what’s changing on their database
    servers, and who are making those changes. For database-savvy DevOps engineers
    and developers who are charged with troubleshooting processes and applications.
    For developers and administrators who are responsible for generating reports in
    support of regulatory compliance reporting and auditing.


    ### Contacting the Author


    I tried to ensure the accuracy of all the scripts and descriptions. I know there
    may be issues that come up anyway. Feel free to email me at hellosqlkitty@gmail.com
    with comments or questions.


    xviii


    # CHAPTER 1


    ## Why Auditing Is Important


    *Auditing* is an official examination and verification of accounts or records.
    A lot of times people are referring to financial audits, but auditing applies
    in many more areas than finance. Here in America when people hear auditing, their
    first natural thought might be the Internal Revenue Service (IRS). Pretty much
    everyone feels queasy if the IRS contacts them because they are being audited.
    It happened to me one time, and the auditor said, “Hold on, we think we owe you
    money!” When you are audited, it’s the assumption that it will end up costing
    you.


    There is also the kind of auditing when internal or external auditors come speak
    to you to find out if you are following proper procedures. Those can be scary,
    too, so it’s no wonder auditing may have a bad reputation. Auditing in and of
    itself isn’t a bad thing. I would say, it’s a good thing. You want to make sure
    people are following proper procedures. Whether it’s the IRS or auditors at your
    company, some rules, regulations, procedures, and laws need to be followed. Sometimes,
    there need to be consequences to ensure compliance.


    The point of auditing isn’t to punish people or get people in trouble, at least
    not with the database auditing I will be discussing throughout this book. It’s
    to shed light on possible issues or areas where you may need to follow guidelines
    more strictly.


    ### Why Should You Audit?


    Some companies may not value auditing and some are required to audit because of
    regulations. Even if your company isn’t required to audit, that shouldn’t stop
    you from auditing. There is value in auditing: it allows those who have the responsibility
    to know what’s going on the ability to know what’s going on.


    The reason I set up auditing at the business I worked at was because I would often
    have people come to me saying something is broken, and they couldn’t figure out
    why. We also had many environments where too many people have access to and can


