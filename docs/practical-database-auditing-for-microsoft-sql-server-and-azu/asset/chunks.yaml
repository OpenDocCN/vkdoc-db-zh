    # Chapter 13 Auditing Azure SQL Databases


    You can enable auditing at both the server level and the database level. This
    will cause duplicate audit data. I enable it at the server level because I want
    to see audit data for all my databases.


    **Note** Auditing is available in pricing tiers.


    By default, Azure auditing will capture everything happening on your Azure SQL
    databases. This can create a lot of audit data. I will show you how to modify
    the default policy. This way, you can specify what you do and don’t want to be
    audited. First, let’s take a look at how you enable auditing.


    ## Enabling and Configuring Auditing


    Figure 13-1 shows you how to enable auditing at the server level. To access the
    auditing page, you will need to navigate to the SQL Server for your databases,
    and then click Auditing in the menu on the left side of the page.


    ***Figure 13-1.** Enabling server-level auditing in Azure SQL*


    ![ ](index-216_1.png)


    ![ ](index-216_2.png)


    Once you are on the Auditing page, you will see a radio button. It will be set
    to off, and you need to turn it on to enable the auditing as shown in Figure 13-1.


    You will see multiple choices for where you can store the audit data as shown
    in Figure 13-2.


    ***Figure 13-2.** Audit log destinations for Azure SQL auditing*


    You can choose one or more of these options to store your audit data. If you store
    audit data in multiple locations, you will be charged for that data in multiple
    locations. I recommend you pick your favorite one.


    You can also audit Microsoft support operations as shown in Figure 13-3.


    ***Figure 13-3.** Auditing Microsoft support operations*


    You can choose to enable this and store it in the same or a different location
    than your other audit data. I tend to enable this and store it in the same location
    as my audit data to make it easy to query everything in one place.


    For audit log destination, you have three options:


    *   **Storage** – This means a storage account. Your files will be stored in `.xel`
    format in a folder structure. For more information, visit [https://docs.microsoft.com/en-us/azure/azure-sql/database/auditing-overview?view=azuresql#audit-storage-destination](https://docs.microsoft.com/en-us/azure/azure-sql/database/auditing-overview?view=azuresql#audit-storage-destination).

    *   **Log Analytics** – This option stores all your audit data in a Log Analytics
    workspace where you can query it with Kusto Query Language (`Kusto`).

    *   **Event Hub** – You need to set up a stream to consume events and write them
    to a target. They are stored using JSON formatting. For more information, visit
    [https://docs.microsoft.com/en-us/azure/azure-sql/database/auditing-overview?view=azuresql#audit-event-hub-destination](https://docs.microsoft.com/en-us/azure/azure-sql/database/auditing-overview?view=azuresql#audit-event-hub-destination).


    My favorite is Log Analytics, and at first, it might not seem like the easiest
    choice because you have to learn `Kusto`, but `Kusto` is easy to learn if you
    already know `SQL`. Plus, it makes it easy to centralize and report on your audit
    data. This is because you can store most, if not all, of your audit data in the
    same Log Analytics workspace.'
