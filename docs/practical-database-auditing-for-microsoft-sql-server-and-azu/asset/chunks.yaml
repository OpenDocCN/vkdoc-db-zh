  trans: "\n# 第三章 什么是 SQL Server 审计？\n\n## 针对不同场景的审计规范\n\n*   **审计特定用户执行的所有操作**\n\
    \    *   **审计规范名称** – `Audit_user`\n        确保筛选审计规范，使其仅捕获该用户账户执行的操作。\n    * \
    \  **服务器审计规范名称** – `ServerAudit_user`\n        确保以相同方式审计所有数据库和服务器级别的操作，并添加 `DATABASE_OBJECT_ACCESS_GROUP`\
    \ 和 `SCHEMA_OBJECT_ACCESS_GROUP` 操作。\n\n*   **审计特定数据库的架构和权限更改**\n    *   **审计规范名称**\
    \ – `Audit_DatabaseChanges`\n    *   **数据库审计规范名称** – `DatabaseAudit_DatabaseChanges`\n\
    \        确保将所有以 `DATABASE` 和 `SCHEMA` 开头的审计操作添加到你的数据库审计规范中。\n\n*   **审计所有人对表的更改**\n\
    \    *   **审计规范名称** – `Audit_tblChanges`\n    *   **数据库审计规范名称** – `DatabaseAudit_tblChanges`\n\
    \        确保使用 `INSERT`、`UPDATE`、`DELETE`、`SELECT` 和/或 `EXECUTE` 这些审计操作类型。\n\n\
    在下一章中，你将学习如何在 SQL Server Management Studio 中设置和配置这些审计。\n\n# 第四章 通过 GUI 实现 SQL\
    \ Server 审计\n\n要使 SQL Server 审计功能正常工作，根据你想要审计的内容，你需要两到三个组件。第三章“什么是 SQL Server\
    \ 审计？”已介绍了这些组件各自是什么，以及与之相关的审计类别和组。\n\n在本章中，你将学习如何在 SQL Server Management Studio\
    \ (`SSMS`) 中设置审计。\n\n## 设置审计\n\n简要回顾一下，要使 SQL Server 审计正常工作，根据你想要审计的内容，你需要两到三样东西。\n\
    \n*   你需要创建一个审计。这将决定审计数据的存储位置、保留多少审计数据以及与审计相关的若干其他设置。\n*   你还需要一个服务器和/或一个数据库审计来收集审计数据。服务器和数据库审计必须与一个审计相关联。每个审计可以为每个数据库包含一个服务器审计和一个数据库审计。这些服务器和数据库审计彼此不依赖。服务器审计规范通常适用于审计服务器级别的更改和/或同时审计所有数据库。数据库审计规范则适用于审计单个数据库或单个数据库中的活动子集。\n\
