  trans: "# 第 11 章 集中审计数据\n\n您不必使用 `_servername` 来命名审计。这只是我个人选择的方式。如果您愿意，可以采用不同的命名方式，但我倾向于这样命名，以便在跨多个服务器查询系统表时能够区分它们。\n\
    \n## 创建集中审计数据库和用户\n\n在您选作集中审计数据库服务器的服务器上，需要如**清单 11-4**所示设置审计数据库。\n\n### 清单 11-4.\
    \ 设置审计数据库\n\n```\nCREATE DATABASE [Auditing];\n```\n\n接下来，您需要创建一个表来存储审计数据，如**清单\
    \ 11-5**所示。\n\n### 清单 11-5. 设置审计表\n\n```\nUSE [Auditing];\n\nCREATE TABLE [dbo].AuditChanges\
    \ NOT NULL,\n    [statement] nvarchar NULL,\n    [server_instance_name] nvarchar\
    \ NULL,\n    [database_name] nvarchar NULL,\n    [schema_name] nvarchar NULL,\n\
    \    [session_server_principal_name] nvarchar NULL,\n    [server_principal_name]\
    \ nvarchar NULL,\n    [object_Name] nvarchar NULL,\n    [file_name] nvarchar NOT\
    \ NULL,\n    [client_ip] nvarchar NULL,\n    [application_name] nvarchar NULL,\n\
    \    [host_name] nvarchar NULL,\n    [succeeded] [bit] NULL,\n    [audit_action]\
    \ nvarchar NULL\n) ON [PRIMARY];\n\nCREATE CLUSTERED INDEX [CIX_EventTime_User_Server_DB]\
    \ ON [dbo].[AuditChanges]\n(\n    [event_time] ASC\n)WITH (PAD_INDEX = OFF, STATISTICS_NORECOMPUTE\
    \ = OFF, SORT_IN_TEMPDB = OFF,\n       DROP_EXISTING = OFF, ONLINE = OFF, ALLOW_ROW_LOCKS\
    \ = ON, ALLOW_PAGE_LOCKS = ON) ON [PRIMARY];\n```\n\n然后，您需要一个拥有审计数据库权限的审计用户，如**清单\
    \ 11-6**所示。这样，被审计服务器上的链接服务器才能访问审计数据库。\n\n### 清单 11-6. 设置审计用户\n\n```\nUSE [master];\n\
    \nCREATE LOGIN [sqlauditing] WITH PASSWORD=N'testing1234!',\nDEFAULT_DATABASE=[master],\
    \ CHECK_EXPIRATION=OFF, CHECK_POLICY=ON;\n\nUSE [Auditing];\n\nCREATE USER [sqlauditing]\
    \ FOR LOGIN [sqlauditing];\n\nALTER ROLE [db_datareader] ADD MEMBER [sqlauditing];\n\
    ALTER ROLE [db_datawriter] ADD MEMBER [sqlauditing];\n```\n\n**注意** 要设置**清单 11-6**中的\
    \ `sqlauditing` 用户，需要将服务器身份验证设置为“SQL Server 和 Windows 身份验证模式”。有关身份验证方法的更多信息，请访问\
    \ https://docs.microsoft.com/zh-cn/sql/relational-databases/security/choose-an-authentication-mode?view=sql-server-ver16。\n\
    \n请务必将脚本中的密码从其默认值 `‘testing1234!’` 更新为您选择的密码。\n\n## 创建链接服务器\n\n您需要在每个被审计的服务器上设置一个链接服务器，以将审计数据发送到集中服务器。**清单\
    \ 11-7**提供了创建此链接服务器的脚本。\n\n### 清单 11-7. 设置链接服务器\n\n```\nUSE [master];\n\nEXEC\
    \ master.dbo.sp_addlinkedserver @server = N'YourCentralizedAuditServerName', @srvproduct=N'SQL\
    \ Server';\n\nEXEC master.dbo.sp_addlinkedsrvlogin @rmtsrvname = N'YourCentralizedAuditServerName',\
    \ @locallogin = NULL , @useself = N'False',\n@rmtuser = N'sqlauditing', @rmtpassword\
    \ = N'CreateStrongPasswordHere';\n```\n\n请务必将 `@server` 变量的值更新为您的中央服务器名称。同时，务必将\
    \ `@rmtpassword` 更新为您为 `sqlauditing` 用户设置的密码。\n\n## 用于收集和清理审计数据的 SQL Agent 作业\n\
    \n您需要在每个被审计的服务器上设置一个 SQL Server Agent 作业，以将审计数据发送到集中服务器。"
- fmt: '# Chapter 11 Centralizing audit data


    ## Listing 11-8. SQL Agent job to collect audit data


    ```sql

    DECLARE @CentralServerName varchar(100);

    DECLARE @AuditFilePath varchar(250);


    /* CHANGE ONLY THESE TWO VARIABLES */

    SET @CentralServerName = ''yourcentralservername'';

    SET @AuditFilePath = ''e:\sqlaudit\*.sqlaudit'';


    /*

    DON''T CHANGE ANYTHING BELOW HERE UNLESS YOU ARE ON A SQL SERVER OLDER

    THAN 2019

    */


    DROP TABLE IF EXISTS ##tempvariables;


    DECLARE @sql varchar(max);


    SET @sql = N''INSERT INTO '' + @CentralServerName + ''.Auditing.dbo.

    AuditChanges

    SELECT DATEADD(mi, DATEPART(TZ, SYSDATETIMEOFFSET()), event_time) as

    event_time, statement,

    server_instance_name, database_name, schema_name, session_server_

    principal_name,

    server_principal_name, object_Name, file_name, client_ip,

    application_name,

    host_name, succeeded, aa.name AS audit_action

    FROM sys.fn_get_audit_file (''''''+@AuditFilePath+'''''',default,

    default) af

    INNER JOIN sys.dm_audit_actions aa

    ON aa.action_id = af.action_id

    Chapter 11 Centralizing audit data

    WHERE DATEADD(mi, DATEPART(TZ, SYSDATETIMEOFFSET()), event_time) >

    DATEADD(HOUR, -4, GETDATE());'';


    SELECT @CentralServerName AS servername,

    @AuditFilePath as auditfilepath, @sql as stepsql

    into ##tempvariables;


    USE [msdb]

    GO


    BEGIN TRANSACTION

    DECLARE @ReturnCode INT

    SELECT @ReturnCode = 0


    IF NOT EXISTS (SELECT name FROM msdb.dbo.syscategories WHERE

    name=N''[Uncategorized (Local)]'' AND category_class=1)

    BEGIN

    EXEC @ReturnCode = msdb.dbo.sp_add_category @class=N''JOB'', @type=N''LOCAL'',

    @name=N''[Uncategorized (Local)]''

    IF (@@ERROR <> 0 OR @ReturnCode <> 0) GOTO QuitWithRollback

    END


    DECLARE @jobId BINARY(16)

    EXEC @ReturnCode = msdb.dbo.sp_add_job @job_name=N''Audit Changes

    Collection'',

    @enabled=1,

    @notify_level_eventlog=0,

    @notify_level_email=0,

    @notify_level_netsend=0,

    @notify_level_page=0,

    @delete_level=0,

    @description=N''No description available.'',

    @category_name=N''[Uncategorized (Local)]'',

    @owner_login_name=N''sa'', @job_id = @jobId OUTPUT

    IF (@@ERROR <> 0 OR @ReturnCode <> 0) GOTO QuitWithRollback


    DECLARE @stepsql varchar(max);

    SET @stepsql = (SELECT stepsql from ##tempvariables);


    EXEC @ReturnCode = msdb.dbo.sp_add_jobstep @job_id=@jobId,

    @step_name=N''audit sql server changes'',

    Chapter 11 Centralizing audit data

    @step_id=1,

    @cmdexec_success_code=0,

    @on_success_action=1,

    @on_success_step_id=0,

    @on_fail_action=2,

    @on_fail_step_id=0,

    @retry_attempts=3,

    @retry_interval=3,

    @os_run_priority=0, @subsystem=N''TSQL'',

    @command=@stepsql,

    @database_name=N''master'',

    @flags=0

    IF (@@ERROR <> 0 OR @ReturnCode <> 0) GOTO QuitWithRollback


    EXEC @ReturnCode = msdb.dbo.sp_update_job @job_id = @jobId,

    @start_step_id = 1

    IF (@@ERROR <> 0 OR @ReturnCode <> 0) GOTO QuitWithRollback


    EXEC @ReturnCode = msdb.dbo.sp_add_jobschedule @job_id=@jobId,

    @name=N''every 4 hours get audit into from sqlaudit files on disk'',

    @enabled=1,

    @freq_type=4,

    @freq_interval=1,

    @freq_subday_type=8,

    @freq_subday_interval=4,

    @freq_relative_interval=0,

    @freq_recurrence_factor=0,

    @active_start_date=20190812,

    @active_end_date=99991231,

    @active_start_time=0,

    @active_end_time=235959,

    @schedule_uid=N''c68b91ed-4f7f-4fe4-874a-670982cb20cb''

    IF (@@ERROR <> 0 OR @ReturnCode <> 0) GOTO QuitWithRollback


    EXEC @ReturnCode = msdb.dbo.sp_add_jobserver @job_id = @jobId, @server_name =

    N''(local)''

    IF (@@ERROR <> 0 OR @ReturnCode <> 0) GOTO QuitWithRollback


    COMMIT TRANSACTION

    Chapter 11 Centralizing audit data

    GOTO EndSave


    QuitWithRollback:

    IF (@@TRANCOUNT > 0) ROLLBACK TRANSACTION


    EndSave:

    GO

    ```


    确保在清单 11-8 的脚本顶部设置你的`@CentralServerName`和`@AuditFilePath`变量。对于 SQL Server 2019，不要更改`@sql`变量。此作业将从一台服务器收集审计数据，并每四小时发送到中央服务器一次。


