    ```\n\nIf you already have database mail set up, note the name returned by the\
    \ query in Listing [12-1](#index_split_002.html#p201). You will need this to set\
    \ up the agent job later in this chapter.\n\nIf you don’t already have database\
    \ mail set up, you will need to enable Database Mail XPs using the script in Listing\
    \ [12-2](#index_split_002.html#p202). Note that you will need to set `show advanced\
    \ options` to 1 before enabling database mail.\n\n© Josephine Bush 2022\n\nJ.\
    \ Bush, *Practical Database Auditing for Microsoft SQL Server and Azure SQL*,\
    \ [https://doi.org/10.1007/978-1-4842-8634-0_12](https://doi.org/10.1007/978-1-4842-8634-0_12#DOI)\n\
    \nChapter 12 Create reports From audit data\n\n## ***Listing 12-2.*** Enabling\
    \ database mail\n\n```sql\nUSE master\nGO\nsp_configure 'show advanced options',1\n\
    reconfigure\nGO\nsp_configure 'Database Mail XPs',1\nreconfigure\nGO\n```\n\n\
    Now that you’ve enabled database mail, you need to configure it. Listing [12-3](#index_split_002.html#p202)\
    \ gives you a script to configure it.\n\n## ***Listing 12-3.*** Configuring database\
    \ mail\n\n```sql\nDECLARE @profilename varchar(30);\nDECLARE @emailaddress varchar(100);\n\
    DECLARE @displayname varchar(50);\nDECLARE @mailserver varchar(50);\n\n/* CHANGE\
    \ ONLY THESE FOUR VARIABLES */\nSET @profilename = 'yourdbmailprofilename';\n\
    SET @emailaddress = 'youremail@domain.com';\nSET @displayname = 'yourservername\
    \ SQL Server Alerting';\nSET @mailserver = 'smtp.domain.com';\n\nIF NOT EXISTS(SELECT\
    \ * FROM msdb.dbo.sysmail_profile WHERE name =\n'yourdbmailprofilename')\nBEGIN\n\
    \    EXECUTE msdb.dbo.sysmail_add_profile_sp\n        @profile_name = @profilename,\n\
    \        @description = '';\nEND\n\nIF NOT EXISTS(SELECT * FROM msdb.dbo.sysmail_account\n\
    \              WHERE name = @profilename)\nBEGIN\n    EXECUTE msdb.dbo.sysmail_add_account_sp\n\
    \        @account_name = @profilename,\n        @email_address = @emailaddress,\n\
    \        @display_name = @displayname,\n        @replyto_address = @emailaddress,\n\
    \        @description = '',\n        @mailserver_name = @mailserver,\n       \
    \ @mailserver_type = 'SMTP',\n        @port = '25',\n        @username = NULL\
    \ ,\n        @password = NULL ,\n        @use_default_credentials = 0 ,\n    \
    \    @enable_ssl = 0 ;\nEND\n\nIF NOT EXISTS(SELECT *\n              FROM msdb.dbo.sysmail_profileaccount\
    \ pa\n              INNER JOIN msdb.dbo.sysmail_profile p\n                  ON\
    \ pa.profile_id = p.profile_id\n              INNER JOIN msdb.dbo.sysmail_account\
    \ a\n                  ON pa.account_id = a.account_id\n              WHERE p.name\
    \ = @profilename\n                  AND a.name = @profilename)\nBEGIN\n    EXECUTE\
    \ msdb.dbo.sysmail_add_profileaccount_sp\n        @profile_name = @profilename,\n\
    \        @account_name = @profilename,\n        @sequence_number = 1 ;\nEND\n\
    ```\n\nYou only need to update the variables at the top of the script in Listing\
    \ [12-3](#index_split_002.html#p202):\n\n- `@profilename` – This is what you want\
    \ your database mail profile to be named.\n- `@emailaddress` – This will be the\
