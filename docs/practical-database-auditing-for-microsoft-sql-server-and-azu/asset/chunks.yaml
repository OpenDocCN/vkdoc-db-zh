    event loss. If the system is really busy, this will tell it whether it’s


    acceptable to lose some or no event data.


    • **Single event loss** – This means SQL Server will lose one event if


    the system is too busy to audit with extended events at that time.


    • **Multiple event loss** – This means SQL Server will lose multiple


    events if the system is too busy to audit with extended events at


    that time.


    • **No event loss (not recommended)** – This won’t lose any events,


    but can overload your system especially if it’s busy. This is why it’s


    not recommended.


    • **Maximum dispatch latency** – This flushes memory to the target at a


    specified interval.


    • **In seconds** – This will flush the memory at the specified interval


    in seconds.


    • **Unlimited** – This will only flush the memory once the buffer


    is full.


    • **Max memory sizes** – It’s best to keep this at the default of 4 MB. The max


    can’t exceed 2 GB, but it’s not recommended to set this in the GB range.


    • **Max event size** – It’s best to keep this as the default value of 0.


    Specifies the maximum allowable size for events.


    • **Memory partition mode** – Specifies the location where event buffers


    are created.


    **Note** For more information about advanced settings, [please visit https://](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-event-session-transact-sql?view=sql-server-ver15#with--event_session_options--n-)


    [docs.microsoft.com/en-us/sql/t-sql/statements/create-event-](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-event-session-transact-sql?view=sql-server-ver15#with--event_session_options--n-)


    [session-transact-sql?view=sql-server-ver15#with--event_](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-event-session-transact-sql?view=sql-server-ver15#with--event_session_options--n-)


    [session_options--n-](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-event-session-transact-sql?view=sql-server-ver15#with--event_session_options--n-)


    Again, it’s best to leave these advanced settings at the defaults to avoid issues
    with'
  trans: "\n以内存先进先出的方式进行。当您停止事件会话时，存储的输出将被丢弃。\n\n`注意` 有关目标的更多信息，请访问 [`docs.microsoft.com/en-us/sql/relational-databases/extended-events/targets-for-extended-events-in-sql-server?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/relational-databases/extended-events/targets-for-extended-events-in-sql-server?view=sql-server-ver15)\n\
    \n![](img/index-107_1.png)\n\n## 第 6 章 什么是扩展事件？\n\n如何使用 `event_file` 目标设置扩展事件将在[第\
    \ 7 章](https://doi.org/10.1007/978-1-4842-8634-0_7) \"通过 GUI 实现扩展事件\"中介绍。\n\n\
    ### 扩展事件高级设置\n\n在扩展事件会话设置的 `高级` 页面上有一些附加设置。这些设置只能在您首次设置扩展事件时更改，之后无法修改。如果您以后需要更改它们，则必须删除并重新创建扩展事件。我从不更改这些设置。如果您决定更改这些设置，请务必非常小心，因为不同的设置可能会导致您的\
    \ SQL Server 出现性能问题。\n\n图 6-15 显示了 `高级` 页面中的设置。这些是默认设置。\n\n***图 6-15.** 扩展事件的高级选项*\n\
    \n您有几个高级选项。最好保留这些选项的默认值，但以下是一些描述，以帮助您理解每个选项的含义。\n\n- `事件保留模式` – 这将决定 SQL Server\
    \ 如何处理事件丢失。如果系统非常繁忙，这会告诉它是否可以接受丢失部分或全部事件数据。\n  - `单个事件丢失` – 这意味着如果系统当时过于繁忙而无法使用扩展事件进行审计，SQL\
    \ Server 将丢失一个事件。\n  - `多个事件丢失` – 这意味着如果系统当时过于繁忙而无法使用扩展事件进行审计，SQL Server 将丢失多个事件。\n\
    \  - `无事件丢失（不推荐）` – 这不会丢失任何事件，但可能会使您的系统过载，尤其是在繁忙时。这就是它不被推荐的原因。\n- `最大分发延迟` – 这会按照指定的间隔将内存刷新到目标。\n\
    \  - `以秒为单位` – 将按照指定的秒数间隔刷新内存。\n  - `无限制` – 仅在缓冲区满时才刷新内存。\n- `最大内存大小` – 最好将其保留为默认的\
    \ 4 MB。最大值不能超过 2 GB，但不建议将其设置在 GB 范围。\n- `最大事件大小` – 最好保留其默认值 0。指定事件允许的最大大小。\n-\
    \ `内存分区模式` – 指定创建事件缓冲区的位置。\n\n`注意` 有关高级设置的更多信息，[请访问 https://docs.microsoft.com/en-us/sql/t-sql/statements/create-event-session-transact-sql?view=sql-server-ver15#with--event_session_options--n-](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-event-session-transact-sql?view=sql-server-ver15#with--event_session_options--n-)\n\
    \n再次强调，最好将这些高级设置保留为默认值，以避免出现问题。\n"
- fmt: "# ChApTER 6 WhAT IS ExTENdEd EVENTS?\n\n## Extended Events Use Cases\n\nThe\
    \ following list takes you through some scenarios for auditing with extended events:\n\
    \n### Audit everything a user does\n\n- Events to capture: `rpc_completed` and\
    \ `sql_batch_completed`\n- Global fields:\n    - `client_app_name`\n    - `client_hostname`\n\
    \    - `database_name`\n    - `server_instance_name`\n    - `server_principal_name`\n\
    \    - `sql_text`\n\nThis requires a filter on `server_principal_name` for each\
    \ of your selected events.\n\n### Audit everything happening in a specific database\n\
    \n- Events to capture: `rpc_completed` and `sql_batch_completed`\n- Global fields:\n\
    \    - `client_app_name`\n    - `client_hostname`\n    - `database_name`\n   \
    \ - `server_instance_name`\n    - `server_principal_name`\n    - `sql_text`\n\n\
    This requires a filter on `database_name` for each of your selected events, but\
    \ be careful with this because it can create a lot of audit data. I usually only\
    \ use this if I’m trying to figure out if a database is no longer used.\n\n###\
    \ Audit everything happening on the database server\n\n- Events to capture: `rpc_completed`\
    \ and `sql_batch_completed`\n- Global fields:\n    - `client_app_name`\n    -\
    \ `client_hostname`\n    - `database_name`\n    - `server_instance_name`\n   \
    \ - `server_principal_name`\n    - `sql_text`\n\nThis does not require a filter,\
    \ but be careful with this because it can create a lot of audit data. I usually\
    \ only do this if I’m trying to figure out if a SQL Server is no longer used.\n\
    \n### Audit everyone using a stored procedure or table\n\n- Events to capture:\
    \ `rpc_completed`\n- Global fields:\n    - `client_app_name`\n    - `client_hostname`\n\
    \    - `database_name`\n    - `server_instance_name`\n    - `server_principal_name`\n\
    \    - `sql_text`\n\nThis requires a filter on `object_name` for each of your\
    \ selected events.\n\nIn the next chapter, you will learn how to set up and configure\
    \ extended events in SQL Server Management Studio. You also learn how to query\
    \ extended events to find out what’s happening on your database server.\n\n# CHAPTER\
    \ 7 Implementing Extended Events via the GUI\n\nTo make extended events work,\
    \ you need to set up a session. Chapter 6, “What Is Extended Events?”, covered\
    \ the parts and pieces that comprise a session. In this chapter, you will learn\
    \ how to set up an extended event in SQL Server Management Studio (`SSMS`).\n\n\
    **Caution** Just because you can audit everything, doesn’t mean that you should.\
    \ If you audit everything and anything, you will have a hard time weeding through\
    \ it all, and you could cause performance issues on your system.\n\n## Setting\
    \ Up an Extended Event via the New Session Wizard Option\n\nThe `New Session Wizard`\
    \ will help to walk you through the setup of your extended event. Figure 7-1 shows\
    \ how to create an extended event in `SSMS` by right-clicking `Sessions` under\
    \ the `Extended Events` section in the `Management` section. During this setup,\
    \ you will learn how to audit one user with extended events.\n\n© Josephine Bush\
    \ 2022\nJ. Bush, *Practical Database Auditing for Microsoft SQL Server and Azure\
    \ SQL*, [https://doi.org/10.1007/978-1-4842-8634-0_7](https://doi.org/10.1007/978-1-4842-8634-0_7#DOI)\n\
    \n![](index-112_1.png)\n\n***Figure 7-1.** Creating an extended event with the\
    \ New Session Wizard*\n\n**Note** Not all extended event options are available\
    \ in the `New Session Wizard`; most are, but not all. If you want to see all available\
    \ options, use the `New Session` option instead.\n\nBy choosing `New Session Wizard`,\
    \ you will get a dialog box that takes you step by step through filling out the\
    \ details and options of your extended event as shown in Figure 7-2.\n\n![](index-113_1.png)\n\
    \n***Figure 7-2.** New Session Wizard Introduction screen*\n\nThe `Introduction`\
    \ screen gives you an overview of how you can use extended events. Clicking `Next`\
    \ will bring you to the first configuration screen, `Set Session Properties`."
