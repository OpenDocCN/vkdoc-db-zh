- fmt: '## Appendix A: Database Auditing Options Comparison


    specification. For more information, review [Chapter 4](https://doi.org/10.1007/978-1-4842-8634-0_4),
    “Implementing SQL Server Audit via the GUI,” and [Chapter 5](https://doi.org/10.1007/978-1-4842-8634-0_5),
    “Implementing SQL Server Audit via SQL Scripts.”


    *   **Extended events** – Capture `rpc_completed` and `sql_batch_completed`. Plus,
    put a filter on `server_principal_name` for each of your selected events. For
    more information, review [Chapter 7](https://doi.org/10.1007/978-1-4842-8634-0_7),
    “Implementing Extended Events via the GUI,” and [Chapter 8](https://doi.org/10.1007/978-1-4842-8634-0_8),
    “Implementing Extended Events via SQL Scripts.”

    *   **Everyone executing a stored procedure**


    ### SQL Server Audit

    This will require an audit and a database audit specification that captures `execute`
    on your stored procedure. For more information, review [Chapter 4](https://doi.org/10.1007/978-1-4842-8634-0_4),
    “Implementing SQL Server Audit via the GUI,” and [Chapter 5](https://doi.org/10.1007/978-1-4842-8634-0_5),
    “Implementing SQL Server Audit via SQL Scripts.”


    ### Extended events

    Capture `rpc_completed` with a filter on `object_name`. For more information,
    review [Chapter 7](https://doi.org/10.1007/978-1-4842-8634-0_7), “Implementing
    Extended Events via the GUI,” and [Chapter 8](https://doi.org/10.1007/978-1-4842-8634-0_8),
    “Implementing Extended Events via SQL Scripts.”


    ## Appendix A: Database Auditing Options Comparison


    *   **Configuration changes**


    ### SQL Server Audit

    This will require an audit and a database audit specification that captures `execute`
    on `sp_configure`. For more information, review [Chapter 9](https://doi.org/10.1007/978-1-4842-8634-0_9),
    “Tracking SQL Server Configuration Changes.”


    *   **DML changes**


    ### SQL Server Audit

    If you don’t need to track the actual data changes themselves, but the DML statement
    itself. This will require an audit and a database audit specification that captures
    `INSERT`, `UPDATE`, and/or `DELETE` on each table you want to audit. For more
    information, review [Chapter 4](https://doi.org/10.1007/978-1-4842-8634-0_4),
    “Implementing SQL Server Audit via the GUI,” and [Chapter 5](https://doi.org/10.1007/978-1-4842-8634-0_5),
    “Implementing SQL Server Audit via SQL Scripts.”


    ### Change tracking

    If an application needs to track whether data changed, but not the exact value
    of the data. For more information, review [Chapter 10](https://doi.org/10.1007/978-1-4842-8634-0_10),
    “Additional SQL Server Auditing and Tracking Methods.”


    ### Change data capture

    If you need to track the exact values before and after the data change. For more
    information, review [Chapter 10](https://doi.org/10.1007/978-1-4842-8634-0_10),
    “Additional SQL Server Auditing and Tracking Methods.”


    *   **Successful and failed logins**


    ### SQL Server Audit

    You will need an audit to store the audit data and a server audit specification
    to collect the login information. For more information, review [Chapter 10](https://doi.org/10.1007/978-1-4842-8634-0_10),
    “Additional SQL Server Auditing and Tracking Methods.”


    ### Extended events

    You will need to create a session that uses the `login` event and the `error_reported`
    event. For more information, review [Chapter 10](https://doi.org/10.1007/978-1-4842-8634-0_10),
    “Additional SQL Server Auditing and Tracking Methods.”


    ## Appendix A: Database Auditing Options Comparison


    *   **Audit Azure SQL Database**


    ### Azure SQL Database audit via Azure portal

    This is similar to SQL Server Audit. It makes it easy to centralize audit data
    in a Log Analytics workspace. For more information, review [Chapter 13](https://doi.org/10.1007/978-1-4842-8634-0_13),
    “Auditing Azure SQL Databases.”


    ### Extended events

    This is similar to extended events in SQL Server. The only issue is it’s hard
    to loop through multiple `.xel` files to query all the XEvent data at once. For
    more information, review [Chapter 13](https://doi.org/10.1007/978-1-4842-8634-0_13),
    “Auditing Azure SQL Databases.”


    *   **Audit Azure SQL Managed Instance**'
