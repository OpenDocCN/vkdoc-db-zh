- fmt: "If you try to add another server audit to an existing audit that already has\
    \ a server audit, it will fail with an error that states the audit already exists\
    \ as shown in Figure 5-7. This means you can’t add another server audit to it.\n\
    \n**Figure 5-7.** Error when trying to add a second server audit specification\
    \ to an audit\n\nThat doesn’t stop you from having multiple server and database\
    \ audits because you can have multiple audits. Chapter 3, “What Is SQL Server\
    \ Audit?”, has a section on multiple audit setups and gives you some example scenarios\
    \ you can follow.\n\n## Columns Available in SQL Server Audit\n\nThere are many\
    \ columns available in the audit. These columns are available to you when you\
    \ query or filter the audit. Different versions have different columns available.\
    \ The following list contains the columns I find most useful:\n\n*   **SQL Server\
    \ 2012/2014/2016**\n    *   `event_time`\n    *   `action_id`\n    *   `succeeded`\n\
    \    *   `server_principal_name`\n    *   `server_instance_name`\n    *   `database_name`\n\
    \    *   `schema_name`\n    *   `object_name`\n    *   `statement`\n    *   `file_name`\n\
    *   **SQL Server 2017 – All columns in 2016 and earlier, plus these additional\
    \ columns**\n    *   `client_ip`\n    *   `application_name`\n*   **SQL Server\
    \ 2019 – All columns in 2017 and earlier, plus this additional column**\n    *\
    \   `host_name`\n\n**Note** there are a lot more columns than those in the previous\
    \ list and every version adds new columns. the following links provide more information\
    \ on the columns available in the audit data depending on the location you chose\
    \ to store your audit.\n*   [https://docs.microsoft.com/en-us/sql/relational-databases/security/auditing/sql-server-audit-records?view=sql-server-ver15](https://docs.microsoft.com/en-us/sql/relational-databases/security/auditing/sql-server-audit-records?view=sql-server-ver15)\n\
    *   [https://docs.microsoft.com/en-us/sql/relational-databases/system-functions/sys-fn-get-audit-file-transact-sql?view=sql-server-ver15](https://docs.microsoft.com/en-us/sql/relational-databases/system-functions/sys-fn-get-audit-file-transact-sql?view=sql-server-ver15)\n\
    \n## Querying Audit Logs\n\nYou can query the audit files with a SQL Server system\
    \ function, `sys.fn_get_audit_file`. This will give you a lot of different information\
    \ about your audit and its associated metadata. Listing 5-11 gives you a query\
    \ to get the most relevant columns of the audit returned for the last four hours.\n\
    \n**Listing 5-11.** Query audit logs\n\n```sql\nUSE master;\nSELECT DISTINCT\n\
    \    event_time,\n    aa.name as audit_action,\n    statement,\n    succeeded,\n\
    \    database_name,\n    server_instance_name,\n    schema_name,\n    session_server_principal_name,\n\
    \    server_principal_name,\n    object_Name,\n    file_name,\n    client_ip,\n\
    \    application_name,\n    host_name,\n    file_name\nFROM sys.fn_get_audit_file\
    \ ('E:\\audits\\*.sqlaudit',default,default) af\nINNER JOIN sys.dm_audit_actions\
    \ aa\n    ON aa.action_id = af.action_id\nWHERE event_time > DATEADD(HOUR, -4,\
    \ GETDATE())\nORDER BY event_time DESC;\n```\n\nFigure 5-8 shows you a cross-section\
    \ of the results from the query in Listing 5-11.\n\n![](index-90_1.png)\n\n**Figure\
    \ 5-8.** Audit query results\n\n**Tip** Find out more about `sys.fn_get_audit_file`\
    \ by visiting [https://docs.microsoft.com/en-us/sql/relational-databases/system-functions/sys-fn-get-audit-file-transact-sql?view=sql-server-ver15](https://docs.microsoft.com/en-us/sql/relational-databases/system-functions/sys-fn-get-audit-file-transact-sql?view=sql-server-ver15)"
