    view it later, which will be covered in this chapter. I don’t use causality tracking,
    but it


    can help you determine all the events associated with a query.


    Once you have the General page configured, you can click on the Events page. This
    is


    where you will select your events like rpc_completed and sql_batch_completed,
    covered


    in more detail in Chapt[er 6, “W](https://doi.org/10.1007/978-1-4842-8634-0_6)hat
    Is Extended Events?”, as shown in Figur[e 7-19](#index_split_001.html#p129).


    ![](index-129_1.png)


    ![](index-129_2.jpg)


    Chapter 7 ImplemeNtINg exteNded eveNtS vIa the gUI


    ***Figure 7-19.** New Session Events page*


    Once you add your events to the Selected events, no Global Fields, also known
    as


    Actions, are configured for these events, yet. You can see that under the lightning
    bolt


    icon. It shows 0\. To configure these, you must click Configure.


    Since I’m recommending capturing the same fields for both events, select them
    both


    before clicking Configure as shown in Figur[e 7-20.](#index_split_001.html#p129)


    ***Figure 7-20.** Select both events to configure them the same*


    ![](index-130_1.png)


    Chapter 7 ImplemeNtINg exteNded eveNtS vIa the gUI


    After clicking Configure, you are brought to a configuration page with global
    fields.


    There are default fields included with each event, but I recommend using these
    global


    fields to capture the information you will need for your event:


    • client_app_name


    • client_hostname


    • database_name


    • server_instance_name


    • server_principal_name


