- fmt: 'Chapter 8 Implementing Extended Events via SQL Scripts


    ### Auditing Event Actions (Global Fields)

    `ACTION(sqlserver.client_app_name, sqlserver.client_hostname, sqlserver.database_name,
    sqlserver.server_instance_name, sqlserver.server_principal_name, sqlserver.sql_text)`


    You can add many different types of actions here. These are the actions I use
    for auditing events. There is a longer description of these in Chapter 6, “What
    Is Extended Events?” Each event needs actions associated with it to ensure you
    see the information you need. You can leave off these actions, but then you are
    left with default fields for your events, which may or may not be useful to you.


    ### Filtering Events

    `WHERE ([sqlserver].[server_principal_name]=N''sa''))`


    Filtering is a very important part of auditing. You will want to filter your auditing
    data before it’s written to a file; otherwise, you can get overloaded by too much
    auditing data. I tend to filter on a user or a database. You need to be careful
    auditing an entire database. I usually only do this if I’m trying to determine
    if the database is being used at all, so there will most likely be very little
    audit data.


    ### Writing Events Out to Disk

    `filename=N''e:\audits\audit_sa'', max_file_size=(10), max_rollover_files=(5))`


    There are many different options for writing your event data out from your extended
    event. These are covered in more detail in Chapter 6, “What Is Extended Events?”
    This script is writing events out to disk. This will write to `e:\audits\audit_sa`
    with a max file size of 10 MB and 5 rollover files. This means you will get a
    total of 50 MB of storage for your events.


    Here are some suggestions for file storage:

    - Don’t store the files on the C drive or other drives SQL Server is using for
    data and log files.

    - Set the maximum file size to something small like 10 MB and enable file rollover
    of 5–10 files. If you set large file sizes with many rollover files, they will
    be next to impossible to query.


    **Caution** If you have large files and many rollover files, they can get gigantic
    and be next to impossible to query.


    ### Advanced Options

    `WITH (STARTUP_STATE=ON);`


    There are more options you can set in advanced options, but I prefer to not change
    any of those settings. Changing these settings can cause performance issues on
    your database server. The advanced options are covered in more detail in Chapter
    6, “What Is Extended Events?” The only advanced option I set is `STARTUP_STATE=ON`,
    which means the extended event will start again after any restart of SQL Server.


    ### Starting Your Extended Event Session

    `ALTER EVENT SESSION [audit_sa] ON SERVER STATE=START;`


    When an extended event session is stopped, it doesn’t collect any data. This is
    why I always start it after creating it.


    ### Querying System Tables and Views

    You can query a system view to see what events and actions are available to use.
    Listing 8-2 shows these queries.


    **Listing 8-2.** Querying system tables to list extended events available events
    and actions


    ```

    SELECT name, description

    FROM sys.dm_xe_objects

    WHERE object_type =''Event''

    ORDER BY name

    ```


    ```

    SELECT name, description

    FROM sys.dm_xe_objects

    WHERE object_type =''Action''

    ORDER BY name

    ```


    `sys.dm_xe_objects`, with a filter on ‘Event’, will list the events you can use
    in your extended event session. A cross-section of the query results from Listing
    8-2 are shown in Figure 8-2. There over 1800 events available in SQL Server 2019.
    The number of events available to you depends on your version of SQL Server.


    **Figure 8-2.** Extended events listing of events'
