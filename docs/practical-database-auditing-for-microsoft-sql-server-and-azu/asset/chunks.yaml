    modify, and delete them.


    **Setting Up the Audit**


    For a quick recap, to make SQL Server auditing work, you need two or three things


    depending on what you want to audit:


    • **You’re required to create an audit.** This will determine where you


    store audit data, how much audit data to keep, and several other


    settings associated with auditing.


    • **You will also need one server and/or one database audit per**


    **database to collect audit data.** The server and database audits


    must be associated with an audit. Each audit can have one server


    and one database audit. These server and database audits are not


    dependent on each other. The server audit specification is generally


    good for auditing server-level changes and/or all the databases at the


    same time. The database audit specification is good for auditing one


    database or a subset of activities in one database.


    Listin[g 5-1 sho](#index_split_000.html#p74)ws how to create an audit via script.


    ***Listing 5-1.*** Creating an audit


    USE [master];


    CREATE SERVER AUDIT [AuditSpecification]


    TO FILE


    ( FILEPATH = N''e:\audits\''


    ,MAXSIZE = 50 MB


    ,MAX_FILES = 4


    ,RESERVE_DISK_SPACE = OFF


    ) WITH (QUEUE_DELAY = 1000, ON_FAILURE = CONTINUE);


    ALTER SERVER AUDIT [AuditSpecification] WITH (STATE = ON);


    Chapter 5 ImplementIng SQl Server audIt vIa SQl SCrIptS


    Let’s look at each of the pieces of the script in Listing [5-1](#index_split_000.html#p74):


    • **Database context** – USE [master];


    All audits are created in the master database.


    • **Audit name** – CREATE SERVER AUDIT [AuditSpecification]


    I tend to name it AuditSpecification or AuditSpecification_


    servername. This is entirely up to you based on how descriptive you


    want to name it. You can create multiple audits, though, so it may


    make sense to make it a more descriptive name if you plan to add


    additional audits.


    • **Audit destination**


    • TO FILE – I always write to the file choice because it’s easiest for


    me. I don’t have a lot of auditing restrictions. Yes, the auditors


    want to know what happened, but they don’t think that we’re


    going in there secretly deleting audit files and not reporting on


    audit data.


    • TO APPLICATION_LOG – I could see storing audit data in the


    application log if you have a log scraping application like Splunk


    that reads all the logs and gathers them in a central repository.


    This has different options, much fewer options, to configure than


    TO FILE. An example is provided in the next section.


    • TO SECURITY_LOG – This has more restrictions than writing to the


    application log, but the same concept applies. This is the most


    secure option for storing audit data because it’s the least likely


    to have anyone tamper with it. This has different options, much


    fewer options, to configure than TO FILE. An example is provided


    in the next section.


    • **Queue delay** – QUEUE_DELAY = 1000'
  trans: "\n在本章中，你将学习如何使用 SQL 脚本设置审计。第 [4](https://doi.org/10.1007/978-1-4842-8634-0_4)\
    \ 章“通过 GUI 实现 SQL Server 审计”介绍了如何在 SSMS 中通过 GUI 设置 SQL Server 审计。在本章中，你将学习如何通过脚本设置\
    \ SQL Server 审计。\n\n## 脚本化现有规范\n\n学习如何编写审计脚本的一个简单方法是将现有审计脚本化。你可以右键单击在第 [4 章“通过\
    \ GUI 实现 SQL Server 审计,”](https://doi.org/10.1007/978-1-4842-8634-0_4) 中创建的任何规范，选择\
    \ **脚本化审计为**，然后选择 **CREATE 到**，再选择 **新建查询编辑器窗口**，如图 5-1 所示。\n\n***图 5-1.** 脚本化现有审计*\n\
    \n© Josephine Bush 2022\nJ. Bush, *Practical Database Auditing for Microsoft SQL\
    \ Server and Azure SQL*, [`doi.org/10.1007/978-1-4842-8634-0_5`](https://doi.org/10.1007/978-1-4842-8634-0_5#DOI)\n\
    \n第 5 章 通过 SQL 脚本实现 SQL Server 审计\n\n这将把你的审计的脚本版本放入 SSMS 的一个选项卡中。本章将介绍这些脚本，以便你能更好地理解如何创建、修改和删除它们。\n\
    \n## 设置审计\n\n快速回顾一下，要使 SQL Server 审计正常工作，根据你想要审计的内容，你需要两样或三样东西：\n\n*   `你必须创建一个审计。`\
    \ 这将决定审计数据的存储位置、保留多少审计数据以及与审计相关的其他几个设置。\n*   `每个数据库还需要一个服务器和/或一个数据库审计规范来收集审计数据。`\
    \ 服务器和数据库审计规范必须关联到一个审计。每个审计可以有一个服务器审计规范和一个数据库审计规范。这些服务器和数据库审计规范彼此不依赖。服务器审计规范通常适用于审计服务器级更改和/或同时审计所有数据库。数据库审计规范则适用于审计单个数据库或单个数据库中的部分活动。\n\
    \n清单 5-1 展示了如何通过脚本创建审计。\n\n***清单 5-1.*** 创建审计\n\n```sql\nUSE [master];\n\nCREATE\
    \ SERVER AUDIT [AuditSpecification]\nTO FILE\n(   FILEPATH = N'e:\\audits\\'\n\
    \    ,MAXSIZE = 50 MB\n    ,MAX_FILES = 4\n    ,RESERVE_DISK_SPACE = OFF\n) WITH\
    \ (QUEUE_DELAY = 1000, ON_FAILURE = CONTINUE);\n\nALTER SERVER AUDIT [AuditSpecification]\
    \ WITH (STATE = ON);\n```\n\n第 5 章 通过 SQL 脚本实现 SQL Server 审计\n\n让我们看一下清单 5-1 脚本的各个部分：\n\
    \n*   `数据库上下文` – `USE [master];`\n    所有审计都在 master 数据库中创建。\n*   `审计名称` – `CREATE\
    \ SERVER AUDIT [AuditSpecification]`\n    我倾向于将其命名为 `AuditSpecification` 或 `AuditSpecification_servername`。这完全取决于你希望名称有多具描述性。不过，你可以创建多个审计，因此如果你计划添加更多审计，使用更具描述性的名称可能更有意义。\n\
    *   `审计目标`\n    *   `TO FILE` – 我总是选择写入文件，因为这对我来说最简单。我没有很多审计限制。是的，审计员想知道发生了什么，但他们不认为我们会偷偷进去删除审计文件而不报告审计数据。\n\
    \    *   `TO APPLICATION_LOG` – 如果你有像 Splunk 这样读取所有日志并将它们集中存储的应用程序，我可以考虑将审计数据存储在应用程序日志中。与\
    \ `TO FILE` 相比，这个选项可配置的选项更少。下一节将提供一个示例。\n    *   `TO SECURITY_LOG` – 这比写入应用程序日志有更多限制，但概念相同。这是存储审计数据最安全的选择，因为它最不可能被他人篡改。与\
    \ `TO FILE` 相比，这个选项可配置的选项更少。下一节将提供一个示例。\n*   `队列延迟` – `QUEUE_DELAY = 1000`\n"
- fmt: '# Chapter 5 Implementing SQL Server Audit via SQL Scripts


    This is the wait time in milliseconds before it audits. You can set this to `0`,
    `1000`, or something greater than `1000`. I leave it at `1000`.


    ## On audit log failure – `ON_FAILURE`

    *   **`CONTINUE`** – If the audit can’t capture the statement, it keeps auditing.
    No statements will fail because of this option. You might miss a statement here
    and there, but I doubt that happens often, if at all.

    *   **`FAIL_OPERATION`** – If it can’t audit, it’s going to cause the statement
    to fail. The user or application executing that statement will get an error.

    *   **`SHUTDOWN`** – If it can’t audit, it’s going to do what it says; it’s going
    to shut down the server. All users and applications will no longer have access
    to the server.


    I choose Continue on this option. I think Fail operation and Shutdown server are
    too drastic. I’ll have people screaming at me that there’s something wrong with
    the server if I don’t choose Continue. You may want to choose Fail operation or
    Shutdown server if auditing is of the utmost importance like in a legal or financial
    database.


    ## Path – `FILEPATH`

    `N''e:\audits\''`

    If you chose File for Audit Destination, you need to choose a path. Make sure
    don’t put audit files on the C drive. Even though we’re going to limit the audit
    file sizes in the next steps, you don’t want it accidentally filling up the C
    drive. I don’t recommend putting audit files on data drives or log drives either.
    We have an E drive for applications where I work; that’s a great place for audit
    files to go.


    ## Maximum files – `MAX_FILES`

    `4`


    ## Maximum file size – `MAXSIZE`

    `50 MB`

    I never let the audit collect unlimited files and unlimited file sizes. This makes
    it difficult to query them. I’ve found 4 files of 50 MB each is good for my needs
    when collecting permissions and schema changes. Your number and sizing of files
    depend on your needs.


    ## Reserve disk space – `RESERVE_DISK_SPACE`

    `OFF`

    Since my files are quite small, I leave this set to `OFF`.


    ## Enabling your audit

    `ALTER SERVER AUDIT [AuditSpecification] WITH (STATE = ON)`

    You will need to enable it, so it will collect audit data.


    **Caution** don’t set SQL Server audit to collect unlimited files or allow unlimited
    file sizes. they will be gigantic and next to impossible to query.


    If you want to store your audit data in the application log, you will set up your
    audit as shown in Listing 5-2.


    ### Listing 5-2. Configuring an audit that writes to the application log

    ```sql

    USE [master];


    CREATE SERVER AUDIT [AuditSpecification]

    TO APPLICATION_LOG

    WITH (QUEUE_DELAY = 1000, ON_FAILURE = CONTINUE);


    ALTER SERVER AUDIT [AuditSpecification] WITH (STATE = ON);

    ```


    If you want to store your audit data in the security log, you will set up your
    audit as shown in Listing 5-3.


    ### Listing 5-3. Configuring an audit that writes to the security log

    ```sql

    USE [master];


    CREATE SERVER AUDIT [AuditSpecification]

    TO SECURITY_LOG

    WITH (QUEUE_DELAY = 1000, ON_FAILURE = CONTINUE);


    ALTER SERVER AUDIT [AuditSpecification] WITH (STATE = ON);

    ```


    You will get an error when you try to enable the audit that’s configured to use
    the security log as shown in Listing 5-4.


    ### Listing 5-4. Error when creating audit that writes to the security log

    `Msg 33222, Level 16, State 1, Line 7`

    `Audit ''AuditSpecification3'' failed to start. For more information, see the
    SQL Server error log.`


    ![](index-78_1.png)

    ![](index-78_2.jpg)


    The SQL Server Logs will give you additional information about the error as shown
    in Figure 5-2.


    ### Figure 5-2. Additional information about the error when creating an audit
    that writes to the security log


    To resolve the Error: `33204` SQL Server Audit could not write to the security
    log, you will need to configure additional items based on this Microsoft document:'
