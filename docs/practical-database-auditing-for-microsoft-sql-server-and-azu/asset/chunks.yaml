- fmt: "# Chapter 14 Auditing Azure SQL Managed Instance\n\n## Enabling and Configuring\
    \ Diagnostic Setting\n\nNavigate to your managed instance in the Azure portal,\
    \ and then navigate to Diagnostic settings. You will need to add a diagnostic\
    \ setting by clicking **+ Add diagnostic setting** as shown in Figure 14-1.\n\n\
    **Figure 14-1.** Add diagnostic setting\n\nName your diagnostic setting, and then\
    \ choose `SQLSecurityAuditEvents`. If you also want to audit the actions Microsoft\
    \ is taking on your managed instance, you can choose `DevOpsOperationsAudit`.\
    \ Select your destination details. In this case, I’m putting the data in a Log\
    \ Analytics workspace as shown in Figure 14-2.\n\n**Figure 14-2.** Configure the\
    \ diagnostic setting\n\nClick **Save** and you will see your diagnostic setting\
    \ listed as shown in Figure 14-3.\n\n**Figure 14-3.** Diagnostic setting saved\n\
    \n## Creating and Configuring SQL Server Audit\n\nOnce you’ve configured your\
    \ diagnostic settings, you will need to set up a SQL Server Audit on your managed\
    \ instance. First, you will need to set up an audit using the script in Listing\
    \ 14-1.\n\n**Listing 14-1.** Setting up an audit\n```\nUSE [master];\nCREATE SERVER\
    \ AUDIT [miaudit] TO EXTERNAL_MONITOR;\nALTER SERVER AUDIT [miaudit] WITH (STATE\
    \ = ON);\n```\n\nThen you need to create a server audit associated with your audit\
    \ using the script in Listing 14-2.\n\n**Listing 14-2.** Setting up a server audit\n\
    ```\nUSE [master];\nCREATE SERVER AUDIT SPECIFICATION [miserveraudit]\nFOR SERVER\
    \ AUDIT [miaudit]\nADD (DATABASE_OBJECT_ACCESS_GROUP),\nADD (SCHEMA_OBJECT_ACCESS_GROUP),\n\
    ADD (AUDIT_CHANGE_GROUP),\nADD (SERVER_OPERATION_GROUP)\nWITH (STATE = ON);\n\
    ```\n\n**Caution** These audit action groups can create a lot of audit data: `DATABASE_OBJECT_ACCESS_GROUP`,\
    \ `SCHEMA_OBJECT_ACCESS_GROUP`, `SERVER_OPERATION_GROUP`. I’m using them as an\
    \ example to make sure you see some audit data come through. I don’t recommend\
    \ using them unless you are carefully filtering the audit data. SQL Server audit\
    \ and filtering are covered in Chapter 4, “Implementing SQL Server Audit via the\
    \ GUI.”\n\n## Querying Audit Data\n\nTo access the audit data, you will need to\
    \ go to the Log Analytics workspace you chose in your diagnostic setting and then\
    \ click **Workspace summary**. This summary is shown in Figure 14-4.\n\n**Figure\
    \ 14-4.** Log Analytics Workspace summary\n\n**Note** For more information about\
    \ how to access and use the Log Analytics workspace, please review Chapter 13,\
    \ “Auditing Azure SQL Databases.”\n\nYou can click on any of these boxes to drill\
    \ down for more information. This will bring you to a screen with a Kusto query\
    \ prepopulated for you. It provides you with detailed information for each of\
    \ those categories. To query the audit data as a whole, I recommend clicking the\
    \ **Logs** button near the top of the page, as shown in Figure 14-5.\n\n**Figure\
    \ 14-5.** Log Analytics `SQLSecurityInsights` Logs button\n\nAfter clicking **Logs**,\
    \ you will see a page with suggested queries. You can close that because none\
    \ of those will help you query the audit data. Use the Kusto query in Listing\
    \ 14-3 to see your audit data.\n\n**Listing 14-3.** Log Analytics Kusto query\n\
    ```\nAzureDiagnostics\n| where Category == 'SQLSecurityAuditEvents'\nand TimeGenerated\
    \ > ago(1d)\n| project\n    event_time_t,\n    database_name_s,\n    statement_s,\n\
    \    server_principal_name_s,\n    succeeded_s,\n    client_ip_s,\n    application_name_s,\n\
    \    additional_information_s,\n```"
