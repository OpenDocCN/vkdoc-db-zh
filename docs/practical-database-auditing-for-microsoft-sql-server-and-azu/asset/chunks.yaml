    ![](index-278_2.jpg)


    Chapter 15 Other ClOud prOvider auditing OptiOnS


    You will need an IAM role. If you don’t already have an S3 role, create one now.
    This


    role will allow your RDS instance to talk to the bucket. Choose Create new role
    in the


    IAM role drop-down as shown in Figure [15-13.](#index_split_002.html#p278)


