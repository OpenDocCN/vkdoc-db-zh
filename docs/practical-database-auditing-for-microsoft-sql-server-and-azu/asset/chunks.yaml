- fmt: "# Appendix A: Database Auditing Options Comparison\n\nInternationally recognized\
    \ to follow specific security guidelines when auditing. These types of auditing\
    \ are a comprehensive type of logging of all activities on your database server.\
    \ If you don’t have an auditor requiring you to turn this on, leave it off. It\
    \ can be very impactful to server performance.\n\n*   **Successful and failed\
    \ login auditing** – Both `SQL Server Audit` and extended events allow you to\
    \ audit successful and failed logins. You will need an audit to store the audit\
    \ data and a server audit specification to collect the login information.\n\n\
    *   **Triggers**\n    *   **Server triggers** can be set up to prevent people\
    \ from changing databases or preventing them from logging in at certain times.\n\
    \    *   **DDL triggers** can be set up to prevent certain actions from occurring,\
    \ such as `CREATE`, `ALTER`, `DROP`, `GRANT`, `DENY`, or `REVOKE`. They can have\
    \ another action occur in response to these actions, or they can record these\
    \ actions.\n    *   **DML triggers** can be set up to prevent or have another\
    \ action occur in response to `INSERT`, `UPDATE`, or `DELETE` statements.\n\n\
    *   **Cloud auditing**\n    *   **Azure SQL Database** – With `SQL Server Audit`\
    \ functionality via the Azure portal or with extended events.\n    *   **Azure\
    \ Managed Instance** – With diagnostic settings via the Azure portal, `SQL Server\
    \ Audit`, or extended events.\n    *   **AWS RDS** – With `SQL Server Audit` and\
    \ extended events.\n    *   **Google Cloud** – Only on a VM.\n\n**Caution:** Any\
    \ auditing technique can overload your server depending on how much you audit\
    \ with it. Best case, you can’t weed through all the data, and worst case, you\
    \ overload your production servers. Always remember to do the least amount of\
    \ auditing needed for your situation.\n\n## Pros and Cons of Auditing Choices\n\
    \n**Pros and Cons**\n\n| **Technology** | **Pros** | **Cons** |\n| :--- | :---\
    \ | :--- |\n| **SQL Server Audit** | Easy to capture very specific audit events.<br>Don’t\
    \ need to parse XML. | More complicated to set up than XEvents.<br>No templates\
    \ to guide you. |\n| **Extended events (XEvents)** | Easy to get started with\
    \ templates.<br>Feels familiar if you used SQL Trace or Profiler. | Need to parse\
    \ XML to query results. |\n| **Change data capture (CDC)** | Useful for ETL processes.<br>Allows\
    \ you to see before and after data changes. | Performance and storage may be an\
    \ issue on large, busy tables. |\n| **Change tracking** | Useful for applications\
    \ to track changes on a database table. | Performance may be an issue on large,\
    \ busy tables.<br>Database needs snapshot isolation level for consistency.<br>Table\
    \ needs a primary key.<br>Can’t see how many times or the values of each change.\
    \ |\n| **C2 and Common Criteria compliance** | Internationally recognized to follow\
    \ specific security guidelines when auditing. | It can be VERY impactful to server\
    \ performance. |\n| **Azure SQL Database audit** | Easy to set up in the Azure\
    \ portal.<br>Easy to centralize into Log Analytics with PowerShell. | Default\
    \ auditing policy audits everything, but you can modify it.<br>Need to query audit\
    \ data in Kusto. |\n| **Azure SQL Database extended events** | Works a lot like\
    \ SQL Server extended events. | Need to use a storage account.<br>Hard to query\
    \ multiple `.xel` files. |\n| **Azure SQL Managed Instance diagnostic settings**\
    \ | Easy to set up in the Azure portal.<br>Easy to centralize into Log Analytics.\
    \ | Need to query audit data in Kusto. |\n| **Azure SQL Managed Instance extended\
    \ events** | Works just like SQL Server extended events. | Same cons as SQL Server\
    \ XEvents.<br>Hard to query multiple `.xel` files. |\n| **Azure SQL Managed Instance\
    \ SQL Server Audit** | Works just like SQL Server Audit. | Hard to query multiple\
    \ `.sqlaudit` files. |\n| **Google Cloud SQL Server Audit** | Can only audit on\
    \ a VM with SQL Server installed. | |\n\n## SQL Server Audit vs. Extended Events\n\
    \nThe following table gives a comparison of `SQL Server Audit` vs. extended events\
    \ to help you decide which is best for your use case.\n\n| **Feature** | **Extended\
    \ events** | **SQL Server Audit** |\n| :--- | :--- | :--- |\n| **Setup via GUI\
    \ or scripts** | Yes | Yes |\n| **Query via GUI or scripts** | Yes | Yes |\n|\
    \ **Delete in GUI or script and it** | No, XEL files are left on disk if... |\
    \ |"
