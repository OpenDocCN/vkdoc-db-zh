    # CHAPTER 6


    ## What Is Extended Events?


    Extended events, abbreviated as `XEvents`, is a built-in auditing and monitoring
    functionality available via `SSMS` GUI or `SQL scripts`. You can set up and configure
    it to capture pretty much anything that happens on SQL Server. It’s quite flexible
    and fairly easy to set up.


    Extended events was intended as a replacement for `Profiler`, which was supposed
    to be deprecated in some future SQL Server version. `Profiler` is a way to create
    a trace that can capture everything happening on your SQL Server.


    Extended events was first introduced in SQL Server 2008. In SQL Server 2012, a
    graphical interface was added for ease of use. It’s available in every edition
    of SQL Server. It doesn’t have restrictions based on edition like `SQL Server
    Audit`.


    ### Extended Events Default Sessions


    When you look at extended events in `SSMS`, you will see that there are some there
    already. These come with SQL Server by default and the SQL Server engine uses
    them. You may see different default sessions based on your version of SQL Server.
    [Figure 6-1](#index_split_001.html#p97) shows you an example of the default sessions
    you may see.


    #### Figure 6-1. Default extended event sessions


    `system_health` uses the ring buffer to store the information it’s collecting
    and uses an event file. More information about extended events storage locations
    will be covered in [Chapter 7, “Implementing Extended Events via the GUI.”](https://doi.org/10.1007/978-1-4842-8634-0_7)
    `AlwaysOn_health` is disabled by default unless you are using an availability
    group set up in SQL Server. `system_health` and `telemetry_xevents`, in 2016 version
    and later, mainly gather information on errors, deadlocks, and waits. Don’t disable
    or change these extended events. They are needed by SQL Server. I’ve read that
    even if you delete `telemetry_xevents`, Microsoft has mechanisms to put it back
    in place within 60 seconds. You are not prevented from querying them if they are
    gathering what you already need. I’m not going to cover querying these default
    sessions because they don’t collect the audit data. I will show you how to collect
    in [Chapter 7, “Implementing Extended Events via the GUI.”](https://doi.org/10.1007/978-1-4842-8634-0_7)


    ### Extended Event Components


    To make extended events work, you need to configure a session. This session will
    collect the information you want to audit.'
