- fmt: "USE `YourDBName`;\n\n```sql\nSELECT name, is_tracked_by_cdc\nFROM sys.tables\n\
    WHERE is_tracked_by_cdc = 1;\n```\n\nIf it’s enabled, you will see `is_cdc_enabled\
    \ = 1`; if not, it will be `0`.\n\n## Chapter 10 additional SQL Server auditing\
    \ and tracking Methods\n\n**Tip** to understand the options in listing 10-6, [visit\
    \ the Microsoft documentation on enabling CDC for a table](https://docs.microsoft.com/en-us/sql/relational-databases/track-changes/enable-and-disable-change-data-capture-sql-server?view=sql-server-ver15#enable-for-a-table).\n\
    \nOnce you enable CDC on a table, you see a few things associated with it:\n\n\
    *   **System tables in `YourDBName`**\n    *   `cdc.captured_columns` – Returns\
    \ one row for each column tracked in a capture instance.\n    *   `cdc.change_tables`\
    \ – Returns one row for each change table in the database.\n    *   `cdc.dbo_YourTableName_CT`\
    \ – Returns one row for each change made to a captured column in the associated\
    \ source table.\n    *   `cdc.ddl_history` – Returns one row for each data definition\
    \ language (DDL) change made to tables that are enabled for change data capture.\n\
    \    *   `cdc.index_columns` – Returns one row for each index column associated\
    \ with a change table.\n    *   `cdc.lsn_time_mapping` – Returns one row for each\
    \ transaction having rows in a change table. This table is used to map between\
    \ log sequence number (LSN) commit values and the time the transaction was committed.\n\
    *   **System table stored in `MSDB`**\n    *   `dbo.cdc_jobs` – Returns the configuration\
    \ parameters for change data capture agent jobs.\n*   **Two agent jobs to capture\
    \ and clean up CDC data**\n    *   `cdc.YourDBName_capture` – Executes the stored\
    \ procedure `sp_MScdc_capture_job`, which captures the CDC data.\n    *   `cdc.YourDBName_cleanup`\
    \ – Executes the stored procedure `sp_MScdc_cleanup_job`, which starts by extracting\
    \ the configured retention and threshold values for the cleanup job from `msdb.dbo.cdc_jobs`.\n\
    \n**Tip** to find out more about the CDC agent jobs, [visit the Microsoft documentation\
    \ on administering and monitoring CDC](https://docs.microsoft.com/en-us/sql/relational-databases/track-changes/administer-and-monitor-change-data-capture-sql-server?view=sql-server-ver15).\n\
    \nTo find out more about the CDC system tables, visit [the Microsoft documentation\
    \ on change data capture tables](https://docs.microsoft.com/en-us/sql/relational-databases/system-tables/change-data-capture-tables-transact-sql?view=sql-server-ver15)."
