- fmt: "# Chapter 4 Implementing SQL Server Audit via the GUI\n\n## Adding Multiple\
    \ Audits\n\nIf you try to add another server audit to an existing audit that already\
    \ has a server audit, it will fail with an error that states the audit already\
    \ exists as shown in Figure 4-16. This means you can’t add another server audit\
    \ to it.\n\n**Figure 4-16.** Error when trying to add a second server audit specification\
    \ to an audit\n\nThat doesn’t stop you from having multiple server and database\
    \ audits because you can have multiple audits. Chapter 3, “What Is SQL Server\
    \ Audit?”, has a section on multiple audit setups and gives you some example scenarios\
    \ you can follow.\n\n![](index-61_1.png)\n\n![](index-61_2.jpg)\n\n## Querying\
    \ Audit Logs\n\nYou can query the audit via `SSMS` by right-clicking the audit\
    \ as shown in Figure 4-17.\n\n**Figure 4-17.** View audit logs\n\n**Figure 4-18.**\
    \ Audit log results\n\nA dialog box pops up with the 1000 most recent events,\
    \ as shown in Figure 4-18.\n\nThere may be nothing listed because nothing auditable\
    \ happened yet. There may be a lot of auditing data because there’s a bunch of\
    \ stuff happening in the background that you didn’t realize was happening. `SQL\
    \ Server` has a lot of internal processes that may be collected by your audit.\
    \ There is a way to filter audit data before it collects, which will be covered\
    \ soon.\n\n![](index-62_1.png)\n\nIf you stored your audit logs in the application\
    \ or security log, you will get a different view on the `Log File Viewer`, which\
    \ instead queries the audit data from the application or security log as shown\
    \ in Figure 4-19.\n\n**Figure 4-19.** Audit log results stored in the application\
    \ log\n\nIf you stored your audit logs in the application or security log, you\
    \ can also view them from the `Event Viewer` on Windows as shown in Figure 4-20.\n\
    \n![](index-63_1.png)\n\n**Figure 4-20.** Audit log results are shown in the application\
    \ log in Event Viewer\n\n## Columns Available in SQL Server Audit\n\nThere are\
    \ many columns available in the audit. These columns are available to you when\
    \ you query or filter the audit. Different versions have different columns available.\
    \ The following list contains the columns I find most useful:\n\n*   **SQL Server\
    \ 2012/2014/2016**\n    *   `event_time`\n    *   `action_id`\n    *   `succeeded`\n\
    \    *   `server_principal_name`\n    *   `server_instance_name`\n    *   `database_name`\n\
    \    *   `schema_name`\n    *   `object_name`\n    *   `statement`\n    *   `file_name`\n\
    *   **SQL Server 2017 – All columns in 2016 and earlier, plus these additional\
    \ columns**\n    *   `client_ip`\n    *   `application_name`\n*   **SQL Server\
    \ 2019 – All columns in 2017 and earlier, plus this additional column**\n    *\
    \   `host_name`\n\n**Note** there are a lot more columns than those in the previous\
    \ list and every version adds new columns. The following links provide more information\
    \ on the columns available in the audit data depending on the location you chose\
    \ to store your audit.\n\n*   https://docs.microsoft.com/en-us/sql/relational-databases/security/auditing/sql-server-audit-records?view=sql-server-ver15\n\
    *   https://docs.microsoft.com/en-us/sql/relational-databases/system-functions/sys-fn-get-audit-file-transact-sql?view=sql-server-ver15"
