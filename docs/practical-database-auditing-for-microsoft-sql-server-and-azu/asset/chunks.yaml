    \ 后，你可以使用清单 10-6 中的查询在表上启用它。\n\n***清单 10-6.*** 在表级别启用 CDC\n\n```sql\nUSE [YourDBName];\n\
    EXEC sys.sp_cdc_enable_table\n    @source_schema = N'dbo',\n    @source_name =\
