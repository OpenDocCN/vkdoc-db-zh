    ## 本书内容


    本书通过具体示例向你展示审计如何让你的工作生活更轻松。


    设置审计后，你并非**一无所知**。我在当前工作中设置审计，是因为我厌倦了人们将问题归咎于数据库变更。由于我没有进行审计，我完全不知道是否有任何变更发生。现在，我可以明确说出具体发生了什么变更，并与用户协作，判断此变更是否破坏了某些东西。


    本书首先从高层次概述了为何需要审计以及存在哪些审计类型。接着详细介绍了 SQL Server、Azure SQL 和 AWS RDS SQL Server
    中可用的审计类型。你将学习如何使用 SQL Server 审计和扩展事件来跟踪架构、安全性和配置的变更。并非所有变更都能通过这些功能捕获，因此本书还涵盖了其他功能，如变更数据捕获（CDC）、时态表和通用标准合规性。


    接下来，本书介绍了 Azure SQL 数据库和 Azure SQL 托管实例中的审计方法。与 SQL Server 相比，审计这些服务的方式有所不同。此外，你还将学习如何在
    AWS RDS SQL Server 中使用 SQL Server 审计和扩展事件。


    阅读本书后，你将掌握许多用例和脚本，助你实施自己的审计策略。


    xvii


    # 引言


    ### 目标读者


    本书面向需要了解其数据库服务器上正在发生何种变更，以及正在执行这些变更的**数据库管理员**；面向精通数据库、负责流程和应用程序故障排除的 **DevOps
    工程师和开发人员**；以及面向负责生成报告以支持法规合规性报告和审计的**开发人员和管理员**。


    ### 联系作者


    我已尽力确保所有脚本和描述的准确性。但我知道无论如何仍可能出现问题。如有任何意见或疑问，欢迎发送电子邮件至 hellosqlkitty@gmail.com。


