  trans: "\n# 第 15 章 其他云提供商审计选项\n\n我的建议是在审计数据仍处于数据库实例中、尚未传输到 S3 时进行查询。如果你按照清单 15-2\
    \ 的方式设置服务器审计，并像清单 15-4 那样添加适当的过滤器，那么你不会产生大量的审计数据。你可能可以每小时收集一次，而不会丢失任何审计数据。确保不丢失审计数据的最佳方法是密切关注其收集速度。然后，你可以根据这个速度来设置查询计划。\n\
    \n**注意** 有关 RDS 中 SQL Server 审计的更多信息，请访问 https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/Appendix.SQLServer.Options.Audit.html\n\
    \n值得高兴的是，AWS RDS 允许你使用 SQL Server 代理和链接服务器。你可以像第 11 章“集中审计数据”中那样进行集中化设置。这将使查询和报告多个\
    \ RDS 实例变得更加容易。\n\n## AWS RDS 扩展事件\n\n在 AWS RDS 中使用扩展事件相当简单。主要需要注意的是文件名。你必须将扩展事件放在路径\
    \ `D:\\rdsdbdata\\Log\\` 中，就像我在清单 15-6 中所做的那样。\n\n***清单 15-6.*** 在 RDS 中设置扩展事件\n\
    \n```sql\nCREATE EVENT SESSION [auditxel] ON SERVER\nADD EVENT sqlserver.rpc_completed(\n\
    \    ACTION(\n        sqlserver.client_app_name,\n        sqlserver.client_hostname,\n\
    \        sqlserver.database_name,\n        sqlserver.sql_text,\n        sqlserver.username\n\
    \    )\n    WHERE ([sqlserver].[username]=N'josephine')\n),\nADD EVENT sqlserver.sql_batch_completed(\n\
    \    ACTION(\n        sqlserver.client_app_name,\n        sqlserver.client_hostname,\n\
    \        sqlserver.database_name,\n        sqlserver.sql_text,\n        sqlserver.username\n\
    \    )\n    WHERE ([sqlserver].[username]=N'josephine')\n)\nADD TARGET package0.event_file\n\
    (\n    SET filename=N'D:\\rdsdbdata\\Log\\auditxel',\n    max_file_size=(10),\n\
    \    max_rollover_files=(5)\n)\nWITH (\n    MAX_MEMORY=4096 KB,\n    EVENT_RETENTION_MODE=ALLOW_SINGLE_EVENT_LOSS,\n\
    \    MAX_DISPATCH_LATENCY=30 SECONDS,\n    MAX_EVENT_SIZE=0 KB,\n    MEMORY_PARTITION_MODE=NONE,\n\
    \    TRACK_CAUSALITY=OFF,\n    STARTUP_STATE=ON\n);\n\nALTER EVENT SESSION [auditxel]\
    \ ON SERVER STATE=START;\n```\n\n**注意** 扩展事件仅在企业版和标准版上有效。\n\n要查询你的扩展事件，请使用清单 15-7\
    \ 中的脚本。\n\n***清单 15-7.*** 在 RDS 中查询扩展事件数据\n\n```sql\nSELECT\n    n.value('(@timestamp)[1]',\
    \ 'datetime') as timestamp,\n    n.value('(action[@name=\"sql_text\"]/value)[1]',\
    \ 'nvarchar(max)') as [sql],\n    n.value('(action[@name=\"client_hostname\"]/value)[1]',\
    \ 'nvarchar(50)') as [client_hostname],\n    n.value('(action[@name=\"username\"\
    ]/value)[1]', 'nvarchar(50)') as [user],\n    n.value('(action[@name=\"database_name\"\
