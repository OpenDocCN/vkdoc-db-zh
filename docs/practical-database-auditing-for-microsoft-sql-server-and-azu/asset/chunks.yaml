  trans: "\n# 附录 A：数据库审计选项比较\n\n国际公认在审计时遵循特定安全准则。此类审计是对数据库服务器上所有活动进行全面的日志记录。如果没有审计员要求你开启此功能，请保持关闭。它可能对服务器性能产生重大影响。\n\
    \n*   **成功和失败登录审计** – `SQL Server 审计`和扩展事件都允许你审计成功和失败的登录。你将需要一个审计来存储审计数据，以及一个服务器审计规范来收集登录信息。\n\
    \n*   **触发器**\n    *   可以设置**服务器触发器**来阻止人员在特定时间更改数据库或登录。\n    *   可以设置 **DDL 触发器**来阻止某些操作的发生，例如\
    \ `CREATE`、`ALTER`、`DROP`、`GRANT`、`DENY` 或 `REVOKE`。它们可以响应这些操作执行另一个操作，或者记录这些操作。\n\
    \    *   可以设置 **DML 触发器**来阻止或响应 `INSERT`、`UPDATE` 或 `DELETE` 语句执行另一个操作。\n\n* \
    \  **云审计**\n    *   **Azure SQL 数据库** – 通过 Azure 门户使用 `SQL Server 审计`功能或使用扩展事件。\n\
    \    *   **Azure 托管实例** – 通过 Azure 门户的诊断设置、`SQL Server 审计`或扩展事件。\n    *   **AWS\
    \ RDS** – 使用 `SQL Server 审计`和扩展事件。\n    *   **Google Cloud** – 仅在 VM 上。\n\n**注意：**\
    \ 任何审计技术都可能使你的服务器过载，具体取决于你用它审计的内容量。最好的情况是你无法筛选所有数据，最坏的情况是你的生产服务器过载。始终牢记根据你的具体情况执行最少量的必要审计。\n\
    \n## 审计选择的优缺点\n\n**优缺点**\n\n| **技术** | **优点** | **缺点** |\n| :--- | :--- | :---\
    \ |\n| **SQL Server 审计** | 易于捕获非常具体的审计事件。<br>无需解析 XML。 | 比 XEvents 设置更复杂。<br>没有模板指导。\
    \ |\n| **扩展事件 (XEvents)** | 通过模板易于上手。<br>如果你用过 SQL 跟踪或 Profiler 会感觉熟悉。 | 需要解析\
    \ XML 来查询结果。 |\n| **变更数据捕获 (CDC)** | 对 ETL 流程有用。<br>允许你查看数据变更前后的状态。 | 在大型、繁忙的表上，性能和存储可能成为问题。\
    \ |\n| **变更跟踪** | 对应用程序跟踪数据库表上的变更很有用。 | 在大型、繁忙的表上，性能可能成为问题。<br>数据库需要快照隔离级别以保持一致性。<br>表需要有主键。<br>无法查看变更发生的次数或每次变更的值。\
    \ |\n| **C2 和通用准则合规性** | 国际公认在审计时遵循特定安全准则。 | 它可能对服务器性能产生**非常重大**的影响。 |\n| **Azure\
    \ SQL 数据库审计** | 在 Azure 门户中易于设置。<br>通过 PowerShell 易于集中到 Log Analytics。 | 默认审计策略审计所有内容，但你可以修改它。<br>需要在\
    \ Kusto 中查询审计数据。 |\n| **Azure SQL 数据库扩展事件** | 工作方式与 SQL Server 扩展事件非常相似。 | 需要使用存储账户。<br>难以查询多个\
    \ `.xel` 文件。 |\n| **Azure SQL 托管实例诊断设置** | 在 Azure 门户中易于设置。<br>易于集中到 Log Analytics。\
    \ | 需要在 Kusto 中查询审计数据。 |\n| **Azure SQL 托管实例扩展事件** | 工作方式与 SQL Server 扩展事件完全相同。\
    \ | 与 SQL Server XEvents 相同的缺点。<br>难以查询多个 `.xel` 文件。 |\n| **Azure SQL 托管实例 SQL\
    \ Server 审计** | 工作方式与 SQL Server 审计完全相同。 | 难以查询多个 `.sqlaudit` 文件。 |\n| **Google\
    \ Cloud SQL Server 审计** | 只能在安装了 SQL Server 的 VM 上进行审计。 |  |\n\n## SQL Server\
    \ 审计 vs. 扩展事件\n\n下表对比了 `SQL Server 审计`与扩展事件，以帮助你决定哪种最适合你的用例。\n\n| **功能** | **扩展事件**\
