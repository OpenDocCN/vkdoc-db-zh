  trans: "\n然后，您可以选择立即应用此更改，或等待维护窗口。\n\n如`图 15-16`所示，点击**添加选项**。\n\n`图 15-16.` 安排并添加选项\n\
    \n![](img/index-280_1.png)\n\n![](img/index-280_2.png)\n\n点击**添加选项**后，您将返回到选项组列表页面。点击您刚创建的选项组，并验证您实施的设置，如`图\
    \ 15-17`所示。\n\n`图 15-17.` 验证新选项组设置\n\n## 将新选项组添加到 RDS 实例\n\n导航到您的 RDS 实例。您需要修改它以使用这个新的选项组。如`图\
    \ 15-18`所示，点击数据库实例上的**修改**。\n\n`图 15-18.` 修改 RDS 实例\n\n向下滚动到数据库选项设置。将选项组更改为您刚创建的新组，如`图\
    \ 15-19`所示。\n\n![](img/index-281_1.png)\n\n![](img/index-281_2.png)\n\n`图 15-19.`\
    \ 选择新选项组\n\n向下滚动并点击**继续**。选择是在下一个维护窗口应用更改，还是立即应用。然后如`图 15-20`所示，点击**修改数据库实例**。\n\
    \n`图 15-20.` 立即使用新选项组修改 RDS 实例\n\n![](img/index-282_1.jpg)\n\n![](img/index-282_2.jpg)\n\
    \n**注意**：立即应用可能会导致您的数据库在更改应用期间暂时不可用。\n\n点击返回到 RDS 实例的**配置**页面。您将看到新选项组的状态为`待应用`，如`图\
    \ 15-21`所示。\n\n`图 15-21.` 选项组待应用\n\n在数据库列表页面上，您将看到数据库的状态为`正在修改`，如`图 15-22`所示。\n\
    \n`图 15-22.` RDS 实例正在修改以应用新选项组\n\n一旦数据库状态变为`可用`，您就可以继续设置 SQL Server 审计。\n\n##\
    \ 设置 SQL Server 审计\n\n在 RDS 实例上设置 SQL Server 审计时，需要遵循一些准则。这些是本书前几章中关于 SQL Server\
    \ 审计的任何其他指导之外的补充要求。\n\n*   不要在服务器审计名称中使用 `RDS_` 作为前缀。\n*   对于 `FILEPATH`，请指定为\
    \ `D:\\rdsdbdata\\SQLAudit`。这是 AWS 要求的路径，其他任何路径都不行。\n*   对于 `MAXSIZE`，请指定一个介于\
    \ 2 MB 和 50 MB 之间的大小。\n*   不要配置 `MAX_ROLLOVER_FILES` 或 `MAX_FILES`。这是不允许的，如果您尝试配置将会收到错误。请将\
    \ `MAX_ROLLOVER_FILES` 保留设置为 `2147483647`。完全不要使用 `MAX_FILES`。这就是为什么特别重要的一点是，不要审计所有内容。审计文件越多，查询审计数据就越困难。\n\
    *   不要配置 SQL Server 在无法写入审计记录时关闭数据库实例。我通常也不建议这样做，但在 AWS 中绝对不要这样做。\n\n**注意**：RDS\
    \ 中的 SQL Server 审计功能适用于任何版本的 SQL Server，包括 Express 版。\n\n要设置 SQL Server 审计，您需要使用\
    \ SSMS 连接到您的 RDS 实例。我建议使用`清单 15-1`中的脚本来设置审计。\n\n`清单 15-1.` 创建服务器审计\n```sql\nUSE\
    \ [master];\n\nCREATE SERVER AUDIT [AuditSpecification]\nTO FILE\n(   FILEPATH\
    \ = N'D:\\rdsdbdata\\SQLAudit\\'\n    ,MAXSIZE = 10 MB\n    ,MAX_ROLLOVER_FILES\
    \ = 2147483647\n    ,RESERVE_DISK_SPACE = OFF\n) WITH (QUEUE_DELAY = 1000, ON_FAILURE\
    \ = CONTINUE)\nWHERE ([database_name]<>'rdsadmin');\n```\n\n接下来，您需要设置一个服务器或数据库审计规范，以便收集审计数据，如`清单\
    \ 15-2`所示。\n\n`清单 15-2.` 创建服务器审计规范\n```sql\nUSE [master];\n\nCREATE SERVER AUDIT\
    \ SPECIFICATION [ServerAuditSpecification]\nFOR SERVER AUDIT [AuditSpecification]\n\
    ```\n"
- fmt: "# Chapter 15 Other Cloud Provider Auditing Options\n\n## Audit Groups\nTo\
    \ configure auditing, you can add various action groups using the `ADD` statement:\n\
    \n- `ADD (DATABASE_OBJECT_ACCESS_GROUP)`\n- `ADD (SCHEMA_OBJECT_ACCESS_GROUP)`\n\
    - `ADD (DATABASE_ROLE_MEMBER_CHANGE_GROUP)`\n- `ADD (SERVER_ROLE_MEMBER_CHANGE_GROUP)`\n\
    - `ADD (AUDIT_CHANGE_GROUP)`\n- `ADD (DBCC_GROUP)`\n- `ADD (DATABASE_PERMISSION_CHANGE_GROUP)`\n\
    - `ADD (SCHEMA_OBJECT_PERMISSION_CHANGE_GROUP)`\n- `ADD (SERVER_OBJECT_PERMISSION_CHANGE_GROUP)`\n\
    - `ADD (SERVER_PERMISSION_CHANGE_GROUP)`\n- `ADD (DATABASE_CHANGE_GROUP)`\n- `ADD\
    \ (DATABASE_OBJECT_CHANGE_GROUP)`\n- `ADD (DATABASE_PRINCIPAL_CHANGE_GROUP)`\n\
    - `ADD (SCHEMA_OBJECT_CHANGE_GROUP)`\n- `ADD (SERVER_OBJECT_CHANGE_GROUP)`\n-\
    \ `ADD (SERVER_PRINCIPAL_CHANGE_GROUP)`\n- `ADD (SERVER_OPERATION_GROUP)`\n- `ADD\
    \ (APPLICATION_ROLE_CHANGE_PASSWORD_GROUP)`\n- `ADD (LOGIN_CHANGE_PASSWORD_GROUP)`\n\
    - `ADD (SERVER_STATE_CHANGE_GROUP)`\n- `ADD (DATABASE_OWNERSHIP_CHANGE_GROUP)`\n\
    - `ADD (SCHEMA_OBJECT_OWNERSHIP_CHANGE_GROUP)`\n- `ADD (SERVER_OBJECT_OWNERSHIP_CHANGE_GROUP)`\n\
    - `ADD (USER_CHANGE_PASSWORD_GROUP)`\n\n`WITH (STATE = ON)`\n\nThe server audit\
    \ in Listing 15-2 will only get the schema and permissions changes. This will\
    \ keep your audit files smaller and fewer in number.\n\n## Querying SQL Server\
    \ Audit Data\nUntil each file reaches its max size, it will be stored on the database\
    \ instance. Those audit files are stored in `D:\\rdsdbdata\\SQLAudit\\`. Once\
    \ it reaches its max size, it will be uploaded into S3. At that point, the file\
    \ is moved into the retention folder, which is named `transmitted`. Then, your\
    \ audit files will be stored in `D:\\rdsdbdata\\SQLAudit\\transmitted`.\n\nTo\
    \ query the audit data, use the script in Listing 15-3.\n\n**Listing 15-3.** Query\
    \ audit data not transmitted to S3\n\n```sql\nSELECT DISTINCT\n    event_time,\n\
    \    aa.name as audit_action,\n    statement,\n    succeeded,\n    database_name,\n\
    \    server_instance_name,\n    schema_name,\n    session_server_principal_name,\n\
    \    server_principal_name,\n    object_Name,\n    file_name,\n    client_ip,\n\
    \    application_name,\n    file_name\nFROM msdb.dbo.rds_fn_get_audit_file('D:\\\
    rdsdbdata\\SQLAudit\\*.sqlaudit', default, default) af\nINNER JOIN sys.dm_audit_actions\
    \ aa\n    ON aa.action_id = af.action_id\nWHERE event_time > DATEADD(HOUR, -1,\
    \ GETDATE())\nORDER BY event_time DESC;\n```\n\n**Tip:** AWS has done a good job\
    \ with auditing to mimic SQL Server as much as possible. You can use `*.sqlaudit`\
    \ to query all the audit files at once. It’s harder to query audit data in Azure\
    \ SQL Database Managed Instance. This is because you have to know the exact names\
    \ of the files. You can’t use `*.sqlaudit` to query all the files at once in Azure\
    \ SQL Database Managed Instance.\n\nEven with the audit set up in Listings 15-1\
    \ and 15-2, it’s going to capture a lot of actions happening in the background.\
    \ You will need to filter it. There’s going to be a user something like `WORKGROUP\\\
    EC2AMAZ-QG7G9L3$`, depending on your instance.\n\n## Filtering Audit Data\nYou\
    \ will need to filter that user out to avoid having issues with too much audit\
    \ data. You may also be seeing a lot of `sys` schema, which you won’t need to\
    \ audit. Also, `rdsa` may be audited a lot, and that will be more background actions\
    \ you don’t need to audit. The filter you need will depend on what you see coming\
    \ through cluttering up your audit. Listing 15-4 gives you a way to filter your\
    \ audit.\n\n**Listing 15-4.** Filtering your audit\n\n```sql\nUSE [master];\n\
    ALTER SERVER AUDIT [AuditSpecification] WITH (STATE = OFF);\n\nALTER SERVER AUDIT\
    \ [AuditSpecification]\nWHERE [database_name] <> 'rdsadmin'\n    AND session_server_principal_name\
    \ <> 'WORKGROUP\\EC2AMAZ-QG7G9L3$'\n    AND schema_name <> 'sys'\n    AND server_principal_name\
    \ <> 'rdsa';\n\nALTER SERVER AUDIT [AuditSpecification] WITH (STATE = ON);\n```\n\
    \nIf you need to query audit data that has already been moved to S3, you will\
    \ need to change your query as shown in Listing 15-5. The only difference from\
    \ Listing 15-3 is the filename path.\n\n**Listing 15-5.** Query audit data transmitted\
    \ to S3\n\n```sql\nSELECT DISTINCT\n    event_time,\n    aa.name as audit_action,\n\
    \    statement,\n    succeeded,\n```"
