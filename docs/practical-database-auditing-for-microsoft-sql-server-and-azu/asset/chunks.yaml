- fmt: "# Chapter 3 What Is SQL Server Audit?\n\n## Audit specifications for different\
    \ scenarios\n\n*   **Audit everything a specific user does**\n    *   **Audit\
    \ specification name** – `Audit_user`\n        Make sure to filter the audit specification\
    \ so it only captures actions made by the user account.\n    *   **Server audit\
    \ specification name** – `ServerAudit_user`\n        Make sure to audit all the\
    \ database and server-level actions the same way and add in the `DATABASE_OBJECT_ACCESS_GROUP`\
    \ and `SCHEMA_OBJECT_ACCESS_GROUP` actions.\n\n*   **Auditing schema and perms\
    \ changes for a specific database**\n    *   **Audit specification name** – `Audit_DatabaseChanges`\n\
    \    *   **Database audit specification name** – `DatabaseAudit_DatabaseChanges`\n\
    \        Make sure to add all the audit actions starting with `DATABASE` and `SCHEMA`\
    \ into your database audit specification.\n\n*   **Audit everyone changing a table**\n\
    \    *   **Audit specification name** – `Audit_tblChanges`\n    *   **Database\
    \ audit specification name** – `DatabaseAudit_tblChanges`\n        Make sure to\
    \ use the audit action types of `INSERT`, `UPDATE`, `DELETE`, `SELECT`, and/or\
    \ `EXECUTE`.\n\nIn the next chapter, you will learn how to set up and configure\
    \ these audits in SQL Server Management Studio.\n\n# Chapter 4 Implementing SQL\
    \ Server Audit via the GUI\n\nTo make SQL Server auditing work, you need two or\
    \ three components depending on what you want to audit. Chapter 3, “What Is SQL\
    \ Server Audit?”, covered what each of these components are and the audit categories\
    \ and groups associated with them.\n\nIn this chapter, you will learn how to set\
    \ up the audit in SQL Server Management Studio (`SSMS`).\n\n## Setting Up the\
    \ Audit\n\nFor a quick recap, to make SQL Server auditing work, you need two or\
    \ three things depending on what you want to audit.\n\n*   You’re required to\
    \ create an audit. This will determine where you store audit data, how much audit\
    \ data to keep, and several other settings associated with auditing.\n*   You\
    \ will also need one server and/or one database audit to collect audit data. The\
    \ server and database audits must be associated with an audit. Each audit can\
    \ have one server and one database audit per database. These server and database\
    \ audits are not dependent on each other. The server audit specification is generally\
    \ good for auditing server-level changes and/or all the databases at the same\
    \ time. The database audit specification is good for auditing one database or\
    \ a subset of activities in one database.\n\nFigure 4-1 shows how to create an\
    \ audit in `SSMS` by right-clicking `Audits` under the `Security` section.\n\n\
    © Josephine Bush 2022\nJ. Bush, *Practical Database Auditing for Microsoft SQL\
    \ Server and Azure SQL*, [https://doi.org/10.1007/978-1-4842-8634-0_4](https://doi.org/10.1007/978-1-4842-8634-0_4#DOI)\n\
    \n![](index-47_1.png)\n![](index-47_2.png)\n\n***Figure 4-1.** Creating an audit*\n\
    \nBy choosing `New Audit`, you will get a dialog box to choose the options of\
    \ your audit as shown in Figure 4-2.\n\n***Figure 4-2.** Configuring an audit\
    \ dialog box*\n\nHere are some suggestions on how to configure your audit:\n\n\
    *   **Audit name** – I tend to name it `AuditSpecification` or `AuditSpecification_servername`.\
    \ This is entirely up to you based on how descriptive you want to name it. You\
    \ can create multiple audits, though, so it may make sense to make it a more descriptive\
    \ name if you plan to add additional audits.\n*   **Queue delay** – This is the\
    \ wait time in milliseconds before it audits. You can set this to `0`, `1000`,\
    \ or something greater than `1000`. I leave it at `1000`.\n*   **On audit log\
    \ failure**\n    *   **Continue** – If the audit can’t capture the statement,\
    \ it keeps auditing. You might miss a statement here and there, but I doubt that\
    \ happens often, if at all.\n    *   **Fail operation** – If it can’t audit, it’s\
    \ going to cause the statement"
