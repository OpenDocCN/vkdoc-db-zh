- fmt: '# Chapter 13 Auditing Azure SQL Databases


    To find out how to do this, [visit the Azure lifecycle management documentation](https://docs.microsoft.com/en-us/azure/storage/blobs/lifecycle-management-policy-configure?tabs=azure-portal).


    ## Create a Container for Audit Files


    Once you’ve created the storage account, you need to create a container to hold
    your audit files. Navigate to the storage account and click `Containers`. Then
    click the `+ Container` button. Name your container and leave the Public access
    level on `Private (no anonymous access)`. Click `Create`. This is shown in Figure
    13-22.


    **Figure 13-22.** Container creation

    ![](index-234_1.png)


    After clicking `Create`, you will see your container listed. Click the container
    and choose `Properties`. Copy the URL for the next steps as shown in Figure 13-23.


    **Figure 13-23.** Copy container URL

    ![](index-235_1.png)


    ## Generate a Shared Access Signature (SAS)


    Then navigate back up to the storage account and click `Shared access signature`.
    Make sure to create your settings for this key based on the screenshot in Figure
    13-24.


    **Figure 13-24.** Create shared access signature

    ![](index-236_1.png)


    The settings I’ve chosen for my shared access signature are:


    *   **Allowed services** – `Blob`.

    *   **Allowed resource types** – `Service`, `Container`, `Object`.

    *   **Allowed permissions** – `Read`, `Write`, `Delete`, `List`, `Add`, `Create`.

    *   **Blob versioning permissions** – Allows version deletion.

    *   **Allowed blob index permissions** – `Read/Write`, `Filter`.

    *   **Start and expiry date/time** – If it expires, your managed instance will
    not be able to access the container anymore. You will need to generate a new shared
    access signature. Then update your managed instance credential with the new token.
    I tend to set the expiry for years out to avoid issues with not being able to
    access the storage account.

    *   **Allowed protocols** – `HTTPS only`.

    *   **Preferred routing tier** – `Basic (default)`.

    *   **Signing key** – `Key 1`.


    Click `Generate SAS and connection string`. The SAS token will load on that page.
    Do not navigate off of this page. You can’t get the SAS token ever again. If you
    need a new token, you have to generate a new SAS setup. Copy the SAS token for
    the next steps as shown in Figure 13-25.


    **Figure 13-25.** Copy SAS token


    **Note:** You need to remove the question mark (`?`) from the beginning of the
    token when adding it to the SQL Server credential.


    ## Create Database Credential


    Connect to your Azure SQL Database in SSMS. You will need a master key. Your database
    may already have one, so if you get an error saying the master key already exists,
    you can proceed to the script in Listing 13-6. The script in Listing 13-5 needs
    to be executed on the database you want to audit, not in the `master` database.


    **Listing 13-5.** Create master key encryption

    ```sql

    CREATE MASTER KEY ENCRYPTION

    BY PASSWORD=''Testing1234!'';

    ```


    You need to create a credential so your database can access your storage account
    as shown in Listing 13-6. This also needs to be executed on the database you want
    to audit, not in the `master` database. The square brackets are needed around
    the URL. For example, `[https://whateveryourazurebloburlis]` will be the correct
    syntax for the name of the database scoped credential.


    **Listing 13-6.** Create credential

    ```sql

    CREATE DATABASE SCOPED CREDENTIAL [URL from Figure 13-23 and keep these

    square brackets around this URL]

    WITH IDENTITY=''SHARED ACCESS SIGNATURE''

    ,SECRET = ''this is the token from Figure 13-25'';

    ```'
