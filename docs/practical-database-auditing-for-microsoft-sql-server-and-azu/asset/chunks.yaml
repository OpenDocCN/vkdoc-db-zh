    ## CHAPTER 6 WHAT IS EXTENDED EVENTS?


    *Figure 6-9. Extended event category drop-down*


    The events listed in the following are the events I recommend for auditing user
    actions. You can use other events if you choose, but these events I always use
    in my extended event audits:


    * `rpc_completed`

    * `sql_batch_completed`


    You don’t need to filter the category, channel, or package drop-downs to use these
    events. You can search for them in the search box shown in Figure 6-10. The event
    will be listed under Name.


    *Figure 6-10. Searching for an event in the event library*


    ### Extended Events Global Fields and Predicates


    For each of the events you select, you will need to choose global fields to capture
    event data. Global events are also known as actions. When you first select an
    event to include in your extended event session, it will default to 0 global fields
    shown in Figure 6-11. This doesn’t mean it won’t capture any information, though,
    because there are fields that are captured by default. Global fields give you
    more control over what you are capturing.


    ![](index-104_1.jpg)


    ![](index-104_2.png)


    ## CHAPTER 6 WHAT IS EXTENDED EVENTS?


    *Figure 6-11. Extended events selected events with no global fields*


    You need to click the configure button to see the global fields for your selected
    event, which is shown in Figure 6-11.


    After you click configure, you will be brought to a configuration screen where
    you can choose your global fields. Figure 6-12 shows you `rpc_completed` and its
    associated global fields.


    *Figure 6-12. Extended events `rpc_completed` without any global fields selected*


    I recommend using these global fields to capture the information you will need
    for your event:


    * `client_app_name`

    * `client_hostname`

    * `database_name`

    * `server_instance_name`

    * `server_principal_name`

    * `sql_text`


    ![](index-105_1.jpg)


    ## CHAPTER 6 WHAT IS EXTENDED EVENTS?


    Also note in Figure 6-12 there is a filter tab. Filter is also known as a predicate.
    This is where you can filter your extended events to capture only certain users,
    databases, schemas, objects, and many more. Once you have a filter on your selected
    event, it will show a checkmark under the filter symbol as shown in Figure 6-13.
    You will also see that the lightning bolt icon has six listed under it because
    I’ve chosen six global fields for each event.


    *Figure 6-13. Extended events `rpc_completed` with filter*


    You will also need to add this filter to the `sql_batch_completed` event to ensure
    you are getting the same filter across all your events. You can filter on many
    different fields. How to set up an extended event with these settings will be
    covered in Chapter 7, “Implementing Extended Events via the GUI.”


    ### Extended Events Targets


    You need to select a target for your extended event. This target type will store
    your session data. This is set under the Data Storage page as shown in Figure
    6-14.


    ![](index-106_1.png)


