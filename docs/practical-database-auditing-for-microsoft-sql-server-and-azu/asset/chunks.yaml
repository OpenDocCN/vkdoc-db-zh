- fmt: '# Chapter 4 Implementing SQL Server Audit via the GUI


    are able to disable any audit, but it may take a while for the audit to finish
    auditing before it can disable itself.


    Because you can’t disable the audit while it’s auditing actions, be very careful
    how and what you `audit`. You can overload or freeze up a production server. It
    happened to me. I didn’t think it was possible to crash a production server with
    an `audit`. I thought I could stop the `audit` in between things it was auditing.
    Even if it’s not hard to disable your `audit`, if it’s auditing too much, it’s
    going to be hard to weed through all the data. It will be like trying to find
    a needle in a haystack, then you might as well not `audit` at all. I go with the
    less is more method of `auditing`.


    My `audit` disabling horror story happened when I tried to stop an `audit` on
    a very busy production server, and it locked up. The `audit` wouldn’t disable,
    then, all of a sudden, queries couldn’t complete, then I couldn’t even get into
    the server via `SSMS`. I had to restart the service and caused a production outage.
    Thankfully, a very short outage. Technically, that should not happen, though.


    ![](index-70_1.jpg)


    ## Note


    Always enable the dedicated administrator connection (`DAC`) in `SQL Server`.
    This way, you can always connect via `DAC` if you encounter connection issues.
    To learn more, visit [https://docs.microsoft.com/en-us/sql/database-engine/configure-windows/diagnostic-connection-for-database-administrators?view=sql-server-ver15#connecting-with-dac](https://docs.microsoft.com/en-us/sql/database-engine/configure-windows/diagnostic-connection-for-database-administrators?view=sql-server-ver15#connecting-with-dac).


    You should get a `lock request timeout period exceeded` error as shown in Figure
    4-27.


    **Figure 4-27.** Error disabling audit


    I couldn’t get it to crash in `SQL Server 2019` because I couldn’t mimic that
    load. The `auditing` doesn’t care about long-running statements because it captures
    the statement and waits for the next one. The issue is when you `audit` statements
    that just keep coming one after the other and the `audit` never has a chance to
    disable in between statements. I was on a `SQL Server 2014` when my horror story
    happened, so it may be the nature of the version I was on or how busy the server
    was. I also had very specific `PCI` `auditing` requirements, so I couldn’t minimize
    the `auditing` as I’ve shown in this chapter.


    ![](index-71_1.png)


    ## Modifying Audits


    Once an `audit` is created, you can modify it by right-clicking it and choosing
    `Properties` as shown in Figure 4-28.


    **Figure 4-28.** Modifying an audit


    You can’t modify it while it’s enabled as shown by the error in Figure 4-29.


    ![](index-72_1.png)


    **Figure 4-29.** Error modifying audit while it’s enabled


    The only thing you can’t modify is the name. You must delete it and recreate it
    to change the name.


    In the next chapter, you will learn how to make your life easier by scripting
    out the `audits` you want to place on your servers. It’s much easier than all
    of this clicking and right-clicking.


    ![](index-73_1.png)


    # CHAPTER 5 Implementing SQL Server Audit via SQL Scripts


    To make `SQL Server` `auditing` work, you need two or three components depending
    on what you want to `audit`. Chapter 3, “What Is SQL Server Audit?”, covered what
    each of these components are and the `audit` categories and groups associated
    with them.'
