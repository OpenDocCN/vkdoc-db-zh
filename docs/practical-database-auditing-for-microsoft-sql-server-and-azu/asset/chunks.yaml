    ## About the Author


    **Josephine Bush** has more than ten years of experience as a database administrator.
    Her experience is extensive and broad based, including experience in financial
    and energy data systems using `SQL Server`, `MySQL`, `Oracle`, and `PostgreSQL`.
    She is a `Microsoft Certified Solutions Expert: Data Management and Analytics`.
    She holds a BS in Information Technology, an MBA in IT Management, and an MS in
    Data Analytics. She is the author of *Learn SQL Database Programming*. You can
    reach her on Twitter `@hellosqlkitty`.


    ## About the Technical Reviewer


    **Kathi Kellenberger** is a Customer Success Engineer at Redgate and a Data Platform
    MVP. She has worked with `SQL Server` since 1998 and has authored, co-authored,
    or tech-reviewed over 20 technical books. Kathi is a volunteer at LaunchCode in
    St. Louis where she teaches `T-SQL` in the LaunchCode Women+ program. When Kathi
    isn’t working, she enjoys spending time with family and friends, cycling, singing,
    and climbing the stairs of tall buildings.


    ## Acknowledgments


    Thank you to my technical reviewer, Kathi, whose careful review and thoughtful
    suggestions improved the book.


    Thank you to the team at Apress, especially Jonathan Gennick and Jill Balzano,
    who were instrumental in bringing this book to publication.


    Thank you, dear reader, for reading this book. My hope is that you will come to
    love auditing as much as I do, but if nothing else, your life is made a bit easier
    with the guidance I’ve provided.


    ## Introduction


    People usually think of auditing as scary or boring. Scary because the auditors
    will see you doing something wrong and you will get in trouble. Boring because
    you picture pencil pushers digging through piles of paper searching for some little
    error.


    I worked at a financial company with very strict auditing requirements. I tried
    my hand at `SQL Server Audit` and extended events (`XEvents`) for `PCI` compliance.
    It was a nice surprise when the skeptical `PCI` auditors reviewed my implementation
    and said it'
