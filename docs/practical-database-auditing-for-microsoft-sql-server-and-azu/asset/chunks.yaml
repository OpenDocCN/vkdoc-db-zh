    *Figure 2-14. Enabling auditing on Azure SQL database*


    ## Auditing Azure SQL Managed Instance


    Auditing `Azure SQL Managed Instance` is much the same as auditing on-premises
    `SQL Server`. The main difference is you don’t have access to the virtual machine
    under the database server, so you will need to set up cloud storage to hold the
    audit or event files. Refer to the sections on `SQL Server Audit` and `extended
    events` to help you understand how they work. `Azure SQL Managed Instance` auditing
    will be covered in more detail in [Chapter 14, “Auditing Azure SQL Managed Instance.”](https://doi.org/10.1007/978-1-4842-8634-0_14)


    ## Amazon Web Services and Google Cloud Auditing Options


    *Amazon Web Services (AWS)* has an offering called *Relational Database Service
    (RDS)* in which you can host your `SQL Server` databases. This offering will allow
    you to use `SQL Server Audit` and `extended events` in much the same way you can
    in on-premises `SQL Server`, but you will need to set up cloud storage to hold
    the files; in this case, it’s called `S3`. [Chapter 15, “Other Cloud Provider
    Auditing Options,”](https://doi.org/10.1007/978-1-4842-8634-0_15) will cover more
    details on `AWS RDS` auditing.


    *Google Cloud* database auditing works more like `Azure SQL Database` auditing
    in that you will need to enable it through the `Google Cloud` portal. [Chapter
    15, “Other Cloud Provider Auditing Options,”](https://doi.org/10.1007/978-1-4842-8634-0_15)
    will cover more details on `Google Cloud` database auditing.


    # Chapter 3 What Is SQL Server Audit?


    `SQL Server Audit` is built-in auditing functionality available via `SQL Server
    Management Studio` GUI or `SQL` scripts. You can set it up and configure it to
    capture pretty much anything that happens on `SQL Server`. It’s quite flexible
    and easy to set up.


    ## SQL Server Audit Availability


    The first version of `SQL Server Audit` was available in `2008`, and it was only
    in `Enterprise` edition. As of the `2012` version, Microsoft expanded it to be
    available in server-level audits with all editions, but database auditing was
    still only in `Enterprise`. By `2016` and since, you can do server and database
    auditing with any edition, which is so much nicer since a lot of people don’t
    use `Enterprise` edition only. Table [3-1](#index_split_000.html#p33) outlines
    the availability of `SQL Server Audit`.


    *Table 3-1. SQL Server Audit availability by version*


    | Version | Server audit availability | Database audit availability |

    | :--- | :--- | :--- |

    | 2008 | Enterprise | Enterprise |

    | 2012, 2014, and 2016 before SP1 | All editions | Enterprise |

    | 2016 SP1, 2017, and 2019 | All editions | All editions |


    © Josephine Bush 2022

    J. Bush, *Practical Database Auditing for Microsoft SQL Server and Azure SQL*,
    [https://doi.org/10.1007/978-1-4842-8634-0_3](https://doi.org/10.1007/978-1-4842-8634-0_3#DOI)


    ![](index-34_1.png)


    ## SQL Server Audit Requirements


    To make `SQL Server` auditing work, you need two or three things depending on
    what you want to audit. You are required to create an `audit`. This will determine
    where you store audit data. You will also need one `server` and/or one `database
    audit specification` that defines what you want to capture. Each `audit` can have
    one `server specification` and/or one `database specification` per database. Those
    server and database audits are not dependent on each other.


    The screenshot in Figure [3-1](#index_split_000.html#p34) shows you the locations
    of the audits.


    *Figure 3-1. SQL Server audits*


    Note that the `SQL Server audits` highlighted in Figure [3-1](#index_split_000.html#p34)
    aren’t there by default. I created those to give you a point of reference for
    where you can find them.


    The `audit specification` is where you will configure where to store your audit,
    how'
