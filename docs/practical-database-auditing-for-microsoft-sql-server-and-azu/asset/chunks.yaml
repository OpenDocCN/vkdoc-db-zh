    \ ) +`\n`N''</table>'' ;`\n`EXEC msdb.dbo.sp_send_dbmail`\n`@recipients='+@mailrecipients+',`\n\
    `@subject = ''Audit Findings - Changes on Production Servers Last 24`\n`Hours'',`\n\
