    **使用 SQL Server 审计审计 Azure SQL 托管实例**


    在 Azure SQL 托管实例上使用 SQL Server 审计与在虚拟机上运行的 SQL Server 非常相似。主要区别在于存储位置。你需要使用一个存储账户来写入审计文件。除此之外，设置与
    SQL Server 相同。请参阅本书前面章节中关于如何设置 SQL Server 审计的内容。


    **创建存储账户和容器**


    在 Azure 门户中，搜索存储账户。点击创建。此时，你需要选择：


    • **订阅** – 选择一个订阅。

