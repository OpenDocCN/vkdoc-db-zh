    \ (@@ERROR <> 0 OR @ReturnCode <> 0) GOTO QuitWithRollback`\n`COMMIT TRANSACTION`\n\
    `GOTO EndSave`\n`QuitWithRollback:`\n`IF (@@TRANCOUNT > 0) ROLLBACK TRANSACTION`\n\
    `EndSave:`\n`GO`\n\n## 使用说明与注意事项\n\n对于清单 12-4 中的脚本，有以下几点需要注意或需要更新：\n\n*   通过电子邮件发送的\
    \ SQL 语句将仅包含前 50 个字符。否则，HTML 格式将无法正常工作。完整的语句存储在数据库中，以供需要时参考。\n*   更新脚本顶部的变量：\n\
    \    *   `@profilename` – 这是你的数据库邮件配置文件的名称。\n    *   `@mailrecipients` – 这将是接收此审计报告电子邮件的人员。\n\
    \n![](img/index-209_1.png)\n\n电子邮件将类似于图 12-1 中的表格。具体结果将根据数据库服务器上发生的情况而有所不同。\n\n\
    *图 12-1. SQL Server 代理作业审计报告示例*\n\n## 使用 PowerShell 生成 HTML 报告\n\n如果你想用审计查询结果创建\
    \ HTML 文件。你可以改用 PowerShell。清单 12-5 提供了一个 PowerShell 脚本示例。此脚本将捕获过去七天的所有审计数据。\n\n\
    *清单 12-5. 使用 PowerShell 通过电子邮件创建并发送 HTML 文档*\n\n```powershell\n# 将这些变量更新为你的值\n\
    $OutputFile = \"E:\\powershell\\sqlserverauditfindings.html\"\n$CentralServerName\
    \ = \"yourcentralserver\"\n$SendEmailFrom = \"youremail@domain.com\"\n$SendEmailTo\
    \ = \"recipient@domain.com\"\n$SMTPServer = \"smtp.domain.com\"\n$EmailSubject\
    \ = \"审计结果 - 过去 7 天 SQL Server 生产服务器上的变更\"\n\n# 请勿更改下方任何内容\n$Header = @\"\n<style>\n\
    TABLE {border-width: 1px; border-style: solid; border-color: black; border-collapse:\
    \ collapse;}\nTD {border-width: 1px; padding: 3px; border-style: solid; border-color:\
    \ black;}\nTH {border-width: 1px; padding: 3px; border-style: solid; border-color:\
    \ black; text-align: left;}\nBODY {width:800px;}\ntd:nth-child(2) {max-width:\
    \ 400px;}\n</style>\n\"@\n\n# 如果由于某种原因文件仍然存在（来自之前的运行），则将其删除\nif (Test-Path $OutputFile){\
    \ Remove-Item -Path $OutputFile -Force}\n\n# 确保查询至少返回一行\n$querycount = Invoke-Sqlcmd\
    \ -Query \"SELECT count(event_time) as count FROM [Auditing].[dbo].[AuditChanges]\
    \ a WHERE event_time > getdate()-7\" -ServerInstance $CentralServerName\n\n# 如果至少有一行，则查询审计数据并创建\
    \ HTML 文件\nif($querycount.count -gt 0) {\n    #查询过去 7 天的审计事件并转换为 html 文件\n   \
    \ Invoke-Sqlcmd -Query \"SELECT convert(varchar, MAX([event_time]), 22) as event_time,\
    \ [audit_action], [succeeded], [statement], [server_instance_name], [database_name],[schema_name],\
    \ [session_server_principal_name] FROM [Auditing].[dbo].[AuditChanges] a WHERE\
    \ event_time > getdate()-7 GROUP BY [audit_action], [succeeded], [statement],\
    \ [server_instance_name], [database_name], [schema_name], [session_server_principal_name]\
    \ ORDER BY server_instance_name, database_name, schema_name, session_server_principal_name\
    \ DESC\" `\n    -ServerInstance $CentralServerName | ConvertTo-HTML `\n    -Head\
    \ $Header `\n    -Property event_time,audit_action,succeeded,statement,server_instance_name,database_name,schema_name,session_server_principal_name,name_in_ad\
    \ `\n    | Out-File $OutputFile -Encoding utf8\n\n    # 通过电子邮件发送文件\n    Send-MailMessage\
    \ -From $SendEmailFrom `\n    -To $SendEmailTo `\n    -Subject $EmailSubject `\n\
    \    -Attachments $OutputFile `\n    -SmtpServer $SMTPServer\n\n    # 删除 HTML\
    \ 文件\n    Remove-Item –path $OutputFile\n}\n```\n"
- fmt: "# 无审计行时，不会创建文件\n\n```powershell\nelse {\n    Write-Output \"nothing happened\
    \ bc there were zero rows\"\n}\n```\n\n脚本清单 [12-5](#index_split_002.html#p209)\
    \ 中唯一需要更新的是顶部的变量：\n\n*   `$OutputFile` – 需要设置为您服务器上的一个路径\n*   `$ServerInstance`\
    \ – 需要指向您的中央审计数据库服务器（在第11章“集中审计数据”中设置）\n*   `$SendEmailFrom` – 设置为您发送邮件的邮箱地址\n\
    *   `$SendEmailTo` – 设置为您要发送到的邮箱地址\n*   `$SMTPServer` – 设置为您正在使用的SMTP服务器\n*  \
    \ `$EmailSubject` – 设置为您想要的邮件主题，我已包含我惯用的主题\n\n生成的HTML文件将如图 [12-2](#index_split_002.html#p212)\
    \ 所示。您的结果可能会根据数据库服务器上发生的情况而有所不同。除非您在`$OutputFile`变量中更改它，否则文件将被命名为`sqlserverauditfindings.html`。\n\
    \n![图12-2](index-212_1.png)\n*图 12-2. PowerShell HTML 文件示例*\n\n通过电子邮件发送审计结果，可以轻松掌握数据库服务器上发生的变化。以下是我设定的审计报告发送计划：\n\
