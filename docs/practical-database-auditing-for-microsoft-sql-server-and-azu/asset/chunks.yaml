    ![](index-101_1.jpg)


    ![](index-101_2.jpg)


    ChApTER 6 WhAT IS ExTENdEd EVENTS?


    ***Figure 6-6.** Import a template*


    **Extended Events Event Library**


    The event library in extended events is quite extensive. It enables you to capture
    events


    happening in SQL Server.


    A package is a container for extended event objects. There are many types of


    packages. Packages can include channels, categories, and events, all of which
