- fmt: '# Chapter 15 Other ClOud prOvider auditing OptiOnS


    **Note** if you already have an option group handling your database backups, you
    can add auditing to it.


    To create a new option group, search for and click on RDS. You will need the engine
    and its version to create the new option group. First, let’s check the engine
    of your RDS Instance. Click on your RDS instance. In the Summary section, you
    will see the Engine as shown in Figure 15-5. Make note of that engine. Then click
    Configuration as shown in Figure 15-5.


    ***Figure 15-5.** RDS Configuration*


    ![](index-274_1.png)


    ![](index-274_2.png)


    Make a note of your Engine version as shown in Figure 15-6.


    ***Figure 15-6.** The engine version*


    To set up a new option group, click Option groups as shown in Figure 15-7.


    ***Figure 15-7.** Option groups menu item*


    Since I only have the default option group right now, I will create a new option
    group. Click the Create group button as shown in Figure 15-8.


    ![](index-275_1.jpg)


    ![](index-275_2.jpg)


    ***Figure 15-8.** Create group button*


    Once you are on the Create group page, you will have four fields to fill out as
    shown in Figure 15-9.


    ***Figure 15-9.** Create option group settings*


    ![](index-276_1.jpg)


    For the settings on the Create option group page:


    • **Name** – You can name it whatever you want. It’s best to name it something
    descriptive enough that you can tell what it’s for. You can have multiple options
    in the group, though, so you don’t have to put auditing in the name.


    • **Description** – To help you determine what is in the option group.


    • **Engine** – Choose the engine you got from your RDS summary in Figure 15-5.


    • **Major Engine Version** – Choose the major engine version you got from your
    engine version configuration setting in Figure 15-6.


    Click Create. Now your option group is ready for options to be added to it.


    ## Adding Auditing Option to New Option Group


    Once it’s created, click on it in the list as shown in Figure 15-10.


    ***Figure 15-10.** Click on the new option group*


    Scroll down to the Options box and click Add Option as shown in Figure 15-11.


    ![](index-277_1.jpg)


    ![](index-277_2.jpg)


    ***Figure 15-11.** Add option button*


    On the Add Option page, you need to choose `SQLSERVER_AUDIT` and your `S3` bucket
    as shown in Figure 15-12. You can choose a prefix on your `S3` bucket. If you
    don’t put in a prefix, the audit files will be placed in the root folder of the
    bucket.


    ***Figure 15-12.** Add option settings*


    ![](index-278_1.jpg)


    ![](index-278_2.jpg)


    You will need an `IAM` role. If you don’t already have an `S3` role, create one
    now. This role will allow your RDS instance to talk to the bucket. Choose Create
    new role in the `IAM` role drop-down as shown in Figure 15-13.


    ***Figure 15-13.** Create a new `IAM` role*


    You can name the new role something like `AWSServiceS3forRDS` as shown in Figure
    15-14.


    ***Figure 15-14.** Creating `IAM` role name*


    ![](index-279_1.jpg)


    ![](index-279_2.png)


    Expand the Additional configuration section. Leave the compression enabled and
    enable the retention as shown in Figure 15-15. You can retain between 1 and 840
    hours of audit logs. If you leave retention disabled, the audit logs will be removed
    immediately after they are offloaded from your RDS instance. I set it to a week,
    so I know I can query all the audit data before that week goes by.


    ***Figure 15-15.** Compression and retention settings*'
