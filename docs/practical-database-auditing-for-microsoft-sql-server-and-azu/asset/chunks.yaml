- fmt: "# Chapter 8 Implementing Extended Events via SQL Scripts\n\n![image](index-154_1.png)\n\
    \n![image](index-154_2.jpg)\n\nFigure 8-7 shows you what the query in Listing\
    \ 8-4 returns.\n\n**Figure 8-7.** Extended events additional settings\n\nFigure\
    \ 8-7 shows you that the extended event named `audit_sa` has two settings in the\
    \ system views. `filename` shows where the file is stored. `max_file_size` shows\
    \ it’s set to 10 MB.\n\n**Tip** To get a description of all the columns in the\
    \ extended event system views, visit [https://docs.microsoft.com/en-us/sql/relational-databases/extended-events/xevents-references-system-objects?view=sql-server-ver15#system-catalog-views](https://docs.microsoft.com/en-us/sql/relational-databases/extended-events/xevents-references-system-objects?view=sql-server-ver15#system-catalog-views)\n\
    \n## Extended Event Files\n\nIf you chose the file destination for your extended\
    \ event, the `.xel` file is placed on disk after you enable the extended event\
    \ as shown in Figure 8-8. This is where the event data will live.\n\n**Figure\
    \ 8-8.** Extended event files on disk\n\nAs the data collects, this file is going\
    \ to grow to the size specified in the extended event. Then it’ll create another\
    \ file up to the number of files specified in the configuration. Once the last\
    \ file is full, it will delete the oldest file and create another new file. You\
    \ will need to know how fast your files fill up so you won’t miss collecting the\
    \ data from them before they are deleted.\n\n## Querying Extended Event Data\n\
    \nYou can query your extended event session with a SQL Server system function,\
    \ `sys.fn_xe_file_target_read_file`. This will give you a lot of different information\
    \ about your extended event and its associated metadata. Listing 8-7 gives you\
    \ a query to get the most relevant columns of the audit returned for the last\
    \ hour. There are a lot more fields in the XML, but they would need to be parsed\
    \ similarly as how I’ve parsed the fields out in Listing 8-7.\n\n**Listing 8-7.**\
    \ Query extended event session\n\n```sql\nSELECT n.value('(@timestamp)[1]', 'datetime')\
    \ as timestamp,\n       n.value('(action[@name=\"sql_text\"]/value)[1]', 'nvarchar(max)')\
    \ as [sql],\n       n.value('(action[@name=\"client_hostname\"]/value)[1]', 'nvarchar(50)')\
    \ as [client_hostname],\n       n.value('(action[@name=\"server_principal_name\"\
    ]/value)[1]', 'nvarchar(50)') as [user],\n       n.value('(action[@name=\"database_name\"\
    ]/value)[1]', 'nvarchar(50)') as [database_name],\n       n.value('(action[@name=\"\
    client_app_name\"]/value)[1]', 'nvarchar(50)') as [client_app_name]\nFROM (SELECT\
    \ CAST(event_data as XML) as event_data\n      FROM sys.fn_xe_file_target_read_file('e:\\\
    audits\\audit_sa*.xel', NULL, NULL, NULL)) ed\nCROSS APPLY ed.event_data.nodes('event')\
    \ as q(n)\nWHERE n.value('(@timestamp)[1]', 'datetime') >= DATEADD(HOUR, -1, GETDATE())\n\
    ORDER BY timestamp DESC;\n```\n\nFigure 8-9 shows you a cross-section of the results\
    \ from the query in Listing 8-6.\n\n![image](index-156_1.png)\n\n**Figure 8-9.**\
    \ Extended event query results\n\n**Tip** Find out more about `sys.fn_xe_file_target_read_file`\
    \ by visiting [https://docs.microsoft.com/en-us/sql/relational-databases/system-functions/sys-fn-xe-file-target-read-file-transact-sql?view=sql-server-ver15](https://docs.microsoft.com/en-us/sql/relational-databases/system-functions/sys-fn-xe-file-target-read-file-transact-sql?view=sql-server-ver15)"
