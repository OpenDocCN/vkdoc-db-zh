- fmt: '# Chapter 9 Tracking SQL Server Configuration Changes


    Figure 9-5 shows the query results from Listing 9-1. I made an additional configuration
    change. This way, you can see that configuration changes come through with “Configuration
    option” at the beginning of the Text.


    `Figure 9-5.` SQL Server Log query results*


    This query will only get one log file at a time. There is a way to loop through
    them, but a better way to capture them is with SQL Server Audit.


    ## Using SQL Server Audit to Capture Configuration Changes


    To understand how to set up SQL Server Audit, please read [Chapter 4](https://doi.org/10.1007/978-1-4842-8634-0_4),
    “Implementing SQL Server Audit via the GUI.” This will show you how to create
    an audit that the database audit will use in this section.


    To audit configuration changes, you will need to audit the stored procedure, `sp_configure`.
    This stored procedure is in the `master` database. When you use `SSMS GUI` to
    make changes, this stored procedure gets called. You can also call it yourself
    from a query window.


    To audit `sp_configure`, you need to set up a database audit on `master`. To do
    this, right-click `Database Audit Specifications` under `Security` in the `master`
    database as shown in Figure [9-6](#index_split_001.html#p164).


    ![](index-164_1.png)


    ![](index-164_2.jpg)


    Chapter 9 Tracking SQL Server Configuration Changes


    `Figure 9-6.` Menu for database audit specification in the `master` database


    This will bring up a dialog box, and you need to fill out the options as shown
    in Figure [9-7.](#index_split_001.html#p164)


    `Figure 9-7.` Set up database audit specification in the `master` database


    Chapter 9 Tracking SQL Server Configuration Changes


    `Note` I’ve associated this database audit specification with the audit that also
    has my server audit specification. That server audit specification captures changes
    to permissions and objects on SQL Server. This is covered in [Chapter 4,](https://doi.org/10.1007/978-1-4842-8634-0_4)
    “implementing SQL Server audit via the gui.” By associating the `sp_configure`
    database audit with the audit that has my server audit, I can ensure I capture
    all the server changes in one audit.


    To configure the database audit specification in `master`, you will need these
    pieces:


    - `Name –` `DatabaseAuditSpecification_spconfigure`. I like to name this specific
    to what I’m auditing.

    - `Audit –` You need to associate it with your audit. There is a drop-down with
    your audit listed. You need this association because this is where your audit
    data will live. This audit setup is covered in [Chapter 4,](https://doi.org/10.1007/978-1-4842-8634-0_4)
    “Implementing SQL Server Audit via the GUI.”

    - `Audit Action Type –` [Chapter 3](https://doi.org/10.1007/978-1-4842-8634-0_3),
    “What Is SQL Server Audit?”, has a section on Database Audit Action Groups to
    help you determine what each action audits. In this case, we are only using `EXECUTE`.
    This audits who executes a stored procedure or executes on an entire schema or
    database.

    - `Object Class –` Here you will choose `OBJECT`. There are other options covered
    in more detail in [Chapter 4, “](https://doi.org/10.1007/978-1-4842-8634-0_4)Implementing
    SQL Server Audit via the GUI.” Choose `OBJECT` to see queries using a specific
    table, view, stored procedure, or function.

    - `Object Schema –` Required for `OBJECT` class, in this case, `sys`.

    - `Object Name –` Required for `OBJECT`, `SCHEMA`, and `DATABASE` classes. In
    this case, `sp_configure`.

    - `Principal Name –` Required for `OBJECT`, `SCHEMA`, and `DATABASE` classes.
    Use `public` if you want to audit everyone. If you want to audit multiple users,
    you need one line for each user. I’m using `public` here because I want to capture
    anytime anyone makes a configuration change.


    Chapter 9 Tracking SQL Server Configuration Changes


    `Note` All audits are disabled when created. Make sure to enable it, so it collects
    audit data.


    You can also set up the database audit specification with a script, as shown in'
