    **Auditing Azure SQL Managed Instance with SQL Server Audit**


    SQL Server Audit on Azure SQL Managed Instance is very similar to SQL Server running
    on a VM. The main difference is the storage location. You will need to use a storage
    account to write audit files. The setup is the same as SQL Server otherwise. See
    earlier chapters in this book on how to set up SQL Server Audit.


    **Creating Storage Account and Container**


    In the Azure portal, search for storage accounts. Click Create. At this point,
    you need to choose:


    • **Subscription** – Select a subscription.

    • **Resource group** – You may want to put it in the same resource group as the
    managed instance.

    • **Storage account name** – Must be unique across Azure.

    • **Region** – I recommend putting this storage account in the same region as
    the database.

    • **Performance** – Standard is fine for performance.

    • **Redundancy** – Choose based on how important the audit data is for you.


    Click Review + Create. Then click Create. Figure 14-7 shows an example of the
    settings I chose.


