- fmt: '# Chapter 7 Implementing Extended Events via the GUI


    Figure 7-28 shows you how you can right-click the details and have the column
    load as part of the top panel.


    **Figure 7-28.** Modify columns in Watch Live Data results


    Once you choose `Show Column in Table`, you will see that column in the top panel
    as shown in Figure 7-29.


    **Figure 7-29.** Modified columns in Watch Live Data results


    ![](index-137_1.jpg)


    You can also add or remove other columns in Watch Live Data as shown in Figure
    7-30.


    **Figure 7-30.** Watch Live Data tab and add or remove columns


    When you have the `Watch Live Data` tab open, you will have access to a new menu
    item in `SSMS`, `Extended Events`. In particular, this menu makes it easy to export
    the data with the `Export to` option as shown in Figure 7-31.


    ![](index-138_1.png)


    ![](index-138_2.png)


    **Figure 7-31.** Watch Live Data tab and Extended Events menu item


    You can filter on a value by right-clicking on it and choosing `Filter by this
    Value` as shown in Figure 7-32.


    **Figure 7-32.** Filtering values in Watch Live Data results


    ![](index-139_1.jpg)


    `Filter by this Value` will bring up a dialog box for you to set your filter options.
    It will add the value you chose when you clicked `Filter by this Value` as shown
    in Figure 7-33. You can also set other filters in this dialog box as needed.


    **Figure 7-33.** Filtering values dialog box in Watch Live Data results


    If you find you are filtering a lot of event data when you watch live data, you
    will want to modify your extended event session’s properties so the event data
    is filtered before being captured into your `.xel` event file, if you are using
    the file target. You may have seen that SQL Server does a lot in the background
    to support the actions being taken by a user. This is a good time to discuss modifying
    your extended event because you may need to tweak some of the settings and add
    additional filters to limit event data.


    ## Modifying Extended Events


    Once an extended event is created, you can modify it by right-clicking on the
    session and choosing `Properties` as shown in Figure 7-34. You can modify an extended
    event when it’s started or stopped.


    ![](index-140_1.png)


    **Figure 7-34.** Modifying an extended event


    **Note** Unlike `SQl Server audit`, you can modify an extended event while it’s
    started.


    There will be multiple things you can’t change after you create the extended event,
    so those will be grayed out as shown in Figure 7-35. When you modify your extended
    event, the dialog box will look just like the New Session dialog box.


    ![](index-141_1.png)


    **Figure 7-35.** Modifying an extended event dialog box


    You can’t change these items after creation:

    - Session name

    - Template

    - Start immediately after creation (since you aren’t creating, but modifying)

    - Advanced settings


    If you need to change any of these items, you will have to delete and recreate
    your extended event.


    ![](index-142_1.png)


    ![](index-142_2.png)


    ## Stopping and Starting Extended Events


    You can stop an extended event by right-clicking on it and choosing `Stop Session`
    in the GUI as shown in Figure 7-36. Once it’s stopped, it won’t collect any event
    data.


    **Figure 7-36.** Stopping an extended event


    You can start an extended event by right-clicking on it and choosing `Start Session`
    in the GUI as shown in Figure 7-37.


    **Figure 7-37.** Starting an extended event


    **Note** Unlike `SQl Server audit`, you can stop an extended event even if it’s
    auditing events.


    ![](index-143_1.png)'
