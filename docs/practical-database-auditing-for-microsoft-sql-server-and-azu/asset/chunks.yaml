    1\" id=\"box-table\">'' +`\n`N''<tr><th>Event Time</th><th>Partial Statement</th>''\
    \ +`\n`N''<th>Server</th><th>Database</th><th>Schema</th>'' +`\n`N''<th>User</th><th>Successful</th></tr>''\
