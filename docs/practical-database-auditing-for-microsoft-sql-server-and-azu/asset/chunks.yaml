  trans: "# 第 14 章 审计 Azure SQL 托管实例\n\n## 启用并配置诊断设置\n\n在 Azure 门户中导航到你的托管实例，然后转到“诊断设置”。你需要点击\
    \ **+ 添加诊断设置** 来添加一个诊断设置，如图 14-1 所示。\n\n**图 14-1.** 添加诊断设置\n\n为你的诊断设置命名，然后选择 `SQLSecurityAuditEvents`。如果你还想要审计\
    \ Microsoft 在你的托管实例上执行的操作，可以选择 `DevOpsOperationsAudit`。选择你的目标详细信息。在这个例子中，我将数据存放在一个\
    \ Log Analytics 工作区中，如图 14-2 所示。\n\n**图 14-2.** 配置诊断设置\n\n点击 **保存**，你将看到你的诊断设置已列出，如图\
    \ 14-3 所示。\n\n**图 14-3.** 诊断设置已保存\n\n## 创建并配置 SQL Server 审计\n\n配置好诊断设置后，你需要在你的托管实例上设置一个\
    \ SQL Server 审计。首先，你需要使用代码清单 14-1 中的脚本来设置审计。\n\n**代码清单 14-1.** 设置审计\n```\nUSE\
    \ [master];\nCREATE SERVER AUDIT [miaudit] TO EXTERNAL_MONITOR;\nALTER SERVER\
    \ AUDIT [miaudit] WITH (STATE = ON);\n```\n\n然后，你需要使用代码清单 14-2 中的脚本创建一个与你的审计关联的服务器审计规范。\n\
    \n**代码清单 14-2.** 设置服务器审计规范\n```\nUSE [master];\nCREATE SERVER AUDIT SPECIFICATION\
    \ [miserveraudit]\nFOR SERVER AUDIT [miaudit]\nADD (DATABASE_OBJECT_ACCESS_GROUP),\n\
    ADD (SCHEMA_OBJECT_ACCESS_GROUP),\nADD (AUDIT_CHANGE_GROUP),\nADD (SERVER_OPERATION_GROUP)\n\
    WITH (STATE = ON);\n```\n\n**注意** 这些审计操作组可能会产生大量审计数据：`DATABASE_OBJECT_ACCESS_GROUP`、`SCHEMA_OBJECT_ACCESS_GROUP`、`SERVER_OPERATION_GROUP`。我使用它们作为示例，是为了确保你能看到一些审计数据产生。除非你正在仔细地过滤审计数据，否则我不建议使用它们。SQL\
    \ Server 审计和过滤将在第 4 章“通过 GUI 实现 SQL Server 审计”中介绍。\n\n## 查询审计数据\n\n要访问审计数据，你需要转到在诊断设置中选择的\
    \ Log Analytics 工作区，然后点击 **工作区摘要**。此摘要如图 14-4 所示。\n\n**图 14-4.** Log Analytics\
    \ 工作区摘要\n\n**注意** 有关如何访问和使用 Log Analytics 工作区的更多信息，请回顾第 13 章“审计 Azure SQL 数据库”。\n\
    \n你可以点击这些框中的任何一个以深入查看更多信息。这将带你到一个预先为你填好了 Kusto 查询的屏幕。它会为你提供每个类别的详细信息。要整体查询审计数据，我建议点击页面顶部的\
    \ **日志** 按钮，如图 14-5 所示。\n\n**图 14-5.** Log Analytics `SQLSecurityInsights` 日志按钮\n\
    \n点击 **日志** 后，你将看到一个包含建议查询的页面。你可以关闭它，因为那些查询都无助于你查询审计数据。使用代码清单 14-3 中的 Kusto 查询来查看你的审计数据。\n\
    \n**代码清单 14-3.** Log Analytics Kusto 查询\n```\nAzureDiagnostics\n| where Category\
    \ == 'SQLSecurityAuditEvents'\nand TimeGenerated > ago(1d)\n| project\n    event_time_t,\n\
    \    database_name_s,\n    statement_s,\n    server_principal_name_s,\n    succeeded_s,\n\
    \    client_ip_s,\n    application_name_s,\n    additional_information_s,\n```"
