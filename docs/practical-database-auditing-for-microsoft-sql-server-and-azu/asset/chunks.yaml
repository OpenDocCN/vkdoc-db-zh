    ## Filtering SQL Server Audits


    You can use the audit dialog box to filter as shown in Figure 4-21.


    ![](index-65_1.png)


    Chapter 4 ImplementIng SQl Server audIt vIa the guI


    ***Figure 4-21.** Adding a filter to an audit*


    You can filter on any column that’s available in the audit collection. This way,
    you can filter out things like monitoring tools or service accounts. SQL Server
    has a `servername$` account that does all kinds of stuff in the background. These
    types of accounts can fill up your auditing files fast making it hard to find
    the things you wanted to audit. For filtering, use the name of the column and
    what you don’t want it equal to or what you want it equal to. For example, if
    you wanted to audit only `sa`, you can filter on that here. This is like a `WHERE`
    clause in a SQL statement, so you can do anything you can do in a where clause,
    except you don’t use the `WHERE` keyword.


    ![](index-66_1.png)


    Chapter 4 ImplementIng SQl Server audIt vIa the guI


    **Tip** If you want to audit on a version of SQL Server that doesn’t have the
    column you need, like `client_ip` or `host_name`, you can try to use extended
    events for that instead. Chapter 7, “Implementing extended events via the GUI,”
    covers this information.


    ## Deleting Audits


    To delete an audit, you right-click the audit as shown in Figure 4-22.


    ***Figure 4-22.** Deleting an audit*


    You will get a dialog box, and what’s very nice about this dialog box is you can
    choose to disable it with a checkbox as shown in Figure 4-23. You need to disable
    an audit before you can delete it.


    ![](index-67_1.jpg)


    Chapter 4 ImplementIng SQl Server audIt vIa the guI


    ***Figure 4-23.** Disabling the audit before deleting it*


    When you delete the audit, the files remain on disk. I deleted the audit and thought
    the files were gone, too. No, the files are still there. This is in case you need
    them later for auditing purposes. You must go manually delete them.


    When deleting audits, you can orphan your server and database audits. The server
    and database audits will stay there and seem fine, but no data will collect because
    the audit is gone. Figure 4-24 shows you server and database audits are still
    in place even though there is no audit.


    ![](index-68_1.png)


    ![](index-68_2.jpg)


    Chapter 4 ImplementIng SQl Server audIt vIa the guI


    ***Figure 4-24.** Audit is gone, but server and database audits seem fine*


    If you go into the server or database audits, they will have a blank audit as
    shown in Figure 4-25.


    ***Figure 4-25.** Server audit specification is missing the audit*


    ![](index-69_1.png)


    Chapter 4 ImplementIng SQl Server audIt vIa the guI


    There is a message at the top left of Figure 4-25 telling you “Server audit was
    not provided” and it needs that to collect data.


    Even if you recreate the audit with the same name, the server and database audits
    don’t automatically associate with the new audit. The server and database audits
    rely on the `GUID` of the audit. There is a way to recreate an audit with the
    same `GUID`. This is covered in Chapter 5, “Implementing SQL Server Audit Via
    SQL Scripts.”


    ## Disabling Audits


    You can disable the audit by right-clicking it and choosing disable in the GUI
    as shown in Figure 4-26.


    ***Figure 4-26.** Disabling an audit*


    **Caution** If you want to disable the audit, it won’t disable until it’s done
    auditing actions. this can prove difficult if you are auditing a lot of actions.
