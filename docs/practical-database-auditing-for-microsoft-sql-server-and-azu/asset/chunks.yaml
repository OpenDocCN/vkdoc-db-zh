- fmt: '## Chapter 3 What Is SQL Server Audit?


    If you want to audit schema and permissions changes at the server and all databases
    the same way, implement a server audit specification with these actions:


    * `AUDIT_CHANGE_GROUP`

    * `SERVER_OBJECT_OWNERSHIP_CHANGE_GROUP`

    * `SERVER_OBJECT_PERMISSION_CHANGE_GROUP`

    * `SERVER_OPERATION_GROUP`

    * `SERVER_PERMISSION_CHANGE_GROUP`

    * `SERVER_PRINCIPAL_CHANGE_GROUP`

    * `SERVER_ROLE_MEMBER_CHANGE_GROUP`

    * `SERVER_STATE_CHANGE_GROUP`

    * `LOGIN_CHANGE_PASSWORD_GROUP`

    * `DATABASE_CHANGE_GROUP`

    * `DATABASE_OBJECT_ACCESS_GROUP`

    * `DATABASE_OBJECT_CHANGE_GROUP`

    * `DATABASE_OBJECT_OWNERSHIP_CHANGE_GROUP`

    * `DATABASE_OBJECT_PERMISSION_CHANGE_GROUP`

    * `DATABASE_OWNERSHIP_CHANGE_GROUP`

    * `DATABASE_PERMISSION_CHANGE_GROUP`

    * `DATABASE_PRINCIPAL_CHANGE_GROUP`

    * `DATABASE_ROLE_MEMBER_CHANGE_GROUP`

    * `APPLICATION_ROLE_CHANGE_PASSWORD_GROUP`

    * `DBCC_GROUP`

    * `SCHEMA_OBJECT_CHANGE_GROUP`

    * `SCHEMA_OBJECT_OWNERSHIP_CHANGE_GROUP`

    * `SCHEMA_OBJECT_PERMISSION_CHANGE_GROUP`


    If you want to audit schema and permissions changes at the server, but not any
    of the databases because you implement different database auditing on each database,
    implement a server audit specification with these actions:


    * `AUDIT_CHANGE_GROUP`

    * `SERVER_OBJECT_OWNERSHIP_CHANGE_GROUP`

    * `SERVER_OBJECT_PERMISSION_CHANGE_GROUP`

    * `SERVER_OPERATION_GROUP`

    * `SERVER_PERMISSION_CHANGE_GROUP`

    * `SERVER_PRINCIPAL_CHANGE_GROUP`

    * `SERVER_ROLE_MEMBER_CHANGE_GROUP`

    * `SERVER_STATE_CHANGE_GROUP`

    * `LOGIN_CHANGE_PASSWORD_GROUP`


    If you want to audit everything a specific user does, you will use a couple of
    additional audit actions. I like to keep the usage of these to a minimum unless
    you are filtering on a smaller subset of activities on your server. You will use
    all the actions that are listed earlier for auditing all the schema and permissions
    changes, and in addition, you will include these audit actions:


    * `DATABASE_OBJECT_ACCESS_GROUP`

    * `SCHEMA_OBJECT_ACCESS_GROUP`


    If you want to audit everyone querying or modifying a table, you will need to
    use a database audited specification for this. You will use the following audit
    actions in this audit:


    * `SELECT`

    * `UPDATE`

    * `INSERT`

    * `DELETE`

    * `EXECUTE`


    If you want to audit everyone making schema and permissions changes at the server
    level and only a specific database, you will need a server audit specification
    and a database audit specification. Your server audit will include only server
    audit actions listed as follows:


    * `AUDIT_CHANGE_GROUP`

    * `SERVER_OBJECT_OWNERSHIP_CHANGE_GROUP`

    * `SERVER_OBJECT_PERMISSION_CHANGE_GROUP`

    * `SERVER_OPERATION_GROUP`

    * `SERVER_PERMISSION_CHANGE_GROUP`

    * `SERVER_PRINCIPAL_CHANGE_GROUP`

    * `SERVER_ROLE_MEMBER_CHANGE_GROUP`

    * `SERVER_STATE_CHANGE_GROUP`

    * `LOGIN_CHANGE_PASSWORD_GROUP`


    Your database audit for this case will include the following audit actions only
    on the database you want to audit:


    * `DATABASE_CHANGE_GROUP`

    * `DATABASE_OBJECT_ACCESS_GROUP`

    * `DATABASE_OBJECT_CHANGE_GROUP`

    * `DATABASE_OBJECT_OWNERSHIP_CHANGE_GROUP`

    * `DATABASE_OBJECT_PERMISSION_CHANGE_GROUP`

    * `DATABASE_OWNERSHIP_CHANGE_GROUP`

    * `DATABASE_PERMISSION_CHANGE_GROUP`

    * `DATABASE_PRINCIPAL_CHANGE_GROUP`

    * `DATABASE_ROLE_MEMBER_CHANGE_GROUP`

    * `APPLICATION_ROLE_CHANGE_PASSWORD_GROUP`

    * `DBCC_GROUP`

    * `SCHEMA_OBJECT_CHANGE_GROUP`

    * `SCHEMA_OBJECT_OWNERSHIP_CHANGE_GROUP`

    * `SCHEMA_OBJECT_PERMISSION_CHANGE_GROUP`


    ### Multiple Audit Setups


    If you need multiple different audits on the same server, there is a way to configure
    them such that you have little to no overlap in auditing. You may need some overlap
    depending on auditing requirements, though, but you want to avoid as much overlap
    as possible. Here are some audit specification setups that could work in conjunction
    with each other:


    * Auditing DDL and perms changes at the server level'
