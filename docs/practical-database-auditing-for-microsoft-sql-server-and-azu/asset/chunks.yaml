- fmt: "\n# Chapter 5 Implementing SQL Server Audit via SQL Scripts\n\n[https://docs.microsoft.com/en-us/sql/relational-databases/security/auditing/write-sql-server-audit-events-to-the-security-log?view=sql-server-ver15](https://docs.microsoft.com/en-us/sql/relational-databases/security/auditing/write-sql-server-audit-events-to-the-security-log?view=sql-server-ver15)\n\
    \nIf you chose the file destination for your audit, an audit file is placed on\
    \ disk after you enable the audit as shown in Figure 5-3. This is where the data\
    \ will live for your server and database audits that are associated with that\
    \ audit.\n\n***Figure 5-3.** Audit files on disk*\n\nAs the data collects, this\
    \ file is going to grow to the size specified in the audit. Then it’ll create\
    \ another file up to the number of files specified in the configuration. Once\
    \ the last file is full, it will delete the oldest file and create another new\
    \ file. You will need to know how fast your files fill up so you won’t miss collecting\
    \ the data from them before they are deleted.\n\n## Setting Up the Server Audit\
    \ Specification\n\nThe first of two optional audits is the server audit specification.\
    \ Listing 5-5 shows how to create a server audit specification via script.\n\n\
    ***Listing 5-5.** Creating a server audit specification*\n\n```sql\nUSE [master];\n\
    \nCREATE SERVER AUDIT SPECIFICATION [ServerAuditSpecification]\nFOR SERVER AUDIT\
    \ [AuditSpecification]\nADD (DATABASE_OBJECT_ACCESS_GROUP),\nADD (SCHEMA_OBJECT_ACCESS_GROUP),\n\
    ADD (DATABASE_ROLE_MEMBER_CHANGE_GROUP),\nADD (SERVER_ROLE_MEMBER_CHANGE_GROUP),\n\
    ADD (AUDIT_CHANGE_GROUP),\nADD (DBCC_GROUP),\nADD (DATABASE_PERMISSION_CHANGE_GROUP),\n\
    ADD (SCHEMA_OBJECT_PERMISSION_CHANGE_GROUP),\nADD (SERVER_OBJECT_PERMISSION_CHANGE_GROUP),\n\
    ADD (SERVER_PERMISSION_CHANGE_GROUP),\nADD (DATABASE_CHANGE_GROUP),\nADD (DATABASE_OBJECT_CHANGE_GROUP),\n\
    ADD (DATABASE_PRINCIPAL_CHANGE_GROUP),\nADD (SCHEMA_OBJECT_CHANGE_GROUP),\nADD\
    \ (SERVER_OBJECT_CHANGE_GROUP),\nADD (SERVER_PRINCIPAL_CHANGE_GROUP),\nADD (SERVER_OPERATION_GROUP),\n\
    ADD (APPLICATION_ROLE_CHANGE_PASSWORD_GROUP),\nADD (LOGIN_CHANGE_PASSWORD_GROUP),\n\
    ADD (SERVER_STATE_CHANGE_GROUP),\nADD (DATABASE_OWNERSHIP_CHANGE_GROUP),\nADD\
    \ (SCHEMA_OBJECT_OWNERSHIP_CHANGE_GROUP),\nADD (SERVER_OBJECT_OWNERSHIP_CHANGE_GROUP),\n\
    ADD (USER_CHANGE_PASSWORD_GROUP)\nWITH (STATE = ON);\n```\n\nSuggestions on how\
    \ to configure your server audit specification:\n\n*   `Database context` – `USE\
    \ [master];`\n    **All server audit specifications are created in the master\
    \ database.**\n*   `Name` – `CREATE SERVER AUDIT SPECIFICATION [ServerAuditSpecification]`\n\
    \    I tend to name it `ServerAuditSpecification` or `ServerAuditSpecification_servername`.\
    \ This is entirely up to you based on how descriptive you want to name it. You\
    \ can create multiple server audits, though, so it may make sense to make it a\
    \ more descriptive name if you plan to add additional audits.\n*   `Audit` – `FOR\
    \ SERVER AUDIT [AuditSpecification]`\n    You need to associate it with your audit.\
    \ You need this association because this is where your audit data will live.\n\
    *   `Actions` – `ADD (AUDIT_ACTIONS)`\n    I’m capturing permissions and schema\
    \ changes at the server level and in all the databases on the server. I’m also\
    \ capturing if someone changes a password, changes an audit, or if someone issues\
    \ a `DBCC` command. Chapter 3, “What Is SQL Server Audit?”, has a section on Server\
    \ Audit Action Groups to help you determine what each action audits.\n*   `Enabling\
    \ your audit` – `WITH (STATE = ON);`\n    You will need to enable it, so it will\
    \ collect audit data.\n\n## Setting Up the Database Audit Specification\n"
