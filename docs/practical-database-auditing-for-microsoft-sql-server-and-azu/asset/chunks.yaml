  trans: "\n\n# 第 5 章 通过 SQL 脚本实现 SQL Server 审计\n\n[`docs.microsoft.com/en-us/sql/relational-databases/security/auditing/write-sql-server-audit-events-to-the-security-log?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/relational-databases/security/auditing/write-sql-server-audit-events-to-the-security-log?view=sql-server-ver15)\n\
    \n如果您为审计选择了文件目标，则在启用审计后，审计文件会放置在磁盘上，如图 5-3 所示。这里就是与该审计相关联的服务器和数据库审计数据将存储的位置。\n\
    \n***图 5-3.** 磁盘上的审计文件*\n\n随着数据收集，此文件将增长至审计中指定的大小。然后，它将创建另一个文件，直至达到配置中指定的文件数量。一旦最后一个文件写满，它将删除最旧的文件并创建一个新的文件。您需要了解文件写满的速度，以便在文件被删除前不会错过收集其中的数据。\n\
    \n## 设置服务器审计规范\n\n两个可选审计中的第一个是服务器审计规范。清单 5-5 展示了如何通过脚本创建服务器审计规范。\n\n***清单 5-5.**\
    \ 创建服务器审计规范*\n\n```sql\nUSE [master];\n\nCREATE SERVER AUDIT SPECIFICATION [ServerAuditSpecification]\n\
    FOR SERVER AUDIT [AuditSpecification]\nADD (DATABASE_OBJECT_ACCESS_GROUP),\nADD\
    \ (SCHEMA_OBJECT_ACCESS_GROUP),\nADD (DATABASE_ROLE_MEMBER_CHANGE_GROUP),\nADD\
    \ (SERVER_ROLE_MEMBER_CHANGE_GROUP),\nADD (AUDIT_CHANGE_GROUP),\nADD (DBCC_GROUP),\n\
    ADD (DATABASE_PERMISSION_CHANGE_GROUP),\nADD (SCHEMA_OBJECT_PERMISSION_CHANGE_GROUP),\n\
    ADD (SERVER_OBJECT_PERMISSION_CHANGE_GROUP),\nADD (SERVER_PERMISSION_CHANGE_GROUP),\n\
    ADD (DATABASE_CHANGE_GROUP),\nADD (DATABASE_OBJECT_CHANGE_GROUP),\nADD (DATABASE_PRINCIPAL_CHANGE_GROUP),\n\
    ADD (SCHEMA_OBJECT_CHANGE_GROUP),\nADD (SERVER_OBJECT_CHANGE_GROUP),\nADD (SERVER_PRINCIPAL_CHANGE_GROUP),\n\
    ADD (SERVER_OPERATION_GROUP),\nADD (APPLICATION_ROLE_CHANGE_PASSWORD_GROUP),\n\
    ADD (LOGIN_CHANGE_PASSWORD_GROUP),\nADD (SERVER_STATE_CHANGE_GROUP),\nADD (DATABASE_OWNERSHIP_CHANGE_GROUP),\n\
    ADD (SCHEMA_OBJECT_OWNERSHIP_CHANGE_GROUP),\nADD (SERVER_OBJECT_OWNERSHIP_CHANGE_GROUP),\n\
    ADD (USER_CHANGE_PASSWORD_GROUP)\nWITH (STATE = ON);\n```\n\n关于如何配置服务器审计规范的建议：\n\
    \n*   `数据库上下文` – `USE [master];`\n    **所有服务器审计规范都是在 master 数据库中创建的。**\n*   `名称`\
    \ – `CREATE SERVER AUDIT SPECIFICATION [ServerAuditSpecification]`\n    我倾向于将其命名为`ServerAuditSpecification`或`ServerAuditSpecification_servername`。这完全取决于您希望名称具有多大的描述性。不过，您可以创建多个服务器审计，因此，如果您计划添加额外审计，使其名称更具描述性可能更有意义。\n\
    *   `审计` – `FOR SERVER AUDIT [AuditSpecification]`\n    您需要将其与您的审计关联起来。您需要此关联，因为这是您的审计数据将存放的地方。\n\
    *   `操作` – `ADD (AUDIT_ACTIONS)`\n    我在服务器级别以及服务器上的所有数据库中捕获权限和架构更改。我还会捕获是否有人更改了密码、更改了审计，或者是否有人发出了`DBCC`命令。第\
    \ 3 章“什么是 SQL Server 审计？”中有一个关于服务器审计操作组的小节，可以帮助您确定每个操作审计的内容。\n*   `启用审计` – `WITH\
    \ (STATE = ON);`\n    您需要启用它，以便它收集审计数据。\n\n## 设置数据库审计规范\n\n"
- fmt: '# Chapter 5 Implementing SQL Server Audit via SQL Scripts


    The second of two optional components is the database audit. Listing [5-6](#index_split_000.html#p80)
    shows how to create a database audit specification via script.


    ## Listing 5-6. Creating a database audit specification


    ```sql

    USE [dbname];


    CREATE DATABASE AUDIT SPECIFICATION [DatabaseAuditSpecification_dbname]

    FOR SERVER AUDIT [AuditSpecification]

    ADD (DATABASE_ROLE_MEMBER_CHANGE_GROUP),

    ADD (AUDIT_CHANGE_GROUP),

    ADD (DBCC_GROUP),

    ADD (DATABASE_PERMISSION_CHANGE_GROUP),

    ADD (DATABASE_OBJECT_PERMISSION_CHANGE_GROUP),

    ADD (SCHEMA_OBJECT_PERMISSION_CHANGE_GROUP),

    ADD (DATABASE_CHANGE_GROUP),

    ADD (DATABASE_OBJECT_CHANGE_GROUP),

    ADD (DATABASE_PRINCIPAL_CHANGE_GROUP),

    ADD (SCHEMA_OBJECT_CHANGE_GROUP),

    ADD (APPLICATION_ROLE_CHANGE_PASSWORD_GROUP),

    ADD (DATABASE_OWNERSHIP_CHANGE_GROUP),

    ADD (DATABASE_OBJECT_OWNERSHIP_CHANGE_GROUP),

    ADD (SCHEMA_OBJECT_OWNERSHIP_CHANGE_GROUP),

    ADD (USER_CHANGE_PASSWORD_GROUP)

    WITH (STATE = ON);

    ```


    Suggestions on how to configure your database audit specification:


    • `Database context` – `USE [dbname];`

    All database audit specifications are created in the database you want to audit.


    • `Name` – `CREATE DATABASE AUDIT SPECIFICATION [DatabaseAuditSpecification_dbname]`

    I always name it underscore database name because it helps identify what database
    it’s auditing like `DatabaseAuditSpecification_Auditing`. This is entirely up
    to you based on how descriptive you want to name it. You can create multiple audits,
    though, so it may make sense to make it a more descriptive name if you plan to
    add additional audits. One thing to note is that if you don’t put the name of
    the database in the name of the database audit, you won’t be able to easily query
    the system tables that store the audit information. Those tables are very helpful
    if you’ve named your audits descriptively. Querying the system tables will be
    covered in more detail in this chapter.


    • `Audit` – `FOR SERVER AUDIT [AuditSpecification]`

    You need to associate it with your audit. You need this association because this
    is where your audit data will live.


    • `Actions` – `ADD (AUDIT_ACTIONS)`

    I’m capturing permissions and schema changes at the database level. Chapter [3](https://doi.org/10.1007/978-1-4842-8634-0_3),
    “What Is SQL Server Audit?”, has a section on Database Audit Action Groups to
    help you determine what each action audits.


    > `Don’t use this if you’re already getting permissions and schema changes at
    the server audit level. This will produce duplicate audit records.`


    • `Enabling your audit` – `WITH (STATE = ON);`

    You will need to enable it, so it will collect audit data.


    Where the database audit shines is if you want to audit objects. With a database
    audit, you can audit things like insert, update, delete, select, and execute statements
    on objects in the current database, like tables, views, and stored procedures.
    You can also audit an entire schema or database. Listing [5-7](#index_split_001.html#p82)
    shows how to create a database audit specification to audit DML actions via script.


    ## Listing 5-7. Creating a database audit specification to audit DML actions


    ```sql

    USE [Auditing];


    CREATE DATABASE AUDIT SPECIFICATION [DatabaseAuditSpecification_AuditingTables]

    FOR SERVER AUDIT [AuditSpecification_AuditingTables]

    ADD (INSERT ON OBJECT::[dbo].[testing] BY [public]),

    ADD (EXECUTE ON OBJECT::[dbo].[SelectTestingTable] BY [public]),

    ADD (SELECT ON OBJECT::[dbo].[TestingTop10] BY [public]),

    ADD (DELETE ON SCHEMA::[dbo] BY [auditing]),

    ADD (UPDATE ON DATABASE::[Auditing] BY [public])

    WITH (STATE = ON);

    ```


    Suggestions on how to configure your database audit specification when auditing
    specific objects, schemas, or databases:


    • `Database context` – `USE [dbname];`

    All database audit specifications are created in the database you want to audit.


    • `Name` – `CREATE DATABASE AUDIT SPECIFICATION [DatabaseAuditSpecification_AuditingTables]`'
