    # 第 15 章 其他云提供商审计选项


    **注意**，如果您已经有一个选项组在处理数据库备份，您可以将审计功能添加到其中。


    要创建一个新的选项组，请搜索并点击 RDS。您需要知道数据库引擎及其版本才能创建新的选项组。首先，让我们查看一下您的 RDS 实例的引擎。点击您的 RDS
    实例。在"摘要"部分，您将看到引擎信息，如图 15-5 所示。请记下该引擎。然后点击图 15-5 中所示的"配置"。


