    Chapter 7 ImplemeNtINg exteNded eveNtS vIa the gUI


    ***Figure 7-10.** New Session Wizard Set Session Event Filters modify filters*


    If you choose Toggle Not Operator, the filter you set will be the opposite. For


    example, if you added sqlserver.database_name = master, but then chose Toggle
    Not


    Operator, it will get all databases except master as shown in Figur[e 7-11](#index_split_001.html#p122).
    The exclamation mark (!) shows this filter is toggled to not.


    ![](index-122_1.jpg)


    Chapter 7 ImplemeNtINg exteNded eveNtS vIa the gUI


    ***Figure 7-11.** New Session Wizard Set Session Event Filters Toggle Not Operator*


    You can also group clauses together by selecting more than one row and choosing


    Group Clauses. These rows would then be connected by a bracket ([) as shown in


    Figur[e 7-12.](#index_split_001.html#p123)


    ![](index-123_1.png)


    Chapter 7 ImplemeNtINg exteNded eveNtS vIa the gUI


    ***Figure 7-12.** New Session Wizard Set Session Event Filters Group Clauses*


    After clicking Next on the Set Session Event Filters screen, you will see a Specify


    Session Data Storage screen. You will set your storage options here. This is where
    the


    New Session Wizard is more limited than the New Session dialog box setup. The
    New


    Session option is covered later in the chapter. There are only two options for
    storage


    in the New Session Wizard: file and ring buffer as shown in Figure [7-13](#index_split_001.html#p124).
    I tend to store events in a file, so that option is chosen.


    ![](index-124_1.png)


    Chapter 7 ImplemeNtINg exteNded eveNtS vIa the gUI


    ***Figure 7-13.** New Session Wizard Specify Session Data Storage screen*


    Here are some suggestions for file storage:


    • Don’t store the files on the C drive or other drives SQL Server is using


    for data and log files.


    • Set the maximum file size to something small like 10 MB and enable


    file rollover of 5–10 files. If you set large file sizes with many rollover


    files, they will be next to impossible to query.


    ![](index-125_1.png)


    Chapter 7 ImplemeNtINg exteNded eveNtS vIa the gUI


    You can also store the data in the ring buffer or just the ring buffer. The ring
    buffer is


    more difficult to query because it’s stored in XML. With a file, you have more
    control of


    how long the data will be around, whereas, with the ring buffer, you may lose
    data before


    you realize it because the ring buffer only stores a certain number of events
    and those


    events can come from more than just this extended event you are setting up.


    After clicking Next on the Specify Session Data Storage screen, you will see the


    Summary screen. This will outline all the settings you’ve chosen. This screen
    also has a


    Script button, so you can script out all your settings. Figure [7-14 sho](#index_split_001.html#p125)ws
    you the expanded view of the summary.


    ***Figure 7-14.** New Session Wizard Summary*


    ![](index-126_1.png)


    Chapter 7 ImplemeNtINg exteNded eveNtS vIa the gUI


    To create the extended event, click Finish. The extended event will be set up
    and you


    will have the option to start it after creation and watch live data on screen
    as shown in


    Figur[e 7-15.](#index_split_001.html#p126)


    ***Figure 7-15.** New Session Wizard Create Event Session screen*


    Each of these options in Figure [7-15 is not c](#index_split_001.html#p126)hecked
    by default. It’s best practice to start the session after creation. It’s not required,
    but no event data will collect when it’s


    stopped. Also, you can watch live data on screen at this point, or you can view
    that data


    later, which is covered later in this chapter.'
