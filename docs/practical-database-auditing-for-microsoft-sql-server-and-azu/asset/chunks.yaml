    ![](img/index-97_1.png)


    # 第六章


    ## 什么是扩展事件？


    扩展事件，简称 `XEvents`，是一项内置的审核和监视功能，可通过 `SSMS` 图形界面或 `SQL` 脚本使用。你可以设置并配置它来捕获 SQL Server
    上发生的几乎所有事件。它非常灵活，且相当容易设置。


    扩展事件旨在替代 `SQL Server Profiler`，而 `Profiler` 预计将在未来某个 SQL Server 版本中被弃用。`Profiler`
    是一种创建跟踪以捕获 SQL Server 上所有活动的方式。


    扩展事件最早在 SQL Server 2008 中引入。在 SQL Server 2012 中，为了便于使用，增加了图形界面。它在 SQL Server 的每个版本中都可用。与
    `SQL Server Audit` 不同，它没有基于版本的限制。


    ### 扩展事件默认会话


    当你在 `SSMS` 中查看扩展事件时，你会看到其中已存在一些会话。这些是 SQL Server 默认自带的，并且 SQL Server 引擎会使用它们。根据你使用的
    SQL Server 版本，可能会看到不同的默认会话。图 6-1 展示了你可能看到的默认会话示例。


    #### 图 6-1. 默认扩展事件会话


    `system_health` 使用环形缓冲区存储收集的信息，并使用事件文件。关于扩展事件存储位置的更多信息将在[第七章“通过图形界面实现扩展事件”](https://doi.org/10.1007/978-1-4842-8634-0_7)中介绍。`AlwaysOn_health`
    默认是禁用的，除非你正在使用 SQL Server 中配置的可用性组。`system_health` 和（在 2016 版本及更高版本中的）`telemetry_xevents`
    主要收集有关错误、死锁和等待的信息。请勿禁用或更改这些扩展事件，它们是 SQL Server 所需的。我曾读到，即使你删除了 `telemetry_xevents`，Microsoft
    也有机制在 60 秒内将其恢复。如果它们收集的正是你需要的数据，查询它们并不会受到限制。我不会介绍如何查询这些默认会话，因为它们收集的不是审计数据。我将在[第七章“通过图形界面实现扩展事件”](https://doi.org/10.1007/978-1-4842-8634-0_7)中展示如何收集数据。


    ### 扩展事件组件


    要使扩展事件工作，你需要配置一个会话。这个会话将收集你想要审计的信息。

    '
- fmt: '### Note

    您需要具备系统管理员权限才能通过 SSMS GUI 设置扩展事件。如果通过脚本创建，则需要 `ALTER ANY EVENT` 权限。


    如果只需要查询它们，则需要 `VIEW SERVER STATE`。


    以下是配置会话时需要使用的组件。


    ### 扩展事件模板


    扩展事件附带了许多不同的模板可供选择。这使得配置更加容易，特别是当您不习惯使用或不确切知道需要配置什么来收集事件数据时。图 6-2 显示了默认情况下可用的模板列表。


    ![图 6-2.1](index-99_1.png)

    ![图 6-2.2](index-99_2.png)


    **图 6-2.** 扩展事件附带的默认模板


    当您在 GUI 中创建扩展事件并选择模板时，您将获得每个模板功能的描述，如图 6-3 所示。


    **图 6-3.** 默认模板描述


    对于使用扩展事件进行审计，我们不会使用这些模板，但它们对于理解如何捕获事件很有用。


    您可以通过导出会话来创建自定义模板。如果您知道您将反复使用自定义的扩展事件会话，那么将其添加为模板可能是有意义的。您可以通过在 SSMS 中右键单击会话并选择“导出会话”来导出会话，如图
    6-4 所示。


    ![图 6-4.1](index-100_1.png)

    ![图 6-4.2](index-100_2.png)


    **图 6-4.** 导出扩展事件会话


    只要您将模板 XML 文件存储在默认位置，类似于 `C:\Users\[user]\Documents\SQL Server Management Studio\Templates\XEventTemplates`，它就应该自动出现在模板列表中，如图
    6-5 所示。


    **图 6-5.** 用户创建的模板


    如果您没有在“用户模板”下看到它，可以在“模板”下拉列表中选择 `<From File…>`，如图 6-6 所示。


    ![图 6-6.1](index-101_1.jpg)

    ![图 6-6.2](index-101_2.jpg)


    **图 6-6.** 导入模板


    ### 扩展事件库


    扩展事件中的事件库非常广泛。它使您能够捕获 SQL Server 中发生的事件。


    包是扩展事件对象的容器。有许多类型的包。包可以包括通道、类别和事件，所有这些都将在本节中介绍。图 6-7 显示了扩展事件中可用的包。


    **图 6-7.** 扩展事件包下拉列表


    ![图 6-7](index-102_1.jpg)


    ### Note

    有关包及其内容的更多信息，请访问：[https://docs.microsoft.com/en-us/sql/relational-databases/extended-events/sql-server-extended-events-packages?view=sql-server-ver15](https://docs.microsoft.com/en-us/sql/relational-databases/extended-events/sql-server-extended-events-packages?view=sql-server-ver15)


    有四种事件通道有助于将事件组织成逻辑组。图 6-8 显示了作为扩展事件设置一部分的通道下拉列表。默认情况下，“调试”是未选中的。


    **图 6-8.** 扩展事件通道下拉列表


    这四种事件通道是：

    - **管理** – 主要针对最终用户、管理员和支持人员

    - **操作** – 用于分析和诊断问题或事件

    - **分析** – 描述程序操作，通常用于性能调查

    - **调试** – 仅供开发人员用于诊断和调试问题'
  raw: '**Note** You will need sysadmin permissions to set up extended events via
    the


    SSMS GUI. If you create them via scripts, you need ALTER ANY EVENT permissions.


    If you only need to query them, you will need VIEW SERVER STATE.


    Here are the components you need to use to configure a session.


    **Extended Events Templates**


    Extended events comes with many different templates from which to choose. This
    allows


    for easier configuration, especially if you aren’t comfortable using or don’t
    know exactly


    what you need to configure to collect event data. Figur[e 6-2 sho](#index_split_001.html#p99)ws
