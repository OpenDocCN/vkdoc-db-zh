- fmt: "# 第9章 追踪 SQL Server 配置变更\n\n## Listing 9-2. 使用 SQL 脚本创建数据库审计规范\n\n```sql\n\
    USE [master];\n\nCREATE DATABASE AUDIT SPECIFICATION [DatabaseAuditSpecification_spconfigure]\n\
    FOR SERVER AUDIT [AuditSpecification]\nADD (EXECUTE ON OBJECT::[sys].[sp_configure]\
    \ BY [public])\nWITH (STATE = ON);\n```\n\n虽然可以通过图形用户界面查询审计，这在第4章“通过图形用户界面实现 SQL\
    \ Server 审计”中已涵盖，但让我们使用 SQL 脚本来查询审计数据。这在第5章“通过 SQL 脚本实现 SQL Server 审计”中已涵盖。首先进行配置更改，然后执行Listing\
    \ 9-3中的脚本。\n\n## Listing 9-3. 使用 SQL 脚本查询审计\n\n```sql\nUSE master;\nSELECT DISTINCT\n\
    \    event_time,\n    aa.name as audit_action,\n    statement,\n    succeeded,\n\
    \    database_name,\n    server_instance_name,\n    schema_name,\n    session_server_principal_name,\n\
    \    server_principal_name,\n    object_Name,\n    file_name,\n    client_ip,\n\
    \    application_name,\n    host_name,\n    file_name\nFROM sys.fn_get_audit_file\
    \ ('E:\\audits\\*.sqlaudit',default,default) af\nINNER JOIN sys.dm_audit_actions\
    \ aa\n    ON aa.action_id = af.action_id\nWHERE event_time > DATEADD(HOUR, -4,\
    \ GETDATE())\nORDER BY event_time DESC;\n```\n\n![Figure 9-8](index-167_1.jpg)\n\
    \n**Figure 9-8.** 在 master 数据库中设置数据库审计规范\n\n图9-8展示了Listing 9-3的查询结果。请确保你进行配置更改。数据库审计不会拾取在它创建之前的更改。即使你通过SSMS图形用户界面进行更改，它仍然会使用`sp_configure`，因此它在审计中会以这种方式显示。\n\
    \n下一章，你将了解额外的SQL Server审计选项，如通用准则合规性、C2审计跟踪、变更数据捕获、成功/失败登录以及DDL触发器。\n\n# 第10章\
    \ 其他 SQL Server 审计与跟踪方法\n\n在本章中，你将了解额外的SQL Server审计选项。我很少（如果有的话）使用其中大部分。它们可能导致性能问题，或产生过多数据而无法梳理。我希望向你展示这些选项，以帮助你就在是否使用它们上做出明智决定。根据你的用例，谨慎使用时，它们可能被证明是有价值的。\n\
    \n## 通用准则合规性\n\n如果你没有审计员要求你开启此功能，请保持关闭。它可能对服务器性能产生很大影响。即使审计员认为你需要它，也要与他们沟通。解释开启它的影响。\n\
    \n我在此仅简要提及C2审计模式，因为C2将在未来版本的SQL Server中被移除。微软建议使用通用准则合规性。\n\n通用准则合规性由欧盟开发。它是一套国际认可的安全指南。SQL\
    \ Server的功能仅在Enterprise和Datacenter版本中可用。\n\n![Figure 10-1](index-169_1.png)\n\n\
    **Figure 10-1.** 打开服务器属性\n\n启用通用准则合规性后：\n*   内存分配在重新分配给新资源前，会被已知的比特模式覆盖。这可能导致性能缓慢。\n\
    *   登录审计被启用。可以通过查询`sys.dm_exec_sessions`视图查看登录统计信息。\n*   表级别的`DENY`优先于列级别的`GRANT`。\n\
    \n要启用通用准则合规性，请右键单击服务器连接并选择“属性”，如图10-1所示。"
