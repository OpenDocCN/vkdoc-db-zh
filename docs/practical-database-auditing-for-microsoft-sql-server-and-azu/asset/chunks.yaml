  trans: "# 第 8 章 通过 SQL 脚本实现扩展事件\n\n![image](img/index-154_1.png)\n\n![image](img/index-154_2.jpg)\n\
    \n图 8-7 向你展示了代码清单 8-4 中的查询返回的结果。\n\n**图 8-7.** 扩展事件附加设置\n\n图 8-7 显示，名为 `audit_sa`\
    \ 的扩展事件在系统视图中有两个设置。`filename` 显示了文件的存储位置。`max_file_size` 显示其被设置为 10 MB。\n\n**提示**\
    \ 要获取扩展事件系统视图中所有列的说明，请访问 [`docs.microsoft.com/en-us/sql/relational-databases/extended-events/xevents-references-system-objects?view=sql-server-ver15#system-catalog-views`](https://docs.microsoft.com/en-us/sql/relational-databases/extended-events/xevents-references-system-objects?view=sql-server-ver15#system-catalog-views)\n\
    \n## 扩展事件文件\n\n如果你为扩展事件选择了文件目标，那么在启用扩展事件后，`.xel` 文件将被放置在磁盘上，如图 8-8 所示。这就是事件数据将要存储的地方。\n\
    \n**图 8-8.** 磁盘上的扩展事件文件\n\n随着数据的收集，该文件将增长到扩展事件中指定的大小。然后，它将根据配置中指定的文件数量创建另一个文件。一旦最后一个文件被写满，它将删除最旧的文件并创建一个新的文件。你需要了解文件被写满的速度，以便在它们被删除之前不会错过从中收集数据。\n\
    \n## 查询扩展事件数据\n\n你可以使用 SQL Server 系统函数 `sys.fn_xe_file_target_read_file` 来查询你的扩展事件会话。这将为你提供大量关于扩展事件及其关联元数据的不同信息。代码清单\
    \ 8-7 提供了一个查询，用于获取过去一小时内审计返回的最相关列。XML 中还有更多字段，但它们需要以类似我在代码清单 8-7 中解析字段的方式进行解析。\n\
    \n**代码清单 8-7.** 查询扩展事件会话\n\n```sql\nSELECT n.value('(@timestamp)[1]', 'datetime')\
    \ as timestamp,\n       n.value('(action[@name=\"sql_text\"]/value)[1]', 'nvarchar(max)')\
    \ as [sql],\n       n.value('(action[@name=\"client_hostname\"]/value)[1]', 'nvarchar(50)')\
    \ as [client_hostname],\n       n.value('(action[@name=\"server_principal_name\"\
    ]/value)[1]', 'nvarchar(50)') as [user],\n       n.value('(action[@name=\"database_name\"\
    ]/value)[1]', 'nvarchar(50)') as [database_name],\n       n.value('(action[@name=\"\
    client_app_name\"]/value)[1]', 'nvarchar(50)') as [client_app_name]\nFROM (SELECT\
    \ CAST(event_data as XML) as event_data\n      FROM sys.fn_xe_file_target_read_file('e:\\\
    audits\\audit_sa*.xel', NULL, NULL, NULL)) ed\nCROSS APPLY ed.event_data.nodes('event')\
    \ as q(n)\nWHERE n.value('(@timestamp)[1]', 'datetime') >= DATEADD(HOUR, -1, GETDATE())\n\
    ORDER BY timestamp DESC;\n```\n\n图 8-9 向你展示了来自代码清单 8-6 查询结果的一个横截面。\n\n![image](img/index-156_1.png)\n\
    \n**图 8-9.** 扩展事件查询结果\n\n**提示** 通过访问 [`docs.microsoft.com/en-us/sql/relational-databases/system-functions/sys-fn-xe-file-target-read-file-transact-sql?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/relational-databases/system-functions/sys-fn-xe-file-target-read-file-transact-sql?view=sql-server-ver15)\
    \ 了解关于 `sys.fn_xe_file_target_read_file` 的更多信息。"
- fmt: "[sql?view=sql-server-ver15](https://docs.microsoft.com/en-us/sql/relational-databases/system-functions/sys-fn-xe-file-target-read-file-transact-sql?view=sql-server-ver15)\n\
    \nThere may be nothing listed because nothing auditable happened yet. There may\
    \ be a lot of auditing data because there’s a bunch of stuff happening in the\
    \ background that you didn’t realize was happening. SQL Server has a lot of internal\
    \ processes that may be collected by your extended event. It’s important to filter\
    \ as much out in the session setup as possible to avoid excessive amounts of event\
    \ data.\n\n> **Note** extended event data is stored in UtC time zone.\n\n## Modifying\
    \ Extended Events\n\nOnce an extended event is created, you can alter it to changing\
    \ its settings. You can modify an extended event when it’s started or stopped.\
    \ Listing 8-8 shows you how to modify your extended event session to add an event.\n\
    \n### Chapter 8 Implementing extended events via SQL scripts\n\n**Listing 8-8.**\
    \ Modifying an extended event\n\n```sql\nALTER EVENT SESSION [audit_sa] ON SERVER\n\
    ADD EVENT sqlserver.sql_transaction(\n    ACTION(\n        sqlserver.client_app_name,\n\
    \        sqlserver.client_hostname,\n        sqlserver.database_name,\n      \
    \  sqlserver.server_instance_name,\n        sqlserver.server_principal_name,\n\
    \        sqlserver.sql_text)\n    WHERE ([sqlserver].[server_principal_name]=N'sa'));\n\
    ```\n\n> **Note** Unlike `SQL Server audit`, you can modify an extended event\
    \ while it’s started.\n\nYou can’t change these items after creation:\n- Session\
    \ name\n- Template\n- Start immediately after creation (since you aren’t creating,\
    \ but modifying)\n- Advanced settings\n\nIf you need to change any of these items,\
    \ you will have to delete and recreate your extended event.\n\n> **Tip** For more\
    \ information on altering an extended event, [visit https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-event-session-transact-sql?view=sql-server-ver15](https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-event-session-transact-sql?view=sql-server-ver15).\n\
    \n## Stopping and Starting Extended Events\n\nYou can stop an extended event by\
    \ executing the query in Listing 8-9. Once it’s stopped, it won’t collect any\
    \ event data.\n\n**Listing 8-9.** Stopping an extended event\n\n```sql\nALTER\
    \ EVENT SESSION [audit_sa]\nON SERVER STATE = STOP;\n```\n\nYou can start an extended\
    \ event by executing the query in Listing 8-10.\n\n**Listing 8-10.** Starting\
    \ an extended event\n\n```sql\nALTER EVENT SESSION [audit_sa]\nON SERVER STATE\
    \ = START;\n```\n\n> **Note** Unlike `SQL Server audit`, you can stop an extended\
    \ event even if it’s auditing events.\n\n## Deleting Extended Events\n\nTo delete\
    \ an extended event, you can execute the query shown in Listing 8-11.\n\n**Listing\
    \ 8-11.** Deleting an extended event\n\n```sql\nDROP EVENT SESSION [audit_sa]\
    \ ON SERVER;\n```\n\nWhen you delete the extended event, the files remain on disk.\
    \ I deleted the extended event and thought the files were gone, too. No, the files\
    \ are still there. This is in case you need them later for auditing purposes.\
    \ You must go manually delete them.\n\nIn the next chapter, you will learn how\
    \ to track configuration changes from the SQL Server Log. This will be particularly\
    \ useful to you if you are using `SQL Server Audit` to audit changes. `SQL Server\
    \ Audit` isn’t good at capturing configuration changes made, so collecting them\
    \ from the SQL Server Log can help you track these changes.\n\n# Chapter 9 Tracking\
    \ SQL Server Configuration Changes\n\nThis chapter will outline the ways you can\
    \ view configuration changes in SQL Server. You will want and need to capture\
    \ these changes since they can have a large impact on your database server.\n\n\
    Configuration changes can include enabling `SQL Agent` or `Database Mail`. They"
