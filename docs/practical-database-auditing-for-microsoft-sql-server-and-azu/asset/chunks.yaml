    J. Bush, *Practical Database Auditing for Microsoft SQL Server and Azure SQL*,


    [https://doi.org/10.1007/978-1-4842-8634-0_1](https://doi.org/10.1007/978-1-4842-8634-0_1#DOI)


    Change too many things. By setting up and configuring auditing, I was able to
    see who was changing what. What a relief! No more “why did this happen?”, and
    I can’t provide any insights. I could say to them, “I don’t see any changes in
    the database, or this user changed the schema on the 5th.”


    In the end, my company was acquired by a more heavily regulated company, and they
    needed the systems to be audited with proper reports reviewed weekly. My new company
    was very pleased that I had already done the legwork making it easy for us to
    do the auditing. Originally, the management at my company didn’t think this was
    a priority, but I worked on it in between other projects and built exactly what
    the new parent company needed without knowing they would need this. It wasn’t
    something magical I was doing or that I could somehow predict the future. I was
    following basic auditing principles. They pay off!


    ## Types of Audits


    The types of audits you will have to do will vary depending on the business you
    work with. Regardless of the type of business you are in, auditing will help you.
    Listed in the following are the types of audits you may encounter:


    **Internal** – This type of audit is initiated by the business itself. This helps
    the business maintain standards that may or may not be required by external auditors
    or government regulations. Reasons you may want to do this type of auditing, even
    if you aren’t required to do more official types of auditing, are to make sure
    your business is running as smoothly and efficiently as possible. Internal audits
    can also be used to ensure you will be ready for external audits.


    **External** – This type of audit is conducted by a third party such as a governmental
    regulatory body or an accountant. These external auditors will be familiar with
    the types of rules and regulations you need to be following and will ensure that
    you are following them precisely.


    **Tax** – In America, the Internal Revenue Service (IRS) will sometimes audit
    tax returns of individuals or businesses to ensure accuracy, making sure you haven’t
    overpaid or underpaid your taxes. These audits tend to be selected randomly, but
    there may be things you pay taxes on that make you more likely to be audited.


    **Financial** – This type of audit is conducted by external auditors to ensure
    that financial statements and/or payroll payments are accurate.


    **Compliance** – This type of audit may be conducted by internal or external auditors
    and ensures that the business is compliant with internal or external auditing
    standards. This can be broken down into regulatory compliance and corporate compliance.
    Corporate compliance is internal rules and guidelines, and regulatory compliance
    is adhering to government laws and regulations.


    **Operational** – This type of audit is generally conducted by internal auditors,
    but there may be cases where they are conducted by external auditors. This audit
    is meant to help determine ways to improve business operations.


    **Information Systems** – This type of audit may be conducted by internal or external
    auditors to ensure that the systems are providing accurate data to users and to
    make sure that systems are secure so that unauthorized users aren’t able to access
    or alter them.


    ## Types of Regulatory Compliance


    *Regulatory compliance* is when a business must follow state, federal, and international
    laws relevant to its operations. The specific regulations that are required vary
    from business to business. Listed in the following are the types of regulatory
    compliance you may encounter:


    **California Consumer Privacy Act (CCPA)** – Enacted in 2018, this law protects
    consumers’ personal information and how it’s used by businesses that collect that
    information.'
