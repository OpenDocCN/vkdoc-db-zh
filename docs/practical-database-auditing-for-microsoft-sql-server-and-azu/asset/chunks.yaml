  trans: '# 第二章 数据库审计的类型


    为此可以使用 Server Management Studio。图 2-14 展示了如何在门户中启用类似于`SQL Server Audit`的审计功能。


    ![](img/index-31_1.png)


    *图 2-14. 在 Azure SQL 数据库上启用审计*


    ## 审计 Azure SQL 托管实例


    审计`Azure SQL 托管实例`与审计本地`SQL Server`非常相似。主要区别在于你无法访问数据库服务器底层的虚拟机，因此你需要设置云存储来保存审计或事件文件。请参考关于`SQL
    Server Audit`和`扩展事件`的章节，以帮助你理解它们的工作原理。`Azure SQL 托管实例`的审计将在[第 14 章，“审计 Azure SQL
    托管实例”](https://doi.org/10.1007/978-1-4842-8634-0_14)中更详细地介绍。


    ## Amazon Web Services 和 Google Cloud 审计选项


    *Amazon Web Services (AWS)* 提供了一项名为*关系型数据库服务 (RDS)* 的产品，你可以在其中托管你的`SQL Server`数据库。该产品允许你使用`SQL
    Server Audit`和`扩展事件`，其方式与在本地`SQL Server`中使用非常相似，但你需要设置云存储来保存文件；在这种情况下，它被称为`S3`。[第
    15 章，“其他云供应商审计选项”](https://doi.org/10.1007/978-1-4842-8634-0_15)将更详细地介绍`AWS RDS`审计。


    *Google Cloud* 的数据库审计工作方式更类似于`Azure SQL Database`审计，你需要通过`Google Cloud`门户启用它。[第
    15 章，“其他云供应商审计选项”](https://doi.org/10.1007/978-1-4842-8634-0_15)将更详细地介绍`Google
    Cloud`数据库审计。


    # 第三章 什么是 SQL Server Audit？


    `SQL Server Audit`是内置的审计功能，可通过`SQL Server Management Studio` GUI 或`SQL`脚本使用。你可以设置并配置它来捕获`SQL
    Server`上发生的几乎所有事情。它非常灵活且易于设置。


    ## SQL Server Audit 的可用性


    `SQL Server Audit`的第一个版本在`2008`年推出，并且仅包含在`Enterprise`版中。从`2012`版本开始，微软将其扩展到所有版本都支持服务器级别的审计，但数据库审计仍然仅限于`Enterprise`版。到了`2016`及之后的版本，你可以使用任何版本进行服务器和数据库审计，这要好得多，因为很多人并不只使用`Enterprise`版。表
    3-1 概述了`SQL Server Audit`的可用性情况。


    *表 3-1. 按版本划分的 SQL Server Audit 可用性*


    | 版本 | 服务器审计可用性 | 数据库审计可用性 |

    | :--- | :--- | :--- |

    | 2008 | Enterprise | Enterprise |

    | 2012, 2014, 和 2016 SP1 之前 | 所有版本 | Enterprise |

    | 2016 SP1, 2017, 和 2019 | 所有版本 | 所有版本 |


    © Josephine Bush 2022

    J. Bush, *Practical Database Auditing for Microsoft SQL Server and Azure SQL*,
    [`doi.org/10.1007/978-1-4842-8634-0_3`](https://doi.org/10.1007/978-1-4842-8634-0_3#DOI)


    ![](img/index-34_1.png)


    ## SQL Server Audit 要求


    要使`SQL Server`审计工作，根据你想要审计的内容，你需要两到三样东西。你必须创建一个`audit`（审计）。这将决定审计数据的存储位置。你还需要一个`server`（服务器）和/或一个`database
    audit specification`（数据库审计规范），用于定义你想要捕获的内容。每个`audit`可以有一个`server specification`（服务器规范）和/或每个数据库一个`database
    specification`（数据库规范）。这些服务器审计和数据库审计彼此独立。


    图 3-1 中的截图向你展示了审计的位置。


    *图 3-1. SQL Server 审计*


    请注意，图 3-1 中高亮显示的`SQL Server audits`默认并不存在。我创建它们是为了让你有个参考点，以便知道在哪里可以找到它们。


    `audit specification`是你配置审计存储位置以及如何……的地方'
- fmt: "# 第3章 SQL Server审计是什么？\n\n在“安全” ➤ “审计”下设置审计规范，可以决定保留多少数据、是否只捕获特定类型的数据，以及审计日志记录失败时的处理方式。每个数据库可以拥有多个审计规范，每个审计规范可以包含一个服务器审计规范和一个数据库审计规范。\n\
    \n## 服务器审计规范\n\n服务器审计规范用于配置希望在服务器级别，以及可选地在数据库级别收集的审计内容。可以在 SQL Server Management\
    \ Studio 的“安全” ➤ “服务器审计规范”下设置服务器审计规范。可以拥有多个服务器审计规范，但它们各自需要一个单独的审计规范，因为每个审计规范只能包含一个服务器审计规范。此服务器审计可以审计服务器级对象，但也可以以相同方式审计所有数据库。如果对每个数据库有更具体的审计需求，则应在服务器审计规范中仅使用服务器级别的操作。本章稍后将提供更多关于审计操作的信息。\n\
    \n## 数据库审计规范\n\n数据库审计规范用于配置希望在数据库级别收集的审计内容。可以在每个数据库的“安全” ➤ “数据库审计规范”下设置服务器审计规范。每个数据库上可以拥有多个数据库审计规范，但它们各自需要一个单独的审计，因为每个审计规范每个数据库只能包含一个数据库审计规范。\n\
    \n设置和配置审计规范将在第4章《通过GUI实现SQL Server审计》中介绍。\n\n> **注意**：设置 SQL Server Audit 不需要\
    \ `sysadmin` 权限，但需要一些自定义权限来设置。对于审计和服务器审计规范，需要 `CONTROL SERVER` 或 `ALTER ANY SERVER\
    \ AUDIT` 权限。对于数据库审计规范，需要 `ALTER ANY DATABASE AUDIT` 或 `CONTROL SERVER` 权限。当然，`sysadmin`\
    \ 权限也可以用来设置所有审计组件。\n\n## SQL Server审计使用案例\n\n服务器审计通常适用于审计服务器级更改和/或同时审计所有数据库。数据库审计则适用于审计单个数据库或其中一部分活动。以下列表介绍了使用多个审计规范以及服务器和数据库审计进行审计的一些场景：\n\
    \n*   **以相同方式审计服务器和所有数据库的架构与权限更改**\n    这需要一个审计规范和一个服务器审计规范。\n*   **审计特定用户执行的所有操作**\n\
    \    这需要一个带筛选器以仅捕获该用户活动的审计规范，以及一个服务器审计规范。\n*   **审计所有人查询或修改某个表**\n    这需要一个审计规范和一个数据库审计规范，该规范需指定此表以及希望捕获的相关操作。\n\
    *   **审计服务器级别的架构和权限更改以及仅特定数据库**\n    这需要一个审计规范、一个服务器审计规范和一个数据库审计规范。\n\n## 审计类别\n\
    \n审计操作分为三类：服务器、数据库和审计。\n\n*   **服务器级操作** – 捕获权限更改和数据库创建。包括任何不以 `SCHEMA_` 或 `DATABASE_`\
    \ 开头的审计操作。\n*   **数据库级操作** – 捕获 DML 和 DDL 更改，这包括数据库级别的审计操作。包括以 `SCHEMA_` 或 `DATABASE_`\
    \ 开头的审计操作。"
