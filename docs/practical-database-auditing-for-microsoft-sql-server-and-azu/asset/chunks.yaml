- fmt: "# Chapter 12 Create reports From audit data\n\n## SQL Server Agent Job for\
    \ Auditing Reports\n\n`/* DON'T CHANGE ANYTHING BELOW HERE */`\n\n`DROP TABLE\
    \ IF EXISTS ##tempvariables;`\n\n`DECLARE @sql varchar(max);`\n\n`SET @sql = N'IF\
    \ (select count(event_time)`\n`FROM [Auditing].[dbo].[AuditChanges]`\n`WHERE event_time\
    \ > getdate()-1) > 0`\n`BEGIN`\n`DECLARE @tableHTML NVARCHAR(MAX) ;`\n`SET @tableHTML\
    \ =`\n`N''<style type=\"text/css\">`\n`#box-table`\n`{`\n`font-family: \"Lucida\
    \ Sans Unicode\", \"Lucida Grande\", Sans-Serif;`\n`font-size: 12px;`\n`text-align:\
    \ left;`\n`border: #aaa;`\n`}`\n`#box-table th`\n`{`\n`font-size: 13px;`\n`font-weight:\
    \ normal;`\n`background: #f38630;;`\n`border: 2px solid #aaa;`\n`text-align: left;`\n\
    `color: #039;`\n`cellpadding: 10px;`\n`cellspacing: 10px;`\n`}`\n`#box-table td`\n\
    `{`\n`border-right: 1px solid #aabcfe;`\n`border-left: 1px solid #aabcfe;`\n`border-bottom:\
    \ 1px solid #aabcfe;`\n`cellpadding: 10px;`\n`cellspacing: 10px;`\n`}`\n`tr:nth-of-type(odd)`\n\
    `{ background-color:#aaa; color: #ccc }`\n`tr:nth-of-type(even)`\n`{ background-color:#ccc;\
    \ color: #aaa }`\n`</style>''+`\n`N''<H2>SQL Server Auditing Findings</H2>'' +`\n\
    `N''<table border=\"1\" id=\"box-table\">'' +`\n`N''<tr><th>Event Time</th><th>Partial\
    \ Statement</th>'' +`\n`N''<th>Server</th><th>Database</th><th>Schema</th>'' +`\n\
    `N''<th>User</th><th>Successful</th></tr>'' +`\n`CAST ( (`\n`SELECT td = convert(varchar,\
    \ [event_time], 22), '''',`\n`td = [audit_action], '''',`\n`td = left([statement],\
    \ 50), '''',`\n`td = [server_instance_name], '''',`\n`td = [database_name], '''',`\n\
    `td = [schema_name], '''',`\n`td = [session_server_principal_name] '''',`\n`td\
    \ = [succeeded]`\n`FROM [Auditing].[dbo].[AuditChanges]`\n`WHERE event_time >\
    \ getdate()-1`\n`ORDER BY event_time ASC`\n`FOR XML PATH(''tr''), TYPE) AS NVARCHAR(MAX)\
    \ ) +`\n`N''</table>'' ;`\n`EXEC msdb.dbo.sp_send_dbmail`\n`@recipients='+@mailrecipients+',`\n\
    `@subject = ''Audit Findings - Changes on Production Servers Last 24`\n`Hours'',`\n\
    `@body = @tableHTML,`\n`@profile_name = '+@profilename+',`\n`@body_format = ''HTML'';`\n\
    `END';`\n`SELECT @sql as stepsql`\n`into ##tempvariables;`\n`USE [msdb]`\n`GO`\n\
    `BEGIN TRANSACTION`\n`DECLARE @ReturnCode INT`\n`SELECT @ReturnCode = 0`\n`IF\
    \ NOT EXISTS (SELECT name FROM msdb.dbo.syscategories WHERE`\n`name=N'[Uncategorized\
    \ (Local)]' AND category_class=1)`\n`BEGIN`\n`EXEC @ReturnCode = msdb.dbo.sp_add_category\
    \ @class=N'JOB', @type=N'LOCAL',`\n`@name=N'[Uncategorized (Local)]'`\n`IF (@@ERROR\
    \ <> 0 OR @ReturnCode <> 0) GOTO QuitWithRollback`\n`END`\n`DECLARE @jobId BINARY(16)`\n\
    `EXEC @ReturnCode = msdb.dbo.sp_add_job`\n`@job_name=N'Audit Daily Email of Database\
    \ Server Changes',`\n`@enabled=1,`\n`@notify_level_eventlog=0,`\n`@notify_level_email=2,`\n\
    `@notify_level_netsend=0,`\n`@notify_level_page=0,`\n`@delete_level=0,`\n`@description=N'No\
    \ description available.',`\n`@category_name=N'[Uncategorized (Local)]',`\n`@owner_login_name=N'sa',`\n\
    `@job_id = @jobId OUTPUT`\n`IF (@@ERROR <> 0 OR @ReturnCode <> 0) GOTO QuitWithRollback`\n\
    `DECLARE @stepsql varchar(max);`\n`SET @stepsql = (SELECT stepsql from ##tempvariables);`\n\
    `EXEC @ReturnCode = msdb.dbo.sp_add_jobstep`\n`@job_id=@jobId,`\n`@step_name=N'audit\
    \ findings of changed items on prod servers',`\n`@step_id=1,`\n`@cmdexec_success_code=0,`\n\
    `@on_success_action=1,`\n`@on_success_step_id=0,`\n`@on_fail_action=2,`\n`@on_fail_step_id=0,`\n\
    `@retry_attempts=0,`\n`@retry_interval=0,`\n`@os_run_priority=0,`\n`@subsystem=N'TSQL',`\n\
    `@command=@stepsql,`\n`@database_name=N'master',`\n`@flags=0`\n`IF (@@ERROR <>\
    \ 0 OR @ReturnCode <> 0) GOTO QuitWithRollback`\n`EXEC @ReturnCode = msdb.dbo.sp_update_job\
    \ @job_id = @jobId, @start_step_id = 1`\n`IF (@@ERROR <> 0 OR @ReturnCode <> 0)\
    \ GOTO QuitWithRollback`\n`EXEC @ReturnCode = msdb.dbo.sp_add_jobschedule @job_id=@jobId,`\n\
    `@name=N'daily 11am auditing findings',`\n`@enabled=1,`\n`@freq_type=4,`\n`@freq_interval=1,`\n\
    `@freq_subday_type=1,`\n`@freq_subday_interval=0,`\n`@freq_relative_interval=0,`\n\
    `@freq_recurrence_factor=0,`\n`@active_start_date=20190812,`\n`@active_end_date=99991231,`\n\
    `@active_start_time=110000,`\n`@active_end_time=235959,`\n`@schedule_uid=N'8ed67b50-2fa6-4683-a714-9c4518fc1453'`\n\
    `IF (@@ERROR <> 0 OR @ReturnCode <> 0) GOTO QuitWithRollback`\n`EXEC @ReturnCode\
    \ = msdb.dbo.sp_add_jobserver @job_id = @jobId, @server_name = N'(local)'`\n`IF\
    \ (@@ERROR <> 0 OR @ReturnCode <> 0) GOTO QuitWithRollback`\n`COMMIT TRANSACTION`\n\
    `GOTO EndSave`\n`QuitWithRollback:`\n`IF (@@TRANCOUNT > 0) ROLLBACK TRANSACTION`\n\
    `EndSave:`\n`GO`\n\n## 使用说明与注意事项\n\nThere are some things you need to be aware\
    \ of or update in the script in Listing 12-4:\n\n*   The SQL statement that is\
    \ sent in the email will only include the first 50 characters. Otherwise, the\
    \ HTML formatting doesn’t work right. The full statement is in the database for\
    \ reference, if needed.\n*   Update the variables at the top of the script:\n\
    \    *   `@profilename` – This is what you named your database mail profile.\n\
    \    *   `@mailrecipients` – This will be who receives this auditing report email.\n\
    \n![](index-209_1.png)\n\nThe email will look something like the table in Figure\
    \ 12-1. Your results will vary depending on what happens on your database servers.\n\
    \n*Figure 12-1. SQL Server Agent job auditing report example*\n\n## HTML Reports\
    \ with PowerShell\n\nIf you want to create an HTML file with your audit query\
    \ results. Instead, you can use PowerShell. Listing 12-5 gives you an example\
    \ PowerShell script. This script will capture all audit data from the last seven\
    \ days.\n\n*Listing 12-5. Using PowerShell to create and send an HTML document\
    \ via email*\n\n```powershell\n# UPDATE THESE VARIABLES TO YOUR VALUES\n$OutputFile\
    \ = \"E:\\powershell\\sqlserverauditfindings.html\"\n$CentralServerName = \"yourcentralserver\"\
    \n$SendEmailFrom = \"youremail@domain.com\"\n$SendEmailTo = \"recipient@domain.com\"\
    \n$SMTPServer = \"smtp.domain.com\"\n$EmailSubject = \"Audit Findings - Changes\
    \ on SQL Server Production Servers in Last 7 Days\"\n\n# DON’T CHANGE ANYTHING\
    \ BELOW\n$Header = @\"\n<style>\nTABLE {border-width: 1px; border-style: solid;\
    \ border-color: black; border-collapse: collapse;}\nTD {border-width: 1px; padding:\
    \ 3px; border-style: solid; border-color: black;}\nTH {border-width: 1px; padding:\
    \ 3px; border-style: solid; border-color: black; text-align: left;}\nBODY {width:800px;}\n\
    td:nth-child(2) {max-width: 400px;}\n</style>\n\"@\n\n#get rid of the file if\
    \ it somehow still exists from a previous run\nif (Test-Path $OutputFile){ Remove-Item\
    \ -Path $OutputFile -Force}\n\n# make sure query returns at least one row\n$querycount\
