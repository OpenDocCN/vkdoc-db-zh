- fmt: "## 第13章 审计 Azure SQL 数据库\n\n**图 13-9.** Log Analytics 导航至工作区摘要\n\n进入工作区摘要页面后，你将看到几个选项，例如\
    \ **Azure SQL – 访问敏感数据** 和 **Azure SQL – 安全见解**，如图 [13-10](#index_split_002.html#p221)\
    \ 所示。\n\n**图 13-10.** Log Analytics 工作区摘要选项\n\n为简化起见，我建议在此工作区中仅存储 Azure SQL 审计数据。点击\
    \ **Azure SQL – 安全见解** 框。\n\n这将为你提供 Log Analytics 工作区中审计数据的仪表板视图，如图 [13-11](#index_split_002.html#p222)\
    \ 所示。\n\n![](index-222_1.jpg)\n\n**图 13-11.** Log Analytics 的 SQLSecurityInsights\n\
    \n你将看到许多审计数据类别：\n\n*   **审计分布** – 显示已采取的审计操作以及每个操作的计数\n*   **按数据库分布** – 显示哪些数据库有审计操作以及每个数据库的操作计数\n\
    *   **按 IP 分布** – 显示哪些 IP 地址有审计操作以及每个 IP 地址的操作计数\n*   **按主体分布** – 显示哪些主体有审计操作以及每个主体的操作计数\n\
    *   **按成功状态分布** – 显示成功和失败的审计操作计数\n\n你可以点击这些框中的任何一个以深入了解更多信息。这将带你到一个预先为你填充了 Kusto\
    \ 查询的屏幕。这为你提供了关于每个类别的良好信息。要整体查询审计数据，我建议点击页面顶部附近的 **日志** 按钮，如图 [13-12](#index_split_002.html#p223)\
    \ 所示。\n\n![](index-223_1.png)\n\n**图 13-12.** Log Analytics SQLSecurityInsights\
    \ 的“日志”按钮\n\n点击“日志”后，你将看到一个包含建议查询的页面。你可以关闭它，因为那些查询都无法帮助你查询审计数据。\n\n使用清单 [13-1](#index_split_002.html#p223)\
    \ 中的 Kusto 查询来获取你的审计数据。\n\n**清单 13-1.** Log Analytics Kusto 查询\n\n```\nAzureDiagnostics\n\
    | where Category == 'SQLSecurityAuditEvents'\n    and TimeGenerated > ago(1d)\n\
    | project\n    event_time_t,\n    database_name_s,\n    statement_s,\n    server_principal_name_s,\n\
    \    succeeded_s,\n    client_ip_s,\n    application_name_s,\n    additional_information_s,\n\
    \    data_sensitivity_information_s\n| order by event_time_t desc\n```\n\n![](index-224_1.png)\n\
    \n**提示** 关于 Kusto 的更多信息，请访问 [https://docs.microsoft.com/en-us/azure/data-explorer/kusto/query/](https://docs.microsoft.com/en-us/azure/data-explorer/kusto/query/)\n\
    \nKusto 查询将返回如图 [13-13](#index_split_002.html#p224) 所示的结果。结果将取决于你的被审计系统上发生的情况。\n\
    \n**图 13-13.** Log Analytics Kusto 查询结果\n\n虽然我不推荐在 SQL Server 审计中这样做，但我建议在审计数据被捕获到你的\
    \ Log Analytics 工作区之后，使用 Kusto 查询进行筛选。这是因为 Azure 中的审计功能不允许你在收集数据之前进行筛选。例如，你可能只想在审计中查看特定用户的操作。你可以通过添加另一个\
    \ `where` 子句来使用 Kusto 进行筛选，例如 `and server_principal_name_s == 'josephine'`。\n\n\
    清单 [13-2](#index_split_002.html#p224) 展示了一个带有该筛选器的 Kusto 查询示例。\n\n**清单 13-2.**\
    \ 带有附加筛选器的 Kusto 查询\n\n```\nAzureDiagnostics\n| where Category == 'SQLSecurityAuditEvents'\n\
    \    and TimeGenerated > ago(1d)\n    and server_principal_name_s == 'josephine'\n\
    | project\n    event_time_t,\n    database_name_s,\n    statement_s,\n    server_principal_name_s,\n\
    \    succeeded_s,\n    client_ip_s,\n    application_name_s,\n    additional_information_s,\n\
    \    data_sensitivity_information_s\n| order by event_time_t desc\n```\n\n![](index-225_1.png)"
  raw: 'ChApTer 13 AudiTiNg Azure SQL dATAbASeS


    ***Figure 13-9.** Log Analytics navigating to Workspace summary*


    Once you are in the Workspace summary, you will see a couple of options such as


    Azure SQL – Access to Sensitive Data and Azure SQL – Security Insights, as shown
    in


    Figur[e 13-10](#index_split_002.html#p221).


    ***Figure 13-10.** Log Analytics Workspace summary options*


    You may have other stuff in this workspace, as well, but I recommend storing only


    Azure SQL audit data here for simplicity. Click the Azure SQL – Security Insights
    box.


    This will give you a dashboard view of the audit data in your Log Analytics workspace
    as


    shown in Figure [13-11.](#index_split_002.html#p222)


    ![](index-222_1.jpg)


    ChApTer 13 AudiTiNg Azure SQL dATAbASeS


    ***Figure 13-11.** Log Analytics SQLSecurityInsights*


    You will see many categories of audit data:


    • **Audit distribution** – Shows you which audited actions have been


    taken and what the count is on each action


    • **Distribution by database** – Shows you which databases have audited


    actions and a count of the actions for each database


    • **Distribution by IP** – Shows you which IP addresses have audited


    actions and a count of the actions for each IP


    • **Distribution by principal** – Shows you which principals have


    audited actions and a count of the actions for each principal


    • **Distribution by success** – Shows you a count of successful and failed


    audited actions


    You can click on any of these boxes to drill down for more information. This


    will bring you to a screen with a Kusto query prepopulated for you. This gives
    you


    good information for each of those categories. To query the audit data as a whole,
    I


    recommend clicking the Logs button near the top of the page as shown in Figur[e
    13-12](#index_split_002.html#p223).


    ![](index-223_1.png)


    ChApTer 13 AudiTiNg Azure SQL dATAbASeS


    ***Figure 13-12.** Log Analytics SQLSecurityInsights Logs button*


    After clicking Logs, you will see a page with suggested queries. You can close
    that


    because none of those will help you query the audit data.


    Use the Kusto query in Listing [13-1](#index_split_002.html#p223) to get your
    audit data.


    ***Listing 13-1.*** Log Analytics Kusto query


    AzureDiagnostics


    | where Category == ''SQLSecurityAuditEvents''


    and TimeGenerated > ago(1d)


    | project


    event_time_t,


    database_name_s,


    statement_s,


    server_principal_name_s,


    succeeded_s,


    client_ip_s,


    application_name_s,


    additional_information_s,


    data_sensitivity_information_s


    | order by event_time_t desc


    ![](index-224_1.png)


    ChApTer 13 AudiTiNg Azure SQL dATAbASeS


    **Tip** For more information on Kusto, [visit https://docs.microsoft.com/](https://docs.microsoft.com/en-us/azure/data-explorer/kusto/query/)


    [en-us/azure/data-explorer/kusto/query/](https://docs.microsoft.com/en-us/azure/data-explorer/kusto/query/)


    The Kusto query will return results like the results in Figur[e 13-13](#index_split_002.html#p224).
    The results will depend on what happened on your audited system.


    ***Figure 13-13.** Log Analytics Kusto query results*


    Even though I do not recommend it for SQL Server Audit, I recommend filtering
    with


    a Kusto query after the audit data has been captured in your Log Analytics workspace.


    This is because the audit functionality in Azure doesn’t let you filter before
    you collect


    the data. For example, you may only want to see what a specific user does in your


    audit. You can filter with Kusto by adding another where clause such as and server_


    principal_name_s == ''josephine''.


    An example of a Kusto query with that filter is shown in Listin[g 13-2](#index_split_002.html#p224).


    ***Listing 13-2.*** Kusto query with additional filter


    AzureDiagnostics


    | where Category == ''SQLSecurityAuditEvents''


    and TimeGenerated > ago(1d)


    and server_principal_name_s == ''josephine''


    | project


    event_time_t,


    database_name_s,


    statement_s,


    server_principal_name_s,


    ![](index-225_1.png)


    ChApTer 13 AudiTiNg Azure SQL dATAbASeS


    succeeded_s,


    client_ip_s,


    application_name_s,


    additional_information_s,


    data_sensitivity_information_s


    | order by event_time_t desc'
