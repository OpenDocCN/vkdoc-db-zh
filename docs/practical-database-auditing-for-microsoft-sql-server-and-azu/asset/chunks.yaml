    # 第 2 章 数据库审计的类型


    在数据库级别启用更改跟踪后，你可以为特定表启用该功能。图 2-9 展示了如何在数据库表上启用更改跟踪。


    **图 2-9.** 在数据库表上启用 SQL Server 更改跟踪


    要查看捕获的更改，你需要查询一个内部表来获取结果。此查询将在第 10 章“其他 SQL Server 审计与跟踪方法”中介绍。图 2-10 展示了 DML
    更改将如何被记录在此内部表中。


    结果中的第一行是一条插入语句，第二和第三行是更新语句。


    **图 2-10.** 查询更改跟踪信息


    关于更改跟踪的更多信息将在第 10 章“其他 SQL Server 审计与跟踪方法”中详细介绍。


    ## C2 审计与通用准则合规性


    `C2`和`通用准则合规性`是国际认可的、在审计时需遵循特定安全指南的标准。这类审计是一种全面的日志记录，涵盖数据库服务器上的所有活动。如果没有审计员要求你开启此项，请保持关闭状态。它可能对服务器性能产生重大影响。系统会为每组相关的审计活动分配一个唯一的生成
    ID。你可以在服务器级别启用这些功能。图 2-11 展示了启用位置。


    **图 2-11.** 启用 C2 或通用准则合规性


    关于 C2 和通用准则合规性的更多信息将在第 10 章“其他 SQL Server 审计与跟踪方法”中详细介绍。


    ## 时态表


    此内置数据库功能允许你查看表中数据在任意时间点的状态。它是一个系统版本控制表，保留了数据更改的完整历史。每行的有效性由系统（即数据库引擎）管理。版本控制通过一对表实现：当前表和历史表。这两个表都包含两个`datetime2`类型的列，用于定义每行的有效期，称为`PERIOD`列。当前表包含每行的当前值。历史表包含每行的每个先前值以及其有效开始时间和结束时间。


    图 2-12 展示了一个时态表及其历史表。


    **图 2-12.** 时态表及其历史表


    关于时态表的更多信息将在第 10 章“其他 SQL Server 审计与跟踪方法”中详细介绍。


    ## 成功与失败的登录审计


    你可以通过几种方式实现`成功与失败的登录审计`。当你跟踪登录时，你会在 SQL Server 日志中看到任何成功登录、失败登录或两者。一种方法是通过`SSMS`中的服务器属性进行设置，如图
    2-13 所示。配置完成后，成功和/或失败的登录将出现在 SQL Server 日志中。


    **图 2-13.** 更改登录审计设置


    另一种捕获此信息的方法是使用`扩展事件`。关于登录审计的更多信息将在第 10 章“其他 SQL Server 审计与跟踪方法”中详细介绍。


    ## 审计 Azure SQL 数据库


    审计 Azure SQL 数据库与审计 SQL Server 数据库有很大不同，尤其是在涉及`SQL Server 审计`时。`SQL Server 审计`在`Azure
    SQL Database`中不可用。你需要使用 Azure 门户来设置审计，不能使用`SQL Server 审计`。

