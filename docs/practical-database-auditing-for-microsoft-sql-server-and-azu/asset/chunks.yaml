- fmt: '# Chapter 2: Types of Database Auditing


    The starting point of any good auditing strategy is knowing the auditing options
    you have at your disposal. This chapter gives you a high-level description of
    each auditing tool that is covered in this book.


    Proof that you had approval before making changes, or they require reports listing
    out changes. With the auditing in place, providing this documentation is much
    easier.


    In summary, you can see how auditing can be very powerful and, in many cases,
    required by law. Auditing isn’t something you need to be afraid or avoid. It can
    help you make sure your database systems are being used in accordance with laws
    and regulations. Even if you aren’t required by law to audit your databases, you
    can use auditing as a sanity check for yourself and your team. Plus, auditing
    can help you develop policies and procedures and help you determine if everyone
    is following those procedures.


    ## SQL Server Audit


    *SQL Server Audit* is a built-in SQL Server auditing feature that can be used
    to set up auditing with SQL Server Management Studio (SSMS). You can also set
    it up with SQL scripts, which makes it easier to apply the same auditing strategy
    to many servers.


    This feature makes it easy to see what is changing on your SQL Server. You can
    audit everything that is changing or parts and pieces of those things that are
    changing.


    To make SQL Server auditing work, you need two or three things depending on what
    you want to audit. You are required to create an *audit specification*. This will
    determine where you store audit data. You will also need one *server specification*
    and/or one *database audit specification* for audit data to write to the audit
    specification. The server audit specification can audit server activities, and
    it can also audit all the database activities in the same way. Each audit specification
    can have one server and/or one database audit. Those server and database audits
    are not dependent on each other.


    The server audit specification is generally good for auditing server-level changes
    and/or all the databases at the same time. The database audit specification is
    good for auditing one database or a subset of activities in one database.


    Figure 2-1 shows where you can set up *SQL Server Audit* via SQL Server Management
    Studio.


    © Josephine Bush 2022

    J. Bush, *Practical Database Auditing for Microsoft SQL Server and Azure SQL*,
    [https://doi.org/10.1007/978-1-4842-8634-0_2](https://doi.org/10.1007/978-1-4842-8634-0_2)


    ![](index-22_1.png)


    *Figure 2-1. Setting up SQL Server Audit*


    Chapter 3, “What Is SQL Server Audit?”, provides more details on SQL Server auditing.
    Chapters 4, “Implementing SQL Server Audit via the GUI,” and Chapter 5, “Implementing
    SQL Server Audit via SQL Scripts,” take you through implementing SQL Server auditing.


    ## Extended Events


    *Extended events* is a built-in SQL Server auditing feature that can be used to
    set up auditing with SQL Server Management Studio. You can also set it up with
    SQL scripts, which makes it easier to apply the same auditing strategy to many
    servers.


    Extended events makes it easy to see what is changing on your SQL Server. It doesn’t
    have auditing capabilities as nuanced as *SQL Server Audit*, so if you are looking
    to audit a subset of activities for a user or database, then it’s best to use
    *SQL Server Audit* for that instead.


    Extended events is very good at capturing everything a specific user does. It’s
    also very good at capturing anything happening in a database.


    To make extended events work, you need to set up a session. That’s the only piece
    that’s required, instead of the two or three pieces for *SQL Server Audit*.


    ![](index-23_1.png)


    Additionally, extended events has a wizard to walk you through setup, or you can'
