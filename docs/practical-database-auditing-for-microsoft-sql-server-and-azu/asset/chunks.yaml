    Now you only see what that user did as shown in Figure [13-14](#index_split_002.html#p225).


    **Figure 13-14.** Kusto query results with additional filter


    ## Modifying Azure SQL Database Auditing


    The results you see in Figure [13-13](#index_split_002.html#p224) are that way
    because I modified the default auditing policy. Otherwise, you wind up with so
    much audit data that it’s not easy to weed through it to see what you want or
    need to see. What you would see with the default audit settings is more like Figure
    [13-15](#index_split_002.html#p226).


    ![](index-226_1.png)


    **Figure 13-15.** Audit results without filtering


    Notice how in Figure [13-15](#index_split_002.html#p226) there are a lot more
    statements audited. We will want to filter that out before it writes to the audit.


    By default, all Azure SQL databases get these audit actions:

    *   `BATCH_COMPLETED_GROUP`

    *   `SUCCESSFUL_DATABASE_AUTHENTICATION_GROUP`

    *   `FAILED_DATABASE_AUTHENTICATION_GROUP`


    These audit actions will audit all queries and stored procedures executed against
    the database, as well as all successful and failed logins. As you can imagine,
    this can be a lot of audit data. I’m mainly concerned with changes like schema
    or permissions. To get only these changes, you need to change the default auditing
    policy to use different audit action groups.


    If you are familiar with SQL Server Audit, some of the audit action groups will
    be the same, but some are different. Figure [13-16](#index_split_002.html#p227)
    shows the accepted values for audit action groups in Azure.


    ![](index-227_1.png)

    ![](index-227_2.jpg)


    **Figure 13-16.** Audit action groups in Azure


    ## Getting and Setting Your Auditing Policy


    Let’s look at the PowerShell commands you can use to see and change your auditing
    policy:

    *   `Get-AZSqlServerAudit` – This allows you to see the current policy.

    *   `Set-AZSqlServerAudit` – This allows you to change the current policy.


    To use these PowerShell commands, you need the Azure CLI. In the Azure portal,
    click the cloud shell button near the upper right of the page as shown in Figure
    [13-17](#index_split_002.html#p227).


    **Figure 13-17.** Accessing the cloud shell


    ![](index-228_1.png)


    **Tip** To find out more about using PowerShell in the Azure CLI, [visit https://docs.microsoft.com/en-us/azure/cloud-shell/quickstart-powershell](https://docs.microsoft.com/en-us/azure/cloud-shell/quickstart-powershell).


    You will get a box like the one in Figure [13-18](#index_split_002.html#p228)
    at the bottom of the browser. Make sure you are using PowerShell, not Bash.


    **Figure 13-18.** Cloud shell using PowerShell


    To get the auditing policy, you will need to specify the `ResourceGroupName` and
    the `Servername`, as shown in Listing [13-3](#index_split_002.html#p228).


    **Listing 13-3.** Get the current auditing policy


    ```

    Get-AzSqlServerAudit -ResourceGroupName ''yourresourcegroup'' -Servername ''yourservername''

    ```


    Make sure to change the variables to the correct resource group and server name
    in your Azure account.


    Figure [13-19](#index_split_002.html#p229) shows you the results of executing
    the `Get-AzSqlServerAudit` in my Azure portal.


    ![](index-229_1.png)


    **Figure 13-19.** Get the current auditing policy results


    The default auditing policy is still in place on this database server. I recommend
    changing the policy to capture these actions to minimize auditing data:

    *   `APPLICATION_ROLE_CHANGE_PASSWORD_GROUP`

    *   `DATABASE_CHANGE_GROUP`

    *   `DATABASE_OBJECT_CHANGE_GROUP`

    *   `DATABASE_OBJECT_OWNERSHIP_CHANGE_GROUP`

    *   `DATABASE_OBJECT_PERMISSION_CHANGE_GROUP`

    *   `DATABASE_OWNERSHIP_CHANGE_GROUP`

    *   `DATABASE_PERMISSION_CHANGE_GROUP`

    *   `DATABASE_PRINCIPAL_CHANGE_GROUP`

    *   `DATABASE_PRINCIPAL_IMPERSONATION_GROUP`

    *   `DATABASE_ROLE_MEMBER_CHANGE_GROUP`

    *   `SCHEMA_OBJECT_CHANGE_GROUP`'
