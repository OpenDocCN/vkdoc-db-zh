  trans: '第二章：数据库审计的类型


    任何良好审计策略的起点，是了解你可用的审计选项。本章为你概述了本书涵盖的每种审计工具。


    你需要证明在进行更改之前获得了批准，或者他们要求提供列出更改的报告。有了审计机制，提供这些文档就容易得多。


    总而言之，你可以看到审计功能可以非常强大，并且在许多情况下是法律所要求的。审计并非你需要害怕或回避的东西。它可以帮助你确保数据库系统的使用符合法律法规。即使法律没有要求你审计数据库，你也可以将审计用作对自己和团队的一种合理性检查。此外，审计可以帮助你制定政策和程序，并帮助你确定每个人是否都在遵循这些程序。


    ### SQL Server 审计


    *SQL Server 审计* 是一个内置的 SQL Server 审计功能，可通过 SQL Server Management Studio (SSMS)
    进行设置。你也可以使用 SQL 脚本来设置它，这使得将相同的审计策略应用于多台服务器变得更加容易。


    此功能使你可以轻松查看 SQL Server 上正在更改的内容。你可以审计所有正在更改的内容，或这些更改内容的部分片段。


    要使 SQL Server 审计工作，根据你想要审计的内容，你需要两到三样东西。你需要创建一个 *审计规范*。这将决定审计数据的存储位置。你还需要一个 *服务器规范*
    和/或一个 *数据库审计规范*，以便审计数据写入该审计规范。服务器审计规范可以审计服务器活动，它也可以以相同方式审计所有数据库活动。每个审计规范可以有一个服务器和/或一个数据库审计。这些服务器和数据库审计彼此独立。


    服务器审计规范通常适用于审计服务器级别的更改和/或同时审计所有数据库。数据库审计规范则适用于审计一个数据库或一个数据库中的部分活动。


    图 2-1 显示了你可以通过 SQL Server Management Studio 设置 *SQL Server 审计* 的位置。


    © Josephine Bush 2022

    J. Bush, *Microsoft SQL Server 和 Azure SQL 实用数据库审计*, [`doi.org/10.1007/978-1-4842-8634-0_2`](https://doi.org/10.1007/978-1-4842-8634-0_2)


    ![](img/index-22_1.png)


    *图 2-1. 设置 SQL Server 审计*


    第三章 “什么是 SQL Server 审计？” 提供了有关 SQL Server 审计的更多细节。第四章 “通过 GUI 实现 SQL Server 审计”
    和第五章 “通过 SQL 脚本实现 SQL Server 审计” 将引导你完成实现 SQL Server 审计的过程。


    ### 扩展事件


    *扩展事件* 是一个内置的 SQL Server 审计功能，可通过 SQL Server Management Studio 设置审计。你也可以使用 SQL
    脚本来设置它，这使得将相同的审计策略应用于多台服务器变得更加容易。


    扩展事件使你可以轻松查看 SQL Server 上正在更改的内容。它的审计功能不像 *SQL Server 审计* 那样细致入微，因此，如果你希望审计某个用户或数据库的部分活动，那么最好使用
    *SQL Server 审计*。


    扩展事件非常擅长捕获特定用户执行的所有操作。它也非常擅长捕获数据库中发生的任何事件。


    要使扩展事件工作，你需要设置一个会话。这是唯一需要的部分，不像 *SQL Server 审计* 需要两到三个部分。


    ![](img/index-23_1.png)


    此外，扩展事件有一个向导可以指导你完成设置过程，或者你也可以'
- fmt: '# Chapter 2 Types of Database Auditing


    create a session without a wizard. It also has templates to help you set up a
    session without needing to know all the configuration settings to make it work.


    Figure 2-2 shows where you can set up extended events via SQL Server Management
    Studio.


    *Figure 2-2. Setting up extended events*


    Chapter 6, “What Is Extended Events?”, provides more details on configuration
    options. Chapters 7, “Implementing Extended Events via the GUI,” and Chapter 8,
    “Implementing Extended Events via SQL Scripts,” take you through implementing
    extended events.


    ## Tracking SQL Server Configuration Changes


    There are multiple ways you can track SQL Server configuration changes. These
    are the type of changes you make to server settings like changing the maximum
    memory setting or showing advanced options. All of these options, including additional
    options, are covered in Chapter 9, “Tracking SQL Server Configuration Changes.”


    ![](index-24_1.png)

    ![](index-24_2.png)

    ![](index-24_3.png)


    Extended events is one way you can capture these types of changes. Figure 2-3
    shows you a cross-section of how it captures configuration changes if you query
    it via the SQL Server Management Studio GUI. You can also query it via scripts,
    which is covered in Chapter 9, “Tracking SQL Server Configuration Changes.”


    *Figure 2-3. Extended event capturing configuration change*


    You can also use SQL Server Audit to track configuration changes. Figure 2-4 shows
    you a cross-section of how it captures configuration changes.


    *Figure 2-4. SQL Server Audit capturing configuration change*


    Lastly, you can also query the `SQL Server Log` directly. The `SQL Server Log`
    contains system events. Figure 2-5 shows an example result of this.


    *Figure 2-5. SQL Server Log query results*


    ![](index-25_1.png)

    ![](index-25_2.jpg)


    ## Change Data Capture


    *Change data capture* will allow you to track changes to data instead of who is
    querying the data. It uses the `SQL Server Agent` to record data changes made
    by inserting, updating, or deleting data in a specific table. It reads the changes
    from the transaction log of the database. The details of the changes are stored
    in a change table that mimics the structure of the original table.


    There are multiple steps for configuration that are covered in Chapter 10, “Additional
    SQL Server Auditing and Tracking Methods.” Figure 2-6 shows you the original table
    and its CDC table.


    *Figure 2-6. CDC table structure*


    When you query the `cdc.dbo_ErrorLog_CT` table, which is where CDC is storing
    the changes to the `dbo.ErrorLog` table, you will see something like the query
    results in Figure 2-7. Figure 2-7 was taken after one update to one row.


    *Figure 2-7. CDC results*


    ![](index-26_1.png)

    ![](index-26_2.png)


    ## Change Tracking


    *SQL Server Change Tracking* is a lightweight way to track DML changes to SQL
    Server database tables. These changes are tracked once the DML statement is committed
    to the database. It differs from change data capture in that it tracks changes
    synchronously, whereas change data capture reads from the transaction log file,
    which causes a delay while reading the changes. Also, Change Tracking doesn’t
    require the `SQL Agent` to be started, unlike change data capture that does.


    Figure 2-8 shows how to enable Change Tracking on a database.


    *Figure 2-8. Enabling SQL Server Change Tracking on a database*'
