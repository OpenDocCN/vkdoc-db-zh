- fmt: "# Chapter 13 Auditing Azure SQL Databases\n\n## Creating Extended Event\n\n\
    You are ready to set up your extended event using the script in [Listing 13-8](#index_split_002.html#p238).\
    \ This also needs to be executed on the database you want to audit, not `master`.\
    \ Make sure to update the filename to the storage account URL from [Figure 13-23](#index_split_002.html#p234).\n\
    \n**Listing 13-8.** Create extended event\n\n```sql\nCREATE EVENT SESSION [auditxel]\
    \ ON DATABASE\nADD EVENT sqlserver.rpc_completed(\n    ACTION(sqlserver.client_app_name,sqlserver.client_hostname,sqlserver.database_name,sqlserver.sql_text,sqlserver.username)\n\
    \    WHERE ([sqlserver].[username]=N'josephine')\n),\nADD EVENT sqlserver.sql_batch_completed(\n\
    \    ACTION(sqlserver.client_app_name,sqlserver.client_hostname,sqlserver.database_name,sqlserver.sql_text,sqlserver.username)\n\
    \    WHERE ([sqlserver].[username]=N'josephine')\n)\nADD TARGET package0.event_file(SET\
    \ filename=N'https://azuresqldbaudits.blob.core.windows.net/xelfiles/xelauditdata.xel',max_file_size=(10),max_rollover_files=(5))\n\
    WITH (MAX_MEMORY=4096 KB,EVENT_RETENTION_MODE=ALLOW_SINGLE_EVENT_LOSS,MAX_DISPATCH_LATENCY=30\
    \ SECONDS,MAX_EVENT_SIZE=0 KB,MEMORY_PARTITION_MODE=NONE,TRACK_CAUSALITY=OFF,STARTUP_STATE=ON);\n\
    \nALTER EVENT SESSION [auditxel] ON DATABASE\nSTATE=START;\n```\n\nOnce the extended\
    \ event is started, it will place a file in the Azure storage account as shown\
    \ in [Figure 13-26](#index_split_002.html#p239). Five files up to 10 MB each will\
    \ be placed there because that’s what’s specified in the script in [Listing 13-6](#index_split_002.html#p237).\n\
    \n![](index-239_1.png)\n\n![](index-239_2.png)\n\n**Figure 13-26.** .xel files\
    \ in Azure storage account\n\n## Querying Extended Event\n\nTo query the .xel\
    \ files, you will need to know the exact file names. You can use the Azure Storage\
    \ connection in SSMS to find out the names as shown in [Figure 13-27](#index_split_002.html#p239).\n\
    \n**Figure 13-27.** Azure Storage connection\n\nSign in to Azure and pick the\
    \ right storage account and container from the drop-down as shown in [Figure 13-28](#index_split_002.html#p240).\n\
    \n![](index-240_1.jpg)\n\n![](index-240_2.png)\n\n**Figure 13-28.** Log in to\
    \ Azure and select storage account and container\n\nClick OK. This connects you\
    \ to this storage account and lists the files in the container as shown in [Figure\
    \ 13-29](#index_split_002.html#p240).\n\n**Figure 13-29.** Container list of files\n\
    \nOnce you know the names of the files, you can query them with the script in\
    \ [Listing 13-9](#index_split_002.html#p240).\n\n**Listing 13-9.** Query .xel\
    \ files\n\n```sql\nSELECT\n    n.value('(@timestamp)[1]', 'datetime') as timestamp,\n\
    \    n.value('(action[@name=\"sql_text\"]/value)[1]', 'nvarchar(max)') as [sql],\n\
    \    n.value('(action[@name=\"client_hostname\"]/value)[1]', 'nvarchar(50)') as\
    \ [client_hostname],\n    n.value('(action[@name=\"username\"]/value)[1]', 'nvarchar(50)')\
    \ as [user],\n    n.value('(action[@name=\"database_name\"]/value)[1]', 'nvarchar(50)')\
    \ as [database_name],\n    n.value('(action[@name=\"client_app_name\"]/value)[1]',\
    \ 'nvarchar(50)') as [client_app_name]\nFROM\n    (SELECT CAST(event_data as XML)\
    \ as event_data\n     FROM sys.fn_xe_file_target_read_file('https://azuresqldbaudits.blob.core.windows.net/xelfiles/xelauditdata_0_132972103478750000.xel',\
    \ NULL, NULL, NULL)) as ed\n    CROSS APPLY ed.event_data.nodes('event') as q(n)\n\
    WHERE n.value('(@timestamp)[1]', 'datetime') >= DATEADD(HOUR, -4, GETDATE())\n\
    ORDER BY timestamp DESC;\n```\n\nThe query in [Listing 13-7](#index_split_002.html#p237)\
    \ will return the results in [Figure 13-30](#index_split_002.html#p241).\n\n**Figure\
    \ 13-30.** .xel files results\n\nI don’t recommend using extended events in Azure\
    \ SQL Database to audit anything you want to easily query and report on. I recommend\
    \ using Azure SQL auditing, which"
