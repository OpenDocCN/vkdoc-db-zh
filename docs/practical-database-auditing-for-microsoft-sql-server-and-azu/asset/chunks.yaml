    中的结果。


    **图 15-23.** 扩展事件查询结果示例


    **注意** 有关 RDS 中扩展事件的更多信息，请访问 [https://aws.amazon.com/blogs/database/set-up-extended-events-in-amazon-rds-for-sql-server/](https://aws.amazon.com/blogs/database/set-up-extended-events-in-amazon-rds-for-sql-server/)


    ### 审计 Google Cloud SQL 数据库


