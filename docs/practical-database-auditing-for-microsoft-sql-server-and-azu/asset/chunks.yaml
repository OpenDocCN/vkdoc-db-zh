    EXEC @ReturnCode = msdb.dbo.sp_add_job @job_name=N''Audit Retention Cleanup'',
    @enabled=1, @notify_level_eventlog=0, @notify_level_email=0, @notify_level_netsend=0,
    @notify_level_page=0, @delete_level=0, @description=N''No description available.'',
