- fmt: "# Chapter 11 Centralizing audit data\n\nYou don’t have to name the audit with\
    \ `_servername`. This is how I’ve chosen to do it. You can name them differently,\
    \ if you want, but I like to name them this way to tell them apart when querying\
    \ system tables across multiple servers.\n\n## Creating a Centralized Audit Database\
    \ and User\n\nOn the server you choose as your centralized audit database server,\
    \ you need to set up an auditing database as shown in Listing 11-4.\n\n### Listing\
    \ 11-4. Setting up auditing database\n\n```\nCREATE DATABASE [Auditing];\n```\n\
    \nNext, you will need to set up a table to hold your auditing data as shown in\
    \ Listing 11-5.\n\n### Listing 11-5. Setting up the auditing table\n\n```\nUSE\
    \ [Auditing];\n\nCREATE TABLE [dbo].[AuditChanges](\n    [event_time] [datetime2](7)\
    \ NOT NULL,\n    [statement] [nvarchar](4000) NULL,\n    [server_instance_name]\
    \ [nvarchar](128) NULL,\n    [database_name] [nvarchar](128) NULL,\n    [schema_name]\
    \ [nvarchar](128) NULL,\n    [session_server_principal_name] [nvarchar](128) NULL,\n\
    \    [server_principal_name] [nvarchar](128) NULL,\n    [object_Name] [nvarchar](128)\
    \ NULL,\n    [file_name] [nvarchar](260) NOT NULL,\n    [client_ip] [nvarchar](128)\
    \ NULL,\n    [application_name] [nvarchar](128) NULL,\n    [host_name] [nvarchar](128)\
    \ NULL,\n    [succeeded] [bit] NULL,\n    [audit_action] [nvarchar](50) NULL\n\
    ) ON [PRIMARY];\n\nCREATE CLUSTERED INDEX [CIX_EventTime_User_Server_DB] ON [dbo].[AuditChanges]\n\
    (\n    [event_time] ASC\n)WITH (PAD_INDEX = OFF, STATISTICS_NORECOMPUTE = OFF,\
    \ SORT_IN_TEMPDB = OFF,\n       DROP_EXISTING = OFF, ONLINE = OFF, ALLOW_ROW_LOCKS\
    \ = ON, ALLOW_PAGE_LOCKS = ON) ON [PRIMARY];\n```\n\nNext, you will need an auditing\
    \ user that has rights to the auditing database as shown in Listing 11-6. This\
    \ way, the linked server on your audited servers can access the auditing database.\n\
    \n### Listing 11-6. Setting up auditing user\n\n```\nUSE [master];\n\nCREATE LOGIN\
    \ [sqlauditing] WITH PASSWORD=N'testing1234!',\nDEFAULT_DATABASE=[master], CHECK_EXPIRATION=OFF,\
    \ CHECK_POLICY=ON;\n\nUSE [Auditing];\n\nCREATE USER [sqlauditing] FOR LOGIN [sqlauditing];\n\
    \nALTER ROLE [db_datareader] ADD MEMBER [sqlauditing];\nALTER ROLE [db_datawriter]\
    \ ADD MEMBER [sqlauditing];\n```\n\n**Note** You will need the server authentication\
    \ set as SQL Server and Windows authentication mode to set up the `sqlauditing`\
    \ user in Listing 11-6. For more information about authentication methods, visit\
    \ https://docs.microsoft.com/en-us/sql/relational-databases/security/choose-an-authentication-mode?view=sql-server-ver16.\n\
    \nMake sure to update the password in the script from its default value of `‘testing1234!’`.\n\
    \n## Creating a Linked Server\n\nYou will need one linked server on each audited\
    \ server to send the audit data to the centralized server. Listing 11-7 gives\
    \ you the script to create this.\n\n### Listing 11-7. Setting up a linked server\n\
    \n```\nUSE [master];\n\nEXEC master.dbo.sp_addlinkedserver @server = N'YourCentralizedAuditServerName',\
    \ @srvproduct=N'SQL Server';\n\nEXEC master.dbo.sp_addlinkedsrvlogin @rmtsrvname\
    \ = N'YourCentralizedAuditServerName', @locallogin = NULL , @useself = N'False',\n\
    @rmtuser = N'sqlauditing', @rmtpassword = N'CreateStrongPasswordHere';\n```\n\n\
    Make sure to update the `@server` variable to your central server’s name. Also,\
    \ make sure to update the `@rmtpassword` to the password you chose for your `sqlauditing`\
    \ user.\n\n## SQL Agent Jobs to Collect and Clean Up Audit Data\n\nYou will need\
    \ one SQL Server Agent job on each of the audited servers to send the audit data\
    \ to the centralized server."
