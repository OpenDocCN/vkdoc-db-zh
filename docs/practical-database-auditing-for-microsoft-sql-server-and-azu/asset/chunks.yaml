  trans: "# 第 14 章：审核 Azure SQL 托管实例\n\n## 导航到存储帐户容器\n\n导航到你的审核文件。导航到你刚创建的存储帐户并点击\
    \ `容器`。\n\n然后点击 **+ 容器** 按钮。为容器命名，并将 **公共访问级别** 保留为 **专用（无匿名访问）**。点击 **创建**。如图\
    \ 14-8 所示。\n\n### 图 14-8. 容器创建\n\n点击 **创建** 后，你将看到你的容器被列出。点击该容器并选择 **属性**。复制 URL\
    \ 以供后续步骤使用，如图 14-9 所示。\n\n![图 14-9. 复制容器 URL](img/index-256_1.png)\n\n## 配置共享访问签名\n\
    \n导航回到存储帐户并点击 **共享访问签名**。请务必根据图 14-10 中的屏幕截图为此密钥创建你的设置。如果你想将此存储帐户用于审核文件的时间超过默认的八小时，你需要将过期日期设置得更长一些。\n\
    \n![图 14-10. 创建共享访问签名](img/index-257_1.jpg)\n\n我为我的共享访问签名选择的设置是：\n\n*   **允许的服务**\
    \ – `Blob`。\n*   **允许的资源类型** – `服务`、`容器`、`对象`。\n*   **允许的权限** – `读取`、`写入`、`删除`、`列表`、`添加`、`创建`。\n\
    *   **Blob 版本控制权限** – 允许删除版本。\n*   **允许的 Blob 索引权限** – `读取/写入`、`筛选`。\n*   **开始和过期日期/时间**\
    \ – 如果过期，你的托管实例将无法再访问容器。你需要生成一个新的共享访问签名。然后使用新令牌更新你的托管实例凭据。我倾向于将过期时间设置为几年后，以避免无法访问存储帐户的问题。\n\
    *   **允许的协议** – `仅 HTTPS`。\n*   **首选路由层** – `基本（默认）`。\n*   **签名密钥** – `密钥 1`。\n\
    \n点击 **生成 SAS 和连接字符串**。SAS 令牌将加载在该页面上。请不要离开此页面。你将无法再次获取该 SAS 令牌。如果需要新令牌，你必须生成一个新的\
    \ SAS 配置。复制 SAS 令牌以供后续步骤使用，如图 14-11 所示。\n\n**注意：** 将其添加到 SQL Server 凭据时，你需要从令牌开头移除问号\
    \ (`?`)。\n\n### 图 14-11. 复制 SAS 令牌\n\n## 创建数据库凭据\n\n在 `SSMS` 中连接到你的托管实例。你需要创建一个凭据，以便你的托管实例可以访问你的存储帐户，如清单\
    \ 14-5 所示。\n\n### 清单 14-5. 在 SSMS 中创建凭据\n\n```sql\nCREATE CREDENTIAL [来自图 14-9\
    \ 的 URL]\nWITH IDENTITY='SHARED ACCESS SIGNATURE',\nSECRET = '来自图 14-11 的令牌';\n\
    ```\n\n## 创建 SQL Server 审核\n\n你可以使用清单 14-6 中的脚本创建你的 SQL Server 审核。\n\n### 清单 14-6.\
    \ 在 SSMS 中创建审核\n\n```sql\nCREATE SERVER AUDIT miauditstorage\nTO URL\n(\n    PATH\
    \ = '来自图 14-9 的 URL',\n    RETENTION_DAYS = 30\n);\n\nALTER SERVER AUDIT [miauditstorage]\
    \ WITH (STATE = ON);\n```\n\n`RETENTION_DAYS = 30` 意味着存储帐户将仅存储 30 天的审核文件，之后它们将被删除。`0`\
    \ 表示永久。我喜欢 30 天，因为这给了我足够的时间在审核数据消失前进行分析。\n\n在你设置服务器或数据库审核之前，不会收集任何审核数据。你可以使用清单\
    \ 14-7 中的脚本设置服务器审核。\n\n### 清单 14-7. 在 SSMS 中创建服务器审核\n\n```sql\nUSE [master];\n\
    CREATE SERVER AUDIT SPECIFICATION [miserverauditstorage]\nFOR SERVER AUDIT [miauditstorage]\n\
    ADD (DATABASE_OBJECT_ACCESS_GROUP),\nADD (SCHEMA_OBJECT_ACCESS_GROUP),\nADD (AUDIT_CHANGE_GROUP),\n\
    ADD (SERVER_OPERATION_GROUP)\nWITH (STATE = ON);\n```\n\n## 查询 SQL Server 审核文件\n\
    \n这开始将 `.xel` 文件写入你的 Azure 存储帐户，如图 14-12 所示。"
- fmt: "# Chapter 14: Auditing Azure SQL Managed Instance\n\n![](index-260_1.jpg)\n\
    \n![](index-260_2.png)\n\n**Figure 14-12.** SQL Audit files in Azure storage account\n\
    \nYou will see they are saved as `.xel` files, even though on SQL Server on a\
    \ VM, they will be saved as `.sqlaudit` files. Also, note there is a folder structure\
    \ for the files by server, database, container, and date. It’s hard to query multiple\
    \ files because you have to loop through them.\n\nAs with SQL Server on a VM,\
    \ you can right-click the audit to View Audit Logs, as shown in Figure 14-13.\n\
    \n**Figure 14-13.** View audit logs\n\nThere is a way to merge audit files by\
    \ clicking `File` ➤ `Open` ➤ `Merge Audit Files` as shown in Figure 14-14.\n\n\
    ![](index-261_1.jpg)\n\n![](index-261_2.png)\n\n**Figure 14-14.** Merge Audit\
    \ Files menu item\n\n`Merge Audit Files` will bring up a dialog box. Click `Add`.\
    \ This will bring up another dialog box where you can add your audit files as\
    \ shown in Figure 14-15.\n\n**Figure 14-15.** Merge Audit Files\n\nYou are limited\
    \ to merging only one database’s audit files. This may not prove very useful if\
    \ you have multiple databases you are auditing. This is why I like the diagnostic\
    \ setting that allows you to store your audit data in a Log Analytics workspace.\
    \ This makes for easy querying across multiple databases or servers.\n\n## Auditing\
    \ Azure SQL Managed Instance with Extended Events\n\nExtended events on Azure\
    \ SQL Managed Instance is very similar to SQL Server on a VM. The main difference\
    \ is the storage location. You will need to use a storage account to write audit\
    \ files. The setup is the same as SQL Server otherwise. See earlier chapters in\
    \ this book on how to set up extended events.\n\nYou will need to create a storage\
    \ account and container to hold your audit files. The storage account, container,\
    \ container URL, SAS token, and credential can be used in the last section. This\
    \ setup will be the same as for SQL Server Audit in the last section.\n\nYou need\
    \ to specify the URL in the filename when creating the extended event as shown\
    \ in Listing 14-8.\n\n**Listing 14-8.** Create server audit in SSMS\n\n```sql\n\
    CREATE EVENT SESSION [auditxel] ON SERVER\nADD EVENT sqlserver.rpc_completed(\n\
    \    ACTION(sqlserver.client_app_name, sqlserver.client_hostname, sqlserver.database_name,\
    \ sqlserver.sql_text, sqlserver.username)\n    WHERE ([sqlserver].[username]=N'josephine')),\n\
    ADD EVENT sqlserver.sql_batch_completed(\n    ACTION(sqlserver.client_app_name,\
    \ sqlserver.client_hostname, sqlserver.database_name, sqlserver.sql_text, sqlserver.username)\n\
    \    WHERE ([sqlserver].[username]=N'josephine'))\nADD TARGET package0.event_file(SET\
    \ filename=N'https://azuremiauditing.blob.core.windows.net/miauditfiles/xelauditdata.xel',\
    \ max_file_size=(10), max_rollover_files=(5))\nWITH (MAX_MEMORY=4096 KB, EVENT_RETENTION_MODE=ALLOW_SINGLE_EVENT_LOSS,\
    \ MAX_DISPATCH_LATENCY=30 SECONDS, MAX_EVENT_SIZE=0 KB, MEMORY_PARTITION_MODE=NONE,\
    \ TRACK_CAUSALITY=OFF, STARTUP_STATE=ON);\n\nALTER EVENT SESSION [auditxel] ON\
    \ SERVER STATE=START;\n```\n\n![](index-263_1.jpg)\n\n![](index-263_2.png)\n\n\
    Make sure to update the `filename` to the path to your storage account and container.\
    \ This will be the one you set up a credential for. Refer to the SQL Server Audit\
    \ section in this chapter for more details.\n\nOnce the extended event is started,\
    \ it will place a file in the Azure storage account as shown in Figure 14-16.\
    \ Five files up to 10 MB each will be placed there because that’s what’s specified\
    \ in the script in Listing 14-8.\n\n**Figure 14-16.** `.xel` files in Azure storage\
    \ account\n\nTo query the `.xel` files, you will need to know the exact file names.\
    \ You can use the Azure Storage connection in SSMS to find out the names as shown\
    \ in Figure 14-17.\n\n**Figure 14-17.** Azure Storage connection\n\n![](index-264_1.jpg)"
