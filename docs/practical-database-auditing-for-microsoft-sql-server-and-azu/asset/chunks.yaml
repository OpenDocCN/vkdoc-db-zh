    # 第 7 章 通过图形界面实现扩展事件


    你可以通过查看扩展事件上的图标来确定其是否已启用。如果是绿色箭头，则表示已启用；如果是红色方框，则表示已禁用。图 7-16 展示了这两种状态。


    ![](img/index-127_1.png)


    ![](img/index-127_2.png)


    **图 7-16。** 扩展事件状态


    在图 7-16 中，`AlwaysOn_health` 是禁用的，其余扩展事件是启用的。


    ## 通过“新建会话”选项设置扩展事件


    “新建会话”对话框将帮助你设置扩展事件。图 7-17 展示了如何在 SSMS 中创建扩展事件：在“管理”部分下的“扩展事件”节点上右键单击，然后选择“新建会话”。此选项允许你配置全套扩展事件选项。它类似于向导，但不会逐步引导你完成配置，而是将所有配置页面集中在一个易于访问的对话框中，并在左侧列出页面。在这个设置过程中，你将学习如何使用扩展事件来审核一个用户。


    **图 7-17。** 使用“新建会话”对话框创建扩展事件


    选择“新建会话”后，你将看到一个对话框，其屏幕与“新建会话向导”类似。如图 7-18 所示，在“常规”页面上，你将：


    *   为其命名

    *   选择一个模板（在此例中，我们将其留空）

    *   决定启动计划

    *   选择是否在创建后监视实时数据

    *   选择是否启用因果关系跟踪


    ![](img/index-128_1.png)


    **图 7-18。** 新建会话“常规”页


    我不使用模板。我总是选择“在服务器启动时启动会话”和“创建后启动事件会话”。我从不监视实时捕获的数据，因为稍后可以查看，本章稍后会介绍。我不使用因果关系跟踪，但它可以帮助你确定与查询关联的所有事件。


    配置好“常规”页面后，你可以单击“事件”页面。在这里，你将选择事件，如 `rpc_completed` 和 `sql_batch_completed`，这些在第
    6 章“什么是扩展事件？”中有更详细的介绍，如图 7-19 所示。


    ![](img/index-129_1.png)


    ![](img/index-129_2.jpg)


    **图 7-19。** 新建会话“事件”页


    一旦将事件添加到“选定的事件”中，这些事件尚未配置任何全局字段（也称为操作）。你可以在闪电图标下看到显示为 0。要配置它们，你必须单击“配置”。


    由于我建议为两个事件捕获相同的字段，因此在单击“配置”之前同时选中它们，如图 7-20 所示。


    **图 7-20。** 同时选择两个事件以进行相同配置


    ![](img/index-130_1.png)


    单击“配置”后，你将进入一个带有全局字段的配置页面。每个事件都包含默认字段，但我建议使用这些全局字段来捕获你事件所需的信息：


    *   `client_app_name`

    *   `client_hostname`

    *   `database_name`

    *   `server_instance_name`

    *   `server_principal_name`

    *   `sql_text`


    这些全局字段在第 6 章“什么是扩展事件？”中有更详细的介绍。


    图 7-21 向你展示了在选择了我前面列出的字段后，事件和字段的显示方式。


    **图 7-21。** 新建会话“事件”页 - 配置全局字段


    ![](img/index-131_1.png)


    在图 7-21 中，你可以看到 `rpc_completed` 和 `sql_batch_completed` 都具有六个全局字段。

    '
- fmt: 'There is a tab for Filter, also known as Predicate. Figure 7-22 shows you
    what it looks like when the filter is set. I’ve set a filter on `sqlserver.server_principal_name
    = sa`. Like with global fields, it’s best to keep your filter the same for each
    event.


    **Figure 7-22.** New Session Events page filter


    If you needed to add more events to your selected events, you can click the Select
    button shown in Figure 7-22. This will take you back to the Event Library. If
    you are satisfied with your events and their global fields and filters, you can
    click the Data Storage page. This brings you to a page where you can configure
    your storage options.


    You have more storage options than in the New Session Wizard. These options are
    covered in more detail in Chapter 6, “What Is Extended Events?” Figure 7-23 shows
    you how I set up the storage for my extended events.


    ![](index-132_1.png)


    Chapter 7 ImplemeNtINg exteNded eveNtS vIa the gUI


    **Figure 7-23.** New Session Data Storage page


    Here are some suggestions for file storage:


    *   Don’t store the files on the C drive or other drives SQL Server is using for
    data and log files.

    *   Set the maximum file size to something small like 10 MB and enable file rollover
    of 5–10 files. If you set large file sizes with many rollover files, they will
    be next to impossible to query.


    There is also an Advanced page. I suggest leaving that alone. There is more explanation
    of these options in Chapter 6, “What Is Extended Events?”


    When you are satisfied with your session configuration, click the OK button, as
    shown in Figure 7-23, and the session will create.


    ![](index-133_1.jpg)


    ![](index-133_2.png)


    Chapter 7 ImplemeNtINg exteNded eveNtS vIa the gUI


    **Extended Event Files**


    If you chose the file destination for your extended event, the `.xel` file is
    placed on disk after you enable the extended event as shown in Figure 7-24. This
    is where the event data will live.


    **Figure 7-24.** Extended event files on disk


    As the data collects, this file is going to grow to the size specified in the
    extended event. Then it’ll create another file up to the number of files specified
    in the configuration. Once the last file is full, it will delete the oldest file
    and create another new file. You will need to know how fast your files fill up
    so you won’t miss collecting the data from them before they are deleted.


    **Querying Extended Event Data**


    You can query the extended event via SSMS by right-clicking the extended event
    session as shown in Figure 7-25.


    **Figure 7-25.** View extended event data


    ![](index-134_1.png)


    Chapter 7 ImplemeNtINg exteNded eveNtS vIa the gUI


    A new tab opens in the SSMS query window area as shown in Figure 7-26. Watch live
    data is always empty at first. It only displays events going forward, not those
    in the past.


    There may be nothing listed because nothing auditable happened yet. There may
    be a lot of auditing data because there’s a bunch of stuff happening that you
    didn’t realize was happening.


    You can also expand the extended event and see the files inside of it, as shown
    in Figure 7-26. This will give you the same view as Watch Live Data, but for this
    specific file.


    **Figure 7-26.** View Target Data


    Figure 7-27 shows you a default view of the event data, but this might not be
    a great way to view the data.


    ![](index-135_1.png)


    Chapter 7 ImplemeNtINg exteNded eveNtS vIa the gUI


    **Figure 7-27.** Watch Live Data results


    ![](index-136_1.jpg)


    ![](index-136_2.png)


    Chapter 7 ImplemeNtINg exteNded eveNtS vIa the gUI


    You can add additional columns to the top panel so you can more easily see what
    each event captured instead of having to click on each one to look at its details.'
