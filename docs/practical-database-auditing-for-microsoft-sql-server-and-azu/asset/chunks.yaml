- fmt: '# Chapter 7 Implementing Extended Events via the GUI


    You can determine if your extended event is enabled by looking at the icon on
    the extended event. If there is a green arrow, then it’s enabled. If there is
    a red box, then it’s disabled. Each of these states is shown in Figure 7-16.


    ![](index-127_1.png)


    ![](index-127_2.png)


    **Figure 7-16.** Extended event state


    `AlwaysOn_health` is disabled and the rest of the extended events are enabled
    in Figure 7-16.


    ## Setting Up an Extended Event via the New Session Option


    The New Session dialog box will help you set up your extended event. Figure 7-17
    shows how to create an extended event in SSMS by right-clicking New Session under
    the Extended Events section in the Management section. This option allows you
    to configure the full suite of extended event options. It’s similar to the wizard.
    It doesn’t step you through the configuration, but instead has all the pages for
    configuration in one easily accessed dialog box with a listing of pages on the
    left side. During this setup, you will learn how to audit one user with extended
    events.


    **Figure 7-17.** Creating an extended event with the New Session dialog box


    By choosing New Session, you will get a dialog box that has similar screens to
    the New Session Wizard. On the General screen as shown in Figure 7-18, you will


    *   Name it

    *   Choose a template (in this case, we will leave it blank)

    *   Decide on a schedule for starting

    *   Choose whether you want to watch live data after it’s created

    *   Choose if you want causality tracking


    ![](index-128_1.png)


    **Figure 7-18.** New Session General page


    I don’t use templates. I always choose to Start the session at server startup
    and Start the event session after creation. I never watch live data as it’s captured
    because I can view it later, which will be covered in this chapter. I don’t use
    causality tracking, but it can help you determine all the events associated with
    a query.


    Once you have the General page configured, you can click on the Events page. This
    is where you will select your events like `rpc_completed` and `sql_batch_completed`,
    covered in more detail in Chapter 6, “What Is Extended Events?”, as shown in Figure
    7-19.


    ![](index-129_1.png)


    ![](index-129_2.jpg)


    **Figure 7-19.** New Session Events page


    Once you add your events to the Selected events, no Global Fields, also known
    as Actions, are configured for these events, yet. You can see that under the lightning
    bolt icon. It shows 0. To configure these, you must click Configure.


    Since I’m recommending capturing the same fields for both events, select them
    both before clicking Configure as shown in Figure 7-20.


    **Figure 7-20.** Select both events to configure them the same


    ![](index-130_1.png)


    After clicking Configure, you are brought to a configuration page with global
    fields. There are default fields included with each event, but I recommend using
    these global fields to capture the information you will need for your event:


    *   `client_app_name`

    *   `client_hostname`

    *   `database_name`

    *   `server_instance_name`

    *   `server_principal_name`

    *   `sql_text`


    These global fields are covered in more detail in Chapter 6, “What Is Extended
    Events?”.


    Figure 7-21 shows you how the events and fields will look once you’ve selected
    the fields I listed earlier.


    **Figure 7-21.** New Session Events page Configure Global Fields


    ![](index-131_1.png)


    You can see in Figure 7-21 that `rpc_completed` and `sql_batch_completed` both
    have six global fields.'
