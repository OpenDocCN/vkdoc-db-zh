    If you chose the file destination for your audit, an audit file is placed on disk
    after you enable the audit as shown in Figure 4-8. This is where the data will
    live for your server and database audits that are associated with that audit.


    **Figure 4-8.** Audit files on disk


    As the data collects, this file is going to grow to the size specified in the
    audit. Then it’ll create another file up to the number of files specified in the
    configuration. Once the last file is full, it will delete the oldest file and
    create another new file. You will need to know how fast your files fill up so
    you won’t miss collecting the data from them before they are deleted.


    ## Setting Up the Server Audit Specification


    The first of two optional audits is the server audit. You set this up under the
    security section of the server. Right-click to create a new one as shown in Figure
    4-9.


    ![](index-54_1.png)


    ![](index-54_2.jpg)


    **Figure 4-9.** Creating a server audit specification


    This will bring up a dialog box to configure your server audit specification as
    shown in Figure 4-10.


    **Figure 4-10.** Configuring server audit specification


    ![](index-55_1.png)


    ### Suggestions on how to configure your server audit specification:


    *   **Name –** I tend to name it `ServerAuditSpecification` or `ServerAuditSpecification_servername`.
    This is entirely up to you based on how descriptive you want to name it. You can
    create multiple server audits, though, so it may make sense to make it a more
    descriptive name if you plan to add additional audits.

    *   **Audit –** You need to associate it with your audit. There is a drop-down
    with your audits listed. You need this association because this is where your
    audit data will live.

    *   **Actions –** I’m capturing permissions and schema changes at the server level
    and in all the databases on the server. I’m also capturing if someone changes
    a password, changes an audit, or if someone issues a `DBCC` command. You don’t
    have to fill out any of the other columns. They do not apply to these action types.
    As an example, if you want to capture only server changes, you’d remove all the
    actions starting with `database` and `schema`. Chapter 3, “What Is SQL Server
    Audit?”, has a section on Server Audit Action Groups to help you determine what
    each action audits.


    The server audit specification is also disabled by default. You can right-click
    to enable it as shown in Figure 4-11. It doesn’t collect any data if it’s disabled.


    **Figure 4-11.** Enabling server audit specification


    ## Setting Up the Database Audit Specification


    The second of two optional components is the database audit. You have to go into
    each database’s security section, and then right-click as shown in Figure 4-12.


    ![](index-56_1.jpg)


    **Figure 4-12.** Creating database audit specification


    This brings up a dialog box to configure the database audit specification as shown
    in Figure 4-13.


