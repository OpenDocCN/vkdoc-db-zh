    \ filename=N'https://azuresqldbaudits.blob.core.windows.net/xelfiles/xelauditdata.xel',max_file_size=(10),max_rollover_files=(5))\n\
    WITH (MAX_MEMORY=4096 KB,EVENT_RETENTION_MODE=ALLOW_SINGLE_EVENT_LOSS,MAX_DISPATCH_LATENCY=30\
    \ SECONDS,MAX_EVENT_SIZE=0 KB,MEMORY_PARTITION_MODE=NONE,TRACK_CAUSALITY=OFF,STARTUP_STATE=ON);\n\
    \nALTER EVENT SESSION [auditxel] ON DATABASE\nSTATE=START;\n```\n\n一旦扩展事件启动，它会在\
    \ Azure 存储帐户中放置一个文件，如图 13-26 所示。根据清单 13-6 中脚本的指定，那里将存放最多五个、每个大小为 10 MB 的文件。\n\n\
    ![](img/index-239_1.png)\n\n![](img/index-239_2.png)\n\n**图 13-26.** Azure 存储帐户中的\
    \ .xel 文件\n\n## 查询扩展事件\n\n要查询 .xel 文件，您需要知道确切的文件名。您可以使用 SSMS 中的 Azure 存储连接来查找名称，如图\
    \ 13-27 所示。\n\n**图 13-27.** Azure 存储连接\n\n登录 Azure，并从下拉列表中选择正确的存储帐户和容器，如图 13-28\
    \ 所示。\n\n![](img/index-240_1.jpg)\n\n![](img/index-240_2.png)\n\n**图 13-28.**\
    \ 登录 Azure 并选择存储帐户和容器\n\n点击“确定”。这将连接到此存储帐户并列出容器中的文件，如图 13-29 所示。\n\n**图 13-29.**\
    \ 容器的文件列表\n\n一旦您知道了文件名，就可以使用清单 13-9 中的脚本来查询它们。\n\n**清单 13-9.** 查询 .xel 文件\n\n\
    ```sql\nSELECT\n    n.value('(@timestamp)[1]', 'datetime') as timestamp,\n   \
    \ n.value('(action[@name=\"sql_text\"]/value)[1]', 'nvarchar(max)') as [sql],\n\
    \    n.value('(action[@name=\"client_hostname\"]/value)[1]', 'nvarchar(50)') as\
    \ [client_hostname],\n    n.value('(action[@name=\"username\"]/value)[1]', 'nvarchar(50)')\
    \ as [user],\n    n.value('(action[@name=\"database_name\"]/value)[1]', 'nvarchar(50)')\
    \ as [database_name],\n    n.value('(action[@name=\"client_app_name\"]/value)[1]',\
    \ 'nvarchar(50)') as [client_app_name]\nFROM\n    (SELECT CAST(event_data as XML)\
    \ as event_data\n     FROM sys.fn_xe_file_target_read_file('https://azuresqldbaudits.blob.core.windows.net/xelfiles/xelauditdata_0_132972103478750000.xel',\
    \ NULL, NULL, NULL)) as ed\n    CROSS APPLY ed.event_data.nodes('event') as q(n)\n\
    WHERE n.value('(@timestamp)[1]', 'datetime') >= DATEADD(HOUR, -4, GETDATE())\n\
    ORDER BY timestamp DESC;\n```\n\n清单 13-7 中的查询将返回图 13-30 所示的结果。\n\n**图 13-30.**\
    \ .xel 文件结果\n\n我不建议在 Azure SQL 数据库中使用扩展事件来审计任何您想要轻松查询和报告的内容。我建议使用 Azure SQL 审计功能，"
- fmt: '# Chapter 13: Auditing Azure SQL Databases


    ## Centralizing and Reporting on Azure SQL Audit Data


    Centralizing is as easy as putting all your audit data in the same Log Analytics
    workspace. This makes for easy querying and reporting on audit data.


    To report on data, I use a Logic App. This way, I can send an email attachment
    daily with any changes captured by the audit. Figure [13-31](#index_split_002.html#p242)
    shows you the high-level setup of the Logic App.


    *Figure 13-31. Logic app to report on audit data*


    ![](index-242_1.jpg)


    **Tip** To learn how to create a logic app, [visit https://docs.microsoft.com/en-us/azure/logic-apps/quickstart-create-first-logic-app-workflow](https://docs.microsoft.com/en-us/azure/logic-apps/quickstart-create-first-logic-app-workflow).


    ![](index-243_1.png)


    The logic app consists of four steps. Let’s walk through them one by one. The
    Recurrence step determines how often this app will run as shown in Figure [13-32](#index_split_002.html#p243).
    This logic app will run once a day at 10. This is in UTC, so make sure to account
    for that if you want it to run at 10 in another time zone instead.


    *Figure 13-32. Recurrence step*


    The Run query and list results step runs the Kusto query I mentioned in Listing
    [13-1](#index_split_002.html#p223). This step is shown in Figure [13-33](#index_split_002.html#p244).


    ![](index-244_1.png)


    ![](index-244_2.jpg)


    *Figure 13-33. Run query and list results step*


    The Create CSV table step creates a CSV file of the results as shown in Figure
    [13-34](#index_split_002.html#p244). The contents of the CSV come from the previous
    step. I create a CSV file because the Kusto query results are not easily formatted
    into the body of an email.


    *Figure 13-34. Create CSV table step*


    ![](index-245_1.png)


    **Caution** If you are collecting a lot of audit data, there may be too much to
    send in a daily email. My recommendation is to pare down your auditing to only
    the necessities. For example, I want to see when changes to schema or permissions
    happen, not everything under the sun.


    The Send an email (V2) step allows you to send the CSV file to a specific email
    address as shown in Figure [13-35](#index_split_002.html#p245).


    *Figure 13-35. Send an email (V2)*


    In the next chapter, you will learn how to audit with Azure SQL Managed Instance.
    You will also learn how to centralize and report on that audit data.


    # Chapter 14: Auditing Azure SQL Managed Instance


    This chapter will show you how to audit your Azure SQL Managed Instance. In some
    cases, it’s similar to SQL Server auditing, and in other cases, it’s different.
    Let’s start with a high-level comparison of Azure auditing vs. SQL Server auditing.


    *Table 14-1. SQL Server and Azure SQL auditing comparisons*


    | Cloud solution | SQL Server Audit | Extended Events | Auditing differences |

    | :--- | :--- | :--- | :--- |

    | **SQL Server VM** | Yes | Yes | The same as if you are using SQL Server on premises
    |

    | **Azure SQL Managed Instance** | Yes | Yes | Need to use a storage account to
    hold your audit files |


    Read earlier chapters of this book for more guidance on SQL Server Audit and extended
    events on a VM.


    ## Auditing Azure SQL Managed Instance with Diagnostic Settings


    Turning on diagnostic settings is the easiest way to audit an Azure SQL Managed
    Instance. If you haven’t used diagnostic settings before, you will have to turn
    them on for each server you want to audit.


    © Josephine Bush 2022

    J. Bush, *Practical Database Auditing for Microsoft SQL Server and Azure SQL*,'
