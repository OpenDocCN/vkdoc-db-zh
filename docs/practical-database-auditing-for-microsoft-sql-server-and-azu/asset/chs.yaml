  \n`SET @sql = N'IF (select count(event_time)`\n`FROM [Auditing].[dbo].[AuditChanges]`\n\
  `WHERE event_time > getdate()-1) > 0`\n`BEGIN`\n`DECLARE @tableHTML NVARCHAR(MAX)\
  \ ;`\n`SET @tableHTML =`\n`N''<style type=\"text/css\">`\n`#box-table`\n`{`\n`font-family:\
  \ \"Lucida Sans Unicode\", \"Lucida Grande\", Sans-Serif;`\n`font-size: 12px;`\n\
  `text-align: left;`\n`border: #aaa;`\n`}`\n`#box-table th`\n`{`\n`font-size: 13px;`\n\
  `font-weight: normal;`\n`background: #f38630;;`\n`border: 2px solid #aaa;`\n`text-align:\
  \ left;`\n`color: #039;`\n`cellpadding: 10px;`\n`cellspacing: 10px;`\n`}`\n`#box-table\
  \ td`\n`{`\n`border-right: 1px solid #aabcfe;`\n`border-left: 1px solid #aabcfe;`\n\
  `border-bottom: 1px solid #aabcfe;`\n`cellpadding: 10px;`\n`cellspacing: 10px;`\n\
  `}`\n`tr:nth-of-type(odd)`\n`{ background-color:#aaa; color: #ccc }`\n`tr:nth-of-type(even)`\n\
  `{ background-color:#ccc; color: #aaa }`\n`</style>''+`\n`N''<H2>SQL Server Auditing\
  \ Findings</H2>'' +`\n`N''<table border=\"1\" id=\"box-table\">'' +`\n`N''<tr><th>Event\
  \ Time</th><th>Partial Statement</th>'' +`\n`N''<th>Server</th><th>Database</th><th>Schema</th>''\
  \ +`\n`N''<th>User</th><th>Successful</th></tr>'' +`\n`CAST ( (`\n`SELECT td = convert(varchar,\
  \ [event_time], 22), '''',`\n`td = [audit_action], '''',`\n`td = left([statement],\
  \ 50), '''',`\n`td = [server_instance_name], '''',`\n`td = [database_name], '''',`\n\
  `td = [schema_name], '''',`\n`td = [session_server_principal_name] '''',`\n`td =\
  \ [succeeded]`\n`FROM [Auditing].[dbo].[AuditChanges]`\n`WHERE event_time > getdate()-1`\n\
  `ORDER BY event_time ASC`\n`FOR XML PATH(''tr''), TYPE) AS NVARCHAR(MAX) ) +`\n\
  `N''</table>'' ;`\n`EXEC msdb.dbo.sp_send_dbmail`\n`@recipients='+@mailrecipients+',`\n\
  `@subject = ''Audit Findings - Changes on Production Servers Last 24`\n`Hours'',`\n\
  `@body = @tableHTML,`\n`@profile_name = '+@profilename+',`\n`@body_format = ''HTML'';`\n\
  `END';`\n`SELECT @sql as stepsql`\n`into ##tempvariables;`\n`USE [msdb]`\n`GO`\n\
  `BEGIN TRANSACTION`\n`DECLARE @ReturnCode INT`\n`SELECT @ReturnCode = 0`\n`IF NOT\
  \ EXISTS (SELECT name FROM msdb.dbo.syscategories WHERE`\n`name=N'[Uncategorized\
  \ (Local)]' AND category_class=1)`\n`BEGIN`\n`EXEC @ReturnCode = msdb.dbo.sp_add_category\
  \ @class=N'JOB', @type=N'LOCAL',`\n`@name=N'[Uncategorized (Local)]'`\n`IF (@@ERROR\
  \ <> 0 OR @ReturnCode <> 0) GOTO QuitWithRollback`\n`END`\n`DECLARE @jobId BINARY(16)`\n\
  `EXEC @ReturnCode = msdb.dbo.sp_add_job`\n`@job_name=N'Audit Daily Email of Database\
  \ Server Changes',`\n`@enabled=1,`\n`@notify_level_eventlog=0,`\n`@notify_level_email=2,`\n\
  `@notify_level_netsend=0,`\n`@notify_level_page=0,`\n`@delete_level=0,`\n`@description=N'No\
  \ description available.',`\n`@category_name=N'[Uncategorized (Local)]',`\n`@owner_login_name=N'sa',`\n\
  `@job_id = @jobId OUTPUT`\n`IF (@@ERROR <> 0 OR @ReturnCode <> 0) GOTO QuitWithRollback`\n\
  `DECLARE @stepsql varchar(max);`\n`SET @stepsql = (SELECT stepsql from ##tempvariables);`\n\
  `EXEC @ReturnCode = msdb.dbo.sp_add_jobstep`\n`@job_id=@jobId,`\n`@step_name=N'audit\
  \ findings of changed items on prod servers',`\n`@step_id=1,`\n`@cmdexec_success_code=0,`\n\
  `@on_success_action=1,`\n`@on_success_step_id=0,`\n`@on_fail_action=2,`\n`@on_fail_step_id=0,`\n\
  `@retry_attempts=0,`\n`@retry_interval=0,`\n`@os_run_priority=0,`\n`@subsystem=N'TSQL',`\n\
  `@command=@stepsql,`\n`@database_name=N'master',`\n`@flags=0`\n`IF (@@ERROR <> 0\
  \ OR @ReturnCode <> 0) GOTO QuitWithRollback`\n`EXEC @ReturnCode = msdb.dbo.sp_update_job\
  \ @job_id = @jobId, @start_step_id = 1`\n`IF (@@ERROR <> 0 OR @ReturnCode <> 0)\
  \ GOTO QuitWithRollback`\n`EXEC @ReturnCode = msdb.dbo.sp_add_jobschedule @job_id=@jobId,`\n\
  `@name=N'daily 11am auditing findings',`\n`@enabled=1,`\n`@freq_type=4,`\n`@freq_interval=1,`\n\
  `@freq_subday_type=1,`\n`@freq_subday_interval=0,`\n`@freq_relative_interval=0,`\n\
  `@freq_recurrence_factor=0,`\n`@active_start_date=20190812,`\n`@active_end_date=99991231,`\n\
  `@active_start_time=110000,`\n`@active_end_time=235959,`\n`@schedule_uid=N'8ed67b50-2fa6-4683-a714-9c4518fc1453'`\n\
  `IF (@@ERROR <> 0 OR @ReturnCode <> 0) GOTO QuitWithRollback`\n`EXEC @ReturnCode\
  \ = msdb.dbo.sp_add_jobserver @job_id = @jobId, @server_name = N'(local)'`\n`IF\
  \ (@@ERROR <> 0 OR @ReturnCode <> 0) GOTO QuitWithRollback`\n`COMMIT TRANSACTION`\n\
  `GOTO EndSave`\n`QuitWithRollback:`\n`IF (@@TRANCOUNT > 0) ROLLBACK TRANSACTION`\n\
  `EndSave:`\n`GO`\n\n## 使用说明与注意事项\n\n对于清单 12-4 中的脚本，有以下几点需要注意或需要更新：\n\n*   通过电子邮件发送的\
  \ SQL 语句将仅包含前 50 个字符。否则，HTML 格式将无法正常工作。完整的语句存储在数据库中，以供需要时参考。\n*   更新脚本顶部的变量：\n \
  \   *   `@profilename` – 这是你的数据库邮件配置文件的名称。\n    *   `@mailrecipients` – 这将是接收此审计报告电子邮件的人员。\n\
  \n![](img/index-209_1.png)\n\n电子邮件将类似于图 12-1 中的表格。具体结果将根据数据库服务器上发生的情况而有所不同。\n\n\
  *图 12-1. SQL Server 代理作业审计报告示例*\n\n#### 使用 PowerShell 生成 HTML 报告\n\n如果你想用审计查询结果创建\
  \ HTML 文件。你可以改用 PowerShell。清单 12-5 提供了一个 PowerShell 脚本示例。此脚本将捕获过去七天的所有审计数据。\n\n\
  *清单 12-5. 使用 PowerShell 通过电子邮件创建并发送 HTML 文档*\n\n```powershell\n# 将这些变量更新为你的值\n$OutputFile\
  \ = \"E:\\powershell\\sqlserverauditfindings.html\"\n$CentralServerName = \"yourcentralserver\"\
  \n$SendEmailFrom = \"youremail@domain.com\"\n$SendEmailTo = \"recipient@domain.com\"\
  \n$SMTPServer = \"smtp.domain.com\"\n$EmailSubject = \"审计结果 - 过去 7 天 SQL Server\
  \ 生产服务器上的变更\"\n\n# 请勿更改下方任何内容\n$Header = @\"\n<style>\nTABLE {border-width: 1px;\
  \ border-style: solid; border-color: black; border-collapse: collapse;}\nTD {border-width:\
  \ 1px; padding: 3px; border-style: solid; border-color: black;}\nTH {border-width:\
  \ 1px; padding: 3px; border-style: solid; border-color: black; text-align: left;}\n\
  BODY {width:800px;}\ntd:nth-child(2) {max-width: 400px;}\n</style>\n\"@\n\n# 如果由于某种原因文件仍然存在（来自之前的运行），则将其删除\n\
  if (Test-Path $OutputFile){ Remove-Item -Path $OutputFile -Force}\n\n# 确保查询至少返回一行\n\
  $querycount = Invoke-Sqlcmd -Query \"SELECT count(event_time) as count FROM [Auditing].[dbo].[AuditChanges]\
  \ a WHERE event_time > getdate()-7\" -ServerInstance $CentralServerName\n\n# 如果至少有一行，则查询审计数据并创建\
  \ HTML 文件\nif($querycount.count -gt 0) {\n    #查询过去 7 天的审计事件并转换为 html 文件\n    Invoke-Sqlcmd\
  \ -Query \"SELECT convert(varchar, MAX([event_time]), 22) as event_time, [audit_action],\
  \ [succeeded], [statement], [server_instance_name], [database_name],[schema_name],\
  \ [session_server_principal_name] FROM [Auditing].[dbo].[AuditChanges] a WHERE event_time\
  \ > getdate()-7 GROUP BY [audit_action], [succeeded], [statement], [server_instance_name],\
  \ [database_name], [schema_name], [session_server_principal_name] ORDER BY server_instance_name,\
  \ database_name, schema_name, session_server_principal_name DESC\" `\n    -ServerInstance\
  \ $CentralServerName | ConvertTo-HTML `\n    -Head $Header `\n    -Property event_time,audit_action,succeeded,statement,server_instance_name,database_name,schema_name,session_server_principal_name,name_in_ad\
  \ `\n    | Out-File $OutputFile -Encoding utf8\n\n    # 通过电子邮件发送文件\n    Send-MailMessage\
  \ -From $SendEmailFrom `\n    -To $SendEmailTo `\n    -Subject $EmailSubject `\n\
  \    -Attachments $OutputFile `\n    -SmtpServer $SMTPServer\n\n    # 删除 HTML 文件\n\
  \    Remove-Item –path $OutputFile\n}\n```\n\n\n"
- "# 无审计行时，不会创建文件\n\n```powershell\nelse {\n    Write-Output \"nothing happened bc\
  \ there were zero rows\"\n}\n```\n\n脚本清单 12-5 中唯一需要更新的是顶部的变量：\n\n*   `$OutputFile`\
  \ – 需要设置为您服务器上的一个路径\n*   `$ServerInstance` – 需要指向您的中央审计数据库服务器（在第 11 章“集中审计数据”中设置）\n\
  *   `$SendEmailFrom` – 设置为您发送邮件的邮箱地址\n*   `$SendEmailTo` – 设置为您要发送到的邮箱地址\n*   `$SMTPServer`\
  \ – 设置为您正在使用的 SMTP 服务器\n*   `$EmailSubject` – 设置为您想要的邮件主题，我已包含我惯用的主题\n\n生成的 HTML\
  \ 文件将如图 12-2 所示。您的结果可能会根据数据库服务器上发生的情况而有所不同。除非您在`$OutputFile`变量中更改它，否则文件将被命名为`sqlserverauditfindings.html`。\n\
  \n![图 12-2](img/index-212_1.png)\n*图 12-2. PowerShell HTML 文件示例*\n\n通过电子邮件发送审计结果，可以轻松掌握数据库服务器上发生的变化。以下是我设定的审计报告发送计划：\n\
  \n*   **SQL Server 代理作业计划** – 每日发送电子邮件，包含过去 24 小时的审计结果和部分 SQL 语句\n*   **PowerShell\
  \ 计划** – 每周向我们的工单系统发送一封邮件，附件为 HTML 文件，包含过去七天的审计结果和完整的 SQL 语句\n\n您可以使用 SQL Server\
  \ 代理作业来安排 PowerShell 脚本的执行。图 12-3 展示了 PowerShell 代理作业步骤的样子。请确保类型选择为 PowerShell。\n\
  \n![图 12-3](img/index-213_1.png)\n*图 12-3. PowerShell 代理作业步骤*\n\n**提示** 要了解更多关于创建\
  \ PowerShell 作业步骤的信息，请访问：\n[`docs.microsoft.com/en-us/sql/powershell/run-windows-powershell-steps-in-sql-server-agent?view=sql-server-ver15#PShellJob`](https://docs.microsoft.com/en-us/sql/powershell/run-windows-powershell-steps-in-sql-server-agent?view=sql-server-ver15#PShellJob)\n\
  \n在下一章中，您将学习如何审核 Azure SQL 数据库，以及如何在 Azure 中集中和报告审计数据。\n\n"
- '# 第 13 章 审核 Azure SQL 数据库


  本章将向您展示如何审核 Azure SQL 数据库。在某些方面，它与 SQL Server 审核非常相似，而在其他方面则存在显著差异。


  表 13-1 对 Azure 审核与 SQL Server 审核进行了高层比较。

  *表 13-1. SQL Server 与 Azure SQL 审核对比*


  | 云解决方案 | SQL Server 审核 | 扩展事件 | 审核差异 |

  | :--- | :--- | :--- | :--- |

  | **SQL Server VM** | 是 | 是 | 与本地使用 SQL Server 相同 |

  | **Azure SQL 数据库** | 否 | 是 | Azure 门户中提供等效的 SQL 审核功能 |


  请阅读本书前面章节，以获取更多关于在虚拟机上使用 SQL Server 审核和扩展事件的指导。


  #### 通过门户审核 Azure SQL 数据库


  要审核 Azure SQL 数据库，您需要导航到 Azure 门户：[`portal.azure.com`](https://portal.azure.com)。审核功能已内置在门户中。


  您可以选择在服务器级别或数据库级别审核数据库。如果启用服务器级审核，将审核该服务器下的所有数据库。如果启用数据库级审核，则仅审核指定的那个数据库。请勿在服务器和数据库上同时启用审核。


  © Josephine Bush 2022



  J. Bush, *Microsoft SQL Server 与 Azure SQL 实用数据库审计*,


  [`doi.org/10.1007/978-1-4842-8634-0_13`](https://doi.org/10.1007/978-1-4842-8634-0_13#DOI)


  ![ ](img/index-215_1.png)


