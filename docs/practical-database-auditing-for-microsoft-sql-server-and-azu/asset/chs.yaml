- '# 第三章 什么是 SQL Server Audit？


  `SQL Server Audit`是内置的审计功能，可通过`SQL Server Management Studio` GUI 或`SQL`脚本使用。你可以设置并配置它来捕获`SQL
  Server`上发生的几乎所有事情。它非常灵活且易于设置。


  ## SQL Server Audit 的可用性


  `SQL Server Audit`的第一个版本在`2008`年推出，并且仅包含在`Enterprise`版中。从`2012`版本开始，微软将其扩展到所有版本都支持服务器级别的审计，但数据库审计仍然仅限于`Enterprise`版。到了`2016`及之后的版本，你可以使用任何版本进行服务器和数据库审计，这要好得多，因为很多人并不只使用`Enterprise`版。表
  3-1 概述了`SQL Server Audit`的可用性情况。


  *表 3-1. 按版本划分的 SQL Server Audit 可用性*


  | 版本 | 服务器审计可用性 | 数据库审计可用性 |

  | :--- | :--- | :--- |

  | 2008 | Enterprise | Enterprise |

  | 2012, 2014, 和 2016 SP1 之前 | 所有版本 | Enterprise |

  | 2016 SP1, 2017, 和 2019 | 所有版本 | 所有版本 |


