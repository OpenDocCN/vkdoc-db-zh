  \ 脚本实现 SQL Server 审计”。\n*   **一个表上的 DDL 更改**\n    *   **SQL Server 审计** – 这将需要一个审计和一个数据库审计规范，该规范需指定这一个表以及您想要捕获的相关操作。更多信息，请查阅第[4\
  \ 章](https://doi.org/10.1007/978-1-4842-8634-0_4)“通过 GUI 实现 SQL Server 审计”和第[5 章](https://doi.org/10.1007/978-1-4842-8634-0_5)“通过\
