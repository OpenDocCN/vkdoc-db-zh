- "# 第 14 章 审计 Azure SQL 托管实例\n\n## 启用并配置诊断设置\n\n在 Azure 门户中导航到你的托管实例，然后转到“诊断设置”。你需要点击\
  \ **+ 添加诊断设置** 来添加一个诊断设置，如图 14-1 所示。\n\n**图 14-1.** 添加诊断设置\n\n为你的诊断设置命名，然后选择 `SQLSecurityAuditEvents`。如果你还想要审计\
  \ Microsoft 在你的托管实例上执行的操作，可以选择 `DevOpsOperationsAudit`。选择你的目标详细信息。在这个例子中，我将数据存放在一个\
  \ Log Analytics 工作区中，如图 14-2 所示。\n\n**图 14-2.** 配置诊断设置\n\n点击 **保存**，你将看到你的诊断设置已列出，如图\
  \ 14-3 所示。\n\n**图 14-3.** 诊断设置已保存\n\n## 创建并配置 SQL Server 审计\n\n配置好诊断设置后，你需要在你的托管实例上设置一个\
  \ SQL Server 审计。首先，你需要使用代码清单 14-1 中的脚本来设置审计。\n\n**代码清单 14-1.** 设置审计\n```\nUSE [master];\n\
  CREATE SERVER AUDIT [miaudit] TO EXTERNAL_MONITOR;\nALTER SERVER AUDIT [miaudit]\
  \ WITH (STATE = ON);\n```\n\n然后，你需要使用代码清单 14-2 中的脚本创建一个与你的审计关联的服务器审计规范。\n\n**代码清单\
  \ 14-2.** 设置服务器审计规范\n```\nUSE [master];\nCREATE SERVER AUDIT SPECIFICATION [miserveraudit]\n\
  FOR SERVER AUDIT [miaudit]\nADD (DATABASE_OBJECT_ACCESS_GROUP),\nADD (SCHEMA_OBJECT_ACCESS_GROUP),\n\
  ADD (AUDIT_CHANGE_GROUP),\nADD (SERVER_OPERATION_GROUP)\nWITH (STATE = ON);\n```\n\
  \n**注意** 这些审计操作组可能会产生大量审计数据：`DATABASE_OBJECT_ACCESS_GROUP`、`SCHEMA_OBJECT_ACCESS_GROUP`、`SERVER_OPERATION_GROUP`。我使用它们作为示例，是为了确保你能看到一些审计数据产生。除非你正在仔细地过滤审计数据，否则我不建议使用它们。SQL\
  \ Server 审计和过滤将在第 4 章“通过 GUI 实现 SQL Server 审计”中介绍。\n\n##### 查询审计数据\n\n要访问审计数据，你需要转到在诊断设置中选择的\
  \ Log Analytics 工作区，然后点击 **工作区摘要**。此摘要如图 14-4 所示。\n\n**图 14-4.** Log Analytics 工作区摘要\n\
  \n**注意** 有关如何访问和使用 Log Analytics 工作区的更多信息，请回顾第 13 章“审计 Azure SQL 数据库”。\n\n你可以点击这些框中的任何一个以深入查看更多信息。这将带你到一个预先为你填好了\
  \ Kusto 查询的屏幕。它会为你提供每个类别的详细信息。要整体查询审计数据，我建议点击页面顶部的 **日志** 按钮，如图 14-5 所示。\n\n**图\
  \ 14-5.** Log Analytics `SQLSecurityInsights` 日志按钮\n\n点击 **日志** 后，你将看到一个包含建议查询的页面。你可以关闭它，因为那些查询都无助于你查询审计数据。使用代码清单\
  \ 14-3 中的 Kusto 查询来查看你的审计数据。\n\n**代码清单 14-3.** Log Analytics Kusto 查询\n```\nAzureDiagnostics\n\
  | where Category == 'SQLSecurityAuditEvents'\nand TimeGenerated > ago(1d)\n| project\n\
  \    event_time_t,\n    database_name_s,\n    statement_s,\n    server_principal_name_s,\n\
  \    succeeded_s,\n    client_ip_s,\n    application_name_s,\n    additional_information_s,\n\
  ```\n\n\n`data_sensitivity_information_s`\n\n`| order by event_time_t desc`\n\n\
  **提示** 有关 Kusto 的更多信息，请[访问 https://docs.microsoft.com/en-us/azure/data-explorer/kusto/query/](https://docs.microsoft.com/en-us/azure/data-explorer/kusto/query/)。\n\
  \nKusto 查询将返回如图 14-6 所示的结果。具体结果将取决于被审计系统上发生的情况。\n\n**图 14-6.** Log Analytics Kusto\
  \ 查询结果\n\n由于我让你按照清单 14-2 的方式配置审计，审计结果将会非常多。如果你只想查看架构和权限的更改，你需要按照清单 14-4 来设置服务器审计。更多细节将在第\
  \ 5 章“通过 SQL 脚本实现 SQL Server 审计”中介绍。\n\n**清单 14-4.** SQL Server 审计\n\n```\nUSE [master];\n\
  \nCREATE SERVER AUDIT SPECIFICATION [miserveraudit]\nFOR SERVER AUDIT [miaudit]\n\
  ADD (DATABASE_OBJECT_ACCESS_GROUP),\nADD (SCHEMA_OBJECT_ACCESS_GROUP),\nADD (DATABASE_ROLE_MEMBER_CHANGE_GROUP),\n\
  ADD (SERVER_ROLE_MEMBER_CHANGE_GROUP),\nADD (AUDIT_CHANGE_GROUP),\nADD (DBCC_GROUP),\n\
  ADD (DATABASE_PERMISSION_CHANGE_GROUP),\nADD (SCHEMA_OBJECT_PERMISSION_CHANGE_GROUP),\n\
  ADD (SERVER_OBJECT_PERMISSION_CHANGE_GROUP),\nADD (SERVER_PERMISSION_CHANGE_GROUP),\n\
  ADD (DATABASE_CHANGE_GROUP),\nADD (DATABASE_OBJECT_CHANGE_GROUP),\nADD (DATABASE_PRINCIPAL_CHANGE_GROUP),\n\
  ADD (SCHEMA_OBJECT_CHANGE_GROUP),\nADD (SERVER_OBJECT_CHANGE_GROUP),\nADD (SERVER_PRINCIPAL_CHANGE_GROUP),\n\
  ADD (SERVER_OPERATION_GROUP),\nADD (APPLICATION_ROLE_CHANGE_PASSWORD_GROUP),\nADD\
  \ (LOGIN_CHANGE_PASSWORD_GROUP),\nADD (SERVER_STATE_CHANGE_GROUP),\nADD (DATABASE_OWNERSHIP_CHANGE_GROUP),\n\
  ADD (SCHEMA_OBJECT_OWNERSHIP_CHANGE_GROUP),\nADD (SERVER_OBJECT_OWNERSHIP_CHANGE_GROUP),\n\
  ADD (USER_CHANGE_PASSWORD_GROUP)\nWITH (STATE = ON);\n```\n\n**使用 SQL Server 审计审计\
  \ Azure SQL 托管实例**\n\n在 Azure SQL 托管实例上使用 SQL Server 审计与在虚拟机上运行的 SQL Server 非常相似。主要区别在于存储位置。你需要使用一个存储账户来写入审计文件。除此之外，设置与\
  \ SQL Server 相同。请参阅本书前面章节中关于如何设置 SQL Server 审计的内容。\n\n**创建存储账户和容器**\n\n在 Azure 门户中，搜索存储账户。点击创建。此时，你需要选择：\n\
  \n• **订阅** – 选择一个订阅。\n• **资源组** – 你可能希望将其放在与托管实例相同的资源组中。\n• **存储账户名称** – 必须在 Azure\
  \ 中唯一。\n• **区域** – 我建议将此存储账户放在与数据库相同的区域。\n• **性能** – 标准性能即可。\n• **冗余** – 根据审计数据对你的重要性进行选择。\n\
  \n点击“查看 + 创建”。然后点击“创建”。图 14-7 显示了我所选设置的一个示例。\n\n![](img/index-254_1.png)\n\n**图\
  \ 14-7.** 创建存储账户\n\n![](img/index-255_1.jpg)\n\n**注意** 你需要为你的存储账户设置生命周期管理。这将确保你不会永远存储成吨的文件。要了解如何操作，请访问\
  \ [`docs.microsoft.com/en-us/azure/storage/blobs/lifecycle-management-policy-configure?tabs=azure-portal`](https://docs.microsoft.com/en-us/azure/storage/blobs/lifecycle-management-policy-configure?tabs=azure-portal)。\n\
  \n创建存储账户后，你需要创建一个容器来保存\n\n\n### 第 14 章：审核 Azure SQL 托管实例\n\n## 导航到存储帐户容器\n\n导航到你的审核文件。导航到你刚创建的存储帐户并点击\
  \ `容器`。\n\n然后点击 **+ 容器** 按钮。为容器命名，并将 **公共访问级别** 保留为 **专用（无匿名访问）**。点击 **创建**。如图 14-8\
  \ 所示。\n\n### 图 14-8. 容器创建\n\n点击 **创建** 后，你将看到你的容器被列出。点击该容器并选择 **属性**。复制 URL 以供后续步骤使用，如图\
  \ 14-9 所示。\n\n![图 14-9. 复制容器 URL](img/index-256_1.png)\n\n## 配置共享访问签名\n\n导航回到存储帐户并点击\
  \ **共享访问签名**。请务必根据图 14-10 中的屏幕截图为此密钥创建你的设置。如果你想将此存储帐户用于审核文件的时间超过默认的八小时，你需要将过期日期设置得更长一些。\n\
  \n![图 14-10. 创建共享访问签名](img/index-257_1.jpg)\n\n我为我的共享访问签名选择的设置是：\n\n*   **允许的服务**\
  \ – `Blob`。\n*   **允许的资源类型** – `服务`、`容器`、`对象`。\n*   **允许的权限** – `读取`、`写入`、`删除`、`列表`、`添加`、`创建`。\n\
  *   **Blob 版本控制权限** – 允许删除版本。\n*   **允许的 Blob 索引权限** – `读取/写入`、`筛选`。\n*   **开始和过期日期/时间**\
  \ – 如果过期，你的托管实例将无法再访问容器。你需要生成一个新的共享访问签名。然后使用新令牌更新你的托管实例凭据。我倾向于将过期时间设置为几年后，以避免无法访问存储帐户的问题。\n\
  *   **允许的协议** – `仅 HTTPS`。\n*   **首选路由层** – `基本（默认）`。\n*   **签名密钥** – `密钥 1`。\n\n\
  点击 **生成 SAS 和连接字符串**。SAS 令牌将加载在该页面上。请不要离开此页面。你将无法再次获取该 SAS 令牌。如果需要新令牌，你必须生成一个新的\
  \ SAS 配置。复制 SAS 令牌以供后续步骤使用，如图 14-11 所示。\n\n**注意：** 将其添加到 SQL Server 凭据时，你需要从令牌开头移除问号\
  \ (`?`)。\n\n### 图 14-11. 复制 SAS 令牌\n\n##### 创建数据库凭据\n\n在 `SSMS` 中连接到你的托管实例。你需要创建一个凭据，以便你的托管实例可以访问你的存储帐户，如清单\
  \ 14-5 所示。\n\n### 清单 14-5. 在 SSMS 中创建凭据\n\n```sql\nCREATE CREDENTIAL [来自图 14-9 的\
  \ URL]\nWITH IDENTITY='SHARED ACCESS SIGNATURE',\nSECRET = '来自图 14-11 的令牌';\n```\n\
  \n## 创建 SQL Server 审核\n\n你可以使用清单 14-6 中的脚本创建你的 SQL Server 审核。\n\n### 清单 14-6. 在\
  \ SSMS 中创建审核\n\n```sql\nCREATE SERVER AUDIT miauditstorage\nTO URL\n(\n    PATH\
  \ = '来自图 14-9 的 URL',\n    RETENTION_DAYS = 30\n);\n\nALTER SERVER AUDIT [miauditstorage]\
  \ WITH (STATE = ON);\n```\n\n`RETENTION_DAYS = 30` 意味着存储帐户将仅存储 30 天的审核文件，之后它们将被删除。`0`\
  \ 表示永久。我喜欢 30 天，因为这给了我足够的时间在审核数据消失前进行分析。\n\n在你设置服务器或数据库审核之前，不会收集任何审核数据。你可以使用清单 14-7\
  \ 中的脚本设置服务器审核。\n\n### 清单 14-7. 在 SSMS 中创建服务器审核\n\n```sql\nUSE [master];\nCREATE\
  \ SERVER AUDIT SPECIFICATION [miserverauditstorage]\nFOR SERVER AUDIT [miauditstorage]\n\
  ADD (DATABASE_OBJECT_ACCESS_GROUP),\nADD (SCHEMA_OBJECT_ACCESS_GROUP),\nADD (AUDIT_CHANGE_GROUP),\n\
  ADD (SERVER_OPERATION_GROUP)\nWITH (STATE = ON);\n```\n\n## 查询 SQL Server 审核文件\n\
  \n这开始将 `.xel` 文件写入你的 Azure 存储帐户，如图 14-12 所示。\n\n"
- "# 第 14 章：审计 Azure SQL 托管实例\n\n![](img/index-260_1.jpg)\n\n![](img/index-260_2.png)\n\
  \n**图 14-12.** Azure 存储账户中的 SQL 审计文件\n\n您会看到它们被保存为 `.xel` 文件，而在虚拟机上的 SQL Server\
  \ 中，它们会保存为 `.sqlaudit` 文件。另外，请注意文件按服务器、数据库、容器和日期组织成了文件夹结构。查询多个文件很困难，因为您必须循环遍历它们。\n\
  \n与虚拟机上的 SQL Server 一样，您可以右键单击审计项以查看审计日志，如图 14-13 所示。\n\n**图 14-13.** 查看审计日志\n\n\
  有一种方法可以通过单击 `文件` ➤ `打开` ➤ `合并审计文件` 来合并审计文件，如图 14-14 所示。\n\n![](img/index-261_1.jpg)\n\
  \n![](img/index-261_2.png)\n\n**图 14-14.** “合并审计文件”菜单项\n\n`合并审计文件` 将打开一个对话框。单击 `添加`。这将打开另一个对话框，您可以在其中添加您的审计文件，如图\
  \ 14-15 所示。\n\n**图 14-15.** 合并审计文件\n\n您只能合并一个数据库的审计文件。如果您正在审计多个数据库，这可能不是很有用。这就是为什么我喜欢诊断设置，它允许您将审计数据存储在\
  \ Log Analytics 工作区中。这样便于跨多个数据库或服务器进行轻松查询。\n\n#### 使用扩展事件审计 Azure SQL 托管实例\n\nAzure\
  \ SQL 托管实例上的扩展事件与虚拟机上的 SQL Server 非常相似。主要区别在于存储位置。您需要使用存储帐户来写入审计文件。除此之外，设置与 SQL\
  \ Server 相同。有关如何设置扩展事件，请参阅本书前面的章节。\n\n您需要创建一个存储帐户和容器来保存您的审计文件。可以使用上一节中的存储帐户、容器、容器\
  \ URL、SAS 令牌和凭据。此设置将与上一节中 SQL Server 审计的设置相同。\n\n在创建扩展事件时，您需要在文件名中指定 URL，如代码清单 14-8\
  \ 所示。\n\n**代码清单 14-8.** 在 SSMS 中创建服务器审计\n\n```sql\nCREATE EVENT SESSION [auditxel]\
  \ ON SERVER\nADD EVENT sqlserver.rpc_completed(\n    ACTION(sqlserver.client_app_name,\
  \ sqlserver.client_hostname, sqlserver.database_name, sqlserver.sql_text, sqlserver.username)\n\
  \    WHERE ([sqlserver].[username]=N'josephine')),\nADD EVENT sqlserver.sql_batch_completed(\n\
  \    ACTION(sqlserver.client_app_name, sqlserver.client_hostname, sqlserver.database_name,\
  \ sqlserver.sql_text, sqlserver.username)\n    WHERE ([sqlserver].[username]=N'josephine'))\n\
  ADD TARGET package0.event_file(SET filename=N'https://azuremiauditing.blob.core.windows.net/miauditfiles/xelauditdata.xel',\
  \ max_file_size=(10), max_rollover_files=(5))\nWITH (MAX_MEMORY=4096 KB, EVENT_RETENTION_MODE=ALLOW_SINGLE_EVENT_LOSS,\
  \ MAX_DISPATCH_LATENCY=30 SECONDS, MAX_EVENT_SIZE=0 KB, MEMORY_PARTITION_MODE=NONE,\
  \ TRACK_CAUSALITY=OFF, STARTUP_STATE=ON);\n\nALTER EVENT SESSION [auditxel] ON SERVER\
  \ STATE=START;\n```\n\n![](img/index-263_1.jpg)\n\n![](img/index-263_2.png)\n\n\
  请务必将 `filename` 更新为您的存储帐户和容器的路径。这应该是您为其设置了凭据的那个。有关更多详情，请参阅本章中的 SQL Server 审计部分。\n\
  \n一旦扩展事件启动，它将把一个文件放入 Azure 存储帐户，如图 14-16 所示。将放置五个每个最大 10 MB 的文件，因为这是代码清单 14-8 脚本中指定的。\n\
  \n**图 14-16.** Azure 存储账户中的 `.xel` 文件\n\n要查询 `.xel` 文件，您需要知道确切的文件名。您可以使用 SSMS 中的\
  \ Azure 存储连接来查明名称，如图 14-17 所示。\n\n**图 14-17.** Azure 存储连接\n\n![](img/index-264_1.jpg)\n\
  \n\n"
- "# 第 14 章 审核 Azure SQL 托管实例\n\n![](img/index-264_2.png)\n\n登录 Azure，并从下拉菜单中选择正确的存储帐户和容器，如图\
  \ 14-18 所示。\n\n**图 14-18.** 登录 Azure 并选择存储帐户和容器\n\n点击\"确定\"。这会将你连接到该存储帐户，并列出容器中的文件，如图\
  \ 14-19 所示。\n\n**图 14-19.** 容器文件列表\n\n![](img/index-265_1.png)\n\n一旦知道文件名，你就可以使用列表\
  \ 14-9 中的脚本进行查询。\n\n**列表 14-9.** 查询 .xel 文件\n\n```sql\nSELECT n.value('(@timestamp)[1]',\
  \ 'datetime') as timestamp,\n    n.value('(action[@name=\"sql_text\"]/value)[1]',\
  \ 'nvarchar(max)') as [sql],\n    n.value('(action[@name=\"client_hostname\"]/value)[1]',\
  \ 'nvarchar(50)') as [client_hostname],\n    n.value('(action[@name=\"username\"\
  ]/value)[1]', 'nvarchar(50)') as [user],\n    n.value('(action[@name=\"database_name\"\
  ]/value)[1]', 'nvarchar(50)') as [database_name],\n    n.value('(action[@name=\"\
  client_app_name\"]/value)[1]', 'nvarchar(50)') as [client_app_name]\nFROM (SELECT\
  \ CAST(event_data as XML) as event_data\n      FROM sys.fn_xe_file_target_read_file(N'https://azuremiauditing.blob.core.windows.net/miauditfiles/xelauditdata_0_132972103478750000.xel',\
  \ NULL, NULL, NULL)) ed\nCROSS APPLY ed.event_data.nodes('event') as q(n)\nWHERE\
  \ n.value('(@timestamp)[1]', 'datetime')\n    >= DATEADD(HOUR, -4, GETDATE())\n\
  ORDER BY timestamp DESC;\n```\n\n列表 14-9 中的查询将返回类似图 14-20 的结果。\n\n**图 14-20.** .xel\
  \ 文件查询结果\n\n![](img/index-266_1.jpg)\n\n查询 `.xel` 文件很困难，因为你需要知道确切的文件名。你无法轻松地同时查询多个\
  \ `.xel` 文件。这就是为什么我喜欢诊断设置，它允许你将审计数据存储在 `Log Analytics 工作区`中。这样可以轻松地跨多个数据库或服务器进行查询。\n\
  \n## 集中和报告 Azure SQL 托管实例的审计数据\n\n集中存储就像将所有审计数据放入同一个 `Log Analytics 工作区`一样简单。这便于对审计数据进行查询和报告。\n\
  \n为了报告数据，我使用了一个 `逻辑应用`。这样，我就可以通过电子邮件附件发送审计捕获到的任何变更。图 14-21 向你展示了 `逻辑应用`的高级设置。\n\n\
  **图 14-21.** 用于报告审计数据的逻辑应用\n\n![](img/index-267_1.png)\n\n**提示** 要了解如何创建逻辑应用，请[访问\
  \ https://docs.microsoft.com/en-us/azure/logic-apps/quickstart-create-first-logic-app-workflow](https://docs.microsoft.com/en-us/azure/logic-apps/quickstart-create-first-logic-app-workflow)。\n\
  \n该逻辑应用包含四个步骤。让我们逐一介绍它们。`定期执行`步骤决定了此应用运行的频率，如图 14-22 所示。此逻辑应用将在 UTC 时间每天 10 点运行一次。因此，如果你想让它在其他时区的\
  \ 10 点运行，请务必考虑时区因素。\n\n**图 14-22.** 定期执行步骤\n\n`运行查询并列出结果`步骤运行我在列表 14-3 中提到的 Kusto\
  \ 查询。此步骤如图 14-23 所示。\n\n![](img/index-268_1.jpg)\n\n**图 14-23.** 运行查询并列出结果步骤\n\n\
  `创建 CSV 表`步骤将查询结果创建为 CSV 文件，如图 14-24 所示。CSV 的内容来自上一步。我创建 CSV 文件是因为 Kusto 查询结果不容易直接格式化到电子邮件正文中。\n\
  \n\n\n![](img/index-269_1.jpg)\n\n![](img/index-269_2.png)\n\n"
