  \ `server_principal_name` 上设置筛选器。更多信息，请查阅[第 7 章](https://doi.org/10.1007/978-1-4842-8634-0_7)“通过图形界面实施扩展事件”和[第\
  \ 8 章](https://doi.org/10.1007/978-1-4842-8634-0_8)“通过 SQL 脚本实施扩展事件”。\n*   **每个执行存储过程的人**\n\
  \n#### SQL Server 审计\n这将需要一个审计和一个数据库审计规范，用于捕获对您存储过程的 `execute` 操作。更多信息，请查阅[第 4 章](https://doi.org/10.1007/978-1-4842-8634-0_4)“通过图形界面实施\
  \ SQL Server 审计”和[第 5 章](https://doi.org/10.1007/978-1-4842-8634-0_5)“通过 SQL 脚本实施\
  \ SQL Server 审计”。\n\n#### 扩展事件\n捕获 `rpc_completed`，并在 `object_name` 上设置筛选器。更多信息，请查阅[第\
  \ 7 章](https://doi.org/10.1007/978-1-4842-8634-0_7)“通过图形界面实施扩展事件”和[第 8 章](https://doi.org/10.1007/978-1-4842-8634-0_8)“通过\
  \ SQL 脚本实施扩展事件”。\n\n## 附录 A：数据库审计选项对比\n\n*   **配置更改**\n\n#### SQL Server 审计\n这将需要一个审计和一个数据库审计规范，用于捕获对\
  \ `sp_configure` 的 `execute` 操作。更多信息，请查阅[第 9 章](https://doi.org/10.1007/978-1-4842-8634-0_9)“跟踪\
  \ SQL Server 配置更改”。\n\n*   **DML 更改**\n\n#### SQL Server 审计\n如果您不需要跟踪实际的数据更改本身，而是\
  \ DML 语句本身。这将需要一个审计和一个数据库审计规范，用于在您想要审计的每个表上捕获 `INSERT`、`UPDATE` 和/或 `DELETE` 操作。更多信息，请查阅[第\
  \ 4 章](https://doi.org/10.1007/978-1-4842-8634-0_4)“通过图形界面实施 SQL Server 审计”和[第 5\
  \ 章](https://doi.org/10.1007/978-1-4842-8634-0_5)“通过 SQL 脚本实施 SQL Server 审计”。\n\n\
  ### 更改跟踪\n如果应用程序需要跟踪数据是否更改，而不是数据的确切值。更多信息，请查阅[第 10 章](https://doi.org/10.1007/978-1-4842-8634-0_10)“其他\
  \ SQL Server 审计和跟踪方法”。\n\n#### 变更数据捕获\n如果您需要跟踪数据更改前后的确切值。更多信息，请查阅[第 10 章](https://doi.org/10.1007/978-1-4842-8634-0_10)“其他\
  \ SQL Server 审计和跟踪方法”。\n\n*   **成功和失败的登录**\n\n#### SQL Server 审计\n您将需要一个审计来存储审计数据，以及一个服务器审计规范来收集登录信息。更多信息，请查阅[第\
  \ 10 章](https://doi.org/10.1007/978-1-4842-8634-0_10)“其他 SQL Server 审计和跟踪方法”。\n\n\
  #### 扩展事件\n您将需要创建一个使用 `login` 事件和 `error_reported` 事件的会话。更多信息，请查阅[第 10 章](https://doi.org/10.1007/978-1-4842-8634-0_10)“其他\
  \ SQL Server 审计和跟踪方法”。\n\n## 附录 A：数据库审计选项对比\n\n*   **审计 Azure SQL 数据库**\n\n### 通过\
  \ Azure 门户审计 Azure SQL 数据库\n这与 SQL Server 审计类似。它使得在 Log Analytics 工作区中集中审计数据变得容易。更多信息，请查阅[第\
