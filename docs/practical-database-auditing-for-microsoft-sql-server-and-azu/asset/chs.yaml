  \ **审计 Azure SQL 托管实例**\n\n\n\n"
- '# 附录 A 数据库审核选项比较


  ## 审核 AWS RDS


  *   **SQL Server 审核** – 类似于 SQL Server 审核，但审核文件需要存储在 AWS 指定的文件夹中。更多信息，请参阅第 15 章“其他云提供商审核选项”。

  *   **扩展事件** – 类似于 SQL Server 扩展事件，但 `.xel` 文件需要存储在 AWS 指定的文件夹中。更多信息，请参阅第 15 章“其他云提供商审核选项”。


  ## Google Cloud


  *   仅在运行 SQL Server 审核或扩展事件的虚拟机上可用


  ## 审核


  *   **诊断设置** – 通过 Azure 门户配置。便于将审核数据集中到 Log Analytics 工作区中。更多信息，请参阅第 14 章“审核 Azure
  SQL 托管实例”。

  *   **SQL Server 审核** – 类似于 SQL Server 审核，但审核文件需要存储在 Azure 存储帐户中。唯一的问题是难以循环遍历多个审核文件来一次性查询所有数据。更多信息，请参阅第
  14 章“审核 Azure SQL 托管实例”。

  *   **扩展事件** – 类似于 SQL Server 扩展事件，但 `.xel` 文件需要存储在 Azure 存储帐户中。唯一的问题是难以循环遍历多个 `.xel`
  文件来一次性查询所有 XEvent 数据。更多信息，请参阅第 14 章“审核 Azure SQL 托管实例”。


