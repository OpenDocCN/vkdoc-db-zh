  *   **一个数据库中发生的所有事情**\n    *   **SQL Server 审计** – 这将需要一个带有筛选器的审计，以仅捕获该数据库的活动，以及一个服务器审计规范。\n\
  \n\n\n## 附录 A：数据库审计选项对比\n\n规范。更多信息，请查阅[第 4 章](https://doi.org/10.1007/978-1-4842-8634-0_4)“通过图形界面实施\
  \ SQL Server 审计”和[第 5 章](https://doi.org/10.1007/978-1-4842-8634-0_5)“通过 SQL 脚本实施\
