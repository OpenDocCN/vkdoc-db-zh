  ## 关于作者


  **Josephine Bush** 拥有超过十年的数据库管理员经验。她的经验广泛而深厚，包括使用 `SQL Server`、`MySQL`、`Oracle`
  和 `PostgreSQL` 的金融和能源数据系统经验。她是 `Microsoft Certified Solutions Expert: Data Management
  and Analytics`（微软认证解决方案专家：数据分析与管理）。她持有信息技术学士学位、IT 管理硕士学位和数据分析硕士学位。她是 *Learn SQL
  Database Programming* 一书的作者。您可以通过 Twitter `@hellosqlkitty` 联系她。


  ## 关于技术审校


  **Kathi Kellenberger** 是 Redgate 的客户成功工程师和数据平台 MVP。她自 1998 年起就使用 `SQL Server`，并撰写、合著或技术审阅了超过
  20 本技术书籍。Kathi 是圣路易斯 LaunchCode 组织的志愿者，在该组织的 Women+ 项目中教授 `T-SQL`。当 Kathi 不工作时，她喜欢与家人和朋友共度时光、骑自行车、唱歌和攀爬高楼大厦的楼梯。


  ## 致谢


  感谢我的技术审校 Kathi，她细致的审阅和深思熟虑的建议提升了本书的质量。


  感谢 Apress 团队，特别是 Jonathan Gennick 和 Jill Balzano，他们在本书出版过程中发挥了关键作用。


  亲爱的读者，感谢您阅读本书。我的希望是您能像我一样爱上审核，但退一步说，我希望我提供的指导能让您的生活稍微轻松一些。


  ## 引言


  人们通常认为审核既可怕又无聊。可怕是因为审计员会看到您做错了事，您会惹上麻烦。无聊是因为您想象的是文员在成堆的文件中寻找一些小错误。


  我曾在一个有严格审核要求的金融公司工作。我尝试使用 `SQL Server 审核`和扩展事件（`XEvents`）来实现 `PCI` 合规性。当持怀疑态度的 `PCI`
  审计员审查了我的实现方案并说




  **出色地**通过了。这加深了我对审计日益增长的热爱。


  #### 本书内容


  本书通过具体示例向你展示审计如何让你的工作生活更轻松。


  设置审计后，你并非**一无所知**。我在当前工作中设置审计，是因为我厌倦了人们将问题归咎于数据库变更。由于我没有进行审计，我完全不知道是否有任何变更发生。现在，我可以明确说出具体发生了什么变更，并与用户协作，判断此变更是否破坏了某些东西。


  本书首先从高层次概述了为何需要审计以及存在哪些审计类型。接着详细介绍了 SQL Server、Azure SQL 和 AWS RDS SQL Server 中可用的审计类型。你将学习如何使用
  SQL Server 审计和扩展事件来跟踪架构、安全性和配置的变更。并非所有变更都能通过这些功能捕获，因此本书还涵盖了其他功能，如变更数据捕获（CDC）、时态表和通用标准合规性。


  接下来，本书介绍了 Azure SQL 数据库和 Azure SQL 托管实例中的审计方法。与 SQL Server 相比，审计这些服务的方式有所不同。此外，你还将学习如何在
  AWS RDS SQL Server 中使用 SQL Server 审计和扩展事件。


  阅读本书后，你将掌握许多用例和脚本，助你实施自己的审计策略。


  xvii


  ## 引言


  #### 目标读者


  本书面向需要了解其数据库服务器上正在发生何种变更，以及正在执行这些变更的**数据库管理员**；面向精通数据库、负责流程和应用程序故障排除的 **DevOps 工程师和开发人员**；以及面向负责生成报告以支持法规合规性报告和审计的**开发人员和管理员**。


