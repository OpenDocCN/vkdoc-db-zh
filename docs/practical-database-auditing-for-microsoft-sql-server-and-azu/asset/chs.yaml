  ## SQL Server Audit 要求


  要使`SQL Server`审计工作，根据你想要审计的内容，你需要两到三样东西。你必须创建一个`audit`（审计）。这将决定审计数据的存储位置。你还需要一个`server`（服务器）和/或一个`database
  audit specification`（数据库审计规范），用于定义你想要捕获的内容。每个`audit`可以有一个`server specification`（服务器规范）和/或每个数据库一个`database
  specification`（数据库规范）。这些服务器审计和数据库审计彼此独立。


