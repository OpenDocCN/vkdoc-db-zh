  图 9-5 显示了代码清单 9-1 的查询结果。我做了一个额外的配置变更。这样，你可以看到配置变更会以 "Configuration option" 开头出现在
  `Text` 字段中。


  `图 9-5.` SQL Server 日志查询结果*


  此查询一次只会获取一个日志文件。虽然有办法循环遍历它们，但更好的捕获方式是使用 SQL Server 审核。


  ## 使用 SQL Server 审核捕获配置变更


  要了解如何设置 SQL Server 审核，请阅读[第 4 章](https://doi.org/10.1007/978-1-4842-8634-0_4)，“通过
  GUI 实现 SQL Server 审核”。这将展示如何创建一个审核，本节中的数据库审核将使用该审核。


  要审核配置变更，你需要审核存储过程 `sp_configure`。该存储过程位于 `master` 数据库中。当你使用 `SSMS GUI` 进行更改时，就会调用此存储过程。你也可以自己从查询窗口调用它。


  要审核 `sp_configure`，你需要在 `master` 数据库上设置一个数据库审核。为此，右键单击 `master` 数据库中 `Security`（安全性）下的
  `Database Audit Specifications`（数据库审核规范），如图 9-6 所示。


  ![](img/index-164_1.png)


  ![](img/index-164_2.jpg)


  第 9 章 跟踪 SQL Server 配置变更


  `图 9-6.` `master` 数据库中的数据库审核规范菜单


  这将打开一个对话框，你需要按照图 9-7 所示填写选项。


  `图 9-7.` 在 `master` 数据库中设置数据库审核规范


  第 9 章 跟踪 SQL Server 配置变更


  `注意` 我将这个数据库审核规范与同时包含我的服务器审核规范的审核关联了起来。该服务器审核规范捕获 SQL Server 上的权限和对象变更。这在[第 4 章](https://doi.org/10.1007/978-1-4842-8634-0_4)，“通过
  GUI 实现 SQL Server 审核”中有介绍。通过将 `sp_configure` 数据库审核与包含我服务器审核的审核关联起来，我可以确保在一个审核中捕获所有的服务器变更。


  要在 `master` 中配置数据库审核规范，你需要以下几部分：


  - `名称 –` `DatabaseAuditSpecification_spconfigure`。我喜欢根据审核的具体内容来命名。

  - `审核 –` 你需要将其与你的审核关联。有一个下拉菜单列出了你的审核。你需要这种关联，因为这是你的审核数据存放的地方。此审核设置在[第 4 章](https://doi.org/10.1007/978-1-4842-8634-0_4)，“通过
  GUI 实现 SQL Server 审核”中有介绍。

  - `审核操作类型 –` [第 3 章](https://doi.org/10.1007/978-1-4842-8634-0_3)，“什么是 SQL Server
  审核？”有一节关于数据库审核操作组，帮助你确定每个操作审核的内容。在本例中，我们只使用 `EXECUTE`（执行）。这审核谁执行了存储过程，或在特定架构或数据库上执行了操作。

  - `对象类 –` 这里你将选择 `OBJECT`（对象）。[第 4 章](https://doi.org/10.1007/978-1-4842-8634-0_4)，“通过
  GUI 实现 SQL Server 审核”中更详细地介绍了其他选项。选择 `OBJECT` 可查看使用特定表、视图、存储过程或函数的查询。

  - `对象架构 –` 对于 `OBJECT` 类是必需的，在本例中是 `sys`。

  - `对象名称 –` 对于 `OBJECT`、`SCHEMA`（架构）和 `DATABASE`（数据库）类是必需的。在本例中是 `sp_configure`。

  - `主体名称 –` 对于 `OBJECT`、`SCHEMA` 和 `DATABASE` 类是必需的。如果你想审核所有人，请使用 `public`。如果你想审核多个用户，则需要为每个用户设置一行。我在这里使用
  `public`，因为我想捕获任何人进行配置变更的任何时候。


  第 9 章 跟踪 SQL Server 配置变更


  `注意` 所有审核在创建时都是禁用的。请确保启用它，以便收集审核数据。


  你也可以通过脚本设置数据库审核规范，如



  '
- "# 第 9 章 追踪 SQL Server 配置变更\n\n## 清单 9-2. 使用 SQL 脚本创建数据库审计规范\n\n```sql\nUSE [master];\n\
  \nCREATE DATABASE AUDIT SPECIFICATION [DatabaseAuditSpecification_spconfigure]\n\
  FOR SERVER AUDIT [AuditSpecification]\nADD (EXECUTE ON OBJECT::[sys].[sp_configure]\
  \ BY [public])\nWITH (STATE = ON);\n```\n\n虽然可以通过图形用户界面查询审计（这在第 4 章“通过图形用户界面实现 SQL\
  \ Server 审计”中已涵盖），但让我们使用 SQL 脚本来查询审计数据（这在第 5 章“通过 SQL 脚本实现 SQL Server 审计”中已涵盖）。首先进行配置更改，然后执行清单\
  \ 9-3 中的脚本。\n\n## 清单 9-3. 使用 SQL 脚本查询审计\n\n```sql\nUSE master;\nSELECT DISTINCT\n\
  \    event_time,\n    aa.name as audit_action,\n    statement,\n    succeeded,\n\
  \    database_name,\n    server_instance_name,\n    schema_name,\n    session_server_principal_name,\n\
  \    server_principal_name,\n    object_Name,\n    file_name,\n    client_ip,\n\
  \    application_name,\n    host_name,\n    file_name\nFROM sys.fn_get_audit_file\
  \ ('E:\\audits\\*.sqlaudit',default,default) af\nINNER JOIN sys.dm_audit_actions\
  \ aa\n    ON aa.action_id = af.action_id\nWHERE event_time > DATEADD(HOUR, -4, GETDATE())\n\
  ORDER BY event_time DESC;\n```\n\n![图 9-8](img/index-167_1.jpg)\n\n**图 9-8.** 在\
  \ master 数据库中设置数据库审计规范\n\n图 9-8 展示了清单 9-3 的查询结果。请确保你在创建审计规范**之后**进行配置更改。数据库审计规范不会拾取在它创建之前的更改。即使你通过\
  \ SSMS 图形用户界面进行更改，它仍然会在后台使用 `sp_configure`，因此该操作会以这种方式显示在审计中。\n\n下一章，你将了解额外的 SQL\
  \ Server 审计选项，如通用准则合规性、C2 审计跟踪、变更数据捕获、成功/失败登录以及 DDL 触发器。\n\n"
- "# 第 10 章 其他 SQL Server 审计与跟踪方法\n\n在本章中，你将了解额外的 SQL Server 审计选项。我很少（如果有的话）使用其中大部分。它们可能导致性能问题，或产生过多数据而无法梳理。我希望向你展示这些选项，以帮助你就在是否使用它们上做出明智决定。根据你的用例，谨慎使用时，它们可能被证明是有价值的。\n\
  \n#### 通用准则合规性\n\n如果你没有审计员要求你开启此功能，请保持关闭。它可能对服务器性能产生很大影响。即使审计员认为你需要它，也要与他们沟通，解释开启它的影响。\n\
  \n我在此仅简要提及 C2 审计模式，因为 C2 将在未来版本的 SQL Server 中被移除。微软建议使用通用准则合规性。\n\n通用准则合规性由欧盟开发。它是一套国际认可的安全指南。SQL\
  \ Server 的此功能仅在 Enterprise 和 Datacenter 版本中可用。\n\n![图 10-1](img/index-169_1.png)\n\
  \n**图 10-1.** 打开服务器属性\n\n启用通用准则合规性后：\n*   内存分配在重新分配给新资源前，会被已知的比特模式覆盖。这可能导致性能缓慢。\n\
  *   登录审计被启用。可以通过查询 `sys.dm_exec_sessions` 视图查看登录统计信息。\n*   表级别的 `DENY` 优先于列级别的 `GRANT`。\n\
  \n要启用通用准则合规性，请右键单击服务器连接并选择“属性”，如图 10-1 所示。\n\n### 第 10 章：其他 SQL Server 审计与跟踪方法\n\
  \n## 更改跟踪\n\n一旦属性对话框打开，点击“安全”页面。然后勾选“启用公共标准合规性”复选框，如图 10-2 所示。\n\n![图 10-2](img/index-170_1.png)\n\
  \n***图 10-2.** 勾选“启用公共标准合规性”复选框*\n\n当你在对话框上点击“确定”时，会收到一个弹出消息，警告你需要重启 SQL Server，如图\
  \ 10-3 所示。\n\n![图 10-3](img/index-171_1.jpg)\n\n***图 10-3.** 弹出警告：某些配置更改直到 SQL Server\
  \ 重启后才会生效*\n\n重启 SQL Server 服务后，公共标准合规性功能即被启用。\n\n**变更跟踪**\n\n变更跟踪是一种跟踪 DML 变更的轻量级方法。通常由应用程序用来查询数据库变更。变更跟踪已经过优化以最小化性能影响，但仍有开销，因此在实施时需谨慎，特别是在变更频繁的表上。此外，当变更跟踪清理发生时，可能会导致锁定和阻塞。换句话说，在启用前请仔细考虑。\n\
  \n在使用变更跟踪之前，你需要在数据库级别启用它，如图 10-4 所示。你可以通过右键单击数据库并选择“属性”来访问此对话框。“保留期”、“保留期单位”和“自动清理”选项保留默认值即可。\n\
  \n![图 10-4](img/index-172_1.jpg)\n\n***图 10-4.** 在数据库级别启用变更跟踪*\n\n你也可以通过 SQL 脚本启用变更跟踪，如清单\
  \ 10-1 所示。\n\n***清单 10-1.*** 在数据库级别启用变更跟踪\n\n```sql\nUSE [master];\nALTER DATABASE\
  \ [YourDBName] SET CHANGE_TRACKING = ON\n(CHANGE_RETENTION = 2 DAYS, AUTO_CLEANUP\
  \ = ON);\n```\n\n![图示](img/index-173_1.png)\n\n**注意**：Microsoft 建议任何启用了变更跟踪的数据库都应处于快照隔离级别。这确保了变更跟踪的一致性。更改隔离级别时需谨慎，因为它可能产生意想不到的后果。\n\
  \n在数据库级别启用变更跟踪后，你必须为要跟踪的每个表启用它。图 10-5 展示了如何启用。你可以通过右键单击表并选择“属性”来访问此对话框。\n\n***图\
  \ 10-5.** 在表级别启用变更跟踪*\n\n![图 10-5](img/index-174_1.png)\n\n**注意**：任何你想使用变更跟踪的表都需要有一个主键。\n\
  \n你也可以通过 SQL 脚本启用变更跟踪，如清单 10-2 所示，确保将数据库和表名更改为你要使用的名称。\n\n***清单 10-2.*** 通过脚本在表级别启用变更跟踪\n\
  \n```sql\nUSE [YourDBName];\nALTER TABLE [dbo].[YourTableName] ENABLE CHANGE_TRACKING\n\
  WITH (TRACK_COLUMNS_UPDATED = OFF);\n```\n\n**注意**：`TRACK_COLUMNS_UPDATED` 会使用额外的存储空间。因此，默认情况下它是禁用的。\n\
  \n要查看变更跟踪数据，请执行清单 10-3 中的查询。\n\n***清单 10-3.*** 查询变更跟踪数据\n\n```sql\nUSE YourDBName;\n\
  SELECT CT.SYS_CHANGE_VERSION,\nCT.SYS_CHANGE_OPERATION, EM.*\nFROM CHANGETABLE\n\
  (CHANGES [AuditData],0) as CT\nLEFT JOIN [dbo].[AuditData] EM\nON CT.ID = EM.ID\n\
  ORDER BY SYS_CHANGE_VERSION;\n```\n\n清单 10-3 返回启用了变更跟踪的表的更改结果。这些结果显示在图 10-6 中。你的结果会有所不同。\n\
  \n***图 10-6.** 变更跟踪查询结果*\n\n\n图 10-6 显示插入了一行，由`SYS_CHANGE_OPERATION = I`标明。\n\n\
  它也显示删除了一行，由`SYS_CHANGE_OPERATION = D`标明。\n\n**提示** 关于变更跟踪的更多信息，请访问[`docs.microsoft.com/en-us/sql/relational-databases/track-changes/work-with-change-tracking-sql-server?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/relational-databases/track-changes/work-with-change-tracking-sql-server?view=sql-server-ver15)。\n\
  \n变更跟踪无法让你查看数据被更改的次数或每次更改的值。如果你需要确切知道做了哪些更改以及更改发生的频率，那么你需要使用变更数据捕获。\n\n**提示** 关于变更跟踪和变更数据捕获的比较，请访问[`docs.microsoft.com/en-us/sql/relational-databases/track-changes/track-data-changes-sql-server?view=sql-server-ver15#feature-differences-between-change-data-capture-and-change-tracking`](https://docs.microsoft.com/en-us/sql/relational-databases/track-changes/track-data-changes-sql-server?view=sql-server-ver15#feature-differences-between-change-data-capture-and-change-tracking)。\n\
  \n**变更数据捕获**\n\n变更数据捕获（CDC）使用 SQL Server 代理来跟踪对表进行的 DML 更改。这使你可以查看对数据所做的更改，其细节以一种易于使用的格式呈现。这对于提取、转换和加载（ETL）应用程序或过程特别有用。\n\
  \nCDC 已经过优化以最小化性能影响，但仍存在开销，因此在实施时需谨慎，尤其是在更改频繁的表上。换句话说，在启用前要仔细考虑。它还会占用数据库中的存储空间，因此你需要仔细跟踪存储使用情况。\n\
  \n要确定数据库上是否启用了 CDC，请执行清单 10-4 中的查询。\n\n***清单 10-4.*** 确定 CDC 是否已启用\n\n```sql\nSELECT\
  \ name, is_cdc_enabled\nFROM sys.databases;\n```\n\n如果已启用，你会看到`is_cdc_enabled =\
  \ 1`；否则为 0。\n\n**注意** CDC 需要独占使用`cdc`架构和用户，因为它们是 CDC 进程的一部分。CDC 还需要使用 SQL 代理，请确保该服务正在运行，并且代理已启用并启动。\n\
  \n要启用 CDC，请执行清单 10-5 中的查询，确保使用你希望在其上启用 CDC 的数据库名称。\n\n***清单 10-5.*** 在数据库级别启用 CDC\n\
  \n```sql\nUSE YourDBName;\nEXEC sys.sp_cdc_enable_db;\n```\n\n在数据库上启用 CDC 后，你可以使用清单\
  \ 10-6 中的查询在表上启用它。\n\n***清单 10-6.*** 在表级别启用 CDC\n\n```sql\nUSE [YourDBName];\nEXEC\
  \ sys.sp_cdc_enable_table\n    @source_schema = N'dbo',\n    @source_name = N'YourTableName',\n\
  \    @role_name = NULL,\n    @filegroup_name = NULL,\n    @supports_net_changes\
  \ = 0;\n```\n\n要确定表上是否启用了 CDC，请执行清单 10-7 中的查询。\n\n***清单 10-7.*** 确定哪些表上启用了 CDC\n\
  \n\n\n使用 `YourDBName`;\n\n```sql\nSELECT name, is_tracked_by_cdc\nFROM sys.tables\n\
  WHERE is_tracked_by_cdc = 1;\n```\n\n如果已启用，你将看到 `is_cdc_enabled = 1`；如果未启用，则显示为\
  \ `0`。\n\n## 第 10 章 补充的 SQL Server 审计与跟踪方法\n\n**提示** 要理解清单 10-6 中的选项，[请访问 Microsoft\
  \ 关于为表启用 CDC 的文档](https://docs.microsoft.com/en-us/sql/relational-databases/track-changes/enable-and-disable-change-data-capture-sql-server?view=sql-server-ver15#enable-for-a-table)。\n\
  \n一旦你在某个表上启用了 CDC，你会看到与之关联的几个项目：\n\n*   **`YourDBName` 中的系统表**\n    *   `cdc.captured_columns`\
  \ – 为捕获实例中跟踪的每一列返回一行。\n    *   `cdc.change_tables` – 为数据库中每个变更表返回一行。\n    *   `cdc.dbo_YourTableName_CT`\
  \ – 为关联源表中被捕获列的每一次变更返回一行。\n    *   `cdc.ddl_history` – 为已启用变更数据捕获的表上发生的每次数据定义语言（DDL）变更返回一行。\n\
  \    *   `cdc.index_columns` – 为与变更表关联的每个索引列返回一行。\n    *   `cdc.lsn_time_mapping`\
  \ – 为在变更表中拥有行的每个事务返回一行。此表用于映射日志序列号（LSN）提交值与事务提交时间。\n*   **存储在 `MSDB` 中的系统表**\n \
  \   *   `dbo.cdc_jobs` – 返回变更数据捕获代理作业的配置参数。\n*   **用于捕获和清理 CDC 数据的两个代理作业**\n   \
  \ *   `cdc.YourDBName_capture` – 执行存储过程 `sp_MScdc_capture_job`，该过程负责捕获 CDC 数据。\n\
  \    *   `cdc.YourDBName_cleanup` – 执行存储过程 `sp_MScdc_cleanup_job`，该过程首先从 `msdb.dbo.cdc_jobs`\
  \ 中提取清理作业的保留期和阈值配置。\n\n**提示** 要了解更多关于 CDC 代理作业的信息，[请访问 Microsoft 关于管理和监视 CDC 的文档](https://docs.microsoft.com/en-us/sql/relational-databases/track-changes/administer-and-monitor-change-data-capture-sql-server?view=sql-server-ver15)。\n\
  \n要了解更多关于 CDC 系统表的信息，请访问[Microsoft 关于变更数据捕获表的文档](https://docs.microsoft.com/en-us/sql/relational-databases/system-tables/change-data-capture-tables-transact-sql?view=sql-server-ver15)。\n\
  \n\n\n### 第 10 章：其他 SQL Server 审计与跟踪方法\n\n## 清单 10-8. 查询 CDC 数据\n\n```sql\nUSE YourDBName;\n\
  \nDECLARE @from_lsn binary(10), @to_lsn binary(10);\n\nSET @from_lsn = sys.fn_cdc_get_min_lsn('dbo_YourTableName');\n\
  \nSET @to_lsn = sys.fn_cdc_get_max_lsn();\n\nSELECT *\n\nFROM cdc.fn_cdc_get_all_changes_dbo_AuditData\n\
  \n(@from_lsn, @to_lsn, N'all');\n```\n\n**注意：** CDC 要捕获数据，需要启用并启动 SQL Server 代理。\n\
  \n查询结果会根据表上发生的变化而有所不同。图 10-7 展示了结果可能的样子。\n\n![CDC 查询结果](img/index-179_1.png)\n\n\
  ### 图 10-7. CDC 查询结果\n\n`__$operation` 列的值含义如下：\n\n*   **1** – 删除。\n*   **2** –\
  \ 插入。\n*   **3** – 更新。这将返回旧值。仅当指定了行过滤选项 `'all update old'` 时有效。要设置此选项，你需要在清单 10-8\
  \ 中指定 `N'all update old'` 而不是 `N'all'`。\n*   **4** – 更新，但仅包含更新后的列值。\n\n**提示：** 要获取关于\
  \ `cdc.fn_cdc_get_all_changes` 函数的更多信息，请访问 [`https://docs.microsoft.com/en-us/sql/relational-databases/system-functions/cdc-fn-cdc-get-all-changes-capture-instance-transact-sql?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/relational-databases/system-functions/cdc-fn-cdc-get-all-changes-capture-instance-transact-sql?view=sql-server-ver15)。\n\
  \n#### 时态表\n\n此内置数据库功能允许你查看表中任何时间点存储的数据。它是一个系统版本控制表，保存了数据变更的完整历史。每一行的有效性由系统（即数据库引擎）管理。版本控制通过一对表（当前表和历史表）实现。每个表都有两个\
  \ `datetime2` 类型的列，用于定义每行的有效期。它们被称为期间列（PERIOD columns）。当前表包含每行的当前值。历史表包含每行的每个先前值及其有效的开始时间和结束时间。\n\
  \n##### 创建时态表\n\n要创建带有默认历史表的时态表，请使用清单 10-9 中的脚本。\n\n#### 清单 10-9. 创建带有默认历史表的时态表\n\
  \n```sql\nCREATE TABLE dbo.AuditChangesTemporal\n(\n    AuditID INT NOT NULL PRIMARY\
  \ KEY CLUSTERED IDENTITY(1,1),\n    [event_time] datetime2 NOT NULL,\n    [statement]\
  \ nvarchar NULL,\n    ValidFrom DATETIME2 GENERATED ALWAYS AS ROW START NOT NULL,\n\
  \    ValidTo DATETIME2 GENERATED ALWAYS AS ROW END NOT NULL,\n    PERIOD FOR SYSTEM_TIME\
  \ (ValidFrom, ValidTo)\n)\nWITH (SYSTEM_VERSIONING = ON (HISTORY_TABLE = dbo.AuditChangesTemporalHistory));\n\
  ```\n\n清单 10-9 中的脚本将创建一个时态表，其历史表可以从该表下访问，如图 10-8 所示。\n\n![带有历史表的时态表](img/index-180_1.png)\n\
  \n#### 图 10-8. 带有历史表的时态表\n\n##### 修改时态表中的数据\n\n如果你不隐藏期间列 `ValidTo` 和 `ValidFrom`，那么在修改数据时需要考虑它们。你可以通过仅指定要\
  \ `INSERT` 的列来做到这一点，如清单 10-10 所示。这将为你设置 `ValidTo` 和 `ValidFrom` 的默认值。\n\n#### 清单\
  \ 10-10. 向时态表中插入数据\n\n```sql\nINSERT INTO Auditing.dbo.AuditChangesTemporal\n  \
  \  (event_time, statement)\nSELECT DATEADD(mi, DATEPART(TZ, SYSDATETIMEOFFSET()),\
  \ event_time) as event_time, statement\nFROM sys.fn_get_audit_file ('e:\\sqlaudit\\\
  *.sqlaudit',default,default) af\nWHERE DATEADD(mi, DATEPART(TZ, SYSDATETIMEOFFSET()),\
  \ event_time) > DATEADD(HOUR, -4, GETDATE());\n```\n\n如果你隐藏了期间列 `ValidTo` 和 `ValidFrom`，那么在修改数据时就不需要考虑它们。换句话说，你可以在不必指定列的情况下进行\
  \ `INSERT`。\n\n**注意：** 修改时态表中的数据还有更多规则，例如更新和删除操作。有关在时态表中修改数据的更多信息，请访问 [`https://docs.microsoft.com/en-us/sql/relational-databases/tables/modifying-data-in-a-system-versioned-temporal-table?view=sql-server-ver16`](https://docs.microsoft.com/en-us/sql/relational-databases/tables/modifying-data-in-a-system-versioned-temporal-table?view=sql-server-ver16)。\n\
  \n##### 查询时态表\n\n当你想要获取时态表中的当前数据时，可以像查询任何其他表一样查询它，如图 10-9 所示。\n\n![查询时态表中的当前数据](img/index-182_1.png)\n\
  \n#### 图 10-9. 查询时态表中的当前数据\n\n如果你想查询历史数据，则需要指定 `FOR SYSTEM_TIME AS OF` 子句，如清单 10-11\
  \ 所示。\n\n#### 清单 10-11. 查询时态表的历史数据\n\n```sql\nSELECT TOP (10) *\nFROM [Auditing].[dbo].[AuditChangesTemporal]\n\
  FOR SYSTEM_TIME AS OF '2022-06-01 T10:00:00.7230011';\n```\n\n根据该 `SYSTEM_TIME`\
  \ 的历史数据中是否确实存在内容，此查询可能不返回任何行。\n\n**注意：** 有关时态表的更多信息，请访问 [`https://docs.microsoft.com/en-us/sql/relational-databases/tables/getting-started-with-system-versioned-temporal-tables?view=sql-server-ver16`](https://docs.microsoft.com/en-us/sql/relational-databases/tables/getting-started-with-system-versioned-temporal-tables?view=sql-server-ver16)。\n\
  \n![时态表示例 1](img/index-183_1.png)\n\n![时态表示例 2](img/index-183_2.png)\n\n## 成功与失败的登录\n\
  \n审计成功和/或失败登录的一种方法是在 SSMS 中启用登录审计，这将把信息写入 SQL Server 日志。你可以在 SSMS 中右键单击服务器连接并选择“属性”，然后点击“安全性”页面来启用此功能，如图\
  \ 10-10 所示。\n\n![登录审计配置](img/index-183_1.png)\n\n#### 图 10-10. 登录审计配置\n\n此服务器仅捕获失败的登录。如果更改此设置，你需要重启\
  \ SQL Server。图 10-11 展示了日志中失败登录消息的样子。\n\n![SQL Server 日志中的失败登录](img/index-183_2.png)\n\
  \n#### 图 10-11. SQL Server 日志中的失败登录\n\n你也可以查询日志以提取其中的记录，这将在下文涵盖...\n\n\n\n"
- "# 第 10 章 附加的 SQL Server 审计与跟踪方法\n\n##### 用于成功和失败登录审计的 SQL Server 审计\n\n在第 9 章“跟踪\
  \ SQL Server 配置更改”中有所涉及。然而，日志并不是跟踪登录的最佳方式。跟踪成功和失败登录的更好方法是使用 SQL Server 审计或扩展事件。\n\
  \nSQL Server 审计（在第 3 章“什么是 SQL Server 审计？”到第 5 章“通过 SQL 脚本实现 SQL Server 审计”中有更详细的介绍）允许你审计成功和失败的登录。你需要一个审计来存储审计数据，以及一个服务器审计规范来收集登录信息。服务器审计规范如清单\
  \ 10-12 所示。\n\n***清单 10-12.*** 用于捕获成功和失败登录的服务器审计规范\n\n```sql\nUSE [master];\n\n\
  CREATE SERVER AUDIT SPECIFICATION [ServerAuditSpecification]\nFOR SERVER AUDIT [AuditSpecification]\n\
  ADD (FAILED_LOGIN_GROUP),\nADD (SUCCESSFUL_LOGIN_GROUP)\nWITH (STATE = ON);\n```\n\
  \n你可以使用清单 10-13 中的查询来查看你的审计结果。\n\n***清单 10-13.*** 查看审计结果的查询\n\n```sql\nUSE master;\n\
  SELECT\n    event_time,\n    aa.name as audit_action,\n    server_instance_name,\n\
  \    server_principal_name,\n    client_ip,\n    application_name,\n    host_name\n\
  FROM sys.fn_get_audit_file ('E:\\audits\\*.sqlaudit',default,default) af\nINNER\
  \ JOIN sys.dm_audit_actions aa\n    ON aa.action_id = af.action_id\nWHERE event_time\
  \ > DATEADD(HOUR, -4, GETDATE())\nORDER BY event_time DESC;\n```\n\n在发生一些成功和失败的登录后，你的审计结果将类似于图\
  \ 10-12。\n\n![](img/index-185_1.png)\n\n***图 10-12.*** SQL Server 审计成功和失败登录结果\n\n\
  你只会看到有关登录来源的信息，例如 `client_ip` 和 `hostname`，但这些信息仅在较新版本的 SQL Server 中可用。然而，确定登录来源是审计的重要组成部分。如果你使用的\
  \ SQL Server 版本低于 2016 SP1，你可能需要考虑改用扩展事件。\n\n##### 用于成功和失败登录审计的扩展事件\n\n扩展事件（在第 6\
  \ 章“什么是扩展事件？”到第 8 章“通过 SQL 脚本实现扩展事件”中有更详细的介绍）同样允许你审计成功和失败的登录。扩展事件的好处是，无论你使用哪个版本的\
  \ SQL Server，你都可以获取客户端主机名。\n\n你需要创建一个使用 `login` 事件和 `error_reported` 事件的会话，如清单 10-14\
  \ 所示。\n\n***清单 10-14.*** 创建扩展事件以捕获成功和失败登录\n\n```sql\nCREATE EVENT SESSION [AuditLogins]\
  \ ON SERVER\nADD EVENT sqlserver.error_reported(\n    ACTION(sqlserver.client_app_name,\n\
  \           sqlserver.client_hostname,\n           sqlserver.server_principal_name)\n\
  \    WHERE ((([severity]=(14))\n        AND ([error_number]=(18456)))\n        AND\
  \ ([state]>(1)))),\nADD EVENT sqlserver.login(\n    ACTION(sqlserver.client_app_name,\n\
  \           sqlserver.client_hostname,\n           sqlserver.server_principal_name))\n\
  ADD TARGET package0.event_file(\n    SET filename=N'E:\\audits\\AuditLogins.xel',\n\
  \        max_file_size=(10),\n        max_rollover_files=(10))\nWITH (STARTUP_STATE=ON);\n\
  \nALTER EVENT SESSION [AuditLogins] ON SERVER\nSTATE=START;\n```\n\n在发生一些成功和失败的登录后，你可以执行清单\
  \ 10-15 中的查询来查询你的扩展事件。\n\n***清单 10-15.*** 查询你的扩展事件\n\n```sql\nSELECT\n    n.value('(@timestamp)[1]',\
  \ 'datetime') as timestamp,\n    n.value('(@name)[1]', 'nvarchar(15)') as name,\n\
  \    n.value('(action[@name=\"client_hostname\"]/value)[1]',\n             'nvarchar(50)')\
  \ as [client_hostname],\n    n.value('(action[@name=\"server_principal_name\"]/value)[1]',\n\
  ```\n\n\n\n"
