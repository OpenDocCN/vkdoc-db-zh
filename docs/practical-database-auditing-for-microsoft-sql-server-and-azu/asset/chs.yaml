  \ 脚本实现 SQL Server 审计”。\n*   **某个用户的所有操作**\n    *   **SQL Server 审计** – 这将需要一个带有筛选器的审计，以仅捕获该用户的活动，以及一个服务器审计规范。更多信息，请查阅第[4\
