- "# 第 5 章 通过 SQL 脚本实现 SQL Server 审计\n\n#### 查询系统视图\n\n您可以查询系统视图来查看审计的设置。这样可以更轻松地查看审计设置，而无需通过图形用户界面（GUI）进入。\n\
  \n清单 5-8 提供了用于获取审计及其设置列表的查询语句。\n\n***清单 5-8.*** 查询系统视图以列出审计\n\n```\nUSE master;\n\
  SELECT * FROM sys.server_file_audits;\n```\n\n图 5-4 展示了 `sys.server_file_audits`\
  \ 视图查询结果的一个横截面。\n\n![](img/index-85_1.jpg)\n\n![](img/index-85_2.png)\n\n***图 5-4.**\
  \ 列出审计的系统视图结果*\n\n**提示** 要获取 `sys.server_file_audits` 表中所有列的描述，[请访问 https://docs.microsoft.com/en-us/sql/relational-databases/system-catalog-views/sys-server-file-audits-transact-sql?view=sql-server-ver15](https://docs.microsoft.com/en-us/sql/relational-databases/system-catalog-views/sys-server-file-audits-transact-sql?view=sql-server-ver15)。\n\
  \n清单 5-9 提供了用于获取服务器审计规范及其设置列表的查询语句。\n\n***清单 5-9.*** 查询系统视图以列出服务器审计规范\n\n```\nUSE\
  \ master;\nSELECT\n    sas.name as ServerAuditSpecName,\n    sfa.name as AuditSpecName,\n\
  \    sasd.audit_action_name,\n```\n\n\n[sas.is_state_enabled]\n\n`FROM sys.server_audit_specifications\
  \ sas`\n\n`LEFT JOIN sys.server_audit_specification_details sasd`\n\n`ON sas.server_specification_id\
  \ = sasd.server_specification_id`\n\n`LEFT JOIN sys.server_file_audits sfa`\n\n\
  `ON sas.audit_guid = sfa.audit_guid;`\n\n图 5-5 显示了清单 5-9 中查询结果的横截面视图。\n\n**图 5-5.**\
  \ 列出服务器审核规范的系统视图结果\n\n![](img/index-86_1.png)\n\n第 5 章 通过 SQL 脚本实现 SQL 服务器审核\n\n\
  **提示** 要获取服务器审核系统视图中所有列的描述，请访问：\n\n- <https://docs.microsoft.com/en-us/sql/relational-databases/system-catalog-views/sys-server-audit-specifications-transact-sql?view=sql-server-ver15>\n\
  - <https://docs.microsoft.com/en-us/sql/relational-databases/system-catalog-views/sys-server-audit-specification-details-transact-sql?view=sql-server-ver15>\n\
  \n清单 5-10 给出了用于获取数据库审核规范及其设置的查询。\n\n**清单 5-10.** 查询系统视图以列出数据库审核规范\n\n```sql\nUSE\
  \ dbname;\n\nSELECT\n    das.name,\n    sfa.name,\n    dasd.audit_action_name,\n\
  \    das.is_state_enabled\nFROM sys.server_file_audits sfa\nLEFT JOIN sys.database_audit_specifications\
  \ das\n    ON sfa.audit_guid = das.audit_guid\nLEFT JOIN sys.database_audit_specification_details\
  \ dasd\n    ON das.database_specification_id = dasd.database_specification_id;\n\
  ```\n\n图 5-6 显示了清单 5-10 中查询结果的横截面视图。\n\n**图 5-6.** 列出数据库审核规范的系统视图结果\n\n![](img/index-87_1.png)\n\
  \n第 5 章 通过 SQL 脚本实现 SQL 服务器审核\n\n**提示** 要获取数据库审核系统视图中所有列的描述，请访问：\n\n- <https://docs.microsoft.com/en-us/sql/relational-databases/system-catalog-views/sys-database-audit-specifications-transact-sql?view=sql-server-ver15>\n\
  - <https://docs.microsoft.com/en-us/sql/relational-databases/system-catalog-views/sys-database-audit-specification-details-transact-sql?view=sql-server-ver15>\n\
  \n## 添加多个审核\n\n\n如果你尝试向已包含服务器审计的现有审计中添加另一个服务器审计，操作将会失败，并显示错误提示该审计已存在，如图 5-7 所示。这意味着你无法为其添加另一个服务器审计。\n\
  \n**图 5-7.** 尝试向审计中添加第二个服务器审计规范时出现的错误\n\n这并不妨碍你拥有多个服务器和数据库审计，因为你可以设置多个审计。第 3 章“什么是\
  \ SQL Server 审计？”中有一节专门讨论多审计设置，并提供了一些你可以参考的示例场景。\n\n## SQL Server 审计中可用的列\n\n审计中提供了许多列。这些列可在你查询或筛选审计时使用。不同版本可用的列有所不同。以下列表包含了我最常用的一些列：\n\
  \n*   **SQL Server 2012/2014/2016**\n    *   `event_time`\n    *   `action_id`\n\
  \    *   `succeeded`\n    *   `server_principal_name`\n    *   `server_instance_name`\n\
  \    *   `database_name`\n    *   `schema_name`\n    *   `object_name`\n    *  \
  \ `statement`\n    *   `file_name`\n*   **SQL Server 2017 – 包含 2016 及更早版本的所有列，外加以下新增列**\n\
  \    *   `client_ip`\n    *   `application_name`\n*   **SQL Server 2019 – 包含 2017\
  \ 及更早版本的所有列，外加以下新增列**\n    *   `host_name`\n\n**请注意**，实际列远多于上述列表，并且每个版本都会增加新列。根据你选择存储审计数据的位置，以下链接提供了有关审计数据中可用列的更多信息：\n\
  *   [`docs.microsoft.com/en-us/sql/relational-databases/security/auditing/sql-server-audit-records?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/relational-databases/security/auditing/sql-server-audit-records?view=sql-server-ver15)\n\
  *   [`docs.microsoft.com/en-us/sql/relational-databases/system-functions/sys-fn-get-audit-file-transact-sql?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/relational-databases/system-functions/sys-fn-get-audit-file-transact-sql?view=sql-server-ver15)\n\
  \n#### 查询审计日志\n\n你可以使用 SQL Server 系统函数 `sys.fn_get_audit_file` 来查询审计文件。该函数将返回关于审计及其关联元数据的大量不同信息。代码清单\
  \ 5-11 提供了一个查询，用于获取过去四小时内审计中最相关的列。\n\n**代码清单 5-11.** 查询审计日志\n\n```sql\nUSE master;\n\
  SELECT DISTINCT\n    event_time,\n    aa.name as audit_action,\n    statement,\n\
  \    succeeded,\n    database_name,\n    server_instance_name,\n    schema_name,\n\
  \    session_server_principal_name,\n    server_principal_name,\n    object_Name,\n\
  \    file_name,\n    client_ip,\n    application_name,\n    host_name,\n    file_name\n\
  FROM sys.fn_get_audit_file ('E:\\audits\\*.sqlaudit',default,default) af\nINNER\
  \ JOIN sys.dm_audit_actions aa\n    ON aa.action_id = af.action_id\nWHERE event_time\
  \ > DATEADD(HOUR, -4, GETDATE())\nORDER BY event_time DESC;\n```\n\n图 5-8 展示了代码清单\
  \ 5-11 中查询结果的一个横截面。\n\n![](img/index-90_1.png)\n\n**图 5-8.** 审计查询结果\n\n**提示** 通过访问以下链接了解更多关于\
  \ `sys.fn_get_audit_file` 的信息：[`docs.microsoft.com/en-us/sql/relational-databases/system-functions/sys-fn-get-audit-file-transact-sql?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/relational-databases/system-functions/sys-fn-get-audit-file-transact-sql?view=sql-server-ver15)\n\
  \n\n\n#### 筛选 SQL Server 审计\n\n您可以针对审计收集中可用的任何列进行筛选。这样，您就可以过滤掉诸如监控工具或服务账户之类的内容。SQL\
  \ Server 有一个 `servername$` 账户，在后台执行各种操作。这类账户会迅速填满您的审计文件，导致难以找到您想要审计的内容。\n\n进行筛选时，请使用列名，并指定您不希望它等于的值或您希望它等于的值。例如，如果您只想审计\
  \ `sa`，可以在此处进行筛选。这类似于 SQL 语句中的 `WHERE` 子句，因此您可以使用审计中可用的列，执行任何可以在 `WHERE` 子句中完成的操作。\n\
  \n清单 5-12 使用 `WHERE` 子句为审计添加了一个筛选器。\n\n***清单 5-12.*** 添加 `WHERE` 子句以筛选审计\n```\n\
  USE [master];\n\nCREATE SERVER AUDIT [Audit_AuditingUser]\nTO FILE\n(   FILEPATH\
  \ = N'E:\\sqlaudit\\auditinguser\\'\n    ,MAXSIZE = 100 MB\n    ,MAX_FILES = 4\n\
  \    ,RESERVE_DISK_SPACE = OFF\n) WITH (QUEUE_DELAY = 1000, ON_FAILURE = CONTINUE)\n\
  WHERE ([server_principal_name]='auditing'\n    AND [schema_name]<>'sys')\n\nALTER\
  \ SERVER AUDIT [Audit_AuditingUser] WITH (STATE = ON);\n```\n\n在清单 5-12 中，`WHERE`\
  \ 子句将进行筛选，使得只审计 auditing 数据库，并且会排除 `sys` 架构。\n\n`提示` 如果您想在某个 SQL Server 版本上进行审计，但该版本没有您需要的列（如\
  \ `client_ip` 或 `host_name`），您可以尝试改用扩展事件来实现。第 7 章“通过 GUI 实现扩展事件”涵盖了这方面的信息。\n\n####\
  \ 删除审计\n\n要删除审计，您可以执行清单 5-13 中的查询。\n\n![](img/index-92_1.png)\n\n![](img/index-92_2.png)\n\
  \n\n"
- '# 第 5 章 通过 SQL 脚本实施 SQL Server 审计


  ## 清单 5-13. 删除审计


  ```sql

  USE [master];


  DROP SERVER AUDIT [AuditSpecification];

  ```


  如果审计未事先禁用，`清单 5-13` 中的查询将产生错误，如`图 5-9`所示。


  ## 图 5-9. 在审计启用时尝试删除审计导致的错误


  当你删除审计时，文件仍保留在磁盘上。我曾删除审计并以为文件也一并消失了。不，文件仍然存在。这是为了方便你日后可能出于审计目的需要这些文件。你必须手动去删除它们。


  删除审计时，你可能会使你的服务器和数据库审计成为孤立项。服务器和数据库审计会保持原状且看似正常，但由于审计已不存在，将不会收集任何数据。`图 5-10`向你展示了即使没有审计，服务器和数据库审计似乎仍然存在。


  ## 图 5-10. 审计已消失，但服务器和数据库审计看似正常


  如果你通过 GUI 进入服务器或数据库审计，它们将显示一个空白的审计，如`图 5-11`所示。


  ![](img/index-93_1.jpg)


  ## 图 5-11. 服务器审计规范缺少审计


  `图 5-11`的左上角有一条信息，告诉你“未提供服务器审计”，而收集数据需要这个审计。


  即使你用相同的名称重新创建审计，服务器和数据库审计也不会自动关联到新的审计。服务器和数据库审计依赖于审计的 GUID。有一种方法可以用相同的 GUID 重新创建审计，如`清单
  5-14`所示。


  ## 清单 5-14. 使用相同的 GUID 重新创建审计


  ```sql

  USE [master];


  CREATE SERVER AUDIT [AuditSpecification]

  TO FILE

  ( FILEPATH = N''C:\audits\''

  ,MAXSIZE = 50 MB

  ,MAX_FILES = 4

  ,RESERVE_DISK_SPACE = OFF

  ) WITH (QUEUE_DELAY = 1000, ON_FAILURE = CONTINUE,

  AUDIT_GUID = ''a39b90ef-dc26-486b-b297-1571161dfda1'')


  ALTER SERVER AUDIT [AuditSpecification] WITH (STATE = ON);

  ```


  你可以通过如本章前面讨论的，在 GUI 中将现有审计编写为脚本来获取 GUID。


  删除服务器和数据库审计的语法略有不同。`清单 5-15`展示了这些脚本。


  ## 清单 5-15. 删除服务器和数据库审计


  ```sql

  USE [master];


  DROP SERVER AUDIT SPECIFICATION [ServerAuditSpecification];


  USE [Auditing];


  DROP DATABASE AUDIT SPECIFICATION [DatabaseAuditSpecification_Auditing];

  ```


  如果规范未被禁用，`清单 5-15`中的脚本也会产生错误，如本节前面的`图 5-9`所示。


  #### 禁用审计


  你可以通过脚本禁用审计，如`清单 5-16`所示。


  ## 清单 5-16. 禁用审计


  ```sql

  USE master;


  ALTER SERVER AUDIT AuditSpecification

  WITH (STATE = OFF);


  USE master;


  ALTER SERVER AUDIT SPECIFICATION [ServerAuditSpecification]

  WITH (STATE = OFF);


  USE Auditing;


  ALTER DATABASE AUDIT SPECIFICATION [DatabaseAuditSpecification_Auditing]

  WITH (STATE = OFF);

  ```


  `清单 5-16`展示了禁用服务器和数据库审计规范的不同变体。


  **注意：** 如果你想禁用审计，它不会立即禁用，而是要等到它完成对当前操作的审计。如果你正在审计大量操作，这可能很困难。从技术上讲，你能够禁用任何审计，但审计可能需要一段时间才能完成审计操作，然后才能禁用自身。


  #### 修改审计


  审计创建后，你可以通过对其执行 `ALTER` 语句来修改它。你需要先将其禁用。唯一不能更改的是审计的名称。要更改名称，你需要删除并重新创建它。`清单 5-17`展示了可用于修改审计的脚本。


  ## 清单 5-17. 修改审计



  USE [master];


  ALTER SERVER AUDIT [AuditSpecification] WITH (STATE = OFF);


  ALTER SERVER AUDIT [AuditSpecification]

  TO FILE

  ( MAXSIZE = 25 MB

  ,MAX_FILES = 3

  );


  ALTER SERVER AUDIT [AuditSpecification] WITH (STATE = ON);


  你同样可以修改服务器和数据库审计，但它们的语法略有不同。清单 5-18 展示了这种语法。与审计本身一样，在进行修改前，你需要先禁用审计，修改完成后再重新启用它。


  ### 清单 5-18. 修改服务器或数据库审计


  ```sql

  USE Auditing;


  ALTER DATABASE AUDIT SPECIFICATION [DatabaseAuditSpecification_Auditing]

  WITH (STATE = OFF);


  ALTER DATABASE AUDIT SPECIFICATION [DatabaseAuditSpecification_Auditing]

  ADD (TRANSACTION_GROUP),

  ADD (SUCCESSFUL_DATABASE_AUTHENTICATION_GROUP);


  ALTER DATABASE AUDIT SPECIFICATION [DatabaseAuditSpecification_Auditing]

  WITH (STATE = ON);


  USE master;


  ALTER SERVER AUDIT SPECIFICATION [ServerAuditSpecification]

  WITH (STATE = OFF);


  ALTER SERVER AUDIT SPECIFICATION [ServerAuditSpecification]

  ADD (LOGOUT_GROUP),

  ADD (FULLTEXT_GROUP);


  ALTER SERVER AUDIT SPECIFICATION [ServerAuditSpecification]

  WITH (STATE = ON);

  ```


  在下一章中，你将学习扩展事件以及如何使用它们来审核 SQL Server 上的操作。


  ![](img/index-97_1.png)


