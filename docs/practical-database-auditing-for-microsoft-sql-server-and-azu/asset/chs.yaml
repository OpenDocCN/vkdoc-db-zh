  \n*   你需要创建一个审计。这将决定审计数据的存储位置、保留多少审计数据以及与审计相关的若干其他设置。\n*   你还需要一个服务器和/或一个数据库审计来收集审计数据。服务器和数据库审计必须与一个审计相关联。每个审计可以为每个数据库包含一个服务器审计和一个数据库审计。这些服务器和数据库审计彼此不依赖。服务器审计规范通常适用于审计服务器级别的更改和/或同时审计所有数据库。数据库审计规范则适用于审计单个数据库或单个数据库中的活动子集。\n\
  \n图 4-1 展示了如何在 `SSMS` 中通过右键单击`安全性`部分下的`审计`来创建审计。\n\n© Josephine Bush 2022\nJ. Bush,\
  \ *Practical Database Auditing for Microsoft SQL Server and Azure SQL*, [`doi.org/10.1007/978-1-4842-8634-0_4`](https://doi.org/10.1007/978-1-4842-8634-0_4#DOI)\n\
  \n![](img/index-47_1.png)\n![](img/index-47_2.png)\n\n***图 4-1.** 创建审计*\n\n选择`新建审计`后，你将看到一个对话框来选择审计选项，如图\
  \ 4-2 所示。\n\n***图 4-2.** 配置审计对话框*\n\n以下是一些关于如何配置审计的建议：\n\n*   **审计名称** – 我倾向于将其命名为\
  \ `AuditSpecification` 或 `AuditSpecification_servername`。这完全取决于你希望名称有多具描述性。不过，你可以创建多个审计，因此如果你计划添加其他审计，取一个更具描述性的名称可能是有意义的。\n\
  *   **队列延迟** – 这是审计前的等待时间（以毫秒为单位）。你可以将其设置为 `0`、`1000` 或大于 `1000` 的值。我将其保留为 `1000`。\n\
  *   **审核日志失败时**\n    *   **继续** – 如果审计无法捕获语句，它会继续进行审计。你可能会偶尔错过个别语句，但我怀疑这种情况即使发生也不常出现。\n\
  \    *   **失败操作** – 如果无法进行审计，它将导致语句\n\n\n\n导致失败。执行该语句的用户或应用程序将收到错误。\n\n*   **关闭服务器**\
  \ – 如果无法进行审计，它将执行其声明的操作，即关闭服务器。所有用户和应用程序将无法再访问服务器。\n\n我选择“继续”此选项。我认为“失败操作”和“关闭服务器”过于极端。如果我不选择“继续”，人们会因为服务器出问题而向我大喊大叫。如果审计在法律或财务数据库等环境中至关重要，你可能需要选择“失败操作”或“关闭服务器”。\n\
  \n## 第 4 章 通过图形用户界面实现 SQL Server 审计\n\n*   **审计目标**\n\n*   **文件** – 我总是选择写入文件，因为这对我来说最简单。我没有很多审计限制。是的，审计员想知道发生了什么，但他们不认为我们会偷偷进入那里删除审计文件或不报告审计数据。\n\
  \n*   **应用程序日志** – 如果你有一个像 `Splunk` 这样的日志收集应用程序，可以读取所有日志并将它们收集到一个中央存储库中，我认为可以将审计数据存储在应用程序日志中。\n\
  \n*   **安全日志** – 这比写入应用程序日志有更多的限制，但适用相同的概念。这是存储审计数据最安全的选择，因为最不可能有人篡改它。\n\n*   **路径**\
  \ – 如果你为 `审计目标` 选择了 `文件`，你需要选择一个路径。确保不要将审计文件放在 `C 盘` 上。尽管我们将在后续步骤中限制审计文件的大小，但你不希望它意外填满\
  \ `C 盘`。我也不建议将审计文件放在数据驱动器或日志驱动器上。我工作的地方有一个用于应用程序的 `E 盘`；那是存放审计文件的好地方。\n\n*   **最大文件数**\
  \ – 4\n\n*   **最大文件大小** – 50 MB\n\n我从不允许审计收集无限数量的文件或无限制的文件大小。这会使查询它们变得困难。我发现，当收集权限和架构更改时，4\
  \ 个 50 MB 的文件很适合我的需求。你的文件数量和大小取决于你的需求。\n\n*   **保留磁盘空间** – 由于我的文件相当小，我从不勾选此项。\n\n\
  `注意` 不要将 `SQL Server 审计` 设置为收集无限数量的文件或允许无限制的文件大小。它们会变得巨大，几乎无法查询。\n\n如果你想将审计数据存储在应用程序日志中，你将按照\
  \ `图 4-3` 中的截图设置审计。\n\n![](img/index-50_1.jpg)\n\n`图 4-3.` 配置写入应用程序日志的审计\n\n安全日志也是如此，但你需要从\
  \ `审计目标` 下拉菜单中选择 `安全日志`，如 `图 4-4` 所示。\n\n![](img/index-51_1.jpg)\n\n`图 4-4.` 配置写入安全日志的审计\n\
  \n`注意` 所有审计在初始创建时都是禁用的。\n\n创建审计后，你需要启用它。你可以右键单击它并选择 `启用审计`，如 `图 4-5` 所示。如果你不启用它，它将不会收集任何数据。\n\
  \n![](img/index-52_1.jpg)\n![](img/index-52_2.png)\n\n`图 4-5.` 启用审计\n\n当你尝试启用配置为使用安全日志的审计时，会收到错误，如\
  \ `图 4-6` 所示。\n\n`图 4-6.` 创建写入安全日志的审计时出现的错误\n\n`SQL Server 日志` 将为你提供有关错误的额外信息，如\
  \ `图 4-7` 所示。\n\n![](img/index-53_1.png)\n![](img/index-53_2.jpg)\n\n`图 4-7.` 创建写入安全日志的审计时错误的额外信息\n\
  \n要解决 `错误: 33204 SQL Server 审计无法写入安全日志`，你需要\n\n\n\n需要基于以下 Microsoft 文档配置额外项目：[`docs.microsoft.com/en-us/sql/relational-databases/security/auditing/write-sql-server-audit-events-to-the-security-log?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/relational-databases/security/auditing/write-sql-server-audit-events-to-the-security-log?view=sql-server-ver15)\n\
  \n如果您选择将文件作为审计目标，在启用审计后（如图 4-8 所示），一个审计文件将被放置在磁盘上。这里将存放与该审计关联的服务器和数据库审计的数据。\n\n\
  **图 4-8.** 磁盘上的审计文件\n\n随着数据收集，此文件将增长至审计中指定的大小。然后，它将创建另一个新文件，直至达到配置中指定的文件数量。一旦最后一个文件被写满，系统将删除最旧的文件并创建另一个新文件。您需要了解文件被写满的速度，以便在它们被删除前不会错过收集其中的数据。\n\
  \n#### 设置服务器审计规范\n\n两个可选审计组件中的第一个是服务器审计。您需要在服务器的安全性部分进行设置。右键单击以新建一个，如图 4-9 所示。\n\
  \n![](img/index-54_1.png)\n\n![](img/index-54_2.jpg)\n\n**图 4-9.** 创建服务器审计规范\n\n\
  这将弹出一个对话框来配置您的服务器审计规范，如图 4-10 所示。\n\n**图 4-10.** 配置服务器审计规范\n\n![](img/index-55_1.png)\n\
  \n### 关于如何配置服务器审计规范的建议：\n\n*   **名称 –** 我倾向于将其命名为 `ServerAuditSpecification` 或 `ServerAuditSpecification_servername`。这完全取决于您希望名称具有多大的描述性。不过，您可以创建多个服务器审计，因此如果您计划添加其他审计，起一个更具描述性的名称可能是有意义的。\n\
  *   **审计 –** 您需要将其与您的审计关联。这里有一个下拉列表，其中列出了您的审计。您需要建立此关联，因为这里是审计数据将存放的位置。\n*   **操作\
  \ –** 我正在服务器级别以及服务器上的所有数据库中捕获权限和架构更改。我还在捕获是否有人更改了密码、更改了审计，或者是否有人执行了 `DBCC` 命令。您无需填写任何其他列，因为它们不适用于这些操作类型。例如，如果您只想捕获服务器更改，您可以移除所有以\
  \ `database` 和 `schema` 开头的操作。第 3 章“什么是 SQL Server 审计？”中有一个关于服务器审计操作组的小节，可帮助您确定每个操作所审计的内容。\n\
  \n服务器审计规范默认也是禁用的。您可以右键单击以启用它，如图 4-11 所示。如果处于禁用状态，它不会收集任何数据。\n\n**图 4-11.** 启用服务器审计规范\n\
  \n#### 设置数据库审计规范\n\n两个可选组件中的第二个是数据库审计。您必须进入每个数据库的安全性部分，然后右键单击，如图 4-12 所示。\n\n![](img/index-56_1.jpg)\n\
  \n**图 4-12.** 创建数据库审计规范\n\n这将弹出一个对话框来配置数据库审计规范，如图 4-13 所示。\n\n![](img/index-57_1.jpg)\n\
  \n\n配置数据库审计规范的建议：\n\n以下是如何配置数据库审计规范的建议：\n\n• **名称** – 我总是将其命名为下划线加数据库名称，因为这有助于识别它正在审计哪个数据库，例如\
  \ `DatabaseAuditSpecification_Auditing`。这完全取决于您希望命名的描述性程度。您可以创建多个审计，因此如果您计划添加其他审计，使用更具描述性的名称可能更有意义。需要注意的一点是，如果在数据库审计名称中没有包含数据库名称，您将无法轻松查询存储审计信息的系统视图。如果您将审计命名得描述性强，这些视图会非常有帮助。查询系统视图将在第\
  \ 5 章“通过 SQL 脚本实现 SQL Server 审计”中更详细地介绍。\n\n• **审计** – 您需要将其与您的审计关联。有一个下拉列表，其中列出了您的审计。您需要此关联，因为这是您的审计数据将要存放的位置。\n\
  \n![配置数据库审计规范](img/index-58_1.jpg)\n\n通过 GUI 实现 SQL Server 审计\n\n• **操作** – 我在数据库级别捕获权限和架构更改。第\
  \ 3 章“什么是 SQL Server 审计？”中有一个关于数据库审计操作组的部分，可帮助您确定每个操作审计的内容。**如果您已经在服务器审计级别获取权限和架构更改，请不要使用此设置。这将产生重复的审计记录。**\n\
  \n数据库审计的亮点在于如果您想审计对象。通过数据库审计，您可以审计对当前数据库中对象（如表、视图和存储过程）的插入、更新、删除、选择和执行语句。您还可以审计整个架构或数据库。这些操作类型需要您根据对象类填写审计操作的所有附加列，如图\
  \ 4-14 所示。\n\n配置数据库审计规范以捕获 DML 操作的建议：\n\n当审计特定对象、架构或数据库时，配置数据库审计规范的建议：\n\n• **名称**\
  \ – 我总是将其命名为下划线加与其用途相关的描述性内容，因为这有助于识别其审计内容。\n\n• **审计** – 您需要将其与您的审计关联。有一个下拉列表，其中列出了您的审计。您需要此关联，因为这是您的审计数据将要存放的位置。\n\
  \n![捕获 DML 操作的数据库审计规范](img/index-59_1.png)\n\n通过 GUI 实现 SQL Server 审计\n\n• **审计操作类型**\
  \ – 第 3 章“什么是 SQL Server 审计？”中有一个关于数据库审计操作组的部分，可帮助您确定每个操作审计的内容。\n\n• **INSERT**\
  \ – 审计谁向表、架构或数据库插入数据\n• **UPDATE** – 审计谁更新了表、架构或数据库\n• **EXECUTE** – 审计谁在存储过程、架构或数据库上执行\n\
  • **SELECT** – 审计谁从表、视图、函数、架构或数据库中选择数据\n• **DELETE** – 审计谁从表、架构或数据库中删除数据\n• **对象类**\n\
  \    • **OBJECT** – 选择此项以查看对特定表、视图、存储过程或函数的查询。\n    • **SCHEMA** – 选择此项以查看对架构中任何对象的查询。\n\
  \    • **DATABASE** – 选择此项以查看对当前数据库中任何对象的查询。\n• **对象架构** – 对 `OBJECT` 类是必需的\n• **对象名称**\
  \ – 对 `OBJECT`、`SCHEMA` 和 `DATABASE` 类是必需的\n• **主体名称** – 对 `OBJECT`、`SCHEMA` 和 `DATABASE`\
  \ 类是必需的。如果您想审计所有人，请使用 `public`。如果您想审计多个用户，则需要为每个用户单独设置一行。\n\n创建数据库审计后，它默认也是禁用的。您可以右键单击启用它，如图\
  \ 4-15 所示。禁用时，它不会收集数据。\n\n![启用数据库审计规范](img/index-60_1.png)\n\n"
- "# 第 4 章 通过图形用户界面实现 SQL Server 审计\n\n## 添加多个审计\n\n如果你尝试为一个已包含服务器审计的现有审计再添加另一个服务器审计，操作将失败，并提示审计已存在，如图\
  \ 4-16 所示。这意味着你无法为其添加另一个服务器审计。\n\n**图 4-16.** 尝试向一个审计添加第二个服务器审计规格时出现的错误\n\n但这并不妨碍你拥有多个服务器和数据库审计，因为你可以设置多个审计。第\
  \ 3 章“什么是 SQL Server 审计？”中有一个关于多重审计设置的部分，并提供了一些你可以参考的示例场景。\n\n![](img/index-61_1.png)\n\
  \n![](img/index-61_2.jpg)\n\n#### 查询审计日志\n\n你可以通过 `SSMS` 查询审计，方法是右键单击审计，如图 4-17\
  \ 所示。\n\n**图 4-17.** 查看审计日志\n\n**图 4-18.** 审计日志结果\n\n随后会弹出一个对话框，显示最近的 1000 个事件，如图\
  \ 4-18 所示。\n\n可能没有任何列表项，因为尚未发生任何可审计的事件。也可能有大量的审计数据，因为后台正在发生许多你并未意识到的事情。`SQL Server`\
  \ 有很多内部进程可能会被你的审计收集。有一种方法可以在审计数据被收集之前进行过滤，这一点稍后将会介绍。\n\n![](img/index-62_1.png)\n\
  \n如果你将审计日志存储在应用程序或安全日志中，你将在 `日志文件查看器` 中看到不同的视图，该查看器会改为从应用程序或安全日志中查询审计数据，如图 4-19\
  \ 所示。\n\n**图 4-19.** 存储在应用程序日志中的审计日志结果\n\n如果你将审计日志存储在应用程序或安全日志中，你也可以在 Windows 的\
  \ `事件查看器` 中查看它们，如图 4-20 所示。\n\n![](img/index-63_1.png)\n\n**图 4-20.** 审计日志结果显示在事件查看器的应用程序日志中\n\
  \n## SQL Server 审计中可用的列\n\n审计中有很多可用的列。当你查询或过滤审计时，这些列可供你使用。不同版本的 SQL Server 提供不同的列。以下列表包含了我认为最有用的列：\n\
  \n*   **SQL Server 2012/2014/2016**\n    *   `event_time`\n    *   `action_id`\n\
  \    *   `succeeded`\n    *   `server_principal_name`\n    *   `server_instance_name`\n\
  \    *   `database_name`\n    *   `schema_name`\n    *   `object_name`\n    *  \
  \ `statement`\n    *   `file_name`\n*   **SQL Server 2017 – 包含 2016 及更早版本的所有列，外加以下新增列**\n\
  \    *   `client_ip`\n    *   `application_name`\n*   **SQL Server 2019 – 包含 2017\
  \ 及更早版本的所有列，外加以下新增列**\n    *   `host_name`\n\n**请注意**，可用的列远不止上列中的这些，而且每个版本都会增加新列。根据你选择存储审计数据的位置，以下链接提供了有关审计数据中可用列的更多信息。\n\
  \n*   https://docs.microsoft.com/en-us/sql/relational-databases/security/auditing/sql-server-audit-records?view=sql-server-ver15\n\
  *   https://docs.microsoft.com/en-us/sql/relational-databases/system-functions/sys-fn-get-audit-file-transact-sql?view=sql-server-ver15\n\
  \n\n[system-functions/sys-fn-get-audit-file-transact-sql?view=sql-server-ver15](https://docs.microsoft.com/en-us/sql/relational-databases/system-functions/sys-fn-get-audit-file-transact-sql?view=sql-server-ver15)\n\
  \n#### 筛选 SQL Server 审计\n\n你可以使用审计对话框进行筛选，如图 4-21 所示。\n\n![](img/index-65_1.png)\n\
  \n第 4 章 通过 GUI 实现 SQL Server 审计\n\n***图 4-21.** 为审计添加筛选器*\n\n你可以基于审计收集中任何可用的列进行筛选。这样，你可以过滤掉诸如监控工具或服务账户之类的内容。SQL\
  \ Server 有一个 `servername$` 账户，在后台执行各种操作。这类账户会快速填满你的审计文件，导致难以找到你想要审计的内容。进行筛选时，使用列的名称以及你**不希望它等于**或**希望它等于**的值。例如，如果你只想审计\
  \ `sa`，可以在这里进行筛选。这类似于 SQL 语句中的 `WHERE` 子句，因此你可以做任何能在 WHERE 子句中做的事情，只是不使用 `WHERE`\
  \ 关键字。\n\n![](img/index-66_1.png)\n\n第 4 章 通过 GUI 实现 SQL Server 审计\n\n**提示** 如果你审计的\
  \ SQL Server 版本没有你需要的列，例如 `client_ip` 或 `host_name`，你可以尝试改用扩展事件来实现。第 7 章“通过 GUI\
  \ 实现扩展事件”涵盖了这方面的信息。\n\n#### 删除审计\n\n要删除审计，请右键单击该审计，如图 4-22 所示。\n\n***图 4-22.** 删除审计*\n\
  \n你将看到一个对话框，这个对话框非常有用之处在于，你可以通过一个复选框选择禁用它，如图 4-23 所示。在删除审计之前，你需要先将其禁用。\n\n![](img/index-67_1.jpg)\n\
  \n第 4 章 通过 GUI 实现 SQL Server 审计\n\n***图 4-23.** 在删除前禁用审计*\n\n当你删除审计后，文件仍会保留在磁盘上。我删除了审计，以为文件也随之消失了。不，文件还在那里。这是为了方便你日后可能出于审计目的需要它们。你必须手动去删除它们。\n\
  \n删除审计时，可能会使你的服务器和数据库审计成为孤立状态。服务器和数据库审计会保留并看似正常，但由于审计已被删除，将不会收集任何数据。图 4-24 显示即使没有审计，服务器和数据库审计仍然存在。\n\
  \n![](img/index-68_1.png)\n\n![](img/index-68_2.jpg)\n\n第 4 章 通过 GUI 实现 SQL Server\
