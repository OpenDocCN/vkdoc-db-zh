- "# 第六章\n\n## 什么是扩展事件？\n\n扩展事件，简称 `XEvents`，是一项内置的审核和监视功能，可通过 `SSMS` 图形界面或 `SQL`\
  \ 脚本使用。你可以设置并配置它来捕获 SQL Server 上发生的几乎所有事件。它非常灵活，且相当容易设置。\n\n扩展事件旨在替代 `SQL Server\
  \ Profiler`，而 `Profiler` 预计将在未来某个 SQL Server 版本中被弃用。`Profiler` 是一种创建跟踪以捕获 SQL Server\
  \ 上所有活动的方式。\n\n扩展事件最早在 SQL Server 2008 中引入。在 SQL Server 2012 中，为了便于使用，增加了图形界面。它在\
  \ SQL Server 的每个版本中都可用。与 `SQL Server Audit` 不同，它没有基于版本的限制。\n\n#### 扩展事件默认会话\n\n\
  当你在 `SSMS` 中查看扩展事件时，你会看到其中已存在一些会话。这些是 SQL Server 默认自带的，并且 SQL Server 引擎会使用它们。根据你使用的\
  \ SQL Server 版本，可能会看到不同的默认会话。图 6-1 展示了你可能看到的默认会话示例。\n\n#### 图 6-1. 默认扩展事件会话\n\n\
  `system_health` 使用环形缓冲区存储收集的信息，并使用事件文件。关于扩展事件存储位置的更多信息将在[第七章“通过图形界面实现扩展事件”](https://doi.org/10.1007/978-1-4842-8634-0_7)中介绍。`AlwaysOn_health`\
  \ 默认是禁用的，除非你正在使用 SQL Server 中配置的可用性组。`system_health` 和（在 2016 版本及更高版本中的）`telemetry_xevents`\
  \ 主要收集有关错误、死锁和等待的信息。请勿禁用或更改这些扩展事件，它们是 SQL Server 所需的。我曾读到，即使你删除了 `telemetry_xevents`，Microsoft\
  \ 也有机制在 60 秒内将其恢复。如果它们收集的正是你需要的数据，查询它们并不会受到限制。我不会介绍如何查询这些默认会话，因为它们收集的不是审计数据。我将在[第七章“通过图形界面实现扩展事件”](https://doi.org/10.1007/978-1-4842-8634-0_7)中展示如何收集数据。\n\
  \n#### 扩展事件组件\n\n要使扩展事件工作，你需要配置一个会话。这个会话将收集你想要审计的信息。\n\n\n### 注意\n\n您需要具备系统管理员权限才能通过\
  \ SSMS GUI 设置扩展事件。如果通过脚本创建，则需要 `ALTER ANY EVENT` 权限。\n\n如果只需要查询它们，则需要 `VIEW SERVER\
  \ STATE`。\n\n以下是配置会话时需要使用的组件。\n\n#### 扩展事件模板\n\n扩展事件附带了许多不同的模板可供选择。这使得配置更加容易，特别是当您不习惯使用或不确切知道需要配置什么来收集事件数据时。图\
  \ 6-2 显示了默认情况下可用的模板列表。\n\n![图 6-2.1](img/index-99_1.png)\n![图 6-2.2](img/index-99_2.png)\n\
  \n**图 6-2.** 扩展事件附带的默认模板\n\n当您在 GUI 中创建扩展事件并选择模板时，您将获得每个模板功能的描述，如图 6-3 所示。\n\n**图\
  \ 6-3.** 默认模板描述\n\n对于使用扩展事件进行审计，我们不会使用这些模板，但它们对于理解如何捕获事件很有用。\n\n您可以通过导出会话来创建自定义模板。如果您知道您将反复使用自定义的扩展事件会话，那么将其添加为模板可能是有意义的。您可以通过在\
  \ SSMS 中右键单击会话并选择“导出会话”来导出会话，如图 6-4 所示。\n\n![图 6-4.1](img/index-100_1.png)\n![图\
  \ 6-4.2](img/index-100_2.png)\n\n**图 6-4.** 导出扩展事件会话\n\n只要您将模板 XML 文件存储在默认位置，类似于\
  \ `C:\\Users\\[user]\\Documents\\SQL Server Management Studio\\Templates\\XEventTemplates`，它就应该自动出现在模板列表中，如图\
  \ 6-5 所示。\n\n**图 6-5.** 用户创建的模板\n\n如果您没有在“用户模板”下看到它，可以在“模板”下拉列表中选择 `<From File…>`，如图\
  \ 6-6 所示。\n\n![图 6-6.1](img/index-101_1.jpg)\n![图 6-6.2](img/index-101_2.jpg)\n\n\
  **图 6-6.** 导入模板\n\n### 扩展事件库\n\n扩展事件中的事件库非常广泛。它使您能够捕获 SQL Server 中发生的事件。\n\n包是扩展事件对象的容器。有许多类型的包。包可以包括通道、类别和事件，所有这些都将在本节中介绍。图\
  \ 6-7 显示了扩展事件中可用的包。\n\n**图 6-7.** 扩展事件包下拉列表\n\n![图 6-7](img/index-102_1.jpg)\n\n\
  ### 注意\n\n有关包及其内容的更多信息，请访问：[`docs.microsoft.com/en-us/sql/relational-databases/extended-events/sql-server-extended-events-packages?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/relational-databases/extended-events/sql-server-extended-events-packages?view=sql-server-ver15)\n\
  \n有四种事件通道有助于将事件组织成逻辑组。图 6-8 显示了作为扩展事件设置一部分的通道下拉列表。默认情况下，“调试”是未选中的。\n\n**图 6-8.**\
  \ 扩展事件通道下拉列表\n\n这四种事件通道是：\n- **管理** – 主要针对最终用户、管理员和支持人员\n- **操作** – 用于分析和诊断问题或事件\n\
  - **分析** – 描述程序操作，通常用于性能调查\n- **调试** – 仅供开发人员用于诊断和调试问题\n\n\n事件有许多类别。图 6-9 展示了扩展事件库中可用类别的一个横截面。\n\
  \n![](img/index-103_1.png)\n\n![](img/index-103_2.jpg)\n\n## 第 6 章 什么是扩展事件？\n\n\
  *图 6-9. 扩展事件类别下拉列表*\n\n下面列出的事件是我推荐用于审核用户操作的事件。你也可以选择使用其他事件，但以下这些事件是我总是在扩展事件审核中使用的：\n\
  \n* `rpc_completed`\n* `sql_batch_completed`\n\n你无需筛选类别、通道或包下拉列表来使用这些事件。你可以在如图 6-10\
  \ 所示的搜索框中搜索它们。事件将在\"名称\"下列出。\n\n*图 6-10. 在事件库中搜索事件*\n\n### 扩展事件的全局字段与谓词\n\n对于你选择的每个事件，你都需要选择全局字段来捕获事件数据。全局事件也称为操作。当你首次选择一个事件包含到扩展事件会话中时，默认会显示\
  \ 0 个全局字段，如图 6-11 所示。但这并不意味着它不会捕获任何信息，因为有些字段是默认捕获的。全局字段让你能更好地控制你要捕获的内容。\n\n![](img/index-104_1.jpg)\n\
  \n![](img/index-104_2.png)\n\n## 第 6 章 什么是扩展事件？\n\n*图 6-11. 未选择任何全局字段的已选扩展事件*\n\n\
  你需要点击配置按钮来查看所选事件的全局字段，如图 6-11 所示。\n\n点击配置后，你将进入一个配置屏幕，在那里可以选择你的全局字段。图 6-12 向你展示了\
  \ `rpc_completed` 及其相关的全局字段。\n\n*图 6-12. 未选择任何全局字段的扩展事件 `rpc_completed`*\n\n我推荐使用这些全局字段来捕获你的事件所需的信息：\n\
  \n* `client_app_name`\n* `client_hostname`\n* `database_name`\n* `server_instance_name`\n\
  * `server_principal_name`\n* `sql_text`\n\n![](img/index-105_1.jpg)\n\n## 第 6 章\
  \ 什么是扩展事件？\n\n同时请注意图 6-12 中有一个筛选器选项卡。筛选器也称为谓词。在这里，你可以筛选你的扩展事件，仅捕获特定的用户、数据库、架构、对象等等。一旦你为所选事件设置了筛选器，它会在筛选器符号下显示一个勾选标记，如图\
  \ 6-13 所示。你还会看到闪电图标下显示数字 6，因为我为每个事件选择了六个全局字段。\n\n*图 6-13. 带有筛选器的扩展事件 `rpc_completed`*\n\
  \n你还需要将此筛选器添加到 `sql_batch_completed` 事件中，以确保你在所有事件中应用相同的筛选器。你可以基于许多不同的字段进行筛选。如何设置带有这些设置的扩展事件将在第\
  \ 7 章\"通过 GUI 实现扩展事件\"中介绍。\n\n#### 扩展事件目标\n\n你需要为你的扩展事件选择一个目标。此目标类型将存储你的会话数据。这可以在\"\
  数据存储\"页面下设置，如图 6-14 所示。\n\n![](img/index-106_1.png)\n\n## 第 6 章 什么是扩展事件？\n\n*图 6-14.\
  \ 扩展事件的目标选项*\n\n存储位置有多个选择。这些位置会根据你的 SQL Server 版本而有所不同。\n\n* **`etw_classic_sync_target`**\
  \ – 与 Windows 事件跟踪(ETW)协同工作以监控系统活动。\n* **`event_counter`** – 统计每个指定事件发生的次数。\n* **`event_file`**\
  \ – 将事件会话输出从缓冲区写入磁盘文件。\n* **`histogram`** – 比 `event_counter` 目标更高级。\n* **`pair_matching`**\
  \ – 检测没有相应结束事件的开始事件。\n* **`ring_buffer`** – 适用于快速简单的事件测试。将数据保存在\n\n\n\n以内存先进先出的方式进行。当您停止事件会话时，存储的输出将被丢弃。\n\
  \n`注意` 有关目标的更多信息，请访问 [`docs.microsoft.com/en-us/sql/relational-databases/extended-events/targets-for-extended-events-in-sql-server?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/relational-databases/extended-events/targets-for-extended-events-in-sql-server?view=sql-server-ver15)\n\
  \n![](img/index-107_1.png)\n\n## 第 6 章 什么是扩展事件？\n\n如何使用 `event_file` 目标设置扩展事件将在[第\
  \ 7 章](https://doi.org/10.1007/978-1-4842-8634-0_7) \"通过 GUI 实现扩展事件\"中介绍。\n\n####\
  \ 扩展事件高级设置\n\n在扩展事件会话设置的 `高级` 页面上有一些附加设置。这些设置只能在您首次设置扩展事件时更改，之后无法修改。如果您以后需要更改它们，则必须删除并重新创建扩展事件。我从不更改这些设置。如果您决定更改这些设置，请务必非常小心，因为不同的设置可能会导致您的\
  \ SQL Server 出现性能问题。\n\n图 6-15 显示了 `高级` 页面中的设置。这些是默认设置。\n\n***图 6-15.** 扩展事件的高级选项*\n\
  \n您有几个高级选项。最好保留这些选项的默认值，但以下是一些描述，以帮助您理解每个选项的含义。\n\n- `事件保留模式` – 这将决定 SQL Server\
  \ 如何处理事件丢失。如果系统非常繁忙，这会告诉它是否可以接受丢失部分或全部事件数据。\n  - `单个事件丢失` – 这意味着如果系统当时过于繁忙而无法使用扩展事件进行审计，SQL\
  \ Server 将丢失一个事件。\n  - `多个事件丢失` – 这意味着如果系统当时过于繁忙而无法使用扩展事件进行审计，SQL Server 将丢失多个事件。\n\
  \  - `无事件丢失（不推荐）` – 这不会丢失任何事件，但可能会使您的系统过载，尤其是在繁忙时。这就是它不被推荐的原因。\n- `最大分发延迟` – 这会按照指定的间隔将内存刷新到目标。\n\
  \  - `以秒为单位` – 将按照指定的秒数间隔刷新内存。\n  - `无限制` – 仅在缓冲区满时才刷新内存。\n- `最大内存大小` – 最好将其保留为默认的\
  \ 4 MB。最大值不能超过 2 GB，但不建议将其设置在 GB 范围。\n- `最大事件大小` – 最好保留其默认值 0。指定事件允许的最大大小。\n- `内存分区模式`\
  \ – 指定创建事件缓冲区的位置。\n\n`注意` 有关高级设置的更多信息，[请访问 https://docs.microsoft.com/en-us/sql/t-sql/statements/create-event-session-transact-sql?view=sql-server-ver15#with--event_session_options--n-](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-event-session-transact-sql?view=sql-server-ver15#with--event_session_options--n-)\n\
  \n再次强调，最好将这些高级设置保留为默认值，以避免出现问题。\n\n\n"
- "# 第 6 章 什么是扩展事件？\n\n## 扩展事件用例\n\n以下列表为你介绍了一些使用扩展事件进行审计的场景：\n\n### 审计用户的所有操作\n\n\
  - 要捕获的事件：`rpc_completed` 和 `sql_batch_completed`\n- 全局字段：\n    - `client_app_name`\n\
  \    - `client_hostname`\n    - `database_name`\n    - `server_instance_name`\n\
  \    - `server_principal_name`\n    - `sql_text`\n\n这需要在你选择的每个事件上对 `server_principal_name`\
  \ 设置筛选器。\n\n### 审计特定数据库中的所有活动\n\n- 要捕获的事件：`rpc_completed` 和 `sql_batch_completed`\n\
  - 全局字段：\n    - `client_app_name`\n    - `client_hostname`\n    - `database_name`\n\
  \    - `server_instance_name`\n    - `server_principal_name`\n    - `sql_text`\n\
  \n这需要在你选择的每个事件上对 `database_name` 设置筛选器，但请谨慎使用，因为它会产生大量审计数据。我通常只在试图确认某个数据库是否不再使用时才这样做。\n\
  \n### 审计数据库服务器上的所有活动\n\n- 要捕获的事件：`rpc_completed` 和 `sql_batch_completed`\n- 全局字段：\n\
  \    - `client_app_name`\n    - `client_hostname`\n    - `database_name`\n    -\
  \ `server_instance_name`\n    - `server_principal_name`\n    - `sql_text`\n\n这不需要设置筛选器，但请谨慎使用，因为它会产生大量审计数据。我通常只在试图确认某个\
  \ SQL Server 是否不再使用时才这样做。\n\n### 审计使用存储过程或表的所有人\n\n- 要捕获的事件：`rpc_completed`\n- 全局字段：\n\
  \    - `client_app_name`\n    - `client_hostname`\n    - `database_name`\n    -\
  \ `server_instance_name`\n    - `server_principal_name`\n    - `sql_text`\n\n这需要在你选择的每个事件上对\
  \ `object_name` 设置筛选器。\n\n在下一章中，你将学习如何在 SQL Server Management Studio 中设置和配置扩展事件。你还将学习如何查询扩展事件以了解数据库服务器上正在发生的事情。\n\
  \n"
- '# 第 7 章 通过图形用户界面实现扩展事件


  要使扩展事件工作，你需要设置一个会话。第 6 章“什么是扩展事件？”涵盖了构成会话的各个部分。在本章中，你将学习如何在 SQL Server Management
  Studio (`SSMS`) 中设置一个扩展事件。


  **注意** 仅仅因为你可以审计一切，并不意味着你应该这样做。如果你审计所有任何事情，你将很难从海量数据中梳理出有用信息，并且可能会导致系统出现性能问题。


  ## 使用“新建会话向导”选项设置扩展事件


  `新建会话向导` 将帮助你逐步完成扩展事件的设置。图 7-1 展示了如何在 `SSMS` 中创建扩展事件：在“管理”部分下的“扩展事件”中，右键单击“会话”。在此设置过程中，你将学习如何使用扩展事件审计一个用户。


  © Josephine Bush 2022

  J. Bush, *Microsoft SQL Server 和 Azure SQL 实用数据库审计指南*, [`doi.org/10.1007/978-1-4842-8634-0_7`](https://doi.org/10.1007/978-1-4842-8634-0_7#DOI)


  ![](img/index-112_1.png)


  ***图 7-1.** 使用新建会话向导创建扩展事件*


  **注意** 并非所有扩展事件选项都在 `新建会话向导` 中可用；大部分都有，但并非全部。如果你想查看所有可用选项，请改用 `新建会话` 选项。


  选择 `新建会话向导` 后，你将看到一个对话框，它会引导你逐步填写扩展事件的详细信息和选项，如图 7-2 所示。


  ![](img/index-113_1.png)


  ***图 7-2.** 新建会话向导介绍屏幕*


  `介绍` 屏幕为你概述了如何使用扩展事件。单击 `下一步` 将带你进入第一个配置屏幕，即 `设置会话属性`。



  '
- '# 第 7 章：通过 GUI 实现扩展事件


  本章介绍如何使用图形用户界面（GUI）来配置扩展事件。


  如图 7-3 所示，此屏幕要求您为扩展事件会话命名。您还可以选择是否希望在服务器启动时启动该会话。我建议您勾选此框；否则，您的扩展事件将在重启时停止，您必须手动启动它。


  ![](img/index-114_1.png)


  ***图 7-3.** 新建会话向导 - 设置会话属性屏幕*


  ## 设置会话属性


  在**设置会话属性**屏幕上点击**下一步**后，您将看到**选择模板**屏幕，如图 7-4 所示。我选择了**不使用模板**，因为我希望捕获来自一个用户的所有活动，而这些模板大多无法实现这一点。第
  6 章“什么是扩展事件？”更详细地介绍了一些模板。


  ![](img/index-115_1.png)


  ***图 7-4.** 新建会话向导 - 选择模板屏幕*


  ## 选择模板


  在**选择模板**屏幕上点击**下一步**后，您将看到**选择要捕获的事件**屏幕，如图 7-5 所示。在此屏幕上，您将选择 `rpc_completed` 和
  `sql_batch_completed`。这些事件在第 6 章“什么是扩展事件？”中有更详细的介绍。您可以在 `事件库` 文本框中搜索每个事件。选中它们，然后点击右箭头（`>`）将它们移动到
  **选定的事件** 面板。


  ![](img/index-116_1.png)


  ***图 7-5.** 新建会话向导 - 选择要捕获的事件屏幕*


  ## 选择要捕获的事件


  在**选择要捕获的事件**屏幕上点击**下一步**后，您将看到**捕获全局字段**屏幕，如图 7-6 所示。当您首次进入此屏幕时，没有任何选项被勾选。此时，您必须选择要为每个选定事件收集的全局字段。


  ![](img/index-117_1.png)


  ***图 7-6.** 新建会话向导 - 捕获全局字段屏幕*


  ## 捕获全局字段


  我建议使用以下全局字段来捕获您事件所需的信息：

  *   `client_app_name`

  *   `client_hostname`

  *   `database_name`

  *   `server_instance_name`

  *   `server_principal_name`

  *   `sql_text`


  这些全局字段在第 6 章“什么是扩展事件？”中有更详细的介绍。


  如果您不选择任何全局字段，您的扩展事件仍然会收集事件数据，但可能不包含您希望看到的与该事件相关联的所有信息。这就是我喜欢选择特定全局字段的原因，以确保我获取到所需的全局字段。


  ## 设置会话事件筛选器


  在**捕获全局字段**屏幕上点击**下一步**后，您将看到**设置会话事件筛选器**屏幕，如图 7-7 所示。此屏幕加载时，将不设置任何筛选器。您可以在此处筛选扩展事件，以仅捕获特定的用户、数据库、对象等等。我已经设置了一个
  `sqlserver.session_server_principal = sa` 的筛选器。这将确保只审核由 `sa` 执行的操作。当然，您可能希望或需要审核不同的用户或对象。您也可以通过在此屏幕上添加另一行来添加多个筛选器，如图
  7-7 所示。


  ***图 7-7.** 新建会话向导 - 设置会话事件筛选器屏幕*


  如果您需要不同于等于（`=`）的操作符，可以点击 **操作符** 下拉菜单查看所有不同的选择，如图 7-8 所示。您可以将其视作 SQL 查询中的 `WHERE`
  子句。


  ![](img/index-119_1.png)


  ***图 7-8.** 新建会话向导 - 设置会话事件筛选器操作符下拉菜单*


  您可以有多个筛选器。例如，您可以添加另一个关于 `sqlserver.session_server_principal` 的筛选器。



  ### 通过 GUI 实现扩展事件


  `database_name = master`。这样，你只审计 `sa` 在 `master` 数据库上执行的操作。此示例如图 7-9 所示。


  ![](img/index-120_1.png)


  `图 7-9. 新会话向导设置会话事件筛选器（多个筛选器）`


  如果需要添加或删除子句，可以右键单击它们并从弹出菜单中选择选项，如图 7-10 所示。


  ![](img/index-121_1.png)


  `图 7-10. 新会话向导设置会话事件筛选器（修改筛选器）`


  如果选择“切换 NOT 运算符”，你设置的筛选器将变为相反的条件。例如，如果你添加了 `sqlserver.database_name = master`，但随后选择了“切换
  NOT 运算符”，它将捕获除 `master` 之外的所有数据库，如图 7-11 所示。感叹号 (`!`) 表示此筛选器已切换为“非”模式。


  ![](img/index-122_1.jpg)


  `图 7-11. 新会话向导设置会话事件筛选器（切换 NOT 运算符）`


  你还可以通过选择多行并选择“分组子句”来将子句分组在一起。这些行随后将用方括号 (``) 连接，如图 7-12 所示。


  ![`图 7-12. 新会话向导设置会话事件筛选器（分组子句）`在“设置会话事件筛选器”屏幕上单击“下一步”后，你将看到“指定会话数据存储”屏幕。你将在此处设置存储选项。这是新会话向导比新建会话对话框设置更有限的地方。本章后面将介绍“新建会话”选项。新会话向导只有两种存储选项：文件和环形缓冲区，如图
  7-13 所示。我倾向于将事件存储在文件中，因此选择了该选项。![](img/index-124_1.png)


  `图 7-13. 新会话向导（指定会话数据存储屏幕）`


  以下是一些关于文件存储的建议：

  *   不要将文件存储在 C 盘或其他 SQL Server 用于数据和日志文件的驱动器上。

  *   将最大文件大小设置为较小的值，例如 10 MB，并启用 5-10 个文件的文件滚动。如果设置了较大的文件大小和许多滚动文件，它们将几乎无法查询。


  你还可以将数据存储在环形缓冲区中，或仅使用环形缓冲区。环形缓冲区更难查询，因为它以 XML 格式存储。使用文件，你可以更好地控制数据保留时间，而使用环形缓冲区，你可能会在意识到之前就丢失数据，因为环形缓冲区只存储一定数量的事件，并且这些事件可能来自你正在设置的此扩展事件之外的其他事件。


  ![](img/index-125_1.png)


  在“指定会话数据存储”屏幕上单击“下一步”后，你将看到“摘要”屏幕。这将概述你选择的所有设置。此屏幕还有一个“脚本”按钮，因此你可以将所有设置编写为脚本。图 7-14
  显示了摘要的展开视图。


  `图 7-14. 新会话向导（摘要）`


  ![](img/index-126_1.png)


  要创建扩展事件，请单击“完成”。扩展事件将被设置，你将获得在创建后启动它的选项，并可以在屏幕上实时查看数据，如图 7-15 所示。


  `图 7-15. 新会话向导（创建事件会话屏幕）`


  图 7-15 中的这些选项默认情况下均未选中。最佳实践是在创建后启动会话。这不是必需的，但如果会话停止，则不会收集任何事件数据。此外，此时你可以实时在屏幕上查看数据，也可以稍后查看该数据，本章后面将对此进行介绍。



