  \n`图 15-20.` 立即使用新选项组修改 RDS 实例\n\n![](img/index-282_1.jpg)\n\n![](img/index-282_2.jpg)\n\
  \n**注意**：立即应用可能会导致您的数据库在更改应用期间暂时不可用。\n\n点击返回到 RDS 实例的**配置**页面。您将看到新选项组的状态为`待应用`，如`图\
  \ 15-21`所示。\n\n`图 15-21.` 选项组待应用\n\n在数据库列表页面上，您将看到数据库的状态为`正在修改`，如`图 15-22`所示。\n\n\
  `图 15-22.` RDS 实例正在修改以应用新选项组\n\n一旦数据库状态变为`可用`，您就可以继续设置 SQL Server 审计。\n\n## 设置 SQL\
  \ Server 审计\n\n在 RDS 实例上设置 SQL Server 审计时，需要遵循一些准则。这些是本书前几章中关于 SQL Server 审计的任何其他指导之外的补充要求。\n\
  \n*   不要在服务器审计名称中使用 `RDS_` 作为前缀。\n*   对于 `FILEPATH`，请指定为 `D:\\rdsdbdata\\SQLAudit`。这是\
  \ AWS 要求的路径，其他任何路径都不行。\n*   对于 `MAXSIZE`，请指定一个介于 2 MB 和 50 MB 之间的大小。\n*   不要配置 `MAX_ROLLOVER_FILES`\
  \ 或 `MAX_FILES`。这是不允许的，如果您尝试配置将会收到错误。请将 `MAX_ROLLOVER_FILES` 保留设置为 `2147483647`。完全不要使用\
  \ `MAX_FILES`。这就是为什么特别重要的一点是，不要审计所有内容。审计文件越多，查询审计数据就越困难。\n*   不要配置 SQL Server 在无法写入审计记录时关闭数据库实例。我通常也不建议这样做，但在\
  \ AWS 中绝对不要这样做。\n\n**注意**：RDS 中的 SQL Server 审计功能适用于任何版本的 SQL Server，包括 Express 版。\n\
  \n要设置 SQL Server 审计，您需要使用 SSMS 连接到您的 RDS 实例。我建议使用`清单 15-1`中的脚本来设置审计。\n\n`清单 15-1.`\
  \ 创建服务器审计\n```sql\nUSE [master];\n\nCREATE SERVER AUDIT [AuditSpecification]\nTO\
  \ FILE\n(   FILEPATH = N'D:\\rdsdbdata\\SQLAudit\\'\n    ,MAXSIZE = 10 MB\n    ,MAX_ROLLOVER_FILES\
  \ = 2147483647\n    ,RESERVE_DISK_SPACE = OFF\n) WITH (QUEUE_DELAY = 1000, ON_FAILURE\
  \ = CONTINUE)\nWHERE ([database_name]<>'rdsadmin');\n```\n\n接下来，您需要设置一个服务器或数据库审计规范，以便收集审计数据，如`清单\
  \ 15-2`所示。\n\n`清单 15-2.` 创建服务器审计规范\n```sql\nUSE [master];\n\nCREATE SERVER AUDIT\
  \ SPECIFICATION [ServerAuditSpecification]\nFOR SERVER AUDIT [AuditSpecification]\n\
  ```\n\n\n"
- "# 第 15 章 其他云提供商审计选项\n\n## 审计组\n要配置审计，可以使用 `ADD` 语句添加各种操作组：\n\n- `ADD (DATABASE_OBJECT_ACCESS_GROUP)`\n\
  - `ADD (SCHEMA_OBJECT_ACCESS_GROUP)`\n- `ADD (DATABASE_ROLE_MEMBER_CHANGE_GROUP)`\n\
  - `ADD (SERVER_ROLE_MEMBER_CHANGE_GROUP)`\n- `ADD (AUDIT_CHANGE_GROUP)`\n- `ADD\
  \ (DBCC_GROUP)`\n- `ADD (DATABASE_PERMISSION_CHANGE_GROUP)`\n- `ADD (SCHEMA_OBJECT_PERMISSION_CHANGE_GROUP)`\n\
  - `ADD (SERVER_OBJECT_PERMISSION_CHANGE_GROUP)`\n- `ADD (SERVER_PERMISSION_CHANGE_GROUP)`\n\
  - `ADD (DATABASE_CHANGE_GROUP)`\n- `ADD (DATABASE_OBJECT_CHANGE_GROUP)`\n- `ADD\
  \ (DATABASE_PRINCIPAL_CHANGE_GROUP)`\n- `ADD (SCHEMA_OBJECT_CHANGE_GROUP)`\n- `ADD\
  \ (SERVER_OBJECT_CHANGE_GROUP)`\n- `ADD (SERVER_PRINCIPAL_CHANGE_GROUP)`\n- `ADD\
  \ (SERVER_OPERATION_GROUP)`\n- `ADD (APPLICATION_ROLE_CHANGE_PASSWORD_GROUP)`\n\
  - `ADD (LOGIN_CHANGE_PASSWORD_GROUP)`\n- `ADD (SERVER_STATE_CHANGE_GROUP)`\n- `ADD\
  \ (DATABASE_OWNERSHIP_CHANGE_GROUP)`\n- `ADD (SCHEMA_OBJECT_OWNERSHIP_CHANGE_GROUP)`\n\
  - `ADD (SERVER_OBJECT_OWNERSHIP_CHANGE_GROUP)`\n- `ADD (USER_CHANGE_PASSWORD_GROUP)`\n\
  \n`WITH (STATE = ON)`\n\n清单 15-2 中的服务器审计将仅捕获架构和权限变更。这将使您的审计文件更小，数量更少。\n\n## 查询 SQL\
  \ Server 审计数据\n在每个文件达到其最大大小之前，它将存储在数据库实例上。这些审计文件存储在 `D:\\rdsdbdata\\SQLAudit\\`\
  \ 中。一旦文件达到最大大小，它将被上传到 S3。此时，该文件会被移入名为 `transmitted` 的保留文件夹。然后，您的审计文件将存储在 `D:\\rdsdbdata\\\
  SQLAudit\\transmitted` 中。\n\n要查询审计数据，请使用清单 15-3 中的脚本。\n\n**清单 15-3.** 查询尚未传输到 S3\
  \ 的审计数据\n\n```sql\nSELECT DISTINCT\n    event_time,\n    aa.name as audit_action,\n\
  \    statement,\n    succeeded,\n    database_name,\n    server_instance_name,\n\
  \    schema_name,\n    session_server_principal_name,\n    server_principal_name,\n\
  \    object_Name,\n    file_name,\n    client_ip,\n    application_name,\n    file_name\n\
  FROM msdb.dbo.rds_fn_get_audit_file('D:\\rdsdbdata\\SQLAudit\\*.sqlaudit', default,\
  \ default) af\nINNER JOIN sys.dm_audit_actions aa\n    ON aa.action_id = af.action_id\n\
  WHERE event_time > DATEADD(HOUR, -1, GETDATE())\nORDER BY event_time DESC;\n```\n\
  \n**提示：** AWS 在审计功能方面做得很好，尽可能地模仿了 SQL Server 的行为。您可以使用 `*.sqlaudit` 一次性查询所有审计文件。在\
  \ Azure SQL 数据库托管实例中查询审计数据则较为困难，因为您必须知道文件的确切名称。在 Azure SQL 数据库托管实例中，您无法使用 `*.sqlaudit`\
  \ 一次性查询所有文件。\n\n即使按照清单 15-1 和 15-2 设置了审计，它仍会捕获大量在后台发生的操作。您需要对其进行过滤。可能会存在类似 `WORKGROUP\\\
  EC2AMAZ-QG7G9L3$` 的用户，具体取决于您的实例。\n\n## 过滤审计数据\n您需要过滤掉该用户，以避免审计数据过多的问题。您可能还会看到大量\
  \ `sys` 架构的活动，而这些您无需审计。此外，`rdsa` 可能会被大量审计，其中很多是您不需要审计的后台操作。您需要的过滤器将取决于您看到的、使审计变得杂乱的内容。清单\
  \ 15-4 提供了一种过滤审计的方法。\n\n**清单 15-4.** 过滤您的审计\n\n```sql\nUSE [master];\nALTER SERVER\
  \ AUDIT [AuditSpecification] WITH (STATE = OFF);\n\nALTER SERVER AUDIT [AuditSpecification]\n\
  WHERE [database_name] <> 'rdsadmin'\n    AND session_server_principal_name <> 'WORKGROUP\\\
  EC2AMAZ-QG7G9L3$'\n    AND schema_name <> 'sys'\n    AND server_principal_name <>\
  \ 'rdsa';\n\nALTER SERVER AUDIT [AuditSpecification] WITH (STATE = ON);\n```\n\n\
  如果您需要查询已经移动到 S3 的审计数据，则需要像清单 15-5 那样更改您的查询。与清单 15-3 的唯一区别在于文件名路径。\n\n**清单 15-5.**\
  \ 查询已传输到 S3 的审计数据\n\n```sql\nSELECT DISTINCT\n    event_time,\n    aa.name as audit_action,\n\
  \    statement,\n    succeeded,\n```\n\n\n"
- "# 第 15 章 其他云提供商审计选项\n\n我的建议是在审计数据仍处于数据库实例中、尚未传输到 S3 时进行查询。如果你按照清单 15-2 的方式设置服务器审计，并像清单\
  \ 15-4 那样添加适当的过滤器，那么你不会产生大量的审计数据。你可能可以每小时收集一次，而不会丢失任何审计数据。确保不丢失审计数据的最佳方法是密切关注其收集速度。然后，你可以根据这个速度来设置查询计划。\n\
  \n**注意** 有关 RDS 中 SQL Server 审计的更多信息，请访问 https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/Appendix.SQLServer.Options.Audit.html\n\
  \n值得高兴的是，AWS RDS 允许你使用 SQL Server 代理和链接服务器。你可以像第 11 章“集中审计数据”中那样进行集中化设置。这将使查询和报告多个\
  \ RDS 实例变得更加容易。\n\n#### AWS RDS 扩展事件\n\n在 AWS RDS 中使用扩展事件相当简单。主要需要注意的是文件名。你必须将扩展事件放在路径\
  \ `D:\\rdsdbdata\\Log\\` 中，就像我在清单 15-6 中所做的那样。\n\n***清单 15-6.*** 在 RDS 中设置扩展事件\n\
  \n```sql\nCREATE EVENT SESSION [auditxel] ON SERVER\nADD EVENT sqlserver.rpc_completed(\n\
  \    ACTION(\n        sqlserver.client_app_name,\n        sqlserver.client_hostname,\n\
  \        sqlserver.database_name,\n        sqlserver.sql_text,\n        sqlserver.username\n\
  \    )\n    WHERE ([sqlserver].[username]=N'josephine')\n),\nADD EVENT sqlserver.sql_batch_completed(\n\
  \    ACTION(\n        sqlserver.client_app_name,\n        sqlserver.client_hostname,\n\
  \        sqlserver.database_name,\n        sqlserver.sql_text,\n        sqlserver.username\n\
  \    )\n    WHERE ([sqlserver].[username]=N'josephine')\n)\nADD TARGET package0.event_file\n\
  (\n    SET filename=N'D:\\rdsdbdata\\Log\\auditxel',\n    max_file_size=(10),\n\
  \    max_rollover_files=(5)\n)\nWITH (\n    MAX_MEMORY=4096 KB,\n    EVENT_RETENTION_MODE=ALLOW_SINGLE_EVENT_LOSS,\n\
  \    MAX_DISPATCH_LATENCY=30 SECONDS,\n    MAX_EVENT_SIZE=0 KB,\n    MEMORY_PARTITION_MODE=NONE,\n\
  \    TRACK_CAUSALITY=OFF,\n    STARTUP_STATE=ON\n);\n\nALTER EVENT SESSION [auditxel]\
  \ ON SERVER STATE=START;\n```\n\n**注意** 扩展事件仅在企业版和标准版上有效。\n\n要查询你的扩展事件，请使用清单 15-7\
  \ 中的脚本。\n\n***清单 15-7.*** 在 RDS 中查询扩展事件数据\n\n```sql\nSELECT\n    n.value('(@timestamp)[1]',\
  \ 'datetime') as timestamp,\n    n.value('(action[@name=\"sql_text\"]/value)[1]',\
  \ 'nvarchar(max)') as [sql],\n    n.value('(action[@name=\"client_hostname\"]/value)[1]',\
  \ 'nvarchar(50)') as [client_hostname],\n    n.value('(action[@name=\"username\"\
  ]/value)[1]', 'nvarchar(50)') as [user],\n    n.value('(action[@name=\"database_name\"\
  ]/value)[1]', 'nvarchar(50)') as [database_name],\n    n.value('(action[@name=\"\
  client_app_name\"]/value)[1]', 'nvarchar(50)') as [client_app_name]\nFROM\n    (SELECT\
  \ CAST(event_data as XML) as event_data\n     FROM sys.fn_xe_file_target_read_file('D:\\\
  rdsdbdata\\log\\auditxel*.xel', NULL, NULL, NULL)) as ed\nCROSS APPLY ed.event_data.nodes('event')\
  \ as q(n)\nWHERE n.value('(@timestamp)[1]', 'datetime') >= DATEADD(HOUR, -4, GETDATE())\n\
  ORDER BY timestamp DESC;\n```\n\n**提示** AWS 在 Xevents 方面做得很好，尽可能地模仿了 SQL Server。\n\
  \n\n\n## 15 其他云提供商审计选项\n\n在 Azure SQL 数据库和托管实例中查询 Xevent 数据更为困难，因为你必须知道文件的确切名称。无法使用\
  \ `*.xel` 来一次性查询所有文件。\n\n来自清单 15-7 w 的结果将类似于图 15-23. 中的结果。\n\n**图 15-23.** 扩展事件查询结果示例\n\
  \n**注意** 有关 RDS 中扩展事件的更多信息，请访问 [`aws.amazon.com/blogs/database/set-up-extended-events-in-amazon-rds-for-sql-server/`](https://aws.amazon.com/blogs/database/set-up-extended-events-in-amazon-rds-for-sql-server/)\n\
  \n### 审计 Google Cloud SQL 数据库\n\nGoogle Cloud 提供了一项名为 Cloud SQL 的服务，允许你设置完全托管的 SQL\
  \ Server。此服务不支持 SQL Server 审计或扩展事件。\n\n**注意** 有关 Cloud SQL 的更多信息，请访问 [`cloud.google.com/sql/docs/features#sqlserver`](https://cloud.google.com/sql/docs/features#sqlserver)\n\
  \n可以通过 Google Cloud 门户审计 Cloud SQL，但这无法模拟 `SQL Server Audit` 或 `Extended events`\
  \ 的功能。它只会让你访问 SQL Server 日志。\n\n因此，如果你希望拥有任何审计功能，我建议在 Google Cloud 中使用虚拟机。\n\n请参阅附录\
  \ [A](https://doi.org/10.1007/978-1-4842-8634-0_16) 以获取审计选项的比较和概述。它将提供用例、优点和缺点，并会链接回各章节以获取更多信息。\n\
  \n## 附录 A\n\n### 数据库审计选项比较\n\n本章快速回顾了审计选项，并为每个审计选项提供了用例、优点和缺点，并引用了具体章节以获取更多信息。\n\
  \n#### 审计选项\n\n*   **SQL Server 审计** – 这项内置的 SQL Server 审计功能可以通过 `SQL Server Management\
  \ Studio` 或 SQL 脚本来设置审计。此功能便于查看 SQL Server 上发生的变化。要使 SQL Server 审计正常工作，根据你要审计的内容，你需要两到三个组件。服务器审计规范通常用于审计服务器级更改和/或所有数据库。数据库审计规范则适用于审计一个数据库或一个数据库中的部分活动。\n\
  *   **扩展事件** – 这项内置的 SQL Server 审计功能可以通过 `SQL Server Management Studio` 或 SQL 脚本来设置审计。它的审计功能不如\
  \ `SQL Server Audit` 细致；因此，如果你希望审计用户或数据库的部分活动，那么最好使用 `SQL Server Audit`。要使扩展事件正常工作，你需要设置一个会话。这是唯一必需的部分，不像\
  \ `SQL Server Audit` 需要两到三个部分。\n*   **变更数据捕获** – 此功能使用 `SQL Server Agent` 跟踪对表所做的\
  \ DML 更改。这使你能够查看对数据所做的更改，其细节以易于使用的格式呈现。这对于提取、转换和加载（ETL）应用程序或过程特别有用。\n*   **变更跟踪**\
  \ – 此功能是一种跟踪 DML 更改的轻量级方法。这通常被应用程序用于查询数据库更改。\n*   **C2 和通用标准合规性** – 此功能是\n\n© Josephine\
  \ Bush 2022\n\nJ. Bush, *Practical Database Auditing for Microsoft SQL Server and\
  \ Azure SQL*, [`doi.org/10.1007/978-1-4842-8634-0_16`](https://doi.org/10.1007/978-1-4842-8634-0_16#DOI)\n\
  \n\n\n### 附录 A：数据库审计选项比较\n\n国际公认在审计时遵循特定安全准则。此类审计是对数据库服务器上所有活动进行全面的日志记录。如果没有审计员要求你开启此功能，请保持关闭。它可能对服务器性能产生重大影响。\n\
  \n*   **成功和失败登录审计** – `SQL Server 审计`和扩展事件都允许你审计成功和失败的登录。你将需要一个审计来存储审计数据，以及一个服务器审计规范来收集登录信息。\n\
  \n*   **触发器**\n    *   可以设置**服务器触发器**来阻止人员在特定时间更改数据库或登录。\n    *   可以设置 **DDL 触发器**来阻止某些操作的发生，例如\
  \ `CREATE`、`ALTER`、`DROP`、`GRANT`、`DENY` 或 `REVOKE`。它们可以响应这些操作执行另一个操作，或者记录这些操作。\n\
  \    *   可以设置 **DML 触发器**来阻止或响应 `INSERT`、`UPDATE` 或 `DELETE` 语句执行另一个操作。\n\n*   **云审计**\n\
  \    *   **Azure SQL 数据库** – 通过 Azure 门户使用 `SQL Server 审计`功能或使用扩展事件。\n    *   **Azure\
  \ 托管实例** – 通过 Azure 门户的诊断设置、`SQL Server 审计`或扩展事件。\n    *   **AWS RDS** – 使用 `SQL\
  \ Server 审计`和扩展事件。\n    *   **Google Cloud** – 仅在 VM 上。\n\n**注意：** 任何审计技术都可能使你的服务器过载，具体取决于你用它审计的内容量。最好的情况是你无法筛选所有数据，最坏的情况是你的生产服务器过载。始终牢记根据你的具体情况执行最少量的必要审计。\n\
  \n#### 审计选择的优缺点\n\n**优缺点**\n\n| **技术** | **优点** | **缺点** |\n| :--- | :--- | :---\
  \ |\n| **SQL Server 审计** | 易于捕获非常具体的审计事件。<br>无需解析 XML。 | 比 XEvents 设置更复杂。<br>没有模板指导。\
  \ |\n| **扩展事件 (XEvents)** | 通过模板易于上手。<br>如果你用过 SQL 跟踪或 Profiler 会感觉熟悉。 | 需要解析 XML\
  \ 来查询结果。 |\n| **变更数据捕获 (CDC)** | 对 ETL 流程有用。<br>允许你查看数据变更前后的状态。 | 在大型、繁忙的表上，性能和存储可能成为问题。\
  \ |\n| **变更跟踪** | 对应用程序跟踪数据库表上的变更很有用。 | 在大型、繁忙的表上，性能可能成为问题。<br>数据库需要快照隔离级别以保持一致性。<br>表需要有主键。<br>无法查看变更发生的次数或每次变更的值。\
  \ |\n| **C2 和通用准则合规性** | 国际公认在审计时遵循特定安全准则。 | 它可能对服务器性能产生**非常重大**的影响。 |\n| **Azure\
  \ SQL 数据库审计** | 在 Azure 门户中易于设置。<br>通过 PowerShell 易于集中到 Log Analytics。 | 默认审计策略审计所有内容，但你可以修改它。<br>需要在\
  \ Kusto 中查询审计数据。 |\n| **Azure SQL 数据库扩展事件** | 工作方式与 SQL Server 扩展事件非常相似。 | 需要使用存储账户。<br>难以查询多个\
  \ `.xel` 文件。 |\n| **Azure SQL 托管实例诊断设置** | 在 Azure 门户中易于设置。<br>易于集中到 Log Analytics。\
  \ | 需要在 Kusto 中查询审计数据。 |\n| **Azure SQL 托管实例扩展事件** | 工作方式与 SQL Server 扩展事件完全相同。\
  \ | 与 SQL Server XEvents 相同的缺点。<br>难以查询多个 `.xel` 文件。 |\n| **Azure SQL 托管实例 SQL Server\
