- "# 第 15 章 其他云提供商审计选项\n\n**注意**，如果您已经有一个选项组在处理数据库备份，您可以将审计功能添加到其中。\n\n要创建一个新的选项组，请搜索并点击\
  \ RDS。您需要知道数据库引擎及其版本才能创建新的选项组。首先，让我们查看一下您的 RDS 实例的引擎。点击您的 RDS 实例。在\"摘要\"部分，您将看到引擎信息，如图\
  \ 15-5 所示。请记下该引擎。然后点击图 15-5 中所示的\"配置\"。\n\n***图 15-5.** RDS 配置*\n\n![](img/index-274_1.png)\n\
  \n![](img/index-274_2.png)\n\n记下您的引擎版本，如图 15-6 所示。\n\n***图 15-6.** 引擎版本*\n\n要设置一个新的选项组，请点击图\
  \ 15-7 中所示的\"选项组\"。\n\n***图 15-7.** 选项组菜单项*\n\n由于我目前只有默认选项组，我将创建一个新的选项组。点击图 15-8\
  \ 中所示的\"创建组\"按钮。\n\n![](img/index-275_1.jpg)\n\n![](img/index-275_2.jpg)\n\n***图\
  \ 15-8.** \"创建组\"按钮*\n\n进入\"创建组\"页面后，您将需要填写四个字段，如图 15-9 所示。\n\n***图 15-9.** 创建选项组设置*\n\
  \n![](img/index-276_1.jpg)\n\n关于\"创建选项组\"页面上的设置：\n\n• **名称** – 您可以随意命名。最好是起一个足够描述性的名字，以便您能知道它的用途。不过，一个组中可以有多个选项，所以您不必在名称中包含\"\
  审计\"。\n\n• **描述** – 用于帮助您确定选项组的内容。\n\n• **引擎** – 选择您从图 15-5 的 RDS 摘要中获得的引擎。\n\n\
  • **主要引擎版本** – 选择您从图 15-6 的引擎版本配置设置中获得的主要引擎版本。\n\n点击\"创建\"。现在您的选项组已准备好添加选项。\n\n\
  ## 将审计选项添加到新的选项组\n\n创建完成后，在列表中点击它，如图 15-10 所示。\n\n***图 15-10.** 点击新的选项组*\n\n向下滚动到\"\
  选项\"框，并点击\"添加选项\"，如图 15-11 所示。\n\n![](img/index-277_1.jpg)\n\n![](img/index-277_2.jpg)\n\
  \n***图 15-11.** \"添加选项\"按钮*\n\n在\"添加选项\"页面上，您需要选择 `SQLSERVER_AUDIT` 和您的 `S3` 存储桶，如图\
  \ 15-12 所示。您可以为 `S3` 存储桶选择一个前缀。如果您不输入前缀，审计文件将被放置在存储桶的根文件夹中。\n\n***图 15-12.** 添加选项设置*\n\
  \n![](img/index-278_1.jpg)\n\n![](img/index-278_2.jpg)\n\n您将需要一个 `IAM` 角色。如果您还没有一个\
  \ `S3` 角色，请立即创建一个。这个角色将允许您的 RDS 实例与存储桶进行通信。在 `IAM` 角色下拉菜单中选择\"创建新角色\"，如图 15-13 所示。\n\
  \n***图 15-13.** 创建新的 `IAM` 角色*\n\n您可以为新角色命名，比如 `AWSServiceS3forRDS`，如图 15-14 所示。\n\
  \n***图 15-14.** 创建 `IAM` 角色名称*\n\n![](img/index-279_1.jpg)\n\n![](img/index-279_2.png)\n\
  \n展开\"其他配置\"部分。保持压缩功能启用，并启用保留设置，如图 15-15 所示。您可以保留 1 到 840 小时的审计日志。如果禁用保留，审计日志在从您的\
  \ RDS 实例卸载后将立即被删除。我将其设置为一周，这样我就可以在那一周过去之前查询所有的审计数据。\n\n***图 15-15.** 压缩和保留设置*\n\n\
  \n\n然后，您可以选择立即应用此更改，或等待维护窗口。\n\n如`图 15-16`所示，点击**添加选项**。\n\n`图 15-16.` 安排并添加选项\n\
  \n![](img/index-280_1.png)\n\n![](img/index-280_2.png)\n\n点击**添加选项**后，您将返回到选项组列表页面。点击您刚创建的选项组，并验证您实施的设置，如`图\
  \ 15-17`所示。\n\n`图 15-17.` 验证新选项组设置\n\n##### 将新选项组添加到 RDS 实例\n\n导航到您的 RDS 实例。您需要修改它以使用这个新的选项组。如`图\
  \ 15-18`所示，点击数据库实例上的**修改**。\n\n`图 15-18.` 修改 RDS 实例\n\n向下滚动到数据库选项设置。将选项组更改为您刚创建的新组，如`图\
  \ 15-19`所示。\n\n![](img/index-281_1.png)\n\n![](img/index-281_2.png)\n\n`图 15-19.`\
