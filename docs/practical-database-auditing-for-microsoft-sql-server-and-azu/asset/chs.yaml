  @step_id=1,

  @cmdexec_success_code=0,

  @on_success_action=1,

  @on_success_step_id=0,

  @on_fail_action=2,

  @on_fail_step_id=0,

  @retry_attempts=3,

  @retry_interval=3,

  @os_run_priority=0, @subsystem=N''TSQL'',

  @command=@stepsql,

  @database_name=N''master'',

  @flags=0

  IF (@@ERROR <> 0 OR @ReturnCode <> 0) GOTO QuitWithRollback


  EXEC @ReturnCode = msdb.dbo.sp_update_job @job_id = @jobId,

  @start_step_id = 1

  IF (@@ERROR <> 0 OR @ReturnCode <> 0) GOTO QuitWithRollback


  EXEC @ReturnCode = msdb.dbo.sp_add_jobschedule @job_id=@jobId,

  @name=N''every 4 hours get audit into from sqlaudit files on disk'',

  @enabled=1,

  @freq_type=4,

  @freq_interval=1,

  @freq_subday_type=8,

  @freq_subday_interval=4,

  @freq_relative_interval=0,

  @freq_recurrence_factor=0,

  @active_start_date=20190812,

  @active_end_date=99991231,

  @active_start_time=0,

  @active_end_time=235959,

  @schedule_uid=N''c68b91ed-4f7f-4fe4-874a-670982cb20cb''

  IF (@@ERROR <> 0 OR @ReturnCode <> 0) GOTO QuitWithRollback


  EXEC @ReturnCode = msdb.dbo.sp_add_jobserver @job_id = @jobId, @server_name =

  N''(local)''

  IF (@@ERROR <> 0 OR @ReturnCode <> 0) GOTO QuitWithRollback


  COMMIT TRANSACTION

  第 11 章 集中化审计数据

  GOTO EndSave


  QuitWithRollback:

  IF (@@TRANCOUNT > 0) ROLLBACK TRANSACTION


  EndSave:

  GO

  ```


  请确保在清单 11-8 的脚本顶部设置你的`@CentralServerName`和`@AuditFilePath`变量。对于 SQL Server 2019，无需更改`@sql`变量。此作业将从一台服务器收集审计数据，并每四小时发送到中央服务器一次。


  要在 SQL Server 2017 中查询审计数据，请修改`@sql`变量并删除`host_name`列，因为该列在 2017 版本中不可用。要在 SQL Server
  2016 中查询审计数据……




  对于 SQL Server 2017 之前的版本，需要修改 `@sql` 变量，并移除 `host_name`、`application_name` 和 `client_ip`
  列，因为这些列在 2017 之前的版本中不可用。


  您还需要一个 SQL Server Agent 作业来清理集中审计数据库中的审计数据，以确保仅保留所需的审计数据量，而不是永久保留。我将其设置为 30 天。您可以选择最适合您需求的时间范围。清单
  11-9 提供了创建此清理代理作业的脚本。


  **清单 11-9.** 用于清理审计数据的 SQL Agent 作业


  ```sql

  USE [msdb]

  GO

  BEGIN TRANSACTION

  DECLARE @ReturnCode INT

  SELECT @ReturnCode = 0

  /****** Object:  JobCategory [[Uncategorized (Local)]]    Script Date: 5/8/2022
  1:53:20 PM ******/

  IF NOT EXISTS (SELECT name FROM msdb.dbo.syscategories WHERE name=N''[Uncategorized
  (Local)]'' AND category_class=1)

  BEGIN

  EXEC @ReturnCode = msdb.dbo.sp_add_category @class=N''JOB'', @type=N''LOCAL'', @name=N''[Uncategorized
  (Local)]''

  IF (@@ERROR <> 0 OR @ReturnCode <> 0) GOTO QuitWithRollback

  END

  DECLARE @jobId BINARY(16)

  EXEC @ReturnCode = msdb.dbo.sp_add_job @job_name=N''Audit Retention Cleanup'', @enabled=1,
  @notify_level_eventlog=0, @notify_level_email=0, @notify_level_netsend=0, @notify_level_page=0,
  @delete_level=0, @description=N''No description available.'', @category_name=N''[Uncategorized
  (Local)]'', @owner_login_name=N''sa'', @job_id = @jobId OUTPUT

  IF (@@ERROR <> 0 OR @ReturnCode <> 0) GOTO QuitWithRollback

  /****** Object:  Step [only retain 30 days of audit data]    Script Date: 5/8/2022
  1:53:20 PM ******/

  EXEC @ReturnCode = msdb.dbo.sp_add_jobstep @job_id=@jobId, @step_name=N''only retain
  30 days of audit data'', @step_id=1, @cmdexec_success_code=0, @on_success_action=1,
  @on_success_step_id=0, @on_fail_action=2, @on_fail_step_id=0, @retry_attempts=0,
  @retry_interval=0, @os_run_priority=0, @subsystem=N''TSQL'', @command=N''USE [Auditing];

  DELETE FROM [dbo].[AuditChanges]

  WHERE event_time <= getdate()-30;'', @database_name=N''master'', @flags=0

  IF (@@ERROR <> 0 OR @ReturnCode <> 0) GOTO QuitWithRollback

  EXEC @ReturnCode = msdb.dbo.sp_update_job @job_id = @jobId, @start_step_id = 1

  IF (@@ERROR <> 0 OR @ReturnCode <> 0) GOTO QuitWithRollback

  EXEC @ReturnCode = msdb.dbo.sp_add_jobschedule @job_id=@jobId, @name=N''nightly
  audit tables retention cleanup'', @enabled=1, @freq_type=4, @freq_interval=1, @freq_subday_type=1,
  @freq_subday_interval=0, @freq_relative_interval=0, @freq_recurrence_factor=0, @active_start_date=20190903,
  @active_end_date=99991231, @active_start_time=230000, @active_end_time=235959, @schedule_uid=N''39b449aa-2c4d-4d05-8a5f-c79598ef52bb''

  IF (@@ERROR <> 0 OR @ReturnCode <> 0) GOTO QuitWithRollback

  EXEC @ReturnCode = msdb.dbo.sp_add_jobserver @job_id = @jobId, @server_name = N''(local)''

  IF (@@ERROR <> 0 OR @ReturnCode <> 0) GOTO QuitWithRollback

  COMMIT TRANSACTION

  GOTO EndSave

  QuitWithRollback:

  IF (@@TRANCOUNT > 0) ROLLBACK TRANSACTION

  EndSave:

  GO

  ```


  一旦将审计数据集中，查询和报告就会容易得多。在下一章中，我将展示如何使用 SQL Server Agent 作业和 PowerShell 对审计数据进行报告。


  '
- "# 第 12 章 从审计数据创建报告\n\n将审计数据集中后，您可能想要对其进行查询和报告。本章将展示如何使用 SQL Server Agent 或 PowerShell\
  \ 创建和发送 HTML 报告。\n\n#### 使用 SQL Server Agent 创建 HTML 报告\n\n由于目标是使用 SQL Server Agent\
  \ 通过电子邮件发送 HTML 报告，因此需要首先配置数据库邮件。\n\n**提示** 有关设置数据库邮件的更多信息，请访问 [`docs.microsoft.com/en-us/sql/relational-databases/database-mail/configure-database-mail?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/relational-databases/database-mail/configure-database-mail?view=sql-server-ver15)。\n\
  \n\n\n[配置数据库邮件?view=sql-server-ver15](https://docs.microsoft.com/en-us/sql/relational-databases/database-mail/configure-database-mail?view=sql-server-ver15)\n\
  \n你可以通过执行清单 12-1 中的脚本来检查是否已经设置了数据库邮件。\n\n## ***清单 12-1.*** 验证任何当前的数据库邮件设置\n\n```sql\n\
  EXEC msdb.dbo.sysmail_help_account_sp;\n```\n\n如果你已经设置了数据库邮件，请记下清单 12-1 中查询返回的名称。在本章稍后设置代理作业时会需要它。\n\
  \n如果你尚未设置数据库邮件，则需要使用清单 12-2 中的脚本来启用数据库邮件 XPs。请注意，在启用数据库邮件之前，你需要将 `show advanced\
  \ options` 设置为 1。\n\n© Josephine Bush 2022\n\nJ. Bush, *Microsoft SQL Server 和 Azure\
  \ SQL 的实用数据库审计*, [`doi.org/10.1007/978-1-4842-8634-0_12`](https://doi.org/10.1007/978-1-4842-8634-0_12#DOI)\n\
  \n第 12 章 从审计数据创建报告\n\n## ***清单 12-2.*** 启用数据库邮件\n\n```sql\nUSE master\nGO\nsp_configure\
  \ 'show advanced options',1\nreconfigure\nGO\nsp_configure 'Database Mail XPs',1\n\
  reconfigure\nGO\n```\n\n现在你已启用数据库邮件，你需要对其进行配置。清单 12-3 提供了一个配置脚本。\n\n## ***清单 12-3.***\
  \ 配置数据库邮件\n\n```sql\nDECLARE @profilename varchar(30);\nDECLARE @emailaddress varchar(100);\n\
  DECLARE @displayname varchar(50);\nDECLARE @mailserver varchar(50);\n\n/* 仅更改这四个变量\
  \ */\nSET @profilename = 'yourdbmailprofilename';\nSET @emailaddress = 'youremail@domain.com';\n\
  SET @displayname = 'yourservername SQL Server Alerting';\nSET @mailserver = 'smtp.domain.com';\n\
  \nIF NOT EXISTS(SELECT * FROM msdb.dbo.sysmail_profile WHERE name =\n'yourdbmailprofilename')\n\
  BEGIN\n    EXECUTE msdb.dbo.sysmail_add_profile_sp\n        @profile_name = @profilename,\n\
  \        @description = '';\nEND\n\nIF NOT EXISTS(SELECT * FROM msdb.dbo.sysmail_account\n\
  \              WHERE name = @profilename)\nBEGIN\n    EXECUTE msdb.dbo.sysmail_add_account_sp\n\
  \        @account_name = @profilename,\n        @email_address = @emailaddress,\n\
  \        @display_name = @displayname,\n        @replyto_address = @emailaddress,\n\
  \        @description = '',\n        @mailserver_name = @mailserver,\n        @mailserver_type\
  \ = 'SMTP',\n        @port = '25',\n        @username = NULL ,\n        @password\
  \ = NULL ,\n        @use_default_credentials = 0 ,\n        @enable_ssl = 0 ;\n\
  END\n\nIF NOT EXISTS(SELECT *\n              FROM msdb.dbo.sysmail_profileaccount\
  \ pa\n              INNER JOIN msdb.dbo.sysmail_profile p\n                  ON\
  \ pa.profile_id = p.profile_id\n              INNER JOIN msdb.dbo.sysmail_account\
  \ a\n                  ON pa.account_id = a.account_id\n              WHERE p.name\
  \ = @profilename\n                  AND a.name = @profilename)\nBEGIN\n    EXECUTE\
  \ msdb.dbo.sysmail_add_profileaccount_sp\n        @profile_name = @profilename,\n\
  \        @account_name = @profilename,\n        @sequence_number = 1 ;\nEND\n```\n\
  \n你只需要更新清单 12-3 脚本顶部的变量：\n\n- `@profilename` – 这是你希望你的数据库邮件配置文件被命名的名称。\n- `@emailaddress`\
  \ – 这将是同时作为发送至和发送自的电子邮件地址。\n- `@displayname` – 这将是使用你的数据库邮件配置文件发送的电子邮件中显示为发件人的名称。例如，你将看到\
  \ `@displayname` 作为发件人，例如 yourservername SQL Server Alerting (youremail@domain.com)，而不是看到\
  \ user@domain.com 作为发件人。\n- `@mailserver` – 你需要用你的邮件服务器地址填写此项，通常是类似 `stmp.domain.com`\
  \ 的地址。\n\n你将在发送每日报告的作业步骤上使用 HTML 格式。作业的完整脚本在清单 12-4 中。\n\n## ***清单 12-4.*** 用于发送每日审计报告的\
  \ SQL Server 代理作业\n\n```sql\nDECLARE @profilename varchar(30);\nDECLARE @mailrecipients\
  \ varchar(100);\n\n/* 仅更改这两个变量 */\nSET @profilename = '''yourdbmailprofilename''';\n\
  SET @mailrecipients = '''youremail@domain.com''';\n```\n\n\n"
- "# 第 12 章 从审计数据创建报告\n\n## 用于审计报告的 SQL Server 代理作业\n\n`/* DON'T CHANGE ANYTHING BELOW\
