- "# 第 5 章 通过 SQL 脚本实现 SQL Server 审计\n\n要让 `SQL Server` `审计` 功能运作起来，你需要两个或三个组件，具体取决于你想要\
  \ `审计` 的内容。第 3 章“什么是 SQL Server 审计？”介绍了这些组件各自是什么，以及与它们相关的 `审计` 类别和组。\n\n\n\n在本章中，你将学习如何使用\
  \ SQL 脚本设置审计。第 [4](https://doi.org/10.1007/978-1-4842-8634-0_4) 章“通过 GUI 实现 SQL\
  \ Server 审计”介绍了如何在 SSMS 中通过 GUI 设置 SQL Server 审计。在本章中，你将学习如何通过脚本设置 SQL Server 审计。\n\
  \n## 脚本化现有规范\n\n学习如何编写审计脚本的一个简单方法是将现有审计脚本化。你可以右键单击在第 [4 章“通过 GUI 实现 SQL Server 审计,”](https://doi.org/10.1007/978-1-4842-8634-0_4)\
  \ 中创建的任何规范，选择 **脚本化审计为**，然后选择 **CREATE 到**，再选择 **新建查询编辑器窗口**，如图 5-1 所示。\n\n***图\
  \ 5-1.** 脚本化现有审计*\n\n© Josephine Bush 2022\nJ. Bush, *Practical Database Auditing\
  \ for Microsoft SQL Server and Azure SQL*, [`doi.org/10.1007/978-1-4842-8634-0_5`](https://doi.org/10.1007/978-1-4842-8634-0_5#DOI)\n\
  \n第 5 章 通过 SQL 脚本实现 SQL Server 审计\n\n这将把你的审计的脚本版本放入 SSMS 的一个选项卡中。本章将介绍这些脚本，以便你能更好地理解如何创建、修改和删除它们。\n\
  \n#### 设置审计\n\n快速回顾一下，要使 SQL Server 审计正常工作，根据你想要审计的内容，你需要两样或三样东西：\n\n*   `你必须创建一个审计。`\
  \ 这将决定审计数据的存储位置、保留多少审计数据以及与审计相关的其他几个设置。\n*   `每个数据库还需要一个服务器和/或一个数据库审计规范来收集审计数据。`\
  \ 服务器和数据库审计规范必须关联到一个审计。每个审计可以有一个服务器审计规范和一个数据库审计规范。这些服务器和数据库审计规范彼此不依赖。服务器审计规范通常适用于审计服务器级更改和/或同时审计所有数据库。数据库审计规范则适用于审计单个数据库或单个数据库中的部分活动。\n\
  \n清单 5-1 展示了如何通过脚本创建审计。\n\n***清单 5-1.*** 创建审计\n\n```sql\nUSE [master];\n\nCREATE\
  \ SERVER AUDIT [AuditSpecification]\nTO FILE\n(   FILEPATH = N'e:\\audits\\'\n \
  \   ,MAXSIZE = 50 MB\n    ,MAX_FILES = 4\n    ,RESERVE_DISK_SPACE = OFF\n) WITH\
  \ (QUEUE_DELAY = 1000, ON_FAILURE = CONTINUE);\n\nALTER SERVER AUDIT [AuditSpecification]\
  \ WITH (STATE = ON);\n```\n\n第 5 章 通过 SQL 脚本实现 SQL Server 审计\n\n让我们看一下清单 5-1 脚本的各个部分：\n\
  \n*   `数据库上下文` – `USE [master];`\n    所有审计都在 master 数据库中创建。\n*   `审计名称` – `CREATE\
  \ SERVER AUDIT [AuditSpecification]`\n    我倾向于将其命名为 `AuditSpecification` 或 `AuditSpecification_servername`。这完全取决于你希望名称有多具描述性。不过，你可以创建多个审计，因此如果你计划添加更多审计，使用更具描述性的名称可能更有意义。\n\
  *   `审计目标`\n    *   `TO FILE` – 我总是选择写入文件，因为这对我来说最简单。我没有很多审计限制。是的，审计员想知道发生了什么，但他们不认为我们会偷偷进去删除审计文件而不报告审计数据。\n\
  \    *   `TO APPLICATION_LOG` – 如果你有像 Splunk 这样读取所有日志并将它们集中存储的应用程序，我可以考虑将审计数据存储在应用程序日志中。与\
  \ `TO FILE` 相比，这个选项可配置的选项更少。下一节将提供一个示例。\n    *   `TO SECURITY_LOG` – 这比写入应用程序日志有更多限制，但概念相同。这是存储审计数据最安全的选择，因为它最不可能被他人篡改。与\
  \ `TO FILE` 相比，这个选项可配置的选项更少。下一节将提供一个示例。\n*   `队列延迟` – `QUEUE_DELAY = 1000`\n\n\n\
  \n"
- '# 第五章 通过 SQL 脚本实现 SQL Server 审核


  这是审核发生前的等待时间（以毫秒为单位）。你可以将其设置为 `0`、`1000` 或大于 `1000` 的某个值。我将其保留为 `1000`。


  ## 审核日志失败时的操作 – `ON_FAILURE`

  *   **`CONTINUE`** – 如果审核无法捕获语句，它将继续审核。不会因为此选项而导致任何语句失败。你可能会偶尔遗漏个别语句，但我怀疑这种情况即使有，也不常发生。

  *   **`FAIL_OPERATION`** – 如果无法进行审核，它将导致该语句执行失败。执行该语句的用户或应用程序将收到错误。

  *   **`SHUTDOWN`** – 如果无法进行审核，它将按描述执行；它将关闭服务器。所有用户和应用程序将无法再访问服务器。


  我在此选项上选择“继续”。我认为“执行失败操作”和“关闭服务器”都过于极端。如果我不选择“继续”，人们会因为服务器出现问题而对我大喊大叫。如果在法律或金融数据库等审核至关重要的场景中，你可能需要选择“执行失败操作”或“关闭服务器”。


  ## 路径 – `FILEPATH`

  `N''e:\audits\''`

  如果你选择了“文件”作为审核目标，你需要指定一个路径。**请确保不要将审核文件放在 C 盘上**。即使我们将在后续步骤中限制审核文件的大小，你也不希望它意外地填满
  C 盘。我也不建议将审核文件放在数据驱动器或日志驱动器上。我工作的地方有一个 E 盘用于存放应用程序；那是放置审核文件的好地方。


  ## 最大文件数 – `MAX_FILES`

  `4`


  ## 最大文件大小 – `MAXSIZE`

  `50 MB`

  我从不让审核收集无限数量的文件或允许无限的文件大小。这会使查询它们变得困难。我发现，对于收集权限和架构更改，4 个文件、每个 50 MB 对我的需求来说是合适的。文件的数量和大小取决于你的需求。


  ## 预留磁盘空间 – `RESERVE_DISK_SPACE`

  `OFF`

  由于我的文件相当小，我将其设置为 `OFF`。


  ## 启用审核

  `ALTER SERVER AUDIT [AuditSpecification] WITH (STATE = ON)`

  你需要启用它，它才会开始收集审核数据。


  **注意** 不要将 SQL Server 审核设置为收集无限文件或允许无限文件大小。它们会变得巨大无比，几乎无法查询。


  如果你想将审核数据存储在应用程序日志中，你需要按照代码清单 5-2 所示设置审核。


  ### 代码清单 5-2. 配置写入应用程序日志的审核

  ```sql

  USE [master];


  CREATE SERVER AUDIT [AuditSpecification]

  TO APPLICATION_LOG

  WITH (QUEUE_DELAY = 1000, ON_FAILURE = CONTINUE);


  ALTER SERVER AUDIT [AuditSpecification] WITH (STATE = ON);

  ```


  如果你想将审核数据存储在安全日志中，你需要按照代码清单 5-3 所示设置审核。


  ### 代码清单 5-3. 配置写入安全日志的审核

  ```sql

  USE [master];


  CREATE SERVER AUDIT [AuditSpecification]

  TO SECURITY_LOG

  WITH (QUEUE_DELAY = 1000, ON_FAILURE = CONTINUE);


  ALTER SERVER AUDIT [AuditSpecification] WITH (STATE = ON);

  ```


  当你尝试启用配置为使用安全日志的审核时，会遇到如代码清单 5-4 所示的错误。


  ### 代码清单 5-4. 创建写入安全日志的审核时出现的错误

  `Msg 33222, Level 16, State 1, Line 7`

  `Audit ''AuditSpecification3'' failed to start. For more information, see the SQL
  Server error log.`


  ![](img/index-78_1.png)

  ![](img/index-78_2.jpg)


  SQL Server 日志将为你提供有关该错误的更多信息，如图 5-2 所示。


  ### 图 5-2. 创建写入安全日志的审核时出现的错误的附加信息


