  审计 Azure SQL 数据库与审计 SQL Server 数据库有很大不同，尤其是在涉及`SQL Server 审计`时。`SQL Server 审计`在`Azure
  SQL Database`中不可用。你需要使用 Azure 门户来设置审计，不能使用`SQL Server 审计`。



