  DECLARE @jobId BINARY(16)

  EXEC @ReturnCode = msdb.dbo.sp_add_job @job_name=N''Audit Changes

  Collection'',

  @enabled=1,

  @notify_level_eventlog=0,

  @notify_level_email=0,

  @notify_level_netsend=0,

  @notify_level_page=0,

  @delete_level=0,

