  如果压缩延迟和筛选非聚集列存储索引无法有效管理针对 OLTP 表的分析工作负载，那么可能是组织逻辑、代码或两者都需要重新审视。


  如果应用程序或数据库代码能够以支持对同一表进行分析和事务处理工作负载的方式进行改进，那么进行这些更改可以使组织避免构建更复杂且昂贵的 OLAP 解决方案。


  最终，任何分析数据挑战都存在解决方案，但理想的解决方案将是成本最低、同时又最易于未来扩展的解决方案。实时运营分析并不适用于所有工作负载，并且通常会存在一些场景，其中更昂贵、资源更密集的解决方案（如
  AlwaysOn 或复制）才是正确的解决方案。


  ## 非聚集列存储索引的 Vertipaq 优化


  第 5 章详细讨论了列存储压缩。一个重要的问题是，当向聚集列存储索引添加非聚集行存储索引时，未来插入的行将无法受益于 Vertipaq 优化。Vertipaq
  优化会对行进行重新排序，而 SQL Server 在压缩行组时，会将相似的值分组在一起，从而实现更有效的压缩。如果没有此功能可用，新插入的数据压缩效率会降低，随着时间的推移，会浪费存储空间和内存。


  一个合乎逻辑的问题是：“非聚集列存储索引是否受益于 Vertipaq 优化？”为了测试这一点并确定是否使用了 Vertipaq 优化，将向 `Sales.Orders`
  表插入新行，如代码清单 12-14 中的查询所示。


  ```sql

  INSERT INTO Sales.Orders

  (   OrderID, CustomerID, SalespersonPersonID, PickedByPersonID, ContactPersonID,
  BackorderOrderID, OrderDate, ExpectedDeliveryDate, CustomerPurchaseOrderNumber,
  IsUndersupplyBackordered, Comments, DeliveryInstructions, InternalComments, PickingCompletedWhen,
  LastEditedBy, LastEditedWhen)

  SELECT

  73595 + ROW_NUMBER() OVER (ORDER BY OrderID) AS OrderID,

  CustomerID,

  SalespersonPersonID,

  PickedByPersonID,

  ContactPersonID,

  BackorderOrderID,

  OrderDate,

  ExpectedDeliveryDate,

  CustomerPurchaseOrderNumber,

  IsUndersupplyBackordered,

  Comments,

  DeliveryInstructions,

  InternalComments,

  PickingCompletedWhen,

  LastEditedBy,

  LastEditedWhen

  FROM Sales.Orders;

  ```

  代码清单 12-14

  向 `Sales.Orders` 插入行以测试 Vertipaq 优化


  此插入操作使表的大小加倍。完成后，可以执行代码清单 12-15 中的查询以确认非聚集列存储索引内行组的当前状态。


  ```sql

  SELECT

  objects.name AS table_name,

  partitions.partition_number,

  dm_db_column_store_row_group_physical_stats.row_group_id,

  dm_db_column_store_row_group_physical_stats.has_vertipaq_optimization,

  dm_db_column_store_row_group_physical_stats.state_desc

  FROM sys.dm_db_column_store_row_group_physical_stats

  INNER JOIN sys.objects

  ON objects.object_id = dm_db_column_store_row_group_physical_stats.object_id

  INNER JOIN sys.partitions

  ON partitions.object_id = objects.object_id

  AND partitions.partition_number = dm_db_column_store_row_group_physical_stats.partition_number

  AND partitions.index_id = dm_db_column_store_row_group_physical_stats.index_id

  WHERE objects.name = ''Orders''

  ORDER BY dm_db_column_store_row_group_physical_stats.row_group_id;

  ```

