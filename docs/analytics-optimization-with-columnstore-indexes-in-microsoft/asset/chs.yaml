- '# 8. 大容量加载数据


  任何分析型数据存储都需要能够快速高效地执行数据加载。大容量加载是一种减少日志记录的处理过程，允许数据直接插入到列存储索引中。这不仅绕过了`delta store`，而且产生的事务大小反映了目标数据的压缩效果，当使用此过程时，大大减少了写入事务日志的数据量。


  ## 大容量加载过程详解


  传统的事务工作负载是完全日志记录的。在完全日志记录模式下，有足够的元数据被写入事务日志，以便 SQL Server 可以从失败的事务中恢复。此外，数据也会被写入事务日志以确保可以进行时间点恢复。


  在 OLTP 场景中，完全日志记录的事务是理想的，因为它们允许在应用程序出现问题时将数据库回滚到特定时间点。此外，时间点恢复允许在需要时对事务细节进行研究和取证。


  有时，事务性写入被有意地细分为更小的批次，以确保每个事务简短、快速，并对相同数据的其他查询造成最小的争用。


  完全日志记录事务的代价是需要向事务日志写入更多数据，这会导致：


  *   事务日志中消耗更多存储空间

  *   事务日志备份文件消耗更多存储空间

  *   处理事务日志备份消耗更多 CPU/内存

  *   写入操作的查询持续时间更长


  分析工作负载在其恢复需求方面有很大不同，因为数据加载往往更大、频率更低且异步进行。当分析数据加载失败时，最常见的应对措施是调查问题、解决它，然后重新运行数据加载。数据加载过程中的时间点恢复不如简单地将恢复点设定在数据加载之前那么重要。因此，OLAP
  数据加载可以极大地受益于最小日志记录的插入操作。


  在列存储索引之外，大容量加载数据仅限于少数写入操作，例如：


  *   `BCP`

  *   大容量插入操作

  *   选择插入操作

  *   分区切换


  由于时间点恢复对事务系统至关重要，任何使用大容量加载的过程都需要有充分的文档记录，以避免在不希望的情况下意外使用。


  列存储索引使用内置的大容量加载过程，自动将较大的批次直接插入到`rowgroup`中，而不使用`delta store`。这极大地提高了大型分析数据加载的插入速度，并减少了这些过程导致的事务日志膨胀。


  ## 向列存储索引进行大容量加载


  决定使用大容量加载过程还是使用`delta store`的临界点是 102,400 行。少于 102,400 行的插入将始终通过完全日志记录的`delta store`进行写入，而
  102,400 行或更多的插入将直接写入列存储索引中的`rowgroup`，绕过`delta store`。这个决策过程如图`8-1`所示。


  ![](img/521866_1_En_8_Fig1_HTML.jpg)

  `图 8-1`

  向列存储索引大容量加载数据的流程判定


  与 SQL Server 中其他类型的最小日志记录插入操作不同，利用大容量加载数据到列存储索引没有先决条件。无需调整隔离级别、使用显式表锁定或调整并行度设置。由于大容量加载数据是大型插入到列存储索引的期望操作，它是默认行为，并在可能时自动使用。


  如果一个插入操作包含超过 2²⁰ (1,048,576) 行，它将按以下方式细分：


  1.  每批 2²⁰ 行将被大容量插入到列存储索引中，直到剩余行数少于 2²⁰ 行。

  2.  如果剩余行数大于或等于 102,400，它也将被大容量插入到列存储索引中。

  3.  如果剩余行数少于 102,400，它将被插入到`delta store`中。


  例如，如果向列存储索引插入 3,000,000 行，它将被分解如下：


  *   2 次大容量加载，每次 1,048,576 行

  *   1 次大容量加载，902,848 行（余数）


  或者，如果发生 2,100,000 行的插入，它将这样处理：


  *   2 次大容量加载，每次 1,048,576 行

  *   2,848 行（余数）插入到`delta store`中


  只要每个线程的数据目标是不同的数据文件，SQL Server 就可以通过多个并行线程将数据大容量加载到列存储索引中。这是自动完成的，不需要用户进行特殊操作。列存储大容量插入操作对目标`rowgroup`获取排他锁，只要并行插入针对不同的数据文件，它们保证不会重叠到它们正在插入的`rowgroup`。


  当数据插入到分区列存储索引时，该数据首先被分配到一个分区，然后每组行被插入到各自的分区中。因此，是否使用大容量加载过程将取决于插入到目标分区的行数，而不是源查询插入的总行数。通常，分析表将有一个当前/活动分区接受新数据，而其余分区将包含不再写入的较旧数据（除非是一次性数据加载、软件发布或维护事件）。




  '
- "# 批量加载到列存储索引的性能\n\n为了演示批量加载数据对列存储索引的影响，将针对 `Fact.Sale` 的一个行存储副本进行测试。该表的创建过程此处未展示，但它是完全相同的副本，仅包含聚集主键和页压缩，而非聚集列存储索引。此插入查询如清单\
  \ 8-1 所示。\n\n```sql\nINSERT INTO fact.Sale_Transactional\n([Sale Key], [City Key],[Customer\
  \ Key], [Bill To Customer Key], [Stock Item Key], [Invoice Date Key], [Delivery\
  \ Date Key], [Salesperson Key], [WWI Invoice ID],\nDescription, Package, Quantity,\
  \ [Unit Price], [Tax Rate], [Total Excluding Tax], [Tax Amount], Profit, [Total\
  \ Including Tax], [Total Dry Items],\n[Total Chiller Items], [Lineage Key])\nSELECT\
  \ TOP 102400\n*\nFROM Fact.Sale;\n```\n**清单 8-1**\n向聚集行存储索引插入 102,400 行\n\n插入操作大约需要\
  \ 1 秒。插入行后，将使用一个未公开记录但很有用的系统函数来读取事务日志的内容并确定事务的大小，如清单 8-2 所示。\n\n```sql\nSELECT\n\
  fn_dblog.allocunitname,\nSUM(fn_dblog.[log record length]) AS log_size\nFROM sys.fn_dblog\
  \ (NULL, NULL)\nWHERE fn_dblog.allocunitname = ('Fact.Sale_Transactional.PK_Fact_Sale_Transactional')\n\
  GROUP BY fn_dblog.allocunitname;\n```\n**清单 8-2**\n用于计算聚集行存储插入事务大小的查询\n\n结果是一个单行，指示插入事务的总日志大小，如图\
  \ 8-2 所示。\n\n![](img/521866_1_En_8_Fig2_HTML.jpg)\n\n**图 8-2**\n向聚集行存储索引插入 102,400\
  \ 行的事务大小\n\n行存储插入返回的日志大小为 225,856 字节，约 220KB。现在将对一个具有列存储索引的表的干净副本执行相同的插入操作，如清单 8-3\
  \ 所示。\n\n```sql\nINSERT INTO fact.Sale_CCI_Clean_Test\n([Sale Key], [City Key],[Customer\
  \ Key], [Bill To Customer Key], [Stock Item Key], [Invoice Date Key], [Delivery\
  \ Date Key], [Salesperson Key], [WWI Invoice ID],\nDescription, Package, Quantity,\
  \ [Unit Price], [Tax Rate], [Total Excluding Tax], [Tax Amount], Profit, [Total\
  \ Including Tax], [Total Dry Items],\n[Total Chiller Items], [Lineage Key])\nSELECT\
  \ TOP 102400\n*\nFROM Fact.Sale;\n```\n**清单 8-3**\n向聚集列存储索引插入 102,400 行\n\n此插入操作完成时间少于\
  \ 1 秒。使用一个新的干净表是为了确保没有来自先前演示的残留事务污染日志。`fn_dblog()` 的结果如图 8-3 所示。\n\n![](img/521866_1_En_8_Fig3_HTML.jpg)\n\
  \n**图 8-3**\n向聚集列存储索引插入 102,400 行的事务大小\n\n请注意，插入操作的事务日志大小为 118,192 字节，约 115KB。与页压缩的行存储索引相比，这显著减少了事务大小。\n\
  \n在演示了批量加载对事务大小的影响后，有必要说明向列存储索引插入 102,400 行与插入 102,399 行之间的差异。清单 8-4 中的 T-SQL 将\
  \ 102,399 行插入到一个新创建的聚集列存储索引中。\n\n```sql\nINSERT INTO fact.Sale_CCI_Clean_Test_2\n\
  ([Sale Key], [City Key],[Customer Key], [Bill To Customer Key], [Stock Item Key],\
  \ [Invoice Date Key], [Delivery Date Key], [Salesperson Key], [WWI Invoice ID],\n\
  Description, Package, Quantity, [Unit Price], [Tax Rate], [Total Excluding Tax],\
  \ [Tax Amount], Profit, [Total Including Tax], [Total Dry Items],\n[Total Chiller\
  \ Items], [Lineage Key])\nSELECT TOP 102399\n*\nFROM Fact.Sale;\n```\n**清单 8-4**\n\
  向聚集列存储索引插入 102,399 行\n\n执行此操作大约需要一秒钟。从 `fn_dblog()` 提取数据的查询需要稍作调整，以适应列存储索引本身和增量存储导致的日志增长。如清单\
  \ 8-5 所示。\n\n```sql\nSELECT\nfn_dblog.allocunitname,\nSUM(fn_dblog.[log record length])\
  \ AS log_size\nFROM sys.fn_dblog (NULL, NULL)\nWHERE fn_dblog.allocunitname IN ('Fact.Sale_CCI_Clean_Test_2.CCI_Sale_CCI_Clean_Test_2',\
  \ 'Fact.Sale_CCI_Clean_Test_2.CCI_Sale_CCI_Clean_Test_2(Delta)')\nGROUP BY fn_dblog.allocunitname;\n\
  ```\n**清单 8-5**\n用于计算列存储索引和增量存储日志增长的查询\n\n请注意，需要单独引用增量存储才能将其包含在结果中。每个对象消耗的事务日志空间如图\
  \ 8-4 所示。\n\n![](img/521866_1_En_8_Fig4_HTML.jpg)\n\n**图 8-4**\n向聚集列存储索引插入 102,399\
  \ 行的事务大小\n\n向增量存储的插入操作比本章迄今为止演示的任何操作都要昂贵得多，事务大小为 1,300,448 字节，约 1.2GB。因此，只要有可能，利用批量加载数据到列存储索引中就存在显著的激励。\n\
  \n## 涓流插入 vs. 分阶段插入\n\n虽然向增量存储插入似乎代价高昂，但它远不及重复向列存储索引插入那么昂贵。如果分析型表经常成为许多较小插入操作的目标，那么在插入列存储索引之前，先将这些行收集到一个临时表中，具有重要的价值。\n\
  \n在涉及行存储表的工作负载中，大型插入操作可能会被批处理成小的行组，以减少争用并减小每次插入的事务大小。列存储索引不会从微批处理中受益。在将代码从行存储表迁移到列存储表时，可以通过调整数据加载过程以处理明显更大的批处理来节省资源。`2²⁰`\
  \ (1,048,576) 行的批处理是最优的，尽管大于或等于 102,400 的批处理大小将确保不需要增量存储。如果插入操作包含数千万行，则可以将这些插入分解为更易管理的子单元，以防止暂存表或临时表变得过大。\n\
  \n向列存储索引加载数据的最佳实践如下：\n\n1.  每个插入操作至少加载 102,400 行。\n2.  可能时，每批加载 1,048,576 行。\n3.\
  \  仅在数据加载末尾，为剩余行加载少于 102,400 行。\n\n虽然此指导原则似乎表明应不惜一切代价避免使用增量存储，但不应为此目的而损害分析数据存储的目标。为了防止使用增量存储而延迟报告数据是不值得的，并且节省的资源不足以产生意义。主动避免重复的小批插入将确保插入性能相当好。如果数据加载过程的尾部需要增量存储，则没有理由避免它。\n\
  \n## 其他数据加载注意事项\n\n当聚集列存储索引上存在非聚集行存储索引时，VertiPaq 优化（可以极大地提高列存储索引压缩的有效性）将不会被使用。随着时间的推移，这将导致行组消耗比原本更多的资源。\n\
  \n对于需要非聚集行存储索引来支持分析过程的场景，请考虑以下选项来管理列存储索引上的性能。\n\n\n\n### 在数据加载期间删除非聚集索引\n\n确保始终使用\
  \ Vertipaq 优化的一个简单方法是在数据加载期间删除非聚集行存储索引，并在之后重新创建它们。构建非聚集索引是一项在线操作，不会干扰针对该表的其他查询。这种方法的缺点是，在数据加载过程中，直到非聚集索引重建完成之前，任何使用非聚集索引的分析都会受到影响。构建非聚集索引也需要额外的资源。当非聚集索引较小且构建相对快速时，这种方法最为有效。\n\
  \n对于分区表，只有包含已更改数据的分区需要考虑此问题。通常，包含较旧数据（主要是静态且本质上不发生变化的数据，即非热数据）的分区可以忽略。\n\n对于非聚集索引必要且无法删除的场景，可以考虑进行定期维护，以解决随时间推移出现的压缩效率低下的问题。如果可以安排季度维护，则可以采取以下操作：\n\
  \n1.  删除活动分区上的非聚集索引。\n2.  重建活动分区上的聚集列存储索引。\n3.  重新创建非聚集索引。\n\n作为一项计划内的维护事件，这些都是相对无害的任务，即使对于较大的表也不应消耗异常多的时间。\n\
  \n### 每次数据加载时的列存储重新组织操作\n\n读取列存储索引时，会连同其内容和增量存储一起读取，以产生必要的输出。虽然增量存储不会变得过大，但通过定期数据加载的列存储索引可以通过强制将增量存储的内容压缩到列存储索引中来略微提高读取速度。清单\
  \ 8-6 中的查询检查了之前创建的小型列存储索引的内容。\n\n```sql\nSELECT\n    tables.name AS table_name,\n\
  \    indexes.name AS index_name,\n    partitions.partition_number,\n    column_store_row_groups.row_group_id,\n\
  \    column_store_row_groups.state_description,\n    column_store_row_groups.total_rows,\n\
  \    column_store_row_groups.size_in_bytes,\n    column_store_row_groups.deleted_rows,\n\
  \    internal_partitions.internal_object_type_desc,\n    internal_partitions.rows,\n\
  \    internal_partitions.data_compression_desc\nFROM sys.column_store_row_groups\n\
  INNER JOIN sys.indexes\n    ON indexes.index_id = column_store_row_groups.index_id\n\
  \    AND indexes.object_id = column_store_row_groups.object_id\nINNER JOIN sys.tables\n\
  \    ON tables.object_id = indexes.object_id\nINNER JOIN sys.partitions\n    ON\
  \ partitions.partition_number = column_store_row_groups.partition_number\n    AND\
  \ partitions.index_id = indexes.index_id\n    AND partitions.object_id = tables.object_id\n\
  LEFT JOIN sys.internal_partitions\n    ON internal_partitions.object_id = tables.object_id\n\
  WHERE tables.name = 'Sale_CCI_Clean_Test_2'\nORDER BY indexes.index_id, column_store_row_groups.row_group_id;\n\
  ```\n**清单 8-6** 返回列存储索引结构详细信息的查询\n\n结果如图 8-5 所示。\n\n![](img/521866_1_En_8_Fig5_HTML.jpg)\n\
  **图 8-5** 小型列存储索引的行组信息\n\n请注意，列存储索引的全部内容（102,399 行）都驻留在增量存储中。删除位图默认存在，目前为空。如果操作员希望将增量存储的内容移动到列存储行组中，可以通过清单\
  \ 8-7 中的索引维护命令来完成。\n\n```sql\nALTER INDEX CCI_Sale_CCI_Clean_Test_2 ON Fact.Sale_CCI_Clean_Test_2\
  \ REORGANIZE WITH (COMPRESS_ALL_ROW_GROUPS = ON);\n```\n**清单 8-7** 用于压缩增量存储的索引重新组织命令\n\
  \n完成后，增量存储将被压缩并准备好移入列存储索引，如图 8-6 所示。\n\n![](img/521866_1_En_8_Fig6_HTML.jpg)\n**图\
  \ 8-6** 索引维护对列存储增量行组的影响\n\n结果显示，受索引维护影响的增量行组现在处于中间状态。已创建一个新对象并进行了压缩，增量行组的内容已插入其中。先前的增量行组（一个未压缩的堆）处于墓碑状态，以供元组移动器在稍后时间点移除。请注意未压缩的增量行组与压缩行组之间的显著大小差异。\n\
  \n此时，再次运行与之前相同的 `ALTER INDEX` 语句将强制元组移动器完成此清理工作。或者，等待一小段时间也会达到相同的效果。5 分钟过去后，此列存储索引的内容如图\
  \ 8-7 所示。\n\n![](img/521866_1_En_8_Fig7_HTML.jpg)\n**图 8-7** 元组移动器执行后的列存储索引内容\n\n\
  一旦元组移动器完成其清理过程，剩下的就只是一个压缩的列存储行组。\n\n执行此类维护并非必需，但可以在数据加载完成后提高针对列存储索引的查询读取速度。索引维护将在第\
  \ 14 章中更详细地讨论，包括其作为数据加载和其他列存储过程的一部分的使用。\n\n## 总结\n\n在将数据加载到列存储索引中时，批量加载可确保最快的加载速度，同时最小化服务器资源消耗。以较少的批次批量加载大量行，远比使用逐条或小批量插入高效得多。\n\
  \n通过专注于围绕最大化压缩列存储行组的使用和最小化增量存储的使用来构建数据加载处理，可以提高整体列存储索引性能，无论是对于数据加载过程还是对于使用新加载数据的分析。\n\
  \n"
- '# 9. 删除和更新操作


  在高度压缩的结构中修改数据代价高昂，并且需要额外的流程来成功管理。插入操作可以从批量加载中受益，以简化数据加载过程，而删除和更新操作则需要使用删除位图和增量存储来管理对现有数据的更改。



  ## 修改数据的代价


  在第 5 章中，我们详细讨论了列存储压缩。一个重要的结论是，某些压缩形式，例如行程长度编码，依赖于底层数据的确切内容。列存储压缩通过应用各种编码、压缩算法和优化，在大幅缩减数据量方面表现得*异常出色*。请看图
  9-1 中的示例数据。


  ![](img/521866_1_En_9_Fig1_HTML.jpg)


  图 9-1：使用行程长度编码进行编码的示例数据


  示例数据使用字典压缩进行编码，通过 Vertipaq 优化重新排序，并进一步使用行程长度编码进行压缩。如果一个进程删除了表中的最后两行，那么就需要完全解压缩数据，删除行，然后重新压缩。图
  9-2 展示了这个过程将如何影响数据。


  ![](img/521866_1_En_9_Fig2_HTML.jpg)


  图 9-2：从行程长度编码的数据中删除行


  生成的索引 ID 组集合现在只包含 4 行，而不是 5 行（因为索引 ID 4 已被移除），并且索引 ID 3 的计数也已减少。


  如果表更大，并且删除影响了更多行，那么很可能需要解压缩、调整和重新压缩许多 `rowgroups`。在此过程中，许多页面都需要被更新。这个操作很快就会变得代价高昂。需要在写操作的速度和读操作的速度之间保持平衡，而在这种情况下，需要优先考虑快速加载和修改数据的能力。


  ## 删除操作


  在列存储索引中，解压缩 `rowgroups`、删除行以及重新压缩它们的成本非常高。删除操作针对的 `rowgroups` 越多，这个成本就会变得越高。为了减轻这一成本，使用了一种称为
  `delete bitmap` 的结构来跟踪从列存储索引中的删除。


  `delete bitmap` 是一个堆，它引用底层 `rowgroups` 中的行。当一行被删除时，`rowgroup` 中的数据保持不变，`delete bitmap`
  会更新一个指向已删除行的引用。因此，列存储索引中的已删除行可以被视为软删除，即被移除的行被标记出来，但并未物理删除。


  请注意，针对 `delta store` 中行的删除操作不需要使用 `delete bitmap`，因为 `delta store` 是一个 `rowstore`
  堆，可以根据需要简单地从中删除行，而无需软删除。


  当针对包含已删除行的 `rowgroup` 执行查询时，会查询 `delete bitmap`，并将已删除行从结果中排除。`delete bitmap` 可以如图
  9-3 所示进行可视化。


  ![](img/521866_1_En_9_Fig3_HTML.jpg)


  图 9-3：删除位图及其与列存储索引的关系


  当对 `rowgroup` 中的行执行删除操作时，其底层行保持不变。相反，`delete bitmap` 跟踪哪些行被删除，并在未来针对该 `rowgroup`
  发出查询时进行查询。因此，在列存储索引中删除数据不会回收存储空间。


  请考虑清单 9-1 中所示的查询。


  ```

  DELETE

  FROM Fact.Sale_CCI

  WHERE [Invoice Date Key] = ''1/1/2016'';

  ```


  清单 9-1：从列存储索引中删除数据的查询


  执行时，此查询将删除所有发票日期为 2016 年 1 月 1 日的销售数据。在此之前，可以查询 `rowgroup` 元数据以确认当前 `rowgroup` 中没有已删除的行。清单
  9-2 中的查询将返回此列存储索引中 `rowgroups` 的元数据，包括已删除行的数量（如果有的话）。


  ```

  SELECT

  tables.name AS table_name,

  indexes.name AS index_name,

  partitions.partition_number,

  column_store_row_groups.state_description,

  column_store_row_groups.total_rows,

  column_store_row_groups.size_in_bytes,

  column_store_row_groups.deleted_rows

  FROM sys.column_store_row_groups

  INNER JOIN sys.indexes

  ON indexes.index_id = column_store_row_groups.index_id

  AND indexes.object_id = column_store_row_groups.object_id

  INNER JOIN sys.tables

  ON tables.object_id = indexes.object_id

  INNER JOIN sys.partitions

  ON partitions.partition_number = column_store_row_groups.partition_number

  AND partitions.index_id = indexes.index_id

  AND partitions.object_id = tables.object_id

  WHERE tables.name = ''Sale_CCI''

  ORDER BY indexes.index_id, column_store_row_groups.row_group_id;

  ```


  清单 9-2：返回有关 Rowgroups 中已删除行元数据的查询


  `rowgroup` 元数据如图 9-4 所示。


  ![](img/521866_1_En_9_Fig4_HTML.jpg)


  图 9-4：列存储索引的 Rowgroup 元数据，包括已删除行


  正如对一个未执行过任何删除操作的列存储索引所预期的那样，`sys.column_store_row_groups` 中的 `deleted_rows` 列对每个
  `rowgroup` 都显示为零。执行清单 9-1 中的查询将从列存储索引中删除总计 15,400 行。图 9-5 显示了删除完成后列存储索引的元数据详细信息。


  ![](img/521866_1_En_9_Fig5_HTML.jpg)


  图 9-5：发生删除后的 Rowgroup 元数据


  现在每个 `rowgroup` 都包含一定数量的已删除行，具体取决于其中碰巧在 2016 年 1 月 1 日开票的行数。请注意，每个 `rowgroup` 中的总行数和字节大小并未改变。这是预料之中的，反映了行是通过
  `delete bitmap` 进行软删除的这一事实。


  由于行是从索引中的所有 `rowgroups` 中移除的，如果没有 `delete bitmap` 的帮助，这次删除将需要重建整个索引，而为了等待删除单日的行数据而执行如此昂贵的操作是不现实的。相反，删除
  15,400 行的操作异常快速地在不到一秒内完成，这要归功于 `delete bitmap`！


  清理已删除行并释放 `rowgroups` 内所占用空间的唯一方法是对列存储索引或受删除影响的任何分区执行索引重建。这通常不是必需的，除非被删除数据的量相对于索引的总体大小变得很大。与经典的
  `rowstore` 索引一样，碎片化在变得过多之前并不是问题，此时可以通过重建来解决。请注意，索引 `reorganize`（重组）操作**不会**从列存储索引中移除已删除的行！第
  14 章将深入探讨索引维护，讨论其何时以及如何需要，以及使用的最佳实践。



  '
- "# 更新操作\n\n在列存储索引中，更新操作被作为两个操作执行：删除和插入。从逻辑上看，更新将作为单个原子单元执行，但在底层，它将由以下部分组成：\n\n1.\
  \  一组被删除的行，在删除位图中被标记。\n2.  一组新插入的行，写入到增量存储中。\n\n这意味着更新操作需要写入到删除位图和增量存储才能成功完成。同样重要的是要注意，由列存储索引的更新操作所产生的插入操作将**专门使用**增量存储，并且无法利用批量加载进程。\n\
  \n在继续之前，将对列存储索引执行一次重组，以便于结果的可视化。清单 9-3 中的查询将重建索引。\n\n```sql\nALTER INDEX CCI_fact_sale_CCI\
  \ ON Fact.Sale_CCI REBUILD;\n```\n\n**清单 9-3**\n重建列存储索引并移除删除位图的查询\n\n现在数据已清理干净，可以使用清单\
  \ 9-4 中的查询来返回列存储索引中所有行组的元数据，包括增量存储和删除位图。\n\n```sql\nSELECT\n    tables.name AS table_name,\n\
  \    indexes.name AS index_name,\n    partitions.partition_number,\n    column_store_row_groups.row_group_id,\n\
  \    column_store_row_groups.state_description,\n    column_store_row_groups.total_rows,\n\
  \    column_store_row_groups.size_in_bytes,\n    column_store_row_groups.deleted_rows,\n\
  \    internal_partitions.internal_object_type_desc,\n    internal_partitions.rows\n\
  FROM sys.column_store_row_groups\nINNER JOIN sys.indexes\n    ON indexes.index_id\
  \ = column_store_row_groups.index_id\n    AND indexes.object_id = column_store_row_groups.object_id\n\
  INNER JOIN sys.tables\n    ON tables.object_id = indexes.object_id\nINNER JOIN sys.partitions\n\
  \    ON partitions.partition_number = column_store_row_groups.partition_number\n\
  \    AND partitions.index_id = indexes.index_id\n    AND partitions.object_id =\
  \ tables.object_id\nLEFT JOIN sys.internal_partitions\n    ON internal_partitions.object_id\
  \ = tables.object_id\nWHERE tables.name = 'Sale_CCI'\nORDER BY indexes.index_id,\
  \ column_store_row_groups.row_group_id;\n```\n\n**清单 9-4**\n返回列存储索引中行组的删除位图和增量存储元数据的查询\n\
  \n图 9-6 中的结果显示了一个干净的列存储索引，其中没有已删除的行，增量存储中也没有条目。\n\n![521866_1_En_9_Fig6_HTML.jpg](img/521866_1_En_9_Fig6_HTML.jpg)\n\
  \n**图 9-6**\n未对其执行删除/更新操作的行组的元数据\n\n有了这个原始的列存储索引，就可以轻松地可视化更新操作对它产生的影响。考虑清单 9-5 中所示的查询。\n\
  \n```sql\nSELECT\n    *\nFROM Fact.Sale_CCI\nWHERE [Invoice Date Key] = '1/2/2016';\n\
  ```\n\n**清单 9-5**\n用于标识要更新的数据集的查询\n\n这个 `SELECT` 查询标识了表中总共 18,150 行，这些行匹配发票日期为 '1/2/2016'\
  \ 的筛选条件。接下来，将对表中的两个列进行更新，如清单 9-6 所示。\n\n```sql\nUPDATE Sale_CCI\nSET [Total Dry\
  \ Items] = [Total Dry Items] - 1,\n    [Total Chiller Items] = [Total Chiller Items]\
  \ + 1\nFROM Fact.Sale_CCI\nWHERE [Invoice Date Key] = '1/2/2016';\n```\n\n**清单 9-6**\n\
  用于从列存储索引更新数据的查询\n\n回到清单 9-4 中的行组元数据查询，可以查看 `UPDATE` 语句的结果，示例如图 9-7 所示。\n\n![521866_1_En_9_Fig7_HTML.jpg](img/521866_1_En_9_Fig7_HTML.jpg)\n\
  \n**图 9-7**\n更新 18,150 行后的行组元数据\n\n执行 `UPDATE` 后的元数据表明，列存储索引中的每个行组都受到了影响，因为 18,150\
  \ 行被删除，然后又有 18,150 行被插入。`` `Sys.internal_partitions` `` 显示了一个删除位图和一个增量存储对象，每个都包含总共\
  \ 18,150 行。行组详细信息说明了每个行组更新了多少行。此外，新的行组（编号 25）显示了为新插入的行创建的新打开的增量存储。\n\n由此产生的结构强调了这样一个事实：针对列存储索引的\
  \ `UPDATE` 操作是作为离散的删除和插入操作的组合来执行的。顺序执行这些操作中的每一个都会产生类似的结果。\n\n考虑针对此列存储索引中发票日期范围从\
  \ '1/3/2016' 到 '1/8/2016' 的所有行进行更新。对这些行的计数显示，匹配该日期筛选条件的总共有 148,170 行。在运行更新之前，将重建列存储索引，这将清理已删除的行和增量存储，以便更好地演示。清单\
  \ 9-7 提供了重建索引然后更新这些行的查询。\n\n```sql\nALTER INDEX CCI_fact_sale_CCI ON Fact.Sale_CCI\
  \ REBUILD;\nGO\nUPDATE Sale_CCI\nSET [Total Dry Items] = [Total Dry Items] - 1,\n\
  \    [Total Chiller Items] = [Total Chiller Items] + 1\nFROM Fact.Sale_CCI\nWHERE\
  \ [Invoice Date Key] >= '1/3/2016'\n  AND [Invoice Date Key] < '1/8/2016';\n```\n\
  \n**清单 9-7**\n在重建索引后更新列存储索引中 148,170 行的查询\n\n当更新 148,170 行时，首先要注意的是它执行了整整 5 秒！之前的\
  \ 18,150 行更新在执行后几乎瞬间完成。查看元数据揭示了原因，如图 9-8 所示。\n\n![521866_1_En_9_Fig8_HTML.jpg](img/521866_1_En_9_Fig8_HTML.jpg)\n\
  \n**图 9-8**\n更新 148,170 行后的行组元数据\n\n从更大更新后的元数据中得出的关键结论是，增量存储包含了此次操作中更新的全部 148,170\
  \ 行。通常，任何 102,400 行或更多的 `INSERT` 操作都将受益于最小日志记录的批量插入过程，但 `UPDATE` 操作无法从中受益。因为 `UPDATE`\
  \ 由同一个事务中的 `INSERT` 和 `DELETE` 组成，所以不可能将单个事务拆分为完全日志记录的 `DELETE` 和最小日志记录的 `INSERT`。\n\
  \n列存储索引上的批量插入过程在使用时可以节省大量资源，但不允许违反 SQL Server 数据库的 ACID（原子性、一致性、隔离性和持久性）属性。试图将完全日志记录和最小日志记录的事务拼接成一个更大的事务，需要创建一个事务，该事务将为\
  \ `DELETE` 提供时间点恢复功能，但不为 `INSERT` 提供。虽然可以设想 SQL Server 围绕该限制进行架构设计的方法，但这样做会对使用列存储索引的任何人造成困惑，并且在恢复包含频繁执行\
  \ `UPDATE` 操作的列存储索引的数据库时，可能导致意外结果。\n\n关键结论是，针对列存储索引的 `UPDATE` 操作将由一个 `DELETE` 操作和一个完全日志记录的\
  \ `INSERT` 到增量存储中组成。随着更新行数的增加，这些操作的性能将急剧下降。增量存储是为处理少量行而构建的——无论是涓滴加载还是较大数据加载过程的剩余行。它不是为一次处理大量行而设计的，因此对于此类应用通常会表现不佳。\n\
  \n最后一个演示来强调这一挑战，那就是更新比单个行组所能容纳的更多的行。考虑清单 9-8 中的示例查询。\n\n\n\n```\nSELECT\nCOUNT(*)\n\
  FROM Fact.Sale_CCI\nWHERE [Invoice Date Key] >= '1/8/2016'\nAND [Invoice Date Key]\
  \ < '3/5/2016';\n代码清单 9-8\n在列存储索引上针对宽日期范围查询行数的查询\n```\n\n执行后，统计出的结果为 1,159,180 行。这大于单个列存储索引行组可存储的\
  \ 1,048,576 行。代码清单 9-9 再次重建索引，然后针对代码清单 9-9 中识别出的全部 1,159,180 行执行一次更新操作。这个单独的 `UPDATE`\
  \ 操作将导致旧行被删除，新行被插入到增量存储区，并且大多数新行会被压缩到行组中。\n\n```\nALTER INDEX CCI_fact_sale_CCI\
  \ ON Fact.Sale_CCI REBUILD;\nGO\nUPDATE Sale_CCI\nSET [Total Dry Items] = [Total\
  \ Dry Items] - 1,\n[Total Chiller Items] = [Total Chiller Items] + 1\nFROM Fact.Sale_CCI\n\
  WHERE [Invoice Date Key] >= '1/8/2016'\nAND [Invoice Date Key] < '3/5/2016';\n代码清单\
  \ 9-9\n重建索引后，在列存储索引中更新 1,159,180 行的查询\n```\n\n此次更新 1,159,180 行的操作用了将近一分钟才完成。图 9-9\
  \ 显示了在这个大型 `UPDATE` 操作完成后立即产生的列存储元数据。\n\n![](img/521866_1_En_9_Fig9_HTML.jpg)\n\n\
  图 9-9\n更新 1,159,180 行后的行组元数据\n\n请注意，存在多个增量存储区。打开的增量存储区（编号 26）将保持打开状态以接受未来插入的数据。关闭的增量存储区将由元组移动器异步处理，并被压缩成永久性的列存储行组。图\
  \ 9-10 显示了一分钟后，元组移动器执行完毕后，此列存储索引的元数据。\n\n![](img/521866_1_En_9_Fig10_HTML.jpg)\n\
  \n图 9-10\n更新 1,159,180 行并允许元组移动器执行后的行组元数据\n\n标记为“TOMBSTONE”（墓碑）状态的行组（编号 25）不再是列存储索引的逻辑组成部分，将在未来通过元组移动器或索引维护进行清理。行组编号\
  \ 27 包含了行组编号 25 在被元组移动器处理时的内容。总结此次更新 1,159,180 行对列存储索引所做的更改：\n\n1.  所有行组的删除位图中，有\
  \ 1,159,180 行被标记为已删除。\n2.  有 1,048,576 行被插入到一个增量存储区，使其达到容量上限。\n3.  有 110,604 行被插入到另一个增量存储区，并保持打开状态以等待未来插入的行。\n\
  4.  已满的增量存储区中的 1,048,576 行由元组移动器处理，并被压缩成一个永久行组。\n\n对于单个 `UPDATE` 语句来说，这是一个相当大的工作量，并且随着行数的增加，其扩展性很差。\n\
  \n通常，应将更新操作限制在较小的行数，或者完全避免。重新思考代码编写方式，将针对列存储索引的 `UPDATE` 操作重构为一系列删除和插入操作，或者通过中介进程来管理更新从而完全避免它，是有价值的。列存储索引上\
  \ `UPDATE` 操作的性能将是不可预测的，并且足够大的行数会导致事务规模过大，从而给 SQL Server 带来资源压力。\n\n第 15 章（最佳实践）将更详细地讨论如何避免更新，以及在将\
  \ `UPDATE` 代码从行存储索引迁移到列存储索引时可以使用的各种策略。\n\n"
- '# 10. 段与行组消除


  列存储索引运作方式的一个关键组成部分是，索引中的每个段都是其自身的构建块。每个段可以单独或分组读取，但通过任何查询读取的段的数量可以通过高效的架构和最佳的查询模式来减少。减少读取的段直接减少了
  IO，提高了查询速度以及与内存相关的性能指标，例如页面生命周期期望值。


  ## 段消除


  每个段代表单个列在一系列行上的数据。当针对列存储索引执行查询时，SQL Server 需要确定哪些行组是返回请求结果集所必需的。在这些行组内，只有包含所选列数据的段才会被读取。因此，选择较少列的查询将读取更少的段，从而减少
  IO、内存使用和查询运行时间。


  考虑图 10-1 所示的列存储索引。


  ![](img/521866_1_En_10_Fig1_HTML.jpg)


  图 10-1

  包含六个行组和八个列的示例列存储索引


  有 6 个行组和 8 列，此列存储索引总共包含 48 个段。因为每列都被拆分为其自身的一组段（每个行组一个），所以不需要读取查询不需要的列的段。如果一个示例查询只读取列
  A 和 B，结果将是剩余的段可以被自动跳过，如图 10-2 所示。


  ![](img/521866_1_En_10_Fig2_HTML.jpg)


  图 10-2

  段消除对两列查询的影响


  通过仅查询可能的八列中的两列，读取的段数减少了 75%。这一惯例对于具有任意数量列的列存储索引都成立。如果这个表有 24 列，那么只读取其中 2 列意味着将不读取
  22 列。此功能的结果是，列存储索引查询中读取的段数将与查询中涉及的列数成正比。


  满足查询所需的列还包括 `WHERE` 子句引用的任何列，以及聚合函数（`GROUP BY`/`HAVING`）中的列。如果查询包含视图或函数，则将评估其内容以确定执行查询所需的列。代码清单
  10-1 提供了一个针对列存储索引的示例查询。


  ```

  SELECT

  [City Key],

  COUNT(*)

  FROM fact.Sale_CCI

  WHERE [Invoice Date Key] >= ''1/1/2016''

  GROUP BY [City Key]

  ORDER BY COUNT(*) DESC;

  代码清单 10-1

  使用筛选器和聚合的示例列存储查询

  ```


  此分析查询计算给定时间段内每个城市的销售数量。在 `Sale_CCI` 的 21 列中，只有 2 列是完成此计算所必需的：`City Key` 和 `Invoice
  Date Key`。因此，在执行此查询时，21 列中的 19 列对应的段将被忽略。


  相比之下，行存储表按顺序存储行，每行的每列都一起存储在页上。虽然在行存储索引中读取较少的列可以减少呈现给应用程序的数据量，但它并不能减少为检索查询所需的特定列而读入内存的页数。因此，在列存储索引中减少查询的列数将提供直接的性能优势，而这种优势在行存储索引中并不显著。


  段消除是一个简单而强大的工具，可以简化为一个优化技巧：编写查询时只包含所需的列。由于行组最多可包含 `2²⁰` 行，查询不必要的列的成本可能相当高。针对行存储表的事务性查询通常操作少量行，而分析查询一次可能访问数百万行。因此，`SELECT
  *` 查询表面上的便利性将阻碍列存储索引上的性能。


  考虑代码清单 10-2 中的查询。


  ```

  SELECT

  *

  FROM fact.Sale_CCI

  WHERE [Invoice Date Key] = ''2/17/2016'';

  代码清单 10-2

  针对列存储索引的 SELECT * 查询

  ```




