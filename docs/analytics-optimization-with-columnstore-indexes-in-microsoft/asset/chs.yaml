- "# 13. 列存储表上的非聚集行存储索引\n\n聚集列存储索引提供了足够有效的压缩和数据访问速度，使得大多数典型的分析工作负载无需任何其他索引即可获得足够的性能。\n\
  \n这种性能的关键在于给定分析表底层数据的排序方式。只要使用该数据的查询能够基于数据排序所依据的维度（通常是时间）进行筛选，它们就能受益于行组消除。对于按其他维度切分数据的非常规查询，结果通常是对列存储索引进行完全扫描。对于大表而言，这代价高昂，将需要另一种解决方案来帮助优化这些工作负载。\n\
  \n\n\n## 使用非聚集行存储索引\n\n第 10 章详细回顾了数据顺序在实现行组消除方面的重要性。当数据按某个维度排序，并且分析查询在该维度上进行筛选时，SQL\
  \ Server 可以使用列存储元数据自动过滤掉不需要的行组。\n\n可以在聚集列存储表上创建非聚集行存储索引，为那些不遵循数据排序方式的常见查询提供额外支持。向聚集列存储索引添加辅助索引时必须谨慎。本章剩余部分将讨论在需要时如何最佳使用非聚集行存储索引，以及维护它们的最佳实践。\n\
  \n考虑一个在表 `Fact.Sale_CCI_OrderED` 上创建的聚集列存储索引，该索引按 `Invoice Date Key` 列排序。该表的架构设计旨在通过\
  \ `Invoice Date Key` 列提供的时间维度进行筛选和聚合。清单 13-1 中的查询是一个分析查询，它利用了这种自然的数据顺序。\n\n```\n\
  SELECT\nCOUNT(*),\nSUM(Quantity) AS total_quantity\nFROM Fact.Sale_CCI_ORDERED\n\
  WHERE [Invoice Date Key] >= '11/1/2015'\nAND [Invoice Date Key] < '1/1/2016';\n\
  ```\n清单 13-1\n利用有序聚集列存储索引的时间维度进行筛选和聚合的查询\n\n执行后，结果返回得相当快。图 13-1 显示了 `STATISTICS\
  \ IO` 的输出。\n\n![图 13-1：针对有序聚集列存储索引查询的统计 IO 输出](img/521866_1_En_13_Fig1_HTML.jpg)\n\
  图 13-1\n针对有序聚集列存储索引查询的统计 IO 输出\n\n注意，段报告显示读取了 4 个段，跳过了 21 个段。此外，考虑到该表包含 2500 万行，逻辑读取次数相当低。这两点都是行组消除被有效使用的指标，有助于确保只需要读取表的一小部分即可处理查询并返回结果。\n\
  \n只要分析查询的筛选条件、排序和聚合与表所依据的列对齐，就可以预期获得这样的性能。考虑清单 13-2 中提供的非常不同的查询。\n\n```\nSELECT\n\
  COUNT(*),\nSUM(Quantity) AS total_quantity\nFROM Fact.Sale_CCI_ORDERED\nWHERE [Stock\
  \ Item Key] = 186;\n```\n清单 13-2\n不使用表自然排序的分析查询\n\n此查询使用 `Stock Item Key` 作为筛选条件来计算数量。由于表是按\
  \ `Invoice Date Key` 排序的，SQL Server 没有自然的方法来实现行组消除。图 13-2 显示了此查询的 `STATISTICS IO`\
  \ 输出。\n\n![图 13-2：针对有序聚集列存储索引中无序列的查询统计 IO 输出](img/521866_1_En_13_Fig2_HTML.jpg)\n\
  图 13-2\n针对有序聚集列存储索引中无序列的查询统计 IO 输出\n\n这一次，读取了列存储索引中的所有行组，没有跳过任何行组。这种性能可以归因于表中 `Stock\
  \ Item Key` 总共有 227 个值，但这些值分散在所有行组中，没有任何特定顺序。清单 13-3 提供了返回列存储索引中 `Stock Item Key`\
  \ 列内容元数据的查询。\n\n```\nSELECT\ntables.name AS table_name,\nindexes.name AS index_name,\n\
  columns.name AS column_name,\npartitions.partition_number,\ncolumn_store_segments.segment_id,\n\
  column_store_segments.min_data_id,\ncolumn_store_segments.max_data_id,\ncolumn_store_segments.row_count\n\
  FROM sys.column_store_segments\nINNER JOIN sys.partitions\nON column_store_segments.hobt_id\
  \ = partitions.hobt_id\nINNER JOIN sys.indexes\nON indexes.index_id = partitions.index_id\n\
  AND indexes.object_id = partitions.object_id\nINNER JOIN sys.tables\nON tables.object_id\
  \ = indexes.object_id\nINNER JOIN sys.columns\nON tables.object_id = columns.object_id\n\
  AND column_store_segments.column_id = columns.column_id\nWHERE tables.name = 'Sale_CCI_ORDERED'\n\
  AND columns.name = 'Stock Item Key'\nORDER BY tables.name, columns.name, column_store_segments.segment_id;\n\
  ```\n清单 13-3\n返回 Stock Item Key 列元数据的查询\n\n图 13-3 提供了此查询的输出，显示了每个行组 `Stock Item\
  \ Key` 的最小值和最大值。\n\n![图 13-3：Stock Item Key 列的列存储段元数据](img/521866_1_En_13_Fig3_HTML.jpg)\n\
  图 13-3\nStock Item Key 列的列存储段元数据\n\n查看此段元数据时，可以明显看出每个行组的 `Stock Item Key` 值范围都同样广泛，因此\
  \ SQL Server 无法有效地使用元数据来通过此列进行筛选。值得注意的是，查询大于 219 的值将允许进行一些行组消除，因为某些行组的 `max_data_id`\
  \ 是 219，而不是 227 或 225。忽略这个小细节，可以安全地说，大多数筛选 `Stock Item Key` 的查询都将被迫扫描列存储索引中的所有行组才能返回结果。\n\
  \n如果筛选 `Stock Item Key` 的查询很频繁，并且它们当前的性能慢得无法接受，那么解决此挑战的一个方案是在列存储索引之上实现一个非聚集行存储覆盖索引。为了覆盖此处展示的查询，有必要按\
  \ `Stock Item Key` 排序并包含 `Quantity`。清单 13-4 中的查询创建了这个索引。\n\n```\nCREATE NONCLUSTERED\
  \ INDEX IX_Sale_CCI_ORDERED\nON Fact.Sale_CCI_ORDERED ([Stock Item Key]) INCLUDE\
  \ (Quantity);\n```\n清单 13-4\n创建覆盖行存储索引的查询\n\n索引创建查询大约需要 45 秒完成。完成后，执行清单 13-2 中的示例查询会产生新的执行计划和新的\
  \ I/O，如图 13-4 所示。\n\n![图 13-4：使用覆盖索引时的查询执行计划和 I/O](img/521866_1_En_13_Fig4_HTML.jpg)\n\
  图 13-4\n使用覆盖索引时的查询执行计划和 I/O\n\nSQL Server 完全使用覆盖索引来执行查询，导致 394 次读取和对新索引的一次索引查找。此\
  \ I/O 略高于前一个示例，但这不应是确定索引策略时的唯一决策指标。查询执行速度也极快。使用非聚集行存储索引有几个关键优势：\n\n*   快速、可预测的执行时间，无论查询参数如何。\n\
  *   针对覆盖索引的查询读取不会与针对聚集列存储索引的查询产生争用。\n*   可预测的执行计划和 I/O。\n\n覆盖非聚集行存储索引的优势完全体现在读取方面。在决定创建此类覆盖索引之前，必须了解其缺点：\n\
  \n*   写入时间会变慢，因为需要填充非聚集索引并将其映射到聚集列存储索引。\n*   当存在任何非聚集行存储索引时，不会使用 Vertipaq 优化。到聚集列存储索引的映射过程使得重新排序行成为一个效率低下的过程，无法在运行时执行。\n\
  \n\n## 非聚集行存储索引的大小考量\n\n非聚集行存储索引的大小将会膨胀。来自聚集索引的数据会在非聚集索引中被复制。此外，将行存储索引链接回聚集列存储索引的键是一个\
  \ 8 字节的唯一值，它由 4 字节的行组 ID 和 4 字节的偏移量组合而成。如果非聚集索引不是唯一的，则会在索引的叶级别内部使用额外的（可变）存储空间来强制实施唯一性。\n\
  \n为聚集列存储索引添加非聚集行存储索引绝非一个低成本的决策。其代价是存储空间、内存使用量和写入速度。因此，在向聚集列存储索引添加辅助索引之前，必须仔细斟酌。\n\
  \n## 强制实施约束\n\n在聚集列存储索引上使用非聚集行存储索引的一个常见用途与性能无关。非聚集行存储索引可用于通过主键或使用唯一的非聚集索引定义来强制表的唯一性。\n\
  \n创建唯一约束与在聚集行存储表上创建并无不同。清单 13-5 展示了为已有的聚集列存储索引上的非聚集主键创建的语句。\n\n```sql\nALTER TABLE\
  \ Fact.Sale ADD CONSTRAINT PK_Fact_Sale PRIMARY KEY NONCLUSTERED\n(      [Sale Key]\
  \ ASC,\n[Invoice Date Key] ASC);\n```\n清单 13-5: 在聚集列存储表上创建唯一的非聚集行存储索引\n\n这个新索引作为基础表的主键，既强制实施唯一性，也允许在引用此表的其他表上创建外键。如果这两者中的任何一个都是重要的架构需求，那么在聚集列存储索引上创建主键是一个很好的解决方案。\n\
  \n表 `Fact.Sale` 上定义了多个非聚集行存储索引。清单 13-6 中的查询返回表中每个索引的大小。\n\n```sql\nSELECT\nindexes.name\
  \ AS Index_Name,\nSUM(dm_db_partition_stats.used_page_count) * 8 Index_Size_KB,\n\
  SUM(dm_db_partition_stats.row_count) AS Row_Count\nFROM sys.dm_db_partition_stats\n\
  INNER JOIN sys.indexes\nON dm_db_partition_stats.object_id = indexes.object_id\n\
  AND dm_db_partition_stats.index_id = indexes.index_id\nINNER JOIN sys.tables\nON\
  \ tables.object_id = dm_db_partition_stats.object_id\nINNER JOIN sys.schemas\nON\
  \ schemas.schema_id = tables.schema_id\nWHERE schemas.name = 'Fact'\nAND tables.name\
  \ = 'Sale'\nGROUP BY indexes.name\nORDER BY indexes.name\n```\n清单 13-6: 查询 `Fact.Sale`\
  \ 表上每个索引大小的语句\n\n索引大小查询的结果如图 13-5 所示。\n\n![](img/521866_1_En_13_Fig5_HTML.jpg)\n\
  图 13-5: 一个表的索引大小详情\n\n除了聚集列存储索引和非聚集行存储主键外，还有另外七个非聚集行存储索引，每个都索引一个外键列。请注意，每个辅助索引的大小都接近列存储索引本身的总大小。因此，表本身包含大约\
  \ 5.7MB 的压缩列存储数据，但用于数据和索引空间的总空间约为 45MB。\n\n这是一个索引过多的表的绝佳示例。如果用户确实需要根据如此多的维度进行搜索，而无需考虑单一的数据顺序，那么列存储索引可能不是此表的理想解决方案。或者，移除大部分额外索引可能仍然能提供足够快的性能。\n\
  \n使用非聚集行存储索引来强制聚集列存储索引的唯一性，在寻求对 OLAP 数据强制实施数据完整性时，可以成为一个有价值的工具。除非组织对这些索引的需求远超其成本，否则通常不建议在聚集列存储表上实现多个行存储索引。\n\
  \n## 筛选非聚集行存储索引\n\n减轻列存储索引上非聚集行存储索引成本的一种方法是添加筛选器。筛选索引针对表中更小的部分，消耗更少的存储和内存，并且可以减少对列存储索引压缩和性能的影响。\n\
  \n通常，针对分析表的 OLTP 查询可能只针对一部分数据——可能是较新的、较旧的，或者基于其他有用的筛选条件。考虑清单 13-2 中测试的 T-SQL。该查询在\
  \ `Stock Item Key` 上进行筛选，而这不是列存储索引的排序列。为了减轻此查询的成本，添加了一个非聚集行存储索引，如清单 13-4 所示。如果这个查询从不针对新数据，而只用于分析旧销售记录呢？考虑清单\
  \ 13-7 中更新后的索引。\n\n```sql\nCREATE NONCLUSTERED INDEX IX_Sale_CCI_ORDERED\nON Fact.Sale_CCI_ORDERED\
  \ ([Stock Item Key], [Invoice Date Key]) INCLUDE (Quantity)\nWHERE [Invoice Date\
  \ Key] <= '1/1/2016';\n```\n清单 13-7: 在聚集列存储索引上创建筛选非聚集行存储索引的示例\n\n当执行使用此索引并筛选 2016\
  \ 年 1 月 1 日 之前数据的查询时，它将使用筛选索引而非列存储索引。由于索引更小，读取的行数和 IO 将少于此索引的未筛选版本。\n\n筛选非聚集行存储索引的一个重要优势是，它允许索引更具体地针对热数据、温数据或冷数据。这提供了多重好处：\n\
  - 允许索引针对特定用例，而非所有数据\n- 允许更好地管理 Vertipaq 优化\n- 可以促进添加多个非聚集索引，同时减少对写入性能或资源消耗的影响\n\n\
  如果需要在聚集列存储索引上创建辅助索引，请考虑是否可以添加筛选器以减小非聚集索引的大小和影响。假设使用该索引的查询能够一致地使用筛选器，这是一种提高性能并减少存储和内存占用的简单方法。\n\
  \n## 启用 Vertipaq 优化\n\n向聚集列存储索引添加非聚集行存储索引的一个缺点是，SQL Server 将自动放弃 Vertipaq 优化。这将导致列存储压缩的效果不如使用该功能时那么好。请注意，Vertipaq\
  \ 优化仅对插入表中的新数据跳过。在创建非聚集索引之前已存在于列存储索引中的任何数据，仍将受益于该优化带来的性能提升。\n\n如果需要在聚集列存储索引上创建非聚集行存储索引，请考虑以下解决方案之一，这些方案将允许在压缩的列存储段上维持\
  \ Vertipaq 优化。\n\n### 向非聚集行存储索引添加筛选器\n\n除了在需要时针对相关数据外，筛选器还可以在创建非聚集索引时跳过热数据。这使得新数据可以使用\
  \ Vertipaq 优化插入到聚集列存储索引中，而较旧的数据仍然可以使用非聚集行存储索引进行读取。\n\n\n### 执行周期性索引维护\n\n如果需要非聚集索引且无法应用筛选器，则可以考虑进行周期性维护，并执行以下步骤：\n\
  1.  删除非聚集行存储索引。\n2.  重建聚集列存储索引。\n3.  重新创建非聚集行存储索引。\n\n这可能非常耗时，尤其是对于较大的表，但可以使列存储索引得以周期性地重建，从而变得更小、更高效。\n\
  \n请注意，分区在此处可以成为一个有价值的工具，因为索引维护可以针对特定分区进行。清单 13-8 中的查询展示了如何筛选分区，以仅显示那些包含未进行 Vertipaq\
  \ 优化的行组的分区。\n\n```sql\nSELECT DISTINCT\n    objects.name,\n    partitions.partition_number,\n\
  \    dm_db_column_store_row_group_physical_stats.row_group_id,\n    dm_db_column_store_row_group_physical_stats.has_vertipaq_optimization\n\
  FROM sys.dm_db_column_store_row_group_physical_stats\nINNER JOIN sys.objects\n \
  \   ON objects.object_id = dm_db_column_store_row_group_physical_stats.object_id\n\
  INNER JOIN sys.partitions\n    ON partitions.object_id = objects.object_id\n   \
  \ AND partitions.partition_number = dm_db_column_store_row_group_physical_stats.partition_number\n\
  WHERE objects.name = 'Sale'\n    AND dm_db_column_store_row_group_physical_stats.has_vertipaq_optimization\
  \ IS NOT NULL\n    AND dm_db_column_store_row_group_physical_stats.has_vertipaq_optimization\
  \ = 0\nORDER BY dm_db_column_store_row_group_physical_stats.row_group_id;\n```\n\
  清单 13-8：返回未从 Vertipaq 优化中受益的行组的查询\n\n结果如图 13-6 所示。\n\n![](img/521866_1_En_13_Fig6_HTML.jpg)\n\
  图 13-6：缺乏 Vertipaq 优化的行组\n\n结果显示只有三个分区（3、4 和 5）包含缺乏 Vertipaq 优化的行组。因此，周期性索引维护可以仅针对这些分区进行，跳过其余分区。对于不需要较细粒度细节的情况，可以从查询中省略`row_group_id`，将结果集缩减为不包含行组\
  \ ID 的分区列表。\n\n## 索引视图\n\n可以在聚集列存储索引之上创建索引视图。虽然这增加了一层复杂性，但它允许那些不遵循列存储索引自然排序的查询被隔离到它们自己独立的数据结构中。在那里，视图及其索引可以自由修改，而不会直接影响底层表。\n\
  \n在对存储在聚集列存储索引中的数据进行补充索引的性能测试时，这可以提供更大的灵活性。清单 13-9 中的脚本重建了`Fact.Sale`上的列存储索引，基于它创建了一个架构绑定视图，并向新视图添加了一对索引。\n\
  \n```sql\nALTER INDEX [CCX_Fact_Sale] ON fact.sale REBUILD;\nGO\nCREATE VIEW Fact.v_Sale\n\
  WITH SCHEMABINDING\nAS\nSELECT\n    [Sale Key],\n    [City Key],\n    [Customer\
  \ Key],\n    [Bill To Customer Key],\n    [Stock Item Key],\n    [Invoice Date Key],\n\
  \    [Delivery Date Key],\n    [Salesperson Key],\n    [WWI Invoice ID],\n    Description,\n\
  \    Package,\n    Quantity,\n    [Unit Price],\n    [Tax Rate],\n    [Total Excluding\
  \ Tax],\n    [Tax Amount],\n    Profit,\n    [Total Including Tax],\n    [Total\
  \ Dry Items],\n    [Total Chiller Items],\n    [Lineage Key]\nFROM Fact.Sale;\n\
  GO\nCREATE UNIQUE CLUSTERED INDEX CI_v_sale\nON Fact.v_Sale ([Sale Key], [Invoice\
  \ Date Key]);\nGO\nCREATE NONCLUSTERED INDEX IX_v_Sale\nON Fact.v_Sale ([Stock Item\
  \ Key], Quantity)\nGO\n```\n清单 13-9：重建表并向列存储索引添加索引视图的脚本\n\n重建列存储索引可确保在进一步测试之前索引处于原始状态。此演示中创建的视图包含了表中的所有列，但可以修改为包含更少的列、连接其他表、添加计算列等。下一步是在视图上创建唯一的聚集索引。此步骤是必需的，因为在视图上创建非聚集索引需要以唯一索引为前提。最后，添加一个非聚集覆盖索引来处理针对其列的查询。\n\
  \n完成后，清单 13-2 中的分析查询可以修改为针对该视图，如清单 13-10 所示。\n\n```sql\nSELECT\n    COUNT(*),\n\
  \    SUM(Quantity) AS total_quantity\nFROM Fact.v_Sale\nWHERE [Stock Item Key] =\
  \ 186;\n```\n清单 13-10：针对索引视图的分析查询\n\n查询结果返回迅速。执行计划和`STATISTICS IO`输出如图 13-7 所示。\n\
  \n![](img/521866_1_En_13_Fig7_HTML.jpg)\n图 13-7：针对索引视图查询的执行计划和 STATISTICS IO 输出\n\
  \n执行计划确认使用了视图`v_Sale`上的非聚集索引。IO 输出显示对视图的读取量低到可接受水平。使用索引视图来管理对列存储索引的选择读取有一个意想不到的副作用：当新行插入到列存储索引中时，仍然会使用\
  \ Vertipaq 优化！\n\n虽然这是针对列存储索引的索引视图的一个有用优势，但在向现有表添加复杂性时仍应谨慎。平衡非典型工作负载对列存储索引的需求与维护附加视图及这些视图上的索引的成本之间的关系。\n\
  \n务必先在没有支撑视图或索引的情况下测试查询。彻底确认其性能，如果需要，再测试附加索引或索引视图的影响，以确认这些增加是否值得其成本。\n\n## 非聚集行存储索引的压缩\n\
  \n鉴于添加到聚集列存储索引中的非聚集行存储索引的膨胀尺寸，压缩可以成为控制附加索引大小并提高对其读取性能的一种有价值的方式。\n\n考虑定义在`Fact.Sale`上的非聚集主键。图\
  \ 13-5 中的索引大小数据显示该索引占用了 6,624KB。清单 13-11 中的脚本删除了此约束，并用一个使用页面压缩的新版本替换它。\n\n```sql\n\
  ALTER TABLE Fact.Sale DROP CONSTRAINT PK_Sale;\nALTER TABLE Fact.Sale ADD CONSTRAINT\
  \ PK_Sale PRIMARY KEY NONCLUSTERED ([Sale Key], [Invoice Date Key])\n    WITH (DATA_COMPRESSION\
  \ = PAGE);\n```\n清单 13-11：使用页面压缩重新创建非聚集主键的脚本\n\n完成后，可以执行清单 13-12 中的代码以确认应用压缩后索引的新大小。\n\
  \n```sql\nSELECT\n    indexes.name AS Index_Name,\n    SUM(dm_db_partition_stats.used_page_count)\
  \ * 8 Index_Size_KB,\n    SUM(dm_db_partition_stats.row_count) AS Row_Count\nFROM\
  \ sys.dm_db_partition_stats\nINNER JOIN sys.indexes\n    ON dm_db_partition_stats.object_id\
  \ = indexes.object_id\n    AND dm_db_partition_stats.index_id = indexes.index_id\n\
  INNER JOIN sys.tables\n    ON tables.object_id = dm_db_partition_stats.object_id\n\
  INNER JOIN sys.schemas\n    ON schemas.schema_id = tables.schema_id\nWHERE indexes.name\
  \ = 'PK_Sale'\nGROUP BY indexes.name;\n```\n清单 13-12：检查压缩后的非聚集索引大小的脚本\n\n结果如图 13-8\
  \ 所示。\n\n![](img/521866_1_En_13_Fig8_HTML.jpg)\n图 13-8：页面压缩非聚集主键的索引大小\n\n结果显示，该索引现在仅占用\
  \ 2,736KB，减少了 3,888KB，约 59%。这是一个显著的空间节省，说明了压缩在应用于列存储索引表上的次级非聚集索引时可能产生的积极影响。\n\n\n\
  \n"
- "# 14. 列存储索引维护\n\n## 非聚集行存储索引指南\n\n在聚集列存储索引上添加非聚集行存储索引，是管理针对分析数据的频繁、非常规查询模式的有效方法。通过将不同的读取操作分散到聚集和非聚集索引上，可以更好地管理争用，因为锁也会被分散到各个索引上。在进行任何索引更改之前，请确保新索引是必要的，并能提供足够的长期收益以抵消其成本。\n\
  \n在可能的情况下，考虑使用筛选器来缩小非聚集索引的大小，并减少它们对底层列存储索引的影响。类似地，如果尚未使用，请考虑采用分区，因为它可以简化和加速索引维护过程。\n\
  \n当存在将非常规工作负载从列存储索引隔离到单独对象上的额外价值时，可以考虑在列存储索引上创建索引视图。维护它们的成本绝非微不足道，但它们可以提供一种便捷的方式，将特定工作负载封装到它们自己的对象上。将工作负载拆分到单独的对象中有助于减少争用，因为对每个对象的读取操作会分别针对它们，并且这些对象之间是分别锁定的。\n\
  \n无论辅助索引是如何创建的，都请考虑对其进行压缩。压缩可以极大地减少存储消耗，从而降低内存占用并加快使用压缩索引的读取查询速度。\n\n根据经验法则，如果针对列存储索引的非聚集行存储索引数量超过一个（或者在使用索引视图的情况下超过两个），请考虑存储此数据的替代方法，例如：\n\
  \n*   使用页面压缩并在需要时支持索引的聚集行存储表。\n*   使用更少非聚集索引的聚集列存储索引。\n*   将工作负载分离到彼此独立管理的单独表中。\n\
  *   对索引应用压缩和/或筛选器，以减少每个索引的大小和维护开销，使其更易于管理。\n\n本章提供了多种策略，旨在找到一种有利的配置，允许截然不同的工作负载在单个表上和平共存。然而，对于聚集列存储索引上的辅助索引，并不存在一种“一刀切”的方法。如果不确定最佳的进行方式，请彻底测试每种替代方案，以熟悉每种方法的优缺点。\n\
  \n## 碎片产生的原因是什么？\n\n可以用三种场景来描述列存储索引中的碎片：\n\n1.  由于删除行导致的浪费空间\n2.  无序插入的数据\n3.  索引中存在多个增量行组\n\
  \n当在列存储索引中删除数据时，实际上并未移除任何行。因为解压缩、删除行组、重新压缩行组的成本在运行时高得令人望而却步。相反，SQL Server 使用 `删除位图`\
  \ 将这些行标记为已删除，当查询访问这些数据时，它们会使用该位图来识别需要跳过的任何已删除行。\n\n章节 9 详细介绍了 `DELETE` 和 `UPDATE`\
  \ 操作如何在列存储索引上执行，并概述了管理这些操作以避免持续的性能挑战和最小化碎片的方法。删除操作对列存储索引的净影响将是：\n\n*   被删除数据所占用的空间。\n\
  *   运行时需要读取比实际所需更多的数据。\n*   数据分散在比必要数量更多的行组中。\n\n碎片的另一个原因是无序数据。列存储索引应始终使用按在过滤和聚合查询中最常用的键列（或列）排序的数据来构建和维护。\n\
  \n章节 10 描述了数据排序在列存储索引中的重要性，以及维护与常见查询过滤器和聚合操作一致的数据排序如何能够实现极快的查询性能。\n\n以期望的列存储索引顺序定期插入的数据将促进\
  \ `行组消除`，从而在使用相同列进行过滤时，能够自动跳过索引的大部分内容。当行被无序插入时，这将导致读取比必要更多的数据。同样，由于 `UPDATE` 操作是\
  \ `DELETE` 和 `INSERT` 操作的组合，更新列存储索引中任何较旧的数据都会导致它与较新的数据一起在索引的尾部重新插入。\n\n考虑图 14-1\
  \ 中的示例列存储索引，它按 `Order_Date` 排序。\n\n![](img/521866_1_En_14_Fig1_HTML.jpg)\n\n图 14-1：按日期维度排序的列存储索引\n\
  \n此列存储索引完美地按订单年份排序，每组行组中的行按日期升序排列。如果执行一个计算 2016 年指标的查询，它可以读取前十组行组，而忽略其他 140 组。\n\
  \n图 14-2 显示了一个 `UPDATE` 操作的结果，该操作更改了 2016 年 100,000 行、2017 年 50,000 行和 2018 年 25,000\
  \ 行的数据。\n\n![](img/521866_1_En_14_Fig2_HTML.jpg)\n\n图 14-2：`UPDATE` 操作后行组结构的变化\n\
  \n当行被更新时，它们仍保留在列存储索引中的先前位置，但被标记为已删除。创建了一个新的行组，其中包含被删除行的新版本。结果是，现在有一个开放行组包含了 2016、2017\
  \ 和 2018 年的数据。此外，当新数据插入表中时，它也会被添加到这个开放行组中，导致另一年的数据被塞进同一个行组。\n\n今后，任何需要 2016、2017、2018\
  \ 年或当年数据的查询都需要读取这个无序的行组。如果这类更新很常见，那么较旧的行组将很快因已删除的行而堵塞，而较新的行组则成为来自许多不同日期的无序数据大杂烩。其结果将是浪费存储空间、浪费内存，以及需要读取比返回结果所需数据量多得多的数据的更慢查询。\n\
  \n无序插入将产生与 `UPDATE` 语句中的 `INSERT` 部分类似的影响。在图 14-1 中的列存储索引中插入 2015 年的数据，将导致新的行组同时包含新数据和旧数据。随着时间的推移，无序插入将导致\
  \ SQL Server 无法利用 `行组消除`，因为越来越多的行组包含来自所有不同时间段的数据。\n\n增量行组是列存储索引架构的关键组成部分，确保写操作能够尽可能快地执行。然而，它们会略微降低读取速度，因为行驻留在\
  \ b-tree 结构中，且未使用列存储压缩进行压缩。增量存储对读取性能的影响并不显著，但希望最大化列存储读取性能的管理员会在数据加载过程完成后，有兴趣尽快压缩它们。\n\
  \n\n\n## 碎片化到什么程度才算过多？\n\n与行存储索引类似，碎片化在变得足以影响性能并浪费可观空间之前，并不需要特别关注。一个包含 50 亿行的列存储索引，其中只有\
  \ 1000 行被删除，不应被视为问题。反之，如果这些行中有十亿行被删除，那么由此产生的碎片化就值得处理了。\n\n碎片化应分解为两种不同的计算方式，每种都可以进行客观评估并采取适当措施。一种是表中已删除行所占的百分比，另一种是列存储索引内数据无序程度的度量。\n\
  \n### 量化已删除行\n\n已删除行包含在视图 `sys.column_store_row_groups` 中，相对容易报告。`清单 14-1` 中的查询返回单个聚簇列存储索引中每个行组的一行信息。\n\
  \n```sql\nSELECT\n    tables.name AS table_name,\n    indexes.name AS index_name,\n\
  \    partitions.partition_number,\n    column_store_row_groups.row_group_id,\n \
  \   column_store_row_groups.total_rows,\n    column_store_row_groups.deleted_rows\n\
  FROM sys.column_store_row_groups\nINNER JOIN sys.indexes\n    ON indexes.index_id\
  \ = column_store_row_groups.index_id\n    AND indexes.object_id = column_store_row_groups.object_id\n\
  INNER JOIN sys.tables\n    ON tables.object_id = indexes.object_id\nINNER JOIN sys.partitions\n\
  \    ON partitions.partition_number = column_store_row_groups.partition_number\n\
  \    AND partitions.index_id = indexes.index_id\n    AND partitions.object_id =\
  \ tables.object_id\nWHERE tables.name = 'Sale_CCI'\nORDER BY indexes.index_id, column_store_row_groups.row_group_id;\n\
  ```\n\n`清单 14-1` 用于返回每个行组已删除行的查询\n\n结果如 `图 14-3` 所示。\n\n![](img/521866_1_En_14_Fig3_HTML.jpg)\n\
  \n`图 14-3` 列存储索引每个行组的已删除行计数\n\n此详细信息显示了每个行组删除了多少行。结果可以聚合起来，显示每个分区或整个表的已删除行数。如果表是分区的，那么了解已删除行是仅存在于一个分区还是所有分区中，这有助于判断是需要对所有分区还是仅对部分分区进行处理。\n\
  \n在 `图 14-3` 概述的示例结果中，大约 5% 的列存储索引由已删除行组成，这些行在索引中分布相对均匀。作为粗略准则，除非已删除行的百分比至少达到分区或表中总行数的\
  \ 10%，否则没有立即进行索引维护的迫切需要。\n\n请记住，已删除行对性能的影响是随时间逐渐累积的。永远不会出现达到某个阈值后性能突然暴跌的情况。因此，当已删除行超过某个设定百分比时自动执行索引维护，是避免意外让索引变得极其碎片化的有效方法。\n\
  \n### 详述无序数据\n\n通过查询段元数据可以很容易地看出有序数据的有效性，但要量化可能具有挑战性。`清单 14-2` 中的查询展示了如何检索给定列存储索引和单个列的段最小和最大数据\
  \ ID。\n\n```sql\nSELECT\n    tables.name AS table_name,\n    indexes.name AS index_name,\n\
  \    columns.name AS column_name,\n    partitions.partition_number,\n    column_store_segments.segment_id,\n\
  \    column_store_segments.min_data_id,\n    column_store_segments.max_data_id,\n\
  \    column_store_segments.row_count\nFROM sys.column_store_segments\nINNER JOIN\
  \ sys.partitions\n    ON column_store_segments.hobt_id = partitions.hobt_id\nINNER\
  \ JOIN sys.indexes\n    ON indexes.index_id = partitions.index_id\n    AND indexes.object_id\
  \ = partitions.object_id\nINNER JOIN sys.tables\n    ON tables.object_id = indexes.object_id\n\
  INNER JOIN sys.columns\n    ON tables.object_id = columns.object_id\n    AND column_store_segments.column_id\
  \ = columns.column_id\nWHERE tables.name = 'Sale_CCI'\n    AND columns.name = 'Invoice\
  \ Date Key'\nORDER BY tables.name, columns.name, column_store_segments.segment_id;\n\
  ```\n\n`清单 14-2` 用于检索列存储索引中给定列的最小/最大数据 ID 的查询\n\n此查询的结果提供了关于此索引内数据顺序的有用见解，如 `图 14-4`\
  \ 所示。\n\n![](img/521866_1_En_14_Fig4_HTML.jpg)\n\n`图 14-4` 无序列存储索引的段最小/最大值元数据\n\n\
  在元数据中，请注意每个行组的 `min_data_id` 和 `max_data_id` 值是相同的。这意味着在 `Invoice Date Key` 列上进行筛选的查询将被迫扫描整张表才能返回结果，因为任何值都可能出现在任何行组中。\n\
  \n考虑此表的一个有序版本，其结果如 `图 14-5` 所示。\n\n![](img/521866_1_En_14_Fig5_HTML.jpg)\n\n`图 14-5`\
  \ 有序列存储索引的段最小/最大值元数据\n\n这个版本的表显示了 `min_data_id` 和 `max_data_id` 的值随着 `segment_id`\
  \ 的增加而呈现递进变化。因为每个段包含一组不同的列值，所以这个元数据可以有效地用于跳过任何包含与查询无关值的行组。`清单 14-3` 中的查询返回列存储索引中所有存在值重叠的段的完整列表。这里使用了不包含边界的不等式，因为一个行组的起始值和结束值通常会与下一个行组的值重叠。\n\
  \n\n```\nWITH CTE_SEGMENTS AS (\nSELECT\ntables.name AS table_name,\nindexes.name\
  \ AS index_name,\ncolumns.name AS column_name,\npartitions.partition_number,\ncolumn_store_segments.segment_id,\n\
  column_store_segments.min_data_id,\ncolumn_store_segments.max_data_id,\ncolumn_store_segments.row_count\n\
  FROM sys.column_store_segments\nINNER JOIN sys.partitions\nON column_store_segments.hobt_id\
  \ = partitions.hobt_id\nINNER JOIN sys.indexes\nON indexes.index_id = partitions.index_id\n\
  AND indexes.object_id = partitions.object_id\nINNER JOIN sys.tables\nON tables.object_id\
  \ = indexes.object_id\nINNER JOIN sys.columns\nON tables.object_id = columns.object_id\n\
  AND column_store_segments.column_id = columns.column_id\nWHERE tables.name = 'Sale_CCI_ORDERED'\n\
  AND columns.name = 'Invoice Date Key')\nSELECT\nCTE_SEGMENTS.table_name,\nCTE_SEGMENTS.index_name,\n\
  CTE_SEGMENTS.column_name,\nCTE_SEGMENTS.partition_number,\nCTE_SEGMENTS.segment_id,\n\
  CTE_SEGMENTS.min_data_id,\nCTE_SEGMENTS.max_data_id,\nCTE_SEGMENTS.row_count,\n\
  OVERLAPPING_SEGMENT.partition_number AS overlapping_partition_number,\nOVERLAPPING_SEGMENT.segment_id\
  \ AS overlapping_segment_id,\nOVERLAPPING_SEGMENT.min_data_id AS overlapping_min_data_id,\n\
  OVERLAPPING_SEGMENT.max_data_id AS overlapping_max_data_id\nFROM CTE_SEGMENTS\n\
  INNER JOIN CTE_SEGMENTS OVERLAPPING_SEGMENT\nON (OVERLAPPING_SEGMENT.min_data_id\
  \ > CTE_SEGMENTS.min_data_id\nAND OVERLAPPING_SEGMENT.min_data_id  CTE_SEGMENTS.min_data_id\n\
  AND OVERLAPPING_SEGMENT.max_data_id  CTE_SEGMENTS.max_data_id)\nORDER BY CTE_SEGMENTS.partition_number,\
  \ CTE_SEGMENTS.segment_id\n代码清单 14-3\n返回重叠段列表的查询\n```\n\n此查询评估每个行组中某一列的最小值和最大值边界，并确定是否有任何其他行组的值范围与之重叠。\n\
  \n图 14-6 所示的查询返回的列表乍一看可能很长，但需要注意的是，任何成为 UPDATE 操作或无序插入目标的列存储索引都会在此处有条目。查看返回的数据，可以看到无序数据相对均匀地分布在各个段中，每个段包含\
  \ 1-4 个其他段，这些段至少有一个值与之重叠。\n\n![](img/521866_1_En_14_Fig6_HTML.jpg)\n\n图 14-6\n\n\
  `Invoice Date Key`列在行组内的重叠值列表\n\n虽然没有精确的方法来衡量无序数据的百分比，就像可以测量列存储索引中已删除行的百分比那样，但可以通过对列存储索引执行`COUNT(*)`查询来进行元数据测试，从而评估数据顺序对查询性能的影响程度。可以对表中的每个日期执行此操作，这将导致一个非常详尽的实验。为了进行简单演示，将如代码清单\
  \ 14-4 中的查询所示，随机选择八个样本日期进行测试。\n\n```\nSELECT\n[Invoice Date Key],\nCOUNT(*) AS Sale_Count\n\
  FROM Fact.Sale_CCI_ORDERED\nWHERE [Invoice Date Key] IN ('5/1/2013', '9/5/2013',\
  \ '1/17/2014', '6/30/2014', '3/14/2015', '12/12/2015', '1/1/2016', '2/29/2016')\n\
  GROUP BY [Invoice Date Key]\nORDER BY [Invoice Date Key]\n代码清单 14-4\n用于测试列存储索引中数据有序程度的样本日期\n\
  ```\n\n图 14-7 中的结果提供了每个日期的行数。\n\n![](img/521866_1_En_14_Fig7_HTML.jpg)\n\n图 14-7\n\
  \n用于测试列存储数据顺序有效性的样本日期列表\n\n每个选中的数据点最多包含表中 0.1%的数据，因为总共有 25,109,150 行，而这些日期涵盖了其中的八个。根据行数和表大小，一个理想的有序表应该只需要读取\
  \ 1-2 个行组即可检索到任何给定日期的数据。代码清单 14-5 中的查询为之前确定的每个日期执行单独的`COUNT(*)`查询。\n\n```\nSET NOCOUNT\
  \ ON;\nSELECT COUNT(*) FROM Fact.Sale_CCI_ORDERED WHERE [Invoice Date Key] = '5/1/2013';\n\
  SELECT COUNT(*) FROM Fact.Sale_CCI_ORDERED WHERE [Invoice Date Key] = '9/5/2013';\n\
  SELECT COUNT(*) FROM Fact.Sale_CCI_ORDERED WHERE [Invoice Date Key] = '1/17/2014';\n\
  SELECT COUNT(*) FROM Fact.Sale_CCI_ORDERED WHERE [Invoice Date Key] = '6/30/2014';\n\
  SELECT COUNT(*) FROM Fact.Sale_CCI_ORDERED WHERE [Invoice Date Key] = '3/14/2015';\n\
  SELECT COUNT(*) FROM Fact.Sale_CCI_ORDERED WHERE [Invoice Date Key] = '12/12/2015';\n\
  SELECT COUNT(*) FROM Fact.Sale_CCI_ORDERED WHERE [Invoice Date Key] = '1/1/2016';\n\
  SELECT COUNT(*) FROM Fact.Sale_CCI_ORDERED WHERE [Invoice Date Key] = '2/29/2016';\n\
  代码清单 14-5\n用于测试行组读取的`COUNT`查询\n```\n\n图 14-8 显示了前面每个查询的`STATISTICS IO`输出。\n\n![](img/521866_1_En_14_Fig8_HTML.jpg)\n\
  \n图 14-8\n\n代码清单 14-5 中`COUNT`查询的`STATISTICS IO`输出\n\n对于八个`COUNT(*)`样本查询中的每一个，都需要读取\
  \ 3-4 个行组来获取计数。根据已知这些查询应该只读取 1-2 个行组，可以推断查询通常读取的行组数量是必要数量的两到三倍。根据表上更新和无序插入操作的频率，这可能是可以接受的，也可能是异常的。了解表的用法有助于理解这些数字的极端程度，以及读取三个行组而不是一个是否正常或值得关注。\n\
  \n使用`STATISTICS IO`测试读取和跳过的行组是衡量列存储索引有序程度的有效方法。如果希望对此测试进行得更全面，并对表中的许多（或所有）日期执行计数查询，请考虑将其视为维护工作，并在预定时间运行冗长的维护脚本时进行该项研究。\n\
  \n## 无需维护的列存储索引\n\n理想的列存储索引几乎不需要维护。当满足以下条件时，这是可能的：\n\n*   行从不被删除。\n*   行从不被更新。\n\
  *   行总是按顺序插入。\n\n如果这三个条件都能满足，那么列存储索引几乎可以免于所有维护。是否执行任何维护取决于其管理员的意愿。实际上，当列存储索引不是删除、更新或无序插入的目标时，唯一可能产生的次优情况是，由于使用增量存储来处理小的\
  \ INSERT 操作，行组的大小可能不足。\n\n由使用增量存储导致的行组大小不足影响很小，不应被视为需要立即解决的紧急问题。在这些场景中，等待不频繁的维护时段来执行列存储索引维护就足以有效确保欠大小的行组被有效合并。每季度或每年一次可能就足够了。\n\
  \n既然已经详细阐述了碎片产生的原因，现在可以讨论使用索引维护操作来解决碎片问题了。\n\n\n"
- '# 列存储索引重组


  对于列存储索引，可用的最快且最简单的操作是 `REORGANIZE`。这是一项联机操作，可完成以下任务：


  -   通过列存储索引合并来组合尺寸过小的行组。当多个行组可以合并到一个新的行组（行数少于 `1,024,576` 或 `2²⁰`）时，就会发生此情况。

  -   可能通过自合并删除已删除的行。这仅在行组中有超过 `102,400` 行被删除时才会发生。


  如果这两项任务都适用于一组行组，则合并操作将优先于自合并操作。由于字典压力而被修剪的行组无法与其他行组合并，无论其行数多少。


  为了演示列存储 `REORGANIZE` 操作可以使用的合并和自合并操作，将从列存储索引中删除大量行，如清单 14-6 所示。


  ```sql

  DELETE

  FROM Fact.Sale_CCI_ORDERED

  WHERE [Invoice Date Key] <= ''1/17/2013'';

  ```

  *清单 14-6: 删除大部分行组的查询*


  图 14-9 显示了使用清单 14-1 中提供的相同查询，列存储索引行组元数据中已删除行的结果集。


  ![](img/521866_1_En_14_Fig9_HTML.jpg)


  *图 14-9: 列存储索引每个行组的已删除行数*


  右侧的第二列显示行组中的总行数，而最右侧的列则提供了已删除的行数。在有已删除行的行组中，只有行组 `23` 和 `24` 的已删除行数超过 `102,400`
  行，符合自合并操作的条件。这些行组也是列存储合并操作的有效目标，因为它们可以被合并，生成的行组包含的行数将少于列存储行组的行数上限（`2²⁰` 行）。


  列存储 `REORGANIZE` 操作的语法如清单 14-7 所示。


  ```sql

  ALTER INDEX CCI_fact_Sale_CCI_ORDERED ON Fact.Sale_CCI_ORDERED REORGANIZE;

  ```

  *清单 14-7: 列存储重组操作的语法*


  `REORGANIZE` 操作完成后，可以再次查看行组元数据，如图 14-10 所示。


  ![](img/521866_1_En_14_Fig10_HTML.jpg)


  *图 14-10: 索引 REORGANIZE 操作后的行组元数据*


  请注意，行组 `23` 和 `24` 现在被标记为 `**墓碑状态**`，并将在不久的将来由元组移动器清理。创建了两个新的行组（`25` 和 `26`）来替代它们，其中已删除的行已被移除。自合并操作本质上会创建新的行组，将所有未删除的行复制到其中，并将它们交换为活动行组，同时将先前的版本标记为待清理。生成的行组不再有已删除行的负担。请记住，自合并仅在行组中有超过
  `102,400` 行被删除时才会发生。


  一分钟后，行组元数据确认标记为 `**墓碑状态**` 的行组已从列存储索引中移除，如图 14-11 所示。这是一个自动清理过程，无需操作员干预即可触发。


  ![](img/521866_1_En_14_Fig11_HTML.jpg)


  *图 14-11: 元组移动器移除墓碑状态行组后的行组元数据*


  只有当行组尺寸过小的原因与字典压力无关时，行组才能被合并。图 14-12 显示了此列存储索引在 `sys.dm_db_column_store_row_group_physical_stats`
  中的额外元数据。


  ![](img/521866_1_En_14_Fig12_HTML.jpg)


  *图 14-12: 列存储索引的行组元数据，包括行组修剪原因*


  因为行组 `25` 是由于字典压力而被修剪的，所以它不能与行组 `26` 合并，即使它们合并后的行数可以使它们放入单个行组。


  ## 重组以移除增量行组


  在发出列存储索引 `REORGANIZE` 命令时，还有一个额外的选项可用：`COMPRESS_ALL_ROW_GROUPS` 选项。使用此选项时，SQL Server
  将初始化元组移动器来处理增量存储的内容，并将它们移动到压缩行组中。这有效地清空了增量存储，将所有数据移入压缩行组。


  此操作的优点是确保更快的读取操作，因为在处理查询时无需读取增量存储的行存储结构。缺点是，它是一个额外的维护选项，需要时间和资源来执行。考虑清单 14-8 中所示的
  `INSERT` 操作。


  ```sql

  INSERT INTO Fact.Sale_CCI_ORDERED

  ([Sale Key], [City Key], [Customer Key], [Bill To Customer Key], [Stock Item Key],
  [Invoice Date Key], [Delivery Date Key],

  [Salesperson Key], [WWI Invoice ID], Description, Package, Quantity, [Unit Price],
  [Tax Rate], [Total Excluding Tax], [Tax Amount],

  Profit, [Total Including Tax], [Total Dry Items], [Total Chiller Items], [Lineage
  Key])

  VALUES

  (   6769, 69490, 0, 0, 26, ''2013-02-10'', ''2013-02-11'', 36, 2081, ''Coffee Mug'',
  ''Each'', 17, 12.42, 8.00, 211.14, 16.89, 75.00, 228.03,

  17, 0, 11);

  ```

  *清单 14-8: 向列存储索引执行的小型 INSERT 操作*


  一行被插入到列存储索引中。行组元数据可以确认新行驻留在一个打开的增量行组中，如图 14-13 所示，使用的是清单 14-1 中的相同查询。


  ![](img/521866_1_En_14_Fig13_HTML.jpg)


  *图 14-13: 新插入行到增量行组的行组元数据*


  增量存储中只有一行，将使用 `COMPRESS_ALL_ROW_GROUPS` 选项运行 `REORGANIZE` 操作，如清单 14-9 所示。


  ```sql

  ALTER INDEX CCI_fact_Sale_CCI_ORDERED ON Fact.Sale_CCI_ORDERED REORGANIZE WITH (COMPRESS_ALL_ROW_GROUPS
  = ON);

  ```

  *清单 14-9: 使用 COMPRESS_ALL_ROW_GROUPS 选项执行 REORGANIZE*


  索引维护后的列存储元数据如图 14-14 所示。


  ![](img/521866_1_En_14_Fig14_HTML.jpg)


  *图 14-14: 索引维护后立即的行组元数据*


  元数据显示压缩行组中只有一行，旧的增量存储被设置为 `**墓碑状态**`，等待清理。图 14-15 显示了 `**墓碑状态**` 行组被清理后的行组元数据。


  ![](img/521866_1_En_14_Fig15_HTML.jpg)


  *图 14-15: 垃圾回收后的行组元数据*


  只有一个行的压缩行组是愚蠢的，所以将对列存储索引再执行一次 `REORGANIZE`。生成的元数据可以在图 14-16 中看到。


  ![](img/521866_1_En_14_Fig16_HTML.jpg)


  *图 14-16: 尺寸过小的行组合并后的行组元数据*


  行组 `25` 由于字典压力仍然尺寸过小，但行组 `26` 和 `28` 已合并为新形成的行组 `29`。修剪原因描述让操作员了解到该行组是通过索引 `REORGANIZE`
  操作创建和填充的。


  索引 `REORGANIZE` 操作是组合尺寸过小行组的绝佳方法，前提是它们不受字典大小限制的影响。它们也可以删除已删除的行，前提是已删除的行数大于 `102,400`。最后，借助
  `COMPRESS_ALL_ROW_GROUPS` 选项，索引 `REORGANIZE` 可以将增量存储的内容处理到压缩行组中，如果需要，这些行组随后可以通过进一步的
  `REORGANIZE` 操作进行合并。



  '
- '# 列存储索引维护


  对于一个非`UPDATE`操作目标且没有乱序插入的列存储索引，使用索引`REORGANIZE`操作将有效地处理大部分碎片，从而无需进行其他常规索引维护任务。最简单的索引维护应用是在每次数据加载后运行索引`REORGANIZE`操作，并包含`COMPRESS_ALL_ROW_GROUPS`选项。这将确保行组保持相对满的状态，并且增量存储会被处理，不会拖慢列存储查询。对于追求完美的用户，可以执行第二次`REORGANIZE`操作，以进一步合并由已处理的增量存储产生的行组。这些是在线、快速且有效的方法，可以在列存储索引通过常规数据加载过程增长时，持续管理碎片。


  '
- "# 列存储索引重建\n\n重建列存储索引的功能类似于重建行存储索引。发出`REBUILD`命令时，会创建列存储索引的一个全新副本，替换旧索引。虽然这是一个代价高昂的过程，但其结果是：\n\
  \n*   行组在可能的情况下被填满至容量。\n*   所有已删除的行都被消除。\n*   所有增量存储都被处理和压缩。\n*   即使之前没有应用过，也会进行\
  \ Vertipaq 优化。\n\n本质上，`REBUILD`大致等同于使用`CREATE INDEX`语句重新创建一个列存储索引。唯一的区别在于，新的索引构建完成前，现有的索引结构将保持不变。对于在线重建，这确保了在重建操作运行期间，查询可以继续使用列存储索引。\n\
  \n从 SQL Server 2019 开始，重建聚集列存储索引只能作为在线操作完成。而非聚集索引无论 SQL Server 版本如何，都可以在线重建。\n\n\
  考虑本章最近测试的列存储索引。清单`14-10`中的 T-SQL 对该索引发出了`REBUILD`命令。\n\n```\nALTER INDEX CCI_fact_Sale_CCI_ORDERED\
  \ ON Fact.Sale_CCI_ORDERED REBUILD;\n```\n\n清单 14-10\n针对聚集列存储索引的`REBUILD`语句\n\n\
  `REBUILD`操作所需的时间明显长于`REORGANIZE`，因为整个索引必须被完全重新创建。相反，`REORGANIZE`遵循特定的规则来确定要执行的工作，并且通常只操作列存储索引的一小部分。图`14-17`显示了`REBUILD`操作完成后的列存储索引。\n\
  \n![](img/521866_1_En_14_Fig17_HTML.jpg)\n\n图 14-17\n列存储索引`REBUILD`后的行组元数据\n\n`REBUILD`后，列存储索引没有已删除的行，并且行组基本是满的。奇怪的是，最后两个行组（23\
  \ 和 24）是尺寸不足的残留物，可以通过索引`REORGANIZE`操作清理掉。图`14-18`中的元数据显示了在`REBUILD`之后索引又进行了一次额外的`REORGANIZE`后的最终结果。\n\
  \n![](img/521866_1_En_14_Fig18_HTML.jpg)\n\n图 14-18\n列存储索引`REBUILD`和`REORGANIZE`后的行组元数据\n\
  \n最终，索引变得非常干净，有 23 个完全满的行组，以及 1 个由索引维护操作遗留下来的额外行组。\n\n索引`REBUILD`操作应不频繁地用于管理以下几种情况之一：\n\
  \n*   长期累积的尺寸不足的行组，无法通过`REORGANIZE`操作合并。\n*   每个行组少于 102,400 行的大量已删除行，且无法通过`REORGANIZE`操作处理。\n\
  *   列存储索引中存在大量乱序数据。这必须与重新排序数据的工作结合处理，如下一节所示。\n\n请注意，当发出索引`REBUILD`时，如果需要，压缩类型可能会更改为列存储归档压缩或从中更改。由于索引`REBUILD`是一个代价高昂的操作，并且在\
  \ SQL Server 2019 之前是离线的，因此应注意在维护窗口期间执行重建，此时此类工作对使用此数据的进程来说更容易被接受。\n\n有时，由于软件版本对基础架构和数据进行了重大更改，数据可能会变得严重碎片化。如果预计会发生这种情况，那么在软件版本发布后安排索引`REBUILD`作为后处理步骤，将是确保即使在破坏性的软件版本发布后，数据仍能持续高效交付给分析流程的绝佳方式。\n\
  \n`REBUILD`操作可以针对特定分区，从而只重建严重碎片化的数据。对于一个大型列存储索引，其中只有一小部分被频繁写入，这是加速重建并最小化对分析数据用户干扰的绝佳方式。\n\
  \n\n## 列存储索引的重新排序与重建\n\n聚集列存储索引并不强制规定数据的物理顺序。这取决于设计这些表的数据架构师，由他们决定如何排序数据，并确保任何写入该表的操作都强制执行该顺序。在不构建新表和结构的前提下，有效解决数据无序存储挑战的唯一方法是执行以下任务：\n\
  \n1.  删除列存储索引。\n2.  创建一个键列与表的数据顺序匹配的聚集行存储索引。\n3.  使用 `DROP_EXISTING=ON` 选项创建一个新的聚集列存储索引。\n\
  \n聚集行存储索引用于强制表内容采用新的数据顺序，而新的列存储索引会替换它，并保留这个新的数据顺序。\n\n这是一个昂贵且具有破坏性的过程。从索引被删除到新的列存储索引完全构建完成期间，分析查询将无法利用列存储索引。因此，在维护窗口内实施这个过程是值得的，那时造成的干扰更容易被接受。\n\
  \n清单 [14-11] 中的脚本执行这些操作，将数据从其当前状态重新排序为完全按 `Invoice Date Key` 排序的数据。\n\n```\n/* \
  \    Step 1 */\nDROP INDEX CCI_fact_Sale_CCI_ORDERED ON Fact.Sale_CCI_ORDERED;\n\
  /*     Step 2 */\nCREATE CLUSTERED INDEX CCI_fact_Sale_CCI_ORDERED ON Fact.Sale_CCI_ORDERED\
  \ ([Invoice Date Key]);\n/*     Step 3 */\nCREATE CLUSTERED COLUMNSTORE INDEX CCI_fact_Sale_CCI_ORDERED\
  \ ON Fact.Sale_CCI_ORDERED WITH (DROP_EXISTING=ON, MAXDOP=1);\n```\n*清单 14-11 修复聚集列存储索引中数据排序不佳的过程*\n\
  \n请注意，删除聚集列存储索引不是一个快速的操作。它需要将列存储结构转换为 B 树/堆结构，这比删除聚集行存储索引需要更多的计算资源。\n\n修复列存储索引数据顺序的过程应保留到数据碎片化程度高到足以对分析过程产生负面影响的场景中使用，并且应作为一种不频繁的操作。\n\
  \n如果数据在列存储索引中快速变得无序，那么请考虑改变数据加载过程的操作方式，以通过这些数据加载来减少碎片。以下是实现这一目标的一些有用指南：\n\n*   移除对列存储索引的所有\
  \ `UPDATE` 操作。尽可能在暂存表上执行更新。\n*   避免无序插入数据。使用临时表或暂存表来确保在插入新数据之前数据已正确排序。\n\n尽管过程复杂，但修复无序数据的操作可以逐分区执行，从而允许仅对包含温/热数据的活动分区进行昂贵的索引维护操作。对于具有多个分区的列存储索引，这可以节省大量时间，并减少对分析过程的干扰和停机时间。\n\
  \n## 按分区进行列存储索引维护\n\n重建列存储索引的特定分区的语法如清单 [14-12] 所示。\n\n```\nALTER INDEX CCI_fact_Sale_CCI_PARTITIONED\
  \ ON Fact.Sale_CCI_PARTITIONED REBUILD PARTITION = 5;\n```\n*清单 14-12 在分区表上重建列存储索引的单个分区的查询*\n\
  \n在此示例中，如果分区号 5 被确定为唯一包含定期加载/修改数据的分区，那么仅重建该分区将节省大量的维护时间，因为其他分区可以被跳过。\n\n## 非聚集列存储索引的索引维护\n\
  \n非聚集列存储索引在索引维护方面的灵活性较低。数据顺序由聚集行存储索引强制执行，因此列存储索引内的数据顺序质量由其对应的聚集行存储索引规定。如果表的聚集行存储索引恰好是列存储索引的排序列，并且该表不受\
  \ `UPDATE` 操作的影响，那么非聚集列存储索引将有效地维护数据顺序。\n\n否则，非聚集列存储索引的索引维护将类似于聚集列存储索引的维护：\n\n* \
  \  使用 `REORGANIZE` 操作来合并过小的行组，处理增量存储，并消除较大的已删除行组。\n*   使用 `REBUILD` 操作来消除过小的行组，并消除因\
  \ `UPDATE` 操作导致的无序数据。\n\n这里的主要区别在于，`REBUILD` 可以消除由 `UPDATE` 操作产生的无序数据。重建时，非聚集列存储索引将按照聚集行存储索引规定的顺序创建，而聚集行存储索引不会像列存储索引那样受到\
  \ `UPDATE` 操作的负面影响。\n\n`REORGANIZE` 和 `REBUILD` 操作都可作为非聚集索引的联机操作使用，这为安排定期（或一次性）维护提供了更大的灵活性。这意味着，即使正在重建索引，针对非聚集列存储索引的实时操作分析也可以继续高效进行。\n\
  \n与聚集列存储索引类似，对非聚集列存储索引的维护可以针对任何或所有分区执行，从而允许对活动数据进行维护，同时可以跳过未更改的数据。\n\n## 15. 列存储索引性能\n\
  \n衡量任何数据结构的最终标准是数据检索的速度。在列存储索引中，返回数据所需的时间将是以下两个操作的函数：\n\n*   元数据读取\n*   数据读取\n\n\
  本章将逐步介绍测量、评估和调整列存储索引查询性能所需的步骤，包括分析查询和写入操作。它还将介绍列存储索引使用和性能优化的其他选项。\n\n\n\n## 列存储元数据读取\n\
  \n为了确定要读取哪些数据以及如何读取，在任何列存储索引扫描之前，需要先读取列存储索引的元数据。这包括有关行组和段内容的元数据。请考虑**清单 15-1** 中的查询。\n\
  \n```sql\nSELECT\n    SUM(Quantity) AS Total_Quantity,\n    SUM([Total Excluding\
  \ Tax]) AS Total_Excluding_Tax\nFROM Fact.Sale_CCI_PARTITIONED\nWHERE [Invoice Date\
  \ Key] = '7/17/2015';\n```\n**清单 15-1**\n性能分析中使用的示例查询\n\n针对 `Invoice Date Key` 的单个值聚合了两列。此表既是有序的又是分区的，因此将显著受益于分区消除和行组消除。执行查询时，会查阅列存储元数据以确定需要读取哪些段。\n\
  \n### 分区与元数据查阅\n\n表 `Fact.Sale_CCI_PARTITIONED` 按年份对 `Invoice Date Key` 列进行分区，分区分配给了\
  \ 2013、2014、2015、2016 和 2017 年。**清单 15-2** 提供了本演示中使用的分区方案和函数的定义。\n\n```sql\nCREATE\
  \ PARTITION FUNCTION fact_Sale_CCI_years_function (DATE) AS RANGE RIGHT FOR VALUES\n\
  \    ('1/1/2014', '1/1/2015', '1/1/2016', '1/1/2017');\nCREATE PARTITION SCHEME\
  \ fact_Sale_CCI_years_scheme AS PARTITION fact_Sale_CCI_years_function\n    TO (WideWorldImportersDW_2013_fg,\
  \ WideWorldImportersDW_2014_fg, WideWorldImportersDW_2015_fg,\n        WideWorldImportersDW_2016_fg,\
  \ WideWorldImportersDW_2017_fg)\n```\n**清单 15-2**\n分区函数和分区方案定义\n\n该表包含 2013 年至 2016\
  \ 年的数据，因此不会使用最后一个分区。执行时，**清单 15-1** 中的查询会立即根据分区函数检查筛选条件，然后利用分区 scheme 根据该函数确定数据位置。基于此信息，可以判定只需要分区\
  \ `WideWorldImportersDW_2015_fg` 中的数据。\n\n列存储元数据是为每个分区单独存储的，因此执行此查询时，只需查阅与包含 2015\
  \ 年数据的分区相关的元数据。**图 15-1** 显示了此列存储索引中 `Invoice Date Key` 的段元数据。\n\n![](img/521866_1_En_15_Fig1_HTML.jpg)\n\
  \n**图 15-1**\nInvoice Date Key 的列存储段元数据\n\n元数据显示这是一个极其有序的列存储索引。请注意，随着值在每个分区内的各个段中推进，`min_data_id`\
  \ 和 `max_data_id` 会逐步增加。编码类型 2 表示非字符串数据类型的字典编码，本例中是 `DATE`。此列使用的主要字典 ID 为零。\n\n\
  ### 查询字典元数据\n\n**清单 15-3** 中的查询提供了有关此列所用字典的一些额外细节。\n\n```sql\nSELECT\n    partitions.partition_number,\n\
  \    objects.name,\n    columns.name,\n    column_store_dictionaries.type,\n   \
  \ column_store_dictionaries.entry_count,\n    column_store_dictionaries.on_disk_size\n\
  FROM sys.column_store_dictionaries\nINNER JOIN sys.partitions\n    ON column_store_dictionaries.hobt_id\
  \ = partitions.hobt_id\nINNER JOIN sys.objects\n    ON objects.object_id = partitions.object_id\n\
  INNER JOIN sys.columns\n    ON columns.column_id = column_store_dictionaries.column_id\n\
  \    AND columns.object_id = objects.object_id\nWHERE objects.name = 'Sale_CCI_PARTITIONED'\n\
  \    AND columns.name = 'Invoice Date Key'\n    AND column_store_dictionaries.dictionary_id\
  \ = 0;\n```\n**清单 15-3**\n返回列存储字典信息的查询\n\n结果提供了关于此列所用字典的更多细节，如**图 15-2** 所示。\n\n\
  ![](img/521866_1_En_15_Fig2_HTML.jpg)\n\n**图 15-2**\n列存储字典元数据\n\n这显示分区 1–3 共享一个单一的字典，大小仅为紧凑的\
  \ 1308 字节。这里展示的场景本质上是最优的列存储索引和查询。索引是有序且分区的，而查询与该顺序完美契合，从而最大限度地减少了其执行过程中需要读取的元数据量。\n\
  \n### 最小化元数据读取的重要性\n\n尽管与数据本身相比，列存储元数据可能看起来不大，但重要的是要记住，拥有十亿行的列存储索引大约会有一千个行组。每个行组将为每列包含一个段。对于这个包含\
  \ 21 列的表，每十亿行的元数据将包含大约 21,000 个段。需要读取行组、段、字典等元数据，可能会给 SQL Server 带来不小的工作量。与数据本身一样，元数据在被读取之前也需要加载到内存中。因此，维护一个有序的表和分区（如果需要）可以确保在执行分析查询时不会读取过多的元数据。\n\
  \n回到**清单 15-1** 中的分析查询，可以预期它将快速执行，导致元数据读取量最小，数据读取量也最小。该查询的 `STATISTICS IO` 输出如**图\
  \ 15-3** 所示。\n\n![](img/521866_1_En_15_Fig3_HTML.jpg)\n\n**图 15-3**\n一个示例分析查询的 Statistics\
  \ IO 输出\n\n这个例子是一个理想场景，其中段消除、行组消除和分区相结合，提供了极低的读取量，并跳过了绝大多数段。虽然现实世界并不总能提供如此理想的列存储性能示例，但这说明了可以用来比较性能的上限。\n\
  \n\n## 列存储数据读取\n\n一旦读取了列存储元数据，接下来就会读取数据本身。理解这一点至关重要：针对`列存储索引`的查询性能，最终将由查询执行时读取的**段数量**决定。在所有其他变量相同的情况下，一个读取\
  \ 1000 个段的分析请求，其执行速度预计将比读取 100 个段的查询慢大约十倍。虽然`列存储索引`有时可能被视为撒了“仙尘”的神奇工具，但这是唯一一个没有魔法可言的领域，性能将由\
  \ IO 来引导。\n\n段读取等同于页读取，后者代表了 IO 操作。如果所需的页面已经在内存中，那么操作将由逻辑 IO 组成，因为段直接从缓冲池中读取。如果所需页面尚未在内存中（或仅部分在内存中），则需要执行物理读取，将页面从存储复制到缓冲池。\n\
  \n段消除和行组消除是限制段读取的工具，有助于确保仅读取满足查询所需的数据量。应用于数据的列存储压缩质量有助于将数据压缩到尽可能少的页面中，从而减少 IO。\n\
  \n从最基本的结构来看，`列存储索引`受到与行存储表相同的速度限制约束。将页面从存储读取到缓冲池需要时间。从缓冲池解压和读取数据需要额外的时间。因此，需要读取的页面越少，`列存储索引`分析执行的速度就越快。\n\
  \n`列存储索引`使用的其他性能提升工具（如批处理模式操作或筛选索引）通过提高吞吐量或减少 IO 来进一步加快查询速度。在读取列存储数据这一步骤中，核心焦点就是通过一切可能的手段控制\
  \ IO。图 15-4 说明了数据和元数据如何从存储读取直至被查询结果使用。\n\n![](img/521866_1_En_15_Fig4_HTML.jpg)\n\
  \n**图 15-4**\n列存储数据和元数据从存储到内存再到被查询使用的流转过程\n\n虽然整个`列存储索引`都驻留在存储系统上，但通常只有一部分会保存在缓冲池中。在整个\
  \ IO 过程中，段始终保持压缩状态，直到查询需要它们时，才会被解压缩，然后数据被返回给`SQL Server`。\n\n## 内存容量规划\n\n迄今为止所有的性能讨论都集中在减少\
  \ IO 上。尽管已尽一切努力最小化不必要的 IO，但较大的`列存储索引`最终仍将需要从存储中将大量段读取到内存中。\n\n确保`列存储索引`高性能的下一步是准确估计应分配给`SQL\
  \ Server`以支持分析查询的内存量。\n\n内存太少，数据将不断被移出内存，而很快又需要时，又得重新读回缓冲池。从存储读取数据（即使是快速存储）的过程将远远超过执行分析查询的其他步骤。\n\
  \n内存太多则代表未使用的计算资源，这相当于浪费金钱。\n\n为支持`列存储索引`而向`SQL Server`分配内存需要几个步骤：\n\n1.  测量`列存储索引`的大小。\n\
  2.  估算索引中应始终驻留在内存中的热数据所占的比例。\n3.  估算索引中代表温数据的比例。这些数据将为某些分析需求而存在于内存中，但不是全部。\n4. \
  \ 估算随时间的数据增长，这将调整前面计算出的数字。\n\n任何非热或非温的数据预计都是冷数据，很少使用。它可能仍然有价值，但访问频率不足以围绕它设计整个系统。如果需要这种灵活性，可以在运行时由\
  \ Azure、AWS 或其他托管服务分配资源，但这完全是可选的，取决于组织以及对冷数据快速访问的重要程度。\n\n考虑一个假设的`列存储索引`，如代码清单 15-4\
  \ 所示。\n\n```\n2017: 10,000,000 rows (1GB) - cold/rarely used\n2018: 50,000,000 rows\
  \ (3GB) - cold/rarely used\n2019: 100,000,000 rows (5GB) - cold/rarely used\n2020:\
  \ 250,000,000 rows (10GB) - warm/sometimes used\n2021: 500,000,000 rows (18GB) -\
  \ hot/often used\n```\n\n**代码清单 15-4**\n列存储索引中数据的行数和大小\n\n该索引显示了分析中的一个常见趋势，即最近一年的数据被大量用于当前报告。前一年的数据也经常被访问以进行同比分析。所有历史数据都很重要且必须保留，但与较新的数据相比，其读取频率并不高。\n\
  \n基于提供的数字，如果目标是确保最常用的数据在内存分配中得到考虑，那么这个`列存储索引`将需要 18GB 内存，以确保所有 18GB 的热数据在需要时可以驻留在内存中。\n\
  \n如果那 10GB 的温数据也很重要，那么分配一定量（最多 10GB）的内存将有助于确保数据不会在内存中过于频繁地换入换出，并且在请求时不会取代内存中更重要的热数据。如果资源充足，那么分配完整的\
  \ 10GB 将完全完成此任务。否则，负责此数据的组织需要确定温数据的重要性，并分配最多 10GB 的额外内存来覆盖它。例如，如果估计 2020 年后半部分的数据会较定期地被请求，而前半部分使用频率会低得多，那么为这块温数据分配\
  \ 5GB 内存将是一个不错的估算。\n\n剩余的 2017 年至 2019 年的 9GB 数据将不会获得任何内存分配，因为它们很少被读取，其对性能的影响过于罕见，对大多数组织来说无关紧要。如果偶尔的分析或报告造成的干扰足够大，可以考虑增加更多内存以减少这种干扰，但这应该根据具体情况具体分析。\n\
  \n\n此例也展示了一个相当直接的、大约每年翻倍的增长情况。如果预计这一增长率将持续，并且热数据和温数据的年份预计每年向前滚动，那么一年后，当前的热数据（18GB）将变为温数据，当前的温数据（10GB）将变为冷数据，而明年的数据（约\
  \ 35GB）将成为新的热数据。因此，逐年增长将表示为\n\n*   (35GB + 18GB) - (18GB + 10GB) = `25GB`。\n\n请注意，内存中使用的\
  \ `columnstore` 数据大小通常与数据总量不同。一个拥有 20 列的 `columnstore` 索引，其各列的使用可能并不均衡。某些列很可能很少被使用。如果是这种情况，那么内存估算可以相应调低所需的内存量，以考虑到那些不常驻内存的列。虽然这些不常被查询的列不能归类为冷数据，但可以从内存总量中扣除它们，以确保内存估算不会因那些很少需要的段而过度膨胀。\n\
  \n例如，如果 2021 年的 18GB 数据中包含了 5GB 很少被查询的列，并且有把握知道这些列的使用频率有多低，那么该数据的内存估算可以从 18GB 减少到低至\
  \ 13GB。\n\n这项工作涉及大量的估算。在最高端，内存预算可以涵盖 `columnstore` 索引消耗的所有空间。在最低端，可能不会为这些分析分配内存。一个切合实际的估算将处于两者之间，并将受到对这些数据所需的性能以及计算资源的可用性/成本的影响。\n\
  \n## 字典大小与字典压力\n\n字典编码是 SQL Server 能用以提高 `columnstore` 压缩效率的众多方法之一。第 5 章详细讨论了编码方法，以及\
  \ `columnstore` 索引如何利用字典编码来大幅减小具有重复值的列的索引大小。\n\n虽然字典可以跨多个段共享，但字典编码的一个注意事项是其大小上限为\
  \ 16 兆字节。因此，如果一个列具有较宽且不常重复的值，那么结果可能是一个字典在 `rowgroup` 完全写满之前就已填满。字典被填满的情况被称为字典压力。虽然字典被限制为\
  \ 16MB，但字典压力通常会在远低于此大小的情况下发生，因为限制的是将消耗多少空间，而不是当前已使用了多少空间。\n\n当 `columnstore` 索引遇到字典压力时，当前正在写入的\
  \ `rowgroup` 将被关闭，并创建一个新的 `rowgroup` 以及一个新的字典。这有两个重要影响：\n\n*   **字典消耗空间：** 支持 `columnstore`\
  \ 索引所需的字典越多、它们越大，那么读写它们所需的存储空间和内存就越多。\n*   **过小的行组导致碎片化：** 一个 `rowgroup` 最多可包含 `2²⁰`\
  \ (1,048,576) 行。当 `rowgroup` 因字典压力而尺寸过小（远低于 `2²⁰` 行）时，SQL Server 就需要维护更多的 `rowgroup`、段和字典。这反过来会浪费资源并减慢需要这些表的分析速度。\n\
  \n幸运的是，字典压力很容易诊断。一旦识别出来，就可以制定解决方案来解决它。考虑如图 15-5 所示的 `rowgroup` 元数据。\n\n![](img/521866_1_En_15_Fig5_HTML.jpg)\n\
  \n图 15-5：字典压力示例\n\n在此示例中，`row_group_id` 25 显示截断原因为 `DICTIONARY_SIZE`，行数为 419,432\
  \ 行。在此 `rowgroup` 中，SQL Server 正在向其加载行，此时字典达到了一个大小，在不使其超过 16MB 上限的情况下无法再添加更多条目。如果这是唯一一个这样的\
  \ `rowgroup`，那么字典压力可能不会被视为一个严重问题。如果有许多 `rowgroup` 被截断在这样低的行数上，那么字典压力无疑会抑制最佳性能，值得调查和解决。\n\
  \n字典压力有两个主要原因：\n\n*   宽度很大的列\n*   具有许多不同值的列\n\n涉及字典压力的最常见场景源自那些既很宽又具有许多不同值的列。对于字典压力这一挑战，没有放之四海而皆准的解决方案。三种最常见的解决方案可视为解决此挑战的最简单方法：\n\
  \n*   将宽列规范化为查找（维度）表。\n*   在不同的列上排序。\n*   对表进行分区。\n\n#### 规范化宽列\n\n最简单的解决方案需要更改架构，因此可能带来干扰，那就是规范化被识别为字典压力来源的宽列。规范化一个列是用一个较小的数字列替换一个宽列（通常是字符串数据）。查找表很可能使用聚集\
  \ `rowstore` 索引存储，并辅以一个支持性的非聚集 `rowstore` 索引来处理针对文本数据的查询。\n\n在为大型分析表考虑 `columnstore`\
  \ 索引时，请密切关注任何宽列，并在测试过程中，执行在数据上创建 `columnstore` 索引的操作。创建后，请注意 `rowgroup` 的行数以及是否发生字典压力。如果\
  \ `rowgroup` 的尺寸小了 10% 或更多，并且宽列是罪魁祸首，则考虑对其进行规范化。\n\n查找表可以包含其他元数据，以支持对其进行高效搜索，例如哈希值、搜索条件或可以建立索引并用于在需要检查文本列之前快速减少行数的详细信息。\n\
  \n#### 添加或更改列存储排序列\n\n有时，`columnstore` 索引内的数据排序方式会导致较差的字典编码。如果 `columnstore` 索引未排序，或者在某个倾向于将数据与非相似值分组在一起的列上排序，那么较宽的列可能会成为字典压力的来源。\n\
  \n`columnstore` 索引的排序列应始终是最常用于过滤查询的列。如果有多种常见的搜索条件，则可能存在其他能提供更好压缩和性能的排序选项。\n\n这个解决字典压力的方案需要在常见分析查询上进行前后测试，以确保一个问题（字典压力）没有被交换成另一个问题（分析查询性能不佳）。\n\
  \n\n#### 分区\n\n分区列存储索引的一个关键要素是，每个分区都包含自己独立的列存储索引。例如，一个被拆分为十个分区的表，将在每个分区中包含一个独立的列存储结构。这甚至包括独立的字典！\n\
  \n当列存储索引的行数变得非常大（数亿或数十亿行）时，分区可以在 SQL Server 中提供显著的性能和维护优势。除了分区消除外，跨分区分离字典还能带来额外的性能提升。当宽列的值随时间变化缓慢时，此解决方案尤其有效。在这些场景中，从一天到下一天的数据会包含许多重复值，但跨月或跨年则不会。\n\
  \n在对表进行分区时，需要注意所创建分区的大小。因为每个分区都代表一个独立、分离的列存储索引，所以每个分区足够大以受益于列存储索引的关键属性至关重要。因此，请确保每个分区至少有数千万行。同样，异常庞大的分区（数十亿行）在字典压力方面可能会遇到与未分区表相同的问题。\n\
  \n测试对于确认分区在列存储索引中的益处非常重要。一般来说，如果一个表包含数亿行（或更多），能够使用列存储排序列作为分区列将其细分为更小的块，将有助于实现性能优势。如果存在字典压力，那么通过跨分区拆分字典，这可能成为管理字典压力的有效方法。\n\
  \n第 11 章将深入探讨分区，包括如何实现它的演示，以及除了缓解字典压力挑战之外，它还能提供诸多益处。\n\n总的来说，字典在存储其查找数据方面非常高效，列存储索引通过使用它们而获益巨大。字典压力应被视为一种特殊情况，只有在其导致明显的性能问题时才需要\
  \ investigate。\n\n#### 临时表上的列存储索引\n\n对于需要使用临时数据即时处理分析数据的场景，向临时对象添加列存储索引可能很有价值。这是一个独特的用例，很少需要，但可以为\
  \ ETL 流程或任何需要对中间或临时数据集执行许多昂贵查询的分析提供卓越的价值。\n\n向临时表添加列存储索引的工作方式与向永久表添加完全相同。清单 15-5\
  \ 展示了如何完成此任务的示例。\n\n```\nCREATE TABLE #Sales_Temp_Data\n(      [Sale Key] BIGINT\
  \ NOT NULL,\n[Customer Key] INT NOT NULL,\n[Invoice Date Key] DATE NOT NULL,\nQuantity\
  \ INT NOT NULL,\n[Total Excluding Tax] DECIMAL(18,2) NOT NULL);\nINSERT INTO #Sales_Temp_Data\n\
  ([Sale Key], [Customer Key], [Invoice Date Key], Quantity, [Total Excluding Tax])\n\
  SELECT\n[Sale Key], [Customer Key], [Invoice Date Key], Quantity, [Total Excluding\
  \ Tax]\nFROM Fact.Sale_CCI_PARTITIONED;\nCREATE CLUSTERED COLUMNSTORE INDEX CCI_Sales_Temp_Data\
  \ ON #Sales_Temp_Data;\n清单 15-5\n创建临时表、填充数据并添加列存储索引的查询\n```\n\n添加后，新建立索引的临时表可以像列存储索引永久表一样有效地进行查询，如清单\
  \ 15-6 所示。\n\n```\nSELECT\nCOUNT(*)\nFROM #Sales_Temp_Data;\nSELECT\nSUM(Quantity)\
  \ * SUM([Total Excluding Tax])\nFROM #Sales_Temp_Data\nWHERE [Invoice Date Key]\
  \ >= '1/1/2015'\nAND [Invoice Date Key] < '1/1/2016';\n清单 15-6\n针对带有列存储索引的临时表的示例查询\n\
  ```\n\n这些查询执行相对较快，并返回请求的结果。图 15-6 显示了那对查询的 `STATISTICS IO` 输出。\n\n![](img/521866_1_En_15_Fig6_HTML.jpg)\n\
  \n图 15-6\n针对带有列存储索引的临时表的查询的 IO\n\n请注意，过滤查询读取了表中几乎一半的段，尽管只读取了大约四分之一的行。当填充此临时表时，没有强制执行数据顺序。因此，数据是按照\
  \ `SQL Server` 从源表读取的任意顺序插入的，这并不理想。根据临时表用于分析的广泛程度，在读取之前采取额外步骤对其进行排序可能值得，也可能不值得花费所需的时间和资源。这个价值在于分析流程是否足够快地完成，以及在此过程中是否使用了过多的计算资源。\n\
  \n如果需要同时使用事务型和分析型方法来切片数据，也可以在临时表上创建 `非聚集列存储索引`。这样做的一个好处是，聚集行存储索引可以强制表上的数据顺序，即使对其进行了进一步的写入。另一个好处是可以自定义列存储索引的列列表。这允许在剩余列可能用于其他操作时，仅对一小部分列子集进行分析。清单\
  \ 15-7 展示了在临时表上创建非聚集列存储索引的语法。\n\n\n## 15.3.2 在临时表和内存优化表上使用列存储索引\n\n### 在临时表上使用列存储索引\n\
  \n在临时表上可以创建非聚集列存储索引，其语法与在永久表上使用的完全相同，一旦创建，其使用方式也相同。\n\n请注意，**不允许**在表变量上创建列存储索引。清单\
  \ [15-8] 中的 T-SQL 代码展示了尝试这样做的操作。\n\n```sql\nCREATE TABLE #Sales_Temp_Data\n(\n \
  \     [Sale Key] BIGINT NOT NULL,\n      [Customer Key] INT NOT NULL,\n      [Invoice\
  \ Date Key] DATE NOT NULL,\n      Quantity INT NOT NULL,\n      [Total Excluding\
  \ Tax] DECIMAL(18,2) NOT NULL\n);\n\nINSERT INTO #Sales_Temp_Data\n([Sale Key],\
  \ [Customer Key], [Invoice Date Key], Quantity, [Total Excluding Tax])\nSELECT\n\
  [Sale Key], [Customer Key], [Invoice Date Key], Quantity, [Total Excluding Tax]\n\
  FROM Fact.Sale_CCI_PARTITIONED;\n\nCREATE CLUSTERED INDEX CI_Sales_Temp_Data ON\
  \ #Sales_Temp_Data ([Sale Key]);\nCREATE NONCLUSTERED COLUMNSTORE INDEX NCCI_Sales_Temp_Data\
  \ ON #Sales_Temp_Data ([Invoice Date Key], Quantity, [Total Excluding Tax]);\n```\n\
  *清单 15-7 展示在临时表上使用非聚集列存储索引*\n\n```sql\nDECLARE @Sales_Temp_Data TABLE\n(\n     \
  \ [Sale Key] BIGINT NOT NULL,\n      [Customer Key] INT NOT NULL,\n      [Invoice\
  \ Date Key] DATE NOT NULL,\n      Quantity INT NOT NULL,\n      [Total Excluding\
  \ Tax] DECIMAL(18,2) NOT NULL\n);\n\nINSERT INTO @Sales_Temp_Data\n([Sale Key],\
  \ [Customer Key], [Invoice Date Key], Quantity, [Total Excluding Tax])\nSELECT\n\
  [Sale Key], [Customer Key], [Invoice Date Key], Quantity, [Total Excluding Tax]\n\
  FROM Fact.Sale_CCI_PARTITIONED;\n\nCREATE CLUSTERED COLUMNSTORE INDEX CCI_Sales_Temp_Data\
  \ ON @Sales_Temp_Data;\n```\n*清单 15-8 尝试向表变量添加列存储索引的脚本*\n\n该查询甚至无法编译，在解析阶段就会立即生成如图\
  \ [15-7] 所示的错误。\n\n![](img/521866_1_En_15_Fig7_HTML.jpg)\n*图 15-7 尝试在表变量上创建列存储索引时的解析错误*\n\
  \nSQL Server 在解析阶段就会触发错误，然后才会创建和填充表变量。\n\n在临时表上使用列存储索引不会是一个频繁使用的用例，但那些严重依赖于处理临时数据的特定过程可能会有效地利用它们。性能测试可以最终验证这是否是一个有帮助的解决方案，或者是否因价值不足而不值得采用。\n\
  \n### 内存优化列存储索引\n\n列存储索引的一个常见用例是实时操作分析。非聚集列存储索引提供了针对 OLTP/行存储表高效执行分析查询的能力。通过选择要索引的列，列存储索引可用于解决分析无法轻松卸载到其他系统时存在问题的\
  \ OLAP 查询。\n\n内存优化表是 OLTP 解决方案的终极形态。它们为高事务性工作负载提供了卓越的速度，同时消除了通常伴随争用工作负载出现的闩锁和锁定。它们也可以被列存储索引所针对，允许针对内存中高度事务性的表运行分析。这是一个小众用例，可以为本节将讨论的少数特定场景提供极快的速度。\n\
  \n#### 演示内存优化列存储索引\n\n在深入研究列存储索引查询之前，重要的是要配置一个数据库，包含必要的文件组、文件和快照隔离设置，以允许创建内存优化表。清单\
  \ [15-9] 提供了在 SQL Server 中允许内存优化表所需的配置更改。\n\n```sql\nALTER DATABASE WideWorldImporters\
  \ ADD FILEGROUP WideWorldImporters_moltp CONTAINS MEMORY_OPTIMIZED_DATA;\nALTER\
  \ DATABASE WideWorldImporters ADD FILE (name='WideWorldImporters_moltp', filename='C:\\\
  SQLData\\WideWorldImporters_moltp') TO FILEGROUP WideWorldImporters_moltp;\nALTER\
  \ DATABASE WideWorldImporters SET MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT = ON;\n```\n\
  *清单 15-9 在 SQL Server 中启用内存优化表*\n\n每个数据库只允许一个内存优化文件组。如果一个数据库已经有一个，那么再尝试添加另一个将导致如图\
  \ [15-8] 所示的错误。\n\n![](img/521866_1_En_15_Fig8_HTML.jpg)\n*图 15-8 向已有内存优化文件组的数据库添加时遇到的错误*\n\
  \n完成这些基本配置步骤后，我们就可以尝试创建一个包含列存储索引的内存优化表。清单 [15-10] 中的脚本展示了一个示例表的创建。\n\n```sql\nCREATE\
  \ TABLE Sales.Orders_MOLTP\n(\n      OrderID INT NOT NULL CONSTRAINT PK_Orders_MOLTP\
  \ PRIMARY KEY NONCLUSTERED HASH WITH (BUCKET_COUNT = 150000),\n      CustomerID\
  \ INT NOT NULL,\n      SalespersonPersonID INT NOT NULL,\n      PickedByPersonID\
  \ INT NULL,\n      ContactPersonID INT NOT NULL,\n      BackorderOrderID INT NULL,\n\
  \      OrderDate DATE NOT NULL,\n      ExpectedDeliveryDate DATE NOT NULL,\n   \
  \   CustomerPurchaseOrderNumber NVARCHAR(20) NULL,\n      IsUndersupplyBackordered\
  \ BIT NOT NULL,\n      Comments NVARCHAR(MAX) NULL,\n      DeliveryInstructions\
  \ NVARCHAR(MAX) NULL,\n      InternalComments NVARCHAR(MAX) NULL,\n      PickingCompletedWhen\
  \ DATETIME2(7) NULL,\n      LastEditedBy INT NOT NULL,\n      LastEditedWhen DATETIME2(7)\
  \ NOT NULL,\n      INDEX CCI_Orders_MOLTP CLUSTERED COLUMNSTORE\n)\nWITH (MEMORY_OPTIMIZED\
  \ = ON, DURABILITY = SCHEMA_AND_DATA);\n```\n*清单 15-10 初始（不完善）的内存优化表（带列存储索引）创建脚本*\n\
  \n这个定义看起来有效，但执行时会返回错误，如图 [15-9] 所示。\n\n![](img/521866_1_En_15_Fig9_HTML.jpg)\n*图\
  \ 15-9 因内存优化列存储索引定义中包含 LOB 列而导致的错误*\n\n`MAX` 长度的列**不允许**出现在内存优化列存储索引中。为了允许创建索引，需要将这些列规范化到另一个表中，或者缩小其大小。清单\
  \ [15-11] 展示了一个修订后的脚本，其中 `MAX` 长度的列已被缩小以适应此限制。\n\n```sql\nCREATE TABLE Sales.Orders_MOLTP\n\
  (\n      OrderID INT NOT NULL CONSTRAINT PK_Orders_MOLTP PRIMARY KEY NONCLUSTERED\
  \ HASH WITH (BUCKET_COUNT = 150000),\n      CustomerID INT NOT NULL,\n      SalespersonPersonID\
  \ INT NOT NULL,\n      PickedByPersonID INT NULL,\n      ContactPersonID INT NOT\
  \ NULL,\n      BackorderOrderID INT NULL,\n      OrderDate DATE NOT NULL,\n    \
  \  ExpectedDeliveryDate DATE NOT NULL,\n      CustomerPurchaseOrderNumber NVARCHAR(20)\
  \ NULL,\n      IsUndersupplyBackordered BIT NOT NULL,\n      Comments NVARCHAR(2000)\
  \ NULL,\n      DeliveryInstructions NVARCHAR(2000) NULL,\n      InternalComments\
  \ NVARCHAR(2000) NULL,\n      PickingCompletedWhen DATETIME2(7) NULL,\n      LastEditedBy\
  \ INT NOT NULL,\n      LastEditedWhen DATETIME2(7) NOT NULL,\n      INDEX CCI_Orders_MOLTP\
  \ CLUSTERED COLUMNSTORE\n)\nWITH (MEMORY_OPTIMIZED = ON, DURABILITY = SCHEMA_AND_DATA);\n\
  ```\n*清单 15-11 第二次（仍不完善）的内存优化表（带列存储索引）创建脚本*\n\n将 `NVARCHAR(MAX)` 列替换为 `NVARCHAR(2000)`\
  \ 后，脚本得以执行，但导致了一个新的错误，如图 [15-10] 所示。\n\n\n\n"
- '# 内存优化列存储索引：创建、比较与测试


  ![](img/521866_1_En_15_Fig10_HTML.jpg)


  ### 图 15-10


  由于内存优化列存储索引每行超过 8060 字节导致的错误


  虽然这个错误信息似乎提供了一线希望，暗示如果在 SQL Server 2014 之后的版本上执行此表定义可能会成功，但结果仍然是失败。经过一些研究，最终设计出了一个表定义，它适应了这些限制，并允许（最终）创建表，如代码清单
  15-12 所示。


  ```sql

  CREATE TABLE Sales.Orders_MOLTP

  (      OrderID INT NOT NULL CONSTRAINT PK_Orders_MOLTP PRIMARY KEY NONCLUSTERED
  HASH WITH (BUCKET_COUNT = 150000),

  CustomerID INT NOT NULL,

  SalespersonPersonID INT NOT NULL,

  PickedByPersonID INT NULL,

  ContactPersonID INT NOT NULL,

  BackorderOrderID INT NULL,

  OrderDate DATE NOT NULL,

  ExpectedDeliveryDate DATE NOT NULL,

  CustomerPurchaseOrderNumber NVARCHAR(20) NULL,

  IsUndersupplyBackordered BIT NOT NULL,

  Comments NVARCHAR(500) NULL,

  DeliveryInstructions NVARCHAR(250) NULL,

  InternalComments NVARCHAR(500) NULL,

  PickingCompletedWhen DATETIME2(7) NULL,

  LastEditedBy INT NOT NULL,

  LastEditedWhen DATETIME2(7) NOT NULL,

  INDEX CCI_Orders_MOLTP CLUSTERED COLUMNSTORE)

  WITH (MEMORY_OPTIMIZED = ON, DURABILITY = SCHEMA_AND_DATA);

  ```


  **清单 15-12**

  适用于内存优化列存储索引的表创建语句


  成功了！这个表包含了一些磁盘上表所不具备的特性：


  *   使用非聚集哈希索引作为主键。

  *   `MEMORY_OPTIMIZED = ON`。

  *   `DURABILITY = SCHEMA_AND_DATA`。


  持久性设置决定了在服务器重启时，此表的数据是否可以恢复，或者仅保留其架构。`SCHEMA_ONLY` 的速度明显更快，因为无需将数据持久化到磁盘存储。此外，启动也更快，因为无需将数据加载到表中即可使用。`SCHEMA_ONLY`
  通常用于包含临时数据（如会话、ETL 或瞬态信息）的表，这些数据一旦处理完毕就不再需要。然而，`SCHEMA_ONLY` 不支持列存储索引，因此超出了本文后续讨论的范围。


  请注意，列存储索引被标记为聚集列存储索引，但它并非真正的聚集索引。内存优化表的主要存储机制始终是内存中的行集。列存储索引是附加在内存优化对象之上的额外结构，也会被持久化到磁盘存储。这些注意事项导致
  SQL Server 在维护列存储索引与内存优化表时产生了相当大的开销。


  同样值得强调的是，这个内存优化聚集列存储索引包含许多宽列，这些列并不适合字典编码。`CustomerPurchaseOrderNumber`、`Comments`、`DeliveryInstructions`
  和 `InternalComments` 是不太可能重复的字符串列。因此，它们可能无法很好地压缩，并可能导致字典压力，从而产生过小的行组，并进一步降低列存储效率。这不是决定性的障碍，但在考虑实施内存优化列存储索引时，理解这一点至关重要。主要为
  OLTP 工作负载构建的表通常包含对事务处理至关重要但对分析可能并非最优的文本数据。解决这种情况的一种可能方法是将表拆分为两个，一个表包含字符串列和支持数据，另一个包含数字和度量值。这样就可以为一个表分配内存优化列存储索引，而另一个表则保留其内存优化行存储结构。


  内存优化表不支持非聚集列存储索引，因此无法选择将哪些列包含在索引中。


  创建了内存优化列存储索引后，可以执行代码清单 15-13 中的脚本，用与磁盘上表 `Sales.Orders` 相同的数据填充它。


  ```sql

  INSERT INTO Sales.Orders_MOLTP

  (      OrderID, CustomerID, SalespersonPersonID, PickedByPersonID, ContactPersonID,
  BackorderOrderID, OrderDate, ExpectedDeliveryDate,

  CustomerPurchaseOrderNumber, IsUndersupplyBackordered, Comments, DeliveryInstructions,
  InternalComments, PickingCompletedWhen,

  LastEditedBy, LastEditedWhen)

  SELECT

  OrderID, CustomerID, SalespersonPersonID, PickedByPersonID, ContactPersonID, BackorderOrderID,
  OrderDate, ExpectedDeliveryDate,

  CustomerPurchaseOrderNumber, IsUndersupplyBackordered, Comments, DeliveryInstructions,
  InternalComments, PickingCompletedWhen,

  LastEditedBy, LastEditedWhen

  FROM Sales.Orders;

  ```


  **清单 15-13**

  用于向内存优化列存储索引填充数据的脚本


  完成表的创建和数据填充后，可以将原始表 `Sales.Orders` 的大小与其内存优化对应表进行比较。注意每个表的索引内容：


  `Sales.Orders`：


  *   一个单列主键索引

  *   四个单列索引

  *   一个四列索引


  `Sales.Orders_MOLTP`：


  *   一个单列主键索引

  *   一个列存储索引（在所有列上）


  ![](img/521866_1_En_15_Fig11_HTML.jpg)


  ### 图 15-11


  磁盘上表与带有聚集列存储索引的内存优化表的大小比较


  注意图 15-11 中磁盘上表（25MB）与内存优化表（117MB）之间的显著大小差异。这是一个巨大的空间代价，并强调了将内存优化结构映射到列存储结构是一个比将非聚集行存储索引映射到聚集列存储索引更复杂的操作。在继续之前，将创建另一个内存优化表，如代码清单
  15-14 所示。


  ```sql

  CREATE TABLE Sales.Orders_MOLTP_NO_CCI

  (      OrderID INT NOT NULL CONSTRAINT PK_Orders_MOLTP_NO_CCI PRIMARY KEY NONCLUSTERED
  HASH WITH (BUCKET_COUNT = 150000),

  CustomerID INT NOT NULL,

  SalespersonPersonID INT NOT NULL,

  PickedByPersonID INT NULL,

  ContactPersonID INT NOT NULL,

  BackorderOrderID INT NULL,

  OrderDate DATE NOT NULL INDEX IX_Orders_MOLTP_NO_CCI_OrderDate NONCLUSTERED,

  ExpectedDeliveryDate DATE NOT NULL,

  CustomerPurchaseOrderNumber NVARCHAR(20) NULL,

  IsUndersupplyBackordered BIT NOT NULL,

  Comments NVARCHAR(500) NULL,

  DeliveryInstructions NVARCHAR(250) NULL,

  InternalComments NVARCHAR(500) NULL,

  PickingCompletedWhen DATETIME2(7) NULL,

  LastEditedBy INT NOT NULL,

  LastEditedWhen DATETIME2(7) NOT NULL)

  WITH (MEMORY_OPTIMIZED = ON, DURABILITY = SCHEMA_AND_DATA);

  GO

  ```


  **清单 15-14**

  用于创建不带列存储索引的内存优化表的语句


  此表与之前创建的内存优化表相同，只是列存储索引被替换为在 `OrderDate` 上的非聚集索引。新表的总大小为 20MB，大约是列存储表大小的六分之一，代表了显著的空间节省。


  考虑一个针对所有三个测试表执行的测试分析查询，如代码清单 15-15 所示。


  ```sql

  SELECT

  COUNT(*) AS OrderCount,

  COUNT(DISTINCT(CustomerID)) AS DistinctCustomerCount

  FROM Sales.Orders

  WHERE OrderDate >= ''1/1/2015''

  AND OrderDate < ''4/1/2015'';

  ```


