  `图 4-1` 显示测试数据集规模和日期范围的查询结果\n\n\n\n## 行组与段\n\n分析数据无法存储在一个大型的连续结构中。虽然每列数据被单独压缩存储，但这些列内部的数据需要分组并分别进行压缩。每个被压缩的单元就是读入内存的对象。如果该单元过小，那么大量压缩结构的存储和管理将非常昂贵，且压缩效果较差。反之，如果每个单元包含的行数过多，那么为满足查询而需要读入内存的数据量也会变得过大。\n\
  \n列存储索引将行分组为 `2²⁰` (`1,048,576`) 行的单元，称为 `行组`。该行组内的每列被单独压缩成列存储索引的基本单元，称为 `段`。这种结构可以用图\
  \ 4-2 中的表示来可视化。\n\n![](img/521866_1_En_4_Fig2_HTML.jpg)\n\n图 4-2\n列存储索引中的行组与段\n\n\
  请注意，列存储索引并非像聚集和非聚集行存储索引那样基于二叉树结构构建。相反，每个行组包含一组压缩段，表中的每列对应一个段。图 4-2 中的示例是一个有八列、最多\
  \ `6*2²⁰` 行的表，总共包含 48 个段（每个行组、每列一个段）。行存储和列存储索引之间唯一共享的重要架构约定是它们都使用 `8KB` 页来存储数据。\n\
  \n行组是在列存储索引中创建数据时自动创建和管理的。行组数量没有上限，索引内的段数也没有限制。因为一个行组最多包含 `2²⁰` 行，所以一个表应有远多于该数量的行才能最佳地利用列存储索引。如果一个表只有\
  \ `500k` 行，那么它很可能全部存储在单个行组中。因此，任何需要该表数据的查询都必须读取包含该表所有行数据的段。为了使表能有效利用列存储索引，它应该至少有\
  \ `500 万` 或 `1000 万` 行，以便能被拆分成多个独立的行组，这样每次查询时就不需要读取所有行组。\n\n可以使用动态管理视图 `sys.column_store_row_groups`\
  \ 查看列存储索引中的行组。代码清单 4-3 中的查询返回了本章前面创建的列存储索引的行组元数据。\n\n```\nSELECT\ntables.name AS\
  \ table_name,\nindexes.name AS index_name,\ncolumn_store_row_groups.partition_number,\n\
  column_store_row_groups.row_group_id,\ncolumn_store_row_groups.state_description,\n\
  column_store_row_groups.total_rows,\ncolumn_store_row_groups.deleted_rows,\ncolumn_store_row_groups.size_in_bytes\n\
  FROM sys.column_store_row_groups\nINNER JOIN sys.indexes\nON indexes.index_id =\
  \ column_store_row_groups.index_id\nAND indexes.object_id = column_store_row_groups.object_id\n\
  INNER JOIN sys.tables\nON tables.object_id = indexes.object_id\nWHERE tables.name\
  \ = 'Sale_CCI'\nORDER BY tables.object_id, indexes.index_id, column_store_row_groups.row_group_id;\n\
  ```\n\n代码清单 4-3\n返回列存储索引基本行组元数据的脚本\n\n该查询的结果可以在图 4-3 中找到。\n\n![](img/521866_1_En_4_Fig3_HTML.jpg)\n\
  \n图 4-3\nfact.Sale_CCI 的行组元数据\n\n通过连接其他系统视图，如 `sys.indexes` 和 `sys.tables`，可以返回关于列存储索引所在表的附加信息。`sys.column_store_row_groups`\
  \ 包含一些额外的相关列，例如行组的压缩状态、行数及其大小。请注意，图 4-3 中选择的八个行组都包含了行组允许的最大行数 `2²⁰`。\n\n使用行组元数据可以让用户快速度量列存储索引的大小，并对其结构有一个基本的了解。\n\
  \n在每个行组内，是表中每列对应的段。同样存在一个提供压缩段详细信息的动态管理视图：`sys.column_store_segments`。代码清单 4-4 提供了一个从该视图返回信息的查询，包括连接回每个段所属的父表和列。\n\
  \n```\nSELECT\ntables.name AS table_name,\nindexes.name AS index_name,\ncolumns.name\
  \ AS column_name,\npartitions.partition_number,\ncolumn_store_segments.row_count,\n\
  column_store_segments.has_nulls,\ncolumn_store_segments.min_data_id,\ncolumn_store_segments.max_data_id,\n\
  column_store_segments.on_disk_size\nFROM sys.column_store_segments\nINNER JOIN sys.partitions\n\
  ON column_store_segments.hobt_id = partitions.hobt_id\nINNER JOIN sys.indexes\n\
  ON indexes.index_id = partitions.index_id\nAND indexes.object_id = partitions.object_id\n\
  INNER JOIN sys.tables\nON tables.object_id = indexes.object_id\nINNER JOIN sys.columns\n\
  ON tables.object_id = columns.object_id\nAND column_store_segments.column_id = columns.column_id\n\
  WHERE tables.name = 'Sale_CCI'\nORDER BY columns.name, column_store_segments.segment_id;\n\
  ```\n\n代码清单 4-4\n返回列存储索引基本段元数据的脚本\n\n图 4-4 包含了部分结果示例。\n\n![](img/521866_1_En_4_Fig4_HTML.jpg)\n\
  \n图 4-4\nfact.Sale_CCI 的段元数据\n\n查询返回的行数等于索引中的段总数，这也等于行组数量乘以表中的列数。除了每个段包含的行数及其在磁盘上的大小外，还提供了有关该段是否包含\
  \ `NULL` 值的详细信息，以及 `min_data_id`/`max_data_id`，它们提供了对段内包含值的字典查找。关于字典及其工作原理的详细信息将在第\
  \ 5 章讨论压缩时提供。\n\n\n## 增量存储\n\n将数据写入高度压缩的分段是一个资源密集型的过程。解压一组分段、向其中写入额外数据、重新压缩以及更新元数据所需的资源并非微不足道。向一个行组写入一百万行所需的工作量，包括了解压、写入和重新压缩该行组中所有分段的工作。而将一百万行数据逐行写入该行组所需的工作量，相当于将上述过程执行一百万次。\n\
  \n因此，频繁写入少量行的进程需要一种方法来管理这些写入操作，以免列存储索引消耗服务器的所有资源用于解压、写入和重新创建分段。**增量存储**是一组聚集行存储索引，用于在列存储索引旁边临时存储小型写入。每个增量行组就是这些聚集索引之一。更改会累积在增量存储中，直到其行数达到阈值（每个增量行组\
  \ `2²⁰` 行），然后一次性推入列存储索引。\n\n增量存储由 SQL Server 自动维护。一个名为 **元组移动器** 的异步后台进程管理从增量存储到列存储索引的数据移动。虽然操作员可以运行维护脚本来影响增量存储的行为，但对于使用列存储索引来说，这样做并非必需。有关列存储维护的更多信息，请参见第\
  \ 14 章。\n\n当针对列存储索引执行查询时，增量存储的内容会与所需的压缩分段一起被读取。虽然增量存储由经典的行存储索引组成，但其大小通常比列存储索引的压缩部分小得多；因此，读取它通常不会对性能产生不利影响。增量存储的好处在于，它大大减少了向列存储索引写入较小批次数据所需的计算资源，并确保频繁的小型写入在数据加载、维护或软件发布过程中不会成为不可扩展的瓶颈。\n\
  \n数据的基本流如图 4-5 所示。\n\n![](img/521866_1_En_4_Fig5_HTML.jpg)\n\n图 4-5\n\n数据从增量存储流入列存储索引\n\
  \n请注意，增量存储并非用于管理针对列存储索引的所有 `INSERT` 操作。第 8 章详细讨论了批量加载进程如何用于大大加速较大的 `INSERT` 操作。\n\
  \n## 删除位图\n\n从列存储索引中删除数据所带来的挑战，与增量存储为插入操作解决的挑战类似。删除单行数据将需要对每列的压缩分段进行解压、修改和重新压缩。这本质上是昂贵的，当受影响的行组数量增加时，成本会变得高到令人望而却步。\n\
  \nSQL Server 需要能够快速地从列存储索引中删除数据，并且不会对服务器性能产生长期的负面影响。为了实现这一点，当执行 `DELETE` 语句时，数据不会从列存储索引中物理删除。相反，受影响行的删除状态会被写入一个称为\
  \ **删除位图** 的结构中。\n\n每个分区在列存储索引中只能存在一个删除位图，其目的是跟踪哪些行已被删除（如果有的话）。当从列存储索引中删除行时，会更新删除位图以指示删除操作。列存储索引中的相应行不会以任何方式被修改。这种软删除允许\
  \ `DELETE` 操作快速执行，并且不会对数据加载或维护过程造成负担。\n\n当查询从列存储索引中读取数据时，删除位图的内容也会被读取，任何被标记为已删除的行都将从结果中省略。删除位图也是一个聚集行存储索引，与列存储索引并排存在。拥有删除位图的最大好处是，`DELETE`\
  \ 操作可以执行得异常快速，因为无需对索引中的分段进行解压、更新和重新压缩。缺点是已删除的行仍然占用索引中的空间，并且不会立即被移除。随着时间的推移，已删除行所占用的空间可能变得不容忽视，此时可以定期使用索引维护（在第\
  \ 14 章中讨论）来回收这些空间。\n\n图 4-6 将删除位图添加到了列存储索引的架构图中。\n\n![](img/521866_1_En_4_Fig6_HTML.jpg)\n\
  \n图 4-6\n\n将删除位图添加到列存储索引架构中\n\n删除位图和增量存储都是列存储索引的组成部分，它们仅在需要时才存在。如果不存在已删除的行，则不会有删除位图覆盖在压缩的行组上。类似地，当针对列存储索引执行查询时，空的增量存储也不需要被检查。这些组件在必要时存在，否则在不需要时不会对性能产生影响。\n\
  \n## 非聚集列存储索引架构\n\n非聚集列存储索引的架构与聚集索引非常相似。非聚集列存储索引不是表的主要存储机制，而是与聚集行存储索引并存的一个额外索引结构。\n\
  \n一个重要的区别是，可以在非聚集列存储索引上指定列列表，从而允许进行更有针对性的优化项目。此外，可以将筛选器应用于非聚集列存储索引，从而根据数据是**热数据**、**温数据**还是**冷数据**来定位数据，从而减小索引大小和写入索引的成本。\n\
  \n请注意以下关于热/温/冷数据用法的简要定义：\n\n*   **热数据：** 实时且被系统积极使用，具有定期的读写和高并发性。期望可用性高，延迟应非常低。\n\
  *   **温数据：** 代表使用频率较低的数据。仍然期望高可用性，但在检索时可以容忍更高的延迟。\n*   **冷数据：** 代表不经常访问的旧数据、归档数据或为保留而维护的数据。冷数据的可用性更灵活，高延迟是可容忍的。冷数据的并发性非常低。\n\
  \n组织会将数据标记为从热到冷的范围，具体细节会根据其数据的使用方式而有所不同。图 4-7 显示了聚集行存储索引与筛选后的非聚集列存储索引之间的交互。\n\n\
  ![](img/521866_1_En_4_Fig7_HTML.jpg)\n\n图 4-7\n\n带有筛选非聚集列存储索引的聚集行存储索引\n\n请注意，非聚集列存储索引的目的是为事务表提供实时分析功能，这需要在实施前仔细考虑。第\
  \ 12 章将深入探讨非聚集列存储索引的更多细节，包括选项、演示和最佳用例。\n\n"
- '# 页面上的物理数据


  到目前为止，关于架构的讨论都是在逻辑层面进行的。也就是说，`行组`、`段`、`增量存储`和`删除位图`都被呈现为数据列的通用容器。列存储索引在页面上的物理存储有助于我们充分理解它们如何高效地为分析查询提供服务。


  SQL Server 中所有未存储在内存优化结构中的数据都存储在 `8` KB 的 `页面` 上。这些页面驻留在物理存储上，并在需要时按原样读入内存。如果页面被压缩，它将保持压缩状态，直到需要其数据时。无论页面位于
  `行存储` 还是 `列存储索引` 中，它都以相同的方式读入内存。`删除位图`和`增量存储`也维护在页面上，并根据需要读入内存。


  图 4-8 展示了 SQL Server 中页面的基本结构。页面的主要组成部分是：


  ![](img/521866_1_En_4_Fig8_HTML.jpg)

  图 4-8

  SQL Server 中页面的结构


  *   `页面头部`

  *   `数据`

  *   `行偏移量`


  `页面头部`包含有关页面的基本信息，例如拥有它的对象、存储在其中的数据类型，以及可用于写入更多数据的未分配空间量。


  `数据行`是存储在页面上的实际数据。这可能是表中的物理数据（聚集索引或堆）、索引条目，或在各种情况下可用的各种其他内容。对于本次关于列存储和行存储索引的讨论，数据和索引数据是当前唯一需要关注的内容。


  `行偏移量`存储每一行的起始位置，允许 SQL Server 在页面读入内存后定位任何给定行的数据。


  当数据以行存储表上的聚集索引形式存储时，数据按行逐行写入页面。也就是说，对于每一行，每个列依次顺序写入页面，如图 4-9 所示。


  ![](img/521866_1_En_4_Fig9_HTML.jpg)

  图 4-9

  SQL Server 中行存储数据在页面上的存储


  此表有六列，它们按顺序为每一行依次写入。SQL Server 会继续将此表的行顺序写入同一页面，直到空间用尽，此时将为该表分配一个新页面，数据将在那里继续写入。


  此结构针对读取或写入由一组连续行组成的小范围查找进行了优化。例如，返回第 2 行到第 5 行中部分（或全部）列的查询，只需要读取图 4-9 中所示的单个页面。如果需要其他页面上的额外行，那么这些页面也将被读入内存以满足查询。


  `聚集`或`非聚集行存储索引`将其二叉树结构作为一系列指针写入页面。首先写入根级别，然后是中间级别，这些中间级别最终指向索引叶级别的底层数据。索引的每一级都包含聚集索引键，这些键用于组织和链接索引的各个级别。此结构也针对查找单个或小的连续行范围进行了优化。对于此类查询，需要读取的索引中间级别较少，从而减少了满足查询所需的页面数量。图
  4-10 展示了一个聚集行存储（二叉树）索引的可视化表示。


  ![](img/521866_1_En_4_Fig10_HTML.jpg)

  图 4-10

  聚集行存储索引的结构


  因为这是聚集索引，所以叶级包含聚集索引所引用的每一行的列数据。在`非聚集索引`中，索引的最低级别将包含指向目标数据的指针，用于键查找。类似地，`非聚集索引`的叶级也会包含在该索引上定义的任何包含列。


  需要读取聚集索引 ID 值在 `25` 和 `75` 之间的查询，可以通过读取索引根页，然后读取页面 `1` 和 `2` 来完成。仅读取聚集索引 ID 值 `136`
  的查询将读取索引根页和页面 `4`。


  在列存储索引中，没有二叉树结构。`聚集列存储索引`作为一系列压缩段写入，占用支持它们所需的任意多页面。图 4-11 说明了列存储索引的单个页面的外观。


  ![](img/521866_1_En_4_Fig11_HTML.jpg)

  图 4-11

  SQL Server 中列存储数据在页面上的存储


  请注意，这些数据是压缩段的一个子集，包含同一列的连续值。这个序列会持续到`行组`结束，此时将开始一个新段；或者如果它是最后一个行组，则将开始下一列。


  聚合 `1` 列前 `40` 行值的查询可以非常高效地检索数据，只需读取这个单个页面。在相同表的行存储索引中，则有必要扫描这 `40` 行中所有列的数据，并将这些页面读入内存。对于一个有
  `20` 列的表，这将需要 `20` 倍的工作量。


  ## 差异总结


  理解行存储索引和列存储索引架构之间差异的关键在于考虑数据的逻辑存储与物理存储。


  行存储索引按行然后按列的顺序物理存储数据。数据在逻辑上可按行排序访问。因此，此架构针对查找序列或有限行子集的查询进行了优化。二叉树索引提供了一种基于聚集索引未对数据排序的其他列来快速搜索该数据的方法。


  列存储索引按列物理分组存储数据，但按行排序。此约定允许通过过滤器限制返回的行数，并通过列分组减少需要读取的页面，因为查询所需的列数减少。这使得查询可以读取显著更多的行，但在列列表受限时仍能保持出色的性能。第
  10 章探讨了如何控制列存储索引内的数据顺序，以增加一个额外的过滤维度，从而能够对数据进行水平和垂直切片。


  '
- "# 5. 列存储压缩\n\n有许多特性使得列存储索引在分析工作负载中表现异常出色。在这些特性中，压缩是性能和资源消耗方面最重要的驱动因素。理解 SQL Server\
  \ 如何在列存储索引中实现压缩，以及如何使用不同的算法来缩减这些数据的大小，有助于在 SQL Server 中优化分析数据存储的架构和实现。\n\n\n## 列存储压缩基础\n\
  \n写入列存储索引中段的数据在存储前会经过高强度压缩。增量存储有助于缓冲传入列存储索引的写入操作，确保写入段的频率不会高到对服务器性能产生负面影响。\n\n即使没有任何额外的优化，按列而非按行存储的数据在压缩时也会非常高效。这是因为给定列中的值通常会频繁重复，因此比重复较少的数据更容易压缩。典型的分析表会包含许多行，但通常包含重复的列，例如：\n\
  \n*   实体类型\n*   金额\n*   日期\n*   计数\n*   重复的维度\n\n考虑图 5-1 中所示的三列。\n\n![](img/521866_1_En_5_Fig1_HTML.jpg)\n\
  \n图 5-1\n\n代表性数据集中重复值示例\n\n图中表示了十一行数据，其中每列都包含重复值。*日期*列仅包含三个不同的值，而*状态*列包含四个，*小时*列包含六个。这种重复性往往能很好地扩展。如果这是来自包含一百万行的行组的数据，那么可以合理地预期像*状态*这样的列只会包含少量在整个数据集中频繁重复的值。数据的重复性越高，其压缩效果就越好。\n\
  \n正如预期的那样，单个列中的值之间比不同列之间的值存在更多的重复。这主要基于两个原因：\n\n*   不同的数据类型将具有截然不同的值。例如，字符串列的内容不容易与金额列的内容进行比较。\n\
  *   代表不同维度的列将具有与其典型用途相对应的不同值范围。例如，包含新车税率的小数列所包含的常见值集合，将与包含这些汽车成本的小数列非常不同。\n\n列存储索引完美契合这些约定，而行存储索引则力不从心，因为行压缩和页压缩被迫考虑行或页中的所有列，这将包含各种数据类型和维度。\n\
  \n请注意，增量存储不进行列存储压缩。此数据结构需要在运行时尽可能快速地写入，因此放弃昂贵的压缩省去了处理对其写入所需的时间和开销。这意味着增量存储将比使用列存储压缩时占用更多空间。由于增量存储与压缩后的列存储索引内容相比往往较小，并且包含可预测的行数，因此维护它所需的开销是恒定的，不会随时间增长。根据\
  \ SQL Server 版本的不同，增量行组可能会使用行压缩或页压缩来限制其存储和内存占用。\n\n## 列存储压缩算法\n\n列存储索引不会在段中重复存储字符串、小数或日期。相反，SQL\
  \ Server 利用字典编码和值编码来缩减和压缩数据，即使原始值很大。\n\n压缩过程可总结为以下顺序步骤：\n\n1.  压缩前对所有值进行编码。\n2.\
  \  计算最佳行顺序（又称 Vertipaq 优化）。\n3.  独立压缩每个段。\n\n编码是压缩过程中的重要步骤。以下细节解释了不同的编码算法、它们的使用方式以及它们对整体压缩效果的影响。\n\
  \n### 值编码\n\n此过程旨在通过调整数字列的存储方式以使用更小尺寸的对象来减少其占用空间。对于整数数据（包括 TINYINT、SMALLINT、INT\
  \ 和 BIGINT），值通过各种数学变换进行压缩，这些变换可以将所有值除以一个公约数或减去一个公共减数。考虑一个 4 字节整数数据类型的列，其包含表 5-1\
  \ 中所示的值。\n\n表 5-1\n\n待压缩的示例整数列数据\n\n| 值 | 最小位数（位） |\n| --- | --- |\n| **60** | **6**\
  \ |\n| **150** | **8** |\n| **90** | **7** |\n| **9000** | **13** |\n| **630** |\
  \ **10** |\n| **300000** | **19** |\n\n列存储压缩试图寻找公约数，并立即注意到每个数字都可被 10 整除。在此示例中，基数是\
  \ 10，每个值将使用其可被整除的该基数的最大公共负指数来引用，如表 5-2 所示。\n\n表 5-2\n\n使用负指数压缩的整数数据\n\n| 值 | 值 *10^(-1)\
  \ | 最小位数（位） |\n| --- | --- | --- |\n| **60** | **6** | **3** |\n| **150** | **15**\
  \ | **4** |\n| **90** | **9** | **4** |\n| **9000** | **900** | **10** |\n| **630**\
  \ | **63** | **6** |\n| **300000** | **30000** | **15** |\n\n下一个压缩步骤是将列表中的最小值作为基数，将其归零，并通过从其他值中减去该基数来引用它们，如表\
  \ 5-3 所示。\n\n表 5-3\n\n通过重新设定基数压缩的整数数据\n\n| 值 | 值 *10^(-1) | 值 *10^(-1) - 6 | 最小位数（位）\
  \ |\n| --- | --- | --- | --- |\n| **60** | **6** | **0** | **0** |\n| **150** |\
  \ **15** | **9** | **4** |\n| **90** | **9** | **3** | **2** |\n| **9000** | **900**\
  \ | **894** | **10** |\n| **630** | **63** | **57** | **6** |\n| **300000** | **30000**\
  \ | **29994** | **15** |\n\n回顾存储值所需的最小空间，原始大小为 63 位。经过第一次变换后，大小减少到 42 位，经过最后一次变换后，大小减少到\
  \ 37 位。总体而言，这组值的尺寸缩减了 38%。所见值压缩的程度会根据值集合的不同而变化，并且可能显著更高或更低。例如，一组完全相同的值将压缩成一个归零的引用，如表\
  \ 5-4 所示。\n\n表 5-4\n\n通过重新设定基数压缩的相同整数数据\n\n| 值 | 值 - 1700000 | 原始位数（位） | 缩减后位数（位）\
  \ |\n| --- | --- | --- | --- |\n| **1700000** | **0** | **22** | **0** |\n| **1700000**\
  \ | **0** | **22** | **0** |\n| **1700000** | **0** | **22** | **0** |\n| **1700000**\
  \ | **0** | **22** | **0** |\n| **1700000** | **0** | **22** | **0** |\n\n虽然这个例子看起来很极端，但在维度表中包含的重复值落入有限范围的情况并不少见。\n\
  \n请注意，列存储索引中实际发生的现实世界数据转换比这更复杂，但确定其细节的过程本质上是相同的。\n\n小数在压缩前会转换为整数，此时它们遵循与整数相同的值编码规则。例如，表\
  \ 5-5 显示了一组以小数格式存储的税率的压缩过程。\n\n表 5-5\n\n小数的值压缩\n\n| 值 | 值 * 100 | 值 / 5 | 值 / 5\
  \ - 70 | 原始位数（位） | 缩减后位数（位） |\n| --- | --- | --- | --- | --- | --- |\n| **15.2**\
  \ | **1520** | **304** | **234** | **40** | **8** |\n| **8.8** | **880** | **176**\
  \ | **106** | **40** | **7** |\n| **4.3** | **430** | **86** | **16** | **40** |\
  \ **5** |\n| **3.5** | **350** | **70** | **0** | **40** | **0** |\n| **6.25** |\
  \ **625** | **125** | **55** | **40** | **6** |\n\n\n\n原始数据以 `DECIMAL(4,2)` 格式存储，每个值消耗\
  \ 5 字节（40 位）。通过在压缩前转换为整数，应用了多种转换方法，将存储空间从 200 位减少到 26 位。十进制数可能看起来不是最有可能实现高效压缩的候选者，但一旦转换为整数值，它们就可以利用任何可应用于整数的转换方法。\n\
  \n### 字典编码\n\n使用字典编码可以更高效地存储字符串数据。在此算法中，段中的每个不同字符串值被插入到字典中，并使用指向字典的整数指针进行索引。这对于包含重复值的字符串列可以显著节省空间。考虑一个包含\
  \ `VARCHAR(50)` 数据类型食物的段，如表 5-6 所示。\n\n#### 表 5-6\n包含 `VARCHAR(50)` 字符串数据的示例数据集\n\
  \n| 值 | 原始大小（字节） |\n| --- | --- |\n| Taco | 4 |\n| Hamburger | 9 |\n| Fish Fry |\
  \ 8 |\n| Taco | 4 |\n| Hamburger | 9 |\n| Taco | 4 |\n| Triple-Layer Chocolate Cake\
  \ | 27 |\n| Triple-Layer Chocolate Cake | 27 |\n| Triple-Layer Chocolate Cake |\
  \ 27 |\n| Cup of Coffee | 13 |\n\n压缩此数据的第一步是创建一个带索引的字典，如表 5-7 所示。\n\n#### 表 5-7\n\
  从 `VARCHAR` 数据生成的字典示例\n\n| 索引 ID | `VARCHAR` 值 |\n| --- | --- |\n| 0 | Fish Fry\
  \ |\n| 1 | Hamburger |\n| 2 | Taco |\n| 3 | Triple-Layer Chocolate Cake |\n| 4 |\
  \ Cup of Coffee |\n\n由于该段包含五个不同的值，字典的索引 ID 将消耗 3 位。图 5-2 中的映射展示了此数据最终的字典压缩结果。\n\n\
  ![一组十个字符串的示例字典压缩](img/521866_1_En_5_Fig2_HTML.jpg)\n\n原始数据存储需要 132 字节，而编码后的数据仅需\
  \ 30 位（每个值 3 位），外加存储字典中查找值所需的空间。字典本身会为段数据中的每个不同值消耗空间，但作为一个额外好处，一个字典可以被多个行组共享。因此，一个包含\
  \ 100 个行组的表可以在所有这些行组中为每一列重用字典。\n\n字典压缩的关键在于基数。列中不同值越少，数据压缩效率就越高。具有 5 个不同值的 `CHAR(100)`\
  \ 列将比具有 1000 个不同值的 `CHAR(10)` 列压缩效果好得多。字典大小可以粗略估计为不同值数量与其初始大小的乘积。较低的基数意味着需要存储在字典中的字符串值更少，并且用于引用字典的索引也会更小。由于字典索引\
  \ ID 在表的行中会重复出现，较小的尺寸可以显著提高压缩率。\n\n可以使用视图 `sys.column_store_dictionaries` 查看 SQL\
  \ Server 中的字典。清单 5-1 中的查询返回有关第 4 章创建的 `fact.Sale_CCI` 表中使用的字典的信息。\n\n```sql\nSELECT\n\
  \    partitions.partition_number,\n    objects.name AS table_name,\n    columns.name\
  \ AS column_name,\n    CASE\n        WHEN column_store_dictionaries.dictionary_id\
  \ = 0 THEN 'Global Dictionary'\n        ELSE 'Local Dictionary'\n    END AS dictionary_scope,\n\
  \    CASE\n        WHEN column_store_dictionaries.type = 1 THEN 'Hash dictionary\
  \ containing int values'\n        WHEN column_store_dictionaries.type = 2 THEN 'Not\
  \ used' -- Included for completeness\n        WHEN column_store_dictionaries.type\
  \ = 3 THEN 'Hash dictionary containing string values'\n        WHEN column_store_dictionaries.type\
  \ = 4 THEN 'Hash dictionary containing float values'\n    END AS dictionary_type,\n\
  \    column_store_dictionaries.entry_count,\n    column_store_dictionaries.on_disk_size\n\
  FROM sys.column_store_dictionaries\nINNER JOIN sys.partitions\n    ON column_store_dictionaries.hobt_id\
  \ = partitions.hobt_id\nINNER JOIN sys.objects\n    ON objects.object_id = partitions.object_id\n\
  INNER JOIN sys.columns\n    ON columns.column_id = column_store_dictionaries.column_id\n\
  \    AND columns.object_id = objects.object_id\nWHERE objects.name = 'Sale_CCI';\n\
  ```\n\n此查询的结果如图 5-3 所示。\n\n![表 fact.Sale_CCI 的字典元数据结果](img/521866_1_En_5_Fig3_HTML.jpg)\n\
  \n此视图在 `entry_count` 中提供了列的基数，以及字典的大小和类型。从这些数据中可以得出一些值得注意的结论：\n\n*   字典可以是全局的或本地的。本地字典仅适用于单个行组（或在极少数情况下，适用于通过与该行组相同进程压缩的行组）。全局字典则在给定列的许多或所有段之间共享。\n\
  \n*   如果 SQL Server 认为对数字列使用字典压缩比值压缩能提供更好的压缩效果，则可能会为数字列创建字典。因此，数字列可能出现在此元数据中，但有些不会。通常，低基数的数字列倾向于使用字典压缩，而高基数的数字列则使用值压缩。在前面的例子中，底层数据的主键\
  \ `Sale Key` 使用了值压缩，而 `Bill To Customer Key`（仅包含三个唯一值）使用了字典压缩。\n\n*   如果需要，可以从 `sys.columns`\
  \ 中获取额外的元数据，例如底层数据的数据类型、长度、精度和小数位数。\n\n这些元数据提供了列存储索引中每个字典的详细信息，但并未直接将段与字典关联起来。清单\
  \ 5-2 中的查询将 `sys.column_store_segments` 与 `sys.column_store_dictionaries` 关联起来，以提供这些额外信息。\n\
  \n\n\n\n## 查询字典元数据\n\n```sql\nSELECT\ncolumn_store_segments.segment_id,\ntypes.name\
  \ AS data_type,\ntypes.max_length,\ntypes.precision,\ntypes.scale,\nCASE\nWHEN PRIMARY_DICTIONARY.dictionary_id\
  \ IS NOT NULL THEN 1\nELSE 0\nEND AS does_global_dictionary_exist,\nPRIMARY_DICTIONARY.entry_count\
  \ AS global_dictionary_entry_count,\nPRIMARY_DICTIONARY.on_disk_size AS global_dictionary_on_disk_size,\n\
  CASE\nWHEN SECONDARY_DICTIONARY.dictionary_id IS NOT NULL THEN 1\nELSE 0\nEND AS\
  \ does_local_dictionary_exist,\nSECONDARY_DICTIONARY.entry_count AS local_dictionary_entry_count,\n\
  SECONDARY_DICTIONARY.on_disk_size AS local_dictionary_on_disk_size\nFROM sys.column_store_segments\n\
  INNER JOIN sys.partitions\nON column_store_segments.hobt_id = partitions.hobt_id\n\
  INNER JOIN sys.objects\nON objects.object_id = partitions.object_id\nINNER JOIN\
  \ sys.columns\nON columns.object_id = objects.object_id\nAND column_store_segments.column_id\
  \ = columns.column_id\nINNER JOIN sys.types\nON types.user_type_id = columns.user_type_id\n\
  LEFT JOIN sys.column_store_dictionaries PRIMARY_DICTIONARY\nON column_store_segments.primary_dictionary_id\
  \ = PRIMARY_DICTIONARY.dictionary_id\nAND column_store_segments.primary_dictionary_id\
  \  -1\nAND PRIMARY_DICTIONARY.column_id = columns.column_id\nAND PRIMARY_DICTIONARY.hobt_id\
  \ = partitions.hobt_id\nLEFT JOIN sys.column_store_dictionaries SECONDARY_DICTIONARY\n\
  ON column_store_segments.secondary_dictionary_id = SECONDARY_DICTIONARY.dictionary_id\n\
  AND column_store_segments.secondary_dictionary_id  -1\nAND SECONDARY_DICTIONARY.column_id\
  \ = columns.column_id\nAND SECONDARY_DICTIONARY.hobt_id = partitions.hobt_id\nWHERE\
  \ objects.name = 'Sale_CCI'\nAND columns.name = 'Bill To Customer Key';\n```\n*清单\
  \ 5-2: 用于返回更详细字典元数据的查询*\n\n请注意，如果表已分区或包含许多列，结果集可能会变得非常大，因此此查询通过表和列进行了筛选，以聚焦于一组特定的段作为演示。结果有助于填补字典元数据的空白，如图\
  \ 5-4 所示。\n\n![](img/521866_1_En_5_Fig4_HTML.jpg)\n*图 5-4: `Sale_CCI` 的字典元数据详情。`[Bill\
  \ To Customer Key]`*\n\n此详细信息区分了本地字典和全局字典，并添加了一些列级细节。根据结果，整数列`[Bill To Customer\
  \ Key]`压缩效果很好，因为其字典中仅包含三个不同的值。六十八字节的字典非常小，将为之前每行 4 字节、共 2500 万行的列带来巨大的节省。每个值从 4\
  \ 字节减少到 2 位，允许以 16:1 的比率进行压缩！\n\n需要注意的是，字典大小限制为 16 兆字节。由于一个段只能分配一个全局字典和一个本地字典，如果字典达到\
  \ 16MB 阈值，则行组将被拆分为更小的行组，以使每个行组拥有的字典低于此限制。如果向表中插入新行会导致其任何字典超出字典大小上限，则将创建一个新的行组来容纳新行。从此信息中可以得出两个关键结论：\n\
  1.  非常长的列可能强制拆分字典，导致行组尺寸过小。这将降低压缩效率并增加服务该表所需的字典数量。\n2.  基数非常高的列也可能接近此限制，并导致字典拆分，从而产生尺寸过小的行组。\n\
  \n具有高基数的数值列通常会使用值压缩来避免此问题，而长字符串和/或高基数的字符串列可能无法避免此问题。与大规模的 OLAP 表相比，十六兆字节听起来可能很小，但字典本身是压缩的，典型的分析数据不会接近字典大小限制。应始终通过测试来确认这些情况中的任何一种，而不是假设它们会发生或不会发生。\n\
  \n## 字符串数据是否应该规范化？\n\n在讨论压缩过程的其余部分之前，从字典压缩的效率中产生了一个问题：对于使用字典压缩的列存储压缩数据，维度的规范化是否必要或有用。\n\
  \n在事务数据领域，维度通常是规范化的。这节省了空间和内存，并允许在运行时实现关系完整性、唯一性和其他约束。然而，在分析数据中，数据验证通常通过验证过程实现，而不是使用触发器、键或检查约束。因此，规范化通常更多地用于节省资源或为可视化或分析应用程序提供方便的查找表。\n\
  \n可以通过创建`Fact.Sale_CCI`的新版本来测试这个问题，其中`Description`列被规范化到一个查找表中，并通过`SMALLINT`键引用。清单\
  \ 5-3 提供了这个新表及其对应查找表的定义。\n\n```sql\nCREATE TABLE Dimension.Sale_Description\n( \
  \     Description_Key SMALLINT NOT NULL IDENTITY(1,1) PRIMARY KEY CLUSTERED, [Description]\
  \ NVARCHAR(100) NOT NULL);\nCREATE TABLE Fact.Sale_CCI_Normalized\n(      [Sale\
  \ Key] [bigint] NOT NULL,\n[City Key] [int] NOT NULL,\n[Customer Key] [int] NOT\
  \ NULL,\n[Bill To Customer Key] [int] NOT NULL,\n[Stock Item Key] [int] NOT NULL,\n\
  [Invoice Date Key] [date] NOT NULL,\n[Delivery Date Key] [date] NULL,\n[Salesperson\
  \ Key] [int] NOT NULL,\n[WWI Invoice ID] [int] NOT NULL,\n[Description Key] SMALLINT\
  \ NOT NULL,\n[Package] nvarchar NOT NULL,\n[Quantity] [int] NOT NULL,\n[Unit Price]\
  \ decimal NOT NULL,\n[Tax Rate] decimal NOT NULL,\n[Total Excluding Tax] decimal\
  \ NOT NULL,\n[Tax Amount] decimal NOT NULL,\n[Profit] decimal NOT NULL,\n[Total\
  \ Including Tax] decimal NOT NULL,\n[Total Dry Items] [int] NOT NULL,\n[Total Chiller\
  \ Items] [int] NOT NULL,\n[Lineage Key] [int] NOT NULL);\n```\n*清单 5-3: 包含规范化描述列的\
  \ `Fact.Sale_CCI` 表结构*\n\n填充数据时，首先加载`Dimension.Sale_Description`表，加载任何新的不同`Description`值，然后加载`Fact.Sale_CCI_Normalized`表，其中的数据通过连接维度表以检索`Description_Key`的值。图\
  \ 5-5 显示了这些表存储的并排比较。\n\n![](img/521866_1_En_5_Fig5_HTML.jpg)\n*图 5-5: 规范化列与未规范化列之间的存储比较*\n\
  \n左边的表是原始表，而右边的表将`Description`列规范化为`SMALLINT`。在此特定示例中，规范化带来了显著的空间节省，比原始表节省了约 15:1\
  \ 的压缩空间！\n\n一般来说，当不同值的数量较少且列的长度较高时，规范化最有帮助，因为`SMALLINT`列的字典编码将比大型`VARCHAR`列的字典编码产生更好的压缩效果。\n\
  \n规范化的缺点是数据加载过程需要更长的时间。在运行时连接额外的维度列来加载数据需要时间和资源。是否应该规范化的决定应仔细考虑，并通过测试来确定是否实现了足够的增益来证明这一改变是合理的。\n\
  \n最终，业务逻辑和组织需求将在高层驱动这一决策，而技术考虑将允许根据需要进行进一步调整。这个问题没有正确或错误的答案；因此，在动手测试证明之前，两种方法都被认为是有效的。\n\
  \n\n\n### 行组（Vertipaq）优化\n\n由于列存储索引是按列而非按行组织的，因此 SQL Server 有可能在压缩每个段时重新排列每个行组内的行顺序。只要可能，就会使用此优化，它试图排列行，使相似值彼此相邻。\n\
  \n列存储压缩对重复出现的值序列高度敏感；因此，此优化可以提供出色的压缩率和性能改进。Vertipaq 优化是一种旨在重新排列行顺序以实现底层数据最有效压缩的算法。该算法也用于其他\
  \ Microsoft 存储技术，例如 SQL Server Analysis Services、PowerPivot 和 PowerBI。\n\nVertipaq\
  \ 优化是一个开销较大的过程，列存储索引包含的列越多，找到最佳行顺序所需的时间就越长。因此，SQL Server 会限制搜索时间，以确保构建索引不会花费过长时间。结果就是，Vertipaq\
  \ 优化在较宽的表上效果会稍差一些。这一事实不应影响数据库架构决策，但如果宽表上的列存储索引随着更多列的不断添加而开始出现次优压缩，它可以成为一个有用的故障排除步骤。\n\
  \n此优化的一个关键点是，某些架构决策可能会阻止其使用。在以下两种情况下，将不会使用 Vertipaq 优化：\n\n1.  当元组移动器将行从增量存储区合并到至少有一个非聚集行存储索引的聚集列存储索引中时。\n\
  2.  对于在内存优化表上构建的列存储索引时。\n\n这并不意味着不应在聚集列存储索引上使用非聚集行存储索引。也不应避免使用内存优化的列存储索引。相反，Vertipaq\
  \ 压缩不会对这些结构进行操作这一事实，应作为架构决策过程的一个额外考量因素。如果必须使用非聚集行存储索引来服务特定的关键查询集，那么就应该使用它。如果其使用是可选的，则请考虑它可能对压缩产生的负面影响。\n\
  \n虽然无法通过任何便捷的视图暴露给定列存储索引的算法工作细节，但可以使用清单 5-4 中的查询来检查某个行组是否应用了 Vertipaq 优化。\n\n```sql\n\
  SELECT\n    objects.name,\n    partitions.partition_number,\n    dm_db_column_store_row_group_physical_stats.row_group_id,\n\
  \    dm_db_column_store_row_group_physical_stats.has_vertipaq_optimization\nFROM\
  \ sys.dm_db_column_store_row_group_physical_stats\nINNER JOIN sys.objects\n    ON\
  \ objects.object_id = dm_db_column_store_row_group_physical_stats.object_id\nINNER\
  \ JOIN sys.partitions\n    ON partitions.object_id = objects.object_id\n    AND\
  \ partitions.partition_number = dm_db_column_store_row_group_physical_stats.partition_number\n\
  WHERE objects.name = 'Sale_CCI'\nORDER BY dm_db_column_store_row_group_physical_stats.row_group_id;\n\
  ```\n\n**清单 5-4** 查询以返回是否使用了 Vertipaq 优化\n\n`sys.dm_db_column_store_row_group_physical_stats`\
  \ 中的 `has_vertipaq_optimization` 列指示该行组在压缩时是否使用了 Vertipaq 优化。通常，除非列存储索引位于内存优化表上，或与非聚集行存储索引结合使用，否则期望此列返回值\
  \ `1`。如果 `has_vertipaq_optimization` 意外为零，则有必要进行进一步研究以了解其原因，并确定是哪些更改导致无法使用此优化。图\
  \ 5-6 显示了前述查询结果的示例。\n\n![](img/521866_1_En_5_Fig6_HTML.jpg)\n\n**图 5-6** 验证是否使用了\
  \ Vertipaq 优化的查询结果\n\n在此场景中，此列存储索引中的所有行组均使用了 Vertipaq 优化。\n\n\n\n"
- '# 其他压缩算法


  在段已被编码且行组已重新排序之后，列存储压缩的最后一步是将剩余的压缩算法应用于所得数据。此时，对于某个给定段，可能已无法实现进一步的压缩效果。对于不重复的值，这种情况通常最为常见。这里提供了列存储索引如何压缩数据的详细信息，以便在可能的情况下，协助进行更高级的压缩和性能优化。


  列存储索引使用的一种压缩形式是 `run-length encoding`（游程编码），它试图将相同的值及其计数分组在一起，而不是在段中列出重复的值。`Vertipaq
  optimization` 是此步骤的前提，没有它，`run-length encoding` 的效果将显著降低。


  以图 5-2 中先前提供的食物为例。编码后的数据有五个不同的值，这些值已通过字典编码为 3 位数值。`Vertipaq optimization` 会将所得数据集进行排序，如图
  5-7 所示。


  ![](img/521866_1_En_5_Fig7_HTML.jpg)

  *图 5-7：一组编码值的 `Vertipaq optimization`*


  请注意，编码值现在已重新排序，使得每个值都与相同的值分组在一起。`Run-length encoding` 在逻辑上将每个相同的值分组在一起，以减少段所需的总存储量。从逻辑上讲，所得结构可以如图
  5-8 所示。


  ![](img/521866_1_En_5_Fig8_HTML.jpg)

  *图 5-8：应用于数值数据集的 `Run-length encoding`*


  每个值都被赋予了一个计数，显示在其后的括号中。值 0 出现一次，接着是 1 出现两次，2 出现三次，3 出现三次，4 出现一次。这种算法在数据重复时效果显著，与字典编码和
  `Vertipaq compression` 结合使用时效果尤为出色。


  `Bit array compression` 用于段包含少量不同值，且数据无法从 `Vertipaq compression` 和 `run-length encoding`
  中获得显著益处的情况。位数组是一个数组，其中每个不同值被分配一列，每一行使用位映射到该列。图 5-9 说明了在未编码且未排序的数据集上使用此压缩时的外观。


  ![](img/521866_1_En_5_Fig9_HTML.jpg)

  *图 5-9：应用于未编码数据集的 `Bit array compression`*


  虽然这看起来像是一个复杂的转换，但生成的 1 和 0 非常紧凑，并提供了可以快速解压缩的结构。


  还有一些其他更复杂的压缩算法可用于逐步减小每个数据段的大小。所使用的算法可能因段而异，并且可能经常使用、有时使用或根本不使用。当此过程完成后，最终的压缩级别由
  `SQL Server` 应用，它利用了其 `xVelocity compression algorithm`。


  列存储段在 `SQL Server` 中存储为 `Large Objects (LOB)`。`xVelocity compression` 的细节并未公开，因此我们无法进一步深入探讨其工作原理。虽然将本章迄今为止讨论的结构转换为其最终形式所使用的变换尚未完全知晓，但我们可以通过启用
  `STATISTICS IO` 并查看发出查询时针对列存储索引的读取操作来推断其有效性。考虑清单 5-5 中的简单分析查询。


  ```sql

  SELECT

  SUM(Quantity)

  FROM fact.Sale_CCI

  WHERE [Invoice Date Key] >= ''1/1/2016''

  AND [Invoice Date Key] < ''2/1/2016''

  ```

  *清单 5-5：用于演示列存储 IO 的简单分析查询*


  此查询的结果如图 5-10 所示。


  ![](img/521866_1_En_5_Fig10_HTML.jpg)

  *图 5-10：示例查询输出*


  如结果所示，点击 *Messages* 选项卡可提供有关查询执行的读取和写入操作的附加信息，如图 5-11 所示。


  ![](img/521866_1_En_5_Fig11_HTML.jpg)

  *图 5-11：示例查询的 `Statistics IO` 输出*


  返回的信息相当多，但目前，红色圆圈标出的 *`LOB logical reads`* 提供了满足此查询所需读取操作的指示。列存储索引不会将读取报告为 *`logical
  reads`*，而是报告为 *`LOB logical reads`*，这表明它们的段是作为 `Large Objects` 存储的，而不是传统的 `SQL Server`
  数据结构。如果这个读取数量看起来很高，那是因为它确实很高！本书后面的章节将提供额外的优化，以减少存储和内存占用，并显著提高查询性能。




  '
- '# 列存储索引压缩与元数据


  ## 列存储归档压缩


  SQL Server 提供了一种额外的压缩级别，可用于进一步减小列存储索引数据的占用空间。虽然归档压缩可以提供比标准列存储压缩更高的压缩率，但读写数据时会消耗更多的计算资源。因此，此选项应保留用于不常使用的数据，例如：


  -   冷存储或温存储

  -   很少访问的数据

  -   用于对性能要求不高的应用程序的数据


  列存储归档压缩使用 Microsoft Xpress 压缩算法。虽然该算法很复杂，但它是公开记录的，并非 Microsoft 的商业机密。该算法依赖于压缩具有重复字节序列的数据，并结合了
  LZ77 和 Huffman 压缩算法来进一步缩小列存储数据的大小。这些压缩算法的细节内容广泛，无法在本书的篇幅内详述，但对任何感兴趣的人都是公开可用的。


  列存储索引中使用的压缩类型可以逐分区指定，从而允许对较旧/较少使用的数据有效使用归档压缩，而新数据则可以使用标准列存储压缩。第 11 章将深入探讨如何将分区与列存储索引结合使用，以改善数据存储、维护和性能。


  为了演示列存储归档压缩的有效性，将创建一个新的 `Sale_CCI` 表版本，如代码清单 5-6 所示。


  ```sql

  CREATE TABLE Fact.Sale_CCI_Archive

  (      [Sale Key] [bigint] NOT NULL,

  [City Key] [int] NOT NULL,

  [Customer Key] [int] NOT NULL,

  [Bill To Customer Key] [int] NOT NULL,

  [Stock Item Key] [int] NOT NULL,

  [Invoice Date Key] [date] NOT NULL,

  [Delivery Date Key] [date] NULL,

  [Salesperson Key] [int] NOT NULL,

  [WWI Invoice ID] [int] NOT NULL,

  [Description] NVARCHAR(100) NOT NULL,

  [Package] nvarchar NOT NULL,

  [Quantity] [int] NOT NULL,

  [Unit Price] decimal NOT NULL,

  [Tax Rate] decimal NOT NULL,

  [Total Excluding Tax] decimal NOT NULL,

  [Tax Amount] decimal NOT NULL,

  [Profit] decimal NOT NULL,

  [Total Including Tax] decimal NOT NULL,

  [Total Dry Items] [int] NOT NULL,

  [Total Chiller Items] [int] NOT NULL,

  [Lineage Key] [int] NOT NULL);

  CREATE CLUSTERED COLUMNSTORE INDEX CCI_Sale_CCI_Archive ON fact.Sale_CCI_Archive
  WITH (DATA_COMPRESSION=COLUMNSTORE_ARCHIVE);

  ```

  **代码清单 5-6** 使用列存储归档压缩创建的表


  填充数据后，可以将此表与之前使用标准列存储压缩的版本进行比较，如图 5-12 所示。


  ![](img/521866_1_En_5_Fig12_HTML.jpg)

  **图 5-12** 列存储压缩与列存储归档压缩的对比


  与标准列存储压缩相比，列存储归档压缩提供了巨大的空间节省。这可能看起来令人难以置信地出色，但其中一部分节省可以通过优化数据顺序来实现，这将在第 10 章详细讨论。


  在典型生产数据加载的实际应用中，归档压缩将比标准列存储压缩额外提供 15-30% 的空间节省。对于大型分析表而言，这可能意味着其数据占用空间的显著减少！一般来说，仅考虑对不常写入或读取的数据使用归档压缩，因为其压缩和解压缩的开销不小。对于很少访问的数据，这是节省存储和内存资源的简单方法。


  ## 压缩生命周期


  SQL Server 中所有压缩的一个关键点是，压缩页在查询需要之前会保持压缩状态。因此，页在存储时被压缩，并在索引的整个生命周期内保持压缩状态。当页被读入内存时，它们也保持压缩。因此，使用压缩所节省的任何存储空间，在数据被需要时都将转化为内存节省。


  这一事实对于列存储索引的效率至关重要。压缩段在磁盘上和内存中都保持压缩状态，直到查询需要其数据时才解压缩。任何进一步减小压缩段大小的优化都将直接转化为内存节省。本书的其余部分将重点介绍优化、最佳实践和功能，以尽可能高效地使用列存储索引，从而充分利用其压缩能力，并确保它们能够扩展以处理任何数据，无论其变得多大。


  '
- '# 6. 列存储元数据


  列存储索引中的每个压缩段不仅存储分析数据，而且通过元数据可以比行存储表更精确地描述其内容。


  这些元数据驻留在系统视图中，允许 SQL Server 在运行时做出智能的查询处理决策。本章将详细探讨此元数据、SQL Server 如何使用它，以及如何使用它来提高列存储索引的性能。


  ## 可用的列存储元数据


  元数据可通过少数系统视图获取，这些视图提供有关段和行组的概览级数据，以及描述物理属性、字典和操作指标的详细数据。以下是对每个视图及其内容的简要回顾。


  ### 行组元数据


  每个压缩行组最多包含 2²⁰ 行，其内容通常在索引维护影响之外是静态的。因此，行数、已删除行数、大小和其他详细信息是准确的，可用于了解基础数据的大小和形态。


  代码清单 6-1 中的查询返回表名和索引名，以及视图 `sys.column_store_row_groups` 中的所有列。


  ```sql

  SELECT

  tables.name AS table_name,

  indexes.name AS index_name,

  column_store_row_groups.*

  FROM sys.column_store_row_groups

  INNER JOIN sys.indexes

  ON indexes.index_id = column_store_row_groups.index_id

  AND indexes.object_id = column_store_row_groups.object_id

  INNER JOIN sys.tables

  ON tables.object_id = indexes.object_id

  WHERE tables.name = ''Sale_CCI''

  ORDER BY tables.object_id, indexes.index_id, column_store_row_groups.row_group_id;

  ```

  **代码清单 6-1** 返回列存储索引中所有行组元数据的查询


  图 6-1 包含返回的行组元数据子集。


  ![](img/521866_1_En_6_Fig1_HTML.jpg)

  **图 6-1** Sale_CCI 上列存储索引的行组元数据


  `sys.column_store_row_groups` 返回的每一行代表一个行组内包含的行集，无论表中有多少列。一个包含十列的表，每个行组将包含十个段。类似地，一个包含
  30 列的表，每个行组将包含 30 个段。以下是该视图中每列的简要概述。


  #### `partition_number`


  一个行组不能跨越多个分区；因此，分区表将在每个分区中有独立的行组集合，彼此之间没有重叠。此列提供给定行组所在的分区。


  #### `delta_store_hobt_id`


  对于增量存储中打开的行组，此处提供一个 ID，该 ID 链接到 `sys.internal_partitions` 并代表其包含的增量行组数据。标准压缩行组在此列中将包含
  NULL。


  #### `state` 和 `state_description`


  这描述了行组的当前状态，无论它是 OPEN 并接受新行、CLOSED 但尚未被元组移动器压缩、COMPRESSED，还是 INVISIBLE（正在创建过程中的行组）。




  ## 列存储索引元数据


  本节详细介绍了列存储索引元数据视图中的关键列。


  #### Total_rows

  此列提供行组的行数。通过对所有行组的此值进行求和，无需直接查询表即可收集到准确的表行数。如果许多行组的行数较低，则表明存在值得调查的流程问题。


  #### Deleted_rows

  如果在此行组的删除位图中，有任何行被标记为已删除，则此处会提供已删除行的计数。


  #### Size_in_bytes

  行组的总大小，即驻留在该行组中的所有段所使用的空间之和。此列可用于快速确定整个或部分列存储索引的大小。


  ## 段元数据

  列存储索引中存储的基本单位是段。每个段代表单个列及其在每个行组所包含的行集中的内容。构成列存储索引的段数量是索引中行组数量与表中列数量的乘积。


  `Sys.column_store_segments` 提供了关于每个段内容的详尽细节。此数据是准确的，并且在段内数据发生变化时会更新，这与需要定期更新以确保合理近似现实情况的
  SQL Server 统计信息不同。


  此视图中的数据不仅仅是供好奇的管理员参考。查询优化器在查询列存储索引时，也会利用这些数据在运行时智能地决策需要读取哪些数据。这使得当元数据表明某些段无需用于满足查询时，可以跳过这些段。这可以显著减少读取量，并以
  SQL Server 中行存储表无法实现的方式提高查询性能。


  `清单 6-2` 中的查询返回此视图中的各种有用列。

  ```sql

  SELECT

  tables.name AS table_name,

  indexes.name AS index_name,

  columns.name AS column_name,

  partitions.partition_number,

  column_store_segments.encoding_type,

  column_store_segments.row_count,

  column_store_segments.has_nulls,

  column_store_segments.base_id,

  column_store_segments.magnitude,

  column_store_segments.min_data_id,

  column_store_segments.max_data_id,

  column_store_segments.null_value,

  column_store_segments.on_disk_size

  FROM sys.column_store_segments

  INNER JOIN sys.partitions

  ON column_store_segments.hobt_id = partitions.hobt_id

  INNER JOIN sys.indexes

  ON indexes.index_id = partitions.index_id

  AND indexes.object_id = partitions.object_id

  INNER JOIN sys.tables

  ON tables.object_id = indexes.object_id

  INNER JOIN sys.columns

  ON tables.object_id = columns.object_id

  AND column_store_segments.column_id = columns.column_id

  WHERE tables.name = ''Sale_CCI''

  ORDER BY columns.name, column_store_segments.segment_id;

  ```

  `清单 6-2`

  返回列存储段元数据的查询


  返回的段元数据可见于 `图 6-2`。

  ![](img/521866_1_En_6_Fig2_HTML.jpg)

  `图 6-2`

  Sale_CCI 表上列存储索引的段元数据


  关于列存储段的详细信息深入探讨了它们如何被压缩和存储，这可以为列存储索引中每列的压缩效率提供有价值的线索。以下是此视图中一些关键列的详细说明。


  #### Encoding_type

  此列指示该段是否使用字典进行编码以及存储其中的数据类型，具体如下：

  *   1: 无字典的非字符串/非二进制数据。此段中的值使用 基数/量级 编码进行转换。

  *   2: 带字典的非字符串/非二进制数据。

  *   3: 带字典的字符串或二进制数据。

  *   4: 无字典的非字符串/非二进制数据。此段中的值按原样存储，无额外转换。

  *   5: 无字典的字符串或二进制数据。


  通常，具有许多不同值（即高基数）的段倾向于使用基于值的编码，而不实现字典查找，而低基数的段则更常使用字典来减少重复值的存储。此决策由 SQL Server 内部做出，以改进压缩并减少段占用的空间。


  #### Row_Count

  此行计数与相应行组的行计数匹配，表示列存储段内包含的值数量（重复或不同）。


  #### Has_nulls

  如果一个段包含至少一个 NULL，则此列设置为 1；否则为 0。请注意，此列不指示列是否允许 NULL，而是报告某个段在其值集中是否恰好有 NULL。因此，同一列的不同段在此位上的值可以不同。


  #### Base_id and Magnitude

  这些列直接报告基于值的编码。如果使用基数和指数修改了值以减少其存储大小，则这些详细信息在此处表示。基数和量级可能因段而异，对于任何一列的不同段，它们不需要相同。


  #### Min_data_id and Max_data_id

  这对非常实用的列提供了段的最小值和最大值，或者如果使用了字典，则提供字典查找值。如果为基于值的编码进行了转换，则这些列提供的值将包含这些修改。


  段的最小值和最大值由查询优化器用于在读取列存储索引时跳过不必要的行组。例如，如果一个段包含的最小值为 1，最大值为 400，那么筛选此范围之外值的查询可以完全跳过此行组。这种优化称为段消除，是大型列存储索引性能的关键。第
  10 章详细讨论了段消除，并提供了充分利用此功能所需的约定。


  #### Null_value

  如果一个段包含 NULL，则此列提供的值是该列编码中表示 NULL 的数值。


  #### On_disk_size

  列 `on_disk_size` 提供了列存储段消耗的空间，从而可以轻松地将列存储索引消耗的空间分解为细粒度的详细信息。如果众多段中有一个段的大小异常大，则探究其原因并确定是否可以进行进一步优化以改进数据压缩可能是有价值的。


  这种细粒度的详细信息还允许计算每列消耗的空间，以及每个分区每列消耗的空间。如果列存储索引异常快速地增长，此元数据允许将增长源隔离到特定的列和一组段，以确定增长的来源。




  ### 行组物理元数据


  SQL Server 提供了视图 `sys.dm_db_column_store_row_group_physical_stats` 作为每个行组的参考。该视图包含了关于行组当前状态以及行组创建方式的详细信息。在排查意外的性能问题，或试图理解列存储索引行组为何以特定方式构建时，这些信息非常宝贵。


  代码清单 6-3 中的查询从该视图中返回关键信息以及一些相关的元数据。


  ```sql

  SELECT

  objects.name AS table_name,

  indexes.name AS index_name,

  dm_db_column_store_row_group_physical_stats.partition_number,

  dm_db_column_store_row_group_physical_stats.row_group_id,

  dm_db_column_store_row_group_physical_stats.state_desc,

  dm_db_column_store_row_group_physical_stats.total_rows,

  dm_db_column_store_row_group_physical_stats.deleted_rows,

  dm_db_column_store_row_group_physical_stats.size_in_bytes,

  dm_db_column_store_row_group_physical_stats.trim_reason_desc,

  dm_db_column_store_row_group_physical_stats.transition_to_compressed_state_desc,

  dm_db_column_store_row_group_physical_stats.has_vertipaq_optimization,

  dm_db_column_store_row_group_physical_stats.created_time

  FROM sys.dm_db_column_store_row_group_physical_stats

  INNER JOIN sys.objects

  ON objects.object_id = dm_db_column_store_row_group_physical_stats.object_id

  INNER JOIN sys.indexes

  ON indexes.object_id = dm_db_column_store_row_group_physical_stats.object_id

  AND indexes.index_id = dm_db_column_store_row_group_physical_stats.index_id

  WHERE objects.name = ''Sale_CCI'';

  ```

  代码清单 6-3：返回列存储行组物理详细信息的查询


  查询结果提供了关于行组的附加信息，如图 6-3 所示。


  ![](img/521866_1_En_6_Fig3_HTML.jpg)


  图 6-3：Sale_CCI 上列存储索引的行组物理统计信息


  这些信息为了解行组的构建方式和时间提供了线索。以下是图 6-3 中展示的关键列的说明。


  #### State_desc


  这是行组的当前状态，与在 `sys.column_store_row_groups` 中找到的值相同。状态为 `TOMBSTONE` 的行组表明它先前是增量存储区的一部分，已被转换为压缩行组，但尚未被清理。此清理过程是异步自动进行的，无需操作员干预。


  #### Total_rows, Deleted_rows, Size_in_bytes


  这些值与 `sys.column_store_row_groups` 中的对应值相同，在此视图中提供是为了方便。


  #### Trim_reason_desc


  一个行组最多可包含 2²⁰ 行。行组被创建并压缩时，其行数可能未达到满额，这有很多原因。如果此列对某个行组显示 `NO_TRIM`，则表明它是一个满行组，包含
  1,048,576 行。如果行组包含的行数小于其最大可能大小，那么修剪原因（trim reason）将解释为什么。


  通常，列存储索引应主要包含行数接近 1,048,576 的行组。如果情况并非如此，并且大多数行组尺寸过小（undersized），那么理解其原因对于改进列存储的存储和性能至关重要。对于“尺寸过小”没有严格的定义阈值，但通常一个尺寸过小的行组包含的行数少于
  900,000 行，或少于其最大尺寸的大约 10%。


  行组被修剪的常见原因包括：


  *   `BULKLOAD`：批量加载过程将结果行数限制为小于其最大值。这是正常的，很少需要担心。

  *   `REORG`：使用了索引重组过程来强制压缩行组。由于这是手动过程，如果需要，很容易控制。

  *   `DICTIONARY_SIZE`：字典限制为 16 兆字节空间。如果字典超过该大小，则其对应的行组将被拆分到另一个行组中。如果这种情况频繁发生并且导致行数较低，则表明字典压缩正在损害压缩性能。将大型维度表规范化为查找表是解决此问题的有效方法。

  *   `MEMORY_LIMITATION`：这表明 SQL Server 在压缩行组时内存不足，无法包含所有行。这表明存在内存压力，应进行研究以确定内存不足的原因，以及是否应为
  SQL Server 添加更多内存来解决此问题。这种性质的内存压力很可能也会影响服务器上的其他进程，缓解它将对它们以及列存储索引构建过程有益。

  *   `RESIDUAL_ROW_GROUP`：当索引构建操作完成时，剩余的行将使用此修剪原因压缩进行组。这是正常的，不需要调查。

  *   `AUTO_MERGE`：当元组移动器（tuple mover）运行并将多个行组合并在一起时，会产生此结果。这是好事，因为它有助于形成更大的行组，并移除尺寸过小的行组。


  #### Transition_to_compressed_state_desc


  此列描述了行组如何从增量存储区移动到列存储索引内的一组压缩段中。它提供了关于行组如何创建的附加信息，并可与修剪原因结合使用，以了解所有行组的创建方式（无论是否被修剪）。转换到压缩状态描述的可能值包括：


  *   `NOT_APPLICABLE`：这出现在增量存储区行组中，或在 SQL Server 2016 之前压缩的行组中（当时未维护此历史记录）。

  *   `INDEX_BUILD`：此行组通过索引构建过程压缩。

  *   `TUPLE_MOVER`：此行组由元组移动器在从增量存储区插入数据后压缩。

  *   `REORG_NORMAL`：执行了索引重组过程，将一个已关闭的行组从增量存储区移动到列存储索引中。这发生在该行组已达到其完整行数并被关闭之后，但在它通过元组移动器异步移动之前。

  *   `REORG_FORCED`：执行了索引重组过程，将一个开放的行组从增量存储区移动到列存储索引中。这发生在该行组尚未达到其完整行数之前，通常它本应通过元组移动器异步移动。

  *   `BULKLOAD`：最小日志记录的批量加载过程创建了该行组，而未使用增量存储区。

  *   `MERGE`：元组移动器将多个行组合并为此压缩行组。


  请注意，除了与索引重组操作相关的两个转换原因外，其余原因都表明是通过 SQL Server 中的自动过程创建的压缩行组。这些原因应被视为正常操作的一部分，仅在遇到未解决的性能问题时才需要调查。




  '
- "# 行组统计\n\n### Has_vertipaq_optimization\n\n此列指示行组内的行是否可以通过 Vertipaq 优化重新排序，以提高此行组的压缩率。\n\
  \n如果此列显示为零，则值得调查。Vertipaq 优化所带来的空间节省非常显著，它将使查询速度更快，并减少列存储索引的内存和存储消耗。正如前一章所讨论的，Vertipaq\
  \ 优化可能未发生的两个原因如下：\n\n1.  列存储索引驻留在内存优化表上。\n2.  列存储索引包含非聚集行存储索引。\n\n请注意，如果从聚集列存储索引中移除非聚集行存储索引，Vertipaq\
  \ 优化状态在执行索引重建之前不会更改。\n\n请仔细考量导致未使用 Vertipaq 优化的架构决策的利弊，因为将列存储索引置于内存中或包含非聚集行存储索引都有其合理的原因。\n\
  \n对于需要支持性非聚集行存储索引的列存储索引，一个解决方案是在包含查询所需数据的分区上实现非聚集索引。Vertipaq 优化将只影响包含该非聚集索引的分区上的行组。通常，根据常见的工作负载，可以将数据分离为热数据、温数据和冷数据。可以将辅助索引跨分区拆分，以有效地针对这些不同的工作负载。\n\
  \n类似地，可以使用筛选的非聚集行存储索引来进一步限制索引大小，并减少其对压缩和存储的范围和影响。\n\n### Created_time\n\n此列指示行组的创建时间。这有助于了解随时间推移创建了多少行组，以及单位时间内添加到列存储索引的行数。此外，`created_time`\
  \ 可以与 `size_in_bytes` 相关联，从而可以测量列存储索引大小随时间以字节为单位的增长。\n\n## 行组操作统计\n\nSQL Server\
  \ 维护有关列存储索引使用情况的累积详细信息，并在行组级别提供这些详细信息。这有助于理解列存储索引中的哪些行组构成了热数据、温数据或冷数据，并提供每个行组使用方式的详细粒度信息。\n\
  \n清单 6-4 中的查询返回单个列存储索引的操作数据。\n\n```sql\nSELECT\nobjects.name AS table_name,\nindexes.name\
  \ AS index_name,\ndm_db_column_store_row_group_operational_stats.row_group_id,\n\
  dm_db_column_store_row_group_operational_stats.index_scan_count,\ndm_db_column_store_row_group_operational_stats.scan_count,\n\
  dm_db_column_store_row_group_operational_stats.delete_buffer_scan_count,\ndm_db_column_store_row_group_operational_stats.row_group_lock_count,\n\
  dm_db_column_store_row_group_operational_stats.row_group_lock_wait_count,\ndm_db_column_store_row_group_operational_stats.row_group_lock_wait_in_ms,\n\
  dm_db_column_store_row_group_operational_stats.returned_row_count\nFROM sys.dm_db_column_store_row_group_operational_stats\n\
  INNER JOIN sys.objects\nON objects.object_id = dm_db_column_store_row_group_operational_stats.object_id\n\
  INNER JOIN sys.indexes\nON indexes.object_id = dm_db_column_store_row_group_operational_stats.object_id\n\
  AND indexes.index_id = dm_db_column_store_row_group_operational_stats.index_id\n\
  WHERE objects.name = 'Sale_CCI';\n```\n\n清单 6-4: 返回列存储行组操作统计的查询\n\n图 6-4 中的结果显示了每个行组的独立操作数据。\n\
  \n![](img/521866_1_En_6_Fig4_HTML.jpg)\n图 6-4: Sale_CCI 上列存储索引的行组操作统计\n\n此视图中的所有指标都是自上次重启\
  \ SQL Server 服务以来的累积值。因此，要有效地使用这些数据，必须定期捕获它，以计算从一个样本到下一个样本的测量值差异。\n\n以下是可用于跟踪详细列存储行组使用情况的部分列。\n\
  \n#### Index_scan_count\n\n此列计算列存储索引被扫描的次数，无论请求了哪些行组。对于给定分区中的所有行组，此值将相同。\n\n####\
  \ Scan_count\n\n此列仅计算扫描此行组的次数。将其与 `index_scan_count` 进行比较，可以了解满足针对列存储索引的查询时需要特定行组的频率。\n\
  \n在典型的 OLAP 数据中，较旧的数据比较新的数据需要得少，因此包含较旧数据的行组比较新的行组扫描次数更少。此视图中的扫描计数列可以提供必要的数据来支持冷数据或温数据的存储变更。如果较旧的数据出于历史原因需要但很少被查询，则可能可以将其卸载到速度较慢但成本较低的存储上。类似地，如果有一部分数据是较新的且至关重要，则可能受益于更快的存储。\n\
  \n#### Delete_buffer_scan_count\n\n此列计算为完成针对此行组的查询而需要查阅删除位图的次数。删除缓冲区指的是作为 b-tree\
  \ 与列存储索引一起存储的删除位图，以及该索引的内存中哈希表表示。\n\n通常，列存储索引中的删除行直到其数量与索引大小相比变得很大时才会成为问题。如果 `delete_buffer_scan_count`\
  \ 是一个接近 `scan_count` 值的大数字，则重建索引以从索引中移除删除行可能是值得的。在继续进行索引维护之前，请先检查 `dm_db_column_store_row_group_physical_stats`\
  \ 中的 `deleted_rows` 值，以验证删除行的数量确实很大。虽然索引重建可以作为联机操作执行，但对于大型列存储索引来说，它仍然计算开销大且耗时。\n\
  \n\n#### Row_group_lock_count、Row_group_lock_wait_count 和 Row_group_lock_wait_in_ms\n\
  \n这些指标提供了针对此行组的锁请求计数（及详细信息）。它们通常是列存储索引写入与读取操作冲突的结果。行组锁在活跃写入的行组上最为常见，而在较旧的行组上则不常见。\n\
  \n行组锁定本身并非坏事，但如果数据加载与分析过程之间存在严重争用，那么了解哪些行组导致了争用，将有助于解决该情况。\n\n更新操作最有可能引起争用，因为它需要同时写入删除位图和增量存储。虽然更新单行会影响两个行组（一个用于删除位图，一个用于增量存储），但较大的更新可能会影响许多行组。在这些场景中，更新引起的锁定可能相当具有破坏性。\n\
  \n同样，如果数据在一天中不断少量流入列存储索引，相比于通过单一集中式流程在非分析高峰期进行不频繁的管理，发生争用的机会更大。\n\n与许多性能挑战一样，应在需要时调查争用问题。如果\
  \ `Row_group_lock_count` 看起来很高，但分析速度（和最终用户满意度）良好，那么这个事实最好记录下来留待日后参考，但暂不采取行动。始终交叉参考\
  \ `Row_group_lock_wait_count` 和 `Row_group_lock_wait_in_ms`，以确定锁定是否导致了等待。如果等待次数或等待时间不高，则可能不需要进一步行动。如果不确定总等待时间是否过高，请考虑每次锁等待事件的平均等待时间，如清单\
  \ 6-5 中的查询所示。\n\n```sql\nSELECT\n    objects.name AS table_name,\n    indexes.name\
  \ AS index_name,\n    dm_db_column_store_row_group_operational_stats.row_group_id,\n\
  \    dm_db_column_store_row_group_operational_stats.scan_count,\n    dm_db_column_store_row_group_operational_stats.row_group_lock_wait_count,\n\
  \    dm_db_column_store_row_group_operational_stats.row_group_lock_wait_in_ms,\n\
  \    CASE\n        WHEN dm_db_column_store_row_group_operational_stats.row_group_lock_wait_count\
  \ = 0 THEN 0\n        ELSE CAST(CAST(dm_db_column_store_row_group_operational_stats.row_group_lock_wait_in_ms\
  \ AS DECIMAL(16,2)) /\n                  CAST(dm_db_column_store_row_group_operational_stats.row_group_lock_wait_count\
  \ AS DECIMAL(16,2)) AS DECIMAL(16,2))\n    END AS lock_wait_ms_per_wait_incidence\n\
  FROM sys.dm_db_column_store_row_group_operational_stats\nINNER JOIN sys.objects\n\
  \    ON objects.object_id = dm_db_column_store_row_group_operational_stats.object_id\n\
  INNER JOIN sys.indexes\n    ON indexes.object_id = dm_db_column_store_row_group_operational_stats.object_id\n\
  \    AND indexes.index_id = dm_db_column_store_row_group_operational_stats.index_id\n\
  WHERE objects.name = 'Sale_CCI';\n```\n**清单 6-5**\n**计算每次锁等待事件的锁等待时间的公式**\n\n返回的详细信息有助于理解：\n\
  * 针对某个行组的操作中有多少导致了锁定/等待？\n* 当发生锁定等待时，等待了多久？\n* 等待时间与行组的整体性能相比如何？\n\n如果争用在列存储索引中是个问题，请考虑优化数据加载流程。将更新操作分解为一系列删除和插入操作。这减少了数据加载期间的事务大小，加快了更新操作速度，并降低了显著争用的可能性。尽可能利用大批量插入的批量加载流程，因为它们更快、产生的争用更少，并且减少了事务日志大小。最后，确保对列存储索引的写入尽可能减少并集中化。如果中间写入操作可以在修改列存储索引数据之前针对临时表进行，那么结果将是分析所用数据上的争用减少，并且数据加载速度更快。最佳实践（如这些）在第\
  \ 15 章中有更详细的讨论。\n\n#### Returned_row_count\n\n另一个有助于量化利用率的附加指标是返回的行数总计。这提供了在一段时间内从此行组读取了多少数据的额外维度，并可以与索引中的其他行组进行比较。请注意，较低的行计数可能是由于该行组包含的行数本身较少，而不仅仅是使用率较低所致。\n\
  \n### 列存储索引内存使用情况\n\n系统视图 `sys.dm_column_store_object_pool` 提供了关于分配给列存储索引的内存的详细信息。这可以帮助解决内存压力问题，以及在创建列存储索引表时进行容量规划。这是一个跨整个服务器的共享视图；因此，当仅为单个数据库查看元数据时，按数据库名称进行过滤是有用的。\n\
  \n清单 6-6 中的查询返回特定列存储索引的内存使用详细信息。\n\n```sql\nSELECT\n    databases.name,\n    objects.name,\n\
  \    indexes.name,\n    columns.name,\n    dm_column_store_object_pool.row_group_id,\n\
  \    dm_column_store_object_pool.object_type_desc,\n    dm_column_store_object_pool.access_count,\n\
  \    dm_column_store_object_pool.memory_used_in_bytes,\n    dm_column_store_object_pool.object_load_time\n\
  FROM sys.dm_column_store_object_pool\nINNER JOIN sys.objects\n    ON objects.object_id\
  \ = dm_column_store_object_pool.object_id\nINNER JOIN sys.indexes\n    ON indexes.object_id\
  \ = dm_column_store_object_pool.object_id\n    AND indexes.index_id = dm_column_store_object_pool.index_id\n\
  INNER JOIN sys.databases\n    ON databases.database_id = dm_column_store_object_pool.database_id\n\
  LEFT JOIN sys.columns\n    ON columns.column_id = dm_column_store_object_pool.column_id\n\
  \    AND columns.object_id = dm_column_store_object_pool.object_id\nWHERE objects.name\
  \ = 'Sale_CCI'\n    AND databases.name = DB_NAME()\nORDER BY dm_column_store_object_pool.row_group_id,\
  \ columns.name;\n```\n**清单 6-6**\n**按 Sale_CCI 表统计的列存储内存使用情况**\n\n结果如图 6-5 所示。\n\
  \n![列存储索引的内存消耗示例](img/521866_1_En_6_Fig5_HTML.jpg)\n**图 6-5**\n**列存储索引的内存消耗示例**\n\
  \n请注意 `sys.dm_column_store_object_pool` 返回的详细程度。结果表明最近运行了一个查询，该查询针对了 `Invoice Date\
  \ Key` 和 `Quantity` 列。由于列存储索引将每一列单独存储在它们自己的段中，因此只需要将请求列的段读入内存。这与行存储索引不同，行存储索引的页面包含索引中的所有列，必须一起读取。\n\
  \n除了列段之外，内存还被删除位图和字典消耗，这提供了对列存储索引内每个对象所消耗内存的细粒度视图。以下是图 6-5 中返回的每个新列的说明。\n\n####\
  \ Object_type_desc\n\n这是驻留在内存中的列存储对象类型。它将是以下值之一：\n\n- `COLUMN_SEGMENT`：每一行此类型代表一个单独的列存储段。这些条目将包含一个\
  \ `column_id` 值，以便返回有关该段所属列的更多详细信息。\n\n- `PRIMARY_DICTIONARY`、`SECONDARY_DICTIONARY`\
  \ 和 `BULKINSERT_DICTIONARY`：这些代表用于基于字典编码的段的字典。通常，字典及其对应的列段所占用的空间将小于使用基于值的编码存储列时所占用的空间。\n\
  \n- `DELETE_BITMAP`：这代表由删除位图对象消耗的内存。对于列存储索引中跨越一个分区上所有行组的每个分区，始终会有一个删除位图。每个行组的条目指示与该特定行组相关的删除位图部分的粒度详细信息。即使其中没有指示被删除的行，这些对象也作为容器存在。\n\
  \n#### Access_count\n\n这是对内存中此对象的所有读写操作的计数。这粗略衡量了该对象被使用的程度，以及内存中哪些对象被频繁使用，哪些被很少使用。\n\
  \n由于此视图检查驻留在内存中的对象，数据是瞬态的，并且仅在对象驻留于内存期间保留历史记录。因此，访问计数仅是自 `object_load_time` 所给时间以来累计的。\n\
  \n#### Object_load_time\n\n这是此对象被读入内存对象池的时间。结合 `access_count`，可以计算单位时间内的读或写操作次数，这对于衡量特定对象在内存中的使用量可能很有用。\n\
  \n`dm_column_store_object_pool` 中提供的数据也可以进行聚合，以便可以测量给定行组、列、索引或对象类型的总内存消耗量。例如，清单\
  \ 6-7 中的查询量化了每个行组消耗的内存。\n\n```sql\nSELECT\ndatabases.name,\nobjects.name,\nindexes.name,\n\
  dm_column_store_object_pool.row_group_id,\nSUM(dm_column_store_object_pool.access_count)\
  \ AS access_count,\nSUM(dm_column_store_object_pool.memory_used_in_bytes) AS memory_used_in_bytes\n\
  FROM sys.dm_column_store_object_pool\nINNER JOIN sys.objects\nON objects.object_id\
  \ = dm_column_store_object_pool.object_id\nINNER JOIN sys.indexes\nON indexes.object_id\
  \ = dm_column_store_object_pool.object_id\nAND indexes.index_id = dm_column_store_object_pool.index_id\n\
  INNER JOIN sys.databases\nON databases.database_id = dm_column_store_object_pool.database_id\n\
  LEFT JOIN sys.columns\nON columns.column_id = dm_column_store_object_pool.column_id\n\
  AND columns.object_id = dm_column_store_object_pool.object_id\nWHERE objects.name\
  \ = 'Sale_CCI'\nAND databases.name = DB_NAME()\nGROUP BY databases.name, objects.name,\
  \ indexes.name, dm_column_store_object_pool.row_group_id\nORDER BY dm_column_store_object_pool.row_group_id;\n\
  ```\n**清单 6-7** 按行组分列的列存储内存消耗\n\n图 6-6 显示了结果。\n\n![图 6-6](img/521866_1_En_6_Fig6_HTML.jpg)\n\
  \n**图 6-6** 按行组分组的内存消耗\n\n根据索引、其元数据及其使用情况，某些行组可能比其它行组消耗显著更多的内存。在图 6-6 的示例结果中，内存使用量在每个行组上相对均匀，表明查询正在从每个行组均匀读取数据。\n\
  \n### Internal Columnstore Index Objects\n\n还有一个视图提供了有关列存储索引结构的内部详细信息，即 `sys.internal_partitions`。清单\
  \ 6-8 中的查询返回与列存储索引中行组关联的任何内部分区的详细信息。\n\n```sql\nSELECT\ntables.name AS table_name,\n\
  indexes.name AS index_name,\npartitions.partition_number,\ncolumn_store_row_groups.row_group_id,\n\
  column_store_row_groups.state_description,\ncolumn_store_row_groups.total_rows,\n\
  column_store_row_groups.size_in_bytes,\ncolumn_store_row_groups.deleted_rows,\n\
  internal_partitions.internal_object_type_desc,\ninternal_partitions.rows,\ninternal_partitions.data_compression_desc\n\
  FROM sys.column_store_row_groups\nINNER JOIN sys.indexes\nON indexes.index_id =\
  \ column_store_row_groups.index_id\nAND indexes.object_id = column_store_row_groups.object_id\n\
  INNER JOIN sys.tables\nON tables.object_id = indexes.object_id\nINNER JOIN sys.partitions\n\
  ON partitions.partition_number = column_store_row_groups.partition_number\nAND partitions.index_id\
  \ = indexes.index_id\nAND partitions.object_id = tables.object_id\nLEFT JOIN sys.internal_partitions\n\
  ON internal_partitions.object_id = tables.object_id\nWHERE tables.name = 'Sale_CCI'\n\
  ORDER BY indexes.index_id, column_store_row_groups.row_group_id;\n```\n**清单 6-8**\
  \ 与列存储索引关联的内部分区\n\n此查询的结果至少为每个分区中的每个行组提供一行，具体取决于内容。图 6-7 包含此输出的样本。\n\n![图 6-7](img/521866_1_En_6_Fig7_HTML.jpg)\n\
  \n**图 6-7** 内部列存储索引对象示例\n\n显示的内部列存储对象说明了已删除行和增量存储内容的存在。`deleted_rows` 列包含每个行组的单独计数，而\
  \ `rows` 列包含汇总的详细信息。\n\n以下是结果集中每个新列的简短说明，以及如何使用它来跟踪列存储索引的增长和使用情况。\n\n#### Internal_object_type_desc\n\
  \n此字段指示所引用的内部对象类型，可能为以下值之一：\n\n*   `COLUMN_STORE_DELETE_BITMAP`：这是列存储索引中每个行组关联的删除位图部分。`rows`\
  \ 列中的值指示了此部分删除位图中记录了多少已删除行（如果有）。删除位图存储在行存储 B 树结构中。每个行组都会有一个关联的删除位图，即使指示为已删除的行数为零。\n\
  \n*   `COLUMN_STORE_DELTA_STORE`：这代表尚未在列存储索引中压缩成分段存储的增量行组。除非该行组存在增量行组，否则此视图中的这些条目不会存在。增量存储中的增量行组存储在行存储\
  \ B 树结构中。\n\n*   `COLUMN_STORE_DELETE_BUFFER`：此对象专属于非聚集列存储索引，它将聚集行存储索引中已删除的行缓冲到非聚集列存储索引的删除位图中。从缓冲区到删除位图的已删除行数据移动由元组移动器管理，也可以通过索引重组命令强制执行。此缓冲区有助于提高在更新和删除操作可能频繁的\
  \ OLTP 表上的删除速度，从而有助于提高写入非聚集列存储索引的速度。当从非聚集列存储索引读取数据时，删除缓冲区和删除位图会同时读取，以生成索引中已删除行的完整视图。除非表上存在非聚集列存储索引，否则此内部对象不会出现在\
  \ `sys.internal_partitions` 中。\n\n*   `COLUMN_STORE_MAPPING_INDEX`：当聚集列存储索引上同时存在非聚集行存储索引时使用此索引。此映射索引用于将非聚集索引键列链接回聚集列存储索引中每个行组内的正确行。仅当行在行组之间移动时（例如，当增量存储行组移动到压缩行组中，或者当元组移动器合并行组时）才会使用此映射索引。除非满足这些条件且对象中存在行，否则此内部对象不会显示在\
  \ `sys.internal_partitions` 中。\n\n"
- '# 7. 批处理执行


  SQL Server 中行的处理传统上是逐行管理的。对于事务性工作负载，这是一个合理的约定，因为读写操作的行数通常很小。


  常规操作涉及数千或数百万行的分析查询，不会从这种逐行读取的方式中受益。批处理执行是 SQL Server 的一种执行模式，允许在执行计划运算符之间成组读取和传递行，从而最终提高性能。


  当查询被执行且每个运算符被处理时，行在这些运算符之间传递的数量由执行模式决定。在行模式下，每一行依次从一个运算符传递到下一个运算符。在批处理模式下，行组在运算符之间传递。这种约定的结果是，在批处理模式下，控制权在运算符之间传递的次数更少，因为行可以在更少的批次中交接。


  ## 行模式执行


  估计基数较低的查询通常会使用行模式执行。在行模式执行中，行在通过执行计划中的每个运算符时被逐个读取。这听起来效率低下，但需要注意的是，以批处理方式处理行会产生相应的开销。因此，SQL
  Server 将在运行时做出决策，以确定查询在行模式或批处理模式下处理是否更高效。


  考虑清单 7-1 中的查询。


  ```sql

  SELECT

  Employee,

  [WWI Employee ID],

  [Preferred Name],

  [Is Salesperson]

  FROM Dimension.Employee

  WHERE [Employee Key] = 17;

  ```

  清单 7-1：返回单行的事务性查询


  此查询的结果是单行，因为它通过表的主键查找单个 ID 值。启用实际执行计划后，可以查看聚集索引查找的详细信息，如图 7-1 所示。


  ![](img/521866_1_En_7_Fig1_HTML.jpg)

  图 7-1：显示详细信息的执行计划


  请注意查询运算符详细信息中提供的执行模式。估计和实际执行模式都指示为行模式。鉴于基础表是行存储表，并且查询只返回一行，因此此操作预期使用行模式执行。


  虽然列存储索引针对操作大行数的分析查询进行了优化，并且通常会利用批处理处理，但如果优化器认为行模式是最有效的选项，则也可以选择行模式作为执行模式。


  清单 7-2 中的查询显示了一个针对列存储索引表执行的窄查询，该碰巧也有一个非聚集行存储主键。


  ```sql

  SELECT

  *

  FROM fact.Sale

  WHERE [Invoice Date Key] = ''1/1/2016''

  AND [Sale Key] = 198840;

  ```

  清单 7-2：对列存储索引使用行模式执行的查询


  此查询在使用了行模式的聚集列存储索引上返回单行，如图 7-2 所示。


  ![](img/521866_1_En_7_Fig2_HTML.jpg)

  图 7-2：针对列存储索引使用行模式执行的执行计划


  尽管执行计划运算符指示其使用列存储存储，但优化器选择了行模式作为执行模式。这不应被视为不寻常或次优。因为查询只返回一行，所以使用行模式针对该预期结果进行了优化，即使表存储在聚集列存储索引中。



  ## `批处理模式执行`


  具有高基数的查询可以从批处理模式执行中受益。在此执行模式下，对于执行计划中选择批处理模式的每个运算符，行会被划分为批次并在这些批次中进行处理。在列存储索引中，这将是预期的执行模式。对于大型分析查询而言，如果不使用批处理模式，将被视为异常情况。如果该异常被识别为性能不佳的查询，那么进一步调查为何未使用批处理模式将是值得的。


  考虑清单 7-3 中的查询。


  ```sql

  SELECT

  COUNT(*),

  MIN([Invoice Date Key]),

  MAX([Invoice Date Key])

  FROM fact.Sale

  WHERE [Invoice Date Key] >= ''1/1/2016'';

  ```

  *清单 7-3: 针对列存储索引使用批处理模式执行的查询*


  此查询仅返回一行，但需要处理许多行以计算这些指标。图 7-3 中的执行计划显示了此查询的详细信息。


  ![图 7-3: 在列存储索引上具有批处理模式执行的执行计划](img/521866_1_En_7_Fig3_HTML.jpg)


  批处理是预期的执行模式，也是 SQL Server 为此查询选择的模式。请注意，计划详情表明“实际本地聚合行数”为 29,458。这是 SQL Server 满足查询所需的行数，图
  7-4 中显示的结果证实了这一点。


  ![图 7-4: 一个简单的列存储聚合查询的结果](img/521866_1_En_7_Fig4_HTML.jpg)


  对于给定的计划运算符，查询优化器是否选择批处理模式，取决于该运算符处理的行数，而非查询返回的行数。


  执行模式对于一个查询来说，并非全有或全无的选择。查询优化器可以为某些运算符选择批处理模式，而为其他运算符选择行模式，并将根据其确定对每个运算符最高效的模式来做出决定。


  一种常见的分析查询模式是聚合大型列存储索引中的数据，并联接到维度表以在需要时提供查找值。清单 7-4 中的查询展示了一个经典场景，其中同时查询了维度表和事实表。


  ```sql

  SELECT

  City.City,

  City.[State Province],

  City.Country,

  COUNT(*)

  FROM Fact.Sale

  INNER JOIN Dimension.City

  ON City.[City Key] = Sale.[City Key]

  WHERE [Invoice Date Key] >= ''1/1/2016''

  AND [Invoice Date Key] < ''2/1/2016''

  GROUP BY City.City, City.[State Province], City.Country;

  ```

  *清单 7-4: 将大型分析表与小型查找表联接的查询*


  此查询的执行计划见图 7-5。


  ![图 7-5: 针对事实表和维度表查询的执行计划](img/521866_1_En_7_Fig5_HTML.jpg)


  执行计划中包含一个对 `fact.Sale` 的列存储索引扫描，以及一个对 `Dimension.City` 查找表的扫描。图 7-6 显示了每个表访问运算符的属性，左侧是列存储扫描，右侧是行存储扫描。


  ![图 7-6: 列存储和行存储索引扫描的运算符属性](img/521866_1_En_7_Fig6_HTML.jpg)


  列存储索引扫描以批处理模式运行，而行存储索引扫描则以行模式运行。此查询是在具有 SQL Server 2016 兼容级别 (130) 的数据库上执行的。为了测试批处理模式对行存储使用的影响，将兼容级别调整为
  150 (SQL Server 2019)，如清单 7-5 中的查询所示。


  ```sql

  ALTER DATABASE WideWorldImportersDW SET COMPATIBILITY_LEVEL = 150;

  ```

  *清单 7-5: 将数据库兼容级别更改为 SQL Server 2019 的查询*


  此更改后，再次执行清单 7-4 中的查询，执行计划如图 7-7 所示。


  ![图 7-7: 在兼容级别 150 下查询的执行计划](img/521866_1_En_7_Fig7_HTML.jpg)


  当兼容级别切换到 150 时，SQL Server 2019 中的多个新功能被启用。执行计划显示使用了自适应联接，其中与 `Dimension.City` 的联接可以选择聚集索引扫描或聚集索引查找。每个运算符的实际行数证实，由于返回的行数众多，SQL
  Server 选择了使用聚集索引扫描。图 7-8 显示了针对 `Dimension.City` 的行存储聚集索引扫描的运算符属性。


  ![图 7-8: 行存储聚集索引扫描的运算符属性](img/521866_1_En_7_Fig8_HTML.jpg)


  随着 SQL Server 2019 功能的可用，批处理模式被选为行存储聚集索引扫描的执行模式。对于扫描大量行的查询来说，这完全合理。


  从 SQL Server 2019 开始，SQL Server 可以对行存储表使用批处理模式，但这将限于行数较高且预计使用批处理模式能提高性能的场景。在 SQL
  Server 2019 之前，批处理模式仅适用于列存储索引。这是一个重大的改进，因为它可以显著提高针对行存储表的分析查询性能。


  这引出了一个直接的问题：如果行存储表上的批处理模式可以提高分析性能，那么列存储索引是否仍然有用？如果批处理模式是使列存储索引高性能的唯一特性，那么这个问题是成立的。行存储表上的批处理模式并不提供列存储索引的其他优势，例如列存储压缩、段消除或可操作的元数据。对于主要服务于分析工作负载的表，聚集列存储索引将是正确的解决方案。对于服务于混合
  OLAP 和 OLTP 工作负载的表，行存储上的批处理模式将提高性能，并可能消除创建非聚集列存储索引的需要，前提是 OLAP 查询是隔离的且不会一次扫描过多的行。最终，需要通过测试来确定给定应用程序的最佳索引解决方案，但行存储上的批处理模式是一个有用的工具，将有助于此决策过程。有关混合行存储和列存储索引的更多信息，请参见第
  12 章和第 13 章。




  ## `批处理模式如何工作？`


  批处理模式处理的目标是提高数据从存储位置到 SQL Server CPU 的吞吐量。为实现这一点，SQL Server 从根本上改变了数据在执行计划中从头至尾的流动方式。


  一个查询执行计划可以包含一个或多个操作符，这些操作符在结果返回之前会检索、联接或转换数据。在行模式处理中，行被逐一传递到这些操作符之间。使用行模式时，查询执行的基本工作单元是行。请参考图
  7-9 中展示的执行计划。


  ![](img/521866_1_En_7_Fig9_HTML.jpg)


  图 7-9


  包含行数的行模式执行计划示例


  在该执行计划中，一个聚集索引扫描正在检索 276 行，这些行被传入一个聚合操作，产生单行结果并由查询返回。在行模式中，276 行中的每一行都单独地从聚集索引扫描操作符传输到流聚合操作符。


  当启用时，批处理模式会同时处理多行，将生成的数据结构作为一组向量存储在内存中。这导致数据在执行计划的操作符之间传递的方式发生了彻底改变。每个批处理最多可消耗 64
  KB，并包含 64 到 900 行。行批处理可以如图 7-10 所示。


  ![](img/521866_1_En_7_Fig10_HTML.jpg)


  图 7-10


  行批处理的基本结构


  行批处理在结构上有点类似于列存储索引，并在查询执行时提供类似的内存优势。合格行向量的功能类似于列存储索引的删除位图，因为它标记了批处理不再逻辑上需要的行。例如，如果对数据集应用了筛选器，可以通过仅更新要筛选掉的行的合格行向量来单独处理。


  批处理模式处理通过减少数据在执行计划操作符之间传递的次数来降低 CPU 消耗。例如，通过行模式处理 5000 行将需要至少 5000 次 CPU 操作来在计划操作符之间移动它。相同的数据集通过批处理模式处理可能会将每
  500 行分配给十个批处理。在这种情况下，数据可以通过 5000/500 = 10 次操作在执行计划操作符之间传递。这些是近似值，但足以说明批处理模式和行模式处理如何影响
  CPU 消耗。


  批处理模式处理的另一个好处是它能够轻松利用并行处理。批处理可以并行处理，允许具有可用 CPU 容量的多核 CPU 架构更高效地处理查询计划操作符。并行处理是一个需要一些
  CPU 开销才能利用的过程。因此，参与并行处理的行数需要足够大，以使将工作负载分解为更小块的好处大于这样做的成本。在这方面，行模式无法像批处理模式那样容易地从并行处理中受益，因为将单行操作拆分为单独的并行操作然后再将它们合并回来的开销远大于该过程提供的微不足道的节省。


  虽然批处理模式可能并不总是为行存储表选择，但它将成为列存储索引的默认选择。由于一个行组最多可包含 2²⁰ 行，需要由列存储索引扫描处理的数据量将足够大，以确保
  SQL Server 选择批处理模式作为该数据查询提供最佳性能的可能候选方案。


  ## `批处理模式与行模式性能对比`


  虽然列存储索引最常默认使用批处理模式处理，但行存储表可以选择使用哪种模式。该决策将基于查询的基数、需要读取的数据量以及所涉及的 SQL Server 版本。


  直接比较查询在使用行模式与使用批处理模式时的性能，并测量批处理模式提供的性能增益是有价值的。


  以下查询对列存储索引执行了两次简单的分析操作：一次使用兼容级别 120 (SQL Server 2014)，另一次使用兼容级别 130 (SQL Server
  2016)。清单 7-6 提供了执行此比较的代码。


  ```

  ALTER DATABASE WideWorldImportersDW SET COMPATIBILITY_LEVEL = 120;

  GO

  SELECT

  Sale.[City Key],

  COUNT(*)

  FROM fact.Sale

  GROUP BY Sale.[City Key]

  ALTER DATABASE WideWorldImportersDW SET COMPATIBILITY_LEVEL = 130;

  GO

  SELECT

  Sale.[City Key],

  COUNT(*)

  FROM fact.Sale

  GROUP BY Sale.[City Key]

  清单 7-6

  在两个兼容级别下执行的分析查询

  ```


  这些示例查询产生的执行计划立即提供了一个线索，表明此处发生了显著的性能差异，如图 7-11 所见。


  ![](img/521866_1_En_7_Fig11_HTML.jpg)


  图 7-11


  显示显著性能差异的执行计划


  这两个执行计划看起来几乎相同，除了第一个查询的开销为 90%，而第二个查询的开销为 10%。此外，还发生了聚合下推，允许我们查询中的 `GROUP BY` 与列存储索引扫描联机处理。这避免了需要将所有
  228265 行逐一推送到哈希匹配操作上。图 7-12 比较了每个列存储索引扫描的详细信息。


  ![](img/521866_1_En_7_Fig12_HTML.jpg)


  图 7-12


  行模式与批处理模式操作的执行计划详细信息


  左侧昂贵的执行计划与右侧高效的执行计划之间有几个显著差异：


  *   成功使用批处理模式在第二个计划中处理了 228265 行。

  *   使用批处理模式的 CPU 消耗比使用行模式少近十倍。

  *   `实际本地聚合行数` 记录了聚合下推。


  利用批处理模式还允许 SQL Server 利用聚合下推。这些功能的结合使得 CPU 消耗得以大幅降低。


  这引出了批处理模式处理的一个重要方面，它进一步提高了其在分析工作负载上的有效性：批处理模式使得在查询优化时能够使用其他强大的性能改进功能。其中一些功能（以及它们启用的最早
  SQL Server 版本）包括：


  *   自适应联接 (SQL Server 2017)

  *   内存授予反馈 (SQL Server 2017)

  *   聚合下推 (SQL Server 2016)


  一般来说，当 SQL Server 选择使用批处理模式时，其使用将提高性能。类似地，当使用其他智能查询处理功能（如自适应联接或聚合下推）时，它们也会对性能产生积极影响。


  测试批处理模式与行模式处理可能具有挑战性，因为强制查询使用其中一种模式并不总是直接的。使此测试更容易的一种方法是使用数据库作用域配置更改来临时禁用这些功能。清单
  7-7 中的 T-SQL 提供了在行存储上禁用批处理模式，以及禁用批处理模式内存授予反馈和批处理模式自适应联接所需的语法。




  ```

  ALTER DATABASE SCOPED CONFIGURATION SET BATCH_MODE_ON_ROWSTORE = OFF;

  ALTER DATABASE SCOPED CONFIGURATION SET BATCH_MODE_MEMORY_GRANT_FEEDBACK = OFF;

  ALTER DATABASE SCOPED CONFIGURATION SET BATCH_MODE_ADAPTIVE_JOINS = OFF;

  ```

  `代码清单 7-7`

  `用于禁用优化功能的查询（仅用于测试目的）`


  请注意，这些功能应仅在测试环境中禁用，在生产环境中不应关闭，除非有特殊且文档充分的理由。


  兼容性级别也可以为了测试和演示目的进行调整。这有助于模拟升级的影响，或让 SQL Server 升级在功能上以较慢的节奏逐步进行。通过将兼容性级别从原始 SQL
  Server 版本每次逐步上调一级到新版本，可以分步隔离和降低风险。如果需要，这个过程还提供了回滚机制，因为在紧急情况下可以降低兼容性模式。


