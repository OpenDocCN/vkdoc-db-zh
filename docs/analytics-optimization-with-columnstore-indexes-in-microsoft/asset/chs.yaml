  分区切换是一个多功能工具，可用于各种数据修改、归档和删除场景。其具体用法因应用程序而异，但它提供了一种快速在表之间移入和移出数据的方法，避免了大型写入操作带来的碎片和开销。


  ## 分区指南


  虽然分区听起来对任何列存储索引都有好处，但不应未经研究和预见就自动实施。分区在大表中效果很好，但对小列存储索引没有提供多少价值。因此，容量规划应该是决策过程中的一个步骤，以确定分区是否适合任何给定的表。


  ### 分区和行组大小调整


  由于分区是在创建行组之前应用于表的，因此分区边界将强制截断行组。例如，如果一个非分区的列存储索引包含 5,000,000 行，这些行很可能驻留在 5 个行组中。如果创建该表的新版本，并按一个均匀跨越
  10 年的日期列进行分区，那么结果将是每个分区包含 500,000 行。


  但是，行组不能跨分区。新的分区表将包含十个分区，每个分区由一个单独的行组组成。结果是一个拥有十个行组而非五个的表。


  一般来说，除非表包含至少数千万或数亿行数据，否则分区不适用于列存储索引。同样重要的是，分区需要足够大，以利于使用填满的行组。因此，分区函数和分区方案需要确保每个分区至少包含`2²⁰`（`1,048,576`）行。过小的分区将导致行组过小，随着时间的推移会产生碎片。


  列存储索引越大，从分区中受益就越多。将分区边界与组织需求对齐也有助于确定如何在列存储索引上实施分区。如果一个组织每季度归档十亿行数据，那么按季度分区就非常合理。相反，如果归档是按年组织的，那么按年分区将更合适。


  ### 分区列选择


  为分区函数选择的列应与列存储索引的排序列相同。当分区和行组消除操作在相同的数据集上运行时，它们的效果最好，而这只有在它们使用相同的排序条件时才能实现。因此，如果列存储索引是按某个特定日期列排序的，那么分区也应该在该列上进行配置。按另一列分区可能会导致性能下降，因为
  SQL Server 需要扫描更多分区中更多的行组来检索所需的数据。


  ### 存储选择


  如果列存储索引内的数据访问模式不同，用于分区表的数据文件可以反映这种使用情况。如果旧数据很少被访问且可以容忍更高的延迟，那么可以将其移动到速度更慢/成本更低的硬件上。如果新数据需要高可用性且延迟极低，则可以将其放置在更快、更昂贵的存储上。


  因此，可以拆分大表以节省成本。落在更便宜存储上的每一 TB 数据都代表着可以轻松量化的成本节约。虽然分区的主要目的不是省钱，但通过战略性的数据文件布局来转移工作负载，可以在不付出巨大努力的情况下实现这一目标。


  在构建分区表时，识别表中是否有遵循不同使用模式的数据，并尽可能根据使用情况将数据文件分配到较慢或较快的存储。如果性能需求随时间变化，可以在存储位置之间移动数据文件，以确保即使曾经很少需要的数据变得对频繁的分析过程至关重要，也能持续满足`SLA`。




  ## 额外优势


  表分区的最大优势之一在于，它无需修改应用程序代码。所有分区结构都是 SQL Server 内部管理的，除了能体验到性能提升外，对应用程序没有其他影响。这也意味着，可以先对分析数据测试分区功能，并根据测试结果决定保留或回滚。回滚操作包括创建数据的第二个副本并将其交换回生产位置，但对于分析数据而言，这是一个合理的过程，因为数据加载过程完全处于数据架构的管控范围内。这使得分区能够在对开发人员编写的、使用这些数据的代码产生最小影响的情况下进行测试。


  分区是实现列存储索引时的一个可选步骤，但它可以改善维护、加速分析工作负载并可能节省成本。此功能适用于至少有数千万行且预计会随时间快速增长的大型表。


  '
- '# 12. 表上的非聚集列存储索引


  聚集列存储索引为分析数据提供了主要的存储机制。对于旨在用作 OLAP 数据源的表，这是最佳选择，并将提供一种有助于对分析数据进行快速高效读写的数据结构。


  对于主要是事务性但也需对其执行分析查询的表，聚集列存储索引并不合适。有几种选项可用于管理这些额外的分析工作负载，包括：


  *   创建覆盖行存储索引。

  *   分离 OLTP 和 OLAP。

  *   创建非聚集列存储索引。

  *   接受不修改数据库架构的 OLAP 查询。


  虽然纯粹的 OLTP 或 OLAP 工作负载可以用纯粹的事务性或分析性数据结构来管理，但混合工作负载更为复杂，需要更仔细地检查读写操作以了解如何最好地管理它。本章将讨论每种替代方案及其最适用的情况，并提供关于如何为给定工作负载选择最佳存储方法的指导。


  ## 使用行存储索引


  这是大多数事务性应用程序的典型初始默认设置。数据开始时较小，随时间增长。当行数较少时，对事务性数据运行分析查询的性能足够好，无需进行重大修改即可满足这些需求。


  在数据大小和争用变得足够显著，导致出现以下问题之前，依赖行存储表和单列非聚集行存储索引就足够了：


  *   锁定

  *   阻塞

  *   过度的资源消耗

  *   长时间运行的查询


  一旦达到该阈值，就需要其他解决方案。一般来说，针对行存储索引运行分析进程会导致索引扫描、大量读取和高内存使用情况，并且随着数据增长到数百万或数十亿行，这些成本无法很好地扩展。图
  12-1 展示了在行存储表上运行混合工作负载所面临挑战的简化图示。


  ![](img/521866_1_En_12_Fig1_HTML.jpg)


  图 12-1


  针对行存储表的 OLAP 和 OLTP 查询的挑战


  虽然混合分析和事务性需求对于较小、不太繁忙的表是可行的，但当使用量或大小变得显著时，挑战必然会出现。通常，如果预计表会变得很大，建议避免依赖行存储表进行分析。


  覆盖索引允许行存储索引完全覆盖一个分析查询。这可以提供比聚集索引扫描和键查找更好的性能，并且当分析查询范围有限且数量不多时，这是一个很好的解决方案。


  例如，考虑清单 12-1 中的查询。


  ```sql

  SELECT

  COUNT(*) AS sale_count,

  COUNT(DISTINCT SalespersonPersonID) AS sales_people_count,

  SUM(CAST(IsUndersupplyBackordered AS INT)) AS undersupply_backorder_count

  FROM Sales.Orders

  WHERE CustomerID = 90

  AND OrderDate >= ''1/1/2015''

  AND OrderDate < ''1/1/2016'';

  ```

  清单 12-1

  针对事务性表的分析查询示例


  此查询是对事务性数据进行分析的常见示例。图 12-2 显示了此查询的执行计划。


  ![](img/521866_1_En_12_Fig2_HTML.jpg)


  图 12-2

  针对事务性表的分析查询的执行计划


  执行计划显示了一个在索引上针对 `CustomerID` 进行筛选的索引查找。键查找从聚集索引中检索满足查询所需的其他列。在 STATISTICS IO 中找到的该查询的
  IO 如图 12-3 所示。


  ![](img/521866_1_En_12_Fig3_HTML.jpg)


  图 12-3

  针对事务性表的分析查询的 STATISTICS IO


  请注意，键查找产生了大量的逻辑 IO，因为 SQL Server 不得不返回到聚集索引以检索 `OrderDate`、`SalespersonPersonID`
  和 `IsUndersupplyBackordered` 列。如果此查询经常执行且形式变化不大，则覆盖索引可以是一种充分的管理方式。清单 12-2 创建了一个覆盖此示例查询的索引。


  ```sql

  CREATE NONCLUSTERED INDEX NCI_Orders_covering

  ON Sales.Orders (OrderDate, CustomerID)

  INCLUDE (SalespersonPersonID, IsUndersupplyBackordered);

  ```

  清单 12-2

  完全覆盖分析查询的非聚集行存储索引


  创建这个新的覆盖索引后，测试查询的执行计划已简化为图 12-4 所示。


  ![](img/521866_1_En_12_Fig4_HTML.jpg)


  图 12-4

  使用行存储覆盖索引的分析查询的执行计划


  执行计划显示的是索引查找，而不是之前的查找加键查找。STATISTICS IO 的更新输出如图 12-5 所示。


  ![](img/521866_1_En_12_Fig5_HTML.jpg)


  图 12-5

  使用行存储覆盖索引的分析查询的 STATISTICS IO


  新的 STATISTICS IO 输出显示 IO 减少了七倍，从 470 次读取降到 67 次。覆盖索引为分析查询提供了显著的性能提升，并且作为额外的好处，由于新索引是一个可以与聚集索引分开读取的独立对象，还可以减少争用。


  覆盖索引对于特定、一致且数量较少的分析查询是很好的工具。试图通过创建过多的覆盖索引来跟上新的分析查询存在危险。过度索引是一个实际问题，会损害写入性能、浪费存储空间并消耗大量内存。同样，包含太多列的覆盖索引注定会浪费空间。实际上，包含太多列的覆盖索引很快就会退化为表的副本，维护成本高昂。


  覆盖索引有用的理想场景可以概括如下：


  *   非常有限数量的特定、有针对性的分析查询。

  *   分析查询不经常变化（如果有的话）。

  *   分析查询发生的频率足以值得采取一些索引操作。

  *   列列表有限。

  *   环境有利于在将来不再需要时删除索引。




  '
- '# 数据库性能优化：分离 OLAP 与 OLTP


  ## 分离 OLAP 与 OLTP 进程


  解决在事务型表上运行分析查询这一挑战的一个方案是，将 OLAP 数据和进程与 OLTP 数据和进程分离开来。有多种方法可以应对这一挑战，包括：


  *   `AlwaysOn 可用性组`

  *   `复制`

  *   由`ETL`供数的独立分析表

  *   第三方分析工具

  *   第三方硬件解决方案


  图 12-6 简单展示了针对 OLAP 数据副本的工作负载。


  ![](img/521866_1_En_12_Fig6_HTML.jpg)

  图 12-6：针对数据副本的 OLAP 工作负载


  虽然分离事务数据和分析数据是目前为止管理混合工作负载挑战最有效的方式，但它也是破坏性最大的一种。


  `AlwaysOn` 和 `复制` 是成熟的工具，它们提供了不同的方式来生成数据的次级副本，以供分析进程使用。它们需要学习和实施 `SQL Server` 的新组件，以及承诺投入额外的硬件来支持
  OLTP 数据副本的新目标。在主要事务数据库发生故障时，它们还能提供高可用性。


  如果数据库已经使用了 `AlwaysOn 可用性组`，那么可以利用非聚集列存储索引将分析查询下推到一个可读的辅助副本上。类似地，如果使用了 `复制`，并且其主要目的是服务分析查询，则可以在
  `复制` 目标上配置聚集或非聚集列存储索引。


  除了这些内置工具外，架构师还可以创建自己的数据副本，并通过 `SQL Server 集成服务` 或其他数据移动过程来管理它们。虽然手动构建数据复制过程稍微更耗费人力，但它允许使用现有工具并进行任何程度的定制。这通常是组织开始构建其数据仓库环境的方式。


  许多第三方工具可以执行类似的任务，并允许对数据进行额外的处理/管理。投资于外部组织工具的好处在于，构建和维护它所需的时间、资源和专业知识完全落在他们的肩上，从而腾出资源用于其他项目。缺点是成本以及对一个新工具的投资，如果将来需要退出，可能会比较困难。


  虽然此类解决方案会带来延迟，但延迟可以通过各自内部的配置设置进行控制，使其保持在组织需求的范围之内。


  ## 非聚集列存储索引


  为分析查询提供针对事务型数据的其他解决方案，为如何以及何时能有效使用非聚集列存储索引来管理分析查询奠定了基础。


  非聚集列存储索引的架构与聚集列存储索引类似，并表现出相似的行为。行组、段和压缩可以按照与聚集列存储索引相同的方式进行分析，并且应同样遵循最佳实践。这意味着它们对于聚合数百万行的分析类查询表现异常出色。然而，与聚集列存储索引一样，`DELETE`
  和 `UPDATE` 操作会随着时间的推移导致碎片化和空间浪费，并且 `UPDATE` 操作在大型非聚集列存储索引上可能表现不佳。


  聚集和非聚集列存储索引之间的一个巨大区别是，非聚集版本允许指定列列表。虽然数据顺序由行存储聚集索引强制执行，但能够选择包含哪些列，可以将分析所需的列与主要用于事务操作的列隔离开来。


  请注意，行存储聚集索引键列默认自动包含在非聚集列存储索引中，并且无法移除。它们是支持对现有行组进行 `UPDATE` 和 `DELETE` 操作所必需的。


  非聚集列存储索引的主要优点如下：


  *   支持实时运营分析。

  *   可以指定列列表。

  *   无需更改应用程序代码。

  *   列存储索引与行存储索引存储在不同的页面上，从而减少了争用。

  *   索引可以被筛选、分配压缩延迟或下推到 `AlwaysOn` 副本。


  与聚集列存储索引类似，非聚集列存储索引需要一些前瞻性才能有效实施。因为聚集索引本质上是事务性的，并且该表很可能是频繁的小型写入操作的目标，所以需要对非聚集列存储索引的架构进行考量，以确保写入操作的影响得到有效管理。


  图 12-7 展示了一个同时具有行存储聚集索引和非聚集列存储索引的表上工作负载的简化示意图。


  ![](img/521866_1_En_12_Fig7_HTML.jpg)

  图 12-7：针对行存储和列存储索引的混合工作负载


  在单个表中同时拥有行存储和列存储索引的关键在于，两者可以同时使用，允许事务和分析操作并行执行，而不是完全竞争资源。


  要测试非聚集列存储索引对事务表的影响，请考虑清单 12-3 中的脚本。


  ```sql

  CREATE NONCLUSTERED COLUMNSTORE INDEX NCCI_Orders ON Sales.Orders (OrderDate, CustomerID,
  IsUndersupplyBackordered, SalespersonPersonID);

  清单 12-3：在行存储表上创建非聚集列存储索引

  ```


  在该索引创建语句中，只包含了分析查询涉及的列。如果需要用于其他常见查询，可以添加更多列，但目标是确保分析操作由列存储索引服务，而无需引用聚集行存储索引。


  添加索引后，可以再次执行清单 12-1 中的测试查询。执行计划如图 12-8 所示。


  ![](img/521866_1_En_12_Fig8_HTML.jpg)

  图 12-8：使用非聚集列存储索引的分析查询的执行计划


  执行计划显示，列存储索引被专门用于返回查询结果。图 12-9 显示了该查询的 `STATISTICS IO` 输出。


  ![](img/521866_1_En_12_Fig9_HTML.jpg)

  图 12-9：使用非聚集列存储索引的分析查询的 STATISTICS IO


  读取次数与使用覆盖索引时大致相同，但有一个额外好处：避免了对聚集索引的键查找，确保了与其他同时使用它的查询没有争用。


  ## 管理热、温、冷事务数据


  虽然非聚集列存储索引可以为实时运营分析提供卓越的性能，但它们有一个明显的弱点：写操作。事务表往往会产生小型、增量的变化——插入、更新和删除，每次影响几行，并且发生频繁。而列存储索引是为大批量插入、偶尔删除和最小化更新而设计的。


  尽管存在这些直接的挑战，但在实施非聚集列存储索引时，有可用的工具来管理这些挑战，以帮助保持最佳性能。



  '
- '# 压缩延迟


  事务性数据通常在短时间内被频繁写入和读取，随后其数据访问频率会随着时间的推移而越来越低。新数据可被视为热数据，而稍旧的数据可被视为暖数据，更旧的数据则可被视为冷数据。尽管表本质上是事务性的，但绝大多数数据访问只涉及热数据。


  例如，考虑一个在线订单跟踪系统。以下是订单创建、处理和完成所涉及的部分步骤摘要，以及关于数据访问的说明：


  1.  订单被提交以购买一些很酷的潮品。数据被写入数据库。

  2.  订单被处理。数据库中的数据被更新。

  3.  商品被拣出并打包。数据库中的数据被更新。

  4.  商品发货。数据库中的数据被更新。

  5.  商品被追踪直至送达。每次物流更新时，数据库中的数据都被更新。

  6.  商品送达。数据库中的数据被更新。

  7.  用户对订单流程和商品留下反馈。

  8.  用户未来通过订单历史列表以只读方式访问此数据。

  9.  最终，用户很少/不再访问此数据。


  此数据流清晰地表明了从热数据（步骤#1–6）到暖数据（步骤#7–8）再到变为冷数据（步骤#9）的演进过程。分析查询将最频繁地处理大段的历史数据，这在列表步骤#6
  之后变得更为明显。追踪特定订单无疑是事务性需求，主要适用于步骤#1–5，因为这些步骤与想要知道订单位置和预计到达时间的人最相关。


  列存储索引在越接近列表底部时性能最佳，而在列表顶部的频繁更新对于压缩行组来说将是负担。每次`DELETE`操作都会在行组中将一行标记为已删除并浪费空间。每次`UPDATE`操作将删除一行，并在增量存储中新插入一行。


  为了应对这一挑战，可以在列存储索引上使用压缩延迟。此功能将数据从增量存储移动到压缩段的时间延迟一个预设的时间段。该时间段基于数据预计保持为“热”状态的时长。在压缩被延迟的这段时间内，无需担心`DELETE`或`UPDATE`操作对压缩行组的影响。相反，对未压缩的增量存储数据的读取速度将比数据最终被压缩后要慢。然而，对于一个大表来说，热数据的百分比将很小，而暖数据或冷数据将构成表的大部分。同样重要的是，聚集行存储索引将服务于事务性查询，使得这些进程可以避开增量存储中的数据。


  考虑清单 12-3 中`Sales.Orders`表上的列存储索引示例。如果通常有一个 10 分钟的时间段，数据在此期间被频繁更新，之后数据开始冷却并减少修改，那么可以将压缩延迟添加到索引创建语句中，如清单
  12-4 所示。


  ```

  CREATE NONCLUSTERED COLUMNSTORE INDEX NCCI_Orders

  ON Sales.Orders (OrderDate, CustomerID, IsUndersupplyBackordered, SalespersonPersonID)

  WITH (COMPRESSION_DELAY = 10 MINUTES);

  ```


  该索引最初的表现将与之前完全相同。区别在于数据写入增量存储时。任何插入增量存储的行在写入压缩行组之前将至少保留 10 分钟。如果没有压缩延迟，元组移动程序会定期将行从增量存储移动到压缩行组。有了此功能，它现在将至少等待
  10 分钟再执行此操作。


  '
- "# 压缩延迟的配置与调整\n\n压缩延迟可以在现有索引上根据需要进行调整，而无需重建索引。例如，如果确定数据“热”期为 30 分钟而非 10 分钟，则可以使用\
  \ `ALTER INDEX` 语句相应地调整压缩延迟，如清单 12-5 所示。\n\n```sql\nALTER INDEX NCCI_Orders ON Sales.Orders\n\
  SET (COMPRESSION_DELAY = 30 MINUTES);\n```\n**清单 12-5** 使用 `ALTER INDEX` 语句调整压缩延迟\n\
  \n配置压缩延迟是一种平衡：既要避免对压缩行组进行过多的写入操作，又要确保增量存储不会变得过大而对分析性能产生不利影响。理想情况下，行存储索引将服务于对“热”数据进行操作的事务查询，而列存储索引则处理针对大量数据（大部分是“温”或“冷”数据）的分析查询。\n\
  \n确定理想的压缩延迟值需要进行测试，但以下是一套指导原则，可帮助找到一个好的起点：\n\n1.  测量随时间插入的新行数。理想情况下，增量存储包含的数据不应超过几个行组的容量（几百万行或更少），且这些数据不被分析查询频繁使用。\n\
  2.  测量更新和删除操作，以及它们最常发生的时间段。尝试将压缩延迟设置为包含该时间段。\n3.  如果分析查询不针对新数据，则可以接受较高的压缩延迟。否则，可能需要降低压缩延迟，以避免频繁扫描增量存储。\n\
  4.  如果数据加载过程在插入操作中大量修改数据，请确保压缩延迟期足够长以涵盖典型的数据加载过程。或者，修改数据加载过程，使用暂存表/临时表在数据最终插入前进行修改。\n\
  \n压缩延迟可以设置为一个大数或小数。如果一个事务表每小时插入 1000 行新数据，并且这些行在 6 小时内被大量修改，那么 360 分钟的压缩延迟是完全可接受的。在这种情况下，增量存储平均包含\
  \ 6000 行，这个数量足够小，扫描它不会造成性能问题。\n\n反之，如果一个表每小时插入 2,000,000 行，那么压缩延迟就需要设置得更严格。如果该表中的数据“热”期为\
  \ 2 小时，那么理想的压缩延迟值应在 30-120 分钟的范围内。需要进行测试以平衡写入进程与分析读取进程的需求。图 12-10 展示了压缩延迟如何影响非聚集列存储索引上的事务查询和分析查询的数据流。\n\
  \n![](img/521866_1_En_12_Fig10_HTML.jpg)\n**图 12-10** 具有压缩延迟的非聚集列存储索引上 OLAP 和 OLTP\
  \ 查询的数据流\n\n此数据流的目标是让事务查询针对行存储索引和增量存储，而分析查询则针对列存储索引。压缩延迟有助于确保 OLTP 写入操作不会影响非聚集列存储索引中压缩行组的性能。预计\
  \ OLTP 读取操作会针对行存储索引，并且很少使用列存储索引。\n\n使用相同的语法，压缩延迟也可以应用于聚集列存储索引。当数据加载过程满足以下任一条件时，这可能是一个极佳的解决方案：\n\
  \n*   整体持续时间较长。\n*   数据是“涓滴式”加载，而非批量加载。\n*   更新操作在数据初次插入后进行。\n*   主要是分析型的表在数据加载过程中需要处理\
  \ OLTP 查询。\n\n清单 12-6 中的查询更改了 `WideWorldImportersDW` 中的聚集列存储索引，将其压缩延迟设为 60 分钟。\n\
  \n```sql\nALTER INDEX CCI_fact_sale_CCI ON Fact.Sale_CCI\nSET (COMPRESSION_DELAY\
  \ = 60 MINUTES);\n```\n**清单 12-6** 使用 `ALTER INDEX` 语句调整聚集列存储索引的压缩延迟\n\n聚集列存储索引上\
  \ 60 分钟的压缩延迟将提供一个 60 分钟的窗口期，在此期间数据加载过程可以自由地以任何方式插入数据，然后根据需要进行更新或删除。由于数据驻留在增量存储中，额外的更新和删除操作不会影响压缩行组，因此消除了数据加载过程引入的碎片。此外，还可以避免因\
  \ `UPDATE` 查询而导致的性能下降。60 分钟窗口期结束后，数据将开始被插入到列存储索引中。假设数据加载过程已完成对该数据的修改，那么数据将被插入一次，然后以其原始的压缩状态保持不变。\n\
  \n可以通过查询 `sys.indexes` 来检索数据库中列存储索引的压缩延迟设置，如清单 12-7 所示。\n\n```sql\nSELECT\n    tables.name\
  \ AS table_name,\n    indexes.name AS index_name,\n    indexes.type_desc AS index_type,\n\
  \    indexes.compression_delay\nFROM sys.indexes\nINNER JOIN sys.tables\n    ON\
  \ tables.object_id = indexes.object_id\nWHERE indexes.type_desc IN ('NONCLUSTERED\
  \ COLUMNSTORE', 'CLUSTERED COLUMNSTORE');\n```\n**清单 12-7** 返回索引压缩延迟信息的查询\n\n`compression_delay`\
  \ 列提供一个数字（以分钟为单位），表示该索引当前的压缩延迟设置。零表示该索引未使用压缩延迟。请注意，该查询仅筛选列存储索引。其他索引类型在 `compression_delay`\
  \ 列中将为 `NULL`，因为除了列存储索引外，此选项不适用于任何其他索引类型。\n\n图 12-11 显示了此查询的结果以及数据库中每个列存储索引的压缩延迟。\n\
  \n![](img/521866_1_En_12_Fig11_HTML.jpg)\n**图 12-11** 数据库中每个列存储索引的压缩延迟\n\n第 4 行（已圈出）显示了被清单\
  \ 12-6 中的查询修改的索引，并确认了压缩延迟设置为 60 分钟。\n\n由于删除行导致的碎片可以通过被删除行的百分比来量化，使用清单 12-8 所示的查询。\n\
  \n```sql\nSELECT\n    objects.name,\n    partitions.partition_number,\n    dm_db_column_store_row_group_physical_stats.row_group_id,\n\
  \    dm_db_column_store_row_group_physical_stats.total_rows,\n    dm_db_column_store_row_group_physical_stats.deleted_rows,\n\
  \    CAST(100 * CAST(deleted_rows AS DECIMAL(18,2)) / CAST(total_rows AS DECIMAL(18,2))\
  \ AS DECIMAL(18,2)) AS percent_deleted\nFROM sys.dm_db_column_store_row_group_physical_stats\n\
  INNER JOIN sys.objects\n    ON objects.object_id = dm_db_column_store_row_group_physical_stats.object_id\n\
  INNER JOIN sys.partitions\n    ON partitions.object_id = objects.object_id\n   \
  \ AND partitions.partition_number = dm_db_column_store_row_group_physical_stats.partition_number\n\
  \    AND partitions.index_id = dm_db_column_store_row_group_physical_stats.index_id\n\
  WHERE objects.name = 'Sale_CCI'\nORDER BY dm_db_column_store_row_group_physical_stats.row_group_id;\n\
  ```\n**清单 12-8** 返回因删除操作导致的索引碎片的查询\n\n此查询专门针对单个表（`Sale_CCI`）并返回每个行组的总行数、已删除行数和删除百分比，如图\
  \ 12-12 所见。\n\n![](img/521866_1_En_12_Fig12_HTML.jpg)\n**图 12-12** 列存储索引中因删除行导致的碎片\n\
  \n\n### 过滤非聚集列存储索引：概念与优势\n\n在此示例中，索引的碎片率约为 5%。一般来说，当被删除的行占列存储索引的比例超过 10% 时，可以认为碎片已足够多，需要采取进一步操作以消除和/或防止进一步的碎片化。\n\
  \n在创建非聚集列存储索引时，`压缩延迟` 是一个非常有用的设置，它可以抵消在数据仍然“热”的时期内对表进行的大量事务性写入操作。除了提高写入性能外，`压缩延迟`\
  \ 还将减少碎片、提高压缩效率并降低索引的内存消耗。\n\n与非聚集行存储索引类似，非聚集列存储索引在创建时也可以对其应用过滤器。这使得列存储索引能够具有针对性，专注于冷数据和温数据，同时避免索引热数据。这些过滤器通常针对那些枚举状态、工作流以及数据生命周期中位置的列。\n\
  \n考虑一个订单处理系统的例子。在这个系统中，订单在流程的某个特定点之前会频繁地被修改。可能是在订单被拣货、发货或接收时，但在其生命周期的某个时刻，数据会从热数据转变为温数据，之后再转变为冷数据。\n\
  \n过滤器索引可用于将非聚集列存储索引的目标设定为仅包含不再“热”的数据。例如，考虑以下代码块中的索引创建语句。\n\n```sql\nCREATE NONCLUSTERED\
  \ COLUMNSTORE INDEX NCCI_Orders\nON Sales.Orders (OrderDate, CustomerID, IsUndersupplyBackordered,\
  \ SalespersonPersonID)\nWHERE PickedByPersonID IS NOT NULL;\n```\n\n代码清单 12-9：创建过滤非聚集列存储索引\n\
  \n此索引将仅包含 `PickedByPersonID` 列有值的行。因此，在订单被装箱并准备发货之前，行不会被插入到列存储索引中。因此，在此时间点之前发生的任何数据操作都不会影响列存储索引的性能。\n\
  \n以下查询计算满足过滤条件的行数与不满足的行数。\n\n```sql\nSELECT\nSUM(CASE WHEN PickedByPersonID IS NULL\
  \ THEN 1 ELSE 0 END) AS orders_not_picked,\nSUM(CASE WHEN PickedByPersonID IS NOT\
  \ NULL THEN 1 ELSE 0 END) AS orders_picked\nFROM Sales.Orders\n```\n\n代码清单 12-10：计算满足过滤索引条件的行数\n\
  \n图 12-13 中的结果显示，表中大约 14% 的行未被拣货，因此仍被归类为热数据。\n\n![](img/521866_1_En_12_Fig13_HTML.jpg)\n\
  \n**图 12-13：满足过滤索引条件的行数统计**\n\n通常，热数据只占表中数据的一小部分。如果可以使用一个简单的过滤器来确定数据是否“热”，那么就可以将其应用于非聚集列存储索引，以确保其性能不受负面影响。\n\
  \n### 使用过滤索引进行查询\n\n考虑前面提到的分析查询。如果此查询的目标仅针对不再“热”的数据，那么将非聚集列存储索引上使用的过滤条件添加到此查询中，将使其能够使用过滤版本的索引，如以下代码块所示。\n\
  \n```sql\nSELECT\nCOUNT(*) AS sale_count,\nCOUNT(DISTINCT SalespersonPersonID) AS\
  \ sales_people_count,\nSUM(CAST(IsUndersupplyBackordered AS INT)) AS undersupply_backorder_count\n\
  FROM Sales.Orders\nWHERE CustomerID = 90\nAND OrderDate >= '1/1/2015'\nAND OrderDate\
  \ < '1/1/2016'\nAND PickedByPersonID IS NOT NULL;\n```\n\n代码清单 12-11：使用过滤非聚集列存储索引的查询\n\
  \n此查询的执行计划如图 12-14 所示。\n\n![](img/521866_1_En_12_Fig14_HTML.jpg)\n\n**图 12-14：使用过滤非聚集列存储索引的执行计划**\n\
  \n正如预期的那样，执行此查询时使用了过滤的非聚集列存储索引。\n\n如果需要，以下查询显示数据库中定义了过滤器的所有索引，可用于审查列存储索引及其详细信息。\n\
  \n```sql\nSELECT\nindexes.name,\nindexes.type_desc,\nindexes.filter_definition\n\
  FROM sys.indexes\nWHERE indexes.has_filter = 1;\n```\n\n代码清单 12-12：列出给定数据库中带过滤器索引的查询\n\
  \n查询结果有助于了解存在哪些过滤器及其定义，如图 12-15 所示。\n\n![](img/521866_1_En_12_Fig15_HTML.jpg)\n\n\
  **图 12-15：定义了过滤器的索引列表**\n\n如果数据库包含许多过滤索引，可以进一步优化查询以省略行存储索引或其他干扰信息。\n\n### 重要注意事项和陷阱\n\
  \n在使用过滤索引之前，有一个陷阱需要审视，那就是过滤列的敏感性。理想情况下，当数据从“热”变为“温”再变为“冷”时，它会被添加到过滤非聚集列存储索引中，并且很少（如果有的话）被移除。如果行能够在满足和不满足过滤子句之间交替变化，那么存在一个危险：表中的单行数据可能会多次被添加到列存储索引中然后又被移除。如果这种情况很常见，那么过滤索引最终可能变得和未过滤索引一样碎片化。\n\
  \n考虑使用之前创建的过滤非聚集列存储索引的场景。如果为一行分配了 `PickedByPersonID` 的值，它将立即被插入到列存储索引的增量存储中，在那里等待通过元组移动器进行压缩。如果\
  \ `PickedByPersonID` 随后被重置为 `NULL`，由于它不再满足过滤条件，它将从列存储索引中被删除。在设计任何过滤索引时，确保行不会频繁进出索引，并且数据遵循从“热”到“温”再到“冷”的单向旅程，是有价值的。\n\
  \n### 与压缩延迟结合使用\n\n压缩延迟可以与过滤非聚集列存储索引结合使用，作为缓冲那些导致数据通过常规流程在“热”和“温”之间移动的带外更改的一种方式。以下代码块展示了一个包含压缩延迟的过滤非聚集列存储索引。\n\
  \n```sql\nCREATE NONCLUSTERED COLUMNSTORE INDEX NCCI_Orders\nON Sales.Orders (OrderDate,\
  \ CustomerID, IsUndersupplyBackordered, SalespersonPersonID)\nWHERE PickedByPersonID\
  \ IS NOT NULL\nWITH (COMPRESSION_DELAY = 30 MINUTES);\n```\n\n代码清单 12-13：创建带压缩延迟的过滤非聚集列存储索引\n\
  \n该索引提供了额外的缓冲，以应对已分配 `PickedByPersonID` 的行可能出现以下情况：\n*   被删除\n*   被更新\n*   `PickedByPersonID`\
  \ 被重置回 `NULL`\n\n一个事务性表可以成功利用过滤非聚集列存储索引、压缩延迟，或者两者兼用。关于使用哪些功能以及如何配置它们的细节，应由组织需求及其数据生命周期驱动。在做出这些决定时，没有放之四海而皆准的解决方案。一个组织的一个数据库中的一张表可能受益于\
  \ 10 分钟的压缩延迟，而 1440 分钟可能是另一张表的最优选择。在某些工作流中，过滤器可能完全涵盖一个关键用例，而在其他情况下，可能无法轻易地在索引中进行过滤。\n\
  \n\n\n"
