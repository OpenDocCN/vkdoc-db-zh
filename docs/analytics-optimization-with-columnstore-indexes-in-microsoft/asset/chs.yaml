  新行组中的数据仍驻留在增量存储中，因为在创建列存储索引时指定了 30 分钟的压缩延迟。为了避免等待 30 分钟让元组移动器处理该行组，将使用代码清单 12-16
  中的 T-SQL 立即启用该进程。


