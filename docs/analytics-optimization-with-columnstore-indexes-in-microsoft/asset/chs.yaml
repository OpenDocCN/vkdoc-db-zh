  [Invoice Date Key] [date] NOT NULL,

  [Delivery Date Key] [date] NULL,

  [Salesperson Key] [int] NOT NULL,

  [WWI Invoice ID] [int] NOT NULL,

  [Description] nvarchar NOT NULL,

  [Package] nvarchar NOT NULL,

  [Quantity] [int] NOT NULL,

