- '# 1. 事务数据库中的分析数据介绍


  分析数据，就其本质而言，可能体量庞大、维护挑战重重，并且会随着时间的推移快速增长。同样，随着分析师和数据科学家发现更多处理它的方法，其使用量也会随之增加。将分析数据存储在靠近其底层事务源的地方，会带来极大的便利。为分析数据选择一个能够经得起时间考验的存储位置同样具有实用价值，这样可以避免在未来数据无法适当扩展时进行代价高昂的迁移。


  ## 分析数据应存放在何处？


  在列存储索引出现之前，将分析数据存储在 SQL Server 的事务数据库中是件麻烦事，需要运用技巧和做出妥协才能使其性能足以应对严格的分析要求。为了绕开这些限制，人们引入了其他技术和服务。


  分析数据可以存储在多种位置，例如：


  *   数据仓库（SQL Server Analysis Services、RedShift 等）

  *   非结构化数据（使用 Hadoop、Hive 等的数据湖）

  *   第三方分析软件

  *   关系/事务数据库中的 OLTP 表

  *   关系/事务数据库中的 OLAP 表


  这些选项各有优缺点，但在深入探讨细节之前，回顾一下分析数据及其形态是重要的。


  请注意，`OLAP` 代表“联机分析处理”，指分析型表和数据；而 `OLTP` 代表“联机事务处理”，指事务型表和数据。


  ## 分析数据规模


  典型的分析数据，其行数远高于其源事务数据。这可能是因为需要详细跟踪大量度量指标，也可能是因为需要在长时间内对这些细节进行重复采样跟踪。如果一个事务日志表每天新增一百万行，那么一年将捕获
  3.65 亿行数据。图 1-1 展示了时间对数据可能产生的巨大影响，以及一个小数据集在定期采样时如何快速增长。


  ![](img/521866_1_En_1_Fig1_HTML.jpg)


  *图 1-1：加入时间维度后数据增长的图示说明*


  分析数据也可能相当“宽”（列多）。即使是一个小表，也可能从中派生出许多计算度量指标，从而使其对应的 `OLAP` 表包含多得多的列。例如，考虑清单 1-1 中的假设销售订单表。


  ```sql

  CREATE TABLE dbo.SalesOrder

  (      SalesOrderId INT NOT NULL IDENTITY(1,1) CONSTRAINT PK_SalesOrder PRIMARY
  KEY CLUSTERED, ProductDetailList INT NOT NULL CONSTRAINT FK_SalesOrder_ProductDetail
  FOREIGN KEY REFERENCES dbo.ProductDetail,

  CustomerId INT NOT NULL CONSTRAINT FK_SalesOrder_Customer FOREIGN KEY REFERENCES
  dbo.Customer,

  OrderTime DATETIME2(3) NOT NULL,

  SalesAmount DECIMAL(18,4) NOT NULL,

  TaxRate DECIMAL(6,4) NOT NULL,

  ShipTime DATETIME2(3) NULL,

  ReceivedTime DATETIME2(3) NULL);

  ```

  *清单 1-1：一个事务型销售订单表示例*


  清单 1-1 中的表仅包含八列，提供了关于订单的信息，包括客户、产品详情以及时间和成本。经过一段时间和深思熟虑后，分析团队基于这个事务表创建了一个数据仓库风格的事实表，如清单
  1-2 所示。


  ```sql

  CREATE TABLE fact.SalesOrderMetrics

  (      OrderDate DATE NOT NULL,

  CustomerID INT NOT NULL,

  OrderCount INT NOT NULL,

  SalesAmountTotal DECIMAL(20,4) NOT NULL,

  SalesAmountMin DECIMAL(20,4) NOT NULL,

  SalesAmountMax DECIMAL(20,4) NOT NULL,

  AverageTaxRate DECIMAL(6,4) NOT NULL,

  MinTaxRate DECIMAL(6,4) NOT NULL,

  MaxTaxRate DECIMAL(6,4) NOT NULL,

  AverageHoursFromOrdertoShip DECIMAL(6,2) NULL,

  AverageHoursFromShiptoReceive DECIMAL(6,2) NULL,

  MinimumSecondsBetweenOrders INT NULL,

  MaximumSecondsBetweenOrders INT NULL);

  ```

  *清单 1-2：一个分析型销售订单表示例*


  请注意，清单 1-2 中的分析表包含各种额外的度量指标，这些指标用于在源数据从明细数据转换为每日汇总数据时对数据元素进行汇总。如果组织存在相关需求，分析师可以轻松添加更多列。


  由于这些细节，分析数据很容易增长，并在目标表中包含数百万或数十亿行。同样，一个分析表可能包含远多于其源事务数据的列。因此，分析表可能拥有许多行和/或许多列，这并不令人惊讶。即使是一个设计上不“宽”（列多）或不“深”（行多）的表，也会随着组织的成长和发展而随时间变化。因此，制定管理更大数据的计划是有益的，即使在分析项目最初完成时这些计划并未实施。


  ## 分析数据结构


  分析数据通常由以下两种数据之一构成：


  *   统计度量指标

  *   详细数据


  统计度量指标是可以聚合成有意义的派生度量的数值字段。这些可能是日期、时长、测量值、比率等。通常，这些数据类型使用定长数据类型，相对较小，并且具有可预测的存储占用空间。


  详细数据由基于文本的数据类型组成，例如 `VARCHAR`、`JSON`、`XML` 和其他标记类型。这些数据通常不会直接用于度量或统计，而是在事后为进一步分析而进行深度处理。虽然详细数据很重要，但它不是本书的重点。如果某个维度存在大型基于文本的数据类型，值得考虑对该列进行规范化，以减少其占用空间，并允许更轻松地管理详细值。


  例如，清单 1-3 中的表包含一个大型文本列。


  ```sql

  CREATE TABLE dbo.WebAccessLog

  (      LogId INT NOT NULL,

  LogTime DATETIME2(3) NOT NULL,

  LogSource VARCHAR(250) NOT NULL,

  ErrorCode BIGINT NOT NULL);

  ```

  *清单 1-3：一个带有宽文本列的表示例*


  假设 `LogSource` 列中的数据经常重复，将其规范化为自己的维度表将节省计算资源，并在需要时更轻松地分析不同值或值子集。清单 1-4 展示了 `LogSource`
  被规范化后的表。


  ```sql

  CREATE TABLE dbo.LogSource

  (      LogSourceId SMALLINT NOT NULL IDENTITY(1,1) CONSTRAINT PK_LogSource PRIMARY
  KEY CLUSTERED, LogSource VARCHAR(250) NOT NULL);

  CREATE TABLE dbo.WebAccessLog

  (      LogId INT NOT NULL,

  LogTime DATETIME2(3) NOT NULL,

  LogSourceId SMALLINT NOT NULL,

  ErrorCode BIGINT NOT NULL);

  ```

  *清单 1-4：将文本列规范化为查找表*


  原本用 250 个字符字符串表示的 `LogSource` 列，现在改用一个 `SMALLINT` 来引用查找表 `LogSource`。规范化列时，要确保查找键的数据类型既不太小（可能耗尽取值），也不太大（浪费空间）。规范化维度并不总是必要的操作，但当维度值经常重复且需要频繁引用它们时，这样做可能是有益的。


  ## 分析数据源


  分析数据可以存储在哪里？如何知道这个决策是有效做出的？在简要回顾了分析数据之后，我们可以更详细地探讨这个关于分析数据存储位置的问题。



  '
- '# 数据仓库


  数据仓库是存放 **OLAP**（联机分析处理）数据结构的经典存储库。数十年的经验被用于开发极其高效的数据仓库软件，几乎每个主流数据平台都有其专有的数据仓库解决方案。


  诸如微软的 **Azure Synapse**、亚马逊 **RedShift** 和谷歌 **BigQuery** 等解决方案，是作为数据仓库解决方案的范例。它们旨在与其他这些厂商提供的数据存储组件协同使用。


  使用这些技术的好处在于，它们是**预先构建、开箱即用**的，并且针对分析数据进行了优化。这些系统的缺点是，它们涉及学习一种新的架构、新的脚本语言，并需要获得足够的专业知识以随时间推移进行维护。大型组织通常能够在这方面进行专门化投入，但即便如此，有时为了降低复杂性，人们可能不愿意一开始就选择这些方案。


  '
- '# 非结构化数据


  并非所有数据都应该放入 **SQL** 数据库或任何结构化数据源。主要由文本和标记语言组成的数据在事务型数据库的限制下难以进行搜索，即使启用了诸如 **`SQL
  Server`** 的 **`全文搜索`** 等功能。


  当处理的数据是金额、时间或指标时，存储位置有很大的灵活性。但大量的文本和文件更适合存储在**非结构化数据存储库**中，例如基于 **`Hadoop`**、**`Hive`**
  或某个软件供应商提供的类似技术构建的数据湖。


  如果需要一种数据存储解决方案，而源数据又是大型的文本数据，请考虑事务型数据库之外的目的地。虽然本书不旨在探讨这些解决方案，但了解何时应该考虑它们，有助于避免为数据选择了错误的技术架构。


  '
- '# 第三方分析软件


  无论是在本地还是云端，都有许多分析软件解决方案可供使用。即使只是列出这些解决方案，也需要花费数小时、占用许多页篇幅，而且很可能还不完整。


  与数据仓库解决方案类似，第三方分析解决方案的主要好处是，它是为特定目的而构建的，并且可以用相对最少的努力来使用。与数据仓库解决方案不同，分析软件在结构、接口和使用方式上差异很大。一个组织的数据分析需求将决定所需解决方案的类型，有些分析软件能满足这些需求，而有些则不能。


  使用第三方供应商的缺点是**成本**和**供应商锁定**。成本通常会随着数据量和/或使用量的增加而上升。因此，一个分析项目可能开始时成本不高，但当数据量增长到初始规模的十倍、百倍甚至百万倍时，最终可能变得相当昂贵。在架构任何数据解决方案时，务必根据当前和未来的需求确定成本。这可以确保当数据及其使用量不可避免地呈数量级增长时，不会出现意外情况。


  供应商锁定也可能带来挑战。将数据导入分析解决方案很容易，但将来是否有完善且便捷的方式将数据提取出来？如果没有，那么迁离该解决方案可能变得成本高昂且耗时。如果这些成本超过了留在该平台上所需的费用，那么组织可能不得不无奈地选择无限期地将其数据保留在那里。不过，对于那些习惯并熟悉特定数据分析解决方案的人来说，这可能不是问题。


  '
- '# 在事务型数据库的 **OLTP** 表中存储 **OLAP** 数据


  将分析数据存储在 **OLTP**（联机事务处理）表中很可能是一个陷阱。**OLTP** 表旨在处理频繁写入和读取小范围行的工作负载。在这些场景中，通常需要从这些行中检索许多列。这些表的设计是为了管理并发性，其理念是给定的事务只涉及少数行。


  **OLTP** 表与分析数据的要求是相悖的。分析数据通常涉及针对许多行的聚合查询，但通常不需要返回所有列。


  对于小型表（少于几百万行），**OLTP** 表足以应对分析数据。对于包含数百万或数十亿行的大型表，这些表在提供跨大范围的数据服务时会遇到困难。与任何其他分析解决方案相比，它们可能会消耗更多空间，并导致对其数据的查询速度更慢。这是因为它们是针对小范围查找（少数行，多列）进行优化的，其架构并非为应对分析所需的大规模行数和聚合而设计。


  将 **OLTP** 表保留用于小型分析数据集，在这些场景下扫描表的大部分（或全部）数据不会造成过高的开销。或者，它们可用于查找表或其他小型维度表。例如前面清单
  **1-3** 中的 `LogSource` 表使用 `SMALLINT` 来编号其行。其主键最多只能包含 65,535 个值（-32,767 到 32,767），因此该表注定是相对较小的。它足够紧凑，如果需要，对文本列建立索引也不会带来过高的开销。


  '
- "# 在事务型数据库的分析表中存储 **OLAP** 数据\n\n存储分析数据的最后一个选项是在事务型数据库中使用 **OLAP** 表。这是本书剩余部分的重点，它将提供一种与目前所介绍方案不同的替代方案。\n\
  \n**OLAP** 表是一种表结构，专门设计用于服务通常需要访问大量行进行聚合的查询，同时不需要在任何时候返回所有列。**OLAP** 表预计将增长到数百万或数十亿行，并且可以轻松地处理一次处理数百万行的查询。\n\
  \n在 **`SQL Server`** 中使用 **OLAP** 表存储分析数据有许多好处，包括：\n\n*   可以利用现有技术和许可来维护分析数据。\n\
  *   实施和使用的**学习曲线要小得多**。\n*   数据完全由其所有者维护。\n*   数据可以存储在非常靠近其事务数据源的地方。\n\n这些并非微不足道的考虑因素，它们可以使分析解决方案的实施变得快速、经济，并且在需要时易于修改。此外，可以按需衡量和优化性能，以确保分析数据的最终用户享有可接受的访问速度。另外，将数据加载到分析表中的过程也可以被精细调整得**异常快速**。\n\
  \n考虑到其简单性和易于实施的特点，值得投入时间和资源来创建一个概念验证，以测试在 **`SQL Server`** 中使用列存储索引存储分析数据的可行性。\n\
  \n```\n分析数据可能规模庞大，消耗大量资源，并且在需要变更时迁移起来颇具挑战。为分析数据选择正确的目标数据结构并做出尽可能最佳的初始决策，对于一个分析项目的长期成功至关重要。\n\
  \n本书将详细探讨分析工作负载的本质，以及为何 SQL Server 中的列存储索引能够提供一种兼具成本效益和高性能的解决方案。\n```\n\n\n## 2.\
  \ 事务型与分析型工作负载\n\n事务型数据和分析型数据在写入、读取、存储和管理方式上存在根本差异。要实现其中任一类数据的最优性能，都需要针对其各自的范式来设计数据结构和软件。\n\
  \n在大型、繁忙的生产系统中，选择最佳数据结构至关重要，因为重建现有系统的成本远高于从一开始就进行有效架构的成本。本章将探讨这些工作负载的差异，并有效引入`列存储`索引作为满足广泛分析型数据存储需求的最优解决方案。\n\
  \n### 事务型数据\n\n应用程序随时创建、修改、删除和读取的数据即为事务型数据。这些数据可能并不总是存储在结构化数据库中，也不一定遵循`ACID`事务（**原子性**、**一致性**、**隔离性**、**持久性**）的原则，但在本文的讨论中，它们都将被视为事务型数据。\n\
  \n考虑一个处理来自网站和热门移动应用订单的订单系统。这显然是一个事务型系统。许多人定期访问该网站并创建订单、查看状态以及等待所订购商品的送达。`WideWorldImporters`示例数据库中包含一个`Orders`表，它代表了典型订单系统中会看到的结构，如图\
  \ 2-1 所示。\n\n![](img/521866_1_En_2_Fig1_HTML.jpg)\n\n图 2-1\n繁忙订单处理系统使用的订单表示例\n\n\
  请注意，该表包含许多列，每一列都代表订单的一个细节，例如销售员、客户、联系人、订购日期和采购订单号。无论该表随时间变得多大，普通用户通常一次只希望查看少量行。访问的数据量通常很小，因为用户很少查看当前或近期订单之外的数据。即使需要，也会通过预先建立的筛选器和链接来确保数据能够快速提供。\n\
  \n通常，应用程序一次会返回许多列。在查看订单时，返回任何可能需要的列比被迫多次返回表来检索更多列要快得多、效率高得多。\n\n由于用户是直接与应用程序交互，因此期望性能尽可能快。等待一两秒完成订单处理可能是可以接受的，而等待一两分钟则会立即引发投诉并导致业务损失。同样，由于许多用户同时访问站点，预期的争用会很高。因为许多人会同时访问他们的订单，所以存储这些数据的表需要能够进行快速读写，即使有成千上万（或数百万）个订单同时被访问也是如此。\n\
  \n一般来说，事务型查询往往比较简单。例如，用户检索当前订单信息可能会使用以下查询：\n\n```sql\nSELECT\n    Orders.OrderID,\n\
  \    Customers.CustomerName,\n    Orders.OrderDate,\n    Orders.ExpectedDeliveryDate,\n\
  \    Orders.CustomerPurchaseOrderNumber,\n    OrderLines.*\nFROM Sales.Orders\n\
  INNER JOIN Sales.Customers\n    ON Customers.CustomerID = Orders.CustomerID\nINNER\
  \ JOIN Sales.OrderLines\n    ON OrderLines.OrderID = Orders.OrderID\nWHERE Customers.CustomerID\
  \ = 10\n    AND Orders.OrderDate >= '5/20/2016'\n    AND Orders.OrderDate < '5/27/2016';\n\
  ```\n\n这是一个相对简单的查询，从 3 个表中提取了 5 个特定的列以及所有 12 个订单行明细列。图 2-2 显示了此查询的结果。\n\n![](img/521866_1_En_2_Fig2_HTML.jpg)\n\
  \n图 2-2\n示例事务型订单查询的结果\n\n请注意，通过对客户和日期进行筛选，只返回了两行。该系统的用户不太可能一次性请求数百或数千个订单的数据。一次查看如此多的数据将具有挑战性，而且用户界面很可能也未构建为允许一次检索如此多的数据。\n\
  \n事务型系统提供的任何数据在运行时都需要准确无误。检查银行余额的人需要得到一个准确的数字，绝无例外。这意味着数据完整性必须在运行时通过数据库、应用程序或两者结合来强制执行。如果所讨论的应用程序属于医院、军队或气象学家，那么事务型系统中的不准确数据可能会带来灾难性的后果。\n\
  \n同样，如果事务型操作失败，需要立即处理该失败，以免用户的数据处于不确定状态。如果用户在线续签护照，但支付从未正确处理，他们的申请可能得不到应有的处理。更糟糕的是，用户可能没有简单的方法来修复它。因此，该系统能够将流程的每一步作为一个整体单元正确处理的能力非常重要。对于事务型数据使用`ACID`在很大程度上取决于数据及其用途。银行无法承受不一致的事务，但社交媒体网站可能可以。同样，在某些组织模型中最终一致的数据是完全可接受的，而在其他模型中则可能是破坏性的。\n\
  \n`OLTP`（联机事务处理）数据通常经过规范化，以协助确保关系完整性以及高效生成查找值列表。`规范化`可以在事务型应用程序中节省空间和内存，因为更冗长的文本列被数字查找所取代。它还允许通过直接查询规范化表在应用程序中进行轻松查找。\n\
  \n总之，事务型数据通常具有以下特征：\n\n*   通常是`INSERT`、`UPDATE`和`DELETE`操作的目标。\n*   一次返回多列，供应用程序使用。\n\
  *   单个用户一次访问的数据量通常较小。\n*   事务速度至关重要。\n*   预期存在高水平的争用。\n*   数据在运行时需要时必须准确无误，绝无例外。\n\
  *   由应用程序最终用户访问。\n*   通常经过规范化。\n\n虽然这些特征对事务型数据通常是成立的，但分析型数据却大不相同，值得进一步详细探讨。\n\n\n\
  ## 分析数据\n\n事务数据存在于处理订单或银行业务的实时/繁忙系统中，而**分析数据**则存在于更靠后的环节。这类数据最常与报表、可视化和分析相关联。它驱动着商业智能、数据科学以及推动全球组织发展的决策制定。\n\
  \nOLAP 系统与事务系统有着根本性的不同。为确保最佳的速度和可靠性，两者需要在架构设计、实现和管理方式上采取截然不同的策略。\n\n分析查询通常需要一次性访问大批量的数据，但为了计算出驱动结果所需的指标，实际用到的列则要少得多。例如，一个常见的财务需求可能是比较本季度与上季度的收入。完成这个查询所需的计算需要访问每个季度的所有收入数据，或者将这些数据预先计算好并存放在一个方便的位置。\n\
  \n以下查询是一个分析数据请求的示例，旨在了解订单数量和随时间变化的订单总额：\n\n```sql\nSELECT\nDate.[Calendar Year]\
  \ AS Order_Year,\nDate.[Calendar Month Number] AS Order_Month,\nCOUNT(*) AS Order_Count,\n\
  SUM(Quantity) AS Quantity_Total,\nSUM([Total Excluding Tax]) AS [Total Excluding\
  \ Tax]\nFROM Fact.[Order]\nINNER JOIN Dimension.Date\nON Date.Date = [Order].[Order\
  \ Date Key]\nWHERE [Order].[Order Date Key] >= '1/1/2016'\nAND [Order].[Order Date\
  \ Key] < '1/1/2017'\nGROUP BY Date.[Calendar Year], Date.[Calendar Month Number]\n\
  ORDER BY Date.[Calendar Year], Date.[Calendar Month Number];\n```\n\n请注意，查询只请求了少数几列，但为了返回如图\
  \ 2-3 所示的结果，系统查询了近 3 万条订单记录。\n\n![](img/521866_1_En_2_Fig3_HTML.jpg)\n\n图 2-3：一个分析查询示例的结果\n\
  \n一个更大的 OLAP 系统可以轻松地在单个请求中处理数百万行数据，得到类似的结果。一个有效的分析数据存储需要能够扩展，以支持任何给定表中的数百万（甚至数十亿）行数据，同时不会消耗过多的系统资源，也不会导致查询执行时间过长。\n\
  \n与数据从许多来源以小批量方式写入的事务系统不同，分析数据通常是通过一组有限的、有组织的数据加载流程，以较大的批量操作生成的。一次性插入数千（或数百万）行数据需要快速且高效，因为这将成为常态。图\
  \ 2-4 中的图表说明了两种类型系统中数据写入方式的差异。\n\n![](img/521866_1_En_2_Fig4_HTML.jpg)\n\n图 2-4：OLAP\
  \ 与 OLTP 数据访问模式总结\n\n需要注意的是，并非所有的 OLTP 和 OLAP 系统都严格遵循此模式，但大体上会遵循这些使用模式。\n\n由于分析数据通常用于报表、分析和数据科学，因此对实时结果的需求不那么重要。许多分析过程是异步进行的，并不直接由最终使用结果数据的用户监控。因为\
  \ OLAP 数据变化不那么频繁，复杂的数据处理可以在数据使用前完成，这样如果需要交互式报表，就不必等待太长时间才能看到结果。\n\n同样，因为访问数据的数据源、用户和应用程序数量较少，资源争用带来的挑战也小得多。一个查询可能需要从表中读取数百万行才能返回结果，但访问该表的查询数量将比繁忙的事务表少好几个数量级。\n\
  \n由于 OLAP 数据更新不频繁，通过约束来维护关系完整性的需求就较低。加载的新数据集可以在插入分析表之前进行独立的验证和确认。外键和约束可能仍会作为便利的连接或报表工具而被使用，但其采用与否将取决于它们对加载速度的影响。如何验证分析数据的决策取决于每个用例、其源事务数据的性质，以及在有组织的数据加载过程之外，OLAP\
  \ 数据可能发生变化的量。\n\n同样，OLAP 数据加载过程的设计者在处理故障时可以采取更灵活的方式。在事务性应用中，故障需要立即重试或回滚，不能有任何中间状态，以免导致错误或不一致的数据。而一个失败的分析加载过程，则可以通过更“强力”的方式解决，例如：\n\
  \n1.  排查并修复损坏的加载过程。\n2.  识别并删除所有新加载的数据。\n3.  重新运行加载过程。\n\n很可能无需保留任何部分加载的数据，而且删除部分加载的数据也不复杂，因为它通常带有时间戳。许多\
  \ OLAP 数据加载过程会包含自动删除同一时间段内先前加载的任何数据的步骤。这样，失败的过程可以重新运行，而无需先执行清理步骤。\n\n分析数据的消费者也与使用事务性应用的消费者大不相同。一个\
  \ OLTP 应用可能拥有范围广泛的终端用户，他们定期直接与软件交互；而分析数据的消费者往往是分析师、领域专家和业务领导者。领域专家是那些对数据足够熟悉，能够理解其含义和用途的人。例如，网络管理员是网络流量数据的领域专家，而首席财务官则是季度收益数据的领域专家。领域专家可能对数据的含义有清晰的理解，但他们不太熟悉数据是如何存储和处理的。\n\
  \n与 OLTP 数据不同，分析数据通常是非规范化的。可能会为了报表目的而维护查找表，但并非专门用作事实表的查找引用。在 OLAP 表中，规范化并不总能显著节省存储或内存资源。同样重要的是，在数据加载过程中连接查找表会大大增加延迟，导致新的分析数据可用时间变得更长。主流分析数据结构中使用的大多数压缩算法，在物理存储数据时利用字典查找来“规范化”数据。这意味着重复值占用的空间远少于事务表中的情况，而不论该列的具体宽度有多大。尽管如此，字典大小是有限的，更宽的数据类型会带来压缩挑战，这将在第\
  \ 5 章中讨论。\n\n分析数据可以总结如下：\n\n*   **由大型、低频且受控的数据加载过程写入。**\n*   **为用于分析，以大批量方式读取行数据。**\n\
  *   **每次操作通常读取的列较少。**\n*   **预期争用程度较低。**\n*   **数据完整性可通过验证来强制执行，而非依赖约束。**\n*   **由业务领导者、分析师和领域专家访问。**\n\
  *   **通常是非规范化的。**\n\n分析数据的特征与事务数据截然不同。这些不同的特征往往导致需要使用不同的系统来分别存储它们。\n\n\n## 对两套系统的必要性\n\
  \n由于事务型系统和分析型系统的工作负载差异巨大，随着数据量增长，为其维护独特数据结构的需求就变得愈加明显。\n\n虽然上千行数据在任何结构中都能快速访问，但若数据达到十亿行，除非其数据结构是针对预期服务的工作负载类型而构建的，否则将变得异常笨重。\n\
  \n许多应用程序试图混合分析型和事务型工作负载以保持便利性并避免创建新系统。这在两类数据之间的各种差异开始相互冲突之前是可行的。例如，混合使用 `OLAP` 和\
  \ `OLTP` 工作负载时一个常见的陷阱是：大型、缓慢的分析查询会导致对应用程序用户正尝试写入的对象产生锁定和阻塞。如果销售人员运行年度报告时阻塞了试图购买新产品的用户，结果将是销售损失和用户不满。\n\
  \n同样地，那些大型报告可能消耗大量内存，迫使常见的事务型数据让出缓冲池空间给报表数据。这将进一步加剧应用程序用户的操作迟滞。\n\n一般来说，混合分析型和事务型工作负载可能并非总能避免，但提前考虑这一架构决策的影响，有助于在问题变得代价高昂之前预测（并规划应对）它们。\n\
  \n`OLTP` 和 `OLAP` 系统之间还有许多其他考虑因素会有所不同，例如：\n\n*   维护\n*   高可用性\n*   灾难恢复\n*   `SQL\
  \ Server` 许可\n*   硬件资源\n\n应用程序架构师需要确保针对事务型和分析型工作负载，分别探讨这些主题。虽然在数据量较小时使用相似系统是可能的，但这些系统不太可能无限扩展。最终，数据会变得足够大，以至于需要独特的解决方案来区分每种工作负载类型。\n\
  \n这些决策的细微差别可以深入很多。例如，一个小型分析数据库的架构可能与大型数据仓库不同。因此，在设计新数据结构或重新审视现有数据库对象时，综合考虑规模、扩展性、数据增长和工作负载至关重要。\n\
  \n## 构建更好的分析型数据结构\n\n迄今为止的讨论清楚地表明，用于支持分析型数据的表和结构需要区别于事务型工作负载所使用的。本章概述了许多区分 `OLTP`\
  \ 和 `OLAP` 应用程序的细节，包括它们如何读写数据以及典型的使用模式。\n\n考虑到这些信息，可以构想出分析型数据应存储在何处。本书的剩余部分将重点介绍如何利用\
  \ `SQL Server` 中的列存储索引来有效满足大型分析型表和工作负载的需求。这项技术已经成熟，可用于有效管理各种分析用例，确保它为架构师和管理员经常面临的许多分析挑战提供理想的解决方案。\n\
  \n"
- '# 3. 什么是列存储索引？


  至此，已经提出了一个令人信服的理由，即将 `OLTP` 和 `OLAP` 工作负载分离到独特的数据结构中，并针对各自的用例进行优化。列存储索引是 `SQL Server`
  的一项功能，为大型分析型数据提供原生支持。本章将深入探讨它们是什么，以及为什么它们是应对分析型数据挑战的有效解决方案。


  ## 事务型数据存储的限制


  包含数百万或数十亿行分析型数据的表，如果实现为经典的事务型表，则扩展性不佳。要完全理解其中的原因，比较数据在事务型表和分析型表中的存储方式会有所帮助。以下示例表包含五列。图
  3-1 展示了数据在 `OLTP`（行存储）版本的此表中的存储方式。


  ![](img/521866_1_En_3_Fig1_HTML.jpg)


  图 3-1：聚集行存储索引中数据存储的示意图


  在聚集行存储索引中，每一行按聚集索引规定的顺序依次存储在页面上。如果查询需要单行或多行的许多列，那么这是一种极其高效的存储结构。例如，检索从第 1 行到第 -5
  行的所有列所需的工作量很小，因为数据是连续且有序的。图 3-2 突出显示了满足此查询所需的数据。


  ![](img/521866_1_En_3_Fig2_HTML.jpg)


  图 3-2：`OLTP` 查询检索五行时如何读取示例表


  具有顺序列的表模拟了典型的事务型查询如何处理如下查询：


  ```

  SELECT

  OrderID, --  一个标识/主键列

  CustomerID,

  SalespersonPersonID,

  ContactPersonID,

  OrderDate

  FROM Sales.Orders

  WHERE OrderId = 289;

  ```


  事务型查询写入单行或小范围行，这通常与在单个索引上的查找相关。这里，使用一个数值标识从更大的表中筛选出感兴趣的五行。


  `SQL Server` 存储的基本单位是页面。一个页面由 8KB 数据组成。页面包含给定表的所有数据和索引存储。如果查询需要单行，则即使页面上的其余数据不需要，它所在页面的全部内容也会被读入内存。因此，事务型查询依赖于聚集或非聚集索引来确保索引查找能够以有序的方式返回数据，如图
  3-2 中的示例所示。在这种情况下，即使表变得非常大，读取这五行也不会需要太多额外开销。


  然而，分析型查询则大不相同。它们通常聚合少数几列，但却是在很多行上进行聚合。考虑一个针对示例表的典型 `OLAP` 查询，它在表的大部分区域（恰好包含此处显示的所有行）聚合单个列。图
  3-3 展示了这种情况。


  ![](img/521866_1_En_3_Fig3_HTML.jpg)


  图 3-3：从示例表聚合单个列的分析型查询


  行的物理布局显示，一个只需要第 2 列的查询也需要读取相邻的列，即使它们不需要。以下是一个查询示例，它访问表中的大量数据，但仅聚合单个列。


  ```

  SELECT

  SUM(Quantity) AS Total_Quantity

  FROM Sales.OrderLines

  WHERE OrderID >= 1

  AND OrderID < 10000;

  ```


  尽管只对单个列进行了求和，但任何包含该列值的页面都需要被读入内存。即使使用覆盖非聚集索引，仍然需要读取每一行的数据，尽管这种方式可以减少读取的页面数量。




  '
- '# SQL Server 中的列存储索引技术


  ## 行存储索引下的查询性能分析


  现在考虑一个更大的表，它有 5000 万行，使用聚集行存储索引存储在 250,000 个页面上。图 3-2 中演示的事务性查询仍然只会读取连续存储的 5 行，因此可以忽略剩余的
  249,995 行及其存储的页面。可能会额外读取与这五行存储在同一页上的数据，但由此增加的负担以千字节衡量，相对微不足道。


  图 3-3 中展示的分析查询仅聚合单个列，但跨越了多行。如果请求的订单数据占表的四分之一，那么在事务性表中处理此查询将迫使 `SQL Server` 读取表中大约四分之一的页面，因为第二列的值分散在表中每行的各个位置。无论使用何种过滤器来减少查询所需的行数，过滤器指定范围内的每一页都必须被读取。


  随着分析表持续增长，达到数十亿行和/或 `TB` 级（或更多）存储时，读取其大部分数据的能力会变得过于缓慢且资源密集，变得不切实际。需要一种更好的解决方案，允许分析查询在不读取底层其他列数据的情况下读取列数据。


  ## 介绍列存储索引


  解决这个问题的技术在某种程度上已经存在很长时间了。像 `SQL Server Analysis Services` 和 `PowerPivot` 这样的应用程序多年来一直使用列式数据存储格式，但它们的实现对用户是隐藏的。


  列存储索引允许数据以最优的分析格式存储在表中，提供了许多有价值的优点，例如：


  *   可扩展至任意表大小

  *   将查询速度提高 `10–100` 倍

  *   卓越的压缩率，节省存储和内存

  *   `SQL Server` 原生支持

  *   可利用批量加载实现快速写入速度


  虽然这听起来像推销辞令，但这里没有任何夸张。将存储在经典行存储聚集索引中的大型分析数据集与列存储索引表进行比较，在存储和性能方面存在巨大差异，这将在本书的后续部分进行演示和量化。


  请注意，本书中所有关于列存储索引的演示均在 `SQL Server 2019` 上测试。使用早期版本的读者在实施本书中的任何建议前应进行充分测试，因为可用的功能可能有所不同。


  图 3-4 说明了图 3-1 中的同一个表，在列存储索引中如何存储数据。


  ![](img/521866_1_En_3_Fig4_HTML.jpg)


  图 3-4

  聚集列存储索引中的数据存储示意图


  注意关键区别：数据是按列而不是按行排序的。第一列的所有值存储在一个单独的结构中，而其他每个列则存储在自己的页面集中。在图 3-3 所示的行存储表中，聚合了单个列，但必须读取每一页才能返回那一列的数据。


  图 3-5 展示了针对分析列存储索引表的相同查询。


  ![](img/521866_1_En_3_Fig5_HTML.jpg)


  图 3-5

  针对列存储索引聚合单个列


  因为数据在物理上按列分组，不再需要读取整个表来返回单个聚合列。其他四列可以被忽略。这极大地减少了对存储系统的读取，并降低了内存使用量，因为需要读入内存的页面更少。对于插入此表中的每个新行，只需要读取第二列的一个额外值。


  这种数据结构的一个显著优点是压缩变得更有效。单个列的一组值往往包含更多重复值，更容易压缩，而来自不同列的值重叠并良好压缩的可能性较低。更好的压缩意味着页面上可以容纳更多数据，从而进一步节省存储和内存。


  关于列存储索引的一个重要澄清是，它们并非“只是另一个索引”。它们不能与非聚集行存储索引、`XML` 索引、空间索引、内存优化索引或 `SQL Server` 中包含的其他索引类型相提并论。它们构成了一种独特的架构，提供的益处远超典型索引所能提供的。


  请注意，在本书中，除非另有说明，所有演示和讨论都将引用聚集列存储索引。第 11 章将更详细地探讨非聚集列存储索引。


  ## SQL Server 中列存储索引的优势


  列存储索引成为存储大型分析数据的理想解决方案有很多原因。它们跨越了从成本到便利性再到速度的多个领域，并说明了一个看似简单的功能如何能以较低的实现时间和资源成本提供卓越的价值。这不是列存储索引优点的完整列表，但突出了使其在分析数据应用中具有吸引力的性能和效率关键点。本书的其余部分将更详细地探讨列存储索引的优势和最佳用例。



  ## SQL Server 中的原生分析型数据


  `列存储索引`最大的优势之一在于，它们直接将分析型数据存储在`SQL Server`中，无需额外的许可费用或配置更改。同样，开始测试或实施`列存储索引`也无需进行任何硬件或软件更改。


  一个包含分析型数据的`行存储`表可以被转换为使用`列存储索引`，整个过程可在同一个`SQL Server`数据库实例上完成，甚至可以实现就地索引替换。这为准备就绪时的轻松测试、验证和实施提供了可能。


  由于`列存储索引`是`SQL Server`中分析型数据存储的核心功能，它会随着每个新版本而更新。每次更新都会带来新的功能，使得读写`列存储索引`能够变得更快、更高效。微软的以下文档详细概述了自`列存储索引`诞生以来，各版本`SQL
  Server`中可用的功能：


  [`docs.microsoft.com/en-us/sql/relational-databases/indexes/columnstore-indexes-what-s-new`](https://docs.microsoft.com/en-us/sql/relational-databases/indexes/columnstore-indexes-what-s-new)


  这份清单相当详尽，展示了`列存储索引`如何从一个不够灵活的、只读的结构，演变成一个功能丰富、充满优化的特性。


  将数据原生存储在`SQL Server`中意味着无需第三方产品、无需昂贵的迁移，也无需配置新的硬件和软件。实施它们所需的时间更多地取决于典型的开发和质量保证需求，而非技术限制。在为分析型数据的存储和维护制定项目计划时，考虑到这些资源成本有助于做出准确、基于事实的决策。以下是对这些考虑因素的总结：


  *   是否需要采购/许可新硬件以支持分析型数据

  *   分析软件及任何配套软件的许可费用

  *   计算资源的成本，无论是在本地还是在云端

  *   设计、开发、测试和实施分析型数据解决方案所需的时间

  *   培训人员如何使用新解决方案所需的资源


  量化这些因素中的每一项，都有助于比较和对比不同的解决方案，并且通常会对已经使用`SQL Server`进行事务数据存储的组织产生有利的结果。


  ## 可扩展性


  鉴于分析型数据可能快速增长，任何用于存储它的数据结构都必须能够高效地处理`OLAP`工作负载，即使数据深度或宽度随着时间推移意外地快速增加。


  分析型数据存储解决方案的可扩展性具有许多重要优势，包括：


  *   即使在数据快速增长时期，也能确保高性能

  *   避免向新技术进行代价高昂的迁移

  *   避免对报告/分析服务造成干扰

  *   减少维护和停机时间

  *   减少对硬件升级的需求


  一个`OLAP`解决方案要有效，它需要在处理一千行、一百万行、十亿行甚至更多数据时都保持快速和高效。如果一个系统注定在规模变大时变得低效，那么它也注定会失败。


  分析型数据的增长是一个值得衡量并定期重新审视的指标，以便充分了解其长期的资源需求。`OLAP`数据很少会变小，其增长率也很少会下降。这种增长最终与任何给定组织的两个衡量指标相关：


  *   增长

  *   复杂性


  随着组织的发展和客户群的扩大，这些客户将产生更多的数据。同样，组织的发展几乎总是导致技术和非技术流程变得更加复杂。这种复杂性可能表现为软件功能的增加、需要跟踪的流程增多，或者要求随时间推移维护和处理更多类型的数据。


  数据增长速率可总结如下：


  `1.00 * N * G * C`


  在这个表示式中，字母代表以下含义：


  *   **N = 自然增长：** 这是当前发生的自然数据增长。如果其他条件不变，且没有外部因素调整数据增长率，那么这将是预测未来数据增长所需的唯一因素。这可以按单位时间的行数来衡量，也可以按平均字节数每行乘以单位时间行数的物理数据大小增加来衡量。

  *   **G = 数据增长：** 自然增长提供了随时间添加到表或数据库中的数据量基线。然而，这种增长很少是线性的。新客户、采样频率的增加以及其他因素将导致超出当前基线的额外增长。这也可以按单位时间的行数或单位时间的物理数据使用量来衡量。

  *   **C = 复杂性增加：** 这包括向表中添加更多列，以及创建和填充新表。这也增加了需要（通过更多实体）从事务系统流入目标分析系统的数据量。这具有挑战性，但可以作为随时间新增度量指标数量的度量来估算。也就是说，平均而言，单位时间有多少新度量指标将被添加到分析数据源中。一旦知道了新度量指标的数据类型，就可以近似估算其存储单位。


  这里定义的每个因素在性质上是线性的，但实际上可能不是线性的。因此，在预测未来数据大小时，应定期重新审视它们，以确保考虑到增长中意外的变化。只要这些近似值能根据当前和未来趋势保持更新，就可以使用单位时间的线性近似来近似非线性增长。


  为了提供前述公式的示例，考虑一个分析表，它包含 1 亿行数据，当前每天增长 25 万行，预计其增长将每年额外加速 25%，但在可预见的未来不会增加任何新维度。1
  年后的预计行数将由下式给出：


  ```

  1.00 * N * G * C * 行数 = 1.00 * 1.9125 * 1.25 * 1.00 * 100,000,000 = 239,062,500
  行（未来一年）

  ```


  ```

  1.00 * N * G * C * 行数 = 1.00 * 1.9125 * 1.25 * 1.00 * 239,062,500 = 571,508,789
  行（第二年）

  ```


  ```

  1.00 * N * G * C * 行数 = 1.00 * 1.9125 * 1.25 * 1.00 * 571,508,789 = 1,366,263,198
  行（第三年）

  ```


  注意这种增长加速让数据膨胀得有多快——从 1 亿行在 3 年内增长到超过 13 亿行！`1.9125`是通过将每天`250,000`行乘以每年`365`天计算得出的年增长因子。


  总而言之，任何管理分析型数据的技术都需要能够在典型数据增长可能导致数据规模以超出常规认知的速度膨胀的情况下，实现高效的数据访问。`列存储索引`的架构将在第 4
  章详细讨论，并将为解释为何它们能为快速增长的数据实现如此有效的扩展奠定基础。



  ## 卓越的压缩能力


  任何分析型数据存储都需要充分利用压缩技术，以使其数据尽可能紧凑。列存储索引采用多种压缩算法，实现了令人印象深刻的高压缩比。这可以使数据量缩减到未压缩表的 1/10
  至 1/100。


  按列而非按行压缩数据，其效率天生更高，原因如下：


  *   单列包含相同数据类型的值，增加了值重复的可能性。

  *   维度通常包含大量重复值，因此压缩效果会格外出色。

  *   数据通常是按时间顺序顺序创建的。时间上相邻的行往往包含更相似的数据，因此压缩效果优于时间上相隔较远的行。


  第 5 章将深入探讨列存储索引压缩的更多细节，并展示这些压缩算法的有效性及其对优化分析查询性能至关重要。


  ## 更快的分析读取


  列存储索引的首要设计目标是提供高性能的分析查询速度。无论是从结构化存储过程和代码中访问数据，还是进行即席分析和可视化，紧凑且分段的列存储索引结构都能快速高效地返回所需数据。即使在扫描大量行时，这一点也依然成立。


  ## 更快的数据加载


  当数据以每次数百万行的规模写入时，就需要存在允许数据尽快写入的流程。针对事务数据优化的、完全记录日志的流程，对于这种规模的数据将无法提供足够的性能。


  列存储索引可以充分利用 SQL Server 的批量加载 API，其写入速度远超 SQL Server 及许多其他产品中可用的其他流程。数据加载可以执行得更快，从而提高
  OLAP 的可用性，并让新数据更快地呈现。此外，数据加载对系统资源（如事务日志）和备份的影响被降至最低，确保大量数据可以在短时间内写入，而不会产生在完全记录日志的
  OLTP 表上执行此类操作所带来的问题。


  第 8 章将全面探讨数据如何写入列存储索引，包括性能度量、资源消耗细节以及尽可能高效加载数据的最佳实践。


  分析型数据需要一个多功能、可扩展且高性能的解决方案。列存储索引提供了一种理想的数据结构来创建和分析分析型数据，并能轻松管理随时间增长的数据量。


  本书的剩余部分将极其详尽地讨论列存储索引，提供架构细节、演示、最佳实践以及可改进其使用的工具。


  '
- "# 4. 列存储索引架构\n\n为了最优地使用列存储索引，扎实理解其架构是必要的。最佳实践、查询模式、维护和故障排除都基于列存储索引的内部结构。本章将重点介绍这些架构组件，为本书的其余部分奠定基础。\n\
  \n## 示例数据\n\n为演示本书中介绍的主题，将基于 `WideWorldImportersDW` 数据库中的 `Fact.Sale` 表创建一个示例数据集。\n\
