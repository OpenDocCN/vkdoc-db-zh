  [Quantity] [int] NOT NULL,

  [Unit Price] decimal NOT NULL,

  [Tax Rate] decimal NOT NULL,

  [Total Excluding Tax] decimal NOT NULL,

  [Tax Amount] decimal NOT NULL,

  [Profit] decimal NOT NULL,

  [Total Including Tax] decimal NOT NULL,

  [Total Dry Items] [int] NOT NULL,

  [Total Chiller Items] [int] NOT NULL,

  [Lineage Key] [int] NOT NULL);

  CREATE CLUSTERED INDEX CCI_fact_Sale_CCI_ORDERED ON Fact.Sale_CCI_ORDERED ([Invoice
  Date Key]);

  INSERT INTO Fact.Sale_CCI_ORDERED

  ([Sale Key], [City Key], [Customer Key], [Bill To Customer Key], [Stock Item Key],
  [Invoice Date Key], [Delivery Date Key],

  [Salesperson Key], [WWI Invoice ID], Description, Package, Quantity, [Unit Price],
  [Tax Rate],

  [Total Excluding Tax], [Tax Amount], Profit, [Total Including Tax], [Total Dry Items],

  [Total Chiller Items], [Lineage Key])

  SELECT

  Sale.[Sale Key], Sale.[City Key], Sale.[Customer Key], Sale.[Bill To Customer Key],
  Sale.[Stock Item Key], Sale.[Invoice Date Key], Sale.[Delivery Date Key],

