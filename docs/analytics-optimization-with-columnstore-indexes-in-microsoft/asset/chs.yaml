  **图 11-8**

  非分区列存储索引与分区列存储索引的 `STATISTICS IO`


  `STATISTICS IO` 的输出显示了查询执行在每个表上不同的多种方式。最显著的差异在于报告的段读取数量。非分区表读取了 2 个段，同时跳过了 22 个，而分区表读取了
  1 个段，同时跳过了 3 个。这种 IO 反映了原始查询，该查询仅使用 *Invoice Date Key* 在 2016 年 1 月内的行来计算总和。


  对于已排序但未分区的表，在使用行组消除来跳过段之前，需要审查整个表的元数据。而在分区表中，不包含 2016 年数据的行组会被自动跳过。由于分区函数在评估列存储元数据之前进行计算，因此从未读取无关的行组，包括它们的元数据。这体现了分区消除的实际作用。虽然分区并非旨在作为一种查询优化解决方案，但它会对列存储索引
  IO 和查询速度产生积极影响，尤其是在较大的表上。


  分区还会影响查询优化器，它将在更少的行组和行上评估查询，这可以简化执行计划。图 11-9 展示了清单 11-7 中演示的分析查询的执行计划。


  ![](img/521866_1_En_11_Fig9_HTML.jpg)


  **图 11-9**

  非分区列存储索引与分区列存储索引的查询执行计划


  非分区表的执行计划更为复杂，因为 SQL Server 确定并行处理可能有助于处理大量行。分区表的执行计划更简单，因为优化器选择不使用并行处理。请注意，使用哈希匹配是为了支持将聚合下推到列存储索引扫描步骤中的
  `SUM` 运算符。同样值得注意的是，当需要读取的分区较少时，分区表（与非分区表相比）执行计划中读取的行数更低。


  尽管每个查询的输出相同，并且每个执行计划产生相同的结果集，但能够避免并行处理节省了计算资源，正如分区表查询成本大幅降低所暗示的那样。


  除了分区消除之外，索引维护也可以调整以跳过较旧的、更新较少的分区。例如，如果认为需要对此列存储索引进行重建以在最近的一些软件发布后清理它，非分区表将需要整体重建，如清单
