  图 10-5 列存储索引 `Invoice Date Key` 列的元数据



  ## 无序数据的问题


  请注意，*min_data_id* 和 *max_data_id* 对于每个行组都是相同的。这意味着该列包含的数据是无序的。如果查询通常使用 `Invoice
  Date Key` 进行过滤，则需要扫描列存储索引中的所有行组，才能正确过滤出所需的行。随着列存储索引随时间增长，扫描所有行组的代价会变得非常高。即使在压缩良好的列存储索引上，查询也会变慢，并且服务不可过滤查询所需的
  IO 开销也会很高。


  `STATISTICS IO` 提供了有关列存储索引扫描期间读取的行组数量的有用指导。为了演示这一点，将使用清单 10-6 中的查询。


  ```sql

  SELECT

  SUM([Quantity])

  FROM Fact.Sale_CCI

  WHERE [Invoice Date Key] >= ''1/1/2016''

  AND [Invoice Date Key] < ''2/1/2016'';

  -- Listing 10-6

  -- Query to Illustrate Rowgroup Reads in a Columnstore Index Scan

  ```


  这是一个典型的分析查询，用于计算给定月份的总销售数量。


  当扫描列存储索引时，`STATISTICS IO` 将在输出中包含一条消息，指示读取和跳过的段数。这是衡量必须扫描多少行组才能确定哪些行满足过滤条件、哪些可以自动跳过的指标。图
  10-6 显示读取了 26 个段，跳过了 0 个。由于底层数据完全无序，SQL Server 无法使用列存储元数据来跳过任何行组。这代表了一个常见的现实世界挑战，但也是一个容易解决的问题。


  ![](img/521866_1_En_10_Fig6_HTML.jpg)

  *图 10-6 一个无序列存储索引扫描样本的 STATISTICS IO*


  ## 行组消除


  列存储元数据允许在查询过滤器不包含行组中存在的行时跳过行组。此过程称为行组消除，是优化列存储索引性能的关键。实现这一目标的最简单方法是按顺序对数据进行排序，并随时间推移维护该顺序。数据可以按一列或多列排序，这些列将代表分析查询中最常用的过滤器。排序
  OLAP 数据最常见的维度是时间。分析通常使用基于时间的单位（如小时、天、周、月、季度和年）来过滤、聚合和可视化数据。图 10-7 显示了行组消除对仅需要基于有序数据满足过滤条件的窄范围数据的查询的影响。


  ![](img/521866_1_En_10_Fig7_HTML.jpg)

  *图 10-7 行组消除对窄范围分析查询的影响*


  虽然这个假设索引包含六个行组，但只需其中一个即可满足查询的过滤条件。行组消除的强大之处在于它能随着列存储索引大小的增长而有效扩展。从包含一个月数据的表中请求一周窄范围分析数据的查询，与从包含十年数据的表中执行相同查询的性能是相似的。这是允许列存储索引即使在表中有数十亿行时也能有效扩展的主要特性。


  在清单 10-6 的示例中，一个简单的分析查询基于 `Invoice Date Key` 进行过滤，但无序的列存储索引数据强制进行全表扫描以确定哪些行满足过滤条件。如果
  `Invoice Date Key` 是分析此数据时最常用的过滤条件，那么按该列排序将允许有效的行组消除。


