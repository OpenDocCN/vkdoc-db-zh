- '# 有序列存储索引的性能优势


  对于每一个行组，`min_data_id` 和 `max_data_id` 的值相较于无序列存储索引发生了剧烈变化。这些值不再在每个行组内保持相同，而是随着数据从第一行组向后推进，从低值逐渐进展到高值。从实际角度看，假设一个查询需要数据
  ID 为 735270 的数据，那么它只需要读取与此`segment_id = 7`相关的行组。由于元数据表明其余段不包含此值，它们（及其关联的行组）可以被自动跳过。


  ## **空间节省与压缩优势**


  按键列对数据进行排序是启用行组消除的简单方法，从而减少查询资源消耗并提高任何能利用该数据顺序的查询速度。有效的数据顺序不仅能减少读取量，还可以通过提高底层数据的压缩率来节省存储空间。代码清单
  10-8 包含一个脚本，用于检索本章中提到的两个列存储索引所使用的数据空间。


  ```sql

  CREATE TABLE #storage_data

  (      table_name VARCHAR(MAX),

  rows_used BIGINT,

  reserved VARCHAR(50),

  data VARCHAR(50),

  index_size VARCHAR(50),

  unused VARCHAR(50));

  INSERT INTO #storage_data

  (table_name, rows_used, reserved, data, index_size, unused)

  EXEC sp_MSforeachtable "EXEC sp_spaceused ''?''";

  UPDATE #storage_data

  SET reserved = LEFT(reserved, LEN(reserved) - 3),

  data = LEFT(data, LEN(data) - 3),

  index_size = LEFT(index_size, LEN(index_size) - 3),

  unused = LEFT(unused, LEN(unused) - 3);

  SELECT

  table_name,

  rows_used,

  reserved / 1024 AS data_space_reserved_mb,

  data / 1024 AS data_space_used_mb,

  index_size / 1024 AS index_size_mb,

  unused AS free_space_kb,

  CAST(CAST(data AS DECIMAL(24,2)) / CAST(rows_used AS DECIMAL(24,2)) AS DECIMAL(24,4))
  AS kb_per_row

  FROM #storage_data

  WHERE rows_used > 0

  AND table_name IN (''Sale_CCI'', ''Sale_CCI_ORDERED'')

  ORDER BY CAST(reserved AS INT) DESC;

  DROP TABLE #storage_data;

  ```

  代码清单 10-8

  查询两个列存储索引使用的数据空间


