- fmt: "## Columnstore Metadata Reads\n\nTo determine what data to read and how to\
    \ read it, the metadata for a columnstore index will be read prior to any columnstore\
    \ index scans. This includes the metadata about the contents of rowgroups and\
    \ segments. Consider the query in **Listing 15-1**.\n\n```sql\nSELECT\n    SUM(Quantity)\
    \ AS Total_Quantity,\n    SUM([Total Excluding Tax]) AS Total_Excluding_Tax\n\
    FROM Fact.Sale_CCI_PARTITIONED\nWHERE [Invoice Date Key] = '7/17/2015';\n```\n\
    **Listing 15-1**\nExample Query Used in Performance Analysis\n\nTwo columns are\
    \ aggregated for a single value of `Invoice Date Key`. This table is both ordered\
    \ and partitioned and therefore will benefit significantly from partition elimination\
    \ and rowgroup elimination. When the query is executed, columnstore metadata is\
    \ consulted to determine which segments need to be read.\n\n### Partitioning and\
    \ Metadata Consultation\n\nThe table `Fact.Sale_CCI_PARTITIONED` is partitioned\
    \ on the `Invoice Date Key` column by year, with partitions assigned to the years\
    \ 2013, 2014, 2015, 2016, and 2017. **Listing 15-2** provides the definitions\
    \ for both the partition scheme and function used in this demonstration.\n\n```sql\n\
    CREATE PARTITION FUNCTION fact_Sale_CCI_years_function (DATE) AS RANGE RIGHT FOR\
    \ VALUES\n    ('1/1/2014', '1/1/2015', '1/1/2016', '1/1/2017');\nCREATE PARTITION\
    \ SCHEME fact_Sale_CCI_years_scheme AS PARTITION fact_Sale_CCI_years_function\n\
    \    TO (WideWorldImportersDW_2013_fg, WideWorldImportersDW_2014_fg, WideWorldImportersDW_2015_fg,\n\
    \        WideWorldImportersDW_2016_fg, WideWorldImportersDW_2017_fg)\n```\n**Listing\
    \ 15-2**\nPartition Function and Partition Scheme Definitions\n\nThe table contains\
    \ data ranging from 2013 through 2016 and therefore will not make use of the last\
    \ partition. When executed, the query in **Listing 15-1** will immediately check\
    \ the filter against the partition function and then use the partition scheme\
    \ to determine where data is located based on the function. Based on this information,\
    \ it is determined that only data in the partition `WideWorldImportersDW_2015_fg`\
    \ will be needed.\n\nColumnstore metadata is stored separately for each partition,\
    \ and therefore when executed, this query needs to only consult metadata relevant\
    \ to the partition containing data for the year 2015. **Figure 15-1** shows the\
    \ segment metadata for `Invoice Date Key` in this columnstore index.\n\n![](images/521866_1_En_15_Chapter/521866_1_En_15_Fig1_HTML.jpg)\n\
    \n**Figure 15-1**\nColumnstore segment metadata for Invoice Date Key\n\nThe metadata\
    \ shows an exceptionally well-ordered columnstore index. Note that `min_data_id`\
    \ and `max_data_id` progressively increase as values advance through each segment\
    \ within each partition. An encoding type of 2 represents dictionary encoding\
    \ for a nonstring data type, in this case a `DATE`. The primary dictionary used\
    \ for this column has an ID of zero.\n\n### Querying Dictionary Metadata\n\nThe\
    \ query in **Listing 15-3** provides a bit of additional detail on the dictionary\
    \ used for this column.\n\n```sql\nSELECT\n    partitions.partition_number,\n\
    \    objects.name,\n    columns.name,\n    column_store_dictionaries.type,\n \
    \   column_store_dictionaries.entry_count,\n    column_store_dictionaries.on_disk_size\n\
    FROM sys.column_store_dictionaries\nINNER JOIN sys.partitions\n    ON column_store_dictionaries.hobt_id\
    \ = partitions.hobt_id\nINNER JOIN sys.objects\n    ON objects.object_id = partitions.object_id\n\
    INNER JOIN sys.columns\n    ON columns.column_id = column_store_dictionaries.column_id\n\
    \    AND columns.object_id = objects.object_id\nWHERE objects.name = 'Sale_CCI_PARTITIONED'\n\
    \    AND columns.name = 'Invoice Date Key'\n    AND column_store_dictionaries.dictionary_id\
    \ = 0;\n```\n**Listing 15-3**\nQuery to Return Information About a Columnstore\
    \ Dictionary\n\nThe results provide additional detail about the dictionary used\
    \ for this column, as shown in **Figure 15-2**.\n\n![](images/521866_1_En_15_Chapter/521866_1_En_15_Fig2_HTML.jpg)\n\
    \n**Figure 15-2**\nColumnstore dictionary metadata\n\nThis shows that partitions\
    \ 1–3 share a single dictionary that is a compact 1308 bytes. The scenario presented\
    \ here is essentially the optimal columnstore index and query. The index is well\
    \ ordered and partitioned and the query aligns perfectly with that order to minimize\
    \ the amount of metadata read as part of its execution.\n\n### The Importance\
    \ of Minimizing Metadata Reads\n\nWhile columnstore metadata may not seem large\
    \ when compared to the data itself, it is important to remember that a columnstore\
    \ index with one billion rows will have approximately one thousand rowgroups.\
    \ Each of those rowgroups will contain one segment per column. For this table\
    \ which contains 21 columns, metadata will consist of about 21,000 segments per\
    \ billion rows. Needing to read metadata on rowgroups, segments, dictionaries,\
    \ and more can add up to a nontrivial amount of work for SQL Server. As with data\
    \ itself, metadata needs to be loaded into memory before it can be read. Therefore,\
    \ maintaining an ordered table and partitioning (if needed) can ensure that excessive\
    \ metadata is not read when executing analytic queries.\n\nReturning to the analytic\
    \ query in **Listing 15-1**, it can be expected that it would execute quickly,\
    \ resulting in minimal metadata reads, as well as minimal data reads. The `STATISTICS\
    \ IO` output for the query is shown in **Figure 15-3**.\n\n![](images/521866_1_En_15_Chapter/521866_1_En_15_Fig3_HTML.jpg)\n\
    \n**Figure 15-3**\nStatistics IO output for a sample analytic query\n\nThis example\
    \ was an ideal scenario where segment elimination, rowgroup elimination, and partitioning\
    \ all combined to provide exceptionally low reads and a vast majority of segments\
    \ skipped. While the real world will not always provide such optimal examples\
    \ of columnstore performance, this illustrates the upper bound for what to compare\
    \ performance against."
  raw: '## Columnstore Metadata Reads


    To determine what data to read and how to read it , the metadata for a columnstore
    index will be read prior to any columnstore index scans. This includes the metadata
    about the contents of rowgroups and segments. Consider the query in Listing [15-1](#521866_1_En_15_Chapter.xhtml#PC1).


    ```

    SELECT

    SUM(Quantity) AS Total_Quantity,

    SUM([Total Excluding Tax]) AS Total_Excluding_Tax

    FROM Fact.Sale_CCI_PARTITIONED

    WHERE [Invoice Date Key] = ''7/17/2015'';

    Listing 15-1

    Example Query Used in Performance Analysis

    ```


    Two columns are aggregated for a single value of *Invoice Date Key*. This table
    is both ordered and partitioned and therefore will benefit significantly from
    partition elimination and rowgroup elimination. When the query is executed, columnstore
    metadata is consulted to determine which segments need to be read.


    The table *Fact.Sale_CCI_PARTITIONED* is partitioned on the *Invoice Date Key*
    column by year, with partitions assigned to the years 2013, 2014, 2015, 2016,
    and 2017\. Listing [15-2](#521866_1_En_15_Chapter.xhtml#PC2) provides the definitions
    for both the partition scheme and function used in this demonstration.


    ```

    CREATE PARTITION FUNCTION fact_Sale_CCI_years_function (DATE) AS RANGE RIGHT FOR
    VALUES

    (''1/1/2014'', ''1/1/2015'', ''1/1/2016'', ''1/1/2017'');

    CREATE PARTITION SCHEME fact_Sale_CCI_years_scheme AS PARTITION fact_Sale_CCI_years_function

    TO (WideWorldImportersDW_2013_fg, WideWorldImportersDW_2014_fg, WideWorldImportersDW_2015_fg,

    WideWorldImportersDW_2016_fg, WideWorldImportersDW_2017_fg)

    Listing 15-2

    Partition Function and Partition Scheme Definitions

    ```


    The table contains data ranging from 2013 through 2016 and therefore will not
    make use of the last partition. When executed, the query in Listing [15-1](#521866_1_En_15_Chapter.xhtml#PC1)
    will immediately check the filter against the partition function and then use
    the partition scheme to determine where data is located based on the function.
    Based on this information, it is determined that only data in the partition WideWorldImportersDW_2015_fg
    will be needed.


    Columnstore metadata is stored separately for each partition, and therefore when
    executed, this query needs to only consult metadata relevant to the partition
    containing data for the year 2015\. Figure [15-1](#521866_1_En_15_Chapter.xhtml#Fig1)
    shows the segment metadata for *Invoice Date Key* in this columnstore index.


    ![](images/521866_1_En_15_Chapter/521866_1_En_15_Fig1_HTML.jpg)


    Figure 15-1


    Columnstore segment metadata for Invoice Date Key


    The metadata shows an exceptionally well-ordered columnstore index. Note that
    *min_data_id* and *max_data_id* progressively increase as values advance through
    each segment within each partition. An encoding type of 2 represents dictionary
    encoding for a nonstring data type, in this case a DATE. The primary dictionary
    used for this column has an ID of zero.


    The query in Listing [15-3](#521866_1_En_15_Chapter.xhtml#PC3) provides a bit
    of additional detail on the dictionary used for this column.


    ```

    SELECT

    partitions.partition_number,

    objects.name,

    columns.name,

    column_store_dictionaries.type,

    column_store_dictionaries.entry_count,

    column_store_dictionaries.on_disk_size

    FROM sys.column_store_dictionaries

    INNER JOIN sys.partitions

    ON column_store_dictionaries.hobt_id = partitions.hobt_id

    INNER JOIN sys.objects

    ON objects.object_id = partitions.object_id

    INNER JOIN sys.columns

    ON columns.column_id = column_store_dictionaries.column_id

    AND columns.object_id = objects.object_id

    WHERE objects.name = ''Sale_CCI_PARTITIONED''

    AND columns.name = ''Invoice Date Key''

    AND column_store_dictionaries.dictionary_id = 0;

    Listing 15-3

    Query to Return Information About a Columnstore Dictionary

    ```


    The results provide additional detail about the dictionary used for this column,
    as shown in Figure [15-2](#521866_1_En_15_Chapter.xhtml#Fig2) .


    ![](images/521866_1_En_15_Chapter/521866_1_En_15_Fig2_HTML.jpg)


    Figure 15-2


    Columnstore dictionary metadata


    This shows that partitions 1–3 share a single dictionary that is a compact 1308
    bytes. The scenario presented here is essentially the optimal columnstore index
    and query. The index is well ordered and partitioned and the query aligns perfectly
    with that order to minimize the amount of metadata read as part of its execution.


    While columnstore metadata may not seem large when compared to the data itself,
    it is important to remember that a columnstore index with one billion rows will
    have approximately one thousand rowgroups. Each of those rowgroups will contain
    one segment per column. For this table which contains 21 columns, metadata will
    consist of about 21,000 segments per billion rows. Needing to read metadata on
    rowgroups, segments, dictionaries, and more can add up to a nontrivial amount
    of work for SQL Server. As with data itself, metadata needs to be loaded into
    memory before it can be read. Therefore, maintaining an ordered table and partitioning
    (if needed) can ensure that excessive metadata is not read when executing analytic
    queries.


    Returning to the analytic query in Listing [15-1](#521866_1_En_15_Chapter.xhtml#PC1),
    it can be expected that it would execute quickly, resulting in minimal metadata
    reads, as well as minimal data reads. The STATISTICS IO output for the query is
    shown in Figure [15-3](#521866_1_En_15_Chapter.xhtml#Fig3).


    ![](images/521866_1_En_15_Chapter/521866_1_En_15_Fig3_HTML.jpg)


    Figure 15-3


    Statistics IO output for a sample analytic query


    This example was an ideal scenario where segment elimination, rowgroup elimination,
    and partitioning all combined to provide exceptionally low reads and a vast majority
    of segments skipped. While the real world will not always provide such optimal
    examples of columnstore performance, this illustrates the upper bound for what
    to compare performance against .'
  trans: "\n## 列存储元数据读取\n\n为了确定要读取哪些数据以及如何读取，在任何列存储索引扫描之前，需要先读取列存储索引的元数据。这包括有关行组和段内容的元数据。请考虑**清单\
    \ 15-1** 中的查询。\n\n```sql\nSELECT\n    SUM(Quantity) AS Total_Quantity,\n    SUM([Total\
    \ Excluding Tax]) AS Total_Excluding_Tax\nFROM Fact.Sale_CCI_PARTITIONED\nWHERE\
    \ [Invoice Date Key] = '7/17/2015';\n```\n**清单 15-1**\n性能分析中使用的示例查询\n\n针对 `Invoice\
    \ Date Key` 的单个值聚合了两列。此表既是有序的又是分区的，因此将显著受益于分区消除和行组消除。执行查询时，会查阅列存储元数据以确定需要读取哪些段。\n\
    \n### 分区与元数据查阅\n\n表 `Fact.Sale_CCI_PARTITIONED` 按年份对 `Invoice Date Key` 列进行分区，分区分配给了\
    \ 2013、2014、2015、2016 和 2017 年。**清单 15-2** 提供了本演示中使用的分区方案和函数的定义。\n\n```sql\nCREATE\
    \ PARTITION FUNCTION fact_Sale_CCI_years_function (DATE) AS RANGE RIGHT FOR VALUES\n\
    \    ('1/1/2014', '1/1/2015', '1/1/2016', '1/1/2017');\nCREATE PARTITION SCHEME\
    \ fact_Sale_CCI_years_scheme AS PARTITION fact_Sale_CCI_years_function\n    TO\
    \ (WideWorldImportersDW_2013_fg, WideWorldImportersDW_2014_fg, WideWorldImportersDW_2015_fg,\n\
    \        WideWorldImportersDW_2016_fg, WideWorldImportersDW_2017_fg)\n```\n**清单\
    \ 15-2**\n分区函数和分区方案定义\n\n该表包含 2013 年至 2016 年的数据，因此不会使用最后一个分区。执行时，**清单 15-1** 中的查询会立即根据分区函数检查筛选条件，然后利用分区\
    \ scheme 根据该函数确定数据位置。基于此信息，可以判定只需要分区 `WideWorldImportersDW_2015_fg` 中的数据。\n\n\
    列存储元数据是为每个分区单独存储的，因此执行此查询时，只需查阅与包含 2015 年数据的分区相关的元数据。**图 15-1** 显示了此列存储索引中 `Invoice\
    \ Date Key` 的段元数据。\n\n![](img/521866_1_En_15_Fig1_HTML.jpg)\n\n**图 15-1**\nInvoice\
    \ Date Key 的列存储段元数据\n\n元数据显示这是一个极其有序的列存储索引。请注意，随着值在每个分区内的各个段中推进，`min_data_id`\
    \ 和 `max_data_id` 会逐步增加。编码类型 2 表示非字符串数据类型的字典编码，本例中是 `DATE`。此列使用的主要字典 ID 为零。\n\n\
    ### 查询字典元数据\n\n**清单 15-3** 中的查询提供了有关此列所用字典的一些额外细节。\n\n```sql\nSELECT\n    partitions.partition_number,\n\
    \    objects.name,\n    columns.name,\n    column_store_dictionaries.type,\n \
    \   column_store_dictionaries.entry_count,\n    column_store_dictionaries.on_disk_size\n\
    FROM sys.column_store_dictionaries\nINNER JOIN sys.partitions\n    ON column_store_dictionaries.hobt_id\
    \ = partitions.hobt_id\nINNER JOIN sys.objects\n    ON objects.object_id = partitions.object_id\n\
    INNER JOIN sys.columns\n    ON columns.column_id = column_store_dictionaries.column_id\n\
    \    AND columns.object_id = objects.object_id\nWHERE objects.name = 'Sale_CCI_PARTITIONED'\n\
    \    AND columns.name = 'Invoice Date Key'\n    AND column_store_dictionaries.dictionary_id\
    \ = 0;\n```\n**清单 15-3**\n返回列存储字典信息的查询\n\n结果提供了关于此列所用字典的更多细节，如**图 15-2** 所示。\n\
    \n![](img/521866_1_En_15_Fig2_HTML.jpg)\n\n**图 15-2**\n列存储字典元数据\n\n这显示分区 1–3 共享一个单一的字典，大小仅为紧凑的\
    \ 1308 字节。这里展示的场景本质上是最优的列存储索引和查询。索引是有序且分区的，而查询与该顺序完美契合，从而最大限度地减少了其执行过程中需要读取的元数据量。\n\
    \n### 最小化元数据读取的重要性\n\n尽管与数据本身相比，列存储元数据可能看起来不大，但重要的是要记住，拥有十亿行的列存储索引大约会有一千个行组。每个行组将为每列包含一个段。对于这个包含\
    \ 21 列的表，每十亿行的元数据将包含大约 21,000 个段。需要读取行组、段、字典等元数据，可能会给 SQL Server 带来不小的工作量。与数据本身一样，元数据在被读取之前也需要加载到内存中。因此，维护一个有序的表和分区（如果需要）可以确保在执行分析查询时不会读取过多的元数据。\n\
    \n回到**清单 15-1** 中的分析查询，可以预期它将快速执行，导致元数据读取量最小，数据读取量也最小。该查询的 `STATISTICS IO` 输出如**图\
    \ 15-3** 所示。\n\n![](img/521866_1_En_15_Fig3_HTML.jpg)\n\n**图 15-3**\n一个示例分析查询的\
    \ Statistics IO 输出\n\n这个例子是一个理想场景，其中段消除、行组消除和分区相结合，提供了极低的读取量，并跳过了绝大多数段。虽然现实世界并不总能提供如此理想的列存储性能示例，但这说明了可以用来比较性能的上限。\n"
- fmt: '## Columnstore Data Reads


    Once columnstore metadata is read, the data itself is then read. It is critical
    to understand that the performance of queries against a `columnstore index` will
    ultimately be driven by the number of segments read when a query is executed.
    All other variables being equal, an analytic request that reads 1000 segments
    will be expected to perform approximately ten times slower than a query that reads
    100 segments. While `columnstore indexes` may at times be seen as magical tools
    sprinkled with pixie dust, this is the one area in which there is no magic and
    performance will be guided by IO.


    Segment reads equate to page reads which represent those IO operations. If the
    pages needed are already in memory, then the operations will be comprised of logical
    IO as segments are read directly from the buffer pool. If the required pages are
    not in memory yet (or are partially in memory), then physical reads will be required
    to copy pages from storage into the buffer pool.


    Segment elimination and rowgroup elimination are the tools that limit segment
    reads and help ensure that only the amount of data needed to satisfy a query is
    read. The quality of columnstore compression applied to data helps squeeze data
    into as few pages as possible, thereby reducing IO.


    At their most basic structure, `columnstore indexes` are bound by the same speed
    limitations that exist for rowstore tables. Reading pages from storage into the
    buffer pool takes time. Decompressing and reading data from the buffer pool takes
    additional time. Therefore, the less pages that need to be read, the faster `columnstore
    index` analytics can perform.


    Other performance-boosting tools used by `columnstore indexes` (such as batch
    mode operation or filtered indexes) further improve query speeds by improving
    throughput or reducing IO. The focus throughout the step of reading columnstore
    data is to control IO via whatever means possible. Figure 15-4 illustrates how
    data and metadata are read from storage through to being used query results.


    ![](images/521866_1_En_15_Chapter/521866_1_En_15_Fig4_HTML.jpg)


    **Figure 15-4**

    Movement of columnstore data and metadata from storage to memory to usage by a
    query


    While the entire `columnstore index` resides on a storage system, typically only
    a fraction of it will be maintained in the buffer pool. Segments remain compressed
    throughout this entire IO process until they are needed by a query, at which time
    they are decompressed, and data is returned to `SQL Server`.


    ## Memory Sizing


    All of the performance discussions thus far have focused on reducing IO. Despite
    all efforts to minimize unnecessary IO, larger `columnstore indexes` will ultimately
    require reading significant numbers of segments from storage into memory.


    The next step in ensuring highly performant `columnstore indexes` is to accurately
    estimate the amount of memory that should be allocated to `SQL Server` to support
    analytic queries.


    Too little memory and data will be constantly removed from memory, only to be
    read back into the buffer pool when needed again soon. The process of reading
    data from storage (even fast storage) will be far greater than other steps in
    executing analytic queries.


    Too much memory would represent unused computing resources, which translate into
    wasted money.


    Allocating memory to `SQL Server` to support `columnstore indexes` requires a
    handful of steps:


    1.  Measure the size of the `columnstore index`.

    2.  Approximate how much of the index is comprised of hot data that should always
    reside in memory.

    3.  Approximate how much of the index represents warm data. This data will be
    in memory for some analytic needs, but not all.

    4.  Approximate data growth over time that will adjust the numbers calculated
    earlier.


    Any data that is not hot or warm is expected to be cold and rarely used. It may
    still be valuable but is not accessed often enough to architect an entire system
    around it. Resources can be allocated at runtime by Azure, AWS, or other hosting
    services, if that level of flexibility is desired, but that is entirely optional
    and at the discretion of an organization and the importance of speedy access to
    cold data.


    Consider a hypothetical `columnstore index` as shown in Listing 15-4.


    ```

    2017: 10,000,000 rows (1GB) - cold/rarely used

    2018: 50,000,000 rows (3GB) - cold/rarely used

    2019: 100,000,000 rows (5GB) - cold/rarely used

    2020: 250,000,000 rows (10GB) - warm/sometimes used

    2021: 500,000,000 rows (18GB) - hot/often used

    ```


    **Listing 15-4**

    Row Counts and Size for Data in a Columnstore Index


    This index shows a common trend in analytics by which the most recent year is
    heavily used for current reporting. The previous year is also accessed frequently
    for year-over-year analytics. All previous data is important and must be retained,
    but is not read very often when compared to newer data.


    Based on the numbers provided, if the goal was to ensure that the most frequently
    used data was accounted for in memory allocation, then this `columnstore index`
    would warrant 18GB of memory to ensure that all 18GB of hot data can reside in
    memory, if needed.


    If the 10GB of warm data were also important, then allocating some amount of memory
    up to 10GB would help ensure that data is not cycled in and out of memory too
    often and that it does not replace more important hot data in memory when requested.
    If resources were plentiful, then allocating the full 10GB would accomplish the
    task in its entirety. Otherwise, the organization responsible for this data would
    need to determine how important the warm data is and allocate some amount of additional
    memory up to 10GB to cover it. For example, if it was estimated that the latter
    half of the 2020 data would be requested on a somewhat regular basis, but the
    earlier half would be far less used, then 5GB would be a good estimate of memory
    to allocate to this block of warm data.


    The remaining 9GB of data from 2017 to 2019 would not receive any memory allocation
    as they are rarely read and would impact performance too infrequently to matter
    to most organizations. If infrequent analytics or reports are disruptive enough,
    an argument could be made to adding further memory to reduce that disruption,
    but this would be something that should be considered on a case-by-case basis.'
  raw: '## Columnstore Data Reads


    Once columnstore metadata is read , the data itself is then read. It is critical
    to understand that the performance of queries against a columnstore index will
    ultimately be driven by the number of segments read when a query is executed.
    All other variables being equal, an analytic request that reads 1000 segments
    will be expected to perform approximately ten times slower than a query that reads
    100 segments. While columnstore indexes may at times be seen as magical tools
    sprinkled with pixie dust, this is the one area in which there is no magic and
    performance will be guided by IO.


    Segment reads equate to page reads which represent those IO operations. If the
    pages needed are already in memory, then the operations will be comprised of logical
    IO as segments are read directly from the buffer pool. If the required pages are
    not in memory yet (or are partially in memory), then physical reads will be required
    to copy pages from storage into the buffer pool.


    Segment elimination and rowgroup elimination are the tools that limit segment
    reads and help ensure that only the amount of data needed to satisfy a query is
    read. The quality of columnstore compression applied to data helps squeeze data
    into as few pages as possible, thereby reducing IO.


    At their most basic structure, columnstore indexes are bound by the same speed
    limitations that exist for rowstore tables. Reading pages from storage into the
    buffer pool takes time. Decompressing and reading data from the buffer pool takes
    additional time. Therefore, the less pages that need to be read, the faster columnstore
    index analytics can perform.


    Other performance-boosting tools used by columnstore indexes (such as batch mode
    operation or filtered indexes) further improve query speeds by improving throughput
    or reducing IO. The focus throughout the step of reading columnstore data is to
    control IO via whatever means possible. Figure [15-4](#521866_1_En_15_Chapter.xhtml#Fig4)
    illustrates how data and metadata are read from storage through to being used
    query results.


    ![](images/521866_1_En_15_Chapter/521866_1_En_15_Fig4_HTML.jpg)


    Figure 15-4


    Movement of columnstore data and metadata from storage to memory to usage by a
    query


    While the entire columnstore index resides on a storage system, typically only
    a fraction of it will be maintained in the buffer pool. Segments remain compressed
    throughout this entire IO process until they are needed by a query, at which time
    they are decompressed, and data is returned to SQL Server .


    ## Memory Sizing


    All of the performance discussions thus far have focused on reducing IO. Despite
    all efforts to minimize unnecessary IO, larger columnstore indexes will ultimately
    require reading significant numbers of segments from storage into memory.


    The next step in ensuring highly performant columnstore indexes is to accurately
    estimate the amount of memory that should be allocated to SQL Server to support
    analytic queries.


    Too little memory and data will be constantly removed from memory, only to be
    read back into the buffer pool when needed again soon. The process of reading
    data from storage (even fast storage) will be far greater than other steps in
    executing analytic queries.


    Too much memory would represent unused computing resources, which translate into
    wasted money.


    Allocating memory to SQL Server to support columnstore indexes requires a handful
    of steps:


    1.  Measure the size of the columnstore index.


    2.  Approximate how much of the index is comprised of hot data that should always
    reside in memory.


    3.  Approximate how much of the index represents warm data. This data will be
    in memory for some analytic needs, but not all.


    4.  Approximate data growth over time that will adjust the numbers calculated
    earlier.


    Any data that is not hot or warm is expected to be cold and rarely used. It may
    still be valuable but is not accessed often enough to architect an entire system
    around it. Resources can be allocated at runtime by Azure, AWS, or other hosting
    services, if that level of flexibility is desired, but that is entirely optional
    and at the discretion of an organization and the importance of speedy access to
    cold data.


    Consider a hypothetical columnstore index as shown in Listing [15-4](#521866_1_En_15_Chapter.xhtml#PC4).


    ```

    2017: 10,000,000 rows (1GB) - cold/rarely used

    2018: 50,000,000 rows (3GB) - cold/rarely used

    2019: 100,000,000 rows (5GB) - cold/rarely used

    2020: 250,000,000 rows (10GB) - warm/sometimes used

    2021: 500,000,000 rows (18GB) - hot/often used

    Listing 15-4

    Row Counts and Size for Data in a Columnstore Index

    ```


    This index shows a common trend in analytics by which the most recent year is
    heavily used for current reporting. The previous year is also accessed frequently
    for year-over-year analytics. All previous data is important and must be retained,
    but is not read very often when compared to newer data.


    Based on the numbers provided, if the goal was to ensure that the most frequently
    used data was accounted for in memory allocation, then this columnstore index
    would warrant 18GB of memory to ensure that all 18GB of hot data can reside in
    memory, if needed.


    If the 10GB of warm data were also important, then allocating some amount of memory
    up to 10GB would help ensure that data is not cycled in and out of memory too
    often and that it does not replace more important hot data in memory when requested.
    If resources were plentiful, then allocating the full 10GB would accomplish the
    task in its entirety. Otherwise, the organization responsible for this data would
    need to determine how important the warm data is and allocate some amount of additional
    memory up to 10GB to cover it. For example, if it was estimated that the latter
    half of the 2020 data would be requested on a somewhat regular basis, but the
    earlier half would be far less used, then 5GB would be a good estimate of memory
    to allocate to this block of warm data.


    The remaining 9GB of data from 2017 to 2019 would not receive any memory allocation
    as they are rarely read and would impact performance too infrequently to matter
    to most organizations. If infrequent analytics or reports are disruptive enough,
    an argument could be made to adding further memory to reduce that disruption,
    but this would be something that should be considered on a case-by-case basis
    .'
  trans: '## 列存储数据读取


    一旦读取了列存储元数据，接下来就会读取数据本身。理解这一点至关重要：针对`列存储索引`的查询性能，最终将由查询执行时读取的**段数量**决定。在所有其他变量相同的情况下，一个读取
    1000 个段的分析请求，其执行速度预计将比读取 100 个段的查询慢大约十倍。虽然`列存储索引`有时可能被视为撒了“仙尘”的神奇工具，但这是唯一一个没有魔法可言的领域，性能将由
    IO 来引导。


    段读取等同于页读取，后者代表了 IO 操作。如果所需的页面已经在内存中，那么操作将由逻辑 IO 组成，因为段直接从缓冲池中读取。如果所需页面尚未在内存中（或仅部分在内存中），则需要执行物理读取，将页面从存储复制到缓冲池。


    段消除和行组消除是限制段读取的工具，有助于确保仅读取满足查询所需的数据量。应用于数据的列存储压缩质量有助于将数据压缩到尽可能少的页面中，从而减少 IO。


    从最基本的结构来看，`列存储索引`受到与行存储表相同的速度限制约束。将页面从存储读取到缓冲池需要时间。从缓冲池解压和读取数据需要额外的时间。因此，需要读取的页面越少，`列存储索引`分析执行的速度就越快。


    `列存储索引`使用的其他性能提升工具（如批处理模式操作或筛选索引）通过提高吞吐量或减少 IO 来进一步加快查询速度。在读取列存储数据这一步骤中，核心焦点就是通过一切可能的手段控制
    IO。图 15-4 说明了数据和元数据如何从存储读取直至被查询结果使用。


    ![](img/521866_1_En_15_Fig4_HTML.jpg)


    **图 15-4**

    列存储数据和元数据从存储到内存再到被查询使用的流转过程


    虽然整个`列存储索引`都驻留在存储系统上，但通常只有一部分会保存在缓冲池中。在整个 IO 过程中，段始终保持压缩状态，直到查询需要它们时，才会被解压缩，然后数据被返回给`SQL
    Server`。


    ## 内存容量规划


    迄今为止所有的性能讨论都集中在减少 IO 上。尽管已尽一切努力最小化不必要的 IO，但较大的`列存储索引`最终仍将需要从存储中将大量段读取到内存中。


    确保`列存储索引`高性能的下一步是准确估计应分配给`SQL Server`以支持分析查询的内存量。


    内存太少，数据将不断被移出内存，而很快又需要时，又得重新读回缓冲池。从存储读取数据（即使是快速存储）的过程将远远超过执行分析查询的其他步骤。


    内存太多则代表未使用的计算资源，这相当于浪费金钱。


    为支持`列存储索引`而向`SQL Server`分配内存需要几个步骤：


    1.  测量`列存储索引`的大小。

    2.  估算索引中应始终驻留在内存中的热数据所占的比例。

    3.  估算索引中代表温数据的比例。这些数据将为某些分析需求而存在于内存中，但不是全部。

    4.  估算随时间的数据增长，这将调整前面计算出的数字。


    任何非热或非温的数据预计都是冷数据，很少使用。它可能仍然有价值，但访问频率不足以围绕它设计整个系统。如果需要这种灵活性，可以在运行时由 Azure、AWS
    或其他托管服务分配资源，但这完全是可选的，取决于组织以及对冷数据快速访问的重要程度。


    考虑一个假设的`列存储索引`，如代码清单 15-4 所示。


    ```

    2017: 10,000,000 rows (1GB) - cold/rarely used

    2018: 50,000,000 rows (3GB) - cold/rarely used

    2019: 100,000,000 rows (5GB) - cold/rarely used

    2020: 250,000,000 rows (10GB) - warm/sometimes used

    2021: 500,000,000 rows (18GB) - hot/often used

    ```


    **代码清单 15-4**

    列存储索引中数据的行数和大小


    该索引显示了分析中的一个常见趋势，即最近一年的数据被大量用于当前报告。前一年的数据也经常被访问以进行同比分析。所有历史数据都很重要且必须保留，但与较新的数据相比，其读取频率并不高。


    基于提供的数字，如果目标是确保最常用的数据在内存分配中得到考虑，那么这个`列存储索引`将需要 18GB 内存，以确保所有 18GB 的热数据在需要时可以驻留在内存中。


    如果那 10GB 的温数据也很重要，那么分配一定量（最多 10GB）的内存将有助于确保数据不会在内存中过于频繁地换入换出，并且在请求时不会取代内存中更重要的热数据。如果资源充足，那么分配完整的
    10GB 将完全完成此任务。否则，负责此数据的组织需要确定温数据的重要性，并分配最多 10GB 的额外内存来覆盖它。例如，如果估计 2020 年后半部分的数据会较定期地被请求，而前半部分使用频率会低得多，那么为这块温数据分配
    5GB 内存将是一个不错的估算。


    剩余的 2017 年至 2019 年的 9GB 数据将不会获得任何内存分配，因为它们很少被读取，其对性能的影响过于罕见，对大多数组织来说无关紧要。如果偶尔的分析或报告造成的干扰足够大，可以考虑增加更多内存以减少这种干扰，但这应该根据具体情况具体分析。'
- fmt: 'This example also illustrates a fairly straightforward growth of about two
    times per year. If this rate of growth is expected to continue and the years with
    warm and hot data are expected to roll forward each year, then in a year, the
    current hot data (18GB) would become warm data, the current warm data (10GB) would
    become cold data, and next year’s data (~35GB) would become the new hot data.
    Therefore, year-over-year growth would be represented by


    *   (35GB + 18GB) - (18GB + 10GB) = `25GB`.


    Note that the size of `columnstore` data used in memory will often not be the
    same as the total data size. A `columnstore` index with 20 columns may not see
    all columns used equally. It is quite possible that some columns may rarely get
    used. If this is the case, then memory estimations can adjust the amount needed
    downward to account for columns that are not needed in memory often. While these
    infrequently queried columns cannot be classified as cold data, they can be discounted
    from memory totals to ensure that memory estimates are not overinflated by segments
    that are rarely needed.


    For example, if the 18GB of data for 2021 included 5GB of columns that are rarely
    queried, then the memory estimate for that data could be reduced from 18GB to
    as little as 13GB, if there is confidence in how infrequently those columns are
    used.


    There is a great deal of estimation that goes into this work. At the absolute
    high end, a memory budget could encompass all space consumed by a `columnstore`
    index. At the lowest level, no memory could be allocated for these analytics.
    A realistic estimation will be somewhere in the middle and will be influenced
    by the performance required of this data and the availability/cost of computing
    resources.


    ## Dictionary Size and Dictionary Pressure


    Dictionary encoding is one of a multitude of ways in which SQL Server can improve
    `columnstore` compression effectiveness. Chapter [5](#521866_1_En_5_Chapter.xhtml)
    discussed encoding methods in detail and how dictionary encoding can be used by
    `columnstore` indexes to greatly reduce index size for columns that have repetitive
    values.


    While dictionaries can be shared across many segments, a caveat to dictionary
    encoding is that they cap at 16 megabytes. As a result, if a column has wide values
    that do not repeat often, then the result may be that a dictionary fills up before
    a `rowgroup` could be completely written. The scenario when a dictionary fills
    up is known as dictionary pressure. While a dictionary is limited to 16MB, dictionary
    pressure will often occur at sizes well below that as the limitation is on how
    much space will be consumed there, rather than how much is currently used.


    When a `columnstore` index experiences dictionary pressure, the `rowgroup` that
    is currently being written to will be closed and a new `rowgroup` will be created
    along with a new dictionary. This has two significant implications:


    *   **Dictionaries Consume Space:** The more dictionaries that are needed to support
    a `columnstore` index, and the larger they are, the more storage space and memory
    are required to read and write to them.

    *   **Undersized Rowgroups Create Fragmentation:** A `rowgroup` may contain up
    to `2^(20)` (1,048,576) rows. When `rowgroup`s are undersized by dictionary pressure
    (well below `2^(20)` rows), then more `rowgroup`s, segments, and dictionaries
    need to be maintained by SQL Server. This in turn wastes resources and slows down
    analytics that need these tables.


    Fortunately, dictionary pressure is easy to diagnose. Once identified, a solution
    can be crafted to resolve it. Consider the `rowgroup` metadata shown in Figure
    [15-5](#521866_1_En_15_Chapter.xhtml#Fig5).


    ![](images/521866_1_En_15_Chapter/521866_1_En_15_Fig5_HTML.jpg)


    Figure 15-5: Example of dictionary pressure


    In this example, `row_group_id` 25 shows a trim reason of `DICTIONARY_SIZE` and
    a row count of 419,432 rows. In this `rowgroup`, SQL Server was loading rows into
    it when the dictionary reached a size where no more entries could be added without
    bringing it over the 16MB cap. If this were the only `rowgroup` like this, then
    dictionary pressure may not be seen as a serious issue. If many `rowgroup`s were
    cut off at row counts this low, then dictionary pressure would without a doubt
    be inhibiting optimal performance and would be worth investigating and resolving.


    There are two primary causes of dictionary pressure:


    *   Columns that are very wide

    *   Columns with many distinct values


    The most common scenarios involving dictionary pressure are derived from columns
    that are both wide and have many distinct values. There is no one-size-fits-all
    solution to the challenge of dictionary pressure. The three most common solutions
    can be considered as the simplest ways of resolving this challenge:


    *   Normalize wide columns into a lookup (dimension) table.

    *   Sort on a different column.

    *   Partition the table.


    ### Normalizing Wide Columns


    The simplest solution requires schema changes and therefore may be disruptive,
    and that is to normalize a wide column that is identified as the source of dictionary
    pressure. Normalizing a column replaces a wide column (often string data) with
    a smaller numeric column. The lookup table would likely be stored using a clustered
    `rowstore` index and a supporting nonclustered `rowstore` index to handle queries
    against the text data.


    When considering a `columnstore` index for a large analytic table, pay close attention
    to any wide columns, and as part of testing, run through the exercise of creating
    a `columnstore` index on the data. Once created, pay attention to `rowgroup` row
    counts and if dictionary pressure is occurring or not. If `rowgroup`s are undersized
    by 10% or more, then consider normalizing the wide column if it is the culprit.


    Lookup tables can contain other metadata that supports efficient searches against
    it, such as hashes, search criteria, or details that can be indexed and used to
    quickly reduce row counts before the text column needs to be interrogated.


    ### Add or Change the Columnstore Sorting Column


    Sometimes the way in which data is sorted within a `columnstore` index lends itself
    to poor dictionary encoding. If a `columnstore` index is unsorted or is sorted
    on a column that tends to group data together alongside nonsimilar values, then
    wider columns might become the source of dictionary pressure.


    The column that a `columnstore` index is ordered on should always be the one that
    is most frequently used to filter queries. If there are a variety of common search
    criteria, then there may be other sorting options that provide better compression
    and performance.


    This solution to dictionary pressure requires before-and-after testing of common
    analytic queries to ensure that one problem (dictionary pressure) is not being
    traded for another (poor analytic query performance).'
