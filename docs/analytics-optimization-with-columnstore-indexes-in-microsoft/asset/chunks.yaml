    此查询评估每个行组中某一列的最小值和最大值边界，并确定是否有任何其他行组的值范围与之重叠。


    图 14-6 所示的查询返回的列表乍一看可能很长，但需要注意的是，任何成为 UPDATE 操作或无序插入目标的列存储索引都会在此处有条目。查看返回的数据，可以看到无序数据相对均匀地分布在各个段中，每个段包含
    1-4 个其他段，这些段至少有一个值与之重叠。


    ![](img/521866_1_En_14_Fig6_HTML.jpg)


    图 14-6


    `Invoice Date Key`列在行组内的重叠值列表


    虽然没有精确的方法来衡量无序数据的百分比，就像可以测量列存储索引中已删除行的百分比那样，但可以通过对列存储索引执行`COUNT(*)`查询来进行元数据测试，从而评估数据顺序对查询性能的影响程度。可以对表中的每个日期执行此操作，这将导致一个非常详尽的实验。为了进行简单演示，将如代码清单
    14-4 中的查询所示，随机选择八个样本日期进行测试。


    ```

    SELECT

    [Invoice Date Key],

    COUNT(*) AS Sale_Count

    FROM Fact.Sale_CCI_ORDERED

    WHERE [Invoice Date Key] IN (''5/1/2013'', ''9/5/2013'', ''1/17/2014'', ''6/30/2014'',
    ''3/14/2015'', ''12/12/2015'', ''1/1/2016'', ''2/29/2016'')

    GROUP BY [Invoice Date Key]

    ORDER BY [Invoice Date Key]

    代码清单 14-4

    用于测试列存储索引中数据有序程度的样本日期

    ```


    图 14-7 中的结果提供了每个日期的行数。


    ![](img/521866_1_En_14_Fig7_HTML.jpg)


    图 14-7


    用于测试列存储数据顺序有效性的样本日期列表


    每个选中的数据点最多包含表中 0.1%的数据，因为总共有 25,109,150 行，而这些日期涵盖了其中的八个。根据行数和表大小，一个理想的有序表应该只需要读取
    1-2 个行组即可检索到任何给定日期的数据。代码清单 14-5 中的查询为之前确定的每个日期执行单独的`COUNT(*)`查询。


    ```

    SET NOCOUNT ON;

    SELECT COUNT(*) FROM Fact.Sale_CCI_ORDERED WHERE [Invoice Date Key] = ''5/1/2013'';

    SELECT COUNT(*) FROM Fact.Sale_CCI_ORDERED WHERE [Invoice Date Key] = ''9/5/2013'';

    SELECT COUNT(*) FROM Fact.Sale_CCI_ORDERED WHERE [Invoice Date Key] = ''1/17/2014'';

    SELECT COUNT(*) FROM Fact.Sale_CCI_ORDERED WHERE [Invoice Date Key] = ''6/30/2014'';

    SELECT COUNT(*) FROM Fact.Sale_CCI_ORDERED WHERE [Invoice Date Key] = ''3/14/2015'';

    SELECT COUNT(*) FROM Fact.Sale_CCI_ORDERED WHERE [Invoice Date Key] = ''12/12/2015'';

    SELECT COUNT(*) FROM Fact.Sale_CCI_ORDERED WHERE [Invoice Date Key] = ''1/1/2016'';

    SELECT COUNT(*) FROM Fact.Sale_CCI_ORDERED WHERE [Invoice Date Key] = ''2/29/2016'';

    代码清单 14-5

    用于测试行组读取的`COUNT`查询

    ```


    图 14-8 显示了前面每个查询的`STATISTICS IO`输出。


    ![](img/521866_1_En_14_Fig8_HTML.jpg)


    图 14-8


    代码清单 14-5 中`COUNT`查询的`STATISTICS IO`输出


    对于八个`COUNT(*)`样本查询中的每一个，都需要读取 3-4 个行组来获取计数。根据已知这些查询应该只读取 1-2 个行组，可以推断查询通常读取的行组数量是必要数量的两到三倍。根据表上更新和无序插入操作的频率，这可能是可以接受的，也可能是异常的。了解表的用法有助于理解这些数字的极端程度，以及读取三个行组而不是一个是否正常或值得关注。


    使用`STATISTICS IO`测试读取和跳过的行组是衡量列存储索引有序程度的有效方法。如果希望对此测试进行得更全面，并对表中的许多（或所有）日期执行计数查询，请考虑将其视为维护工作，并在预定时间运行冗长的维护脚本时进行该项研究。


    ## 无需维护的列存储索引


    理想的列存储索引几乎不需要维护。当满足以下条件时，这是可能的：


    *   行从不被删除。

    *   行从不被更新。

    *   行总是按顺序插入。


    如果这三个条件都能满足，那么列存储索引几乎可以免于所有维护。是否执行任何维护取决于其管理员的意愿。实际上，当列存储索引不是删除、更新或无序插入的目标时，唯一可能产生的次优情况是，由于使用增量存储来处理小的
    INSERT 操作，行组的大小可能不足。


    由使用增量存储导致的行组大小不足影响很小，不应被视为需要立即解决的紧急问题。在这些场景中，等待不频繁的维护时段来执行列存储索引维护就足以有效确保欠大小的行组被有效合并。每季度或每年一次可能就足够了。


    既然已经详细阐述了碎片产生的原因，现在可以讨论使用索引维护操作来解决碎片问题了。'
- fmt: '# Columnstore Reorganize


    The fastest and simplest operation available for a columnstore index is the `REORGANIZE`.
    This is an online operation that accomplishes the following tasks:


    - Combines undersized rowgroups via a columnstore index merge. This occurs when
    multiple rowgroups can combine to fit into a single new rowgroup (less than `1,024,576`
    or `2^(20)` rows).

    - May remove deleted rows via a self-merge. This only happens when more than `102,400`
    rows in a rowgroup are deleted.


    If both of these tasks apply to a set of rowgroups, then a merge operation will
    be prioritized over a self-merge. Rowgroups that were trimmed due to dictionary
    pressure cannot be combined with other rowgroups, regardless of their row counts.


    To demonstrate the merge and self-merge operations that can be used by a columnstore
    `REORGANIZE` operation, a large set of rows will be deleted from a columnstore
    index, as seen in Listing 14-6.


    ```sql

    DELETE

    FROM Fact.Sale_CCI_ORDERED

    WHERE [Invoice Date Key] <= ''1/17/2013'';

    ```


    *Listing 14-6: Query to Delete a Large Portion of a Rowgroup*


    Figure 14-9 shows the resulting set of deleted rows within the columnstore index’s
    rowgroup metadata using the same query as provided in Listing 14-1.


    ![](images/521866_1_En_14_Chapter/521866_1_En_14_Fig9_HTML.jpg)


    *Figure 14-9: Deleted rows per rowgroup for a columnstore index*


    The second column to the right shows total rows in the rowgroup, whereas the rightmost
    column provides the deleted row count. Of the rowgroups with deleted rows, only
    rowgroups `23` and `24` have more than `102,400` rows deleted and would qualify
    for a self-merge operation. These rowgroups are also valid targets for a columnstore
    merge operation as they can be combined, with the resulting rowgroup containing
    less than the row cap (`2^(20)` rows) for a columnstore rowgroup.


    The syntax for a columnstore `REORGANIZE` operation is shown in Listing 14-7.


    ```sql

    ALTER INDEX CCI_fact_Sale_CCI_ORDERED ON Fact.Sale_CCI_ORDERED REORGANIZE;

    ```


    *Listing 14-7: Syntax for a Columnstore Reorganize Operation*


    After the `REORGANIZE` operation is complete, the rowgroup metadata can be reviewed
    again, as shown in Figure 14-10.


    ![](images/521866_1_En_14_Chapter/521866_1_En_14_Fig10_HTML.jpg)


    *Figure 14-10: Rowgroup metadata following an index REORGANIZE operation*


    Note that rowgroups `23` and `24` are now flagged as `TOMBSTONE` and will be cleaned
    up by the tuple mover at some point in the near future. Two new rowgroups were
    created (`25` and `26`) that replace them, with the deleted rows removed. The
    self-merge operation essentially creates new rowgroups, copies all nondeleted
    rows into them, and swaps them in as the active rowgroups while the previous versions
    are flagged for cleanup. The resulting rowgroups are free of the burden of deleted
    rows. Remember that the self-merge only occurs when more than `102,400` rows in
    a rowgroup are deleted.


    After a minute passes, the rowgroup metadata confirms that the rowgroups labeled
    as `TOMBSTONE` are now removed from the columnstore index, as seen in Figure 14-11.
    This is an automatic cleanup process that requires no operator intervention to
    trigger.


    ![](images/521866_1_En_14_Chapter/521866_1_En_14_Fig11_HTML.jpg)


    *Figure 14-11: Rowgroup metadata after the tuple mover removes TOMBSTONE rowgroups*


    Rowgroups can only be combined if the reason they are undersized is not related
    to dictionary pressure. Figure 14-12 shows additional metadata from `sys.dm_db_column_store_row_group_physical_stats`
    for this columnstore index.


    ![](images/521866_1_En_14_Chapter/521866_1_En_14_Fig12_HTML.jpg)


    *Figure 14-12: Rowgroup metadata for a columnstore index, including rowgroup trim
    reason*


    Because rowgroup `25` was trimmed due to dictionary pressure, it cannot be combined
    with rowgroup `26`, even though their combined row counts could fit them into
    a single rowgroup.


    ## Reorganize to Remove Delta Rowgroups


    An additional option is available when issuing a columnstore index `REORGANIZE`
    command: the `COMPRESS_ALL_ROW_GROUPS` option. When used, SQL Server will initialize
    the tuple mover to process the contents of the delta store and move them into
    compressed rowgroups. This effectively empties the delta store, moving all data
    into compressed rowgroups.


    The upside of this operation is that it ensures faster read operations, as there
    is no need to read the rowstore structure of the delta store when processing queries.
    The downside is that it is an additional maintenance option that requires time
    and resources to execute. Consider the `INSERT` operation shown in Listing 14-8.


    ```sql

    INSERT INTO Fact.Sale_CCI_ORDERED

    ([Sale Key], [City Key], [Customer Key], [Bill To Customer Key], [Stock Item Key],
    [Invoice Date Key], [Delivery Date Key],

    [Salesperson Key], [WWI Invoice ID], Description, Package, Quantity, [Unit Price],
    [Tax Rate], [Total Excluding Tax], [Tax Amount],

    Profit, [Total Including Tax], [Total Dry Items], [Total Chiller Items], [Lineage
    Key])

    VALUES

    (   6769, 69490, 0, 0, 26, ''2013-02-10'', ''2013-02-11'', 36, 2081, ''Coffee
    Mug'', ''Each'', 17, 12.42, 8.00, 211.14, 16.89, 75.00, 228.03,

    17, 0, 11);

    ```


    *Listing 14-8: Small INSERT Operation into a Columnstore Index*


    One row is inserted into the columnstore index. Rowgroup metadata can confirm
    the new row that resides in an open delta rowgroup, as seen in Figure 14-13, using
    the same query as in Listing 14-1.


    ![](images/521866_1_En_14_Chapter/521866_1_En_14_Fig13_HTML.jpg)


    *Figure 14-13: Rowgroup metadata for a newly inserted row into a delta rowgroup*


    With a single row in the delta store, a `REORGANIZE` operation will be run using
    the `COMPRESS_ALL_ROW_GROUPS` option, as seen in Listing 14-9.


    ```sql

    ALTER INDEX CCI_fact_Sale_CCI_ORDERED ON Fact.Sale_CCI_ORDERED REORGANIZE WITH
    (COMPRESS_ALL_ROW_GROUPS = ON);

    ```


    *Listing 14-9: REORGANIZE Using the COMPRESS_ALL_ROW_GROUPS option*


    The resulting columnstore metadata after the index maintenance is shown in Figure
    14-14.


    ![](images/521866_1_En_14_Chapter/521866_1_En_14_Fig14_HTML.jpg)


    *Figure 14-14: Rowgroup metadata immediately after index maintenance*


    The metadata shows a single row in a compressed rowgroup, and the old delta store
    set to `TOMBSTONE`, awaiting cleanup. Figure 14-15 shows the rowgroup metadata
    after the `TOMBSTONE` rowgroup is cleaned up.


    ![](images/521866_1_En_14_Chapter/521866_1_En_14_Fig15_HTML.jpg)


    *Figure 14-15: Rowgroup metadata after garbage collection*


    A compressed rowgroup of a single row is silly, so another `REORGANIZE` will be
    executed against the columnstore index. The resulting metadata can be seen in
    Figure 14-16.


    ![](images/521866_1_En_14_Chapter/521866_1_En_14_Fig16_HTML.jpg)


    *Figure 14-16: Rowgroup metadata after undersized rowgroups are combined*


    Rowgroup `25` remains undersized due to dictionary pressure, but rowgroups `26`
    and `28` have been combined into the newly formed rowgroup `29`. The trim reason
    description allows an operator to understand that this rowgroup was created and
    populated via an index `REORGANIZE` operation.


    Index `REORGANIZE` operations are an excellent way to combine undersized rowgroups,
    assuming they do not suffer from dictionary size limitations. They can also remove
    deleted rows, assuming the number of deleted rows is greater than `102,400`. Lastly,
    with the `COMPRESS_ALL_ROW_GROUPS` option, an index `REORGANIZE` can process the
    delta store contents into compressed rowgroups, which can later be combined via
    further `REORGANIZE` operations, if desired.'
  raw: '## Columnstore Reorganize


    The fastest and simplest operation available for a columnstore index is the REORGANIZE.
    This is an online operation that accomplishes the following tasks:


    *   Combines undersized rowgroups via a columnstore index merge. This occurs when
    multiple rowgroups can combine to fit into a single new rowgroup (less than 1,024,576
    or 2^(20) rows).


    *   May remove deleted rows via a self-merge. This only happens when more than
    102,400 rows in a rowgroup are deleted.


    If both of these tasks apply to a set of rowgroups, then a merge operation will
    be prioritized over a self-merge. Rowgroups that were trimmed due to dictionary
    pressure cannot be combined with other rowgroups, regardless of their row counts.


    To demonstrate the merge and self-merge operations that can be used by a columnstore
    REORGANIZE operation, a large set of rows will be deleted from a columnstore index,
    as seen in Listing [14-6](#521866_1_En_14_Chapter.xhtml#PC6)


    ```

    DELETE

    FROM Fact.Sale_CCI_ORDERED

    WHERE [Invoice Date Key] <= ''1/17/2013'';

    Listing 14-6

    Query to Delete a Large Portion of a Rowgroup

    ```


    Figure [14-9](#521866_1_En_14_Chapter.xhtml#Fig9) shows the resulting set of deleted
    rows within the columnstore index’s rowgroup metadata using the same query as
    provided in Listing [14-1](#521866_1_En_14_Chapter.xhtml#PC1).


    ![](images/521866_1_En_14_Chapter/521866_1_En_14_Fig9_HTML.jpg)


    Figure 14-9


    Deleted rows per rowgroup for a columnstore index


    The second column to the right shows total rows in the rowgroup, whereas the rightmost
    column provides the deleted row count. Of the rowgroups with deleted rows, only
    rowgroups 23 and 24 have more than 102,400 rows deleted and would qualify for
    a self-merge operation. These rowgroups are also valid targets for a columnstore
    merge operation as they can be combined, with the resulting rowgroup containing
    less than the row cap (2^(20) rows) for a columnstore rowgroup.


    The syntax for a columnstore REORGANIZE operation is shown in Listing [14-7](#521866_1_En_14_Chapter.xhtml#PC7).


    ```

    ALTER INDEX CCI_fact_Sale_CCI_ORDERED ON Fact.Sale_CCI_ORDERED REORGANIZE;

    Listing 14-7

    Syntax for a Columnstore Reorganize Operation

    ```


    After the REORGANIZE operation is complete, the rowgroup metadata can be reviewed
    again, as shown in Figure [14-10](#521866_1_En_14_Chapter.xhtml#Fig10).


    ![](images/521866_1_En_14_Chapter/521866_1_En_14_Fig10_HTML.jpg)


    Figure 14-10


    Rowgroup metadata following an index REORGANIZE operation


    Note that rowgroups 23 and 24 are now flagged as TOMBSTONE and will be cleaned
    up by the tuple mover at some point in the near future. Two new rowgroups were
    created (25 and 26) that replace them, with the deleted rows removed. The self-merge
    operation essentially creates new rowgroups, copies all nondeleted rows into them,
    and swaps them in as the active rowgroups while the previous versions are flagged
    for cleanup. The resulting rowgroups are free of the burden of deleted rows. Remember
    that the self-merge only occurs when more than 102,400 rows in a rowgroup are
    deleted.


    After a minute passes, the rowgroup metadata confirms that the rowgroups labeled
    as TOMBSTONE are now removed from the columnstore index, as seen in Figure [14-11](#521866_1_En_14_Chapter.xhtml#Fig11).
    This is an automatic cleanup process that requires no operator intervention to
    trigger.


    ![](images/521866_1_En_14_Chapter/521866_1_En_14_Fig11_HTML.jpg)


    Figure 14-11


    Rowgroup metadata after the tuple mover removes TOMBSTONE rowgroups


    Rowgroups can only be combined if the reason they are undersized is not related
    to dictionary pressure. Figure [14-12](#521866_1_En_14_Chapter.xhtml#Fig12) shows
    additional metadata from *sys.dm_db_column_store_row_group_physical_stats* for
    this columnstore index.


    ![](images/521866_1_En_14_Chapter/521866_1_En_14_Fig12_HTML.jpg)


    Figure 14-12


    Rowgroup metadata for a columnstore index, including rowgroup trim reason


    Because rowgroup 25 was trimmed due to dictionary pressure, it cannot be combined
    with rowgroup 26, even though their combined row counts could fit them into a
    single rowgroup.


    ## Reorganize to Remove Delta Rowgroups


    An additional option is available when issuing a columnstore index REORGANIZE
    command: the COMPRESS_ALL_ROW_GROUPS option. When used, SQL Server will initialize
    the tuple mover to process the contents of the delta store and move them into
    compressed rowgroups. This effectively empties the delta store, moving all data
    into compressed rowgroups.


    The upside of this operation is that it ensures faster read operations, as there
    is no need to read the rowstore structure of the delta store when processing queries.
    The downside is that it is an additional maintenance option that requires time
    and resources to execute. Consider the INSERT operation shown in Listing [14-8](#521866_1_En_14_Chapter.xhtml#PC8).


    ```

    INSERT INTO Fact.Sale_CCI_ORDERED

    ([Sale Key], [City Key], [Customer Key], [Bill To Customer Key], [Stock Item Key],
    [Invoice Date Key], [Delivery Date Key],

    [Salesperson Key], [WWI Invoice ID], Description, Package, Quantity, [Unit Price],
    [Tax Rate], [Total Excluding Tax], [Tax Amount],

    Profit, [Total Including Tax], [Total Dry Items], [Total Chiller Items], [Lineage
    Key])

    VALUES

    (   6769, 69490, 0, 0, 26, ''2013-02-10'', ''2013-02-11'', 36, 2081, ''Coffee
    Mug'', ''Each'', 17, 12.42, 8.00, 211.14, 16.89, 75.00, 228.03,

    17, 0, 11);

    Listing 14-8

    Small INSERT Operation into a Columnstore Index

    ```


    One row is inserted into the columnstore index. Rowgroup metadata can confirm
    the new row that resides in an open delta rowgroup, as seen in Figure [14-13](#521866_1_En_14_Chapter.xhtml#Fig13),
    using the same query as in Listing [14-1](#521866_1_En_14_Chapter.xhtml#PC1).


    ![](images/521866_1_En_14_Chapter/521866_1_En_14_Fig13_HTML.jpg)


    Figure 14-13


    Rowgroup metadata for a newly inserted row into a delta rowgroup


    With a single row in the delta store, a REORGANIZE operation will be run using
    the COMPRESS_ALL_ROW_GROUPS option, as seen in Listing [14-9](#521866_1_En_14_Chapter.xhtml#PC9).


    ```

    ALTER INDEX CCI_fact_Sale_CCI_ORDERED ON Fact.Sale_CCI_ORDERED REORGANIZE WITH
    (COMPRESS_ALL_ROW_GROUPS = ON);

    Listing 14-9

    REORGANIZE Using the COMPRESS_ALL_ROW_GROUPS option

    ```


    The resulting columnstore metadata after the index maintenance is shown in Figure
    [14-14](#521866_1_En_14_Chapter.xhtml#Fig14).


    ![](images/521866_1_En_14_Chapter/521866_1_En_14_Fig14_HTML.jpg)


    Figure 14-14


    Rowgroup metadata immediately after index maintenance


    The metadata shows a single row in a compressed rowgroup, and the old delta store
    set to TOMBSTONE, awaiting cleanup. Figure [14-15](#521866_1_En_14_Chapter.xhtml#Fig15)
    shows the rowgroup metadata after the TOMBSTONE rowgroup is cleaned up.


    ![](images/521866_1_En_14_Chapter/521866_1_En_14_Fig15_HTML.jpg)


    Figure 14-15


    Rowgroup metadata after garbage collection


    A compressed rowgroup of a single row is silly, so another REORGANIZE will be
    executed against the columnstore index. The resulting metadata can be seen in
    Figure [14-16](#521866_1_En_14_Chapter.xhtml#Fig16).


    ![](images/521866_1_En_14_Chapter/521866_1_En_14_Fig16_HTML.jpg)


    Figure 14-16


    Rowgroup metadata after undersized rowgroups are combined


    Rowgroup 25 remains undersized due to dictionary pressure, but rowgroups 26 and
    28 have been combined into the newly formed rowgroup 29\. The trim reason description
    allows an operator to understand that this rowgroup was created and populated
    via an index REORGANIZE operation.


    Index REORGANIZE operations are an excellent way to combine undersized rowgroups,
    assuming they do not suffer from dictionary size limitations. They can also remove
    deleted rows, assuming the number of deleted rows is greater than 102,400\. Lastly,
    with the COMPRESS_ALL_ROW_GROUPS option, an index REORGANIZE can process the delta
    store contents into compressed rowgroups, which can later be combined via further
    REORGANIZE operations, if desired.'
  trans: '

    # 列存储索引重组


    对于列存储索引，可用的最快且最简单的操作是 `REORGANIZE`。这是一项联机操作，可完成以下任务：


    -   通过列存储索引合并来组合尺寸过小的行组。当多个行组可以合并到一个新的行组（行数少于 `1,024,576` 或 `2²⁰`）时，就会发生此情况。

    -   可能通过自合并删除已删除的行。这仅在行组中有超过 `102,400` 行被删除时才会发生。


    如果这两项任务都适用于一组行组，则合并操作将优先于自合并操作。由于字典压力而被修剪的行组无法与其他行组合并，无论其行数多少。


    为了演示列存储 `REORGANIZE` 操作可以使用的合并和自合并操作，将从列存储索引中删除大量行，如清单 14-6 所示。


    ```sql

    DELETE

    FROM Fact.Sale_CCI_ORDERED

    WHERE [Invoice Date Key] <= ''1/17/2013'';

    ```

    *清单 14-6: 删除大部分行组的查询*


    图 14-9 显示了使用清单 14-1 中提供的相同查询，列存储索引行组元数据中已删除行的结果集。


    ![](img/521866_1_En_14_Fig9_HTML.jpg)


    *图 14-9: 列存储索引每个行组的已删除行数*


    右侧的第二列显示行组中的总行数，而最右侧的列则提供了已删除的行数。在有已删除行的行组中，只有行组 `23` 和 `24` 的已删除行数超过 `102,400`
    行，符合自合并操作的条件。这些行组也是列存储合并操作的有效目标，因为它们可以被合并，生成的行组包含的行数将少于列存储行组的行数上限（`2²⁰` 行）。


    列存储 `REORGANIZE` 操作的语法如清单 14-7 所示。


    ```sql

    ALTER INDEX CCI_fact_Sale_CCI_ORDERED ON Fact.Sale_CCI_ORDERED REORGANIZE;

    ```

    *清单 14-7: 列存储重组操作的语法*


    `REORGANIZE` 操作完成后，可以再次查看行组元数据，如图 14-10 所示。


    ![](img/521866_1_En_14_Fig10_HTML.jpg)


    *图 14-10: 索引 REORGANIZE 操作后的行组元数据*


    请注意，行组 `23` 和 `24` 现在被标记为 `**墓碑状态**`，并将在不久的将来由元组移动器清理。创建了两个新的行组（`25` 和 `26`）来替代它们，其中已删除的行已被移除。自合并操作本质上会创建新的行组，将所有未删除的行复制到其中，并将它们交换为活动行组，同时将先前的版本标记为待清理。生成的行组不再有已删除行的负担。请记住，自合并仅在行组中有超过
    `102,400` 行被删除时才会发生。


    一分钟后，行组元数据确认标记为 `**墓碑状态**` 的行组已从列存储索引中移除，如图 14-11 所示。这是一个自动清理过程，无需操作员干预即可触发。


    ![](img/521866_1_En_14_Fig11_HTML.jpg)


    *图 14-11: 元组移动器移除墓碑状态行组后的行组元数据*


    只有当行组尺寸过小的原因与字典压力无关时，行组才能被合并。图 14-12 显示了此列存储索引在 `sys.dm_db_column_store_row_group_physical_stats`
    中的额外元数据。


    ![](img/521866_1_En_14_Fig12_HTML.jpg)


    *图 14-12: 列存储索引的行组元数据，包括行组修剪原因*


    因为行组 `25` 是由于字典压力而被修剪的，所以它不能与行组 `26` 合并，即使它们合并后的行数可以使它们放入单个行组。


    ## 重组以移除增量行组


    在发出列存储索引 `REORGANIZE` 命令时，还有一个额外的选项可用：`COMPRESS_ALL_ROW_GROUPS` 选项。使用此选项时，SQL
    Server 将初始化元组移动器来处理增量存储的内容，并将它们移动到压缩行组中。这有效地清空了增量存储，将所有数据移入压缩行组。


    此操作的优点是确保更快的读取操作，因为在处理查询时无需读取增量存储的行存储结构。缺点是，它是一个额外的维护选项，需要时间和资源来执行。考虑清单 14-8 中所示的
    `INSERT` 操作。


    ```sql

    INSERT INTO Fact.Sale_CCI_ORDERED

    ([Sale Key], [City Key], [Customer Key], [Bill To Customer Key], [Stock Item Key],
    [Invoice Date Key], [Delivery Date Key],

    [Salesperson Key], [WWI Invoice ID], Description, Package, Quantity, [Unit Price],
    [Tax Rate], [Total Excluding Tax], [Tax Amount],

    Profit, [Total Including Tax], [Total Dry Items], [Total Chiller Items], [Lineage
    Key])

    VALUES

    (   6769, 69490, 0, 0, 26, ''2013-02-10'', ''2013-02-11'', 36, 2081, ''Coffee
    Mug'', ''Each'', 17, 12.42, 8.00, 211.14, 16.89, 75.00, 228.03,

    17, 0, 11);

    ```

    *清单 14-8: 向列存储索引执行的小型 INSERT 操作*


    一行被插入到列存储索引中。行组元数据可以确认新行驻留在一个打开的增量行组中，如图 14-13 所示，使用的是清单 14-1 中的相同查询。


    ![](img/521866_1_En_14_Fig13_HTML.jpg)


    *图 14-13: 新插入行到增量行组的行组元数据*


    增量存储中只有一行，将使用 `COMPRESS_ALL_ROW_GROUPS` 选项运行 `REORGANIZE` 操作，如清单 14-9 所示。


    ```sql

    ALTER INDEX CCI_fact_Sale_CCI_ORDERED ON Fact.Sale_CCI_ORDERED REORGANIZE WITH
    (COMPRESS_ALL_ROW_GROUPS = ON);

    ```

    *清单 14-9: 使用 COMPRESS_ALL_ROW_GROUPS 选项执行 REORGANIZE*


    索引维护后的列存储元数据如图 14-14 所示。


    ![](img/521866_1_En_14_Fig14_HTML.jpg)


    *图 14-14: 索引维护后立即的行组元数据*


    元数据显示压缩行组中只有一行，旧的增量存储被设置为 `**墓碑状态**`，等待清理。图 14-15 显示了 `**墓碑状态**` 行组被清理后的行组元数据。


    ![](img/521866_1_En_14_Fig15_HTML.jpg)


    *图 14-15: 垃圾回收后的行组元数据*


    只有一个行的压缩行组是愚蠢的，所以将对列存储索引再执行一次 `REORGANIZE`。生成的元数据可以在图 14-16 中看到。


    ![](img/521866_1_En_14_Fig16_HTML.jpg)


    *图 14-16: 尺寸过小的行组合并后的行组元数据*


    行组 `25` 由于字典压力仍然尺寸过小，但行组 `26` 和 `28` 已合并为新形成的行组 `29`。修剪原因描述让操作员了解到该行组是通过索引 `REORGANIZE`
    操作创建和填充的。


    索引 `REORGANIZE` 操作是组合尺寸过小行组的绝佳方法，前提是它们不受字典大小限制的影响。它们也可以删除已删除的行，前提是已删除的行数大于 `102,400`。最后，借助
    `COMPRESS_ALL_ROW_GROUPS` 选项，索引 `REORGANIZE` 可以将增量存储的内容处理到压缩行组中，如果需要，这些行组随后可以通过进一步的
    `REORGANIZE` 操作进行合并。

    '
- fmt: '# Columnstore Index Maintenance


    对于一个非`UPDATE`操作目标且没有乱序插入的列存储索引，使用索引`REORGANIZE`操作将有效地处理大部分碎片，从而无需进行其他常规索引维护任务。最简单的索引维护应用是在每次数据加载后运行索引`REORGANIZE`操作，并包含`COMPRESS_ALL_ROW_GROUPS`选项。这将确保行组保持相对满的状态，并且增量存储会被处理，不会拖慢列存储查询。对于追求完美的用户，可以执行第二次`REORGANIZE`操作，以进一步合并由已处理的增量存储产生的行组。这些是在线、快速且有效的方法，可以在列存储索引通过常规数据加载过程增长时，持续管理碎片。


    # Columnstore Rebuild


    重建列存储索引的功能类似于重建行存储索引。发出`REBUILD`命令时，会创建列存储索引的一个全新副本，替换旧索引。虽然这是一个代价高昂的过程，但其结果是：


    *   行组在可能的情况下被填满至容量。

    *   所有已删除的行都被消除。

    *   所有增量存储都被处理和压缩。

    *   即使之前没有应用过，也会进行Vertipaq优化。


    本质上，`REBUILD`大致等同于使用`CREATE INDEX`语句重新创建一个列存储索引。唯一的区别在于，新的索引构建完成前，现有的索引结构将保持不变。对于在线重建，这确保了在重建操作运行期间，查询可以继续使用列存储索引。


    从SQL Server 2019开始，重建聚集列存储索引只能作为在线操作完成。而非聚集索引无论SQL Server版本如何，都可以在线重建。


    考虑本章最近测试的列存储索引。清单`14-10`中的T-SQL对该索引发出了`REBUILD`命令。


    ```

    ALTER INDEX CCI_fact_Sale_CCI_ORDERED ON Fact.Sale_CCI_ORDERED REBUILD;

    ```


    清单 14-10

    针对聚集列存储索引的`REBUILD`语句


    `REBUILD`操作所需的时间明显长于`REORGANIZE`，因为整个索引必须被完全重新创建。相反，`REORGANIZE`遵循特定的规则来确定要执行的工作，并且通常只操作列存储索引的一小部分。图`14-17`显示了`REBUILD`操作完成后的列存储索引。


    ![](images/521866_1_En_14_Chapter/521866_1_En_14_Fig17_HTML.jpg)


    图 14-17

    列存储索引`REBUILD`后的行组元数据


    `REBUILD`后，列存储索引没有已删除的行，并且行组基本是满的。奇怪的是，最后两个行组（23和24）是尺寸不足的残留物，可以通过索引`REORGANIZE`操作清理掉。图`14-18`中的元数据显示了在`REBUILD`之后索引又进行了一次额外的`REORGANIZE`后的最终结果。


    ![](images/521866_1_En_14_Chapter/521866_1_En_14_Fig18_HTML.jpg)


    图 14-18

    列存储索引`REBUILD`和`REORGANIZE`后的行组元数据


    最终，索引变得非常干净，有23个完全满的行组，以及1个由索引维护操作遗留下来的额外行组。


    索引`REBUILD`操作应不频繁地用于管理以下几种情况之一：


    *   长期累积的尺寸不足的行组，无法通过`REORGANIZE`操作合并。

    *   每个行组少于102,400行的大量已删除行，且无法通过`REORGANIZE`操作处理。

    *   列存储索引中存在大量乱序数据。这必须与重新排序数据的工作结合处理，如下一节所示。


    请注意，当发出索引`REBUILD`时，如果需要，压缩类型可能会更改为列存储归档压缩或从中更改。由于索引`REBUILD`是一个代价高昂的操作，并且在SQL
    Server 2019之前是离线的，因此应注意在维护窗口期间执行重建，此时此类工作对使用此数据的进程来说更容易被接受。


    有时，由于软件版本对基础架构和数据进行了重大更改，数据可能会变得严重碎片化。如果预计会发生这种情况，那么在软件版本发布后安排索引`REBUILD`作为后处理步骤，将是确保即使在破坏性的软件版本发布后，数据仍能持续高效交付给分析流程的绝佳方式。


    `REBUILD`操作可以针对特定分区，从而只重建严重碎片化的数据。对于一个大型列存储索引，其中只有一小部分被频繁写入，这是加速重建并最小化对分析数据用户干扰的绝佳方式。'
  raw: 'For a columnstore index that is not the target of UPDATE operations and does
    not experience out-of-order inserts, using index REORGANIZE operations will handle
    most fragmentation effectively and preclude the need for other regular index maintenance
    tasks. The simplest application of index maintenance is to run an index REORGANIZE
    operation after each data load and include the COMPRESS_ALL_ROW_GROUPS option.
    This will ensure that rowgroups remain relatively full and that delta stores are
    processed and not slowing down columnstore queries. For a stickler that wants
    perfection, a second REORGANIZE operation can be executed to further combine rowgroups
    resulting from processed delta stores. These are online, fast, and effective ways
    to manage fragmentation on an ongoing basis as a columnstore index grows via regular
    data load processes.


    ## Columnstore Rebuild


    Rebuilding a columnstore index functions similarly to rebuilding a rowstore index.
    When a REBUILD is issued, a completely new copy of the columnstore index is created,
    replacing the old index. While an expensive process, the results are


    *   Rowgroups that are filled to capacity, whenever possible.


    *   All deleted rows are eliminated.


    *   All delta stores are processed and compressed.


    *   Vertipaq optimization is applied, even if it previously was not.


    In essence, a REBUILD is roughly equivalent to creating a columnstore index anew
    using a CREATE INDEX statement. The only difference is that the existing index
    structure will remain intact until the new index is built. For ONLINE rebuilds,
    this ensures that queries can continue to use the columnstore index, even as a
    rebuild operation is running.


    Rebuilding a clustered columnstore index can only be accomplished as an online
    operation starting in SQL Server 2019\. Nonclustered indexes can be rebuilt online
    regardless of SQL Server version.


    Consider the columnstore index that has been tested recently in this chapter.
    The T-SQL in Listing [14-10](#521866_1_En_14_Chapter.xhtml#PC10) issues a REBUILD
    against that index.


    ```

    ALTER INDEX CCI_fact_Sale_CCI_ORDERED ON Fact.Sale_CCI_ORDERED REBUILD;

    Listing 14-10

    REBUILD Statement Against a Clustered Columnstore Index

    ```


    A REBUILD operation takes significantly longer than a REORGANIZE as the entire
    index must be re-created in its entirety. Alternatively, a REORGANIZE follows
    specific rules to determine what work to do and will usually only operate on a
    small portion of a columnstore index. Figure [14-17](#521866_1_En_14_Chapter.xhtml#Fig17)
    shows a columnstore index after a REBUILD operation completes.


    ![](images/521866_1_En_14_Chapter/521866_1_En_14_Fig17_HTML.jpg)


    Figure 14-17


    Rowgroup metadata after a columnstore index REBUILD


    After a REBUILD, the columnstore index has no deleted rows, and rowgroups are
    mostly full. Oddly enough, the last two rowgroups (23 and 24) are undersized residuals
    and can be cleaned up via an index REORGANIZE operation. The metadata in Figure
    [14-18](#521866_1_En_14_Chapter.xhtml#Fig18) shows the final results after the
    index is subject to an additional REORGANIZE after the REBUILD.


    ![](images/521866_1_En_14_Chapter/521866_1_En_14_Fig18_HTML.jpg)


    Figure 14-18


    Rowgroup metadata after a columnstore index REBUILD and REORGANIZE


    Finally, the index is pristine, with 23 rowgroups that are completely full and
    1 additional rowgroup that is leftover from the index maintenance operations.


    Index REBUILD operations should be used infrequently to manage one of a few scenarios:


    *   Undersized rowgroups accumulated over a long period of time that cannot be
    combined via REORGANIZE operations.


    *   Extensive deleted rows that number less than 102,400 rows per rowgroup and
    cannot be addressed by REORGANIZE operations.


    *   Large amounts of out-of-order data exist in the columnstore index. This must
    be addressed in conjunction with work to reorder data, as shown in the next section.


    Note that when an index REBUILD is issued, the compression type may be changed
    to or from columnstore archive compression, if needed. Because an index REBUILD
    is an expensive operation and is offline prior to SQL Server 2019, care should
    be taken to execute rebuilds during maintenance windows when such work is more
    tolerable to processes that use this data.


    Sometimes, data can become heavily fragmented via software releases that make
    significant changes to the underlying schema and data. If this is anticipated,
    then scheduling an index REBUILD as a postprocessing step after the software release
    would be an excellent way to ensure that data continues to be efficiently delivered
    to analytic processes, even after a disruptive software release.


    REBUILD operations may target a specific partition, thus allowing only data that
    is heavily fragmented to be rebuilt. For a large columnstore index in which only
    a small portion is actively written to, this is an excellent way to speed up rebuilds
    and minimize disruptions to the users of analytic data.'
  trans: '# 列存储索引维护


    对于一个非`UPDATE`操作目标且没有乱序插入的列存储索引，使用索引`REORGANIZE`操作将有效地处理大部分碎片，从而无需进行其他常规索引维护任务。最简单的索引维护应用是在每次数据加载后运行索引`REORGANIZE`操作，并包含`COMPRESS_ALL_ROW_GROUPS`选项。这将确保行组保持相对满的状态，并且增量存储会被处理，不会拖慢列存储查询。对于追求完美的用户，可以执行第二次`REORGANIZE`操作，以进一步合并由已处理的增量存储产生的行组。这些是在线、快速且有效的方法，可以在列存储索引通过常规数据加载过程增长时，持续管理碎片。


    # 列存储索引重建


    重建列存储索引的功能类似于重建行存储索引。发出`REBUILD`命令时，会创建列存储索引的一个全新副本，替换旧索引。虽然这是一个代价高昂的过程，但其结果是：


    *   行组在可能的情况下被填满至容量。

    *   所有已删除的行都被消除。

    *   所有增量存储都被处理和压缩。

    *   即使之前没有应用过，也会进行 Vertipaq 优化。


    本质上，`REBUILD`大致等同于使用`CREATE INDEX`语句重新创建一个列存储索引。唯一的区别在于，新的索引构建完成前，现有的索引结构将保持不变。对于在线重建，这确保了在重建操作运行期间，查询可以继续使用列存储索引。


    从 SQL Server 2019 开始，重建聚集列存储索引只能作为在线操作完成。而非聚集索引无论 SQL Server 版本如何，都可以在线重建。


    考虑本章最近测试的列存储索引。清单`14-10`中的 T-SQL 对该索引发出了`REBUILD`命令。


    ```

    ALTER INDEX CCI_fact_Sale_CCI_ORDERED ON Fact.Sale_CCI_ORDERED REBUILD;

    ```


    清单 14-10

    针对聚集列存储索引的`REBUILD`语句


    `REBUILD`操作所需的时间明显长于`REORGANIZE`，因为整个索引必须被完全重新创建。相反，`REORGANIZE`遵循特定的规则来确定要执行的工作，并且通常只操作列存储索引的一小部分。图`14-17`显示了`REBUILD`操作完成后的列存储索引。


    ![](img/521866_1_En_14_Fig17_HTML.jpg)


    图 14-17

    列存储索引`REBUILD`后的行组元数据


    `REBUILD`后，列存储索引没有已删除的行，并且行组基本是满的。奇怪的是，最后两个行组（23 和 24）是尺寸不足的残留物，可以通过索引`REORGANIZE`操作清理掉。图`14-18`中的元数据显示了在`REBUILD`之后索引又进行了一次额外的`REORGANIZE`后的最终结果。


    ![](img/521866_1_En_14_Fig18_HTML.jpg)


    图 14-18

    列存储索引`REBUILD`和`REORGANIZE`后的行组元数据


    最终，索引变得非常干净，有 23 个完全满的行组，以及 1 个由索引维护操作遗留下来的额外行组。


    索引`REBUILD`操作应不频繁地用于管理以下几种情况之一：


    *   长期累积的尺寸不足的行组，无法通过`REORGANIZE`操作合并。

    *   每个行组少于 102,400 行的大量已删除行，且无法通过`REORGANIZE`操作处理。

    *   列存储索引中存在大量乱序数据。这必须与重新排序数据的工作结合处理，如下一节所示。


    请注意，当发出索引`REBUILD`时，如果需要，压缩类型可能会更改为列存储归档压缩或从中更改。由于索引`REBUILD`是一个代价高昂的操作，并且在 SQL
    Server 2019 之前是离线的，因此应注意在维护窗口期间执行重建，此时此类工作对使用此数据的进程来说更容易被接受。


    有时，由于软件版本对基础架构和数据进行了重大更改，数据可能会变得严重碎片化。如果预计会发生这种情况，那么在软件版本发布后安排索引`REBUILD`作为后处理步骤，将是确保即使在破坏性的软件版本发布后，数据仍能持续高效交付给分析流程的绝佳方式。


    `REBUILD`操作可以针对特定分区，从而只重建严重碎片化的数据。对于一个大型列存储索引，其中只有一小部分被频繁写入，这是加速重建并最小化对分析数据用户干扰的绝佳方式。'
- fmt: '## Columnstore Reorder and Rebuild


    聚集列存储索引不强制数据顺序。这取决于设计这些表的数据架构师，由他们决定如何排序数据，并确保任何写入该表的过程都强制执行该顺序。有效解决无序列存储数据挑战（无需构建新表和结构）的唯一方法是执行以下任务：


    1.  删除列存储索引。

    2.  创建一个聚集行存储索引，其键列与表的数据顺序匹配。

    3.  使用 `DROP_EXISTING=ON` 选项创建一个新的聚集列存储索引。


    聚集行存储索引用于强制表内容的新数据顺序，而新的列存储索引会替换它，并保留新的数据顺序。


    这是一个昂贵且具有破坏性的过程，从索引被删除到新的列存储索引完全构建完成期间，分析查询将无法利用列存储索引。因此，在维护窗口内实施这个过程是值得的，那时造成干扰更容易被接受。


    清单 [14-11] 中的脚本执行这些操作，将数据从其当前状态重新排序为完全按 `Invoice Date Key` 排序的数据。


    ```

    /*     Step 1 */

    DROP INDEX CCI_fact_Sale_CCI_ORDERED ON Fact.Sale_CCI_ORDERED;

    /*     Step 2 */

    CREATE CLUSTERED INDEX CCI_fact_Sale_CCI_ORDERED ON Fact.Sale_CCI_ORDERED ([Invoice
    Date Key]);

    /*     Step 3 */

    CREATE CLUSTERED COLUMNSTORE INDEX CCI_fact_Sale_CCI_ORDERED ON Fact.Sale_CCI_ORDERED
    WITH (DROP_EXISTING=ON, MAXDOP=1);

    ```

    *清单 14-11 修复聚集列存储索引中数据排序不佳的过程*


    请注意，删除聚集列存储索引不是一个快速的操作。它需要将列存储结构转换为 B 树/堆结构，这比删除聚集行存储索引需要更多的计算资源。


    修复列存储索引数据顺序的过程应保留在碎片化程度高到足以对分析过程产生负面影响的场景中，并且应是一种不频繁的操作。


    如果数据在列存储索引中快速变得无序，那么请考虑改变数据加载过程的操作方式，以通过这些数据加载来减少碎片。以下是实现这一目标的一些有用指南：


    *   移除对列存储索引的所有 `UPDATE` 操作。尽可能在暂存表上执行更新。

    *   避免无序插入数据。使用临时表或暂存表来确保在插入新数据之前数据已正确排序。


    尽管其复杂，但修复无序数据的过程可以逐分区执行，从而允许仅对包含温/热数据的活动分区进行昂贵的索引维护操作。对于具有多个分区的列存储索引，这可以节省大量时间，并减少对分析过程的干扰和停机时间。


    ## Columnstore Index Maintenance by Partition


    重建列存储索引的特定分区的语法如清单 [14-12] 所示。


    ```

    ALTER INDEX CCI_fact_Sale_CCI_PARTITIONED ON Fact.Sale_CCI_PARTITIONED REBUILD
    PARTITION = 5;

    ```

    *清单 14-12 在分区表上重建列存储索引的单个分区的查询*


    在此示例中，如果分区号 5 被确定为唯一包含定期加载/修改数据的分区，那么仅重建该分区将节省大量的维护时间，因为其他分区可以被跳过。


    ## Index Maintenance in Nonclustered Columnstore Indexes


    非聚集列存储索引在索引维护方面的灵活性较低。数据顺序由聚集行存储索引强制执行，因此列存储索引内的数据顺序质量由其对应的聚集行存储索引规定。如果表的聚集行存储索引恰好是列存储索引的排序列，并且该表不受
    `UPDATE` 操作的影响，那么非聚集列存储索引将有效地维护数据顺序。


    否则，非聚集列存储索引的索引维护将类似于聚集列存储索引的维护：


    *   使用 `REORGANIZE` 操作来合并过小的行组，处理增量存储，并消除较大的已删除行组。

    *   使用 `REBUILD` 操作来消除过小的行组，并消除因 `UPDATE` 操作导致的无序数据。


    这里的主要区别在于，`REBUILD` 可以消除由 `UPDATE` 操作产生的无序数据。重建时，非聚集列存储索引将按照聚集行存储索引规定的顺序创建，而聚集行存储索引不会像列存储索引那样受到
    `UPDATE` 操作的负面影响。


    `REORGANIZE` 和 `REBUILD` 操作都可作为非聚集索引的联机操作使用，这为安排定期（或一次性）维护提供了更大的灵活性。这意味着，即使正在重建索引，针对非聚集列存储索引的实时操作分析也可以继续高效进行。


    与聚集列存储索引类似，对非聚集列存储索引的维护可以针对任何或所有分区发出，从而允许对活动数据进行维护，同时可以跳过未更改的数据。


    ## 15. Columnstore Index Performance


    任何数据结构的最终性能衡量标准是数据检索的速度。在列存储索引中，返回数据所需的时间将是以下两个操作的函数：


    *   元数据读取

    *   数据读取


    本章将逐步介绍测量、评估和调整列存储索引查询性能所需的步骤，包括分析查询和写入操作。它还将介绍列存储索引使用和性能优化的其他选项。'
  raw: '## Columnstore Reorder and Rebuild


    Clustered columnstore indexes do not enforce data order. It is up to the data
    architect that designs these tables to determine how to order data and to ensure
    that order is enforced via any processes that write to the table. The only way
    to effectively resolve the challenge of unordered columnstore data (without building
    new tables and structures) is to perform the following tasks:


    1.  Drop the columnstore index.


    2.  Create a clustered rowstore index with key columns that match the data order
    for the table.


    3.  Create a new clustered columnstore index with the DROP_EXISTING=ON option.


    The clustered rowstore index is used to enforce a new data order on the contents
    of the table, whereas the new columnstore index replaces it, retaining the new
    data order.


    This is an expensive and disruptive process that will result in analytic queries
    being unable to take advantage of the columnstore index from the point when the
    index is dropped until the new columnstore index is completely built. Therefore,
    it is a worthwhile process to implement during a maintenance window when causing
    trouble is more acceptable.


    The script in Listing [14-11](#521866_1_En_14_Chapter.xhtml#PC11) performs these
    operations to reorder data from its current state to data that is ordered perfectly
    by Invoice Date Key.


    ```

    /*     Step 1 */

    DROP INDEX CCI_fact_Sale_CCI_ORDERED ON Fact.Sale_CCI_ORDERED;

    /*     Step 2 */

    CREATE CLUSTERED INDEX CCI_fact_Sale_CCI_ORDERED ON Fact.Sale_CCI_ORDERED ([Invoice
    Date Key]);

    /*     Step 3 */

    CREATE CLUSTERED COLUMNSTORE INDEX CCI_fact_Sale_CCI_ORDERED ON Fact.Sale_CCI_ORDERED
    WITH (DROP_EXISTING=ON, MAXDOP=1);

    Listing 14-11

    Process to Fix Poorly Ordered Data in a Clustered Columnstore Index

    ```


    Note that dropping a clustered columnstore index is not a speedy operation. It
    requires converting the columnstore structure into a b-tree/heap structure, which
    requires more computing resources than dropping a clustered rowstore index.


    The process to fix data order on a columnstore index should be reserved for scenarios
    where fragmentation is high enough to negatively impact analytic processes and
    should be an infrequent operation.


    If data becomes unordered quickly in a columnstore index, then consider ways to
    alter how data load processes operate to reduce fragmentation via those data loads.
    The following are a few helpful guidelines for doing so:


    *   Remove all UPDATE operations on columnstore indexes. Perform updates on staging
    tables instead (when possible).


    *   Avoid inserting data out of order. Use temporary or staging tables to ensure
    that data is ordered correctly prior to inserting new data.


    Despite its complexity, the process to fix unordered data can be executed on a
    partition-by-partition basis, thus allowing only active partitions containing
    warm/hot data to be targeted with expensive index maintenance operations. For
    a columnstore index with many partitions, this can save considerable time and
    reduce disruption and downtime to analytic processes.


    ## Columnstore Index Maintenance by Partition


    The syntax to rebuild a specific partition of a columnstore index is shown in
    Listing [14-12](#521866_1_En_14_Chapter.xhtml#PC12).


    ```

    ALTER INDEX CCI_fact_Sale_CCI_PARTITIONED ON Fact.Sale_CCI_PARTITIONED REBUILD
    PARTITION = 5;

    Listing 14-12

    Query to Rebuild a Single Partition of a Columnstore Index on a Partitioned Table

    ```


    In this example, if partition number 5 is identified as the only partition containing
    data that is being loaded/modified regularly, then rebuilding only it will save
    significant maintenance time as the other partitions can be skipped.


    ## Index Maintenance in Nonclustered Columnstore Indexes


    Nonclustered columnstore indexes are afforded less flexibility with regard to
    index maintenance. Data order is enforced by the clustered rowstore index, and
    therefore the quality of data order within a columnstore index is prescribed by
    its corresponding clustered rowstore index. If the table’s clustered rowstore
    index happens to be the ordering column(s) for the columnstore index and that
    table is not subject to UPDATE operations, then the nonclustered columnstore index
    will maintain data order effectively.


    Otherwise, index maintenance for nonclustered columnstore indexes will operate
    similarly to maintenance on clustered columnstore indexes:


    *   Use REORGANIZE operations to combine undersized rowgroups, process the delta
    store, and eliminate larger groups of deleted rows.


    *   Use REBUILD operations to eliminate undersized rowgroups and eliminate unordered
    data due to UPDATE operations.


    The primary difference here is that a REBUILD can eliminate out-of-order data
    resulting from UPDATE operations. When rebuilt, a nonclustered columnstore index
    will be created using the order prescribed by the clustered rowstore index, which
    is not negatively impacted by UPDATE operations in the same way as a columnstore
    index.


    Both REORGANIZE and REBUILD operations are available as online operations for
    nonclustered indexes, providing more flexibility when trying to schedule recurring
    (or one-time) maintenance. This means that real-time operational analytics that
    target a nonclustered columnstore index can continue efficiently, even as that
    index is being rebuilt.


    Like with clustered columnstore indexes, maintenance on nonclustered columnstore
    indexes can be issued against any or all partitions, allowing active data to be
    targeted with maintenance while unchanging data can be skipped.


    # 15. Columnstore Index Performance


    The ultimate measure of performance for any data structure is the speed in which
    data can be retrieved. In columnstore indexes, the time required to return data
    will be a function of two operations:


    *   Metadata reads


    *   Data reads


    This chapter will walk through the steps needed to measure, assess, and tune columnstore
    index query performance, both for analytics and write operations. It will also
    introduce additional options for columnstore index usage and performance optimization.'
  trans: '

    ## 列存储索引的重新排序与重建


    聚集列存储索引并不强制规定数据的物理顺序。这取决于设计这些表的数据架构师，由他们决定如何排序数据，并确保任何写入该表的操作都强制执行该顺序。在不构建新表和结构的前提下，有效解决数据无序存储挑战的唯一方法是执行以下任务：


    1.  删除列存储索引。

    2.  创建一个键列与表的数据顺序匹配的聚集行存储索引。

    3.  使用 `DROP_EXISTING=ON` 选项创建一个新的聚集列存储索引。


    聚集行存储索引用于强制表内容采用新的数据顺序，而新的列存储索引会替换它，并保留这个新的数据顺序。


    这是一个昂贵且具有破坏性的过程。从索引被删除到新的列存储索引完全构建完成期间，分析查询将无法利用列存储索引。因此，在维护窗口内实施这个过程是值得的，那时造成的干扰更容易被接受。


    清单 [14-11] 中的脚本执行这些操作，将数据从其当前状态重新排序为完全按 `Invoice Date Key` 排序的数据。


    ```

    /*     Step 1 */

    DROP INDEX CCI_fact_Sale_CCI_ORDERED ON Fact.Sale_CCI_ORDERED;

    /*     Step 2 */

    CREATE CLUSTERED INDEX CCI_fact_Sale_CCI_ORDERED ON Fact.Sale_CCI_ORDERED ([Invoice
    Date Key]);

    /*     Step 3 */

    CREATE CLUSTERED COLUMNSTORE INDEX CCI_fact_Sale_CCI_ORDERED ON Fact.Sale_CCI_ORDERED
    WITH (DROP_EXISTING=ON, MAXDOP=1);

    ```

    *清单 14-11 修复聚集列存储索引中数据排序不佳的过程*


    请注意，删除聚集列存储索引不是一个快速的操作。它需要将列存储结构转换为 B 树/堆结构，这比删除聚集行存储索引需要更多的计算资源。


    修复列存储索引数据顺序的过程应保留到数据碎片化程度高到足以对分析过程产生负面影响的场景中使用，并且应作为一种不频繁的操作。


    如果数据在列存储索引中快速变得无序，那么请考虑改变数据加载过程的操作方式，以通过这些数据加载来减少碎片。以下是实现这一目标的一些有用指南：


    *   移除对列存储索引的所有 `UPDATE` 操作。尽可能在暂存表上执行更新。

    *   避免无序插入数据。使用临时表或暂存表来确保在插入新数据之前数据已正确排序。


    尽管过程复杂，但修复无序数据的操作可以逐分区执行，从而允许仅对包含温/热数据的活动分区进行昂贵的索引维护操作。对于具有多个分区的列存储索引，这可以节省大量时间，并减少对分析过程的干扰和停机时间。


    ## 按分区进行列存储索引维护


    重建列存储索引的特定分区的语法如清单 [14-12] 所示。


    ```

    ALTER INDEX CCI_fact_Sale_CCI_PARTITIONED ON Fact.Sale_CCI_PARTITIONED REBUILD
    PARTITION = 5;

    ```

    *清单 14-12 在分区表上重建列存储索引的单个分区的查询*


    在此示例中，如果分区号 5 被确定为唯一包含定期加载/修改数据的分区，那么仅重建该分区将节省大量的维护时间，因为其他分区可以被跳过。


    ## 非聚集列存储索引的索引维护


    非聚集列存储索引在索引维护方面的灵活性较低。数据顺序由聚集行存储索引强制执行，因此列存储索引内的数据顺序质量由其对应的聚集行存储索引规定。如果表的聚集行存储索引恰好是列存储索引的排序列，并且该表不受
    `UPDATE` 操作的影响，那么非聚集列存储索引将有效地维护数据顺序。


    否则，非聚集列存储索引的索引维护将类似于聚集列存储索引的维护：


    *   使用 `REORGANIZE` 操作来合并过小的行组，处理增量存储，并消除较大的已删除行组。

    *   使用 `REBUILD` 操作来消除过小的行组，并消除因 `UPDATE` 操作导致的无序数据。


    这里的主要区别在于，`REBUILD` 可以消除由 `UPDATE` 操作产生的无序数据。重建时，非聚集列存储索引将按照聚集行存储索引规定的顺序创建，而聚集行存储索引不会像列存储索引那样受到
    `UPDATE` 操作的负面影响。


    `REORGANIZE` 和 `REBUILD` 操作都可作为非聚集索引的联机操作使用，这为安排定期（或一次性）维护提供了更大的灵活性。这意味着，即使正在重建索引，针对非聚集列存储索引的实时操作分析也可以继续高效进行。


    与聚集列存储索引类似，对非聚集列存储索引的维护可以针对任何或所有分区执行，从而允许对活动数据进行维护，同时可以跳过未更改的数据。


    ## 15. 列存储索引性能


    衡量任何数据结构的最终标准是数据检索的速度。在列存储索引中，返回数据所需的时间将是以下两个操作的函数：


    *   元数据读取

    *   数据读取


    本章将逐步介绍测量、评估和调整列存储索引查询性能所需的步骤，包括分析查询和写入操作。它还将介绍列存储索引使用和性能优化的其他选项。

