    solution, this is likely not an issue, though.


    ### OLAP Data in an OLTP Table in a Transactional Database


    Storing analytic data in OLTP tables is likely a trap. OLTP tables are intended
    for workloads in which small ranges of rows are frequently written and read. In
    these scenarios, many columns are typically requested from those rows. These tables
    are designed to manage concurrency based on the idea that a given transaction
    will involve few rows.


    OLTP tables are counter to analytic data, which often involves queries against
    many rows in aggregate, but usually not as many columns.


    For small tables (less than a few million rows), an OLTP table is adequate for
    analytic data. For larger tables that contain millions or billions of rows, these
    tables will have difficulty in serving up data across large ranges. They will
    likely consume more space and drive slower queries against their data than any
    other analytic solutions discussed here. This is because they are optimized for
    small range lookups (few rows, many columns) and are not architected to service
    the vast row counts and aggregates required for analytics.


    Reserve OLTP tables for small analytic data sets where scanning most (or all)
    of a table is not prohibitively expensive. Alternatively, they can be used for
    lookup tables or other small dimensions. For a previous example in Listing [1-3](#521866_1_En_1_Chapter.xhtml#PC3),
    the *LogSource* table used a SMALLINT to number its rows. With a primary key that
    can contain no more than 65,535 values (-32,767 through 32,767), this table is
    destined to be relatively small. It is compact enough that indexing the text column
    would not be prohibitively expensive, if needed.


    ### OLAP Data in an Analytic Table in a Transactional Database


    The final option for storing analytic data is an OLAP table within a transactional
    database. This is the focus of the remainder of this book and will provide an
    alternative to the solutions presented thus far.


    An OLAP table is a table structure that is designed specifically to service queries
    that typically access a large volume of rows in aggregate, but also do not require
    returning all of the columns at any one given time. An OLAP table is expected
    to grow to be millions or billions of rows and can easily service queries that
    crunch millions of rows at a time with ease.


    There are many benefits to storing analytic data in an OLAP table within SQL Server,
    including the following:


    *   Can use existing technology and licenses to maintain analytic data.


    *   Far smaller learning curve to implement and use.


    *   Data is maintained completely by its owners.


    *   Data can be stored in close proximity to its transactional data source.


    These are not trivial considerations and can make the effort to implement an analytic
    solution fast, inexpensive, and easy to revise, if needed. In addition, performance
    can be measured and optimized as needed to ensure that the end users of analytic
    data enjoy acceptable access speeds. In addition, the processes that load data
    into analytic tables can be fine-tuned to be exceptionally fast.


    Given their simplicity and ease of implementation, it is worthwhile to take the
    time and resources to create a proof of concept for storing analytic data in SQL
    Server, specifically using columnstore indexes.


    Analytic data can be large, consume immense resources, and be challenging to move
    when change is needed. Choosing the correct target data structure for analytic
    data and making the best possible initial decision is critical to the long-term
    success of an analytics project.


    This book will explore in detail the nature of analytic workloads and why columnstore
    indexes in SQL Server can provide a cost-effective and performant solution.'
  trans: '# 数据仓库


    数据仓库是存放 **OLAP**（联机分析处理）数据结构的经典存储库。数十年的经验被用于开发极其高效的数据仓库软件，几乎每个主流数据平台都有其专有的数据仓库解决方案。


    诸如微软的 **Azure Synapse**、亚马逊 **RedShift** 和谷歌 **BigQuery** 等解决方案，是作为数据仓库解决方案的范例。它们旨在与其他这些厂商提供的数据存储组件协同使用。


    使用这些技术的好处在于，它们是**预先构建、开箱即用**的，并且针对分析数据进行了优化。这些系统的缺点是，它们涉及学习一种新的架构、新的脚本语言，并需要获得足够的专业知识以随时间推移进行维护。大型组织通常能够在这方面进行专门化投入，但即便如此，有时为了降低复杂性，人们可能不愿意一开始就选择这些方案。


    # 非结构化数据


    并非所有数据都应该放入 **SQL** 数据库或任何结构化数据源。主要由文本和标记语言组成的数据在事务型数据库的限制下难以进行搜索，即使启用了诸如 **`SQL
    Server`** 的 **`全文搜索`** 等功能。


    当处理的数据是金额、时间或指标时，存储位置有很大的灵活性。但大量的文本和文件更适合存储在**非结构化数据存储库**中，例如基于 **`Hadoop`**、**`Hive`**
    或某个软件供应商提供的类似技术构建的数据湖。


    如果需要一种数据存储解决方案，而源数据又是大型的文本数据，请考虑事务型数据库之外的目的地。虽然本书不旨在探讨这些解决方案，但了解何时应该考虑它们，有助于避免为数据选择了错误的技术架构。


    # 第三方分析软件


    无论是在本地还是云端，都有许多分析软件解决方案可供使用。即使只是列出这些解决方案，也需要花费数小时、占用许多页篇幅，而且很可能还不完整。


    与数据仓库解决方案类似，第三方分析解决方案的主要好处是，它是为特定目的而构建的，并且可以用相对最少的努力来使用。与数据仓库解决方案不同，分析软件在结构、接口和使用方式上差异很大。一个组织的数据分析需求将决定所需解决方案的类型，有些分析软件能满足这些需求，而有些则不能。


    使用第三方供应商的缺点是**成本**和**供应商锁定**。成本通常会随着数据量和/或使用量的增加而上升。因此，一个分析项目可能开始时成本不高，但当数据量增长到初始规模的十倍、百倍甚至百万倍时，最终可能变得相当昂贵。在架构任何数据解决方案时，务必根据当前和未来的需求确定成本。这可以确保当数据及其使用量不可避免地呈数量级增长时，不会出现意外情况。


    供应商锁定也可能带来挑战。将数据导入分析解决方案很容易，但将来是否有完善且便捷的方式将数据提取出来？如果没有，那么迁离该解决方案可能变得成本高昂且耗时。如果这些成本超过了留在该平台上所需的费用，那么组织可能不得不无奈地选择无限期地将其数据保留在那里。不过，对于那些习惯并熟悉特定数据分析解决方案的人来说，这可能不是问题。


    # 在事务型数据库的 **OLTP** 表中存储 **OLAP** 数据


    将分析数据存储在 **OLTP**（联机事务处理）表中很可能是一个陷阱。**OLTP** 表旨在处理频繁写入和读取小范围行的工作负载。在这些场景中，通常需要从这些行中检索许多列。这些表的设计是为了管理并发性，其理念是给定的事务只涉及少数行。


    **OLTP** 表与分析数据的要求是相悖的。分析数据通常涉及针对许多行的聚合查询，但通常不需要返回所有列。


    对于小型表（少于几百万行），**OLTP** 表足以应对分析数据。对于包含数百万或数十亿行的大型表，这些表在提供跨大范围的数据服务时会遇到困难。与任何其他分析解决方案相比，它们可能会消耗更多空间，并导致对其数据的查询速度更慢。这是因为它们是针对小范围查找（少数行，多列）进行优化的，其架构并非为应对分析所需的大规模行数和聚合而设计。


    将 **OLTP** 表保留用于小型分析数据集，在这些场景下扫描表的大部分（或全部）数据不会造成过高的开销。或者，它们可用于查找表或其他小型维度表。例如前面清单
    **1-3** 中的 `LogSource` 表使用 `SMALLINT` 来编号其行。其主键最多只能包含 65,535 个值（-32,767 到 32,767），因此该表注定是相对较小的。它足够紧凑，如果需要，对文本列建立索引也不会带来过高的开销。


    # 在事务型数据库的分析表中存储 **OLAP** 数据


    存储分析数据的最后一个选项是在事务型数据库中使用 **OLAP** 表。这是本书剩余部分的重点，它将提供一种与目前所介绍方案不同的替代方案。


    **OLAP** 表是一种表结构，专门设计用于服务通常需要访问大量行进行聚合的查询，同时不需要在任何时候返回所有列。**OLAP** 表预计将增长到数百万或数十亿行，并且可以轻松地处理一次处理数百万行的查询。


    在 **`SQL Server`** 中使用 **OLAP** 表存储分析数据有许多好处，包括：


    *   可以利用现有技术和许可来维护分析数据。

    *   实施和使用的**学习曲线要小得多**。

    *   数据完全由其所有者维护。

    *   数据可以存储在非常靠近其事务数据源的地方。


    这些并非微不足道的考虑因素，它们可以使分析解决方案的实施变得快速、经济，并且在需要时易于修改。此外，可以按需衡量和优化性能，以确保分析数据的最终用户享有可接受的访问速度。另外，将数据加载到分析表中的过程也可以被精细调整得**异常快速**。


    考虑到其简单性和易于实施的特点，值得投入时间和资源来创建一个概念验证，以测试在 **`SQL Server`** 中使用列存储索引存储分析数据的可行性。


    ```

    分析数据可能规模庞大，消耗大量资源，并且在需要变更时迁移起来颇具挑战。为分析数据选择正确的目标数据结构并做出尽可能最佳的初始决策，对于一个分析项目的长期成功至关重要。


    本书将详细探讨分析工作负载的本质，以及为何 SQL Server 中的列存储索引能够提供一种兼具成本效益和高性能的解决方案。

    ```'
- fmt: "# 2. Transactional vs. Analytic Workloads\n\nTransactional and analytic data\
    \ are fundamentally different in terms of how they are written, read, stored,\
    \ and managed. To achieve optimal performance of either type of data requires\
    \ architecting data structures and software that cater to each of these paradigms.\n\
    \nChoosing the optimal data structure is critical in large, busy production systems\
    \ as the cost to rebuild an existing system is significantly higher than to architect\
    \ it effectively from the start. This chapter explores the differences in these\
    \ workloads and will allow for the effective introduction of `columnstore` indexes\
    \ as the optimal solution for a wide variety of analytic data storage needs.\n\
    \n## Transactional Data\n\nThe data that is readily created, altered, deleted,\
    \ and read by applications is transactional data. This data may not always be\
    \ stored in structured databases or adhere to the mantra of `ACID` transactions\
    \ (**A**tomic, **C**onsistent, **I**solated, **D**urable), but for this discussion,\
    \ it will all be considered transactional data.\n\nConsider an order system that\
    \ handles product orders from a website and a popular mobile app. This is decidedly\
    \ a transactional system. Many people access the site regularly and create orders,\
    \ check their status, and await the arrival of what they’ve ordered. The `WideWorldImporters`\
    \ sample database contains an `Orders` table that is representative of what would\
    \ be seen in a typical order system, as seen in Figure [2-1](#521866_1_En_2_Chapter.xhtml#Fig1).\n\
    \n![](images/521866_1_En_2_Chapter/521866_1_En_2_Fig1_HTML.jpg)\n\nFigure 2-1\n\
    Example of an order table used by a busy order processing system\n\nNote that\
    \ there are many columns, each of which represents a detail of an order, such\
    \ as the salesperson, customer, contact, order date, and purchase order number.\
    \ Regardless of how large this table became over time, the average user would\
    \ usually not want to view more than a handful of rows at a time. The quantity\
    \ of data accessed is typically small as users will rarely view more than current\
    \ or recent orders. If they do, pre-existing filters and links would be built\
    \ to ensure that data can be served up quickly.\n\nOftentimes, many columns are\
    \ returned to the application at one time. When viewing an order, it is far faster\
    \ and efficient to return any column that may be needed rather than be forced\
    \ to return to the table multiple times to retrieve more columns.\n\nBecause users\
    \ are interacting directly with an application, there is an expectation that performance\
    \ will be as fast as possible. Waiting a second or two for an order to process\
    \ would be seen as acceptable, whereas waiting 1 or 2 minutes would result in\
    \ immediate complaints and lost business. Similarly, because many users are accessing\
    \ the site at one time, contention is expected to be high. Since many people will\
    \ be accessing their orders at one time, the tables storing that data need to\
    \ be capable of fast reads and writes, even when thousands (or millions) of orders\
    \ are being accessed at one time.\n\nIn general, transactional queries tend to\
    \ be simple. For example, a user that is retrieving information on a current order\
    \ may do so via the following query:\n\n```sql\nSELECT\n    Orders.OrderID,\n\
    \    Customers.CustomerName,\n    Orders.OrderDate,\n    Orders.ExpectedDeliveryDate,\n\
    \    Orders.CustomerPurchaseOrderNumber,\n    OrderLines.*\nFROM Sales.Orders\n\
    INNER JOIN Sales.Customers\n    ON Customers.CustomerID = Orders.CustomerID\n\
    INNER JOIN Sales.OrderLines\n    ON OrderLines.OrderID = Orders.OrderID\nWHERE\
    \ Customers.CustomerID = 10\n    AND Orders.OrderDate >= '5/20/2016'\n    AND\
    \ Orders.OrderDate < '5/27/2016';\n```\n\nThis is a relatively simple query that\
    \ pulls 5 specific columns, as well as all 12 columns of line-item detail from\
    \ 3 tables. Figure [2-2](#521866_1_En_2_Chapter.xhtml#Fig2) shows the results\
    \ of this query.\n\n![](images/521866_1_En_2_Chapter/521866_1_En_2_Fig2_HTML.jpg)\n\
    \nFigure 2-2\nResults of a sample transactional order query\n\nNote that only\
    \ two rows are returned via a filter on both customer and date. It would be unusual\
    \ for a user of this system to request data on hundreds or thousands of orders\
    \ at once. Viewing so much data at one time would be challenging, and it is unlikely\
    \ that the user interface is built to allow so much data to be retrieved at one\
    \ time anyway.\n\nAny data that is served up by a transactional system needs to\
    \ be accurate at runtime. Someone checking their bank balance needs to get an\
    \ accurate number without exception. This means that data integrity needs to be\
    \ enforced at runtime either by the database, the application, or a combination\
    \ of both. Inaccurate data in a transactional system could have disastrous results\
    \ if the application in question, for example, belongs to a hospital, the military,\
    \ or meteorologists.\n\nSimilarly, if a transactional operation fails, that failure\
    \ needs to be addressed immediately so that that user’s data is not left in an\
    \ uncertain state. If a user renews their passport online, but the payment never\
    \ correctly processes, their application may not be handled as it should be. Worse,\
    \ there may not be an easy way for the user to fix it. Therefore, the ability\
    \ of that system to properly handle each step of that process together as a unit\
    \ is very important. The use of `ACID` for transactional data is heavily dependent\
    \ on the data and its use. A bank cannot afford an inconsistent transaction, but\
    \ a social media site probably can. Similarly, data that is eventually consistent\
    \ will be perfectly acceptable in some organizational models, whereas it would\
    \ be destructive in others.\n\n`OLTP` data is often normalized to assist in ensuring\
    \ relational integrity and the ability to generate lists of lookup values efficiently.\
    \ `Normalization` can save space and memory in transactional applications as more\
    \ verbose text columns are replaced with numeric lookups. It also allows for easy\
    \ lookups within the application by querying the normalized table directly.\n\n\
    In summary, transactional data generally shares these characteristics:\n\n*  \
    \ Often the target of `INSERT`, `UPDATE`, and `DELETE` operations.\n*   Many columns\
    \ are returned at one time, for use by the application.\n*   Volume of data accessed\
    \ by a single user at one time is typically small.\n*   Transaction speed is paramount.\n\
    *   High levels of contention are expected.\n*   Data must be accurate at runtime,\
    \ when needed, without exception.\n*   Accessed by application end users.\n* \
    \  Often normalized.\n\nWhile these characteristics are generally true of transactional\
    \ data, analytic data is quite different and is worth exploring further in detail."
  raw: '# 2. Transactional vs. Analytic Workloads


    Transactional and analytic data are fundamentally different in terms of how they
    are written, read, stored, and managed. To achieve optimal performance of either
    type of data requires architecting data structures and software that cater to
    each of these paradigms.


    Choosing the optimal data structure is critical in large, busy production systems
    as the cost to rebuild an existing system is significantly higher than to architect
    it effectively from the start. This chapter explores the differences in these
    workloads and will allow for the effective introduction of columnstore indexes
    as the optimal solution for a wide variety of analytic data storage needs.


    ## Transactional Data


    The data that is readily created, altered, deleted, and read by applications is
    transactional data. This data may not always be stored in structured databases
    or adhere to the mantra of ACID transactions (**A**tomic, **C**onsistent, **I**solated,
    **D**urable), but for this discussion, it will all be considered transactional
    data.


    Consider an order system that handles product orders from a website and a popular
    mobile app. This is decidedly a transactional system. Many people access the site
    regularly and create orders, check their status, and await the arrival of what
    they’ve ordered. The *WideWorldImporters* sample database contains an *Orders*
    table that is representative of what would be seen in a typical order system,
    as seen in Figure [2-1](#521866_1_En_2_Chapter.xhtml#Fig1).


    ![](images/521866_1_En_2_Chapter/521866_1_En_2_Fig1_HTML.jpg)


    Figure 2-1


    Example of an order table used by a busy order processing system


    Note that there are many columns, each of which represents a detail of an order,
    such as the salesperson, customer, contact, order date, and purchase order number.
    Regardless of how large this table became over time, the average user would usually
    not want to view more than a handful of rows at a time. The quantity of data accessed
    is typically small as users will rarely view more than current or recent orders.
    If they do, pre-existing filters and links would be built to ensure that data
    can be served up quickly.


    Oftentimes, many columns are returned to the application at one time. When viewing
    an order, it is far faster and efficient to return any column that may be needed
    rather than be forced to return to the table multiple times to retrieve more columns.


    Because users are interacting directly with an application, there is an expectation
    that performance will be as fast as possible. Waiting a second or two for an order
    to process would be seen as acceptable, whereas waiting 1 or 2 minutes would result
    in immediate complaints and lost business. Similarly, because many users are accessing
    the site at one time, contention is expected to be high. Since many people will
    be accessing their orders at one time, the tables storing that data need to be
    capable of fast reads and writes, even when thousands (or millions) of orders
    are being accessed at one time.


    In general, transactional queries tend to be simple. For example, a user that
    is retrieving information on a current order may do so via the following query:


    ```

    SELECT

    Orders.OrderID,

    Customers.CustomerName,

    Orders.OrderDate,

    Orders.ExpectedDeliveryDate,

    Orders.CustomerPurchaseOrderNumber,

    OrderLines.*

    FROM Sales.Orders

    INNER JOIN Sales.Customers

    ON Customers.CustomerID = Orders.CustomerID

    INNER JOIN Sales.OrderLines

    ON OrderLines.OrderID = Orders.OrderID

    WHERE Customers.CustomerID = 10

    AND Orders.OrderDate >= ''5/20/2016''

    AND Orders.OrderDate < ''5/27/2016'';

    ```


    This is a relatively simple query that pulls 5 specific columns, as well as all
    12 columns of line-item detail from 3 tables. Figure [2-2](#521866_1_En_2_Chapter.xhtml#Fig2)
    shows the results of this query.


    ![](images/521866_1_En_2_Chapter/521866_1_En_2_Fig2_HTML.jpg)


    Figure 2-2


    Results of a sample transactional order query


    Note that only two rows are returned via a filter on both customer and date. It
    would be unusual for a user of this system to request data on hundreds or thousands
    of orders at once. Viewing so much data at one time would be challenging, and
    it is unlikely that the user interface is built to allow so much data to be retrieved
    at one time anyway.


    Any data that is served up by a transactional system needs to be accurate at runtime.
    Someone checking their bank balance needs to get an accurate number without exception.
    This means that data integrity needs to be enforced at runtime either by the database,
    the application, or a combination of both. Inaccurate data in a transactional
    system could have disastrous results if the application in question, for example,
    belongs to a hospital, the military, or meteorologists.


    Similarly, if a transactional operation fails, that failure needs to be addressed
    immediately so that that user’s data is not left in an uncertain state. If a user
    renews their passport online, but the payment never correctly processes, their
    application may not be handled as it should be. Worse, there may not be an easy
    way for the user to fix it. Therefore, the ability of that system to properly
    handle each step of that process together as a unit is very important. The use
    of ACID for transactional data is heavily dependent on the data and its use. A
    bank cannot afford an inconsistent transaction, but a social media site probably
    can. Similarly, data that is eventually consistent will be perfectly acceptable
    in some organizational models, whereas it would be destructive in others.


    OLTP data is often normalized to assist in ensuring relational integrity and the
    ability to generate lists of lookup values efficiently. Normalization can save
    space and memory in transactional applications as more verbose text columns are
    replaced with numeric lookups. It also allows for easy lookups within the application
    by querying the normalized table directly.


    In summary, transactional data generally shares these characteristics:


    *   Often the target of INSERT, UPDATE, and DELETE operations.


    *   Many columns are returned at one time, for use by the application.


    *   Volume of data accessed by a single user at one time is typically small.


    *   Transaction speed is paramount.


    *   High levels of contention are expected.


    *   Data must be accurate at runtime, when needed, without exception.


    *   Accessed by application end users.


    *   Often normalized.


    While these characteristics are generally true of transactional data, analytic
    data is quite different and is worth exploring further in detail.'
  trans: "\n## 2. 事务型与分析型工作负载\n\n事务型数据和分析型数据在写入、读取、存储和管理方式上存在根本差异。要实现其中任一类数据的最优性能，都需要针对其各自的范式来设计数据结构和软件。\n\
    \n在大型、繁忙的生产系统中，选择最佳数据结构至关重要，因为重建现有系统的成本远高于从一开始就进行有效架构的成本。本章将探讨这些工作负载的差异，并有效引入`列存储`索引作为满足广泛分析型数据存储需求的最优解决方案。\n\
    \n### 事务型数据\n\n应用程序随时创建、修改、删除和读取的数据即为事务型数据。这些数据可能并不总是存储在结构化数据库中，也不一定遵循`ACID`事务（**原子性**、**一致性**、**隔离性**、**持久性**）的原则，但在本文的讨论中，它们都将被视为事务型数据。\n\
    \n考虑一个处理来自网站和热门移动应用订单的订单系统。这显然是一个事务型系统。许多人定期访问该网站并创建订单、查看状态以及等待所订购商品的送达。`WideWorldImporters`示例数据库中包含一个`Orders`表，它代表了典型订单系统中会看到的结构，如图\
    \ 2-1 所示。\n\n![](img/521866_1_En_2_Fig1_HTML.jpg)\n\n图 2-1\n繁忙订单处理系统使用的订单表示例\n\
    \n请注意，该表包含许多列，每一列都代表订单的一个细节，例如销售员、客户、联系人、订购日期和采购订单号。无论该表随时间变得多大，普通用户通常一次只希望查看少量行。访问的数据量通常很小，因为用户很少查看当前或近期订单之外的数据。即使需要，也会通过预先建立的筛选器和链接来确保数据能够快速提供。\n\
    \n通常，应用程序一次会返回许多列。在查看订单时，返回任何可能需要的列比被迫多次返回表来检索更多列要快得多、效率高得多。\n\n由于用户是直接与应用程序交互，因此期望性能尽可能快。等待一两秒完成订单处理可能是可以接受的，而等待一两分钟则会立即引发投诉并导致业务损失。同样，由于许多用户同时访问站点，预期的争用会很高。因为许多人会同时访问他们的订单，所以存储这些数据的表需要能够进行快速读写，即使有成千上万（或数百万）个订单同时被访问也是如此。\n\
    \n一般来说，事务型查询往往比较简单。例如，用户检索当前订单信息可能会使用以下查询：\n\n```sql\nSELECT\n    Orders.OrderID,\n\
    \    Customers.CustomerName,\n    Orders.OrderDate,\n    Orders.ExpectedDeliveryDate,\n\
    \    Orders.CustomerPurchaseOrderNumber,\n    OrderLines.*\nFROM Sales.Orders\n\
    INNER JOIN Sales.Customers\n    ON Customers.CustomerID = Orders.CustomerID\n\
    INNER JOIN Sales.OrderLines\n    ON OrderLines.OrderID = Orders.OrderID\nWHERE\
    \ Customers.CustomerID = 10\n    AND Orders.OrderDate >= '5/20/2016'\n    AND\
    \ Orders.OrderDate < '5/27/2016';\n```\n\n这是一个相对简单的查询，从 3 个表中提取了 5 个特定的列以及所有 12\
    \ 个订单行明细列。图 2-2 显示了此查询的结果。\n\n![](img/521866_1_En_2_Fig2_HTML.jpg)\n\n图 2-2\n\
    示例事务型订单查询的结果\n\n请注意，通过对客户和日期进行筛选，只返回了两行。该系统的用户不太可能一次性请求数百或数千个订单的数据。一次查看如此多的数据将具有挑战性，而且用户界面很可能也未构建为允许一次检索如此多的数据。\n\
    \n事务型系统提供的任何数据在运行时都需要准确无误。检查银行余额的人需要得到一个准确的数字，绝无例外。这意味着数据完整性必须在运行时通过数据库、应用程序或两者结合来强制执行。如果所讨论的应用程序属于医院、军队或气象学家，那么事务型系统中的不准确数据可能会带来灾难性的后果。\n\
    \n同样，如果事务型操作失败，需要立即处理该失败，以免用户的数据处于不确定状态。如果用户在线续签护照，但支付从未正确处理，他们的申请可能得不到应有的处理。更糟糕的是，用户可能没有简单的方法来修复它。因此，该系统能够将流程的每一步作为一个整体单元正确处理的能力非常重要。对于事务型数据使用`ACID`在很大程度上取决于数据及其用途。银行无法承受不一致的事务，但社交媒体网站可能可以。同样，在某些组织模型中最终一致的数据是完全可接受的，而在其他模型中则可能是破坏性的。\n\
    \n`OLTP`（联机事务处理）数据通常经过规范化，以协助确保关系完整性以及高效生成查找值列表。`规范化`可以在事务型应用程序中节省空间和内存，因为更冗长的文本列被数字查找所取代。它还允许通过直接查询规范化表在应用程序中进行轻松查找。\n\
    \n总之，事务型数据通常具有以下特征：\n\n*   通常是`INSERT`、`UPDATE`和`DELETE`操作的目标。\n*   一次返回多列，供应用程序使用。\n\
    *   单个用户一次访问的数据量通常较小。\n*   事务速度至关重要。\n*   预期存在高水平的争用。\n*   数据在运行时需要时必须准确无误，绝无例外。\n\
    *   由应用程序最终用户访问。\n*   通常经过规范化。\n\n虽然这些特征对事务型数据通常是成立的，但分析型数据却大不相同，值得进一步详细探讨。\n"
- fmt: '## Analytic Data


    While transactional data is found in live/busy systems processing orders or bank
    operations, analytic data is found further downstream. This data is most often
    associated with reporting, visualization, and analytics. It is what powers business
    intelligence, data science, and the decision making that drives organizations
    worldwide.


    OLAP systems are fundamentally different from transactional systems. To ensure
    optimal speed and reliability, each needs to be architected, implemented, and
    managed in distinctly different ways.


    Analytics typically require queries that access large batches of data at one time,
    but will need far fewer columns to perform the calculations needed to drive results.
    For example, a common financial request may be to compare revenue for the current
    quarter with revenue from the previous quarter. The calculations needed to drive
    this request would need to access all revenue data for each quarter or have that
    data pre-crunched in a convenient location.


    The following query is an example of an analytic data request that seeks to understand
    order counts and totals over time:


    ```sql

    SELECT

    Date.[Calendar Year] AS Order_Year,

    Date.[Calendar Month Number] AS Order_Month,

    COUNT(*) AS Order_Count,

    SUM(Quantity) AS Quantity_Total,

    SUM([Total Excluding Tax]) AS [Total Excluding Tax]

    FROM Fact.[Order]

    INNER JOIN Dimension.Date

    ON Date.Date = [Order].[Order Date Key]

    WHERE [Order].[Order Date Key] >= ''1/1/2016''

    AND [Order].[Order Date Key] < ''1/1/2017''

    GROUP BY Date.[Calendar Year], Date.[Calendar Month Number]

    ORDER BY Date.[Calendar Year], Date.[Calendar Month Number];

    ```


    Note that only a handful of columns are requested, but that almost 30k orders
    were queried to return the results shown in Figure 2-3.


    ![](images/521866_1_En_2_Chapter/521866_1_En_2_Fig3_HTML.jpg)


    Figure 2-3: Results of a sample analytic query


    A larger OLAP system could easily process millions of rows as a part of a single
    request with similar-looking results. An effective analytic data store needs to
    be able to scale to support millions (or billions) of rows in any given table
    without consuming excessive system resources or queries taking too long to execute.


    Unlike transactional systems where data is written in small batches from many
    sources, analytic data is typically created in larger bulk operations from a limited
    set of organized data load processes. Inserting thousands (or millions) of rows
    at one time needs to be fast and efficient as that will be the norm. The diagram
    in Figure 2-4 illustrates the differences between how data is written in each
    type of system.


    ![](images/521866_1_En_2_Chapter/521866_1_En_2_Fig4_HTML.jpg)


    Figure 2-4: Summary of OLAP vs. OLTP data access patterns


    It is important to note that not all OLTP and OLAP systems behave precisely like
    this, but will generally follow these usage patterns.


    Because analytic data is typically used for reporting, analytics, and data science,
    the need for real-time results is less important. Many analytic processes are
    asynchronous and not directly monitored by the user that will consume the resulting
    data. Because OLAP data changes less often, complex data processing can occur
    prior to data usage, ensuring that there is no need to wait too long for results,
    if the need for interactive reporting is important.


    Similarly, because the number of data sources, users, and apps accessing the data
    is smaller, contention is far less of a challenge. A query may require reading
    millions of rows from a table to return its results, but the quantity of queries
    accessing that table will be orders of magnitude less than a busy transactional
    table.


    Because OLAP data is updated infrequently, the need to maintain relational integrity
    via constraints is lower. The set of new data that is loaded can be independently
    validated and confirmed to be accurate prior to its insertion into an analytic
    table. Foreign keys and constraints may be still used as conveniences for joining
    or reporting, but their use will depend on their impact on load speeds. The decision
    on how to validate analytic data depends on each use case, the nature of its source
    transactional data, and the amount of change that can occur in the OLAP data outside
    of organized data load processes.


    Similarly, architects of OLAP data load processes can take liberties with how
    they handle failures. In transactional applications, failures need to be immediately
    retried or rolled back. There can be no middle ground that could result in bad
    or inconsistent data. A failed analytic load process can be resolved with a more
    brute-force approach such as this:


    1.  Troubleshoot and fix the broken load process.


    2.  Identify and remove all newly loaded data.


    3.  Rerun the load process.


    There is likely no need to preserve any of the partially loaded data, nor is the
    removal of partially loaded data complex, as it is typically time-stamped. Many
    OLAP data load processes will include steps that automatically remove any data
    previously loaded for the same time period. This allows a failed process to be
    rerun without the prerequisite cleanup step.


    The consumers of analytic data are also quite different from those that use transactional
    applications. Whereas an OLTP application may have a wide range of end users that
    regularly interact directly with the software, analytic data consumers tend to
    be analysts, domain experts, and business leaders. Domain experts are people that
    are close enough to the data to understand its meaning and usage. For example,
    a network administrator would be a domain expert for network traffic data, whereas
    a chief financial officer would be a domain expert for quarterly earnings data.
    Domain experts may have a clear understanding of data meaning, but they are less
    likely to be familiar with how that data is stored and processed.


    Unlike OLTP data, analytic data is often denormalized. Lookup tables may be maintained
    for reporting purposes, but not used exclusively as lookups to fact tables. Normalization
    does not always save significant storage or memory resources in OLAP tables. Equally
    important, joining lookup tables during data load processes can greatly increase
    their latency, resulting in longer delays before new analytic data becomes available.
    Most compression algorithms used in mainstream analytic data structures utilize
    dictionary lookups to “normalize” data when it is physically stored. This means
    that repeated values take up far less space than in a transactional table, regardless
    of the column’s specific width. Despite that, dictionaries are limited in size
    and wider data types will pose compression challenges, which will be tackled in
    Chapter 5.


    Analytic data can be summarized as follows:


    *   **Written by large, infrequent, and controlled data load processes.**

    *   **Rows are read in large batches for use in analytics.**

    *   **Less columns are typically read in each operation.**

    *   **Low levels of contention are expected.**

    *   **Data integrity can be enforced via validation, rather than constraints.**

    *   **Accessed by business leaders, analysts, and domain experts.**

    *   **Often denormalized.**


    The characteristics of analytic data are quite different from those of transactional
    data. These different characteristics tend to lead toward using different systems
    to store each.'
