  trans: '

    # 代码变更


    如果压缩延迟和筛选非聚集列存储索引无法有效管理针对 OLTP 表的分析工作负载，那么可能是组织逻辑、代码或两者都需要重新审视。


    如果应用程序或数据库代码能够以支持对同一表进行分析和事务处理工作负载的方式进行改进，那么进行这些更改可以使组织避免构建更复杂且昂贵的 OLAP 解决方案。


    最终，任何分析数据挑战都存在解决方案，但理想的解决方案将是成本最低、同时又最易于未来扩展的解决方案。实时运营分析并不适用于所有工作负载，并且通常会存在一些场景，其中更昂贵、资源更密集的解决方案（如
    AlwaysOn 或复制）才是正确的解决方案。


    ## 非聚集列存储索引的 Vertipaq 优化


    第 5 章详细讨论了列存储压缩。一个重要的问题是，当向聚集列存储索引添加非聚集行存储索引时，未来插入的行将无法受益于 Vertipaq 优化。Vertipaq
    优化会对行进行重新排序，而 SQL Server 在压缩行组时，会将相似的值分组在一起，从而实现更有效的压缩。如果没有此功能可用，新插入的数据压缩效率会降低，随着时间的推移，会浪费存储空间和内存。


    一个合乎逻辑的问题是：“非聚集列存储索引是否受益于 Vertipaq 优化？”为了测试这一点并确定是否使用了 Vertipaq 优化，将向 `Sales.Orders`
    表插入新行，如代码清单 12-14 中的查询所示。


    ```sql

    INSERT INTO Sales.Orders

    (   OrderID, CustomerID, SalespersonPersonID, PickedByPersonID, ContactPersonID,
    BackorderOrderID, OrderDate, ExpectedDeliveryDate, CustomerPurchaseOrderNumber,
    IsUndersupplyBackordered, Comments, DeliveryInstructions, InternalComments, PickingCompletedWhen,
    LastEditedBy, LastEditedWhen)

    SELECT

    73595 + ROW_NUMBER() OVER (ORDER BY OrderID) AS OrderID,

    CustomerID,

    SalespersonPersonID,

    PickedByPersonID,

    ContactPersonID,

    BackorderOrderID,

    OrderDate,

    ExpectedDeliveryDate,

    CustomerPurchaseOrderNumber,

    IsUndersupplyBackordered,

    Comments,

    DeliveryInstructions,

    InternalComments,

    PickingCompletedWhen,

    LastEditedBy,

    LastEditedWhen

    FROM Sales.Orders;

    ```

    代码清单 12-14

    向 `Sales.Orders` 插入行以测试 Vertipaq 优化


    此插入操作使表的大小加倍。完成后，可以执行代码清单 12-15 中的查询以确认非聚集列存储索引内行组的当前状态。


    ```sql

    SELECT

    objects.name AS table_name,

    partitions.partition_number,

    dm_db_column_store_row_group_physical_stats.row_group_id,

    dm_db_column_store_row_group_physical_stats.has_vertipaq_optimization,

    dm_db_column_store_row_group_physical_stats.state_desc

    FROM sys.dm_db_column_store_row_group_physical_stats

    INNER JOIN sys.objects

    ON objects.object_id = dm_db_column_store_row_group_physical_stats.object_id

    INNER JOIN sys.partitions

    ON partitions.object_id = objects.object_id

    AND partitions.partition_number = dm_db_column_store_row_group_physical_stats.partition_number

    AND partitions.index_id = dm_db_column_store_row_group_physical_stats.index_id

    WHERE objects.name = ''Orders''

    ORDER BY dm_db_column_store_row_group_physical_stats.row_group_id;

    ```

    代码清单 12-15

    在大型 `INSERT` 操作后显示列存储行组元数据的查询


    图 12-16 中的结果同时显示了现有的压缩行组和新创建的打开行组。


    ![](img/521866_1_En_12_Fig16_HTML.jpg)


    图 12-16

    大型 `INSERT` 操作后的列存储元数据


    新行组中的数据仍驻留在增量存储中，因为在创建列存储索引时指定了 30 分钟的压缩延迟。为了避免等待 30 分钟让元组移动器处理该行组，将使用代码清单 12-16
    中的 T-SQL 立即启用该进程。


    ```sql

    ALTER INDEX NCCI_Orders ON sales.Orders REORGANIZE WITH (COMPRESS_ALL_ROW_GROUPS
    = ON);

    ```

    代码清单 12-16

    用于使元组移动器处理打开的增量行组的 T-SQL


    图 12-17 中的结果显示了此脚本完成后列存储索引的即时状态。


    ![](img/521866_1_En_12_Fig17_HTML.jpg)


    图 12-17

    打开行组被处理后的列存储元数据


    请注意，新创建的行组 (`row_group_id` = 2) 已被压缩并正在使用 Vertipaq 优化。如果几分钟后再次执行代码清单 12-15 中的元数据脚本，则处于
    TOMBSTONE 状态的行组将被移除，如图 12-18 所示。


    ![](img/521866_1_En_12_Fig18_HTML.jpg)


    图 12-18

    墓碑行组被自动清理后的列存储元数据


    `INSERT` 操作的结果是产生了 2 个行组，一个与列存储索引的初始创建一同创建，另一个是在插入并压缩一组新行时创建的。如本示例所示，Vertipaq
    优化将用于非聚集列存储索引。这对于列存储压缩是一个福音，并确保每个段尽可能高效地压缩，即使它代表的是可能比典型分析表更频繁更改的事务数据。


    正是由于将聚集行存储索引键列包含在非聚集列存储索引中，才使得 Vertipaq 优化得以使用。如果没有包含键列，将无法将列存储索引中的行链接回行存储索引，并且每当数据修改时都需要重建列存储索引。这样的成本将高得令人望而却步。拥有聚集键列可确保非聚集列存储索引中的行可以自由重新排序，而不会有无法轻松链接回聚集索引的风险。

    '
- fmt: '## Testing Nonclustered Columnstore Indexes


    Because mixing analytic and transactional workloads incurs risk, testing is a
    key component of implementing nonclustered columnstore indexes. The following
    is a short list of guidelines to assist in testing nonclustered columnstore indexes.


    *   **Test trickle inserts**. Does inserting lots of single rows or small batches
    of rows perform similarly before and after the nonclustered columnstore index
    was added?

    *   **Test common updates**. Are UPDATE operations used against hot data? If so,
    test their performance before and after the columnstore index addition.

    *   **Test compression delay**. For OLTP rowstore tables, compression delay is
    likely a beneficial option to implement. Test different values of compression
    delay to find a sweet spot where write operations are as efficient as possible
    while generating little fragmentation in the columnstore index.

    *   **Test filters**. If a common delineation of hot data is defined by a column
    or set of columns, then adding a filter to the index can help isolate hot data
    from the data typically used for analytics. Test these carefully to ensure that
    analytic queries can use the index and that the filter columns do not get updated
    often.

    *   **Perform a before and after load test**. When in doubt, a general load test
    of common operations that compares performance before and after the nonclustered
    index is added can be helpful in understanding the impact of the new index. Ideally,
    a nonclustered columnstore index should greatly improve analytic performance while
    not negatively impacting write operations.


    Nonclustered columnstore indexes provide an excellent tool for mixed workloads
    where transactional and analytic queries target a single table or set of tables.
    If the expense of separating OLAP from OLTP is too high, then this can be a cost-effective
    way to manage common analytic queries without the need to make significant architectural
    changes or change application code.


    ## Don’t Forget to Drop Unneeded Indexes!


    Nonclustered columnstore indexes will often be implemented to replace one or many
    nonclustered rowstore indexes that previously serviced analytic queries. When
    this is the case, be certain to test and drop the old covering indexes when they
    are determined to no longer be needed.


    If a nonclustered columnstore index can replace many covering rowstore indexes,
    then its addition may very well save computing resources after all of the old,
    unneeded indexes are dropped. The query in Listing [12-17](#521866_1_En_12_Chapter.xhtml#PC17)
    returns index usage statistics for a given table.


    ```sql

    SELECT

    tables.name AS TableName,

    indexes.name AS IndexName,

    dm_db_index_usage_stats.user_seeks,

    dm_db_index_usage_stats.user_scans,

    dm_db_index_usage_stats.user_lookups,

    dm_db_index_usage_stats.user_updates,

    dm_db_index_usage_stats.last_user_seek,

    dm_db_index_usage_stats.last_user_scan,

    dm_db_index_usage_stats.last_user_lookup,

    dm_db_index_usage_stats.last_user_update

    FROM sys.dm_db_index_usage_stats

    INNER JOIN sys.tables

    ON tables.object_id = dm_db_index_usage_stats.object_id

    INNER JOIN sys.indexes

    ON indexes.object_id = dm_db_index_usage_stats.object_id

    AND indexes.index_id = dm_db_index_usage_stats.index_id

    WHERE tables.name = ''Orders''

    ```


    Listing 12-17

    Script That Returns Index Usage Data for One Table


    The results are provided in Figure [12-19](#521866_1_En_12_Chapter.xhtml#Fig19).


    ![](images/521866_1_En_12_Chapter/521866_1_En_12_Fig19_HTML.jpg)


    Figure 12-19

    Index usage statistics output


    The data returned by `sys.dm_db_index_usage_stats` is reset when SQL Server restarts,
    so it is important to either persist it somewhere permanent or take regular snapshots
    of it. Using the information returned, it can be quickly determined how often
    an index is used for reads (seeks, scans, lookups) vs. writes (updates). An index
    with zero or few reads over a long period of time can be safely dropped. Indexes
    with more frequent reads would need additional review to determine the impact
    of dropping them on the queries that regularly use them.


    To summarize, the goal of secondary indexes on a clustered rowstore table is to
    produce the simplest, most compact and efficient solution possible. For analytic
    queries with a predictable and often repeated structure, nonclustered covering
    rowstore indexes an be sufficient to provide good performance with minimal change.


    If analytic needs against rowstore tables are more diverse in structure, then
    a single nonclustered columnstore index can be a far more efficient way to cover
    them than creating many nonclustered rowstore indexes.


    If filters can be applied to any secondary or covering indexes (rowstore or columnstore),
    then doing so can reduce their size and improve performance further by avoiding
    hot data that is written to often.


    # 13. Nonclustered Rowstore Indexes on Columnstore Tables


    Clustered columnstore indexes provide effective enough compression and data access
    speeds that most typical analytic workloads will not require any other indexes
    to provide adequate performance.


    The key to this performance lies in the underlying data order for a given analytic
    table. As long as queries using that data are able to filter based on the dimension
    that the data is ordered by (typically time), they can benefit from rowgroup elimination.
    For unusual queries that slice the data by other dimensions, the result will often
    be a full scan of the columnstore index. For large tables, this is prohibitively
    expensive and will necessitate another solution to help in optimizing these workloads.'
  raw: '## Testing Nonclustered Columnstore Indexes


    Because mixing analytic and transactional workloads incurs risk, testing is a
    key component of implementing nonclustered columnstore indexes. The following
    is a short list of guidelines to assist in testing nonclustered columnstore indexes.


    *   **Test trickle inserts**. Does inserting lots of single rows or small batches
    of rows perform similarly before and after the nonclustered columnstore index
    was added?


    *   **Test common updates**. Are UPDATE operations used against hot data? If so,
    test their performance before and after the columnstore index addition.


    *   **Test compression delay**. For OLTP rowstore tables, compression delay is
    likely a beneficial option to implement. Test different values of compression
    delay to find a sweet spot where write operations are as efficient as possible
    while generating little fragmentation in the columnstore index.


    *   **Test filters**. If a common delineation of hot data is defined by a column
    or set of columns, then adding a filter to the index can help isolate hot data
    from the data typically used for analytics. Test these carefully to ensure that
    analytic queries can use the index and that the filter columns do not get updated
    often.


    *   **Perform a before and after load test**. When in doubt, a general load test
    of common operations that compares performance before and after the nonclustered
    index is added can be helpful in understanding the impact of the new index. Ideally,
    a nonclustered columnstore index should greatly improve analytic performance while
    not negatively impacting write operations.


    Nonclustered columnstore indexes provide an excellent tool for mixed workloads
    where transactional and analytic queries target a single table or set of tables.
    If the expense of separating OLAP from OLTP is too high, then this can be a cost-effective
    way to manage common analytic queries without the need to make significant architectural
    changes or change application code.


    ## Don’t Forget to Drop Unneeded Indexes!


    Nonclustered columnstore indexes will often be implemented to replace one or many
    nonclustered rowstore indexes that previously serviced analytic queries. When
    this is the case, be certain to test and drop the old covering indexes when they
    are determined to no longer be needed.


    If a nonclustered columnstore index can replace many covering rowstore indexes,
    then its addition may very well save computing resources after all of the old,
    unneeded indexes are dropped. The query in Listing [12-17](#521866_1_En_12_Chapter.xhtml#PC17)
    returns index usage statistics for a given table.


    ```

    SELECT

    tables.name AS TableName,

    indexes.name AS IndexName,

    dm_db_index_usage_stats.user_seeks,

    dm_db_index_usage_stats.user_scans,

    dm_db_index_usage_stats.user_lookups,

    dm_db_index_usage_stats.user_updates,

    dm_db_index_usage_stats.last_user_seek,

    dm_db_index_usage_stats.last_user_scan,

    dm_db_index_usage_stats.last_user_lookup,

    dm_db_index_usage_stats.last_user_update

    FROM sys.dm_db_index_usage_stats

    INNER JOIN sys.tables

    ON tables.object_id = dm_db_index_usage_stats.object_id

    INNER JOIN sys.indexes

    ON indexes.object_id = dm_db_index_usage_stats.object_id

    AND indexes.index_id = dm_db_index_usage_stats.index_id

    WHERE tables.name = ''Orders''

    Listing 12-17

    Script That Returns Index Usage Data for One Table

    ```


    The results are provided in Figure [12-19](#521866_1_En_12_Chapter.xhtml#Fig19).


    ![](images/521866_1_En_12_Chapter/521866_1_En_12_Fig19_HTML.jpg)


    Figure 12-19


    Index usage statistics output


    The data returned by *sys.dm_db_index_usage_stats* is reset when SQL Server restarts,
    so it is important to either persist it somewhere permanent or take regular snapshots
    of it. Using the information returned, it can be quickly determined how often
    an index is used for reads (seeks, scans, lookups) vs. writes (updates). An index
    with zero or few reads over a long period of time can be safely dropped. Indexes
    with more frequent reads would need additional review to determine the impact
    of dropping them on the queries that regularly use them.


    To summarize, the goal of secondary indexes on a clustered rowstore table is to
    produce the simplest, most compact and efficient solution possible. For analytic
    queries with a predictable and often repeated structure, nonclustered covering
    rowstore indexes an be sufficient to provide good performance with minimal change.


    If analytic needs against rowstore tables are more diverse in structure, then
    a single nonclustered columnstore index can be a far more efficient way to cover
    them than creating many nonclustered rowstore indexes.


    If filters can be applied to any secondary or covering indexes (rowstore or columnstore),
    then doing so can reduce their size and improve performance further by avoiding
    hot data that is written to often.


    # 13. Nonclustered Rowstore Indexes on Columnstore Tables


    Clustered columnstore indexes provide effective enough compression and data access
    speeds that most typical analytic workloads will not require any other indexes
    to provide adequate performance.


    The key to this performance lies in the underlying data order for a given analytic
    table. As long as queries using that data are able to filter based on the dimension
    that the data is ordered by (typically time), they can benefit from rowgroup elimination.
    For unusual queries that slice the data by other dimensions, the result will often
    be a full scan of the columnstore index. For large tables, this is prohibitively
    expensive and will necessitate another solution to help in optimizing these workloads.'
  trans: '

    ## 测试非聚集列存储索引


    由于混合分析型和事务型工作负载会带来风险，因此在实施非聚集列存储索引时，测试是一个关键环节。以下是一份简短的指导原则清单，以协助测试非聚集列存储索引。


    *   **测试 trickle 插入**。在添加非聚集列存储索引前后，插入大量单行或小批次行的性能表现是否相似？

    *   **测试常见更新操作**。UPDATE 操作是否应用于热点数据？如果是，请在添加列存储索引前后测试其性能。

    *   **测试压缩延迟**。对于 OLTP 行存储表，压缩延迟很可能是一个有益的可选配置。测试不同的压缩延迟值，以找到一个最佳平衡点，使得写入操作尽可能高效，同时在列存储索引中产生最少的碎片。

    *   **测试筛选器**。如果热点数据的常见界定是由一列或多列定义的，那么向索引添加筛选器可以帮助将热点数据与通常用于分析的数据隔离开来。仔细测试这些筛选器，以确保分析查询能够使用该索引，并且筛选列不会被频繁更新。

    *   **执行负载前后对比测试**。如有疑问，对常见操作进行全面的负载测试，比较添加非聚集索引前后的性能，有助于理解新索引的影响。理想情况下，非聚集列存储索引应能显著提升分析性能，同时不会对写入操作产生负面影响。


    非聚集列存储索引为事务型和分析型查询都针对单个表或一组表的混合工作负载提供了一个出色的工具。如果将 OLAP 与 OLTP 分离的成本过高，那么这可能是一种经济高效的方式，可以在无需进行重大架构更改或更改应用程序代码的情况下管理常见的分析查询。


    ## 不要忘记删除不需要的索引！


    非聚集列存储索引通常用于替换先前服务于分析查询的一个或多个非聚集行存储索引。在这种情况下，请务必在确定旧的覆盖索引不再需要时，对其进行测试并将其删除。


    如果一个非聚集列存储索引可以替换许多覆盖行存储索引，那么在所有旧的、不需要的索引被删除后，它的添加很可能节省计算资源。清单 12-17 中的查询返回给定表的索引使用统计信息。


    ```sql

    SELECT

    tables.name AS TableName,

    indexes.name AS IndexName,

    dm_db_index_usage_stats.user_seeks,

    dm_db_index_usage_stats.user_scans,

    dm_db_index_usage_stats.user_lookups,

    dm_db_index_usage_stats.user_updates,

    dm_db_index_usage_stats.last_user_seek,

    dm_db_index_usage_stats.last_user_scan,

    dm_db_index_usage_stats.last_user_lookup,

    dm_db_index_usage_stats.last_user_update

    FROM sys.dm_db_index_usage_stats

    INNER JOIN sys.tables

    ON tables.object_id = dm_db_index_usage_stats.object_id

    INNER JOIN sys.indexes

    ON indexes.object_id = dm_db_index_usage_stats.object_id

    AND indexes.index_id = dm_db_index_usage_stats.index_id

    WHERE tables.name = ''Orders''

    ```


    清单 12-17

    返回单个表索引使用数据的脚本


    结果如图 12-19 所示。


    ![](img/521866_1_En_12_Fig19_HTML.jpg)


    图 12-19

    索引使用统计信息输出


    `sys.dm_db_index_usage_stats` 返回的数据会在 SQL Server 重启时重置，因此将其持久化存储在某个永久位置或定期拍摄快照非常重要。利用返回的信息，可以快速确定一个索引用于读取（查找、扫描、查找）的频率与用于写入（更新）的频率相比如何。长时间内读取次数为零或极少的索引可以安全删除。读取更频繁的索引则需要进一步评估，以确定删除它们对经常使用它们的查询的影响。


    总而言之，在聚集行存储表上创建二级索引的目标是产生尽可能简单、紧凑和高效的解决方案。对于结构可预测且经常重复的分析查询，非聚集覆盖行存储索引足以在最小改动的情况下提供良好的性能。


    如果针对行存储表的分析需求在结构上更加多样化，那么单个非聚集列存储索引可能是覆盖这些需求的一种高效得多的方法，这胜过创建许多非聚集行存储索引。


    如果可以对任何二级或覆盖索引（行存储或列存储）应用筛选器，那么这样做可以减小它们的大小，并通过避免频繁写入的热点数据来进一步提升性能。


    # 13. 列存储表上的非聚集行存储索引


    聚集列存储索引提供了足够有效的压缩和数据访问速度，使得大多数典型的分析工作负载无需任何其他索引即可获得足够的性能。


    这种性能的关键在于给定分析表底层数据的排序方式。只要使用该数据的查询能够基于数据排序所依据的维度（通常是时间）进行筛选，它们就能受益于行组消除。对于按其他维度切分数据的非常规查询，结果通常是对列存储索引进行完全扫描。对于大表而言，这代价高昂，将需要另一种解决方案来帮助优化这些工作负载。

    '
- fmt: '## 使用非聚集行存储索引


    第10章详细回顾了数据顺序在实现行组消除方面的重要性。当数据按某个维度排序，并且分析查询在该维度上进行筛选时，SQL Server 可以使用列存储元数据自动过滤掉不需要的行组。


    可以在聚集列存储表上创建非聚集行存储索引，为那些不遵循数据排序方式的常见查询提供额外支持。向聚集列存储索引添加辅助索引时必须谨慎。本章剩余部分将讨论在需要时如何最佳使用非聚集行存储索引，以及维护它们的最佳实践。


    考虑一个在表 `Fact.Sale_CCI_OrderED` 上创建的聚集列存储索引，该索引按 `Invoice Date Key` 列排序。该表的架构设计旨在通过
    `Invoice Date Key` 列提供的时间维度进行筛选和聚合。清单 13-1 中的查询是一个分析查询，它利用了这种自然的数据顺序。


    ```

    SELECT

    COUNT(*),

    SUM(Quantity) AS total_quantity

    FROM Fact.Sale_CCI_ORDERED

    WHERE [Invoice Date Key] >= ''11/1/2015''

    AND [Invoice Date Key] < ''1/1/2016'';

    ```

    清单 13-1

    利用有序聚集列存储索引的时间维度进行筛选和聚合的查询


    执行后，结果返回得相当快。图 13-1 显示了 `STATISTICS IO` 的输出。


    ![图 13-1：针对有序聚集列存储索引查询的统计 IO 输出](images/521866_1_En_13_Chapter/521866_1_En_13_Fig1_HTML.jpg)

    图 13-1

    针对有序聚集列存储索引查询的统计 IO 输出


    注意，段报告显示读取了 4 个段，跳过了 21 个段。此外，考虑到该表包含 2500 万行，逻辑读取次数相当低。这两点都是行组消除被有效使用的指标，有助于确保只需要读取表的一小部分即可处理查询并返回结果。


    只要分析查询的筛选条件、排序和聚合与表所依据的列对齐，就可以预期获得这样的性能。考虑清单 13-2 中提供的非常不同的查询。


    ```

    SELECT

    COUNT(*),

    SUM(Quantity) AS total_quantity

    FROM Fact.Sale_CCI_ORDERED

    WHERE [Stock Item Key] = 186;

    ```

    清单 13-2

    不使用表自然排序的分析查询


    此查询使用 `Stock Item Key` 作为筛选条件来计算数量。由于表是按 `Invoice Date Key` 排序的，SQL Server 没有自然的方法来实现行组消除。图
    13-2 显示了此查询的 `STATISTICS IO` 输出。


    ![图 13-2：针对有序聚集列存储索引中无序列的查询统计 IO 输出](images/521866_1_En_13_Chapter/521866_1_En_13_Fig2_HTML.jpg)

    图 13-2

    针对有序聚集列存储索引中无序列的查询统计 IO 输出


    这一次，读取了列存储索引中的所有行组，没有跳过任何行组。这种性能可以归因于表中 `Stock Item Key` 总共有 227 个值，但这些值分散在所有行组中，没有任何特定顺序。清单
    13-3 提供了返回列存储索引中 `Stock Item Key` 列内容元数据的查询。


    ```

    SELECT

    tables.name AS table_name,

    indexes.name AS index_name,

    columns.name AS column_name,

    partitions.partition_number,

    column_store_segments.segment_id,

    column_store_segments.min_data_id,

    column_store_segments.max_data_id,

    column_store_segments.row_count

    FROM sys.column_store_segments

    INNER JOIN sys.partitions

    ON column_store_segments.hobt_id = partitions.hobt_id

    INNER JOIN sys.indexes

    ON indexes.index_id = partitions.index_id

    AND indexes.object_id = partitions.object_id

    INNER JOIN sys.tables

    ON tables.object_id = indexes.object_id

    INNER JOIN sys.columns

    ON tables.object_id = columns.object_id

    AND column_store_segments.column_id = columns.column_id

    WHERE tables.name = ''Sale_CCI_ORDERED''

    AND columns.name = ''Stock Item Key''

    ORDER BY tables.name, columns.name, column_store_segments.segment_id;

    ```

    清单 13-3

    返回 Stock Item Key 列元数据的查询


    图 13-3 提供了此查询的输出，显示了每个行组 `Stock Item Key` 的最小值和最大值。


    ![图 13-3：Stock Item Key 列的列存储段元数据](images/521866_1_En_13_Chapter/521866_1_En_13_Fig3_HTML.jpg)

    图 13-3

    Stock Item Key 列的列存储段元数据


    查看此段元数据时，可以明显看出每个行组的 `Stock Item Key` 值范围都同样广泛，因此 SQL Server 无法有效地使用元数据来通过此列进行筛选。值得注意的是，查询大于
    219 的值将允许进行一些行组消除，因为某些行组的 `max_data_id` 是 219，而不是 227 或 225。忽略这个小细节，可以安全地说，大多数筛选
    `Stock Item Key` 的查询都将被迫扫描列存储索引中的所有行组才能返回结果。


    如果筛选 `Stock Item Key` 的查询很频繁，并且它们当前的性能慢得无法接受，那么解决此挑战的一个方案是在列存储索引之上实现一个非聚集行存储覆盖索引。为了覆盖此处展示的查询，有必要按
    `Stock Item Key` 排序并包含 `Quantity`。清单 13-4 中的查询创建了这个索引。


    ```

    CREATE NONCLUSTERED INDEX IX_Sale_CCI_ORDERED

    ON Fact.Sale_CCI_ORDERED ([Stock Item Key]) INCLUDE (Quantity);

    ```

    清单 13-4

    创建覆盖行存储索引的查询


    索引创建查询大约需要 45 秒完成。完成后，执行清单 13-2 中的示例查询会产生新的执行计划和新的 I/O，如图 13-4 所示。


    ![图 13-4：使用覆盖索引时的查询执行计划和 I/O](images/521866_1_En_13_Chapter/521866_1_En_13_Fig4_HTML.jpg)

    图 13-4

    使用覆盖索引时的查询执行计划和 I/O


    SQL Server 完全使用覆盖索引来执行查询，导致 394 次读取和对新索引的一次索引查找。此 I/O 略高于前一个示例，但这不应是确定索引策略时的唯一决策指标。查询执行速度也极快。使用非聚集行存储索引有几个关键优势：


    *   快速、可预测的执行时间，无论查询参数如何。

    *   针对覆盖索引的查询读取不会与针对聚集列存储索引的查询产生争用。

    *   可预测的执行计划和 I/O。


    覆盖非聚集行存储索引的优势完全体现在读取方面。在决定创建此类覆盖索引之前，必须了解其缺点：


    *   写入时间会变慢，因为需要填充非聚集索引并将其映射到聚集列存储索引。

    *   当存在任何非聚集行存储索引时，不会使用 Vertipaq 优化。到聚集列存储索引的映射过程使得重新排序行成为一个效率低下的过程，无法在运行时执行。'
  raw: '## Using Nonclustered Rowstore Indexes


    Chapter [10](#521866_1_En_10_Chapter.xhtml) reviewed in detail the importance
    of data order in allowing for rowgroup elimination. When data is ordered by a
    dimension and analytic queries filter on that dimension, SQL Server can use columnstore
    metadata to automatically filter out unneeded rowgroups.


    Nonclustered rowstore indexes can be created on clustered columnstore tables to
    provide additional support for common queries that do not follow along with the
    ordering of the data. Care must be taken when adding supporting indexes to a clustered
    columnstore index. The remainder of this chapter will discuss how nonclustered
    rowstore indexes can be best used when needed, as well as best practices for maintaining
    them.


    Consider a clustered columnstore index on the table *Fact.Sale_CCI_Ordered* that
    is ordered by the column *Invoice Date Key*. This table is architected for filtering
    and aggregation across the time dimension provided by the column *Invoice Date
    Key*. The query in Listing [13-1](#521866_1_En_13_Chapter.xhtml#PC1) provides
    an analytic query that takes advantage of this natural data order.


    ```

    SELECT

    COUNT(*),

    SUM(Quantity) AS total_quantity

    FROM Fact.Sale_CCI_ORDERED

    WHERE [Invoice Date Key] >= ''11/1/2015''

    AND [Invoice Date Key] < ''1/1/2016'';

    Listing 13-1

    Query That Filters and Aggregates Across the Time Dimension of an Ordered Clustered
    Columnstore Index

    ```


    When executed, the result is returned quite quickly. Figure [13-1](#521866_1_En_13_Chapter.xhtml#Fig1)
    shows the output of STATISTICS IO.


    ![](images/521866_1_En_13_Chapter/521866_1_En_13_Fig1_HTML.jpg)


    Figure 13-1


    Statistics IO output for a query against an ordered clustered columnstore index


    Note that the segment report shows 4 segments read and 21 skipped. In addition,
    the logical reads are quite low given that this table contains 25 million rows.
    Both of these are indicators that rowgroup elimination was used effectively and
    helped ensure that only a small slice of the table needed to be read in order
    to process the query and return results.


    So long as the analytic queries line up filters, ordering, and aggregation with
    the column(s) that the table is ordered by, then performance like this is to be
    expected. Consider the very different query provided in Listing [13-2](#521866_1_En_13_Chapter.xhtml#PC2).


    ```

    SELECT

    COUNT(*),

    SUM(Quantity) AS total_quantity

    FROM Fact.Sale_CCI_ORDERED

    WHERE [Stock Item Key] = 186;

    Listing 13-2

    Analytic Query That Does Not Use a Table’s Natural Ordering

    ```


    This query calculates quantity using *Stock Item Key* as the filter. Since the
    table is ordered by *Invoice Date Key*, SQL Server has no natural way to achieve
    rowgroup elimination. Figure [13-2](#521866_1_En_13_Chapter.xhtml#Fig2) shows
    the STATISTICS IO output for this query.


    ![](images/521866_1_En_13_Chapter/521866_1_En_13_Fig2_HTML.jpg)


    Figure 13-2


    Statistics IO output for a query against an unordered column in an ordered clustered
    columnstore index


    This time, all rowgroups were read in the columnstore index and none were skipped.
    This performance can be attributed to there being a total of 227 values for *Stock
    Item Key* in the table, but those values being scattered across all rowgroups
    without any particular order. Listing [13-3](#521866_1_En_13_Chapter.xhtml#PC3)
    provides the query to return metadata about the *Stock Item Key* column contents
    in the columnstore index.


    ```

    SELECT

    tables.name AS table_name,

    indexes.name AS index_name,

    columns.name AS column_name,

    partitions.partition_number,

    column_store_segments.segment_id,

    column_store_segments.min_data_id,

    column_store_segments.max_data_id,

    column_store_segments.row_count

    FROM sys.column_store_segments

    INNER JOIN sys.partitions

    ON column_store_segments.hobt_id = partitions.hobt_id

    INNER JOIN sys.indexes

    ON indexes.index_id = partitions.index_id

    AND indexes.object_id = partitions.object_id

    INNER JOIN sys.tables

    ON tables.object_id = indexes.object_id

    INNER JOIN sys.columns

    ON tables.object_id = columns.object_id

    AND column_store_segments.column_id = columns.column_id

    WHERE tables.name = ''Sale_CCI_ORDERED''

    AND columns.name = ''Stock Item Key''

    ORDER BY tables.name, columns.name, column_store_segments.segment_id;

    Listing 13-3

    Query to Return Metadata About the Stock Item Key Column

    ```


    Figure [13-3](#521866_1_En_13_Chapter.xhtml#Fig3) provides the output of this
    query, showing the minimum and maximum values for Stock Item Key for each rowgroup.


    ![](images/521866_1_En_13_Chapter/521866_1_En_13_Fig3_HTML.jpg)


    Figure 13-3


    Columnstore segment metadata for the Stock Item Key columns


    It is readily apparent when viewing this segment metadata that each rowgroup has
    similarly wide ranges of values for *Stock Item Key*, and therefore SQL Server
    is unable to effectively use metadata to perform much filtering using this column.
    It is worth noting that a query for a value greater than 219 would allow for some
    rowgroup elimination as the *max_data_id* for some rowgroups is 219, rather than
    227 or 225\. Ignoring that small detail, it is safe to say that most queries that
    filter on *Stock Item Key* will be forced to scan all rowgroups in the columnstore
    index in order to return results.


    If queries that filter on Stock Item Key are frequent and their current performance
    is unacceptably slow, then one solution to this challenge is to implement a nonclustered
    rowstore covering index on top of the columnstore index. To cover the query presented
    here, it is necessary to order on *Stock Item Key* and include *Quantity*. The
    query in Listing [13-4](#521866_1_En_13_Chapter.xhtml#PC4) creates this index.


    ```

    CREATE NONCLUSTERED INDEX IX_Sale_CCI_ORDERED

    ON Fact.Sale_CCI_ORDERED ([Stock Item Key]) INCLUDE (Quantity);

    Listing 13-4

    Query to Create a Covering Rowstore Index

    ```


    The index creation query takes about 45 seconds to complete. Once complete, executing
    the sample query in Listing [13-2](#521866_1_En_13_Chapter.xhtml#PC2) produces
    a new execution plan and new IO, as seen in Figure [13-4](#521866_1_En_13_Chapter.xhtml#Fig4).


    ![](images/521866_1_En_13_Chapter/521866_1_En_13_Fig4_HTML.jpg)


    Figure 13-4


    Query execution plan and IO when using a covering index


    SQL Server exclusively uses the covering index to execute the query, resulting
    in 394 reads and an index seek against the new index. This IO is slightly higher
    than the previous example, but that should not be the sole decision-making metric
    when determining indexing strategy. The query executes exceptionally fast as well.
    There are a few key benefits to using a nonclustered rowstore index:


    *   Fast, predictable execution times, regardless of query parameters.


    *   Query reads against the covering index do not create contention with queries
    against the clustered columnstore index.


    *   Predictable execution plans and IO.


    The benefits of covering nonclustered rowstore indexes are found exclusively on
    the reads. There are downsides to creating this index that must be understood
    before deciding to create a covering index like this:


    *   Write times are slowed down as the nonclustered index needs to be populated
    and mapped to the clustered columnstore index.


    *   Vertipaq optimization is not used when any nonclustered rowstore indexes are
    present. The mapping process to the clustered columnstore index makes reordering
    rows too inefficient of a process to execute on the fly.'
  trans: '

    ## 使用非聚集行存储索引


    第 10 章详细回顾了数据顺序在实现行组消除方面的重要性。当数据按某个维度排序，并且分析查询在该维度上进行筛选时，SQL Server 可以使用列存储元数据自动过滤掉不需要的行组。


    可以在聚集列存储表上创建非聚集行存储索引，为那些不遵循数据排序方式的常见查询提供额外支持。向聚集列存储索引添加辅助索引时必须谨慎。本章剩余部分将讨论在需要时如何最佳使用非聚集行存储索引，以及维护它们的最佳实践。


    考虑一个在表 `Fact.Sale_CCI_OrderED` 上创建的聚集列存储索引，该索引按 `Invoice Date Key` 列排序。该表的架构设计旨在通过
    `Invoice Date Key` 列提供的时间维度进行筛选和聚合。清单 13-1 中的查询是一个分析查询，它利用了这种自然的数据顺序。


    ```

    SELECT

    COUNT(*),

    SUM(Quantity) AS total_quantity

    FROM Fact.Sale_CCI_ORDERED

    WHERE [Invoice Date Key] >= ''11/1/2015''

    AND [Invoice Date Key] < ''1/1/2016'';

    ```

    清单 13-1

    利用有序聚集列存储索引的时间维度进行筛选和聚合的查询


    执行后，结果返回得相当快。图 13-1 显示了 `STATISTICS IO` 的输出。


    ![图 13-1：针对有序聚集列存储索引查询的统计 IO 输出](img/521866_1_En_13_Fig1_HTML.jpg)

    图 13-1

    针对有序聚集列存储索引查询的统计 IO 输出


    注意，段报告显示读取了 4 个段，跳过了 21 个段。此外，考虑到该表包含 2500 万行，逻辑读取次数相当低。这两点都是行组消除被有效使用的指标，有助于确保只需要读取表的一小部分即可处理查询并返回结果。


    只要分析查询的筛选条件、排序和聚合与表所依据的列对齐，就可以预期获得这样的性能。考虑清单 13-2 中提供的非常不同的查询。


    ```

    SELECT

    COUNT(*),

    SUM(Quantity) AS total_quantity

    FROM Fact.Sale_CCI_ORDERED

    WHERE [Stock Item Key] = 186;

    ```

    清单 13-2

    不使用表自然排序的分析查询


    此查询使用 `Stock Item Key` 作为筛选条件来计算数量。由于表是按 `Invoice Date Key` 排序的，SQL Server 没有自然的方法来实现行组消除。图
    13-2 显示了此查询的 `STATISTICS IO` 输出。


    ![图 13-2：针对有序聚集列存储索引中无序列的查询统计 IO 输出](img/521866_1_En_13_Fig2_HTML.jpg)

    图 13-2

    针对有序聚集列存储索引中无序列的查询统计 IO 输出


    这一次，读取了列存储索引中的所有行组，没有跳过任何行组。这种性能可以归因于表中 `Stock Item Key` 总共有 227 个值，但这些值分散在所有行组中，没有任何特定顺序。清单
    13-3 提供了返回列存储索引中 `Stock Item Key` 列内容元数据的查询。


    ```

    SELECT

    tables.name AS table_name,

    indexes.name AS index_name,

    columns.name AS column_name,

    partitions.partition_number,

    column_store_segments.segment_id,

    column_store_segments.min_data_id,

    column_store_segments.max_data_id,

    column_store_segments.row_count

    FROM sys.column_store_segments

    INNER JOIN sys.partitions

    ON column_store_segments.hobt_id = partitions.hobt_id

    INNER JOIN sys.indexes

    ON indexes.index_id = partitions.index_id

    AND indexes.object_id = partitions.object_id

    INNER JOIN sys.tables

    ON tables.object_id = indexes.object_id

    INNER JOIN sys.columns

    ON tables.object_id = columns.object_id

    AND column_store_segments.column_id = columns.column_id

    WHERE tables.name = ''Sale_CCI_ORDERED''

    AND columns.name = ''Stock Item Key''

    ORDER BY tables.name, columns.name, column_store_segments.segment_id;

    ```

    清单 13-3

    返回 Stock Item Key 列元数据的查询


    图 13-3 提供了此查询的输出，显示了每个行组 `Stock Item Key` 的最小值和最大值。


    ![图 13-3：Stock Item Key 列的列存储段元数据](img/521866_1_En_13_Fig3_HTML.jpg)

    图 13-3

    Stock Item Key 列的列存储段元数据


    查看此段元数据时，可以明显看出每个行组的 `Stock Item Key` 值范围都同样广泛，因此 SQL Server 无法有效地使用元数据来通过此列进行筛选。值得注意的是，查询大于
    219 的值将允许进行一些行组消除，因为某些行组的 `max_data_id` 是 219，而不是 227 或 225。忽略这个小细节，可以安全地说，大多数筛选
    `Stock Item Key` 的查询都将被迫扫描列存储索引中的所有行组才能返回结果。


    如果筛选 `Stock Item Key` 的查询很频繁，并且它们当前的性能慢得无法接受，那么解决此挑战的一个方案是在列存储索引之上实现一个非聚集行存储覆盖索引。为了覆盖此处展示的查询，有必要按
    `Stock Item Key` 排序并包含 `Quantity`。清单 13-4 中的查询创建了这个索引。


    ```

    CREATE NONCLUSTERED INDEX IX_Sale_CCI_ORDERED

    ON Fact.Sale_CCI_ORDERED ([Stock Item Key]) INCLUDE (Quantity);

    ```

    清单 13-4

    创建覆盖行存储索引的查询


    索引创建查询大约需要 45 秒完成。完成后，执行清单 13-2 中的示例查询会产生新的执行计划和新的 I/O，如图 13-4 所示。


    ![图 13-4：使用覆盖索引时的查询执行计划和 I/O](img/521866_1_En_13_Fig4_HTML.jpg)

    图 13-4

    使用覆盖索引时的查询执行计划和 I/O


    SQL Server 完全使用覆盖索引来执行查询，导致 394 次读取和对新索引的一次索引查找。此 I/O 略高于前一个示例，但这不应是确定索引策略时的唯一决策指标。查询执行速度也极快。使用非聚集行存储索引有几个关键优势：


    *   快速、可预测的执行时间，无论查询参数如何。

    *   针对覆盖索引的查询读取不会与针对聚集列存储索引的查询产生争用。

    *   可预测的执行计划和 I/O。


    覆盖非聚集行存储索引的优势完全体现在读取方面。在决定创建此类覆盖索引之前，必须了解其缺点：


    *   写入时间会变慢，因为需要填充非聚集索引并将其映射到聚集列存储索引。

    *   当存在任何非聚集行存储索引时，不会使用 Vertipaq 优化。到聚集列存储索引的映射过程使得重新排序行成为一个效率低下的过程，无法在运行时执行。

