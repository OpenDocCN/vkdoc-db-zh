    The key to dictionary compression is cardinality. The less distinct values present
    in the column, the more efficiently the data will compress. A CHAR(100) column
    with 5 distinct values will compress significantly better than a CHAR(10) column
    with 1000 distinct values. The dictionary size can be roughly estimated as the
    product of distinct values and their initial size. Lower cardinality means that
    there are less string values to store in the dictionary and the index used to
    reference the dictionary will be smaller. Since the dictionary index IDs are repeated
    throughout rows in the table, a smaller size can greatly improve compression.


    Dictionaries can be viewed in SQL Server using the view *sys.column_store_dictionaries*.
    The query in Listing [5-1](#521866_1_En_5_Chapter.xhtml#PC8) returns information
    about the dictionaries used in the *fact.Sale_CCI* table created in Chapter [4](#521866_1_En_4_Chapter.xhtml).


    ```

    SELECT

    partitions.partition_number,

    objects.name AS table_name,

    columns.name AS column_name,

    CASE

    WHEN column_store_dictionaries.dictionary_id = 0 THEN ''Global Dictionary''

    ELSE ''Local Dictionary''

    END AS dictionary_scope,

    CASE WHEN column_store_dictionaries.type = 1 THEN ''Hash dictionary containing
    int values''

    WHEN column_store_dictionaries.type = 2 THEN ''Not used'' -- Included for completeness

    WHEN column_store_dictionaries.type = 3 THEN ''Hash dictionary containing string
    values''

    WHEN column_store_dictionaries.type = 4 THEN ''Hash dictionary containing float
    values''

    END AS dictionary_type,

    column_store_dictionaries.entry_count,

    column_store_dictionaries.on_disk_size

    FROM sys.column_store_dictionaries

    INNER JOIN sys.partitions

    ON column_store_dictionaries.hobt_id = partitions.hobt_id

    INNER JOIN sys.objects

    ON objects.object_id = partitions.object_id

    INNER JOIN sys.columns

    ON columns.column_id = column_store_dictionaries.column_id

    AND columns.object_id = objects.object_id

    WHERE objects.name = ''Sale_CCI'';

    Listing 5-1

    Query to Return Dictionary Metadata

    ```


