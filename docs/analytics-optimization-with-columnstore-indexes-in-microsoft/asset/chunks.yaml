    Note that if a table is partitioned or has many columns, the result set could
    become quite large, so this query is filtered by both table and column to focus
    on a single set of segments, for demonstration purposes. The results help to fill
    in the blanks for dictionary metadata, as seen in Figure [5-4](#521866_1_En_5_Chapter.xhtml#Fig4).


    ![](images/521866_1_En_5_Chapter/521866_1_En_5_Fig4_HTML.jpg)


    Figure 5-4


    Dictionary metadata detail for Sale_CCI. [Bill To Customer Key]


    This detail differentiates between local and global dictionaries, as well as adds
    in some column-level detail. Based on the results, the integer column *[Bill To
    Customer Key]* compresses quite well as it contains only three distinct values
    in its dictionary. Sixty-eight bytes for a dictionary is tiny and will provide
    immense savings for a column that was previously 4 bytes per row across 25 million
    rows. Each value is reduced from 4 bytes to 2 bits, allowing it to be compressed
    at a ratio of 16:1!


    It is important to note that a dictionary is limited in size to 16 megabytes.
    Since a segment may only have one global and one local dictionary assigned to
    it, if a dictionary reaches the 16MB threshold, then a rowgroup will be split
    into smaller rowgroups to allow for each to possess dictionaries that are below
    this limit. If inserting new rows into a table would cause any of its dictionaries
    to exceed the dictionary size cap, then a new rowgroup will be created to accommodate
    new rows. There are two key takeaways from this information:


    1.  Very long columns may force dictionary splits and result in undersized rowgroups.
    This will reduce compression efficiency and increase the number of dictionaries
    required to service the table.


    2.  Columns with very high cardinality may also approach this limit and result
    in dictionary splits that lead to the creation of undersized rowgroups.


    Numeric columns with high cardinality will typically use value compression to
    avoid this problem, whereas string columns that are long and/or have a high cardinality
    may not be able to avoid this issue. Sixteen megabytes may sound small when compared
    to massive OLAP tables, but dictionaries themselves are compressed and typical
    analytic data will not approach the dictionary size limit. Testing should always
    be used to confirm either of these scenarios, rather than assuming they will or
    will not happen.


    ### Should String Data Be Normalized?


    Before advancing to a discussion of the remainder of the compression process,
    a question that arises from the efficiency of dictionary compression is whether
    or not normalization of dimensions is necessary or useful for columnstore compressed
    data that uses dictionary compression.


    In the world of transactional data, dimensions are often normalized. This saves
    space and memory and allows for relational integrity, uniqueness, and other constraints
    to be implemented at runtime. In analytic data, though, data validation is often
    implemented via validation, rather than the use of triggers, keys, or check constraints.
    As a result, normalization was often used more to save resources or provide convenient
    lookup tables for use by visualization or analytics applications.


    This question can be tested by creating a new version of *Fact.Sale_CCI* where
    the Description column is normalized into a lookup table and referenced by a SMALLINT
    key. Listing [5-3](#521866_1_En_5_Chapter.xhtml#PC10) provides definitions for
    this new table and its corresponding lookup table.


    ```

    CREATE TABLE Dimension.Sale_Description

    (      Description_Key SMALLINT NOT NULL IDENTITY(1,1) PRIMARY KEY CLUSTERED,
    [Description] NVARCHAR(100) NOT NULL);

    CREATE TABLE Fact.Sale_CCI_Normalized

    (      [Sale Key] [bigint] NOT NULL,

    [City Key] [int] NOT NULL,

    [Customer Key] [int] NOT NULL,

    [Bill To Customer Key] [int] NOT NULL,

    [Stock Item Key] [int] NOT NULL,

    [Invoice Date Key] [date] NOT NULL,

    [Delivery Date Key] [date] NULL,

    [Salesperson Key] [int] NOT NULL,

    [WWI Invoice ID] [int] NOT NULL,

    [Description Key] SMALLINT NOT NULL,

    [Package] [nvarchar](50) NOT NULL,

    [Quantity] [int] NOT NULL,

    [Unit Price] [decimal](18, 2) NOT NULL,

    [Tax Rate] [decimal](18, 3) NOT NULL,

    [Total Excluding Tax] [decimal](18, 2) NOT NULL,

    [Tax Amount] [decimal](18, 2) NOT NULL,

    [Profit] [decimal](18, 2) NOT NULL,

    [Total Including Tax] [decimal](18, 2) NOT NULL,

    [Total Dry Items] [int] NOT NULL,

    [Total Chiller Items] [int] NOT NULL,

    [Lineage Key] [int] NOT NULL);

    Listing 5-3

    Table Structure for Fact.Sale_CCI with a Normalized Description

    ```


    When populated with data, the *Dimension.Sale_Description* table is loaded first
    with any new distinct *Description* values, and then *Fact.Sale_CCI_Normalized*
    is loaded with data that joins the dimension table to retrieve values for *Description_Key*.
    Figure [5-5](#521866_1_En_5_Chapter.xhtml#Fig5) shows the side-by-side comparison
    of the storage of these tables.


    ![](images/521866_1_En_5_Chapter/521866_1_En_5_Fig5_HTML.jpg)


    Figure 5-5


    Storage comparison between normalized and denormalized columns


    The table on the left is the original table, whereas the table on the right has
    the *Description* column normalized into a SMALLINT. In this specific example,
    normalization allowed for a significant space savings, about 15:1 compression
    savings from the original table!


    Generally speaking, normalization will help most when the number of distinct values
    is low and the length of the columns is high, as dictionary encoding for a SMALLINT
    column will produce superior compression than dictionary encoding for a large
    VARCHAR column.


    The downside to normalization is that data load processes will take longer. Joining
    additional dimension columns at runtime to load data requires time and resources.
    The decision as to whether to normalize or not should be carefully considered
    and testing conducted to determine if sufficient gains are realized to justify
    the change.


    Ultimately, business logic and organizational needs will drive this decision at
    a high level, whereas technical considerations will allow for further tuning as
    needed. There is no right or wrong answer to this question; therefore, consider
    either approach valid until hands-on testing proves otherwise.'
