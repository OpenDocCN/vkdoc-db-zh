    \ COLUMNSTORE INDEX CCI_Sales_Temp_Data ON @Sales_Temp_Data;\n```\n*清单 15-8 尝试向表变量添加列存储索引的脚本*\n\
    \n该查询甚至无法编译，在解析时会立即生成如图 [15-7] 所示的错误。\n\n![](images/521866_1_En_15_Chapter/521866_1_En_15_Fig7_HTML.jpg)\n\
