- fmt: '## The Delta Store


    将数据写入高度压缩的分段是一个资源密集型的过程。解压一组分段、向其中写入额外数据、重新压缩以及更新元数据所需的资源并非微不足道。向一个行组写入一百万行所需的工作量，包括了解压、写入和重新压缩该行组中所有分段的工作。而将一百万行数据逐行写入该行组所需的工作量，相当于将上述过程执行一百万次。


    因此，频繁写入少量行的进程需要一种方法来管理这些写入操作，以免列存储索引消耗服务器的所有资源用于解压、写入和重新创建分段。**增量存储** 是一组聚集行存储索引，用于在列存储索引旁边临时存储小型写入。每个增量行组就是这些聚集索引之一。更改会累积在增量存储中，直到其行数达到阈值（每个增量行组
    `2^(20)` 行），然后一次性推入列存储索引。


    增量存储由 SQL Server 自动维护。一个名为 **元组移动器** 的异步后台进程管理从增量存储到列存储索引的数据移动。虽然操作员可以运行维护脚本来影响增量存储的行为，但对于使用列存储索引来说，这样做并非必需。有关列存储维护的更多信息，请参见第
    14 章。


    当针对列存储索引执行查询时，增量存储的内容会与所需的压缩分段一起被读取。虽然增量存储由经典的行存储索引组成，但其大小通常比列存储索引的压缩部分小得多；因此，读取它通常不会对性能产生不利影响。增量存储的好处在于，它大大减少了向列存储索引写入较小批次数据所需的计算资源，并确保频繁的小型写入在数据加载、维护或软件发布过程中不会成为不可扩展的瓶颈。


    数据的基本流如图 4-5 所示。


    ![](images/521866_1_En_4_Chapter/521866_1_En_4_Fig5_HTML.jpg)


    图 4-5


    数据从增量存储流入列存储索引


    请注意，增量存储并非用于管理针对列存储索引的所有 `INSERT` 操作。第 8 章详细讨论了批量加载进程如何用于大大加速较大的 `INSERT` 操作。


    ## 删除位图


    从列存储索引中删除数据所带来的挑战，与增量存储为插入操作解决的挑战类似。删除单行数据将需要对每列的压缩分段进行解压、修改和重新压缩。这本质上是昂贵的，当受影响的行组数量增加时，成本会变得高到令人望而却步。


    SQL Server 需要能够快速地从列存储索引中删除数据，并且不会对服务器性能产生长期的负面影响。为了实现这一点，当执行 `DELETE` 语句时，数据不会从列存储索引中物理删除。相反，受影响行的删除状态会被写入一个称为
    **删除位图** 的结构中。


    每个分区在列存储索引中只能存在一个删除位图，其目的是跟踪哪些行已被删除（如果有的话）。当从列存储索引中删除行时，会更新删除位图以指示删除操作。列存储索引中的相应行不会以任何方式被修改。这种软删除允许
    `DELETE` 操作快速执行，并且不会对数据加载或维护过程造成负担。


    当查询从列存储索引中读取数据时，删除位图的内容也会被读取，任何被标记为已删除的行都将从结果中省略。删除位图也是一个聚集行存储索引，与列存储索引并排存在。拥有删除位图的最大好处是，`DELETE`
    操作可以执行得异常快速，因为无需对索引中的分段进行解压、更新和重新压缩。缺点是已删除的行仍然占用索引中的空间，并且不会立即被移除。随着时间的推移，已删除行所占用的空间可能变得不容忽视，此时可以定期使用索引维护（在第
    14 章中讨论）来回收这些空间。


    图 4-6 将删除位图添加到了列存储索引的架构图中。


    ![](images/521866_1_En_4_Chapter/521866_1_En_4_Fig6_HTML.jpg)


    图 4-6


    将删除位图添加到列存储索引架构中


    删除位图和增量存储都是列存储索引的组成部分，它们仅在需要时才存在。如果不存在已删除的行，则不会有删除位图覆盖在压缩的行组上。类似地，当针对列存储索引执行查询时，空的增量存储也不需要被检查。这些组件在必要时存在，否则在不需要时不会对性能产生影响。


    ## 非聚集列存储索引架构


    非聚集列存储索引的架构与聚集索引非常相似。非聚集列存储索引不是表的主要存储机制，而是与聚集行存储索引并存的一个额外索引结构。


    一个重要的区别是，可以在非聚集列存储索引上指定列列表，从而允许进行更有针对性的优化项目。此外，可以将筛选器应用于非聚集列存储索引，从而根据数据是**热数据**、**温数据**还是**冷数据**来定位数据，从而减小索引大小和写入索引的成本。


    请注意以下关于热/温/冷数据用法的简要定义：


    *   **热数据：** 实时且被系统积极使用，具有定期的读写和高并发性。期望可用性高，延迟应非常低。

    *   **温数据：** 代表使用频率较低的数据。仍然期望高可用性，但在检索时可以容忍更高的延迟。

    *   **冷数据：** 代表不经常访问的旧数据、归档数据或为保留而维护的数据。冷数据的可用性更灵活，高延迟是可容忍的。冷数据的并发性非常低。


    组织会将数据标记为从热到冷的范围，具体细节会根据其数据的使用方式而有所不同。图 4-7 显示了聚集行存储索引与筛选后的非聚集列存储索引之间的交互。


    ![](images/521866_1_En_4_Chapter/521866_1_En_4_Fig7_HTML.jpg)


    图 4-7


    带有筛选非聚集列存储索引的聚集行存储索引


    请注意，非聚集列存储索引的目的是为事务表提供实时分析功能，这需要在实施前仔细考虑。第 12 章将深入探讨非聚集列存储索引的更多细节，包括选项、演示和最佳用例。'
  raw: '## The Delta Store


    Writing data to highly compressed segments is a resource-intensive process. The
    resources required to decompress a set of segments, write additional data to them,
    compress them, and update metadata is not trivial. The effort to write a million
    rows to one rowgroup is comprised of the effort needed to decompress, write, and
    compress all segments in the rowgroup. The effort to write a million rows one
    at a time to that rowgroup would be comparable to the same process being executed
    one million times.


    Because of this, processes that frequently write small numbers of rows need a
    way to manage those writes so that a columnstore index is not consuming all of
    a server’s resources decompressing, writing, and re-creating segments. The delta
    store is a set of clustered rowstore indexes that temporarily store small writes
    alongside the columnstore index. Each delta rowgroup is one of these clustered
    indexes. Changes accumulate in the delta store until its row count reaches a threshold
    (2^(20) rows per delta rowgroup) and is pushed all at once into the columnstore
    index.


    The delta store is maintained automatically by SQL Server. An asynchronous background
    process called the tuple mover manages the movement of data from delta store into
    columnstore index. While operators can run maintenance scripts to influence the
    behavior of the delta store, doing so is not necessary for using columnstore indexes.
    More information on columnstore maintenance can be found in Chapter [14](#521866_1_En_14_Chapter.xhtml).


    When queries are executed against a columnstore index, the contents of the delta
    store are read alongside the compressed segments that are needed. While the delta
    store is comprised of classic rowstore indexes, its size is generally very small
    compared to the compressed portion of the columnstore index; therefore, reading
    it is generally not detrimental to performance. The benefit of the delta store
    is that it greatly reduces the computing resources needed to write smaller batches
    of data to a columnstore index and ensures that frequent smaller writes do not
    become unscalable bottlenecks during a data load, maintenance, or software release
    process.


    The basic flow of data can be shown in Figure [4-5](#521866_1_En_4_Chapter.xhtml#Fig5).


    ![](images/521866_1_En_4_Chapter/521866_1_En_4_Fig5_HTML.jpg)


    Figure 4-5


    Flow of data from the delta store into a columnstore index


    Note that the delta store is not used to manage all INSERT operations against
    a columnstore index. Chapter [8](#521866_1_En_8_Chapter.xhtml) discusses in detail
    how bulk load processes are used to greatly speed up larger INSERT operations
    .


    ## The Delete Bitmap


    Deletion of data from a columnstore index poses similar challenges to those solved
    for inserts by the delta store. Deleting a single row would require a compressed
    segment per column to be decompressed, modified, and recompressed. This is inherently
    expensive and becomes prohibitively costly when the number of rowgroups affected
    increases.


    SQL Server needs to be able to delete data from a columnstore index quickly and
    without having a prolonged negative impact on server performance. To accomplish
    this, data is not physically deleted from a columnstore index when a DELETE statement
    is executed. Instead, the deleted status of the affected rows is written to a
    structure called the delete bitmap.


    Only one delete bitmap can exist per partition within a columnstore index, and
    its purpose is to track which rows are deleted (if any). When rows are deleted
    from a columnstore index, the delete bitmap is updated to indicate the deletion.
    The corresponding rows within the columnstore index are not modified in any way.
    These soft deletes allow DELETE operations to execute quickly and not become burdensome
    to data loads or maintenance processes.


    When a query reads data from a columnstore index, the contents of the delete bitmap
    are also read and any rows that are flagged as deleted will be omitted from the
    results. The delete bitmap is also a clustered rowstore index that exists side
    by side with the columnstore index. The biggest upside of having a delete bitmap
    is that DELETE operations can execute exceptionally fast as there is no need to
    decompress, update, and recompress segments in the index. The downside is that
    deleted rows still take up space in the index and are not immediately removed.
    Over time, the space consumed by deleted rows may become nontrivial, at which
    point index maintenance (discussed in Chapter [14](#521866_1_En_14_Chapter.xhtml))
    can periodically be used to reclaim this space.


    Figure [4-6](#521866_1_En_4_Chapter.xhtml#Fig6) adds the delete bitmap into the
    architecture diagram of columnstore indexes.


    ![](images/521866_1_En_4_Chapter/521866_1_En_4_Fig6_HTML.jpg)


    Figure 4-6


    Adding the delete bitmap into the columnstore index architecture


    Both the delete bitmap and the delta store are components of a columnstore index
    that only exist when needed. If no deleted rows exist, then there will be no delete
    bitmap to overlay onto the compressed rowgroups. Similarly, an empty delta store
    will not need to be checked when queries are executed against the columnstore
    index. These components exist when necessary, but otherwise will have no impact
    on performance when not needed.


    ## Nonclustered Columnstore Index Architecture


    The architecture of nonclustered columnstore indexes is quite similar to that
    of clustered indexes. Instead of being the primary storage mechanism for a table,
    the nonclustered columnstore index is an additional index structure that exists
    alongside a clustered rowstore index.


    An important difference is that a column list may be specified on the nonclustered
    columnstore index, allowing for more targeted optimization projects. Additionally,
    filters may be applied to nonclustered columnstore indexes, allowing for data
    to be targeted based on whether it is hot, warm, or cold, thus decreasing index
    size and the cost to write to the index.


    Note the following brief definitions for the usage of hot/warm/cold data:


    *   **Hot Data:** Real time and actively used by a system with regular reads,
    writes, and high concurrency. Availability is expected to be high and latency
    should be very low.


    *   **Warm Data:** Represents data that is used less frequently. Availability
    is still expected to be high, but there is a tolerance for more latency when retrieving
    it.


    *   **Cold Data:** Represents infrequently accessed data that is old, archived,
    or maintained for posterity. Availability is more flexible for cold data and high
    latency is tolerable. Concurrency is very low for cold data.


    Organizations will label data in a range from hot to cold, and the specifics will
    vary depending on how their data is used. Figure [4-7](#521866_1_En_4_Chapter.xhtml#Fig7)
    shows the interaction between a clustered rowstore index and a filtered nonclustered
    columnstore index.


    ![](images/521866_1_En_4_Chapter/521866_1_En_4_Fig7_HTML.jpg)


    Figure 4-7


    A clustered rowstore index with a filtered nonclustered columnstore index


    Note that the purpose of a nonclustered columnstore index is to provide real-time
    analytics against a transactional table, which requires careful consideration
    prior to implementing. Chapter [12](#521866_1_En_12_Chapter.xhtml) will dive into
    more detail with regard to nonclustered columnstore indexes including options,
    demonstrations, and optimal use cases.'
