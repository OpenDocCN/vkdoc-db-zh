    ![](images/521866_1_En_5_Chapter/521866_1_En_5_Fig2_HTML.jpg)


    Figure 5-2


    Sample dictionary compression of a set of ten strings


    The original data required 132 bytes in storage, whereas the encoded data required
    only 30 bits (3 bits per value), plus the space required to store the lookup values
    in the dictionary. The dictionary itself consumes space for each distinct value
    in the segment data, but as a bonus, a dictionary may be shared by multiple rowgroups.
    Therefore, a table with 100 rowgroups may reuse dictionaries for each column across
