  trans: '

    ## 对两套系统的必要性


    由于事务型系统和分析型系统的工作负载差异巨大，随着数据量增长，为其维护独特数据结构的需求就变得愈加明显。


    虽然上千行数据在任何结构中都能快速访问，但若数据达到十亿行，除非其数据结构是针对预期服务的工作负载类型而构建的，否则将变得异常笨重。


    许多应用程序试图混合分析型和事务型工作负载以保持便利性并避免创建新系统。这在两类数据之间的各种差异开始相互冲突之前是可行的。例如，混合使用 `OLAP` 和
    `OLTP` 工作负载时一个常见的陷阱是：大型、缓慢的分析查询会导致对应用程序用户正尝试写入的对象产生锁定和阻塞。如果销售人员运行年度报告时阻塞了试图购买新产品的用户，结果将是销售损失和用户不满。


    同样地，那些大型报告可能消耗大量内存，迫使常见的事务型数据让出缓冲池空间给报表数据。这将进一步加剧应用程序用户的操作迟滞。


    一般来说，混合分析型和事务型工作负载可能并非总能避免，但提前考虑这一架构决策的影响，有助于在问题变得代价高昂之前预测（并规划应对）它们。


    `OLTP` 和 `OLAP` 系统之间还有许多其他考虑因素会有所不同，例如：


    *   维护

    *   高可用性

    *   灾难恢复

    *   `SQL Server` 许可

    *   硬件资源


    应用程序架构师需要确保针对事务型和分析型工作负载，分别探讨这些主题。虽然在数据量较小时使用相似系统是可能的，但这些系统不太可能无限扩展。最终，数据会变得足够大，以至于需要独特的解决方案来区分每种工作负载类型。


    这些决策的细微差别可以深入很多。例如，一个小型分析数据库的架构可能与大型数据仓库不同。因此，在设计新数据结构或重新审视现有数据库对象时，综合考虑规模、扩展性、数据增长和工作负载至关重要。


    ## 构建更好的分析型数据结构


    迄今为止的讨论清楚地表明，用于支持分析型数据的表和结构需要区别于事务型工作负载所使用的。本章概述了许多区分 `OLTP` 和 `OLAP` 应用程序的细节，包括它们如何读写数据以及典型的使用模式。


    考虑到这些信息，可以构想出分析型数据应存储在何处。本书的剩余部分将重点介绍如何利用 `SQL Server` 中的列存储索引来有效满足大型分析型表和工作负载的需求。这项技术已经成熟，可用于有效管理各种分析用例，确保它为架构师和管理员经常面临的许多分析挑战提供理想的解决方案。


    # 3. 什么是列存储索引？


    至此，已经提出了一个令人信服的理由，即将 `OLTP` 和 `OLAP` 工作负载分离到独特的数据结构中，并针对各自的用例进行优化。列存储索引是 `SQL
    Server` 的一项功能，为大型分析型数据提供原生支持。本章将深入探讨它们是什么，以及为什么它们是应对分析型数据挑战的有效解决方案。


    ## 事务型数据存储的限制


    包含数百万或数十亿行分析型数据的表，如果实现为经典的事务型表，则扩展性不佳。要完全理解其中的原因，比较数据在事务型表和分析型表中的存储方式会有所帮助。以下示例表包含五列。图
    3-1 展示了数据在 `OLTP`（行存储）版本的此表中的存储方式。


    ![](img/521866_1_En_3_Fig1_HTML.jpg)


    图 3-1：聚集行存储索引中数据存储的示意图


    在聚集行存储索引中，每一行按聚集索引规定的顺序依次存储在页面上。如果查询需要单行或多行的许多列，那么这是一种极其高效的存储结构。例如，检索从第 1 行到第
    -5 行的所有列所需的工作量很小，因为数据是连续且有序的。图 3-2 突出显示了满足此查询所需的数据。


    ![](img/521866_1_En_3_Fig2_HTML.jpg)


    图 3-2：`OLTP` 查询检索五行时如何读取示例表


    具有顺序列的表模拟了典型的事务型查询如何处理如下查询：


    ```

    SELECT

    OrderID, --  一个标识/主键列

    CustomerID,

    SalespersonPersonID,

    ContactPersonID,

    OrderDate

    FROM Sales.Orders

    WHERE OrderId = 289;

    ```


    事务型查询写入单行或小范围行，这通常与在单个索引上的查找相关。这里，使用一个数值标识从更大的表中筛选出感兴趣的五行。


    `SQL Server` 存储的基本单位是页面。一个页面由 8KB 数据组成。页面包含给定表的所有数据和索引存储。如果查询需要单行，则即使页面上的其余数据不需要，它所在页面的全部内容也会被读入内存。因此，事务型查询依赖于聚集或非聚集索引来确保索引查找能够以有序的方式返回数据，如图
    3-2 中的示例所示。在这种情况下，即使表变得非常大，读取这五行也不会需要太多额外开销。


    然而，分析型查询则大不相同。它们通常聚合少数几列，但却是在很多行上进行聚合。考虑一个针对示例表的典型 `OLAP` 查询，它在表的大部分区域（恰好包含此处显示的所有行）聚合单个列。图
    3-3 展示了这种情况。


    ![](img/521866_1_En_3_Fig3_HTML.jpg)


    图 3-3：从示例表聚合单个列的分析型查询


    行的物理布局显示，一个只需要第 2 列的查询也需要读取相邻的列，即使它们不需要。以下是一个查询示例，它访问表中的大量数据，但仅聚合单个列。


    ```

    SELECT

    SUM(Quantity) AS Total_Quantity

    FROM Sales.OrderLines

    WHERE OrderID >= 1

    AND OrderID < 10000;

    ```


    尽管只对单个列进行了求和，但任何包含该列值的页面都需要被读入内存。即使使用覆盖非聚集索引，仍然需要读取每一行的数据，尽管这种方式可以减少读取的页面数量。

    '
- fmt: '# SQL Server 中的列存储索引技术


    ## 行存储索引下的查询性能分析


    现在考虑一个更大的表，它有 5000 万行，使用聚集行存储索引存储在 250,000 个页面上。图 [3-2](#521866_1_En_3_Chapter.xhtml#Fig2)
    中演示的事务性查询仍然只会读取连续存储的 5 行，因此可以忽略剩余的 249,995 行及其存储的页面。可能会额外读取与这五行存储在同一页上的数据，但由此增加的负担以千字节衡量，相对微不足道。


    图 [3-3](#521866_1_En_3_Chapter.xhtml#Fig3) 中展示的分析查询仅聚合单个列，但跨越了多行。如果请求的订单数据占表的四分之一，那么在事务性表中处理此查询将迫使
    `SQL Server` 读取表中大约四分之一的页面，因为第二列的值分散在表中每行的各个位置。无论使用何种过滤器来减少查询所需的行数，过滤器指定范围内的每一页都必须被读取。


    随着分析表持续增长，达到数十亿行和/或 `TB` 级（或更多）存储时，读取其大部分数据的能力会变得过于缓慢且资源密集，变得不切实际。需要一种更好的解决方案，允许分析查询在不读取底层其他列数据的情况下读取列数据。


    ## 介绍列存储索引


    解决这个问题的技术在某种程度上已经存在很长时间了。像 `SQL Server Analysis Services` 和 `PowerPivot` 这样的应用程序多年来一直使用列式数据存储格式，但它们的实现对用户是隐藏的。


    列存储索引允许数据以最优的分析格式存储在表中，提供了许多有价值的优点，例如：


    *   可扩展至任意表大小

    *   将查询速度提高 `10–100` 倍

    *   卓越的压缩率，节省存储和内存

    *   `SQL Server` 原生支持

    *   可利用批量加载实现快速写入速度


    虽然这听起来像推销辞令，但这里没有任何夸张。将存储在经典行存储聚集索引中的大型分析数据集与列存储索引表进行比较，在存储和性能方面存在巨大差异，这将在本书的后续部分进行演示和量化。


    请注意，本书中所有关于列存储索引的演示均在 `SQL Server 2019` 上测试。使用早期版本的读者在实施本书中的任何建议前应进行充分测试，因为可用的功能可能有所不同。


    图 [3-4](#521866_1_En_3_Chapter.xhtml#Fig4) 说明了图 [3-1](#521866_1_En_3_Chapter.xhtml#Fig1)
    中的同一个表，在列存储索引中如何存储数据。


    ![](images/521866_1_En_3_Chapter/521866_1_En_3_Fig4_HTML.jpg)


    图 3-4

    聚集列存储索引中的数据存储示意图


    注意关键区别：数据是按列而不是按行排序的。第一列的所有值存储在一个单独的结构中，而其他每个列则存储在自己的页面集中。在图 [3-3](#521866_1_En_3_Chapter.xhtml#Fig3)
    所示的行存储表中，聚合了单个列，但必须读取每一页才能返回那一列的数据。


    图 [3-5](#521866_1_En_3_Chapter.xhtml#Fig5) 展示了针对分析列存储索引表的相同查询。


    ![](images/521866_1_En_3_Chapter/521866_1_En_3_Fig5_HTML.jpg)


    图 3-5

    针对列存储索引聚合单个列


    因为数据在物理上按列分组，不再需要读取整个表来返回单个聚合列。其他四列可以被忽略。这极大地减少了对存储系统的读取，并降低了内存使用量，因为需要读入内存的页面更少。对于插入此表中的每个新行，只需要读取第二列的一个额外值。


    这种数据结构的一个显著优点是压缩变得更有效。单个列的一组值往往包含更多重复值，更容易压缩，而来自不同列的值重叠并良好压缩的可能性较低。更好的压缩意味着页面上可以容纳更多数据，从而进一步节省存储和内存。


    关于列存储索引的一个重要澄清是，它们并非“只是另一个索引”。它们不能与非聚集行存储索引、`XML` 索引、空间索引、内存优化索引或 `SQL Server`
    中包含的其他索引类型相提并论。它们构成了一种独特的架构，提供的益处远超典型索引所能提供的。


    请注意，在本书中，除非另有说明，所有演示和讨论都将引用聚集列存储索引。第 [11](#521866_1_En_11_Chapter.xhtml) 章将更详细地探讨非聚集列存储索引。


    ## SQL Server 中列存储索引的优势


    列存储索引成为存储大型分析数据的理想解决方案有很多原因。它们跨越了从成本到便利性再到速度的多个领域，并说明了一个看似简单的功能如何能以较低的实现时间和资源成本提供卓越的价值。这不是列存储索引优点的完整列表，但突出了使其在分析数据应用中具有吸引力的性能和效率关键点。本书的其余部分将更详细地探讨列存储索引的优势和最佳用例。'
  raw: 'Now consider a larger table with 50 million rows that is stored on 250,000
    pages using a clustered rowstore index. The transactional query demonstrated in
    Figure [3-2](#521866_1_En_3_Chapter.xhtml#Fig2) would still only read 5 rows that
    are stored consecutively and could therefore ignore most of the remaining 249,995
    rows and the pages they are stored on. Additional rows would be read that happened
    to be stored on the same page(s) as those five rows, but the added burden of that
    data is measured in kilobytes and is comparatively insignificant.


    The analytic query presented in Figure [3-3](#521866_1_En_3_Chapter.xhtml#Fig3)
    aggregates only a single column, but does so across many rows. If the requested
    order data spans one-fourth of the table, then processing this query in the transactional
    table would force SQL Server to read about one-fourth of the pages in the table,
    since the values for column 2 are dispersed within each row throughout the table.
    Regardless of the filter used that reduces the row count needed for the query,
    every page in the range specified by the filter would need to be read.


    As an analytic table continues to grow and spans billions of rows and/or terabytes
    of storage (or more), the ability to read large swaths of its data becomes too
    slow and resource intensive to be realistic. A better solution is needed that
    allows analytic queries to read column data without the rest of the underlying
    columns being brought along for the ride.


    ## Introducing Columnstore Indexes


    The technology needed to solve this problem has existed in some form for a long
    time. Applications such as SQL Server Analysis Services and PowerPivot have used
    columnar data storage formats for years, but their implementation was hidden from
    view of the user.


    Columnstore indexes allow for data to be stored in tables in an optimal analytic
    format that provides many valuable benefits, such as


    *   Ability to scale to any table size


    *   Increase query speeds by 10–100 times


    *   Exceptional compression ratios, saving storage and memory


    *   Natively supported by SQL Server


    *   Can take advantage of bulk loading for fast write speeds


    While this may sound like a sales pitch, there are no exaggerations here. Comparing
    a large analytic data set stored in a classic rowstore clustered index vs. a columnstore
    indexed table yields vast differences in storage and performance that will be
    demonstrated and quantified throughout the remainder of this book.


    Note that all demonstrations of columnstore indexes in this book are tested on
    SQL Server 2019\. Those running an earlier version should test thoroughly before
    implementing any suggestions in this book as the features available may be different.


    Figure [3-4](#521866_1_En_3_Chapter.xhtml#Fig4) illustrates how data stored in
    a columnstore index is stored using the same table from Figure [3-1](#521866_1_En_3_Chapter.xhtml#Fig1).


    ![](images/521866_1_En_3_Chapter/521866_1_En_3_Fig4_HTML.jpg)


    Figure 3-4


    Illustration of data storage in a clustered columnstore index


    Note the critical difference: Data is ordered by column rather than by row. Each
    value for column 1 is stored together in a single structure, whereas each other
    column is stored in its own sets of pages. In the rowstore table shown in Figure
    [3-3](#521866_1_En_3_Chapter.xhtml#Fig3), a single column was aggregated, but
    every page had to be read in order to return data for that one column.


    Figure [3-5](#521866_1_En_3_Chapter.xhtml#Fig5) shows the same query against an
    analytic columnstore indexed table.


    ![](images/521866_1_En_3_Chapter/521866_1_En_3_Fig5_HTML.jpg)


    Figure 3-5


    Aggregating a single column against a columnstore index


    Because data is grouped physically by column, it is no longer necessary to read
    the entire table to return a single aggregated column. The other four columns
    can be ignored. This greatly reduces reads against storage systems and reduces
    memory usage as less pages need to be read into memory. For each new row that
    is inserted into this table, only a single additional value for the second column
    needs to be read.


    A significant benefit of this data structure is that compression becomes more
    effective. A set of values for a single column will tend to have more repeated
    values that will more easily compress, whereas values from different columns are
    less likely to overlap and compress well. Better compression means more data can
    fit on pages, saving additional storage and memory.


    An important clarification on columnstore indexes is that they are not “just another
    index.” They are not comparable to nonclustered rowstore indexes, XML indexes,
    spatial indexes, memory-optimized indexes, or other types of indexing included
    in SQL Server. They comprise a unique architecture that provides benefits well
    beyond what a typical index can deliver.


    Note that throughout this book, when not otherwise specified, all demonstrations
    and discussion will reference clustered columnstore indexes. Chapter [11](#521866_1_En_11_Chapter.xhtml)
    will delve into non-clustered columnstore indexes in more detail.


    ## Benefits of Columnstore Indexes in SQL Server


    There are many reasons why columnstore indexes can be an ideal solution for storing
    large analytic data. They cross a variety of areas from cost to convenience to
    speed and illustrate how a seemingly simple feature can provide exceptional value
    with a low time and resource cost to implement. This is not a complete list of
    the benefits of columnstore indexes, but highlights the keys to performance and
    efficiency that make them attractive for use with analytic data. The remainder
    of this book will dive into greater detail about the benefits and optimal use
    cases for columnstore indexes.'
  trans: '

    # SQL Server 中的列存储索引技术


    ## 行存储索引下的查询性能分析


    现在考虑一个更大的表，它有 5000 万行，使用聚集行存储索引存储在 250,000 个页面上。图 3-2 中演示的事务性查询仍然只会读取连续存储的 5 行，因此可以忽略剩余的
    249,995 行及其存储的页面。可能会额外读取与这五行存储在同一页上的数据，但由此增加的负担以千字节衡量，相对微不足道。


    图 3-3 中展示的分析查询仅聚合单个列，但跨越了多行。如果请求的订单数据占表的四分之一，那么在事务性表中处理此查询将迫使 `SQL Server` 读取表中大约四分之一的页面，因为第二列的值分散在表中每行的各个位置。无论使用何种过滤器来减少查询所需的行数，过滤器指定范围内的每一页都必须被读取。


    随着分析表持续增长，达到数十亿行和/或 `TB` 级（或更多）存储时，读取其大部分数据的能力会变得过于缓慢且资源密集，变得不切实际。需要一种更好的解决方案，允许分析查询在不读取底层其他列数据的情况下读取列数据。


    ## 介绍列存储索引


    解决这个问题的技术在某种程度上已经存在很长时间了。像 `SQL Server Analysis Services` 和 `PowerPivot` 这样的应用程序多年来一直使用列式数据存储格式，但它们的实现对用户是隐藏的。


    列存储索引允许数据以最优的分析格式存储在表中，提供了许多有价值的优点，例如：


    *   可扩展至任意表大小

    *   将查询速度提高 `10–100` 倍

    *   卓越的压缩率，节省存储和内存

    *   `SQL Server` 原生支持

    *   可利用批量加载实现快速写入速度


    虽然这听起来像推销辞令，但这里没有任何夸张。将存储在经典行存储聚集索引中的大型分析数据集与列存储索引表进行比较，在存储和性能方面存在巨大差异，这将在本书的后续部分进行演示和量化。


    请注意，本书中所有关于列存储索引的演示均在 `SQL Server 2019` 上测试。使用早期版本的读者在实施本书中的任何建议前应进行充分测试，因为可用的功能可能有所不同。


    图 3-4 说明了图 3-1 中的同一个表，在列存储索引中如何存储数据。


    ![](img/521866_1_En_3_Fig4_HTML.jpg)


    图 3-4

    聚集列存储索引中的数据存储示意图


    注意关键区别：数据是按列而不是按行排序的。第一列的所有值存储在一个单独的结构中，而其他每个列则存储在自己的页面集中。在图 3-3 所示的行存储表中，聚合了单个列，但必须读取每一页才能返回那一列的数据。


    图 3-5 展示了针对分析列存储索引表的相同查询。


    ![](img/521866_1_En_3_Fig5_HTML.jpg)


    图 3-5

    针对列存储索引聚合单个列


    因为数据在物理上按列分组，不再需要读取整个表来返回单个聚合列。其他四列可以被忽略。这极大地减少了对存储系统的读取，并降低了内存使用量，因为需要读入内存的页面更少。对于插入此表中的每个新行，只需要读取第二列的一个额外值。


    这种数据结构的一个显著优点是压缩变得更有效。单个列的一组值往往包含更多重复值，更容易压缩，而来自不同列的值重叠并良好压缩的可能性较低。更好的压缩意味着页面上可以容纳更多数据，从而进一步节省存储和内存。


    关于列存储索引的一个重要澄清是，它们并非“只是另一个索引”。它们不能与非聚集行存储索引、`XML` 索引、空间索引、内存优化索引或 `SQL Server`
    中包含的其他索引类型相提并论。它们构成了一种独特的架构，提供的益处远超典型索引所能提供的。


    请注意，在本书中，除非另有说明，所有演示和讨论都将引用聚集列存储索引。第 11 章将更详细地探讨非聚集列存储索引。


    ## SQL Server 中列存储索引的优势


    列存储索引成为存储大型分析数据的理想解决方案有很多原因。它们跨越了从成本到便利性再到速度的多个领域，并说明了一个看似简单的功能如何能以较低的实现时间和资源成本提供卓越的价值。这不是列存储索引优点的完整列表，但突出了使其在分析数据应用中具有吸引力的性能和效率关键点。本书的其余部分将更详细地探讨列存储索引的优势和最佳用例。

