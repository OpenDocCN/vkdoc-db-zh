    will be based on the cardinality of the query, the amount of data that needs to
    be read, and the version of SQL Server involved.


    There is value in directly comparing the performance of a query when it uses row
    mode vs. using batch mode and measuring the performance gains provided by batch
    mode.


    The following query performs a simple analytic operation against a columnstore
    index twice: once using compatibility level 120 (SQL Server 2014) and once using
    compatibility level 130 (SQL Server 2016). Listing [7-6](#521866_1_En_7_Chapter.xhtml#PC6)
    provides the code to perform this comparison.


    ```

    ALTER DATABASE WideWorldImportersDW SET COMPATIBILITY_LEVEL = 120;

    GO

    SELECT

    Sale.[City Key],

    COUNT(*)

    FROM fact.Sale

    GROUP BY Sale.[City Key]

    ALTER DATABASE WideWorldImportersDW SET COMPATIBILITY_LEVEL = 130;

    GO

    SELECT

    Sale.[City Key],

    COUNT(*)

    FROM fact.Sale

    GROUP BY Sale.[City Key]

    Listing 7-6

    Analytic Query Executed in Two Compatibility Levels

    ```


    The execution plans that result from these sample queries provide an immediate
    clue that a significant performance difference occurred here, as seen in Figure
    [7-11](#521866_1_En_7_Chapter.xhtml#Fig11).


    ![](images/521866_1_En_7_Chapter/521866_1_En_7_Fig11_HTML.jpg)


    Figure 7-11


    Execution plans showing significant performance discrepancies


    The two execution plans appear nearly identical, except that the query cost for
    the first is 90%, whereas the second query is 10%. In addition, aggregate pushdown
    occurred, allowing the GROUP BY in our query to be processed in line with the
    columnstore index scan. This prevented the need to push all 228265 rows one at
    a time on to the hash match operation. Figure [7-12](#521866_1_En_7_Chapter.xhtml#Fig12)
    compares the details for each columnstore index scan.


    ![](images/521866_1_En_7_Chapter/521866_1_En_7_Fig12_HTML.jpg)


    Figure 7-12


    Execution plan details for row mode vs. batch mode operation


    There are a handful of notable differences between the expensive execution plan
    on the left and the efficient execution plan on the right:


    *   Batch mode was used successfully to process 228265 rows in the second plan.


    *   CPU consumption using batch mode is nearly ten times less than using row mode.


    *   Actual Number of Locally Aggregated Rows documents aggregate pushdown.


    Making use of batch mode allows SQL Server to also take advantage of aggregate
    pushdown. The combination of these features was what allowed for CPU to be so
    greatly reduced.


    This raises an important aspect of batch mode processing that further increases
    its effectiveness on analytic workloads: batch mode enables other powerful performance-improving
    features to be used when a query is optimized. Some of these features (along with
    earliest SQL Server versions they were enabled) include


    *   Adaptive joins (SQL Server 2017)


    *   Memory grant feedback (SQL Server 2017)


    *   Aggregate pushdown (SQL Server 2016)


    Generally speaking, when SQL Server chooses to use batch mode, performance will
    be improved with its usage. Similarly, when additional intelligent query processing
    features are used (such as adaptive joins or aggregate pushdown), they will also
    have a positive impact on performance.


    Testing batch mode vs. row mode processing can be challenging as forcing a query
    to use one over the other is not always straightforward. One way to make this
    testing easier is to use database scoped configuration changes to temporarily
    disable these features. The T-SQL in Listing [7-7](#521866_1_En_7_Chapter.xhtml#PC7)
    provides the syntax needed to disable batch mode on rowstore, as well as batch
    mode memory grant feedback and batch mode adaptive joins.'
