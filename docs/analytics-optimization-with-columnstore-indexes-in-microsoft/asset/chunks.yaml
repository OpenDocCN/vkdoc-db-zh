    This view provides the cardinality of the column in *entry_count*, as well as
    the size of the dictionary and its type. There are a number of noteworthy takeaways
    from this data:


    *   Dictionaries may be global or local. A local dictionary only applies to a
    single rowgroup (or on rare occasions, rowgroups compressed via the same process
    as that one). A global dictionary is shared across many or all segments for a
    given column.


    *   Dictionaries may be created for numeric columns if SQL Server believes that
    will provide better compression than value compression. As a result, numeric columns
    can appear in this metadata, but some will not. Typically, numeric columns with
    a low cardinality will tend to use dictionary compression, whereas numeric columns
    that have a high cardinality will use value compression. In the preceding example,
    *Sale Ke*y, the primary key on the underlying data, is value compressed, whereas
