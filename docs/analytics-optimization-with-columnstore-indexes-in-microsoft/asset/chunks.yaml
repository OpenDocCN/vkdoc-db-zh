  trans: '## 修改数据的代价


    在第 5 章中，我们详细讨论了列存储压缩。一个重要的结论是，某些压缩形式，例如行程长度编码，依赖于底层数据的确切内容。列存储压缩通过应用各种编码、压缩算法和优化，在大幅缩减数据量方面表现得*异常出色*。请看图
    9-1 中的示例数据。


    ![](img/521866_1_En_9_Fig1_HTML.jpg)


    图 9-1：使用行程长度编码进行编码的示例数据


    示例数据使用字典压缩进行编码，通过 Vertipaq 优化重新排序，并进一步使用行程长度编码进行压缩。如果一个进程删除了表中的最后两行，那么就需要完全解压缩数据，删除行，然后重新压缩。图
    9-2 展示了这个过程将如何影响数据。


    ![](img/521866_1_En_9_Fig2_HTML.jpg)


    图 9-2：从行程长度编码的数据中删除行


    生成的索引 ID 组集合现在只包含 4 行，而不是 5 行（因为索引 ID 4 已被移除），并且索引 ID 3 的计数也已减少。


    如果表更大，并且删除影响了更多行，那么很可能需要解压缩、调整和重新压缩许多 `rowgroups`。在此过程中，许多页面都需要被更新。这个操作很快就会变得代价高昂。需要在写操作的速度和读操作的速度之间保持平衡，而在这种情况下，需要优先考虑快速加载和修改数据的能力。


    ## 删除操作


    在列存储索引中，解压缩 `rowgroups`、删除行以及重新压缩它们的成本非常高。删除操作针对的 `rowgroups` 越多，这个成本就会变得越高。为了减轻这一成本，使用了一种称为
    `delete bitmap` 的结构来跟踪从列存储索引中的删除。


    `delete bitmap` 是一个堆，它引用底层 `rowgroups` 中的行。当一行被删除时，`rowgroup` 中的数据保持不变，`delete
    bitmap` 会更新一个指向已删除行的引用。因此，列存储索引中的已删除行可以被视为软删除，即被移除的行被标记出来，但并未物理删除。


    请注意，针对 `delta store` 中行的删除操作不需要使用 `delete bitmap`，因为 `delta store` 是一个 `rowstore`
    堆，可以根据需要简单地从中删除行，而无需软删除。


    当针对包含已删除行的 `rowgroup` 执行查询时，会查询 `delete bitmap`，并将已删除行从结果中排除。`delete bitmap` 可以如图
    9-3 所示进行可视化。


    ![](img/521866_1_En_9_Fig3_HTML.jpg)


    图 9-3：删除位图及其与列存储索引的关系


    当对 `rowgroup` 中的行执行删除操作时，其底层行保持不变。相反，`delete bitmap` 跟踪哪些行被删除，并在未来针对该 `rowgroup`
    发出查询时进行查询。因此，在列存储索引中删除数据不会回收存储空间。


    请考虑清单 9-1 中所示的查询。


    ```

    DELETE

    FROM Fact.Sale_CCI

    WHERE [Invoice Date Key] = ''1/1/2016'';

    ```


    清单 9-1：从列存储索引中删除数据的查询


    执行时，此查询将删除所有发票日期为 2016 年 1 月 1 日的销售数据。在此之前，可以查询 `rowgroup` 元数据以确认当前 `rowgroup`
    中没有已删除的行。清单 9-2 中的查询将返回此列存储索引中 `rowgroups` 的元数据，包括已删除行的数量（如果有的话）。


    ```

    SELECT

    tables.name AS table_name,

    indexes.name AS index_name,

    partitions.partition_number,

    column_store_row_groups.state_description,

    column_store_row_groups.total_rows,

    column_store_row_groups.size_in_bytes,

    column_store_row_groups.deleted_rows

    FROM sys.column_store_row_groups

    INNER JOIN sys.indexes

    ON indexes.index_id = column_store_row_groups.index_id

    AND indexes.object_id = column_store_row_groups.object_id

    INNER JOIN sys.tables

    ON tables.object_id = indexes.object_id

    INNER JOIN sys.partitions

    ON partitions.partition_number = column_store_row_groups.partition_number

    AND partitions.index_id = indexes.index_id

    AND partitions.object_id = tables.object_id

    WHERE tables.name = ''Sale_CCI''

    ORDER BY indexes.index_id, column_store_row_groups.row_group_id;

    ```


    清单 9-2：返回有关 Rowgroups 中已删除行元数据的查询


    `rowgroup` 元数据如图 9-4 所示。


    ![](img/521866_1_En_9_Fig4_HTML.jpg)


    图 9-4：列存储索引的 Rowgroup 元数据，包括已删除行


    正如对一个未执行过任何删除操作的列存储索引所预期的那样，`sys.column_store_row_groups` 中的 `deleted_rows` 列对每个
    `rowgroup` 都显示为零。执行清单 9-1 中的查询将从列存储索引中删除总计 15,400 行。图 9-5 显示了删除完成后列存储索引的元数据详细信息。


    ![](img/521866_1_En_9_Fig5_HTML.jpg)


    图 9-5：发生删除后的 Rowgroup 元数据


    现在每个 `rowgroup` 都包含一定数量的已删除行，具体取决于其中碰巧在 2016 年 1 月 1 日开票的行数。请注意，每个 `rowgroup`
    中的总行数和字节大小并未改变。这是预料之中的，反映了行是通过 `delete bitmap` 进行软删除的这一事实。


    由于行是从索引中的所有 `rowgroups` 中移除的，如果没有 `delete bitmap` 的帮助，这次删除将需要重建整个索引，而为了等待删除单日的行数据而执行如此昂贵的操作是不现实的。相反，删除
    15,400 行的操作异常快速地在不到一秒内完成，这要归功于 `delete bitmap`！


    清理已删除行并释放 `rowgroups` 内所占用空间的唯一方法是对列存储索引或受删除影响的任何分区执行索引重建。这通常不是必需的，除非被删除数据的量相对于索引的总体大小变得很大。与经典的
    `rowstore` 索引一样，碎片化在变得过多之前并不是问题，此时可以通过重建来解决。请注意，索引 `reorganize`（重组）操作**不会**从列存储索引中移除已删除的行！第
    14 章将深入探讨索引维护，讨论其何时以及如何需要，以及使用的最佳实践。'
- fmt: "# Update Operations\n\n在列存储索引中，更新操作被作为两个操作执行：删除和插入。从逻辑上看，更新将作为单个原子单元执行，但在底层，它将由以下部分组成：\n\
    \n1.  一组被删除的行，在删除位图中被标记。\n2.  一组新插入的行，写入到增量存储中。\n\n这意味着更新操作需要写入到删除位图和增量存储才能成功完成。同样重要的是要注意，由列存储索引的更新操作所产生的插入操作将**专门使用**增量存储，并且无法利用批量加载进程。\n\
    \n在继续之前，将对列存储索引执行一次重组，以便于结果的可视化。清单 [9-3](#521866_1_En_9_Chapter.xhtml#PC3) 中的查询将重建索引。\n\
    \n```sql\nALTER INDEX CCI_fact_sale_CCI ON Fact.Sale_CCI REBUILD;\n```\n\n**清单\
    \ 9-3**\n重建列存储索引并移除删除位图的查询\n\n现在数据已清理干净，可以使用清单 [9-4](#521866_1_En_9_Chapter.xhtml#PC4)\
    \ 中的查询来返回列存储索引中所有行组的元数据，包括增量存储和删除位图。\n\n```sql\nSELECT\n    tables.name AS table_name,\n\
    \    indexes.name AS index_name,\n    partitions.partition_number,\n    column_store_row_groups.row_group_id,\n\
    \    column_store_row_groups.state_description,\n    column_store_row_groups.total_rows,\n\
    \    column_store_row_groups.size_in_bytes,\n    column_store_row_groups.deleted_rows,\n\
    \    internal_partitions.internal_object_type_desc,\n    internal_partitions.rows\n\
    FROM sys.column_store_row_groups\nINNER JOIN sys.indexes\n    ON indexes.index_id\
    \ = column_store_row_groups.index_id\n    AND indexes.object_id = column_store_row_groups.object_id\n\
    INNER JOIN sys.tables\n    ON tables.object_id = indexes.object_id\nINNER JOIN\
    \ sys.partitions\n    ON partitions.partition_number = column_store_row_groups.partition_number\n\
    \    AND partitions.index_id = indexes.index_id\n    AND partitions.object_id\
    \ = tables.object_id\nLEFT JOIN sys.internal_partitions\n    ON internal_partitions.object_id\
    \ = tables.object_id\nWHERE tables.name = 'Sale_CCI'\nORDER BY indexes.index_id,\
    \ column_store_row_groups.row_group_id;\n```\n\n**清单 9-4**\n返回列存储索引中行组的删除位图和增量存储元数据的查询\n\
    \n图 [9-6](#521866_1_En_9_Chapter.xhtml#Fig6) 中的结果显示了一个干净的列存储索引，其中没有已删除的行，增量存储中也没有条目。\n\
    \n![521866_1_En_9_Fig6_HTML.jpg](images/521866_1_En_9_Chapter/521866_1_En_9_Fig6_HTML.jpg)\n\
    \n**图 9-6**\n未对其执行删除/更新操作的行组的元数据\n\n有了这个原始的列存储索引，就可以轻松地可视化更新操作对它产生的影响。考虑清单 [9-5](#521866_1_En_9_Chapter.xhtml#PC5)\
    \ 中所示的查询。\n\n```sql\nSELECT\n    *\nFROM Fact.Sale_CCI\nWHERE [Invoice Date Key]\
    \ = '1/2/2016';\n```\n\n**清单 9-5**\n用于标识要更新的数据集的查询\n\n这个 `SELECT` 查询标识了表中总共 18,150\
    \ 行，这些行匹配发票日期为 '1/2/2016' 的筛选条件。接下来，将对表中的两个列进行更新，如清单 [9-6](#521866_1_En_9_Chapter.xhtml#PC6)\
    \ 所示。\n\n```sql\nUPDATE Sale_CCI\nSET [Total Dry Items] = [Total Dry Items] -\
    \ 1,\n    [Total Chiller Items] = [Total Chiller Items] + 1\nFROM Fact.Sale_CCI\n\
    WHERE [Invoice Date Key] = '1/2/2016';\n```\n\n**清单 9-6**\n用于从列存储索引更新数据的查询\n\n\
    回到清单 [9-4](#521866_1_En_9_Chapter.xhtml#PC4) 中的行组元数据查询，可以查看 `UPDATE` 语句的结果，示例如图\
    \ [9-7](#521866_1_En_9_Chapter.xhtml#Fig7) 所示。\n\n![521866_1_En_9_Fig7_HTML.jpg](images/521866_1_En_9_Chapter/521866_1_En_9_Fig7_HTML.jpg)\n\
    \n**图 9-7**\n更新 18,150 行后的行组元数据\n\n执行 `UPDATE` 后的元数据表明，列存储索引中的每个行组都受到了影响，因为 18,150\
    \ 行被删除，然后又有 18,150 行被插入。`` `Sys.internal_partitions` `` 显示了一个删除位图和一个增量存储对象，每个都包含总共\
    \ 18,150 行。行组详细信息说明了每个行组更新了多少行。此外，新的行组（编号 25）显示了为新插入的行创建的新打开的增量存储。\n\n由此产生的结构强调了这样一个事实：针对列存储索引的\
    \ `UPDATE` 操作是作为离散的删除和插入操作的组合来执行的。顺序执行这些操作中的每一个都会产生类似的结果。\n\n考虑针对此列存储索引中发票日期范围从\
    \ '1/3/2016' 到 '1/8/2016' 的所有行进行更新。对这些行的计数显示，匹配该日期筛选条件的总共有 148,170 行。在运行更新之前，将重建列存储索引，这将清理已删除的行和增量存储，以便更好地演示。清单\
    \ [9-7](#521866_1_En_9_Chapter.xhtml#PC7) 提供了重建索引然后更新这些行的查询。\n\n```sql\nALTER\
    \ INDEX CCI_fact_sale_CCI ON Fact.Sale_CCI REBUILD;\nGO\nUPDATE Sale_CCI\nSET\
    \ [Total Dry Items] = [Total Dry Items] - 1,\n    [Total Chiller Items] = [Total\
    \ Chiller Items] + 1\nFROM Fact.Sale_CCI\nWHERE [Invoice Date Key] >= '1/3/2016'\n\
    \  AND [Invoice Date Key] < '1/8/2016';\n```\n\n**清单 9-7**\n在重建索引后更新列存储索引中 148,170\
    \ 行的查询\n\n当更新 148,170 行时，首先要注意的是它执行了整整 5 秒！之前的 18,150 行更新在执行后几乎瞬间完成。查看元数据揭示了原因，如图\
    \ [9-8](#521866_1_En_9_Chapter.xhtml#Fig8) 所示。\n\n![521866_1_En_9_Fig8_HTML.jpg](images/521866_1_En_9_Chapter/521866_1_En_9_Fig8_HTML.jpg)\n\
    \n**图 9-8**\n更新 148,170 行后的行组元数据\n\n从更大更新后的元数据中得出的关键结论是，增量存储包含了此次操作中更新的全部 148,170\
    \ 行。通常，任何 102,400 行或更多的 `INSERT` 操作都将受益于最小日志记录的批量插入过程，但 `UPDATE` 操作无法从中受益。因为 `UPDATE`\
    \ 由同一个事务中的 `INSERT` 和 `DELETE` 组成，所以不可能将单个事务拆分为完全日志记录的 `DELETE` 和最小日志记录的 `INSERT`。\n\
    \n列存储索引上的批量插入过程在使用时可以节省大量资源，但不允许违反 SQL Server 数据库的 ACID（原子性、一致性、隔离性和持久性）属性。试图将完全日志记录和最小日志记录的事务拼接成一个更大的事务，需要创建一个事务，该事务将为\
    \ `DELETE` 提供时间点恢复功能，但不为 `INSERT` 提供。虽然可以设想 SQL Server 围绕该限制进行架构设计的方法，但这样做会对使用列存储索引的任何人造成困惑，并且在恢复包含频繁执行\
    \ `UPDATE` 操作的列存储索引的数据库时，可能导致意外结果。\n\n关键结论是，针对列存储索引的 `UPDATE` 操作将由一个 `DELETE`\
    \ 操作和一个完全日志记录的 `INSERT` 到增量存储中组成。随着更新行数的增加，这些操作的性能将急剧下降。增量存储是为处理少量行而构建的——无论是涓滴加载还是较大数据加载过程的剩余行。它不是为一次处理大量行而设计的，因此对于此类应用通常会表现不佳。\n\
    \n最后一个演示来强调这一挑战，那就是更新比单个行组所能容纳的更多的行。考虑清单 [9-8](#521866_1_En_9_Chapter.xhtml#PC8)\
    \ 中的示例查询。"
  raw: '## Update Operations


    In a columnstore index, an update is executed as two operations: a delete and
    an insert. While logically, the update will perform as a single atomic unit, under
    the covers it will consist of


    1.  A set of deleted rows, flagged in the delete bitmap


    2.  A set of newly inserted rows, written to the delta store


    This means that an update operation will need to write to both the delete bitmap
    and the delta store in order to complete successfully. It is also important to
    note that the insert operations that result from an update operation against a
    columnstore index will exclusively use the delta store and cannot take advantage
    of bulk load processes.


    Before continuing, a rebuild will be executed against the columnstore index to
    allow for easier visualization of the results. The query in Listing [9-3](#521866_1_En_9_Chapter.xhtml#PC3)
    will rebuild the index.


    ```

    ALTER INDEX CCI_fact_sale_CCI ON Fact.Sale_CCI REBUILD;

    Listing 9-3

    Query to Rebuild a Columnstore Index, Removing the Delete Bitmap

    ```


    With the data now clean, the query in Listing [9-4](#521866_1_En_9_Chapter.xhtml#PC4)
    can be used to return metadata about all rowgroups in the columnstore index, including
    both the delta store and delete bitmap.


    ```

    SELECT

    tables.name AS table_name,

    indexes.name AS index_name,

    partitions.partition_number,

    column_store_row_groups.row_group_id,

    column_store_row_groups.state_description,

    column_store_row_groups.total_rows,

    column_store_row_groups.size_in_bytes,

    column_store_row_groups.deleted_rows,

    internal_partitions.internal_object_type_desc,

    internal_partitions.rows

    FROM sys.column_store_row_groups

    INNER JOIN sys.indexes

    ON indexes.index_id = column_store_row_groups.index_id

    AND indexes.object_id = column_store_row_groups.object_id

    INNER JOIN sys.tables

    ON tables.object_id = indexes.object_id

    INNER JOIN sys.partitions

    ON partitions.partition_number = column_store_row_groups.partition_number

    AND partitions.index_id = indexes.index_id

    AND partitions.object_id = tables.object_id

    LEFT JOIN sys.internal_partitions

    ON internal_partitions.object_id = tables.object_id

    WHERE tables.name = ''Sale_CCI''

    ORDER BY indexes.index_id, column_store_row_groups.row_group_id;

    Listing 9-4

    Query to Return Delete Bitmap and Delta Store Metadata for Rowgroups in a Columnstore
    Index

    ```


    The results in Figure [9-6](#521866_1_En_9_Chapter.xhtml#Fig6) show a clean columnstore
    index with no deleted rows or entries in the delta store.


    ![](images/521866_1_En_9_Chapter/521866_1_En_9_Fig6_HTML.jpg)


    Figure 9-6


    Metadata for rowgroups with no deletes/updates against them


    With a pristine columnstore index available, the effects of update operations
    can be easily visualized against it. Consider the query shown in Listing [9-5](#521866_1_En_9_Chapter.xhtml#PC5).


    ```

    SELECT

    *

    FROM Fact.Sale_CCI

    WHERE [Invoice Date Key] = ''1/2/2016'';

    Listing 9-5

    Query to Identify a Data Set to Update

    ```


    This SELECT query identifies a total of 18,150 rows in the table that match the
    filter criteria of an invoice date of 1/2/2016\. Next, an update will be made
    against two columns in the table, as shown in Listing [9-6](#521866_1_En_9_Chapter.xhtml#PC6).


    ```

    UPDATE Sale_CCI

    SET [Total Dry Items] = [Total Dry Items] - 1,

    [Total Chiller Items] = [Total Chiller Items] + 1

    FROM Fact.Sale_CCI

    WHERE [Invoice Date Key] = ''1/2/2016'';

    Listing 9-6

    Query to Update Data from a Columnstore Index

    ```


    Returning to the rowgroup metadata query in Listing [9-4](#521866_1_En_9_Chapter.xhtml#PC4),
    the results of the UPDATE statement can be reviewed, with a sample seen in Figure
    [9-7](#521866_1_En_9_Chapter.xhtml#Fig7).


    ![](images/521866_1_En_9_Chapter/521866_1_En_9_Fig7_HTML.jpg)


    Figure 9-7


    Metadata for rowgroups after updating 18150 rows


    The metadata after the UPDATE was executed shows that every rowgroup in the columnstore
    index was impacted as 18,150 rows were deleted and 18,150 rows were then inserted.
    *Sys.internal_partitions* shows a delete bitmap and delta store object, each containing
    18,150 total rows. The rowgroup detail illustrates how many rows were updated
    per rowgroup. In addition, the new rowgroup (number 25) shows the new open delta
    store that was created for the newly inserted rows.


    The resulting structure underscores the fact that an UPDATE against a columnstore
    index executes as a combination of discrete delete and insert operations. Performing
    each of those operations sequentially would yield similar results.


    Consider an update to all rows in this columnstore index for the range of invoice
    dates from 1/3/2016 up to 1/8/2016\. A count of these rows shows a total of 148,170
    that match that date filter. Before running an update, the columnstore index will
    be rebuilt, which will clean up the deleted rows and delta stores, allowing for
    a better demonstration. Listing [9-7](#521866_1_En_9_Chapter.xhtml#PC7) provides
    the query to rebuild the index and then update these rows.


    ```

    ALTER INDEX CCI_fact_sale_CCI ON Fact.Sale_CCI REBUILD;

    GO

    UPDATE Sale_CCI

    SET [Total Dry Items] = [Total Dry Items] - 1,

    [Total Chiller Items] = [Total Chiller Items] + 1

    FROM Fact.Sale_CCI

    WHERE [Invoice Date Key] >= ''1/3/2016''

    AND [Invoice Date Key] < ''1/8/2016'';

    Listing 9-7

    Query to Update 148,170 Rows in a Columnstore Index After Rebuilding the Index

    ```


    When updating 148,170 rows, the first thing to note is that it took 5 full seconds
    to execute! The previous update of 18,150 rows completed almost instantly after
    being executed. Viewing the metadata reveals the reason for this, as seen in Figure
    [9-8](#521866_1_En_9_Chapter.xhtml#Fig8).


    ![](images/521866_1_En_9_Chapter/521866_1_En_9_Fig8_HTML.jpg)


    Figure 9-8


    Metadata for rowgroups after updating 148,170 rows


    The key takeaway from the metadata following the larger update is that the delta
    store contains all 148,170 rows updated in the operation. Normally, any INSERT
    operations of 102,400 rows or more will benefit from a minimally logged bulk insert
    process, but UPDATE operations cannot benefit from it. Because the UPDATE is composed
    of both an INSERT and DELETE in the same transaction, it is not possible to fork
    the single transaction into a fully logged DELETE and a minimally logged INSERT.


    Bulk insert processes on columnstore indexes can save immense resources when used,
    but are not allowed to violate the ACID (Atomic, Consistent, Isolated, and Durable)
    properties of a SQL Server database. Attempting to splice together a fully logged
    and minimally logged transaction into a single larger transaction would require
    the creation of a transaction that would provide point-in-time restore capabilities
    for the DELETE, but not the INSERT. While it is possible to conceive of ways for
    SQL Server to architect its way around that limitation, doing so would be confusing
    to anyone using a columnstore index and could result in unexpected results when
    restoring databases containing columnstore indexes that are subject to frequent
    UPDATE operations.


    The key takeaway is that an UPDATE against a columnstore index will be comprised
    of a DELETE operation and a fully logged INSERT into the delta store. As the number
    of rows updated increases, the performance of those operations will decrease dramatically.
    The delta store was built to handle small numbers of rows – either trickle loads
    or the residual rows from a larger data load process. It was not built for large
    volumes of rows at one time and as a matter of course will perform poorly for
    those applications.


    There is one final demonstration to underscore this challenge, and that is to
    update more rows than would fit into a single rowgroup. Consider the sample query
    in Listing [9-8](#521866_1_En_9_Chapter.xhtml#PC8).'
