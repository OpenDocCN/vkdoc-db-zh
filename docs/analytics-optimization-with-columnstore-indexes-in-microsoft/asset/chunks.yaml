  trans: '## Internal_object_type_desc


    此字段指示所引用的内部对象类型，可能为以下值之一：


    *   `COLUMN_STORE_DELETE_BITMAP`：这是列存储索引中每个行组关联的删除位图部分。`rows` 列中的值指示了此部分删除位图中记录了多少已删除行（如果有）。删除位图存储在行存储
    B 树结构中。每个行组都会有一个关联的删除位图，即使指示为已删除的行数为零。


    *   `COLUMN_STORE_DELTA_STORE`：这代表尚未在列存储索引中压缩成分段存储的增量行组。除非该行组存在增量行组，否则此视图中的这些条目不会存在。增量存储中的增量行组存储在行存储
    B 树结构中。


    *   `COLUMN_STORE_DELETE_BUFFER`：此对象专属于非聚集列存储索引，它将聚集行存储索引中已删除的行缓冲到非聚集列存储索引的删除位图中。从缓冲区到删除位图的已删除行数据移动由元组移动器管理，也可以通过索引重组命令强制执行。此缓冲区有助于提高在更新和删除操作可能频繁的
    OLTP 表上的删除速度，从而有助于提高写入非聚集列存储索引的速度。当从非聚集列存储索引读取数据时，删除缓冲区和删除位图会同时读取，以生成索引中已删除行的完整视图。除非表上存在非聚集列存储索引，否则此内部对象不会出现在
    `sys.internal_partitions` 中。


    *   `COLUMN_STORE_MAPPING_INDEX`：当聚集列存储索引上同时存在非聚集行存储索引时使用此索引。此映射索引用于将非聚集索引键列链接回聚集列存储索引中每个行组内的正确行。仅当行在行组之间移动时（例如，当增量存储行组移动到压缩行组中，或者当元组移动器合并行组时）才会使用此映射索引。除非满足这些条件且对象中存在行，否则此内部对象不会显示在
    `sys.internal_partitions` 中。


    # 7. 批处理执行


    SQL Server 中行的处理传统上是逐行管理的。对于事务性工作负载，这是一个合理的约定，因为读写操作的行数通常很小。


    常规操作涉及数千或数百万行的分析查询，不会从这种逐行读取的方式中受益。批处理执行是 SQL Server 的一种执行模式，允许在执行计划运算符之间成组读取和传递行，从而最终提高性能。


    当查询被执行且每个运算符被处理时，行在这些运算符之间传递的数量由执行模式决定。在行模式下，每一行依次从一个运算符传递到下一个运算符。在批处理模式下，行组在运算符之间传递。这种约定的结果是，在批处理模式下，控制权在运算符之间传递的次数更少，因为行可以在更少的批次中交接。


    ## 行模式执行


    估计基数较低的查询通常会使用行模式执行。在行模式执行中，行在通过执行计划中的每个运算符时被逐个读取。这听起来效率低下，但需要注意的是，以批处理方式处理行会产生相应的开销。因此，SQL
    Server 将在运行时做出决策，以确定查询在行模式或批处理模式下处理是否更高效。


    考虑清单 7-1 中的查询。


    ```sql

    SELECT

    Employee,

    [WWI Employee ID],

    [Preferred Name],

    [Is Salesperson]

    FROM Dimension.Employee

    WHERE [Employee Key] = 17;

    ```

    清单 7-1：返回单行的事务性查询


    此查询的结果是单行，因为它通过表的主键查找单个 ID 值。启用实际执行计划后，可以查看聚集索引查找的详细信息，如图 7-1 所示。


    ![](img/521866_1_En_7_Fig1_HTML.jpg)

    图 7-1：显示详细信息的执行计划


    请注意查询运算符详细信息中提供的执行模式。估计和实际执行模式都指示为行模式。鉴于基础表是行存储表，并且查询只返回一行，因此此操作预期使用行模式执行。


    虽然列存储索引针对操作大行数的分析查询进行了优化，并且通常会利用批处理处理，但如果优化器认为行模式是最有效的选项，则也可以选择行模式作为执行模式。


    清单 7-2 中的查询显示了一个针对列存储索引表执行的窄查询，该碰巧也有一个非聚集行存储主键。


    ```sql

    SELECT

    *

    FROM fact.Sale

    WHERE [Invoice Date Key] = ''1/1/2016''

    AND [Sale Key] = 198840;

    ```

    清单 7-2：对列存储索引使用行模式执行的查询


    此查询在使用了行模式的聚集列存储索引上返回单行，如图 7-2 所示。


    ![](img/521866_1_En_7_Fig2_HTML.jpg)

    图 7-2：针对列存储索引使用行模式执行的执行计划


    尽管执行计划运算符指示其使用列存储存储，但优化器选择了行模式作为执行模式。这不应被视为不寻常或次优。因为查询只返回一行，所以使用行模式针对该预期结果进行了优化，即使表存储在聚集列存储索引中。'
- fmt: '## `Batch Mode Execution`


    Queries that have a high cardinality can benefit from batch mode execution. In
    this execution mode, rows are divided into batches and processed in those batches
    for each operator in an execution plan where batch mode is chosen. In columnstore
    indexes, this will be the expected execution mode. For a large analytic query
    to not use batch mode would be considered an outlier. If that outlier was identified
    as a poorly performing query, then further investigation as to why batch mode
    was not used would be worthwhile.


    Consider the query in Listing 7-3.


    ```sql

    SELECT

    COUNT(*),

    MIN([Invoice Date Key]),

    MAX([Invoice Date Key])

    FROM fact.Sale

    WHERE [Invoice Date Key] >= ''1/1/2016'';

    ```

    *Listing 7-3: Query That Uses Batch Mode Execution Against a Columnstore Index*


    This query returns only a single row, but processes many rows to crunch these
    metrics. The execution plan in Figure 7-3 shows the details for this query.


    ![Figure 7-3: Execution plan with batch mode execution on a columnstore index](images/521866_1_En_7_Chapter/521866_1_En_7_Fig3_HTML.jpg)


    Batch is the expected execution mode and is what SQL Server chose for this query.
    Note that the plan details indicate that the “Actual Number of Locally Aggregated
    Rows” is 29,458. This is the number of rows required by SQL Server to satisfy
    the query, which is confirmed in the results shown in Figure 7-4.


    ![Figure 7-4: Results of a simple columnstore aggregation query](images/521866_1_En_7_Chapter/521866_1_En_7_Fig4_HTML.jpg)


    Whether batch mode is chosen by the query optimizer for a given plan operator
    depends on the number of rows processed by that operator and not on the number
    of rows returned by a query.


    Execution modes are not all-or-nothing choices for a query. The query optimizer
    can choose batch mode for some operators and row mode for others and will do so
    based on whatever mode it determines is most efficient for each.


    A common analytic query pattern is to aggregate data from a large columnstore
    index and join into dimension tables to provide lookup values where needed. The
    query in Listing 7-4 illustrates a classic scenario in which both dimension and
    fact tables are queried together.


    ```sql

    SELECT

    City.City,

    City.[State Province],

    City.Country,

    COUNT(*)

    FROM Fact.Sale

    INNER JOIN Dimension.City

    ON City.[City Key] = Sale.[City Key]

    WHERE [Invoice Date Key] >= ''1/1/2016''

    AND [Invoice Date Key] < ''2/1/2016''

    GROUP BY City.City, City.[State Province], City.Country;

    ```

    *Listing 7-4: Query That Joins a Large Analytic Table with a Small Lookup Table*


    The execution plan for this query is found in Figure 7-5.


    ![Figure 7-5: Execution plan for a query against fact and dimension tables](images/521866_1_En_7_Chapter/521866_1_En_7_Fig5_HTML.jpg)


    In the execution plan is a columnstore index scan on `fact.Sale`, as well as a
    scan against the `Dimension.City` lookup table. Figure 7-6 shows the properties
    for each table access operator, with the columnstore scan on the left and the
    rowstore scan on the right.


    ![Figure 7-6: Operator properties for columnstore and rowstore index scans](images/521866_1_En_7_Chapter/521866_1_En_7_Fig6_HTML.jpg)


    The columnstore index scan operates in batch mode, whereas the rowstore index
    scan operates in row mode. This query was executed against a database with SQL
    Server 2016 compatibility level (130). To test the effects of batch mode on rowstore
    usage, the compatibility level is adjusted to 150 (SQL Server 2019), as shown
    by the query in Listing 7-5.


    ```sql

    ALTER DATABASE WideWorldImportersDW SET COMPATIBILITY_LEVEL = 150;

    ```

    *Listing 7-5: Query to Alter the Database Compatibility Level to SQL Server 2019*


    After this change, the query in Listing 7-4 is executed again, with the execution
    plan shown in Figure 7-7.


    ![Figure 7-7: Execution plan for a query in compatibility level 150](images/521866_1_En_7_Chapter/521866_1_En_7_Fig7_HTML.jpg)


    When the compatibility level is switched to 150, multiple new features in SQL
    Server 2019 are enabled. The execution plan shows the use of adaptive joins, where
    the join to `Dimension.City` is given the option of either a clustered index scan
    or a clustered index seek. The actual row counts for each operator confirm that
    SQL Server chose to use the clustered index scan, due to the large number of rows
    returned. Figure 7-8 shows the operator properties for the clustered index scan
    against `Dimension.City`.


    ![Figure 7-8: Operator properties for the rowstore clustered index scan](images/521866_1_En_7_Chapter/521866_1_En_7_Fig8_HTML.jpg)


    With SQL Server 2019 features available, batch mode is chosen as the execution
    mode for the rowstore clustered index scan. For a query scanning many rows, this
    makes perfect sense.


    Starting in SQL Server 2019, batch mode can be used by SQL Server against rowstore
    tables, but will be limited to scenarios when row counts are higher and using
    batch mode is expected to improve performance. Prior to SQL Server 2019, batch
    mode was only available for columnstore indexes. This is a significant improvement
    as it can greatly improve analytic query performance against rowstore tables.


    This leads to an immediate question: If batch mode on rowstore tables can improve
    analytic performance, are columnstore indexes still useful? If batch mode were
    the only feature that made columnstore indexes highly performant, then that would
    be a valid question. Batch mode on rowstore tables does not provide the other
    benefits of columnstore indexes, such as columnstore compression, segment elimination,
    or actionable metadata. For tables that service primarily analytic workloads,
    clustered columnstore indexes will be the correct solution. For tables that service
    mixed OLAP and OLTP workloads, batch mode on rowstore will improve performance
    and potentially remove the need to create nonclustered columnstore indexes, assuming
    OLAP queries are isolated and do not scan too many rows at once. Ultimately, testing
    is required to determine the optimal indexing solution for a given application,
    but batch mode on rowstore is a helpful tool that will aid in this decision-making
    process. For more information on mixing rowstore and columnstore indexes, see
    Chapters 12 and 13.'
  raw: '## `Batch Mode Execution`


    Queries that have a high cardinality can benefit from batch mode execution. In
    this execution mode, rows are divided into batches and processed in those batches
    for each operator in an execution plan where batch mode is chosen. In columnstore
    indexes, this will be the expected execution mode. For a large analytic query
    to not use batch mode would be considered an outlier. If that outlier was identified
    as a poorly performing query, then further investigation as to why batch mode
    was not used would be worthwhile.


    Consider the query in Listing [7-3](#521866_1_En_7_Chapter.xhtml#PC3).


    ```

    SELECT

    COUNT(*),

    MIN([Invoice Date Key]),

    MAX([Invoice Date Key])

    FROM fact.Sale

    WHERE [Invoice Date Key] >= ''1/1/2016'';

    Listing 7-3

    Query That Uses Batch Mode Execution Against a Columnstore Index

    ```


    This query returns only a single row, but processes many rows to crunch these
    metrics. The execution plan in Figure [7-3](#521866_1_En_7_Chapter.xhtml#Fig3)
    shows the details for this query.


    ![](images/521866_1_En_7_Chapter/521866_1_En_7_Fig3_HTML.jpg)


    Figure 7-3


    Execution plan with batch mode execution on a columnstore index


    Batch is the expected execution mode and is what SQL Server chose for this query.
    Note that the plan details indicate that the “Actual Number of Locally Aggregated
    Rows” is 29,458\. This is the number of rows required by SQL Server to satisfy
    the query, which is confirmed in the results shown in Figure [7-4](#521866_1_En_7_Chapter.xhtml#Fig4).


    ![](images/521866_1_En_7_Chapter/521866_1_En_7_Fig4_HTML.jpg)


    Figure 7-4


    Results of a simple columnstore aggregation query


    Whether batch mode is chosen by the query optimizer for a given plan operator
    depends on the number of rows processed by that operator and not on the number
    of rows returned by a query.


    Execution modes are not all-or-nothing choices for a query. The query optimizer
    can choose batch mode for some operators and row mode for others and will do so
    based on whatever mode it determines is most efficient for each.


    A common analytic query pattern is to aggregate data from a large columnstore
    index and join into dimension tables to provide lookup values where needed. The
    query in Listing [7-4](#521866_1_En_7_Chapter.xhtml#PC4) illustrates a classic
    scenario in which both dimension and fact tables are queried together.


    ```

    SELECT

    City.City,

    City.[State Province],

    City.Country,

    COUNT(*)

    FROM Fact.Sale

    INNER JOIN Dimension.City

    ON City.[City Key] = Sale.[City Key]

    WHERE [Invoice Date Key] >= ''1/1/2016''

    AND [Invoice Date Key] < ''2/1/2016''

    GROUP BY City.City, City.[State Province], City.Country;

    Listing 7-4

    Query That Joins a Large Analytic Table with a Small Lookup Table

    ```


    The execution plan for this query is found in Figure [7-5](#521866_1_En_7_Chapter.xhtml#Fig5).


    ![](images/521866_1_En_7_Chapter/521866_1_En_7_Fig5_HTML.jpg)


    Figure 7-5


    Execution plan for a query against fact and dimension tables


    In the execution plan is a columnstore index scan on *fact.Sale*, as well as a
    scan against the *Dimension.City* lookup table. Figure [7-6](#521866_1_En_7_Chapter.xhtml#Fig6)
    shows the properties for each table access operator, with the columnstore scan
    on the left and the rowstore scan on the right.


    ![](images/521866_1_En_7_Chapter/521866_1_En_7_Fig6_HTML.jpg)


    Figure 7-6


    Operator properties for columnstore and rowstore index scans


    The columnstore index scan operates in batch mode, whereas the rowstore index
    scan operates in row mode. This query was executed against a database with SQL
    Server 2016 compatibility level (130). To test the effects of batch mode on rowstore
    usage, the compatibility level is adjusted to 150 (SQL Server 2019), as shown
    by the query in Listing [7-5](#521866_1_En_7_Chapter.xhtml#PC5).


    ```

    ALTER DATABASE WideWorldImportersDW SET COMPATIBILITY_LEVEL = 150;

    Listing 7-5

    Query to Alter the Database Compatibility Level to SQL Server 2019

    ```


    After this change, the query in Listing [7-4](#521866_1_En_7_Chapter.xhtml#PC4)
    is executed again, with the execution plan shown in Figure [7-7](#521866_1_En_7_Chapter.xhtml#Fig7).


    ![](images/521866_1_En_7_Chapter/521866_1_En_7_Fig7_HTML.jpg)


    Figure 7-7


    Execution plan for a query in compatibility level 150


    When the compatibility level is switched to 150, multiple new features in SQL
    Server 2019 are enabled. The execution plan shows the use of adaptive joins, where
    the join to *Dimension.City* is given the option of either a clustered index scan
    or a clustered index seek. The actual row counts for each operator confirm that
    SQL Server chose to use the clustered index scan, due to the large number of rows
    returned. Figure [7-8](#521866_1_En_7_Chapter.xhtml#Fig8) shows the operator properties
    for the clustered index scan against *Dimension.City*.


    ![](images/521866_1_En_7_Chapter/521866_1_En_7_Fig8_HTML.jpg)


    Figure 7-8


    Operator properties for the rowstore clustered index scan


    With SQL Server 2019 features available, batch mode is chosen as the execution
    mode for the rowstore clustered index scan. For a query scanning many rows, this
    makes perfect sense.


    Starting in SQL Server 2019, batch mode can be used by SQL Server against rowstore
    tables, but will be limited to scenarios when row counts are higher and using
    batch mode is expected to improve performance. Prior to SQL Server 2019, batch
    mode was only available for columnstore indexes. This is a significant improvement
    as it can greatly improve analytic query performance against rowstore tables.


    This leads to an immediate question: If batch mode on rowstore tables can improve
    analytic performance, are columnstore indexes still useful? If batch mode were
    the only feature that made columnstore indexes highly performant, then that would
    be a valid question. Batch mode on rowstore tables does not provide the other
    benefits of columnstore indexes, such as columnstore compression, segment elimination,
    or actionable metadata. For tables that service primarily analytic workloads,
    clustered columnstore indexes will be the correct solution. For tables that service
    mixed OLAP and OLTP workloads, batch mode on rowstore will improve performance
    and potentially remove the need to create nonclustered columnstore indexes, assuming
    OLAP queries are isolated and do not scan too many rows at once. Ultimately, testing
    is required to determine the optimal indexing solution for a given application,
    but batch mode on rowstore is a helpful tool that will aid in this decision-making
    process. For more information on mixing rowstore and columnstore indexes, see
    Chapters [12](#521866_1_En_12_Chapter.xhtml) and [13](#521866_1_En_13_Chapter.xhtml).'
  trans: '

    ## `批处理模式执行`


    具有高基数的查询可以从批处理模式执行中受益。在此执行模式下，对于执行计划中选择批处理模式的每个运算符，行会被划分为批次并在这些批次中进行处理。在列存储索引中，这将是预期的执行模式。对于大型分析查询而言，如果不使用批处理模式，将被视为异常情况。如果该异常被识别为性能不佳的查询，那么进一步调查为何未使用批处理模式将是值得的。


    考虑清单 7-3 中的查询。


    ```sql

    SELECT

    COUNT(*),

    MIN([Invoice Date Key]),

    MAX([Invoice Date Key])

    FROM fact.Sale

    WHERE [Invoice Date Key] >= ''1/1/2016'';

    ```

    *清单 7-3: 针对列存储索引使用批处理模式执行的查询*


    此查询仅返回一行，但需要处理许多行以计算这些指标。图 7-3 中的执行计划显示了此查询的详细信息。


    ![图 7-3: 在列存储索引上具有批处理模式执行的执行计划](img/521866_1_En_7_Fig3_HTML.jpg)


    批处理是预期的执行模式，也是 SQL Server 为此查询选择的模式。请注意，计划详情表明“实际本地聚合行数”为 29,458。这是 SQL Server
    满足查询所需的行数，图 7-4 中显示的结果证实了这一点。


    ![图 7-4: 一个简单的列存储聚合查询的结果](img/521866_1_En_7_Fig4_HTML.jpg)


    对于给定的计划运算符，查询优化器是否选择批处理模式，取决于该运算符处理的行数，而非查询返回的行数。


    执行模式对于一个查询来说，并非全有或全无的选择。查询优化器可以为某些运算符选择批处理模式，而为其他运算符选择行模式，并将根据其确定对每个运算符最高效的模式来做出决定。


    一种常见的分析查询模式是聚合大型列存储索引中的数据，并联接到维度表以在需要时提供查找值。清单 7-4 中的查询展示了一个经典场景，其中同时查询了维度表和事实表。


    ```sql

    SELECT

    City.City,

    City.[State Province],

    City.Country,

    COUNT(*)

    FROM Fact.Sale

    INNER JOIN Dimension.City

    ON City.[City Key] = Sale.[City Key]

    WHERE [Invoice Date Key] >= ''1/1/2016''

    AND [Invoice Date Key] < ''2/1/2016''

    GROUP BY City.City, City.[State Province], City.Country;

    ```

    *清单 7-4: 将大型分析表与小型查找表联接的查询*


    此查询的执行计划见图 7-5。


    ![图 7-5: 针对事实表和维度表查询的执行计划](img/521866_1_En_7_Fig5_HTML.jpg)


    执行计划中包含一个对 `fact.Sale` 的列存储索引扫描，以及一个对 `Dimension.City` 查找表的扫描。图 7-6 显示了每个表访问运算符的属性，左侧是列存储扫描，右侧是行存储扫描。


    ![图 7-6: 列存储和行存储索引扫描的运算符属性](img/521866_1_En_7_Fig6_HTML.jpg)


    列存储索引扫描以批处理模式运行，而行存储索引扫描则以行模式运行。此查询是在具有 SQL Server 2016 兼容级别 (130) 的数据库上执行的。为了测试批处理模式对行存储使用的影响，将兼容级别调整为
    150 (SQL Server 2019)，如清单 7-5 中的查询所示。


    ```sql

    ALTER DATABASE WideWorldImportersDW SET COMPATIBILITY_LEVEL = 150;

    ```

    *清单 7-5: 将数据库兼容级别更改为 SQL Server 2019 的查询*


    此更改后，再次执行清单 7-4 中的查询，执行计划如图 7-7 所示。


    ![图 7-7: 在兼容级别 150 下查询的执行计划](img/521866_1_En_7_Fig7_HTML.jpg)


    当兼容级别切换到 150 时，SQL Server 2019 中的多个新功能被启用。执行计划显示使用了自适应联接，其中与 `Dimension.City`
    的联接可以选择聚集索引扫描或聚集索引查找。每个运算符的实际行数证实，由于返回的行数众多，SQL Server 选择了使用聚集索引扫描。图 7-8 显示了针对
    `Dimension.City` 的行存储聚集索引扫描的运算符属性。


    ![图 7-8: 行存储聚集索引扫描的运算符属性](img/521866_1_En_7_Fig8_HTML.jpg)


    随着 SQL Server 2019 功能的可用，批处理模式被选为行存储聚集索引扫描的执行模式。对于扫描大量行的查询来说，这完全合理。


    从 SQL Server 2019 开始，SQL Server 可以对行存储表使用批处理模式，但这将限于行数较高且预计使用批处理模式能提高性能的场景。在 SQL
    Server 2019 之前，批处理模式仅适用于列存储索引。这是一个重大的改进，因为它可以显著提高针对行存储表的分析查询性能。


    这引出了一个直接的问题：如果行存储表上的批处理模式可以提高分析性能，那么列存储索引是否仍然有用？如果批处理模式是使列存储索引高性能的唯一特性，那么这个问题是成立的。行存储表上的批处理模式并不提供列存储索引的其他优势，例如列存储压缩、段消除或可操作的元数据。对于主要服务于分析工作负载的表，聚集列存储索引将是正确的解决方案。对于服务于混合
    OLAP 和 OLTP 工作负载的表，行存储上的批处理模式将提高性能，并可能消除创建非聚集列存储索引的需要，前提是 OLAP 查询是隔离的且不会一次扫描过多的行。最终，需要通过测试来确定给定应用程序的最佳索引解决方案，但行存储上的批处理模式是一个有用的工具，将有助于此决策过程。有关混合行存储和列存储索引的更多信息，请参见第
    12 章和第 13 章。

    '
- fmt: '## `How Does Batch Mode Work?`


    The goal of batch mode processing is to improve the throughput of data from its
    storage location to a SQL Server’s CPUs. To accomplish this, SQL Server fundamentally
    changes how data flows through execution plans from start to finish.


    A query execution plan can contain one or many operators that retrieve, join,
    or transform data before results can be returned. In row mode processing, rows
    are passed between each of those operators one at a time. The basic unit of work
    in query execution when using row mode is the row. Consider the execution plan
    shown in Figure [7-9](#521866_1_En_7_Chapter.xhtml#Fig9).


    ![](images/521866_1_En_7_Chapter/521866_1_En_7_Fig9_HTML.jpg)


    Figure 7-9


    Sample row mode execution plan with row counts


    In the execution plan, a clustered index scan is retrieving 276 rows that are
    passed into an aggregation that results in a single row that is in turn returned
    by the query. In row mode, each of the 276 rows is individually transferred from
    the clustered index scan operator to the stream aggregate operator.


    When used, batch mode processes multiple rows together, storing the resulting
    data structure as a set of vectors in memory. This results in a completely new
    way of data being passed from operator to operator in an execution plan. Each
    batch can consume up to 64 kilobytes and contain between 64 and 900 rows. The
    row batch can be visualized in Figure [7-10](#521866_1_En_7_Chapter.xhtml#Fig10).


    ![](images/521866_1_En_7_Chapter/521866_1_En_7_Fig10_HTML.jpg)


    Figure 7-10


    Basic structure of a row batch


    A row batch looks somewhat similar to the structure of a columnstore index and
    provides similar benefits in memory as a query is executed. The qualifying rows
    vector performs a similar function to the columnstore index’s delete bitmap in
    that it flags rows that are no longer logically needed by the batch. For example,
    if a filter is applied to a data set, it can be processed solely by updating the
    qualifying rows vector for the rows that are to be filtered out.


    Batch mode processing reduces CPU consumption by decreasing the number of times
    that data is transferred between execution plan operators. For example, 5000 rows
    processed via row mode processing will require at least 5000 CPU operations to
    move it between plan operators. The same data set processed via batch mode might
    assign 500 rows each to ten batches. In this scenario, data can be passed between
    execution plan operators using 5000/500 = 10 operations. These are approximations,
    but are illustrative for how batch mode and row mode processing affect CPU consumption.


    Another boon to batch mode processing is the ease in which it can take advantage
    of parallelism. Batches can be processed in parallel, allowing a multicore CPU
    architecture with available CPU capacity to process query plan operators more
    efficiently. Parallelism is a process that requires some CPU overhead to utilize.
    Therefore, the amount of rows involved in parallelism needs to be significant
    enough that the benefits of breaking a workload into smaller chunks outweigh the
    cost to do so. Row mode does not as easily benefit from parallelism in this regard
    as the effort to split single row operations into separate parallel operations
    and then combine them back together is far greater than the trivial savings afforded
    by that process.


    While batch mode may not always be chosen for rowstore tables, it will be the
    default choice for columnstore indexes. Since a rowgroup will contain up to 2^(20)
    rows, the volume of data that needs to be processed by a columnstore index scan
    will be large enough to ensure that SQL Server chooses batch mode as the likely
    candidate to provide the best performance for queries against that data.


    ## `Batch Mode vs. Row Mode Performance`


    While columnstore indexes will most often default to using batch mode processing,
    rowstore tables will have a choice as to which mode to utilize. That decision
    will be based on the cardinality of the query, the amount of data that needs to
    be read, and the version of SQL Server involved.


    There is value in directly comparing the performance of a query when it uses row
    mode vs. using batch mode and measuring the performance gains provided by batch
    mode.


    The following query performs a simple analytic operation against a columnstore
    index twice: once using compatibility level 120 (SQL Server 2014) and once using
    compatibility level 130 (SQL Server 2016). Listing [7-6](#521866_1_En_7_Chapter.xhtml#PC6)
    provides the code to perform this comparison.


    ```

    ALTER DATABASE WideWorldImportersDW SET COMPATIBILITY_LEVEL = 120;

    GO

    SELECT

    Sale.[City Key],

    COUNT(*)

    FROM fact.Sale

    GROUP BY Sale.[City Key]

    ALTER DATABASE WideWorldImportersDW SET COMPATIBILITY_LEVEL = 130;

    GO

    SELECT

    Sale.[City Key],

    COUNT(*)

    FROM fact.Sale

    GROUP BY Sale.[City Key]

    Listing 7-6

    Analytic Query Executed in Two Compatibility Levels

    ```


    The execution plans that result from these sample queries provide an immediate
    clue that a significant performance difference occurred here, as seen in Figure
    [7-11](#521866_1_En_7_Chapter.xhtml#Fig11).


    ![](images/521866_1_En_7_Chapter/521866_1_En_7_Fig11_HTML.jpg)


    Figure 7-11


    Execution plans showing significant performance discrepancies


    The two execution plans appear nearly identical, except that the query cost for
    the first is 90%, whereas the second query is 10%. In addition, aggregate pushdown
    occurred, allowing the `GROUP BY` in our query to be processed in line with the
    columnstore index scan. This prevented the need to push all 228265 rows one at
    a time on to the hash match operation. Figure [7-12](#521866_1_En_7_Chapter.xhtml#Fig12)
    compares the details for each columnstore index scan.


    ![](images/521866_1_En_7_Chapter/521866_1_En_7_Fig12_HTML.jpg)


    Figure 7-12


    Execution plan details for row mode vs. batch mode operation


    There are a handful of notable differences between the expensive execution plan
    on the left and the efficient execution plan on the right:


    *   Batch mode was used successfully to process 228265 rows in the second plan.


    *   CPU consumption using batch mode is nearly ten times less than using row mode.


    *   `Actual Number of Locally Aggregated Rows` documents aggregate pushdown.


    Making use of batch mode allows SQL Server to also take advantage of aggregate
    pushdown. The combination of these features was what allowed for CPU to be so
    greatly reduced.


    This raises an important aspect of batch mode processing that further increases
    its effectiveness on analytic workloads: batch mode enables other powerful performance-improving
    features to be used when a query is optimized. Some of these features (along with
    earliest SQL Server versions they were enabled) include


    *   Adaptive joins (SQL Server 2017)


    *   Memory grant feedback (SQL Server 2017)


    *   Aggregate pushdown (SQL Server 2016)


    Generally speaking, when SQL Server chooses to use batch mode, performance will
    be improved with its usage. Similarly, when additional intelligent query processing
    features are used (such as adaptive joins or aggregate pushdown), they will also
    have a positive impact on performance.


    Testing batch mode vs. row mode processing can be challenging as forcing a query
    to use one over the other is not always straightforward. One way to make this
    testing easier is to use database scoped configuration changes to temporarily
    disable these features. The T-SQL in Listing [7-7](#521866_1_En_7_Chapter.xhtml#PC7)
    provides the syntax needed to disable batch mode on rowstore, as well as batch
    mode memory grant feedback and batch mode adaptive joins.'
