    only 30,140 rows are returned, all 21 columns need to have their segments retrieved
    as part of the operation. Figure [10-3](#521866_1_En_10_Chapter.xhtml#Fig3) provides
    the output of STATISTICS IO for this query.


    ![](images/521866_1_En_10_Chapter/521866_1_En_10_Fig3_HTML.jpg)


    Figure 10-3


    IO for a sample SELECT * query


    Note that a total of 68,030 LOB logical reads are recorded. Listing [10-3](#521866_1_En_10_Chapter.xhtml#PC3)
    contains an alternative query in which only a small set of columns required by
    an application are returned.


    ```

    SELECT

    [Sale Key],

    [City Key],

    [Invoice Date Key]

    FROM fact.Sale_CCI

    WHERE [Invoice Date Key] = ''2/17/2016'';

    Listing 10-3

    A Query Against a Columnstore Index Requesting Only Three Columns

    ```


    Here, only three of the columns are requested, instead of all of them. The resulting
    IO can be viewed in Figure [10-4](#521866_1_En_10_Chapter.xhtml#Fig4).


    ![](images/521866_1_En_10_Chapter/521866_1_En_10_Fig4_HTML.jpg)


    Figure 10-4


    IO for a sample query requesting data from three columns


    When the column list was reduced to only those needed for the query, LOB logical
    reads were reduced from 68,030 to 31,689\. The performance improvement for omitting
    columns will vary based on the data type, compression, and contents of each column.
    Omitting a text column with no repeated values will reduce IO far more than omitting
    a BIT column.


    Segment elimination is an easy way to improve query speeds while also reducing
    resource consumption. Anyone writing queries against columnstore indexes should
    consider which columns are required for their workloads and ensure that no extra
    columns are returned.


    ## Rowgroup Elimination


    Unlike rowstore indexes, columnstore indexes have no built-in order. The data
    that is inserted into a columnstore index is added in the order it is received
    by SQL Server. As a result, the order of data within rowgroups is the direct result
    of the order it was inserted. Equally important is that UPDATE operations will
    reorder a columnstore index, removing rows from one set of rowgroups and inserting
    the new versions into the most current open rowgroups.


    Because compressing rowgroups is a computationally expensive process, the cost
    to intrinsically maintain any form of data order would be prohibitively high.
    This is one of the most important concepts when architecting a columnstore index.
    Since data order is not enforced by SQL Server, it is the responsibility of the
    architect to determine data order up front and ensure that both data load processes
    and common query patterns maintain that agreed-upon data order.


    Consider the table *Dimension.Employee* that contains a clustered rowstore index
    on the *Employee Key* column. If three new employees start work and are added
    to the table, the INSERT operations to add them could be represented by the T-SQL
    in Listing [10-4](#521866_1_En_10_Chapter.xhtml#PC4).


    ```

    INSERT INTO Dimension.Employee

    ([Employee Key], [WWI Employee ID], Employee, [Preferred Name], [Is Salesperson],
    Photo, [Valid From], [Valid To], [Lineage Key])

    VALUES

    (   -1, -- Clustered Index

    289, N''Ebenezer Scrooge'', N''Scrooge'', 0, NULL, GETUTCDATE(), ''9999-12-31
    23:59:59.9999999'', 3),

    (   213, -- Clustered Index

    400, N''Captain Ahab'', N''Captain'', 0, NULL, GETUTCDATE(), ''9999-12-31 23:59:59.9999999'',
    3),

    (   1017, -- Clustered Index

    501, N''Holden Caulfield'', N''Phony'', 0, NULL, GETUTCDATE(), ''9999-12-31 23:59:59.9999999'',
    3);

    Listing 10-4

    Query to Add Three New Employees to the Dimension.Employee Table

    ```


    There are three rows inserted into the table, with clustered index ID values of
    -1, 213, and 1017\. When inserted, SQL Server will place each row in the b-tree
    index in order with the rest of the rows, based on those *Employee Key* values.
    As a result, the table will remain ordered by the clustered index after the INSERT
    operation.


    Imagine for a moment that this table did not have a rowstore index, but instead
    had a clustered columnstore index. In that scenario, the three rows would be inserted
    at the end of the open rowgroup(s) without any regard to the value of *Employee
    Key*. A query that searches for a specific range of IDs will need to examine any
    rowgroup that contains the IDs.


    Columnstore metadata helps SQL Server locate rows based on the range of values
    for each column present in each rowgroup. Consider the metadata for the *Invoice
    Date Key* column in *Fact.Sale_CCI* using the query in Listing [10-5](#521866_1_En_10_Chapter.xhtml#PC5).


    ```

    SELECT

    tables.name AS table_name,

    indexes.name AS index_name,

    columns.name AS column_name,

    partitions.partition_number,

    column_store_segments.segment_id,

    column_store_segments.min_data_id,

    column_store_segments.max_data_id,

    column_store_segments.row_count

    FROM sys.column_store_segments

    INNER JOIN sys.partitions

    ON column_store_segments.hobt_id = partitions.hobt_id

    INNER JOIN sys.indexes

    ON indexes.index_id = partitions.index_id

    AND indexes.object_id = partitions.object_id

    INNER JOIN sys.tables

    ON tables.object_id = indexes.object_id

    INNER JOIN sys.columns

    ON tables.object_id = columns.object_id

    AND column_store_segments.column_id = columns.column_id

    WHERE tables.name = ''Sale_CCI''

    AND columns.name = ''Invoice Date Key''

    ORDER BY tables.name, columns.name, column_store_segments.segment_id;

    Listing 10-5

    Query to Examine Metadata for a Single Column of a Columnstore Index

    ```


    The results are shown in Figure [10-5](#521866_1_En_10_Chapter.xhtml#Fig5).


    ![](images/521866_1_En_10_Chapter/521866_1_En_10_Fig5_HTML.jpg)


    Figure 10-5


    Metadata for the Invoice Date Key column of a columnstore index'
