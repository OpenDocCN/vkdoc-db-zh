- fmt: '## Native Analytic Data in SQL Server


    One of the greatest benefits of `columnstore indexes` is that they store analytic
    data directly in `SQL Server` without any added licensing or configuration changes.
    Similarly, no hardware or software changes are required to begin testing or implementing
    `columnstore indexes`.


    A `rowstore` table containing analytic data could be converted to use a `columnstore
    index`, with the entire process taking place on the same `SQL Server` database
    instance or even as an in-place index swap. This can allow for easy testing, validation,
    and implementation, when ready.


    Because `columnstore indexes` are a feature that is core to analytic data storage
    in `SQL Server`, it is updated with each new version. Each update provides new
    functionality and ways in which reading or writing `columnstore indexes` can become
    faster and more efficient. The following document from Microsoft outlines in detail
    the `columnstore index` features available in each version of `SQL Server` since
    their inception:


    [https://docs.microsoft.com/en-us/sql/relational-databases/indexes/columnstore-indexes-what-s-new](https://docs.microsoft.com/en-us/sql/relational-databases/indexes/columnstore-indexes-what-s-new)


    The list is quite extensive and shows how `columnstore indexes` have evolved from
    an inflexible read-only structure into one rich in features and optimizations.


    Storing data natively in `SQL Server` means there is no need for third-party products,
    no costly migrations, and no need to configure new hardware and software. The
    time required to implement them is less guided by technology and more by typical
    development and quality assurance needs. When building a project plan for the
    storage and maintenance of analytic data, factoring in these resource costs can
    help in making an accurate, fact-based decision. The following is a summary of
    these considerations:


    *   Need to purchase/license new hardware to support analytic data

    *   Cost of software licenses for analytics software and any supporting software

    *   Cost of computing resources, whether on premises or in the cloud

    *   Time required to architect, develop test, and implement analytic data solution

    *   Resources needed to educate people on how to use the new solution


    Quantifying each of these factors can assist in comparing and contrasting different
    solutions and will generally provide favorable results for an organization that
    already uses `SQL Server` for its transactional data storage.


    ## Scalability


    Given the rapid rate in which analytic data can grow, any data structures used
    to store it must be capable of efficiently servicing `OLAP` workloads, even when
    data depth or width increases unexpectedly fast over time.


    The ability for an analytic data storage solution to scale has many important
    benefits, including


    *   Ensure high performance, even during periods of rapid data growth

    *   Avoid costly migrations to new technologies

    *   Avoid disruptions to reporting/analytic services

    *   Reduce maintenance and downtime

    *   Reduce the need for hardware upgrades


    For an `OLAP` solution to be effective, it needs to be fast and efficient with
    one thousand rows, one million rows, one billion rows, or more. If a system is
    destined to become inefficient when it gets large, then it is also destined to
    fail.


    The growth of analytic data is a metric worthy of measuring and revisiting periodically
    to fully understand its long-term resource requirements. `OLAP` data rarely gets
    smaller, and its growth rate rarely decreases. This growth is ultimately tied
    to two measurements for any given organization:


    *   Growth

    *   Complexity


    As an organization grows and serves more customers, those customers will generate
    more data. Similarly, organizational growth almost always leads to both technical
    and nontechnical processes becoming more complex. This complexity may manifest
    itself in increased software features, more processes that require tracking, or
    requests for more types of data to maintain and crunch over time.


    The rate of growth of data can be summarized as follows:


    `1.00 * N * G * C`


    In this representation, the letters denote the following:


    *   **N =** **Natural Growth:** This is the growth of data that occurs currently.
    If nothing else changes and no external influences adjust the data growth rate,
    then this would be the only factor needed to predict future data growth. This
    can be measured in rows per unit time and also as an increase in physical data
    size as average bytes per row times rows per unit time.

    *   **G =** **Data Growth:** Natural growth provides a baseline of how much data
    will be added to a table or database over time. This growth is rarely linear,
    though. New customers, increased sample frequency, and other factors will account
    for additional growth above and beyond the current baseline. This can also be
    measured in rows per unit time or as physical data usage per unit time.

    *   **C = Increased Complexity:** This accounts for more columns being added to
    tables as well as new tables being created and populated. This also increases
    the amount of data that needs to flow (via more entities) from transactional systems
    into the target analytic system. This is challenging to measure, but can be estimated
    as a measure of new metrics over time. That is, on average how many new metrics
    per unit time will be added to an analytic data source. This can be approximated
    in storage units as soon as the data types for new metrics are known.


    Each of these factors is defined here as linear in nature, but may not be linear
    in actuality. Therefore, they should be revisited regularly to ensure that unexpected
    changes in growth are accounted for when predicting future data size. Linear approximations
    per unit time can be used to approximate nonlinear growth so long as those approximations
    remain updated with current and future trends.


    To provide a sample of the preceding formula, consider an analytic table that
    contains 100,000,000 rows, currently grows by 250,000 rows per day, and is expected
    to see its growth accelerate by an additional 25% per year, but not see any new
    dimensions added in the foreseeable future. The estimated row count in 1 year
    would be given by


    ```

    1.00 * N * G * C * Row Count = 1.00 * 1.9125* 1.25 * 1.00 * 100,000,000 = 239,062,500
    rows for the upcoming year.

    ```


    ```

    1.00 * N * G * C * Row Count = 1.00 * 1.9125* 1.25 * 1.00 * 239,062,500 = 571,508,789
    rows for the 2nd year.

    ```


    ```

    1.00 * N * G * C * Row Count = 1.00 * 1.9125* 1.25 * 1.00 * 571,508,789 = 1,366,263,198
    rows for the 3rd year.

    ```


    Note how quickly the added acceleration grew this data – from 100 million rows
    to over 1.3 billion rows in 3 years! `1.9125` was calculated as the annual growth
    factor by multiplying `250,000` rows per day by `365` days per year.


    To summarize, any technology that manages analytic data needs to be capable of
    efficient data access given that typical data growth can cause data sizes to balloon
    far faster than conventional wisdom might suggest. The architecture of `columnstore
    indexes` will be discussed in detail in Chapter [4](#521866_1_En_4_Chapter.xhtml)
    and will lay the foundation for explaining why they can scale so effectively for
    rapidly growing data.'
