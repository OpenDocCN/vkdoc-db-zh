    # Introduction


    Analytic data is an ever-present challenge for developers, analysts, and data
    professionals. Its rapid growth coupled with the constant organizational need
    for speedy answers to complex questions leads to the question of how massive amounts
    of data can be stored efficiently enough to allow for real-time analytics.


    ## What Is This Book?


    This book uses columnstore indexes as a tool to address the challenge of storing
    different types of analytic data efficiently. Applications such as data warehousing,
    logging, reporting, analytics, and data science can all be solved by effective
    use of columnstore indexes. In addition, real-time operational analytics can be
    accomplished with this tool.


    *Analytics Optimization with Columnstore Indexes in Microsoft SQL Server* is structured
    into three functionally different sections:


    - Chapters [1](#521866_1_En_1_Chapter.xhtml) and [2](#521866_1_En_2_Chapter.xhtml):
    Introduction to analytic data and its challenges

    - Chapters [3](#521866_1_En_3_Chapter.xhtml) and [4](#521866_1_En_4_Chapter.xhtml):
    Columnstore index basics and architecture

    - Chapters [5](#521866_1_En_5_Chapter.xhtml)–[15](#521866_1_En_15_Chapter.xhtml):
    Deep dives into features, architecture, and best practices


    The goal is to provide enough theory, architecture, use cases, and code to enable
    the immediate use of this feature in solving real-world problems.


    Each chapter tackles a specific feature or data architecture need from a high-level
    overview, then delving into extensive detail. While not all professionals may
    need to know precisely how columnstore indexes compress their data, having that
    knowledge available will provide value in the future when the need to improve
    performance arises.


    Most examples in this book are derived from data in the `WideWorldImportersDW`
    and `WideWorldImporters` databases. On their own, they do not provide enough data
    to allow for meaningful examples of analytic data. To augment this, new tables
    are created, copied, and modified to allow for objects that are large and interesting
    enough to be useful in demonstrating columnstore indexes. While real-world tables
    can easily contain tens of billions of rows, the examples in this book settle
    for about 25 million rows. This provides a healthy compromise between effective
    test data and tables that are so large that building them takes a very long time.


    ## Intended Audience


    This book is intended for data professionals, architects, and developers as a
    tool to tame reporting and analytic data quickly, inexpensively, and effectively.
    Topics in this book range from introductory to quite advanced, allowing it to
    be used as a tool by both beginners and those with years of data architecture
    experience under their belts.


    Those who have little experience with columnstore storage technologies will learn
    everything needed to implement this feature for the first time and begin realizing
    its benefits. Data experts can use the feature and architecture details, as well
    as demonstrations provided throughout this book as a tool to optimize existing
    data structures.


    Columnstore indexes are not only for reporting and analytic data. They can also
    be used to table the complex organizational need for real-time operational analytics.
    When analytic and transactional workloads mix, the risk exists for latency, blocking,
    locking, and deadlocking. Developers and data professionals that work with mixed
    workloads can benefit greatly from the use of columnstore indexes to help cover
    each workload effectively. In addition to improving performance, these efforts
    can avoid the need to purchase or architect new systems to manage portions of
    a mixed workload.


    ## Why Columnstore Indexes?


    There are many solutions available that help tame analytic data, but most require
    investing heavily in new hardware, software, technologies, and architecture. Not
    all organizations can (or should) feel forced into investing immense resources
    in new solutions unless there is a truly compelling reason to do so.


    Columnstore indexes can be implemented in SQL Server using existing hardware and
    licenses, allowing for analytic data solutions to be realized without a significant
    investment of time and resources. This allows for easier QA and testing of the
    feature without the need to commit to it up front.


    In addition to providing a robust solution, columnstore indexes are based on mature
    technology that has underpinned many other data storage products (such as PowerPivot
    and SSAS) for years. Despite their maturity, columnstore indexes in SQL Server
    evolve and improve with each new version that is released.


    ## Contacting the Author


    This book is incomplete without readers, and this experience is only truly meaningful
    when I am available to answer questions and accept feedback. The thoughts that
    are shared with me at conferences, industry events, and through electronic means
    provide ways to grow and improve, as well as ideas worthy of consideration.


    Feel free to contact me about this book, its topic, or related thoughts via Twitter
    (@EdwardPollack) or email (ed@edwardpollack.com).


    ## Acknowledgments


    A big shout-out to the SQL Server community and the many speakers, organizers,
    colleagues, and others who have supported and advised me over the years and provided
    opportunities to grow both personally and professionally.


    A book doesn’t happen without dedicated reviewers and editors. Speakers do not
    get the opportunity to share their knowledge and grow without organizers, sponsors,
    and volunteers that provide those chances. Articles are not written without companies,
    editors, and services to support and encourage that work.


    To everyone that has provided those opportunities to be a part of your events,
    publications, and groups: Thank you!!!


