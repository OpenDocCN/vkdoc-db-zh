- fmt: '# Performance of Bulk Loading into Columnstore Indexes


    To demonstrate the impact of bulk loading data into a columnstore index, a test
    will be conducted against a rowstore copy of `Fact.Sale`. The table’s creation
    is not shown here, but is an identical copy, with only a clustered primary key
    and page compression, rather than a clustered columnstore index. This insert query
    is shown in Listing 8-1.


    ```sql

    INSERT INTO fact.Sale_Transactional

    ([Sale Key], [City Key],[Customer Key], [Bill To Customer Key], [Stock Item Key],
    [Invoice Date Key], [Delivery Date Key], [Salesperson Key], [WWI Invoice ID],

    Description, Package, Quantity, [Unit Price], [Tax Rate], [Total Excluding Tax],
    [Tax Amount], Profit, [Total Including Tax], [Total Dry Items],

    [Total Chiller Items], [Lineage Key])

    SELECT TOP 102400

    *

    FROM Fact.Sale;

    ```

    **Listing 8-1**

    An Insert of 102,400 Rows into a Clustered Rowstore Index


    The insert takes about 1 second. With the rows inserted, an undocumented but useful
    system function will be used to read the contents of the transaction log and determine
    the size of the transaction, as seen in Listing 8-2.


    ```sql

    SELECT

    fn_dblog.allocunitname,

    SUM(fn_dblog.[log record length]) AS log_size

    FROM sys.fn_dblog (NULL, NULL)

    WHERE fn_dblog.allocunitname = (''Fact.Sale_Transactional.PK_Fact_Sale_Transactional'')

    GROUP BY fn_dblog.allocunitname;

    ```

    **Listing 8-2**

    Query to Calculate the Transaction Size for a Clustered Rowstore Insert


    The result is a single row that indicates the total log size for the insert transaction,
    as seen in Figure 8-2.


    ![](images/521866_1_En_8_Chapter/521866_1_En_8_Fig2_HTML.jpg)


    **Figure 8-2**

    Transaction size for an insert of 102,400 rows into a clustered rowstore index


    The log size returned for the rowstore insert was 225,856 bytes, or about 220KB.
    The same insert will now be performed against a clean copy of the table with a
    columnstore index, as seen in Listing 8-3.


    ```sql

    INSERT INTO fact.Sale_CCI_Clean_Test

    ([Sale Key], [City Key],[Customer Key], [Bill To Customer Key], [Stock Item Key],
    [Invoice Date Key], [Delivery Date Key], [Salesperson Key], [WWI Invoice ID],

    Description, Package, Quantity, [Unit Price], [Tax Rate], [Total Excluding Tax],
    [Tax Amount], Profit, [Total Including Tax], [Total Dry Items],

    [Total Chiller Items], [Lineage Key])

    SELECT TOP 102400

    *

    FROM Fact.Sale;

    ```

    **Listing 8-3**

    An Insert of 102,400 Rows into a Clustered Columnstore Index


    This insert takes less than a second to complete. A new clean table is used to
    ensure that there are no residual transactions from previous demonstrations that
    would pollute the log. The results from `fn_dblog()` are seen in Figure 8-3.


    ![](images/521866_1_En_8_Chapter/521866_1_En_8_Fig3_HTML.jpg)


    **Figure 8-3**

    Transaction size for an insert of 102,400 rows into a clustered columnstore index


    Note that the transaction log size for the insert is 118,192 bytes, or about 115KB.
    This constitutes a significant reduction in transaction size when compared to
    a page compressed rowstore index.


    With the impact that bulk loading can have on transaction size demonstrated, it
    is important to illustrate the difference between inserting 102,400 rows into
    a columnstore index and inserting 102,399 rows. The T-SQL in Listing 8-4 inserts
    102,399 rows into a newly created clustered columnstore index.


    ```sql

    INSERT INTO fact.Sale_CCI_Clean_Test_2

    ([Sale Key], [City Key],[Customer Key], [Bill To Customer Key], [Stock Item Key],
    [Invoice Date Key], [Delivery Date Key], [Salesperson Key], [WWI Invoice ID],

    Description, Package, Quantity, [Unit Price], [Tax Rate], [Total Excluding Tax],
    [Tax Amount], Profit, [Total Including Tax], [Total Dry Items],

    [Total Chiller Items], [Lineage Key])

    SELECT TOP 102399

    *

    FROM Fact.Sale;

    ```

    **Listing 8-4**

    An Insert of 102,399 Rows into a Clustered Columnstore Index


    This takes about a second to execute. The query to pull data from `fn_dblog()`
    needs to be adjusted slightly to accommodate the log growth due to both the columnstore
    index itself and the delta store. This is shown in Listing 8-5.


    ```sql

    SELECT

    fn_dblog.allocunitname,

    SUM(fn_dblog.[log record length]) AS log_size

    FROM sys.fn_dblog (NULL, NULL)

    WHERE fn_dblog.allocunitname IN (''Fact.Sale_CCI_Clean_Test_2.CCI_Sale_CCI_Clean_Test_2'',
    ''Fact.Sale_CCI_Clean_Test_2.CCI_Sale_CCI_Clean_Test_2(Delta)'')

    GROUP BY fn_dblog.allocunitname;

    ```

    **Listing 8-5**

    Query to Calculate Log Growth for Columnstore Index and Delta Store


    Note that the delta store needs to be referenced separately to be included in
    the results. The transaction log space consumed by each object is seen in Figure
    8-4.


    ![](images/521866_1_En_8_Chapter/521866_1_En_8_Fig4_HTML.jpg)


    **Figure 8-4**

    Transaction size for an insert of 102,399 rows into a clustered columnstore index


    The insert into the delta store was significantly more expensive than any operation
    demonstrated thus far in this chapter, with a transaction size of 1,300,448, or
    about 1.2GB. As a result, there is a significant incentive to take advantage of
    bulk loading data into columnstore indexes when possible.


    ## Trickle Insert vs. Staged Insert


    While inserting into the delta store may seem expensive, it is nowhere near as
    costly as repeated inserts into a columnstore index would be. If an analytic table
    is often targeted with many smaller insert operations, there is significant value
    in collecting those rows into a temporary table first, prior to inserting into
    the columnstore index.


    In workloads involving rowstore tables, large insert operations may be batched
    into small groups of rows in order to reduce contention and decrease the transaction
    size for each insert. Columnstore indexes do not benefit from micro-batching.
    When migrating code from rowstore tables to columnstore tables, resources can
    be saved by adjusting data load processes to operate on significantly larger batches.
    Batches of `2^(20)` (1,048,576) rows are optimal, though a batch size greater
    than or equal to 102,400 will ensure that the delta store is not needed. If insert
    operations contain tens of millions of rows, then those inserts can be broken
    down into more manageable subunits to prevent a staging or temporary table from
    becoming too large.


    The best practices for loading data into columnstore indexes are as follows:


    1. Load at least 102,400 rows per insert operation.

    2. When possible, load 1,048,576 rows per batch.

    3. Only load less than 102,400 rows for the remaining rows at the end of the data
    load.


    While this guidance may make it seem as though the delta store should be avoided
    at all costs, the goals of an analytic data store should not be compromised for
    this purpose. Delaying reporting data to prevent delta store usage is not worthwhile
    and will not save enough resources to be meaningful. Actively avoiding the insert
    of repeated small batches will ensure that insert performance is quite good. If
    the delta store is needed for the tail end of a data load process, then there
    is no reason to avoid it.


    ## Other Data Load Considerations


    Vertipaq optimization, which can greatly improve the effectiveness of columnstore
    index compression, is not used when a nonclustered rowstore index is present on
    a clustered columnstore index. Over time, this will result in rowgroups that will
    consume more resources than they would otherwise.


    For scenarios where nonclustered rowstore indexes are required to support analytic
    processes, consider the following options for managing performance on the columnstore
    index.'
