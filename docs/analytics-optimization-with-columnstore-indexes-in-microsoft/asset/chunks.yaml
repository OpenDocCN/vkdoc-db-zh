  trans: '## 分析数据


    事务数据存在于处理订单或银行业务的实时/繁忙系统中，而**分析数据**则存在于更靠后的环节。这类数据最常与报表、可视化和分析相关联。它驱动着商业智能、数据科学以及推动全球组织发展的决策制定。


    OLAP 系统与事务系统有着根本性的不同。为确保最佳的速度和可靠性，两者需要在架构设计、实现和管理方式上采取截然不同的策略。


    分析查询通常需要一次性访问大批量的数据，但为了计算出驱动结果所需的指标，实际用到的列则要少得多。例如，一个常见的财务需求可能是比较本季度与上季度的收入。完成这个查询所需的计算需要访问每个季度的所有收入数据，或者将这些数据预先计算好并存放在一个方便的位置。


    以下查询是一个分析数据请求的示例，旨在了解订单数量和随时间变化的订单总额：


    ```sql

    SELECT

    Date.[Calendar Year] AS Order_Year,

    Date.[Calendar Month Number] AS Order_Month,

    COUNT(*) AS Order_Count,

    SUM(Quantity) AS Quantity_Total,

    SUM([Total Excluding Tax]) AS [Total Excluding Tax]

    FROM Fact.[Order]

    INNER JOIN Dimension.Date

    ON Date.Date = [Order].[Order Date Key]

    WHERE [Order].[Order Date Key] >= ''1/1/2016''

    AND [Order].[Order Date Key] < ''1/1/2017''

    GROUP BY Date.[Calendar Year], Date.[Calendar Month Number]

    ORDER BY Date.[Calendar Year], Date.[Calendar Month Number];

    ```


    请注意，查询只请求了少数几列，但为了返回如图 2-3 所示的结果，系统查询了近 3 万条订单记录。


    ![](img/521866_1_En_2_Fig3_HTML.jpg)


    图 2-3：一个分析查询示例的结果


    一个更大的 OLAP 系统可以轻松地在单个请求中处理数百万行数据，得到类似的结果。一个有效的分析数据存储需要能够扩展，以支持任何给定表中的数百万（甚至数十亿）行数据，同时不会消耗过多的系统资源，也不会导致查询执行时间过长。


    与数据从许多来源以小批量方式写入的事务系统不同，分析数据通常是通过一组有限的、有组织的数据加载流程，以较大的批量操作生成的。一次性插入数千（或数百万）行数据需要快速且高效，因为这将成为常态。图
    2-4 中的图表说明了两种类型系统中数据写入方式的差异。


    ![](img/521866_1_En_2_Fig4_HTML.jpg)


    图 2-4：OLAP 与 OLTP 数据访问模式总结


    需要注意的是，并非所有的 OLTP 和 OLAP 系统都严格遵循此模式，但大体上会遵循这些使用模式。


    由于分析数据通常用于报表、分析和数据科学，因此对实时结果的需求不那么重要。许多分析过程是异步进行的，并不直接由最终使用结果数据的用户监控。因为 OLAP 数据变化不那么频繁，复杂的数据处理可以在数据使用前完成，这样如果需要交互式报表，就不必等待太长时间才能看到结果。


    同样，因为访问数据的数据源、用户和应用程序数量较少，资源争用带来的挑战也小得多。一个查询可能需要从表中读取数百万行才能返回结果，但访问该表的查询数量将比繁忙的事务表少好几个数量级。


    由于 OLAP 数据更新不频繁，通过约束来维护关系完整性的需求就较低。加载的新数据集可以在插入分析表之前进行独立的验证和确认。外键和约束可能仍会作为便利的连接或报表工具而被使用，但其采用与否将取决于它们对加载速度的影响。如何验证分析数据的决策取决于每个用例、其源事务数据的性质，以及在有组织的数据加载过程之外，OLAP
    数据可能发生变化的量。


    同样，OLAP 数据加载过程的设计者在处理故障时可以采取更灵活的方式。在事务性应用中，故障需要立即重试或回滚，不能有任何中间状态，以免导致错误或不一致的数据。而一个失败的分析加载过程，则可以通过更“强力”的方式解决，例如：


    1.  排查并修复损坏的加载过程。

    2.  识别并删除所有新加载的数据。

    3.  重新运行加载过程。


    很可能无需保留任何部分加载的数据，而且删除部分加载的数据也不复杂，因为它通常带有时间戳。许多 OLAP 数据加载过程会包含自动删除同一时间段内先前加载的任何数据的步骤。这样，失败的过程可以重新运行，而无需先执行清理步骤。


    分析数据的消费者也与使用事务性应用的消费者大不相同。一个 OLTP 应用可能拥有范围广泛的终端用户，他们定期直接与软件交互；而分析数据的消费者往往是分析师、领域专家和业务领导者。领域专家是那些对数据足够熟悉，能够理解其含义和用途的人。例如，网络管理员是网络流量数据的领域专家，而首席财务官则是季度收益数据的领域专家。领域专家可能对数据的含义有清晰的理解，但他们不太熟悉数据是如何存储和处理的。


    与 OLTP 数据不同，分析数据通常是非规范化的。可能会为了报表目的而维护查找表，但并非专门用作事实表的查找引用。在 OLAP 表中，规范化并不总能显著节省存储或内存资源。同样重要的是，在数据加载过程中连接查找表会大大增加延迟，导致新的分析数据可用时间变得更长。主流分析数据结构中使用的大多数压缩算法，在物理存储数据时利用字典查找来“规范化”数据。这意味着重复值占用的空间远少于事务表中的情况，而不论该列的具体宽度有多大。尽管如此，字典大小是有限的，更宽的数据类型会带来压缩挑战，这将在第
    5 章中讨论。


    分析数据可以总结如下：


    *   **由大型、低频且受控的数据加载过程写入。**

    *   **为用于分析，以大批量方式读取行数据。**

    *   **每次操作通常读取的列较少。**

    *   **预期争用程度较低。**

    *   **数据完整性可通过验证来强制执行，而非依赖约束。**

    *   **由业务领导者、分析师和领域专家访问。**

    *   **通常是非规范化的。**


    分析数据的特征与事务数据截然不同。这些不同的特征往往导致需要使用不同的系统来分别存储它们。'
- fmt: '## The Need for Two Systems


    Because the workloads of transactional and analytic systems are so vastly different,
    the need for unique data structures to maintain them becomes more apparent the
    larger their data gets.


    While a thousand rows of data can be quickly accessed in any structure, a billion
    rows would be cumbersome unless its data structure was built to accommodate the
    types of workloads it is expected to service.


    Many applications attempt to mix analytic and transactional workloads to maintain
    convenience and avoid the creation of new systems. This works until the various
    differences between these types of data begin to clash with each other. For example,
    a common pitfall in mixing `OLAP` and `OLTP` workloads occurs when large, slow
    analytic queries cause locking and blocking against objects that application users
    are trying to write to. If a salesperson running an annual report is blocking
    the users trying to purchase new products, then the result will be lost sales
    and disgruntled users.


    Similarly, those large reports may consume vast amounts of memory, forcing common
    transactional data out of the buffer pool in favor of reporting data. This will
    further exacerbate slowness for application users.


    In general, mixing analytic and transactional workloads may not always be avoidable,
    but considering the ramifications of this architectural decision up front can
    help in predicting (and planning for) problems before they become costly.


    Many other considerations will vary between `OLTP` and `OLAP` systems, such as


    *   Maintenance

    *   High availability

    *   Disaster recovery

    *   `SQL Server` licensing

    *   Hardware resources


    The architect of an application will need to ensure that each of these topics
    is visited separately for both transactional and analytic workloads. While it
    is possible that similar systems can be used when data sizes are small, it is
    unlikely that those same systems will scale indefinitely. Eventually, data becomes
    large enough that unique solutions are required to differentiate each type of
    workload.


    The nuance of these decisions can travel deeper. For example, a small analytic
    database would likely be architected differently than a large data repository.
    Therefore, it’s important to consider size, scale, data growth, and workload together
    when architecting new data structures or when revisiting existing database objects.


    ## Building Better Analytic Data Structures


    The discussion thus far makes it clear that the tables and structures used to
    support analytic data need to be distinct from what is used for transactional
    workloads. In this chapter, many details were outlined that differentiate `OLTP`
    and `OLAP` applications, how they read and write data, and their typical usage
    patterns.


    Taking this information into account allows for a vision to be created of where
    analytic data should be stored. The remainder of this book will focus on how columnstore
    indexes in `SQL Server` can be used to effectively meet the needs of large analytic
    tables and workloads. This technology is mature and can be used to effectively
    manage a wide variety of analytic use cases, ensuring that it provides an ideal
    solution to many of the analytics challenges that architects and administrators
    face on a regular basis.


    # 3. What Are Columnstore Indexes?


    Thus far, a compelling case has been presented to separate `OLTP` and `OLAP` workloads
    into unique data structures and optimize each for their respective use cases.
    Columnstore indexes are a `SQL Server` feature that provides native support for
    large analytic data. This chapter will dive into what they are and why they are
    an effective solution to analytic data challenges.


    ## The Limits of Transactional Data Storage


    Tables that contain millions or billions of rows of analytic data do not scale
    well when implemented as classic transactional tables. To fully understand why
    this is the case, it is helpful to compare how data is stored in both transactional
    and analytic tables. The following example table contains five columns. Figure
    [3-1](#521866_1_En_3_Chapter.xhtml#Fig1) shows how data is stored in an `OLTP`
    (rowstore) version of this table.


    ![](images/521866_1_En_3_Chapter/521866_1_En_3_Fig1_HTML.jpg)


    Figure 3-1: Illustration of data storage in a clustered rowstore index


    In a clustered rowstore index, each row is stored on pages sequentially, one row
    after another in the order prescribed by the clustered index. If many columns
    from a single row or small subset of rows are required by a query, then this is
    an exceptionally efficient storage structure. For example, retrieving all columns
    from row 1 through row -5 would require low effort as the data is contiguous and
    ordered. Figure [3-2](#521866_1_En_3_Chapter.xhtml#Fig2) highlights the data needed
    to satisfy this query.


    ![](images/521866_1_En_3_Chapter/521866_1_En_3_Fig2_HTML.jpg)


    Figure 3-2: How an `OLTP` query retrieving five rows would read a sample table


    A table with sequential columns models how typical transactional queries operate
    for a query such as this:


    ```

    SELECT

    OrderID, --  An identity/primary key column

    CustomerID,

    SalespersonPersonID,

    ContactPersonID,

    OrderDate

    FROM Sales.Orders

    WHERE OrderId = 289;

    ```


    Transactional queries write single rows or small ranges of rows that often correlate
    to a lookup on a single index. Here, a numeric identity is used to filter out
    five rows of interest from a larger table.


    The basic unit of `SQL Server` storage is the page. A page is comprised of 8 kilobytes
    of data. Pages contain all data and index storage for a given table. If a single
    row is required for a query, then the entire page it is stored on will be read
    into memory, even if the remaining data on the page is not needed. Therefore,
    transactional queries rely on clustered or nonclustered indexes to ensure that
    index seeks can return data in an ordered fashion, such as the example in Figure
    [3-2](#521866_1_En_3_Chapter.xhtml#Fig2). In this scenario, reading those five
    rows will not require much more effort, even if the table grows to be significantly
    larger.


    Analytic queries, though, are quite different. They often aggregate a select few
    columns, but do so across many rows. Consider a typical `OLAP` query against the
    example table where a single column is aggregated across a large portion of the
    table that happens to include all of the rows shown here. Figure [3-3](#521866_1_En_3_Chapter.xhtml#Fig3)
    shows how this would look.


    ![](images/521866_1_En_3_Chapter/521866_1_En_3_Fig3_HTML.jpg)


    Figure 3-3: An analytic query aggregating a single column from a sample table


    The physical layout of rows shows that a query requiring only column 2 needs to
    also read the adjacent columns, even if not needed. The following is an example
    of a query that accesses a large amount of data in a table, but only aggregates
    a single column.


    ```

    SELECT

    SUM(Quantity) AS Total_Quantity

    FROM Sales.OrderLines

    WHERE OrderID >= 1

    AND OrderID < 10000;

    ```


    Even though only a single column was summed, any page that contains values for
    that column will need to be read into memory. Even a covering nonclustered index
    would still necessitate reading data for each row, though the number of pages
    read can be reduced in that fashion.'
