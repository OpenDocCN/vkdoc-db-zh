    \ 表 5-7\n从 `VARCHAR` 数据生成的字典示例\n\n| 索引 ID | `VARCHAR` 值 |\n| --- | --- |\n| 0\
    \ | Fish Fry |\n| 1 | Hamburger |\n| 2 | Taco |\n| 3 | Triple-Layer Chocolate\
    \ Cake |\n| 4 | Cup of Coffee |\n\n由于该段包含五个不同的值，字典的索引 ID 将消耗 3 位。图 5-2 中的映射展示了此数据最终的字典压缩结果。\n\
    \n![一组十个字符串的示例字典压缩](img/521866_1_En_5_Fig2_HTML.jpg)\n\n原始数据存储需要 132 字节，而编码后的数据仅需\
