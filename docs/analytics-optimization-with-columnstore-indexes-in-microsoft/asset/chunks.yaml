- fmt: '# 1. Introduction to Analytic Data in a Transactional Database


    Analytic data, by its nature, can be large and challenging to maintain and can
    grow quickly over time. Similarly, its use increases with time as analysts and
    data scientists find more ways to crunch it. There is a great convenience to having
    analytic data in close proximity to its underlying transactional sources. Utility
    is also gained by choosing a location for analytic data that can withstand the
    test of time, thus avoiding the need for costly migrations if the data is unable
    to scale appropriately.


    ## Where Should Analytic Data Reside?


    Until the advent of columnstore indexes, storing analytic data in a transactional
    database in SQL Server was cumbersome and required tricks and compromises to make
    it performant enough for the rigors of analytics. Other technologies and services
    were incorporated as a way to work around these limitations.


    There are a variety of places that analytic data can be stored, such as


    *   Data warehouse (SQL Server Analysis Services, RedShift, etc.)

    *   Unstructured data (data lake using Hadoop, Hive, etc.)

    *   Third-party analytics software

    *   OLTP tables in a relational/transactional database

    *   OLAP tables in a relational/transactional database


    Each of these options has advantages and disadvantages, but before diving into
    specifics, it is important to review analytic data and how it looks.


    Note that `OLAP` stands for “online analytic processing” and references analytic
    tables and data, whereas `OLTP` stands for “online transactional processing” and
    refers to transactional tables and data.


    ## Analytic Data Size


    Typical analytic data has significantly higher row counts than its source transactional
    data. This may be due to tracking many metrics in extensive detail, or it may
    be due to tracking those details in repeated samples over a long period of time.
    If a transactional log table adds a million rows per day, then 365 million rows
    will be captured per year. Figure 1-1 shows the dramatic effect that time can
    have on data and how a small data set can grow very quickly when sampled regularly.


    ![](images/521866_1_En_1_Chapter/521866_1_En_1_Fig1_HTML.jpg)


    *Figure 1-1: Illustration of the growth of data when the time dimension is added*


    Analytic data can also be quite wide. Even a small table can have many calculated
    metrics derived from it, allowing its `OLAP` counterpart to contain significantly
    more columns. For example, consider the hypothetical sales order table in Listing
    1-1.


    ```sql

    CREATE TABLE dbo.SalesOrder

    (      SalesOrderId INT NOT NULL IDENTITY(1,1) CONSTRAINT PK_SalesOrder PRIMARY
    KEY CLUSTERED, ProductDetailList INT NOT NULL CONSTRAINT FK_SalesOrder_ProductDetail
    FOREIGN KEY REFERENCES dbo.ProductDetail,

    CustomerId INT NOT NULL CONSTRAINT FK_SalesOrder_Customer FOREIGN KEY REFERENCES
    dbo.Customer,

    OrderTime DATETIME2(3) NOT NULL,

    SalesAmount DECIMAL(18,4) NOT NULL,

    TaxRate DECIMAL(6,4) NOT NULL,

    ShipTime DATETIME2(3) NULL,

    ReceivedTime DATETIME2(3) NULL);

    ```

    *Listing 1-1: An Example of a Transactional Sales Order Table*


    This table in Listing 1-1 contains only eight columns that provide information
    on orders, including the customer, product details, and timing/cost. After some
    time and deliberation, an analytic team creates a data warehouse–style fact table
    based off of this transactional table, as seen in Listing 1-2.


    ```sql

    CREATE TABLE fact.SalesOrderMetrics

    (      OrderDate DATE NOT NULL,

    CustomerID INT NOT NULL,

    OrderCount INT NOT NULL,

    SalesAmountTotal DECIMAL(20,4) NOT NULL,

    SalesAmountMin DECIMAL(20,4) NOT NULL,

    SalesAmountMax DECIMAL(20,4) NOT NULL,

    AverageTaxRate DECIMAL(6,4) NOT NULL,

    MinTaxRate DECIMAL(6,4) NOT NULL,

    MaxTaxRate DECIMAL(6,4) NOT NULL,

    AverageHoursFromOrdertoShip DECIMAL(6,2) NULL,

    AverageHoursFromShiptoReceive DECIMAL(6,2) NULL,

    MinimumSecondsBetweenOrders INT NULL,

    MaximumSecondsBetweenOrders INT NULL);

    ```

    *Listing 1-2: An Example of an Analytic Sales Order Table*


    Note that the analytic table in Listing 1-2 has a variety of additional metrics
    that are used to summarize data elements as the source data is transformed from
    detail data into daily aggregate data. Analysts could easily add many more columns
    if an organizational need existed for them.


    Because of these details, analytic data can easily grow and encompass millions
    or billions of rows in a destination table. Similarly, an analytic table could
    contain far more columns than its source transactional data. As a result, it should
    not be surprising that an analytic table can potentially have many rows and/or
    many columns. Even a table that is architected to not be wide (many columns) or
    deep (many rows) can change over time as an organization grows and evolves. Therefore,
    having plans to manage larger data can be beneficial, even if those plans are
    not implemented when an analytics project is first completed.


    ## Analytic Data Structure


    Analytic data will typically be comprised of one of two kinds of data:


    *   Statistical metrics

    *   Detail data


    Statistical metrics are numeric fields that can be aggregated into meaningful
    derived metrics. These may be dates, durations, measurements, rates, and more.
    In general, these data types use fixed-length data types, are relatively small,
    and have a predictable storage footprint.


    Detail data consists of text-based data types, such as `VARCHAR`, `JSON`, `XML`,
    and other types of markup. This data is typically not used directly in metrics
    or statistics, but instead is further crunched for analysis after the fact. While
    detail data is important, it is not the focus of this book. If a dimension exists
    with a large text-based data type, it is worth considering the normalization of
    that column to reduce its footprint and allow for easier management of detail
    values.


    For example, the table in Listing 1-3 contains a large text column.


    ```sql

    CREATE TABLE dbo.WebAccessLog

    (      LogId INT NOT NULL,

    LogTime DATETIME2(3) NOT NULL,

    LogSource VARCHAR(250) NOT NULL,

    ErrorCode BIGINT NOT NULL);

    ```

    *Listing 1-3: Example of a Table with a Wide Text Column*


    Assuming that the data in the `LogSource` column is repeated often, normalizing
    it into its own dimension table would save computing resources and allow for easier
    analysis of distinct values or a subset of values, when needed. Listing 1-4 illustrates
    this table after `LogSource` is normalized.


    ```sql

    CREATE TABLE dbo.LogSource

    (      LogSourceId SMALLINT NOT NULL IDENTITY(1,1) CONSTRAINT PK_LogSource PRIMARY
    KEY CLUSTERED, LogSource VARCHAR(250) NOT NULL);

    CREATE TABLE dbo.WebAccessLog

    (      LogId INT NOT NULL,

    LogTime DATETIME2(3) NOT NULL,

    LogSourceId SMALLINT NOT NULL,

    ErrorCode BIGINT NOT NULL);

    ```

    *Listing 1-4: Normalization of a Text Column into a Lookup Table*


    The `LogSource` column, which had been represented with a 250 character string,
    now uses a `SMALLINT` to reference the lookup table `LogSource` instead. When
    normalizing a column, ensure that the data type for the lookup key is neither
    too small (and could run out of values) nor too large (wasting space). Normalizing
    dimensions is not always a necessary action, but it can be beneficial when dimension
    values are often repeated and the need to reference them is frequent.


    ## Analytic Data Sources


    Where can analytic data be stored, and how can it be known that this decision
    is being made effectively? With a brief review of analytic data out of the way,
    this question of where to store analytic data can be explored in a bit more detail.'
  raw: '# 1. Introduction to Analytic Data in a Transactional Database


    Analytic data, by its nature, can be large and challenging to maintain and can
    grow quickly over time. Similarly, its use increases with time as analysts and
    data scientists find more ways to crunch it. There is a great convenience to having
    analytic data in close proximity to its underlying transactional sources. Utility
    is also gained by choosing a location for analytic data that can withstand the
    test of time, thus avoiding the need for costly migrations if the data is unable
    to scale appropriately.


    ## Where Should Analytic Data Reside?


    Until the advent of columnstore indexes, storing analytic data in a transactional
    database in SQL Server was cumbersome and required tricks and compromises to make
    it performant enough for the rigors of analytics. Other technologies and services
    were incorporated as a way to work around these limitations.


    There are a variety of places that analytic data can be stored, such as


    *   Data warehouse (SQL Server Analysis Services, RedShift, etc.)


    *   Unstructured data (data lake using Hadoop, Hive, etc.)


    *   Third-party analytics software


    *   OLTP tables in a relational/transactional database


    *   OLAP tables in a relational/transactional database


    Each of these options has advantages and disadvantages, but before diving into
    specifics, it is important to review analytic data and how it looks.


    Note that OLAP stands for “online analytic processing” and references analytic
    tables and data, whereas OLTP stands for “online transactional processing” and
    refers to transactional tables and data.


    ## Analytic Data Size


    Typical analytic data has significantly higher row counts than its source transactional
    data. This may be due to tracking many metrics in extensive detail, or it may
    be due to tracking those details in repeated samples over a long period of time.
    If a transactional log table adds a million rows per day, then 365 million rows
    will be captured per year. Figure [1-1](#521866_1_En_1_Chapter.xhtml#Fig1) shows
    the dramatic effect that time can have on data and how a small data set can grow
    very quickly when sampled regularly.


    ![](images/521866_1_En_1_Chapter/521866_1_En_1_Fig1_HTML.jpg)


    Figure 1-1


    Illustration of the growth of data when the time dimension is added


    Analytic data can also be quite wide. Even a small table can have many calculated
    metrics derived from it, allowing its OLAP counterpart to contain significantly
    more columns. For example, consider the hypothetical sales order table in Listing
    [1-1](#521866_1_En_1_Chapter.xhtml#PC1).


    ```

    CREATE TABLE dbo.SalesOrder

    (      SalesOrderId INT NOT NULL IDENTITY(1,1) CONSTRAINT PK_SalesOrder PRIMARY
    KEY CLUSTERED, ProductDetailList INT NOT NULL CONSTRAINT FK_SalesOrder_ProductDetail
    FOREIGN KEY REFERENCES dbo.ProductDetail,

    CustomerId INT NOT NULL CONSTRAINT FK_SalesOrder_Customer FOREIGN KEY REFERENCES
    dbo.Customer,

    OrderTime DATETIME2(3) NOT NULL,

    SalesAmount DECIMAL(18,4) NOT NULL,

    TaxRate DECIMAL(6,4) NOT NULL,

    ShipTime DATETIME2(3) NULL,

    ReceivedTime DATETIME2(3) NULL);

    Listing 1-1

    An Example of a Transactional Sales Order Table

    ```


    This table in Listing [1-1](#521866_1_En_1_Chapter.xhtml#PC1) contains only eight
    columns that provide information on orders, including the customer, product details,
    and timing/cost. After some time and deliberation, an analytic team creates a
    data warehouse–style fact table based off of this transactional table, as seen
    in Listing [1-2](#521866_1_En_1_Chapter.xhtml#PC2).


    ```

    CREATE TABLE fact.SalesOrderMetrics

    (      OrderDate DATE NOT NULL,

    CustomerID INT NOT NULL,

    OrderCount INT NOT NULL,

    SalesAmountTotal DECIMAL(20,4) NOT NULL,

    SalesAmountMin DECIMAL(20,4) NOT NULL,

    SalesAmountMax DECIMAL(20,4) NOT NULL,

    AverageTaxRate DECIMAL(6,4) NOT NULL,

    MinTaxRate DECIMAL(6,4) NOT NULL,

    MaxTaxRate DECIMAL(6,4) NOT NULL,

    AverageHoursFromOrdertoShip DECIMAL(6,2) NULL,

    AverageHoursFromShiptoReceive DECIMAL(6,2) NULL,

    MinimumSecondsBetweenOrders INT NULL,

    MaximumSecondsBetweenOrders INT NULL);

    Listing 1-2

    An Example of an Analytic Sales Order Table

    ```


    Note that the analytic table in Listing [1-2](#521866_1_En_1_Chapter.xhtml#PC2)
    has a variety of additional metrics that are used to summarize data elements as
    the source data is transformed from detail data into daily aggregate data. Analysts
    could easily add many more columns if an organizational need existed for them.


    Because of these details, analytic data can easily grow and encompass millions
    or billions of rows in a destination table. Similarly, an analytic table could
    contain far more columns than its source transactional data. As a result, it should
    not be surprising that an analytic table can potentially have many rows and/or
    many columns. Even a table that is architected to not be wide (many columns) or
    deep (many rows) can change over time as an organization grows and evolves. Therefore,
    having plans to manage larger data can be beneficial, even if those plans are
    not implemented when an analytics project is first completed.


    ## Analytic Data Structure


    Analytic data will typically be comprised of one of two kinds of data:


    *   Statistical metrics


    *   Detail data


    Statistical metrics are numeric fields that can be aggregated into meaningful
    derived metrics. These may be dates, durations, measurements, rates, and more.
    In general, these data types use fixed-length data types, are relatively small,
    and have a predictable storage footprint.


    Detail data consists of text-based data types, such as VARCHAR, JSON, XML, and
    other types of markup. This data is typically not used directly in metrics or
    statistics, but instead is further crunched for analysis after the fact. While
    detail data is important, it is not the focus of this book. If a dimension exists
    with a large text-based data type, it is worth considering the normalization of
    that column to reduce its footprint and allow for easier management of detail
    values.


    For example, the table in Listing [1-3](#521866_1_En_1_Chapter.xhtml#PC3) contains
    a large text column.


    ```

    CREATE TABLE dbo.WebAccessLog

    (      LogId INT NOT NULL,

    LogTime DATETIME2(3) NOT NULL,

    LogSource VARCHAR(250) NOT NULL,

    ErrorCode BIGINT NOT NULL);

    Listing 1-3

    Example of a Table with a Wide Text Column

    ```


    Assuming that the data in the *LogSource* column is repeated often, normalizing
    it into its own dimension table would save computing resources and allow for easier
    analysis of distinct values or a subset of values, when needed. Listing [1-4](#521866_1_En_1_Chapter.xhtml#PC4)
    illustrates this table after *LogSource* is normalized.


    ```

    CREATE TABLE dbo.LogSource

    (      LogSourceId SMALLINT NOT NULL IDENTITY(1,1) CONSTRAINT PK_LogSource PRIMARY
    KEY CLUSTERED, LogSource VARCHAR(250) NOT NULL);

    CREATE TABLE dbo.WebAccessLog

    (      LogId INT NOT NULL,

    LogTime DATETIME2(3) NOT NULL,

    LogSourceId SMALLINT NOT NULL,

    ErrorCode BIGINT NOT NULL);

    Listing 1-4

    Normalization of a Text Column into a Lookup Table

    ```


    The *LogSource* column, which had been represented with a 250 character string,
    now uses a SMALLINT to reference the lookup table *LogSource* instead. When normalizing
    a column, ensure that the data type for the lookup key is neither too small (and
    could run out of values) nor too large (wasting space). Normalizing dimensions
    is not always a necessary action, but it can be beneficial when dimension values
    are often repeated and the need to reference them is frequent.


    ## Analytic Data Sources


    Where can analytic data be stored, and how can it be known that this decision
    is being made effectively? With a brief review of analytic data out of the way,
    this question of where to store analytic data can be explored in a bit more detail.'
  trans: '

    # 1. 事务数据库中的分析数据介绍


    分析数据，就其本质而言，可能体量庞大、维护挑战重重，并且会随着时间的推移快速增长。同样，随着分析师和数据科学家发现更多处理它的方法，其使用量也会随之增加。将分析数据存储在靠近其底层事务源的地方，会带来极大的便利。为分析数据选择一个能够经得起时间考验的存储位置同样具有实用价值，这样可以避免在未来数据无法适当扩展时进行代价高昂的迁移。


    ## 分析数据应存放在何处？


    在列存储索引出现之前，将分析数据存储在 SQL Server 的事务数据库中是件麻烦事，需要运用技巧和做出妥协才能使其性能足以应对严格的分析要求。为了绕开这些限制，人们引入了其他技术和服务。


    分析数据可以存储在多种位置，例如：


    *   数据仓库（SQL Server Analysis Services、RedShift 等）

    *   非结构化数据（使用 Hadoop、Hive 等的数据湖）

    *   第三方分析软件

    *   关系/事务数据库中的 OLTP 表

    *   关系/事务数据库中的 OLAP 表


    这些选项各有优缺点，但在深入探讨细节之前，回顾一下分析数据及其形态是重要的。


    请注意，`OLAP` 代表“联机分析处理”，指分析型表和数据；而 `OLTP` 代表“联机事务处理”，指事务型表和数据。


    ## 分析数据规模


    典型的分析数据，其行数远高于其源事务数据。这可能是因为需要详细跟踪大量度量指标，也可能是因为需要在长时间内对这些细节进行重复采样跟踪。如果一个事务日志表每天新增一百万行，那么一年将捕获
    3.65 亿行数据。图 1-1 展示了时间对数据可能产生的巨大影响，以及一个小数据集在定期采样时如何快速增长。


    ![](img/521866_1_En_1_Fig1_HTML.jpg)


    *图 1-1：加入时间维度后数据增长的图示说明*


    分析数据也可能相当“宽”（列多）。即使是一个小表，也可能从中派生出许多计算度量指标，从而使其对应的 `OLAP` 表包含多得多的列。例如，考虑清单 1-1
    中的假设销售订单表。


    ```sql

    CREATE TABLE dbo.SalesOrder

    (      SalesOrderId INT NOT NULL IDENTITY(1,1) CONSTRAINT PK_SalesOrder PRIMARY
    KEY CLUSTERED, ProductDetailList INT NOT NULL CONSTRAINT FK_SalesOrder_ProductDetail
    FOREIGN KEY REFERENCES dbo.ProductDetail,

    CustomerId INT NOT NULL CONSTRAINT FK_SalesOrder_Customer FOREIGN KEY REFERENCES
    dbo.Customer,

    OrderTime DATETIME2(3) NOT NULL,

    SalesAmount DECIMAL(18,4) NOT NULL,

    TaxRate DECIMAL(6,4) NOT NULL,

    ShipTime DATETIME2(3) NULL,

    ReceivedTime DATETIME2(3) NULL);

    ```

    *清单 1-1：一个事务型销售订单表示例*


    清单 1-1 中的表仅包含八列，提供了关于订单的信息，包括客户、产品详情以及时间和成本。经过一段时间和深思熟虑后，分析团队基于这个事务表创建了一个数据仓库风格的事实表，如清单
    1-2 所示。


    ```sql

    CREATE TABLE fact.SalesOrderMetrics

    (      OrderDate DATE NOT NULL,

    CustomerID INT NOT NULL,

    OrderCount INT NOT NULL,

    SalesAmountTotal DECIMAL(20,4) NOT NULL,

    SalesAmountMin DECIMAL(20,4) NOT NULL,

    SalesAmountMax DECIMAL(20,4) NOT NULL,

    AverageTaxRate DECIMAL(6,4) NOT NULL,

    MinTaxRate DECIMAL(6,4) NOT NULL,

    MaxTaxRate DECIMAL(6,4) NOT NULL,

    AverageHoursFromOrdertoShip DECIMAL(6,2) NULL,

    AverageHoursFromShiptoReceive DECIMAL(6,2) NULL,

    MinimumSecondsBetweenOrders INT NULL,

    MaximumSecondsBetweenOrders INT NULL);

    ```

    *清单 1-2：一个分析型销售订单表示例*


    请注意，清单 1-2 中的分析表包含各种额外的度量指标，这些指标用于在源数据从明细数据转换为每日汇总数据时对数据元素进行汇总。如果组织存在相关需求，分析师可以轻松添加更多列。


    由于这些细节，分析数据很容易增长，并在目标表中包含数百万或数十亿行。同样，一个分析表可能包含远多于其源事务数据的列。因此，分析表可能拥有许多行和/或许多列，这并不令人惊讶。即使是一个设计上不“宽”（列多）或不“深”（行多）的表，也会随着组织的成长和发展而随时间变化。因此，制定管理更大数据的计划是有益的，即使在分析项目最初完成时这些计划并未实施。


    ## 分析数据结构


    分析数据通常由以下两种数据之一构成：


    *   统计度量指标

    *   详细数据


    统计度量指标是可以聚合成有意义的派生度量的数值字段。这些可能是日期、时长、测量值、比率等。通常，这些数据类型使用定长数据类型，相对较小，并且具有可预测的存储占用空间。


    详细数据由基于文本的数据类型组成，例如 `VARCHAR`、`JSON`、`XML` 和其他标记类型。这些数据通常不会直接用于度量或统计，而是在事后为进一步分析而进行深度处理。虽然详细数据很重要，但它不是本书的重点。如果某个维度存在大型基于文本的数据类型，值得考虑对该列进行规范化，以减少其占用空间，并允许更轻松地管理详细值。


    例如，清单 1-3 中的表包含一个大型文本列。


    ```sql

    CREATE TABLE dbo.WebAccessLog

    (      LogId INT NOT NULL,

    LogTime DATETIME2(3) NOT NULL,

    LogSource VARCHAR(250) NOT NULL,

    ErrorCode BIGINT NOT NULL);

    ```

    *清单 1-3：一个带有宽文本列的表示例*


    假设 `LogSource` 列中的数据经常重复，将其规范化为自己的维度表将节省计算资源，并在需要时更轻松地分析不同值或值子集。清单 1-4 展示了 `LogSource`
    被规范化后的表。


    ```sql

    CREATE TABLE dbo.LogSource

    (      LogSourceId SMALLINT NOT NULL IDENTITY(1,1) CONSTRAINT PK_LogSource PRIMARY
    KEY CLUSTERED, LogSource VARCHAR(250) NOT NULL);

    CREATE TABLE dbo.WebAccessLog

    (      LogId INT NOT NULL,

    LogTime DATETIME2(3) NOT NULL,

    LogSourceId SMALLINT NOT NULL,

    ErrorCode BIGINT NOT NULL);

    ```

    *清单 1-4：将文本列规范化为查找表*


    原本用 250 个字符字符串表示的 `LogSource` 列，现在改用一个 `SMALLINT` 来引用查找表 `LogSource`。规范化列时，要确保查找键的数据类型既不太小（可能耗尽取值），也不太大（浪费空间）。规范化维度并不总是必要的操作，但当维度值经常重复且需要频繁引用它们时，这样做可能是有益的。


    ## 分析数据源


    分析数据可以存储在哪里？如何知道这个决策是有效做出的？在简要回顾了分析数据之后，我们可以更详细地探讨这个关于分析数据存储位置的问题。

    '
- fmt: '# Data Warehouse


    A data warehouse is a classic repository for OLAP data structures. Decades of
    experience have gone into the development of exceptionally effective data warehousing
    software with nearly every major data platform having its own proprietary warehousing
    solution.


    Solutions such as Microsoft’s Azure Synapse, Amazon RedShift, and Google BigQuery
    are examples of data warehousing solutions that are served up with the intent
    of being used alongside other data storage components that these organizations
    offer.


    The upside of using these technologies is that they are prebuilt, ready to use,
    and are optimized for analytic data. The downside of these systems is that they
    involve learning a new architecture, new scripting languages, and gaining enough
    expertise to maintain them over time. Larger organizations can often afford to
    specialize in this regard, but even then, the desire to increase complexity is
    sometimes a reason to not start with one of these solutions.


    # Unstructured Data


    Not all data should go into a SQL database or even a structured data source. Data
    that is heavily comprised of text and markup is not easy to search within the
    confines of a transactional database, even with features such as `SQL Server`’s
    `Full-Text Search` enabled.


    When the data being worked with is dollars, time, or metrics, there is great flexibility
    in where that data can effectively be stored, but large text and files make more
    sense to be stored in an unstructured data repository, such as a data lake underpinned
    by `Hadoop`, `Hive`, or a similar technology offered by a given software vendor.


    If a data storage solution is needed and the source data is large and text based,
    consider destinations outside of the confines of a transactional database. While
    this book is not intended to explore these solutions, knowing when they should
    be considered is helpful to avoid architecting around the wrong technology for
    that data.


    # Third-Party Analytics Software


    There are many analytic software solutions available for use both on premises
    and in the cloud. Even creating a list of these solutions would take hours, consume
    many pages, and likely still be incomplete.


    Like with a data warehouse solution, the primary benefit of a third-party analytic
    solution is that it is built for this purpose and can be used with a relatively
    minimal amount of effort. Unlike a data warehouse solution, analytics software
    varies greatly in its structure, interface, and usage. An organization’s data
    analytic needs will dictate the type of solution needed, and some analytics software
    will meet those needs while some will not.


    The downsides of using a third-party vendor are cost and vendor lock-in. Costs
    typically increase as data volume and/or usage increases. Therefore, an analytics
    project may begin inexpensively, but end up being quite costly when the data is
    ten or a hundred (or a million?!) times larger than its initial size. When architecting
    any data solution, be certain to determine cost based on current and future needs.
    This ensures that there are no surprises when data and its usage inevitably grow
    by orders of magnitude from where they begin.


    Vendor lock-in may also pose a challenge. Moving data into an analytics solution
    is easy, but is there a well-documented and convenient way to extract that data
    in the future? If not, then moving away from that solution may become costly and
    time-consuming. If those costs exceed the costs of remaining on that platform,
    then an organization may have to begrudgingly choose to maintain its data there
    indefinitely. For those that are comfortable and familiar with a given data analytics
    solution, this is likely not an issue, though.


    # OLAP Data in an OLTP Table in a Transactional Database


    Storing analytic data in OLTP tables is likely a trap. OLTP tables are intended
    for workloads in which small ranges of rows are frequently written and read. In
    these scenarios, many columns are typically requested from those rows. These tables
    are designed to manage concurrency based on the idea that a given transaction
    will involve few rows.


    OLTP tables are counter to analytic data, which often involves queries against
    many rows in aggregate, but usually not as many columns.


    For small tables (less than a few million rows), an OLTP table is adequate for
    analytic data. For larger tables that contain millions or billions of rows, these
    tables will have difficulty in serving up data across large ranges. They will
    likely consume more space and drive slower queries against their data than any
    other analytic solutions discussed here. This is because they are optimized for
    small range lookups (few rows, many columns) and are not architected to service
    the vast row counts and aggregates required for analytics.


    Reserve OLTP tables for small analytic data sets where scanning most (or all)
    of a table is not prohibitively expensive. Alternatively, they can be used for
    lookup tables or other small dimensions. For a previous example in Listing [1-3](#521866_1_En_1_Chapter.xhtml#PC3),
    the `LogSource` table used a `SMALLINT` to number its rows. With a primary key
    that can contain no more than 65,535 values (-32,767 through 32,767), this table
    is destined to be relatively small. It is compact enough that indexing the text
    column would not be prohibitively expensive, if needed.


    # OLAP Data in an Analytic Table in a Transactional Database


    The final option for storing analytic data is an OLAP table within a transactional
    database. This is the focus of the remainder of this book and will provide an
    alternative to the solutions presented thus far.


    An OLAP table is a table structure that is designed specifically to service queries
    that typically access a large volume of rows in aggregate, but also do not require
    returning all of the columns at any one given time. An OLAP table is expected
    to grow to be millions or billions of rows and can easily service queries that
    crunch millions of rows at a time with ease.


    There are many benefits to storing analytic data in an OLAP table within `SQL
    Server`, including the following:


    *   Can use existing technology and licenses to maintain analytic data.

    *   Far smaller learning curve to implement and use.

    *   Data is maintained completely by its owners.

    *   Data can be stored in close proximity to its transactional data source.


    These are not trivial considerations and can make the effort to implement an analytic
    solution fast, inexpensive, and easy to revise, if needed. In addition, performance
    can be measured and optimized as needed to ensure that the end users of analytic
    data enjoy acceptable access speeds. In addition, the processes that load data
    into analytic tables can be fine-tuned to be exceptionally fast.


    Given their simplicity and ease of implementation, it is worthwhile to take the
    time and resources to create a proof of concept for storing analytic data in `SQL
    Server`, specifically using columnstore indexes.


    ```

    Analytic data can be large, consume immense resources, and be challenging to move
    when change is needed. Choosing the correct target data structure for analytic
    data and making the best possible initial decision is critical to the long-term
    success of an analytics project.


    This book will explore in detail the nature of analytic workloads and why columnstore
    indexes in SQL Server can provide a cost-effective and performant solution.

    ```'
