- fmt: "### Row Order (Vertipaq) Optimization\n\nBecause a columnstore index is organized\
    \ by column, rather than by row, it is possible for SQL Server to rearrange the\
    \ order of rows within each rowgroup at the time each segment is compressed. This\
    \ optimization is used whenever possible and attempts to arrange rows such that\
    \ like values are adjacent to each other.\n\nColumnstore compression is highly\
    \ sensitive to repeated sequences of values; therefore, this optimization can\
    \ provide exceptional compression and performance improvements. Vertipaq optimization\
    \ is the algorithm that seeks to rearrange rows in the order that results in the\
    \ most effective compression of the underlying data. This algorithm is used in\
    \ other Microsoft storage technologies, such as SQL Server Analysis Services,\
    \ PowerPivot, and PowerBI.\n\nVertipaq optimization is an expensive process, and\
    \ the more columns a columnstore index has, the longer it takes to find the optimal\
    \ row order. Therefore, SQL Server will limit the search time to ensure that building\
    \ the index doesn’t take an excessive amount of time. As a result, Vertipaq optimization\
    \ will be somewhat less effective on wider tables. This fact should not affect\
    \ database architecture decisions, but can be a useful troubleshooting step if\
    \ a columnstore index on a wide table begins to experience suboptimal compression\
    \ as more columns continue to be added.\n\nA critically important key to this\
    \ optimization is that some architectural decisions can prevent it from being\
    \ used. There are two scenarios in which Vertipaq optimization will not be used:\n\
    \n1.  When the tuple mover merges rows from the delta store into a clustered columnstore\
    \ index that has at least one nonclustered rowstore index.\n2.  For columnstore\
    \ indexes that are built on memory-optimized tables.\n\nThis does not mean that\
    \ nonclustered rowstore indexes should never be used on clustered columnstore\
    \ indexes. Nor should memory-optimized columnstore indexes be avoided. Instead,\
    \ the fact that Vertipaq compression will not operate on these structures should\
    \ be an additional input into architectural decision-making process. If a nonclustered\
    \ rowstore index is required to service a specific set of critical queries, then\
    \ it should be used. If its use is optional, then consider the negative impact\
    \ it may have on compression.\n\nWhile the details of how the algorithm works\
    \ for a given columnstore index are not exposed through any convenient views,\
    \ it is possible to check whether or not a rowgroup has Vertipaq optimization\
    \ with the query in Listing 5-4.\n\n```sql\nSELECT\n    objects.name,\n    partitions.partition_number,\n\
    \    dm_db_column_store_row_group_physical_stats.row_group_id,\n    dm_db_column_store_row_group_physical_stats.has_vertipaq_optimization\n\
    FROM sys.dm_db_column_store_row_group_physical_stats\nINNER JOIN sys.objects\n\
    \    ON objects.object_id = dm_db_column_store_row_group_physical_stats.object_id\n\
    INNER JOIN sys.partitions\n    ON partitions.object_id = objects.object_id\n \
    \   AND partitions.partition_number = dm_db_column_store_row_group_physical_stats.partition_number\n\
    WHERE objects.name = 'Sale_CCI'\nORDER BY dm_db_column_store_row_group_physical_stats.row_group_id;\n\
    ```\n\nListing 5-4 Query That Returns Whether or Not Vertipaq Optimization Is\
    \ Used\n\nThe column `has_vertipaq_optimization` in `sys.dm_db_column_store_row_group_physical_stats`\
    \ indicates if that rowgroup was compressed using the Vertipaq optimization or\
    \ not. In general, expect to see this column return a value of `1`, unless the\
    \ columnstore index is either on a memory-optimized table or is used in conjunction\
    \ with nonclustered rowstore indexes. If `has_vertipaq_optimization` is unexpectedly\
    \ zero, further research is warranted to understand why that is the case and determine\
    \ what changes were made that prevented this optimization from being used. Figure\
    \ 5-6 shows a sample of the results of the previous query.\n\n![](images/521866_1_En_5_Chapter/521866_1_En_5_Fig6_HTML.jpg)\n\
    \nFigure 5-6 Results of query to validate if Vertipaq optimization was used\n\n\
    In this scenario, Vertipaq optimization is in use for all rowgroups in this columnstore\
    \ index."
  raw: '### Row Order (Vertipaq) Optimization


    Because a columnstore index is organized by column, rather than by row, it is
    possible for SQL Server to rearrange the order of rows within each rowgroup at
    the time each segment is compressed. This optimization is used whenever possible
    and attempts to arrange rows such that like values are adjacent to each other.


    Columnstore compression is highly sensitive to repeated sequences of values; therefore,
    this optimization can provide exceptional compression and performance improvements.
    Vertipaq optimization is the algorithm that seeks to rearrange rows in the order
    that results in the most effective compression of the underlying data. This algorithm
    is used in other Microsoft storage technologies, such as SQL Server Analysis Services,
    PowerPivot, and PowerBI.


    Vertipaq optimization is an expensive process, and the more columns a columnstore
    index has, the longer it takes to find the optimal row order. Therefore, SQL Server
    will limit the search time to ensure that building the index doesn’t take an excessive
    amount of time. As a result, Vertipaq optimization will be somewhat less effective
    on wider tables. This fact should not affect database architecture decisions,
    but can be a useful troubleshooting step if a columnstore index on a wide table
    begins to experience suboptimal compression as more columns continue to be added.


    A critically important key to this optimization is that some architectural decisions
    can prevent it from being used. There are two scenarios in which Vertipaq optimization
    will not be used:


    1.  When the tuple mover merges rows from the delta store into a clustered columnstore
    index that has at least one nonclustered rowstore index


    2.  For columnstore indexes that are built on memory-optimized tables


    This does not mean that nonclustered rowstore indexes should never be used on
    clustered columnstore indexes. Nor should memory-optimized columnstore indexes
    be avoided. Instead, the fact that Vertipaq compression will not operate on these
    structures should be an additional input into architectural decision-making process.
    If a nonclustered rowstore index is required to service a specific set of critical
    queries, then it should be used. If its use is optional, then consider the negative
    impact it may have on compression.


    While the details of how the algorithm works for a given columnstore index are
    not exposed through any convenient views, it is possible to check whether or not
    a rowgroup has Vertipaq optimization with the query in Listing [5-4](#521866_1_En_5_Chapter.xhtml#PC11).


    ```

    SELECT

    objects.name,

    partitions.partition_number,

    dm_db_column_store_row_group_physical_stats.row_group_id,

    dm_db_column_store_row_group_physical_stats.has_vertipaq_optimization

    FROM sys.dm_db_column_store_row_group_physical_stats

    INNER JOIN sys.objects

    ON objects.object_id = dm_db_column_store_row_group_physical_stats.object_id

    INNER JOIN sys.partitions

    ON partitions.object_id = objects.object_id

    AND partitions.partition_number = dm_db_column_store_row_group_physical_stats.partition_number

    WHERE objects.name = ''Sale_CCI''

    ORDER BY dm_db_column_store_row_group_physical_stats.row_group_id;

    Listing 5-4

    Query That Returns Whether or Not Vertipaq Optimization Is Used

    ```


    The column *has_vertipaq_optimization* in *sys.dm_db_column_store_row_group_physical_stats*
    indicates if that rowgroup was compressed using the Vertipaq optimization or not.
    In general, expect to see this column return a value of 1, unless the columnstore
    index is either on a memory-optimized table or is used in conjunction with nonclustered
    rowstore indexes. If *has_vertipaq_optimization* is unexpectedly zero, further
    research is warranted to understand why that is the case and determine what changes
    were made that prevented this optimization from being used. Figure [5-6](#521866_1_En_5_Chapter.xhtml#Fig6)
    shows a sample of the results of the previous query.


    ![](images/521866_1_En_5_Chapter/521866_1_En_5_Fig6_HTML.jpg)


    Figure 5-6


    Results of query to validate if Vertipaq optimization was used


    In this scenario, Vertipaq optimization is in use for all rowgroups in this columnstore
    index.'
  trans: "\n### 行组（Vertipaq）优化\n\n由于列存储索引是按列而非按行组织的，因此 SQL Server 有可能在压缩每个段时重新排列每个行组内的行顺序。只要可能，就会使用此优化，它试图排列行，使相似值彼此相邻。\n\
    \n列存储压缩对重复出现的值序列高度敏感；因此，此优化可以提供出色的压缩率和性能改进。Vertipaq 优化是一种旨在重新排列行顺序以实现底层数据最有效压缩的算法。该算法也用于其他\
    \ Microsoft 存储技术，例如 SQL Server Analysis Services、PowerPivot 和 PowerBI。\n\nVertipaq\
    \ 优化是一个开销较大的过程，列存储索引包含的列越多，找到最佳行顺序所需的时间就越长。因此，SQL Server 会限制搜索时间，以确保构建索引不会花费过长时间。结果就是，Vertipaq\
    \ 优化在较宽的表上效果会稍差一些。这一事实不应影响数据库架构决策，但如果宽表上的列存储索引随着更多列的不断添加而开始出现次优压缩，它可以成为一个有用的故障排除步骤。\n\
    \n此优化的一个关键点是，某些架构决策可能会阻止其使用。在以下两种情况下，将不会使用 Vertipaq 优化：\n\n1.  当元组移动器将行从增量存储区合并到至少有一个非聚集行存储索引的聚集列存储索引中时。\n\
    2.  对于在内存优化表上构建的列存储索引时。\n\n这并不意味着不应在聚集列存储索引上使用非聚集行存储索引。也不应避免使用内存优化的列存储索引。相反，Vertipaq\
    \ 压缩不会对这些结构进行操作这一事实，应作为架构决策过程的一个额外考量因素。如果必须使用非聚集行存储索引来服务特定的关键查询集，那么就应该使用它。如果其使用是可选的，则请考虑它可能对压缩产生的负面影响。\n\
    \n虽然无法通过任何便捷的视图暴露给定列存储索引的算法工作细节，但可以使用清单 5-4 中的查询来检查某个行组是否应用了 Vertipaq 优化。\n\n\
    ```sql\nSELECT\n    objects.name,\n    partitions.partition_number,\n    dm_db_column_store_row_group_physical_stats.row_group_id,\n\
    \    dm_db_column_store_row_group_physical_stats.has_vertipaq_optimization\nFROM\
    \ sys.dm_db_column_store_row_group_physical_stats\nINNER JOIN sys.objects\n  \
    \  ON objects.object_id = dm_db_column_store_row_group_physical_stats.object_id\n\
    INNER JOIN sys.partitions\n    ON partitions.object_id = objects.object_id\n \
    \   AND partitions.partition_number = dm_db_column_store_row_group_physical_stats.partition_number\n\
    WHERE objects.name = 'Sale_CCI'\nORDER BY dm_db_column_store_row_group_physical_stats.row_group_id;\n\
    ```\n\n**清单 5-4** 查询以返回是否使用了 Vertipaq 优化\n\n`sys.dm_db_column_store_row_group_physical_stats`\
    \ 中的 `has_vertipaq_optimization` 列指示该行组在压缩时是否使用了 Vertipaq 优化。通常，除非列存储索引位于内存优化表上，或与非聚集行存储索引结合使用，否则期望此列返回值\
    \ `1`。如果 `has_vertipaq_optimization` 意外为零，则有必要进行进一步研究以了解其原因，并确定是哪些更改导致无法使用此优化。图\
    \ 5-6 显示了前述查询结果的示例。\n\n![](img/521866_1_En_5_Fig6_HTML.jpg)\n\n**图 5-6** 验证是否使用了\
    \ Vertipaq 优化的查询结果\n\n在此场景中，此列存储索引中的所有行组均使用了 Vertipaq 优化。\n"
- fmt: '# Other Compression Algorithms


    After segments have been encoded and rowgroups have been reordered, the final
    step in columnstore compression is to apply any remaining compression algorithms
    to the resulting data. At this point, it is possible that no further compression
    gains are possible for a given segment. This will be most often true with values
    that do not repeat. The details of how columnstore indexes compress data are provided
    here to assist in more advanced optimization of compression and performance, when
    possible.


    One form of compression used by columnstore indexes is `run-length encoding`,
    which seeks to group together like values and a count, rather than listing repetitive
    values in a segment. `Vertipaq optimization` is a prerequisite to this step, and
    without it, `run-length encoding` will be significantly less effective.


    Consider the example of foods provided earlier in Figure 5-2. The encoded data
    has five different values that have been dictionary encoded to 3-bit numeric values.
    `Vertipaq optimization` would take the resulting data set and order it, as shown
    in Figure 5-7.


    ![](images/521866_1_En_5_Chapter/521866_1_En_5_Fig7_HTML.jpg)

    *Figure 5-7: `Vertipaq optimization` of a set of encoded values*


    Note that the encoded values are now reordered so that each value is grouped next
    to the same value. `Run-length encoding` groups together each like value logically
    to reduce the overall amount of storage required for the segment. Logically, the
    resulting structure can be illustrated as shown in Figure 5-8.


    ![](images/521866_1_En_5_Chapter/521866_1_En_5_Fig8_HTML.jpg)

    *Figure 5-8: `Run-length encoding` applied to a numeric data set*


    Each value has been provided with a count, shown in parenthesis after it. There
    is a single instance of the value 0, followed by two instances of 1, three instances
    of 2, three instances of 3, and one instance of 4. This algorithm thrives on data
    that is repetitive and works exceptionally well in conjunction with dictionary
    encoding and `Vertipaq compression`.


    `Bit array compression` is used when a segment contains a small number of distinct
    values and the data cannot benefit significantly from `Vertipaq compression` and
    `run-length encoding`. A bit array is an array in which each distinct value is
    assigned a column and each row is mapped to that column using bits. Figure 5-9
    illustrates how this compression would look when used on an unencoded and unsorted
    data set.


    ![](images/521866_1_En_5_Chapter/521866_1_En_5_Fig9_HTML.jpg)

    *Figure 5-9: `Bit array compression` applied to an unencoded data set*


    While this may seem like a complicated transformation, the resulting ones and
    zeros are quite compact and provide a structure that can be quickly decompressed.


    There are a handful of other more complex compression algorithms that may be used
    to progressively shrink the size of each segment of data. The algorithms used
    can vary by segment and may be used often, sometimes, or not at all. When this
    process is complete, the final level of compression is applied by `SQL Server`,
    which utilized its `xVelocity compression algorithm`.


    Columnstore segments are stored as `Large Objects (LOB)` in `SQL Server`. The
    details of `xVelocity compression` are not public, and therefore we cannot delve
    further into how they work. While the transformations used to convert the structures
    discussed thus far in this chapter into their final form are not fully known,
    we can infer their effectiveness by turning on `STATISTICS IO` and viewing the
    reads against a columnstore index when a query is issued. Consider the simple
    analytic query in Listing 5-5.


    ```sql

    SELECT

    SUM(Quantity)

    FROM fact.Sale_CCI

    WHERE [Invoice Date Key] >= ''1/1/2016''

    AND [Invoice Date Key] < ''2/1/2016''

    ```

    *Listing 5-5: Simple Analytic Query to Demonstrate Columnstore IO*


    The result of this query is shown in Figure 5-10.


    ![](images/521866_1_En_5_Chapter/521866_1_En_5_Fig10_HTML.jpg)

    *Figure 5-10: Sample query output*


    Clicking the *Messages* tab as shown in the results provides additional information
    on the reads and writes performed by the query, as seen in Figure 5-11.


    ![](images/521866_1_En_5_Chapter/521866_1_En_5_Fig11_HTML.jpg)

    *Figure 5-11: `Statistics IO` output for a sample query*


    There is quite a bit of information returned, but for the moment, the *`LOB logical
    reads`* circled in red provide an indication of the reads required to satisfy
    this query. Columnstore indexes will not report reads as *`logical reads`*, but
    instead as *`LOB logical reads`*, which indicates that their segments are stored
    as `Large Objects` and not as traditional `SQL Server` data structures. If this
    number of reads seems high, that is because it is! Later chapters in this book
    will provide additional optimizations that will reduce storage and memory footprint,
    as well as greatly improve query performance.'
  raw: '### Other Compression Algorithms


    After segments have been encoded and rowgroups have been reordered, the final
    step in columnstore compression is to apply any remaining compression algorithms
    to the resulting data. At this point, it is possible that no further compression
    gains are possible for a given segment. This will be most often true with values
    that do not repeat. The details of how columnstore indexes compress data are provided
    here to assist in more advanced optimization of compression and performance, when
    possible.


    One form of compression used by columnstore indexes is ***run-length encoding***
    , which seeks to group together like values and a count, rather than listing repetitive
    values in a segment. Vertipaq optimization is a prerequisite to this step, and
    without it, run-length encoding will be significantly less effective.


    Consider the example of foods provided earlier in Figure [5-2](#521866_1_En_5_Chapter.xhtml#Fig2).
    The encoded data has five different values that have been dictionary encoded to
    3-bit numeric values. Vertipaq optimization would take the resulting data set
    and order it, as shown in Figure [5-7](#521866_1_En_5_Chapter.xhtml#Fig7).


    ![](images/521866_1_En_5_Chapter/521866_1_En_5_Fig7_HTML.jpg)


    Figure 5-7


    Vertipaq optimization of a set of encoded values


    Note that the encoded values are now reordered so that each value is grouped next
    to the same value. Run-length encoding groups together each like value logically
    to reduce the overall amount of storage required for the segment. Logically, the
    resulting structure can be illustrated as shown in Figure [5-8](#521866_1_En_5_Chapter.xhtml#Fig8).


    ![](images/521866_1_En_5_Chapter/521866_1_En_5_Fig8_HTML.jpg)


    Figure 5-8


    Run-length encoding applied to a numeric data set


    Each value has been provided with a count , shown in parenthesis after it. There
    is a single instance of the value 0, followed by two instances of 1, three instances
    of 2, three instances of 3, and one instance of 4\. This algorithm thrives on
    data that is repetitive and works exceptionally well in conjunction with dictionary
    encoding and Vertipaq compression.


    Bit array compression is used when a segment contains a small number of distinct
    values and the data cannot benefit significantly from Vertipaq compression and
    run-length encoding. A bit array is an array in which each distinct value is assigned
    a column and each row is mapped to that column using bits. Figure [5-9](#521866_1_En_5_Chapter.xhtml#Fig9)
    illustrates how this compression would look when used on an unencoded and unsorted
    data set.


    ![](images/521866_1_En_5_Chapter/521866_1_En_5_Fig9_HTML.jpg)


    Figure 5-9


    Bit array compression applied to an unencoded data set


    While this may seem like a complicated transformation, the resulting ones and
    zeros are quite compact and provide a structure that can be quickly decompressed.


    There are a handful of other more complex compression algorithms that may be used
    to progressively shrink the size of each segment of data. The algorithms used
    can vary by segment and may be used often, sometimes, or not at all. When this
    process is complete, the final level of compression is applied by SQL Server,
    which utilized its xVelocity compression algorithm.


    Columnstore segments are stored as Large Objects (LOB) in SQL Server. The details
    of xVelocity compression are not public, and therefore we cannot delve further
    into how they work. While the transformations used to convert the structures discussed
    thus far in this chapter into their final form are not fully known, we can infer
    their effectiveness by turning on STATISTICS IO and viewing the reads against
    a columnstore index when a query is issued. Consider the simple analytic query
    in Listing [5-5](#521866_1_En_5_Chapter.xhtml#PC12).


    ```

    SELECT

    SUM(Quantity)

    FROM fact.Sale_CCI

    WHERE [Invoice Date Key] >= ''1/1/2016''

    AND [Invoice Date Key] < ''2/1/2016''

    Listing 5-5

    Simple Analytic Query to Demonstrate Columnstore IO

    ```


    The result of this query is shown in Figure [5-10](#521866_1_En_5_Chapter.xhtml#Fig10).


    ![](images/521866_1_En_5_Chapter/521866_1_En_5_Fig10_HTML.jpg)


    Figure 5-10


    Sample query output


    Clicking the *Messages* tab as shown in the results provides additional information
    on the reads and writes performed by the query, as seen in Figure [5-11](#521866_1_En_5_Chapter.xhtml#Fig11).


    ![](images/521866_1_En_5_Chapter/521866_1_En_5_Fig11_HTML.jpg)


    Figure 5-11


    Statistics IO output for a sample query


    There is quite a bit of information returned, but for the moment, the *LOB logical
    reads* circled in red provide an indication of the reads required to satisfy this
    query. Columnstore indexes will not report reads as *logical reads* , but instead
    as *LOB logical reads*, which indicates that their segments are stored as Large
    Objects and not as traditional SQL Server data structures. If this number of reads
    seems high, that is because it is! Later chapters in this book will provide additional
    optimizations that will reduce storage and memory footprint, as well as greatly
    improve query performance.'
