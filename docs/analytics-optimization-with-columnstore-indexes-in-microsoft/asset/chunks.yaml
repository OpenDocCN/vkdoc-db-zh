- fmt: '# 内存优化列存储索引的权衡与优化策略


    基于磁盘的执行计划建议使用覆盖索引以避免导致总计1383次读取的聚集索引扫描。未使用列存储索引的内存优化表使用索引查找来返回结果，而使用列存储索引的内存优化表则使用列存储索引扫描来返回相同的结果。


    在这三个示例表中，列存储索引扫描是成本最低且速度最快的选项。尽管如此，维护内存优化列存储索引的成本并非微不足道。除了已经介绍过的限制之外，这种结构还受到多种限制：


    *   不能使用`ALTER TABLE`在内存优化列存储索引上添加列、创建索引、更改数据类型或进行表初始创建后常见的许多其他DDL更改。

    *   列存储索引出于必要性会被复制到磁盘，以帮助在服务器重启后加速数据库恢复。

    *   与基于磁盘的表一样，混合聚集列存储和非聚集行存储索引会消除SQL Server自动应用Vertipaq优化的能力。

    *   不允许在内存优化列存储索引上使用计算列。

    *   由于内存优化列存储索引只允许作为聚集索引，因此不能对其应用筛选器。

    *   索引维护极其有限。重建仅可用于调整哈希索引桶计数（如果需要），并且不允许重新组织操作。如果需要，可以使用`Sys.sp_memory_optimized_cs_migration`来处理增量存储的内容。

    *   不允许在内存优化列存储索引上使用列存储归档压缩。


    与内存优化列存储索引相关的注意事项清单意义重大，清楚地表明这不是一个可以在未经仔细考虑的情况下使用的特性。放置列存储索引的理想场景如下：


    *   具有高并发性的OLTP表。

    *   被确定为迁移到内存优化表的异常候选的OLTP表。

    *   目标表上存在频繁的分析查询，导致大量扫描和不可接受的资源消耗。

    *   OLTP和OLAP操作无法拆分到独立的数据源中。


    即使一个表满足这些条件，也务必进行彻底测试，并能够量化内存优化列存储索引的性能优势是否大于其限制和缺点。这是一个独特的架构特性，只适用于一小部分高流量、高并发的OLTP表。更多情况下，其他替代方案会更可行，例如：


    *   具有聚集行存储索引和非聚集列存储索引的基于磁盘的表。

    *   带有额外覆盖非聚集索引的内存优化表。

    *   独立的OLTP/OLAP数据处理/存储系统。


    ## 优化策略


    一般来说，优化应该从解决最常见用例的方案开始。只有在以下一种或多种情况成立时，才应调整和实现额外的复杂层：


    *   其他解决方案未能提供足够的性能提升。

    *   该情况可以归类为规则的例外或边缘情况。

    *   新策略的测试和质量保证被证明能带来显著收益（在性能、资源节省或两者兼有）。


    没有任何一组架构挑战存在放之四海而皆准的解决方案，因此在应用本章（或任何地方）介绍的技术时保持谨慎非常重要。保持简单，只有在简单方案失效时，才应考虑不那么简单的解决方案。'
  raw: 'The disk-based execution plan suggests a covering index to avoid a clustered
    index scan that incurs a total of 1383 reads. The memory-optimized table without
    a columnstore index uses an index seek to return results, whereas the memory-optimized
    table with a columnstore index uses a columnstore index scan to return the same
    results.


    The columnstore index scan is by far the least expensive and fastest option out
    of the three of these example tables. That being said, the cost of maintaining
    a memory-optimized columnstore index is not trivial. There are a variety of limitations
    imposed on this structure, beyond what has already been introduced:


    *   ALTER TABLE cannot be used on a memory-optimized columnstore index to add
    columns, create indexes, change data types, or many of the other common DDL changes
    made after a table is initially created.


    *   The columnstore index is replicated to disk as a matter of necessity, to help
    speed up database recovery after a server restart.


    *   Just as with disk-based tables, mixing clustered columnstore and nonclustered
    rowstore indexes removes SQL Server’s ability to automatically apply Vertipaq
    optimization.


    *   Computed columns are not allowed on memory-optimized columnstore indexes.


    *   Because memory-optimized columnstore indexes are only allowed as clustered
    indexes, filters may not be applied to them.


    *   Index maintenance is extremely limited. Rebuilds may only be used to adjust
    hash index bucket counts (if needed) and reorganize operations are not allowed.
    *Sys.sp_memory_optimized_cs_migration* can be used to process the contents of
    the delta store, if needed.


    *   Columnstore archive compression is not allowed on memory-optimized columnstore
    indexes.


    The list of caveats related to memory-optimized columnstore indexes is significant
    and makes it clear that this is not a feature that should be used without careful
    consideration. The ideal scenario for putting a columnstore index is as follows:


    *   OLTP table with high concurrency.


    *   OLTP table that is identified as an exceptional candidate for migration to
    a memory-optimized table.


    *   Table is targeted with frequent analytic queries that cause heavy scans and
    unacceptable resource consumption.


    *   OLTP and OLAP operations cannot be split into separate data sources.


    Even if a table meets these criteria, be sure to test thoroughly and be able to
    quantify that the performance benefits of the memory-optimized columnstore index
    outweigh the limitations and drawbacks. This is a unique architectural feature
    that will only be applicable to a small fraction of high-volume, highly concurrent
    OLTP tables. More often than not, other alternatives will be more feasible, such
    as


    *   Disk-based table with a clustered rowstore index and a nonclustered columnstore
    index.


    *   Memory-optimized table with additional covering nonclustered indexes.


    *   Separate OLTP/OLAP data processing/storage systems.


    ## Optimization Strategies


    Generally speaking, optimization is a process that should begin with solutions
    that address the most common use cases. Tweaking and implementing additional layers
    of complexity should only occur when one or more of the following are true:


    *   Other solutions have failed to provide sufficient performance gains.


    *   The situation can be classified as an exception to the rules or an edge case.


    *   Testing and QA of new strategies proves worthwhile gains (in performance,
    resource savings, or both).


    There is no one-size-fits-all solution to any set of architectural challenges,
    and therefore it is important to use caution when applying techniques introduced
    in this chapter (or anywhere for that matter). Keep it simple and only when simple
    fails should less simple solutions be considered.'
