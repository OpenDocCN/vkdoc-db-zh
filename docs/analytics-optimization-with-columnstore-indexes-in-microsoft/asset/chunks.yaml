- fmt: "The original data is stored as `DECIMAL(4,2)`, which consumes 5 bytes (40\
    \ bits) per value. By converting to integers prior to compression, multiple transformations\
    \ are applied that reduce storage from 200 bits to 26 bits. Decimals may not seem\
    \ the most likely candidates for effective compression, but once they are converted\
    \ into integer values, they can take advantage of any of the transformations that\
    \ can be applied to integers.\n\n### Dictionary Encoding\n\nString data is stored\
    \ more efficiently using dictionary encoding. In this algorithm, each distinct\
    \ string value in a segment is inserted into a dictionary and indexed using an\
    \ integer pointer to the dictionary. This provides significant space savings for\
    \ string columns that contain repeated values. Consider a segment that contains\
    \ foods of the data type `VARCHAR(50)`, as seen in Table 5-6.\n\n#### Table 5-6\n\
    Sample Data Set Containing `VARCHAR(50)` String Data\n\n| Values | Original Size\
    \ in Bytes |\n| --- | --- |\n| Taco | 4 |\n| Hamburger | 9 |\n| Fish Fry | 8 |\n\
    | Taco | 4 |\n| Hamburger | 9 |\n| Taco | 4 |\n| Triple-Layer Chocolate Cake |\
    \ 27 |\n| Triple-Layer Chocolate Cake | 27 |\n| Triple-Layer Chocolate Cake |\
    \ 27 |\n| Cup of Coffee | 13 |\n\nThe first step to compressing this data is to\
    \ create an indexed dictionary, as seen in Table 5-7.\n\n#### Table 5-7\nExample\
    \ of a Dictionary That Is Generated from `VARCHAR` Data\n\n| Index ID | `VARCHAR`\
    \ Value |\n| --- | --- |\n| 0 | Fish Fry |\n| 1 | Hamburger |\n| 2 | Taco |\n\
    | 3 | Triple-Layer Chocolate Cake |\n| 4 | Cup of Coffee |\n\nSince the segment\
    \ contains five distinct values, the index ID for the dictionary will consume\
    \ 3 bits. The resulting mapping in Figure 5-2 shows the resulting dictionary compression\
    \ of this data.\n\n![Sample dictionary compression of a set of ten strings](images/521866_1_En_5_Chapter/521866_1_En_5_Fig2_HTML.jpg)\n\
    \nThe original data required 132 bytes in storage, whereas the encoded data required\
    \ only 30 bits (3 bits per value), plus the space required to store the lookup\
    \ values in the dictionary. The dictionary itself consumes space for each distinct\
    \ value in the segment data, but as a bonus, a dictionary may be shared by multiple\
    \ rowgroups. Therefore, a table with 100 rowgroups may reuse dictionaries for\
    \ each column across all of those rowgroups.\n\nThe key to dictionary compression\
    \ is cardinality. The less distinct values present in the column, the more efficiently\
    \ the data will compress. A `CHAR(100)` column with 5 distinct values will compress\
    \ significantly better than a `CHAR(10)` column with 1000 distinct values. The\
    \ dictionary size can be roughly estimated as the product of distinct values and\
    \ their initial size. Lower cardinality means that there are less string values\
    \ to store in the dictionary and the index used to reference the dictionary will\
    \ be smaller. Since the dictionary index IDs are repeated throughout rows in the\
    \ table, a smaller size can greatly improve compression.\n\nDictionaries can be\
    \ viewed in SQL Server using the view `sys.column_store_dictionaries`. The query\
    \ in Listing 5-1 returns information about the dictionaries used in the `fact.Sale_CCI`\
    \ table created in Chapter 4.\n\n```sql\nSELECT\n    partitions.partition_number,\n\
    \    objects.name AS table_name,\n    columns.name AS column_name,\n    CASE\n\
    \        WHEN column_store_dictionaries.dictionary_id = 0 THEN 'Global Dictionary'\n\
    \        ELSE 'Local Dictionary'\n    END AS dictionary_scope,\n    CASE\n   \
    \     WHEN column_store_dictionaries.type = 1 THEN 'Hash dictionary containing\
    \ int values'\n        WHEN column_store_dictionaries.type = 2 THEN 'Not used'\
    \ -- Included for completeness\n        WHEN column_store_dictionaries.type =\
    \ 3 THEN 'Hash dictionary containing string values'\n        WHEN column_store_dictionaries.type\
    \ = 4 THEN 'Hash dictionary containing float values'\n    END AS dictionary_type,\n\
    \    column_store_dictionaries.entry_count,\n    column_store_dictionaries.on_disk_size\n\
    FROM sys.column_store_dictionaries\nINNER JOIN sys.partitions\n    ON column_store_dictionaries.hobt_id\
    \ = partitions.hobt_id\nINNER JOIN sys.objects\n    ON objects.object_id = partitions.object_id\n\
    INNER JOIN sys.columns\n    ON columns.column_id = column_store_dictionaries.column_id\n\
    \    AND columns.object_id = objects.object_id\nWHERE objects.name = 'Sale_CCI';\n\
    ```\n\nThe results of this query are shown in Figure 5-3.\n\n![Dictionary metadata\
    \ results for the table fact.Sale_CCI](images/521866_1_En_5_Chapter/521866_1_En_5_Fig3_HTML.jpg)\n\
    \nThis view provides the cardinality of the column in `entry_count`, as well as\
    \ the size of the dictionary and its type. There are a number of noteworthy takeaways\
    \ from this data:\n\n*   Dictionaries may be global or local. A local dictionary\
    \ only applies to a single rowgroup (or on rare occasions, rowgroups compressed\
    \ via the same process as that one). A global dictionary is shared across many\
    \ or all segments for a given column.\n\n*   Dictionaries may be created for numeric\
    \ columns if SQL Server believes that will provide better compression than value\
    \ compression. As a result, numeric columns can appear in this metadata, but some\
    \ will not. Typically, numeric columns with a low cardinality will tend to use\
    \ dictionary compression, whereas numeric columns that have a high cardinality\
    \ will use value compression. In the preceding example, `Sale Key`, the primary\
    \ key on the underlying data, is value compressed, whereas `Bill To Customer Key`\
    \ (containing only three unique values) is dictionary compressed.\n\n*   Additional\
    \ metadata may be gleaned from `sys.columns`, if needed, such as the data type\
    \ of the underlying data, its length, precision, and scale.\n\nThis metadata provides\
    \ detail about each dictionary in the columnstore index, but does not directly\
    \ relate segments to dictionaries. The query in Listing 5-2 links `sys.column_store_segments`\
    \ to `sys.column_store_dictionaries` to provide this added information."
