  trans: '

    ## 列存储索引元数据


    本节详细介绍了列存储索引元数据视图中的关键列。


    #### Total_rows

    此列提供行组的行数。通过对所有行组的此值进行求和，无需直接查询表即可收集到准确的表行数。如果许多行组的行数较低，则表明存在值得调查的流程问题。


    #### Deleted_rows

    如果在此行组的删除位图中，有任何行被标记为已删除，则此处会提供已删除行的计数。


    #### Size_in_bytes

    行组的总大小，即驻留在该行组中的所有段所使用的空间之和。此列可用于快速确定整个或部分列存储索引的大小。


    ## 段元数据

    列存储索引中存储的基本单位是段。每个段代表单个列及其在每个行组所包含的行集中的内容。构成列存储索引的段数量是索引中行组数量与表中列数量的乘积。


    `Sys.column_store_segments` 提供了关于每个段内容的详尽细节。此数据是准确的，并且在段内数据发生变化时会更新，这与需要定期更新以确保合理近似现实情况的
    SQL Server 统计信息不同。


    此视图中的数据不仅仅是供好奇的管理员参考。查询优化器在查询列存储索引时，也会利用这些数据在运行时智能地决策需要读取哪些数据。这使得当元数据表明某些段无需用于满足查询时，可以跳过这些段。这可以显著减少读取量，并以
    SQL Server 中行存储表无法实现的方式提高查询性能。


    `清单 6-2` 中的查询返回此视图中的各种有用列。

    ```sql

    SELECT

    tables.name AS table_name,

    indexes.name AS index_name,

    columns.name AS column_name,

    partitions.partition_number,

    column_store_segments.encoding_type,

    column_store_segments.row_count,

    column_store_segments.has_nulls,

    column_store_segments.base_id,

    column_store_segments.magnitude,

    column_store_segments.min_data_id,

    column_store_segments.max_data_id,

    column_store_segments.null_value,

    column_store_segments.on_disk_size

    FROM sys.column_store_segments

    INNER JOIN sys.partitions

    ON column_store_segments.hobt_id = partitions.hobt_id

    INNER JOIN sys.indexes

    ON indexes.index_id = partitions.index_id

    AND indexes.object_id = partitions.object_id

    INNER JOIN sys.tables

    ON tables.object_id = indexes.object_id

    INNER JOIN sys.columns

    ON tables.object_id = columns.object_id

    AND column_store_segments.column_id = columns.column_id

    WHERE tables.name = ''Sale_CCI''

    ORDER BY columns.name, column_store_segments.segment_id;

    ```

    `清单 6-2`

    返回列存储段元数据的查询


    返回的段元数据可见于 `图 6-2`。

    ![](img/521866_1_En_6_Fig2_HTML.jpg)

    `图 6-2`

    Sale_CCI 表上列存储索引的段元数据


    关于列存储段的详细信息深入探讨了它们如何被压缩和存储，这可以为列存储索引中每列的压缩效率提供有价值的线索。以下是此视图中一些关键列的详细说明。


    #### Encoding_type

    此列指示该段是否使用字典进行编码以及存储其中的数据类型，具体如下：

    *   1: 无字典的非字符串/非二进制数据。此段中的值使用 基数/量级 编码进行转换。

    *   2: 带字典的非字符串/非二进制数据。

    *   3: 带字典的字符串或二进制数据。

    *   4: 无字典的非字符串/非二进制数据。此段中的值按原样存储，无额外转换。

    *   5: 无字典的字符串或二进制数据。


    通常，具有许多不同值（即高基数）的段倾向于使用基于值的编码，而不实现字典查找，而低基数的段则更常使用字典来减少重复值的存储。此决策由 SQL Server
    内部做出，以改进压缩并减少段占用的空间。


    #### Row_Count

    此行计数与相应行组的行计数匹配，表示列存储段内包含的值数量（重复或不同）。


    #### Has_nulls

    如果一个段包含至少一个 NULL，则此列设置为 1；否则为 0。请注意，此列不指示列是否允许 NULL，而是报告某个段在其值集中是否恰好有 NULL。因此，同一列的不同段在此位上的值可以不同。


    #### Base_id and Magnitude

    这些列直接报告基于值的编码。如果使用基数和指数修改了值以减少其存储大小，则这些详细信息在此处表示。基数和量级可能因段而异，对于任何一列的不同段，它们不需要相同。


    #### Min_data_id and Max_data_id

    这对非常实用的列提供了段的最小值和最大值，或者如果使用了字典，则提供字典查找值。如果为基于值的编码进行了转换，则这些列提供的值将包含这些修改。


    段的最小值和最大值由查询优化器用于在读取列存储索引时跳过不必要的行组。例如，如果一个段包含的最小值为 1，最大值为 400，那么筛选此范围之外值的查询可以完全跳过此行组。这种优化称为段消除，是大型列存储索引性能的关键。第
    10 章详细讨论了段消除，并提供了充分利用此功能所需的约定。


    #### Null_value

    如果一个段包含 NULL，则此列提供的值是该列编码中表示 NULL 的数值。


    #### On_disk_size

    列 `on_disk_size` 提供了列存储段消耗的空间，从而可以轻松地将列存储索引消耗的空间分解为细粒度的详细信息。如果众多段中有一个段的大小异常大，则探究其原因并确定是否可以进行进一步优化以改进数据压缩可能是有价值的。


    这种细粒度的详细信息还允许计算每列消耗的空间，以及每个分区每列消耗的空间。如果列存储索引异常快速地增长，此元数据允许将增长源隔离到特定的列和一组段，以确定增长的来源。

    '
- fmt: '### Rowgroup Physical Metadata


    SQL Server provides the view `sys.dm_db_column_store_row_group_physical_stats`
    as a reference to each rowgroup. Included are details regarding their current
    state and how rowgroups were created. This information is invaluable when troubleshooting
    unexpected performance challenges or when trying to understand why a columnstore
    index rowgroups were built in a particular way.


    The query in Listing 6-3 returns key information from this view, as well as some
    associated metadata.


    ```sql

    SELECT

    objects.name AS table_name,

    indexes.name AS index_name,

    dm_db_column_store_row_group_physical_stats.partition_number,

    dm_db_column_store_row_group_physical_stats.row_group_id,

    dm_db_column_store_row_group_physical_stats.state_desc,

    dm_db_column_store_row_group_physical_stats.total_rows,

    dm_db_column_store_row_group_physical_stats.deleted_rows,

    dm_db_column_store_row_group_physical_stats.size_in_bytes,

    dm_db_column_store_row_group_physical_stats.trim_reason_desc,

    dm_db_column_store_row_group_physical_stats.transition_to_compressed_state_desc,

    dm_db_column_store_row_group_physical_stats.has_vertipaq_optimization,

    dm_db_column_store_row_group_physical_stats.created_time

    FROM sys.dm_db_column_store_row_group_physical_stats

    INNER JOIN sys.objects

    ON objects.object_id = dm_db_column_store_row_group_physical_stats.object_id

    INNER JOIN sys.indexes

    ON indexes.object_id = dm_db_column_store_row_group_physical_stats.object_id

    AND indexes.index_id = dm_db_column_store_row_group_physical_stats.index_id

    WHERE objects.name = ''Sale_CCI'';

    ```

    Listing 6-3: Query That Returns Columnstore Rowgroup Physical Details


    The results provide additional information about rowgroups, as seen in Figure
    6-3.


    ![](images/521866_1_En_6_Chapter/521866_1_En_6_Fig3_HTML.jpg)


    Figure 6-3: Rowgroup physical stats for the columnstore index on Sale_CCI


    This information provides clues as to how and when rowgroups were built. The following
    are descriptions of the key columns presented in Figure 6-3.


    #### State_desc


    This is the current state of the rowgroup, which is identical to the value found
    in `sys.column_store_row_groups`. A rowgroup with a state of `TOMBSTONE` indicates
    that it previously was part of a delta store and has been transitioned into compressed
    rowgroups, but has yet to be cleaned up. This cleanup occurs asynchronously and
    automatically, without the need for operator intervention.


    #### Total_rows, Deleted_rows, Size_in_bytes


    These are the same as their corresponding values in `sys.column_store_row_groups`
    and are provided in this view for convenience.


    #### Trim_reason_desc


    A rowgroup may contain up to 2^(20) rows. There are many reasons why a rowgroup
    is created and compressed with less than its full complement of rows. If this
    column shows `NO_TRIM` for a rowgroup, then that indicates that it is a full rowgroup
    with 1,048,576 rows. If the rowgroup contains less than its maximum possible size
    in rows, then the trim reason will explain why.


    Typically, a columnstore index should mostly contain rowgroups with row counts
    near 1,048,576. In the event that this is not the case, and a majority of rowgroups
    are undersized, then understanding why is key to improving columnstore storage
    and performance. There is no firm threshold for defining what "undersized" is,
    but typically an undersized rowgroup contains less than 900,000 rows, or less
    than about 10% of its maximum size.


    Common reasons for a rowgroup to be trimmed include


    * `BULKLOAD`: A bulk load process limited the resulting row count to less than
    its maximum size. This is normal and rarely a cause for concern.

    * `REORG`: An index reorganize process was used to force compression of a rowgroup.
    Since this is a manual process, it is easy to control, if needed.

    * `DICTIONARY_SIZE`: A dictionary is limited to 16 megabytes of space. If a dictionary
    exceeds that size, then the rowgroup it corresponds to will be split into another
    rowgroup. If this happens often and if the resulting row counts are low, it indicates
    that dictionary compression is harming compression performance. Normalizing a
    large dimension into a lookup table is an effective way to resolve this problem.

    * `MEMORY_LIMITATION`: This indicates that SQL Server ran low on memory while
    compressing the rowgroup and could not include all rows. This is indicative of
    memory pressure, and research should be conducted to determine why memory was
    low and if additional memory should be added to the SQL Server to resolve this
    problem. It is likely that memory pressure of this nature would affect other processes
    on the server as well and alleviating it would be beneficial to them, in addition
    to the columnstore index build process.

    * `RESIDUAL_ROW_GROUP`: When an index build operation completes, leftover rows
    will be compressed into rowgroups using this trim reason. This is normal and does
    not require investigation.

    * `AUTO_MERGE`: This results when the tuple mover runs and merges multiple rowgroups
    together. This is a good thing as it contributes to larger rowgroups and the removal
    of undersized ones.


    #### Transition_to_compressed_state_desc


    This column describes how a rowgroup was moved from the delta store into a set
    of compressed segments within a columnstore index. It provides additional information
    for how the rowgroup was created and can be used in conjunction with the trim
    reason to understand how all rowgroups were created, whether trimmed or not. The
    possible values for the transition to compressed state description include


    * `NOT_APPLICABLE`: This is found either in delta store rowgroups or for rowgroups
    compressed prior to SQL Server 2016, when this history was not maintained.

    * `INDEX_BUILD`: This rowgroup was compressed via an index build process.

    * `TUPLE_MOVER`: This rowgroup was compressed by the tuple mover after it inserted
    data into it from the delta store.

    * `REORG_NORMAL`: An index reorganize process was executed that moved a closed
    rowgroup from the delta store into the columnstore index. This occurred after
    it was closed with its full number of rows but before it was moved asynchronously
    via the tuple mover.

    * `REORG_FORCED`: An index reorganize process was executed that moved an open
    rowgroup from the delta store into the columnstore index. This occurred before
    it had its full number of rows and would normally be moved asynchronously via
    the tuple mover.

    * `BULKLOAD`: A minimally logged bulk load process created the rowgroup without
    using the delta store.

    * `MERGE`: The tuple mover merged multiple rowgroups together into this compressed
    rowgroup.


    Note that with the exception of the two transition reasons related to index reorganize
    operations, the remaining reasons indicate the creation of compressed rowgroups
    through automatic processes in SQL Server. These reasons should be seen as part
    of normal operations and only investigated if an unsolved performance problem
    is encountered.'
