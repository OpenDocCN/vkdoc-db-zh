- fmt: '# 数据库性能优化：分离OLAP与OLTP


    ## Separate OLAP and OLTP Processes


    One solution to the challenge of running analytics against transactional tables
    is to separate OLAP data and processes from OLTP data and processes. There are
    many ways to tackle this challenge, including


    *   `AlwaysOn Availability Groups`

    *   `Replication`

    *   Separate analytic tables, fed by `ETL`

    *   Third-party analytics tools

    *   Third-party hardware solutions


    Figure [12-6](#521866_1_En_12_Chapter.xhtml#Fig6) shows a simple representation
    of workloads against an OLAP data copy.


    ![](images/521866_1_En_12_Chapter/521866_1_En_12_Fig6_HTML.jpg)

    Figure 12-6: OLAP workloads targeted at a data copy


    While separating transactional and analytic data is by far the most effective
    way of managing the challenge of mixed workloads, it is also the most disruptive.


    `AlwaysOn` and `Replication` are mature tools that provide different ways to produce
    secondary copies of data for use by analytic processes. They require new components
    of `SQL Server` to be learned and implemented, as well as a commitment for additional
    hardware to support a new target for copies of OLTP data. They can also provide
    high availability, in the event that the primary transactional database fails.


    If a database already uses `AlwaysOn Availability Groups`, then nonclustered columnstore
    indexes can be leveraged to off-load analytic queries to a readable secondary.
    Similarly, if `Replication` is used, the `Replication` target can be outfitted
    with a clustered or nonclustered columnstore index, if its primary purpose is
    to service analytic queries.


    In addition to these built-in tools, an architect can create their own data copies
    and manage them via `SQL Server Integration Services` or some other data movement
    process. While manually building a data-copy process is a bit more labor intensive,
    it allows for the use of existing tools and for any amount of customization. This
    is often how organizations start their data warehousing environments.


    Many third-party tools will perform similar tasks and allow for additional processing/management
    of data. The upside to investing in a tool by an outside organization is that
    the time, resources, and expertise needed to build and maintain it fall squarely
    on their shoulders, freeing up resources for other projects. The downsides are
    cost and investment in a new tool that may potentially be difficult to quit in
    the future if needed.


    While solutions such as these incur latency, the latency can be controlled via
    configuration settings within each of them so that it remains within the bounds
    of organizational needs.


    ## Nonclustered Columnstore Indexes


    Introducing other solutions to analytic queries against transactional data sets
    the stage for how and when nonclustered columnstore indexes can effectively be
    used to manage analytic queries.


    Nonclustered columnstore indexes are architected similarly to clustered columnstore
    indexes and exhibit similar behavior. Rowgroups, segments, and compression may
    be analyzed in the same fashion as with clustered columnstore indexes and best
    practices should be followed similarly. This means that they perform exceptionally
    well for analytic-style queries that aggregate millions of rows in a single operation.
    As with clustered columnstore indexes, though, `DELETE` and `UPDATE` operations
    can incur fragmentation and waste space over time, and `UPDATE` operations may
    perform poorly against large nonclustered columnstore indexes.


    A huge difference between clustered and nonclustered columnstore indexes is that
    the nonclustered version allows for a column list to be specified. While data
    order is enforced by the rowstore clustered index, being able to pick and choose
    columns that are included can isolate those needed for analytics as opposed to
    those used primarily for transactional operations.


    Note that the rowstore clustered index key columns are automatically included
    in nonclustered columnstore indexes by default and cannot be removed. They are
    required to support `UPDATE` and `DELETE` operations against existing rowgroups.


    The primary benefits of nonclustered columnstore indexes are as follows:


    *   Allow real-time operational analytics.

    *   A column list can be specified.

    *   No app code changes are required.

    *   Columnstore index is stored on separate pages from rowstore indexes, thereby
    reducing contention.

    *   Index may be filtered, assigned compression delay, or off-loaded to an `AlwaysOn`
    replica.


    Like clustered columnstore indexes, nonclustered columnstore indexes require some
    foresight to implement effectively. Because the clustered index is transactional
    in nature and the table is likely the target of frequent small write operations,
    considerations need to be made to the architecture of nonclustered columnstore
    indexes to ensure that the impact of write operations is managed effectively.


    Figure [12-7](#521866_1_En_12_Chapter.xhtml#Fig7) illustrates a simplified illustration
    of workloads against a table with both a clustered rowstore index and a nonclustered
    columnstore index.


    ![](images/521866_1_En_12_Chapter/521866_1_En_12_Fig7_HTML.jpg)

    Figure 12-7: Mixed workloads against rowstore and columnstore indexes


    The takeaway from having both rowstore and columnstore indexes in a single table
    is that both can be used simultaneously, allowing transactional and analytic operations
    to execute side by side, rather than exclusively competing for resources.


    To test the impact of nonclustered columnstore indexes on a transactional table,
    consider the script in Listing [12-3](#521866_1_En_12_Chapter.xhtml#PC3).


    ```sql

    CREATE NONCLUSTERED COLUMNSTORE INDEX NCCI_Orders ON Sales.Orders (OrderDate,
    CustomerID, IsUndersupplyBackordered, SalespersonPersonID);

    Listing 12-3: Creation of a Nonclustered Columnstore Index on a Rowstore Table

    ```


    In the index creation statement, only columns involved in the analytic query were
    included. More can be added if needed for other common queries, but the goal is
    to ensure that analytics are used by the columnstore index without the need to
    refer to the clustered rowstore index.


    Once added, the test query in Listing [12-1](#521866_1_En_12_Chapter.xhtml#PC1)
    can be executed again. The execution plan is shown in Figure [12-8](#521866_1_En_12_Chapter.xhtml#Fig8).


    ![](images/521866_1_En_12_Chapter/521866_1_En_12_Fig8_HTML.jpg)

    Figure 12-8: Execution plan for an analytic query using a nonclustered columnstore
    index


    The execution plan shows that the columnstore index was exclusively used to return
    query results. Figure [12-9](#521866_1_En_12_Chapter.xhtml#Fig9) shows the output
    of `STATISTICS IO` for the query.


    ![](images/521866_1_En_12_Chapter/521866_1_En_12_Fig9_HTML.jpg)

    Figure 12-9: STATISTICS IO for an analytic query using a nonclustered columnstore
    index


    Reads are about the same as with a covering index, with the added benefit that
    key lookups to the clustered index are avoided, ensuring no contention with other
    queries that are using it at the same time.


    ## Managing Hot, Warm, and Cold Transactional Data


    While nonclustered columnstore indexes can provide exceptional performance for
    real-time operational analytics, they have one glaring weakness: write operations.
    Transactional tables tend to incur small, incremental changes – inserts, updates,
    and deletes that affect a few rows at a time and that occur frequently. Columnstore
    indexes are designed for large bulk inserts, occasional deletes, and minimal updates.


    Despite these immediate challenges, tools are available to manage these challenges
    when implementing nonclustered columnstore indexes to help maintain optimal performance.'
  raw: '## Separate OLAP and OLTP Processes


    One solution to the challenge of running analytics against transactional tables
    is to separate OLAP data and processes from OLTP data and processes. There are
    many ways to tackle this challenge, including


    *   AlwaysOn Availability Groups


    *   Replication


    *   Separate analytic tables, fed by ETL


    *   Third-party analytics tools


    *   Third-party hardware solutions


    Figure [12-6](#521866_1_En_12_Chapter.xhtml#Fig6) shows a simple representation
    of workloads against an OLAP data copy.


    ![](images/521866_1_En_12_Chapter/521866_1_En_12_Fig6_HTML.jpg)


    Figure 12-6


    OLAP workloads targeted at a data copy


    While separating transactional and analytic data is by far the most effective
    way of managing the challenge of mixed workloads, it is also the most disruptive.


    AlwaysOn and Replication are mature tools that provide different ways to produce
    secondary copies of data for use by analytic processes. They require new components
    of SQL Server to be learned and implemented, as well as a commitment for additional
    hardware to support a new target for copies of OLTP data. They can also provide
    high availability, in the event that the primary transactional database fails.


    If a database already uses AlwaysOn Availability Groups, then nonclustered columnstore
    indexes can be leveraged to off-load analytic queries to a readable secondary.
    Similarly, if Replication is used, the Replication target can be outfitted with
    a clustered or nonclustered columnstore index, if its primary purpose is to service
    analytic queries.


    In addition to these built-in tools, an architect can create their own data copies
    and manage them via SQL Server Integration Services or some other data movement
    process. While manually building a data-copy process is a bit more labor intensive,
    it allows for the use of existing tools and for any amount of customization. This
    is often how organizations start their data warehousing environments.


    Many third-party tools will perform similar tasks and allow for additional processing/management
    of data. The upside to investing in a tool by an outside organization is that
    the time, resources, and expertise needed to build and maintain it fall squarely
    on their shoulders, freeing up resources for other projects. The downsides are
    cost and investment in a new tool that may potentially be difficult to quit in
    the future if needed.


    While solutions such as these incur latency, the latency can be controlled via
    configuration settings within each of them so that it remains within the bounds
    of organizational needs.


    ## Nonclustered Columnstore Indexes


    Introducing other solutions to analytic queries against transactional data sets
    the stage for how and when nonclustered columnstore indexes can effectively be
    used to manage analytic queries.


    Nonclustered columnstore indexes are architected similarly to clustered columnstore
    indexes and exhibit similar behavior. Rowgroups, segments, and compression may
    be analyzed in the same fashion as with clustered columnstore indexes and best
    practices should be followed similarly. This means that they perform exceptionally
    well for analytic-style queries that aggregate millions of rows in a single operation.
    As with clustered columnstore indexes, though, DELETE and UPDATE operations can
    incur fragmentation and waste space over time, and UPDATE operations may perform
    poorly against large nonclustered columnstore indexes.


    A huge difference between clustered and nonclustered columnstore indexes is that
    the nonclustered version allows for a column list to be specified. While data
    order is enforced by the rowstore clustered index, being able to pick and choose
    columns that are included can isolate those needed for analytics as opposed to
    those used primarily for transactional operations.


    Note that the rowstore clustered index key columns are automatically included
    in nonclustered columnstore indexes by default and cannot be removed. They are
    required to support UPDATE and DELETE operations against existing rowgroups.


    The primary benefits of nonclustered columnstore indexes are as follows:


    *   Allow real-time operational analytics.


    *   A column list can be specified.


    *   No app code changes are required.


    *   Columnstore index is stored on separate pages from rowstore indexes, thereby
    reducing contention.


    *   Index may be filtered, assigned compression delay, or off-loaded to an AlwaysOn
    replica.


    Like clustered columnstore indexes, nonclustered columnstore indexes require some
    foresight to implement effectively. Because the clustered index is transactional
    in nature and the table is likely the target of frequent small write operations,
    considerations need to be made to the architecture of nonclustered columnstore
    indexes to ensure that the impact of write operations is managed effectively.


    Figure [12-7](#521866_1_En_12_Chapter.xhtml#Fig7) illustrates a simplified illustration
    of workloads against a table with both a clustered rowstore index and a nonclustered
    columnstore index.


    ![](images/521866_1_En_12_Chapter/521866_1_En_12_Fig7_HTML.jpg)


    Figure 12-7


    Mixed workloads against rowstore and columnstore indexes


    The takeaway from having both rowstore and columnstore indexes in a single table
    is that both can be used simultaneously, allowing transactional and analytic operations
    to execute side by side, rather than exclusively competing for resources.


    To test the impact of nonclustered columnstore indexes on a transactional table,
    consider the script in Listing [12-3](#521866_1_En_12_Chapter.xhtml#PC3).


    ```

    CREATE NONCLUSTERED COLUMNSTORE INDEX NCCI_Orders ON Sales.Orders (OrderDate,
    CustomerID, IsUndersupplyBackordered, SalespersonPersonID);

    Listing 12-3

    Creation of a Nonclustered Columnstore Index on a Rowstore Table

    ```


    In the index creation statement, only columns involved in the analytic query were
    included. More can be added if needed for other common queries, but the goal is
    to ensure that analytics are used by the columnstore index without the need to
    refer to the clustered rowstore index.


    Once added, the test query in Listing [12-1](#521866_1_En_12_Chapter.xhtml#PC1)
    can be executed again. The execution plan is shown in Figure [12-8](#521866_1_En_12_Chapter.xhtml#Fig8).


    ![](images/521866_1_En_12_Chapter/521866_1_En_12_Fig8_HTML.jpg)


    Figure 12-8


    Execution plan for an analytic query using a nonclustered columnstore index


    The execution plan shows that the columnstore index was exclusively used to return
    query results. Figure [12-9](#521866_1_En_12_Chapter.xhtml#Fig9) shows the output
    of STATISTICS IO for the query.


    ![](images/521866_1_En_12_Chapter/521866_1_En_12_Fig9_HTML.jpg)


    Figure 12-9


    STATISTICS IO for an analytic query using a nonclustered columnstore index


    Reads are about the same as with a covering index, with the added benefit that
    key lookups to the clustered index are avoided, ensuring no contention with other
    queries that are using it at the same time.


    ## Managing Hot, Warm, and Cold Transactional Data


    While nonclustered columnstore indexes can provide exceptional performance for
    real-time operational analytics, they have one glaring weakness: write operations.
    Transactional tables tend to incur small, incremental changes – inserts, updates,
    and deletes that affect a few rows at a time and that occur frequently. Columnstore
    indexes are designed for large bulk inserts, occasional deletes, and minimal updates.


    Despite these immediate challenges, tools are available to manage these challenges
    when implementing nonclustered columnstore indexes to help maintain optimal performance.'
  trans: '

    # 数据库性能优化：分离 OLAP 与 OLTP


    ## 分离 OLAP 与 OLTP 进程


    解决在事务型表上运行分析查询这一挑战的一个方案是，将 OLAP 数据和进程与 OLTP 数据和进程分离开来。有多种方法可以应对这一挑战，包括：


    *   `AlwaysOn 可用性组`

    *   `复制`

    *   由`ETL`供数的独立分析表

    *   第三方分析工具

    *   第三方硬件解决方案


    图 12-6 简单展示了针对 OLAP 数据副本的工作负载。


    ![](img/521866_1_En_12_Fig6_HTML.jpg)

    图 12-6：针对数据副本的 OLAP 工作负载


    虽然分离事务数据和分析数据是目前为止管理混合工作负载挑战最有效的方式，但它也是破坏性最大的一种。


    `AlwaysOn` 和 `复制` 是成熟的工具，它们提供了不同的方式来生成数据的次级副本，以供分析进程使用。它们需要学习和实施 `SQL Server`
    的新组件，以及承诺投入额外的硬件来支持 OLTP 数据副本的新目标。在主要事务数据库发生故障时，它们还能提供高可用性。


    如果数据库已经使用了 `AlwaysOn 可用性组`，那么可以利用非聚集列存储索引将分析查询下推到一个可读的辅助副本上。类似地，如果使用了 `复制`，并且其主要目的是服务分析查询，则可以在
    `复制` 目标上配置聚集或非聚集列存储索引。


    除了这些内置工具外，架构师还可以创建自己的数据副本，并通过 `SQL Server 集成服务` 或其他数据移动过程来管理它们。虽然手动构建数据复制过程稍微更耗费人力，但它允许使用现有工具并进行任何程度的定制。这通常是组织开始构建其数据仓库环境的方式。


    许多第三方工具可以执行类似的任务，并允许对数据进行额外的处理/管理。投资于外部组织工具的好处在于，构建和维护它所需的时间、资源和专业知识完全落在他们的肩上，从而腾出资源用于其他项目。缺点是成本以及对一个新工具的投资，如果将来需要退出，可能会比较困难。


    虽然此类解决方案会带来延迟，但延迟可以通过各自内部的配置设置进行控制，使其保持在组织需求的范围之内。


    ## 非聚集列存储索引


    为分析查询提供针对事务型数据的其他解决方案，为如何以及何时能有效使用非聚集列存储索引来管理分析查询奠定了基础。


    非聚集列存储索引的架构与聚集列存储索引类似，并表现出相似的行为。行组、段和压缩可以按照与聚集列存储索引相同的方式进行分析，并且应同样遵循最佳实践。这意味着它们对于聚合数百万行的分析类查询表现异常出色。然而，与聚集列存储索引一样，`DELETE`
    和 `UPDATE` 操作会随着时间的推移导致碎片化和空间浪费，并且 `UPDATE` 操作在大型非聚集列存储索引上可能表现不佳。


    聚集和非聚集列存储索引之间的一个巨大区别是，非聚集版本允许指定列列表。虽然数据顺序由行存储聚集索引强制执行，但能够选择包含哪些列，可以将分析所需的列与主要用于事务操作的列隔离开来。


    请注意，行存储聚集索引键列默认自动包含在非聚集列存储索引中，并且无法移除。它们是支持对现有行组进行 `UPDATE` 和 `DELETE` 操作所必需的。


    非聚集列存储索引的主要优点如下：


    *   支持实时运营分析。

    *   可以指定列列表。

    *   无需更改应用程序代码。

    *   列存储索引与行存储索引存储在不同的页面上，从而减少了争用。

    *   索引可以被筛选、分配压缩延迟或下推到 `AlwaysOn` 副本。


    与聚集列存储索引类似，非聚集列存储索引需要一些前瞻性才能有效实施。因为聚集索引本质上是事务性的，并且该表很可能是频繁的小型写入操作的目标，所以需要对非聚集列存储索引的架构进行考量，以确保写入操作的影响得到有效管理。


    图 12-7 展示了一个同时具有行存储聚集索引和非聚集列存储索引的表上工作负载的简化示意图。


    ![](img/521866_1_En_12_Fig7_HTML.jpg)

    图 12-7：针对行存储和列存储索引的混合工作负载


    在单个表中同时拥有行存储和列存储索引的关键在于，两者可以同时使用，允许事务和分析操作并行执行，而不是完全竞争资源。


    要测试非聚集列存储索引对事务表的影响，请考虑清单 12-3 中的脚本。


    ```sql

    CREATE NONCLUSTERED COLUMNSTORE INDEX NCCI_Orders ON Sales.Orders (OrderDate,
    CustomerID, IsUndersupplyBackordered, SalespersonPersonID);

    清单 12-3：在行存储表上创建非聚集列存储索引

    ```


    在该索引创建语句中，只包含了分析查询涉及的列。如果需要用于其他常见查询，可以添加更多列，但目标是确保分析操作由列存储索引服务，而无需引用聚集行存储索引。


    添加索引后，可以再次执行清单 12-1 中的测试查询。执行计划如图 12-8 所示。


    ![](img/521866_1_En_12_Fig8_HTML.jpg)

    图 12-8：使用非聚集列存储索引的分析查询的执行计划


    执行计划显示，列存储索引被专门用于返回查询结果。图 12-9 显示了该查询的 `STATISTICS IO` 输出。


    ![](img/521866_1_En_12_Fig9_HTML.jpg)

    图 12-9：使用非聚集列存储索引的分析查询的 STATISTICS IO


    读取次数与使用覆盖索引时大致相同，但有一个额外好处：避免了对聚集索引的键查找，确保了与其他同时使用它的查询没有争用。


    ## 管理热、温、冷事务数据


    虽然非聚集列存储索引可以为实时运营分析提供卓越的性能，但它们有一个明显的弱点：写操作。事务表往往会产生小型、增量的变化——插入、更新和删除，每次影响几行，并且发生频繁。而列存储索引是为大批量插入、偶尔删除和最小化更新而设计的。


    尽管存在这些直接的挑战，但在实施非聚集列存储索引时，有可用的工具来管理这些挑战，以帮助保持最佳性能。

    '
- fmt: '# Compression Delay


    Transactional data is often written and read frequently for a short span of time,
    after which it is subject to less and less data access over time. The new data
    can be viewed as hot data, whereas data that is somewhat old can be viewed as
    warm data, and older data can be seen as cold data. While the table is transactional
    in nature, a vast majority of data access will involve only the hot data.


    For example, consider an online order tracking system. The following is a summary
    of some of the steps involved in the order creation, processing, and completion,
    as well as notes on data access:


    1.  Order is placed for some cool swag. Data is written to a database.

    2.  Order is processed. Data is updated in the database.

    3.  Item is retrieved and packaged. Data is updated in the database.

    4.  Item is shipped. Data is updated in the database.

    5.  Item is tracked until delivery. Data is updated in the database with each
    shipping update.

    6.  Item is delivered. Data is updated in the database.

    7.  User leaves feedback on the order process and item.

    8.  User accesses this data read-only via the order history list in the future.

    9.  Eventually, the user rarely/never accesses this data again.


    This flow of data indicates a clear progression from hot data (#1–6) to warm data
    (#7–8) to becoming cold data (#9). Analytic queries will most frequently address
    large swaths of historical data, which is more apparent starting at step #6 on
    the list. Tracking specific orders is undoubtedly a transactional need and applies
    most to steps #1–5 as they correlate most with someone that wants to know where
    their order is and when it will arrive.


    A columnstore index will perform optimally the closer to the bottom of the list
    we go, whereas the frequent updates at the top of the list will be burdensome
    to compressed rowgroups. Each `DELETE` operation will flag a row as deleted in
    a rowgroup and waste space. Each `UPDATE` operation will delete a row and also
    insert a new row into the delta store.


    To manage this challenge, compression delay can be used on a columnstore index.
    This feature delays the movement of data from the delta store into compressed
    segments by a preset amount of time. That timeframe is based on how long the data
    is expected to still be hot. During that period of time where compression is delayed,
    there will be no need to worry about the impact of `DELETE` or `UPDATE` operations
    against compressed rowgroups. Conversely, reads against the uncompressed delta
    store data will be slower than when the data ultimately is compressed. For a large
    table, though, the percentage of data that is hot will be small, whereas the amount
    of data that is warm or cold will comprise most of the table. Equally important
    is that the clustered rowstore index will service transactional queries, allowing
    data in the delta store to be avoided by those processes.


    Consider the example of a columnstore index on `Sales.Orders` from Listing 12-3.
    If there typically was a period of 10 minutes in which the data was frequently
    updated, after which the data began to cool off and see less modifications, compression
    delay could be added to the index creation statement, as seen in Listing 12-4.


    ```

    CREATE NONCLUSTERED COLUMNSTORE INDEX NCCI_Orders

    ON Sales.Orders (OrderDate, CustomerID, IsUndersupplyBackordered, SalespersonPersonID)

    WITH (COMPRESSION_DELAY = 10 MINUTES);

    ```


    The index will initially perform exactly as it did before. The difference will
    be when data is written to the delta store. Any rows inserted into the delta store
    will be retained for at least 10 minutes prior to writing to compressed rowgroups.
    Without compression delay, the tuple mover will periodically move rows from the
    delta store to compressed rowgroups. With this feature, it will now wait at least
    10 minutes before doing so.'
