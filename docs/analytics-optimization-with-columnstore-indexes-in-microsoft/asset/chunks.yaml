    清单 10-3 仅请求三列的针对列存储索引的查询


    这里，只请求了三列，而不是所有列。由此产生的 IO 可以在图 10-4 中查看。


    ![](img/521866_1_En_10_Fig4_HTML.jpg)

    图 10-4 请求三列数据的示例查询的 IO


    当列列表被缩减到仅查询所需的那些时，`LOB logical reads` 从 68,030 减少到 31,689。省略列带来的性能提升会根据每列的数据类型、压缩方式和内容而有所不同。省略一个没有重复值的文本列将比省略一个
    `BIT` 列更能显著减少 IO。


    段消除是提高查询速度同时减少资源消耗的简单方法。任何针对列存储索引编写查询的人都应考虑其工作负载需要哪些列，并确保不返回额外的列。


    ## 行组消除


    与行存储索引不同，列存储索引没有内置的顺序。插入到列存储索引中的数据是按照 SQL Server 接收到的顺序添加的。因此，行组内数据的顺序就是其插入顺序的直接结果。同样重要的是，`UPDATE`
    操作会重新排序列存储索引，从一组行组中删除行，并将新版本插入到最新的开放行组中。


    由于压缩行组是一个计算成本高昂的过程，任何形式的内在数据顺序维护成本都将高得令人望而却步。这是设计列存储索引时最重要的概念之一。由于 SQL Server
    不强制数据顺序，因此架构师有责任预先确定数据顺序，并确保数据加载过程和常见查询模式都维护该约定的数据顺序。


    考虑表 `Dimension.Employee`，它在 `Employee Key` 列上包含一个聚集行存储索引。如果有三名新员工入职并被添加到表中，添加它们的
    `INSERT` 操作可以用清单 10-4 中的 T-SQL 表示。


    ```sql

    INSERT INTO Dimension.Employee

    ([Employee Key], [WWI Employee ID], Employee, [Preferred Name], [Is Salesperson],
    Photo, [Valid From], [Valid To], [Lineage Key])

    VALUES

    (   -1, -- Clustered Index

    289, N''Ebenezer Scrooge'', N''Scrooge'', 0, NULL, GETUTCDATE(), ''9999-12-31
    23:59:59.9999999'', 3),

    (   213, -- Clustered Index

    400, N''Captain Ahab'', N''Captain'', 0, NULL, GETUTCDATE(), ''9999-12-31 23:59:59.9999999'',
    3),

    (   1017, -- Clustered Index

    501, N''Holden Caulfield'', N''Phony'', 0, NULL, GETUTCDATE(), ''9999-12-31 23:59:59.9999999'',
    3);

    ```

    清单 10-4 向 `Dimension.Employee` 表添加三名新员工的查询


    有三行被插入到表中，聚集索引 ID 值分别为 -1、213 和 1017。插入时，SQL Server 会根据这些 `Employee Key` 值将每一行按顺序放置在
    b-tree 索引中。结果，表在 `INSERT` 操作后将保持按聚集索引排序。


    想象一下，如果这个表没有行存储索引，而是有一个聚集列存储索引。在这种情况下，这三行将被插入到开放行组的末尾，而完全不考虑 `Employee Key` 的值。搜索特定
    ID 范围的查询将需要检查任何包含这些 ID 的行组。


    列存储元数据帮助 SQL Server 根据每个行组中存在的每列的值范围来定位行。考虑使用清单 10-5 中的查询查看 `Fact.Sale_CCI` 中
    `Invoice Date Key` 列的元数据。


    ```sql

    SELECT

    tables.name AS table_name,

    indexes.name AS index_name,

    columns.name AS column_name,

    partitions.partition_number,

    column_store_segments.segment_id,

    column_store_segments.min_data_id,

    column_store_segments.max_data_id,

    column_store_segments.row_count

    FROM sys.column_store_segments

    INNER JOIN sys.partitions

    ON column_store_segments.hobt_id = partitions.hobt_id

    INNER JOIN sys.indexes

    ON indexes.index_id = partitions.index_id

    AND indexes.object_id = partitions.object_id

    INNER JOIN sys.tables

    ON tables.object_id = indexes.object_id

    INNER JOIN sys.columns

    ON tables.object_id = columns.object_id

