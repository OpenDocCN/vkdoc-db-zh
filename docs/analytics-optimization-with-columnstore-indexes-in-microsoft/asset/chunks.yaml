    \ 200 位减少到 26 位。十进制数可能看起来不是最有可能实现高效压缩的候选者，但一旦转换为整数值，它们就可以利用任何可应用于整数的转换方法。\n\n\
    ### 字典编码\n\n使用字典编码可以更高效地存储字符串数据。在此算法中，段中的每个不同字符串值被插入到字典中，并使用指向字典的整数指针进行索引。这对于包含重复值的字符串列可以显著节省空间。考虑一个包含\
    \ `VARCHAR(50)` 数据类型食物的段，如表 5-6 所示。\n\n#### 表 5-6\n包含 `VARCHAR(50)` 字符串数据的示例数据集\n\
