  trans: '# 压缩延迟


    事务性数据通常在短时间内被频繁写入和读取，随后其数据访问频率会随着时间的推移而越来越低。新数据可被视为热数据，而稍旧的数据可被视为暖数据，更旧的数据则可被视为冷数据。尽管表本质上是事务性的，但绝大多数数据访问只涉及热数据。


    例如，考虑一个在线订单跟踪系统。以下是订单创建、处理和完成所涉及的部分步骤摘要，以及关于数据访问的说明：


    1.  订单被提交以购买一些很酷的潮品。数据被写入数据库。

    2.  订单被处理。数据库中的数据被更新。

    3.  商品被拣出并打包。数据库中的数据被更新。

    4.  商品发货。数据库中的数据被更新。

    5.  商品被追踪直至送达。每次物流更新时，数据库中的数据都被更新。

    6.  商品送达。数据库中的数据被更新。

    7.  用户对订单流程和商品留下反馈。

    8.  用户未来通过订单历史列表以只读方式访问此数据。

    9.  最终，用户很少/不再访问此数据。


    此数据流清晰地表明了从热数据（步骤#1–6）到暖数据（步骤#7–8）再到变为冷数据（步骤#9）的演进过程。分析查询将最频繁地处理大段的历史数据，这在列表步骤#6
    之后变得更为明显。追踪特定订单无疑是事务性需求，主要适用于步骤#1–5，因为这些步骤与想要知道订单位置和预计到达时间的人最相关。


    列存储索引在越接近列表底部时性能最佳，而在列表顶部的频繁更新对于压缩行组来说将是负担。每次`DELETE`操作都会在行组中将一行标记为已删除并浪费空间。每次`UPDATE`操作将删除一行，并在增量存储中新插入一行。


    为了应对这一挑战，可以在列存储索引上使用压缩延迟。此功能将数据从增量存储移动到压缩段的时间延迟一个预设的时间段。该时间段基于数据预计保持为“热”状态的时长。在压缩被延迟的这段时间内，无需担心`DELETE`或`UPDATE`操作对压缩行组的影响。相反，对未压缩的增量存储数据的读取速度将比数据最终被压缩后要慢。然而，对于一个大表来说，热数据的百分比将很小，而暖数据或冷数据将构成表的大部分。同样重要的是，聚集行存储索引将服务于事务性查询，使得这些进程可以避开增量存储中的数据。


    考虑清单 12-3 中`Sales.Orders`表上的列存储索引示例。如果通常有一个 10 分钟的时间段，数据在此期间被频繁更新，之后数据开始冷却并减少修改，那么可以将压缩延迟添加到索引创建语句中，如清单
    12-4 所示。


    ```

    CREATE NONCLUSTERED COLUMNSTORE INDEX NCCI_Orders

    ON Sales.Orders (OrderDate, CustomerID, IsUndersupplyBackordered, SalespersonPersonID)

    WITH (COMPRESSION_DELAY = 10 MINUTES);

    ```


    该索引最初的表现将与之前完全相同。区别在于数据写入增量存储时。任何插入增量存储的行在写入压缩行组之前将至少保留 10 分钟。如果没有压缩延迟，元组移动程序会定期将行从增量存储移动到压缩行组。有了此功能，它现在将至少等待
    10 分钟再执行此操作。'
- fmt: "# 压缩延迟的配置与调整\n\n压缩延迟可以在现有索引上根据需要进行调整，而无需重建索引。例如，如果确定数据“热”期为30分钟而非10分钟，则可以使用\
    \ `ALTER INDEX` 语句相应地调整压缩延迟，如清单 [12-5](#521866_1_En_12_Chapter.xhtml#PC5) 所示。\n\
    \n```sql\nALTER INDEX NCCI_Orders ON Sales.Orders\nSET (COMPRESSION_DELAY = 30\
    \ MINUTES);\n```\n**清单 12-5** 使用 `ALTER INDEX` 语句调整压缩延迟\n\n配置压缩延迟是一种平衡：既要避免对压缩行组进行过多的写入操作，又要确保增量存储不会变得过大而对分析性能产生不利影响。理想情况下，行存储索引将服务于对“热”数据进行操作的事务查询，而列存储索引则处理针对大量数据（大部分是“温”或“冷”数据）的分析查询。\n\
    \n确定理想的压缩延迟值需要进行测试，但以下是一套指导原则，可帮助找到一个好的起点：\n\n1.  测量随时间插入的新行数。理想情况下，增量存储包含的数据不应超过几个行组的容量（几百万行或更少），且这些数据不被分析查询频繁使用。\n\
    2.  测量更新和删除操作，以及它们最常发生的时间段。尝试将压缩延迟设置为包含该时间段。\n3.  如果分析查询不针对新数据，则可以接受较高的压缩延迟。否则，可能需要降低压缩延迟，以避免频繁扫描增量存储。\n\
    4.  如果数据加载过程在插入操作中大量修改数据，请确保压缩延迟期足够长以涵盖典型的数据加载过程。或者，修改数据加载过程，使用暂存表/临时表在数据最终插入前进行修改。\n\
    \n压缩延迟可以设置为一个大数或小数。如果一个事务表每小时插入1000行新数据，并且这些行在6小时内被大量修改，那么360分钟的压缩延迟是完全可接受的。在这种情况下，增量存储平均包含6000行，这个数量足够小，扫描它不会造成性能问题。\n\
    \n反之，如果一个表每小时插入2,000,000行，那么压缩延迟就需要设置得更严格。如果该表中的数据“热”期为2小时，那么理想的压缩延迟值应在30-120分钟的范围内。需要进行测试以平衡写入进程与分析读取进程的需求。图\
    \ [12-10](#521866_1_En_12_Chapter.xhtml#Fig10) 展示了压缩延迟如何影响非聚集列存储索引上的事务查询和分析查询的数据流。\n\
    \n![](images/521866_1_En_12_Chapter/521866_1_En_12_Fig10_HTML.jpg)\n**图 12-10**\
    \ 具有压缩延迟的非聚集列存储索引上OLAP和OLTP查询的数据流\n\n此数据流的目标是让事务查询针对行存储索引和增量存储，而分析查询则针对列存储索引。压缩延迟有助于确保OLTP写入操作不会影响非聚集列存储索引中压缩行组的性能。预计OLTP读取操作会针对行存储索引，并且很少使用列存储索引。\n\
    \n使用相同的语法，压缩延迟也可以应用于聚集列存储索引。当数据加载过程满足以下任一条件时，这可能是一个极佳的解决方案：\n\n*   整体持续时间较长。\n\
    *   数据是“涓滴式”加载，而非批量加载。\n*   更新操作在数据初次插入后进行。\n*   主要是分析型的表在数据加载过程中需要处理OLTP查询。\n\
    \n清单 [12-6](#521866_1_En_12_Chapter.xhtml#PC6) 中的查询更改了 `WideWorldImportersDW`\
    \ 中的聚集列存储索引，将其压缩延迟设为60分钟。\n\n```sql\nALTER INDEX CCI_fact_sale_CCI ON Fact.Sale_CCI\n\
    SET (COMPRESSION_DELAY = 60 MINUTES);\n```\n**清单 12-6** 使用 `ALTER INDEX` 语句调整聚集列存储索引的压缩延迟\n\
    \n聚集列存储索引上60分钟的压缩延迟将提供一个60分钟的窗口期，在此期间数据加载过程可以自由地以任何方式插入数据，然后根据需要进行更新或删除。由于数据驻留在增量存储中，额外的更新和删除操作不会影响压缩行组，因此消除了数据加载过程引入的碎片。此外，还可以避免因\
    \ `UPDATE` 查询而导致的性能下降。60分钟窗口期结束后，数据将开始被插入到列存储索引中。假设数据加载过程已完成对该数据的修改，那么数据将被插入一次，然后以其原始的压缩状态保持不变。\n\
    \n可以通过查询 `sys.indexes` 来检索数据库中列存储索引的压缩延迟设置，如清单 [12-7](#521866_1_En_12_Chapter.xhtml#PC7)\
    \ 所示。\n\n```sql\nSELECT\n    tables.name AS table_name,\n    indexes.name AS index_name,\n\
    \    indexes.type_desc AS index_type,\n    indexes.compression_delay\nFROM sys.indexes\n\
    INNER JOIN sys.tables\n    ON tables.object_id = indexes.object_id\nWHERE indexes.type_desc\
    \ IN ('NONCLUSTERED COLUMNSTORE', 'CLUSTERED COLUMNSTORE');\n```\n**清单 12-7**\
    \ 返回索引压缩延迟信息的查询\n\n`compression_delay` 列提供一个数字（以分钟为单位），表示该索引当前的压缩延迟设置。零表示该索引未使用压缩延迟。请注意，该查询仅筛选列存储索引。其他索引类型在\
    \ `compression_delay` 列中将为 `NULL`，因为除了列存储索引外，此选项不适用于任何其他索引类型。\n\n图 [12-11](#521866_1_En_12_Chapter.xhtml#Fig11)\
    \ 显示了此查询的结果以及数据库中每个列存储索引的压缩延迟。\n\n![](images/521866_1_En_12_Chapter/521866_1_En_12_Fig11_HTML.jpg)\n\
    **图 12-11** 数据库中每个列存储索引的压缩延迟\n\n第4行（已圈出）显示了被清单 [12-6](#521866_1_En_12_Chapter.xhtml#PC6)\
    \ 中的查询修改的索引，并确认了压缩延迟设置为60分钟。\n\n由于删除行导致的碎片可以通过被删除行的百分比来量化，使用清单 [12-8](#521866_1_En_12_Chapter.xhtml#PC8)\
    \ 所示的查询。\n\n```sql\nSELECT\n    objects.name,\n    partitions.partition_number,\n\
    \    dm_db_column_store_row_group_physical_stats.row_group_id,\n    dm_db_column_store_row_group_physical_stats.total_rows,\n\
    \    dm_db_column_store_row_group_physical_stats.deleted_rows,\n    CAST(100 *\
    \ CAST(deleted_rows AS DECIMAL(18,2)) / CAST(total_rows AS DECIMAL(18,2)) AS DECIMAL(18,2))\
    \ AS percent_deleted\nFROM sys.dm_db_column_store_row_group_physical_stats\nINNER\
    \ JOIN sys.objects\n    ON objects.object_id = dm_db_column_store_row_group_physical_stats.object_id\n\
    INNER JOIN sys.partitions\n    ON partitions.object_id = objects.object_id\n \
    \   AND partitions.partition_number = dm_db_column_store_row_group_physical_stats.partition_number\n\
    \    AND partitions.index_id = dm_db_column_store_row_group_physical_stats.index_id\n\
    WHERE objects.name = 'Sale_CCI'\nORDER BY dm_db_column_store_row_group_physical_stats.row_group_id;\n\
    ```\n**清单 12-8** 返回因删除操作导致的索引碎片的查询\n\n此查询专门针对单个表（`Sale_CCI`）并返回每个行组的总行数、已删除行数和删除百分比，如图\
    \ [12-12](#521866_1_En_12_Chapter.xhtml#Fig12) 所见。\n\n![](images/521866_1_En_12_Chapter/521866_1_En_12_Fig12_HTML.jpg)\n\
    **图 12-12** 列存储索引中因删除行导致的碎片"
  raw: 'The compression delay may be adjusted on an existing index, if needed, without
    the need for a rebuild. For example, if it is determined that data is hot for
    30 minutes, rather than 10, an ALTER INDEX statement can adjust the compression
    delay accordingly, as seen in Listing [12-5](#521866_1_En_12_Chapter.xhtml#PC5).


    ```

    ALTER INDEX NCCI_Orders ON Sales.Orders

    SET (COMPRESSION_DELAY = 30 MINUTES);

    Listing 12-5

    Using an ALTER INDEX Statement to Adjust Compression Delay

    ```


    Configuring compression delay is a balance between avoiding excessive writes against
    compressed rowgroups while ensuring that the delta store does not become so large
    that it adversely affects analytics. Ideally, rowstore indexes will service the
    transactional queries that operate on hot data, whereas the columnstore index
    handles analytic queries against larger volumes of data (that is mostly warm or
    cold).


    Testing is necessary when determining the ideal value for compression delay, but
    the following is a set of guidelines to assist in finding a good starting point:


    1.  Measure new rows inserted over time. Ideally, the delta store would contain
    no more than a few rowgroups worth of data (a few million or less) that are not
    used heavily for analytics.


    2.  Measure update and delete operations and the period of time in which they
    most frequently occur. Try to set the compression delay to encompass that period
    of time.


    3.  If analytics do not target new data, then a higher compression delay is acceptable.
    Otherwise, it may need to be lowered to avoid frequent scans of the delta store.


    4.  If data load processes modify data heavily as part of insert operations, ensure
    that the compression delay period is long enough to encompass a typical data load.
    Alternatively, modify the data load process to use staging/temporary tables to
    modify data prior to its final insertion.


    Compression delay can be a large or small number. If a transactional table has
    1,000 new rows inserted per hour and those rows are heavily modified for 6 hours,
    then a compression delay of 360 minutes would be perfectly acceptable. In that
    scenario, the delta store would contain an average of 6,000 rows, which is small
    enough that scanning it would not be painful.


    Alternatively, if a table has 2,000,000 rows inserted per hour, then compression
    delay would need to be more restrictive. If data in that table is hot for 2 hours,
    then an ideal compression delay value would be somewhere in the range of 30–120
    minutes. Testing would be required to balance the needs of write processes vs.
    those of analytic read processes. The diagram in Figure [12-10](#521866_1_En_12_Chapter.xhtml#Fig10)
    shows how compression delay impacts the flow of data for transactional and analytic
    queries with a nonclustered columnstore index.


    ![](images/521866_1_En_12_Chapter/521866_1_En_12_Fig10_HTML.jpg)


    Figure 12-10


    Data flow for OLAP and OLTP queries against a nonclustered columnstore index with
    compression delay


    The goal represented in this data flow is for transactional queries to target
    the rowstore indexes and the delta store, whereas analytic queries target the
    columnstore index. Compression delay helps to ensure that OLTP writes are not
    impacting the performance of the compressed rowgroups within the nonclustered
    columnstore index. OLTP reads would be expected to target the rowstore indexes
    and would rarely make use of the columnstore index.


    Compression delay can be applied to clustered columnstore indexes as well using
    the same syntax. This can be an excellent solution when data load processes fulfill
    one of these criteria:


    *   They have an overall long duration.


    *   Data is trickle loaded, rather than bulk loaded.


    *   Updates target data after it is initially inserted.


    *   A primarily analytic table is subject to OLTP queries as part of the data
    load process.


    The query in Listing [12-6](#521866_1_En_12_Chapter.xhtml#PC6) alters the clustered
    columnstore index in *WideWorldImportersDW* to have a 60 minute compression delay.


    ```

    ALTER INDEX CCI_fact_sale_CCI ON Fact.Sale_CCI

    SET (COMPRESSION_DELAY = 60 MINUTES);

    Listing 12-6

    Using an ALTER INDEX Statement to Adjust Compression Delay on a Clustered Columnstore
    Index

    ```


    A 60 minute compression delay on a clustered columnstore index would provide a
    60 minute window in which a data load process could freely insert data in any
    fashion, and then update or delete from it if needed. Since the data resides in
    the delta store, the additional updates and deletes would not impact compressed
    rowgroups, therefore removing the introduction of fragmentation by the data load
    process. In addition, poor performance stemming from UPDATE queries would be avoided.
    After the 60 minute period has passed, the data would begin to be inserted into
    the columnstore index. Assuming the data load process has completed its data modifications
    against that data, then it would be inserted once and then left alone in its pristine
    compressed state.


    The compression delay settings for columnstore indexes in a database can be retrieved
    using a query against *sys.indexes*, as shown in Listing [12-7](#521866_1_En_12_Chapter.xhtml#PC7).


    ```

    SELECT

    tables.name AS table_name,

    indexes.name AS index_name,

    indexes.type_desc AS index_type,

    indexes.compression_delay

    FROM sys.indexes

    INNER JOIN sys.tables

    ON tables.object_id = indexes.object_id

    WHERE indexes.type_desc IN (''NONCLUSTERED COLUMNSTORE'', ''CLUSTERED COLUMNSTORE'');

    Listing 12-7

    Query to Return Index Compression Delay Information

    ```


    The column *compression_delay* provides a number (in minutes) indicating the current
    compression delay setting for that index. Zero indicates that no compression delay
    is used for an index. Note that the query filters exclusively on columnstore indexes.
    Other index types will have NULL entered for compression delay as it is not an
    option for any other index types aside from columnstore indexes.


    Figure [12-11](#521866_1_En_12_Chapter.xhtml#Fig11) shows the results of this
    query and the compression delay for each columnstore index in the database.


    ![](images/521866_1_En_12_Chapter/521866_1_En_12_Fig11_HTML.jpg)


    Figure 12-11


    Compression delay for each columnstore index in a database


    Row 4 (circled) shows the index that was altered by the query in Listing [12-6](#521866_1_En_12_Chapter.xhtml#PC6)
    and confirms the compression delay setting of 60 minutes.


    Fragmentation due to rows being deleted can be quantified using the percentage
    of rows being deleted, using the query shown in Listing [12-8](#521866_1_En_12_Chapter.xhtml#PC8).


    ```

    SELECT

    objects.name,

    partitions.partition_number,

    dm_db_column_store_row_group_physical_stats.row_group_id,

    dm_db_column_store_row_group_physical_stats.total_rows,

    dm_db_column_store_row_group_physical_stats.deleted_rows,

    CAST(100 * CAST(deleted_rows AS DECIMAL(18,2)) / CAST(total_rows AS DECIMAL(18,2))
    AS DECIMAL(18,2)) AS percent_deleted

    FROM sys.dm_db_column_store_row_group_physical_stats

    INNER JOIN sys.objects

    ON objects.object_id = dm_db_column_store_row_group_physical_stats.object_id

    INNER JOIN sys.partitions

    ON partitions.object_id = objects.object_id

    AND partitions.partition_number = dm_db_column_store_row_group_physical_stats.partition_number

    AND partitions.index_id = dm_db_column_store_row_group_physical_stats.index_id

    WHERE objects.name = ''Sale_CCI''

    ORDER BY dm_db_column_store_row_group_physical_stats.row_group_id;

    Listing 12-8

    Query to Return Index Fragmentation Due to Delete Operations

    ```


    This query specifically targets a single table (*Sale_CCI*) and returns the total
    rows, deleted rows, and percent deleted per rowgroup, as seen in Figure [12-12](#521866_1_En_12_Chapter.xhtml#Fig12).


    ![](images/521866_1_En_12_Chapter/521866_1_En_12_Fig12_HTML.jpg)


    Figure 12-12


    Fragmentation due to deleted rows in a columnstore index'
