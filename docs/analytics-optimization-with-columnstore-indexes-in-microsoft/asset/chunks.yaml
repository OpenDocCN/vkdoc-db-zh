    **清单 11-11**

    用于分区切换操作的脚本，以创建暂存表


    请注意，暂存表是在与要切换的源数据相同的文件组上创建的。如果需要，可以使用与 *Fact.Sale_CCI_PARTITIONED* 相同的分区方案创建暂存表，这将允许在分区切换中指定分区号，而不必在表创建语句中显式提供文件组。语法是任意的，操作员可以根据实施方便性选择哪种方式更容易实现。

    '
- fmt: 'Once the staging table is created, a partition on the `2016` filegroup can
    be switched from the source table into the staging table using the script in Listing
    11-12.


    ```

    ALTER TABLE Fact.Sale_CCI_PARTITIONED SWITCH PARTITION 4 TO Fact.Sale_CCI_STAGING;

    Listing 11-12

    Script to Switch a Partition from a Partitioned Columnstore Index into a Staging
    Table

    ```


    The partition switch executes in milliseconds as it is a minimally logged DDL
    operation. The results can be measured by validating the row count in the staging
    table, as shown in Listing 11-13.


    ```

    SELECT COUNT(*) FROM Fact.Sale_CCI_STAGING;

    Listing 11-13

    Validating the Row Count in the Staging Table After the Partition Switch Operation
    Completes

    ```


    The results of the count operation are shown in Figure 11-10.


    ![](images/521866_1_En_11_Chapter/521866_1_En_11_Fig10_HTML.jpg)


    Figure 11-10

    Count of rows in the newly populated staging table


    The result of the count query shows that over 3 million rows were switched from
    `Fact.Sale_CCI_PARTITIONED` to the staging table. From here, data can be modified
    in the staging table as needed to resolve whatever the identified issues are.
    Once the data is cleaned up, it can be inserted back into the original columnstore
    index, ensuring that the resulting data is clean with no fragmentation. Listing
    11-14 shows a sample process for how this data modification could occur.


    ```

    UPDATE Sale_CCI_STAGING

    SET [Total Dry Items] = [Total Dry Items] + 1

    FROM Fact.Sale_CCI_STAGING;

    INSERT INTO Fact.Sale_CCI_PARTITIONED

    ([Sale Key], [City Key], [Customer Key], [Bill To Customer Key], [Stock Item Key],
    [Invoice Date Key], [Delivery Date Key], [Salesperson Key],

    [WWI Invoice ID], Description, Package, Quantity, [Unit Price], [Tax Rate], [Total
    Excluding Tax], [Tax Amount], Profit, [Total Including Tax],

    [Total Dry Items], [Total Chiller Items], [Lineage Key])

    SELECT

    [Sale Key], [City Key], [Customer Key], [Bill To Customer Key], [Stock Item Key],
    [Invoice Date Key], [Delivery Date Key], [Salesperson Key],

    [WWI Invoice ID], Description, Package, Quantity, [Unit Price], [Tax Rate], [Total
    Excluding Tax], [Tax Amount], Profit, [Total Including Tax],

    [Total Dry Items], [Total Chiller Items], [Lineage Key]

    FROM Fact.Sale_CCI_STAGING;

    DROP TABLE Fact.Sale_CCI_STAGING;

    Listing 11-14

    Example of Data Modification Using Staging Data. Data Is Moved Back into the Parent
    Table Using an INSERT Operation

    ```


    The update is an expensive operation, but by isolating it to a staging table,
    the contention of the operation will not impact the larger columnstore index.
    Once the update is complete, the data can be inserted back into the partitioned
    table and the staging table dropped.


    Alternatively, the `INSERT` operation can be replaced with another partition switch.
    The code in Listing 11-15 shows an alternative to the code in Listing 11-14.


    ```

    UPDATE Sale_CCI_STAGING

    SET [Total Dry Items] = [Total Dry Items] + 1

    FROM Fact.Sale_CCI_STAGING;

    ALTER TABLE Fact.Sale_CCI_STAGING SWITCH PARTITION 4 TO Fact.Sale_CCI_PARTITIONED;

    DROP TABLE Fact.Sale_CCI_STAGING;

    Listing 11-15

    Example of Data Modification Using Staging Data. Data Is Moved Back into the Parent
    Table Using Partition Switching

    ```


    This alternative code will be significantly faster as the partition switch is
    a speedy, minimally logged DDL operation, whereas the large `INSERT` in Listing
    11-14 needs to incur the cost of writing all of this data back to `Fact.Sale_CCI_Partitioned`.


    Partition switching is a versatile tool that can be used in a wide variety of
    data modification, archival, and deletion scenarios. Its use will vary between
    applications, but provides a fast way to shift data in and out of tables without
    the fragmentation and expense of a large write operation.


    ## Partitioning Guidelines


    While partitioning may sound like a win for any columnstore index, it should not
    be automatically implemented without research and foresight. Partitioning works
    well in larger tables, but does not provide value to small columnstore indexes.
    Therefore, capacity planning should be a step in the decision-making process to
    determine whether partitioning is a good fit or not for any given table.


    ### Partition and Rowgroup Sizing


    Because partitioning is applied to a table before rowgroups are created, partition
    boundaries will force rowgroups to be cut off. For example, if a nonpartitioned
    columnstore index contains 5,000,000 rows, those rows will likely reside in 5
    rowgroups. If a new version of that table were created and partitioned on a date
    column that evenly spanned 10 years, then the result would be 500,000 rows per
    partition.


    Rowgroups cannot span partitions, though. The new partitioned table would contain
    ten partitions, each of which consists of a single rowgroup. The result is a table
    with ten rowgroups instead of five.


    Generally speaking, partitioning is not appropriate for a columnstore index unless
    the table contains at least tens or hundreds of millions of rows. Equally important,
    partitions need to be large enough to facilitate the use of filled-up rowgroups.
    Therefore, the partition function and partition scheme need to ensure that each
    partition contains at least `2^(20)` (`1,048,576`) rows each. Undersized partitions
    will result in undersized rowgroups, which will lead to fragmentation over time.


    The larger a columnstore index, the more it will benefit from partitioning. Aligning
    partition boundaries to organizational needs can also help in determining how
    to implement partitioning on a columnstore index. If an organization archives
    a billion rows of data each quarter, then partitioning by quarter makes perfect
    sense. If instead, the archival is organized by year, then partitioning by year
    would be more relevant.


    ### Partition Column Choice


    The column chosen for the partition function should be the same column that the
    columnstore index is ordered by. Partitioning and rowgroup elimination work best
    when they operate on the same data sets and that can only be accomplished when
    they use the same sort criteria. Therefore, if a columnstore index is ordered
    by a particular date column, then partitioning should also be configured on that
    column. Partitioning by another column may result in worse performance as SQL
    Server needs to scan more rowgroups across more partitions to retrieve the data
    it needs.


    ### Storage Choice


    If data within a columnstore index is accessed differently, the data files used
    for the partitioned table can mirror that usage. If older data is rarely accessed
    and can tolerate more latency, then it can be moved onto slower/less expensive
    hardware. If newer data needs to be highly available with minimal latency, then
    it can be placed on faster and more expensive storage.


    As a result, a large table can be split up to save money. Every terabyte of data
    that lands on cheaper storage represents cost savings that can be easily quantified.
    While partitioning’s primary purpose is not to save money, the ability to shift
    workloads via the strategic placement of data files can achieve this without significant
    effort.


    When building a partitioned table, identify if the table has data that follows
    different usage patterns and assign data files based on that usage to slower or
    faster storage, when possible. If performance requirements change with time, data
    files can be moved between storage locations to ensure that `SLA`s are still met,
    even if data that was once rarely needed becomes critical to frequent analytic
    processes.'
