    Note that these features should only be disabled for testing purposes only and
    should not be turned off in a production environment unless there are exceptional
    and well-documented reasons to do so.


    Compatibility levels may also be adjusted for testing and demonstration purposes.
    This can help model the impact of an upgrade or to allow a SQL Server upgrade
    to functionally occur at a slower pace over time. By incrementally adjusting the
    compatibility level up by one level at a time from the original SQL Server version
    to the new version, risk can be isolated and mitigated in steps, rather than all
    at once. This process also provides a rollback mechanism, if needed, since compatibility
