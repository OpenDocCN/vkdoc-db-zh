    Figure 15-10


    Error due to a memory-optimized columnstore index containing more than 8060 bytes
    per row


    While this error message appears to provide a glimmer of hope that this table
    definition would work if it is executed on a version of SQL Server later than
    SQL Server 2014, the result is still failure. After some review, a table definition
    is crafted that accommodates these limitations and allows a table to (finally)
    be created, as seen in Listing [15-12](#521866_1_En_15_Chapter.xhtml#PC12).


    ```

    CREATE TABLE Sales.Orders_MOLTP

    (      OrderID INT NOT NULL CONSTRAINT PK_Orders_MOLTP PRIMARY KEY NONCLUSTERED
    HASH WITH (BUCKET_COUNT = 150000),

    CustomerID INT NOT NULL,

    SalespersonPersonID INT NOT NULL,

    PickedByPersonID INT NULL,

    ContactPersonID INT NOT NULL,

    BackorderOrderID INT NULL,

    OrderDate DATE NOT NULL,

    ExpectedDeliveryDate DATE NOT NULL,

    CustomerPurchaseOrderNumber NVARCHAR(20) NULL,

    IsUndersupplyBackordered BIT NOT NULL,

    Comments NVARCHAR(500) NULL,

    DeliveryInstructions NVARCHAR(250) NULL,

    InternalComments NVARCHAR(500) NULL,

    PickingCompletedWhen DATETIME2(7) NULL,

    LastEditedBy INT NOT NULL,

    LastEditedWhen DATETIME2(7) NOT NULL,

    INDEX CCI_Orders_MOLTP CLUSTERED COLUMNSTORE)

    WITH (MEMORY_OPTIMIZED = ON, DURABILITY = SCHEMA_AND_DATA);

    Listing 15-12

    Working Table Creation for a Memory-Optimized Columnstore Index

    ```


    Success! This table contains a handful of features that are not present on disk-based
    tables:


    *   Nonclustered hash index is used as the primary key.


    *   MEMORY_OPTIMIZED = ON.


    *   DURABILITY = SCHEMA_AND_DATA.


    The durability setting determines if this table’s data can be recovered when the
    server is restarted or if only the schema is persisted. SCHEMA_ONLY is significantly
    faster as there is no need to persist data to disk storage. In addition, startup
    is faster as no data needs to be loaded into the table for it to be available.
    SCHEMA_ONLY is typically used for tables that contain temporary data such as session,
    ETL, or transient information that is not needed again once processed. SCHEMA_ONLY
    does not support columnstore indexes, though, and therefore is out of scope for
    any further discussion here.


    Note that the columnstore index is labeled as a clustered columnstore index, but
    it is not truly a clustered index. The primary storage mechanism for a memory-optimized
    table is always the set of rows in memory. The columnstore index is an additional
    structure on top of the memory-optimized object that is also persisted to disk
    storage. These caveats incur quite a bit of overhead by SQL Server to maintain
    a columnstore index alongside a memory-optimized table.


    Also worthy of highlighting is the fact that this memory-optimized clustered columnstore
    index contains numerous wide columns that are not ideal for dictionary encoding.
    *CustomerPurchaseOrderNumber*, *Comments*, *DeliveryInstructions*, and *InternalComments*
    are string columns that are unlikely to be repetitive. Therefore, they are not
    likely to compress well and may cause dictionary pressure, resulting in undersized
    rowgroups and further reduction in columnstore efficiency. This is not a deal-breaker,
    but is essential to understand when considering implementing a memory-optimized
    columnstore index. Tables that are built primarily for OLTP workloads will often
    contain text data that is essential for transactional processing, but that may
    be suboptimal for analytics. One possibility that could resolve a situation like
    this would be to split the table into two, with the string columns and supporting
    data in one table and the numbers and metrics in the other. This would allow one
    to be given a memory-optimized columnstore index and the other to remain with
    its memory-optimized rowstore structure.


    Nonclustered columnstore indexes are not supported on memory-optimized tables,
    and therefore the option to choose which columns to include in the index is not
    available.


    With a memory-optimized columnstore index created, the script in Listing [15-13](#521866_1_En_15_Chapter.xhtml#PC13)
    can be executed to populate it with the same data as in the disk-based table *Sales.Orders*.


    ```

    INSERT INTO Sales.Orders_MOLTP

    (      OrderID, CustomerID, SalespersonPersonID, PickedByPersonID, ContactPersonID,
    BackorderOrderID, OrderDate, ExpectedDeliveryDate,

    CustomerPurchaseOrderNumber, IsUndersupplyBackordered, Comments, DeliveryInstructions,
    InternalComments, PickingCompletedWhen,

    LastEditedBy, LastEditedWhen)

    SELECT

    OrderID, CustomerID, SalespersonPersonID, PickedByPersonID, ContactPersonID, BackorderOrderID,
    OrderDate, ExpectedDeliveryDate,

    CustomerPurchaseOrderNumber, IsUndersupplyBackordered, Comments, DeliveryInstructions,
    InternalComments, PickingCompletedWhen,

    LastEditedBy, LastEditedWhen

    FROM Sales.Orders;

    Listing 15-13

    Script to Populate a Memory-Optimized Columnstore Index with Data

    ```


    With table creation and population complete, the sizes of the original *Sales.Orders*
    table can be compared to its memory-optimized counterpart. Note the index contents
    of each table:


    *Sales.Orders*:


    *   A one-column primary key index


    *   Four single-column indexes


    *   One four-column index


    *Sales.Orders_MOLTP*:


    *   A one-column primary key index


    *   A columnstore index (on all columns)


    ![](images/521866_1_En_15_Chapter/521866_1_En_15_Fig11_HTML.jpg)


    Figure 15-11


    Size comparison of a disk-based table vs. a memory-optimized table with a clustered
    columnstore index


    Note in Figure [15-11](#521866_1_En_15_Chapter.xhtml#Fig11) the significant size
    difference between the disk-based table (25MB) and the memory-optimized table
    (117MB). That is a hefty space penalty and underscores the fact that mapping a
    memory-optimized structure to a columnstore structure is even more complex an
    operation than mapping a nonclustered rowstore index to a clustered columnstore
    index. Before continuing, one additional memory-optimized table will be created,
    as shown in Listing [15-14](#521866_1_En_15_Chapter.xhtml#PC14).


    ```

    CREATE TABLE Sales.Orders_MOLTP_NO_CCI

    (      OrderID INT NOT NULL CONSTRAINT PK_Orders_MOLTP_NO_CCI PRIMARY KEY NONCLUSTERED
    HASH WITH (BUCKET_COUNT = 150000),

    CustomerID INT NOT NULL,

    SalespersonPersonID INT NOT NULL,

    PickedByPersonID INT NULL,

    ContactPersonID INT NOT NULL,

    BackorderOrderID INT NULL,

    OrderDate DATE NOT NULL INDEX IX_Orders_MOLTP_NO_CCI_OrderDate NONCLUSTERED,

    ExpectedDeliveryDate DATE NOT NULL,

    CustomerPurchaseOrderNumber NVARCHAR(20) NULL,

    IsUndersupplyBackordered BIT NOT NULL,

    Comments NVARCHAR(500) NULL,

    DeliveryInstructions NVARCHAR(250) NULL,

    InternalComments NVARCHAR(500) NULL,

    PickingCompletedWhen DATETIME2(7) NULL,

    LastEditedBy INT NOT NULL,

    LastEditedWhen DATETIME2(7) NOT NULL)

    WITH (MEMORY_OPTIMIZED = ON, DURABILITY = SCHEMA_AND_DATA);

    GO

    Listing 15-14

    Table Creation for a Memory-Optimized Table Without a Columnstore Index

    ```


    This table is identical to the previously created memory-optimized table, except
    that the columnstore index has been swapped out for a nonclustered index on *OrderDate*.
    The new table’s total size is 20MB, which is about one-sixth of the size of the
    columnstore table, representing a significant space savings.


    Consider a test analytic query that is executed against all three test tables,
    as shown in Listing [15-15](#521866_1_En_15_Chapter.xhtml#PC15).


    ```

    SELECT

    COUNT(*) AS OrderCount,

    COUNT(DISTINCT(CustomerID)) AS DistinctCustomerCount

    FROM Sales.Orders

    WHERE OrderDate >= ''1/1/2015''

    AND OrderDate = ''1/1/2015''

    AND OrderDate = ''1/1/2015''

    AND OrderDate < ''4/1/2015'';

    Listing 15-15

    Test Analytic Query Against Each Orders Table

    ```


    Results are returned from each query. The execution plans can be seen in Figure
    [15-12](#521866_1_En_15_Chapter.xhtml#Fig12).


    ![](images/521866_1_En_15_Chapter/521866_1_En_15_Fig12_HTML.jpg)


