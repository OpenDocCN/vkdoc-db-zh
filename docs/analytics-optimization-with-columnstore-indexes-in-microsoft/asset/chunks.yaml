  raw: '```

    CREATE TABLE #Sales_Temp_Data

    (      [Sale Key] BIGINT NOT NULL,

    [Customer Key] INT NOT NULL,

    [Invoice Date Key] DATE NOT NULL,

    Quantity INT NOT NULL,

    [Total Excluding Tax] DECIMAL(18,2) NOT NULL);

    INSERT INTO #Sales_Temp_Data

    ([Sale Key], [Customer Key], [Invoice Date Key], Quantity, [Total Excluding Tax])

    SELECT

    [Sale Key], [Customer Key], [Invoice Date Key], Quantity, [Total Excluding Tax]

    FROM Fact.Sale_CCI_PARTITIONED;

    CREATE CLUSTERED INDEX CI_Sales_Temp_Data ON #Sales_Temp_Data ([Sale Key]);

    CREATE NONCLUSTERED COLUMNSTORE INDEX NCCI_Sales_Temp_Data ON #Sales_Temp_Data
    ([Invoice Date Key], Quantity, [Total Excluding Tax]);

    Listing 15-7

    Illustrating the Use of Nonclustered Columnstore Indexes on Temporary Tables

    ```


    The syntax for nonclustered columnstore indexes is identical for temporary tables
    and permanent tables, and once created, they can be used in the same fashion.


    Note that columnstore indexes are not allowed on table variables. The T-SQL in
    Listing [15-8](#521866_1_En_15_Chapter.xhtml#PC8) shows an attempt to do so.


    ```

    DECLARE @Sales_Temp_Data TABLE

    (      [Sale Key] BIGINT NOT NULL,

    [Customer Key] INT NOT NULL,

    [Invoice Date Key] DATE NOT NULL,

    Quantity INT NOT NULL,

    [Total Excluding Tax] DECIMAL(18,2) NOT NULL);

    INSERT INTO @Sales_Temp_Data

    ([Sale Key], [Customer Key], [Invoice Date Key], Quantity, [Total Excluding Tax])

    SELECT

    [Sale Key], [Customer Key], [Invoice Date Key], Quantity, [Total Excluding Tax]

    FROM Fact.Sale_CCI_PARTITIONED;

    CREATE CLUSTERED COLUMNSTORE INDEX CCI_Sales_Temp_Data ON @Sales_Temp_Data;

    Listing 15-8

    A Script That Attempts to Add a Columnstore Index to a Table Variable

    ```


    This query won’t even compile and will immediately generate the error shown in
    Figure [15-7](#521866_1_En_15_Chapter.xhtml#Fig7) when parsed.


    ![](images/521866_1_En_15_Chapter/521866_1_En_15_Fig7_HTML.jpg)


    Figure 15-7


    Parsing error when trying to create a columnstore index on a table variable


    SQL Server provides the courtesy of raising an error during parsing, before the
    table variable is created and populated.


    Using columnstore indexes on temporary tables will not be a frequently applied
    use case, but specific processes that rely heavily on the crunching of temporary
    data may be able to use them effectively. Performance testing can be the ultimate
    test of whether this is a helpful solution or one that does not provide enough
    value to be of worth.


    ## Memory-Optimized Columnstore Indexes


    A common use case for columnstore indexes is real-time operational analytics.
    Nonclustered columnstore indexes provide the ability to execute analytic queries
    against OLTP/rowstore tables efficiently. By being able to choose the columns
    to index, the columnstore index can be used to target problematic OLAP queries
    in scenarios where analytics cannot easily be off-loaded to other systems.


    Memory-optimized tables are the ultimate in OLTP solutions. They provide exceptional
    speed for heavily transactional workloads while eliminating the latching and locking
    that typically accompanies contentious workloads. They can be targeted with columnstore
    indexes, too, allowing analytics to be run against highly transactional tables
    in memory. This is a niche use-case that can provide exceptional speeds for a
    select few scenarios that will be discussed in this section.


    ### Demonstrating Memory-Optimized Columnstore Indexes


    Before diving into columnstore index queries, it is important to configure a database
    with the necessary filegroup, file, and snapshot isolation setting needed to allow
    memory-optimized tables to be created. Listing [15-9](#521866_1_En_15_Chapter.xhtml#PC9)
    provides the necessary configuration changes to allow memory-optimized tables
    in SQL Server.


    ```

    ALTER DATABASE WideWorldImporters ADD FILEGROUP WideWorldImporters_moltp CONTAINS
    MEMORY_OPTIMIZED_DATA;

    ALTER DATABASE WideWorldImporters ADD FILE (name=''WideWorldImporters_moltp'',
    filename=''C:\SQLData\WideWorldImporters_moltp'') TO FILEGROUP WideWorldImporters_moltp;

    ALTER DATABASE WideWorldImporters SET MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT = ON;

    Listing 15-9

    Enabling Memory-Optimized Tables in SQL Server

    ```


    Only one memory-optimized filegroup is allowed per database. If a database already
    has one, then trying to add another will result in an error like the one shown
    in Figure [15-8](#521866_1_En_15_Chapter.xhtml#Fig8).


    ![](images/521866_1_En_15_Chapter/521866_1_En_15_Fig8_HTML.jpg)


    Figure 15-8


    Error encountered when adding a memory-optimized filegroup to a database that
    already has one


    With these basic configuration steps complete, we can experiment with a memory-optimized
    table that contains a columnstore index. The script in Listing [15-10](#521866_1_En_15_Chapter.xhtml#PC10)
    shows the creation of an example table.


    ```

    CREATE TABLE Sales.Orders_MOLTP

    (      OrderID INT NOT NULL CONSTRAINT PK_Orders_MOLTP PRIMARY KEY NONCLUSTERED
    HASH WITH (BUCKET_COUNT = 150000),

    CustomerID INT NOT NULL,

    SalespersonPersonID INT NOT NULL,

    PickedByPersonID INT NULL,

    ContactPersonID INT NOT NULL,

    BackorderOrderID INT NULL,

    OrderDate DATE NOT NULL,

    ExpectedDeliveryDate DATE NOT NULL,

    CustomerPurchaseOrderNumber NVARCHAR(20) NULL,

    IsUndersupplyBackordered BIT NOT NULL,

    Comments NVARCHAR(MAX) NULL,

    DeliveryInstructions NVARCHAR(MAX) NULL,

    InternalComments NVARCHAR(MAX) NULL,

    PickingCompletedWhen DATETIME2(7) NULL,

    LastEditedBy INT NOT NULL,

    LastEditedWhen DATETIME2(7) NOT NULL,

    INDEX CCI_Orders_MOLTP CLUSTERED COLUMNSTORE)

    WITH (MEMORY_OPTIMIZED = ON, DURABILITY = SCHEMA_AND_DATA);

    Listing 15-10

    Initial (Imperfect) Creation of a Memory-Optimized Table with a Columnstore Index

    ```


    This definition appears valid, but when executed, an error is returned, as shown
    in Figure [15-9](#521866_1_En_15_Chapter.xhtml#Fig9).


    ![](images/521866_1_En_15_Chapter/521866_1_En_15_Fig9_HTML.jpg)


    Figure 15-9


    Error due to LOB columns included in memory-optimized columnstore index definition


    Columns of MAX length are not allowed in a memory-optimized columnstore index.
    To allow its creation, these columns need to be normalized into another table
    or shrunk to a smaller size. Listing [15-11](#521866_1_En_15_Chapter.xhtml#PC11)
    shows a revised script where the MAX length columns have been reduced in size
    to accommodate this limitation.


    ```

    CREATE TABLE Sales.Orders_MOLTP

    (      OrderID INT NOT NULL CONSTRAINT PK_Orders_MOLTP PRIMARY KEY NONCLUSTERED
    HASH WITH (BUCKET_COUNT = 150000),

    CustomerID INT NOT NULL,

    SalespersonPersonID INT NOT NULL,

    PickedByPersonID INT NULL,

    ContactPersonID INT NOT NULL,

    BackorderOrderID INT NULL,

    OrderDate DATE NOT NULL,

    ExpectedDeliveryDate DATE NOT NULL,

    CustomerPurchaseOrderNumber NVARCHAR(20) NULL,

    IsUndersupplyBackordered BIT NOT NULL,

    Comments NVARCHAR(2000) NULL,

    DeliveryInstructions NVARCHAR(2000) NULL,

    InternalComments NVARCHAR(2000) NULL,

    PickingCompletedWhen DATETIME2(7) NULL,

    LastEditedBy INT NOT NULL,

    LastEditedWhen DATETIME2(7) NOT NULL,

    INDEX CCI_Orders_MOLTP CLUSTERED COLUMNSTORE)

    WITH (MEMORY_OPTIMIZED = ON, DURABILITY = SCHEMA_AND_DATA);

    Listing 15-11

    Second (Imperfect) Creation of a Memory-Optimized Table with a Columnstore Index

    ```


    With the NVARCHAR(MAX) columns replaced with NVARCHAR(2000), the script is executed,
    resulting in a new error, as seen in Figure [15-10](#521866_1_En_15_Chapter.xhtml#Fig10).'
