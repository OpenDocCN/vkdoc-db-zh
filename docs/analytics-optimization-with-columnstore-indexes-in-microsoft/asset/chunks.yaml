- fmt: '## 无序数据的问题


    请注意，*min_data_id* 和 *max_data_id* 对于每个行组都是相同的。这意味着该列包含的数据是无序的。如果查询通常使用 `Invoice
    Date Key` 进行过滤，则需要扫描列存储索引中的所有行组，才能正确过滤出所需的行。随着列存储索引随时间增长，扫描所有行组的代价会变得非常高。即使在压缩良好的列存储索引上，查询也会变慢，并且服务不可过滤查询所需的
    IO 开销也会很高。


    `STATISTICS IO` 提供了有关列存储索引扫描期间读取的行组数量的有用指导。为了演示这一点，将使用清单 [10-6](#521866_1_En_10_Chapter.xhtml#PC6)
    中的查询。


    ```sql

    SELECT

    SUM([Quantity])

    FROM Fact.Sale_CCI

    WHERE [Invoice Date Key] >= ''1/1/2016''

    AND [Invoice Date Key] < ''2/1/2016'';

    -- Listing 10-6

    -- Query to Illustrate Rowgroup Reads in a Columnstore Index Scan

    ```


    这是一个典型的分析查询，用于计算给定月份的总销售数量。


    当扫描列存储索引时，`STATISTICS IO` 将在输出中包含一条消息，指示读取和跳过的段数。这是衡量必须扫描多少行组才能确定哪些行满足过滤条件、哪些可以自动跳过的指标。图
    [10-6](#521866_1_En_10_Chapter.xhtml#Fig6) 显示读取了 26 个段，跳过了 0 个。由于底层数据完全无序，SQL
    Server 无法使用列存储元数据来跳过任何行组。这代表了一个常见的现实世界挑战，但也是一个容易解决的问题。


    ![](images/521866_1_En_10_Chapter/521866_1_En_10_Fig6_HTML.jpg)

    *图 10-6 一个无序列存储索引扫描样本的 STATISTICS IO*


    ## 行组消除


    列存储元数据允许在查询过滤器不包含行组中存在的行时跳过行组。此过程称为行组消除，是优化列存储索引性能的关键。实现这一目标的最简单方法是按顺序对数据进行排序，并随时间推移维护该顺序。数据可以按一列或多列排序，这些列将代表分析查询中最常用的过滤器。排序
    OLAP 数据最常见的维度是时间。分析通常使用基于时间的单位（如小时、天、周、月、季度和年）来过滤、聚合和可视化数据。图 [10-7](#521866_1_En_10_Chapter.xhtml#Fig7)
    显示了行组消除对仅需要基于有序数据满足过滤条件的窄范围数据的查询的影响。


    ![](images/521866_1_En_10_Chapter/521866_1_En_10_Fig7_HTML.jpg)

    *图 10-7 行组消除对窄范围分析查询的影响*


    虽然这个假设索引包含六个行组，但只需其中一个即可满足查询的过滤条件。行组消除的强大之处在于它能随着列存储索引大小的增长而有效扩展。从包含一个月数据的表中请求一周窄范围分析数据的查询，与从包含十年数据的表中执行相同查询的性能是相似的。这是允许列存储索引即使在表中有数十亿行时也能有效扩展的主要特性。


    在清单 [10-6](#521866_1_En_10_Chapter.xhtml#PC6) 的示例中，一个简单的分析查询基于 `Invoice Date Key`
    进行过滤，但无序的列存储索引数据强制进行全表扫描以确定哪些行满足过滤条件。如果 `Invoice Date Key` 是分析此数据时最常用的过滤条件，那么按该列排序将允许有效的行组消除。


    ## 通过有序数据优化


    ```sql

    CREATE TABLE Fact.Sale_CCI_ORDERED

    (      [Sale Key] [bigint] NOT NULL,

    [City Key] [int] NOT NULL,

    [Customer Key] [int] NOT NULL,

    [Bill To Customer Key] [int] NOT NULL,

    [Stock Item Key] [int] NOT NULL,

    [Invoice Date Key] [date] NOT NULL,

    [Delivery Date Key] [date] NULL,

    [Salesperson Key] [int] NOT NULL,

    [WWI Invoice ID] [int] NOT NULL,

    [Description] [nvarchar](100) NOT NULL,

    [Package] [nvarchar](50) NOT NULL,

    [Quantity] [int] NOT NULL,

    [Unit Price] [decimal](18, 2) NOT NULL,

    [Tax Rate] [decimal](18, 3) NOT NULL,

    [Total Excluding Tax] [decimal](18, 2) NOT NULL,

    [Tax Amount] [decimal](18, 2) NOT NULL,

    [Profit] [decimal](18, 2) NOT NULL,

    [Total Including Tax] [decimal](18, 2) NOT NULL,

    [Total Dry Items] [int] NOT NULL,

    [Total Chiller Items] [int] NOT NULL,

    [Lineage Key] [int] NOT NULL);

    CREATE CLUSTERED INDEX CCI_fact_Sale_CCI_ORDERED ON Fact.Sale_CCI_ORDERED ([Invoice
    Date Key]);

    INSERT INTO Fact.Sale_CCI_ORDERED

    ([Sale Key], [City Key], [Customer Key], [Bill To Customer Key], [Stock Item Key],
    [Invoice Date Key], [Delivery Date Key],

    [Salesperson Key], [WWI Invoice ID], Description, Package, Quantity, [Unit Price],
    [Tax Rate],

    [Total Excluding Tax], [Tax Amount], Profit, [Total Including Tax], [Total Dry
    Items],

    [Total Chiller Items], [Lineage Key])

    SELECT

    Sale.[Sale Key], Sale.[City Key], Sale.[Customer Key], Sale.[Bill To Customer
    Key], Sale.[Stock Item Key], Sale.[Invoice Date Key], Sale.[Delivery Date Key],

    Sale.[Salesperson Key], Sale.[WWI Invoice ID], Sale.Description, Sale.Package,
    Sale.Quantity, Sale.[Unit Price], Sale.[Tax Rate],

    Sale.[Total Excluding Tax], Sale.[Tax Amount], Sale.Profit, Sale.[Total Including
    Tax], Sale.[Total Dry Items],

    Sale.[Total Chiller Items], Sale.[Lineage Key]

    FROM fact.Sale

    CROSS JOIN

    Dimension.City

    WHERE City.[City Key] >= 1 AND City.[City Key] <= 110;

    -- Create a clustered columnstore index on the table, removing the existing clustered
    rowstore index.

    CREATE CLUSTERED COLUMNSTORE INDEX CCI_fact_Sale_CCI_ORDERED ON Fact.Sale_CCI_ORDERED
    WITH (MAXDOP = 1, DROP_EXISTING = ON);

    GO

    -- Listing 10-7

    -- Query to Create a New Columnstore Index Ordered by Invoice Date Key

    ```


    请注意，清单 [10-7](#521866_1_En_10_Chapter.xhtml#PC7) 中创建的表的数据与本章前面演示的数据相同，但在分配列存储索引之前，先对其进行了聚集行存储索引处理。这个额外的步骤确保了初始数据集按
    `Invoice Date Key` 排序。`MAXDOP` 被有意设置为 1 以避免并行处理，因为并行线程可能以多个有序流而不是单个有序流的形式将数据插入列存储索引。


    展望未来，新的数据将通过标准数据加载过程定期插入此表。假设新数据包含 `Invoice Date Key` 的最新值，那么随着新数据的添加，列存储索引在未来将保持有序。


    ## 验证优化效果


    为了测试数据顺序对 `Fact.Sale_CCI_ORDERED` 的影响，将针对它执行清单 [10-6](#521866_1_En_10_Chapter.xhtml#PC6)
    中的查询，输出选项卡显示在图 [10-8](#521866_1_En_10_Chapter.xhtml#Fig8) 中。


    ![](images/521866_1_En_10_Chapter/521866_1_En_10_Fig8_HTML.jpg)

    *图 10-8 一个过滤后的列存储索引扫描样本的 STATISTICS IO*


    SQL Server 不再需要读取列存储索引中的每一个行组，而只需要读取其中两个，其余的都被跳过了。`STATISTICS IO` 中跳过的段表明行组消除正在成功实施。清单
    [10-5](#521866_1_En_10_Chapter.xhtml#PC5) 中的元数据查询也可以针对这个有序表重新运行，以说明数据顺序如何影响列存储元数据，结果如图
    [10-9](#521866_1_En_10_Chapter.xhtml#Fig9) 所示。


    ![](images/521866_1_En_10_Chapter/521866_1_En_10_Fig9_HTML.jpg)

    *图 10-9 有序列存储索引中 Invoice Date Key 列的元数据*'
  raw: 'Note that *min_data_id* and *max_data_id* are identical for each rowgroup.
    This means that the data contained for that column is unordered. If queries commonly
    filtered using *Invoice Date Key*, they would need to scan all rowgroups in the
    columnstore index in order to appropriately filter out the requested rows. As
    a columnstore index grows over time, the cost to scan all rowgroups will become
    burdensome. Even on a well-compressed columnstore index, queries will become slow,
    and the IO required to service an unfilterable query will be high.


    STATISTICS IO provides a useful guide to the number of rowgroups read as part
    of a columnstore index scan. To demonstrate this, the query in Listing [10-6](#521866_1_En_10_Chapter.xhtml#PC6)
    will be used.


    ```

    SELECT

    SUM([Quantity])

    FROM Fact.Sale_CCI

    WHERE [Invoice Date Key] >= ''1/1/2016''

    AND [Invoice Date Key] < ''2/1/2016'';

    Listing 10-6

    Query to Illustrate Rowgroup Reads in a Columnstore Index Scan

    ```


    This is a classic analytic query that calculates the total sales quantity for
    a given month.


    When a columnstore index is scanned, STATISTICS IO will include a message in the
    output that indicates how many segments were read and skipped. This is a measure
    of the number of rowgroups that had to be scanned to determine which rows met
    the filter criteria and which could be automatically skipped. Figure [10-6](#521866_1_En_10_Chapter.xhtml#Fig6)
    indicates that 26 segments were read and 0 were skipped. Because the underlying
    data is completely unordered, SQL Server cannot use columnstore metadata to skip
    any rowgroups. This represents a common real-world challenge, but one that is
    easy to solve.


    ![](images/521866_1_En_10_Chapter/521866_1_En_10_Fig6_HTML.jpg)


    Figure 10-6


    STATISTICS IO for a sample unordered columnstore index scan


    Columnstore metadata allows rowgroups to be skipped when query filters do not
    include rows present in them. This process is called rowgroup elimination and
    is key to optimizing columnstore index performance. The easiest way to achieve
    this is by ordering data and maintaining that order over time. Data may be ordered
    by one or more columns that will represent the most common filters used in analytic
    queries. The most common dimension to order OLAP data by is time. Analytics often
    filter, aggregate, and visualize data using time-based units, such as hours, days,
    weeks, months, quarters, and years. Figure [10-7](#521866_1_En_10_Chapter.xhtml#Fig7)
    shows the impact of rowgroup elimination on a query that requires only a narrow
    range of data based on filter criteria that honors ordered data.


    ![](images/521866_1_En_10_Chapter/521866_1_En_10_Fig7_HTML.jpg)


    Figure 10-7


    Impact of rowgroup elimination on a narrow analytic query


    While this hypothetical index contains six rowgroups, only a single one is required
    to satisfy the filter criteria of the query. The power of rowgroup elimination
    is that it scales effectively as a columnstore index grows in size. A query that
    requests a narrow week of analytic data from a table with a month of data will
    perform similarly to that same query against a table with 10 years of data. This
    is the primary feature that allows columnstore indexes to scale effectively, even
    when billions of rows are present in a table.


    In the example in Listing [10-6](#521866_1_En_10_Chapter.xhtml#PC6), a simple
    analytic query filtered on *Invoice Date Key*, but the unordered columnstore index
    data forced a full scan of the data to determine which rows met the filter criteria.
    If Invoice Date Key is the most common filter criteria for analysis of this data,
    then ordering by that column would allow for effective rowgroup elimination.


    ```

    CREATE TABLE Fact.Sale_CCI_ORDERED

    (      [Sale Key] [bigint] NOT NULL,

    [City Key] [int] NOT NULL,

    [Customer Key] [int] NOT NULL,

    [Bill To Customer Key] [int] NOT NULL,

    [Stock Item Key] [int] NOT NULL,

    [Invoice Date Key] [date] NOT NULL,

    [Delivery Date Key] [date] NULL,

    [Salesperson Key] [int] NOT NULL,

    [WWI Invoice ID] [int] NOT NULL,

    [Description] [nvarchar](100) NOT NULL,

    [Package] [nvarchar](50) NOT NULL,

    [Quantity] [int] NOT NULL,

    [Unit Price] [decimal](18, 2) NOT NULL,

    [Tax Rate] [decimal](18, 3) NOT NULL,

    [Total Excluding Tax] [decimal](18, 2) NOT NULL,

    [Tax Amount] [decimal](18, 2) NOT NULL,

    [Profit] [decimal](18, 2) NOT NULL,

    [Total Including Tax] [decimal](18, 2) NOT NULL,

    [Total Dry Items] [int] NOT NULL,

    [Total Chiller Items] [int] NOT NULL,

    [Lineage Key] [int] NOT NULL);

    CREATE CLUSTERED INDEX CCI_fact_Sale_CCI_ORDERED ON Fact.Sale_CCI_ORDERED ([Invoice
    Date Key]);

    INSERT INTO Fact.Sale_CCI_ORDERED

    ([Sale Key], [City Key], [Customer Key], [Bill To Customer Key], [Stock Item Key],
    [Invoice Date Key], [Delivery Date Key],

    [Salesperson Key], [WWI Invoice ID], Description, Package, Quantity, [Unit Price],
    [Tax Rate],

    [Total Excluding Tax], [Tax Amount], Profit, [Total Including Tax], [Total Dry
    Items],

    [Total Chiller Items], [Lineage Key])

    SELECT

    Sale.[Sale Key], Sale.[City Key], Sale.[Customer Key], Sale.[Bill To Customer
    Key], Sale.[Stock Item Key], Sale.[Invoice Date Key], Sale.[Delivery Date Key],

    Sale.[Salesperson Key], Sale.[WWI Invoice ID], Sale.Description, Sale.Package,
    Sale.Quantity, Sale.[Unit Price], Sale.[Tax Rate],

    Sale.[Total Excluding Tax], Sale.[Tax Amount], Sale.Profit, Sale.[Total Including
    Tax], Sale.[Total Dry Items],

    Sale.[Total Chiller Items], Sale.[Lineage Key]

    FROM fact.Sale

    CROSS JOIN

    Dimension.City

    WHERE City.[City Key] >= 1 AND City.[City Key] <= 110;

    -- Create a clustered columnstore index on the table, removing the existing clustered
    rowstore index.

    CREATE CLUSTERED COLUMNSTORE INDEX CCI_fact_Sale_CCI_ORDERED ON Fact.Sale_CCI_ORDERED
    WITH (MAXDOP = 1, DROP_EXISTING = ON);

    GO

    Listing 10-7

    Query to Create a New Columnstore Index Ordered by Invoice Date Key

    ```


    Note that the data in the table created in Listing [10-7](#521866_1_En_10_Chapter.xhtml#PC7)
    is identical to the data demonstrated earlier in this chapter, but has been subject
    to a clustered rowstore index prior to being given a columnstore index. This additional
    step ensures that the initial data set is ordered by *Invoice Date Key*. MAXDOP
    is intentionally set to 1 to avoid parallelism as parallel threads may risk inserting
    data into the columnstore index in multiple ordered streams rather than a single
    ordered stream.


    Going forward, new data would be regularly inserted into this table via standard
    data load processes. Assuming the new data contains the most recent values for
    *Invoice Date Key*, then the columnstore index will remain ordered in the future
    as new data is added to it.


    To test the impact of data order on *Fact.Sale_CCI_ORDERED*, the query from Listing [10-6](#521866_1_En_10_Chapter.xhtml#PC6)
    will be executed against it, with the output tab displayed in Figure [10-8](#521866_1_En_10_Chapter.xhtml#Fig8).


    ![](images/521866_1_En_10_Chapter/521866_1_En_10_Fig8_HTML.jpg)


    Figure 10-8


    STATISTICS IO for a sample filtered columnstore index scan


    Instead of reading every rowgroup in the columnstore index, SQL Server only needed
    to read two of them, with the remainder being skipped. Skipped segments in STATISTICS
    IO indicate that rowgroup elimination is being successfully implemented. The metadata
    query in Listing [10-5](#521866_1_En_10_Chapter.xhtml#PC5) can also be rerun against
    this ordered table to illustrate how data order impacts columnstore metadata,
    with the results being shown in Figure [10-9](#521866_1_En_10_Chapter.xhtml#Fig9).


    ![](images/521866_1_En_10_Chapter/521866_1_En_10_Fig9_HTML.jpg)


    Figure 10-9


    Metadata for the Invoice Date Key column of an ordered columnstore index'
  trans: '## 无序数据的问题


    请注意，*min_data_id* 和 *max_data_id* 对于每个行组都是相同的。这意味着该列包含的数据是无序的。如果查询通常使用 `Invoice
    Date Key` 进行过滤，则需要扫描列存储索引中的所有行组，才能正确过滤出所需的行。随着列存储索引随时间增长，扫描所有行组的代价会变得非常高。即使在压缩良好的列存储索引上，查询也会变慢，并且服务不可过滤查询所需的
    IO 开销也会很高。


    `STATISTICS IO` 提供了有关列存储索引扫描期间读取的行组数量的有用指导。为了演示这一点，将使用清单 10-6 中的查询。


    ```sql

    SELECT

    SUM([Quantity])

    FROM Fact.Sale_CCI

    WHERE [Invoice Date Key] >= ''1/1/2016''

    AND [Invoice Date Key] < ''2/1/2016'';

    -- Listing 10-6

    -- Query to Illustrate Rowgroup Reads in a Columnstore Index Scan

    ```


    这是一个典型的分析查询，用于计算给定月份的总销售数量。


    当扫描列存储索引时，`STATISTICS IO` 将在输出中包含一条消息，指示读取和跳过的段数。这是衡量必须扫描多少行组才能确定哪些行满足过滤条件、哪些可以自动跳过的指标。图
    10-6 显示读取了 26 个段，跳过了 0 个。由于底层数据完全无序，SQL Server 无法使用列存储元数据来跳过任何行组。这代表了一个常见的现实世界挑战，但也是一个容易解决的问题。


    ![](img/521866_1_En_10_Fig6_HTML.jpg)

    *图 10-6 一个无序列存储索引扫描样本的 STATISTICS IO*


    ## 行组消除


    列存储元数据允许在查询过滤器不包含行组中存在的行时跳过行组。此过程称为行组消除，是优化列存储索引性能的关键。实现这一目标的最简单方法是按顺序对数据进行排序，并随时间推移维护该顺序。数据可以按一列或多列排序，这些列将代表分析查询中最常用的过滤器。排序
    OLAP 数据最常见的维度是时间。分析通常使用基于时间的单位（如小时、天、周、月、季度和年）来过滤、聚合和可视化数据。图 10-7 显示了行组消除对仅需要基于有序数据满足过滤条件的窄范围数据的查询的影响。


    ![](img/521866_1_En_10_Fig7_HTML.jpg)

    *图 10-7 行组消除对窄范围分析查询的影响*


    虽然这个假设索引包含六个行组，但只需其中一个即可满足查询的过滤条件。行组消除的强大之处在于它能随着列存储索引大小的增长而有效扩展。从包含一个月数据的表中请求一周窄范围分析数据的查询，与从包含十年数据的表中执行相同查询的性能是相似的。这是允许列存储索引即使在表中有数十亿行时也能有效扩展的主要特性。


    在清单 10-6 的示例中，一个简单的分析查询基于 `Invoice Date Key` 进行过滤，但无序的列存储索引数据强制进行全表扫描以确定哪些行满足过滤条件。如果
    `Invoice Date Key` 是分析此数据时最常用的过滤条件，那么按该列排序将允许有效的行组消除。


    ## 通过有序数据优化


    ```sql

    CREATE TABLE Fact.Sale_CCI_ORDERED

    (      [Sale Key] [bigint] NOT NULL,

    [City Key] [int] NOT NULL,

    [Customer Key] [int] NOT NULL,

    [Bill To Customer Key] [int] NOT NULL,

    [Stock Item Key] [int] NOT NULL,

    [Invoice Date Key] [date] NOT NULL,

    [Delivery Date Key] [date] NULL,

    [Salesperson Key] [int] NOT NULL,

    [WWI Invoice ID] [int] NOT NULL,

    [Description] nvarchar NOT NULL,

    [Package] nvarchar NOT NULL,

    [Quantity] [int] NOT NULL,

    [Unit Price] decimal NOT NULL,

    [Tax Rate] decimal NOT NULL,

    [Total Excluding Tax] decimal NOT NULL,

    [Tax Amount] decimal NOT NULL,

    [Profit] decimal NOT NULL,

    [Total Including Tax] decimal NOT NULL,

    [Total Dry Items] [int] NOT NULL,

    [Total Chiller Items] [int] NOT NULL,

    [Lineage Key] [int] NOT NULL);

    CREATE CLUSTERED INDEX CCI_fact_Sale_CCI_ORDERED ON Fact.Sale_CCI_ORDERED ([Invoice
    Date Key]);

    INSERT INTO Fact.Sale_CCI_ORDERED

    ([Sale Key], [City Key], [Customer Key], [Bill To Customer Key], [Stock Item Key],
    [Invoice Date Key], [Delivery Date Key],

    [Salesperson Key], [WWI Invoice ID], Description, Package, Quantity, [Unit Price],
    [Tax Rate],

    [Total Excluding Tax], [Tax Amount], Profit, [Total Including Tax], [Total Dry
    Items],

    [Total Chiller Items], [Lineage Key])

    SELECT

    Sale.[Sale Key], Sale.[City Key], Sale.[Customer Key], Sale.[Bill To Customer
    Key], Sale.[Stock Item Key], Sale.[Invoice Date Key], Sale.[Delivery Date Key],

    Sale.[Salesperson Key], Sale.[WWI Invoice ID], Sale.Description, Sale.Package,
    Sale.Quantity, Sale.[Unit Price], Sale.[Tax Rate],

    Sale.[Total Excluding Tax], Sale.[Tax Amount], Sale.Profit, Sale.[Total Including
    Tax], Sale.[Total Dry Items],

    Sale.[Total Chiller Items], Sale.[Lineage Key]

    FROM fact.Sale

    CROSS JOIN

    Dimension.City

    WHERE City.[City Key] >= 1 AND City.[City Key] <= 110;

    -- Create a clustered columnstore index on the table, removing the existing clustered
    rowstore index.

    CREATE CLUSTERED COLUMNSTORE INDEX CCI_fact_Sale_CCI_ORDERED ON Fact.Sale_CCI_ORDERED
    WITH (MAXDOP = 1, DROP_EXISTING = ON);

    GO

    -- Listing 10-7

    -- Query to Create a New Columnstore Index Ordered by Invoice Date Key

    ```


    请注意，清单 10-7 中创建的表的数据与本章前面演示的数据相同，但在分配列存储索引之前，先对其进行了聚集行存储索引处理。这个额外的步骤确保了初始数据集按
    `Invoice Date Key` 排序。`MAXDOP` 被有意设置为 1 以避免并行处理，因为并行线程可能以多个有序流而不是单个有序流的形式将数据插入列存储索引。


    展望未来，新的数据将通过标准数据加载过程定期插入此表。假设新数据包含 `Invoice Date Key` 的最新值，那么随着新数据的添加，列存储索引在未来将保持有序。


    ## 验证优化效果


    为了测试数据顺序对 `Fact.Sale_CCI_ORDERED` 的影响，将针对它执行清单 10-6 中的查询，输出选项卡显示在图 10-8 中。


    ![](img/521866_1_En_10_Fig8_HTML.jpg)

    *图 10-8 一个过滤后的列存储索引扫描样本的 STATISTICS IO*


    SQL Server 不再需要读取列存储索引中的每一个行组，而只需要读取其中两个，其余的都被跳过了。`STATISTICS IO` 中跳过的段表明行组消除正在成功实施。清单
    10-5 中的元数据查询也可以针对这个有序表重新运行，以说明数据顺序如何影响列存储元数据，结果如图 10-9 所示。


    ![](img/521866_1_En_10_Fig9_HTML.jpg)

    *图 10-9 有序列存储索引中 Invoice Date Key 列的元数据*'
- fmt: '# 有序列存储索引的性能优势


    对于每一行组，`min_data_id` 和 `max_data_id` 的值与无序列存储索引相比发生了剧烈变化。这些值不再是每个行组内相同，而是随着数据从第一行组向后推进，从低值逐渐进展到高值。从实际角度看，假设一个查询需要数据ID为
    735270 的数据，那么它只需要读取与此`segment_id = 7`相关的行组。由于元数据表明其余段不包含此值，它们（及其关联的行组）可以自动跳过。


    ## 空间节省与压缩优势


    按键列对数据进行排序是启用行组消除的简单方法，从而减少查询资源消耗并提高任何能利用该数据顺序的查询速度。有效的数据顺序不仅能减少读取量，还可以通过提高底层数据的压缩率来节省存储空间。代码清单
    [10-8](#521866_1_En_10_Chapter.xhtml#PC8) 包含一个脚本，用于检索本章中提到的两个列存储索引所使用的数据空间。


    ```sql

    CREATE TABLE #storage_data

    (      table_name VARCHAR(MAX),

    rows_used BIGINT,

    reserved VARCHAR(50),

    data VARCHAR(50),

    index_size VARCHAR(50),

    unused VARCHAR(50));

    INSERT INTO #storage_data

    (table_name, rows_used, reserved, data, index_size, unused)

    EXEC sp_MSforeachtable "EXEC sp_spaceused ''?''";

    UPDATE #storage_data

    SET reserved = LEFT(reserved, LEN(reserved) - 3),

    data = LEFT(data, LEN(data) - 3),

    index_size = LEFT(index_size, LEN(index_size) - 3),

    unused = LEFT(unused, LEN(unused) - 3);

    SELECT

    table_name,

    rows_used,

    reserved / 1024 AS data_space_reserved_mb,

    data / 1024 AS data_space_used_mb,

    index_size / 1024 AS index_size_mb,

    unused AS free_space_kb,

    CAST(CAST(data AS DECIMAL(24,2)) / CAST(rows_used AS DECIMAL(24,2)) AS DECIMAL(24,4))
    AS kb_per_row

    FROM #storage_data

    WHERE rows_used > 0

    AND table_name IN (''Sale_CCI'', ''Sale_CCI_ORDERED'')

    ORDER BY CAST(reserved AS INT) DESC;

    DROP TABLE #storage_data;

    ```

    代码清单 10-8

    查询两个列存储索引使用的数据空间


    结果显示在图 [10-10](#521866_1_En_10_Chapter.xhtml#Fig10) 中。


    ![](images/521866_1_En_10_Chapter/521866_1_En_10_Fig10_HTML.jpg)


    图 10-10


    有序和无序列存储索引使用的空间


    每个表使用的数据空间差异显著，有序表消耗的空间不到无序表使用空间的 10%。这是一个异常生动的例子，展示了有序数据如何比无序数据存储得更高效。有序数据节省空间，通常是因为数据与短时间内捕获的其他数据更相似，而与相隔数年收集的数据相比则差异较大。在任何应用程序中，使用模式会随着时间而改变，因为新功能发布、旧功能废弃以及用户行为变化。因此，随着时间推移，数据样本会变得越来越不同。这些相似性使得压缩算法能够利用具有较少不同值的公共维度的数据集。这也减少了字典大小，有助于防止字典被填满并强制创建过小的行组。


    现实世界的数据压缩效果可能不如这里的示例那么令人印象深刻，但预计会有明显的节省，这将对数据加载过程和分析速度产生积极影响。重要的是要记住，节省存储空间也节省了内存，因为数据在应用程序需要之前会保持压缩状态。因此，如果一个有序数据集的大小减少了
    25%，那么缓冲池中由列存储索引页面消耗的内存也将减少 25%。此外，服务器性能的其他常见衡量指标，如页面预期寿命和闩锁，也会得到改善，因为较小的对象可以更快地检索，并且与较大的对象相比，对内存中其他数据的影响更小。


    ## 更新和删除操作的性能改进


    有序列存储索引还通过允许`UPDATE`和`DELETE`操作针对更少的页面来提高其速度。例如，考虑对有序和无序销售表的查询，如代码清单 [10-9](#521866_1_En_10_Chapter.xhtml#PC9)
    所示。


    ```sql

    SELECT COUNT(*) AS row_count FROM Fact.Sale_CCI WHERE [Invoice Date Key] = ''1/1/2015'';

    SELECT COUNT(*) AS row_count FROM Fact.Sale_CCI_ORDERED WHERE [Invoice Date Key]
    = ''1/1/2015'';

    ```

    代码清单 10-9

    查询两个列存储索引表的样本行数


    结果显示在图 [10-11](#521866_1_En_10_Chapter.xhtml#Fig11) 中，每个表中受影响的行数是相同的。


    ![](images/521866_1_En_10_Chapter/521866_1_En_10_Fig11_HTML.jpg)


    图 10-11


    针对有序和无序列存储索引的样本查询的行数


    对于每个表，使用相同过滤器的更新将影响 33,110 行。代码清单 [10-10](#521866_1_En_10_Chapter.xhtml#PC10)
    提供了针对每个表的一个简单`UPDATE`语句。


    ```sql

    UPDATE Sale_CCI

    SET [Total Dry Items] = [Total Dry Items] - 1,

    [Total Chiller Items] = [Total Chiller Items] + 1

    FROM Fact.Sale_CCI_ORDERED -- Unordered

    WHERE [Invoice Date Key] = ''1/1/2015'';

    UPDATE Sale_CCI

    SET [Total Dry Items] = [Total Dry Items] - 1,

    [Total Chiller Items] = [Total Chiller Items] + 1

    FROM Fact.Sale_CCI_ORDERED -- Ordered

    WHERE [Invoice Date Key] = ''1/1/2015'';

    ```

    代码清单 10-10

    在两个列存储索引表中更新 33,110 行的查询


    图 [10-12](#521866_1_En_10_Chapter.xhtml#Fig12) 中的结果显示了每个`UPDATE`操作产生的 IO 和行组使用情况。


    ![](images/521866_1_En_10_Chapter/521866_1_En_10_Fig12_HTML.jpg)


    图 10-12


    针对有序和无序列存储索引的更新的 STATISTICS IO 输出


    请注意 IO 以及每个操作的段读取量的巨大差异。由于一个`UPDATE`包含一个`DELETE`和一个`INSERT`，SQL Server 必须执行以下任务来完成每个更新：


    1.  定位所有符合过滤条件的行。

    2.  读取所有符合过滤条件的行的所有列。

    3.  在删除位图中将这些行标记为已删除。

    4.  将这些行的新版本插入到增量存储中。


    为了插入更新行的新版本，SQL Server 需要完整读取现有行，这不是一个简单的操作。一旦读取，这些行将被标记为已删除，新版本将被插入到增量存储中。这是一个昂贵的过程，但有序数据允许读取的行组少得多，从而减少了为插入到增量存储而准备必要数据所需的工作。


    `DELETE`操作也得到了类似的改进，但需要的工作量要少得多，因为它们只需要：


    1.  定位所有符合过滤条件的行。

    2.  在删除位图中将这些行标记为已删除。


    对于这两种情况，当过滤条件符合表中使用的顺序时，有序列存储索引将极大地提高`UPDATE`和`DELETE`性能。作为额外的好处，有序列存储索引将导致更少的碎片。删除操作可以被隔离到更少的行组中，而不是在大多数（或所有）行组中将行标记为已删除。'
  raw: 'The values of *min_data_id* and *max_data_id* for each rowgroup show a drastic
    change from that of an unordered columnstore index. Instead of the values being
    the same for each rowgroup, they progress from low values to high values as data
    progresses from the first rowgroup to the latter ones. To put this in perspective,
    if a hypothetical query required data for a data ID of 735270, it would only need
    to read the rowgroups associated with *segment_id* = 7 from this list of segments.
    Since the metadata indicates that the remaining segments do not contain this value,
    they (and their associated rowgroups) can automatically be skipped.


    Ordering data by a key column is an easy way to enable rowgroup elimination, thereby
    reducing query resource consumption and improving the speed of any queries that
    can make use of that data order. Effective data order doesn’t just reduce reads,
    but it can also save on storage space by improving the compression ratios of the
    underlying data. Listing [10-8](#521866_1_En_10_Chapter.xhtml#PC8) contains a
    script that will retrieve the data space used by the two columnstore indexes featured
    in this chapter.


    ```

    CREATE TABLE #storage_data

    (      table_name VARCHAR(MAX),

    rows_used BIGINT,

    reserved VARCHAR(50),

    data VARCHAR(50),

    index_size VARCHAR(50),

    unused VARCHAR(50));

    INSERT INTO #storage_data

    (table_name, rows_used, reserved, data, index_size, unused)

    EXEC sp_MSforeachtable "EXEC sp_spaceused ''?''";

    UPDATE #storage_data

    SET reserved = LEFT(reserved, LEN(reserved) - 3),

    data = LEFT(data, LEN(data) - 3),

    index_size = LEFT(index_size, LEN(index_size) - 3),

    unused = LEFT(unused, LEN(unused) - 3);

    SELECT

    table_name,

    rows_used,

    reserved / 1024 AS data_space_reserved_mb,

    data / 1024 AS data_space_used_mb,

    index_size / 1024 AS index_size_mb,

    unused AS free_space_kb,

    CAST(CAST(data AS DECIMAL(24,2)) / CAST(rows_used AS DECIMAL(24,2)) AS DECIMAL(24,4))
    AS kb_per_row

    FROM #storage_data

    WHERE rows_used > 0

    AND table_name IN (''Sale_CCI'', ''Sale_CCI_ORDERED'')

    ORDER BY CAST(reserved AS INT) DESC;

    DROP TABLE #storage_data;

    Listing 10-8

    Query to Retrieve Data Space Used for Two Columnstore Indexes

    ```


    The results are shown in Figure [10-10](#521866_1_En_10_Chapter.xhtml#Fig10).


    ![](images/521866_1_En_10_Chapter/521866_1_En_10_Fig10_HTML.jpg)


    Figure 10-10


    Space used by an ordered and unordered columnstore index


    The data space used for each table is dramatically different, with the ordered
    table consuming less than 10% of the space that the unordered table uses. This
    is an exceptionally dramatic example of how ordered data can be stored more efficiently
    than unordered data. Ordered data saves space because, typically, data is more
    similar to other data captured within a short timeframe of it than when compared
    to data that was collected years apart. Within any application, usage patterns
    change over time as new features are released, old features are retired, and user
    behavior changes. Because of this, data samples will look more and more different
    as time passes between them. These similarities translate into compression algorithms
    being able to take advantage of a data set with less distinct values for common
    dimensions. This also reduces dictionary size, which also helps to prevent dictionaries
    from filling up and forcing the creation of undersized rowgroups.


    Real-world data may not compress as impressively as the sample here, but expect
    nontrivial savings that will have a positive impact on data load processes and
    on analytics speeds. It is important to remember that saving storage space also
    saves memory as data remains compressed until needed by an application. Therefore,
    if an ordered data set were to decrease in size by 25%, that would result in 25%
    less memory being consumed in the buffer pool by columnstore index pages. Furthermore,
    other common measures of server performance such as page life expectancy and latching
    would improve as smaller objects can be retrieved more quickly and will impact
    other data in memory less than larger objects.


    An ordered columnstore index also improves UPDATE and DELETE speeds by allowing
    those operations to target less pages. For example, consider the queries on the
    ordered and unordered sales tables shown in Listing [10-9](#521866_1_En_10_Chapter.xhtml#PC9).


    ```

    SELECT COUNT(*) AS row_count FROM Fact.Sale_CCI WHERE [Invoice Date Key] = ''1/1/2015'';

    SELECT COUNT(*) AS row_count FROM Fact.Sale_CCI_ORDERED WHERE [Invoice Date Key]
    = ''1/1/2015'';

    Listing 10-9

    Query to Display Sample Row Counts for Two Columnstore Indexed Tables

    ```


    The results show that in each table, the count of rows affected is identical,
    as seen in Figure [10-11](#521866_1_En_10_Chapter.xhtml#Fig11).


    ![](images/521866_1_En_10_Chapter/521866_1_En_10_Fig11_HTML.jpg)


    Figure 10-11


    Row counts for a sample query against ordered and unordered columnstore indexes


    For each table, 33,110 rows would be affected by an update using the same filter.
    Listing [10-10](#521866_1_En_10_Chapter.xhtml#PC10) provides a simple UPDATE statement
    against each table.


    ```

    UPDATE Sale_CCI

    SET [Total Dry Items] = [Total Dry Items] - 1,

    [Total Chiller Items] = [Total Chiller Items] + 1

    FROM Fact.Sale_CCI_ORDERED -- Unordered

    WHERE [Invoice Date Key] = ''1/1/2015'';

    UPDATE Sale_CCI

    SET [Total Dry Items] = [Total Dry Items] - 1,

    [Total Chiller Items] = [Total Chiller Items] + 1

    FROM Fact.Sale_CCI_ORDERED -- Ordered

    WHERE [Invoice Date Key] = ''1/1/2015'';

    Listing 10-10

    Query to Update 33,110 Rows in Two Columnstore Indexed Tables

    ```


    The results in Figure [10-12](#521866_1_En_10_Chapter.xhtml#Fig12) show the resulting
    IO and rowgroup usage for each UPDATE operation.


    ![](images/521866_1_En_10_Chapter/521866_1_En_10_Fig12_HTML.jpg)


    Figure 10-12


    STATISTICS IO output for updates against an ordered and unordered columnstore
    index


    Note the dramatic difference in IO, as well as segment reads for each operation.
    Because an UPDATE consists of both a DELETE and an INSERT, SQL Server had to perform
    the following tasks to complete each update:


    1.  Locate all rows matching the filter criteria.


    2.  Read all columns for all rows matching the filter criteria.


    3.  Mark these rows as deleted in the delete bitmap.


    4.  Insert new versions of these rows into the delta store.


    In order to insert new versions of the updated rows, SQL Server needs to read
    the existing rows in their entirety, which is not a trivial operation. Once read,
    those rows are marked as deleted and the new versions are inserted into the delta
    store. This is an expensive process, but ordered data allows for far fewer rowgroups
    to be read, thereby reducing the work needed to set up the necessary data for
    the insert into the delta store.


    DELETE operations are improved similarly, but require far less work as they simply
    need to


    1.  Locate all rows matching the filter criteria.


    2.  Mark these rows as deleted in the delete bitmap.


    For both cases, an ordered columnstore index will immensely improve UPDATE and
    DELETE performance when the filter criteria honors the order used in the table.
    As an added bonus, an ordered columnstore index will allow for DELETE and UPDATE
    operations that cause less fragmentation. Instead of flagging rows as deleted
    in most (or all) rowgroups, the deletes can be isolated to a smaller number of
    rowgroups.'
  trans: '

    # 有序列存储索引的性能优势


    对于每一个行组，`min_data_id` 和 `max_data_id` 的值相较于无序列存储索引发生了剧烈变化。这些值不再在每个行组内保持相同，而是随着数据从第一行组向后推进，从低值逐渐进展到高值。从实际角度看，假设一个查询需要数据
    ID 为 735270 的数据，那么它只需要读取与此`segment_id = 7`相关的行组。由于元数据表明其余段不包含此值，它们（及其关联的行组）可以被自动跳过。


    ## **空间节省与压缩优势**


    按键列对数据进行排序是启用行组消除的简单方法，从而减少查询资源消耗并提高任何能利用该数据顺序的查询速度。有效的数据顺序不仅能减少读取量，还可以通过提高底层数据的压缩率来节省存储空间。代码清单
    10-8 包含一个脚本，用于检索本章中提到的两个列存储索引所使用的数据空间。


    ```sql

    CREATE TABLE #storage_data

    (      table_name VARCHAR(MAX),

    rows_used BIGINT,

    reserved VARCHAR(50),

    data VARCHAR(50),

    index_size VARCHAR(50),

    unused VARCHAR(50));

    INSERT INTO #storage_data

    (table_name, rows_used, reserved, data, index_size, unused)

    EXEC sp_MSforeachtable "EXEC sp_spaceused ''?''";

    UPDATE #storage_data

    SET reserved = LEFT(reserved, LEN(reserved) - 3),

    data = LEFT(data, LEN(data) - 3),

    index_size = LEFT(index_size, LEN(index_size) - 3),

    unused = LEFT(unused, LEN(unused) - 3);

    SELECT

    table_name,

    rows_used,

    reserved / 1024 AS data_space_reserved_mb,

    data / 1024 AS data_space_used_mb,

    index_size / 1024 AS index_size_mb,

    unused AS free_space_kb,

    CAST(CAST(data AS DECIMAL(24,2)) / CAST(rows_used AS DECIMAL(24,2)) AS DECIMAL(24,4))
    AS kb_per_row

    FROM #storage_data

    WHERE rows_used > 0

    AND table_name IN (''Sale_CCI'', ''Sale_CCI_ORDERED'')

    ORDER BY CAST(reserved AS INT) DESC;

    DROP TABLE #storage_data;

    ```

    代码清单 10-8

    查询两个列存储索引使用的数据空间


    结果显示在图 10-10 中。


    ![](img/521866_1_En_10_Fig10_HTML.jpg)


    图 10-10


    有序和无序列存储索引使用的空间


    每个表使用的数据空间差异显著，有序表消耗的空间不到无序表使用空间的 10%。这是一个异常生动的例子，展示了有序数据如何比无序数据存储得更高效。有序数据节省空间，通常是因为数据与短时间内捕获的其他数据更相似，而与相隔数年收集的数据相比则差异较大。在任何应用程序中，使用模式会随着时间而改变，因为新功能发布、旧功能废弃以及用户行为变化。因此，随着时间推移，数据样本会变得越来越不同。这些相似性使得压缩算法能够利用具有较少不同值的公共维度的数据集。这也减少了字典大小，有助于防止字典被填满并强制创建过小的行组。


    现实世界的数据压缩效果可能不如这里的示例那么令人印象深刻，但预计会有明显的节省，这将对数据加载过程和分析速度产生积极影响。重要的是要记住，节省存储空间也节省了内存，因为数据在应用程序需要之前会保持压缩状态。因此，如果一个有序数据集的大小减少了
    25%，那么缓冲池中由列存储索引页面消耗的内存也将减少 25%。此外，服务器性能的其他常见衡量指标，如页面预期寿命和闩锁，也会得到改善，因为较小的对象可以更快地检索，并且与较大的对象相比，对内存中其他数据的影响更小。


    ## 更新和删除操作的性能改进


    有序列存储索引还通过允许`UPDATE`和`DELETE`操作针对更少的页面来提高其速度。例如，考虑对有序和无序销售表的查询，如代码清单 10-9 所示。


    ```sql

    SELECT COUNT(*) AS row_count FROM Fact.Sale_CCI WHERE [Invoice Date Key] = ''1/1/2015'';

    SELECT COUNT(*) AS row_count FROM Fact.Sale_CCI_ORDERED WHERE [Invoice Date Key]
    = ''1/1/2015'';

    ```

    代码清单 10-9

    查询两个列存储索引表的样本行数


    结果显示在图 10-11 中，每个表中受影响的行数是相同的。


    ![](img/521866_1_En_10_Fig11_HTML.jpg)


    图 10-11


    针对有序和无序列存储索引的样本查询的行数


    对于每个表，使用相同过滤器的更新将影响 33,110 行。代码清单 10-10 提供了针对每个表的一个简单`UPDATE`语句。


    ```sql

    UPDATE Sale_CCI

    SET [Total Dry Items] = [Total Dry Items] - 1,

    [Total Chiller Items] = [Total Chiller Items] + 1

    FROM Fact.Sale_CCI_ORDERED -- Unordered

    WHERE [Invoice Date Key] = ''1/1/2015'';

    UPDATE Sale_CCI

    SET [Total Dry Items] = [Total Dry Items] - 1,

    [Total Chiller Items] = [Total Chiller Items] + 1

    FROM Fact.Sale_CCI_ORDERED -- Ordered

    WHERE [Invoice Date Key] = ''1/1/2015'';

    ```

    代码清单 10-10

    在两个列存储索引表中更新 33,110 行的查询


    图 10-12 中的结果显示了每个`UPDATE`操作产生的 IO 和行组使用情况。


    ![](img/521866_1_En_10_Fig12_HTML.jpg)


    图 10-12


    针对有序和无序列存储索引的更新的 STATISTICS IO 输出


    请注意 IO 以及每个操作的段读取量的巨大差异。由于一个`UPDATE`包含一个`DELETE`和一个`INSERT`，SQL Server 必须执行以下任务来完成每个更新：


    1.  定位所有符合过滤条件的行。

    2.  读取所有符合过滤条件的行的所有列。

    3.  在删除位图中将这些行标记为已删除。

    4.  将这些行的新版本插入到增量存储中。


    为了插入更新行的新版本，SQL Server 需要完整读取现有行，这不是一个简单的操作。一旦读取，这些行将被标记为已删除，新版本将被插入到增量存储中。这是一个昂贵的过程，但有序数据允许读取的行组少得多，从而减少了为插入到增量存储而准备必要数据所需的工作。


    `DELETE`操作也得到了类似的改进，但需要的工作量要少得多，因为它们只需要：


    1.  定位所有符合过滤条件的行。

    2.  在删除位图中将这些行标记为已删除。


    对于这两种情况，当过滤条件符合表中使用的顺序时，有序列存储索引将极大地提高`UPDATE`和`DELETE`性能。作为额外的好处，有序列存储索引将导致更少的碎片。删除操作可以被隔离到更少的行组中，而不是在大多数（或所有）行组中将行标记为已删除。

    '
- fmt: '# 11. Partitioning


    ## Combining Segment and Rowgroup Elimination


    Segment elimination allows analytics that use less columns to automatically require
    less segments to be read, thereby reducing IO. Rowgroup elimination allows an
    ordered data set to facilitate analytic queries to use columnstore metadata to
    remove vast swaths of rowgroups from the result set, reducing IO significantly.


    Optimal analytic workloads combine segment and rowgroup elimination to slice a
    table both vertically (rowgroup elimination) and horizontally (segment elimination).
    Consider the columnstore index introduced previously in Figure [10-1](#521866_1_En_10_Chapter.xhtml#Fig1).
    If an analytic query were designed to only query for columns A and B and to also
    filter for a narrow date range, the resulting rowgroup reads would look similar
    to the results in Figure [10-13](#521866_1_En_10_Chapter.xhtml#Fig13).


    ![](images/521866_1_En_10_Chapter/521866_1_En_10_Fig13_HTML.jpg)


    Figure 10-13: Impact of segment and rowgroup elimination on a columnstore index


    Only querying for columns A and B allows columns C–H to be automatically skipped
    and all segments for those columns eliminated (36 segments in total). Querying
    for a narrow date range that only requires rows in rowgroup 4 allows rowgroups
    1–3 and 5–6 to also be automatically skipped, eliminating another 10 segments.
    The result is a query that required only 2 out of the possible 48 segments in
    the table!


    Combining segment and rowgroup elimination allows columnstore index queries to
    scale effectively, even as data grows larger or as more columns are added to the
    table.


    As an analytic table grows in size, it becomes apparent that newer data is read
    far more often than older data. While columnstore metadata and rowgroup elimination
    provide the ability to quickly filter out large amounts of columnstore index data,
    managing a table with millions or billions of rows can become cumbersome.


    Equally important is the fact that older data tends to not change often. For a
    typical fact table, data is added onto the end of it in the order it is created,
    whereas older data remains untouched. If older data is modified, it is usually
    the result of software releases, upgrades, or other processes that fall squarely
    into the world of the data architect (that’s us!) to manage.


    Table partitioning is a natural fit for a clustered columnstore index, especially
    if it is large. Partitioning allows data to be split into multiple filegroups
    within a single database. These filegroups can be stored in different data files
    that reside in whatever locations are ideal for the data contained within them.
    The beauty of partitioning is that the table is logically unchanged, with its
    physical structure being influenced by the details of how it partitioned. This
    means that application code does not need to change in order to benefit from it.
    There are many benefits to partitioning, each of which is described in this chapter.


    ## Maintain Hot/Warm/Cold Data


    If older data is used far less often, then it can be stored in separate files
    that reside on slower storage. For example, reporting data from 10 years ago that
    is maintained for posterity but rarely used can be placed on inexpensive NAS storage,
    whereas new data can go on speedy SSD or flash storage.


    The details will vary depending on the organization, but Figure [11-1](#521866_1_En_11_Chapter.xhtml#Fig1)
    provides a simple representation of how an analytic table could be tiered to take
    advantage of different service levels.


    ![](images/521866_1_En_11_Chapter/521866_1_En_11_Fig1_HTML.jpg)


    Figure 11-1: How partitioning can influence storage speed and cost


    Partitioning allows storage to be tiered based on expected SLAs (service-level
    agreements). For partitions containing new data that is expected to be highly
    available and have low latency, fast and expensive storage can be used. For partitions
    containing older data that is rarely accessed, slower and cheaper storage can
    be used. The details are up to an organization, but the ability to efficiently
    divide up a large table automatically into different storage tiers is exceptionally
    useful and can save significant money in the long run.


    ## Faster Data Movement/Migration


    Having data divided up physically means that it can be copied and moved with ease.
    For example, consider a columnstore index with 50 billion rows that consumes 1TB
    of storage. If there was a need to migrate this table from its current server
    to a new server with minimal downtime, how would it be done? The simplest solutions
    involve database backups, copying data files, or using ETL to move the data slowly
    from one server to the other. All of these options work, but would be time-consuming
    and would involve the need to incur some downtime or make the table read-only
    once the data movement process starts.


    Partitioning allows older/unchanging data to reside in separate data files, which
    in turn means that those files can be freely backed up/copied to the new server
    ahead of time. Assuming nothing changes within them, that process can occur days,
    weeks, or months prior to the migration. ETL or similar processes could be used
    on the day of the migration to catch up the target database with new data prior
    to permanently cutting over from the old data source to the new one.


    Figure [11-2](#521866_1_En_11_Chapter.xhtml#Fig2) illustrates the difference between
    migrating a large/monolithic table vs. a partitioned one.


    ![](images/521866_1_En_11_Chapter/521866_1_En_11_Fig2_HTML.jpg)


    Figure 11-2: Migration of a partitioned table vs. a nonpartitioned table


    Partitioning opens up the ability to subdivide the migration logically knowing
    that the physical storage of the table will facilitate the ability to copy/move
    each file one by one when needed. Instead of having to move a terabyte of data
    all at once or being forced to write ETL against the entire table, the table can
    be subdivided into smaller pieces, each of which is smaller and easier to move.


    ## Partition Elimination


    The logical definitions for each partition are not solely used for storage purposes.
    They also assist the query optimizer and allow it to automatically skip data when
    the filter in a query aligns with the partition function. For a query against
    a columnstore index, its filter can allow the metadata for rowgroups outside of
    the target partition to be ignored.


    For example, if a columnstore index contains data ranging from 2010 through 2021
    and is partitioned by year (with a single partition per year), then a query requesting
    rows from January 2021 would be able to automatically skip all rowgroups in partitions
    prior to 2021. Figure [11-3](#521866_1_En_11_Chapter.xhtml#Fig3) shows how partition
    elimination can reduce reads and further speed up queries against columnstore
    indexes.


    ![](images/521866_1_En_11_Chapter/521866_1_En_11_Fig3_HTML.jpg)


    Figure 11-3: Reading metadata in a partitioned columnstore index


    Partition functions are evaluated prior to columnstore metadata; therefore, data
    in irrelevant partitions is ignored when a query is executed. While columnstore
    metadata may be relatively lightweight, being able to skip the metadata for thousands
    of rowgroups can further improve analytic performance while reducing IO and memory
    consumption.'
