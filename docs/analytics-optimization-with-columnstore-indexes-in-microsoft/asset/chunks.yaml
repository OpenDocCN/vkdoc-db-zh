  trans: '### Object_type_desc


    这是驻留在内存中的列存储对象类型。它将是以下值之一：


    - `COLUMN_SEGMENT`：每一行此类型代表一个单独的列存储段。这些条目将包含一个 `column_id` 值，以便返回有关该段所属列的更多详细信息。


    - `PRIMARY_DICTIONARY`、`SECONDARY_DICTIONARY` 和 `BULKINSERT_DICTIONARY`：这些代表用于基于字典编码的段的字典。通常，字典及其对应的列段所占用的空间将小于使用基于值的编码存储列时所占用的空间。


    - `DELETE_BITMAP`：这代表由删除位图对象消耗的内存。对于列存储索引中跨越一个分区上所有行组的每个分区，始终会有一个删除位图。每个行组的条目指示与该特定行组相关的删除位图部分的粒度详细信息。即使其中没有指示被删除的行，这些对象也作为容器存在。


    ### Access_count


    这是对内存中此对象的所有读写操作的计数。这粗略衡量了该对象被使用的程度，以及内存中哪些对象被频繁使用，哪些被很少使用。


    由于此视图检查驻留在内存中的对象，数据是瞬态的，并且仅在对象驻留于内存期间保留历史记录。因此，访问计数仅是自 `object_load_time` 所给时间以来累计的。


    ### Object_load_time


    这是此对象被读入内存对象池的时间。结合 `access_count`，可以计算单位时间内的读或写操作次数，这对于衡量特定对象在内存中的使用量可能很有用。


    `dm_column_store_object_pool` 中提供的数据也可以进行聚合，以便可以测量给定行组、列、索引或对象类型的总内存消耗量。例如，清单
    6-7 中的查询量化了每个行组消耗的内存。


    ```sql

    SELECT

    databases.name,

    objects.name,

    indexes.name,

    dm_column_store_object_pool.row_group_id,

    SUM(dm_column_store_object_pool.access_count) AS access_count,

    SUM(dm_column_store_object_pool.memory_used_in_bytes) AS memory_used_in_bytes

    FROM sys.dm_column_store_object_pool

    INNER JOIN sys.objects

    ON objects.object_id = dm_column_store_object_pool.object_id

    INNER JOIN sys.indexes

    ON indexes.object_id = dm_column_store_object_pool.object_id

    AND indexes.index_id = dm_column_store_object_pool.index_id

    INNER JOIN sys.databases

    ON databases.database_id = dm_column_store_object_pool.database_id

    LEFT JOIN sys.columns

    ON columns.column_id = dm_column_store_object_pool.column_id

    AND columns.object_id = dm_column_store_object_pool.object_id

    WHERE objects.name = ''Sale_CCI''

    AND databases.name = DB_NAME()

    GROUP BY databases.name, objects.name, indexes.name, dm_column_store_object_pool.row_group_id

    ORDER BY dm_column_store_object_pool.row_group_id;

    ```

    **清单 6-7** 按行组分列的列存储内存消耗


    图 6-6 显示了结果。


    ![图 6-6](img/521866_1_En_6_Fig6_HTML.jpg)


    **图 6-6** 按行组分组的内存消耗


    根据索引、其元数据及其使用情况，某些行组可能比其它行组消耗显著更多的内存。在图 6-6 的示例结果中，内存使用量在每个行组上相对均匀，表明查询正在从每个行组均匀读取数据。


    ### Internal Columnstore Index Objects


    还有一个视图提供了有关列存储索引结构的内部详细信息，即 `sys.internal_partitions`。清单 6-8 中的查询返回与列存储索引中行组关联的任何内部分区的详细信息。


    ```sql

    SELECT

    tables.name AS table_name,

    indexes.name AS index_name,

    partitions.partition_number,

    column_store_row_groups.row_group_id,

    column_store_row_groups.state_description,

    column_store_row_groups.total_rows,

    column_store_row_groups.size_in_bytes,

    column_store_row_groups.deleted_rows,

    internal_partitions.internal_object_type_desc,

    internal_partitions.rows,

    internal_partitions.data_compression_desc

    FROM sys.column_store_row_groups

    INNER JOIN sys.indexes

    ON indexes.index_id = column_store_row_groups.index_id

    AND indexes.object_id = column_store_row_groups.object_id

    INNER JOIN sys.tables

    ON tables.object_id = indexes.object_id

    INNER JOIN sys.partitions

    ON partitions.partition_number = column_store_row_groups.partition_number

    AND partitions.index_id = indexes.index_id

    AND partitions.object_id = tables.object_id

    LEFT JOIN sys.internal_partitions

    ON internal_partitions.object_id = tables.object_id

    WHERE tables.name = ''Sale_CCI''

    ORDER BY indexes.index_id, column_store_row_groups.row_group_id;

    ```

    **清单 6-8** 与列存储索引关联的内部分区


    此查询的结果至少为每个分区中的每个行组提供一行，具体取决于内容。图 6-7 包含此输出的样本。


    ![图 6-7](img/521866_1_En_6_Fig7_HTML.jpg)


    **图 6-7** 内部列存储索引对象示例


    显示的内部列存储对象说明了已删除行和增量存储内容的存在。`deleted_rows` 列包含每个行组的单独计数，而 `rows` 列包含汇总的详细信息。


    以下是结果集中每个新列的简短说明，以及如何使用它来跟踪列存储索引的增长和使用情况。'
- fmt: '## Internal_object_type_desc


    This indicates what type of internal object is referenced, and may be one of the
    following values:


    *   `COLUMN_STORE_DELETE_BITMAP`: This is the portion of the delete bitmap associated
    with each rowgroup in the columnstore index. The value in the `rows` column indicates
    how many deleted rows are accounted for in this portion of the delete bitmap,
    if any. Delete bitmaps are stored in rowstore b-tree structures. Each rowgroup
    will have a delete bitmap associated with it, even if the row count indicated
    as deleted is zero.


    *   `COLUMN_STORE_DELTA_STORE`: This represents delta rowgroups that are not yet
    in compressed segments within the columnstore index. These entries in the view
    will not exist unless a delta rowgroup exists for that rowgroup. Delta rowgroups
    within the delta store are stored in rowstore b-tree structures.


    *   `COLUMN_STORE_DELETE_BUFFER`: This object is exclusive to nonclustered columnstore
    indexes and buffers deleted rows from the clustered rowstore index into the nonclustered
    columnstore delete bitmap. The movement of deleted row data from the buffer into
    the delete bitmap is managed via the tuple mover and can be forced via an index
    reorganize command. This buffer helps improve delete speeds on OLTP tables where
    update and delete operations may be frequent, therefore helping to improve write
    speeds to the nonclustered columnstore index. When data is read from the nonclustered
    columnstore index, both the delete buffer and delete bitmap are read in tandem
    to produce a complete picture of deleted rows in the index. This internal object
    will not exist in `sys.internal_partitions` unless a nonclustered columnstore
    index exists on a table.


    *   `COLUMN_STORE_MAPPING_INDEX`: This is used when a clustered columnstore index
    also has a nonclustered rowstore index present on it. This mapping index is used
    to link nonclustered index key columns back to the correct rows within each rowgroup
    in the clustered columnstore index. The mapping index is only used when rows move
    between rowgroups, such as when a delta store rowgroup is moved into a compressed
    rowgroup or when the tuple mover merges rowgroups together. This internal object
    will not display in `sys.internal_partitions` unless these conditions are met
    and rows are present in the object.


    # 7. Batch Execution


    Processing of rows in SQL Server is traditionally managed one row at a time. For
    transactional workloads, this is a sensible convention, as row counts for read
    and write operations are typically small.


    Analytic queries that routinely operate on thousands or millions of rows do not
    benefit from reading rows in this fashion. Batch mode execution is a SQL Server
    execution mode that allows groups of rows to be read and passed between execution
    plan operators, ultimately improving performance.


    As a query is executed and each operator is processed, rows are passed between
    those operators in quantities determined by the execution mode. In row mode, each
    row is passed from operator to operator sequentially. In batch mode, groups of
    rows are passed between operators. The result of this convention is that in batch
    mode, control is passed between operators less often as rows can be handed off
    in fewer batches.


    ## Row Mode Execution


    Queries with a low estimated cardinality will typically use row mode execution.
    In row mode execution, rows are read one by one as they are passed through each
    operator in an execution plan. This sounds inefficient, but it is important to
    note that processing rows in batches incurs overhead to do so. Therefore, SQL
    Server will make decisions at runtime to determine if a query would be more efficiently
    processed in row mode or batch mode.


    Consider the query in Listing 7-1.


    ```sql

    SELECT

    Employee,

    [WWI Employee ID],

    [Preferred Name],

    [Is Salesperson]

    FROM Dimension.Employee

    WHERE [Employee Key] = 17;

    ```

    Listing 7-1: Transactional Query Returning a Single Row


    The result of this query is a single row, as it seeks a single ID value by the
    primary key in the table. Turning on the actual execution plan, the details for
    the clustered index seek can be viewed, as seen in Figure 7-1.


    ![](images/521866_1_En_7_Chapter/521866_1_En_7_Fig1_HTML.jpg)

    Figure 7-1: Execution plan with details displayed


    Note the execution modes provided in the query operator details. Row mode is indicated
    for both the estimated and actual execution modes. Given that the underlying table
    is a rowstore table and that the query only returns a single row, execution via
    row mode is expected for this operation.


    While columnstore indexes are optimized for analytic queries that operate against
    large row counts and will usually take advantage of batch mode processing, row
    mode can be chosen as the execution mode if the optimizer believes that is the
    most efficient option.


    The query in Listing 7-2 shows a narrow query executed against a columnstore indexed
    table that also happens to have a nonclustered rowstore primary key.


    ```sql

    SELECT

    *

    FROM fact.Sale

    WHERE [Invoice Date Key] = ''1/1/2016''

    AND [Sale Key] = 198840;

    ```

    Listing 7-2: Query That Uses Row Mode Execution Against a Columnstore Index


    This query returns a single row against a clustered columnstore index in which
    row mode was used, as shown in Figure 7-2.


    ![](images/521866_1_En_7_Chapter/521866_1_En_7_Fig2_HTML.jpg)

    Figure 7-2: Execution plan with row mode execution against a columnstore index


    While the execution plan operator indicates it is using columnstore storage, the
    optimizer chooses row mode as the execution mode. This should not be seen as unusual
    or suboptimal. Because the query only returns a single row, the use of row mode
    is optimized for that expected outcome, even if the table is stored in a clustered
    columnstore index.'
