    and is partitioned by year (with a single partition per year), then a query requesting
    rows from January 2021 would be able to automatically skip all rowgroups in partitions
    prior to 2021\. Figure [11-3](#521866_1_En_11_Chapter.xhtml#Fig3) shows how partition
    elimination can reduce reads and further speed up queries against columnstore
    indexes.


    ![](images/521866_1_En_11_Chapter/521866_1_En_11_Fig3_HTML.jpg)


    Figure 11-3


    Reading metadata in a partitioned columnstore index


    Partition functions are evaluated prior to columnstore metadata; therefore, data
    in irrelevant partitions is ignored when a query is executed. While columnstore
    metadata may be relatively lightweight, being able to skip the metadata for thousands
    of rowgroups can further improve analytic performance while reducing IO and memory
    consumption.'
  trans: '

    # 11. 分区


    ## 结合段消除与行组消除


    段消除允许使用较少列的分析自动读取更少的段，从而减少 IO。行组消除则使有序数据集能够利用列存储元数据，从结果集中移除大量行组，显著降低 IO。


    最佳分析工作负载结合了段消除和行组消除，对表进行垂直（行组消除）和水平（段消除）切片。回顾前面图 10-1 中介绍的列存储索引。如果一个分析查询设计为仅查询列
    A 和 B，并筛选一个狭窄的日期范围，其产生的行组读取结果将类似于图 10-13。


    ![](img/521866_1_En_10_Fig13_HTML.jpg)


    图 10-13：段消除和行组消除对列存储索引的影响


    仅查询列 A 和 B 允许自动跳过列 C 到 H，并消除这些列的所有段（总共 36 个段）。查询一个仅需要行组 4 中行的狭窄日期范围，则可以自动跳过行组
    1 到 3 以及 5 到 6，再消除 10 个段。最终结果是，一个查询只需要读取表中 48 个可能段中的 2 个！


    结合段消除和行组消除，即使数据量增长或表中添加了更多列，列存储索引查询也能有效扩展。


    随着分析表大小的增长，可以明显看出新数据的读取频率远高于旧数据。虽然列存储元数据和行组消除提供了快速过滤大量列存储索引数据的能力，但管理拥有数百万或数十亿行的表可能会变得笨重。


    同样重要的是，旧数据往往不经常更改。对于一个典型的事实表，数据按其创建顺序添加到末尾，而旧数据保持不变。如果旧数据被修改，通常是由于软件发布、升级或其他属于数据架构师（也就是我们！）管理范畴的流程导致的。


    表分区是聚集列存储索引的自然选择，尤其是当它很大时。分区允许将数据拆分到单个数据库内的多个文件组中。这些文件组可以存储在不同的数据文件中，这些文件又可以存放在对其所包含数据最理想的位置。分区的优点在于表在逻辑上保持不变，其物理结构受其分区方式的细节影响。这意味着应用程序代码无需更改即可从中受益。分区有许多好处，本章将逐一描述。


    ## 维护热/温/冷数据


    如果旧数据使用频率低得多，那么可以将其存储在速度较慢的存储介质上的独立文件中。例如，为历史保存但很少使用的、来自 10 年前的报告数据可以放在廉价的 NAS
    存储上，而新数据则可以放在高速的 SSD 或闪存存储上。


    具体细节会因组织而异，但图 11-1 提供了一个简单的表示，说明分析表如何分层以利用不同的服务级别。


    ![](img/521866_1_En_11_Fig1_HTML.jpg)


    图 11-1：分区如何影响存储速度和成本


    分区允许基于预期的 SLA（服务水平协议）对存储进行分层。对于包含预期高可用和低延迟的新数据分区，可以使用快速且昂贵的存储。对于包含很少访问的旧数据分区，则可以使用较慢且更便宜的存储。具体细节取决于组织，但能够自动将大表高效划分为不同存储层的能力非常有用，从长远来看可以节省大量成本。


    ## 更快的数据移动/迁移


    数据在物理上分开存储意味着可以轻松复制和移动。例如，考虑一个消耗 1TB 存储空间、包含 500 亿行的列存储索引。如果需要以最小停机时间将此表从当前服务器迁移到新服务器，该如何操作？最简单的解决方案涉及数据库备份、复制数据文件，或使用
    ETL 缓慢地将数据从一台服务器移动到另一台。所有这些方案都可行，但耗时，并且在数据移动过程开始后，需要承受一些停机时间或使表变为只读。


    分区允许旧的/不变的数据驻留在独立的数据文件中，这反过来意味着这些文件可以提前自由备份/复制到新服务器。假设其中内容没有变化，该过程可以在迁移前几天、几周或几个月前进行。在迁移当天，可以使用
    ETL 或类似流程来更新目标数据库中的新数据，然后才永久地从旧数据源切换到新数据源。


    图 11-2 说明了迁移一个大型/单体表与迁移一个分区表之间的区别。


    ![](img/521866_1_En_11_Fig2_HTML.jpg)


    图 11-2：分区表与非分区表的迁移


    分区开辟了对迁移进行逻辑细分的能力，因为知道表的物理存储将在需要时促进逐个复制/移动每个文件。无需一次性移动 terabytes 的数据，也无需被迫针对整个表编写
    ETL，表可以被划分为更小的部分，每个部分都更小且更易于移动。


    ## 分区消除


    每个分区的逻辑定义并非仅用于存储目的。它们还协助查询优化器，当查询中的筛选器与分区函数对齐时，允许其自动跳过数据。对于针对列存储索引的查询，其筛选器可以忽略目标分区之外行组的元数据。


    例如，如果一个列存储索引包含 2010 年至 2021 年的数据，并按年分区（每年一个分区），那么查询 2021 年 1 月行的请求将能够自动跳过分区中所有
    2021 年之前行组。图 11-3 展示了分区消除如何减少读取并进一步加速针对列存储索引的查询。


    ![](img/521866_1_En_11_Fig3_HTML.jpg)


    图 11-3：在分区列存储索引中读取元数据


    分区函数在列存储元数据之前进行评估；因此，在执行查询时，不相关分区中的数据会被忽略。虽然列存储元数据可能相对轻量，但能够跳过数千个行组的元数据可以进一步提升分析性能，同时减少
    IO 和内存消耗。

    '
- fmt: '## Database Maintenance


    Some database maintenance tasks, such as backups and index maintenance, can be
    executed on a partition-by-partition basis. Since the data in older partitions
    rarely changes, it is less likely to require maintenance as often as newer data.
    Therefore, maintenance can be focused on the specific partitions that need it
    most. This also means that maintenance speeds can be greatly improved by no longer
    needing to operate on the entire table at one time.


    In addition, how data is managed can vary partition to partition. Some ways in
    which data can be handled differently depending on the partition include


    *   `Compression` can be customized by partition. In a columnstore index, archive
    compression can be applied to older and less used partitions, whereas standard
    columnstore compression can be the default for newer data.


    *   Partitions can be `truncated` individually, allowing data to be removed from
    a portion of a table quickly, without having to use a `DELETE` statement.


    *   `Partition switching` allows data to be swapped in and out of a partitioned
    table quickly and efficiently. This can greatly speed up migrations, data archival,
    and other processes where a large volume of data needs to be moved at one time.


    ## Partitioning in Action


    To visualize how partitioning works, a new version of the test table `Fact.Sale_CCI`
    will be created. This version will be ordered by `Invoice Date Key` and also partitioned
    by year. Each partition needs to target a filegroup, which in turn will contain
    a data file. For this demonstration, a new filegroup and file will be created
    for each year represented in the table.


    Listing [11-1](#521866_1_En_11_Chapter.xhtml#PC1) shows how new filegroups can
    be created that will be used to store data for the partitioned table.


    ```sql

    ALTER DATABASE WideWorldImportersDW ADD FILEGROUP WideWorldImportersDW_2013_fg;

    ALTER DATABASE WideWorldImportersDW ADD FILEGROUP WideWorldImportersDW_2014_fg;

    ALTER DATABASE WideWorldImportersDW ADD FILEGROUP WideWorldImportersDW_2015_fg;

    ALTER DATABASE WideWorldImportersDW ADD FILEGROUP WideWorldImportersDW_2016_fg;

    ALTER DATABASE WideWorldImportersDW ADD FILEGROUP WideWorldImportersDW_2017_fg;

    ```


    **Listing 11-1** Script That Creates a New Filegroup for Each Year of Data in
    the Table


    Once executed, the presence of the new database filegroups can be confirmed by
    checking the Filegroups menu within the database’s properties, as seen in Figure
    [11-4](#521866_1_En_11_Chapter.xhtml#Fig4).


    ![](images/521866_1_En_11_Chapter/521866_1_En_11_Fig4_HTML.jpg)


    **Figure 11-4** New filegroups that will be used to store partitioned data


    While the five new filegroups are present in the database, they contain no files.
    The next step in this process is to add files to these filegroups (one file each).
    Listing [11-2](#521866_1_En_11_Chapter.xhtml#PC2) contains the code needed to
    add these files.


    ```sql

    ALTER DATABASE WideWorldImportersDW ADD FILE

    (NAME = WideWorldImportersDW_2013_data, FILENAME = ''C:\SQLData\WideWorldImportersDW_2013_data.ndf'',

    SIZE = 200MB, MAXSIZE = UNLIMITED, FILEGROWTH = 1GB)

    TO FILEGROUP WideWorldImportersDW_2013_fg;

    ALTER DATABASE WideWorldImportersDW ADD FILE

    (NAME = WideWorldImportersDW_2014_data, FILENAME = ''C:\SQLData\WideWorldImportersDW_2014_data.ndf'',

    SIZE = 200MB, MAXSIZE = UNLIMITED, FILEGROWTH = 1GB)

    TO FILEGROUP WideWorldImportersDW_2014_fg;

    ALTER DATABASE WideWorldImportersDW ADD FILE

    (NAME = WideWorldImportersDW_2015_data, FILENAME = ''C:\SQLData\WideWorldImportersDW_2015_data.ndf'',

    SIZE = 200MB, MAXSIZE = UNLIMITED, FILEGROWTH = 1GB)

    TO FILEGROUP WideWorldImportersDW_2015_fg;

    ALTER DATABASE WideWorldImportersDW ADD FILE

    (NAME = WideWorldImportersDW_2016_data, FILENAME = ''C:\SQLData\WideWorldImportersDW_2016_data.ndf'',

    SIZE = 200MB, MAXSIZE = UNLIMITED, FILEGROWTH = 1GB)

    TO FILEGROUP WideWorldImportersDW_2016_fg;

    ALTER DATABASE WideWorldImportersDW ADD FILE

    (NAME = WideWorldImportersDW_2017_data, FILENAME = ''C:\SQLData\WideWorldImportersDW_2017_data.ndf'',

    SIZE = 200MB, MAXSIZE = UNLIMITED, FILEGROWTH = 1GB)

    TO FILEGROUP WideWorldImportersDW_2017_fg;

    ```


    **Listing 11-2** Script to Add Files to Each New Filegroup


    For this demonstration, each file has the same size and growth settings, but for
    a real-world table, these numbers will vary. By inspecting the size of the data
    that is to be partitioned, the amount of space needed for each year should be
    relatively easy to calculate. Note that once a table’s data is migrated to a partitioned
    table, the data files that used to contain its data will now have additional free
    space that can be reclaimed, if needed. Figure [11-5](#521866_1_En_11_Chapter.xhtml#Fig5)
    shows the new files listed under the Files menu within the database properties.


    ![](images/521866_1_En_11_Chapter/521866_1_En_11_Fig5_HTML.jpg)


    **Figure 11-5** New database files that will be used to store partitioned data


    New database files can be placed on any storage available to the server. This
    is where the table’s data can be customized to meet whatever SLAs it is subject
    to. For this example, if data from prior to 2016 is rarely accessed, it could
    be placed into files on slower storage. Similarly, more recent data could be maintained
    on faster storage to support frequent analytics.'
