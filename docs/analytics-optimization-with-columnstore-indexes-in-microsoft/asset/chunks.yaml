- fmt: '# Code Changes


    If compression delay and filtered nonclustered columnstore indexes are unable
    to effectively manage analytic workloads against an OLTP table, it is possible
    that organizational logic, code, or both require review.


    If application or database code can be improved in a way that supports both analytic
    and transactional workloads against the same table, then making those changes
    can allow an organization to prevent having to architect a more complex and expensive
    OLAP solution.


    Ultimately, a solution exists for any analytic data challenge, but the ideal solution
    will be the one that costs the fewest resources while being capable of scaling
    most easily into the future. Real-time operational analytics are not appropriate
    for all workloads, and there will often be scenarios where a more expensive and
    resource-intensive solution (such as AlwaysOn or Replication) is the correct solution.


    ## Vertipaq Optimization for Nonclustered Columnstore Indexes


    In Chapter 5, columnstore compression was discussed in detail. An important issue
    that arose was that when a nonclustered rowstore index was added to a clustered
    columnstore index, rows that were inserted in the future could not benefit from
    Vertipaq optimization. Vertipaq optimization reorders rows, while SQL Server compresses
    a rowgroup, allowing like values to be grouped together and therefore compress
    more effectively. Without this feature available, newly inserted data would not
    compress as efficiently and both storage space and memory would be wasted over
    time.


    A logical question to ask is, “Do nonclustered columnstore indexes benefit from
    Vertipaq optimization?” To test this and determine if Vertipaq optimization will
    be used or not, new rows will be inserted into `Sales.Orders`, as provided by
    the query in Listing 12-14.


    ```sql

    INSERT INTO Sales.Orders

    (   OrderID, CustomerID, SalespersonPersonID, PickedByPersonID, ContactPersonID,
    BackorderOrderID, OrderDate, ExpectedDeliveryDate, CustomerPurchaseOrderNumber,
    IsUndersupplyBackordered, Comments, DeliveryInstructions, InternalComments, PickingCompletedWhen,
    LastEditedBy, LastEditedWhen)

    SELECT

    73595 + ROW_NUMBER() OVER (ORDER BY OrderID) AS OrderID,

    CustomerID,

    SalespersonPersonID,

    PickedByPersonID,

    ContactPersonID,

    BackorderOrderID,

    OrderDate,

    ExpectedDeliveryDate,

    CustomerPurchaseOrderNumber,

    IsUndersupplyBackordered,

    Comments,

    DeliveryInstructions,

    InternalComments,

    PickingCompletedWhen,

    LastEditedBy,

    LastEditedWhen

    FROM Sales.Orders;

    ```

    Listing 12-14

    Inserting Rows into `Sales.Orders` to Test Vertipaq Optimization


    This insert operation doubles the size of the table. Once complete, the query
    in Listing 12-15 can be executed to confirm the current state of rowgroups within
    the nonclustered columnstore index.


    ```sql

    SELECT

    objects.name AS table_name,

    partitions.partition_number,

    dm_db_column_store_row_group_physical_stats.row_group_id,

    dm_db_column_store_row_group_physical_stats.has_vertipaq_optimization,

    dm_db_column_store_row_group_physical_stats.state_desc

    FROM sys.dm_db_column_store_row_group_physical_stats

    INNER JOIN sys.objects

    ON objects.object_id = dm_db_column_store_row_group_physical_stats.object_id

    INNER JOIN sys.partitions

    ON partitions.object_id = objects.object_id

    AND partitions.partition_number = dm_db_column_store_row_group_physical_stats.partition_number

    AND partitions.index_id = dm_db_column_store_row_group_physical_stats.index_id

    WHERE objects.name = ''Orders''

    ORDER BY dm_db_column_store_row_group_physical_stats.row_group_id;

    ```

    Listing 12-15

    Query to Display Columnstore Rowgroup Metadata After a Large `INSERT` Operation


    The results in Figure 12-16 show both the existing compressed rowgroup and the
    newly created open rowgroup.


    ![](images/521866_1_En_12_Chapter/521866_1_En_12_Fig16_HTML.jpg)


    Figure 12-16

    Columnstore metadata after a large `INSERT` operation


    Data in the new rowgroup still resides in the delta store as a compression delay
    of 30 minutes was specified when the columnstore index was created. To avoid waiting
    30 minutes for the rowgroup to be processed by the tuple mover, the T-SQL in Listing
    12-16 will be used to enable that process immediately.


    ```sql

    ALTER INDEX NCCI_Orders ON sales.Orders REORGANIZE WITH (COMPRESS_ALL_ROW_GROUPS
    = ON);

    ```

    Listing 12-16

    T-SQL to Enable the Tuple Mover to Process Open Delta Rowgroups


    The results in Figure 12-17 show the state of the columnstore index immediately
    after this script completed.


    ![](images/521866_1_En_12_Chapter/521866_1_En_12_Fig17_HTML.jpg)


    Figure 12-17

    Columnstore metadata after the open rowgroup is processed


    Note that the newly created rowgroup (`row_group_id` = 2) is compressed and is
    using Vertipaq optimization. If the metadata script in Listing 12-15 is executed
    again after a few minutes pass, then the rowgroup in the TOMBSTONE state will
    be removed, as shown in Figure 12-18.


    ![](images/521866_1_En_12_Chapter/521866_1_En_12_Fig18_HTML.jpg)


    Figure 12-18

    Columnstore metadata after the tombstone rowgroup is automatically cleaned up


    The result of the `INSERT` operation is 2 rowgroups, one created alongside the
    initial creation of the columnstore index and the other created when a new set
    of rows were inserted and compressed. As shown in this example, Vertipaq optimization
    will be used for nonclustered columnstore indexes. This is a boon to columnstore
    compression and ensures that each segment is compressed as efficiently as possible,
    despite representing transactional data that may be subject to change more frequently
    than typical analytic tables.


    It is the inclusion of the clustered rowstore index key columns in the nonclustered
    columnstore index that enables Vertipaq optimization to be used. Without the key
    columns included, linking rows within the columnstore index back to the rowstore
    index would be impossible and the columnstore index would need to be rebuilt whenever
    data is modified. Such a cost would be prohibitively high. Having clustered key
    columns available ensures that rows within the nonclustered columnstore index
    can be freely reordered without any danger that they could not easily be tied
    back to the clustered index.'
