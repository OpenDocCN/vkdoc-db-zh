  trans: '## SQL Server 中的原生分析型数据


    `列存储索引`最大的优势之一在于，它们直接将分析型数据存储在`SQL Server`中，无需额外的许可费用或配置更改。同样，开始测试或实施`列存储索引`也无需进行任何硬件或软件更改。


    一个包含分析型数据的`行存储`表可以被转换为使用`列存储索引`，整个过程可在同一个`SQL Server`数据库实例上完成，甚至可以实现就地索引替换。这为准备就绪时的轻松测试、验证和实施提供了可能。


    由于`列存储索引`是`SQL Server`中分析型数据存储的核心功能，它会随着每个新版本而更新。每次更新都会带来新的功能，使得读写`列存储索引`能够变得更快、更高效。微软的以下文档详细概述了自`列存储索引`诞生以来，各版本`SQL
    Server`中可用的功能：


    [`docs.microsoft.com/en-us/sql/relational-databases/indexes/columnstore-indexes-what-s-new`](https://docs.microsoft.com/en-us/sql/relational-databases/indexes/columnstore-indexes-what-s-new)


    这份清单相当详尽，展示了`列存储索引`如何从一个不够灵活的、只读的结构，演变成一个功能丰富、充满优化的特性。


    将数据原生存储在`SQL Server`中意味着无需第三方产品、无需昂贵的迁移，也无需配置新的硬件和软件。实施它们所需的时间更多地取决于典型的开发和质量保证需求，而非技术限制。在为分析型数据的存储和维护制定项目计划时，考虑到这些资源成本有助于做出准确、基于事实的决策。以下是对这些考虑因素的总结：


    *   是否需要采购/许可新硬件以支持分析型数据

    *   分析软件及任何配套软件的许可费用

    *   计算资源的成本，无论是在本地还是在云端

    *   设计、开发、测试和实施分析型数据解决方案所需的时间

    *   培训人员如何使用新解决方案所需的资源


    量化这些因素中的每一项，都有助于比较和对比不同的解决方案，并且通常会对已经使用`SQL Server`进行事务数据存储的组织产生有利的结果。


    ## 可扩展性


    鉴于分析型数据可能快速增长，任何用于存储它的数据结构都必须能够高效地处理`OLAP`工作负载，即使数据深度或宽度随着时间推移意外地快速增加。


    分析型数据存储解决方案的可扩展性具有许多重要优势，包括：


    *   即使在数据快速增长时期，也能确保高性能

    *   避免向新技术进行代价高昂的迁移

    *   避免对报告/分析服务造成干扰

    *   减少维护和停机时间

    *   减少对硬件升级的需求


    一个`OLAP`解决方案要有效，它需要在处理一千行、一百万行、十亿行甚至更多数据时都保持快速和高效。如果一个系统注定在规模变大时变得低效，那么它也注定会失败。


    分析型数据的增长是一个值得衡量并定期重新审视的指标，以便充分了解其长期的资源需求。`OLAP`数据很少会变小，其增长率也很少会下降。这种增长最终与任何给定组织的两个衡量指标相关：


    *   增长

    *   复杂性


    随着组织的发展和客户群的扩大，这些客户将产生更多的数据。同样，组织的发展几乎总是导致技术和非技术流程变得更加复杂。这种复杂性可能表现为软件功能的增加、需要跟踪的流程增多，或者要求随时间推移维护和处理更多类型的数据。


    数据增长速率可总结如下：


    `1.00 * N * G * C`


    在这个表示式中，字母代表以下含义：


    *   **N = 自然增长：** 这是当前发生的自然数据增长。如果其他条件不变，且没有外部因素调整数据增长率，那么这将是预测未来数据增长所需的唯一因素。这可以按单位时间的行数来衡量，也可以按平均字节数每行乘以单位时间行数的物理数据大小增加来衡量。

    *   **G = 数据增长：** 自然增长提供了随时间添加到表或数据库中的数据量基线。然而，这种增长很少是线性的。新客户、采样频率的增加以及其他因素将导致超出当前基线的额外增长。这也可以按单位时间的行数或单位时间的物理数据使用量来衡量。

    *   **C = 复杂性增加：** 这包括向表中添加更多列，以及创建和填充新表。这也增加了需要（通过更多实体）从事务系统流入目标分析系统的数据量。这具有挑战性，但可以作为随时间新增度量指标数量的度量来估算。也就是说，平均而言，单位时间有多少新度量指标将被添加到分析数据源中。一旦知道了新度量指标的数据类型，就可以近似估算其存储单位。


    这里定义的每个因素在性质上是线性的，但实际上可能不是线性的。因此，在预测未来数据大小时，应定期重新审视它们，以确保考虑到增长中意外的变化。只要这些近似值能根据当前和未来趋势保持更新，就可以使用单位时间的线性近似来近似非线性增长。


    为了提供前述公式的示例，考虑一个分析表，它包含 1 亿行数据，当前每天增长 25 万行，预计其增长将每年额外加速 25%，但在可预见的未来不会增加任何新维度。1
    年后的预计行数将由下式给出：


    ```

    1.00 * N * G * C * 行数 = 1.00 * 1.9125 * 1.25 * 1.00 * 100,000,000 = 239,062,500
    行（未来一年）

    ```


    ```

    1.00 * N * G * C * 行数 = 1.00 * 1.9125 * 1.25 * 1.00 * 239,062,500 = 571,508,789
    行（第二年）

    ```


    ```

    1.00 * N * G * C * 行数 = 1.00 * 1.9125 * 1.25 * 1.00 * 571,508,789 = 1,366,263,198
    行（第三年）

    ```


    注意这种增长加速让数据膨胀得有多快——从 1 亿行在 3 年内增长到超过 13 亿行！`1.9125`是通过将每天`250,000`行乘以每年`365`天计算得出的年增长因子。


    总而言之，任何管理分析型数据的技术都需要能够在典型数据增长可能导致数据规模以超出常规认知的速度膨胀的情况下，实现高效的数据访问。`列存储索引`的架构将在第
    4 章详细讨论，并将为解释为何它们能为快速增长的数据实现如此有效的扩展奠定基础。'
- fmt: "## Exceptional Compression\n\nAny analytic data store needs to take full advantage\
    \ of compression to make its data as compact as possible. Columnstore indexes\
    \ use multiple compression algorithms to achieve impressively high compression\
    \ ratios. This can result in data that is 10–100 times smaller than it would be\
    \ in an uncompressed table.\n\nCompressing data by column rather than row is inherently\
    \ more efficient for a number of reasons:\n\n*   A single column contains values\
    \ of the same data type, improving the chances of values being repeated.\n*  \
    \ Dimensions often have many repeated values and will compress exceptionally well.\n\
    *   Data is typically created sequentially, ordered by time. Rows that are in\
    \ close proximity to other rows from similar time periods will tend to contain\
    \ more similar data and compress better than with data from much earlier or later\
    \ in time.\n\nChapter [5](#521866_1_En_5_Chapter.xhtml) dives into more detail\
    \ on columnstore index compression and demonstrates how effective these compression\
    \ algorithms are and why they are crucial to optimal analytic query performance.\n\
    \n## Faster Analytic Reads\n\nFirst and foremost, columnstore indexes are built\
    \ to provide highly performant analytic query speeds. Whether accessing data from\
    \ structured stored procedures and code or from ad hoc analytics and visualization,\
    \ the compact and segmented columnstore index structure allows for the requested\
    \ data to be returned quickly and efficiently. This is true even when large row\
    \ counts are scanned.\n\n## Faster Data Loads\n\nWhen data is written millions\
    \ of rows at a time, processes need to exist that allow for that data to be written\
    \ as quickly as possible. A fully logged process optimized for transactional data\
    \ will not perform adequately for data of this size.\n\nColumnstore indexes can\
    \ make full use of the SQL Server bulk load API and can achieve write speeds far\
    \ faster than other processes available in SQL Server, and in many other products.\
    \ Data loads can execute faster, improving OLAP availability and allowing new\
    \ data to appear more quickly. In addition, the impact of data loads on system\
    \ resources such as the transaction log and on backups is minimized, ensuring\
    \ that large volumes of data can be written in short spans of time without the\
    \ pitfalls of doing so on a fully logged OLTP table.\n\nChapter [8](#521866_1_En_8_Chapter.xhtml)\
    \ will fully explore how data is written to columnstore indexes, including performance\
    \ measurements, resource consumption details, and best practices for loading data\
    \ as efficiently as possible.\n\nAnalytic data requires a versatile, scalable,\
    \ and performant solution. Columnstore indexes provide an ideal data structure\
    \ to create and analyze analytic data, and that can manage data growth over time\
    \ with ease.\n\nThe remainder of this book will discuss columnstore indexes in\
    \ exhaustive detail, providing architectural details, demonstrations, best practices,\
    \ and tools that can improve their use.\n\n# 4. Columnstore Index Architecture\n\
    \nA solid understanding of the architecture of columnstore indexes is necessary\
    \ to make optimal use of them. Best practices, query patterns, maintenance, and\
    \ troubleshooting are all based on the internal structure of columnstore indexes.\
    \ This chapter will focus on these architectural components, providing the foundation\
    \ for the rest of this book.\n\n## Sample Data\n\nTo demonstrate the topics presented\
    \ throughout this book, a sample data set will be created based on the `Fact.Sale`\
    \ table in the `WideWorldImportersDW` database.\n\nThe data set can be generated\
    \ using the query in `Listing 4-1`.\n\n```sql\nSELECT\n    Sale.[Sale Key], Sale.[City\
    \ Key], Sale.[Customer Key], Sale.[Bill To Customer Key], Sale.[Stock Item Key],\
    \ Sale.[Invoice Date Key],\n    Sale.[Delivery Date Key], Sale.[Salesperson Key],\
    \ Sale.[WWI Invoice ID], Sale.Description, Sale.Package, Sale.Quantity, Sale.[Unit\
    \ Price], Sale.[Tax Rate],\n    Sale.[Total Excluding Tax], Sale.[Tax Amount],\
    \ Sale.Profit, Sale.[Total Including Tax], Sale.[Total Dry Items],\n    Sale.[Total\
    \ Chiller Items], Sale.[Lineage Key]\nFROM Fact.Sale\nCROSS JOIN\n    Dimension.City\n\
    WHERE City.[City Key] >= 1 AND City.[City Key] <= 110;\n```\n`Listing 4-1` Query\
    \ Used to Generate a Data Set for Use in Columnstore Index Testing\n\nThis generates\
    \ 25,109,150 rows of data spanning invoice date ranges of 1/1/2013 through 5/31/2016.\
    \ While this data is not massive, it is large enough for suitable demonstrations\
    \ without being cumbersome to those that wish to replicate it at home. This data\
    \ set will be reused in future chapters, being placed into a number of test tables\
    \ to illustrate a wide variety of topics related to columnstore indexes, OLAP\
    \ performance, and database architecture.\n\nFor this chapter, the data will be\
    \ loaded into a table without any indexes, and a columnstore index added at the\
    \ end, as seen in `Listing 4-2`.\n\n```sql\nCREATE TABLE Fact.Sale_CCI\n(\n  \
    \  [Sale Key] [bigint] NOT NULL,\n    [City Key] [int] NOT NULL,\n    [Customer\
    \ Key] [int] NOT NULL,\n    [Bill To Customer Key] [int] NOT NULL,\n    [Stock\
    \ Item Key] [int] NOT NULL,\n    [Invoice Date Key] [date] NOT NULL,\n    [Delivery\
    \ Date Key] [date] NULL,\n    [Salesperson Key] [int] NOT NULL,\n    [WWI Invoice\
    \ ID] [int] NOT NULL,\n    [Description] [nvarchar](100) NOT NULL,\n    [Package]\
    \ [nvarchar](50) NOT NULL,\n    [Quantity] [int] NOT NULL,\n    [Unit Price] [decimal](18,\
    \ 2) NOT NULL,\n    [Tax Rate] [decimal](18, 3) NOT NULL,\n    [Total Excluding\
    \ Tax] [decimal](18, 2) NOT NULL,\n    [Tax Amount] [decimal](18, 2) NOT NULL,\n\
    \    [Profit] [decimal](18, 2) NOT NULL,\n    [Total Including Tax] [decimal](18,\
    \ 2) NOT NULL,\n    [Total Dry Items] [int] NOT NULL,\n    [Total Chiller Items]\
    \ [int] NOT NULL,\n    [Lineage Key] [int] NOT NULL\n);\n\nINSERT INTO Fact.Sale_CCI\n\
    (\n    [Sale Key], [City Key], [Customer Key], [Bill To Customer Key], [Stock\
    \ Item Key], [Invoice Date Key], [Delivery Date Key],\n    [Salesperson Key],\
    \ [WWI Invoice ID], Description, Package, Quantity, [Unit Price], [Tax Rate],\
    \ [Total Excluding Tax], [Tax Amount],\n    Profit, [Total Including Tax], [Total\
    \ Dry Items], [Total Chiller Items], [Lineage Key]\n)\nSELECT\n    Sale.[Sale\
    \ Key], Sale.[City Key], Sale.[Customer Key], Sale.[Bill To Customer Key], Sale.[Stock\
    \ Item Key], Sale.[Invoice Date Key],\n    Sale.[Delivery Date Key], Sale.[Salesperson\
    \ Key], Sale.[WWI Invoice ID], Sale.Description, Sale.Package, Sale.Quantity,\
    \ Sale.[Unit Price], Sale.[Tax Rate],\n    Sale.[Total Excluding Tax], Sale.[Tax\
    \ Amount], Sale.Profit, Sale.[Total Including Tax], Sale.[Total Dry Items],\n\
    \    Sale.[Total Chiller Items], Sale.[Lineage Key]\nFROM fact.Sale\nCROSS JOIN\n\
    \    Dimension.City\nWHERE City.[City Key] >= 1 AND City.[City Key] <= 110;\n\n\
    -- Create a columnstore index on the table.\nCREATE CLUSTERED COLUMNSTORE INDEX\
    \ CCI_fact_sale_CCI ON fact.Sale_CCI;\n```\n`Listing 4-2` Script That Creates\
    \ and Populates a Columnstore Index Test Table\n\nThe size and shape of this data\
    \ can be confirmed with a simple query:\n\n```sql\nSELECT\n    COUNT(*),\n   \
    \ MIN([Invoice Date Key]),\n    MAX([Invoice Date Key])\nFROM fact.Sale_CCI;\n\
    ```\n\nThe results are shown in `Figure 4-1`.\n\n![Figure 4-1](images/521866_1_En_4_Chapter/521866_1_En_4_Fig1_HTML.jpg)\n\
    `Figure 4-1` Query results showing the size and date range for a set of test data"
  raw: '### Exceptional Compression


    Any analytic data store needs to take full advantage of compression to make its
    data as compact as possible. Columnstore indexes use multiple compression algorithms
    to achieve impressively high compression ratios. This can result in data that
    is 10–100 times smaller than it would be in an uncompressed table.


    Compressing data by column rather than row is inherently more efficient for a
    number of reasons:


    *   A single column contains values of the same data type, improving the chances
    of values being repeated.


    *   Dimensions often have many repeated values and will compress exceptionally
    well.


    *   Data is typically created sequentially, ordered by time. Rows that are in
    close proximity to other rows from similar time periods will tend to contain more
    similar data and compress better than with data from much earlier or later in
    time.


    Chapter [5](#521866_1_En_5_Chapter.xhtml) dives into more detail on columnstore
    index compression and demonstrates how effective these compression algorithms
    are and why they are crucial to optimal analytic query performance.


    ### Faster Analytic Reads


    First and foremost, columnstore indexes are built to provide highly performant
    analytic query speeds. Whether accessing data from structured stored procedures
    and code or from ad hoc analytics and visualization, the compact and segmented
    columnstore index structure allows for the requested data to be returned quickly
    and efficiently. This is true even when large row counts are scanned.


    ### Faster Data Loads


    When data is written millions of rows at a time, processes need to exist that
    allow for that data to be written as quickly as possible. A fully logged process
    optimized for transactional data will not perform adequately for data of this
    size.


    Columnstore indexes can make full use of the SQL Server bulk load API and can
    achieve write speeds far faster than other processes available in SQL Server,
    and in many other products. Data loads can execute faster, improving OLAP availability
    and allowing new data to appear more quickly. In addition, the impact of data
    loads on system resources such as the transaction log and on backups is minimized,
    ensuring that large volumes of data can be written in short spans of time without
    the pitfalls of doing so on a fully logged OLTP table.


    Chapter [8](#521866_1_En_8_Chapter.xhtml) will fully explore how data is written
    to columnstore indexes, including performance measurements, resource consumption
    details, and best practices for loading data as efficiently as possible.


    Analytic data requires a versatile, scalable, and performant solution. Columnstore
    indexes provide an ideal data structure to create and analyze analytic data, and
    that can manage data growth over time with ease.


    The remainder of this book will discuss columnstore indexes in exhaustive detail,
    providing architectural details, demonstrations, best practices, and tools that
    can improve their use.


    # 4. Columnstore Index Architecture


    A solid understanding of the architecture of columnstore indexes is necessary
    to make optimal use of them. Best practices, query patterns, maintenance, and
    troubleshooting are all based on the internal structure of columnstore indexes.
    This chapter will focus on these architectural components, providing the foundation
    for the rest of this book.


    ## Sample Data


    To demonstrate the topics presented throughout this book, a sample data set will
    be created based on the *Fact.Sale* table in the *WideWorldImportersDW* database.


    The data set can be generated using the query in Listing [4-1](#521866_1_En_4_Chapter.xhtml#PC1).


    ```

    SELECT

    Sale.[Sale Key], Sale.[City Key], Sale.[Customer Key], Sale.[Bill To Customer
    Key], Sale.[Stock Item Key], Sale.[Invoice Date Key],

    Sale.[Delivery Date Key],Sale.[Salesperson Key], Sale.[WWI Invoice ID], Sale.Description,
    Sale.Package, Sale.Quantity, Sale.[Unit Price], Sale.[Tax Rate],

    Sale.[Total Excluding Tax], Sale.[Tax Amount], Sale.Profit, Sale.[Total Including
    Tax], Sale.[Total Dry Items],

    Sale.[Total Chiller Items], Sale.[Lineage Key]

    FROM Fact.Sale

    CROSS JOIN

    Dimension.City

    WHERE City.[City Key] >= 1 AND City.[City Key] <= 110;

    Listing 4-1

    Query Used to Generate a Data Set for Use in Columnstore Index Testing

    ```


    This generates 25,109,150 rows of data spanning invoice date ranges of 1/1/2013
    through 5/31/2016\. While this data is not massive, it is large enough for suitable
    demonstrations without being cumbersome to those that wish to replicate it at
    home. This data set will be reused in future chapters, being placed into a number
    of test tables to illustrate a wide variety of topics related to columnstore indexes,
    OLAP performance, and database architecture.


    For this chapter, the data will be loaded into a table without any indexes, and
    a columnstore index added at the end, as seen in Listing [4-2](#521866_1_En_4_Chapter.xhtml#PC2).


    ```

    CREATE TABLE Fact.Sale_CCI

    (      [Sale Key] [bigint] NOT NULL,

    [City Key] [int] NOT NULL,

    [Customer Key] [int] NOT NULL,

    [Bill To Customer Key] [int] NOT NULL,

    [Stock Item Key] [int] NOT NULL,

    [Invoice Date Key] [date] NOT NULL,

    [Delivery Date Key] [date] NULL,

    [Salesperson Key] [int] NOT NULL,

    [WWI Invoice ID] [int] NOT NULL,

    [Description] [nvarchar](100) NOT NULL,

    [Package] [nvarchar](50) NOT NULL,

    [Quantity] [int] NOT NULL,

    [Unit Price] [decimal](18, 2) NOT NULL,

    [Tax Rate] [decimal](18, 3) NOT NULL,

    [Total Excluding Tax] [decimal](18, 2) NOT NULL,

    [Tax Amount] [decimal](18, 2) NOT NULL,

    [Profit] [decimal](18, 2) NOT NULL,

    [Total Including Tax] [decimal](18, 2) NOT NULL,

    [Total Dry Items] [int] NOT NULL,

    [Total Chiller Items] [int] NOT NULL,

    [Lineage Key] [int] NOT NULL);

    INSERT INTO Fact.Sale_CCI

    ([Sale Key], [City Key], [Customer Key], [Bill To Customer Key], [Stock Item Key],
    [Invoice Date Key], [Delivery Date Key],

    [Salesperson Key], [WWI Invoice ID], Description, Package, Quantity, [Unit Price],
    [Tax Rate], [Total Excluding Tax], [Tax Amount],

    Profit, [Total Including Tax], [Total Dry Items],

    [Total Chiller Items], [Lineage Key])

    SELECT

    Sale.[Sale Key], Sale.[City Key], Sale.[Customer Key], Sale.[Bill To Customer
    Key], Sale.[Stock Item Key], Sale.[Invoice Date Key],

    Sale.[Delivery Date Key], Sale.[Salesperson Key], Sale.[WWI Invoice ID], Sale.Description,
    Sale.Package, Sale.Quantity, Sale.[Unit Price], Sale.[Tax Rate],

    Sale.[Total Excluding Tax], Sale.[Tax Amount], Sale.Profit, Sale.[Total Including
    Tax], Sale.[Total Dry Items],

    Sale.[Total Chiller Items], Sale.[Lineage Key]

    FROM fact.Sale

    CROSS JOIN

    Dimension.City

    WHERE City.[City Key] >= 1 AND City.[City Key] <= 110;

    -- Create a columnstore index on the table.

    CREATE CLUSTERED COLUMNSTORE INDEX CCI_fact_sale_CCI ON fact.Sale_CCI;

    Listing 4-2

    Script That Creates and Populates a Columnstore Index Test Table

    ```


    The size and shape of this data can be confirmed with a simple query:


    ```

    SELECT

    COUNT(*),

    MIN([Invoice Date Key]),

    MAX([Invoice Date Key])

    FROM fact.Sale_CCI;

    ```


    The results are shown in Figure [4-1](#521866_1_En_4_Chapter.xhtml#Fig1).


    ![](images/521866_1_En_4_Chapter/521866_1_En_4_Fig1_HTML.jpg)


    Figure 4-1


    Query results showing the size and date range for a set of test data'
  trans: "\n## 卓越的压缩能力\n\n任何分析型数据存储都需要充分利用压缩技术，以使其数据尽可能紧凑。列存储索引采用多种压缩算法，实现了令人印象深刻的高压缩比。这可以使数据量缩减到未压缩表的\
    \ 1/10 至 1/100。\n\n按列而非按行压缩数据，其效率天生更高，原因如下：\n\n*   单列包含相同数据类型的值，增加了值重复的可能性。\n\
    *   维度通常包含大量重复值，因此压缩效果会格外出色。\n*   数据通常是按时间顺序顺序创建的。时间上相邻的行往往包含更相似的数据，因此压缩效果优于时间上相隔较远的行。\n\
    \n第 5 章将深入探讨列存储索引压缩的更多细节，并展示这些压缩算法的有效性及其对优化分析查询性能至关重要。\n\n## 更快的分析读取\n\n列存储索引的首要设计目标是提供高性能的分析查询速度。无论是从结构化存储过程和代码中访问数据，还是进行即席分析和可视化，紧凑且分段的列存储索引结构都能快速高效地返回所需数据。即使在扫描大量行时，这一点也依然成立。\n\
    \n## 更快的数据加载\n\n当数据以每次数百万行的规模写入时，就需要存在允许数据尽快写入的流程。针对事务数据优化的、完全记录日志的流程，对于这种规模的数据将无法提供足够的性能。\n\
    \n列存储索引可以充分利用 SQL Server 的批量加载 API，其写入速度远超 SQL Server 及许多其他产品中可用的其他流程。数据加载可以执行得更快，从而提高\
    \ OLAP 的可用性，并让新数据更快地呈现。此外，数据加载对系统资源（如事务日志）和备份的影响被降至最低，确保大量数据可以在短时间内写入，而不会产生在完全记录日志的\
    \ OLTP 表上执行此类操作所带来的问题。\n\n第 8 章将全面探讨数据如何写入列存储索引，包括性能度量、资源消耗细节以及尽可能高效加载数据的最佳实践。\n\
    \n分析型数据需要一个多功能、可扩展且高性能的解决方案。列存储索引提供了一种理想的数据结构来创建和分析分析型数据，并能轻松管理随时间增长的数据量。\n\n\
    本书的剩余部分将极其详尽地讨论列存储索引，提供架构细节、演示、最佳实践以及可改进其使用的工具。\n\n# 4. 列存储索引架构\n\n为了最优地使用列存储索引，扎实理解其架构是必要的。最佳实践、查询模式、维护和故障排除都基于列存储索引的内部结构。本章将重点介绍这些架构组件，为本书的其余部分奠定基础。\n\
    \n## 示例数据\n\n为演示本书中介绍的主题，将基于 `WideWorldImportersDW` 数据库中的 `Fact.Sale` 表创建一个示例数据集。\n\
    \n可以使用 `代码清单 4-1` 中的查询来生成该数据集。\n\n```sql\nSELECT\n    Sale.[Sale Key], Sale.[City\
    \ Key], Sale.[Customer Key], Sale.[Bill To Customer Key], Sale.[Stock Item Key],\
    \ Sale.[Invoice Date Key],\n    Sale.[Delivery Date Key], Sale.[Salesperson Key],\
    \ Sale.[WWI Invoice ID], Sale.Description, Sale.Package, Sale.Quantity, Sale.[Unit\
    \ Price], Sale.[Tax Rate],\n    Sale.[Total Excluding Tax], Sale.[Tax Amount],\
    \ Sale.Profit, Sale.[Total Including Tax], Sale.[Total Dry Items],\n    Sale.[Total\
    \ Chiller Items], Sale.[Lineage Key]\nFROM Fact.Sale\nCROSS JOIN\n    Dimension.City\n\
    WHERE City.[City Key] >= 1 AND City.[City Key] <= 110;\n```\n`代码清单 4-1` 用于生成列存储索引测试数据集的查询\n\
    \n这生成了 25,109,150 行数据，涵盖的发票日期范围从 2013/1/1 到 2016/5/31。虽然这些数据并非海量，但其规模足以进行合适的演示，且对希望在家复现的用户来说也不会显得笨重。该数据集将在后续章节中复用，被放入多个测试表中，以说明与列存储索引、OLAP\
    \ 性能和数据库架构相关的各种主题。\n\n在本章中，数据将被加载到一个没有任何索引的表中，并在最后添加一个列存储索引，如 `代码清单 4-2` 所示。\n\
    \n```sql\nCREATE TABLE Fact.Sale_CCI\n(\n    [Sale Key] [bigint] NOT NULL,\n \
    \   [City Key] [int] NOT NULL,\n    [Customer Key] [int] NOT NULL,\n    [Bill\
    \ To Customer Key] [int] NOT NULL,\n    [Stock Item Key] [int] NOT NULL,\n   \
    \ [Invoice Date Key] [date] NOT NULL,\n    [Delivery Date Key] [date] NULL,\n\
    \    [Salesperson Key] [int] NOT NULL,\n    [WWI Invoice ID] [int] NOT NULL,\n\
    \    [Description] nvarchar NOT NULL,\n    [Package] nvarchar NOT NULL,\n    [Quantity]\
    \ [int] NOT NULL,\n    [Unit Price] decimal NOT NULL,\n    [Tax Rate] decimal\
    \ NOT NULL,\n    [Total Excluding Tax] decimal NOT NULL,\n    [Tax Amount] decimal\
    \ NOT NULL,\n    [Profit] decimal NOT NULL,\n    [Total Including Tax] decimal\
    \ NOT NULL,\n    [Total Dry Items] [int] NOT NULL,\n    [Total Chiller Items]\
    \ [int] NOT NULL,\n    [Lineage Key] [int] NOT NULL\n);\n\nINSERT INTO Fact.Sale_CCI\n\
    (\n    [Sale Key], [City Key], [Customer Key], [Bill To Customer Key], [Stock\
    \ Item Key], [Invoice Date Key], [Delivery Date Key],\n    [Salesperson Key],\
    \ [WWI Invoice ID], Description, Package, Quantity, [Unit Price], [Tax Rate],\
    \ [Total Excluding Tax], [Tax Amount],\n    Profit, [Total Including Tax], [Total\
    \ Dry Items], [Total Chiller Items], [Lineage Key]\n)\nSELECT\n    Sale.[Sale\
    \ Key], Sale.[City Key], Sale.[Customer Key], Sale.[Bill To Customer Key], Sale.[Stock\
    \ Item Key], Sale.[Invoice Date Key],\n    Sale.[Delivery Date Key], Sale.[Salesperson\
    \ Key], Sale.[WWI Invoice ID], Sale.Description, Sale.Package, Sale.Quantity,\
    \ Sale.[Unit Price], Sale.[Tax Rate],\n    Sale.[Total Excluding Tax], Sale.[Tax\
    \ Amount], Sale.Profit, Sale.[Total Including Tax], Sale.[Total Dry Items],\n\
    \    Sale.[Total Chiller Items], Sale.[Lineage Key]\nFROM fact.Sale\nCROSS JOIN\n\
    \    Dimension.City\nWHERE City.[City Key] >= 1 AND City.[City Key] <= 110;\n\n\
    -- 在表上创建列存储索引。\nCREATE CLUSTERED COLUMNSTORE INDEX CCI_fact_sale_CCI ON fact.Sale_CCI;\n\
    ```\n`代码清单 4-2` 创建并填充列存储索引测试表的脚本\n\n可以通过一个简单的查询来确认此数据的规模和形态：\n\n```sql\nSELECT\n\
    \    COUNT(*),\n    MIN([Invoice Date Key]),\n    MAX([Invoice Date Key])\nFROM\
    \ fact.Sale_CCI;\n```\n\n结果如 `图 4-1` 所示。\n\n![图 4-1](img/521866_1_En_4_Fig1_HTML.jpg)\n\
    `图 4-1` 显示测试数据集规模和日期范围的查询结果\n"
- fmt: '## Rowgroups and Segments


    Analytic data cannot be stored in one large contiguous structure. While each column
    is compressed and stored separately, the data within those columns needs to be
    grouped and compressed separately. Each compressed unit is what is read into memory.
    If that unit is too small, then the storage and management of a multitude of compressed
    structures would be expensive, and its compression poor. Conversely, if the number
    of rows in each unit is too large, then the amount of data that needs to be read
    into memory to satisfy queries would also become too large.


    Columnstore indexes group rows into units of `2^(20)` (`1,048,576`) rows that
    are called `rowgroups`. Each column within that rowgroup is individually compressed
    into the fundamental unit of a columnstore index called a `segment`. This structure
    can be visualized using the representation in Figure [4-2](#521866_1_En_4_Chapter.xhtml#Fig2).


    ![](images/521866_1_En_4_Chapter/521866_1_En_4_Fig2_HTML.jpg)


    Figure 4-2

    Rowgroups and segments within a columnstore index


    Note that columnstore indexes are not built on binary tree structures like clustered
    and nonclustered rowstore indexes are. Instead, each rowgroup contains a set of
    compressed segments, one per column in a table. The example in Figure [4-2](#521866_1_En_4_Chapter.xhtml#Fig2)
    is for a table with eight columns and up to `6*2^(20)` rows, containing a total
    of 48 segments (one segment per column per rowgroup). The only significant architectural
    convention shared between rowstore and columnstore indexes are their use of `8KB`
    pages to store their data.


    Rowgroups are created and managed automatically as data is created in a columnstore
    index. There is no cap on the number of rowgroups that can exist, nor are there
    limits on the count of segments within the index. Because a rowgroup contains
    up to `2^(20)` rows, a table should have many more rows than this to make optimal
    use of a columnstore index. If a table has `500k` rows, then it is likely to all
    be stored in a single rowgroup. As a result, any query requiring data from the
    table would need to read segments that contain data for all rows in the table.
    For a table to make effective use of a columnstore index, it should have at least
    `5 million` or `10 million` rows so that it can be broken into separate rowgroups
    of which not all need to be read each time a query is issued against it.


    The rowgroups within a columnstore index may be viewed using the dynamic management
    view `sys.column_store_row_groups`. The query in Listing [4-3](#521866_1_En_4_Chapter.xhtml#PC4)
    returns rowgroup metadata for the columnstore index created earlier in this chapter.


    ```

    SELECT

    tables.name AS table_name,

    indexes.name AS index_name,

    column_store_row_groups.partition_number,

    column_store_row_groups.row_group_id,

    column_store_row_groups.state_description,

    column_store_row_groups.total_rows,

    column_store_row_groups.deleted_rows,

    column_store_row_groups.size_in_bytes

    FROM sys.column_store_row_groups

    INNER JOIN sys.indexes

    ON indexes.index_id = column_store_row_groups.index_id

    AND indexes.object_id = column_store_row_groups.object_id

    INNER JOIN sys.tables

    ON tables.object_id = indexes.object_id

    WHERE tables.name = ''Sale_CCI''

    ORDER BY tables.object_id, indexes.index_id, column_store_row_groups.row_group_id;

    ```


    Listing 4-3

    Script to Return Basic Rowgroup Metadata for a Columnstore Index


    The results of this query can be found in Figure [4-3](#521866_1_En_4_Chapter.xhtml#Fig3).


    ![](images/521866_1_En_4_Chapter/521866_1_En_4_Fig3_HTML.jpg)


    Figure 4-3

    Rowgroup metadata for fact.Sale_CCI


    By joining in other system views, such as `sys.indexes` and `sys.tables`, it is
    possible to return additional information about the table that the columnstore
    index resides on. `sys.column_store_row_groups` contains some additional columns
    of interest, such as the compression status of the rowgroup, the row count, and
    its size. Note that the selection of eight rowgroups in Figure [4-3](#521866_1_En_4_Chapter.xhtml#Fig3)
    all contain the maximum number of rows allowed in a rowgroup, `2^(20)`.


    Using rowgroup metadata allows the user to quickly measure the size of a columnstore
    index and gain a basic understanding of its structure.


    Within each rowgroup are segments for each column in the table. A dynamic management
    view also exists that provides details about compressed segments: `sys.column_store_segments`.
    Listing [4-4](#521866_1_En_4_Chapter.xhtml#PC5) provides a query that returns
    information from this view, including joins back to the parent table and column
    for each segment.


    ```

    SELECT

    tables.name AS table_name,

    indexes.name AS index_name,

    columns.name AS column_name,

    partitions.partition_number,

    column_store_segments.row_count,

    column_store_segments.has_nulls,

    column_store_segments.min_data_id,

    column_store_segments.max_data_id,

    column_store_segments.on_disk_size

    FROM sys.column_store_segments

    INNER JOIN sys.partitions

    ON column_store_segments.hobt_id = partitions.hobt_id

    INNER JOIN sys.indexes

    ON indexes.index_id = partitions.index_id

    AND indexes.object_id = partitions.object_id

    INNER JOIN sys.tables

    ON tables.object_id = indexes.object_id

    INNER JOIN sys.columns

    ON tables.object_id = columns.object_id

    AND column_store_segments.column_id = columns.column_id

    WHERE tables.name = ''Sale_CCI''

    ORDER BY columns.name, column_store_segments.segment_id;

    ```


    Listing 4-4

    Script to Return Basic Segment Metadata for a Columnstore Index


    Figure [4-4](#521866_1_En_4_Chapter.xhtml#Fig4) contains a sample of the results.


    ![](images/521866_1_En_4_Chapter/521866_1_En_4_Fig4_HTML.jpg)


    Figure 4-4

    Segment metadata for fact.Sale_CCI


    The row count returned by the query is equal to the total number of segments in
    the index, which is subsequently equal to the count of rowgroups multiplied by
    the number of columns in the table. In addition to the row count contained in
    each segment and its size on disk, there are details given as to whether the segment
    has `NULL`s in it, and `min_data_id`/`max_data_id`, which provide dictionary lookups
    for values contained in the segment. Details about dictionaries and how they work
    will be provided alongside the discussion of compression in Chapter [5](#521866_1_En_5_Chapter.xhtml).'
