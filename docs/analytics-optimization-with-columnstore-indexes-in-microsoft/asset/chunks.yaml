    GO

    SELECT

    Sale.[City Key],

    COUNT(*)

    FROM fact.Sale

    GROUP BY Sale.[City Key]

    ALTER DATABASE WideWorldImportersDW SET COMPATIBILITY_LEVEL = 130;

    GO

    SELECT

    Sale.[City Key],

    COUNT(*)

    FROM fact.Sale

    GROUP BY Sale.[City Key]

    清单 7-6

