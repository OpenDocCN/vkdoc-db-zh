    # 8. Bulk Loading Data


    Any analytic data store requires the ability to perform data loads quickly and
    efficiently. Bulk loading is a reduced logging process that allows data to be
    inserted directly into a columnstore index. This not only bypasses the delta store,
    but results in a transaction size that reflects the compression of the target
    data, greatly reducing the amount of data written to the transaction log when
    this process is used.


    ## Bulk Load Processes Explained


    Traditional transactional workloads are fully logged. When fully logged, enough
    metadata is written to the transaction log so that SQL Server can recover from
    a failed transaction. In addition, data is written to the transaction log to ensure
    that point-in-time recovery is possible.


    Fully logged transactions in OLTP scenarios are ideal as they allow a database
    to be rolled back to a specific point in time in the event of application problems.
    In addition, point-in-time recovery allows for research and forensics into the
    details of transactions, when needed.


    Sometimes, transactional writes are intentionally subdivided into smaller batches
    to ensure that each transaction is short and fast and causes minimal contention
    with other queries against the same data.


    The cost of fully logged transactions is that more data needs to be written to
    the transaction log, which results in


    *   More storage space consumed in the transaction log


    *   More storage space consumed in transaction log backup files


    *   More CPU/memory to process transaction log backups


    *   Longer query duration for write operations


    Analytic workloads differ greatly in their recovery needs as data loads tend to
    be larger, less frequent, and asynchronous. When analytic data loads fail, the
    most common recourse is to investigate the problem, resolve it, and then rerun
    the data load. Point-in-time recovery within data load processes is less important
    than simply having recovery available to a point in time prior to the data load.
    Therefore, OLAP data loads can benefit greatly from minimally logged insert operations.


    Outside of columnstore indexes, bulk loading data is limited to a handful of write
    operations, such as


    *   BCP


    *   Bulk insert operations


    *   Select into operations


    *   Partition switching


    Because point-in-time recovery can be critical to transactional systems, any process
    that utilizes bulk loading needs to be documented well enough to not accidentally
    be used in a scenario where it is not desired.


    Columnstore indexes use built-in bulk load processes that automatically insert
    larger batches directly into rowgroups without using the delta store. This greatly
    improves insert speeds for large analytic data loads and reduces transaction log
    bloat resulting from those processes.


    ## Bulk Loading into Columnstore Indexes


    The breakpoint for deciding whether to use a bulk load process or to use the delta
    store is 102,400 rows. Inserts of less than 102,400 rows will always be written
    to the delta store via a fully logged process, whereas inserts of 102,400 rows
    or more will be written directly to rowgroups in the columnstore index, bypassing
    the delta store. This decision can be shown in Figure [8-1](#521866_1_En_8_Chapter.xhtml#Fig1).


    ![](images/521866_1_En_8_Chapter/521866_1_En_8_Fig1_HTML.jpg)


    Figure 8-1


    Determination of process for bulk loading data into a columnstore index


    Unlike some of the other types of minimally logged insert operations in SQL Server,
    there are no prerequisites to take advantage of bulk loading data into a columnstore
    index. There is no need to adjust isolation levels, use explicit table locking,
    or adjust parallelism settings. Since bulk loading data will be the desired operation
    for large inserts into columnstore indexes, it is the default and will be used
    automatically when possible.


    If an insert operation contains more than 2^(20) (1,048,576) rows, it will be
    subdivided into inserts in the following fashion:


    1.  Each batch of 2^(20) rows will be bulk inserted into the columnstore index
    until there are less than 2^(20) rows remaining to insert.


    2.  If the remainder of rows is greater than or equal to 102,400, it will also
    be bulk inserted into the columnstore index.


    3.  If the remainder of rows is less than 102,400, it will be inserted into the
    delta store.


    For example, if an insert of 3,000,000 rows is made to a columnstore index, it
    will be broken down as follows:


    *   2 bulk loads of 1,048,576 rows each


    *   1 bulk load of 902,848 rows (the remainder)


    Alternatively, if an insert of 2,100,000 rows occurs, it will be processed like
    this:


    *   2 bulk loads of 1,048,576 rows each


    *   2,848 rows (the remainder) inserted into the delta store


    SQL Server can bulk load data into a columnstore index in multiple parallel threads
    so long as the data for each thread is targeting a different data file. This is
    automatic and requires no particular user action to accomplish. Columnstore bulk
    insert operations acquire exclusive locks against target rowgroups, and so long
    as parallel inserts target separate data files, they are guaranteed to not overlap
    the rowgroups they are inserting into.


    When data is inserted into a partitioned columnstore index, that data is first
    assigned a partition and then each group of rows is inserted into their respective
    partitions. Therefore, whether bulk load processes are used will be dependent
    on the numbers of rows inserted into the target partition, rather than the total
    number of rows inserted by the source query. Typically, analytic tables will have
    a current/active partition that accepts new data, whereas the remaining partitions
    will contain older data that is no longer written to (outside of one-off data
    loads, software releases, or maintenance events).'
