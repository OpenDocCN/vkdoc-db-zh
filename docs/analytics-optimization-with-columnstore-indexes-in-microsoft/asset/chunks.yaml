    SELECT\n    partitions.partition_number,\n    objects.name AS table_name,\n  \
    \  columns.name AS column_name,\n    CASE\n        WHEN column_store_dictionaries.dictionary_id\
    \ = 0 THEN 'Global Dictionary'\n        ELSE 'Local Dictionary'\n    END AS dictionary_scope,\n\
    \    CASE\n        WHEN column_store_dictionaries.type = 1 THEN 'Hash dictionary\
