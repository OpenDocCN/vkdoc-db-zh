    \ OLTP 读取操作会针对行存储索引，并且很少使用列存储索引。\n\n使用相同的语法，压缩延迟也可以应用于聚集列存储索引。当数据加载过程满足以下任一条件时，这可能是一个极佳的解决方案：\n\
