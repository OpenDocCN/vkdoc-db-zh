  trans: '

    ### 行组物理元数据


    SQL Server 提供了视图 `sys.dm_db_column_store_row_group_physical_stats` 作为每个行组的参考。该视图包含了关于行组当前状态以及行组创建方式的详细信息。在排查意外的性能问题，或试图理解列存储索引行组为何以特定方式构建时，这些信息非常宝贵。


    代码清单 6-3 中的查询从该视图中返回关键信息以及一些相关的元数据。


    ```sql

    SELECT

    objects.name AS table_name,

    indexes.name AS index_name,

    dm_db_column_store_row_group_physical_stats.partition_number,

    dm_db_column_store_row_group_physical_stats.row_group_id,

    dm_db_column_store_row_group_physical_stats.state_desc,

    dm_db_column_store_row_group_physical_stats.total_rows,

    dm_db_column_store_row_group_physical_stats.deleted_rows,

    dm_db_column_store_row_group_physical_stats.size_in_bytes,

    dm_db_column_store_row_group_physical_stats.trim_reason_desc,

    dm_db_column_store_row_group_physical_stats.transition_to_compressed_state_desc,

    dm_db_column_store_row_group_physical_stats.has_vertipaq_optimization,

    dm_db_column_store_row_group_physical_stats.created_time

    FROM sys.dm_db_column_store_row_group_physical_stats

    INNER JOIN sys.objects

    ON objects.object_id = dm_db_column_store_row_group_physical_stats.object_id

    INNER JOIN sys.indexes

    ON indexes.object_id = dm_db_column_store_row_group_physical_stats.object_id

    AND indexes.index_id = dm_db_column_store_row_group_physical_stats.index_id

    WHERE objects.name = ''Sale_CCI'';

    ```

    代码清单 6-3：返回列存储行组物理详细信息的查询


    查询结果提供了关于行组的附加信息，如图 6-3 所示。


    ![](img/521866_1_En_6_Fig3_HTML.jpg)


    图 6-3：Sale_CCI 上列存储索引的行组物理统计信息


    这些信息为了解行组的构建方式和时间提供了线索。以下是图 6-3 中展示的关键列的说明。


    #### State_desc


    这是行组的当前状态，与在 `sys.column_store_row_groups` 中找到的值相同。状态为 `TOMBSTONE` 的行组表明它先前是增量存储区的一部分，已被转换为压缩行组，但尚未被清理。此清理过程是异步自动进行的，无需操作员干预。


    #### Total_rows, Deleted_rows, Size_in_bytes


    这些值与 `sys.column_store_row_groups` 中的对应值相同，在此视图中提供是为了方便。


    #### Trim_reason_desc


    一个行组最多可包含 2²⁰ 行。行组被创建并压缩时，其行数可能未达到满额，这有很多原因。如果此列对某个行组显示 `NO_TRIM`，则表明它是一个满行组，包含
    1,048,576 行。如果行组包含的行数小于其最大可能大小，那么修剪原因（trim reason）将解释为什么。


    通常，列存储索引应主要包含行数接近 1,048,576 的行组。如果情况并非如此，并且大多数行组尺寸过小（undersized），那么理解其原因对于改进列存储的存储和性能至关重要。对于“尺寸过小”没有严格的定义阈值，但通常一个尺寸过小的行组包含的行数少于
    900,000 行，或少于其最大尺寸的大约 10%。


    行组被修剪的常见原因包括：


    *   `BULKLOAD`：批量加载过程将结果行数限制为小于其最大值。这是正常的，很少需要担心。

    *   `REORG`：使用了索引重组过程来强制压缩行组。由于这是手动过程，如果需要，很容易控制。

    *   `DICTIONARY_SIZE`：字典限制为 16 兆字节空间。如果字典超过该大小，则其对应的行组将被拆分到另一个行组中。如果这种情况频繁发生并且导致行数较低，则表明字典压缩正在损害压缩性能。将大型维度表规范化为查找表是解决此问题的有效方法。

    *   `MEMORY_LIMITATION`：这表明 SQL Server 在压缩行组时内存不足，无法包含所有行。这表明存在内存压力，应进行研究以确定内存不足的原因，以及是否应为
    SQL Server 添加更多内存来解决此问题。这种性质的内存压力很可能也会影响服务器上的其他进程，缓解它将对它们以及列存储索引构建过程有益。

    *   `RESIDUAL_ROW_GROUP`：当索引构建操作完成时，剩余的行将使用此修剪原因压缩进行组。这是正常的，不需要调查。

    *   `AUTO_MERGE`：当元组移动器（tuple mover）运行并将多个行组合并在一起时，会产生此结果。这是好事，因为它有助于形成更大的行组，并移除尺寸过小的行组。


    #### Transition_to_compressed_state_desc


    此列描述了行组如何从增量存储区移动到列存储索引内的一组压缩段中。它提供了关于行组如何创建的附加信息，并可与修剪原因结合使用，以了解所有行组的创建方式（无论是否被修剪）。转换到压缩状态描述的可能值包括：


    *   `NOT_APPLICABLE`：这出现在增量存储区行组中，或在 SQL Server 2016 之前压缩的行组中（当时未维护此历史记录）。

    *   `INDEX_BUILD`：此行组通过索引构建过程压缩。

    *   `TUPLE_MOVER`：此行组由元组移动器在从增量存储区插入数据后压缩。

    *   `REORG_NORMAL`：执行了索引重组过程，将一个已关闭的行组从增量存储区移动到列存储索引中。这发生在该行组已达到其完整行数并被关闭之后，但在它通过元组移动器异步移动之前。

    *   `REORG_FORCED`：执行了索引重组过程，将一个开放的行组从增量存储区移动到列存储索引中。这发生在该行组尚未达到其完整行数之前，通常它本应通过元组移动器异步移动。

    *   `BULKLOAD`：最小日志记录的批量加载过程创建了该行组，而未使用增量存储区。

    *   `MERGE`：元组移动器将多个行组合并为此压缩行组。


    请注意，除了与索引重组操作相关的两个转换原因外，其余原因都表明是通过 SQL Server 中的自动过程创建的压缩行组。这些原因应被视为正常操作的一部分，仅在遇到未解决的性能问题时才需要调查。

    '
- fmt: '# Rowgroup Statistics


    ## Has_vertipaq_optimization


    This indicates that the rows within a rowgroup could be reordered via Vertipaq
    optimization to improve the compression ratio for this rowgroup.


    If zero is indicated by this column, it is worth investigation. The space savings
    associated with Vertipaq optimization is nontrivial and will result in faster
    queries and less memory and storage consumption by a columnstore index. As discussed
    in the previous chapter, the two reasons why Vertipaq optimization may not occur
    are as follows:


    1.  The columnstore index resides on a memory-optimized table.

    2.  The columnstore index contains nonclustered rowstore indexes.


    Note that if a nonclustered rowstore index is removed from a clustered columnstore
    index, the Vertipaq optimization status will not change until an index rebuild
    is executed.


    Consider the benefits and drawbacks of architectural decisions that lead to Vertipaq
    optimization not being used, as there are valid reasons to have a columnstore
    index in memory, or to include nonclustered rowstore indexes.


    One solution for a columnstore index that requires a supporting nonclustered rowstore
    index is to implement a nonclustered index on the partitions with the data relevant
    to the queries requiring the index. Vertipaq optimization will only be impacted
    on rowgroups on partitions that contain the nonclustered index. Typically, data
    can be separated into hot, warm, and cold data, depending on common workloads.
    Secondary indexes can be split across partitions to target those different workloads
    effectively.


    Similarly, filtered nonclustered rowstore indexes may be used to further limit
    the size of the index and reduce its scope and impact on compression and storage.


    ## Created_time


    This indicates the time that a rowgroup was created. This can help in understanding
    how many rowgroups are created over time and the number of rows being added to
    the columnstore index per unit time. In addition, `created_time` can be correlated
    to `size_in_bytes`, allowing the increase in size of the columnstore index to
    be measured over time in bytes.


    ## Rowgroup Operational Statistics


    SQL Server maintains cumulative details on the usage of columnstore indexes and
    provides those details at the rowgroup level. This allows for an understanding
    of which rowgroups within a columnstore index constitute hot, warm, or cold data
    and for granular detail as to how each rowgroup is used.


    The query in Listing 6-4 returns operational data for a single columnstore index.


    ```sql

    SELECT

    objects.name AS table_name,

    indexes.name AS index_name,

    dm_db_column_store_row_group_operational_stats.row_group_id,

    dm_db_column_store_row_group_operational_stats.index_scan_count,

    dm_db_column_store_row_group_operational_stats.scan_count,

    dm_db_column_store_row_group_operational_stats.delete_buffer_scan_count,

    dm_db_column_store_row_group_operational_stats.row_group_lock_count,

    dm_db_column_store_row_group_operational_stats.row_group_lock_wait_count,

    dm_db_column_store_row_group_operational_stats.row_group_lock_wait_in_ms,

    dm_db_column_store_row_group_operational_stats.returned_row_count

    FROM sys.dm_db_column_store_row_group_operational_stats

    INNER JOIN sys.objects

    ON objects.object_id = dm_db_column_store_row_group_operational_stats.object_id

    INNER JOIN sys.indexes

    ON indexes.object_id = dm_db_column_store_row_group_operational_stats.object_id

    AND indexes.index_id = dm_db_column_store_row_group_operational_stats.index_id

    WHERE objects.name = ''Sale_CCI'';

    ```


    Listing 6-4: Query That Returns Columnstore Rowgroup Operational Statistics


    The results in Figure 6-4 show individualized operational data for each rowgroup.


    ![](images/521866_1_En_6_Chapter/521866_1_En_6_Fig4_HTML.jpg)

    Figure 6-4: Rowgroup operational stats for the columnstore index on Sale_CCI


    All metrics in this view are cumulative since the last restart of the SQL Server
    service. Therefore, to meaningfully use this data, it must be captured periodically
    to calculate the difference in measurements from one sample to the next.


    The following is a subset of columns that can be used to track detailed columnstore
    rowgroup usage.


    ### Index_scan_count


    This counts the number of times the columnstore index was scanned, regardless
    of which rowgroups were requested. This value will be identical for all rowgroups
    in a given partition.


    ### Scan_count


    This only counts the number of times this rowgroup was scanned. Comparing this
    to `index_scan_count` allows for an understanding of how often a particular rowgroup
    is needed to satisfy queries against the columnstore index.


    In typical OLAP data, older data will be required less often than newer data,
    and therefore rowgroups containing older data will see less scans than newer rowgroups.
    The scan count columns in this view can provide the necessary data to support
    storage changes for cold or warm data. If older data is needed for posterity but
    rarely queried, it can likely be off-loaded to slower and cheaper storage. Similarly,
    if there is a portion of data that is newer and critically important, it may benefit
    from faster storage.


    ### Delete_buffer_scan_count


    This counts the number of times that the delete bitmap was consulted in order
    to complete a query against this rowgroup. The delete buffer refers to both the
    delete bitmap as it is stored alongside the columnstore index as a b-tree, as
    well as the in-memory hash-table representation of that index.


    Typically, deleted rows in a columnstore index are not problematic until their
    quantity become large when compared to the size of the index. If `delete_buffer_scan_count`
    is a larger number that is close in value to `scan_count`, then an index rebuild
    may be worthwhile to remove the deleted rows from the index. Check the value for
    `deleted_rows` in `dm_db_column_store_row_group_physical_stats` first to validate
    that the number of deleted rows is indeed large before proceeding with index maintenance.
    While an index rebuild can be executed as an online operation, it is still computationally
    expensive and can be time-consuming for a large columnstore index.'
  raw: '#### Has_vertipaq_optimization


    This indicates that the rows within a rowgroup could be reordered via Vertipaq
    optimization to improve the compression ratio for this rowgroup.


    If zero is indicated by this column, it is worth investigation. The space savings
    associated with Vertipaq optimization is nontrivial and will result in faster
    queries and less memory and storage consumption by a columnstore index. As discussed
    in the previous chapter, the two reasons why Vertipaq optimization may not occur
    are as follows:


    1.  The columnstore index resides on a memory-optimized table.


    2.  The columnstore index contains nonclustered rowstore indexes.


    Note that if a nonclustered rowstore index is removed from a clustered columnstore
    index, the Vertipaq optimization status will not change until an index rebuild
    is executed.


    Consider the benefits and drawbacks of architectural decisions that lead to Vertipaq
    optimization not being used, as there are valid reasons to have a columnstore
    index in memory, or to include nonclustered rowstore indexes.


    One solution for a columnstore index that requires a supporting nonclustered rowstore
    index is to implement a nonclustered index on the partitions with the data relevant
    to the queries requiring the index. Vertipaq optimization will only be impacted
    on rowgroups on partitions that contain the nonclustered index. Typically, data
    can be separated into hot, warm, and cold data, depending on common workloads.
    Secondary indexes can be split across partitions to target those different workloads
    effectively.


    Similarly, filtered nonclustered rowstore indexes may be used to further limit
    the size of the index and reduce its scope and impact on compression and storage.


    #### Created_time


    This indicates the time that a rowgroup was created. This can help in understanding
    how many rowgroups are created over time and the number of rows being added to
    the columnstore index per unit time. In addition, *created_time* can be correlated
    to *size_in_bytes*, allowing the increase in size of the columnstore index to
    be measured over time in bytes.


    ### Rowgroup Operational Statistics


    SQL Server maintains cumulative details on the usage of columnstore indexes and
    provides those details at the rowgroup level. This allows for an understanding
    of which rowgroups within a columnstore index constitute hot, warm, or cold data
    and for granular detail as to how each rowgroup is used.


    The query in Listing [6-4](#521866_1_En_6_Chapter.xhtml#PC4) returns operational
    data for a single columnstore index.


    ```

    SELECT

    objects.name AS table_name,

    indexes.name AS index_name,

    dm_db_column_store_row_group_operational_stats.row_group_id,

    dm_db_column_store_row_group_operational_stats.index_scan_count,

    dm_db_column_store_row_group_operational_stats.scan_count,

    dm_db_column_store_row_group_operational_stats.delete_buffer_scan_count,

    dm_db_column_store_row_group_operational_stats.row_group_lock_count,

    dm_db_column_store_row_group_operational_stats.row_group_lock_wait_count,

    dm_db_column_store_row_group_operational_stats.row_group_lock_wait_in_ms,

    dm_db_column_store_row_group_operational_stats.returned_row_count

    FROM sys.dm_db_column_store_row_group_operational_stats

    INNER JOIN sys.objects

    ON objects.object_id = dm_db_column_store_row_group_operational_stats.object_id

    INNER JOIN sys.indexes

    ON indexes.object_id = dm_db_column_store_row_group_operational_stats.object_id

    AND indexes.index_id = dm_db_column_store_row_group_operational_stats.index_id

    WHERE objects.name = ''Sale_CCI'';

    Listing 6-4

    Query That Returns Columnstore Rowgroup Operational Statistics

    ```


    The results in Figure [6-4](#521866_1_En_6_Chapter.xhtml#Fig4) show individualized
    operational data for each rowgroup.


    ![](images/521866_1_En_6_Chapter/521866_1_En_6_Fig4_HTML.jpg)


    Figure 6-4


    Rowgroup operational stats for the columnstore index on Sale_CCI


    All metrics in this view are cumulative since the last restart of the SQL Server
    service. Therefore, to meaningfully use this data, it must be captured periodically
    to calculate the difference in measurements from one sample to the next.


    The following is a subset of columns that can be used to track detailed columnstore
    rowgroup usage.


    #### Index_scan_count


    This counts the number of times the columnstore index was scanned, regardless
    of which rowgroups were requested. This value will be identical for all rowgroups
    in a given partition.


    #### Scan_count


    This only counts the number of times this rowgroup was scanned. Comparing this
    to *index_scan_count* allows for an understanding of how often a particular rowgroup
    is needed to satisfy queries against the columnstore index.


    In typical OLAP data, older data will be required less often than newer data,
    and therefore rowgroups containing older data will see less scans than newer rowgroups.
    The scan count columns in this view can provide the necessary data to support
    storage changes for cold or warm data. If older data is needed for posterity but
    rarely queried, it can likely be off-loaded to slower and cheaper storage. Similarly,
    if there is a portion of data that is newer and critically important, it may benefit
    from faster storage.


    #### Delete_buffer_scan_count


    This counts the number of times that the delete bitmap was consulted in order
    to complete a query against this rowgroup. The delete buffer refers to both the
    delete bitmap as it is stored alongside the columnstore index as a b-tree, as
    well as the in-memory hash-table representation of that index.


    Typically, deleted rows in a columnstore index are not problematic until their
    quantity become large when compared to the size of the index. If *delete_buffer_scan_count*
    is a larger number that is close in value to scan_count, then an index rebuild
    may be worthwhile to remove the deleted rows from the index. Check the value for
    *deleted_rows* in *dm_db_column_store_row_group_physical_stats* first to validate
    that the number of deleted rows is indeed large before proceeding with index maintenance.
    While an index rebuild can be executed as an online operation, it is still computationally
    expensive and can be time-consuming for a large columnstore index.'
  trans: '

    # 行组统计


    ## Has_vertipaq_optimization


    此列指示行组内的行是否可以通过 Vertipaq 优化重新排序，以提高此行组的压缩率。


    如果此列显示为零，则值得调查。Vertipaq 优化所带来的空间节省非常显著，它将使查询速度更快，并减少列存储索引的内存和存储消耗。正如前一章所讨论的，Vertipaq
    优化可能未发生的两个原因如下：


    1.  列存储索引驻留在内存优化表上。

    2.  列存储索引包含非聚集行存储索引。


    请注意，如果从聚集列存储索引中移除非聚集行存储索引，Vertipaq 优化状态在执行索引重建之前不会更改。


    请仔细考量导致未使用 Vertipaq 优化的架构决策的利弊，因为将列存储索引置于内存中或包含非聚集行存储索引都有其合理的原因。


    对于需要支持性非聚集行存储索引的列存储索引，一个解决方案是在包含查询所需数据的分区上实现非聚集索引。Vertipaq 优化将只影响包含该非聚集索引的分区上的行组。通常，根据常见的工作负载，可以将数据分离为热数据、温数据和冷数据。可以将辅助索引跨分区拆分，以有效地针对这些不同的工作负载。


    类似地，可以使用筛选的非聚集行存储索引来进一步限制索引大小，并减少其对压缩和存储的范围和影响。


    ## Created_time


    此列指示行组的创建时间。这有助于了解随时间推移创建了多少行组，以及单位时间内添加到列存储索引的行数。此外，`created_time` 可以与 `size_in_bytes`
    相关联，从而可以测量列存储索引大小随时间以字节为单位的增长。


    ## 行组操作统计


    SQL Server 维护有关列存储索引使用情况的累积详细信息，并在行组级别提供这些详细信息。这有助于理解列存储索引中的哪些行组构成了热数据、温数据或冷数据，并提供每个行组使用方式的详细粒度信息。


    清单 6-4 中的查询返回单个列存储索引的操作数据。


    ```sql

    SELECT

    objects.name AS table_name,

    indexes.name AS index_name,

    dm_db_column_store_row_group_operational_stats.row_group_id,

    dm_db_column_store_row_group_operational_stats.index_scan_count,

    dm_db_column_store_row_group_operational_stats.scan_count,

    dm_db_column_store_row_group_operational_stats.delete_buffer_scan_count,

    dm_db_column_store_row_group_operational_stats.row_group_lock_count,

    dm_db_column_store_row_group_operational_stats.row_group_lock_wait_count,

    dm_db_column_store_row_group_operational_stats.row_group_lock_wait_in_ms,

    dm_db_column_store_row_group_operational_stats.returned_row_count

    FROM sys.dm_db_column_store_row_group_operational_stats

    INNER JOIN sys.objects

    ON objects.object_id = dm_db_column_store_row_group_operational_stats.object_id

    INNER JOIN sys.indexes

    ON indexes.object_id = dm_db_column_store_row_group_operational_stats.object_id

    AND indexes.index_id = dm_db_column_store_row_group_operational_stats.index_id

    WHERE objects.name = ''Sale_CCI'';

    ```


    清单 6-4: 返回列存储行组操作统计的查询


    图 6-4 中的结果显示了每个行组的独立操作数据。


    ![](img/521866_1_En_6_Fig4_HTML.jpg)

    图 6-4: Sale_CCI 上列存储索引的行组操作统计


    此视图中的所有指标都是自上次重启 SQL Server 服务以来的累积值。因此，要有效地使用这些数据，必须定期捕获它，以计算从一个样本到下一个样本的测量值差异。


    以下是可用于跟踪详细列存储行组使用情况的部分列。


    ### Index_scan_count


    此列计算列存储索引被扫描的次数，无论请求了哪些行组。对于给定分区中的所有行组，此值将相同。


    ### Scan_count


    此列仅计算扫描此行组的次数。将其与 `index_scan_count` 进行比较，可以了解满足针对列存储索引的查询时需要特定行组的频率。


    在典型的 OLAP 数据中，较旧的数据比较新的数据需要得少，因此包含较旧数据的行组比较新的行组扫描次数更少。此视图中的扫描计数列可以提供必要的数据来支持冷数据或温数据的存储变更。如果较旧的数据出于历史原因需要但很少被查询，则可能可以将其卸载到速度较慢但成本较低的存储上。类似地，如果有一部分数据是较新的且至关重要，则可能受益于更快的存储。


    ### Delete_buffer_scan_count


    此列计算为完成针对此行组的查询而需要查阅删除位图的次数。删除缓冲区指的是作为 b-tree 与列存储索引一起存储的删除位图，以及该索引的内存中哈希表表示。


    通常，列存储索引中的删除行直到其数量与索引大小相比变得很大时才会成为问题。如果 `delete_buffer_scan_count` 是一个接近 `scan_count`
    值的大数字，则重建索引以从索引中移除删除行可能是值得的。在继续进行索引维护之前，请先检查 `dm_db_column_store_row_group_physical_stats`
    中的 `deleted_rows` 值，以验证删除行的数量确实很大。虽然索引重建可以作为联机操作执行，但对于大型列存储索引来说，它仍然计算开销大且耗时。

    '
- fmt: "### Row_group_lock_count, Row_group_lock_wait_count, and Row_group_lock_wait_in_ms\n\
    \n这些指标提供了针对此行组的锁请求计数（及详细信息）。这些通常是列存储索引写入与读取操作冲突的结果。行组锁在活跃写入的行组上最常见，而在较旧的行组上则不常见。\n\
    \n行组锁定本身并非坏事，但如果数据加载与分析过程之间存在严重争用，那么了解哪些行组导致争用有助于解决该情况。\n\n更新操作最有可能引起争用，因为它需要同时写入删除位图和增量存储。虽然更新单行会影响两个行组（一个用于删除位图，一个用于增量存储），但较大的更新可能会影响许多行组。在这些场景中，更新引起的锁定可能相当具有破坏性。\n\
    \n同样，如果数据在一天中不断少量流入列存储索引，相比于通过单一集中式流程在非分析高峰期进行不频繁的管理，发生争用的机会更大。\n\n与许多性能挑战一样，在需要时调查争用问题。如果`Row_group_lock_count`看起来很高，但分析速度（和最终用户满意度）良好，那么这个事实最好记录下来留待日后参考，但暂不采取行动。始终交叉参考`Row_group_lock_wait_count`和`Row_group_lock_wait_in_ms`，以确定锁定是否导致了等待。如果等待次数或等待时间不高，则可能不需要进一步行动。如果不确定总等待时间是否过高，请考虑每次锁等待事件的平均等待时间，如清单[6-5](#521866_1_En_6_Chapter.xhtml#PC5)中的查询所示。\n\
    \n```sql\nSELECT\n    objects.name AS table_name,\n    indexes.name AS index_name,\n\
    \    dm_db_column_store_row_group_operational_stats.row_group_id,\n    dm_db_column_store_row_group_operational_stats.scan_count,\n\
    \    dm_db_column_store_row_group_operational_stats.row_group_lock_wait_count,\n\
    \    dm_db_column_store_row_group_operational_stats.row_group_lock_wait_in_ms,\n\
    \    CASE\n        WHEN dm_db_column_store_row_group_operational_stats.row_group_lock_wait_count\
    \ = 0 THEN 0\n        ELSE CAST(CAST(dm_db_column_store_row_group_operational_stats.row_group_lock_wait_in_ms\
    \ AS DECIMAL(16,2)) /\n                  CAST(dm_db_column_store_row_group_operational_stats.row_group_lock_wait_count\
    \ AS DECIMAL(16,2)) AS DECIMAL(16,2))\n    END AS lock_wait_ms_per_wait_incidence\n\
    FROM sys.dm_db_column_store_row_group_operational_stats\nINNER JOIN sys.objects\n\
    \    ON objects.object_id = dm_db_column_store_row_group_operational_stats.object_id\n\
    INNER JOIN sys.indexes\n    ON indexes.object_id = dm_db_column_store_row_group_operational_stats.object_id\n\
    \    AND indexes.index_id = dm_db_column_store_row_group_operational_stats.index_id\n\
    WHERE objects.name = 'Sale_CCI';\n```\n**清单 6-5**\n**计算每次锁等待事件的锁等待时间的公式**\n\n\
    返回的详细信息有助于理解：\n* 针对某个行组的操作中有多少导致了锁定/等待？\n* 当发生锁定等待时，等待了多久？\n* 等待时间与行组的整体性能相比如何？\n\
    \n如果争用在列存储索引中是个问题，请考虑优化数据加载流程。将更新操作分解为一系列删除和插入操作。这减少了数据加载期间的事务大小，加快了更新操作速度，并降低了显著争用的可能性。尽可能利用大批量插入的批量加载流程，因为它们更快、产生的争用更少，并且减少了事务日志大小。最后，确保对列存储索引的写入尽可能减少并集中化。如果中间写入操作可以在修改列存储索引数据之前针对临时表进行，那么结果将是分析所用数据上的争用减少，并且数据加载速度更快。最佳实践（如这些）在第[15](#521866_1_En_15_Chapter.xhtml)章中有更详细的讨论。\n\
    \n#### Returned_row_count\n\n另一个有助于量化利用率的附加指标是返回的行数总计。这提供了在一段时间内从此行组读取了多少数据的额外维度，并可以与索引中的其他行组进行比较。请注意，较低的行计数可能是由于该行组包含的行数本身较少，而不仅仅是使用率较低所致。\n\
    \n### Columnstore Index Memory Usage\n\n系统视图`sys.dm_column_store_object_pool`提供了关于分配给列存储索引的内存的详细信息。这可以帮助解决内存压力问题，以及在创建列存储索引表时进行容量规划。这是一个跨整个服务器的共享视图；因此，当仅为单个数据库查看元数据时，按数据库名称进行过滤是有用的。\n\
    \n清单[6-6](#521866_1_En_6_Chapter.xhtml#PC6)中的查询返回特定列存储索引的内存使用详细信息。\n\n```sql\n\
    SELECT\n    databases.name,\n    objects.name,\n    indexes.name,\n    columns.name,\n\
    \    dm_column_store_object_pool.row_group_id,\n    dm_column_store_object_pool.object_type_desc,\n\
    \    dm_column_store_object_pool.access_count,\n    dm_column_store_object_pool.memory_used_in_bytes,\n\
    \    dm_column_store_object_pool.object_load_time\nFROM sys.dm_column_store_object_pool\n\
    INNER JOIN sys.objects\n    ON objects.object_id = dm_column_store_object_pool.object_id\n\
    INNER JOIN sys.indexes\n    ON indexes.object_id = dm_column_store_object_pool.object_id\n\
    \    AND indexes.index_id = dm_column_store_object_pool.index_id\nINNER JOIN sys.databases\n\
    \    ON databases.database_id = dm_column_store_object_pool.database_id\nLEFT\
    \ JOIN sys.columns\n    ON columns.column_id = dm_column_store_object_pool.column_id\n\
    \    AND columns.object_id = dm_column_store_object_pool.object_id\nWHERE objects.name\
    \ = 'Sale_CCI'\n    AND databases.name = DB_NAME()\nORDER BY dm_column_store_object_pool.row_group_id,\
    \ columns.name;\n```\n**清单 6-6**\n**按 Sale_CCI 表统计的列存储内存使用情况**\n\n结果如图[6-5](#521866_1_En_6_Chapter.xhtml#Fig5)所示。\n\
    \n![列存储索引的内存消耗示例](images/521866_1_En_6_Chapter/521866_1_En_6_Fig5_HTML.jpg)\n\
    **图 6-5**\n**列存储索引的内存消耗示例**\n\n请注意`sys.dm_column_store_object_pool`返回的详细程度。结果表明最近运行了一个查询，该查询针对了`Invoice\
    \ Date Key`和`Quantity`列。由于列存储索引将每一列单独存储在它们自己的段中，因此只需要将请求列的段读入内存。这与行存储索引不同，行存储索引的页面包含索引中的所有列，必须一起读取。\n\
    \n除了列段之外，内存还被删除位图和字典消耗，这提供了对列存储索引内每个对象所消耗内存的细粒度视图。以下是图[6-5](#521866_1_En_6_Chapter.xhtml#Fig5)中返回的每个新列的说明。"
  raw: '#### Row_group_lock_count, Row_group_lock_wait_count, and Row_group_lock_wait_in_ms


    These provide the count (and details) of lock requests against this rowgroup.
    These are typically the result of columnstore index writes colliding with reads.
    Rowgroup locks are most frequent against rowgroups that are actively being written,
    whereas locks against older rowgroups are uncommon.


    Rowgroup locking is not inherently a bad thing, but if severe contention is occurring
    between data loads and analytic processes, then understanding which rowgroups
    are causing contention can assist in troubleshooting that situation.


    Update operations will be the most likely to cause contention as they require
    writing both to the delete bitmap and to the delta store. While updating a single
    row would impact two rowgroups (one for the delete bitmap and one for the delta
    store), a larger update might impact many rowgroups. In these scenarios, the locking
    caused by the update can be quite disruptive.


    Similarly, if data is trickled into a columnstore index throughout the day, there
    is more opportunity for contention than if it is managed via a single centralized
    process less frequently and during a nonpeak time for analytics.


    As is the case for many performance challenges, investigate contention when needed.
    If *row_group_lock_count* appears high, but analytics speeds (and end-user happiness)
    are good, then that fact is best saved for posterity, but not acted on yet. Always
    cross-reference *Row_group_lock_wait_count* and *Row_group_lock_wait_in_ms* to
    determine if locking resulted in waits or not. If the count of waits or the wait
    time is not high, then further action is likely not needed. If unsure of whether
    or not the aggregate wait time is high or not, consider the lock wait time per
    lock incident, as given by the query in Listing [6-5](#521866_1_En_6_Chapter.xhtml#PC5).


    ```

    SELECT

    objects.name AS table_name,

    indexes.name AS index_name,

    dm_db_column_store_row_group_operational_stats.row_group_id,

    dm_db_column_store_row_group_operational_stats.scan_count,

    dm_db_column_store_row_group_operational_stats.row_group_lock_wait_count,

    dm_db_column_store_row_group_operational_stats.row_group_lock_wait_in_ms,

    CASE

    WHEN dm_db_column_store_row_group_operational_stats.row_group_lock_wait_count
    = 0 THEN 0

    ELSE CAST(CAST(dm_db_column_store_row_group_operational_stats.row_group_lock_wait_in_ms
    AS DECIMAL(16,2)) /

    CAST(dm_db_column_store_row_group_operational_stats.row_group_lock_wait_count
    AS DECIMAL(16,2)) AS DECIMAL(16,2))

    END AS lock_wait_ms_per_wait_incidence

    FROM sys.dm_db_column_store_row_group_operational_stats

    INNER JOIN sys.objects

    ON objects.object_id = dm_db_column_store_row_group_operational_stats.object_id

    INNER JOIN sys.indexes

    ON indexes.object_id = dm_db_column_store_row_group_operational_stats.object_id

    AND indexes.index_id = dm_db_column_store_row_group_operational_stats.index_id

    WHERE objects.name = ''Sale_CCI'';

    Listing 6-5

    Formula That Calculates the Lock Time per Lock Incidence

    ```


    The details returned provide an understanding of


    *   How many of the operations against a rowgroup resulted in locking/waits?


    *   How long were waits due to locking when they occurred?


    *   How does wait time compare to overall rowgroup performance?


    If contention is a problem within a columnstore index, consider streamlining data
    load processes. Break update operations into sequences of deletes and inserts.
    This reduces transaction size during data loads, speeds up update operations,
    and reduces the opportunity for contention to be significant. Utilize bulk load
    processes via large insert batches when possible as they will be faster, generate
    less contention, and reduce transaction log size. Lastly, ensure that writes against
    the columnstore index are reduced and centralized as much as possible. If intermediary
    write operations can be made against a temporary table prior to modifying columnstore
    index data, then the result will be less contention on the data used for analytics
    and faster data load speeds. Best practices such as these are discussed in more
    detail in Chapter [15](#521866_1_En_15_Chapter.xhtml).


    #### Returned_row_count


    One additional metric provided that can assist in quantifying utilization is the
    overall count of rows returned. This provides an additional dimension as to how
    much data is read from this rowgroup over a period of time and can be compared
    to other rowgroups in the index. Note that a lower row count may be the result
    of the rowgroup having less rows and not simply less usage.


    ### Columnstore Index Memory Usage


    The system view *sys.dm_column_store_object_pool* provides details about the memory
    allocated to columnstore indexes. This can assist in troubleshooting memory pressure,
    as well as capacity planning when creating a columnstore index table. This is
    a shared view across an entire server; therefore, filtering on the database name
    is useful when viewing metadata solely for a single database.


    The query in Listing [6-6](#521866_1_En_6_Chapter.xhtml#PC6) returns details about
    memory usage for one specific columnstore index.


    ```

    SELECT

    databases.name,

    objects.name,

    indexes.name,

    columns.name,

    dm_column_store_object_pool.row_group_id,

    dm_column_store_object_pool.object_type_desc,

    dm_column_store_object_pool.access_count,

    dm_column_store_object_pool.memory_used_in_bytes,

    dm_column_store_object_pool.object_load_time

    FROM sys.dm_column_store_object_pool

    INNER JOIN sys.objects

    ON objects.object_id = dm_column_store_object_pool.object_id

    INNER JOIN sys.indexes

    ON indexes.object_id = dm_column_store_object_pool.object_id

    AND indexes.index_id = dm_column_store_object_pool.index_id

    INNER JOIN sys.databases

    ON databases.database_id = dm_column_store_object_pool.database_id

    LEFT JOIN sys.columns

    ON columns.column_id = dm_column_store_object_pool.column_id

    AND columns.object_id = dm_column_store_object_pool.object_id

    WHERE objects.name = ''Sale_CCI''

    AND databases.name = DB_NAME()

    ORDER BY dm_column_store_object_pool.row_group_id, columns.name;

    Listing 6-6

    Columnstore Memory Usage by the Sale_CCI Table

    ```


    The results are shown in Figure [6-5](#521866_1_En_6_Chapter.xhtml#Fig5).


    ![](images/521866_1_En_6_Chapter/521866_1_En_6_Fig5_HTML.jpg)


    Figure 6-5


    Sample of memory consumption by a columnstore index


    Note the level of detail returned by *sys.dm_column_store_object_pool*. The results
    indicate a query was recently run that targeted *Invoice Date Key*, as well as
    *Quantity*. Because a columnstore index stores each column separately in their
    own segments, it is only necessary to read segments into memory for the requested
    columns. This differs from rowstore indexes, where pages contain all columns in
    the index and must be read together.


    In addition to column segments, memory is consumed by delete bitmaps and dictionaries,
    allowing for a granular view of the memory consumed by each object within a columnstore
    index. The following is a description of each new column returned in Figure [6-5](#521866_1_En_6_Chapter.xhtml#Fig5).'
  trans: "### Row_group_lock_count、Row_group_lock_wait_count 和 Row_group_lock_wait_in_ms\n\
    \n这些指标提供了针对此行组的锁请求计数（及详细信息）。它们通常是列存储索引写入与读取操作冲突的结果。行组锁在活跃写入的行组上最为常见，而在较旧的行组上则不常见。\n\
    \n行组锁定本身并非坏事，但如果数据加载与分析过程之间存在严重争用，那么了解哪些行组导致了争用，将有助于解决该情况。\n\n更新操作最有可能引起争用，因为它需要同时写入删除位图和增量存储。虽然更新单行会影响两个行组（一个用于删除位图，一个用于增量存储），但较大的更新可能会影响许多行组。在这些场景中，更新引起的锁定可能相当具有破坏性。\n\
    \n同样，如果数据在一天中不断少量流入列存储索引，相比于通过单一集中式流程在非分析高峰期进行不频繁的管理，发生争用的机会更大。\n\n与许多性能挑战一样，应在需要时调查争用问题。如果\
    \ `Row_group_lock_count` 看起来很高，但分析速度（和最终用户满意度）良好，那么这个事实最好记录下来留待日后参考，但暂不采取行动。始终交叉参考\
    \ `Row_group_lock_wait_count` 和 `Row_group_lock_wait_in_ms`，以确定锁定是否导致了等待。如果等待次数或等待时间不高，则可能不需要进一步行动。如果不确定总等待时间是否过高，请考虑每次锁等待事件的平均等待时间，如清单\
    \ 6-5 中的查询所示。\n\n```sql\nSELECT\n    objects.name AS table_name,\n    indexes.name\
    \ AS index_name,\n    dm_db_column_store_row_group_operational_stats.row_group_id,\n\
    \    dm_db_column_store_row_group_operational_stats.scan_count,\n    dm_db_column_store_row_group_operational_stats.row_group_lock_wait_count,\n\
    \    dm_db_column_store_row_group_operational_stats.row_group_lock_wait_in_ms,\n\
    \    CASE\n        WHEN dm_db_column_store_row_group_operational_stats.row_group_lock_wait_count\
    \ = 0 THEN 0\n        ELSE CAST(CAST(dm_db_column_store_row_group_operational_stats.row_group_lock_wait_in_ms\
    \ AS DECIMAL(16,2)) /\n                  CAST(dm_db_column_store_row_group_operational_stats.row_group_lock_wait_count\
    \ AS DECIMAL(16,2)) AS DECIMAL(16,2))\n    END AS lock_wait_ms_per_wait_incidence\n\
    FROM sys.dm_db_column_store_row_group_operational_stats\nINNER JOIN sys.objects\n\
    \    ON objects.object_id = dm_db_column_store_row_group_operational_stats.object_id\n\
    INNER JOIN sys.indexes\n    ON indexes.object_id = dm_db_column_store_row_group_operational_stats.object_id\n\
    \    AND indexes.index_id = dm_db_column_store_row_group_operational_stats.index_id\n\
    WHERE objects.name = 'Sale_CCI';\n```\n**清单 6-5**\n**计算每次锁等待事件的锁等待时间的公式**\n\n\
    返回的详细信息有助于理解：\n* 针对某个行组的操作中有多少导致了锁定/等待？\n* 当发生锁定等待时，等待了多久？\n* 等待时间与行组的整体性能相比如何？\n\
    \n如果争用在列存储索引中是个问题，请考虑优化数据加载流程。将更新操作分解为一系列删除和插入操作。这减少了数据加载期间的事务大小，加快了更新操作速度，并降低了显著争用的可能性。尽可能利用大批量插入的批量加载流程，因为它们更快、产生的争用更少，并且减少了事务日志大小。最后，确保对列存储索引的写入尽可能减少并集中化。如果中间写入操作可以在修改列存储索引数据之前针对临时表进行，那么结果将是分析所用数据上的争用减少，并且数据加载速度更快。最佳实践（如这些）在第\
    \ 15 章中有更详细的讨论。\n\n#### Returned_row_count\n\n另一个有助于量化利用率的附加指标是返回的行数总计。这提供了在一段时间内从此行组读取了多少数据的额外维度，并可以与索引中的其他行组进行比较。请注意，较低的行计数可能是由于该行组包含的行数本身较少，而不仅仅是使用率较低所致。\n\
    \n### 列存储索引内存使用情况\n\n系统视图 `sys.dm_column_store_object_pool` 提供了关于分配给列存储索引的内存的详细信息。这可以帮助解决内存压力问题，以及在创建列存储索引表时进行容量规划。这是一个跨整个服务器的共享视图；因此，当仅为单个数据库查看元数据时，按数据库名称进行过滤是有用的。\n\
    \n清单 6-6 中的查询返回特定列存储索引的内存使用详细信息。\n\n```sql\nSELECT\n    databases.name,\n    objects.name,\n\
    \    indexes.name,\n    columns.name,\n    dm_column_store_object_pool.row_group_id,\n\
    \    dm_column_store_object_pool.object_type_desc,\n    dm_column_store_object_pool.access_count,\n\
    \    dm_column_store_object_pool.memory_used_in_bytes,\n    dm_column_store_object_pool.object_load_time\n\
    FROM sys.dm_column_store_object_pool\nINNER JOIN sys.objects\n    ON objects.object_id\
    \ = dm_column_store_object_pool.object_id\nINNER JOIN sys.indexes\n    ON indexes.object_id\
    \ = dm_column_store_object_pool.object_id\n    AND indexes.index_id = dm_column_store_object_pool.index_id\n\
    INNER JOIN sys.databases\n    ON databases.database_id = dm_column_store_object_pool.database_id\n\
    LEFT JOIN sys.columns\n    ON columns.column_id = dm_column_store_object_pool.column_id\n\
    \    AND columns.object_id = dm_column_store_object_pool.object_id\nWHERE objects.name\
    \ = 'Sale_CCI'\n    AND databases.name = DB_NAME()\nORDER BY dm_column_store_object_pool.row_group_id,\
    \ columns.name;\n```\n**清单 6-6**\n**按 Sale_CCI 表统计的列存储内存使用情况**\n\n结果如图 6-5 所示。\n\
    \n![列存储索引的内存消耗示例](img/521866_1_En_6_Fig5_HTML.jpg)\n**图 6-5**\n**列存储索引的内存消耗示例**\n\
    \n请注意 `sys.dm_column_store_object_pool` 返回的详细程度。结果表明最近运行了一个查询，该查询针对了 `Invoice\
    \ Date Key` 和 `Quantity` 列。由于列存储索引将每一列单独存储在它们自己的段中，因此只需要将请求列的段读入内存。这与行存储索引不同，行存储索引的页面包含索引中的所有列，必须一起读取。\n\
    \n除了列段之外，内存还被删除位图和字典消耗，这提供了对列存储索引内每个对象所消耗内存的细粒度视图。以下是图 6-5 中返回的每个新列的说明。"
- fmt: '### Object_type_desc


    This is the type of columnstore object residing in memory. It will be one of the
    following values:


    - `COLUMN_SEGMENT`: Each row with this type represents a single columnstore segment.
    These entries will contain a value for `column_id`, allowing for further detail
    to be returned regarding the column that the segment belongs to.


    - `PRIMARY_DICTIONARY`, `SECONDARY_DICTIONARY`, and `BULKINSERT_DICTIONARY`: These
    represent dictionaries used for segments that are encoded with dictionary-based
    encoding. Typically, the space consumed by dictionaries and their corresponding
    column segments will be less than if the column were stored using value-based
    encoding.


    - `DELETE_BITMAP`: This represents memory consumed by delete bitmap objects. There
    will always be one delete bitmap per partition that spans all rowgroups in a columnstore
    index on that partition. The entries for each rowgroup indicate the granular details
    for the part of the delete bitmap associated with that particular rowgroup. These
    objects are present as containers, even if there are no rows indicated as deleted
    within them.


    ### Access_count


    This is a count of all read and write operations to this object in memory. This
    provides a rough measure of how much use the object has gotten and which objects
    in memory are used often vs. those that are used rarely.


    Because this view examines objects residing in memory, the data is transient and
    maintains history only for as long as an object is in memory. Therefore, access
    counts are only cumulative since the time given by `object_load_time`.


    ### Object_load_time


    This is the time that this object was read into the object pool in memory. Combined
    with `access_count`, the number of read or write operations per unit time can
    be calculated, which may be useful in gauging how much usage particular objects
    are getting in memory.


    The data provided in `dm_column_store_object_pool` can also be aggregated so that
    overall memory consumption by a given rowgroup, column, index, or object type
    can be measured. For example, the query in Listing 6-7 quantifies how much memory
    is consumed by each rowgroup.


    ```sql

    SELECT

    databases.name,

    objects.name,

    indexes.name,

    dm_column_store_object_pool.row_group_id,

    SUM(dm_column_store_object_pool.access_count) AS access_count,

    SUM(dm_column_store_object_pool.memory_used_in_bytes) AS memory_used_in_bytes

    FROM sys.dm_column_store_object_pool

    INNER JOIN sys.objects

    ON objects.object_id = dm_column_store_object_pool.object_id

    INNER JOIN sys.indexes

    ON indexes.object_id = dm_column_store_object_pool.object_id

    AND indexes.index_id = dm_column_store_object_pool.index_id

    INNER JOIN sys.databases

    ON databases.database_id = dm_column_store_object_pool.database_id

    LEFT JOIN sys.columns

    ON columns.column_id = dm_column_store_object_pool.column_id

    AND columns.object_id = dm_column_store_object_pool.object_id

    WHERE objects.name = ''Sale_CCI''

    AND databases.name = DB_NAME()

    GROUP BY databases.name, objects.name, indexes.name, dm_column_store_object_pool.row_group_id

    ORDER BY dm_column_store_object_pool.row_group_id;

    ```

    **Listing 6-7** Columnstore Memory Consumption by Rowgroup


    Figure 6-6 shows the results.


    ![Figure 6-6](images/521866_1_En_6_Chapter/521866_1_En_6_Fig6_HTML.jpg)


    **Figure 6-6** Memory consumption grouped by rowgroup


    Depending on the index, its metadata, and its usage, some rowgroups may use significantly
    more memory than others. In the example results in Figure 6-6, memory is used
    relatively equally per rowgroup, indicating that queries are reading data evenly
    from each rowgroup.


    ### Internal Columnstore Index Objects


    There is one additional view that provides internal details about the structure
    of a columnstore index, `sys.internal_partitions`. The query in Listing 6-8 returns
    details about any internal partitions associated with the rowgroups in a columnstore
    index.


    ```sql

    SELECT

    tables.name AS table_name,

    indexes.name AS index_name,

    partitions.partition_number,

    column_store_row_groups.row_group_id,

    column_store_row_groups.state_description,

    column_store_row_groups.total_rows,

    column_store_row_groups.size_in_bytes,

    column_store_row_groups.deleted_rows,

    internal_partitions.internal_object_type_desc,

    internal_partitions.rows,

    internal_partitions.data_compression_desc

    FROM sys.column_store_row_groups

    INNER JOIN sys.indexes

    ON indexes.index_id = column_store_row_groups.index_id

    AND indexes.object_id = column_store_row_groups.object_id

    INNER JOIN sys.tables

    ON tables.object_id = indexes.object_id

    INNER JOIN sys.partitions

    ON partitions.partition_number = column_store_row_groups.partition_number

    AND partitions.index_id = indexes.index_id

    AND partitions.object_id = tables.object_id

    LEFT JOIN sys.internal_partitions

    ON internal_partitions.object_id = tables.object_id

    WHERE tables.name = ''Sale_CCI''

    ORDER BY indexes.index_id, column_store_row_groups.row_group_id;

    ```

    **Listing 6-8** Internal Partitions Associated with a Columnstore Index


    The results of this query provide at least one row per rowgroup per partition,
    depending on the contents. Figure 6-7 contains a sample of this output.


    ![Figure 6-7](images/521866_1_En_6_Chapter/521866_1_En_6_Fig7_HTML.jpg)


    **Figure 6-7** Sample of internal columnstore index objects


    The internal columnstore objects shown illustrate the presence of both deleted
    rows and delta store contents. The `deleted_rows` column contains an individual
    count for each rowgroup, whereas the `rows` column contains aggregate details.


    The following are short descriptions of each new column in the result set and
    how it can be used to track the growth and usage of a columnstore index.'
