- fmt: '# 分区与非分区列存储索引的比较


    当完成后，将存在两个用于演示目的的表，它们完全相同，但一个进行了分区而另一个没有。两者都按 *Invoice Date Key* 排序，并且在被该列筛选时都将受益于行组消除。清单
    [11-7](#521866_1_En_11_Chapter.xhtml#PC7) 展示了对每个表针对单个月份聚合 *Quantity* 的两个查询。


    ```sql

    SELECT

    SUM([Quantity])

    FROM Fact.Sale_CCI_ORDERED

    WHERE [Invoice Date Key] >= ''1/1/2016''

    AND [Invoice Date Key] = ''1/1/2016''

    AND [Invoice Date Key] < ''2/1/2016'';

    ```

    **清单 11-7**

    针对非分区和分区列存储索引执行的窄分析查询


    虽然除了表名之外查询是相同的，但 `STATISTICS IO` 的输出说明了每个表在执行上的差异，如图 [11-8](#521866_1_En_11_Chapter.xhtml#Fig8)
    所示。


    ![](images/521866_1_En_11_Chapter/521866_1_En_11_Fig8_HTML.jpg)


    **图 11-8**

    非分区列存储索引与分区列存储索引的 `STATISTICS IO`


    `STATISTICS IO` 的输出显示了查询执行在每个表上不同的多种方式。最显著的差异在于报告的段读取数量。非分区表读取了 2 个段，同时跳过了 22
    个，而分区表读取了 1 个段，同时跳过了 3 个。这种 IO 反映了原始查询，该查询仅使用 *Invoice Date Key* 在 2016 年 1 月内的行来计算总和。


    对于已排序但未分区的表，在使用行组消除来跳过段之前，需要审查整个表的元数据。而在分区表中，不包含 2016 年数据的行组会被自动跳过。由于分区函数在评估列存储元数据之前进行计算，因此从未读取无关的行组，包括它们的元数据。这体现了分区消除的实际作用。虽然分区并非旨在作为一种查询优化解决方案，但它会对列存储索引
    IO 和查询速度产生积极影响，尤其是在较大的表上。


    分区还会影响查询优化器，它将在更少的行组和行上评估查询，这可以简化执行计划。图 [11-9](#521866_1_En_11_Chapter.xhtml#Fig9)
    展示了清单 [11-7](#521866_1_En_11_Chapter.xhtml#PC7) 中演示的分析查询的执行计划。


    ![](images/521866_1_En_11_Chapter/521866_1_En_11_Fig9_HTML.jpg)


    **图 11-9**

    非分区列存储索引与分区列存储索引的查询执行计划


    非分区表的执行计划更为复杂，因为 SQL Server 确定并行处理可能有助于处理大量行。分区表的执行计划更简单，因为优化器选择不使用并行处理。请注意，使用哈希匹配是为了支持将聚合下推到列存储索引扫描步骤中的
    `SUM` 运算符。同样值得注意的是，当需要读取的分区较少时，分区表（与非分区表相比）执行计划中读取的行数更低。


    尽管每个查询的输出相同，并且每个执行计划产生相同的结果集，但能够避免并行处理节省了计算资源，正如分区表查询成本大幅降低所暗示的那样。


    除了分区消除之外，索引维护也可以调整以跳过较旧的、更新较少的分区。例如，如果认为需要对此列存储索引进行重建以在最近的一些软件发布后清理它，非分区表将需要整体重建，如清单
    [11-8](#521866_1_En_11_Chapter.xhtml#PC8) 所示。


    ```sql

    ALTER INDEX CCI_fact_Sale_CCI_ORDERED ON Fact.Sale_CCI_ORDERED REBUILD;

    ```

    **清单 11-8**

    重建列存储索引的查询


    重建操作需要 61 秒完成。对于更大的列存储索引，时间可能显著更长。如果受软件发布影响的数据部分仅限于较新的数据，那么很可能只需要重建最新的分区。清单 [11-9](#521866_1_En_11_Chapter.xhtml#PC9)
    展示了如何对单个分区执行索引重建。


    ```sql

    ALTER INDEX CCI_fact_Sale_CCI_PARTITIONED ON Fact.Sale_CCI_PARTITIONED REBUILD
    PARTITION = 5;

    ```

    **清单 11-9**

    在列存储索引中重建当前分区的查询


    此次重建仅需 1 秒。这是因为最新的分区不包含一整年的数据。为了对重建时间提供更公平的评估，清单 [11-10](#521866_1_En_11_Chapter.xhtml#PC10)
    展示了对包含一整年数据的分区执行的重建操作。


    ```sql

    ALTER INDEX CCI_fact_Sale_CCI_PARTITIONED ON Fact.Sale_CCI_PARTITIONED REBUILD
    PARTITION = 4;

    ```

    **清单 11-10**

    在列存储索引中重建完整分区的查询


    此重建操作需要 11 秒完成。每个分区的重建都比被迫重建整个索引快得多。当需要进行索引维护时，这可以极大地减少其性能影响。


    另一个可以演示的独特功能是使用 `SWITCH` 选项，通过单个 DDL 操作将分区内容从一个表移动到另一个表。因为该操作是 DDL 元数据操作，而不是完全记录日志的数据移动过程，所以速度会快得多。这为快速数据加载和维护过程开辟了多种选择，否则这些过程的成本将高得令人望而却步。


    例如，如果确定 *Fact.Sale_CCI_PARTITIONED* 中从 1/1/2016 开始的所有数据都有错误，那么将其留在原地进行纠正将是一个挑战。更新列存储索引是一个缓慢且昂贵的过程，会导致严重的碎片，因此应尽可能避免。


    一种替代方法是将分区切换出去，修改数据，然后将数据重新插入表中。这样可以在进行任何更改之前隔离要修改的数据。清单 [11-11](#521866_1_En_11_Chapter.xhtml#PC11)
    中的脚本创建了一个与 *Fact.Sale_CCI_PARTITIONED* 具有相同架构的新暂存表，该表将用作分区切换的目标。


    ```sql

    CREATE TABLE Fact.Sale_CCI_STAGING

    (      [Sale Key] [bigint] NOT NULL,

    [City Key] [int] NOT NULL,

    [Customer Key] [int] NOT NULL,

    [Bill To Customer Key] [int] NOT NULL,

    [Stock Item Key] [int] NOT NULL,

    [Invoice Date Key] [date] NOT NULL,

    [Delivery Date Key] [date] NULL,

    [Salesperson Key] [int] NOT NULL,

    [WWI Invoice ID] [int] NOT NULL,

    [Description] [nvarchar](100) NOT NULL,

    [Package] [nvarchar](50) NOT NULL,

    [Quantity] [int] NOT NULL,

    [Unit Price] [decimal](18, 2) NOT NULL,

    [Tax Rate] [decimal](18, 3) NOT NULL,

    [Total Excluding Tax] [decimal](18, 2) NOT NULL,

    [Tax Amount] [decimal](18, 2) NOT NULL,

    [Profit] [decimal](18, 2) NOT NULL,

    [Total Including Tax] [decimal](18, 2) NOT NULL,

    [Total Dry Items] [int] NOT NULL,

    [Total Chiller Items] [int] NOT NULL,

    [Lineage Key] [int] NOT NULL)

    ON WideWorldImportersDW_2016_fg;

    CREATE CLUSTERED COLUMNSTORE INDEX CCI_fact_Sale_CCI_STAGING ON Fact.Sale_CCI_STAGING;

    ```

    **清单 11-11**

    用于分区切换操作的脚本，以创建暂存表


    请注意，暂存表是在与要切换的源数据相同的文件组上创建的。如果需要，可以使用与 *Fact.Sale_CCI_PARTITIONED* 相同的分区方案创建暂存表，这将允许在分区切换中指定分区号，而不必在表创建语句中显式提供文件组。语法是任意的，操作员可以根据实施方便性选择哪种方式更容易实现。'
  raw: 'When complete, two tables will exist for demonstration purposes that are identical,
    except that one is partitioned and the other is not. Both are ordered by *Invoice
    Date Key* and will benefit from rowgroup elimination whenever filtered by that
    column. Listing [11-7](#521866_1_En_11_Chapter.xhtml#PC7) shows two queries that
    aggregate *Quantity* for a single month against each table.


    ```

    SELECT

    SUM([Quantity])

    FROM Fact.Sale_CCI_ORDERED

    WHERE [Invoice Date Key] >= ''1/1/2016''

    AND [Invoice Date Key] = ''1/1/2016''

    AND [Invoice Date Key] < ''2/1/2016'';

    Listing 11-7

    Narrow Analytic Queries Executed Against Nonpartitioned and Partitioned Columnstore
    Indexes

    ```


    While the queries are identical aside from the table name, the STATISTICS IO output
    illustrates the differences in execution between each, as seen in Figure [11-8](#521866_1_En_11_Chapter.xhtml#Fig8).


    ![](images/521866_1_En_11_Chapter/521866_1_En_11_Fig8_HTML.jpg)


    Figure 11-8


    STATISTICS IO for a nonpartitioned columnstore index vs. a partitioned columnstore
    index


    The output of STATISTICS IO shows multiple ways in which query execution varied
    for each table. The most significant difference is in the reported segment reads.
    The nonpartitioned table read 2 segments while skipping 22, whereas the partitioned
    table read 1 segment while skipping 3\. This IO reflects the original query that
    calculates a sum using only rows with an *Invoice Date Key* within January 2016.


    For the table that is ordered and not partitioned, metadata needs to be reviewed
    from the entire table prior to using rowgroup elimination to skip segments. In
    the partitioned table, though, rowgroups that do not contain data from 2016 are
    automatically skipped. Since partition functions are evaluated prior to evaluating
    columnstore metadata, unrelated rowgroups are never read, including their metadata.
    This represents partition elimination in action. While partitioning is not intended
    to be a query optimization solution, it will have a positive impact on columnstore
    index IO and query speeds, especially on larger tables.


    Partitioning also impacts the query optimizer , which will evaluate a query across
    less rowgroups and rows, which can simplify execution plans. Figure [11-9](#521866_1_En_11_Chapter.xhtml#Fig9)
    shows the execution plans for the analytic queries demonstrated in Listing [11-7](#521866_1_En_11_Chapter.xhtml#PC7).


    ![](images/521866_1_En_11_Chapter/521866_1_En_11_Fig9_HTML.jpg)


    Figure 11-9


    Query execution plans for a nonpartitioned columnstore index vs. a partitioned
    columnstore index


    The execution plan for the nonpartitioned table is more complex as SQL Server
    determines that parallelism may help in processing the large number of rows. The
    execution plan for the partitioned table is simpler, as the optimizer chooses
    to not use parallelism. Note that the use of a hash match is to support the aggregate
    pushdown for the SUM operator into the columnstore index scan step. Also interesting
    to note is that the count of rows read in the execution plan is lower on a partitioned
    table (vs. a nonpartitioned table) when less partitions need to be read.


    While the output of each query is identical and each execution plan produces the
    same result set, the ability to forgo parallelism saves computing resources, as
    is implied by the greatly reduced query cost for the partitioned table.


    In addition to partition elimination, index maintenance can be adjusted to skip
    older, less updated partitions. For example, if a rebuild was deemed necessary
    for this columnstore index to clean it up after some recent software releases,
    the nonpartitioned table would need to be rebuilt en masse, as seen in Listing
    [11-8](#521866_1_En_11_Chapter.xhtml#PC8).


    ```

    ALTER INDEX CCI_fact_Sale_CCI_ORDERED ON Fact.Sale_CCI_ORDERED REBUILD;

    Listing 11-8

    Query to Rebuild a Columnstore Index

    ```


    The rebuild operation takes 61 seconds to complete. For a larger columnstore index,
    it could be significantly longer. If the portion of data impacted by the software
    release is limited to newer data only, it is very likely that only the most current
    partition needs to be rebuilt. Listing [11-9](#521866_1_En_11_Chapter.xhtml#PC9)
    shows how an index rebuild can be executed against a single partition.


    ```

    ALTER INDEX CCI_fact_Sale_CCI_PARTITIONED ON Fact.Sale_CCI_PARTITIONED REBUILD
    PARTITION = 5;

    Listing 11-9

    Query to Rebuild the Current Partition in a Columnstore Index

    ```


    This rebuild only takes 1 second. This is because the most recent partition does
    not contain a full year of data. To provide a fairer assessment of rebuild times,
    Listing [11-10](#521866_1_En_11_Chapter.xhtml#PC10) shows a rebuild operation
    against a partition that contains a full year of data.


    ```

    ALTER INDEX CCI_fact_Sale_CCI_PARTITIONED ON Fact.Sale_CCI_PARTITIONED REBUILD
    PARTITION = 4;

    Listing 11-10

    Query to Rebuild a Full Partition in a Columnstore Index

    ```


    This rebuild operation requires 11 seconds to complete. Each partition rebuild
    is significantly faster than being forced to rebuild the entire index. This can
    greatly reduce the performance impact of index maintenance, when it is needed.


    Another unique feature that can be demonstrated is the use of the SWITCH option
    to move the contents of a partition from one table to another using a single DDL
    operation. Because the operation is a DDL metadata operation and not a fully logged
    data movement process, it will be significantly faster. This opens up a variety
    of options for speedy data load and maintenance processes that otherwise would
    be prohibitively expensive.


    For example, if it were determined that all data in *Fact.Sale_CCI_PARTITIONED*
    had an error starting on 1/1/2016, correcting it would be a challenge if left
    in place. Updating a columnstore index is a slow and expensive process that results
    in heavy fragmentation and is therefore worth avoiding if possible.


    An alternative to this would be to switch out the partition, modify the data,
    and then reinsert the data back into the table. This allows the data that is to
    be modified to be isolated prior to making any changes. The script in Listing
    [11-11](#521866_1_En_11_Chapter.xhtml#PC11) creates a new staging table with the
    same schema as *Fact.Sale_CCI_PARTITIONED* that will be used as the target for
    a partition switch.


    ```

    CREATE TABLE Fact.Sale_CCI_STAGING

    (      [Sale Key] [bigint] NOT NULL,

    [City Key] [int] NOT NULL,

    [Customer Key] [int] NOT NULL,

    [Bill To Customer Key] [int] NOT NULL,

    [Stock Item Key] [int] NOT NULL,

    [Invoice Date Key] [date] NOT NULL,

    [Delivery Date Key] [date] NULL,

    [Salesperson Key] [int] NOT NULL,

    [WWI Invoice ID] [int] NOT NULL,

    [Description] [nvarchar](100) NOT NULL,

    [Package] [nvarchar](50) NOT NULL,

    [Quantity] [int] NOT NULL,

    [Unit Price] [decimal](18, 2) NOT NULL,

    [Tax Rate] [decimal](18, 3) NOT NULL,

    [Total Excluding Tax] [decimal](18, 2) NOT NULL,

    [Tax Amount] [decimal](18, 2) NOT NULL,

    [Profit] [decimal](18, 2) NOT NULL,

    [Total Including Tax] [decimal](18, 2) NOT NULL,

    [Total Dry Items] [int] NOT NULL,

    [Total Chiller Items] [int] NOT NULL,

    [Lineage Key] [int] NOT NULL)

    ON WideWorldImportersDW_2016_fg;

    CREATE CLUSTERED COLUMNSTORE INDEX CCI_fact_Sale_CCI_STAGING ON Fact.Sale_CCI_STAGING;

    Listing 11-11

    Script to Create a Staging Table for Use in a Partition Switching Operation

    ```


    Note that the staging table is created on the same filegroup as the source data
    that is to be switched. If desired, the staging table could be created using the
    same partition scheme as *Fact.Sale_CCI_PARTITIONED*, which would allow the partition
    number to be specified in the partition switch, rather than having to explicitly
    provide a filegroup in the table create statement. The syntax is arbitrary and
    can be left to the convenience of the operator as to which is easier to implement.'
