    a column that tends to group data together alongside nonsimilar values, then wider
    columns might become the source of dictionary pressure.


    The column that a columnstore index is ordered on should always be the one that
    is most frequently used to filter queries. If there are a variety of common search
    criteria, then there may be other sorting options that provide better compression
    and performance.


    This solution to dictionary pressure requires before-and-after testing of common
    analytic queries to ensure that one problem (dictionary pressure) is not being
    traded for another (poor analytic query performance).'
  trans: '

    此例也展示了一个相当直接的、大约每年翻倍的增长情况。如果预计这一增长率将持续，并且热数据和温数据的年份预计每年向前滚动，那么一年后，当前的热数据（18GB）将变为温数据，当前的温数据（10GB）将变为冷数据，而明年的数据（约
    35GB）将成为新的热数据。因此，逐年增长将表示为


    *   (35GB + 18GB) - (18GB + 10GB) = `25GB`。


    请注意，内存中使用的 `columnstore` 数据大小通常与数据总量不同。一个拥有 20 列的 `columnstore` 索引，其各列的使用可能并不均衡。某些列很可能很少被使用。如果是这种情况，那么内存估算可以相应调低所需的内存量，以考虑到那些不常驻内存的列。虽然这些不常被查询的列不能归类为冷数据，但可以从内存总量中扣除它们，以确保内存估算不会因那些很少需要的段而过度膨胀。


    例如，如果 2021 年的 18GB 数据中包含了 5GB 很少被查询的列，并且有把握知道这些列的使用频率有多低，那么该数据的内存估算可以从 18GB 减少到低至
    13GB。


    这项工作涉及大量的估算。在最高端，内存预算可以涵盖 `columnstore` 索引消耗的所有空间。在最低端，可能不会为这些分析分配内存。一个切合实际的估算将处于两者之间，并将受到对这些数据所需的性能以及计算资源的可用性/成本的影响。


    ## 字典大小与字典压力


    字典编码是 SQL Server 能用以提高 `columnstore` 压缩效率的众多方法之一。第 5 章详细讨论了编码方法，以及 `columnstore`
    索引如何利用字典编码来大幅减小具有重复值的列的索引大小。


    虽然字典可以跨多个段共享，但字典编码的一个注意事项是其大小上限为 16 兆字节。因此，如果一个列具有较宽且不常重复的值，那么结果可能是一个字典在 `rowgroup`
    完全写满之前就已填满。字典被填满的情况被称为字典压力。虽然字典被限制为 16MB，但字典压力通常会在远低于此大小的情况下发生，因为限制的是将消耗多少空间，而不是当前已使用了多少空间。


    当 `columnstore` 索引遇到字典压力时，当前正在写入的 `rowgroup` 将被关闭，并创建一个新的 `rowgroup` 以及一个新的字典。这有两个重要影响：


    *   **字典消耗空间：** 支持 `columnstore` 索引所需的字典越多、它们越大，那么读写它们所需的存储空间和内存就越多。

    *   **过小的行组导致碎片化：** 一个 `rowgroup` 最多可包含 `2²⁰` (1,048,576) 行。当 `rowgroup` 因字典压力而尺寸过小（远低于
    `2²⁰` 行）时，SQL Server 就需要维护更多的 `rowgroup`、段和字典。这反过来会浪费资源并减慢需要这些表的分析速度。


    幸运的是，字典压力很容易诊断。一旦识别出来，就可以制定解决方案来解决它。考虑如图 15-5 所示的 `rowgroup` 元数据。


    ![](img/521866_1_En_15_Fig5_HTML.jpg)


    图 15-5：字典压力示例


    在此示例中，`row_group_id` 25 显示截断原因为 `DICTIONARY_SIZE`，行数为 419,432 行。在此 `rowgroup`
    中，SQL Server 正在向其加载行，此时字典达到了一个大小，在不使其超过 16MB 上限的情况下无法再添加更多条目。如果这是唯一一个这样的 `rowgroup`，那么字典压力可能不会被视为一个严重问题。如果有许多
    `rowgroup` 被截断在这样低的行数上，那么字典压力无疑会抑制最佳性能，值得调查和解决。


    字典压力有两个主要原因：


    *   宽度很大的列

    *   具有许多不同值的列


    涉及字典压力的最常见场景源自那些既很宽又具有许多不同值的列。对于字典压力这一挑战，没有放之四海而皆准的解决方案。三种最常见的解决方案可视为解决此挑战的最简单方法：


    *   将宽列规范化为查找（维度）表。

    *   在不同的列上排序。

    *   对表进行分区。


    ### 规范化宽列


    最简单的解决方案需要更改架构，因此可能带来干扰，那就是规范化被识别为字典压力来源的宽列。规范化一个列是用一个较小的数字列替换一个宽列（通常是字符串数据）。查找表很可能使用聚集
    `rowstore` 索引存储，并辅以一个支持性的非聚集 `rowstore` 索引来处理针对文本数据的查询。


    在为大型分析表考虑 `columnstore` 索引时，请密切关注任何宽列，并在测试过程中，执行在数据上创建 `columnstore` 索引的操作。创建后，请注意
    `rowgroup` 的行数以及是否发生字典压力。如果 `rowgroup` 的尺寸小了 10% 或更多，并且宽列是罪魁祸首，则考虑对其进行规范化。


    查找表可以包含其他元数据，以支持对其进行高效搜索，例如哈希值、搜索条件或可以建立索引并用于在需要检查文本列之前快速减少行数的详细信息。


    ### 添加或更改列存储排序列


    有时，`columnstore` 索引内的数据排序方式会导致较差的字典编码。如果 `columnstore` 索引未排序，或者在某个倾向于将数据与非相似值分组在一起的列上排序，那么较宽的列可能会成为字典压力的来源。


    `columnstore` 索引的排序列应始终是最常用于过滤查询的列。如果有多种常见的搜索条件，则可能存在其他能提供更好压缩和性能的排序选项。


    这个解决字典压力的方案需要在常见分析查询上进行前后测试，以确保一个问题（字典压力）没有被交换成另一个问题（分析查询性能不佳）。

    '
- fmt: '## Partitioning


    One key element of partitioned columnstore indexes is that each partition contains
    its own distinct columnstore index. For example, a table that is broken into ten
    partitions will contain a separate columnstore structure in each partition. That
    includes separate dictionaries, as well!


    When columnstore index row counts become large (hundreds of millions or billions
    of rows), partitioning can provide distinct performance and maintenance benefits
    in SQL Server. In addition to partition elimination, an added performance improvement
    can be seen in the separation of dictionaries across partitions. This solution
    is especially effective when the values for wide columns change slowly over time.
    In these scenarios, the data from one day to the next will have many repeated
    values, but across months or years will not.


    When partitioning a table, be sensitive to the size of the partitions that are
    created. Because each represents a distinct, separate columnstore index, it is
    important that each be large enough to benefit from the key properties of columnstore
    indexes. Therefore, ensure that each partition has at least tens of millions of
    rows. Similarly, partitions that are exceptionally large (billions of rows) may
    suffer the same problems as an unpartitioned table in regard to dictionary pressure.


    Testing is important in confirming the benefits of partitioning in a columnstore
    index. Generally speaking, if a table contains hundreds of millions of rows (or
    more), being able to subdivide it into smaller chunks using the columnstore ordering
    column as the partitioning column will allow performance benefits to be realized.
    If dictionary pressure exists, then this can become an effective way to manage
    it by splitting up dictionaries across partitions.


    Chapter [11](#521866_1_En_11_Chapter.xhtml) dives into partitioning in detail,
    including demonstrations of how to implement it and how it can provide a host
    of benefits in addition to resolving dictionary pressure challenges.


    In general, dictionaries are very efficient at storing their lookup data and columnstore
    indexes benefit greatly by using them. Dictionary pressure should be seen as an
    out-of-the-ordinary situation and only investigated if it is causing blatant performance
    problems.


    ## Columnstore Indexes on Temporary Tables


    For scenarios when analytic data needs to be crunched on the fly using temporary
    data, there can be value in adding columnstore indexes to temporary objects. This
    is a unique use case that will rarely be needed, but can provide exceptional value
    to ETL processes or any analytics in which an intermediary or temporary data set
    requires many expensive queries to be executed against it.


    Adding a columnstore index to a temporary table works exactly as it does against
    a permanent table. Listing [15-5](#521866_1_En_15_Chapter.xhtml#PC5) shows an
    example of how to accomplish this task.


    ```

    CREATE TABLE #Sales_Temp_Data

    (      [Sale Key] BIGINT NOT NULL,

    [Customer Key] INT NOT NULL,

    [Invoice Date Key] DATE NOT NULL,

    Quantity INT NOT NULL,

    [Total Excluding Tax] DECIMAL(18,2) NOT NULL);

    INSERT INTO #Sales_Temp_Data

    ([Sale Key], [Customer Key], [Invoice Date Key], Quantity, [Total Excluding Tax])

    SELECT

    [Sale Key], [Customer Key], [Invoice Date Key], Quantity, [Total Excluding Tax]

    FROM Fact.Sale_CCI_PARTITIONED;

    CREATE CLUSTERED COLUMNSTORE INDEX CCI_Sales_Temp_Data ON #Sales_Temp_Data;

    Listing 15-5

    Query That Creates a Temporary Table, Populates It, and Adds a Columnstore Index

    ```


    Once added, the newly indexed temporary table may be queried as effectively as
    a columnstore indexed permanent table, as seen in Listing [15-6](#521866_1_En_15_Chapter.xhtml#PC6).


    ```

    SELECT

    COUNT(*)

    FROM #Sales_Temp_Data;

    SELECT

    SUM(Quantity) * SUM([Total Excluding Tax])

    FROM #Sales_Temp_Data

    WHERE [Invoice Date Key] >= ''1/1/2015''

    AND [Invoice Date Key] < ''1/1/2016'';

    Listing 15-6

    Example Queries Against a Temporary Table with a Columnstore Index

    ```


    These queries execute relatively quickly, returning the requested results. Figure
    [15-6](#521866_1_En_15_Chapter.xhtml#Fig6) shows the `STATISTICS IO` output from
    that pair of queries.


    ![](images/521866_1_En_15_Chapter/521866_1_En_15_Fig6_HTML.jpg)


    Figure 15-6

    IO for queries against a temporary table with a columnstore index


    Note that the filtered query read almost half of the segments in the table, despite
    only reading about a quarter of its rows. When this temporary table was populated,
    no data order was enforced. As a result, data was inserted in whatever order `SQL
    Server` happened to read it from the source table, which was not optimal. Depending
    on how extensive the temporary table is to be used for analytics, taking the extra
    steps to order it prior to reading it may or may not be worth the time and resources
    needed to do so. That value will lie in whether or not the analytic processes
    are completing quickly enough and if they are using too much computing resources
    along the way.


    `Nonclustered columnstore index` may also be created on temporary tables, if there
    is a need to slice data using both transactional and analytic methods. One benefit
    of doing so is that the clustered rowstore index can enforce data order on the
    table, even if further writes are made to it. Another benefit is that the column
    list for the columnstore index can be customized. This allows a small subset of
    columns to be subject to analytics when the remainder may be needed for other
    operations. Listing [15-7](#521866_1_En_15_Chapter.xhtml#PC7) shows the syntax
    for creating nonclustered columnstore indexes on a temporary table.'
