- fmt: '## Columnstore Index Metadata


    This section provides details on key columns within columnstore index metadata
    views.


    #### Total_rows

    This provides the row count for the rowgroup. Summing this value across all rowgroups
    allows for an accurate row count to be collected for the table without querying
    it directly. If many rowgroups have low row counts, it is indicative of a process
    problem worthy of investigation.


    #### Deleted_rows

    If any rows are flagged as deleted in the delete bitmap for this rowgroup, the
    count of deleted rows is provided here.


    #### Size_in_bytes

    The total size of the rowgroup, which is the sum space used by all segments residing
    in that rowgroup. This can be used to quickly determine the size of all or part
    of a columnstore index.


    ## Segment Metadata

    The basic unit of storage in a columnstore index is the segment. Each segment
    represents a single column and its contents for the set of rows contained in each
    rowgroup. The number of segments that comprise a columnstore index is the product
    of the number of rowgroups in the index and columns in the table.


    `Sys.column_store_segments` provides extensive detail on the contents of each
    segment. This data is accurate and updated whenever data within the segment changes,
    unlike SQL Server statistics which require periodic updating to ensure a reasonable
    approximation of reality.


    The data in this view is more than a reference for curious administrators. It
    is also used by the query optimizer to make intelligent decisions about what data
    to read at runtime when a columnstore index is queried. This allows segments to
    be skipped when the metadata indicates they are not needed to satisfy a query.
    This can significantly reduce reads and improve query performance in ways that
    are unavailable to rowstore tables in SQL Server.


    The query in `Listing 6-2` returns a variety of useful columns from this view.

    ```sql

    SELECT

    tables.name AS table_name,

    indexes.name AS index_name,

    columns.name AS column_name,

    partitions.partition_number,

    column_store_segments.encoding_type,

    column_store_segments.row_count,

    column_store_segments.has_nulls,

    column_store_segments.base_id,

    column_store_segments.magnitude,

    column_store_segments.min_data_id,

    column_store_segments.max_data_id,

    column_store_segments.null_value,

    column_store_segments.on_disk_size

    FROM sys.column_store_segments

    INNER JOIN sys.partitions

    ON column_store_segments.hobt_id = partitions.hobt_id

    INNER JOIN sys.indexes

    ON indexes.index_id = partitions.index_id

    AND indexes.object_id = partitions.object_id

    INNER JOIN sys.tables

    ON tables.object_id = indexes.object_id

    INNER JOIN sys.columns

    ON tables.object_id = columns.object_id

    AND column_store_segments.column_id = columns.column_id

    WHERE tables.name = ''Sale_CCI''

    ORDER BY columns.name, column_store_segments.segment_id;

    ```

    `Listing 6-2`

    Query That Returns Columnstore Segment Metadata


    The segment metadata returned can be seen in `Figure 6-2`.

    ![](images/521866_1_En_6_Chapter/521866_1_En_6_Fig2_HTML.jpg)

    `Figure 6-2`

    Segment metadata for the columnstore index on Sale_CCI


    Details about columnstore segments delve into how they are compressed and stored,
    which can provide valuable clues to the efficiency of columnstore compression
    for each column within a columnstore index. The following is detail about some
    of the key columns in this view.


    #### Encoding_type

    This indicates if this segment is encoded using a dictionary and the type of data
    stored in it, as follows:

    *   1: Nonstring/nonbinary data with no dictionary. The values in this segment
    are transformed using base/magnitude encoding.

    *   2: Nonstring/nonbinary data with a dictionary.

    *   3: String or binary data with a dictionary.

    *   4: Nonstring/nonbinary data with no dictionary. The values in this segment
    are stored as is, with no additional transformations.

    *   5: String or binary data with no dictionary.


    Typically, segments with many distinct values (aka high cardinality) will tend
    to use value-based encoding and not implement a dictionary lookup, whereas segments
    with low cardinality will more often use a dictionary to reduce the storage of
    repeated values. This decision is made internally by SQL Server to improve compression
    and reduce the space consumed by a segment.


    #### Row_Count

    This row count matches the row count of the corresponding rowgroup and represents
    the number of values (repeated or distinct) contained within a columnstore segment.


    #### Has_nulls

    If a segment contains at least one NULL, then this is set to 1; otherwise, it
    is 0. Note that this column does not indicate if a column allows NULL, but instead
    reports on whether a segment happens to have NULL within its set of values. Therefore,
    different segments for the same column can have different values for this bit.


    #### Base_id and Magnitude

    These columns report directly on value-based encoding. If values were modified
    using a base and exponent to reduce their storage size, that detail is represented
    here. The base and magnitude can vary segment to segment and do not need to be
    the same for each segment for any one column.


    #### Min_data_id and Max_data_id

    This incredibly useful pair of columns provides the minimum and maximum values
    for a segment, or the dictionary lookup values, if a dictionary is used. If transformations
    have been made for value-based encoding, then the values provided by these columns
    will include those modifications.


    The minimum and maximum values for a segment are used by the query optimizer to
    skip unnecessary rowgroups when reading a columnstore index. For example, if a
    segment contains a minimum value of 1 and a maximum value of 400, then queries
    that filter for values outside of this range can skip this rowgroup altogether.
    This optimization is known as segment elimination and is key to the performance
    of large columnstore indexes. Chapter 10 discusses segment elimination in detail
    and provides the conventions needed to take full advantage of this feature.


    #### Null_value

    If a segment contains NULLs, then the value provided by this column is the numeric
    representation for NULL within the encoding of the column.


    #### On_disk_size

    The space consumed by the columnstore segment is provided by the column `on_disk_size`,
    allowing for the space consumed by a columnstore index to be easily broken down
    into granular details. If one segment out of many has an unusually large size,
    there can be value in exploring why and determining if further optimizations can
    be made to improve data compression.


    This granular detail also allows for the space consumed by each column to be calculated,
    as well as space consumed per column per partition. If a columnstore index is
    growing large unusually quickly, this metadata allows for the source of growth
    to be isolated to a column and set of segments to determine the source of that
    growth.'
