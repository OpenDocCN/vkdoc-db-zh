    \ OLTP 查询。\n\n清单 12-6 中的查询更改了 `WideWorldImportersDW` 中的聚集列存储索引，将其压缩延迟设为 60 分钟。\n\
    \n```sql\nALTER INDEX CCI_fact_sale_CCI ON Fact.Sale_CCI\nSET (COMPRESSION_DELAY\
    \ = 60 MINUTES);\n```\n**清单 12-6** 使用 `ALTER INDEX` 语句调整聚集列存储索引的压缩延迟\n\n聚集列存储索引上\
    \ 60 分钟的压缩延迟将提供一个 60 分钟的窗口期，在此期间数据加载过程可以自由地以任何方式插入数据，然后根据需要进行更新或删除。由于数据驻留在增量存储中，额外的更新和删除操作不会影响压缩行组，因此消除了数据加载过程引入的碎片。此外，还可以避免因\
    \ `UPDATE` 查询而导致的性能下降。60 分钟窗口期结束后，数据将开始被插入到列存储索引中。假设数据加载过程已完成对该数据的修改，那么数据将被插入一次，然后以其原始的压缩状态保持不变。\n\
    \n可以通过查询 `sys.indexes` 来检索数据库中列存储索引的压缩延迟设置，如清单 12-7 所示。\n\n```sql\nSELECT\n  \
    \  tables.name AS table_name,\n    indexes.name AS index_name,\n    indexes.type_desc\
    \ AS index_type,\n    indexes.compression_delay\nFROM sys.indexes\nINNER JOIN\
    \ sys.tables\n    ON tables.object_id = indexes.object_id\nWHERE indexes.type_desc\
    \ IN ('NONCLUSTERED COLUMNSTORE', 'CLUSTERED COLUMNSTORE');\n```\n**清单 12-7**\
    \ 返回索引压缩延迟信息的查询\n\n`compression_delay` 列提供一个数字（以分钟为单位），表示该索引当前的压缩延迟设置。零表示该索引未使用压缩延迟。请注意，该查询仅筛选列存储索引。其他索引类型在\
    \ `compression_delay` 列中将为 `NULL`，因为除了列存储索引外，此选项不适用于任何其他索引类型。\n\n图 12-11 显示了此查询的结果以及数据库中每个列存储索引的压缩延迟。\n\
    \n![](img/521866_1_En_12_Fig11_HTML.jpg)\n**图 12-11** 数据库中每个列存储索引的压缩延迟\n\n第 4\
    \ 行（已圈出）显示了被清单 12-6 中的查询修改的索引，并确认了压缩延迟设置为 60 分钟。\n\n由于删除行导致的碎片可以通过被删除行的百分比来量化，使用清单\
    \ 12-8 所示的查询。\n\n```sql\nSELECT\n    objects.name,\n    partitions.partition_number,\n\
    \    dm_db_column_store_row_group_physical_stats.row_group_id,\n    dm_db_column_store_row_group_physical_stats.total_rows,\n\
    \    dm_db_column_store_row_group_physical_stats.deleted_rows,\n    CAST(100 *\
    \ CAST(deleted_rows AS DECIMAL(18,2)) / CAST(total_rows AS DECIMAL(18,2)) AS DECIMAL(18,2))\
    \ AS percent_deleted\nFROM sys.dm_db_column_store_row_group_physical_stats\nINNER\
    \ JOIN sys.objects\n    ON objects.object_id = dm_db_column_store_row_group_physical_stats.object_id\n\
    INNER JOIN sys.partitions\n    ON partitions.object_id = objects.object_id\n \
    \   AND partitions.partition_number = dm_db_column_store_row_group_physical_stats.partition_number\n\
    \    AND partitions.index_id = dm_db_column_store_row_group_physical_stats.index_id\n\
    WHERE objects.name = 'Sale_CCI'\nORDER BY dm_db_column_store_row_group_physical_stats.row_group_id;\n\
    ```\n**清单 12-8** 返回因删除操作导致的索引碎片的查询\n\n此查询专门针对单个表（`Sale_CCI`）并返回每个行组的总行数、已删除行数和删除百分比，如图\
    \ 12-12 所见。\n\n![](img/521866_1_En_12_Fig12_HTML.jpg)\n**图 12-12** 列存储索引中因删除行导致的碎片"
- fmt: '### Filtered Nonclustered Columnstore Indexes: Concepts and Benefits


    In this example, fragmentation is approximately 5% across the index. Generally
    speaking, when deleted rows comprise more than 10% of a columnstore index, it
    may be considered fragmented enough to warrant further actions to be taken in
    order to remove and/or prevent further fragmentation.


    `Compression delay` is an exceptionally useful setting when creating nonclustered
    columnstore indexes that can offset heavy transactional write operations against
    a table during the period of time when data is still hot. In addition to improving
    write performance, `compression delay` will reduce fragmentation, improve compression
    efficiency, and decrease memory consumption for the index.


    Like nonclustered rowstore indexes, nonclustered columnstore indexes can have
    filters applied to them when created. This allows the columnstore index to be
    targeted, focused on cold and warm data while avoiding indexing hot data. These
    filters will often target columns that enumerate statuses, workflows, and location
    within the data life cycle.


    Consider the example of an order processing system. In this system, orders are
    frequently manipulated up until a certain point in the process. Maybe it is when
    the order is picked, shipped, or received, but at some point in its life cycle,
    the data shifts from hot data to warm data and then later to cold data.


    A filtered index can be used to target a nonclustered columnstore index to include
    only data that is no longer hot. For example, consider the index creation statement
    in the following code block.


    ```sql

    CREATE NONCLUSTERED COLUMNSTORE INDEX NCCI_Orders

    ON Sales.Orders (OrderDate, CustomerID, IsUndersupplyBackordered, SalespersonPersonID)

    WHERE PickedByPersonID IS NOT NULL;

    ```


    Listing 12-9: Creation of a Filtered Nonclustered Columnstore Index


    This index will only include rows that happen to have a value for the `PickedByPersonID`
    column. As a result, rows will not be inserted into the columnstore index until
    they have been boxed and are ready to ship. Because of this, any data manipulation
    that occurs prior to this point in time will not impact the performance of the
    columnstore index.


    The following query calculates the number of rows that meet the filter criteria
    vs. the number that do not.


    ```sql

    SELECT

    SUM(CASE WHEN PickedByPersonID IS NULL THEN 1 ELSE 0 END) AS orders_not_picked,

    SUM(CASE WHEN PickedByPersonID IS NOT NULL THEN 1 ELSE 0 END) AS orders_picked

    FROM Sales.Orders

    ```


    Listing 12-10: Calculating the Number of Rows That Meet the Filtered Index Criteria


    The results in Figure 12-13 show that about 14% of the rows in the table are not
    picked and therefore are still classified as hot data.


    ![](images/521866_1_En_12_Chapter/521866_1_En_12_Fig13_HTML.jpg)


    **Figure 12-13: Count of rows that meet the filtered index criteria**


    Typically, hot data will constitute a small fraction of data in the table. If
    a simple filter can be used to determine whether data is hot or not, then it can
    be applied to the nonclustered columnstore index to ensure that its performance
    is not negatively impacted by it.


    ### Querying with a Filtered Index


    Consider the analytic query presented earlier. If this query was intended to only
    target data that is no longer hot, then adding the filter criteria used on the
    nonclustered columnstore index to this query would allow it to use the filtered
    version of the index, as seen in the following code block.


    ```sql

    SELECT

    COUNT(*) AS sale_count,

    COUNT(DISTINCT SalespersonPersonID) AS sales_people_count,

    SUM(CAST(IsUndersupplyBackordered AS INT)) AS undersupply_backorder_count

    FROM Sales.Orders

    WHERE CustomerID = 90

    AND OrderDate >= ''1/1/2015''

    AND OrderDate < ''1/1/2016''

    AND PickedByPersonID IS NOT NULL;

    ```


    Listing 12-11: Query That Uses a Filtered Nonclustered Columnstore Index


    The execution plan for this query is shown in Figure 12-14.


    ![](images/521866_1_En_12_Chapter/521866_1_En_12_Fig14_HTML.jpg)


    **Figure 12-14: Execution plan using a filtered nonclustered columnstore index**


    As expected, the filtered nonclustered columnstore index was used to execute the
    query.


    If needed, the following query shows all indexes in a database that have a filter
    defined on them, which can be used to review columnstore indexes and their details.


    ```sql

    SELECT

    indexes.name,

    indexes.type_desc,

    indexes.filter_definition

    FROM sys.indexes

    WHERE indexes.has_filter = 1;

    ```


    Listing 12-12: Query That Lists Indexes with Filters in a Given Database


    The results of the query are useful in understanding what filters exist and their
    definitions, as shown in Figure 12-15.


    ![](images/521866_1_En_12_Chapter/521866_1_En_12_Fig15_HTML.jpg)


    **Figure 12-15: List of indexes with filters defined on them**


    If the database contains many filtered indexes, the query could be further refined
    to omit rowstore indexes or other noise.


    ### Important Considerations and Pitfalls


    There is a single pitfall in filtered indexes that needs to be reviewed prior
    to using them, and that is filter column sensitivity. Ideally, as data moves from
    hot to warm to cold, it is added to the filtered nonclustered columnstore index
    and rarely (if ever) removed. If rows are capable of alternating between satisfying
    the filter clause and then no longer meeting the criteria, there is a danger that
    a single row in a table could be added and removed from the columnstore index
    many times. If this is common, then the filtered index may end up being as fragmented
    as a nonfiltered index would be.


    Consider a scenario using the filtered nonclustered columnstore index created
    earlier. If a row were assigned a value for `PickedByPersonID`, it would immediately
    be inserted into the delta store for the columnstore index where it would await
    compression via the tuple mover. If `PickedByPersonID` is then reset to `NULL`,
    it would be deleted from the columnstore index as it no longer meets the filter
    criteria. When designing any filtered index, there is value in ensuring that rows
    will not move in and out of the index often and that data follows a one-way journey
    from hot to warm to cold.


    ### Combining with Compression Delay


    Compression delay can be combined with a filtered nonclustered columnstore index
    as a way to buffer out-of-band changes to data that cause it to move between hot
    and warm via routine processes. The following code block shows a filtered nonclustered
    columnstore index that includes compression delay.


    ```sql

    CREATE NONCLUSTERED COLUMNSTORE INDEX NCCI_Orders

    ON Sales.Orders (OrderDate, CustomerID, IsUndersupplyBackordered, SalespersonPersonID)

    WHERE PickedByPersonID IS NOT NULL

    WITH (COMPRESSION_DELAY = 30 MINUTES);

    ```


    Listing 12-13: Creation of a Filtered Nonclustered Columnstore Index with Compression
    Delay


    This index provides additional buffering against the possibility that rows that
    have been assigned a `PickedByPersonID` might be:

    *   Deleted

    *   Updated

    *   Have `PickedByPersonID` set back to `NULL`


    A transactional table may make use of filtered nonclustered columnstore indexes,
    compression delay, or both and do so with success. The details as to which features
    to use and how to configure them should be driven by organizational need and its
    data life cycle. There is no one-size-fits-all solution in making these decisions.
    One table in one database for organization may benefit from a compression delay
    of 10 minutes, whereas 1,440 minutes might be optimal for another table. Filters
    might fully encapsulate a key use case in one workflow when others may be unable
    to easily be filtered for in an index.'
