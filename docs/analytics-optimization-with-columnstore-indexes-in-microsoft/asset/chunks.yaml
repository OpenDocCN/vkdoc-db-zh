- fmt: '# Columnstore Index Compression and Metadata


    ## Columnstore Archive Compression


    SQL Server provides an additional level of compression that can be used to further
    shrink the footprint of columnstore index data. While archive compression can
    provide a higher compression ratio than standard columnstore compression, it costs
    more computing resources to read and write the data. As a result, this option
    should be reserved for data that is not frequently used, such as:


    - Cold or warm storage

    - Data that is rarely accessed

    - Data used for applications where performance is not critical


    Columnstore archive compression uses the Microsoft Xpress compression algorithm.
    While this algorithm is complex, it is publicly documented and is not a Microsoft
    trade secret. This algorithm relies on compressing data with repeated byte sequences
    and combines the LZ77 and Huffman compression algorithms to further shrink the
    size of columnstore data. The details of these compression algorithms are too
    extensive for the pages of this book, but are publicly available to anyone interested.


    The type of compression used in a columnstore index may be specified on a partition-by-partition
    basis, allowing older/less used data to effectively use archive compression, whereas
    newer data can use standard columnstore compression. Chapter 11 delves into how
    partitioning can be combined with columnstore indexes to improve data storage,
    maintenance, and performance.


    To demonstrate the effectiveness of columnstore archive compression, a new version
    of the `Sale_CCI` table will be created, as seen in Listing 5-6.


    ```sql

    CREATE TABLE Fact.Sale_CCI_Archive

    (      [Sale Key] [bigint] NOT NULL,

    [City Key] [int] NOT NULL,

    [Customer Key] [int] NOT NULL,

    [Bill To Customer Key] [int] NOT NULL,

    [Stock Item Key] [int] NOT NULL,

    [Invoice Date Key] [date] NOT NULL,

    [Delivery Date Key] [date] NULL,

    [Salesperson Key] [int] NOT NULL,

    [WWI Invoice ID] [int] NOT NULL,

    [Description] NVARCHAR(100) NOT NULL,

    [Package] [nvarchar](50) NOT NULL,

    [Quantity] [int] NOT NULL,

    [Unit Price] [decimal](18, 2) NOT NULL,

    [Tax Rate] [decimal](18, 3) NOT NULL,

    [Total Excluding Tax] [decimal](18, 2) NOT NULL,

    [Tax Amount] [decimal](18, 2) NOT NULL,

    [Profit] [decimal](18, 2) NOT NULL,

    [Total Including Tax] [decimal](18, 2) NOT NULL,

    [Total Dry Items] [int] NOT NULL,

    [Total Chiller Items] [int] NOT NULL,

    [Lineage Key] [int] NOT NULL);

    CREATE CLUSTERED COLUMNSTORE INDEX CCI_Sale_CCI_Archive ON fact.Sale_CCI_Archive
    WITH (DATA_COMPRESSION=COLUMNSTORE_ARCHIVE);

    ```

    **Listing 5-6** Table Created with Columnstore Archive Compression


    Once populated with data, this table can be compared to the previous version that
    used standard columnstore compression, as seen in Figure 5-12.


    ![](images/521866_1_En_5_Chapter/521866_1_En_5_Fig12_HTML.jpg)

    **Figure 5-12** Comparison of columnstore and columnstore archive compression


    Columnstore archive compression provided an immense space savings when compared
    to standard columnstore compression. This may seem absurdly impressive, but some
    of this savings can be achieved by optimizing data order, which will be discussed
    in detail in Chapter 10.


    In practice with typical production data loads, archive compression will deliver
    an additional 15–30% savings over standard columnstore compression. For a large
    analytic table, this can equate to a significant reduction in its data footprint!
    In general, only consider archive compression for data that will not be written
    to or read often, as the cost to compress and decompress it is nontrivial. For
    data that is rarely accessed, it is an easy way to save on both storage and memory
    resources.


    ## The Compression Life Cycle


    A key to all compression within SQL Server is that compressed pages remain compressed
    until needed by a query. Therefore, pages are compressed on storage and remain
    compressed there for the lifetime of an index. When pages are read into memory,
    they remain compressed. Therefore, any storage space saved by the use of compression
    will equate into memory savings when the data is needed.


    This fact is critical to the efficiency of columnstore indexes. Compressed segments
    remain compressed on disk as well as in memory and are not decompressed until
    a query requires their data. Any optimizations that further decrease the size
    of compressed segments will translate directly into memory savings. The remainder
    of this book will focus on optimizations, best practices, and features that allow
    columnstore indexes to be used as efficiently as possible, thus making the most
    of their compression and ensuring they can scale for any data, regardless of how
    big it gets.


    # 6. Columnstore Metadata


    Each compressed segment within a columnstore index not only stores analytic data,
    but through metadata can describe its contents with more precision than rowstore
    tables can.


    This metadata resides in system views and allows SQL Server to make intelligent
    query processing decisions at runtime. This chapter dives into this metadata in
    detail, how SQL Server uses it, and how it can be used to improve the performance
    of columnstore indexes.


    ## Available Columnstore Metadata


    Metadata is available through a handful of system views that provide overview-level
    data about segments and rowgroups, as well as detail data that describes physical
    properties, dictionaries, and operational metrics. The following is a brief review
    of each view and its contents.


    ### Rowgroup Metadata


    Each compressed rowgroup contains up to 2^(20) rows whose contents are typically
    static outside of the influence of index maintenance. Because of this, the row
    counts, deleted row counts, size, and other details are accurate and can be used
    to understand the size and shape of the underlying data.


    The query in Listing 6-1 returns the table and index name, as well as all columns
    from the view `sys.column_store_row_groups`.


    ```sql

    SELECT

    tables.name AS table_name,

    indexes.name AS index_name,

    column_store_row_groups.*

    FROM sys.column_store_row_groups

    INNER JOIN sys.indexes

    ON indexes.index_id = column_store_row_groups.index_id

    AND indexes.object_id = column_store_row_groups.object_id

    INNER JOIN sys.tables

    ON tables.object_id = indexes.object_id

    WHERE tables.name = ''Sale_CCI''

    ORDER BY tables.object_id, indexes.index_id, column_store_row_groups.row_group_id;

    ```

    **Listing 6-1** Query to Return Metadata for All Rowgroups in a Columnstore Index


    Figure 6-1 contains a subset of the rowgroup metadata returned.


    ![](images/521866_1_En_6_Chapter/521866_1_En_6_Fig1_HTML.jpg)

    **Figure 6-1** Rowgroup metadata for the columnstore index on Sale_CCI


    Each row returned by `sys.column_store_row_groups` represents the set of rows
    contained within a rowgroup, regardless of how many columns are in the table.
    A table with ten columns will contain ten segments per rowgroup. Similarly, a
    table with 30 columns will contain 30 segments per rowgroup. The following is
    a brief overview of each column in the view.


    #### `partition_number`


    A rowgroup cannot span multiple partitions; therefore, a partitioned table will
    have separate sets of rowgroups in each partition, without overlap between them.
    This column provides the partition that a given rowgroup resides on.


    #### `delta_store_hobt_id`


    For open rowgroups in the delta store, an ID is provided here that links to `sys.internal_partitions`
    and represents the delta rowgroup data it contains. A standard compressed rowgroup
    will contain NULL for this column.


    #### `state` and `state_description`


    This describes the current status of the rowgroup, whether it is OPEN and accepting
    new rows, CLOSED, but not yet compressed by the tuple mover, COMPRESSED, or INVISIBLE
    (a rowgroup in the process of being created).'
