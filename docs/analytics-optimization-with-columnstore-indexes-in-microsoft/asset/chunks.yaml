- fmt: "## How Much Fragmentation Is Too Much?\n\nLike with rowstore indexes, fragmentation\
    \ does not require attention until it becomes significant enough to impact performance\
    \ and waste a tangible amount of space. A columnstore index with 5 billion rows\
    \ of which 1,000 are deleted should not be seen as problematic. Alternatively,\
    \ if one billion of those rows were deleted, then the resulting fragmentation\
    \ would be worth addressing.\n\nFragmentation should be broken out into two distinct\
    \ calculations, of which each can be evaluated clinically and acted on appropriately.\
    \ One is the percentage of a table that is comprised of deleted rows, and the\
    \ other is a measure of unordered data within a columnstore index.\n\n### Quantifying\
    \ Deleted Rows\n\nDeleted rows are included in the view `sys.column_store_row_groups`\
    \ and are relatively easy to report on. The query in `Listing 14-1` returns a\
    \ row per rowgroup within a single clustered columnstore index.\n\n```sql\nSELECT\n\
    \    tables.name AS table_name,\n    indexes.name AS index_name,\n    partitions.partition_number,\n\
    \    column_store_row_groups.row_group_id,\n    column_store_row_groups.total_rows,\n\
    \    column_store_row_groups.deleted_rows\nFROM sys.column_store_row_groups\n\
    INNER JOIN sys.indexes\n    ON indexes.index_id = column_store_row_groups.index_id\n\
    \    AND indexes.object_id = column_store_row_groups.object_id\nINNER JOIN sys.tables\n\
    \    ON tables.object_id = indexes.object_id\nINNER JOIN sys.partitions\n    ON\
    \ partitions.partition_number = column_store_row_groups.partition_number\n   \
    \ AND partitions.index_id = indexes.index_id\n    AND partitions.object_id = tables.object_id\n\
    WHERE tables.name = 'Sale_CCI'\nORDER BY indexes.index_id, column_store_row_groups.row_group_id;\n\
    ```\n\n`Listing 14-1` Query to Return Deleted Rows per Rowgroup\n\nThe results\
    \ are shown in `Figure 14-3`.\n\n![](images/521866_1_En_14_Chapter/521866_1_En_14_Fig3_HTML.jpg)\n\
    \n`Figure 14-3` Deleted row counts per rowgroup for a columnstore index\n\nThis\
    \ detail shows how many rows are deleted per rowgroup. The results can be aggregated\
    \ to show deleted rows per partition or for the entire table. If a table is partitioned,\
    \ then knowing if the deleted rows exist only in one partition or all of them\
    \ is useful for determining if all or only some partitions require attention.\n\
    \nIn the example results outlined in `Figure 14-3`, about 5% of the columnstore\
    \ index is comprised of deleted rows that are spread across the index relatively\
    \ evenly. As a rough guideline, there is no urgent need for index maintenance\
    \ to address this unless the percentage of deleted rows is at least 10% of the\
    \ total rows in a partition or in the table.\n\nKeep in mind that the performance\
    \ impact of deleted rows is gradual over time. There will never be a scenario\
    \ where a threshold is reached in which performance suddenly plummets. Therefore,\
    \ automating index maintenance to occur when deleted rows exceed some set percentage\
    \ is an effective way to avoid accidentally allowing an index to become absurdly\
    \ fragmented .\n\n### Detailing Unordered Data\n\nUnderstanding the effectiveness\
    \ of ordered data is easy to see via querying segment metadata, but can be challenging\
    \ to quantify. The query in `Listing 14-2` shows how to retrieve the segment minimum\
    \ and maximum data IDs for a given columnstore index and a single column.\n\n\
    ```sql\nSELECT\n    tables.name AS table_name,\n    indexes.name AS index_name,\n\
    \    columns.name AS column_name,\n    partitions.partition_number,\n    column_store_segments.segment_id,\n\
    \    column_store_segments.min_data_id,\n    column_store_segments.max_data_id,\n\
    \    column_store_segments.row_count\nFROM sys.column_store_segments\nINNER JOIN\
    \ sys.partitions\n    ON column_store_segments.hobt_id = partitions.hobt_id\n\
    INNER JOIN sys.indexes\n    ON indexes.index_id = partitions.index_id\n    AND\
    \ indexes.object_id = partitions.object_id\nINNER JOIN sys.tables\n    ON tables.object_id\
    \ = indexes.object_id\nINNER JOIN sys.columns\n    ON tables.object_id = columns.object_id\n\
    \    AND column_store_segments.column_id = columns.column_id\nWHERE tables.name\
    \ = 'Sale_CCI'\n    AND columns.name = 'Invoice Date Key'\nORDER BY tables.name,\
    \ columns.name, column_store_segments.segment_id;\n```\n\n`Listing 14-2` Query\
    \ to Retrieve Min/Max Data IDs for a Given Column in a Columnstore Index\n\nThe\
    \ results of this query provide useful insight into the data order within this\
    \ index, as shown in `Figure 14-4`.\n\n![](images/521866_1_En_14_Chapter/521866_1_En_14_Fig4_HTML.jpg)\n\
    \n`Figure 14-4` Segment minimum/maximum value metadata for an unordered columnstore\
    \ index\n\nIn the metadata, note that the values for `min_data_id` and `max_data_id`\
    \ are the same for each rowgroup. This means that queries that filter on the column\
    \ `Invoice Date Key` will be forced to scan the entire table to return results\
    \ as any value could be found in any rowgroup.\n\nConsider an ordered version\
    \ of this table, where the results are as seen in `Figure 14-5`.\n\n![](images/521866_1_En_14_Chapter/521866_1_En_14_Fig5_HTML.jpg)\n\
    \n`Figure 14-5` Segment minimum/maximum value metadata for an ordered columnstore\
    \ index\n\nThis version of the table shows a progression of values for `min_data_id`\
    \ and `max_data_id` that increases as the `segment_id` increases. Because each\
    \ segment contains a distinct grouping of column values, this metadata can be\
    \ effectively used to skip any rowgroups that contain values that are irrelevant\
    \ to a query. The query in `Listing 14-3` returns a complete list of all segments\
    \ in a columnstore index that have any overlapping values. The inequalities are\
    \ not inclusive as it is common that the start and end values in a rowgroup will\
    \ overlap those in the next rowgroup."
  raw: '## How Much Fragmentation Is Too Much?


    Like with rowstore indexes, fragmentation does not require attention until it
    becomes significant enough to impact performance and waste a tangible amount of
    space. A columnstore index with 5 billion rows of which 1,000 are deleted should
    not be seen as problematic. Alternatively, if one billion of those rows were deleted,
    then the resulting fragmentation would be worth addressing.


    Fragmentation should be broken out into two distinct calculations, of which each
    can be evaluated clinically and acted on appropriately. One is the percentage
    of a table that is comprised of deleted rows, and the other is a measure of unordered
    data within a columnstore index.


    ### Quantifying Deleted Rows


    Deleted rows are included in the view *sys.column_store_row_groups* and are relatively
    easy to report on. The query in Listing [14-1](#521866_1_En_14_Chapter.xhtml#PC1)
    returns a row per rowgroup within a single clustered columnstore index.


    ```

    SELECT

    tables.name AS table_name,

    indexes.name AS index_name,

    partitions.partition_number,

    column_store_row_groups.row_group_id,

    column_store_row_groups.total_rows,

    column_store_row_groups.deleted_rows

    FROM sys.column_store_row_groups

    INNER JOIN sys.indexes

    ON indexes.index_id = column_store_row_groups.index_id

    AND indexes.object_id = column_store_row_groups.object_id

    INNER JOIN sys.tables

    ON tables.object_id = indexes.object_id

    INNER JOIN sys.partitions

    ON partitions.partition_number = column_store_row_groups.partition_number

    AND partitions.index_id = indexes.index_id

    AND partitions.object_id = tables.object_id

    WHERE tables.name = ''Sale_CCI''

    ORDER BY indexes.index_id, column_store_row_groups.row_group_id;

    Listing 14-1

    Query to Return Deleted Rows per Rowgroup

    ```


    The results are shown in Figure [14-3](#521866_1_En_14_Chapter.xhtml#Fig3).


    ![](images/521866_1_En_14_Chapter/521866_1_En_14_Fig3_HTML.jpg)


    Figure 14-3


    Deleted row counts per rowgroup for a columnstore index


    This detail shows how many rows are deleted per rowgroup. The results can be aggregated
    to show deleted rows per partition or for the entire table. If a table is partitioned,
    then knowing if the deleted rows exist only in one partition or all of them is
    useful for determining if all or only some partitions require attention.


    In the example results outlined in Figure [14-3](#521866_1_En_14_Chapter.xhtml#Fig3),
    about 5% of the columnstore index is comprised of deleted rows that are spread
    across the index relatively evenly. As a rough guideline, there is no urgent need
    for index maintenance to address this unless the percentage of deleted rows is
    at least 10% of the total rows in a partition or in the table.


    Keep in mind that the performance impact of deleted rows is gradual over time.
    There will never be a scenario where a threshold is reached in which performance
    suddenly plummets. Therefore, automating index maintenance to occur when deleted
    rows exceed some set percentage is an effective way to avoid accidentally allowing
    an index to become absurdly fragmented .


    ### Detailing Unordered Data


    Understanding the effectiveness of ordered data is easy to see via querying segment
    metadata, but can be challenging to quantify. The query in Listing [14-2](#521866_1_En_14_Chapter.xhtml#PC2)
    shows how to retrieve the segment minimum and maximum data IDs for a given columnstore
    index and a single column.


    ```

    SELECT

    tables.name AS table_name,

    indexes.name AS index_name,

    columns.name AS column_name,

    partitions.partition_number,

    column_store_segments.segment_id,

    column_store_segments.min_data_id,

    column_store_segments.max_data_id,

    column_store_segments.row_count

    FROM sys.column_store_segments

    INNER JOIN sys.partitions

    ON column_store_segments.hobt_id = partitions.hobt_id

    INNER JOIN sys.indexes

    ON indexes.index_id = partitions.index_id

    AND indexes.object_id = partitions.object_id

    INNER JOIN sys.tables

    ON tables.object_id = indexes.object_id

    INNER JOIN sys.columns

    ON tables.object_id = columns.object_id

    AND column_store_segments.column_id = columns.column_id

    WHERE tables.name = ''Sale_CCI''

    AND columns.name = ''Invoice Date Key''

    ORDER BY tables.name, columns.name, column_store_segments.segment_id;

    Listing 14-2

    Query to Retrieve Min/Max Data IDs for a Given Column in a Columnstore Index

    ```


    The results of this query provide useful insight into the data order within this
    index, as shown in Figure [14-4](#521866_1_En_14_Chapter.xhtml#Fig4).


    ![](images/521866_1_En_14_Chapter/521866_1_En_14_Fig4_HTML.jpg)


    Figure 14-4


    Segment minimum/maximum value metadata for an unordered columnstore index


    In the metadata, note that the values for *min_data_id* and *max_data_id* are
    the same for each rowgroup. This means that queries that filter on the column
    *Invoice Date Key* will be forced to scan the entire table to return results as
    any value could be found in any rowgroup.


    Consider an ordered version of this table, where the results are as seen in Figure
    [14-5](#521866_1_En_14_Chapter.xhtml#Fig5).


    ![](images/521866_1_En_14_Chapter/521866_1_En_14_Fig5_HTML.jpg)


    Figure 14-5


    Segment minimum/maximum value metadata for an ordered columnstore index


    This version of the table shows a progression of values for *min_data_id* and
    *max_data_id* that increases as the *segment_id* increases. Because each segment
    contains a distinct grouping of column values, this metadata can be effectively
    used to skip any rowgroups that contain values that are irrelevant to a query.
    The query in Listing [14-3](#521866_1_En_14_Chapter.xhtml#PC3) returns a complete
    list of all segments in a columnstore index that have any overlapping values.
    The inequalities are not inclusive as it is common that the start and end values
    in a rowgroup will overlap those in the next rowgroup.'
  trans: "\n## 碎片化到什么程度才算过多？\n\n与行存储索引类似，碎片化在变得足以影响性能并浪费可观空间之前，并不需要特别关注。一个包含 50 亿行的列存储索引，其中只有\
    \ 1000 行被删除，不应被视为问题。反之，如果这些行中有十亿行被删除，那么由此产生的碎片化就值得处理了。\n\n碎片化应分解为两种不同的计算方式，每种都可以进行客观评估并采取适当措施。一种是表中已删除行所占的百分比，另一种是列存储索引内数据无序程度的度量。\n\
    \n### 量化已删除行\n\n已删除行包含在视图 `sys.column_store_row_groups` 中，相对容易报告。`清单 14-1` 中的查询返回单个聚簇列存储索引中每个行组的一行信息。\n\
    \n```sql\nSELECT\n    tables.name AS table_name,\n    indexes.name AS index_name,\n\
    \    partitions.partition_number,\n    column_store_row_groups.row_group_id,\n\
    \    column_store_row_groups.total_rows,\n    column_store_row_groups.deleted_rows\n\
    FROM sys.column_store_row_groups\nINNER JOIN sys.indexes\n    ON indexes.index_id\
    \ = column_store_row_groups.index_id\n    AND indexes.object_id = column_store_row_groups.object_id\n\
    INNER JOIN sys.tables\n    ON tables.object_id = indexes.object_id\nINNER JOIN\
    \ sys.partitions\n    ON partitions.partition_number = column_store_row_groups.partition_number\n\
    \    AND partitions.index_id = indexes.index_id\n    AND partitions.object_id\
    \ = tables.object_id\nWHERE tables.name = 'Sale_CCI'\nORDER BY indexes.index_id,\
    \ column_store_row_groups.row_group_id;\n```\n\n`清单 14-1` 用于返回每个行组已删除行的查询\n\n\
    结果如 `图 14-3` 所示。\n\n![](img/521866_1_En_14_Fig3_HTML.jpg)\n\n`图 14-3` 列存储索引每个行组的已删除行计数\n\
    \n此详细信息显示了每个行组删除了多少行。结果可以聚合起来，显示每个分区或整个表的已删除行数。如果表是分区的，那么了解已删除行是仅存在于一个分区还是所有分区中，这有助于判断是需要对所有分区还是仅对部分分区进行处理。\n\
    \n在 `图 14-3` 概述的示例结果中，大约 5% 的列存储索引由已删除行组成，这些行在索引中分布相对均匀。作为粗略准则，除非已删除行的百分比至少达到分区或表中总行数的\
    \ 10%，否则没有立即进行索引维护的迫切需要。\n\n请记住，已删除行对性能的影响是随时间逐渐累积的。永远不会出现达到某个阈值后性能突然暴跌的情况。因此，当已删除行超过某个设定百分比时自动执行索引维护，是避免意外让索引变得极其碎片化的有效方法。\n\
    \n### 详述无序数据\n\n通过查询段元数据可以很容易地看出有序数据的有效性，但要量化可能具有挑战性。`清单 14-2` 中的查询展示了如何检索给定列存储索引和单个列的段最小和最大数据\
    \ ID。\n\n```sql\nSELECT\n    tables.name AS table_name,\n    indexes.name AS index_name,\n\
    \    columns.name AS column_name,\n    partitions.partition_number,\n    column_store_segments.segment_id,\n\
    \    column_store_segments.min_data_id,\n    column_store_segments.max_data_id,\n\
    \    column_store_segments.row_count\nFROM sys.column_store_segments\nINNER JOIN\
    \ sys.partitions\n    ON column_store_segments.hobt_id = partitions.hobt_id\n\
    INNER JOIN sys.indexes\n    ON indexes.index_id = partitions.index_id\n    AND\
    \ indexes.object_id = partitions.object_id\nINNER JOIN sys.tables\n    ON tables.object_id\
    \ = indexes.object_id\nINNER JOIN sys.columns\n    ON tables.object_id = columns.object_id\n\
    \    AND column_store_segments.column_id = columns.column_id\nWHERE tables.name\
    \ = 'Sale_CCI'\n    AND columns.name = 'Invoice Date Key'\nORDER BY tables.name,\
    \ columns.name, column_store_segments.segment_id;\n```\n\n`清单 14-2` 用于检索列存储索引中给定列的最小/最大数据\
    \ ID 的查询\n\n此查询的结果提供了关于此索引内数据顺序的有用见解，如 `图 14-4` 所示。\n\n![](img/521866_1_En_14_Fig4_HTML.jpg)\n\
    \n`图 14-4` 无序列存储索引的段最小/最大值元数据\n\n在元数据中，请注意每个行组的 `min_data_id` 和 `max_data_id`\
    \ 值是相同的。这意味着在 `Invoice Date Key` 列上进行筛选的查询将被迫扫描整张表才能返回结果，因为任何值都可能出现在任何行组中。\n\n\
    考虑此表的一个有序版本，其结果如 `图 14-5` 所示。\n\n![](img/521866_1_En_14_Fig5_HTML.jpg)\n\n`图 14-5`\
    \ 有序列存储索引的段最小/最大值元数据\n\n这个版本的表显示了 `min_data_id` 和 `max_data_id` 的值随着 `segment_id`\
    \ 的增加而呈现递进变化。因为每个段包含一组不同的列值，所以这个元数据可以有效地用于跳过任何包含与查询无关值的行组。`清单 14-3` 中的查询返回列存储索引中所有存在值重叠的段的完整列表。这里使用了不包含边界的不等式，因为一个行组的起始值和结束值通常会与下一个行组的值重叠。\n"
- fmt: '```

    WITH CTE_SEGMENTS AS (

    SELECT

    tables.name AS table_name,

    indexes.name AS index_name,

    columns.name AS column_name,

    partitions.partition_number,

    column_store_segments.segment_id,

    column_store_segments.min_data_id,

    column_store_segments.max_data_id,

    column_store_segments.row_count

    FROM sys.column_store_segments

    INNER JOIN sys.partitions

    ON column_store_segments.hobt_id = partitions.hobt_id

    INNER JOIN sys.indexes

    ON indexes.index_id = partitions.index_id

    AND indexes.object_id = partitions.object_id

    INNER JOIN sys.tables

    ON tables.object_id = indexes.object_id

    INNER JOIN sys.columns

    ON tables.object_id = columns.object_id

    AND column_store_segments.column_id = columns.column_id

    WHERE tables.name = ''Sale_CCI_ORDERED''

    AND columns.name = ''Invoice Date Key'')

    SELECT

    CTE_SEGMENTS.table_name,

    CTE_SEGMENTS.index_name,

    CTE_SEGMENTS.column_name,

    CTE_SEGMENTS.partition_number,

    CTE_SEGMENTS.segment_id,

    CTE_SEGMENTS.min_data_id,

    CTE_SEGMENTS.max_data_id,

    CTE_SEGMENTS.row_count,

    OVERLAPPING_SEGMENT.partition_number AS overlapping_partition_number,

    OVERLAPPING_SEGMENT.segment_id AS overlapping_segment_id,

    OVERLAPPING_SEGMENT.min_data_id AS overlapping_min_data_id,

    OVERLAPPING_SEGMENT.max_data_id AS overlapping_max_data_id

    FROM CTE_SEGMENTS

    INNER JOIN CTE_SEGMENTS OVERLAPPING_SEGMENT

    ON (OVERLAPPING_SEGMENT.min_data_id > CTE_SEGMENTS.min_data_id

    AND OVERLAPPING_SEGMENT.min_data_id  CTE_SEGMENTS.min_data_id

    AND OVERLAPPING_SEGMENT.max_data_id  CTE_SEGMENTS.max_data_id)

    ORDER BY CTE_SEGMENTS.partition_number, CTE_SEGMENTS.segment_id

    Listing 14-3

    Query to Return a List of Overlapping Segments

    ```


    This query evaluates the boundaries for the minimum and maximum value of one column
    within each rowgroup and determines if any other rowgroups overlap those values.


    The list returned by the query in Figure 14-6 may appear long at first glance,
    but it is important to note that any columnstore index that has been the target
    of UPDATE operations or unordered inserts will have entries here. Looking at the
    data returned, it can be seen that the out-of-order data is spread somewhat evenly
    across segments, with each segment containing 1–4 other segments that overlap
    at least one value with it.


    ![](images/521866_1_En_14_Chapter/521866_1_En_14_Fig6_HTML.jpg)


    Figure 14-6


    List of overlapping values within rowgroups for the `Invoice Date Key` column


    While there is no precise way to measure the percentage of unordered data in the
    same way that it was possible to measure the percentage of rows in a columnstore
    index that are deleted, it is possible to gauge how effectively data order impacts
    query performance by performing metadata tests using `COUNT(*)` queries against
    the columnstore index. This could be done for every date in the table, which would
    result in a very thorough experiment. For the sake of a simple demonstration,
    eight sample dates will be chosen at random to test, as given by the query in
    Listing 14-4.


    ```

    SELECT

    [Invoice Date Key],

    COUNT(*) AS Sale_Count

    FROM Fact.Sale_CCI_ORDERED

    WHERE [Invoice Date Key] IN (''5/1/2013'', ''9/5/2013'', ''1/17/2014'', ''6/30/2014'',
    ''3/14/2015'', ''12/12/2015'', ''1/1/2016'', ''2/29/2016'')

    GROUP BY [Invoice Date Key]

    ORDER BY [Invoice Date Key]

    Listing 14-4

    Sample Dates to Test How Ordered Data Is in a Columnstore Index

    ```


    The results in Figure 14-7 provide row counts for each data.


    ![](images/521866_1_En_14_Chapter/521866_1_En_14_Fig7_HTML.jpg)


    Figure 14-7


    List of sample dates for use in testing the effectiveness of columnstore data
    order


    Each data point chosen contains at most 0.1% of the data in the table as there
    are 25,109,150 total rows, of which these encompass eight of its dates. Based
    on the row counts and table size, an ideal ordered table would only require reading
    1–2 rowgroups to retrieve data for any of those given dates. The query in Listing
    14-5 executes separate `COUNT(*)` queries for each date identified earlier.


    ```

    SET NOCOUNT ON;

    SELECT COUNT(*) FROM Fact.Sale_CCI_ORDERED WHERE [Invoice Date Key] = ''5/1/2013'';

    SELECT COUNT(*) FROM Fact.Sale_CCI_ORDERED WHERE [Invoice Date Key] = ''9/5/2013'';

    SELECT COUNT(*) FROM Fact.Sale_CCI_ORDERED WHERE [Invoice Date Key] = ''1/17/2014'';

    SELECT COUNT(*) FROM Fact.Sale_CCI_ORDERED WHERE [Invoice Date Key] = ''6/30/2014'';

    SELECT COUNT(*) FROM Fact.Sale_CCI_ORDERED WHERE [Invoice Date Key] = ''3/14/2015'';

    SELECT COUNT(*) FROM Fact.Sale_CCI_ORDERED WHERE [Invoice Date Key] = ''12/12/2015'';

    SELECT COUNT(*) FROM Fact.Sale_CCI_ORDERED WHERE [Invoice Date Key] = ''1/1/2016'';

    SELECT COUNT(*) FROM Fact.Sale_CCI_ORDERED WHERE [Invoice Date Key] = ''2/29/2016'';

    Listing 14-5

    `COUNT` Queries to Test Rowgroup Reads

    ```


    Figure 14-8 shows the `STATISTICS IO` output for each preceding query.


    ![](images/521866_1_En_14_Chapter/521866_1_En_14_Fig8_HTML.jpg)


    Figure 14-8


    `STATISTICS IO` output for `COUNT` queries in Listing 14-5


    For each of the eight `COUNT(*)` sample queries, 3–4 rowgroups are read in order
    to retrieve the count. Based on the knowledge that these queries should read 1–2
    rowgroups, it can be deduced that queries are generally reading two to three times
    more rowgroups than is necessary. Depending on how often updates and unordered
    inserts occur on the table, this may be acceptable or it may be unusual. Knowledge
    of the table’s usage helps in understanding how extreme these numbers are and
    if reading three rowgroups instead of one is normal or worthy of attention.


    Testing rowgroups read and skipped using `STATISTICS IO` is an effective way to
    gauge how ordered a columnstore index is. If there is a desire to be complete
    about this test and use count queries against many (or all) dates in the table,
    consider treating them as maintenance and performing that research at a predetermined
    time when running a lengthy maintenance script is acceptable.


    ## The No-Maintenance Columnstore Index


    An ideal columnstore index rarely requires maintenance. This is possible when
    the following are true:


    *   Rows are never deleted.

    *   Rows are never updated.

    *   Rows are always inserted in order.


    If those three conditions can be met, then a columnstore index can be spared of
    nearly all maintenance. Whether any is performed is up to the whim of its administrator.
    Realistically, the only suboptimal scenario that can arise when the columnstore
    index is not the target of deletes, updates, or unordered inserts is that rowgroups
    may be undersized due to the use of the delta store to process small INSERT operations.


    The impact of undersized rowgroups resulting from delta store usage is minor and
    should not be seen as an urgent problem in need of an immediate resolution. In
    these scenarios, waiting for infrequent maintenance periods to perform columnstore
    index maintenance would be more than effective enough to ensure that undersized
    rowgroups are merged effectively. Quarterly or yearly is likely often enough.


    Now that the causes of fragmentation have been thoroughly detailed, using index
    maintenance operations to resolve fragmentation can be discussed.'
