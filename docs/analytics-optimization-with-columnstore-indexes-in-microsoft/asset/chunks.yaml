  trans: '

    一旦创建了暂存表，就可以使用清单 11-12 中的脚本，将分区从源表（位于`2016`文件组上）切换到该暂存表中。


    ```

    ALTER TABLE Fact.Sale_CCI_PARTITIONED SWITCH PARTITION 4 TO Fact.Sale_CCI_STAGING;

    清单 11-12

    将分区从分区列存储索引切换到暂存表的脚本

    ```


    分区切换在毫秒内即可执行完毕，因为它是一个最小化日志记录的 DDL 操作。可以通过验证暂存表中的行数来衡量结果，如清单 11-13 所示。


    ```

    SELECT COUNT(*) FROM Fact.Sale_CCI_STAGING;

    清单 11-13

    分区切换操作完成后，验证暂存表中的行数

    ```


    计数操作的结果如图 11-10 所示。


    ![](img/521866_1_En_11_Fig10_HTML.jpg)


    图 11-10

    新填充的暂存表中的行数统计


    计数查询结果显示，有超过 300 万行数据已从`Fact.Sale_CCI_PARTITIONED`切换到暂存表。接下来，可以根据需要在暂存表中修改数据，以解决已识别的任何问题。数据清理完成后，可以将其插回到原始的列存储索引中，从而确保结果数据是干净的、没有碎片的。清单
    11-14 展示了一个如何执行此数据修改过程的示例。


    ```

    UPDATE Sale_CCI_STAGING

    SET [Total Dry Items] = [Total Dry Items] + 1

    FROM Fact.Sale_CCI_STAGING;

    INSERT INTO Fact.Sale_CCI_PARTITIONED

    ([Sale Key], [City Key], [Customer Key], [Bill To Customer Key], [Stock Item Key],
    [Invoice Date Key], [Delivery Date Key], [Salesperson Key],

    [WWI Invoice ID], Description, Package, Quantity, [Unit Price], [Tax Rate], [Total
    Excluding Tax], [Tax Amount], Profit, [Total Including Tax],

    [Total Dry Items], [Total Chiller Items], [Lineage Key])

    SELECT

    [Sale Key], [City Key], [Customer Key], [Bill To Customer Key], [Stock Item Key],
    [Invoice Date Key], [Delivery Date Key], [Salesperson Key],

    [WWI Invoice ID], Description, Package, Quantity, [Unit Price], [Tax Rate], [Total
    Excluding Tax], [Tax Amount], Profit, [Total Including Tax],

    [Total Dry Items], [Total Chiller Items], [Lineage Key]

    FROM Fact.Sale_CCI_STAGING;

    DROP TABLE Fact.Sale_CCI_STAGING;

    清单 11-14

    使用暂存数据进行数据修改的示例。通过 INSERT 操作将数据移回父表

    ```


    UPDATE 操作开销很大，但通过将其隔离到暂存表中，该操作的争用就不会影响到更大的列存储索引。一旦更新完成，数据就可以插回到分区表中，然后删除暂存表。


    另外，也可以用另一次分区切换来替代`INSERT`操作。清单 11-15 中的代码展示了清单 11-14 代码的一个替代方案。


    ```

    UPDATE Sale_CCI_STAGING

    SET [Total Dry Items] = [Total Dry Items] + 1

    FROM Fact.Sale_CCI_STAGING;

    ALTER TABLE Fact.Sale_CCI_STAGING SWITCH PARTITION 4 TO Fact.Sale_CCI_PARTITIONED;

    DROP TABLE Fact.Sale_CCI_STAGING;

    清单 11-15

    使用暂存数据进行数据修改的示例。通过分区切换将数据移回父表

    ```


    这个替代代码的速度会显著更快，因为分区切换是一个快速、最小化日志记录的 DDL 操作，而清单 11-14 中的大型`INSERT`操作则需要承担将所有数据写回`Fact.Sale_CCI_Partitioned`的开销。


    分区切换是一个多功能工具，可用于各种数据修改、归档和删除场景。其具体用法因应用程序而异，但它提供了一种快速在表之间移入和移出数据的方法，避免了大型写入操作带来的碎片和开销。


    ## 分区指南


    虽然分区听起来对任何列存储索引都有好处，但不应未经研究和预见就自动实施。分区在大表中效果很好，但对小列存储索引没有提供多少价值。因此，容量规划应该是决策过程中的一个步骤，以确定分区是否适合任何给定的表。


    ### 分区和行组大小调整


    由于分区是在创建行组之前应用于表的，因此分区边界将强制截断行组。例如，如果一个非分区的列存储索引包含 5,000,000 行，这些行很可能驻留在 5 个行组中。如果创建该表的新版本，并按一个均匀跨越
    10 年的日期列进行分区，那么结果将是每个分区包含 500,000 行。


    但是，行组不能跨分区。新的分区表将包含十个分区，每个分区由一个单独的行组组成。结果是一个拥有十个行组而非五个的表。


    一般来说，除非表包含至少数千万或数亿行数据，否则分区不适用于列存储索引。同样重要的是，分区需要足够大，以利于使用填满的行组。因此，分区函数和分区方案需要确保每个分区至少包含`2²⁰`（`1,048,576`）行。过小的分区将导致行组过小，随着时间的推移会产生碎片。


    列存储索引越大，从分区中受益就越多。将分区边界与组织需求对齐也有助于确定如何在列存储索引上实施分区。如果一个组织每季度归档十亿行数据，那么按季度分区就非常合理。相反，如果归档是按年组织的，那么按年分区将更合适。


    ### 分区列选择


    为分区函数选择的列应与列存储索引的排序列相同。当分区和行组消除操作在相同的数据集上运行时，它们的效果最好，而这只有在它们使用相同的排序条件时才能实现。因此，如果列存储索引是按某个特定日期列排序的，那么分区也应该在该列上进行配置。按另一列分区可能会导致性能下降，因为
    SQL Server 需要扫描更多分区中更多的行组来检索所需的数据。


    ### 存储选择


    如果列存储索引内的数据访问模式不同，用于分区表的数据文件可以反映这种使用情况。如果旧数据很少被访问且可以容忍更高的延迟，那么可以将其移动到速度更慢/成本更低的硬件上。如果新数据需要高可用性且延迟极低，则可以将其放置在更快、更昂贵的存储上。


    因此，可以拆分大表以节省成本。落在更便宜存储上的每一 TB 数据都代表着可以轻松量化的成本节约。虽然分区的主要目的不是省钱，但通过战略性的数据文件布局来转移工作负载，可以在不付出巨大努力的情况下实现这一目标。


    在构建分区表时，识别表中是否有遵循不同使用模式的数据，并尽可能根据使用情况将数据文件分配到较慢或较快的存储。如果性能需求随时间变化，可以在存储位置之间移动数据文件，以确保即使曾经很少需要的数据变得对频繁的分析过程至关重要，也能持续满足`SLA`。

    '
- fmt: '## Additional Benefits


    表分区的最大好处之一是，它无需更改应用程序代码。所有分区结构都是 SQL Server 内部的，除了在访问表时所体验到的性能提升外，对应用程序没有其他影响。这也意味着，分区可以针对分析数据进行测试，并根据测试结果决定保留或回滚。回滚操作包括创建数据的第二个副本并将其交换到生产位置，但对于分析数据来说，这是一个合理的过程，因为数据加载过程完全在数据架构的范围之内。这使得分区能够在对开发人员编写来使用这些数据的代码产生最小影响的情况下进行测试。


    分区是实现列存储索引时的一个可选步骤，但可以改善维护、加速分析工作负载并可能节省成本。此功能应针对至少有数千万行且预计会随时间快速增长的大型表。


    # 12. 表上的非聚集列存储索引


    聚集列存储索引为分析数据提供了主要的存储机制。对于旨在用作 OLAP 数据源的表，这是最佳选择，并将提供一种有助于对分析数据进行快速高效读写的数据结构。


    对于主要是事务性但也需对其执行分析查询的表，聚集列存储索引并不合适。有几种选项可用于管理这些额外的分析工作负载，包括：


    *   创建覆盖行存储索引。

    *   分离 OLTP 和 OLAP。

    *   创建非聚集列存储索引。

    *   接受不修改数据库架构的 OLAP 查询。


    虽然纯粹的 OLTP 或 OLAP 工作负载可以用纯粹的事务性或分析性数据结构来管理，但混合工作负载更为复杂，需要更仔细地检查读写操作以了解如何最好地管理它。本章将讨论每种替代方案及其最适用的情况，并提供关于如何为给定工作负载选择最佳存储方法的指导。


    ## 使用行存储索引


    这是大多数事务性应用程序的典型初始默认设置。数据开始时较小，随时间增长。当行数较少时，对事务性数据运行分析查询的性能足够好，无需进行重大修改即可满足这些需求。


    依赖行存储表和单列非聚集行存储索引就足够了，直到数据大小和争用变得足够显著，导致：


    *   锁定

    *   阻塞

    *   过度的资源消耗

    *   长时间运行的查询


    一旦达到该阈值，就需要其他解决方案。一般来说，针对行存储索引运行分析进程会导致索引扫描、大量读取和高内存使用情况，并且随着数据增长到数百万或数十亿行，这些成本无法很好地扩展。图
    12-1 展示了在行存储表上运行混合工作负载所面临挑战的简化图示。


    ![](images/521866_1_En_12_Chapter/521866_1_En_12_Fig1_HTML.jpg)


    图 12-1


    针对行存储表的 OLAP 和 OLTP 查询的挑战


    虽然混合分析和事务性需求对于较小、不太繁忙的表是可行的，但当使用量或大小变得显著时，挑战必然会出现。通常，如果预计表会变得很大，建议避免依赖行存储表进行分析。


    覆盖索引允许行存储索引完全覆盖一个分析查询。这可以提供比聚集索引扫描和键查找更好的性能，并且当分析查询范围有限且数量不多时，这是一个很好的解决方案。


    例如，考虑清单 12-1 中的查询。


    ```sql

    SELECT

    COUNT(*) AS sale_count,

    COUNT(DISTINCT SalespersonPersonID) AS sales_people_count,

    SUM(CAST(IsUndersupplyBackordered AS INT)) AS undersupply_backorder_count

    FROM Sales.Orders

    WHERE CustomerID = 90

    AND OrderDate >= ''1/1/2015''

    AND OrderDate < ''1/1/2016'';

    ```

    清单 12-1

    针对事务性表的分析查询示例


    此查询是对事务性数据进行分析的常见示例。图 12-2 显示了此查询的执行计划。


    ![](images/521866_1_En_12_Chapter/521866_1_En_12_Fig2_HTML.jpg)


    图 12-2

    针对事务性表的分析查询的执行计划


    执行计划显示了一个在索引上针对 `CustomerID` 进行筛选的索引查找。键查找从聚集索引中检索满足查询所需的其他列。在 STATISTICS IO 中找到的该查询的
    IO 如图 12-3 所示。


    ![](images/521866_1_En_12_Chapter/521866_1_En_12_Fig3_HTML.jpg)


    图 12-3

    针对事务性表的分析查询的 STATISTICS IO


    请注意，键查找产生了大量的逻辑 IO，因为 SQL Server 不得不返回到聚集索引以检索 `OrderDate`、`SalespersonPersonID`
    和 `IsUndersupplyBackordered` 列。如果此查询经常执行且形式变化不大，则覆盖索引可以是一种充分的管理方式。清单 12-2 创建了一个覆盖此示例查询的索引。


    ```sql

    CREATE NONCLUSTERED INDEX NCI_Orders_covering

    ON Sales.Orders (OrderDate, CustomerID)

    INCLUDE (SalespersonPersonID, IsUndersupplyBackordered);

    ```

    清单 12-2

    完全覆盖分析查询的非聚集行存储索引


    创建这个新的覆盖索引后，测试查询的执行计划已简化为图 12-4 所示。


    ![](images/521866_1_En_12_Chapter/521866_1_En_12_Fig4_HTML.jpg)


    图 12-4

    使用行存储覆盖索引的分析查询的执行计划


    执行计划显示的是索引查找，而不是之前的查找加键查找。STATISTICS IO 的更新输出如图 12-5 所示。


    ![](images/521866_1_En_12_Chapter/521866_1_En_12_Fig5_HTML.jpg)


    图 12-5

    使用行存储覆盖索引的分析查询的 STATISTICS IO


    新的 STATISTICS IO 输出显示 IO 减少了七倍，从 470 次读取降到 67 次。覆盖索引为分析查询提供了显著的性能提升，并且作为额外的好处，由于新索引是一个可以与聚集索引分开读取的独立对象，还可以减少争用。


    覆盖索引对于特定、一致且数量较少的分析查询是很好的工具。试图通过创建过多的覆盖索引来跟上新的分析查询存在危险。过度索引是一个实际问题，会损害写入性能、浪费存储空间并消耗大量内存。同样，包含太多列的覆盖索引注定会浪费空间。实际上，包含太多列的覆盖索引很快就会退化为表的副本，维护成本高昂。


    覆盖索引有用的理想场景可以概括如下：


    *   非常有限数量的特定、有针对性的分析查询。

    *   分析查询不经常变化（如果有的话）。

    *   分析查询发生的频率足以值得采取一些索引操作。

    *   列列表有限。

    *   环境有利于在将来不再需要时删除索引。'
  raw: '## Additional Benefits


    One of the greatest benefits of table partitioning is that it requires no application
    code changes. All partitioning structures are internal to SQL Server and have
    no bearing on an application beyond the performance experienced as the table is
    accessed. This also means that partitioning can be tested out for analytic data
    and kept or rolled back depending on the results of that testing. A “rollback”
    would consist of creating a second copy of data and swapping it into the production
    location, but is a reasonable process with analytic data where data load processes
    are well within the confines of data architecture. This allows partitioning to
    be tested with minimal impact on the code that developers write to consume this
    data.


    Partitioning is an optional step when implementing a columnstore index, but can
    improve maintenance, speed up analytic workloads, and potentially save money.
    This feature should be targeted at larger tables with at least tens of millions
    of rows and that are expected to grow rapidly over time.


    # 12. Nonclustered Columnstore Indexes on Rowstore Tables


    Clustered columnstore indexes provide a primary storage mechanism for analytic
    data. For tables that are intended for use as OLAP data sources, this is the optimal
    choice and will provide a data structure that facilitates fast and efficient reads
    and writes against analytic data.


    For tables that are primarily transactional in nature, but also have analytic
    queries executed against them, a clustered columnstore index is not appropriate.
    There are a handful of options available to manage those additional analytic workloads,
    including


    *   Create covering rowstore indexes.


    *   Separate OLTP and OLAP.


    *   Create nonclustered columnstore indexes.


    *   Accept OLAP queries with no modifications to database schema.


    Whereas a purely OLTP or OLAP workload can be managed with purely transactional
    or analytic data structures, a mixed workload is more complex and requires a more
    careful inspection of reads and writes to understand how to best manage it. This
    chapter will discuss each alternative and when they are most appropriate, providing
    guidance on how to choose the best storage methodology for a given workload.


    ## Use Rowstore Indexes


    This is the typical startup default for most transactional applications. Data
    begins small and grows over time. When row counts are low, running analytic queries
    against transactional data is performant enough that no significant modifications
    are needed to service them.


    Relying on rowstore tables and single-column nonclustered rowstore indexes will
    suffice until data size and contention become significant enough to result in


    *   Locking


    *   Blocking


    *   Excessive resource consumption


    *   Long-running queries


    Once that threshold has been reached, another solution is required. Generally
    speaking, running analytic processes against rowstore indexes will result in index
    scans, heavy reads, and high memory usage, and those costs do not scale well as
    data grows into millions or billions of rows. Figure [12-1](#521866_1_En_12_Chapter.xhtml#Fig1)
    shows a simplification of the challenges of running mixed workloads against a
    rowstore table.


    ![](images/521866_1_En_12_Chapter/521866_1_En_12_Fig1_HTML.jpg)


    Figure 12-1


    The challenge of OLAP and OLTP queries against rowstore tables


    While mixing analytic and transactional needs works for small, less busy tables,
    challenges are guaranteed to arise when usage or size becomes significant. As
    a rule, it is generally advisable to avoid relying on rowstore tables for analytics
    if the table is expected to grow large.


    Covering indexes allow for a rowstore index to completely cover an analytic query.
    This can offer improvement from clustered index scans and key lookups and is a
    good solution when analytics are limited in scope to a handful of well-understood
    queries.


    For example, consider the query in Listing [12-1](#521866_1_En_12_Chapter.xhtml#PC1).


    ```

    SELECT

    COUNT(*) AS sale_count,

    COUNT(DISTINCT SalespersonPersonID) AS sales_people_count,

    SUM(CAST(IsUndersupplyBackordered AS INT)) AS undersupply_backorder_count

    FROM Sales.Orders

    WHERE CustomerID = 90

    AND OrderDate >= ''1/1/2015''

    AND OrderDate < ''1/1/2016'';

    Listing 12-1

    Example Analytic Query Against a Transactional Table

    ```


    This query is a common example of analytics against transactional data. Figure
    [12-2](#521866_1_En_12_Chapter.xhtml#Fig2) shows the execution plan for this query.


    ![](images/521866_1_En_12_Chapter/521866_1_En_12_Fig2_HTML.jpg)


    Figure 12-2


    Execution plan for an analytic query against a transactional table


    The execution plan shows an index seek that filters on the index for *CustomerID*.
    The key lookup retrieves the other columns from the clustered index that are needed
    to satisfy the query. The IO for the query as found in STATISTICS IO is shown
    in Figure [12-3](#521866_1_En_12_Chapter.xhtml#Fig3).


    ![](images/521866_1_En_12_Chapter/521866_1_En_12_Fig3_HTML.jpg)


    Figure 12-3


    STATISTICS IO for an analytic query against a transactional table


    Note that the key lookup incurred quite a bit of logical IO as SQL Server had
    to return to the clustered index to retrieve the *OrderDate*, *SalespersonPersonID*,
    and *IsUndersupplyBackordered* columns. If this query is executed often and does
    not vary significantly in form, a covering index can be an adequate way to manage
    it. Listing [12-2](#521866_1_En_12_Chapter.xhtml#PC2) creates an index that covers
    this sample query.


    ```

    CREATE NONCLUSTERED INDEX NCI_Orders_covering

    ON Sales.Orders (OrderDate, CustomerID)

    INCLUDE (SalespersonPersonID, IsUndersupplyBackordered);

    Listing 12-2

    Nonclustered Rowstore Index That Fully Covers an Analytic Query

    ```


    After creating this new covering index, the execution plan for the test query
    has been simplified to what is seen in Figure [12-4](#521866_1_En_12_Chapter.xhtml#Fig4).


    ![](images/521866_1_En_12_Chapter/521866_1_En_12_Fig4_HTML.jpg)


    Figure 12-4


    Execution plan for an analytic query using a rowstore covering index


    The execution plan shows an index seek, rather than a seek plus a key lookup,
    as was the case before. The updated output of STATISTICS IO is shown in Figure
    [12-5](#521866_1_En_12_Chapter.xhtml#Fig5).


    ![](images/521866_1_En_12_Chapter/521866_1_En_12_Fig5_HTML.jpg)


    Figure 12-5


    STATISTICS IO for an analytic query using a rowstore covering index


    The new STATISTICS IO output shows a seven times decrease in IO, from 470 reads
    to 67\. The covering index provides a significant performance boost to the analytic
    query, and as an added bonus can reduce contention as the new index is a separate
    object that can be read separately from the clustered index.


    Covering indexes are great tools for analytic queries that are specific, consistent,
    and few in number. There is a danger in creating excessive numbers of covering
    indexes to try and keep up with new analytic queries. Over-indexing is a legitimate
    problem that can hamper write performance, waste storage, and consume significant
    memory. Similarly, covering indexes that contain too many columns are destined
    to waste space. For all intents and purposes, a covering index with too many columns
    can quickly devolve into a copy of the table, which is expensive to maintain.


    The ideal scenarios where a covering index can be useful can be generalized as
    follows:


    *   Very limited number of specific, targeted analytic queries.


    *   Analytic queries that do not change often, if ever.


    *   Analytic queries that occur often enough to warrant some indexing action be
    taken.


    *   Column list is limited.


    *   Environment is conducive to removal of the index in the future, when no longer
    needed.'
  trans: '

    ## 额外优势


    表分区的最大优势之一在于，它无需修改应用程序代码。所有分区结构都是 SQL Server 内部管理的，除了能体验到性能提升外，对应用程序没有其他影响。这也意味着，可以先对分析数据测试分区功能，并根据测试结果决定保留或回滚。回滚操作包括创建数据的第二个副本并将其交换回生产位置，但对于分析数据而言，这是一个合理的过程，因为数据加载过程完全处于数据架构的管控范围内。这使得分区能够在对开发人员编写的、使用这些数据的代码产生最小影响的情况下进行测试。


    分区是实现列存储索引时的一个可选步骤，但它可以改善维护、加速分析工作负载并可能节省成本。此功能适用于至少有数千万行且预计会随时间快速增长的大型表。


    # 12. 表上的非聚集列存储索引


    聚集列存储索引为分析数据提供了主要的存储机制。对于旨在用作 OLAP 数据源的表，这是最佳选择，并将提供一种有助于对分析数据进行快速高效读写的数据结构。


    对于主要是事务性但也需对其执行分析查询的表，聚集列存储索引并不合适。有几种选项可用于管理这些额外的分析工作负载，包括：


    *   创建覆盖行存储索引。

    *   分离 OLTP 和 OLAP。

    *   创建非聚集列存储索引。

    *   接受不修改数据库架构的 OLAP 查询。


    虽然纯粹的 OLTP 或 OLAP 工作负载可以用纯粹的事务性或分析性数据结构来管理，但混合工作负载更为复杂，需要更仔细地检查读写操作以了解如何最好地管理它。本章将讨论每种替代方案及其最适用的情况，并提供关于如何为给定工作负载选择最佳存储方法的指导。


    ## 使用行存储索引


    这是大多数事务性应用程序的典型初始默认设置。数据开始时较小，随时间增长。当行数较少时，对事务性数据运行分析查询的性能足够好，无需进行重大修改即可满足这些需求。


    在数据大小和争用变得足够显著，导致出现以下问题之前，依赖行存储表和单列非聚集行存储索引就足够了：


    *   锁定

    *   阻塞

    *   过度的资源消耗

    *   长时间运行的查询


    一旦达到该阈值，就需要其他解决方案。一般来说，针对行存储索引运行分析进程会导致索引扫描、大量读取和高内存使用情况，并且随着数据增长到数百万或数十亿行，这些成本无法很好地扩展。图
    12-1 展示了在行存储表上运行混合工作负载所面临挑战的简化图示。


    ![](img/521866_1_En_12_Fig1_HTML.jpg)


    图 12-1


    针对行存储表的 OLAP 和 OLTP 查询的挑战


    虽然混合分析和事务性需求对于较小、不太繁忙的表是可行的，但当使用量或大小变得显著时，挑战必然会出现。通常，如果预计表会变得很大，建议避免依赖行存储表进行分析。


    覆盖索引允许行存储索引完全覆盖一个分析查询。这可以提供比聚集索引扫描和键查找更好的性能，并且当分析查询范围有限且数量不多时，这是一个很好的解决方案。


    例如，考虑清单 12-1 中的查询。


    ```sql

    SELECT

    COUNT(*) AS sale_count,

    COUNT(DISTINCT SalespersonPersonID) AS sales_people_count,

    SUM(CAST(IsUndersupplyBackordered AS INT)) AS undersupply_backorder_count

    FROM Sales.Orders

    WHERE CustomerID = 90

    AND OrderDate >= ''1/1/2015''

    AND OrderDate < ''1/1/2016'';

    ```

    清单 12-1

    针对事务性表的分析查询示例


    此查询是对事务性数据进行分析的常见示例。图 12-2 显示了此查询的执行计划。


    ![](img/521866_1_En_12_Fig2_HTML.jpg)


    图 12-2

    针对事务性表的分析查询的执行计划


    执行计划显示了一个在索引上针对 `CustomerID` 进行筛选的索引查找。键查找从聚集索引中检索满足查询所需的其他列。在 STATISTICS IO 中找到的该查询的
    IO 如图 12-3 所示。


    ![](img/521866_1_En_12_Fig3_HTML.jpg)


    图 12-3

    针对事务性表的分析查询的 STATISTICS IO


    请注意，键查找产生了大量的逻辑 IO，因为 SQL Server 不得不返回到聚集索引以检索 `OrderDate`、`SalespersonPersonID`
    和 `IsUndersupplyBackordered` 列。如果此查询经常执行且形式变化不大，则覆盖索引可以是一种充分的管理方式。清单 12-2 创建了一个覆盖此示例查询的索引。


    ```sql

    CREATE NONCLUSTERED INDEX NCI_Orders_covering

    ON Sales.Orders (OrderDate, CustomerID)

    INCLUDE (SalespersonPersonID, IsUndersupplyBackordered);

    ```

    清单 12-2

    完全覆盖分析查询的非聚集行存储索引


    创建这个新的覆盖索引后，测试查询的执行计划已简化为图 12-4 所示。


    ![](img/521866_1_En_12_Fig4_HTML.jpg)


    图 12-4

    使用行存储覆盖索引的分析查询的执行计划


    执行计划显示的是索引查找，而不是之前的查找加键查找。STATISTICS IO 的更新输出如图 12-5 所示。


    ![](img/521866_1_En_12_Fig5_HTML.jpg)


    图 12-5

    使用行存储覆盖索引的分析查询的 STATISTICS IO


    新的 STATISTICS IO 输出显示 IO 减少了七倍，从 470 次读取降到 67 次。覆盖索引为分析查询提供了显著的性能提升，并且作为额外的好处，由于新索引是一个可以与聚集索引分开读取的独立对象，还可以减少争用。


    覆盖索引对于特定、一致且数量较少的分析查询是很好的工具。试图通过创建过多的覆盖索引来跟上新的分析查询存在危险。过度索引是一个实际问题，会损害写入性能、浪费存储空间并消耗大量内存。同样，包含太多列的覆盖索引注定会浪费空间。实际上，包含太多列的覆盖索引很快就会退化为表的副本，维护成本高昂。


    覆盖索引有用的理想场景可以概括如下：


    *   非常有限数量的特定、有针对性的分析查询。

    *   分析查询不经常变化（如果有的话）。

    *   分析查询发生的频率足以值得采取一些索引操作。

    *   列列表有限。

    *   环境有利于在将来不再需要时删除索引。

