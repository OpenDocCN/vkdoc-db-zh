    ## `批处理模式如何工作？`


    批处理模式处理的目标是提高数据从存储位置到 SQL Server CPU 的吞吐量。为实现这一点，SQL Server 从根本上改变了数据在执行计划中从头至尾的流动方式。


    一个查询执行计划可以包含一个或多个操作符，这些操作符在结果返回之前会检索、联接或转换数据。在行模式处理中，行被逐一传递到这些操作符之间。使用行模式时，查询执行的基本工作单元是行。请参考图
    7-9 中展示的执行计划。


    ![](img/521866_1_En_7_Fig9_HTML.jpg)


    图 7-9


    包含行数的行模式执行计划示例


    在该执行计划中，一个聚集索引扫描正在检索 276 行，这些行被传入一个聚合操作，产生单行结果并由查询返回。在行模式中，276 行中的每一行都单独地从聚集索引扫描操作符传输到流聚合操作符。


    当启用时，批处理模式会同时处理多行，将生成的数据结构作为一组向量存储在内存中。这导致数据在执行计划的操作符之间传递的方式发生了彻底改变。每个批处理最多可消耗
    64 KB，并包含 64 到 900 行。行批处理可以如图 7-10 所示。


    ![](img/521866_1_En_7_Fig10_HTML.jpg)


    图 7-10


    行批处理的基本结构


    行批处理在结构上有点类似于列存储索引，并在查询执行时提供类似的内存优势。合格行向量的功能类似于列存储索引的删除位图，因为它标记了批处理不再逻辑上需要的行。例如，如果对数据集应用了筛选器，可以通过仅更新要筛选掉的行的合格行向量来单独处理。


    批处理模式处理通过减少数据在执行计划操作符之间传递的次数来降低 CPU 消耗。例如，通过行模式处理 5000 行将需要至少 5000 次 CPU 操作来在计划操作符之间移动它。相同的数据集通过批处理模式处理可能会将每
    500 行分配给十个批处理。在这种情况下，数据可以通过 5000/500 = 10 次操作在执行计划操作符之间传递。这些是近似值，但足以说明批处理模式和行模式处理如何影响
    CPU 消耗。


    批处理模式处理的另一个好处是它能够轻松利用并行处理。批处理可以并行处理，允许具有可用 CPU 容量的多核 CPU 架构更高效地处理查询计划操作符。并行处理是一个需要一些
    CPU 开销才能利用的过程。因此，参与并行处理的行数需要足够大，以使将工作负载分解为更小块的好处大于这样做的成本。在这方面，行模式无法像批处理模式那样容易地从并行处理中受益，因为将单行操作拆分为单独的并行操作然后再将它们合并回来的开销远大于该过程提供的微不足道的节省。


    虽然批处理模式可能并不总是为行存储表选择，但它将成为列存储索引的默认选择。由于一个行组最多可包含 2²⁰ 行，需要由列存储索引扫描处理的数据量将足够大，以确保
    SQL Server 选择批处理模式作为该数据查询提供最佳性能的可能候选方案。


    ## `批处理模式与行模式性能对比`


    虽然列存储索引最常默认使用批处理模式处理，但行存储表可以选择使用哪种模式。该决策将基于查询的基数、需要读取的数据量以及所涉及的 SQL Server 版本。


    直接比较查询在使用行模式与使用批处理模式时的性能，并测量批处理模式提供的性能增益是有价值的。


    以下查询对列存储索引执行了两次简单的分析操作：一次使用兼容级别 120 (SQL Server 2014)，另一次使用兼容级别 130 (SQL Server
    2016)。清单 7-6 提供了执行此比较的代码。


    ```

