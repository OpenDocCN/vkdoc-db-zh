    The first step to compressing this data is to create an indexed dictionary, as
    seen in Table [5-7](#521866_1_En_5_Chapter.xhtml#Tab7).


    Table 5-7


    Example of a Dictionary That Is Generated from VARCHAR Data


    | Index ID | VARCHAR Value |

