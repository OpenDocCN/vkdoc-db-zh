  trans: '

    ## 数据库维护


    部分数据库维护任务（例如备份和索引维护）可以逐分区执行。由于较旧分区中的数据很少更改，因此其所需维护频率通常低于新数据。这意味着维护可以集中在最需要维护的特定分区上。这也意味着维护速度可以大幅提升，因为不再需要一次性操作整个表。


    此外，数据管理方式可以因分区而异。针对不同分区处理数据的一些方式包括：


    *   `压缩`可以按分区进行自定义。在列存储索引中，可以将存档压缩应用于较旧且较少使用的分区，而标准列存储压缩则可以作为新数据的默认设置。


    *   分区可以单独进行`截断`，从而快速从表的一部分移除数据，而无需使用 `DELETE` 语句。


    *   `分区切换`允许快速高效地将数据移入和移出分区表。这可以显著加快迁移、数据归档以及其他需要一次性移动大量数据的过程。


    ## 分区实战


    为了直观展示分区的工作原理，我们将创建测试表 `Fact.Sale_CLI` 的新版本。此版本将按 `Invoice Date Key` 排序，并按年份进行分区。每个分区需要对应一个文件组，而每个文件组又将包含一个数据文件。在此演示中，我们将为表中代表的每一年创建一个新的文件组和文件。


    代码清单 11-1 展示了如何创建用于存储分区表数据的新文件组。


    ```sql

    ALTER DATABASE WideWorldImportersDW ADD FILEGROUP WideWorldImportersDW_2013_fg;

    ALTER DATABASE WideWorldImportersDW ADD FILEGROUP WideWorldImportersDW_2014_fg;

    ALTER DATABASE WideWorldImportersDW ADD FILEGROUP WideWorldImportersDW_2015_fg;

    ALTER DATABASE WideWorldImportersDW ADD FILEGROUP WideWorldImportersDW_2016_fg;

    ALTER DATABASE WideWorldImportersDW ADD FILEGROUP WideWorldImportersDW_2017_fg;

    ```


    **代码清单 11-1** 为表中每年的数据创建新文件组的脚本


    执行后，可以通过检查数据库属性中的“文件组”菜单来确认新数据库文件组是否存在，如图 11-4 所示。


    ![](img/521866_1_En_11_Fig4_HTML.jpg)


    **图 11-4** 将用于存储分区数据的新文件组


    虽然这五个新文件组已存在于数据库中，但它们不包含任何文件。此过程的下一步是向这些文件组添加文件（每个文件组一个）。代码清单 11-2 包含了添加这些文件所需的代码。


    ```sql

    ALTER DATABASE WideWorldImportersDW ADD FILE

    (NAME = WideWorldImportersDW_2013_data, FILENAME = ''C:\SQLData\WideWorldImportersDW_2013_data.ndf'',

    SIZE = 200MB, MAXSIZE = UNLIMITED, FILEGROWTH = 1GB)

    TO FILEGROUP WideWorldImportersDW_2013_fg;

    ALTER DATABASE WideWorldImportersDW ADD FILE

    (NAME = WideWorldImportersDW_2014_data, FILENAME = ''C:\SQLData\WideWorldImportersDW_2014_data.ndf'',

    SIZE = 200MB, MAXSIZE = UNLIMITED, FILEGROWTH = 1GB)

    TO FILEGROUP WideWorldImportersDW_2014_fg;

    ALTER DATABASE WideWorldImportersDW ADD FILE

    (NAME = WideWorldImportersDW_2015_data, FILENAME = ''C:\SQLData\WideWorldImportersDW_2015_data.ndf'',

    SIZE = 200MB, MAXSIZE = UNLIMITED, FILEGROWTH = 1GB)

    TO FILEGROUP WideWorldImportersDW_2015_fg;

    ALTER DATABASE WideWorldImportersDW ADD FILE

    (NAME = WideWorldImportersDW_2016_data, FILENAME = ''C:\SQLData\WideWorldImportersDW_2016_data.ndf'',

    SIZE = 200MB, MAXSIZE = UNLIMITED, FILEGROWTH = 1GB)

    TO FILEGROUP WideWorldImportersDW_2016_fg;

    ALTER DATABASE WideWorldImportersDW ADD FILE

    (NAME = WideWorldImportersDW_2017_data, FILENAME = ''C:\SQLData\WideWorldImportersDW_2017_data.ndf'',

    SIZE = 200MB, MAXSIZE = UNLIMITED, FILEGROWTH = 1GB)

    TO FILEGROUP WideWorldImportersDW_2017_fg;

    ```


    **代码清单 11-2** 向每个新文件组添加文件的脚本


    在此演示中，每个文件的大小和增长设置相同，但对于真实世界的表，这些数值会有所不同。通过检查待分区数据的大小，应能相对容易地计算出每年所需的空间量。请注意，一旦表的数据迁移到分区表，原来存储其数据的数据文件将产生额外的可用空间，如果需要，可以回收这些空间。图
    11-5 显示了在数据库属性的“文件”菜单下列出的新文件。


    ![](img/521866_1_En_11_Fig5_HTML.jpg)


    **图 11-5** 将用于存储分区数据的新数据库文件


    新的数据库文件可以放置在服务器可用的任何存储上。在这里，可以根据表所遵循的任何服务级别协议（SLA）来自定义其数据存储。对于此示例，如果 2016 年之前的数据很少被访问，可以将其放置在速度较慢的存储上的文件中。同样，较新的数据可以保留在更快的存储上，以支持频繁的分析。

    '
- fmt: '配置分区的下一步是确定如何将表中的数据切分到新创建的文件中。这是通过分区函数实现的。在使用列存储索引时，请确保表所依据排序的列与分区函数使用的数据类型相同。此约定与聚集行存储索引相同。如果分区函数的数据类型与表中用于排序的目标列不匹配，则在创建表时将抛出错误。在本演示中，分区函数将使用`DATE`数据类型来拆分数据，该数据类型对应于`Fact.Sale_CCI`所依据排序的*Invoice
    Date Key*列，如清单[11-3](#521866_1_En_11_Chapter.xhtml#PC3)所示。


    ```

    CREATE PARTITION FUNCTION fact_Sale_CCI_years_function (DATE)

    AS RANGE RIGHT FOR VALUES

    (''1/1/2014'', ''1/1/2015'', ''1/1/2016'', ''1/1/2017'');

    Listing 11-3

    Creation of a Partition Function That Organizes Data by Date

    ```


    `RANGE RIGHT`指定创建的边界将使用提供的日期作为起始点来定义。结果是将数据划分为五个桶，如下所示：


    1.  所有日期 < `1/1/2014`


    2.  日期 >= `1/1/2014` 且 < `1/1/2015`


    3.  日期 >= `1/1/2015` 且 < `1/1/2016`


    4.  日期 >= `1/1/2016` 且 < `1/1/2017`


    5.  日期 >= `1/1/2017`


    如果使用`RANGE LEFT`，则会导致日期范围的不等式运算符进行调整，使得边界使用大于和小于等于来检查，而不是前面所示的方式。如果不确定使用哪个，请考虑为基于时间的维度实现`RANGE
    RIGHT`，因为它通常是一种更自然的划分方式，可以清晰地划分月、季度、年等时间单位。以下列表显示了如果在清单[11-3](#521866_1_En_11_Chapter.xhtml#PC3)的分区函数中使用`RANGE
    LEFT`，边界将如何定义：


    1.  所有日期 <= `1/1/2014`


    2.  日期 > `1/1/2014` 且 <= `1/1/2015`


    3.  日期 > `1/1/2015` 且 <= `1/1/2016`


    4.  日期 > `1/1/2016` 且 <= `1/1/2017`


    5.  日期 > `1/1/2017`


    这种边界配置对于日期来说有些违反直觉，但对于其他数据类型可能适用。


    在表上实现分区之前的最后一步是创建分区方案。分区方案用于将分区函数中定义的数据边界映射到之前定义的文件组上。在这里可以决定哪些日期范围对应哪些物理数据库文件。清单[11-4](#521866_1_En_11_Chapter.xhtml#PC4)提供了一个分区方案，它将分区函数定义的每个日期范围分配给五个新创建的文件组之一。


    ```

    CREATE PARTITION SCHEME fact_Sale_CCI_years_scheme

    AS PARTITION fact_Sale_CCI_years_function

    TO (WideWorldImportersDW_2013_fg, WideWorldImportersDW_2014_fg, WideWorldImportersDW_2015_fg,
    WideWorldImportersDW_2016_fg, WideWorldImportersDW_2017_fg);

    Listing 11-4

    Creation of a Partition Scheme to Assign Dates to Database Filegroups

    ```


    请注意，分区函数指定的边界总是比文件组的数量少一个。在此示例中，分区函数提供了四个日期，这些日期形成日期边界，定义了五个不同的日期范围，这些范围随后映射到分区方案上并分配了文件组。如果分区函数提供的边界数量不是比分区方案少一个，则将返回错误，类似于图[11-6](#521866_1_En_11_Chapter.xhtml#Fig6)中所见的情况。


    ![](images/521866_1_En_11_Chapter/521866_1_En_11_Fig6_HTML.jpg)


    Figure 11-6


    Error received if partition scheme contains too few filegroup entries


    该错误信息足够详细，可以提醒用户该函数生成的分区数量过多或过少，超出了分区方案所能提供的数量。通过写出目标表所需的时间段，生成分区函数和分区方案的任务就变得简单得多。


    在定义了数据库文件和文件组，以及分区函数和分区方案之后，实现分区的最后一步是使用新创建的分区方案创建一个表。清单[11-5](#521866_1_En_11_Chapter.xhtml#PC5)创建了*Fact.Sale*的一个新版本，并使用*Invoice
    Date Key*列在*fact_Sale_CCI_years_scheme*上对其进行分区。


    ```

    CREATE TABLE Fact.Sale_CCI_PARTITIONED

    (      [Sale Key] [bigint] NOT NULL,

    [City Key] [int] NOT NULL,

    [Customer Key] [int] NOT NULL,

    [Bill To Customer Key] [int] NOT NULL,

    [Stock Item Key] [int] NOT NULL,

    [Invoice Date Key] [date] NOT NULL,

    [Delivery Date Key] [date] NULL,

    [Salesperson Key] [int] NOT NULL,

    [WWI Invoice ID] [int] NOT NULL,

    [Description] [nvarchar](100) NOT NULL,

    [Package] [nvarchar](50) NOT NULL,

    [Quantity] [int] NOT NULL,

    [Unit Price] [decimal](18, 2) NOT NULL,

    [Tax Rate] [decimal](18, 3) NOT NULL,

    [Total Excluding Tax] [decimal](18, 2) NOT NULL,

    [Tax Amount] [decimal](18, 2) NOT NULL,

    [Profit] [decimal](18, 2) NOT NULL,

    [Total Including Tax] [decimal](18, 2) NOT NULL,

    [Total Dry Items] [int] NOT NULL,

    [Total Chiller Items] [int] NOT NULL,

    [Lineage Key] [int] NOT NULL)

    ON fact_Sale_CCI_years_scheme ([Invoice Date Key]);

    Listing 11-5

    Creation of a New Table That Is Partitioned by Year on a Date Column

    ```


    分区表定义与非分区表定义的唯一区别在于最后一行，其中`ON`子句定义了要使用的分区方案以及将评估哪个列来确定数据将存储在哪些文件组中。分区列的数据类型和分区函数必须匹配，否则将返回错误，类似于图[11-7](#521866_1_En_11_Chapter.xhtml#Fig7)所示。


    ![](images/521866_1_En_11_Chapter/521866_1_En_11_Fig7_HTML.jpg)


    Figure 11-7


    Error received if the data type of the partition column and partition function
    do not match


    分区函数和列之间的数据类型必须完全匹配。`DATE`和`DATETIME`不兼容，其他看似相似的数据类型也是如此。SQL Server在评估分区函数时不会在数据类型之间自动转换，而是在创建表时抛出错误。


    一旦创建，*Fact.Sale_CCI_PARTITIONED*的管理方式与*Fact.Sale_CCI_ORDERED*相同：


    1.  创建一个聚集行存储索引，按*Invoice Date Key*排序。


    2.  将数据插入表中。


    3.  创建一个聚集列存储索引，替换行存储索引。


    清单[11-6](#521866_1_En_11_Chapter.xhtml#PC6)中的代码逐步执行了这些步骤。


    ```

    CREATE CLUSTERED INDEX CCI_fact_Sale_CCI_PARTITIONED ON Fact.Sale_CCI_PARTITIONED
    ([Invoice Date Key]);

    INSERT INTO Fact.Sale_CCI_PARTITIONED

    ([Sale Key], [City Key], [Customer Key], [Bill To Customer Key], [Stock Item Key],
    [Invoice Date Key], [Delivery Date Key],

    [Salesperson Key], [WWI Invoice ID], Description, Package, Quantity, [Unit Price],
    [Tax Rate],

    [Total Excluding Tax], [Tax Amount], Profit, [Total Including Tax], [Total Dry
    Items],

    [Total Chiller Items], [Lineage Key])

    SELECT

    Sale.[Sale Key], Sale.[City Key], Sale.[Customer Key], Sale.[Bill To Customer
    Key], Sale.[Stock Item Key], Sale.[Invoice Date Key], Sale.[Delivery Date Key],

    Sale.[Salesperson Key], Sale.[WWI Invoice ID], Sale.Description, Sale.Package,
    Sale.Quantity, Sale.[Unit Price], Sale.[Tax Rate],

    Sale.[Total Excluding Tax], Sale.[Tax Amount], Sale.Profit, Sale.[Total Including
    Tax], Sale.[Total Dry Items],

    Sale.[Total Chiller Items], Sale.[Lineage Key]

    FROM Fact.Sale

    CROSS JOIN

    Dimension.City

    WHERE City.[City Key] >= 1 AND City.[City Key] <= 110;

    CREATE CLUSTERED COLUMNSTORE INDEX CCI_Fact_Sale_CCI_PARTITIONED ON Fact.Sale_CCI_PARTITIONED
    WITH (MAXDOP = 1, DROP_EXISTING = ON);

    Listing 11-6

    Populating a Partitioned Table with an Ordered Data Set

    ```'
  raw: 'The next step in configuring partitioning is to determine how to slice up
    data from the table into the newly created files. This is achieved using a partition
    function. When working with a columnstore index, ensure that the column that the
    table is ordered by is also the same data type used for the partition function.
    This convention is the same with clustered rowstore indexes as well. If the data
    type for the partition function does not match the target column to order by in
    the table, an error will be thrown when the table is created. For this demonstration,
    the partition function will split up data using the DATE data type, which corresponds
    to the *Invoice Date Key* column that *Fact.Sale_CCI* is ordered by, as seen in
    Listing [11-3](#521866_1_En_11_Chapter.xhtml#PC3).


    ```

    CREATE PARTITION FUNCTION fact_Sale_CCI_years_function (DATE)

    AS RANGE RIGHT FOR VALUES

    (''1/1/2014'', ''1/1/2015'', ''1/1/2016'', ''1/1/2017'');

    Listing 11-3

    Creation of a Partition Function That Organizes Data by Date

    ```


    RANGE RIGHT specifies that the boundaries created will be defined using the dates
    provided as starting points. The result is that data will be divided into five
    buckets, like this:


    1.  All dates < 1/1/2014


    2.  Dates >= 1/1/2014 and < 1/1/2015


    3.  Dates >= 1/1/2015 and < 1/1/2016


    4.  Dates >= 1/1/2016 and < 1/1/2017


    5.  Dates >= 1/1/2017


    If used, RANGE LEFT would result in date ranges where the inequality operators
    are adjusted so that boundaries are checked with greater than and less than or
    equal to, rather than what was presented earlier. If unsure of which to use, consider
    implementing RANGE RIGHT for time-based dimensions as it is typically a more natural
    division that cleanly divides up units of months, quarters, years, etc. The following
    list shows how the boundaries would be defined in the partition function in Listing
    [11-3](#521866_1_En_11_Chapter.xhtml#PC3) if RANGE LEFT were used:


    1.  All dates <= 1/1/2014


    2.  Dates > 1/1/2014 and <= 1/1/2015


    3.  Dates > 1/1/2015 and <= 1/1/2016


    4.  Dates > 1/1/2016 and <= 1/1/2017


    5.  Dates > 1/1/2017


    This boundary configuration is somewhat counterintuitive for dates, but might
    be relevant for other data types.


    The final step before partitioning can be implemented on a table is to create
    a partition scheme. A partition scheme is used to map the data boundaries defined
    in the partition function onto the filegroups defined earlier. This is where it
    can be decided which date ranges correspond to which physical database files.
    Listing [11-4](#521866_1_En_11_Chapter.xhtml#PC4) provides a partition scheme
    that assigns each date range defined by the partition function to one of the five
    newly created filegroups.


    ```

    CREATE PARTITION SCHEME fact_Sale_CCI_years_scheme

    AS PARTITION fact_Sale_CCI_years_function

    TO (WideWorldImportersDW_2013_fg, WideWorldImportersDW_2014_fg, WideWorldImportersDW_2015_fg,
    WideWorldImportersDW_2016_fg, WideWorldImportersDW_2017_fg);

    Listing 11-4

    Creation of a Partition Scheme to Assign Dates to Database Filegroups

    ```


    Note that the partition function will always specify one less boundary than there
    are filegroups. In this example, the partition function provides four dates that
    form date boundaries that define five distinct date ranges which are subsequently
    mapped onto the partition scheme and assigned filegroups. If the number of boundaries
    provided by the partition function is not one less than the partition scheme,
    an error will be returned, similar to what is seen in Figure [11-6](#521866_1_En_11_Chapter.xhtml#Fig6).


    ![](images/521866_1_En_11_Chapter/521866_1_En_11_Fig6_HTML.jpg)


    Figure 11-6


    Error received if partition scheme contains too few filegroup entries


    The error is verbose enough to remind the user that the function generates too
    many or too few partitions than are afforded by the partition scheme. By writing
    out the time periods desired for the target table, the task of generating a partition
    function and partition scheme become far simpler.


    With database files and filegroups defined, as well as a partition function and
    scheme, the final step to implementing partitioning is to create a table using
    the newly created partition scheme. Listing [11-5](#521866_1_En_11_Chapter.xhtml#PC5)
    creates a new version of *Fact.Sale* and partitions it using the *Invoice Date
    Key* column on *fact_Sale_CCI_years_scheme*.


    ```

    CREATE TABLE Fact.Sale_CCI_PARTITIONED

    (      [Sale Key] [bigint] NOT NULL,

    [City Key] [int] NOT NULL,

    [Customer Key] [int] NOT NULL,

    [Bill To Customer Key] [int] NOT NULL,

    [Stock Item Key] [int] NOT NULL,

    [Invoice Date Key] [date] NOT NULL,

    [Delivery Date Key] [date] NULL,

    [Salesperson Key] [int] NOT NULL,

    [WWI Invoice ID] [int] NOT NULL,

    [Description] [nvarchar](100) NOT NULL,

    [Package] [nvarchar](50) NOT NULL,

    [Quantity] [int] NOT NULL,

    [Unit Price] [decimal](18, 2) NOT NULL,

    [Tax Rate] [decimal](18, 3) NOT NULL,

    [Total Excluding Tax] [decimal](18, 2) NOT NULL,

    [Tax Amount] [decimal](18, 2) NOT NULL,

    [Profit] [decimal](18, 2) NOT NULL,

    [Total Including Tax] [decimal](18, 2) NOT NULL,

    [Total Dry Items] [int] NOT NULL,

    [Total Chiller Items] [int] NOT NULL,

    [Lineage Key] [int] NOT NULL)

    ON fact_Sale_CCI_years_scheme ([Invoice Date Key]);

    Listing 11-5

    Creation of a New Table That Is Partitioned by Year on a Date Column

    ```


    The only difference in the definition of a partitioned table vs. a nonpartitioned
    table is the last line, where an ON clause defines the partition scheme to use
    and which column will be evaluated to determine which filegroups the data will
    be stored in. The data type of the partition column and partition function must
    match or an error will be returned, similar to what is shown in Figure [11-7](#521866_1_En_11_Chapter.xhtml#Fig7).


    ![](images/521866_1_En_11_Chapter/521866_1_En_11_Fig7_HTML.jpg)


    Figure 11-7


    Error received if the data type of the partition column and partition function
    do not match


    Data types between the partition function and column must match exactly. DATE
    and DATETIME are not compatible, nor are other data types that may seem similar.
    SQL Server does not automatically convert between data types when evaluating partition
    functions and will instead throw an error when the table is created.


    Once created, *Fact.Sale_CCI_PARTITIONED* is managed in the same fashion as *Fact.Sale_CCI_ORDERED*
    was:


    1.  A clustered rowstore index is created, ordered by *Invoice Date Key*.


    2.  Data is inserted into the table.


    3.  A clustered columnstore index is created, replacing the rowstore index.


    The code in Listing [11-6](#521866_1_En_11_Chapter.xhtml#PC6) walks through each
    of these steps.


    ```

    CREATE CLUSTERED INDEX CCI_fact_Sale_CCI_PARTITIONED ON Fact.Sale_CCI_PARTITIONED
    ([Invoice Date Key]);

    INSERT INTO Fact.Sale_CCI_PARTITIONED

    ([Sale Key], [City Key], [Customer Key], [Bill To Customer Key], [Stock Item Key],
    [Invoice Date Key], [Delivery Date Key],

    [Salesperson Key], [WWI Invoice ID], Description, Package, Quantity, [Unit Price],
    [Tax Rate],

    [Total Excluding Tax], [Tax Amount], Profit, [Total Including Tax], [Total Dry
    Items],

    [Total Chiller Items], [Lineage Key])

    SELECT

    Sale.[Sale Key], Sale.[City Key], Sale.[Customer Key], Sale.[Bill To Customer
    Key], Sale.[Stock Item Key], Sale.[Invoice Date Key], Sale.[Delivery Date Key],

    Sale.[Salesperson Key], Sale.[WWI Invoice ID], Sale.Description, Sale.Package,
    Sale.Quantity, Sale.[Unit Price], Sale.[Tax Rate],

    Sale.[Total Excluding Tax], Sale.[Tax Amount], Sale.Profit, Sale.[Total Including
    Tax], Sale.[Total Dry Items],

    Sale.[Total Chiller Items], Sale.[Lineage Key]

    FROM Fact.Sale

    CROSS JOIN

    Dimension.City

    WHERE City.[City Key] >= 1 AND City.[City Key] <= 110;

    CREATE CLUSTERED COLUMNSTORE INDEX CCI_Fact_Sale_CCI_PARTITIONED ON Fact.Sale_CCI_PARTITIONED
    WITH (MAXDOP = 1, DROP_EXISTING = ON);

    Listing 11-6

    Populating a Partitioned Table with an Ordered Data Set

    ```'
