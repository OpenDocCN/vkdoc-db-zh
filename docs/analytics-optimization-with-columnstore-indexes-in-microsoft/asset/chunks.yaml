- fmt: '## Nonclustered Rowstore Index Size Considerations


    Nonclustered rowstore index sizes will be inflated. Data from the clustered index
    is duplicated within the nonclustered indexes. In addition, the key that links
    the rowstore index back to the clustered columnstore index is an 8-byte unique
    value that combines the 4-byte rowgroup ID and a 4-byte offset. If the nonclustered
    index is not unique, additional (variable) storage will be used to enforce uniqueness
    internally at the leaf level of the index.


    Adding a nonclustered rowstore index to a clustered columnstore index is by no
    means an inexpensive decision. Its price is storage space, memory usage, and write
    speeds. Because of this, careful consideration must be taken prior to adding supporting
    indexes to a clustered columnstore index.


    ## Enforcing Constraints


    One common use of nonclustered rowstore indexes on clustered columnstore indexes
    is not performance related. Nonclustered rowstore indexes may be used to enforce
    uniqueness on a table, either via a primary key or by using a unique nonclustered
    index definition.


    Creating unique constraints is no different than on a clustered rowstore table.
    Listing 13-5 shows the create statement for an existing nonclustered primary key
    over a clustered columnstore index.


    ```sql

    ALTER TABLE Fact.Sale ADD CONSTRAINT PK_Fact_Sale PRIMARY KEY NONCLUSTERED

    (      [Sale Key] ASC,

    [Invoice Date Key] ASC);

    ```

    Listing 13-5: Creating a Unique Nonclustered Rowstore Index on Top of a Clustered
    Columnstore Table


    This new index serves as a primary key for the underlying table, both enforcing
    uniqueness and allowing for foreign keys to be created on other tables that reference
    this table. For a scenario where either of these are important architectural requirements,
    then creating a primary key on the clustered columnstore index is a good solution
    to this problem.


    The table `Fact.Sale` contains many nonclustered rowstore indexes defined on it.
    The query in Listing 13-6 returns the index size for each index on the table.


    ```sql

    SELECT

    indexes.name AS Index_Name,

    SUM(dm_db_partition_stats.used_page_count) * 8 Index_Size_KB,

    SUM(dm_db_partition_stats.row_count) AS Row_Count

    FROM sys.dm_db_partition_stats

    INNER JOIN sys.indexes

    ON dm_db_partition_stats.object_id = indexes.object_id

    AND dm_db_partition_stats.index_id = indexes.index_id

    INNER JOIN sys.tables

    ON tables.object_id = dm_db_partition_stats.object_id

    INNER JOIN sys.schemas

    ON schemas.schema_id = tables.schema_id

    WHERE schemas.name = ''Fact''

    AND tables.name = ''Sale''

    GROUP BY indexes.name

    ORDER BY indexes.name

    ```

    Listing 13-6: Query to Return Index Size for Each Index on `Fact.Sale`


    The results of the index size query are shown in Figure 13-5.


    ![](images/521866_1_En_13_Chapter/521866_1_En_13_Fig5_HTML.jpg)

    Figure 13-5: Index size details for one table


    In addition to the clustered columnstore index and the nonclustered rowstore primary
    key, there are another seven nonclustered rowstore indexes that each index a foreign
    key column. Note that the index size for each supporting index is close to the
    total size of the columnstore index itself. As a result, the table itself contains
    about 5.7MB of compressed columnstore data, but the total space used for data
    and index space is about 45MB.


    This is an excellent example of an over-indexed table. If users truly search by
    that many dimensions without regard for a single data order, then a columnstore
    index might not be the ideal solution for this table. Alternatively, removing
    most of the extra indexes may still allow for performance that is fast enough,
    even in their absence.


    Using a nonclustered rowstore index to enforce uniqueness on a clustered columnstore
    index can be a valuable tool when looking to enforce data integrity on OLAP data.
    It is generally inadvisable to implement multiple rowstore indexes on a clustered
    columnstore table unless the organizational need for those indexes greatly exceeds
    the cost.


    ## Filtered Nonclustered Rowstore Indexes


    One way to mitigate the cost of a nonclustered rowstore index on a columnstore
    index is to add a filter. Filtered indexes target a smaller portion of the table,
    consume less storage and memory, and can have a reduced impact on the compression
    and performance of the columnstore index.


    Oftentimes, OLTP queries against an analytic table may target only a portion of
    the data – maybe newer, older, or based on some other useful filter. Consider
    the T-SQL that was tested in Listing 13-2. This query filters on `Stock Item Key`,
    which is not the column that then the columnstore index was ordered on. To mitigate
    the cost of this query, a nonclustered rowstore index was added, as was shown
    in Listing 13-4. What if this query never targeted new data, but exclusively was
    used to analyze older sales? Consider the updated index in Listing 13-7.


    ```sql

    CREATE NONCLUSTERED INDEX IX_Sale_CCI_ORDERED

    ON Fact.Sale_CCI_ORDERED ([Stock Item Key], [Invoice Date Key]) INCLUDE (Quantity)

    WHERE [Invoice Date Key] <= ''1/1/2016'';

    ```

    Listing 13-7: Example of a Filtered Nonclustered Rowstore Index on a Clustered
    Columnstore Index


    When a query is executed that uses this index and filters for data prior to 1/1/2016,
    it will use the filtered index rather than the columnstore index. Because the
    index is smaller, the number of rows that are read and the IO will be less than
    for the unfiltered version of this index.


    One significant bonus of filtering a nonclustered rowstore index is that it allows
    the index to target more specifically hot vs. warm vs. cold data. This provides
    multiple benefits:

    - Allows an index to target a specific use case, rather than all data

    - Allows for better management of Vertipaq optimization

    - Can facilitate the addition of multiple nonclustered indexes with less impact
    on write performance or resource consumption


    If there is a need for secondary indexing on a clustered columnstore index, consider
    if filters can be added to reduce the size and impact of the nonclustered indexes.
    It’s an easy way to improve performance and reduce storage and memory footprint,
    assuming queries that use the index can use the filters consistently .


    ## Enabling Vertipaq Optimization


    A downside of adding nonclustered rowstore indexes to a clustered columnstore
    index is that SQL Server will automatically forgo Vertipaq optimization. This
    will result in columnstore compression that is less effective than it could be
    if the feature were used. Note that Vertipaq optimization is only skipped for
    new data that is inserted into the table. Any data that existed in the columnstore
    index prior to the creation of the nonclustered indexes will benefit from the
    improved performance granted by it.


    If a nonclustered rowstore index is needed on a clustered columnstore index, consider
    one of the following solutions that will allow for Vertipaq optimization to be
    maintained on compressed columnstore segments.


    ### Add Filters to Nonclustered Rowstore Indexes


    In addition to targeting relevant data when needed, filters can allow for hot
    data to be skipped when creating nonclustered indexes. This allows new data to
    be inserted into the clustered columnstore index using Vertipaq optimization,
    whereas older data can still be read using the nonclustered rowstore index.'
