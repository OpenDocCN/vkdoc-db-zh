  trans: '## 非聚集行存储索引的大小考量


    非聚集行存储索引的大小将会膨胀。来自聚集索引的数据会在非聚集索引中被复制。此外，将行存储索引链接回聚集列存储索引的键是一个 8 字节的唯一值，它由 4 字节的行组
    ID 和 4 字节的偏移量组合而成。如果非聚集索引不是唯一的，则会在索引的叶级别内部使用额外的（可变）存储空间来强制实施唯一性。


    为聚集列存储索引添加非聚集行存储索引绝非一个低成本的决策。其代价是存储空间、内存使用量和写入速度。因此，在向聚集列存储索引添加辅助索引之前，必须仔细斟酌。


    ## 强制实施约束


    在聚集列存储索引上使用非聚集行存储索引的一个常见用途与性能无关。非聚集行存储索引可用于通过主键或使用唯一的非聚集索引定义来强制表的唯一性。


    创建唯一约束与在聚集行存储表上创建并无不同。清单 13-5 展示了为已有的聚集列存储索引上的非聚集主键创建的语句。


    ```sql

    ALTER TABLE Fact.Sale ADD CONSTRAINT PK_Fact_Sale PRIMARY KEY NONCLUSTERED

    (      [Sale Key] ASC,

    [Invoice Date Key] ASC);

    ```

    清单 13-5: 在聚集列存储表上创建唯一的非聚集行存储索引


    这个新索引作为基础表的主键，既强制实施唯一性，也允许在引用此表的其他表上创建外键。如果这两者中的任何一个都是重要的架构需求，那么在聚集列存储索引上创建主键是一个很好的解决方案。


    表 `Fact.Sale` 上定义了多个非聚集行存储索引。清单 13-6 中的查询返回表中每个索引的大小。


    ```sql

    SELECT

    indexes.name AS Index_Name,

    SUM(dm_db_partition_stats.used_page_count) * 8 Index_Size_KB,

    SUM(dm_db_partition_stats.row_count) AS Row_Count

    FROM sys.dm_db_partition_stats

    INNER JOIN sys.indexes

    ON dm_db_partition_stats.object_id = indexes.object_id

    AND dm_db_partition_stats.index_id = indexes.index_id

    INNER JOIN sys.tables

    ON tables.object_id = dm_db_partition_stats.object_id

    INNER JOIN sys.schemas

    ON schemas.schema_id = tables.schema_id

    WHERE schemas.name = ''Fact''

    AND tables.name = ''Sale''

    GROUP BY indexes.name

    ORDER BY indexes.name

    ```

    清单 13-6: 查询 `Fact.Sale` 表上每个索引大小的语句


    索引大小查询的结果如图 13-5 所示。


    ![](img/521866_1_En_13_Fig5_HTML.jpg)

    图 13-5: 一个表的索引大小详情


    除了聚集列存储索引和非聚集行存储主键外，还有另外七个非聚集行存储索引，每个都索引一个外键列。请注意，每个辅助索引的大小都接近列存储索引本身的总大小。因此，表本身包含大约
    5.7MB 的压缩列存储数据，但用于数据和索引空间的总空间约为 45MB。


    这是一个索引过多的表的绝佳示例。如果用户确实需要根据如此多的维度进行搜索，而无需考虑单一的数据顺序，那么列存储索引可能不是此表的理想解决方案。或者，移除大部分额外索引可能仍然能提供足够快的性能。


    使用非聚集行存储索引来强制聚集列存储索引的唯一性，在寻求对 OLAP 数据强制实施数据完整性时，可以成为一个有价值的工具。除非组织对这些索引的需求远超其成本，否则通常不建议在聚集列存储表上实现多个行存储索引。


    ## 筛选非聚集行存储索引


    减轻列存储索引上非聚集行存储索引成本的一种方法是添加筛选器。筛选索引针对表中更小的部分，消耗更少的存储和内存，并且可以减少对列存储索引压缩和性能的影响。


    通常，针对分析表的 OLTP 查询可能只针对一部分数据——可能是较新的、较旧的，或者基于其他有用的筛选条件。考虑清单 13-2 中测试的 T-SQL。该查询在
    `Stock Item Key` 上进行筛选，而这不是列存储索引的排序列。为了减轻此查询的成本，添加了一个非聚集行存储索引，如清单 13-4 所示。如果这个查询从不针对新数据，而只用于分析旧销售记录呢？考虑清单
    13-7 中更新后的索引。


    ```sql

    CREATE NONCLUSTERED INDEX IX_Sale_CCI_ORDERED

    ON Fact.Sale_CCI_ORDERED ([Stock Item Key], [Invoice Date Key]) INCLUDE (Quantity)

    WHERE [Invoice Date Key] <= ''1/1/2016'';

    ```

    清单 13-7: 在聚集列存储索引上创建筛选非聚集行存储索引的示例


    当执行使用此索引并筛选 2016 年 1 月 1 日 之前数据的查询时，它将使用筛选索引而非列存储索引。由于索引更小，读取的行数和 IO 将少于此索引的未筛选版本。


    筛选非聚集行存储索引的一个重要优势是，它允许索引更具体地针对热数据、温数据或冷数据。这提供了多重好处：

    - 允许索引针对特定用例，而非所有数据

    - 允许更好地管理 Vertipaq 优化

    - 可以促进添加多个非聚集索引，同时减少对写入性能或资源消耗的影响


    如果需要在聚集列存储索引上创建辅助索引，请考虑是否可以添加筛选器以减小非聚集索引的大小和影响。假设使用该索引的查询能够一致地使用筛选器，这是一种提高性能并减少存储和内存占用的简单方法。


    ## 启用 Vertipaq 优化


    向聚集列存储索引添加非聚集行存储索引的一个缺点是，SQL Server 将自动放弃 Vertipaq 优化。这将导致列存储压缩的效果不如使用该功能时那么好。请注意，Vertipaq
    优化仅对插入表中的新数据跳过。在创建非聚集索引之前已存在于列存储索引中的任何数据，仍将受益于该优化带来的性能提升。


    如果需要在聚集列存储索引上创建非聚集行存储索引，请考虑以下解决方案之一，这些方案将允许在压缩的列存储段上维持 Vertipaq 优化。


    ### 向非聚集行存储索引添加筛选器


    除了在需要时针对相关数据外，筛选器还可以在创建非聚集索引时跳过热数据。这使得新数据可以使用 Vertipaq 优化插入到聚集列存储索引中，而较旧的数据仍然可以使用非聚集行存储索引进行读取。'
- fmt: "### Perform Periodic Index Maintenance\n\nIf nonclustered indexes are needed\
    \ and filters cannot be applied, consider periodic maintenance in which the following\
    \ steps are taken:\n1.  Drop nonclustered rowstore indexes.\n2.  Rebuild the clustered\
    \ columnstore index.\n3.  Re-create the nonclustered rowstore indexes.\n\nThis\
    \ can be time-consuming, especially for a larger table, but can allow columnstore\
    \ indexes to be periodically rebuilt to be smaller and more efficient than before.\n\
    \nNote that partitioning can be a valuable tool here as index maintenance can\
    \ target specific partitions. The query in Listing 13-8 shows how partitions can\
    \ be filtered to show only those that contain rowgroups lacking Vertipaq optimization.\n\
    \n```sql\nSELECT DISTINCT\n    objects.name,\n    partitions.partition_number,\n\
    \    dm_db_column_store_row_group_physical_stats.row_group_id,\n    dm_db_column_store_row_group_physical_stats.has_vertipaq_optimization\n\
    FROM sys.dm_db_column_store_row_group_physical_stats\nINNER JOIN sys.objects\n\
    \    ON objects.object_id = dm_db_column_store_row_group_physical_stats.object_id\n\
    INNER JOIN sys.partitions\n    ON partitions.object_id = objects.object_id\n \
    \   AND partitions.partition_number = dm_db_column_store_row_group_physical_stats.partition_number\n\
    WHERE objects.name = 'Sale'\n    AND dm_db_column_store_row_group_physical_stats.has_vertipaq_optimization\
    \ IS NOT NULL\n    AND dm_db_column_store_row_group_physical_stats.has_vertipaq_optimization\
    \ = 0\nORDER BY dm_db_column_store_row_group_physical_stats.row_group_id;\n```\n\
    Listing 13-8: Query to Return Rowgroups That Are Not Benefitting from Vertipaq\
    \ Optimization\n\nThe results are shown in Figure 13-6.\n\n![](images/521866_1_En_13_Chapter/521866_1_En_13_Fig6_HTML.jpg)\n\
    Figure 13-6: Rowgroups lacking Vertipaq optimization\n\nThe results show that\
    \ only three partitions (3, 4, and 5) contain rowgroups that lack Vertipaq optimization.\
    \ Therefore, periodic index maintenance could be targeted at only those partitions,\
    \ skipping the rest. For less granular details, `row_group_id` can be omitted\
    \ from the query to reduce the result set to a list of partitions that does not\
    \ contain rowgroup IDs.\n\n## Indexed Views\n\nIt is possible to create indexed\
    \ views on top of clustered columnstore indexes. While this represents an added\
    \ layer of complexity, it allows for queries that do not follow the natural ordering\
    \ of the columnstore index to be isolated into their own separate data structure.\
    \ There, the view and its indexes can be modified freely without directly impacting\
    \ the underlying table.\n\nThis can allow for more flexibility when performance\
    \ testing supplementary indexes on data that is stored in a clustered columnstore\
    \ index. The script in Listing 13-9 rebuilds the columnstore index on `Fact.Sale`,\
    \ creates a schemabound view against it, and adds a pair of indexes to the new\
    \ view.\n\n```sql\nALTER INDEX [CCX_Fact_Sale] ON fact.sale REBUILD;\nGO\nCREATE\
    \ VIEW Fact.v_Sale\nWITH SCHEMABINDING\nAS\nSELECT\n    [Sale Key],\n    [City\
    \ Key],\n    [Customer Key],\n    [Bill To Customer Key],\n    [Stock Item Key],\n\
    \    [Invoice Date Key],\n    [Delivery Date Key],\n    [Salesperson Key],\n \
    \   [WWI Invoice ID],\n    Description,\n    Package,\n    Quantity,\n    [Unit\
    \ Price],\n    [Tax Rate],\n    [Total Excluding Tax],\n    [Tax Amount],\n  \
    \  Profit,\n    [Total Including Tax],\n    [Total Dry Items],\n    [Total Chiller\
    \ Items],\n    [Lineage Key]\nFROM Fact.Sale;\nGO\nCREATE UNIQUE CLUSTERED INDEX\
    \ CI_v_sale\nON Fact.v_Sale ([Sale Key], [Invoice Date Key]);\nGO\nCREATE NONCLUSTERED\
    \ INDEX IX_v_Sale\nON Fact.v_Sale ([Stock Item Key], Quantity)\nGO\n```\nListing\
    \ 13-9: Script to Rebuild a Table and Add an Indexed View to a Clustered Columnstore\
    \ Index\n\nRebuilding the columnstore index ensures that the index is in pristine\
    \ condition prior to further testing. The view created in this demonstration includes\
    \ all columns in the table, but could be revised to include less columns, join\
    \ other tables, add computed columns, etc. The next step is to create a unique\
    \ clustered index on the view. This step is necessary as nonclustered indexes\
    \ on a view require a unique index as a prerequisite. Finally, a nonclustered\
    \ covering index is added to handle queries against its columns.\n\nOnce complete,\
    \ the analytic query in Listing 13-2 can be modified to target the view instead,\
    \ as shown in Listing 13-10.\n\n```sql\nSELECT\n    COUNT(*),\n    SUM(Quantity)\
    \ AS total_quantity\nFROM Fact.v_Sale\nWHERE [Stock Item Key] = 186;\n```\nListing\
    \ 13-10: Analytic Query Targeting an Indexed View\n\nThe results of the query\
    \ are returned quickly. The execution plan and `STATISTICS IO` output are provided\
    \ in Figure 13-7.\n\n![](images/521866_1_En_13_Chapter/521866_1_En_13_Fig7_HTML.jpg)\n\
    Figure 13-7: Execution plan and STATISTICS IO output for a query against an indexed\
    \ view\n\nThe execution plan confirms that the nonclustered index on the view\
    \ `v_Sale` was used. The IO output shows acceptably low reads against the view.\
    \ There is an unexpected side effect of using an indexed view for managing select\
    \ reads against a columnstore index: Vertipaq optimization is still used when\
    \ new rows are inserted into the columnstore index!\n\nWhile this is a useful\
    \ benefit of indexed views against columnstore indexes, care should still be exercised\
    \ when adding complexity to an existing table. Balance the needs of unusual workloads\
    \ against a columnstore index vs. the cost of maintaining additional views and\
    \ the indexes against those views.\n\nAlways test queries without supporting views\
    \ or indexes first. Confirm their performance thoroughly and if needed test the\
    \ impact of additional indexes or indexed views to confirm whether the additions\
    \ are worth the cost.\n\n## Compression for Nonclustered Rowstore Indexes\n\n\
    Given the inflated size of nonclustered rowstore indexes when added to a clustered\
    \ columnstore index, compression can be a valuable way to control the size of\
    \ additional indexes and improve read performance against them.\n\nConsider the\
    \ nonclustered primary key defined on `Fact.Sale`. The index size data in Figure\
    \ 13-5 shows that this index consumes 6,624KB. The script in Listing 13-11 drops\
    \ this constraint and replaces it with a new version that uses page compression.\n\
    \n```sql\nALTER TABLE Fact.Sale DROP CONSTRAINT PK_Sale;\nALTER TABLE Fact.Sale\
    \ ADD CONSTRAINT PK_Sale PRIMARY KEY NONCLUSTERED ([Sale Key], [Invoice Date Key])\n\
    \    WITH (DATA_COMPRESSION = PAGE);\n```\nListing 13-11: Script to Re-create\
    \ a Nonclustered Primary Key with Page Compression\n\nWhen complete, the code\
    \ in Listing 13-12 can be executed to confirm the new size of the index, after\
    \ compression is applied.\n\n```sql\nSELECT\n    indexes.name AS Index_Name,\n\
    \    SUM(dm_db_partition_stats.used_page_count) * 8 Index_Size_KB,\n    SUM(dm_db_partition_stats.row_count)\
    \ AS Row_Count\nFROM sys.dm_db_partition_stats\nINNER JOIN sys.indexes\n    ON\
    \ dm_db_partition_stats.object_id = indexes.object_id\n    AND dm_db_partition_stats.index_id\
    \ = indexes.index_id\nINNER JOIN sys.tables\n    ON tables.object_id = dm_db_partition_stats.object_id\n\
    INNER JOIN sys.schemas\n    ON schemas.schema_id = tables.schema_id\nWHERE indexes.name\
    \ = 'PK_Sale'\nGROUP BY indexes.name;\n```\nListing 13-12: Script to Check the\
    \ Size of a Compressed Nonclustered Index\n\nThe results are shown in Figure 13-8.\n\
    \n![](images/521866_1_En_13_Chapter/521866_1_En_13_Fig8_HTML.jpg)\nFigure 13-8:\
    \ Index size for a page compressed nonclustered primary key\n\nThe results show\
    \ that the index now consumes only 2,736KB, a reduction of 3,888KB or about 59%.\
    \ This is a significant space savings and illustrates the positive impact that\
    \ compression can have when applied to secondary nonclustered indexes on a columnstore\
    \ indexed table."
  raw: '### Perform Periodic Index Maintenance


    If nonclustered indexes are needed and filters cannot be applied, consider periodic
    maintenance in which the following steps are taken :


    1.  Drop nonclustered rowstore indexes.


    2.  Rebuild the clustered columnstore index.


    3.  Re-create the nonclustered rowstore indexes.


    This can be time-consuming, especially for a larger table, but can allow columnstore
    indexes to be periodically rebuilt to be smaller and more efficient than before.


    Note that partitioning can be a valuable tool here as index maintenance can target
    specific partitions. The query in Listing [13-8](#521866_1_En_13_Chapter.xhtml#PC8)
    shows how partitions can be filtered to show only those that contain rowgroups
    lacking Vertipaq optimization.


    ```

    SELECT DISTINCT

    objects.name,

    partitions.partition_number,

    dm_db_column_store_row_group_physical_stats.row_group_id,

    dm_db_column_store_row_group_physical_stats.has_vertipaq_optimization

    FROM sys.dm_db_column_store_row_group_physical_stats

    INNER JOIN sys.objects

    ON objects.object_id = dm_db_column_store_row_group_physical_stats.object_id

    INNER JOIN sys.partitions

    ON partitions.object_id = objects.object_id

    AND partitions.partition_number = dm_db_column_store_row_group_physical_stats.partition_number

    WHERE objects.name = ''Sale''

    AND dm_db_column_store_row_group_physical_stats.has_vertipaq_optimization IS NOT
    NULL

    AND dm_db_column_store_row_group_physical_stats.has_vertipaq_optimization = 0

    ORDER BY dm_db_column_store_row_group_physical_stats.row_group_id;

    Listing 13-8

    Query to Return Rowgroups That Are Not Benefitting from Vertipaq Optimization

    ```


    The results are shown in Figure [13-6](#521866_1_En_13_Chapter.xhtml#Fig6).


    ![](images/521866_1_En_13_Chapter/521866_1_En_13_Fig6_HTML.jpg)


    Figure 13-6


    Rowgroups lacking Vertipaq optimization


    The results show that only three partitions (3, 4, and 5) contain rowgroups that
    lack Vertipaq optimization . Therefore, periodic index maintenance could be targeted
    at only those partitions, skipping the rest. For less granular details, *row_group_id*
    can be omitted from the query to reduce the result set to a list of partitions
    that does not contain rowgroup IDs.


    ## Indexed Views


    It is possible to create indexed views on top of clustered columnstore indexes.
    While this represents an added layer of complexity, it allows for queries that
    do not follow the natural ordering of the columnstore index to be isolated into
    their own separate data structure. There, the view and its indexes can be modified
    freely without directly impacting the underlying table.


    This can allow for more flexibility when performance testing supplementary indexes
    on data that is stored in a clustered columnstore index. The script in Listing
    [13-9](#521866_1_En_13_Chapter.xhtml#PC9) rebuilds the columnstore index on *Fact.Sale*,
    creates a schemabound view against it, and adds a pair of indexes to the new view.


    ```

    ALTER INDEX [CCX_Fact_Sale] ON fact.sale REBUILD;

    GO

    CREATE VIEW Fact.v_Sale

    WITH SCHEMABINDING

    AS

    SELECT

    [Sale Key],

    [City Key],

    [Customer Key],

    [Bill To Customer Key],

    [Stock Item Key],

    [Invoice Date Key],

    [Delivery Date Key],

    [Salesperson Key],

    [WWI Invoice ID],

    Description,

    Package,

    Quantity,

    [Unit Price],

    [Tax Rate],

    [Total Excluding Tax],

    [Tax Amount],

    Profit,

    [Total Including Tax],

    [Total Dry Items],

    [Total Chiller Items],

    [Lineage Key]

    FROM Fact.Sale;

    GO

    CREATE UNIQUE CLUSTERED INDEX CI_v_sale

    ON Fact.v_Sale ([Sale Key], [Invoice Date Key]);

    GO

    CREATE NONCLUSTERED INDEX IX_v_Sale

    ON Fact.v_Sale ([Stock Item Key], Quantity)

    GO

    Listing 13-9

    Script to Rebuild a Table and Add an Indexed View to a Clustered Columnstore Index

    ```


    Rebuilding the columnstore index ensures that the index is in pristine condition
    prior to further testing. The view created in this demonstration includes all
    columns in the table, but could be revised to include less columns, join other
    tables, add computed columns, etc. The next step is to create a unique clustered
    index on the view. This step is necessary as nonclustered indexes on a view require
    a unique index as a prerequisite. Finally, a nonclustered covering index is added
    to handle queries against its columns.


    Once complete, the analytic query in Listing [13-2](#521866_1_En_13_Chapter.xhtml#PC2)
    can be modified to target the view instead, as shown in Listing [13-10](#521866_1_En_13_Chapter.xhtml#PC10).


    ```

    SELECT

    COUNT(*),

    SUM(Quantity) AS total_quantity

    FROM Fact.v_Sale

    WHERE [Stock Item Key] = 186;

    Listing 13-10

    Analytic Query Targeting an Indexed View

    ```


    The results of the query are returned quickly. The execution plan and STATISTICS
    IO output are provided in Figure [13-7](#521866_1_En_13_Chapter.xhtml#Fig7).


    ![](images/521866_1_En_13_Chapter/521866_1_En_13_Fig7_HTML.jpg)


    Figure 13-7


    Execution plan and STATISTICS IO output for a query against an indexed view


    The execution plan confirms that the nonclustered index on the view *v_Sale* was
    used. The IO output shows acceptably low reads against the view. There is an unexpected
    side effect of using an indexed view for managing select reads against a columnstore
    index: Vertipaq optimization is still used when new rows are inserted into the
    columnstore index!


    While this is a useful benefit of indexed views against columnstore indexes, care
    should still be exercised when adding complexity to an existing table. Balance
    the needs of unusual workloads against a columnstore index vs. the cost of maintaining
    additional views and the indexes against those views.


    Always test queries without supporting views or indexes first. Confirm their performance
    thoroughly and if needed test the impact of additional indexes or indexed views
    to confirm whether the additions are worth the cost .


    ## Compression for Nonclustered Rowstore Indexes


    Given the inflated size of nonclustered rowstore indexes when added to a clustered
    columnstore index, compression can be a valuable way to control the size of additional
    indexes and improve read performance against them.


    Consider the nonclustered primary key defined on *Fact.Sale*. The index size data
    in Figure [13-5](#521866_1_En_13_Chapter.xhtml#Fig5) shows that this index consumes
    6,624KB. The script in Listing [13-11](#521866_1_En_13_Chapter.xhtml#PC11) drops
    this constraint and replaces it with a new version that uses page compression.


    ```

    ALTER TABLE Fact.Sale DROP CONSTRAINT PK_Sale;

    ALTER TABLE Fact.Sale ADD CONSTRAINT PK_Sale PRIMARY KEY NONCLUSTERED ([Sale Key],
    [Invoice Date Key])

    WITH (DATA_COMPRESSION = PAGE);

    Listing 13-11

    Script to Re-create a Nonclustered Primary Key with Page Compression

    ```


    When complete, the code in Listing [13-12](#521866_1_En_13_Chapter.xhtml#PC12)
    can be executed to confirm the new size of the index, after compression is applied.


    ```

    SELECT

    indexes.name AS Index_Name,

    SUM(dm_db_partition_stats.used_page_count) * 8 Index_Size_KB,

    SUM(dm_db_partition_stats.row_count) AS Row_Count

    FROM sys.dm_db_partition_stats

    INNER JOIN sys.indexes

    ON dm_db_partition_stats.object_id = indexes.object_id

    AND dm_db_partition_stats.index_id = indexes.index_id

    INNER JOIN sys.tables

    ON tables.object_id = dm_db_partition_stats.object_id

    INNER JOIN sys.schemas

    ON schemas.schema_id = tables.schema_id

    WHERE indexes.name = ''PK_Sale''

    GROUP BY indexes.name;

    Listing 13-12

    Script to Check the Size of a Compressed Nonclustered Index

    ```


    The results are shown in Figure [13-8](#521866_1_En_13_Chapter.xhtml#Fig8).


    ![](images/521866_1_En_13_Chapter/521866_1_En_13_Fig8_HTML.jpg)


    Figure 13-8


    Index size for a page compressed nonclustered primary key


    The results show that the index now consumes only 2,736KB, a reduction of 3,888KB
    or about 59%. This is a significant space savings and illustrates the positive
    impact that compression can have when applied to secondary nonclustered indexes
    on a columnstore indexed table.'
  trans: "\n### 执行周期性索引维护\n\n如果需要非聚集索引且无法应用筛选器，则可以考虑进行周期性维护，并执行以下步骤：\n1.  删除非聚集行存储索引。\n\
    2.  重建聚集列存储索引。\n3.  重新创建非聚集行存储索引。\n\n这可能非常耗时，尤其是对于较大的表，但可以使列存储索引得以周期性地重建，从而变得更小、更高效。\n\
    \n请注意，分区在此处可以成为一个有价值的工具，因为索引维护可以针对特定分区进行。清单 13-8 中的查询展示了如何筛选分区，以仅显示那些包含未进行 Vertipaq\
    \ 优化的行组的分区。\n\n```sql\nSELECT DISTINCT\n    objects.name,\n    partitions.partition_number,\n\
    \    dm_db_column_store_row_group_physical_stats.row_group_id,\n    dm_db_column_store_row_group_physical_stats.has_vertipaq_optimization\n\
    FROM sys.dm_db_column_store_row_group_physical_stats\nINNER JOIN sys.objects\n\
    \    ON objects.object_id = dm_db_column_store_row_group_physical_stats.object_id\n\
    INNER JOIN sys.partitions\n    ON partitions.object_id = objects.object_id\n \
    \   AND partitions.partition_number = dm_db_column_store_row_group_physical_stats.partition_number\n\
    WHERE objects.name = 'Sale'\n    AND dm_db_column_store_row_group_physical_stats.has_vertipaq_optimization\
    \ IS NOT NULL\n    AND dm_db_column_store_row_group_physical_stats.has_vertipaq_optimization\
    \ = 0\nORDER BY dm_db_column_store_row_group_physical_stats.row_group_id;\n```\n\
    清单 13-8：返回未从 Vertipaq 优化中受益的行组的查询\n\n结果如图 13-6 所示。\n\n![](img/521866_1_En_13_Fig6_HTML.jpg)\n\
    图 13-6：缺乏 Vertipaq 优化的行组\n\n结果显示只有三个分区（3、4 和 5）包含缺乏 Vertipaq 优化的行组。因此，周期性索引维护可以仅针对这些分区进行，跳过其余分区。对于不需要较细粒度细节的情况，可以从查询中省略`row_group_id`，将结果集缩减为不包含行组\
    \ ID 的分区列表。\n\n## 索引视图\n\n可以在聚集列存储索引之上创建索引视图。虽然这增加了一层复杂性，但它允许那些不遵循列存储索引自然排序的查询被隔离到它们自己独立的数据结构中。在那里，视图及其索引可以自由修改，而不会直接影响底层表。\n\
    \n在对存储在聚集列存储索引中的数据进行补充索引的性能测试时，这可以提供更大的灵活性。清单 13-9 中的脚本重建了`Fact.Sale`上的列存储索引，基于它创建了一个架构绑定视图，并向新视图添加了一对索引。\n\
    \n```sql\nALTER INDEX [CCX_Fact_Sale] ON fact.sale REBUILD;\nGO\nCREATE VIEW Fact.v_Sale\n\
    WITH SCHEMABINDING\nAS\nSELECT\n    [Sale Key],\n    [City Key],\n    [Customer\
    \ Key],\n    [Bill To Customer Key],\n    [Stock Item Key],\n    [Invoice Date\
    \ Key],\n    [Delivery Date Key],\n    [Salesperson Key],\n    [WWI Invoice ID],\n\
    \    Description,\n    Package,\n    Quantity,\n    [Unit Price],\n    [Tax Rate],\n\
    \    [Total Excluding Tax],\n    [Tax Amount],\n    Profit,\n    [Total Including\
    \ Tax],\n    [Total Dry Items],\n    [Total Chiller Items],\n    [Lineage Key]\n\
    FROM Fact.Sale;\nGO\nCREATE UNIQUE CLUSTERED INDEX CI_v_sale\nON Fact.v_Sale ([Sale\
    \ Key], [Invoice Date Key]);\nGO\nCREATE NONCLUSTERED INDEX IX_v_Sale\nON Fact.v_Sale\
    \ ([Stock Item Key], Quantity)\nGO\n```\n清单 13-9：重建表并向列存储索引添加索引视图的脚本\n\n重建列存储索引可确保在进一步测试之前索引处于原始状态。此演示中创建的视图包含了表中的所有列，但可以修改为包含更少的列、连接其他表、添加计算列等。下一步是在视图上创建唯一的聚集索引。此步骤是必需的，因为在视图上创建非聚集索引需要以唯一索引为前提。最后，添加一个非聚集覆盖索引来处理针对其列的查询。\n\
    \n完成后，清单 13-2 中的分析查询可以修改为针对该视图，如清单 13-10 所示。\n\n```sql\nSELECT\n    COUNT(*),\n\
    \    SUM(Quantity) AS total_quantity\nFROM Fact.v_Sale\nWHERE [Stock Item Key]\
    \ = 186;\n```\n清单 13-10：针对索引视图的分析查询\n\n查询结果返回迅速。执行计划和`STATISTICS IO`输出如图 13-7\
    \ 所示。\n\n![](img/521866_1_En_13_Fig7_HTML.jpg)\n图 13-7：针对索引视图查询的执行计划和 STATISTICS\
    \ IO 输出\n\n执行计划确认使用了视图`v_Sale`上的非聚集索引。IO 输出显示对视图的读取量低到可接受水平。使用索引视图来管理对列存储索引的选择读取有一个意想不到的副作用：当新行插入到列存储索引中时，仍然会使用\
    \ Vertipaq 优化！\n\n虽然这是针对列存储索引的索引视图的一个有用优势，但在向现有表添加复杂性时仍应谨慎。平衡非典型工作负载对列存储索引的需求与维护附加视图及这些视图上的索引的成本之间的关系。\n\
    \n务必先在没有支撑视图或索引的情况下测试查询。彻底确认其性能，如果需要，再测试附加索引或索引视图的影响，以确认这些增加是否值得其成本。\n\n## 非聚集行存储索引的压缩\n\
    \n鉴于添加到聚集列存储索引中的非聚集行存储索引的膨胀尺寸，压缩可以成为控制附加索引大小并提高对其读取性能的一种有价值的方式。\n\n考虑定义在`Fact.Sale`上的非聚集主键。图\
    \ 13-5 中的索引大小数据显示该索引占用了 6,624KB。清单 13-11 中的脚本删除了此约束，并用一个使用页面压缩的新版本替换它。\n\n```sql\n\
    ALTER TABLE Fact.Sale DROP CONSTRAINT PK_Sale;\nALTER TABLE Fact.Sale ADD CONSTRAINT\
    \ PK_Sale PRIMARY KEY NONCLUSTERED ([Sale Key], [Invoice Date Key])\n    WITH\
    \ (DATA_COMPRESSION = PAGE);\n```\n清单 13-11：使用页面压缩重新创建非聚集主键的脚本\n\n完成后，可以执行清单 13-12\
    \ 中的代码以确认应用压缩后索引的新大小。\n\n```sql\nSELECT\n    indexes.name AS Index_Name,\n   \
    \ SUM(dm_db_partition_stats.used_page_count) * 8 Index_Size_KB,\n    SUM(dm_db_partition_stats.row_count)\
    \ AS Row_Count\nFROM sys.dm_db_partition_stats\nINNER JOIN sys.indexes\n    ON\
    \ dm_db_partition_stats.object_id = indexes.object_id\n    AND dm_db_partition_stats.index_id\
    \ = indexes.index_id\nINNER JOIN sys.tables\n    ON tables.object_id = dm_db_partition_stats.object_id\n\
    INNER JOIN sys.schemas\n    ON schemas.schema_id = tables.schema_id\nWHERE indexes.name\
    \ = 'PK_Sale'\nGROUP BY indexes.name;\n```\n清单 13-12：检查压缩后的非聚集索引大小的脚本\n\n结果如图\
    \ 13-8 所示。\n\n![](img/521866_1_En_13_Fig8_HTML.jpg)\n图 13-8：页面压缩非聚集主键的索引大小\n\n\
    结果显示，该索引现在仅占用 2,736KB，减少了 3,888KB，约 59%。这是一个显著的空间节省，说明了压缩在应用于列存储索引表上的次级非聚集索引时可能产生的积极影响。\n"
- fmt: '# 14. Columnstore Index Maintenance


    ## Nonclustered Rowstore Index Guidance


    Adding nonclustered rowstore indexes to a clustered columnstore index is an effective
    way of managing frequent, unusual query patterns against analytic data. By splitting
    different reads onto both the clustered and nonclustered indexes, contention can
    be better managed by also splitting locks onto each index. Before making any indexing
    changes, ensure that new indexes are necessary and provide enough long-term benefits
    to necessitate their cost.


    When possible, consider the use of filters to shrink the size of nonclustered
    indexes and decrease their impact on the underlying columnstore index. Similarly,
    consider partitioning if not already used as it can assist in streamlining and
    speeding up index maintenance processes.


    Consider indexed views on top of columnstore indexes when there is added value
    in isolating unusual workloads away from the columnstore index and onto a separate
    object. The cost of maintaining them is in no way insignificant, but they can
    provide a convenient way to encapsulate specific workloads onto their own objects.
    Splitting workloads into separate objects helps to reduce contention as reads
    against each object target them separately, locking those objects separately from
    each other.


    Regardless of how secondary indexes are created, consider compressing them. Compression
    can greatly reduce storage consumption, thereby decreasing memory footprint and
    speeding up read queries that use the compressed indexes.


    As a rule of thumb, if the number of nonclustered rowstore indexes against a columnstore
    index increases past one (or two with an indexed view), consider alternative ways
    of storing this data, such as


    *   Clustered rowstore table with page compression and supporting indexes where
    needed.

    *   Clustered columnstore index with less nonclustered indexes.

    *   Separating workloads into separate tables that are managed independently of
    each other.

    *   Apply compression and/or filters to indexes to reduce size and upkeep of each,
    making them more manageable.


    This chapter provided a variety of tactics toward finding a favorable configuration
    that allows wildly different workloads to coexist peacefully on a single table.
    There is no one-size-fits-all approach to secondary indexing on a clustered columnstore
    index, though. If unsure of the best way to proceed, test each alternative thoroughly
    to gain comfort with the pros and cons of each approach.


    ## What Causes Fragmentation?


    There are three scenarios that can be used to describe fragmentation in columnstore
    indexes:


    1.  Wasted space due to deleted rows

    2.  Data that is inserted out of order

    3.  Multiple delta rowgroups present in the index


    When data is deleted in a columnstore index, no rows are actually removed. The
    cost to decompress, delete rows, and recompress rowgroups is prohibitively expensive
    at runtime. Instead, SQL Server flags the rows as deleted using the `delete bitmap`,
    and when queries access that data, they use the bitmap to identify any rows that
    are deleted and need to be skipped.


    Chapter [9](#521866_1_En_9_Chapter.xhtml) provides extensive detail as to how
    `DELETE` and `UPDATE` operations perform on columnstore indexes and outlines ways
    of managing them to avoid persistent performance challenges and minimize fragmentation.
    The net impact of deletion on columnstore indexes will be


    *   Space consumed by deleted data.

    *   More data needs to be read than is needed at runtime.

    *   Data is spread over more rowgroups than necessary.


    The other cause of fragmentation is out-of-order data. A columnstore index should
    always be built and maintained with data that is ordered by a key column (or columns)
    that are used most frequently in filtering and aggregating queries.


    Chapter [10](#521866_1_En_10_Chapter.xhtml) describes the importance of data order
    in columnstore indexes and how maintaining a data order that lines up with common
    query filters and aggregation can allow for exceptionally fast query performance.


    Data that is inserted regularly in the desired columnstore index order will facilitate
    `rowgroup elimination`, thus allowing vast amounts of the index to be automatically
    skipped when filtered using the same column(s). When rows are inserted out of
    order, this forces more data to be read than should be necessary. Similarly, since
    an `UPDATE` operation is executed as the combination of a `DELETE` and `INSERT`,
    updating any older data in a columnstore index will result in it being reinserted
    at the tail end of the index alongside newer data.


    Consider the example columnstore index in Figure [14-1](#521866_1_En_14_Chapter.xhtml#Fig1),
    which is ordered by `Order_Date`.


    ![](images/521866_1_En_14_Chapter/521866_1_En_14_Fig1_HTML.jpg)


    Figure 14-1: A columnstore index that is ordered by the date dimension


    This columnstore index is pristinely ordered by Order Year, with each set of rowgroups
    containing rows in ascending order by date. If a query is executed that calculates
    metrics for 2016, it can read the first ten rowgroups while ignoring the other
    140.


    Figure [14-2](#521866_1_En_14_Chapter.xhtml#Fig2) shows the result of an `UPDATE`
    operation that alters data for 100,000 rows in 2016, 50,000 rows in 2017, and
    25,000 rows in 2018.


    ![](images/521866_1_En_14_Chapter/521866_1_En_14_Fig2_HTML.jpg)


    Figure 14-2: Changes in rowgroup structure after an `UPDATE` operation


    When rows were updated, they remained in the columnstore index in their previous
    locations, but were flagged as deleted. A new rowgroup was created that contains
    the new versions of the deleted rows. The result is that there is now an open
    rowgroup that contains data for 2016, 2017, and 2018. In addition, when new data
    is inserted into the table, it will also be added to the open rowgroup, resulting
    in another year’s worth of data being crammed into a single rowgroup.


    Going forward, any query that requires data from 2016, 2017, 2018, or the current
    year will need to read this unordered rowgroup. If updates like this are common,
    then older rowgroups will quickly become logjammed with deleted rows, while newer
    rowgroups become unordered messes of data from many dates. The result will be
    wasted storage, wasted memory, and slower queries that need to read far more data
    than should be needed to return results.


    Unordered inserts will have a similar impact as the `INSERT` portion of an `UPDATE`
    statement. Inserting data into the columnstore index in Figure [14-1](#521866_1_En_14_Chapter.xhtml#Fig1)
    from 2015 would result in new rowgroups that contain both new and old data. Unordered
    inserts will, over a long period of time, result in the inability of SQL Server
    to take advantage of `rowgroup elimination` as more and more rowgroups contain
    data from all different time periods.


    Delta rowgroups are a key part of columnstore index architecture and ensure that
    write operations can occur as quickly as possible. They slow down reads slightly,
    though, as rows reside in a b-tree structure and are not compressed with columnstore
    compression. The impact of the delta store on read performance is not significant,
    but administrators interested in maximizing columnstore read performance would
    be interested in compressing them as soon as possible after a data load process
    completes.'
