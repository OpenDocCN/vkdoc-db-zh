- fmt: '```

    SELECT

    COUNT(*)

    FROM Fact.Sale_CCI

    WHERE [Invoice Date Key] >= ''1/8/2016''

    AND [Invoice Date Key] < ''3/5/2016'';

    Listing 9-8

    Query to Count Rows with a Wide Date Range on a Columnstore Index

    ```


    When executed, the result is 1,159,180 rows counted. This is greater than the
    1,048,576 rows that can be stored in a single columnstore rowgroup. Listing [9-9](#521866_1_En_9_Chapter.xhtml#PC9)
    rebuilds the index once more and then performs an update against all 1,159,180
    rows identified in Listing [9-9](#521866_1_En_9_Chapter.xhtml#PC9). This single
    `UPDATE` operation will result in the deletion of old rows, the insertion of new
    rows into the delta store, and the compression of most of the new rows into rowgroups.


    ```

    ALTER INDEX CCI_fact_sale_CCI ON Fact.Sale_CCI REBUILD;

    GO

    UPDATE Sale_CCI

    SET [Total Dry Items] = [Total Dry Items] - 1,

    [Total Chiller Items] = [Total Chiller Items] + 1

    FROM Fact.Sale_CCI

    WHERE [Invoice Date Key] >= ''1/8/2016''

    AND [Invoice Date Key] < ''3/5/2016'';

    Listing 9-9

    Query to Update 1,159,180 Rows in a Columnstore Index After Rebuilding the Index

    ```


    The update of 1,159,180 rows took almost a minute to complete. Figure [9-9](#521866_1_En_9_Chapter.xhtml#Fig9)
    shows the resulting columnstore metadata immediately after this large `UPDATE`
    operation completes.


    ![](images/521866_1_En_9_Chapter/521866_1_En_9_Fig9_HTML.jpg)


    Figure 9-9

    Metadata for rowgroups after updating 1,159,180 rows


    Note that there are multiple delta stores present. The open delta store (number
    26) will remain open to accept future inserted data. The closed delta store will
    be processed by the tuple mover asynchronously and be compressed into a permanent
    columnstore rowgroup. Figure [9-10](#521866_1_En_9_Chapter.xhtml#Fig10) shows
    the metadata for this columnstore index after a minute has passed and the tuple
    mover has executed.


    ![](images/521866_1_En_9_Chapter/521866_1_En_9_Fig10_HTML.jpg)


    Figure 9-10

    Metadata for rowgroups after updating 1,159,180 rows and allowing the tuple mover
    to execute


    The rowgroup labeled in a state of “TOMBSTONE” (number 25) is no longer a logical
    part of the columnstore index and will be cleaned up in the future, either via
    the tuple mover or index maintenance. Rowgroup number 27 contains the contents
    of rowgroup number 25 when it was processed by the tuple mover. To summarize the
    changes made to the columnstore index by the update of 1,159,180 rows:


    1.  1,159,180 rows were marked as deleted in the delete bitmap across all rowgroups.

    2.  1,048,576 rows were inserted into one delta store, filling it to capacity.

    3.  110,604 rows were inserted into another delta store and remain in an open
    state awaiting future inserted rows.

    4.  The 1,048,576 rows in the full delta store are processed by the tuple mover
    and compressed into a permanent rowgroup.


    This is a significant amount of work for a single `UPDATE` statement, and it scales
    poorly with increasing row counts.


    In general, updates should be limited to small row counts or avoided altogether.
    There is value in rethinking how code is written to refactor an `UPDATE` against
    a columnstore index into a set of deletes and inserts or to manage an update via
    intermediary processes that avoid it altogether. The performance of `UPDATE` operations
    on columnstore indexes will be unpredictable and a large enough row count will
    result in transactions large enough to create resource pressure on the SQL Server.


    Chapter [15](#521866_1_En_15_Chapter.xhtml) (best practices) will discuss in greater
    detail how to avoid updates and a variety of tactics that can be used when migrating
    `UPDATE` code from rowstore indexes into columnstore indexes.


    # 10. Segment and Rowgroup Elimination


    A key component to how columnstore indexes function is that every segment within
    the index is its own building block. Each may be read individually or in groups,
    but the number of segments read via any query can be reduced by efficient architecture
    and optimal query patterns. Reducing segments read directly reduces IO, improves
    query speed and memory-related performance metrics, such as page life expectancy.


    ## Segment Elimination


    Each segment represents data for a single column over a set of rows. When a query
    is executed against a columnstore index, SQL Server needs to determine which rowgroups
    are required to return the requested result set. Within those rowgroups, only
    the segments containing data for the selected columns will be read. Therefore,
    queries that select less columns will read fewer segments, thereby reducing IO,
    memory usage, and query runtimes.


    Consider the columnstore index shown in Figure [10-1](#521866_1_En_10_Chapter.xhtml#Fig1).


    ![](images/521866_1_En_10_Chapter/521866_1_En_10_Fig1_HTML.jpg)


    Figure 10-1

    Sample columnstore index with six rowgroups and eight columns


    With 6 rowgroups and 8 columns, this columnstore index contains a total of 48
    segments. Because each column is broken into its own set of segments (one per
    rowgroup), it is not necessary to read segments for columns that are not needed
    for a query. If a sample query were to only read columns A and B, the result would
    be that the remaining segments can be automatically skipped, as shown in Figure
    [10-2](#521866_1_En_10_Chapter.xhtml#Fig2).


    ![](images/521866_1_En_10_Chapter/521866_1_En_10_Fig2_HTML.jpg)


    Figure 10-2

    Impact of segment elimination on a query for two columns


    By querying for only two of the possible eight columns, the number of segments
    read was reduced by 75%. This convention holds true for columnstore indexes with
    any number of columns. If this table had 24 columns, then reading only 2 of them
    would mean that 22 columns would not be read. The result of this feature is that
    the number of segments read in a columnstore index query will be proportional
    to the number of columns involved in the query.


    The columns needed to satisfy a query also include any referenced by the `WHERE`
    clause, as well as in aggregates (`GROUP BY`/`HAVING`). If a query includes views
    or functions, then their contents will be evaluated to determine which columns
    are required to execute a query. Listing [10-1](#521866_1_En_10_Chapter.xhtml#PC1)
    provides an example query against a columnstore index.


    ```

    SELECT

    [City Key],

    COUNT(*)

    FROM fact.Sale_CCI

    WHERE [Invoice Date Key] >= ''1/1/2016''

    GROUP BY [City Key]

    ORDER BY COUNT(*) DESC;

    Listing 10-1

    Sample Columnstore Query Using a Filter and Aggregate

    ```


    This analytic query calculates a count of sales per city for a given time period.
    Of the 21 columns in `Sale_CCI`, only 2 were required to complete this calculation:
    `City Key` and `Invoice Date Key`. As a result, 19 of the 21 column’s worth of
    segments will be ignored when executing this query.


    Alternatively, rowstore tables store rows sequentially with each column for each
    row stored together on pages. While reading less columns in rowstore indexes can
    reduce the amount of data presented to an application, it does not reduce the
    quantity of pages read into memory in order to retrieve the specific columns for
    a query. Therefore, reducing the number of columns queried in a columnstore index
    will provide immediate performance benefits that are not as pronounced in rowstore
    indexes.


    Segment elimination is a simple and powerful tool that can be simplified into
    a single optimization technique: Write queries to only include the required columns.
    Since rowgroups can contain up to `2^(20)` rows, the cost of querying unnecessary
    columns can be quite high. Whereas transactional queries against rowstore tables
    often operate on small numbers of rows, analytic queries can access millions of
    rows at a time. Therefore, the perceived convenience of `SELECT *` queries will
    hinder performance on a columnstore index.


    Consider the query in Listing [10-2](#521866_1_En_10_Chapter.xhtml#PC2).


    ```

    SELECT

    *

    FROM fact.Sale_CCI

    WHERE [Invoice Date Key] = ''2/17/2016'';

    Listing 10-2

    A SELECT * Query Against a Columnstore Index

    ```'
