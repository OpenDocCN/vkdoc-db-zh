    这些示例查询产生的执行计划立即提供了一个线索，表明此处发生了显著的性能差异，如图 7-11 所见。


    ![](img/521866_1_En_7_Fig11_HTML.jpg)


    图 7-11


    显示显著性能差异的执行计划


    这两个执行计划看起来几乎相同，除了第一个查询的开销为 90%，而第二个查询的开销为 10%。此外，还发生了聚合下推，允许我们查询中的 `GROUP BY`
    与列存储索引扫描联机处理。这避免了需要将所有 228265 行逐一推送到哈希匹配操作上。图 7-12 比较了每个列存储索引扫描的详细信息。


    ![](img/521866_1_En_7_Fig12_HTML.jpg)


    图 7-12


    行模式与批处理模式操作的执行计划详细信息


    左侧昂贵的执行计划与右侧高效的执行计划之间有几个显著差异：


    *   成功使用批处理模式在第二个计划中处理了 228265 行。

    *   使用批处理模式的 CPU 消耗比使用行模式少近十倍。

    *   `实际本地聚合行数` 记录了聚合下推。


    利用批处理模式还允许 SQL Server 利用聚合下推。这些功能的结合使得 CPU 消耗得以大幅降低。


    这引出了批处理模式处理的一个重要方面，它进一步提高了其在分析工作负载上的有效性：批处理模式使得在查询优化时能够使用其他强大的性能改进功能。其中一些功能（以及它们启用的最早
    SQL Server 版本）包括：


    *   自适应联接 (SQL Server 2017)

    *   内存授予反馈 (SQL Server 2017)

    *   聚合下推 (SQL Server 2016)


    一般来说，当 SQL Server 选择使用批处理模式时，其使用将提高性能。类似地，当使用其他智能查询处理功能（如自适应联接或聚合下推）时，它们也会对性能产生积极影响。


    测试批处理模式与行模式处理可能具有挑战性，因为强制查询使用其中一种模式并不总是直接的。使此测试更容易的一种方法是使用数据库作用域配置更改来临时禁用这些功能。清单
