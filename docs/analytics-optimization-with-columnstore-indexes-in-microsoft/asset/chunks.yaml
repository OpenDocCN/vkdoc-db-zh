- fmt: '# Physical Data on Pages


    Thus far, the discussion of architecture has occurred at a logical level. That
    is, `rowgroups`, `segments`, `delta store`, and the `delete bitmap` have been
    presented as generic containers for columns of data. The physical storage of columnstore
    indexes on pages helps in fully appreciating how they can efficiently service
    analytic queries.


    All data in SQL Server that is not stored in memory-optimized structures is stored
    on `8` kilobyte `pages`. These pages reside on physical storage and are read into
    memory when needed as-is. If a page is compressed, it remains compressed until
    its data is needed. Whether a page is in a `rowstore` or `columnstore index`,
    it is read into memory in the same fashion. The `delete bitmap` and `delta store`
    are also maintained on pages and read into memory as needed.


    Figure [4-8](#521866_1_En_4_Chapter.xhtml#Fig8) illustrates the basic structure
    of a page in SQL Server. The primary components of pages are the


    ![](images/521866_1_En_4_Chapter/521866_1_En_4_Fig8_HTML.jpg)


    Figure 4-8


    Structure of a page in SQL Server


    *   `Page header`

    *   `Data`

    *   `Row offsets`


    The `page header` contains basic information about the page such as the object
    that owns it, the type of data stored in it, and the amount of unallocated space
    available for additional data to be written.


    The `data rows` are the actual data stored on the page. This may be the physical
    data in a table (the clustered index or heap), index entries, or a variety of
    other contents that are available under a variety of circumstances. For this discussion
    of columnstore and rowstore indexes, the data and index data are all that is of
    immediate concern.


    `Row offsets` store the position that each row starts, allowing SQL Server to
    locate the data for any given row once a page is read into memory.


    When data is stored in clustered indexes on a rowstore table, data is written
    to pages row by row. That is, each column is written sequentially on the page
    for each row one after another, as seen in Figure [4-9](#521866_1_En_4_Chapter.xhtml#Fig9).


    ![](images/521866_1_En_4_Chapter/521866_1_En_4_Fig9_HTML.jpg)


    Figure 4-9


    Storage of rowstore data on a page in SQL Server


    This table has six columns, and they are written sequentially for each row, one
    after another. SQL Server will continue to write rows sequentially for this table
    to the same page until it runs out of space, at which point a new page will be
    allocated to the table and the data will continue there.


    This structure is optimized for reading or writing small range lookups that consist
    of a set of sequential rows. For example, a query that returned some (or all)
    of columns from rows two through five would only need to read the single page
    shown in Figure [4-9](#521866_1_En_4_Chapter.xhtml#Fig9). If additional rows were
    required that were on other pages, then those pages would also be read into memory
    to satisfy the query.


    A `clustered` or `nonclustered rowstore index` writes its binary tree structure
    to pages as a sequence of pointers. The root level is written first, followed
    by intermediate levels that ultimately point to the underlying data at the leaf
    level of the index. Each level of the index includes the clustered index keys,
    which are used to organize and link between levels of the index. This structure
    is also optimized for seeking single or small contiguous ranges of rows. For queries
    like this, less intermediate levels of an index need to be read, reducing the
    number of pages needed to satisfy a query. Figure [4-10](#521866_1_En_4_Chapter.xhtml#Fig10)
    shows a visualization of a clustered rowstore (binary tree) index.


    ![](images/521866_1_En_4_Chapter/521866_1_En_4_Fig10_HTML.jpg)


    Figure 4-10


    Structure of a clustered rowstore index


    Because this is the clustered index, the leaf levels contain the column data for
    each row that is referenced by the clustered index. In a `nonclustered index`,
    the lowest level of the index would contain pointers to the target data, to be
    used for key lookups. Similarly, the leaf level of a `nonclustered index` would
    also contain any included columns that are defined on the index.


    A query that needed to read clustered index ID values between `25` and `75` could
    do so by reading the index root page and then pages `1` and `2`. A query reading
    only clustered index ID value `136` would read the index root and page `4`.


    In a columnstore index, there is no binary tree structure. A `clustered columnstore
    index` is written as a sequence of compressed segments on as many pages as is
    needed to support them. Figure [4-11](#521866_1_En_4_Chapter.xhtml#Fig11) illustrates
    how this would look for a single page of a columnstore index.


    ![](images/521866_1_En_4_Chapter/521866_1_En_4_Fig11_HTML.jpg)


    Figure 4-11


    Storage of columnstore data on a page in SQL Server


    Note that this data, a subset of a compressed segment, contains sequential values
    for the same column. This sequence would continue until the end of the `rowgroup`,
    at which point a new segment would begin, or if it were the last of the rowgroups,
    the next column would begin.


    A query that aggregated values for the first `40` rows of column `1` could retrieve
    data very efficiently and do so by simply reading this single page. In a rowstore
    index for the same table, it would be necessary to scan data for all columns in
    those `40` rows and read those pages into memory. For a table with `20` columns,
    that would require `20` times the effort.


    ## Summarizing Differences


    The key to understanding the difference between the architecture of rowstore indexes
    and columnstore indexes is to consider the logical storage of data vs. the physical
    storage of data.


    Rowstore indexes store data physically in order by row and then column. Data is
    logically accessible as it is ordered by row. Therefore, this architecture is
    optimized for queries that seek a sequence or limited subset of rows. Binary tree
    indexes provide a speedy way to search for that data based on other columns that
    the clustered index does not order the data by.


    Columnstore indexes store data physically grouped by column, but ordered by row.
    This convention allows for filters to limit the number of rows returned and column
    groupings to reduce the pages read as the number of columns needed for a query
    decreases. This allows queries to read significantly more rows, but maintain excellent
    performance when the column list is limited. Chapter [10](#521866_1_En_10_Chapter.xhtml)
    explores how the order of data within a columnstore index can be controlled to
    add an additional dimension of filtering so that data can be sliced both horizontally
    and vertically.


    # 5. Columnstore Compression


    There are many features that allow columnstore indexes to perform exceptionally
    well for analytic workloads. Of those features, compression is the most significant
    driver in both performance and resource consumption. Understanding how SQL Server
    implements compression in columnstore indexes and how different algorithms are
    used to shrink the size of this data allows for optimal architecture and implementation
    of analytic data storage in SQL Server.'
  raw: '## Physical Data on Pages


    Thus far, the discussion of architecture has occurred at a logical level. That
    is, rowgroups, segments, delta store, and the delete bitmap have been presented
    as generic containers for columns of data. The physical storage of columnstore
    indexes on pages helps in fully appreciating how they can efficiently service
    analytic queries.


    All data in SQL Server that is not stored in memory-optimized structures is stored
    on 8 kilobyte pages. These pages reside on physical storage and are read into
    memory when needed as-is. If a page is compressed, it remains compressed until
    its data is needed. Whether a page is in a rowstore or columnstore index, it is
    read into memory in the same fashion. The delete bitmap and delta store are also
    maintained on pages and read into memory as needed.


    Figure [4-8](#521866_1_En_4_Chapter.xhtml#Fig8) illustrates the basic structure
    of a page in SQL Server. The primary components of pages are the


    ![](images/521866_1_En_4_Chapter/521866_1_En_4_Fig8_HTML.jpg)


    Figure 4-8


    Structure of a page in SQL Server


    *   Page header


    *   Data


    *   Row offsets


    The page header contains basic information about the page such as the object that
    owns it, the type of data stored in it, and the amount of unallocated space available
    for additional data to be written.


    The data rows are the actual data stored on the page. This may be the physical
    data in a table (the clustered index or heap), index entries, or a variety of
    other contents that are available under a variety of circumstances. For this discussion
    of columnstore and rowstore indexes, the data and index data are all that is of
    immediate concern.


    Row offsets store the position that each row starts, allowing SQL Server to locate
    the data for any given row once a page is read into memory.


    When data is stored in clustered indexes on a rowstore table, data is written
    to pages row by row. That is, each column is written sequentially on the page
    for each row one after another, as seen in Figure [4-9](#521866_1_En_4_Chapter.xhtml#Fig9).


    ![](images/521866_1_En_4_Chapter/521866_1_En_4_Fig9_HTML.jpg)


    Figure 4-9


    Storage of rowstore data on a page in SQL Server


    This table has six columns, and they are written sequentially for each row, one
    after another. SQL Server will continue to write rows sequentially for this table
    to the same page until it runs out of space, at which point a new page will be
    allocated to the table and the data will continue there.


    This structure is optimized for reading or writing small range lookups that consist
    of a set of sequential rows. For example, a query that returned some (or all)
    of columns from rows two through five would only need to read the single page
    shown in Figure [4-9](#521866_1_En_4_Chapter.xhtml#Fig9). If additional rows were
    required that were on other pages, then those pages would also be read into memory
    to satisfy the query.


    A clustered or nonclustered rowstore index writes its binary tree structure to
    pages as a sequence of pointers. The root level is written first, followed by
    intermediate levels that ultimately point to the underlying data at the leaf level
    of the index. Each level of the index includes the clustered index keys, which
    are used to organize and link between levels of the index. This structure is also
    optimized for seeking single or small contiguous ranges of rows. For queries like
    this, less intermediate levels of an index need to be read, reducing the number
    of pages needed to satisfy a query. Figure [4-10](#521866_1_En_4_Chapter.xhtml#Fig10)
    shows a visualization of a clustered rowstore (binary tree) index.


    ![](images/521866_1_En_4_Chapter/521866_1_En_4_Fig10_HTML.jpg)


    Figure 4-10


    Structure of a clustered rowstore index


    Because this is the clustered index, the leaf levels contain the column data for
    each row that is referenced by the clustered index. In a nonclustered index, the
    lowest level of the index would contain pointers to the target data, to be used
    for key lookups. Similarly, the leaf level of a nonclustered index would also
    contain any included columns that are defined on the index.


    A query that needed to read clustered index ID values between 25 and 75 could
    do so by reading the index root page first and then pages 1 and 2\. A query reading
    only clustered index ID value 136 would read the index root and page 4.


    In a columnstore index, there is no binary tree structure. A clustered columnstore
    index is written as a sequence of compressed segments on as many pages as is needed
    to support them. Figure [4-11](#521866_1_En_4_Chapter.xhtml#Fig11) illustrates
    how this would look for a single page of a columnstore index.


    ![](images/521866_1_En_4_Chapter/521866_1_En_4_Fig11_HTML.jpg)


    Figure 4-11


    Storage of columnstore data on a page in SQL Server


    Note that this data, a subset of a compressed segment, contains sequential values
    for the same column. This sequence would continue until the end of the rowgroup,
    at which point a new segment would begin, or if it were the last of the rowgroups,
    the next column would begin.


    A query that aggregated values for the first 40 rows of column 1 could retrieve
    data very efficiently and do so by simply reading this single page. In a rowstore
    index for the same table, it would be necessary to scan data for all columns in
    those 40 rows and read those pages into memory. For a table with 20 columns, that
    would require 20 times the effort.


    ## Summarizing Differences


    The key to understanding the difference between the architecture of rowstore indexes
    and columnstore indexes is to consider the logical storage of data vs. the physical
    storage of data.


    Rowstore indexes store data physically in order by row and then column. Data is
    logically accessible as it is ordered by row. Therefore, this architecture is
    optimized for queries that seek a sequence or limited subset of rows. Binary tree
    indexes provide a speedy way to search for that data based on other columns that
    the clustered index does not order the data by.


    Columnstore indexes store data physically grouped by column, but ordered by row.
    This convention allows for filters to limit the number of rows returned and column
    groupings to reduce the pages read as the number of columns needed for a query
    decreases. This allows queries to read significantly more rows, but maintain excellent
    performance when the column list is limited. Chapter [10](#521866_1_En_10_Chapter.xhtml)
    explores how the order of data within a columnstore index can be controlled to
    add an additional dimension of filtering so that data can be sliced both horizontally
    and vertically.


    # 5. Columnstore Compression


    There are many features that allow columnstore indexes to perform exceptionally
    well for analytic workloads. Of those features, compression is the most significant
    driver in both performance and resource consumption. Understanding how SQL Server
    implements compression in columnstore indexes and how different algorithms are
    used to shrink the size of this data allows for optimal architecture and implementation
    of analytic data storage in SQL Server.'
  trans: '# 页面上的物理数据


    到目前为止，关于架构的讨论都是在逻辑层面进行的。也就是说，`行组`、`段`、`增量存储`和`删除位图`都被呈现为数据列的通用容器。列存储索引在页面上的物理存储有助于我们充分理解它们如何高效地为分析查询提供服务。


    SQL Server 中所有未存储在内存优化结构中的数据都存储在 `8` KB 的 `页面` 上。这些页面驻留在物理存储上，并在需要时按原样读入内存。如果页面被压缩，它将保持压缩状态，直到需要其数据时。无论页面位于
    `行存储` 还是 `列存储索引` 中，它都以相同的方式读入内存。`删除位图`和`增量存储`也维护在页面上，并根据需要读入内存。


    图 4-8 展示了 SQL Server 中页面的基本结构。页面的主要组成部分是：


    ![](img/521866_1_En_4_Fig8_HTML.jpg)

    图 4-8

    SQL Server 中页面的结构


    *   `页面头部`

    *   `数据`

    *   `行偏移量`


    `页面头部`包含有关页面的基本信息，例如拥有它的对象、存储在其中的数据类型，以及可用于写入更多数据的未分配空间量。


    `数据行`是存储在页面上的实际数据。这可能是表中的物理数据（聚集索引或堆）、索引条目，或在各种情况下可用的各种其他内容。对于本次关于列存储和行存储索引的讨论，数据和索引数据是当前唯一需要关注的内容。


    `行偏移量`存储每一行的起始位置，允许 SQL Server 在页面读入内存后定位任何给定行的数据。


    当数据以行存储表上的聚集索引形式存储时，数据按行逐行写入页面。也就是说，对于每一行，每个列依次顺序写入页面，如图 4-9 所示。


    ![](img/521866_1_En_4_Fig9_HTML.jpg)

    图 4-9

    SQL Server 中行存储数据在页面上的存储


    此表有六列，它们按顺序为每一行依次写入。SQL Server 会继续将此表的行顺序写入同一页面，直到空间用尽，此时将为该表分配一个新页面，数据将在那里继续写入。


    此结构针对读取或写入由一组连续行组成的小范围查找进行了优化。例如，返回第 2 行到第 5 行中部分（或全部）列的查询，只需要读取图 4-9 中所示的单个页面。如果需要其他页面上的额外行，那么这些页面也将被读入内存以满足查询。


    `聚集`或`非聚集行存储索引`将其二叉树结构作为一系列指针写入页面。首先写入根级别，然后是中间级别，这些中间级别最终指向索引叶级别的底层数据。索引的每一级都包含聚集索引键，这些键用于组织和链接索引的各个级别。此结构也针对查找单个或小的连续行范围进行了优化。对于此类查询，需要读取的索引中间级别较少，从而减少了满足查询所需的页面数量。图
    4-10 展示了一个聚集行存储（二叉树）索引的可视化表示。


    ![](img/521866_1_En_4_Fig10_HTML.jpg)

    图 4-10

    聚集行存储索引的结构


    因为这是聚集索引，所以叶级包含聚集索引所引用的每一行的列数据。在`非聚集索引`中，索引的最低级别将包含指向目标数据的指针，用于键查找。类似地，`非聚集索引`的叶级也会包含在该索引上定义的任何包含列。


    需要读取聚集索引 ID 值在 `25` 和 `75` 之间的查询，可以通过读取索引根页，然后读取页面 `1` 和 `2` 来完成。仅读取聚集索引 ID 值
    `136` 的查询将读取索引根页和页面 `4`。


    在列存储索引中，没有二叉树结构。`聚集列存储索引`作为一系列压缩段写入，占用支持它们所需的任意多页面。图 4-11 说明了列存储索引的单个页面的外观。


    ![](img/521866_1_En_4_Fig11_HTML.jpg)

    图 4-11

    SQL Server 中列存储数据在页面上的存储


    请注意，这些数据是压缩段的一个子集，包含同一列的连续值。这个序列会持续到`行组`结束，此时将开始一个新段；或者如果它是最后一个行组，则将开始下一列。


    聚合 `1` 列前 `40` 行值的查询可以非常高效地检索数据，只需读取这个单个页面。在相同表的行存储索引中，则有必要扫描这 `40` 行中所有列的数据，并将这些页面读入内存。对于一个有
    `20` 列的表，这将需要 `20` 倍的工作量。


    ## 差异总结


    理解行存储索引和列存储索引架构之间差异的关键在于考虑数据的逻辑存储与物理存储。


    行存储索引按行然后按列的顺序物理存储数据。数据在逻辑上可按行排序访问。因此，此架构针对查找序列或有限行子集的查询进行了优化。二叉树索引提供了一种基于聚集索引未对数据排序的其他列来快速搜索该数据的方法。


    列存储索引按列物理分组存储数据，但按行排序。此约定允许通过过滤器限制返回的行数，并通过列分组减少需要读取的页面，因为查询所需的列数减少。这使得查询可以读取显著更多的行，但在列列表受限时仍能保持出色的性能。第
    10 章探讨了如何控制列存储索引内的数据顺序，以增加一个额外的过滤维度，从而能够对数据进行水平和垂直切片。


    # 5. 列存储压缩


    有许多特性使得列存储索引在分析工作负载中表现异常出色。在这些特性中，压缩是性能和资源消耗方面最重要的驱动因素。理解 SQL Server 如何在列存储索引中实现压缩，以及如何使用不同的算法来缩减这些数据的大小，有助于在
    SQL Server 中优化分析数据存储的架构和实现。'
- fmt: '## Basics of Columnstore Compression


    Data written to segments within a columnstore index is heavily compressed prior
    to storage. The delta store helps buffer incoming writes to a columnstore index,
    ensuring that the frequency that segments need to be written is not high enough
    to negatively impact server performance.


    Without any additional optimizations, data stored by columns rather than rows
    will be quite efficient to compress. This is because the values within a given
    column will usually repeat often and therefore can be more easily compressed that
    data that repeats less often. Typical analytic tables will contain many rows,
    but generally repetitive columns, such as


    *   Entity types


    *   Money


    *   Dates


    *   Counts


    *   Repetitive dimensions


    Consider the three columns illustrated in Figure [5-1](#521866_1_En_5_Chapter.xhtml#Fig1).


    ![](images/521866_1_En_5_Chapter/521866_1_En_5_Fig1_HTML.jpg)


    Figure 5-1


    Example of repeated values within a representative data set


    Eleven rows are represented, of which each column contains repeated values. The
    *Date* column contains only three distinct values, whereas *Status* contains four
    and *Hours* contains six. This repetition tends to scale well. If this were the
    data from a rowgroup containing one million rows, it would be reasonable to expect
    a column like *Status* to only contain a small number of values that are repeated
    frequently throughout the data set. The more repetitive the data is, the more
    effectively it will compress.


    As is expected, more values are repeated within the values present in a single
    column than across different columns. This is true for two primary reasons:


    *   Different data types will have vastly different values. For example, the contents
    of a string column are not easily comparable to that of a money column.


    *   Columns representing different dimensions will have different ranges of values
    that correspond to their typical usage. For example, a decimal column containing
    the tax rates charged on new cars would contain a very different set of common
    values than a decimal column containing the cost of those cars.


    Columnstore indexes align perfectly with these conventions, whereas rowstore indexes
    struggle because row and page compression are forced to take into account all
    columns in a row or page, which will comprise a wide variety of data types and
    dimensions.


    Note that the delta store is not columnstore compressed. This data structure needs
    to be written to as quickly as possible at runtime, and therefore forgoing expensive
    compression removes the time and overhead required to process writes against it.
    This will mean that the delta store takes up more space than it may have if columnstore
    compression were used. Since the delta store tends to be small in comparison to
    the compressed columnstore index contents and contain a predictable count of rows,
    the effort needed to maintain it is constant and does not grow over time. Depending
    on SQL Server version, delta rowgroups may use row or page compression to limit
    their storage and memory footprint.


    ## Columnstore Compression Algorithms


    Columnstore indexes do not repeatedly store strings, decimals, or dates as is
    in segments. Instead, SQL Server makes use of a dictionary encoding and value
    encoding to shrink and compress data, even if the raw values are large.


    Compression may be summarized in the following sequential steps:


    1.  Encode all values prior to compression.


    2.  Calculate optimal row order (aka Vertipaq optimization).


    3.  Individually compress each segment.


    Encoding is an important step in the compression process. The following are details
    that explain different encoding algorithms, how they are used, and how they impact
    overall compression effectiveness.


    ### Value Encoding


    This process seeks to reduce the footprint of numeric columns by adjusting their
    storage to be able to use smaller sized objects. For integer data, which consists
    of TINYINT, SMALLINT, INT, and BIGINT, values are compressed by a variety of mathematical
    transformations that can divide all values by a common divisor or subtract all
    values with a common subtrahend. Consider a column that is a 4-bit integer data
    type and contains the values shown in Table [5-1](#521866_1_En_5_Chapter.xhtml#Tab1).


    Table 5-1


    Sample Integer Column Data to Be Compressed


    | Values | Minimum Size in Bits |

    | --- | --- |

    | **60** | **6** |

    | **150** | **8** |

    | **90** | **7** |

    | **9000** | **13** |

    | **630** | **10** |

    | **300000** | **19** |


    Columnstore compression seeks to find common divisors and immediately notes that
    each number is divisible by 10\. For this example, the base is 10 and each value
    will be referenced using the maximum common negative exponent of that base that
    it is divisible by, as seen in Table [5-2](#521866_1_En_5_Chapter.xhtml#Tab2).


    Table 5-2


    Integer Data Compressed Using a Negative Exponent


    | Values | Value *10^(-1) | Minimum Size in Bits |

    | --- | --- | --- |

    | **60** | **6** | **3** |

    | **150** | **15** | **4** |

    | **90** | **9** | **4** |

    | **9000** | **900** | **10** |

    | **630** | **63** | **6** |

    | **300000** | **30000** | **15** |


    The next compression step is to take the smallest value in the list as the base,
    zero it out, and reference other values by subtracting that base from them, as
    seen in Table [5-3](#521866_1_En_5_Chapter.xhtml#Tab3).


    Table 5-3


    Integer Data Compressed by Rebasing


    | Values | Value *10^(-1) | Value *10^(-1) - 6 | Minimum Size in Bits |

    | --- | --- | --- | --- |

    | **60** | **6** | **0** | **0** |

    | **150** | **15** | **9** | **4** |

    | **90** | **9** | **3** | **2** |

    | **9000** | **900** | **894** | **10** |

    | **630** | **63** | **57** | **6** |

    | **300000** | **30000** | **29994** | **15** |


    Reviewing the minimum space required to store the values, the original size was
    63 bits. After the first transformation, the size is reduced to 42 bits, and after
    the last transformation, it is reduced to 37 bits. Overall, the reduction in size
    for this set of values was 38%. The level of value compression seen will vary
    based on the set of values and can be significantly higher or lower. For example,
    a set of values that are all the same will compress into a single zeroed-out reference,
    as seen in Table [5-4](#521866_1_En_5_Chapter.xhtml#Tab4).


    Table 5-4


    Identical Integer Data Compressed by Rebasing


    | Values | Value - 1700000 | Original Size in Bits | Reduced Size in Bits |

    | --- | --- | --- | --- |

    | **1700000** | **0** | **22** | **0** |

    | **1700000** | **0** | **22** | **0** |

    | **1700000** | **0** | **22** | **0** |

    | **1700000** | **0** | **22** | **0** |

    | **1700000** | **0** | **22** | **0** |


    While this example may seem extreme, it is not that unusual as dimensions often
    contain repeated values that fall into limited ranges.


    Note that real-world transformations of data that occur in columnstore indexes
    are more complex than this, but the process to determine their details is essentially
    the same.


    Decimals are converted into integers prior to compression, at which point they
    follow the same value encoding rules as integers would. For example, Table [5-5](#521866_1_En_5_Chapter.xhtml#Tab5)
    shows the compression process for a set of tax rates that are stored in decimal
    format.


    Table 5-5


    Value Compression for Decimals


    | Values | Value * 100 | Value / 5 | Value / 5 - 70 | Original Size in Bits |
    Reduced Size in Bits |

    | --- | --- | --- | --- | --- | --- |

    | **15.2** | **1520** | **304** | **234** | **40** | **8** |

    | **8.8** | **880** | **176** | **106** | **40** | **7** |

    | **4.3** | **430** | **86** | **16** | **40** | **5** |

    | **3.5** | **350** | **70** | **0** | **40** | **0** |

    | **6.25** | **625** | **125** | **55** | **40** | **6** |'
  raw: '## Basics of Columnstore Compression


    Data written to segments within a columnstore index is heavily compressed prior
    to storage. The delta store helps buffer incoming writes to a columnstore index,
    ensuring that the frequency that segments need to be written is not high enough
    to negatively impact server performance.


    Without any additional optimizations, data stored by columns rather than rows
    will be quite efficient to compress. This is because the values within a given
    column will usually repeat often and therefore can be more easily compressed that
    data that repeats less often. Typical analytic tables will contain many rows,
    but generally repetitive columns, such as


    *   Entity types


    *   Money


    *   Dates


    *   Counts


    *   Repetitive dimensions


    Consider the three columns illustrated in Figure [5-1](#521866_1_En_5_Chapter.xhtml#Fig1).


    ![](images/521866_1_En_5_Chapter/521866_1_En_5_Fig1_HTML.jpg)


    Figure 5-1


    Example of repeated values within a representative data set


    Eleven rows are represented, of which each column contains repeated values. The
    *Date* column contains only three distinct values, whereas *Status* contains four
    and *Hours* contains six. This repetition tends to scale well. If this were the
    data from a rowgroup containing one million rows, it would be reasonable to expect
    a column like *Status* to only contain a small number of values that are repeated
    frequently throughout the data set. The more repetitive the data is, the more
    effectively it will compress.


    As is expected, more values are repeated within the values present in a single
    column than across different columns. This is true for two primary reasons:


    *   Different data types will have vastly different values. For example, the contents
    of a string column are not easily comparable to that of a money column.


    *   Columns representing different dimensions will have different ranges of values
    that correspond to their typical usage. For example, a decimal column containing
    the tax rates charged on new cars would contain a very different set of common
    values than a decimal column containing the cost of those cars.


    Columnstore indexes align perfectly with these conventions, whereas rowstore indexes
    struggle because row and page compression are forced to take into account all
    columns in a row or page, which will comprise a wide variety of data types and
    dimensions.


    Note that the delta store is not columnstore compressed. This data structure needs
    to be written to as quickly as possible at runtime, and therefore forgoing expensive
    compression removes the time and overhead required to process writes against it.
    This will mean that the delta store takes up more space than it may have if columnstore
    compression were used. Since the delta store tends to be small in comparison to
    the compressed columnstore index contents and contain a predictable count of rows,
    the effort needed to maintain it is constant and does not grow over time. Depending
    on SQL Server version, delta rowgroups may use row or page compression to limit
    their storage and memory footprint.


    ## Columnstore Compression Algorithms


    Columnstore indexes do not repeatedly store strings, decimals, or dates as is
    in segments. Instead, SQL Server makes use of a dictionary encoding and value
    encoding to shrink and compress data, even if the raw values are large.


    Compression may be summarized in the following sequential steps:


    1.  Encode all values prior to compression.


    2.  Calculate optimal row order (aka Vertipaq optimization).


    3.  Individually compress each segment.


    Encoding is an important step in the compression process. The following are details
    that explain different encoding algorithms, how they are used, and how they impact
    overall compression effectiveness.


    ### Value Encoding


    This process seeks to reduce the footprint of numeric columns by adjusting their
    storage to be able to use smaller sized objects. For integer data, which consists
    of TINYINT, SMALLINT, INT, and BIGINT, values are compressed by a variety of mathematical
    transformations that can divide all values by a common divisor or subtract all
    values with a common subtrahend. Consider a column that is a 4-bit integer data
    type and contains the values shown in Table [5-1](#521866_1_En_5_Chapter.xhtml#Tab1).


    Table 5-1


    Sample Integer Column Data to Be Compressed


    | Values | Minimum Size in Bits |

    | --- | --- |

    | **60** | **6** |

    | **150** | **8** |

    | **90** | **7** |

    | **9000** | **13** |

    | **630** | **10** |

    | **300000** | **19** |


    Columnstore compression seeks to find common divisors and immediately notes that
    each number is divisible by 10\. For this example, the base is 10 and each value
    will be referenced using the maximum common negative exponent of that base that
    it is divisible by, as seen in Table [5-2](#521866_1_En_5_Chapter.xhtml#Tab2).


    Table 5-2


    Integer Data Compressed Using a Negative Exponent


    | Values | Value *10^(-1) | Minimum Size in Bits |

    | --- | --- | --- |

    | **60** | **6** | **3** |

    | **150** | **15** | **4** |

    | **90** | **9** | **4** |

    | **9000** | **900** | **10** |

    | **630** | **63** | **6** |

    | **300000** | **30000** | **15** |


    The next compression step is to take the smallest value in the list as the base,
    zero it out, and reference other values by subtracting that base from them, as
    seen in Table [5-3](#521866_1_En_5_Chapter.xhtml#Tab3).


    Table 5-3


    Integer Data Compressed by Rebasing


    | Values | Value *10^(-1) | Value *10^(-1) - 6 | Minimum Size in Bits |

    | --- | --- | --- | --- |

    | **60** | **6** | **0** | **0** |

    | **150** | **15** | **9** | **4** |

    | **90** | **9** | **3** | **2** |

    | **9000** | **900** | **894** | **10** |

    | **630** | **63** | **57** | **6** |

    | **300000** | **30000** | **29994** | **15** |


    Reviewing the minimum space required to store the values, the original size was
    63 bits. After the first transformation, the size is reduced to 42 bits, and after
    the last transformation, it is reduced to 37 bits. Overall, the reduction in size
    for this set of values was 38%. The level of value compression seen will vary
    based on the set of values and can be significantly higher or lower. For example,
    a set of values that are all the same will compress into a single zeroed-out reference,
    as seen in Table [5-4](#521866_1_En_5_Chapter.xhtml#Tab4).


    Table 5-4


    Identical Integer Data Compressed by Rebasing


    | Values | Value - 1700000 | Original Size in Bits | Reduced Size in Bits |

    | --- | --- | --- | --- |

    | **1700000** | **0** | **22** | **0** |

    | **1700000** | **0** | **22** | **0** |

    | **1700000** | **0** | **22** | **0** |

    | **1700000** | **0** | **22** | **0** |

    | **1700000** | **0** | **22** | **0** |


    While this example may seem extreme, it is not that unusual as dimensions often
    contain repeated values that fall into limited ranges.


    Note that real-world transformations of data that occur in columnstore indexes
    are more complex than this, but the process to determine their details is essentially
    the same.


    Decimals are converted into integers prior to compression, at which point they
    follow the same value encoding rules as integers would. For example, Table [5-5](#521866_1_En_5_Chapter.xhtml#Tab5)
    shows the compression process for a set of tax rates that are stored in decimal
    format.


    Table 5-5


    Value Compression for Decimals


    | Values | Value * 100 | Value / 5 | Value / 5 - 70 | Original Size in Bits |
    Reduced Size in Bits |

    | --- | --- | --- | --- | --- | --- |

    | **15.2** | **1520** | **304** | **234** | **40** | **8** |

    | **8.8** | **880** | **176** | **106** | **40** | **7** |

    | **4.3** | **430** | **86** | **16** | **40** | **5** |

    | **3.5** | **350** | **70** | **0** | **40** | **0** |

    | **6.25** | **625** | **125** | **55** | **40** | **6** |'
  trans: '

    ## 列存储压缩基础


    写入列存储索引中段的数据在存储前会经过高强度压缩。增量存储有助于缓冲传入列存储索引的写入操作，确保写入段的频率不会高到对服务器性能产生负面影响。


    即使没有任何额外的优化，按列而非按行存储的数据在压缩时也会非常高效。这是因为给定列中的值通常会频繁重复，因此比重复较少的数据更容易压缩。典型的分析表会包含许多行，但通常包含重复的列，例如：


    *   实体类型

    *   金额

    *   日期

    *   计数

    *   重复的维度


    考虑图 5-1 中所示的三列。


    ![](img/521866_1_En_5_Fig1_HTML.jpg)


    图 5-1


    代表性数据集中重复值示例


    图中表示了十一行数据，其中每列都包含重复值。*日期*列仅包含三个不同的值，而*状态*列包含四个，*小时*列包含六个。这种重复性往往能很好地扩展。如果这是来自包含一百万行的行组的数据，那么可以合理地预期像*状态*这样的列只会包含少量在整个数据集中频繁重复的值。数据的重复性越高，其压缩效果就越好。


    正如预期的那样，单个列中的值之间比不同列之间的值存在更多的重复。这主要基于两个原因：


    *   不同的数据类型将具有截然不同的值。例如，字符串列的内容不容易与金额列的内容进行比较。

    *   代表不同维度的列将具有与其典型用途相对应的不同值范围。例如，包含新车税率的小数列所包含的常见值集合，将与包含这些汽车成本的小数列非常不同。


    列存储索引完美契合这些约定，而行存储索引则力不从心，因为行压缩和页压缩被迫考虑行或页中的所有列，这将包含各种数据类型和维度。


    请注意，增量存储不进行列存储压缩。此数据结构需要在运行时尽可能快速地写入，因此放弃昂贵的压缩省去了处理对其写入所需的时间和开销。这意味着增量存储将比使用列存储压缩时占用更多空间。由于增量存储与压缩后的列存储索引内容相比往往较小，并且包含可预测的行数，因此维护它所需的开销是恒定的，不会随时间增长。根据
    SQL Server 版本的不同，增量行组可能会使用行压缩或页压缩来限制其存储和内存占用。


    ## 列存储压缩算法


    列存储索引不会在段中重复存储字符串、小数或日期。相反，SQL Server 利用字典编码和值编码来缩减和压缩数据，即使原始值很大。


    压缩过程可总结为以下顺序步骤：


    1.  压缩前对所有值进行编码。

    2.  计算最佳行顺序（又称 Vertipaq 优化）。

    3.  独立压缩每个段。


    编码是压缩过程中的重要步骤。以下细节解释了不同的编码算法、它们的使用方式以及它们对整体压缩效果的影响。


    ### 值编码


    此过程旨在通过调整数字列的存储方式以使用更小尺寸的对象来减少其占用空间。对于整数数据（包括 TINYINT、SMALLINT、INT 和 BIGINT），值通过各种数学变换进行压缩，这些变换可以将所有值除以一个公约数或减去一个公共减数。考虑一个
    4 字节整数数据类型的列，其包含表 5-1 中所示的值。


    表 5-1


    待压缩的示例整数列数据


    | 值 | 最小位数（位） |

    | --- | --- |

    | **60** | **6** |

    | **150** | **8** |

    | **90** | **7** |

    | **9000** | **13** |

    | **630** | **10** |

    | **300000** | **19** |


    列存储压缩试图寻找公约数，并立即注意到每个数字都可被 10 整除。在此示例中，基数是 10，每个值将使用其可被整除的该基数的最大公共负指数来引用，如表 5-2
    所示。


    表 5-2


    使用负指数压缩的整数数据


    | 值 | 值 *10^(-1) | 最小位数（位） |

    | --- | --- | --- |

    | **60** | **6** | **3** |

    | **150** | **15** | **4** |

    | **90** | **9** | **4** |

    | **9000** | **900** | **10** |

    | **630** | **63** | **6** |

    | **300000** | **30000** | **15** |


    下一个压缩步骤是将列表中的最小值作为基数，将其归零，并通过从其他值中减去该基数来引用它们，如表 5-3 所示。


    表 5-3


    通过重新设定基数压缩的整数数据


    | 值 | 值 *10^(-1) | 值 *10^(-1) - 6 | 最小位数（位） |

    | --- | --- | --- | --- |

    | **60** | **6** | **0** | **0** |

    | **150** | **15** | **9** | **4** |

    | **90** | **9** | **3** | **2** |

    | **9000** | **900** | **894** | **10** |

    | **630** | **63** | **57** | **6** |

    | **300000** | **30000** | **29994** | **15** |


    回顾存储值所需的最小空间，原始大小为 63 位。经过第一次变换后，大小减少到 42 位，经过最后一次变换后，大小减少到 37 位。总体而言，这组值的尺寸缩减了
    38%。所见值压缩的程度会根据值集合的不同而变化，并且可能显著更高或更低。例如，一组完全相同的值将压缩成一个归零的引用，如表 5-4 所示。


    表 5-4


    通过重新设定基数压缩的相同整数数据


    | 值 | 值 - 1700000 | 原始位数（位） | 缩减后位数（位） |

    | --- | --- | --- | --- |

    | **1700000** | **0** | **22** | **0** |

    | **1700000** | **0** | **22** | **0** |

    | **1700000** | **0** | **22** | **0** |

    | **1700000** | **0** | **22** | **0** |

    | **1700000** | **0** | **22** | **0** |


    虽然这个例子看起来很极端，但在维度表中包含的重复值落入有限范围的情况并不少见。


    请注意，列存储索引中实际发生的现实世界数据转换比这更复杂，但确定其细节的过程本质上是相同的。


    小数在压缩前会转换为整数，此时它们遵循与整数相同的值编码规则。例如，表 5-5 显示了一组以小数格式存储的税率的压缩过程。


    表 5-5


    小数的值压缩


    | 值 | 值 * 100 | 值 / 5 | 值 / 5 - 70 | 原始位数（位） | 缩减后位数（位） |

    | --- | --- | --- | --- | --- | --- |

    | **15.2** | **1520** | **304** | **234** | **40** | **8** |

    | **8.8** | **880** | **176** | **106** | **40** | **7** |

    | **4.3** | **430** | **86** | **16** | **40** | **5** |

    | **3.5** | **350** | **70** | **0** | **40** | **0** |

    | **6.25** | **625** | **125** | **55** | **40** | **6** |

