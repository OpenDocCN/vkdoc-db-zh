  trans: '

    ### 配置新的 Oracle 主目录


    AutoConfig 管理着电子商务套件环境中 Oracle 主目录的配置。仅仅将初始化文件和网络服务的配置文件从现有的数据库主目录复制到新的主目录，还不足以开始使用它。需要采取一些额外的步骤来在新
    Oracle 主目录中实现 AutoConfig。你将使用一组由电子商务套件提供的工具，将旧主目录（在下文中称为 `OLD_OH`）的配置克隆到新主目录（称为
    `NEW_OH`）。


    #### 运行 adpreclone.pl 实用程序以捕获配置详细信息

    运行 `adpreclone.pl` 实用程序以捕获现有 Oracle 主目录的配置详细信息，并将它们保存到 `$OLD_OH/appsutil` 目录中。然后停止监听器并关闭数据库。执行此步骤的命令如下：


    ```

    [oracle@s1 11.2.0]$ . $OLD_OH/PROD_s1.env

    [oracle@s1 ∼]$ cd $OLD_OH/appsutil/scripts/$CONTEXT_NAME

    [oracle@s1 PROD_s1]$ perl adpreclone.pl dbTier

    [oracle@s1 PROD_s1]$ ./addlnctl.sh stop PROD

    [oracle@s1 PROD_s1]$ ./addbctl.sh stop immediate

    ```


    #### 复制 appsutil 目录并重命名上下文文件

    将 `appsutil` 目录从旧的 Oracle 主目录复制到新的主目录，并重命名现有的数据库上下文文件，因为相同的文件名需要用于新的上下文文件。例如：


    ```

    [oracle@s1 ∼]$ cp -rp $OLD_OH/appsutil $NEW_OH/

    [oracle@s1 ∼]$ cd $NEW_OH/appsutil

    [oracle@s1 appsutil]$ mv PROD_s1.xml PROD_s1.xml.old

    ```


    #### 使用 adclonectx.pl 创建新的上下文文件

    使用 `adclonectx.pl` 以旧的上下文文件为模板创建一个新的上下文文件。该实用程序将启动一个命令行向导，询问关于新配置的一些问题。以下是一个运行示例：


    ```

    [oracle@s1 appsutil]$ cd $NEW_OH/appsutil/clone/bin

    [oracle@s1 bin]$ perl adclonectx.pl contextfile=$OLD_OH/appsutil/PROD_s1.xml.old

    Enter the APPS password : notimportant

    Target System Hostname (virtual or normal) [s1] : s1

    Do you want the inputs to be validated (y/n) [n] ? : n

    Target Instance is RAC (y/n) [n] : n

    Target System Database SID : PROD

    Target System Base Directory : /u01/app/oracle

    Oracle OS User [oracle] : oracle

    Oracle OS Group [dba] : dba

    Target System utl_file_dir Directory List : /usr/tmp

    Number of DATA_TOP''s on the Target System [3] : 1

    Target System DATA_TOP Directory 1 : /u02/prod/data

    Target System RDBMS ORACLE_HOME Directory [/u01/app/oracle/11.2.0] : /u01/app/oracle/product/11.2.0.3/dbhome_3

    Do you want to preserve the Display [null] (y/n) : y

    Target System Port Pool [0-99] : 11

    New context path and file name [/u01/app/oracle/product/11.2.0.3/dbhome_3/appsutil/PROD_s1.xml]
    : /u01/app/oracle/product/11.2.0.3/dbhome_3/appsutil/PROD_s1.xml

    contextfile=/u01/app/oracle/product/11.2.0.3/dbhome_3/appsutil/PROD_s1.xml

    ```


    #### 在“实例化阶段”运行 AutoConfig 以准备配置文件

    上一步创建了一个新的上下文文件，但配置文件仍然需要通过运行 AutoConfig 来准备。通常，AutoConfig 也会连接到数据库，但此刻由于配置仍然缺失，你无法启动它。你需要运行所有
    AutoConfig 操作的一个子集（称为“实例化阶段”），这将准备配置文件，但不会尝试将配置应用到数据库。向 `adconfig.pl` 实用程序指定 `run=INSTE8`
    选项可以实现这一点。当配置准备就绪时，就可以加载新的环境文件并从新的 Oracle 主目录启动监听器，如下例所示：


    ```

    [oracle@s1 bin]$ perl adconfig.pl contextfile=$NEW_OH/appsutil/PROD_s1.xml run=INSTE8

    [oracle@s1 bin]$ . $NEW_OH/PROD_s1.env

    [oracle@s1 bin]$ cd $NEW_OH/appsutil/scripts/$CONTEXT_NAME

    [oracle@s1 PROD_s1]$ ./addlnctl.sh start PROD

    ```


    #### 创建并调整数据库初始化文件

    数据库的初始化文件尚不存在。你需要从旧的服务器参数文件创建它，并手动为新 Oracle 主目录进行调整。首先，按如下方式创建新的初始化参数文件：


    ```

    [oracle@s1 PROD_s1]$ sqlplus / as sysdba

    ...

    Connected to an idle instance.

    SQL> create pfile from spfile=''$OLD_OH/dbs/spfilePROD.ora'';

    File created.

    ```


    调整初始化参数文件 `$NEW_OH/dbs/initPROD.ora`，将所有对旧 Oracle 主目录所使用的临时文件系统的引用替换为新配置中的适当路径。以下是需要调整的参数：


    - `*.diagnostic_dest=''$NEW_OH/admin/PROD_s1''`

    - `*.log_archive_dest_1=''LOCATION=+RECO''`

    - `*.utl_file_dir=''/usr/tmp'',''$NEW_OH/appsutil/outbound/PROD_s1''`


    你还需要为 ODA 设置经过验证的初始化参数。这些设置在使用 ODA 的 `oakcli` 实用程序创建新数据库时默认设置。这些参数已针对 ODA 进行了专门调优，电子商务套件数据库也必须使用它们。以下是参数及其值：


    - `*._disable_interface_checking=true`

    - `*._gc_undo_affinity=false`

    - `*._gc_policy_time=0`

    - `*._enable_numa_support=false`

    - `*._file_size_increase_increment=2143289344`

    - `*.compatible=''11.2.0.3.0''`

    - `*.db_recovery_file_dest=''+RECO''`

    - `*.db_create_file_dest=''+DATA''`

    - `*.db_create_online_log_dest_1=''+REDO''`

    - `*.db_block_checksum=full`

    - `*.db_block_checking=full`

    - `*.db_lost_write_protect=typical`

    - `*.filesystemio_options=setall`

    - `*.use_large_pages=only`


    #### 启动数据库并运行 AutoConfig 以完成配置

    完成在新 Oracle 主目录中实现 AutoConfig 管理配置的最后一步是启动数据库并运行 AutoConfig。同时，由于初始化参数文件已经准备好，可以将其转换为服务器参数文件，如下例所示：


    ```

    [oracle@s1 PROD_s1]$ sqlplus / as sysdba

    ...

    Connected to an idle instance.

    SQL> create spfile from pfile;

    File created.

    SQL> startup

    ...

    Database opened.

    SQL> exit

    [oracle@s1 PROD_s1]$ ./adautocfg.sh

    Enter the APPS user password:

    ...

    AutoConfig completed successfully.

    ```


    #### 完成补丁的安装后任务

    前面的八个步骤完成了电子商务套件数据库新 Oracle 主目录的配置；然而，你需要记住，新 Oracle 主目录在其基础上安装了一组不同的补丁，至少因为它包含了一个补丁集更新。你必须为新
    Oracle 主目录安装的补丁完成所有安装后任务。大多数补丁在新旧 Oracle 主目录中是相同的，因此最好比较已安装补丁的列表，并为那些在旧 Oracle
    主目录中没有的补丁执行安装后任务。代码清单 11-18 展示了如何提取格式良好、已排序且易于比较的补丁列表，并识别每个 Oracle 主目录中的差异。


    **代码清单 11-18. 提取已安装补丁列表**


    ```

    [oracle@s1 ∼]$ cd $ORACLE_HOME/OPatch/

    [oracle@s1 OPatch]$ ./opatch lsinventory | grep "^Patch  " | awk -F ":" {''print
    $1''} | sort

    Patch  12942119

    Patch  12949905

    Patch  12949919

    Patch  12951696

    ...

    ```


    一旦你比较了两个 Oracle 主目录中安装的补丁并执行了剩余的安装后任务，使用 ODA 原生创建的 Oracle 主目录的电子商务套件配置就完成了。

    '
- fmt: '# Migrate to ASM and RAC


    ## Migration to ASM and RAC

    Migration to ASM and RAC is quite a complex change that can be implemented in
    a number of ways, including a manual reconfiguration of the database. However,
    that would require much time and it is relatively easy to miss something or make
    an error in the process due to the large number of items to address. Instead,
    it is good to automate the migration.


    ## Using RCONFIG for Migration

    My Oracle Support note “Using Oracle 11g Release 2 Real Application Clusters and
    Automatic Storage Management with Oracle E-Business Suite Release 12.2 (Doc ID
    1453213.1)” lists the `RCONFIG` utility as one of the tools that can be used to
    automate the RAC conversion. An additional benefit of `RCONFIG` is the fact it
    can move the database to ASM as part of the operation. This is why the tool is
    especially useful in our situation.


    One deficiency of `RCONFIG` is its inability to work with user-defined Oracle
    listeners. Therefore, before you run the utility, make sure the following standard
    configuration is present:


    *   `Local_listener` parameter is not set in your database.

    *   `Remote_listener` parameter is set to `''<scanname>:1521''` (i.e. `''scan.odalab.com:1521''`).

    *   The scan listeners are started.

    *   The default listener (one named “LISTENER”) is started on each ODA Base node.

    *   And your DB is properly registered with the default listener on the same server
    that the DB is running on and with the scan listeners on both nodes.


    ## Conversion and ASM Migration Steps

    Execute the steps explained in the document “Using Oracle 11g Release 2 Real Application
    Clusters and Automatic Storage Management with Oracle E-Business Suite Release
    12.2 (Doc ID 1453213.1)” to convert the database to RAC and migrate to ASM. Listing
    11-19 shows the XML file that I prepared as input into those steps.


    Listing 11-19. Example Contents of an `rconfig` XML Input File

    ```

    [oracle@s1 ∼]$ cat PRODtoRAC.xml


    <?xml version="1.0" encoding="UTF-8"?>

    <n:RConfig ExternalRef="http://www.oracle.com/rconfig"

    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

    xsi:schemaLocation="http://www.oracle.com/rconfig rconfig.xsd">

    <n:ConvertToRAC>

    <n:Convert verify="YES">

    <n:SourceDBHome>/u01/app/oracle/product/11.2.0.3/dbhome_3</n:SourceDBHome>

    <n:TargetDBHome>/u01/app/oracle/product/11.2.0.3/dbhome_3</n:TargetDBHome>

    <n:SourceDBInfo SID="PROD">

    <n:Credentials>

    <n:User>sys</n:User>

    <n:Password>password</n:Password>

    <n:Role>sysdba</n:Role>

    </n:Credentials>

    </n:SourceDBInfo>

    <n:NodeList>

    <n:Node name="s1"/>

    <n:Node name="s2"/>

    </n:NodeList>

    <n:InstancePrefix>PROD</n:InstancePrefix>

    <n:SharedStorage type="ASM">

    <n:TargetDatabaseArea>+DATA</n:TargetDatabaseArea>

    <n:TargetFlashRecoveryArea>+RECO</n:TargetFlashRecoveryArea>

    </n:SharedStorage>

    </n:Convert>

    </n:ConvertToRAC>

    </n:RConfig>

    ```


    The process will take a while to complete, because the data files need to be copied
    to ASM. Once completed, the database will be started and the required CRS resources
    will be registered.


    ## Post-Migration RAC Configuration for E-Business Suite

    The e-Business Suite configuration for RAC is still missing at this time, so it
    has to be prepared. The steps are outlined in the same document (1453213.1), but
    I find the document hard to follow because it tries to explain multiple options
    on how e-Business Suite can be configured on RAC at the same time. You need a
    configuration that uses `srvctl` to manage the database and the custom user-created
    listener, and the e-Business Suite needs to be aware of the SCAN listener. Following
    are the verified steps for this particular configuration.


    ### Step 1: Create New appsutil.zip on Applications Server

    Create a new `appsutil.zip` package on the applications server `oevm1`:

    ```

    [oracle@oevm1 ∼]$ . /cloudfs/PROD/fs1/EBSapps/appl/APPSPROD_oevm1.env

    [oracle@oevm1 ∼]$ . $RUN_BASE/EBSapps/appl/APPS$CONTEXT_NAME.env

    [oracle@oevm1 scripts]$ $AD_TOP/bin/admkappsutil.pl

    Starting the generation of appsutil.zip

    Log file located at /cloudfs/prod/fs1/inst/apps/PROD_oevm1/admin/log/MakeAppsUtil_10221301.log

    output located at /cloudfs/prod/fs1/inst/apps/PROD_oevm1/admin/out/appsutil.zip

    MakeAppsUtil completed successfully.

    ```


    ### Step 2: Prepare Environment on Database Nodes

    Set the environment variables and clean up the existing configuration (if such
    exists) on both database nodes. (The Oracle SID will be different on each node).
    For example:

    ```

    [oracle@s1 ∼]$ export ORACLE_HOME=$NEW_OH

    [oracle@s1 ∼]$ export LD_LIBRARY_PATH=$ORACLE_HOME/lib:$ORACLE_HOME/ctx/lib

    [oracle@s1 ∼]$ export ORACLE_SID=PROD2

    [oracle@s1 ∼]$ export PATH=$PATH:$ORACLE_HOME/bin

    [oracle@s1 ∼]$ export CONTEXT_NAME=${ORACLE_SID}_`hostname -s`

    [oracle@s1 ∼]$ export TNS_ADMIN=$ORACLE_HOME/network/admin/${CONTEXT_NAME}

    [oracle@s1 ∼]$ mv appsutil appsutil.old

    [oracle@s1 ∼]$ mv $TNS_ADMIN ${TNS_ADMIN}.old

    [oracle@s1 ∼]$ rm $ORACLE_HOME/network/admin/*.ora

    ```


    ### Step 3: Create Net Services Configuration Files

    Create the new Net services’ configuration files on both database nodes. The configuration
    files will only include pointers to the AutoConfig-managed configuration files
    that do not exist at the moment, but will be created later. For example:

    ```

    [oracle@s1 ∼]$ echo "IFILE=${ORACLE_HOME}/network/admin/${CONTEXT_NAME}/tnsnames.ora"
    > $ORACLE_HOME/network/admin/tnsnames.ora

    [oracle@s1 ∼]$ echo "IFILE=${ORACLE_HOME}/network/admin/${CONTEXT_NAME}/listener.ora"
    > $ORACLE_HOME/network/admin/listener.ora

    [oracle@s1 ∼]$ echo "IFILE=${ORACLE_HOME}/network/admin/${CONTEXT_NAME}/sqlnet.ora"
    > $ORACLE_HOME/network/admin/sqlnet.ora

    ```


    ### Step 4: Extract appsutil.zip and Copy JRE

    Extract the new `appsutil.zip` on both database nodes (the file is already accessible
    because the application tier is located on the `/cloudfs`). You also need to copy
    the JRE from the old database Oracle Home into the extracted `appsutil` directory,
    as shown next:

    ```

    [oracle@s1 ∼]$ unzip -q -d $ORACLE_HOME/ /cloudfs/prod/fs1/inst/apps/PROD_oevm1/admin/out/appsutil.zip

    [oracle@s1 ∼]$ rsync -az s1:/u02/prod/11.2.0/appsutil/jre $ORACLE_HOME/appsutil/

    ```


    ### Step 5: Create New Database Listener

    Create the new database listener. Use “LISTENER_`<SID>`” as the listener name
    and set the port according to the primary port pool you chose for the e-Business
    Suite (in this example, the port pool is 11, so the listener port is 1532 (1521+11)).
    This needs to be run on one of the DB nodes only. For example:

    ```

    [oracle@s1 ∼]$ srvctl add listener -l LISTENER_PROD -o $ORACLE_HOME -p  1532

    [oracle@s1 ∼]$ srvctl setenv listener -l LISTENER_PROD -T TNS_ADMIN=$ORACLE_HOME/network/admin

    [oracle@s1 ∼]$ srvctl start listener -l LISTENER_PROD

    ```


    ### Step 6: Adjust local_listener Parameter

    Adjust the `local_listener` parameter so that both database instances register
    to the local listeners:

    ```

    [oracle@s1 ∼]$ sqlplus / as sysdba

    SQL> alter system set local_listener=''s1:1532'' sid=''PROD1'';

    System altered.

    SQL> alter system set local_listener=''s2:1532'' sid=''PROD2'';

    System altered.

    ```


    ### Step 7: Clean Up Database Configuration

    Clean up the current configuration in the database. Execute the following commands,
    which need to be run from only one of the DB nodes.

    ```

    [oracle@s1 ∼]$ sqlplus apps

    SQL> exec fnd_conc_clone.setup_clean;

    PL/SQL procedure successfully completed.

    ```


    ### Step 8: Generate New Database Context File

    Generate the new database context file on both database nodes by running the `adbldxml.pl`
    utility from within the new `appsutil` directory, as in the following example.
    Adjust the parameters as needed depending on which database node the utility is
    executed.

    ```

    [oracle@s1 ∼]$ cd $ORACLE_HOME/appsutil/bin

    [oracle@s1 bin]$ adbldxml.pl appsuser=apps appspass=***

    ...

    Enter Hostname of Database server: s1

    Enter Port of Database server: 1532

    Enter SID of Database server: PROD1

    Enter Database Service Name: PROD

    Do you want to enable SCAN addresses[N]: Y

    Specify value for s_scan_name: scan.odalab.com

    Specify value for s_scan_port: 1521

    Enter the value for Display Variable: s1:0.0

    The context file has been created at:

    /u01/app/oracle/product/11.2.0.3/dbhome_3/appsutil/PROD1_s1.xml

    ```'
