    完整的镜像过程可能需要一到两个小时，并且可以在两个服务器节点上并行运行以加快访问设备的速度。请务必牢记，重新镜像一个极具破坏性的过程，它会擦除设备上的所有信息。在镜像前，务必备份您在
    ODA 上存储的任何信息。


    ## 摘要


    ILOM 是嵌入到 ODA 中的服务处理器。它是硬件的大脑。从管理和监控的角度来看，ILOM 提供了许多功能。远程 KVMS 或 shell 访问允许远程访问服务器节点以执行“亲临现场”般的功能。


    可以通过运行 Java 的现代浏览器使用图形界面访问 ILOM，也可以通过集成的 shell 访问。这两种方法都可用于执行设置和管理，以及监控任务。ILOM
    可以与最常见的身份验证机制（如 LDAP 和 Active Directory）集成。ILOM 还提供全面的日志记录机制，并允许通过远程 syslog 服务器或
    SNMP 陷阱复制日志数据。


    ILOM 提供通过串行访问设置数据库设备的功能，以及提供服务器电源控制功能。当需要时，ILOM 是控制台，允许通过 Oracle 支持网站提供的 CD-ROM
    镜像对设备服务器节点进行重新镜像。


    脚注 1


    Oracle 设置海报可在 [`http://docs.oracle.com/cd/E22693_01/`](http://docs.oracle.com/cd/E22693_01/)
    获取。


    # 3. 安装


    摘要


    您已经了解了在 Oracle 数据库设备上执行裸机恢复的基本任务。现在您需要为安装真正应用集群 (RAC) 数据库准备 Oracle 数据库设备。借助 Oracle
    数据库设备内置的自动化功能，这是一项简单的任务，可以在几小时内完成。在开始之前，您需要最终确定一些先决条件。


    ## 网络和电源连接


    ODA 已为高可用性网络访问（主网络和辅助网络）预配置。这些网络绑定在安装镜像中已预配置，使安装快速而简单。Oracle 数据库设备有两种版本：原始型号和
    X3-2。它们在网络方面略有不同。原始 Oracle 数据库设备有 12 个 1000BASE-T 以太网端口，并可通过四个 SFP 光纤连接提供 10G
    以太网。X3-2 型号则配备 8 个 10GBaseT 端口，支持高达 10Gbit 的连接速度。

