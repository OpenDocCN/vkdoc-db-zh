  trans: '

    ### 配置第二个应用层节点


    要开始使用第二个应用层虚拟机，您需要为电子商务套件前端服务启用虚拟 IP 地址的使用。然后，您需要将新节点添加到应用层配置中。


    在配置中使用虚拟 IP 地址可以模拟物理负载均衡器，因此从电子商务套件配置的角度来看，您必须实现一个负载均衡器。这由 My Oracle Support 文档“在
    Oracle 电子商务套件 Release 12.2 中使用负载均衡器（文档 ID 1375686.1）”涵盖。该文档中的第 2 章.1“使用具有单个 Web
    入口点的硬件负载均衡器”，描述了您在 ODA 上构建的架构所需的配置更改。说明解释了在电子商务套件中为所有前端服务实现负载均衡器 IP 地址支持的手动配置步骤。请按照说明实现此类地址。


    还有另一种启用虚拟 IP 的方法——使用电子商务套件 Oracle 应用管理器中包含的配置向导。HTTP 负载均衡向导可以在使用系统管理员职责登录并导航后访问：`Oracle
    Applications Manager` ➤ `Dashboard` ➤ `Site Map` ➤ `AutoConfig` ➤ `Launch Wizards`。然后点击
    `Enable` 按钮。


    图 11-4 至 11-6 展示了用于启用 HTTP 负载均衡的配置向导最重要的几个屏幕。图 11-5 显示了第一个屏幕，您需要在此选择要启用负载均衡的节点。此时您只有一个节点可选。当第二个节点添加到电子商务套件配置时，负载均衡设置将被预填充。


    ![A978-1-4302-6266-4_11_Fig5_HTML.jpg](img/A978-1-4302-6266-4_11_Fig5_HTML.jpg)


    图 11-5.


    为负载均衡配置选择节点


    下一个屏幕（见图 11-6）要求您输入配置参数。输入由 `keepalived` 管理的虚拟 IP 的主机名和域名。您还需要将会话持久性标记为受支持。这是负载均衡器的一项功能，它会记住连接最初路由到的负载均衡服务器，然后同一客户端的所有后续通信都将使用相同的节点。虚拟
    IP 仅分配给其中一个虚拟机；因此，从该角度来看，它充当了会话持久型负载均衡器。`s_active_webport` 设置取决于环境的主端口池。在本例中是
    11，因此端口是 8011。


    ![A978-1-4302-6266-4_11_Fig6_HTML.jpg](img/A978-1-4302-6266-4_11_Fig6_HTML.jpg)


    图 11-6.


    提供负载均衡配置参数


    配置向导会验证提供的设置。图 11-7 显示参数已成功验证。由于验证是在后台执行的，您需要点击 `Refresh` 按钮，直到验证检查完成且状态变为 `Success`。


    ![A978-1-4302-6266-4_11_Fig7_HTML.jpg](img/A978-1-4302-6266-4_11_Fig7_HTML.jpg)


    图 11-7.


    验证配置参数


    在剩余的配置屏幕中提交更改，直到看到以下消息：“配置选项已保存到上下文文件中。现在您可以运行 `AutoConfig` 并重新启动服务，以确保这些设置生效。”


    按照指示在虚拟机上运行 `AutoConfig` 并重启服务，以开始使用虚拟 IP。


    虚拟 IP 已在电子商务套件中配置。最后剩下的一步是在第二个虚拟机上启用服务。您可以通过按照 My Oracle Support 说明“在 Oracle 电子商务套件
    Release 12.2 中共享应用层文件系统（文档 ID 1375769.1）”实现共享应用层文件系统来完成此操作。这是一个相当复杂的过程，但我的测试表明说明是准确的，并且能实现所需的配置。

