  trans: '# 1. Oracle 数据库一体机


    摘要


    `Oracle 数据库一体机（ODA）`是 Oracle 集成系统产品家族的新成员。它旨在作为一款入门级一体机，提供无痛的`Oracle 数据库`实施体验。`ODA`实施方案通过提供一条更简便的途径来部署高可用数据库解决方案——该方案结合使用`Oracle
    数据库`企业版与`Oracle 坚不可摧 Linux（OEL）`并在两个节点上集群——从而节省时间和金钱。


    `Oracle 数据库一体机（ODA）`是 Oracle 集成系统产品家族的新成员。它旨在作为一款入门级一体机，提供无痛的`Oracle 数据库`实施体验。`ODA`实施方案通过提供一条更简便的途径来部署高可用数据库解决方案——该方案结合使用`Oracle
    数据库`企业版与`Oracle 坚不可摧 Linux（OEL）`并在两个节点上集群——从而节省时间和金钱。


    ## 为何需要一体机？


    传统的硬件部署可能需要数周甚至数月才能完成，具体取决于公司采用的采购和部署模式。`Oracle 数据库`版本的升级也可能是一个挑战，因为每个硬件/软件组合都需要在各个级别进行认证，以确保升级顺利进行。


    在我们审视集成系统时，理解`Oracle 数据库`的演进过程至关重要。`Oracle`在其`Oracle 数据库`产品的演进过程中融入了多种增强功能。在其发展过程中，软件的复杂性也增加了。从`Oracle
    V4`中一个非常简单的关系数据库管理系统（`RDBMS`），到作为`V9`一部分重新引入的`Oracle 真正应用集群`，`Oracle`彻底改变了`RDBMS`和集群件领域。


    由于`Oracle 数据库`产品线的增强功能，数据库管理员（`DBA`）的角色也随之演进。职责范围扩大了，与多个目标各异的基础架构团队进行协调的需求也增加了。随着`Oracle`推出数据库版本`10`和`11`，`DBA`的工作变得更加复杂，尤其是在增加了`自动存储管理（ASM）`和`网格基础架构（GI）`之后。`DBA`现在负责卷管理，并确保基础架构的所有方面都满足`Oracle`技术栈的要求。


    复杂性自有其风险，随着组件数量的增加，问题解决时间也大大增加。如果未对基础架构的所有方面进行充分适当的评估，硬件和平台的虚拟化也可能使情况变得更糟。为确保完全合规所需的基础架构和软件成本对组织来说可能非常高昂，而无意中更新基础架构某个部件的固件可能会导致其他基础架构或软件方面出现混乱。


    当我们谈论基础架构和软件的进步时，人为因素非常重要。`DBA`们已经看到他们的职责随着`Oracle 数据库`技术栈的每个版本发布而增加。现在，他们需要理解`RDBMS`、基础架构、操作系统（`OS`）和网络等所有方面，以便为客户提供全面且无缺陷的解决方案。交付这样的解决方案需要与各个基础架构团队进行广泛协调，并且可能需要昂贵的升级或采购。


    `ODA`是一款入门级一体机，旨在帮助进行基础架构和软件部署以及升级。它作为一个完整的、打包的解决方案推出，面向中小型企业以及大型企业，用于快速部署硬件和软件。`ODA`在`Oracle
    OpenWorld 2011`上推出，第二个版本`X3-2`于`2013`年`4`月开始发货。`ODA`是首款支持按需付费许可的一体机。它允许客户根据需要从少至`2`个核心开始，并可扩展至`32`个核心（`X3-2`）。管理和构建成本显著降低，因为`ODA`预配置了互联网络和存储，以及一个经过调优的操作系统（`OS`）。`ODA`还包含对一体机进行虚拟化的选项，通过提供一个用于虚拟化应用程序和数据库的完整打包解决方案，可以为组织节省大量成本。


    企业和组织常常面临截止日期的压力，而采用包含采购作为项目预算一部分的传统部署模式，通常很难提供业务快速实现创意所需的敏捷性。典型的部署周期可能在`30`到`90`天之间，这使得需要数据库的产品更难快速推向市场。图
    1-1 基于`Oracle 真正应用集群（RAC）`的部署经验，展示了传统系统与使用`ODA`的典型部署周期对比。这可能因组织的部署成熟度模型而异。


    ![A978-1-4302-6266-4_1_Fig1_HTML.jpg](img/A978-1-4302-6266-4_1_Fig1_HTML.jpg)

    图 1-1. 传统服务器与搭载 RAC 的 ODA 对比


    传统设置与`ODA`设置之间的差异巨大。差异可能基于组织实践的流程而不同。传统上，部署硬件的过程包括以下步骤：


    硬件采购

    硬件交付

    硬件设置

    网络连接和交换机设置

    操作系统（`OS`）设置和调优

    数据库软件设置

    设置后的最佳实践实施


    这些步骤只是让系统启动和运行所需的众多步骤中的一部分，并且可能因组织使用的基础架构模型而异。组织始终有能力预先购买和配置基础架构，以及构建共享模型来支持业务。这在某些情况下可能具有成本效益，但也可能带来问题，因为持续理解新的业务需求是必须的。业务需求根据可用性模型驱动基础架构的复杂性。需求可能推动需要准备一个能够支持各种业务计划并提供按需框架的环境，以实现更快的配置。`ODA`可以作为基于私有云框架或简单配置模型的推动者。


    `ODA`独特的许可模式，以及开箱即用的虚拟化能力，可以帮助组织构建一个可扩展的模型，以一小部分的时间和成本部署应用程序和数据库。`ODA`作为一个完整的软件包提供，这意味着`Oracle`对所有组件负责。这使组织能够专注于业务而非技术，并解放`DBA`的时间，让他们专注于设计而非设置和协调。传统的`ODA`部署工作包括以下内容：


    采购硬件

    安装硬件

    设置数据库一体机

    实施组织最佳实践


    实施`ODA`所需的步骤远少于传统设置，因为`Oracle`将硬件和软件捆绑为一个单元，并允许将技术栈作为一个整体进行管理和维护，这与传统基础架构的管理方式不同。


    ## 一体机硬件


    `ODA`以“简单、可靠、实惠”作为市场宣传语。目前，它提供两种硬件配置：原始版本和`ODA X3-2`。作为`Oracle`“硬件、软件、一体化”战略的一部分，`ODA`提供了一个简单的集群，包括两个数据库服务器节点、存储，以及内建于一体机本身的集群互联和简化管理。'
- fmt: '# Oracle Database Appliance V1


    迄今为止，Oracle 已出货超过 1,000 台 Oracle Database Appliance。[^1] 原始的 ODA 是一个完整的统一机箱解决方案，包含两台
    2U Sun M4370 服务器，以及存储和网络组件。ODA V1 在数据中心机架中的总大小为 4U。图 [1-2](#A978-1-4302-6266-4_1_Chapter.html#Fig2)
    和 [1-3](#A978-1-4302-6266-4_1_Chapter.html#Fig3) 分别展示了该设备的正面和背面，突出了 ODA 设计的简洁性。


    ![A978-1-4302-6266-4_1_Fig3_HTML.jpg](A978-1-4302-6266-4_1_Fig3_HTML.jpg)

    **图 1-3.** Oracle Database Appliance V1 背面


    ![A978-1-4302-6266-4_1_Fig2_HTML.jpg](A978-1-4302-6266-4_1_Fig2_HTML.jpg)

    **图 1-2.** Oracle Database Appliance V1 正面


    ## 硬件规格


    每个 ODA 单元由两个物理服务器组成，每个物理服务器由一个服务器节点和一个集成式远程管理（ILOM）组件构成。[第 2 章](#A978-1-4302-6266-4_2_Chapter.html)
    深入探讨了 ILOM 并解释了其在 ODA 单元中的重要性。表 [1-1](#A978-1-4302-6266-4_1_Chapter.html#Tab1)
    列出了 Oracle Database Appliance 数据表中 ODA V1 的规格（My Oracle Support Note 1385831.1
    提供了相同的信息）。


    **表 1-1.** Oracle Database Appliance V1 规格


    | 组件 | 规格 |

    | --- | --- |

    | CPU | 2x 6核 Intel Xeon X5675 3.07GHz |

    | 内存 | 96GB RAM (12 x DDR3-1333 8GB DIMMs) |

    | 网络 | 2x 10GbE (SFP+) PCIe 卡<br>6x 1GbE PCIe 卡<br>2x 1GbE (Intel 82571) 板载集成冗余集群互联
    |

    | 内部存储 | 2x 500GB SATA - 用于操作系统<br>1x 4GB USB 内部 |

    | RAID 控制器 | 2x LSI SAS9211-8i SAS HBA |

    | 共享存储 | 20x 600GB - 3.5" SAS 15k RPM HDD (Seagate Cheetah) - 用于 RDBMS DATA（除磁盘顶行外的任何插槽）<br>4x
    73GB - 3.5" SAS2 SSDs - 用于 RDBMS REDO（顶行四个磁盘的插槽）<br>SSD 来自 STEC (ZeusIOPS - 多层单元
    (MLC) 版本，SAS 接口) |

    | 操作系统 | Oracle Enterprise Linux 5.5 (在 ODA 软件版本 2.1 上)，5.8 (在 ODA 软件版本 2.2 上)
    x86_64 |


    ODA 配备了功能非常强大的 Intel Xeon 处理器，以及足够的内存和存储空间，可以容纳各种在线事务处理（OLTP）和一些较小的数据仓库工作负载。网络互联内置于设备中，这消除了为节点间通信互联购买交换机的需求。在存储方面，根据
    ODA 软件版本和冗余层级，你可以在 4 到 6 太字节（TB）的空间之间选择。


    ## 存储配置


    每个 ODA 每个服务器节点附带两个 500GB 驱动器，它们被镜像并用于操作系统，以及承载操作系统、集群件和 Oracle Database 主目录的软件（250GB
    未分配）。每个设备有二十个 600GB SAS 驱动器和四个仅用于在线重做日志的 73GB SSD。ODA 上的共享磁盘通过两个 LSI 控制器连接，这些控制器连接到板载
    SAS 扩展器。每个 SAS 扩展器又连接到 ODA 中的 12 个硬盘。Oracle 使用 Linux 多路径来避免磁盘路径故障。添加固态硬盘（SSD）用于重做日志是为了克服旋转磁盘的延迟，因为旋转磁盘的控制器没有缓存。ODA
    上的磁盘大小取决于许多因素，包括在设备上运行的 ODA 软件版本。表 [1-2](#A978-1-4302-6266-4_1_Chapter.html#Tab2)
    显示了 ODA 上支持的各种磁盘配置和配置选项。


    **表 1-2.** ODA 磁盘配置


    | 配置选项 | 磁盘组 | 类型/冗余 | 备份类型 | 可用空间 (GB) | 支持的软件版本 |

    | --- | --- | --- | --- | --- | --- |

    | 1 | DATA | HIGH | 外部 | 3200 | 所有版本 |

    | 1 | RECO | HIGH | 外部 | 488 | 所有版本 |

    | 1 | REDO | HIGH | 无 | 91 | 所有版本 |

    | 2 | DATA | HIGH | 本地 | 1600 | 所有版本 |

    | 2 | RECO | HIGH | 本地 | 2088 | 所有版本 |

    | 2 | REDO | HIGH | 无 | 91 | 所有版本 |

    | 3 | DATA | NORMAL | 外部 | 4800 | 2.4 及以上 |

    | 3 | RECO | NORMAL | 外部 | 733 | 2.4 及以上 |

    | 3 | REDO | HIGH | 外部 | 91 | 2.4 及以上 |

    | 4 | DATA | NORMAL | 本地 | 2400 | 2.4 及以上 |

    | 4 | RECO | NORMAL | 本地 | 3133 | 2.4 及以上 |

    | 4 | REDO | NORMAL | 无 | 91 | 2.4 及以上 |


    表 [1-2](#A978-1-4302-6266-4_1_Chapter.html#Tab2) 说明了 ODA 支持的各种磁盘配置选项。如你所见，在配置选项
    1 和 2 中，由于所有磁盘组都是三重镜像（高冗余），可用空间大约为 4TB。根据你选择的配置，你将在 DATA 或 RECO 磁盘组中拥有更多空间。


    Oracle Database Appliance 2.4 引入了允许 DATA 和 RECO 使用镜像（正常冗余）磁盘组的选项。这在表 [1-2](#A978-1-4302-6266-4_1_Chapter.html#Tab2)
    中突出显示为配置选项 3 和 4。这样做主要是为了让客户能够根据部署 ODA 的环境选择空间。通常建议在开发/测试系统上部署镜像（正常冗余）。


    ## 操作系统与软件


    ODA 运行 Oracle Enterprise Linux 操作系统，截至软件版本 2.2，仅支持不可变企业内核（UEK）。以下是 ODA 软件版本 2.6
    的快照：


    ```

    Linux oda01 2.6.32-300.32.5.el5uek #1 SMP Wed Oct 31 22:06:21 PDT 2012 x86_64
    x86_64 x86_64 GNU/Linux

    Enterprise Linux Enterprise Linux Server release 5.8 (Carthage)

    ```


    ## 连接与设置


    从外部看 ODA 机箱，需要进行许多连接。图 [1-4](#A978-1-4302-6266-4_1_Chapter.html#Fig4) 指出了各种连接，这些连接随后在表
    [1-3](#A978-1-4302-6266-4_1_Chapter.html#Tab3) 中描述。Oracle 还提供了一个简单的设置方案。设置海报如图
    [1-5](#A978-1-4302-6266-4_1_Chapter.html#Fig5) 所示。


    **表 1-3.** Oracle Database Appliance 连接器描述[^2]


    | 标注 | 标签 | 以太网 | 绑定 | 描述 |

    | --- | --- | --- | --- | --- |

    | 1 |   |   |   | 电源连接器。 |

    | 2 | PCIe 1 | `Eth 7`, `Eth 6`, `Eth 5`, `Eth 4` (从左到右) | `bond1`, `bond2` |
    `Eth 4` 和 `Eth 5` 配置为 `bond1`。`Eth 6` 和 `Eth 7` 配置为 `bond2`。这些端口用于自定义配置或用于单独的备份、灾难恢复和网络管理。
