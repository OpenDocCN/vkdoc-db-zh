    | 4 | 节点 0 的`ILOM`串行端口 |

    | 5 | `eth2`和`eth3`，`bond0`用于公共网络访问 |

    | 6 | `ILOM` 10/100 BaseT 端口 |

    | 7 | `USB`和`VGA`端口 |

    | 8 | 节点 0 |

    | 9 | 节点 1 |


