    Pete Sharman（皮特·沙曼）是 Oracle 公司服务器技术部门企业经理产品套件组的**高级产品经理**。他在 Oracle 工作了 18 年，担任过多种职位，从教育到咨询再到开发，并从
    0.76 beta 版开始就使用企业经理。Pete 是 OakTable Network 的成员，并在世界各地的会议上发表过演讲，包括 Oracle OpenWorld（澳大利亚和美国）、RMOUG
    Training Days、Hotsos Conference、Miracle Open World 以及 AUSOUG 和 NZOUG 会议。他撰写了一本关于如何通过
    Oracle Certified Professional 计划的 Oracle8i 数据库管理考试的书籍。他与妻子和三个孩子住在澳大利亚堪培拉。


    ![A978-1-4302-6266-4_BookFrontmatter_Fig7_HTML.jpg](img/A978-1-4302-6266-4_BookFrontmatter_Fig7_HTML.jpg)
    Yury Velikanov（尤里·韦利卡诺夫）拥有超过 15 年的 Oracle DBA 经验。他是 9i/10g/11g 版本的 Oracle 认证大师。因其对
    Oracle 社区的参与，他被认可为 Oracle ACE 总监。在过去的几年里，Yury 一直参与`Oracle Database Appliance`项目。他很乐于在这本书中与您分享他的经验。


    # 关于技术审校者


    ![A978-1-4302-6266-4_BookFrontmatter_Fig8_HTML.jpg](img/A978-1-4302-6266-4_BookFrontmatter_Fig8_HTML.jpg)
    Frits Hoogland（弗里茨·霍格兰）是一位专注于 Oracle 数据库性能和内核的 IT 专业人士。Frits 经常在世界各地的会议上就 Oracle
    技术主题发表演讲。2009 年，他获得了 Oracle 技术网络颁发的 Oracle ACE 奖，一年后成为 Oracle ACE 总监。2010 年，他加入了
    OakTable Network。除了发展他的 Oracle 专长外，Frits 还从事 MySQL、PostgreSQL 和现代操作系统方面的工作。Frits
    目前就职于 Enkitec LP。


    # 引言


    自 20 世纪 60 年代和 70 年代计算机诞生以来，信息技术世界已经发生了 rapid 变化。这些变化推动了我们经济的许多不同方面，包括企业进行日常运营的内容和方式。随着组织，特别是内部信息技术的变化，更快、更好的实现业务目标的方法被推动和发展。


    随着企业开始更加依赖存储在其系统中的数据，处理和报告数据的更快方法也随之发展。随着时间的推移，组织要求改进处理方式、实现更高的吞吐量并更快地进行报告。这最终导致了能够同时利用软件和硬件资源的系统的开发，从而催生了工程化系统。


    在工程化系统（如`Exadata`）发展之后，许多组织面临一个艰难的选择：要么花费巨资购买工程化系统（`Exadata`），要么自己构建。这个决定影响了大量的中小型企业管理。Oracle
    认识到了这一点，从而催生了`Oracle Database Appliance`。


    ## 什么是 Oracle Database Appliance？


    从高层次来看，`Oracle Database Appliance`是结合了网络、集群和数据库软件及模板的服务器、存储和网络硬件。`Oracle Database
    Appliance`是一个完全受支持的、集成了硬件和软件组件的系统。由于它是一个集成系统，因此在软件和硬件层都经过工程化设计，配置和维护简单，并经过预配置以处理数据库工作负载。此外，它的设计旨在帮助组织最小化成本、加快采用速度并降低数据库部署和维护的风险。


    ## 本书的由来


    本书的作者们在信息技术行业工作了多年。在此期间，我们接触并处理了跨越广泛应用和数据库的许多不同平台。然而，在这段时间里，我们没有看到比`Oracle Database
    Appliance`更能让组织受益的紧凑型工程化系统。本书的想法源于我们许多人在为各种客户实施`Oracle Database Appliances`的时候。当我们在不同环境中实施`Oracle
    Database Appliance`时，我们会遇到一两个问题，并意识到当时还没有一份关于这个一体机的单一、完整的作品。当然，有 Oracle 的文档，但在某种程度上，查找信息是一个挑战。那时我们意识到，当出现问题时，我们肯定不是唯一遇到它们的人。当我们在一次会议上相遇并开始讨论`Oracle
    Database Appliance`的问题时，撰写本书的愿望变得更加强烈。我们都认为，业界需要一本关于这个既复杂又简单的工程化系统的书。本书的所有作者都渴望分享我们通过使用`Oracle
    Database Appliance`所获得的知识。因此，本书的构想就此启动！


    ## 为何购买本书


    如果您是一位定期处理数据库的`DBA`或经理，本书将为您提供有关使用`Oracle Database Appliance`的信息。无论您的组织环境多么复杂，您都将能够利用本书中的信息，在`Oracle
    Database Appliance`的整个生命周期内，在您的组织中成功应用它。


    理解`Oracle Database Appliance`能做什么，将极大地提高您快速实施复杂解决方案的能力，同时确保数据库的快速部署。与此同时，在从自研解决方案转向开箱即用的解决方案时，您将形成如何独特使用这个一体机的想法。


