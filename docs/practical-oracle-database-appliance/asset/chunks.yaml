- fmt: '## Introduction to ILOM


    `ILOM` 是一个服务处理器（`SP`），嵌入在所有基于 Oracle Sun 服务器的产品中。`ILOM` 的目的是为服务器提供支持，使得日常支持功能无需访问数据中心。`ILOM`
    还提供对各种诊断功能的访问，并与 Oracle 的自动服务请求（`ASR`）集成，以提供向 Oracle 报告硬件故障的呼叫-home 功能。


    Oracle `ILOM` 服务处理器提供了广泛的功能，其功能方面随着 `ILOM` 的每个版本发布而改进。`ODA V1` 和 `X3-2` 配备了不同的
    `ILOM` 版本，这是由于服务处理器本身的增强所致，但其核心，`ILOM` 允许以下操作：

    *   远程 `KVMS` 功能

    *   从镜像远程启动

    *   故障显示

    *   与各种身份验证系统的集成，如 `LDAP`（轻量目录访问协议）、`SSL`（安全套接字层）、`Radius` 和 Active Directory

    *   远程 `syslog` 设置

    *   基于 `SNMP` 和 `SMTP` 的警报

    *   环境报告

    *   系统串行控制台重定向（`LAN`）

    *   远程监控主机状态

    *   访问各种部件号和序列号


    本章将在 `ODA` 的背景下重点介绍这些功能。Oracle 套件包（`OAK`），也称为 Oracle 套件管理器，是管理安装和补丁的软件，在某些情况下，还负责收集诊断信息并将
    `ILOM` 与 `ASR` 集成。然而，理解 `ILOM` 及其执行的基本功能仍然很重要。


    图 [2-1](#A978-1-4302-6266-4_2_Chapter.html#Fig1) 显示了通过浏览器登录 `ILOM` 时看到的起始屏幕。该屏幕有三个主要组件。其布局在设计上与
    `ODA V1` 的布局有些不同，但大多数常见功能保持不变。


    ![A978-1-4302-6266-4_2_Fig1_HTML.jpg](A978-1-4302-6266-4_2_Fig1_HTML.jpg)


    图 2-1.

    在 `ODA X3-2` Sun Fire `X4170 M3` 上运行的 `ILOM`


    "常规信息"部分是按服务器节点查看基本系统信息的主要位置，且以视觉上令人愉悦的方式呈现。您在那里可以找到的信息包括：

    *   系统类型

    *   型号

    *   部件号

    *   组件型号

    *   `ILOM` 和系统 `MAC` 地址

    *   主要操作系统


    "操作"部分提供了对 `ILOM` 用户需要访问的各种常用功能的便捷访问。这些功能包括更新固件、打开或关闭服务器电源，以及通过切换电源状态的各种选项来回收服务处理器。您还可以打开定位信标，以便在数据中心中定位系统（`X3-2`
    的新功能），并且可以使用远程控制台访问服务器节点。


    "状态"部分提供对服务器节点内包含的组件物理状态的实时状态。"状态"部分查看以下内容：

    *   处理器

    *   内存

    *   电源

    *   散热

    *   存储

    *   网络


    如图 [2-1](#A978-1-4302-6266-4_2_Chapter.html#Fig1) 所示的"摘要"屏幕信息丰富，可让您快速获取大量汇总信息。左侧的菜单部分允许获取每个组件的更详细信息。该菜单还包括用于设置和自定义
    `ILOM` 的选项。


    图 [2-2](#A978-1-4302-6266-4_2_Chapter.html#Fig2) 显示了来自原始数据库套件的摘要屏幕。如您所见，图 [2-1](#A978-1-4302-6266-4_2_Chapter.html#Fig1)
    中的新界面提供了一种更简单的方式来查找信息，并且菜单导航更加直观。在接下来的章节中介绍这些功能时，我们将指出如何从两个 `ILOM` 访问各个位置。


    ![A978-1-4302-6266-4_2_Fig2_HTML.jpg](A978-1-4302-6266-4_2_Fig2_HTML.jpg)


    图 2-2.

    来自原始 `ODA`（`V1 X4370 M2`）的 `ILOM`


    ## ILOM Features


    `ILOM` 能够提供大量的服务。查看 `ILOM` 及其所有功能超出了本书的范围，但我们将从管理 `ODA` 的角度研究一些重要的功能。


    ### Remote KVMS Service


    远程 `KVMS`（键盘、视频、鼠标、存储）是 `ILOM` 中非常重要的一部分，根据您对设备远程访问的熟悉程度和经验，这可能是您将使用的主要功能。远程 `KVMS`
    服务允许您从浏览器远程控制服务器节点。远程 `KVMS` 使用虚拟网络计算（`VNC`）访问服务器节点。因此，您应该确保在您的工作站上打开表 [2-1](#A978-1-4302-6266-4_2_Chapter.html#Tab1)
    中所示的防火墙端口。


    表 2-1.

    `RKVMS` 访问所需的防火墙端口


    | 端口 | 协议类型 | 服务 |

    | --- | --- | --- |

    | `443` | `TCP` | `HTTPS`（入站） |

    | `5120` | `TCP` | 远程光驱（出站） |

    | `5121` | `TCP` | 远程键盘和鼠标 |

    | `5123` | `TCP` | 远程软驱 |

    | `6577` | `TCP` | `CURI`（`API`）- `TCP` 和 `SSL` |

    | `7578` | `TCP` | 视频数据（双向） |

    | `161` | `UDP` | `SNMP V3` 访问（入站） |

    | `3072` | `UDP` | 陷阱输出（仅出站） |


    `ILOM` 的设置将在本章后面介绍，但一旦 `ILOM` 设置完毕，远程 `KVMS` 就允许访问服务器控制台。远程 `KVMS` 还允许远程安装，这是进行裸机服务器安装所必需的。远程控制功能的访问方式在
    `ODA V1` 和 `X3-2` 之间略有不同，但两者在功能上提供相同的功能。


    图 [2-3](#A978-1-4302-6266-4_2_Chapter.html#Fig3) 显示了 `ODA V1` 与 `ODA X3-2` 中远程控制功能位置的截取。`ODA
    X3-2` 上通过主屏幕更容易访问远程控制功能。相比之下，在 `ODA V1` 上需要点击几下才能进入远程控制功能。


    ![A978-1-4302-6266-4_2_Fig3_HTML.jpg](A978-1-4302-6266-4_2_Fig3_HTML.jpg)


    图 2-3.

    `ODA V1`（顶部）和 `ODA X3-2`（底部）中的远程控制台选项


    远程控制台是访问服务器控制台、配置服务器或诊断问题（如果无法远程连接到服务器本身）的简便方法。启动远程控制台后，您会看到类似于登录 `Unix` 机器时的登录提示。这允许您从控制台登录到服务器。


    远程控制台提供对控制台消息的访问，并允许用户登录系统。每个服务器节点（`SN`）都有自己的 `ILOM`，因此在 `ODA` 的上下文中有两个 `ILOM`。这一点非常重要，因为
    `ODA` 中的每个物理服务器都有自己的 `ILOM`，必须使用该 `ILOM` 来管理和维护该物理服务器。'
  raw: '## Introduction to ILOM


    An ILOM is a service processor (SP) that is embedded into all Oracle Sun Server–based
    products. The aim of an ILOM is to provide support for a server in a manner such
    that access to the datacenter is not required for day-to-day support functions.
    An ILOM also provides access to a variety of diagnostic features and has integration
    with Oracle’s Automatic Service Request (ASR) to provide call-home functionality
    to report hardware failures to Oracle for fast support.


    The Oracle ILOM service processors provide a wide array of features, and its functional
    aspects improve with every release of the ILOM. The ODA V1 and X3-2 come with
    different ILOM versions, due to the enhancements in the service processor itself,
    but at its core, the ILOM allows for the following:


    *   Remote KVMS capabilities

    *   Remote boot from image

    *   Fault display

    *   Integration with a variety of authentication systems, such as LDAP (Lightweight
    Directory Access Protocol ), SSL (Secure Sockets Layer), Radius, and Active Directory

    *   Remote syslog setup

    *   SNMP- and SMTP-based alerting

    *   Environmental reporting

    *   System serial console redirection (LAN)

    *   Monitoring host states remotely

    *   Access to various part and serial numbers


    This chapter will focus on these features in the context of the ODA. The Oracle
    Appliance Kit (OAK), also known as the Oracle Appliance Manager, is the software
    that manages installation and patching, and in some cases, the gathering of diagnostic
    information and integration of the ILOM with ASR. However, it is still important
    to understand the ILOM and the basic functions it performs.


    Figure [2-1](#A978-1-4302-6266-4_2_Chapter.html#Fig1) shows the starting screen
    that you see when you log in to an ILOM via your browser. The screen has three
    main components. The layout is a bit different from the ODA V1 layout in terms
    of design, but most common functionalities have stayed the same.


    ![A978-1-4302-6266-4_2_Fig1_HTML.jpg](A978-1-4302-6266-4_2_Fig1_HTML.jpg)


    Figure 2-1.


    The ILOM running on an ODA X3-2 Sun Fire X4170 M3


    The General Information section is the primary place to look at for basic system
    information per server node in a visually pleasing manner. Information you’ll
    find there includes:


    *   System type

    *   Model

    *   Part number

    *   Component model

    *   ILOM and system MAC address

    *   Primary operating system


    The Actions section is the place that provides easy access to various commonly
    used functions that an ILOM user will need to access. These include updating the
    firmware, powering the server on or off, and recycling the service processor by
    toggling various options of the power state. You can also turn on the locator
    beacon so that the system can be located in the datacenter (new to X3-2), and
    you can use the remote console to access the server nodes.


    The Status section provides a real-time status on the physical state of components
    that are contained within a server node. The Status section looks at the following:


    *   Processors

    *   Memory

    *   Power

    *   Cooling

    *   Storage

    *   Networking


    The Summary screen shown in Figure [2-1](#A978-1-4302-6266-4_2_Chapter.html#Fig1)
    is rich in information and allows you to get a lot of information summarized quickly.
    The menu section on the left allows getting more detailed information on each
    of the components. The menu also includes options for setup and customization
    of the ILOM


    Figure [2-2](#A978-1-4302-6266-4_2_Chapter.html#Fig2) shows the summary screen
    from the original Database Appliance. As you can see, the new interface in Figure
    [2-1](#A978-1-4302-6266-4_2_Chapter.html#Fig1) provides a much easier way to find
    information, and the menu navigation is much more intuitive. As we go through
    the features in the sections to follow, we will point how to get to various locations
    from both ILOMs.


    ![A978-1-4302-6266-4_2_Fig2_HTML.jpg](A978-1-4302-6266-4_2_Fig2_HTML.jpg)


    Figure 2-2.


    ILOM from the original ODA (V1 X4370 M2)


    ## ILOM Features


    The ILOM is capable of providing a vast array of services. Looking at the ILOM
    and all its features are beyond the scope of this book, but we will look at a
    few of the important features that are needed from the perspective of managing
    an ODA.


    ### Remote KVMS Service


    The Remote KVMS (Keyboard, Video, Mouse ,Storage is a very important part of the
    ILOM and is probably what you will use based on your familiarity and experience
    with remote access to the appliance. The Remote KVMS service allows you to remotely
    control a server node from a browser. The Remote KVMS uses Virtual Network Computing
    (VNC) to access the server nodes. Thus you should be sure to open the firewall
    ports shown in Table [2-1](#A978-1-4302-6266-4_2_Chapter.html#Tab1) on your workstation.


    Table 2-1.


    Firewall Ports Needed for RKVMS Access


    | Ports | Service | Type |

    | --- | --- | --- |

    | 443 | TCP | HTTPS (inbound) |

    | 5120 | TCP | Remote CD (outbound) |

    | 5121 | TCP | Remote keyboard and mouse |

    | 5123 | TCP | Remote Floppy |

    | 6577 | TCP | CURI (API) - TCP and SSL |

    | 7578 | TCP | Video Data (bi-directional) |

    | 161 | UDP | SNMP V3 Access (inbound) |

    | 3072 | UDP | Trap Out (outbound only) |


    The setup of an ILOM is covered later in the chapter, but once an ILOM is setup,
    the Remote KVMS allows access to the server console. Remote KVMS also allows remote
    installation, which is needed to do a bare-metal server installation. Access to
    the remote control feature is a bit different between V1 and X3-2 of the ODA,
    but both offer the same in terms of functionality.


    Figure [2-3](#A978-1-4302-6266-4_2_Chapter.html#Fig3) shows a cutout of the location
    of the remote control features in ODA V1 vs. ODA X3-2\. The remote control feature
    is much more easily accessible on the ODA X3-2 via the main screen. By contrast,
    it takes a couple of clicks to get to the remote control feature on the ODA V1.


    ![A978-1-4302-6266-4_2_Fig3_HTML.jpg](A978-1-4302-6266-4_2_Fig3_HTML.jpg)


    Figure 2-3.


    Remote Console options in ODA V1 (top) and ODA X3-2 (bottom)


    The remote console is an easy way to get access to the server console, to configure
    a server, or to diagnose issues, if remote connectivity to the server itself is
    not available. Once the remote console is launched, you see a login prompt similar
    to what you see when you log in to a Unix machine. This allows you to log in to
    the server from the console.


    The remote console provides access to the console messages and allows users to
    log in to the system. Each server node (SN) has its own ILOM, so in the context
    of an ODA, there are two ILOMs. This is very important because each physical server
    in the ODA has its own ILOM that has to be used for managing and maintaining that
    physical server.'
  trans: '## ILOM 简介


    `ILOM` 是一个服务处理器（`SP`），嵌入在所有基于 Oracle Sun 服务器的产品中。`ILOM` 的目的是为服务器提供支持，使得日常支持功能无需访问数据中心。`ILOM`
    还提供对各种诊断功能的访问，并与 Oracle 的自动服务请求（`ASR`）集成，以提供向 Oracle 报告硬件故障的呼叫-home 功能。


    Oracle `ILOM` 服务处理器提供了广泛的功能，其功能方面随着 `ILOM` 的每个版本发布而改进。`ODA V1` 和 `X3-2` 配备了不同的
    `ILOM` 版本，这是由于服务处理器本身的增强所致，但其核心，`ILOM` 允许以下操作：

    *   远程 `KVMS` 功能

    *   从镜像远程启动

    *   故障显示

    *   与各种身份验证系统的集成，如 `LDAP`（轻量目录访问协议）、`SSL`（安全套接字层）、`Radius` 和 Active Directory

    *   远程 `syslog` 设置

    *   基于 `SNMP` 和 `SMTP` 的警报

    *   环境报告

    *   系统串行控制台重定向（`LAN`）

    *   远程监控主机状态

    *   访问各种部件号和序列号


    本章将在 `ODA` 的背景下重点介绍这些功能。Oracle 套件包（`OAK`），也称为 Oracle 套件管理器，是管理安装和补丁的软件，在某些情况下，还负责收集诊断信息并将
    `ILOM` 与 `ASR` 集成。然而，理解 `ILOM` 及其执行的基本功能仍然很重要。


