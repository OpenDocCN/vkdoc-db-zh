    > ODA X3-2 磁盘校准结果存在问题，截至 ODA 2.7 软件版本，该命令显示操作不受支持且无法正常工作。'
  raw: '#### Disk Calibration


    The ODA comes with a disk calibration utility to check disk performance. Disk
    calibration is done using Orion (Oracle I/O numbers), which is an Oracle utility
    used to mimic Oracle workloads on systems. Orion can also be used to simulate
    ASM striping and to provide performance metrics like MBPS, IOPS, and I/O latency.


    I/O metrics can change depending on the workload on the system. ODA V1 has 20
    SAS disks and 4 SSD disks, and the results of a performance calibration can be
    seen. These results will vary depending on the state of the system and the workload
    being performed on the system. On a new system with no workload, you should see
    SAS disks performing about 4000 read RIOPS. ODA X3-2 currently doesn’t support
    executing disk calibration, and currently the official numbers are 7000 RIOPS.


    Listing 7-11 shows the execution of a disk calibration validation on ODA V1.


