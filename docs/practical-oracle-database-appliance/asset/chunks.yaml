    \ ODA 上的 `Oracle Linux` 软件包版本，以保持系统合规性。\n\n第三个锁定 ODA 的安全机制是 ODA 特定的、由 Oracle 提供的\
    \ `STIG` 脚本（`MOS` 注释 `1456609.1` 和 `1461102.1`）。`STIG` 脚本是美国国防部安全技术实施指南（`STIG`）流程的一部分。运行\
    \ `STIG` 脚本是一个两步过程。第一步，脚本可以在检查模式下运行以查找安全违规。第二步，“修复”过程允许纠正这些被标记的违规行为。\n\n通过查看代码，可以发现一些\
    \ `STIG` 安全检查包括以下列表。执行的安全检查列表未在 `MOS` 注释中详细说明。\n\n*   类别 1：这是国防部的说法，意为“你最好修复这个问题。”\n\
    \    *   `grub` 的密码是否启用？\n    *   `sendmail decode` 命令是否在 `/etc/aliases` 中被注释掉了？\n\
    \    *   特权账户 `halt` 是否存在？\n    *   `Ctrl-Alt-Del` 组合键是否可用于关闭系统？\n    *   `RealVNC`\
    \ rpm 是否安装在服务器上？\n    *   内核中是否找到了对 USB 设备的支持？\n*   类别 2：这是国防部的说法，意为“记录这些问题并制定计划来修复。”\n\
    \    *   单用户模式启动是否无需密码即可启用？\n    *   `pam-tally` 账户配置和登录失败管理工具是否配置为在连续三次登录失败后锁定账户？\n\
    \    *   系统是否禁止使用过去的密码？\n    *   密码强度有多安全？密码是否少于八个字符？\n    *   是否配置了延迟，使用户在登录失败后再次尝试登录前需要等待？\n\
    \    *   密码是否必须每 `60` 天至少更改一次？\n    *   密码是否可以在 `24` 小时内更改超过一次？\n    *   `cron`\
    \ 访问是否受控？\n    *   是否可以通过 `ssh` 直接以 `root` 身份登录系统？\n    *   `tcp dump` rpm 是否安装在系统上？\n\
    \    *   所有文件系统的权限是否正确？\n    *   是否存在任何不必要的账户？\n    *   `sendmail help` 命令是否启用？\n\
    *   类别 3：这是国防部的说法，意为“记录风险并决定如何处理。”\n    *   `UNIX` `man` 页面权限是否正确？\n    *   `sendmail`\
    \ 版本是否被隐藏？\n\n`STIG` 脚本中还有一些额外的检查项，即使是您经验丰富的系统管理员也可能需要查阅和弄清楚。`STIG` 脚本的目的是检查您的安全设置实践，而不是\
    \ ODA 的开箱即用安全实现。搜索“我的 Oracle 支持（`MOS`）”只找到了针对 ODA 和 `Exadatas` 的 `STIG` 实施文档。这个安全实施检查脚本是\
    \ ODA 的另一个增值主张。\n\n您选择实施哪些 `STIG` 脚本修复将取决于您公司的安全标准。并非每家公司的安全要求都与美国国防部相同。然而，安全是某些公司选择谨慎行事的领域。至少，`STIG`\
    \ 流程执行了一个 ODA 特定的国防部安全分析。\n\nOracle 还发布了 `Oracle Linux` 安全手册，`Oracle Linux` 团队也发布了额外的博客，介绍锁定系统的步骤。虽然将这些步骤直接转换到\
    \ ODA 上并不总是容易的，但它们确实是指导您系统安全锁定的宝贵指南。虽然全面覆盖服务器安全实施超出了本章的范围，但可以采取额外的步骤来锁定您的 ODA\
    \ 系统，例如通过跳板机限制对 ODA 的访问。\n"
- fmt: "## Virtualization\n\nIn March 2013, Oracle released support for the Oracle\
    \ virtualization solutions on ODAs in software release 2.5. Oracle has since been\
    \ enhancing the virtualization capabilities of ODAs with every release. Virtualization\
    \ on ODAs is a major business case for the use of ODAs. The Oracle virtual machine\
    \ implementation on ODAs is currently unique because the virtualization has been\
    \ optimized for databases. Expect virtualization to continue to be a major initiative\
    \ for Oracle, including enhancing the capabilities on ODAs.\n\nOracle has simplified\
    \ the management of ODA virtual machines by implementing VM management in `oakcli`,\
    \ including the ability to clone, start, and stop VMs. `oakcli` has been enhanced\
    \ to import templates. There is no separate VM manager needed to support virtualization\
    \ on an ODA.\n\nThe ability to “pay as you grow” on the ODA platform means that\
    \ additional capacity can be available on ODAs to run nondatabase applications\
    \ and other infrastructure-support software. Oracle has coined the phrase “Solution\
    \ in a Box” for ODA-packaged application solutions. Oracle is porting their software\
    \ to ODA-specific VM templates. At the time of this writing, a WebLogic template\
    \ has been released for ODAs, and a JD Edwards template had been announced. Additional\
    \ templates for more Oracle software products are likely to come. Oracle’s partners\
    \ have jumped on the bandwagon by beginning to develop their own application “solutions\
    \ in a box.”\n\nThe business value proposition to maximize the use of the hardware\
    \ and to rapidly deploy applications is huge. Companies of every size often deploy\
    \ large consulting firms, system integrators, and consulting staffs to deploy\
    \ complex software. Deploying applications on ODAs through VM templates offers\
    \ the promise for major cost savings through the rapid deployment of standardized\
    \ images. Oracle has stated that they will be releasing additional ODA VM templates\
    \ in the future.\n\n## ODA Technical Solutions\n\nODAs are a technical “solution\
    \ in a box.” That solution includes a number of major components that you should\
    \ be aware of. We introduce those in this section.\n\nThe Oracle Appliance Kit\
    \ (`oakcli`) is a built-in appliance management jack-of-all-trades. The `oakcli`\
    \ command reference can be found in MOS 1417879.1, the latest ODA version release\
    \ notes, and the ODA Getting Started Guide. The ODA Release Notes and Getting\
    \ Started Guide are generally more current than the MOS notes. New `oakcli` functionality\
    \ is released quarterly, so you have to proactively check the quarterly release\
    \ notes to keep up with the newest features.\n\nHere are some of the things you\
    \ can do with `oakcli`:\n\n*   ODA management\n    *   Deploy an ODA\n    *  \
    \ Patch an ODA\n    *   Create a new database in approximately 15 minutes\n  \
    \  *   Create new database software home from the current ODA release\n    * \
    \  Delete databases and database homes\n    *   Run a complete check of the system\n\
    \    *   Run a disk calibration\n    *   Configure and test ASR (Automatic Service\
    \ Request)\n    *   Display the hardware details and versions\n    *   Display\
    \ software and firmware versions\n    *   Display disks, disk groups, and other\
    \ storage details\n    *   Clean up patches that have been applied\n    *   Activate\
    \ cores when additional Oracle licenses are purchased\n*   Diagnostics\n    *\
    \   Run a complete check of the system\n    *   Locate a disk drive and light\
    \ up its LED indicator to signal which specific disk drive needs to be replaced\n\
    \    *   Run disk diagnostics\n    *   Run an `ODAchk` health check\n    *   Collect\
    \ and package diagnostic information\n*   Virtualization\n    *   Create or clone\
    \ an ODA virtual machine\n    *   Configure resources on an ODA virtual machine\n\
    \    *   Start and stop ODA_Base (the database partition on a virtualized ODA)\
    \ or another ODA virtual machine\n    *   Display the information for ODA VM templates\n\
    \    *   Deploy/import an Oracle VM template\n    *   Create CPU pools for ODA\
    \ virtual machines\n    *   Display all of the details for one or all of virtual\
    \ machines on an ODA\n    *   Apply IPs to an ODA virtual machine\n    *   Open\
    \ a VM console to manage an ODA VM\n\nOracle also provides additional ODA diagnostic\
    \ utilities as part of the ODA software product set. The main utility is `ODAchk`\
    \ (MOS 1485630.1). This is an ODA-specific version of `RACcheck`. Oracle recommends\
    \ that you deploy the latest version of `ODAchk`, so you have to check the MOS\
    \ note as new versions are released following changes to the `RACcheck` and Exadata\
    \ `Exachk` tools.\n\nODAs ship with the standard `top`, `vmstat`, and `sar` server\
    \ resource monitoring utilities. ODAs also ship with the detailed server resource\
    \ collection utility `OSWatcher` (MOS 301137.1 and 461053.1). Two additional standard\
    \ RAC utilities common to self-install platforms are also included with the ODA\
    \ RAC software:\n\n*   Cluster Health Monitor (MOS 736752.1 and 1328466.1)—Granular\
    \ resource monitoring\n*   Trace file analyzer utility (MOS 1513912.1) —Real-time\
    \ event capture\n\nODAs ship with a set of database templates designed for performance\
    \ and consolidating DBs on ODAs. The Database templates sizing is documented in\
    \ the Getting Started Guide. The templates range in size from very small, small,\
    \ medium, large, extra-large, and extra-extra large. Besides configuring memory,\
    \ redo log sizes, and the starting DB size, the templates determine the number\
    \ of databases that can be deployed on an ODA.\n\nThe following are some other\
    \ software utilities and tools to be aware of:\n\n*   ODAs come with two utilities\
    \ that allow GUI-based tool sessions to be started. They are VNC Server and StartX\
    \ from the ILOM remote console.\n*   Server software includes the previously discussed\
    \ ILOM and ASR facilities. These server management utilities are an extra Oracle\
    \ hardware value-added proposition vs. generic commodity hardware.\n*   ODAs pre-deploy\
    \ a utility called `Logwatch`, which monitors file system space and authentication\
    \ failures and logins through `ssh`. It is automatically scheduled.\n*   ODAs\
    \ can run other proactive support tools (MOS 1459344.1). A good example is `oratop`\
    \ (1500864.1), which produces a one-panel display of overall database and database\
    \ server activity.\n\nODAs have a unique “worst case” recovery capability. When\
    \ all is lost, and the server OS disk configurations are out of action and the\
    \ databases can’t be started, ODAs provide the ability to rebuild the appliance\
    \ all over again using a bare metal restore, as long as the source of the problem\
    \ isn’t a major hardware failure. An ODA can be rebuilt in about two hours using\
    \ this method. Of course, you will need a backup of your database and any additional\
    \ objects that need to be restored to get the ODA in an operational state, such\
    \ as exports and the OCR for RAC services.\n\nFinally, ODAs come with a license\
    \ for Oracle’s Secure Backup product to use in backing up ODAs."
