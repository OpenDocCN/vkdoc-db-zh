    collection, validation: disk calibration, network components, `oakcli validate`,
    ODA V1, ODA X3-2, OS disk storage, shared storage, system components.


    ## R

    Reactive diagnostics: diagnostic collection, disk failures.

    Real Application Cluster (RAC) Network.


    ## S

    Security patch updates (SPU).

    Security Technical Implementation Guide (STIG).

    Solid-state drives (SSD).


    ## T

    Total cost of ownership (TCO).


    ## U

    Unbreakable Enterprise Kernel (UEK).


    ## V, W

    Virtual Image Repository.

    Virtualization: See Oracle Database Appliance (ODA).

    Virtual LANs.

    Virtual machine (VM).

    Virtual Network Computing (VNC): `vncserver` command.


    ## X, Y, Z

    X3-2 ODA model.'
