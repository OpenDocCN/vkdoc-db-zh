    `[root@s1 ∼]#`


    The `/opt/oracle/oak/pkgrepos/System/` directory contains metadata files that
    describe the content of the repository. The `system_repos_metadata.xml` file is
    an XML file that contains references to all patches staged. A `VERSION` file contains
    the current Oracle Database Appliance version number. There is a subdirectory
    for each Oracle Database Appliance patch bundle under the system directory. For
    example, there are subdirectories named `2.6.0.0.0`, `2.7.0.0.0`, and so forth.
    Each patch bundle directory contains files that describe specific patches and
    their locations within the repository.


    There is also a `conf/patch_metadata.txt` file that contains references to all
    updates. The following is an example of a few records from the file:


    `...`


    `GI_PATCHES=16742216`


    `GI_PATCH_DIR=$OAK_REPOS_HOME/pkgrepos/orapkgs/GI/11.2.0.3.7/Patches`


    `DB_PATCHES=16742216`


    `DB_PATCH_DIR=$OAK_REPOS_HOME/pkgrepos/orapkgs/DB/11.2.0.3.7/Patches`


    `...`


    You are not supposed to manually delete, copy, or adjust files in the repository.
    The OAK utility should be used to manage the files. However, it is useful to know
    the details. The details just described may be useful in the event of troubleshooting
    problems that might occur during the patch application.


    ### Verify Target Versions


    After you unpack the patch bundle under the updates repository on each node, it
    is relatively simple to get a list of the Oracle Database Appliance components
    that are going to be updated by the patch. Issue the following OAK command specifying
    the patching target version:


    `[root@s1 2.7]# /opt/oracle/oak/bin/oakcli update -patch  2.7.0.0.0 --verify`


    `INFO: 2013-08-18 16:41:40: Reading metadata . It takes a while...`


    `WARNING: 2013-08-18 16:41:50: exceptions.IndexError:list index out of range`


                    `Component Name            Installed Version         Proposed
    Patch Version`


                    `---------------           ------------------        -----------------`


                    `Controller                11.05.02.00               Up-to-date`


                    `Expander                  0342                      Up-to-date`


                    `SSD_SHARED                E12B                      Up-to-date`


                    `HDD_LOCAL                 SA03                      Up-to-date`


                    `HDD_SHARED                0B25                      Up-to-date`


                    `ILOM                      3.0.16.22.b r78329        No-update`


                    `BIOS                      12010310                  No-update`


                    `IPMI                      1.8.10.5                  Up-to-date`


                    `HMP                       2.2.6.1                   2.2.6.2`


                    `OAK                       2.6.0.0.0                 2.7.0.0.0`


                    `OEL                       5.8                       5.9`


                    `OVM                       3.1.1                     3.2.3`


                    `TFA                       2.5.1.4                   2.5.1.5`


                    `GI_HOME                   11.2.0.3.6(16056266,      11.2.0.3.7(16619892,`


                                              `16083653)                 16742216)`


                    `DB_HOME                   11.2.0.3.6(16056266,      11.2.0.3.7(16619892,`


                                              `16083653)                 16742216)`


     `[root@s1 2.7]#`


    In the preceding example, there are seven components to be updated, including
    Oracle Appliance Kit, Oracle VM Server, Oracle Grid Infrastructure, and others.
    The list of components to be updated by a patch bundle is a good starting point
    for creating a downtime estimate and an impact analysis. The number of components
    to be updated depends on the currently installed versions of software, patches,
    and firmware on the Oracle Database Appliance, and the target version you are
    planning to upgrade to.


    Each Oracle Database Appliance patch bundle may deliver a different set of updates.
    As a rule of thumb, each new patch bundle delivers the latest version of Grid
    Infrastructure and Oracle Homes. All other components delivered depend on the
    other products release dates.


    ## Patch Execution


    With the preparation work behind you, it’s time for the patch execution to begin.
    This is when the patch updates are applied. You’ll upgrade system and then grid
    infrastructure in this step. Let’s start with describing where ODA patching process
    stores log files. You can follow log files to get a good idea of which steps the
    patching utility is currently executing, and then troubleshoot any possible issues.'
