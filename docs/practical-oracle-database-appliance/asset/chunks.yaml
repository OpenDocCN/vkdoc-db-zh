    *   The other option is to use the Oracle Database Appliance’s Bare Metal Restore
    option as described the My Oracle Support note titled “Oracle Database Appliance
    Bare Metal Restore Procedure” (Doc ID 1373599.1).


    The first option takes care of all system infrastructure components. In the Bare
    Metal Restore case, you should implicitly update system infrastructure components
    such as BIOS and firmware after you unpack the bundle on the Oracle Database Appliance.
    The instructions for updating system infrastructure are provided later in this
    chapter in the “Executing Patching” section. You can also find them in the README
    file.


    > The Oracle Database Appliance comes with a bare metal system infrastructure
    version preinstalled by default. Through a reimaging process, you can convert
    to a virtual setup. If you intended to use the virtual option, you must reimage
    the Oracle Database Appliance using instructions provided in the following My
    Oracle Support note: “Step by Step Instructions on Installing Virtualized Image
    on Oracle Database Appliance” (Article ID 1520579.1).


    ### Default Patching Option


    The default patching option is a straightforward process that can be executed
    in approximately two hours. It assumes that you have a standard Oracle Database
    Appliance configuration, with minimal deviation from the recommended configuration
    and less restrictive downtime requirements. This option is to be taken as the
    base option for the more fixable options described in the next sections.


    ### Steps Separated in Time


    To minimize the length of a downtime interval, and to allow yourself a clear focus
    and a more granular control over the patching process, you may wish to separate
    the three steps of patching the System Infrastructure, Grid Infrastructure, and
    the RDBMS. Each step can be executed separately, and with several weeks between
    them if that’s what you need.


    This approach of separating the steps requires more planning and more implementation
    effort. The only step that requires complete system downtime, however, is the
    System Infrastructure patching. The other two steps (Grid Infrastructure and RDBMS)
    can be executed in rolling fashion by running services on one of the two nodes
    while the second node is being patched.


    By separating steps in time, you can make sure that a previous step is completed
    successfully before going on to the next. The time needed per step is shorter
    than the time needed for the default approach of doing all steps in one go. However,
    the tradeoff is that the process becomes more complicated.


    ### Delayed RDBMS Update


    Based on the circumstances and business requirements, you may decide to update
    some databases while leaving others on the same appliance running at a prior version.


    The standard ODA upgrade option works on a per Oracle Home basis. All databases
    that belong to a particular Oracle Home are upgraded at the same time. The Oracle
    Database Appliance also supports multiple Oracle Homes—you can have as many Oracle
    Homes as you want or have resources for. The Oracle Database Appliance currently
    supports 11.2.0.2 and 11.2.0.3 Oracle Home versions. Each Oracle Database Appliance
    bundle patch upgrades the fifth version number of the Oracle Database version.
    For example, upgrading from Oracle Database Appliance bundle patch 2.6 to bundle
    patch 2.7 upgrades from Oracle Database version 11.2.0.3.6 to 11.2.0.3.7.


    There are two options available if you would like to patch databases one by one.
    The first option is to configure each database to be run from a separate Oracle
    Home. This way, during the patching process you can specify what Oracle Home and
    associated database you would like to patch. If there are several databases running
    from the same Oracle Home, you need to separate those by making additional Oracle
    Home copies and moving those databases from the original Oracle Home to a new
    and separate Oracle Home that you have created. In the following example, we create
    additional Oracle Homes and move two databases to be started from a newly created,
    separate Oracle Home:


    `# On 2.6`


    `# Show all current Oracle Homes`


    `oakcli show dbhomes –detail`


    `# Create a new Oracle Home`


    `oakcli create dbhome -version 11.2.0.3.6`


    `oakcli show dbhomes –detail`


    `# Reconfigure a dataabse to be executed from a new Oracle Home`


    `srvctl modify database -d DOG -o /u01/app/oracle/product/11.2.0.3/dbhome_2`


    `# Restart the database`


    `srvctl stop database -d DOG`


    `srvctl start database -d DOG`


    `oakcli create dbhome -version 11.2.0.3.6`


    `srvctl modify database -d CAT -o /u01/app/oracle/product/11.2.0.3/dbhome_3`


    `srvctl stop database -d CAT`


    `srvctl start database -d CAT`


    The other option is to patch databases manually. In this case, you need just two
    Oracle Homes. You need one for the source and one for the target version of the
    database engine. Furthermore, you need to execute all the patching steps yourself,
    and you’ll be moving databases between the Oracle Homes yourself, too. The following
    steps are involved:


    Create an Oracle Home for the new version of the RDBMS.   Stop the database that
    you are updating.   Reconfigure the database to be started from the newly created
    Oracle Home.   Start the database and run upgrade steps.   Release the database
    to users.  


    This manual approach doesn’t require you to create a separate Oracle Home for
    each database. You can update all the databases using just two Oracle Homes. However,
    this approach requires more manual steps than the first approach shown earlier.
    You use traditional database upgrade steps just as you would for a regular Oracle
    system, thereby losing the automatic database upgrade functionality provided by
    the Oracle Database Appliance.


    ### Data Guard to Minimize Downtime


    If your business demands the shortest possible downtime, you look at using an
    additional Oracle Database Appliance in a Data Guard configuration. This approach
    allows you to avoid downtime associated with System and Grid Infrastructure updates.
    Here is the process:


    Establish a standby database configuration[²](#A978-1-4302-6266-4_8_Chapter.html#Fn2)
    between the primary and secondary Oracle Database Appliances.   Stop the redo
    log application process on the secondary/standby Oracle Database Appliance.  
    Update the System and Grid Infrastructure components of the standby Oracle Database
    Appliance.   Do not update the standby database Oracle Home just yet. Instead,
    reestablish the redo log application process.   Switch your applications to use
    the secondary Oracle Database Appliance, thus switching over to the standby database.
    At this point, the primary Oracle Database Appliance can be taken offline to update
    infrastructure components.   Update your database to the latest version using
    the rolling update approach. This way, there is just a short switchover time when
    applications need to be repointed from the primary to the secondary Oracle Database
    Appliance. There is no application downtime associated with the infrastructure
    update activities.  


    Use of Data Guard as just described requires a bit more effort in planning, preparation,
    and implementation. However, the Data Guard approach provides a minimal switchover
    time as opposed to the hours of downtime and limited mode operations during the
    Grid Infrastructure and database patching steps when performed in their normal
    manner.'
