  trans: '

    # 轻松实现高可用性


    ODA 通过易于安装的`RAC`和`RAC One`部署来提供高可用性。除了在单个设备上配置高可用性外，ODA 还便于部署`Data Guard`以扩展高可用性解决方案。这些部署可以跨越数据中心，以提供地理层面的保护。Oracle
    通过`OEM`、一键式 ODA `Data Guard`部署脚本，以及专注于在 ODA 上部署`Data Guard`的补充文档，来协助`Data Guard`的部署过程。除了简化的`Data
    Guard`部署外，ODA 通过更高水平的稳定性支持高可用性，因为它是一个经过整体测试的打包解决方案。


    ODA 补丁的网格和数据库部分可以以滚动方式部署。在撰写本文时，ODA 补丁的基础设施部分要求两个节点上的集群件完全关闭，但这在未来可能会改变。`RAC One`为生产环境和非生产环境实例提供高可用性能力，这些实例设计为仅在两个
    ODA 节点中的一个上运行，但可以故障转移到第二个 ODA 节点。


    ODA 通过大大降低部署`RAC`解决方案所需的专业知识水平，快速启动高可用性实施。这包括无需执行`RAC`互联设计、无需研究所有`RAC`要求和最佳实践、无需配置`ASM`、无需消除所有单点故障，以及一个精心设计的`RAC`集群的所有其他方面。


    高可用性也通过部署经过标准测试的配置以及选择为所有`ASM`磁盘范围进行双倍或三倍镜像来实现。丢失一个磁盘不会导致系统停机。ODA 操作系统还实现了 Oracle
    Linux 坚不可摧内核（`UEK`）。ODA 由一个专门的 Oracle 工程系统支持团队提供支持，该团队对该平台有深入的了解。


    大多数硬件组件都是冗余的。一个 ODA 有两个服务器节点和冗余电源。系统各组件之间的系统互联是冗余的，在当前的 X3-2 型号中通过`SAS`电缆实现。


    在 ODA 上更换磁盘很容易执行。只需拨动存储单元前面的开关，拔出驱动器，滑入新驱动器，然后将开关拨回原位。


    ODA 减少了实现高可用性所需的活动部件数量。在大多数情况下，更少的活动部件和更少的交接意味着更高的可用性。


    有几种高可用性部署模式：

    *   **双活（Active-Active）**。这种模式通过部署在 ODA 上的`RAC`实现，提供跨两个节点的负载均衡处理能力以及在两个服务器之间故障转移的能力。

    *   **主备（Active-Passive）**。这种模式通过`RAC One`、`RAC`和/或`Data Guard`实现。处理被配置为在单个节点上运行。在
    ODA 内部，由`RAC One`或`RAC`支持故障转移。跨 ODA 的故障转移，包括跨地理距离故障转移的能力，由`Data Guard`处理。


    实现高可用性需要额外的设计，例如`RAC`服务，以及如果`Data Guard`是解决方案一部分的话，还需要基于角色的服务。你的高可用性实现的有效性将与投入解决方案的设计和测试量成正比。


    # 成本与价值主张


    ODA 不符合传统的“自建还是购买”采购模式。公司当然可以选择构建自己的基于通用硬件的基础设施。然而，典型的公司没有资源来构建自己的工程系统。无论如何，请查看
    Oracle 关于“自建还是购买”ODA 的视频。你会在主要的 Oracle ODA 产品页面和 Oracle 的 YouTube 频道上找到一些视频，详细说明了部署的简便性以及你为何需要认真考虑购买一个更好的、预打包解决方案的价值主张。有些视频带有一定的幽默元素，因此非常值得观看。内容是动态的，因此我们没有包含任何网络链接，因为它们可能会更改。不过，找到它们是相当容易的。


    从硬件角度来看，购买 ODA 时你会获得大量资源。对于当前的 X3-2 型号，这包括两个服务器，每个服务器有 256G 内存，总共 32 个核心，以及大量存储。当前的存储量是
    18T 原始磁盘，可以部署为大约 9T 可用的双倍镜像，或 6T 可用的三倍镜像。通过存储扩展机架，存储可以再次加倍到 36T 原始存储。ODA 入门手册根据所选的部署选项详细说明了确切可用的存储量。


    然而，ODA 的秘诀不在于硬件。ODA 的秘诀在于软件。其成分包括在数小时内完成`RAC`部署、对所有层级（`BIOS`、`固件`、`OS`、`ILOM`、`网格`、`数据库`）的自动化修补，从而使系统保持最新、稳定和合规。ODA
    硬件——带有标准的、嵌入式的 Oracle 硬件支持设施，并辅以大量增值管理软件——提供了极佳的价值主张。优势包括以下：

    *   ODA 附带一个嵌入式验证工具包（`oakcli`——Oracle 应用套件命令行界面）。`oakcli`包含一套完整的诊断和管理实用程序，以维护
    ODA“保持简单”的管理主题。

    *   ODA 允许你在硬件上限制已部署的许可和资源，采用“按成长付费”模式，而不是预先支付所有容量和许可的费用。额外的容量通过申请密钥来启用。

    *   预打包的软件和部署模型提供了在整个数据库组合中部署标准化数据库平台的能力。ODA 是解决传统手工构建服务器和数据库模式的方案，该模式导致数据中心充满了“图腾柱”，没有两个图腾柱看起来是一样的。


    毫无疑问，ODA 标准化部署模式降低了管理和行政成本。这部分是由于构建步骤的减少，以及需要参与的人员和团队数量的减少，同时也减少了团队之间的所有交接。ODA
    部署后，系统的统一性质和平台特定的自动化降低了持续的管理成本。持续的管理节省来自于：支持一个 ODA 所需的团队数量减少、平台的稳定性、对所有设备组件的自动化修补、更少的活动部件、服务器和组件的冗余、应用套件自动化，以及包括`ASR`和`ILOM`在内的嵌入式支持设施。


    快速设置和标准化模型是`DBaaS`或云服务的绝佳构建块。在 ODA 上创建新的单实例、`RAC One`和`RAC`数据库的过程已缩短至 15 分钟。ODA
    是工程系统，可以由任何规模的公司部署。ODA 通常作为 Exadata 的低成本低生命周期环境，同时也是那些希望长期投资于 Exadata 的公司的切入点和初始成功故事。

    '
- fmt: "# Oracle ODA 平台概述\n\nOracle 正在投资于该平台。新功能每季度发布一次，且软件变更向后兼容之前的硬件代际。ODA 起初是针对中小型企业的解决方案，但随后大公司也开始采购它。这有助于推动\
    \ ODA 产品获得更大的发展动力。由于 ODA 是单一供应商产品，消除了供应商间交接的问题，所有组件作为一个整体的测试都在 Oracle 内部完成。从故障排除的角度看，客户只需要联系一个供应商来处理所有支持问题。当发起支持请求时，它会由专门设计的系统支持团队处理。\n\
    \n快速部署基础设施或预部署基础设施的能力，通过让项目快速启动以实现业务收益，从而带来整体成本节约。ODA 随附足够的资源，可作为整合平台并支持您的内部共享服务计划。ODA\
    \ 也支持标准的 Oracle 资源管理工具，例如实例锁定和数据库资源管理，以支持整合工作。\n\n最终，公司需要决定通过自行开发解决方案与购买像 ODA\
    \ 这样的预打包解决方案相比，愿意承担多少工作和开销。ODA 的一个关键好处是，它让公司能够将时间花在核心业务功能上，而非日常支持任务上。\n\n关于总体拥有成本（TCO）数字呢？Oracle\
    \ 会公布数字——就像所有供应商为其竞品所做的那样。Oracle 的 ODA TCO 研究目前可在 Oracle 的主要 ODA 产品页面上找到。Oracle\
    \ 的数字对于支持您的初始采购可能有帮助。然而，最佳的 TCO 数字是您随着对该平台的深入了解而为您的公司量身定制的数字。\n\n## Oracle 硬件\n\
    \nODA 利用标准的 Oracle（原 Sun）硬件管理工具来管理设备并增强其抵御常规故障的能力。这些管理工具包括 `ILOM` 和自动服务请求（`ASR`）工具。正如您之前在本书中所见，`ILOM`\
    \ 允许您远程管理硬件，例如将其关机和开机，并运行一整套诊断程序。`ILOM` 的功能非常全面，在撰写本文时，Oracle 已发布了八本独立的手册来涵盖所有功能。同样，`ASR`\
    \ 软件提供“电话-home”能力，以自动发出警报并将硬件故障消息上传到 Oracle 以启动服务请求流程。\n\nODA 硬件既是模块化的也是弹性的。服务器是模块化的，由两个独立的单元通过线缆连接而成。同样，存储也是模块化的。电源是冗余且可现场更换的。磁盘驱动器是可热插拔的。\n\
    \nOracle 硬件由现场服务部门支持，该部门将修复遇到的任何硬件故障。支持现场服务部门的是 Oracle 支持组织，该组织将通过协助诊断以确定问题原因来响应服务请求，然后派遣现场服务小组来解决问题。\n\
    \n## 安全与合规性\n\nODA 的第一个安全特性是在季度 ODA 版本中包含季度 `PSU` 错误修复和安全补丁。季度 ODA 补丁记录在 `MOS`\
    \ 注释 `888888.1` 中。Oracle 在发布季度 `PSU` 补丁集后大约两到四周发布季度 ODA 版本。Oracle 采用这种方法将最新的安全补丁包含在每个\
    \ ODA 版本中，并继续将补丁集的所有组件作为一个完整单元进行测试的流程。一键补丁过程的简便性是确保 ODA 定期打补丁以保持系统合规性的关键推动因素。保持系统安装最新的安全补丁是\
    \ `PCI`（信用卡行业）和其他安全合规性认证的要求。\n\nODA 的第二个安全实施特性是在开发发布过程中的安全扫描。Oracle 使用来自第三方供应商的安全扫描软件独立执行这些检查。扫描结果用于升级部署在\
    \ ODA 上的 `Oracle Linux` 软件包版本，以保持系统合规性。\n\n第三个锁定 ODA 的安全机制是 ODA 特定的、由 Oracle 提供的\
    \ `STIG` 脚本（`MOS` 注释 `1456609.1` 和 `1461102.1`）。`STIG` 脚本是美国国防部安全技术实施指南（`STIG`）流程的一部分。运行\
    \ `STIG` 脚本是一个两步过程。第一步，脚本可以在检查模式下运行以查找安全违规。第二步，“修复”过程允许纠正这些被标记的违规行为。\n\n通过查看代码，可以发现一些\
    \ `STIG` 安全检查包括以下列表。执行的安全检查列表未在 `MOS` 注释中详细说明。\n\n*   类别 1：这是国防部的说法，意为“你最好修复这个问题。”\n\
    \    *   `grub` 的密码是否启用？\n    *   `sendmail decode` 命令是否在 `/etc/aliases` 中被注释掉了？\n\
    \    *   特权账户 `halt` 是否存在？\n    *   `Ctrl-Alt-Del` 组合键是否可用于关闭系统？\n    *   `RealVNC`\
    \ rpm 是否安装在服务器上？\n    *   内核中是否找到了对 USB 设备的支持？\n*   类别 2：这是国防部的说法，意为“记录这些问题并制定计划来修复。”\n\
    \    *   单用户模式启动是否无需密码即可启用？\n    *   `pam-tally` 账户配置和登录失败管理工具是否配置为在连续三次登录失败后锁定账户？\n\
    \    *   系统是否禁止使用过去的密码？\n    *   密码强度有多安全？密码是否少于八个字符？\n    *   是否配置了延迟，使用户在登录失败后再次尝试登录前需要等待？\n\
    \    *   密码是否必须每 `60` 天至少更改一次？\n    *   密码是否可以在 `24` 小时内更改超过一次？\n    *   `cron`\
    \ 访问是否受控？\n    *   是否可以通过 `ssh` 直接以 `root` 身份登录系统？\n    *   `tcp dump` rpm 是否安装在系统上？\n\
    \    *   所有文件系统的权限是否正确？\n    *   是否存在任何不必要的账户？\n    *   `sendmail help` 命令是否启用？\n\
    *   类别 3：这是国防部的说法，意为“记录风险并决定如何处理。”\n    *   `UNIX` `man` 页面权限是否正确？\n    *   `sendmail`\
    \ 版本是否被隐藏？\n\n`STIG` 脚本中还有一些额外的检查项，即使是您经验丰富的系统管理员也可能需要查阅和弄清楚。`STIG` 脚本的目的是检查您的安全设置实践，而不是\
    \ ODA 的开箱即用安全实现。搜索“我的 Oracle 支持（`MOS`）”只找到了针对 ODA 和 `Exadatas` 的 `STIG` 实施文档。这个安全实施检查脚本是\
    \ ODA 的另一个增值主张。\n\n您选择实施哪些 `STIG` 脚本修复将取决于您公司的安全标准。并非每家公司的安全要求都与美国国防部相同。然而，安全是某些公司选择谨慎行事的领域。至少，`STIG`\
    \ 流程执行了一个 ODA 特定的国防部安全分析。\n\nOracle 还发布了 `Oracle Linux` 安全手册，`Oracle Linux` 团队也发布了额外的博客，介绍锁定系统的步骤。虽然将这些步骤直接转换到\
    \ ODA 上并不总是容易的，但它们确实是指导您系统安全锁定的宝贵指南。虽然全面覆盖服务器安全实施超出了本章的范围，但可以采取额外的步骤来锁定您的 ODA\
    \ 系统，例如通过跳板机限制对 ODA 的访问。"
  raw: "Oracle is investing in the platform. New functionality is released every quarter,\
    \ and the software changes are backward compatible to previous hardware generations.\
    \ ODAs started as a small to midsized company solution, but then big companies\
    \ started buying them. This helped to drive more momentum for the ODA product.\
    \ Since ODAs are a single vendor product, intervendor handoffs are eliminated,\
    \ and the testing of all components as a unit is self-contained within Oracle.\
    \ From a troubleshooting standpoint, customers only have one vendor that needs\
    \ to be contacted for all support issues. When a support call is initiated, it\
    \ is handled by a specialized engineered system support team.\n\nThe ability to\
    \ deploy infrastructure quickly, or pre-deploy infrastructure, has overall savings\
    \ by getting projects launched quickly to achieve business benefits. ODAs come\
    \ with sufficient resources to serve as a consolidation platform and support your\
    \ internal shared services initiatives. ODAs also support the standard Oracle\
    \ resource management facilities, such as instance caging and database resource\
    \ management to support consolidation efforts.\n\nIn the end, companies need to\
    \ decide how much work and overhead they want to take on by developing their own\
    \ solution vs. buying a prepackaged solution like the ODA. A key benefit of the\
    \ ODA is that it lets companies spend their time on core business functions instead\
    \ of routine support tasks.\n\nWhat about the total cost of ownership (TCO) numbers?\
    \ Oracle publishes numbers—just like all vendors do for their competing products.\
    \ Oracle’s ODA TCO studies can currently be found on Oracle’s main ODA product\
    \ page. Oracle’s numbers can be helpful in supporting your initial purchase. However,\
    \ the best TCO numbers are the ones that you put together for your company as\
    \ you gain experience with the platform.\n\n## Oracle Hardware\n\nODAs take advantage\
    \ of the standard Oracle (formerly Sun) hardware facilities to administer the\
    \ appliance and harden it from routine failures. The management facilities include\
    \ the ILOM and Automatic Service Request (ASR) facilities. As you’ve seen previously\
    \ in this book, ILOMs let you remotely administer the hardware, such as powering\
    \ it down and up, and running a complete set of diagnostics. The ILOM functionality\
    \ is so comprehensive that at the time of this writing, Oracle has published eight\
    \ separate manuals to cover all of the facilities. Similarly, the ASR software\
    \ provides phone-home capabilities to automatically issue alerts and upload hardware\
    \ fault messages to Oracle to initiate the service request process.\n\nThe ODA\
    \ hardware is both modular and resilient. The servers are modular, consisting\
    \ of two separate units cabled together. Similarly, the storage is modular. The\
    \ power supplies are redundant and field replaceable. The disk drives are hot\
    \ replaceable.\n\nThe Oracle hardware is supported by a field services unit that\
    \ will fix any hardware failures that are encountered. Backing up the field services\
    \ unit is the Oracle support organization that will respond to service requests\
    \ by assisting with diagnostics to determine the cause of the issue, and then\
    \ dispatch the field services group to fix the problem.\n\n## Security and Compliance\n\
    \nThe first security feature of ODAs is the inclusion of the quarterly PSU bug\
    \ fix and security patching in the quarterly ODA release. The quarterly ODA patches\
    \ are documented in MOS note 888888.1\\. Oracle will release the quarterly ODA\
    \ releases approximately two to four weeks after Oracle releases the quarterly\
    \ PSU patch set. Oracle follows this approach to include the latest security patches\
    \ in each ODA release, and continues the process of testing all components of\
    \ a patch set as a complete unit. The ease of the one-button patching process\
    \ is a key enabler of keeping ODAs patched regularly to keep the systems compliant.\
    \ Keeping systems patched with the most up-to-date security patches is a requirement\
    \ of PCI (the credit card industry) and other security compliance certifications.\n\
    \nThe second security implementation feature for ODAs is security scanning during\
    \ the development release process. Oracle uses security scanning software from\
    \ a third-party vendor to independently perform these checks. The scan results\
    \ are used to upgrade the Oracle Linux package versions deployed on an ODA to\
    \ keep the system compliant.\n\nThe third security mechanism for locking down\
    \ ODAs is the ODA-specific Oracle-supplied STIG script (MOS notes 1456609.1 and\
    \ 1461102.1). The STIG script is part of the US Department of Defense’s Security\
    \ Technical Implementation Guide (STIG) process. Running the STIG script is a\
    \ two-step process. In first step, the script can be run in check mode to search\
    \ for security violations. In the second step, the “fix” process allows these\
    \ flagged violations to be corrected.\n\nSome of the STIG security checks include\
    \ the following list, developed by looking at the code. The list of security checks\
    \ performed is not detailed in the MOS notes.\n\n*   Category 1: This is DOD speak\
    \ for “You had better fix this.”\n    *   Is the password for `grub` enabled?\n\
    \    *   Is the `sendmail decode` command commented out in `/etc/aliases`?\n \
    \   *   Is the privilege account `halt` present?\n    *   Is the Ctrl-Alt-Del\
    \ combination available to shut down the system?\n    *   Is the RealVNC rpm installed\
    \ on the server?\n    *   Is support for a USB device found in the kernel?\n*\
    \   Category 2: This is DOD speak for “Document these and develop a plan to fix\
    \ the issues.”\n    *   Is single user mode boot-enabled without a password?\n\
    \    *   Is the pam-tally account configuration and login failure management tool\
    \ configured to lock accounts after three consecutive login failures?\n    * \
    \  Does the system prohibit the use of past passwords?\n    *   How secure is\
    \ the password strength? Is the password less than eight characters?\n    *  \
    \ Is a delay configured to make users wait before trying to log in again after\
    \ a login failure?\n    *   Do passwords have to be changed no less than every\
    \ 60 days?\n    *   Can passwords changed be more than once every 24 hours?\n\
    \    *   Is `cron` access controlled?\n    *   Can you log into the system directly\
    \ as root through `ssh`?\n    *   Is the `tcp dump` rpm installed on the system?\n\
    \    *   Do all of the file systems have the correct permissions?\n    *   Are\
    \ there any unnecessary accounts present?\n    *   Is the `sendmail help` command\
    \ enabled?\n*   Category 3: This is DOD speak for “Document the risk and decide\
    \ what you want to do about it.”\n    *   Are the UNIX `man` page permissions\
    \ correct?\n    *   Is the `sendmail` version hidden?\n\nThere are some additional\
    \ checks in the STIG scripts that even your seasoned sysadmins may need to look\
    \ up and figure out. The purpose of the STIG scripts is to check your security\
    \ setup practices rather than the ODA out-of-the-box security implementations.\
    \ A search of “My Oracle Support (MOS)” only found STIG implementation documents\
    \ for ODAs and Exadatas. This security implementation check script is another\
    \ value-added proposition for ODAs.\n\nThe implementation of which STIG script\
    \ fixes that you choose to implement will depend on your company’s security standards.\
    \ Not every company has the same security requirements as the US Department of\
    \ Defense. However, security is an area where some companies choose to err on\
    \ the side of caution. At the minimum, the STIG process performs an ODA-specific\
    \ DOD security analysis.\n\nOracle also publishes Oracle Linux security manuals\
    \ and the Oracle Linux group publishes additional blogs for steps to lock down\
    \ your systems. While it isn’t always easy to translate these steps directly to\
    \ an ODA, they do serve as valuable guides for security lockdowns on your systems.\
    \ While a full coverage of server security implementation is outside the scope\
    \ of this chapter, additional steps can be taken to lock down your ODA systems,\
    \ such as limiting access to ODAs through jump servers."
