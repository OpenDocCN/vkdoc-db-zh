    the deployment.


    In addition to the external networks, an ODA assigns four additional IPs to support
    the RAC interconnect and the deployment of two internal RAC networks to support
    HAIP (Highly Available IP) redundancy and failover. The RAC interconnect IP addresses
    are internally assigned, so they do not need to be requested from your network
    team.


    The additional IP addresses required for a virtualized ODA deployment are listed
    in Table [5-4](#A978-1-4302-6266-4_5_Chapter.html#Tab4).


    Table 5-4.


    Additional Oracle Database Appliance IP Requirements for a Virtualized Install


    | IP Type | Number of IPs | Comment |

    | --- | --- | --- |

    | Dom0 | 2 | Two IP addresses that are fixed by Oracle at 192.168.16.24, and 192.168.16.25.
    |

    | Virtual machines | 1 | One additional IP address is required for each virtual
    machine that is deployed. |


    A virtualized ODA deployment only assigns two IPs to the RAC interconnect.


    If possible, the IPs should be requested and assigned as soon as possible, or
    at least as soon as the security considerations are decided. Assigning the IP
    addresses in advance is a key step to support the implementation of DNS and firewall
    rules, as well as building the deployment configuration files. When these dependencies
    have been completed, the ODA deployment process can begin as soon as the ODA is
    racked and the network cabling is complete.'
  trans: '

    ### 定义网络安全考虑因素


    数据的性质和相关的安全风险考虑因素可能要求您的`ODA`被部署在特定的 IP 地址段、VLAN 或特定防火墙之后。最好尽早与您的安全和网络团队一起规划好网络安全需求，以免延误项目进度。每家公司都有其网络安全的流程和标准，以及对于是否需要在网络层部署加密的抉择。这项工作可以在您订购`ODA`之前就开始，这样网络需求就不会成为减缓`ODA`部署速度的瓶颈。


    在当今对`DBaaS`（数据库即服务）和云部署的热潮中，根据应用和安全分级预先部署基础设施并不罕见。安全或其他网络需求预先规划得越充分，您实现`ODA`快速部署优势的可能性就越大。部署基础设施“准时制”，而非“过早”或“过晚”，能带来财务上的好处。


    ### 在 ODA 到达前可完成的工作


    识别出您可以提前完成或并行完成的工作，这样当`ODA`到达时，便可以立即进行线缆连接，并利用“一键式”部署自动化功能进行部署。一些在`ODA`到达前可以完成的任务包括本章概述的多个实施步骤，例如：


    *   规划网络。

    *   敲定安全考虑因素。

    *   申请 IP 地址。

    *   提交线缆连接请求并订购必要的电缆。

    *   提交`DNS`和防火墙请求。

    *   确定机架位置。

    *   使用`Oracle Appliance Manager Configurator`工具的离线模式构建部署配置文件。


    笔者曾亲眼见证多台`ODA`运抵码头后，在 48 小时内就作为完全部署好的`RAC`集群运行起来。运输时间不可浪费。利用这段时间做好准备，以便您的`ODA`设备到达时一切就绪。


    既然现在除了数据库，还可以在`ODA`上部署应用程序，您的网络规划可能需要扩展到应用层。Oracle 支持在`ODA`上部署应用程序，以便快速运行完整的应用程序解决方案。Oracle
    在`入门指南`中包含了详细说明在`ODA`上安装和支持虚拟化过程的信息。


    应用需求会影响您的网络规划。除了需要更多 IP 地址外，应用程序可能还需要与数据库服务器位于不同的网络上。这可能是出于安全考虑等因素。


    当`ODA`首次发布时，许多合作伙伴和顾问制作了视频或博客，详细介绍`ODA`的部署速度有多快。有一个案例中，网络电缆被拉到码头，以便在`ODA`还处于运输托盘上时就进行部署。您现在仍可以在
    YouTube 上找到一些这样的视频。实时的`ODA`构建演示曾在多个 Oracle 用户大会上重点展示过。


    尽管`ODA`可以快速部署这一点已被多次证明，但始终确保正确部署它们非常重要。规划有助于实现这一点。在`ODA`部署完成后更改网络始终是可能的。关于进行其中一些更改的选项将在后续章节中讨论。如果情况最糟，您总可以对`ODA`进行裸机重装以重新开始。但如果您遵循老木匠“量两次，切一次”的准则，就可以避免昂贵的返工。


    ### 规格说明与订购 ODA 网络电缆


    在您的网络上部署`ODA`的好消息是，一旦您首次部署了某个`ODA`型号，所有为该型号发布的其他`ODA`都是相同的。您只需为某个型号解决一次布线图。建议使用标准模板为每次`ODA`部署正式准备网络和布线规格。除非您是在一个非常小的
    IT 部门工作，否则不要假设您的网络和数据中心团队会记得他们上次部署`ODA`时做了什么。


    另外几条有用的经验法则是：了解您数据中心申请布线的前置时间，以及“与您的网络和数据中心人员搞好关系”。前置时间可能因电缆类型而异；例如，您是否需要将铜缆转换为光纤？至于“搞好关系”这一点，其重要性不言自明。


    ### 申请 IP 地址


    部署`ODA`所需的 IP 地址在`ODA 入门指南》题为“关于 Oracle 数据库一体机”的章节中有文档说明。部署`ODA`的需求对于原始 Oracle
    数据库一体机和第二代`X3-2`型号都是通用的。物理`ODA`部署（也称为`裸机（非虚拟化）安装`）的 IP 地址段要求列于表 5-3 中。


    表 5-3. 裸机（非虚拟化）安装的 Oracle 数据库一体机 IP 要求


    | IP 类型 | IP 数量 | 注释 |

    | --- | --- | --- |

    | 公网 | 2 | 两个`ODA`服务器节点需要两个 IP 地址。每个服务器需要一个物理主机名的 IP 地址。 |

    | Scan IP | 2 | 支持 scan 监听器的两个 IP 地址。`ODA`运行 2 个 scan 监听器。Scan IP 地址需要在`DNS`中配置为以循环顺序返回。
    |

    | `RAC` VIP IP | 2 | 每个服务器节点所需的典型`RAC`虚拟 IP 地址。 |

    | `ILOM` IP | 2 | 每个服务器节点一个`ILOM`或管理网络 IP 地址。 |

    | 附加网络 | 2 | 每个附加网络两个 IP 地址，或者每个服务器节点一个；例如，用于支持备份或`NFS`文件系统挂载的`PBN`（私有备份网络）。 |


    六个公网（主机、scan、VIP）IP 地址需要位于同一网络子网中，并且应该是连续的。部署`ODA`所需的最少 IP 地址数量是八个。这包括六个公网 IP
    和两个`ILOM` IP。`入门指南`将`ILOM`列为必需项。`ILOM`连接可以通过串口建立，此外也可以通过`NetMgt`接口创建永久连接。需要注意的是，配置工具在部署时并不强制要求`ILOM`
    IP。


    除了外部网络，`ODA`还会分配四个额外的 IP 来支持`RAC`互联以及部署两个内部`RAC`网络，以支持`HAIP`（高可用 IP）冗余和故障转移。`RAC`互联
    IP 地址是内部分配的，因此无需向您的网络团队申请。


    虚拟化`ODA`部署所需的额外 IP 地址列于表 5-4 中。


    表 5-4. 虚拟化安装的附加 Oracle 数据库一体机 IP 要求


    | IP 类型 | IP 数量 | 注释 |

    | --- | --- | --- |

    | `Dom0` | 2 | 两个由 Oracle 固定的 IP 地址：`192.168.16.24`和`192.168.16.25`。 |

    | 虚拟机 | 1 | 每个部署的虚拟机需要一个额外的 IP 地址。 |


    虚拟化`ODA`部署仅为`RAC`互联分配两个 IP。


    如果可能，应尽快申请并分配这些 IP 地址，或者至少在安全考虑因素确定后尽快申请。预先分配 IP 地址是支持实施`DNS`和防火墙规则以及构建部署配置文件的关键步骤。当这些先决条件完成后，一旦`ODA`上架且网络线缆连接完毕，`ODA`的部署过程就可以立即开始。

    '
- fmt: '## Build the Offline Configuration File


    ODA deployment files are built using the Oracle Appliance Manager Configurator
    utility. The Appliance Manager can serve as an offline configurator to build the
    deployment files in advance. The Oracle Appliance Manager Configurator can currently
    be downloaded from Oracle using the following link:


    [`www.oracle.com/technetwork/server-storage/engineered-systems/database-appliance/index.html`](http://www.oracle.com/technetwork/server-storage/engineered-systems/database-appliance/index.html)


    The Getting Started Guide details the process for using the Oracle Appliance Manager
    Configurator utility. The configuration utility can be run on the ODA in real-time
    mode to build the ODA interactively.


    The ODA configuration utility can be run on your laptop or on the ODA. If you
    are running the ODA configuration utility from your laptop or desktop, make sure
    that you are running the version that matches the ODA software release you intend
    to install.


    Figures 5-1 through 5-4 show a number of IP addresses. Those addresses were pulled
    from the ODA Getting Started Guide examples (or were otherwise manufactured) to
    avoid the use of real IP addresses. The following lists what the screenshots in
    the figures show:


    ![A978-1-4302-6266-4_5_Fig4_HTML.jpg](A978-1-4302-6266-4_5_Fig4_HTML.jpg)

    Figure 5-4. Run the optional network validation step


    ![A978-1-4302-6266-4_5_Fig3_HTML.jpg](A978-1-4302-6266-4_5_Fig3_HTML.jpg)

    Figure 5-3. Configure an additional network for backups or other purposes


    ![A978-1-4302-6266-4_5_Fig2_HTML.jpg](A978-1-4302-6266-4_5_Fig2_HTML.jpg)

    Figure 5-2. Configure the public and ILOM networks


    ![A978-1-4302-6266-4_5_Fig1_HTML.jpg](A978-1-4302-6266-4_5_Fig1_HTML.jpg)

    Figure 5-1. Select the hardware model and deployment type (physical or virtual)


    *   Figure 5-1. Select the hardware model and deployment type (physical or virtual).

    *   Figure 5-2. Configure the public and ILOM networks.

    *   Figure 5-3. Configure an additional network for backups or other purposes.

    *   Figure 5-4. Run the optional network validation step.


    The network validation checks performed ensure that the following are true:


    *   The IP addresses about to be deployed are not already in use. The IP addresses
    should not be pingable.

    *   The network gateways should already be available. These IP addresses need
    to be pingable.

    *   All of the IP addresses and host names need to be resolvable in DNS, both
    in forward (host name to IP) and reverse (IP address to host name) lookup mode.


    ## Rack the ODA


    The ODA is a 4u rack mount unit, including the storage unit. Thus, it follows
    that you should put the unit into a rack in your data center. The ODA ships with
    a rack mount kit for that purpose.


    Note: With a second storage unit, the rack footprint grows by another 2u to 6u.


    An ODA needs to be placed in a data center rack before it can be cabled. The process
    for racking an ODA is covered in an ODA Owner’s Guide chapter. The process is
    simple and the documentation is easy to follow. Your data center people shouldn’t
    have any problem racking the ODA.


    ## Cable the ODA


    Next, you should run the appropriate cabling. There are two types of cabling that
    need to be completed for an ODA:


    *   Internal cabling between the two server nodes, storage unit, and optional
    storage expansion unit. Use the cabling supplied by Oracle, which is shipped with
    your appliance.

    *   Cabling to the external network. Here you must use your own cables.


    Cabling together the server nodes, storage unit, and optional storage expansion
    unit is covered in the ODA setup poster shown in Figure 5-5. The poster represents
    the simplest explanation that is published, and is the best place to start. The
    first thing you notice is that the cables are color-coded. The network slots they
    plug into are also color-coded.


    Note: The setup posters are shipped with each ODA and are also available in the
    Oracle manuals at [`http://docs.oracle.com`](http://docs.oracle.com/).


    The process outlined in the setup poster seems simple enough. And it is, almost.
    Some of the colors are very close to each other, so you have to pay attention
    to the shades. I’ve seen a few issues where data center people have made some
    mistakes with the connections, and sometimes it is the coloring that has thrown
    them off. This is an area where you can have someone on the team specialize in
    making these connections, rather than spreading this work around.


    A more expanded set of documentation covering the connections between the server
    nodes and storage units is included in both the ODA Getting Started Guide and
    the ODA Owner’s Guide. The manuals include additional charts that provide more
    details and can be easier to read than the setup poster.


    ![A978-1-4302-6266-4_5_Fig5_HTML.jpg](A978-1-4302-6266-4_5_Fig5_HTML.jpg)

    Figure 5-5. The Oracle Database Appliance X3-2 setup poster shipped with each
    ODA


    To help validate the internal connections, Oracle recommends that you run `oakcli`
    to validate the cabling before starting the configuration of the public networks.
    This step is documented in the Getting Started Guide in both the “Deployment”
    and “Troubleshooting” chapters. The following is the command to validate the cabling:


    ```

    # /opt/oracle/oak/bin/oakcli validate -c storagetopology

    ```


    In addition to the cabling needed to connect the ODA components together, the
    external cabling needs to be completed. The external cabling includes the connections
    between the ODA and the network in your data center, as outlined in Table 5-2.
    This includes the cabling for your public network, private network, and ILOM connections.
    If the connections are bonded, each server node will have two public cable connections,
    two private network connections, and one ILOM connection—for a total of ten network
    cables for the two ODA server nodes. Of course, the connections can be reconfigured
    to not be bonded to deploy additional networks, if necessary. The procedures for
    modifying the network interfaces are covered in several Oracle support MOS notes,
    including 1422563.1, 1436335.1, and 1442113.1, as well as the Oracle Linux Administration
    manuals.'
