- fmt: '## Summary


    This chapter provided a quick overview of the Oracle Enterprise Manager architecture
    and how to push agents to an ODA for monitoring. Monitoring an ODA from Enterprise
    Manager behaves and is done the same way as any other database version. By monitoring
    the ODA with Enterprise Manager, the complexity of the ODA can be simplified and
    easier to resolve issues as they occur. Enterprise Manager should be the first
    choice for monitoring this entry-level engineered system.'
