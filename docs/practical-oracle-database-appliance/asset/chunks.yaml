  trans: '## 应用 ILOM IP 地址并配置 ODA 公共网络


    为 ODA 的网络接口应用 IP 地址有多种选项。这些选项在 Oracle 部署文档中有详细说明，可以从设置海报、入门指南、用于裸机部署的 MOS note
    1373617.1 或用于虚拟化部署的 MOS note 1520579.1 开始查阅。


    文档中可能可以更清晰一些的一个地方是关于为 ODA 应用 IP 地址的过程。所有文档都指向以 `root` 身份使用默认密码登录每个 ODA 节点，然后在每个服务器节点上运行
    `firstnet` 脚本来为每个主机配置公共网络。手册中也提到了一些先设置 ILOM 的内容，但信息不是很明确。因此，我们将尝试澄清这一点。


    首先，在 ODA 上设置 ILOM 并开始添加 IP 地址的过程，与在 Oracle Solaris 服务器或任何其他 Oracle Linux 硬件上操作相同。如果您有经验丰富的系统管理员协助您部署
    ODA，他或她已经知道该怎么做。首先应用 ILOM IP 地址来启动 ODA 的部署是一种非常高效的方式。


    如果您是独自部署 ODA，不用担心——通过为每个服务器上的 ILOM 添加 IP 地址来开始并不难。但是，首先您必须决定如何连接到 ILOM 设备。至少有两种选项：


    *   使用笔记本电脑和串口连接线连接到 ODA 串行端口。

    *   使用串行控制台设备（如数据中心 KVM 推车或数据中心 KVM（键盘、视频和鼠标）设备）连接到 ODA。


    通过笔记本电脑使用串行线连接到 ODA 服务器串行端口以访问 ODA ILOM 的方法，在 MOS note 1395445.1 中有 Oracle 的文档说明。同样，如果您有习惯于部署
    Oracle 硬件的人员，他们已经多次这样做并知道如何操作。无论如何，该过程是直接了当的。只需按照 MOS 笔记中概述的步骤操作即可。


    该过程的关键步骤如下：


    1.  连接到每个节点的串行端口，从节点 0（底部单元）开始。

    2.  使用 `root` 帐户登录；使用 ILOM 默认密码 “changeme”。

    3.  应用 ILOM IP 地址。


    使用以下命令语法将 ILOM IP 应用到每个服务器：


    ```

    set /SP/network pendingipdiscovery=static

    set /SP/network pendingipaddress=<IP Address>

    set /SP/network pendingipgateway=<gateway-IPaddr>

    set /SP/network pendingipnetmask=<netmask>

    set /SP/network commitpending=true

    ```


    以下是一个使用非真实 IP 地址的命令示例：


    ```

    set /SP/network pendingipdiscovery=static

    set /SP/network pendingipaddress=10.0.0.3

    set /SP/network pendingipgateway=10.0.0.1

    set /SP/network pendingipnetmask=255.255.255.0

    set /SP/network commitpending=true

    ```


    这些命令也可以链接在一起，如下所示：


    ```

    set /SP/network pendingipdiscovery=static pendingipaddress=10.0.0.3 pendingipgateway=10.0.0.1
    pendingipnetmask=255.255.255.0 commitpending=true

    ```


    您可以通过运行以下命令来显示已配置的 ILOM IP 地址，以验证 IP 地址：


    ```

    -> show /SP/network

    ```


    大多数数据中心都会有一个可滚动的 KVM 推车，可用于启动部署过程。一些数据中心还会有一个带有 Web 界面的 KVM 设备，可以为 ODA 启动控制台会话。KVM
    设备有多个带有串行线的端口，可以连接到数据中心机架，然后根据需要连接到 ODA。使用 KVM 设备可以避免亲临数据中心现场部署 ODA。


    一旦 ILOM IP 地址应用完毕，就可以将公共网络 IP 地址应用到 ODA。Oracle 建议首先验证布线连接：


    ```

    # /opt/oracle/oak/bin/oakcli validate -c storagetopology

    ```


    如果报告了任何问题，您需要检查系统上的布线，然后重新运行检查。


    一旦 ILOM IP 地址就位并且布线连接已验证，您就可以从 ILOM 连接到每个服务器节点来运行 `firstnet` 脚本，为每个主机配置公共网络。以下公共网络配置脚本使用默认
    `root` 密码 “welcome1” 的 `root` 帐户在每个节点上运行，从节点 0（底部单元）开始：


    ```

    # /opt/oracle/oak/bin/oakcli configure firstnet

    ```


    ## 配置剩余网络


    一旦您应用了 ILOM 和主机公共网络 IP 地址，就可以继续部署过程，该过程将把剩余的 IP 地址应用到您的系统。运行 ODA 部署过程来配置剩余的网络。


    如果您使用了 Oracle Appliance Manager Configurator 离线构建部署配置文件（其中包含已分配的 IP 地址），则需要通过运行
    `oakcli copy` 命令来准备配置文件。如果您不使用配置文件，可以交互式运行 Appliance Manager Configurator。


    通过运行带有完整路径和文件名的 `oakcli` 来准备先前创建的 ODA 配置文件，该文件已复制到 ODA。此步骤的命令语法记录在 ODA 入门指南附录的
    `oakcli` 命令参考中。


    ```

    # ./oakcli copy -conf /path/file_name.param

    ```


    使用先前准备好的配置文件部署 ODA：


    ```

    # ./oakcli deploy -conf /path/file_name.param

    ```


    或者，您可以交互式部署 ODA（无需先前准备的配置文件）：


    ```

    # ./oakcli deploy

    ```


    如果您计划使用交互式方法，请务必通过 ODA `startx` 命令或通过 ODA 附带的 VNC Server 使用 GUI 界面运行该命令。


    请务必阅读详细说明部署 ODA 所需全部任务的完整文档集。由于本章仅涉及 ODA 网络，因此我已将部署步骤限制在与 ODA 网络部署相关的步骤。'
- fmt: '## Post Deployment Options for Making Network Changes


    There are a number of options for making network changes after the ODA has been
    deployed. One option is to start all over again by “bare metaling” your machine
    and starting over with your deployment. The procedures for doing this are outlined
    in MOS note `1373599.1`. Depending on the status of your deployment, this may
    or may not be a practical option.


    If you have an experienced Oracle hardware and OS sysadmin working with you, he
    or she will already be ready familiar with setting up the hardware and making
    network changes.


    Oracle has published a number of MOS notes for making the following types of network
    changes:


    *   Implementing network bonding after the deployment has already been completed
    (MOS `1422563.1`)

    *   Changing the ILOM Network IPs (MOS `1442113.1`)

    *   Changing the DNS servers (MOS `1600317.1`)


    These notes are worth reading even if you don’t need to change the IP addresses
    on any of your ODAs, because they highlight one of the automation features of
    an ODA: the `GridInst.pl` script.


    The `GridInst.pl` script is documented in MOS note `1409835.1` and can be found
    in the following directory:


    `/opt/oracle/oak/onecmd/GridInst.pl`


    Here are some of the additional things that you can learn from reviewing these
    notes:


    *   The network configuration files are stored in `/etc/sysconfig/networking`
    and `/etc/sysconfig/network-scripts`.

    *   The DNS server entries are stored in the `/etc/resolve.conf` file.

    *   The `ifconfig` command can be used to display your ODA network settings.

    *   Your ODA deployment settings are stored in `/opt/oracle/oak/onecmd/onecommand.params`.
    After updating your ODA, you may need to generate new files or changes to files
    using the Oracle Appliance Manager configuration utility. The appliance manager
    version has to match the ODA version of the machine. This file is only readable
    by the root account.

    *   You can use the `GridInst.pl` script, which is run by the deployment process,
    to modify the existing ODA configurations, including changing the networks.

    *   Running the `GridInst.pl` script with the `-l` option—as in `GridInst.pl -l`—displays
    a current list of the individual deployment steps run by the script. The `-l`
    option is used to make sure you rerun the correct step when making changes to
    an ODA configuration.

    *   The `ipmitool` command can change the ILOM IPs by providing a wrapper to generate
    `/SP/Network` commands.


    Finally, if you have any questions regarding what version of the ODA software
    you are running on, you can run the following command as root: `/opt/oracle/oak/bin/oakcli
    show version`.


    ## Virtualization Considerations


    If you are virtualizing your ODA, you need an additional IP address for each virtual
    machine that will be created on the ODA. Support for multiple VLANs on an ODA
    was released in version 2.8, which was a week old at the time this chapter was
    written. Currently, all of the documentation for ODA virtualization support is
    published in the Getting Started Guide. Currently, this documentation details
    the following:


    *   How to create a VLAN

    *   How to delete a VLAN

    *   How to list the VLANs deployed on an ODA


    Since multiple VLAN support on a virtualized ODA was just released, it will take
    some time for the documentation to cover all of the details needed to fully understand
    multiple VLAN support. Until the ODA virtualization documentation catches up,
    there are a couple of ways to try to fill the gap. First, you have to start with
    understanding why you might want to use multiple VLANs on a virtualized ODA. Second,
    you have to understand the background of virtualization on an ODA. VLANs, or virtualized
    local area networks, segment a physical network into multiple logical networks.
    This can be done to create multiple networks to share a single physical network,
    which will increase the number of available networks on an ODA. VLANs can also
    be created to provide multiple networks on an ODA to support network segmentation
    for security reasons, or to create VMs on specific networks to match the networks
    deployed for other components of the application. VLANs can be configured to control
    which network segment traffic can be routed between addresses to enhance network
    security.


    Examples of virtualized networks that may be deployed on an ODA include a database
    network, multiple application networks, the management (ILOM) network, and backup
    or other special purpose networks. ODAs have a lot of capacity, and customers
    might only license part of the database cores on the appliance for database processing.
    This leaves capacity for other purposes, including running applications on ODAs.


    Virtualization on an ODA was introduced in March 2013 under release 2.5 on the
    ODA V1, and 2.5.5 on the X3-2 model. Oracle virtualization has been around for
    a while, but the implementation is customized and simplified on an ODA. Instead
    of a separate virtual manager with a GUI console for managing VMs, their server
    pools, and networks, all of the deployment and management steps have been built
    into the command-line oak appliance kit (`oakcli`) utility. Accordingly Oracle,
    VM functionality has to be ported to ODAs, which means there is a development
    cycle with functionality delivered according to a roadmap and timelines.


    The ODA virtualization functionality may lag behind the mainstream Oracle VM product.
    Regardless, Oracle is porting VM templates to ODAs. To keep up with the release
    cycle for supporting application templates, you can search “Oracle Database Appliance
    Solution in a Box” to learn about the new ODA application solutions being deployed
    by Oracle and its partners.


    You have to remember that ODA virtualization implements VLANs created by your
    network team. They are not created by the ODA. Configuration work has to be performed
    at the network switches connected to the ODA to enable the virtual networks.


    The key points to remember are that ODAs can implement virtual networks to support
    both the databases and applications deployed on a virtualized ODA appliance. Design
    and planning are required to properly create the networks for virtualized ODA
    solutions.


    ## Summary


    This chapter outlined the requirements for implementing the networks needed to
    support an ODA deployment. It provided a list of available networks, IP addresses,
    and cabling requirements, and detailed the process for deploying ODA networks.


    The process for changing network information on an ODA after it has been deployed
    was outlined. Finally, some of the considerations that have to be made in a virtualized
    ODA environment were discussed.


    ODAs offer a “keep it simple” model for deploying the appliances, including the
    configuration and setup of the networks. ODAs support the standard key Oracle
    Linux and hardware utilities for managing the appliance. As a result, the management
    of the appliance is flexible, while offering additional options, such as the `GridInst.pl`
    script for automating post deployment network changes.'
  raw: '## Post Deployment Options for Making Network Changes


    There are a number of options for making network changes after the ODA has been
    deployed. One option is to start all over again by “bare metaling” your machine
    and starting over with your deployment. The procedures for doing this are outlined
    in MOS note 1373599.1\. Depending on the status of your deployment, this may or
    may not be a practical option.


    If you have an experienced Oracle hardware and OS sysadmin working with you, he
    or she will already be ready familiar with setting up the hardware and making
    network changes.


    Oracle has published a number of MOS notes for making the following types of network
    changes:


    *   Implementing network bonding after the deployment has already been completed
    (MOS 1422563.1)

    *   Changing the ILOM Network IPs (MOS 1442113.1)

    *   Changing the DNS servers (MOS 1600317.1)


    These notes are worth reading even if you don’t need to change the IP addresses
    on any of your ODAs, because they highlight one of the automation features of
    an ODA: the `GridInst.pl` script.


    The `GridInst.pl` script is documented in MOS note 1409835.1 and can be found
    in the following directory:


    `/opt/oracle/oak/onecmd/GridInst.pl`


    Here are some of the additional things that you can learn from reviewing these
    notes:


    *   The network configuration files are stored in `/etc/sysconfig/networking`
    and `/etc/sysconfig/network-scripts`.

    *   The DNS server entries are stored in the `/etc/resolve.conf` file.

    *   The `ifconfig` command can be used to display your ODA network settings.

    *   Your ODA deployment settings are stored in `/opt/oracle/oak/onecmd/onecommand.params`.
    After updating your ODA, you may need to generate new files or changes to files
    using the Oracle Appliance Manager configuration utility. The appliance manager
    version has to match the ODA version of the machine. This file is only readable
    by the root account.

    *   You can use the `GridInst.pl` script, which is run by the deployment process,
    to modify the existing ODA configurations, including changing the networks.

    *   Running the `GridInst.pl` script with the `-l` option—as in `GridInst.pl -l`—displays
    a current list of the individual deployment steps run by the script. The `-l`
    option is used to make sure you rerun the correct step when making changes to
    an ODA configuration.

    *   The `ipmitool` command can change the ILOM IPs by providing a wrapper to generate
    `/SP/Network` commands.


    Finally, if you have any questions regarding what version of the ODA software
    you are running on, you can run the following command as root: `/opt/oracle/oak/bin/oakcli
    show version`.


