  trans: '## 部署后进行网络更改的选项


    在 ODA 部署完成后，有多种选项可用于进行网络更改。其中一种选择是通过"裸金属化"您的机器并重新开始部署来从头开始。执行此操作的步骤在 MOS 说明`1373599.1`中概述。根据您部署的状态，这可能是一个实用选项，也可能不是。


    如果您有一位经验丰富的 Oracle 硬件和操作系统系统管理员与您合作，他或她应该已经熟悉硬件设置和网络更改。


    Oracle 发布了多份 MOS 说明，用于进行以下类型的网络更改：


    *   在部署已完成之后实施网络绑定（MOS `1422563.1`）

    *   更改 ILOM 网络 IP 地址（MOS `1442113.1`）

    *   更改 DNS 服务器（MOS `1600317.1`）


    即使您不需要更改任何 ODA 上的 IP 地址，这些说明也值得一读，因为它们突显了 ODA 的自动化功能之一：`GridInst.pl`脚本。


    `GridInst.pl`脚本在 MOS 说明`1409835.1`中有文档记录，可以在以下目录中找到：


    `/opt/oracle/oak/onecmd/GridInst.pl`


    通过查阅这些说明，您还可以了解到以下额外信息：


    *   网络配置文件存储在`/etc/sysconfig/networking`和`/etc/sysconfig/network-scripts`中。

    *   DNS 服务器条目存储在`/etc/resolve.conf`文件中。

    *   `ifconfig`命令可用于显示您的 ODA 网络设置。

    *   您的 ODA 部署设置存储在`/opt/oracle/oak/onecmd/onecommand.params`中。更新 ODA 后，您可能需要使用
    Oracle 应用设备管理器配置实用程序生成新文件或修改文件。应用设备管理器的版本必须与机器的 ODA 版本匹配。此文件仅 root 账户可读。

    *   您可以使用部署过程中运行的`GridInst.pl`脚本来修改现有的 ODA 配置，包括更改网络。

    *   使用`-l`选项运行`GridInst.pl`脚本——如`GridInst.pl -l`——会显示该脚本运行的各个部署步骤的当前列表。`-l`选项用于确保在对
    ODA 配置进行更改时重新运行正确的步骤。

    *   `ipmitool`命令可以通过提供包装器来生成`/SP/Network`命令，从而更改 ILOM IP 地址。


    最后，如果您对正在运行的 ODA 软件版本有任何疑问，可以以 root 身份运行以下命令：`/opt/oracle/oak/bin/oakcli show
    version`。


    ## 虚拟化注意事项


    如果您正在对 ODA 进行虚拟化，则需要为将在 ODA 上创建的每个虚拟机准备一个额外的 IP 地址。ODA 上对多个 VLAN 的支持是在版本 2.8 中发布的，在本章撰写时该版本才发布一周。目前，所有关于
    ODA 虚拟化支持的文档都发布在《入门指南》中。目前，该文档详细说明了以下内容：


    *   如何创建 VLAN

    *   如何删除 VLAN

    *   如何列出部署在 ODA 上的 VLAN


    由于在虚拟化 ODA 上支持多个 VLAN 是刚刚发布的，文档需要一些时间才能涵盖完全理解多 VLAN 支持所需的所有细节。在 ODA 虚拟化文档完善之前，有几种方法可以尝试填补空白。首先，您必须从理解为什么要在虚拟化
    ODA 上使用多个 VLAN 开始。其次，您必须了解 ODA 上虚拟化的背景。VLAN（即虚拟局域网）将物理网络划分为多个逻辑网络。这样做可以创建多个网络来共享单个物理网络，从而增加
    ODA 上可用网络的数量。也可以创建 VLAN，在 ODA 上提供多个网络，以支持出于安全原因的网络分段，或者在特定网络上创建虚拟机以匹配为应用程序其他组件部署的网络。可以配置
    VLAN 来控制哪些网段流量可以在地址之间路由，以增强网络安全性。


    可以部署在 ODA 上的虚拟化网络示例包括数据库网络、多个应用程序网络、管理（ILOM）网络以及备份或其他特殊用途网络。ODA 具有很大的容量，客户可能只授权设备上用于数据库处理的部分数据库核心。这为其他目的（包括在
    ODA 上运行应用程序）留下了容量。


    ODA 上的虚拟化功能于 2013 年 3 月在 ODA V1 的 2.5 版本和 X3-2 型号的 2.5.5 版本中引入。Oracle 虚拟化已经存在一段时间，但在
    ODA 上的实现是定制和简化的。所有部署和管理步骤都已内置到命令行工具 oak 应用套件（`oakcli`）实用程序中，而不是使用单独的虚拟管理器和 GUI
    控制台来管理虚拟机、其服务器池和网络。因此，Oracle VM 功能必须移植到 ODA 上，这意味着存在一个开发周期，功能根据路线图和时间表交付。


    ODA 虚拟化功能可能落后于主流 Oracle VM 产品。尽管如此，Oracle 正在将 VM 模板移植到 ODA 上。要跟上支持应用程序模板的发布周期，您可以搜索“Oracle
    Database Appliance Solution in a Box”，以了解 Oracle 及其合作伙伴正在部署的新型 ODA 应用程序解决方案。


    您必须记住，ODA 虚拟化实现的是由您的网络团队创建的 VLAN。它们不是由 ODA 创建的。必须在与 ODA 连接的网络交换机上执行配置工作以启用虚拟网络。


    需要记住的要点是，ODA 可以实现虚拟网络，以支持在虚拟化 ODA 设备上部署的数据库和应用程序。需要设计和规划才能为虚拟化 ODA 解决方案正确创建网络。


    ## 总结


    本章概述了实施支持 ODA 部署所需网络的要求。它提供了可用网络、IP 地址和布线要求的列表，并详细介绍了部署 ODA 网络的过程。


    概述了在 ODA 部署完成后更改网络信息的过程。最后，讨论了在虚拟化 ODA 环境中必须考虑的一些因素。


    ODA 为部署设备（包括网络的配置和设置）提供了一个“保持简单”的模型。ODA 支持标准的关键 Oracle Linux 和硬件实用程序来管理设备。因此，设备的管理是灵活的，同时提供了额外的选项，例如用于自动化部署后网络更改的`GridInst.pl`脚本。'
- fmt: '# 6. 监控 Oracle 数据库设备


    摘要


    Oracle 数据库设备可以被视为一个整体或两个独立的单元，这取决于您希望如何监控它。实际上，Oracle 数据库设备是一种通过缩小物理硬件占用空间来解决企业问题的机器，同时提高了整体可用性。Oracle
    数据库设备可用于帮助组织实现其架构的可扩展性。当使用新硬件扩展架构时，尤其是在使用 Oracle 数据库设备这样的工程化系统时，监控就成为了一个问题。如何监控
    Oracle 数据库设备？


    监控 Oracle 数据库设备与监控任何其他数据库环境非常相似；不同之处在于您有一个包含两台物理服务器的单一机箱。如前面章节所讨论的，Oracle 数据库设备可以配置为关联数据库，运行在独立模式（企业版）、Oracle
    RAC One 或 Oracle 真应用集群（RAC）模式。这三种配置都可以通过几种不同的方式进行监控。在本章中，我们将了解如何为 Oracle 11g 第
    2 版数据库在 Oracle 数据库设备上配置、验证、重新配置、启动、停止和取消配置一个名为 Database Control 的实用程序。这是您用来控制设备的工具。之后，我们还将了解如何针对设备部署
    Oracle 企业管理器代理。


    注意


    Oracle 数据库 12c 尚未获得 Oracle 数据库设备的认证。在 Oracle 数据库设备上使用 Oracle 数据库 12c 的企业管理器（EM）Express
    尚未经过验证。


    ## 配置 Database Control


    Database Control 是 Oracle 数据库 11g 的 Oracle 企业管理器的轻量级版本。Database Control 提供的功能可帮助数据库管理员和开发人员识别并解决可能与数据库中当前和持续处理相关的性能和管理问题。


    配置 Database Control 有三种方式：在安装过程中、使用数据库配置助手（DBCA）以及从命令行使用企业管理器配置助手（EMCA）。出于本章的目的，让我们重点介绍如何使用
    EMCA 工具配置 Database Control。


    ### 使用企业管理器配置助手（EMCA）


    与 DBA 从命令行执行的任何操作一样，您需要为要配置的数据库设置 Oracle Home。在 Oracle 数据库设备上，这就像运行 `oraenv` 命令设置环境一样简单。清单
    6-1 展示了如何设置环境以及如何在设置后检查环境。


    **清单 6-1. 设置 Oracle 环境并检查它**


    ```bash

    $ . oraenv

    ORACLE_SID = [oracle] ? dboda

    The Oracle base has been set to /u01/app/oracle

    $ env | grep ORA

    ORACLE_SID=dboda

    ORACLE_BASE=/u01/app/oracle

    ORACLE_HOME=/u01/app/oracle/product/11.2.0.3/dbhome_1

    ```


    现在 Oracle 环境已设置，您可以从 Oracle Home 下的 `bin` 目录或当前所在位置运行 `emca` 实用程序。清单 6-2 说明了如何从
    Oracle Home `bin` 目录运行 `emca` 实用程序。


    **清单 6-2. 从 bin 目录执行 EMCA**


    ```bash

    $ cd $ORACLE_HOME/bin

    $ ./emca

    ```


    运行 `emca` 命令时，可以在命令行上传递可选参数以帮助配置 Database Control。表 6-1 将帮助您理解这些参数是什么。企业管理器配置助手（EMCA）命令遵循一个简单的形式，如清单
    6-3 所述。


    **清单 6-3. EMCA 命令模式**


    ```bash

    ./emca [operation] [mode] [flags] [parameters]

    ```


    要提供更多信息，可以使用 `-help` 选项来列出与 `emca` 实用程序相关的所有参数。清单 6-4 提供了调出帮助选项所需的语法。


    **清单 6-4. EMCA 帮助选项**


    ```bash

    $ ./emca -help

    ```


    现在您对 `emca` 实用程序有了基本的了解，您将在 Oracle 数据库设备上配置 Database Control。在许多情况下，您将针对真实应用集群配置
    Database Control。在配置 Database Control 之前，您需要更改要处理的数据库的 `job_queue_processes`。清单
    6-5 显示了更改 `job_queue_processes` 参数所需的 `alter system` 命令。为此，您需要在命令行上指定几个额外的参数。清单
    6-5 中的示例将允许的作业队列进程数增加到大于零的值。这有助于后续配置 Database Control。


    **清单 6-5. 更改数据库的 job_queue_processes**


    ```sql

    SQL> alter system set job_queue_processes = 10 scope=both sid=''*'';

    ```


    要在 Oracle 数据库设备上为集群数据库配置 Database Control，命令很简单，如清单 6-6 所示。再次注意，清单 6-6 展示了如何从
    Oracle Home `bin` 目录运行 `emca` 实用程序。


    **清单 6-6. 为 RAC 数据库配置 Database Control**


    ```bash

    $ cd $ORACLE_HOME/bin

    $ ./emca -config dbcontrol db -repos create -cluster

    ```


    配置启动后，`emca` 将要求您提供一系列输入。提供所需的输入。`emca` 正在寻找的参数可以作为选项在命令行上传递，也可以在参数文件中提供。表 6-1
    提供了可以在命令行或参数文件中传递的参数列表。


    表 6-1. EMCA 命令行参数'
  raw: '# 6. Monitoring the Oracle Database Appliance


    Abstract


    The Oracle Database Appliance can be viewed as a single box or as two separate
    boxes, depending on how you want to monitor it. In reality, the Oracle Database
    Appliance is a machine that solves problems for businesses by shrinking the physical
    hardware footprint, yet increases overall usability. The Oracle Database Appliance
    can be used to help organizations be scalable with their architecture. When scaling
    out architectures with new hardware, especially with an engineered system like
    the Oracle Database Appliance, monitoring becomes a concern. How does one monitor
    the Oracle Database Appliance?


    The Oracle Database Appliance can be viewed as a single box or as two separate
    boxes, depending on how you want to monitor it. In reality, the Oracle Database
    Appliance is a machine that solves problems for businesses by shrinking the physical
    hardware footprint, yet increases overall usability. The Oracle Database Appliance
    can be used to help organizations be scalable with their architecture. When scaling
    out architectures with new hardware, especially with an engineered system like
    the Oracle Database Appliance, monitoring becomes a concern. How does one monitor
    the Oracle Database Appliance?


    Monitoring the Oracle Database Appliance is quite the same as monitoring any other
    database environment; the difference is that you have two physical servers collocated
    in a single box. As discussed in previous chapters, the Oracle Database Appliance
    can have an associated database configured in Stand Alone (Enterprise Edition),
    Oracle RAC One, or Oracle Real Application Clusters (RAC) modes. All three configurations
    can be monitored in a few different ways. In this chapter, we will look at how
    to configure, verify, reconfigure, start, stop, and deconfigure a utility called
    Database Control for an Oracle 11g Release 2 database on the Oracle Database Appliance.
    This is the utility by which you control the appliance. Then later we will take
    a look at how to deploy Oracle Enterprise Manager Agents against the appliance.


    Note


    Oracle Database 12c has not been certified with the Oracle Database Appliance.
    The use of Enterprise Manager (EM) Express with the Oracle Database 12c on the
    Oracle Database Appliance has not been verified.


    ## Configuring Database Control


    Database Control is the lightweight version of the Oracle Enterprise Manager for
    Oracle Database 11g. The functionality provided by Database Control helps database
    administrators and developers identify and resolve performance and administrative
    issues that may be related to current and ongoing processing in the database.


    There are three ways to configure Database Control: during installation, from
    Database Configuration Assistant (DBCA), and from the command line using the Enterprise
    Manager Configuration Assistant (EMCA). For the purpose of this chapter, let’s
    focus on configuring the Database Control with the EMCA tool.


    ### Using the Enterprise Manager Configuration Assistant (EMCA)


    As with anything a DBA does from the command line, you need to set your Oracle
    Home for the database that is to be configured. On the Oracle Database Appliance,
    this is as simple as running the `oraenv` command to set the environment. Listing
    6-1 gives an example of how to set the environment and how to check the environment
    once set.


    Listing 6-1. Setting the Oracle Environment and Checking It


    `$ . oraenv`


    `ORACLE_SID = [oracle] ? dboda`


    `The Oracle base has been set to /u01/app/oracle`


    `$ env | grep ORA`


    `ORACLE_SID=dboda`


    `ORACLE_BASE=/u01/app/oracle`


    `ORACLE_HOME=/u01/app/oracle/product/11.2.0.3/dbhome_1`


    Now that the Oracle environment is set, you can run the `emca` utility from either
    the `bin` directory under the Oracle Home or from where you currently are. Listing
    6-2 illustrates running the `emca` utility from the Oracle Home `bin` directory.


    Listing 6-2. Execute EMCA from bin


    `$ cd $ORACLE_HOME/bin`


    `$ ./emca`


    When running the `emca` command, there are optional parameters that can be passed
    on the command line to help configure the Database Control. Table [6-1](#A978-1-4302-6266-4_6_Chapter.html#Tab1)
    will help you understand what these parameters are. The Enterprise Manager Configuration
    Assistant (EMCA) command follows a simple form, as outlined in Listing 6-3.


    Listing 6-3. EMCA Command Pattern


    `./emca [operation] [mode] [flags] [parameters]`


    To provide additional information, the `-help` option can be used to list all
    parameters associated with the `emca` utility. Listing 6-4 provides the syntax
    required to bring up the help options.


    Listing 6-4. EMCA Help Option


    `$ ./emca -help`


    Now that you have a basic understanding of the `emca` utility, you are going to
    configure Database Control on the Oracle Database Appliance. In many cases, you
    will be configuring Database Control against a Real Application Cluster. Before
    you can configure Database Control, you will need to change the `job_queue_processes`
    for the database that you are working with. Listing 6-5 shows you the `alter system`
    command that is required to change the `job_queue_processes` parameter. In order
    to do that, you need to specify a few extra parameters on the command line. The
    example in Listing 6-5 increases the allowed number of job queue processes to
    a number greater than zero. Doing that helps later with the configuration of Database
    Control.


    Listing 6-5. Change the job_queue_processes for the Database


    `SQL> alter system set job_queue_processes = 10 scope=both sid=''*'';`


    To configure Database Control for a cluster database on the Oracle Database Appliance,
    the command is as simple as the example listed in Listing 6-6\. Again, notice
    that Listing 6-6 is showing you how to run the `emca` utility from the Oracle
    Home `bin` directory.


    Listing 6-6. Configuring Database Control for a RAC database


    `$ cd $ORACLE_HOME/bin`


    `$ ./emca -config dbcontrol db -repos create -cluster`


    When the configuration is started, `emca` will ask you for a series of inputs.
    Provide the inputs required. The parameters that `emca` is looking for can be
    passed on the command line as options or in a parameter file. Table [6-1](#A978-1-4302-6266-4_6_Chapter.html#Tab1)
    provides a list of the parameters that can be passed on the command line or in
    a parameter file.


