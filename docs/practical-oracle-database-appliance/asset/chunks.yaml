    Control.


    # Reconfiguring the Database Console


    With the Oracle 11g Release 2 version of the Database Control, there have been
    occasions in which the control needs to be rebuilt or reconfigured. Reconfiguring
    of the Database Control often corrects any issues that may have occurred in the
    repository for the control. To reconfigure the Database Control, you need to invoke
    the Enterprise Manager Configuration Assistant (`emca`) with the `recreate` option.
    The following `emca` command (see Listing 6-14) will reconfigure the Database
    Control and re-create the repository for the database on the Oracle Database Appliance.


    ## Listing 6-14. recreate Command


    ```

    $ cd $ORACLE_HOME/bin

    $ ./emca -config dbcontrol db -repos recreate -cluster

    ```


    When reconfiguring Database Control, the `emca` command will ask you for a few
    parameters. These parameters can be passed on the command line or in a parameter
    file. These parameters can be found in Table [6-1](#A978-1-4302-6266-4_6_Chapter.html#Tab1).
