    \ ∼]# yum install portmap\n[root@oevm1 ∼]# yum install oracle-rdbms-server-11gR2-preinstall\n\
    [root@oevm1 ∼]# chkconfig rpcbind on\n[root@oevm1 ∼]# chkconfig nfs on\n[root@oevm1\
