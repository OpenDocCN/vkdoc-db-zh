    face in the near future. The good news is that the Oracle Database Appliance significantly
    reduces the amount of effort necessary to keep a database system on the current
    level. This chapter explains how the Oracle Database Appliance addresses the never-ending
    patching challenge and makes it significantly less resource consuming.


    ## Introduction to Patching


    The Oracle Database Appliance takes a very simple and practical approach to patching.
    A single patch delivers updates for all system components. The patching process
    is automated and fully scripted. It takes just a few commands to patch the whole
    system, starting from the internal hard-drive firmware and ending with Oracle
    Database patches. Oracle Corporation releases patches and patch bundles on a quarterly
    basis. This simplifies your planning process.


    ### Conventional Systems Limitations


    What is so special about patching you ask? Just install a new version of software
    and you are done. Right? Would that it were that simple. The problem is that a
    modern server is a complex system. It contains many separately updatable components,
    starting from the BIOS and lights-out adapter, and ending with the operational
    system. Furthermore, a database system doesn’t consist of a server only. There
    are other important components that need regular software updates. There are network
    components, internal storage, external storage, and more. The storage could be
    a complex system by itself. To make a long story short, a database system consists
    of a dozen or more components that need to be patched on a regular basis.


    Updating a single component is a relatively simple task. However, each of the
    components interacts with others. To make sure that all will operate without issues,
    an administrator or a group of administrators should verify the compatibility
    of all components at their current version level. The lights-out adapter version
    should be compatible with the current BIOS version; disk and network card drivers
    should be compatible with the operational system version, and so on.


    Often, different groups within the organization are responsible for patching different
    system components. A storage team, for example, is responsible for storage components,
    whereas a network team maintains network components like switches used in clustered
    environments. A system administration team is responsible for operational system
    patching. The patching process typically is divided into separate phases in which
    each group plans, tests, and executes their own patching separately from the other
    groups.


    In preparation to a patching exercise, the group doing the patching should ensure
    that changes they are going to introduce in the system will not impact other components,
    such as the operational system, cluster services, and others. To ensure compatibility
    and supportability, the group needs to ensure and verify that the new version
    they are going to install is compatible with components that are managed by other
    groups. The planning phase can take significant time just because of the need
    to verify the complex interdependencies. The complexity brings with it the risk
    of error and subsequent downtime.


    With the approach of patching one component at a time, an organization needs to
    introduce significantly more downtime than if it has the ability to patch all
    system components in one go. Each patching effort requires system downtime. Each
    downtime involves more coordination between different groups within the organization.
    Applications that are dependent on the component to be patched need to be stopped,
    increasing the amount of downtime needed. After the patching is completed, the
    system components need to be started one by one and verified. After all components
    have been started, a “smoke” test needs to be performed before releasing the system
    for end users to use. All these steps add time to the downtime necessary for each
    component’s patching. However, if we are able to patch all components in one go,
    then we significantly reduce the overall downtime necessary to keep a system up
    to date.


    The same applies to the efforts necessary for system and application testing.
    In the ideal case, each change should be tested started from lower technical layers
    and ending with application and business testing. Multiple patching phases require
    more testing efforts from different groups within an organization than when we
    patch all components at once.'
