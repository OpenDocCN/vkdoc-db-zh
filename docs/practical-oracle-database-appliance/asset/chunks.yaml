- fmt: '![A978-1-4302-6266-4_BookFrontmatter_Fig6_HTML.jpg](A978-1-4302-6266-4_BookFrontmatter_Fig6_HTML.jpg)
    Pete Sharman is a principal product manager with the Enterprise Manager product
    suite group in the Server Technologies Division at Oracle Corporation. He has
    worked with Oracle for the past 18 years in a variety of roles, from education
    to consulting to development, and has used Enterprise Manager since its 0.76 beta
    release. Pete is a member of the OakTable Network and has presented at conferences
    around the world, including Oracle OpenWorld (both in Australia and the United
    States), RMOUG Training Days, the Hotsos Conference, Miracle Open World, and the
    AUSOUG and NZOUG conferences. He has authored a book on how to pass the Oracle8i
    Database Administration exam for the Oracle Certified Professional program. He
    lives in Canberra, Australia, with his wife and three children.


    ![A978-1-4302-6266-4_BookFrontmatter_Fig7_HTML.jpg](A978-1-4302-6266-4_BookFrontmatter_Fig7_HTML.jpg)
    Yury Velikanov has more than 15 years of Oracle DBA experience. He is an Oracle
    Certified Master in 9i/10h/11g versions. For his involvement in the Oracle community,
    he has been recognized as an Oracle ACE Director. During the last few years, Yury
    has been involved in `Oracle Database Appliance` projects. He happily shares his
    experience with you in this book.


    # About the Technical Reviewer


    ![A978-1-4302-6266-4_BookFrontmatter_Fig8_HTML.jpg](A978-1-4302-6266-4_BookFrontmatter_Fig8_HTML.jpg)
    Frits Hoogland is an IT professional specializing in Oracle database performance
    and internals. Frits frequently presents on Oracle technical topics at conferences
    around the world. In 2009, he received an Oracle ACE award from the Oracle Technology
    Network, and a year later became an Oracle ACE Director. In 2010, he joined the
    OakTable Network. In addition to developing his Oracle expertise, Frits works
    with MySQL, PostgreSQL, and modern operating systems. Frits currently works at
    Enkitec LP.


    # Introduction


    The world of information technology has changed rapidly since the inception of
    computers during the ’60s and ’70s. These changes have helped propel many different
    aspects of our economy to include what and how businesses conduct daily operations.
    With these changes to organizations, especially internally with information technology,
    faster and better ways of achieving business goals have been pushed and developed.


    As businesses start to depend more on data stored within their systems, faster
    ways of processing and reporting data have developed. Over time, organizations
    have asked for ways to improve processing, achieve greater throughput, and report
    more quickly. This eventually led to the development of systems that could leverage
    both software and hardware resources together, leading to the development of engineered
    systems.


    After the development of engineered systems, such as the `Exadata`, many organizations
    were left with a difficult choice of either a massive expense for an engineered
    system (`Exadata`) or to build their own. This decision affects a large number
    of small- to medium-sized businesses. Oracle recognized this, leading to the birth
    of the `Oracle Database Appliance`.


    ## What Is the Oracle Database Appliance?


    At a high level, the `Oracle Database Appliance` is a server and storage and network
    hardware, combined with network, cluster, and database software and templates.
    The `Oracle Database Appliance` is a fully supported, integrated system consisting
    of hardware and software components. Being that it is an integrated system, it
    is engineered to work at both the software and hardware layers, is simple to configure
    and maintain, and preconfigured to work with database workloads. Additionally,
    it is designed to help organizations minimize costs, increase adoption time, and
    lower risk in database deployment and maintenance.


    ## How This Book Came to Be Written


    The authors of this book have been in the information technology industry for
    many years. In that time, we have seen and dealt with many different platforms
    across a wide range of applications and databases. During this time, however,
    we have not seen a compact, engineered system that can be a benefit to organizations
    more than the `Oracle Database Appliance`. The idea for this book came about while
    many of us were implementing `Oracle Database Appliances` for a variety of customers.
    As we implemented the `Oracle Database Appliance` in various environments, we
    would run into a problem or two and realized there was not a single complete body
    of work for this appliance. Sure, there were Oracle documents, but at some level,
    finding information was a challenge. At that moment we realized, when there were
    issues, surely we were not the only ones hitting them. The desire to write this
    book grew even more when all of us met at a conference and began talking about
    issues with the `Oracle Database Appliance`. We all agreed that the industry needed
    a book about this complex yet simple engineered system. All of the authors of
    this book had a desire to share our knowledge, which we have gained from using
    the `Oracle Database Appliance`. Hence, the need for this book was kicked into
    motion!


    ## Why Buy This Book


    If you are a `DBA` or a manager who deals with databases on a regular basis, this
    book is going to provide you with information on using the `Oracle Database Appliance`.
    No matter how complex an environment your organization has, you will be able to
    use the information in this book to bring the `Oracle Database Appliance`, throughout
    its life cycle, within your organization.


    An understanding of what the `Oracle Database Appliance` can do will radically
    improve your ability to quickly implement complex solutions, while ensuring rapid
    deployments of databases. At the same time, you will develop ideas on how to uniquely
    use this appliance when moving from homegrown solutions to out-of-the-box solutions.


    # Acknowledgments


    Special thanks to all of my friends and family who have supported me in this endeavor;
    especially my wife, Patty, and my children, Brendan, Patrick, and Addison. Love
    you guys!


    —Bobby Curtis


    Writing the acknowledgements is probably the hardest part of the book, This is
    part of the sheer amount of people that helped in the book and my fear that I
    will miss some of them in the process. I will however start with my family abd
    the tremendous support that I got from my Wife Saba and my two kids Areej and
    Ammaar who knew this was time I was taking away from them to focus on the book.
    I also want to acknowledge the whole Database Appliance team at Oracle, including
    but not limited to Sohan Demel, Ian Cookson, Sanjay Singh, Duane Smith, Ravi Sharma.
    The support I got from the whole ODA organization as we were trying to get the
    ODA off the ground and running was tremendous. I would like to like to put praise
    for Brian Bong,Brice Lahl, Jesse Hogan, Qin Huang and one of the my co-authors
    for the book Matthew Gallagher for the tremendous support system we built and
    the risks we took to make this a success. The Apress team including Jonathan Gennick
    , Anamika and Kimberly for putting us in the right path and helping us get thru
    the perils of writing a book. Last and not least the other co-authors for working
    as a team and getting it done. It was truly a pleasure working with all of them.


    —Fuad Arshad


    Thanks to my family for the patience and support that made this possible.


    —Maris Elsins


    I would like to thank Jonathan Gennick, the staff at Apress, Bobby Curtis, and
    Fuad Arshad for giving me the opportunity to work with them on this book project.
    It''s been a great experience.


    —Matthew Gallagher


    I appreciate all the help received from Apress and the authors that collaborated
    on this book. I would like to say huge thanks to my lovely wife, Karina, and sons
    Max and Nik, who supported me a lot along the way. Without you I would have never
    made it.


    —Yury Velikanov'
