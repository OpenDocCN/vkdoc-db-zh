    # 7. Diagnosing the Oracle Database Appliance


    Abstract


    The Oracle Database Appliance (ODA) is a self-sufficient device, and care has
    been taken to provide a variety of checks and balances to allow for optimal operation
    of the appliance, as well as the databases that reside on it. It is very important
    to understand the diagnostic capabilities built into the Appliance itself and
    apply them as needed to solve various trivial and nontrivial activities.


    The Oracle Database Appliance (ODA) is a self-sufficient device, and care has
    been taken to provide a variety of checks and balances to allow for optimal operation
    of the appliance, as well as the databases that reside on it. It is very important
    to understand the diagnostic capabilities built into the Appliance itself and
    apply them as needed to solve various trivial and nontrivial activities.


    The ODA now has had two hardware iterations and multiple software iterations to
    improve and add various features. The ODA software updates have brought together
    many diagnostic capabilities. Some have been added to the standard Oracle Appliance
    Kit (OAK) command set, whereas others are accessible via preinstalled tools and
    through capabilities available in the hardware and the operating system. We will
    be looking at bare-metal appliance install diagnostics in this chapter. Virtualization
    diagnostics will be covered in [Chapter 10](#A978-1-4302-6266-4_10_Chapter.html).


    ODA diagnostics can be looked at in two ways:


    *   Proactively

    *   Reactively


    This chapter will look at various techniques available to the ODA admin team to
    understand and debug various issues. Database-related diagnosis is not in the
    scope of this book, and all standard database monitoring and diagnostics techniques
    still apply to a database running on the ODA.


    ## Proactive Diagnostics


    An ODA is a server, and as such it is very important that care be taken in handling
    and performing various functions on the device. There are multiple ways to proactively
    ensure that the ODA is performing to the satisfaction of the customer. Oracle
    provides a set of one-button utilities that are embedded in the OAK framework.
    OAK provides a complete set of utilities to allow users to perform various activities,
    from deployment to diagnostics. It is discussed in detail in various chapters
    of this book.'
  trans: '# 7. 诊断 Oracle 数据库设备


    ## 摘要


    Oracle 数据库设备（ODA）是一个自给自足的设备，并且已采取各种检查和平衡措施，以确保设备及其上驻留的数据库能够最佳运行。理解设备本身内置的诊断能力并根据需要应用它们来解决各种简单和复杂的活动至关重要。


    Oracle 数据库设备（ODA）是一个自给自足的设备，并且已采取各种检查和平衡措施，以确保设备及其上驻留的数据库能够最佳运行。理解设备本身内置的诊断能力并根据需要应用它们来解决各种简单和复杂的活动至关重要。


    ODA 至今已有两代硬件迭代和多个软件迭代，以改进和添加各种功能。ODA 软件更新汇集了许多诊断能力。其中一些已添加到标准 Oracle 设备工具包（OAK）命令集中，而其他则可通过预装工具以及硬件和操作系统中的功能访问。我们将在本章中探讨裸机设备安装诊断。虚拟化诊断将在第
    10 章中介绍。


    ODA 诊断可以从两个方面考虑：


    *   主动

    *   被动


    本章将探讨 ODA 管理团队可用于理解和调试各种问题的各种技术。数据库相关诊断不在本书范围内，所有标准的数据库监控和诊断技术仍然适用于在 ODA 上运行的数据库。


    ## 主动诊断


    ODA 是一台服务器，因此，在设备上处理和执行各种功能时必须非常小心。有多种方法可以主动确保 ODA 的性能满足客户的要求。Oracle 提供了一组嵌入在
    OAK 框架中的一键式实用程序。OAK 提供了一套完整的实用程序，允许用户执行从部署到诊断的各种活动。本书各章节对此进行了详细讨论。


    在填写主机和平台信息后，您将被带到如图 6-4 所示的安装详细信息页面。在此页面上，您需要添加与您正在添加的主机相关的具体信息。您正在添加一个 Oracle
    数据库设备；两台主机上的基本安装目录将相同。应填写所有其他安装详细信息；如果未填写，请提供必要的信息。命名凭证选项需要填充现有凭证，或通过单击加号（+）按钮创建新凭证。一旦提供了所有安装详细信息，就可以继续安装
    Oracle Management Agent。图 6-4 说明了填写后的安装详细信息应如何显示。


    ![A978-1-4302-6266-4_6_Fig4_HTML.jpg](img/A978-1-4302-6266-4_6_Fig4_HTML.jpg)


    图 6-4. 代理安装详细信息


    一旦为安装详细信息提供了所有信息，如图 6-4 所示，单击下一步继续向导。这将带您进入图 6-5 中的复查屏幕。从那里，您可以看到通过向导输入的所有项目。单击部署代理以开始代理的部署。


    ![A978-1-4302-6266-4_6_Fig5_HTML.jpg](img/A978-1-4302-6266-4_6_Fig5_HTML.jpg)


    图 6-5. 添加目标复查屏幕


    一旦部署开始，可以在添加主机状态屏幕上进行监控。此屏幕如图 6-6 所示。


    ![A978-1-4302-6266-4_6_Fig6_HTML.jpg](img/A978-1-4302-6266-4_6_Fig6_HTML.jpg)


    图 6-6. 添加主机状态说明


    要管理 Oracle 数据库设备上的数据库、监听器和自动存储管理（ASM）实例，需要在 Oracle 管理服务器和 Oracle 数据库设备上的 Oracle
    Management Agents 上部署数据库插件。当通过 Oracle Enterprise Manager 部署代理时，该插件将自动部署。


    ## 总结


    在本章中，我们讨论了两种配置在 Oracle 数据库设备上的监控 Oracle 数据库的方法。第一种方法使用 Oracle 数据库控制。我们讨论了 Oracle
    数据库控制，包括如何配置、管理和取消配置它。第二种方法使用 Oracle Enterprise Manager。我们讨论了它与 Oracle 数据库设备的关系，如何安装管理代理使其能够监控设备，以及将其与设备一起使用时可以期待什么。'
- fmt: "### Validation\n\n我们将要查看的第一组诊断是验证。ODA 附带了预置的验证功能，该功能随着软件的每个版本而不断发展。验证是主动诊断的第一步，应在安装时执行，然后在每次软件补丁或变更后再次执行，以确保系统按预期运行。应建立并维护一个基线，以确保一致性。根据工作负载和\
    \ ODA 上的软件版本，随着平台的成熟，实用程序中可能会内置额外的验证。\n\n验证是 OAK 命令集的一部分，可以通过 `oakcli validate`\
    \ 命令访问。`oakcli validate` 有多个部分，我们将详细查看它们。要了解 `oakcli validate` 提供了什么，我们可以先查看帮助。\n\
    \n```\n[root@oda1 bin]# ./oakcli validate -h\nUsage:\n  oakcli validate [-V |\
    \ -l | -h]\n  oakcli validate [-v] [-f absolute output_file_name] [-a | -d | -c\
    \ check1[,check2]]\nARGUMENTS:\n  -v      verbose output\n  -f      output_file_name.The\
    \ output is sent to the file instead of\n          standard output\n  -a      run\
    \ all checks\n  -d      run only default checks.\n  -c      check1[,check2] run\
    \ specific checks\n  -l      list the checks and description\n  -V      Print\
    \ the Version\n  -h      print help\nEXAMPLES:\n  oakcli validate -l\n  oakcli\
    \ validate -a\n  oakcli validate -c DiskCalibration\n  oakcli validate -c SystemComponents,NetworkComponents,asr\n\
    ```\n\nOAK 验证检查取决于所安装的软件版本。`ODA 2.6` 增加了自动服务请求（`ASR`）验证，以确保 `ASR` 以适当的方式安装和配置。执行不带任何选项的\
    \ `validate` 命令将进行以下检查：\n\n*   系统组件\n*   操作系统磁盘存储\n*   共享存储\n*   网络组件\n*   存储拓扑（仅限\
    \ X3-2）\n\n磁盘校准和 `ASR`（`2.6` 版新增）默认不执行。存储拓扑步骤（#5）验证共享磁盘阵列和 ODA X3-2 引入的可选存储架。该步骤仅在\
    \ ODA X3-2 平台上默认执行。\n\n清单 7-1 显示了截至 `OAK 2.6` 可用的 ODA V1 验证命令的简要说明。\n\n**清单 7-1. ODA\
    \ V1 的验证选项**\n\n```\n[root@oda1 bin]# ./oakcli validate –l\nCheckname             Description\n\
    =========             ===========\n*SystemComponent      Validate system components\
    \ based on ilom sensor data readings\n*OSDiskStorage        Validate OS disks\
    \ and filesystem information\n*SharedStorage        Validate Shared storage and\
    \ multipathing information\nDiskCalibration       Check disk performance with\
    \ orion\n*NetworkComponents    Validate public and private network components\n\
    asr                   Validate asr components based on asr config file and ilom\n\
    \                     sensor data readings\n* -- These checks are also performed\
    \ as part of default checks\n```\n\n清单 7-2 显示，与前代 ODA V1 相比，`ODA X3-2` 中增加了验证命令。在\
    \ `ODA X3-2` 中，存储是外部的。这意味着确保外部存储连接得到适当验证非常重要。\n\n**清单 7-2. ODA X3-2 的验证选项**\n\n\
    ```\n[root@odax32 bin]# ./oakcli validate -l\nCheckname            Description\n\
    =========            ===========\n*SystemComponent     Validate system components\
    \ based on ilom sensor data readings\n*OSDiskStorage       Validate OS disks and\
    \ filesystem information\n*SharedStorage       Validate Shared storage and multipathing\
    \ information\nDiskCalibration      Check disk performance with orion\n*NetworkComponents   Validate\
    \ public and private network components\n*StorageTopology     Validate external\
    \ JBOD connectivity\nasr                  Validate asr components based on asr\
    \ config file and ilom\n                     sensor data readings\n```\n\n**注意**\n\
    \n由于 `ODA 2.6` 中的一个内部缺陷，磁盘校准在 `ODA X3-2` 上不起作用。\n\n验证检查被安排到各个子类中。我们将查看每个子类，并分别解释每组检查。"
  raw: '### Validation


    The first set of diagnostics that we will look at is validation. The ODA comes
    with prebuilt validation functionality that has evolved with each version of the
    software. Validation is the first step in proactive diagnostics and should be
    executed at install, and then again after every software patch or change to ensure
    that the system is performing as expected. A baseline should be established and
    maintained to ensure consistency is there. Depending on the workload and the version
    of software on the ODA, there might be additional validation built into the utility
    as the platform matures.


    Validation is part of the OAK command set and can be accessed through the `oakcli
    validate` command. There are multiple parts of `oakcli validate`, and we will
    look at them in detail. To see what `oakcli validate` provides, we can look at
    the help first.


    `[root@oda1 bin]# ./oakcli validate -h`


    `Usage:`


    `oakcli validate [-V | -l | -h]`


    `oakcli validate [-v] [-f absolute output_file_name] [-a | -d | -c check1[,check2]]`


    `ARGUMENTS:`


    `-v      verbose output`


    `-f      output_file_name.The output is sent to the file instead of`


    `standard output`


    `-a      run all checks`


    `-d      run only default checks.`


    `-c      check1[,check2] run specific checks`


    `-l      list the checks and description`


    `-V      Print the Version`


    `-h      print help`


    `EXAMPLES:`


    `oakcli validate -l`


    `oakcli validate -a`


    `oakcli validate -c DiskCalibration`


    `oakcli validate -c SystemComponents,NetworkComponents,asr`


    The OAK validate checks depend on the version of the software that is installed.
    ODA 2.6 added Automatic Service Request (ASR) validation to ensure that ASR is
    installed and configured in the appropriate manner. Executing a `validate` command
    without any options will result in the following checks being made:


    *   System components

    *   OS disk storage

    *   Shared storage

    *   Network components

    *   Storage topology (X3-2 only)


    Disk calibration and ASR (new in 2.6) are not executed by default. The storage
    topology step (#5) validates the shared disk array and the optional storage shelf
    that was introduced with ODA X3-2\. That step will be executed by default on the
    ODA X3-2 platform only.


    Listing 7-1 shows a brief description of the ODA V1 validate commands that are
    available as of OAK 2.6.


    Listing 7-1. Validation Options for ODA V1


    `[root@oda1 bin]# ./oakcli validate –l`


    `Checkname             Description`


    `=========             ===========`


    `*SystemComponent      Validate system components based on ilom sensor data readings`


    `*OSDiskStorage        Validate OS disks and filesystem information`


    `*SharedStorage        Validate Shared storage and multipathing information`


    `DiskCalibration       Check disk performance with orion`


    `*NetworkComponents    Validate public and private network components`


    `asr                   Validate asr components based on asr config file and ilom`


    `sensor data readings`


    `* -- These checks are also performed as part of default checks`


    Listing 7-2 shows that there are added validation commands in ODA X3-2 vs. its
    predecessor, ODA V1\. In ODA X3-2, storage is external. This means that it’s important
    to ensure that external storage connectivity is properly validated.


    Listing 7-2. Validation Options for ODA X3-2


    `[root@odax32 bin]# ./oakcli validate -l`


    `Checkname            Description`


    `=========            ===========`


    `*SystemComponent     Validate system components based on ilom sensor data readings`


    `*OSDiskStorage       Validate OS disks and filesystem information`


    `*SharedStorage       Validate Shared storage and multipathing information`


    `DiskCalibration      Check disk performance with orion`


    `*NetworkComponents   Validate public and private network components`


    `*StorageTopology     Validate external JBOD connectivity`


    `asr                  Validate asr components based on asr config file and ilom`


    `sensor data readings`


    Note


    Disk calibration does not work on ODA X3-2 due to an internal bug in ODA 2.6.


    Validation checks are arranged into various subcategories. We will look at each
    subcategory and explain each set of checks individually.'
