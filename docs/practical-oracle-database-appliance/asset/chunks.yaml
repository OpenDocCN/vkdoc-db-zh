    `1       => Generate snmptrap test alert from ilom management`


    `2       => Generte disk alert test`


    `3       => Generate TESTSRCREATE snmptrap`


    `4       => Generate test trap using ''oakcli test pd_xx BAD''`


    The options in Listing 7-13 provide a menu you can use to execute various tests.
    Output is either written to a log file or a test SR is created and an e-mail (similar
    to that shown in Figure [7-1](#A978-1-4302-6266-4_7_Chapter.html#Fig1)) is generated.
    We can look at the options in detail. Listing 7-14 shows an example of the data
    that is displayed via the log file.


