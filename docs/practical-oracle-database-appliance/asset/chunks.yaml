  trans: '## 业务挑战


    许多公司在应对日益扩大的业务压力范围时面临着相同的挑战。IT 部门被要求变得敏捷，并快速提供基础设施，甚至是在所有业务需求尚未完全明确之前。项目时间线正变得更短且分为多个阶段。虽然项目在初期阶段可能会延迟，但这并不意味着项目的截止日期必然会被更改。相反，项目的后期阶段可能需要以更短的时间线来弥补延误。数据库部门通常处于基础设施供应流程的末端。数据库管理员（DBA）被要求快速部署新的数据库基础设施，并尽早向
    IT 客户提供业务价值。如果当轮到 DBA 开始工作时项目已经延迟，那么实际上准备时间会降至零。遵循收集需求、订购硬件、并让多个团队通过大量交接来构建数据库基础设施的旧有周期性做法，已完全无法满足现代业务的时间要求。


    许多公司面临着来自固定预算的成本压力。新的外部公共云产品正在竞争它们的基础设施预算。多年来，一直存在向商用硬件解决方案缓慢转移以降低成本的趋势。尽管与硬件相关的成本因商用解决方案而下降，但构建和支持数据库基础设施解决方案的成本仍然很高。


    公司常常面临拥有高端技能人才短缺的挑战。总体而言，IT 人员、DBA 和其他员工并不短缺。然而，“在任何经济环境中都难以找到优秀人才”这一说法确实持续存在。公司总是在寻找能够解决任何技术问题、快速完成工作并迅速建立专业领域知识的人才。


    新技术的快速引入给高端技能人才的可用性带来了额外压力。这些新技术的快速引入可能要求支持人员在没有太多指导的情况下迅速掌握知识。支持人员必须对当前的挑战做出快速反应，任务必须迅速完成。几乎没有犯错或发生导致项目延误的问题的余地。常见问题包括：


    *   如今员工的工作负荷确实已经饱和。没有时间进行“在职培训”（OJT）和研究。一切都必须被快速启动。

    *   项目的按小时计费咨询成本可能非常高，加剧了成本压力。这增加了快速部署和提高效率的压力。


    在审计和行业法规管理着公司为保护其系统而必须采取行动的时代，安全合规性变得至关重要。在数据库服务器和数据库均为定制构建的环境中，要实现整个应用和数据库组合的合规性非常困难。


    ## ODA 登场


    Oracle 开发了`Oracle 数据库一体机`（`Oracle Database Appliance`），即`ODA`，旨在为上一节提到的业务挑战提供解决方案。如果`ODA`有一个核心主题，那就是“**傻瓜式基础设施部署**”。虽然有些人可能会对这个说法感到意外，但它实际上是为了证明`ODA`部署的简单性和优雅性。`ODA`的其他主题包括使用一键式流程部署的省时与便捷、`RAC`部署的简易性以及管理的便捷性。查看`ODA`设置海报后，您就会明白
    Oracle 正在提供一种新的业务开展方式。


    当前的`X3-2 ODA`型号是一个**集成系统**（engineered system）。集成系统是指设计为作为一个单一、集成的打包解决方案协同运行的硬件和软件。虽然公司可以构建自己的商用硬件解决方案，但很少有公司有能力构建自己的集成系统。大多数公司根本没有资源或商业效益来构建自己的集成系统，更不用说构建一个为高可用性
    Oracle 数据库优化的系统了。


    `X3-2 ODA`预打包了两台服务器，共计 32 个 2.9Gz `Intel E5-2690` CPU 核心。一台`ODA`包含一个存储单元，其中有 20
    个 900G 数据驱动器，总原始存储为 18T。可以通过添加第二个存储扩展机架（额外提供 18T 原始存储）进行扩展，总计 36T 原始存储。`ODA`部署时采用双份或三份镜像（可在安装时配置），在单个存储单元上，使用三份镜像时可用存储约为
    6T，使用双份镜像时约为 9T。应参考`ODA 入门指南`，根据所选部署选项了解镜像存储选项和磁盘组的确切容量规格。当前的`X3-2`服务器每台配备 256G
    内存。包含四个 SSD 驱动器，总存储为 800G，用于联机重做日志。


    **注意**


    `ODA`的容量必将随着底层 Oracle 服务器硬件产品线的更新换代而变化。几乎在硬件型号发布的同时，Oracle 就开始开发下一代替代产品。


    第一代`ODA`是一个固定的、独立的一体化设备。对于`X3-2`第二代型号，服务器和存储单元被模块化，以便产品线能够利用 Oracle 的产品路线图，跟随
    Intel 产品线的发展发布新硬件。


    `ODA`提供了来自单一供应商的集成系统，具有单一的问题上报点。该设备的管理主要是自包含的，并与 Oracle 全面的`Oracle Enterprise
    Manager`（`OEM`）管理和监控解决方案集成。


    `ODA`已被各种规模的大量客户群购买和部署。许多财富 500 强公司报告称，从资源规模角度来看，它们的大部分数据库都可以部署在`ODA`上。未来可以期待容量更大、性能更高的型号。


    `ODA`上也可使用虚拟化功能，以支持使用`Oracle VM 虚拟化管理器`（`OVM`）模板快速部署数据库和应用。已经发布了`WebLogic`的模板，Oracle
    也已宣布将提供额外模板。


    在可预见的未来，`ODA`将在 Oracle 集成系统产品阵容中保持其地位。2013 年 8 月，Oracle 扩展了其集成系统产品阵容，推出了一款名为`Oracle
    虚拟化计算一体机`（`Oracle Virtualized Compute Appliance`），即`OVCA`的新产品。该系统提供了一个通用的`Oracle
    VM`（`OVM`）供应解决方案，而`ODA`则提供了较低成本的入门点，并且其虚拟化已针对运行数据库进行了优化。'
- fmt: '## Fast, Simple Database Infrastructure Deployments


    The first business benefit offered by ODAs is fast and easy database infrastructure
    and database instance deployments. Deploying an ODA does not require spec’ing
    equipment, provisioning Storage Area Network (`SAN`) infrastructure, deploying
    `RAC` private interconnect networks, installing an Operating System (`OS`), or
    installing `RAC`, `ASM`, the grid infrastructure, Oracle database software, or
    project managers to coordinate all of this work.


    The deployment of an ODA simply requires the steps outlined in the setup poster
    and deployment documents. Once the server is on the network, and the deployment
    configuration file is built, the time to build the ODA is slightly less than one
    hour. The result is a two-node `RAC` cluster, including the configuration of the
    file systems, `ASM` storage, grid and database homes, a local `OEM` database control,
    and a starter database. Your company can be running on a `RAC` cluster in less
    than a day.


    If the time to deployment matters to your company, then ODAs will meet the need
    to have fully deployed high-availability databases and virtualized application
    solutions within days of completing the server cabling and other network dependencies.
    An ODA can be deployed by the average DBA by just reading the documentation. If
    your company is deploying a larger portfolio of ODAs, then adding additional skill
    sets to your team may make sense.


    After deploying our first ODA, we counted the number of pre-deployment, install,
    and post-deployment steps involved in building databases on our other build-it-yourself
    platforms. The number of steps to cover all of the bases for the database server,
    without creating the databases, was between 103 and 107. The equivalent number
    of steps on an ODA to accomplish the same result, and also deploy a `RAC` cluster,
    numbered only in the twenties. Needless to say, we estimated that the reduction
    in the build and setup time was geometric in nature. Every company should perform
    their own count of the number of steps and handoffs between teams required to
    build a database server and high-availability databases using their current build
    processes.


    We experienced a similar reduction in the costs for deploying ODA database infrastructure.
    Every company has their methods and rules for defining organizational roles and
    responsibilities. Let’s just say that you can build an ODA without the involvement
    of a `SAN` team and sysadmins if that aligns with your company’s views on roles
    and responsibilities. There is also a reduction in the amount networking work
    required to deploy and ODA.


    A number of companies we have talked to regarding what resources are needed to
    build an ODA vs. how things are done today at their company, report that this
    change in paradigm can result in some interesting internal discussions as they
    shift their strategy toward engineered systems. The shift in roles and responsibilities
    can be worked out up front, or they can slowly change over time, as companies
    become more familiar with the platform and gain more experience.


    So that leads to the question: “How long does it take to deploy an ODA?”. To answer
    this question, you have to realize that an ODA has dependencies just like any
    other engineered system. You still have to order the ODA and have it shipped.
    An ODA requires fairly simple network cabling, and you still need to complete
    any `DNS` and firewall requests. However, much of this work can be done in parallel,
    even before the ODA arrives. With careful planning, an ODA can be deployed very
    quickly, with the actual build work taking less than a day.


    The author’s first experience with an ODA was for a project that required high
    availability and a very fast deployment. We needed to order equipment and have
    a set of four `RAC` clusters running in two weeks. At the time, the ODA platform
    was new, but we decided to take a chance because this was our best option. We
    ordered four ODAs and asked for immediate shipment. The ODAs arrived on a Monday,
    and we racked and cabled them on Tuesday. Some Oracle people flew in on Wednesday
    morning to see if they could help out, since the platform was very new. We drove
    to the data center and built all four ODAs at the same time in parallel Wednesday
    afternoon—with Oracle looking over our shoulders.


    The process went so well that we decided to take one of the ODAs and bare metal
    a brand-new running production ODA `RAC` cluster in front of the entire DBA department
    over lunchtime. We finished the deployment just as everyone finished their lunches.
    People knew that they were looking at a new paradigm in building database servers.
    Building four `RAC` clusters in parallel in an afternoon with just a couple of
    DBAs was unthinkable before that day. Table [9-1](#A978-1-4302-6266-4_9_Chapter.html#Tab1)
    lists many of the tasks that we no longer had to be concerned with as a result
    of deploying an ODA.


    **Table 9-1.** Work That Doesn’t Have to Be Done to Deploy an ODA


    | Task | Traditional | ODA |

    | --- | --- | --- |

    | Spec equipment | Standards dependent. | Standardized hardware and software.
    |

    | Cabling for external `RAC` network | On `RAC` systems. | Included in the hardware.
    |

    | Provision `SAN` storage | In most cases. | Included in build. |

    | IO virtualization | Standards dependent. | Included in build for virtualized
    systems. |

    | Server partitioning | Standards dependent. | Not needed for databases, but can
    be done to accommodate nondatabase virtual containers. |

    | `OS` install | In most cases. | Included in build. |

    | Grid Infrastructure install | In most cases. | Included in build. |

    | Database software install | In most cases. | Included in build. |

    | Project management to coordinate team handoffs | Company dependent. | Included
    in build. |


    So what happened next? Today it isn’t unusual to be approached by application
    teams or project managers with the question, “Can we put this database on an ODA?”.
    You’re in a good place when you are getting this type of question.


    The ODA install process eliminates unpredictable, time-wasting setup issues and
    handoffs that result in additional coordination, dependencies, and delays. Deployment
    times are measured in days, not weeks or months. The ODA provides a lot of flexibility
    in meeting project requirements challenges, which is something that a lot of database
    and infrastructure departments have to deal with.


    ODAs can be pre-deployed quickly to avoid the need to buy capacity before it is
    needed. They are the perfect platform for the majority of your Oracle databases
    in support of Infrastructure as a Service (`IaaS`), Databases as a Service (`DBaaS`),
    or cloud-based services in support of your company’s IT strategy. When you get
    the question: “How are you provisioning your databases so quickly and efficiently
    in your `DBaaS` offering?”—you are in an even better place. ODAs won’t meet every
    project requirement. There are limits to the number of `IOPS`, and the compute
    nodes can’t be scaled beyond two at this time. However, you may find that ODAs
    will meet the requirements for the majority of your databases.'
  raw: '## Fast, Simple Database Infrastructure Deployments


    The first business benefit offered by ODAs is fast and easy database infrastructure
    and database instance deployments. Deploying an ODA does not require spec’ing
    equipment, provisioning Storage Area Network (SAN) infrastructure, deploying RAC
    private interconnect networks, installing an Operating System (OS), or installing
    RAC, ASM, the grid infrastructure, Oracle database software, or project managers
    to coordinate all of this work.


    The deployment of an ODA simply requires the steps outlined in the setup poster
    and deployment documents. Once the server is on the network, and the deployment
    configuration file is built, the time to build the ODA is slightly less than one
    hour. The result is a two-node RAC cluster, including the configuration of the
    file systems, ASM storage, grid and database homes, a local OEM database control,
    and a starter database. Your company can be running on a RAC cluster in less than
    a day.


    If the time to deployment matters to your company, then ODAs will meet the need
    to have fully deployed high-availability databases and virtualized application
    solutions within days of completing the server cabling and other network dependencies.
    An ODA can be deployed by the average DBA by just reading the documentation. If
    your company is deploying a larger portfolio of ODAs, then adding additional skill
    sets to your team may make sense.


    After deploying our first ODA, we counted the number of pre-deployment, install,
    and post-deployment steps involved in building databases on our other build-it-yourself
    platforms. The number of steps to cover all of the bases for the database server,
    without creating the databases, was between 103 and 107\. The equivalent number
    of steps on an ODA to accomplish the same result, and also deploy a RAC cluster,
    numbered only in the twenties. Needless to say, we estimated that the reduction
    in the build and setup time was geometric in nature. Every company should perform
    their own count of the number of steps and handoffs between teams required to
    build a database server and high-availability databases using their current build
    processes.


    We experienced a similar reduction in the costs for deploying ODA database infrastructure.
    Every company has their methods and rules for defining organizational roles and
    responsibilities. Let’s just say that you can build an ODA without the involvement
    of a SAN team and sysadmins if that aligns with your company’s views on roles
    and responsibilities. There is also a reduction in the amount networking work
    required to deploy and ODA.


    A number of companies we have talked to regarding what resources are needed to
    build an ODA vs. how things are done today at their company, report that this
    change in paradigm can result in some interesting internal discussions as they
    shift their strategy toward engineered systems. The shift in roles and responsibilities
    can be worked out up front, or they can slowly change over time, as companies
    become more familiar with the platform and gain more experience.


    So that leads to the question: “How long does it take to deploy an ODA?”. To answer
    this question, you have to realize that an ODA has dependencies just like any
    other engineered system. You still have to order the ODA and have it shipped.
    An ODA requires fairly simple network cabling, and you still need to complete
    any DNS and firewall requests. However, much of this work can be done in parallel,
    even before the ODA arrives. With careful planning, an ODA can be deployed very
    quickly, with the actual build work taking less than a day.


    The author’s first experience with an ODA was for a project that required high
    availability and a very fast deployment. We needed to order equipment and have
    a set of four RAC clusters running in two weeks. At the time, the ODA platform
    was new, but we decided to take a chance because this was our best option. We
    ordered four ODAs and asked for immediate shipment. The ODAs arrived on a Monday,
    and we racked and cabled them on Tuesday. Some Oracle people flew in on Wednesday
    morning to see if they could help out, since the platform was very new. We drove
    to the data center and built all four ODAs at the same time in parallel Wednesday
    afternoon—with Oracle looking over our shoulders.


    The process went so well that we decided to take one of the ODAs and bare metal
    a brand-new running production ODA RAC cluster in front of the entire DBA department
    over lunchtime. We finished the deployment just as everyone finished their lunches.
    People knew that they were looking at a new paradigm in building database servers.
    Building four RAC clusters in parallel in an afternoon with just a couple of DBAs
    was unthinkable before that day. Table [9-1](#A978-1-4302-6266-4_9_Chapter.html#Tab1)
    lists many of the tasks that we no longer had to be concerned with as a result
    of deploying an ODA.


    Table 9-1.


    Work That Doesn’t Have to Be Done to Deploy an ODA


    | Task | Traditional | ODA |

    | --- | --- | --- |

    | Spec equipment | Standards dependent. | Standardized hardware and software.
    |

    | Cabling for external RAC network | On RAC systems. | Included in the hardware.
    |

    | Provision SAN storage | In most cases. | Included in build. |

    | IO virtualization | Standards dependent. | Included in build for virtualized
    systems. |

    | Server partitioning | Standards dependent. | Not needed for databases, but can
    be done to accommodate nondatabase virtual containers. |

    | OS install | In most cases. | Included in build. |

    | Grid Infrastructure install | In most cases. | Included in build. |

    | Database software install | In most cases. | Included in build. |

    | Project management to coordinate team handoffs | Company dependent. | Included
    in build. |


    So what happened next? Today it isn’t unusual to be approached by application
    teams or project managers with the question, “Can we put this database on an ODA?”.
    You’re in a good place when you are getting this type of question.


    The ODA install process eliminates unpredictable, time-wasting setup issues and
