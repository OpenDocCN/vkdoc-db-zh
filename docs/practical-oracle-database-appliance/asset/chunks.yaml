  trans: '

    ## 快速、简单的数据库基础设施部署


    ODA 提供的首要业务优势是快速便捷的数据库基础设施和数据库实例部署。部署 ODA 无需单独规划设备、配置存储区域网络 (`SAN`) 基础设施、部署 `RAC`
    私有互连网络、安装操作系统 (`OS`)，也无需安装 `RAC`、`ASM`、网格基础设施、Oracle 数据库软件，或指派项目经理来协调所有这些工作。


    部署 ODA 只需按照设置海报和部署文档中概述的步骤操作。服务器接入网络并构建部署配置文件后，构建 ODA 的时间略少于一小时。成果是一个双节点 `RAC`
    集群，包括文件系统、`ASM` 存储、网格和数据库主目录的配置，一个本地的 `OEM` 数据库控制台，以及一个初始数据库。您的公司可以在不到一天的时间内在
    `RAC` 集群上运行应用。


    如果部署时间对您的公司至关重要，那么 ODA 将满足在完成服务器布线和其他网络依赖项后数天内，就拥有完全部署好的高可用性数据库和虚拟化应用解决方案的需求。普通的
    DBA 只需阅读文档即可部署 ODA。如果您的公司正在部署更大规模的 ODA 产品组合，那么为团队增加额外的技能可能很有意义。


    在部署了我们的第一台 ODA 之后，我们统计了在其他自己搭建的平台上构建数据库所涉及的预部署、安装和部署后步骤的数量。在不创建数据库的情况下，涵盖数据库服务器所有基础步骤的数量在
    103 到 107 步之间。而在 ODA 上完成相同结果并部署一个 `RAC` 集群的等效步骤数量，仅二十几步。不用说，我们估计构建和设置时间的缩减在本质上是几何级数的。每家公司都应该自行统计使用当前构建流程来构建数据库服务器和高可用性数据库所需的步骤数量以及团队间的交接次数。


    我们在部署 ODA 数据库基础设施的成本方面也经历了类似的降低。每家公司都有其定义组织角色和职责的方法与规则。可以说，如果这符合贵公司对角色和职责的看法，您可以在没有
    `SAN` 团队和系统管理员参与的情况下构建 ODA。部署 ODA 所需的网络工作量也有所减少。


    我们与一些公司讨论了构建 ODA 与他们目前做法所需资源的差异，许多公司报告说，这种范式转变可能会引发一些有趣的内部讨论，因为他们正将战略转向工程化系统。角色和职责的转变可以提前解决，也可以随着公司对平台更加熟悉并获得更多经验而逐渐改变。


    这就引出了问题：“部署 ODA 需要多长时间？”。要回答这个问题，您必须意识到 ODA 与其他任何工程化系统一样存在依赖项。您仍然需要订购 ODA 并安排发货。ODA
    需要相当简单的网络布线，并且您仍然需要完成任何 `DNS` 和防火墙请求。然而，其中大部分工作可以在 ODA 到达之前并行完成。通过仔细规划，ODA 可以非常快速地部署，实际的构建工作耗时不到一天。


    作者第一次使用 ODA 是在一个需要高可用性和非常快速部署的项目中。我们需要订购设备并在两周内让四组 `RAC` 集群投入运行。当时，ODA 平台还很新，但我们决定冒险一试，因为这是我们最佳的选择。我们订购了四台
    ODA 并要求立即发货。ODA 在周一到达，我们在周二进行了上架和布线。一些 Oracle 的人员在周三上午飞抵，看看是否能提供帮助，因为这个平台非常新。我们前往数据中心，在周三下午并行构建了所有四台
    ODA——Oracle 的人员在一旁观察。


    过程进展得非常顺利，以至于我们决定取出一台 ODA，在整个 DBA 部门的午餐时间面前，现场演示从裸机搭建一个全新、可运行的生产环境 ODA `RAC` 集群。我们在大家吃完午餐时正好完成了部署。人们明白他们正在目睹一种构建数据库服务器的新范式。在那一天之前，仅凭几名
    DBA 在一个下午并行构建四个 `RAC` 集群是不可想象的。表 9-1 列出了许多由于部署 ODA 而不再需要关心的工作。


    **表 9-1.** 部署 ODA 无需完成的工作


    | 任务 | 传统方式 | ODA |

    | --- | --- | --- |

    | 规格设备 | 依赖于标准。 | 标准化的硬件和软件。 |

    | 外部 `RAC` 网络布线 | 在 `RAC` 系统上需要。 | 包含在硬件中。 |

    | 配置 `SAN` 存储 | 大多数情况下需要。 | 包含在构建中。 |

    | I/O 虚拟化 | 依赖于标准。 | 对于虚拟化系统，包含在构建中。 |

    | 服务器分区 | 依赖于标准。 | 数据库不需要，但可以用于容纳非数据库虚拟容器。 |

    | 安装 `OS` | 大多数情况下需要。 | 包含在构建中。 |

    | 安装网格基础设施 | 大多数情况下需要。 | 包含在构建中。 |

    | 安装数据库软件 | 大多数情况下需要。 | 包含在构建中。 |

    | 协调团队交接的项目管理 | 依赖于公司。 | 包含在构建中。 |


    那么接下来发生了什么？如今，被应用团队或项目经理问到“我们能把这个数据库放在 ODA 上吗？”并不少见。当您得到这类问题时，说明您处于一个很好的位置。


    ODA 安装过程消除了不可预测、浪费时间的设置问题和交接，这些问题会导致额外的协调、依赖和延迟。部署时间以天计算，而不是周或月。ODA 在满足项目需求挑战方面提供了很大的灵活性，这是许多数据库和基础设施部门必须应对的。


    ODA 可以快速预部署，以避免在需要之前购买容量。它们是支持基础设施即服务 (`IaaS`)、数据库即服务 (`DBaaS`) 或基于云的服务以支持公司 IT
    战略的，您大多数 Oracle 数据库的完美平台。当您被问到：“您是如何在 `DBaaS` 服务中如此快速高效地提供数据库的？”——那么您就处于一个更好的位置了。ODA
    并非能满足每个项目需求。`IOPS` 数量存在限制，计算节点目前无法扩展到两个以上。然而，您可能会发现 ODA 能满足您大多数数据库的需求。

    '
- fmt: '## RAC Without Tears


    构建稳定并满足高可用性要求的 RAC 集群需要大量的前期规划和工作，以及安装前后的环境验证检查。除了 RAC 安装手册外，还需要分析其他文档：


    *   RAC 通用文档 (MOS 810394.1) 和任何特定平台的入门套件

    *   RAC FAQ (MOS 220970.1)

    *   Oracle 的支持说明 (MOS 1344678.1)，提供了稳定集群的步骤，并附有平台特定的扩展

    *   RAC 信息中心说明 (MOS 1452965.2)

    *   您特定平台的 RAC 设置建议

    *   RAC 已知问题支持文档


    此外，您还需要查阅任何能提供关于设置 RAC 以支持其他 Oracle 产品（如 eBusiness Suite 和 ATG Web Commerce）建议的文档。


    如果您要构建自己的 RAC 集群，还需要学习额外的工具。Oracle 构建了各种工具来帮助验证 RAC 环境，例如：


    *   `RACcheck` (MOS 1268927.1)

    *   `Cluster Verify` (MOS 316817.1)

    *   用于数据库检查的 `RDA` (MOS 314422.1 和 250262.1)


    当然，还有所有操作系统特定的设置、软件包要求和检查。在传统平台上完成所有这些努力是非常值得的。幸运的话，所有这些内容会被记录一次，并且会有人努力跟上所有的文档更新和
    `RACcheck` 结果，以保持“自己动手”文档的更新。然而，这样做需要大量的时间、合适的人员、部门间大量的交接，以及大量的后续质量保证工作以确保工作正确完成。


    对于大多数公司，尤其是中小型公司来说，记录和分发复杂的技术信息并培训人员理解这些信息是一个挑战。增加挑战的还有实施所有这些要求所需的多团队间的所有交接。有人可能忘记将互联流量路由到冗余的、专用于
    RAC 的交换机（这些交换机也很昂贵），或者忘记在服务器和交换机上都配置巨型帧。还可能存在与支持 IO 多路径的外部供应商软件相关的额外问题。由于所有这些场景都非常真实，Oracle
    发现有必要投资建设广泛的 RAC 诊断设施。


    Oracle 正在通过扩展 `RACcheck` 和其他工具来捕获设置问题，帮助管理这种复杂性。然而，结论是，Oracle RAC 保证组和 Oracle
    支持人员如今非常忙碌是有真实原因的。一体化系统和 ODAs 将正确部署 RAC 的大量工作从您的肩膀上卸下。


    ODAs 通过使 RAC 配置自包含，为所有这些挑战提供了一个解决方案。没有外部互联需求或需要在标准 ODA 部署过程之外进行 RAC 配置更改的说明。如果您担心您的公司是否有能力成功完成构建真正高可用性
    RAC 集群所需的所有工程工作，那么 ODA 可能有助于提供一个解决方案。成功部署 RAC 集群所需的专业知识大大减少。这对各种规模的公司都是一个主要优势。ODA
    将成功部署双节点 RAC 集群的能力扩展到大众，这也是 ODA 成为“RAC Without Tears”解决方案的部分原因。


    在 ODA 安装过程中，可以部署 RAC One、双节点 RAC 集群或单实例数据库。ODA 在几小时内根据 Oracle 的最佳实践部署 RAC 集群。Oracle
    在设备内置了物理 RAC 互联。季度自动补丁流程简化了为 `grid/clusterware` 和 Oracle Homes 打上最新 PSU 补丁和错误修复的过程。这些季度补丁与操作系统和固件更改一起作为一个完整的单元进行测试，使
    ODA 成为维护持续 RAC 稳定性的绝佳解决方案。


    > 注意：作者曾与多家小型公司讨论过非 ODA 系统上的 RAC 安装。许多中小型公司根本没有资源自己执行此类安装。这包括研究所有 RAC 要求的技术资源，以及为互联流量购买额外设备（如专用
    RAC 交换机）的成本。


    虽然 ODA 在部署和支持 RAC 集群方面表现出色，但对于任何平台上的 RAC 部署团队来说，理解良好的 RAC 设计最佳实践以消除节点间的争用仍然是需要了解的。此外，双节点集群要求一个服务器能够在节点切换期间处理整个处理负载。用
    `Data Guard` 补充 RAC 可以缓解故障转移容量方面的担忧。


