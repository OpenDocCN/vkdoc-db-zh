  trans: '### 自动存储管理配置助手


    自动存储管理配置助手 (`ASMCA`) 是在图形用户界面环境中与自动存储管理 (`ASM`) 进行交互的核心工具。图 4-13 展示了通过图形界面操作 `ASM`
    时使用的界面。


    ![A978-1-4302-6266-4_4_Fig13_HTML.jpg](img/A978-1-4302-6266-4_4_Fig13_HTML.jpg)


    图 4-13. 自动存储管理配置助手


    通过使用 `ASMCA` 工具，您可以了解 Oracle 数据库一体机在存储层面的配置情况。界面中有多个选项卡，可帮助识别当前在 Oracle 数据库一体机上运行的
    `ASM` 实例、在 `ASM` 内已分配的磁盘组、已格式化为卷的挂载点，以及在一体机上定义的 `ASM` 集群文件系统。


    考虑到大多数 Oracle 数据库一体机在初始安装时默认已配置所有存储，`ASMCA` 工具主要用于重新配置或添加额外存储。`ASM` 磁盘组的初始大小可以从
    `ASMCA` 的磁盘组表中识别。在此选项卡中（参见图 4-14），如果您想添加额外磁盘或创建新磁盘组，可以使用“创建”按钮；该选项卡还会弹出用于添加额外磁盘的界面（参见图
    4-15）。


    ![A978-1-4302-6266-4_4_Fig15_HTML.jpg](img/A978-1-4302-6266-4_4_Fig15_HTML.jpg)


    图 4-15. 添加磁盘组


    ![A978-1-4302-6266-4_4_Fig14_HTML.jpg](img/A978-1-4302-6266-4_4_Fig14_HTML.jpg)


    图 4-14. ASM 磁盘组


    在进行任何重大更改之前，建议您仔细查看 Oracle 数据库一体机上 `ASM` 及相关 `SAN` 的详细信息。


    现在，让我们深入了解更多关于自动存储管理及其配置方式的内容。


    ### 自动存储管理命令行


    与 `ASM` 交互的另一种方式是通过命令行；用户可以使用 `asmcmd` 命令行工具从命令行访问 `ASM`。为了从命令行访问 `ASM`，用户需要以
    Grid Infrastructure 软件所有者的身份登录操作系统。这通常是 `grid` 用户。代码清单 4-13 展示了以 `grid` 用户登录后如何进入
    `asmcmd` 提示符。


    代码清单 4-13. 从命令行访问 ASM

    ```

    [root@patty bin]# su - grid

    [grid@patty ∼]$ . oraenv

    ORACLE_SID = [grid] ? +ASM1

    The Oracle base has been set to /u01/app/grid

    [grid@patty ∼]$ asmcmd -p

    ASMCMD [+] >

    ```


    需要注意的一点是使用了 `–p` 选项。此选项将在 `ASMCMD` 提示符末尾放置 `[+]`，并且每次更改目录时它都会变化。以这种方式访问 `ASM`
    可以让您查看与数据库相关的文件，并识别 `ASM` 中可能存在的任何问题。在 `Windows` 和 `UNIX` 上与 `ASM` 一起使用的所有命令都是
    `UNIX` 风格的命令。


    ## 本章小结


    在本章中，您了解了如何在 Oracle 数据库一体机上创建和删除数据库。我们快速浏览了如何与 Oracle 的自动存储管理进行交互。如前所述，Oracle
    数据库一体机本质上是一个双节点真正应用集群，可以配置许多不同风格的数据库，并且具有足够的灵活性，使企业能够以最少的资源进行构建和扩展。


    # 5. 网络


    摘要


    对于任何考虑将 `ODA` 作为其公司解决方案的人来说，理解网络部署都很重要。您需要理解 `ODA` 提供的网络，以确定它们如何符合您的需求和数据中心标准。在您的网络规划过程中可能需要考虑安全要求。专用系统的部署通常涉及融合或拓宽工作角色，因为以前由多个团队处理的任务现在被打包到专用系统解决方案中。在公司部署新解决方案时，您很少能简单地将文档交给您的网络和数据中心团队，并要求他们制定网络要求。您可能需要直接参与为部署您的
    `ODA` 准备网络规范，或者至少理解各种选项以回答来自其他团队的问题。本章将帮助您理解您的 `ODA` 网络部署选项。


    对于任何考虑将 `ODA` 作为其公司解决方案的人来说，理解网络部署都很重要。您需要理解 `ODA` 提供的网络，以确定它们如何符合您的需求和数据中心标准。在您的网络规划过程中可能需要考虑安全要求。专用系统的部署通常涉及融合或拓宽工作角色，因为以前由多个团队处理的任务现在被打包到专用系统解决方案中。在公司部署新解决方案时，您很少能简单地将文档交给您的网络和数据中心团队，并要求他们制定网络要求。您可能需要直接参与为部署您的
    `ODA` 准备网络规范，或者至少理解各种选项以回答来自其他团队的问题。本章将帮助您理解您的 `ODA` 网络部署选项。


    ## ODA 型号


    Oracle 发布了两种 `ODA` 型号。这些型号的网络方面存在显著差异。接下来的两个小节将描述这两种型号上可用的网络。'
- fmt: '### Oracle Database Appliance V1 网络配置详解


    ### 硬件概述


    第一代 ODA 产品被称为 Oracle Database Appliance，通常被称为 ODA V1。它是一个单体设备，包含两台标准的 Sun Fire
    X4370 M2 服务器和 24 个磁盘驱动器，其中 20 个用于共享存储。V1 与当前的模块化型号 `X3-2` 占用相同的 4U 机架空间。


    ### 网络配置


    ODA V1 的服务器节点与当前 `X3-2` 型号的区别在于，它包含一个支持 10G 光纤布线的光纤网卡。而新的 `X3-2` 型号目前仅支持铜缆。ODA
    V1 的 10G 光纤网络可以部署为公网或私有备份网络。由于只支持一个 10G 网络，它必须用于公网或备份网络其中之一，不能同时用于两者。


    除了 10G 网络，ODA V1 还支持用于公网的一对绑定的 1G 接口，以及四个额外的 1G 网络接口，可以部署为两个绑定网络用于其他用途。ODA V1
    理论上可以部署为一个 10G 绑定网络和三个额外的 1G 绑定网络，此外还有 `ILOM` 和串行连接。


    10G 光纤网络需要在光纤电缆连接的两端都使用 10G 小型可插拔（`SFP`）收发器。这包括连接到设备上 `PCIe0` 网络端口的连接，以及连接到交换机或网络结构扩展器的光纤电缆连接。例如，一个绑定的
    10G 备份网络需要四条光纤电缆，即每个服务器节点两条。因此总共需要 8 个 `SFP` 适配器，每条光纤网络电缆两个。`SFP` 适配器价格稍高，因此其成本需要计入预算。它们的尺寸和外观类似于普通的
    `USB` 闪存驱动器。


    ODA 的网络接口通常是绑定的。这意味着两个网络接口被组合成一个逻辑单元，由操作系统网络软件组件管理。这提供了网络冗余。每个绑定对的网络电缆可以布线到不同的交换机或网络结构扩展器。这样，如果某个交换机、电缆连接或服务器网络接口发生故障，网络流量将故障转移到仍在工作的接口，以避免网络中断。


    原始 Oracle Database Appliance `V1` 型号部署的网络列于表 5-1。请注意，`ODA V1` 设备有两个服务器节点，每个节点都将包含这些网络接口。


    表 5-1. 原始 ODA 型号部署的网络


    | 网络 | 绑定 / 端口 | 用途 |

    | --- | --- | --- |

    | 10G 光纤 | 绑定: `Xbond0` - 端口: `eth8`, `eth9` (标记为 `PCIe0`) | 两个 10G 光纤端口，可用于公网或备份网络，但不能同时用于两者。
    |

    | 1G 铜缆 | 绑定: `bond0` - 端口: `eth2`, `eth3` (标记为 `net0`, `net1`) | 两个绑定的端口，如果使用，则必须用于公网。
    |

    | 1G 铜缆 | 绑定: `bond1` - 端口: `eth4`, `eth5` (标记为 `PCIe1`) | 一个额外的 1G 网络，如果 10G
    网络用于公网，它可以用作备份网络，或者用于其他目的，例如挂载 `NFS` 存储。 |

    | 1G 铜缆 | 绑定: `bond2` - 端口: `eth6`, `eth7` (也标记为 `PCIe1`) | 一个可按需部署的额外 1G 网络。
    |

    | 管理网络 | `NetMgt` | 用于 `ILOM` 连接的 10/100 Mbps `RJ45` 网络连接。这是一个未绑定的单一连接。 |

    | 串行连接 | `SerMgt` | 此连接用于支持来自外部 `KVM`（键盘、视频、鼠标）设备或您笔记本电脑的串行连接，以便部署 `ODA`。 |


    原始 `ODA V1` 型号还配有一个 `USB` 连接和一个视频端口。


    ### 参考与注意事项


    关于物理设备网络连接的详细信息记录在《ODA 所有者指南》中。当前章节名称为“Attaching Cables and Power Cords”。请记住，`Oracle`
    会为每个新版本季度更新其手册。`Oracle` 文档的结构可能会发生变化。


    在查阅《所有者指南》获取参考信息时，您必须小心。《所有者指南》目前分为两个部分。第一部分涵盖原始的 Oracle Database Appliance 型号。第二部分涵盖后继型号，并标记为“Oracle
    Database Appliance `X3-2`”。


    我们不会在本网络章节中包含太多关于原始 Oracle Database Appliance 型号的信息。`Oracle` 已于 2013 年 4 月停止销售该型号。任何购买此型号的用户应该已经部署了它。此外，该型号已涵盖在
    `Oracle` 手册中。`Oracle` 在手册中保留已停售型号信息的原因很简单：（1）信息不会改变，以及（2）新的 `ODA` 软件版本向后兼容旧型号。例如，当
    `ODA 2.8` 版本发布时，它在原始 `V1` 型号上进行了测试。文档包含在旧型号上部署新版本的任何特殊说明。裸机部署仍然可以在旧型号上进行，并且 `Oracle`
    已更新了 `Oracle Appliance Manager Configurator` 实用程序，其中包含了硬件型号以考虑型号之间的网络差异。'
  raw: '### Oracle Database Appliance V1


    The first ODA model is called the Oracle Database Appliance. It is often referenced
    as ODA V1\. The ODA V1 is a single unit appliance that houses two standard Sun
    Fire X4370 M2 servers and 24 disk drives, 20 of which are used for shared storage.
    The V1 has the same 4u rack space footprint as the current modular model, the
    X3-2.


    The ODA V1 server nodes differ from those in the current X3-2 model in that they
    include a fiber network card that support 10G fiber cabling. The new X3-2 model
    currently only supports copper cabling. The ODA V1 10G fiber network can be deployed
    for either the public network or as a private backup network. Since only one 10G
    network is supported, it has to be used for either the public or backup networks,
    but not for both.


    In addition to the 10G network, the ODA V1 supports a bonded pair of 1G interfaces
    for the public network, and four additional 1G network interfaces that can be
    deployed as two bonded networks for other purposes. The ODA V1 can potentially
    be deployed with one 10G bonded network and three additional 1G bonded networks,
    in addition to the ILOM and serial connections.


    The 10G fiber network requires a 10G small form-factor pluggable (SFP) transceiver
    on both ends of the fiber cable connections. This includes the connection to the
    PCIe0 network port on the appliance, and the connection to the fiber cable connection
    to the switch or network fabric extender. As an example, a bonded 10G backup network
    requires four fiber cables, or two per server node. A total of 8 SFP adapters
    are thus required, at two per fiber network cable. The SFP adapters are a little
    pricey, so their cost needs to be accounted for. They resemble a typical USB flash
    drive in size and appearance.


    The ODA network interfaces are typically bonded. This means that two network interfaces
    are combined together as a single logical unit, managed by the OS networking software
    components. This provides network redundancy. The network cables for each bonded
    pair can be routed to different switches or network fabric extenders. In this
    manner, if a switch, cable connection, or server network interface fails, the
    network traffic will failover to the surviving interface to avoid a network outage.


    The networks deployed for the original Oracle Database Appliance V1 model are
    listed in Table [5-1](#A978-1-4302-6266-4_5_Chapter.html#Tab1). Please note that
    the ODA V1 appliance has two server nodes, and each node will contain these network
    interfaces.


    Table 5-1.


    Networks Deployed on the Original ODA Model


    | Network | Bond / Ports | Usage |

    | --- | --- | --- |

    | 10G Fiber | Bond: Xbond0 - Ports: eth8, eth9 (labeled as PCIe0) | Two 10G fiber
    ports that can be used for either the public network or a backup network, but
    not both. |

    | 1G Copper | Bond: bond0 - Ports: eth2, eth3 (labeled as net0, net1) | Two bonded
    ports that if used, have to be used for the public network. |

    | 1G Copper | Bond: bond1 - Ports: eth4, eth5 (labeled as PCIe1) | An additional
    1G network that could be used as a backup network if the 10G network is used for
    the public network, or as an additional network for other purposes, such as mounting
    NFS storage. |

    | 1G Copper | Bond: bond2 - Ports: eth6, eth7 (also labeled as PCIe1) | An additional
    1G network that can be deployed as needed. |

    | Management | NetMgt | This is the 10/100 Mbps RJ45 network connection for the
    ILOM connection. This is a single, unbonded connection. |

    | Serial connection | SerMgt | This connection is used to support either a serial
    connection from an external KVM (keyboard, video, mouse) appliance or device,
    or from your laptop to deploy the ODA. |


    The original ODA V1 model also comes with a USB connection and video port.


    The details on the physical appliance network connections are documented in the
    ODA Owner’s Guide. The chapter name is currently titled as “Attaching Cables and
    Power Cords”. Keep in mind that Oracle updates their manuals quarterly for each
    new release. The structure of Oracle’s documentation can change.


    You have to be careful when reviewing the Owner’s Guide for reference information.
    The Owner’s Guide is currently split into two sections. Part One covers the original
    Oracle Database Appliance Model. Part Two covers the successor model and is labeled
    “Oracle Database Appliance X3-2.”


    We’re not going to include a lot of information on the original Oracle Database
    Appliance model in this Networking chapter. Oracle stopped selling this model
    in April 2013\. Anyone who purchased this model will have already deployed it.
    In addition, the model is covered in the Oracle manuals. Oracle has retained information
    in the manuals for the models that are no longer sold for two simple reasons:
    (1) the information doesn''t change and (2) the new ODA software releases are
    backward compatible to the older models. For example, when the ODA 2.8 release
    was issued, it was tested on the original V1 model. The documentation includes
    any special instructions for new release deployments on the older models. A bare-metal
    deployment can still be done on the older models, and Oracle has updated the Oracle
    Appliance Manager Configurator utility with the hardware models to account for
    the differences in networks between the models.'
