    # 8. 修补 Oracle 数据库设备


    摘要


    修补是现代 `IT` 组织当今面临的最大挑战之一。修补是一项常规任务，在支持功能性和业务请求之后，很可能耗费了支持团队的大部分精力。它需要投入大量精力来计划、验证、测试和执行修补活动。修补是一项持续进行的活动，旨在解决现有问题，并减少面临其他产品用户发现的潜在问题的风险。修补还简化了与
    Oracle 支持团队协作的工作，以排查贵团队已经遇到或可能在不久的将来遇到的问题。好消息是，Oracle 数据库设备显著减少了将数据库系统保持在当前水平所需的工作量。本章将解释
    Oracle 数据库设备如何应对永无止境的修补挑战，并使其资源消耗显著降低。


    修补是现代 `IT` 组织当今面临的最大挑战之一。修补是一项常规任务，在支持功能性和业务请求之后，很可能耗费了支持团队的大部分精力。它需要投入大量精力来计划、验证、测试和执行修补活动。修补是一项持续进行的活动，旨在解决现有问题，并减少面临其他产品用户发现的潜在问题的风险。修补还简化了与
    Oracle 支持团队协作的工作，以排查贵团队已经遇到或可能在不久的将来遇到的问题。好消息是，Oracle 数据库设备显著减少了将数据库系统保持在当前水平所需的工作量。本章将解释
    Oracle 数据库设备如何应对永无止境的修补挑战，并使其资源消耗显著降低。


    ## 补丁管理简介


    Oracle 数据库设备采用了一种非常简单实用的修补方法。单个补丁即可交付所有系统组件的更新。修补过程是自动化且完全脚本化的。只需几个命令即可修补整个系统，从内部硬盘驱动器固件开始，一直到
    Oracle 数据库补丁结束。Oracle 公司每季度发布一次补丁和补丁捆绑包。这简化了您的规划过程。


    ### 传统系统的局限性


    您可能会问，修补有什么特别之处？只需安装新版本的软件不就行了，对吧？要是那么简单就好了。问题在于，现代服务器是一个复杂的系统。它包含许多可单独更新的组件，从
    `BIOS` 和带外管理适配器开始，一直到操作系统。此外，数据库系统不仅仅由一台服务器组成。还有其他重要的组件需要定期的软件更新，例如网络组件、内部存储、外部存储等等。存储本身可能就是一个复杂的系统。长话短说，数据库系统由十几个或更多需要定期修补的组件组成。


    更新单个组件是一项相对简单的任务。然而，每个组件都与其他组件交互。为确保所有组件都能无问题地运行，管理员或一组管理员应验证所有组件在其当前版本级别的兼容性。带外管理适配器版本应与当前的
    `BIOS` 版本兼容；磁盘和网卡驱动程序应与操作系统版本兼容，依此类推。


    通常，组织内的不同团队负责修补不同的系统组件。例如，存储团队负责存储组件，而网络团队维护网络组件，如集群环境中使用的交换机。系统管理团队负责操作系统修补。修补过程通常被划分为不同的阶段，在每个阶段中，每个团队独立于其他团队计划、测试和执行自己的修补工作。


    在准备修补工作时，执行修补的团队应确保他们将要引入系统的变更不会影响其他组件，如操作系统、集群服务等。为确保兼容性和可支持性，该团队需要确保并验证他们将要安装的新版本与其他团队管理的组件兼容。仅因为需要验证复杂的相互依赖关系，规划阶段就可能耗费大量时间。这种复杂性带来了错误和随后停机的风险。


    采用一次修补一个组件的方法，组织需要引入比能够一次性修补所有系统组件多得多的停机时间。每次修补工作都需要系统停机。每次停机都涉及组织内不同团队之间更多的协调。依赖于待修补组件的应用程序需要停止，这增加了所需的停机时间。修补完成后，系统组件需要逐一启动并进行验证。所有组件启动后，在将系统交付最终用户使用之前，还需要执行一次“冒烟”测试。所有这些步骤都增加了每个组件修补所需的停机时间。然而，如果我们能够一次性修补所有组件，那么我们将显著减少使系统保持最新状态所需的总体停机时间。


    系统及应用测试所需的工作量也是如此。理想情况下，每个变更都应从较低的技术层开始测试，一直到应用和业务测试。与一次性修补所有组件相比，多次修补阶段需要组织内不同团队付出更多的测试工作。

