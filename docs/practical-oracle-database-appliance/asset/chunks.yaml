    许多 IT 团队面临的另一个挑战是，许多补丁活动涉及人工操作步骤。人工步骤会引入人为错误的空间，并使打补丁过程比原本所需的时间更长。一些组织可能决定投入时间和资源来实现补丁步骤的自动化，并使其尽可能独立于人工操作。然而，不同系统组件由不同供应商生产这一事实，使得简化补丁流程的任务颇具挑战。每个组件可能使用不同的补丁技术。对于许多组织来说，投资于补丁自动化可能在经济上不合理，因此他们选择接受并管理与手动打补丁相关的风险。


    传统的系统补丁生命周期还存在规划方面的挑战。不同组件供应商在不同的时间点发布补丁。这种时间上缺乏协调的情况使得几乎不可能将打补丁变成一项常规的例行工作。如果所有组件供应商都能在众所周知的时间间隔内发布补丁，并且彼此同步，这将极大地简化规划。这样，组织内的
    IT 团队就可以建立众所周知的补丁周期和明确的步骤。


    这些以及其他挑战使得现代集群数据库系统的打补丁成为一个非常复杂、耗费时间和资源的过程。这些挑战增加了整体 IT 成本并降低了效率，而现代企业要求的恰恰是相反的结果。


    ### Oracle 数据库一体机的优势


    `Oracle Database Appliance`显著简化和优化了补丁流程。事实上，这是`Oracle Database Appliance`相对于传统集群系统最有价值的优势之一。`Oracle
    Database Appliance`补丁按季度发布，涵盖所有系统组件，从固件一直到`Oracle Database`软件。所谓的`一键打补丁`流程是完全自动化的，并涉及几个简单的步骤。


    系统由一家公司设计、组装和支持，这一事实使得将所有补丁活动合并为一组脚本成为可能。这也简化了规划。Oracle 按季度发布`Oracle Database
    Appliance`补丁。一个组织可以选择其希望应用这些补丁的频率。补丁发布的可预测性及其应用，使得安排补丁周期以及相关的测试、准备、停机时间和其他活动变得容易得多。


    补丁流程由三个阶段组成，这些阶段提供了一定程度的灵活性。例如，应用和功能团队可能决定采用六个月的补丁周期，而基础设施组仍然可以每三个月对基础设施组件打一次补丁。这种跳过交替数据库补丁的方法，如果组织认为有必要，可以减少应用测试活动。


    ## 补丁流程


    以下两个小节讨论`ODA`环境中补丁的总体流程。第一节给出了通常可能遇到的一般性流程。第二节特别关注`ODA`特有的三个步骤。


    ### 一般补丁流程


    图 8-1 展示了`Oracle Database Appliance`一般补丁流程。它与传统的系统补丁周期没有太大区别。与任何系统一样，测试补丁应用过程是`Oracle
    Database Appliance`补丁生命周期中的重要一步。你的团队应熟悉补丁流程步骤，将其记录下来，并在每次打补丁时衡量所需的停机时间。在将补丁移至生产系统之前，功能团队应在测试和开发环境中进行合理数量的测试。


    ![A978-1-4302-6266-4_8_Fig1_HTML.jpg](img/A978-1-4302-6266-4_8_Fig1_HTML.jpg)


    图 8-1. 一般情况下的补丁流程


    我见过一些组织，由于预算有限和其他限制，只购买一台`Oracle Database Appliance`作为生产系统，然后在其他平台上运行测试和开发环境。虽然这是一种可能的设置，但我建议避免这种情况。这种做法的问题是，你无法在将`Oracle
    Database Appliance`补丁应用到生产环境之前对其进行测试和验证。我的建议是至少购买两台`Oracle Database Appliance`，并在测试环境中测试补丁过程，然后再将其应用到生产`Oracle
    Database Appliance`上。


    有人可能认为 Oracle 测试了所有补丁，因此没有必要进行内部补丁测试。问题是，即使是`Oracle Database Appliance`，每个系统也可能略有不同。一些客户可能决定跳过某些补丁。一些客户可能决定稍微自定义配置。一些客户可能使用不同的网络设置。我的建议是在你的特定配置上，在测试环境中测试补丁，并尽一切努力在生产环境中以相同的方式应用该补丁。

