    ![A978-1-4302-6266-4_2_Fig13_HTML.jpg](img/A978-1-4302-6266-4_2_Fig13_HTML.jpg)

    *图 2-13. 选择下一个启动设备*


    电源循环重启后，重定向屏幕将在系统重启时显示控制台消息。消息显示后，裸机镜像过程将开始。图 2-15 显示了该过程的开始。


    ![A978-1-4302-6266-4_2_Fig15_HTML.jpg](img/A978-1-4302-6266-4_2_Fig15_HTML.jpg)

    *图 2-15. Oracle 数据库设备镜像开始*


    安装后过程可能耗时较长。您必须确保在整个过程中与服务器保持稳定的连接。图 2-16 显示了安装后屏幕。


    ![A978-1-4302-6266-4_2_Fig16_HTML.jpg](img/A978-1-4302-6266-4_2_Fig16_HTML.jpg)

