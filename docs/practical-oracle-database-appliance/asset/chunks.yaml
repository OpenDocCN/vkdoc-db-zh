    \ 由十几个不同的软件组件组成。虽然你可以使用每个组件的接口来找出其当前版本，但要找出所有组件版本的最简单方法是使用带有 `-details` 开关的 `oakcli`\
    \ 命令，如下所示：\n\n```\n[root@s1 ∼]# oakcli show version -detail\n\nReading the metadata.\
    \ It takes a while...\nSystem Version Component Name            Installed Version\
    \          Supported Version\n--------------  ---------------           ------------------\
    \        -----------------\n2.6.0.0.0\n                Controller            \
    \    11.05.02.00               Up-to-date\n                Expander          \
    \        0342                      Up-to-date\n                SSD_SHARED    \
    \            E12B                      Up-to-date\n                HDD_LOCAL \
    \                SA03                      Up-to-date\n                HDD_SHARED\
    \                0B25                      Up-to-date\n                ILOM  \
    \                    3.0.16.22.b r78329        No-update\n                BIOS\
    \                      12010310                  No-update\n                IPMI\
    \                      1.8.10.5                  Up-to-date\n                HMP\
    \                       2.2.6.1                   Up-to-date\n               \
    \ OAK                       2.6.0.0.0                 Up-to-date\n           \
    \     OEL                       5.8                       Up-to-date\n       \
    \         OVM                       3.1.1                     Up-to-date\n   \
    \             TFA                       2.5.1.4                   Up-to-date\n\
    \                GI_HOME                   11.2.0.3.6(16056266,      Up-to-date\n\
    \                                            16083653)\n                DB_HOME\
    \                   11.2.0.3.6(16056266,      Up-to-date\n                   \
    \                         16083653)\n                ASR                     \
    \  Unknown                   4.4\n[root@s1 ∼]#\n```\n\n### 审阅补丁说明\n\n在开始下载补丁之前，最好审阅相关说明，了解已知问题的信息。对于像\
    \ Oracle Database Appliance 这样相对较新的产品来说，这一点尤其重要。对于某些版本，有一些特定的步骤需要完成。这些步骤可能会有变动，因此本章提供的打补丁说明仅供参考。你应该通过阅读补丁包的说明来确认这些说明。\n\
    \nMy Oracle Support 说明 “Oracle Database Appliance - 2.X Supported Versions & Known\
    \ Issues (Doc ID 888888.1)” 是一个很好的起点。该说明包含了与打补丁相关的有用信息，从 “Latest Releases” 部分开始，你在其中可以找到最新可用补丁和版本的引用。该说明以\
    \ “Known Issues” 部分结束——阅读这部分也非常重要。\n\n审阅 “Known Issues” 部分，如果任何已知问题影响到你的配置，请做笔记。同一个说明会指引你找到最新的可用补丁包。寻找名称为\
    \ “ORACLE DATABASE APPLIANCE PATCH BUNDLE” 的补丁。在 2.7 版本中，该补丁包是 “Oracle Database\
    \ Appliance Patch 2.7.0.0.0 Patch 16760967.” 图 8-3 显示了该补丁包在说明中是如何提及的。\n\n![A978-1-4302-6266-4_8_Fig3_HTML.jpg](A978-1-4302-6266-4_8_Fig3_HTML.jpg)\n\
    \n图 8-3.\n\n补丁说明 “Latest Release” 部分中列出的补丁包\n\n在下载补丁之前，请研究随附的 README，并密切关注适用于你配置的主要安装步骤以及\
    \ “Known Issues” 部分。记录问题及任何相关的纠正措施。\n\n让我举一个例子说明为什么阅读已知问题列表如此重要。有一个已知问题是，如果 Oracle\
    \ Database Appliance 的一个硬盘驱动器被更换，ASM 可能无法成功启动。这影响到运行 ODA 2.5 之前版本的设备。如果你的系统受影响，请联系\
    \ Oracle Support 以获取修复程序。你的系统可能不受这个特定问题的影响。然而，还有其他几个问题可能适用于你的配置。在开始实际的打补丁过程之前做好这项准备工作很重要——除非，你确实喜欢在第二天早上老板进办公室之前，惊慌失措地通宵修复损坏的系统。\n\
    \n### 下载补丁包集\n\n下载补丁的 zip 文件时，你可能希望使用你的工作站作为暂存点；或者从可以直接访问 My Oracle Support 的暂存服务器下载。如果可以从\
    \ Oracle Database Appliance 节点直接访问 My Oracle Support，那么你可以使用 `wget` 命令将补丁文件直接下载到\
    \ Oracle Database Appliance。\n\n将文件复制到两个 Oracle Database Appliance 节点上的一个目录中。没有必须使用的特定目录；只需使用符合你组织实践的目录，或者根据你的个人喜好选择一个。在解压阶段，更新补丁会被提取并存储在特定的目录结构下。根据根文件系统中的可用空间，在\
    \ `/tmp` 目录中暂存补丁文件可能不切实际（正如一些补丁包的 README 中所建议的那样）。在我们接下来的示例中，我们使用 `/u01/patch_stage/2.7/`\
    \ 目录。"
  raw: '### Virtual Oracle Database Appliance


    We aren’t going to spend too much time talking about the virtual machine (VM)
    option here. However, it is worth mentioning that a VM environment isn’t too different
    from a patching perspective. There is just one additional component to patch during
    the System Infrastructure patching phase, and that is the Oracle VM Server.


    If a patch bundle delivers an Oracle VM Server patch, then all virtual machines
    must be stopped, the main Oracle VM Server host’s (so-called Dom0 host) operational
    system must be patched, and the whole server must be restarted.


    As with any patching, you should spend time carefully looking through the patch
    bundle’s README file to make sure that you complete all the additional steps related
    to VM configuration. Some of the earlier patch bundles came with instructions
    for patching-related activities that are specific to the VM configuration.


    The other important thing to know is that all patching activities—for example,
    patch staging, unpacking, apply, and so forth—are to be executed from within the
    so-called Oracle Database Appliance Base Virtual Machine. Oracle engineers carefully
    design VM patches to make sure that they can be successfully applied from a running
    VM before restarting the Oracle VM Server.


    The two items I’ve just mentioned are the only important differences between the
    bare metal patching process and the VM configuration patching process. Keep in
    mind that the system requires a small amount of full downtime for the System Infrastructure
    patching phase in either configuration. Therefore, there is no significant difference
    in that regard. The VM option may require perhaps ten minutes more downtime than
    the bare metal option, because the Oracle VM Server is an additional element that
    must be patched.


    ## Preparation


    The first step in the patching process is preparation. It’s an important step
    unless you enjoy all-nighters. Don’t shortchange it. Among other generic activities
    associated with traditional system patching, the following are some things to
    check, and then to do during the planning part of the ODA patching process.


    ### Verify the Release Level


    Before you update an Oracle Database Appliance to the latest release, you should
    be sure you know the current release that you are running. The easiest way to
    retrieve the information is to execute an `oakcli` command, as follows:


    `[root@s1 ∼]# oakcli show version`


    `Version`


    `-------`


    `2.6.0.0.0`


    The Oracle Database Appliance consists of over a dozen different software components.
    While you can use each component’s interface to find out its current version,
    the easiest way to find all components’ versions is to issue the `oakcli` command
    with the `-details` switch, as follows:


    `[root@s1 ∼]# oakcli show version -detail`


    `Reading the metadata. It takes a while...`


    `System Version Component Name            Installed Version         Supported
    Version`


    `--------------  ---------------           ------------------        -----------------`


    `2.6.0.0.0`


                    `Controller                11.05.02.00               Up-to-date`


                    `Expander                  0342                      Up-to-date`


                    `SSD_SHARED                E12B                      Up-to-date`


                    `HDD_LOCAL                 SA03                      Up-to-date`


                    `HDD_SHARED                0B25                      Up-to-date`


                    `ILOM                      3.0.16.22.b r78329        No-update`


                    `BIOS                      12010310                  No-update`


                    `IPMI                      1.8.10.5                  Up-to-date`


                    `HMP                       2.2.6.1                   Up-to-date`


                    `OAK                       2.6.0.0.0                 Up-to-date`


                    `OEL                       5.8                       Up-to-date`


                    `OVM                       3.1.1                     Up-to-date`


                    `TFA                       2.5.1.4                   Up-to-date`


                    `GI_HOME                   11.2.0.3.6(16056266,      Up-to-date`


                                              `16083653)`


                    `DB_HOME                   11.2.0.3.6(16056266,      Up-to-date`


                                              `16083653)`


                    `ASR                       Unknown                   4.4`


    `[root@s1 ∼]#`


    ### Review the Patch Notes


    Before you start downloading a patch, it is a good idea to review related notes
    for information about known issues. This is specifically true for such a relatively
    new product as the Oracle Database Appliance. For some releases, there are some
    specific steps to complete. The steps are subject to change, and therefore the
    patching instructions provided in this chapter are for reference only. You should
    confirm those instructions by reading a patch bundle’s notes.


    The My Oracle Support note “Oracle Database Appliance - 2.X Supported Versions
    & Known Issues (Doc ID 888888.1)” is a good starting point. The note contains
    useful information relative to patching, starting with the “Latest Releases” section,
    in which you find references to the latest patches and versions available. The
    note ends with a “Known Issues” section—also very important to read.


    Review the known issues section and make notes if any of the known issues affect
    your configuration. The same note points you to the latest patch bundle available.
    Look for the patch with the name “ORACLE DATABASE APPLIANCE PATCH BUNDLE”. In
    version 2.7, that bundle is “Oracle Database Appliance Patch 2.7.0.0.0 Patch 16760967.”
    Figure [8-3](#A978-1-4302-6266-4_8_Chapter.html#Fig3) shows how the bundle is
    mentioned in the note.


    ![A978-1-4302-6266-4_8_Fig3_HTML.jpg](A978-1-4302-6266-4_8_Fig3_HTML.jpg)


    Figure 8-3.


    A patch bundle listed in the “Latest Release” section of a patch note


    Before downloading a patch, study the README that accompanies it, and pay close
    attention to the main installation steps applicable to your configuration and
    to the “Known Issues” section. Note the issues and any related corrective actions.


    Let me give an example of why it is so important to read the known issues listing.
    There is a known issue in which ASM may not start successfully if one of the Oracle
    Database Appliance’s hard drives has been replaced. This affects appliances running
    ODA versions prior to version 2.5\. If your system is affected, contact Oracle
    Support to obtain a fix. Your system may not be affected by this particular issue.
    However, there are a few other issues that may be applicable to your configuration.
    It is important to do this homework before you start the actual patching process—unless
    that is, you enjoy staying up all night in a blind panic while trying to repair
    a broken system before your boss gets into the office the next morning.


    ### Download the Patch Bundle Set


    You may want use your workstation as a staging point when downloading a patch’s
    zip file; or download from a staging server with direct access to My Oracle Support
    ( [`https://updates.oracle.com`](https://updates.oracle.com/) ). If My Oracle
    Support is accessible directly from the Oracle Database Appliance nodes, then
    you can download the patch file directly to the Oracle Database Appliance using
    the `wget` command.


    Copy the file into a directory on both Oracle Database Appliance nodes. There
    is no particular directory that you must use; just use one that is in line with
    your organization’s practice, or use your personal preferences. During the unpacking
    stage, the update patches are extracted and stored under a particular directory
    structure. Depending on the free space available in the root file system, it may
    not be practical to stage the patch file in the `/tmp` directory (as has been
    suggested in some patch bundles READMEs). In our example to follow, we use the
    `/u01/patch_stage/2.7/` directory.'
  trans: "\n## 虚拟 Oracle 数据库设备\n\n我们不会花太多时间讨论这里的虚拟机选项。然而，值得注意的是，从打补丁的角度来看，虚拟机环境并没有太大不同。在系统基础设施打补丁阶段，只需要额外处理一个组件，那就是\
    \ Oracle VM Server。\n\n如果某个补丁包提供了 Oracle VM Server 补丁，那么必须停止所有虚拟机，对主 Oracle VM\
    \ Server 主机的操作系统进行打补丁，然后重新启动整个服务器。\n\n与任何打补丁操作一样，你应该花时间仔细阅读补丁包的 README 文件，以确保完成与虚拟机配置相关的所有额外步骤。一些早期的补丁包附带了针对虚拟机配置的特定打补丁活动说明。\n\
    \n另一件重要的事情是，所有的打补丁活动——例如，补丁暂存、解压、应用等等——都必须在所谓的 Oracle Database Appliance 基础虚拟机内执行。Oracle\
    \ 工程师精心设计虚拟机补丁，以确保它们可以在虚拟机运行时成功应用，然后再重新启动 Oracle VM Server。\n\n我刚刚提到的这两点，是裸金属打补丁过程与虚拟机配置打补丁过程之间唯一重要的区别。请记住，无论在哪种配置中，系统在系统基础设施打补丁阶段都需要一小段完全停机时间。因此，在这方面没有显著差异。虚拟机选项可能比裸金属选项多需要大约十分钟的停机时间，因为\
    \ Oracle VM Server 是一个必须打补丁的额外元素。\n\n## 准备工作\n\n打补丁过程的第一步是准备。除非你喜欢通宵工作，否则这是一个重要的步骤。不要敷衍了事。除了与传统系统打补丁相关的常规活动外，在\
    \ ODA 打补丁过程的规划部分，以下是一些需要检查和执行的事项。\n\n### 验证发布级别\n\n在将 Oracle Database Appliance\
    \ 更新到最新版本之前，你应该确保知道当前运行的版本。最简单的方法是执行一个 `oakcli` 命令，如下所示：\n\n```\n[root@s1 ∼]#\
    \ oakcli show version\n\nVersion\n-------\n2.6.0.0.0\n```\n\nOracle Database Appliance\
    \ 由十几个不同的软件组件组成。虽然你可以使用每个组件的接口来找出其当前版本，但要找出所有组件版本的最简单方法是使用带有 `-details` 开关的 `oakcli`\
    \ 命令，如下所示：\n\n```\n[root@s1 ∼]# oakcli show version -detail\n\nReading the metadata.\
    \ It takes a while...\nSystem Version Component Name            Installed Version\
    \          Supported Version\n--------------  ---------------           ------------------\
    \        -----------------\n2.6.0.0.0\n                Controller            \
    \    11.05.02.00               Up-to-date\n                Expander          \
