    ### 升级日志文件


    OAK 补丁进程会为每个正在打补丁的组件启用特定于组件的日志记录。生成的日志文件可在各节点的 `/opt/oracle/oak/log/<hostname>/patch/<patch
    bundle number>` 目录下找到。例如，您可能会看到以下输出：


    ```bash

    [root@s1 DB]# cd  /opt/oracle/oak/log/s1/patch/2.7.0.0.0/

    [root@s1 2.7.0.0.0]# ls -lptr

    total 480

    -rw-rw-rw- 1 root root    136 Aug 21 14:46 prepatch_63726.log

    -rw-rw-rw- 1 root root  29851 Aug 21 15:23 gidbupdate_64341.log

    -rw-rw-rw- 1 root root   962 Aug 21 15:24 postpatch_96328.log

    -rw-rw-rw- 1 root root   1188 Aug 21 15:56 createdbhome_77208.log

    -rw-rw-rw- 1 root root   2608 Aug 21 16:18 createdbhome_19153.log

    -rw-rw-rw- 1 root root   3669 Aug 21 16:26 createdbhome_25925.log

    -rw-rw-rw- 1 root root   1873 Aug 21 16:35 dbupgrade_82891.log

    -rw-rw-rw- 1 root root    136 Aug 21 16:40 prepatch_99697.log

    -rw-rw-rw- 1 root root   6891 Aug 21 16:42 gidbupdate_100387.log

    -rw-rw-rw- 1 root root    136 Aug 21 16:49 prepatch_5847.log

    -rw-rw-rw- 1 root root  32179 Aug 21 17:02 gidbupdate_6662.log

    -rw-rw-rw- 1 root root  24107 Aug 21 17:08 prepatch_32337.log

    -rw-rw-rw- 1 root root  12625 Aug 21 17:12 hmpupdate_6051.log

    -rw-rw-rw- 1 root root   1156 Aug 21 17:13 oakupdate_6970.log

    -rw-rw-rw- 1 root root   5230 Aug 21 17:15 tfa_7629.log

    -rw-rw-rw- 1 root root 178928 Aug 21 17:26 ospatch_7330.log

    -rw-rw-rw- 1 root root    181 Aug 21 17:26 asrupdate_345.log

    -rw-rw-rw- 1 root root   1475 Aug 21 17:26 ipmiupdate_361.log

    -rw-rw-rw- 1 root root  24435 Aug 21 17:26 storage_407.log

    -rw-rw-rw- 1 root root    500 Aug 21 17:37 ipmiupdate_12318.log

    -rw-rw-rw- 1 root root    511 Aug 21 17:37 hmpupdate_12078.log

    -rw-rw-rw- 1 root root   1813 Aug 21 17:37 storage_12321.log

    -rw-rw-rw- 1 root root   1281 Aug 21 17:37 ilombios_12513.log

    -rw-rw-rw- 1 root root   2410 Aug 21 17:41 ovspatch_12553.log

    -rw-rw-rw- 1 root root   1496 Aug 21 17:46 postpatch_23166.log

    ```


    此目录是一个很好的起点。然而，每个单独打补丁的组件可能会生成额外的特定日志文件。例如，操作系统升级工具 `yum` 会将活动报告到 `/var/log/yum.log`
    文件中。从实际角度来看，知道在需要时从何处查找额外信息非常有用。


    ### 升级系统基础设施


    在系统基础设施升级步骤期间，整个集群将不可用。所有数据库都将由补丁工具停止，并在升级期间保持关闭状态。它们将在过程结束时重新启动。


    您通过在第一台节点上执行以下命令来启动系统基础设施升级。该命令需要以 `root` 用户身份执行：


    ```bash

    cd /opt/oracle/oak/bin/

    oakcli update -patch  2.7.0.0.0 -infra

    ```


    根据补丁更新的组件，此阶段可能需要重新启动服务器。如果补丁包更新了需要重启的组件（如 ILOM/BIOS 或存储固件），Oracle 数据库一体机节点将会重启。


    ### 升级 Grid 基础设施


    Grid 基础设施是**真正的应用集群** 的一个关键组件。它提供了在集群配置中运行 Oracle 数据库所需的服务，并确保这些服务及其他相关服务的高可用性。补丁工具以**滚动方式**
    升级 Grid 基础设施。这意味着它一次停止并更新一个 Oracle 数据库一体机节点，而另一个节点上的数据库实例仍然可用（不用说，这要求数据库处于 `RAC`
    模式，并且两个实例都需要处于启动状态）。打补丁通过以下命令开始：


    ```bash

    oakcli update -patch  2.7.0.0.0 -gi

    ```


    请注意，在当前版本中，补丁工具在停止实例时不会给出任何通知。因此，依赖数据库服务的应用程序应该能够处理实例故障并重新连接到另一个实例。否则，您将需要重新启动应用程序，而这会引入停机时间。如果
    Grid 基础设施补丁过程顺利完成，所有数据库实例和其他服务应在两个 ODA 节点上保持运行状态，与打补丁前的状态完全相同。


    ### 数据库升级


    在此阶段，我们确实已将所有系统级基础设施组件更新到目标版本。下一步是更新在 Oracle 数据库一体机上运行的数据库。OAK 工具显著简化了这一数据库升级过程。您实际上可以通过运行一条命令来升级一个或一组数据库。所有实际活动都由
    OAK 工具响应这一条命令来完成。


    管理员可以规划和执行数据库升级活动的方式有两种。一种是实施默认升级过程，该过程会升级系统上的所有 Oracle 主目录和数据库。另一种是执行逐个升级每个数据库的方法。以下部分描述了这两个选项。


    #### 升级所有数据库


    要更新所有 Oracle 主目录和关联的数据库，请在 root 操作系统用户下运行以下命令。该命令会将所有数据库更新到补丁包提供的最新版本。


    ```bash

    oakcli update -patch  2.7.0.0.0  --database

    ```


    OAK 工具将询问您是要更新所有 Oracle 主目录，还是选择特定的主目录进行更新。


    ```text

    Found the following 11.2.0.3 homes possible for patching:

    HOME_NAME                      HOME_LOCATION

    ---------                      -------------

    OraDb11203_home1               /u01/app/oracle/product/11.2.0.3/dbhome_1

    OraDb11203_home2               /u01/app/oracle/product/11.2.0.3/dbhome_2

    [Please note that few of the above database homes may be already up-to-date. They
    will be automatically ignored]

    Would you like to patch all the above homes: Y | N ? :Y

    ```


    您可以更新所有列出的 Oracle 主目录，也可以更新特定的主目录和关联的数据库。OAK 工具将以**滚动方式** 修补 Oracle 主目录和数据库。在任何时间点，如果您使用的是
    `RAC` 或 `RAC` 单节点选项，至少有一个数据库实例是可用的。单个实例将在修补会话期间停止。

    '
- fmt: '### Upgrading One by One


    If you would like to have more granular control over the databases that are going
    to be updated, you may want to configure each database to be associated with a
    separate Oracle Home rather run all databases under one Oracle Home. The following
    steps demonstrate how to upgrade one-by-one CAT and a DOG databases using OAK
    utility in a fully automated way:


    ```

    # Show all current Oracle Homes

    oakcli show dbhomes –detail


    Oracle HomeName       Oracle Home Version                  Oracle HomeLocation                                        Database
    Name    Database Type

    ----------------      ---------------------                ---------------------------------------                 ---------------  -----------

    OraDb11203_home1      11.2.0.3.7(16619892,16742216)        /u01/app/oracle/product/11.2.0.3/dbhome_1                CAT              RAC

    OraDb11203_home2      11.2.0.3.7(16619892,16742216)        /u01/app/oracle/product/11.2.0.3/dbhome_2                DOG              RACOneNode


    # Update dbhome_1 that executes CAT database

    oakcli update -patch 2.7.0.0.0 --database

    ...

    Would you like to patch all the above homes: Y | N ? :N

    ...

    Please enter the comma separated list of database home_names that you do NOT want
    to patch: OraDb11203_home2

    ...

    ........done


    # At this stage the CAT database is updated to the latest version. The DOG database
    is still on the previous version.


    # Update dbhome_2 that executes DOG database

    oakcli update -patch 2.7.0.0.0 --database

    ...

    Would you like to patch all the above homes: Y | N ? :N

    ...

    Please enter the comma separated list of database home_names that you do NOT want
    to patch: OraDb11203_home1

    ...

    ........done

    ```


    If you would like to update databases one by one, you should ensure that each
    database is running under its own Oracle Home before you start applying an Oracle
    Database Appliance patch bundle. The Oracle Database Appliance doesn’t allow you
    to create previous versions Oracle Homes after you installed the new System and
    Grid infrastructures. Therefore, it is important to separate databases to be executed
    under different Oracle Homes if you would like to patch them separately before
    you start applying an ODA patch bundle. For instructions on how to move an Oracle
    Database to be executed under a dedicated Oracle Home, please see the “Delayed
    RDBMS Update” section from earlier in this chapter. After the Infrastructure components
    are updated to a new version (in this case, 2.7), we update the Oracle Homes and
    their associated databases.


    The other option to consider is to move databases one by one in between a previous
    Oracle Home version and a target Oracle Home representing the new version. Such
    moves must be done manually, executing patching steps necessary to update each
    database after you move it. In this case, you just follow generic Oracle database
    patch guidelines to update an Oracle database from the source Oracle Home version
    to the destination version. The advantage of this method is that you need just
    two homes: one for the source and another for the destination. If you script and
    test all upgrade steps carefully, the timing of the database patching steps may
    be comparable or even shorter than the OAK-automated update. However, you may
    find yourself investing significantly more effort by implementing that approach.


    ## Summary


    The Oracle Database Appliance patching is a straightforward process. It significantly
    reduces the amount of time and resources necessary to keep the Oracle clustered
    system up to the current patch version. In a simple case, it is possible to update
    all the system’s components by executing three simple commands within a two-hour
    maintenance window. The fact that Oracle releases the Oracle Database Appliance
    patch bundles on a quarterly basis significantly simplifies maintenance efforts
    and the associated resource planning. With the Oracle Database Appliance, an organization
    doesn’t need to involve several groups—such as storage, system administration,
    networking, and database administration—to keep the clustered system up to date.
    The ODA thus delivers a significant economic advantage over traditional systems.


    Footnotes [1](#A978-1-4302-6266-4_8_Chapter.html#Fn1_source)


    Information about the latest Oracle Database Appliance patch available from the
    My Oracle Support Note 888888.1


    [2](#A978-1-4302-6266-4_8_Chapter.html#Fn2_source)


    Please note that Data Guard configuration is out of scope of that book. You can
    reference an Oracle White Paper “Deploying Oracle Data Guard with Oracle Database
    Appliance” for additional information.


    # 9. Business Values for the ODA


    Abstract


    In September 2011, Oracle announced the availability of the Oracle Database Appliance
    as an innovative, entry-level engineered system optimized for databases. The announcement
    promised easy deployments, pay-as-you-grow licensing, and single-vendor support.


    When a new technology is introduced, and business interest builds, someone within
    a company will ask the question: “Is this a better solution than the way we do
    things today?”. The first step in answering this question and overcoming resistance
    to change is investigating the business case for the new technology. The Oracle
    Database Appliance has become a very successful product in the Oracle engineered
    systems product line. This chapter outlines the business benefits offered by ODAs,
    which you can use to consider the business case for deploying an ODA solution
    and assessing any potential technology risks.'
