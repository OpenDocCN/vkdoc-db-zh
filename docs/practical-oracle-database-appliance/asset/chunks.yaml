    ## Oracle 数据库一体机初始部署


    一旦 Oracle Linux 操作系统的裸金属安装完成，您需要登录到其中一个节点的控制台，并使用`firstnet`命令对 Oracle 数据库一体机网络进行初始配置。该命令允许您在首次使用时为
    Oracle 数据库一体机建立网络接口。


    注意


    在运行`firstnet`之前，您应该分配所需的互联网协议（`IP`）地址，并验证其在域名服务（`DNS`）中的条目已完成。如果您在收集或分配`IP`地址方面需要帮助，请联系您当地的系统管理员。


    ### ILOM 网络


    Oracle Integrated Lights Out Manager（`ILOM`）运行在服务处理器（`SP`）上，用于硬件安装、维护和故障排除。Oracle
    数据库一体机上的每个节点都有一个专用的`SP`，并配有一个专用的 10/100BaseT 端口。


    ### 网络信息


    每个 Oracle 数据库一体机节点都需要访问外部网络；一体机背面有多个以太网端口来建立这些连接。支持公共网络访问的绑定通过连接到每个 Oracle 数据库一体机上`net0`和`net1`端口的线缆实现冗余连接。本章中的示例将基于名为“ejb”的
    Oracle 数据库一体机。表 3-4 说明了需要在一体机两个节点上为`bond0`建立的内容。


    注意


    请注意，您只需关注两个节点上的`bond0`接口。使用`firstnet`工具时会配置`bond0`接口。


    表 3-4. node0 的互联网协议信息


    | 节点 | 绑定名称 | IP 地址 | 网络掩码 | DNS 条目 |

    | --- | --- | --- | --- | --- |

    | 0 | `bond0` | 172.30.0.20 | 255.255.255.0 | ejb1.m57.local |

    | 1 | `bond0` | 172.30.0.21 | 255.255.255.0 | ejb2.m57.local |


    Oracle 数据库一体机还使用常规网络资源，如`DNS`、网关和网络时间协议（`NTP`）。表 3-5 展示了这些资源的配置示例。


    表 3-5. Oracle 数据库一体机的附加资源


    | 资源 | 条目 |

    | --- | --- |

    | `DNS`服务器 | 172.16.11.215 |

    | `DNS`后缀 | m57.local |

    | `DNS`搜索顺序 | m57.local |

    | `NTP`服务器 | 172.30.0.1 |

    | 默认网关 | 172.30.0.1 |

    | SMTP 中继 | 172.30.0.1 |

