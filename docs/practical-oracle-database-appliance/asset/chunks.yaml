- fmt: '### Specific ODA Steps


    Figure [8-2](#A978-1-4302-6266-4_8_Chapter.html#Fig2) illustrates the Oracle Database
    Appliance’s patching steps. There are three main steps involved. We’ll describe
    them briefly in this section, and then in more detail in later sections. Depending
    on your business requirements, each of the three main patching steps can be separated
    in time from the others.


    ![A978-1-4302-6266-4_8_Fig2_HTML.jpg](A978-1-4302-6266-4_8_Fig2_HTML.jpg)


    Figure 8-2. ODA’s patching steps


    System infrastructure components like disks, firmware, BIOS, and the operational
    system are patched first. The `System Infrastructure` patching step requires full
    system downtime. All database instances and the `Grid Infrastructure` processes
    are stopped during the patching.


    Each quarterly release, the Oracle Database Appliance patch bundle may contain
    patches for different sets of system infrastructures components. For example,
    a given release might contain patches for the Storage Expander, ILOM, BIOS, and
    OVM. As mentioned, it is possible to skip some of the patch bundles. Helpfully,
    each of the Oracle Database Appliances patch bundles is cumulative. An ODA customer
    may skip one or several patch bundles. However, the number of system components
    to be patched in such a case is potentially higher than would be the case when
    you patch each bundle. Patching downtime can increase depending on the number
    of system components to be updated.


    Based on our current experience, the total downtime for `System Infrastructure`
    patching generally falls between 45 and 80 minutes. The Oracle Database Appliance’s
    nodes may be rebooted as part of the update of components like OS, OVM, or storage.
    It is essential for critical systems to have a test run on a test environment
    to measure the total downtime from the patch bundle and to verify whether node
    reboots are required.


    After the system infrastructure is updated, the `Grid Infrastructure` needs to
    be patched. At the time of writing, all Oracle Database Appliance patch bundles
    apply `Grid Infrastructure` updates in a rolling fashion. This means that one
    of the two nodes is available during the update, and all the database services
    are up and running on the other node. No downtime is involved.


    The next and final stage is the databases upgrade. Several options are available
    for how to approach this task. Some organizations may decide to skip the database-patching
    step each alternate quarter, and patch databases once in six months, thus saving
    time on application testing while still keeping their system infrastructure up
    to date. Other organizations may patch their databases at the same time as they
    apply infrastructure patches. Some organizations may separate the infrastructure
    and databases updates. Such separation allows one to take the whole system down
    for just the infrastructure patching, and then bring the system up and complete
    the remaining updates in a rolling fashion. The ODA provides the flexibility,
    allowing you to choose your own approach to patching depending on your organizational
    requirements.


    ## Timing


    There are two aspects to timing. The first is the question of how often to patch.
    We’ve touched on that already by mentioning that some organizations apply only
    every alternating patch. The other aspect to consider is how long an individual
    patch application takes. If one is to apply a patch, one should have an idea as
    to how long the target system will be offline.


    ### How Often to Patch


    Oracle releases Patch Set Updates (`PSU`) and Security Patch Updates (`SPU`)—the
    `SPU`s are better known as Critical Patch Updates (`CPU`)—for Oracle Database
    products on a quarterly basis. The `SPU` is a smaller set of changes focused on
    critical issues only. `PSU`s include `SPU`s plus additional fixes. Oracle suggests
    choosing one of the following practices:


    *   Apply `SPU`s on top of a base release to minimize the amount of change applied
    between one main release and the next.

    *   Implement `PSU`s on a regular basis to make sure that all critical and security
    fixes are applied.


    The Oracle Database Appliance adopts the `PSU`’s patch cycle. An Oracle Database
    Appliance patch bundle is released shortly after a `PSU` patch is released. It
    is worth mentioning that Oracle Database is just one component that is included
    in the Oracle Database Appliance patch bundles. However, it is one of the main
    components. Therefore, Oracle’s adoption of the `PSU` patch cycle for the ODA
    makes a lot of sense.


    Oracle’s regular patch releases simplify your patch planning and aid in flexibility.
    Some customers may find quarterly patching too aggressive and choose to skip applying
    one or more of the Oracle Database Appliances patch bundles. The important point
    here is that the regular patch releases allow organizations to introduce regular,
    well known, and planned patching cycles into their environments. That simplifies
    a lot of things, including the scheduling of human resources for implementation
    and testing, making the patching a well-known routine rather than a one-off activity
    triggered by a critical problem in a production system. The resulting, regular
    application of patches proactively protects database systems from potentially
    dangerous issues and unnecessary downtime. Stability of the production environment
    is improved.


    ### How Long It Takes to Patch


    Table [8-1](#A978-1-4302-6266-4_8_Chapter.html#Tab1) gives you an approximate
    idea of the timing involved in each patching step. The table also indicates whether
    a given step requires full system downtime, and whether it requires a reboot.
    Table [8-1](#A978-1-4302-6266-4_8_Chapter.html#Tab1) is just a general guide to
    give you the lay of the land. You should measure patching time yourself. Measure
    it for each phase in a test system before you apply a patch to a production system.


    Table 8-1. Downtime Estimates by Phase


    | Phase | Full Downtime | Requires Reboot | Approximate Time (min) |

    | :--- | :--- | :--- | :--- |

    | `System Infrastructure` | Yes | Possible | 45–80\* |

    | `Grid Infrastructure` | No (rolling upgrade) | No | 45–60 |

    | Databases | No (rolling upgrade) | No | 10–20\*\* |


    \* Depends on the number of components to be updated by the patch bundle


    \*\* Depends on the number of databases that are involved


    Please note that each of the patching steps can be separated in time. It is not
    necessary to perform all three steps in quick succession. The database upgrade
    phase allows some flexibility. You can execute the steps individually at time
    intervals that are comfortable for your business.


    ## ODA Patching Options


    Different options are available to you depending upon your business needs. Read
    the following sections to learn more about your options and when they might be
    best used.'
