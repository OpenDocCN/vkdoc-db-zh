- fmt: '# How Did the Oracle Database Appliance (ODA) Come Into Being?


    That''s a good question, and I''d like to share some of the history, motivation,
    and thought-process behind the appliance''s creation.


    We in the the Real Application Clusters (`RAC`) development group at Oracle were
    striving to make `RAC` a more broadly adopted technology. Oracle `RAC` saw rapid
    adoption and growth in its first decade (2001 through 2011) in the market, but
    many mid-market customers were avoiding `RAC` for reasons of perceived complexity
    and cost. While `RAC` was common and accepted in large, enterprise environments,
    Oracle’s mid-market customers did not have a simple and affordable `RAC` database
    solution.


    In early 2010, Oracle acquired Sun Microsystems and a new world of possibilities
    opened up. Sun had a Cluster-in-a-Box hardware system that wasn’t yet commercially
    available. It had server, storage, and networking in an attractive, 4U-size form
    factor. That system proved to be the simplest way to deploy `RAC`. Using it, we
    were able to deploy `RAC` in 55 minutes!


    On went the light bulbs. This Cluster-in-a-Box was truly the answer to our “`RAC`
    for the Masses” dream. We developed the `Appliance Manager` software to simplify
    and automate deployment, patching, and storage management. That software together
    with the appliance made `RAC` implementation dead-simple. And that is how the
    `ODA` was born.


    Our next challenge was cost. What’s the use of inexpensive hardware if software
    costs break the bank? This is the challenge that we had to overcome in order to
    make our `RAC`-in-a-Box solution attractive to mid-market customers. Could cluster
    hardware and `RAC` database software be purchased and deployed for under $100,000?
    With the support of Oracle’s executive management, the `ODA` became Oracle’s first,
    capacity-on-demand system. In other words, customers could buy in at a low price,
    and then turn on more cores and add license features as their needs grew. That
    approach is what made sub-$100,000 Oracle `RAC` systems a real possibility.


    Early customers raved about the simplicity of the `ODA`. Many `RAC` skeptics were
    converted. Several customers adopted `ODA` as a standard. But like it usually
    happens, customers soon wanted more! With each generation of `ODA`, the CPU, memory,
    and storage capacities grew. Customers wanted to also put their applications inside
    the `ODA`. And that’s why we built the `ODA` Virtualized Platform. The database
    could run in its own virtual machine (`VM`), and customer applications could run
    in their own `VM`s. Customers could pay for what they used at each tier, with
    full application and database isolation security. Hence the concept of a Solution-in-a-Box
    was born. People started thinking of the `ODA` as a modern-day `AS/400`.


    Fuad Arshad is one of the authors on this book, and it is my pleasure to say a
    few words about him. I first met Fuad when he was my customer. It was one afternoon
    in which Fuad deployed four `ODA`s end-to-end, and had Oracle `RAC` running on
    all of them. He literally couldn’t believe it. He understood that he had just
    accomplished in one afternoon what his organization had previously taken months
    to do. He understood that this was a paradigm shift in deploying Oracle and `RAC`.
    For him and his organization, it changed the game, and the requests kept pouring
    in to him: “Can I have an `ODA`, please?”.


    Fuad and his team mates followed `ODA` with a fever that I have rarely seen among
    customers. Fuad quickly became one of the most knowledgeable people on the technology
    and our most valuable customer-feedback asset. He tested everything relating to
    `ODA`. He blogged about it. He spoke at user conferences. Fuad’s fever has driven
    him to write about a subject for which he oozes passion. And that is true of his
    coauthors too. I wish them well, and every success with their book.


    Sohan DeMel


    Vice President, Product Strategy and Business Development


    Oracle Corporation


    ## About the Authors


    ![A978-1-4302-6266-4_BookFrontmatter_Fig1_HTML.jpg](A978-1-4302-6266-4_BookFrontmatter_Fig1_HTML.jpg)
    Bobby L. Curtis, MBA, has spent 18 years in information technology, 12 of which
    he has been using Oracle products. He specializes in database monitoring and data
    integration technologies, both aimed at making usability simpler and easier. Currently,
    he is working as a senior technical consultant focused on implementations and
    migrations of scalable databases while providing monitoring solutions for these
    environments. Bobby is a member of the Independent Oracle User Group (`IOUG`),
    the Oracle Development Tools User Group (`ODTUG`), the Georgia Oracle User Group
    (`GOUSER`), and the Rocky Mountains Oracle User Group (`RMOUG`). He lives with
    his wife and three kids in Douglasville, GA. Bobby is honing his technical skills
    at Enkitec ([`www.enkitec.com`](http://www.enkitec.com/)). He can be followed
    on Twitter at `@dbasolved` and his blog at [`http://dbasolved.com`](http://dbasolved.com/).


    ![A978-1-4302-6266-4_BookFrontmatter_Fig2_HTML.jpg](A978-1-4302-6266-4_BookFrontmatter_Fig2_HTML.jpg)
    Fuad Arshad is a senior database architect who has worked with Oracle Database
    technologies for more than 16 years. He has experience in all aspects of Oracle
    Database, from management to tuning, and he is an Oracle Certified Expert. He
    frequently blogs about Oracle at [`http://www.fuadarshad.com`](http://www.fuadarshad.com/#_new).
    Fuad participates in online forums and social media. He is an active Twitter user,
    and you can find him there at [`http://www.twitter.com/fuadar`](http://www.twitter.com/fuadar#_new).
    Fuad has presented at conferences such as Collaborate and Oracle OpenWorld on
    topics ranging from Oracle Real Application Clusters to Oracle Database Appliance.
    Fuad currently works for Oracle Corporation in its North American Sales organization.
    He is husband to Saba, and Father to Areej and Ammaar, whom he tries to spend
    all of his non Oracle related time with.


    ![A978-1-4302-6266-4_BookFrontmatter_Fig3_HTML.jpg](A978-1-4302-6266-4_BookFrontmatter_Fig3_HTML.jpg)
    Erik Benner is a solution architect with BIAS Corp., where he focuses on solutions
    that meet the customers'' business needs. Erik worked with the Oracle Database
    Appliance prior to its official release, and continues to discover new ways to
    leverage the technology as not only a database server, but also as an application
    system when virtualized. Erik is a common speaker at Oracle events, focusing on
    the areas of Oracle Database Appliance, Linux, and virtualization. When not working,
    Erik enjoys spending time with his family at their observatory, where the telescopes
    outnumber the people.


    ![A978-1-4302-6266-4_BookFrontmatter_Fig4_HTML.jpg](A978-1-4302-6266-4_BookFrontmatter_Fig4_HTML.jpg)
    Maris Elsins is an experienced Oracle Applications DBA currently working as team
    technical lead at The Pythian Group. His main areas of expertise are troubleshooting
    and performance tuning of Oracle Database and e-Business Suite systems. Maris
    has led or taken part in numerous Oracle e-Business Suite implementation, maintenance,
    migration, and upgrade projects. He is a blogger and a frequent speaker at Oracle-related
    conferences such as UKOUG, Collaborate, and others. Maris is an Oracle Certified
    Master and a holder of several Oracle Certified Professional certificates. He''s
    also a member of the board of the Latvian Oracle User Group.


    ![A978-1-4302-6266-4_BookFrontmatter_Fig5_HTML.jpg](A978-1-4302-6266-4_BookFrontmatter_Fig5_HTML.jpg)
    Matt Gallagher is a lead database architect at a major Fortune 500 company. He
    has 17 years of Oracle experience. He specializes in developing enterprise-class
    database administration and architecture solutions. Matt''s experience includes
    the Oracle Database Appliance, Exadata, Oracle `RAC`, Data Guard, and `ASM`. He
    has developed solutions for all types of database requirements, including high-availability,
    transactional, and decision support systems.'
