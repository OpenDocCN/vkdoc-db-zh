  trans: "\n\n## 虚拟化技术\n\n2013 年 3 月，Oracle 在软件版本 2.5 中发布了对 ODA 上 Oracle 虚拟化解决方案的支持。此后，Oracle\
    \ 在每个版本中都持续增强 ODA 的虚拟化能力。在 ODA 上实施虚拟化是使用 ODA 的一个主要业务场景。Oracle 在 ODA 上实施的虚拟机（VM）目前是独一无二的，因为其虚拟化已针对数据库进行了优化。预计虚拟化将继续成为\
    \ Oracle 的一个重要发展方向，包括增强 ODA 上的功能。\n\nOracle 通过在`oakcli`中实施 VM 管理，简化了 ODA 虚拟机的管理，包括克隆、启动和停止\
    \ VM 的功能。`oakcli`已得到增强，可以导入模板。支持 ODA 上的虚拟化无需单独的 VM 管理器。\n\nODA 平台的“按需扩展能力”意味着\
    \ ODA 上可以提供额外的容量来运行非数据库应用和其他基础设施支持软件。Oracle 为打包的 ODA 应用解决方案创造了一个短语——“一体化解决方案”。Oracle\
    \ 正在将其软件移植到 ODA 专用的 VM 模板。在撰写本文时，一个 WebLogic 模板已经为 ODA 发布，并且已宣布了一个 JD Edwards\
    \ 模板。预计还会有更多针对其他 Oracle 软件产品的模板。Oracle 的合作伙伴也已加入进来，开始开发他们自己的应用“一体化解决方案”。\n\n最大化硬件利用率并快速部署应用的商业价值主张是巨大的。各种规模的公司通常需要部署大型咨询公司、系统集成商和咨询人员来部署复杂的软件。通过\
    \ VM 模板在 ODA 上部署应用，有望通过快速部署标准化镜像来显著节省成本。Oracle 已声明未来将发布更多的 ODA VM 模板。\n\n## ODA\
    \ 技术解决方案\n\nODA 是一种技术上的“一体化解决方案”。该解决方案包含许多您应该了解的主要组件。我们将在本节介绍这些内容。\n\nOracle Appliance\
    \ Kit（`oakcli`）是一个内置的、多功能的设备管理工具。`oakcli`命令参考可以在 MOS 1417879.1、最新的 ODA 版本发行说明以及\
    \ ODA 入门指南中找到。ODA 发行说明和入门指南通常比 MOS 说明更新。新的`oakcli`功能每季度发布一次，因此您需要主动查看季度发行说明以了解最新功能。\n\
    \n以下是您可以使用`oakcli`执行的一些操作：\n\n*   ODA 管理\n    *   部署 ODA\n    *   为 ODA 打补丁\n\
    \    *   大约 15 分钟内创建一个新数据库\n    *   从当前 ODA 版本创建新的数据库软件主目录\n    *   删除数据库和数据库主目录\n\
    \    *   运行完整的系统检查\n    *   运行磁盘校准\n    *   配置和测试 ASR（自动服务请求）\n    *   显示硬件详细信息和版本\n\
    \    *   显示软件和固件版本\n    *   显示磁盘、磁盘组和其他存储详细信息\n    *   清理已应用的补丁\n    *   购买额外的\
    \ Oracle 许可证时激活核心\n*   诊断\n    *   运行完整的系统检查\n    *   定位磁盘驱动器并点亮其 LED 指示灯以指示需要更换的具体磁盘\n\
    \    *   运行磁盘诊断\n    *   运行`ODAchk`运行状况检查\n    *   收集并打包诊断信息\n*   虚拟化\n    * \
    \  创建或克隆 ODA 虚拟机\n    *   配置 ODA 虚拟机上的资源\n    *   启动和停止 ODA_Base（虚拟化 ODA 上的数据库分区）或其他\
    \ ODA 虚拟机\n    *   显示 ODA VM 模板的信息\n    *   部署/导入 Oracle VM 模板\n    *   为 ODA\
    \ 虚拟机创建 CPU 池\n    *   显示一个或所有 ODA 上虚拟机的详细信息\n    *   将 IP 地址应用于 ODA 虚拟机\n   \
    \ *   打开 VM 控制台以管理 ODA VM\n\nOracle 还提供额外的 ODA 诊断实用程序作为 ODA 软件产品集的一部分。主要实用程序是`ODAchk`（MOS\
    \ 1485630.1）。这是`RACcheck`的 ODA 专用版本。Oracle 建议您部署最新版本的`ODAchk`，因此在`RACcheck`和 Exadata\
    \ 的`Exachk`工具更新后，您必须检查 MOS 说明以获取新版本。\n\nODA 附带标准的`top`、`vmstat`和`sar`服务器资源监控实用程序。ODA\
    \ 还附带详细的服务器资源收集实用程序`OSWatcher`（MOS 301137.1 和 461053.1）。ODA RAC 软件还包含两个适用于自安装平台的标准\
    \ RAC 实用程序：\n\n*   集群运行状况监视器（MOS 736752.1 和 1328466.1）— 细粒度资源监控\n*   跟踪文件分析器实用程序（MOS\
    \ 1513912.1）— 实时事件捕获\n\nODA 附带一组专为性能和在 ODA 上整合数据库而设计的数据库模板。数据库模板的大小调整记录在入门指南中。模板的大小范围从超小型、小型、中型、大型、超大型到超超大型。除了配置内存、重做日志大小和初始数据库大小外，这些模板还决定了可以在\
    \ ODA 上部署的数据库数量。\n\n以下是一些需要了解的其他软件实用程序和工具：\n\n*   ODA 附带两个允许启动基于 GUI 的工具会话的实用程序。它们是\
    \ VNC 服务器和 ILOM 远程控制台的 StartX。\n*   服务器软件包括前面讨论的 ILOM 和 ASR 设施。这些服务器管理实用程序是 Oracle\
    \ 相对于通用商用硬件的额外硬件增值点。\n*   ODA 预部署了一个名为`Logwatch`的实用程序，用于监控文件系统空间以及通过`ssh`进行的身份验证失败和登录。它是自动计划的。\n\
    *   ODA 可以运行其他主动支持工具（MOS 1459344.1）。一个很好的例子是`oratop`（1500864.1），它生成一个显示整体数据库和数据库服务器活动的单面板。\n\
    \nODA 具有独特的“最坏情况”恢复能力。当一切丢失，服务器操作系统磁盘配置失效且数据库无法启动时，只要问题根源不是重大硬件故障，ODA 提供了使用裸机恢复来重建设备的能力。使用此方法，ODA\
    \ 可以在大约两小时内重建。当然，您将需要数据库的备份以及任何需要恢复以使 ODA 进入可操作状态的额外对象，例如导出文件和用于 RAC 服务的 OCR。\n\
    \n最后，ODA 附带 Oracle Secure Backup 产品的许可证，用于备份 ODA。\n\n"
- fmt: '# 10. Virtualization and the ODA


    ## Abstract


    The Oracle Database Appliance (`ODA`) is primarily designed as an appliance to
    support and deploy the Oracle database quickly and to provide a pay-as-you-go
    licensing model. The `ODA` hardware provides a lot of flexibility in deployment
    options, and the `4u` rack size is ideal for a lot of small- and medium-sized
    businesses (`SMBs`) to deploy in a variety of situations. `SMBs` typically want
    to use consolidated hardware, and the `ODA`, while a good database platform, still
    requires added components to support a complete application stack. This led to
    the idea that virtualization might achieve a one-box solution that helps a variety
    of `SMBs` to meet the “less hardware” goal.


    Virtualization has been added to the `ODA` via a software update, and as with
    other major `ODA` features, it requires a reimage of the platform in order to
    implement. Virtualization on the `ODA` allows usage of capacity that could potentially
    remain unused. This chapter will focus on the basics of virtualization with Oracle
    VM (`OVM`), the technology used to implement virtualization on the `ODA`, as well
    as talk about the ease of deploying virtual machines to expand the usefulness
    of the `ODA`.


    ## ODA Performance


    The current `X3-2 ODA` model runs the same compute node model as an `Exadata`.
    `ODAs` do lag the `Exadata` server node release cycle. Regardless, they are running
    the same `CPU` model most of the time. `Exadatas` support a memory expansion from
    `256G` to `512G` per server, but `ODAs` do not. Regardless, logical `IO` performance
    on an `ODA` is excellent.


    Another source of `ODA` performance is that everything is self-contained within
    the appliance. `RAC` traffic doesn’t leave the appliance and travel through an
    external network to communicate between the compute nodes. The two server nodes
    and storage units are all next to each other and are connected through high-speed
    `SAS` cables. There are no intervening switches, firewalls, or other external
    network layers.


    `ODA` physical `IO` storage performance is good—in fact, better than the typical
    `SAN` fiber channel disk. Oracle has published `X3-2` Physical `IO` benchmarks
    of `5` milliseconds at `3,500` `IOPS` on a single storage unit, and `7,000` `IOPS`
    with an additional storage expansion unit. Above those `IOPS` levels, the service
    levels decrease. Oracle’s `ODA X3-2` benchmarks show service levels of `6` to
    `7` milliseconds at `5,750` `IOPS`, and `11,500` with a storage expansion rack.
    These last numbers are still very good and compare nicely to the levels seen on
    a well-tuned Fiber Channel disk-based `SAN`. However, as the `IOPS` build above
    these levels, at some point performance will start to drop noticeably. Since `ODAs`
    come with a lot of memory, caching data in memory is a key scalability factor
    to avoid reaching the `ODA` `IOPS` limitations.


    `ODAs` do not currently have the supported option to use `PCI Flash` or `SSD`.
    The four `SSD` drives that come with `ODAs` are only supported for use by the
    online redo logs. `ODAs` do support expanding storage to `NFS`, including Oracle’s
    `ZFS` storage appliance. The use of `DNFS` (Direct `NFS`) to increase performance
    is supported. However, I’m not aware of any physical `IO` performance benchmarks
    that have been published for `ODAs` using an `NFS` storage extension. While `ASM`
    is not supported on the `NFS` extension, Oracle has announced that `ODAs` do support
    Hybrid Columnar Compression when the `NFS` mount is an Oracle `ZFS` storage appliance.


    Since Oracle is investing in the `ODA` platform, the `IOPS` and disk performance
    may change with each new model. You will need to relook at the physical performance
    and `IOPS` limits when a new model that replaces the `X3-2` is released.


    ## Summary


    `ODAs` are a high availability application and database infrastructure solution
    in a self-contained engineered appliance. `ODAs` offer low-cost hardware with
    lower setup and ongoing support costs than traditional database solutions. Deployments
    are automated and fast, including the creation of `RAC One` and two-node `RAC`
    cluster databases. The `ODA` patching process patches the `OS`, grid, and database
    components as a single unit using Oracle supplied software. `ODAs` come prepackaged
    with management and deployment software.


    `ODAs` offer a unique “pay as you grow” Oracle licensing option. Applications
    and databases can be deployed on `ODAs` using Oracle’s virtualization product.


    ## Oracle Virtual Machine (`OVM`)


    `OVM` is based upon the open-source `Xen` hypervisor and competes in the market
    with the likes of `EMC VMware` and `Microsoft Hyper-V`. Oracle has taken the `Xen`
    hypervisor as the core to its `OVM` technology and added significant enhancements,
    like support for a variety of operating systems, as well as management interface
    to make a product that is more enterprise-ready.


    Oracle’s acquisition of Sun Microsystems allowed it to further enhance the `OVM`
    product and create an `OVM` family of products that includes Oracle `VM Server`
    as well as Oracle `VM VirtualBox`. Oracle `VM Server` is the platform that runs
    virtual hosts and allows for the provisioning of multiple virtual hosts on a set
    of hardware, and has a server component as well a management component that is
    required for use. Oracle `VM VirtualBox`, on the other hand, is a desktop virtualization
    tool that extends the capabilities of your existing desktop software, and it doesn’t
    require a hypervisor to manage it. Oracle provides Oracle `VM Server` as well
    as Oracle `VirtualBox` for free, but Oracle `VM Server` has support costs associated
    with it. Oracle also provides an extensive `VM` template library of its products,
    which allows rapid deployment of virtual machines. Oracle `VM` templates can be
    converted into Oracle `VirtualBox` templates as well.


    ### OVM and the Database Appliance


    The `OVM` implementation on the `ODA` is unique in the sense that it does not
    require an Oracle `VM Manager`. The design philosophy behind bringing virtualization
    on the `ODA` was to enhance the value of the `ODA` without adding extra infrastructure,
    as well as ensuring that the database in the database appliance was still the
    primary focus of the `ODA`. `ODA` patch release `2.5` added the support for virtualization,
    and all subsequent releases from there have added features toward making virtualization
    better and easier to manage and deploy.


    Virtualization on the `ODA` creates some unique challenges in installation, as
    well as the configuration of the device. The default setup on the `ODA` is bare
    metal, which means all hardware has a one-to-one affinity to each component. In
    order to convert a running `ODA` to a virtualized model, a complete reinstall
    of the appliance has to happen. This is particularly important to note as an install
    decision, because data loss or an outage is required for conversion.


    ### Installation of a Virtualized ODA


    The default condition of an `ODA` that is shipped from the factory is the bare-metal
    state. The process of an `ODA` bare-metal installation is explained in detail
    in [Chapter 2](#A978-1-4302-6266-4_2_Chapter.html). This section will highlight
    some specific changes, as well the changes in the `ODA` offline configurator to
    handle virtualization.'
