  raw: '### Oracle Database Appliance Redeploy


    Sometimes you need to redeploy the base image to the Oracle Database Appliance.
    Redeploying will wipe out your all your databases and the ASM configuration associated
    with the Oracle Database Appliance. To perform a redeploy for the Oracle Database
    Appliance is a very simple task and is executed with the `cleanupDeploy.pl` script
    (see Listing 3-11).


    Listing 3-11. The cleanupDeploy.pl script


    `/opt/oracle/oak/onecmd/cleanupDeploy.pl`


    Once this `cleanupDeploy.pl` script completes, you can rerun the deployment process
    using the Oracle Appliance Manager utility discussed earlier. To execute the `cleanupDeploy.pl`
    and review the associated output, Listing 3-12 gives some insight into what you
    are looking at.


