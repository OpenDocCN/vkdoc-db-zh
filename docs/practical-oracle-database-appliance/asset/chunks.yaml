    ## 系统组件检查


    系统组件检查是确保 ODA 健康的关键。作为数据库管理员，我们往往容易忽视硬件本身的健康状况。OAK 以一种易于理解的方式提供了对系统组件的验证，即使是对硬件相关指标不太熟悉的人也能轻松掌握。


    由于 ODA V1 和 X3-2 上的系统组件不同，验证在两台设备上会给出不同的结果。检查包括以下实体：

    *   软件清单

    *   系统信息

    *   BIOS 信息

    *   控制器信息

    *   系统 ILOM 和 BMC 固件版本

    *   电源和冷却单元状态

    *   处理器和内存状态

    *   系统盘状态

    *   扩展器和共享盘状态（仅限 ODA V1）

    *   各组件温度


