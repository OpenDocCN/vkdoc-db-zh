    ### 新设备


    如果您从工厂收到一台新的 Oracle 数据库设备，它很可能并未运行最新版本的 Oracle 数据库设备软件和固件。您需要将其更新至最新的补丁级别。有两种方法可以实现：


    *   第一个也是推荐的方法是采用与之前“更新流程”部分类似的流程。您需要按照最新 Oracle 数据库设备补丁的 `README` 文件中的步骤进行操作。¹

    *   另一种方法是使用 Oracle 数据库设备的 `裸机恢复` 选项，具体描述可参考 My Oracle Support 题为“Oracle 数据库设备裸机恢复过程”的说明（文档
    ID 1373599.1）。


    第一种方法会处理所有的系统基础设施组件。而在使用 `裸机恢复` 的情况下，在 Oracle 数据库设备上解包更新包后，您应隐式更新系统基础设施组件，如 `BIOS`
    和固件。更新系统基础设施的说明将在本章后面的“执行更新”部分提供。您也可以在 `README` 文件中找到它们。


    > Oracle 数据库设备默认预装了一个裸机系统基础设施版本。通过重新镜像过程，您可以转换为虚拟化设置。如果您打算使用虚拟化选项，则必须使用以下 My Oracle
    Support 说明中的指导来重新镜像 Oracle 数据库设备：“在 Oracle 数据库设备上逐步安装虚拟化镜像”（文章 ID 1520579.1）。


    ### 默认更新选项


    默认更新选项是一个直接的过程，大约两小时内即可执行完成。它假设您拥有标准的 Oracle 数据库设备配置，与推荐配置的偏差极小，且停机要求较为宽松。此选项将作为下一节描述的更灵活选项的基础选项。


    ### 分时执行步骤


    为了将停机时间间隔缩至最短，并使您能清晰地专注于更新过程，实现更精细的控制，您可能希望将更新 `系统基础设施`、`Grid 基础设施` 和 `RDBMS`
    这三个步骤分开执行。每个步骤都可以单独执行，并且如果您需要，步骤之间可以相隔数周。


    这种分步执行的方法需要更多的规划和实施工作。然而，唯一需要完全系统停机的步骤是更新 `系统基础设施`。另外两个步骤（`Grid 基础设施` 和 `RDBMS`）可以通过在第二个节点进行更新时，在其中一个节点上运行服务的方式，以滚动方式执行。


    通过分步操作，您可以确保在进行下一步之前，前一步骤已成功完成。每个步骤所需的时间比一次性完成所有步骤的默认方法要短。然而，代价是过程变得更加复杂。


    ### 延迟更新 RDBMS


    根据具体情况和业务需求，您可能会决定更新某些数据库，而让同一设备上的其他数据库保持先前版本运行。


    标准的 `ODA` 升级选项是基于每个 `Oracle 主目录` 进行的。属于特定 `Oracle 主目录` 的所有数据库将同时升级。Oracle 数据库设备也支持多个
    `Oracle 主目录`——您可以根据需要和资源情况拥有任意数量的 `Oracle 主目录`。Oracle 数据库设备目前支持 `11.2.0.2` 和 `11.2.0.3`
    版本的 `Oracle 主目录`。每个 Oracle 数据库设备捆绑包更新都会升级 Oracle 数据库版本的第五位版本号。例如，从 Oracle 数据库设备捆绑包
    `2.6` 升级到 `2.7`，就是从 Oracle 数据库版本 `11.2.0.3.6` 升级到 `11.2.0.3.7`。


    如果您想逐个更新数据库，有两种可用选项。第一种是为每个数据库配置运行在独立的 `Oracle 主目录` 中。这样，在更新过程中，您可以指定要更新的 `Oracle
    主目录` 和关联的数据库。如果有多个数据库运行在同一个 `Oracle 主目录` 下，您需要通过创建额外的 `Oracle 主目录` 副本，并将这些数据库从原始
    `Oracle 主目录` 移动到新建的独立 `Oracle 主目录` 中来分离它们。在以下示例中，我们创建额外的 `Oracle 主目录`，并将两个数据库移动到新建的独立
    `Oracle 主目录` 中启动：


    ```

    # 在 2.6 版本上

    # 显示所有当前 Oracle 主目录

    oakcli show dbhomes –detail

    # 创建一个新的 Oracle 主目录

    oakcli create dbhome -version 11.2.0.3.6

    oakcli show dbhomes –detail

    # 重新配置一个数据库，使其从新的 Oracle 主目录运行

    srvctl modify database -d DOG -o /u01/app/oracle/product/11.2.0.3/dbhome_2

    # 重启数据库

    srvctl stop database -d DOG

    srvctl start database -d DOG

    oakcli create dbhome -version 11.2.0.3.6

    srvctl modify database -d CAT -o /u01/app/oracle/product/11.2.0.3/dbhome_3

    srvctl stop database -d CAT

    srvctl start database -d CAT

    ```


    另一种选择是手动更新数据库。在这种情况下，您只需要两个 `Oracle 主目录`。一个用于数据库引擎的源版本，另一个用于目标版本。此外，您需要自己执行所有更新步骤，并且也需要自己在
    `Oracle 主目录` 之间移动数据库。涉及以下步骤：


    1.  为 `RDBMS` 的新版本创建一个 `Oracle 主目录`。

    2.  停止您正在更新的数据库。

    3.  重新配置数据库，使其从新建的 `Oracle 主目录` 启动。

    4.  启动数据库并运行升级步骤。

    5.  将数据库交付给用户使用。


    这种手动方法不需要您为每个数据库创建单独的 `Oracle 主目录`。您可以仅使用两个 `Oracle 主目录` 来更新所有数据库。然而，与之前展示的第一种方法相比，这种方法需要更多的手动步骤。您将使用传统的数据库升级步骤，就像处理常规
    Oracle 系统一样，从而失去了 Oracle 数据库设备提供的自动数据库升级功能。


    ### 使用 Data Guard 最小化停机时间


    如果您的业务要求尽可能短的停机时间，可以考虑使用 `Data Guard` 配置中的额外 Oracle 数据库设备。这种方法可以避免与 `系统` 和 `Grid
    基础设施` 更新相关的停机。过程如下：


    1.  在主用和备用 Oracle 数据库设备之间建立备用数据库配置²。

    2.  在备用/辅助 Oracle 数据库设备上停止重做日志应用进程。

    3.  更新备用 Oracle 数据库设备的 `系统` 和 `Grid 基础设施` 组件。

    4.  暂时不更新备用数据库的 `Oracle 主目录`。相反，重新建立重做日志应用进程。

    5.  将您的应用程序切换到使用辅助 Oracle 数据库设备，从而切换到备用数据库。此时，主用 Oracle 数据库设备可以离线以更新基础设施组件。

    6.  使用滚动更新方法将您的数据库更新到最新版本。这样，只需很短的切换时间，应用程序需要从主设备重新指向辅助设备。与基础设施更新活动相关的应用程序停机时间为零。


    如上所述使用 `Data Guard` 需要在规划、准备和实施方面付出更多努力。然而，与以常规方式执行 `Grid 基础设施` 和数据库更新步骤所需的数小时停机时间和受限模式操作相比，`Data
    Guard` 方法提供了最小的切换时间。

