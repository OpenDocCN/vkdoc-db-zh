    Note 1385831.1 提供了相同的信息）。


    **表 1-1.** Oracle Database Appliance V1 规格


    | 组件 | 规格 |

    | --- | --- |

    | CPU | 2x 6 核 Intel Xeon X5675 3.07GHz |

    | 内存 | 96GB RAM (12 x DDR3-1333 8GB DIMMs) |

    | 网络 | 2x 10GbE (SFP+) PCIe 卡<br>6x 1GbE PCIe 卡<br>2x 1GbE (Intel 82571) 板载集成冗余集群互联
    |

    | 内部存储 | 2x 500GB SATA - 用于操作系统<br>1x 4GB USB 内部 |

    | RAID 控制器 | 2x LSI SAS9211-8i SAS HBA |

    | 共享存储 | 20x 600GB - 3.5" SAS 15k RPM HDD (Seagate Cheetah) - 用于 RDBMS DATA（除磁盘顶行外的任何插槽）<br>4x
    73GB - 3.5" SAS2 SSDs - 用于 RDBMS REDO（顶行四个磁盘的插槽）<br>SSD 来自 STEC (ZeusIOPS - 多层单元
    (MLC) 版本，SAS 接口) |

    | 操作系统 | Oracle Enterprise Linux 5.5 (在 ODA 软件版本 2.1 上)，5.8 (在 ODA 软件版本 2.2 上)
    x86_64 |


    ODA 配备了功能非常强大的 Intel Xeon 处理器，以及足够的内存和存储空间，可以容纳各种在线事务处理（OLTP）和一些较小的数据仓库工作负载。网络互联内置于设备中，这消除了为节点间通信互联购买交换机的需求。在存储方面，根据
    ODA 软件版本和冗余层级，你可以在 4 到 6 太字节（TB）的空间之间选择。


    ## 存储配置


    每个 ODA 每个服务器节点附带两个 500GB 驱动器，它们被镜像并用于操作系统，以及承载操作系统、集群件和 Oracle Database 主目录的软件（250GB
    未分配）。每个设备有二十个 600GB SAS 驱动器和四个仅用于在线重做日志的 73GB SSD。ODA 上的共享磁盘通过两个 LSI 控制器连接，这些控制器连接到板载
    SAS 扩展器。每个 SAS 扩展器又连接到 ODA 中的 12 个硬盘。Oracle 使用 Linux 多路径来避免磁盘路径故障。添加固态硬盘（SSD）用于重做日志是为了克服旋转磁盘的延迟，因为旋转磁盘的控制器没有缓存。ODA
    上的磁盘大小取决于许多因素，包括在设备上运行的 ODA 软件版本。表 1-2 显示了 ODA 上支持的各种磁盘配置和配置选项。


    **表 1-2.** ODA 磁盘配置


    | 配置选项 | 磁盘组 | 类型/冗余 | 备份类型 | 可用空间 (GB) | 支持的软件版本 |

    | --- | --- | --- | --- | --- | --- |

    | 1 | DATA | HIGH | 外部 | 3200 | 所有版本 |

    | 1 | RECO | HIGH | 外部 | 488 | 所有版本 |

    | 1 | REDO | HIGH | 无 | 91 | 所有版本 |

    | 2 | DATA | HIGH | 本地 | 1600 | 所有版本 |

    | 2 | RECO | HIGH | 本地 | 2088 | 所有版本 |

    | 2 | REDO | HIGH | 无 | 91 | 所有版本 |

    | 3 | DATA | NORMAL | 外部 | 4800 | 2.4 及以上 |

    | 3 | RECO | NORMAL | 外部 | 733 | 2.4 及以上 |

    | 3 | REDO | HIGH | 外部 | 91 | 2.4 及以上 |

    | 4 | DATA | NORMAL | 本地 | 2400 | 2.4 及以上 |

    | 4 | RECO | NORMAL | 本地 | 3133 | 2.4 及以上 |

    | 4 | REDO | NORMAL | 无 | 91 | 2.4 及以上 |


    表 1-2 说明了 ODA 支持的各种磁盘配置选项。如你所见，在配置选项 1 和 2 中，由于所有磁盘组都是三重镜像（高冗余），可用空间大约为 4TB。根据你选择的配置，你将在
    DATA 或 RECO 磁盘组中拥有更多空间。


    Oracle Database Appliance 2.4 引入了允许 DATA 和 RECO 使用镜像（正常冗余）磁盘组的选项。这在表 1-2 中突出显示为配置选项
    3 和 4。这样做主要是为了让客户能够根据部署 ODA 的环境选择空间。通常建议在开发/测试系统上部署镜像（正常冗余）。


    ## 操作系统与软件


    ODA 运行 Oracle Enterprise Linux 操作系统，截至软件版本 2.2，仅支持不可变企业内核（UEK）。以下是 ODA 软件版本 2.6
    的快照：


    ```

    Linux oda01 2.6.32-300.32.5.el5uek #1 SMP Wed Oct 31 22:06:21 PDT 2012 x86_64
    x86_64 x86_64 GNU/Linux

    Enterprise Linux Enterprise Linux Server release 5.8 (Carthage)

    ```


    ## 连接与设置


    从外部看 ODA 机箱，需要进行许多连接。图 1-4 指出了各种连接，这些连接随后在表 1-3 中描述。Oracle 还提供了一个简单的设置方案。设置海报如图
    1-5 所示。


    **表 1-3.** Oracle Database Appliance 连接器描述[²]


    | 标注 | 标签 | 以太网 | 绑定 | 描述 |

    | --- | --- | --- | --- | --- |

    | 1 |   |   |   | 电源连接器。 |

    | 2 | PCIe 1 | `Eth 7`, `Eth 6`, `Eth 5`, `Eth 4` (从左到右) | `bond1`, `bond2` |
    `Eth 4` 和 `Eth 5` 配置为 `bond1`。`Eth 6` 和 `Eth 7` 配置为 `bond2`。这些端口用于自定义配置或用于单独的备份、灾难恢复和网络管理。
    |

    | 3 | PCIe 0 | `Eth 8`, `Eth 9` | `xbond0` | 两个 10 GbE 端口。在 10 GbE 系统中，这些连接到公共网络。
    |

    | 4 | SerMgt |   |   | 用于 Oracle ILOM 和系统控制台的串行连接器。 |

    | 5 | `Net 0`, `Net 1` | `Eth2`, `Eth3` | `bond0` | 两个 1 GbE 连接器。在 1 GbE 系统中，这些连接到公共网络。
    |

    | 6 | NetMgt |   |   | 用于 Oracle ILOM 的以太网连接。 |

    | 7 | USB 和视频 |   |   | 用于连接系统控制台。 |

    | 8 |   |   |   | 服务器节点 0。 |

    | 9 |   |   |   | 服务器节点 1。 |


    ![A978-1-4302-6266-4_1_Fig4_HTML.jpg](img/A978-1-4302-6266-4_1_Fig4_HTML.jpg)

    **图 1-4.** Oracle Database Appliance V1 连接标注


    [¹]: 文中引用标记，指向原始文档的脚注。

    [²]: 文中引用标记，指向原始文档的脚注。'
- fmt: 'The ODA setup poster is a simple and easy-to-understand method for installing
    and setting up the appliance. The poster is a step-by-step guide that explains
    connecting the cables to deploy the software, which results in a fully functional
    clustered database server. Figure [1-5](#A978-1-4302-6266-4_1_Chapter.html#Fig5)
    shows this in detail. Oracle updates the poster with every release. The poster
    is available in the documentation web site for ODA at [`http://docs.oracle.com/cd/E22693_01`](http://docs.oracle.com/cd/E22693_01).


    ![A978-1-4302-6266-4_1_Fig5_HTML.jpg](A978-1-4302-6266-4_1_Fig5_HTML.jpg)


    Figure 1-5. ODA V1 setup poster[³](#A978-1-4302-6266-4_1_Chapter.html#Fn3)


    The ODA comes with fully redundant hardware and includes two 10 gigabit Ethernet
    (GbE) interfaces that are bonded together via the Linux operating system to provide
    redundancy, as well as two 3×2, 1GbE interfaces that are also bonded together
    for purposes of redundancy. There is a connector for the ILOM, as well as USB
    and VGA for keyboard and external monitor connections, if needed.


    The ODA is unique in the sense that it has an onboard interconnect that is used
    to connect the two database servers. The interconnect is 1GbE and uses an Intel
    82571 board; it is not bonded. That is why there are two cluster interconnects
    leading to two HAIP devices seen from the clusterware. Since the private interconnects
    are internal to the appliance, no external cabling is required for them.


    The ODA is managed by `Oracle Appliance Kit (OAK)`, which is a proprietary piece
    of software that is specific to the ODA. The `OAK` and various ODA software features
    are discussed in subsequent chapters. Virtualization is added to the ODA platform
    as an option, and it is also discussed in subsequent chapters.


    ### Oracle Database Appliance X3-2


    The ODA X3-2 is the second generation of the ODA devices. It has a lot of new
    features, as well as more capacity than its predecessor. Figure [1-6](#A978-1-4302-6266-4_1_Chapter.html#Fig6)
    shows the appliance from the front.


    The Oracle Database Appliance X3-2 expands the capabilities found in the ODA V1
    and packs a punch in terms of hardware and storage capabilities. Oracle has taken
    a slightly different approach in terms of hardware architecture for the X3-2.
    The server nodes and the storage rack are now two separate units that are connected
    together, and there is an option to add an expansion storage rack to double the
    storage capacity of the appliance.


    ![A978-1-4302-6266-4_1_Fig6_HTML.jpg](A978-1-4302-6266-4_1_Fig6_HTML.jpg)


    Figure 1-6. Oracle Database Appliance X3-2


    The X3-2 is more modular in structure than the version 1 appliance and it provides
    flexibility. Customers are able to expand storage by adding an additional storage
    rack. They can create a storage rack and a server node rack in their datacenters;
    however, we recommend installing the components together.


    The X3-2 is still a 4U rack mountable unit, but it is divided into two individual
    2U units. The server units are 1U each, and the storage unit is 2U as well. The
    expansion rack, if selected, will add another 2U to the system. Table [1-4](#A978-1-4302-6266-4_1_Chapter.html#Tab4)
    lists the complete specifications for the X3-2 box, but the short story is that
    the box features `Intel Xeon E5-2690` processors, 256GB of memory, two 10GbE external
    copper connections, and two 10GbE internal network interconnects. Also included
    are shared, serial-attached SCSI (SAS) disks. The internal disks are now 600GB,
    up from the previous 500GB configuration that was in V1.


    Table 1-4. Oracle Database Appliance X3-2 Specs


    | Component | Specification |

    | --- | --- |

    | CPU | Two 8-core Intel® Xeon® processors E5-2690 |

    | Memory | 256GB (sixteen 16GB RDIMMs at 1600 MHz) |

    | Network | Four 100/1000/10G Base-T Ethernet ports (onboard) 1x dual-port 10GBase-T
    interconnect for cluster communication |

    | Internal Storage | Two 2.5-inch 600GB 10K rpm SAS-2 HDDs (mirrored) OS |

    | RAID Controller | 1x dual-port internal SAS-2 HBA 2x dual-port external SAS-2
    HBA |

    | Shared Storage | Twenty 2.5-inch 900GB 10K rpm SAS-2 HDDs Four 2.5-inch 200GB
    SAS-2 SLC SSDs per shelf for database redo logs Optional storage expansion with
    additional storage shelf doubles storage capacity External NFS storage support
    |

    | Operating System | Oracle Enterprise Linux 5.8 x86_64 |


    ODA X3-2 provides a packed spec sheet. It is a powerful successor to the original
    ODA. Oracle has added a little more complexity in the install, which accommodates
    the flexibility of having a storage shelf that is separate from the actual server
    units. This allows for adding a second shelf as needed, but you will now need
    to ensure that the cabling is done appropriately per the setup poster that is
    provided with the appliance.


    As with the original ODA, the setup poster for the X3-2 is enhanced to be a handy
    resource to help with the installation. Figure [1-7](#A978-1-4302-6266-4_1_Chapter.html#Fig7)
    shows the poster, which is updated with each version of the software. Currently,
    the setup poster has instructions on setting up the ODA as a bare metal or a virtualized
    environment.


    ![A978-1-4302-6266-4_1_Fig7_HTML.jpg](A978-1-4302-6266-4_1_Fig7_HTML.jpg)


    Figure 1-7. Oracle Database Appliance X3-2 setup poster


    If you look at a poster, you’ll see that it suggests a deviation from the original
    design, in which there is a connection and cables that need to run between the
    server nodes, as well as from the server nodes to the storage shelf, and optionally
    to an additional storage shelf as well. Figure [1-8](#A978-1-4302-6266-4_1_Chapter.html#Fig8)
    shows what the server node looks like. Table [1-5](#A978-1-4302-6266-4_1_Chapter.html#Tab5)
    describes the callouts from Figure [1-8](#A978-1-4302-6266-4_1_Chapter.html#Fig8).


    Table 1-5.'
