    ### 逐个升级


    如果您希望对即将更新的数据库进行更精细的控制，您可能需要将每个数据库配置为关联到单独的 Oracle 主目录，而不是在所有数据库都在一个 Oracle 主目录下运行。以下步骤演示了如何使用
    OAK 工具以全自动方式逐个升级 CAT 和 DOG 数据库：


    ```

    # Show all current Oracle Homes

    oakcli show dbhomes –detail


    Oracle HomeName       Oracle Home Version                  Oracle HomeLocation                                        Database
    Name    Database Type

    ----------------      ---------------------                ---------------------------------------                 ---------------  -----------

    OraDb11203_home1      11.2.0.3.7(16619892,16742216)        /u01/app/oracle/product/11.2.0.3/dbhome_1                CAT              RAC

    OraDb11203_home2      11.2.0.3.7(16619892,16742216)        /u01/app/oracle/product/11.2.0.3/dbhome_2                DOG              RACOneNode


    # Update dbhome_1 that executes CAT database

    oakcli update -patch 2.7.0.0.0 --database

    ...

    Would you like to patch all the above homes: Y | N ? :N

    ...

    Please enter the comma separated list of database home_names that you do NOT want
    to patch: OraDb11203_home2

    ...

    ........done


    # At this stage the CAT database is updated to the latest version. The DOG database
    is still on the previous version.


    # Update dbhome_2 that executes DOG database

    oakcli update -patch 2.7.0.0.0 --database

    ...

    Would you like to patch all the above homes: Y | N ? :N

    ...

    Please enter the comma separated list of database home_names that you do NOT want
    to patch: OraDb11203_home1

    ...

    ........done

    ```


    如果您想逐个更新数据库，您应该确保在开始应用 Oracle 数据库一体机补丁包之前，每个数据库都在其自己的 Oracle 主目录下运行。Oracle 数据库一体机不允许您在安装了新的系统和
    Grid 基础设施之后再创建之前版本的 Oracle 主目录。因此，如果您想在开始应用 ODA 补丁包之前分别对它们进行补丁更新，将要执行的数据库分离到不同的
    Oracle 主目录下是很重要的。关于如何将 Oracle 数据库移动到专用的 Oracle 主目录下执行的说明，请参阅本章前面的“延迟 RDBMS 更新”部分。在基础架构组件更新到新版本（本例中是
    2.7）后，我们更新 Oracle 主目录及其关联的数据库。


    另一个需要考虑的选择是在代表新版本的目标 Oracle 主目录和之前的 Oracle 主目录版本之间逐个移动数据库。这种移动必须手动完成，在移动每个数据库后执行更新该数据库所需的补丁步骤。在这种情况下，您只需遵循通用的
    Oracle 数据库补丁指南，将 Oracle 数据库从源 Oracle 主目录版本更新到目标版本。这种方法的优点是您只需要两个主目录：一个用于源，另一个用于目标。如果您仔细地编写脚本并测试所有升级步骤，数据库补丁步骤所需的时间可能与
    OAK 自动化更新相当甚至更短。然而，您可能会发现实现这种方法需要投入多得多的精力。


    ## 总结


    Oracle 数据库一体机的补丁更新是一个简单直接的过程。它显著减少了使 Oracle 集群系统保持在当前补丁版本所需的时间和资源。在简单的情况下，通过在两个小时的维护窗口内执行三条简单的命令，就可以更新系统的所有组件。Oracle
    按季度发布 Oracle 数据库一体机补丁包这一事实，极大地简化了维护工作和相关的资源规划。借助 Oracle 数据库一体机，组织不需要让多个小组（例如存储、系统管理、网络和数据库管理）参与进来就能使集群系统保持最新。因此，ODA
    相较于传统系统提供了显著的经济效益。


    脚注 1


    有关最新的 Oracle 数据库一体机补丁信息，可从 My Oracle Support Note 888888.1 获取。


    2


    请注意，Data Guard 配置不在本书讨论范围内。您可以参考 Oracle 白皮书“Deploying Oracle Data Guard with Oracle
    Database Appliance” 获取更多信息。


    # 9. ODA 的商业价值


    摘要


    2011 年 9 月，Oracle 宣布推出 Oracle 数据库一体机，作为一款创新的、针对数据库优化的入门级集成系统。该发布承诺了易于部署、按需增长付费的许可模式以及单一供应商支持。


    当一项新技术被引入，并且商业兴趣逐渐浓厚时，公司内部总会有人问：“这比我们现在的方式是一个更好的解决方案吗？”。回答这个问题并克服变革阻力的第一步是调查该新技术的商业案例。Oracle
    数据库一体机已成为 Oracle 集成系统产品线中非常成功的产品。本章概述了 ODA 提供的商业优势，您可以利用这些信息来考虑部署 ODA 解决方案的商业案例，并评估任何潜在的技术风险。

    '
- fmt: '## Business Challenges


    Many companies face the same challenges in meeting an ever-expanding range of
    business pressures. IT departments are being asked to become agile and deliver
    infrastructure quickly, even before all of the business requirements have been
    fully developed. Project timelines are becoming shorter and multiphased. While
    projects may run late during the early stages, this doesn’t mean that the project
    due date will necessarily be changed. Instead, later project phases may need to
    make up the slack with shorter timelines. Database departments are usually at
    the end of the infrastructure provisioning chain. DBAs are being asked to deploy
    new database infrastructure rapidly and to deliver business value to IT customers
    sooner. If a project is late by the time it’s time for DBAs to do their work,
    the lead times effectively drop to zero. The old practices of following a cycle
    of gathering requirements, ordering hardware, and engaging multiple teams with
    numerous handoffs between them to build database infrastructure simply don’t meet
    modern business timelines.


    Many companies face costs pressures from static budgets. New external public cloud
    offerings are competing for their infrastructure budgets. For a number of years,
    there has been a slow shift to commodity hardware solutions to reduce costs. While
    hardware related costs have fallen from commodity solutions, the costs of building
    and supporting database infrastructure solutions remain high.


    Companies often face challenges from shortages of people with high-end skill sets.
    In general, there isn’t a shortage of IT people, DBAs, and other staff. However,
    the mantra that “good people are hard to find in any economy” does persist. Companies
    are always looking for people that can solve any technical problem, get work done
    quickly, and build specialized subject matter expertise quickly.


    The rapid introduction of new technologies has placed additional pressures on
    the availability of people with high-end skill sets. The rapid introduction of
    these new technologies can require the support staff to get up to speed without
    a lot of hand-holding. Support staffs have to react quickly to the challenges
    at hand, and task completion has to be quick. There is little margin for errors
    or problems that delay projects. Common issues include:


    *   People’s plates are literally full today. There is no time for “OJT”—on-the-job
    training—and research. Everything has to be jump-started.

    *   Hourly consulting costs on projects can be very high, adding to the cost pressures.
    This adds to the pressures for rapid deployment and efficiency.


    Security compliance is becoming vital in an age where audits and industry regulations
    are governing the actions that companies have to take to secure their systems.
    It is very difficult to achieve compliance across your application and database
    portfolio in an environment where database servers and databases are custom built.


    ## Enter the ODA


    Oracle developed the `Oracle Database Appliance`, or `ODA`, to develop a solution
    to the business challenges mentioned in the preceding section. If the `ODA`s have
    an overarching theme, it is “Infrastructure Deployment for Dummies.” While some
    people may be taken back by this term, it is actually meant as a testament to
    the simplicity and elegance of `ODA` deployments. The other `ODA` themes include
    the time and ease of deployment using a one-button process, the ease of `RAC`
    deployments, and the ease of management. After viewing the `ODA` setup poster,
    you know that Oracle is delivering a new way of doing business.


    The current `X3-2 ODA` model is an engineered system. An engineered system is
    hardware and software designed to operate together as a single, integrated packaged
    solution. While a company can build its own commodity hardware solution, very
    few have the ability to build their own engineered systems. Most companies simply
    don’t have the resources, or business benefits, to build their own engineered
    systems, let alone a system that is optimized for highly available Oracle databases.


    The `X3-2 ODA` comes prepackaged with two servers with a total of 32 –2.9Gz `Intel
    E5-2690` CPU cores. An `ODA` comes with a storage cell that contains 20 900G data
    drives totaling 18T of raw storage, which can be expanded by adding a second storage
    expansion rack with an additional 18T of raw storage, for a total of 36T of raw
    storage. `ODA`s are deployed with either double or triple mirroring (configurable
    at installation time), bringing the usable storage to approximately 6T with triple
    mirroring, or 9T with double mirroring, on a single storage cell. The `ODA Getting
    Started Guide` should be consulted for the exact sizing of the mirrored storage
    options and disk groups, based on the deployment options selected. The current
    `X3-2` servers come with 256G of memory each. Four SSD drives with a total of
    800G of storage are included for the online redo logs.


    **Note**


    `ODA` capacity is certain to change with every generation of the underlying Oracle
    server hardware product line. Almost as soon as a hardware model is released,
    Oracle starts development of the next generation replacement.


    The first generation of the `ODA` was a fixed, self-contained appliance unit.
    For the `X3-2` second-generation model, the server and storage units were modularized
    for the product line to take advantage of an Oracle product roadmap for releasing
    new hardware to follow the Intel product line developments.


    `ODA`s offer an engineered system from a single supplier, with a single-issue
    escalation point. The management of the appliance is mainly self-contained and
    is integrated with Oracle’s comprehensive `Oracle Enterprise Manager` (`OEM`)
    management and monitoring solution.


    `ODA`s have been purchased and deployed by a large customer base, consisting of
    companies of every size. A number of Fortune 500 companies have reported that
    the majority of their databases can be deployed on `ODA`s from a resource sizing
    standpoint. Models with more capacity and higher performance can be expected in
    the future.


    Virtualization is also available on `ODA`s to support the rapid deployment of
    databases and applications using `Oracle Virtual Manager` (`OVM`) templates. A
    template for `WebLogic` has been released, and Oracle has announced the availability
    of additional templates.


    `ODA`s will maintain their place within the Oracle engineered system product lineup
    for the foreseeable future. In August 2013, Oracle expanded its engineered system
    product lineup to include a new offering called the `Oracle Virtualized Compute
    Appliance`, or `OVCA`. This system offers a generalized `Oracle Virtual Machine`
    (`OVM`) provisioning solution, whereas `ODA`s offer a lower-cost entry point and
    the virtualization has been optimized for running databases.'
