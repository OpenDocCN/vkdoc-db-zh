    当数据库启动和关闭过程的测试完成后，就可以完成应用层配置了。此时，应用层服务器上的 e-Business Suite 配置尚未感知到数据库层的变更；也就是说，Net
    服务和 JDBC 配置仍然设置为单节点数据库，需要为 RAC 数据库进行调整。


    正如预期，AutoConfig 能够调整配置，该过程在 My Oracle Support 注意事项 “Using Oracle 11g Release 2
    Real Application Clusters and Automatic storage management with Oracle E-Business
    Suite Release 12.2 (Doc ID 1453213.1)” 的 “4.7. Establish Applications Environment
    for Oracle RAC” 一节中有详细说明。以下是这些步骤的快速摘要：


    1.  手动调整上下文文件中的 `tnsnames.ora` 和 JDBC URL，以允许连接到 RAC 数据库的一个实例。

    2.  在应用服务器上运行 AutoConfig，从数据库检索配置信息，然后将必要的更改写入配置文件。

    3.  在 Weblogic Server 数据源中更新 JDBC URL。


    至此，数据库迁移到 ASM 和 RAC 的工作就完成了。您已经完成了最复杂的部分——在 ODA 上实施 e-Business Suite。此时，您拥有一个功能齐全的系统，数据库层有两个节点，应用层有一个节点。本章的下一节将展示如何克隆应用层
    VM，并使用共享的应用层文件系统实施第二个应用层节点。'
