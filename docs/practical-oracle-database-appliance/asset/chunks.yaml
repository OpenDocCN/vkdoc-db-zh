- fmt: '# ODA Configuration Audit Tool


    Part of the proactive checks portfolio is ODA Configuration Audit Toolkit (`odachk`).
    Oracle has been building best practices in their engineered and nonengineered
    systems portfolio for a while, and these checks include `racchk`, `exachk`, and
    now for ODA—`odachk`.


    The `odachk` utility is a complete auditing and assessment tool developed by Oracle’s
    RAC Assurance team to provide best-practice checks for RAC and Clusterware. The
    tool also provides various OS-specific checks. While every version of the check
    can add more options and features, the following categories are key:


    *   OS kernel parameters

    *   OS packages

    *   Many other OS configuration settings important to RAC

    *   CRS/grid infrastructure

    *   RDBMS

    *   ASM

    *   Database parameters


    This list is pretty comprehensive, and these checks are updated every 90 days
    to ensure freshness of the tests. The updates also provide the addition of newer
    best practices, and solutions to known problems. The `odachk` utility should be
    run at least on a monthly basis, and also before and after any change to the system,
    to ensure that no problems have arisen in the environment. The utility also provides
    pre- and post-upgrade checks that allow for upgrading to 11.2.0.3 from 11.2.0.2
    to ensure that all best practices are met.


    Listing 7-15 provides an example of getting the version of the `odachk`, as well
    as getting help from the `odachk` utility. The `odachk` is updated very frequently
    and each version of the ODA software can contain a new version of the utility.


    Listing 7-15. ODA Checks


    ```

    [root@odax32 odachk]# ./odachk -v

    ODACHK  VERSION: 2.2.1_20130415


    [root@odax32 odachk]# ./odachk -h

    Usage : ./odachk [-abvhpfmsuSo:c:rt:]

    -a      All (Perform best practice check and recommended patch check)

    -b      Best Practice check only. No recommended patch check

    -h      Show usage

    -v      Show version

    -p      Patch check only

    ...

    ```


    The `odachk` packs a lot of information into its output, and due to the volatile
    nature of checks, it is independent on the OAK framework. The command executable
    is typically found at `/opt/oracle/oak/odachk`. You should only run the utility
    as the Oracle RDBMS software owner. Running as any other user will net a message
    like the following:


    ```

    odachk found that oracle software owner exists and its being run by root.

    ```


    Let’s look at a typical run of `odachk`. Listing 7-16 shows such a run, along
    with its output.


    Listing 7-16. ODA Check Execution


    ```

    Checking ssh user equivalency settings on all nodes in cluster

    Node odax322 is configured for ssh user equivalency for oracle user

    Searching for running databases . . . . .

    . . . . . . . . . .

    List of running databases registered in OCR

    1. dodx32

    ......

    .....

    9. All of above

    10. None of above

    Select databases from list for checking best practices. For multiple databases,
    select 9 for All or comma separated number like 1,2 etc [1-10][9].1

    Searching out ORACLE_HOME for selected databases.

    . . . . . . . . . .

    Checking Status of Oracle Software Stack - Clusterware, ASM, RDBMS

    . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . .

    ----------------------------------------------------------------------------------------------

    Oracle Stack Status

    ----------------------------------------------------------------------------------------------

    Host Name  CRS Installed   ASM HOME    RDBMS Installed   CRS UP   ASM UP    RDBMS
    UP  DB Instance Name

    ----------------------------------------------------------------------------------------------

    dodax31    Yes             Yes         Yes               Yes      Yes       Yes       dodx321

    dodax32    Yes             Yes         Yes               Yes      Yes       Yes       dodx322

    ----------------------------------------------------------------------------------------------

    97 of the included audit checks require root privileged data collection . If sudo
    is not configured or the root password is not available, audit checks which  require
    root privileged data collection can be skipped.

    1. Enter 1 if you will enter root password for each  host when prompted

    2. Enter 2 if you have sudo configured for oracle user to execute root_odachk.sh
    script

    3. Enter 3 to skip the root privileged collections

    4. Enter 4 to exit and work with the SA to configure sudo  or to arrange for root
    access and run the tool later.

    Please indicate your selection from one of the above options[1-4][1]:- 2

    *** Checking Best Practice Recommendations (PASS/WARNING/FAIL) ***

    Log file for collections and audit checks are at

    /opt/oracle/oak/odachk/odachk_062913_120441/odachk.log

    Starting to run odachk in background on dodax32.

    ```


    The end result will be a run of all the checks and the creation of a zip file.
    The zip file is created in case you decide the results need to be uploaded for
    evaluation and analysis. You’ll also get an HTML file for your own evaluation
    and analysis. Figure 7-2 shows an example of all the files that are generated.


    ![A978-1-4302-6266-4_7_Fig2_HTML.jpg](A978-1-4302-6266-4_7_Fig2_HTML.jpg)


    Figure 7-2. ODAchk files generated


    The HTML file contains a lot of sections. The first section is a cluster summary
    and the table of contents, such as what’s shown in Figure 7-3. It provides information
    about the cluster being examined and what is contained within the report.


    ![A978-1-4302-6266-4_7_Fig3_HTML.jpg](A978-1-4302-6266-4_7_Fig3_HTML.jpg)


    Figure 7-3. ODA check cluster summary


    The report is comprehensive and looks at a lot of metrics to ensure that the system
    is working optimally. A findings report is displayed first, showing potential
    issues on the database server. Figure 7-4 provides an example.


    ![A978-1-4302-6266-4_7_Fig4_HTML.jpg](A978-1-4302-6266-4_7_Fig4_HTML.jpg)


    Figure 7-4. ODA check findings report


    Each finding should be validated depending on the environment. Take care to ensure
    that the system is working within predefined parameters. Run the `odachk` utility
    often to ensure that the system has no issues and that everything is working correctly.'
