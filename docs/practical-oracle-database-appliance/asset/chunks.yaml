  trans: '### 在 ODA 上部署电子商务套件


    当前最新版本的电子商务套件是 2013 年 9 月发布的 Release 12.2。在开始实施电子商务套件时应选择此版本，因为与`R12.1`相比，它引入了许多技术改进。这些改进包括在线修补以及在应用层的技术栈中使用
    Weblogic 服务器。另一方面，大多数现有的电子商务套件`R12.1`用户在正式发布后不久可能不愿将其系统升级到`R12.2`，因此将 Release
    12.1 迁移到 ODA 的情况仍然会很常见。


    对于新的实施，`R12.2`的快速安装过程已通过打包电子商务套件数据库的 RMAN 备份并添加选项来部署 RAC 或单节点配置（使用 ASM 或文件系统存储数据文件）而得到改进。与`R12.1`唯一可用的原生部署选项——数据文件位于文件系统上的单节点数据库——相比，这提供了更大的灵活性。不幸的是，您将无法利用这些新功能将`R12.2`环境部署到
    ODA 的 RAC on ASM 中，因为电子商务套件数据库已预打包了`compatible=11.2.0`参数。此外，ODA 上 ASM 磁盘组的数据库兼容性设置为`11.2.0.2`。此行为是在使用最新可用的快速安装
    StartCD（`12.2.0.46`）时观察到的，后续版本可能会有所更改，因此请务必查阅`My Oracle Support`注释“Oracle E-Business
    Suite Release Notes, Release 12.2 (Doc ID 1320300.1)”以获取有关 StartCD 更新的信息。


    清单 11-1 显示了如果您尝试将数据库直接安装到 ODA 上的 ASM 磁盘组时，快速安装过程报告的错误。


    清单 11-1. 当在 ODA 上为数据文件使用 ASM 时发生的 Release 12.2 安装错误

    ```

    RMAN-03002: failure of restore command at 10/17/2013 22:16:46

    ORA-19504: failed to create file "+DATA/controlfile_tst1221.ctl"

    ORA-17502: ksfdcre:3 Failed to create file +DATA/controlfile_tst1221.ctl

    ORA-15001: diskgroup "DATA" does not exist or is not mounted

    ORA-15204: database version 11.2.0.0.0 is incompatible with diskgroup DATA

    ORA-19600: input file is control file (/SOFTWARE/eBS/R12.2.2/stage/EBSInstallMedia/AppDB/PROD/backup_controlfile.ctl)

    ORA-19601: output file is control file (+DATA/controlfile_tst1221.ctl)

    ```


    无法通过运行快速安装在 ASM 上部署系统，这为在 ODA 上安装`R12.2`的过程带来了一个严重的复杂性问题。电子商务套件数据库的初始安装必须在文件系统上进行，并且由于
    ODA 上 RAC 数据库唯一的共享存储选项是 ASM，因此您也被限制为单节点配置。这意味着新部署的电子商务套件在安装后必须立即迁移到 ASM 并转换为 RAC。


    如果您计划将电子商务套件`R12.1`系统迁移到 ODA 而不将其升级到`R12.2`，那么整个项目的复杂性取决于系统的当前状态。目标状态很明确——一个运行在
    Linux x86-64 上的 11.2 数据库，以及在您选择在 ODA 上作为虚拟机部署的情况下，应用层使用 Oracle Linux 5 或 6。虽然在技术上可以使用
    Red Hat Enterprise Linux 作为虚拟机上的操作系统来构建应用层，但为了保留“单一责任方”支持⁴，不建议这样做。本章内容将解释如何配置
    ODA 以使其能够运行电子商务套件`R12.2`，但相同的 ODA 配置也能够运行电子商务套件 12.1。


    在裸机（非虚拟化）配置中，在 ODA 上部署电子商务套件`R12.1`数据库层的过程已在`My Oracle Support`注释“Implementing
    Oracle E-Business Suite 12.1 Databases on Oracle Database Appliance (Doc ID 1566935.1)”中得到了很好的解释。目前⁵，尚无专门针对`R12.2`的注释，但过程必定类似。在此，我将主要关注在
    ODA 上虚拟化部署电子商务套件`R12.2`。


    ### 为您的独特环境做规划


    需要注意的设置之一是您选择启用并通过在`My Oracle Support`中生成许可证密钥来许可的 CPU 核心数量。如果您设置的初始核心数过高，在没有`My
    Oracle Support`协助的情况下，无法在裸机配置中减少它。最好从一个较低的设置开始，以后如果需要可以增加。


    仔细规划分配给每个组件的内存，尤其是在原始 ODA 上。需要为 Dom0 保留 8G 内存。一个中等规模的`R12.1`应用层（运行表单、自助应用和并发管理器）可能需要
    16G 内存（请注意，`R12.2`相比`R12.1`需要更多内存）。这样每个 ODA Base 最多剩下 72G。内存设置以后可以根据需要更改，但对于在原始
    ODA 上部署`R12.2`的情况，您需要确保总共 96G 的 RAM 是足够的，因为 ODA 没有可用的硬件升级选项。


    存储配置选项相当有限，并可能成为在 ODA 上完全安装电子商务套件道路上的一个不可避免的障碍。虚拟机可以访问的文件存储位置有两个选项：


    *   两个镜像系统盘上的可用空间（原始 ODA 上为 250G，X3-2 上为 300G）。这些磁盘可用于存储虚拟机的虚拟磁盘映像以用于启动、根卷和交换卷，但速度太慢，无法托管电子商务套件文件系统，因为这将显著影响维护操作，尤其是电子商务套件的修补和备份。

    *   从 ODA Base 域共享的 Oracle ACFS 文件系统。可以使用 NFS 将其挂载到虚拟机上，然后用作两个应用层节点的共享应用层文件系统。其性能远优于内部系统磁盘。ACFS
    卷位于`+RECO` ASM 磁盘组中，如果不使用外部存储，该磁盘组也存储归档日志和备份。


    高达 2.7 版的 Oracle Appliance Kit 没有为 ODA 提供许多存储配置选项（您只能选择备份位置和 ASM 可用性模式），并且可用的磁盘组大小可能不适合所有部署。表
    11-1 显示了以粗体和下划线标记的有问题的配置。


    表 11-1. 基于所选存储配置选项的 ASM 磁盘大小


    | 备份位置 / ASM 可用性 | +DATA / +RECO 大小 (原始 ODA) | +DATA / +RECO 大小 (X3-2) |

    | --- | --- | --- |

    | 本地 / 高 | 1.6 T / 2.038 T | 2.4 T / 3.056 T |

    | 本地 / 正常 | 2.4 T / 3.057 T | 3.6 T / 4.585 T |

    | 外部 / 高 | 3.2 T / 0.438 T | 4.8 T / 0.657 T |

    | 外部 / 正常 | 4.8 T / 0.657 T | 7.2 T / 0.985 T |'
- fmt: "## 存储规划的重要性\n\n你可能会发现 `+DATA` 和 `+RECO` 之间的磁盘空间划分对于电子商务套件配置来说并不理想。电子商务套件应用层文件系统（包括并发管理器的日志和输出）达到\
    \ 300G 并不罕见。此外，在一个相对繁忙的系统中，两到三天的历史归档日志很容易就会填满 250G 到 350G 的空间。因此，基于这些粗略的估算，我认为为\
    \ `+RECO` 磁盘组规划低于 1T 的空间是不够稳妥的。而且，数据库大小可以快速增长到 1T 到 1.5T，这使得你在原始 ODA 上对于存储配置只有一个选择：采用普通冗余\
    \ ASM 磁盘组的本地备份位置设置，该设置为数据库提供 2.4T 的空间，为共享的 ACFS 卷、备份和归档日志提供 3.057T 的空间。X3-2 上的情况稍好一些，但“外部备份位置”设置可能仍然无法在\
    \ `+RECO` 磁盘组中提供足够的空间，让你能安心地为长期的电子商务套件平台选择这些选项。你的情况肯定会与此不同，但我希望我已经阐明了为 ODA 上的电子商务套件部署进行存储规划的重要性。存储配置以后无法更改，因此仔细规划极其重要。\n\
    \n## 应用层安装的限制\n\n只有在 ODA 作为虚拟化平台部署时，才可能在其上进行应用层安装，该功能随着 Oracle 数据库一体机工具包（OAK）2.6\
    \ 版本的发布而可用。ODA 上的虚拟化是一个相对较新的功能，因此预计该领域会发生许多变化，但在 OAK 2.7 版本中，在决定为应用层虚拟机使用 ODA\
    \ 之前，你仍然需要了解虚拟化选项的许多限制。这些限制使得在 ODA 上部署电子商务套件变得更加复杂：\n\n*   虚拟磁盘镜像只能存储在 ODA 服务器节点的系统磁盘上，因为内置的\
    \ Oracle VM Server (OVS) 存储库位于此处。问题在于它基于两个 RAID 1 热插拔磁盘，在原始 ODA 上提供 250G 空间，在\
    \ X3-2 上提供 300G 空间。通过自定义虚拟机配置文件将虚拟磁盘镜像移动到 NFS 存储是可能的，以便从外部 NFS 获得更好的性能；然而，你的目标是完全在\
    \ ODA 上部署电子商务套件。因此，你将系统磁盘保留在原始 OVS 存储库位置，并在应用层虚拟机上挂载 ACFS 卷，为电子商务套件提供共享存储文件系统。\n\
    *   虚拟机只能从虚拟机模板创建。Oracle Appliance Kit 命令行界面 (`oakcli`) 不提供从安装介质（DVD 或 CD，或其镜像）安装虚拟机的方法。这意味着你必须使用\
    \ Oracle 软件交付云提供的可用虚拟机模板或程序集。或者，如果你在其他地方有权访问 Oracle 虚拟化平台，也可以使用 Oracle VM 模板构建器构建并使用自己的虚拟机模板。\n\
    *   ODA 上的虚拟机没有可用的原生负载均衡解决方案。并且无法将虚拟机从一个 ODA 节点迁移到另一个节点，这引入了需要解决的额外可用性限制。你将使用两个配置了\
    \ Linux `keepalived` 的应用层虚拟机来添加一个额外的虚拟 IP 地址，为用户连接到电子商务套件前端服务提供故障转移功能。\n\n###\
    \ 配置数据库服务器上的本地文件系统\n\nR12.2 的全新安装过程不支持安装到 ODA 的 ASM 磁盘组，因为其数据库兼容性设置，因此除了将数据库安装到文件系统外别无选择。电子商务数据库层需要\
    \ 90G 的磁盘空间。从 Oracle 软件交付云下载的安装介质需要 25G[^6]，而 R12.2 安装的解压暂存区还需要另外 25G。总和是 140G。清单\
    \ 11-2 显示了 ODA 基础文件系统的典型大小。很明显，没有足够的空间进行全新安装。\n\n**清单 11-2. ODA 基础文件系统大小**\n\n\
    ```\n[root@s1 ~]# df -hP\nFilesystem            Size  Used Avail Use% Mounted\
    \ on\n/dev/xvda2             55G   17G   36G  32% /\n/dev/xvda1             91M\
    \   40M   47M  46% /boot\n/dev/xvdb1             92G   26G   62G  30% /u01\ntmpfs\
    \                  40G  606M   39G   2% /dev/shm\n/dev/asm/acfsvol-352   50G \
    \ 166M   50G   1% /cloudfs\n```\n\n虚拟化 ODA 的管理域（Dom0）上的 `/OVS` 文件系统中有额外的可用空间。如清单\
    \ 11-3 所示，这部分空间已预留供虚拟机将来使用。请注意 `/OVS` 中有 202G 的可用磁盘空间。\n\n**清单 11-3. Dom0 文件系统大小**\n\
    \n```\n[root@ovs-host1 ~]# df -hP\nFilesystem            Size  Used Avail Use%\
    \ Mounted on\n/dev/md1               19G  2.1G   16G  12% /\ntmpfs           \
    \      2.0G     0  2.0G   0% /dev/shm\n/dev/md3              429G  205G  202G\
    \  51% /OVS\n/dev/md0               99M   53M   41M  57% /boot\nnone         \
    \         2.0G  144K  2.0G   1% /var/lib/xenstored\n```\n\n你将从 Dom0 借用一部分可用空间来创建一个临时的\
    \ 100G 虚拟磁盘镜像供你使用。如果你可以使用 NFS 访问安装介质，则不需要完整的 140G。清单 11-4 到 11-6 中给出的命令需要在 Dom0\
    \ 和 ODA 物理服务器之一上的 ODA 基础上执行，以在 ODA 基础上添加一个 `/u02` 挂载点。在以下示例中，我将空间添加到 ODA 第一个节点上的\
    \ ODA 基础。\n\n清单 11-4 解释了如何在 Dom0 上使用 `dd` 命令创建一个空的虚拟磁盘镜像文件。请注意，文件的总大小（以字节为单位）是\
    \ `bs` 和 `seek` 参数的乘积，你需要根据需求调整这些参数。\n\n**清单 11-4. 在 Dom0 上创建一个空的 100G 磁盘镜像文件\
    \ u02.img**\n\n```\n[root@ovs-host1 oakDom1]# pwd\n/OVS/Repositories/odabaseRepo/VirtualMachines/oakDom1\n\
    [root@ovs-host1 oakDom1]# dd if=/dev/zero of=u02.img bs=1k seek=102400k count=0\n\
    0+0 records in\n0+0 records out\n0 bytes (0 B) copied, 2.2717e-05 seconds, 0.0\
    \ kB/s\n[root@ovs-host1 oakDom1]# ls -lptr u02.img\n-rw-r--r-- 1 root root 107374182400\
    \ Aug 25 07:57 u02.img\n```\n\nODA 虚拟化平台基于 Oracle VM。尽管它是运行在 ODA 上的经过特殊调整的 Oracle\
    \ VM 配置，但它仍然包含 Oracle VM 服务器管理命令行工具 `xm`。清单 11-5 解释了如何在 Dom0 上使用 `xm` 将空的虚拟磁盘镜像作为设备\
    \ `/dev/xvdd` 附加到 ODA 基础虚拟机。\n\n**清单 11-5. 将 u01.img 作为块设备 /dev/xvdd 附加到 ODA 基础**\n\
    \n```\n[root@ovs-host1 oakDom1]# xm block-attach oakDom1 file:/OVS/Repositories/odabaseRepo/VirtualMachines/oakDom1/u02.img\
    \ /dev/xvdd w\n```\n\n将磁盘镜像附加到虚拟机是一个在线操作。请注意，ODA 基础的 `vm.cfg` 文件并未更改，如果虚拟机重启，新设备将不会自动附加。清单\
    \ 11-6 展示了如何在 ODA 基础上为新设备分区、创建文件系统并将其挂载为 `/u02`。\n\n**清单 11-6. 在 ODA 基础上为块设备分区、创建文件系统并将其挂载为\
    \ /u02**\n\n```\n[root@s1 ~]# fdisk /dev/xvdd\nCommand (m for help): n\nCommand\
    \ action\n   e   extended\n   p   primary partition (1-4)\np\nPartition number\
    \ (1-4): 1\nFirst cylinder (1-13054, default 1):\n```\n\n[^6]: 截至撰写本文时，R12.2 安装介质的大小约为\
    \ 25G。请查看最新版本以获取更新信息。"
  raw: 'You can see the disk size split between +DATA and +RECO is not optimal for
    e-Business Suite configurations. It’s not uncommon to see e-Business Suite application
    tier file systems as large as 300G (including the concurrent manager logs and
    outputs). Also, two to three days history of archived logs can easily fill 250G
    to 350G of space in a relatively busy system; therefore, based on these very rough
    estimations, I wouldn’t feel comfortable planning anything less than 1T for the
    +RECO disk group. And, the database size can grow quickly to 1T to 1.5T, which
    leaves you with the only option for storage configuration on the Original ODA—the
    local backup location setting with normal redundancy ASM disk groups, which provides
    2.4T of space for the database and 3.057T of space for the shared ACFS volumes,
    backups, and the archived logs. The situation on the X3-2 is slightly better,
    but still the “external backup location” setting probably doesn’t provide enough
    space in the +RECO disk group to comfortably choose these options for a long-term
    e-Business Suite platform. Your situation will definitely differ from this, but
    I hope I managed to outline the importance of storage planning for e-Business
    Suite deployments on an ODA. The storage configuration can’t be changed later,
    so careful planning is extremely important.


    The application tier installation on an ODA is only possible if it’s deployed
    as a virtualized platform, which became available with the release of Oracle Database
    Appliance Kit (OAK) version 2.6\. The virtualization on the ODA is a relatively
    new feature, so it is expected to see many changes in this area, but in OAK version
    2.7, there are still many limitations in the virtualization options that you have
    to be aware of before deciding to use ODA for application tier VMs. These are
    the limitations that make the deployment of e-Business Suite on ODA more complicated:


    *   Virtual disk images can be stored on the ODA server nodes’ system disks only,
    because the built-in Oracle VM Server (OVS) Repository is located there. The problem
    is that it’s based on two RAID 1 hot swappable disks that provide 250G of space
    on the original ODA and 300G of space on X3-2\. It might be possible to move the
    virtual disk images to NFS storage by customizing the VM configuration files to
    get a better performance from the external NFS; however, your goal here is to
    deploy e-Business Suite fully on ODA. Therefore, you’re leaving the system disks
    in the original OVS repository location and you’re mounting the ACFS volumes on
    the Application tier VMs to provide a shared storage file system for e-Business
    Suite.

    *   Virtual machines can be created from VM templates only. Oracle Appliance Kit
    Command Line Interface (oakcli) does not provide a way to install a VM from an
    installation media (DVD or CD, or their images). This means you have to use the
    available VM templates or assemblies from Oracle Software Delivery Cloud. Alternatively,
    it’s also possible to build and use your own VM templates using the Oracle VM
    Template Builder in case you have access to Oracle virtualization platform elsewhere.

    *   There is no native load balancing solution available for virtual machines
    on ODA. And it’s not possible to migrate VMs from one ODA node to another, which
    introduces additional availability constraints that need to be worked around.
    You''ll use two application tier VMs configured with Linux keepalived to add an
    additional virtual IP address with a failover functionality for user connections
    to the e-Business Suite front-end services.


    ### Configure the Local File System on the Database Server


    The fresh installation process of R12.2 does not support installation to the ODA’s
    ASM disk groups because of their database compatibility settings, so there’s no
    other choice but installing the database on a file system. The e-Business Database
    tier requires 90G of disk space. The installation media downloaded from Oracle
    Software Delivery Cloud requires 25G[⁶](#A978-1-4302-6266-4_11_Chapter.html#Fn6)
    and the unpacked staging area for R12.2 installation requires another 25G. All
    summed up, it’s 140G. Listing 11-2 shows a typical sizing of ODA Base file systems.
    It’s clear there’s not enough free space for a fresh installation.


    Listing 11-2. Sizing of ODA Base File Systems


    `[root@s1 ∼]#` `df -hP`


    `Filesystem            Size  Used Avail Use% Mounted on`


    `/dev/xvda2             55G   17G   36G  32% /`


    `/dev/xvda1             91M   40M   47M  46% /boot`


    `/dev/xvdb1             92G   26G   62G  30% /u01`


    `tmpfs                  40G  606M   39G   2% /dev/shm`


    `/dev/asm/acfsvol-352   50G  166M   50G   1% /cloudfs`


    Additional free space is available on the `/OVS` file system on the management
    domain (Dom0) of the virtualized ODA. It’s been reserved here for future use by
    VMs, as displayed in Listing 11-3\. Note the available 202G of disk space in `/OVS`.


    Listing 11-3. Sizing of Dom0 File Systems


    `[root@ovs-host1 ∼]#` `df -hP`


    `Filesystem            Size  Used Avail Use% Mounted on`


    `/dev/md1               19G  2.1G   16G  12% /`


    `tmpfs                 2.0G     0  2.0G   0% /dev/shm`


    `/dev/md3              429G  205G  202G  51% /OVS`


    `/dev/md0               99M   53M   41M  57% /boot`


    `none                  2.0G  144K  2.0G   1% /var/lib/xenstored`


    You’ll borrow some of the available space from Dom0 to create a temporary, 100G
    virtual disk image for your needs. If you can use NFS to access the installation
    media, you don’t need the whole 140G. The commands given in Listings 11-4 to 11-6
    need to be performed on the Dom0 and the ODA Base on one of the ODA’s physical
    servers to add a `/u02` mount point on ODA Base. In the following examples, I’m
    adding the space to the ODA Base on the first node of the ODA.


    Listing 11-4 explains how to create an empty virtual disk image file on Dom0 using
    the `dd` command. Please note the total size of the file in bytes is the multiplication
    of `bs` and `seek` parameters, and you need to adjust the parameters for your
    needs.


    Listing 11-4. Creating an Empty 100G Disk Image File u02.img on Dom0


    `[root@ovs-host1 oakDom1]#` `pwd`


    `/OVS/Repositories/odabaseRepo/VirtualMachines/oakDom1`


    `[root@ovs-host1 oakDom1]#` `dd if=/dev/zero of=u02.img bs=1k seek=102400k count=0`


    `0+0 records in`


    `0+0 records out`


    `0 bytes (0 B) copied, 2.2717e-05 seconds, 0.0 kB/s`


    `[root@ovs-host1 oakDom1]#` `ls -lptr u02.img`


    `-rw-r--r-- 1 root root 107374182400 Aug 25 07:57 u02.img`


    The ODA virtualization platform is based on Oracle VM. Although it’s a specially
    adjusted configuration of Oracle VM that runs on ODA, it still contains the Oracle
    VM server management command-line tool xm. Listing 11-5 explains how to use xm
    on Dom0 to attach the empty virtual disk image to the ODA Base VM as device `/dev/xvdd`.


    Listing 11-5. Attach the u01.img As a Block Device /dev/xvdd on ODA Base


    `[root@ovs-host1 oakDom1]#` `xm block-attach oakDom1 file:/OVS/Repositories/odabaseRepo/VirtualMachines/oakDom1/u02.img
    /dev/xvdd w`


    Attaching the disk image to the VM is an online operation. Please note the `vm.cfg`
    file for ODA Base is not changed, and if the VM is bounced, the new device will
    not be automatically attached. Listing 11-6 shows how to partition the new device,
    how to create the file system, and how to mount it on ODA Base.


    Listing 11-6. Partition the Block Device, Create the File System, and Mount It
    on ODA Base As /u02


    `[root@s1 ∼]#` `fdisk /dev/xvdd`


    `Command (m for help): n`


    `Command action`


    `e   extended`


    `p   primary partition (1-4)`


    `p`


    `Partition number (1-4): 1`


    `First cylinder (1-13054, default 1):`'
