    database. Also, you have taken a look at how to do these same tasks using the
    Database Configuration Assistant.  Both approaches provide benefit and pitfalls,
    depending on your approach to creating a database within this type of an engineered
    environment. One topic that we have not covered in this chapter is Automatic Storage
    Management. We touched on it earlier while talking about the Database Configuration
    Assistance; however, what tools are available to help you manage ASM on the appliance?


    ## Automatic Storage Management (ASM)


    Since Oracle released Database 10g over a decade ago, the concept of Automatic
    Storage Management has either been confusing, intriguing, or both for many DBAs
    and storage administrators. The base concept around ASM was to provide a central
    point of storage for Oracle databases, while minimizing overhead of management.
    For these reasons, ASM was used with Oracle Real Application Clusters and has
    quickly become a stable storage option for configuring RAC clusters. At this point,
    let’s take a look at how ASM is configured on the Oracle Database Appliance and
    what tool is available to help you manage the ASM that is configured.'
  trans: '

    # 启用/禁用自动维护任务


    根据您的安全要求，数据库可以配置为所有账户使用相同密码，或为不同账户设置不同密码（参见图 4-7）。这是保护数据库的标准 `DBCA` 方法。此处使用 `DBCA`
    可以设置 `SYS` 和 `SYSTEM` 账户的密码；而使用 `oakcli` 命令行选项时，这些密码在创建后由默认密码处理，直到被更改。


    ![A978-1-4302-6266-4_4_Fig7_HTML.jpg](img/A978-1-4302-6266-4_4_Fig7_HTML.jpg)


    图 4-7. 设置数据库凭据


    在您提供账户密码后，`DBCA` 会询问您希望将数据库特定项目（如数据文件、日志文件和控制文件）放置在何处。Oracle 数据库一体机内置了所有组件并配置了自动存储管理
    (`ASM`)，默认是将这些项目存储在 `ASM` 上。但是，您可以在图 4-8 中看到，您可以在集群文件系统 (`CFS`) 和 `ASM` 之间选择存储位置。


    使用 `oakcli` 配置数据库时，会自动在 `ASM` 上进行配置。通过使用 `DBCA` 管理数据库，您可以更好地控制数据库文件的安装和配置位置。


    ![A978-1-4302-6266-4_4_Fig8_HTML.jpg](img/A978-1-4302-6266-4_4_Fig8_HTML.jpg)


    图 4-8. 数据库文件位置


    使用 `oakcli` 和 `DBCA` 的另一个主要区别在于，当您特别想配置归档日志模式和快速恢复区 (`FRA`) 时。使用 `oakcli`，这些选项无法直接从命令行获得。使用
    `DBCA`，您可以指定位置、大小以及是否应启用归档日志。图 4-9 重点展示了可以在 `DBCA` 实用程序中配置的项目。


    ![A978-1-4302-6266-4_4_Fig9_HTML.jpg](img/A978-1-4302-6266-4_4_Fig9_HTML.jpg)


    图 4-9. 恢复信息配置


    至此，在 Oracle 数据库一体机上使用数据库配置助手 (`DBCA`) 时，您已经能够选择和更改那些在 `oakcli` 实用程序中无法触及的设置。使用
    `DBCA` 创建数据库的部分灵活性在于，虽然您选择了用于数据库大小调整的模板，但您可以根据需要调整 `SGA` 和 `PGA`。图 4-10 中的对话框允许您进行这些调整，就像使用
    `DBCA` 创建任何常规数据库时所做的那样。与 `oakcli` 命令相比，您会再次看到 `DBCA` 提供了命令行所不具备的灵活性级别。


    虽然可以配置内存设置，但您还可以配置数据库的大小、字符集和连接模式。但是，请记住，大小、字符集和连接模式选项卡上的信息是由您在之前屏幕上选择的 ODA 模板配置的。尽管这些项目中的许多可以更改，但它们也取决于最初启动
    `DBCA` 时选择的模板。


    ![A978-1-4302-6266-4_4_Fig10_HTML.jpg](img/A978-1-4302-6266-4_4_Fig10_HTML.jpg)


    图 4-10. 初始化参数和环境大小调整


    当您最终到达 `DBCA` 的最后一步时（参见图 4-11），您可以选择将配置保存为模板，并生成可用于未来数据库部署或其他 Oracle 数据库一体机的脚本。


    ![A978-1-4302-6266-4_4_Fig11_HTML.jpg](img/A978-1-4302-6266-4_4_Fig11_HTML.jpg)


    图 4-11. 创建选项


    可以看出，使用数据库配置助手 (`DBCA`) 配置数据库比使用 `oakcli` 命令需要更多时间。使用这两种工具都可以创建数据库；哪种工具更适合这项工作取决于您自己。Oracle
    在使用 `oakcli` 选项在短时间内快速创建数据库方面做得非常出色。另一方面，Oracle 在使用配置助手创建数据库时也给了 DBA 很大的灵活性。


    ### 删除数据库


    与使用数据库配置助手 (`DBCA`) 创建数据库一样，也可以使用 `DBCA` 从 Oracle 数据库一体机中删除数据库。在本章前面，我们了解了使用 `oakcli`
    命令行方法删除数据库。`oakcli` 方法更简单快捷。然而，`DBCA` 提供了相同的功能。实际上，`oakcli` 命令实际上是在后台静默调用 `DBCA`。


    当您查看图 4-2（本章前面部分）时，您会看到有一个删除数据库的选项。如果您选择此选项并继续向导，系统将询问您要删除哪个数据库（参见图 4-12）。


    ![A978-1-4302-6266-4_4_Fig12_HTML.jpg](img/A978-1-4302-6266-4_4_Fig12_HTML.jpg)


    图 4-12. 选择要删除的数据库


    请注意，图 4-12 中的 `DBCA` 会告诉您数据库的当前状态、它使用的配置类型以及它是否正在运行。这些都是帮助您决定是否要删除数据库的指标。单击“完成”后，已突出显示的数据库将从
    Oracle 数据库一体机中删除。


    本章的第一部分是关于如何从 Oracle 数据库一体机添加或删除数据库。您已经了解了如何使用 `oakcli` 命令通过命令行创建和删除数据库。此外，您还了解了如何使用数据库配置助手执行相同的任务。根据您在此类工程化环境中创建数据库的方法，这两种方法各有利弊。本章尚未涉及的一个主题是自动存储管理。我们在讨论数据库配置助手时曾提到过它；但是，有哪些工具可用于帮助您管理一体机上的
    `ASM` 呢？


    ## 自动存储管理 (ASM)


    自从 Oracle 十多年前发布 Database 10g 以来，自动存储管理的概念对许多 DBA 和存储管理员来说，要么令人困惑，要么引人入胜，或者两者兼而有之。`ASM`
    的基本概念是为 Oracle 数据库提供一个中心存储点，同时最小化管理开销。出于这些原因，`ASM` 被用于 Oracle Real Application
    Clusters，并迅速成为配置 RAC 集群的稳定存储选项。现在，让我们看看 `ASM` 是如何在 Oracle 数据库一体机上配置的，以及有哪些工具可用以帮助您管理已配置的
    `ASM`。

    '
- fmt: '### Automatic Storage Management Configuration Assistant


    The Automatic Storage Management Configuration Assistant (`ASMCA`) is the central
    tool for interacting with Automatic Storage Management (`ASM`) in a GUI environment.
    Figure [4-13](#A978-1-4302-6266-4_4_Chapter.html#Fig13) shows you the interface
    that is used when working with `ASM` from a GUI interface.


    ![A978-1-4302-6266-4_4_Fig13_HTML.jpg](A978-1-4302-6266-4_4_Fig13_HTML.jpg)


    Figure 4-13. Automatic Storage Management Configuration Assistant


    By using the `ASMCA` tool, you can get a sense of how the Oracle Database Appliance
    has been configured at the storage level. There are tabs to help identify which
    `ASM` instances are currently running on the Oracle Database Appliance, which
    disk groups have been allocated within the `ASM`, which mount points have been
    formatted as volumes, and which `ASM` Cluster File Systems have been defined on
    the appliance.


    Given that most Oracle Database Appliances have all their storage provisioned
    by default when initially installed, the `ASMCA` tool is mostly used for reconfiguring
    or adding additional storage. The initial size of an `ASM` disk group can be identified
    from the Disk Groups table of the `ASMCA`. From this tab (see Figure [4-14](#A978-1-4302-6266-4_4_Chapter.html#Fig14)),
    the Create button would be used if you wanted to add additional disks or create
    a new disk group; the tab also brings up the interface to add additional disks
    (see Figure [4-15](#A978-1-4302-6266-4_4_Chapter.html#Fig15)).


    ![A978-1-4302-6266-4_4_Fig15_HTML.jpg](A978-1-4302-6266-4_4_Fig15_HTML.jpg)


    Figure 4-15. Adding disk groups


    ![A978-1-4302-6266-4_4_Fig14_HTML.jpg](A978-1-4302-6266-4_4_Fig14_HTML.jpg)


    Figure 4-14. ASM Disk Groups


    It is recommended that you review the details of `ASM` and the associated `SAN`
    on the Oracle Database Appliance before making any major changes.


    Now let’s dive into more about the Automatic Storage Management and how it is
    configured.


    ### Automatic Storage Management Command Line


    Another way to interact with `ASM` is from the command line; a user can access
    `ASM` from the command line by using the `asmcmd` command-line tool. In order
    to access `ASM` from the command line, a user needs to be signed into the operating
    systems as the owner of the Grid Infrastructure software. This is typically the
    `grid` user. Listing 4-13 illustrates how to get to the `asmcmd` prompt after
    logging in as the `grid` user.


    Listing 4-13. Access the ASM from Command Line

    ```

    [root@patty bin]# su - grid

    [grid@patty ∼]$ . oraenv

    ORACLE_SID = [grid] ? +ASM1

    The Oracle base has been set to /u01/app/grid

    [grid@patty ∼]$ asmcmd -p

    ASMCMD [+] >

    ```


    One thing to notice is that the `–p` option was used. This option places the `[+]`
    at the end of the `ASMCMD` prompt and will change every time you change directories.
    Accessing `ASM` in this manner allows you to view the files associated with the
    database and identify any issues that there may be within `ASM`. All commands
    that are used with `ASM`, on both windows and `UNIX`, are `UNIX`-style commands.


    ## Summary


    In this chapter, you looked at how to create and delete databases on the Oracle
    Database Appliance. We took a quick look at how to interact with Oracle’s Automatic
    Storage Management. As outlined, the Oracle Database Appliance is simply a two-node
    Real Application Cluster that can be configured with many different styles of
    databases, and it is flexible enough to enable a business to build and scale using
    minimal resources.


    # 5. Networking


    Abstract


    Understanding network deployment is important for anyone considering `ODAs` as
    a solution for their company. You need to understand the networks provided by
    an `ODA` to determine how they mesh with your requirements and data center standards.
    Security requirements may need to be considered during your network planning.
    The deployment of engineered systems often involves blending or broadening job
    roles, because tasks that used to be handled by multiple teams are now packaged
    into the engineered system solution. When deploying new solutions at your company,
    you can seldom just pass the documentation on to your networking and data center
    teams and ask them to develop the network requirements. You may need to become
    directly involved in preparing the network specifications for deploying your `ODAs`,
    or at least understand the options to answer questions that come from other teams.
    This chapter will help you understand your `ODA` network deployment options.


    Understanding network deployment is important for anyone considering `ODAs` as
    a solution for their company. You need to understand the networks provided by
    an `ODA` to determine how they mesh with your requirements and data center standards.
    Security requirements may need to be considered during your network planning.
    The deployment of engineered systems often involves blending or broadening job
    roles, because tasks that used to be handled by multiple teams are now packaged
    into the engineered system solution. When deploying new solutions at your company,
    you can seldom just pass the documentation on to your networking and data center
    teams and ask them to develop the network requirements. You may need to become
    directly involved in preparing the network specifications for deploying your `ODAs`,
    or at least understand the options to answer questions that come from other teams.
    This chapter will help you understand your `ODA` network deployment options.


    ## ODA Models


    Oracle has released two `ODA` models. The networking aspects of these models differ
    noticeably. The next two subsections describe the networking available on each
    of the two models.'
