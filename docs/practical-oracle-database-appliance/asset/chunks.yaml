    ### 原始 ODA


    第一代 Oracle 数据库一体机机箱内集成了两个计算节点。每台服务器拥有四组绑定的以太网端口。默认情况下，`bond0`用于公共流量，而`bond1`、`bond2`和`xbond0`用于辅助访问，这将在第
    6 章中更详细地介绍。在安装 Oracle 数据库一体机之前，请将两根线缆连接到`eth2`和`eth3`端口。通常，这些端口会连接到数据中心内独立的交换机以实现容错。绑定的默认配置会在两个端口之间进行流量负载均衡，这意味着绑定能够自动从单个网络路径故障中恢复。在图
    3-1 和表 3-1 中，您将看到 Oracle 数据库一体机的详细示意图，以及图中编号注释的说明。


