    如图 2-1 所示的"摘要"屏幕信息丰富，可让您快速获取大量汇总信息。左侧的菜单部分允许获取每个组件的更详细信息。该菜单还包括用于设置和自定义 `ILOM`
    的选项。


    图 2-2 显示了来自原始数据库套件的摘要屏幕。如您所见，图 2-1 中的新界面提供了一种更简单的方式来查找信息，并且菜单导航更加直观。在接下来的章节中介绍这些功能时，我们将指出如何从两个
    `ILOM` 访问各个位置。


    ![A978-1-4302-6266-4_2_Fig2_HTML.jpg](img/A978-1-4302-6266-4_2_Fig2_HTML.jpg)


