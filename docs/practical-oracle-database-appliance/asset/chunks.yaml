  trans: '

    ODA 安装海报是一种简单易懂的设备安装和设置方法。该海报是一个逐步指南，解释了如何连接线缆以部署软件，从而得到一个功能完整的集群数据库服务器。图 1-5
    对此进行了详细展示。Oracle 会为每个发布版本更新此海报。海报可在 ODA 文档网站上获取：[`http://docs.oracle.com/cd/E22693_01`](http://docs.oracle.com/cd/E22693_01)。


    ![A978-1-4302-6266-4_1_Fig5_HTML.jpg](img/A978-1-4302-6266-4_1_Fig5_HTML.jpg)


    图 1-5. ODA V1 安装海报³


    ODA 配备了完全冗余的硬件，包括两个 10 吉比特以太网（GbE）接口，它们通过 Linux 操作系统绑定在一起以提供冗余；此外还有两个 3×2 的 1GbE
    接口，同样为了冗余目的而绑定在一起。设备上有一个用于 ILOM（集成 Lights Out Manager）的接口，以及用于连接键盘和外置显示器的 USB
    和 VGA 接口（如果需要）。


    ODA 的独特之处在于它板载了一个用于连接两个数据库服务器的互连网络。该互连网络是 1GbE，使用 Intel 82571 板卡；它没有被绑定。这就是为什么从集群
    ware（Clusterware）中可以看到两个集群互连，对应两个 HAIP 设备。由于这些私有互连是设备内部的，因此不需要外部布线。


    ODA 由 `Oracle Appliance Kit (OAK)` 管理，这是一套专有的软件，专用于 ODA。`OAK` 以及各种 ODA 软件功能将在后续章节中讨论。虚拟化作为一项可选功能被添加到
    ODA 平台中，同样会在后续章节中探讨。


    ### Oracle Database Appliance X3-2


    ODA X3-2 是 ODA 设备的第二代产品。它拥有许多新功能，且容量比其前代产品更大。图 1-6 展示了该设备的正面视图。


    Oracle Database Appliance X3-2 扩展了 ODA V1 的功能，在硬件和存储能力方面表现出色。Oracle 在 X3-2 的硬件架构上采取了略有不同的方法。服务器节点和存储机架现在是两个独立的单元，它们连接在一起，并且可以选择添加一个扩展存储机架，使设备的存储容量翻倍。


    ![A978-1-4302-6266-4_1_Fig6_HTML.jpg](img/A978-1-4302-6266-4_1_Fig6_HTML.jpg)


    图 1-6. Oracle Database Appliance X3-2


    X3-2 比第一代设备在结构上更具模块化，提供了灵活性。客户能够通过添加额外的存储机架来扩展存储。他们可以在数据中心分别放置存储机架和服务器节点机架；不过，我们建议将这些组件安装在一起。


    X3-2 仍然是一个 4U 的机架可安装单元，但它被划分为两个独立的 2U 单元。服务器单元各为 1U，存储单元也为 2U。如果选择了扩展机架，将为系统再增加
    2U 空间。表 1-4 列出了 X3-2 机箱的完整规格，但简而言之，该机箱的特色是 `Intel Xeon E5-2690` 处理器、256GB 内存、两个
    10GbE 外部铜缆连接以及两个 10GbE 内部网络互连。还包括共享的串行连接 SCSI (SAS) 磁盘。内部磁盘现在是 600GB，高于 V1 中的
    500GB 配置。


    表 1-4. Oracle Database Appliance X3-2 规格


    | 组件 | 规格 |

    | --- | --- |

    | CPU | 两个 8 核 Intel® Xeon® 处理器 E5-2690 |

    | 内存 | 256GB（16 个 16GB RDIMM，1600 MHz） |

    | 网络 | 四个 100/1000/10G Base-T 以太网端口（板载）<br>1 个双端口 10GBase-T 互连，用于集群通信 |

    | 内部存储 | 两个 2.5 英寸 600GB 10K rpm SAS-2 HDD（镜像）操作系统 |

    | RAID 控制器 | 1 个双端口内部 SAS-2 HBA<br>2 个双端口外部 SAS-2 HBA |

    | 共享存储 | 二十个 2.5 英寸 900GB 10K rpm SAS-2 HDD<br>每个机架四个 2.5 英寸 200GB SAS-2 SLC SSD，用于数据库重做日志<br>可选存储扩展：添加额外的存储机架可使存储容量翻倍<br>支持外部
    NFS 存储 |

    | 操作系统 | Oracle Enterprise Linux 5.8 x86_64 |


    ODA X3-2 提供了非常详尽的规格参数。它是原始 ODA 的强大继任者。Oracle 在安装上增加了一点复杂性，以适应将存储机架与实际服务器单元分开的灵活性。这允许根据需要添加第二个机架，但现在您需要确保按照设备附带的安装海报正确布线。


    与原始 ODA 一样，X3-2 的安装海报经过了增强，成为一个方便的资源，以帮助安装。图 1-7 显示了该海报，它会随着软件的每个版本进行更新。目前，安装海报包含了将
    ODA 设置为裸机环境或虚拟化环境的说明。


    ![A978-1-4302-6266-4_1_Fig7_HTML.jpg](img/A978-1-4302-6266-4_1_Fig7_HTML.jpg)


    图 1-7. Oracle Database Appliance X3-2 安装海报


