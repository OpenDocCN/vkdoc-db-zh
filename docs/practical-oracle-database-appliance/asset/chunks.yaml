    `[oracle@patty bin]$ ./dbca`


    Figure [4-1](#A978-1-4302-6266-4_4_Chapter.html#Fig1) shows the start screen for
    the DBCA once invoked from the Oracle Home.


    ![A978-1-4302-6266-4_4_Fig1_HTML.jpg](A978-1-4302-6266-4_4_Fig1_HTML.jpg)


    Figure 4-1.


    The DBCA start screen


    Once the DBCA is invoked and started, you can perform all the normal functions
    of creating or managing a database as you would in normal everyday management.  Figure
    [4-2](#A978-1-4302-6266-4_4_Chapter.html#Fig2) provides five different options
    that either create or manage a database. These options are ones that many database
    administrators are used to seeing when creating or managing databases with the
    DBCA.


    ![A978-1-4302-6266-4_4_Fig2_HTML.jpg](A978-1-4302-6266-4_4_Fig2_HTML.jpg)


    Figure 4-2.


    DBCA Operations


    Let’s take a look at creating a database on the Oracle Database Appliance using
    the Database Configuration Assistant tool. By selecting the Create A Database
    option and then clicking Next, you are presented with the template options for
    creating a database. The template options (see Figure [4-3](#A978-1-4302-6266-4_4_Chapter.html#Fig3))
    match up to the sizing options that you are presented when you invoke the `oakcli`
    at the command line. Just like the command-line options, select the size of the
    database you would like to create.


    ![A978-1-4302-6266-4_4_Fig3_HTML.jpg](A978-1-4302-6266-4_4_Fig3_HTML.jpg)


    Figure 4-3.


    Database Templates


    Once you click Next, the DBCA will ask you for naming information associated with
    the database (see Figure [4-4](#A978-1-4302-6266-4_4_Chapter.html#Fig4)). What
    you will also notice on the DBCA screen are two options: Admin-Managed and Policy-Managed.
    These two options determine how the database will be managed by the clusterware
    within the Oracle Database Appliance.


    Note


    Admin-Managed means that the database will be tied to specific servers. Policy-Managed
    means the instances are dynamic and automatically based on pools of servers for
    effective resource utilization.


    Additionally, you will notice that the two node names associated with the cluster
    are listed. By selecting one or both of these nodes, the databases will be created
    on all nodes selected.  By default, the node from where you are running DBCA will
    be highlighted and required.  If a node is not selected, then it will not be included
    in the configuration of your database.


    ![A978-1-4302-6266-4_4_Fig4_HTML.jpg](A978-1-4302-6266-4_4_Fig4_HTML.jpg)


    Figure 4-4.


    Database Identification


    By using DBCA to create a database on the Oracle Database Appliance, you will
    get the option to attach the database to an Oracle Enterprise Manager (see Figure
    [4-5](#A978-1-4302-6266-4_4_Chapter.html#Fig5)) if you wish to monitor the databases
    on the appliance from a central point. The option to configure the database console
    is still available as well, if desired. This is a flexibility that is provided
    without using the `oakcli` command-line option.


    ![A978-1-4302-6266-4_4_Fig5_HTML.jpg](A978-1-4302-6266-4_4_Fig5_HTML.jpg)


    Figure 4-5.


    Configure monitoring


    On the same screen, you see a tab titled Automatic Maintenance Tasks (see Figure
    [4-6](#A978-1-4302-6266-4_4_Chapter.html#Fig6)).  Enabling automatic tasks can
    help you manage a range of administrative functions.  On this tab, you can enable
    or disable this automation of tasks by either checking or unchecking the associated
    check box.


    ![A978-1-4302-6266-4_4_Fig6_HTML.jpg](A978-1-4302-6266-4_4_Fig6_HTML.jpg)


    Figure 4-6.'
  trans: "\n\n## 数据库删除\n\n我们刚刚了解了如何使用 `oakcli` 命令创建三种不同类型的数据库。如果你想从 Oracle 数据库一体机中删除一个数据库该怎么办呢？`oakcli`\
    \ 命令也提供了一个选项来实现这一点。正如你在本章开头所复习的，`oakcli` 命令有一个 `delete` 选项。\n\n`oakcli` 命令的 `delete`\
    \ 选项具有与 `create` 选项相同的命令行选项。清单 4-10 显示了可用的选项。\n\n**清单 4-10.** oakcli 删除选项\n\n\
    ```\n[root@patty bin]# ./oakcli delete -h\nUsage:\noakcli delete {database | dbhome\
    \ | db_config_params}   [<options>]\nwhere:\n          database             -\
    \ deletes the database\n          dbhome               - deletes the database\
    \ home\n          db_config_params     - deletes the database config parameter\
    \ file\n```\n\n既然你已经理解了 `delete` 选项的功能，让我们来看看如何删除之前创建的一个数据库。要从 Oracle 数据库一体机中删除数据库，请执行以下命令：\n\
    \n```\n[root@patty bin]# ./oakcli delete database -db bcodatst\n```\n\n当调用 `delete`\
    \ 选项时，系统会要求你提供 `root` 和 `oracle` 用户的密码。然后，`oakcli` 实用程序将以这些用户身份登录，并通过节点之间的安全外壳（SSH）连接进行连接，以便删除数据库。清单\
    \ 4-11 显示了从 Oracle 数据库一体机中删除 RAC 数据库的完整输出。\n\n**清单 4-11.** 提示输入 root 和 oracle\
    \ 用户（密码未键入）\n\n```\nPlease enter the 'root' user password:\nPlease re-enter the\
    \ 'root' user password:\nPlease enter the 'oracle' user password:\nPlease re-enter\
    \ the 'oracle' user password:\nINFO: 2013-11-12 18:18:44: Setting up ssh\n............done\n\
    SUCCESS: Ran /usr/bin/rsync -tarvz /opt/oracle/oak/onecmd/ root@192.168.16.25:/opt/oracle/oak/onecmd\
    \ --exclude=*zip --exclude=*gz --exclude=*log --exclude=*trc --exclude=*rpm and\
    \ it returned: RC=0\nsending incremental file list\n ./\n T4DBTemplate.dbt\n delete_databse.params\n\
    \ tmp/\n tmp/DoAllcmds-20131112175008.sh\n tmp/DoAllcmds.sh\n tmp/all_nodes\n\
    \ tmp/bcsingleDBTemplate.dbt\n tmp/db_nodes\n tmp/dbca-bcsingle.sh\n tmp/dbupdates-bcsingle.lst\n\
    \ tmp/dbupdates-bcsingle.sh\n tmp/priv_ip_group\n tmp/racclonepl.sh\n tmp/u01apporacleproduct11.2.0.3dbhome_5-optoracleoakpkgreposorapkgsDB11.2.0.3.7Basedb112.tar.gz.out\n\
    \ tmp/vip_node\n sent 8774 bytes  received 8945 bytes  35438.00 bytes/sec\n total\
    \ size is 17857762  speedup is 1007.83\n..........done\n..........done\n...\n\
    SUCCESS: All nodes in /opt/oracle/oak/onecmd/tmp/db_nodes are pingable and alive.\n\
    INFO: 2013-11-12 18:19:51: Successfully setup the ssh\nINFO: 2013-11-12 18:19:52:\
    \ Deleting the database bcodatst. It will take few minutes. Please wait...\n...\n\
    ...\nSUCCESS: 2013-11-12 18:23:54: Successfully deleted the database bcodatst\n\
    ```\n\n## 数据库配置助手\n\n如你所见，Oracle 为在 Oracle 数据库一体机上创建和删除数据库提供了非常简便的方法。这种简便性得益于\
    \ Oracle 主目录中提供的许多 Oracle 实用程序。然而，虽然命令行界面简洁易用，你也可以选择图形用户界面（GUI）形式的数据库配置助手。它缩写为\
    \ `DBCA`，你最常听到的就是这个称呼。\n\n### 创建数据库\n\n`oakcli` 命令行工具以静默模式调用数据库配置助手（`DBCA`）。你并不局限于静默模式，也可以以\
    \ GUI 模式调用 `DBCA` 来创建 RAC、RAC One 或单实例数据库。\n\n要在 Oracle 数据库一体机上调用 `DBCA`，你需要进入\
    \ Oracle 主目录并从其 `bin` 目录下调用它。清单 4-12 给出了如何调用 `DBCA` 的示例。\n\n**清单 4-12.** 调用数据库配置助手（DBCA）\n\
    \n```\n[oracle@patty ∼]$ cd $ORACLE_HOME/bin\n[oracle@patty bin]$ ./dbca\n```\n\
    \n图 4-1 显示了从 Oracle 主目录调用后，`DBCA` 的启动屏幕。\n\n![A978-1-4302-6266-4_4_Fig1_HTML.jpg](img/A978-1-4302-6266-4_4_Fig1_HTML.jpg)\n\
    \n**图 4-1.** DBCA 启动屏幕\n\n一旦 `DBCA` 被调用并启动，你就可以执行创建或管理数据库的所有常规功能，就像在日常管理中一样。图\
    \ 4-2 提供了五个不同的选项，用于创建或管理数据库。这些选项是许多数据库管理员在使用 `DBCA` 创建或管理数据库时习惯看到的。\n\n![A978-1-4302-6266-4_4_Fig2_HTML.jpg](img/A978-1-4302-6266-4_4_Fig2_HTML.jpg)\n\
    \n**图 4-2.** DBCA 操作\n\n让我们看看如何使用数据库配置助手工具在 Oracle 数据库一体机上创建数据库。选择 `创建数据库` 选项，然后单击\
    \ `下一步`，系统将显示创建数据库的模板选项。这些模板选项（见图 4-3）与在命令行调用 `oakcli` 时出现的大小选项相对应。就像命令行选项一样，选择你想要创建的数据库大小。\n\
    \n![A978-1-4302-6266-4_4_Fig3_HTML.jpg](img/A978-1-4302-6266-4_4_Fig3_HTML.jpg)\n\
    \n**图 4-3.** 数据库模板\n\n一旦你单击 `下一步`，`DBCA` 将要求你提供与数据库关联的命名信息（见图 4-4）。你还会在 `DBCA`\
    \ 屏幕上注意到两个选项：`管理员管理` 和 `策略管理`。这两个选项决定了数据库在 Oracle 数据库一体机内的集群件中将如何被管理。\n\n**注意**\n\
    \n`管理员管理` 意味着数据库将绑定到特定的服务器。`策略管理` 意味着实例是动态的，并自动基于服务器池以实现有效的资源利用。\n\n此外，你会注意到集群关联的两个节点名称被列出。通过选择其中一个或两个节点，数据库将在所有选定的节点上创建。默认情况下，你运行\
    \ `DBCA` 的节点将被高亮显示且是必需的。如果某个节点未被选中，则它将不会包含在你的数据库配置中。\n\n![A978-1-4302-6266-4_4_Fig4_HTML.jpg](img/A978-1-4302-6266-4_4_Fig4_HTML.jpg)\n\
    \n**图 4-4.** 数据库标识\n\n通过使用 `DBCA` 在 Oracle 数据库一体机上创建数据库，你将可以选择将数据库附加到 Oracle 企业管理器（见图\
    \ 4-5），如果你希望通过一个中心点监控一体机上的数据库。如果需要，配置数据库控制台的选项也同样可用。这是一种无需使用 `oakcli` 命令行选项即可获得的灵活性。\n\
    \n![A978-1-4302-6266-4_4_Fig5_HTML.jpg](img/A978-1-4302-6266-4_4_Fig5_HTML.jpg)\n\
    \n**图 4-5.** 配置监控\n\n在同一屏幕上，你会看到一个名为 `自动维护任务` 的选项卡（见图 4-6）。启用自动任务可以帮助你管理一系列管理功能。在此选项卡上，你可以通过勾选或取消勾选相关的复选框来启用或禁用此任务自动化。\n\
    \n![A978-1-4302-6266-4_4_Fig6_HTML.jpg](img/A978-1-4302-6266-4_4_Fig6_HTML.jpg)\n\
    \n**图 4-6.**\n"
- fmt: '# Enable/disable automatic maintenance tasks


    Depending on your security requirements, the database can be configured with the
    same password for every account, or different passwords for different accounts
    (see Figure [4-7](#A978-1-4302-6266-4_4_Chapter.html#Fig7)). This is a standard
    `DBCA` approach to securing the database. Using the `DBCA` here allows you to
    set the passwords for the `SYS` and `SYSTEM` accounts; whereas with the `oakcli`
    command-line option, these passwords are handled by a default password until they
    are changed after creation.


    ![A978-1-4302-6266-4_4_Fig7_HTML.jpg](A978-1-4302-6266-4_4_Fig7_HTML.jpg)


    Figure 4-7. Setting database credentials


    After you provide the passwords for the accounts, the `DBCA` asks where you would
    like to place the database-specific items, such as data files, log files, and
    control files. The Oracle Database Appliance has everything built-in and Automatic
    Storage Management (`ASM`) configured, and the default is to store these items
    on `ASM`. However, you can see in Figure [4-8](#A978-1-4302-6266-4_4_Chapter.html#Fig8)
    that you can choose between Cluster File System (`CFS`) and `ASM` as storage locations.


    When configuring the database from `oakcli`, you are automatically configured
    on `ASM`. By using the `DBCA` to manage a database, you can have greater control
    over where the database files are installed and configured.


    ![A978-1-4302-6266-4_4_Fig8_HTML.jpg](A978-1-4302-6266-4_4_Fig8_HTML.jpg)


    Figure 4-8. Database file locations


    Another major difference between using the `oakcli` and the `DBCA` is when you
    specifically want to configure archivelog mode and the Fast Recovery Area (`FRA`).
    Using the `oakcli`, these options are not readily available from the command line.
    With `DBCA`, you can specify the location, size, and whether the archive log should
    be enabled. Figure [4-9](#A978-1-4302-6266-4_4_Chapter.html#Fig9) highlights the
    items that can be configured within the `DBCA` utility.


    ![A978-1-4302-6266-4_4_Fig9_HTML.jpg](A978-1-4302-6266-4_4_Fig9_HTML.jpg)


    Figure 4-9. Recovery information configuration


    Up to this point, when using the Database Configuration Assistant (`DBCA`) on
    the Oracle Database Appliance, you have been able to select and change settings
    that you could not touch from the `oakcli` utility. Part of the flexibility of
    using the `DBCA` to create a database is that, although you selected a template
    for database sizing, you can adjust the `SGA` and `PGA` as desired. The dialog
    in Figure [4-10](#A978-1-4302-6266-4_4_Chapter.html#Fig10) allows you to make
    these adjustments as you would do with any normal database being created with
    the `DBCA`. When compared to the `oakcli` command, you see the `DBCA` again provides
    a level of flexibility that the command line does not provide.


    Although the memory settings can be configured, you also can configure the size,
    character set, and connection modes of the database. However, keep in mind that
    the information on the size, character set, and connection mode tabs are configured
    by the ODA template that you selected on an earlier screen. Although many of these
    items can be changed, they are also dependent on the template that was selected
    when the `DBCA` was initially started.


    ![A978-1-4302-6266-4_4_Fig10_HTML.jpg](A978-1-4302-6266-4_4_Fig10_HTML.jpg)


    Figure 4-10. Initialization parameters and environment sizing


    When you finally reach the last step of the `DBCA` (see Figure [4-11](#A978-1-4302-6266-4_4_Chapter.html#Fig11)),
    you have the option to save the configuration as a template and generate scripts
    that can be used for future database deployments or on other Oracle Database Appliances.


    ![A978-1-4302-6266-4_4_Fig11_HTML.jpg](A978-1-4302-6266-4_4_Fig11_HTML.jpg)


    Figure 4-11. Creation Options


    As you can tell, using the Database Configuration Assistant (`DBCA`) requires
    more time to configure a database than it took with the `oakcli` command. With
    both tools, databases can be created; which tool is better for the job is up to
    you. Oracle has done a very good job at providing a way to quickly create a database
    in a short amount of time using the `oakcli` option. On the other hand, Oracle
    has also given the DBA a great deal of flexibility when it comes to creating databases
    with the configuration assistant.


    ### Deleting a Database


    As with creating a database with the Database Configuration Assistant (`DBCA`),
    a database can be deleted from the Oracle Database Appliance with the `DBCA`.
    Earlier in the chapter, we took a look at the `oakcli` command-line approach to
    deleting a database. The `oakcli` approach is much simpler and quicker. However,
    the `DBCA` provides the same functionality. In fact, the `DBCA` is actually called
    silently by the `oakcli` command.


    When you take a look at Figure [4-2](#A978-1-4302-6266-4_4_Chapter.html#Fig2)
    (earlier in the chapter), you see that there is an option to delete a database.
    If you select this option and continue with the wizard, you will be asked what
    database you would like to remove (see Figure [4-12](#A978-1-4302-6266-4_4_Chapter.html#Fig12)).


    ![A978-1-4302-6266-4_4_Fig12_HTML.jpg](A978-1-4302-6266-4_4_Fig12_HTML.jpg)


    Figure 4-12. Select database to delete


    Notice that the `DBCA` in Figure [4-12](#A978-1-4302-6266-4_4_Chapter.html#Fig12)
    tells you the current status of the database, which configuration type it uses,
    and whether it is running or not. These are all indicators to help you make the
    decision whether or not you want to remove the database. Once you click Finish,
    the database that has been highlighted will be removed from the Oracle Database
    Appliance.


    The first portion of this chapter has been about how to add or delete a database
    from the Oracle Database Appliance. You have taken a look at how this can be done
    from the command line using the `oakcli` commands for creating and deleting a
    database. Also, you have taken a look at how to do these same tasks using the
    Database Configuration Assistant. Both approaches provide benefit and pitfalls,
    depending on your approach to creating a database within this type of an engineered
    environment. One topic that we have not covered in this chapter is Automatic Storage
    Management. We touched on it earlier while talking about the Database Configuration
    Assistance; however, what tools are available to help you manage `ASM` on the
    appliance?


    ## Automatic Storage Management (ASM)


    Since Oracle released Database 10g over a decade ago, the concept of Automatic
    Storage Management has either been confusing, intriguing, or both for many DBAs
    and storage administrators. The base concept around `ASM` was to provide a central
    point of storage for Oracle databases, while minimizing overhead of management.
    For these reasons, `ASM` was used with Oracle Real Application Clusters and has
    quickly become a stable storage option for configuring RAC clusters. At this point,
    let’s take a look at how `ASM` is configured on the Oracle Database Appliance
    and what tool is available to help you manage the `ASM` that is configured.'
