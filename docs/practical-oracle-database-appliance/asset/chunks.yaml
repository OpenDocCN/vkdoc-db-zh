    \nMy Oracle Support note “FAQ : ODA 2.3 New Features includes Multiple Homes &\
    \ 3rd Party Agent Support (Doc ID 1415773.1).”\n\n# 12. Oracle Enterprise Manager\
    \ and the ODA\n\nAbstract\n\nOracle Enterprise Manager Cloud Control 12c (referred\
    \ to hereafter as EM12c) is the latest version of Oracle Corporation’s end-to-end\
    \ management tool for both Oracle and non-Oracle technology. Previously known\
    \ as Oracle Enterprise Manager (OEM) or Oracle Enterprise Manager Grid Control,\
    \ the tool has been around for quite some time now. The 12c release, though, is\
    \ a landmark version that makes huge advances in terms of both the breadth and\
    \ depth of its functionality. In many ways, this release has moved Enterprise\
    \ Manager from being a database administrator’s monitoring tool, to a tool that\
    \ can be used to manage your entire Oracle data center.\n\nOracle Enterprise Manager\
    \ Cloud Control 12c (referred to hereafter as EM12c) is the latest version of\
    \ Oracle Corporation’s end-to-end management tool for both Oracle and non-Oracle\
    \ technology. Previously known as Oracle Enterprise Manager (OEM) or Oracle Enterprise\
    \ Manager Grid Control, the tool has been around for quite some time now. The\
    \ 12c release, though, is a landmark version that makes huge advances in terms\
    \ of both the breadth and depth of its functionality. In many ways, this release\
    \ has moved Enterprise Manager from being a database administrator’s monitoring\
    \ tool, to a tool that can be used to manage your entire Oracle data center.\n\
    \nBefore you can understand how EM12c can be used in an ODA environment, you really\
    \ need to have an understanding of the basic architecture of EM12c, so let’s start\
    \ by providing you with an introduction to the basic architecture of EM12c.\n\n\
    ## Architecture Overview\n\nFrom an architectural perspective, EM12c is composed\
    \ of five main parts:\n\n*   The Cloud Control console\n*   Oracle Management\
    \ agents\n*   The Oracle Management Service\n*   The Oracle Management Repository\n\
    *   Plug-ins\n\nLet’s look at each of these in more detail.\n\nNote\n\nA discussion\
    \ of the licensing for EM12c is beyond the scope of this book. (An entire licensing\
    \ document is available in the Enterprise Manager documentation at [`http://docs.oracle.com/cd/E24628_01/license.121/e24474/toc.htm`](http://docs.oracle.com/cd/E24628_01/license.121/e24474/toc.htm)\
    \ .) However, it’s worth noting that, in general, most of the basic functionality\
    \ described here carries a restricted-use license and therefore is free. This\
    \ restricted-use license refers specifically to Enterprise Manager, however, and\
    \ many add-on options do come with license costs. Refer to the licensing documentation\
    \ for full details.\n\n### The Cloud Control Console\n\nThe Cloud Control console\
    \ provides the user interface that you use to access, monitor, and administer\
    \ your computing environment. The console is accessed via a web browser, thus\
    \ allowing you to access the central console from any location. You can customize\
    \ the EM12c console much more than in previous releases, allowing you the following\
    \ options:\n\n*   Choosing your home page from various predefined pages (or indeed\
    \ setting any page you want to be your personal home page)\n*   Moving regions\
    \ around on a target home page\n*   Adding regions that might be of more interest\
    \ to you than the defaults\n*   Deleting regions that aren’t of interest to you\n\
    \nThe graphical user interface (GUI) provides a history of the most recent targets\
    \ you have visited (the standard browser history is also available). In addition,\
    \ you can mark pages as favorites and have them appear in a favorites list on\
    \ the new menu-driven interface. Figure [12-1](#A978-1-4302-6266-4_12_Chapter.html#Fig1)\
    \ shows an example of the default home page.\n\n![A978-1-4302-6266-4_12_Fig1_HTML.jpg](A978-1-4302-6266-4_12_Fig1_HTML.jpg)\n\
    \nFigure 12-1.\n\nThe new default home page in EM12c"
