- fmt: '### Real Application Cluster (RAC) Network


    Oracle Real Application Cluster 11g Release 2 (RAC) comes preinstalled on the
    Oracle Database Appliance. This version of RAC introduces the concept of a Single
    Client Access Name (SCAN) addressing. A SCAN address provides the cluster with
    an alias for the database by providing two or more IP addresses. This alias-like
    approach allows remote clients to connect without the need to change connection
    information related to the environment.


    **Note**

    SCAN requires either a corporate DNS or the Oracle Global Naming Service to work.
    For the Oracle Database Appliance, the approach is to use your corporate DNS.
    More information on SCAN can be found at [`www.oracle.com/technetwork/products/clustering/overview/scan-129069.pdf`](http://www.oracle.com/technetwork/products/clustering/overview/scan-129069.pdf).


    SCAN addressing uses DNS in a round-robin approach. This approach ensures that
    network traffic is load balanced across multiple IP addresses. This approach ensures
    that remote hosts can configure local naming without needing to change connection
    information if changes in the environment occur. Table [3-6](#A978-1-4302-6266-4_3_Chapter.html#Tab6)
    provides an example of how to configure entries in your corporate DNS server.


    **Note**

    DNS entries for SCAN should have no less than three IP addresses associated with
    it.


    **Table 3-6. Domain Name Service (DNS) Settings**


    | DNS Name | IP Address(es) |

    | --- | --- |

    | ejb-vip1.m57.local | 172.30.0.22 |

    | ejb-vip2.m57.local | 172.30.0.23 |

    | ejb-scan.m57.local | 172.30.0.24, 172.30.0.25, 172.30.0.26 |


    At this point, you should have a basic understanding of the components that are
    needed to configure the network on an Oracle Database Appliance. Next you need
    to configure all these network-related items by connecting to the ILOM.


