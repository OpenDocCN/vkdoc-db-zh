    The last step, which concludes the configuration of the e-Business Suite database
    in RAC, is adding an e-Business Specific `ORA_NLS10` environment variable to the
    CRS service of the database. Execute the following command on any of the database
    servers:


    `[oracle@s1 ∼]$` `srvctl setenv database -d PROD -t "TNS_ADMIN=$ORACLE_HOME/network/admin,ORA_NLS10=$ORACLE_HOME/nls/data/9idata"`


    Additionally, it’s important to know that AutoConfig on the database nodes sets
    the `tcp.validnode_checking=yes`, and `tcp.invited_nodes` lists only the physical
    and virtual IPs of the database nodes in the `sqlnet.ora` file. This means the
    listener will accept new connections from the database nodes only. As you’ll need
    to connect to the database from two application servers, too additional nodes
    need to be added to the `tcp.invited_nodes` by overriding that parameter in the
    custom include file `sqlnet_ifile.ora`, as shown next. (If you prefer disabling
    the `tcp.validnode_checking` completely, the best way of doing so is changing
    the e-Business Suite profile option “SQLNet Access” to ALLOW_ALL, and then re-running
    AutoConfig on the database nodes).


    `[oracle@s1 ∼]$` `echo "tcp.invited_nodes=(s1, s2, s1-vip, s2-vip, oevm1, oevm2)"
    > $TNS_ADMIN/sqlnet_ifile.ora`


