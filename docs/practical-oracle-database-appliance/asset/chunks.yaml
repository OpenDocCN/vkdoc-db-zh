- fmt: "## Database Deletion\n\nWe’ve just taken a look at how to create three different\
    \ types of databases by using the `oakcli` command. What if you want to remove\
    \ a database from the Oracle Database Appliance? The `oakcli` command provides\
    \ an option to do this as well. As you reviewed at the beginning of the chapter,\
    \ the `oakcli` command has a `delete` option.\n\nThe `delete` option of the `oakcli`\
    \ command has the same command-line options as the `create` option. Listing 4-10\
    \ shows the available options.\n\nListing 4-10. oakcli Delete Options\n\n```\n\
    [root@patty bin]# ./oakcli delete -h\nUsage:\noakcli delete {database | dbhome\
    \ | db_config_params}   [<options>]\nwhere:\n          database             -\
    \ deletes the database\n          dbhome               - deletes the database\
    \ home\n          db_config_params     - deletes the database config parameter\
    \ file\n```\n\nNow that you understand what the `delete` option can do, let’s\
    \ take a look at removing one of the databases that we created earlier. To delete\
    \ a database from the Oracle Database Appliance, issue the following:\n\n```\n\
    [root@patty bin]# ./oakcli delete database -db bcodatst\n```\n\nWhen the `delete`\
    \ option is invoked, you will be asked to provide the password for the `root`\
    \ and `oracle` users. The `oakcli` utility will then log in as those users, and\
    \ connect by a secure shell (SSH) connection between the nodes so that the database\
    \ can be deleted. Listing 4-11 shows the complete output for removing a RAC database\
    \ from the Oracle Database Appliance.\n\nListing 4-11. Prompts for root and oracle\
    \ Users (Passwords Not Typed)\n\n```\nPlease enter the 'root' user password:\n\
    Please re-enter the 'root' user password:\nPlease enter the 'oracle' user password:\n\
