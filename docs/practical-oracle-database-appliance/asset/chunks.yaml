    Enter the APPS user password:

    ...

    AutoConfig completed successfully.

    ```


    连接到每个数据库实例，并更改 `local_listener` 和 `remote_listener` 数据库初始化参数。请注意，`local_listener`
    参数在每个节点上需要不同的值。例如：


    ```

    # on the 1st node

    [oracle@s1 ∼]$ sqlplus / as sysdba

    SQL> alter system set remote_listener=''PROD_REMOTE'' sid=''PROD1'';

    System altered.

    SQL> alter system set local_listener=''PROD1_LOCAL'' sid=''PROD1'';

    System altered.

    SQL> exit


    # on the 2nd node

    [oracle@s2 ∼]$ sqlplus / as sysdba

    SQL> alter system set remote_listener=''PROD_REMOTE'' sid=''PROD2'';

    System altered.

    SQL> alter system set local_listener=''PROD2_LOCAL'' sid=''PROD2'';

    System altered.

    SQL> exit

    ```


    加载新的环境文件并在每个节点上运行 AutoConfig：


    ```

    [oracle@s1 ∼]$ . $ORACLE_HOME/$CONTEXT_NAME.env

    [oracle@s1 ∼]$ cd $ORACLE_HOME/appsutil/scripts/$CONTEXT_NAME

    [oracle@s1 PROD1_s1]$ ./adautocfg.sh

    Enter the APPS user password:

    ...

    AutoConfig completed successfully.

    ```


    最后一步，作为 RAC 中 e-Business Suite 数据库配置的收尾工作，需要为数据库的 CRS 服务添加一个 e-Business 特定的 `ORA_NLS10`
    环境变量。在任意数据库服务器上执行以下命令：


    ```

    [oracle@s1 ∼]$ srvctl setenv database -d PROD -t "TNS_ADMIN=$ORACLE_HOME/network/admin,ORA_NLS10=$ORACLE_HOME/nls/data/9idata"

    ```


    此外，需要了解的是，数据库节点上的 AutoConfig 会在 `sqlnet.ora` 文件中设置 `tcp.validnode_checking=yes`，并且
    `tcp.invited_nodes` 列表仅包含数据库节点的物理和虚拟 IP。这意味着监听器只接受来自数据库节点的新连接。由于还需要从两个应用服务器连接到数据库，因此需要通过在自定义包含文件
    `sqlnet_ifile.ora` 中覆盖该参数来添加两个额外节点，如下所示。（如果希望完全禁用 `tcp.validnode_checking`，最佳方法是将
    e-Business Suite 配置文件选项 “SQLNet Access” 更改为 `ALLOW_ALL`，然后在数据库节点上重新运行 AutoConfig）。


    ```

    [oracle@s1 ∼]$ echo "tcp.invited_nodes=(s1, s2, s1-vip, s2-vip, oevm1, oevm2)"
    > $TNS_ADMIN/sqlnet_ifile.ora

    ```


    数据库层的配置已完成。现在需要测试是否可以从任何数据库节点使用 `srvctl` 启动监听器和数据库。执行命令 `srvctl stop database
    -d PROD` 和 `srvctl stop listener -l LISTENER_PROD` 来停止服务。然后执行 `srvctl start listener
    -l LISTENER_PROD` 和 `srvctl start database -d PROD` 来启动服务。尝试从一个节点运行这些命令，然后再从另一个节点运行。每次测试后检查监听器，观察数据库实例是如何注册的。


    清单 11-20 展示了某个 SCAN 监听器上正确注册的服务。请注意正确配置的以下特征：


    *   注册了两个服务，分别名为 `PROD` 和 `ebs_patch`（`ebs_patch` 由 e-Business Suite R12.2 的在线补丁功能使用，用于提供对数据库“补丁版本”的连接）。

    *   每个服务都有两个已注册的实例，在本例中为 `PROD1` 和 `PROD2`。

    *   每个实例都使用数据库服务器的虚拟地址注册。在本例中有两个这样的服务器，名为 `s1-vip.odalab.com` 和 `s2-vip.odalab.com`。


    **清单 11-20. 在 SCAN 监听器上注册的数据库服务**


    ```

    [grid@s2 ∼]$ . oraenv

    ORACLE_SID = [grid] ? +ASM2

    The Oracle base has been set to /u01/app/grid


    [grid@s2 ∼]$ ps -ef | grep "tns.*SCAN"

    grid      19280      1  0 Oct07 ?        00:05:24 /u01/app/11.2.0.3/grid/bin/tnslsnr
