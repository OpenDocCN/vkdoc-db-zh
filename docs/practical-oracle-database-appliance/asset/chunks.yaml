- fmt: '### Original ODA


    The first-generation Oracle Database Appliance contains two compute nodes integrated
    into the chassis. Each of these servers has four sets of bonded Ethernet ports.
    By default, `bond0` is used for public traffic, with `bond1`, `bond2`, and `xbond0`
    used for auxiliary access, which is covered in more detail later in [Chapter 6](#A978-1-4302-6266-4_6_Chapter.html).
    Prior to installing the Oracle Database Appliance, connect two cables to the `eth2`
    and `eth3` ports. Normally these will be connected into separate switches in the
    datacenter for fault tolerance. The default configuration of the bond will load
    balance traffic between the two ports, which means the bond will automatically
    recover from a single network path failure. In Figure [3-1](#A978-1-4302-6266-4_3_Chapter.html#Fig1)
    and Table [3-1](#A978-1-4302-6266-4_3_Chapter.html#Tab1), you are provided a detailed
    diagram of the Oracle Database Appliance, along with explanations of the numbered
    callouts on the diagram.


    Table 3-1. Descriptions of the Connections Highlighted in Figure [3-1](#A978-1-4302-6266-4_3_Chapter.html#Fig1)


    | Callout | Description |

    | --- | --- |

    | 1 | `C13` Power Connectors, shared power bus for both nodes |

    | 2 | `eth4`, `eth5`, `eth6`, and `eth7` from right to left for Node 0; `eth4`
    and `eth5` are `bond1` and `eth6` and `eth7` are `bond2` |

    | 3 | 10BaseT SFP ports for `eth8` and `eth9` for Node 0, configured as `xbond0`
    |

    | 4 | `ILOM` Serial Port for Node 0 |

    | 5 | `eth2` and `eth3`, `bond0` for public network access |

    | 6 | `ILOM` 10/100 BaseT port |

    | 7 | `USB` and `VGA` ports |

    | 8 | Node 0 |

    | 9 | Node 1 |


    ![A978-1-4302-6266-4_3_Fig1_HTML.jpg](A978-1-4302-6266-4_3_Fig1_HTML.jpg)

    Figure 3-1. Network and other connections on the back of the original ODA


    ### ODA X3-2


    The second-generation Oracle Database Appliance uses two X3 servers for the compute
    nodes. Each of these servers has two sets of bonded Ethernet ports. By default,
    `bond0` is used for public traffic, and `bond1` is used for auxiliary access,
    which is covered in detail in [Chapter 6](#A978-1-4302-6266-4_6_Chapter.html).
    Prior to installing the Oracle Database Appliance, connect two cables to the `eth2`
    and `eth3` ports. Typically, these will be connected into separate switches in
    the datacenter for fault tolerance. The default configuration of the bond will
    load balance traffic between the two ports, automatically recovering from a single
    network path failure. Figure [3-2](#A978-1-4302-6266-4_3_Chapter.html#Fig2) and
    Table [3-2](#A978-1-4302-6266-4_3_Chapter.html#Tab2) illustrate and provide details
    on the connections on the rear of an X3-2 Oracle Database Appliance.


    Table 3-2. Descriptions of the Connections Highlighted in Figure [3-2](#A978-1-4302-6266-4_3_Chapter.html#Fig2)


    | Callout | Description |

    | --- | --- |

    | 1 | Power Supply 0 Fan |

    | 2 | Power Supply 0 |

    | 3 | Power Supply 1 Fan |

    | 4 | Power Supply 1 |

    | 5 | System indicator and locator lights |

    | 6 | Cluster Interconnect, `eth0` and `eth1` |

    | 7 | SAS Card 0 |

    | 8 | SAS Card 1 |

    | 9 | `ILOM` Port, 10/100BASE-T |

    | 10 | `ILOM` Serial Port |

    | 11 | 10GBASE-T, `eth2` `bond0` |

    | 12 | 10GBASET, `eth3` `bond0` |

    | 13 | 10GBASET, `eth4` `bond1` |

    | 14 | 10GBASET, `eth5` `bond1` |

    | 15 | `USB` Ports |

    | 16 | `VGA` Port |


    ![A978-1-4302-6266-4_3_Fig2_HTML.jpg](A978-1-4302-6266-4_3_Fig2_HTML.jpg)

    Figure 3-2. Network and other connections on the back of the X3-2 ODA


    ### Power Cables


    Nothing is worse than racking a new system and finding that the power cables are
    not the ones you need. Connector names such as `C13` and `C14` don’t mean a lot
    to many end users of the Oracle Database Appliance. Table [3-3](#A978-1-4302-6266-4_3_Chapter.html#Tab3)
    lists the common plugs used with North American Oracle Database Appliances.


    Table 3-3. North American Oracle Database Appliance Common Plugs


    | Connector Name | Use | Diagram |

    | --- | --- | --- |

    | `C13` | This is the connector that goes into the Oracle Database Appliance.
    | ![A978-1-4302-6266-4_3_Fig1a_HTML.jpg](A978-1-4302-6266-4_3_Fig1a_HTML.jpg)
    |

    | `C14` | Often used in racks. 110V or 220V. | ![A978-1-4302-6266-4_3_Fig2a_HTML.jpg](A978-1-4302-6266-4_3_Fig2a_HTML.jpg)
    |

    | `C14RA` | Right-angle version of the `C14`. The cord enters on the right side.
    | ![A978-1-4302-6266-4_3_Fig3a_HTML.jpg](A978-1-4302-6266-4_3_Fig3a_HTML.jpg)
    |

    | `5-15P` | Standard plug for 110V applications. | ![A978-1-4302-6266-4_3_Fig4a_HTML.jpg](A978-1-4302-6266-4_3_Fig4a_HTML.jpg)
    |

    | `6-15P` | 200V version of the `5–15P`. | ![A978-1-4302-6266-4_3_Fig5a_HTML.jpg](A978-1-4302-6266-4_3_Fig5a_HTML.jpg)
    |

    | `L6-20P` | Locking 200V plug, usually use DIN high-amp draws. | ![A978-1-4302-6266-4_3_Fig6a_HTML.jpg](A978-1-4302-6266-4_3_Fig6a_HTML.jpg)
    |


    ## Oracle Database Appliance Initial Deployment


    Once the bare-metal installation of the Oracle Linux operating system is complete,
    you need to log onto the console on one of the nodes and do the initial configuration
    of the Oracle Database Appliance network using the command `firstnet`. That command
    allows you to establish the network interfaces for the Oracle Database Appliance
    upon first usage.


    Note


    Before you can run `firstnet`, you should allocate the required Internet protocol
    (`IP`) addresses and verify that their entries in the Domain Naming Service (`DNS`)
    have been completed. If you need help in gathering or assigning `IP` addresses,
    contact your local systems administrator.


    ### ILOM Network


    The Oracle Integrated Lights Out Manager (`ILOM`) runs on the service processor
    (`SP`) and is used for hardware installation, maintenance, and troubleshooting.
    Each node on the Oracle Database Appliance has a dedicated `SP`, with a dedicated
    10/100BaseT port.


    ### Network Information


    Each Oracle Database Appliance node requires access for the external network;
    there are multiple Ethernet ports on the rear of the Oracle Database Appliance
    to establish these connections. The bond supporting public network access is redundantly
    connected via cables connected on ports `net0` and `net1` on each Oracle Database
    Appliance. The examples in this chapter will be based on an Oracle Database Appliance
    named “ejb”. Table [3-4](#A978-1-4302-6266-4_3_Chapter.html#Tab4) provides an
    idea of what needs to be established for `bond0` on both nodes of the Oracle Database
    Appliance.


    Note


    Notice that you only need to be concerned about the `bond0` interface on both
    nodes. The `bond0` interface is configured when using the `firstnet` utility.


    Table 3-4. Internet Protocol Information for node0


    | Node | Bond name | IP Address | Network Mask | DNS Entry |

    | --- | --- | --- | --- | --- |

    | 0 | `bond0` | 172.30.0.20 | 255.255.255.0 | ejb1.m57.local |

    | 1 | `bond0` | 172.30.0.21 | 255.255.255.0 | ejb2.m57.local |


    The Oracle Database Appliance also uses the normal network resources like `DNS`,
    Gateways, and Network Time Protocol (`NTP`). Configured examples of these resources
    are shown in Table [3-5](#A978-1-4302-6266-4_3_Chapter.html#Tab5).


    Table 3-5. Additional Resources for Oracle Database Appliance


    | Resource | Entry |

    | --- | --- |

    | `DNS` Servers | 172.16.11.215 |

    | `DNS` Suffix | m57.local |

    | `DNS` Search Order | m57.local |

    | `NTP` Servers | 172.30.0.1 |

    | Default Gateway | 172.30.0.1 |

    | SMTP Relay | 172.30.0.1 |'
