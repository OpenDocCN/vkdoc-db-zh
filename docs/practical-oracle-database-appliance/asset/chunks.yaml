  trans: '

    ## ODA 是否适用？


    一个显而易见的问题是，`ODA` 是否适合运行 `Oracle 的 e-Business Suite`。这是个好问题，答案必须考虑多个方面，包括：


    *   可用性

    *   存储容量

    *   CPU 容量

    *   内存

    *   `eBS` 在该硬件上的认证情况


    可用性通过 `ODA` 的 `RAC` 能力得以满足。通常，`e-Business Suite` 是公司的核心 `ERP` 系统，在大多数情况下，它属于关键任务系统，这意味着它必须具有高可用性。`ODA`
    的技术架构在设计时就考虑了高可用性。所有组件都是冗余的——从电源到网络接口。共享存储的可用性通过将磁盘配置为正常或高冗余的 `自动存储管理 (ASM)` 磁盘组来实现。如果选择
    `ODA` 作为 `e-Business Suite` 部署的平台，建议使用 `RAC`（数据库）配置，或者至少使用 `RAC One Node`（`e-Business
    Suite` 数据库也支持此配置），以充分利用 `ODA` 的能力。


    存储容量很容易满足，至少在典型情况下是如此。平均的 `e-Business Suite` 系统数据库大小很少超过 `2T`。¹ 原始的 `ODA` 根据存储配置，最多可为数据库提供
    `6T` 的空间。`ODA X3-2` 最多可提供 `9T` 的存储空间，如果添加存储扩展柜，甚至可以达到 `18T`。在大多数情况下，这已经绰绰有余。与往常一样，建议在迁移到新平台之前进行适当的容量规划。


    `CPU` 需求也很容易满足。原始的 `ODA` 配备两个 `Intel Xeon X5675 6 核 CPU`，而 `X3-2` 在每个服务器节点上安装了两个
    `Intel Xeon E5-2690 CPU`，分别为每个 `ODA` 提供 `24` 和 `36` 个 `CPU` 核心。在许多情况下，`e-Business
    Suite` 数据库每个数据库节点最多使用 `8` 个 `CPU` 核心，但这在很大程度上取决于环境的用户数量和工作负载模式。请确保根据环境特性估算所需的
    `CPU` 数量，并使用灵活的许可，仅为数据库启用所需数量的核心。


    内存可能是个问题，这取决于您运行的是哪款 `ODA` 机器、您使用的是哪个版本的 `e-Business Suite` 以及您的虚拟化选择。原始的 `ODA`
    每个服务器节点配备了 `96G` 的 `RAM`；`X3-2` 升级为每个服务器 `256G` 的 `RAM`。在大多数情况下，这对于 `e-Business
    Suite` 数据库来说是足够的内存量。但是，如果选择了虚拟化部署选项，则必须在 `ODA Base`（数据库）、管理域 (`Dom0`) 和其他虚拟机之间分配内存。对于原始的
    `ODA`，可用内存量可能会成为问题。


    正如您可能预料的那样，`Oracle` 在其自己的硬件上认证其自己的软件。`Oracle Database Appliance` 是一个运行 `Oracle
    grid infrastructure` 和 `11.2.0.2+` 数据库版本的 `Oracle Linux 5.6+` 服务器集群。操作系统和数据库版本都经过认证可用于运行
    `Oracle e-Business Suite R12.1` 数据库；然而，对于 `R12.2` 数据库版本，`11.2.0.3` 是强制要求。² 应用层有两种部署选项是可行的：


    *   虚拟化 `ODA`，使用 `ODA` 集成的 `Oracle VM` 和 `Oracle Linux 6` 虚拟服务器作为应用层主机。此配置已完全通过
    `e-Business Suite` 认证。

    *   使用外部应用层。如果按照 `My Oracle Support Certification Service` 上列出的要求构建，此方法已通过认证。


    ## ODA 上的 e-Business Suite 系统架构


    从系统架构角度看，`ODA` 不过是一个包含两个服务器的“盒子”，如果使用虚拟化配置，除了数据库工作负载外，也可以配置用于其他类型的工作负载。通过虚拟化配置，`ODA`
    还可以托管多个应用服务器；对于典型的 `e-Business Suite` 配置，需要两个以确保更好的可用性指标。可以添加额外的 `VM` 用于更高级的配置，例如，如果配置了面向外部的模块（`iSupplier`、`iRecruitment`、`iStore`）。鉴于
    `ODA` 平台的规模和特性，有几种可能的系统架构可以全部或部分地利用 `ODA`。以下是构思涉及使用 `ODA` 的 `e-Business Suite`
    架构时需要回答的几个问题：


    *   使用哪种 `ODA` 配置——`裸金属` 还是 `虚拟化`？如果使用 `裸金属`，应用层服务器将不会驻留在 `ODA` 上。

    *   数据库的配置是什么——`RAC`、`RAC One Node`³ 还是 `单节点`？此决定影响许可成本和数据库的可用性特性。为了获得最佳可用性，推荐使用
    `RAC`。

    *   是否有可用的外部负载均衡器？（`ODA` 不提供负载均衡功能）。如果没有，您可能需要在 `ODA` 上为应用层实现软件负载均衡或故障转移功能。另一个选择是完全不使用负载均衡。这是一个合适的配置吗？

    *   计划的应用层文件系统大小是多少？节点之间是否应共享？共享文件系统的选项之一是使用 `ODA` 上的 `Oracle 自动存储管理集群文件系统 (ACFS)`；另一个选项是使用外部
    `NFS` 共享，这会引入外部依赖性。


    图 11-1 展示了一种将 `e-Business Suite` 完全部署在 `ODA` 上的架构。该架构对数据库使用 `Oracle Real Application
    Clusters`，对数据库连接使用 `SCAN` 监听器，在虚拟应用服务器上挂载 `Oracle ACFS` 卷以提供共享的应用层文件系统，在每个 `ODA`
    物理服务器上放置一个虚拟化应用层节点，并将一个虚拟 `IP` 分配给其中一个应用层节点供用户连接系统。本章接下来的章节将详细探讨如何将 `e-Business
    Suite` 系统部署到这个复杂的、基于 `100% ODA` 的架构中。


    ![A978-1-4302-6266-4_11_Fig1_HTML.jpg](img/A978-1-4302-6266-4_11_Fig1_HTML.jpg)


    图 11-1.

    虚拟化 ODA 上的 e-Business Suite 架构


    ## 为 e-Business Suite 配置 ODA


    为 `e-Business Suite` 配置 `ODA` 的第一步甚至在购买之前就开始了。仅仅阅读一本解释如何在 `ODA` 上安装 `e-Business
    Suite` 的书是不够的。您的系统是独一无二的。第一步是规划。您了解系统的特性，可以判断 `ODA` 的硬件规格是否符合您的要求。对于 `Oracle Database
    Appliance`，提前规划至关重要，因为有些配置项可以在安装时设置，之后无法更改，例如环境类型（`裸金属` 或 `虚拟化` 平台）和 `ASM` 磁盘冗余级别。

    '
- fmt: '### Deploying e-Business Suite on ODA


    The current most up-to-date version of e-Business Suite is Release 12.2, which
    became generally available in September 2013. Choose this version when starting
    implementation of e-Business Suite, as it introduces a number of technical improvements
    compared to `R12.1`. These improvements include online patching and use of Weblogic
    server in the technology stack of the application tier. On the opposite side,
    most of existing e-Business Suite `R12.1` owners will be reluctant to upgrade
    their systems to `R12.2` so soon after the date of general availability, so the
    migrations of Release 12.1 to ODA will still be common.


    For new implementations, the `R12.2` Rapid Install process has been improved by
    packaging RMAN backups of the e-Business Suite database and adding options to
    deploy the RAC or single node configuration using ASM or file system to store
    the data files. This provides more flexibility compared to the only native deployment
    option that was available for `R12.1`—the single node database with data files
    on a file system. Unfortunately, you will not be able to use these new capabilities
    to deploy the `R12.2` environment into the ODA’s RAC on ASM, because the e-Business
    Suite database has been prepackaged with the `compatible=11.2.0` parameter. In
    addition, the database compatibility of ASM disk groups on ODA is set to `11.2.0.2`.
    This behavior was observed while using the latest available version of the Rapid
    Install StartCD (`12.2.0.46`), and it might change in later versions, so make
    sure to check `My Oracle Support` note “Oracle E-Business Suite Release Notes,
    Release 12.2 (Doc ID 1320300.1)” for information about the StartCD updates.


    Listing 11-1 shows the errors reported by the Rapid Install process if you try
    to install the database directly to an ASM disk group on ODA.


    Listing 11-1. Release 12.2 Installation Errors When ASM Is Used for Data Files
    on ODA

    ```

    RMAN-03002: failure of restore command at 10/17/2013 22:16:46

    ORA-19504: failed to create file "+DATA/controlfile_tst1221.ctl"

    ORA-17502: ksfdcre:3 Failed to create file +DATA/controlfile_tst1221.ctl

    ORA-15001: diskgroup "DATA" does not exist or is not mounted

    ORA-15204: database version 11.2.0.0.0 is incompatible with diskgroup DATA

    ORA-19600: input file is control file (/SOFTWARE/eBS/R12.2.2/stage/EBSInstallMedia/AppDB/PROD/backup_controlfile.ctl)

    ORA-19601: output file is control file (+DATA/controlfile_tst1221.ctl)

    ```

    The inability to deploy the system on ASM by running Rapid Install introduces
    a serious complication for the installation process of `R12.2` on ODA. The initial
    installation of the e-Business Suite database has to be on a file system and,
    as the only shared storage option for a RAC database on ODA is ASM, you’re also
    limited to a single node configuration. This means the freshly deployed e-Business
    Suite will have to be migrated to ASM and converted to RAC immediately after the
    installation.


    If you’re planning a migration project for your e-Business Suite `R12.1` system
    to an ODA without upgrading it to `R12.2`, then the complexity of the whole project
    depends on the current state of the system. The target state is clear—an 11.2
    database running on Linux x86-64, and an Oracle Linux 5 or 6 for the application
    tier in case you choose to deploy as virtual machines on ODA. Although it’s technically
    possible to build the application tier using Red Hat Enterprise Linux as the OS
    on the VMs, it’s not recommended in order to preserve the “one throat to choke”
    support.[⁴](#A978-1-4302-6266-4_11_Chapter.html#Fn4) The contents of this chapter
    will explain how to configure the ODA to be capable of running the e-Business
    Suite `R12.2`, but the same configuration of the ODA is also able to run e-Business
    Suite 12.1.


    The deployment process of the e-Business Suite `R12.1` database tier on ODA in
    a bare metal (nonvirtualized) configuration has been very well explained in `My
    Oracle Support` note “Implementing Oracle E-Business Suite 12.1 Databases on Oracle
    Database Appliance (Doc ID 1566935.1).” At this moment,[⁵](#A978-1-4302-6266-4_11_Chapter.html#Fn5)
    a dedicated note for `R12.2` is not available, but must be similar. Here I’ll
    pay most of the attention to the virtualized deployment of e-Business Suite `R12.2`
    on ODA.


    ### Plan for Your Unique Environment


    One of the settings to be careful at is the number of CPU cores you choose to
    enable and license by generating the license keys in `My Oracle Support`. If you
    set the initial core count too high, it’s not possible to reduce it in bare metal
    configurations without assistance from `My Oracle Support`. It’s better to start
    with a lower setting that can be increased later if needed.


    Plan the memory allocations to each component carefully, especially on the Original
    ODA. It’s required to leave 8G of RAM for the Dom0. An averagely sized `R12.1`
    application tier, running forms, self-service applications and concurrent managers,
    might require 16G of RAM (be aware that `R12.2` requires more memory compared
    to `R12.1`). This leaves up to 72G for each ODA Base. The memory settings can
    be changed later if needed, but in case of `R12.2` deployment on the original
    ODA, you need to make sure 96G of total RAM will be sufficient because there are
    no hardware upgrade options available for an ODA.


    The storage configuration options are quite limited and can cause one of the unavoidable
    roadblocks in the path of installing e-Business Suite fully on ODA. There are
    two options where files accessible to the virtual machines can be stored:


    *   The free space on the two mirrored system disks (available space is 250G on
    the Original ODA and 300G on the X3-2). These disks can be used to store VM virtual
    disk images for boot, root, and swap volumes, but are too slow to host the e-Business
    Suite file system because it would significantly impact the maintenance operations,
    especially patching and backups of e-Business Suite.

    *   The Oracle ACFS file system shared from the ODA Base domain. It can be mounted
    on virtual machines using NFS, and then used as the shared application tier file
    system for both application tier nodes. The performance is much better than on
    the internal system disks. The ACFS volume resides in the `+RECO` ASM disk group,
    which also stores archived logs and backups if no external storage is used.


    The Oracle Appliance Kit versions up to 2.7 do not provide many storage configuration
    options for the ODA (you can choose the backup location and ASM availability mode
    only) the available disk group sizes might not be suitable for all deployments.
    Table 11-1 shows the problematic configurations marked in bold and underlined.


    Table 11-1. ASM Disk Sizes Based on Chosen Storage Configuration Options


    | Backup location / ASM availability | +DATA / +RECO size Original ODA | +DATA
    / +RECO size X3-2 |

    | --- | --- | --- |

    | Local / High | 1.6 T / 2.038 T | 2.4 T / 3.056 T |

    | Local / Normal | 2.4 T / 3.057 T | 3.6 T / 4.585 T |

    | External / High | 3.2 T / 0.438 T | 4.8 T / 0.657 T |

    | External / Normal | 4.8 T / 0.657 T | 7.2 T / 0.985 T |'
