    \ (12.2) for Linux x86-64 (Doc ID 1330701.1)”包含了e-Business Suite R12.2所有要求的最新列表，其中包括RPM包和库补丁列表；请确保全部安装。此外，您可以考虑将VM升级到最新的OL6级别并安装11gR2预安装包，因为它提供了大部分所需的RPM包和设置；而且，由于您将使用NFS挂载的ACFS卷，您还需要一些与NFS相关的RPM包。有关我安装的额外RPM包以及启动NFS服务和禁用防火墙所运行的命令，请参见列表11-9。\n\
