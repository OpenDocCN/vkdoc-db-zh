    ## 反配置数据库控制


    反配置的操作和最初配置时一样简单。只需使用参数 `–deconfig` 调用 `emca` 即可。`-deconfig` 选项将启动反配置过程。清单 6-16
    展示了如何在 Oracle 数据库一体机上为当前数据库反配置数据库控制。


    **清单 6-16.** 反配置数据库控制


    ```bash

    $ cd $ORACLE_HOME/bin

    $ ./emca -deconfig dbcontrol db

    ```


    当反配置开始时，`emca` 工具将提示您输入要反配置的数据库控制所关联的 `ORACLE_SID` 值。提供该 `ORACLE_SID` 值；然后 `emca`
    会询问您是否确实要反配置数据库控制。这是一个确认提示，需要回答。反配置完成后，关联数据库的控制台将不再可用或可访问。


    清单 6-17 展示了一个典型反配置操作的输出。


    **清单 6-17.** 反配置输出


    ```

    STARTED EMCA at Oct 8, 2013 9:24:18 AM

    EM Configuration Assistant, Version 11.2.0.3.0 Production

    Copyright (c) 2003, 2011, Oracle.  All rights reserved.

    Enter the following information:

    Database SID: bc11gtst

    Do you wish to continue? [yes(Y)/no(N)]: y

    Oct 8, 2013 9:24:28 AM oracle.sysman.emcp.EMConfig perform

    INFO: This operation is being logged at /opt/oracle/cfgtoollogs/emca/bc11gtst/emca_2013_10_08_09_24_17.log.

    Oct 8, 2013 9:24:29 AM oracle.sysman.emcp.util.DBControlUtil stopOMS

    INFO: Stopping Database Control (this may take a while) ...

    Enterprise Manager configuration completed successfully

    FINISHED EMCA at Oct 8, 2013 9:25:04 AM

    ```


    为什么您可能希望反配置数据库控制？一个答案归结为转而使用 Enterprise Manager。当需要监控的不仅仅是单个数据库或单个集群数据库时，许多组织开始考虑实施
    Oracle Enterprise Manager，这是一款广泛用于在企业环境中监控多个数据库的产品。相比之下，数据库控制传统上仅用于环境中的单个数据库或单个集群数据库。因此，需要通过
    Enterprise Manager 管理多个数据库是您可能选择反配置数据库控制的一个原因。


    使用 Oracle Enterprise Manager 后，就不再需要配置数据库控制。这是因为同时运行数据库控制和 Oracle Enterprise Manager
    所需的 Oracle Management Agent 会带来额外开销。当使用 Oracle 数据库一体机作为 Oracle Enterprise Manager
    库和管理服务器时，反配置数据库控制是必需的。


    ## 支持 Oracle Enterprise Manager


    至此，您已经了解了如何使用 Oracle 数据库控制管理 Oracle 数据库一体机。如前所述，数据库控制仅支持并可针对单个数据库或实时应用集群进行配置。随着
    Oracle 数据库一体机在企业中日益普及，这些工程系统需要像当今许多其他资源一样被监控。


    Oracle Enterprise Manager 提供并允许进行单点监控。Oracle Enterprise Manager 进一步使得 Oracle 数据库一体机可以像任何其他普通资源一样被管理。


    > **注意**

    >

    > 目前，Oracle 数据库一体机不像 Exadata 那样拥有用于管理硬件层的工程系统插件。缺乏插件使得管理 Oracle 数据库一体机就像管理任何其他通用硬件一样。


    既然已经确定 Oracle 数据库一体机的管理方式与任何其他通用硬件驱动的实时应用集群相同，那么我们如何启用 Oracle Enterprise Manager
    来监控和管理 Oracle 数据库一体机呢？与 Oracle Enterprise Manager 能够监控和管理的任何其他资源一样，Oracle 数据库一体机需要在一体机的两个节点上都安装
    Oracle Management Agent。


    Oracle Management Agent 是 Oracle Enterprise Manager 的三个核心管理组件之一。它是唯一一个需要在受监控目标上安装的管理组件。安装后，Oracle
    Management Agent 会将未管理的主机转变为可通过 Oracle Enterprise Manager 进行交互的受管主机。该代理与插件协同工作，为主机上的广泛目标提供管理能力。


    当使用 Oracle Enterprise Manager 管理 Oracle 数据库一体机时，请确保在一体机的每个节点上都安装了管理代理。


    > **注意**

    >

    > 开箱即用，Oracle 数据库一体机预装了 Oracle Enterprise Linux (64-bit)。根据您的 Oracle Enterprise
    Manager 配置，可能需要将其他管理代理下载到软件库中。


    让我们看看如何将 Oracle 数据库一体机作为目标添加到 Oracle Enterprise Manager。首先，转到 **Setup** ➤ **Add
    Target** ➤ **Add Targets Manually**，如图 6-1 所示。


    ![A978-1-4302-6266-4_6_Fig1_HTML.jpg](img/A978-1-4302-6266-4_6_Fig1_HTML.jpg)

    *图 6-1. 手动设置目标*


    由于我们希望将 Oracle 数据库一体机添加到 Oracle Enterprise Manager，我们需要添加主机目标。Oracle 数据库一体机的主机目标是构成一体机内实时应用集群的两个内部服务器。图
    6-2 显示我们选择了 **Add Host Targets**。做出选择后，单击 **Add Host** 按钮。


    ![A978-1-4302-6266-4_6_Fig2_HTML.jpg](img/A978-1-4302-6266-4_6_Fig2_HTML.jpg)

    *图 6-2. 手动添加目标*


    在下一个屏幕上，我们需要指定要添加到 Oracle Enterprise Manager 的两个主机。我们还需要指定它们的操作系统。Oracle 数据库一体机预装了
    Oracle Enterprise Linux (64-bit)；您需要确保选择正确的操作系统。图 6-3 显示了添加新主机目标时应显示的输入屏幕。


    > **注意**

    >

    > 如果 Oracle Enterprise Manager 安装在非 Linux (64-bit) 的主机上，那么您将需要通过 Oracle Enterprise
    Manager 从 Oracle 下载正确的代理软件。


    ![A978-1-4302-6266-4_6_Fig3_HTML.jpg](img/A978-1-4302-6266-4_6_Fig3_HTML.jpg)

    *图 6-3. 添加主机目标*

    '
- fmt: '# 7. 诊断 Oracle 数据库设备


    ## 摘要


    Oracle 数据库设备（ODA）是一个自给自足的设备，并且已采取各种检查和平衡措施，以确保设备及其上驻留的数据库能够最佳运行。理解设备本身内置的诊断能力并根据需要应用它们来解决各种简单和复杂的活动至关重要。


    Oracle 数据库设备（ODA）是一个自给自足的设备，并且已采取各种检查和平衡措施，以确保设备及其上驻留的数据库能够最佳运行。理解设备本身内置的诊断能力并根据需要应用它们来解决各种简单和复杂的活动至关重要。


    ODA 至今已有两代硬件迭代和多个软件迭代，以改进和添加各种功能。ODA 软件更新汇集了许多诊断能力。其中一些已添加到标准 Oracle 设备工具包（OAK）命令集中，而其他则可通过预装工具以及硬件和操作系统中的功能访问。我们将在本章中探讨裸机设备安装诊断。虚拟化诊断将在[第
    10 章](#A978-1-4302-6266-4_10_Chapter.html)中介绍。


    ODA 诊断可以从两个方面考虑：


    * 主动

    * 被动


    本章将探讨 ODA 管理团队可用于理解和调试各种问题的各种技术。数据库相关诊断不在本书范围内，所有标准的数据库监控和诊断技术仍然适用于在 ODA 上运行的数据库。


    ## 主动诊断


    ODA 是一台服务器，因此，在设备上处理和执行各种功能时必须非常小心。有多种方法可以主动确保 ODA 的性能满足客户的要求。Oracle 提供了一组嵌入在
    OAK 框架中的一键式实用程序。OAK 提供了一套完整的实用程序，允许用户执行从部署到诊断的各种活动。本书各章节对此进行了详细讨论。


    在填写主机和平台信息后，您将被带到如图 [6-4](#A978-1-4302-6266-4_6_Chapter.html#Fig4) 所示的安装详细信息页面。在此页面上，您需要添加与您正在添加的主机相关的具体信息。您正在添加一个
    Oracle 数据库设备；两台主机上的基本安装目录将相同。应填写所有其他安装详细信息；如果未填写，请提供必要的信息。命名凭证选项需要填充现有凭证，或通过单击加号（+）按钮创建新凭证。一旦提供了所有安装详细信息，就可以继续安装
    Oracle Management Agent。图 [6-4](#A978-1-4302-6266-4_6_Chapter.html#Fig4) 说明了填写后的安装详细信息应如何显示。


    ![A978-1-4302-6266-4_6_Fig4_HTML.jpg](A978-1-4302-6266-4_6_Fig4_HTML.jpg)


    图 6-4. 代理安装详细信息


    一旦为安装详细信息提供了所有信息，如图 [6-4](#A978-1-4302-6266-4_6_Chapter.html#Fig4) 所示，单击下一步继续向导。这将带您进入图
    [6-5](#A978-1-4302-6266-4_6_Chapter.html#Fig5) 中的复查屏幕。从那里，您可以看到通过向导输入的所有项目。单击部署代理以开始代理的部署。


    ![A978-1-4302-6266-4_6_Fig5_HTML.jpg](A978-1-4302-6266-4_6_Fig5_HTML.jpg)


    图 6-5. 添加目标复查屏幕


    一旦部署开始，可以在添加主机状态屏幕上进行监控。此屏幕如图 [6-6](#A978-1-4302-6266-4_6_Chapter.html#Fig6) 所示。


    ![A978-1-4302-6266-4_6_Fig6_HTML.jpg](A978-1-4302-6266-4_6_Fig6_HTML.jpg)


    图 6-6. 添加主机状态说明


    要管理 Oracle 数据库设备上的数据库、监听器和自动存储管理（ASM）实例，需要在 Oracle 管理服务器和 Oracle 数据库设备上的 Oracle
    Management Agents 上部署数据库插件。当通过 Oracle Enterprise Manager 部署代理时，该插件将自动部署。


    ## 总结


    在本章中，我们讨论了两种配置在 Oracle 数据库设备上的监控 Oracle 数据库的方法。第一种方法使用 Oracle 数据库控制。我们讨论了 Oracle
    数据库控制，包括如何配置、管理和取消配置它。第二种方法使用 Oracle Enterprise Manager。我们讨论了它与 Oracle 数据库设备的关系，如何安装管理代理使其能够监控设备，以及将其与设备一起使用时可以期待什么。'
