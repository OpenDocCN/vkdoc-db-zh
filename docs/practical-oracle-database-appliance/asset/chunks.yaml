- fmt: "### Preparing for a ZFS Array As External Storage\n\nWhile you can add an\
    \ additional storage tray to the X3-2, you also have the option of growing storage\
    \ from an NFS share, like Oracle ZFS Array. Growing from a ZFS Array allows you\
    \ to introduce technologies like Hybrid Columnar Compression (HCC) and Storage\
    \ Tiering. HCC allows you to store your user data in significantly less space\
    \ and retrieve data with less I/O. Utilizing HCC warehouse compression, you see\
    \ 5x to 10x in storage savings, and with HCC archive compression you can have\
    \ 10x to 50x of storage savings. These savings are strongly dependent on actual\
    \ data. The increased storage savings may cause data load-times to increase modestly.\
    \ Storage Tiering allows you to leverage partitioning to keep your active data\
    \ on the Oracle Database Appliance internal disks, and inactive data on the ZFS\
    \ Array. This allows significantly more data to be accessible to the database\
    \ without affecting the performance of active data.\n\nWhen using NFS-based storage,\
    \ it is recommended to enable a technology called Direct NFS. Oracle looks for\
    \ the mount settings in `$ORACLE_HOME/dbs/oranfstab`, which specifies the Direct\
    \ NFS Client settings for a single database. Next, Oracle looks for settings in\
    \ `/etc/oranfstab`, which specifies the NFS mounts available to all Oracle databases\
    \ on that host. Finally, Oracle reads the mount tab file (`/etc/mtab` on Linux)\
    \ to identify available NFS mounts. If there are duplicate entries in the configuration\
    \ files, the Direct NFS Client will use the first entry it finds. Listing 3-13\
    \ provides an example of the Direct NFS settings in the `oranfstab` file.\n\n\
    **Listing 3-13.** Example of `oranfstab`\n\n```\n[orahost1]# cat $ORACLE_HOME/dbs/oranfstab\n\
    \nserver: zfs.m57.local\npath: 172.30.0.90\nexport:/oranfsdata  mount:/oranfsdata\n\
    export:/oranfsarch  mount:/oranfsarch\n```\n\n**Note**\n\nThe IP address used\
    \ in the `path` line is the virtual IP (VIP) address of the node that the NFS\
    \ mount will connect to.\n\nBefore Direct NFS can be used with the database, it\
    \ needs to be enabled. In Oracle Database 11g Release 2, this is easily done by\
    \ recompiling binaries with the `make` command. Listing 3-14 shows you have to\
    \ execute the `make` command and enable Direct NFS within the Oracle Database.\n\
    \n**Listing 3-14.** Recompile with `make`\n\n```\ncd $ORACLE_HOME/rdbms/lib\n\
    make -f ins_rdbms.mk dnfs_on\n```\n\nBefore recompiling, all databases need to\
    \ be shut down, and then recompiling of the binaries can be done using `make`.\
    \ After the recompile is complete, additional databases can be brought back online.\
    \ After starting the instances, the database instance `alert.log` will show that\
    \ Direct NFS is enabled (see Listing 3-15).\n\n**Listing 3-15.** Entry in the\
    \ `alert.log`\n\n```\nOracle instance running with ODM: Oracle Direct NFS ODM\
    \ Library Version 3.0\n```\n\nOnce Direct NFS is configured for the database and\
    \ verified in the `alert.log`, you can create tablespaces on the now accessible\
    \ NFS storage. Listing 3-16 illustrates how to create a new tablespace and show\
    \ the status of the file on a Direct NFS mount.\n\n**Listing 3-16.** Create Tables\
    \ on Direct NFS\n\n```\nSQL> create tablespace archive_data datafile\n'/oranfsarch/archive_data01.dbf'\
    \ SIZE 40960M;\nTablespace created.\n\nSQL> select file#, name, status from v$datafile;\n\
    \n FILE# NAME                                              STATUS\n------ -------------------------------------------------\
    \ -------\n     1 +DATA/pbrb/datafile/system.272.781351553          SYSTEM\n \
    \    2 +DATA/pbrb/datafile/sysaux.273.781351557          ONLINE\n     3 +DATA/pbrb/datafile/undotbs1.274.781351561\
    \        ONLINE\n     4 +DATA/pbrb/datafile/undotbs2.276.781351569        ONLINE\n\
    \     5 +DATA/pbrb/datafile/users.277.781351571           ONLINE\n     6 +DATA/pbrb/datafile/users.bigfile\
    \                ONLINE\n     7 /oranfsarch/nfs/archive_data01.dbf           \
    \     ONLINE\n```\n\nWith the ability to add additional storage space by Direct\
    \ NFS on the Oracle Database Appliance, you now have a powerful and expandable\
    \ environment to run your Oracle Database.\n\n## Summary\n\nWith a little planning\
    \ and preparation, the Oracle Appliance Manager (OAM) allows you to quickly deploy\
    \ a new system in a few hours. Full RAC deployments can be online and ready in\
    \ a fraction of the time it takes to build a system using the traditional methods\
    \ from in the past. The OAM can be accessed via a VNC session, allowing you to\
    \ deploy from most platforms without the need for installing the X-window system.\
    \ This saves time, while still allowing you to rapidly deploy the system.\n\n\
    # 4. Database Configuration\n\n**Abstract**\n\nUp until now, this book has given\
    \ the big picture of the Oracle Database Appliance and Integrated Lights Out Management\
    \ (ILOM), and has shown how to install the Oracle Database Appliance from the\
    \ hardware and software perspectives. What has not been covered until now is creating\
    \ and configuring the Oracle database for the Oracle Database Appliance. In this\
    \ chapter, we will focus on the `oakcli` command and the options associated with\
    \ creating and deleting various types of database configurations.\n\n## The `oakcli`\
    \ Command\n\nThe `oakcli` command provides the command-line interface to managing\
    \ the appliance. It is the command you’ll use to create and delete databases,\
    \ and those are the uses we’ll focus on in this chapter.\n\n### Command Options\n\
    \nListing 4-1 shows the help output from the `oakcli` command. You will be focusing\
    \ on the last two options of the `oakcli` command: `create` and `delete`. These\
    \ options provide a single non-GUI interface to creating an Oracle database on\
    \ the Oracle Database Appliance. By using the `oakcli` command-line tool, we can\
    \ easily and quickly create databases.\n\n**Listing 4-1.** The Help Output from\
    \ `oakcli`\n\n```\n[oracle@patty bin]$ ./oakcli -h\nUsage: oakcli show       -\
    \ show disk, diskgroup, expander, controller, storage, version, dbhomes, databases,\
    \ db_config_params, core_config_key, env_hw\n        oakcli apply      - applies\
    \ the core_config_key\n        oakcli locate     - locates a disk\n        oakcli\
    \ deploy     - deploys the Database Appliance\n        oakcli update     - updates\
    \ the Database Appliance\n        oakcli validate   - validates the Database Appliance\n\
    \        oakcli manage     - manages the oak repository, diagcollect e.t.c\n \
    \       oakcli unpack     - unpack the given package to oak repository\n     \
    \   oakcli copy       - copies the deployment config file\n        oakcli upgrade\
    \    - upgrades database\n        oakcli stordiag   - run storage diagnostic tool\
    \ on both node\n        oakcli test       - test asr\n        oakcli odachk  \
    \   - performs configuration settings check on ODA\n        oakcli configure \
    \ - configures the network or asr\n        oakcli create     - create database,\
    \ dbhome, db_config_params file\n        oakcli delete     - deletes database,\
    \ dbhome, db_config_params file\n```\n\nNow that you have an overview of what\
    \ can be done with the `oakcli` command, let’s take a look at how to create databases,\
    \ and then delete them, using `oakcli`."
  raw: '### Preparing for a ZFS Array As External Storage


    While you can add an additional storage tray to the X3-2, you also have the option
    of growing storage from an NFS share, like Oracle ZFS Array. Growing from a ZFS
    Array allows you to introduce technologies like Hybrid Columnar Compression (HCC)
    and Storage Tiering. HCC allows you to store your user data in significantly less
    space and retrieve data with less I/O. Utilizing HCC warehouse compression, you
    see 5x to 10x in storage savings, and with HCC archive compression you can have
    10x to 50x of storage savings.  These savings are strongly dependent on actual
    data. The increased storage savings may cause data load-times to increase modestly.
    Storage Tiering allows you to leverage partitioning to keep your active data on
    the Oracle Database Appliance internal disks, and inactive data on the ZFS Array.
    This allows significantly more data to be accessible to the database without affecting
    the performance of active data.


    When using NFS-based storage, it is recommended to enable a technology called
    Direct NFS. Oracle looks for the mount settings in `$ORACLE_HOME/dbs/oranfstab`,
    which specifies the Direct NFS Client settings for a single database. Next, Oracle
    looks for settings in `/etc/oranfstab`, which specifies the NFS mounts available
    to all Oracle databases on that host. Finally, Oracle reads the mount tab file
    `(/etc/mtab` on Linux) to identify available NFS mounts. If there are duplicate
    entries in the configuration files, the Direct NFS Client will use the first entry
    it finds.  Listing 3-13 provides an example of the Direct NFS settings in the
    `oranfstab` file.


    Listing 3-13. Example of oranfstab


    `[orahost1]# cat $ORACLE_HOME/dbs/oranfstab`


    `server: zfs.m57.local`


    `path: 172.30.0.90`


    `export:/oranfsdata  mount:/oranfsdata`


    `export:/oranfsarch  mount:/oranfsarch`


    Note


    The IP address used in the path line is the virtual IP (VIP) address of the node
    that the NFS mount will connect to.


    Before Direct NFS can be used with the database, it needs to be enabled. In Oracle
    Database 11g Release 2, this is easily done by recompiling binaries with the `make`
    command. Listing 3-14 shows you have to execute the `make` command and enable
    Direct NFS within the Oracle Database.


    Listing 3-14. Recompile with make


    `cd $ORACLE_HOME/rdbms/lib`


    `make -f ins_rdbms.mk dnfs_on`


    Before recompiling, all databases need to be shut down, and then recompiling of
    the binaries can be done using `make`. After the recompile is complete, additional
    databases can be brought back online. After starting the instances, the database
    instance alert.log will show that Direct NFS is enabled (see Listing 3-15).


    Listing 3-15. Entry in the alert.log


    `Oracle instance running with ODM: Oracle Direct NFS ODM Library Version 3.0`


    Once Direct NFS is configured for the database and verified in the alert log,
    you can create tablespaces on the now accessible NFS storage. Listing 3-16 illustrates
    how to create a new tablespace and show the status of the file on a Direct NFS
    mount.


    Listing 3-16. Create Tables on Direct NFS


    `SQL> create tablespace archive_data datafile`


    `''/oranfsarch/archive_data01.dbf'' SIZE 40960M;`


    `Tablespace created.`


    `SQL> select file#, name, status from v$datafile;`


     `FILE# NAME STATUS`


    `------ --------------------------------------------- -------`


     `1 +DATA/pbrb/datafile/system.272.781351553 SYSTEM`


     `2 +DATA/pbrb/datafile/sysaux.273.781351557 ONLINE`


     `3 +DATA/pbrb/datafile/undotbs1.274.781351561 ONLINE`


     `4 +DATA/pbrb/datafile/undotbs2.276.781351569 ONLINE`


     `5 +DATA/pbrb/datafile/users.277.781351571 ONLINE`


     `6 +DATA/pbrb/datafile/users.bigfile ONLINE`


     `7 /oranfsarch/nfs/archive_data01.dbf ONLINE`


    With the ability to add additional storage space by Direct NFS on the Oracle Database
    Appliance, you now have a powerful and expandable environment to run your Oracle
    Database.


    ## Summary


    With a little planning and preparation, the Oracle Appliance Manager (OAM) allows
    you to quickly deploy a new system in a few hours. Full RAC deployments can be
    online and ready in a fraction of the time it takes to build a system using the
    traditional methods from in the past. The OAM can be accessed via a VNC session,
    allowing you to deploy from most platforms without the need for installing the
    X-window system. This saves time, while still allowing you to rapidly deploy the
    system.


    # 4. Database Configuration


    Abstract


    Up until now, this book has given the big picture of the Oracle Database Appliance
    and Integrated Lights Out Management (ILOM), and has shown how to install the
    Oracle Database Appliance from the hardware and software perspectives. What has
    not been covered until now is creating and configuring the Oracle database for
    the Oracle Database Appliance. In this chapter, we will focus on the `oakcli`
    command and the options associated with creating and deleting various types of
    database configurations.


    Up until now, this book has given the big picture of the Oracle Database Appliance
    and Integrated Lights Out Management (ILOM), and has shown how to install the
    Oracle Database Appliance from the hardware and software perspectives. What has
    not been covered until now is creating and configuring the Oracle database for
    the Oracle Database Appliance. In this chapter, we will focus on the `oakcli`
    command and the options associated with creating and deleting various types of
    database configurations.


    ## The oakcli Command


    The `oakcli` command provides the command-line interface to managing the appliance.
    It is the command you’ll use to create and delete databases, and those are the
    uses we’ll focus on in this chapter.


    ### Command Options


    Listing 4-1 shows the help output from the `oakcli` command. You will be focusing
    on the last two options of the `oakcli` command: `create` and `delete`. These
    options provide a single non-GUI interface to creating an Oracle database on the
    Oracle Database Appliance. By using the `oakcli` command-line tool, we can easily
    and quickly create databases.


    Listing 4-1. The Help Output from oakcli


    `[oracle@patty bin]$ ./oakcli -h`


    `Usage: oakcli show       - show disk, diskgroup, expander, controller, storage,
    version, dbhomes, databases, db_config_params, core_config_key, env_hw`


            `oakcli apply      - applies the core_config_key`


            `oakcli locate     - locates a disk`


            `oakcli deploy     - deploys the Database Appliance`


            `oakcli update     - updates the Database Appliance`


            `oakcli validate   - validates the Database Appliance`


            `oakcli manage     - manages the oak repository, diagcollect e.t.c`


            `oakcli unpack     - unpack the given package to oak repository`


            `oakcli copy       - copies the deployment config file`


            `oakcli upgrade    - upgrades database`


            `oakcli stordiag   - run storage diagnostic tool on both node`


            `oakcli test       - test asr`


            `oakcli odachk     - performs configuration settings check on ODA`


            `oakcli configure  - configures the network or asr`


            `oakcli create     - create database, dbhome, db_config_params file`


            `oakcli delete     - deletes database, dbhome, db_config_params file`


    Now that you have an overview of what can be done with the `oakcli` command, let’s
    take a look at how to create databases, and then delete them, using `oakcli`.'
  trans: "### 准备将 ZFS 阵列用作外部存储\n\n虽然您可以向 X3-2 添加额外的存储托架，但您也可以选择从 NFS 共享（如 Oracle ZFS\
    \ 阵列）扩展存储。从 ZFS 阵列扩展允许您引入混合列压缩和存储分层等技术。HCC 允许您以显著更少的空间存储用户数据，并以更少的 I/O 检索数据。利用\
    \ HCC 仓库压缩，您可以节省 5 到 10 倍的存储空间；而使用 HCC 归档压缩，您可以节省 10 到 50 倍的存储空间。这些节省在很大程度上取决于实际数据。存储节省的增加可能会导致数据加载时间适度增加。存储分层允许您利用分区将活动数据保留在\
    \ Oracle 数据库一体机内部磁盘上，而将非活动数据保留在 ZFS 阵列上。这使得数据库可以访问显著更多的数据，而不影响活动数据的性能。\n\n当使用基于\
    \ NFS 的存储时，建议启用一种称为 Direct NFS 的技术。Oracle 会在`$ORACLE_HOME/dbs/oranfstab`中查找挂载设置，该文件为单个数据库指定\
    \ Direct NFS 客户端设置。接着，Oracle 会在`/etc/oranfstab`中查找设置，该文件指定该主机上所有 Oracle 数据库可用的\
    \ NFS 挂载点。最后，Oracle 会读取挂载表文件（在 Linux 上为`/etc/mtab`）以识别可用的 NFS 挂载点。如果配置文件中有重复条目，Direct\
    \ NFS 客户端将使用它找到的第一个条目。清单 3-13 提供了`oranfstab`文件中 Direct NFS 设置的示例。\n\n**清单 3-13.**\
    \ `oranfstab`示例\n\n```\n[orahost1]# cat $ORACLE_HOME/dbs/oranfstab\n\nserver:\
    \ zfs.m57.local\npath: 172.30.0.90\nexport:/oranfsdata  mount:/oranfsdata\nexport:/oranfsarch\
    \  mount:/oranfsarch\n```\n\n**注意**\n\n`path`行中使用的 IP 地址是 NFS 挂载将连接到的节点的虚拟 IP\
    \ 地址。\n\n在数据库中使用 Direct NFS 之前，需要先启用它。在 Oracle 数据库 11g 第 2 版中，通过`make`命令重新编译二进制文件可以轻松完成此操作。清单\
    \ 3-14 展示了如何执行`make`命令并在 Oracle 数据库中启用 Direct NFS。\n\n**清单 3-14.** 使用`make`重新编译\n\
    \n```\ncd $ORACLE_HOME/rdbms/lib\nmake -f ins_rdbms.mk dnfs_on\n```\n\n重新编译前，需要关闭所有数据库，然后可以使用`make`重新编译二进制文件。重新编译完成后，可以将其他数据库重新联机。启动实例后，数据库实例的`alert.log`将显示\
    \ Direct NFS 已启用（参见清单 3-15）。\n\n**清单 3-15.** `alert.log`中的条目\n\n```\nOracle instance\
    \ running with ODM: Oracle Direct NFS ODM Library Version 3.0\n```\n\n一旦为数据库配置了\
    \ Direct NFS 并在`alert.log`中得到验证，您就可以在现已可访问的 NFS 存储上创建表空间。清单 3-16 说明了如何创建新的表空间并显示\
    \ Direct NFS 挂载上文件的状态。\n\n**清单 3-16.** 在 Direct NFS 上创建表\n\n```\nSQL> create tablespace\
    \ archive_data datafile\n'/oranfsarch/archive_data01.dbf' SIZE 40960M;\nTablespace\
    \ created.\n\nSQL> select file#, name, status from v$datafile;\n\n FILE# NAME\
    \                                              STATUS\n------ -------------------------------------------------\
    \ -------\n     1 +DATA/pbrb/datafile/system.272.781351553          SYSTEM\n \
    \    2 +DATA/pbrb/datafile/sysaux.273.781351557          ONLINE\n     3 +DATA/pbrb/datafile/undotbs1.274.781351561\
    \        ONLINE\n     4 +DATA/pbrb/datafile/undotbs2.276.781351569        ONLINE\n\
    \     5 +DATA/pbrb/datafile/users.277.781351571           ONLINE\n     6 +DATA/pbrb/datafile/users.bigfile\
    \                ONLINE\n     7 /oranfsarch/nfs/archive_data01.dbf           \
    \     ONLINE\n```\n\n通过能够在 Oracle 数据库一体机上通过 Direct NFS 添加额外的存储空间，您现在拥有一个强大且可扩展的环境来运行您的\
    \ Oracle 数据库。\n\n## 总结\n\n通过一些规划和准备，Oracle 设备管理器（OAM）允许您在几小时内快速部署新系统。完整的 RAC 部署可以在远少于使用过去传统方法构建系统所需的时间内上线并准备就绪。可以通过\
    \ VNC 会话访问 OAM，允许您从大多数平台进行部署，而无需安装 X-window 系统。这节省了时间，同时仍然允许您快速部署系统。\n\n# 4. 数据库配置\n\
    \n**摘要**\n\n到目前为止，本书已经介绍了 Oracle 数据库一体机和集成远程管理器的概况，并展示了如何从硬件和软件角度安装 Oracle 数据库一体机。迄今为止尚未涵盖的是为\
    \ Oracle 数据库一体机创建和配置 Oracle 数据库。在本章中，我们将重点介绍`oakcli`命令以及与创建和删除各种类型的数据库配置相关的选项。\n\
    \n## `oakcli`命令\n\n`oakcli`命令提供了管理设备的命令行界面。这是您将用于创建和删除数据库的命令，这些也是我们将在本章中重点介绍的用途。\n\
    \n### 命令选项\n\n清单 4-1 显示了`oakcli`命令的帮助输出。您将重点关注`oakcli`命令的最后两个选项：`create`和`delete`。这些选项提供了一个单一的非\
    \ GUI 界面，用于在 Oracle 数据库一体机上创建 Oracle 数据库。通过使用`oakcli`命令行工具，我们可以轻松快速地创建数据库。\n\n\
    **清单 4-1.** `oakcli`的帮助输出\n\n```\n[oracle@patty bin]$ ./oakcli -h\nUsage: oakcli\
    \ show       - show disk, diskgroup, expander, controller, storage, version, dbhomes,\
    \ databases, db_config_params, core_config_key, env_hw\n        oakcli apply \
    \     - applies the core_config_key\n        oakcli locate     - locates a disk\n\
    \        oakcli deploy     - deploys the Database Appliance\n        oakcli update\
    \     - updates the Database Appliance\n        oakcli validate   - validates\
    \ the Database Appliance\n        oakcli manage     - manages the oak repository,\
    \ diagcollect e.t.c\n        oakcli unpack     - unpack the given package to oak\
    \ repository\n        oakcli copy       - copies the deployment config file\n\
    \        oakcli upgrade    - upgrades database\n        oakcli stordiag   - run\
    \ storage diagnostic tool on both node\n        oakcli test       - test asr\n\
    \        oakcli odachk     - performs configuration settings check on ODA\n  \
    \      oakcli configure  - configures the network or asr\n        oakcli create\
    \     - create database, dbhome, db_config_params file\n        oakcli delete\
    \     - deletes database, dbhome, db_config_params file\n```\n\n现在您已经了解了`oakcli`命令可以完成什么操作，让我们看看如何使用`oakcli`创建数据库，然后再删除它们。"
- fmt: "## Executing the Command\n\nLet’s take a look at the `oakcli create` command.\
    \ By using the help (`-h`) flag, we can get a description of what the command\
    \ does. Listing 4-2 shows the output from issuing the help flag.\n\n**Listing\
    \ 4-2. oakcli Create Help Output**\n```\n[oracle@patty bin]$ ./oakcli create -h\n\
    Usage:\noakcli create {database | dbhome | db_config_params } [<options>]\nwhere:\n\
    \          database            - creates the database\n          dbhome      \
    \        - creates the database home\n          db_config_params    - creates\
    \ the database config parameter file\n```\n\nEach one of these options can be\
    \ drilled down into as well by using the same help (`-h`) flag. Listing 4-3 through\
    \ Listing 4-5 shows help output for some common `oakcli` operations.\n\n**Listing\
    \ 4-3. The Help Output for Creating a Database**\n```\n[oracle@patty bin]$ ./oakcli\
    \ create database -h\nUsage:\n      oakcli create database  -db <db_name> [[-oh\
    \ <home>] | [-version <version>]]  [-params <params_file>]\n      where:\n   \
    \       db_name      - Name of the database to be created.\n          home   \
    \      - Existing oracle home for creating the database. By default we create\
    \ a new database home.\n          version      - Database Version information\
    \ for creating the database home. [ex. 11.2.0.2.7] If not provided create the\
    \ database home from latest available bits.\n          params_file  - Name of\
    \ the db_config_parameter file [This file can be created using using 'oakcli create\
    \ db_config_param'].  If not provided, create the database using  default configuration\
    \ file\n```\n\n**Listing 4-4. The Help Output for Creating a Database Home**\n\
    ```\n[oracle@patty bin]$ ./oakcli create dbhome -h\nUsage:\n      oakcli create\
    \ dbhome  [-version <version>]\n      where:\n          version  - Version information\
    \ for creating the database home. If not provided create the database home from\
    \ latest available bits.\n```\n\n**Listing 4-5. The Help Output for Creating a\
    \ Parameter File**\n```\n[oracle@patty bin]$ ./oakcli create db_config_params\
    \ -h\nUsage:\n      oakcli create db_config_params -conf <filename>  - Generates\
    \ the database configuration parameter file.\n      where:\n      filename  -\
    \  configuration file name (path should NOT be there in the filename)\n```\n\n\
    Now, that you have an understanding of the `create` command, let’s put the command\
    \ to use by creating a few of the database types that were discussed earlier.\
    \ Let’s start with a Real Application Cluster (RAC) database, and then you’ll\
    \ take a look at a RAC-One database and end with a simple standalone database.\n\
    \n### ENTERPRISE EDITION\n\nAll databases that are created on the appliance are\
    \ done so using the Enterprise Edition of the Oracle Database management system.\
    \ The Enterprise Edition gives you many more features and allows for scalability\
    \ as you begin growing your database environments.\n\nThe use of Enterprise Edition\
    \ also allows you to expand on the number of cores that the database can use.\
    \ The Standard Edition of the database is limited to a total of four cores on\
    \ a two-node Real Application Cluster (RAC) system. With the Enterprise Edition,\
    \ the Oracle Database Appliance can be scaled up to a total of 32 cores. This\
    \ ability to expand the number of cores is much more valuable with the Oracle\
    \ Database Appliance when configured and scaled for your environment.\n\nWith\
    \ the Oracle Database Appliance becoming a centerpiece for consolidation for small-\
    \ to medium-sized businesses, the scalability and flexibility that this appliance\
    \ provides enables businesses to achieve more with less. The sheer scalability\
    \ factor enables much of the need for the Enterprise Edition database.\n\n## Database\
    \ Configuration Types\n\nWith the Oracle Database Appliance, there are three different\
    \ configurations that can be configured and used within the appliance framework.\
    \ The most obvious is the Real Application Cluster. Outside of the RAC configuration,\
    \ the Oracle Database Appliance can have databases that are configured either\
    \ as Real Application Cluster One (RAC One) databases, or as standalone databases.\
    \ Let’s take a look these different configuration types."
  raw: '### Executing the Command


    Let’s take a look at the `oakcli create` command. By using the help `(-h`) flag,
    we can get a description of what the command does. Listing 4-2 shows the output
    from issuing the help flag.


    Listing 4-2. oakcli Create Help Output


    `[oracle@patty bin]$ ./oakcli create -h`


    `Usage:`


    `oakcli create {database | dbhome | db_config_params } [<options>]`


    `where:`


             `database            - creates the database`


             `dbhome              - creates the database home`


             `db_config_params    - creates the database config parameter file`


    Each one of these options can be drilled down into as well by using the same help
    `(-h`) flag. Listing 4-3 through Listing 4-5 shows help output for some common
    `oakcli` operations.


    Listing 4-3. The Help Output for Creating a Database


    `[oracle@patty bin]$ ./oakcli create database -h`


    `Usage:`


          `oakcli create database  -db <db_name> [[-oh <home>] | [-version <version>]]  [-params
    <params_file>]`


          `where:`


             `db_name      - Name of the database to be created.`


             `home         - Existing oracle home for creating the database. By default
    we create a new database home.`


             `version      - Database Version information for creating the database
    home. [ex. 11.2.0.2.7] If not provided create the database home from latest available
    bits.`


             `params_file  - Name of the db_config_parameter file [This file can be
    created using using ''oakcli create db_config_param''].  If not provided, create
    the database using  default configuration file`


    Listing 4-4. The Help Output for Creating a Database Home


    `[oracle@patty bin]$ ./oakcli create dbhome -h`


    `Usage:`


          `oakcli create dbhome  [-version <version>]`


          `where:`


             `version  - Version information for creating the database home. If not
    provided create the database home from latest available bits.`


    Listing 4-5. The Help Output for Creating a Parameter File


    `[oracle@patty bin]$ ./oakcli create db_config_params -h`


    `Usage:`


          `oakcli create db_config_params -conf <filename>  - Generates the database
    configuration parameter file.`


          `where:`


          `filename  -  configuration file name (path should NOT be there in the filename)`


    Now, that you have an understanding of the `create` command, let’s put the command
    to use by creating a few of the database types that were discussed earlier. Let’s
    start with a Real Application Cluster (RAC) database, and then you’ll take a look
    at a RAC-One database and end with a simple standalone database.


    ENTERPRISE EDITION


    All databases that are created on the appliance are done so using the Enterprise
    Edition of the Oracle Database management system. The Enterprise Edition gives
    you many more features and allows for scalability as you begin growing your database
    environments.


    The use of Enterprise Edition also allows you to expand on the number of cores
    that the database can use. The Standard Edition of the database is limited to
    a total of four cores on a two-node Real Application Cluster (RAC) system. With
    the Enterprise Edition, the Oracle Database Appliance can be scaled up to a total
    of 32 cores. This ability to expand the number of cores is much more valuable
    with the Oracle Database Appliance when configured and scaled for your environment.


    With the Oracle Database Appliance becoming a centerpiece for consolidation for
    small- to medium-sized businesses, the scalability and flexibility that this appliance
    provides enables businesses to achieve more with less. The sheer scalability factor
    enables much of the need for the Enterprise Edition database.


    ## Database Configuration Types


    With the Oracle Database Appliance, there are three different configurations that
    can be configured and used within the appliance framework. The most obvious is
    the Real Application Cluster. Outside of the RAC configuration, the Oracle Database
    Appliance can have databases that are configured either as Real Application Cluster
    One (RAC One) databases, or as standalone databases. Let’s take a look these different
    configuration types.'
  trans: "## 执行命令\n\n让我们来看一下 `oakcli create` 命令。通过使用帮助 (`-h`) 标志，我们可以获取该命令功能的描述。清单\
    \ 4-2 展示了使用帮助标志后的输出。\n\n**清单 4-2. oakcli 创建命令帮助输出**\n```\n[oracle@patty bin]$\
    \ ./oakcli create -h\n用法:\noakcli create {database | dbhome | db_config_params\
    \ } [<选项>]\n其中:\n          database            - 创建数据库\n          dbhome     \
    \         - 创建数据库主目录\n          db_config_params    - 创建数据库配置参数文件\n```\n\n同样地，可以使用相同帮助\
    \ (`-h`) 标志深入了解这些选项中的每一个。清单 4-3 至清单 4-5 展示了一些常见 `oakcli` 操作的帮助输出。\n\n**清单 4-3. 创建数据库的帮助输出**\n\
    ```\n[oracle@patty bin]$ ./oakcli create database -h\n用法:\n      oakcli create\
    \ database  -db <数据库名称> [[-oh <主目录>] | [-version <版本>]]  [-params <参数文件>]\n  \
    \    其中:\n          数据库名称      - 要创建的数据库的名称。\n          主目录         - 用于创建数据库的现有\
    \ Oracle 主目录。默认情况下，我们会创建一个新的数据库主目录。\n          版本      - 用于创建数据库主目录的数据库版本信息。[例如\
    \ 11.2.0.2.7] 如果未提供，则从最新的可用版本创建数据库主目录。\n          参数文件  - 数据库配置参数文件的名称 [此文件可以使用\
    \ 'oakcli create db_config_param' 命令创建]。如果未提供，则使用默认配置文件创建数据库。\n```\n\n**清单 4-4. 创建数据库主目录的帮助输出**\n\
    ```\n[oracle@patty bin]$ ./oakcli create dbhome -h\n用法:\n      oakcli create dbhome\
    \  [-version <版本>]\n      其中:\n          版本  - 用于创建数据库主目录的版本信息。如果未提供，则从最新的可用版本创建数据库主目录。\n\
    ```\n\n**清单 4-5. 创建参数文件的帮助输出**\n```\n[oracle@patty bin]$ ./oakcli create db_config_params\
    \ -h\n用法:\n      oakcli create db_config_params -conf <文件名>  - 生成数据库配置参数文件。\n\
    \      其中:\n          文件名  - 配置文件名 (文件名中不应包含路径)\n```\n\n现在，你已经了解了 `create` 命令，让我们通过创建之前讨论过的几种数据库类型来应用这个命令。我们从实时应用集群（RAC）数据库开始，然后你将了解\
    \ RAC One 数据库，最后是一个简单的独立数据库。\n\n### 企业版\n\n在设备上创建的所有数据库都是使用 Oracle 数据库管理系统的**企业版**完成的。企业版提供了更多功能，并允许你在开始扩展数据库环境时进行伸缩。\n\
    \n使用企业版还允许你扩展数据库可以使用的核心数量。数据库的标准版在两节点实时应用集群（RAC）系统上总共限制为四个核心。使用企业版，Oracle 数据库设备最多可以扩展到\
    \ 32 个核心。在 Oracle 数据库设备上，这种为核心扩容的能力在针对你的环境进行配置和扩展时更具价值。\n\n随着 Oracle 数据库设备成为中小型企业整合的核心，该设备提供的可扩展性和灵活性使企业能够以更少的资源实现更多目标。其巨大的可扩展性因素在很大程度上满足了对**企业版**数据库的需求。\n\
    \n## 数据库配置类型\n\n对于 Oracle 数据库设备，在设备框架内可以配置和使用三种不同的配置。最明显的是实时应用集群（RAC）。除了 RAC 配置之外，Oracle\
    \ 数据库设备还可以配置为实时应用集群一（RAC One）数据库或独立数据库。让我们来看看这些不同的配置类型。"
- fmt: "### Real Application Cluster\n\nThe Real Application Cluster option is the\
    \ primary option for use with the Oracle Database Appliance. RAC databases provide\
    \ a level of high availability for a database, and allow for application scalability\
    \ through the use of services. In order to configure the Oracle Database Appliance\
    \ with a Real Application Cluster database, you need to use the `oakcli` command.\n\
    \nLet’s configure a Real Application Cluster Database using `oakcli`:\n\n```bash\n\
    [oracle@patty bin]$su -\n```\n\n```bash\n[root@patty bin]$cd /opt/oracle/oak/bin\n\
    ```\n\n```bash\n[root@patty bin]$ ./oakcli create database -db bcodatst\n```\n\
    \nYou will notice that I’m using a very simple `create` statement to create a\
    \ database named `bcodatst`. There are other options that allow you to make a\
    \ more customized database installation. These other options are the ones outlined\
    \ earlier in Listings 4-4 and 4-5.\n\n**Note**\n\nIf you try to create a database\
    \ as the `oracle` user, you will get told you do not have the privilege to do\
    \ so. This is due to the `root` user owning the `oakcli` command, and it is why\
    \ the preceding code example begins with a `su` to `root`. The following error\
    \ is what will be presented if you forget and execute the command as the `oracle`\
    \ user:\n\n```text\nERROR: 2013-11-11 21:19:13: Insufficient privileges to create\
    \ the database\n```\n\nOnce you kick off the `oakcli create database –db` command,\
    \ you will be asked a series of questions to help configure the database on the\
    \ Oracle Database Appliance. These questions range from asking about user passwords\
    \ to what type of database you want to configure. Let’s get started.\n\n```bash\n\
    [root@patty bin]# ./oakcli create database -db bcodatst\n```\n\n```text\nINFO:\
    \ 2013-11-11 21:20:59: Database parameter file is not provided. Will be using\
    \ default parameters for DB creation\n```\n\nNotice that we didn’t provide a parameter\
    \ file? The `oakcli` command picks up on this and makes the decision to use a\
    \ default one. You are then asked to provide some passwords.\n\n```text\nPlease\
    \ enter the 'root' user password:\nPlease re-enter the 'root' user password:\n\
    Please enter the 'oracle' user password:\nPlease re-enter the 'oracle' user password:\n\
    Please enter the 'SYSASM' user password: (During deployment we set the SYSASM\
    \ password to 'welcome1'):\nPlease re-enter the 'SYSASM' user password:\nINFO:\
    \ 2013-11-11 21:25:24: Installing a new home: OraDb11203_home3 at /u01/app/oracle/product/11.2.0.3/dbhome_3\n\
    ```\n\nAfter providing all the passwords that are needed to interact with the\
    \ hardware of the Oracle Database Appliance, the `oakcli` command wants to know\
    \ what type of database deployment you want to perform. Since you are creating\
    \ a Real Application Cluster (RAC) database, you need to select option three.\n\
    \n```text\nPlease select one of the following for Database Deployment  [1 .. 3]:\n\
    1    => EE : Enterprise Edition\n2    => RACONE\n3    => RAC\nSelected value is:\
    \ RAC\n```\n\nWith a RAC installation, the installer next wants to know what size\
    \ database you want to create. There are five different types of size classes\
    \ to choose from. For demo purposes, we are going to go with a middle of the road\
    \ database. Select option three to continue with the installation of the database.\n\
    \n```text\nPlease select one of the following for Database Class  [1 .. 5]:\n\
    1    => Very Small\n2    => Small\n3    => Medium\n4    => Large\n5    => Extra\
    \ Large\nSelected value is: Medium\n```\n\nBecause you are the administrator,\
    \ you or your group needs to manage the database. As part of the installation,\
    \ you will be prompted if you want to create a database console, also known as\
    \ Database Control. Here’s the prompt:\n\n```text\nDo you want to set up the EM\
    \ Dbconsole for this database: [ Y | N ]? Y\n```\n\n**Note**\n\nIn [Chapter 6](#A978-1-4302-6266-4_6_Chapter.html),\
    \ you will review how to set up a database control manually. You will also see\
    \ how to install a management agent for Oracle Enterprise Manager 12c.\n\nNext,\
    \ you will be asked to provide a password for the `ASMSNMP` user. This user is\
    \ used to interact with Automatic Storage Management (ASM) on the appliance. Provide\
    \ the password that you configured for this user.\n\n```text\nPlease enter the\
    \ 'ASMSNMP' user password: (During deployment we set the ASMSNMP password to 'welcome1'):\n\
    Please re-enter the 'ASMSNMP' user password:\n```\n\nOnce all the passwords have\
    \ be provided and stored, the installer begins to install the Oracle Database\
    \ in a Real Application Cluster configuration. This type of installation can run\
    \ for a few minutes, depending on the size of the database that was requested\
    \ to be created. Eventually, you’ll receive a message stating that the database\
    \ was created successfully, and that message will include a date and timestamp\
    \ of the completion. For example:\n\n```text\nSUCCESS: 2013-11-11 21:50:56: Successfully\
    \ created the database bcodatst\n```\n\nWhen the database is created, entries\
    \ in the Cluster Ready Services (CRS) stack will be available for review (see\
    \ Listing 4-6). Use the command `crsctl` from the Oracle Grid home to review the\
    \ status of the database that has been created. A complete listing of the `crsctl`\
    \ output is in Listing 4-6. The lines in bold correspond to the database just\
    \ created.\n\nListing 4-6. Cluster Ready Services (CRS) Output\n\n```bash\n[grid@patty\
    \ bin]$ ./crsctl status res -t\n```\n\n```text\n-------------------------------------------------------------------------------\n\
    NAME           TARGET  STATE        SERVER                   STATE_DETAILS\n-------------------------------------------------------------------------------\n\
    Local Resources\n-------------------------------------------------------------------------------\n\
    ora.DATA.dg\n               ONLINE  ONLINE       patty\n               ONLINE\
    \  ONLINE       selma\nora.LISTENER.lsnr\n               ONLINE  ONLINE      \
    \ patty\n               ONLINE  ONLINE       selma\nora.RECO.dg\n            \
    \   ONLINE  ONLINE       patty\n               ONLINE  ONLINE       selma\nora.REDO.dg\n\
    \               ONLINE  ONLINE       patty\n               ONLINE  ONLINE    \
    \   selma\nora.asm\n               ONLINE  ONLINE       patty                \
    \    Started\n               ONLINE  ONLINE       selma                    Started\n\
    ora.gsd\n               OFFLINE OFFLINE      patty\n               OFFLINE OFFLINE\
    \      selma\nora.net1.network\n               ONLINE  ONLINE       patty\n  \
    \             ONLINE  ONLINE       selma\nora.ons\n               ONLINE  ONLINE\
    \       patty\n               ONLINE  ONLINE       selma\nora.reco.acfsvol.acfs\n\
    \               ONLINE  ONLINE       patty                    mounted on /cloudfs\n\
    \               ONLINE  ONLINE       selma                    mounted on /cloudfs\n\
    ora.registry.acfs\n               ONLINE  ONLINE       patty\n               ONLINE\
    \  ONLINE       selma\n-------------------------------------------------------------------------------\n\
    Cluster Resources\n-------------------------------------------------------------------------------\n\
    ora.LISTENER_SCAN1.lsnr\n      1        ONLINE  ONLINE       patty\nora.LISTENER_SCAN2.lsnr\n\
    \      1        ONLINE  ONLINE       selma\nora.bcodatst.db\n      1        ONLINE\
    \  ONLINE       patty                    Open\n      2        ONLINE  ONLINE \
    \      selma                    Open\nora.cvu\n      1        ONLINE  ONLINE \
    \      selma\nora.dboda.db\n      1        ONLINE  ONLINE       patty        \
    \            Open\n      2        ONLINE  ONLINE       selma                 \
    \   Open\nora.oc4j\n      1        ONLINE  ONLINE       selma\nora.patty.vip\n\
    \      1        ONLINE  ONLINE       patty\nora.scan1.vip\n      1        ONLINE\
    \  ONLINE       patty\nora.scan2.vip\n      1        ONLINE  ONLINE       selma\n\
    ora.selma.vip\n      1        ONLINE  ONLINE       selma\nora.slob.db\n      1\
    \        ONLINE  ONLINE       patty                    Open\n```\n\nAs you can\
    \ see, by looking at the `ora.bcodatst.db` entry, the `oakcli` command did all\
    \ the work for you and created a RAC database with no issues. The database has\
    \ a status of open as well, which indicates the database is ready to use."
  raw: '### Real Application Cluster


    The Real Application Cluster option is the primary option for use with the Oracle
    Database Appliance. RAC databases provide a level of high availability for a database,
    and allow for application scalability through the use of services.  In order to
    configure the Oracle Database Appliance with a Real Application Cluster database,
    you need to use the `oakcli` command.


    Let’s configure a Real Application Cluster Database using oakcli:


    `[oracle@patty bin]$su -`


    `[root@patty bin]$cd /opt/oracle/oak/bin`


    `[root@patty bin]$ ./oakcli create database -db bcodatst`


    You will notice that I’m using a very simple `create` statement to create a database
    named bcodatst. There are other options that allow you to make a more customized
    database installation. These other options are the ones outlined earlier in Listings
    4-4 and 4-5.


    Note


    If you try to create a database as the `oracle` user, you will get told you do
    not have the privilege to do so. This is due to the `root` user owning the `oakcli`
    command, and it is why the preceding code example begins with a `su` to `root`.  The
    following error is what will be presented if you forget and execute the command
    as the `oracle` user:


    `ERROR: 2013-11-11 21:19:13: Insufficient privileges to create the database`


    Once you kick off the `oakcli create database –db` command, you will be asked
    a series of questions to help configure the database on the Oracle Database Appliance.
    These questions range from asking about user passwords to what type of database
    you want to configure. Let’s get started.


    `[root@patty bin]# ./oakcli create database -db bcodatst`


    `INFO: 2013-11-11 21:20:59: Database parameter file is not provided. Will be using
    default parameters for DB creation`


    Notice that we didn’t provide a parameter file?  The `oakcli` command picks up
    on this and makes the decision to use a default one. You are then asked to provide
    some passwords.


    `Please enter the ''root'' user password:`


    `Please re-enter the ''root'' user password:`


    `Please enter the ''oracle'' user password:`


    `Please re-enter the ''oracle'' user password:`


    `Please enter the ''SYSASM'' user password: (During deployment we set the SYSASM
    password to ''welcome1''):`


    `Please re-enter the ''SYSASM'' user password:`


    `INFO: 2013-11-11 21:25:24: Installing a new home: OraDb11203_home3 at /u01/app/oracle/product/11.2.0.3/dbhome_3`


    After providing all the passwords that are needed to interact with the hardware
    of the Oracle Database Appliance, the `oakcli` command wants to know what type
    of database deployment you want to perform. Since you are creating a Real Application
    Cluster (RAC) database, you need to select option three.


    `Please select one of the following for Database Deployment  [1 .. 3]:`


    `1    => EE : Enterprise Edition`


    `2    => RACONE`


    `3    => RAC`


    `Selected value is: RAC`


    With a RAC installation, the installer next wants to know what size database you
    want to create. There are five different types of size classes to choose from.
    For demo purposes, we are going to go with a middle of the road database.  Select
    option three to continue with the installation of the database.


    `Please select one of the following for Database Class  [1 .. 5]:`


    `1    => Very Small`


    `2    => Small`


    `3    => Medium`


    `4    => Large`


    `5    => Extra Large`


    `Selected value is: Medium`


    Because you are the administrator, you or your group needs to manage the database.
    As part of the installation, you will be prompted if you want to create a database
    console, also known as Database Control. Here’s the prompt: n


    `Do you want to set up the EM Dbconsole for this database: [ Y | N ]? Y`


    Note


    In [Chapter 6](#A978-1-4302-6266-4_6_Chapter.html), you will review how to set
    up a database control maually. You will also see how to install a management agent
    for Oracle Enterprise Manager 12c.


    Next, you will be asked to provide a password for the ASMSNMP user. This user
    is used to interact with Automatic Storage Management (ASM) on the appliance.
    Provide the password that you configured for this user.


    `Please enter the ''ASMSNMP'' user password: (During deployment we set the ASMSNMP
    password to ''welcome1''):`


    `Please re-enter the ''ASMSNMP'' user password:`


    Once all the passwords have be provided and stored, the installer begins to install
    the Oracle Database in a Real Application Cluster configuration. This type of
    installation can run for a few minutes, depending on the size of the database
    that was requested to be created. Eventually, you’ll receive a message stating
    that the database was created successfully, and that message will include a date
    and timestamp of the completion. For example:


    `SUCCESS: 2013-11-11 21:50:56: Successfully created the database bcodatst`


    When the database is created, entries in the Cluster Ready Services (CRS) stack
    will be available for review (see Listing 4-6). Use the command `crsctl` from
    the Oracle Grid home to review the status of the database that has been created.
    A complete listing of the `crsctl` output is in Listing 4-6\. The lines in bold
    correspond to the database just created.


    Listing 4-6. Cluster Ready Services (CRS) Output


    `[grid@patty bin]$ ./crsctl status res -t`


    `-------------------------------------------------------------------------------`


    `NAME           TARGET  STATE        SERVER                   STATE_DETAILS`


    `-------------------------------------------------------------------------------`


    `Local Resources`


    `-------------------------------------------------------------------------------`


    `ora.DATA.dg`


    `ONLINE  ONLINE       patty`


    `ONLINE  ONLINE       selma`


    `ora.LISTENER.lsnr`


    `ONLINE  ONLINE       patty`


    `ONLINE  ONLINE       selma`


    `ora.RECO.dg`


    `ONLINE  ONLINE       patty`


    `ONLINE  ONLINE       selma`


    `ora.REDO.dg`


    `ONLINE  ONLINE       patty`


    `ONLINE  ONLINE       selma`


    `ora.asm`


    `ONLINE  ONLINE       patty                    Started`


    `ONLINE  ONLINE       selma                    Started`


    `ora.gsd`


    `OFFLINE OFFLINE      patty`


    `OFFLINE OFFLINE      selma`


    `ora.net1.network`


    `ONLINE  ONLINE       patty`


    `ONLINE  ONLINE       selma`


    `ora.ons`


    `ONLINE  ONLINE       patty`


    `ONLINE  ONLINE       selma`


    `ora.reco.acfsvol.acfs`


    `ONLINE  ONLINE       patty                    mounted on /cloudfs`


    `ONLINE  ONLINE       selma                    mounted on /cloudfs`


    `ora.registry.acfs`


    `ONLINE  ONLINE       patty`


    `ONLINE  ONLINE       selma`


    `-------------------------------------------------------------------------------`


    `Cluster Resources`


    `-------------------------------------------------------------------------------`


    `ora.LISTENER_SCAN1.lsnr`


    `1        ONLINE  ONLINE       patty`


    `ora.LISTENER_SCAN2.lsnr`


    `1        ONLINE  ONLINE       selma`


    `ora.bcodatst.db`


    `1        ONLINE  ONLINE       patty                    Open`


    `2        ONLINE  ONLINE       selma                    Open`


    `ora.cvu`


    `1        ONLINE  ONLINE       selma`


    `ora.dboda.db`


    `1        ONLINE  ONLINE       patty                    Open`


    `2        ONLINE  ONLINE       selma                    Open`


    `ora.oc4j`


    `1        ONLINE  ONLINE       selma`


    `ora.patty.vip`


    `1        ONLINE  ONLINE       patty`


    `ora.scan1.vip`


    `1        ONLINE  ONLINE       patty`


    `ora.scan2.vip`


    `1        ONLINE  ONLINE       selma`


    `ora.selma.vip`


    `1        ONLINE  ONLINE       selma`


    `ora.slob.db`


    `1        ONLINE  ONLINE       patty                    Open`


    As you can see, by looking at the `ora.bcodatst.db` entry, the `oakcli` command
    did all the work for you and created a RAC database with no issues. The database
    has a status of open as well, which indicates the database is ready to use.'
  trans: "\n### 实时应用集群\n\n实时应用集群选项是 Oracle 数据库一体机使用的主要选项。RAC 数据库为数据库提供了一定级别的高可用性，并通过服务实现应用的可扩展性。要为\
    \ Oracle 数据库一体机配置实时应用集群数据库，您需要使用 `oakcli` 命令。\n\n让我们使用 `oakcli` 来配置一个实时应用集群数据库：\n\
    \n```bash\n[oracle@patty bin]$su -\n```\n\n```bash\n[root@patty bin]$cd /opt/oracle/oak/bin\n\
    ```\n\n```bash\n[root@patty bin]$ ./oakcli create database -db bcodatst\n```\n\
    \n您会注意到，我使用了一个非常简单的 `create` 语句来创建名为 `bcodatst` 的数据库。还有其他选项允许您进行更定制化的数据库安装。这些其他选项就是前面在清单\
    \ 4-4 和 4-5 中概述的那些。\n\n**注意**\n\n如果您尝试以 `oracle` 用户身份创建数据库，系统会提示您没有执行此操作的权限。这是因为\
    \ `oakcli` 命令归 `root` 用户所有，这也是为什么前面的代码示例以 `su` 切换到 `root` 开始。如果您忘记这一点，以 `oracle`\
    \ 用户身份执行命令，将会出现以下错误：\n\n```text\n错误: 2013-11-11 21:19:13: 权限不足，无法创建数据库\n```\n\n\
    一旦您启动 `oakcli create database –db` 命令，系统会询问一系列问题，以帮助您在 Oracle 数据库一体机上配置数据库。这些问题的范围从询问用户密码到您想要配置的数据库类型。让我们开始吧。\n\
    \n```bash\n[root@patty bin]# ./oakcli create database -db bcodatst\n```\n\n```text\n\
    信息: 2013-11-11 21:20:59: 未提供数据库参数文件。将使用默认参数创建数据库\n```\n\n注意到我们没有提供参数文件了吗？`oakcli`\
    \ 命令发现了这一点，并决定使用默认参数文件。然后，系统会要求您提供一些密码。\n\n```text\n请输入 'root' 用户密码:\n请再次输入 'root'\
    \ 用户密码:\n请输入 'oracle' 用户密码:\n请再次输入 'oracle' 用户密码:\n请输入 'SYSASM' 用户密码: (在部署期间，我们将\
    \ SYSASM 密码设置为 'welcome1'):\n请再次输入 'SYSASM' 用户密码:\n信息: 2013-11-11 21:25:24: 正在安装新的主目录:\
    \ OraDb11203_home3，位于 /u01/app/oracle/product/11.2.0.3/dbhome_3\n```\n\n在提供了与\
    \ Oracle 数据库一体机硬件交互所需的所有密码后，`oakcli` 命令想知道您要执行哪种类型的数据库部署。由于您正在创建实时应用集群数据库，您需要选择选项三。\n\
    \n```text\n请选择数据库部署类型 [1 .. 3]：\n1    => EE : 企业版\n2    => RACONE\n3    => RAC\n\
    所选值是: RAC\n```\n\n对于 RAC 安装，安装程序接下来想知道您要创建的数据库大小。有五种不同的规模类别可供选择。出于演示目的，我们将选择一个中等规模的数据库。选择选项三以继续数据库安装。\n\
    \n```text\n请选择数据库类别 [1 .. 5]：\n1    => 非常小\n2    => 小\n3    => 中\n4    => 大\n\
    5    => 非常大\n所选值是: 中\n```\n\n由于您是管理员，您或您的团队需要管理该数据库。作为安装的一部分，系统会提示您是否要创建数据库控制台，也称为\
    \ Database Control。提示如下：\n\n```text\n是否要为此数据库设置 EM Dbconsole: [ Y | N ]? Y\n```\n\
    \n**注意**\n\n在第 6 章中，您将了解如何手动设置数据库控制台。您还将看到如何为 Oracle Enterprise Manager 12c 安装管理代理。\n\
    \n接下来，系统将要求您为 `ASMSNMP` 用户提供密码。此用户用于与一体机上的自动存储管理进行交互。请提供您为此用户配置的密码。\n\n```text\n\
    请输入 'ASMSNMP' 用户密码: (在部署期间，我们将 ASMSNMP 密码设置为 'welcome1'):\n请再次输入 'ASMSNMP' 用户密码:\n\
    ```\n\n一旦所有密码都已提供并存储，安装程序就开始以实时应用集群配置安装 Oracle 数据库。这种类型的安装可能需要几分钟时间，具体取决于要求创建的数据库大小。最终，您会收到一条消息，说明数据库已成功创建，该消息将包括完成时的日期和时间戳。例如：\n\
    \n```text\n成功: 2013-11-11 21:50:56: 成功创建数据库 bcodatst\n```\n\n当数据库创建后，集群就绪服务堆栈中的条目将可供查看（参见清单\
    \ 4-6）。使用 Oracle Grid 主目录中的 `crsctl` 命令来查看已创建数据库的状态。`crsctl` 输出的完整列表在清单 4-6 中。粗体显示的行对应于刚刚创建的数据库。\n\
    \n清单 4-6. 集群就绪服务输出\n\n```bash\n[grid@patty bin]$ ./crsctl status res -t\n```\n\
    \n```text\n-------------------------------------------------------------------------------\n\
    名称           目标    状态        服务器                   状态详情\n-------------------------------------------------------------------------------\n\
    本地资源\n-------------------------------------------------------------------------------\n\
    ora.DATA.dg\n               联机  联机       patty\n               联机  联机       selma\n\
    ora.LISTENER.lsnr\n               联机  联机       patty\n               联机  联机  \
    \     selma\nora.RECO.dg\n               联机  联机       patty\n               联机\
    \  联机       selma\nora.REDO.dg\n               联机  联机       patty\n          \
    \     联机  联机       selma\nora.asm\n               联机  联机       patty         \
    \           已启动\n               联机  联机       selma                    已启动\nora.gsd\n\
    \               脱机  脱机       patty\n               脱机  脱机       selma\nora.net1.network\n\
    \               联机  联机       patty\n               联机  联机       selma\nora.ons\n\
    \               联机  联机       patty\n               联机  联机       selma\nora.reco.acfsvol.acfs\n\
    \               联机  联机       patty                    挂载于 /cloudfs\n         \
    \      联机  联机       selma                    挂载于 /cloudfs\nora.registry.acfs\n\
    \               联机  联机       patty\n               联机  联机       selma\n-------------------------------------------------------------------------------\n\
    集群资源\n-------------------------------------------------------------------------------\n\
    ora.LISTENER_SCAN1.lsnr\n      1        联机  联机       patty\nora.LISTENER_SCAN2.lsnr\n\
    \      1        联机  联机       selma\nora.bcodatst.db\n      1        联机  联机   \
    \    patty                    已打开\n      2        联机  联机       selma         \
    \           已打开\nora.cvu\n      1        联机  联机       selma\nora.dboda.db\n  \
    \    1        联机  联机       patty                    已打开\n      2        联机  联机\
    \       selma                    已打开\nora.oc4j\n      1        联机  联机       selma\n\
    ora.patty.vip\n      1        联机  联机       patty\nora.scan1.vip\n      1     \
    \   联机  联机       patty\nora.scan2.vip\n      1        联机  联机       selma\nora.selma.vip\n\
    \      1        联机  联机       selma\nora.slob.db\n      1        联机  联机       patty\
    \                    已打开\n```\n\n正如您所看到的，通过查看 `ora.bcodatst.db` 条目，`oakcli` 命令为您完成了所有工作，并成功创建了一个\
    \ RAC 数据库。数据库状态也是“已打开”，表明数据库已准备就绪可以使用。\n"
- fmt: "### Real Application Cluster One\n\nThere are times when your organization\
    \ wants only to have a single instance that can fail over between two nodes. To\
    \ allow for this, Oracle has enabled a feature called RAC One. RAC One is a real\
    \ application cluster that runs on a single node, and then fails over to the second\
    \ when needed or desired.\n\nConfiguring a RAC One database is much the same as\
    \ configuring a RAC database on the Oracle Database Appliance. You need to use\
    \ the `oakcli` command and then provide the input required to tell Oracle what\
    \ to configure. Let’s take a look at configuring a RAC One cluster now.\n\nJust\
    \ as before, you need to start the `oakcli` command from the root user. Notice\
    \ this time that we changed the database name to `bcrac1tst`.\n\n```\n[oracle@patty\
    \ bin]$su -\n[root@patty bin]$cd /opt/oracle/oak/bin\n[root@patty bin]$ ./oakcli\
    \ create database -db bcrac1tst\n```\n\nIf you try to use a name that is longer\
    \ than eight characters, the `oakcli` command provides a warning and some information\
    \ about the warning. Then it asks you to provide another name for the database.\
    \ For example:\n\n```\nWARNING: 2013-11-12 07:18:22: bcrac1tst is not a valid\
    \ database name\nINFO: 2013-11-12 07:18:22: Only alphanumeric characters are allowed\
    \ in the database name, and the database name must start with an alphabetical\
    \ character\nINFO: 2013-11-12 07:18:22: Database name should not be more than\
    \ 8 chars\n```\n\nAs indicated, we have been told that the database name cannot\
    \ be more than eight characters long. At the prompt, provide a new database name\
    \ that is eight characters or less.\n\n```\nPlease enter a different name for\
    \ the Database: bcrac1\n```\n\nJust as with a RAC database, the `oakcli` installer\
    \ will prompt us for various user passwords. Enter the passwords as expected and\
    \ the installer continues. Once all the passwords have been provided, the installer\
    \ will provide you the location where the new Oracle Home will be located by means\
    \ of an INFO message.\n\n```\nPlease enter the 'root' user password:\nPlease re-enter\
    \ the 'root' user password:\nPlease enter the 'oracle' user password:\nPlease\
    \ re-enter the 'oracle' user password:\nPlease enter the 'SYSASM' user password:\
    \ (During deployment we set the SYSASM password to 'welcome1'):\nPlease re-enter\
    \ the 'SYSASM' user password:\nINFO: 2013-11-12 07:23:49: Installing a new home:\
    \ OraDb11203_home4 at /u01/app/oracle/product/11.2.0.3/dbhome_4\n```\n\nAs with\
    \ creating a RAC database, you will be asked what type of database you want to\
    \ create. To create a RAC One database, you need to select option two (2), which\
    \ indicates the `RACONE` database option. After selecting the option for RAC One,\
    \ the installer asks what size you would like to make this database. Select the\
    \ size that is desired for your organization.\n\n```\nPlease select one of the\
    \ following for Database Deployment  [1 .. 3]:\n1    => EE : Enterprise Edition\n\
    2    => RACONE\n3    => RAC\nSelected value is: RACONE\nPlease select one of the\
    \ following for Database Class  [1 .. 5]:\n1    => Very Small\n2    => Small\n\
    3    => Medium\n4    => Large\n5    => Extra Large\n```\n\nThe last question to\
    \ be asked while installing an Oracle RAC One database is about configuring the\
    \ database console. Just as with the RAC configuration, you can say yes or no.\n\
    \n```\nDo you want to set up the EM Dbconsole for this database: [ Y | N ]?\n\
    ```\n\nAs with the RAC installation, once the `oakcli` command has completed,\
    \ you will be able to see the newly created database in the Cluster Ready Services\
    \ (CRS) stack. Listing 4-7 shows the stack for the database just created.\n\n\
    **Listing 4-7. Cluster Ready Services (CRS) Output**\n\n```\n[grid@patty bin]$\
    \ ./crsctl status res -t\n-------------------------------------------------------------------------------\n\
    NAME           TARGET  STATE        SERVER                   STATE_DETAILS\n-------------------------------------------------------------------------------\n\
    Cluster Resources\n-------------------------------------------------------------------------------\n\
    ora.bcrac1.bcrac1_racone.svc\n      1        ONLINE  ONLINE       selma\nora.bcrac1.db\n\
    \      1        ONLINE  ONLINE       selma                    Open\n```\n\nThe\
    \ example of the `crsctl` output in Listing 4-7 shows that the RAC One database\
    \ was created and is located on the `Selma` server. Additionally, the database\
    \ is open and accessible to end users.\n\n### Single Instance (EE Option)\n\n\
    Setting up a single instance database on the Oracle Database Appliance is just\
    \ as simple as the options you’ve seen so far. To create a single instance database,\
    \ you start off the same way as you did for the RAC and RAC One configurations.\
    \ For example:\n\n```\n[oracle@patty bin]$su -\n[root@patty bin]$cd /opt/oracle/oak/bin\n\
    [root@patty bin]$ ./oakcli create database –db bcsingle\n```\n\nYour database\
    \ name needs to be different as well. In the preceding example, the name `bcsingle`\
    \ is used. When executed, you will be prompted about the type of database you\
    \ want to be created. After selecting the type of database to create, you are\
    \ asked which node you would like to have the database created on. Listing 4-8\
    \ provides an example of the question about what node to install the database.\
    \ Then the installer will ask you the normal questions, like configuring a RAC\
    \ or RAC One database. As with the previous runs of the `oakcli` command for the\
    \ other database types, you will be prompted to select the installation type and\
    \ size, and asked whether the database console should be created.\n\n**Listing\
    \ 4-8. Select a Node for Installing an EE Database**\n\n```\nPlease select one\
    \ of the following for Node Number  [1 .. 2]:\n1    => patty\n2    => Selma\n\
    ```\n\nOnce the single instance database installation is done, the database status\
    \ can be viewed from the CRS stack using the `crsctl` command. Listing 4-9 shows\
    \ a sample of a CRS stack with a single instance.\n\n**Listing 4-9. Cluster Ready\
    \ Services (CRS) Status for an EE Database**\n\n```\n[grid@patty bin]$ ./crsctl\
    \ status res -t\n-------------------------------------------------------------------------------\n\
    NAME           TARGET  STATE        SERVER                   STATE_DETAILS\n-------------------------------------------------------------------------------\n\
    Cluster Resources\n-------------------------------------------------------------------------------\n\
    ora.bcsingle.db\n      1        ONLINE  ONLINE       patty                   \
    \ Open\n```"
  raw: '### Real Application Cluster One


    There are times when your organization wants only to have a single instance that
    can fail over between two nodes. To allow for this, Oracle has enabled a feature
    called RAC One. RAC One is a real application cluster that runs on a single node,
    and then fails over to the second when needed or desired.


    Configuring a RAC One database is much the same as configuring a RAC database
    on the Oracle Database Appliance. You need to use the `oakcli` command and then
    provide the input required to tell Oracle what to configure.  Let’s take a look
    at configuring a RAC One cluster now.


    Just as before, you need to start the `oakcli` command from the root user. Notice
    this time that we changed the database name to bcrac1tst.


    `[oracle@patty bin]$su -`


    `[root@patty bin]$cd /opt/oracle/oak/bin`


    `root@patty bin]$ ./oakcli create database -db bcrac1tst`


    If you try to use a name that is longer than eight characters, the `oakcli` command
    provides a warning and some information about the warning. Then it asks you to
    provide another name for the database. For example:


    `WARNING: 2013-11-12 07:18:22: bcrac1tst is not a valid database name`


    `INFO: 2013-11-12 07:18:22: Only alphanumeric characters are allowed in the database
    name, and the database name must start with an alphabetical character`


    `INFO: 2013-11-12 07:18:22: Database name should not be more than 8 chars`


    As indicated, we have been told that the database name cannot be more than eight
    characters long. At the prompt, provide a new database name that is eight characters
    or less.


    `Please enter a different name for the Database: bcrac1`


    Just as with a RAC database, the `oakcli` installer will prompt us for various
    user passwords. Enter the passwords as expected and the installer continues. Once
    all the passwords have been provided, the installer will provide you the location
    where the new Oracle Home will be located by means of an INFO message.


    `Please enter the ''root'' user password:`


    `Please re-enter the ''root'' user password:`


    `Please enter the ''oracle'' user password:`


    `Please re-enter the ''oracle'' user password:`


    `Please enter the ''SYSASM'' user password: (During deployment we set the SYSASM
    password to ''welcome1''):`


    `Please re-enter the ''SYSASM'' user password:`


    `INFO: 2013-11-12 07:23:49: Installing a new home: OraDb11203_home4 at /u01/app/oracle/product/11.2.0.3/dbhome_4`


    As with creating a RAC database, you will be asked what type of database you want
    to create. To create a RAC One database, you need to select option two (2), which
    indicates the RACONE database option. After selecting the option for RAC One,
    the installer asks what size you would like to make this database. Select the
    size that is desired for your organization.


    `Please select one of the following for Database Deployment  [1 .. 3]:`


    `1    => EE : Enterprise Edition`


    `2    => RACONE`


    `3    => RAC`


    `Selected value is: RACONE`


    `Please select one of the following for Database Class  [1 .. 5]:`


    `1    => Very Small`


    `2    => Small`


    `3    => Medium`


    `4    => Large`


    `5    => Extra Large`


    The last question to be asked while installing an Oracle RAC One database is about
    configuring the database console. Just as with the RAC configuration, you can
    say yes or no.


    `Do you want to set up the EM Dbconsole for this database: [ Y | N ]?`


    As with the RAC installation, once the `oakcli` command has completed, you will
    be able to see the newly created database in the Cluster Ready Services (CRS)
    stack. Listing 4-7 shows the stack for the database just created.


    Listing 4-7. Cluster Ready Services (CRS) Output


    `[grid@patty bin]$ ./crsctl status res -t`


    `-------------------------------------------------------------------------------`


    `NAME           TARGET  STATE        SERVER                   STATE_DETAILS`


    `-------------------------------------------------------------------------------`


    `Cluster Resources`


    `-------------------------------------------------------------------------------`


    `ora.bcrac1.bcrac1_racone.svc`


    `1        ONLINE  ONLINE       selma`


    `ora.bcrac1.db`


    `1        ONLINE  ONLINE       selma                    Open`


    The example of the `crsctl` output in Listing 4-7 shows that the RAC One database
    was created and is located on the Selma server. Additionally, the database is
    open and accessible to end users.


    ### Single Instance (EE Option)


    Setting up a single instance database on the Oracle Database Appliance is just
    as simple as the options you’ve seen so far. To create a single instance database,
    you start off the same way as you did for the RAC and RAC One configurations.
    For example:


    `[oracle@patty bin]$su -`


    `[root@patty bin]$cd /opt/oracle/oak/bin`


    `[root@patty bin]$ ./oakcli create database –db bcsingle`


    Your database name needs to be different as well. In the preceding example, the
    name bcsingle is used. When executed, you will be prompted about the type of database
    you want to be created. After selecting the type of database to create, you are
    asked which node you would like to have the database created on.  Listing 4-8
    provides an example of the question about what node to install the database. Then
    the installer will ask you the normal questions, like configuring a RAC or RAC
    One database. As with the previous runs of the `oakcli` command for the other
    database types, you will be prompted to select the installation type and size,
    and asked whether the database console should be created.


    Listing 4-8. Select a Node for Installing an EE Database


    `Please select one of the following for Node Number  [1 .. 2]:`


    `1    => patty`


    `2    => Selma`


    Once the single instance database installation is done, the database status can
    be viewed from the CRS stack using the `crsctl` command. Listing 4-9 shows a sample
    of a CRS stack with a single instance.


    Listing 4-9. Cluster Ready Services (CRS) Status for an EE Database


    `[grid@patty bin]$ ./crsctl status res -t`


    `-------------------------------------------------------------------------------`


    `NAME           TARGET  STATE        SERVER                   STATE_DETAILS`


    `-------------------------------------------------------------------------------`


    `Cluster Resources`


    `-------------------------------------------------------------------------------`


    `ora.bcsingle.db`


          `1        ONLINE  ONLINE       patty                    Open`'
