    # 数据库配置：修改参数与测试


    修改两个新的上下文文件中的 `s_virtual_hostname` 和 `s_db_listener` 上下文参数。使用在本教程第 5 步中创建的新数据库监听器的名称。以下示例展示了如何在第一个节点上修改这些值：


    ```

    [oracle@s1 bin]$ egrep "s_virtual_hostname|s_db_listener" $ORACLE_HOME/appsutil/PROD1_s1.xml

    <host oa_var="s_virtual_hostname">s1</host>

    <DB_LISTENER oa_var="s_db_listener"></DB_LISTENER>


    [oracle@s1 bin]$ vi $ORACLE_HOME/appsutil/PROD1_s1.xml


    [oracle@s1 bin]$ egrep "s_virtual_hostname|s_db_listener" $ORACLE_HOME/appsutil/PROD1_s1.xml

    <host oa_var="s_virtual_hostname">s1-vip</host>

    <DB_LISTENER oa_var="s_db_listener">LISTENER_PROD</DB_LISTENER>

    ```


    在两个节点上运行 `adconfig.pl` 工具以创建初始配置：


    ```

    [oracle@s1 bin]$ perl adconfig.sh contextfile=$ORACLE_HOME/appsutil/PROD1_s1.xml

    Enter the APPS user password:

    ...

    AutoConfig completed successfully.

    ```


    连接到每个数据库实例，并更改 `local_listener` 和 `remote_listener` 数据库初始化参数。请注意，`local_listener`
    参数在每个节点上需要不同的值。例如：


    ```

    # 在第 1 个节点上

    [oracle@s1 ∼]$ sqlplus / as sysdba

    SQL> alter system set remote_listener=''PROD_REMOTE'' sid=''PROD1'';

    System altered.

    SQL> alter system set local_listener=''PROD1_LOCAL'' sid=''PROD1'';

    System altered.

    SQL> exit


    # 在第 2 个节点上

    [oracle@s2 ∼]$ sqlplus / as sysdba

    SQL> alter system set remote_listener=''PROD_REMOTE'' sid=''PROD2'';

    System altered.

    SQL> alter system set local_listener=''PROD2_LOCAL'' sid=''PROD2'';

    System altered.

    SQL> exit

    ```


    加载新的环境文件并在每个节点上运行 AutoConfig：


    ```

    [oracle@s1 ∼]$ . $ORACLE_HOME/$CONTEXT_NAME.env

    [oracle@s1 ∼]$ cd $ORACLE_HOME/appsutil/scripts/$CONTEXT_NAME

    [oracle@s1 PROD1_s1]$ ./adautocfg.sh

    Enter the APPS user password:

    ...

    AutoConfig completed successfully.

    ```


    最后一步，作为 RAC 中 e-Business Suite 数据库配置的收尾工作，需要为数据库的 CRS 服务添加一个 e-Business 特定的 `ORA_NLS10`
    环境变量。在任意数据库服务器上执行以下命令：


    ```

    [oracle@s1 ∼]$ srvctl setenv database -d PROD -t "TNS_ADMIN=$ORACLE_HOME/network/admin,ORA_NLS10=$ORACLE_HOME/nls/data/9idata"

    ```


    此外，需要了解的是，数据库节点上的 AutoConfig 会在 `sqlnet.ora` 文件中设置 `tcp.validnode_checking=yes`，并且
    `tcp.invited_nodes` 列表仅包含数据库节点的物理和虚拟 IP。这意味着监听器只接受来自数据库节点的新连接。由于还需要从两个应用服务器连接到数据库，因此需要通过在自定义包含文件
    `sqlnet_ifile.ora` 中覆盖该参数来添加两个额外节点，如下所示。（如果希望完全禁用 `tcp.validnode_checking`，最佳方法是将
    e-Business Suite 配置文件选项 “SQLNet Access” 更改为 `ALLOW_ALL`，然后在数据库节点上重新运行 AutoConfig）。


    ```

    [oracle@s1 ∼]$ echo "tcp.invited_nodes=(s1, s2, s1-vip, s2-vip, oevm1, oevm2)"
    > $TNS_ADMIN/sqlnet_ifile.ora

    ```


    数据库层的配置已完成。现在需要测试是否可以从任何数据库节点使用 `srvctl` 启动监听器和数据库。执行命令 `srvctl stop database
    -d PROD` 和 `srvctl stop listener -l LISTENER_PROD` 来停止服务。然后执行 `srvctl start listener
    -l LISTENER_PROD` 和 `srvctl start database -d PROD` 来启动服务。尝试从一个节点运行这些命令，然后再从另一个节点运行。每次测试后检查监听器，观察数据库实例是如何注册的。


    清单 11-20 展示了某个 SCAN 监听器上正确注册的服务。请注意正确配置的以下特征：


    *   注册了两个服务，分别名为 `PROD` 和 `ebs_patch`（`ebs_patch` 由 e-Business Suite R12.2 的在线补丁功能使用，用于提供对数据库“补丁版本”的连接）。

    *   每个服务都有两个已注册的实例，在本例中为 `PROD1` 和 `PROD2`。

    *   每个实例都使用数据库服务器的虚拟地址注册。在本例中有两个这样的服务器，名为 `s1-vip.odalab.com` 和 `s2-vip.odalab.com`。


    **清单 11-20. 在 SCAN 监听器上注册的数据库服务**


    ```

    [grid@s2 ∼]$ . oraenv

    ORACLE_SID = [grid] ? +ASM2

    The Oracle base has been set to /u01/app/grid


    [grid@s2 ∼]$ ps -ef | grep "tns.*SCAN"

    grid      19280      1  0 Oct07 ?        00:05:24 /u01/app/11.2.0.3/grid/bin/tnslsnr
    LISTENER_SCAN1 -inherit

    grid      81264  79505  0 15:35 pts/1    00:00:00 grep tns.*SCAN


    [grid@s2 ∼]$ lsnrctl services LISTENER_SCAN1

    LSNRCTL for Linux: Version 11.2.0.3.0 - Production on 22-OCT-2013 15:36:02

    Copyright (c) 1991, 2011, Oracle.  All rights reserved.

    Connecting to (DESCRIPTION=(ADDRESS=(PROTOCOL=IPC)(KEY=LISTENER_SCAN1)))

    Services Summary...

    Service "PROD" has 2 instance(s).

    Instance "PROD1", status READY, has 1 handler(s) for this service...

    Handler(s):

    "DEDICATED" established:0 refused:0 state:ready

    REMOTE SERVER

    (DESCRIPTION=(ADDRESS=(PROTOCOL=tcp)(HOST=s1-vip.odalab.com)(PORT=1532)))

    Instance "PROD2", status READY, has 1 handler(s) for this service...

    Handler(s):

    "DEDICATED" established:0 refused:0 state:ready

    REMOTE SERVER

    (DESCRIPTION=(ADDRESS=(PROTOCOL=tcp)(HOST=s2-vip.odalab.com)(PORT=1532)))

    Service "ebs_patch" has 2 instance(s).

    Instance "PROD1", status READY, has 1 handler(s) for this service...

    Handler(s):

    "DEDICATED" established:0 refused:0 state:ready

    REMOTE SERVER

    (DESCRIPTION=(ADDRESS=(PROTOCOL=tcp)(HOST=s1-vip.odalab.com)(PORT=1532)))

    Instance "PROD2", status READY, has 1 handler(s) for this service...

    Handler(s):

    "DEDICATED" established:0 refused:0 state:ready

    REMOTE SERVER

    (DESCRIPTION=(ADDRESS=(PROTOCOL=tcp)(HOST=s2-vip.odalab.com)(PORT=1532)))

    The command completed successfully

    ```


    当数据库启动和关闭过程的测试完成后，就可以完成应用层配置了。此时，应用层服务器上的 e-Business Suite 配置尚未感知到数据库层的变更；也就是说，Net
    服务和 JDBC 配置仍然设置为单节点数据库，需要为 RAC 数据库进行调整。


    正如预期，AutoConfig 能够调整配置，该过程在 My Oracle Support 注意事项 “Using Oracle 11g Release 2
    Real Application Clusters and Automatic storage management with Oracle E-Business
    Suite Release 12.2 (Doc ID 1453213.1)” 的 “4.7. Establish Applications Environment
    for Oracle RAC” 一节中有详细说明。以下是这些步骤的快速摘要：


    1.  手动调整上下文文件中的 `tnsnames.ora` 和 JDBC URL，以允许连接到 RAC 数据库的一个实例。

    2.  在应用服务器上运行 AutoConfig，从数据库检索配置信息，然后将必要的更改写入配置文件。

    3.  在 Weblogic Server 数据源中更新 JDBC URL。


    至此，数据库迁移到 ASM 和 RAC 的工作就完成了。您已经完成了最复杂的部分——在 ODA 上实施 e-Business Suite。此时，您拥有一个功能齐全的系统，数据库层有两个节点，应用层有一个节点。本章的下一节将展示如何克隆应用层
    VM，并使用共享的应用层文件系统实施第二个应用层节点。

    '
- fmt: '### Clone the Application Tier VM


    At this moment, you have only one virtual machine running the e-Business Suite
    application tier. Fortunately, it’s very easy to clone a new VM on the ODA from
    an existing one, and doing so will give you a VM that is already preconfigured
    for the existing environment. Create a VM template from the existing VM, and clone
    the new VM from the new template. Additionally, you’ll have to change the hostname
    and the IP address. Let’s take a more detailed look at how to accomplish this
    process:


    #### Stop the e-Business Suite services

    Make sure they are not running during the cloning process to follow. Stop the
    existing VM (`oevm1`) by connecting to one of the ODA Base servers and running
    `oakcli stop vm`, as shown next. Follow by executing `oakcli show vm` to confirm
    when the VM shuts down.


    ```

    [root@s1 ∼]# oakcli show vm


    NAME                              MEMORY      VCPU        STATE           REPOSITORY

    oevm1                              12288          4        ONLINE          odarepo1


    [root@s1 ∼]# oakcli stop vm oevm1

    Shutdown VM initiated for oevm1


    [root@s1 ∼]# oakcli show vm


    NAME                              MEMORY      VCPU        STATE           REPOSITORY

    oevm1                              12288          4        OFFLINE         odarepo1

    ```


    #### Package the VM in a tarball

    Connect to the Dom0 as root on the same ODA node where the existing VM is configured,
    and package the VM in a tarball. The existing VMs are located in `/OVS/Repositories/odarepo1/VirtualMachines/{VM
    name}` on the first ODA node and `/OVS/Repositories/odarepo2/VirtualMachines/{VM
    name}` on the second ODA node. For example:


    ```

    [root@ovs-host1 ∼]# cd /OVS/Repositories/odarepo1/VirtualMachines/oevm1

    [root@ovs-host1 oevm1]# ls -lh

    total 13G

    -rw-r--r-- 1 root root 12G Oct 24 07:09 15574aa1d9f24f57b44bc6045d924cff.img

    -rw-r--r-- 1 root root 350 Sep  2 10:03 vm.cfg


    [root@ovs-host1 oevm1]# tar -cvzf /OVS/oevm1_clone.tgz ./*

    ./15574aa1d9f24f57b44bc6045d924cff.img

    ./vm.cfg

    ```


    #### Copy the tarball to the second Dom0

    ```

    [root@ovs-host1 oevm1]# scp /OVS/oevm1_clone.tgz 10.177.0.59:/OVS/

    oevm1_clone.tgz                                            100% 4700MB  47.5MB/s   01:39

    ```


    #### Import the tarball as a template

    Once the tarball is copied to the second Dom0, you can import it as a template
    in the repository on the other node. This step can be executed on any of ODA Base
    nodes; it doesn’t have to be the same node to which you copied the tarball. Here
    are the commands to execute:


    ```

    [root@s1 ∼]# oakcli import vmtemplate oevm1_tmp -files /OVS/oevm1_clone.tgz -repo
    odarepo2

    Imported VM Template

    ```


    #### Create and start a new VM by cloning the template

    ```

    [root@s1 ∼]# oakcli clone vm oevm2 -vmtemplate oevm1_tmp -repo odarepo2

    Cloned VM : oevm2


    [root@s1 ∼]# oakcli start vm oevm2

    Started VM : oevm2


    [root@s1 ∼]# oakcli show vm


    NAME                              MEMORY      VCPU        STATE           REPOSITORY

    oevm1                              12288          4        OFFLINE         odarepo1

    oevm2                              12288          4        ONLINE          odarepo2

    ```


    #### Change the hostname and IP address

    Both VMs are now configured with the same hostname and IP. You need to change
    the configuration before both VMs can be started at the same time. I find the
    easiest way of doing this is by adjusting the configuration files `/etc/sysconfig/network`
    and `/etc/sysconfig/network-scripts/ifcfg-eth0`, and then bouncing the VM. Additionally,
    depending on the configuration of the name resolution that you have chosen to
    implement, the host file may need to be adjusted. Here’s an example of what to
    do:


    ```

    [root@oevm1 ∼]# grep HOSTNAME /etc/sysconfig/network

    HOSTNAME=oevm1.odalab.com


    [root@oevm1 ∼]# vi /etc/sysconfig/network


    [root@oevm1 ∼]# grep HOSTNAME /etc/sysconfig/network

    HOSTNAME=oevm2.odalab.com


    [root@oevm1 ∼]# grep IPADDR /etc/sysconfig/network-scripts/ifcfg-eth0

    IPADDR=10.177.0.63


    [root@oevm1 ∼]# vi /etc/sysconfig/network-scripts/ifcfg-eth0


    [root@oevm1 ∼]# grep IPADDR /etc/sysconfig/network-scripts/ifcfg-eth0

    IPADDR=10.177.0.64


    [root@oevm1 ∼]# reboot

    ```


    #### Mount the `/cloudfs` from the other Virtual IP

    You also want to mount the `/cloudfs` from the other Virtual IP on the new VM,
    so you need to adjust your `/etc/fstab` file and remount the ACFS file system
    on `oevm2`. For example:


    ```

    [root@oevm2 ∼]# grep cloudfs /etc/fstab

    s1-vip:/cloudfs   /cloudfs    nfs     rw,intr,bg,hard,timeo=600,wsize=32768,rsize=32768,nfsvers=3,tcp,nolock,acregmin=0,acregmax=0
    0 0


    [root@oevm2 ∼]# vi /etc/fstab


    [root@oevm2 ∼]# grep cloudfs /etc/fstab

    s2-vip:/cloudfs   /cloudfs    nfs     rw,intr,bg,hard,timeo=600,wsize=32768,rsize=32768,nfsvers=3,tcp,nolock,acregmin=0,acregmax=0
    0 0


    [root@oevm2 ∼]# umount /cloudfs

    [root@oevm2 ∼]# mount /cloudfs

    ```


    #### Verify the setup and test keepalived

    Lastly, you can start the first VM too because the conflicting configuration has
    been removed. (See the following example). Once started, you should check that
    the virtual IP (10.177.0.60 in this example is configured on `oevm2`) is managed
    and started on one of the VMs. You can also test how `keepalived` manages the
    virtual IP by stopping and starting its service (use `service keepalived stop`
    and `service keepalived start` to do it) on the hosts. The IP will always be allocated
    to one of the VMs the `keepalived` is running on.


    ```

    [root@s1 ∼]# oakcli start vm oevm1

    Started VM : oevm1


    [root@s1 ∼]# oakcli show vm


    NAME                              MEMORY      VCPU        STATE           REPOSITORY

    oevm1                              12288          4        ONLINE          odarepo1

    oevm2                              12288          4        ONLINE          odarepo2


    [root@oevm1 ∼]# ip addr list dev eth0 | grep "inet "

    inet 10.177.0.63/16 brd 10.177.255.255 scope global eth0


    [root@oevm2 ∼]# ip addr list dev eth0 | grep "inet "

    inet 10.177.0.64/16 brd 10.177.255.255 scope global eth0

    inet 10.177.0.60/32 scope global eth0

    ```


    You have two-application tier VMs now, but only one of them is configured with
    e-Business Suite. The final step to complete the e-Business Suite application
    tier configuration on ODA is to enable the services on the second VM. This is
    covered in the next section.'
