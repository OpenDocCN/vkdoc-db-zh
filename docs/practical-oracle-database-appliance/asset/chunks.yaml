    # 10. 虚拟化与 ODA


    ## 摘要


    Oracle 数据库一体机 (`ODA`) 主要设计为一个一体机设备，用于快速支持和部署 Oracle 数据库，并提供按需付费的许可模式。`ODA` 硬件在部署选项上提供了极大的灵活性，其
    `4U` 机架尺寸对于许多中小型企业 (`SMB`) 在各种场景下的部署来说都非常理想。`SMB` 通常希望使用整合的硬件，而 `ODA` 作为一个优秀的数据库平台，仍然需要额外的组件来支持一个完整的应用程序栈。这催生了一个想法，即虚拟化可能实现一个一体化的解决方案，帮助各类
    `SMB` 实现“减少硬件”的目标。


    通过软件更新，虚拟化功能已被添加到 `ODA` 中，与其他主要的 `ODA` 功能一样，它需要对平台进行重新镜像才能实现。`ODA` 上的虚拟化允许使用那些可能被闲置的容量。本章将重点介绍使用
    Oracle VM (`OVM`) 这项在 `ODA` 上实现虚拟化的技术的基础知识，并讨论部署虚拟机以扩展 `ODA` 用途的便捷性。


    ## ODA 性能


    当前的 `X3-2 ODA` 型号运行与 `Exadata` 相同的计算节点型号。`ODA` 在服务器节点的发布周期上确实落后于 `Exadata`。尽管如此，它们大部分时间运行的是相同的
    `CPU` 型号。`Exadata` 支持每台服务器的内存从 `256G` 扩展到 `512G`，但 `ODA` 不支持。即便如此，`ODA` 上的逻辑 `IO`
    性能仍然非常出色。


    `ODA` 性能的另一个来源是所有组件都内置于一体机中。`RAC` 流量不会离开一体机通过外部网络在计算节点之间进行通信。两个服务器节点和存储单元彼此相邻，并通过高速
    `SAS` 电缆连接。中间没有交换机、防火墙或其他外部网络层。


    `ODA` 的物理 `IO` 存储性能良好——事实上，比典型的 `SAN` 光纤通道磁盘要好。Oracle 已发布的 `X3-2` 物理 `IO` 基准测试显示，在单个存储单元上，`3,500`
    `IOPS` 时延迟为 `5` 毫秒；在附加存储扩展单元时，`7,000` `IOPS`。超过这些 `IOPS` 水平，服务级别会下降。Oracle 的 `ODA
    X3-2` 基准测试显示，在 `5,750` `IOPS` 时，服务级别为 `6` 到 `7` 毫秒；在配置存储扩展机架时，`11,500` `IOPS`。最后的这些数字仍然非常优秀，与经过良好调优的基于光纤通道磁盘的
    `SAN` 上看到的水平相当。然而，当 `IOPS` 超过这些水平时，性能在某些时候会开始明显下降。由于 `ODA` 配备了大量内存，将数据缓存在内存中是避免达到
    `ODA` `IOPS` 限制的关键可扩展性因素。


    `ODA` 目前没有支持使用 `PCI Flash` 或 `SSD` 的可选功能。随 `ODA` 附带的四个 `SSD` 驱动器仅支持用于在线重做日志。`ODA`
    支持扩展存储到 `NFS`，包括 Oracle 的 `ZFS` 存储设备。支持使用 `DNFS` (直接 `NFS`) 来提升性能。然而，据我所知，尚未发布任何使用
    `NFS` 存储扩展的 `ODA` 的物理 `IO` 性能基准测试。虽然 `ASM` 在 `NFS` 扩展上不受支持，但 Oracle 已宣布，当 `NFS`
    挂载点是 Oracle `ZFS` 存储设备时，`ODA` 支持混合列式压缩。


    由于 Oracle 正在投资 `ODA` 平台，`IOPS` 和磁盘性能可能会随着每个新型号而变化。当替代 `X3-2` 的新型号发布时，您需要重新审视物理性能和
    `IOPS` 限制。


    ## 总结


    `ODA` 是一种高可用的应用程序和数据库基础设施解决方案，采用自包含的一体化工程设备。`ODA` 提供低成本的硬件，与传统的数据库解决方案相比，其设置和持续支持成本更低。部署是自动化且快速的，包括创建
    `RAC One` 和双节点 `RAC` 集群数据库。`ODA` 修补过程使用 Oracle 提供的软件，将 `OS`、网格和数据库组件作为一个整体单元进行修补。`ODA`
    预装了管理和部署软件。


    `ODA` 提供独特的“按需成长”Oracle 许可选项。应用程序和数据库可以使用 Oracle 的虚拟化产品部署在 `ODA` 上。


    ## Oracle VM (`OVM`)


    `OVM` 基于开源的 `Xen` 虚拟机管理程序，并在市场上与 `EMC VMware` 和 `Microsoft Hyper-V` 等产品竞争。Oracle
    将 `Xen` 虚拟机管理程序作为其 `OVM` 技术的核心，并进行了重大增强，例如支持多种操作系统，以及提供管理界面，使其成为更适合企业使用的产品。


    Oracle 对 Sun Microsystems 的收购使其能够进一步增强 `OVM` 产品，并创建了一个 `OVM` 产品家族，包括 Oracle `VM
    Server` 以及 Oracle `VM VirtualBox`。Oracle `VM Server` 是运行虚拟主机的平台，允许在一组硬件上 provision
    多个虚拟主机，并且包含一个服务器组件以及一个必需的管理组件。另一方面，Oracle `VM VirtualBox` 是一个桌面虚拟化工具，扩展了您现有桌面软件的功能，并且不需要虚拟机管理程序来管理它。Oracle
    免费提供 Oracle `VM Server` 以及 Oracle `VirtualBox`，但 Oracle `VM Server` 有相关的支持成本。Oracle
    还提供了一个其产品的广泛 `VM` 模板库，允许快速部署虚拟机。Oracle `VM` 模板也可以转换为 Oracle `VirtualBox` 模板。


    ### OVM 与数据库一体机


    `ODA` 上的 `OVM` 实现具有独特性，因为它不需要 Oracle `VM Manager`。在 `ODA` 上引入虚拟化的设计理念是为了在不增加额外基础设施的情况下增强
    `ODA` 的价值，并确保数据库一体机中的数据库仍然是 `ODA` 的主要焦点。`ODA` 补丁版本 `2.5` 添加了对虚拟化的支持，此后所有后续版本都增加了功能，使虚拟化更好、更易于管理和部署。


    `ODA` 上的虚拟化在安装和设备配置方面带来了一些独特的挑战。`ODA` 上的默认设置是裸机，这意味着所有硬件与每个组件都是一一对应的。为了将正在运行的
    `ODA` 转换为虚拟化模型，必须重新安装整个一体机。这一点作为安装决策尤为重要，因为转换需要数据丢失或停机。


    ### 安装虚拟化 ODA


    从工厂发货的 `ODA` 的默认状态是裸机状态。`ODA` 裸机安装的过程在第 2 章中有详细说明。本节将重点介绍一些具体的变化，以及 `ODA` 离线配置器中为处理虚拟化所做的更改。

