    If Database Control is down, you will need it to be up in order to monitor the
    database instances that are running on your server. Starting Database Control
    is as easy as stopping the Database Control. To start Database Control, you use
    the `start` option to the `emctl` command. Listing 6-12 illustrates.


    ## Listing 6-12. Start Database Control


    ```

    $ cd $ORACLE_HOME/bin

    $ ./emctl stop dbconsole

    ```


    Again, it is a good practice to check the status to verify that Database Control
    came up successfully. Listing 6-13 shows a `start` command followed by a status
    check.


