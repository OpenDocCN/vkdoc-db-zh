- fmt: '# Network Time Protocol (NTP) Configuration


    Before deploying the database, it is very important to verify that the time between
    both nodes is accurate and within a few seconds of each other. The default configuration
    file `/etc/ntp.conf` that is deployed with the Oracle Database Appliance is actually
    valid. The appliance is initially configured to use the public RedHat NTP pool
    of servers; for systems access to the Internet, this should keep the time in the
    Oracle Database Appliance in sync. Listing 3-4 provides the server portion of
    the NTP configuration file, which has the Oracle Database Appliance pointing to
    the RedHat NTP pool.


    Listing 3-4. RedHat NTP Pool

    ```

    # Use public servers from the pool.ntp.org project.

    # Please consider joining the pool ( http://www.pool.ntp.org/join.html ).

    server 0.rhel.pool.ntp.org

    server 1.rhel.pool.ntp.org

    server 2.rhel.pool.ntp.org

    ```


    For some installations this is fine, but many data centers have their own NTP
    infrastructure. In that case, the “server” lines pointing to the pool should be
    commented out (placing a hash (“#”) symbol at the start of a line), and lines
    that point to the local NTP servers should be added. Listing 3-5 shows how to
    add your own local NTP server.


    Listing 3-5. Configure Local NTP Server

    ```

    # Use public servers from the pool.ntp.org project.

    # Please consider joining the pool ( http://www.pool.ntp.org/join.html ).

    #server 0.rhel.pool.ntp.org

    #server 1.rhel.pool.ntp.org

    #server 2.rhel.pool.ntp.org

    server 172.30.0.1

    ```


    Once the `/etc/ntp.conf` file is changed, the NTP daemon (`ntpd`) needs to be
    restarted using the `service ntpd restart` command. This will stop the daemon,
    synchronizing the clock to the NTP source, and will then restart the daemon.


    Note


    In Oracle Database Appliance Release 2.2, there is a bug with the NTP being out
    of sync. Refer to Note 1489263.1 for solutions to resolve.


    Once the `ntpd` process has restarted, you can verify the communication with the
    NTP server using the `ntpq -p` command. This command will show all the NTP servers
    the appliance is currently using, as well as the time offset experienced by each
    server (see Listing 3-6).


    Listing 3-6. Output from the ntpdq –p Command

    ```

         remote          refid      st t when poll reach   delay   offset  jitter

    ==============================================================================

     205-196-146-72.  209.51.161.238   2 u   62   64    1   26.872   -2.682   0.001

    name1.glorb.com  128.174.38.133   2 u   61   64    1   17.005   -2.099   0.001

     ntp1.rescomp.be  169.229.128.214  3 u   60   64    1   77.270    3.740   0.001

     LOCAL(0)        .LOCL.          10 l   59   64    1    0.000    0.000   0.001

    ```


    Reviewing Listing 3-6, we see that three external servers and the system clock
    are in use. The system clock offset is approximately –2 to 3 seconds off. The
    NTP daemon (`ntpd`) will now drift the time to get the system clock within one
    hundred to two hundred milliseconds of real time.


    # Grid Infrastructure and Database Installation


    At the end of Chapter 2, you were left with an Oracle Database Appliance that
    was “bare metal” installed. What this means is that you should now have a clean
    Oracle Database Appliance running Oracle Enterprise Linux. At this point, you
    need to install the Oracle Grid Infrastructure and the Oracle Database software
    on an Oracle Database Appliance. How do you do this? Well, since the Oracle Database
    Appliance is an engineered system, you cannot just download and install these
    Oracle products. Oracle provides packages for the installation of these products.


    As you begin to look around for the packages to install the Oracle products, you
    may want to visit My Oracle Support and download the latest End User Bundle for
    the Oracle Database Appliance. The End User Bundle provides an updated version
    of the Grid Infrastructure and Oracle Database for a “factory shipped” or reimaged
    Oracle Database Appliance. Keep in mind, when you begin the download for the End
    User Bundle, it is a fairly large download and may take a bit of time to retrieve
    before you can begin installation.


    Note


    To download the End User Bundle or any other major patches needed for the Oracle
    Database Appliance, you might want to follow the instructions in Note ID 888888.1.


    ## Database Installation


    Once you have the End User Bundle copied over to the Oracle Database Appliance,
    you need to install it on the Appliance by unpacking it. Unpacking consists of
    using the `oakcli unpack` command. Listing 3-7 shows the End User Bundle for release
    2.7 being unzipped in the temp directory.


    Listing 3-7. Using oakcli unpack

    ```

    [root@oak1 tmp]# /opt/oracle/oak/bin/oakcli unpack -package /tmp/p12978712_27000_Linux-x86-64.zip

    Unpacking takes a while,  pls wait....

    ```


    Once the End User Bundle is unzipped into the temporary directory, you need to
    install the Oracle products using a GUI interface. In order to do this, you need
    to start a Virtual Network Computing (VNC) server to interact with the Oracle
    Database Appliance.'
  raw: '### Network Time Protocol (NTP) Configuration


    Before deploying the database, it is very important to verify that the time between
    both nodes is accurate and within a few seconds of each other. The default configuration
    file `(/etc/ntp.conf)` that is deployed with the Oracle Database Appliance is
    actually valid. The appliance is initially configured to use the public RedHat
    NTP pool of servers; for systems access to the Internet, this should keep the
    time in the Oracle Database Appliance in sync. Listing 3-4 provides the server
    portion of the NTP configuration file, which has the Oracle Database Appliance
    pointing to the RedHat NTP pool.


    Listing 3-4. RedHat NTP Pool


    `# Use public servers from the pool.ntp.org project.`


    `# Please consider joining the pool (` [`http://www.pool.ntp.org/join.html`](http://www.pool.ntp.org/join.html)
    `).`


    `server 0.rhel.pool.ntp.org`


    `server 1.rhel.pool.ntp.org`


    `server 2.rhel.pool.ntp.org`


    For some installations this is fine, but many data centers have their own NTP
    infrastructure. In that case, the “server” lines pointing to the pool should be
    commented out (placing a hash (“#”) symbol at the start of a line), and lines
    that point to the local NTP servers should be added. Listing 3-5 shows how to
    add your own local NTP server.


    Listing 3-5. Configure Local NTP Server


    `# Use public servers from the pool.ntp.org project.`


    `# Please consider joining the pool (` [`http://www.pool.ntp.org/join.html`](http://www.pool.ntp.org/join.html)
    `).`


    `#server 0.rhel.pool.ntp.org`


    `#server 1.rhel.pool.ntp.org`


    `#server 2.rhel.pool.ntp.org`


    `server 172.30.0.1`


    Once the `/etc/ntp.conf` file is changed, the NTP daemon (`ntpd`) needs to be
    restarted using the `service ntpd restart` command. This will stop the daemon,
    synchronizing the clock to the NTP source, and will then restart the daemon.


    Note


    In Oracle Database Appliance Release 2.2, there is a bug with the NTP being out
    of sync. Refer to Note 1489263.1 for solutions to resolve.


    Once the `ntpd` process has restarted, you can verify the communication with the
    NTP server using the `ntpq -p` command. This command will show all the NTP servers
    the appliance is currently using, as well as the time offset experienced by each
    server (see Listing 3-6).


    Listing 3-6. Output from the ntpdq –p Command


         `remote          refid      st t when poll reach   delay   offset  jitter`


    `==============================================================================`


     `205-196-146-72\. 209.51.161.238   2 u   62   64    1   26.872   -2.682   0.001`


    [`name1.glorb.com`](http://name1.glorb.com) `128.174.38.133   2 u   61   64    1   17.005   -2.099   0.001`


     `ntp1.rescomp.be 169.229.128.214  3 u   60   64    1   77.270    3.740   0.001`


     `LOCAL(0)        .LOCL.          10 l   59   64    1    0.000    0.000   0.001`


    Reviewing Listing 3-6, we see that three external servers and the system clock
    are in use. The system clock offset is approximately –2 to 3 seconds off. The
    NTP daemon (`ntpd`) will now drift the time to get the system clock within one
    hundred to two hundred milliseconds of real time.


    ### Grid Infrastructure and Database Installation


    At the end of [Chapter 2](#A978-1-4302-6266-4_2_Chapter.html), you were left with
    an Oracle Database Appliance that was “bare metal” installed. What this means
    is that you should now have a clean Oracle Database Appliance running Oracle Enterprise
    Linux. At this point, you need to install the Oracle Grid Infrastructure and the
    Oracle Database software on an Oracle Database Appliance. How do you do this?
    Well, since the Oracle Database Appliance is an engineered system, you cannot
    just download and install these Oracle products. Oracle provides packages for
    the installation of these products.


    As you begin to look around for the packages to install the Oracle products, you
    may want to visit My Oracle Support and download the latest End User Bundle for
    the Oracle Database Appliance. The End User Bundle provides an updated version
    of the Grid Infrastructure and Oracle Database for a “factory shipped” or reimaged
    Oracle Database Appliance. Keep in mind, when you begin the download for the End
    User Bundle, it is a fairly large download and may take a bit of time to retrieve
    before you can begin installation.


    Note


    To download the End User Bundle or any other major patches needed for the Oracle
    Database Appliance, you might want to follow the instructions in Note ID 888888.1.


    ## Database Installation


    Once you have the End User Bundle copied over to the Oracle Database Appliance,
    you need to install it on the Appliance by unpacking it. Unpacking consists of
    using the `oakcli unpack` command. Listing 3-7 shows the End User Bundle for release
    2.7 being unzipped in the temp directory.


    Listing 3-7. Using oakcli unpack


    `[root@oak1 tmp]# /opt/oracle/oak/bin/oakcli unpack -package /tmp/p12978712_27000_Linux-x86-64.zip`


    `Unpacking takes a while,  pls wait....`


    Once the End User Bundle is unzipped into the temporary directory, you need to
    install the Oracle products using a GUI interface. In order to do this, you need
    to start a Virtual Network Computing (VNC) server to interact with the Oracle
    Database Appliance.'
  trans: '

    # 网络时间协议配置


    在部署数据库前，验证两个节点之间的时间是否准确且相差在几秒钟内至关重要。Oracle 数据库一体机随附的默认配置文件 `/etc/ntp.conf` 实际上是有效的。一体机初始配置为使用
    RedHat 公共 NTP 服务器池；对于能访问互联网的系统，这通常能使 Oracle 数据库一体机的时间保持同步。清单 3-4 展示了 NTP 配置文件的服务器部分，其中
    Oracle 数据库一体机指向了 RedHat NTP 池。


    清单 3-4. RedHat NTP 池

    ```

    # 使用 pool.ntp.org 项目的公共服务器。

    # 请考虑加入该池 ( http://www.pool.ntp.org/join.html )。

    server 0.rhel.pool.ntp.org

    server 1.rhel.pool.ntp.org

    server 2.rhel.pool.ntp.org

    ```


    对于某些安装，这样配置就可以了，但许多数据中心拥有自己的 NTP 基础设施。这种情况下，应注释掉（在行首放置井号 "#"）指向池的 "server" 行，并添加指向本地
    NTP 服务器的行。清单 3-5 展示了如何添加您自己的本地 NTP 服务器。


    清单 3-5. 配置本地 NTP 服务器

    ```

    # 使用 pool.ntp.org 项目的公共服务器。

    # 请考虑加入该池 ( http://www.pool.ntp.org/join.html )。

    #server 0.rhel.pool.ntp.org

    #server 1.rhel.pool.ntp.org

    #server 2.rhel.pool.ntp.org

    server 172.30.0.1

    ```


    修改 `/etc/ntp.conf` 文件后，需要使用 `service ntpd restart` 命令重启 NTP 守护进程 (`ntpd`)。这将停止守护进程，将时钟与
    NTP 源同步，然后重新启动守护进程。


    注意


    在 Oracle 数据库一体机 2.2 版本中，存在一个导致 NTP 不同步的错误。请参阅 Note 1489263.1 获取解决方案。


    `ntpd` 进程重启后，您可以使用 `ntpq -p` 命令验证与 NTP 服务器的通信。此命令将显示一体机当前使用的所有 NTP 服务器以及每个服务器经历的时间偏移（参见清单
    3-6）。


    清单 3-6.  ntpdq –p 命令的输出

    ```

         remote          refid      st t when poll reach   delay   offset  jitter

    ==============================================================================

     205-196-146-72.  209.51.161.238   2 u   62   64    1   26.872   -2.682   0.001

    name1.glorb.com  128.174.38.133   2 u   61   64    1   17.005   -2.099   0.001

     ntp1.rescomp.be  169.229.128.214  3 u   60   64    1   77.270    3.740   0.001

     LOCAL(0)        .LOCL.          10 l   59   64    1    0.000    0.000   0.001

    ```


    查看清单 3-6，我们可以看到正在使用三个外部服务器和系统时钟。系统时钟偏移大约为 –2 到 3 秒。NTP 守护进程 (`ntpd`) 现在将漂移时间，以使系统时钟与实际时间的差距保持在一百到二百毫秒之内。


    # Grid Infrastructure 和数据库安装


    在第 2 章结尾，您得到的是一台"裸机"安装的 Oracle 数据库一体机。这意味着您现在应该有一台运行着 Oracle Enterprise Linux
    的干净的 Oracle 数据库一体机。此时，您需要在 Oracle 数据库一体机上安装 Oracle Grid Infrastructure 和 Oracle
    数据库软件。如何操作呢？由于 Oracle 数据库一体机是一个工程化系统，您不能直接下载并安装这些 Oracle 产品。Oracle 提供了用于安装这些产品的软件包。


    当您开始寻找安装 Oracle 产品的软件包时，可能需要访问 My Oracle Support 并下载适用于 Oracle 数据库一体机的最新最终用户捆绑包。最终用户捆绑包为"出厂"或重新镜像的
    Oracle 数据库一体机提供了 Grid Infrastructure 和 Oracle 数据库的更新版本。请注意，当您开始下载最终用户捆绑包时，文件相当大，可能需要一些时间才能获取完毕，然后才能开始安装。


    注意


    要下载最终用户捆绑包或 Oracle 数据库一体机所需的任何其他主要补丁，您可能需要遵循 Note ID 888888.1 中的说明。


    ## 数据库安装


    将最终用户捆绑包复制到 Oracle 数据库一体机后，您需要通过解包将其安装到一体机上。解包包括使用 `oakcli unpack` 命令。清单 3-7 展示了在
    temp 目录中解压缩 2.7 版的最终用户捆绑包。


    清单 3-7. 使用 oakcli unpack

    ```

    [root@oak1 tmp]# /opt/oracle/oak/bin/oakcli unpack -package /tmp/p12978712_27000_Linux-x86-64.zip

    Unpacking takes a while,  pls wait....

    ```


    最终用户捆绑包解压到临时目录后，您需要使用图形用户界面安装 Oracle 产品。为此，您需要启动虚拟网络计算服务器以与 Oracle 数据库一体机交互。

