  trans: '

    ## 虚拟化准备


    `ODA`上的虚拟化在不同版本间发生了巨大变化。最初的虚拟化`ODA`平台仅支持本地虚拟机存储库，且没有任何预定义的虚拟网络设置。虚拟化的发展现已允许访问本地或共享存储库，以及设置`VLAN`的可能性，这是隔离数据库和应用程序所必需的。`ODA`补丁
    2.8 支持共享存储库并提供了简化的`VLAN`设置方法。


    为`ODA`上的虚拟化做准备，需要在部署设备时做出一些决定。由于设备软件的易变性，有时很难在不走回头路的情况下做出设计选择。在部署前需要做出几个决定：


    *   裸金属还是虚拟化？

    *   共享存储库还是本地存储库？

    *   数据库虚拟机或`ODA_Base`需要多少个 CPU？


    关键决定是选择裸金属还是虚拟化。一旦选定其中一种，要逆转这个决定就非常困难，因为这样做需要完全重新安装系统。本地存储库选项允许在`ODA` v1 中分配 250GB，在`ODA`
    X3-2 中分配 350GB 用于模板管理。此选项现已被共享存储库选项所取代，代价是会占用`DATA`和`RECO`磁盘组的空间。共享存储库选项允许虚拟机具有更高的可用性。使用本地存储库时，一个`VM`只会启动在它注册的节点上；而在共享存储库模式下，如果一个节点不可用，`VM`可以故障转移到另一个节点。


    另一个重要的容量考虑是确保数据库`VM`的大小合适。`ODA`的主要关注点是数据库，因此一个虚拟化的`ODA`包含一个特殊的、经过优化的`VM`，称为`ODA_BASE`，它独占访问共享磁盘，这对于确保最佳的数据库性能是必需的。`ODA_BASE`是一个预构建的`OVM`模板，其中包含
    Oracle Clusterware 和数据库所需的所有特定组件。


    设计是虚拟化`ODA`的一个非常重要的方面。图 10-1 展示了设备虚拟化的基本架构。由于`ODA`由两台物理服务器组成，在作为虚拟化练习的一部分部署到`ODA`上时，有两个主要组件需要部署：


    *   `Dom0` 或虚拟化控制器

    *   `ODA_BASE` 或专用于`ODA`的客户`VM`


    Domain 0，或称`Dom0`，是虚拟化控制器，它是一个用于管理虚拟化框的虚拟机监控程序的虚拟操作系统。两个物理节点中各有一个`Dom0`；它被认为是管理`ODA`虚拟化基础设施的部分。`Dom0`被用作基础操作系统，因此不应在其上安装其他任何东西。然而，`Dom0`确实托管虚拟模板存储库，因此所有`VM`模板都从那里导入。


    ![A978-1-4302-6266-4_10_Fig1_HTML.jpg](img/A978-1-4302-6266-4_10_Fig1_HTML.jpg)


    图 10-1. 虚拟化`ODA`的基本架构


    数据库`VM`，也称为`ODA_BASE`，是设备的一个关键方面。`ODA_BASE`是一个特殊设计的`VM`，可以直接访问部分`ODA`硬件。它预先安装并配置了针对`ODA`硬件优化的各种驱动程序，以改善对虚拟机监控程序和共享磁盘的访问。`ODA_BASE`模板包括集群软件二进制文件、数据库软件二进制文件以及创建
    Oracle 数据库所需的自定义数据库模板。


    虚拟化的另一方面是在单独的虚拟化主机中安装应用程序或任何其他组件。这被称为用户`VM`。用户`VM`不是强制性的，一个`ODA`可以被虚拟化并只包含一个`Dom0`和一个`ODA_BASE`。目前，除非使用共享`VM`存储库，否则用户`VM`存在空间限制。共享存储库支持是`ODA`2.8
    中的一个新功能，但在此之前，每台物理机上只有 250GB（`ODA` V1）或 350GB（`ODA` X3-2）的本地磁盘空间可用。此外，在先前版本的`ODA`软件中，用户`VM`不具备故障转移能力。


    ## 虚拟化部署考虑因素


    理解当`ODA`用作虚拟化环境时其部署策略的变化非常重要。部署时需要理解容量和网络变化。除非独立软件供应商（`ISV`）创建了启用虚拟化的自定义设备，否则设备发货时不会预装虚拟化。


    表 10-1 和表 10-2 对比了`ODA` V1 和`ODA` X3-2 在裸金属与虚拟化接口方面的差异。在裸金属环境中，所有网络接口都有物理映射，并且在
    Linux 层进行绑定，为网络接口提供高可用性。严格遵守文档并确保`Eth0`仅用于私有接口至关重要。


    表 10-2. Oracle Database Appliance X3-2 网络设置


    | 类型 | 物理接口 | 链路速度 | 裸金属接口名称 | 虚拟接口名称 | 虚拟桥接 Dom0 |

    | --- | --- | --- | --- | --- | --- |

    | 板载双网接口 | `Eth0` | 10GbE | `Eth0` | `Eth0` | `Priv1` |

    | 板载双网接口 | `Eth1` | 10GbE | `Eth1` | `Eth0` | `Priv1` |

    | 板载四网接口 | `Eth2` 和 `Eth3` | 10GbE | `bond0` | `Eth1` | `Net1` |

    | 板载四网接口 | `Eth4` 和 `Eth5` | 10GbE | `Bond1` | `Eth2` | `Net1` |


    表 10-1. Oracle Database Appliance V1 网络设置


    | 类型 | 物理接口 | 链路速度 | 裸金属接口名称 | 虚拟接口名称 | 虚拟 Dom0 桥接 |

    | --- | --- | --- | --- | --- | --- |

    | 内部双 1GbE | `Eth0` | 1GbE | `Eth0` | `Eth0` | `Priv1` |

    | 内部双 1GbE | `Eth1` | 1GbE | `Eth1` | `Eth0` | `Priv1` |

    | 板载双 1GbE | `Eth2` 和 `Eth3` | 1GbE | `Bond1` | `Eth1` | `Net1` |

    | 板载双端口 | `Eth8` 和 `Eth9` | 10GbE | `xbond0` | `Eth4` | `Net4` |

    | 四端口网络接口 | `Eth4` 和 `Eth5` | 1GbE | `Bond 2` | `Eth2` | `Net2` |

    | 四端口网络接口 | `Eth6` 和 `Eth7` | 1GbE | `Bond3` | `Eth3` | `Net3` |


    理解物理和虚拟连接及其差异至关重要，如表 10-1 和 10-2 所示。部署`ODA`时需要此信息。`IP`需求在裸金属和虚拟化`ODA`之间也略有变化。表
    10-3 显示了裸金属`ODA`和虚拟化`ODA`之间`IP`需求的差异。Domain0 和用户`VM`的增加是`IP`需求差异的重要因素。


    表 10-3. ODA 的 IP 需求


    | IP 类型 | 裸金属 IP 数量 | 默认值 | 虚拟化 IP 数量 | 默认值 |

    | --- | --- | --- | --- | --- |

    | 主机 | 2 | 用户定义 | 2 | 用户定义 |

    | 私有 IP | 4 | 192.168.16.24 192.168.16.25 192.168.17.24 192.168.17.25 | 2 | 192.168.16.27
    192.168.16.28 |

    | Dom 0 | 不适用 | 不适用 | 4 | 两个用户定义: 192.168.16.24 (私有) 192.168.16.25 (私有) |

    | RAC VIP | 2 | 用户定义 | 2 | 用户定义 |

    | SCAN VIP | 2 | 用户定义 | 2 | 用户定义 |

    | ILOM IP | 2 | 用户定义 | 2 | 用户定义 |

    | 用户 VM IP* | 不适用 | 不适用 | 每个 VM 1 个 | 用户定义 |


    *用户 VM IP 取决于 VM 数量；最少 1 个 IP/VM。

    '
- fmt: '### Deployment of the Virtualized ODA


    Deployment of the virtual ODA requires the act of reinstallation of the appliance
    and then deploying the virtualized image on the ODA. [Chapter 2](#A978-1-4302-6266-4_2_Chapter.html)
    goes through the procedure of how to install the bare-metal version of the ODA
    in detail. In order for the ODA to become a virtual configuration, the appropriate
    patch needs to be downloaded from Oracle Support. Currently, `Patch ID 16984856`
    can be downloaded to deploy a virtualized image.


    #### Configuration for Virtual Deployment


    The offline configurator has been enhanced to support building the configuration
    required for deployment of the virtualized ODA. Figure [10-2](#A978-1-4302-6266-4_10_Chapter.html#Fig2)
    is the initial entry to the configurator; due to the hardware configuration changes,
    it allows for various configuration selections.


    ![A978-1-4302-6266-4_10_Fig2_HTML.jpg](A978-1-4302-6266-4_10_Fig2_HTML.jpg)

    **Figure 10-2.** Initial configuration selection screen


    #### Network Interface Mapping


    The network mapping screen is where the virtual interfaces will be accessible;
    this in contrast to the physical interfaces that are available in a bare-metal
    configuration. Figure [10-3](#A978-1-4302-6266-4_10_Chapter.html#Fig3) shows the
    network interface change in a virtual environment in the `ODA X3-2` case. The
    configuration screens are the same for `ODA V1` and `ODA X3-2`, except that `ODA
    V1` allows choosing between a `1Gbei` and a `10GbE` interface. All interfaces
    on the `ODA X3-2` support `10 GbE`.


    ![A978-1-4302-6266-4_10_Fig3_HTML.jpg](A978-1-4302-6266-4_10_Fig3_HTML.jpg)

    **Figure 10-3.** Network configuration screen for `ODA X3-2`


    #### Post-Reimage Configuration


    The configuration file that the configurator generates is used for the deployment
    process, which is started after the reimage completes. The reimage completes with
    the `Dom0` being available and the `Oracle VM Server` installed. Figure [10-4](#A978-1-4302-6266-4_10_Chapter.html#Fig4)
    shows a screen of the `Oracle VM Server` running on `Dom0`.


    ![A978-1-4302-6266-4_10_Fig4_HTML.jpg](A978-1-4302-6266-4_10_Fig4_HTML.jpg)

    **Figure 10-4.** Newly initialized `Oracle VM Server` on ODA


    Once the server reimaging is complete, a screen similar to the one shown in Figure
    [10-4](#A978-1-4302-6266-4_10_Chapter.html#Fig4) is available by using the remote
    access console from the `ILOM`. The offline configurator does not allow for adding
    an IP address to the `Dom0`, thus you need to log in via remote access on the
    `ILOM` and log in as `root` to configure the network, as shown in Listing 10-1.


    #### Configuring the Network for `Dom0`


    **Listing 10-1.** Adding an IP to `Dom0`


    ```

    /opt/oracle/oak/oakcli configure firstnet


    Configure the network for the node(s)(local, global) [global]: <default is global
    for configuring both nodes>


    The network configuration for both nodes:


    Domain Name: [your.company.com](http://your.company.com/)


    DNS Server(s): Primary Dns Server:  <enter your primary DNS server>

    Secondary Dns Server:  <enter your secondary DNS server>

    Tertiary Dns Server:  <enter your tertiary DNS server>


    Node Name       Host Name

    0               host1-dom0 <- enter your 1st hostname

    1               host2-dom0 <- enter your 2nd hostname


    Choose the network interface to configure (net1, net2) [net1]: <default is net1>

    Configure DHCP on net1 (yes/no) [no]:

    You have chosen static configuration on net1


    Enter the IP address for net1 on Node 0: <enter your 1st hostname IP address>

    Enter the IP address for net1 on Node 1: <enter your 2nd hostname IP address>

    Netmask for net1: < enter your netmask >

    Gateway Address for net1 [<Gateway IP>]:  <based on your IP and netmask, the proper
    gateway will displayed>


    Plumbing the IPs now on Node 0 ...

    ::::::::::::::::::::::::::::::::::::::::::::::::::

    Plumbing the IPs now on Node 1 ...

    ::::::::::::::::::::::::::::::::::::::::::::::::::

    dom0.xml                                         100% 860 0.8KB/s 00:00

    ```


    The public IP addresses for `dom0` on both physical servers are now configured.
    This allows access to the `dom0` via any SSH client. At this stage, the ODA only
    has the `dom0` accessible; this is the platform that is needed for `ODA_BASE`,
    which is the special ODA Database VM template required to run the Oracle Database
    Cluster.'
  raw: '### Deployment of the Virtualized ODA


    Deployment of the virtual ODA requires the act of reinstallation of the appliance
    and then deploying the virtualized image on the ODA. [Chapter 2](#A978-1-4302-6266-4_2_Chapter.html)
    goes through the procedure of how to install the bare-metal version of the ODA
    in detail. In order for the ODA to become a virtual configuration, the appropriate
    patch needs to be downloaded from Oracle Support. Currently, Patch ID 16984856
    can be downloaded to deploy a virtualized image.


    The offline configurator has been enhanced to support building the configuration
    required for deployment of the virtualized ODA. Figure [10-2](#A978-1-4302-6266-4_10_Chapter.html#Fig2)
    is the initial entry to the configurator; due to the hardware configuration changes,
    it allows for various configuration selections.


    ![A978-1-4302-6266-4_10_Fig2_HTML.jpg](A978-1-4302-6266-4_10_Fig2_HTML.jpg)


    Figure 10-2.


    Initial configuration selection screen


    The network mapping screen is where the virtual interfaces will be accessible;
    this in contrast to the physical interfaces that are available in a bare-metal
    configuration. Figure [10-3](#A978-1-4302-6266-4_10_Chapter.html#Fig3) shows the
    network interface change in a virtual environment in the ODA X3-2 case. The configuration
    screens are the same for ODA V1 and ODA X3-2, except that ODA V1 allows choosing
    between a 1Gbei and a 10GbE interface. All interfaces on the ODA X3-2 support
    10 GbE.


    ![A978-1-4302-6266-4_10_Fig3_HTML.jpg](A978-1-4302-6266-4_10_Fig3_HTML.jpg)


    Figure 10-3.


    Network configuration screen for ODA X3-2


    The configuration file that the configurator generates is used for the deployment
    process, which is started after the reimage completes. The reimage completes with
    the Dom0 being available and the Oracle VM Server installed. Figure [10-4](#A978-1-4302-6266-4_10_Chapter.html#Fig4)
    shows a screen of the Oracle VM Server running on Dom0.


    ![A978-1-4302-6266-4_10_Fig4_HTML.jpg](A978-1-4302-6266-4_10_Fig4_HTML.jpg)


    Figure 10-4.


    Newly initialized Oracle VM Server on ODA


    Once the server reimaging is complete, a screen similar to the one shown in Figure
    [10-4](#A978-1-4302-6266-4_10_Chapter.html#Fig4) is available by using the remote
    access console from the ILOM. The offline configurator does not allow for adding
    an IP address to the Dom0, thus you need to log in via remote access on the ILOM
    and log in as root to configure the network, as shown in Listing 10-1.


    Listing 10-1. Adding an IP to Dom0


    `/opt/oracle/oak/oakcli configure firstnet`


    `Configure the network for the node(s)(local, global) [global]: <default is global
    for configuring both nodes>`


    `The network configuration for both nodes:`


    `Domain Name:` [`your.company.com`](http://your.company.com/)


    `DNS Server(s): Primary Dns Server:  <enter your primary DNS server>`


    `Secondary Dns Server:  <enter your secondary DNS server>`


    `Tertiary Dns Server:  <enter your tertiary DNS server>`


    `Node Name       Host Name`


    `0               host1-dom0 <- enter your 1st hostname`


    `1               host2-dom0 <- enter your 2nd hostname`


    `Choose the network interface to configure (net1, net2) [net1]: <default is net1>`


    `Configure DHCP on net1 (yes/no) [no]:`


    `You have chosen static configuration on net1`


    `Enter the IP address for net1 on Node 0: <enter your 1st hostname IP address>`


    `Enter the IP address for net1 on Node 1: <enter your 2nd hostname IP address>`


    `Netmask for net1: < enter your netmask >`


    `Gateway Address for net1 [<Gateway IP>]:  <based on your IP and netmask, the
    proper gateway will displayed>`


    `Plumbing the IPs now on Node 0 ...`


    `::::::::::::::::::::::::::::::::::::::::::::::::::`


    `Plumbing the IPs now on Node 1 ...`


    `::::::::::::::::::::::::::::::::::::::::::::::::::`


    `dom0.xml                                         100% 860 0.8KB/s 00:00`


    The public IP addresses for dom0 on both physical servers are now configured.
    This allows access to the dom0 via any SSH client. At this stage, the ODA only
    has the dom0 accessible; this is the platform that is needed for ODA_BASE, which
    is the special ODA Database VM template required to run the Oracle Database Cluster.'
  trans: '

    ### 虚拟化 ODA 的部署


    部署虚拟化 ODA 需要重新安装设备，然后在 ODA 上部署虚拟化镜像。第 2 章详细介绍了如何安装 ODA 裸机版的流程。为了使 ODA 成为虚拟化配置，需要从
    Oracle 支持站点下载相应的补丁。目前，可以下载 `Patch ID 16984856` 来部署虚拟化镜像。


    #### 虚拟部署的配置


    离线配置器已经增强，以支持构建部署虚拟化 ODA 所需的配置。图 10-2 是进入配置器的初始界面；由于硬件配置的变更，它允许进行各种配置选择。


    ![A978-1-4302-6266-4_10_Fig2_HTML.jpg](img/A978-1-4302-6266-4_10_Fig2_HTML.jpg)

    **图 10-2.** 初始配置选择屏幕


    #### 网络接口映射


    网络映射屏幕是虚拟接口将可访问的地方；这与裸机配置中可用的物理接口形成对比。图 10-3 展示了在 `ODA X3-2` 示例中虚拟环境下的网络接口变化。`ODA
    V1` 和 `ODA X3-2` 的配置屏幕是相同的，区别在于 `ODA V1` 允许在 `1Gbei` 和 `10GbE` 接口之间选择。`ODA X3-2`
    上的所有接口都支持 `10 GbE`。


    ![A978-1-4302-6266-4_10_Fig3_HTML.jpg](img/A978-1-4302-6266-4_10_Fig3_HTML.jpg)

    **图 10-3.** `ODA X3-2` 的网络配置屏幕


    #### 重镜像后配置


    配置器生成的配置文件用于部署过程，该过程在重镜像完成后启动。重镜像完成的标志是 `Dom0` 可用且 `Oracle VM Server` 已安装。图 10-4
    显示了在 `Dom0` 上运行的 `Oracle VM Server` 的一个屏幕。


    ![A978-1-4302-6266-4_10_Fig4_HTML.jpg](img/A978-1-4302-6266-4_10_Fig4_HTML.jpg)

    **图 10-4.** ODA 上新初始化的 `Oracle VM Server`


    服务器重镜像完成后，可以使用 `ILOM` 的远程访问控制台，访问到类似于图 10-4 所示的屏幕。离线配置器不允许向 `Dom0` 添加 IP 地址，因此您需要通过
    `ILOM` 的远程访问登录，并以 `root` 身份登录来配置网络，如清单 10-1 所示。


    #### 为 `Dom0` 配置网络


    **清单 10-1.** 向 `Dom0` 添加 IP


    ```

    /opt/oracle/oak/oakcli configure firstnet


    Configure the network for the node(s)(local, global) [global]: <default is global
    for configuring both nodes>


    The network configuration for both nodes:


    Domain Name: [your.company.com](http://your.company.com/)


    DNS Server(s): Primary Dns Server:  <enter your primary DNS server>

    Secondary Dns Server:  <enter your secondary DNS server>

    Tertiary Dns Server:  <enter your tertiary DNS server>


    Node Name       Host Name

    0               host1-dom0 <- enter your 1st hostname

    1               host2-dom0 <- enter your 2nd hostname


    Choose the network interface to configure (net1, net2) [net1]: <default is net1>

    Configure DHCP on net1 (yes/no) [no]:

    You have chosen static configuration on net1


    Enter the IP address for net1 on Node 0: <enter your 1st hostname IP address>

    Enter the IP address for net1 on Node 1: <enter your 2nd hostname IP address>

    Netmask for net1: < enter your netmask >

    Gateway Address for net1 [<Gateway IP>]:  <based on your IP and netmask, the proper
    gateway will displayed>


    Plumbing the IPs now on Node 0 ...

    ::::::::::::::::::::::::::::::::::::::::::::::::::

    Plumbing the IPs now on Node 1 ...

    ::::::::::::::::::::::::::::::::::::::::::::::::::

    dom0.xml                                         100% 860 0.8KB/s 00:00

    ```


    现在，两台物理服务器上的 `dom0` 的公共 IP 地址已经配置完成。这使得可以通过任何 SSH 客户端访问 `dom0`。在此阶段，ODA 仅 `dom0`
    可访问；这是运行 Oracle 数据库集群所必需的特殊 ODA 数据库虚拟机模板 `ODA_BASE` 所需的平台。

    '
- fmt: '### Deployment of ODA_BASE


    In order to deploy `ODA_BASE`, the template needs to be downloaded from My Oracle
    Support via patch `16985062`. For version `2.8`, the patch number can change;
    it is always recommended to use My Oracle Support note `888888.1`. The files can
    be downloaded and then moved to the Dom0 that resides on Node 0 in `/OVS`. This
    allows the preparation of the template for deployment, as demonstrated in Listing
    10-2.


    Listing 10-2. Deployment of ODA_BASE on ODA X3-2


    ```

    #cat oda_base_2.8.gz00 oda_base_2.8.gz01 > oda_base_2.8.tar.gz


    # /opt/oracle/oak/bin/oakcli deploy oda_base


    Enter the template location: /OVS/oda_base_2.8.tar.gz


    Core Licensing Options:

    1. 2 CPU Cores

    2. 4 CPU Cores

    3. 6 CPU Cores

    4. 8 CPU Cores

    5. 10 CPU Cores

    6. 12 CPU Cores

    7. 14 CPU Cores

    8. 16 CPU Cores

    Selection[1 .. 8](default 16 CPU Cores) : 16

    ODA base domain memory in GB(min 8, max 244)[default xxx]   : 244

    INFO: Using default memory size i.e. 244 GB

    Additional vlan networks to be assigned to oda_base ? (y/n) [n]: n

    INFO: Deployment in non-local mode

    INFO: Verifying active cores on local node

    INFO: Verified active cores on local node

    INFO: Verifying active cores on remote node

    INFO: Verified active cores on remote node

    INFO: Running the command to copy the template /OVS/oda_base_2.8.tar.gz to remote
    node 1

    oda_base_2.8.tar.gz          100% 4524MB  56.6MB/s   01:20

    INFO: Spawned the process 24025 in the deployment node 0

    INFO: Spawned the process 24026 in the node 1

    templateBuild-2013-11-06-22-18/swap.img

    templateBuild-2013-11-06-22-18/swap.img

    templateBuild-2013-11-06-22-18/System.img

    templateBuild-2013-11-06-22-18/System.img

    templateBuild-2013-11-06-22-18/u01.img

    templateBuild-2013-11-06-22-18/u01.img

    Using config file "/OVS/Repositories/odabaseRepo/VirtualMachines/oakDom1/vm.cfg".

    Started domain oakDom1 (id=40)

    INFO: Deployment in local mode

    INFO: Extracted the image files on node 0

    INFO: The VM Configuration data is written to /OVS/Repositories/odabaseRepo/VirtualMachines/oakDom1/vm.cfg
    file

    INFO: Running /sbin/losetup /dev/loop0 /OVS/Repositories/odabaseRepo/VirtualMachines/oakDom1/System.img
    command to mount the image file

    INFO: Mount is successfully completed on /dev/loop0

    INFO: Making change to the /OVS/Repositories/odabaseRepo/VirtualMachines/oakDom1/tmpmnt/boot/grub/grub.conf
    file

    INFO: Assigning IP to the first node...

    INFO: Created oda base pool

    INFO: Starting ODA Base...

    INFO: Storing the odabase configuration information

    Using config file "/OVS/Repositories/odabaseRepo/VirtualMachines/oakDom1/vm.cfg".

    Started domain oakDom1 (id=1)

    INFO: Deployment in local mode

    INFO: Extracted the image files on node 1

    INFO: The VM Configuration data is written to /OVS/Repositories/odabaseRepo/VirtualMachines/oakDom1/vm.cfg
    file

    INFO: Running /sbin/losetup /dev/loop0 /OVS/Repositories/odabaseRepo/VirtualMachines/oakDom1/System.img
    command to mount the image file

    INFO: Mount is successfully completed on /dev/loop0

    INFO: Making change to the /OVS/Repositories/odabaseRepo/VirtualMachines/oakDom1/tmpmnt/boot/grub/grub.conf
    file

    INFO: Assigning IP to the second node...

    INFO: Created oda base pool

    INFO: Starting ODA Base...

    INFO: Storing the odabase configuration information

    #

    ```


    At the end of the process, you will have a VM that can run the Oracle Database.
    This is the called `ODA_BASE`, and you can check the status of the VM by using
    the commands in Listing 10-3. The VM in the listing was created utilizing the
    maximum amount of resources.


    Listing 10-3. Listing the Status of the VM on ODA X3-2


    ```

    # xm list

    Name                                               ID     Mem  VCPUs      State   Time(s)

    Domain-0                                             0    2039     32     r-----  119019.9

    oakDom1                                              1  251904     32     -b----   2815.8


    # /opt/oracle/oak/bin/oakcli show oda_base

    ODA base domain

    ODA base CPU cores      :32

    ODA base domain memory  :244

    ODA base template       :/OVS/oda_base_2.8.tar.gz

    ODA base vlans          :[''priv1'', ''net1'', ''net2'']

    ODA base current status :Running

    ```


    At this point in the process, we have deployed the `ODA_BASE` VM, and a small
    number of steps remain to actually get a database up and running. The `ODA_BASE`
    template can only be accessed via a vncserver through the `dom0`. The first VM
    can be accessed via port `5900` using VNC. This can be done via `dom0` or via
    an external VNC client. The only difference in the deployment is the access to
    the VM. The rest of the deployment process is similar to a bare-metal deployment.


    ```

    #vncsession dom0:5900

    ```


    The VNC session now established allows access to `ODA_BASE` host. Once access
    is established, log in to the host and execute the deployment command with the
    file that was created with the offline configuration tool.


    ```

    # /opt/oracle/oak/bin/oakcli deploy -conf /tmp/offlineconfig.param

    ```


    The deployment process will complete the process of making the `ODA_BASE` accessible
    via the public network, as well as complete the install of the Clusterware and
    the Database Appliance Kit software.


    ### Deployment of a User VM


    The purpose of virtualizing the ODA is to allow using the resources on the appliance
    to build a complete environment. This can be accomplished by building various
    Application/User virtual machines on the appliance and making it one box that
    can host the database, as well as an app, on the same hardware.


    Due to the nature of customization in the VM layer to accommodate the Database
    appliance, a VM can only be imported into the ODA using `dom0`. A variety of general-purpose
    VM templates are available at [`http://edelivery.oracle.com`](http://edelivery.oracle.com/).
    This section will walk through the importing and configuring of the User VM template
    onto the ODA.'
