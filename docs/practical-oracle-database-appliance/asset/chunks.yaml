- fmt: '# 1. Oracle Database Appliance


    Abstract


    The `Oracle Database Appliance (ODA)` is a newer member of Oracle’s Engineered
    Systems family of products. It is meant as an entry-level appliance to provide
    a pain-free, `Oracle Database` implementation experience. An `ODA` implementation
    saves time and money by providing an easier path to deploying a highly available
    database solution using a combination of the `Oracle Database` Enterprise edition
    and `Oracle Unbreakable Linux (OEL)` clustered across two nodes.


    The `Oracle Database Appliance (ODA)` is a newer member of Oracle’s Engineered
    Systems family of products. It is meant as an entry-level appliance to provide
    a pain-free, `Oracle Database` implementation experience. An `ODA` implementation
    saves time and money by providing an easier path to deploying a highly available
    database solution using a combination of the `Oracle Database` Enterprise edition
    and `Oracle Unbreakable Linux (OEL)` clustered across two nodes.


    ## Why an Appliance?


    Traditional hardware deployments can take anywhere from weeks to months to implement,
    depending on the procurement and the deployment model that a company employs.
    Upgrades to `Oracle database` versions can also be a challenge because each hardware/software
    combination needs certification at various levels to ensure a smooth upgrade.


    The evolution of the `Oracle Database` is very important to understand as we look
    at the engineered systems. `Oracle` has incorporated a variety of enhancements
    as it evolved the `Oracle Database` product. Through its evolution, the complexity
    of the software has increased. From a very simplistic relational database management
    system (`RDBMS`) in `Oracle V4` to the reintroduction of `Oracle Real Application
    Clusters`, which was released as part of `V9`, `Oracle` has revolutionized the
    `RDBMS` and clusterware spectrum.


    The database administrator (`DBA`) role has evolved as a result of the enhancements
    to the `Oracle Database` product line. Roles and responsibilities have increased,
    and coordination with multiple infrastructure groups that have a disparate goal
    has also increased. As `Oracle` introduced versions `10` and `11` of the database,
    the life of a `DBA` became more complicated, particularly with the addition of
    `Automatic Storage Management (ASM)` and `Grid Infrastructure (GI)`. The `DBA`
    is now in charge of volume management and for ensuring that all aspects of the
    infrastructure meet the requirements of the `Oracle` stack.


    Complexity has its own perils, and problem resolution time is greatly increased
    as the number of components increase. Virtualization of hardware and platform
    can also make things worse if all aspects of infrastructure are not fully evaluated
    properly. The infrastructure and software costs to ensure complete compliance
    can be very expensive for an organization, and innocently updating firmware in
    one piece of the infrastructure can cause turmoil in other aspects of the infrastructure
    or software.


    The human element is very important as we talk about the advances in infrastructure
    and software. `DBAs` have seen their responsibilities increase with each release
    of the `Oracle database` stack. They are now expected to understand all aspects
    of the `RDBMS`, infrastructure, `OS`, and network to deliver a comprehensive and
    defect-free solution to the customer. Delivery of such a solution requires extensive
    coordination with various infrastructure groups, and may require costly upgrades
    or purchases.


    The `ODA` is an entry-level appliance meant to help with infrastructure and software
    deployment, as well as upgrades. It comes as a complete, boxed solution meant
    for small- and medium-sized businesses, as well as enterprises, for rapid deployment
    of hardware and software. The `ODA` was introduced at `Oracle OpenWorld 2011`,
    with a second version, the `X3-2`, shipping in April of `2013`. The `ODA` is the
    first appliance to support pay-as-you go licensing. It provides customers the
    ability to start with as few as `2` cores and move up to `32` cores (`X3-2`),
    as needed. Management costs and build costs are significantly reduced because
    the `ODA` comes preconfigured with interconnect and storage, as well as a tuned
    `OS`. The `ODA` also includes the option to virtualize the appliance, which can
    result in significant savings to the organization by providing a complete boxed
    solution for virtualizing applications and the database.


    Businesses and enterprises often struggle with deadlines, and by using a traditional
    model of deployment, which includes procurement as part of the project budget,
    it is often very hard to provide the agility that is required for a business to
    bring ideas to fruition quickly. A typical deployment cycle can range from `30`
    to `90` days, which can make a product that requires a database harder to get
    to market. Figure [1-1](#A978-1-4302-6266-4_1_Chapter.html#Fig1) shows a typical
    deployment cycle in a traditional system vs. that with an `ODA`, based on deployment
    experience with `Oracle Real Application Clusters (RAC)`. This may vary by the
    deployment maturity model of an organization.


    ![A978-1-4302-6266-4_1_Fig1_HTML.jpg](A978-1-4302-6266-4_1_Fig1_HTML.jpg)

    Figure 1-1. Traditional server vs. ODA with RAC


    The disparity between a traditional setup and the setup of an `ODA` is huge. It
    may differ based upon the practices and processes implemented by an organization.
    Traditionally, the process to deploy hardware includes the following steps:


    Procurement of hardware

    Delivery of hardware

    Setup of hardware

    Network connectivity and switch setup

    `OS` setup and tuning

    Database software setup

    Best practices post setup


    These steps are just some of the many required to get a system up and running,
    and may differ based on the infrastructure model an organization uses. Organizations
    have always had the ability to pre-buy and pre-provision infrastructure, as well
    as build a shared model to support the business. This can be cost effective in
    some cases, but can also be problematic because continuous understanding of new
    business requirements is a must. Business requirements drive the complexity of
    the infrastructure according to the availability model. Requirements can drive
    the need to prepare an environment that can support various business initiatives
    and provide an on-demand framework that allows faster provisioning. The `ODA`
    can be used as an enabler for a private cloud-based framework or a simple provisioning
    model.


    The `ODA`’s unique licensing model, as well as the ability to provide virtualization
    out of the box, can help organizations build a scalable model for deploying applications
    and databases at a fraction of the time and cost. The `ODA` comes as a complete
    package, which makes `Oracle` responsible for all components. This allows the
    organization to focus on the business rather than the technology, and frees up
    the `DBA`’s time to focus on design rather than setup and coordination. A traditional
    `ODA` deployment exercise consists of the following:


    Procure hardware

    Install hardware

    Set up the database appliance

    Implement organizational best practices


    The steps needed to implement an `ODA` are significantly less than a traditional
    setup because `Oracle` bundles hardware and software as one unit and allows for
    management and maintenance of the stack as one, which is not how traditional infrastructure
    is managed.


    ## The Appliance Hardware


    `ODA` is marketed using the tagline “Simple, Reliable, Affordable.” Currently,
    it is available in two hardware configurations: the original and the `ODA X3-2`.
    Billed as part of `Oracle`’s strategy for “Hardware, Software, Complete,” the
    `ODA` brings forward a simple cluster that includes two database server nodes,
    storage, as well as cluster interconnect and simplified management built into
    the appliance itself.'
