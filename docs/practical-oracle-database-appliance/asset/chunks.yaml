  trans: '# 实用甲骨文数据库一体机

    **索引**


    ## A

    应用层：ACFS 虚拟 IP、虚拟机。

    自动存储管理（ASM）：ASMCA、ASM 磁盘组（GUI 环境、命令行）。

    自动存储管理集群文件系统（ACFS）。

    自动存储管理配置助理（ASMCA）：GUI 环境中的 ASM 磁盘组。

    自动服务请求（ASR）。


    ## B

    业务优势、业务挑战、成本和价值主张。

    数据库基础设施部署、高可用性、ODA 补丁、Oracle 硬件、RAC 集群。

    安全检查、安全扫描、自包含一体机单元、STIG 脚本。

    技术解决方案：诊断、`oakcli`、`ODAchk`、ODA 管理、ODA 性能、软件实用程序和工具、虚拟化。

    X3-2 ODA 型号。


    ## C

    集群就绪服务（CRS）。

    EE 数据库 RAC One、实时应用集群（RAC）。

    关键补丁更新（CPU）。


    ## D

    数据库管理员（DBA）。

    数据库配置：参见 `oakcli` 命令。

    数据库配置助理（`DBCA`）：自动维护任务、创建选项、数据库凭据设置、数据库删除、数据库标识、数据库模板、文件位置、初始化参数和环境大小调整、调用、监控操作、恢复信息、配置屏幕选项、启动屏幕。

    数据库安装：`oakcli unpack` 命令。

    Oracle 一体机管理器（参见 Oracle 一体机管理器）。

    VNC 配置与连接、ZFS 阵列。

    数据库即服务（DBaaS）。

    默认未固定池。

    诊断：主动（参见 主动诊断）、被动（参见 被动诊断）。

    直接 NFS 客户端。


    ## E, F

    电子商务套件（eBS），ODA 架构：ACFS 实时应用集群、可用性配置、ACFS 层文件、部署流程、本地文件系统、独特环境、虚拟 IP、虚拟机。

    CPU 容量。

    最终配置：ASM 和 RAC 迁移、AutoConfig 管理、数据库 Oracle 主目录、负载均衡配置、临时配置、恢复虚拟机应用层、硬件认证、安装（应用层、数据库层）、内存、安装后备份和监控配置、存储容量。

    企业管理器配置助理（EMCA）：命令行参数、命令模式、环境设置和检查、执行、帮助选项、`job_queue_process`、RAC 数据库。

    Exadata。


    ## G

    千兆以太网（GbE）。


    ## H

    混合列式压缩（HCC）。


    ## I, J, K, L

    基础设施即服务（IaaS）。

    安装：数据库（参见 数据库安装）、ODA（参见 甲骨文数据库一体机（ODA））。

    集成式远程控制管理（ILOM）：定义、集成 Shell、本地账户管理、日志记录、ODA（参见 甲骨文数据库一体机（ODA））、ODA X3-2、Sun Fire
    X4170 M3、远程 KVMS、截图、安全管理、服务处理器、SNMP 状态部分、系统日志设置、系统信息。

    英特尔至强处理器。


    ## M

    监控：数据库控制取消配置、重新配置、数据库控制配置、EMCA（参见 企业管理器配置助理（EMCA））、参数文件、数据库控制、控制启动选项、状态、停止。

    Oracle 企业管理器代理安装详细信息、主机状态屏幕、添加主机目标、添加插件目标、目标复查屏幕、目标设置。


    ## N

    网络：部署流程、附加网络、外部布线、硬件型号和部署类型、ILOM、IP 地址、内部布线、IP 要求、KVM、一体机、MOS 说明、网络安全注意事项、NFS
    存储、ODA 到达、ODA 网络布线、ODA 所有者指南、可选网络验证步骤、公共网络和 ILOM 网络、剩余网络配置、RMAN 调整步骤、存储单元网络更改。

    ODA 部署的网络型号、ODA V1 所有者指南、X3-2 型号、虚拟化注意事项。

    网络时间协议（NTP）配置。


    ## O

    `oakcli` 命令：ASM（参见 自动存储管理（ASM））、数据库删除、DBCA（参见 数据库配置助理（DBCA））、执行选项、RAC One：`bcrac1tst`
    数据库配置、CRS 输出、数据库类别选择、`RACONE` 数据库选项、用户密码警告信息、实时应用集群、`ASMSNMP` 用户密码配置、CRS 输出、数据库类别选择、数据库创建、数据库部署、用户密码、单实例数据库配置、CRS
    状态、节点选择。

    ODA：参见 甲骨文数据库一体机（ODA）。

    ODA_BASE。

    ODA V1 型号。

    Oracle 一体机组件（OAK）。

    Oracle 一体机管理器：完成屏幕、配置类型、数据库信息屏幕、部署流程、部署类型、网络信息屏幕、Oracle 安装向导、重新部署、摘要屏幕、系统信息、模板、欢迎屏幕。

    甲骨文数据库一体机（ODA）：裸金属流程、CDROM ISO 镜像、安装后流程、电源循环、系统重启、数据库管理员、数据库安装、部署、CPU 池、dom0 初始配置、选择屏幕、网络映射屏幕、ODA_BASE、ODA
    X3-2、Oracle VM 服务器、打补丁流程、用户虚拟机创建、VIR、虚拟配置、VLAN、eBS（参见 电子商务套件（eBS），ODA）、演进、`firstnet`、网格基础设施、ILOM、网络基础设施和软件部署、安装、虚拟化准备、虚拟化部署、网络配置、网络信息、NTP
    配置文件、原始型号、OVM、电源线、RAC 网络、RJ-45 串口转换器、通过串口连接设置、浏览器 IP 配置、ODA V1 和 ODA X3-2 服务器电源控制、PuTTY
    连接、RJ-45 串口转换器、SER MGT 端口、静态 IP 地址、简单配置模型、独特许可模型、V1 设计、磁盘配置选项、GbE 接口、ILOM、英特尔至强处理器、OAK、服务器节点设置海报、规格、SSD、UEK、虚拟化与传统服务器、X3-2
    4U 可上架机架单元、磁盘配置、串行连接 SCSI 磁盘、服务器节点设置海报、规格、存储机架、存储架。

    Oracle 企业管理器云控制 12c：云控制控制台、默认主页选项、添加主机、代理部署、主机名和平台、安装详细信息、创建新的命名凭据、添加目标、Oracle
    管理代理、Oracle 管理库、Oracle 管理服务、插件、`root.sh` 脚本、最终提醒警告信息、目标发现、集群详细信息、配置确认屏幕、连接测试、数据库搜索、`DBSNMP`
    账户、引导流程向导、主机名、Oracle 数据库及相关目标、Oracle 集成式远程控制管理（ILOM）、Oracle 管理库（OMR）、Oracle 管理服务（OMS）、Oracle
    虚拟机（OVM）、Oracle VM 服务器（OVS）。


    ## P, Q

    打补丁：传统系统、组件、人为错误、远程控制适配器版本、多个补丁阶段、数据库升级、定义、ODA 优势、ODA 打补丁选项、Data Guard 配置、默认选项、延迟
    RDBMS 更新、停机时间间隔、新一体机、虚拟机（VM）、ODA 打补丁步骤、补丁流程路径执行、网格基础设施、日志文件、系统基础设施准备、`oakcli`
    命令、OAK 存储库、补丁说明、目标版本、`unpack` 命令、`wget` 命令、时机、停机阶段、PSU、SPU、升级数据库。

    补丁集更新（PSU）。

    安装后任务：备份和监控、ASR、NFS 挂载文件系统配置、业务功能集成系统、推荐补丁、调优。

    主动诊断：自动服务请求、电子邮件消息、日志文件、My Oracle Support、`oakcli test asr`、ODA 箱配置、审计工具检查执行、集群摘要、生成的调查结果报告、`ODAchk`
    文件、`odachk` 实用程序、选项和功能、杂项工具、`logrotate.conf`、Logrotate.d、Httpd、logwatch、RAID、RAID
    检查脚本、跟踪文件分析器、默认设置、目录、功能、修改、诊断事件触发器、`tfactl` 命令、`tfactl` 诊断收集、验证：磁盘校准、网络组件、`oakcli
    validate`、ODA V1、ODA X3-2、操作系统磁盘存储、共享存储、系统组件。


    ## R

    被动诊断：诊断收集、磁盘故障。

    实时应用集群（RAC）网络。


    ## S

    安全补丁更新（SPU）。

    安全技术实施指南（STIG）。

    固态驱动器（SSD）。


    ## T

    总拥有成本（TCO）。


    ## U

    不可破企业内核（UEK）。


    ## V, W

    虚拟镜像存储库。

    虚拟化：参见 甲骨文数据库一体机（ODA）。

    虚拟局域网。

    虚拟机（VM）。

    虚拟网络计算（VNC）：`vncserver` 命令。


    ## X, Y, Z

    X3-2 ODA 型号。'
