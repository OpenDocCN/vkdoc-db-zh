    You’re ready to finalize the apps tier configuration when the testing of the database
    startup and shutdown process is completed. At this moment, the e-Business Suite
    configuration on the application tier server is unaware of the changes in the
    database tier; that is, Net services and JDBC configuration is still set for a
    single-node database and needs to be adjusted for the RAC database.


    As expected, AutoConfig is capable of adjusting the configuration and the process
    is well explained in the “4.7\. Establish Applications Environment for Oracle
    RAC” section of My Oracle Support note “Using Oracle 11g Release 2 Real Application
    Clusters and Automatic storage management with Oracle E-Business Suite Release
    12.2 (Doc ID 1453213.1).” Here’s a quick summary of the steps:


    Adjust the tnsnames.ora and the JDBC URL in the context file manually to allow
    connectivity to one of the database instances of the RAC-enabled database.   Run
    AutoConfig on the applications server to retrieve the configuration information
    from the database, and then write the necessary changes to the configuration files.
      Update the JDBC URL from in the Weblogic Server data source.


    This concludes the database migration to ASM and RAC. You’ve made it through the
    most complicated part—implementing e-Business Suite on ODA. At this moment, you
    have a fully functional system with two nodes in the database tier and one node
    in the application tier. The next section of this chapter will show you how to
    clone the application tier VM and implement the second application tier node using
    the shared application tier file system.'
