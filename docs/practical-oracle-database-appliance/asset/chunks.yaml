    INFO: IP_ADDRESS HOST_NAME SERIAL_NUMBER ASR      PROTOCOL SOURCE PRODUCT_NAME

    INFO: ---------- --------- ------------- ------- -------- ------ ------------------------

    INFO: x.x.x.x    oda1-ilom 9243FMW000    Enabled SNMP     ILOM   SUN FIRE X4370
    M2 SERVER

