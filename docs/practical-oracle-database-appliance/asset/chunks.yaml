- fmt: '### VNC Configuration and Connection


    VNC is a graphical desktop-sharing technology that allows you to use an X11 desktop
    and execute programs locally on the server, while only the screen output is sent
    to the VNC client on your PC or MAC. Before you can install the End User Bundle,
    you need to configure the VNC server with an initial password. To set the initial
    VNC password, run the `vncserver` command and set your password. The command will
    also give you your VNC session number. Listing 3-8 provides an example of what
    you should see when setting the password for the VNC server.


    Listing 3-8. Setting the VNC Server Password and Port


    ```

    [root@oak1 tmp]# vncserver

    You will require a password to access your desktops.

    Password:

    Verify:

    xauth:  creating new authority file /root/.Xauthority

    xauth: (stdin):1:  bad display name "oak1:1" in "add" command

    New ''oak1:1 (root)'' desktop is oak1:1

    Creating default startup script /root/.vnc/xstartup

    Starting applications specified in /root/.vnc/xstartup

    Log file is /root/.vnc/oak1:1.log

    ```


    Once the password is set and the session number identified, you can connect to
    the system using the VNC client. For the remote host, you use the IP address and
    the session identified when starting the VNC server. Figure [3-4](#A978-1-4302-6266-4_3_Chapter.html#Fig4)
    illustrates connecting to the Oracle Database Appliance using a VNC client.


    ![A978-1-4302-6266-4_3_Fig4_HTML.jpg](A978-1-4302-6266-4_3_Fig4_HTML.jpg)

    Figure 3-4. VNC client connecting to the Oracle Database Appliance


    If you are using the correct session ID with the IP address, you should now be
    prompted for a password. Enter the password you provided when you configured the
    VNC server (see Figure [3-5](#A978-1-4302-6266-4_3_Chapter.html#Fig5)).


    ![A978-1-4302-6266-4_3_Fig5_HTML.jpg](A978-1-4302-6266-4_3_Fig5_HTML.jpg)

    Figure 3-5. Password prompt from VNC server on client


    If your password was accepted, you should now see an X11 desktop. In the command
    window that is present, you can start the deployment of the Oracle Database Appliance.
    To start the deployment, the `oakcli deploy` command must be used. This will start
    the Oracle Appliance Manager (OAM). Once the Oracle Appliance Manager starts,
    you will be able to configure the Oracle Grid Infrastructure plus Automatic Storage
    Management (ASM) storage and the Oracle Database. Listing 3-9 shows you how to
    start the deployment process with `oakcli deploy`.


    Listing 3-9. Deployment with oakcli


    ```

    [root@oak1 ∼]# /opt/oracle/oak/bin/oakcli deploy

    Log messages in /tmp/oak_1378687999949.log

    Running Oracle Appliance Manager

    ```


    Now that you have kicked off the deployment on the Oracle Database Appliance,
    you need to become familiar with the Oracle Appliance Manager. In the next section,
    you will take a look at the Oracle Appliance Manager and the options that should
    be chosen for a base configuration.


    ### Oracle Appliance Manager and Deployment


    By running the `oakcli deploy` command, you initiate the GUI installation wizard
    for the Oracle Appliance Manager. The Oracle Appliance Manager is much like other
    Oracle installation wizards. It will walk you through the various steps needed
    for configuration of your Oracle Database Appliance. Figure [3-6](#A978-1-4302-6266-4_3_Chapter.html#Fig6)
    shows the Oracle Appliance Manager welcome screen.


    ![A978-1-4302-6266-4_3_Fig6_HTML.jpg](A978-1-4302-6266-4_3_Fig6_HTML.jpg)

    Figure 3-6. Oracle Appliance Manager welcome screen


    Just like many other Oracle wizards, Oracle provides a menu (on the left-hand
    side) to help you navigate the wizard as you click the Next button to progress
    through the wizard. In the next screen in the wizard, you can select the type
    of deployment you would like to perform on the Oracle Database Appliance. In Figure
    [3-7](#A978-1-4302-6266-4_3_Chapter.html#Fig7), the options are presented for
    you to choose from. Table [3-7](#A978-1-4302-6266-4_3_Chapter.html#Tab7) provides
    a quick description of what these options are. After you made your selection for
    the deployment, you can progress through the wizard by clicking the Next button.


    Table 3-7. Descriptions of Deployment Types


    | Deployment | Description |

    | --- | --- |

    | Typical | The default setting for all Oracle Database Appliances |

    | Custom | Allows you to override default setting; that is, disk mirror settings
    ASM |

    | SAP Application | Used only for appliances that will be running SAP |


    ![A978-1-4302-6266-4_3_Fig7_HTML.jpg](A978-1-4302-6266-4_3_Fig7_HTML.jpg)

    Figure 3-7. Configuration type


    In the next step on the wizard, you need to set the System Information for the
    Oracle Database Appliance. Figure [3-8](#A978-1-4302-6266-4_3_Chapter.html#Fig8)
    illustrates what the wizard should look like. You need to select or input the
    desired information.


    ![A978-1-4302-6266-4_3_Fig8_HTML.jpg](A978-1-4302-6266-4_3_Fig8_HTML.jpg)

    Figure 3-8. System information for the Oracle Database Appliance


    In the System Information step, there are a few things to keep in mind. First,
    the system name is used for the deployment and each node in the Oracle Database
    Appliance, and will automatically have a one or two appended to the system name
    as hostname on each node. Once the deployment is complete, hostnames of the nodes
    should look something like `ejb1` or `ejb2`.


    The next system information needed is the region that the Oracle Database Appliance
    resides in. This is a drop-down list where you select the region of the world
    where the Oracle Database Appliance runs. In Figure [3-8](#A978-1-4302-6266-4_3_Chapter.html#Fig8),
    the region selected is America.


    Next is the time zone drop-down menu, which provides a list to select the time
    zone where the Oracle Database Appliance resides. Figure [3-8](#A978-1-4302-6266-4_3_Chapter.html#Fig8)
    shows the Pacific time zone selected (`America/Los_Angeles`).


    The Database Deployment drop-down menu provides a list of options for deploying
    a database on the Oracle Database Appliance. You can select either to deploy a
    Real Application Cluster (RAC), Real Application Cluster (RAC) One Node, or an
    Enterprise Edition database. In Figure [3-8](#A978-1-4302-6266-4_3_Chapter.html#Fig8),
    the option Real Application Cluster (RAC) is chosen.


    The final piece of information needed for the System Information is the root password.
    By default, the root password is set to `welcome1`. After you provide a root password
    for the deployment, the password will be changed on both nodes in the Oracle Database
    Appliance. At this point, if you are happy with all the items provided on the
    System Information screen, you can click Next to continue progressing through
    the wizard.'
