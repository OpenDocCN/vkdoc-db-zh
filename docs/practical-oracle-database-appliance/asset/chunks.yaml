  raw: '#### System Component Checks


    System components checks are key to ensuring a healthy ODA. As database administrators,
    we tend to ignore looking at the health of the hardware itself. OAK provides validations
    to the system components in a manner that is easy for people who are not very
    proficient in understanding hardware-related metrics.


    Since the system components on ODA V1 and X3-2 are different, the validation will
    provide different results on both appliances. The checks comprise the following
    entities:


    *   Software inventory

    *   System information

    *   BIOS information

    *   Controller information

    *   System ILOM and BMC firmware version

    *   Power supply and cooling unit status

    *   Processor and memory status

    *   OS disk status

    *   Expander and shared disk status (ODA V1 only)

    *   Temperature of various components


    Listing 7-3 displays the output that is expected from running a system components
    check on the ODA V1\. This output will differ depending on the version of OAK
    software that is running. This means the output in Listing 7-3 is provided as
    an example.


