- fmt: '# Oracle Management Agents


    An Oracle Management agent (usually referred to as simply an agent or abbreviated
    to `OMA`) is generally installed on each host that is monitored in your computing
    environment. (`EM12c` also introduces the capability to manage environments remotely
    in some cases.) These agents are deployed from the console (see Figure 12-2),
    and then monitor all the targets that have been discovered by the agents. They
    are used to control blackouts on those targets, execute jobs, collect metrics,
    and so forth, and in turn provide details such as availability, metrics, and job
    statuses back to the `Oracle Management Service`.


    ![A978-1-4302-6266-4_12_Fig2_HTML.jpg](A978-1-4302-6266-4_12_Fig2_HTML.jpg)

    *Figure 12-2. User interface for managing agents within `EM12c`*


    For the `EM12c` release, agents were completely rewritten from the ground up for
    greater reliability, availability, and performance (see the upcoming section on
    plug-ins for details on how this was achieved). The only downside of this change
    is that you must use an `EM12c` agent to talk to the `EM12c Oracle Management
    Service`. Backward compatibility between `12c` and earlier agents was lost because
    of the number of changes that were made in the new release.


    # Oracle Management Service


    The `Oracle Management Service` (`OMS`) is a web-based application that communicates
    with the agents and the `Oracle Management Repository` to collect and store information
    about all the targets on the various agents. (Note that the information itself
    is stored in the `Oracle Management Repository`, not the `OMS`.) The `OMS` is
    also responsible for rendering the user interface for the console.


    The `OMS` is installed into an `Oracle middleware home`, which also contains the
    `Oracle WebLogic Server` (including the `WebLogic Server` administration console),
    an `Oracle Management agent` for the middleware tier, the management service instance
    base directory, the `Java Development Kit` (`JDK`), and other configuration files.
    You can install the `OMS` into an existing `WebLogic Server` (`WLS`) configuration
    if it exists, but usually it is better from an availability perspective to have
    it installed in a dedicated `WLS` home.


    # Oracle Management Repository


    The `Oracle Management Repository` (also called the repository or `OMR`) is an
    `Oracle database` that stores all the information collected by the various management
    agents. It is composed of database users, tablespaces, tables, views, indexes,
    packages, procedures, and database jobs.


    Unlike the `OMS`, the installation process for the `OMR` requires that a database
    already exists for the repository. This means you need to have created the database
    somewhere in your environment prior to installing the `OMS`. Again, it is typically
    recommended for the repository to be created in a dedicated database.


    # Plug-ins


    Plug-ins take on a whole new meaning in `EM12c`. In earlier releases, plug-ins
    were largely system-monitoring utilities used to monitor and manage non-Oracle
    (heterogeneous) software, including databases and middleware. Partners or Oracle
    Corporation itself usually built them. Some technically savvy customers built
    their own as well, but there weren’t many plug-ins overall.


    In the `EM12c` release, a few of these monitoring plug-ins remain, but plug-ins
    have been greatly expanded to include every target type being managed. As such,
    there is now an `Oracle database plug-in` to manage `Oracle databases`, a `Fusion
    Middleware plug-in` to manage Oracle’s middleware, a `Fusion Application plug-in`
    to manage Oracle’s applications, and so on. Because new releases of the Oracle
    software will include plug-ins used to manage that software, this means `EM12c`
    (and later releases) will be able to monitor and manage those releases much more
    quickly than has been the case in the past. Plug-ins can be downloaded, applied,
    and deployed using the new `Self Update` functionality available from the `Cloud
    Control` console (if you have sufficient privileges to use it).


    In addition, this modular plug-in architecture means that an agent is no longer
    configured to be able to monitor any target type. Now, an agent will download
    only the plug-ins that are needed for the targets that the agent is monitoring.
    This means the agents themselves are smaller than they were in previous releases.
    This change is one of the biggest improvements in the architecture of the `EM12c`
    release.


    So that’s the basic architecture you need to understand. Now let’s look how `EM12c`
    can be used to manage an `ODA` environment. The first thing you need to do for
    this, of course, is install an agent.


    # Agent Installation


    Agent installation on an `ODA` machine is not all that different to agent installation
    on any other machine. First you need to add the hosts, and then discover the targets
    that are available on the hosts. In this example, I will walk you through the
    installation of agent software on a two-node `ODA` from `Enterprise Manager Cloud
    Control 12c`.


    ## Adding the Hosts


    To add the hosts, start `Enterprise Manager Cloud Control 12c` and select **Setup
    ➤ Add Targets ➤ Add Targets Manually**. Do this as shown in Figure 12-3.


    ![A978-1-4302-6266-4_12_Fig3_HTML.jpg](A978-1-4302-6266-4_12_Fig3_HTML.jpg)

    *Figure 12-3. Choosing to manually add a target*


    On the **Add Targets Manually** page, select **Add Host Targets** if not already
    selected, and then click the **Add Host** button, as shown in Figure 12-4.


    ![A978-1-4302-6266-4_12_Fig4_HTML.jpg](A978-1-4302-6266-4_12_Fig4_HTML.jpg)

    *Figure 12-4. Starting the Add Host Targets Manually wizard*


    On the **Add Host Targets : Host and Platform** screen, click the **Add** button,
    as shown in Figure 12-5.


    ![A978-1-4302-6266-4_12_Fig5_HTML.jpg](A978-1-4302-6266-4_12_Fig5_HTML.jpg)

    *Figure 12-5. Step 1 of the Add Host Targets Manually wizard, adding hosts*


    Select the hosts from the search window, select the platform, and set platform
    to “Same for all hosts” and click **Next**, as you can see in Figure 12-6.


    ![A978-1-4302-6266-4_12_Fig6_HTML.jpg](A978-1-4302-6266-4_12_Fig6_HTML.jpg)

    *Figure 12-6. Step 2 of the Add Host Targets Manually wizard, selecting host names
    and platforms*


    Enter the appropriate values for **Installation Base Directory** and **Instance
    Directory** (or accept the defaults), as shown in Figure 12-7.


    ![A978-1-4302-6266-4_12_Fig7_HTML.jpg](A978-1-4302-6266-4_12_Fig7_HTML.jpg)

    *Figure 12-7. Step 3 of the Add Host Targets Manually wizard, selecting installation
    details*


    If a named credential already exists for these hosts, select that named credential
    or click the “+” sign (as shown in Figure 12-7) to create a new one. Enter the
    username and password for the owner of the agent software. If that username has
    `sudo` privilege, set the run privilege appropriately or leave it at **None**
    if it doesn’t, as you can see in Figure 12-8. Click **OK**.


    ![A978-1-4302-6266-4_12_Fig8_HTML.jpg](A978-1-4302-6266-4_12_Fig8_HTML.jpg)

    *Figure 12-8. Creating a New Named Credential*


    When you are returned to the **Add Host Targets: Installation Details** page,
    click **Next** to move to the **Review** page, as shown in Figure 12-9. Review
    the information that you have provided. If it is correct, click **Deploy Agent**.


    ![A978-1-4302-6266-4_12_Fig9_HTML.jpg](A978-1-4302-6266-4_12_Fig9_HTML.jpg)

    *Figure 12-9. Step 4 of the Add Host Targets Manually wizard, reviewing the details
    and deploying the agent*


    The agent installation will now start. The screen should auto-refresh for you
    until the installation either completes or hits a problem.'
