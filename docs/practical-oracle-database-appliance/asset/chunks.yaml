    and so forth, and in turn provide details such as availability, metrics, and job
    statuses back to the Oracle Management Service.


    ![A978-1-4302-6266-4_12_Fig2_HTML.jpg](A978-1-4302-6266-4_12_Fig2_HTML.jpg)


    Figure 12-2.


    User interface for managing agents within EM12c


    For the EM12c release, agents were completely rewritten from the ground up for
    greater reliability, availability, and performance (see the upcoming section on
    plug-ins for details on how this was achieved). The only downside of this change
    is that you must use an EM12c agent to talk to the EM12c Oracle Management Service.
    Backward compatibility between 12c and earlier agents was lost because of the
    number of changes that were made in the new release.


    ### Oracle Management Service


    The Oracle Management Service (OMS) is a web-based application that communicates
    with the agents and the Oracle Management Repository to collect and store information
    about all the targets on the various agents. (Note that the information itself
    is stored in the Oracle Management Repository, not the OMS.) The OMS is also responsible
    for rendering the user interface for the console.


    The OMS is installed into an Oracle middleware home, which also contains the Oracle
    WebLogic Server (including the WebLogic Server administration console), an Oracle
    Management agent for the middleware tier, the management service instance base
    directory, the Java Development Kit (JDK), and other configuration files. You
    can install the OMS into an existing WebLogic Server (WLS) configuration if it
    exists, but usually it is better from an availability perspective to have it installed
    in a dedicated WLS home.


    ### Oracle Management Repository


    The Oracle Management Repository (also called the repository or OMR) is an Oracle
    database that stores all the information collected by the various management agents.
    It is composed of database users, tablespaces, tables, views, indexes, packages,
    procedures, and database jobs.


    Unlike the OMS, the installation process for the OMR requires that a database
    already exists for the repository. This means you need to have created the database
    somewhere in your environment prior to installing the OMS. Again, it is typically
    recommended for the repository to be created in a dedicated database.


    ### Plug-ins


    Plug-ins take on a whole new meaning in EM12c. In earlier releases, plug-ins were
    largely system-monitoring utilities used to monitor and manage non-Oracle (heterogeneous)
    software, including databases and middleware. Partners or Oracle Corporation itself
    usually built them. Some technically savvy customers built their own as well,
    but there weren’t many plug-ins overall.


    In the EM12c release, a few of these monitoring plug-ins remain, but plug-ins
    have been greatly expanded to include every target type being managed. As such,
    there is now an Oracle database plug-in to manage Oracle databases, a Fusion Middleware
    plug-in to manage Oracle’s middleware, a Fusion Application plug-in to manage
    Oracle’s applications, and so on. Because new releases of the Oracle software
    will include plug-ins used to manage that software, this means EM12c (and later
    releases) will be able to monitor and manage those releases much more quickly
    than has been the case in the past. Plug-ins can be downloaded, applied, and deployed
    using the new Self Update functionality available from the Cloud Control console
    (if you have sufficient privileges to use it).


    In addition, this modular plug-in architecture means that an agent is no longer
    configured to be able to monitor any target type. Now, an agent will download
    only the plug-ins that are needed for the targets that the agent is monitoring.
    This means the agents themselves are smaller than they were in previous releases.
    This change is one of the biggest improvements in the architecture of the EM12c
    release.


    So that’s the basic architecture you need to understand. Now let’s look at how
    EM12c can be used to manage an ODA environment. The first thing you need to do
    for this, of course, is install an agent.


    ## Agent Installation


    Agent installation on an ODA machine is not all that different to agent installation
    on any other machine. First you need to add the hosts, and then discover the targets
    that are available on the hosts. In this example, I will walk you through the
    installation of agent software on a two-node ODA from Enterprise Manager Cloud
    Control 12c.


    ### Adding the Hosts


    To add the hosts, start Enterprise Manager Cloud Control 12c and select Setup
    ➤ Add Targets ➤ Add Targets Manually. Do this as shown in Figure [12-3](#A978-1-4302-6266-4_12_Chapter.html#Fig3).


    ![A978-1-4302-6266-4_12_Fig3_HTML.jpg](A978-1-4302-6266-4_12_Fig3_HTML.jpg)


    Figure 12-3.


    Choosing to manually add a target


    On the Add Targets Manually page, select Add Host Targets if not already selected,
    and then click the Add Host button, as shown in Figure [12-4](#A978-1-4302-6266-4_12_Chapter.html#Fig4).


    ![A978-1-4302-6266-4_12_Fig4_HTML.jpg](A978-1-4302-6266-4_12_Fig4_HTML.jpg)


    Figure 12-4.


    Starting the Add Host Targets Manually wizard


    On the Add Host Targets : Host and Platform screen, click the Add button, as shown
    in Figure [12-5](#A978-1-4302-6266-4_12_Chapter.html#Fig5).


    ![A978-1-4302-6266-4_12_Fig5_HTML.jpg](A978-1-4302-6266-4_12_Fig5_HTML.jpg)


    Figure 12-5.


    Step 1 of the Add Host Targets Manually wizard, adding hosts


    Select the hosts from the search window, select the platform, and set platform
    to “Same for all hosts” and click Next, as you can see in Figure [12-6](#A978-1-4302-6266-4_12_Chapter.html#Fig6).


    ![A978-1-4302-6266-4_12_Fig6_HTML.jpg](A978-1-4302-6266-4_12_Fig6_HTML.jpg)


    Figure 12-6.


    Step 2 of the Add Host Targets Manually wizard, selecting host names and platforms


    Enter the appropriate values for Installation Base Directory and Instance Directory
    (or accept the defaults), as shown in Figure [12-7](#A978-1-4302-6266-4_12_Chapter.html#Fig7).


    ![A978-1-4302-6266-4_12_Fig7_HTML.jpg](A978-1-4302-6266-4_12_Fig7_HTML.jpg)


    Figure 12-7.


    Step 3 of the Add Host Targets Manually wizard, selecting installation details


    If a named credential already exists for these hosts, select that named credential
    or click the “+” sign (as shown in Figure [12-7](#A978-1-4302-6266-4_12_Chapter.html#Fig7))
    to create a new one. Enter the username and password for the owner of the agent
    software. If that username has sudo privilege, set the run privilege appropriately
    or leave it at None if it doesn’t, as you can see in Figure [12-8](#A978-1-4302-6266-4_12_Chapter.html#Fig8).
    Click OK.


    ![A978-1-4302-6266-4_12_Fig8_HTML.jpg](A978-1-4302-6266-4_12_Fig8_HTML.jpg)


    Figure 12-8.


    Creating a New Named Credential


    When you are returned to the Add Host Targets: Installation Details page, click
    Next to move to the Review page, as shown in Figure [12-9](#A978-1-4302-6266-4_12_Chapter.html#Fig9).
    Review the information that you have provided. If it is correct, click Deploy
    Agent.


    ![A978-1-4302-6266-4_12_Fig9_HTML.jpg](A978-1-4302-6266-4_12_Fig9_HTML.jpg)


    Figure 12-9.


    Step 4 of the Add Host Targets Manually wizard, reviewing the details and deploying
    the agent


    The agent installation will now start. The screen should auto-refresh for you
    until the installation either completes or hits a problem.'
  trans: '

    # Oracle Management Agents


    一个 Oracle Management Agent（通常简称为 agent 或缩写为 `OMA`）通常安装在您计算环境中被监控的每台主机上。（`EM12c`
    还引入了在某些情况下远程管理环境的能力。）这些代理从控制台（参见图 12-2）部署，然后监控所有由代理发现的目标。它们用于控制这些目标的禁用期、执行作业、收集指标等，进而将可用性、指标和作业状态等详细信息反馈给
    `Oracle Management Service`。


    ![A978-1-4302-6266-4_12_Fig2_HTML.jpg](img/A978-1-4302-6266-4_12_Fig2_HTML.jpg)

    *图 12-2. 在 `EM12c` 中管理代理的用户界面*


    对于 `EM12c` 版本，代理被完全重写，以实现更高的可靠性、可用性和性能（有关如何实现的详细信息，请参阅后面关于插件的章节）。这一改变的唯一缺点是，您必须使用
    `EM12c` 代理来与 `EM12c Oracle Management Service` 通信。由于新版本中进行了大量更改，`12c` 与早期代理之间的向后兼容性丧失了。


    # Oracle Management Service


    `Oracle Management Service` (`OMS`) 是一个基于 Web 的应用程序，它与代理和 `Oracle Management Repository`
    通信，以收集和存储有关各个代理上所有目标的信息。（请注意，信息本身存储在 `Oracle Management Repository` 中，而不是 `OMS`
    中。）`OMS` 还负责呈现控制台的用户界面。


    `OMS` 被安装到一个 `Oracle middleware home` 中，该目录还包含 `Oracle WebLogic Server`（包括 `WebLogic
    Server` 管理控制台）、用于中间层的 `Oracle Management agent`、管理服务实例基目录、`Java Development Kit`
    (`JDK`) 以及其他配置文件。如果存在现有的 `WebLogic Server` (`WLS`) 配置，您可以将 `OMS` 安装到其中，但通常从可用性角度考虑，最好将其安装在专用的
    `WLS` 主目录中。


    # Oracle Management Repository


    `Oracle Management Repository`（也称为存储库或 `OMR`）是一个 `Oracle database`，用于存储由各个管理代理收集的所有信息。它由数据库用户、表空间、表、视图、索引、包、过程和数据库作业组成。


    与 `OMS` 不同，`OMR` 的安装过程要求数据库已为存储库存在。这意味着您需要在安装 `OMS` 之前，在环境中的某处创建数据库。同样，通常建议在专用数据库中创建存储库。


    # Plug-ins


    在 `EM12c` 中，插件具有了全新的含义。在早期版本中，插件主要是用于监控和管理非 Oracle（异构）软件（包括数据库和中间件）的系统监控实用程序。通常由合作伙伴或
    Oracle 公司本身构建。一些技术娴熟的客户也构建了自己的插件，但总体数量不多。


    在 `EM12c` 版本中，保留了一些此类监控插件，但插件已大大扩展，涵盖了被管理的每种目标类型。因此，现在有用于管理 `Oracle databases`
    的 `Oracle database plug-in`，用于管理 Oracle 中间件的 `Fusion Middleware plug-in`，用于管理
    Oracle 应用程序的 `Fusion Application plug-in`，等等。由于 Oracle 软件的新版本将包含用于管理该软件的插件，这意味着
    `EM12c`（及更高版本）将能够比过去更快地监控和管理这些版本。插件可以使用从 `Cloud Control` 控制台提供的新 `Self Update`
    功能（如果您拥有使用它的足够权限）来下载、应用和部署。


    此外，这种模块化插件架构意味着代理不再被配置为能够监控任何目标类型。现在，代理只会下载其监控目标所需的插件。这意味着代理本身比之前版本中的要小。这一变化是
    `EM12c` 版本架构中最大的改进之一。


    以上就是您需要理解的基本架构。现在让我们看看如何使用 `EM12c` 来管理 `ODA` 环境。当然，为此您需要做的第一件事就是安装一个代理。


    # Agent Installation


    在 `ODA` 机器上安装代理与在其他任何机器上安装代理并没有太大不同。首先，您需要添加主机，然后发现主机上可用的目标。在此示例中，我将引导您在从 `Enterprise
    Manager Cloud Control 12c` 中的双节点 `ODA` 上安装代理软件。


    ## Adding the Hosts


    要添加主机，请启动 `Enterprise Manager Cloud Control 12c` 并选择 **设置 ➤ 添加目标 ➤ 手动添加目标**。如图
    12-3 所示进行操作。


    ![A978-1-4302-6266-4_12_Fig3_HTML.jpg](img/A978-1-4302-6266-4_12_Fig3_HTML.jpg)

    *图 12-3. 选择手动添加目标*


    在 **手动添加目标** 页面上，如果尚未选中，请选择 **添加主机目标**，然后单击 **添加主机** 按钮，如图 12-4 所示。


    ![A978-1-4302-6266-4_12_Fig4_HTML.jpg](img/A978-1-4302-6266-4_12_Fig4_HTML.jpg)

    *图 12-4. 启动手动添加主机目标向导*


    在 **添加主机目标：主机和平台** 屏幕上，单击 **添加** 按钮，如图 12-5 所示。


    ![A978-1-4302-6266-4_12_Fig5_HTML.jpg](img/A978-1-4302-6266-4_12_Fig5_HTML.jpg)

    *图 12-5. 手动添加主机目标向导的步骤 1，添加主机*


    从搜索窗口中选择主机，选择平台，并将平台设置为“所有主机相同”，然后单击 **下一步**，如图 12-6 所示。


    ![A978-1-4302-6266-4_12_Fig6_HTML.jpg](img/A978-1-4302-6266-4_12_Fig6_HTML.jpg)

    *图 12-6. 手动添加主机目标向导的步骤 2，选择主机名和平台*


    为 **安装基目录** 和 **实例目录** 输入适当的值（或接受默认值），如图 12-7 所示。


    ![A978-1-4302-6266-4_12_Fig7_HTML.jpg](img/A978-1-4302-6266-4_12_Fig7_HTML.jpg)

    *图 12-7. 手动添加主机目标向导的步骤 3，选择安装详细信息*


    如果这些主机已存在命名凭据，请选择该命名凭据，或单击“+”号（如图 12-7 所示）以创建新的命名凭据。输入代理软件所有者的用户名和密码。如果该用户名具有
    `sudo` 权限，请相应地设置运行权限，如果没有，则保持 **无**，如图 12-8 所示。单击 **确定**。


    ![A978-1-4302-6266-4_12_Fig8_HTML.jpg](img/A978-1-4302-6266-4_12_Fig8_HTML.jpg)

    *图 12-8. 创建新的命名凭据*


    当您返回到 **添加主机目标：安装详细信息** 页面时，单击 **下一步** 转到 **复查** 页面，如图 12-9 所示。复查您提供的信息。如果正确，请单击
    **部署代理**。


    ![A978-1-4302-6266-4_12_Fig9_HTML.jpg](img/A978-1-4302-6266-4_12_Fig9_HTML.jpg)

    *图 12-9. 手动添加主机目标向导的步骤 4，复查详细信息并部署代理*


    代理安装现在将开始。屏幕应自动刷新，直到安装完成或遇到问题。

    '
- fmt: '## Running the `root.sh` Script


    One problem you might encounter is the user account not being set up to run the
    `sudo` command. Such is the case in Figure [12-10](#A978-1-4302-6266-4_12_Chapter.html#Fig10).
    If you encounter this problem, then you must run the `root.sh` script manually.


    ![A978-1-4302-6266-4_12_Fig10_HTML.jpg](A978-1-4302-6266-4_12_Fig10_HTML.jpg)

    Figure 12-10. Warning to run `root.sh` script manually


    You can proceed from this point, and run the `root.sh` script later. To proceed,
    click on the down arrow next to `Continue` and choose `Continue, All Hosts`, as
    seen in Figure [12-11](#A978-1-4302-6266-4_12_Chapter.html#Fig11).


    ![A978-1-4302-6266-4_12_Fig11_HTML.jpg](A978-1-4302-6266-4_12_Fig11_HTML.jpg)

    Figure 12-11. Continuing after the warning to run `root.sh`


    Finally, Figure [12-12](#A978-1-4302-6266-4_12_Chapter.html#Fig12) shows the installation
    completing with a reminder to run `root.sh` on all nodes.


    ![A978-1-4302-6266-4_12_Fig12_HTML.jpg](A978-1-4302-6266-4_12_Fig12_HTML.jpg)

    Figure 12-12. A final reminder to run `root.sh` on all nodes


    Log onto each host as `root` and run the relevant script. For example:


    ```

    [root@node1 ∼]# /opt/oracle/em/core/12.1.0.3.0/root.sh

    Finished product-specific root actions.

    /etc exist

    Finished product-specific root actions.


    [root@node1 ∼]# ssh node2

    root@node2’s password:

    Last login: Fri Aug 16 10:50:11 2013 from node1


    [root@node2 ∼]# /opt/oracle/em/core/12.1.0.3.0/root.sh

    Finished product-specific root actions.

    /etc exist

    Finished product-specific root actions.

    ```


    As shown in Figure [12-13](#A978-1-4302-6266-4_12_Chapter.html#Fig13), return
    to the installation and click `Done` to complete the `Add Host Targets Manually`
    wizard.


    ![A978-1-4302-6266-4_12_Fig13_HTML.jpg](A978-1-4302-6266-4_12_Fig13_HTML.jpg)

    Figure 12-13. Completing the `Add Host Targets Manually` wizard


    ## Discovering Targets


    Now that the hosts have been added, I want to discover the remaining targets on
    each host. From the same `Add Targets Manually` page, select `Add Targets Using
    Guided Process (Also Adds Related Targets)`, and then select `Oracle Cluster`
    and `High Availability Service` from the drop-down list, as shown in Figure [12-14](#A978-1-4302-6266-4_12_Chapter.html#Fig14).


    ![A978-1-4302-6266-4_12_Fig14_HTML.jpg](A978-1-4302-6266-4_12_Fig14_HTML.jpg)

    Figure 12-14. Starting the `Add Targets Using Guided Process` wizard to add `Oracle
    Cluster` and `High Availability Service`


    Next, click `Add Using Guided Process …` to start the wizard. This will take you
    to the first step in the wizard—`Add Cluster Target: Specify Host`, as seen in
    Figure [12-15](#A978-1-4302-6266-4_12_Chapter.html#Fig15). Either search for the
    first node using the magnifying glass or simply type the host name into the `Host`
    field and click `Continue`.


    ![A978-1-4302-6266-4_12_Fig15_HTML.jpg](A978-1-4302-6266-4_12_Fig15_HTML.jpg)

    Figure 12-15. Step 1 of the `Add Targets Using Guided Process` wizard, specifying
    the host name


    If the cluster is configured correctly, the installation process should automatically
    discover the cluster name and other values, along with populating `Selected Hosts`
    with both host names. If it hasn’t, populate these fields and then click `Add`,
    as seen in Figure [12-16](#A978-1-4302-6266-4_12_Chapter.html#Fig16).


    ![A978-1-4302-6266-4_12_Fig16_HTML.jpg](A978-1-4302-6266-4_12_Fig16_HTML.jpg)

    Figure 12-16. Step 2 of the `Add Targets Using Guided Process` wizard, specifying
    the cluster details


    Figure [12-17](#A978-1-4302-6266-4_12_Chapter.html#Fig17) shows the `Add Target:
    Cluster` screen, which will be seen while the target addition is in progress.


    ![A978-1-4302-6266-4_12_Fig17_HTML.jpg](A978-1-4302-6266-4_12_Fig17_HTML.jpg)

    Figure 12-17. The `Add Target: Cluster` wizard showing the progress toward making
    an addition


    Once the cluster has been added, you will be taken to the screen seen in Figure
    [12-18](#A978-1-4302-6266-4_12_Chapter.html#Fig18), which shows that the cluster
    details have been saved. Click `OK`.


    ![A978-1-4302-6266-4_12_Fig18_HTML.jpg](A978-1-4302-6266-4_12_Fig18_HTML.jpg)

    Figure 12-18. The confirmation screen showing that the `Add Target Using Guided
    Process` wizard completed successfully


    Now we need to add the database, listener, and ASM (if that is being used). Again,
    we can do this via the guided process, but this time select `Oracle Database,
    Listener and Automatic Storage Management` from the target types list, as shown
    in Figure [12-19](#A978-1-4302-6266-4_12_Chapter.html#Fig19).


    ![A978-1-4302-6266-4_12_Fig19_HTML.jpg](A978-1-4302-6266-4_12_Fig19_HTML.jpg)

    Figure 12-19. Starting the `Add Targets Using Guided Process` wizard to add `Oracle
    Database` and related targets


    Now click the `Add Using Guided Process…` button to move to the `Add Database
    Instance Target` page. As shown in Figure [12-20](#A978-1-4302-6266-4_12_Chapter.html#Fig20),
    either search for or simply enter the host name for the host that the database
    runs on, and then click `Continue`.


    ![A978-1-4302-6266-4_12_Fig20_HTML.jpg](A978-1-4302-6266-4_12_Fig20_HTML.jpg)

    Figure 12-20. Step 1 of the `Add Oracle Database` and related targets wizard,
    specifying the host name


    The host is recognized as being part of a cluster, so in Figure [12-21](#A978-1-4302-6266-4_12_Chapter.html#Fig21),
    we choose to look for databases on all hosts in the cluster to add to Enterprise
    Manager, and then click `Continue`.


    ![A978-1-4302-6266-4_12_Fig21_HTML.jpg](A978-1-4302-6266-4_12_Fig21_HTML.jpg)

    Figure 12-21. Step 2 of the `Add Oracle Database` and related targets wizard,
    searching for databases on all nodes of the cluster


    Again, the target discovery process screen appears. Once the targets have been
    discovered, you will be taken to the screen shown in Figure [12-22](#A978-1-4302-6266-4_12_Chapter.html#Fig22).
    Here you will need to configure the monitoring credentials, so click the `Configure`
    button for the first database.


    ![A978-1-4302-6266-4_12_Fig22_HTML.jpg](A978-1-4302-6266-4_12_Fig22_HTML.jpg)

    Figure 12-22. Step 3 of the `Add Oracle Database` and related targets wizard,
    configuring the first discovered database


    As shown in Figure [12-23](#A978-1-4302-6266-4_12_Chapter.html#Fig23), enter the
    password for the `DBSNMP` account and click the `Test Connection` button.


    ![A978-1-4302-6266-4_12_Fig23_HTML.jpg](A978-1-4302-6266-4_12_Fig23_HTML.jpg)

    Figure 12-23. Configuring and testing the `DBSNMP` account


    You should see a “Success” message like that shown in Figure [12-24](#A978-1-4302-6266-4_12_Chapter.html#Fig24),
    so click `Next` (or go back and correct the password if you entered an incorrect
    value).


    ![A978-1-4302-6266-4_12_Fig24_HTML.jpg](A978-1-4302-6266-4_12_Fig24_HTML.jpg)

    Figure 12-24. Screen showing that the connection test was successful


    This will bring up the `Configure Cluster Database: Review` screen, where you
    can simply click `OK`.


    Repeat this process for any other databases that were found as part of the discovery
    process, as well as the listener and ASM. Once all targets have been configured,
    click the `Finish` button. You’ll be brought to a `Summary` page from which you
    should click the `Save` button. Then a progress page will appear before you are
    forwarded to the `Target Configuration Results` page (Figure [12-25](#A978-1-4302-6266-4_12_Chapter.html#Fig25)),
    where you simply click `OK` to finish the process.


    ![A978-1-4302-6266-4_12_Fig25_HTML.jpg](A978-1-4302-6266-4_12_Fig25_HTML.jpg)

    Figure 12-25. `Target Configuration Results` page from the `Add Oracle Database`
    and related targets wizard


    This completes the installation and configuration of the agents on the ODA environment,
    so now I can monitor all these targets as I would any other Oracle database environment.'
  raw: '### Running the root.sh Script


    One problem you might encounter is the user account not being set up to run the
    `sudo` command. Such is the case in Figure [12-10](#A978-1-4302-6266-4_12_Chapter.html#Fig10).
    If you encounter this problem, then you must run the `root.sh` script manually.


    ![A978-1-4302-6266-4_12_Fig10_HTML.jpg](A978-1-4302-6266-4_12_Fig10_HTML.jpg)


    Figure 12-10.


    Warning to run root.sh script manually


    You can proceed from this point, and run the `root.sh` script later. To proceed,
    click on the down arrow next to Continue and choose Continue, All Hosts, as seen
    in Figure [12-11](#A978-1-4302-6266-4_12_Chapter.html#Fig11).


    ![A978-1-4302-6266-4_12_Fig11_HTML.jpg](A978-1-4302-6266-4_12_Fig11_HTML.jpg)


    Figure 12-11.


    Continuing after the warning to run root.sh


    Finally, Figure [12-12](#A978-1-4302-6266-4_12_Chapter.html#Fig12) shows the installation
    completing with a reminder to run `root.sh` on all nodes.


    ![A978-1-4302-6266-4_12_Fig12_HTML.jpg](A978-1-4302-6266-4_12_Fig12_HTML.jpg)


    Figure 12-12.


    A final reminder to run root.sh on all nodes


    Log onto each host as root and run the relevant script. For example:


    `[root@node1 ∼]# /opt/oracle/em/core/12.1.0.3.0/root.sh`


    `Finished product-specific root actions.`


    `/etc exist`


    `Finished product-specific root actions.`


    `[root@node1 ∼]# ssh node2`


    `root@node2’s password:`


    `Last login: Fri Aug 16 10:50:11 2013 from node1`


    `[root@node2 ∼]# /opt/oracle/em/core/12.1.0.3.0/root.sh`


    `Finished product-specific root actions.`


    `/etc exist`


    `Finished product-specific root actions.`


    As shown in Figure [12-13](#A978-1-4302-6266-4_12_Chapter.html#Fig13), return
    to the installation and click Done to complete the Add Host Targets Manually wizard.


    ![A978-1-4302-6266-4_12_Fig13_HTML.jpg](A978-1-4302-6266-4_12_Fig13_HTML.jpg)


    Figure 12-13.


    Completing the Add Host Targets Manually wizard


    ### Discovering Targets


    Now that the hosts have been added, I want to discover the remaining targets on
    each host. From the same Add Targets Manually page, select Add Targets Using Guided
    Process (Also Adds Related Targets), and then select Oracle Cluster and High Availability
    Service from the drop-down list, as shown in Figure [12-14](#A978-1-4302-6266-4_12_Chapter.html#Fig14).


    ![A978-1-4302-6266-4_12_Fig14_HTML.jpg](A978-1-4302-6266-4_12_Fig14_HTML.jpg)


    Figure 12-14.


    Starting the Add Targets Using Guided Process wizard to add Oracle Cluster and
    High Availability Service


    Next, click Add Using Guided Process … to start the wizard. This will take you
    to the first step in the wizard—Add Cluster Target: Specify Host, as seen in Figure
    [12-15](#A978-1-4302-6266-4_12_Chapter.html#Fig15). Either search for the first
    node using the magnifying glass or simply type the host name into the Host field
    and click Continue.


    ![A978-1-4302-6266-4_12_Fig15_HTML.jpg](A978-1-4302-6266-4_12_Fig15_HTML.jpg)


    Figure 12-15.


    Step 1 of the Add Targets Using Guided Process wizard, specifying the host name


    If the cluster is configured correctly, the installation process should automatically
    discover the cluster name and other values, along with populating Selected Hosts
    with both host names. If it hasn’t, populate these fields and then click Add,
    as seen in Figure [12-16](#A978-1-4302-6266-4_12_Chapter.html#Fig16).


    ![A978-1-4302-6266-4_12_Fig16_HTML.jpg](A978-1-4302-6266-4_12_Fig16_HTML.jpg)


    Figure 12-16.


    Step 2 of the Add Targets Using Guided Process wizard, specifying the cluster
    details


    Figure [12-17](#A978-1-4302-6266-4_12_Chapter.html#Fig17) shows the Add Target:
    Cluster screen, which will be seen while the target addition is in progress.


    ![A978-1-4302-6266-4_12_Fig17_HTML.jpg](A978-1-4302-6266-4_12_Fig17_HTML.jpg)


    Figure 12-17.


    The Add Target: Cluster wizard showing the progress toward making an addition


    Once the cluster has been added, you will be taken to the screen seen in Figure
    [12-18](#A978-1-4302-6266-4_12_Chapter.html#Fig18), which shows that the cluster
    details have been saved. Click OK.


    ![A978-1-4302-6266-4_12_Fig18_HTML.jpg](A978-1-4302-6266-4_12_Fig18_HTML.jpg)


    Figure 12-18.


    The confirmation screen showing that the Add Target Using Guided Process wizard
    completed successfully


    Now we need to add the database, listener, and ASM (if that is being used). Again,
    we can do this via the guided process, but this time select Oracle Database, Listener
    and Automatic Storage Management from the target types list, as shown in Figure
    [12-19](#A978-1-4302-6266-4_12_Chapter.html#Fig19).


    ![A978-1-4302-6266-4_12_Fig19_HTML.jpg](A978-1-4302-6266-4_12_Fig19_HTML.jpg)


    Figure 12-19.


    Starting the Add Targets Using Guided Process wizard to add Oracle Database and
    related targets


    Now click the Add Using Guided Process… button to move to the Add Database Instance
    Target page. As shown in Figure [12-20](#A978-1-4302-6266-4_12_Chapter.html#Fig20),
    either search for or simply enter the host name for the host that the database
    runs on, and then click Continue.


    ![A978-1-4302-6266-4_12_Fig20_HTML.jpg](A978-1-4302-6266-4_12_Fig20_HTML.jpg)


    Figure 12-20.


    Step 1 of the Add Oracle Database and related targets wizard, specifying the host
    name


    The host is recognized as being part of a cluster, so in Figure [12-21](#A978-1-4302-6266-4_12_Chapter.html#Fig21),
    we choose to look for databases on all hosts in the cluster to add to Enterprise
    Manager, and then click Continue.


    ![A978-1-4302-6266-4_12_Fig21_HTML.jpg](A978-1-4302-6266-4_12_Fig21_HTML.jpg)


    Figure 12-21.


    Step 2 of the Add Oracle Database and related targets wizard, searching for databases
    on all nodes of the cluster


    Again, the target discovery process screen appears. Once the targets have been
    discovered, you will be taken to the screen shown in Figure [12-22](#A978-1-4302-6266-4_12_Chapter.html#Fig22).
    Here you will need to configure the monitoring credentials, so click the Configure
    button for the first database.


    ![A978-1-4302-6266-4_12_Fig22_HTML.jpg](A978-1-4302-6266-4_12_Fig22_HTML.jpg)


    Figure 12-22.


    Step 3 of the Add Oracle Database and related targets wizard, configuring the
    first discovered database


    As shown in Figure [12-23](#A978-1-4302-6266-4_12_Chapter.html#Fig23), enter the
    password for the DBSNMP account and click the Test Connection button.


    ![A978-1-4302-6266-4_12_Fig23_HTML.jpg](A978-1-4302-6266-4_12_Fig23_HTML.jpg)


    Figure 12-23.


    Configuring and testing the DBSNMP account


    You should see a “Success” message like that shown in Figure [12-24](#A978-1-4302-6266-4_12_Chapter.html#Fig24),
    so click Next (or go back and correct the password if you entered an incorrect
    value).


    ![A978-1-4302-6266-4_12_Fig24_HTML.jpg](A978-1-4302-6266-4_12_Fig24_HTML.jpg)


    Figure 12-24.


    Screen showing that the connection test was successful


    This will bring up the Configure Cluster Database: Review screen, where you can
    simply click OK.


    Repeat this process for any other databases that were found as part of the discovery
    process, as well as the listener and ASM. Once all targets have been configured,
    click the Finish button. You’ll be brought to a Summary page from which you should
    click the Save button. Then a progress page will appear before you are forwarded
    to the Target Configuration Results page (Figure [12-25](#A978-1-4302-6266-4_12_Chapter.html#Fig25)),
    where you simply click OK to finish the process.


    ![A978-1-4302-6266-4_12_Fig25_HTML.jpg](A978-1-4302-6266-4_12_Fig25_HTML.jpg)


    Figure 12-25.


    Target Configuration Results page from the Add Oracle Database and related targets
    wizard


    This completes the installation and configuration of the agents on the ODA environment,
    so now I can monitor all these targets as I would any other Oracle database environment.'
  trans: '

    ## 运行 `root.sh` 脚本


    你可能会遇到的一个问题是，用户账户未设置为可以运行 `sudo` 命令。如图 12-10 所示的情况。如果遇到此问题，那么你必须手动运行 `root.sh`
    脚本。


    ![A978-1-4302-6266-4_12_Fig10_HTML.jpg](img/A978-1-4302-6266-4_12_Fig10_HTML.jpg)

    图 12-10. 提示手动运行 `root.sh` 脚本的警告


    你可以在此处继续，并稍后运行 `root.sh` 脚本。要继续，请点击 `Continue` 旁边的向下箭头，并选择 `Continue, All Hosts`，如图
    12-11 所示。


    ![A978-1-4302-6266-4_12_Fig11_HTML.jpg](img/A978-1-4302-6266-4_12_Fig11_HTML.jpg)

    图 12-11. 在提示运行 `root.sh` 的警告后继续


    最后，图 12-12 显示安装完成，并提醒在所有节点上运行 `root.sh`。


    ![A978-1-4302-6266-4_12_Fig12_HTML.jpg](img/A978-1-4302-6266-4_12_Fig12_HTML.jpg)

    图 12-12. 在所有节点上运行 `root.sh` 的最终提醒


    以 `root` 身份登录到每个主机并运行相关脚本。例如：


    ```

    [root@node1 ∼]# /opt/oracle/em/core/12.1.0.3.0/root.sh

    Finished product-specific root actions.

    /etc exist

    Finished product-specific root actions.


    [root@node1 ∼]# ssh node2

    root@node2’s password:

    Last login: Fri Aug 16 10:50:11 2013 from node1


    [root@node2 ∼]# /opt/oracle/em/core/12.1.0.3.0/root.sh

    Finished product-specific root actions.

    /etc exist

    Finished product-specific root actions.

    ```


    如图 12-13 所示，返回安装界面并点击 `Done` 以完成 `Add Host Targets Manually` 向导。


    ![A978-1-4302-6266-4_12_Fig13_HTML.jpg](img/A978-1-4302-6266-4_12_Fig13_HTML.jpg)

    图 12-13. 完成 `Add Host Targets Manually` 向导


    ## 发现目标


    既然主机已添加完毕，现在我想发现每台主机上剩余的目标。在同一个 `Add Targets Manually` 页面，选择 `Add Targets Using
    Guided Process (Also Adds Related Targets)`，然后从下拉列表中选择 `Oracle Cluster` 和 `High
    Availability Service`，如图 12-14 所示。


    ![A978-1-4302-6266-4_12_Fig14_HTML.jpg](img/A978-1-4302-6266-4_12_Fig14_HTML.jpg)

    图 12-14. 启动 `Add Targets Using Guided Process` 向导以添加 `Oracle Cluster` 和 `High
    Availability Service`


    接下来，点击 `Add Using Guided Process …` 以启动向导。这将带你进入向导的第一步——`Add Cluster Target: Specify
    Host`，如图 12-15 所示。你可以使用放大镜搜索第一个节点，或者直接在 `Host` 字段中键入主机名，然后点击 `Continue`。


    ![A978-1-4302-6266-4_12_Fig15_HTML.jpg](img/A978-1-4302-6266-4_12_Fig15_HTML.jpg)

    图 12-15. `Add Targets Using Guided Process` 向导的第 1 步，指定主机名


    如果集群配置正确，安装过程应自动发现集群名称和其他值，同时用两个主机名填充 `Selected Hosts` 字段。如果未自动填充，请填写这些字段，然后点击
    `Add`，如图 12-16 所示。


    ![A978-1-4302-6266-4_12_Fig16_HTML.jpg](img/A978-1-4302-6266-4_12_Fig16_HTML.jpg)

    图 12-16. `Add Targets Using Guided Process` 向导的第 2 步，指定集群详细信息


    图 12-17 显示了 `Add Target: Cluster` 屏幕，此屏幕将在目标添加过程中显示。


    ![A978-1-4302-6266-4_12_Fig17_HTML.jpg](img/A978-1-4302-6266-4_12_Fig17_HTML.jpg)

    图 12-17. `Add Target: Cluster` 向导，显示添加目标的进度


    集群添加完成后，你将被带到图 12-18 所示的屏幕，该屏幕显示集群详细信息已保存。点击 `OK`。


    ![A978-1-4302-6266-4_12_Fig18_HTML.jpg](img/A978-1-4302-6266-4_12_Fig18_HTML.jpg)

    图 12-18. 确认屏幕，显示 `Add Target Using Guided Process` 向导已成功完成


    现在我们需要添加数据库、监听程序和 ASM（如果使用了的话）。我们同样可以通过引导流程来完成，但这次从目标类型列表中选择 `Oracle Database,
    Listener and Automatic Storage Management`，如图 12-19 所示。


    ![A978-1-4302-6266-4_12_Fig19_HTML.jpg](img/A978-1-4302-6266-4_12_Fig19_HTML.jpg)

    图 12-19. 启动 `Add Targets Using Guided Process` 向导以添加 `Oracle Database` 及相关目标


    现在点击 `Add Using Guided Process…` 按钮，进入 `Add Database Instance Target` 页面。如图 12-20
    所示，搜索或直接输入数据库运行所在主机的主机名，然后点击 `Continue`。


    ![A978-1-4302-6266-4_12_Fig20_HTML.jpg](img/A978-1-4302-6266-4_12_Fig20_HTML.jpg)

    图 12-20. `Add Oracle Database` 及相关目标向导的第 1 步，指定主机名


    该主机被识别为集群的一部分，因此在图 12-21 中，我们选择在集群的所有主机上查找要添加到 Enterprise Manager 的数据库，然后点击 `Continue`。


    ![A978-1-4302-6266-4_12_Fig21_HTML.jpg](img/A978-1-4302-6266-4_12_Fig21_HTML.jpg)

    图 12-21. `Add Oracle Database` 及相关目标向导的第 2 步，在集群的所有节点上搜索数据库


    目标发现过程屏幕再次出现。一旦目标被发现，你将被带到图 12-22 所示的屏幕。在这里，你需要配置监控凭据，因此点击第一个数据库的 `Configure`
    按钮。


    ![A978-1-4302-6266-4_12_Fig22_HTML.jpg](img/A978-1-4302-6266-4_12_Fig22_HTML.jpg)

    图 12-22. `Add Oracle Database` 及相关目标向导的第 3 步，配置第一个发现的数据库


    如图 12-23 所示，输入 `DBSNMP` 帐户的密码，然后点击 `Test Connection` 按钮。


    ![A978-1-4302-6266-4_12_Fig23_HTML.jpg](img/A978-1-4302-6266-4_12_Fig23_HTML.jpg)

    图 12-23. 配置和测试 `DBSNMP` 帐户


    你应该看到如图 12-24 所示的“成功”消息，然后点击 `Next`（或者，如果输入了错误的密码，请返回并更正）。


    ![A978-1-4302-6266-4_12_Fig24_HTML.jpg](img/A978-1-4302-6266-4_12_Fig24_HTML.jpg)

    图 12-24. 显示连接测试成功的屏幕


    这将调出 `Configure Cluster Database: Review` 屏幕，你只需点击 `OK` 即可。


    对发现过程中找到的任何其他数据库，以及监听程序和 ASM，重复此过程。所有目标配置完成后，点击 `Finish` 按钮。你将被带到一个 `Summary`
    页面，从中应点击 `Save` 按钮。然后，在你被转到 `Target Configuration Results` 页面（图 12-25）之前，会出现一个进度页面，你只需点击
    `OK` 即可完成整个过程。


    ![A978-1-4302-6266-4_12_Fig25_HTML.jpg](img/A978-1-4302-6266-4_12_Fig25_HTML.jpg)

    图 12-25. 来自 `Add Oracle Database` 及相关目标向导的 `Target Configuration Results` 页面


    这完成了 OMA 环境上代理的安装和配置，因此现在我可以像监控任何其他 Oracle 数据库环境一样，监控所有这些目标。

