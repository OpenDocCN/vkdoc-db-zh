  trans: '

    ### 特定 ODA 步骤


    图 8-2 展示了 Oracle 数据库设备的补丁步骤。其中涉及三个主要步骤。我们将在本节简要描述它们，并在后续章节中更详细地介绍。根据您的业务需求，这三个主要补丁步骤中的每一个都可以在时间上与其他步骤分开执行。


    ![A978-1-4302-6266-4_8_Fig2_HTML.jpg](img/A978-1-4302-6266-4_8_Fig2_HTML.jpg)


    图 8-2. ODA 的补丁步骤


    首先对磁盘、固件、BIOS 和操作系统等系统基础设施组件进行补丁。`系统基础设施`补丁步骤需要全系统停机。在此补丁期间，所有数据库实例和`Grid Infrastructure`进程都将停止。


    每个季度发布的 Oracle 数据库设备补丁包可能包含针对不同系统基础设施组件的补丁。例如，某个特定版本可能包含存储扩展器、ILOM、BIOS 和 OVM
    的补丁。如前所述，可以跳过某些补丁包。有帮助的是，每个 Oracle 数据库设备补丁包都是累积性的。ODA 客户可以跳过一个或几个补丁包。然而，在这种情况下需要打补丁的系统组件数量可能比您逐个应用补丁包时更多。停机时间可能会根据需要更新的系统组件数量而增加。


    根据我们当前的经验，`系统基础设施`补丁的总停机时间通常在 45 到 80 分钟之间。Oracle 数据库设备的节点可能会作为 OS、OVM 或存储等组件的更新的一部分而重新启动。对于关键系统，必须在测试环境中进行试运行，以测量补丁包的总停机时间，并验证是否需要节点重启。


    系统基础设施更新后，需要对`Grid Infrastructure`进行补丁。在撰写本文时，所有 Oracle 数据库设备补丁包都以滚动方式应用`Grid
    Infrastructure`更新。这意味着在更新期间，两个节点中的一个是可用的，所有数据库服务都在另一个节点上正常运行。不涉及停机时间。


    下一个也是最后一个阶段是数据库升级。有几种处理此任务的选项可供选择。一些组织可能决定每隔一个季度跳过数据库补丁步骤，每六个月对数据库打一次补丁，从而在保持系统基础设施更新的同时节省应用程序测试时间。其他组织可能在应用基础设施补丁的同时对数据库打补丁。一些组织可能将基础设施更新和数据库更新分开进行。这种分离允许人们仅为了基础设施补丁而关闭整个系统，然后以滚动方式启动系统并完成剩余的更新。ODA
    提供了灵活性，允许您根据组织需求选择自己的补丁方法。


    ## 时间安排


    时间安排涉及两个方面。第一个问题是多久打一次补丁。我们已经提到过，一些组织只应用每隔一个补丁包。另一个需要考虑的方面是单个补丁应用需要多长时间。如果要应用补丁，应该了解目标系统将离线多长时间。


    ### 多久打一次补丁


    Oracle 按季度为 Oracle 数据库产品发布补丁集更新(`PSU`)和安全补丁更新(`SPU`)——`SPU`更广为人知的名称是关键补丁更新(`CPU`)。`SPU`是专注于关键问题的一组较小的更改。`PSU`包含`SPU`以及额外的修复。Oracle
    建议选择以下做法之一：


    *   在基础版本之上应用`SPU`，以最小化一个主版本到下一个主版本之间应用更改的量。

    *   定期实施`PSU`，以确保应用所有关键和安全修复。


    Oracle 数据库设备采用`PSU`的补丁周期。Oracle 数据库设备补丁包在`PSU`补丁发布后不久发布。值得一提的是，Oracle 数据库只是 Oracle
    数据库设备补丁包中包含的一个组件。然而，它是主要组件之一。因此，Oracle 为 ODA 采用`PSU`补丁周期非常有意义。


    Oracle 的常规补丁发布简化了您的补丁规划并有助于灵活性。一些客户可能觉得季度补丁过于频繁，选择跳过应用一个或多个 Oracle 数据库设备补丁包。这里的重要点是，定期的补丁发布允许组织在其环境中引入定期的、已知的、有计划的补丁周期。这简化了很多事情，包括安排人力资源进行实施和测试，使补丁成为一项已知的常规工作，而不是由生产系统中的关键问题触发的一次性活动。由此产生的定期应用补丁主动保护数据库系统免受潜在危险问题和不必要停机的影响。生产环境的稳定性得到提高。


    ### 补丁需要多长时间


    表 8-1 让您大致了解每个补丁步骤所涉及的时间。该表还指明了给定步骤是否需要全系统停机，以及是否需要重启。表 8-1 只是一个通用指南，让您了解概况。您应该自己测量补丁时间。在将补丁应用到生产系统之前，在测试系统中测量每个阶段的补丁时间。


    表 8-1. 各阶段停机时间估算


    | 阶段 | 全停机时间 | 需要重启 | 近似时间（分钟） |

    | :--- | :--- | :--- | :--- |

    | `系统基础设施` | 是 | 可能 | 45–80\* |

    | `Grid Infrastructure` | 否（滚动升级） | 否 | 45–60 |

    | 数据库 | 否（滚动升级） | 否 | 10–20\*\* |


    \* 取决于补丁包需要更新的组件数量


    \*\* 取决于涉及的数据库数量


    请注意，每个补丁步骤都可以在时间上分开执行。没有必要快速连续执行所有三个步骤。数据库升级阶段具有一定的灵活性。您可以根据业务需要，在舒适的时间间隔单独执行这些步骤。


    ## ODA 补丁选项


    根据您的业务需求，您可以选择不同的选项。阅读以下部分以了解更多关于您的选项以及何时最适合使用它们。

    '
- fmt: '### New Appliances


    If you received a new Oracle Database Appliance from the factory, chances are
    that it isn’t running the latest version of the Oracle Database Appliance software
    and firmware. You need to update it to the latest patch level. There are two options
    you can employ to get there:


    *   The first and recommended option is to use a process similar to the update
    process described earlier in the "Patching Flow" section. You need to follow the
    steps described in the latest Oracle Database Appliance patch `README` file.[¹](#A978-1-4302-6266-4_8_Chapter.html#Fn1)

    *   The other option is to use the Oracle Database Appliance’s `Bare Metal Restore`
    option as described the My Oracle Support note titled "Oracle Database Appliance
    Bare Metal Restore Procedure" (Doc ID 1373599.1).


    The first option takes care of all system infrastructure components. In the `Bare
    Metal Restore` case, you should implicitly update system infrastructure components
    such as `BIOS` and firmware after you unpack the bundle on the Oracle Database
    Appliance. The instructions for updating system infrastructure are provided later
    in this chapter in the "Executing Patching" section. You can also find them in
    the `README` file.


    > The Oracle Database Appliance comes with a bare metal system infrastructure
    version preinstalled by default. Through a reimaging process, you can convert
    to a virtual setup. If you intended to use the virtual option, you must reimage
    the Oracle Database Appliance using instructions provided in the following My
    Oracle Support note: "Step by Step Instructions on Installing Virtualized Image
    on Oracle Database Appliance" (Article ID 1520579.1).


    ### Default Patching Option


    The default patching option is a straightforward process that can be executed
    in approximately two hours. It assumes that you have a standard Oracle Database
    Appliance configuration, with minimal deviation from the recommended configuration
    and less restrictive downtime requirements. This option is to be taken as the
    base option for the more fixable options described in the next sections.


    ### Steps Separated in Time


    To minimize the length of a downtime interval, and to allow yourself a clear focus
    and a more granular control over the patching process, you may wish to separate
    the three steps of patching the `System Infrastructure`, `Grid Infrastructure`,
    and the `RDBMS`. Each step can be executed separately, and with several weeks
    between them if that’s what you need.


    This approach of separating the steps requires more planning and more implementation
    effort. The only step that requires complete system downtime, however, is the
    `System Infrastructure` patching. The other two steps (`Grid Infrastructure` and
    `RDBMS`) can be executed in rolling fashion by running services on one of the
    two nodes while the second node is being patched.


    By separating steps in time, you can make sure that a previous step is completed
    successfully before going on to the next. The time needed per step is shorter
    than the time needed for the default approach of doing all steps in one go. However,
    the tradeoff is that the process becomes more complicated.


    ### Delayed RDBMS Update


    Based on the circumstances and business requirements, you may decide to update
    some databases while leaving others on the same appliance running at a prior version.


    The standard `ODA` upgrade option works on a per `Oracle Home` basis. All databases
    that belong to a particular `Oracle Home` are upgraded at the same time. The Oracle
    Database Appliance also supports multiple `Oracle Homes`—you can have as many
    `Oracle Homes` as you want or have resources for. The Oracle Database Appliance
    currently supports `11.2.0.2` and `11.2.0.3` `Oracle Home` versions. Each Oracle
    Database Appliance bundle patch upgrades the fifth version number of the Oracle
    Database version. For example, upgrading from Oracle Database Appliance bundle
    patch `2.6` to bundle patch `2.7` upgrades from Oracle Database version `11.2.0.3.6`
    to `11.2.0.3.7`.


    There are two options available if you would like to patch databases one by one.
    The first option is to configure each database to be run from a separate `Oracle
    Home`. This way, during the patching process you can specify what `Oracle Home`
    and associated database you would like to patch. If there are several databases
    running from the same `Oracle Home`, you need to separate those by making additional
    `Oracle Home` copies and moving those databases from the original `Oracle Home`
    to a new and separate `Oracle Home` that you have created. In the following example,
    we create additional `Oracle Homes` and move two databases to be started from
    a newly created, separate `Oracle Home`:


    ```

    # On 2.6

    # Show all current Oracle Homes

    oakcli show dbhomes –detail

    # Create a new Oracle Home

    oakcli create dbhome -version 11.2.0.3.6

    oakcli show dbhomes –detail

    # Reconfigure a dataabse to be executed from a new Oracle Home

    srvctl modify database -d DOG -o /u01/app/oracle/product/11.2.0.3/dbhome_2

    # Restart the database

    srvctl stop database -d DOG

    srvctl start database -d DOG

    oakcli create dbhome -version 11.2.0.3.6

    srvctl modify database -d CAT -o /u01/app/oracle/product/11.2.0.3/dbhome_3

    srvctl stop database -d CAT

    srvctl start database -d CAT

    ```


    The other option is to patch databases manually. In this case, you need just two
    `Oracle Homes`. You need one for the source and one for the target version of
    the database engine. Furthermore, you need to execute all the patching steps yourself,
    and you’ll be moving databases between the `Oracle Homes` yourself, too. The following
    steps are involved:


    1.  Create an `Oracle Home` for the new version of the `RDBMS`.

    2.  Stop the database that you are updating.

    3.  Reconfigure the database to be started from the newly created `Oracle Home`.

    4.  Start the database and run upgrade steps.

    5.  Release the database to users.


    This manual approach doesn’t require you to create a separate `Oracle Home` for
    each database. You can update all the databases using just two `Oracle Homes`.
    However, this approach requires more manual steps than the first approach shown
    earlier. You use traditional database upgrade steps just as you would for a regular
    Oracle system, thereby losing the automatic database upgrade functionality provided
    by the Oracle Database Appliance.


    ### Data Guard to Minimize Downtime


    If your business demands the shortest possible downtime, you look at using an
    additional Oracle Database Appliance in a `Data Guard` configuration. This approach
    allows you to avoid downtime associated with `System` and `Grid Infrastructure`
    updates. Here is the process:


    1.  Establish a standby database configuration[²](#A978-1-4302-6266-4_8_Chapter.html#Fn2)
    between the primary and secondary Oracle Database Appliances.

    2.  Stop the redo log application process on the secondary/standby Oracle Database
    Appliance.

    3.  Update the `System` and `Grid Infrastructure` components of the standby Oracle
    Database Appliance.

    4.  Do not update the standby database `Oracle Home` just yet. Instead, reestablish
    the redo log application process.

    5.  Switch your applications to use the secondary Oracle Database Appliance, thus
    switching over to the standby database. At this point, the primary Oracle Database
    Appliance can be taken offline to update infrastructure components.

    6.  Update your database to the latest version using the rolling update approach.
    This way, there is just a short switchover time when applications need to be repointed
    from the primary to the secondary Oracle Database Appliance. There is no application
    downtime associated with the infrastructure update activities.


    Use of `Data Guard` as just described requires a bit more effort in planning,
    preparation, and implementation. However, the `Data Guard` approach provides a
    minimal switchover time as opposed to the hours of downtime and limited mode operations
    during the `Grid Infrastructure` and database patching steps when performed in
    their normal manner.'
