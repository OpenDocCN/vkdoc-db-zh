    在开始安装e-Business Suite之前，您必须创建一台计划中的应用层机器。第二台VM将在安装完成后从第一台克隆而来。或者，您也可以选择创建两台VM（每个ODA节点上各一台），并使用R12.2快速安装来部署使用共享应用层文件系统的环境。此处描述的示例不涵盖此场景。\n\
    \n创建VM的最简单方法是从Oracle软件交付云下载模板。[⁷](#A978-1-4302-6266-4_11_Chapter.html#Fn7)  我使用最新的Oracle\
    \ Linux 6 update 4 x86_64模板[⁸](#A978-1-4302-6266-4_11_Chapter.html#Fn8) 来构建VM。确保下载半虚拟化模板，因为它允许充分利用Xen特性来减少所需的硬件虚拟化量。\n\
    \n模板下载并解压缩后，需要将Oracle虚拟程序集文件（在我的情况下是`OVM_OL6U4_x86_64_PVM.ova`）放置在ODA第一个节点的Dom0上的`/OVS`目录中，然后从那里加载到OVS存储库中。列表11-7显示了将VM模板导入OVS存储库的命令，之后从模板克隆新的VM并根据需要调整其大小。最后，启动新的VM。\n\
    \n**列表11-7. 从模板创建VM**\n\n```\n[root@s1 ∼]# oakcli import vmtemplate oel6u4 -assembly\
    \ /OVS/OVM_OL6U4_x86_64_PVM.ova -repo odarepo1\nImported VM Template\n\n[root@s1\
    \ ∼]# oakcli clone vm oevm1 -vmtemplate oel6u4 -repo odarepo1\nCloned VM : oevm1\n\
    \n[root@s1 ∼]# oakcli configure vm oevm1 -maxvcpu 4 -vcpu 4\nConfigured VM : oevm1.\
    \ The settings will take effect upon the next restart of this VM.\n\n[root@s1\
    \ ∼]# oakcli configure vm oevm1 -network \"['type=netfront,bridge=net1']\"\nConfigured\
    \ VM : oevm1. The settings will take effect upon the next restart of this VM.\n\
    \n[root@s1 ∼]# oakcli configure vm oevm1 -os OL_6\nConfigured VM : oevm1. The\
    \ settings will take effect upon the next restart of this VM.\n\n[root@s1 ∼]#\
    \ oakcli configure vm oevm1 -memory 12G -maxmemory 24G\nConfigured VM : oevm1.\
    \ The settings will take effect upon the next restart of this VM.\n\n[root@s1\
    \ ∼]# oakcli start vm oevm1\nStarted VM : oevm1\n```\n\n此时，新的VM还没有IP地址，因此您必须通过执行`oakcli\
