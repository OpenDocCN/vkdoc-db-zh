- fmt: '## Deconfiguring Database Control


    Deconfiguring is as simple as what you did to originally configure. Simply invoke
    `emca` using the parameter `–deconfig`. The `-deconfig` option will begin the
    process of deconfiguring. Listing 6-16 shows how to deconfigure Database Control
    for the current database on the Oracle Database Appliance.


    **Listing 6-16.** Deconfigure the Database Control


    ```bash

    $ cd $ORACLE_HOME/bin

    $ ./emca -deconfig dbcontrol db

    ```


    When the deconfiguration begins, the `emca` utility will ask you for the `ORACLE_SID`
    value associated with the Database Control you are deconfiguring. Provide that
    `ORACLE_SID` value; then `emca` will ask if you really want to deconfigure Database
    Control. This is a confirmation prompt, and an answer is needed. Once the deconfiguration
    is complete, the database console will not be usable or accessible for the associated
    database.


    Listing 6-17 shows output from a typical deconfiguration operation.


    **Listing 6-17.** Deconfiguration Output


    ```

    STARTED EMCA at Oct 8, 2013 9:24:18 AM

    EM Configuration Assistant, Version 11.2.0.3.0 Production

    Copyright (c) 2003, 2011, Oracle.  All rights reserved.

    Enter the following information:

    Database SID: bc11gtst

    Do you wish to continue? [yes(Y)/no(N)]: y

    Oct 8, 2013 9:24:28 AM oracle.sysman.emcp.EMConfig perform

    INFO: This operation is being logged at /opt/oracle/cfgtoollogs/emca/bc11gtst/emca_2013_10_08_09_24_17.log.

    Oct 8, 2013 9:24:29 AM oracle.sysman.emcp.util.DBControlUtil stopOMS

    INFO: Stopping Database Control (this may take a while) ...

    Enterprise Manager configuration completed successfully

    FINISHED EMCA at Oct 8, 2013 9:25:04 AM

    ```


    Why might you wish to deconfigure Database Control? One answer boils down to using
    Enterprise Manager instead. When faced with monitoring more than just the single
    database or a single cluster database, many organizations begin to look at implementing
    Oracle Enterprise Manager, a product widely used for monitoring more than one
    database in an enterprise environment. By contrast, Database Control is traditionally
    used for a single database or a single cluster database within the environment.
    Thus, the need to manage multiple databases via Enterprise Manager is one reason
    you might choose to deconfigure Database Control.


    With Oracle Enterprise Manager being used, there is no need to have Database Control
    configured. This is due to the overhead that will be contributed by running Database
    Control along with the Oracle Management Agent needed by Oracle Enterprise Manager.
    When using the Oracle Database Appliance as the Oracle Enterprise Manager repository
    and management server, deconfiguring Database Control is required.


    ## Supporting Oracle Enterprise Manager


    Up until this point, you have reviewed how to manage the Oracle Database Appliance
    with Oracle Database Control. As mentioned earlier, the database console only
    supports and can be configured against a single database or Real Application Cluster
    (RAC). As the Oracle Database Appliance becomes more commonplace in enterprises,
    these engineered systems will need to be monitored, just as many other resources
    are today.


    Oracle Enterprise Manager provides and allows for a single point of monitoring.
    Oracle Enterprise Manager further allows for the Oracle Database Appliance to
    be managed just like any other commodity resource.


    > **Note**

    >

    > Currently, the Oracle Database Appliance does not have an engineered system
    plug-in to manage the hardware layer as Exadata does. The lack of a plug-in makes
    managing the Oracle Database Appliance like managing any other commodity hardware.


    Now that it has been established that the Oracle Database Appliance is managed
    just the same as any commodity hardware-driven Real Application Cluster, how do
    we enable Oracle Enterprise Manager to monitor and manage the Oracle Database
    Appliance? Just as any other resources that Oracle Enterprise Manager can monitor
    and manage, the Oracle Database Appliance needs to have the Oracle Management
    Agent installed on both nodes of the appliance.


    The Oracle Management Agent is one of the three core management pieces of the
    Oracle Enterprise Manager. It is the only management piece that is required to
    be installed on monitored targets. The Oracle Management Agent, once installed,
    takes an unmanaged host and makes it a managed host that can be interacted with
    through Oracle Enterprise Manager. The agent works with plug-ins to provide management
    capabilities for a wide range of targets on the host.


    When managing the Oracle Database Appliance with Oracle Enterprise Manager, ensure
    that a management agent is installed on each node of the appliance.


    > **Note**

    >

    > Out of the box, the Oracle Database Appliance ships with Oracle Enterprise Linux
    (64-bit). Depending on the configuration of your Oracle Enterprise Manager, additional
    management agents may need to be downloaded to the software library.


    Let’s take a look at how to add the Oracle Database Appliance as a target to Oracle
    Enterprise Manager. Begin by going to **Setup** ➤ **Add Target** ➤ **Add Targets
    Manually**, as shown in Figure 6-1.


    ![A978-1-4302-6266-4_6_Fig1_HTML.jpg](A978-1-4302-6266-4_6_Fig1_HTML.jpg)

    *Figure 6-1. Set up targets manually*


    Since we want to add the Oracle Database Appliance to Oracle Enterprise Manager,
    we need to add the host targets. The host targets for Oracle Database Appliance
    are the two internal servers that make up the Real Application Cluster within
    the Oracle Database Appliance. Figure 6-2 shows that we selected **Add Host Targets**.
    Once you’ve made that selection, click the **Add Host** button.


    ![A978-1-4302-6266-4_6_Fig2_HTML.jpg](A978-1-4302-6266-4_6_Fig2_HTML.jpg)

    *Figure 6-2. Add Targets Manually*


    On the next screen, we need to specify the two hosts that we want to add to the
    Oracle Enterprise Manager. We also need to specify their operating system. The
    Oracle Database Appliance ships with Oracle Enterprise Linux (64-bit); you need
    to make sure to select the correct operating system. Figure 6-3 shows the input
    screen that should be displayed when adding a new host target(s).


    > **Note**

    >

    > If the Oracle Enterprise Manager is installed on a host that is not Linux (64-bit)
    based, then you will need to download the correct agent software from Oracle through
    Oracle Enterprise Manager.


    ![A978-1-4302-6266-4_6_Fig3_HTML.jpg](A978-1-4302-6266-4_6_Fig3_HTML.jpg)

    *Figure 6-3. Add Host Targets*'
