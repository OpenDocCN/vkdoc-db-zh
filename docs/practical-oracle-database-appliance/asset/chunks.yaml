  trans: '

    ### 克隆应用层虚拟机


    当前，您只有一个运行电子商务套件应用层的虚拟机。幸运的是，在 ODA 上从现有虚拟机克隆一个新的虚拟机非常容易，这样做将为您提供一个已经针对现有环境预先配置好的虚拟机。从现有虚拟机创建虚拟机模板，然后从新模板克隆新的虚拟机。此外，您还需要更改主机名和
    IP 地址。让我们更详细地了解如何完成此过程：


    #### 停止电子商务套件服务

    确保在接下来的克隆过程中这些服务没有运行。通过连接到其中一个 ODA 基础服务器并运行 `oakcli stop vm` 来停止现有虚拟机 (`oevm1`)，如下所示。接着执行
    `oakcli show vm` 以确认虚拟机何时关闭。


    ```

    [root@s1 ∼]# oakcli show vm


    NAME                              MEMORY      VCPU        STATE           REPOSITORY

    oevm1                              12288          4        ONLINE          odarepo1


    [root@s1 ∼]# oakcli stop vm oevm1

    Shutdown VM initiated for oevm1


    [root@s1 ∼]# oakcli show vm


    NAME                              MEMORY      VCPU        STATE           REPOSITORY

    oevm1                              12288          4        OFFLINE         odarepo1

    ```


    #### 将虚拟机打包成 tar 归档文件

    以 root 身份连接到现有虚拟机所在的同一个 ODA 节点上的 Dom0，并将虚拟机打包成 tar 归档文件。现有虚拟机位于第一个 ODA 节点的 `/OVS/Repositories/odarepo1/VirtualMachines/{VM
    name}` 和第二个 ODA 节点的 `/OVS/Repositories/odarepo2/VirtualMachines/{VM name}`。例如：


    ```

    [root@ovs-host1 ∼]# cd /OVS/Repositories/odarepo1/VirtualMachines/oevm1

    [root@ovs-host1 oevm1]# ls -lh

    total 13G

    -rw-r--r-- 1 root root 12G Oct 24 07:09 15574aa1d9f24f57b44bc6045d924cff.img

    -rw-r--r-- 1 root root 350 Sep  2 10:03 vm.cfg


    [root@ovs-host1 oevm1]# tar -cvzf /OVS/oevm1_clone.tgz ./*

    ./15574aa1d9f24f57b44bc6045d924cff.img

    ./vm.cfg

    ```


    #### 将 tar 归档文件复制到第二个 Dom0

    ```

    [root@ovs-host1 oevm1]# scp /OVS/oevm1_clone.tgz 10.177.0.59:/OVS/

    oevm1_clone.tgz                                            100% 4700MB  47.5MB/s   01:39

    ```


    #### 将 tar 归档文件导入为模板

    一旦 tar 归档文件被复制到第二个 Dom0，您就可以将其作为模板导入到另一个节点的存储库中。此步骤可以在任何 ODA 基础节点上执行；不必是您复制 tar
    归档文件的同一节点。需要执行的命令如下：


    ```

    [root@s1 ∼]# oakcli import vmtemplate oevm1_tmp -files /OVS/oevm1_clone.tgz -repo
    odarepo2

    Imported VM Template

    ```


    #### 通过克隆模板创建并启动新的虚拟机

    ```

    [root@s1 ∼]# oakcli clone vm oevm2 -vmtemplate oevm1_tmp -repo odarepo2

    Cloned VM : oevm2


    [root@s1 ∼]# oakcli start vm oevm2

    Started VM : oevm2


    [root@s1 ∼]# oakcli show vm


    NAME                              MEMORY      VCPU        STATE           REPOSITORY

    oevm1                              12288          4        OFFLINE         odarepo1

    oevm2                              12288          4        ONLINE          odarepo2

    ```


    #### 更改主机名和 IP 地址

    两个虚拟机现在配置了相同的主机名和 IP。在同时启动两个虚拟机之前，您需要更改配置。我发现最简单的方法是调整配置文件 `/etc/sysconfig/network`
    和 `/etc/sysconfig/network-scripts/ifcfg-eth0`，然后重启虚拟机。此外，根据您选择实现的名称解析配置，可能还需要调整
    hosts 文件。以下是一个示例：


    ```

    [root@oevm1 ∼]# grep HOSTNAME /etc/sysconfig/network

    HOSTNAME=oevm1.odalab.com


    [root@oevm1 ∼]# vi /etc/sysconfig/network


    [root@oevm1 ∼]# grep HOSTNAME /etc/sysconfig/network

    HOSTNAME=oevm2.odalab.com


    [root@oevm1 ∼]# grep IPADDR /etc/sysconfig/network-scripts/ifcfg-eth0

    IPADDR=10.177.0.63


    [root@oevm1 ∼]# vi /etc/sysconfig/network-scripts/ifcfg-eth0


    [root@oevm1 ∼]# grep IPADDR /etc/sysconfig/network-scripts/ifcfg-eth0

    IPADDR=10.177.0.64


    [root@oevm1 ∼]# reboot

    ```


    #### 从另一个虚拟 IP 挂载 `/cloudfs`

    您还需要在新虚拟机上从另一个虚拟 IP 挂载 `/cloudfs`，因此您需要调整 `/etc/fstab` 文件并在 `oevm2` 上重新挂载 ACFS
    文件系统。例如：


    ```

    [root@oevm2 ∼]# grep cloudfs /etc/fstab

    s1-vip:/cloudfs   /cloudfs    nfs     rw,intr,bg,hard,timeo=600,wsize=32768,rsize=32768,nfsvers=3,tcp,nolock,acregmin=0,acregmax=0
    0 0


    [root@oevm2 ∼]# vi /etc/fstab


    [root@oevm2 ∼]# grep cloudfs /etc/fstab

    s2-vip:/cloudfs   /cloudfs    nfs     rw,intr,bg,hard,timeo=600,wsize=32768,rsize=32768,nfsvers=3,tcp,nolock,acregmin=0,acregmax=0
    0 0


    [root@oevm2 ∼]# umount /cloudfs

    [root@oevm2 ∼]# mount /cloudfs

    ```


    #### 验证设置并测试 keepalived

    最后，您也可以启动第一个虚拟机了，因为冲突的配置已被移除。（参见以下示例）。启动后，您应该检查虚拟 IP（本例中是 10.177.0.60，配置在`oevm2`上）是否被管理并在其中一个虚拟机上启动。您还可以通过停止和启动主机上的服务（使用
    `service keepalived stop` 和 `service keepalived start` 来操作）来测试 `keepalived` 如何管理虚拟
    IP。IP 将始终分配给运行 `keepalived` 的其中一个虚拟机。


    ```

    [root@s1 ∼]# oakcli start vm oevm1

    Started VM : oevm1


    [root@s1 ∼]# oakcli show vm


    NAME                              MEMORY      VCPU        STATE           REPOSITORY

    oevm1                              12288          4        ONLINE          odarepo1

    oevm2                              12288          4        ONLINE          odarepo2


    [root@oevm1 ∼]# ip addr list dev eth0 | grep "inet "

    inet 10.177.0.63/16 brd 10.177.255.255 scope global eth0


    [root@oevm2 ∼]# ip addr list dev eth0 | grep "inet "

    inet 10.177.0.64/16 brd 10.177.255.255 scope global eth0

    inet 10.177.0.60/32 scope global eth0

    ```


    您现在有两个应用层虚拟机，但其中只有一个配置了电子商务套件。在 ODA 上完成电子商务套件应用层配置的最后一步是在第二个虚拟机上启用服务。这将在下一节中介绍。

    '
- fmt: '### Configure the Second Application Tier Node


    In order to start using the second application tier VM you need to enable the
    usage of the virtual IP address for the e-Business Suite front-end services. Then
    you need to add the new node to the application tier configuration.


    Usage of the virtual IP address in your configuration simulates the physical load
    balancer, so from an e-Business Suite configuration perspective you have to implement
    a load balancer. This is covered by My Oracle Support document “Using Load-Balancers
    with Oracle E-Business Suite Release 12.2 (Doc ID 1375686.1).” [Chapter 2](#A978-1-4302-6266-4_2_Chapter.html).1
    in that document, “Using Hardware Load Balancers with Single Web Entry Point,”
    describes the configuration changes needed for the architecture you are building
    on ODA. The instructions explain the manual configuration steps to implement the
    support of a load balancer IP address in e-Business Suite for all front-end services.
    Follow the instructions to implement such an address.


    There is an alternative way to enable the virtual IP—by using the configuration
    wizards included in the e-Business Suite Oracle Application Manager. The HTTP
    Load Balancing wizard can be accessed after logging on using the System Administrator
    responsibility and navigating: `Oracle Applications Manager` ➤ `Dashboard` ➤ `Site
    Map` ➤ `AutoConfig` ➤ `Launch Wizards`. Then click the `Enable` button.


    Figures [11-4](#A978-1-4302-6266-4_11_Chapter.html#Fig4) to [11-6](#A978-1-4302-6266-4_11_Chapter.html#Fig6)
    show the most important screens of the configuration wizard for enabling HTTP
    load balancing. Figure [11-5](#A978-1-4302-6266-4_11_Chapter.html#Fig5) shows
    the first screen, where you have to choose the nodes to enable the load balancing.
    You have only one node to select at this time. The load balancing settings will
    be prepopulated when the second node is added to the e-Business Suite configuration.


    ![A978-1-4302-6266-4_11_Fig5_HTML.jpg](A978-1-4302-6266-4_11_Fig5_HTML.jpg)


    Figure 11-5.


    Select the node for the load balancing configuration


    The next screen (see Figure [11-6](#A978-1-4302-6266-4_11_Chapter.html#Fig6))
    asks you to enter the configuration parameters. Enter the hostname and the domain
    name for the virtual IP managed by `keepalived`. You also need to mark the session-persistence
    as supported. This is a load balancer feature that remembers which of the load-balanced
    servers the connection was routed to initially, and then the same node is used
    for all further communications for the same client. The virtual IP is allocated
    to one of the VMs only; so from that perspective, it acts as a session-persistent
    load balancer. The `s_active_webport` setting depends on the primary port pool
    for the environment. In this case it’s 11, so the port is 8011.


    ![A978-1-4302-6266-4_11_Fig6_HTML.jpg](A978-1-4302-6266-4_11_Fig6_HTML.jpg)


    Figure 11-6.


    Providing the load balancing configuration parameters


    The configuration wizard performs the verification of the provided settings. Figure
    [11-7](#A978-1-4302-6266-4_11_Chapter.html#Fig7) shows that the parameters are
    successfully verified. As the verification is performed in the background, you’ll
    have to push the `Refresh` button until the verification checks complete and the
    status changes to `Success`.


    ![A978-1-4302-6266-4_11_Fig7_HTML.jpg](A978-1-4302-6266-4_11_Fig7_HTML.jpg)


    Figure 11-7.


    Verification of the configuration parameters


    Submit the changes in the remaining configuration screens until you’re presented
    with the following message: “The configuration options have been saved to the
    Context File. Now you can run `AutoConfig` and restart services to make sure these
    settings take effects.”


    Run the `AutoConfig` on the VM as instructed and bounce the services to start
    using the virtual IP.


    The virtual IP has been configured in e-Business Suite. The last remaining step
    is to enable the services on the second VM. You can do so by implementing the
    shared application tier file system as instructed in My Oracle Support note “Sharing
    The Application Tier File System in Oracle E-Business Suite Release 12.2 (Doc
    ID 1375769.1).” It’s a fairly complex process, but my testing shows the instructions
    are accurate and they deliver the desired configuration.'
