  trans: '

    ## 构建离线配置文件


    ODA 部署文件是使用 Oracle Appliance Manager Configurator 实用程序构建的。该设备管理器可作为离线配置器，用于预先构建部署文件。Oracle
    Appliance Manager Configurator 目前可通过以下链接从 Oracle 下载：


    [`www.oracle.com/technetwork/server-storage/engineered-systems/database-appliance/index.html`](http://www.oracle.com/technetwork/server-storage/engineered-systems/database-appliance/index.html)


    《入门指南》详细说明了如何使用 Oracle Appliance Manager Configurator 实用程序。该配置实用程序可以在 ODA 上以实时模式运行，以交互方式构建
    ODA。


    ODA 配置实用程序可以在您的笔记本电脑或 ODA 上运行。如果您从笔记本电脑或台式机运行 ODA 配置实用程序，请确保运行的版本与您打算安装的 ODA 软件版本相匹配。


    图 5-1 至 5-4 显示了许多 IP 地址。这些地址取自 ODA 入门指南示例（或是虚构的），以避免使用真实的 IP 地址。以下列出了图中屏幕截图显示的内容：


    ![A978-1-4302-6266-4_5_Fig4_HTML.jpg](img/A978-1-4302-6266-4_5_Fig4_HTML.jpg)

    图 5-4. 运行可选的网络验证步骤


    ![A978-1-4302-6266-4_5_Fig3_HTML.jpg](img/A978-1-4302-6266-4_5_Fig3_HTML.jpg)

    图 5-3. 为备份或其他用途配置额外的网络


    ![A978-1-4302-6266-4_5_Fig2_HTML.jpg](img/A978-1-4302-6266-4_5_Fig2_HTML.jpg)

    图 5-2. 配置公共网络和 ILOM 网络


    ![A978-1-4302-6266-4_5_Fig1_HTML.jpg](img/A978-1-4302-6266-4_5_Fig1_HTML.jpg)

    图 5-1. 选择硬件型号和部署类型（物理或虚拟）


    *   图 5-1. 选择硬件型号和部署类型（物理或虚拟）。

    *   图 5-2. 配置公共网络和 ILOM 网络。

    *   图 5-3. 为备份或其他用途配置额外的网络。

    *   图 5-4. 运行可选的网络验证步骤。


    执行的网络验证检查确保以下条件成立：


    *   即将部署的 IP 地址尚未被使用。这些 IP 地址应是不可 ping 通的。

    *   网络网关应该已经可用。这些 IP 地址需要是可 ping 通的。

    *   所有 IP 地址和主机名都必须能在 DNS 中解析，包括正向（主机名到 IP）和反向（IP 地址到主机名）查找模式。


    ## 将 ODA 安装到机架中


    ODA 是一个 4U 的机架安装单元，包括存储单元。因此，您需要将该单元放入数据中心的机架中。ODA 发货时附带用于此目的的机架安装套件。


    注意：如果配备第二个存储单元，机架占用空间将再增加 2U 到 6U。


    ODA 需要放置在数据中心的机架中才能进行布线。将 ODA 安装到机架的过程在《ODA 所有者指南》的一章中有详细说明。该过程很简单，文档也很容易遵循。您的数据中心人员在安装
    ODA 到机架时应该不会遇到任何问题。


    ## 为 ODA 布线


    接下来，您应该进行适当的布线。ODA 需要完成两种类型的布线：


    *   两个服务器节点、存储单元和可选存储扩展单元之间的内部布线。请使用 Oracle 随设备提供的布线。

    *   连接到外部网络的布线。这里您必须使用自己的电缆。


    如图 5-5 所示的 ODA 设置海报涵盖了将服务器节点、存储单元和可选存储扩展单元连接在一起的布线说明。该海报是已发布的最简单的说明，也是最好的起点。您首先会注意到电缆是颜色编码的。它们插入的网络插槽也是颜色编码的。


    注意：设置海报随每台 ODA 一起提供，也可在 Oracle 手册 [`http://docs.oracle.com`](http://docs.oracle.com/)
    中获取。


    设置海报中概述的过程看起来足够简单。而且几乎确实如此。有些颜色彼此非常接近，因此您必须注意色调。我见过一些数据中心人员在连接上犯了一些错误的案例，有时是颜色让他们产生了混淆。在这个领域，可以让团队中的某个人专门负责进行这些连接，而不是分散这项工作。


    在《ODA 入门指南》和《ODA 所有者指南》中都包含了更详细的文档，涵盖了服务器节点和存储单元之间的连接。这些手册包含额外的图表，提供了更多细节，并且可能比设置海报更容易阅读。


    ![A978-1-4302-6266-4_5_Fig5_HTML.jpg](img/A978-1-4302-6266-4_5_Fig5_HTML.jpg)

    图 5-5. 每台 ODA 随附的 Oracle Database Appliance X3-2 设置海报


    为了帮助验证内部连接，Oracle 建议在开始配置公共网络之前运行 `oakcli` 来验证布线。此步骤在《入门指南》的“部署”和“故障排除”章节中均有记录。以下是验证布线的命令：


    ```

    # /opt/oracle/oak/bin/oakcli validate -c storagetopology

    ```


    除了将 ODA 组件连接在一起所需的布线外，还需要完成外部布线。外部布线包括 ODA 与您数据中心网络之间的连接，如表 5-2 所述。这包括您的公共网络、专用网络和
    ILOM 连接的布线。如果连接是绑定的，每个服务器节点将有两个公共电缆连接、两个专用网络连接和一个 ILOM 连接——两个 ODA 服务器节点总共需要十根网络电缆。当然，如果需要，可以重新配置连接，使其不绑定以部署额外的网络。修改网络接口的步骤在几个
    Oracle 支持 MOS 说明中有所涵盖，包括 1422563.1、1436335.1 和 1442113.1，以及《Oracle Linux 管理手册》。

    '
- fmt: '## Apply the ILOM IP Addresses and Configure the ODA Public Network


    There are a number of options for applying IP addresses to the ODA’s network interfaces.
    These options are covered in the Oracle deployment documentation starting with
    the setup poster, Getting Started Guide, MOS note 1373617.1 for bare-metal deployments,
    or MOS note 1520579.1 for virtual deployments.


    One area where the documentation could be a little clearer is the process for
    applying IP addresses to an ODA. All of the documentation points to logging into
    each of the ODA nodes as `root` using the default password, and then running the
    `firstnet` script on each server node to configure the public network for each
    host. There are also some references in the manuals on setting up the ILOM first,
    but the information isn’t very clear. Accordingly, we’ll try to clear things up.


    First, setting up the ILOM to begin the process of adding IP addresses is the
    same on an ODA as it is on an Oracle Solaris server or any other piece of Oracle
    Linux hardware. If you have an experienced sysadmin working with you to deploy
    the ODA, he or she will already know what to. Starting the deployment of the ODA
    by applying the ILOM IPs first is a very efficient way to start the deployment.


    If you are on your own to deploy the ODA, don’t worry—getting started by adding
    the IP addresses to the ILOMs on each server is not hard. However, first you have
    to decide how you are going to connect to the ILOM device. There are at least
    two options:


    *   Connect to the ODA serial port using a laptop and a serial connection cable.

    *   Connect to the ODA using a serial console device such as a data center KVM
    cart or a data center KVM (keyboard, video, and mouse) appliance.


    Connecting to the ODA ILOM through an ODA server serial port using your laptop
    with a serial cable is documented by Oracle in MOS note 1395445.1. Again, if you
    have people used to deploying Oracle hardware, they have already done this many
    times and know what to do. Regardless, the process is straightforward. Just follow
    the procedure outlined in the MOS note.


    The key steps of the process are as follows:


    1.  Connect to the serial port on each node, starting with node 0 (the bottom
    unit).

    2.  Log in using the `root` account; use the ILOM default password “changeme”.

    3.  Apply the ILOM IP address


    The ILOM IPs are applied to each server using the following command syntax:


    ```

    set /SP/network pendingipdiscovery=static

    set /SP/network pendingipaddress=<IP Address>

    set /SP/network pendingipgateway=<gateway-IPaddr>

    set /SP/network pendingipnetmask=<netmask>

    set /SP/network commitpending=true

    ```


    Here is what the commands look like using non-real IP addresses:


    ```

    set /SP/network pendingipdiscovery=static

    set /SP/network pendingipaddress=10.0.0.3

    set /SP/network pendingipgateway=10.0.0.1

    set /SP/network pendingipnetmask=255.255.255.0

    set /SP/network commitpending=true

    ```


    The commands can also be chained together, as follows:


    ```

    set /SP/network pendingipdiscovery=static pendingipaddress=10.0.0.3 pendingipgateway=10.0.0.1
    pendingipnetmask=255.255.255.0 commitpending=true

    ```


    You can validate the IP address by running the following command to display the
    ILOM IP addresses that have been configured:


    ```

    -> show /SP/network

    ```


    Most data centers will have a rolling KVM cart that can be used to start the deployment
    process. Some data centers will also have a KVM appliance with a web interface
    that can launch a console session for an ODA. The KVM appliances have multiple
    ports with serial cables that can be run to a data center rack and then connected
    to ODAs as needed. Using a KVM appliance avoids the need to go onsite to the data
    center to deploy the ODA.


    Once the ILOM IP addresses have been applied, the public network IP addresses
    can be applied to the ODA. Oracle recommends that the cabling connections be validated
    first:


    ```

    # /opt/oracle/oak/bin/oakcli validate -c storagetopology

    ```


    If any issues are reported, you’ll need to check the cabling on the system and
    then rerun the checks.


    Once the ILOM IP addresses are in place and the cabling connections have been
    validated, you can connect from the ILOM to each server node to run the `firstnet`
    script to configure the public network for each host. The following public network
    configuration script is run on each node using the `root` account with the default
    `root` password “welcome1”, starting with node 0 (the bottom unit):


    ```

    # /opt/oracle/oak/bin/oakcli configure firstnet

    ```


    ## Configure the Remaining Networks


    Once you have applied the ILOM and host public network IP addresses, you are ready
    to continue with the deployment, which will apply the remaining IP addresses to
    your system. Run the ODA deployment process to configure the remaining networks.


    If you used the Oracle Appliance Manager Configurator offline to build your deployment
    configuration file, which includes the IP addresses that have been assigned, you
    need to prepare the configuration file by running the `oakcli copy` command. If
    you’re not using a configuration file, you can run the Appliance Manager Configurator
    interactively.


    Prepare the previously created ODA configuration file by running `oakcli` with
    the full path and file name, where the file was copied to the ODA. The command
    syntax for this step is documented in the `oakcli` command reference in the appendix
    of the ODA Getting Started Guide.


    ```

    # ./oakcli copy -conf /path/file_name.param

    ```


    Deploy the ODA using the previously prepared configuration file:


    ```

    # ./oakcli deploy -conf /path/file_name.param

    ```


    Alternatively, you can deploy the ODA interactively (without a previously prepared
    configuration file):


    ```

    # ./oakcli deploy

    ```


    If you plan on using the interactive approach, be sure to run the command using
    a GUI interface through the ODA `startx` command or through the VNC Server that
    ships with ODAs.


    Please be sure to read the complete set of documentation detailing all of the
    tasks required to deploy an ODA. Since this chapter only concerns ODA networking,
    I have limited the deployment steps to those related to the deployment of the
    ODA networks.'
