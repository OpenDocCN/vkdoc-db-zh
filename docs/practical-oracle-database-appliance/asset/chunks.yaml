- fmt: "#### OS Disk Storage\n\n验证系统后，从操作系统角度查看磁盘并确保所有磁盘正常运行同样重要。您还需要确保设备上的 RAID 级别正常。ODA\
    \ V1 和 X3-2 的设置类似，但 ODA X3-2 有更多可供操作系统使用的磁盘空间。\n\n> **注意**\n>\n> 虚拟化 ODA 显示映射到各个物理磁盘的虚拟磁盘。裸金属\
    \ ODA 显示一一对应的物理映射。\n\n清单 7-7 展示了如何验证 ODA 设备的磁盘存储。\n\n**清单 7-7. 验证 ODA 操作系统磁盘存储（V1\
    \ & X3-2）**\n\n```\n[root@odax32 bin]# ./oakcli validate -c OSDiskStorage\nINFO:\
    \ Checking Operating System Storage\nSUCCESS: The OS disks have the boot stamp\n\
    RESULT: Raid device /dev/md0 found clean\nRESULT: Raid device /dev/md1 found clean\n\
    RESULT: Physical Volume   /dev/md1 in VolGroupSys has 370206.05M out of total\
    \ 599986.80M\nRESULT: Volumegroup   VolGroupSys consist of 1 physical volumes,contains\
    \ 4 logical volumes, has 0 volume snaps with total size of 599986.80M and free\
    \ space of 370206.05M\nRESULT: Logical Volume   LogVolOpt in VolGroupSys Volume\
    \ group is of size 60.00G\nRESULT: Logical Volume   LogVolRoot in VolGroupSys\
    \ Volume group is of size 30.00G\nRESULT: Logical Volume   LogVolSwap in VolGroupSys\
    \ Volume group is of size 24.00G\nRESULT: Logical Volume   LogVolU01 in VolGroupSys\
    \ Volume group is of size 100.00G\nRESULT: Device /dev/mapper/VolGroupSys-LogVolRoot\
    \ is mounted on / of type ext3 in (rw)\nRESULT: Device /dev/mapper/VolGroupSys-LogVolOpt\
    \ is mounted on /opt of type ext3 in (rw)\nRESULT: Device /dev/md0 is mounted\
    \ on /boot of type ext3 in (rw)\nRESULT: Device /dev/mapper/VolGroupSys-LogVolU01\
    \ is mounted on /u01 of type ext3 in (rw)\nRESULT: / has 7242 MB free out of total\
    \ 29758 MB\nRESULT: /opt has 46985 MB free out of total 59516 MB\nRESULT: /boot\
    \ has 65 MB free out of total 99 MB\nRESULT: /u01 has 80271 MB free out of total\
    \ 99194 MB\n```\n\n密切关注操作系统空间至关重要。对于各种组件（如 RDBMS 或操作系统）缺乏非共享磁盘空间会导致设备上服务的严重中断。根据配置（裸机或虚拟化）的不同，磁盘大小和备用磁盘空间也会不同。这将在第\
    \ 10 章中详细说明。\n\n#### Shared Storage\n\n每个 ODA 都有在设备的两个节点之间共享的存储。在 ODA V1 中，共享存储使用存储扩展器内置在设备中，而\
    \ ODA X3-2 使用外部机架将共享磁盘添加到设备中。\n\n验证共享存储对于确保所有路径可用且共享磁盘没有问题至关重要。根据您的磁盘组，冗余级别（NORMAL\
    \ 或 HIGH）的磁盘可能会损坏并应更换。可以通过系统日志或 ASM 警报日志监控磁盘行为，但重要的是要验证并确保通往磁盘的所有路径都正常运行。\n\n\
    清单 7-8 提供了一个存储验证示例。您可以看到活动的磁盘路径，以及逻辑和物理磁盘设备的名称。\n\n**清单 7-8. ODA 共享存储验证（V1 & X3-2）**\n\
    \n```\n[root@odax32 bin]# ./oakcli validate -c SharedStorage\nINFO: Checking Shared\
    \ Storage\nRESULT: Disk HDD_E0_S00_373737408 path1 status active device sda with\
    \ status active path2\n        status active device sdy with status active\nSUCCESS:\
    \ HDD_E0_S00_373737408 has both the paths up and active\nRESULT: Disk HDD_E0_S01_373737516\
    \ path1 status active device sdb with status active path2\n        status active\
    \ device sdz with status active\nSUCCESS: HDD_E0_S01_373737516 has both the paths\
    \ up and active\n....\n....\nSUCCESS: HDD_E0_S18_373750584 has both the paths\
    \ up and active\nRESULT: Disk HDD_E0_S19_373760780 path1 status active device\
    \ sdt with status active path2\n        status active device sdar with status\
    \ active\nSUCCESS: HDD_E0_S19_373760780 has both the paths up and active\nRESULT:\
    \ Disk SSD_E0_S20_805834037 path1 status active device sdu with status active\
    \ path2\n        status active device sdas with status active\nSUCCESS: SSD_E0_S20_805834037\
    \ has both the paths up and active\nRESULT: Disk SSD_E0_S21_805834107 path1 status\
    \ active device sdv with status active path2\n        status active device sdat\
    \ with status active\nSUCCESS: SSD_E0_S21_805834107 has both the paths up and\
    \ active\nRESULT: Disk SSD_E0_S22_805834081 path1 status active device sdw with\
    \ status active path2\n        status active device sdau with status active\n\
    SUCCESS: SSD_E0_S22_805834081 has both the paths up and active\nRESULT: Disk SSD_E0_S23_805834056\
    \ path1 status active device sdx with status active path2\n        status active\
    \ device sdav with status active\nSUCCESS: SSD_E0_S23_805834056 has both the paths\
    \ up and active\n```\n\n任何处于非成功状态的设备都应立即进行评估。所有报告的问题都应得到关注，并且应立即开具 Oracle 支持工单以解决发现的任何问题。"
  raw: '#### OS Disk Storage


    After validating the system, it is also important to look at the disks from the
    OS perspective and ensure that all disks are functioning properly. You can also
    ensure that RAID levels are OK on the box. Setup is similar between ODA V1 and
    X3-2, but ODA X3-2 has more disk space available to the OS.


    Note


    Virtualized ODAs show  virtual disks  mapped to various physical disks. Bare-metal
    ODAs show one-to-one physical mappings.


    Listing 7-7 shows an example of validating the disk storage for an ODA device.


    Listing 7-7. Validating ODA OS Disk Storage (V1 & X3-2)


    `[root@odax32 bin]# ./oakcli validate -c OSDiskStorage`


    `INFO: Checking Operating System Storage`


    `SUCCESS: The OS disks have the boot stamp`


    `RESULT: Raid device /dev/md0 found clean`


    `RESULT: Raid device /dev/md1 found clean`


    `RESULT: Physical Volume   /dev/md1 in VolGroupSys has 370206.05M out of total
    599986.80M`


    `RESULT: Volumegroup   VolGroupSys consist of 1 physical volumes,contains 4 logical
    volumes, has 0 volume snaps with total size of 599986.80M and free space of 370206.05M`


    `RESULT: Logical Volume   LogVolOpt in VolGroupSys Volume group is of size 60.00G`


    `RESULT: Logical Volume   LogVolRoot in VolGroupSys Volume group is of size 30.00G`


    `RESULT: Logical Volume   LogVolSwap in VolGroupSys Volume group is of size 24.00G`


    `RESULT: Logical Volume   LogVolU01 in VolGroupSys Volume group is of size 100.00G`


    `RESULT: Device /dev/mapper/VolGroupSys-LogVolRoot is mounted on / of type ext3
    in (rw)`


    `RESULT: Device /dev/mapper/VolGroupSys-LogVolOpt is mounted on /opt of type ext3
    in (rw)`


    `RESULT: Device /dev/md0 is mounted on /boot of type ext3 in (rw)`


    `RESULT: Device /dev/mapper/VolGroupSys-LogVolU01 is mounted on /u01 of type ext3
    in (rw)`


    `RESULT: / has 7242 MB free out of total 29758 MB`


    `RESULT: /opt has 46985 MB free out of total 59516 MB`


    `RESULT: /boot has 65 MB free out of total 99 MB`


    `RESULT: /u01 has 80271 MB free out of total 99194 MB`


    It is very important to keep an eye on the operating system space. Lack of nonshared
    disk space for various components like the RDBMS or the operating system causes
    serious disruption of service on the appliance. Depending on the configuration
    (bare metal or virtualized), the disk sizing and the spare disk space will be
    different. This will be explained in detail in Chapter 10.


    #### Shared Storage


    Each ODA has storage that is shared between both nodes of the appliance. In ODA
    V1, the shared storage is built into the appliance using storage expanders, whereas
    ODA X3-2 uses an external shelf to add a shared disk to the appliance.


    Validating shared storage is very important in ensuring that all paths are available
    and that there are no issues in the shared disk. Depending on your disk group,
    redundancy level (NORMAL or HIGH) disks can go bad and should be replaced. Disk
    behavior can be monitored via the syslog or ASM Alert Log, but it is important
    to validate and ensure that all paths to the disk are up and functional.


    Listing 7-8 provides an example of storage validation. You can see the active
    disk paths, as well as the names of the logical and physical disk devices.


    Listing 7-8. ODA Shared Storage Validation (V1 & X3-2)


    `[root@odax32 bin]# ./oakcli validate -c SharedStorage`


    `INFO: Checking Shared Storage`


    `RESULT: Disk HDD_E0_S00_373737408 path1 status active device sda with status
    active path2`


            `status active device sdy with status active`


    `SUCCESS: HDD_E0_S00_373737408 has both the paths up and active`


    `RESULT: Disk HDD_E0_S01_373737516 path1 status active device sdb with status
    active path2`


            `status active device sdz with status active`


    `SUCCESS: HDD_E0_S01_373737516 has both the paths up and active`


    `....`


    `....`


    `SUCCESS: HDD_E0_S18_373750584 has both the paths up and active`


    `RESULT: Disk HDD_E0_S19_373760780 path1 status active device sdt with status
    active path2`


            `status active device sdar with status active`


    `SUCCESS: HDD_E0_S19_373760780 has both the paths up and active`


    `RESULT: Disk SSD_E0_S20_805834037 path1 status active device sdu with status
    active path2`


            `status active device sdas with status active`


    `SUCCESS: SSD_E0_S20_805834037 has both the paths up and active`


    `RESULT: Disk SSD_E0_S21_805834107 path1 status active device sdv with status
    active path2`


            `status active device sdat with status active`


    `SUCCESS: SSD_E0_S21_805834107 has both the paths up and active`


    `RESULT: Disk SSD_E0_S22_805834081 path1 status active device sdw with status
    active path2`


            `status active device sdau with status active`


    `SUCCESS: SSD_E0_S22_805834081 has both the paths up and active`


    `RESULT: Disk SSD_E0_S23_805834056 path1 status active device sdx with status
    active path2`


            `status active device sdav with status active`


    `SUCCESS: SSD_E0_S23_805834056 has both the paths up and active`


    Any devices that are not in a successful state should be evaluated immediately.
    Any reported issues should be looked at, and an Oracle support ticket should be
    immediately opened to resolve any problem that is found.'
  trans: "\n#### 操作系统磁盘存储\n\n验证系统后，从操作系统视角检查磁盘并确保所有磁盘运行正常同样重要。您还需要确认设备上的 RAID 级别状态正常。ODA\
