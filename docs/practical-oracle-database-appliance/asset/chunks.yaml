    \ Suite R12.2不支持`<Oracle SID>_<hostname>`[⁹](#A978-1-4302-6266-4_11_Chapter.html#Fn9)\
    \ 值长于22个字符。\n\n**列表11-8. VM配置向导**\n\n```\nEntering non-interactive startup\nStarting\
    \ OVM template configure:\n  network: System host name, e.g., \"localhost.localdomain\"\
    .: oevm1.odalab.com\n  network: Network device to configure, e.g., \"eth0\".:\
    \ eth0\n  network: Activate interface on system boot: yes or no.: yes\n  network:\
    \ Boot protocol: dhcp or static.: static\n  network: IP address of the interface.:\
    \ 10.177.0.61\n  network: Netmask of the interface.: 255.255.0.0\n  network: \
    \  gateway IP address.: 10.177.0.1\n  network: DNS servers separated by comma,\
    \ e.g., \"8.8.8.8,8.8.4.4\".: 8.8.8.8,4.2.2.2\n  authentication: System root password.:\n\
    ```\n\n从Oracle Linux 6 update 4开始的VM模板是使用操作系统的最小安装构建的，这意味着您必须安装相当多的RPM包才能满足e-Business\
    \ Suite的要求。VM模板已预先配置了公共yum仓库，我发现至少在设置阶段允许从ODA访问互联网非常有益，可以加速和简化VM的配置。\n\nMy Oracle\
