  raw: '## RAC Without Tears


    Building RAC clusters that will be stable and meet high-availability requirements
    requires a great deal of up-front planning and work, as well as pre- and post-install
    checks to validate the environments. Besides the RAC install manuals, there are
    additional documents that have to be analyzed:


    *   The RAC generic (MOS 810394.1) and any platform specific starter kits

    *   The RAC FAQ (MOS 220970.1)

    *   Oracle’s support note (MOS 1344678.1) giving steps to stabilize a cluster,
    with platform-specific extensions

    *   The RAC Information Center note (MOS 1452965.2)

    *   Your platform-specific RAC setup recommendations

    *   RAC Known Issues support documents


    In addition, you’ll need to consult any documentation you have that gives advice
    on setting up RAC to support other Oracle products, such as eBusiness Suite and
    ATG Web Commerce.


    There are additional tools you’ll need to learn if you are building your own RAC
    clusters. Oracle has built various tools to help in validating RAC environments,
    such as:


    *   RACcheck (MOS 1268927.1)

    *   Cluster Verify (MOS 316817.1)

    *   RDA MOS 314422.1 and 250262.1 for Database checks


    And, of course, there are all of the OS-specific settings, package requirements,
    and checks. Going through all of this effort on a traditional platform is well
    worth the effort. If you are fortunate, all of this will be documented one time
    and someone will make the effort to keep up with all of the documentation updates
    and RACcheck results to keep the “do it yourself” documentation updated. However,
    doing this takes a lot of time, the right people, a lot of handoffs between departments,
    and a lot of resulting QA work to make sure the work was done right.


    Documenting and distributing complex technical information and training people
    to understand the information is a challenge for most companies, especially smaller
    and midsize companies. Adding to challenges are all of the handoffs between multiple
    teams that are required to implement all of the requirements. Someone may forget
    to route the interconnect traffic to redundant RAC-only switches (which are also
    expensive), or forget to configure Jumbo frames on both the server and switches.
    There can be additional issues related to external vendor software supporting
    IO multipathing. Because all of these scenarios are very real, Oracle has found
    the need to invest in extensive RAC diagnostic facilities.


    Oracle is helping to manage this complexity by extending RACcheck and other tools
    to catch setup issues. However, the conclusion is that there are real reasons
    the people in the Oracle RAC assurance group and Oracle support are very busy
    these days. Engineered systems and ODAs take a lot of the work to correctly deploy
    RAC off your shoulders.


    ODAs provide an answer to all of these challenges by making RAC configurations
    self-contained. There are no external interconnect requirements or instructions
    for making RAC configuration changes outside the standard ODA deployment process.
    If you are concerned about the ability of your company to successfully complete
    all of the engineering work required to build truly high availability RAC clusters,
    then ODAs may help provide a solution. The expertise to successfully deploy RAC
    clusters is greatly reduced. This is a major advantage for companies of all sizes.
    ODAs extend the ability to successfully deploy two-node RAC clusters to the masses,
    which is part of the reason that ODAs are a solution for “RAC Without Tears.”


    RAC One, a two-node RAC cluster, or a single instance database can be deployed
    during an ODA install. ODAs deploy RAC clusters in a matter of hours and according
    to Oracle’s best practices. Oracle builds the physical RAC interconnect into the
    appliance. The quarterly automated patching process simplifies the process for
    keeping the grid/clusterware and Oracle Homes patched with the latest PSU patches
    and bug fixes. These quarterly patches are tested as a complete unit, along with
    the OS and firmware changes, making ODAs a great solution for maintaining ongoing
    RAC stability.


    Note


    The author has discussed RAC installations on non-ODA systems with a number of
    small companies. Many small and midsized companies simply don’t have the resources
    to perform that sort of installation by themselves. This includes the technical
    resources to research all of the RAC requirements and the cost of buying additional
    equipment, such as dedicated RAC switches, for the interconnect traffic.


    While ODAs do a great job deploying and supporting RAC clusters, the need for
    understanding good RAC design best practices for eliminating contention between
    nodes is still something that teams deploying RAC on any platform need to be aware
    of. Also, a two-node cluster requires that one server is able to handle the entire
    processing load during a node switchover. Supplementing RAC with Data Guard can
    alleviate the failover capacity concerns.'
  trans: '## 轻松搞定 RAC


    构建稳定且满足高可用性要求的 RAC 集群需要大量的前期规划和工作，以及安装前后的环境验证检查。除了 RAC 安装手册外，还需要分析其他文档：


    *   [RAC 通用文档 (MOS 810394.1)](https://support.oracle.com) 和任何特定平台的入门套件

    *   [RAC FAQ (MOS 220970.1)](https://support.oracle.com)

    *   [Oracle 的支持说明 (MOS 1344678.1)](https://support.oracle.com)，提供了稳定集群的步骤，并附有平台特定的扩展

    *   [RAC 信息中心说明 (MOS 1452965.2)](https://support.oracle.com)

    *   您特定平台的 RAC 设置建议

    *   RAC 已知问题支持文档


    此外，您还需要查阅任何能提供关于设置 RAC 以支持其他 Oracle 产品（如 eBusiness Suite 和 ATG Web Commerce）建议的文档。


    如果您要构建自己的 RAC 集群，还需要学习额外的工具。Oracle 构建了各种工具来帮助验证 RAC 环境，例如：


    *   `RACcheck` (MOS 1268927.1)

    *   `Cluster Verify` (MOS 316817.1)

    *   用于数据库检查的 `RDA` (MOS 314422.1 和 250262.1)


    当然，还有所有操作系统特定的设置、软件包要求和检查。在传统平台上完成所有这些努力是非常值得的。幸运的话，所有这些内容会被记录一次，并且会有人努力跟上所有的文档更新和
    `RACcheck` 结果，以保持“自己动手”文档的更新。然而，这样做需要大量的时间、合适的人员、部门间大量的交接，以及大量的后续质量保证工作以确保工作正确完成。


    对于大多数公司，尤其是中小型公司来说，记录和分发复杂的技术信息并培训人员理解这些信息是一个挑战。增加挑战的还有实施所有这些要求所需的多团队间的所有交接。有人可能忘记将互联流量路由到冗余的、专用于
    RAC 的交换机（这些交换机也很昂贵），或者忘记在服务器和交换机上都配置巨型帧。还可能存在与支持 IO 多路径的外部供应商软件相关的额外问题。由于所有这些场景都非常真实，Oracle
    发现有必要投资建设广泛的 RAC 诊断设施。


    Oracle 正在通过扩展 `RACcheck` 和其他工具来捕获设置问题，帮助管理这种复杂性。然而，结论是，Oracle RAC 保证组和支持人员如今非常忙碌是有真实原因的。一体化系统和
    ODAs 将正确部署 RAC 的大量工作从您的肩膀上卸下。


    ODA 通过使 RAC 配置自包含，为所有这些挑战提供了一个解决方案。没有外部互联需求或需要在标准 ODA 部署过程之外进行 RAC 配置更改的说明。如果您担心您的公司是否有能力成功完成构建真正高可用性
    RAC 集群所需的所有工程工作，那么 ODA 可能有助于提供一个解决方案。成功部署 RAC 集群所需的专业知识大大减少。这对各种规模的公司都是一个主要优势。ODA
    将成功部署双节点 RAC 集群的能力扩展到大众，这也是 ODA 成为“**轻松搞定 RAC**”解决方案的部分原因。


    在 ODA 安装过程中，可以部署 RAC One、双节点 RAC 集群或单实例数据库。ODA 在几小时内根据 Oracle 的最佳实践部署 RAC 集群。Oracle
    在设备内置了物理 RAC 互联。季度自动补丁流程简化了为 `grid/clusterware` 和 Oracle Homes 打上最新 PSU 补丁和错误修复的过程。这些季度补丁与操作系统和固件更改一起作为一个完整的单元进行测试，使
    ODA 成为维护持续 RAC 稳定性的绝佳解决方案。


    > 注意：作者曾与多家小型公司讨论过非 ODA 系统上的 RAC 安装。许多中小型公司根本没有资源自己执行此类安装。这包括研究所有 RAC 要求的技术资源，以及为互联流量购买额外设备（如专用
    RAC 交换机）的成本。


    虽然 ODA 在部署和支持 RAC 集群方面表现出色，但对于任何平台上的 RAC 部署团队来说，理解良好的 RAC 设计最佳实践以消除节点间的争用仍然是需要了解的。此外，双节点集群要求一个服务器能够在节点切换期间处理整个处理负载。用
    `Data Guard` 补充 RAC 可以缓解故障转移容量方面的担忧。


    ```

    if (condVar > someVal) {console.log("xxx")}

    ```'
- fmt: '# High Availability Without Tears


    ODAs provide high availability through easy-to-install `RAC` and `RAC One` deployments.
    In addition to provisioning high availability on a single appliance, ODAs make
    it easy to deploy `Data Guard` to extend the high availability solution. These
    deployments can cross data centers to provide geographic protection. Oracle assists
    the `Data Guard` deployment process through `OEM`, one-button ODA `Data Guard`
    deployment scripts, and supplemental documentation focused on deploying `Data
    Guard` on ODAs. In addition to streamlined `Data Guard` deployments, ODAs support
    high availability through higher levels of stability because it is a packaged
    solution tested as a single unit.


    The grid and database portions of ODA patches can be deployed in a rolling fashion.
    At the time of writing, the infrastructure portion of ODA patches requires the
    clusterware to be completely down on both nodes, but this may change in the future.
    `RAC One` provides high availability capabilities for both production and nonproduction
    instances that are designed to run on only one of the two ODA nodes, but can be
    failed over to the second ODA node.


    ODAs jump-start high availability implementations by greatly reducing the expertise
    levels required to deploy a `RAC` solution. This includes eliminating the need
    to perform a `RAC` interconnect design, researching all of the `RAC` requirements
    and best practices, provisioning `ASM`, eliminating all single points of failure,
    and all other aspects of a well-architected `RAC` cluster.


    High availability is also achieved from the deployment of standard, tested configurations
    and the choice of either double or triple mirroring all `ASM` disk extents. The
    loss of a disk doesn’t take the system down. The ODA operating system also implements
    the Oracle Linux unbreakable kernel (`UEK`). ODAs are supported by a dedicated
    Oracle engineered system support team that has an in-depth knowledge of the platform.


    The majority of the hardware components are redundant. An ODA has two server nodes
    and redundant power supplies. The system interconnects between the system components
    are redundant and are implemented by `SAS` cables in the current X3-2 model.


    Disk replacements are easy to perform on an ODA. Simply flip a switch on the front
    of the storage unit, pull the drive out, slide the new drive in, and flip the
    switch back.


    ODAs reduce the number of moving parts needed to implement high availability.
    Fewer moving parts and fewer handoffs result in higher availability in most cases.


    There are a number of high availability deployment patterns:

    *   Active-Active. This pattern is implemented as `RAC` deployed on an ODA, providing
    the ability to load balance processing across two nodes and failover between the
    two servers.

    *   Active-Passive. This pattern is implemented through `RAC One`, `RAC`, and/or
    `Data Guard`. Processing is configured to run on a single node. Failover is supported
    by `RAC One` or `RAC` within an ODA. Failover across ODAs, including the ability
    to failover across geographic distances, is handled by `Data Guard`.


    Achieving high availability requires additional designs, such as `RAC` services,
    and role-based services if `Data Guard` is part of the solution. The effectiveness
    of your high availability implementation will be directly proportional to the
    amount of design and testing that go into the solution.


    # Costs and Value Proposition


    ODAs do not fit the traditional build vs. buy purchasing model. A company can
    certainly choose to build their own commodity hardware-based infrastructure. However,
    the typical company doesn’t have the resources to build its own engineered system.
    Regardless, check out the Oracle "build vs. buy" ODA videos. You’ll find some
    videos on the main Oracle ODA product page and Oracle’s YouTube channel detailing
    the ease of deployment and the reasons why you want to give serious consideration
    to the value proposition of buying a better, prepackaged solution. Some of the
    videos have an element of humor, so they are very viewable. The content is dynamic,
    so we’re not including any web links because they are subject to change. However,
    finding them is easy enough.


    From a hardware perspective, you get a lot of resources when you purchase an ODA.
    For the current X3-2 model, this includes two servers with 256G memory each, with
    a total of 32 cores, and a lot of storage. The current storage volume is 18T of
    raw disk, which can be deployed as approximately 9T usable double mirrored, or
    6T usable triple mirrored. The storage can be doubled again to 36T of raw storage
    with a storage expansion rack. The ODA Getting Started manual details the exact
    amount of usable storage, depending on the deployment options that are selected.


    However, the secret sauce of the ODA is not the hardware. The secret sauce of
    an ODA is the software. The ingredients include `RAC` deployments in hours, the
    automated patching of all tiers (`BIOS`, `firmware`, `OS`, `ILOM`, `grid`, `database`)
    resulting in systems that are kept up-to-date, stable, and compliant. The ODA
    hardware—with the standard, embedded Oracle hardware support facilities and accompanied
    by a lot of value-added management software—offers a great value proposition.
    Benefits include the following:

    *   ODAs come with an embedded validation toolkit (`oakcli`—Oracle appliance kit
    command-line interface). `oakcli` contains a full set of diagnostic and management
    utilities to maintain the "keep it simple" management theme of ODAs.

    *   An ODA allows you to cap the licensing and resources that are deployed on
    the hardware in a "pay as you grow model" vs. paying for all of the capacity and
    licensing up front. Additional capacity is enabled through applying a key.

    *   The prepackaged software and deployment model provides the ability to deploy
    a standardized database platform across your database portfolio. ODAs are a solution
    to the traditional model of building servers and databases by hand, resulting
    in a data center full of "totem poles," where no two totem poles look the same.


    There is no question that the ODA standardized deployment model lowers management
    and administration costs. This is in part due to the reduced number of build steps
    and the reduction in the number of people and teams that need to become involved,
    as well as reducing all of the handoffs between teams. After an ODA is deployed,
    the unified nature of the system and platform-specific automations lower ongoing
    administration costs. The ongoing administrative savings come from the combination
    of reducing the number of teams needed to support an ODA, the platform’s stability,
    automated patching of all of the appliance components, a lower number of moving
    parts, server and component redundancy, appliance kit automation, and the embedded
    support facilities, including `ASR` and the `ILOM`.


    The rapid setup and standardized model is an excellent building block for `DBaaS`
    or cloud services. The process to create new single instance, `RAC One` and `RAC`
    databases on an ODA has been reduced to 15 minutes. ODAs are engineered systems
    that can be deployed by companies of any size. ODAs often serve as low-cost lower–life
    cycle environments for Exadata, as well as an entry point and starting success
    story for companies that want to invest in Exadata in the long term.'
