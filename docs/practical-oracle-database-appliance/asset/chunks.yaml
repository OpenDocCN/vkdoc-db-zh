  raw: '### Oracle Database Appliance V1


    To date, Oracle has shipped more than 1,000 Oracle Database Appliances.[¹](#A978-1-4302-6266-4_1_Chapter.html#Fn1)
    The original ODA is a complete unified box solution that contains two 2U Sun M4370
    servers, along with storage and networking components. The total size of the ODA
    V1 is 4U in datacenter rack terms. Figures [1-2](#A978-1-4302-6266-4_1_Chapter.html#Fig2)
    and [1-3](#A978-1-4302-6266-4_1_Chapter.html#Fig3) show the front and back of
    the appliance, respectively, and highlight the simplicity of the ODA’s design.


    ![A978-1-4302-6266-4_1_Fig3_HTML.jpg](A978-1-4302-6266-4_1_Fig3_HTML.jpg)


    Figure 1-3.


    The back of the Oracle Database Appliance V1


    ![A978-1-4302-6266-4_1_Fig2_HTML.jpg](A978-1-4302-6266-4_1_Fig2_HTML.jpg)


    Figure 1-2.


    The front of the Oracle Database Appliance V1


    Each ODA unit consists of two physical servers, and each physical server consists
    of a server node and an Integrated Lights Out Management (ILOM) component. [Chapter
    2](#A978-1-4302-6266-4_2_Chapter.html) delves into detail about the ILOM and explains
    the importance of the ILOM in the ODA unit. Table [1-1](#A978-1-4302-6266-4_1_Chapter.html#Tab1)
    lists the specifications of the ODA V1 from the Oracle Database Appliance Datasheet.
    (My Oracle Support Note 1385831.1 provides the same information.)


    Table 1-1.


    Oracle Database Appliance V1 Specs


    | Component | Specification |

    | --- | --- |

    | CPU | 2x 6-core Intel Xeon X5675 3.07GHz |

    | Memory | 96GB RAM (12 x DDR3-1333 8GB DIMMs) |

    | Network | 2x 10GbE (SFP+) PCIe card 6x 1GbE PCIe card 2x 1GbE (Intel 82571)
    onboard integrated redundant cluster interconnect |

    | Internal Storage | 2x 500GB SATA - for operating system 1x 4GB USB internal
    |

    | RAID Controller | 2x LSI SAS9211-8i SAS HBA |

    | Shared Storage | 20x 600GB - 3.5" SAS 15k RPM HDD (Seagate Cheetah) - for RDBMS
    DATA (any slot except the top row of disks) 4x 73GB - 3.5" SAS2 SSDs - for RDBMS
    REDO (slot in the top row of four disks)SSD from STEC (ZeusIOPS - multilevel cell
    (MLC) version with SAS interface) |

    | Operating System | Oracle Enterprise Linux 5.5 (on ODA software version 2.1),
    5.8 (on ODA software version 2.2) x86_64 |


    The ODA comes with a very powerful Intel Xeon processor, as well as enough memory
    and storage to accommodate a variety of Online Transaction Processing( OLTP) and
    some smaller data warehouse workloads. The network interconnect is built into
    the appliance, which removes the need for a switch for the interconnect for communication
    between the nodes. In terms of storage, depending on the ODA software version
    and redundancy layer, you can have between 4 and 6 terabytes (TB) of space.


    Each ODA comes two 500GB drives per server node, which are mirrored and used for
    the OS, as well as software that hosts the OS, clusterware, and the Oracle Database
    homes (250GB is unallocated). There are twenty 600GB SAS drives per appliance
    and four 73GB SSDs for online redo only. The shared disks on the ODA are connected
    via two LSI controllers, which are connected to an onboard SAS expander. Each
    SAS expander, in turn, is connected to 12 of the hard disks in the ODA. Oracle
    uses Linux multipathing to avoid disk-path failures. Solid-state drives (SSD)
    have been added for redo to overcome rotating disk latency, because the controller
    of the rotating disk has no cache. Disk sizing on the ODA depends on many factors,
    including the version of the ODA software that is running on the appliance. Table
    [1-2](#A978-1-4302-6266-4_1_Chapter.html#Tab2) shows the various disk configurations
    and configuration options that are supported on the ODA.


    Table 1-2.


    ODA Disk Configurations


    | Configuration Option | Disk Group | Type/Redundancy | Backup Type | Space Available
    (GB) | Software Version Supported |

    | --- | --- | --- | --- | --- | --- |

    | 1 | DATA | HIGH | External | 3200 | All versions |

    | 1 | RECO | HIGH | External | 488 | All versions |

    | 1 | REDO | HIGH | None | 91 | All versions |

    | 2 | DATA | HIGH | Local | 1600 | All versions |

    | 2 | RECO | HIGH | Local | 2088 | All versions |

    | 2 | REDO | HIGH | None | 91 | All versions |

    | 3 | DATA | NORMAL | External | 4800 | 2.4 and above |

    | 3 | RECO | NORMAL | External | 733 | 2.4 and above |

    | 3 | REDO | HIGH | External | 91 | 2.4 and above |

    | 4 | DATA | NORMAL | Local | 2400 | 2.4 and above |

    | 4 | RECO | NORMAL | Local | 3133 | 2.4 and above |

    | 4 | REDO | NORMAL | None | 91 | 2.4 and above |


    Table [1-2](#A978-1-4302-6266-4_1_Chapter.html#Tab2) illustrates various disk
    configuration options supported by the ODA. As you can see, the space has approximately
    4TB usable due to all disk groups being triple-mirrored (high redundancy) in configuration
    options 1 and 2\. Depending on which configuration you chose, you will have more
    space in DATA or RECO disk groups.


    Oracle Database Appliance 2.4 introduced the option to allow mirrored (normal
    redundancy) disk groups for DATA and RECO. This is highlighted in Table [1-2](#A978-1-4302-6266-4_1_Chapter.html#Tab2)
    as configuration options 3 and 4\. This was done primarily to allow customers
    the choice of space based on the environment that the ODA is being deployed. Typically,
    the recommendation is to deploy mirroring (normal redundancy) on development/test
    systems.


    The ODA runs Oracle Enterprise Linux OS with support only for the Unbreakable
    Enterprise Kernel (UEK) as of software version 2.2\. The following is a snapshot
    of ODA software version 2.6:


    `Linux oda01 2.6.32-300.32.5.el5uek #1 SMP Wed Oct 31 22:06:21 PDT 2012 x86_64
    x86_64 x86_64 GNU/Linux`


    `Enterprise Linux Enterprise Linux Server release 5.8 (Carthage)`


    Looking at the ODA box from the outside, there are a lot of connections that need
    to be made. Figure [1-4](#A978-1-4302-6266-4_1_Chapter.html#Fig4) points out the
    various connections, which are then described in Table [1-3](#A978-1-4302-6266-4_1_Chapter.html#Tab3).
    Oracle also provides an easy scheme for setup. The setup poster is shown in Figure
    [1-5](#A978-1-4302-6266-4_1_Chapter.html#Fig5).


    Table 1-3.


    Oracle Database Appliance Connector Descriptions[²](#A978-1-4302-6266-4_1_Chapter.html#Fn2)


    | Callout | Label | Ethernet | Bond | Description |

    | --- | --- | --- | --- | --- |

    | 1 |   |   |   | Power connectors. |

    | 2 | PCIe 1 | Eth 7, 6, 5, 4 (left to right) | bond1, bond2 | Eth 4 and Eth 5
    are configured as bond1\. Eth 6 and Eth 7 are configured as bond 2\. These ports
    are used for custom configurations or for separate backup, disaster recovery,
    and network management. |

    | 3 | PCIe 0 | Eth 8, Eth 9 | xbond0 | Two 10 GbE ports. In 10 GbE systems, these
    are connected to the public network. |

    | 4 | SerMgt |   |   | Serial connector to Oracle ILOM and system console. |

    | 5 | Net 0, Net 1 | Eth2, Eth3 | bond0 | Two 1 GbE connectors. In 1 GbE systems,
    these are connected to the public network. |

    | 6 | NetMgt |   |   | Ethernet connection for Oracle ILOM. |

    | 7 | USB and Video |   |   | Used for connecting to system console. |

    | 8 |   |   |   | Server Node 0. |

    | 9 |   |   |   | Server Node 1. |


    ![A978-1-4302-6266-4_1_Fig4_HTML.jpg](A978-1-4302-6266-4_1_Fig4_HTML.jpg)


    Figure 1-4.


    Oracle Database Appliance V1 callouts'
