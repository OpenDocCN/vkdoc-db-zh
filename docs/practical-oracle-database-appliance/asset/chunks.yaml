    \            E12B                      Up-to-date\n                HDD_LOCAL \
    \                SA03                      Up-to-date\n                HDD_SHARED\
    \                0B25                      Up-to-date\n                ILOM  \
    \                    3.0.16.22.b r78329        No-update\n                BIOS\
    \                      12010310                  No-update\n                IPMI\
    \                      1.8.10.5                  Up-to-date\n                HMP\
    \                       2.2.6.1                   Up-to-date\n               \
    \ OAK                       2.6.0.0.0                 Up-to-date\n           \
    \     OEL                       5.8                       Up-to-date\n       \
    \         OVM                       3.1.1                     Up-to-date\n   \
    \             TFA                       2.5.1.4                   Up-to-date\n\
    \                GI_HOME                   11.2.0.3.6(16056266,      Up-to-date\n\
    \                                            16083653)\n                DB_HOME\
    \                   11.2.0.3.6(16056266,      Up-to-date\n                   \
    \                         16083653)\n                ASR                     \
    \  Unknown                   4.4\n[root@s1 ∼]#\n```\n\n### 审阅补丁说明\n\n在开始下载补丁之前，最好审阅相关说明，了解已知问题的信息。对于像\
    \ Oracle Database Appliance 这样相对较新的产品来说，这一点尤其重要。对于某些版本，有一些特定的步骤需要完成。这些步骤可能会有变动，因此本章提供的打补丁说明仅供参考。你应该通过阅读补丁包的说明来确认这些说明。\n\
    \nMy Oracle Support 说明“Oracle Database Appliance - 2.X Supported Versions & Known\
    \ Issues (Doc ID 888888.1)”是一个很好的起点。该说明包含了与打补丁相关的有用信息，从“Latest Releases”部分开始，你在其中可以找到最新可用补丁和版本的引用。该说明以“Known\
    \ Issues”部分结束——阅读这部分也非常重要。\n\n审阅“Known Issues”部分，如果任何已知问题影响到你的配置，请做笔记。同一个说明会指引你找到最新的可用补丁包。寻找名称为“ORACLE\
    \ DATABASE APPLIANCE PATCH BUNDLE”的补丁。在 2.7 版本中，该补丁包是“Oracle Database Appliance\
    \ Patch 2.7.0.0.0 Patch 16760967.” 图 8-3 显示了该补丁包在说明中是如何提及的。\n\n![A978-1-4302-6266-4_8_Fig3_HTML.jpg](img/A978-1-4302-6266-4_8_Fig3_HTML.jpg)\n\
    \n图 8-3.\n\n补丁说明“Latest Release”部分中列出的补丁包\n\n在下载补丁之前，请研究随附的 README，并密切关注适用于你配置的主要安装步骤以及“Known\
    \ Issues”部分。记录问题及任何相关的纠正措施。\n\n让我举一个例子说明为什么阅读已知问题列表如此重要。有一个已知问题是，如果 Oracle Database\
    \ Appliance 的一个硬盘驱动器被更换，ASM 可能无法成功启动。这影响到运行 ODA 2.5 之前版本的设备。如果你的系统受影响，请联系 Oracle\
    \ Support 以获取修复程序。你的系统可能不受这个特定问题的影响。然而，还有其他几个问题可能适用于你的配置。在开始实际的打补丁过程之前做好这项准备工作很重要——除非，你确实喜欢在第二天早上老板进办公室之前，惊慌失措地通宵修复损坏的系统。\n\
    \n### 下载补丁包集\n\n下载补丁的 zip 文件时，你可能希望使用你的工作站作为暂存点；或者从可以直接访问 My Oracle Support 的暂存服务器下载。如果可以从\
    \ Oracle Database Appliance 节点直接访问 My Oracle Support，那么你可以使用 `wget` 命令将补丁文件直接下载到\
    \ Oracle Database Appliance。\n\n将文件复制到两个 Oracle Database Appliance 节点上的一个目录中。没有必须使用的特定目录；只需使用符合你组织实践的目录，或者根据你的个人喜好选择一个。在解压阶段，更新补丁会被提取并存储在特定的目录结构下。根据根文件系统中的可用空间，在\
    \ `/tmp` 目录中暂存补丁文件可能不切实际（正如一些补丁包的 README 中所建议的那样）。在我们接下来的示例中，我们使用 `/u01/patch_stage/2.7/`\
    \ 目录。\n"
- fmt: "## 解压补丁包集合\n\n接下来的步骤是让 Oracle Appliance Kit (OAK) 识别补丁包提供的更新，并将其解压到 `/opt/oracle/oak/pkgrepos/`\
    \ 文件系统下。请以 `root` 用户身份在每个 Oracle Database Appliance 节点上执行 `unpack` 命令。以下命令是一个示例（请注意命令可能会有变更，因此应始终参考补丁的\
    \ README 文件以获取正确的语法）：\n\n```\noakcli unpack -package /u01/patch_stage/2.7/p16760967_27000_Linux-x86-64.zip\n\
    ```\n\n## 浏览更新仓库\n\n`unpack` 命令从补丁包文件中提取所有更新，并将其放置在 OAK 仓库 `/opt/oracle/oak/pkgrepos/`\
    \ 下。您可以通过列出目录内容来浏览仓库。要了解仓库中有哪些 Oracle DB 软件版本可用，您可以使用以下命令：\n\n```\n[root@s1 DB]#\
    \ cd /opt/oracle/oak/pkgrepos/orapkgs/DB\n[root@s1 DB]# ls -l\ntotal 16\ndrwxrwxrwx\
    \ 3 root root 4096 Sep  1 13:20 11.2.0.2.10\ndrwxrwxrwx 4 root root 4096 Aug 31\
    \ 14:09 11.2.0.2.11\ndrwxr-xr-x 3 root root 4096 Apr 24 09:57 11.2.0.3.6\ndrwxrwxrwx\
    \ 4 root root 4096 Aug 21 16:16 11.2.0.3.7\n[root@s1 DB]#\n```\n\n或者，执行以下命令列出仓库中存储的补丁组件（及其版本）：\n\
    \n```\n[root@s1 ∼]# tree /opt/oracle/oak/pkgrepos/ -L 3\n/opt/oracle/oak/pkgrepos/\n\
    |-- System\n|   |-- 2.6.0.0.0\n|   |   |-- bin\n|   |   |-- conf\n|   |   `--\
    \ prereqs\n|   |-- 2.7.0.0.0\n|   |   |-- bin\n|   |   |-- conf\n|   |   `-- prereqs\n\
    |   |-- VERSION\n|   `-- system_repos_metadata.xml\n|-- orapkgs\n|   |-- ASR\n\
    |   |   |-- 4.4\n|   |   `-- 4.4.1\n|   |-- DB\n|   |   |-- 11.2.0.2.10\n|   |\
    \   |-- 11.2.0.2.11\n|   |   |-- 11.2.0.3.6\n|   |   `-- 11.2.0.3.7\n|   |-- GI\n\
    |   |   |-- 11.2.0.3.6\n|   |   `-- 11.2.0.3.7\n|   |-- HMP\n|   |   |-- 2.2.6\n\
    |   |   `-- 2.2.6.2\n|   |-- IPMI\n|   |   `-- 1.8.10.5\n|   |-- OAK\n|   |  \
    \ |-- 2.6.0.0.0\n|   |   `-- 2.7.0.0.0\n|   |-- OEL\n|   |   `-- 5.9\n|   |--\
    \ OPATCH\n|   |   `-- 11.2.0.3.0\n|   |-- OVS\n|   |   `-- 2.7.0.0.0\n|   `--\
    \ TFA\n|       |-- 2.5.1.4\n|       `-- 2.5.1.5\n|-- rpms\n|   |-- db4-4.3.29-10.el5_5.2.i386.rpm\n\
    |   |-- gdbm-1.8.0-28.el5.i386.rpm\n|   |-- libXi-1.0.1-4.el5_4.x86_64.rpm\n|\
    \   |-- libXp-1.0.0-8.1.el5.x86_64.rpm\n|   |-- libstdc++-devel-4.1.2-54.el5.i386.rpm\n\
    |   |-- screen-4.0.3-4.el5.x86_64.rpm\n|   `-- screenlog.0\n`-- thirdpartypkgs\n\
    \    `-- Firmware\n        |-- Controller\n        |-- Disk\n        |-- Expander\n\
    \        `-- Ilom\n45 directories, 9 files\n[root@s1 ∼]#\n```\n\n`/opt/oracle/oak/pkgrepos/System/`\
    \ 目录包含描述仓库内容的元数据文件。`system_repos_metadata.xml` 文件是一个 XML 文件，其中包含所有已暂存补丁的引用。`VERSION`\
    \ 文件包含当前的 Oracle Database Appliance 版本号。在系统目录下，每个 Oracle Database Appliance 补丁包都有一个子目录。例如，有名为\
    \ `2.6.0.0.0`、`2.7.0.0.0` 等的子目录。每个补丁包目录包含描述特定补丁及其在仓库中位置的文件。\n\n还有一个 `conf/patch_metadata.txt`\
    \ 文件，其中包含对所有更新的引用。以下是该文件中的一些记录示例：\n\n```\n...\nGI_PATCHES=16742216\nGI_PATCH_DIR=$OAK_REPOS_HOME/pkgrepos/orapkgs/GI/11.2.0.3.7/Patches\n\
    DB_PATCHES=16742216\nDB_PATCH_DIR=$OAK_REPOS_HOME/pkgrepos/orapkgs/DB/11.2.0.3.7/Patches\n\
    ...\n```\n\n您不应手动删除、复制或调整仓库中的文件。应使用 OAK 实用程序来管理文件。然而，了解这些细节是有用的。在应用补丁期间出现问题时，刚才描述的细节可能有助于故障排除。\n\
    \n## 验证目标版本\n\n在每个节点上将补丁包解压到更新仓库后，可以相对轻松地获取将被该补丁更新的 Oracle Database Appliance\
    \ 组件的列表。指定补丁目标版本，发出以下 OAK 命令：\n\n```\n[root@s1 2.7]# /opt/oracle/oak/bin/oakcli\
    \ update -patch  2.7.0.0.0 --verify\nINFO: 2013-08-18 16:41:40: Reading metadata\
    \ . It takes a while...\nWARNING: 2013-08-18 16:41:50: exceptions.IndexError:list\
    \ index out of range\n                Component Name            Installed Version\
    \          Proposed Patch Version\n                ---------------           ------------------\
    \         -----------------\n                Controller                11.05.02.00\
    \                Up-to-date\n                Expander                  0342  \
    \                     Up-to-date\n                SSD_SHARED                E12B\
    \                       Up-to-date\n                HDD_LOCAL                \
    \ SA03                       Up-to-date\n                HDD_SHARED          \
    \      0B25                       Up-to-date\n                ILOM           \
    \           3.0.16.22.b r78329         No-update\n                BIOS       \
    \               12010310                   No-update\n                IPMI   \
    \                   1.8.10.5                   Up-to-date\n                HMP\
    \                       2.2.6.1                    2.2.6.2\n                OAK\
    \                       2.6.0.0.0                  2.7.0.0.0\n               \
    \ OEL                       5.8                        5.9\n                OVM\
    \                       3.1.1                      3.2.3\n                TFA\
    \                       2.5.1.4                    2.5.1.5\n                GI_HOME\
    \                   11.2.0.3.6(16056266,       11.2.0.3.7(16619892,\n        \
    \                                  16083653)                  16742216)\n    \
    \            DB_HOME                   11.2.0.3.6(16056266,       11.2.0.3.7(16619892,\n\
    \                                          16083653)                  16742216)\n\
    [root@s1 2.7]#\n```\n\n在前面的示例中，有七个组件需要更新，包括 Oracle Appliance Kit、Oracle VM Server、Oracle\
    \ Grid Infrastructure 等。补丁包将更新的组件列表是制定停机时间和影响分析的一个良好起点。需要更新的组件数量取决于 Oracle Database\
    \ Appliance 上当前安装的软件、补丁和固件版本，以及您计划升级到的目标版本。\n\n每个 Oracle Database Appliance 补丁包可能会提供一组不同的更新。根据经验，每个新的补丁包都会提供\
    \ Grid Infrastructure 和 Oracle Homes 的最新版本。所有其他组件的交付取决于其他产品的发布日期。\n\n## 补丁执行\n\
    \n准备工作完成后，就该开始补丁执行了。这是应用补丁更新的时候。在此步骤中，您将升级系统，然后是 Grid Infrastructure。让我们首先描述 ODA\
    \ 补丁处理过程存储日志文件的位置。您可以跟踪日志文件以了解补丁实用程序当前正在执行哪些步骤，然后对任何可能出现的问题进行故障排除。"
  raw: '### Unpack the Patch Bundle Set


    The next step is to make the Oracle Appliance Kit (OAK) aware of what updates
    the patch bundle delivers, and to unpack those under the `/opt/oracle/oak/pkgrepos/`
    file system. Execute the `unpack` command as the `root` user on each of the Oracle
    Database Appliance nodes. Use the following command as an example (please note
    that the command is subject to change, so you should always reference your patch’s
    README file for the syntax to be used):


    `oakcli unpack -package /u01/patch_stage/2.7/p16760967_27000_Linux-x86-64.zip`


    ### Browse the Updates Repository


    The unpack command extracts all the updates from the patch bundle file and puts
    them under OAK repository `/opt/oracle/oak/pkgrepos/`. You can browse the repository
    by listing the directories’ content. To get an idea of which Oracle DB software
    versions are available in the repository, you could use the following commands:


    `[root@s1 DB]# cd /opt/oracle/oak/pkgrepos/orapkgs/DB`


    `[root@s1 DB]# ls -l`


    `total 16`


