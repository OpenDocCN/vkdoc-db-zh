    [root@oevm1 ∼]# chkconfig rpcbind on\n[root@oevm1 ∼]# chkconfig nfs on\n[root@oevm1\
    \ ∼]# chkconfig iptables off\n[root@oevm1 ∼]# service rpcbind start\n[root@oevm1\
    \ ∼]# service nfs start\n[root@oevm1 ∼]# service iptables stop\n```\n"
- fmt: "## Use ACFS for the Application Tier Files\n\nUsing ACFS is the only way to\
    \ configure a shared application tier file system without introducing external\
    \ dependencies. Virtualized ODA is configured with a single 50G ACFS volume, which\
    \ is mounted on both ODA Base VMs as `/cloudfs`. The 50G size is not sufficient\
    \ for R12.2 implementations because the disk space requirement for the e-Business\
    \ Suite dual file system is 64G, so it has to be increased. My Oracle Support\
    \ document \"ODA (Oracle Database Appliance): How To Resize CloudFS (Doc ID 1437717.1)\"\
    \ explains how to add and resize the ACFS volumes on ODA. Listing 11-10 shows\
    \ the steps to execute as the grid user on the ODA Base to increase the `/cloudfs`\
    \ from 50G to 150G.\n\nListing 11-10. Resizing the `/cloudfs`\n\n```\n[grid@s1\
    \ ~]$. oraenv\nORACLE_SID = [grid]? +ASM1\nThe Oracle base has been set to /u01/app/grid\n\
    [root@s1 ~]# df -hP /cloudfs\nFilesystem            Size  Used Avail Use% Mounted\
    \ on\n/dev/asm/acfsvol-352   50G  166M   50G   1% /cloudfs\n[grid@s1 ~]$ /sbin/acfsutil\
    \ size +102400m /cloudfs\nacfsutil size: new file system size: 161061273600 (153600MB)\n\
    [grid@s1 ~]$ df -hP /cloudfs\nFilesystem            Size  Used Avail Use% Mounted\
    \ on\n/dev/asm/acfsvol-352  150G  369M  150G   1% /cloudfs\n```\n\nOnce you have\
    \ resized the ACFS volume based on your needs, it’s just a matter of mounting\
    \ it to the VM server using NFS. It might seem a straightforward task to add the\
    \ volume to the ODA Base server in the `/etc/exports` file and `/etc/fstab` file\
    \ on the VM, which would allow you to mount the file system successfully, but\
    \ you have to make sure the mounted file system remains accessible, even if one\
    \ of the ODA Base VMs goes down. Thus, a smarter solution is required.\n\nFirst\
    \ of all, you need to make sure each ODA Base VM can act as the NFS server for\
    \ any of the application tier nodes (you have only one of them at the moment,\
    \ but you know the IP address of the second one already). I’m adding one entry\
    \ for each application tier VM to both ODA Base nodes in `/etc/exports`, as displayed\
    \ in Listing 11-11.\n\nListing 11-11. `/etc/exports` on ODA Base VMs\n\n```\n\
    [root@s1 ~]# cat /etc/exports\n/cloudfs 10.177.0.61(rw,sync,no_root_squash,fsid=1)\n\
    /cloudfs 10.177.0.62(rw,sync,no_root_squash,fsid=1)\n```\n\nThis configuration\
    \ allows you to mount the `/cloudfs` to the application tier servers from any\
    \ of the ODA Base VMs. You can also use virtual IP addresses on the ODA Base VMs\
    \ for the NFS mounts to make sure you can mount NFS volumes, even if one of the\
    \ ODA Base VMs is down and the virtual IP is relocated to the remaining node.\
    \ Listing 11-12 shows the `/etc/fstab` entries for both application tier nodes\
    \ that are used to mount the volumes from ACFS.[^(10)](#A978-1-4302-6266-4_11_Chapter.html#Fn10)\n\
    \nListing 11-12. `/etc/fstab` Entries for the Shared NFS Mount on Both Application\
    \ Tier VMs\n\n```\n[oracle@oevm1 ~]$ grep cloudfs /etc/fstab\ns1-vip:/cloudfs\
    \   /cloudfs    nfs     rw,intr,bg,hard,timeo=600,wsize=32768,rsize=32768,nfsvers=3,tcp,nolock,acregmin=0,acregmax=0\
    \ 0 0\n[oracle@oevm2 ~]$ grep cloudfs /etc/fstab\ns2-vip:/cloudfs   /cloudfs \
    \   nfs     rw,intr,bg,hard,timeo=600,wsize=32768,rsize=32768,nfsvers=3,tcp,nolock,acregmin=0,acregmax=0\
    \ 0 0\n```\n\nOne has to be aware that this is not really a highly available solution\
    \ for the NFS-mounted ACFS volumes on the application tier VMs. Our testing shows\
    \ the mounted file systems can and will still hang after a virtual IP relocation\
    \ happens on the DB nodes. You thus have to be ready to take action to recover\
    \ the services on application tiers too.\n\n## Configure the Virtual IP for the\
    \ Application Tier\n\nThe virtualized ODA platform does not support VM migrations\
    \ from one physical server to the other, which means you need to have two application\
    \ tier VMs—one on each physical server—to ensure the availability of e-Business\
    \ Suite if one of the servers becomes unavailable. As there’s no load balancing\
    \ solution provided for VMs either, the best you can do is use an external load\
    \ balancer to route the traffic to the application tier VMs you’ll configure on\
    \ the ODA. The e-Business Suite–specific configuration for using load balancers\
    \ is explained in \"Using Load-Balancers with Oracle E-Business Suite Release\
    \ 12.2 (Doc ID 1375686.1).\"\n\nIn this chapter, you’ll find out how to use Linux\
    \ `keepalived` [^(11)](#A978-1-4302-6266-4_11_Chapter.html#Fn11) software to improve\
    \ the availability of e-Business Suite if an external load balancer is not available.\
    \ `keepalived` is available on the Oracle Linux 6 public yum repository.\n\nIn\
    \ this scenario, a very simple configuration that only manages a virtual IP address\
    \ will be used. The virtual IP address will be mounted on one of the servers and\
    \ will be configured as the web entry point for the e-Business Suite front-end\
    \ services, this way providing an Active/Passive configuration from an end-user\
    \ perspective.\n\nYou’ll have two application tier nodes in the configuration—`oevm1`\
    \ and `oevm2`—and the virtual IP `10.177.0.60` will be assigned hostname `oevip`.\
    \ Listing 11-13 provides the commands for the installation of `keepalived` and\
    \ shows the content of its configuration file. No configuration changes to `keepalived`\
    \ will be needed after cloning the second application tier node.\n\nListing 11-13. Linux\
    \ `keepalived` Installation and Configuration\n\n```\n[root@oevm1 ~]# yum install\
    \ keepalived\n[root@oevm1 ~]# vi /etc/keepalived/keepalived.conf\n[root@oevm1\
    \ ~]# cat /etc/keepalived/keepalived.conf\nvrrp_instance VI_1 {\ninterface eth0\n\
    state BACKUP\nNOPREEMPT\nvirtual_router_id 1\nvirtual_ipaddress {\n10.177.0.60\n\
    }\n[root@oevm1 ~]# service keepalived start\nStarting keepalived:            \
    \                           [  OK  ]\n```\n\nThis simple configuration ensures\
    \ the virtual IP address `10.177.0.60` is assigned to one of the servers running\
    \ this configuration. `state BACKUP` means there is no preferred server for the\
    \ virtual IP address. `NOPREEMPT` instructs the server not to try to grab the\
    \ virtual IP address at the startup if the IP is already assigned to another server.\
    \ This will ensure bringing up the VM after the failure doesn’t cause downtime\
    \ for the front-end services. Listing 11-14 shows how to check if the virtual\
    \ IP address was allocated to the server (if `keepalived` is used the outputs\
    \ of `ifconfig` don’t report the virtual IP address as assigned to any of the\
    \ interfaces).\n\nListing 11-14. Checking the Virtual IP Address Is Assigned to\
    \ the Application Tier Node\n\n```\n[root@oevm1 ~]# ip addr list dev eth0\n2:\
    \ eth0: <BROADCAST,MULTICAST,UP,LOWER_UP> mtu 1500 qdisc pfifo_fast state UP qlen\
    \ 1000\n    link/ether 00:16:3e:29:ea:12 brd ff:ff:ff:ff:ff:ff\n    inet 10.177.0.61/16\
    \ brd 10.177.255.255 scope global eth0\n    inet 10.177.0.60/32 scope global eth0\n\
    \    inet6 fe80::216:3eff:fe29:ea12/64 scope link\n       valid_lft forever preferred_lft\
    \ forever\n```\n\nThe are many other configuration options for `keepalived`, and\
    \ for the production use one should consider adding settings to monitor the application\
    \ URLs so that the virtual IP would always be located on the node the application\
    \ services are actually running on. One should also set the passwords for the\
    \ communication between the `keepalived` servers to reduce the risks of someone\
    \ stealing the virtual IP address, or even adding a `haproxy` package to configure\
    \ true software load balancing solution for e-Business Suite.\n\n## Installing\
    \ the e-Business Suite\n\nHaving prepared the ODA, it is time to perform the actual\
    \ installation. This is done in two parts. First install the database tier, then\
    \ install the application tier. The hardware configuration and virtualization\
    \ layer you have configured on the ODA is transparent to the e-Business Suite\
    \ installation process, and it does not introduce any complications specific to\
    \ deployments on ODA."
  raw: '### Use ACFS for the Application Tier Files


    Using ACFS is the only way to configure a shared application tier file system
    without introducing external dependencies. Virtualized ODA is configured with
    a single 50G ACFS volume, which is mounted on both ODA Base VMs as `/cloudfs`.
    The 50G size is not sufficient for R12.2 implementations because the disk space
    requirement for the e-Business Suite dual file system is 64G, so it has to be
    increased. My Oracle Support document “ODA (Oracle Database Appliance): How To
    Resize CloudFS (Doc ID 1437717.1)” explains how to add and resize the ACFS volumes
    on ODA. Listing 11-10 shows the steps to execute as the grid user on the ODA Base
    to increase the `/cloudfs` from 50G to 150G.


    Listing 11-10. Resizing the /cloudfs


    `[grid@s1 ∼]$` `. oraenv`


    `ORACLE_SID = [grid] ?` `+ASM1`


    `The Oracle base has been set to /u01/app/grid`


    `[root@s1 ∼]#` `df -hP /cloudfs`


    `Filesystem            Size  Used Avail Use% Mounted on`


    `/dev/asm/acfsvol-352   50G  166M   50G   1% /cloudfs`


    `[grid@s1 ∼]$` `/sbin/acfsutil size +102400m /cloudfs`


    `acfsutil size: new file system size: 161061273600 (153600MB)`


    `[grid@s1 ∼]$` `df -hP /cloudfs`


    `Filesystem            Size  Used Avail Use% Mounted on`


    `/dev/asm/acfsvol-352  150G  369M  150G   1% /cloudfs`


    Once you have resized the ACFS volume based on your needs, it’s just a matter
    of mounting it to the VM server using NFS. It might seem a straightforward task
    to add the volume to the ODA Base server in the `/etc/exports` file and `/etc/fstab`
    file on the VM, which would allow you to mount the file system successfully, but
    you have to make sure the mounted file system remains accessible, even if one
    of the ODA Base VMs goes down. Thus, a smarter solution is required.


    First of all, you need to make sure each ODA Base VM can act as the NFS server
    for any of the application tier nodes (you have only one of them at the moment,
    but you know the IP address of the second one already). I’m adding one entry for
    each application tier VM to both ODA Base nodes in /etc/exports, as displayed
    in Listing 11-11.


    Listing 11-11. /etc/exports on ODA Base VMs


    `[root@s1 ∼]#` `cat /etc/exports`


    `/cloudfs 10.177.0.61(rw,sync,no_root_squash,fsid=1)`


    `/cloudfs 10.177.0.62(rw,sync,no_root_squash,fsid=1)`


    This configuration allows you to mount the `/cloudfs` to the application tier
    servers from any of the ODA Base VMs. You can also use virtual IP addresses on
    the ODA Base VMs for the NFS mounts to make sure you can mount NFS volumes, even
    if one of the ODA Base VMs is down and the virtual IP is relocated to the remaining
    node. Listing 11-12 shows the `/etc/fstab` entries for both application tier nodes
    that are used to mount the volumes from ACFS.[^(10)](#A978-1-4302-6266-4_11_Chapter.html#Fn10)


    Listing 11-12. /etc/fstab Entries for the Shared NFS Mount on Both Application
    Tier VMs


    `[oracle@oevm1 ∼]$` `grep cloudfs /etc/fstab`


    `s1-vip:/cloudfs   /cloudfs    nfs     rw,intr,bg,hard,timeo=600,wsize=32768,rsize=32768,nfsvers=3,tcp,nolock,acregmin=0,acregmax=0
    0 0`


    `[oracle@oevm2 ∼]$` `grep cloudfs /etc/fstab`


    `s2-vip:/cloudfs   /cloudfs    nfs     rw,intr,bg,hard,timeo=600,wsize=32768,rsize=32768,nfsvers=3,tcp,nolock,acregmin=0,acregmax=0
    0 0`


    One has to be aware that this is not really a highly available solution for the
    NFS-mounted ACFS volumes on the application tier VMs. Our testing shows the mounted
    file systems can and will still hang after a virtual IP relocation happens on
    the DB nodes. You thus have to be ready to take action to recover the services
    on application tiers too.


    ### Configure the Virtual IP for the Application Tier


    The virtualized ODA platform does not support VM migrations from one physical
    server to the other, which means you need to have two application tier VMs—one
    on each physical server—to ensure the availability of e-Business Suite if one
    of the servers becomes unavailable. As there’s no load balancing solution provided
    for VMs either, the best you can do is use an external load balancer to route
    the traffic to the application tier VMs you’ll configure on the ODA. The e-Business
    Suite–specific configuration for using load balancers is explained in “Using Load-Balancers
    with Oracle E-Business Suite Release 12.2 (Doc ID 1375686.1).”


    In this chapter, you’ll find out how to use Linux keepalived [^(11)](#A978-1-4302-6266-4_11_Chapter.html#Fn11)
    software to improve the availability of e-Business Suite if an external load balancer
    is not available. Keepalived is available on the Oracle Linux 6 public yum repository.


    In this scenario, a very simple configuration that only manages a virtual IP address
    will be used. The virtual IP address will be mounted on one of the servers and
    will be configured as the web entry point for the e-Business Suite front-end services,
    this way providing an Active/Passive configuration from an end-user perspective.


    You’ll have two application tier nodes in the configuration—oevm1 and oevm2—and
    the virtual IP 10.177.0.60 will be assigned hostname oevip. Listing 11-13 provides
    the commands for the installation of keepalived and shows the content of its configuration
    file. No configuration changes to keepalived will be needed after cloning the
    second application tier node.


    Listing 11-13. Linux keepalived Installation and Configuration


    `[root@oevm1 ∼]#` `yum install keepalived`


    `[root@oevm1 ∼]#` `vi /etc/keepalived/keepalived.conf`


    `[root@oevm1 ∼]#` `cat /etc/keepalived/keepalived.conf`


    `vrrp_instance VI_1 {`


    `interface eth0`


    `state BACKUP`


    `NOPREEMPT`


    `virtual_router_id 1`


    `virtual_ipaddress {`


    `10.177.0.60`


    `}`


    `[root@oevm1 ∼]#` `service keepalived start`


    `Starting keepalived:                                       [  OK  ]`


    This simple configuration ensures the virtual IP address 10.177.0.60 is assigned
    to one of the servers running this configuration. State BACKUP means there is
    no preferred server for the virtual IP address. NOPREEMPT instructs the server
    not to try to grab the virtual IP address at the startup if the IP is already
    assigned to another server. This will ensure bringing up the VM after the failure
    doesn’t cause downtime for the front-end services. Listing 11-14 shows how to
    check if the virtual IP address was allocated to the server (if keepalived is
    used the outputs of `ifconfig` don’t report the virtual IP address as assigned
    to any of the interfaces).


    Listing 11-14. Checking the Virtual IP Address Is Assigned to the Application
    Tier Node


    `[root@oevm1 ∼]#` `ip addr list dev eth0`


    `2: eth0: <BROADCAST,MULTICAST,UP,LOWER_UP> mtu 1500 qdisc pfifo_fast state UP
    qlen 1000`


        `link/ether 00:16:3e:29:ea:12 brd ff:ff:ff:ff:ff:ff`


        `inet 10.177.0.61/16 brd 10.177.255.255 scope global eth0`


        `inet 10.177.0.60/32 scope global eth0`


        `inet6 fe80::216:3eff:fe29:ea12/64 scope link`


           `valid_lft forever preferred_lft forever`


    The are many other configuration options for keepalived, and for the production
    use one should consider adding settings to monitor the application URLs so that
    the virtual IP would always be located on the node the application services are
    actually running on. One should also set the passwords for the communication between
    the keepalived servers to reduce the risks of someone stealing the virtual IP
    address, or even adding a haproxy package to configure true software load balancing
    solution for e-Business Suite.


    ## Installing the e-Business Suite


    Having prepared the ODA, it is time to perform the actual installation. This is
    done in two parts. First install the database tier, then install the application
    tier. The hardware configuration and virtualization layer you have configured
    on the ODA is transparent to the e-Business Suite installation process, and it
    does not introduce any complications specific to deployments on ODA.'
  trans: "\n## 为应用层文件使用 ACFS\n\n使用 ACFS 是在不引入外部依赖的情况下配置共享应用层文件系统的唯一方法。虚拟化 ODA 配置了一个\
    \ 50G 的 ACFS 卷，并将其作为 `/cloudfs` 挂载到两个 ODA 基础虚拟机上。50G 的大小对于 R12.2 实施来说是不够的，因为 e-Business\
    \ Suite 双文件系统所需的磁盘空间是 64G，因此必须增加它。My Oracle Support 文档 “ODA (Oracle Database Appliance):\
    \ How To Resize CloudFS (Doc ID 1437717.1)” 解释了如何在 ODA 上添加和调整 ACFS 卷的大小。代码清单 11-10\
    \ 显示了以 grid 用户身份在 ODA 基础节点上执行的步骤，用于将 `/cloudfs` 从 50G 增加到 150G。\n\n代码清单 11-10. 调整\
    \ `/cloudfs` 的大小\n\n```\n[grid@s1 ~]$. oraenv\nORACLE_SID = [grid]? +ASM1\nThe\
    \ Oracle base has been set to /u01/app/grid\n[root@s1 ~]# df -hP /cloudfs\nFilesystem\
    \            Size  Used Avail Use% Mounted on\n/dev/asm/acfsvol-352   50G  166M\
    \   50G   1% /cloudfs\n[grid@s1 ~]$ /sbin/acfsutil size +102400m /cloudfs\nacfsutil\
    \ size: new file system size: 161061273600 (153600MB)\n[grid@s1 ~]$ df -hP /cloudfs\n\
    Filesystem            Size  Used Avail Use% Mounted on\n/dev/asm/acfsvol-352 \
    \ 150G  369M  150G   1% /cloudfs\n```\n\n一旦根据需求调整了 ACFS 卷的大小，剩下的就是使用 NFS 将其挂载到虚拟机服务器上。在\
    \ `/etc/exports` 文件中添加卷，并在虚拟机上的 `/etc/fstab` 文件中进行配置，这看起来是一个简单的任务，可以让你成功挂载文件系统，但你必须确保即使一个\
    \ ODA 基础虚拟机宕机，挂载的文件系统仍然可以访问。因此，需要一个更智能的解决方案。\n\n首先，你需要确保每个 ODA 基础虚拟机都可以充当任何应用层节点的\
    \ NFS 服务器（目前你只有一个节点，但你已经知道第二个节点的 IP 地址）。我为每个应用层虚拟机在两个 ODA 基础节点的 `/etc/exports`\
    \ 文件中各添加了一个条目，如代码清单 11-11 所示。\n\n代码清单 11-11. ODA 基础虚拟机上的 `/etc/exports`\n\n```\n\
    [root@s1 ~]# cat /etc/exports\n/cloudfs 10.177.0.61(rw,sync,no_root_squash,fsid=1)\n\
    /cloudfs 10.177.0.62(rw,sync,no_root_squash,fsid=1)\n```\n\n此配置允许你从任何 ODA 基础虚拟机将\
    \ `/cloudfs` 挂载到应用层服务器。你还可以在 ODA 基础虚拟机上使用虚拟 IP 地址进行 NFS 挂载，以确保即使一个 ODA 基础虚拟机宕机且虚拟\
    \ IP 重新定位到剩余节点，你也能挂载 NFS 卷。代码清单 11-12 显示了两个应用层节点的 `/etc/fstab` 条目，这些条目用于从 ACFS\
    \ 挂载卷。¹⁰\n\n代码清单 11-12. 两个应用层虚拟机上用于共享 NFS 挂载的 `/etc/fstab` 条目\n\n```\n[oracle@oevm1\
    \ ~]$ grep cloudfs /etc/fstab\ns1-vip:/cloudfs   /cloudfs    nfs     rw,intr,bg,hard,timeo=600,wsize=32768,rsize=32768,nfsvers=3,tcp,nolock,acregmin=0,acregmax=0\
    \ 0 0\n[oracle@oevm2 ~]$ grep cloudfs /etc/fstab\ns2-vip:/cloudfs   /cloudfs \
    \   nfs     rw,intr,bg,hard,timeo=600,wsize=32768,rsize=32768,nfsvers=3,tcp,nolock,acregmin=0,acregmax=0\
    \ 0 0\n```\n\n必须意识到，对于应用层虚拟机上挂载的 NFS ACFS 卷来说，这并非一个真正高可用的解决方案。我们的测试表明，在 DB 节点上发生虚拟\
    \ IP 重新定位后，挂载的文件系统仍有可能并且将会挂起。因此，你也必须准备好采取措施来恢复应用层的服务。\n\n## 为应用层配置虚拟 IP\n\n虚拟化\
    \ ODA 平台不支持将虚拟机从一台物理服务器迁移到另一台，这意味着你需要有两个应用层虚拟机——每个物理服务器上一个——以确保在一台服务器不可用时 e-Business\
    \ Suite 的可用性。由于也没有为虚拟机提供负载均衡解决方案，你能做的最好的事情就是使用外部负载均衡器将流量路由到你将在 ODA 上配置的应用层虚拟机。关于在\
    \ Oracle E-Business Suite Release 12.2 中使用负载均衡器的特定配置在 “Using Load-Balancers with\
    \ Oracle E-Business Suite Release 12.2 (Doc ID 1375686.1)” 中进行了说明。\n\n在本章中，你将了解如何在外部负载均衡器不可用时，使用\
    \ Linux `keepalived`¹¹ 软件来提高 e-Business Suite 的可用性。`keepalived` 可在 Oracle Linux\
    \ 6 公共 yum 仓库中获得。\n\n在此场景中，将使用一个非常简单的配置，仅管理一个虚拟 IP 地址。该虚拟 IP 地址将挂载在其中一台服务器上，并配置为\
    \ e-Business Suite 前端服务的 Web 入口点，从而为最终用户提供主动/被动配置。\n\n你的配置中将有两个应用层节点——`oevm1`\
    \ 和 `oevm2`——虚拟 IP `10.177.0.60` 将分配给主机名 `oevip`。代码清单 11-13 提供了安装 `keepalived`\
    \ 的命令并显示了其配置文件的内容。克隆第二个应用层节点后，无需对 `keepalived` 进行任何配置更改。\n\n代码清单 11-13. Linux\
    \ `keepalived` 的安装与配置\n\n```\n[root@oevm1 ~]# yum install keepalived\n[root@oevm1\
    \ ~]# vi /etc/keepalived/keepalived.conf\n[root@oevm1 ~]# cat /etc/keepalived/keepalived.conf\n\
    vrrp_instance VI_1 {\ninterface eth0\nstate BACKUP\nNOPREEMPT\nvirtual_router_id\
    \ 1\nvirtual_ipaddress {\n10.177.0.60\n}\n[root@oevm1 ~]# service keepalived start\n\
    Starting keepalived:                                       [  OK  ]\n```\n\n这个简单的配置确保虚拟\
    \ IP 地址 `10.177.0.60` 被分配给运行此配置的其中一台服务器。`state BACKUP` 意味着没有用于虚拟 IP 地址的首选服务器。`NOPREEMPT`\
    \ 指示服务器在启动时不要尝试获取虚拟 IP 地址，如果该 IP 已分配给另一台服务器。这将确保在故障后启动虚拟机不会导致前端服务停机。代码清单 11-14\
    \ 显示了如何检查虚拟 IP 地址是否已分配给服务器（如果使用 `keepalived`，`ifconfig` 的输出不会将虚拟 IP 地址报告为分配给任何接口）。\n\
    \n代码清单 11-14. 检查虚拟 IP 地址是否已分配给应用层节点\n\n```\n[root@oevm1 ~]# ip addr list dev eth0\n\
    2: eth0: <BROADCAST,MULTICAST,UP,LOWER_UP> mtu 1500 qdisc pfifo_fast state UP\
    \ qlen 1000\n    link/ether 00:16:3e:29:ea:12 brd ff:ff:ff:ff:ff:ff\n    inet\
    \ 10.177.0.61/16 brd 10.177.255.255 scope global eth0\n    inet 10.177.0.60/32\
    \ scope global eth0\n    inet6 fe80::216:3eff:fe29:ea12/64 scope link\n      \
    \ valid_lft forever preferred_lft forever\n```\n\n`keepalived` 有许多其他配置选项，对于生产用途，应考虑添加设置来监控应用程序\
    \ URL，以便虚拟 IP 始终位于实际运行应用程序服务的节点上。还应设置 `keepalived` 服务器之间通信的密码，以降低他人窃取虚拟 IP 地址的风险，甚至可以添加\
    \ `haproxy` 软件包来为 e-Business Suite 配置真正的软件负载均衡解决方案。\n\n## 安装 e-Business Suite\n\
    \n准备好 ODA 后，就可以进行实际的安装了。安装分为两部分。先安装数据库层，再安装应用层。你在 ODA 上配置的硬件配置和虚拟化层对于 e-Business\
    \ Suite 安装过程是透明的，并且不会引入特定于 ODA 部署的任何复杂情况。\n"
- fmt: '### The Database Tier Installation


    从 e-Business Suite 数据库层安装的角度来看，ODA 上的数据库服务器就是一台 Linux 机器，其安装过程与 Oracle E-Business
    Suite Installation Guide: Using Rapid Install, Release 12.2 (12.2) 中描述的过程并无不同。
    [^(12)](#A978-1-4302-6266-4_11_Chapter.html#Fn12) 由于 ODA 是一个预配置系统，你可以跳过大多数的预安装任务。然而，以下步骤仍然需要执行：


    1.  从 Oracle Software Delivery Cloud 下载安装介质，并将其暂存到附加的 NFS 共享或 ODA Base 上在上一步创建的本地文件系统
    `/u02` 中。

    2.  检查是否有任何 Rapid Install StartCD 补丁 [^(13)](#A978-1-4302-6266-4_11_Chapter.html#Fn13)
    已发布。安装最新的可用补丁以解决新下载安装介质中附带的原始 StartCD 存在的任何已知问题。

    3.  不要创建新的操作系统用户和组。你将使用用户 `oracle` 和组 `dba` 进行安装。在新文件系统上为 e-Business Suite 安装创建
    Oracle Base 目录。


    ```bash

    [root@s1 ∼]# mkdir /u02/prod


    [root@s1 ∼]# chown oracle:dba /u02/prod

    ```


    ODA Base 完全有能力运行 11.2.0.3 数据库，因为它就是为此目的而构建的，但运行 Rapid Install 需要额外的包。请按照 My Oracle
    Support 文档 “How to Download Linux RPM’s Directly on the Oracle Database Appliance
    (ODA) (Doc ID 1461798.1)” 来配置 `odarpm` 工具，并用它来下载并安装以下额外的 RPM 包：`libstdc++-devel.i386`、`gdbm.i386`、`libXp.x86_64`
    和 `libXi.i386`。对于每个包，执行以下命令（此示例展示了 `libstdc++-devel.i386` 包的下载和安装；其他包也需要执行相同的操作）：


    ```bash

    [root@s1 ∼]# cd /opt/oracle/oak/odarpm


    [root@s1 odarpm]# ./getrpm libstdc++-devel


    libstdc++-devel-4.1.2-54.el5.i386.rpm


    RPM libstdc++-devel has been downloaded in this directory /opt/oracle/oak/pkgrepos/rpms/


    [root@s1 odarpm]# rpm -ivh /opt/oracle/oak/pkgrepos/rpms/libstdc++-devel-4.1.2-54.el5.i386.rpm


    Preparing...                ########################################### [100%]


    1:libstdc++-devel        ########################################### [100%]

    ```


    现在，在启动 Rapid Install 之前，请确保记下为准备好的应用层虚拟机设置的主机名和域名，并选择你希望用于应用层文件系统的共享 `/clouefs`
    卷上的基本路径。这些信息必须提供给数据库层上的安装向导。配置细节将被保存在数据库中，并在应用层服务器上启动安装时被检索。


    Rapid Install 向导需要一个配置好的图形环境，并且 `DISPLAY` 变量需要设置为一个可用的虚拟桌面，该桌面可以在本地或远程启动。在接下来的图中，我使用
    VNC 来提供图形环境。安装 R12.2 需要提供两个端口池，因为它包含了用于 e-Business Suite 在线打补丁的双应用层文件系统；所有其他端口号都源自这些端口池。本章描述的安装使用端口池
    11 和 12。不要在 ODA 上选择端口池 0，因为它会导致与 ODA 默认数据库侦听器的端口冲突。


    图 [11-2](#A978-1-4302-6266-4_11_Chapter.html#Fig2) 显示了在 ODA 上安装 e-Business Suite
    R12.2 数据库时 Rapid Install 向导的输入值。请注意 `/u02`（在之前步骤中创建的临时文件系统）被用作所有文件的位置。


    ![A978-1-4302-6266-4_11_Fig2_HTML.jpg](A978-1-4302-6266-4_11_Fig2_HTML.jpg)


    图 11-2. 数据库层的 Rapid Install 参数值


    图 [11-3](#A978-1-4302-6266-4_11_Chapter.html#Fig3) 显示了在准备好的虚拟机上安装 e-Business Suite
    R12.2 应用层时 Rapid Install 向导的输入值。请注意，NFS 挂载的 ACFS 卷 `/clouefs` 被用于安装所有应用层文件。


    ![A978-1-4302-6266-4_11_Fig3_HTML.jpg](A978-1-4302-6266-4_11_Fig3_HTML.jpg)


    图 11-3. 应用层的 Rapid Install 参数值


    ### The Application Tier Installation


    当前版本的 Rapid Install Wizard (12.2.0.46) 在 Oracle Linux 6 上的先决条件检查中存在一个错误。该错误导致安装程序无法启动。需要修改暂存区域中的以下文件以避免此错误：`startCD/Disk1/rapidwiz/jlib/webtier/Scripts/prereq/linux64/refhost.xml`。需要将值
    "`<VERSION VALUE="6"/>`" 替换为 "`<VERSION VALUE="oracle"/>`"。


    在基于 ODA 的虚拟机上安装 e-Business Suite 应用层的过程与在任何其他类型服务器上的过程完全相同。Rapid Install 的配置设置已在数据库层安装期间保存在数据库中。在完成数据库安装后，你需要在应用的虚拟机上启动
    Rapid Install。配置参数不再需要手动输入；你只需将向导指向保存了这些参数的新数据库即可，如图 [11-4](#A978-1-4302-6266-4_11_Chapter.html#Fig4)
    所示。向导将在开始安装过程之前加载并验证所有设置。


    ![A978-1-4302-6266-4_11_Fig4_HTML.jpg](A978-1-4302-6266-4_11_Fig4_HTML.jpg)


    图 11-4. 从数据库检索应用层安装参数


    安装应该成功完成，但在继续进行 ODA 上 e-Business Suite 配置的最后步骤之前，还需要完成 My Oracle Support 文档 “Oracle
    E-Business Suite Release Notes, Release 12.2 (Doc ID 1320300.1)” 和 “Oracle E-Business
    Suite Installation and Upgrade Notes Release 12 (12.2) for Linux x86-64 (Doc ID
    1330701.1)” 中列出的一些安装后任务。这些任务如下：


    1.  打补丁 AS 10g (10.1.2) Oracle Home (Doc ID 1330701.1)。

    2.  应用强制性的 `fs_clone` 修复—Patch 17064510:R12.TXK.C。

    3.  运行 AD Administration 的 Maintain Snapshot 选项以 Create the Snapshot (Doc ID 1320300.1)。

    4.  应用 Consolidated Seed Table Upgrade Patch 16605855:12.2.0。

    5.  应用 12.2.2 AD and TXK Release Update Pack (Doc ID 1560906.1)。

    6.  应用 12.2.2 Suite-Wide Release Update Pack (Doc ID 1506669.1)。


    至此，你拥有一个功能齐全的 e-Business Suite 系统。它肯定还没准备好用于生产环境，因为你仍然需要将其集成到 ODA 中，以便能够使用 ODA
    提供的所有优秀特性。本章的下一节将阐述你需要执行哪些任务来完成配置。


    ## Finalizing the Configuration


    你刚刚完成了在 ODA 上安装 e-Business Suite，但它离为运行你的生产环境而进行的恰当配置还相差甚远。数据库位于 ODA 的一个节点上，使用其本地磁盘（未使用
    ASM 和 RAC）。应用层没有服务器冗余。在本章的这一部分，你将了解如何完成新 e-Business Suite 系统的配置，以使用两个服务器节点、ASM、RAC
    和两个应用服务器虚拟机来确保最佳的可用性。'
  raw: '### The Database Tier Installation


    From the e-Business Suite database tier installation point of view, the database
    server on ODA is just a Linux machine and the installation process doesn’t differ
    from the one described in the Oracle E-Business Suite Installation Guide: Using
    Rapid Install, Release 12.2 (12.2.0). [^(12)](#A978-1-4302-6266-4_11_Chapter.html#Fn12)  As
    the ODA is a preconfigured system, you can skip most of the preinstallation tasks.
    However, the following steps still need to be performed:


    Download the installation media from Oracle Software Delivery Cloud and stage
    the installation on an attached NFS share or local file system `/u02`, which was
    created in the previous step, on ODA Base.   Check if any Rapid Install StartCD
    patches[^(13)](#A978-1-4302-6266-4_11_Chapter.html#Fn13) have been released. Install
    the latest available patch to resolve any known issues with the original StartCD
    included on the freshly downloaded installation media.   Don’t create a new OS
    user and group. You’ll use user “oracle” and group “dba” for the installation.
    Create the Oracle Base directory for the e-Business Suite installation on the
    new file system.


    `[root@s1 ∼]#` `mkdir /u02/prod`


    `[root@s1 ∼]#` `chown oracle:dba /u02/prod`


    ODA Base is fully capable of running a 11.2.0.3 database because it’s built for
    this purpose, but additional packages are needed to run the Rapid Install. Follow
    My Oracle Support note “How to Download Linux RPM’s Directly on the Oracle Database
    Appliance (ODA) (Doc ID 1461798.1)” to configure odarpm tool and use it to download
    and install the following additional RPMs: libstdc++-devel.i386, gdbm.i386, libXp.x86_64
    and libXi.i386\. For each package, execute the following commands (this example
    shows the download and installation of libstdc++-devel.i386 package; the same
    needs to be executed for other packages too):


    `[root@s1 ∼]#` `cd /opt/oracle/oak/odarpm`


    `[root@s1 odarpm]#` `./getrpm libstdc++-devel`


    `libstdc++-devel-4.1.2-54.el5.i386.rpm`


    `RPM libstdc++-devel has been downloaded in this directory /opt/oracle/oak/pkgrepos/rpms/`


    `[root@s1 odarpm]#` `rpm -ivh /opt/oracle/oak/pkgrepos/rpms/libstdc++-devel-4.1.2-54.el5.i386.rpm`


    `Preparing...                ########################################### [100%]`


    `1:libstdc++-devel        ########################################### [100%]`


    Now, before you start the Rapid Install, make sure you write down the hostname
    and domain name for the prepared application tier VM, and choose the base path
    on the shared `/cloudfs` volume you want to use for the application tier file
    system. This information will have to be provided to the installation wizard on
    the database tier. The configuration details will be saved in the database and
    will be retrieved later when the installation is started on the application tier
    servers.


    The Rapid Install wizard requires a graphical environment to be configured and
    the `DISPLAY` variable to be set to an available virtual desktop, which can be
    launched locally or remotely. In the figures to follow, I use VNC to provide the
    graphical environment. The installation of R12.2 requires two port pools to be
    provided because it includes a dual application tier file system needed for e-Business
    Suite online patching; all the other port numbers are derived from the port pools.
    The installation described in this chapter uses port pools 11 and 12\. Don’t choose
    port pool 0 on ODA because it will cause a port conflict with ODA’s default database
    listeners.


    Figure [11-2](#A978-1-4302-6266-4_11_Chapter.html#Fig2) shows the Rapid Install
    wizard input values for the installation of e-Business Suite R12.2 database on
    ODA. Note how `/u02` (the temporary file system created in previous steps) is
    used as the location for all files.


    ![A978-1-4302-6266-4_11_Fig2_HTML.jpg](A978-1-4302-6266-4_11_Fig2_HTML.jpg)


    Figure 11-2.


    Rapid Install parameter values for the database tier


    Figure [11-3](#A978-1-4302-6266-4_11_Chapter.html#Fig3) shows the Rapid Install
    wizard input values for the installation of the e-Business Suite R12.2 application
    tier on the prepared VM. Note how the NFS-mounted ACFS volume `/cloudfs` is used
    for the installation of all application tier files.


    ![A978-1-4302-6266-4_11_Fig3_HTML.jpg](A978-1-4302-6266-4_11_Fig3_HTML.jpg)


    Figure 11-3.


    Rapid Install parameter values for the application tier


    ### The Application Tier Installation


    The current version of the Rapid Install Wizard (12.2.0.46) has a bug in the prerequisites
    checks on Oracle Linux 6\. The bug does not allow the installer to start. The
    following file in the staging area needs to be changed to avoid the bug: `startCD/Disk1/rapidwiz/jlib/webtier/Scripts/prereq/linux64/refhost.xml`.
    The value "`<VERSION VALUE="6"/>`" needs to be replaced with "`<VERSION VALUE="oracle"/>`".


    The installation process of the e-Business Suite application tier on ODA-based
    virtual machines is exactly the same as on any other type of server. The configuration
    settings for the Rapid Install have been saved in the database during the installation
    of the database tier. You need to start the Rapid Install on the application’s
    VM after completing the installation of the database. The configuration parameters
    don’t need to be entered manually anymore; all you have to do is point the wizard
    to the new database where the parameters have been saved, as shown in Figure [11-4](#A978-1-4302-6266-4_11_Chapter.html#Fig4).
    The wizard will load and validate all the settings before starting the installation
    process.


    ![A978-1-4302-6266-4_11_Fig4_HTML.jpg](A978-1-4302-6266-4_11_Fig4_HTML.jpg)


    Figure 11-4.


    Retrieving the application tier installation parameters from the database


    The installation should complete successfully, but there are still a few post
    installation tasks listed in My Oracle Support documents “Oracle E-Business Suite
    Release Notes, Release 12.2 (Doc ID 1320300.1)” and “Oracle E-Business Suite Installation
    and Upgrade Notes Release 12 (12.2) for Linux x86-64 (Doc ID 1330701.1)” that
    need to be completed before proceeding with the finalization steps of e-Business
    Suite configuration on ODA. These tasks are as follows:


    Patch AS 10g (10.1.2) Oracle Home (Doc ID 1330701.1).   Apply the mandatory fs_clone
    fix—Patch 17064510:R12.TXK.C.   Run the AD Administration Maintain Snapshot option
    to Create the Snapshot (Doc ID 1320300.1).   Apply Consolidated Seed Table Upgrade
    Patch 16605855:12.2.0.   Apply the 12.2.2 AD and TXK Release Update Pack (Doc
    ID 1560906.1).   Apply the 12.2.2 Suite-Wide Release Update Pack (Doc ID 1506669.1).
     


    At this moment, you have a fully functional e-Business Suite system. It’s definitely
    not ready for production use yet because you still have to integrate it into the
    ODA so that you will be able to use all the good features that ODA is able to
    provide. The next section of the chapter addresses the tasks that you need to
    perform to finalize the configuration.


    ## Finalizing the Configuration


    You’ve just completed the installation of e-Business Suite on ODA, but it’s still
    far from being properly configured for running your production environment. The
    database resides on one of the ODA nodes on its local disks (ASM and RAC are not
    used). The application tier has no server redundancy. In this portion of the chapter,
    you’ll find out how to finalize the configuration of your new e-Business Suite
    system to use both server nodes, ASM, RAC, and two application server virtual
    machines to ensure the best possible availability.'
  trans: '

    ### 数据库层安装


    从电子商务套件数据库层安装的角度来看，ODA 上的数据库服务器就是一台 Linux 机器，其安装过程与《Oracle 电子商务套件安装指南：使用快速安装，版本
    12.2 (12.2)》中描述的过程并无不同。¹² 由于 ODA 是一个预配置系统，你可以跳过大多数的预安装任务。然而，以下步骤仍然需要执行：


    1.  从 Oracle 软件交付云下载安装介质，并将其暂存到附加的 NFS 共享或 ODA Base 上在上一步创建的本地文件系统`/u02`中。

    2.  检查是否有任何快速安装 StartCD 补丁¹³已发布。安装最新的可用补丁以解决新下载安装介质中附带的原始 StartCD 存在的任何已知问题。

    3.  不要创建新的操作系统用户和组。你将使用用户`oracle`和组`dba`进行安装。在新文件系统上为电子商务套件安装创建 Oracle Base 目录。


    ```bash

    [root@s1 ∼]# mkdir /u02/prod


    [root@s1 ∼]# chown oracle:dba /u02/prod

    ```


    ODA Base 完全有能力运行 11.2.0.3 数据库，因为它就是为此目的而构建的，但运行快速安装需要额外的包。请按照 My Oracle Support
    文档“如何直接在 Oracle 数据库一体机（ODA）上下载 Linux RPM（文档 ID 1461798.1）”来配置`odarpm`工具，并用它来下载并安装以下额外的
    RPM 包：`libstdc++-devel.i386`、`gdbm.i386`、`libXp.x86_64`和`libXi.i386`。对于每个包，执行以下命令（此示例展示了`libstdc++-devel.i386`包的下载和安装；其他包也需要执行相同的操作）：


    ```bash

    [root@s1 ∼]# cd /opt/oracle/oak/odarpm


    [root@s1 odarpm]# ./getrpm libstdc++-devel


    libstdc++-devel-4.1.2-54.el5.i386.rpm


    RPM libstdc++-devel has been downloaded in this directory /opt/oracle/oak/pkgrepos/rpms/


    [root@s1 odarpm]# rpm -ivh /opt/oracle/oak/pkgrepos/rpms/libstdc++-devel-4.1.2-54.el5.i386.rpm


    Preparing...                ########################################### [100%]


    1:libstdc++-devel        ########################################### [100%]

    ```


    现在，在启动快速安装之前，请确保记下为准备好的应用层虚拟机设置的主机名和域名，并选择你希望用于应用层文件系统的共享`/clouefs`卷上的基本路径。这些信息必须提供给数据库层上的安装向导。配置细节将被保存在数据库中，并在应用层服务器上启动安装时被检索。


    快速安装向导需要一个配置好的图形环境，并且`DISPLAY`变量需要设置为一个可用的虚拟桌面，该桌面可以在本地或远程启动。在接下来的图中，我使用 VNC 来提供图形环境。安装
    R12.2 需要提供两个端口池，因为它包含了用于电子商务套件在线打补丁的双应用层文件系统；所有其他端口号都源自这些端口池。本章描述的安装使用端口池 11 和
    12。不要在 ODA 上选择端口池 0，因为它会导致与 ODA 默认数据库侦听器的端口冲突。


    图 11-2 显示了在 ODA 上安装电子商务套件 R12.2 数据库时快速安装向导的输入值。请注意`/u02`（在之前步骤中创建的临时文件系统）被用作所有文件的位置。


    ![A978-1-4302-6266-4_11_Fig2_HTML.jpg](img/A978-1-4302-6266-4_11_Fig2_HTML.jpg)


    图 11-2. 数据库层的快速安装参数值


    图 11-3 显示了在准备好的虚拟机上安装电子商务套件 R12.2 应用层时快速安装向导的输入值。请注意，NFS 挂载的 ACFS 卷`/clouefs`被用于安装所有应用层文件。


    ![A978-1-4302-6266-4_11_Fig3_HTML.jpg](img/A978-1-4302-6266-4_11_Fig3_HTML.jpg)


    图 11-3. 应用层的快速安装参数值


    ### 应用层安装


    当前版本的快速安装向导 (12.2.0.46) 在 Oracle Linux 6 上的先决条件检查中存在一个错误。该错误导致安装程序无法启动。需要修改暂存区域中的以下文件以避免此错误：`startCD/Disk1/rapidwiz/jlib/webtier/Scripts/prereq/linux64/refhost.xml`。需要将值"`<VERSION
    VALUE="6"/>`"替换为"`<VERSION VALUE="oracle"/>`"。


    在基于 ODA 的虚拟机上安装电子商务套件应用层的过程与在任何其他类型服务器上的过程完全相同。快速安装的配置设置已在数据库层安装期间保存在数据库中。在完成数据库安装后，你需要在应用的虚拟机上启动快速安装。配置参数不再需要手动输入；你只需将向导指向保存了这些参数的新数据库即可，如图
    11-4 所示。向导将在开始安装过程之前加载并验证所有设置。


    ![A978-1-4302-6266-4_11_Fig4_HTML.jpg](img/A978-1-4302-6266-4_11_Fig4_HTML.jpg)


    图 11-4. 从数据库检索应用层安装参数


    安装应该成功完成，但在继续进行 ODA 上电子商务套件配置的最后步骤之前，还需要完成 My Oracle Support 文档“Oracle 电子商务套件发行说明，版本
    12.2（文档 ID 1320300.1）”和“Linux x86-64 的 Oracle 电子商务套件安装和升级说明版本 12（12.2）（文档 ID 1330701.1）”中列出的一些安装后任务。这些任务如下：


    1.  打补丁 AS 10g (10.1.2) Oracle Home (文档 ID 1330701.1)。

    2.  应用强制性的`fs_clone`修复—补丁 17064510:R12.TXK.C。

    3.  运行 AD 管理工具的维护快照选项以创建快照（文档 ID 1320300.1）。

    4.  应用合并种子表升级补丁 16605855:12.2.0。

    5.  应用 12.2.2 AD 和 TXK 版本更新包（文档 ID 1560906.1）。

    6.  应用 12.2.2 套件范围版本更新包（文档 ID 1506669.1）。


    至此，你拥有一个功能齐全的电子商务套件系统。它肯定还没准备好用于生产环境，因为你仍然需要将其集成到 ODA 中，以便能够使用 ODA 提供的所有优秀特性。本章的下一节将阐述你需要执行哪些任务来完成配置。


    ## 完成配置


    你刚刚完成了在 ODA 上安装电子商务套件，但它离为运行你的生产环境而进行的恰当配置还相差甚远。数据库位于 ODA 的一个节点上，使用其本地磁盘（未使用 ASM
    和 RAC）。应用层没有服务器冗余。在本章的这一部分，你将了解如何完成新电子商务套件系统的配置，以使用两个服务器节点、ASM、RAC 和两个应用服务器虚拟机来确保最佳的可用性。

    '
- fmt: "# Create a New 11.2 Oracle Home\n\nThe R12.2 installation process delivered\
    \ an 11.2.0.3 database home that was installed in a temporary mount point that\
    \ you created on the local disks in one of the ODA nodes. This configuration is\
    \ fully capable of running the e-Business Suite database, but it’s not recommended,\
    \ as the goal is to minimize any nonstandard changes to the ODA. In this section,\
    \ you’ll find out how to create an ODA-compatible 11.2.0.3 Database Oracle Home\
    \ and how to adjust it for e-Business Suite.\n\n## Create a New Database Home\n\
    \nCreating a new Oracle Home is a very simple process on ODA. Executing the `oakcli\
    \ create dbhome` command creates a new database home on both ODA database nodes\
    \ simultaneously. You’ll also need to provide the version of the database home\
    \ you want to install.[^(14)](#A978-1-4302-6266-4_11_Chapter.html#Fn14) The tool\
    \ will ask you to enter `root`, `oracle` and `sysasm` passwords and will spool\
    \ lots of output; and in the end, it will print out the name of the freshly created\
    \ Oracle Homes:\n\n```\n[root@s1 ~]# oakcli create dbhome -version 11.2.0.3.7\n\
    ...\nINFO: 2013-08-25 12:58:43: Installing a new home: OraDb11203_home3 at /u01/app/oracle/product/11.2.0.3/dbhome_3\n\
    ...\nSUCCESS: 2013-08-25 13:05:21: Successfully created the database home OraDb11203_home3\n\
    ```\n\n## Fix Oracle Binary Permissions\n\nIt’s also important to change the permissions\
    \ of the Oracle binary in the new Oracle Homes on both DB nodes to allow the database\
    \ access to the ASM disks. Log on as the `grid` user on both nodes and run the\
    \ `setasmgidwrap` utility as explained in Listing 11-15.\n\n**Listing 11-15.**\
    \ Fixing the Permissions of the Oracle Binaries\n\n```\n[grid@s1 ~]$ . oraenv\n\
    ORACLE_SID = [grid] ? +ASM1\nThe Oracle base has been set to /u01/app/grid\n[grid@s1\
    \ ~]$ $ORACLE_HOME/bin/setasmgidwrap o=/u01/app/oracle/product/11.2.0.3/dbhome_3/bin/oracle\n\
    ```\n\n## Install the Examples CD\n\nThe next step in the preparation process\
    \ is the installation of the Examples CD on top of the new Oracle Home. This is\
    \ a specific requirement for e-Business Suite, and it has to be completed manually.\
    \ The version of the new Oracle Home is 11.2.0.3.7, so you need to install the\
    \ Examples CD content from the installation package of Oracle Database 11.2.0.3,\
    \ which is available from My Oracle Support as patch `10404530`. Checking the\
    \ Read Me information of the patch reveals the exact file (“disk”) you need to\
    \ download—`p10404530_112030_Linux-x86-64_6of7.zip`. Upload the installation disk\
    \ of the Examples CD to any ODA Base, unzip it, and run the `runInstaller` from\
    \ the examples folder. Again, you’ll need the graphical environment to be able\
    \ to launch the installation wizard. Point the installer to the new Oracle Home\
    \ and it will install the Examples CD content to both Oracle Homes (one on each\
    \ ODA server).\n\n## Create the NLS Directories\n\nThe next step is to create\
    \ the NLS directories by executing the `cr9idata.pl` script on each node. Make\
    \ sure to set the database `ORACLE_HOME` variable before running the script. Listing\
    \ 11-16 shows an example.\n\n**Listing 11-16.** Creating the NLS Directories in\
    \ the New Oracle Home\n\n```\n[oracle@s1 ~]$ export ORACLE_HOME=/u01/app/oracle/product/11.2.0.3/dbhome_3\n\
    [oracle@s1 ~]$ perl $ORACLE_HOME/nls/data/old/cr9idata.pl\nCreating directory\
    \ /u01/app/oracle/product/11.2.0.3/dbhome_3/nls/data/9idata ...\nCopying files\
    \ to /u01/app/oracle/product/11.2.0.3/dbhome_3/nls/data/9idata...\nCopy finished.\n\
    Please reset environment variable ORA_NLS10 to /u01/app/oracle/product/11.2.0.3/dbhome_3/nls/data/9idata!\n\
    ```\n\n## Install Database Patches\n\nThe last and the most complicated step is\
    \ the installation of the required database patches. The list of one-off patches\
    \ can be obtained from My Oracle Support note “Database Preparation Guidelines\
    \ for an E-Business Suite Release 12.2 Upgrade (Doc ID 1349240.1).” The R12.2\
    \ database Oracle Home requires 57 patches; fortunately, not all of them need\
    \ to be applied manually because patch `16342486` (n-apply bundle patch III for\
    \ RDBMS 11.2.0.3.0 with eBS Release 12.2) delivers 51 of all the required patches.\
    \ But the task is especially complex because a PSU is already applied to the new\
    \ Oracle Home and many of the patches conflict with it.\n\nI found the following\
    \ approach effective in dealing with all the patch conflicts:\n\n1.  Apply the\
    \ latest OPatch version first (patch `6880880`).\n2.  Install the bundle patch\
    \ (`16342486`) as instructed by running `opatch napply -skip_subset -skip_duplicate`.\
    \ The installation will fail because of the conflicts; however, the outputs will\
    \ provide useful information about which exact patches conflicts with the CPU\
    \ patch that’s already applied. Listing 11-17 shows the important outputs.\n\n\
    \    **Listing 11-17.** Identifying the Conflicting Patches\n\n    ```\n    [oracle@s1\
    \ 16342486]$ opatch napply -skip_subset -skip_duplicate\n    ...\n    Verifying\
    \ environment and performing prerequisite checks...\n    Checking skip_duplicate\n\
    \    Checking skip_subset\n    These patches will be skipped because they are\
    \ subset patches of some patch(es) in the Oracle Home: 11071989,12764337,12780983,12845115,12849688,12971775,13036331,13070939,13366202,13466801,13499128,13528551,13544396,13923995,14398795,8547978,9858539\n\
    \    OPatch continues with these patches: 12942119,12949905,12949919,12951696,12955701,12965899,12985184,13004894,13023632,13040331,13146719,13258936,13259364,13366268,13388104,13477790,13495307,13602312,13808632,14005749,14013094,14207902,14237793,14296972,14598522,14649883,14698700,14751895,14832335,15967134,16040940,16163946,16342486,4247037\n\
    \    ...\n    Following patches have conflicts: [   16619892   13004894   14727310\
    \   13923374   13259364   14598522   16056266   14275605   13696216   13343438\
    \   14649883   14751895   15967134   16163946 ]\n    Refer to My Oracle Support\
    \ Note 1299688.1 for instructions on resolving patch conflicts.\n    ```\n\n3.\
    \  Install the bundle patch again, but instruct the opatch to apply only the patches\
    \ that don't conflict with the installed PSU this time. This can be done by subtracting\
    \ the patches in the “Following patches have conflicts” list from the “OPatch\
    \ continues with these patches” list spooled by the initial run of the opatch.\
    \ The remaining list of patches should be passed to opatch by using the `-id`\
    \ parameter:\n\n    ```\n    [oracle@s1 16342486]$ opatch napply -skip_subset\
    \ -skip_duplicate -id 12942119,12949905,12949919,12951696,12955701,12965899,12985184,13023632,13040331,13146719,13258936,13366268,13388104,13477790,13495307,13602312,13808632,14005749,14013094,14207902,14237793,14296972,14698700,14832335,16040940,16342486,4247037\n\
    \    ```\n\n4.  Watch as the installation progresses and applies the patches to\
    \ both new Oracle Homes.\n5.  Install the remaining patches from My Oracle Support\
    \ note `1349240.1`. Some of the patches may conflict with the installed PSU again.\n\
    6.  Check the My Oracle Support note “Database Patch Set Update Overlay Patches\
    \ Required for Use with PSUs and Oracle E-Business Suite (Doc ID 1147107.1)” to\
    \ find the replacement patches for the conflicting patches found during the previous\
    \ steps.\n7.  Create service requests for Oracle Support if any of the patch conflicts\
    \ are still unresolved.\n\nThere’s no point in listing all the patches here because\
    \ these PSUs are released quarterly, and Oracle tries to keep up the same pace\
    \ with the new versions of the Oracle Appliance Kit that delivers the new Patch\
    \ Set Updates to the Oracle Database Appliance. It’s also likely the patching\
    \ requirements of R12.2 database home will change because the Release 12.2 version\
    \ of e-Business Suite was recently released. The installation of patches in the\
    \ new home completes this step, and the database can be started from the new home."
  raw: '### Create a New 11.2 Oracle Home


    The R12.2 installation process delivered an 11.2.0.3 database home that was installed
    in a temporary mount point that you created on the local disks in one of the ODA
    nodes. This configuration is fully capable of running the e-Business Suite database,
    but it’s not recommended, as the goal is to minimize any nonstandard changes to
    the ODA. In this section, you’ll find out how to create an ODA-compatible 11.2.0.3
    Database Oracle Home and how to adjust it for e-Business Suite.


    Creating a new Oracle Home is a very simple process on ODA. Executing the `oakcli
    create dbhome` command creates a new database home on both ODA database nodes
    simultaneously. You’ll also need to provide the version of the database home you
    want to install.[^(14)](#A978-1-4302-6266-4_11_Chapter.html#Fn14)  The tool will
    ask you to enter `root`, `oracle` and `sysasm` passwords and will spool lots of
    output; and in the end, it will print out the name of the freshly created Oracle
    Homes:


    `[root@s1 ∼]#` `oakcli create dbhome -version 11.2.0.3.7`


    `...`


    `INFO: 2013-08-25 12:58:43: Installing a new home: OraDb11203_home3 at /u01/app/oracle/product/11.2.0.3/dbhome_3`


    `...`


    `SUCCESS: 2013-08-25 13:05:21: Successfully created the database home OraDb11203_home3`


    It’s also important to change the permissions of the Oracle binary in the new
    Oracle Homes on both DB nodes to allow the database access to the ASM disks. Log
    on as the `grid` user on both nodes and run the `setasmgidwrap` utility as explained
    in Listing 11-15.


    Listing 11-15. Fixing the Permissions of the Oracle Binaries


    `[grid@s1 ∼]$` `. oraenv`


    `ORACLE_SID = [grid] ?` `+ASM1`


    `The Oracle base has been set to /u01/app/grid`


    `[grid@s1 ∼]$` `$ORACLE_HOME/bin/setasmgidwrap o=/u01/app/oracle/product/11.2.0.3/dbhome_3/bin/oracle`


    The next step in the preparation process is the installation of the Examples CD
    on top of the new Oracle Home. This is a specific requirement for e-Business Suite,
    and it has to be completed manually. The version of the new Oracle Home is 11.2.0.3.7,
    so you need to install the Examples CD content from the installation package of
    Oracle Database 11.2.0.3, which is available from My Oracle Support as patch 10404530.
    Checking the Read Me information of the patch reveals the exact file (“disk”)
    you need to download—`p10404530_112030_Linux-x86-64_6of7.zip`. Upload the installation
    disk of the Examples CD to any ODA Base, unzip it, and run the `runInstaller`
    from the examples folder. Again, you’ll need the graphical environment to be able
    to launch the installation wizard. Point the installer to the new Oracle Home
    and it will install the Examples CD content to both Oracle Homes (one on each
    ODA server).


    The next step is to create the NLS directories by executing the `cr9idata.pl`
    script on each node. Make sure to set the database `ORACLE_HOME` variable before
    running the script. Listing 11-16 shows an example.


    Listing 11-16. Creating the NLS Directories in the New Oracle Home


    `[oracle@s1 ∼]$` `export ORACLE_HOME=/u01/app/oracle/product/11.2.0.3/dbhome_3`


    `[oracle@s1 ∼]$` `perl $ORACLE_HOME/nls/data/old/cr9idata.pl`


    `Creating directory /u01/app/oracle/product/11.2.0.3/dbhome_3/nls/data/9idata
    ...`


    `Copying files to /u01/app/oracle/product/11.2.0.3/dbhome_3/nls/data/9idata...`


    `Copy finished.`


    `Please reset environment variable ORA_NLS10 to /u01/app/oracle/product/11.2.0.3/dbhome_3/nls/data/9idata!`


    The last and the most complicated step is the installation of the required database
    patches. The list of one-off patches can be obtained from My Oracle Support note
    “Database Preparation Guidelines for an E-Business Suite Release 12.2 Upgrade
    (Doc ID 1349240.1).” The R12.2 database Oracle Home requires 57 patches; fortunately,
    not all of them need to be applied manually because patch 16342486 (n-apply bundle
    patch III for RDBMS 11.2.0.3.0 with eBS Release 12.2) delivers 51 of all the required
    patches. But the task is especially complex because a PSU is already applied to
    the new Oracle Home and many of the patches conflict with it.


    I found the following approach effective in dealing with all the patch conflicts:


    Apply the latest OPatch version first (patch 6880880).   Install the bundle patch
    (16342486) as instructed by running `opatch napply -skip_subset -skip_duplicate`.
    The installation will fail because of the conflicts; however, the outputs will
    provide useful information about which exact patches conflicts with the CPU patch
    that’s already applied. Listing 11-17 shows the important outputs.


    Listing 11-17. Identifying the Conflicting Patches


    `[oracle@s1 16342486]$` `opatch napply -skip_subset -skip_duplicate`


    `...`


    `Verifying environment and performing prerequisite checks...`


    `Checking skip_duplicate`


    `Checking skip_subset`


    `These patches will be skipped because they are subset patches of some patch(es)
    in the Oracle Home: 11071989,12764337,12780983,12845115,12849688,12971775,13036331,13070939,13366202,13466801,13499128,13528551,13544396,13923995,14398795,8547978,9858539`


    `OPatch continues with these patches: 12942119,12949905,12949919,12951696,12955701,12965899,12985184,13004894,13023632,13040331,13146719,13258936,13259364,13366268,13388104,13477790,13495307,13602312,13808632,14005749,14013094,14207902,14237793,14296972,14598522,14649883,14698700,14751895,14832335,15967134,16040940,16163946,16342486,4247037`


    `...`


    `Following patches have conflicts: [   16619892   13004894   14727310   13923374   13259364   14598522   16056266   14275605   13696216   13343438   14649883   14751895   15967134   16163946
    ]`


    `Refer to My Oracle Support Note 1299688.1 for instructions on resolving patch
    conflicts.`


    Install the bundle patch again, but instruct the opatch to apply only the patches
    that don''t conflict with the installed PSU this time. This can be done by subtracting
    the patches in the “Following patches have conflicts” list from the “OPatch continues
    with these patches” list spooled by the initial run of the opatch. The remaining
    list of patches should be passed to opatch by using the-id parameter:


    `[oracle@s1 16342486]$ opatch napply -skip_subset -skip_duplicate -id 12942119,12949905,12949919,12951696,12955701,12965899,12985184,13023632,13040331,13146719,13258936,13366268,13388104,13477790,13495307,13602312,13808632,14005749,14013094,14207902,14237793,14296972,14698700,14832335,16040940,16342486,4247037`


    Watch as the installation progresses and applies the patches to both new Oracle
    Homes.   Install the remaining patches from My Oracle Support note 1349240.1.
    Some of the patches may conflict with the installed PSU again.   Check the My
    Oracle Support note “Database Patch Set Update Overlay Patches Required for Use
    with PSUs and Oracle E-Business Suite (Doc ID 1147107.1)” to find the replacement
    patches for the conflicting patches found during the previous steps.   Create
    service requests for Oracle Support if any of the patch conflicts are still unresolved.


    There’s no point in listing all the patches here because these PSUs are released
    quarterly, and Oracle tries to keep up the same pace with the new versions of
    the Oracle Appliance Kit that delivers the new Patch Set Updates to the Oracle
    Database Appliance. It’s also likely the patching requirements of R12.2 database
    home will change because the Release 12.2 version of e-Business Suite was recently
    released. The installation of patches in the new home completes this step, and
    the database can be started from the new home.'
  trans: "\n# 创建新的 11.2 Oracle 主目录\n\nR12.2 安装过程提供了一个 11.2.0.3 数据库主目录，该主目录安装在你为 ODA\
    \ 节点之一的本地磁盘创建的临时挂载点上。此配置完全能够运行电子商务套件数据库，但不推荐这样做，因为我们的目标是尽量减少对 ODA 的任何非标准更改。在本节中，你将了解如何创建一个与\
    \ ODA 兼容的 11.2.0.3 数据库 Oracle 主目录，以及如何为其调整以用于电子商务套件。\n\n## 创建新的数据库主目录\n\n在 ODA\
    \ 上创建新的 Oracle 主目录是一个非常简单的过程。执行 `oakcli create dbhome` 命令即可同时在两个 ODA 数据库节点上创建新的数据库主目录。你还需要提供要安装的数据库主目录的版本。¹⁴\
    \ 该工具将要求你输入 `root`、`oracle` 和 `sysasm` 密码，并将输出大量信息；最后，它将打印出新创建的 Oracle 主目录的名称：\n\
    \n```\n[root@s1 ~]# oakcli create dbhome -version 11.2.0.3.7\n...\nINFO: 2013-08-25\
    \ 12:58:43: Installing a new home: OraDb11203_home3 at /u01/app/oracle/product/11.2.0.3/dbhome_3\n\
    ...\nSUCCESS: 2013-08-25 13:05:21: Successfully created the database home OraDb11203_home3\n\
    ```\n\n## 修复 Oracle 二进制文件权限\n\n更改两个数据库节点上新 Oracle 主目录中 Oracle 二进制文件的权限以允许数据库访问\
    \ ASM 磁盘也很重要。在两个节点上以 `grid` 用户身份登录，并如清单 11-15 所示运行 `setasmgidwrap` 实用程序。\n\n**清单\
    \ 11-15.** 修复 Oracle 二进制文件的权限\n\n```\n[grid@s1 ~]$ . oraenv\nORACLE_SID = [grid]\
    \ ? +ASM1\nThe Oracle base has been set to /u01/app/grid\n[grid@s1 ~]$ $ORACLE_HOME/bin/setasmgidwrap\
    \ o=/u01/app/oracle/product/11.2.0.3/dbhome_3/bin/oracle\n```\n\n## 安装示例光盘\n\n\
    准备过程的下一步是在新的 Oracle 主目录之上安装示例光盘。这是电子商务套件的特定要求，必须手动完成。新的 Oracle 主目录版本是 11.2.0.3.7，因此你需要从\
    \ Oracle Database 11.2.0.3 的安装包中安装示例光盘内容，该安装包可从 My Oracle Support 作为补丁 `10404530`\
    \ 获取。查看该补丁的“自述文件”信息会揭示你需要下载的确切文件（“磁盘”）——`p10404530_112030_Linux-x86-64_6of7.zip`。将示例光盘的安装磁盘上传到任意\
    \ ODA Base，解压缩，然后从 `examples` 文件夹运行 `runInstaller`。同样，你需要图形环境才能启动安装向导。将安装程序指向新的\
    \ Oracle 主目录，它将把示例光盘内容安装到两个 Oracle 主目录（每个 ODA 服务器一个）。\n\n## 创建 NLS 目录\n\n下一步是通过在每个节点上执行\
    \ `cr9idata.pl` 脚本来创建 NLS 目录。确保在运行脚本前设置好数据库 `ORACLE_HOME` 变量。清单 11-16 显示了一个示例。\n\
    \n**清单 11-16.** 在新的 Oracle 主目录中创建 NLS 目录\n\n```\n[oracle@s1 ~]$ export ORACLE_HOME=/u01/app/oracle/product/11.2.0.3/dbhome_3\n\
    [oracle@s1 ~]$ perl $ORACLE_HOME/nls/data/old/cr9idata.pl\nCreating directory\
    \ /u01/app/oracle/product/11.2.0.3/dbhome_3/nls/data/9idata ...\nCopying files\
    \ to /u01/app/oracle/product/11.2.0.3/dbhome_3/nls/data/9idata...\nCopy finished.\n\
    Please reset environment variable ORA_NLS10 to /u01/app/oracle/product/11.2.0.3/dbhome_3/nls/data/9idata!\n\
    ```\n\n## 安装数据库补丁\n\n最后也是最复杂的步骤是安装所需的数据库补丁。一次性补丁列表可以从 My Oracle Support 的注释“Database\
    \ Preparation Guidelines for an E-Business Suite Release 12.2 Upgrade (Doc ID\
    \ 1349240.1)”中获取。R12.2 数据库 Oracle 主目录需要 57 个补丁；幸运的是，并非所有补丁都需要手动应用，因为补丁 `16342486`（用于带有\
    \ eBS Release 12.2 的 RDBMS 11.2.0.3.0 的 n-apply 捆绑补丁 III）提供了所有必需补丁中的 51 个。但此任务尤其复杂，因为新的\
    \ Oracle 主目录已经应用了一个 PSU，而许多补丁与它冲突。\n\n我发现以下方法在处理所有补丁冲突时非常有效：\n\n1.  首先应用最新的 OPatch\
    \ 版本（补丁 `6880880`）。\n2.  按照说明运行 `opatch napply -skip_subset -skip_duplicate` 来安装捆绑补丁\
    \ (`16342486`)。安装将因冲突而失败；然而，输出将提供有关哪些具体补丁与已安装的 CPU 补丁冲突的有用信息。清单 11-17 显示了重要的输出。\n\
    \n    **清单 11-17.** 识别冲突的补丁\n\n    ```\n    [oracle@s1 16342486]$ opatch napply\
    \ -skip_subset -skip_duplicate\n    ...\n    Verifying environment and performing\
    \ prerequisite checks...\n    Checking skip_duplicate\n    Checking skip_subset\n\
    \    These patches will be skipped because they are subset patches of some patch(es)\
    \ in the Oracle Home: 11071989,12764337,12780983,12845115,12849688,12971775,13036331,13070939,13366202,13466801,13499128,13528551,13544396,13923995,14398795,8547978,9858539\n\
    \    OPatch continues with these patches: 12942119,12949905,12949919,12951696,12955701,12965899,12985184,13004894,13023632,13040331,13146719,13258936,13259364,13366268,13388104,13477790,13495307,13602312,13808632,14005749,14013094,14207902,14237793,14296972,14598522,14649883,14698700,14751895,14832335,15967134,16040940,16163946,16342486,4247037\n\
    \    ...\n    Following patches have conflicts: [   16619892   13004894   14727310\
    \   13923374   13259364   14598522   16056266   14275605   13696216   13343438\
    \   14649883   14751895   15967134   16163946 ]\n    Refer to My Oracle Support\
    \ Note 1299688.1 for instructions on resolving patch conflicts.\n    ```\n\n3.\
    \  再次安装捆绑补丁，但这次指示 opatch 仅应用与已安装 PSU 没有冲突的补丁。这可以通过从初始运行 opatch 时输出的“OPatch continues\
    \ with these patches”列表中减去“Following patches have conflicts”列表中的补丁来完成。剩余的补丁列表应通过\
    \ `-id` 参数传递给 opatch：\n\n    ```\n    [oracle@s1 16342486]$ opatch napply -skip_subset\
    \ -skip_duplicate -id 12942119,12949905,12949919,12951696,12955701,12965899,12985184,13023632,13040331,13146719,13258936,13366268,13388104,13477790,13495307,13602312,13808632,14005749,14013094,14207902,14237793,14296972,14698700,14832335,16040940,16342486,4247037\n\
    \    ```\n\n4.  观察安装进度，并将补丁应用到两个新的 Oracle 主目录。\n5.  从 My Oracle Support 注释 `1349240.1`\
    \ 安装剩余的补丁。其中一些补丁可能再次与安装的 PSU 冲突。\n6.  检查 My Oracle Support 注释“Database Patch Set\
    \ Update Overlay Patches Required for Use with PSUs and Oracle E-Business Suite\
    \ (Doc ID 1147107.1)”，为在前几步中发现的冲突补丁查找替换补丁。\n7.  如果任何补丁冲突仍未解决，请为 Oracle Support\
    \ 创建服务请求。\n\n在这里列出所有补丁没有意义，因为这些 PSU 是每季度发布的，并且 Oracle 试图跟上提供新的 Oracle 数据库设备补丁集更新的\
    \ Oracle Appliance Kit 新版本的节奏。R12.2 数据库主目录的补丁要求也很可能发生变化，因为电子商务套件的 Release 12.2\
    \ 版本是最近才发布的。在新主目录中安装补丁即完成此步骤，然后可以从新主目录启动数据库。\n"
- fmt: '### Configure the New Oracle Home


    AutoConfig manages the configuration of the Oracle Home in an e-Business Suite
    environment. It is not enough to copy initialization and Net services’ configuration
    files from the existing database home to the new one to start using it. A few
    additional steps need to be taken to implement the AutoConfig in the new Oracle
    Home. You will use a set of tools delivered by e-Business Suite to clone the configuration
    of the old home (referenced as the `OLD_OH` later in the text) to the new home
    (referenced as the `NEW_OH`).


    #### Run the adpreclone.pl utility to capture the configuration details

    Run the `adpreclone.pl` utility to capture the configuration details of the existing
    Oracle Home and save them in the `$OLD_OH/appsutil` directory. Then stop the listener
    and shut down the database. Here are the commands to execute this step:


    ```

    [oracle@s1 11.2.0]$ . $OLD_OH/PROD_s1.env

    [oracle@s1 ∼]$ cd $OLD_OH/appsutil/scripts/$CONTEXT_NAME

    [oracle@s1 PROD_s1]$ perl adpreclone.pl dbTier

    [oracle@s1 PROD_s1]$ ./addlnctl.sh stop PROD

    [oracle@s1 PROD_s1]$ ./addbctl.sh stop immediate

    ```


    #### Copy the appsutil directory and rename the context file

    Copy the `appsutil` directory from the old Oracle Home to the new one and rename
    the existing database context file because the same filename needs to be used
    for the new context file. For example:


    ```

    [oracle@s1 ∼]$ cp -rp $OLD_OH/appsutil $NEW_OH/

    [oracle@s1 ∼]$ cd $NEW_OH/appsutil

    [oracle@s1 appsutil]$ mv PROD_s1.xml PROD_s1.xml.old

    ```


    #### Use adclonectx.pl to create a new context file

    Use `adclonectx.pl` to create a new context file by using the old one as a template.
    This utility will launch a command-line wizard that will ask a few questions about
    the new configuration. Here’s an example run:


    ```

    [oracle@s1 appsutil]$ cd $NEW_OH/appsutil/clone/bin

    [oracle@s1 bin]$ perl adclonectx.pl contextfile=$OLD_OH/appsutil/PROD_s1.xml.old

    Enter the APPS password : notimportant

    Target System Hostname (virtual or normal) [s1] : s1

    Do you want the inputs to be validated (y/n) [n] ? : n

    Target Instance is RAC (y/n) [n] : n

    Target System Database SID : PROD

    Target System Base Directory : /u01/app/oracle

    Oracle OS User [oracle] : oracle

    Oracle OS Group [dba] : dba

    Target System utl_file_dir Directory List : /usr/tmp

    Number of DATA_TOP''s on the Target System [3] : 1

    Target System DATA_TOP Directory 1 : /u02/prod/data

    Target System RDBMS ORACLE_HOME Directory [/u01/app/oracle/11.2.0] : /u01/app/oracle/product/11.2.0.3/dbhome_3

    Do you want to preserve the Display [null] (y/n) : y

    Target System Port Pool [0-99] : 11

    New context path and file name [/u01/app/oracle/product/11.2.0.3/dbhome_3/appsutil/PROD_s1.xml]
    : /u01/app/oracle/product/11.2.0.3/dbhome_3/appsutil/PROD_s1.xml

    contextfile=/u01/app/oracle/product/11.2.0.3/dbhome_3/appsutil/PROD_s1.xml

    ```


    #### Run AutoConfig in "Instantiate phase" to prepare configuration files

    A new context file was created in the previous step, but the configuration files
    still need to be prepared by running AutoConfig. Normally, AutoConfig connects
    to the database too, but at this moment, you’re unable to start it because the
    configuration is still missing. You need to run a subset of all AutoConfig actions
    (called the “Instantiate phase”) that will prepare the configuration files, but
    will not attempt to apply the configuration to the database. Specifying the `run=INSTE8`
    option to the `adconfig.pl` utility allows you to do this. When the configuration
    is ready, the new environment file can be sourced and the listener can be started
    from the new Oracle Home, as in the following example:


    ```

    [oracle@s1 bin]$ perl adconfig.pl contextfile=$NEW_OH/appsutil/PROD_s1.xml run=INSTE8

    [oracle@s1 bin]$ . $NEW_OH/PROD_s1.env

    [oracle@s1 bin]$ cd $NEW_OH/appsutil/scripts/$CONTEXT_NAME

    [oracle@s1 PROD_s1]$ ./addlnctl.sh start PROD

    ```


    #### Create and adjust the database initialization file

    The initialization file for the database does not exist yet. You need to create
    it from the old server parameter file and adjust it for the new Oracle Home manually.
    First, create the new initialization parameter file as follows:


    ```

    [oracle@s1 PROD_s1]$ sqlplus / as sysdba

    ...

    Connected to an idle instance.

    SQL> create pfile from spfile=''$OLD_OH/dbs/spfilePROD.ora'';

    File created.

    ```


    Adjust the initialization parameter file `$NEW_OH/dbs/initPROD.ora` to replace
    all references to the temporary file system you’ve been using for the old Oracle
    Home with appropriate paths in the new configuration. The following are the parameters
    you need to adjust:


    - `*.diagnostic_dest=''$NEW_OH/admin/PROD_s1''`

    - `*.log_archive_dest_1=''LOCATION=+RECO''`

    - `*.utl_file_dir=''/usr/tmp'',''$NEW_OH/appsutil/outbound/PROD_s1''`


    You also need to set the verified initialization parameters for ODA. These settings
    are set by default when a new database is created using the ODA’s `oakcli` utility.
    The parameters have been specifically tuned for ODA, and the e-Business Suite
    database has to use them too. Here are the parameters and their values:


    - `*._disable_interface_checking=true`

    - `*._gc_undo_affinity=false`

    - `*._gc_policy_time=0`

    - `*._enable_numa_support=false`

    - `*._file_size_increase_increment=2143289344`

    - `*.compatible=''11.2.0.3.0''`

    - `*.db_recovery_file_dest=''+RECO''`

    - `*.db_create_file_dest=''+DATA''`

    - `*.db_create_online_log_dest_1=''+REDO''`

    - `*.db_block_checksum=full`

    - `*.db_block_checking=full`

    - `*.db_lost_write_protect=typical`

    - `*.filesystemio_options=setall`

    - `*.use_large_pages=only`


    #### Start the database and run AutoConfig to finalize

    The last step that finalizes the implementation of AutoConfig managed configuration
    in the new Oracle Home is starting the database and running AutoConfig. Also,
    because the initialization parameter file has been prepared, it can be converted
    into a server parameter file, as in the following example:


    ```

    [oracle@s1 PROD_s1]$ sqlplus / as sysdba

    ...

    Connected to an idle instance.

    SQL> create spfile from pfile;

    File created.

    SQL> startup

    ...

    Database opened.

    SQL> exit

    [oracle@s1 PROD_s1]$ ./adautocfg.sh

    Enter the APPS user password:

    ...

    AutoConfig completed successfully.

    ```


    #### Complete post-installation tasks for patches

    The preceding eight steps complete the configuration of the new Oracle Home for
    your e-Business Suite database; however, you need to remember that the new Oracle
    Home has a different set of patches installed on top of it, at least because it
    contains a Patch Set Update. You have to complete all the post-installation tasks
    for the patches installed to the new Oracle Home. Most of the patches are the
    same in the old and new Oracle Homes, therefore it’s best to compare the lists
    of installed patches and execute the post-installation tasks for the ones that
    are not present in the old Oracle Home. Listing 11-18 shows how to extract nicely
    formatted and sorted lists of patches that are easy to compare, and identify the
    differences in each Oracle Home.


    **Listing 11-18. Extracting the List of Installed Patches**


    ```

    [oracle@s1 ∼]$ cd $ORACLE_HOME/OPatch/

    [oracle@s1 OPatch]$ ./opatch lsinventory | grep "^Patch  " | awk -F ":" {''print
    $1''} | sort

    Patch  12942119

    Patch  12949905

    Patch  12949919

    Patch  12951696

    ...

    ```


    Once you have compared the installed patches in both Oracle Homes and executed
    the remaining post-installation, the configuration of e-Business Suite with the
    ODA’s natively created Oracle Home is completed.'
