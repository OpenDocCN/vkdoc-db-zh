    ## Using a Parameter File


    When configuring Database Control with `emca`, there are a lot of flags, options,
    and parameters that can be used for specific configuration reasons. In order to
    keep the typing to a minimal and make it easier configure, the option to use a
    parameter file is available.


    To use a parameter file, include the `-repFile` command-line parameter on the
    command line when running `emca`. Listing 6-7 shows the contents of a parameter
    file used with the `emca` command.


    **Listing 6-7. Parameter File Contents**


    ```

    PORT=1521

    SID=patty

    DBSNMP_PWD=<pass>

    SYSMAN_PWD=<pass>

    ```


    After creating the parameter file, Listing 6-8 shows you how it can be referenced
    from the command line. Focus on the `–repfile` parameter.


    **Listing 6-8. EMCA with a Parameter File**


    ```

    $cd $ORACLE_HOME/bin

    $ ./emca -config dbcontrol db -repos create -repFile input_path_to_file

    ```


    The command listed in Listing 6-8 shows you how to specify a response file when
    executing the `emca` utility. Using a response file makes the configuration of
    the Database Control much easier and provides a repeatable approach for future
    configurations.


    ## Controlling Database Control


    At times, you will need to check to see if Database Control is running. The Enterprise
    Manager Control (`emctl`) command is used to check on the Database Control from
    the command line. Using the `emctl` command, you can check the status, and stop
    and start the Database Control.


    ### Status of Database Control


    Once Database Control is configured, the status can be checked using the command
    in Listing 6-9\. Listing 6-9 also provides a sample of output from a successful
    status check.


    **Listing 6-9. Status of the Database Control**


    ```

    $ cd $ORACLE_HOME/bin

    $ ./emctl status dbconsole

    ```


    The output from the command is as follows:


    ```

    [oracle@patty bin]$ ./emctl status dbconsole

    Oracle Enterprise Manager 11g Database Control Release 11.2.0.3.0

    Copyright (c) 1996, 2011 Oracle Corporation. All rights reserved.

    https://patty.enkitec.com:1158/em/console/aboutApplication

    Oracle Enterprise Manager 11g is running.

    ------------------------------------------------------------------

    Logs are generated in directory /u01/app/oracle/product/11.2.0.3/dbhome_1/patty_dboda/sysman/log

    ```


    ### Stopping Database Control


    There will be times where you need to stop Database Control. These times include
    when you need to do maintenance, reconfiguration, or scheduled outages of the
    database. To stop Database Control, you need to use the `emctl` command, as shown
    in Listing 6-10.


    **Listing 6-10. Stop Database Control**


    ```

    $ cd $ORACLE_HOME/bin

    $ ./emctl stop dbconsole

    ```


    When you stop Database Control, it is often a best practice to check the status
    afterward to verify that Database Control really is stopped. Listing 6-11 shows
    a `stop` command followed by a status check to verify that the stop actually occurred.


    **Listing 6-11. Examples of Stopping and Status**


    ```

    [oracle@patty bin]$ ./emctl stop dbconsole

    Oracle Enterprise Manager 11g Database Control Release 11.2.0.3.0

    Copyright (c) 1996, 2011 Oracle Corporation. All rights reserved.

    https://patty.enkitec.com:1158/em/console/aboutApplication

    Stopping Oracle Enterprise Manager 11g Database Control ...

    ... Stopped.

    [oracle@patty bin]$ ./emctl status dbconsole

    Oracle Enterprise Manager 11g Database Control Release 11.2.0.3.0

    Copyright (c) 1996, 2011 Oracle Corporation. All rights reserved.

    https://patty.enkitec.com:1158/em/console/aboutApplication

    Oracle Enterprise Manager 11g is not running.

    ```


