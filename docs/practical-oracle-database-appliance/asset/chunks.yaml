    the listener and the database can be started from any of the database nodes using
    srvctl. Execute the commands `srvctl stop database -d PROD` and `srvctl stop listener
    -l LISTENER_PROD` to stop the services. Then execute `srvctl start listener -l
    LISTENER_PROD and srvctl start database -d PROD` to start the services. Try these
    commands from one node, and then from the other node. Check the listeners after
    each test to see how the database instances are registered.


    Listing 11-20 shows correctly registered services for one of the SCAN listeners.
    Please observe the following characteristics of a correct configuration:


    *   Two services are registered, named PROD and ebs_patch (ebs_patch is used by
    the online patching feature of e-Business Suite R12.2 to provide the connectivity
    to the “patch edition” of the database).

    *   Each service has two registered instances, in this case PROD1 and PROD2.

    *   Each instance is registered with the virtual address of a database server.
    There are two such servers in the example, named s1-vip.odalab.com and s2-vip.odalab.com.


