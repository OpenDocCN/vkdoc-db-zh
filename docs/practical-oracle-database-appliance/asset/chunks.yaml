  raw: '### Automatic Service Requests


    ASR is a feature of the ODA that allows for hardware failures to be reported to
    the Oracle Corporation via a Service Request. Results are reported back to the
    user. This allows for an expedited resolution for common hardware failures.


    ASR is completely integrated into My Oracle Support (MOS), which allows for ease
    of creation of Service Requests for any hardware-related issuesthat is, hardware
    faults due to hardware failure. The ODA is a hardware component that is registered
    as an asset with MOS during the setup and deployment of an ODA. A local ASR service
    per ODA can be used. Alternatively, if an organization has multiple ODAs and other
    Oracle hardware that it is managing, it is advisable to have an external, centralized
    ASR server.


    Oracle added validation and testing of ASR in ODA 2.6\. This software upgrade
    brought forward the ability to not only validate ASR connectivity and ensure that
    ASR is setup right, but also to test various scenarios to ensure that alerts are
    actually being generated.


    Automatic Service Requests provide the ability to automatically open Oracle service
    requests for specific hardware faults. ASR is an optional utility that can be
    set up during deployment of the ODA or after. In ODA 2.5 and above, ASR deployment
    can use the built-in ASR packages or a standalone ASR server to manage the fault
    management process. Prior to ODA 2.5, the only official option was to use the
    ASR built into the box, and thus connect each ODA to the Internet to provide ASR
    capability.


    Let’s look at the ASR validation process. The ASR validation process is the same
    for ODA V1 and X3-2, but in ODA X3-2, the ILOM and the server nodes have different
    serial numbers, which is not the case in a V1 box. The validation process checks
    for a number of things:


    *   Is ASR  installed?

    *   Are SNMP traps set on the ILOM to point to the ASR server?

    *   Are the assets registered in an ASR server?

    *   Can an event be tested?


    Listing 7-12 shows the output that is expected from a server that has ASR running
    on the ODA box.


    Listing 7-12. Running an ASR Validation


    `root@odab1 bin]# ./oakcli validate -c asr`


    `INFO: oak Asr information and Validations`


    `RESULT: /opt/oracle/oak/conf/asr.conf exist`


    `RESULT: ASR Manager ip:x.x.x.x`


    `RESULT: ASR Manager port:1162`


    `SUCCESS: ASR configuration file validation successfully completed`


    `RESULT: /etc/hosts has entry 141.146.156.46` [`transport.oracle.com`](http://transport.oracle.com/)


    `RESULT: ilom alertmgmt level is set to minor`


    `RESULT: ilom alertmgmt type is set to snmptrap`


    `RESULT: alertmgmt snmp_version is set to 2c`


    `RESULT: alertmgmt community_or_username is set to public`


    `RESULT: alertmgmt destination is set to x.x.x.x`


    `RESULT: alertmgmt destination_port is set to 1162`


    `SUCCESS: Ilom snmp confguration for asr set correctly`


    `RESULT: notification trap configured to ip:x.x.x.x`


    `RESULT: notification trap configured to port:1162`


    `SUCCESS: Asr notification trap set correctly`


    `INFO: IP_ADDRESS HOST_NAME SERIAL_NUMBER ASR     PROTOCOL SOURCE PRODUCT_NAME`


    `INFO: ---------- --------- ------------- ------- -------- ------ ------------------------`


    `INFO: x.x.x.x    oda1-ilom 9243FMW000    Enabled SNMP     ILOM   SUN FIRE X4370
    M2 SERVER`


    `INFO: x.x.x.x    oda2-ilom 9243FMW000    Enabled SNMP     ILOM   SUN FIRE X4370
    M2 SERVER`


    `INFO: x.x.x.x    oda1      9243FMW000    Enabled SNMP     FMA    SUN FIRE X4370
    M2 SERVER`


    `x86/x64 System`


    `INFO: 1x.x.x.x   oda2      9243FMW000    Enabled SNMP     FMA    SUN FIRE X4370
    M2 SERVER`


    `x86/x64 System`


    `INFO: Please use My Oracle Support ''` [`http://support.oracle.com`](http://support.oracle.com/)
    `'' to view the activation status.`


    `SUCCESS: successfully set asr log level to Fine.`


    `RESULT: Registered with ASR backend.`


    `RESULT: test connection successfully completed.`


    `RESULT: submitted test event for asset:`


    `RESULT: bundle com.sun.svc.asr.sw is in active state`


    `RESULT: bundle com.sun.svc.asr.sw-frag is in resolved state`


    `RESULT: bundle com.sun.svc.asr.sw-rulesdefinitions is in resolved state`


    `RESULT: bundle com.sun.svc.ServiceActivation is in active state`


    `SUCCESS: ASR diag successfully completed`


    As part of the test, a message that confirms a successful check is e-mailed. It
    is very important to ensure that this e-mail message is received by the ASR administrator.
    The administrator’s e-mail address is set up when the assets are activated, and
    can be checked by logging in at [`http://support.oracle.com`](http://support.oracle.com/)
    . Figure [7-1](#A978-1-4302-6266-4_7_Chapter.html#Fig1) shows a sample image of
    a successfully sent e-mail message.


    ![A978-1-4302-6266-4_7_Fig1_HTML.jpg](A978-1-4302-6266-4_7_Fig1_HTML.jpg)


    Figure 7-1.


    E-mail confirming ASR validation of Service Request (SR) create


    Oracle has added testing capabilities to ODA 2.6 to allow simulations for bad
    disks and other hardware events. This is very important because, in the past,
    simulating and confirming that the ASR was actually working was not a very easy
    task. The addition of testing capabilities makes that task much easier.


    You can run an ASR test by executing the command `oakcli test asr`. Listing 7-13
    shows an example of the questions asked in response to that command.


    Listing 7-13. Running an ASR Test


    `[root@odax32 bin]# ./oakcli test asr`


