    A different approach needs to be taken to increase the available space in the
    bare metal configuration of ODA. It utilizes Linux Logical Volume Manager (LVM)
    to manage the disks. The steps to adjust the configuration are outlined in My
    Oracle Support note “How to customize available disk space for installing your
    Application on the Oracle Database Appliance (ODA) (Doc ID 1457717.1).”


    ### Create a Virtual Machine for the Application Tier


    Before starting the installation of the e-Business Suite, you have to create one
    of the planned application tier machines. The second VM will be cloned from the
    first one after the installation is completed. Alternatively, you may also choose
    to create two VMs (once on each ODA node) and use R12.2 Rapid Install to deploy
    the environment using a shared application tier file system. The example described
    here does not cover this scenario.


    The easiest way to create the VM is to download the templates from Oracle Software
    Delivery Cloud.[⁷](#A978-1-4302-6266-4_11_Chapter.html#Fn7)  I’m using the latest
    available Oracle Linux 6 update 4 x86_64 templates[⁸](#A978-1-4302-6266-4_11_Chapter.html#Fn8)
    to build the VMs. Make sure to download the paravirtualized template because it
    allows full use of Xen features to reduce the amount of needed hardware virtualization.


    Once the template is downloaded and uncompressed, the Oracle virtual assembly
    file (in my case, it’s `OVM_OL6U4_x86_64_PVM.ova`) needs to be placed in `/OVS`
    directory on Dom0 on the first node of the ODA, from where it will be loaded into
    the OVS repository. Listing 11-7 shows the commands to import the VM template
    into the OVS repository, after which the new VM is cloned from the template and
    sized to your needs. In the end, the new VM is started.


    Listing 11-7. Creating the VM from Template


    `[root@s1 ∼]#` `oakcli import vmtemplate oel6u4 -assembly /OVS/OVM_OL6U4_x86_64_PVM.ova
    -repo odarepo1`


    `Imported VM Template`


    `[root@s1 ∼]#` `oakcli clone vm oevm1 -vmtemplate oel6u4 -repo odarepo1`


    `Cloned VM : oevm1`


    `[root@s1 ∼]#` `oakcli configure vm oevm1 -maxvcpu 4 -vcpu 4`


    `Configured VM : oevm1\. The settings will take effect upon the next restart of
    this VM.`


    `[root@s1 ∼]#` `oakcli configure vm oevm1 -network "[''type=netfront,bridge=net1'']"`


    `Configured VM : oevm1\. The settings will take effect upon the next restart of
    this VM.`


    `[root@s1 ∼]#` `oakcli configure vm oevm1 -os OL_6`


    `Configured VM : oevm1\. The settings will take effect upon the next restart of
    this VM.`


    `[root@s1 ∼]#` `oakcli configure vm oevm1 -memory 12G -maxmemory 24G`


    `Configured VM : oevm1\. The settings will take effect upon the next restart of
    this VM.`


    `[root@s1 ∼]#` `oakcli start vm oevm1`


    `Started VM : oevm1`


    At this moment, the new VM doesn’t have an IP address, so you have to open the
    VM console by executing `oakcli show vmconsole oevm1` (this requires the graphical
    environment to be configured and the DISPLAY setting correctly pointing to a running
    virtual desktop) for the new VM to complete the initial configuration. Listing
    11-8 shows the configuration values provided to the wizard. Be careful choosing
    the system host name, because e-Business Suite R12.2 does not support `<Oracle
    SID>_<hostname>` [⁹](#A978-1-4302-6266-4_11_Chapter.html#Fn9) values longer than
    22 characters.


    Listing 11-8. VM Configuration Wizard


    `Entering non-interactive startup`


    `Starting OVM template configure:  network: System host name, e.g., "localhost.localdomain".:`
    `oevm1.odalab.com`


    `network: Network device to configure, e.g., "eth0".: eth0`


    `network: Activate interface on system boot: yes or no.:` `yes`


    `network: Boot protocol: dhcp or static.:` `static`


    `network: IP address of the interface.:` `10.177.0.61`


    `network: Netmask of the interface.:` `255.255.0.0`


    `network:  gateway IP address.:` `10.177.0.1`


    `network: DNS servers separated by comma, e.g., "8.8.8.8,8.8.4.4".:` `8.8.8.8,4.2.2.2`


    `authentication: System root password.:`


    The VM templates starting with Oracle Linux 6 update 4 have been built using the
    minimal installation of the operational system, which means you have to install
    quite a number of RPMs to meet the requirements of e-Business Suite. The VM template
    has been preconfigured with the public yum repository and I found it very beneficial
    to allow the Internet connectivity from the ODA, at least during the setup phase,
    to speed up and simplify the configuration of the VM.


    My Oracle Support note “Oracle E-Business Suite Installation and Upgrade Notes
    Release 12 (12.2) for Linux x86-64 (Doc ID 1330701.1)” contains an up-to-date
    list of all requirements for e-Business Suite R12.2, which includes the list of
    RPMs and the library patches; make sure to install them all. Additionally, you
    might consider upgrading the VM to the latest OL6 level and install the 11gR2
    preinstall package because it delivers most of the required RPMs and settings;
    moreover, as you’ll use the NFS-mounted ACFS volume, you’ll need some NFS-related
    RPMs too. See Listing 11-9 for the additional RPMs I installed and for the commands
    I ran to start the NFS services and disable the firewall.


    Listing 11-9. Additional Configuration to the Requirements Listed on MOS Note
    1330701.1


    `[root@oevm1 ∼]#` `yum upgrade`


    `[root@oevm1 ∼]#` `yum install portmap`


    `[root@oevm1 ∼]#` `yum install oracle-rdbms-server-11gR2-preinstall`


    `[root@oevm1 ∼]#` `chkconfig rpcbind on`


    `[root@oevm1 ∼]#` `chkconfig nfs on`


    `[root@oevm1 ∼]#` `chkconfig iptables off`


    `[root@oevm1 ∼]#` `service rpcbind start`


    `[root@oevm1 ∼]#` `service nfs start`


    `[root@oevm1 ∼]#` `service iptables stop`'
