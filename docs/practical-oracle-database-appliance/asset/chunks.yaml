- fmt: '# Integrated Lights Out Manager (ILOM) Management


    ## Integrated Shell


    The ILOM is also accessible via a shell that is integrated into the service processor.
    That shell is a convenient way to access and operate an ILOM. The ILOM shell can
    be accessed via various methods, as follows:


    *   The `NET MGT` port on the server node (serial connection)

    *   The server node using `ipmitool` over `TCP`

    *   `TCP` to `SSH` (Secure Shell) directly into the ILOM

    *   `IPMITool` over `LAN`, locally or from any device that supports `ipmitool`


    The integrated shell is used to configure the ILOM for the first time. It can
    be used by the datacenter team to prepare the ODA for configuration. The integrated
    shell is also used to perform basic functions like ILOM password changes, checking
    for system faults, gaining access to the console, and so forth.


    The integrated shell is accessible via the `ipmitool` command. It can also be
    accessed on the server nodes and remotely using `ipmitool` with the `lanplus`
    protocol. The `ipmitool` can be accessed via the host for which the SP manages
    the hardware (as `root`; the IPMI device in Linux only allows `root` access).
    For example:


    ```

    # ipmitool sunoem cli

    Connected. Use ^D to exit.

    ```


    Another way to connect to the SP is via the `lanplus` protocol. This approach
    can be used on a remote machine where `ipmitool` is installed. Here’s an example:


    ```

    [root@mxt101 ∼]# ipmitool -I lanplus -H <ilom hostname/address> -U <ilom username>
    -P <ilom user''s password> sunoem cli

    Connected. Use ^D to exit.

    ->

    ```


    The ILOM can be accessed remotely via native `SSH` as well. Here’s how that is
    done:


    ```

    $ ssh <ilom username>@<ilom hostname/address>

    Password:

    Oracle(R) Integrated Lights Out Manager

    Version 3.0.16.10.d r74499

    Copyright (c) 2012, Oracle and/or its affiliates. All rights reserved.

    ->

    ```


    The ILOM integrated shell provides a pretty rich command set and allows you to
    perform a variety of tasks directly from the interface itself. Table [2-2](#A978-1-4302-6266-4_2_Chapter.html#Tab2)
    lists some of the key commands and how they can be accessed.


    **Table 2-2. Common ILOM CLI Commands**


    | ILOM CLI Command | Description |

    | --- | --- |

    | `show /SYS power_state fault_state` | Shows the `power_state` (On or Off) for
    the host, and the fault state. OK means nothing faulted. If the ILOM/SP detects
    failure, the fault state will not be OK. |

    | `stop /SYS` | Stops the host in a graceful way. If the host doesn’t respond
    or doesn’t go down, you can force the host to stop by adding `-f`. For example:
    `stop -f /SYS` |

    | `start /SYS` | Starts a host. |

    | `show faulty` | Lists all detected failures, if any. |

    | `start /SP/console` | Starts text-based console access. |

    | `set /SP/users/root password=welcome1` | Sets a new password for the ILOM. |

    | `set /SP/network pendingipdiscovery=static pendingipaddress=10.0.0.1 pendingipnetmask=255.255.255.0
    pendingipgateway=10.0.0.255 commitpending=true` | Configures the network for the
    ILOM. |

    | `reset /SP` | Resets the SP, which means the host as well as the SP will be
    rebooted. |

    | `Show /SP/version` | Displays the current SP version. |


    In order to access and execute these commands remotely, it is very important to
    ensure that that the ILOM integrated shell is accessible and available. We discussed
    the ports needed for Remote KVMS in Table [2-1](#A978-1-4302-6266-4_2_Chapter.html#Tab1).
    You should also consider the ports listed in Table [2-3](#A978-1-4302-6266-4_2_Chapter.html#Tab3).
    Ports are based on standard Oracle defaults and can be configured based on requirements.


    **Table 2-3. Ports Used for ILOM Access**


    | Port | Type | Description |

    | --- | --- | --- |

    | 22 | `SSH` over `TCP` | `SSH` - Secure Shell (inbound) |

    | 69 | `TFTP` over `UDP` | `TFTP` (outbound) |

    | 80 | `HTTP` over `TCP` | Web (user-configurable; inbound) |

    | 123 | `NTP` over `UDP` | `NTP` - Network Time Protocol (outbound) |

    | 161 | `SNMP` over `UDP` | `SNMP` - (user-configurable; inbound) |

    | 162 | `IPMI` over `UDP` | `IPMI` - Platform Event Trap (`PET`) (outbound) |

    | 389 | `LDAP` over `UDP/TCP` | `LDAP` (user-configurable; outbound) |

    | 443 | `HTTPS` over `TCP` | (user-configurable; inbound) |

    | 514 | Syslog over `UDP` | Syslog - (outbound) |

    | 623 | `IPMI` over `UDP` | `IPMI` (bidirectional) |

    | 546 | `DHCP` over `UDP` | `DHCP` (bidirectonal) |

    | 1812 | `RADIUS` over `UDP` | `RADIUS` (outbound ) |


    ## Security Management


    The ILOM allows account management and integration with a variety of popular authentication
    protocols. Discussing them all in detail would be out of the scope of this book.
    We will look at Active Directory integration as part of this section and also
    discuss how to manage users locally.


    #### Local Account Management


    The ILOM provides a secure way to authenticate and perform day-to-day functions
    via locally authenticated accounts. This is the default authentication method
    to get access to an ILOM. ILOM Account management allows an administrator to provision
    accounts for a variety of functions. Table [2-4](#A978-1-4302-6266-4_2_Chapter.html#Tab4)
    lists all the roles that are available to users.


    **Table 2-4. Roles Available for ILOM Authentication**


    | Role | Description |

    | --- | --- |

    | `a` (Admin) | Complete admin privileges |

    | `u` (User) | Provides access to allow creation and deletion of users and to
    configure authentication services |

    | `c` (Console) | Access to console functions that allow for BIOS updates |

    | `r` (Reset) | Allow for control of the host power, as well as power cycle the
    SP |

    | `o` (Read Only) | Allows for read-only access to logs and environmental information
    |


    Based on the role selected (Administrator, Operator, Advanced Roles), various
    privileges are given to the user. Users can be created via the ILOM GUI or via
    the command line.


    Figure [2-4](#A978-1-4302-6266-4_2_Chapter.html#Fig4) and the preceding command-line
    example shows some of the various means that can be used to add a user to the
    ILOM for local authentication. The roles and privilege assignment, as well as
    user deletion, can also be done via the GUI or the command line, depending on
    your comfort level.


    ![A978-1-4302-6266-4_2_Fig4_HTML.jpg](A978-1-4302-6266-4_2_Fig4_HTML.jpg)


    **Figure 2-4. Add User screen**


    The following is an example of a command to create a new user named `rick`:


    ```

    create /SP/users/rick password=my_secret role=administrator

    ```


    Having created the user, you can modify the user’s role as follows:


    ```

    set /SP/users/rick role=operator

    ```


    You can also delete the user:


    ```

    delete /SP/users/rick

    ```


    It is very important to understand the roles and privileges available, and to
    assign them appropriately to secure your environment. Also take care to change
    the default ILOM root password immediately after deployment.'
  raw: '### Integrated Shell


    The ILOM is also accessible via a shell that is integrated into the service processor.
    That shell is a convenient way to access and operate an ILOM. The ILOM shell can
    be accessed via various methods, as follows:


    *   The NET MGT port on the server node (serial connection)

    *   The server node using ipmitool over TCP

    *   TCP to SSH (Secure Shell) directly into the ILOM

    *   IPMITool over LAN, locally or from any device that supports ipmitool


    The integrated shell is used to configure the ILOM for the first time. It can
    be used by the datacenter team to prepare the ODA for configuration. The integrated
    shell is also used to perform basic functions like ILOM password changes, checking
    for system faults, gaining access to the console, and so forth.


    The integrated shell is accessible via the `ipmitool` command. It can also be
    accessed on the server nodes and remotely using ipmitool with the lanplus protocol.
    The ipmitool can be accessed via the host for which the SP manages the hardware
    (as root; the IPMI device in Linux only allows root access). For example:


    `# ipmitool sunoem cli`


    `Connected. Use ^D to exit.`


    Another way to connect to the SP is via the lanplus protocol. This approach can
    be used on a remote machine where ipmitool is installed. Here’s an example:


    `[root@mxt101 ∼]# ipmitool -I lanplus -H <ilom hostname/address> -U <ilom username>
    -P <ilom user''s password> sunoem cli`


    `Connected. Use ^D to exit.`


    `->`


    The ILOM can be accessed remotely via native SSH as well. Here’s how that is done:


    `$ ssh <ilom username>@<ilom hostname/address>`


    `Password:`


    `Oracle(R) Integrated Lights Out Manager`


    `Version 3.0.16.10.d r74499`


    `Copyright (c) 2012, Oracle and/or its affiliates. All rights reserved.`


    `->`


    The ILOM integrated shell provides a pretty rich command set and allows you to
    perform a variety of tasks directly from the interface itself. Table [2-2](#A978-1-4302-6266-4_2_Chapter.html#Tab2)
    lists some of the key commands and how they can be accessed.


    Table 2-2.


    Common ILOM CLI Commands


    | ILOM CLI Command | Description |

    | --- | --- |

    | `show /SYS power_state fault_state` | Shows the `power_state` (On or Off) for
    the host, and the fault state. OK means nothing faulted. If the ILOM/SP detects
    failure, the fault state will not be OK. |

    | `stop /SYS` | Stops the host in a graceful way. If the host doesn’t respond
    or doesn’t go down, you can force the host to stop by adding `-f`. For example:
    `stop -f /SYS` |

    | `start /SYS` | Starts a host. |

    | `show faulty` | Lists all detected failures, if any. |

    | `start /SP/console` | Starts text-based console access. |

    | `set /SP/users/root password=welcome1` | Sets a new password for the ILOM. |

    | `set /SP/network pendingipdiscovery=static pendingipaddress=10.0.0.1 pendingipnetmask=255.255.255.0
    pendingipgateway=10.0.0.255 commitpending=true` | Configures the network for the
    ILOM. |

    | `reset /SP` | Resets the SP, which means the host as well as the SP will be
    rebooted. |

    | `Show /SP/version` | Displays the current SP version. |


    In order to access and execute these commands remotely, it is very important to
    ensure that that the ILOM integrated shell is accessible and available. We discussed
    the ports needed for Remote KVMS in Table [2-1](#A978-1-4302-6266-4_2_Chapter.html#Tab1).
    You should also consider the ports listed in Table [2-3](#A978-1-4302-6266-4_2_Chapter.html#Tab3).
    Ports are based on standard Oracle defaults and can be configured based on requirements.


    Table 2-3.


    Ports Used for ILOM Access


    | Port | Type | Description |

    | --- | --- | --- |

    | 22 | SSH over TCP | SSH - Secure Shell (inbound) |

    | 69 | TFTP over UDP | TFTP (outbound) |

    | 80 | HTTP over TCP | Web (user-configurable; inbound) |

    | 123 | NTP over UDP | NTP - Network Time Protocol (outbound) |

    | 161 | SNMP over UDP | SNMP - (user-configurable; inbound) |

    | 162 | IPMI over UDP | IPMI - Platform Event Trap (PET) (outbound) |

    | 389 | LDAP over UDP/TCP | LDAP (user-configurable; outbound) |

    | 443 | HTTPS over TCP | (user-configurable; inbound) |

    | 514 | Syslog over UDP | Syslog - (outbound) |

    | 623 | IPMI over UDP | IPMI (bidirectional) |

    | 546 | DHCP over UDP | DHCP (bidirectonal) |

    | 1812 | RADIUS over UDP | RADIUS (outbound ) |


    ### Security Management


    The ILOM allows account management and integration with a variety of popular authentication
    protocols. Discussing them all in detail would be out of the scope of this book.
    We will look at Active Directory integration as part of this section and also
    discuss how to manage users locally.


    ### Local Account Management


    The ILOM provides a secure way to authenticate and perform day-to-day functions
    via locally authenticated accounts. This is the default authentication method
    to get access to an ILOM. ILOM Account management allows an administrator to provision
    accounts for a variety of functions. Table [2-4](#A978-1-4302-6266-4_2_Chapter.html#Tab4)
    lists all the roles that are available to users.


    Table 2-4.


    Roles Available for ILOM Authentication


    | Role | Description |

    | --- | --- |

    | a (Admin) | Complete admin privileges |

    | u (User) | Provides access to allow creation and deletion of users and to configure
    authentication services |

    | c (Console) | Access to console functions that allow for BIOS updates |

    | r (Reset) | Allow for control of the host power, as well as power cycle the
    SP |

    | o (Read Only) | Allows for read-only access to logs and environmental information
    |


    Based on the role selected (Administrator, Operator, Advanced Roles), various
    privileges are given to the user. Users can be created via the ILOM GUI or via
    the command line.


    Figure [2-4](#A978-1-4302-6266-4_2_Chapter.html#Fig4) and the preceding command-line
    example shows some of the various means that can be used to add a user to the
    ILOM for local authentication. The roles and privilege assignment, as well as
    user deletion, can also be done via the GUI or the command line, depending on
    your comfort level.


    ![A978-1-4302-6266-4_2_Fig4_HTML.jpg](A978-1-4302-6266-4_2_Fig4_HTML.jpg)


    Figure 2-4.


    Add User screen


    The following is an example of a command to create a new user named `rick`:


    `create /SP/users/rick password=my_secret role=administrator`


    Having created the user, you can modify the user’s role as follows:


    `set /SP/users/rick role=operator`


    You can also delete the user:


    `delete /SP/users/rick`


    It is very important to understand the roles and privileges available, and to
    assign them appropriately to secure your environment. Also take care to change
