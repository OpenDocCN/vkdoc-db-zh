    ### 真应用集群（RAC）网络


    Oracle 真应用集群 11g 第 2 版（RAC）预装在 Oracle 数据库一体机上。此版本的 RAC 引入了**单一客户端访问名称**（SCAN）寻址的概念。SCAN
    地址通过提供两个或多个 IP 地址，为集群提供数据库的别名。这种类似别名的方法允许远程客户端连接，而无需更改与环境相关的连接信息。


    **注意**

    SCAN 需要企业 DNS 或 Oracle 全局命名服务才能工作。对于 Oracle 数据库一体机，方法是使用您的企业 DNS。有关 SCAN 的更多信息，请参见
    [`www.oracle.com/technetwork/products/clustering/overview/scan-129069.pdf`](http://www.oracle.com/technetwork/products/clustering/overview/scan-129069.pdf)。


    SCAN 寻址采用 DNS 的轮询（round-robin）方法。这种方法确保网络流量在多个 IP 地址之间负载均衡。该方法确保远程主机可以配置本地命名，而无需在环境发生变化时更改连接信息。表
    3-6 提供了一个如何在企业 DNS 服务器中配置条目的示例。


    **注意**

    DNS 中的 SCAN 条目应关联不少于三个 IP 地址。


    **表 3-6. 域名服务（DNS）设置**


    | DNS 名称 | IP 地址 |

    | --- | --- |

    | ejb-vip1.m57.local | 172.30.0.22 |

    | ejb-vip2.m57.local | 172.30.0.23 |

    | ejb-scan.m57.local | 172.30.0.24, 172.30.0.25, 172.30.0.26 |


    至此，您应对配置 Oracle 数据库一体机网络所需的组件有了基本了解。接下来，您需要通过连接到 ILOM 来配置所有这些与网络相关的项目。


    ### 网络配置


    对于所有 Oracle 数据库一体机，一旦您设置好网络资源（DNS、IP 地址）并完成 ILOM 网络配置，您就可以使用 SSH 协议连接到 ILOM。连接到
    ILOM 后，您可以连接到系统的控制台以获取 Linux 控制台终端。可以使用 ILOM 命令 `start /SP/console` 访问系统的控制台。清单
    3-1 提供了交互过程应如何进行的示例。


    **清单 3-1. 启动 ILOM 控制台**


    ```

    oak1 login: -> start /SP/console

    Are you sure you want to start /SP/console (y/n)? y

