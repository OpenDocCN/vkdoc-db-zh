- fmt: "### Miscellaneous Tools\n\nSo far, we've looked at a lot of the built-in tools\
    \ in the ODA portfolio. There will be more tools, like Oracle Enterprise manager,\
    \ which will be discussed in subsequent chapters, but it is important to mention\
    \ other tools that are important in proactively diagnosing various issues with\
    \ the ODA. Oracle Linux comes with `anacron` installed which is a variant of `cron`\
    \ and allows more flexibility in running jobs, and there are various jobs built\
    \ into `anacron` that run on a daily, weekly, or monthly basis. These jobs include\
    \ the following functions:\n\n*   Log rotation of various files\n*   A log watch\
    \ script that checks various logs, and generates a report and mails it to the\
    \ root unix account.\n*   Weekly RAID checks\n\nThe log rotation of files is handled\
    \ via the `logrotate` daemon and uses `logrotate.conf` to determine various configuration\
    \ parameters that are used for managing log files. Listing 7-26 shows a default\
    \ `logrotate.conf` file.\n\nListing 7-26. Logrotate.conf\n\n```\nroot@farshad-linux]#\
    \ cat /etc/logrotate.conf\n# see \"man logrotate\" for details\n# rotate log files\
    \ weekly\nweekly\n# keep 4 weeks worth of backlogs\nrotate 4\n# create new (empty)\
    \ log files after rotating old ones\ncreate\n# use date as a suffix of the rotated\
    \ file\ndateext\n# uncomment this if you want your log files compressed\n#compress\n\
    # RPM packages drop log rotation information into this directory\ninclude /etc/logrotate.d\n\
    # no packages own wtmp and btmp -- we'll rotate them here\n/var/log/wtmp {\n \
    \   monthly\n    create 0664 root utmp\n    minsize 1M\n    rotate 1\n}\n/var/log/btmp\
    \ {\n    missingok\n    monthly\n    create 0600 root utmp\n    rotate 1\n}\n\
    # system-specific logs may be also be configured here.\n```\n\nLog rotation can\
    \ also be controlled by including attributes for the files that need to be included\
    \ in log rotation in the `/etc/logrotate.d` directory. These can include various\
    \ directives, depending on the type of log file that is being rotated. Listing\
    \ 7-27 provides an example of an HTTP service log-file rotation with `postrotate`\
    \ directives as well.\n\nListing 7-27. Logrotate.d. Httpd\n\n```\n[root@farshad-linux\
    \ logrotate.d]# vi httpd\n/var/log/httpd/*log {\n    missingok\n    notifempty\n\
    \    sharedscripts\n    delaycompress\n    postrotate\n        /sbin/service httpd\
    \ reload > /dev/null 2>/dev/null || true\n    endscript\n```\n\n`logwatch` is\
    \ another facility that gives a daily synopsis of what the system looks like.\
    \ Listing 7-28 provides an example of what a `logwatch` output looks like.\n\n\
    Listing 7-28. Logwatch\n\n```\n:\n################### Logwatch 7.3 (03/24/06)\
    \ ####################\nProcessing Initiated: Sat Jun 29 04:02:01 2013\nDate Range\
    \ Processed: yesterday\n( 2013-Jun-28 )\nPeriod is day.\nDetail Level of Output:\
    \ 0\nType of Output: unformatted\nLogfiles for Host: odax32\n##################################################################\n\
    \n--------------------- SSHD Begin ------------------------\nUsers logging in\
    \ through sshd:\n   root:\n      10.10.7.51: 1 time\n---------------------- SSHD\
    \ End -------------------------\n\n--------------------- Disk Space Begin ------------------------\n\
    Filesystem            Size  Used Avail Use% Mounted on\n/dev/mapper/VolGroupSys-LogVolRoot\n\
    \                      30G   19G  9.2G  67% /\n/dev/md0               99M   48M\
    \   47M  51% /boot\n/dev/mapper/VolGroupSys-LogVolU01\n                      97G\
    \   32G   61G  34% /u01\n/dev/mapper/VolGroupSys-LogVolOpt\n                 \
    \     59G   24G   32G  43% /opt\n---------------------- Disk Space End -------------------------\n\
    \n###################### Logwatch End #########################\n```\n\nA script\
    \ to validate RAID is also available and run weekly to ensure the RAID configurations\
    \ of the box. Listing 7-29 shows a snippet of the `raid-check` script.\n\nListing\
    \ 7-29. Raid Check Script\n\n```\n#!/bin/bash\n#\n# This script reads it's configuration\
    \ from /etc/sysconfig/raid-check\n# Please use that file to enable/disable this\
    \ script or to set the\n# type of check you wish performed.\n# We might be on\
    \ a kernel with no raid support at all, exit if so\n[ -f /proc/mdstat ] || exit\
    \ 0\n```\n\nAll the scripts listed are enabled by default on the ODA, but the\
    \ output is e-mailed to the internal root account using the `mail` utility. In\
    \ order to look at the outputs, you need to log on to the box as the root user\
    \ and execute the `mail` utility or set up mail redirection as described in MOS\
    \ Note 405229.1.\n\n## Reactive Checks\n\nProactive checks have been the focus\
    \ of this chapter so far. Things can happen, however, and it is important to understand\
    \ various reactive procedures that are needed or embedded in the ODA. Diagnostics\
    \ are a very complex process, and thus not all forms of reactive checks can be\
    \ covered as part of this section, but we do cover some of the more useful ones.\n\
    \n### Diagnostic Collection\n\nThe ODA provides an easy way to collect and manage\
    \ various diagnostic information in the form of the `oakcli manage diagcollect`\
    \ command. The command allows for easy access to all log files and diagnostic\
    \ information across various ODA, Clusterware, ASM, and RDBMS log files, and on\
    \ multiple nodes. Listing 7-30 shows how to get the help text for the command.\n\
    \nListing 7-30. ODA Diagnostic Collection Utility\n\n```\n./oakcli  manage diagcollect\
    \ -h\nUsage:\n   oakcli manage diagcollect [options]\noptions:\n  --all      \
    \               - For collecting all diag info (Default option),\n           \
    \                   excluding adr, chmos\n  --crs                     - For collecting\
    \ crs diag information\n  --patch                   - For collecting ODA Patching\
    \ logs\n...\n```\n\nDiagnostic information can be trimmed and, depending on the\
    \ type of problem, only specific information can be collected or excluded. Diagnostic\
    \ data when paired with TFA can help provide Oracle with a lot of information,\
    \ which in turn can help debug and diagnose a problem pretty quickly.\n\n### Disk\
    \ Failures\n\nAs part of hardware operations, it is very common for various components\
    \ to fail. Due to the nature and operational factors of disks, failure should\
    \ always be seen as imminent, and that is why ODA provides double or triple software\
    \ mirroring. Such mirroring allows for failures to occur without data loss.\n\n\
    Diagnosis of a failed disk is very important, and providing the right level of\
    \ information helps in the expedited replacement of a disk. Listing 7-31 displays\
    \ how to execute `odasundiag.sh`, which is a diagnostics command built specifically\
    \ for the ODA so that an Oracle engineer can get pertinent diagnostic information\
    \ about the disk failure and create a Field Service Task to either send a replacement\
    \ disk or have a service engineer replace it.\n\nListing 7-31. ODA Sun Diagnostics\
    \ Script\n\n```\n# /root/Extras/odasundiag.sh\n```\n\nThe file generated when\
    \ the command in Listing 7-31 is executed will need to be uploaded to My Oracle\
    \ Support as part of a service request. This will allow for the support personnel\
    \ to determine the problem and provide a resolution. If the resolution is disk\
    \ replacement, it can be handled by the customer or by Oracle's field services\
    \ team.\n\nASR, if set up, will also open a service request to Oracle and provide\
    \ base data so that a Field Service Request is opened to replace a disk.\n\nIf\
    \ you need to replace a drive, you can ease the job of finding the offending drive\
    \ by turning on the locator beacon. Listing 7-32 displays the command to locate\
    \ a disk.\n\nListing 7-32. Locate a Disk\n\n```\n# ./oakcli locate  disk e0_pd_00\
    \ on\nDisk: e0_pd_00 and to: ON\n```\n\nExecuting this command causes an LED to\
    \ be turned on, which is used to ensure that the correct disk is being removed\
    \ and replaced. This is useful for hardware engineers and ensures that only the\
    \ right part is replaced."
  raw: '### Miscellaneous Tools


    So far, we’ve looked at a lot of the built-in tools in the ODA portfolio. There
    will be more tools, like Oracle Enterprise manager, which will be discussed in
    subsequent chapters, but it is important to mention other tools that are important
    in proactively diagnosing various issues with the ODA. Oracle Linux comes with
    anacron installed which is a variant of cron and allows more flexibility in running
    jobs, and there are various jobs built into anacron that run on a daily, weekly,
    or monthly basis. These jobs include the following functions:


    *   Log rotation of various files

    *   A log watch script that checks various logs, and generates a report and mails
    it to the root unix account.

    *   Weekly RAID checks


    The log rotation of files is handled via the logrotate daemon and uses `logrotate.conf`
    to determine various configuration parameters that are used for managing log files.
    Listing 7-26 shows a default `logrotate.conf` file.


    Listing 7-26. Logrotate.conf


    `root@farshad-linux]# cat /etc/logrotate.conf`


    `# see "man logrotate" for details`


    `# rotate log files weekly`


    `weekly`


    `# keep 4 weeks worth of backlogs`


    `rotate 4`


    `# create new (empty) log files after rotating old ones`


    `create`


    `# use date as a suffix of the rotated file`


    `dateext`


    `# uncomment this if you want your log files compressed`


    `#compress`


    `# RPM packages drop log rotation information into this directory`


    `include /etc/logrotate.d`


    `# no packages own wtmp and btmp -- we''ll rotate them here`


    `/var/log/wtmp {`


    `monthly`


    `create 0664 root utmp`


    `minsize 1M`


    `rotate 1`


    `}`


    `/var/log/btmp {`


    `missingok`


    `monthly`


    `create 0600 root utmp`


    `rotate 1`


    `}`


    `# system-specific logs may be also be configured here.`


    Log rotation can also be controlled by including attributes for the files that
    need to be included in log rotation in the `/etc/logrotate.d` directory. These
    can include various directives, depending on the type of log file that is being
    rotated. Listing 7-27 provides an example of an HTTP service log-file rotation
    with post-rotate directives as well.


    Listing 7-27. Logrotate.d. Httpd


    `[root@farshad-linux logrotate.d]# vi httpd`


    `/var/log/httpd/*log {`


    `missingok`


    `notifempty`


    `sharedscripts`


    `delaycompress`


    `postrotate`


    `/sbin/service httpd reload > /dev/null 2>/dev/null || true`


    `endscript`


    Logwatch is another facility that gives a daily synopsis of what the system looks
    like. Listing 7-28 provides an example of what a logwatch output looks like.


    Listing 7-28. Logwatch


    `:`


    `################### Logwatch 7.3 (03/24/06) ####################`


    `Processing Initiated: Sat Jun 29 04:02:01 2013`


    `Date Range Processed: yesterday`


    `( 2013-Jun-28 )`


    `Period is day.`


    `Detail Level of Output: 0`


    `Type of Output: unformatted`


    `Logfiles for Host: odax32`


    `##################################################################`


    `--------------------- SSHD Begin ------------------------`


    `Users logging in through sshd:`


    `root:`


    `10.10.7.51: 1 time`


    `---------------------- SSHD End -------------------------`


    `--------------------- Disk Space Begin ------------------------`


    `Filesystem            Size  Used Avail Use% Mounted on`


    `/dev/mapper/VolGroupSys-LogVolRoot`


    `30G   19G  9.2G  67% /`


    `/dev/md0               99M   48M   47M  51% /boot`


    `/dev/mapper/VolGroupSys-LogVolU01`


    `97G   32G   61G  34% /u01`


    `/dev/mapper/VolGroupSys-LogVolOpt`


    `59G   24G   32G  43% /opt`


    `---------------------- Disk Space End -------------------------`


    `###################### Logwatch End #########################`


    A script to validate RAID  is also available and run weekly to ensure the RAID
    configurations of the box. Listing 7-29 shows a snippet of the raid-check script.


    Listing 7-29. Raid Check Script


    `#!/bin/bash`


    `#`


    `# This script reads it''s configuration from /etc/sysconfig/raid-check`


    `# Please use that file to enable/disable this script or to set the`


    `# type of check you wish performed.`


    `# We might be on a kernel with no raid support at all, exit if so`


    `[ -f /proc/mdstat ] || exit 0`


    All the scripts listed are enabled by default on the ODA, but the output is e-mailed
    to the internal root account using the mail utility. In order to look at the outputs,
    you need to log on to the box as the  root user  and execute the mail utility
    or set up mail redirection as described in MOS Note 405229.1.


    ## Reactive Checks


    Proactive checks have been the focus of this chapter so far. Things can happen,
    however, and it is important to understand various reactive procedures that are
    needed or embedded in the ODA. Diagnostics are a very complex process, and thus
    not all forms of reactive checks can be covered as part of this section, but we
    do cover some of the more useful ones.


    ### Diagnostic Collection


    The ODA provides an easy way to collect and manage various diagnostic information
    in the form of the `oakcli manage diagcollect` command. The command allows for
    easy access to all log files and diagnostic information across various ODA, Clusterware,
    ASM, and RDBMS log files, and on multiple nodes. Listing 7-30 shows how to get
    the help text for the command.


    Listing 7-30. ODA Diagnostic Collection Utility


    `./oakcli  manage diagcollect -h`


    `Usage:`


    `oakcli manage diagcollect [options]`


    `options:`


      `--all                     - For collecting all diag info (Default option),`


                                  `excluding adr, chmos`


      `--crs                     - For collecting crs diag information`


      `--patch                   - For collecting ODA Patching logs`


    `...`


    Diagnostic information can be trimmed and, depending on the type of problem, only
    specific information can be collected or excluded. Diagnostic data when paired
    with TFA can help provide Oracle with a lot of information, which in turn can
    help debug and diagnose a problem pretty quickly.


    ### Disk Failures


    As part of hardware operations, it is very common for various components to fail.
    Due to the nature and operational factors of disks, failure should always be seen
    as imminent, and that is why ODA provides double or triple software mirroring.
    Such mirroring allows for failures to occur without data loss.


    Diagnosis of a failed disk is very important, and providing the right level of
    information helps in the expedited replacement of a disk. Listing 7-31 displays
    how to execute `odasundiag.sh`, which is a diagnostics command built specifically
    for the ODA so that an Oracle engineer can get pertinent diagnostic information
    about the disk failure and create a Field Service Task to either send a replacement
    disk or have a service engineer replace it.


    Listing 7-31. ODA Sun Diagnostics Script


    `# /root/Extras/odasundiag.sh`


    The file generated when the command in Listing 7-31 is executed will need to be
    uploaded to My Oracle Support as part of a service request. This will allow for
    the support personnel to determine the problem and provide a resolution. If the
    resolution is disk replacement, it can be handled by the customer or by Oracle’s
    field services team.


    ASR, if set up, will also open a service request to Oracle and provide base data
    so that a Field Service Request is opened to replace a disk.


    If you need to replace a drive, you can ease the job of finding the offending
    drive by turning on the locator beacon. Listing 7-32 displays the command to locate
    a disk.


    Listing 7-32. Locate a Disk


    `# ./oakcli locate  disk e0_pd_00 on`


    `Disk: e0_pd_00 and to: ON`


    Executing this command causes an LED to be turned on, which is used to ensure
    that the correct disk is being removed and replaced. This is useful for hardware
    engineers and ensures that only the right part is replaced.'
  trans: "### 其他工具\n\n到目前为止，我们已经了解了 ODA 产品组合中的许多内置工具。后续章节还会讨论更多工具，比如 Oracle Enterprise\
    \ Manager，但这里有必要提及其他一些对主动诊断 ODA 各类问题很重要的工具。Oracle Linux 默认安装了 `anacron`，它是 `cron`\
    \ 的一个变体，提供了更灵活的任务执行方式，`anacron` 内置了多种按每日、每周或每月运行的作业。这些作业包括以下功能：\n\n*   各种文件的日志轮转\n\
    *   一个日志监控脚本，它会检查各种日志，生成报告并通过邮件发送给 root Unix 账户。\n*   每周的 RAID 检查\n\n文件的日志轮转由\
    \ `logrotate` 守护进程处理，并使用 `logrotate.conf` 来确定用于管理日志文件的各种配置参数。清单 7-26 展示了一个默认的\
    \ `logrotate.conf` 文件。\n\n**清单 7-26. Logrotate.conf**\n\n```\nroot@farshad-linux]#\
    \ cat /etc/logrotate.conf\n# see \"man logrotate\" for details\n# rotate log files\
    \ weekly\nweekly\n# keep 4 weeks worth of backlogs\nrotate 4\n# create new (empty)\
    \ log files after rotating old ones\ncreate\n# use date as a suffix of the rotated\
    \ file\ndateext\n# uncomment this if you want your log files compressed\n#compress\n\
    # RPM packages drop log rotation information into this directory\ninclude /etc/logrotate.d\n\
    # no packages own wtmp and btmp -- we'll rotate them here\n/var/log/wtmp {\n \
    \   monthly\n    create 0664 root utmp\n    minsize 1M\n    rotate 1\n}\n/var/log/btmp\
    \ {\n    missingok\n    monthly\n    create 0600 root utmp\n    rotate 1\n}\n\
    # system-specific logs may be also be configured here.\n```\n\n日志轮转也可以通过将需要包含在日志轮转中的文件属性放入\
    \ `/etc/logrotate.d` 目录来控制。根据被轮转的日志文件类型，这些属性可以包含各种指令。清单 7-27 提供了一个包含 `postrotate`\
    \ 指令的 HTTP 服务日志文件轮转示例。\n\n**清单 7-27. Logrotate.d. Httpd**\n\n```\n[root@farshad-linux\
    \ logrotate.d]# vi httpd\n/var/log/httpd/*log {\n    missingok\n    notifempty\n\
    \    sharedscripts\n    delaycompress\n    postrotate\n        /sbin/service httpd\
    \ reload > /dev/null 2>/dev/null || true\n    endscript\n```\n\n`logwatch` 是另一个工具，它提供系统每日概况。清单\
    \ 7-28 提供了一个 `logwatch` 输出的示例。\n\n**清单 7-28. Logwatch**\n\n```\n:\n###################\
    \ Logwatch 7.3 (03/24/06) ####################\nProcessing Initiated: Sat Jun\
    \ 29 04:02:01 2013\nDate Range Processed: yesterday\n( 2013-Jun-28 )\nPeriod is\
    \ day.\nDetail Level of Output: 0\nType of Output: unformatted\nLogfiles for Host:\
    \ odax32\n##################################################################\n\
    \n--------------------- SSHD Begin ------------------------\nUsers logging in\
    \ through sshd:\n   root:\n      10.10.7.51: 1 time\n---------------------- SSHD\
    \ End -------------------------\n\n--------------------- Disk Space Begin ------------------------\n\
    Filesystem            Size  Used Avail Use% Mounted on\n/dev/mapper/VolGroupSys-LogVolRoot\n\
    \                      30G   19G  9.2G  67% /\n/dev/md0               99M   48M\
    \   47M  51% /boot\n/dev/mapper/VolGroupSys-LogVolU01\n                      97G\
    \   32G   61G  34% /u01\n/dev/mapper/VolGroupSys-LogVolOpt\n                 \
    \     59G   24G   32G  43% /opt\n---------------------- Disk Space End -------------------------\n\
    \n###################### Logwatch End #########################\n```\n\n还有一个用于验证\
    \ RAID 的脚本，每周运行以确保设备的 RAID 配置正常。清单 7-29 展示了 `raid-check` 脚本的一个片段。\n\n**清单 7-29. Raid\
    \ Check Script**\n\n```\n#!/bin/bash\n#\n# This script reads it's configuration\
    \ from /etc/sysconfig/raid-check\n# Please use that file to enable/disable this\
    \ script or to set the\n# type of check you wish performed.\n# We might be on\
    \ a kernel with no raid support at all, exit if so\n[ -f /proc/mdstat ] || exit\
    \ 0\n```\n\n上面列出的所有脚本在 ODA 上默认都是启用的，但输出会使用 `mail` 工具通过电子邮件发送到内部 root 账户。要查看输出，您需要以\
    \ root 用户身份登录设备并执行 `mail` 工具，或者按照 MOS Note 405229.1 中的描述设置邮件重定向。\n\n## 响应式检查\n\
    \n到目前为止，本章的重点一直是主动检查。然而，问题仍可能发生，因此了解 ODA 中需要或内置的各种响应式流程非常重要。诊断是一个非常复杂的过程，因此本节无法涵盖所有形式的响应式检查，但我们会介绍一些更有用的。\n\
    \n### 诊断信息收集\n\nODA 提供了一种通过 `oakcli manage diagcollect` 命令来收集和管理各种诊断信息的简便方法。该命令可以方便地访问跨越各种\
    \ ODA、Clusterware、ASM 和 RDBMS 日志文件，以及在多节点上的所有日志文件和诊断信息。清单 7-30 展示了如何获取该命令的帮助文本。\n\
    \n**清单 7-30. ODA 诊断信息收集工具**\n\n```\n./oakcli  manage diagcollect -h\nUsage:\n\
    \   oakcli manage diagcollect [options]\noptions:\n  --all                   \
    \  - For collecting all diag info (Default option),\n                        \
    \      excluding adr, chmos\n  --crs                     - For collecting crs\
    \ diag information\n  --patch                   - For collecting ODA Patching\
    \ logs\n...\n```\n\n诊断信息可以被裁剪，并且根据问题的类型，可以只收集或排除特定的信息。诊断数据与 TFA 配合使用可以帮助向 Oracle\
    \ 提供大量信息，从而有助于快速调试和诊断问题。\n\n### 磁盘故障\n\n作为硬件操作的一部分，各种组件发生故障是非常常见的。鉴于磁盘的性质和操作因素，应始终将故障视为即将发生，这就是为什么\
    \ ODA 提供双重或三重软件镜像的原因。这种镜像允许在发生故障时不会丢失数据。\n\n诊断故障磁盘非常重要，提供正确级别的信息有助于加速磁盘的更换。清单\
    \ 7-31 展示了如何执行 `odasundiag.sh`，这是一个专门为 ODA 构建的诊断命令，以便 Oracle 工程师可以获得有关磁盘故障的相关诊断信息，并创建现场服务任务来发送更换盘或让服务工程师进行更换。\n\
    \n**清单 7-31. ODA Sun 诊断脚本**\n\n```\n# /root/Extras/odasundiag.sh\n```\n\n执行清单\
    \ 7-31 中命令生成的文件需要作为服务请求的一部分上传到 My Oracle Support。这将使支持人员能够确定问题并提供解决方案。如果解决方案是更换磁盘，可以由客户或\
    \ Oracle 的现场服务团队处理。\n\n如果设置了 ASR，它也会向 Oracle 开放一个服务请求并提供基础数据，以便开启现场服务请求来更换磁盘。\n\
    \n如果您需要更换驱动器，可以通过打开定位指示灯来简化查找故障驱动器的工作。清单 7-32 展示了定位磁盘的命令。\n\n**清单 7-32. 定位磁盘**\n\
    \n```\n# ./oakcli locate  disk e0_pd_00 on\nDisk: e0_pd_00 and to: ON\n```\n\n\
    执行此命令会点亮一个 LED 灯，用于确保正在移除和更换的是正确的磁盘。这对硬件工程师很有用，并确保只更换正确的部件。"
