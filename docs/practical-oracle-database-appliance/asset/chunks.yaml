    2       => Generte disk alert test

    3       => Generate TESTSRCREATE snmptrap

    4       => Generate test trap using ''oakcli test pd_xx BAD''

    ```


    清单 7-13 中的选项提供了一个菜单，您可以用它来执行各种测试。输出会写入日志文件，或者会创建一个测试 `SR` 并生成一封电子邮件（类似于图 7-1 中所示）。我们可以详细查看这些选项。清单
    7-14 显示了通过日志文件显示的数据示例。


    **清单 7-14. ASR 测试的日志文件**

