- fmt: "### Oracle Database Appliance X3-2\n\nThe next release of the ODA resulted\
    \ in some major networking changes. The X3-2 model no longer includes a fiber\
    \ network card. This change caught quite a few ODA customers—and even a few people\
    \ inside Oracle, as well as its partners—by surprise, since some customers only\
    \ support fiber for their 10G networks.\n\nIn the end, some customers settled\
    \ on a solution of bridging 10G copper from an ODA to a network fabric extender\
    \ or switch. From the switch, 10G fiber could be deployed to their data center\
    \ fiber network. Oracle even started selling switches for this purpose. This workaround\
    \ to 10G fiber support can be a little pricey, so you will need to account for\
    \ the costs.\n\nOracle can change the supported networks as new models are released,\
    \ so it’s possible that 10G fiber support may come back in the future. You need\
    \ to check the Oracle manuals for every new release to review any changes to the\
    \ number or types of networks included.\n\nThe X3-2 ODA model migrated from a\
    \ single encapsulated box with two server nodes and a set of disk drives to a\
    \ modular design with two servers from the general Oracle X3-2 server line, with\
    \ one or two separate storage units. The new, modular X3-2 ODA comes with support\
    \ for four external network interfaces. The networks can be 100M, 1G, or 10G.\
    \ The connections are copper only, and the network speeds are autonegotiated.\n\
    \nOracle’s release of multiple products with the X3-2 name was a little confusing\
    \ at first. You could order an X3-2 server as a standalone ASR server or as an\
    \ Exadata Platinum Support Gateway, and you could order an X3-2 Oracle Database\
    \ Appliance and also an X3-2 Exadata machine.\n\nThe networks available for the\
    \ X3-2 ODA model are listed in Table 5-2. The X3-2 ODA has two server nodes, and\
    \ each server will contain the network interfaces listed in the table.\n\nTable\
    \ 5-2. Networks Deployed on the Second-Generation ODA Model\n\n| Network | Bond\
    \ / Ports | Usage |\n| --- | --- | --- |\n| 100M/1G/10G Copper | Bond: `bond0`\
    \ - Ports: `eth2`, `eth3` (labeled as `net0`, `net1`) | Two 100/1000/10000 copper\
    \ ports that can be used for the public network. The ODA deployment process will\
    \ target `bond0` as the public network. |\n| 100M/1G/10G Copper | Bond: `bond1`\
    \ - Ports: `eth4`, `eth5` (labeled as `net2`, `net3`) | Two 100/1000/10000 copper\
    \ ports that are typically used for the backup or other network of your choice.\
    \ |\n| Management | `NetMgt` | This is the 10/100 Mbps RJ45 network connection\
    \ for the `ILOM` connection. This is a single, unbonded connection. |\n| Serial\
    \ connection | `SerMgt` | This connection is used to support either a serial connection\
    \ from an external KVM (keyboard, video, mouse) appliance or device, or from your\
    \ laptop to deploy the ODA. |\n\nThe Oracle Appliance Manager Configurator utility\
    \ used to deploy an ODA will assume that the network connections are bonded. However\
    \ it is possible to deploy networks as standalone nonredundant connections by\
    \ skipping the bonding. In order to do this, some manual work is involved and\
    \ the process is not included in the standard ODA documentation. You’ll probably\
    \ need to ask an experienced sysadmin to give you a hand if you decide to deploy\
    \ the networks outside the process that comes out-of-the-box with an ODA.\n\n\
    The X3-2 ODA network details are covered in Part Two of the Oracle Database Appliance\
    \ Owner’s Guide in the chapter titled “Attaching Cables and Power Cords, and Powering\
    \ On Oracle Database Appliance X3-2.” This chapter is mainly focused on the implementing\
    \ the cabling shipped with an ODA to connect all of the ODA components together.\
    \ You have to read the chapter closely to find the details on the external network\
    \ connections. Additional reference information can be found in Chapter 1 and\
    \ Appendix A of the ODA Getting Started Guide.\n\n## ODA Network Deployment Process\n\
    \nODA networks can be deployed using the process outlined in the subsections to\
    \ follow. Most of these steps are necessary, but are fairly simple in nature.\
    \ The steps are listed roughly in the order in which they should occur. Of course,\
    \ each company has their own standards and methods for getting a server deployed\
    \ in their data center and on their network. The key steps are as follows:\n\n\
    Plan which ODA networks will be deployed.  \nDefine network security considerations.\
    \  \nComplete work that can be accomplished before the ODA arrives.  \nSpec and\
    \ order the ODA network cabling.  \nRequest IP addresses.  \nBuild the offline\
    \ configuration file.  \nRack the ODA.  \nCable the ODA, including internal cabling.\
    \  \nApply the `ILOM` IP addresses and configure the ODA public network.  \nRun\
    \ the ODA deployment process to configure the remaining networks.\n\n### Plan\
    \ the ODA Networks to Be Deployed\n\nThe X3-2 ODA model supports two bonded networks.\
    \ One of them will certainly be used for the public network. The second network\
    \ is generally used as the backup network. It is possible to unbond one or both\
    \ networks to take advantage of all four external network connections at the cost\
    \ of network redundancy. An example would be deploying a bonded public network\
    \ and a single connection for a backup network and an additional network to support\
    \ an `NFS` storage mount. While it is also possible to mount `NFS` storage over\
    \ the public network, performance issues can arise when large volumes of data\
    \ are streamed between the server and `NFS` storage. The need for external storage\
    \ mounts has somewhat diminished due to the very large amount of internal storage\
    \ supplied with an ODA.\n\nNote\n\nThe key point in this section is that the first\
    \ network deployment step is to plan out what networks are required for your solution,\
    \ and matching those requirements to the ODA network options. Understanding the\
    \ workloads that need to be supported can also be an important consideration in\
    \ planning ODA networks.\n\nODAs can now store a great deal of data. If the databases\
    \ deployed have tight `RTO` (recovery time objective) requirements, and they are\
    \ large in size, using a 10G backup network can help drive better backup and recovery\
    \ performance. This would be in addition to deploying the standard `RMAN` tuning\
    \ steps. If you are connected to a backup network through an `NFS` mount, `DNFS`\
    \ (Direct NFS) can be implemented to speed up the backup and recovery throughput.\
    \ There is an old adage followed by many long-term Oracle DBAs and architects:\
    \ “It is better to focus on architecting for recovery than to architect for backups.”\
    \ If you want to make sure that you have all of your recovery bases covered, your\
    \ network planning plays a key role.\n\nIf your company only uses 10G fiber or\
    \ other fiber network infrastructure, then additional planning, and potentially\
    \ costs, may be needed to bridge the ODA copper cabling to your fiber network.\
    \ As mentioned previously, this is subject to change when new models are released."
  raw: '### Oracle Database Appliance X3-2


    The next release of the ODA resulted in some major networking changes. The X3-2
    model no longer includes a fiber network card. This change caught quite a few
    ODA customers—and even a few people inside Oracle, as well as its partners—by
    surprise, since some customers only support fiber for their 10G networks.


    In the end, some customers settled on a solution of bridging 10G copper from an
    ODA to a network fabric extender or switch. From the switch, 10G fiber could be
    deployed to their data center fiber network. Oracle even started selling switches
    for this purpose. This workaround to 10G fiber support can be a little pricey,
    so you will need to account for the costs.


    Oracle can change the supported networks as new models are released, so it’s possible
    that 10G fiber support may come back in the future. You need to check the Oracle
    manuals for every new release to review any changes to the number or types of
    networks included.


    The X3-2 ODA model migrated from a single encapsulated box with two server nodes
    and a set of disk drives to a modular design with two servers from the general
    Oracle X3-2 server line, with one or two separate storage units. The new, modular
    X3-2 ODA comes with support for four external network interfaces. The networks
    can be 100M, 1G, or 10G. The connections are copper only, and the network speeds
    are autonegotiated.


    Oracle’s release of multiple products with the X3-2 name was a little confusing
    at first. You could order an X3-2 server as a standalone ASR server or as an Exadata
    Platinum Support Gateway, and you could order an X3-2 Oracle Database Appliance
    and also an X3-2 Exadata machine.


    The networks available for the X3-2 ODA model are listed in Table [5-2](#A978-1-4302-6266-4_5_Chapter.html#Tab2).
    The X3-2 ODA has two server nodes, and each server will contain the network interfaces
    listed in the table.


    Table 5-2.


    Networks Deployed on the Second-Generation ODA Model


    | Network | Bond / Ports | Usage |

    | --- | --- | --- |

    | 100M/1G/10G Copper | Bond: bond0 - Ports: eth2, eth3 (labeled as net0, net1)
    | Two 100/1000/10000 copper ports that can be used for the public network. The
    ODA deployment process will target bond0 as the public network. |

    | 100M/1G/10G Copper | Bond: bond1 - Ports: eth4, eth5 (labeled as net2, net3)
    | Two 100/1000/10000 copper ports that are typically used for the backup or other
    network of your choice. |

    | Management | NetMgt | This is the 10/100 Mbps RJ45 network connection for the
    ILOM connection. This is a single, unbonded connection. |

    | Serial connection | SerMgt | This connection is used to support either a serial
    connection from an external KVM (keyboard, video, mouse) appliance or device,
    or from your laptop to deploy the ODA. |


    The Oracle Appliance Manager Configurator utility used to deploy an ODA will assume
    that the network connections are bonded. However it is possible to deploy networks
    as standalone nonredundant connections by skipping the bonding. In order to do
    this, some manual work is involved and the process is not included in the standard
    ODA documentation. You’ll probably need to ask an experienced sysadmin to give
    you a hand if you decide to deploy the networks outside the process that comes
    out-of-the-box with an ODA.


    The X3-2 ODA network details are covered in Part Two of the Oracle Database Appliance
    Owner’s Guide in the chapter titled “Attaching Cables and Power Cords, and Powering
    On Oracle Database Appliance X3-2.” This chapter is mainly focused on the implementing
    the cabling shipped with an ODA to connect all of the ODA components together.
    You have to read the chapter closely to find the details on the external network
    connections. Additional reference information can be found in [Chapter 1](#A978-1-4302-6266-4_1_Chapter.html)
    and Appendix A of the ODA Getting Started Guide.


    ## ODA Network Deployment Process


    ODA networks can be deployed using the process outlined in the subsections to
    follow. Most of these steps are necessary, but are fairly simple in nature. The
    steps are listed roughly in the order in which they should occur. Of course, each
    company has their own standards and methods for getting a server deployed in their
    data center and on their network. The key steps are as follows:


    Plan which ODA networks will be deployed.   Define network security considerations.
      Complete work that can be accomplished before the ODA arrives.   Spec and order
    the ODA network cabling.   Request IP addresses.   Build the offline configuration
    file.   Rack the ODA.   Cable the ODA, including internal cabling.   Apply the
    ILOM IP addresses and configure the ODA public network.   Run the ODA deployment
    process to configure the remaining networks.


    ### Plan the ODA Networks to Be Deployed


    The X3-2 ODA model supports two bonded networks. One of them will certainly be
    used for the public network. The second network is generally used as the backup
    network. It is possible to unbond one or both networks to take advantage of all
    four external network connections at the cost of network redundancy. An example
    would be deploying a bonded public network and a single connection for a backup
    network and an additional network to support an NFS storage mount. While it is
    also possible to mount NFS storage over the public network, performance issues
    can arise when large volumes of data are streamed between the server and NFS storage.
    The need for external storage mounts has somewhat diminished due to the very large
    amount of internal storage supplied with an ODA.


    Note


    The key point in this section is that the first network deployment step is to
    plan out what networks are required for your solution, and matching those requirements
    to the ODA network options. Understanding the workloads that need to be supported
    can also be an important consideration in planning ODA networks.


    ODAs can now store a great deal of data. If the databases deployed have tight
    RTO (recovery time objective) requirements, and they are large in size, using
    a 10G backup network can help drive better backup and recovery performance. This
    would be in addition to deploying the standard RMAN tuning steps. If you are connected
    to a backup network through an NFS mount, DNFS (Direct NFS) can be implemented
    to speed up the backup and recovery throughput. There is an old adage followed
    by many long-term Oracle DBAs and architects: “It is better to focus on architecting
    for recovery than to architect for backups.” If you want to make sure that you
    have all of your recovery bases covered, your network planning plays a key role.


    If your company only uses 10G fiber or other fiber network infrastructure, then
    additional planning, and potentially costs, may be needed to bridge the ODA copper
    cabling to your fiber network. As mentioned previously, this is subject to change
    when new models are released.'
  trans: "\n### Oracle Database Appliance X3-2\n\nODA 的下一次发布带来了一些重大的网络变更。X3-2 型号不再包含光纤网卡。这一变化让不少\
    \ ODA 客户——甚至 Oracle 内部及合作伙伴中的一些人——感到意外，因为部分客户的 10G 网络仅支持光纤。\n\n最终，一些客户选择的解决方案是将\
    \ 10G 铜缆从 ODA 桥接到网络结构扩展器或交换机。从该交换机，10G 光纤可以部署到数据中心的光纤网络中。Oracle 甚至开始销售用于此目的的交换机。这种对\
    \ 10G 光纤支持的变通方案可能有点**价格不菲**，因此你需要将相关成本计入预算。\n\n随着新型号的发布，Oracle 可以更改其支持的网络，因此未来\
    \ 10G 光纤支持可能会回归。你需要查阅每个新版本的 Oracle 手册，以审阅所包含网络数量或类型的任何变更。\n\nX3-2 ODA 型号从一个包含两个服务器节点和一组磁盘驱动器的单一封装箱体，转变为采用模块化设计，使用来自通用\
    \ Oracle X3-2 服务器产品线的两个服务器，以及一个或两个独立的存储单元。新的模块化 X3-2 ODA 支持四个外部网络接口。网络速度可以是 100M、1G\
    \ 或 10G。连接仅支持铜缆，网络速度为自动协商。\n\nOracle 最初发布多款带有 X3-2 名称的产品有些令人困惑。你可以订购 X3-2 服务器作为独立的\
    \ ASR 服务器或 Exadata Platinum Support Gateway，也可以订购 X3-2 Oracle 数据库一体机以及 X3-2 Exadata\
    \ 机器。\n\n适用于 X3-2 ODA 型号的网络列于表 5-2 中。X3-2 ODA 有两个服务器节点，每个服务器将包含表中所列的网络接口。\n\n\
    表 5-2. 第二代 ODA 型号部署的网络\n\n| 网络 | 绑定 / 端口 | 用途 |\n| --- | --- | --- |\n| 100M/1G/10G\
    \ 铜缆 | 绑定: `bond0` - 端口: `eth2`, `eth3` (标记为 `net0`, `net1`) | 两个 100/1000/10000\
    \ 铜缆端口，可用于公共网络。ODA 部署过程会将`bond0`作为公共网络。 |\n| 100M/1G/10G 铜缆 | 绑定: `bond1` - 端口:\
    \ `eth4`, `eth5` (标记为 `net2`, `net3`) | 两个 100/1000/10000 铜缆端口，通常用于备份或你选择的其他网络。\
    \ |\n| 管理网络 | `NetMgt` | 用于`ILOM`连接的 10/100 Mbps RJ45 网络连接。这是一个独立的、未绑定的连接。 |\n\
    | 串行连接 | `SerMgt` | 此连接用于支持来自外部 KVM（键盘、视频、鼠标）设备或笔记本电脑的串行连接，以部署 ODA。 |\n\n用于部署\
    \ ODA 的 Oracle Appliance Manager Configurator 实用程序会假定网络连接是绑定的。然而，通过跳过绑定步骤，也有可能将网络部署为独立的非冗余连接。要做到这一点，涉及一些手动工作，且该过程未包含在标准\
    \ ODA 文档中。如果你决定在 ODA 开箱即用流程之外部署网络，可能需要一位经验丰富的系统管理员来帮忙。\n\nX3-2 ODA 的网络细节在《Oracle\
    \ Database Appliance Owner’s Guide》第二部分的“连接电缆和电源线，并启动 Oracle Database Appliance\
    \ X3-2”章节中有详细说明。该章主要侧重于实现随 ODA 发货的电缆以将所有 ODA 组件连接在一起。你需要仔细阅读该章才能找到有关外部网络连接的细节。其他参考信息可以在\
    \ ODA 快速入门指南的第 1 章和附录 A 中找到。\n\n## ODA 网络部署流程\n\n可以使用以下小节概述的流程部署 ODA 网络。这些步骤大多都是必需的，但本质上相当简单。这些步骤大致按其应该发生的顺序列出。当然，每家公司都有自己的标准和方法在数据中心及其网络中部署服务器。关键步骤如下：\n\
    \n规划将要部署哪些 ODA 网络。  \n定义网络安全注意事项。  \n在 ODA 到达前完成可以完成的工作。  \n规划并订购 ODA 网络电缆。  \n\
    申请 IP 地址。  \n构建离线配置文件。  \n将 ODA 上架。  \n为 ODA 布线，包括内部布线。  \n应用`ILOM` IP 地址并配置 ODA\
    \ 公共网络。  \n运行 ODA 部署流程以配置剩余网络。\n\n### 规划将要部署的 ODA 网络\n\nX3-2 ODA 型号支持两个绑定网络。其中一个肯定会用于公共网络。第二个网络通常用作备份网络。可以解除一个或两个网络的绑定，以利用所有四个外部网络连接，代价是失去网络冗余。一个例子是部署一个绑定的公共网络、一个用于备份网络的单独连接，以及一个额外的网络来支持`NFS`存储挂载。虽然通过公共网络挂载`NFS`存储也是可能的，但当服务器与`NFS`存储之间有大量数据流传输时，可能会出现性能问题。由于\
    \ ODA 提供了非常大的内部存储容量，对外部存储挂载的需求已有所减少。\n\n注意\n\n本节的关键点是，第一个网络部署步骤是规划你的解决方案需要哪些网络，并将这些要求与\
    \ ODA 网络选项相匹配。理解需要支持的工作负载也可能是规划 ODA 网络时的一个重要考虑因素。\n\nODA 现在可以存储大量数据。如果部署的数据库有严格的`RTO`（恢复时间目标）要求，并且规模很大，那么使用\
    \ 10G 备份网络有助于实现更好的备份和恢复性能。这将是部署标准`RMAN`调优步骤之外的补充。如果你通过`NFS`挂载连接到备份网络，则可以实施`DNFS`（直接\
    \ NFS）来加速备份和恢复吞吐量。许多资深的 Oracle DBA 和架构师遵循一句古老的格言：“专注于为恢复而设计架构，比为备份而设计更好。”如果你想确保覆盖所有恢复基础，你的网络规划就起着关键作用。\n\
    \n如果你的公司只使用 10G 光纤或其他光纤网络基础设施，那么可能需要额外的规划，并可能产生成本，以将 ODA 的铜缆桥接到你的光纤网络。如前所述，这在新型号发布时可能会发生变化。\n"
- fmt: '### Define Network Security Considerations


    The nature of your data and the associated security risk considerations may require
    that your `ODA` be placed on specific IP ranges, on VLANs, or behind specific
    firewalls. It is best to plan out the network security requirements with your
    security and networking people as early as possible to avoid delaying your project.
    Every company has its process and standards for network security, as well as its
    choice as to whether encryption needs to be deployed at the network layer. This
    work can start before you order your `ODA` so that the network requirements don’t
    become a bottleneck that will slow down your `ODA` deployment.


    In today’s rush to `DBaaS` (Database as a Service) and cloud deployments, it isn’t
    unusual to predeploy infrastructure according to application and security tiering.
    The more that security or other network requirements are worked out in advance,
    the better your chances are for realizing the fast deployment benefits of the
    `ODA`. There are financial benefits for deploying infrastructure “Just-In-Time,”
    instead of “way too early” or “way too late.”


    ### Complete Work That Can Be Accomplished Before the ODA Arrives


    Identify when you can complete work in advance or do things in parallel so that
    when an `ODA` arrives, it can be immediately cabled and deployed using the “one
    button” deployment automation feature. Some of the tasks that can be done before
    the `ODA` arrives include a number of the implementation steps outlined in this
    chapter, including:


    *   Plan your networks.

    *   Finalize security considerations.

    *   Request IP addresses.

    *   Submit cabling requests and order any necessary cables.

    *   Submit `DNS` and firewall requests.

    *   Identify the rack locations.

    *   Build the deployment configuration files using the `Oracle Appliance Manager
    Configurator` utility in offline mode.


    This author has personally witnessed multiple `ODAs` land on the dock, only to
    be running as fully deployed `RAC` clusters within 48 hours. Shipping time is
    not time to be wasting. Use that time to your advantage to prepare and be ready
    when your `ODA` units arrive.


    Now that it is possible to deploy applications in addition to databases on an
    `ODA`, your network planning may need to extend to the application tier. Oracle
    supports deploying applications on an `ODA` to have a complete application solution
    running very quickly. Oracle includes information in the `Getting Started Guide`
    to detail the process for installing and supporting virtualization on an `ODA`.


    Application requirements can impact your network planning. In addition to the
    need for more IP addresses, applications may need to reside on different networks
    than your database servers. This can be due to security considerations, for example.


    When `ODAs` were first released, there were a number of partners and consultants
    that produced videos or blogs detailing how fast it is to deploy `ODAs`. In one
    case, the network cables were run to the dock to deploy the `ODA` while it was
    still on the shipping pallet. You can still find some of these videos on YouTube.
    Live `ODA` builds were highlighted at several Oracle user conferences.


    While it has been proven many times that an `ODA` can be deployed quickly, it
    is always important to make sure to deploy them correctly. Planning can help accomplish
    this. It’s always possible to change the networks after an `ODA` has been deployed.
    Options for making some of these changes will be discussed in an upcoming section.
    If worse comes to worst, you can always bare metal an `ODA` to start over. But
    if you follow the old carpenters rule to “measure twice, cut once,” costly reworks
    can be eliminated.


    ### Spec and Order the ODA Network Cabling


    The good news about deploying `ODAs` on your network is that once you deploy an
    `ODA` model the first time, all of the additional `ODAs` released for that model
    are identical. You only have to work out the cabling diagrams for a model once.
    It’s a good idea to formally prepare network and cabling specs for each `ODA`
    deployment using a standard template. Unless you are working for a very small
    IT shop, don’t assume that your networking and data center teams will remember
    what they did to deploy the last `ODA`.


    A couple of other good rules of thumb include understanding the lead times in
    your data center for requesting cabling, and to “make friends with your networking
    and data center people.” The lead times may vary according to cabling type; for
    example, are you bridging copper to fiber? The point regarding making friends
    speaks for itself.


    ### Request IP Addresses


    The IP addresses needed to deploy an `ODA` are documented in the `ODA Getting
    Started Guide` chapter titled “About Oracle Database Appliance.” The requirements
    to deploy an `ODA` are common to both the original Oracle Database Appliance and
    second-generation `X3-2` models. The IP address range requirements for a physical
    `ODA` deployment, also known as a `Bare-Metal (Nonvirtualized) Install`, are listed
    in Table 5-3.


    Table 5-3. Oracle Database Appliance IP requirements for a Bare-Metal (Nonvirtualized)
    Install


    | IP Type | Number of IPs | Comment |

    | --- | --- | --- |

    | Public | 2 | Two IP addresses are required for the two `ODA` server nodes. Each
    server requires an IP address for the physical host name. |

    | Scan IPs | 2 | Two IP addresses to support the scan listener. `ODAs` run 2 scan
    listeners. The scan IP addresses need to be configured in `DNS` to be returned
    in round-robin order. |

    | `RAC` VIP IPs | 2 | Typical `RAC` VIP address needed for each server node. |

    | `ILOM` IPs | 2 | One `ILOM` or management network IP address per server node.
    |

    | Additional networks | 2 | Two IP addresses per additional network, or one per
    server node; for example, a `PBN` or private backup network to support backups
    or `NFS` file system mounts. |


    The six public (host, scan, VIP) IP addresses need to be on the same network subnet,
    and they should be sequential. The minimum number of IP addresses needed to deploy
    an `ODA` is eight. This includes six public and two `ILOM` IPs. The `Getting Started
    Guide` lists the `ILOM` as required. `ILOM` connections can be made through the
    serial port, in addition to creating a permanent connection through the `NetMgt`
    interface. It should be noted that the configuration utility does not require
    `ILOM` IPs for the deployment.


    In addition to the external networks, an `ODA` assigns four additional IPs to
    support the `RAC` interconnect and the deployment of two internal `RAC` networks
    to support `HAIP` (Highly Available IP) redundancy and failover. The `RAC` interconnect
    IP addresses are internally assigned, so they do not need to be requested from
    your network team.


    The additional IP addresses required for a virtualized `ODA` deployment are listed
    in Table 5-4.


    Table 5-4. Additional Oracle Database Appliance IP Requirements for a Virtualized
    Install


    | IP Type | Number of IPs | Comment |

    | --- | --- | --- |

    | `Dom0` | 2 | Two IP addresses that are fixed by Oracle at `192.168.16.24`, and
    `192.168.16.25`. |

    | Virtual machines | 1 | One additional IP address is required for each virtual
    machine that is deployed. |


    A virtualized `ODA` deployment only assigns two IPs to the `RAC` interconnect.


    If possible, the IPs should be requested and assigned as soon as possible, or
    at least as soon as the security considerations are decided. Assigning the IP
    addresses in advance is a key step to support the implementation of `DNS` and
    firewall rules, as well as building the deployment configuration files. When these
    dependencies have been completed, the `ODA` deployment process can begin as soon
    as the `ODA` is racked and the network cabling is complete.'
