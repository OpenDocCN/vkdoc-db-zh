    ## Summary


    This chapter looked at the Oracle Database Appliance (ODA)—both the original and
    the X3-2 models. Originally, the ODA was geared toward small- and medium-sized
    businesses, but it has gained popularity in the enterprise sector as well. The
    all-in-one, all-encompassing architecture that allows for capacity on demand are
    the features that have drawn praise. Simplicity of deployment and management allow
    for cost savings over traditional infrastructure deployment models. An ODA provides
    high availability and redundancy out of the box, and applies Oracle’s best practices
    to the system.


