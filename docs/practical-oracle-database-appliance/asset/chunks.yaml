- fmt: '### Trace File Analyzer


    Trace File Analyzer (TFA) is a new utility introduced in ODA 2.5. It is installed
    and working automatically in the background to proactively capture information
    from various log files during real-time or user-initiated scans.


    Note


    TFA is also an independent utility[¹](#A978-1-4302-6266-4_7_Chapter.html#Fn1)
    from the Oracle RAC Assurance team. It is available for install on most platforms
    that are supported by Oracle RAC.


    TFA is installed by default on an ODA. TFA is not part of the OAK framework. It
    is installed in `/opt/oracle/tfa`. TFA is software-agnostic, which means it can
    be used for much more than Oracle RDBMS or Clusterware log files. Since TFA is
    an independent utility, it has a faster software cycle, with updates as frequent
    as the ODAchk tool.


    TFA provides a variety of functions that revolve around the collection, automation,
    and centralization of diagnostic data. In essence, TFA provides an easy way to
    achieve targeted data collection from live systems. The following are some of
    the features that TFA provides:


    *   Encapsulation of diagnostic data collection for all CRS/GI and RAC components
    on all cluster nodes into a single command executed from a centralized location

    *   The ability to trim diagnostic files during data collection to reduce data
    upload size

    *   The ability to isolate diagnostic data collection to a given time period

    *   The ability to centralize collected diagnostic output to a single server in
    the cluster

    *   The ability to isolate diagnostic collection to a particular product component
    (for example, `ASM`, `RDBMS`, `Clusterware`)

    *   The ability—known as Real Time Scan—to scan alert logs in real time for conditions
    that indicate a problem (DB Alert Logs, `ASM` Alert Logs, `Clusterware` Alert
    Logs, etc.)

    *   Automatic Data Collection based on Real Time Scan findings

    *   On Demand Scan (user initiated) of all log and trace files for conditions
    that indicating a problem

    *   Automatic Data Collection based on On Demand Scan findings


    TFA syntax can be seen by executing the `tfactl` command without any options.
    Listing 7-17 provides what can be done with `tfactl`.


    **Listing 7-17.** tfactl Help


    ```

    [root@odax32 bin]# ./tfactl

    Usage : /opt/oracle/tfa/tfa_home/bin/tfactl <command> [options]

    <command> =

    status       Check the status of TFA across nodes in cluster

    add          Add a directory or host to TFA

    change       Change permission of directory in TFA

    modify       Modify TFA parameters

    set          Turn ON/OFF various TFA features

    remove       Remove a directory from TFA

    print        Print requested details

    run          Run inventory or scan

    diagcollect  Collect logs from across nodes in cluster

    For help with a command: /opt/oracle/tfa/tfa_home/bin/tfactl <command> -help

    For debug output use -verbose option

    ```


    The Oracle Database Appliance has TFA installed as part of the ODA patching. Startup
    of TFA is handled by the `oakd` process. To ensure that TFA is running at any
    point in time, you can validate with `tfactl`, as shown in Listing 7-18.


    **Listing 7-18.** tfactl Status


    ```

    root@odax32 bin]# ./tfactl status

    .-----------------------------------------.

    | Host     | Status of TFA | PID   | Port |

    +----------+---------------+-------+------+

    | odax32   | RUNNING       | 18839 | 5000 |

    | odax32   | RUNNING       | 18637 | 5000 |

    ''----------+---------------+-------+------''

    ```


    We will examine some of the key features of TFA, starting with a display of the
    various information that TFA is collecting. Execute the command `tfactl print`
    to look at various pieces of information about TFA, as shown in Listing 7-19.


    **Listing 7-19.** tfactl Print


    ```

    [root@odax32 bin]# ./tfactl print -h

    Usage: /opt/oracle/tfa/tfa_home/bin/tfactl print [directories|hosts|actions|inventory|invrunstat|repository|...]

    Prints requested details.

    Options:

    config          Print current tfa config settings

    log             Print last ten lines in TFA log

    directories     Print all the directories to Inventory

    ```'
