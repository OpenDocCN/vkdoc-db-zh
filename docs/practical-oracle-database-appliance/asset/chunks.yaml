- fmt: "### Revert the Temporary Configuration\n\nA while ago, you added a temporary\
    \ file system (`/u02`) to the ODA Base on the first node of the ODA. Since then,\
    \ the e-Business Suite database has been migrated to ASM and RAC using a natively\
    \ created database Oracle Home on ODA, thus the temporary configuration can be\
    \ removed. The following steps will remove the `/u02` file system and will restore\
    \ the Oracle Inventory on the ODA Base where the database was initially installed.\n\
    \nUnregister the old Oracle Home from the inventory:\n\n```bash\n[oracle@s1 ~]$\
    \ cd /u02/prod/11.2.0\n[oracle@s1 11.2.0]$ cd oui/bin\n[oracle@s1 bin]$ ./runInstaller\
    \ -silent -detachHome ORACLE_HOME=/u02/prod/11.2.0\nStarting Oracle Universal\
    \ Installer...\nChecking swap space: must be greater than 500 MB.   Actual 19748\
    \ MB    Passed\nThe inventory pointer is located at /etc/oraInst.loc\nThe inventory\
    \ is located at /u01/app/oraInventory\n'DetachHome' was successful.\n```\n\nRemove\
    \ the `/u02` from ODA Base. Use `fuser` to find if any processes are still using\
    \ the mountpoint and terminate them if any are found. For example:\n\n```bash\n\
    [root@s1 ~]# fuser -m /u02\n/u02:               89091ce\n[root@s1 ~]# kill -9\
    \ 89091\n[root@s1 ~]# umount /u02\n```\n\nRemove the partition that you created\
    \ on the attached block device `/dev/xvdd` to create the temporary `ext3` file\
    \ system on the ODA Base. Here are the commands to execute:\n\n```bash\n[root@s1\
    \ ~]# fdisk /dev/xvdd\nCommand (m for help): d\nCommand (m for help): w\n[root@s1\
    \ ~]# ls -l /dev/xvdd*\nbrw-r----- 1 root disk 202, 48 Sep 28 18:52 /dev/xvdd\n\
    ```\n\nDetach the block device from the ODA Base. This is a tricky process. If\
    \ you want to walk the easy path, simply restart the ODA Base and the temporary\
    \ block device will be removed because it wasn’t saved in the configuration for\
    \ the ODA Base. But if the system is used by other databases, or for some reason\
    \ bouncing the ODA Base is not an option, then execute `xenstore-ls` to find out\
    \ the domain id and the vdb id (the virtual block device id) for the attached\
    \ block device. The command will spool a lot of output, but if you search for\
    \ the filename of the attached file (`u02.img`), you’ll find a section similar\
    \ to that in the following example:\n\n```bash\n[root@ovs-host1 oakDom1]# xenstore-ls\n\
    ...\n      51760 = \"\"\n       domain = \"oakDom1\"\n       frontend = \"/local/domain/2/device/vbd/51760\"\
    \n       uuid = \"def6fa49-aeb6-eab8-1ed6-2c6007489c9c\"\n       bootable = \"\
    0\"\n       dev = \"/dev/xvdd\"\n       state = \"4\"\n       params = \"/OVS/Repositories/odabaseRepo/VirtualMachines/oakDom1/u02.img\"\
    \n       mode = \"w\"\n       online = \"1\"\n       frontend-id = \"2\"\n   \
    \    type = \"file\"\n       node = \"/dev/loop4\"\n       physical-device = \"\
    7:4\"\n       feature-flush-cache = \"1\"\n       feature-discard = \"0\"\n  \
    \     feature-barrier = \"1\"\n       sectors = \"204800\"\n       info = \"0\"\
    \n       sector-size = \"512\"\n       hotplug-status = \"connected\"\n...\n```\n\
    \nYou’re interested in finding the correct “front-end” path for the attached device.\
    \ In this case, the path is `/local/domain/2/device/vbd/51760`. The domain id\
    \ in the path is “2” and the vdb id is “51760”. This information is sufficient\
    \ for detaching the device from the ODA Base using `xm block-detach` by using\
    \ the following commands:\n\n```bash\n[root@ovs-host1 ~]# xm block-detach 2 51760\n\
    [root@ovs-host1 ~]# xenstore-ls | grep \"u02.img\"\n# no rows retrieved#\n```\n\
    \nThe `u02.img` file is not needed anymore and can be removed.\n\n```bash\n[root@ovs-host1\
    \ ~]# rm -vf /OVS/Repositories/odabaseRepo/VirtualMachines/oakDom1/u02.img\nremoved\
    \ `/OVS/Repositories/odabaseRepo/VirtualMachines/oakDom1/u02.img'\n```\n\nThe\
    \ ODA Base is now restored to its original state.\n\n## Post-Installation Tasks\n\
    \nThe installation of e-Business Suite Release 12.2 on ODA has been completed.\
    \ The remaining tasks are not directly related to deploying the system on ODA,\
    \ but rather to the specific requirements you have for your system, and most of\
    \ them will be covered during the e-Business Suite implementation project you\
    \ are running. This chapter mentions a few important steps and references to additional\
    \ documentation besides the technical configuration of the e-Business Suite on\
    \ ODA, without which the implementation would not be complete.\n\n### Additional\
    \ Configuration\n\nThe list of additional configuration tasks you’ll perform in\
    \ your system depends on the requirements you have for your environment. A typical\
    \ list of areas to explore include:\n\n*   Integration with other systems: Includes\
    \ identity management products (Oracle Access Manager, Oracle Internet Directory),\
    \ reporting tools (Oracle Discoverer, OBIEE), connected systems using incoming\
    \ and outgoing database links, custom-built in-house applications, and others.\n\
    *   Configuration of the required business functionality: e-Business Suite is\
    \ a comprehensive suite of integrated, global business applications. Depending\
    \ on your plans, you will configure few or many modules included in Oracle e-Business\
    \ Suite. The R12.2 documentation library contains at least 85 implementation guides\
    \ for different areas of functionality. You’ll definitely need to review at least\
    \ some of these and you probably will have to make some changes to the existing\
    \ environment.\n*   Tuning of the configuration: Your environment will likely\
    \ require some tuning after the initial implementation. This includes sizing the\
    \ connection pools between application tier servers and the database, tuning the\
    \ memory parameters of the database and application tier services, sizing the\
    \ concurrent managers and implementing parallel concurrent processing (PCP), adjusting\
    \ the session timeouts, and others.\n*   Recommended patches: The e-Business Suite\
    \ modules are constantly being developed as bugs are fixed and new features are\
    \ implemented. The Release 12.2 was made generally available in September 2013\
    \ and it is not uncommon to see critical or recommended patches to be released\
    \ soon after a product is released. You should check the “Recommended Patches”\
    \ reports in My Oracle Support to identify any known bugs and be able to fix them\
    \ before your system is transferred into production use.\n\n### Backups and Monitoring\n\
    \nAn important preparation step for going live with ODA is the implementation\
    \ of a monitoring framework for timely notification about issues. The best way\
    \ to monitor the ODA hardware is by configuring the Auto Service Request (ASR)\
    \ support feature that is included in the ODA software bundle. ASR automatically\
    \ creates Service Requests, provides diagnostic information to Oracle Support,\
    \ and notifies administrators about hardware faults.\n\nASR does not provide any\
    \ monitoring for the database, the VMs, and the e-Business Suite application.\
    \ You need to implement tools to monitor the software components of the system.\
    \ ODA supports installation of third-party agents to manage, monitor, backup,\
    \ replicate, authenticate, or otherwise act on the database, the server, or the\
    \ environment[^(15)](#A978-1-4302-6266-4_11_Chapter.html#Fn15), thus giving the\
    \ opportunity to handle the ODA the same way as any other server in your IT infrastructure.\n\
    \nYou also need to decide how backups will be taken. The default configuration\
    \ of the ODA assumes the fast recovery area for the database is used and it’s\
    \ configured to use the ASM disk group `+RECO`, but this does not cover the VMs\
    \ and the shared file system for e-Business Suite. You might consider and find\
    \ it more convenient to use an external NFS-mounted file system for both the database\
    \ backups and the backups of the e-Business Suite file system; this way, the backups\
    \ of the whole system would be logically kept together, and if a recovery situation\
    \ occurs, it would be easier to retrieve the required backups from the same location,\
    \ compared to extracting them from different locations."
  raw: '### Revert the Temporary Configuration


    A while ago, you added a temporary file system `(/u02`) to the ODA Base on the
    first node of the ODA. Since then, the e-Business Suite database has been migrated
    to ASM and RAC using a natively created database Oracle Home on ODA, thus the
    temporary configuration can be removed. The following steps will remove the `/u02`
    file system and will restore the Oracle Inventory on the ODA Base where the database
    was initially installed.


    Unregister the old Oracle Home from the inventory:  


    `[oracle@s1 ∼]$` `cd /u02/prod/11.2.0`


    `[oracle@s1 11.2.0]$` `cd oui/bin`


    `[oracle@s1 bin]$` `./runInstaller -silent -detachHome ORACLE_HOME=/u02/prod/11.2.0`


    `Starting Oracle Universal Installer...`


    `Checking swap space: must be greater than 500 MB.   Actual 19748 MB    Passed`


    `The inventory pointer is located at /etc/oraInst.loc`


    `The inventory is located at /u01/app/oraInventory`


    `''DetachHome'' was successful.`


    Remove the `/u02` from ODA Base. Use `fuser` to find if any processes are still
    using the mountpoint and terminate them if any are found. For example:  


    `[root@s1 ∼]#` `fuser -m /u02`


    `/u02:               89091ce`


    `[root@s1 ∼]#` `kill -9 89091`


    `[root@s1 ∼]#` `umount /u02`


    Remove the partition that you created on the attached block device `/dev/xvdd`
    to create the temporary `ext3` file system on the ODA Base. Here are the commands
    to execute:  


    `[root@s1 ∼]#` `fdisk /dev/xvdd`


    `Command (m for help): d`


    `Command (m for help): w`


    `[root@s1 ∼]#` `ls -l /dev/xvdd*`


    `brw-r----- 1 root disk 202, 48 Sep 28 18:52 /dev/xvdd`


    Detach the block device from the ODA Base. This is a tricky process. If you want
    to walk the easy path, simply restart the ODA Base and the temporary block device
    will be removed because it wasn’t saved in the configuration for the ODA Base.
    But if the system is used by other databases, or for some reason bouncing the
    ODA Base is not an option, then execute  `xenstore-ls` to find out the domain
    id and the vdb id (the virtual block device id) for the attached block device.
    The command will spool a lot of output, but if you search for the filename of
    the attached file (`u02.img`), you’ll find a section similar to that in the following
    example:  


    `[root@ovs-host1 oakDom1]#` `xenstore-ls`


    `...`


          `51760 = ""`


           `domain = "oakDom1"`


           `frontend = "/local/domain/2/device/vbd/51760"`


           `uuid = "def6fa49-aeb6-eab8-1ed6-2c6007489c9c"`


           `bootable = "0"`


           `dev = "/dev/xvdd"`


           `state = "4"`


           `params = "/OVS/Repositories/odabaseRepo/VirtualMachines/oakDom1/u02.img"`


           `mode = "w"`


           `online = "1"`


           `frontend-id = "2"`


           `type = "file"`


           `node = "/dev/loop4"`


           `physical-device = "7:4"`


           `feature-flush-cache = "1"`


           `feature-discard = "0"`


           `feature-barrier = "1"`


           `sectors = "204800"`


           `info = "0"`


           `sector-size = "512"`


           `hotplug-status = "connected"`


    `...`


    You’re interested in finding the correct “front-end” path for the attached device.
    In this case, the path is `“/local/domain/2/device/vbd/51760`”. The domain id
    in the path is “2” and the vdb id is “51760”. This information is sufficient for
    detaching the device from the ODA Base using `xm block-detach` by using the following
    commands:  


    `[root@ovs-host1 ∼]#` `xm block-detach 2 51760`


    `[root@ovs-host1 ∼]#` `xenstore-ls | grep "u02.img"`


    `# no rows retrieved#`


    The `u02.img` file is not needed anymore and can be removed.  


    `[root@ovs-host1 ∼]#` `rm -vf /OVS/Repositories/odabaseRepo/VirtualMachines/oakDom1/u02.img`


    ``removed `/OVS/Repositories/odabaseRepo/VirtualMachines/oakDom1/u02.img''``


    The ODA Base is now restored to its original state.


    ## Post-Installation Tasks


    The installation of e-Business Suite Release 12.2 on ODA has been completed. The
    remaining tasks are not directly related to deploying the system on ODA, but rather
    to the specific requirements you have for your system, and most of them will be
    covered during the e-Business Suite implementation project you are running. This
    chapter mentions a few important steps and references to additional documentation
    besides the technical configuration of the e-Business Suite on ODA, without which
    the implementation would not be complete.


    ### Additional Configuration


    The list of additional configuration tasks you’ll perform in your system depends
    on the requirements you have for your environment. A typical list of areas to
    explore include:


    *   Integration with other systems: Includes identity management products (Oracle
    Access Manager, Oracle Internet Directory), reporting tools (Oracle Discoverer,
    OBIEE), connected systems using incoming and outgoing database links, custom-built
    in-house applications, and others.

    *   Configuration of the required business functionality: e-Business Suite is
    a comprehensive suite of integrated, global business applications. Depending on
    your plans, you will configure few or many modules included in Oracle e-Business
    Suite. The R12.2 documentation library contains at least 85 implementation guides
    for different areas of functionality. You’ll definitely need to review at least
    some of these and you probably will have to make some changes to the existing
    environment.

    *   Tuning of the configuration: Your environment will likely require some tuning
    after the initial implementation. This includes sizing the connection pools between
    application tier servers and the database, tuning the memory parameters of the
    database and application tier services, sizing the concurrent managers and implementing
    parallel concurrent processing (PCP), adjusting the session timeouts, and others.

    *   Recommended patches: The e-Business Suite modules are constantly being developed
    as bugs are fixed and new features are implemented. The Release 12.2 was made
    generally available in September 2013 and it is not uncommon to see critical or
    recommended patches to be released soon after a product is released. You should
    check the “Recommended Patches” reports in My Oracle Support to identify any known
    bugs and be able to fix them before your system is transferred into production
    use.


    ### Backups and Monitoring


    An important preparation step for going live with ODA is the implementation of
    a monitoring framework for timely notification about issues. The best way to monitor
    the ODA hardware is by configuring the Auto Service Request (ASR) support feature
    that is included in the ODA software bundle. ASR automatically creates Service
    Requests, provides diagnostic information to Oracle Support, and notifies administrators
    about hardware faults.


    ASR does not provide any monitoring for the database, the VMs, and the e-Business
    Suite application. You need to implement tools to monitor the software components
    of the system. ODA supports installation of third-party agents to manage, monitor,
    backup, replicate, authenticate, or otherwise act on the database, the server,
    or the environment,[^(15)](#A978-1-4302-6266-4_11_Chapter.html#Fn15) thus giving
    the opportunity to handle the ODA the same way as any other server in your IT
    infrastructure.


    You also need to decide how backups will be taken. The default configuration of
    the ODA assumes the fast recovery area for the database is used and it’s configured
    to use the ASM disk group +RECO, but this does not cover the VMs and the shared
    file system for e-Business Suite. You might consider and find it more convenient
    to use an external NFS-mounted file system for both the database backups and the
    backups of the e-Business Suite file system; this way, the backups of the whole
    system would be logically kept together, and if a recovery situation occurs, it
    would be easier to retrieve the required backups from the same location, compared
    to extracting them from different locations.'
  trans: "### 回滚临时配置\n\n此前，您在 ODA 的第一个节点上的 ODA 基础系统中添加了一个临时文件系统 (`/u02`)。自那时起，电子商务套件数据库已通过\
    \ ODA 上原生创建的数据库主目录迁移到 ASM 和 RAC，因此可以移除该临时配置。以下步骤将删除 `/u02` 文件系统，并将 Oracle 清单恢复至数据库最初安装所在的\
    \ ODA 基础系统。\n\n从清单中注销旧的 Oracle 主目录：\n\n```bash\n[oracle@s1 ~]$ cd /u02/prod/11.2.0\n\
    [oracle@s1 11.2.0]$ cd oui/bin\n[oracle@s1 bin]$ ./runInstaller -silent -detachHome\
    \ ORACLE_HOME=/u02/prod/11.2.0\nStarting Oracle Universal Installer...\nChecking\
    \ swap space: must be greater than 500 MB.   Actual 19748 MB    Passed\nThe inventory\
    \ pointer is located at /etc/oraInst.loc\nThe inventory is located at /u01/app/oraInventory\n\
    'DetachHome' was successful.\n```\n\n从 ODA 基础系统移除 `/u02`。使用 `fuser` 命令查找是否有进程仍在使用该挂载点，如果找到则终止它们。例如：\n\
    \n```bash\n[root@s1 ~]# fuser -m /u02\n/u02:               89091ce\n[root@s1 ~]#\
    \ kill -9 89091\n[root@s1 ~]# umount /u02\n```\n\n移除您在附加的块设备 `/dev/xvdd` 上创建的分区，该分区用于在\
    \ ODA 基础系统上创建临时的 `ext3` 文件系统。需要执行以下命令：\n\n```bash\n[root@s1 ~]# fdisk /dev/xvdd\n\
    Command (m for help): d\nCommand (m for help): w\n[root@s1 ~]# ls -l /dev/xvdd*\n\
    brw-r----- 1 root disk 202, 48 Sep 28 18:52 /dev/xvdd\n```\n\n将块设备从 ODA 基础系统分离。这是一个较为复杂的操作。如果您想选择简单的方式，只需重启\
    \ ODA 基础系统，临时块设备就会被移除，因为它并未保存在 ODA 基础系统的配置中。但如果系统被其他数据库使用，或由于某些原因无法重启 ODA 基础系统，则需要执行\
    \ `xenstore-ls` 命令来查找附加块设备的域 ID 和 vdb ID（虚拟块设备 ID）。该命令会输出大量信息，但如果您搜索附加文件的文件名 (`u02.img`)，会找到一段类似于以下示例的内容：\n\
    \n```bash\n[root@ovs-host1 oakDom1]# xenstore-ls\n...\n      51760 = \"\"\n  \
    \     domain = \"oakDom1\"\n       frontend = \"/local/domain/2/device/vbd/51760\"\
    \n       uuid = \"def6fa49-aeb6-eab8-1ed6-2c6007489c9c\"\n       bootable = \"\
    0\"\n       dev = \"/dev/xvdd\"\n       state = \"4\"\n       params = \"/OVS/Repositories/odabaseRepo/VirtualMachines/oakDom1/u02.img\"\
    \n       mode = \"w\"\n       online = \"1\"\n       frontend-id = \"2\"\n   \
    \    type = \"file\"\n       node = \"/dev/loop4\"\n       physical-device = \"\
    7:4\"\n       feature-flush-cache = \"1\"\n       feature-discard = \"0\"\n  \
    \     feature-barrier = \"1\"\n       sectors = \"204800\"\n       info = \"0\"\
    \n       sector-size = \"512\"\n       hotplug-status = \"connected\"\n...\n```\n\
    \n您需要找到该附加设备的正确“前端”路径。在本例中，路径为 `/local/domain/2/device/vbd/51760`。路径中的域 ID 是 \"\
    2\"，vdb ID 是 \"51760\"。有了这些信息，就足以使用 `xm block-detach` 命令将设备从 ODA 基础系统分离，命令如下：\n\
    \n```bash\n[root@ovs-host1 ~]# xm block-detach 2 51760\n[root@ovs-host1 ~]# xenstore-ls\
    \ | grep \"u02.img\"\n# no rows retrieved#\n```\n\n`u02.img` 文件不再需要，可以删除。\n\n\
    ```bash\n[root@ovs-host1 ~]# rm -vf /OVS/Repositories/odabaseRepo/VirtualMachines/oakDom1/u02.img\n\
    removed `/OVS/Repositories/odabaseRepo/VirtualMachines/oakDom1/u02.img'\n```\n\
    \n至此，ODA 基础系统已恢复到原始状态。\n\n## 安装后任务\n\n在 ODA 上安装电子商务套件 Release 12.2 已完成。剩余任务并非直接与在\
    \ ODA 上部署系统相关，而是与您对系统的特定需求相关，其中大部分将在您进行的电子商务套件实施项目中涵盖。本章提及了一些重要步骤，并参考了除 ODA 上电子商务套件的技术配置之外的附加文档，没有这些，实施将不完整。\n\
    \n### 附加配置\n\n您将在系统中执行的附加配置任务列表取决于您对环境的要求。需要探索的典型领域包括：\n\n*   与其他系统集成：包括身份管理产品（Oracle\
    \ Access Manager, Oracle Internet Directory）、报告工具（Oracle Discoverer, OBIEE）、使用传入和传出数据库链接连接的系统、自定义构建的内部应用程序等。\n\
    *   配置所需的业务功能：电子商务套件是一套全面的、集成的全球化业务应用程序套件。根据您的计划，您将配置 Oracle 电子商务套件中包含的少数或多个模块。R12.2\
    \ 文档库包含至少 85 份不同功能领域的实施指南。您肯定需要审阅其中至少一些指南，并且很可能需要对现有环境进行一些更改。\n*   配置调优：在初始实施后，您的环境可能需要一些调优。这包括调整应用层服务器与数据库之间的连接池大小、调整数据库和应用层服务的内存参数、调整并发管理器大小并实现并行并发处理（PCP）、调整会话超时等。\n\
    *   推荐补丁：电子商务套件模块在不断开发中，修复错误并实施新功能。Release 12.2 于 2013 年 9 月正式发布，在产品发布后不久即发布关键或推荐补丁的情况并不少见。您应检查\
    \ My Oracle Support 中的“推荐补丁”报告，以识别任何已知错误，并能够在系统投入生产使用前进行修复。\n\n### 备份与监控\n\n在\
    \ ODA 上线的一个重要准备步骤是实施监控框架，以便及时通知问题。监控 ODA 硬件的最佳方式是配置 ODA 软件包中包含的自动服务请求 (ASR) 支持功能。ASR\
    \ 会自动创建服务请求，向 Oracle 支持提供诊断信息，并通知管理员硬件故障。\n\nASR 不提供对数据库、虚拟机和电子商务套件应用程序的任何监控。您需要实施工具来监控系统的软件组件。ODA\
    \ 支持安装第三方代理来管理、监控、备份、复制、认证或以其他方式操作数据库、服务器或环境[¹⁵]，从而有机会像处理 IT 基础设施中任何其他服务器一样处理\
    \ ODA。\n\n您还需要决定如何进行备份。ODA 的默认配置假定使用了数据库的快速恢复区，并配置为使用 ASM 磁盘组 `+RECO`，但这并未覆盖虚拟机和电子商务套件的共享文件系统。您可能会考虑并发现使用外部\
    \ NFS 挂载的文件系统进行数据库备份和电子商务套件文件系统备份更为方便；这样，整个系统的备份在逻辑上会集中保存在一起，如果发生恢复情况，相比从不同位置提取，从同一位置检索所需的备份会更容易。\n\
    \n[¹⁵]: 请参阅《Oracle Database Administrator's Guide》了解可在此上下文中使用的代理的详细信息。"
- fmt: "## Summary\n\n本章阐述了如何将 Oracle Database Appliance 转换为 Oracle e-Business Suite\
    \ Appliance。它提出了一种配置方案，允许在单个 ODA 上创建一个完全配置的高可用性 e-Business Suite 系统。该配置使用 ASM\
    \ 作为数据库存储，使用 RAC 实现数据库可用性和工作负载平衡，使用两个虚拟化应用层服务器确保中间层服务的可用性，使用 ACFS 上的共享应用层文件系统以简化\
    \ e-Business Suite 的管理，并使用虚拟 IP 地址实现前端服务的故障转移。详细解释了实现此配置的非标准步骤。\n\n本章还概述了 e-Business\
    \ Suite Release 12.2 的安装过程，可用作在任何支持的硬件上安装和转换 e-Business Suite 为高可用性配置的参考。未涵盖较旧版本在\
    \ ODA 上的安装和迁移，但所提议的架构以及为该架构准备 ODA 的配置步骤对于 e-Business Suite R12.1、R12.0 甚至 11i\
    \ 仍然有效。\n\n脚注：\n1.  此图基于作者在 The Pythian Group Inc. 的工作经验，并支持了超过 15 个 e-Business\
    \ Suite 系统。\n2.  请检查 My Oracle Support 上的认证服务以获取最新要求。\n3.  `RAC One Node` 得到支持，无需明确认证（[`https://blogs.oracle.com/stevenChan/entry/rac_one_node_ebs`](https://blogs.oracle.com/stevenChan/entry/rac_one_node_ebs)）。\n\
    4.  系统的所有组件由同一供应商支持。\n5.  2013年10月17日。\n6.  这些数字是通过仅下载全新安装所需的文件计算得出的。安装 Vision\
    \ 数据库所需的文件未包含在内。\n7.  [`https://edelivery.oracle.com`](https://edelivery.oracle.com/)\n\
    8.  Oracle Linux 6 Update 4 模板 (OVF) - 半虚拟化 x86_64 (64 位)，部件号 V38315-01。\n9. \
    \ 主机名不包含域名。\n10. 推荐的挂载选项列在 My Oracle Support 注释 “Sharing the Application Tier\
    \ File System in Oracle E-Business Suite Release 12.2 (Doc ID 1375769.1)” 中。\n\
    11. 在 [`www.keepalived.org`](http://www.keepalived.org) 上查找有关 `keepalived` 的更多信息。\n\
    12. 可从 [otn.oracle.com](http://otn.oracle.com) 文档部分获取，[`http://docs.oracle.com/cd/E18727_01/index.htm`](http://docs.oracle.com/cd/E18727_01/index.htm)。\n\
    13. 在撰写本文时尚无适用于 R12.2 的 Rapid Install (`StartCD`) 补丁。一旦发布，它们将在 My Oracle Support\
    \ 注释 “Oracle E-Business Suite Release Notes, Release 12.2 (Doc ID 1320300.1)”\
    \ 中注明。\n14. 参见 My Oracle Support 注释 888888.1。\n15. My Oracle Support 注释 “FAQ :\
    \ ODA 2.3 New Features includes Multiple Homes & 3rd Party Agent Support (Doc\
    \ ID 1415773.1)”。\n\n# 12. Oracle Enterprise Manager and the ODA\n\n## Abstract\n\
    \nOracle Enterprise Manager Cloud Control 12c（以下简称 `EM12c`）是 Oracle 公司用于 Oracle\
    \ 和非 Oracle 技术的最新端到端管理工具。以前称为 Oracle Enterprise Manager (`OEM`) 或 Oracle Enterprise\
    \ Manager Grid Control，该工具已存在相当长一段时间。然而，12c 版本是一个里程碑式的版本，其功能的广度和深度都取得了巨大进步。在许多方面，这个版本使\
    \ Enterprise Manager 从一个数据库管理员的监控工具，转变为可用于管理整个 Oracle 数据中心的工具。\n\n在您理解 `EM12c`\
    \ 如何在 ODA 环境中使用之前，您需要真正了解 `EM12c` 的基本架构，因此让我们首先为您介绍 `EM12c` 的基本架构。\n\n## Architecture\
    \ Overview\n\n从架构角度来看，`EM12c` 由五个主要部分组成：\n\n*   Cloud Control 控制台\n*   Oracle\
    \ Management 代理\n*   Oracle Management Service\n*   Oracle Management Repository\n\
    *   插件\n\n让我们更详细地看看每一个部分。\n\n**注意**  \n关于 `EM12c` 许可的讨论超出了本书的范围。（完整的许可文档可在 Enterprise\
    \ Manager 文档中获取：[`http://docs.oracle.com/cd/E24628_01/license.121/e24474/toc.htm`](http://docs.oracle.com/cd/E24628_01/license.121/e24474/toc.htm)。）然而，值得注意的是，一般来说，这里描述的大多数基本功能都附带受限使用许可，因此是免费的。此受限使用许可特指\
    \ Enterprise Manager，但许多附加选项确实涉及许可费用。完整详情请参阅许可文档。\n\n### The Cloud Control Console\n\
    \nCloud Control 控制台提供了用于访问、监控和管理计算环境的用户界面。该控制台通过 Web 浏览器访问，因此允许您从任何位置访问中央控制台。您可以比以往版本更多地自定义\
    \ `EM12c` 控制台，允许您进行以下选择：\n\n*   从各种预定义页面中选择您的主页（或者将任何您想要的页面设置为您的个人主页）\n*   在目标主页上移动区域\n\
    *   添加可能比默认区域更让您感兴趣的区域\n*   删除您不感兴趣的区域\n\n图形用户界面 (`GUI`) 提供了您最近访问过的目标的历史记录（标准浏览器历史记录也可用）。此外，您可以将页面标记为收藏夹，它们会出现在新的基于菜单的界面的收藏夹列表中。图\
    \ [12-1](#A978-1-4302-6266-4_12_Chapter.html#Fig1) 显示了默认主页的示例。\n\n![A978-1-4302-6266-4_12_Fig1_HTML.jpg](A978-1-4302-6266-4_12_Fig1_HTML.jpg)\n\
    \n图 12-1. EM12c 中的新默认主页"
  raw: "## Summary\n\nThis chapter explains how to convert the Oracle Database Appliance\
    \ into an Oracle e-Business Suite Appliance. It proposes a configuration, which\
    \ allows creating a highly available e-Business Suite system fully configured\
    \ on a single ODA. The configuration utilizes ASM for the database storage, RAC\
    \ for the database availability and workload balancing, two virtualized application\
    \ tier servers for availability of the middle tier services, shared application\
    \ tier file system on ACFS for simplified management of e-Business Suite, and\
    \ a virtual IP address for the failover of the front-end services. The nonstandard\
    \ steps for implementing such configuration are explained in details.\n\nThe chapter\
    \ also outlines the installation process of e-Business Suite Release 12.2 and\
    \ can be used as a reference for installations and conversions of e-Business Suite\
    \ into a highly available configuration on any supported hardware. The installation\
    \ and migration of older releases to ODA are not covered, but the proposed architecture\
    \ and the configuration steps to prepare the ODA for such architecture are still\
    \ valid for e-Business Suite R12.1, R12.0, and even 11i.\n\nFootnotes [1](#A978-1-4302-6266-4_11_Chapter.html#Fn1_source)\n\
    \nThis figure is based on the author’s experience working at The Pythian Group\
    \ Inc. and supporting more than 15 e-Business Suite systems.\n\n  [2](#A978-1-4302-6266-4_11_Chapter.html#Fn2_source)\n\
