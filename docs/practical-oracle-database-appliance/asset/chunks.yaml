  trans: '

    ### VNC 配置与连接


    VNC 是一种图形化桌面共享技术，它允许你在服务器上使用 X11 桌面并本地执行程序，而仅将屏幕输出发送到你的 PC 或 MAC 上的 VNC 客户端。在安装终端用户束之前，你需要为
    VNC 服务器配置一个初始密码。要设置初始 VNC 密码，请运行 `vncserver` 命令并设置你的密码。该命令还会为你提供 VNC 会话编号。代码清单
    3-8 展示了在设置 VNC 服务器密码时应该看到的示例。


    代码清单 3-8. 设置 VNC 服务器密码和端口


    ```

    [root@oak1 tmp]# vncserver

    You will require a password to access your desktops.

    Password:

    Verify:

    xauth:  creating new authority file /root/.Xauthority

    xauth: (stdin):1:  bad display name "oak1:1" in "add" command

    New ''oak1:1 (root)'' desktop is oak1:1

    Creating default startup script /root/.vnc/xstartup

    Starting applications specified in /root/.vnc/xstartup

    Log file is /root/.vnc/oak1:1.log

    ```


    一旦密码设置完成并确定了会话编号，你就可以使用 VNC 客户端连接到系统。对于远程主机，你需要使用启动 VNC 服务器时标识的 IP 地址和会话。图 3-4
    展示了使用 VNC 客户端连接到 Oracle 数据库设备。


    ![A978-1-4302-6266-4_3_Fig4_HTML.jpg](img/A978-1-4302-6266-4_3_Fig4_HTML.jpg)

    图 3-4. VNC 客户端连接到 Oracle 数据库设备


    如果你使用正确的会话 ID 和 IP 地址，现在应该会提示你输入密码。输入你在配置 VNC 服务器时设置的密码（参见图 3-5）。


    ![A978-1-4302-6266-4_3_Fig5_HTML.jpg](img/A978-1-4302-6266-4_3_Fig5_HTML.jpg)

    图 3-5. 客户端上来自 VNC 服务器的密码提示


    如果密码被接受，你现在应该能看到一个 X11 桌面。在出现的命令窗口中，你可以开始部署 Oracle 数据库设备。要开始部署，必须使用 `oakcli deploy`
    命令。这将启动 Oracle 设备管理器 (OAM)。一旦 Oracle 设备管理器启动，你将能够配置 Oracle 网格基础设施加上自动存储管理 (ASM)
    存储以及 Oracle 数据库。代码清单 3-9 展示了如何使用 `oakcli deploy` 开始部署过程。


    代码清单 3-9. 使用 oakcli 进行部署


    ```

    [root@oak1 ∼]# /opt/oracle/oak/bin/oakcli deploy

    Log messages in /tmp/oak_1378687999949.log

    Running Oracle Appliance Manager

    ```


    既然你已经在 Oracle 数据库设备上启动了部署，你需要熟悉 Oracle 设备管理器。在下一节中，你将了解 Oracle 设备管理器以及基础配置应选择的选项。


    ### Oracle 设备管理器与部署


    通过运行 `oakcli deploy` 命令，你启动了 Oracle 设备管理器的图形用户界面安装向导。Oracle 设备管理器与其他 Oracle 安装向导非常相似。它将引导你完成配置
    Oracle 数据库设备所需的各种步骤。图 3-6 显示了 Oracle 设备管理器的欢迎屏幕。


    ![A978-1-4302-6266-4_3_Fig6_HTML.jpg](img/A978-1-4302-6266-4_3_Fig6_HTML.jpg)

    图 3-6. Oracle 设备管理器欢迎屏幕


    就像许多其他 Oracle 向导一样，Oracle 提供了一个菜单（在左侧）来帮助你在点击“下一步”按钮推进向导时进行导航。在向导的下一个屏幕中，你可以选择希望在
    Oracle 数据库设备上执行的部署类型。图 3-7 展示了可供你选择的选项。表 3-7 快速描述了这些选项的含义。选择部署类型后，你可以点击“下一步”按钮继续通过向导。


    表 3-7. 部署类型描述


    | 部署类型 | 描述 |

    | --- | --- |

    | 典型 | 所有 Oracle 数据库设备的默认设置 |

    | 自定义 | 允许你覆盖默认设置；即，磁盘镜像设置 ASM |

    | SAP 应用 | 仅用于将运行 SAP 的设备 |


    ![A978-1-4302-6266-4_3_Fig7_HTML.jpg](img/A978-1-4302-6266-4_3_Fig7_HTML.jpg)

    图 3-7. 配置类型


    在向导的下一步中，你需要为 Oracle 数据库设备设置系统信息。图 3-8 展示了向导的界面。你需要选择或输入所需的信息。


    ![A978-1-4302-6266-4_3_Fig8_HTML.jpg](img/A978-1-4302-6266-4_3_Fig8_HTML.jpg)

    图 3-8. Oracle 数据库设备的系统信息


    在系统信息步骤中，有几点需要注意。首先，系统名称用于部署和 Oracle 数据库设备中的每个节点，节点的主机名会自动在系统名称后附加 1 或 2。部署完成后，节点的主机名应该类似于
    `ejb1` 或 `ejb2`。


    下一个所需的系统信息是 Oracle 数据库设备所在的区域。这是一个下拉列表，你可以在其中选择 Oracle 数据库设备运行的地理区域。在图 3-8 中，选择的区域是美洲。


    接下来是时区下拉菜单，它提供了一个列表供你选择 Oracle 数据库设备所在的时区。图 3-8 显示选择了太平洋时区 (`America/Los_Angeles`)。


    数据库部署下拉菜单提供了一系列选项，用于在 Oracle 数据库设备上部署数据库。你可以选择部署实时应用集群 (RAC)、实时应用集群 (RAC) 单节点或企业版数据库。在图
    3-8 中，选择了实时应用集群 (RAC) 选项。


    系统信息所需的最后一部分是 root 密码。默认情况下，root 密码设置为 `welcome1`。在你为部署提供 root 密码后，该密码将在 Oracle
    数据库设备的两个节点上被更改。此时，如果你对系统信息屏幕上提供的所有项目都满意，可以点击“下一步”继续完成向导。

    '
- fmt: '# 网络信息屏幕


    当你逐步通过向导时，会进入网络信息屏幕。在这里，你需要提供所需的 IP 地址和 DNS 信息。除了 IP 地址，你还需要提供一个域名。图 [3-9](#A978-1-4302-6266-4_3_Chapter.html#Fig9)
    展示了填写 IP 地址和其他所需信息的复杂界面。所有信息填写完毕后，你需要核对所有地址、DNS 信息和其他项目是否正确。大多数部署失败都是由于 IP 地址和
    DNS 条目不正确造成的。


    ![A978-1-4302-6266-4_3_Fig9_HTML.jpg](A978-1-4302-6266-4_3_Fig9_HTML.jpg)


    图 3-9. 网络信息屏幕


    # 数据库信息屏幕


    部署向导的下一步是设置数据库特定选项。如图 [3-10](#A978-1-4302-6266-4_3_Chapter.html#Fig10) 所示，你会看到三个选项：数据库名称、数据库类和数据库语言。这三项都需要填写或选择。填写后，安装程序将知道要创建的数据库名称、数据库大小以及应使用的国家语言。


    ![A978-1-4302-6266-4_3_Fig10_HTML.jpg](A978-1-4302-6266-4_3_Fig10_HTML.jpg)


    图 3-10. 数据库信息屏幕


    数据库类取决于你在系统信息屏幕上选择的数据库部署。Oracle Database Appliance 软件的一部分包含了为所选数据库大小预配置的模板。这种数据库部署方法优化了数据库以及所选数据库大小的相关性能。这些模板还融合了
    Oracle 最佳实践，并根据所使用的 Oracle Database Appliance 型号略有不同。表 [3-8](#A978-1-4302-6266-4_3_Chapter.html#Tab8)
    和表 [3-9](#A978-1-4302-6266-4_3_Chapter.html#Tab9) 提供了所选数据库类的细分。


    表 3-9. X3-2 Oracle Database Appliance 的数据库模板


    | Class | PGA | SGA | Processes | Log Buffer | Redo Log File Size |

    | --- | --- | --- | --- | --- | --- |

    | Very Small | 2048 MB | 4096 MB | 200 | 16 MB | 1 GB |

    | Small | 4096 MB | 8192 MB | 400 | 16 MB | 1 GB |

    | Medium | 8192 MB | 16384 MB | 800 | 32 MB | 2 GB |

    | Large | 12288 MB | 24576 MB | 1200 | 64 MB | 4 GB |

    | Extra Large | 24576 MB | 49152 MB | 2400 | 64 MB | 4 GB |


    表 3-8. X2-2 Oracle Database Appliance 的数据库模板


    | Class | PGA | SGA | Processes | Log Buffer | Redo Log File Size |

    | --- | --- | --- | --- | --- | --- |

    | Very Small | 2048 MB | 4096 MB | 200 | 16 MB | 1 GB |

    | Small | 4096 MB | 8192 MB | 400 | 16 MB | 1 GB |

    | Medium | 8192 MB | 16384 MB | 800 | 32 MB | 2 GB |

    | Large | 12288 MB | 24576 MB | 1200 | 64 MB | 4 GB |

    | Extra Large | 24576 MB | 49152 MB | 2400 | 64 MB | 4 GB |


    数据库信息屏幕上的最后一个选项是数据库语言。你可以在这里选择要用于数据库的语言。在图 [3-10](#A978-1-4302-6266-4_3_Chapter.html#Fig10)
    中选择了 American 选项。如果你需要为你的位置选择不同的语言，可以在此屏幕上进行操作。


    一旦你选择了在 Oracle Database Appliance 上创建数据库所需的所有选项，就可以点击 Next 按钮。点击 Next 后，你将进入向导的摘要屏幕（参见图
    [3-11](#A978-1-4302-6266-4_3_Chapter.html#Fig11)）。在此屏幕上，你可以查看和验证在整个向导中选择的信息。你还可以保存配置以供将来部署使用。


    ![A978-1-4302-6266-4_3_Fig11_HTML.jpg](A978-1-4302-6266-4_3_Fig11_HTML.jpg)


    图 3-11. 摘要屏幕


    # 摘要屏幕


    部署向导中的摘要屏幕提供了一个滚动条（在右侧）来查看窗口中的所有信息。清单 3-10 提供了摘要屏幕中包含信息的更详细视图。


    清单 3-10. 摘要屏幕 — 详细信息


    ```

    --Configuration Information--

    ConfigVersion = 2.7.0.0.0

    Hardware Type = V1

    Environment Type = BM

    Application Type = Generic

    --Cluster Information--

    System name = ejb

    Domain Name = m57.local

    Region = America

    Timezone = America/Los_Angeles

    --Database Information--

    Database name = (ejb)

    Database block size = (8192)

    Database Backup Location = Local

    Deployment type = (RAC)

    Database CharacterSet = AL32UTF8

    Database Teritory = AMERICA

    Database Language = AMERICAN

    Database Class = vsmall

    --Host Information--

    Host VIP Names = (ejb1-vip ejb2-vip)

    --SCAN Information--

    Scan Name = ejb-scan

    Scan Name = (172.30.0.24 172.30.0.25)

    Is DNS Server used = true

    DNS Servers = (172.16.11.215  )

    VIP IP = (172.30.0.22 172.30.0.23)

    --Network Information--

    Public IP = (172.30.0.20 172.30.0.21)

    Public Network Mask = 255.255.255.0

    Public Network Gateway = 172.30.0.1

    Public Network interface = bond0

    Public Network Hostname = (ejb1 ejb2)

    NET1 Interface = bond1

    NET2 Interface = bond2

    NET3 Interface = xbond0

    Disk Group Redundancy = ( HIGH HIGH HIGH )

    --CloudF FileSystem Info--

    Configure Cloud FileSystem = True

    Cloud FileSystem Mount point = /cloudfs

    Cloud Filesystem size(GB) = 50

    --Automatic Service Request--

    Configure ASR = False

    Configure External ASR = False

    ASR proxy server port = 80

    ```


    # 部署过程


    在审查了你所选项目的摘要后，你需要点击 Install 按钮开始部署。此时，Oracle Appliance Manager 将开始配置 Oracle Database
    Appliance 的两个节点。此部署过程可能需要几个小时，具体取决于你的 Oracle Database Appliance 和所选的数据库大小。


    安装开始后，部署期间会运行 25 个步骤。图 [3-12](#A978-1-4302-6266-4_3_Chapter.html#Fig12) 展示了部署期间的这些步骤。请注意，安装屏幕上有一个
    Show Details 按钮。此按钮可用于查看部署期间正在执行的步骤的详细信息。


    ![A978-1-4302-6266-4_3_Fig12_HTML.jpg](A978-1-4302-6266-4_3_Fig12_HTML.jpg)


    图 3-12. 部署过程开始


    另外，验证部署日志文件的位置很重要。如果安装失败，你将需要访问部署日志以了解失败原因。默认情况下，部署日志位于 `/opt/oracle/oak/onecmd/tmp/`。


    # 完成屏幕


    部署完成后，Oracle Appliance Manager 将切换到完成屏幕（参见图 [3-13](#A978-1-4302-6266-4_3_Chapter.html#Fig13)）。此时，你可以点击
    Close 按钮退出 Oracle Appliance Manager。


    ![A978-1-4302-6266-4_3_Fig13_HTML.jpg](A978-1-4302-6266-4_3_Fig13_HTML.jpg)


    图 3-13. 完成屏幕


    注意


    有时会遗漏某些项目导致部署失败。最常见的遗漏项是 DNS 条目或重复的 IP 地址。部署运行时，每个步骤都会报告其状态。如果某个步骤失败，请查看 `/opt/oracle/oak/onecmd/tmp/`
    中的日志文件。'
  raw: 'As you progress through the wizard, you enter the Network Information screen.
    Here you need to provide the required IP addresses and DNS information. Along
    with the IP addresses, you also need to provide a domain name. Figure [3-9](#A978-1-4302-6266-4_3_Chapter.html#Fig9),
    shows you the complex screen for filling in the IP address and other required
    information. Once all information is filled out, you need to verify that all the
    addresses, DNS information, and other items are correct. Most deployments fail
    due to incorrect IP addresses and DNS entries.


    ![A978-1-4302-6266-4_3_Fig9_HTML.jpg](A978-1-4302-6266-4_3_Fig9_HTML.jpg)


    Figure 3-9.


    Network Information screen


    The next step in the deployment wizard is to set up the database-specific options.
    In Figure [3-10](#A978-1-4302-6266-4_3_Chapter.html#Fig10), you are presented
    with three options: Database Name, Database Class, and Database Language. All
    three of these items need to be either filled in or selected. Once these items
    are filled in, the installer will know what to name the database that is created,
    what the database size should be, and the national language that should be used.


    ![A978-1-4302-6266-4_3_Fig10_HTML.jpg](A978-1-4302-6266-4_3_Fig10_HTML.jpg)


    Figure 3-10.


    Database Information screen


    The database class depends on the Database Deployment you selected on the System
    Information screen. Part of the Oracle Database Appliance software includes preconfigured
    templates for the database size selected. This approach to the deployment of databases
    optimized the database along with the associated performance for the selected
    database size. The templates also incorporate Oracle best practices and are slightly
    different, depending on the model of Oracle Database Appliance used. Table [3-8](#A978-1-4302-6266-4_3_Chapter.html#Tab8)
    and Table [3-9](#A978-1-4302-6266-4_3_Chapter.html#Tab9) provide the breakdown
    of Database Class that is selected.


    Table 3-9.


    Database Templates for the X3-2 Oracle Database Appliance


    | Class | PGA | SGA | Processes | Log Buffer | Redo Log File Size |

    | --- | --- | --- | --- | --- | --- |

    | Very Small | 2048 MB | 4096 MB | 200 | 16 MB | 1 GB |

    | Small | 4096 MB | 8192 MB | 400 | 16 MB | 1 GB |

    | Medium | 8192 MB | 16384 MB | 800 | 32 MB | 2 GB |

    | Large | 12288 MB | 24576 MB | 1200 | 64 MB | 4 GB |

    | Extra Large | 24576 MB | 49152 MB | 2400 | 64 MB | 4 GB |


    Table 3-8.


    Database Templates for the X2-2 Oracle Database Appliance


    | Class | PGA | SGA | Processes | Log Buffer | Redo Log File Size |

    | --- | --- | --- | --- | --- | --- |

    | Very Small | 2048 MB | 4096 MB | 200 | 16 MB | 1 GB |

    | Small | 4096 MB | 8192 MB | 400 | 16 MB | 1 GB |

    | Medium | 8192 MB | 16384 MB | 800 | 32 MB | 2 GB |

    | Large | 12288 MB | 24576 MB | 1200 | 64 MB | 4 GB |

    | Extra Large | 24576 MB | 49152 MB | 2400 | 64 MB | 4 GB |


    The last option on the Database Information screen is the Database Language. This
    is where you can select the language that you want to use for the database. The
    American option is selected in Figure [3-10](#A978-1-4302-6266-4_3_Chapter.html#Fig10).
    If you need to select a different language for your location, you can do it on
    this screen.


    Once you have selected all the options needed to create the database on the Oracle
    Database Appliance, you can click the Next button. When you click Next, you are
    taken to the Summary screen on the wizard (see Figure [3-11](#A978-1-4302-6266-4_3_Chapter.html#Fig11)).
    On this screen, you have the opportunity to review and verify the information
    you have selected throughout the wizard. You can also save the configuration for
    use with future deployments.


    ![A978-1-4302-6266-4_3_Fig11_HTML.jpg](A978-1-4302-6266-4_3_Fig11_HTML.jpg)


    Figure 3-11.


    Summary screen


    The Summary screen in the deployment wizard provides a scroll bar (on the right-hand
    side) to review all the information in the window. Listing 3-10 provides a more
    detailed view of the information contained in the Summary screen.


    Listing 3-10. Summary Screen—Detailed Information


    `--Configuration Information--`


    `ConfigVersion = 2.7.0.0.0`


    `Hardware Type = V1`


    `Environment Type = BM`


    `Application Type = Generic`


    `--Cluster Information--`


    `System name = ejb`


    `Domain Name = m57.local`


    `Region = America`


    `Timezone = America/Los_Angeles`


    `--Database Information--`


    `Database name = (ejb)`


    `Database block size = (8192)`


    `Database Backup Location = Local`


    `Deployment type = (RAC)`


    `Database CharacterSet = AL32UTF8`


    `Database Teritory = AMERICA`


    `Database Language = AMERICAN`


    `Database Class = vsmall`


    `--Host Information--`


    `Host VIP Names = (ejb1-vip ejb2-vip)`


    `--SCAN Information--`


    `Scan Name = ejb-scan`


    `Scan Name = (172.30.0.24 172.30.0.25)`


    `Is DNS Server used = true`


    `DNS Servers = (172.16.11.215  )`


    `VIP IP = (172.30.0.22 172.30.0.23)`


    `--Network Information--`


    `Public IP = (172.30.0.20 172.30.0.21)`


    `Public Network Mask = 255.255.255.0`


    `Public Network Gateway = 172.30.0.1`


    `Public Network interface = bond0`


    `Public Network Hostname = (ejb1 ejb2)`


    `NET1 Interface = bond1`


    `NET2 Interface = bond2`


    `NET3 Interface = xbond0`


    `Disk Group Redundancy = ( HIGH HIGH HIGH )`


    `--CloudF FileSystem Info--`


    `Configure Cloud FileSystem = True`


    `Cloud FileSystem Mount point = /cloudfs`


    `Cloud Filesystem size(GB) = 50`


    `--Automatic Service Request--`


    `Configure ASR = False`


    `Configure External ASR = False`


    `ASR proxy server port = 80`


    After reviewing the Summary of items you have selected, you need to click the
    Install button to begin the deployment. At this point, the Oracle Appliance Manager
    will start to configure both nodes of the Oracle Database Appliance. This deployment
    process can take several hours, depending on your Oracle Database Appliance and
    the selected database size.


    Once the installation begins, there are 25 steps that run during the deployment.  Figure
    [3-12](#A978-1-4302-6266-4_3_Chapter.html#Fig12) provides a view of these steps
    during the deployment. Notice that on the installation screen, there is a Show
    Details button. This button can be used to look at the details of the step being
    performed during the deployment.


    ![A978-1-4302-6266-4_3_Fig12_HTML.jpg](A978-1-4302-6266-4_3_Fig12_HTML.jpg)


    Figure 3-12.


    Beginning of the deployment process


    Additionally, it is important to verify the location of the deployment log file.
    If the installation should fail, you will need to access the deployment log to
    understand why it failed. By default, the deployment log is located at `/opt/oracle/oak/onecmd/tmp/`.


    Once the deployment is complete, the Oracle Appliance Manager will change to the
    Complete Screen (see Figure [3-13](#A978-1-4302-6266-4_3_Chapter.html#Fig13)).
    At this point, you can click the Close button to exit the Oracle Appliance Manager.


    ![A978-1-4302-6266-4_3_Fig13_HTML.jpg](A978-1-4302-6266-4_3_Fig13_HTML.jpg)


    Figure 3-13.


    Complete screen Note


    Sometimes items are missed and the deployment does not work. The most common items
    that are missing are DNS entries or duplicate IP address. When the deployment
    runs, each step reports on its status. If a step fails, look at the log file in
    `/opt/oracle/oak/onecmd/tmp/`.'
