    nothing else should be installed on it. Dom0 does host the virtual template repository,
    however, and as such, all VM templates are imported from there.


    ![A978-1-4302-6266-4_10_Fig1_HTML.jpg](A978-1-4302-6266-4_10_Fig1_HTML.jpg)


    Figure 10-1.


    Basic architecture of a virtualized ODA


    The Database VM, also known as ODA_BASE, is a critical aspect of the appliance.
    ODA_BASE is a specially designed VM that has direct access to part of the ODA
    hardware. It has various drivers optimized for the ODA hardware that are already
    installed and configured for improved access to the hypervisor and the shared
    disks. The ODA_BASE template includes the cluster software binaries, database
    software binaries, as well as the custom database templates that are needed to
    create an Oracle database.


    The other aspect of virtualization is installing an application or any other components
    in a separate visualized host. This is what is called a User VM. User VMs are
    not mandatory and an ODA can be virtualized and contain only a Dom0 and an ODA_BASE.
    Currently, there are space limitations on User VMs unless a shared VM repository
    is used. Shared repository support is a new feature in ODA 2.8, but prior to that,
    only 250GB was available on the ODA V1, and 350GB on the ODA X3-2 in local disk
    space on each physical machine. Also, User VMs did not have failover capabilities
    in previous releases of the ODA software.


    #### Virtualization Deployment Considerations


    It is very important to understand the changes in the ODA deployment strategy
