    ## 本章小结


    本章探讨了 Oracle Database Appliance (ODA)——包括原始型号和 X3-2 型号。最初，ODA 面向中小型企业，但它在企业领域也越来越受欢迎。其一体化、全包式的架构以及按需扩容的功能是其备受赞誉的特点。部署和管理的简便性相比于传统的基础设施部署模式可节省成本。ODA
    开箱即用地提供高可用性和冗余性，并将 Oracle 的最佳实践应用于系统。


