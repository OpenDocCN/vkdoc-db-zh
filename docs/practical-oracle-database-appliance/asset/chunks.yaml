    INFO: 2013-11-12 18:19:51: Successfully setup the ssh\nINFO: 2013-11-12 18:19:52:\
    \ Deleting the database bcodatst. It will take few minutes. Please wait...\n...\n\
    ...\nSUCCESS: 2013-11-12 18:23:54: Successfully deleted the database bcodatst\n\
    ```\n\n## Database Configuration Assistant\n\nAs you can see, Oracle has implemented\
    \ very simple ways for creating and deleting an Oracle database from the Oracle\
    \ Database Appliance. This simplicity is driven by many of the Oracle utilities\
    \ that are available from the Oracle Home directories. However, while the command\
    \ line is nice and simple, you also have a GUI option available in the form of\
    \ the Database Configuration Assistant. It’s abbreviated as `DBCA`, and you’ll\
    \ most often here it referred to in that way.\n\n### Creating a Database\n\nThe\
    \ `oakcli` command-line tool invokes the Database Configuration Assistant (`DBCA`)\
    \ in silent mode. You are not limited to silent mode, and can invoke `DBCA` in\
    \ GUI mode to create a RAC, RAC One, or single-instance database.\n\nTo invoke\
    \ the `DBCA` on the Oracle Database Appliance, you need to go to the Oracle Home\
    \ and invoke it from under the `bin` directory. Listing 4-12 gives an example\
    \ of how to invoke the `DBCA`.\n\nListing 4-12. Invoke the Database Configuration\
    \ Assistant (DBCA)\n\n```\n[oracle@patty ∼]$ cd $ORACLE_HOME/bin\n[oracle@patty\
    \ bin]$ ./dbca\n```\n\nFigure 4-1 shows the start screen for the `DBCA` once invoked\
    \ from the Oracle Home.\n\n![A978-1-4302-6266-4_4_Fig1_HTML.jpg](A978-1-4302-6266-4_4_Fig1_HTML.jpg)\n\
    \nFigure 4-1. The DBCA start screen\n\nOnce the `DBCA` is invoked and started,\
    \ you can perform all the normal functions of creating or managing a database\
    \ as you would in normal everyday management. Figure 4-2 provides five different\
    \ options that either create or manage a database. These options are ones that\
    \ many database administrators are used to seeing when creating or managing databases\
    \ with the `DBCA`.\n\n![A978-1-4302-6266-4_4_Fig2_HTML.jpg](A978-1-4302-6266-4_4_Fig2_HTML.jpg)\n\
    \nFigure 4-2. DBCA Operations\n\nLet’s take a look at creating a database on the\
    \ Oracle Database Appliance using the Database Configuration Assistant tool. By\
    \ selecting the `Create A Database` option and then clicking `Next`, you are presented\
    \ with the template options for creating a database. The template options (see\
    \ Figure 4-3) match up to the sizing options that you are presented when you invoke\
    \ the `oakcli` at the command line. Just like the command-line options, select\
    \ the size of the database you would like to create.\n\n![A978-1-4302-6266-4_4_Fig3_HTML.jpg](A978-1-4302-6266-4_4_Fig3_HTML.jpg)\n\
    \nFigure 4-3. Database Templates\n\nOnce you click `Next`, the `DBCA` will ask\
    \ you for naming information associated with the database (see Figure 4-4). What\
    \ you will also notice on the `DBCA` screen are two options: `Admin-Managed` and\
    \ `Policy-Managed`. These two options determine how the database will be managed\
    \ by the clusterware within the Oracle Database Appliance.\n\nNote\n\n`Admin-Managed`\
    \ means that the database will be tied to specific servers. `Policy-Managed` means\
    \ the instances are dynamic and automatically based on pools of servers for effective\
    \ resource utilization.\n\nAdditionally, you will notice that the two node names\
    \ associated with the cluster are listed. By selecting one or both of these nodes,\
    \ the databases will be created on all nodes selected. By default, the node from\
    \ where you are running `DBCA` will be highlighted and required. If a node is\
    \ not selected, then it will not be included in the configuration of your database.\n\
    \n![A978-1-4302-6266-4_4_Fig4_HTML.jpg](A978-1-4302-6266-4_4_Fig4_HTML.jpg)\n\n\
    Figure 4-4. Database Identification\n\nBy using `DBCA` to create a database on\
    \ the Oracle Database Appliance, you will get the option to attach the database\
    \ to an Oracle Enterprise Manager (see Figure 4-5) if you wish to monitor the\
    \ databases on the appliance from a central point. The option to configure the\
    \ database console is still available as well, if desired. This is a flexibility\
    \ that is provided without using the `oakcli` command-line option.\n\n![A978-1-4302-6266-4_4_Fig5_HTML.jpg](A978-1-4302-6266-4_4_Fig5_HTML.jpg)\n\
    \nFigure 4-5. Configure monitoring\n\nOn the same screen, you see a tab titled\
    \ `Automatic Maintenance Tasks` (see Figure 4-6). Enabling automatic tasks can\
    \ help you manage a range of administrative functions. On this tab, you can enable\
    \ or disable this automation of tasks by either checking or unchecking the associated\
    \ check box.\n\n![A978-1-4302-6266-4_4_Fig6_HTML.jpg](A978-1-4302-6266-4_4_Fig6_HTML.jpg)\n\
    \nFigure 4-6."
