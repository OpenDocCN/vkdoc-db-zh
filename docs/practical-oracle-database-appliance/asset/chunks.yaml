- fmt: 'Another challenge that many IT groups face is the fact that many patching
    activities involve manual steps. Manual steps introduce space for human errors
    and makes the patching process even longer than it could be. Some organizations
    may decide to invest time and resources into automating the patching steps and
    make those as human-independent as possible. However, the fact that different
    system components are produced by different vendors makes the task of streamlining
    a patching process a challenge. Each component may use different patching technology.
    For many organizations, it may not be economically justifiable to invest in patch
    automation, and instead they accept and manage the risks related to manual patching.


    There is a planning challenge involved in the traditional system-patching life
    cycle. Different component vendors release patches at different points in time.
    This lack of coordination in timing makes it almost impossible to make patching
    a regular routine. It would greatly simplify planning if all component vendors
    released patches at well-known intervals and synchronized with each other. This
    way, IT groups within the organization could establish well-known patching cycles
    with well-known steps.


    These and other challenges make a modern clustered database system’s patching
    a very complex, time- and resource-consuming process. The challenges increase
    overall IT costs and reduce efficiency, whereas modern businesses are demanding
    precisely the opposite outcome.


    ### Oracle Database Appliance Benefits


    `Oracle Database Appliance` simplifies and streamlines the patching process significantly.
    In fact, this is one of the most valuable `Oracle Database Appliance` advantages
    over traditional clustered systems. The `Oracle Database Appliance` patches are
    released on a quarterly basis and cover all system components, starting from firmware
    and ending with the `Oracle Database` software. The so-called `One Button` patching
    process is fully automated and involves a few simple steps.


    The fact that the system is engendered, put together, and supported by one company
    makes it possible to combine all the patching activities into one set of scripts.
    This simplifies planning as well. Oracle releases `Oracle Database Appliance`
    patches on a quarterly basis. An organization may choose the frequency at which
    it would like to apply those patches. Predictability of patch releases and their
    application makes it much easier to schedule patching cycles and associated testing,
    preparation, downtime, and other activities.


    The patching process consists of three phases, and those phases provide a certain
    level of flexibility. For example, an application and a functional team may decide
    to adopt a six-month patching cycle, and the infrastructure group still could
    patch the infrastructure components on a three-month basis. Such an approach of
    skipping alternating patches to the database may reduce application testing activities
    if an organization decides that such is necessary.


    ## Patching Flow


    The following two subsections discuss the overall flow of patching in the `ODA`
    environment. The first section gives the general sort of flow one might normally
    encounter. The second section specifically focuses on the three steps specific
    to the `ODA`.


    ### General Patching Flow


    [Figure 8-1](#A978-1-4302-6266-4_8_Chapter.html#Fig1) represents the `Oracle Database
    Appliance` general patching process flow. It isn’t too different from a traditional
    system’s patching cycle. As with any system, testing the patch’s application process
    is an important step in the `Oracle Database Appliance` patching life cycle. Your
    team should get comfortable with the patching process steps, document them, and
    measure the downtime necessary each time you patch. The functional team should
    do a reasonable amount of testing in the test and development environments before
    moving patches to the production system.


    ![A978-1-4302-6266-4_8_Fig1_HTML.jpg](A978-1-4302-6266-4_8_Fig1_HTML.jpg)


    Figure 8-1. Patching in the general case


    I have seen organizations that because of limited budgets and other constraints
    purchase just one `Oracle Database Appliance` as a production system, and then
    run test and development environments on some other platform. While such is a
    possible setup, I suggest to avoiding it. The problem in such a case is that it
    isn’t possible to test and verify an `Oracle Database Appliance` patch before
    you apply it in a production environment. My suggestion is to purchase at least
    two `Oracle Database Appliances` and test the patch process on a test environment
    before applying it on the production `Oracle Database Appliance(s)`.


    Someone may think that Oracle tests all patches and therefore it is not necessary
    to do in-house patch testing. The problem is that even with the `Oracle Database
    Appliance`, each system may be slightly different. Some clients may decide to
    skip some of the patches. Some may decide to customize the configuration just
    a bit. Some may use a different network setup. My recommendation is to test the
    patch on your particular setup in a test environment, and make all possible efforts
    to apply the patch in the same way on the production environment.'
