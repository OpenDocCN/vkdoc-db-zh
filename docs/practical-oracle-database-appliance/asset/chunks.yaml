- fmt: '## Preparation for Virtualization


    Virtualization on the `ODA` has changed a lot between versions. The initial version
    of the virtualized `ODA` platform supported only local VM repositories, and none
    of the virtual network setup was predefined. The evolution of virtualization has
    now led to access to local or shared repositories, as well as the possibility
    to set up `VLANs`, which are needed to segment databases and apps. `ODA` patch
    2.8 allows shared repositories and a simplified way to set up `VLANs`.


    Preparing for virtualization on the `ODA` requires making decisions that need
    to be made at the time of deployment of the appliance. Due to the volatile nature
    of the appliance software, sometimes it can be hard to make design choices without
    having to reverse course. There are a few decisions that need to be made prior
    to deployment:


    *   Bare metal or virtualized?

    *   Shared or local repository?

    *   How many CPUs for the Database VM or `ODA_Base`?


    The key decision is to decide between bare metal or virtualization. Once either
    is selected, it is very hard to revert this decision back because doing so requires
    a complete reinstallation of the system. The local repository option allows 250GB
    in an `ODA` v1 and 350GB in an `ODA` X3-2 to be made available for template management.
    This is superseded by the shared repository option at the cost of losing space
    from the `DATA` and `RECO` diskgroups. The shared repository option allows for
    higher availability of the virtual machines. With local repositories, a `VM` will
    only start on the node it was registered; whereas in the shared repository mode,
    a `VM` can failover to a different node if one is unavailable.


    The other important sizing consideration is ensuring that the Database `VM` is
    sized correctly. The `ODA`’s primary focus is the database, such that a virtualized
    `ODA` contains a special, optimized `VM` called `ODA_BASE` that has exclusive
    access to the shared disk, which is needed to ensure optimal database performance.
    `ODA_BASE` is a prebuilt `OVM` template that has all the specific components that
    are needed for the Oracle Clusterware and the database.


    The design is a very important aspect of virtualizing the `ODA`. Figure 10-1 shows
    a basic architecture of the appliance virtualized. Since the `ODA` is a set on
    two physical servers, there are two main components that need to be deployed on
    the `ODA` as part of a virtualization exercise:


    *   `Dom0` or the Virtualization controller

    *   `ODA_BASE` or the customer `VM` specific for the `ODA`


    Domain 0, or `Dom0`, is the virtualization controller, which is a dummy operating
    system that has access to a hypervisor for the virtualized box. There is a `Dom0`
    in both physical nodes; it is considered the piece that manages the visualized
    infrastructure of the `ODA`. `Dom0` is used as the base operating system, and
    as such, nothing else should be installed on it. `Dom0` does host the virtual
    template repository, however, and as such, all `VM` templates are imported from
    there.


    ![A978-1-4302-6266-4_10_Fig1_HTML.jpg](A978-1-4302-6266-4_10_Fig1_HTML.jpg)


    Figure 10-1. Basic architecture of a virtualized `ODA`


    The Database `VM`, also known as `ODA_BASE`, is a critical aspect of the appliance.
    `ODA_BASE` is a specially designed `VM` that has direct access to part of the
    `ODA` hardware. It has various drivers optimized for the `ODA` hardware that are
    already installed and configured for improved access to the hypervisor and the
    shared disks. The `ODA_BASE` template includes the cluster software binaries,
    database software binaries, as well as the custom database templates that are
    needed to create an Oracle database.


    The other aspect of virtualization is installing an application or any other components
    in a separate visualized host. This is what is called a User `VM`. User `VMs`
    are not mandatory and an `ODA` can be virtualized and contain only a `Dom0` and
    an `ODA_BASE`. Currently, there are space limitations on User `VMs` unless a shared
    `VM` repository is used. Shared repository support is a new feature in `ODA` 2.8,
    but prior to that, only 250GB was available on the `ODA` V1, and 350GB on the
    `ODA` X3-2 in local disk space on each physical machine. Also, User `VMs` did
    not have failover capabilities in previous releases of the `ODA` software.


    ## Virtualization Deployment Considerations


    It is very important to understand the changes in the `ODA` deployment strategy
    when used as a virtualized environment. Sizing and network changes need to be
    understood for the deployment. The appliance does not ship with virtualization
    installed unless an independent software vendor (`ISV`) creates a custom appliance
    that ships with virtualization enabled.


    Table 10-1 and Table 10-2 look at the differences between the `ODA` V1 and the
    `ODA` X3-2 in terms of bare metal vs. virtualized interfaces. In a bare-metal
    environment, all network interfaces have a physical mapping and there is bonding
    at the Linux layer to provide High Availability to the network interfaces. It
    is very important to adhere to documentation and ensure that `Eth0` is only used
    for the private interfaces.


    Table 10-2. Oracle Database Appliance X3-2 Network Setup


    | Type | Physical Interface | Link Speed | Bare Metal Interface Name | Virtual
    Interface Name | Virtual Bridge Dom0 |

    | --- | --- | --- | --- | --- | --- |

    | Onboard Dual Network Interfaces | `Eth0` | 10GbE | `Eth0` | `Eth0` | `Priv1`
    |

    | Onboard Dual Network Interfaces | `Eth1` | 10GbE | `Eth1` | `Eth0` | `Priv1`
    |

    | Onboard Quad Network Interfaces | `Eth2` and `Eth3` | 10GbE | `bond0` | `Eth1`
    | `Net1` |

    | Onboard Quad Network Interfaces | `Eth4` and `Eth5` | 10GbE | `Bond1` | `Eth2`
    | `Net1` |


    Table 10-1. Oracle Database Appliance V1 Network Setup


    | Type | Physical Interface | Link Speed | Bare Metal Interface Name | Virtual
    Interface Name | Virtual Dom0 Bridge |

    | --- | --- | --- | --- | --- | --- |

    | Internal Dual 1GbE | `Eth0` | 1GbE | `Eth0` | `Eth0` | `Priv1` |

    | Internal Dual 1GbE | `Eth1` | 1GbE | `Eth1` | `Eth0` | `Priv1` |

    | Onboard Dual 1GbE | `Eth2` and `Eth3` | 1GbE | `Bond1` | `Eth1` | `Net1` |

    | Onboard Dual Port | `Eth8` and `Eth9` | 10GbE | `xbond0` | `Eth4` | `Net4` |

    | Quad Port Network Interfaces | `Eth4` and `Eth5` | 1GbE | `Bond 2` | `Eth2`
    | `Net2` |

    | Quad Port Network Interfaces | `Eth6` and `Eth7` | 1GbE | `Bond3` | `Eth3` |
    `Net3` |


    It is very important to understand the physical and virtual connections and the
    differences, as shown in Tables 10-1 and 10-2. This information is required while
    deploying the `ODA`. The `IP` requirements shift slightly, as well between a bare-metal
    and a virtualized `ODA`. Table 10-3 shows the differences in `IP` requirements
    between a bare-metal `ODA` and a virtualized `ODA`. The addition of a Domain0
    and User `VMs` are important factors in the `IP` requirement differences.


    Table 10-3. IP Requirements for ODA


    | IP Type | Bare Metal IP # | Default Values | Virtualized IP # | Default Values
    |

    | --- | --- | --- | --- | --- |

    | Host | 2 | User Defined | 2 | User Defined |

    | Private IP | 4 | 192.168.16.24 192.168.16.25 192.168.17.24 192.168.17.25 | 2
    | 192.168.16.27 192.168.16.28 |

    | Dom 0 | N/A | N/A | 4 | Two User Defined: 192.168.16.24 (Private) 192.168.16.25
    (Private) |

    | RAC VIP | 2 | User Defined | 2 | User Defined |

    | SCAN VIP | 2 | User Defined | 2 | User Defined |

    | ILOM IP | 2 | User Defined | 2 | User Defined |

    | User VM IP* | N/A | N/A | 1 per VM | User Defined |


    *User VM IP dependent on number of VMs; a minimum of 1 IP/VM.'
  raw: '#### Preparation for Virtualization


    Virtualization on the ODA has changed a lot between versions. The initial version
    of the virtualized ODA platform supported only local VM repositories, and none
    of the virtual network setup was predefined. The evolution of virtualization has
    now led to access to local or shared repositories, as well as the possibility
    to set up VLANs, which are needed to segment databases and apps. ODA patch 2.8
    allows shared repositories and a simplified way to set up VLANs.


    Preparing for virtualization on the ODA requires making decisions that need to
    be made at the time of deployment of the appliance. Due to the volatile nature
    of the appliance software, sometimes it can be hard to make design choices without
    having to reverse course. There are a few decisions that need to be made prior
    to deployment:


    *   Bare metal or virtualized?

    *   Shared or local repository?

    *   How many CPUs for the Database VM or ODA_Base?


    The key decision is to decide between bare metal or virtualization. Once either
    is selected, it is very hard to revert this decision back because doing so requires
    a complete reinstallation of the system. The local repository option allows 250GB
    in an ODA v1 and 350GB in an ODA X3-2 to be made available for template management.
    This is superseded by the shared repository option at the cost of losing space
    from the DATA and RECO diskgroups. The shared repository option allows for higher
    availability of the virtual machines. With local repositories, a VM will only
    start on the node it was registered; whereas in the shared repository mode, a
    VM can failover to a different node if one is unavailable.


    The other important sizing consideration is ensuring that the Database VM is sized
    correctly. The ODA’s primary focus is the database, such that a virtualized ODA
    contains a special, optimized VM called ODA_BASE that has exclusive access to
    the shared disk, which is needed to ensure optimal database performance. ODA_BASE
    is a prebuilt OVM template that has all the specific components that are needed
    for the Oracle Clusterware and the database.


    The design is a very important aspect of virtualizing the ODA. Figure [10-1](#A978-1-4302-6266-4_10_Chapter.html#Fig1)
