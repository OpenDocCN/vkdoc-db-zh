    ## 磁盘校准


    ODA 附带一个磁盘校准实用程序来检查磁盘性能。磁盘校准使用 Orion（Oracle I/O numbers）完成，这是一个用于在系统上模拟 Oracle
    工作负载的 Oracle 实用程序。Orion 也可以用于模拟 ASM 条带化，并提供性能指标，如 `MBPS`、`IOPS` 和 I/O 延迟。


    I/O 指标可能会根据系统上的工作负载而变化。ODA V1 有 20 个 SAS 磁盘和 4 个 SSD 磁盘，可以看到性能校准的结果。这些结果会因系统状态和其上执行的工作负载而异。在一个没有工作负载的新系统上，您应该看到
    SAS 磁盘的随机读取 `RIOPS` 大约为 4000。ODA X3-2 目前不支持执行磁盘校准，目前的官方数字是 7000 `RIOPS`。


