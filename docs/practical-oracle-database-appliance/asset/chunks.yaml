  trans: '### ODA_BASE 的部署


    要部署 `ODA_BASE`，需要通过补丁 `16985062` 从 My Oracle Support 下载模板。对于 `2.8` 版本，补丁号可能会变化；始终建议使用
    My Oracle Support 说明文档 `888888.1`。文件下载后，可以移动到位于节点 0 上 Dom0 的 `/OVS` 目录中。这样就可以为部署准备模板，如清单
    10-2 所示。


    清单 10-2. 在 ODA X3-2 上部署 ODA_BASE


    ```

    #cat oda_base_2.8.gz00 oda_base_2.8.gz01 > oda_base_2.8.tar.gz


    # /opt/oracle/oak/bin/oakcli deploy oda_base


    Enter the template location: /OVS/oda_base_2.8.tar.gz


    Core Licensing Options:

    1. 2 CPU Cores

    2. 4 CPU Cores

    3. 6 CPU Cores

    4. 8 CPU Cores

