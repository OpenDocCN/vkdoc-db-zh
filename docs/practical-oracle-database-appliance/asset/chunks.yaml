    图 2-3 显示了 `ODA V1` 与 `ODA X3-2` 中远程控制功能位置的截取。`ODA X3-2` 上通过主屏幕更容易访问远程控制功能。相比之下，在
    `ODA V1` 上需要点击几下才能进入远程控制功能。


