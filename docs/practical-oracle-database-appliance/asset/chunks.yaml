    在此过程结束时，你将获得一个可以运行 Oracle 数据库的虚拟机。这被称为 `ODA_BASE`，你可以使用清单 10-3 中的命令来检查虚拟机的状态。清单中的虚拟机是利用最大资源量创建的。


    清单 10-3. 列出 ODA X3-2 上虚拟机的状态


    ```

    # xm list

    Name                                               ID     Mem  VCPUs      State   Time(s)

