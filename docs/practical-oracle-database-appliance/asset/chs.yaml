  \           Up-to-date\n                Expander                  0342         \
  \              Up-to-date\n                SSD_SHARED                E12B      \
  \                 Up-to-date\n                HDD_LOCAL                 SA03   \
  \                    Up-to-date\n                HDD_SHARED                0B25\
  \                       Up-to-date\n                ILOM                      3.0.16.22.b\
  \ r78329         No-update\n                BIOS                      12010310 \
  \                  No-update\n                IPMI                      1.8.10.5\
  \                   Up-to-date\n                HMP                       2.2.6.1\
  \                    2.2.6.2\n                OAK                       2.6.0.0.0\
  \                  2.7.0.0.0\n                OEL                       5.8    \
  \                    5.9\n                OVM                       3.1.1      \
  \                3.2.3\n                TFA                       2.5.1.4      \
  \              2.5.1.5\n                GI_HOME                   11.2.0.3.6(16056266,\
  \       11.2.0.3.7(16619892,\n                                          16083653)\
  \                  16742216)\n                DB_HOME                   11.2.0.3.6(16056266,\
  \       11.2.0.3.7(16619892,\n                                          16083653)\
  \                  16742216)\n[root@s1 2.7]#\n```\n\n在前面的示例中，有七个组件需要更新，包括 Oracle\
  \ Appliance Kit、Oracle VM Server、Oracle Grid Infrastructure 等。补丁包将更新的组件列表是制定停机时间和影响分析的一个良好起点。需要更新的组件数量取决于\
  \ Oracle Database Appliance 上当前安装的软件、补丁和固件版本，以及您计划升级到的目标版本。\n\n每个 Oracle Database\
  \ Appliance 补丁包可能会提供一组不同的更新。根据经验，每个新的补丁包都会提供 Grid Infrastructure 和 Oracle Homes\
  \ 的最新版本。所有其他组件的交付取决于其他产品的发布日期。\n\n## 补丁执行\n\n准备工作完成后，就该开始补丁执行了。这是应用补丁更新的时候。在此步骤中，您将升级系统，然后是\
  \ Grid Infrastructure。让我们首先描述 ODA 补丁处理过程存储日志文件的位置。您可以跟踪日志文件以了解补丁实用程序当前正在执行哪些步骤，然后对任何可能出现的问题进行故障排除。\n\
  \n\n\n### 升级日志文件\n\nOAK 补丁进程会为每个正在打补丁的组件启用特定于组件的日志记录。生成的日志文件可在各节点的 `/opt/oracle/oak/log/<hostname>/patch/<patch\
  \ bundle number>` 目录下找到。例如，您可能会看到以下输出：\n\n```bash\n[root@s1 DB]# cd  /opt/oracle/oak/log/s1/patch/2.7.0.0.0/\n\
  [root@s1 2.7.0.0.0]# ls -lptr\ntotal 480\n-rw-rw-rw- 1 root root    136 Aug 21 14:46\
  \ prepatch_63726.log\n-rw-rw-rw- 1 root root  29851 Aug 21 15:23 gidbupdate_64341.log\n\
  -rw-rw-rw- 1 root root   962 Aug 21 15:24 postpatch_96328.log\n-rw-rw-rw- 1 root\
  \ root   1188 Aug 21 15:56 createdbhome_77208.log\n-rw-rw-rw- 1 root root   2608\
  \ Aug 21 16:18 createdbhome_19153.log\n-rw-rw-rw- 1 root root   3669 Aug 21 16:26\
  \ createdbhome_25925.log\n-rw-rw-rw- 1 root root   1873 Aug 21 16:35 dbupgrade_82891.log\n\
  -rw-rw-rw- 1 root root    136 Aug 21 16:40 prepatch_99697.log\n-rw-rw-rw- 1 root\
  \ root   6891 Aug 21 16:42 gidbupdate_100387.log\n-rw-rw-rw- 1 root root    136\
  \ Aug 21 16:49 prepatch_5847.log\n-rw-rw-rw- 1 root root  32179 Aug 21 17:02 gidbupdate_6662.log\n\
  -rw-rw-rw- 1 root root  24107 Aug 21 17:08 prepatch_32337.log\n-rw-rw-rw- 1 root\
  \ root  12625 Aug 21 17:12 hmpupdate_6051.log\n-rw-rw-rw- 1 root root   1156 Aug\
  \ 21 17:13 oakupdate_6970.log\n-rw-rw-rw- 1 root root   5230 Aug 21 17:15 tfa_7629.log\n\
  -rw-rw-rw- 1 root root 178928 Aug 21 17:26 ospatch_7330.log\n-rw-rw-rw- 1 root root\
  \    181 Aug 21 17:26 asrupdate_345.log\n-rw-rw-rw- 1 root root   1475 Aug 21 17:26\
  \ ipmiupdate_361.log\n-rw-rw-rw- 1 root root  24435 Aug 21 17:26 storage_407.log\n\
  -rw-rw-rw- 1 root root    500 Aug 21 17:37 ipmiupdate_12318.log\n-rw-rw-rw- 1 root\
  \ root    511 Aug 21 17:37 hmpupdate_12078.log\n-rw-rw-rw- 1 root root   1813 Aug\
  \ 21 17:37 storage_12321.log\n-rw-rw-rw- 1 root root   1281 Aug 21 17:37 ilombios_12513.log\n\
  -rw-rw-rw- 1 root root   2410 Aug 21 17:41 ovspatch_12553.log\n-rw-rw-rw- 1 root\
  \ root   1496 Aug 21 17:46 postpatch_23166.log\n```\n\n此目录是一个很好的起点。然而，每个单独打补丁的组件可能会生成额外的特定日志文件。例如，操作系统升级工具\
  \ `yum` 会将活动报告到 `/var/log/yum.log` 文件中。从实际角度来看，知道在需要时从何处查找额外信息非常有用。\n\n### 升级系统基础设施\n\
  \n在系统基础设施升级步骤期间，整个集群将不可用。所有数据库都将由补丁工具停止，并在升级期间保持关闭状态。它们将在过程结束时重新启动。\n\n您通过在第一台节点上执行以下命令来启动系统基础设施升级。该命令需要以\
  \ `root` 用户身份执行：\n\n```bash\ncd /opt/oracle/oak/bin/\noakcli update -patch  2.7.0.0.0\
  \ -infra\n```\n\n根据补丁更新的组件，此阶段可能需要重新启动服务器。如果补丁包更新了需要重启的组件（如 ILOM/BIOS 或存储固件），Oracle\
  \ 数据库一体机节点将会重启。\n\n### 升级 Grid 基础设施\n\nGrid 基础设施是**真正的应用集群** 的一个关键组件。它提供了在集群配置中运行\
  \ Oracle 数据库所需的服务，并确保这些服务及其他相关服务的高可用性。补丁工具以**滚动方式** 升级 Grid 基础设施。这意味着它一次停止并更新一个\
  \ Oracle 数据库一体机节点，而另一个节点上的数据库实例仍然可用（不用说，这要求数据库处于 `RAC` 模式，并且两个实例都需要处于启动状态）。打补丁通过以下命令开始：\n\
  \n```bash\noakcli update -patch  2.7.0.0.0 -gi\n```\n\n请注意，在当前版本中，补丁工具在停止实例时不会给出任何通知。因此，依赖数据库服务的应用程序应该能够处理实例故障并重新连接到另一个实例。否则，您将需要重新启动应用程序，而这会引入停机时间。如果\
  \ Grid 基础设施补丁过程顺利完成，所有数据库实例和其他服务应在两个 ODA 节点上保持运行状态，与打补丁前的状态完全相同。\n\n### 数据库升级\n\n\
  在此阶段，我们确实已将所有系统级基础设施组件更新到目标版本。下一步是更新在 Oracle 数据库一体机上运行的数据库。OAK 工具显著简化了这一数据库升级过程。您实际上可以通过运行一条命令来升级一个或一组数据库。所有实际活动都由\
  \ OAK 工具响应这一条命令来完成。\n\n管理员可以规划和执行数据库升级活动的方式有两种。一种是实施默认升级过程，该过程会升级系统上的所有 Oracle 主目录和数据库。另一种是执行逐个升级每个数据库的方法。以下部分描述了这两个选项。\n\
  \n### 升级所有数据库\n\n要更新所有 Oracle 主目录和关联的数据库，请在 root 操作系统用户下运行以下命令。该命令会将所有数据库更新到补丁包提供的最新版本。\n\
  \n```bash\noakcli update -patch  2.7.0.0.0  --database\n```\n\nOAK 工具将询问您是要更新所有\
  \ Oracle 主目录，还是选择特定的主目录进行更新。\n\n```text\nFound the following 11.2.0.3 homes possible\
  \ for patching:\nHOME_NAME                      HOME_LOCATION\n---------       \
  \               -------------\nOraDb11203_home1               /u01/app/oracle/product/11.2.0.3/dbhome_1\n\
  OraDb11203_home2               /u01/app/oracle/product/11.2.0.3/dbhome_2\n[Please\
  \ note that few of the above database homes may be already up-to-date. They will\
  \ be automatically ignored]\nWould you like to patch all the above homes: Y | N\
  \ ? :Y\n```\n\n您可以更新所有列出的 Oracle 主目录，也可以更新特定的主目录和关联的数据库。OAK 工具将以**滚动方式** 修补 Oracle\
  \ 主目录和数据库。在任何时间点，如果您使用的是 `RAC` 或 `RAC` 单节点选项，至少有一个数据库实例是可用的。单个实例将在修补会话期间停止。\n\n\n\
  \n### 逐个升级\n\n如果您希望对即将更新的数据库进行更精细的控制，您可能需要将每个数据库配置为关联到单独的 Oracle 主目录，而不是在所有数据库都在一个\
  \ Oracle 主目录下运行。以下步骤演示了如何使用 OAK 工具以全自动方式逐个升级 CAT 和 DOG 数据库：\n\n```\n### Show all\
  \ current Oracle Homes\noakcli show dbhomes –detail\n\nOracle HomeName       Oracle\
  \ Home Version                  Oracle HomeLocation                            \
  \            Database Name    Database Type\n----------------      ---------------------\
  \                ---------------------------------------                 ---------------\
  \  -----------\nOraDb11203_home1      11.2.0.3.7(16619892,16742216)        /u01/app/oracle/product/11.2.0.3/dbhome_1\
  \                CAT              RAC\nOraDb11203_home2      11.2.0.3.7(16619892,16742216)\
  \        /u01/app/oracle/product/11.2.0.3/dbhome_2                DOG          \
  \    RACOneNode\n\n### Update dbhome_1 that executes CAT database\noakcli update\
  \ -patch 2.7.0.0.0 --database\n...\nWould you like to patch all the above homes:\
  \ Y | N ? :N\n...\nPlease enter the comma separated list of database home_names\
  \ that you do NOT want to patch: OraDb11203_home2\n...\n........done\n\n### At this\
  \ stage the CAT database is updated to the latest version. The DOG database is still\
  \ on the previous version.\n\n### Update dbhome_2 that executes DOG database\noakcli\
  \ update -patch 2.7.0.0.0 --database\n...\nWould you like to patch all the above\
  \ homes: Y | N ? :N\n...\nPlease enter the comma separated list of database home_names\
  \ that you do NOT want to patch: OraDb11203_home1\n...\n........done\n```\n\n如果您想逐个更新数据库，您应该确保在开始应用\
  \ Oracle 数据库一体机补丁包之前，每个数据库都在其自己的 Oracle 主目录下运行。Oracle 数据库一体机不允许您在安装了新的系统和 Grid 基础设施之后再创建之前版本的\
  \ Oracle 主目录。因此，如果您想在开始应用 ODA 补丁包之前分别对它们进行补丁更新，将要执行的数据库分离到不同的 Oracle 主目录下是很重要的。关于如何将\
  \ Oracle 数据库移动到专用的 Oracle 主目录下执行的说明，请参阅本章前面的“延迟 RDBMS 更新”部分。在基础架构组件更新到新版本（本例中是 2.7）后，我们更新\
  \ Oracle 主目录及其关联的数据库。\n\n另一个需要考虑的选择是在代表新版本的目标 Oracle 主目录和之前的 Oracle 主目录版本之间逐个移动数据库。这种移动必须手动完成，在移动每个数据库后执行更新该数据库所需的补丁步骤。在这种情况下，您只需遵循通用的\
  \ Oracle 数据库补丁指南，将 Oracle 数据库从源 Oracle 主目录版本更新到目标版本。这种方法的优点是您只需要两个主目录：一个用于源，另一个用于目标。如果您仔细地编写脚本并测试所有升级步骤，数据库补丁步骤所需的时间可能与\
  \ OAK 自动化更新相当甚至更短。然而，您可能会发现实现这种方法需要投入多得多的精力。\n\n## 总结\n\nOracle 数据库一体机的补丁更新是一个简单直接的过程。它显著减少了使\
  \ Oracle 集群系统保持在当前补丁版本所需的时间和资源。在简单的情况下，通过在两个小时的维护窗口内执行三条简单的命令，就可以更新系统的所有组件。Oracle\
  \ 按季度发布 Oracle 数据库一体机补丁包这一事实，极大地简化了维护工作和相关的资源规划。借助 Oracle 数据库一体机，组织不需要让多个小组（例如存储、系统管理、网络和数据库管理）参与进来就能使集群系统保持最新。因此，ODA\
  \ 相较于传统系统提供了显著的经济效益。\n\n脚注 1\n\n有关最新的 Oracle 数据库一体机补丁信息，可从 My Oracle Support Note\
  \ 888888.1 获取。\n\n2\n\n请注意，Data Guard 配置不在本书讨论范围内。您可以参考 Oracle 白皮书“Deploying Oracle\
  \ Data Guard with Oracle Database Appliance” 获取更多信息。\n\n"
- "# 9. ODA 的商业价值\n\n摘要\n\n2011 年 9 月，Oracle 宣布推出 Oracle 数据库一体机，作为一款创新的、针对数据库优化的入门级集成系统。该发布承诺了易于部署、按需增长付费的许可模式以及单一供应商支持。\n\
  \n当一项新技术被引入，并且商业兴趣逐渐浓厚时，公司内部总会有人问：“这比我们现在的方式是一个更好的解决方案吗？”。回答这个问题并克服变革阻力的第一步是调查该新技术的商业案例。Oracle\
  \ 数据库一体机已成为 Oracle 集成系统产品线中非常成功的产品。本章概述了 ODA 提供的商业优势，您可以利用这些信息来考虑部署 ODA 解决方案的商业案例，并评估任何潜在的技术风险。\n\
  \n\n## 业务挑战\n\n许多公司在应对日益扩大的业务压力范围时面临着相同的挑战。IT 部门被要求变得敏捷，并快速提供基础设施，甚至是在所有业务需求尚未完全明确之前。项目时间线正变得更短且分为多个阶段。虽然项目在初期阶段可能会延迟，但这并不意味着项目的截止日期必然会被更改。相反，项目的后期阶段可能需要以更短的时间线来弥补延误。数据库部门通常处于基础设施供应流程的末端。数据库管理员（DBA）被要求快速部署新的数据库基础设施，并尽早向\
  \ IT 客户提供业务价值。如果当轮到 DBA 开始工作时项目已经延迟，那么实际上准备时间会降至零。遵循收集需求、订购硬件、并让多个团队通过大量交接来构建数据库基础设施的旧有周期性做法，已完全无法满足现代业务的时间要求。\n\
  \n许多公司面临着来自固定预算的成本压力。新的外部公共云产品正在竞争它们的基础设施预算。多年来，一直存在向商用硬件解决方案缓慢转移以降低成本的趋势。尽管与硬件相关的成本因商用解决方案而下降，但构建和支持数据库基础设施解决方案的成本仍然很高。\n\
  \n公司常常面临拥有高端技能人才短缺的挑战。总体而言，IT 人员、DBA 和其他员工并不短缺。然而，“在任何经济环境中都难以找到优秀人才”这一说法确实持续存在。公司总是在寻找能够解决任何技术问题、快速完成工作并迅速建立专业领域知识的人才。\n\
  \n新技术的快速引入给高端技能人才的可用性带来了额外压力。这些新技术的快速引入可能要求支持人员在没有太多指导的情况下迅速掌握知识。支持人员必须对当前的挑战做出快速反应，任务必须迅速完成。几乎没有犯错或发生导致项目延误的问题的余地。常见问题包括：\n\
  \n*   如今员工的工作负荷确实已经饱和。没有时间进行“在职培训”（OJT）和研究。一切都必须被快速启动。\n*   项目的按小时计费咨询成本可能非常高，加剧了成本压力。这增加了快速部署和提高效率的压力。\n\
  \n在审计和行业法规管理着公司为保护其系统而必须采取行动的时代，安全合规性变得至关重要。在数据库服务器和数据库均为定制构建的环境中，要实现整个应用和数据库组合的合规性非常困难。\n\
  \n## ODA 登场\n\nOracle 开发了`Oracle 数据库一体机`（`Oracle Database Appliance`），即`ODA`，旨在为上一节提到的业务挑战提供解决方案。如果`ODA`有一个核心主题，那就是“**傻瓜式基础设施部署**”。虽然有些人可能会对这个说法感到意外，但它实际上是为了证明`ODA`部署的简单性和优雅性。`ODA`的其他主题包括使用一键式流程部署的省时与便捷、`RAC`部署的简易性以及管理的便捷性。查看`ODA`设置海报后，您就会明白\
  \ Oracle 正在提供一种新的业务开展方式。\n\n当前的`X3-2 ODA`型号是一个**集成系统**（engineered system）。集成系统是指设计为作为一个单一、集成的打包解决方案协同运行的硬件和软件。虽然公司可以构建自己的商用硬件解决方案，但很少有公司有能力构建自己的集成系统。大多数公司根本没有资源或商业效益来构建自己的集成系统，更不用说构建一个为高可用性\
  \ Oracle 数据库优化的系统了。\n\n`X3-2 ODA`预打包了两台服务器，共计 32 个 2.9Gz `Intel E5-2690` CPU 核心。一台`ODA`包含一个存储单元，其中有\
  \ 20 个 900G 数据驱动器，总原始存储为 18T。可以通过添加第二个存储扩展机架（额外提供 18T 原始存储）进行扩展，总计 36T 原始存储。`ODA`部署时采用双份或三份镜像（可在安装时配置），在单个存储单元上，使用三份镜像时可用存储约为\
  \ 6T，使用双份镜像时约为 9T。应参考`ODA 入门指南`，根据所选部署选项了解镜像存储选项和磁盘组的确切容量规格。当前的`X3-2`服务器每台配备 256G\
  \ 内存。包含四个 SSD 驱动器，总存储为 800G，用于联机重做日志。\n\n**注意**\n\n`ODA`的容量必将随着底层 Oracle 服务器硬件产品线的更新换代而变化。几乎在硬件型号发布的同时，Oracle\
  \ 就开始开发下一代替代产品。\n\n第一代`ODA`是一个固定的、独立的一体化设备。对于`X3-2`第二代型号，服务器和存储单元被模块化，以便产品线能够利用\
  \ Oracle 的产品路线图，跟随 Intel 产品线的发展发布新硬件。\n\n`ODA`提供了来自单一供应商的集成系统，具有单一的问题上报点。该设备的管理主要是自包含的，并与\
  \ Oracle 全面的`Oracle Enterprise Manager`（`OEM`）管理和监控解决方案集成。\n\n`ODA`已被各种规模的大量客户群购买和部署。许多财富\
  \ 500 强公司报告称，从资源规模角度来看，它们的大部分数据库都可以部署在`ODA`上。未来可以期待容量更大、性能更高的型号。\n\n`ODA`上也可使用虚拟化功能，以支持使用`Oracle\
  \ VM 虚拟化管理器`（`OVM`）模板快速部署数据库和应用。已经发布了`WebLogic`的模板，Oracle 也已宣布将提供额外模板。\n\n在可预见的未来，`ODA`将在\
  \ Oracle 集成系统产品阵容中保持其地位。2013 年 8 月，Oracle 扩展了其集成系统产品阵容，推出了一款名为`Oracle 虚拟化计算一体机`（`Oracle\
  \ Virtualized Compute Appliance`），即`OVCA`的新产品。该系统提供了一个通用的`Oracle VM`（`OVM`）供应解决方案，而`ODA`则提供了较低成本的入门点，并且其虚拟化已针对运行数据库进行了优化。\n\
  \n\n## 快速、简单的数据库基础设施部署\n\nODA 提供的首要业务优势是快速便捷的数据库基础设施和数据库实例部署。部署 ODA 无需单独规划设备、配置存储区域网络\
  \ (`SAN`) 基础设施、部署 `RAC` 私有互连网络、安装操作系统 (`OS`)，也无需安装 `RAC`、`ASM`、网格基础设施、Oracle 数据库软件，或指派项目经理来协调所有这些工作。\n\
  \n部署 ODA 只需按照设置海报和部署文档中概述的步骤操作。服务器接入网络并构建部署配置文件后，构建 ODA 的时间略少于一小时。成果是一个双节点 `RAC`\
  \ 集群，包括文件系统、`ASM` 存储、网格和数据库主目录的配置，一个本地的 `OEM` 数据库控制台，以及一个初始数据库。您的公司可以在不到一天的时间内在\
  \ `RAC` 集群上运行应用。\n\n如果部署时间对您的公司至关重要，那么 ODA 将满足在完成服务器布线和其他网络依赖项后数天内，就拥有完全部署好的高可用性数据库和虚拟化应用解决方案的需求。普通的\
  \ DBA 只需阅读文档即可部署 ODA。如果您的公司正在部署更大规模的 ODA 产品组合，那么为团队增加额外的技能可能很有意义。\n\n在部署了我们的第一台\
  \ ODA 之后，我们统计了在其他自己搭建的平台上构建数据库所涉及的预部署、安装和部署后步骤的数量。在不创建数据库的情况下，涵盖数据库服务器所有基础步骤的数量在\
  \ 103 到 107 步之间。而在 ODA 上完成相同结果并部署一个 `RAC` 集群的等效步骤数量，仅二十几步。不用说，我们估计构建和设置时间的缩减在本质上是几何级数的。每家公司都应该自行统计使用当前构建流程来构建数据库服务器和高可用性数据库所需的步骤数量以及团队间的交接次数。\n\
  \n我们在部署 ODA 数据库基础设施的成本方面也经历了类似的降低。每家公司都有其定义组织角色和职责的方法与规则。可以说，如果这符合贵公司对角色和职责的看法，您可以在没有\
  \ `SAN` 团队和系统管理员参与的情况下构建 ODA。部署 ODA 所需的网络工作量也有所减少。\n\n我们与一些公司讨论了构建 ODA 与他们目前做法所需资源的差异，许多公司报告说，这种范式转变可能会引发一些有趣的内部讨论，因为他们正将战略转向工程化系统。角色和职责的转变可以提前解决，也可以随着公司对平台更加熟悉并获得更多经验而逐渐改变。\n\
  \n这就引出了问题：“部署 ODA 需要多长时间？”。要回答这个问题，您必须意识到 ODA 与其他任何工程化系统一样存在依赖项。您仍然需要订购 ODA 并安排发货。ODA\
  \ 需要相当简单的网络布线，并且您仍然需要完成任何 `DNS` 和防火墙请求。然而，其中大部分工作可以在 ODA 到达之前并行完成。通过仔细规划，ODA 可以非常快速地部署，实际的构建工作耗时不到一天。\n\
  \n作者第一次使用 ODA 是在一个需要高可用性和非常快速部署的项目中。我们需要订购设备并在两周内让四组 `RAC` 集群投入运行。当时，ODA 平台还很新，但我们决定冒险一试，因为这是我们最佳的选择。我们订购了四台\
  \ ODA 并要求立即发货。ODA 在周一到达，我们在周二进行了上架和布线。一些 Oracle 的人员在周三上午飞抵，看看是否能提供帮助，因为这个平台非常新。我们前往数据中心，在周三下午并行构建了所有四台\
  \ ODA——Oracle 的人员在一旁观察。\n\n过程进展得非常顺利，以至于我们决定取出一台 ODA，在整个 DBA 部门的午餐时间面前，现场演示从裸机搭建一个全新、可运行的生产环境\
  \ ODA `RAC` 集群。我们在大家吃完午餐时正好完成了部署。人们明白他们正在目睹一种构建数据库服务器的新范式。在那一天之前，仅凭几名 DBA 在一个下午并行构建四个\
  \ `RAC` 集群是不可想象的。表 9-1 列出了许多由于部署 ODA 而不再需要关心的工作。\n\n**表 9-1.** 部署 ODA 无需完成的工作\n\n\
  | 任务 | 传统方式 | ODA |\n| --- | --- | --- |\n| 规格设备 | 依赖于标准。 | 标准化的硬件和软件。 |\n| 外部 `RAC`\
  \ 网络布线 | 在 `RAC` 系统上需要。 | 包含在硬件中。 |\n| 配置 `SAN` 存储 | 大多数情况下需要。 | 包含在构建中。 |\n| I/O\
  \ 虚拟化 | 依赖于标准。 | 对于虚拟化系统，包含在构建中。 |\n| 服务器分区 | 依赖于标准。 | 数据库不需要，但可以用于容纳非数据库虚拟容器。 |\n\
  | 安装 `OS` | 大多数情况下需要。 | 包含在构建中。 |\n| 安装网格基础设施 | 大多数情况下需要。 | 包含在构建中。 |\n| 安装数据库软件\
  \ | 大多数情况下需要。 | 包含在构建中。 |\n| 协调团队交接的项目管理 | 依赖于公司。 | 包含在构建中。 |\n\n那么接下来发生了什么？如今，被应用团队或项目经理问到“我们能把这个数据库放在\
  \ ODA 上吗？”并不少见。当您得到这类问题时，说明您处于一个很好的位置。\n\nODA 安装过程消除了不可预测、浪费时间的设置问题和交接，这些问题会导致额外的协调、依赖和延迟。部署时间以天计算，而不是周或月。ODA\
  \ 在满足项目需求挑战方面提供了很大的灵活性，这是许多数据库和基础设施部门必须应对的。\n\nODA 可以快速预部署，以避免在需要之前购买容量。它们是支持基础设施即服务\
  \ (`IaaS`)、数据库即服务 (`DBaaS`) 或基于云的服务以支持公司 IT 战略的，您大多数 Oracle 数据库的完美平台。当您被问到：“您是如何在\
  \ `DBaaS` 服务中如此快速高效地提供数据库的？”——那么您就处于一个更好的位置了。ODA 并非能满足每个项目需求。`IOPS` 数量存在限制，计算节点目前无法扩展到两个以上。然而，您可能会发现\
  \ ODA 能满足您大多数数据库的需求。\n\n\n## 轻松搞定 RAC\n\n构建稳定且满足高可用性要求的 RAC 集群需要大量的前期规划和工作，以及安装前后的环境验证检查。除了\
  \ RAC 安装手册外，还需要分析其他文档：\n\n*   [RAC 通用文档 (MOS 810394.1)](https://support.oracle.com)\
  \ 和任何特定平台的入门套件\n*   [RAC FAQ (MOS 220970.1)](https://support.oracle.com)\n*   [Oracle\
  \ 的支持说明 (MOS 1344678.1)](https://support.oracle.com)，提供了稳定集群的步骤，并附有平台特定的扩展\n*  \
  \ [RAC 信息中心说明 (MOS 1452965.2)](https://support.oracle.com)\n*   您特定平台的 RAC 设置建议\n\
  *   RAC 已知问题支持文档\n\n此外，您还需要查阅任何能提供关于设置 RAC 以支持其他 Oracle 产品（如 eBusiness Suite 和 ATG\
  \ Web Commerce）建议的文档。\n\n如果您要构建自己的 RAC 集群，还需要学习额外的工具。Oracle 构建了各种工具来帮助验证 RAC 环境，例如：\n\
  \n*   `RACcheck` (MOS 1268927.1)\n*   `Cluster Verify` (MOS 316817.1)\n*   用于数据库检查的\
  \ `RDA` (MOS 314422.1 和 250262.1)\n\n当然，还有所有操作系统特定的设置、软件包要求和检查。在传统平台上完成所有这些努力是非常值得的。幸运的话，所有这些内容会被记录一次，并且会有人努力跟上所有的文档更新和\
  \ `RACcheck` 结果，以保持“自己动手”文档的更新。然而，这样做需要大量的时间、合适的人员、部门间大量的交接，以及大量的后续质量保证工作以确保工作正确完成。\n\
  \n对于大多数公司，尤其是中小型公司来说，记录和分发复杂的技术信息并培训人员理解这些信息是一个挑战。增加挑战的还有实施所有这些要求所需的多团队间的所有交接。有人可能忘记将互联流量路由到冗余的、专用于\
  \ RAC 的交换机（这些交换机也很昂贵），或者忘记在服务器和交换机上都配置巨型帧。还可能存在与支持 IO 多路径的外部供应商软件相关的额外问题。由于所有这些场景都非常真实，Oracle\
  \ 发现有必要投资建设广泛的 RAC 诊断设施。\n\nOracle 正在通过扩展 `RACcheck` 和其他工具来捕获设置问题，帮助管理这种复杂性。然而，结论是，Oracle\
  \ RAC 保证组和支持人员如今非常忙碌是有真实原因的。一体化系统和 ODAs 将正确部署 RAC 的大量工作从您的肩膀上卸下。\n\nODA 通过使 RAC\
  \ 配置自包含，为所有这些挑战提供了一个解决方案。没有外部互联需求或需要在标准 ODA 部署过程之外进行 RAC 配置更改的说明。如果您担心您的公司是否有能力成功完成构建真正高可用性\
  \ RAC 集群所需的所有工程工作，那么 ODA 可能有助于提供一个解决方案。成功部署 RAC 集群所需的专业知识大大减少。这对各种规模的公司都是一个主要优势。ODA\
  \ 将成功部署双节点 RAC 集群的能力扩展到大众，这也是 ODA 成为“**轻松搞定 RAC**”解决方案的部分原因。\n\n在 ODA 安装过程中，可以部署\
  \ RAC One、双节点 RAC 集群或单实例数据库。ODA 在几小时内根据 Oracle 的最佳实践部署 RAC 集群。Oracle 在设备内置了物理 RAC\
  \ 互联。季度自动补丁流程简化了为 `grid/clusterware` 和 Oracle Homes 打上最新 PSU 补丁和错误修复的过程。这些季度补丁与操作系统和固件更改一起作为一个完整的单元进行测试，使\
  \ ODA 成为维护持续 RAC 稳定性的绝佳解决方案。\n\n> 注意：作者曾与多家小型公司讨论过非 ODA 系统上的 RAC 安装。许多中小型公司根本没有资源自己执行此类安装。这包括研究所有\
  \ RAC 要求的技术资源，以及为互联流量购买额外设备（如专用 RAC 交换机）的成本。\n\n虽然 ODA 在部署和支持 RAC 集群方面表现出色，但对于任何平台上的\
  \ RAC 部署团队来说，理解良好的 RAC 设计最佳实践以消除节点间的争用仍然是需要了解的。此外，双节点集群要求一个服务器能够在节点切换期间处理整个处理负载。用\
  \ `Data Guard` 补充 RAC 可以缓解故障转移容量方面的担忧。\n\n```\nif (condVar > someVal) {console.log(\"\
  xxx\")}\n```\n\n\n### 轻松实现高可用性\n\nODA 通过易于安装的`RAC`和`RAC One`部署来提供高可用性。除了在单个设备上配置高可用性外，ODA\
  \ 还便于部署`Data Guard`以扩展高可用性解决方案。这些部署可以跨越数据中心，以提供地理层面的保护。Oracle 通过`OEM`、一键式 ODA `Data\
  \ Guard`部署脚本，以及专注于在 ODA 上部署`Data Guard`的补充文档，来协助`Data Guard`的部署过程。除了简化的`Data Guard`部署外，ODA\
  \ 通过更高水平的稳定性支持高可用性，因为它是一个经过整体测试的打包解决方案。\n\nODA 补丁的网格和数据库部分可以以滚动方式部署。在撰写本文时，ODA 补丁的基础设施部分要求两个节点上的集群件完全关闭，但这在未来可能会改变。`RAC\
  \ One`为生产环境和非生产环境实例提供高可用性能力，这些实例设计为仅在两个 ODA 节点中的一个上运行，但可以故障转移到第二个 ODA 节点。\n\nODA\
  \ 通过大大降低部署`RAC`解决方案所需的专业知识水平，快速启动高可用性实施。这包括无需执行`RAC`互联设计、无需研究所有`RAC`要求和最佳实践、无需配置`ASM`、无需消除所有单点故障，以及一个精心设计的`RAC`集群的所有其他方面。\n\
  \n高可用性也通过部署经过标准测试的配置以及选择为所有`ASM`磁盘范围进行双倍或三倍镜像来实现。丢失一个磁盘不会导致系统停机。ODA 操作系统还实现了 Oracle\
  \ Linux 坚不可摧内核（`UEK`）。ODA 由一个专门的 Oracle 工程系统支持团队提供支持，该团队对该平台有深入的了解。\n\n大多数硬件组件都是冗余的。一个\
  \ ODA 有两个服务器节点和冗余电源。系统各组件之间的系统互联是冗余的，在当前的 X3-2 型号中通过`SAS`电缆实现。\n\n在 ODA 上更换磁盘很容易执行。只需拨动存储单元前面的开关，拔出驱动器，滑入新驱动器，然后将开关拨回原位。\n\
  \nODA 减少了实现高可用性所需的活动部件数量。在大多数情况下，更少的活动部件和更少的交接意味着更高的可用性。\n\n有几种高可用性部署模式：\n*   **双活（Active-Active）**。这种模式通过部署在\
  \ ODA 上的`RAC`实现，提供跨两个节点的负载均衡处理能力以及在两个服务器之间故障转移的能力。\n*   **主备（Active-Passive）**。这种模式通过`RAC\
  \ One`、`RAC`和/或`Data Guard`实现。处理被配置为在单个节点上运行。在 ODA 内部，由`RAC One`或`RAC`支持故障转移。跨 ODA\
  \ 的故障转移，包括跨地理距离故障转移的能力，由`Data Guard`处理。\n\n实现高可用性需要额外的设计，例如`RAC`服务，以及如果`Data Guard`是解决方案一部分的话，还需要基于角色的服务。你的高可用性实现的有效性将与投入解决方案的设计和测试量成正比。\n\
  \n### 成本与价值主张\n\nODA 不符合传统的“自建还是购买”采购模式。公司当然可以选择构建自己的基于通用硬件的基础设施。然而，典型的公司没有资源来构建自己的工程系统。无论如何，请查看\
  \ Oracle 关于“自建还是购买”ODA 的视频。你会在主要的 Oracle ODA 产品页面和 Oracle 的 YouTube 频道上找到一些视频，详细说明了部署的简便性以及你为何需要认真考虑购买一个更好的、预打包解决方案的价值主张。有些视频带有一定的幽默元素，因此非常值得观看。内容是动态的，因此我们没有包含任何网络链接，因为它们可能会更改。不过，找到它们是相当容易的。\n\
  \n从硬件角度来看，购买 ODA 时你会获得大量资源。对于当前的 X3-2 型号，这包括两个服务器，每个服务器有 256G 内存，总共 32 个核心，以及大量存储。当前的存储量是\
  \ 18T 原始磁盘，可以部署为大约 9T 可用的双倍镜像，或 6T 可用的三倍镜像。通过存储扩展机架，存储可以再次加倍到 36T 原始存储。ODA 入门手册根据所选的部署选项详细说明了确切可用的存储量。\n\
  \n然而，ODA 的秘诀不在于硬件。ODA 的秘诀在于软件。其成分包括在数小时内完成`RAC`部署、对所有层级（`BIOS`、`固件`、`OS`、`ILOM`、`网格`、`数据库`）的自动化修补，从而使系统保持最新、稳定和合规。ODA\
  \ 硬件——带有标准的、嵌入式的 Oracle 硬件支持设施，并辅以大量增值管理软件——提供了极佳的价值主张。优势包括以下：\n*   ODA 附带一个嵌入式验证工具包（`oakcli`——Oracle\
  \ 应用套件命令行界面）。`oakcli`包含一套完整的诊断和管理实用程序，以维护 ODA“保持简单”的管理主题。\n*   ODA 允许你在硬件上限制已部署的许可和资源，采用“按成长付费”模式，而不是预先支付所有容量和许可的费用。额外的容量通过申请密钥来启用。\n\
  *   预打包的软件和部署模型提供了在整个数据库组合中部署标准化数据库平台的能力。ODA 是解决传统手工构建服务器和数据库模式的方案，该模式导致数据中心充满了“图腾柱”，没有两个图腾柱看起来是一样的。\n\
  \n毫无疑问，ODA 标准化部署模式降低了管理和行政成本。这部分是由于构建步骤的减少，以及需要参与的人员和团队数量的减少，同时也减少了团队之间的所有交接。ODA\
  \ 部署后，系统的统一性质和平台特定的自动化降低了持续的管理成本。持续的管理节省来自于：支持一个 ODA 所需的团队数量减少、平台的稳定性、对所有设备组件的自动化修补、更少的活动部件、服务器和组件的冗余、应用套件自动化，以及包括`ASR`和`ILOM`在内的嵌入式支持设施。\n\
  \n快速设置和标准化模型是`DBaaS`或云服务的绝佳构建块。在 ODA 上创建新的单实例、`RAC One`和`RAC`数据库的过程已缩短至 15 分钟。ODA\
  \ 是工程系统，可以由任何规模的公司部署。ODA 通常作为 Exadata 的低成本低生命周期环境，同时也是那些希望长期投资于 Exadata 的公司的切入点和初始成功故事。\n\
  \n\n\n### Oracle ODA 平台概述\n\nOracle 正在对该平台进行持续投入。新功能按季度发布，且软件变更向后兼容之前的硬件世代。ODA 最初是面向中小企业的解决方案，但随后大型企业也开始采购它。这有助于推动\
  \ ODA 产品获得更大的发展动力。由于 ODA 是单一供应商产品，消除了供应商间交接的问题，所有组件作为一个整体的测试都在 Oracle 内部完成。从故障排除的角度看，客户只需联系一个供应商来处理所有支持问题。当发起支持请求时，它会由专门设计的系统支持团队处理。\n\
  \n快速部署基础设施或预部署基础设施的能力，通过让项目快速启动以实现业务收益，从而带来整体成本节约。ODA 随附足够的资源，可作为整合平台并支持您的内部共享服务计划。ODA\
  \ 也支持标准的 Oracle 资源管理工具，例如实例锁定和数据库资源管理，以支持整合工作。\n\n最终，公司需要决定通过自行开发解决方案与购买像 ODA 这样的预打包解决方案相比，愿意承担多少工作和开销。ODA\
  \ 的一个关键好处是，它让公司能够将时间花在核心业务功能上，而非日常支持任务上。\n\n关于总体拥有成本（TCO）数字呢？Oracle 会公布数字——就像所有供应商为其竞品所做的那样。Oracle\
  \ 的 ODA TCO 研究目前可在 Oracle 的主要 ODA 产品页面上找到。Oracle 的数字对于支持您的初始采购可能有帮助。然而，最佳的 TCO 数字是您随着对该平台的深入了解而为您的公司量身定制的数字。\n\
  \n### Oracle 硬件\n\nODA 利用标准的 Oracle（原 Sun）硬件管理工具来管理设备并增强其抵御常规故障的能力。这些管理工具包括 `ILOM`\
  \ 和自动服务请求（`ASR`）工具。正如您之前在本书中所见，`ILOM` 允许您远程管理硬件，例如将其关机和开机，并运行一整套诊断程序。`ILOM` 的功能非常全面，在撰写本文时，Oracle\
  \ 已发布了八本独立的手册来涵盖所有功能。同样，`ASR` 软件提供“电话-home”能力，以自动发出警报并将硬件故障消息上传到 Oracle 以启动服务请求流程。\n\
  \nODA 硬件既是模块化的也是弹性的。服务器是模块化的，由两个独立的单元通过线缆连接而成。同样，存储也是模块化的。电源是冗余且可现场更换的。磁盘驱动器是可热插拔的。\n\
  \nOracle 硬件由现场服务部门支持，该部门将修复遇到的任何硬件故障。支持现场服务部门的是 Oracle 支持组织，该组织将通过协助诊断以确定问题原因来响应服务请求，然后派遣现场服务小组来解决问题。\n\
  \n### 安全与合规性\n\nODA 的第一个安全特性是在季度 ODA 版本中包含季度 `PSU` 错误修复和安全补丁。季度 ODA 补丁记录在 `MOS`\
  \ 注释 `888888.1` 中。Oracle 在发布季度 `PSU` 补丁集后大约两到四周发布季度 ODA 版本。Oracle 采用这种方法将最新的安全补丁包含在每个\
  \ ODA 版本中，并继续将补丁集的所有组件作为一个完整单元进行测试的流程。一键补丁过程的简便性是确保 ODA 定期打补丁以保持系统合规性的关键推动因素。保持系统安装最新的安全补丁是\
  \ `PCI`（信用卡行业）和其他安全合规性认证的要求。\n\nODA 的第二个安全实施特性是在开发发布过程中的安全扫描。Oracle 使用来自第三方供应商的安全扫描软件独立执行这些检查。扫描结果用于升级部署在\
  \ ODA 上的 `Oracle Linux` 软件包版本，以保持系统合规性。\n\n第三个锁定 ODA 的安全机制是 ODA 特定的、由 Oracle 提供的\
  \ `STIG` 脚本（`MOS` 注释 `1456609.1` 和 `1461102.1`）。`STIG` 脚本是美国国防部安全技术实施指南（`STIG`）流程的一部分。运行\
  \ `STIG` 脚本是一个两步过程。第一步，脚本可以在检查模式下运行以查找安全违规。第二步，“修复”过程允许纠正这些被标记的违规行为。\n\n通过查看代码，可以发现一些\
  \ `STIG` 安全检查包括以下列表。执行的安全检查列表未在 `MOS` 注释中详细说明。\n\n*   类别 1：这是国防部的说法，意为“你最好修复这个问题。”\n\
  \    *   `grub` 的密码是否启用？\n    *   `sendmail decode` 命令是否在 `/etc/aliases` 中被注释掉了？\n\
  \    *   特权账户 `halt` 是否存在？\n    *   `Ctrl-Alt-Del` 组合键是否可用于关闭系统？\n    *   `RealVNC`\
  \ rpm 是否安装在服务器上？\n    *   内核中是否找到了对 USB 设备的支持？\n*   类别 2：这是国防部的说法，意为“记录这些问题并制定计划来修复。”\n\
  \    *   单用户模式启动是否无需密码即可启用？\n    *   `pam-tally` 账户配置和登录失败管理工具是否配置为在连续三次登录失败后锁定账户？\n\
  \    *   系统是否禁止使用过去的密码？\n    *   密码强度有多安全？密码是否少于八个字符？\n    *   是否配置了延迟，使用户在登录失败后再次尝试登录前需要等待？\n\
  \    *   密码是否必须每 `60` 天至少更改一次？\n    *   密码是否可以在 `24` 小时内更改超过一次？\n    *   `cron`\
  \ 访问是否受控？\n    *   是否可以通过 `ssh` 直接以 `root` 身份登录系统？\n    *   `tcp dump` rpm 是否安装在系统上？\n\
  \    *   所有文件系统的权限是否正确？\n    *   是否存在任何不必要的账户？\n    *   `sendmail help` 命令是否启用？\n\
  *   类别 3：这是国防部的说法，意为“记录风险并决定如何处理。”\n    *   `UNIX` `man` 页面权限是否正确？\n    *   `sendmail`\
  \ 版本是否被隐藏？\n\n`STIG` 脚本中还有一些额外的检查项，即使是您经验丰富的系统管理员也可能需要查阅和弄清楚。`STIG` 脚本的目的是检查您的安全设置实践，而不是\
  \ ODA 的开箱即用安全实现。搜索“我的 Oracle 支持（`MOS`）”只找到了针对 ODA 和 `Exadatas` 的 `STIG` 实施文档。这个安全实施检查脚本是\
  \ ODA 的另一个增值主张。\n\n您选择实施哪些 `STIG` 脚本修复将取决于您公司的安全标准。并非每家公司的安全要求都与美国国防部相同。然而，安全是某些公司选择谨慎行事的领域。至少，`STIG`\
  \ 流程执行了一个 ODA 特定的国防部安全分析。\n\nOracle 还发布了 `Oracle Linux` 安全手册，`Oracle Linux` 团队也发布了额外的博客，介绍锁定系统的步骤。虽然将这些步骤直接转换到\
  \ ODA 上并不总是容易的，但它们确实是指导您系统安全锁定的宝贵指南。虽然全面覆盖服务器安全实施超出了本章的范围，但可以采取额外的步骤来锁定您的 ODA 系统，例如通过跳板机限制对\
  \ ODA 的访问。\n\n\n\n\n### 虚拟化技术\n\n2013 年 3 月，Oracle 在软件版本 2.5 中发布了对 ODA 上 Oracle\
  \ 虚拟化解决方案的支持。此后，Oracle 在每个版本中都持续增强 ODA 的虚拟化能力。在 ODA 上实施虚拟化是使用 ODA 的一个主要业务场景。Oracle\
  \ 在 ODA 上实施的虚拟机（VM）目前是独一无二的，因为其虚拟化已针对数据库进行了优化。预计虚拟化将继续成为 Oracle 的一个重要发展方向，包括增强 ODA\
  \ 上的功能。\n\nOracle 通过在`oakcli`中实施 VM 管理，简化了 ODA 虚拟机的管理，包括克隆、启动和停止 VM 的功能。`oakcli`已得到增强，可以导入模板。支持\
  \ ODA 上的虚拟化无需单独的 VM 管理器。\n\nODA 平台的“按需扩展能力”意味着 ODA 上可以提供额外的容量来运行非数据库应用和其他基础设施支持软件。Oracle\
  \ 为打包的 ODA 应用解决方案创造了一个短语——“一体化解决方案”。Oracle 正在将其软件移植到 ODA 专用的 VM 模板。在撰写本文时，一个 WebLogic\
  \ 模板已经为 ODA 发布，并且已宣布了一个 JD Edwards 模板。预计还会有更多针对其他 Oracle 软件产品的模板。Oracle 的合作伙伴也已加入进来，开始开发他们自己的应用“一体化解决方案”。\n\
  \n最大化硬件利用率并快速部署应用的商业价值主张是巨大的。各种规模的公司通常需要部署大型咨询公司、系统集成商和咨询人员来部署复杂的软件。通过 VM 模板在 ODA\
  \ 上部署应用，有望通过快速部署标准化镜像来显著节省成本。Oracle 已声明未来将发布更多的 ODA VM 模板。\n\n### ODA 技术解决方案\n\n\
  ODA 是一种技术上的“一体化解决方案”。该解决方案包含许多您应该了解的主要组件。我们将在本节介绍这些内容。\n\nOracle Appliance Kit（`oakcli`）是一个内置的、多功能的设备管理工具。`oakcli`命令参考可以在\
  \ MOS 1417879.1、最新的 ODA 版本发行说明以及 ODA 入门指南中找到。ODA 发行说明和入门指南通常比 MOS 说明更新。新的`oakcli`功能每季度发布一次，因此您需要主动查看季度发行说明以了解最新功能。\n\
  \n以下是您可以使用`oakcli`执行的一些操作：\n\n*   ODA 管理\n    *   部署 ODA\n    *   为 ODA 打补丁\n  \
  \  *   大约 15 分钟内创建一个新数据库\n    *   从当前 ODA 版本创建新的数据库软件主目录\n    *   删除数据库和数据库主目录\n\
  \    *   运行完整的系统检查\n    *   运行磁盘校准\n    *   配置和测试 ASR（自动服务请求）\n    *   显示硬件详细信息和版本\n\
  \    *   显示软件和固件版本\n    *   显示磁盘、磁盘组和其他存储详细信息\n    *   清理已应用的补丁\n    *   购买额外的 Oracle\
  \ 许可证时激活核心\n*   诊断\n    *   运行完整的系统检查\n    *   定位磁盘驱动器并点亮其 LED 指示灯以指示需要更换的具体磁盘\n\
  \    *   运行磁盘诊断\n    *   运行`ODAchk`运行状况检查\n    *   收集并打包诊断信息\n*   虚拟化\n    *   创建或克隆\
  \ ODA 虚拟机\n    *   配置 ODA 虚拟机上的资源\n    *   启动和停止 ODA_Base（虚拟化 ODA 上的数据库分区）或其他 ODA\
  \ 虚拟机\n    *   显示 ODA VM 模板的信息\n    *   部署/导入 Oracle VM 模板\n    *   为 ODA 虚拟机创建\
  \ CPU 池\n    *   显示一个或所有 ODA 上虚拟机的详细信息\n    *   将 IP 地址应用于 ODA 虚拟机\n    *   打开 VM\
  \ 控制台以管理 ODA VM\n\nOracle 还提供额外的 ODA 诊断实用程序作为 ODA 软件产品集的一部分。主要实用程序是`ODAchk`（MOS\
  \ 1485630.1）。这是`RACcheck`的 ODA 专用版本。Oracle 建议您部署最新版本的`ODAchk`，因此在`RACcheck`和 Exadata\
  \ 的`Exachk`工具更新后，您必须检查 MOS 说明以获取新版本。\n\nODA 附带标准的`top`、`vmstat`和`sar`服务器资源监控实用程序。ODA\
  \ 还附带详细的服务器资源收集实用程序`OSWatcher`（MOS 301137.1 和 461053.1）。ODA RAC 软件还包含两个适用于自安装平台的标准\
  \ RAC 实用程序：\n\n*   集群运行状况监视器（MOS 736752.1 和 1328466.1）— 细粒度资源监控\n*   跟踪文件分析器实用程序（MOS\
  \ 1513912.1）— 实时事件捕获\n\nODA 附带一组专为性能和在 ODA 上整合数据库而设计的数据库模板。数据库模板的大小调整记录在入门指南中。模板的大小范围从超小型、小型、中型、大型、超大型到超超大型。除了配置内存、重做日志大小和初始数据库大小外，这些模板还决定了可以在\
  \ ODA 上部署的数据库数量。\n\n以下是一些需要了解的其他软件实用程序和工具：\n\n*   ODA 附带两个允许启动基于 GUI 的工具会话的实用程序。它们是\
  \ VNC 服务器和 ILOM 远程控制台的 StartX。\n*   服务器软件包括前面讨论的 ILOM 和 ASR 设施。这些服务器管理实用程序是 Oracle\
  \ 相对于通用商用硬件的额外硬件增值点。\n*   ODA 预部署了一个名为`Logwatch`的实用程序，用于监控文件系统空间以及通过`ssh`进行的身份验证失败和登录。它是自动计划的。\n\
  *   ODA 可以运行其他主动支持工具（MOS 1459344.1）。一个很好的例子是`oratop`（1500864.1），它生成一个显示整体数据库和数据库服务器活动的单面板。\n\
  \nODA 具有独特的“最坏情况”恢复能力。当一切丢失，服务器操作系统磁盘配置失效且数据库无法启动时，只要问题根源不是重大硬件故障，ODA 提供了使用裸机恢复来重建设备的能力。使用此方法，ODA\
  \ 可以在大约两小时内重建。当然，您将需要数据库的备份以及任何需要恢复以使 ODA 进入可操作状态的额外对象，例如导出文件和用于 RAC 服务的 OCR。\n\n\
  最后，ODA 附带 Oracle Secure Backup 产品的许可证，用于备份 ODA。\n\n\n\n\n"
- "# 10. 虚拟化与 ODA\n\n## 摘要\n\nOracle 数据库一体机 (`ODA`) 主要设计为一个一体机设备，用于快速支持和部署 Oracle\
  \ 数据库，并提供按需付费的许可模式。`ODA` 硬件在部署选项上提供了极大的灵活性，其 `4U` 机架尺寸对于许多中小型企业 (`SMB`) 在各种场景下的部署来说都非常理想。`SMB`\
  \ 通常希望使用整合的硬件，而 `ODA` 作为一个优秀的数据库平台，仍然需要额外的组件来支持一个完整的应用程序栈。这催生了一个想法，即虚拟化可能实现一个一体化的解决方案，帮助各类\
  \ `SMB` 实现“减少硬件”的目标。\n\n通过软件更新，虚拟化功能已被添加到 `ODA` 中，与其他主要的 `ODA` 功能一样，它需要对平台进行重新镜像才能实现。`ODA`\
  \ 上的虚拟化允许使用那些可能被闲置的容量。本章将重点介绍使用 Oracle VM (`OVM`) 这项在 `ODA` 上实现虚拟化的技术的基础知识，并讨论部署虚拟机以扩展\
  \ `ODA` 用途的便捷性。\n\n## ODA 性能\n\n当前的 `X3-2 ODA` 型号运行与 `Exadata` 相同的计算节点型号。`ODA` 在服务器节点的发布周期上确实落后于\
  \ `Exadata`。尽管如此，它们大部分时间运行的是相同的 `CPU` 型号。`Exadata` 支持每台服务器的内存从 `256G` 扩展到 `512G`，但\
  \ `ODA` 不支持。即便如此，`ODA` 上的逻辑 `IO` 性能仍然非常出色。\n\n`ODA` 性能的另一个来源是所有组件都内置于一体机中。`RAC`\
  \ 流量不会离开一体机通过外部网络在计算节点之间进行通信。两个服务器节点和存储单元彼此相邻，并通过高速 `SAS` 电缆连接。中间没有交换机、防火墙或其他外部网络层。\n\
  \n`ODA` 的物理 `IO` 存储性能良好——事实上，比典型的 `SAN` 光纤通道磁盘要好。Oracle 已发布的 `X3-2` 物理 `IO` 基准测试显示，在单个存储单元上，`3,500`\
  \ `IOPS` 时延迟为 `5` 毫秒；在附加存储扩展单元时，`7,000` `IOPS`。超过这些 `IOPS` 水平，服务级别会下降。Oracle 的 `ODA\
  \ X3-2` 基准测试显示，在 `5,750` `IOPS` 时，服务级别为 `6` 到 `7` 毫秒；在配置存储扩展机架时，`11,500` `IOPS`。最后的这些数字仍然非常优秀，与经过良好调优的基于光纤通道磁盘的\
  \ `SAN` 上看到的水平相当。然而，当 `IOPS` 超过这些水平时，性能在某些时候会开始明显下降。由于 `ODA` 配备了大量内存，将数据缓存在内存中是避免达到\
  \ `ODA` `IOPS` 限制的关键可扩展性因素。\n\n`ODA` 目前没有支持使用 `PCI Flash` 或 `SSD` 的可选功能。随 `ODA`\
  \ 附带的四个 `SSD` 驱动器仅支持用于在线重做日志。`ODA` 支持扩展存储到 `NFS`，包括 Oracle 的 `ZFS` 存储设备。支持使用 `DNFS`\
  \ (直接 `NFS`) 来提升性能。然而，据我所知，尚未发布任何使用 `NFS` 存储扩展的 `ODA` 的物理 `IO` 性能基准测试。虽然 `ASM` 在\
  \ `NFS` 扩展上不受支持，但 Oracle 已宣布，当 `NFS` 挂载点是 Oracle `ZFS` 存储设备时，`ODA` 支持混合列式压缩。\n\n\
  由于 Oracle 正在投资 `ODA` 平台，`IOPS` 和磁盘性能可能会随着每个新型号而变化。当替代 `X3-2` 的新型号发布时，您需要重新审视物理性能和\
  \ `IOPS` 限制。\n\n## 总结\n\n`ODA` 是一种高可用的应用程序和数据库基础设施解决方案，采用自包含的一体化工程设备。`ODA` 提供低成本的硬件，与传统的数据库解决方案相比，其设置和持续支持成本更低。部署是自动化且快速的，包括创建\
  \ `RAC One` 和双节点 `RAC` 集群数据库。`ODA` 修补过程使用 Oracle 提供的软件，将 `OS`、网格和数据库组件作为一个整体单元进行修补。`ODA`\
  \ 预装了管理和部署软件。\n\n`ODA` 提供独特的“按需成长”Oracle 许可选项。应用程序和数据库可以使用 Oracle 的虚拟化产品部署在 `ODA`\
  \ 上。\n\n## Oracle VM (`OVM`)\n\n`OVM` 基于开源的 `Xen` 虚拟机管理程序，并在市场上与 `EMC VMware` 和\
  \ `Microsoft Hyper-V` 等产品竞争。Oracle 将 `Xen` 虚拟机管理程序作为其 `OVM` 技术的核心，并进行了重大增强，例如支持多种操作系统，以及提供管理界面，使其成为更适合企业使用的产品。\n\
  \nOracle 对 Sun Microsystems 的收购使其能够进一步增强 `OVM` 产品，并创建了一个 `OVM` 产品家族，包括 Oracle `VM\
  \ Server` 以及 Oracle `VM VirtualBox`。Oracle `VM Server` 是运行虚拟主机的平台，允许在一组硬件上 provision\
  \ 多个虚拟主机，并且包含一个服务器组件以及一个必需的管理组件。另一方面，Oracle `VM VirtualBox` 是一个桌面虚拟化工具，扩展了您现有桌面软件的功能，并且不需要虚拟机管理程序来管理它。Oracle\
  \ 免费提供 Oracle `VM Server` 以及 Oracle `VirtualBox`，但 Oracle `VM Server` 有相关的支持成本。Oracle\
  \ 还提供了一个其产品的广泛 `VM` 模板库，允许快速部署虚拟机。Oracle `VM` 模板也可以转换为 Oracle `VirtualBox` 模板。\n\
  \n### OVM 与数据库一体机\n\n`ODA` 上的 `OVM` 实现具有独特性，因为它不需要 Oracle `VM Manager`。在 `ODA` 上引入虚拟化的设计理念是为了在不增加额外基础设施的情况下增强\
  \ `ODA` 的价值，并确保数据库一体机中的数据库仍然是 `ODA` 的主要焦点。`ODA` 补丁版本 `2.5` 添加了对虚拟化的支持，此后所有后续版本都增加了功能，使虚拟化更好、更易于管理和部署。\n\
  \n`ODA` 上的虚拟化在安装和设备配置方面带来了一些独特的挑战。`ODA` 上的默认设置是裸机，这意味着所有硬件与每个组件都是一一对应的。为了将正在运行的\
  \ `ODA` 转换为虚拟化模型，必须重新安装整个一体机。这一点作为安装决策尤为重要，因为转换需要数据丢失或停机。\n\n### 安装虚拟化 ODA\n\n从工厂发货的\
  \ `ODA` 的默认状态是裸机状态。`ODA` 裸机安装的过程在第 2 章中有详细说明。本节将重点介绍一些具体的变化，以及 `ODA` 离线配置器中为处理虚拟化所做的更改。\n\
  \n\n\n## 虚拟化准备\n\n`ODA`上的虚拟化在不同版本间发生了巨大变化。最初的虚拟化`ODA`平台仅支持本地虚拟机存储库，且没有任何预定义的虚拟网络设置。虚拟化的发展现已允许访问本地或共享存储库，以及设置`VLAN`的可能性，这是隔离数据库和应用程序所必需的。`ODA`补丁\
  \ 2.8 支持共享存储库并提供了简化的`VLAN`设置方法。\n\n为`ODA`上的虚拟化做准备，需要在部署设备时做出一些决定。由于设备软件的易变性，有时很难在不走回头路的情况下做出设计选择。在部署前需要做出几个决定：\n\
  \n*   裸金属还是虚拟化？\n*   共享存储库还是本地存储库？\n*   数据库虚拟机或`ODA_Base`需要多少个 CPU？\n\n关键决定是选择裸金属还是虚拟化。一旦选定其中一种，要逆转这个决定就非常困难，因为这样做需要完全重新安装系统。本地存储库选项允许在`ODA`\
  \ v1 中分配 250GB，在`ODA` X3-2 中分配 350GB 用于模板管理。此选项现已被共享存储库选项所取代，代价是会占用`DATA`和`RECO`磁盘组的空间。共享存储库选项允许虚拟机具有更高的可用性。使用本地存储库时，一个`VM`只会启动在它注册的节点上；而在共享存储库模式下，如果一个节点不可用，`VM`可以故障转移到另一个节点。\n\
  \n另一个重要的容量考虑是确保数据库`VM`的大小合适。`ODA`的主要关注点是数据库，因此一个虚拟化的`ODA`包含一个特殊的、经过优化的`VM`，称为`ODA_BASE`，它独占访问共享磁盘，这对于确保最佳的数据库性能是必需的。`ODA_BASE`是一个预构建的`OVM`模板，其中包含\
  \ Oracle Clusterware 和数据库所需的所有特定组件。\n\n设计是虚拟化`ODA`的一个非常重要的方面。图 10-1 展示了设备虚拟化的基本架构。由于`ODA`由两台物理服务器组成，在作为虚拟化练习的一部分部署到`ODA`上时，有两个主要组件需要部署：\n\
  \n*   `Dom0` 或虚拟化控制器\n*   `ODA_BASE` 或专用于`ODA`的客户`VM`\n\nDomain 0，或称`Dom0`，是虚拟化控制器，它是一个用于管理虚拟化框的虚拟机监控程序的虚拟操作系统。两个物理节点中各有一个`Dom0`；它被认为是管理`ODA`虚拟化基础设施的部分。`Dom0`被用作基础操作系统，因此不应在其上安装其他任何东西。然而，`Dom0`确实托管虚拟模板存储库，因此所有`VM`模板都从那里导入。\n\
  \n![A978-1-4302-6266-4_10_Fig1_HTML.jpg](img/A978-1-4302-6266-4_10_Fig1_HTML.jpg)\n\
  \n图 10-1. 虚拟化`ODA`的基本架构\n\n数据库`VM`，也称为`ODA_BASE`，是设备的一个关键方面。`ODA_BASE`是一个特殊设计的`VM`，可以直接访问部分`ODA`硬件。它预先安装并配置了针对`ODA`硬件优化的各种驱动程序，以改善对虚拟机监控程序和共享磁盘的访问。`ODA_BASE`模板包括集群软件二进制文件、数据库软件二进制文件以及创建\
  \ Oracle 数据库所需的自定义数据库模板。\n\n虚拟化的另一方面是在单独的虚拟化主机中安装应用程序或任何其他组件。这被称为用户`VM`。用户`VM`不是强制性的，一个`ODA`可以被虚拟化并只包含一个`Dom0`和一个`ODA_BASE`。目前，除非使用共享`VM`存储库，否则用户`VM`存在空间限制。共享存储库支持是`ODA`2.8\
  \ 中的一个新功能，但在此之前，每台物理机上只有 250GB（`ODA` V1）或 350GB（`ODA` X3-2）的本地磁盘空间可用。此外，在先前版本的`ODA`软件中，用户`VM`不具备故障转移能力。\n\
  \n## 虚拟化部署考虑因素\n\n理解当`ODA`用作虚拟化环境时其部署策略的变化非常重要。部署时需要理解容量和网络变化。除非独立软件供应商（`ISV`）创建了启用虚拟化的自定义设备，否则设备发货时不会预装虚拟化。\n\
  \n表 10-1 和表 10-2 对比了`ODA` V1 和`ODA` X3-2 在裸金属与虚拟化接口方面的差异。在裸金属环境中，所有网络接口都有物理映射，并且在\
  \ Linux 层进行绑定，为网络接口提供高可用性。严格遵守文档并确保`Eth0`仅用于私有接口至关重要。\n\n表 10-2. Oracle Database\
  \ Appliance X3-2 网络设置\n\n| 类型 | 物理接口 | 链路速度 | 裸金属接口名称 | 虚拟接口名称 | 虚拟桥接 Dom0 |\n|\
  \ --- | --- | --- | --- | --- | --- |\n| 板载双网接口 | `Eth0` | 10GbE | `Eth0` | `Eth0`\
  \ | `Priv1` |\n| 板载双网接口 | `Eth1` | 10GbE | `Eth1` | `Eth0` | `Priv1` |\n| 板载四网接口\
  \ | `Eth2` 和 `Eth3` | 10GbE | `bond0` | `Eth1` | `Net1` |\n| 板载四网接口 | `Eth4` 和 `Eth5`\
  \ | 10GbE | `Bond1` | `Eth2` | `Net1` |\n\n表 10-1. Oracle Database Appliance V1\
  \ 网络设置\n\n| 类型 | 物理接口 | 链路速度 | 裸金属接口名称 | 虚拟接口名称 | 虚拟 Dom0 桥接 |\n| --- | --- | ---\
  \ | --- | --- | --- |\n| 内部双 1GbE | `Eth0` | 1GbE | `Eth0` | `Eth0` | `Priv1` |\n\
  | 内部双 1GbE | `Eth1` | 1GbE | `Eth1` | `Eth0` | `Priv1` |\n| 板载双 1GbE | `Eth2` 和\
  \ `Eth3` | 1GbE | `Bond1` | `Eth1` | `Net1` |\n| 板载双端口 | `Eth8` 和 `Eth9` | 10GbE\
  \ | `xbond0` | `Eth4` | `Net4` |\n| 四端口网络接口 | `Eth4` 和 `Eth5` | 1GbE | `Bond 2`\
  \ | `Eth2` | `Net2` |\n| 四端口网络接口 | `Eth6` 和 `Eth7` | 1GbE | `Bond3` | `Eth3` | `Net3`\
  \ |\n\n理解物理和虚拟连接及其差异至关重要，如表 10-1 和 10-2 所示。部署`ODA`时需要此信息。`IP`需求在裸金属和虚拟化`ODA`之间也略有变化。表\
  \ 10-3 显示了裸金属`ODA`和虚拟化`ODA`之间`IP`需求的差异。Domain0 和用户`VM`的增加是`IP`需求差异的重要因素。\n\n表 10-3.\
  \ ODA 的 IP 需求\n\n| IP 类型 | 裸金属 IP 数量 | 默认值 | 虚拟化 IP 数量 | 默认值 |\n| --- | --- | ---\
  \ | --- | --- |\n| 主机 | 2 | 用户定义 | 2 | 用户定义 |\n| 私有 IP | 4 | 192.168.16.24 192.168.16.25\
  \ 192.168.17.24 192.168.17.25 | 2 | 192.168.16.27 192.168.16.28 |\n| Dom 0 | 不适用\
  \ | 不适用 | 4 | 两个用户定义: 192.168.16.24 (私有) 192.168.16.25 (私有) |\n| RAC VIP | 2 | 用户定义\
  \ | 2 | 用户定义 |\n| SCAN VIP | 2 | 用户定义 | 2 | 用户定义 |\n| ILOM IP | 2 | 用户定义 | 2 | 用户定义\
  \ |\n| 用户 VM IP* | 不适用 | 不适用 | 每个 VM 1 个 | 用户定义 |\n\n*用户 VM IP 取决于 VM 数量；最少 1 个\
  \ IP/VM。\n\n\n\n### 虚拟化 ODA 的部署\n\n部署虚拟化 ODA 需要重新安装设备，然后在 ODA 上部署虚拟化镜像。第 2 章详细介绍了如何安装\
  \ ODA 裸机版的流程。为了使 ODA 成为虚拟化配置，需要从 Oracle 支持站点下载相应的补丁。目前，可以下载 `Patch ID 16984856`\
  \ 来部署虚拟化镜像。\n\n### 虚拟部署的配置\n\n离线配置器已经增强，以支持构建部署虚拟化 ODA 所需的配置。图 10-2 是进入配置器的初始界面；由于硬件配置的变更，它允许进行各种配置选择。\n\
  \n![A978-1-4302-6266-4_10_Fig2_HTML.jpg](img/A978-1-4302-6266-4_10_Fig2_HTML.jpg)\n\
  **图 10-2.** 初始配置选择屏幕\n\n### 网络接口映射\n\n网络映射屏幕是虚拟接口将可访问的地方；这与裸机配置中可用的物理接口形成对比。图 10-3\
  \ 展示了在 `ODA X3-2` 示例中虚拟环境下的网络接口变化。`ODA V1` 和 `ODA X3-2` 的配置屏幕是相同的，区别在于 `ODA V1`\
  \ 允许在 `1Gbei` 和 `10GbE` 接口之间选择。`ODA X3-2` 上的所有接口都支持 `10 GbE`。\n\n![A978-1-4302-6266-4_10_Fig3_HTML.jpg](img/A978-1-4302-6266-4_10_Fig3_HTML.jpg)\n\
  **图 10-3.** `ODA X3-2` 的网络配置屏幕\n\n### 重镜像后配置\n\n配置器生成的配置文件用于部署过程，该过程在重镜像完成后启动。重镜像完成的标志是\
  \ `Dom0` 可用且 `Oracle VM Server` 已安装。图 10-4 显示了在 `Dom0` 上运行的 `Oracle VM Server` 的一个屏幕。\n\
  \n![A978-1-4302-6266-4_10_Fig4_HTML.jpg](img/A978-1-4302-6266-4_10_Fig4_HTML.jpg)\n\
  **图 10-4.** ODA 上新初始化的 `Oracle VM Server`\n\n服务器重镜像完成后，可以使用 `ILOM` 的远程访问控制台，访问到类似于图\
  \ 10-4 所示的屏幕。离线配置器不允许向 `Dom0` 添加 IP 地址，因此您需要通过 `ILOM` 的远程访问登录，并以 `root` 身份登录来配置网络，如清单\
  \ 10-1 所示。\n\n### 为 `Dom0` 配置网络\n\n**清单 10-1.** 向 `Dom0` 添加 IP\n\n```\n/opt/oracle/oak/oakcli\
  \ configure firstnet\n\nConfigure the network for the node(s)(local, global) [global]:\
  \ <default is global for configuring both nodes>\n\nThe network configuration for\
