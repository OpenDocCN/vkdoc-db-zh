  ```\n\n\n\n### ODA 配置审计工具\n\n主动检查套件的一部分是 ODA 配置审计工具包 (`odachk`)。Oracle 一直以来都在为其工程化与非工程化系统组合构建最佳实践，这些检查包括了\
  \ `racchk`、`exachk`，以及现在针对 ODA 的 `odachk`。\n\n`odachk` 实用程序是 Oracle RAC 保证团队开发的一款完整的审计与评估工具，旨在为\
  \ RAC 和 Clusterware 提供最佳实践检查。该工具还提供了各种针对特定操作系统的检查。虽然每个版本的检查都可能增加更多选项和功能，但以下几个类别是关键：\n\
  \n*   操作系统内核参数\n*   操作系统软件包\n*   许多对 RAC 重要的其他操作系统配置设置\n*   CRS/网格基础设施\n*   RDBMS\n\
  *   ASM\n*   数据库参数\n\n这个列表相当全面，并且这些检查每 90 天更新一次，以确保测试的新鲜度。更新还会纳入更新的最佳实践，以及对已知问题的解决方案。`odachk`\
  \ 实用程序应至少每月运行一次，并在系统进行任何变更之前和之后运行，以确保环境中没有出现问题。该实用程序还提供升级前和升级后检查，支持从 11.2.0.2 升级到\
  \ 11.2.0.3，以确保满足所有最佳实践。\n\n清单 7-15 提供了一个获取 `odachk` 版本以及从 `odachk` 实用程序获取帮助的示例。`odachk`\
  \ 更新非常频繁，每个 ODA 软件版本都可能包含一个新版本的实用程序。\n\n清单 7-15. ODA 检查\n\n```\n[root@odax32 odachk]#\
  \ ./odachk -v\nODACHK  VERSION: 2.2.1_20130415\n\n[root@odax32 odachk]# ./odachk\
  \ -h\nUsage : ./odachk [-abvhpfmsuSo:c:rt:]\n-a      All (Perform best practice\
  \ check and recommended patch check)\n-b      Best Practice check only. No recommended\
  \ patch check\n-h      Show usage\n-v      Show version\n-p      Patch check only\n\
  ...\n```\n\n`odachk` 将大量信息打包到其输出中，并且由于检查具有易变性，它独立于 OAK 框架。命令可执行文件通常位于 `/opt/oracle/oak/odachk`。您应该仅以\
  \ Oracle RDBMS 软件所有者的身份运行该实用程序。以任何其他用户身份运行将收到类似以下的消息：\n\n```\nodachk found that\
  \ oracle software owner exists and its being run by root.\n```\n\n让我们看一下 `odachk`\
  \ 的典型运行。清单 7-16 展示了一个这样的运行及其输出。\n\n清单 7-16. ODA 检查执行\n\n```\nChecking ssh user equivalency\
