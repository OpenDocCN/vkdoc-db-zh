  ## 反配置数据库控制


  反配置的操作和最初配置时一样简单。只需使用参数 `–deconfig` 调用 `emca` 即可。`-deconfig` 选项将启动反配置过程。清单 6-16
  展示了如何在 Oracle 数据库一体机上为当前数据库反配置数据库控制。


  **清单 6-16.** 反配置数据库控制


  ```bash

  $ cd $ORACLE_HOME/bin

  $ ./emca -deconfig dbcontrol db

  ```


  当反配置开始时，`emca` 工具将提示您输入要反配置的数据库控制所关联的 `ORACLE_SID` 值。提供该 `ORACLE_SID` 值；然后 `emca`
  会询问您是否确实要反配置数据库控制。这是一个确认提示，需要回答。反配置完成后，关联数据库的控制台将不再可用或可访问。


  清单 6-17 展示了一个典型反配置操作的输出。


  **清单 6-17.** 反配置输出


  ```

