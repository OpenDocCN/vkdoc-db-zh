  \n\n### 系统组件检查\n\n系统组件检查是确保 ODA 健康的关键。作为数据库管理员，我们往往容易忽视硬件本身的健康状况。OAK 以一种易于理解的方式提供了对系统组件的验证，即使是对硬件相关指标不太熟悉的人也能轻松掌握。\n\
