  ![A978-1-4302-6266-4_2_Fig11_HTML.jpg](img/A978-1-4302-6266-4_2_Fig11_HTML.jpg)

  *图 2-11. ODA V1 服务器电源控制*


  ### 裸机 Oracle 数据库设备


  Oracle 数据库设备预装了基础软件，但在某些情况下需要对 ODA 服务器进行重新镜像。重新镜像的需求可能源于系统损坏，或者为了快速将软件升级到最新版本。


  该过程需要下载要镜像到数据库设备上的软件的 ISO 镜像。最新的 ISO 镜像可通过按照 MOS 说明 888888.1 中的指示获取。下载 ISO 文件并在笔记本电脑或台式机上解压。进入“远程控制”
  ➤ “重定向”菜单，然后选择“启动远程控制台”。这将打开一个显示控制台消息并可访问服务器节点的屏幕。请在两个服务器节点上都执行此过程。


  一旦远程控制台屏幕可用，点击“设备”菜单并选择“CD ROM 镜像”。您将看到一个对话框，要求您定位 ISO 镜像。


  选择 ISO 镜像后，请确保该镜像已挂载。屏幕上将显示消息以确认镜像已挂载。屏幕将显示一条消息，指示虚拟 CD-ROM 镜像已挂载。


  进入 ILOM。选择下一个启动设备为 CDROM，如图 2-13 所示。然后循环重启服务器节点的电源，如图 2-14 所示。


  ![A978-1-4302-6266-4_2_Fig14_HTML.jpg](img/A978-1-4302-6266-4_2_Fig14_HTML.jpg)

  *图 2-14. 循环重启服务器节点电源*


  ![A978-1-4302-6266-4_2_Fig13_HTML.jpg](img/A978-1-4302-6266-4_2_Fig13_HTML.jpg)

  *图 2-13. 选择下一个启动设备*


  电源循环重启后，重定向屏幕将在系统重启时显示控制台消息。消息显示后，裸机镜像过程将开始。图 2-15 显示了该过程的开始。


  ![A978-1-4302-6266-4_2_Fig15_HTML.jpg](img/A978-1-4302-6266-4_2_Fig15_HTML.jpg)

  *图 2-15. Oracle 数据库设备镜像开始*


  安装后过程可能耗时较长。您必须确保在整个过程中与服务器保持稳定的连接。图 2-16 显示了安装后屏幕。


  ![A978-1-4302-6266-4_2_Fig16_HTML.jpg](img/A978-1-4302-6266-4_2_Fig16_HTML.jpg)

  *图 2-16. ODA 镜像的安装后屏幕*


  完整的镜像过程可能需要一到两个小时，并且可以在两个服务器节点上并行运行以加快访问设备的速度。请务必牢记，重新镜像一个极具破坏性的过程，它会擦除设备上的所有信息。在镜像前，务必备份您在
  ODA 上存储的任何信息。


  ## 摘要


  ILOM 是嵌入到 ODA 中的服务处理器。它是硬件的大脑。从管理和监控的角度来看，ILOM 提供了许多功能。远程 KVMS 或 shell 访问允许远程访问服务器节点以执行“亲临现场”般的功能。


  可以通过运行 Java 的现代浏览器使用图形界面访问 ILOM，也可以通过集成的 shell 访问。这两种方法都可用于执行设置和管理，以及监控任务。ILOM 可以与最常见的身份验证机制（如
  LDAP 和 Active Directory）集成。ILOM 还提供全面的日志记录机制，并允许通过远程 syslog 服务器或 SNMP 陷阱复制日志数据。


  ILOM 提供通过串行访问设置数据库设备的功能，以及提供服务器电源控制功能。当需要时，ILOM 是控制台，允许通过 Oracle 支持网站提供的 CD-ROM
  镜像对设备服务器节点进行重新镜像。


