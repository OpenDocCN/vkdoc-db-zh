  ## ILOM 功能


  `ILOM` 能够提供大量的服务。查看 `ILOM` 及其所有功能超出了本书的范围，但我们将从管理 `ODA` 的角度研究一些重要的功能。


  ### 远程 KVMS 服务


  远程 `KVMS`（键盘、视频、鼠标、存储）是 `ILOM` 中非常重要的一部分，根据您对设备远程访问的熟悉程度和经验，这可能是您将使用的主要功能。远程 `KVMS`
  服务允许您从浏览器远程控制服务器节点。远程 `KVMS` 使用虚拟网络计算（`VNC`）访问服务器节点。因此，您应该确保在您的工作站上打开表 2-1 中所示的防火墙端口。


  表 2-1.

  `RKVMS` 访问所需的防火墙端口


  | 端口 | 协议类型 | 服务 |

  | --- | --- | --- |

  | `443` | `TCP` | `HTTPS`（入站） |

  | `5120` | `TCP` | 远程光驱（出站） |

  | `5121` | `TCP` | 远程键盘和鼠标 |

  | `5123` | `TCP` | 远程软驱 |

  | `6577` | `TCP` | `CURI`（`API`）- `TCP` 和 `SSL` |

  | `7578` | `TCP` | 视频数据（双向） |

  | `161` | `UDP` | `SNMP V3` 访问（入站） |

  | `3072` | `UDP` | 陷阱输出（仅出站） |


  `ILOM` 的设置将在本章后面介绍，但一旦 `ILOM` 设置完毕，远程 `KVMS` 就允许访问服务器控制台。远程 `KVMS` 还允许远程安装，这是进行裸机服务器安装所必需的。远程控制功能的访问方式在
  `ODA V1` 和 `X3-2` 之间略有不同，但两者在功能上提供相同的功能。


