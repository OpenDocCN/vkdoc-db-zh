  \n\n\n### 操作系统磁盘存储\n\n验证系统后，从操作系统视角检查磁盘并确保所有磁盘运行正常同样重要。您还需要确认设备上的 RAID 级别状态正常。ODA\
  \ V1 和 X3-2 的配置相似，但 ODA X3-2 为操作系统提供了更多可用的磁盘空间。\n\n> **注意**\n>\n> 虚拟化 ODA 显示映射到各物理磁盘的虚拟磁盘。裸金属\
  \ ODA 则显示物理磁盘的一对一映射。\n\n清单 7-7 展示了如何验证 ODA 设备的磁盘存储。\n\n**清单 7-7. 验证 ODA 操作系统磁盘存储（V1\
