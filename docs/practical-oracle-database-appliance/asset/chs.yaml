- '# Oracle 数据库一体机（ODA）是如何诞生的？


  这是个好问题，我很乐意分享一些关于这台一体机背后的历史、动机和思考过程。


  Oracle 的真正应用集群（`RAC`）开发团队一直致力于让 `RAC` 成为一种更广泛被采用的技术。在第一个十年（2001 年至 2011 年）中，Oracle
  `RAC` 在市场上获得了快速的采纳和增长，但许多中端市场客户出于对其复杂性和成本的认知而避开了 `RAC`。虽然 `RAC` 在大型企业环境中很常见并被广泛接受，但
  Oracle 的中端市场客户却没有一个简单且负担得起的 `RAC` 数据库解决方案。


  2010 年初，Oracle 收购了 Sun Microsystems，一个充满可能性的新世界由此打开。Sun 拥有一套尚未商业化的“箱中集群”硬件系统。它在极具吸引力的
  4U 尺寸规格中集成了服务器、存储和网络。该系统被证明是部署 `RAC` 的最简单方式。借助它，我们能够在 `55 分钟`内部署好 `RAC`！


  灵光乍现。这个“箱中集群”正是实现我们“**大众化的 RAC**”梦想的答案。我们开发了 `Appliance Manager` 软件来简化和自动化部署、补丁和存储管理。该软件与一体机相结合，使得
  `RAC` 的实现变得极其简单。`ODA` 便由此诞生。


  我们面临的下一个挑战是成本。如果软件费用高得离谱，廉价的硬件又有什么用？为了让我们的“箱中 RAC”解决方案对中端市场客户具有吸引力，我们必须克服这个挑战。集群硬件和
  `RAC` 数据库软件能否以低于 10 万美元的价格购买和部署？在 Oracle 高层管理的支持下，`ODA` 成为了 Oracle 首个按需扩容系统。换句话说，客户可以以较低的价格入门，然后随着需求的增长，再开启更多内核并添加许可功能。正是这种方法使得低于
  10 万美元的 Oracle `RAC` 系统成为现实可能。


  早期的客户对 `ODA` 的简洁性赞不绝口。许多 `RAC` 的怀疑者转变了看法。一些客户将 `ODA` 采纳为标准。但正如通常发生的那样，客户很快就想要更多！随着
  `ODA` 的每一代更新，CPU、内存和存储容量都在增长。客户还希望将他们的应用程序也放入 `ODA` 中。这就是我们构建 `ODA` 虚拟化平台的原因。数据库可以在其自己的虚拟机（`VM`）中运行，而客户应用程序可以在它们自己的
  `VM` 中运行。客户可以按层为他们所使用的内容付费，并拥有完整的应用与数据库隔离安全性。“盒中解决方案”的概念由此诞生。人们开始将 `ODA` 视为现代版的
  `AS/400`。


  Fuad Arshad 是本书的作者之一，我很荣幸能在这里说几句关于他的话。我第一次见到 Fuad 时，他是我的客户。那是一个下午，Fuad 端到端部署了四台
  `ODA`，并在所有机器上运行了 Oracle `RAC`。他简直不敢相信。他明白，他在一个下午完成的事情，他的组织之前需要花费数月时间。他明白，这是部署 Oracle
  和 `RAC` 的一种范式转变。对他和他的组织而言，这改变了游戏规则，请求不断涌向他：“请给我也来一台 `ODA`？”。


  Fuad 和他的队友们以一种我在客户中很少见的热情追随着 `ODA`。Fuad 迅速成为该技术方面知识最渊博的人之一，也是我们最有价值的客户反馈资源。他测试了所有与
  `ODA` 相关的东西。他为此写博客。他在用户大会上发言。Fuad 的热情驱使他去写一本充满他激情的主题。他的合著者们也是如此。我祝愿他们一切顺利，并祝他们的书取得圆满成功。


  Sohan DeMel

  产品战略与业务发展副总裁

  Oracle 公司


