  **图 3-3. 将最终用户捆绑包复制到 Oracle 数据库一体机**\n\n\n\n### 网络时间协议配置\n\n在部署数据库前，验证两个节点之间的时间是否准确且相差在几秒钟内至关重要。Oracle\
  \ 数据库一体机随附的默认配置文件 `/etc/ntp.conf` 实际上是有效的。一体机初始配置为使用 RedHat 公共 NTP 服务器池；对于能访问互联网的系统，这通常能使\
  \ Oracle 数据库一体机的时间保持同步。清单 3-4 展示了 NTP 配置文件的服务器部分，其中 Oracle 数据库一体机指向了 RedHat NTP\
  \ 池。\n\n清单 3-4. RedHat NTP 池\n```\n# 使用 pool.ntp.org 项目的公共服务器。\n# 请考虑加入该池 ( http://www.pool.ntp.org/join.html\
  \ )。\nserver 0.rhel.pool.ntp.org\nserver 1.rhel.pool.ntp.org\nserver 2.rhel.pool.ntp.org\n\
  ```\n\n对于某些安装，这样配置就可以了，但许多数据中心拥有自己的 NTP 基础设施。这种情况下，应注释掉（在行首放置井号 \"#\"）指向池的 \"server\"\
  \ 行，并添加指向本地 NTP 服务器的行。清单 3-5 展示了如何添加您自己的本地 NTP 服务器。\n\n清单 3-5. 配置本地 NTP 服务器\n```\n\
  # 使用 pool.ntp.org 项目的公共服务器。\n# 请考虑加入该池 ( http://www.pool.ntp.org/join.html )。\n\
  #server 0.rhel.pool.ntp.org\n#server 1.rhel.pool.ntp.org\n#server 2.rhel.pool.ntp.org\n\
  server 172.30.0.1\n```\n\n修改 `/etc/ntp.conf` 文件后，需要使用 `service ntpd restart` 命令重启\
  \ NTP 守护进程 (`ntpd`)。这将停止守护进程，将时钟与 NTP 源同步，然后重新启动守护进程。\n\n注意\n\n在 Oracle 数据库一体机 2.2\
  \ 版本中，存在一个导致 NTP 不同步的错误。请参阅 Note 1489263.1 获取解决方案。\n\n`ntpd` 进程重启后，您可以使用 `ntpq -p`\
  \ 命令验证与 NTP 服务器的通信。此命令将显示一体机当前使用的所有 NTP 服务器以及每个服务器经历的时间偏移（参见清单 3-6）。\n\n清单 3-6. \
  \ ntpdq –p 命令的输出\n```\n     remote          refid      st t when poll reach   delay   offset  jitter\n\
  ==============================================================================\n\
   205-196-146-72.  209.51.161.238   2 u   62   64    1   26.872   -2.682   0.001\n\
  name1.glorb.com  128.174.38.133   2 u   61   64    1   17.005   -2.099   0.001\n\
   ntp1.rescomp.be  169.229.128.214  3 u   60   64    1   77.270    3.740   0.001\n\
   LOCAL(0)        .LOCL.          10 l   59   64    1    0.000    0.000   0.001\n\
  ```\n\n查看清单 3-6，我们可以看到正在使用三个外部服务器和系统时钟。系统时钟偏移大约为 –2 到 3 秒。NTP 守护进程 (`ntpd`) 现在将漂移时间，以使系统时钟与实际时间的差距保持在一百到二百毫秒之内。\n\
  \n### Grid Infrastructure 和数据库安装\n\n在第 2 章结尾，您得到的是一台\"裸机\"安装的 Oracle 数据库一体机。这意味着您现在应该有一台运行着\
  \ Oracle Enterprise Linux 的干净的 Oracle 数据库一体机。此时，您需要在 Oracle 数据库一体机上安装 Oracle Grid\
  \ Infrastructure 和 Oracle 数据库软件。如何操作呢？由于 Oracle 数据库一体机是一个工程化系统，您不能直接下载并安装这些 Oracle\
  \ 产品。Oracle 提供了用于安装这些产品的软件包。\n\n当您开始寻找安装 Oracle 产品的软件包时，可能需要访问 My Oracle Support\
  \ 并下载适用于 Oracle 数据库一体机的最新最终用户捆绑包。最终用户捆绑包为\"出厂\"或重新镜像的 Oracle 数据库一体机提供了 Grid Infrastructure\
  \ 和 Oracle 数据库的更新版本。请注意，当您开始下载最终用户捆绑包时，文件相当大，可能需要一些时间才能获取完毕，然后才能开始安装。\n\n注意\n\n\
  要下载最终用户捆绑包或 Oracle 数据库一体机所需的任何其他主要补丁，您可能需要遵循 Note ID 888888.1 中的说明。\n\n## 数据库安装\n\
  \n将最终用户捆绑包复制到 Oracle 数据库一体机后，您需要通过解包将其安装到一体机上。解包包括使用 `oakcli unpack` 命令。清单 3-7 展示了在\
  \ temp 目录中解压缩 2.7 版的最终用户捆绑包。\n\n清单 3-7. 使用 oakcli unpack\n```\n[root@oak1 tmp]#\
  \ /opt/oracle/oak/bin/oakcli unpack -package /tmp/p12978712_27000_Linux-x86-64.zip\n\
  Unpacking takes a while,  pls wait....\n```\n\n最终用户捆绑包解压到临时目录后，您需要使用图形用户界面安装 Oracle\
  \ 产品。为此，您需要启动虚拟网络计算服务器以与 Oracle 数据库一体机交互。\n\n\n\n### VNC 配置与连接\n\nVNC 是一种图形化桌面共享技术，它允许你在服务器上使用\
  \ X11 桌面并本地执行程序，而仅将屏幕输出发送到你的 PC 或 MAC 上的 VNC 客户端。在安装终端用户束之前，你需要为 VNC 服务器配置一个初始密码。要设置初始\
  \ VNC 密码，请运行 `vncserver` 命令并设置你的密码。该命令还会为你提供 VNC 会话编号。代码清单 3-8 展示了在设置 VNC 服务器密码时应该看到的示例。\n\
  \n代码清单 3-8. 设置 VNC 服务器密码和端口\n\n```\n[root@oak1 tmp]# vncserver\nYou will require\
  \ a password to access your desktops.\nPassword:\nVerify:\nxauth:  creating new\
  \ authority file /root/.Xauthority\nxauth: (stdin):1:  bad display name \"oak1:1\"\
  \ in \"add\" command\nNew 'oak1:1 (root)' desktop is oak1:1\nCreating default startup\
  \ script /root/.vnc/xstartup\nStarting applications specified in /root/.vnc/xstartup\n\
  Log file is /root/.vnc/oak1:1.log\n```\n\n一旦密码设置完成并确定了会话编号，你就可以使用 VNC 客户端连接到系统。对于远程主机，你需要使用启动\
  \ VNC 服务器时标识的 IP 地址和会话。图 3-4 展示了使用 VNC 客户端连接到 Oracle 数据库设备。\n\n![A978-1-4302-6266-4_3_Fig4_HTML.jpg](img/A978-1-4302-6266-4_3_Fig4_HTML.jpg)\n\
  图 3-4. VNC 客户端连接到 Oracle 数据库设备\n\n如果你使用正确的会话 ID 和 IP 地址，现在应该会提示你输入密码。输入你在配置 VNC\
  \ 服务器时设置的密码（参见图 3-5）。\n\n![A978-1-4302-6266-4_3_Fig5_HTML.jpg](img/A978-1-4302-6266-4_3_Fig5_HTML.jpg)\n\
  图 3-5. 客户端上来自 VNC 服务器的密码提示\n\n如果密码被接受，你现在应该能看到一个 X11 桌面。在出现的命令窗口中，你可以开始部署 Oracle\
  \ 数据库设备。要开始部署，必须使用 `oakcli deploy` 命令。这将启动 Oracle 设备管理器 (OAM)。一旦 Oracle 设备管理器启动，你将能够配置\
  \ Oracle 网格基础设施加上自动存储管理 (ASM) 存储以及 Oracle 数据库。代码清单 3-9 展示了如何使用 `oakcli deploy` 开始部署过程。\n\
  \n代码清单 3-9. 使用 oakcli 进行部署\n\n```\n[root@oak1 ∼]# /opt/oracle/oak/bin/oakcli deploy\n\
  Log messages in /tmp/oak_1378687999949.log\nRunning Oracle Appliance Manager\n```\n\
  \n既然你已经在 Oracle 数据库设备上启动了部署，你需要熟悉 Oracle 设备管理器。在下一节中，你将了解 Oracle 设备管理器以及基础配置应选择的选项。\n\
  \n### Oracle 设备管理器与部署\n\n通过运行 `oakcli deploy` 命令，你启动了 Oracle 设备管理器的图形用户界面安装向导。Oracle\
  \ 设备管理器与其他 Oracle 安装向导非常相似。它将引导你完成配置 Oracle 数据库设备所需的各种步骤。图 3-6 显示了 Oracle 设备管理器的欢迎屏幕。\n\
  \n![A978-1-4302-6266-4_3_Fig6_HTML.jpg](img/A978-1-4302-6266-4_3_Fig6_HTML.jpg)\n\
  图 3-6. Oracle 设备管理器欢迎屏幕\n\n就像许多其他 Oracle 向导一样，Oracle 提供了一个菜单（在左侧）来帮助你在点击“下一步”按钮推进向导时进行导航。在向导的下一个屏幕中，你可以选择希望在\
  \ Oracle 数据库设备上执行的部署类型。图 3-7 展示了可供你选择的选项。表 3-7 快速描述了这些选项的含义。选择部署类型后，你可以点击“下一步”按钮继续通过向导。\n\
  \n表 3-7. 部署类型描述\n\n| 部署类型 | 描述 |\n| --- | --- |\n| 典型 | 所有 Oracle 数据库设备的默认设置 |\n\
  | 自定义 | 允许你覆盖默认设置；即，磁盘镜像设置 ASM |\n| SAP 应用 | 仅用于将运行 SAP 的设备 |\n\n![A978-1-4302-6266-4_3_Fig7_HTML.jpg](img/A978-1-4302-6266-4_3_Fig7_HTML.jpg)\n\
  图 3-7. 配置类型\n\n在向导的下一步中，你需要为 Oracle 数据库设备设置系统信息。图 3-8 展示了向导的界面。你需要选择或输入所需的信息。\n\n\
  ![A978-1-4302-6266-4_3_Fig8_HTML.jpg](img/A978-1-4302-6266-4_3_Fig8_HTML.jpg)\n\
  图 3-8. Oracle 数据库设备的系统信息\n\n在系统信息步骤中，有几点需要注意。首先，系统名称用于部署和 Oracle 数据库设备中的每个节点，节点的主机名会自动在系统名称后附加\
  \ 1 或 2。部署完成后，节点的主机名应该类似于 `ejb1` 或 `ejb2`。\n\n下一个所需的系统信息是 Oracle 数据库设备所在的区域。这是一个下拉列表，你可以在其中选择\
  \ Oracle 数据库设备运行的地理区域。在图 3-8 中，选择的区域是美洲。\n\n接下来是时区下拉菜单，它提供了一个列表供你选择 Oracle 数据库设备所在的时区。图\
  \ 3-8 显示选择了太平洋时区 (`America/Los_Angeles`)。\n\n数据库部署下拉菜单提供了一系列选项，用于在 Oracle 数据库设备上部署数据库。你可以选择部署实时应用集群\
  \ (RAC)、实时应用集群 (RAC) 单节点或企业版数据库。在图 3-8 中，选择了实时应用集群 (RAC) 选项。\n\n系统信息所需的最后一部分是 root\
  \ 密码。默认情况下，root 密码设置为 `welcome1`。在你为部署提供 root 密码后，该密码将在 Oracle 数据库设备的两个节点上被更改。此时，如果你对系统信息屏幕上提供的所有项目都满意，可以点击“下一步”继续完成向导。\n\
  \n\n\n### 网络信息屏幕\n\n当你逐步通过向导时，会进入网络信息屏幕。在这里，你需要提供所需的 IP 地址和 DNS 信息。除了 IP 地址，你还需要提供一个域名。图\
  \ 3-9 展示了填写 IP 地址和其他所需信息的复杂界面。所有信息填写完毕后，你需要核对所有地址、DNS 信息和其他项目是否正确。大多数部署失败都是由于 IP\
  \ 地址和 DNS 条目不正确造成的。\n\n![A978-1-4302-6266-4_3_Fig9_HTML.jpg](img/A978-1-4302-6266-4_3_Fig9_HTML.jpg)\n\
  \n图 3-9. 网络信息屏幕\n\n### 数据库信息屏幕\n\n部署向导的下一步是设置数据库特定选项。如图 3-10 所示，你会看到三个选项：数据库名称、数据库类和数据库语言。这三项都需要填写或选择。填写后，安装程序将知道要创建的数据库名称、数据库大小以及应使用的国家语言。\n\
