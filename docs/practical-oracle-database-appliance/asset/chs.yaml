  Plumbing the IPs now on Node 1 ...\n::::::::::::::::::::::::::::::::::::::::::::::::::\n\
  dom0.xml                                         100% 860 0.8KB/s 00:00\n```\n\n\
  现在，两台物理服务器上的 `dom0` 的公共 IP 地址已经配置完成。这使得可以通过任何 SSH 客户端访问 `dom0`。在此阶段，ODA 仅 `dom0`\
  \ 可访问；这是运行 Oracle 数据库集群所必需的特殊 ODA 数据库虚拟机模板 `ODA_BASE` 所需的平台。\n\n\n### ODA_BASE 的部署\n\
  \n要部署 `ODA_BASE`，需要通过补丁 `16985062` 从 My Oracle Support 下载模板。对于 `2.8` 版本，补丁号可能会变化；始终建议使用\
  \ My Oracle Support 说明文档 `888888.1`。文件下载后，可以移动到位于节点 0 上 Dom0 的 `/OVS` 目录中。这样就可以为部署准备模板，如清单\
  \ 10-2 所示。\n\n清单 10-2. 在 ODA X3-2 上部署 ODA_BASE\n\n```\n#cat oda_base_2.8.gz00 oda_base_2.8.gz01\
