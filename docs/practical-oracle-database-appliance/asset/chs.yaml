  \ Oracle 支持工单以解决发现的任何问题。\n\n\n### 网络组件\n\nODA 提供了公共接口和私有接口，以实现与外部世界的网络连接，以及服务器节点和集群之间通信所需的内部网络连接。虚拟化\
  \ ODA 与裸金属安装在看待网络组件的方式上存在差异。`ODA V1` 用于互联的接口有 `2x 1GbE`，用于公共连接的接口有 `2x3 1GbE`，以及一个双端口\
  \ `10GbE SFP+` 接口。`ODA X3-2` 则采用了不同的方向，全部使用 `10GbE` 端口（铜缆）。所有端口在操作系统中均设置为活动/备用模式。\n\
  \n列表 7-9 展示了在 `ODA V1` 上执行组件验证后将看到的输出。\n\n列表 7-9. 验证 ODA V1 网络组件\n\n```\n[root@oda1\
