- '# 2. 集成式远程管理


  摘要


  Oracle Database Appliance (ODA) 是包含两个服务器节点的捆绑包，其中包括存储和嵌入式集群网络。每个服务器节点都有一个集成式远程管理器
  (`ILOM`) 接口，用于管理和维护任务。本章将深入探讨什么是 `ILOM`，以及如何在数据库设备的环境中使用它。


  Oracle Database Appliance (ODA) 是包含两个服务器节点的捆绑包，其中包括存储和嵌入式集群网络。每个服务器节点都有一个集成式远程管理器
  (`ILOM`) 接口，用于管理和维护任务。本章将深入探讨什么是 `ILOM`，以及如何在数据库设备的环境中使用它。



  ## ILOM 简介


  `ILOM` 是一个服务处理器（`SP`），嵌入在所有基于 Oracle Sun 服务器的产品中。`ILOM` 的目的是为服务器提供支持，使得日常支持功能无需访问数据中心。`ILOM`
  还提供对各种诊断功能的访问，并与 Oracle 的自动服务请求（`ASR`）集成，以提供向 Oracle 报告硬件故障的呼叫-home 功能。


  Oracle `ILOM` 服务处理器提供了广泛的功能，其功能方面随着 `ILOM` 的每个版本发布而改进。`ODA V1` 和 `X3-2` 配备了不同的 `ILOM`
  版本，这是由于服务处理器本身的增强所致，但其核心，`ILOM` 允许以下操作：

  *   远程 `KVMS` 功能

  *   从镜像远程启动

  *   故障显示

  *   与各种身份验证系统的集成，如 `LDAP`（轻量目录访问协议）、`SSL`（安全套接字层）、`Radius` 和 Active Directory

  *   远程 `syslog` 设置

  *   基于 `SNMP` 和 `SMTP` 的警报

  *   环境报告

  *   系统串行控制台重定向（`LAN`）

  *   远程监控主机状态

  *   访问各种部件号和序列号


  本章将在 `ODA` 的背景下重点介绍这些功能。Oracle 套件包（`OAK`），也称为 Oracle 套件管理器，是管理安装和补丁的软件，在某些情况下，还负责收集诊断信息并将
  `ILOM` 与 `ASR` 集成。然而，理解 `ILOM` 及其执行的基本功能仍然很重要。


  图 2-1 显示了通过浏览器登录 `ILOM` 时看到的起始屏幕。该屏幕有三个主要组件。其布局在设计上与 `ODA V1` 的布局有些不同，但大多数常见功能保持不变。


  ![A978-1-4302-6266-4_2_Fig1_HTML.jpg](img/A978-1-4302-6266-4_2_Fig1_HTML.jpg)


  图 2-1.

  在 `ODA X3-2` Sun Fire `X4170 M3` 上运行的 `ILOM`


