  \n图 6-6. 添加主机状态说明\n\n要管理 Oracle 数据库设备上的数据库、监听器和自动存储管理（ASM）实例，需要在 Oracle 管理服务器和 Oracle\
  \ 数据库设备上的 Oracle Management Agents 上部署数据库插件。当通过 Oracle Enterprise Manager 部署代理时，该插件将自动部署。\n\
  \n## 总结\n\n在本章中，我们讨论了两种配置在 Oracle 数据库设备上的监控 Oracle 数据库的方法。第一种方法使用 Oracle 数据库控制。我们讨论了\
  \ Oracle 数据库控制，包括如何配置、管理和取消配置它。第二种方法使用 Oracle Enterprise Manager。我们讨论了它与 Oracle\
  \ 数据库设备的关系，如何安装管理代理使其能够监控设备，以及将其与设备一起使用时可以期待什么。\n\n### 验证\n\n我们将要查看的第一组诊断是验证。ODA\
  \ 附带了预置的验证功能，该功能随着软件的每个版本而不断发展。验证是主动诊断的第一步，应在安装时执行，然后在每次软件补丁或变更后再次执行，以确保系统按预期运行。应建立并维护一个基线，以确保一致性。根据工作负载和\
  \ ODA 上的软件版本，随着平台的成熟，实用程序中可能会内置额外的验证。\n\n验证是 OAK 命令集的一部分，可以通过 `oakcli validate`\
  \ 命令访问。`oakcli validate` 有多个部分，我们将详细查看它们。要了解 `oakcli validate` 提供了什么，我们可以先查看帮助。\n\
  \n```\n[root@oda1 bin]# ./oakcli validate -h\nUsage:\n  oakcli validate [-V | -l\
  \ | -h]\n  oakcli validate [-v] [-f absolute output_file_name] [-a | -d | -c check1[,check2]]\n\
  ARGUMENTS:\n  -v      verbose output\n  -f      output_file_name.The output is sent\
  \ to the file instead of\n          standard output\n  -a      run all checks\n\
  \  -d      run only default checks.\n  -c      check1[,check2] run specific checks\n\
  \  -l      list the checks and description\n  -V      Print the Version\n  -h      print\
  \ help\nEXAMPLES:\n  oakcli validate -l\n  oakcli validate -a\n  oakcli validate\
  \ -c DiskCalibration\n  oakcli validate -c SystemComponents,NetworkComponents,asr\n\
  ```\n\nOAK 验证检查取决于所安装的软件版本。`ODA 2.6` 增加了自动服务请求（`ASR`）验证，以确保 `ASR` 以适当的方式安装和配置。执行不带任何选项的\
  \ `validate` 命令将进行以下检查：\n\n*   系统组件\n*   操作系统磁盘存储\n*   共享存储\n*   网络组件\n*   存储拓扑（仅限\
  \ X3-2）\n\n磁盘校准和 `ASR`（`2.6` 版新增）默认不执行。存储拓扑步骤（#5）验证共享磁盘阵列和 ODA X3-2 引入的可选存储架。该步骤仅在\
  \ ODA X3-2 平台上默认执行。\n\n清单 7-1 显示了截至 `OAK 2.6` 可用的 ODA V1 验证命令的简要说明。\n\n**清单 7-1. ODA\
  \ V1 的验证选项**\n\n```\n[root@oda1 bin]# ./oakcli validate –l\nCheckname             Description\n\
  =========             ===========\n*SystemComponent      Validate system components\
  \ based on ilom sensor data readings\n*OSDiskStorage        Validate OS disks and\
  \ filesystem information\n*SharedStorage        Validate Shared storage and multipathing\
  \ information\nDiskCalibration       Check disk performance with orion\n*NetworkComponents    Validate\
  \ public and private network components\nasr                   Validate asr components\
  \ based on asr config file and ilom\n                     sensor data readings\n\
  * -- These checks are also performed as part of default checks\n```\n\n清单 7-2 显示，与前代\
