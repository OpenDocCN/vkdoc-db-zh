  \n### 目录管理\n\nTFA 团队会根据需要不断在清单中添加和删除目录。他们也提供了手动添加目录的方法。然而，除非与 Oracle 支持部门讨论过，否则不建议在\
  \ ODA 上添加目录。\n\n`add` 指令用于添加目录或主机。`TFA` 进程也很智能，以避免重复。列表 7-23 显示了一个试图添加已存在目录的示例。这个\
  \ `tfactl` 将通过不添加该目录来响应。\n\n**列表 7-23. tfactl 添加目录**\n\n```\n# tfactl  add  directory\
  \ /opt/oracle/oak/log\nNo new directories were added to TFA\n```\n\n### 诊断收集\n\n\
  `TFA` 还提供了一种手动收集诊断信息的方法，并允许根据需要修剪信息。列表 7-24 显示了收集所有诊断信息以及收集特定时间段诊断信息的示例。\n\n**列表\
  \ 7-24. tfactl 诊断收集示例**\n\n```\n### tfactl diagcollect –all\nAllows for diagcollect\
  \ to be run an zip be collected in the initiating node\n\n### tfactl diagcollect\
  \ -crs node1,node2 -since 9h\nAllows for diagcollect to be run for crs only and\
  \ zip copied to initiating node\n\n### tfactl diagcollect -for \"Jun/29/2013 21:00:10\"\
  \nCollect diagnostics for all files for all nodes and collect only for timestamp\
  \ listed.\n```\n\n### 事件触发器\n\n`TFA` 团队决定了触发诊断收集的事件。这些事件在 `TFA` 用户指南中有详细列出，可通过 MOS\
  \ Note 1513912.1 访问。列表 7-25 提供了可以触发 `tfactl` 收集的事件子集。\n\n**列表 7-25. tfactl 诊断收集事件触发器**\n\
  \n```\nSearch for:\n.*ORA-297(01|02|03|08|09|10|40).*\n\nIn Files :\nAlert Logs\
  \ - ASM and RDBMS\n\nError Description:\n29701, unable to connect to Cluster Synchronization\
  \ Service\n29702, error occurred in Cluster Group Service operation\n29703, error\
  \ occurred in global enqueue service operation\n29708, error occurred in Cluster\
  \ Synchronization Services\n29709, Communication failure with Cluster Synchronization\
  \ Services\n29710, Current operation aborted by Cluster Synchronization Services\n\
  29740, evicted by instance number %s, group incarnation %s\n29770, global enqueue\
  \ process %s (OSID %s) is hung for more than %s seconds\n```\n\n## 总结\n\n`TFA` 仍然是一个新工具，并且在持续开发中。它弥合了问题与收集之间的差距，并允许自动收集多个层面（数据库、网格/集群件）的重要事件，为\
  \ Oracle 支持部门提供所有正确的信息，这使得 `TFA` 与主动诊断库（`ADR`）有所不同。\n\n\n### 其他工具\n\n到目前为止，我们已经了解了\
  \ ODA 产品组合中的许多内置工具。后续章节还会讨论更多工具，比如 Oracle Enterprise Manager，但这里有必要提及其他一些对主动诊断 ODA\
  \ 各类问题很重要的工具。Oracle Linux 默认安装了 `anacron`，它是 `cron` 的一个变体，提供了更灵活的任务执行方式，`anacron`\
  \ 内置了多种按每日、每周或每月运行的作业。这些作业包括以下功能：\n\n*   各种文件的日志轮转\n*   一个日志监控脚本，它会检查各种日志，生成报告并通过邮件发送给\
  \ root Unix 账户。\n*   每周的 RAID 检查\n\n文件的日志轮转由 `logrotate` 守护进程处理，并使用 `logrotate.conf`\
  \ 来确定用于管理日志文件的各种配置参数。清单 7-26 展示了一个默认的 `logrotate.conf` 文件。\n\n**清单 7-26. Logrotate.conf**\n\
  \n```\nroot@farshad-linux]# cat /etc/logrotate.conf\n# see \"man logrotate\" for\
  \ details\n# rotate log files weekly\nweekly\n# keep 4 weeks worth of backlogs\n\
  rotate 4\n# create new (empty) log files after rotating old ones\ncreate\n# use\
  \ date as a suffix of the rotated file\ndateext\n# uncomment this if you want your\
  \ log files compressed\n#compress\n# RPM packages drop log rotation information\
  \ into this directory\ninclude /etc/logrotate.d\n# no packages own wtmp and btmp\
  \ -- we'll rotate them here\n/var/log/wtmp {\n    monthly\n    create 0664 root\
  \ utmp\n    minsize 1M\n    rotate 1\n}\n/var/log/btmp {\n    missingok\n    monthly\n\
  \    create 0600 root utmp\n    rotate 1\n}\n# system-specific logs may be also\
  \ be configured here.\n```\n\n日志轮转也可以通过将需要包含在日志轮转中的文件属性放入 `/etc/logrotate.d` 目录来控制。根据被轮转的日志文件类型，这些属性可以包含各种指令。清单\
  \ 7-27 提供了一个包含 `postrotate` 指令的 HTTP 服务日志文件轮转示例。\n\n**清单 7-27. Logrotate.d. Httpd**\n\
  \n```\n[root@farshad-linux logrotate.d]# vi httpd\n/var/log/httpd/*log {\n    missingok\n\
  \    notifempty\n    sharedscripts\n    delaycompress\n    postrotate\n        /sbin/service\
  \ httpd reload > /dev/null 2>/dev/null || true\n    endscript\n```\n\n`logwatch`\
  \ 是另一个工具，它提供系统每日概况。清单 7-28 提供了一个 `logwatch` 输出的示例。\n\n**清单 7-28. Logwatch**\n\n\
  ```\n:\n################### Logwatch 7.3 (03/24/06) ####################\nProcessing\
  \ Initiated: Sat Jun 29 04:02:01 2013\nDate Range Processed: yesterday\n( 2013-Jun-28\
  \ )\nPeriod is day.\nDetail Level of Output: 0\nType of Output: unformatted\nLogfiles\
  \ for Host: odax32\n##################################################################\n\
  \n--------------------- SSHD Begin ------------------------\nUsers logging in through\
  \ sshd:\n   root:\n      10.10.7.51: 1 time\n---------------------- SSHD End -------------------------\n\
  \n--------------------- Disk Space Begin ------------------------\nFilesystem  \
  \          Size  Used Avail Use% Mounted on\n/dev/mapper/VolGroupSys-LogVolRoot\n\
  \                      30G   19G  9.2G  67% /\n/dev/md0               99M   48M\
  \   47M  51% /boot\n/dev/mapper/VolGroupSys-LogVolU01\n                      97G\
  \   32G   61G  34% /u01\n/dev/mapper/VolGroupSys-LogVolOpt\n                   \
  \   59G   24G   32G  43% /opt\n---------------------- Disk Space End -------------------------\n\
  \n###################### Logwatch End #########################\n```\n\n还有一个用于验证\
  \ RAID 的脚本，每周运行以确保设备的 RAID 配置正常。清单 7-29 展示了 `raid-check` 脚本的一个片段。\n\n**清单 7-29. Raid\
  \ Check Script**\n\n```\n#!/bin/bash\n#\n# This script reads it's configuration\
  \ from /etc/sysconfig/raid-check\n# Please use that file to enable/disable this\
  \ script or to set the\n# type of check you wish performed.\n# We might be on a\
  \ kernel with no raid support at all, exit if so\n[ -f /proc/mdstat ] || exit 0\n\
  ```\n\n上面列出的所有脚本在 ODA 上默认都是启用的，但输出会使用 `mail` 工具通过电子邮件发送到内部 root 账户。要查看输出，您需要以 root\
  \ 用户身份登录设备并执行 `mail` 工具，或者按照 MOS Note 405229.1 中的描述设置邮件重定向。\n\n### 响应式检查\n\n到目前为止，本章的重点一直是主动检查。然而，问题仍可能发生，因此了解\
  \ ODA 中需要或内置的各种响应式流程非常重要。诊断是一个非常复杂的过程，因此本节无法涵盖所有形式的响应式检查，但我们会介绍一些更有用的。\n\n### 诊断信息收集\n\
  \nODA 提供了一种通过 `oakcli manage diagcollect` 命令来收集和管理各种诊断信息的简便方法。该命令可以方便地访问跨越各种 ODA、Clusterware、ASM\
  \ 和 RDBMS 日志文件，以及在多节点上的所有日志文件和诊断信息。清单 7-30 展示了如何获取该命令的帮助文本。\n\n**清单 7-30. ODA 诊断信息收集工具**\n\
  \n```\n./oakcli  manage diagcollect -h\nUsage:\n   oakcli manage diagcollect [options]\n\
  options:\n  --all                     - For collecting all diag info (Default option),\n\
  \                              excluding adr, chmos\n  --crs                   \
  \  - For collecting crs diag information\n  --patch                   - For collecting\
  \ ODA Patching logs\n...\n```\n\n诊断信息可以被裁剪，并且根据问题的类型，可以只收集或排除特定的信息。诊断数据与 TFA 配合使用可以帮助向\
  \ Oracle 提供大量信息，从而有助于快速调试和诊断问题。\n\n### 磁盘故障\n\n作为硬件操作的一部分，各种组件发生故障是非常常见的。鉴于磁盘的性质和操作因素，应始终将故障视为即将发生，这就是为什么\
  \ ODA 提供双重或三重软件镜像的原因。这种镜像允许在发生故障时不会丢失数据。\n\n诊断故障磁盘非常重要，提供正确级别的信息有助于加速磁盘的更换。清单 7-31\
  \ 展示了如何执行 `odasundiag.sh`，这是一个专门为 ODA 构建的诊断命令，以便 Oracle 工程师可以获得有关磁盘故障的相关诊断信息，并创建现场服务任务来发送更换盘或让服务工程师进行更换。\n\
  \n**清单 7-31. ODA Sun 诊断脚本**\n\n```\n### /root/Extras/odasundiag.sh\n```\n\n执行清单\
  \ 7-31 中命令生成的文件需要作为服务请求的一部分上传到 My Oracle Support。这将使支持人员能够确定问题并提供解决方案。如果解决方案是更换磁盘，可以由客户或\
  \ Oracle 的现场服务团队处理。\n\n如果设置了 ASR，它也会向 Oracle 开放一个服务请求并提供基础数据，以便开启现场服务请求来更换磁盘。\n\n\
  如果您需要更换驱动器，可以通过打开定位指示灯来简化查找故障驱动器的工作。清单 7-32 展示了定位磁盘的命令。\n\n**清单 7-32. 定位磁盘**\n\n\
  ```\n# ./oakcli locate  disk e0_pd_00 on\nDisk: e0_pd_00 and to: ON\n```\n\n执行此命令会点亮一个\
  \ LED 灯，用于确保正在移除和更换的是正确的磁盘。这对硬件工程师很有用，并确保只更换正确的部件。\n\n\n## 摘要\n\n本章重点介绍了各种主动和被动措施，以保持\
  \ `ODA` 的健康并诊断各种问题。`ODA` 旨在成为一个完全自给自足的解决方案，因此提供了内置验证、`ODA` 配置审计 `toolcheck` 和跟踪文件分析器等工具，以实现完全主动的诊断。然而，问题仍可能发生，而\
  \ `ODA` 诊断收集实用程序等工具则有助于传输和收集数据，以便更快地解决问题。`ASR` 是一个可选的实用程序，为 Oracle x86 系统（包括 `ODA`）提供自动故障检测和\
  \ SR 创建功能。\n\n脚注 1\n\nMOS 注释 1513912.1 是 `TFA` 的主注释\n\n"
- "# 8. 修补 Oracle 数据库设备\n\n摘要\n\n修补是现代 `IT` 组织当今面临的最大挑战之一。修补是一项常规任务，在支持功能性和业务请求之后，很可能耗费了支持团队的大部分精力。它需要投入大量精力来计划、验证、测试和执行修补活动。修补是一项持续进行的活动，旨在解决现有问题，并减少面临其他产品用户发现的潜在问题的风险。修补还简化了与\
  \ Oracle 支持团队协作的工作，以排查贵团队已经遇到或可能在不久的将来遇到的问题。好消息是，Oracle 数据库设备显著减少了将数据库系统保持在当前水平所需的工作量。本章将解释\
  \ Oracle 数据库设备如何应对永无止境的修补挑战，并使其资源消耗显著降低。\n\n修补是现代 `IT` 组织当今面临的最大挑战之一。修补是一项常规任务，在支持功能性和业务请求之后，很可能耗费了支持团队的大部分精力。它需要投入大量精力来计划、验证、测试和执行修补活动。修补是一项持续进行的活动，旨在解决现有问题，并减少面临其他产品用户发现的潜在问题的风险。修补还简化了与\
  \ Oracle 支持团队协作的工作，以排查贵团队已经遇到或可能在不久的将来遇到的问题。好消息是，Oracle 数据库设备显著减少了将数据库系统保持在当前水平所需的工作量。本章将解释\
  \ Oracle 数据库设备如何应对永无止境的修补挑战，并使其资源消耗显著降低。\n\n## 补丁管理简介\n\nOracle 数据库设备采用了一种非常简单实用的修补方法。单个补丁即可交付所有系统组件的更新。修补过程是自动化且完全脚本化的。只需几个命令即可修补整个系统，从内部硬盘驱动器固件开始，一直到\
  \ Oracle 数据库补丁结束。Oracle 公司每季度发布一次补丁和补丁捆绑包。这简化了您的规划过程。\n\n### 传统系统的局限性\n\n您可能会问，修补有什么特别之处？只需安装新版本的软件不就行了，对吧？要是那么简单就好了。问题在于，现代服务器是一个复杂的系统。它包含许多可单独更新的组件，从\
  \ `BIOS` 和带外管理适配器开始，一直到操作系统。此外，数据库系统不仅仅由一台服务器组成。还有其他重要的组件需要定期的软件更新，例如网络组件、内部存储、外部存储等等。存储本身可能就是一个复杂的系统。长话短说，数据库系统由十几个或更多需要定期修补的组件组成。\n\
  \n更新单个组件是一项相对简单的任务。然而，每个组件都与其他组件交互。为确保所有组件都能无问题地运行，管理员或一组管理员应验证所有组件在其当前版本级别的兼容性。带外管理适配器版本应与当前的\
  \ `BIOS` 版本兼容；磁盘和网卡驱动程序应与操作系统版本兼容，依此类推。\n\n通常，组织内的不同团队负责修补不同的系统组件。例如，存储团队负责存储组件，而网络团队维护网络组件，如集群环境中使用的交换机。系统管理团队负责操作系统修补。修补过程通常被划分为不同的阶段，在每个阶段中，每个团队独立于其他团队计划、测试和执行自己的修补工作。\n\
  \n在准备修补工作时，执行修补的团队应确保他们将要引入系统的变更不会影响其他组件，如操作系统、集群服务等。为确保兼容性和可支持性，该团队需要确保并验证他们将要安装的新版本与其他团队管理的组件兼容。仅因为需要验证复杂的相互依赖关系，规划阶段就可能耗费大量时间。这种复杂性带来了错误和随后停机的风险。\n\
  \n采用一次修补一个组件的方法，组织需要引入比能够一次性修补所有系统组件多得多的停机时间。每次修补工作都需要系统停机。每次停机都涉及组织内不同团队之间更多的协调。依赖于待修补组件的应用程序需要停止，这增加了所需的停机时间。修补完成后，系统组件需要逐一启动并进行验证。所有组件启动后，在将系统交付最终用户使用之前，还需要执行一次“冒烟”测试。所有这些步骤都增加了每个组件修补所需的停机时间。然而，如果我们能够一次性修补所有组件，那么我们将显著减少使系统保持最新状态所需的总体停机时间。\n\
  \n系统及应用测试所需的工作量也是如此。理想情况下，每个变更都应从较低的技术层开始测试，一直到应用和业务测试。与一次性修补所有组件相比，多次修补阶段需要组织内不同团队付出更多的测试工作。\n\
  \n\n\n许多 IT 团队面临的另一个挑战是，许多补丁活动涉及人工操作步骤。人工步骤会引入人为错误的空间，并使打补丁过程比原本所需的时间更长。一些组织可能决定投入时间和资源来实现补丁步骤的自动化，并使其尽可能独立于人工操作。然而，不同系统组件由不同供应商生产这一事实，使得简化补丁流程的任务颇具挑战。每个组件可能使用不同的补丁技术。对于许多组织来说，投资于补丁自动化可能在经济上不合理，因此他们选择接受并管理与手动打补丁相关的风险。\n\
  \n传统的系统补丁生命周期还存在规划方面的挑战。不同组件供应商在不同的时间点发布补丁。这种时间上缺乏协调的情况使得几乎不可能将打补丁变成一项常规的例行工作。如果所有组件供应商都能在众所周知的时间间隔内发布补丁，并且彼此同步，这将极大地简化规划。这样，组织内的\
  \ IT 团队就可以建立众所周知的补丁周期和明确的步骤。\n\n这些以及其他挑战使得现代集群数据库系统的打补丁成为一个非常复杂、耗费时间和资源的过程。这些挑战增加了整体\
  \ IT 成本并降低了效率，而现代企业要求的恰恰是相反的结果。\n\n### Oracle 数据库一体机的优势\n\n`Oracle Database Appliance`显著简化和优化了补丁流程。事实上，这是`Oracle\
  \ Database Appliance`相对于传统集群系统最有价值的优势之一。`Oracle Database Appliance`补丁按季度发布，涵盖所有系统组件，从固件一直到`Oracle\
  \ Database`软件。所谓的`一键打补丁`流程是完全自动化的，并涉及几个简单的步骤。\n\n系统由一家公司设计、组装和支持，这一事实使得将所有补丁活动合并为一组脚本成为可能。这也简化了规划。Oracle\
  \ 按季度发布`Oracle Database Appliance`补丁。一个组织可以选择其希望应用这些补丁的频率。补丁发布的可预测性及其应用，使得安排补丁周期以及相关的测试、准备、停机时间和其他活动变得容易得多。\n\
  \n补丁流程由三个阶段组成，这些阶段提供了一定程度的灵活性。例如，应用和功能团队可能决定采用六个月的补丁周期，而基础设施组仍然可以每三个月对基础设施组件打一次补丁。这种跳过交替数据库补丁的方法，如果组织认为有必要，可以减少应用测试活动。\n\
  \n## 补丁流程\n\n以下两个小节讨论`ODA`环境中补丁的总体流程。第一节给出了通常可能遇到的一般性流程。第二节特别关注`ODA`特有的三个步骤。\n\n\
  ### 一般补丁流程\n\n图 8-1 展示了`Oracle Database Appliance`一般补丁流程。它与传统的系统补丁周期没有太大区别。与任何系统一样，测试补丁应用过程是`Oracle\
  \ Database Appliance`补丁生命周期中的重要一步。你的团队应熟悉补丁流程步骤，将其记录下来，并在每次打补丁时衡量所需的停机时间。在将补丁移至生产系统之前，功能团队应在测试和开发环境中进行合理数量的测试。\n\
  \n![A978-1-4302-6266-4_8_Fig1_HTML.jpg](img/A978-1-4302-6266-4_8_Fig1_HTML.jpg)\n\
  \n图 8-1. 一般情况下的补丁流程\n\n我见过一些组织，由于预算有限和其他限制，只购买一台`Oracle Database Appliance`作为生产系统，然后在其他平台上运行测试和开发环境。虽然这是一种可能的设置，但我建议避免这种情况。这种做法的问题是，你无法在将`Oracle\
  \ Database Appliance`补丁应用到生产环境之前对其进行测试和验证。我的建议是至少购买两台`Oracle Database Appliance`，并在测试环境中测试补丁过程，然后再将其应用到生产`Oracle\
  \ Database Appliance`上。\n\n有人可能认为 Oracle 测试了所有补丁，因此没有必要进行内部补丁测试。问题是，即使是`Oracle Database\
  \ Appliance`，每个系统也可能略有不同。一些客户可能决定跳过某些补丁。一些客户可能决定稍微自定义配置。一些客户可能使用不同的网络设置。我的建议是在你的特定配置上，在测试环境中测试补丁，并尽一切努力在生产环境中以相同的方式应用该补丁。\n\
  \n\n\n### 特定 ODA 步骤\n\n图 8-2 展示了 Oracle 数据库设备的补丁步骤。其中涉及三个主要步骤。我们将在本节简要描述它们，并在后续章节中更详细地介绍。根据您的业务需求，这三个主要补丁步骤中的每一个都可以在时间上与其他步骤分开执行。\n\
  \n![A978-1-4302-6266-4_8_Fig2_HTML.jpg](img/A978-1-4302-6266-4_8_Fig2_HTML.jpg)\n\
  \n图 8-2. ODA 的补丁步骤\n\n首先对磁盘、固件、BIOS 和操作系统等系统基础设施组件进行补丁。`系统基础设施`补丁步骤需要全系统停机。在此补丁期间，所有数据库实例和`Grid\
  \ Infrastructure`进程都将停止。\n\n每个季度发布的 Oracle 数据库设备补丁包可能包含针对不同系统基础设施组件的补丁。例如，某个特定版本可能包含存储扩展器、ILOM、BIOS\
  \ 和 OVM 的补丁。如前所述，可以跳过某些补丁包。有帮助的是，每个 Oracle 数据库设备补丁包都是累积性的。ODA 客户可以跳过一个或几个补丁包。然而，在这种情况下需要打补丁的系统组件数量可能比您逐个应用补丁包时更多。停机时间可能会根据需要更新的系统组件数量而增加。\n\
  \n根据我们当前的经验，`系统基础设施`补丁的总停机时间通常在 45 到 80 分钟之间。Oracle 数据库设备的节点可能会作为 OS、OVM 或存储等组件的更新的一部分而重新启动。对于关键系统，必须在测试环境中进行试运行，以测量补丁包的总停机时间，并验证是否需要节点重启。\n\
  \n系统基础设施更新后，需要对`Grid Infrastructure`进行补丁。在撰写本文时，所有 Oracle 数据库设备补丁包都以滚动方式应用`Grid\
  \ Infrastructure`更新。这意味着在更新期间，两个节点中的一个是可用的，所有数据库服务都在另一个节点上正常运行。不涉及停机时间。\n\n下一个也是最后一个阶段是数据库升级。有几种处理此任务的选项可供选择。一些组织可能决定每隔一个季度跳过数据库补丁步骤，每六个月对数据库打一次补丁，从而在保持系统基础设施更新的同时节省应用程序测试时间。其他组织可能在应用基础设施补丁的同时对数据库打补丁。一些组织可能将基础设施更新和数据库更新分开进行。这种分离允许人们仅为了基础设施补丁而关闭整个系统，然后以滚动方式启动系统并完成剩余的更新。ODA\
  \ 提供了灵活性，允许您根据组织需求选择自己的补丁方法。\n\n## 时间安排\n\n时间安排涉及两个方面。第一个问题是多久打一次补丁。我们已经提到过，一些组织只应用每隔一个补丁包。另一个需要考虑的方面是单个补丁应用需要多长时间。如果要应用补丁，应该了解目标系统将离线多长时间。\n\
  \n### 多久打一次补丁\n\nOracle 按季度为 Oracle 数据库产品发布补丁集更新(`PSU`)和安全补丁更新(`SPU`)——`SPU`更广为人知的名称是关键补丁更新(`CPU`)。`SPU`是专注于关键问题的一组较小的更改。`PSU`包含`SPU`以及额外的修复。Oracle\
  \ 建议选择以下做法之一：\n\n*   在基础版本之上应用`SPU`，以最小化一个主版本到下一个主版本之间应用更改的量。\n*   定期实施`PSU`，以确保应用所有关键和安全修复。\n\
  \nOracle 数据库设备采用`PSU`的补丁周期。Oracle 数据库设备补丁包在`PSU`补丁发布后不久发布。值得一提的是，Oracle 数据库只是 Oracle\
  \ 数据库设备补丁包中包含的一个组件。然而，它是主要组件之一。因此，Oracle 为 ODA 采用`PSU`补丁周期非常有意义。\n\nOracle 的常规补丁发布简化了您的补丁规划并有助于灵活性。一些客户可能觉得季度补丁过于频繁，选择跳过应用一个或多个\
  \ Oracle 数据库设备补丁包。这里的重要点是，定期的补丁发布允许组织在其环境中引入定期的、已知的、有计划的补丁周期。这简化了很多事情，包括安排人力资源进行实施和测试，使补丁成为一项已知的常规工作，而不是由生产系统中的关键问题触发的一次性活动。由此产生的定期应用补丁主动保护数据库系统免受潜在危险问题和不必要停机的影响。生产环境的稳定性得到提高。\n\
  \n### 补丁需要多长时间\n\n表 8-1 让您大致了解每个补丁步骤所涉及的时间。该表还指明了给定步骤是否需要全系统停机，以及是否需要重启。表 8-1 只是一个通用指南，让您了解概况。您应该自己测量补丁时间。在将补丁应用到生产系统之前，在测试系统中测量每个阶段的补丁时间。\n\
  \n表 8-1. 各阶段停机时间估算\n\n| 阶段 | 全停机时间 | 需要重启 | 近似时间（分钟） |\n| :--- | :--- | :--- | :---\
  \ |\n| `系统基础设施` | 是 | 可能 | 45–80\\* |\n| `Grid Infrastructure` | 否（滚动升级） | 否 | 45–60\
  \ |\n| 数据库 | 否（滚动升级） | 否 | 10–20\\*\\* |\n\n\\* 取决于补丁包需要更新的组件数量\n\n\\*\\* 取决于涉及的数据库数量\n\
  \n请注意，每个补丁步骤都可以在时间上分开执行。没有必要快速连续执行所有三个步骤。数据库升级阶段具有一定的灵活性。您可以根据业务需要，在舒适的时间间隔单独执行这些步骤。\n\
  \n## ODA 补丁选项\n\n根据您的业务需求，您可以选择不同的选项。阅读以下部分以了解更多关于您的选项以及何时最适合使用它们。\n\n\n\n### 新设备\n\
  \n如果您从工厂收到一台新的 Oracle 数据库设备，它很可能并未运行最新版本的 Oracle 数据库设备软件和固件。您需要将其更新至最新的补丁级别。有两种方法可以实现：\n\
  \n*   第一个也是推荐的方法是采用与之前“更新流程”部分类似的流程。您需要按照最新 Oracle 数据库设备补丁的 `README` 文件中的步骤进行操作。¹\n\
  *   另一种方法是使用 Oracle 数据库设备的 `裸机恢复` 选项，具体描述可参考 My Oracle Support 题为“Oracle 数据库设备裸机恢复过程”的说明（文档\
  \ ID 1373599.1）。\n\n第一种方法会处理所有的系统基础设施组件。而在使用 `裸机恢复` 的情况下，在 Oracle 数据库设备上解包更新包后，您应隐式更新系统基础设施组件，如\
  \ `BIOS` 和固件。更新系统基础设施的说明将在本章后面的“执行更新”部分提供。您也可以在 `README` 文件中找到它们。\n\n> Oracle 数据库设备默认预装了一个裸机系统基础设施版本。通过重新镜像过程，您可以转换为虚拟化设置。如果您打算使用虚拟化选项，则必须使用以下\
  \ My Oracle Support 说明中的指导来重新镜像 Oracle 数据库设备：“在 Oracle 数据库设备上逐步安装虚拟化镜像”（文章 ID 1520579.1）。\n\
  \n### 默认更新选项\n\n默认更新选项是一个直接的过程，大约两小时内即可执行完成。它假设您拥有标准的 Oracle 数据库设备配置，与推荐配置的偏差极小，且停机要求较为宽松。此选项将作为下一节描述的更灵活选项的基础选项。\n\
  \n### 分时执行步骤\n\n为了将停机时间间隔缩至最短，并使您能清晰地专注于更新过程，实现更精细的控制，您可能希望将更新 `系统基础设施`、`Grid 基础设施`\
  \ 和 `RDBMS` 这三个步骤分开执行。每个步骤都可以单独执行，并且如果您需要，步骤之间可以相隔数周。\n\n这种分步执行的方法需要更多的规划和实施工作。然而，唯一需要完全系统停机的步骤是更新\
  \ `系统基础设施`。另外两个步骤（`Grid 基础设施` 和 `RDBMS`）可以通过在第二个节点进行更新时，在其中一个节点上运行服务的方式，以滚动方式执行。\n\
  \n通过分步操作，您可以确保在进行下一步之前，前一步骤已成功完成。每个步骤所需的时间比一次性完成所有步骤的默认方法要短。然而，代价是过程变得更加复杂。\n\n\
  ### 延迟更新 RDBMS\n\n根据具体情况和业务需求，您可能会决定更新某些数据库，而让同一设备上的其他数据库保持先前版本运行。\n\n标准的 `ODA`\
  \ 升级选项是基于每个 `Oracle 主目录` 进行的。属于特定 `Oracle 主目录` 的所有数据库将同时升级。Oracle 数据库设备也支持多个 `Oracle\
  \ 主目录`——您可以根据需要和资源情况拥有任意数量的 `Oracle 主目录`。Oracle 数据库设备目前支持 `11.2.0.2` 和 `11.2.0.3`\
  \ 版本的 `Oracle 主目录`。每个 Oracle 数据库设备捆绑包更新都会升级 Oracle 数据库版本的第五位版本号。例如，从 Oracle 数据库设备捆绑包\
  \ `2.6` 升级到 `2.7`，就是从 Oracle 数据库版本 `11.2.0.3.6` 升级到 `11.2.0.3.7`。\n\n如果您想逐个更新数据库，有两种可用选项。第一种是为每个数据库配置运行在独立的\
  \ `Oracle 主目录` 中。这样，在更新过程中，您可以指定要更新的 `Oracle 主目录` 和关联的数据库。如果有多个数据库运行在同一个 `Oracle\
  \ 主目录` 下，您需要通过创建额外的 `Oracle 主目录` 副本，并将这些数据库从原始 `Oracle 主目录` 移动到新建的独立 `Oracle 主目录`\
  \ 中来分离它们。在以下示例中，我们创建额外的 `Oracle 主目录`，并将两个数据库移动到新建的独立 `Oracle 主目录` 中启动：\n\n```\n\
  ### 在 2.6 版本上\n### 显示所有当前 Oracle 主目录\noakcli show dbhomes –detail\n### 创建一个新的 Oracle\
  \ 主目录\noakcli create dbhome -version 11.2.0.3.6\noakcli show dbhomes –detail\n###\
  \ 重新配置一个数据库，使其从新的 Oracle 主目录运行\nsrvctl modify database -d DOG -o /u01/app/oracle/product/11.2.0.3/dbhome_2\n\
  ### 重启数据库\nsrvctl stop database -d DOG\nsrvctl start database -d DOG\noakcli create\
  \ dbhome -version 11.2.0.3.6\nsrvctl modify database -d CAT -o /u01/app/oracle/product/11.2.0.3/dbhome_3\n\
  srvctl stop database -d CAT\nsrvctl start database -d CAT\n```\n\n另一种选择是手动更新数据库。在这种情况下，您只需要两个\
  \ `Oracle 主目录`。一个用于数据库引擎的源版本，另一个用于目标版本。此外，您需要自己执行所有更新步骤，并且也需要自己在 `Oracle 主目录` 之间移动数据库。涉及以下步骤：\n\
  \n1.  为 `RDBMS` 的新版本创建一个 `Oracle 主目录`。\n2.  停止您正在更新的数据库。\n3.  重新配置数据库，使其从新建的 `Oracle\
  \ 主目录` 启动。\n4.  启动数据库并运行升级步骤。\n5.  将数据库交付给用户使用。\n\n这种手动方法不需要您为每个数据库创建单独的 `Oracle\
  \ 主目录`。您可以仅使用两个 `Oracle 主目录` 来更新所有数据库。然而，与之前展示的第一种方法相比，这种方法需要更多的手动步骤。您将使用传统的数据库升级步骤，就像处理常规\
  \ Oracle 系统一样，从而失去了 Oracle 数据库设备提供的自动数据库升级功能。\n\n### 使用 Data Guard 最小化停机时间\n\n如果您的业务要求尽可能短的停机时间，可以考虑使用\
  \ `Data Guard` 配置中的额外 Oracle 数据库设备。这种方法可以避免与 `系统` 和 `Grid 基础设施` 更新相关的停机。过程如下：\n\n\
  1.  在主用和备用 Oracle 数据库设备之间建立备用数据库配置²。\n2.  在备用/辅助 Oracle 数据库设备上停止重做日志应用进程。\n3.  更新备用\
  \ Oracle 数据库设备的 `系统` 和 `Grid 基础设施` 组件。\n4.  暂时不更新备用数据库的 `Oracle 主目录`。相反，重新建立重做日志应用进程。\n\
  5.  将您的应用程序切换到使用辅助 Oracle 数据库设备，从而切换到备用数据库。此时，主用 Oracle 数据库设备可以离线以更新基础设施组件。\n6.\
  \  使用滚动更新方法将您的数据库更新到最新版本。这样，只需很短的切换时间，应用程序需要从主设备重新指向辅助设备。与基础设施更新活动相关的应用程序停机时间为零。\n\
  \n如上所述使用 `Data Guard` 需要在规划、准备和实施方面付出更多努力。然而，与以常规方式执行 `Grid 基础设施` 和数据库更新步骤所需的数小时停机时间和受限模式操作相比，`Data\
  \ Guard` 方法提供了最小的切换时间。\n\n\n\n## 虚拟 Oracle 数据库设备\n\n我们不会花太多时间讨论这里的虚拟机选项。然而，值得注意的是，从打补丁的角度来看，虚拟机环境并没有太大不同。在系统基础设施打补丁阶段，只需要额外处理一个组件，那就是\
  \ Oracle VM Server。\n\n如果某个补丁包提供了 Oracle VM Server 补丁，那么必须停止所有虚拟机，对主 Oracle VM Server\
  \ 主机的操作系统进行打补丁，然后重新启动整个服务器。\n\n与任何打补丁操作一样，你应该花时间仔细阅读补丁包的 README 文件，以确保完成与虚拟机配置相关的所有额外步骤。一些早期的补丁包附带了针对虚拟机配置的特定打补丁活动说明。\n\
  \n另一件重要的事情是，所有的打补丁活动——例如，补丁暂存、解压、应用等等——都必须在所谓的 Oracle Database Appliance 基础虚拟机内执行。Oracle\
  \ 工程师精心设计虚拟机补丁，以确保它们可以在虚拟机运行时成功应用，然后再重新启动 Oracle VM Server。\n\n我刚刚提到的这两点，是裸金属打补丁过程与虚拟机配置打补丁过程之间唯一重要的区别。请记住，无论在哪种配置中，系统在系统基础设施打补丁阶段都需要一小段完全停机时间。因此，在这方面没有显著差异。虚拟机选项可能比裸金属选项多需要大约十分钟的停机时间，因为\
  \ Oracle VM Server 是一个必须打补丁的额外元素。\n\n## 准备工作\n\n打补丁过程的第一步是准备。除非你喜欢通宵工作，否则这是一个重要的步骤。不要敷衍了事。除了与传统系统打补丁相关的常规活动外，在\
  \ ODA 打补丁过程的规划部分，以下是一些需要检查和执行的事项。\n\n### 验证发布级别\n\n在将 Oracle Database Appliance\
  \ 更新到最新版本之前，你应该确保知道当前运行的版本。最简单的方法是执行一个 `oakcli` 命令，如下所示：\n\n```\n[root@s1 ∼]# oakcli\
  \ show version\n\nVersion\n-------\n2.6.0.0.0\n```\n\nOracle Database Appliance\
  \ 由十几个不同的软件组件组成。虽然你可以使用每个组件的接口来找出其当前版本，但要找出所有组件版本的最简单方法是使用带有 `-details` 开关的 `oakcli`\
  \ 命令，如下所示：\n\n```\n[root@s1 ∼]# oakcli show version -detail\n\nReading the metadata.\
  \ It takes a while...\nSystem Version Component Name            Installed Version\
  \          Supported Version\n--------------  ---------------           ------------------\
  \        -----------------\n2.6.0.0.0\n                Controller              \
  \  11.05.02.00               Up-to-date\n                Expander              \
  \    0342                      Up-to-date\n                SSD_SHARED          \
  \      E12B                      Up-to-date\n                HDD_LOCAL         \
  \        SA03                      Up-to-date\n                HDD_SHARED      \
  \          0B25                      Up-to-date\n                ILOM          \
  \            3.0.16.22.b r78329        No-update\n                BIOS         \
  \             12010310                  No-update\n                IPMI        \
  \              1.8.10.5                  Up-to-date\n                HMP       \
  \                2.2.6.1                   Up-to-date\n                OAK     \
  \                  2.6.0.0.0                 Up-to-date\n                OEL   \
  \                    5.8                       Up-to-date\n                OVM \
  \                      3.1.1                     Up-to-date\n                TFA\
  \                       2.5.1.4                   Up-to-date\n                GI_HOME\
  \                   11.2.0.3.6(16056266,      Up-to-date\n                     \
  \                       16083653)\n                DB_HOME                   11.2.0.3.6(16056266,\
  \      Up-to-date\n                                            16083653)\n     \
  \           ASR                       Unknown                   4.4\n[root@s1 ∼]#\n\
  ```\n\n### 审阅补丁说明\n\n在开始下载补丁之前，最好审阅相关说明，了解已知问题的信息。对于像 Oracle Database Appliance\
  \ 这样相对较新的产品来说，这一点尤其重要。对于某些版本，有一些特定的步骤需要完成。这些步骤可能会有变动，因此本章提供的打补丁说明仅供参考。你应该通过阅读补丁包的说明来确认这些说明。\n\
  \nMy Oracle Support 说明“Oracle Database Appliance - 2.X Supported Versions & Known\
  \ Issues (Doc ID 888888.1)”是一个很好的起点。该说明包含了与打补丁相关的有用信息，从“Latest Releases”部分开始，你在其中可以找到最新可用补丁和版本的引用。该说明以“Known\
  \ Issues”部分结束——阅读这部分也非常重要。\n\n审阅“Known Issues”部分，如果任何已知问题影响到你的配置，请做笔记。同一个说明会指引你找到最新的可用补丁包。寻找名称为“ORACLE\
  \ DATABASE APPLIANCE PATCH BUNDLE”的补丁。在 2.7 版本中，该补丁包是“Oracle Database Appliance\
  \ Patch 2.7.0.0.0 Patch 16760967.” 图 8-3 显示了该补丁包在说明中是如何提及的。\n\n![A978-1-4302-6266-4_8_Fig3_HTML.jpg](img/A978-1-4302-6266-4_8_Fig3_HTML.jpg)\n\
  \n图 8-3.\n\n补丁说明“Latest Release”部分中列出的补丁包\n\n在下载补丁之前，请研究随附的 README，并密切关注适用于你配置的主要安装步骤以及“Known\
  \ Issues”部分。记录问题及任何相关的纠正措施。\n\n让我举一个例子说明为什么阅读已知问题列表如此重要。有一个已知问题是，如果 Oracle Database\
  \ Appliance 的一个硬盘驱动器被更换，ASM 可能无法成功启动。这影响到运行 ODA 2.5 之前版本的设备。如果你的系统受影响，请联系 Oracle\
  \ Support 以获取修复程序。你的系统可能不受这个特定问题的影响。然而，还有其他几个问题可能适用于你的配置。在开始实际的打补丁过程之前做好这项准备工作很重要——除非，你确实喜欢在第二天早上老板进办公室之前，惊慌失措地通宵修复损坏的系统。\n\
  \n### 下载补丁包集\n\n下载补丁的 zip 文件时，你可能希望使用你的工作站作为暂存点；或者从可以直接访问 My Oracle Support 的暂存服务器下载。如果可以从\
  \ Oracle Database Appliance 节点直接访问 My Oracle Support，那么你可以使用 `wget` 命令将补丁文件直接下载到\
  \ Oracle Database Appliance。\n\n将文件复制到两个 Oracle Database Appliance 节点上的一个目录中。没有必须使用的特定目录；只需使用符合你组织实践的目录，或者根据你的个人喜好选择一个。在解压阶段，更新补丁会被提取并存储在特定的目录结构下。根据根文件系统中的可用空间，在\
  \ `/tmp` 目录中暂存补丁文件可能不切实际（正如一些补丁包的 README 中所建议的那样）。在我们接下来的示例中，我们使用 `/u01/patch_stage/2.7/`\
  \ 目录。\n\n\n\n## 解压补丁包集合\n\n接下来的步骤是让 Oracle Appliance Kit (OAK) 识别补丁包提供的更新，并将其解压到\
  \ `/opt/oracle/oak/pkgrepos/` 文件系统下。请以 `root` 用户身份在每个 Oracle Database Appliance\
  \ 节点上执行 `unpack` 命令。以下命令是一个示例（请注意命令可能会有变更，因此应始终参考补丁的 README 文件以获取正确的语法）：\n\n```\n\
  oakcli unpack -package /u01/patch_stage/2.7/p16760967_27000_Linux-x86-64.zip\n```\n\
  \n## 浏览更新仓库\n\n`unpack` 命令从补丁包文件中提取所有更新，并将其放置在 OAK 仓库 `/opt/oracle/oak/pkgrepos/`\
  \ 下。您可以通过列出目录内容来浏览仓库。要了解仓库中有哪些 Oracle DB 软件版本可用，您可以使用以下命令：\n\n```\n[root@s1 DB]#\
  \ cd /opt/oracle/oak/pkgrepos/orapkgs/DB\n[root@s1 DB]# ls -l\ntotal 16\ndrwxrwxrwx\
  \ 3 root root 4096 Sep  1 13:20 11.2.0.2.10\ndrwxrwxrwx 4 root root 4096 Aug 31\
  \ 14:09 11.2.0.2.11\ndrwxr-xr-x 3 root root 4096 Apr 24 09:57 11.2.0.3.6\ndrwxrwxrwx\
  \ 4 root root 4096 Aug 21 16:16 11.2.0.3.7\n[root@s1 DB]#\n```\n\n或者，执行以下命令列出仓库中存储的补丁组件（及其版本）：\n\
  \n```\n[root@s1 ∼]# tree /opt/oracle/oak/pkgrepos/ -L 3\n/opt/oracle/oak/pkgrepos/\n\
  |-- System\n|   |-- 2.6.0.0.0\n|   |   |-- bin\n|   |   |-- conf\n|   |   `-- prereqs\n\
  |   |-- 2.7.0.0.0\n|   |   |-- bin\n|   |   |-- conf\n|   |   `-- prereqs\n|   |--\
  \ VERSION\n|   `-- system_repos_metadata.xml\n|-- orapkgs\n|   |-- ASR\n|   |  \
  \ |-- 4.4\n|   |   `-- 4.4.1\n|   |-- DB\n|   |   |-- 11.2.0.2.10\n|   |   |-- 11.2.0.2.11\n\
  |   |   |-- 11.2.0.3.6\n|   |   `-- 11.2.0.3.7\n|   |-- GI\n|   |   |-- 11.2.0.3.6\n\
  |   |   `-- 11.2.0.3.7\n|   |-- HMP\n|   |   |-- 2.2.6\n|   |   `-- 2.2.6.2\n| \
  \  |-- IPMI\n|   |   `-- 1.8.10.5\n|   |-- OAK\n|   |   |-- 2.6.0.0.0\n|   |   `--\
  \ 2.7.0.0.0\n|   |-- OEL\n|   |   `-- 5.9\n|   |-- OPATCH\n|   |   `-- 11.2.0.3.0\n\
  |   |-- OVS\n|   |   `-- 2.7.0.0.0\n|   `-- TFA\n|       |-- 2.5.1.4\n|       `--\
  \ 2.5.1.5\n|-- rpms\n|   |-- db4-4.3.29-10.el5_5.2.i386.rpm\n|   |-- gdbm-1.8.0-28.el5.i386.rpm\n\
  |   |-- libXi-1.0.1-4.el5_4.x86_64.rpm\n|   |-- libXp-1.0.0-8.1.el5.x86_64.rpm\n\
  |   |-- libstdc++-devel-4.1.2-54.el5.i386.rpm\n|   |-- screen-4.0.3-4.el5.x86_64.rpm\n\
  |   `-- screenlog.0\n`-- thirdpartypkgs\n    `-- Firmware\n        |-- Controller\n\
  \        |-- Disk\n        |-- Expander\n        `-- Ilom\n45 directories, 9 files\n\
  [root@s1 ∼]#\n```\n\n`/opt/oracle/oak/pkgrepos/System/` 目录包含描述仓库内容的元数据文件。`system_repos_metadata.xml`\
  \ 文件是一个 XML 文件，其中包含所有已暂存补丁的引用。`VERSION` 文件包含当前的 Oracle Database Appliance 版本号。在系统目录下，每个\
  \ Oracle Database Appliance 补丁包都有一个子目录。例如，有名为 `2.6.0.0.0`、`2.7.0.0.0` 等的子目录。每个补丁包目录包含描述特定补丁及其在仓库中位置的文件。\n\
  \n还有一个 `conf/patch_metadata.txt` 文件，其中包含对所有更新的引用。以下是该文件中的一些记录示例：\n\n```\n...\nGI_PATCHES=16742216\n\
  GI_PATCH_DIR=$OAK_REPOS_HOME/pkgrepos/orapkgs/GI/11.2.0.3.7/Patches\nDB_PATCHES=16742216\n\
  DB_PATCH_DIR=$OAK_REPOS_HOME/pkgrepos/orapkgs/DB/11.2.0.3.7/Patches\n...\n```\n\n\
  您不应手动删除、复制或调整仓库中的文件。应使用 OAK 实用程序来管理文件。然而，了解这些细节是有用的。在应用补丁期间出现问题时，刚才描述的细节可能有助于故障排除。\n\
  \n## 验证目标版本\n\n在每个节点上将补丁包解压到更新仓库后，可以相对轻松地获取将被该补丁更新的 Oracle Database Appliance 组件的列表。指定补丁目标版本，发出以下\
  \ OAK 命令：\n\n```\n[root@s1 2.7]# /opt/oracle/oak/bin/oakcli update -patch  2.7.0.0.0\
  \ --verify\nINFO: 2013-08-18 16:41:40: Reading metadata . It takes a while...\n\
  WARNING: 2013-08-18 16:41:50: exceptions.IndexError:list index out of range\n  \
  \              Component Name            Installed Version          Proposed Patch\
