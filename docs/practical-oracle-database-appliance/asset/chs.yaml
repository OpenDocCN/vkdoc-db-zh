  \n### 完成屏幕\n\n部署完成后，Oracle Appliance Manager 将切换到完成屏幕（参见图 3-13）。此时，你可以点击 Close 按钮退出\
  \ Oracle Appliance Manager。\n\n![A978-1-4302-6266-4_3_Fig13_HTML.jpg](img/A978-1-4302-6266-4_3_Fig13_HTML.jpg)\n\
  \n图 3-13. 完成屏幕\n\n注意\n\n有时会遗漏某些项目导致部署失败。最常见的遗漏项是 DNS 条目或重复的 IP 地址。部署运行时，每个步骤都会报告其状态。如果某个步骤失败，请查看\
  \ `/opt/oracle/oak/onecmd/tmp/` 中的日志文件。\n\n\n\n### Oracle 数据库设备重新部署\n\n有时您需要将基础镜像重新部署到\
