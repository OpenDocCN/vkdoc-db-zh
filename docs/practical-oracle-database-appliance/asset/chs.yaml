  \ 1 |\n| 5 | 系统指示灯和定位灯 |\n| 6 | 集群互连，`eth0`和`eth1` |\n| 7 | SAS 卡 0 |\n| 8 | SAS\
  \ 卡 1 |\n| 9 | `ILOM`端口，10/100BASE-T |\n| 10 | `ILOM`串行端口 |\n| 11 | 10GBASE-T，`eth2`\
  \ `bond0` |\n| 12 | 10GBASET，`eth3` `bond0` |\n| 13 | 10GBASET，`eth4` `bond1` |\n\
  | 14 | 10GBASET，`eth5` `bond1` |\n| 15 | `USB`端口 |\n| 16 | `VGA`端口 |\n\n![A978-1-4302-6266-4_3_Fig2_HTML.jpg](img/A978-1-4302-6266-4_3_Fig2_HTML.jpg)\n\
