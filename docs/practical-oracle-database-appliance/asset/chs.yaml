- "# 12. Oracle Enterprise Manager 与 ODA\n\n## 摘要\n\nOracle Enterprise Manager Cloud\
  \ Control 12c（以下简称 `EM12c`）是 Oracle 公司用于 Oracle 和非 Oracle 技术的最新端到端管理工具。以前称为 Oracle\
  \ Enterprise Manager (`OEM`) 或 Oracle Enterprise Manager Grid Control，该工具已存在相当长一段时间。然而，12c\
  \ 版本是一个里程碑式的版本，其功能的广度和深度都取得了巨大进步。在许多方面，这个版本使 Enterprise Manager 从一个数据库管理员的监控工具，转变为可用于管理整个\
  \ Oracle 数据中心的工具。\n\n在您理解 `EM12c` 如何在 ODA 环境中使用之前，您需要真正了解 `EM12c` 的基本架构，因此让我们首先为您介绍\
  \ `EM12c` 的基本架构。\n\n## 架构概览\n\n从架构角度来看，`EM12c` 由五个主要部分组成：\n\n*   Cloud Control 控制台\n\
  *   Oracle Management 代理\n*   Oracle Management Service\n*   Oracle Management Repository\n\
  *   插件\n\n让我们更详细地看看每一个部分。\n\n**注意**  \n关于 `EM12c` 许可的讨论超出了本书的范围。（完整的许可文档可在 Enterprise\
  \ Manager 文档中获取：[`http://docs.oracle.com/cd/E24628_01/license.121/e24474/toc.htm`](http://docs.oracle.com/cd/E24628_01/license.121/e24474/toc.htm)。）然而，值得注意的是，一般来说，这里描述的大多数基本功能都附带受限使用许可，因此是免费的。此受限使用许可特指\
  \ Enterprise Manager，但许多附加选项确实涉及许可费用。完整详情请参阅许可文档。\n\n### Cloud Control 控制台\n\nCloud\
  \ Control 控制台提供了用于访问、监控和管理计算环境的用户界面。该控制台通过 Web 浏览器访问，因此允许您从任何位置访问中央控制台。您可以比以往版本更多地自定义\
  \ `EM12c` 控制台，允许您进行以下选择：\n\n*   从各种预定义页面中选择您的主页（或者将任何您想要的页面设置为您的个人主页）\n*   在目标主页上移动区域\n\
  *   添加可能比默认区域更让您感兴趣的区域\n*   删除您不感兴趣的区域\n\n图形用户界面 (`GUI`) 提供了您最近访问过的目标的历史记录（标准浏览器历史记录也可用）。此外，您可以将页面标记为收藏夹，它们会出现在新的基于菜单的界面的收藏夹列表中。图\
  \ 12-1 显示了默认主页的示例。\n\n![A978-1-4302-6266-4_12_Fig1_HTML.jpg](img/A978-1-4302-6266-4_12_Fig1_HTML.jpg)\n\
  \n图 12-1. EM12c 中的新默认主页\n\n\n### Oracle Management Agents\n\n一个 Oracle Management\
  \ Agent（通常简称为 agent 或缩写为 `OMA`）通常安装在您计算环境中被监控的每台主机上。（`EM12c` 还引入了在某些情况下远程管理环境的能力。）这些代理从控制台（参见图\
  \ 12-2）部署，然后监控所有由代理发现的目标。它们用于控制这些目标的禁用期、执行作业、收集指标等，进而将可用性、指标和作业状态等详细信息反馈给 `Oracle\
  \ Management Service`。\n\n![A978-1-4302-6266-4_12_Fig2_HTML.jpg](img/A978-1-4302-6266-4_12_Fig2_HTML.jpg)\n\
  *图 12-2. 在 `EM12c` 中管理代理的用户界面*\n\n对于 `EM12c` 版本，代理被完全重写，以实现更高的可靠性、可用性和性能（有关如何实现的详细信息，请参阅后面关于插件的章节）。这一改变的唯一缺点是，您必须使用\
  \ `EM12c` 代理来与 `EM12c Oracle Management Service` 通信。由于新版本中进行了大量更改，`12c` 与早期代理之间的向后兼容性丧失了。\n\
  \n### Oracle Management Service\n\n`Oracle Management Service` (`OMS`) 是一个基于 Web\
  \ 的应用程序，它与代理和 `Oracle Management Repository` 通信，以收集和存储有关各个代理上所有目标的信息。（请注意，信息本身存储在\
  \ `Oracle Management Repository` 中，而不是 `OMS` 中。）`OMS` 还负责呈现控制台的用户界面。\n\n`OMS` 被安装到一个\
  \ `Oracle middleware home` 中，该目录还包含 `Oracle WebLogic Server`（包括 `WebLogic Server`\
  \ 管理控制台）、用于中间层的 `Oracle Management agent`、管理服务实例基目录、`Java Development Kit` (`JDK`)\
  \ 以及其他配置文件。如果存在现有的 `WebLogic Server` (`WLS`) 配置，您可以将 `OMS` 安装到其中，但通常从可用性角度考虑，最好将其安装在专用的\
  \ `WLS` 主目录中。\n\n### Oracle Management Repository\n\n`Oracle Management Repository`（也称为存储库或\
  \ `OMR`）是一个 `Oracle database`，用于存储由各个管理代理收集的所有信息。它由数据库用户、表空间、表、视图、索引、包、过程和数据库作业组成。\n\
  \n与 `OMS` 不同，`OMR` 的安装过程要求数据库已为存储库存在。这意味着您需要在安装 `OMS` 之前，在环境中的某处创建数据库。同样，通常建议在专用数据库中创建存储库。\n\
  \n### Plug-ins\n\n在 `EM12c` 中，插件具有了全新的含义。在早期版本中，插件主要是用于监控和管理非 Oracle（异构）软件（包括数据库和中间件）的系统监控实用程序。通常由合作伙伴或\
  \ Oracle 公司本身构建。一些技术娴熟的客户也构建了自己的插件，但总体数量不多。\n\n在 `EM12c` 版本中，保留了一些此类监控插件，但插件已大大扩展，涵盖了被管理的每种目标类型。因此，现在有用于管理\
  \ `Oracle databases` 的 `Oracle database plug-in`，用于管理 Oracle 中间件的 `Fusion Middleware\
  \ plug-in`，用于管理 Oracle 应用程序的 `Fusion Application plug-in`，等等。由于 Oracle 软件的新版本将包含用于管理该软件的插件，这意味着\
  \ `EM12c`（及更高版本）将能够比过去更快地监控和管理这些版本。插件可以使用从 `Cloud Control` 控制台提供的新 `Self Update`\
  \ 功能（如果您拥有使用它的足够权限）来下载、应用和部署。\n\n此外，这种模块化插件架构意味着代理不再被配置为能够监控任何目标类型。现在，代理只会下载其监控目标所需的插件。这意味着代理本身比之前版本中的要小。这一变化是\
  \ `EM12c` 版本架构中最大的改进之一。\n\n以上就是您需要理解的基本架构。现在让我们看看如何使用 `EM12c` 来管理 `ODA` 环境。当然，为此您需要做的第一件事就是安装一个代理。\n\
  \n### Agent Installation\n\n在 `ODA` 机器上安装代理与在其他任何机器上安装代理并没有太大不同。首先，您需要添加主机，然后发现主机上可用的目标。在此示例中，我将引导您在从\
  \ `Enterprise Manager Cloud Control 12c` 中的双节点 `ODA` 上安装代理软件。\n\n## Adding the Hosts\n\
  \n要添加主机，请启动 `Enterprise Manager Cloud Control 12c` 并选择 **设置 ➤ 添加目标 ➤ 手动添加目标**。如图\
