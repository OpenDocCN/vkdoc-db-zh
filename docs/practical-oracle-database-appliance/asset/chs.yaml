  \ 数据库设备。借助 Oracle 数据库设备内置的自动化功能，这是一项简单的任务，可以在几小时内完成。在开始之前，您需要最终确定一些先决条件。\n\n## 网络和电源连接\n\
  \nODA 已为高可用性网络访问（主网络和辅助网络）预配置。这些网络绑定在安装镜像中已预配置，使安装快速而简单。Oracle 数据库设备有两种版本：原始型号和\
  \ X3-2。它们在网络方面略有不同。原始 Oracle 数据库设备有 12 个 1000BASE-T 以太网端口，并可通过四个 SFP 光纤连接提供 10G\
  \ 以太网。X3-2 型号则配备 8 个 10GBaseT 端口，支持高达 10Gbit 的连接速度。\n\n\n\n### 原始 ODA\n\n第一代 Oracle\
  \ 数据库一体机机箱内集成了两个计算节点。每台服务器拥有四组绑定的以太网端口。默认情况下，`bond0`用于公共流量，而`bond1`、`bond2`和`xbond0`用于辅助访问，这将在第\
  \ 6 章中更详细地介绍。在安装 Oracle 数据库一体机之前，请将两根线缆连接到`eth2`和`eth3`端口。通常，这些端口会连接到数据中心内独立的交换机以实现容错。绑定的默认配置会在两个端口之间进行流量负载均衡，这意味着绑定能够自动从单个网络路径故障中恢复。在图\
  \ 3-1 和表 3-1 中，您将看到 Oracle 数据库一体机的详细示意图，以及图中编号注释的说明。\n\n表 3-1. 图 3-1 中高亮连接的描述\n\n\
  | 注释编号 | 描述 |\n| --- | --- |\n| 1 | `C13`电源连接器，两个节点共享的电源总线 |\n| 2 | 从右至左依次为节点 0\
  \ 的`eth4`、`eth5`、`eth6`和`eth7`；`eth4`和`eth5`构成`bond1`，`eth6`和`eth7`构成`bond2` |\n\
  | 3 | 节点 0 的`eth8`和`eth9`的 10BaseT SFP 端口，配置为`xbond0` |\n| 4 | 节点 0 的`ILOM`串行端口\
  \ |\n| 5 | `eth2`和`eth3`，`bond0`用于公共网络访问 |\n| 6 | `ILOM` 10/100 BaseT 端口 |\n| 7\
  \ | `USB`和`VGA`端口 |\n| 8 | 节点 0 |\n| 9 | 节点 1 |\n\n![A978-1-4302-6266-4_3_Fig1_HTML.jpg](img/A978-1-4302-6266-4_3_Fig1_HTML.jpg)\n\
  图 3-1. 原始 ODA 背面的网络及其他连接\n\n### ODA X3-2\n\n第二代 Oracle 数据库一体机使用两台 X3 服务器作为计算节点。每台服务器拥有两组绑定的以太网端口。默认情况下，`bond0`用于公共流量，`bond1`用于辅助访问，这将在第\
  \ 6 章中详细说明。在安装 Oracle 数据库一体机之前，请将两根线缆连接到`eth2`和`eth3`端口。通常，这些端口会连接到数据中心内独立的交换机以实现容错。绑定的默认配置会在两个端口之间进行流量负载均衡，自动从单个网络路径故障中恢复。图\
  \ 3-2 和表 3-2 图解并详细说明了 X3-2 Oracle 数据库一体机背面的连接。\n\n表 3-2. 图 3-2 中高亮连接的描述\n\n| 注释编号\
