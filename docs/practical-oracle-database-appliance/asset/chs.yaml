  ```\n\n以太网设备在绑定方面的命名约定在虚拟化模型和裸金属模型之间有所不同。在 `ODA V1` 中，`xbond0` 是 `10GbE` 接口的总称，而\
  \ `bond0` 到 `bond2` 代表 `1GbE` 接口。`ODA X3-2` 放弃了 `xbond` 与 `bond` 的命名约定，因为所有端口，包括互联端口，都是支持铜缆的\
  \ `10GbE` 端口。列表 7-10 展示了其配置外观。检测到的活动链路将显示交换机允许该端口达到的实际速度——不是该端口理论上能达到的速度，而是它当前实际达到的速度。在列表\
  \ 7-10 中，为 `eth2` 到 `eth5` 提供服务的交换机只支持 `1GbE`，这也正是所显示的内容。\n\n列表 7-10. 验证 ODA X3-2\
  \ 网络组件\n\n```\n[root@odax32 bin]# ./oakcli validate -c NetworkComponents\nINFO:\
  \ Doing oak network checks\nRESULT: Detected active link for interface eth0 with\
  \ link speed 10000Mb/s\nRESULT: Detected active link for interface eth1 with link\
