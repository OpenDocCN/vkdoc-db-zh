- "# 7. 诊断 Oracle 数据库设备\n\n## 摘要\n\nOracle 数据库设备（ODA）是一个自给自足的设备，并且已采取各种检查和平衡措施，以确保设备及其上驻留的数据库能够最佳运行。理解设备本身内置的诊断能力并根据需要应用它们来解决各种简单和复杂的活动至关重要。\n\
  \nOracle 数据库设备（ODA）是一个自给自足的设备，并且已采取各种检查和平衡措施，以确保设备及其上驻留的数据库能够最佳运行。理解设备本身内置的诊断能力并根据需要应用它们来解决各种简单和复杂的活动至关重要。\n\
  \nODA 至今已有两代硬件迭代和多个软件迭代，以改进和添加各种功能。ODA 软件更新汇集了许多诊断能力。其中一些已添加到标准 Oracle 设备工具包（OAK）命令集中，而其他则可通过预装工具以及硬件和操作系统中的功能访问。我们将在本章中探讨裸机设备安装诊断。虚拟化诊断将在第\
  \ 10 章中介绍。\n\nODA 诊断可以从两个方面考虑：\n\n*   主动\n*   被动\n\n本章将探讨 ODA 管理团队可用于理解和调试各种问题的各种技术。数据库相关诊断不在本书范围内，所有标准的数据库监控和诊断技术仍然适用于在\
  \ ODA 上运行的数据库。\n\n## 主动诊断\n\nODA 是一台服务器，因此，在设备上处理和执行各种功能时必须非常小心。有多种方法可以主动确保 ODA\
  \ 的性能满足客户的要求。Oracle 提供了一组嵌入在 OAK 框架中的一键式实用程序。OAK 提供了一套完整的实用程序，允许用户执行从部署到诊断的各种活动。本书各章节对此进行了详细讨论。\n\
  \n在填写主机和平台信息后，您将被带到如图 6-4 所示的安装详细信息页面。在此页面上，您需要添加与您正在添加的主机相关的具体信息。您正在添加一个 Oracle\
  \ 数据库设备；两台主机上的基本安装目录将相同。应填写所有其他安装详细信息；如果未填写，请提供必要的信息。命名凭证选项需要填充现有凭证，或通过单击加号（+）按钮创建新凭证。一旦提供了所有安装详细信息，就可以继续安装\
  \ Oracle Management Agent。图 6-4 说明了填写后的安装详细信息应如何显示。\n\n![A978-1-4302-6266-4_6_Fig4_HTML.jpg](img/A978-1-4302-6266-4_6_Fig4_HTML.jpg)\n\
  \n图 6-4. 代理安装详细信息\n\n一旦为安装详细信息提供了所有信息，如图 6-4 所示，单击下一步继续向导。这将带您进入图 6-5 中的复查屏幕。从那里，您可以看到通过向导输入的所有项目。单击部署代理以开始代理的部署。\n\
  \n![A978-1-4302-6266-4_6_Fig5_HTML.jpg](img/A978-1-4302-6266-4_6_Fig5_HTML.jpg)\n\
