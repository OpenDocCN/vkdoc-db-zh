  这完成了 OMA 环境上代理的安装和配置，因此现在我可以像监控任何其他 Oracle 数据库环境一样，监控所有这些目标。\n\n\n\n## 概述\n\n本章快速概述了\
  \ Oracle Enterprise Manager 的架构以及如何向 ODA 推送代理以进行监控。通过 Enterprise Manager 监控 ODA\
  \ 的行为和方式与监控其他任何数据库版本相同。利用 Enterprise Manager 监控 ODA 可以简化其复杂性，并在问题出现时更易于解决。对于监控这一入门级工程系统，Enterprise\
  \ Manager 应是首选方案。\n\n\n"
