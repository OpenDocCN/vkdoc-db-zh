  ODA 安装海报是一种简单易懂的设备安装和设置方法。该海报是一个逐步指南，解释了如何连接线缆以部署软件，从而得到一个功能完整的集群数据库服务器。图 1-5 对此进行了详细展示。Oracle
  会为每个发布版本更新此海报。海报可在 ODA 文档网站上获取：[`http://docs.oracle.com/cd/E22693_01`](http://docs.oracle.com/cd/E22693_01)。


