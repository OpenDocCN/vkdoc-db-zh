  \ |\n\n## Oracle 数据库一体机初始部署\n\n一旦 Oracle Linux 操作系统的裸金属安装完成，您需要登录到其中一个节点的控制台，并使用`firstnet`命令对\
  \ Oracle 数据库一体机网络进行初始配置。该命令允许您在首次使用时为 Oracle 数据库一体机建立网络接口。\n\n注意\n\n在运行`firstnet`之前，您应该分配所需的互联网协议（`IP`）地址，并验证其在域名服务（`DNS`）中的条目已完成。如果您在收集或分配`IP`地址方面需要帮助，请联系您当地的系统管理员。\n\
  \n### ILOM 网络\n\nOracle Integrated Lights Out Manager（`ILOM`）运行在服务处理器（`SP`）上，用于硬件安装、维护和故障排除。Oracle\
  \ 数据库一体机上的每个节点都有一个专用的`SP`，并配有一个专用的 10/100BaseT 端口。\n\n### 网络信息\n\n每个 Oracle 数据库一体机节点都需要访问外部网络；一体机背面有多个以太网端口来建立这些连接。支持公共网络访问的绑定通过连接到每个\
  \ Oracle 数据库一体机上`net0`和`net1`端口的线缆实现冗余连接。本章中的示例将基于名为“ejb”的 Oracle 数据库一体机。表 3-4 说明了需要在一体机两个节点上为`bond0`建立的内容。\n\
  \n注意\n\n请注意，您只需关注两个节点上的`bond0`接口。使用`firstnet`工具时会配置`bond0`接口。\n\n表 3-4. node0 的互联网协议信息\n\
  \n| 节点 | 绑定名称 | IP 地址 | 网络掩码 | DNS 条目 |\n| --- | --- | --- | --- | --- |\n| 0 |\
  \ `bond0` | 172.30.0.20 | 255.255.255.0 | ejb1.m57.local |\n| 1 | `bond0` | 172.30.0.21\
  \ | 255.255.255.0 | ejb2.m57.local |\n\nOracle 数据库一体机还使用常规网络资源，如`DNS`、网关和网络时间协议（`NTP`）。表\
  \ 3-5 展示了这些资源的配置示例。\n\n表 3-5. Oracle 数据库一体机的附加资源\n\n| 资源 | 条目 |\n| --- | --- |\n\
  | `DNS`服务器 | 172.16.11.215 |\n| `DNS`后缀 | m57.local |\n| `DNS`搜索顺序 | m57.local |\n\
  | `NTP`服务器 | 172.30.0.1 |\n| 默认网关 | 172.30.0.1 |\n| SMTP 中继 | 172.30.0.1 |\n\n\n\
  \n### 真应用集群（RAC）网络\n\nOracle 真应用集群 11g 第 2 版（RAC）预装在 Oracle 数据库一体机上。此版本的 RAC 引入了**单一客户端访问名称**（SCAN）寻址的概念。SCAN\
  \ 地址通过提供两个或多个 IP 地址，为集群提供数据库的别名。这种类似别名的方法允许远程客户端连接，而无需更改与环境相关的连接信息。\n\n**注意**\n\
  SCAN 需要企业 DNS 或 Oracle 全局命名服务才能工作。对于 Oracle 数据库一体机，方法是使用您的企业 DNS。有关 SCAN 的更多信息，请参见\
  \ [`www.oracle.com/technetwork/products/clustering/overview/scan-129069.pdf`](http://www.oracle.com/technetwork/products/clustering/overview/scan-129069.pdf)。\n\
  \nSCAN 寻址采用 DNS 的轮询（round-robin）方法。这种方法确保网络流量在多个 IP 地址之间负载均衡。该方法确保远程主机可以配置本地命名，而无需在环境发生变化时更改连接信息。表\
  \ 3-6 提供了一个如何在企业 DNS 服务器中配置条目的示例。\n\n**注意**\nDNS 中的 SCAN 条目应关联不少于三个 IP 地址。\n\n**表\
  \ 3-6. 域名服务（DNS）设置**\n\n| DNS 名称 | IP 地址 |\n| --- | --- |\n| ejb-vip1.m57.local\
  \ | 172.30.0.22 |\n| ejb-vip2.m57.local | 172.30.0.23 |\n| ejb-scan.m57.local |\
  \ 172.30.0.24, 172.30.0.25, 172.30.0.26 |\n\n至此，您应对配置 Oracle 数据库一体机网络所需的组件有了基本了解。接下来，您需要通过连接到\
  \ ILOM 来配置所有这些与网络相关的项目。\n\n### 网络配置\n\n对于所有 Oracle 数据库一体机，一旦您设置好网络资源（DNS、IP 地址）并完成\
  \ ILOM 网络配置，您就可以使用 SSH 协议连接到 ILOM。连接到 ILOM 后，您可以连接到系统的控制台以获取 Linux 控制台终端。可以使用 ILOM\
  \ 命令 `start /SP/console` 访问系统的控制台。清单 3-1 提供了交互过程应如何进行的示例。\n\n**清单 3-1. 启动 ILOM 控制台**\n\
