  ```\n\n\n### 准备将 ZFS 阵列用作外部存储\n\n虽然您可以向 X3-2 添加额外的存储托架，但您也可以选择从 NFS 共享（如 Oracle\
  \ ZFS 阵列）扩展存储。从 ZFS 阵列扩展允许您引入混合列压缩和存储分层等技术。HCC 允许您以显著更少的空间存储用户数据，并以更少的 I/O 检索数据。利用\
  \ HCC 仓库压缩，您可以节省 5 到 10 倍的存储空间；而使用 HCC 归档压缩，您可以节省 10 到 50 倍的存储空间。这些节省在很大程度上取决于实际数据。存储节省的增加可能会导致数据加载时间适度增加。存储分层允许您利用分区将活动数据保留在\
  \ Oracle 数据库一体机内部磁盘上，而将非活动数据保留在 ZFS 阵列上。这使得数据库可以访问显著更多的数据，而不影响活动数据的性能。\n\n当使用基于\
  \ NFS 的存储时，建议启用一种称为 Direct NFS 的技术。Oracle 会在`$ORACLE_HOME/dbs/oranfstab`中查找挂载设置，该文件为单个数据库指定\
  \ Direct NFS 客户端设置。接着，Oracle 会在`/etc/oranfstab`中查找设置，该文件指定该主机上所有 Oracle 数据库可用的 NFS\
  \ 挂载点。最后，Oracle 会读取挂载表文件（在 Linux 上为`/etc/mtab`）以识别可用的 NFS 挂载点。如果配置文件中有重复条目，Direct\
  \ NFS 客户端将使用它找到的第一个条目。清单 3-13 提供了`oranfstab`文件中 Direct NFS 设置的示例。\n\n**清单 3-13.**\
  \ `oranfstab`示例\n\n```\n[orahost1]# cat $ORACLE_HOME/dbs/oranfstab\n\nserver: zfs.m57.local\n\
  path: 172.30.0.90\nexport:/oranfsdata  mount:/oranfsdata\nexport:/oranfsarch  mount:/oranfsarch\n\
  ```\n\n**注意**\n\n`path`行中使用的 IP 地址是 NFS 挂载将连接到的节点的虚拟 IP 地址。\n\n在数据库中使用 Direct NFS\
  \ 之前，需要先启用它。在 Oracle 数据库 11g 第 2 版中，通过`make`命令重新编译二进制文件可以轻松完成此操作。清单 3-14 展示了如何执行`make`命令并在\
  \ Oracle 数据库中启用 Direct NFS。\n\n**清单 3-14.** 使用`make`重新编译\n\n```\ncd $ORACLE_HOME/rdbms/lib\n\
  make -f ins_rdbms.mk dnfs_on\n```\n\n重新编译前，需要关闭所有数据库，然后可以使用`make`重新编译二进制文件。重新编译完成后，可以将其他数据库重新联机。启动实例后，数据库实例的`alert.log`将显示\
  \ Direct NFS 已启用（参见清单 3-15）。\n\n**清单 3-15.** `alert.log`中的条目\n\n```\nOracle instance\
  \ running with ODM: Oracle Direct NFS ODM Library Version 3.0\n```\n\n一旦为数据库配置了\
  \ Direct NFS 并在`alert.log`中得到验证，您就可以在现已可访问的 NFS 存储上创建表空间。清单 3-16 说明了如何创建新的表空间并显示\
  \ Direct NFS 挂载上文件的状态。\n\n**清单 3-16.** 在 Direct NFS 上创建表\n\n```\nSQL> create tablespace\
  \ archive_data datafile\n'/oranfsarch/archive_data01.dbf' SIZE 40960M;\nTablespace\
  \ created.\n\nSQL> select file#, name, status from v$datafile;\n\n FILE# NAME  \
  \                                            STATUS\n------ -------------------------------------------------\
  \ -------\n     1 +DATA/pbrb/datafile/system.272.781351553          SYSTEM\n   \
  \  2 +DATA/pbrb/datafile/sysaux.273.781351557          ONLINE\n     3 +DATA/pbrb/datafile/undotbs1.274.781351561\
  \        ONLINE\n     4 +DATA/pbrb/datafile/undotbs2.276.781351569        ONLINE\n\
  \     5 +DATA/pbrb/datafile/users.277.781351571           ONLINE\n     6 +DATA/pbrb/datafile/users.bigfile\
  \                ONLINE\n     7 /oranfsarch/nfs/archive_data01.dbf             \
  \   ONLINE\n```\n\n通过能够在 Oracle 数据库一体机上通过 Direct NFS 添加额外的存储空间，您现在拥有一个强大且可扩展的环境来运行您的\
  \ Oracle 数据库。\n\n## 总结\n\n通过一些规划和准备，Oracle 设备管理器（OAM）允许您在几小时内快速部署新系统。完整的 RAC 部署可以在远少于使用过去传统方法构建系统所需的时间内上线并准备就绪。可以通过\
  \ VNC 会话访问 OAM，允许您从大多数平台进行部署，而无需安装 X-window 系统。这节省了时间，同时仍然允许您快速部署系统。\n\n"
- "# 4. 数据库配置\n\n**摘要**\n\n到目前为止，本书已经介绍了 Oracle 数据库一体机和集成远程管理器的概况，并展示了如何从硬件和软件角度安装\
  \ Oracle 数据库一体机。迄今为止尚未涵盖的是为 Oracle 数据库一体机创建和配置 Oracle 数据库。在本章中，我们将重点介绍`oakcli`命令以及与创建和删除各种类型的数据库配置相关的选项。\n\
  \n## `oakcli`命令\n\n`oakcli`命令提供了管理设备的命令行界面。这是您将用于创建和删除数据库的命令，这些也是我们将在本章中重点介绍的用途。\n\
  \n### 命令选项\n\n清单 4-1 显示了`oakcli`命令的帮助输出。您将重点关注`oakcli`命令的最后两个选项：`create`和`delete`。这些选项提供了一个单一的非\
  \ GUI 界面，用于在 Oracle 数据库一体机上创建 Oracle 数据库。通过使用`oakcli`命令行工具，我们可以轻松快速地创建数据库。\n\n**清单\
  \ 4-1.** `oakcli`的帮助输出\n\n```\n[oracle@patty bin]$ ./oakcli -h\nUsage: oakcli show\
  \       - show disk, diskgroup, expander, controller, storage, version, dbhomes,\
  \ databases, db_config_params, core_config_key, env_hw\n        oakcli apply   \
  \   - applies the core_config_key\n        oakcli locate     - locates a disk\n\
  \        oakcli deploy     - deploys the Database Appliance\n        oakcli update\
  \     - updates the Database Appliance\n        oakcli validate   - validates the\
  \ Database Appliance\n        oakcli manage     - manages the oak repository, diagcollect\
  \ e.t.c\n        oakcli unpack     - unpack the given package to oak repository\n\
  \        oakcli copy       - copies the deployment config file\n        oakcli upgrade\
  \    - upgrades database\n        oakcli stordiag   - run storage diagnostic tool\
  \ on both node\n        oakcli test       - test asr\n        oakcli odachk    \
  \ - performs configuration settings check on ODA\n        oakcli configure  - configures\
  \ the network or asr\n        oakcli create     - create database, dbhome, db_config_params\
  \ file\n        oakcli delete     - deletes database, dbhome, db_config_params file\n\
  ```\n\n现在您已经了解了`oakcli`命令可以完成什么操作，让我们看看如何使用`oakcli`创建数据库，然后再删除它们。\n\n### 执行命令\n\n\
  让我们来看一下 `oakcli create` 命令。通过使用帮助 (`-h`) 标志，我们可以获取该命令功能的描述。清单 4-2 展示了使用帮助标志后的输出。\n\
  \n**清单 4-2. oakcli 创建命令帮助输出**\n```\n[oracle@patty bin]$ ./oakcli create -h\n用法:\n\
  oakcli create {database | dbhome | db_config_params } [<选项>]\n其中:\n          database\
  \            - 创建数据库\n          dbhome              - 创建数据库主目录\n          db_config_params\
  \    - 创建数据库配置参数文件\n```\n\n同样地，可以使用相同帮助 (`-h`) 标志深入了解这些选项中的每一个。清单 4-3 至清单 4-5 展示了一些常见\
  \ `oakcli` 操作的帮助输出。\n\n**清单 4-3. 创建数据库的帮助输出**\n```\n[oracle@patty bin]$ ./oakcli\
  \ create database -h\n用法:\n      oakcli create database  -db <数据库名称> [[-oh <主目录>]\
  \ | [-version <版本>]]  [-params <参数文件>]\n      其中:\n          数据库名称      - 要创建的数据库的名称。\n\
  \          主目录         - 用于创建数据库的现有 Oracle 主目录。默认情况下，我们会创建一个新的数据库主目录。\n        \
  \  版本      - 用于创建数据库主目录的数据库版本信息。[例如 11.2.0.2.7] 如果未提供，则从最新的可用版本创建数据库主目录。\n     \
  \     参数文件  - 数据库配置参数文件的名称 [此文件可以使用 'oakcli create db_config_param' 命令创建]。如果未提供，则使用默认配置文件创建数据库。\n\
  ```\n\n**清单 4-4. 创建数据库主目录的帮助输出**\n```\n[oracle@patty bin]$ ./oakcli create dbhome\
  \ -h\n用法:\n      oakcli create dbhome  [-version <版本>]\n      其中:\n          版本\
  \  - 用于创建数据库主目录的版本信息。如果未提供，则从最新的可用版本创建数据库主目录。\n```\n\n**清单 4-5. 创建参数文件的帮助输出**\n\
  ```\n[oracle@patty bin]$ ./oakcli create db_config_params -h\n用法:\n      oakcli\
  \ create db_config_params -conf <文件名>  - 生成数据库配置参数文件。\n      其中:\n          文件名\
  \  - 配置文件名 (文件名中不应包含路径)\n```\n\n现在，你已经了解了 `create` 命令，让我们通过创建之前讨论过的几种数据库类型来应用这个命令。我们从实时应用集群（RAC）数据库开始，然后你将了解\
  \ RAC One 数据库，最后是一个简单的独立数据库。\n\n### 企业版\n\n在设备上创建的所有数据库都是使用 Oracle 数据库管理系统的**企业版**完成的。企业版提供了更多功能，并允许你在开始扩展数据库环境时进行伸缩。\n\
  \n使用企业版还允许你扩展数据库可以使用的核心数量。数据库的标准版在两节点实时应用集群（RAC）系统上总共限制为四个核心。使用企业版，Oracle 数据库设备最多可以扩展到\
  \ 32 个核心。在 Oracle 数据库设备上，这种为核心扩容的能力在针对你的环境进行配置和扩展时更具价值。\n\n随着 Oracle 数据库设备成为中小型企业整合的核心，该设备提供的可扩展性和灵活性使企业能够以更少的资源实现更多目标。其巨大的可扩展性因素在很大程度上满足了对**企业版**数据库的需求。\n\
  \n## 数据库配置类型\n\n对于 Oracle 数据库设备，在设备框架内可以配置和使用三种不同的配置。最明显的是实时应用集群（RAC）。除了 RAC 配置之外，Oracle\
  \ 数据库设备还可以配置为实时应用集群一（RAC One）数据库或独立数据库。让我们来看看这些不同的配置类型。\n\n\n### 实时应用集群\n\n实时应用集群选项是\
  \ Oracle 数据库一体机使用的主要选项。RAC 数据库为数据库提供了一定级别的高可用性，并通过服务实现应用的可扩展性。要为 Oracle 数据库一体机配置实时应用集群数据库，您需要使用\
  \ `oakcli` 命令。\n\n让我们使用 `oakcli` 来配置一个实时应用集群数据库：\n\n```bash\n[oracle@patty bin]$su\
  \ -\n```\n\n```bash\n[root@patty bin]$cd /opt/oracle/oak/bin\n```\n\n```bash\n[root@patty\
  \ bin]$ ./oakcli create database -db bcodatst\n```\n\n您会注意到，我使用了一个非常简单的 `create`\
  \ 语句来创建名为 `bcodatst` 的数据库。还有其他选项允许您进行更定制化的数据库安装。这些其他选项就是前面在清单 4-4 和 4-5 中概述的那些。\n\
  \n**注意**\n\n如果您尝试以 `oracle` 用户身份创建数据库，系统会提示您没有执行此操作的权限。这是因为 `oakcli` 命令归 `root`\
  \ 用户所有，这也是为什么前面的代码示例以 `su` 切换到 `root` 开始。如果您忘记这一点，以 `oracle` 用户身份执行命令，将会出现以下错误：\n\
  \n```text\n错误: 2013-11-11 21:19:13: 权限不足，无法创建数据库\n```\n\n一旦您启动 `oakcli create database\
  \ –db` 命令，系统会询问一系列问题，以帮助您在 Oracle 数据库一体机上配置数据库。这些问题的范围从询问用户密码到您想要配置的数据库类型。让我们开始吧。\n\
  \n```bash\n[root@patty bin]# ./oakcli create database -db bcodatst\n```\n\n```text\n\
  信息: 2013-11-11 21:20:59: 未提供数据库参数文件。将使用默认参数创建数据库\n```\n\n注意到我们没有提供参数文件了吗？`oakcli`\
  \ 命令发现了这一点，并决定使用默认参数文件。然后，系统会要求您提供一些密码。\n\n```text\n请输入 'root' 用户密码:\n请再次输入 'root'\
  \ 用户密码:\n请输入 'oracle' 用户密码:\n请再次输入 'oracle' 用户密码:\n请输入 'SYSASM' 用户密码: (在部署期间，我们将\
  \ SYSASM 密码设置为 'welcome1'):\n请再次输入 'SYSASM' 用户密码:\n信息: 2013-11-11 21:25:24: 正在安装新的主目录:\
  \ OraDb11203_home3，位于 /u01/app/oracle/product/11.2.0.3/dbhome_3\n```\n\n在提供了与 Oracle\
  \ 数据库一体机硬件交互所需的所有密码后，`oakcli` 命令想知道您要执行哪种类型的数据库部署。由于您正在创建实时应用集群数据库，您需要选择选项三。\n\n\
  ```text\n请选择数据库部署类型 [1 .. 3]：\n1    => EE : 企业版\n2    => RACONE\n3    => RAC\n所选值是:\
  \ RAC\n```\n\n对于 RAC 安装，安装程序接下来想知道您要创建的数据库大小。有五种不同的规模类别可供选择。出于演示目的，我们将选择一个中等规模的数据库。选择选项三以继续数据库安装。\n\
  \n```text\n请选择数据库类别 [1 .. 5]：\n1    => 非常小\n2    => 小\n3    => 中\n4    => 大\n5 \
  \   => 非常大\n所选值是: 中\n```\n\n由于您是管理员，您或您的团队需要管理该数据库。作为安装的一部分，系统会提示您是否要创建数据库控制台，也称为\
  \ Database Control。提示如下：\n\n```text\n是否要为此数据库设置 EM Dbconsole: [ Y | N ]? Y\n```\n\
  \n**注意**\n\n在第 6 章中，您将了解如何手动设置数据库控制台。您还将看到如何为 Oracle Enterprise Manager 12c 安装管理代理。\n\
  \n接下来，系统将要求您为 `ASMSNMP` 用户提供密码。此用户用于与一体机上的自动存储管理进行交互。请提供您为此用户配置的密码。\n\n```text\n\
  请输入 'ASMSNMP' 用户密码: (在部署期间，我们将 ASMSNMP 密码设置为 'welcome1'):\n请再次输入 'ASMSNMP' 用户密码:\n\
  ```\n\n一旦所有密码都已提供并存储，安装程序就开始以实时应用集群配置安装 Oracle 数据库。这种类型的安装可能需要几分钟时间，具体取决于要求创建的数据库大小。最终，您会收到一条消息，说明数据库已成功创建，该消息将包括完成时的日期和时间戳。例如：\n\
  \n```text\n成功: 2013-11-11 21:50:56: 成功创建数据库 bcodatst\n```\n\n当数据库创建后，集群就绪服务堆栈中的条目将可供查看（参见清单\
  \ 4-6）。使用 Oracle Grid 主目录中的 `crsctl` 命令来查看已创建数据库的状态。`crsctl` 输出的完整列表在清单 4-6 中。粗体显示的行对应于刚刚创建的数据库。\n\
  \n清单 4-6. 集群就绪服务输出\n\n```bash\n[grid@patty bin]$ ./crsctl status res -t\n```\n\n\
  ```text\n-------------------------------------------------------------------------------\n\
  名称           目标    状态        服务器                   状态详情\n-------------------------------------------------------------------------------\n\
  本地资源\n-------------------------------------------------------------------------------\n\
  ora.DATA.dg\n               联机  联机       patty\n               联机  联机       selma\n\
  ora.LISTENER.lsnr\n               联机  联机       patty\n               联机  联机    \
  \   selma\nora.RECO.dg\n               联机  联机       patty\n               联机  联机\
  \       selma\nora.REDO.dg\n               联机  联机       patty\n               联机\
  \  联机       selma\nora.asm\n               联机  联机       patty                  \
  \  已启动\n               联机  联机       selma                    已启动\nora.gsd\n    \
  \           脱机  脱机       patty\n               脱机  脱机       selma\nora.net1.network\n\
  \               联机  联机       patty\n               联机  联机       selma\nora.ons\n\
  \               联机  联机       patty\n               联机  联机       selma\nora.reco.acfsvol.acfs\n\
  \               联机  联机       patty                    挂载于 /cloudfs\n           \
  \    联机  联机       selma                    挂载于 /cloudfs\nora.registry.acfs\n   \
  \            联机  联机       patty\n               联机  联机       selma\n-------------------------------------------------------------------------------\n\
  集群资源\n-------------------------------------------------------------------------------\n\
  ora.LISTENER_SCAN1.lsnr\n      1        联机  联机       patty\nora.LISTENER_SCAN2.lsnr\n\
  \      1        联机  联机       selma\nora.bcodatst.db\n      1        联机  联机     \
  \  patty                    已打开\n      2        联机  联机       selma             \
  \       已打开\nora.cvu\n      1        联机  联机       selma\nora.dboda.db\n      1 \
  \       联机  联机       patty                    已打开\n      2        联机  联机       selma\
  \                    已打开\nora.oc4j\n      1        联机  联机       selma\nora.patty.vip\n\
  \      1        联机  联机       patty\nora.scan1.vip\n      1        联机  联机       patty\n\
  ora.scan2.vip\n      1        联机  联机       selma\nora.selma.vip\n      1       \
  \ 联机  联机       selma\nora.slob.db\n      1        联机  联机       patty           \
  \         已打开\n```\n\n正如您所看到的，通过查看 `ora.bcodatst.db` 条目，`oakcli` 命令为您完成了所有工作，并成功创建了一个\
  \ RAC 数据库。数据库状态也是“已打开”，表明数据库已准备就绪可以使用。\n\n\n### 真正应用集群一\n\n有时，您的组织可能只希望拥有一个可以在两个节点之间故障转移的单一实例。为此，Oracle\
  \ 启用了一项名为 RAC One 的功能。RAC One 是一个在单节点上运行，并在需要或期望时故障转移到第二个节点的真正应用集群。\n\n配置 RAC One\
  \ 数据库与在 Oracle 数据库一体机上配置 RAC 数据库非常相似。您需要使用 `oakcli` 命令，然后提供所需的输入来告知 Oracle 要配置的内容。现在，让我们看看如何配置一个\
  \ RAC One 集群。\n\n和之前一样，您需要以 root 用户身份启动 `oakcli` 命令。请注意，这次我们将数据库名称改为了 `bcrac1tst`。\n\
  \n```\n[oracle@patty bin]$su -\n[root@patty bin]$cd /opt/oracle/oak/bin\n[root@patty\
  \ bin]$ ./oakcli create database -db bcrac1tst\n```\n\n如果您尝试使用超过八个字符的名称，`oakcli`\
  \ 命令会提供警告及一些相关信息，然后要求您提供另一个数据库名称。例如：\n\n```\nWARNING: 2013-11-12 07:18:22: bcrac1tst\
  \ is not a valid database name\nINFO: 2013-11-12 07:18:22: Only alphanumeric characters\
  \ are allowed in the database name, and the database name must start with an alphabetical\
  \ character\nINFO: 2013-11-12 07:18:22: Database name should not be more than 8\
  \ chars\n```\n\n如提示所示，我们被告知数据库名称不能超过八个字符。在提示符处，提供一个八字符或更短的新数据库名称。\n\n```\nPlease\
  \ enter a different name for the Database: bcrac1\n```\n\n与 RAC 数据库一样，`oakcli` 安装程序将提示我们输入各种用户密码。按预期输入密码，安装程序将继续。一旦提供了所有密码，安装程序将通过一条\
  \ INFO 消息告知您新的 Oracle 主目录所在位置。\n\n```\nPlease enter the 'root' user password:\n\
  Please re-enter the 'root' user password:\nPlease enter the 'oracle' user password:\n\
  Please re-enter the 'oracle' user password:\nPlease enter the 'SYSASM' user password:\
  \ (During deployment we set the SYSASM password to 'welcome1'):\nPlease re-enter\
  \ the 'SYSASM' user password:\nINFO: 2013-11-12 07:23:49: Installing a new home:\
  \ OraDb11203_home4 at /u01/app/oracle/product/11.2.0.3/dbhome_4\n```\n\n与创建 RAC\
  \ 数据库一样，系统会询问您要创建的数据库类型。要创建 RAC One 数据库，您需要选择选项二 (2)，即 `RACONE` 数据库选项。选择 RAC One\
  \ 选项后，安装程序会询问您希望将此数据库设置为多大尺寸。为您的组织选择所需的尺寸。\n\n```\nPlease select one of the following\
  \ for Database Deployment  [1 .. 3]:\n1    => EE : Enterprise Edition\n2    => RACONE\n\
  3    => RAC\nSelected value is: RACONE\nPlease select one of the following for Database\
  \ Class  [1 .. 5]:\n1    => Very Small\n2    => Small\n3    => Medium\n4    => Large\n\
  5    => Extra Large\n```\n\n在安装 Oracle RAC One 数据库时，最后一个问题有关配置数据库控制台。与 RAC 配置一样，您可以选择是或否。\n\
  \n```\nDo you want to set up the EM Dbconsole for this database: [ Y | N ]?\n```\n\
  \n与 RAC 安装一样，一旦 `oakcli` 命令完成，您将能在集群就绪服务 (CRS) 堆栈中看到新创建的数据库。清单 4-7 显示了刚创建的数据库的堆栈。\n\
  \n**清单 4-7. 集群就绪服务 (CRS) 输出**\n\n```\n[grid@patty bin]$ ./crsctl status res -t\n\
  -------------------------------------------------------------------------------\n\
  NAME           TARGET  STATE        SERVER                   STATE_DETAILS\n-------------------------------------------------------------------------------\n\
  Cluster Resources\n-------------------------------------------------------------------------------\n\
  ora.bcrac1.bcrac1_racone.svc\n      1        ONLINE  ONLINE       selma\nora.bcrac1.db\n\
  \      1        ONLINE  ONLINE       selma                    Open\n```\n\n清单 4-7\
  \ 中的 `crsctl` 输出示例显示 RAC One 数据库已创建，并位于 `Selma` 服务器上。此外，数据库已打开且可供最终用户访问。\n\n###\
  \ 单实例 (EE 选项)\n\n在 Oracle 数据库一体机上设置单实例数据库与您目前所见的选项一样简单。要创建单实例数据库，您开始的方式与配置 RAC 和\
  \ RAC One 时相同。例如：\n\n```\n[oracle@patty bin]$su -\n[root@patty bin]$cd /opt/oracle/oak/bin\n\
  [root@patty bin]$ ./oakcli create database –db bcsingle\n```\n\n您的数据库名称也需要不同。在上面的例子中，使用了名称\
  \ `bcsingle`。执行后，系统将提示您要创建的数据库类型。在选择要创建的数据库类型后，系统会询问您希望在哪个节点上创建数据库。清单 4-8 提供了一个关于在哪个节点安装数据库的问题示例。然后，安装程序将询问您常规问题，如同配置\
  \ RAC 或 RAC One 数据库一样。与之前为其他数据库类型运行 `oakcli` 命令一样，系统将提示您选择安装类型和大小，并询问是否应创建数据库控制台。\n\
  \n**清单 4-8. 选择安装 EE 数据库的节点**\n\n```\nPlease select one of the following for Node\
  \ Number  [1 .. 2]:\n1    => patty\n2    => Selma\n```\n\n单实例数据库安装完成后，可以使用 `crsctl`\
  \ 命令从 CRS 堆栈查看数据库状态。清单 4-9 显示了一个包含单实例的 CRS 堆栈示例。\n\n**清单 4-9. EE 数据库的集群就绪服务 (CRS)\
  \ 状态**\n\n```\n[grid@patty bin]$ ./crsctl status res -t\n-------------------------------------------------------------------------------\n\
  NAME           TARGET  STATE        SERVER                   STATE_DETAILS\n-------------------------------------------------------------------------------\n\
  Cluster Resources\n-------------------------------------------------------------------------------\n\
  ora.bcsingle.db\n      1        ONLINE  ONLINE       patty                    Open\n\
  ```\n\n\n\n## 数据库删除\n\n我们刚刚了解了如何使用 `oakcli` 命令创建三种不同类型的数据库。如果你想从 Oracle 数据库一体机中删除一个数据库该怎么办呢？`oakcli`\
  \ 命令也提供了一个选项来实现这一点。正如你在本章开头所复习的，`oakcli` 命令有一个 `delete` 选项。\n\n`oakcli` 命令的 `delete`\
  \ 选项具有与 `create` 选项相同的命令行选项。清单 4-10 显示了可用的选项。\n\n**清单 4-10.** oakcli 删除选项\n\n```\n\
  [root@patty bin]# ./oakcli delete -h\nUsage:\noakcli delete {database | dbhome |\
  \ db_config_params}   [<options>]\nwhere:\n          database             - deletes\
  \ the database\n          dbhome               - deletes the database home\n   \
  \       db_config_params     - deletes the database config parameter file\n```\n\
  \n既然你已经理解了 `delete` 选项的功能，让我们来看看如何删除之前创建的一个数据库。要从 Oracle 数据库一体机中删除数据库，请执行以下命令：\n\
  \n```\n[root@patty bin]# ./oakcli delete database -db bcodatst\n```\n\n当调用 `delete`\
  \ 选项时，系统会要求你提供 `root` 和 `oracle` 用户的密码。然后，`oakcli` 实用程序将以这些用户身份登录，并通过节点之间的安全外壳（SSH）连接进行连接，以便删除数据库。清单\
  \ 4-11 显示了从 Oracle 数据库一体机中删除 RAC 数据库的完整输出。\n\n**清单 4-11.** 提示输入 root 和 oracle 用户（密码未键入）\n\
  \n```\nPlease enter the 'root' user password:\nPlease re-enter the 'root' user password:\n\
