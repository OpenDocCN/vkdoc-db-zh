  \ 7-4 提供了一个示例。\n\n![A978-1-4302-6266-4_7_Fig4_HTML.jpg](img/A978-1-4302-6266-4_7_Fig4_HTML.jpg)\n\
  \n图 7-4. ODA 检查调查结果报告\n\n每个调查结果都应根据环境进行验证。务必确保系统在预定义的参数范围内运行。经常运行 `odachk` 实用程序，以确保系统没有问题，一切运行正常。\n\
  \n\n\n### 跟踪文件分析器\n\n跟踪文件分析器（TFA）是 ODA 2.5 中引入的新实用工具。它会自动安装并在后台运行，以便在实时扫描或用户发起的扫描期间，主动从各种日志文件中捕获信息。\n\
  \n> 注意\n> TFA 也是来自 Oracle RAC 保证团队的一个独立实用工具¹。它可在 Oracle RAC 支持的大多数平台上安装。\n\nTFA\
  \ 在 ODA 上默认安装。TFA 不是 OAK 框架的一部分。它安装在 `/opt/oracle/tfa` 目录中。TFA 与软件无关，这意味着它的用途远不止于\
  \ Oracle RDBMS 或 Clusterware 日志文件。由于 TFA 是一个独立实用工具，它拥有更快的软件更新周期，其更新频率与 ODAchk 工具相当。\n\
  \nTFA 提供多种功能，围绕诊断数据的收集、自动化和集中化展开。本质上，TFA 提供了一种简便的方法，可以从活动系统中获取有针对性的数据。以下是 TFA 提供的部分功能：\n\
  \n*   将所有集群节点上所有 CRS/GI 和 RAC 组件的诊断数据收集封装成一条从集中位置执行的单一命令\n*   能够在数据收集期间修剪诊断文件以减少数据上传大小\n\
  *   能够将诊断数据收集限定在给定的时间段内\n*   能够将收集到的诊断输出集中到集群中的单一服务器\n*   能够将诊断收集限定到特定的产品组件（例如，`ASM`、`RDBMS`、`Clusterware`）\n\
  *   能够——称为实时扫描——实时扫描警报日志以查找表明问题的条件（DB 警报日志、`ASM` 警报日志、`Clusterware` 警报日志等）\n*  \
  \ 基于实时扫描发现的自动数据收集\n*   按需扫描（用户发起）所有日志和跟踪文件以查找表明问题的条件\n*   基于按需扫描发现的自动数据收集\n\n通过执行不带任何选项的\
  \ `tfactl` 命令，可以查看 TFA 语法。列表 7-17 展示了使用 `tfactl` 可以完成的操作。\n\n**列表 7-17.** tfactl\
  \ 帮助\n\n```\n[root@odax32 bin]# ./tfactl\n用法 : /opt/oracle/tfa/tfa_home/bin/tfactl\
  \ <命令> [选项]\n<命令> =\nstatus       检查集群中各节点上的 TFA 状态\nadd          将目录或主机添加到 TFA\n\
  change       更改 TFA 中目录的权限\nmodify       修改 TFA 参数\nset          开启/关闭各种 TFA 功能\n\
  remove       从 TFA 中移除目录\nprint        打印请求的详细信息\nrun          运行清单或扫描\ndiagcollect\
  \  从集群中的各节点收集日志\n如需命令帮助: /opt/oracle/tfa/tfa_home/bin/tfactl <命令> -help\n如需调试输出，请使用\
  \ -verbose 选项\n```\n\nOracle 数据库一体机将 TFA 作为 ODA 补丁的一部分安装。TFA 的启动由 `oakd` 进程处理。为确保\
  \ TFA 在任何时间点都在运行，您可以使用 `tfactl` 进行验证，如列表 7-18 所示。\n\n**列表 7-18.** tfactl 状态\n\n\
  ```\nroot@odax32 bin]# ./tfactl status\n.-----------------------------------------.\n\
  | 主机     | TFA 状态      | PID   | 端口 |\n+----------+---------------+-------+------+\n\
  | odax32   | 运行中         | 18839 | 5000 |\n| odax32   | 运行中         | 18637 | 5000\
  \ |\n'----------+---------------+-------+------'\n```\n\n我们将从展示 TFA 正在收集的各种信息开始，来探讨\
  \ TFA 的一些关键功能。执行命令 `tfactl print` 以查看关于 TFA 的各种信息，如列表 7-19 所示。\n\n**列表 7-19.** tfactl\
  \ 打印\n\n```\n[root@odax32 bin]# ./tfactl print -h\n用法: /opt/oracle/tfa/tfa_home/bin/tfactl\
  \ print [directories|hosts|actions|inventory|invrunstat|repository|...]\n打印请求的详细信息。\n\
  选项:\nconfig          打印当前 tfa 配置设置\nlog             打印 TFA 日志的最后十行\ndirectories\
  \     将所有目录打印到清单\n```\n\n\n\n`hosts`、`actions`、`inventory`、`invrunstat`、`repository`、`tfactl\
  \ print` 这些命令可以提供大量信息。关键参数通常可以通过查看 `config` 信息来检查。清单 7-20 展示了 ODA 的默认设置。\n\n清单 7-20. `tfactl`\
  \ 的 ODA 默认设置\n\n```\n### ./tfactl print config\n.---------------------------------------------------------------------------.\n\
  | Configuration Parameter                                                   | Value\
  \   |\n+---------------------------------------------------------------------------+---------+\n\
  | TFA Version                                                               | 2.5.1.4\
  \ |\n| Allow auto diagcollection by events                                     \
  \  | true    |\n| Allow Real Time Scan                                         \
  \             | true    |\n| Allow On Demand Scan                              \
  \                        | true    |\n| Real Time Scan running                 \
  \                                   | true    |\n| Allow events found during Real\
  \ Time Scan to fire diagcollection           | false   |\n| Allow events found during\
  \ On Demand Scan to fire diagcollection           | false   |\n| Allow trimming\
  \ of files during diagcollection                             | true    |\n| Trace\
  \ Level                                                               | 1      \
  \ |\n| Repository current size (MB) in podadb01                                \
  \  | 0       |\n| Repository maximum size (MB) in podadb01                     \
  \             | 10240   |\n'---------------------------------------------------------------------------+\n\
  ```\n\n如果需要，可以更改属性。例如，您可以修改设置，以便在实时扫描期间对某些事件自动触发诊断收集。清单 7-21 展示了如何进行此更改。\n\n清单 7-21. 使用\
  \ `tfactl` 修改诊断事件触发器\n\n```\n./tfactl set firediagcollectRT=true\nSuccessfully set\
  \ firediagcollectRT=true\n.---------------------------------------------------------------------------.\n\
  | Configuration Parameter                                                   | Value\
  \   |\n+---------------------------------------------------------------------------+---------+\n\
  | TFA Version                                                               | 2.5.1.4\
