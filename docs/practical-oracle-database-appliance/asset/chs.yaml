  \ `http://support.oracle.com` 查看。图 7-1 显示了一个成功发送的电子邮件消息示例。\n\n![A978-1-4302-6266-4_7_Fig1_HTML.jpg](img/A978-1-4302-6266-4_7_Fig1_HTML.jpg)\n\
  \n图 7-1. 确认 ASR 验证服务请求 (SR) 创建的电子邮件\n\nOracle 在 `ODA` 2.6 中增加了测试功能，允许模拟坏盘和其他硬件事件。这非常重要，因为在过去，模拟并确认\
  \ `ASR` 实际工作并不是一项容易的任务。测试功能的加入使这项任务变得容易得多。\n\n您可以通过执行命令 `oakcli test asr` 来运行 `ASR`\
  \ 测试。清单 7-13 显示了该命令响应中询问的问题示例。\n\n**清单 7-13. 运行 ASR 测试**\n```\n[root@odax32 bin]#\
