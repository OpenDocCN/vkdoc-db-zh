  \ 章中详细说明。\n\n### 共享存储\n\n每台 ODA 都拥有在设备的两个节点之间共享的存储。在 ODA V1 中，共享存储通过内置的存储扩展器实现，而\
  \ ODA X3-2 则使用外部机柜将共享磁盘添加到设备中。\n\n验证共享存储对于确保所有路径可用且共享磁盘无故障至关重要。根据您的磁盘组配置，冗余级别（NORMAL\
  \ 或 HIGH）的磁盘可能发生故障并需要更换。可以通过系统日志或 ASM 警报日志监控磁盘行为，但关键是要验证并确保通往磁盘的所有路径均正常运行。\n\n清单\
  \ 7-8 提供了一个存储验证示例。您可以查看活动的磁盘路径以及逻辑和物理磁盘设备的名称。\n\n**清单 7-8. ODA 共享存储验证（V1 & X3-2）**\n\
