  \ Appliance Manager 将开始配置 Oracle Database Appliance 的两个节点。此部署过程可能需要几个小时，具体取决于你的\
  \ Oracle Database Appliance 和所选的数据库大小。\n\n安装开始后，部署期间会运行 25 个步骤。图 3-12 展示了部署期间的这些步骤。请注意，安装屏幕上有一个\
  \ Show Details 按钮。此按钮可用于查看部署期间正在执行的步骤的详细信息。\n\n![A978-1-4302-6266-4_3_Fig12_HTML.jpg](img/A978-1-4302-6266-4_3_Fig12_HTML.jpg)\n\
