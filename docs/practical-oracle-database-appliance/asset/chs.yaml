  Started domain oakDom1 (id=1)\nINFO: Deployment in local mode\nINFO: Extracted the\
  \ image files on node 1\nINFO: The VM Configuration data is written to /OVS/Repositories/odabaseRepo/VirtualMachines/oakDom1/vm.cfg\
