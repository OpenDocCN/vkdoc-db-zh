  \ X3-2 磁盘校准结果存在问题，截至 ODA 2.7 软件版本，该命令显示操作不受支持且无法正常工作。\n\n\n\n### 自动服务请求\n\nASR 是\
  \ ODA 的一项功能，允许通过服务请求将硬件故障报告给 Oracle 公司。结果会反馈给用户，这为常见的硬件故障提供了快速解决方案。\n\nASR 完全集成到\
  \ `My Oracle Support` (`MOS`) 中，可以轻松创建与硬件相关问题（即由硬件故障引起的硬件故障）的服务请求。`ODA` 是在设置和部署期间注册为\
  \ `MOS` 资产的硬件组件。可以使用每个 `ODA` 的本地 `ASR` 服务。或者，如果一个组织管理着多个 `ODA` 和其他 Oracle 硬件，建议使用外部的、集中式的\
  \ `ASR` 服务器。\n\nOracle 在 `ODA` 2.6 中增加了对 `ASR` 的验证和测试。这个软件升级不仅带来了验证 `ASR` 连接性并确保\
  \ `ASR` 设置正确的能力，还可以测试各种场景以确保警报确实被生成。\n\n自动服务请求提供了为特定硬件故障自动打开 Oracle 服务请求的能力。`ASR`\
  \ 是一个可选的实用程序，可以在部署 `ODA` 期间或之后设置。在 `ODA` 2.5 及以上版本中，`ASR` 部署可以使用内置的 `ASR` 包或独立的\
  \ `ASR` 服务器来管理故障管理过程。在 `ODA` 2.5 之前，唯一的官方选择是使用内置在设备中的 `ASR`，因此每个 `ODA` 都需要连接到互联网以提供\
  \ `ASR` 功能。\n\n让我们看看 `ASR` 验证过程。`ASR` 验证过程对于 `ODA` V1 和 `X3-2` 是相同的，但在 `ODA` `X3-2`\
  \ 中，`ILOM` 和服务器节点具有不同的序列号，这在 V1 设备中并非如此。验证过程检查多项内容：\n\n*   `ASR` 是否已安装？\n*   `ILOM`\
  \ 上的 `SNMP` 陷阱是否指向 `ASR` 服务器？\n*   资产是否在 `ASR` 服务器中注册？\n*   是否可以测试事件？\n\n清单 7-12\
  \ 显示了在运行 `ASR` 的 `ODA` 设备上预期的输出。\n\n**清单 7-12. 运行 ASR 验证**\n```\n[root@odab1 bin]#\
