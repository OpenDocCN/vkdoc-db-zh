  如你所见，`populate.pl` 是**构建出色菜单系统**的一个良好开端示例。两个数组被遍历，并与两个变量 `$id1` 和 `$id2` 一起存入数据库。在完成这些简单的数据库插入后，一些
  HTML 标记被发送到浏览器，显示一条消息，表明一切顺利。


  ### page.cgi


  与所有 Perl 脚本一样，我们从 shebang 行开始。我总是把要使用的模块声明在脚本顶部。这样可以一目了然地看到脚本使用了哪些模块。有两个参数传递给脚本：`id1`
  和 `id2`。它们包含在直观命名的 `$id1` 和 `$id2` 变量中。`page.cgi` 展示了将值传递给脚本是多么容易。它还展示了在哪里插入你的数据库调用以及生成
  HTML 内容。


  查看清单 11-3，这是一个完整的脚本，它将 `id1` 和 `id2` 参数存储在名为 `pages` 的表中。另请注意，有一个“hits”列。每次运行脚本时，它都会通过一个非常简单的语句递增该列。


  ```perl

  #!/usr/bin/perl

  use DBI;

  use CGI;

  use CGI::Carp qw(fatalsToBrowser);

  $cgi = new CGI;

  $id1 = $cgi->param(''id1'');

  $id2 = $cgi->param(''id2'');

  ### connect, damnit !!!

  $dbh = DBI->connect(''DBI:mysql:host=localhost;

  database=menu_system'', ''user_name'', ''password'', {''RaiseError'' => 1})

  or die "Cannot Connect to Database";

  $query = qq{INSERT INTO pages (id1, id2) VALUES (''$id1'', ''$id2'') WHERE id2 =
  $id2};

  $sth = $dbh->prepare($query);

  $sth->execute;

  $query = qq{UPDATE pages SET Hits = Hits + 1 WHERE id2 = $id2};

  $sth = $dbh->prepare($query);

  $sth->execute;

  $query = qq{SELECT id1, id2, hits FROM pages WHERE id2 = $id2};

  $sth = $dbh->prepare($query);

  $sth->execute();

  while (@thisid = $sth->fetchrow_array()) {

  $id1 = $thisid[0];

  $id2 = $thisid[1];

  $hits = $thisid[2];

  }

  $sth->finish();

  $dbh->disconnect();

  ### print da shtuff

  print qq{Content-type: text/html\n\n};

  print qq{


  Experiment


  Heading $id1, Page $id2, Visited $hits times


  };

  ```


