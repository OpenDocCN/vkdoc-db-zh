  \ `name=` 和 `value=` 属性。这是浏览器的要求，而不是服务器端脚本的问题。\n\n### 更改文本区域元素的背景颜色\n\n文本域通常相当大，因此它们对页面外观的影响也很大。为它们着色可以给访问者留下独特印象的好方法。我们使用\
  \ `style.background` 属性来更改这一点。你可以在页面加载时将其设置为默认颜色，或根据用户操作随时更改。\n\n我们使用 `onMouseOver`\
  \ 事件来触发在文档头部给出的 JavaScript 函数。着色方法可以声明为命名颜色、十六进制颜色或 RGB 颜色。\n\n```javascript\nfunction\
  \ newColor(color) {\n  document.getElementById('x').style.background=color;\n}\n\
