  新的背景颜色被声明为参数，传递给在文档头部声明的 JavaScript 函数中给出的 `newColor()` 函数。你可以使用变量或数组项作为值。这样，要应用的颜色可以由脚本操作决定，例如根据用户偏好的选择。\n\
  \n### 将背景图像插入文本区域元素\n\n将背景图像插入到你的 `TEXTAREA` 中是打造具有独特外观和感觉网站的有效方式。使用浏览器支持的任何图像格式。`style.background=url`\
  \ 属性用于给出文件的位置，可以是绝对 URL 或相对 URL。\n\n`style.background` 属性的作用类似于你可能在 `BODY` 元素上使用的\
  \ `background=url` 属性。图像按其实际大小显示，如果文本区域小于图像，则任何重叠区域都不会显示。如果文本区域元素大于图像，它将被重复（平铺）。\n\
  \n```javascript\nfunction bgChange(bg) {\n  document.getElementById('x').style.background=\"\
  url(\" + bg + \")\";\n}\n```\n\n将鼠标悬停在图像上。文本区域将获得背景图像。\n\n**清单 6-21**\n将图像插入 HTML\
  \ `TEXTAREA` 元素\n\n我见过一些网站使用背景图像作为给用户的信息指示器。完全可以计算 `TEXTAREA` 中输入的字符数，并根据这些计数值更改显示的图像。随着用户输入，可以将进度条显示为背景图像，让他们了解如果指定了最小值，还需要添加多少字符，或者如果指定了最大值，还剩下多少字符。\n\
  \n### 预加载和存储图像\n\n图像预加载是你将反复使用的一项基本技能。试想一下：你已经加载了页面，并且有一个菜单系统，其图像在鼠标悬停时会发生变化。页面加载后，用户执行此操作，但在鼠标滑过该区域和新图像显示之间存在延迟。这是因为浏览器必须获取新图像并将其显示出来。如果你在页面加载时将图像预加载到变量中，并在鼠标悬停时触发其显示，则可以消除这种延迟。这个过程本质上是即时的，效果很好。\n\
  \n```javascript\nimg2=new Image();\nimg2.src=\"image1.gif\";\nfunction changeImage()\
  \ {\n  document.getElementById('myImage').src=img2.src;\n}\n```\n\n当您将鼠标悬停在图像上时，将显示一个新图像。\n\
  \n**清单 6-22**\n预加载和存储图像\n\n我们使用 `onMouseOver` 事件来触发在文档头部声明的 JavaScript 函数。原始图像会一直显示，直到鼠标悬停在其上。然后显示新图像。请注意，如果你想切换回原始图像，必须提供一个不同的函数名称（包含原始文件名），并使用\
  \ `onMouseOut` 事件来触发它。\n\n### 更改图像的大小\n\n完全有可能更改图像的大小。你可以将更改应用于同一图像，或者下载新图像并显示调整大小后的版本。我们使用\
  \ `getElementById()` 方法来访问与该图像关联的数据，在本例中是图像的尺寸。可以命令浏览器以非图像实际大小的尺寸显示图像。因此，可以动态更改图像尺寸。\n\
  \n```javascript\nfunction moveover() {\n  document.getElementById('image').width=\"\
  200\";\n  document.getElementById('image').height=\"360\";\n}\nfunction moveback()\
  \ {\n  document.getElementById('image').width=\"100\";\n  document.getElementById('image').height=\"\
  180\";\n}\n```\n\n将鼠标悬停在图像上：\n\n**清单 6-23**\n更改图像的大小\n\n如果你要调整图像大小，有几件事需要考虑。首先是简单的页面布局。如果你使用包含要调整大小的图像的表格，则会在调整大小时更改整个表格。大多数情况下，这不是你想要的结果，因此有时谨慎的做法是考虑新图像的尺寸。在表格的\
  \ `TD` 元素内，将 `TD` 区域的大小声明为最大图像维度的大小。这样，表格就不会因过大的图像而改变，页面也会如你所愿地呈现。\n\n### 更改图像的源\n\
  \n你可能需要更改正在处理的页面上该空间显示的图像位置。这可以通过 `src` 属性声明来完成。页面元素通过 `getElementById()` 方法访问，然后图像被更改。图像可以是不同的图像，也可以是位于其他位置的同一图像的副本。\n\
  \n```javascript\nfunction moveover() {\n  document.getElementById('image').src=\"\
  imageon.gif\";\n}\nfunction moveback() {\n  document.getElementById('image').src=\"\
  imageoff.gif\";\n}\n```\n\n**清单 6-24**\n更改要使用的源图像\n\n\n\n## 动态网页效果教程\n\n### 图像鼠标事件\n\
  我们使用`onMouseOver`事件触发第一次改变，使用`onMouseOut`事件将图像变回原始状态。这对于需要位于不同目录甚至不同服务器上的图像很有优势。根据需要，URL\
  \ 可以声明为绝对路径或相对路径。如果要更换服务器，请务必使用绝对路径`http://www.domain.com/`以避免混淆。\n\n### 改变图像位置\n\
  你是否访问过有飞动横幅的页面？这种引人注目的显示选项有许多用途。有些人将其发挥到极致，但现在，我们将保持简单。这是快速理解动态定位概念的一个很好的练习。\n\n\
  我们将同时使用绝对定位和相对定位技术。第一个位置是绝对的，第二个位置是相对于第一个绝对位置的。如果需要，你可以使用增量运算符（`++`）将文档坐标逐个改变，甚至使用加法运算符（`+`）以十为单位跳跃（或任何给定的数字）。`style.left`属性用于以像素为单位给出图像位置。你可以在这里声明一个静态值，也可以使用变量或数组项通过脚本操作获得新坐标。\n\
  \n图像可以是任何尺寸或格式，只要该格式受浏览器支持。动态更改图像也是一个很好的效果。\n\n我们使用`getElementById()`方法来访问该图像的显示属性，包括它在页面上的位置。必须在`IMG`元素中声明`id`属性，以便浏览器识别要定位的元素。\n\
  \n```javascript\nfunction moveleft() {\n    document.getElementById('image').style.position=\"\
  absolute\";\n    document.getElementById('image').style.left=\"0\";\n}\nfunction\
  \ moveback() {\n    document.getElementById('image').style.position=\"relative\"\
  ;\n}\n\n清单 6-25\n处理图像定位\n```\n\n要更改回原始位置，需使用相对定位方法。它会调用图像在页面上的原始位置并相应地操作。如果你要在页面中的表格内移动图像，必须考虑图像将在其中移动的区域，否则表格将自动调整以适应新的图像位置。例如，如果你要将一个宽度为\
  \ 100 像素的图像在两个方向上各移动 10 像素，则包含它的`TD`元素中必须留有 120 像素宽的空间——左边 10 像素，右边 10 像素，加上原始 100\
  \ 像素宽的图像。\n\n### 改变背景图像\n只需更改`BODY`标签的该参数，即可更改整个文档的背景图像。我们将使用`document.body.background`语句来实现这一点。背景图像可以是浏览器支持的任何格式。其位置可以声明为绝对路径或相对路径。\n\
  \n根据正常功能，要显示的背景图像将按其实际尺寸显示。如果图像大于浏览器窗口区域，则大于窗口的图像部分将不会被显示。如果背景图像小于浏览器窗口，则图像将重复（平铺）以填充剩余的背景区域。\n\
  \n```javascript\nfunction bgChange(bg) {\n    document.body.background=bg;\n}\n\n\
  清单 6-26\n更改背景图像\n```\n\n另外请注意，这可以在表格中使用——而不仅仅是整个显示文档。只需更改文档头部 JavaScript 函数中给出的\
  \ DOM 语句。表格可以选择显示图像作为背景，因此研究一下这个可能是个好主意。在这种情况下使用`getElementById.style.background`语句。根据需要提供图像的位置，并使用`onLoad`事件处理程序在页面加载时应用背景图像，或使用`onMouseOver`事件在用户选择时显示背景图像。\n\
