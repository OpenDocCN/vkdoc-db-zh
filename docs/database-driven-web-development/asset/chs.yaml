  \n一个标题为 \"Apache HTTP server 2.2 安装向导\" 的窗口截图。该页面显示正在安装 Apache HTTP server 2.2.21。选定的程序功能正在安装。下方提供了安装过程的状态。\n\
  \n### 图 9-7\n\n安装进度窗口。\n\n进度条消失后，您的计算机显示图 9-8，表示您已完成安装。现在 Apache Web 服务器已在您的工作站上。\n\
  \n![](img/485616_2_En_9_Fig8_HTML.jpg)\n\n一个标题为 \"Apache HTTP server 2.2 安装向导\"\
  \ 的窗口截图。模板页面显示已完成的安装向导窗口。\n\n### 图 9-8\n\n安装完成窗口。\n\n## Apache 和 DBI.pm\n\nPerl\
  \ 的 `DBI` 模块可能是已投入生产的最佳模块之一。借助它，您能够及时有效地与多个流行的数据库服务器进行交互。`DBI` 提供的方法使得连接和与数据库交互变得简单而有效。以下所有示例均假设您使用的是当前版本的\
  \ `MySQL`。\n\n首先，让我们专注于连接到数据库。与所有 Perl 事物一样，有几种不同的方法可以做到这一点，并且都可以是正确的。我们将使用我所见过的连接到\
  \ `MySQL` 数据库的最常见语法。\n\n您在使用数据库时遇到的错误原因，与使用系统调用时类似。正如您应该始终检查系统调用的返回码一样，您也应该始终检查数据库调用的返回状态。最简单的方法是将\
  \ `DBI` 的 `RaiseError` 属性设置为 `1`。首先，您需要连接到数据库并检查返回值。您将设置 `RaiseError` 属性，如代码清单 9-1\
  \ 所示。\n\n\n### 连接到 MySQL 数据库\n\n```perl\n$dbh = DBI->connect('DBI:mysql:host=127.0.0.1;database=tvalentine3',\
  \ 'tvalentine', 'valentine1',\n{'RaiseError' => 1}) or die \"Cannot Connect to the\
  \ database:\", $DBI::errstr;\n```\n*列表 9-1 连接到 MySQL 数据库*\n\n通过这样做，你确保任何数据库错误都会引发\
  \ `DBI` 抛出 `die`。\n如果你正在编写数据库应用程序并遇到了数据库错误，你不希望继续执行，好像什么都没发生一样。你也可以在 `eval` 中捕获\
  \ `die`——只要确保你处理了错误，而不是忽略了它。\n\n### 使用占位符\n\n这就是连接到数据库；现在让我们来研究使用占位符而不是字面值。许多人总是建议在数据库调用中使用占位符而不是字面值。这可以加快执行速度，并通常使数据库调用更快、更可靠。请看下面的例子：\n\
  \n```perl\n$dbh->do(qq{INSERT INTO $this_table (col1, col2, col3)\nVALUES (?, ?,\
  \ ?)}, undef, '$col1', '$col2', '$col3');\n```\n\n我们在一行中插入了三列：`col1`，`col2` 和 `col3`。我们所做的是将占位符用作数据库插入的值，并提供了包含实际要插入数据的变量。这是一种执行数据库调用的简单且非常快速的方法。\n\
  \n### 处理 SELECT 语句\n\n现在让我们专注于 `SELECT` 语句。当你执行一个 `SELECT` 语句时，你显然希望尽快取回数据。最快的方法是使用\
  \ `bind_columns()` 和 `fetchrow_array()` 方法。`bind_columns` 将 Perl 变量绑定到 `SELECT`\
  \ 语句返回的列。例如，如果你有以下 SQL 语句：\n\n```sql\nSELECT id, name, postid FROM $thistable\n\
  ```\n\n你会希望使用 `bind_columns()` 方法将三个变量绑定到相关联的列。因此，你设置好变量，然后使用 `bind_columns` 来绑定它们：\n\
  \n```perl\n$sth->bind_columns(undef, \\$id, \\$name, \\$postid);\n```\n\n传递给 `bind_columns`\
  \ 的第一个参数实际上是一个哈希引用，用于指定要与此特定方法关联的 `DBI` 属性。我们不想为此特定方法关联任何属性，所以我们只传递 `undef`，这是完全可以的。在你对语句句柄调用\
  \ `execute` 之后，你需要获取数据。为此，请使用 `fetchrow_array()` 方法，该方法获取下一行并返回一个包含字段值的数组引用。但你并不需要使用该数组引用，因为你已经将列值绑定到了\
  \ Perl 变量，你可以直接使用它们，如 **列表 9-2** 所示。\n\n```perl\nwhile (@this_data = $sth->fetchrow_array())\
  \ {\n    $id = $this_data[0];\n    $name = $this_data[1];\n    $postid = $this_data[2];\n\
  }\n```\n*列表 9-2 选择和检索三个数据库项*\n\n每次你在语句句柄上调用 `fetchrow_array()` 时，绑定变量的值都会被更新。\n\n\
  ### mod_perl 与 DBI\n\n现在让我们看看 `mod_perl`。`mod_perl` 的部分目的是让 Perl 程序在 Apache web\
  \ 服务器上运行得更快。`mod_perl` 通过将 Perl 解释器构建到 web 服务器中并编译你的程序到内存中来实现这一点。因此，当它收到一个新请求时，它会将该请求映射到一个已编译到内存中的程序，从而大大加快速度。如果你打算将\
  \ `DBI` 与 `mod_perl` 一起使用，你会希望确保你的数据库事务也很快，因为你不想让数据库成为瓶颈。实现此目标的最简单方法是使用 `Apache::DBI`\
  \ 模块，它为你的程序提供持久的数据库连接。它通过覆盖 `DBI` 的 `connect` 方法并保持一个开放数据库句柄的缓存来实现这一点。`Apache::DBI`\
  \ 最好的一点是，你不需要修改你现有的 `DBI` 代码来使用它。只需在你的 `use DBI;` 调用之前添加以下内容：\n\n```perl\nuse Apache::DBI;\n\
  ```\n\n你甚至不需要移除调用 `disconnect` 的代码，因为 `Apache::DBI` 会覆盖这些调用并确保句柄实际上不会被断开连接。这种持久连接通过避免为脚本的连续调用而重新连接数据库来加快执行速度——因为一个开放的数据库连接已经存在。\n\
  \n## 启动 Apache 服务器\n\n正确启动你的 Apache 服务器是一项简单但重要的任务。`httpd` 在被调用时做的第一件事是定位并读取配置文件\
  \ `httpd.conf`。在此文件中包含了 Apache 服务器启动的位置和设置。你将指定你的根 web 位置是什么，以及其他几十个配置指令。\n在启动期间，Apache\
  \ 服务器解析 `httpd.conf` 文件，并将该文件中的设置和指令应用到该 Apache 服务器实例。你的文件位置可以在当前机器上的任何位置，无论是在 Linux\
  \ 操作系统还是 Windows 操作系统上。在安装 Apache 之前，默认用户已熟练掌握这两种操作系统中的一种或两种。\n\n### 在 Windows 操作系统上启动\n\
  \n在 Windows 操作系统上安装时，你可以选择从源代码编译服务器的文件或使用预编译的二进制文件。如果你的 Windows 版本高于 Windows 98\
  \ 并且 `MSI` 安装程序是最新的，你可以下载 `.msi` 包在你的 Windows 机器上安装 Apache。这是推荐的做法，因为它大大简化了安装过程，并确保安装程序能处理和修复可能发生的任何错误。`MSI`\
  \ 安装程序是一个内部包含了在 Windows 操作系统上安装几乎所有程序规则的程序。\n\n在 Windows 操作系统上启动是一件容易的事情。你只需指定 `Apache.exe`\
  \ 文件的路径以及一两个开关。然后你给出 `httpd.conf` 文件的位置和 Apache 源文件目录的根目录：\n\n```cmd\nC:\\Apache\\\
  bin\\Apache.exe -w -f \"C:\\Apache\\conf\\httpd.conf\" -d \"C:\\Apache\"\n```\n\n\
  首先，我们声明了 `Apache.exe` 可执行文件的路径。然后我们包含了启动开关。接下来，我们包含了 `httpd.conf` 文件的路径以用于启动选项。最后，我们给出了\
  \ Apache 安装的根目录位置。\n\n## 停止或重启服务器\n\n为了停止或重启 Apache，你必须向正在运行的 `httpd` 进程发送信号。我们将先检查在\
  \ Windows 机器上停止服务器。在大多数情况下，这就像按下 `Ctrl+C` 一样简单，因此我们不会深入探讨在 Windows 机器上停止 Apache\
  \ 服务器。相反，让我们专注于命令行开关，除了可执行文件的路径外，这些开关在 Linux 和 Windows 操作系统上是相同的。\n有许多开关可用于启动、停止或重启服务器。这些开关的完整列表超出了本书的范围。但是，Apache\
  \ 安装附带的手册解释了所有这些开关以及更多内容——建议你在使用 Apache 固有的任何高级功能之前阅读该手册。\n\n### 停止 Apache 服务器\n\
  \n停止你的 Apache 安装是一件非常容易的事情，但为了你将来能使用 Apache，必须涵盖这一点。以下命令显示了如何在 Linux 系统上停止 Apache\
  \ 服务器：\n\n```bash\napachectl -k stop\n```\n\n此示例假设你位于 Apache 的工作目录内。如果不是，那么你需要使用\
  \ `apachectl` 可执行文件的完整路径。\n在 Windows 上，有两种选择可以停止已启动并在控制台中运行的 Apache web 服务器。你可以按\
  \ `Ctrl+C` 退出，或者转到任务管理器窗口并从那里退出程序。\n\n### 优雅地重启 Apache 服务器\n\n\n\n重启服务器有几种方式。你可以使用命令行指令，或者通过操作系统来停止\
  \ Apache 进程。然后，你需要按照本文档前面章节给出的流程来重启服务器。请检查以下命令：\n\n```\napachectl -k graceful\n\
  ```\n\n**优雅重启**会在所有等待中的服务器调用完成后重启服务器。服务器随后会重启并接受新的调用。这样做的好处是在重启前完成所有等待中的服务器调用。通常在修改了\
  \ `httpd.conf` 文件中的配置后，你会以这种方式重启。\n\n## 审查运行时配置指令\n\n运行时配置指令是 Apache 用于启动服务器的命令和配置说明。这类指令大约有\
  \ 200 条，因此全面解释这些指令超出了本书的范围。关于每个运行时配置指令详尽而详细的解释，请参阅 Apache 发行版附带的手册。\n\n运行时指令大致分为九种类型。它们是：服务器配置、虚拟主机、目录、`.htaccess`、核心、MPM（多处理模块）、基础、扩展和实验性。每种运行时配置类型都是\
  \ Apache 服务器配置不可或缺的一部分，并在服务器启动时读取。\n\n配置指令在 `httpd.conf` 文件内被分为三个基本部分：\n\n1.  控制\
  \ Apache 服务器进程整体操作的指令（“全局环境”）。\n2.  定义“主”或“默认”服务器参数的指令，该服务器响应未被虚拟主机处理的请求。这些指令也为所有虚拟主机的设置提供默认值。\n\
  3.  虚拟主机的设置，允许将 Web 请求发送到不同的 IP 地址或主机名，并由同一个 Apache 服务器进程处理。\n\n随着服务器的进一步使用以及阅读\
  \ Apache 手册，你会逐渐了解每种类型指令的作用。\n\n### 设置服务器根目录\n\n服务器根目录是 Apache 可执行文件和配置文件在本地计算机上的存储位置。\n\
  \n```\nServerRoot \"C:/Apache \"\n```\n\n`ServerRoot` 指令告诉 Apache 服务器网站文档、可执行文件和配置文件的起始位置。\n\
  \n### 设置服务器名称\n\n服务器名称是 Apache 服务器将为其提供文件的域名。你可以指定一个域名或 IP 地址作为服务器名称属性，但在本例中，你需要输入本地环回地址：`ServerName\
  \ 127.0.0.1`\n\n`ServerName` 指令告诉 Apache 服务器其 URL 应该是什么。如果你将 Apache 用作自己桌面计算机上的开发服务器，请使用“127.0.0.1”作为服务器名称。这是本地环回地址，允许你从本机向本机提供页面。\n\
  \n### 设置文档根目录\n\n文档根目录是将为你的网站提供页面的目录位置。它以文件系统路径的形式给出。以下示例是 Windows 计算机上的文档根目录：\n\
  \n```\nDocumentRoot \"C:\\Apache\\htdocs\"\n```\n\n`DocumentRoot` 指令告诉服务器将在哪里找到要提供的\
  \ HTML 文件，并反映了你的文件系统结构。它也用于显示用于 Perl 脚本的 CGI-BIN 的大致位置。\n\n### 设置 CGI-BIN 位置\n\n\
  为了在你的 Apache 安装中使用 Perl，需要在本地计算机上安装 Perl。CGI-BIN 位置显示了你的 Apache 服务器将提供服务的 Perl 脚本的位置：\n\
  \n```\nScriptAlias /cgi-bin/ \"C:\\apache\\htdocs\\cgi-bin\\\"\n```\n\n该示例设置了 `ScriptAlias`\
  \ 位置。这告诉服务器期望找到 CGI 脚本的位置。你的 `ScriptAlias` 不必位于文档根目录或服务器根目录内——你可以将其放在本地计算机上任何支持的操作系统的任何位置。\n\
  \n你可以将 CGI-BIN 的位置和名称指定为非标准形式。Apache 为那些不符合常规的服务器配置提供了此功能。使用这种方式进行配置虽然不是常规做法，但可以作为一种有趣的方式，按照你的规格个性化你的网站。你甚至不必让\
  \ CGI 脚本以 `.cgi` 或 `.pl` 扩展名结尾。你可以使用一些描述性的东西来符合你网站的主题。只需运用后续页面中的知识来更改 Apache 指令，以符合你的主题。\n\
  \n你需要做的是修改 `httpd.conf` 文件中的默认设置，该文件是 Apache 在启动时使用的主要配置文件，用于应用你选择的设置。这些设置不必包含默认设置——你可以指定任何你喜欢的内容。我遇到过几个大型网站，它们使用了这样的自定义设置。它们利用了网站主题的优势，为配置文件添加了定制化的风格，这种风格会反映在浏览器的地址栏中。\n\
  \n## 总结\n\n在本章中，我们了解了 Apache Web 服务器。如我们所触及的，Apache 是一个很好的服务器。它是一个功能强大且能干的服务器，提供了许多配置选项。Apache\
  \ 的每一个选项和所有功能可能性都超出了本书的范围——它本身就可以成为一本书。\n\n# 10. 脚本化电子邮件：使用 sendmail\n\n本章将介绍 `sendmail`，这是一个广为人知的\
  \ Linux 守护进程，使你能够调度和发送大量电子邮件。我将向你展示如何使用 Perl 脚本，配合从数据库中取出的值，快速轻松地完成此操作。\n\n## 准备工作\n\
  \n首先，我们必须奠定基础，从一些简单的 HTML 标记开始。允许 `FORM` 控件上传图像的 HTML 代码很简单，但其组成部分非常重要。我们将用于本节讨论的\
  \ HTML 标记如代码清单 10-1 所示。\n\n```\n1.\n2.\n3.\n代码清单 10-1\nHTML 标记\n```\n\n如你所见，显示了三个文件字段。每个字段都有一个唯一的\
  \ `name` 属性，并按逻辑顺序列出。“file” 输入类型告诉浏览器期望某种文件上传。`enctype=\"multipart/form-data\"`\
  \ 对于上传的成功至关重要，不能省略。文件的名称和数据（文件内容）以两个完全独立的部分发送到服务器。因此，它被称为多部分表单。\n\n我在示例中使用的简单 HTML\
  \ 确实就是构成一个美观页面元素所需的全部内容。现在让我们进入上传脚本本身。与所有 Perl 脚本一样，脚本从其第一行开始，该区域称为 shebang（释伴）。Linux\
  \ 服务器是 Web 上的常态，因此找到 `Perl.exe` 的路径通常是 `#!/usr/bin/perl`。\n\n路径可以是任何内容，但在描述对象的路径时，最好遵循常规约定和协议。在\
  \ Windows 计算机上，shebang 通常如代码清单 10-2 所示。\n\n```\nC:\\Progra~@\\Perl\\bin\\perl\n\
  代码清单 10-2\nWindows 工作站上的 shebang\n```\n\n要处理的第一段 Perl 脚本如代码清单 10-3 所示。\n\n```\n\
  $thisfilename0 = $cgi->param('FILE0');\n$thisfilename1 = $cgi->param('FILE1');\n\
  $thisfilename2 = $cgi->param('FILE2');\n$thisfile0 = $cgi->upload('FILE0');\n$thisfile1\
  \ = $cgi->upload('FILE1');\n$thisfile2 = $cgi->upload('FILE2');\n代码清单 10-3\n必需的\
  \ param() 和 upload() 代码片段\n```\n\n\n如同往常，在设计脚本时需要考虑诸多因素。我发现，在脚本顶部处理参数和数据效果最佳，因为\
  \ Perl 是从上到下读取和执行的。同时我也认识到，始终保持脚本尽可能简单总是最佳实践。可以看到，所有变量都具有唯一标识。\n\n开发者编写第一个上传器时最常犯的错误，是仅使用\
  \ `param()` 方法来捕获数据，或仅使用 `upload()` 方法来捕获数据。实际上必须同时使用这两种方法，正如前一个代码块所示。使用 `param()`\
  \ 方法处理文件名，而文件内的数据则通过 `upload()` 方法传输。\n\n接下来便是有趣的部分。本节我们将处理文件和 Perl 模块，那么首先说明我为何要使用\
  \ `length()` 方法进行文件操作。我检查变量长度的原因是为确认 HTML 输入字段是否留空。共有三个文件上传位置。我通过检查变量长度来判断输入字段是否为空。若为空，则不会向\
  \ `@thumb` 和 `@thesefiles` 推送数据。这将影响代码清单 10-4 中的代码逻辑。\n\n```\n$thisLength0 = length($thisfilename0);\n\
  if ($thisLength0 > 0) {\nopen(FILE0, \">/$dirPath/$thisfilename0;\nwhile() {\nprint\
  \ FILE0;\n};\nclose FILE0;\npush @thumb, \"tn_\" . $thisfilename0;\npush @thesefiles,\
  \ $thisfilename0;\ncopy (\"/$dirPath/$thisfilename0\",  \"/$dirPath/tn_$thisfilename0\"\
  );\n};\n代码清单 10-4\n检测数据长度并执行相应操作\n```\n\n在检测 `$thisfilename0` 后，简单的 `if` 语句将决定是否创建、存储并命名文件。接着是\
  \ `while()` 语句，用于读取 `$thisfile0` 中的数据。随后 `print FILE0` 语句将数据写入以 `$thisfilename0`\
  \ 命名的文件。之后数据流被关闭。\n\n为正确引用存储数据的变量名（尤其是文件名），我将文件名和缩略图名称分别推送到数组 `@thumb` 和 `@thesefiles`。通过对原始文件名进行简单拼接可知，将为上传的文件生成缩略图，其名称以\
  \ `tn_` 开头。\n\n```\n$count = \"0\";\nforeach (@thesefiles) {\n// 根据需要调整原始图像尺寸。高度需超过\
  \ 1500，宽度需超过 640\n// 获取上传文件的尺寸\n($globe_x, $globe_y) = imgsize(\"/$dirPath/$thesefiles[$count]\"\
  );\n// 判断是否需要调整原始图像尺寸\nif (($globe_x or $globe_y) > 640) {\n// 通过 if 语句规避 x/y 除零风险\n\
