  );\n$image->Resize(geometry => \"$newheight1x$newwidth1\");\n$image->Write(\"/$dirPath/$thesefiles[$count]\"\
  );\n};\n```\n\n接下来是调整图像尺寸的决策环节。首先需要生成的比例关系是 `$globe_x` 与 `$globe_y` 的比值，即 `$ratio\
  \ = $globe_y / $globe_x`。随后通过 `if` 语句检测尺寸：若超过 640，则 `globe_y` 设为 640，`$globe_x`\
  \ 设为 `$globe_y / $ratio` 的计算结果。当宽度超过 640 像素限制时，`$newwidth1` 将取 `$globe_x` 的整数值作为最终调整前的参数。\n\
  \n判断图像宽度是否需要调整的同一套代码，也用于计算最大高度。高度超过 1500 像素的图像将被调整尺寸。\n\n现在将进行实际图像处理。通过创建新的 `Image::Magick`\
  \ 对象来调用该模块，随后依次执行三行独立操作：`Read()`、`Resize()` 和 `Write()`。\n\n我们从 `$count = \"0\"\
  ` 声明开始。基于零值的 `$count` 将输入 `foreach` 循环。每次循环迭代时，都会生成一个保持比例的 100×100 像素缩略图，如代码清单 10-5\
  \ 所示。\n\n```\n## 开始处理 @thumbs 数组\n$count = \"0\";\nforeach (@thumb) {\n### 开始处理\
