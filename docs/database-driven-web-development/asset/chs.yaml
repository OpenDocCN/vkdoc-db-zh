  var intHide;\nvar speed=3;\nfunction show_hide_menu() {\n    if (c==0)\n    {\n\
  \        c=1;\n        clearInterval(intHide);\n        intShow=setInterval(\"show()\"\
  ,10);\n    } else {\n        c=0;\n        clearInterval(intShow);\n        intHide=setInterval(\"\
  hide()\",10);\n    }\n}\nfunction show() {\n    if (i-135)\n    {\n        i=i-speed;\n\
