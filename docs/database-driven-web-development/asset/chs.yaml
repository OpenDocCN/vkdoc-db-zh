  这是有趣的一章。我们探讨了日期和时间格式、加载链接以及外部内容模板。研究了一些 SQL 命令，并讨论了关于收集数据库生成内容和应用 HTML 标记的注意事项。我们还开启了文件和图像上传的讨论，这些主题将在后续章节中扩展。


