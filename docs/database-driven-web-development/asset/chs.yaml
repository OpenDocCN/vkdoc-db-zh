  项目三\n项目四\n项目五\n```\n清单 6-34：点击驱动的水平菜单\n\n菜单项可以如你所愿地设置多个，而且它们不一定非得像我这里这样放在单独的一列中。多列菜单是完全可能的——如果它可以在普通页面中渲染，你就可以将其包含在你的菜单中。\n\
  \n\n### 返回光标坐标\n\n如果您要在网页开发中使用任何类型的定位功能，了解并理解浏览器如何重新计算、返回和修改坐标是绝对必要的。\n\n浏览器中的坐标由\
  \ X 轴和 Y 轴表示。浏览器内置了各自独立的对象和方法来读取或修改 X 和 Y 值。\n\n我们将使用 `event.clientX` 和 `event.clientY`\
  \ 属性来返回函数触发时，鼠标指针尖端在网页上当前位置的精确坐标值。该值会非常快速地返回，您也可以通过脚本操作同样迅速地对该值进行操作和修改。\n\n您会在任何具有可移动按钮或飘浮横幅的页面中看到这段代码。这是一个通用操作，因此最好仔细研究并记住它。它比听起来简单得多。\n\
  \n```javascript\nfunction show_coords(event) {\n    x = event.clientX;\n    y =\
  \ event.clientY;\n    alert(\"X coords: \" + x + \", Y coords: \" + y);\n}\n```\n\
  \n点击任意位置以返回鼠标位置\n\n列表 6-35\n返回光标坐标\n\n注意到这有多简单了吗？不过，这非常重要。该脚本设置为在您点击文档任意位置时显示一个警告框，这是通过作为\
  \ `BODY` 元素属性放置的 `onClick` 事件处理程序来实现的。\n\n### 让文本跟随光标\n\n您可以指示浏览器让一串文本在活动窗口内跟随光标移动。我们首先确定鼠标指针的\
  \ X 和 Y 坐标。然后我们确定文本应该呈现的样式想法，并使用常见的 CSS 规则来分配它们。\n\n定位被确定，文本被设置为跟随指针，同时 X 和 Y 坐标在文档头部的\
  \ JavaScript 函数的冒泡顺序中被生成和传递。\n\n文本实际上一直存在——我们只是用 `style.visibility` 属性将其设置为隐藏，并在需要时设置为可见。当您沿\
  \ X 轴或 Y 轴移动光标 1 个像素时，`onMouseMove` 事件处理程序会触发 JavaScript 函数。如果您保持不动，文本也会保持不动。\n\n\
  为了对移动的渲染进行更精细的控制——如果看起来有些抖动——只需修改脚本每次迭代中 X 或 Y 轴递增的量即可。较小的值会使外观更平滑，但如果您在光标后显示大量文本或者计算机使用负载很高，可能会稍微滞后。如果担心这一点，可以增加定位的增量，文本会移动得更快并紧跟光标。\n\
  \n```javascript\nfunction cursor(event) {\n    document.getElementById('trail').style.visibility\
  \ = \"visible\";\n    document.getElementById('trail').style.position = \"absolute\"\
  ;\n    document.getElementById('trail').style.left = event.clientX + 10;\n    document.getElementById('trail').style.top\
  \ = event.clientY;\n}\n```\n\n光标文本\n\n列表 6-36\n让文本跟随指针\n\n您也可以分配一个图像来跟随光标。只需为图像版本声明一个简单的\
  \ `IMG` 元素，并使用与文本版本相同的前述属性即可。坐标系统对文本和图像的工作方式相同，因为它最初不是基于文本或图像的位置，而是基于鼠标指针的位置。\n\n\
  ## 总结\n\n我们在本章中涵盖了很多内容。我们探讨了 HTML、CSS、DOM 和 JavaScript 如何在网页中协同工作。我们涉及了格式和设计。我们介绍了诸如创建和加载变量与数组——以及使用其中包含的内容等概念。\n\
  \n# 7. 安装和使用 Perl 服务器\n\n本章内容简短，因为安装和使用 Perl 服务器需要了解的知识就这么多。在大多数情况下，操作都很简单且直观明了。\n\
  \n## Perl 在哪里？\n\n如前一章所述，任何 Perl 脚本的第一行被称为 *shebang*。它是 Perl 可执行文件在硬盘上的位置。在 Linux\
  \ 操作系统上，通常是 `#!/usr/bin/perl`。\n\n在 Windows 操作系统上，Perl 的位置有点复杂且不太直观。所有可用的 Perl `.msi`\
  \ 软件包都直接安装到 `c:\\Program Files\\Perl\\bin\\perl.exe`。这有一个非常恼人的缺点，即单词 Program 和单词\
  \ Files 之间的空格会导致错误，因为脚本和其他程序会被这个讨厌的空格卡住。为了解决这个问题，Perl 的路径应该是 `#!c:/progra~1/perl/bin/perl.exe`。\n\
  \n我建议将 Perl 安装到 C 盘的根目录，如下所示：`C:\\Perl\\bin\\perl.exe`。您必须在安装 Perl 二进制文件时指定此路径。\n\
  \n## 准备您的工作站\n\n与大多数软件安装一样，您需要关闭所有程序，并务必先保存您的工作。所有程序关闭并保存工作后，双击您下载的 `.msi` 软件包开始安装。此\
  \ `.msi` 软件包的名称取决于您决定使用的 Perl 版本。\n\n## 安装 Perl 服务器\n\n单击 `.msi` 软件包后，安装将被一个窗口中断，该窗口要求安装程序获得对您的操作系统进行更改并安装程序的许可。如果您拒绝，安装将立即停止。\n\
  \n安装程序的第一个窗口总会有一个徽标屏幕。某些版本的 Perl 将最终用户许可协议放在第一个窗口中。如果协议不在第一个窗口，那它就在第二个窗口。单击“我同意”以接受合同条款。\n\
  \n接下来是一个窗口，询问要安装什么或安装到硬盘的哪个位置。默认情况下，对于 Windows 工作站，此位置是 `C:\\Program Files\\Perl`，对于\
  \ Linux 工作站是 `#!/usr/bin/perl`。\n\n如果第二个窗口不是安装选项，那么第三个窗口将是。我建议您安装所有内容。这包括 Perl 可执行文件和支持库，以及关于如何使用\
  \ Perl 服务器的文档。包含文档会使安装时间增加大约两分钟。\n\n## 需要考虑的主题\n\n安装期间需要考虑的主题之一就是 Perl 的位置。我建议您在\
  \ Windows 操作系统上的路径为 `C:\\Perl`。这与默认路径相悖，但您将来实际上会从中受益。\n\n如果您在安装时使用默认路径，某些程序不喜欢 Program\
  \ 和 Files 之间的空格。有一个变通方法，但有点不直观。一些不喜欢空格的程序需要路径 `C:\\Progra~@\\Perl` 才能运行。安装到 `C:\\\
  Perl` 允许这些遗留程序找到 Perl，而无需添加额外的工作，例如包含 `PATH` 语句（这是对操作系统的直接更改，超出了本书的范围）。\n\n## Perl\
  \ 随时待命\n\nPerl 最好的一点是，您无需启动服务器或服务即可使用 Perl 服务器的全部功能。它总是准备好接受工作。每个 Perl 脚本的第一行给出了\
  \ Perl 可执行文件的位置。Perl 服务器会以最小的麻烦迅速启动。\n\nPerl 是一种内联语言，意味着执行从脚本顶部开始，向下移动，按照放置在脚本主体中的指令执行。\n\
  \n\n\n## 安装 Perl 模块\n\n在 Perl 服务器上，额外的功能来自于 Perl 模块。Perl 模块是一个软件包，用于增强和扩展标准 Perl\
  \ 安装的功能。最常用的 Perl 模块随安装二进制文件标准提供，并可通过其 `.pm` 扩展名识别。我们将广泛使用的两个 Perl 模块是 `DBD.pm`\
  \ 和 `DBI.pm`。它们允许 Perl 脚本与数据库服务器（您将在下一章中安装）进行交互。\n\n安装 Perl 模块有两种方法——使用 `CPAN.bat`\
  \ 和 `PPM.bat`。大多数情况下它们都能正常工作，但由于有数千个 Perl 模块可供选择，您可能需要在 `CPAN` 和 `PPM` 之间切换才能成功安装。也就是说，如果一种方法不起作用，请尝试另一种。\n\
  \n有些模块依赖其他模块来完成其功能。例如，前面提到的 `DBD.pm` 必须在安装 `DBI.pm` 之前安装。如果您遗漏了 `DBD.pm` 而只安装了 `DBI.pm`，将会引发致命错误。大多数情况下，安装程序知道需要安装哪些模块并会自动安装它们，过程非常简便。\n\
  \n### CPAN.bat\n\n`CPAN` 代表 Comprehensive Perl Archive Network（综合 Perl 档案网）。它是您将在后续章节项目中安装\
  \ Perl 模块的方式。Perl 模块的网站是 `CPAN.org`。它是 Perl 提供的所有功能的易用且完整的列表。\n\n要启动 `CPAN.bat`，只需双击您在\
  \ `Perl/bin` 目录中找到的链接。将打开一个带有闪烁光标的对话框，表示 `CPAN.bat` 已准备就绪。然后在命令提示符处输入问号，`CPAN.bat`\
  \ 的帮助选项将如图 7-1 所示出现。\n\n![](img/485616_2_En_7_Fig1_HTML.jpg)\n\n*一个标题为 C slash window\
  \ slash systems 32 slash C M D. E X E 的输出窗口截图。页面包含显示信息、命令参数、升级已安装模块、指令和其他。*\n\n\
  **图 7-1**\nCPAN.bat 帮助选项\n\n只需输入如下指令：\n```\nInstall DBD\n```\n`CPAN.bat` 就会开始工作并安装\
  \ `DBD.pm` 模块。如本章前面所述，请在安装 `DBI.pm` 之前执行此操作。如前所述，`CPAN.bat` 通常知道安装每个模块的全部功能需要哪些库。\n\
  \n### Perl 包管理器 (PPM)\n\nPerl 包管理器是安装 Perl 模块的另一种方法。有人说它更易用，可能确实如此，但 `PPM` 的功能存在限制。例如，`CPAN.bat`\
  \ 知道迄今为止创建的几乎每个模块所需安装的库。`PPM` 没有一个全面的数据库，因此有时 `PPM` 无法工作。\n\n与 `CPAN.bat` 一样，只需双击\
  \ `ppm.bat` Windows 批处理文件。将显示一个命令对话框。在命令提示符处输入单词 `help`，将出现如图 7-2 所示的屏幕。\n\n![](img/485616_2_En_7_Fig2_HTML.jpg)\n\
  \n*一个标题为 C slash windows slash system 32 slash C M D. E X E 的输出窗口截图。页面显示 P P M 交互式\
  \ shell，键入和下方的命令列表。*\n\n**图 7-2**\nPPM.bat\n\n如您所见，由于缺少可选命令，`PPM` 比 `CPAN.bat` 更易于使用。虽然大多数模块都能顺利安装，但要做好准备，当您需要的一两个模块无法用\
  \ `PPM` 安装时。\n\n### 常用 Perl 模块\n\n正如您将在后面的章节中看到的，几乎对于目前互联网上可能实现的任何事情，都有一个相应的模块。之前也提到过，有些\
  \ Perl 模块需要先安装支持模块。\n\n在后续章节的项目中，您将在每个脚本的顶部看到 Perl 脚本工作所需的 Perl 模块列表。我发现标准发行版中最常用的模块如下：\n\
  \n- `Size.pm`\n- `Resize.pm`\n- `File::Copy`\n- `Image::Magick`\n\n从它们的名称就可以直观地看出它们的用途。`Size.pm`\
  \ 用于以像素为单位返回图像的大小。`Resize.pm` 用于将图像调整为更大或更小的尺寸。与所有 Perl 事物一样，有几点需要注意。`Size.pm` 和\
  \ `Resize.pm` 模块都只适用于 `jpg` (jpeg)、`gif` 和 `png` 文件格式。\n\n`Image::Magick` 模块需要在您的服务器上安装其软件包，才能访问\
  \ `Image::Magick` 模块的高级功能。有源代码（用于 Linux）和二进制文件（用于 Windows）可供下载和安装。在两种操作系统上安装都非常简单容易。`Image::Magick`\
  \ 支持几乎所有现有的图像文件格式。借助它，您可以通过脚本操作来处理图像，正如第 6 章所提及的。\n\n## 总结\n\n在本章中，我们安装了 Perl 并回顾了典型\
  \ Perl 安装的要点。我们讨论了 Perl 模块及其工作原理。我们还探讨了如何使用 `CPAN.bat` 和 `PPM.bat` 安装 Perl 模块。\n\
  \n# 8. 安装和使用 MySQL 数据库服务器\n\nMySQL 数据库服务器已存在多年，因此它是一款健壮且实用的软件。其功能众多且强大。MySQL 是世界上使用最广泛的数据库。要获得这个称号，它必须足够优秀。这是一项相当了不起的成就。即使与\
  \ Oracle 这样的大型数据库供应商相比，MySQL 也能胜任。SQL（结构化查询语言）是一种易于学习的简单数据库语言，而服务器本身也易于安装、使用和配置。MySQL\
  \ 是一款内存驻留型软件，这意味着服务器的所有功能部件都加载到内存中，准备好执行查询，而无需暂停以将更多软件加载到内存来完成手头的任务。\n\n## 定位和下载\
  \ MySQL 服务器二进制文件\n\n您要安装 MySQL 服务器的软件可以从 `MySQL.com` 获取。他们免费提供 MySQL 数据库。付费软件包适用于需要高级功能（如集群和其他用于容纳高流量网络所需技术）的生产环境。他们向您销售该软件，并附带技术支持选项。大多数人认为它比免费版本更好，就功能而言，他们是对的。来自\
  \ `MySQL.com` 的二进制包是为网站设计的，不提供对集群或数据库场的支持。\n\n## 什么是 Beta 版？\n\n如果您过去安装过软件，您可能遇到过下载\
  \ Beta 版的选项。Beta 版是处于调试过程中的软件片段。它们已经编写完成，但仍包含错误或遗漏。请预期 Beta 版会出现错误。不建议您在活动的数据库服务器上使用\
  \ Beta 版，因为其中存在的错误将导致麻烦接踵而至。它们玩玩很有趣，但在实际生产环境中运行只会让您感到沮丧。\n\n## 准备您的工作站\n\n建议您在开始安装过程之前保存所有工作并关闭任何活动的软件。运行可能干扰服务器或与服务器不兼容的软件，确实会对您的安装以及整个工作站的基本健康构成威胁。还建议您在开始安装前重新启动工作站。这将确保您使用的是一个未因其他软件而引入错误或缺陷的操作系统。\n\
  \n\n## 安装 MySQL 服务器\n\n### 安装类型选择\n\n与大多数软件安装一样，系统首先会询问你是否允许对操作系统进行更改。点击 `Yes` 或\
  \ `No`。选择 `Yes` 将开始 MySQL 服务器的安装。选择 `No` 则会立即终止安装。\n\n安装程序打开的第一个对话框是用于选择安装类型的。共有五种不同的安装选项。虽然最终都应该逐一探索，但为了便于讨论，我们将选择\
  \ `Full` 完整安装类型。这将安装该二进制文件所能提供的所有功能和特性，包括官方手册。\n\nMySQL 服务器的安装和配置通常需要大约十分钟，具体取决于你可用的资源以及你选择安装的内容。系统将要求你提供一些基本信息，如用户名、密码和网络配置等，我们将在需要时进行讨论。\n\
  \nMySQL 安装包主要有两种安装类型：一种是小型安装包，大小为 4 或 5 兆字节；另一种是 450 兆字节的安装包。两者之间的区别在于安装过程的进行方式。小型安装包是一个\
  \ Web 安装程序。如果使用此安装包，安装将开始，但随后会暂停以下载其余的安装软件。大型安装包则是一个完整的`MSI`安装程序包。\n\n建议你下载完整的 450\
  \ 兆字节安装包，这样即使互联网连接出现问题，你仍然可以安装和配置工作站（图 8-1）。\n\n![](img/485616_2_En_8_Fig1_HTML.jpg)\n\
  \n*一个标题为“MySQL installer”的窗口截图。页面包含安装类型选择，选项有开发者默认、仅服务器、仅客户端、完整和自定义。此处选择了完整套件选项。屏幕左侧提供了安装类型描述框。*\n\
  \n**图 8-1** 选择安装类型\n\n每种安装类型的作用是直观明了的。选择每个选项都会在单选按钮右侧的“安装类型描述”框中简要说明将要发生的情况。该安装程序是一个非常稳定且功能强大的工具。\n\
  \n我们选择 `Full` 完整安装是因为能够方便地在本地工作站上随时查阅所有手册和文档。`Full` 完整安装附带的手册和工具是不可或缺的。\n\n如果你安装了\
  \ `Full` 完整版，所有功能都将准备就绪，可供使用。如果你安装的是 `Developer` 开发版，你将不会获得 `Full` 完整安装中包含的文献或工具，但你的安装仍然会非常强大。\n\
  \n选择 `Custom` 自定义安装将为你提供广泛可用的功能特性，可通过单选按钮、复选框和下拉列表进行选择。\n\n### 检查系统要求\n\n下一个对话框（图\
  \ 8-2）会检查你的工作站是否满足系统要求。根据先前已安装的软件，安装程序可能会尝试安装多达十项系统要求。\n\n![](img/485616_2_En_8_Fig2_HTML.jpg)\n\
  \n*一个标题为“MySQL”的窗口截图。屏幕右侧包含选择设置、检查要求、安装、产品和安装配置。此处选择了检查要求选项。页面中间部分打开，包含描述。下方提供了产品及相关要求。*\n\
  \n**图 8-2** 检查系统要求\n\n可能有少数几项系统要求是安装程序无法安装的。这些要求通常不是必需的，除非你使用的是与向网页提供数据无关的工具。如图\
  \ 8-2 所示，仅剩的两个用于实现完整功能的系统要求通常不用于互联网站点，并且超出了本书的讨论范围。\n\n标记为“Manual”（手动）的要求需要你自行查找、下载并安装支持软件，以最终获得具有完整功能的完整安装。正如我所提到的，这些产品通常不用于当今的网页。\n\
  \n### 安装过程\n\n如图 8-3 所示，有十个产品已准备好安装。这是 `Full` 完整安装的典型情况。使用这些产品，你几乎可以完成现代网页所需的任何工作。\n\
  \n![](img/485616_2_En_8_Fig3_HTML.jpg)\n\n*一个标题为“MySQL”的窗口截图。屏幕右侧包含选择设置、安装、产品和安装配置。此处选择了安装选项。页面中间部分打开，显示以下产品：MySQL\
  \ server 8.0.23、MySQL shell 8.0.23 等。*\n\n**图 8-3** 待安装的软件\n\n应当注意，如果你打算安装到的硬盘驱动器上没有足够的可用空间，操作系统此时将中止安装。下载的\
  \ `MSI` 文件大小约为 450 兆字节。解压缩文件后预计会占用更多空间，大约在 520 兆字节范围内。因此，总共需要的空间大约是 1GB。请确保你的硬盘驱动器有足够的空间。查看图\
  \ 8-4：\n\n![](img/485616_2_En_8_Fig4_HTML.jpg)\n\n*一个标题为“MySQL”的窗口截图。屏幕右侧包含选择设置、安装、产品和安装配置。此处选择了安装选项。包含产品列表、状态、进度和注释。前两个产品已完成，第三个处于安装状态。*\n\
  \n**图 8-4** 正在安装 MySQL 服务器\n\n我见过此阶段花费的最长时间是十分钟。任何较新的工作站都能轻松应对安装程序的要求。成功安装的产品会显示一个绿色对勾。当前正在安装的产品则显示为一个可爱的铅笔图标。\n\
  \n这个阶段基本上就是你坐下来观看安装程序工作。此时安装程序应该已经报告了错误，所以可以很有把握地认为安装将会成功。如果你想实时查看具体进展，请点击 `Show\
  \ Details`（显示详细信息）按钮。\n\n如果有其他正在访问安装程序所需相同资源的软件在运行，安装可能会出现问题。请务必关闭所有可以关闭的程序，特别是使用互联网或通信功能的软件。也不要保留你用来下载二进制文件的网页浏览器。\n\
  \n### 安装完成\n\n如图 8-5 所示，所有产品均已成功安装。现在，安装程序将弹出一系列对话框，要求你设置用户名和密码。我建议你将这些信息记录在多个不同的地方，直到它们成为你的第二天性，因为你每天将会多次使用这些信息来配置你的安装。\n\
  \n![](img/485616_2_En_8_Fig5_HTML.jpg)\n\n*一个标题为“MySQL”的窗口截图。屏幕右侧包含选择设置、安装、产品和安装配置。此处选择了安装选项。包含产品列表、状态、进度和注释。所有产品状态均为完成。第三个产品被打上了方框标记。*\n\
  \n**图 8-5** 所有产品安装完成\n\n## MySQL 安装与配置指南\n\n值得注意的是，安装的 MySQL 文档包含了适用于您日常数据库管理工作的便捷提示和工具。请务必查看并阅读。我使用\
  \ MySQL 已有二十年，每次阅读 MySQL 文档和“示例”时都能学到新知识。\n\n无论您选择何种类型的安装，都至少需要为以下三个产品提供一些信息。问题涉及\
  \ `root` 用户名和密码以及普通用户的用户名和密码（参见图 8-6）。\n\n![](img/485616_2_En_8_Fig6_HTML.jpg)\n\
  \n一个标题为“My SQL”的窗口截图。屏幕右侧包括选择设置、安装、产品和安装配置。此处选择了产品配置选项。页面中间打开，包含描述和三个产品的状态列表。\n\n\
  **图 8-6** 产品配置区域的首个屏幕\n\n正如我之前提到的，请将这些信息记录在多个地方。您必须提供管理员以及用户的用户名和密码。\n\n请看图 8-7，它显示了在本地网络上配置服务器的选项。有几种不同的配置类型\
  \ (`Config Types`) 可供选择。我建议您保持选择“开发计算机” (`Development Computer`)。这是因为其他选项假设该工作站（现在是服务器）是运行的主要软件。MySQL\
  \ 引擎和支持程序被直接加载到内存中。操作系统未占用的其余可用内存都将分配给 MySQL 服务器。\n\n![](img/485616_2_En_8_Fig7_HTML.jpg)\n\
  \n一个标题为“My SQL”的窗口截图。屏幕右侧包括类型与网络、认证方法、账户与角色、Windows 服务等选项。类型与网络选项被选中。页面中间打开，显示服务器配置类型、连接性和高级配置。\n\
  \n**图 8-7** 设置网络和安装选项\n\n图 8-7 显示了通过 MySQL 安装程序可用的选项。请始终选择 `TCP/IP`。默认端口（已填好）应与您所有的用户名和密码一起记录下来。其他技术，如\
  \ Apache Web 服务器，为每种通信协议使用双方商定的端口号。每个主要服务器或工具都有自己的连接端口，这从程序角度来说可以提高速度。\n\n还有一个选项是使用\
  \ `Windows Firewall` 为将来的数据库使用提供一些安全保障。`TCP/IP` 是一种非常强大的通信协议，自互联网作为研发项目的最早期以来，它一直是互联网上使用的主要协议。\n\
  \n另一个需要注意的复选框是“显示高级和日志记录选项” (`Show Advanced and Logging Options`)。如果您曾经安装过使用通信和操作系统高级功能的东西，您很可能通过查看数十个日志中的一个或多个来解决该问题，这些日志提供了错误线索，有时甚至就如何处理致命错误给出建议。\n\
  \n图 8-8 中给出的两个选项，基本上是在要求一种对连接到 MySQL 服务器并运行查询所需的用户名和密码进行认证的方法。\n\n![](img/485616_2_En_8_Fig8_HTML.jpg)\n\
  \n一个标题为“My SQL”的窗口截图。屏幕右侧包括类型与网络、认证方法、账户与角色、Windows 服务等选项。认证方法被选中。页面中间打开，显示强密码加密和传统认证方法。\n\
  \n**图 8-8** 认证方法的两个选项\n\n由于您很可能不是在安装专用的数据库服务器，因此建议您选择“使用传统认证方法” (`Use Legacy Authentication\
  \ Method`)。这是为了向后兼容以前的、过时的（但仍在使用的）服务器。上一次认证方法被更改或添加是在 MySQL 服务器 5.X 版本时期。\n\n您必须指定一个\
  \ `root` 用户名和密码。再次强调，在多个地方记录下来，直到您使用得如此频繁，以至于在需要认证时能够不假思索地回忆起来（图 8-9）。\n\n![](img/485616_2_En_8_Fig9_HTML.jpg)\n\
  \n一个标题为“My SQL”的窗口截图。屏幕右侧包括类型与网络、认证方法、账户与角色、Windows 服务等选项。账户与角色选项被选中。页面包含 `root`\
  \ 账户密码、我的 SQL `root` 密码、我的重复密码和我的 SQL 用户账户。\n\n**图 8-9** 设置管理用户名和密码\n\n有一个显示密码强度的度量条。请使用大小写字母、数字和标点符号。在密码中使用这四种类型的字符将产生一个强密码，您必须将其记录下来，直到能够瞬间想起它。\n\
  如果密码强度被判定为弱，安装程序将不允许您继续。在安装程序允许您继续之前，密码强度必须至少为“中等”。\n建议您在此对话框中至少创建一个用户，并将管理权限分配给该新创建的用户。使用超级用户\
  \ (`superuser`) 而不是 `root` 账户，可以让 MySQL 服务器和操作系统的安全关注点协同工作，确保每次访问数据库时都能进行安全的事务处理。\n\
  \n图 8-10 中要求填写的信息字段是直观明了的。您将提供一个用户名以及一个密码，该密码的强度同样必须至少为“中等”。\n\n![](img/485616_2_En_8_Fig10_HTML.jpg)\n\
  \n一个标题为“my SQL 用户账户”的页面截图。该页面包括用户名选项、主机和角色下拉框，以及“my SQL 认证”选项。在“my SQL 用户凭据”中，选项包括密码和确认密码。\n\
  \n**图 8-10** 添加用户\n\n为第一个用户保留“数据库管理员” (`DB Admin`) 角色。将此用户名和密码记录在多个地方。到现在为止，您应该已经记录了大约半页的安全信息，这些信息对于使用\
  \ MySQL 服务器至关重要。制作多份副本并分发给所有需要的人。\n让认证由 MySQL 解决。这是因为 MySQL 用户名和密码经过比操作系统等其他实体更严格的认证协议。\n\
  当密码强度为“中”或“最大”时，“确定”按钮将变为可用，允许您继续进行服务器配置。\n\n图 8-11 显示了将安装配置为 `Windows Service`\
  \ 的选项。我们不希望这样，所以请取消此字段的勾选。您还会看到一个“在启动时运行服务器” (`Run at Startup`) 的复选框。您不希望发生这种情况，请确保它未被勾选。\n\
  \n![](img/485616_2_En_8_Fig11_HTML.jpg)\n\n一个标题为“My SQL”的窗口截图。屏幕右侧包括类型与网络、认证方法、账户与角色、Windows\
  \ 服务和应用程序更改等选项。Windows 服务选项被选中。页面中间打开，显示“将 my SQL 服务器配置为 Windows 服务”选项。\n\n**图 8-11**\
  \ 选择配置方案\n\n### 在启动时运行 MySQL 服务器\n\n如果你在启动时运行 MySQL 服务器，操作系统的其余能力将会受到影响，并且比你在控制台中启动\
  \ MySQL 服务器时更受限，这将在本章接下来的部分中讨论。\n\n### 应用配置\n\n接下来显示的对话框是“应用配置”部分（图 8-12）。正如我在本章前一节中提到的，如果安装过程中有任何错误，到现在应该已经出现了。你的安装配置很可能会成功应用。\n\
  \n![](img/485616_2_En_8_Fig12_HTML.jpg)\n\n一个标题为 MySQL 的窗口截图。屏幕右侧包括类型和网络、身份验证方法、账户和角色、Windows\
  \ 服务等。应用配置选项被选中。页面包含一系列将执行以应用更改的配置步骤。\n\n图 8-12\n应用服务器配置偏好设置\n\n点击此对话框中的 `Execute`\
  \ 开始应用配置。注意有一个 `Log` 选项卡可以点击。如果你遇到错误，这个日志将报告正在执行的所有操作。在安装的这个阶段，致命错误通常只来自磁盘空间不足或处理器利用错误和兼容性问题。\n\
  \n这个过程需要几分钟。你会注意到指针随着配置的进行变成沙漏和工作环。如果你启用了防火墙，系统可能会要求你允许 MySQL 服务器进行身份验证，或者完全绕过防火墙的身份验证。我的建议是让防火墙忽略\
  \ MySQL 查询，允许它们通过防火墙的影响范围。\n\n这种绕过是为了让你能够练习使用专用的 MySQL 服务器，也许是在多服务器设置中。正如你将在后续章节中看到的，MySQL\
  \ 与 Perl 和 Apache Web 服务器配合得很好。一个常见的多服务器设置是使用三个独立的物理服务器：一个用于数据库服务器，一个用于 Perl 脚本服务器，一个用作文件服务器。\n\
  \n### 启动 MySQL 服务器\n\n通过命令行启动 MySQL 服务器是一个简单的任务。开始启动只需要这个简短的命令： `mysql -u root -p`\
  \ 。下面的用户是 `root` 服务器。按 Enter 键后，系统会要求你输入用户名和密码。请从你已经积累并希望已经记住的用户名和密码页面提供它们。\n\n\
  ```bash\nmysql -u root -p\n```\n\n## 总结\n\n在本章中，我们讨论了 MySQL 数据库服务器的安装和配置。你学习了如何将你的工作站变成一个强大的数据库服务器。在接下来的章节中，本章提供的知识将是无价的。请继续阅读；在我们完成之前还有很长的路要走。\n\
  \n# 9. 安装和使用 Apache Web 服务器\n\nApache Web 服务器的核心功能是提供网页服务。它是一个高度专业化且强大的软件应用程序，每天用于服务数十亿网页。Apache\
  \ Web 服务器是当今互联网上使用最多的 Web 服务器。\n\nApache 最基本的功能是提供静态的、不变的 HTML 文档。这具有易于实现的优点——HTML\
  \ 是一种简单的语言。如果你的网站正如你所设想的那样是一个简单的事务，那么请务必探索这一点。如果你想要由强大的数据库驱动的动态生成的网页，那么请继续阅读。Apache\
  \ 可以与 Perl 一起使用，根据 Perl 脚本中给出的规则生成网页。这比静态 HTML 方法更复杂，但额外的思考、规划和时间是非常值得的。你努力工作的回报将是一些非常强大且功能齐全的网站，它们会吸引用户的注意力并保持住。\n\
  \nApache 可以与多种编程语言一起工作，无论是脚本语言还是编译语言。Apache 通过使用这些不同的编程语言提供了广泛的数据处理能力。它是一个多功能且制作精良的产品。\n\
  \n## 处理错误\n\nApache 几乎为所有东西都提供了一个错误页面。正如你将在后续章节中看到的，当出现问题时（通常是在通过 `httpd.conf` 文件配置\
  \ Apache 时），这些错误页面是不可或缺的。这个配置文件将在后续页面中完整解释。\n\n在开始安装之前，建议你“ping 堆栈”，这是操作系统准备好执行你可能要安装的任何功能的技术术语。\n\
  \n如果控制 Windows 工作站上通信的软件和/或硬件失败，你要做的第一件事就是 ping 环回地址，如图 9-1 所示。\n\n![](img/485616_2_En_9_Fig1_HTML.jpg)\n\
  \n一个标题为 C:\\windows\\system32\\CMD.EXE 的输出窗口截图。它描绘了工作站失败时 ping 环回地址的情况。页面显示 C:\\\
  Users\\Thomas> ping 127.0.0.1。Ping 从 127.0.0.1 开始，数据为 32 字节。\n\n图 9-1\nPing 本地环回地址\n\
  \n如你所见，向 `127.0.0.1` 发送了四个 ping 以确保操作系统正常运行。如果操作系统状态不佳，你会收到一条错误消息，指出找不到该 `IP` 地址。\n\
  \n## 下载和安装 Apache Web 服务器二进制文件\n\n学习 Apache Web 服务器的第一步是简单地找到软件。一个简单的 Google 搜索会告诉你在哪里可以找到\
  \ Apache。Apache 已经存在了几十年。制作它的人过去和现在都做得非常好，而且找到 Apache 二进制文件相当容易。这个 Web 服务器是在考虑 Linux\
  \ 操作系统的情况下开发的。它被移植到一个 Windows 操作系统可以处理的可执行包中。\n\n二进制文件以 `.msi` 包的形式提供，这是在 Windows\
  \ 上安装几乎所有软件包的标准方法。安装相当基础。在配置服务器并使其在 Windows 工作站上加载时，学习曲线会变得陡峭。\n\n## 允许对操作系统进行更改\n\
  \nWindows 操作系统首先会询问你是否允许对你的计算机进行更改。如果你拒绝此提示，安装将停止。安装在 Windows 计算机上的每个程序都将以此方式启动。启动画面出现，如图\
