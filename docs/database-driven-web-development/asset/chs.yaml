  清单 6-29\n一个下拉菜单系统\n```\n\n列表项在给定的表格内显示。注意使用了一些嵌套表格。你可以根据需要将其做得更复杂，并使用任何有效的 HTML\
  \ 编码包含任何格式选项。你甚至可以在每个下拉列表中放置图像和/或带有许多输入元素的表单。\n\n\n### 创建内嵌或外凸边框按钮\n\n当你学会使用项目符号列表时，就已经接触过内嵌和外凸放置按钮的概念。每个项目符号项都相对于\
  \ `UL` 或 `OL` 元素的起始位置放置。每个列表项随后用 `LI` 元素声明。内嵌项目符号被设置在 `OL` 或 `UL` 元素指定起始位置的右侧。外凸项目符号则更靠左。\n\
  \n`style.borderStyle` 属性的工作方式相同。你能够以内嵌或外凸样式的显示方式来定位边框。理解这一点最简单的方法是直接运行清单 6-30 中给出的脚本。\n\
  \n```\nfunction inset(elmnt) {\n    elmnt.style.borderStyle=\"inset\";\n}\nfunction\
  \ outset(elmnt) {\n    elmnt.style.borderStyle=\"outset\";\n}\n\ntd {\n    background:C0C0C0;\n\
  \    border:2px outset;\n}\n\n项目一\n项目二\n项目三\n项目四\n```\n清单 6-30：创建内嵌或外凸按钮\n\n我们使用\
  \ `onMouseOver` 和 `onMouseOut` 来触发不同的边框样式。然而，你不必非要恢复到原始样式，而是可以根据需要调整边框样式。一个很好的例子是创建一个显示用户已阅读或审阅文档各部分的展示。当他们审阅完整个文档后，所有的边框样式将变得一致，让他们以一种简单的方式知道自己已完成所开始的任务。\n\
  \n这个代码片段不受 Microsoft Edge 支持的情况并不常见。在很大程度上，任何给定标记语言实现之间存在巨大差异的时代已经过去。你可以将此归因于公众参与度的提高以及\
  \ `W3C.org`（万维网联盟）的出色运营和组织。\n\n### 描述性菜单\n\n这是为你的链接增添一些令人惊喜功能的好方法。你可以链接到另一个文档中的任何内容，或使用锚标签内的属性链接到当前文档中的某个位置。链接可以是相对的或绝对的。适用于普通链接的\
  \ CSS 规则同样适用，并在文档的头部给出。\n\n我们使用 `getElementById()` 方法来访问锚元素的属性，在本例中，用于分配链接的位置和其他属性。\n\
  \n```\nTable {\n    background:black;\n}\na {\n    text-decoration:none;\n    color:#000000;\n\
  }\nth {\n    width:150px;\n    background:#FF8080;\n}\ntd {\n    font:bold;\n  \
  \  background:#ADD8E6;\n}\n\nfunction get(txt) {\n    document.getElementById('tip').innerHTML=\"\
  txt\";\n}\nfunction reset() {\n    document.getElementById('tip').innerHTML=\" \"\
  ;\n}\n\n项目一\n项目二\n项目三\n```\n清单 6-31：描述性菜单功能\n\n我把链接放在了一个表格里，但这并非必须。你可以使用任何你喜欢的方法将它们放置在任何你喜欢的位置，只要它们能够被浏览器渲染出来即可。\n\
  \n### 为图像创建描述框\n\n这一系列指令根据你想要展示的内容显示一个小的弹出式描述。你将描述性文本放置在它们位于文档中的函数内。这些函数通过 `onMouseOver`\
  \ 事件处理程序触发，并通过调用 `onMouseOut` 事件处理程序中的 `reset()` 方法来重置。\n\n分配任何你喜欢的 CSS 规则，只要它们适用于文本链接。如果你想尝试一下，可以包含许多不同的格式样式以及任何反映在\
  \ DOM 规范中的有效 CSS 规则。这样的规则有很多，大约有 400 个。\n\n```\ntable {\n    background:black;\n\
  }\na {\n    text-decoration:none;\n    color:#000000;\n}\ntd {\n    font:bold;\n\
  \    background:#ADD8E6;\n}\n\nfunction get(image) {\n    document.getElementById('tip').innerHTML=\"\
