  \ 包含一个 `TD` 元素，其值随循环末行 `$count` 的递增而改变。\n\n可能认为为每个缩略图生成 HTML 标记后工作就已完成，但现在必须制定规则确定用何种标记封装生成的代码。接下来的部分将讨论一些脚本编写中需要关注的问题。\n\
  \n由于 Perl 是行内解释语言，执行顺序自上而下。编写页面 HTML 时，首先需明确生成内容在整个文档中的位置。请仔细阅读代码清单 10-7 中的代码。\n\
  \n```\n$topofcontent = qq{HTML>\n\nEasyUploader.pl\n\n上传成功！\n\n$filesuploaded 个文件已上传\n\
  \n显示 $filesuploaded 个缩略图\n};\n$bottomofcontent = qq{\n```\n\n\n\n};\n### 打印页面\n\
  `print` qq{Content-type: text/html\\n\\n};\n`print` qq{$topofcontent @contentarray\
  \ $bottomofcontent};\n清单 10-7\n展示构建并提供包含数据库值的 HTML 的过程\n```\n\n好了，我们已经讨论了上传脚本，但还没有完全完成。你必须考虑如何让脚本将格式化的\
  \ HTML 标记打印到浏览器。正如你可以在前面的代码块中看到的，有两个 `print` 命令。第一个用于告诉浏览器期望接收什么类型的数据，在本例中是 \"text/html\"\
  。\n\n然后是另一个 `print` 命令，这次是声明按顺序打印 `$topofcontent`、`@content` 和 `$bottomofcontent`。如果你看一下，会发现表格的开头在\
  \ `$topofcontent` 中，表格的结尾在 `$bottomofcontent` 中。我们将 `@content` 放在中间，因为 HTML 将完全按此顺序发送：动态生成并填充到\
  \ `@content` 中的内容会按正确的顺序打印出来，在本例中最多显示三个图像缩略图。\n\n## 总结\n\n在本章中，我们研究了一个非常酷的解决方案，仅使用少量\
  \ Perl 脚本，并从数据库中选择值，就能快速轻松地发送大量电子邮件。静态文件也被用作静态数据页面的来源。`sendmail` 是一个广为人知的 Linux\
  \ 守护进程，如果你愿意，它允许你每天发送数百万封电子邮件。\n\n"
- '# 11. 数据库驱动的菜单系统


  我们都见过优秀网站上的下拉菜单。它们是一个永恒的功能——已经被使用了几十年，并且无疑将继续使用很多年。在本章中，我们将运用之前关于 JavaScript 技巧的章节中介绍的知识，探讨
  HTML、CSS、DOM 和 JavaScript 如何协同工作以提供一些相当惊人的功能。结合 Perl 脚本语言和 MySQL 数据库，你就拥有了一个非常强大的网页功能的基础。


  ## 下拉菜单是如何工作的？


  下拉菜单理解起来很简单，只需一些提示。你的下拉菜单使用 `GET` 方法来加载你将使用的链接。值通过锚元素内声明的参数传递给脚本。


  ### create.pl


  与大多数 Perl 脚本一样，在调用具有工作功能的脚本之前，总是需要创建一些表。这些脚本通常用于账户信息，如联系信息或个人详细信息——例如姓名和地址。你能做的限制取决于你的想象力。


  `create.pl` 是一个简单的脚本，开始了我们对下拉菜单系统的探索。我用它来创建我们将在本章后面部分使用的基础表。在这个简单的脚本中，我们不填充任何值。我们只是创建基础表，值将通过其他脚本存储其中。请查看清单
  11-1。


  ```perl

  #!/usr/bin/perl

  use DBI;

  use CGI;

  use CGI::Carp qw(fatalsToBrowser);

  $cgi = new CGI;

  #### 连接

  $dbh = DBI->connect(''DBI:mysql:host=localhost;

  database=menu_system'', ''user_name'', ''password'',

  {''RaiseError'' => 1}) or die "Cannot Connect to Database";

  $query = qq{CREATE TABLE pages (

  id INT NOT NULL AUTO_INCREMENT PRIMARY KEY,

  id1 VARCHAR (250) NOT NULL,

  id2 VARCHAR (250) NOT NULL,

  hits VARCHAR (250) NOT NULL

  )};

  $sth = $dbh->prepare($query);

  $sth->execute();

  $sth->finish();

  $dbh->disconnect();

  #### 打印内容

  print qq{Content-type: text/html\n\n};

  print qq{


  创建菜单表


  数据库表已创建


  };

  1;

  ```

  清单 11-1

  检查 `create.pl`


  如你所见，我们连接到数据库并创建了一个名为 "pages" 的表。目前这是一个空表，但下一个工作脚本将向数据库中填入值，你很快就会看到。这是你第一次看到 `id`、`id1`、`id2`
  和 `hits` 列。我几乎在接手的每个项目中都使用它们。它们是数据库模型的起点。随着项目的增长，数据库系统的复杂性也会增加。


  这个小程序中的第一步仅仅是数据库连接代码。它有四个项目，用于说明数据库的位置 (`localhost`)、正在使用哪个数据库（数据库名）、用户名和密码。


  数据库位置声明为 `localhost`。当 Perl 脚本和 MySQL 数据库在同一服务器上运行时使用此值。如果你使用多服务器设置，可以将 URL 或 IP
  地址声明为该值。


  数据库名就是你给数据库起的名字。它可以是任何字母或数字，但尽量不要在数据库名中加入标点符号。一些常用的标点符号可能会干扰脚本。左单引号在这方面是出了名的。根据脚本的位置和操作，可能会抛出警告消息或致命错误。用户名和密码也应遵循此约定。


  数据库连接代码之后是创建表。注意 `id` 列是 `auto_increment`。这意味着 `id` 列的值将从零开始。每当将新的表行插入数据库时，这个数字将增加一。这是一种方便的方法来指定表数据在将用于生成完整文档的变量和数组中的组织顺序。


  我创建的表中的其他列是 `id1`、`id2` 和 `hits`。`id1` 和 `id2` 可以是任何你希望的数据类型。我在这里包含它们是为了让你更好地理解如何组织数据库表、行和列。


  完成表创建后，我向浏览器的目标（即当前浏览器窗口）发送一个虽小但完整的 HTML 文档。现在该表已准备就绪。


  ### populate.pl


  `populate.pl` 脚本用于向数据库插入值。正如我之前所说，你希望你的数据库表直观明了。我们将使用的表有四列：一个 `auto_increment` 的
  `id`，以及 `id1`、`id2` 和 `hits`。我们将使用这个脚本做的是通过变量和数组将菜单项插入数据库。


  我们最终要构建的菜单系统由两个下拉菜单组成。第一个简称为 `heading1`，包含两个链接。第二个下拉菜单名为 `heading2`，有四个列表项。`heading2`
  有趣的地方在于列表项分为两列。如果你有异常长的菜单项列表，这是一个方便的功能。将一个长列表分成两个较短的列表将使菜单更易于阅读，并且成为一个更明显、功能更强的页面项目（清单
  11-2）。


  ```perl

  #!/usr/bin/perl

  use DBI;

  use CGI;

  use CGI::Carp qw(fatalsToBrowser);

  $cgi = new CGI;

  #### 创建 heading1 和 heading2 变量及数组

  @link1 = (''1'', ''2'');

  @link2 = (''1'', ''2'', ''3'', ''4'');

  $id1 = "1";

  $id2 = "2";

  ### 连接，见鬼！！！

  $dbh = DBI->connect(''DBI:mysql:host=localhost;database=databasename'', ''username'',
  ''password'', {''RaiseError'' => 1}) or die "Cannot Connect to Database";

  $count = "0";

  foreach (@link1) {

  $query = qq{INSERT INTO pages (id1, id2)

  VALUES

  (''$id1'', ''$link1[$count]'')};

  $sth = $dbh->prepare($query);

  $sth->execute;

  ++$count;

  };

  $count = "0";

  foreach (@link2) {

  $query = qq{INSERT INTO pages (id1, id2)

  VALUES

  (''$id2'', ''$link2[$count]'')};

  $sth = $dbh->prepare($query);

  $sth->execute;

  ++$count;

  };

  $sth->finish();

  $dbh->disconnect();

  #### 打印内容

  print qq{Content-type: text/html\n\n};

  print qq{


  实验


  数据库条目已插入

  ```



  };

