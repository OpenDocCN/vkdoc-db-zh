  );\n### 判断是否需要调整尺寸（此为原始图像调整逻辑）\n### 大型 if 语句起始\nif (($globe_x or $globe_y) > 100)\
  \ {\n### 通过独立 if 语句规避 x/y 除零风险\nif ($globe_x  100) {\n$globe_y = \"100\";\n$globe_x\
  \ = $globe_y / $ratio;\n}\n$newwidth2 = int($globe_y);\n### 根据需要按比例将高度调整至最大 100\n\
  $ratio = $globe_y / $globe_x;\nif ($globe_x > 100) {\n$globe_x = \"100\";\n$globe_y\
  \ = $globe_x / $ratio;\n}\n$newheight2 = int($globe_x);\n$image = Image::Magick->new();\n\
  $image->Read(\"/home/public_html/content/$thumb[$count]\");\n$image->Resize(geometry\
  \ => \"$newheight2 x $newwidth2\");\n$image->Write(\"/home/public_html/content/$thumb[$count]\"\
  );\n++$count;\n};\n代码清单 10-5\n上传、捕获和格式化图像文件内数据的完整流程\n```\n\n现在您可以看到如何通过脚本操作调整图像尺寸。建议亲自尝试实践。\n\
  \n图像处理部分已完成，接下来将生成在浏览器中显示已上传缩略图的 HTML 标记。请研究代码清单 10-6 中的代码块。\n\n```\n### 开始处理 3\
  \ 个已上传图像\n$count = \"0\";\n$filesuploaded = @thumb;\nforeach (@thumb) {\n$onecontentelement\
  \ = qq{\n};\npush @contentarray, $onecontentelement;\n++$count;\n};\n代码清单 10-6\n\
  生成展示已上传文件 URL 的 HTML 标记\n```\n\n我们首先声明 `$count = \"0\"`。这个数字将在 `foreach` 循环每次迭代后递增，用于向\
