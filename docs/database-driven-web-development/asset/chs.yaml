  上传文件可能是你在使用 Perl 和 MySQL 的过程中会遇到的最复杂的操作。实际用于上传文件的 Perl 脚本超出了本书当前章节的范围，但在你开始考虑为未来使用编写上传脚本之前，你必须了解一些事项。


