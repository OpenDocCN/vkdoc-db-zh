- "# 实用 JavaScript 概念与项目\n\n本章介绍一些有用的 JavaScript 概念和项目，涵盖从菜单到链接、着色和定位等各种问题。我提供了大约\
  \ 50 个独立的代码示例，并对每个示例进行了详细描述。有些示例有点复杂，但对于这些，我包含了更多的解释。\n\n我尽量保持技能水平呈递进式——一个引导另一个。我们将在接下来的章节中使用这些基本技能。请享受学习过程。\n\
  \n## 显示与隐藏可见性\n\n毫无疑问，你遇到过这样的情况：你点击了一个操作对象，页面上的其他选项（如链接或图片）变为可见。这是通过使用 `document`\
  \ 对象的 DOM `style` 方法实现的。在此示例中，当输入按钮被点击时，`hidden` 属性简单地从“`hidden`”切换为“`visible`”。该操作是一个\
  \ HTML 的 `onClick` 事件处理程序，清单 6-1 中展示了如何在两个输入按钮上更改此属性。\n\n```\nThis is text. This\
  \ is text. This is text.\n\nListing 6-1\nToggling the visible and hidden page elements\n\
  ```\n\n应该提到的是，较旧的浏览器可能需要你稍微调整思路来适应它们。如果你注意到，“`x`”标识符仅仅是在 `onClick` 声明中声明的——它除了将该文档部分标识为一个唯一部分外，没有其他作用。在它上面的\
  \ `<p>` 元素中，`id` 属性在应用 DOM 语句之前被设置为 `x`。标准的冒泡顺序规则适用，因此 `x` 必须在 DOM 语句之前声明。否则，你会得到一个错误，提示无法找到你所引用的文档元素（`x`）。\n\
  \n## 更改元素的背景颜色\n下面的代码片段展示了如何更改几个表格元素的背景颜色。在此示例中，该操作仅应用于声明它的表格的 `<td>` 元素。你可以将此方法应用于\
  \ DOM 允许访问的任何页面元素，包括通过更改 `<body>` 元素的属性值来进行文档范围的更改。\n\n\n## JavaScript 与 DOM 操作\n\
  \n这些方法既可用于操作单个页面元素，也能通过 CSS 规则实现大范围更改。只需相应修改位于文档 `head` 内的 `script` 元素中所给出的 JavaScript\
  \ 语句中的 DOM 命令即可。\n\n```javascript\nfunction bgChange(bg) {\n    document.body.style.background=bg;\n\
  }\n```\n当鼠标悬停在方块上时，背景颜色将会改变。\n\n### 清单 6-2 动态更改颜色\n\n你可以尝试修改一些内容，例如：更改触发 DOM 声明中所更改的事件、修改哪些属性，或者如果你想更进一步，可以分配一个变量来存储由其他函数（例如根据存储的用户偏好）决定的信息。\n\
  为此，可以将传递给 `bgChange()` 函数的参数从字面值改为变量名。例如，使用一个变量名代替单词 `\"green\"` —— 实际要应用的颜色可以在另一个函数中决定，并作为该变量的数据。你可以使用命名颜色、十六进制颜色或\
  \ RGB 颜色来定义要应用的颜色。\n\n## 使用 onLoad 事件触发器\n\n学会使用 `onLoad` 事件处理程序非常棒。通过这个简单的事件处理程序，你可以安排动作与细微事件同步，例如在页面元素加载完成并显示时启动一个动作——比如，当一个大图片下载完成后应用一条\
  \ CSS 规则。\n尝试下载一个大文件，比如音频或视频文件。将表格的 `border` 属性改为 1，并添加一个 `bgcolor=\"red\"` 语句，当文件加载到页面完成后，对象周围将显示一个\
  \ 1 像素宽的红色边框。将指令放在文档 `head` 部分的脚本中，并在文档的 `body` 中声明当 `onLoad` 事件触发时要处理的 JavaScript\
  \ 函数。\n\n### 清单 6-3 使用 `onLoad()` 事件处理程序\n清单 6-3 在 `BODY` 元素中使用了 `onLoad` 事件，当整个文档加载完成后，显示一个带有给定文本的警告框。你不必将这个规则应用于文档范围的更改——`onLoad`\
  \ 事件可以在任何 HTML 元素中触发，并在浏览器完成该元素加载时应用。\n\n```javascript\nfunction myMessage() {\n\
  \    alert(\"此消息是由 onLoad 事件触发的\");\n}\n```\n\n使用这个简单的事件，你可以实现相当多的创造性操作。尝试将这个事件与其对立事件\
  \ `onUnload` 事件处理程序混合使用。我发现，`onUnload` 在页面关闭时将用户偏好或任何生成的数据写入 cookie 非常方便。然后，你可以在下一个页面中通过其\
  \ `onLoad` 函数使用 cookie 中包含的数据并将其应用到下一页。\n\n## 使用 `this` 更改颜色\n\n这是一种实现令人印象深刻效果的非常简单的方法。DOM\
  \ 指令通过一个简单的 `onClick` 事件触发，将“Click Me!”文本的原始颜色更改为红色。你可以使用命名颜色、十六进制颜色或 RGB 颜色。\n\n\
  `this` 指令在独特位置使用时功能非常强大。然而，你不会希望用这种方法更改文档中的许多项目。它在大型场景下效率低下，并且不是解决文档范围甚至选择性区域更改问题的最佳方法。\n\
  \n```html\n<span onclick=\"this.style.color='red'\">点击我！</span>\n```\n### 清单 6-4\
  \ 使用 `this` 指令\n\n自 HTML 3.2 版以来，你可以将此技术应用于任何给定文档中任何格式正确的容器。此功能非常普遍，因此在可预见的未来，它将包含在每个版本的\
  \ HTML（以及 DOM）中。\n\n## 即时切换图像\n\n切换图像是相当简单的，只要意识到几件事：你必须将要切换到的图像数据预加载到一个变量中，并且如果你想将图像切换回来，你必须将原始图像数据加载到它自己的变量中。你通过使用文档对象的\
  \ `src` 属性来完成此操作。查看清单 6-5 中的示例。\n\n### 清单 6-5 操作图像\n```javascript\ndocument.getElementById(\"\
  image\").src=\"image2.jpg\";\n```\n> 原始图像是 `image1.gif`，脚本将其更改为 `image2.jpg`。\n\n\
  你可以将实现此操作的 JavaScript 函数放在文档中的任何位置。然而，较旧的浏览器要求你将函数放在文档的一个部分中，该部分在声明要更改的图像位置之前被解析。你可以在\
  \ `SCRIPT` 的开始和结束元素内使用 JavaScript 函数，也可以使用 HTML 规范中任何合法元素的 `javascript:` 参数。\n要将图像更改回原始图像，你必须使用文档对象的相同\
  \ `src` 属性来执行此操作——只需更改图像文件的 URL。浏览器将加载数据并存储，直到它被你选择的事件处理程序触发。\n在前面的例子中，我们使用了两个变量来存储和检索图像数据。完全有可能，并且在某些情况下是可取的，使用一个数组而不是许多变量。只需声明数组，按照前面给出的确切方式分配\
  \ `src` 属性，但使用 `arrayName[count]=` 赋值代替简单的变量声明。\n如果你需要在不同时间更改文档许多不同部分中的许多不同图像，你会使用这种技术。如果你想同时更改许多相同的图像，你应该使用变量——存储在变量中的图像数据可以重复使用。\n\
  \n## 使用 `innerHTML` 更改 HTML 代码\n\n根据我的发现，`innerHTML` 属性在使用上有时有点令人困惑。出于某种原因，`outerHTML`\
  \ 似乎对大多数人来说是最好的选择，但情况并非总是如此——证明这一点很简单，因为 HTML 规范中包含的是 `innerHTML` 属性，而不仅仅是 `outerHTML`\
  \ 属性。\n\n使用 `id` 属性将 `nameon()` 函数中的 JavaScript 命令分配给该单个页面元素。将作为 `id` 属性值的名称作为参数传递给我们用于实现目标的两个函数。我们使用两个事件来触发两个单独的动作：`onMouseOut`\
  \ 和 `onMouseOver`。\n\n### 清单 6-6 `innerHTML` 练习\n```javascript\nfunction nameon()\
  \ {\n    document.getElementById('h2text').innerHTML=\"欢迎！\";\n}\nfunction nameout()\
  \ {\n    document.getElementById('h2text').innerHTML=\"你今天好吗？\";\n}\n```\n```html\n\
  <span onmouseover=\"nameon()\" onmouseout=\"nameout()\">将鼠标悬停在此文本上！</span>\n```\n\
  \n如果你有一个必须随着用户触发事件而改变的操作，这将特别有用。请记住，你不必止步于一个命令，因此你可以在函数中加载任何你想要的功能。`innerHTML` 属性主要用作文本编辑指令，但通过一点事先思考和创造力，你可以在文本更改时分配\
  \ DOM 样式表规则。你希望包含为更改内容的每一组文本都可以应用其自己的样式表规则。\n\n\n## 更改页面元素的位置\n\n在我们深入探讨 `style.position`\
  \ 语句的使用之前，你必须理解该语句的两个选项之间的区别。你通常会将它们与 `ilayer` 元素一起使用，以实现下拉菜单。它们各有优缺点，并且每种都有其特定的使用方式。\n\
  \n### 绝对定位\n\n第一个选项是 `absolute`。绝对定位的文档元素根据浏览器计算出的、相对于文档左上角的位置进行定位。它以像素为单位表示。被分配此定位模式的元素将保持在给定的位置，即使文档的其余部分在浏览器窗口调整大小时发生调整或移动也是如此。\n\
  \n例如，如果你在文档中对一个居中的表格进行了绝对定位，然后用户调整了窗口大小，那么表格中被绝对引用的那部分将保持不动——文档的其余部分将会移动。如果你想使用这种定位技术，出于实际原因，你必须将页面左对齐，`valign=top`。这是因为文档是根据文档的左上角进行绝对定位的。如果浏览器窗口被调整大小，页面不会移动，绝对定位的元素在文档中的引用位置也将保持不变。\n\
  \n### 相对定位\n\n相对定位的页面元素是迄今为止最有用的。它通常被应用为表格中的一个位置。该位置被引用为一个绝对定位的点，但是参照由 `TD` 元素指定的文档区域的左上角。如果页面被调整大小，`TD`\
  \ 元素将会移动，但附着在该元素左上角的内容将随着 `TD` 元素的调整而调整，从而保持表格结构的完整性。因此，调整浏览器窗口大小将会移动整个表格，包括作为表格内容给出的相对定位部分。\n\
  \n```javascript\nfunction moveleft() {\n    document.getElementById('header').style.position=\"\
  absolute\";\n    document.getElementById('header').style.left=\"0\";\n}\nfunction\
  \ moveback() {\n    document.getElementById('header').style.position=\"relative\"\
  ;\n}\n```\n\n将鼠标悬停在此文本上\n\n清单 6-7\n定位页面元素\n\n请注意，`style.left` 属性在 JavaScript 函数中被声明为第二条语句。这是浏览器将用于定位内容的值，以像素为单位。另请注意，如果你使用的是相对定位，则不必使用\
  \ `style.left` 属性。\n\n## 使用 `onMouseMove`\n\n`onMouseMove` 是一个文档范围的事件处理程序，仅适用于 `BODY`\
  \ 元素。你可以使用 JavaScript 方法，但这通常不是好做法，因为它会用不需要的属性弄乱你的 `BODY` 元素。在文档的头部使用一个 JavaScript\
  \ 函数，并像往常一样通过 `onMouseMove` 事件处理程序来调用它。\n\n```javascript\nvar i=1;\nfunction moveright()\
  \ {\n    document.getElementById('header').style.position=\"absolute\";\n    document.getElementById('header').style.left=i;\n\
  \    i++;\n}\n```\n\n将鼠标移到此页面上\n\n清单 6-8\n使用 `onMouseMove` 事件处理程序\n\n请注意，一个赋值了值的变量被用作\
  \ `style.left` 属性的参数。这只是为了展示可以使用变量名作为值。你可以在文档的其余部分使用其他 JavaScript 函数来计算变量中给出的值。这将允许一种有限的动态定位，同时仍然受益于支配绝对定位文档元素的规则。\n\
  \n## 使用 `onLoad` 和 `onUnload`\n\n加载事件处理程序非常有用。你可以通过许多不同的方式使用它们，所有这些方式都非常实用且易于实现。示例中使用的两个\
  \ JavaScript 函数相当基础，尽管第一个函数 `starttimer()` 使用了四条 DOM 语句和两个 JavaScript 对象激活。\n\n\
  ```javascript\nvar i=10\nfunction starttimer() {\n    document.getElementById('h_one').style.position=\"\
  relative\";\n    document.getElementById('h_one').style.left=+i;\n    document.getElementById('h_two').style.position=\"\
  relative\";\n    document.getElementById('h_two').style.top=+i;\n    i++;\n}\n```\n\
  \n标题一\n标题二\n\n清单 6-9\n使用 `onLoad` 和 `onUnload` 事件处理程序\n\n我们已声明的 JavaScript 函数是相对定位的。文档中这个相对定位部分的值由变量\
  \ `i` 给出。请注意，递增操作符（`+`）与变量名一起使用。这将变量内的数值递增一，从而改变所述页面元素的位置。\n\n能够将数据从一个页面携带到下一个页面，而无需先将该数据发送到\
  \ Web 服务器进行存储、处理并在下一个页面重新提供，这极其方便。使用 `onUnload` 事件处理程序，你可以附加一系列嵌套命令，允许你将用户偏好等数据存储在用户机器上的\
  \ Cookie 中，并通过使用 `onLoad` 事件处理程序从该 Cookie 加载数据，动态地格式化下一个页面。\n\n## 让文本变大\n\n应用文本格式化程序非常简单。只需使用\
  \ DOM 规范中包含的任何 CSS 规则即可。在这种情况下，我们正在改变文本的大小。我们将更进一步，同时引入一个最大的文本尺寸。\n\n```javascript\n\
  txtsize=0;\nmaxsize=100;\nfunction writemsg() {\n    if (txtsize < maxsize) {\n\
  \        txtsize=txtsize+2;\n        document.getElementById('mytext').style.fontSize=txtsize;\n\
  \    }\n}\n```\n\n这段文本将会变大\n\n清单 6-10\n更改文本大小属性\n\n`style.fontSize` 属性用于更改文本的大小。有许多样式规则可以以完全相同的方式应用在此处，以更改许多不同的文本格式化选项。但是，你并不局限于每个函数只应用一个文本格式化选项——你也可以应用规则组来构建你想要的外观和感觉。\n\
  \n## 更改“输入”字段的背景颜色\n\n此选项可以轻松地在页面加载时应用，或根据用户选择来应用。我们使用 `style.background` 语句来更改颜色。颜色可以声明为命名颜色、十六进制颜色或\
  \ RGB 颜色。\n\n```javascript\nfunction changeColor(color) {\n    document.getElementById('x').style.background=color;\n\
  }\n```\n\n将鼠标悬停在三个表格单元格上，输入字段将改变其背景颜色\n\n清单 6-11\n更改 INPUT 字段的颜色\n\n请确保在你想要应用更改的输入字段上使用适当的\
  \ `id` 属性。传递给 `changeColor()` 函数的参数以命名颜色的方式静态声明，但也可以通过用变量替换命名颜色，由其他函数来决定。该值的值随后可以由页面内的其他函数决定。\n\
  \n## 更改“输入”字段的文本颜色\n\n更改输入字段内文本的一个简单方法是使用常用的 `style.color` 语句。\n\n它可以根据一个或多个选项进行更改。完全有可能让这些关于更改为什么颜色的决定成为其他\
  \ JavaScript 函数的一部分。\n\n使用的着色方法是命名颜色、十六进制颜色或 RGB 颜色。你可以在脚本逻辑进程中的任何给定点混合使用这三种方式。\n\
  \n```javascript\nfunction changeColor(color) {\n    document.getElementById('x').style.color=color;\n\
  }\n```\n\n将鼠标悬停在三个彩色的表格单元格上。文本将会改变颜色。\n\n清单 6-12\n更改 INPUT 字段的文本颜色\n\n请注意，这种更改文本格式的方法可以应用于文档中的任何位置，使用任何有效的、反映\
  \ CSS 规则的 DOM 对象。\n\n## 更改“输入”字段的背景图片\n\n许多网站都使用这个小而强大的功能块。互联网基于外观和感觉，因此处理大量显示选项显然是非常常见的。最容易理解的就是简单地更改文本输入字段中使用的背景图片。\n\
  \n\n\n我们使用预加载器来获取即将显示的图像数据。`document` 对象的 `src` 属性用于告知浏览器文件的位置。页面加载时，图像的数据会被获取并存储，整个页面即可立即使用。需要注意的是，如果您希望将显示的图像切换回原始图像，必须使用另一个\
  \ `src` 属性语句来获取原始图像数据并存储。然后，您可以根据需要让图像切换回去。\n\n```\nfunction bgChange(bg) {\n  \
  \  document.getElementById('x').style.background = \"url(\" + bg + \")\";\n}\n\n\
  将鼠标悬停在这些图像上。输入框将获得新的背景图像。\n\n代码清单 6-13\n将图像用作背景\n```\n\n使用一个简单的 `id` 属性来唯一标识要应用更改的页面元素。此\
  \ `id` 用作 `getElementById` 对象的参数。然后，我们使用 `style.background` 属性从众多可用的样式表选项中进行选择，并在触发\
  \ `onMouseOver` 事件时应用新值。您可以为图像文件位置使用相对或绝对 URL，图像格式可以是浏览器支持的任何格式，在本例中为 `.jpg`。\n\n\
  ## 选择表单中的所有复选框\n\n这是一个非常有用且易于理解的实现过程。在处理表单时，如果您有大量选项需要选择或处理长列表，您无疑至少需要在一个页面中包含此功能。此功能的一个例子是雅虎邮件中选择所有电子邮件进行删除或移动的选项。`checked=true`\
  \ 值用于勾选该单个表单内的所有复选框。重要的是要意识到，这仅在您使用单个表单（无论大小）时才有效。如果同一页面上有多个表单需要提交此功能，您必须在另一个不同的函数中提供完全独立的\
  \ `checked=true` 语句。\n\n```\nfunction makeCheck(thisForm) {\n    for (i = 0; i <\
  \ thisForm.elements.length; i++) {\n        thisForm.elements[i].checked = true;\n\
