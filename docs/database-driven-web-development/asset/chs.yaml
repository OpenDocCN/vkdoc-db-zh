  \ `class=` 属性，你能够为菜单内的每个元素单独分配特定的格式。\n\n### 点击驱动的水平滑动菜单\n\n你们都见过鼠标悬停时会弹出的水平菜单，但如果你发现这不符合你的需求，完全有可能改变这一点。你可以通过鼠标点击（`onClick`\
  \ 事件处理程序）来启动菜单，并用一个 `onMouseOut` 事件使其滑动回去从而收起菜单。如果你希望菜单在按钮按下时滑出，在按钮抬起时滑回，请使用 `onMouseDown`\
  \ 和 `onMouseUp` 事件处理程序。\n\n可以应用任何 CSS 规则，并且可以在菜单内使用任何 HTML 元素。你甚至可以在上面放置一个表单，如果你选择这样做的话。一定要添加一些或大或小的图像来增加吸引力。\n\
  \n我们使用 `getElementById()` 方法来访问页面元素的属性并对其执行操作。一个单独的 `onClick` 事件处理程序执行文档头部的 JavaScript\
  \ 函数，然后菜单就会滑出。\n\n```\nbody{\n    font-family:arial;\n}\na {\n    color:black;text-decoration:none;font:bold;\n\
  }\na:hover {\n    color:#606060;\n}\ntd.menu {\n    background:lightblue;\n}\ntable.nav\
