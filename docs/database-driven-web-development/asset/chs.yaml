  \n\n### 使用 `param()` 方法进行管理\n\n`CGI` 模块提供的最常用方法之一就是 `param()` 方法。它用于捕获用户正在交互的 HTML\
  \ 页面发送到 Perl 脚本的参数：\n\n```\n$param1 = $cgi->param('input1');\n```\n\n如您所见，使用 `CGI`\
  \ 模块捕获参数是一件简单的事情。如果您需要捕获多个参数，只需在下一行开始一个新的 `param()` 方法即可，如下所示：\n\n```\n$param1 =\
  \ $cgi->param('input1');\n$param2 = $cgi->param('input2');\n```\n\n第二个参数的捕获方式与第一个完全相同。两者之间唯一的区别是\
  \ Perl 变量名和参数名。很简单。\n\n### 获取调用 IP 地址\n\n正如我们将在本书后面的章节中看到的，有时了解谁在您的网站上做什么是必要的。在后面的章节项目中，您将把照片上传到服务器以显示为您的头像。因为此功能可能受到恶意攻击，例如上传非法或不合适的图片，所以了解是谁在上传照片至关重要。`CGI`\
  \ 模块已为此情况做好准备，提供了一种检索用户 IP（互联网协议）地址的方法。\n\n互联网上的每台计算机和服务器都有一个唯一的 IP 地址。这是必需的，因为如果有两台计算机具有相同的\
  \ IP 地址，互联网上的其他计算机将不知道将信息发送给哪一台。\n\n`CGI` 模块通过以下简单语句提供了这个功能：\n\n```\n$userip = $cgi->remote_host();\n\
  ```\n\n在您的 Perl 脚本中使用这行简单易用的代码，可以告诉您刚刚与脚本交互的人的 IP 地址。您不必将此功能限制在一个上传脚本中。因为它如此易用，您可以在每个正在使用的脚本中记录用户的\
  \ IP 地址，并将其存入您的数据库。\n\n#### 进行系统调用\n\n因为 `CGI.pm` 并非包罗万象，您很快会发现需要利用服务器的操作系统来获取某些信息。首先想到的就是日期和时间。`CGI.pm`\
  \ 能做很多事，但不能进行时间日期戳记。正如您在前一章所学，`MySQL` 允许时间戳记，但那只是记录在数据库中创建的时间。\n\n要进行系统调用，您可以使用\
  \ Perl 的反引号 (\\`) 操作符。下面展示了如何使用反引号操作符来查找日期：\n\n```\n$date = `date`;\n```\n\n如您所见，检索确切的日期和时间是一个相当简单直接的操作。因为反引号操作符允许执行任何系统命令，所以也可以通过脚本操作来处理文件和目录。\n\
  \n### 错误处理\n\n在使用 Perl 时，您需要在脚本结构中包含错误处理。所谓错误处理，是指可能出现的不可预见的错误，这些错误可能是您脚本的缺陷，也可能是用户恶意攻击的产物。\n\
  \n在 Perl 中有几种处理错误的方法，我们将在本节中讨论所有这些方法。在处理错误之前，建议您首先设置脚本以正确报告错误。这就是 `CGI::Carp` 模块发挥作用的地方。\n\
  \n### `CGI::Carp`\n\n这个模块对开发人员来说是一个非常宝贵的工具。通过它，Perl 抛出的错误会被回显到浏览器供您在那里阅读。如果您不使用\
  \ `CGI::Carp`，您的浏览器将显示“错误 500。发生了关键系统错误”，这并不能告诉您太多信息。每次脚本抛出致命错误时，您都必须查看 Apache 错误日志。这可能非常烦人，并且肯定会大大减慢您的速度。\n\
  \n`CGI::Carp` 模块必须与脚本将使用的其他 Perl 模块一起在脚本顶部声明：\n\n```\nuse CGI::Carp qw(fatalsToBrowser);\n\
  ```\n\n它可以在您使用的模块列表中按任意顺序输入。这样使用时，抛出的每个错误都会被发送到浏览器。发生的错误会以通俗的语言报告，同时还会报告错误所在的 Perl\
  \ 脚本行号和脚本名称。然后您可以确切地知道是什么导致了错误，并找到快速的解决方案。\n\n### 何时何地使用错误处理\n\n错误处理有时有点碰运气。一个致命错误可能会以您没想到会出问题的方式、从脚本的某个部分抛出。在调试脚本时，您会学到在哪里使用错误处理。\n\
  \n我通常会在每个数据库调用上自动包含错误处理。使用 `MySQL` 时，即使是最轻微的错误也是致命的。大多数时候，错误是由用户以您未预料到的方式使用您的脚本引起的。恶意用户也是每个网络开发者的祸害。\n\
  \n有几种方法可以处理脚本将抛出的错误。一种是将 Perl 代码包装在 `eval` 语句中，或者将用户重定向到不同的自定义错误页面。\n\n\n## 处理错误\n\
  \n错误处理的位置与错误处理本身同等重要。对于数据库调用，处理错误最简单的方式是在错误被抛出后进行捕获，并将用户重定向到一个自定义的错误页面。我通常会重定向到一个用\
  \ HTML 编写的自定义错误页面，该页面会将用户登出站点，要求他们重新登录，并希望他们不要再尝试相同的操作。以下是实现此功能的代码：\n\n```\n此 HTML\
  \ 代码与其它元元素一起置于文档的头部。它告诉浏览器在给定的秒数后获取页面。如果你将时间值设为 0，页面会在加载时立即重定向到指定的 URL，使用户除了被重定向到新的错误页面外无法执行任何操作。\n\
  ```\n\n#### 外部 HTML 内容模板\n\n最终你会达到需要将 HTML 内容打印到浏览器的阶段。有几种方法可以做到这一点，其中最简单的方法是为你页面的每一行\
  \ HTML 代码使用一个`print`语句。这并不推荐，因为这是一种低效的打印页面方式。\n\n正如我们将在后续章节中看到的，当我们实际开始显示页面时，有一种高效的方法可以完成向浏览器的多行打印——外部内容模板。\n\
  \n此模板保存将用于显示页面的 HTML 内容。你可以使用任意数量的模板。模板通过一个简单的`require`语句包含在脚本中：\n\n```\nrequire\
  \ \"content.pl\";\n```\n\n在`content.pl`中是 HTML 标记，以及放置在战略位置的变量和数组名称。`content.pl`文件在脚本末尾附近被引入，此时所有\
  \ Perl 脚本操作都已应用于动态的数据库驱动的 HTML 代码。以这种方式应用模板允许你在页面中包含大量内容。\n\n在`content.pl`内部有两个不同的变量和一个数组。变量是`$topcontent`和`$bottomcontent`，数组是`@contentarray`。内容模板的\
  \ HTML 表格以一种战略方式结束和重新开始，这使得它们之间的内容能够内联显示并嵌入到运行的标记代码中，以使页面看起来像一个连贯的网页。有关此示例，请参阅列表\
  \ 2-3。\n\n```\n$topcontent\n@contentarray\n$bottomcontent\n\n列表 2-3\n一个外部内容模板的示例\n\
  ```\n\n正如你可能推测的，`$topcontent`包含应出现在数据库生成内容（位于`@contentarray`中）顶部的标记。`$bottomcontent`则关闭标记，使其与`content.pl`中的静态标记相匹配。\n\
  \n#### 将动态内容打印到浏览器\n\n为了将你生成的和静态的内容打印到浏览器，`content.pl`中的 HTML 标记被封装在一个大的变量`$htmlcontent`中。然后，只需使用两个易于使用的命令，就可以轻松地将动态内容打印到浏览器：\n\
  \n```\nprint qq{Content-type: text/html\\n\\n};\nprint qq{$htmlcontent};\n```\n\n\
  第一个`print`语句告诉浏览器，发送给它的数据类型是`text/html`，这是一种更优雅的说法，表示即将发送的是 HTML 标记。第二个`print`语句打印巨大的`$htmlcontent`变量，该变量包含了来自`content.pl`的静态标记以及位于`$topcontent`、`@contentarray`和`$bottomcontent`中的数据库生成内容。\n\
  \n### Perl 与 MySQL 基础\n\nPerl 和 MySQL 协同工作，为操作数据库数据实现了一些非常强大的流程。通过使用 Perl DBI 模块，可以非常及时地存储和检索数据库数据。DBI\
  \ 模块是一个很好的工具，因为它包含了你可能遇到的几乎所有数据库操作的方法。\n\n我们将探索 Perl 和我们最终都会遇到的 MySQL 查询的语法与用法。在本章中，我们将专注于从数据库检索信息，其中也有一些例外以增加趣味性。\n\
  \n在接下来的示例中，展示了获取数据的每一种可想象的方法。你会看到检索数据片段的方法简单且直截了当。一旦数据被检索出来，你就可以以任何你认为合适的方式对其进行操作。为了简单起见，数据将按照其在数据库中出现的形式原样存在于变量和数组中。\n\
  \n#### 将一个数据库项选择到一个变量中\n\n从数据库中检索一条信息是一个直接的操作，但有一些细微之处需要解决。首先，你需要决定是使用`fetchrow()`方法还是`fetchrow_array()`方法。因为只有一条信息需要检索，所以将使用`fetchrow()`方法。\n\
  \n请注意，完全有可能使用`fetchrow_array()`来获取数据片段——你通常不会这么做，因为那不是它设计的用途。`fetchrow_array()`方法会创建一个数组并将其加载到内存中，而不是一个标量变量。由于我们只从数据库中取出一条信息，不建议你在这种情况下使用`fetchrow_array()`。\n\
  \n#### 使用三步法选择一段数据\n\n列表 2-4 展示了如何定义查询并将其放入`$query`。然后你用`prepare()`方法准备查询，并通过调用`execute()`方法来执行查询。接着你用`fetchrow()`方法捕获数据片段并将其放入`$thisvariable`。\n\
  \n```\n$query = \"SELECT id FROM this_table WHERE id = 12\";\n$sth = $dbh->prepare($query);\n\
  $sth->execute();\n$thisvariable = $sth->fetchrow();\n列表 2-4\n应用三步法\n```\n\n注意在示例中定义了一个`WHERE`子句。这是从数据库中选择一个或多个类似信息片段的好方法。我们将在接下来的几个示例中探讨`WHERE`子句。敬请期待。\n\
  \n#### 使用两步法选择一段数据\n\n使用以下两步方法，我们在`prepare()`方法内定义查询，并通过调用`execute()`执行查询。代替前一个示例中的`$query`变量，我们将文本数据库查询作为参数发送给`prepare()`。然后我们用`fetchrow()`方法捕获数据片段并将其放入`$thisvariable`。\n\
  \n```\n$sth = $dbh->prepare(SELECT id FROM this_table WHERE id = 12);\n$sth->execute();\n\
  $thisvariable = $sth->fetchrow();\n```\n\n正如你可能从示例中推断出的，这是一个非常基础的结构。对于简单、干净的代码，你只会将两步方法用于简单的\
  \ MySQL 查询。三步方法——在那里你有更多的行空间——更适合我们将在本书后面使用的多行结构。现在我们将通过使用`do()`方法来探索一步方法。\n\n####\
  \ 使用一步法选择一段数据\n\n我们使用`do()`方法来定义、准备和执行一个数据库调用，然后用`fetchrow()`方法捕获数据片段，并将其放入`$thisvariable`。如果你的同一脚本中有许多简单的数据库查询，这是一个清理代码的好方法。需要阅读的内容更少，混乱就更少，你的代码总体上更干净。\n\
  \n```\n$dbh->do(qq{SELECT id FROM this_table WHERE id = 12});\n$thisvariable = $sth->fetchrow();\n\
  ```\n\n\n### 将多个数据库项选择到多个变量中\n\n如果你需要快速执行少量工作，通常会使用一步到位的 `do()` 方法。你肯定不想在一个长达百万次迭代的\
  \ `foreach` 循环中使用 `do()` 方法。\n\n由于将来会有将大量信息选择并存入多个变量的需求，本章的示例将展示这一点。然而，在继续之前，有几个要点需要考虑。本书的这一部分将深入探讨这些需要记住的要点，并提供反映我们目标功能的示例任务。\n\
  \n你可以使用两个通用函数通过 Perl 的 `DBI` 模块从数据库中检索数据。其中一个是用于从数据库中提取单条数据。这就是 `fetchrow()` 方法。它用于从数据库中检索单条信息，并将其存储于一个标量变量或一个简单的数组中。因为我们将会检索多条信息，所以建议你使用\
  \ `fetchrow_array()` 方法来实现你的数据库查询。\n\n`fetchrow_array()` 方法比 `fetchrow()` 方法更高级，使用此方法执行起来非常快速且可靠。与\
  \ `fetchrow_array()` 方法配合使用的简单构造既高效又直观，这无疑促成了 Perl `DBI` 模块的广泛流行。\n\n数据库查询本身必须是允许检索多条数据的那种。使用\
  \ `WHERE` 子句是实现这一目标最简单、最直接的方式。例如，如果你在 `WHERE` 子句中使用一个确定的值，你将只能检索到一条数据。通过使用设计为提供多个结果的\
  \ `WHERE` 子句，脚本就能够从多个列或行中检索多个值，正如示例所示。一个简单的 `>`（大于）运算符就能很好地实现这一点，你将在接下来的示例中看到。\n\
  \n这些示例概述了可用于检索多条信息并将其存储于多个标量变量中的构造。你可以用数组代替这些变量，但不推荐这样做。尽可能保持代码简单，你会得到最好的结果。\n\n\
  和往常一样，检索到的数据应按照其存在于数据库中的形式呈现在你的变量和数组中。这有助于形成清晰简洁的数据库模型和易于理解的脚本。这也是一种非常易于实现的数据库操作方法。\n\
  \n### 将多个数据库项选择到一个数组中\n\n现在，让我们开始将数组作为数据库查询的最终产物。我们将从最简单的构造开始，从数据库中提取多条信息并放入一个数组中。因为一次只需从数据库中提取一条信息，所以将使用\
  \ `fetchrow()` 方法。连续的数据库数据项通过 `push` 操作添加到数组中，以实现最终结果——一个精确反映你的数据库列的数组。\n\n此示例从一个表中提取多行数据，并将该表数据放入一个数组中。然后，你可以通过索引号访问数组中的数据，或者遍历整个数组以获得一个大型列表。示例任务中值得注意的是\
  \ `id >= 0`，它告诉 `MySQL` 获取所有 `id` 值大于或等于零的列。这实质上会获取表中的每一行，并将数据放入一个数组中，该数组将完美地反映你在该数据库列中的数据。\n\
  \n你不会使用 `fetchrow_array()`，因为我们只获取数据库表的一列。虽然我们只获取一列，但这些列会跨越多行。在这种情况下，不需要 `fetchrow_array()`\
  \ 方法。`fetchrow()` 方法就能很好地满足需求。\n\n在这些示例中，可以看到探讨了从数据库中提取数据的每一种可能选项——`DBI` 模块是一个非常出色的作品。从示例任务中可以看出，使用所述方法可以获取非常大量的信息。然后，你可以根据需要处理这些数据。使用这样的数据库调用，你实际上是在处理非常大量的数据。构建列表只是一个通过\
  \ `foreach` 或 `while` 语句循环遍历索引项的简单过程。\n\n### 使用 WHERE 子句选择多条信息\n\n`WHERE` 子句是非常有用的工具。它们易于理解和和使用，并使你的数据库调用易于实现。你可以应用字符串或数字类型的语法。正如你在清单\
  \ 2-5 中所见，数学运算符可以用在你的 `MySQL` 语句中。\n\n```perl\n$query = \"SELECT col1 FROM this_table\
  \ WHERE id >= 0\";\n$sth = $dbh->prepare($query);\n$sth->execute();\nwhile ($thisvalue\
  \ = $sth->fetchrow()) {\npush @thisarray, $thisvalue;\n}\n```\n清单 2-5：实现 WHERE 子句\n\
  \n\n\n### 从多个数组中选择多个项目\n\n对于不熟悉的人来说，从数据库中选择大量不同的数据可能是一件棘手的事。本书的撰写，部分原因就是为了解答我们所有人关于从数据库中选择多种不同信息的疑问。\n\
  \n首先需要考虑的是你希望数据呈现的形式。也就是说，我们将要使用的数组的排列应完美地反映数据库数据。每一列将被选入一个数组，该列的每一行将成为该数组的一个索引项。\n\
  \n使用多个数组来表示多个列是一个值得遵循的良好编程规范。它使数据库数据易于理解，也更容易操作。\n\n我在清单 2-5 中提供的示例中，数组是`@col1`、`@col2`和`@col3`。它们完美地反映了数据库中存在的原始数据。你可以看到，我们使用了一个简单的数组`push`操作，将后续的数据片段加载到这三个数组中。\n\
  \n通过使用`WHERE`子句，我们能够选择数据库中那些列里的每一条数据。使用`>=`（大于或等于）这样的运算符可以让 MySQL 确切地知道你需要哪些信息。`id`列是一个`AUTO_INCREMENT`（自增）列。\n\
  \n你可以按前面提到的`AUTO_INCREMENT` `id`列对查询进行排序，而无需将`id`列选入变量或数组——MySQL 会为你完成这项工作。你甚至不必选中`id`列；只需在你的查询中引用它，MySQL\
  \ 就会相应地操作。这样做的好处是保持变量或数组的数量易于管理，并简化了整个脚本。`id`列存在于我们将要使用的每一个假设表中，并且是表的主键。\n\n`AUTO_INCREMENT`\
  \ `id`列存在于我们将要使用的每个表中，因为它是一种引用表行和表列内容的便捷方式。使用这种方法将确保你在这种 Perl、MySQL 和 Apache 的组合下，拥有最快、功能最强大的查询。请考虑以下示例：\n\
  \n```perl\n$query = qq{SELECT col1, col2, col3 FROM $this_table WHERE id >= 0 ORDER\
  \ BY id DESC};\n$sth = $dbh->prepare($query);\n$sth->execute();\nwhile (@this_data\
  \ = $sth->fetchrow_array()) {\n    push @col1, $this_data[0];\n    push @col2, $this_data[1];\n\
  \    push @col3, $this_data[2];\n};\n```\n\n我们构造了一个查询；在本例中，查询针对三个项目：`col1`、`col2`和`col3`。我们使用\
  \ DBI.pm 的`prepare()`方法准备查询。这会检查查询的语法是否正确。然后我们使用`execute()`执行查询，这会将查询发送到数据库。接着，我们使用\
  \ DBI.pm 的`fetchrow_array()`方法收集数据。数据现在包含在`@col1`、`@col2`和`@col3`中，并且与数据库的列和行完全匹配。\n\
  \n我们使用`fetchrow_array()`是因为我们想从数据库中拉取多条信息。对于`while`语句的每一次迭代，我们将数据收集到`@this_data`数组中。然后，使用一个简单的`push`语句将数据推入`@col1`、`@col2`和`@col3`。接着`while`语句再次循环，一组新的数据被推入`@this_data`，然后又被推入那三个列数组中，这个过程重复进行，直到没有更多数据可以从数据库中检索为止。\n\
  \n关于系统资源需要说几句。使用如此强大的结构可能会导致服务器过载。这是因为在示例中，可能会有大量数据被提取到三个列数组中。关于你的数据，一个很好的惯例是考虑服务器可用的`RAM`（内存）量。在大多数系统上，你可以使用各种程序检查平均可用内存量。我们不会深入探讨这类程序的工作原理。我们现在需要知道的是服务器上可用的`RAM`量。简单来说，就是不要获取超过你拥有的内存量的数据。\n\
  \n### 从一个数组插入多个数据库项\n\n使用数组来插入数据库项有点复杂，但仍然是一项相当简单的任务。只是在使用这种方法时需要考虑几个问题。本节将解释它们。\n\
  \n使用一个在每次循环迭代时递增的`$count`变量，可以根据需要动态插入任意多行。你的限制是你的资源，所以必须谈谈系统资源。因为这种插入表行的方法非常强大，如果使用一个包含数据量超过服务器能够成功且及时处理能力的数组，就有可能使服务器不堪重击。你不应该使用这样的结构来一次性插入数千行表数据，尤其是当每条数据都包含许多千字节信息时。由此产生的操作，虽然仍然是安全的，但可能会让你的服务器过载。\n\
  \n虽然在你的结构中使用`while`循环也可以实现相同的结果，但带有`$count`变量的`foreach`循环的效率和简洁性使其成为更好的选择。使用`foreach`循环要处理的事情更少，因为我们只是遍历数组的索引项并增加计数。`foreach`循环会自动遍历整个数组，并在到达给定参数数组的末尾时停止。\n\
  \n使用`while`语句，你需要执行一个测试，检查`$count`是否与数组中的索引项数量匹配。这会稍微减慢速度。然而，如果你事先知道数组中的项目数量，那么请务必使用`while`语句。请记住，这仅适用于你事先知道要使用的数组长度的情况。\n\
  \n#### 使用 foreach 循环从数组插入\n\n我们声明了数据库查询并将其放入`$query`。然后我们调用`prepare()`方法来准备执行`$query`。`execute()`方法用于执行数据库调用，我们使用`while`循环遍历表列，在每次迭代时推入数组。\n\
  \n使用 Perl 和 MySQL，完全可以在一次数据库查询中选择大量信息。你最终会想创建一些非常大的信息列表，这些列表反映了数据库的许多列和行。就像我之前说的，你希望你的数组和变量反映你数据库的内容。\n\
  \n因为脚本多次调用数据库，所以必须通过让变量和数组反映数据库结构来保持清晰和简单。对于数据库的每一行，都有一组相应的数组来表示表的列。这种在变量和数组中反映数据库结构的简单而有效的方法，是一个值得坚持的良好编程规范。它将使你未来更复杂的脚本更容易理解，并为未来的复杂操作提供更复杂的数据库模型。\n\
  \n接下来的例子展示了如何将来自多行表的数据放入反映数据库结构的列中。你可以看到，检索到的数据被放入三个不同的数组中以便处理。DBI.pm 模块的`fetchrow_array()`方法用于执行多列查询。数据库的每一列都反映在随后的数组中，每个数组对应一列。各行被构造为每个连续数组的索引项。\n\
  \n\n\n#### Perl 中从数组插入数据库数据的方法\n\n##### 使用循环处理单数组插入\n\n从示例中可以看出，使用 Perl 循环遍历数组的索引项是件简单的事。`$count`\
  \ 变量为你跟踪索引项，使数据库列精确反映 `@this_column` 的内容。随着 `@this_column` 的每次迭代，`$this_column[$count]`\
  \ 的值发生变化并被加载到数据库中。我们使用了一个简单的单列 MySQL 语句来完成任务（见清单 2-6）。\n\n```perl\n$count = \"0\"\
  ;\nforeach (@this_column) {\n    $query = qq{INSERT INTO this_table (col1)\n   \
  \             VALUES\n                ('$this_column[$count]')};\n    $sth = $dbh->prepare($query);\n\
  \    $sth->execute();\n    ++$count;\n};\n##### Listing 2-6\n##### 使用 foreach 循环从数组执行\
  \ INSERT 操作\n```\n\n我们声明了一个计数器并声明了一个 `foreach` 循环，该循环将迭代直到达到 `@this_column` 的长度。然后我们声明查询并将其放入\
  \ `$query`。接着使用 `prepare()` 函数为查询执行做准备。我们使用 `execute()` 函数执行查询，并为循环的下一次迭代递增 `$count`。\n\
  \n请注意，我们使用了执行数据库查询的三步法。还有另外两种方法可用于声明、准备和执行查询，如清单 2-7 所示。\n\n```perl\n$count = \"\
  0\";\nforeach (@this_column) {\n    $sth = $dbh->prepare(INSERT INTO this_table\
  \ (col1) VALUES ('$this_column[$count]'));\n    $sth->execute();\n    ++$count;\n\
  };\n##### Listing 2-7\n##### 使用两步法从数组执行 INSERT 操作\n```\n\n前面的示例任务展示了实现成功插入查询的两步法。你可以看到我们省略了\
  \ `$query` 标量变量，而是将查询作为参数传递给 `prepare()` 函数。然后调用了 `execute()` 函数。这种便捷的方法被广泛使用，因为它产生了一个更简洁的查询，比三步法占用更少的资源。\n\
  \n在我们之前的示例中，我们使用 `prepare()` 函数来处理查询。清单 2-8 提供了一种可用的一步法，它完全省略了 `prepare()` 和 `execute()`\
  \ 函数。\n\n```perl\n$count = \"0\";\nforeach (@this_column) {\n    $sth = $dbh->do(INSERT\
  \ INTO this_table (col1) VALUES ('$this_column[$count]'));\n    ++$count;\n};\n\
  ##### Listing 2-8\n##### 使用一步法从数组执行 INSERT 操作\n```\n\n使用 `do()` 方法来执行查询是一个方便的一行代码，既实用又强大。通过它，你可以执行任何有效的\
  \ MySQL 查询。\n\n至此，我们探索了使用三步法、两步法和一步法从数组执行插入操作。这些简单的语句是任何 Web 开发人员众多技巧和构建方法的核心。我们在此探讨的简单插入语句同样可以是非常复杂的\
  \ JOIN 语句，充分利用了这两种编程语言的全部能力和灵活性。限制在于你对语言的理解和你的实际需求。虽然大型、强大的 JOIN 操作可能很有趣，但请保持简单，并使用最简单的方法来达到你期望的最终结果。当你需要处理一年前创建的脚本并期望理解它时，你会感谢自己选择了简单的方法。\n\
  \n### 从多个数组插入多个数据库条目\n\n当你需要将大量数据从多个数组插入到数据库时，时机将会到来。在本节中，我们将探讨如何将存在于多个数组中的数据插入到你的数据库中。引入更多数组并不是坏事；我们只是开始学习这种编程工具组合的巨大灵活性。\n\
  \n我们将首先定义几个虚构的数组，每个数组长度相同。数据可以是文本/ASCII 或二进制。但请注意，你必须使用正确的列类型来创建列。列类型超出了本节的范围，因此我们将假设我们处理的所有数据都是纯文本，并且被放入\
  \ VARCHAR 或 BLOB 列类型中。\n\n将数据从多个数组插入到数据库中的最简单方法是使用 `foreach` 循环遍历这些数组。你会声明一个初始设置为零的\
  \ `$count`。这是因为 Perl 中所有的数组都是基于零的。它们按照从零开始的数字系统进行索引。在 Perl 中，零是一个完整的数字（一个整数）。\n\n\
  对于循环的每次迭代，都会引用多个数组。这会导致可能大量的数据被插入到数据库中。请确保将自己限制在 300 或 400 次迭代以内，尽管如果每次插入的数据量相当小并且你的服务器资源充足，可以使用更多次迭代。你可以根据需要插入任意多的行和列——这种结构具有无限的可扩展性。如果需要，请使用\
  \ `LIMIT` 声明来限制要创建的数据库行数。\n\n你可以使用 `foreach` 循环或 `while` 循环来实现相同的结果。当你有特定数量的行要插入时，使用\
  \ `while` 循环。也就是说，如果你事先知道要插入多少行，那么使用 `while`。如果你要插入的数据库行数量不固定，请使用 `foreach` 循环来遍历你收集到的数组。\n\
  \n#### 使用 foreach 循环从多个数组插入多个条目\n\n在清单 2-9 给出的示例任务中，你可以看到，对于 `@col1` 的每个元素，由于 `$count`\
  \ 的迭代，我们循环遍历了三个数组（`@col1`、`@col2` 和 `@col3`）的索引项。该示例假定你为每个表列准备了三个长度相等的数组。行被一次插入一行，并精确地反映了数组数据。\n\
  \n```perl\n$count = \"0\";\nforeach (@col1) {\n    $query = qq{INSERT INTO this_table\
  \ (\n                    col1,\n                    col2,\n                    col3\n\
  \                ) VALUES (\n                    '$col1[$count]',\n            \
  \        '$col2[$count]',\n                    '$col3[$count]'\n               \
  \ )\"};\n    $sth = $dbh->prepare($query);\n    $sth->execute();\n    ++$count;\n\
  };\n##### Listing 2-9\n##### 使用 foreach 循环执行插入操作\n```\n\n\n"
- '# 3. MySQL 核心技能


  ## 摘要

  在本章中，我们探讨了 Perl 与 DBI 模块协同工作以实现各种强大操作的不同方式。我们研究了数据库结构以及选择或插入相关数据的方法。


  在深入探讨构成本书项目的脚本之前，我们应先打好基础。在本章中，我们将回顾一些必要的技能，以便理解后续内容。您可能已经熟悉这些概念，但在将其应用于实际运行的脚本之前进行复习总是有益的。


  本章我们将梳理项目中将要使用的函数。我们仅涵盖项目中会用到的函数——例如，我们不会涵盖 DBI 模块提供的所有功能。


  ## MySQL 列与索引类型

  MySQL 中提供了多种不同的数据类型，您可以定制数据库表以接受它们。从常见的文本字符到二进制信息，都可以提供支持。任何有效的数据类型都可以使用。有效类型例如数字或字符串。


  列类型在创建表时声明。有许多不同的类型，我们将在后续章节中逐一介绍。虽然我们在项目中不会用到每一种列类型，但了解和理解可用类型的完整范围至关重要。如果您计划扩展其中一个项目（例如一个功能齐全的公告板系统），这些知识将派上用场。


  ### 整数列类型

  我们从整数列类型开始。整数列类型是一种数字类型的列，仅用于存储数字——如果您尝试插入文本，MySQL 将抛出错误。


  整数类型范围非常广泛——可用的有符号数字范围巨大。所谓有符号，是指包含负数表示。请注意，正数的范围比相应的负数范围少一。这是因为数字零仍被视为整数。零是一个值——不应与空值混淆，后者被视为值的缺失。


  ### 浮点数列类型

  浮点数列类型是指包含小数点的列类型。小数点可以从一个位置“浮动”到另一个位置，因此得名浮点数。


  当整数列类型的范围对于手头的任务来说不够高或不够低时，通常使用浮点数。需要注意的是，浮点数是近似值——MySQL 会将浮点数四舍五入到您在创建表时定义的小数位数。


  ### 字符串列类型

  字符串类型包括 `CHAR` 或 `VARCHAR`。`CHAR` 代表“字符”，`VARCHAR` 代表“可变字符”。在创建表时会为列设置一个固定长度。如果数据的长度短于声明的
  `CHAR` 或 `VARCHAR` 长度，剩余空间将用空格填充。需要注意的是，如果您插入的值本身设计上就带有尾随空格，这些空格将被移除。您必须在 Perl 脚本中处理这种情况，以添加尾随空格。


  如果您需要一个二进制、区分大小写的 `CHAR` 或 `VARCHAR` 列，请使用 `BINARY` 标志进行设置。如果存在 `BINARY` 标志，则该列在用于排序或比较时区分大小写。否则，字符串不区分大小写。


  ### BLOB 列类型

  `BLOB` 列类型具有可变宽度。`BLOB` 代表二进制大对象。它们能够存储非常大的数据集，并且不会修剪尾随空格。`BLOB` 列区分大小写。超过最大长度的值将被截断。`BLOB`
  类型不能有默认值。


  ### 枚举或集合列类型

  枚举和集合是字符串列，它们具有一组有限的可能值。如果在创建表时未声明任何值，则将插入空字符串。`ENUM` 列类型的最大值为 64 KB（65535 字节），`SET`
  列类型的最大值为 64 字节。


  要向 `ENUM` 列插入值，请使用字符串字面量，即用引号将字符串括起来。要向 `SET` 列插入多个值，请在开闭引号内用逗号分隔这些值。


  ### 时间列类型

  MySQL 提供了广泛的日期和时间戳类型。时间取自 MySQL 数据库所在服务器的操作系统。


  MySQL 能够在 `ORDER BY` 子句中使用时间和日期戳，因此您可以按日期和时间对数据进行排序。如果您希望按日期、时间或两者对表内容进行排序，这个强大的功能就非常方便。


  所有日期和时间值都是整数。如果由于某种原因，您的日期中包含浮点数，MySQL 将四舍五入到以下最接近的有效值：月份值限制在 1 到 12。日期值限制在 1 到
  31。小时值为 0 到 23，而分钟和秒的值范围是 0 到 59。


  ## Perl 与 MySQL 函数回顾

  无论一项技能的深度如何，复习总是好事，因为您总能获得新的视角。在本节中，我们将回顾将在后续章节开始的项目中使用的特定技能。


  从语法上讲，用 Perl 做某件事总有不止一种方法。因此，我将尝试以不止一种方式呈现本节中的每个主题。


  我们声明 `$count` 并将其设置为零。然后声明 `foreach` 循环，并使用 `@col1` 作为参数。我们可以使用 `@col1` 作为参数，因为每个数组的长度相同——没有数据会在插入时被遗漏。我们声明了查询并将其存储在
  `$query` 中。然后我们使用 `prepare()` 准备查询。我们使用 `execute()` 执行查询，并为循环的下一次迭代递增 `$count`，重新开始该过程并插入更多数据。


  请注意，我采用了更纵向的方式来组织查询，将查询的每个元素放在单独的行上。在 Perl 中，您可以将更复杂的代码分解成更易读的形式。这是我的方式。您会找到适合您的方式。另外请注意，为了使这种方法成为可能，您不应使用双引号来定义查询——双引号仅在整个查询位于一行时才有效。将您的查询嵌套在
  Perl 的 `qq{}` 语句中，以允许您的查询跨越多行。


  您可以看到 Perl `DBI` 模块的工作是多么强大和直观。有了它，您能够从数据库中存储和检索任何数据。虽然我们使用了非常简单的示例作为学习工具，但您未来 `DBI`
  操作的复杂性和能力基本上没有限制。限制在于您的技能和想象力——Perl 和 MySQL 完全能胜任这项任务。


  ### 创建表

  创建表是一件直接了当的事情，但您需要先了解一些事项。我们将使用三步法来创建表。我们在第 2 章中介绍过这个三步法。


  创建表时，您首先需要知道将要使用的列类型。您还需要知道列的名称。记住，列名区分大小写，因此请相应地命名您的列。


  在即将到来的项目中，主键是第一列，名为“id”。如代码清单 3-1 中的表创建示例所示，它是一个自增列。



  ### 循环


  如你所见，创建表格是一个简单但非常强大的功能。`id`列是整数，也是表格的主键。其他`VARCHAR`列的大小范围在 20 到 250 个字符之间。限制为 20
  个字符的列用于存放数字和日期，这些都不会超过 20 个字符长度。`title`列被设置为 250 个字符，因为它是主题的标题。最大字符数（在项目的另一个脚本中定义）为
  250 个字符，因为它是表格的描述性列——主题名称最多可达 250 个字符。你会在我们即将处理的项目的`putnewthread.cgi`中看到这个表格创建代码，所以我暂时不再展示更多代码。请专注于
  Perl 代码中的表格结构。


  我们将在项目中使用的最常见功能是简单的循环。我们将通过使用循环来构造列表，该循环从数据库中选择数据并将其格式化为 HTML 片段。然后，这段 HTML 和来自数据库的数据会被添加到最终结果中，并显示在用户的浏览器中。


  项目中使用两种形式的循环：`foreach()`循环和`while()`循环。每种循环的使用方式和位置略有不同，你将在接下来的讨论中看到。


  #### while( ) 循环


  `while()`循环用于一次选择一个数据。如果只有一个结果，它会被放入一个标量变量中。如果有多个结果，数据会被推入到一个数组中，如代码清单 3-2 所示。


  ```perl

  $query = "SELECT id FROM $thistopic WHERE id >= 0 ";

  $sth = $dbh->prepare($query);

  $sth->execute;

  while ($thisvalue = $sth->fetchrow()) {

  push @theseids, $thisvalue;

  };

  ```


  `while()`循环会迭代，直到没有更多结果被 MySQL 推入数组。注意，主键`id`正在被选择。你会在接下来的脚本中看到很多这样的操作。


  #### foreach( ) 循环


  我们主要使用`foreach()`循环来构造最终将显示给用户的 HTML 标记，尽管这不是它唯一的用途。它也可以用于通过之前的数据库调用来遍历表行。使用`id`列作为限制数据库查询的手段是使用`foreach()`循环的好地方，如代码清单
  3-3 所示。


  ```perl

  $count = "0";

  foreach (@theseids) {

  $query = qq{SELECT title, threadid, posts, date

  FROM $thistopic

  WHERE id = $theseids[$count] LIMIT 30};

  $sth = $dbh->prepare($query);

  $sth->execute();

  while (@thisvalue = $sth->fetchrow_array()) {

  push @titles, $thisvalue[0];

  push @threadids, $thisvalue[1];

  push @posts, $thisvalue[2];

  push @date, $thisvalue[3];

  }

  ++$count;

  };

  ```


  这段代码片段取自`threads.cgi`。它展示了一个`foreach()`循环，只要`@theseids`中存在值（一个基于`id`主键先前收集的数组），它就会迭代循环。你还可以看到一个`while()`循环正被用来基于`$theseids[$count]`数组从数据库收集数据。我们将在后面的章节中更深入地探讨这种结构的运作方式。目前，这个基本结构已经作为循环方面内容的一个示例。


  ### 推入数组


  所谓“推入”数组，是指将一个值添加到数组的末尾。数组可以比作一个列表，每个列表项都被赋予一个从零开始的索引号。每次你推入数组，你就是在向列表的末尾添加内容。推入数组的语法如下：


  ```perl

  push @thisarray, $thisvariable;

  ```


  标量变量`$thisvariable`被添加到列表的末尾，也就是`@thisarray`。很简单。


  我们将在项目中的几乎每个脚本中使用这段代码片段，所以在我们开始详细检查代码之前，你现在理解这个过程非常重要。


  ### 收集内容


  我们将使用的每个脚本都是已格式化为 HTML 标记的独立数据集的集合。在收集数据时，要以易于格式化的方式进行。通常，在收集数据后，会将其放入逻辑有序的 HTML
  标记中，这些标记可以是表格内的文本或锚点标签链接，尽管你不仅限于这两种选项。请检查代码清单 3-4 中给出的代码片段。


  ```perl

  $count = "0";

  foreach (@these_ids) {

  $oneContentElement = qq{

  $thislink[$count] };

  push @endarray, $oneContentElement;

  ++$count;

  };

  ```


  首先，声明一个`$count`并将其设置为零。然后我们使用`@these_ids`作为参数启动一个`foreach()`循环。新声明的标量变量`$oneContentElement`被填充了一些
  HTML 标记。注意，这里使用了三个独立且不同的数组（`@id`、`@id2`和`@thislink`）。每个数组的索引项都被用作`@these_ids`每次迭代的唯一数据。由于`$count`在每次循环迭代时递增，三个数组（三个链接）中的数据随之变化，并被推入`@endarray`。


  正是这整个 HTML 标记被推入`@endarray`，并最终显示在用户的浏览器中。此示例仅包含三个链接的代码。在接下来的项目中，我们还将添加图像、链接和其他有用的页面元素。


  ### 对数组排序：Perl reverse( ) vs. MySQL ASC 或 DESC


  在处理数组时，有时反转它并对其应用格式是有利的。有三种可用选项：一种通过 Perl 实现，两种通过 MySQL 实现。


  Perl 的`reverse()`函数就是这样一个选项。你需要对你正在处理的每个数组都应用反转。这使 MySQL 退出循环，在已经从数据库检索数据的情况下有时是有利的。使用`reverse()`方法如下：


  ```perl

  @this_new_array = reverse(@this_array);

  ```


  你可以看到使用`reverse()`函数是多么容易。通过 MySQL 使用`ASC`（升序）和`DESC`（降序）子句同样简单。检查以下示例：


  ```sql

  $query = qq{SELECT fieldone, fieldtwo FROM this_table

  ORDER BY id ASC};

  ```


  或


  ```sql

  $query = qq{SELECT fieldone, fieldtwo FROM this_table

  ORDER BY id DESC};

  ```


  每个 MySQL 语句都使用`id`主键来组织返回的数据——数据实际检索的方向由`ASC`或`DESC`子句决定。


  `DESC`以降序方式排列信息。也就是说，表格顶部的数据也是最旧的数据。降序排列返回的数据组织方式是从列表顶部的旧数据到底部的新数据。`ASC`子句将旧数据放在列表底部，新数据留在列表顶部。


  这三种数据排序方法各有优缺点。虽然 Perl 的`reverse()`函数很有用，但它是三种方法中最慢的。`ASC`和`DESC`方法更快，因为 MySQL 是用更快的编程语言编写的，针对此类操作进行了优化，并且已经常驻内存。使用哪种方法完全取决于你——根据你的情况量身定制。


  ### 链接与参数


  在接下来的项目章节中，我们将广泛使用带参数的链接。带参数链接是指包含参数的链接，脚本使用这些参数来传递数据，这些数据用于为下一页检索数据。带参数链接的示例如下：


  ```html

  This Link

  ```



  这种方法加载链接使用的是 GET 方法，正如你在前一章中会记得的那样。`id`参数持有值 1234，`id2`参数持有值 5678。这些参数及其关联的值正是用来生成由`“this_script.cgi”`脚本所生成页面的基础。


  ## 总结

  本章涵盖了数据类型，以及如何插入和检索大量数据。我们探讨了通过 Perl 的`reverse()`方法以及 MySQL 的`ASC`和`DESC`属性来对数组进行排序的概念。随后，我们向数据库执行了几次可能包含大量数据的插入操作。


