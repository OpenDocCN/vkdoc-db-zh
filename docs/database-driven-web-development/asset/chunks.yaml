    ## 更改元素的背景颜色

    下面的代码片段展示了如何更改几个表格元素的背景颜色。在此示例中，该操作仅应用于声明它的表格的 `<td>` 元素。你可以将此方法应用于 DOM 允许访问的任何页面元素，包括通过更改
