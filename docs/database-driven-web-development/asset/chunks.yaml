- fmt: '# DOM 树结构规则


    当浏览器读取这条语句时，它会在为文档构建的层次树中查找。如果找到匹配项，它会应用该值，在本例中是一个红色的活动链接。需要理解的是，DOM 语句必须反映浏览器在读取文档时构建的对象树的组件。有几条简单的规则可以帮助你理解这棵树及其构建方式：


    1.  “document” 对象几乎总是位于树的最高层，因为 “document” 包含了网页中的其他一切。

    2.  树是按照源代码顺序构建的。也就是说，在文档源代码中位置更高的对象在树中的位置也更高。

    3.  HTML 页面元素在树中的位置高于该元素的属性。

    4.  HTML 属性在树中的位置高于该属性的值。

    5.  诸如 `BODY` 这样包含整个文档渲染部分的 HTML 元素在树中的位置更高。这包括了 `HTML`，如果 `SPAN` 标签包含了整个 `BODY`
    部分，它可能也包含在内。

    6.  深度嵌套的标签（如表格中的表格）在树中的位置最低。

    7.  CSS 规则被认为在树中的位置较低，因为它们是通过 `style` 对象访问的，而该对象至少从树顶往下有四级之深。记住这些规则，考虑以下示例：


    ```

    document.all.elementID.style.bgColor = "blue"

    ```


    阅读这条语句时，你的视线自上而下地穿过了这棵层次树。树的最高层是 “document” 对象，因为 “document” 是树上其他一切内容的容器。第二层是
    “all” 对象。接下来是 `elementID`，你将在本章后面的部分学到它。然后是 “style” 对象。其下是 `bgColor` 属性。属性后面是引号中的值
    “blue”。你能弄清楚这条语句改变了什么吗？它改变了被分配了 `elementID` 的元素（通过使用 `ID` 或 `CLASS` 属性；别担心，我们很快会讲到）的背景颜色。


    这种自上而下处理层次化文档树的方法，就是 DOM 访问浏览器自身构建到树中的对象的方式。深度嵌套的对象通过非常长（有时长到荒谬）的语句来访问。一般规则是，如果语句超过六或七个组件，就该考虑将
    HTML 文档重构得更精简一些了。


    # ID 和 CLASS 选择器与 DOM 语句


    在文档中使用 CSS 样式规则可以大大降低成品的复杂性和大小，同时提供大量效果和用户定制选项。如今几乎所有互联网文档都以某种方式使用 CSS 样式规则。认识到这种广泛的用途，文档对象模型的创建者提供了一种动态更改或设置这些样式规则的方法。几乎每一条已创建的
    CSS 规则都有一个对应的 DOM 语句。访问这些 CSS 规则的网关是 Internet Explorer 中实现的 `style` 对象。它使用 HTML
    的 `ID` 和 `CLASS` 属性来了解应在何处应用你所需的更改。结合事件处理程序使用，你可以更改或设置文档的每个方面。颜色、字体、大小、对齐、边距，以及几乎所有你能想象到的东西，都可以根据用户操作动态更改。虽然这些概念将在后面的课程中涉及，但起点是学习将操作分配到一个非常具体的位置。


    要指定操作放置的位置，必须声明一个唯一的 `ID` 或 `CLASS` 属性。这向浏览器表明，该属性所在的标签在文档中是唯一的。然后可以相应地分配 CSS
    规则。


    与 HTML 和 CSS 一样，为了将 DOM 语句应用于特定的页面元素，你需要使用 `ID` 或 `CLASS` 元素选择器。选择器作为 DOM 语句的一部分，在对象和对象属性之间声明，如下例所示：


    ```

    document.all.banner.style.bgColor = "red"

    ```


    这段示例代码将值 `red` 分配给了被分配了 `ID` 或 `CLASS` 标识符 `"banner"` 的页面元素。当然，你会使用一个与你正在应用值的页面元素有共同之处的值。例如，将一个颜色值分配给一个唯一明确属性是其边框宽度的元素，这毫无意义。常识在任何时候都适用。


    在你继续使用 DOM 规范的过程中，你会经常使用这种为特定 `ID` 或 `CLASS` 标识符赋值的方法。利用前面提到的 `style` 对象可用的各种属性，你将能够访问和更改所有已使用
    CSS 规则设置的规则。


    # 通过 DOM 访问 CSS 规则


    现在你已经了解了在 DOM 中使用 `ID` 和 `CLASS` 选择器的方法，是时候介绍实现了。要访问文档中的 CSS 规则，DOM 提供了 `style`
    对象。与 `ID` 或 `CLASS` 选择器一起声明时，`style` 对象是连接更高的 `all` 对象和你希望更改的属性之间的桥梁。在你处理的每个独立文档中，大约有
    400 个不同的属性可以更改。可以分配给这些属性的值种类多得令人眼花缭乱。


    如你所学，为文本块分配 CSS 规则是带宽和时间的精简高效使用。为了通过 DOM 规范访问 CSS 规则，你需要使用 `style` 对象及其长长的可用属性列表。考虑以下通过文档对象模型访问
    CSS 规则所涉及语法的示例：


    ```

    document.all.elementID.style.CSSproperty = "value"

    ```


    通过使用 `document.all` 和 `style` 对象，可以设置或更改级联样式表规范中可用的每条规则和值。使用 `ID` 或 `CLASS` 选择器，你可以为单个页面元素或一组页面元素分配要更改或设置的
    CSS 规则。`elementID` 是你分配给该页面元素的 `ID` 或 `CLASS` 选择器名称。`CSSproperty` 是你想要设置或更改的 HTML
    属性。


    尽管前面语句中的 `style` 部分本身是一个对象，但它也是一个属性。也就是说，它是 `document.all` 对象组的一个属性。随着我们深入使用文档对象模型，这种有点令人困惑的命名法将变得清晰。


    你使用前面提到的 DOM 属性指定的值将覆盖任何先前使用 `STYLE` 属性、`STYLE` 标签或来自外部样式表的样式规则分配的 CSS 规则。例如，外部样式表中的以下条目将在文档加载时应用：


    ```

    table1 {color: "lightpink"};

    ```


    然后，通过在 `BODY` 元素中使用 `onLoad` 事件处理程序，可以在文档加载完成后，用以下语句更改 `table1` 容器内文本的颜色：


    ```

    你可以看到，外部样式表中声明的初始 CSS 规则被覆盖了。这适用于所有样式规则，无一例外。可以使用任何事件处理程序或事件处理程序的组合，以及任何有效的 DOM
    语句。


    # 使用 DOM 数组


    在 DOM 语言规范中，有大约 16 个数组用于访问你正在处理的 HTML 文档中对象的属性。这些数组有时被称为集合，因为它们收集了正在处理的文档中对象的信息。我们将使用的
    16 个数组如下：'
  raw: "When the browser reads this statement, it looks in the hierarchical tree\n\
    it has built for the document. If it finds a match, it applies the\nvalue, which\
    \ in this case is a red colored active link. The thing to\nunderstand is that\
    \ the DOM statement must reflect the components of the\nobject tree that the browser\
    \ has built when it read the document. There\nare a few simple rules to help you\
    \ understand this tree and how it is\nbuilt:\n\n1.  The “document” object is almost\
    \ always the highest on the tree, since\n    the “document” contains everything\
    \ else within the web page.\n\n2.  The tree is built in source code order. That\
    \ is, the objects that are\n    higher in the document source code are the highest\
    \ on the tree.\n\n3.  HTML page elements are higher in the tree than are the attributes\
    \ of\n    that element.\n\n4.  HTML attributes are higher in the tree than are\
    \ the values of that\n    attribute.\n\n5.  HTML elements such as BODY that encompass\
    \ the entire rendered portion\n    of the document are higher on the tree. This\
    \ includes the HTML, and\n    perhaps a SPAN tag, if it is encompassing the entire\
    \ BODY portion of the\n    document.\n\n6.  Deeply nested tags such as tables\
    \ within tables are the lowest on the\n    tree.\n\n7.  CSS rules are considered\
    \ to be low on the tree, since they are\n    accessed with the “style” object,\
    \ which is at least four graduations\n    down from the top of the tree. Keeping\
    \ these rules in mind, consider the\n    following example:\n\n```\ndocument.all.elementID.style.bgColor\
    \ = \"blue\"\n```\n\nIn reading this statement, your eyes have passed over the\n\
    hierarchical tree, from top to bottom. The highest on the tree is the\n“document”\
    \ object, since the “document” is the container for everything\nelse on the tree.\
    \ The second from the top is the “all” object. Next\ncomes the elementID, which\
    \ you’ll\nlearn about in a later section of this chapter. Next is the “style”\n\
    object. Beneath that is the bgColor property. Following the property is\nthe value\
    \ in quotes, “blue”. Can you work out what this statement\nchanges? It changes\
    \ the background color of the element that has been\nassigned the elementID (through\
    \ the\nuse of the ID or CLASS attributes; don’t worry, we’ll get to that\nsoon).\n\
    This method of working down from the top of the hierarchical document\ntree is\
    \ the way DOM accesses the objects which the browser has built\ninto the tree\
    \ itself. Deeply nested objects are accessed through very\nlong (sometimes ridiculously\
    \ long) statements. The general rule is that\nif the statement is more than six\
    \ or seven components long, it is time\nto think about restructuring your HTML\
    \ document into something more\nstreamlined.\n\nThe ID and CLASS Selectors and\
    \ a DOM Statement\nUsing CSS style rules within your document greatly reduces\
    \ the\ncomplexity and size of your finished product while providing a large\n\
    array of effects and user customization. CSS style rules are used\nin some way\
    \ within almost all of today’s Internet documents. Recognizing\nthis widespread\
    \ use, the makers of the Document Object Model have\nprovided a means to change\
    \ or set these style rules on the fly. There is\na DOM statement to fit almost\
    \ every CSS rule that has been created. The\ngateway to these CSS rules is the\
    \ “style” object implemented within\nInternet Explorer. It uses the HTML ID and\
    \ CLASS attributes to know where\nto apply the changes you desire. Used with event\
    \ handlers, you may\nchange or set every aspect of your document. Colors, fonts,\
    \ sizes,\nalignment, margins, and just about everything you can imagine can be\n\
    changed on the fly according to user action. While these concepts will\nbe addressed\
    \ in a later lesson, the point at which to begin is simply\nlearning to assign\
    \ the action to a very specific place.\nTo specify where the actions are to be\
    \ placed, a unique ID or CLASS\nattribute must be stated. This indicates to the\
    \ browser that the tag the\nattribute is stated within is unique within the document.\
    \ CSS rules may\nthen be assigned accordingly.\n\nAs in HTML and CSS, in order\
    \ to apply a DOM statement to a specific page\nelement, you would use the ID or\
    \ CLASS element selector. The selector is\nstated as part of the DOM statement,\
    \ between the object and the object\nproperty, as in the following example:\n\n\
    ```\ndocument.all.banner.style.bgColor = \"red\"\n```\n\nThis sample bit of code\
    \ assigns a value of red to the page element\nthat has been assigned the ID or\
    \ CLASS identification of “banner”. You\nwould of course use a value that has\
    \ something in common with the page\nelement to which you are applying the value.\
    \ For example, assigning a\ncolor value to an element whose only definitive property\
    \ is its border\nwidth just doesn’t make sense. Common sense is applicable at\
    \ all\ntimes.\nYou’ll use this method of assigning a value to a specific ID or\
    \ CLASS\nidentifier often in your continuing use of the DOM specifications. Using\n\
    the various properties available from the aforementioned “style” object,\nyou’ll\
    \ be able to access and change all of the rules that have been set\nusing the\
    \ CSS specifications.\n\nAccessing CSS Rules via DOM\nNow that you’ve covered\
    \ the use of ID and CLASS selectors with DOM,\nit is time to cover the implementation.\
    \ To access the CSS rules within a\ndocument, DOM has provided the “style” object.\
    \ Stated with an ID or\nCLASS selector, the style object is the link between the\
    \ higher “all”\nobject and the property you wish to change. There are about 400\n\
    different properties available to be changed within every individual\ndocument\
    \ you’ll be working with. There is a bewildering amount of\ndifferent values you\
    \ may assign to these properties.\n\nAs you’ve already learned, assigning a CSS\
    \ rule to a block of text\nis a streamlined and efficient use of both your bandwidth\
    \ and your time.\nIn order to access the CSS rules through the DOM specifications,\
    \ you\nwould use the “style” object and its long list of available properties.\n\
    Consider the following example of the syntax involved in accessing your\nCSS rules\
    \ through the Document Object Model:\n\n```\ndocument.all.elementID.style.CSSproperty\
    \ = \"value\"\n```\n\nThrough the use of the “document.all” and “style” objects,\
    \ every rule\nand value available from the Cascading Style Sheet specifications\
    \ may be\nset or changed. Using the ID or CLASS selector, you can assign a CSS\n\
    rule to be changed or set for an individual page element or a block of\npage elements.\
    \ The elementID is the ID or\nCLASS selector name that you have assigned to that\
    \ page element. The\nCSSproperty is the\nHTML attribute that you would like to\
    \ set or change.\nAlthough the “style” part of the aforementioned statement is\
    \ itself\nan object, it is also a property. That is, it is a property of the\n\
    “document.all” group of objects. This somewhat confusing nomenclature\nwill become\
    \ clear to you as we progress through the use of the Document\nObject Model.\n\
    \nThe values you specify using the aforementioned DOM properties will\noverride\
    \ any previously existing CSS rules assigned with the STYLE\nattribute, the STYLE\
    \ tag, or style rules from an external style sheet.\nFor example, the following\
    \ entry within an external style sheet will be\napplied when the document is loading:\n\
    \n```\ntable1 {color: \"lightpink\"};\n```\n\nThen, through the use of an onLoad\
    \ event handler within the BODY\nelement, the color of the text within the table1\
    \ container may be\nchanged with the following statement when the document has\
    \ completed\nloading:\n\n```\nYou can see that the initial CSS rule stated within\
    \ the external\nstyle sheet is overridden. This is applicable to all style rules,\
    \ no\nexceptions. Any event handler or combinations of event handlers may be\n\
    used, as well as any valid DOM statement.\n\nUsing DOM Arrays\n\nWithin the DOM\n\
    Language specifications are about 16 arrays that are used to\naccess the properties\
    \ of the object within the HTML document you are\nworking with. Arrays are called\
    \ Collections by some because they collect\ninformation about the objects within\
    \ the document being worked with. The\n16 arrays we’ll be working with are as\
    \ follows:"
