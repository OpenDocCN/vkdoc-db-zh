    ## 加载链接


    总会遇到使用 HTML 表单传递参数行不通的时候。并不总是能使用表单和 `POST` 方法。在这种情况下，你必须想办法通过加载链接的 `GET` 方法来传递数据。这样，你就可以用数据加载你的链接。


    正如本章前面一节所提到的，数据可以通过加载的链接在页面间传递：


    ```

    /cgi-bin/script.cgi?id1=123456id2=abcdef

    ```


    链接加载现在对你来说应该非常熟悉了。理解如何加载链接非常重要，因为这是一项几乎用于每个 Perl 脚本的技术。

    在以下部分中，我们将进一步拓展你关于加载链接的知识，以便你能够根据来自多个 Perl 数组的数据库条目动态地创建加载的链接。


    ## 收集信息


    从你的数据库中收集所有信息到多个数组中是一个直接的过程，它使用 `fetchrow_array()` 方法。我们要做的是从一个表中收集所有信息。请检查清单
    [4-4](#485616_2_En_4_Chapter.xhtml#PC11) 中给出的结构。


    ```

    $query = qq{SELECT id1, id2, id3, id4 FROM thistable

    WHERE id >= 0};

    $sth = $dbh->prepare($query);

    $sth->execute();

    while (@thisvalue = $sth->fetchrow_array()) {

    push @id1, $thisvalue[0];

    push @id2, $thisvalue[1];

    push @id3, $thisvalue[2];

    push @id4, $thisvalue[3];

    };

    Listing 4-4

    收集数据以便后续格式化

    ```


    因此，我们从一个表中收集了所有信息，并通过使用 Perl `push` 函数将每列的内容放入其自己的数组中。我们现在在 `@id1`、`@id2`、`@id3`
    和 `@id4` 数组中拥有了数据库表的完整表示。继续阅读以了解如何使用它们。


    ## 构造最终数组


    我们将用上一节生成的数组来动态构造加载的链接。我们将使用清单 [4-5](#485616_2_En_4_Chapter.xhtml#PC12) 中给出的函数，将数据库信息放入一个大数组中。


    ```

    $count = 0;

    foreach (@id1) {

    $oneContentElement = qq{


    Message[$count]


    };

    push @contentArray, $oneContentElement;

    ++$count;

    };

    Listing 4-5

    收集最终结果

    ```


    我们首先声明了 `$count`。我们将其值设为 `0`。我们这样做的原因将在接下来的段落中说明。

    然后我们使用 `@id1` 作为参数声明了一个 `foreach()` 循环。在这里，它被用作计数来决定 `foreach()` 循环将迭代多少次。

    正如你从 `$oneContentElement` 变量内的 HTML 标记中所看到的，每个锚点元素都给出了四个参数。

    `$count` 指的是每个数组内的索引项位置。

    例如，`@id1` 中的第一个索引项是零，因为我们还没有将 `$count` 从其初始值零迭代。

    然后这组链接被 `push` 到 `@contentArray` 上，接着我们迭代了 `$count`。`$count` 现在的值是 `1`。

    由于我们现在已经到达构造的末尾，因此它再次循环，这次由于 `$count` 被迭代，所以不同的值被 `push` 到 `@contentArray` 上。

    整个构造被循环处理，每次循环时 `$count` 都会被迭代。该构造将循环，直到 `@id1` 数组没有更多的索引项来触发另一次迭代并 `push` 到 `@contentArray`
    上。


    ## 外部内容模板


    既然你已经具备了生成和格式化页面内容的必要知识，你现在必须学习如何生成一个完整的 HTML 页面，以便在其中打印 `@contentArray` 的内容。

    为此，你必须创建一个新的包含 HTML 标记的 Perl 脚本。将这个标记放在一个用双引号操作符 (`qq{}`) 包围的变量中。我们使用双引号操作符是因为它允许多行代码被封装在其中，就像文本双引号
    (`"`) 的情况一样。


    此脚本中唯一需要放入的 Perl 代码是一个变量和 shebang，shebang 用于告诉脚本在哪里找到 Perl。以下是一个常见的 shebang 示例：


    ```

    #!/usr/bin/perl

    ```


    我总是在这种情况下使用的变量名是 `$htmlContent`。一个非常简单的外部内容模板示例如清单 [4-6](#485616_2_En_4_Chapter.xhtml#PC14)
    所示。


    ```

    #!/usr/bin/perl

    $htmlContent = qq{


    - - - Web Site Title - - -


    @contentArray


    };

    1;

    Listing 4-6

    一个外部内容模板

    ```


    前面展示的标记经过了简化以便于学习，而不至于过于复杂。然而，它仍然是一个有效且完整的 HTML 标记页面。

    我们首先从 shebang 开始，然后是 `$htmlContent` 变量，它在 `qq{}` 操作符的开始和结束之间声明。

    接着我们继续一些简单的标记，并以一个数字 `1` 结束脚本。这个数字 `1` 是必需的，以便向 Perl 返回一个 `true` 值。省略这个数字会导致抛出致命错误，从而结束脚本的执行。

    你可能已经注意到我在开始和结束的 `<table>` 元素之间包含了 `@contentArray` 数组。`<table>` 元素标记与我们在本章前面一节中使用的四个简单链接相契合。

    以这种方式声明 `@contentArray` 将允许你拥有更复杂的页面，这些页面利用了在本章前一节详细讨论的加载链接所生成的内容。


    为了让 HTML 内容模板与你脚本的其余部分一起使用，只需使用 Perl `require` 语句：


    ```

    require "content.pl";

    ```


    这个系统的关键在于在 Perl 脚本的最末尾声明 `require` 语句。这样，你所有的数据都已经被收集和格式化好，并准备好打印到用户的浏览器。


    ## 打印最终数组


    将你的内容打印到用户的浏览器是简单而直接的。它是脚本中给出的最后一条命令，并将出现在脚本的最后几行：


    ```

    print qq{Content-type: text/html\n\n};

    print qq{$htmlcontent};

    ```


    你可以看到，我们首先通过 `Content-type` 命令告诉浏览器将要接收和显示的数据类型。我们使用了 `"text/html\n\n"` 作为浏览器将要接收的内容类型。

    现在，一切都整合起来了。从数据库收集的数据被格式化并 `push` 到 `@contentArray` 上。`@contentArray` 然后被放入外部内容模板
    `content.pl` 中的适当位置。接着，包含所有标记的变量被打印到浏览器。很简单。


    ## 使用CGI::Carp模块


    每个脚本在你完成编写后都会有一个错误。任何复杂度的脚本都至少有一个错误。


    虽然 Perl 不能纠正你的错误，但它确实为你提供了一种找出问题所在的方法。为此，`CGI::Carp` 模块是一个宝贵的工具，用于帮助你找到错误。与所有
    Perl 模块一样，它在脚本的顶部声明。以下是它的语法：


    ```

    use CGI::Carp qw(fatalsToBrowser);

    ```'
  raw: 'Since the new variable $profileid is now a unique value, you may use

    it to access a unique database table or row within a table, in this

    case, the site profile of that particular user.


    Loading Your Links

    There will come a time when using an HTML form to pass your

    parameters just will not work. It is not always possible to use a form

    and the POST

    method. In this case, you have to work out a way to pass your

    data via the GET method of loading your links. In this case, you can

    load your links with data.


    As touched on in an earlier section of this chapter, data can be carried

    from page to page via a loaded link:


    ```

    /cgi-bin/script.cgi?id1=123456id2=abcdef

    ```


    The loading of your links should be very familiar to you now. It is

    important that you understand how to load your links since it is a

    technique that is used with almost every Perl script.

    In the following sections, we’ll take your knowledge of loading links further
    so you are

    able to create loaded links dynamically, according to database entries

    from multiple Perl arrays.


    Gathering the Information


    Gathering all of the information from your

    database into multiple arrays is a straightforward affair that uses the

    fetchrow_array() method. What we’ll be doing is gathering all of the

    information from one table. Examine the construction given in Listing

    [4-4](#485616_2_En_4_Chapter.xhtml#PC11).


    ```

    $query = qq{SELECT id1, id2, id3, id4 FROM thistable

    WHERE id >= 0};

    $sth = $dbh->prepare($query);

    $sth->execute();

    while (@thisvalue = $sth->fetchrow_array()) {

    push @id1, $thisvalue[0];

    push @id2, $thisvalue[1];

    push @id3, $thisvalue[2];

    push @id4, $thisvalue[3];

    };

    Listing 4-4

    Gathering data for later formatting

    ```


    So we’ve gathered all of the information from one

    table and placed the contents of each column into its own array via the

    use of the Perl push function. We now have a complete representation of

    the database table within the @id1, @id2, @id3, and @id4 arrays. Read on

    to find out what to do with them.


    Constructing the End Array


    What we’ll be doing with the arrays generated in the previous section is

    construct loaded links dynamically using the contents of the four arrays. We’ll
    be placing

    the database information within one large array using the functions

    given in Listing [4-5](#485616_2_En_4_Chapter.xhtml#PC12).


    ```

    $count = 0;

    foreach (@id1) {

    $oneContentElement = qq{


    Message[$count]


    };

    push @contentArray, $oneContentElement;

    ++$count;

    };

    Listing 4-5

    Gathering the end results

    ```


    We started by declaring $count. We set its value to 0\. The reason why

    we did this will be addressed in the paragraphs to come.

    We then declared a foreach() loop using

    @id1 as the argument. In this case, it is used as a count to dictate how

    many times the foreach() loop will be iterated.

    As you can see from the HTML markup within the $oneContentElement

    variable, there are four parameters given to each anchor element.

    The $count refers to the index item position within each array.

    For example, the first index item within @id1 is zero, since we

    haven’t iterated the $count from its original value of zero yet.

    This set of links is then pushed onto @contentArray, and then

    we iterated $count. $count now has the value of 1.

    Since we have now reached the end of the construction, it is then

    looped through again, this time with different values being pushed onto

    @contentArray due

    to $count being iterated.

    The entire construction is looped through with $count being iterated

    for each loop. The construction will loop until the @id1 array is out of

    index items to trigger another iteration and push onto

    @contentArray.


    The External Content Template

    Now that you have the necessary knowledge to generate and format page

    content, you must now learn how to generate a full HTML page that the

    contents of @contentArray will be

    printed within.

    To do this, you must create a new Perl script with HTML markup within

    it. Place this markup within a variable enclosed with a double quote operator

    (qq{}). We use a double quote operator because it allows more

    than a single line of code to be encapsulated within it, as is the case

    with the textual double quote (“).


    The only Perl code that is put in this script is one variable and the

    shebang, which is used to tell the script where to find Perl. The

    following is an example of a common shebang:


    ```

    #!/usr/bin/perl

    ```


    The name of the variable I always use in this situation is $htmlContent.

    An example of a very simple external content

    template is shown in Listing [4-6](#485616_2_En_4_Chapter.xhtml#PC14).


    ```

    #!/usr/bin/perl

    $htmlContent = qq{


    - - - Web Site Title - - -


    @contentArray


    };

    1;

    Listing 4-6

    An external content template

    ```


    The preceding shown markup is simplified in order to learn without

    too much complication. However, it is still a valid and complete page of

    HTML markup.

    We first started with the shebang, followed by the $htmlContent variable,

    which is stated between opening and closing qq{} operators.

    We then moved on to some simple markup and ended the script with a

    number 1\. The number 1 is required in order to return a value of true to

    Perl. Leaving this number out will cause a fatal error to be thrown,

    ending execution of the script.

    You might have noticed that I included the @contentArray array between the

    opening and closing table elements. The table element markup meshes with

    the four simple links we used in an earlier section of this chapter.

    Stating @contentArray in this

    way will allow you to have more complicated pages that utilize the

    content generated with the loading of your links discussed in detail in

    a previous section of this chapter.


    In order for the HTML content template to be used with the rest of your

    script, simply utilize a Perl require statement:


    ```

    require "content.pl";

    ```


    The key to this system is declaring the require statement at the very

    end of your Perl script. This way, all of your data has been collected

    and formatted and is ready to be printed to the user’s browser.


    Printing the End Array


    Printing your content to the user’s browser is simple and

    straightforward. It is the last command given within a script and will

    appear on the last lines of the script:


    ```

    print qq{Content-type: text/html\n\n};

    print qq{$htmlcontent};

    ```


    You can see that we first told the browser what type of data that is

    to be received and displayed with the Content-type command. We used

    “text/html\n\n” as the content type that is to be received by the

    browser.

    Now everything comes together. The data that is collected from the

    database is formatted and pushed on to @contentArray. @contentArray is then

    put within an appropriate place in the external content template,

    content.pl. The variable with all of the markup within it is then

    printed to the browser. Simple.


    Using the CGI::Carp Module

    Every script has an error in it after you’ve completed writing it. A

    script of any complexity will have at least one error within it.


    While Perl can’t correct your mistakes, it does allow you a means as to

    what the problem is. To that end, the CGI::Carp module is an

    invaluable tool that is used to help you find your errors. As with all

    Perl modules, it is declared at the top of the script. The following is

    its syntax:


    ```

    use CGI::Carp qw(fatalsToBrowser);

    ```'
  trans: '

    由于新变量 `$profileid` 现在是一个唯一值，你可以用它来访问一个唯一的数据库表或表中的一行，在本例中，即该特定用户的网站配置文件。


    ## 加载链接


    总会遇到使用 HTML 表单传递参数行不通的时候。并不总是能使用表单和 `POST` 方法。在这种情况下，你必须想办法通过加载链接的 `GET` 方法来传递数据。这样，你就可以用数据加载你的链接。


    正如本章前面一节所提到的，数据可以通过加载的链接在页面间传递：


    ```

    /cgi-bin/script.cgi?id1=123456id2=abcdef

    ```


    链接加载现在对你来说应该非常熟悉了。理解如何加载链接非常重要，因为这是一项几乎用于每个 Perl 脚本的技术。

    在以下部分中，我们将进一步拓展你关于加载链接的知识，以便你能够根据来自多个 Perl 数组的数据库条目动态地创建加载的链接。


    ## 收集信息


    从你的数据库中收集所有信息到多个数组中是一个直接的过程，它使用 `fetchrow_array()` 方法。我们要做的是从一个表中收集所有信息。请检查清单
    4-4 中给出的结构。


    ```

    $query = qq{SELECT id1, id2, id3, id4 FROM thistable

    WHERE id >= 0};

    $sth = $dbh->prepare($query);

    $sth->execute();

    while (@thisvalue = $sth->fetchrow_array()) {

    push @id1, $thisvalue[0];

    push @id2, $thisvalue[1];

    push @id3, $thisvalue[2];

    push @id4, $thisvalue[3];

    };

    Listing 4-4

    收集数据以便后续格式化

    ```


    因此，我们从一个表中收集了所有信息，并通过使用 Perl `push` 函数将每列的内容放入其自己的数组中。我们现在在 `@id1`、`@id2`、`@id3`
    和 `@id4` 数组中拥有了数据库表的完整表示。继续阅读以了解如何使用它们。


    ## 构造最终数组


    我们将用上一节生成的数组来动态构造加载的链接。我们将使用清单 4-5 中给出的函数，将数据库信息放入一个大数组中。


    ```

    $count = 0;

    foreach (@id1) {

    $oneContentElement = qq{


    Message[$count]


    };

    push @contentArray, $oneContentElement;

    ++$count;

    };

    Listing 4-5

    收集最终结果

    ```


    我们首先声明了 `$count`。我们将其值设为 `0`。我们这样做的原因将在接下来的段落中说明。

    然后我们使用 `@id1` 作为参数声明了一个 `foreach()` 循环。在这里，它被用作计数来决定 `foreach()` 循环将迭代多少次。

    正如你从 `$oneContentElement` 变量内的 HTML 标记中所看到的，每个锚点元素都给出了四个参数。

    `$count` 指的是每个数组内的索引项位置。

    例如，`@id1` 中的第一个索引项是零，因为我们还没有将 `$count` 从其初始值零迭代。

    然后这组链接被 `push` 到 `@contentArray` 上，接着我们迭代了 `$count`。`$count` 现在的值是 `1`。

    由于我们现在已经到达构造的末尾，因此它再次循环，这次由于 `$count` 被迭代，所以不同的值被 `push` 到 `@contentArray` 上。

    整个构造被循环处理，每次循环时 `$count` 都会被迭代。该构造将循环，直到 `@id1` 数组没有更多的索引项来触发另一次迭代并 `push` 到 `@contentArray`
    上。


    ## 外部内容模板


    既然你已经具备了生成和格式化页面内容的必要知识，你现在必须学习如何生成一个完整的 HTML 页面，以便在其中打印 `@contentArray` 的内容。

    为此，你必须创建一个新的包含 HTML 标记的 Perl 脚本。将这个标记放在一个用双引号操作符 (`qq{}`) 包围的变量中。我们使用双引号操作符是因为它允许多行代码被封装在其中，就像文本双引号
    (`"`) 的情况一样。


    此脚本中唯一需要放入的 Perl 代码是一个变量和 shebang，shebang 用于告诉脚本在哪里找到 Perl。以下是一个常见的 shebang 示例：


    ```

    #!/usr/bin/perl

    ```


    我总是在这种情况下使用的变量名是 `$htmlContent`。一个非常简单的外部内容模板示例如清单 4-6 所示。


    ```

    #!/usr/bin/perl

    $htmlContent = qq{


    - - - Web Site Title - - -


    @contentArray


    };

    1;

    Listing 4-6

    一个外部内容模板

    ```


    前面展示的标记经过了简化以便于学习，而不至于过于复杂。然而，它仍然是一个有效且完整的 HTML 标记页面。

    我们首先从 shebang 开始，然后是 `$htmlContent` 变量，它在 `qq{}` 操作符的开始和结束之间声明。

    接着我们继续一些简单的标记，并以一个数字 `1` 结束脚本。这个数字 `1` 是必需的，以便向 Perl 返回一个 `true` 值。省略这个数字会导致抛出致命错误，从而结束脚本的执行。

    你可能已经注意到我在开始和结束的 `<table>` 元素之间包含了 `@contentArray` 数组。`<table>` 元素标记与我们在本章前面一节中使用的四个简单链接相契合。

    以这种方式声明 `@contentArray` 将允许你拥有更复杂的页面，这些页面利用了在本章前一节详细讨论的加载链接所生成的内容。


    为了让 HTML 内容模板与你脚本的其余部分一起使用，只需使用 Perl `require` 语句：


    ```

    require "content.pl";

    ```


    这个系统的关键在于在 Perl 脚本的最末尾声明 `require` 语句。这样，你所有的数据都已经被收集和格式化好，并准备好打印到用户的浏览器。


    ## 打印最终数组


    将你的内容打印到用户的浏览器是简单而直接的。它是脚本中给出的最后一条命令，并将出现在脚本的最后几行：


    ```

    print qq{Content-type: text/html\n\n};

    print qq{$htmlcontent};

    ```


    你可以看到，我们首先通过 `Content-type` 命令告诉浏览器将要接收和显示的数据类型。我们使用了 `"text/html\n\n"` 作为浏览器将要接收的内容类型。

    现在，一切都整合起来了。从数据库收集的数据被格式化并 `push` 到 `@contentArray` 上。`@contentArray` 然后被放入外部内容模板
    `content.pl` 中的适当位置。接着，包含所有标记的变量被打印到浏览器。很简单。


    ## 使用 CGI::Carp 模块


    每个脚本在你完成编写后都会有一个错误。任何复杂度的脚本都至少有一个错误。


    虽然 Perl 不能纠正你的错误，但它确实为你提供了一种找出问题所在的方法。为此，`CGI::Carp` 模块是一个宝贵的工具，用于帮助你找到错误。与所有
    Perl 模块一样，它在脚本的顶部声明。以下是它的语法：


    ```

    use CGI::Carp qw(fatalsToBrowser);

    ```

    '
- fmt: 'As you can see, declaring it is a simple matter. Instead of having to use
    the command prompt to debug your scripts, the `CGI::Carp` module will print your
    errors to the browser. The reports are very intuitive and easy to figure out.

    The reports announce the error, the script, and the line number of the script
    where the fatal error occurred.

    You would normally use this module during development of the site. After you have
    all site errors figured out, it is recommended that you comment out `CGI::Carp`
    so your users won’t be able to figure out your scripting or database model. Leaving
    `CGI::Carp` active with a live script opens you to attacks from malicious users.


    ## Username and Password Maintenance


    Username and password maintenance is an important part of developing your website.
    Unless you use a secure shell connection (which is beyond the scope of this book),
    you would normally use FTP to place your files where they should be.

    Changing your password once a month will allow you peace of mind, knowing that
    other developers won’t be able to access your site’s critical files. Creating
    a new account with a different username will also add to the security of your
    site.

    When it comes to database usernames and passwords, changing the username and password
    is usually a big chore, as all of the database calls will fail unless you change
    the username and password of the connection statement. You would have to change
    the username and password of every Perl script that uses a database.

    If you only have a small number of scripts running on your site, changing the
    username and password would be a viable security effort.

    Instead of changing the username and password in your database connection script,
    use a well-crafted password. A good password in this case is 10 to 12 characters
    long.

    Use letters of both cases, numbers, and punctuation in your password to reduce
    the chances of someone gaining access via your database connection statement.
    It should be noted that both the username and password are case sensitive on MySQL.


    ## Per-User Usage Statistics


    On some sites, tracking users is a required operation. This is usually the case
    if the site is a charge-for-service site where the user pays according to what
    services they utilize.


    Tracking a user is most easily done via their IP address. Tracking an IP (Internet
    Protocol) address is made easy with the `CGI` module. Consider the following:


    ```

    $userip = $cgi->remote_host();

    ```


    This statement will return the user’s IP address, allowing you to record it or
    work upon it at will. Some sites narrow a user’s address using the IP address,
    allowing them to record your general location or use it in a sales pitch.

    Tracking the pages each user uses is a common feature of many sites. By tracking
    users’ movements, it is possible to know which sections of your site are being
    used and which ones aren’t being used. This will allow you to make informed changes
    to those site features that aren’t being utilized.


    Tracking your users requires a database call or two. There are two methods that
    are commonly used to record if a script and thus a page of your site are being
    accessed. The first is a straightforward two-step method, as given in Listing
    4-7.


    ```

    $query = qq{SELECT hits FROM tracker};

    $sth = $dbh->prepare($query);

    $sth->execute();

    $thisHit = $sth->fetchrow()

    };

    ++$thisHit;

    $query = qq{UPDATE tracker SET hits = ''$thisHit''};

    $sth = $dbh->prepare($query);

    $sth->execute();

    };

    ```

    **Listing 4-7** A hit counter using MySQL


    You can see that two database calls were carried out. First, the hit count is
    fetched using the upper statement. We then incremented that retrieved value and
    updated the new value into the database. This is a good, straightforward way of
    recording a single page hit.


    The single call method is perhaps the more elegant of the two methods. With it,
    you only use one database call and let MySQL do the work for you:


    ```

    $query = qq{UPDATE tracker SET hits + 1};

    $sth = $dbh->prepare($query);

    $sth->execute();

    };

    ```


    As you can see, a single Perl call results in a cleaner script, also allowing
    the faster executing MySQL to do the increment for you.


    ## Deleting Tables


    Deleting tables can be a risky affair, especially because MySQL doesn’t have a
    reliable restore feature. Once a table is deleted, it is gone for good, so some
    care has to be taken. You would normally drop a table via scripted action. Make
    sure that the proper validity checks are taken before the table is dropped.

    For example, if a user is deleting their account, the table(s) should be dropped
    after checking that the rest of the deletion script has been evaluated and a table
    deletion is found to be the case. You may then drop a table successfully.


    The proper term for deleting a table is “dropping” the table, and this is reflected
    in the syntax of the database call, as the following shows:


    ```

    $query = qq{DROP TABLE username_master};

    $sth = $dbh->prepare($query);

    $sth->execute();

    ```


    As you can see, a table deletion is simple and has a minimum of clutter. Also,
    make sure you’re dropping the right table or troubles will ensue.


    ## Deleting Rows


    Deleting a row in a table is a common practice and is usually completed via scripted
    action. Deleting an entire row in a database can be done by matching a value within
    the row, telling MySQL which row to delete that way.

    As I’ve said before, always have an `autoincrement id` column present in every
    table. Since this `id` table starts at zero and works upward from there (hence
    the term `autoincrement`), it is a very safe way to identify one single row for
    deletion, even in a table with thousands of entries.

    To narrow down which row to delete among thousands, you would use a `WHERE` clause.
    Simply match which row to delete via the `id` column and it’ll be a safe bet that
    you’ve deleted the intended row within the table.


    Examine the example of a row deletion in Listing 4-8 where the row to delete is
    found via the row’s `id` column.


    ```

    $query = qq{DELETE thisrow FROM master WHERE id = 1234};

    $sth = $dbh->prepare($query);

    $sth->execute();

    ```

    **Listing 4-8** Deleting a row


    You can see how and where to use a `WHERE` clause in your database call. I used
    the values `1234` as the row identifier in the example. It is an entirely possible,
    and oft-used, method of deletion to use a variable instead of a static row name
    such as shown in the example.

    Note also that we used the `id` column name to come to the decision to delete
    that row. I’ve found this method to be invaluable when working with a database
    of any flavor.


    ## Uploading Files


    Uploading files is perhaps the most complicated operation you’ll run across in
    your dealings with Perl and MySQL. The actual Perl script you would use to upload
    a file is beyond the current chapters of this book, but you have to be aware of
    a few things before you can start thinking about an upload script for future use.


