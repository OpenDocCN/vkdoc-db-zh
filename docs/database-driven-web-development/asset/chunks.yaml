- fmt: '## Secure Transactions


    An important thing to ask about is whether or not you’ll be able to use SSL (Secure
    Sockets Layer) in a portion of your website that collects payment information
    or information that is delicate in nature. Many web hosting companies only allow
    SSL on dedicated or `VPS` servers.


    You can tell if a page is protected by SSL by looking to the address bar of the
    browser. Instead of having `http://` at the beginning, the protocol should be
    `https://`. This shows you that a digital certificate is being used and your data
    is safe from prying eyes. Some websites don’t limit the use of SSL to one section
    of the website in question – they use SSL to protect their entire website’s data.
    While this is fine, it usually isn’t warranted.


    ## Plesk or cPanel?


    Most web hosting companies offer one of two different web applications to manage
    your server, those being `Plesk` or `cPanel`. They both cover pretty much the
    same functionality, with a few twists. They look slightly different but achieve
    the same thing. It is up to you to choose which server management application
    to use. Some like `Plesk` better, some `cPanel`. It is entirely up to you which
    application to use, as most web hosting companies give you the choice of the two
    most common server managers.


    ## Hard Drive Space and Data Transfer Limits


    Another issue of concern is the amount of hard drive space you’re going to be
    assigned. `MySQL` databases take up a lot of space, so you should have a shared
    plan with at least 5 GB of available hard drive space.


    If you plan on uploading files, make sure you have space enough to sustain the
    site. If you’re on a shared plan, go for the plan that offers the most hard drive
    space. When you use two-thirds of the space you’ve leased, it is time to make
    plans to upgrade your hosting solution. Your server manager (`Plesk` or `cPanel`)
    will tell you the amount of space used and what is remaining, both in easy-to-understand
    terms.


    Most web hosting companies have restrictions on the amount of data transfer you’re
    able to use within a 30-day period. Be sure to ask what the bandwidth limit for
    your account is and the fees you’ll have to pay if your data transfer needs outweigh
    your bandwidth allocation.


    ## Resellers


    Most web hosting companies allow reselling of their services via a third party.
    These resellers typically only offer shared web hosting at a very low price, such
    as $3.99 a month. They are exclusively a shared service provider and usually don’t
    offer dedicated or `VPS` plans, so your upgrading options are limited.


    While these resellers are fine during the infant stage of your site’s life cycle,
    they can cause a bit of a problem if you have already gathered user data and have
    to move to a dedicated or `VPS` server. You’ll have to find a way to get your
    user’s data from the reseller’s shared server to your primary web hosting company’s
    dedicated or `VPS` server.


    Using a web hosting company that isn’t the primary service provider can sometimes
    cause lengthy delays in getting some changes made to your shared server as well.
    Your technical support request has to go through the reseller and then to the
    primary hosting company for a solution, then back to the reseller who in turn
    informs you of the outcome of your request. This amount of time can be lengthy,
    causing you to have to sit and wait for an outcome. So that’s the shared server;
    let’s move on to the `VPS` server.


    ## Installing Perl Modules


    In working with Perl on the Internet, you’ll eventually have the need to install
    more Perl modules to accomplish some task or other. As mentioned in the previous
    section, you would use `Plesk` or `cPanel` to do this. Both methods work fine
    and use either `CPAN.bat` or `PPM`. Exploring `CPAN.bat` and `PPM` is beyond the
    scope of this book.


    ## File Transfer Protocol (FTP) Clients


    FTP clients are programs that allow you to access your files on your server remotely
    using FTP. With them, you are able to move around files on your server, create
    directories, and update your cgi scripts as you create and debug them.


    There are many different FTP clients to choose from. The best by far, I’ve found,
    is a freeware application known as `FileZilla`. It has a connection manager that
    allows you to have a list of different websites to connect to as well as provides
    all of the functionality needed to work your website into a fully complete Internet
    offering.


    ### File Rights and Permissions


    Every file on your server has a set of rights and permissions assigned to them.
    Some are assigned automatically, and some have to be assigned by you. Perl cgi
    scripts, once uploaded, lack the rights and permissions required to be run by
    your users via their browsers.


    To assign the proper rights and permissions, look to your FTP client. There should
    be an easy way to change the rights and permissions of the file or files in question.


    The Linux `chmod` command is what changes the permissions for a file. In `FileZilla`,
    simply highlight the file or files whose rights and permissions you need to change.
    Right-click the highlighted file or files and select `Permissions`. A dialog box
    will open with nine options to check. There is also a field where you can simply
    enter the proper rights and permissions code according to Linux’s ranking system.
    To have a user run a cgi script on your server, enter `755` in this field (without
    quotes). You’ll see that the dialog box updates the proper fields. Click `OK`
    and you’ve changed the file’s rights and permissions to allow your users to execute
    the script via their browsers within your `cgi-bin`.


    ## Obtaining Your Path Statement with printenv.pl


    One of the first things you need to know about your server’s setup is the path
    statement. Within the path statement is the hierarchy of directories that extend
    from the root directory of your account to the working directories you’ll be using,
    such as the `cgi-bin` directory that will hold all of your site’s cgi scripts.


    To obtain your path statement, it is required that you run a small but powerful
    script called `printenv.pl`. Simply upload the file and adjust its rights and
    permissions to `chmod 755`. Run the script in your browser and you’ll be able
    to pick out the path statement. The following is code used in this small script:


    ```

    print "Content-type: text/plain; charset=iso-8859-1\n\n";

    foreach $var (sort(keys(%ENV))) {

    $val = $ENV{$var};

    $val =~ s|\n|\\n|g;

    $val =~ s|"|\\"|g;

    print "${var}=\"${val}\"\n";

    }

    ```


    This small piece of code tells you everything that is within the server’s environment,
    including the path statement to many resources that will come in handy in later
    chapters of this book.


    The path statements on a server are pointers to resources that are accessed directly
    from the operating system or the server in question. For example, a path statement
    in Windows can be set up to affect the Perl shebang. If you were to install Apache
    to `c:\Apache`, the shebang in your Perl script will be as follows:


    ```

    C:\Apache\bin\perl

    ```


    As you can see, the location allows for the server to find `perl`, but you may
    have to give the path to the `perl.exe` executable, as follows:


    ```

    C:\Apache\bin\Perl\perl.exe

    ```


    Giving the fully formed location to `perl.exe` is a security nightmare. Use it
    only if you don’t want to set up an operating system’s path statements from the
    control panel.


    ## Summary


    In this chapter, we touched on the basic functionality of the various technologies
    we’ll be using to create fully formed web pages. We discussed your web hosting
    options and how the three servers (Perl, `MySQL`, and Apache) are used together.


    We touched on rights and permissions and basic knowledge that we will be building
    on in the chapters to come.'
