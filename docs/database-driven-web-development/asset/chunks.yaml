    \ drive. This location, by default, is `C:\\Program Files\\Perl` for a Windows\
    \ workstation and `#!/usr/bin/perl` for a Linux workstation.\n\nIf the second\
    \ window wasn’t the installation option, the third will be. I recommend you install\
    \ everything. This includes the Perl executables and support libraries as well\
    \ as the literature on the use of your Perl server. Including the literature increases\
    \ the install time by about two minutes.\n\n## Topics to Consider\n\nOne of the\
    \ topics to consider during installation is simply the location of Perl. I recommend\
    \ your path on a Windows operating system be `C:\\Perl`. This goes against the\
    \ default path, but you’ll actually benefit from it further down the road.\n\n\
    Some programs don’t like the space between Program and Files if you were to use\
    \ the default path during installation. There is a workaround to this, which is\
    \ a bit unintuitive. The path `C:\\Progra~@\\Perl` is the path that some programs\
    \ that don’t like the space will require to operate. Installing to `C:\\Perl`\
    \ allows these legacy programs to find Perl without adding extra work such as\
    \ including `PATH` statements, which is a direct change to the operating system\
