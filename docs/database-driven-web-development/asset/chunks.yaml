- fmt: "# JavaScript 与 DOM 操作\n\n这些方法可以在单个页面元素中使用，也可以通过 CSS 规则实现大范围更改。只需相应地修改位于文档\
    \ `head` 内的 `script` 元素中所给出的 JavaScript 里的 DOM 语句即可。\n\n```javascript\nfunction\
    \ bgChange(bg) {\n    document.body.style.background=bg;\n}\n```\n鼠标悬停在方块上，背景颜色将会改变。\n\
    \n### 清单 6-2 动态更改颜色\n\n你可以尝试修改一些内容，例如：更改触发 DOM 语句中所声明更改的事件、修改哪些属性，或者如果你想更进一步，可以分配一个变量来存储由其他函数（例如根据存储的用户偏好）决定的信息。\n\
    为此，可以将传递给 `bgChange()` 函数的参数从字面值改为变量名。例如，使用一个变量名代替单词 `\"green\"` —— 实际要应用的颜色可以在另一个函数中决定，并作为该变量的数据。你可以使用命名颜色、十六进制颜色或\
    \ RGB 颜色来定义要应用的颜色。\n\n## 使用 onLoad 事件触发器\n\n学会使用 `onLoad` 事件处理程序非常棒。通过这个简单的事件处理程序，你可以安排动作与细微事件同步，例如在页面元素加载完成并显示时启动一个动作——比如，当一个大图片下载完成后应用一条\
    \ CSS 规则。\n尝试下载一个大文件，比如音频或视频文件。将表格的 `border` 属性改为 1，并添加一个 `bgcolor=\"red\"` 语句，当文件加载到页面完成后，对象周围将显示一个\
    \ 1 像素宽的红色边框。将指令放在文档 `head` 部分的脚本中，并在文档的 `body` 中声明当 `onLoad` 事件触发时要处理的 JavaScript\
    \ 函数。\n\n### 清单 6-3 使用 `onLoad()` 事件处理程序\n清单 6-3 在 `BODY` 元素中使用了 `onLoad` 事件，当整个文档加载完成后，显示一个带有给定文本的警告框。你不必将这个规则应用于文档范围的更改——`onLoad`\
    \ 事件可以在任何 HTML 元素中触发，并在浏览器完成该元素加载时应用。\n\n```javascript\nfunction myMessage() {\n\
    \    alert(\"This message was triggered from the onLoad event\");\n}\n```\n\n\
    使用这个简单的事件，你可以实现相当多的创造性操作。尝试将这个事件与其对立事件 `onUnload` 事件处理程序混合使用。我发现，`onUnload` 在页面关闭时将用户偏好或任何生成的数据写入\
    \ cookie 非常方便。然后，你可以在下一个页面中通过其 `onLoad` 函数使用 cookie 中包含的数据并将其应用到下一页。\n\n## 使用\
    \ `this` 更改颜色\n\n这是一种实现令人印象深刻效果的非常简单的方法。DOM 指令通过一个简单的 `onClick` 事件触发，将“Click Me!”文本的原始颜色更改为红色。你可以使用命名颜色、十六进制颜色或\
    \ RGB 颜色。\n\n`this` 指令在独特位置使用时功能非常强大。然而，你不会希望用这种方法更改文档中的许多项目。它在大型场景下效率低下，并且不是解决文档范围甚至选择性区域更改问题的最佳方法。\n\
    \n```html\n<span onclick=\"this.style.color='red'\">Click Me!</span>\n```\n###\
    \ 清单 6-4 使用 `this` 指令\n\n自 HTML 3.2 版以来，你可以将此技术应用于任何给定文档中任何格式正确的容器。此功能非常普遍，因此在可预见的未来，它将包含在每个版本的\
    \ HTML（以及 DOM）中。\n\n## 即时切换图像\n\n切换图像是相当简单的，只要意识到几件事：你必须将要切换到的图像数据预加载到一个变量中，并且如果你想将图像切换回来，你必须将原始图像数据加载到它自己的变量中。你通过使用文档对象的\
    \ `src` 属性来完成此操作。检查清单 6-5 中的示例。\n\n### 清单 6-5 操作图像\n```javascript\ndocument.getElementById(\"\
    image\").src=\"image2.jpg\";\n```\n> 原始图像是 `image1.gif`，脚本将其更改为 `image2.jpg`。\n\
    \n你可以将实现此操作的 JavaScript 函数放在文档中的任何位置。然而，较旧的浏览器要求你将函数放在文档的一个部分中，该部分在声明要更改的图像位置之前被解析。你可以在\
    \ `SCRIPT` 的开始和结束元素内使用 JavaScript 函数，也可以使用 HTML 规范中任何合法元素的 `javascript:` 参数。\n\
    要将图像更改回原始图像，你必须使用文档对象的相同 `src` 属性来执行此操作——只需更改图像文件的 URL。浏览器将加载数据并存储，直到它被你选择的事件处理程序触发。\n\
    在前面的例子中，我们使用了两个变量来存储和检索图像数据。完全有可能，并且在某些情况下是可取的，使用一个数组而不是许多变量。只需声明数组，按照前面给出的确切方式分配\
    \ `src` 属性，但使用 `arrayName[count]=` 赋值代替简单的变量声明。\n如果你需要在不同时间更改文档许多不同部分中的许多不同图像，你会使用这种技术。如果你想同时更改许多相同的图像，你应该使用变量——存储在变量中的图像数据可以重复使用。\n\
    \n## 使用 `innerHTML` 更改 HTML 代码\n\n根据我的发现，`innerHTML` 属性在使用上有时有点令人困惑。出于某种原因，`outerHTML`\
    \ 似乎对大多数人来说是最好的选择，但情况并非总是如此——证明这一点很简单，因为 HTML 规范中包含的是 `innerHTML` 属性，而不仅仅是 `outerHTML`\
    \ 属性。\n\n使用 `id` 属性将 `nameon()` 函数中的 JavaScript 命令分配给该单个页面元素。将作为 `id` 属性值的名称作为参数传递给我们用于实现目标的两个函数。我们使用两个事件来触发两个单独的动作：`onMouseOut`\
    \ 和 `onMouseOver`。\n\n### 清单 6-6 `innerHTML` 练习\n```javascript\nfunction nameon()\
    \ {\n    document.getElementById('h2text').innerHTML=\"WELCOME!\";\n}\nfunction\
    \ nameout() {\n    document.getElementById('h2text').innerHTML=\"How are you today?\"\
    ;\n}\n```\n```html\n<span onmouseover=\"nameon()\" onmouseout=\"nameout()\">Mouse\
    \ over this text!</span>\n```\n\n如果你有一个必须随着用户触发事件而改变的操作，这将特别有用。请记住，你不必止步于一个命令，因此你可以在函数中加载任何你想要的功能。`innerHTML`\
    \ 属性主要用作文本编辑指令，但通过一点事先思考和创造力，你可以在文本更改时分配 DOM 样式表规则。你希望包含为更改内容的每一组文本都可以应用其自己的样式表规则。"
  raw: 'These methods can be used in one page element or in sweeping changes

    that you can accomplish through the use of CSS rules. Simply alter the

    DOM statement stated in the JavaScript within the script elements given

    in the head of the document accordingly.


    ```


    function bgChange(bg) {

    document.body.style.background=bg;

    }


    Mouse over the squares and the background color will change


    Listing 6-2

    Changing colors dynamically

    ```


    Some things that you might want to play around with are changing

    which events fire the changes stated in the DOM statement, what

    properties are altered, and if you want to go a bit further and assign a

    variable loaded with information that is decided upon by other functions

    such as according to stored user preference.

    To do this, change from using a literal value as the argument passed

    to the bgChange()

    function. For example, use a variable name instead of the word

    “green” – the actual color to be applied can be decided upon in another

    function and is contained as the data of the variable. You may use named

    colors, hex colors, or RGB colors as the method of defining what color

    is to be applied.


    An onLoad Event Trigger

    Learning to use an onLoad event handler is

    great. Through the use of this simple event handler, you can time

    actions to coincide with subtle things such as starting an action when

    the page element is finished loading and is displayed – applying a CSS

    rule when a large image has finished downloading, for example.

    Try downloading a large file such as an audio or video file. Change

    the border property of a table to 1 with a bgcolor=“red” statement and a

    border will be displayed around the object that is 1 pixel wide, colored

    red, when the file is finished loading into the page. Put the

    instructions in a script in the head of the document and state the

    JavaScript function within the body of the document as that to be

    processed when the onLoad event is triggered.


    Listing [6-3](#485616_2_En_6_Chapter.xhtml#PC3) uses the onLoad

    event in the BODY element to display an alert box with the text given

    when the entire document is finished loading. You don’t have to apply

    this rule in terms of document-wide alterations – the onLoad event can

    be triggered in any HTML element and applied when the element is

    finished loading by the browser.


    ```


    function myMessage() {

    alert("This message was triggered from the onLoad event");

    }


    Listing 6-3

    Using the onLoad() event handler

    ```


    You can accomplish quite a bit of creative actions using this simple

    event. Try mixing this event with its opposite, the onUnload event handler.

    onUnload is very handy to write user preferences or any generated data

    to a cookie when the page is closed, I’ve found. You can then use the

    data contained within the cookie and apply it to the next page by

    applying it using the onLoad function in the next page.


    Use “this” to Change Colors

    This is a very simple way to achieve some impressive results. The DOM

    directive is triggered with a simple onClick event, changing the

    original color of the Click Me! Text to red. You may use a named color,

    hex color, or RGB color.


    The this directive

    can be very powerful when used in a unique position. However, you

    wouldn’t want to change many items in a document with this approach. It

    is inefficient on a large scale and isn’t the best approach to solving

    the problem of document-wide or even selective area alterations.


    ```


    Click Me!


    Listing 6-4

    Using the this directive

    ```


    You can apply this technique to any properly formed container in any

    given document, since HTML version 3.2\. This functionality is

    widespread, so it will be included in every version of HTML (and thus

    DOM) for the foreseeable future.


    Switching Images on the Fly


    Switching images is

    fairly simple as long as you realize a couple of things: you must

    preload the image data that you want to switch to into a variable, and

    if you want to change the image back, you have to load the original

    image data into a variable of its own. You accomplish through the use of

    the src attribute of the document object. Examine the example in Listing

    [6-5](#485616_2_En_6_Chapter.xhtml#PC5).


    ```


    document.getElementById("image").src="image2.jpg";


    The original image was image1.gif The script changed it to image2.jpg


    Listing 6-5

    Manipulating images

    ```


    You can place the JavaScript function that accomplishes this action

    in any place within the document. However, older browsers require that

    you place the function in a section of the document that is parsed

    before the location of the image is stated to be changed. You can use a

    JavaScript function within the opening and closing SCRIPT elements, or

    you can use a javascript: parameter of any given legal element within

    the HTML specifications.

    To change the image back to the original image, you must use the same

    src attribute of the document object to do so – simply change the URL of

    the image file. The browser will load the data and store it until it is

    triggered with the event handler of your choice.

    In the preceding example, we used two variables to store and retrieve

    the image data. It is entirely possible, and in some cases, desirable,

    to use one array rather than many variables. Simply declare the array,

    assign the src attribute in the exact way given previously, but use an

    arrayName[count]= assignment instead of a simple variable

    declaration.

    You would use this technique if you need to change many different

    images in many different portions of the document, at different times.

    You should use variables if you wish to change many images that are the

    same at the same time – the image data stored in the variable can be

    used repeatedly.


    Change HTML Code Using innerHTML

    The innerHTML

    attribute

    is sometimes a little confusing in its use, I’ve found. For some reason,

    outerHTML seems to be the best choice for most people, but this isn’t

    always the case – the proof for this is simply because the innerHTML attribute
    was

    included in the HTML specifications, not just the outerHTML

    attribute.


    Use the id attribute to assign the JavaScript commands within the nameon() function
    to

    that individual page element. Call the name given as the value of the id

    attribute as the argument passed to the two functions we’re using to

    accomplish our goals. We use two events to trigger two separate actions:

    onMouseOut and onMouseOver.


    ```


    function nameon() {

    document.getElementById(''h2text'').innerHTML="WELCOME!";

    }

    function nameout() {

    document.getElementById(''h2text'').innerHTML="How are you today?";

    }


    Mouse over this text!


    Listing 6-6

    An exercise in innerHTML

    ```


    This is especially useful if you have an action that must change as

    the user triggers an event. You don’t have to stop with one command,

    remember, so you can load whatever functionality you’d like within the

    functions. The innerHTML

    attribute is used primarily as a text editing directive, but with

    a little forethought and creativity, you can assign DOM style sheet

    rules when the text is changed. Each set of text you’d like to include

    as the changed content can have its own style sheet rules applied to

    it.'
  trans: "# JavaScript 与 DOM 操作\n\n这些方法既可用于操作单个页面元素，也能通过 CSS 规则实现大范围更改。只需相应修改位于文档\
    \ `head` 内的 `script` 元素中所给出的 JavaScript 语句中的 DOM 命令即可。\n\n```javascript\nfunction\
    \ bgChange(bg) {\n    document.body.style.background=bg;\n}\n```\n当鼠标悬停在方块上时，背景颜色将会改变。\n\
    \n### 清单 6-2 动态更改颜色\n\n你可以尝试修改一些内容，例如：更改触发 DOM 声明中所更改的事件、修改哪些属性，或者如果你想更进一步，可以分配一个变量来存储由其他函数（例如根据存储的用户偏好）决定的信息。\n\
    为此，可以将传递给 `bgChange()` 函数的参数从字面值改为变量名。例如，使用一个变量名代替单词 `\"green\"` —— 实际要应用的颜色可以在另一个函数中决定，并作为该变量的数据。你可以使用命名颜色、十六进制颜色或\
    \ RGB 颜色来定义要应用的颜色。\n\n## 使用 onLoad 事件触发器\n\n学会使用 `onLoad` 事件处理程序非常棒。通过这个简单的事件处理程序，你可以安排动作与细微事件同步，例如在页面元素加载完成并显示时启动一个动作——比如，当一个大图片下载完成后应用一条\
    \ CSS 规则。\n尝试下载一个大文件，比如音频或视频文件。将表格的 `border` 属性改为 1，并添加一个 `bgcolor=\"red\"` 语句，当文件加载到页面完成后，对象周围将显示一个\
    \ 1 像素宽的红色边框。将指令放在文档 `head` 部分的脚本中，并在文档的 `body` 中声明当 `onLoad` 事件触发时要处理的 JavaScript\
    \ 函数。\n\n### 清单 6-3 使用 `onLoad()` 事件处理程序\n清单 6-3 在 `BODY` 元素中使用了 `onLoad` 事件，当整个文档加载完成后，显示一个带有给定文本的警告框。你不必将这个规则应用于文档范围的更改——`onLoad`\
    \ 事件可以在任何 HTML 元素中触发，并在浏览器完成该元素加载时应用。\n\n```javascript\nfunction myMessage() {\n\
    \    alert(\"此消息是由 onLoad 事件触发的\");\n}\n```\n\n使用这个简单的事件，你可以实现相当多的创造性操作。尝试将这个事件与其对立事件\
    \ `onUnload` 事件处理程序混合使用。我发现，`onUnload` 在页面关闭时将用户偏好或任何生成的数据写入 cookie 非常方便。然后，你可以在下一个页面中通过其\
    \ `onLoad` 函数使用 cookie 中包含的数据并将其应用到下一页。\n\n## 使用 `this` 更改颜色\n\n这是一种实现令人印象深刻效果的非常简单的方法。DOM\
    \ 指令通过一个简单的 `onClick` 事件触发，将“Click Me!”文本的原始颜色更改为红色。你可以使用命名颜色、十六进制颜色或 RGB 颜色。\n\
    \n`this` 指令在独特位置使用时功能非常强大。然而，你不会希望用这种方法更改文档中的许多项目。它在大型场景下效率低下，并且不是解决文档范围甚至选择性区域更改问题的最佳方法。\n\
    \n```html\n<span onclick=\"this.style.color='red'\">点击我！</span>\n```\n### 清单 6-4\
    \ 使用 `this` 指令\n\n自 HTML 3.2 版以来，你可以将此技术应用于任何给定文档中任何格式正确的容器。此功能非常普遍，因此在可预见的未来，它将包含在每个版本的\
    \ HTML（以及 DOM）中。\n\n## 即时切换图像\n\n切换图像是相当简单的，只要意识到几件事：你必须将要切换到的图像数据预加载到一个变量中，并且如果你想将图像切换回来，你必须将原始图像数据加载到它自己的变量中。你通过使用文档对象的\
    \ `src` 属性来完成此操作。查看清单 6-5 中的示例。\n\n### 清单 6-5 操作图像\n```javascript\ndocument.getElementById(\"\
    image\").src=\"image2.jpg\";\n```\n> 原始图像是 `image1.gif`，脚本将其更改为 `image2.jpg`。\n\
    \n你可以将实现此操作的 JavaScript 函数放在文档中的任何位置。然而，较旧的浏览器要求你将函数放在文档的一个部分中，该部分在声明要更改的图像位置之前被解析。你可以在\
    \ `SCRIPT` 的开始和结束元素内使用 JavaScript 函数，也可以使用 HTML 规范中任何合法元素的 `javascript:` 参数。\n\
    要将图像更改回原始图像，你必须使用文档对象的相同 `src` 属性来执行此操作——只需更改图像文件的 URL。浏览器将加载数据并存储，直到它被你选择的事件处理程序触发。\n\
    在前面的例子中，我们使用了两个变量来存储和检索图像数据。完全有可能，并且在某些情况下是可取的，使用一个数组而不是许多变量。只需声明数组，按照前面给出的确切方式分配\
    \ `src` 属性，但使用 `arrayName[count]=` 赋值代替简单的变量声明。\n如果你需要在不同时间更改文档许多不同部分中的许多不同图像，你会使用这种技术。如果你想同时更改许多相同的图像，你应该使用变量——存储在变量中的图像数据可以重复使用。\n\
    \n## 使用 `innerHTML` 更改 HTML 代码\n\n根据我的发现，`innerHTML` 属性在使用上有时有点令人困惑。出于某种原因，`outerHTML`\
    \ 似乎对大多数人来说是最好的选择，但情况并非总是如此——证明这一点很简单，因为 HTML 规范中包含的是 `innerHTML` 属性，而不仅仅是 `outerHTML`\
    \ 属性。\n\n使用 `id` 属性将 `nameon()` 函数中的 JavaScript 命令分配给该单个页面元素。将作为 `id` 属性值的名称作为参数传递给我们用于实现目标的两个函数。我们使用两个事件来触发两个单独的动作：`onMouseOut`\
    \ 和 `onMouseOver`。\n\n### 清单 6-6 `innerHTML` 练习\n```javascript\nfunction nameon()\
    \ {\n    document.getElementById('h2text').innerHTML=\"欢迎！\";\n}\nfunction nameout()\
    \ {\n    document.getElementById('h2text').innerHTML=\"你今天好吗？\";\n}\n```\n```html\n\
    <span onmouseover=\"nameon()\" onmouseout=\"nameout()\">将鼠标悬停在此文本上！</span>\n```\n\
    \n如果你有一个必须随着用户触发事件而改变的操作，这将特别有用。请记住，你不必止步于一个命令，因此你可以在函数中加载任何你想要的功能。`innerHTML`\
    \ 属性主要用作文本编辑指令，但通过一点事先思考和创造力，你可以在文本更改时分配 DOM 样式表规则。你希望包含为更改内容的每一组文本都可以应用其自己的样式表规则。"
- fmt: "# Change the Position of a Page Element\n\nBefore we get into the use of the\
    \ `style.position` statement, you must understand how the two options of this\
    \ statement differ. You would usually use them with `ilayer` elements to accomplish\
    \ a drop-down menu. Each has its pros and cons, and each has a very particular\
    \ way they must be used.\n\n## Absolute Positioning\n\nThe first option is `absolute`.\
    \ The absolute positioned document element is positioned according to a position\
    \ the browser calculates in relation to the top left corner of the document. It\
    \ is expressed in pixels. The element assigned to this positioning schema will\
    \ stay in the position given even if the rest of the document resizes or shifts\
    \ as the browser window is resized.\n\nFor example, if you absolutely positioned\
    \ a centered table in your document and the user resized the window, that portion\
    \ of the table that is absolutely referenced will stay where it is – the rest\
    \ of the document will move. If you’d like to use this positioning technique,\
    \ you must, for practical reasons, position your page justified left, `valign=top`.\
    \ This is because the document is positioned absolutely according to the top-left\
    \ corner of the document. If the browser window is resized, the page doesn’t move,\
    \ and the absolutely positioned element will have the same referenced location\
    \ in the document.\n\n## Relative Positioning\n\nThe relatively positioned page\
    \ element is by far the most useful. It is usually applied as a position in a\
    \ table. The position is referenced as a point positioned absolutely, but in reference\
    \ to the upper left corner of the area of the document specified by the `TD` element.\
    \ If the page is resized, the `TD` element will move, but the content attached\
    \ to the upper left corner of that element will adjust as the `TD` element adjusts,\
    \ keeping the structure of the table intact. A browser resize, then, will move\
    \ the entire table including the relatively positioned portion given as content\
    \ within the table.\n\n```javascript\nfunction moveleft() {\n    document.getElementById('header').style.position=\"\
    absolute\";\n    document.getElementById('header').style.left=\"0\";\n}\nfunction\
    \ moveback() {\n    document.getElementById('header').style.position=\"relative\"\
    ;\n}\n```\n\nMouse over this text\n\nListing 6-7\nPositioning page elements\n\n\
    Notice that the `style.left` attribute was stated as the second statement within\
    \ the JavaScript function. This is the value, in pixels, that the browser will\
    \ use to position the content. Notice also that you don’t have to use the `style.left`\
    \ attribute if you’re positioning relatively.\n\n## Using `onMouseMove`\n\n`onMouseMove`\
    \ is a document-wide event handler that applies to the `BODY` element only. You\
    \ can use a javascript approach, but that is usually not a good thing, as it clutters\
    \ up your `BODY` element with unneeded attributes. Use a JavaScript function in\
    \ the head of the document and call it with the `onMouseMove` event handler as\
    \ per usual.\n\n```javascript\nvar i=1;\nfunction moveright() {\n    document.getElementById('header').style.position=\"\
    absolute\";\n    document.getElementById('header').style.left=i;\n    i++;\n}\n\
    ```\n\nMove the mouse over this page\n\nListing 6-8\nUsing the `onMouseMove` event\
    \ handler\n\nNote that a variable loaded with a value was used as the parameter\
    \ of the `style.left` attribute. This is just to show that a variable name can\
    \ be used as the value. You may use other JavaScript functions within the rest\
    \ of the document to calculate the value given in the variable. This will allow\
    \ a limited sort of dynamic positioning while still receiving the benefits of\
    \ the rules that govern the absolutely positioned document element.\n\n## Using\
    \ `onLoad` and `onUnload`\n\nThe load event handlers are great to work with. There\
    \ are many different ways you can use them, and all are very useful and easy to\
    \ implement. The two JavaScript functions used in the example are fairly basic,\
    \ although the first function, `starttimer()`, uses four DOM statements and two\
    \ JavaScript object activations.\n\n```javascript\nvar i=10\nfunction starttimer()\
    \ {\n    document.getElementById('h_one').style.position=\"relative\";\n    document.getElementById('h_one').style.left=+i;\n\
    \    document.getElementById('h_two').style.position=\"relative\";\n    document.getElementById('h_two').style.top=+i;\n\
    \    i++;\n}\n```\n\nHeader one\nHeader two\n\nListing 6-9\nUsing the `onLoad`\
    \ and `onUnload` event handlers\n\nThe JavaScript functions we’ve stated are relatively\
    \ positioned. The value of this relatively positioned portion of the document\
    \ is given in the `i` variable. Note that the increment operand (`+`) is used\
    \ with the variable name. This increments the numeric value within the variable\
    \ by one, changing the position of said page element.\n\nIt is extremely handy\
    \ to be able to carry data from one page to the next without first sending that\
    \ data to the web server to be stored, processed, and re-served for the next page.\
    \ Using the `onUnload` event handler, you are able to attach a series of nested\
    \ commands that allow you to store data such as user preferences in a cookie on\
    \ the user machine and load from that cookie to format the next page on the fly\
    \ through the use of the `onLoad` event handler.\n\n## Making Text Bigger\n\n\
    Applying a textual formatting application is very easy. Simply use any CSS rule\
    \ that has been included in the DOM specifications. In this case, we’re altering\
    \ the sizing of text. We’ll take it a step further and introduce a maximum text\
    \ size as well.\n\n```javascript\ntxtsize=0;\nmaxsize=100;\nfunction writemsg()\
    \ {\n    if (txtsize < maxsize) {\n        txtsize=txtsize+2;\n        document.getElementById('mytext').style.fontSize=txtsize;\n\
    \    }\n}\n```\n\nThis is the text that will become bigger\n\nListing 6-10\nChanging\
    \ text size properties\n\nThe `style.fontSize` attribute is used to change the\
    \ size of the text. There are many style rules that can be used in this exact\
    \ same location in this exact way to change many different textual formatting\
    \ options. However, you are not limited to applying only one textual formatting\
    \ option per function – you may also apply groups of rules to construct the look\
    \ and feel you’re thinking of.\n\n## Change the Background Color of an “input”\
    \ Field\n\nThis option can easily be applied as the page loads or according to\
    \ user selection. We use the `style.background` statement to change the color.\
    \ The color can be stated as a named color, hex color, or RGB color.\n\n```javascript\n\
    function changeColor(color) {\n    document.getElementById('x').style.background=color;\n\
    }\n```\n\nMouse over the three table cells, and the input field will change its\
    \ background color\n\nListing 6-11\nChanging the color of an INPUT field\n\nBe\
    \ sure to use an appropriate `id` attribute on the input field you want to apply\
    \ changes to. The arguments passed to the `changeColor()` function are stated\
    \ in a static way as named colors but can also be decided upon with other functions\
    \ by replacing the named color with a variable. The value of the value can then\
    \ be decided by other functions within the page.\n\n## Change the Text Color of\
    \ an “input” Field\n\nA simple way to change the text within an input field is\
    \ by using the oft-used `style.color` statement.\n\nIt can be changed according\
    \ to one option or many options. It is also entirely possible to make these decisions\
    \ on what color to change to a part of other JavaScript functions.\n\nThe coloring\
    \ methods used are named colors, hex colors, or RGB colors. You may mix the three\
    \ at any given point in the logical progression of the script.\n\n```javascript\n\
    function changeColor(color) {\n    document.getElementById('x').style.color=color;\n\
    }\n```\n\nMouse over the three colored table cells. The text will change color.\n\
    \nListing 6-12\nChanging the text color of an INPUT field\n\nNote that this method\
    \ of changing textual formatting can be applied to anywhere within the document\
    \ using any valid DOM reflection of a CSS rule.\n\n## Change the Background Image\
    \ of an “input” Field\n\nThere are many websites that use this small but powerful\
    \ chunk of functionality. The Internet is based on look and feel, so it is obviously\
    \ very common to have to work with a large amount of display options. The easiest\
    \ to understand is simply changing the background image used in a text input field."
  raw: 'Change the Position of a Page Element

    Before we get into the use of the style.position

    statement, you must understand how the two options of this

    statement differ. You would usually use them with ilayer elements to

    accomplish a drop-down

    menu. Each has its pros and cons, and each has a very particular

    way they must be used.

    The first option is absolute. The absolute positioned document element is positioned

    according to a position the browser calculates in relation to the top

    left corner of the document. It is expressed in pixels. The element

    assigned to this positioning schema will stay in the position given even

    if the rest of the document resizes or shifts as the browser window is

    resized.

    For example, if you absolutely positioned a centered table in your

    document and the user resized the window, that portion of the table that

    is absolutely referenced will stay where it is – the rest of the

    document will move. If you’d like to use this positioning technique, you

    must, for practical reasons, position your page justified left,

    valign=top. This is because the document is positioned absolutely

    according to the top-left corner of the document. If the browser window

    is resized, the page doesn’t move, and the absolutely positioned element

    will have the same referenced location in the document.


    The relatively positioned page element is by far the most useful. It is

    usually applied as a position in a table. The position is referenced as

    a point positioned absolutely, but in reference to the upper left corner

    of the area of the document specified by the TD element. If the page is

    resized, the TD element will move, but the content attached to the upper

    left corner of that element will adjust as the TD element adjusts,

    keeping the structure of the table intact. A browser resize, then, will

    move the entire table including the relatively positioned portion given

    as content within the table.


    ```


    function moveleft() {

    document.getElementById(''header'').style.position="absolute";

    document.getElementById(''header'').style.left="0";

    }

    function moveback() {

    document.getElementById(''header'').style.position="relative";

    }


    Mouse over this text


    Listing 6-7

    Positioning page elements

    ```


    Notice that the style.left attribute was stated as the second

    statement within the JavaScript function. This is the value, in pixels,

    that the browser will use to position the content. Notice also that you

    don’t have to use the style.left attribute if you’re positioning

    relatively.


    Using onMouseMove


    onMouseMove is a document-wide

    event handler that applies to the BODY element only. You can use a

    javascript approach, but that is usually not a good thing, as it

    clutters up your BODY element with unneeded attributes. Use a JavaScript

    function in the head of the document and call it with the onMouseMove event

    handler as per usual.


    ```


    var i=1;

    function moveright() {

    document.getElementById(''header'').style.position="absolute";

    document.getElementById(''header'').style.left=i;

    i++;

    }


    Move the mouse over this page


    Listing 6-8

    Using the onMouseMove event handler

    ```


    Note that a variable loaded with a value was used as the parameter of

    the style.left attribute. This is just to show that a variable name can

    be used as the value. You may use other JavaScript functions within the

    rest of the document to calculate the value given in the variable. This

    will allow a limited sort of dynamic positioning while still receiving

    the benefits of the rules that govern the absolutely positioned document

    element.


    Using onLoad and onUnload


    The load event handlers are great to

    work with. There are many different ways you can use them, and all are

    very useful and easy to implement. The two JavaScript functions used in

    the example are fairly basic, although the first function, starttimer(),

    uses four DOM statements and two JavaScript object activations.


    ```


    var i=10

    function starttimer() {

    document.getElementById(''h_one'').style.position="relative";

    document.getElementById(''h_one'').style.left=+i;

    document.getElementById(''h_two'').style.position="relative";

    document.getElementById(''h_two'').style.top=+i;

    i++;

    }


    Header one

    Header two


    Listing 6-9

    Using the onLoad and onUnload event handlers

    ```


    The JavaScript functions we’ve stated are relatively positioned. The

    value of this relatively positioned portion of the document is given in

    the i variable. Note that the increment operand (+) is used with the

    variable name. This increments the numeric value within the variable by

    one, changing the position of said page element.

    It is extremely handy to be able to carry data from one page to the

    next without first sending that data to the web server to be stored,

    processed, and re-served for the next page. Using the onUnload event handler,

    you are able to attach a series of nested commands that allow you to

    store data such as user preferences in a cookie on the user machine and

    load from that cookie to format the next page on the fly through the use

    of the onLoad event handler.


    Making Text Bigger


    Applying a textual formatting application is very

    easy. Simply use any CSS rule that has been included in the DOM

    specifications. In this case, we’re altering the sizing of text. We’ll

    take it a step further and introduce a maximum text size as well.


    ```


    txtsize=0;

    maxsize=100;

    function writemsg() {

    if (txtsize


    This is the text that will become bigger


    Listing 6-10

    Changing text size properties

    ```


    The style.fontSize attribute is used to change the size of the text.

    There are many style rules that can be used in this exact same location

    in this exact way to change many different textual formatting options.

    However, you are not limited to applying only one textual formatting

    option per function – you may also apply groups of rules to construct

    the look and feel you’re thinking of.


    Change the Background Color of an “input” Field


    This option can easily be applied as the page loads or according to user

    selection. We use the style.background

    statement to change the color. The color can be stated as a named

    color, hex color, or RGB color.


    ```


    function changeColor(color) {

    document.getElementById(''x'').style.background=color;

    }


    Mouse over the three table cells, and the input field will change its background
    color


    Listing 6-11

    Changing the color of an INPUT field

    ```


    Be sure to use an appropriate id attribute on the input field you

    want to apply changes to. The arguments passed to the changeColor()

    function are stated in a static way as named colors but can also be

    decided upon with other functions by replacing the named color with a

    variable. The value of the value can then be decided by other functions

    within the page.


    Change the Text Color of an “input” Field

    A simple way to change the text within an input field is by using the

    oft-used style.color

    statement.

    It can be changed according to one option or many options. It is also

    entirely possible to make these decisions on what color to change to a

    part of other JavaScript functions.


    The coloring methods used are named colors, hex colors, or RGB colors.

    You may mix the three at any given point in the logical progression of

    the script.


    ```


    function changeColor(color) {

    document.getElementById(''x'').style.color=color;

    }


    Mouse over the three colored table cells. The text will change color.


    Listing 6-12

    Changing the text color of an INPUT field

    ```


    Note that this method of changing textual formatting can be applied

    to anywhere within the document using any valid DOM reflection of a CSS

    rule.


    Change the Background Image of an “input” Field

    There are many websites that use this small but powerful chunk of

    functionality. The Internet is based on

    look and feel, so it is obviously very common to have to work with a

    large amount of display options. The easiest to understand is simply

    changing the background image used in a text input field.'
  trans: "\n# 更改页面元素的位置\n\n在我们深入探讨 `style.position` 语句的使用之前，你必须理解该语句的两个选项之间的区别。你通常会将它们与\
    \ `ilayer` 元素一起使用，以实现下拉菜单。它们各有优缺点，并且每种都有其特定的使用方式。\n\n## 绝对定位\n\n第一个选项是 `absolute`。绝对定位的文档元素根据浏览器计算出的、相对于文档左上角的位置进行定位。它以像素为单位表示。被分配此定位模式的元素将保持在给定的位置，即使文档的其余部分在浏览器窗口调整大小时发生调整或移动也是如此。\n\
    \n例如，如果你在文档中对一个居中的表格进行了绝对定位，然后用户调整了窗口大小，那么表格中被绝对引用的那部分将保持不动——文档的其余部分将会移动。如果你想使用这种定位技术，出于实际原因，你必须将页面左对齐，`valign=top`。这是因为文档是根据文档的左上角进行绝对定位的。如果浏览器窗口被调整大小，页面不会移动，绝对定位的元素在文档中的引用位置也将保持不变。\n\
    \n## 相对定位\n\n相对定位的页面元素是迄今为止最有用的。它通常被应用为表格中的一个位置。该位置被引用为一个绝对定位的点，但是参照由 `TD` 元素指定的文档区域的左上角。如果页面被调整大小，`TD`\
    \ 元素将会移动，但附着在该元素左上角的内容将随着 `TD` 元素的调整而调整，从而保持表格结构的完整性。因此，调整浏览器窗口大小将会移动整个表格，包括作为表格内容给出的相对定位部分。\n\
    \n```javascript\nfunction moveleft() {\n    document.getElementById('header').style.position=\"\
    absolute\";\n    document.getElementById('header').style.left=\"0\";\n}\nfunction\
    \ moveback() {\n    document.getElementById('header').style.position=\"relative\"\
    ;\n}\n```\n\n将鼠标悬停在此文本上\n\n清单 6-7\n定位页面元素\n\n请注意，`style.left` 属性在 JavaScript 函数中被声明为第二条语句。这是浏览器将用于定位内容的值，以像素为单位。另请注意，如果你使用的是相对定位，则不必使用\
    \ `style.left` 属性。\n\n## 使用 `onMouseMove`\n\n`onMouseMove` 是一个文档范围的事件处理程序，仅适用于\
    \ `BODY` 元素。你可以使用 JavaScript 方法，但这通常不是好做法，因为它会用不需要的属性弄乱你的 `BODY` 元素。在文档的头部使用一个\
    \ JavaScript 函数，并像往常一样通过 `onMouseMove` 事件处理程序来调用它。\n\n```javascript\nvar i=1;\n\
    function moveright() {\n    document.getElementById('header').style.position=\"\
    absolute\";\n    document.getElementById('header').style.left=i;\n    i++;\n}\n\
    ```\n\n将鼠标移到此页面上\n\n清单 6-8\n使用 `onMouseMove` 事件处理程序\n\n请注意，一个赋值了值的变量被用作 `style.left`\
    \ 属性的参数。这只是为了展示可以使用变量名作为值。你可以在文档的其余部分使用其他 JavaScript 函数来计算变量中给出的值。这将允许一种有限的动态定位，同时仍然受益于支配绝对定位文档元素的规则。\n\
    \n## 使用 `onLoad` 和 `onUnload`\n\n加载事件处理程序非常有用。你可以通过许多不同的方式使用它们，所有这些方式都非常实用且易于实现。示例中使用的两个\
    \ JavaScript 函数相当基础，尽管第一个函数 `starttimer()` 使用了四条 DOM 语句和两个 JavaScript 对象激活。\n\n\
    ```javascript\nvar i=10\nfunction starttimer() {\n    document.getElementById('h_one').style.position=\"\
    relative\";\n    document.getElementById('h_one').style.left=+i;\n    document.getElementById('h_two').style.position=\"\
    relative\";\n    document.getElementById('h_two').style.top=+i;\n    i++;\n}\n\
    ```\n\n标题一\n标题二\n\n清单 6-9\n使用 `onLoad` 和 `onUnload` 事件处理程序\n\n我们已声明的 JavaScript\
    \ 函数是相对定位的。文档中这个相对定位部分的值由变量 `i` 给出。请注意，递增操作符（`+`）与变量名一起使用。这将变量内的数值递增一，从而改变所述页面元素的位置。\n\
    \n能够将数据从一个页面携带到下一个页面，而无需先将该数据发送到 Web 服务器进行存储、处理并在下一个页面重新提供，这极其方便。使用 `onUnload`\
    \ 事件处理程序，你可以附加一系列嵌套命令，允许你将用户偏好等数据存储在用户机器上的 Cookie 中，并通过使用 `onLoad` 事件处理程序从该 Cookie\
    \ 加载数据，动态地格式化下一个页面。\n\n## 让文本变大\n\n应用文本格式化程序非常简单。只需使用 DOM 规范中包含的任何 CSS 规则即可。在这种情况下，我们正在改变文本的大小。我们将更进一步，同时引入一个最大的文本尺寸。\n\
    \n```javascript\ntxtsize=0;\nmaxsize=100;\nfunction writemsg() {\n    if (txtsize\
    \ < maxsize) {\n        txtsize=txtsize+2;\n        document.getElementById('mytext').style.fontSize=txtsize;\n\
    \    }\n}\n```\n\n这段文本将会变大\n\n清单 6-10\n更改文本大小属性\n\n`style.fontSize` 属性用于更改文本的大小。有许多样式规则可以以完全相同的方式应用在此处，以更改许多不同的文本格式化选项。但是，你并不局限于每个函数只应用一个文本格式化选项——你也可以应用规则组来构建你想要的外观和感觉。\n\
    \n## 更改“输入”字段的背景颜色\n\n此选项可以轻松地在页面加载时应用，或根据用户选择来应用。我们使用 `style.background` 语句来更改颜色。颜色可以声明为命名颜色、十六进制颜色或\
    \ RGB 颜色。\n\n```javascript\nfunction changeColor(color) {\n    document.getElementById('x').style.background=color;\n\
    }\n```\n\n将鼠标悬停在三个表格单元格上，输入字段将改变其背景颜色\n\n清单 6-11\n更改 INPUT 字段的颜色\n\n请确保在你想要应用更改的输入字段上使用适当的\
    \ `id` 属性。传递给 `changeColor()` 函数的参数以命名颜色的方式静态声明，但也可以通过用变量替换命名颜色，由其他函数来决定。该值的值随后可以由页面内的其他函数决定。\n\
    \n## 更改“输入”字段的文本颜色\n\n更改输入字段内文本的一个简单方法是使用常用的 `style.color` 语句。\n\n它可以根据一个或多个选项进行更改。完全有可能让这些关于更改为什么颜色的决定成为其他\
    \ JavaScript 函数的一部分。\n\n使用的着色方法是命名颜色、十六进制颜色或 RGB 颜色。你可以在脚本逻辑进程中的任何给定点混合使用这三种方式。\n\
    \n```javascript\nfunction changeColor(color) {\n    document.getElementById('x').style.color=color;\n\
    }\n```\n\n将鼠标悬停在三个彩色的表格单元格上。文本将会改变颜色。\n\n清单 6-12\n更改 INPUT 字段的文本颜色\n\n请注意，这种更改文本格式的方法可以应用于文档中的任何位置，使用任何有效的、反映\
    \ CSS 规则的 DOM 对象。\n\n## 更改“输入”字段的背景图片\n\n许多网站都使用这个小而强大的功能块。互联网基于外观和感觉，因此处理大量显示选项显然是非常常见的。最容易理解的就是简单地更改文本输入字段中使用的背景图片。\n"
- fmt: "We use a preloader to fetch the image data that is going to be displayed.\
    \ The `src` attribute of the `document` object is used to tell the browser the\
    \ location of the file. Upon the page loading, the data for the image is fetched\
    \ and stored and is immediately available to the entire page. It should be noted\
    \ that if you wish to switch the displayed image back to the original image, you\
    \ would have to use another `src` attribute statement to fetch the original image\
    \ data and store it. You may then provide to have the image switched back according\
    \ to your requirements.\n\n```\nfunction bgChange(bg) {\n    document.getElementById('x').style.background\
    \ = \"url(\" + bg + \")\";\n}\n\nMouse over these images. The input field will\
    \ get a new background image.\n\nListing 6-13\nWorking with an image as the background\n\
    ```\n\nUse a simple `id` attribute to uniquely identify the page element to apply\
    \ the change to. This `id` is used as the argument of the `getElementById` object.\
    \ We then use a `style.background` attribute to select from the many style sheet\
    \ options available and apply the new value when the `onMouseOver` event is triggered.\
    \ You may use a relative or absolute URL for the location of the image file, and\
    \ the image format can be any that the browser supports, in this case, a `.jpg`.\n\
    \n## Select All of the Check Boxes in a Form\n\nThis is a very useful procedure\
    \ to implement and is fairly simple to understand. In working with forms, you’ll\
    \ no doubt need to include this in at least one page if you have a large amount\
    \ of options to select or if you work with long lists. An example of this functionality\
    \ is the Yahoo Mail option to select all email messages for deletion or moving.\
    \ The `checked=true` value is used to check all of the check boxes within that\
    \ one form. It is important to realize that this will work only if you’re using\
    \ a single form (of any size). If you have more than one form to submit on the\
    \ same page with this functionality, you’ll have to provide an entirely separate\
    \ `checked=true` statement within a different function.\n\n```\nfunction makeCheck(thisForm)\
    \ {\n    for (i = 0; i < thisForm.elements.length; i++) {\n        thisForm.elements[i].checked\
    \ = true;\n    }\n}\n\n<input type=\"checkbox\" name=\"CheckBox1\">CheckBox1\n\
    <input type=\"checkbox\" name=\"CheckBox2\">CheckBox2\n<input type=\"checkbox\"\
    \ name=\"CheckBox3\">CheckBox3\n<input type=\"checkbox\" name=\"CheckBox4\">CheckBox4\n\
    \nListing 6-14\nSelecting all check boxes in an HTML form\n```\n\nYou may use\
    \ a `type=submit` button to check all boxes and submit at the same time if you\
    \ like. This is usually used in the case of having trained employees who are using\
    \ the form over many times on an Intranet or private Internet page. They know\
    \ that the form will be submitted with all boxes being checked. An Internet page\
    \ that the user visits only once shouldn’t have this functionality, as the user\
    \ may not completely understand what just happened simply because they’ve never\
    \ used that particular form before.\n\n## Select the Background Color of a Submit\
    \ Button\n\nInternet pages are a visual medium and being such should look as good\
    \ as possible. The default gray color of a Submit button sometimes just will not\
    \ do, so you’re now able to change this color to any within the normal palette\
    \ of millions of colors. You can specify a permanent color within CSS rules in\
    \ the head of the document or change it dynamically or according to user input.\n\
    \nYou may use any coloring method such as named colors, hex colors, or RGB colors.\
    \ We use the `style.color` attribute to apply the color change and call it with\
    \ an `onMouseOver` event. Notice that the color is given as a static named color.\
    \ You may substitute this static value with a JavaScript variable or array index\
    \ value. In this way, the value (the color) may be decided upon by a different\
    \ JavaScript function and applied exactly as it would be if you’re stating a static\
    \ value.\n\n```\nfunction changeColor(color) {\n    document.getElementById('x').style.background\
    \ = color;\n}\n\nMouse over the three colored table cells. The background color\
    \ will change:\n\nListing 6-15\nChanging the background color of an INPUT element\n\
    ```\n\nUse an `id` attribute within the page element you’re committing the changes\
    \ to. This should be reflected as the argument passed to the `getElementById`\
    \ object. The new color is applied when the `onMouseOver` event is triggered.\n\
    \n## Change the Text Color of a Submit Button\n\nThe coloring of text is extremely\
    \ important, as it is the part of the page that conveys the most information and\
    \ thus effect on your users. We use the `style.color` attribute to assign a new\
    \ color and an `onMouseOver` event to trigger the assignment. The new color value\
    \ is a static named color in this example, but it doesn’t always have to be –\
    \ you can substitute the static value with a variable name and use a different\
    \ function to arrive at the color value your users prefer, for example.\n\nThe\
    \ coloring method may be named colors, hex colors, or RGB colors. You aren’t limited\
    \ to applying only a text color change. You may also apply any formatting options\
    \ available via the DOM reflection of every CSS rule. These rules are part of\
    \ the `style` attribute, and there are many of them. Simply provide another legal\
    \ style directive on another line within the JavaScript function in the head of\
    \ the document.\n\n```\nfunction changeColor(color) {\n    document.getElementById('x').style.color\
    \ = color;\n}\n\nMouse over the three table cells. The text color will change:\n\
    \nListing 6-16\nChanging the text color of an HTML INPUT element\n```\n\nIt should\
    \ be noted that if you would like to change back to the original color, a different\
    \ JavaScript function would have to be created to do this. You would usually trigger\
    \ the change with an `onMouseOut` event handler that calls this new function.\n\
    \n## Insert a Background Image on a Button\n\nProviding a background image as\
    \ that to display as the Submit button is always a good idea. The flat default\
    \ gray-colored button just isn’t very nice to look at. Use any size image for\
    \ your button – the browser will automatically size the button accordingly. Keep\
    \ it to a practical size, of course.\n\nWe use the `style.background` attribute\
    \ to adjust the image to be used. The URL to the file may be given as absolute\
    \ or relative and can be any image format the browser supports. An `onMouseOver`\
    \ event is used to trigger the execution of the JavaScript function given in the\
    \ head of the document.\n\n```\nfunction bgChange(bg) {\n    document.getElementById('x').style.background\
    \ = \"url(\" + bg + \")\";\n}\n\nMouse over these images. The button will get\
    \ a new background image.\n\nListing 6-17\nChanging the background image of an\
    \ HTML INPUT element\n```\n\nAdding a bit of customization can be fun. One idea\
    \ for this is to change the image as the button is clicked. You would need to\
    \ create a different JavaScript function within the head of the document with\
    \ the exact same directions; just change the file name. Use an `onMouseDown` event\
    \ to change to the down image you’d like to use and an `onMouseUp` event to change\
    \ the image back as the up image.\n\n## Change the Background Color of a Drop-Down\
    \ List\n\nA drop-down list is usually colored with a simple white background.\
    \ You can change this using the `style.background` attribute to any color within\
    \ the normal range available (millions of colors). The color value may be stated\
    \ as a named color, hex color, or RGB color.\n\nWe use the `style.background`\
    \ attribute in a JavaScript function within the head of the document. This function\
    \ is triggered with an `onMouseOver` event, and the new color is applied.\n\n\
    ```\nfunction changeColor(color) {\n    formname.elements[0].style.background\
    \ = color;\n}\n\nMouse over the three table cells. The option list will change\
    \ color:\n\nMouse over the colored table cells\nMouse over the colored table cells\n\
    Mouse over the colored table cells\nMouse over the colored table cells\n\nListing\
    \ 6-18\nWorking with lists\n```"
