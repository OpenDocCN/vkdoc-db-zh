  trans: "\n我们使用预加载器来获取即将显示的图像数据。`document` 对象的 `src` 属性用于告知浏览器文件的位置。页面加载时，图像的数据会被获取并存储，整个页面即可立即使用。需要注意的是，如果您希望将显示的图像切换回原始图像，必须使用另一个\
    \ `src` 属性语句来获取原始图像数据并存储。然后，您可以根据需要让图像切换回去。\n\n```\nfunction bgChange(bg) {\n\
    \    document.getElementById('x').style.background = \"url(\" + bg + \")\";\n\
    }\n\n将鼠标悬停在这些图像上。输入框将获得新的背景图像。\n\n代码清单 6-13\n将图像用作背景\n```\n\n使用一个简单的 `id` 属性来唯一标识要应用更改的页面元素。此\
    \ `id` 用作 `getElementById` 对象的参数。然后，我们使用 `style.background` 属性从众多可用的样式表选项中进行选择，并在触发\
    \ `onMouseOver` 事件时应用新值。您可以为图像文件位置使用相对或绝对 URL，图像格式可以是浏览器支持的任何格式，在本例中为 `.jpg`。\n\
    \n## 选择表单中的所有复选框\n\n这是一个非常有用且易于理解的实现过程。在处理表单时，如果您有大量选项需要选择或处理长列表，您无疑至少需要在一个页面中包含此功能。此功能的一个例子是雅虎邮件中选择所有电子邮件进行删除或移动的选项。`checked=true`\
    \ 值用于勾选该单个表单内的所有复选框。重要的是要意识到，这仅在您使用单个表单（无论大小）时才有效。如果同一页面上有多个表单需要提交此功能，您必须在另一个不同的函数中提供完全独立的\
    \ `checked=true` 语句。\n\n```\nfunction makeCheck(thisForm) {\n    for (i = 0; i\
    \ < thisForm.elements.length; i++) {\n        thisForm.elements[i].checked = true;\n\
    \    }\n}\n\n<input type=\"checkbox\" name=\"CheckBox1\">CheckBox1\n<input type=\"\
    checkbox\" name=\"CheckBox2\">CheckBox2\n<input type=\"checkbox\" name=\"CheckBox3\"\
    >CheckBox3\n<input type=\"checkbox\" name=\"CheckBox4\">CheckBox4\n\n代码清单 6-14\n\
    选择 HTML 表单中的所有复选框\n```\n\n如果您愿意，可以使用一个 `type=submit` 按钮同时勾选所有复选框并提交。这通常用于训练有素的员工在内联网或私人互联网页面上多次使用表单的情况。他们知道表单将在所有复选框被勾选的情况下提交。对于用户仅访问一次的互联网页面，不应具备此功能，因为用户可能由于从未使用过该特定表单而无法完全理解刚刚发生的事情。\n\
    \n## 选择提交按钮的背景颜色\n\n互联网页面是一种视觉媒介，因此应尽可能美观。提交按钮的默认灰色有时并不理想，因此您现在可以将其更改为正常调色板中数百万种颜色中的任何一种。您可以在文档头部的\
    \ CSS 规则中指定永久颜色，或者动态地或根据用户输入更改它。\n\n您可以使用任何着色方法，如命名颜色、十六进制颜色或 RGB 颜色。我们使用 `style.color`\
    \ 属性应用颜色更改，并通过 `onMouseOver` 事件调用它。请注意，颜色被指定为静态命名颜色。您可以使用 JavaScript 变量或数组索引值替代此静态值。这样，值（颜色）可以由不同的\
    \ JavaScript 函数决定，并像您声明静态值一样准确应用。\n\n```\nfunction changeColor(color) {\n    document.getElementById('x').style.background\
    \ = color;\n}\n\n将鼠标悬停在三个彩色表格单元格上。背景颜色将改变：\n\n代码清单 6-15\n更改 INPUT 元素的背景颜色\n```\n\
    \n在要进行更改的页面元素内使用 `id` 属性。这应反映为传递给 `getElementById` 对象的参数。当触发 `onMouseOver` 事件时，将应用新颜色。\n\
    \n## 更改提交按钮的文本颜色\n\n文本着色极其重要，因为它是页面中传达最多信息并对用户产生最大影响的部分。我们使用 `style.color` 属性分配新颜色，并使用\
    \ `onMouseOver` 事件触发分配。在本例中，新颜色值是静态命名颜色，但它并不总是必须如此——您可以使用变量名替代静态值，并使用不同的函数来获取用户偏好的颜色值。\n\
    \n着色方法可以是命名颜色、十六进制颜色或 RGB 颜色。您不仅限于仅应用文本颜色更改。您还可以通过每个 CSS 规则的 DOM 反射应用任何可用的格式选项。这些规则是\
    \ `style` 属性的一部分，并且有很多。只需在文档头部的 JavaScript 函数内另一行提供另一个合法的样式指令即可。\n\n```\nfunction\
    \ changeColor(color) {\n    document.getElementById('x').style.color = color;\n\
    }\n\n将鼠标悬停在三个表格单元格上。文本颜色将改变：\n\n代码清单 6-16\n更改 HTML INPUT 元素的文本颜色\n```\n\n需要注意的是，如果您想切换回原始颜色，必须创建另一个不同的\
    \ JavaScript 函数来实现。您通常会使用 `onMouseOut` 事件处理程序来触发此更改，该处理程序调用这个新函数。\n\n## 在按钮上插入背景图像\n\
    \n为提交按钮提供背景图像是一个好主意。默认的平坦灰色按钮看起来不太美观。为您的按钮使用任何尺寸的图像——浏览器会自动相应调整按钮大小。当然，保持其实用尺寸。\n\
    \n我们使用 `style.background` 属性来调整要使用的图像。文件的 URL 可以是绝对路径或相对路径，并且可以是浏览器支持的任何图像格式。`onMouseOver`\
    \ 事件用于触发文档头部给出的 JavaScript 函数的执行。\n\n```\nfunction bgChange(bg) {\n    document.getElementById('x').style.background\
    \ = \"url(\" + bg + \")\";\n}\n\n将鼠标悬停在这些图像上。按钮将获得新的背景图像。\n\n代码清单 6-17\n更改 HTML\
    \ INPUT 元素的背景图像\n```\n\n添加一些定制会很有趣。一个想法是在按钮被点击时更改图像。您需要在文档头部创建一个具有完全相同指令的不同 JavaScript\
    \ 函数；只需更改文件名。使用 `onMouseDown` 事件切换到您想要使用的按下状态图像，并使用 `onMouseUp` 事件将图像切回抬起状态图像。\n\
    \n## 更改下拉列表的背景颜色\n\n下拉列表通常使用简单的白色背景着色。您可以使用 `style.background` 属性将其更改为正常可用范围内的任何颜色（数百万种颜色）。颜色值可以声明为命名颜色、十六进制颜色或\
    \ RGB 颜色。\n\n我们在文档头部的 JavaScript 函数中使用 `style.background` 属性。此函数由 `onMouseOver`\
    \ 事件触发，并应用新颜色。\n\n```\nfunction changeColor(color) {\n    formname.elements[0].style.background\
    \ = color;\n}\n\n将鼠标悬停在三个表格单元格上。选项列表将改变颜色：\n\n将鼠标悬停在彩色表格单元格上\n将鼠标悬停在彩色表格单元格上\n\
    将鼠标悬停在彩色表格单元格上\n将鼠标悬停在彩色表格单元格上\n\n代码清单 6-18\n使用列表\n"
- fmt: "# Changing Page Element Styles Dynamically with JavaScript\n\n## Change the\
    \ Text Color of a Drop-Down List\n\nNotice that we stated the color to be used\
    \ as a named color. This appears as the argument that is passed to the `changeColor()`\
    \ function created in the head of the document. In this example, we used the form\
    \ with the `elements[0]` collection to state which page element is to be used.\
    \ You may use a `document.getElementById(formname)` statement if you’re more comfortable\
    \ with that.\n\nSometimes, the default text color – black – just doesn’t work\
    \ with your page. You can easily change this color upon page loading or dynamically\
    \ according to user preferences. We use a `style.color` statement to access and\
    \ apply the new color to the page element that is specified with the `name=` attribute.\n\
    \nWe use an `onMouseOver` event to trigger the JavaScript function that is given\
    \ in the head of the document. The actual color value stated is a named color\
    \ and is given as the argument passed to the JavaScript function that was created,\
    \ in this case, `changeColor()`. The coloring method used may be named colors,\
    \ hex colors, or RGB colors.\n\n```javascript\nfunction changeColor(color) {\n\
    \  thisform.elements[0].style.color=color;\n}\n```\n\nMouse over the three table\
    \ cells. The option list text will change color:\n\n*Mouse over the colored table\
    \ cells*\n*Mouse over the colored table cells*\n*Mouse over the colored table\
    \ cells*\n*Mouse over the colored table cells*\n\n**Listing 6-19**\nChanging the\
    \ text color of an HTML `INPUT` element\n\nNotice that I didn’t give `name=` or\
    \ `value=` values in the option elements in the example. This is because the server-side\
    \ script doesn’t need them if your form `name=` attribute is stated. All of the\
    \ option elements will be treated as part of the form being submitted. It should\
    \ be noted, though, that you would have to state `name=` and `value=` attributes\
    \ if you’re using more than one form within a single page. This is a browser requirement,\
    \ not a server-side scripting issue.\n\n## Change the Background Color of a Textarea\
    \ Element\n\nTextarea spaces are usually fairly large, so they affect the appearance\
    \ of your page in a big way. Coloring them can be a great way to add a unique\
    \ impression upon your visitors. We use the `style.background` attribute to alter\
    \ this. You may have the color change as the default color that is applied as\
    \ the page loads or at any time according to user action.\n\nWe use an `onMouseOver`\
    \ event to trigger the JavaScript function that is given in the head of the document.\
    \ The coloring method may be stated as a named color, hex color, or RGB color.\n\
    \n```javascript\nfunction newColor(color) {\n  document.getElementById('x').style.background=color;\n\
    }\n```\n\nMouse over the three table cells. The textarea background will change\
    \ color:\n\n**Listing 6-20**\nChanging the background color of an HTML `TEXTAREA`\
    \ element\n\nThe new background color is stated as the argument passed to the\
    \ `newColor()` function given in the JavaScript function stated in the head of\
    \ the document. You may use a variable or array item as the value. In this way,\
    \ the color to be applied can be decided by scripted action, such as per-user\
    \ preference selection.\n\n## Insert a Background Image into a Textarea Element\n\
    \nInserting a background image into your `TEXTAREA` is an effective way to brand\
    \ your site with a unique look and feel. Use any image format supported by the\
    \ browser. The `style.background=url` attribute is used to give the location of\
    \ the file and may be an absolute or relative URL.\n\nThe `style.background` attribute\
    \ acts like the `background=url` attribute you might use with the `BODY` element.\
    \ The image is displayed at its actual size, and any overlapping areas aren’t\
    \ shown if the textarea is smaller than the image. If the textarea element is\
    \ larger than the image, it will be repeated (tiled).\n\n```javascript\nfunction\
    \ bgChange(bg) {\n  document.getElementById('x').style.background=\"url(\" + bg\
    \ + \")\";\n}\n```\n\nMouse over the images. The textarea will get a background\
    \ image.\n\n**Listing 6-21**\nInserting an image into an HTML `TEXTAREA` element\n\
    \nI’ve seen a few sites that use the background image as an informative indicator\
    \ to the user. It is entirely possible to count the number of characters being\
    \ typed in the `TEXTAREA` and change the image that is displayed according to\
    \ these counted values. A progress bar can be displayed as the background image\
    \ as the user types, giving them the idea of how much more characters they have\
    \ to add if you’ve specified a minimum or the amount of characters they have left\
    \ if you’ve specified a maximum.\n\n## Preload and Store an Image\n\nImage preloading\
    \ is an essential skill that you’ll use repeatedly. Consider this: you have loaded\
    \ your page and have a menu system that uses images that change as the mouse floats\
    \ over them. Once the page is loaded, the user does so, but there is a lag between\
    \ the mouse passing over that area and the new image being displayed. This is\
    \ because the browser has to fetch the new image and display it. This lag can\
    \ be eliminated if you preload the image into a variable as the page loads and\
    \ trigger its display as the mouse floats over it. The process is essentially\
    \ immediate and is a great effect.\n\n```javascript\nimg2=new Image();\nimg2.src=\"\
    image1.gif\";\nfunction changeImage() {\n  document.getElementById('myImage').src=img2.src;\n\
    }\n```\n\nWhen you mouse over the image, a new image will appear.\n\n**Listing\
    \ 6-22**\nPreload and store images\n\nWe use an `onMouseOver` event to trigger\
    \ the JavaScript function that is stated in the head of the document. The original\
    \ image is displayed until the mouse floats over it. The new image is then displayed.\
    \ Note that if you’d like to change back to the original image, you’d have to\
    \ provide a different function name with the original file name and trigger it\
    \ with an `onMouseOut` event.\n\n## Changing the Size of an Image\n\nIt is entirely\
    \ possible to change the size of an image. You may apply the changes to the same\
    \ image or download a new image and display that, resized. We use the `getElementById()`\
    \ method to access the data associated with that image, in this case, the image\
    \ dimensions. The browser can be made to display an image in dimensions that aren’t\
    \ the actual size of the image. Because of this, it is possible to change the\
    \ image dimensions dynamically.\n\n```javascript\nfunction moveover() {\n  document.getElementById('image').width=\"\
    200\";\n  document.getElementById('image').height=\"360\";\n}\nfunction moveback()\
    \ {\n  document.getElementById('image').width=\"100\";\n  document.getElementById('image').height=\"\
    180\";\n}\n```\n\nMouse over the image:\n\n**Listing 6-23**\nChanging the size\
    \ of an image\n\nA few things have to be considered if you’re going to resize\
    \ images. The first is simple page layout. If you use a table that contains the\
    \ image to be resized, you’d alter the entire table upon the resize. Most of the\
    \ time, this isn’t what you want, so it is sometimes prudent to account for the\
    \ new image dimensions. Within the `TD` element of the table, state the size of\
    \ the `TD` area as the size of the largest image dimension. This way, the table\
    \ isn’t altered with an oversized image and the page looks as you intended.\n\n\
    ## Changing the Source of an Image\n\nYou might have to alter the location of\
    \ the image being displayed in that space on the page you’re working with. You\
    \ would do this with an `src` attribute declaration. The page element is accessed\
    \ with the `getElementById()` method, and the image is changed. The image may\
    \ be a different image or a duplicate image that is simply located elsewhere.\n\
    \n```javascript\nfunction moveover() {\n  document.getElementById('image').src=\"\
    imageon.gif\";\n}\nfunction moveback() {\n  document.getElementById('image').src=\"\
    imageoff.gif\";\n}\n```\n\n**Listing 6-24**\nChanging the source image to be used"
  raw: 'Notice that we stated the color to be used as a named color. This

    appears as the argument that is passed to the changeColor() function

    created in the head of the document. In this example, we used the form

    name with the elements[0] collection to state which page element is to

    be used. You may use a document.getElementById(formname) statement if

    you’re more comfortable with that.


    Change the Text Color of a Drop-Down List

    Sometimes, the default text color – black – just

    doesn’t work with your page. You can easily change this color upon page

    loading or dynamically according to user preferences. We use a

    style.color statement to access and apply the new color to the page

    element that is specified with the name= attribute.


    We use an onMouseOver event to trigger the JavaScript function that is

    given in the head of the document. The actual color value stated is a

    named color and is given as the argument passed to the JavaScript

    function that was created, in this case, changeColor(). The coloring

    method used may be named colors, hex colors, or RGB colors.


    ```


    function changeColor(color) {

    thisform.elements[0].style.color=color;

    }


    Mouse over the three table cells. The option list text will change color:


    Mouse over the colored table cells

    Mouse over the colored table cells

    Mouse over the colored table cells

    Mouse over the colored table cells


    Listing 6-19

    Changing the text color of an HTML INPUT element

    ```


    Notice that I didn’t give name= or value= values in the option

    elements in the example. This is because the server-side script doesn’t

    need them if your form name= attribute is stated. All of the option

    elements will be treated as part of the form being submitted. It should

    be noted, though, that you would have to state name= and value=

    attributes if you’re using more than one form within a single page. This

    is a browser requirement, not a server-side scripting issue.


    Change the Background Color of a Textarea

    Element

    Textarea spaces are usually fairly

    large, so they affect the appearance of your page in a big way. Coloring

    them can be a great way to add a unique impression upon your visitors.

    We use the style.background attribute to alter this.

    You may have the color change as the default color that is applied as

    the page loads or at any time according to user action.


    We use an onMouseOver event to trigger the JavaScript function that is

    given in the head of the document. The coloring method may be stated as

    a named color, hex color, or RGB color.


    ```


    function newColor(color) {

    document.getElementById(''x'').style.background=color;

    }


    Mouse over the three table cells. The textarea background will change color:


    Listing 6-20

    Changing the background color of an HTML TEXTAREA element

    ```


    The new background color is stated as the argument passed to the

    newColor()

    function given in the JavaScript function stated in the head of

    the document. You may use a variable or array item as the value. In this

    way, the color to be applied can be decided by scripted action, such as

    per-user preference selection.


    Insert a Background Image into a Textarea

    Element

    Inserting a background image into your

    TEXTAREA is an

    effective way to brand your site with a unique look and feel. Use any

    image format supported by the browser. The style.background=url

    attribute is used to give the location of the file and may be an

    absolute or relative URL.


    The style.background attribute acts like the

    background=url attribute you might use with the BODY element. The image

    is displayed at its actual size, and any overlapping areas aren’t shown

    if the textarea is smaller than the image. If the textarea element is

    larger than the image, it will be repeated (tiled).


    ```


    function bgChange(bg) {

    document.getElementById(''x'').style.background="url(" + bg + ")";

    }


    Mouse over the images. The textarea will get a background image.


    Listing 6-21

    Inserting an image into an HTML TEXTAREA element

    ```


    I’ve seen a few sites that use the background image as an informative

    indicator to the user. It is entirely possible to count the number of

    characters being typed in the TEXTAREA and change the image that is

    displayed according to these counted values. A progress bar can be

    displayed as the background image as the user types, giving them the

    idea of how much more characters they have to add if you’ve specified a

    minimum or the amount of characters they have left if you’ve specified a

    maximum.


    Preload and Store an Image


    Image preloading is an essential skill

    that you’ll use repeatedly. Consider this: you have loaded your page and

    have a menu system that uses images that change as the mouse floats over

    them. Once the page is loaded, the user does so, but there is a lag

    between the mouse passing over that area and the new image being

    displayed. This is because the browser has to fetch the new image and

    display it. This lag can be eliminated if you preload the image into a

    variable as the page loads and trigger its display as the mouse floats

    over it. The process is essentially immediate and is a great effect.


    ```


    img2=new Image();

    img2.src="image1.gif";

    function changeImage() {

    document.getElementById(''myImage'').src=img2.src;

    }


    When you mouse over the image, a new image will appear.


    Listing 6-22

    Preload and store images

    ```


    We use an onMouseOver event to trigger the JavaScript function that

    is stated in the head of the document. The original image is displayed

    until the mouse floats over it. The new image is then displayed. Note

    that if you’d like to change back to the original image, you’d have to

    provide a different function name with the original file name and

    trigger it with an onMouseOut event.


    Changing the Size of an Image


    It is entirely possible to change the size of an image. You may apply the

    changes to the same image or download a new image and display that,

    resized. We use the getElementById() method

    to access the data associated with that image, in this case, the image

    dimensions. The browser can be made to display an image in dimensions

    that aren’t the actual size of the image. Because of this, it is

    possible to change the image dimensions dynamically.


    ```


    function moveover() {

    document.getElementById(''image'').width="200";

    document.getElementById(''image'').height="360";

    }

    function moveback() {

    document.getElementById(''image'').width="100";

    document.getElementById(''image'').height="180";

    }


    Mouse over the image:


    Listing 6-23

    Changing the size of an image

    ```


    A few things have to be considered if you’re going to resize images.

    The first is simple page layout. If you use a table that contains the

    image to be resized, you’d alter the entire table upon the resize. Most

    of the time, this isn’t what you want, so it is sometimes prudent to

    account for the new image dimensions. Within the TD element of the

    table, state the size of the TD area as the size of the largest image

    dimension. This way, the table isn’t altered with an oversized image and

    the page looks as you intended.


    Changing the Source of an Image


    You might have to alter the location of the image being displayed in

    that space on the page you’re working with. You would do this with an

    src attribute declaration. The page element is accessed with the getElementById()
    method,

    and the image is changed. The image may be a different image or a

    duplicate image

    that is simply located elsewhere.


    ```


    function moveover() {

    document.getElementById(''image'').src="imageon.gif";

    }

    function moveback() {

    document.getElementById(''image'').src="imageoff.gif";

    }


    Listing 6-24

    Changing the source image to be used

