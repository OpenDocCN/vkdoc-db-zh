    \ `$count`。这是因为 Perl 中所有的数组都是基于零的。它们按照从零开始的数字系统进行索引。在 Perl 中，零是一个完整的数字（一个整数）。\n\
    \n对于循环的每次迭代，都会引用多个数组。这会导致可能大量的数据被插入到数据库中。请确保将自己限制在 300 或 400 次迭代以内，尽管如果每次插入的数据量相当小并且你的服务器资源充足，可以使用更多次迭代。你可以根据需要插入任意多的行和列——这种结构具有无限的可扩展性。如果需要，请使用\
    \ `LIMIT` 声明来限制要创建的数据库行数。\n\n你可以使用 `foreach` 循环或 `while` 循环来实现相同的结果。当你有特定数量的行要插入时，使用\
    \ `while` 循环。也就是说，如果你事先知道要插入多少行，那么使用 `while`。如果你要插入的数据库行数量不固定，请使用 `foreach` 循环来遍历你收集到的数组。\n\
    \n### 使用 foreach 循环从多个数组插入多个条目\n\n在清单 2-9 给出的示例任务中，你可以看到，对于 `@col1` 的每个元素，由于 `$count`\
    \ 的迭代，我们循环遍历了三个数组（`@col1`、`@col2` 和 `@col3`）的索引项。该示例假定你为每个表列准备了三个长度相等的数组。行被一次插入一行，并精确地反映了数组数据。\n\
    \n```perl\n$count = \"0\";\nforeach (@col1) {\n    $query = qq{INSERT INTO this_table\
    \ (\n                    col1,\n                    col2,\n                  \
    \  col3\n                ) VALUES (\n                    '$col1[$count]',\n  \
    \                  '$col2[$count]',\n                    '$col3[$count]'\n   \
    \             )\"};\n    $sth = $dbh->prepare($query);\n    $sth->execute();\n\
    \    ++$count;\n};\n# Listing 2-9\n# 使用 foreach 循环执行插入操作\n```\n"
- fmt: '# 3. Essential MySQL Skills


    ## Summary

    In this chapter, we covered the various ways that Perl and the DBI module work
    together to do some very powerful operations. We explored database structures
    and the means to select or insert the data in question.


    Before we start delving into the scripts that make up the project for this book,
    we should first cover a few bases. In this chapter, we’ll review the skills necessary
    in order to make sense of what is to come. You may already be familiar with these
    concepts, but it is always a good idea to review a skill before having to apply
    it to a live, functioning script.


    In this chapter, we’ll work through the functions that will be used in the project.
    We’ll cover only those functions that will be used in the project – we won’t cover
    all of the abilities that the DBI module offers, for example.


    ## MySQL Column and Index Types

    Within MySQL are many different types of data that you can tailor your database
    tables to accept. Everything from common text characters to binary information
    may be provided for. Any valid data type can be used. A valid type is number or
    string, for example.


    Column types are declared upon creation of a table. There are many different types,
    and we’ll cover them all in the sections to come. While we won’t be using every
    column type in the projects, it is of paramount importance that you know and understand
    the full breadth of what is available. This knowledge will come in handy if you
    plan on expanding one of the projects, a full featured bulletin board.


    ### Integer Column Types

    We’ll start with the integer column types. The integer column types are a numeric
    type of column and are used to store numbers only – if you try to insert text,
    MySQL will throw an error.


    There is a very wide range of integer types – the full range of signed numbers
    available is huge. By signed, I mean the negative numbers are represented. Note
    that the positive number is one less than the negatively signed number. This is
    because the number zero is still considered an integer. Zero is a value – it is
    not to be confused with the null value, which is considered to be an absence of
    value.


    ### Floating-Point Column Types

    A floating-point column type is simply a column type that includes a decimal point.
    The decimal point may “float” from one position to another, hence the floating
    point name.


    Floating-point numbers are usually used when the range of numbers from an integer
    column type isn’t high or low enough for the task at hand. It should be noted
    that floating-point numbers are approximate values – MySQL will round the floating-point
    number to the number of decimal places you define when the table is created.


    ### Character String Column Types

    Character strings are either `CHAR` or `VARCHAR`. `CHAR` stands for “Characters,”
    and `VARCHAR` stands for “Varying Characters.” A fixed length for the column is
    set during table creation. If the data is not as long as the length of the declared
    `CHAR` or `VARCHAR`, the space remaining is padded with spaces. It should be noted
    that if the value you’ve inserted has trailing spaces by design, the spaces will
    be removed. You’ll have to provide for this within the Perl script in order to
    add the trailing spaces.


    If you need a binary columned case-sensitive `CHAR` or `VARCHAR` column, set this
    with the `BINARY` flag. If the `BINARY` flag is present, the column is case sensitive
    when used for sorting or comparison. Otherwise, strings are case insensitive.


    ### BLOB Column Types

    `BLOB` column types are of varying width. `BLOB` stands for Binary Large Object.
    They are able to store very large data sets and don’t trim trailing spaces. A
    `BLOB` column is case sensitive. Values that exceed the maximum length are simply
    truncated. `BLOB`s cannot have default values.


    ### Enumeration or Set Column Types

    Enumerations and sets are string columns that have a small set of possible values.
    If no value is declared upon table creation, an empty string will be inserted.
    The `ENUM` column type has a maximum value of 64 KB (65535 bytes), and the `SET`
    column type has a maximum value of 64 bytes.


    To insert a value in an `ENUM` column, use a string literal. That is, encase the
    string within quotes. To insert multiple values in a `SET` column, separate the
    values within the opening and closing quotes with commas.


    ### Time Column Types

    MySQL provides a wide array of date and time stamps. The time is taken from the
    operating system of the server the MySQL database resides upon.


    MySQL is able to use time and date stamps in an `ORDER BY` clause, so you’re able
    to sort your data by both date and time. This great feature comes in handy if
    you’re looking to order the contents of a table by date or time or both.


    All time and date values are integers. If, for some reason, you should have a
    floating-point number as part of a date, MySQL will round to the nearest value
    of the following: month values are limited to 1 to 12. Day values are limited
    to 1 to 31. Hour values are from 0 to 23, while minutes and seconds range in value
    from 0 to 59.


    ## Perl and MySQL Functions Review

    Reviewing a skill, no matter its depth, is always a good thing as you will always
    come away with a new vantage point. In this section, we’ll be reviewing the specific
    skills that will be used in the project which we’ll begin working on in the coming
    chapters.


    There is always more than one way to do something with Perl, syntactically speaking.
    Because of this, I’ll try to present each topic in this section in more than one
    way.


    We declare the `$count` and set it to zero. The `foreach` loop was then declared,
    and we used `@col1` as the argument. We can use `@col1` as the argument because
    every array is of the same length – no data will be left out of the insertion.
    We declared the query and stored it in `$query`. We then prepared the query using
    `prepare()`. We executed the query using `execute()` and incremented the `$count`
    for the next iteration of the loop, starting the process over and inserting more
    data.


    Note that I’ve used a more vertical approach to ordering my query, putting each
    element of the query on its own line. With Perl, you can break up the more complicated
    code into more readable forms. This is mine. You’ll find yours. Note also that
    in order for this approach to be possible, you wouldn’t use double quotes to define
    your query – double quotes only work when the entire query is on one line. Nest
    your query within the Perl `qq{}` statements to allow your query to span more
    than one line.


    You can see how powerful and intuitive are the workings of the Perl `DBI` module.
    With it, you are able to store and retrieve any data from the database. While
    we used very simple examples as learning tools, there is essentially no limit
    on how complicated and capable your future `DBI` machinations can be. The limit
    is your skill and imagination – Perl and MySQL are up to the task.


    ### Creating Tables

    Creating a table is a straightforward affair, but there are a few things that
    you need to know first. We’ll use the three-step method to create our tables.
    We visited this three-step method in Chapter 2.


    When creating a table, you will first need to know the column types that you’ll
    be using. You will also need to know the names of the columns. Column names are
    case sensitive, remember, so name your columns accordingly.


    In the project to come, the primary key is the first column, named “id”. It is
    an autoincrement column, as you can see in the example of a table creation given
    in Listing 3-1.'
