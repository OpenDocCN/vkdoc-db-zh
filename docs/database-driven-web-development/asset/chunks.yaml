    应用服务器配置偏好设置


    点击此对话框中的 `Execute` 开始应用配置。注意有一个 `Log` 选项卡可以点击。如果你遇到错误，这个日志将报告正在执行的所有操作。在安装的这个阶段，致命错误通常只来自磁盘空间不足或处理器利用错误和兼容性问题。


    这个过程需要几分钟。你会注意到指针随着配置的进行变成沙漏和工作环。如果你启用了防火墙，系统可能会要求你允许 MySQL 服务器进行身份验证，或者完全绕过防火墙的身份验证。我的建议是让防火墙忽略
    MySQL 查询，允许它们通过防火墙的影响范围。


    这种绕过是为了让你能够练习使用专用的 MySQL 服务器，也许是在多服务器设置中。正如你将在后续章节中看到的，MySQL 与 Perl 和 Apache Web
    服务器配合得很好。一个常见的多服务器设置是使用三个独立的物理服务器：一个用于数据库服务器，一个用于 Perl 脚本服务器，一个用作文件服务器。


    ## 启动 MySQL 服务器


    通过命令行启动 MySQL 服务器是一个简单的任务。开始启动只需要这个简短的命令： `mysql -u root -p` 。下面的用户是 `root` 服务器。按
    Enter 键后，系统会要求你输入用户名和密码。请从你已经积累并希望已经记住的用户名和密码页面提供它们。


    ```bash

    mysql -u root -p

    ```


    ## 总结


    在本章中，我们讨论了 MySQL 数据库服务器的安装和配置。你学习了如何将你的工作站变成一个强大的数据库服务器。在接下来的章节中，本章提供的知识将是无价的。请继续阅读；在我们完成之前还有很长的路要走。


    ## 9. 安装和使用 Apache Web 服务器


    Apache Web 服务器的核心功能是提供网页服务。它是一个高度专业化且强大的软件应用程序，每天用于服务数十亿网页。Apache Web 服务器是当今互联网上使用最多的
    Web 服务器。


    Apache 最基本的功能是提供静态的、不变的 HTML 文档。这具有易于实现的优点——HTML 是一种简单的语言。如果你的网站正如你所设想的那样是一个简单的事务，那么请务必探索这一点。如果你想要由强大的数据库驱动的动态生成的网页，那么请继续阅读。Apache
    可以与 Perl 一起使用，根据 Perl 脚本中给出的规则生成网页。这比静态 HTML 方法更复杂，但额外的思考、规划和时间是非常值得的。你努力工作的回报将是一些非常强大且功能齐全的网站，它们会吸引用户的注意力并保持住。


    Apache 可以与多种编程语言一起工作，无论是脚本语言还是编译语言。Apache 通过使用这些不同的编程语言提供了广泛的数据处理能力。它是一个多功能且制作精良的产品。


    ## 处理错误


    Apache 几乎为所有东西都提供了一个错误页面。正如你将在后续章节中看到的，当出现问题时（通常是在通过 `httpd.conf` 文件配置 Apache
    时），这些错误页面是不可或缺的。这个配置文件将在后续页面中完整解释。


    在开始安装之前，建议你“ping 堆栈”，这是操作系统准备好执行你可能要安装的任何功能的技术术语。


    如果控制 Windows 工作站上通信的软件和/或硬件失败，你要做的第一件事就是 ping 环回地址，如图 9-1 所示。


    ![](img/485616_2_En_9_Fig1_HTML.jpg)


    一个标题为 C:\windows\system32\CMD.EXE 的输出窗口截图。它描绘了工作站失败时 ping 环回地址的情况。页面显示 C:\Users\Thomas>
    ping 127.0.0.1。Ping 从 127.0.0.1 开始，数据为 32 字节。


    图 9-1

    Ping 本地环回地址


    如你所见，向 `127.0.0.1` 发送了四个 ping 以确保操作系统正常运行。如果操作系统状态不佳，你会收到一条错误消息，指出找不到该 `IP` 地址。


    ## 下载和安装 Apache Web 服务器二进制文件


    学习 Apache Web 服务器的第一步是简单地找到软件。一个简单的 Google 搜索会告诉你在哪里可以找到 Apache。Apache 已经存在了几十年。制作它的人过去和现在都做得非常好，而且找到
    Apache 二进制文件相当容易。这个 Web 服务器是在考虑 Linux 操作系统的情况下开发的。它被移植到一个 Windows 操作系统可以处理的可执行包中。


    二进制文件以 `.msi` 包的形式提供，这是在 Windows 上安装几乎所有软件包的标准方法。安装相当基础。在配置服务器并使其在 Windows 工作站上加载时，学习曲线会变得陡峭。


    ## 允许对操作系统进行更改


    Windows 操作系统首先会询问你是否允许对你的计算机进行更改。如果你拒绝此提示，安装将停止。安装在 Windows 计算机上的每个程序都将以此方式启动。启动画面出现，如图
    9-2 所示。单击“下一步”继续。


    ![](img/485616_2_En_9_Fig2_HTML.jpg)


    一个标题为 Apache HTTP Server 2.2 Installation Wizard 的窗口截图。模板页面显示“欢迎使用 Apache HTTP
    Server 2.2.21 安装向导”。它包含一个警告提示。'
- fmt: '# Figure 9-2


    The splash screen of the Apache binary installation.


    As with all software installations, a title page is displayed, showing important
    data like version and copyright statements. Next comes the license agreement and
    legal stuff. You must review the information on this page to make sure you don’t
    break your contract. It’s pretty basic stuff.


    The license agreement isn’t all that lengthy or complicated. Most of it is basic
    rules and general use statements. Basically, you may use it as long as you don’t
    alter the source code and expect it to work.


    Another big statement in the agreement is that you will not sell the Apache server
    as your own product, even after altering the bulk of its source code.


    Do have a read of the agreement. It only takes a few minutes but answers many
    questions about how you may and may not use this software.


    Click the accept option as shown in Figure [9-3](#485616_2_En_9_Chapter.xhtml#Fig3)
    and click Next.


    ![](images/485616_2_En_9_Chapter/485616_2_En_9_Fig3_HTML.jpg)


    A screenshot of a window titled Apache HTTP server 2.2 installation wizard. The
    page displays the license agreement with the terms and conditions below. To move
    on to the next page, the accept option is selected.


    ## Figure 9-3


    Accepting the license agreement.


    The agreement used in freeware software usually started as the GNU Public License,
    which was the standard agreement used with freeware like Apache in its early days.


    After the license agreement comes a window that you enter the local loopback address,
    `127.0.0.1`, in two places, as shown in Figure [9-4](#485616_2_En_9_Chapter.xhtml#Fig4).
    The page asks for a network domain Internet address, server name, administrator’s
    email, and whether or not to install as a service or manually in console.


    ![](images/485616_2_En_9_Chapter/485616_2_En_9_Fig4_HTML.jpg)


    A screenshot of a window titled Apache HTTP server 2.2 installation wizard. The
    page displays the server information. It includes the network domain, server name,
    and administrator''s email address.


    ## Figure 9-4


    Filling out installation options.


    Here’s where we have to explain things. A program – in this case, a server – can
    be run as a service of the operating system or as a program in console. A program
    run in console is run from the command line and displays its operating parameters
    in a black screen with white text.


    The decision of which to use usually stems from what use you’re going to be using
    the installation for. If Apache is installed on a server that will be running
    as a live web server serving pages over the Internet, install as a service. If
    it will be a web development workstation, select manual start, which will be in
    a command prompt. Starting in console still allows for the high functionality
    but won’t be running constantly, such as when you aren’t programming web pages.


    You might be wondering why I use the local loopback address in both the Network
    Domain and Server Name fields. In order to serve a domain name, you would have
    to install and use a `DNS` (Domain Name Server). `DNS` servers match the `IP`
    address computers understand into a form that humans can understand, a domain
    name. While you can easily find a website with an `IP` address, for most people,
    remembering words instead of numbers works better should you want to find that
    site again. How the `DNS` server does all of this is beyond the scope of this
    book. In order to serve web pages for the workstation from the workstation, you
    need to use this address, which the operating system will automatically see as
    a local installation.


    Installing Apache as a service requires administrative access. This is also required
    to stop and start the server, as you’ll see if you install in this way.


    Installing as a manually started program allows you to stop and start the Apache
    server simply and as needed, rather than it always being an active service that
    is taking up resources should you not be programming or serving pages. The next
    window, Figure [9-5](#485616_2_En_9_Chapter.xhtml#Fig5), asks you to select a
    Custom or Typical installation. Select Custom and click Next.


    ![](images/485616_2_En_9_Chapter/485616_2_En_9_Fig5_HTML.jpg)


    A screenshot of a window titled Apache HTTP server 2.2 installation wizard. The
    page displays the setup type. It includes two types. Typical and custom. Here
    custom option is selected.


    ## Figure 9-5


    Selecting a Typical or Custom installation.


    Ask for installation options. `Build Headers and Libraries` is not checked by
    default. Check it to install it. Set installation directory to be `C:\Apache`.


    You may have to change this field more than once. The installer wants you to name
    the Apache directory `Apache2.2`. There have been other places in this book that
    I’ve said to keep it as simple as possible. With a simple and easy-to-remember
    installation path, you don’t have to look up directory or resource names. Do keep
    it simple. Examine Figure [9-6](#485616_2_En_9_Chapter.xhtml#Fig6):


    ![](images/485616_2_En_9_Chapter/485616_2_En_9_Fig6_HTML.jpg)


    A screenshot of a window titled Apache HTTP server 2.2 installation wizard. The
    page displays the custom setup options. It includes a list of features with feature
    descriptions. The first feature is selected and the associated description is
    provided below.


    ## Figure 9-6


    Specifying what is to be installed on the hard drive.


    The next option is to click the Install button to begin the installation, as shown
    in Figure [9-7](#485616_2_En_9_Chapter.xhtml#Fig7). You’ll see a window with a
    progress bar that gives you an idea of the progress of your installation. The
    installation usually only takes a few minutes.


    ![](images/485616_2_En_9_Chapter/485616_2_En_9_Fig7_HTML.jpg)


    A screenshot of a window titled Apache HTTP server 2.2 installation wizard. The
    page displays installing Apache HTTP server 2.2.21. The selected program features
    are installed. The status of the installation process is provided below.


    ## Figure 9-7


    The installation progress window.


    After the progress bar disappears and your machine displays Figure [9-8](#485616_2_En_9_Chapter.xhtml#Fig8),
    you’ve completed the installation. Now the Apache web server is on your workstation.


    ![](images/485616_2_En_9_Chapter/485616_2_En_9_Fig8_HTML.jpg)


    A screenshot of a window titled Apache HTTP server 2.2 installation wizard. The
    template page displays the completed installation wizard window.


    ## Figure 9-8


    Installation completed window.


    # Apache and DBI.pm


    The Perl `DBI` module is perhaps one of the best modules that have been put into
    production. With it, you are able to interact with a number of popular database
    servers in a timely and effective manner. The methods available from `DBI` make
    it a simple and effective affair to connect and interact with the database. All
    of the following examples assume you’re using the current version of `MySQL`.


    First, let us concentrate on connecting to the database. As with all things Perl,
    there are several distinct ways to do this, and all can be correct. We’ll use
    what I’ve seen to be the most common syntax to connect to a `MySQL` database.


    You’re going to run into errors with databases for similar reasons that you do
    when using system calls. And just as you should always check the return code of
    your system calls, so should you always check the return status of your database
    calls. The easiest way to do this is by setting `DBI`’s `RaiseError` attribute
    to `1`. First, you would connect to the database and check the return. You would
    set the `RaiseError` attribute, as shown in Listing [9-1](#485616_2_En_9_Chapter.xhtml#PC1).'
