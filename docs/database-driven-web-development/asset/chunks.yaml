    # 将多个数据库项选择到多个变量中


    如果你需要快速执行少量工作，通常会使用一步到位的 `do()` 方法。你肯定不想在一个长达百万次迭代的 `foreach` 循环中使用 `do()` 方法。


    由于将来会有将大量信息选择并存入多个变量的需求，本章的示例将展示这一点。然而，在继续之前，有几个要点需要考虑。本书的这一部分将深入探讨这些需要记住的要点，并提供反映我们目标功能的示例任务。


    你可以使用两个通用函数通过 Perl 的 `DBI` 模块从数据库中检索数据。其中一个是用于从数据库中提取单条数据。这就是 `fetchrow()` 方法。它用于从数据库中检索单条信息，并将其存储于一个标量变量或一个简单的数组中。因为我们将会检索多条信息，所以建议你使用
    `fetchrow_array()` 方法来实现你的数据库查询。


    `fetchrow_array()` 方法比 `fetchrow()` 方法更高级，使用此方法执行起来非常快速且可靠。与 `fetchrow_array()`
    方法配合使用的简单构造既高效又直观，这无疑促成了 Perl `DBI` 模块的广泛流行。


    数据库查询本身必须是允许检索多条数据的那种。使用 `WHERE` 子句是实现这一目标最简单、最直接的方式。例如，如果你在 `WHERE` 子句中使用一个确定的值，你将只能检索到一条数据。通过使用设计为提供多个结果的
    `WHERE` 子句，脚本就能够从多个列或行中检索多个值，正如示例所示。一个简单的 `>`（大于）运算符就能很好地实现这一点，你将在接下来的示例中看到。


    这些示例概述了可用于检索多条信息并将其存储于多个标量变量中的构造。你可以用数组代替这些变量，但不推荐这样做。尽可能保持代码简单，你会得到最好的结果。


    和往常一样，检索到的数据应按照其存在于数据库中的形式呈现在你的变量和数组中。这有助于形成清晰简洁的数据库模型和易于理解的脚本。这也是一种非常易于实现的数据库操作方法。


    # 将多个数据库项选择到一个数组中


    现在，让我们开始将数组作为数据库查询的最终产物。我们将从最简单的构造开始，从数据库中提取多条信息并放入一个数组中。因为一次只需从数据库中提取一条信息，所以将使用
    `fetchrow()` 方法。连续的数据库数据项通过 `push` 操作添加到数组中，以实现最终结果——一个精确反映你的数据库列的数组。


    此示例从一个表中提取多行数据，并将该表数据放入一个数组中。然后，你可以通过索引号访问数组中的数据，或者遍历整个数组以获得一个大型列表。示例任务中值得注意的是
    `id >= 0`，它告诉 `MySQL` 获取所有 `id` 值大于或等于零的列。这实质上会获取表中的每一行，并将数据放入一个数组中，该数组将完美地反映你在该数据库列中的数据。


    你不会使用 `fetchrow_array()`，因为我们只获取数据库表的一列。虽然我们只获取一列，但这些列会跨越多行。在这种情况下，不需要 `fetchrow_array()`
    方法。`fetchrow()` 方法就能很好地满足需求。


    在这些示例中，可以看到探讨了从数据库中提取数据的每一种可能选项——`DBI` 模块是一个非常出色的作品。从示例任务中可以看出，使用所述方法可以获取非常大量的信息。然后，你可以根据需要处理这些数据。使用这样的数据库调用，你实际上是在处理非常大量的数据。构建列表只是一个通过
    `foreach` 或 `while` 语句循环遍历索引项的简单过程。


    # 使用 WHERE 子句选择多条信息


    `WHERE` 子句是非常有用的工具。它们易于理解和和使用，并使你的数据库调用易于实现。你可以应用字符串或数字类型的语法。正如你在清单 2-5 中所见，数学运算符可以用在你的
    `MySQL` 语句中。


    ```perl

    $query = "SELECT col1 FROM this_table WHERE id >= 0";

    $sth = $dbh->prepare($query);

    $sth->execute();

    while ($thisvalue = $sth->fetchrow()) {

    push @thisarray, $thisvalue;

    }

    ```

