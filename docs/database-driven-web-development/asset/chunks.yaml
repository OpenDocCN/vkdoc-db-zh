- fmt: '## Differing Content Areas


    You can also see that a database is being used by clicking a few links and noticing
    that one page looks very much like the previous, but with different content being
    displayed in the main content areas. This is because a database-driven site commonly
    uses templates to present their data. By template I mean a set of markup (such
    as `HTML`) that is used to present the top and bottom and sides of the page, for
    example. The only part of the page that changes is, say, the center of the page.
    This is the database-generated content.


    Another easy way to spot a database-driven site is by paying attention to the
    advertising banners and buttons. If they change with every page or even if you
    refresh the page, the advertisement changes. This can’t be done without using
    a database on some level.


    When working with `Perl` and a database, you’ll notice that a dialog box will
    be presented by the browser asking if you’d like to “repost form data.” This is
    because you’ve just finished posting data to a database and have clicked the “Back”
    button on your browser. The `Perl` script that posted the information is being
    run again, making the same database entry you just made again.


    On the `Perl` scripts that don’t interact with a database, you won’t see the “repost
    form data” dialog box. As we progress through the chapters of this book, you’ll
    notice that this happens quite often. One of the only ways around this is to provide,
    within the `Perl` script, an easy-to-recognize link that takes you back to the
    previous page without reposting the form data and duplicating the database entry.


    Reposting the form data can be detrimental to your site, as it duplicates the
    data within your database. While the `Perl` script being rerun may be something
    as simple as counting a page hit, it may be something as complicated as uploading
    a dozen images to your server – you’ll see that the 12 images are duplicated on
    your server.


    ## Adding Search Features


    One surefire way of detecting that a website is using a database is if the site
    offers up search features. While it is possible to search a website without using
    a database, this is costly in terms of server resources and isn’t done very often.
    Searching through dozens or even hundreds of static `HTML` files would take an
    inordinate amount of time and server resources.


    Searching for content via a database, however, is exactly what the database was
    created for. `MySQL` is great for doing this, as it is a relational database.
    We’ll discover more on the term “relational database” in a different section of
    this chapter.


    Search features are a common sight on most database-driven websites. `MySQL`,
    along with `Perl`, can incorporate some very powerful search features into your
    site. The project we’ll be working on in later chapters of this book includes
    a search feature that finds users and posts based on a word or phrase entered
    into a search field by you, the user.


    ## Username and Password Considerations


    One definite and easy way to spot that you’re using a database is if you have
    to sign in with a username and password. While there is a way to use a username
    and password without using a database, this method doesn’t involve a true database.


    When supplying a username and password, the script tells the database to first
    look for the username. Once the username is found, the password is retrieved.
    Once retrieved, if the password on file mirrors the password provided, the user
    is logged in. From there on in, a database is most commonly used to present the
    page to the user, most of the time based on some aspect of the user’s personal
    information.


    ## Protect a Directory with `.htaccess` Files


    The only way to use a username and password without using a traditional database
    is with an older method of recognizing a user. This older method is by using an
    `.htaccess` file. Within this file is a name/value pair that contains the username
    and password. An `.htaccess` file is simply a text file with commands and data
    within it.


    Once the username and password are verified, the directory directly below where
    the `.htaccess` file resides on your server will be able to be accessed by that
    particular user. This check is made by the `Apache` web server, not `Perl` nor
    a database.


    While this works fine in some cases, you are limited to about 100 users. After
    the 100-user limit has been reached, it will take an inordinate amount of time
    to verify the username and password. This is because the supplied username and
    password must be verified by comparing both pieces of data to the 100 different
    name/value pairs within the simple `.htaccess` file.


    While the operation of simple user verification is the base operation of an `.htaccess`
    file, it should be known that the `Apache` web server allows you to include special
    commands that limit or change the conditions of each page covered by that `.htaccess`
    file.


    If you were a web master, in installing and configuring the `Apache` web server,
    you will have to make a certain set of changes in a configuration file known as
    `httpd.conf`. Within this file is all of the information the `Apache` web server
    requires to successfully serve a web page from that server. Most of these commands,
    such as for allowing user access, can be put into the `.htaccess` file. This handy
    functionality is why the `.htaccess` file is still being used on the Internet
    today.


    ## Where and When to Use a Database


    You would normally use a database if you have a need to present a certain web
    page to your users that has as its main point of interest content that is changeable
    and fluid – a page that differs according to each user such as a user profile
    page, for example.


    Using a database gives you the flexibility to present to your users dynamic content.
    By dynamic, it is meant data that changes, usually according to user action. The
    user that generated the data a user is looking at may not be the current user
    – since there is the potential to have thousands or even millions of users on
    one website, looking at data generated by a different user is commonplace.


    If you see that you have a need to employ features such as displaying individual
    user information, search features, or are working with `HTML` forms in any number,
    you should be using a database.


    While working with a database on the Internet, you’ll be able to easily see where
    and how a database is being used within each site that you visit. You’ll get an
    idea of the flexibility and power that a database-driven website can accomplish.
    Through the use of simple markup code such as `HTML`, you’ll see that a database
    can extend the creative reach that is possible.


    ## Web Hosting Fundamentals


    So you have an idea for a website and wish to pursue it and make it real. One
    of the first things you’ll have to consider is who your web hosting company is
    going to be.


    In a nutshell, there are three options for web hosting – the shared plan, the
    `VPS` (Virtual Private Server) plan, and the dedicated server plan – and each
    has its own pros and cons. We will look at each one in the remainder of the chapter.'
  raw: '## Differing Content Areas


    You can also see that a database is being used by clicking a few links and noticing
    that one page looks very much like the previous, but with different content being
    displayed in the main content areas. This is because a database-driven site commonly
    uses templates to present their data. By template I mean a set of markup (such
    as HTML) that is used to present the top and bottom and sides of the page, for
    example. The only part of the page that changes is, say, the center of the page.
    This is the database-generated content.


    Another easy way to spot a database-driven site is by paying attention to the
    advertising banners and buttons. If they change with every page or even if you
    refresh the page, the advertisement changes. This can’t be done without using
    a database on some level.


    When working with Perl and a database, you’ll notice that a dialog box will be
    presented by the browser asking if you’d like to “repost form data.” This is because
    you’ve just finished posting data to a database and have clicked the “Back” button
    on your browser. The Perl script that posted the information is being run again,
    making the same database entry you just made again.


    On the Perl scripts that don’t interact with a database, you won’t see the “repost
    form data” dialog box. As we progress through the chapters of this book, you’ll
    notice that this happens quite often. One of the only ways around this is to provide,
    within the Perl script, an easy-to-recognize link that takes you back to the previous
    page without reposting the form data and duplicating the database entry.


    Reposting the form data can be detrimental to your site, as it duplicates the
    data within your database. While the Perl script being rerun may be something
    as simple as counting a page hit, it may be something as complicated as uploading
    a dozen images to your server – you’ll see that the 12 images are duplicated on
    your server.


    ## Adding Search Features


    One surefire way of detecting that a website is using a database is if the site
    offers up search features. While it is possible to search a website without using
    a database, this is costly in terms of server resources and isn’t done very often.
    Searching through dozens or even hundreds of static HTML files would take an inordinate
    amount of time and server resources.


    Searching for content via a database, however, is exactly what the database was
    created for. MySQL is great for doing this, as it is a relational database. We’ll
    discover more on the term “relational database” in a different section of this
    chapter.


    Search features are a common sight on most database-driven websites. MySQL, along
    with Perl, can incorporate some very powerful search features into your site.
    The project we’ll be working on in later chapters of this book includes a search
    feature that finds users and posts based on a word or phrase entered into a search
    field by you, the user.


    ## Username and Password Considerations


    One definite and easy way to spot that you’re using a database is if you have
    to sign in with a username and password. While there is a way to use a username
    and password without using a database, this method doesn’t involve a true database.


    When supplying a username and password, the script tells the database to first
    look for the username. Once the username is found, the password is retrieved.
    Once retrieved, if the password on file mirrors the password provided, the user
    is logged in. From there on in, a database is most commonly used to present the
    page to the user, most of the time based on some aspect of the user’s personal
    information.


    ## Protect a Directory with .htaccess Files


    The only way to use a username and password without using a traditional database
    is with an older method of recognizing a user. This older method is by using an
    .htaccess file. Within this file is a name/value pair that contains the username
    and password. An .htaccess file is simply a text file with commands and data within
    it.


    Once the username and password are verified, the directory directly below where
    the .htaccess file resides on your server will be able to be accessed by that
    particular user. This check is made by the Apache web server, not Perl nor a database.


    While this works fine in some cases, you are limited to about 100 users. After
    the 100-user limit has been reached, it will take an inordinate amount of time
    to verify the username and password. This is because the supplied username and
    password must be verified by comparing both pieces of data to the 100 different
    name/value pairs within the simple .htaccess file.


    While the operation of simple user verification is the base operation of an .htaccess
    file, it should be known that the Apache web server allows you to include special
    commands that limit or change the conditions of each page covered by that .htaccess
    file.


    If you were a web master, in installing and configuring the Apache web server,
    you will have to make a certain set of changes in a configuration file known as
    httpd.conf. Within this file is all of the information the Apache web server requires
    to successfully serve a web page from that server. Most of these commands, such
    as for allowing user access, can be put into the .htaccess file. This handy functionality
    is why the .htaccess file is still being used on the Internet today.


    ## Where and When to Use a Database


    You would normally use a database if you have a need to present a certain web
    page to your users that has as its main point of interest content that is changeable
    and fluid – a page that differs according to each user such as a user profile
    page, for example.


    Using a database gives you the flexibility to present to your users dynamic content.
    By dynamic, it is meant data that changes, usually according to user action. The
    user that generated the data a user is looking at may not be the current user
    – since there is the potential to have thousands or even millions of users on
    one website, looking at data generated by a different user is commonplace.


    If you see that you have a need to employ features such as displaying individual
    user information, search features, or are working with HTML forms in any number,
    you should be using a database.


    While working with a database on the Internet, you’ll be able to easily see where
    and how a database is being used within each site that you visit. You’ll get an
    idea of the flexibility and power that a database-driven website can accomplish.
    Through the use of simple markup code such as HTML, you’ll see that a database
    can extend the creative reach that is possible.


    ## Web Hosting Fundamentals


    So you have an idea for a website and wish to pursue it and make it real. One
    of the first things you’ll have to consider is who your web hosting company is
    going to be.


    In a nutshell, there are three options for web hosting – the shared plan, the
    VPS (Virtual Private Server) plan, and the dedicated server plan – and each has
    its own pros and cons. We will look at each one in the remainder of the chapter.'
  trans: '

    ## 不同的内容区域


    通过点击几个链接，你也能看出网站在使用数据库，因为你会发现一个页面看起来与前一个非常相似，只是主内容区域显示的内容不同。这是因为数据库驱动网站通常使用模板来呈现数据。我所说的模板，是指一套用于呈现页面顶部、底部和侧边栏的标记（例如
    `HTML`）。页面中唯一变化的部分，比如说，是页面的中心区域。这就是由数据库生成的内容。


    另一个识别数据库驱动网站的简便方法是注意广告横幅和按钮。如果它们随每个页面变化，甚至在你刷新页面时广告也会变化，那么在某种程度上，这一定使用了数据库才能实现。


    当使用 `Perl` 和数据库时，你会注意到浏览器会弹出一个对话框，询问你是否要“重新发送表单数据”。这是因为你刚刚向数据库提交了数据，并点击了浏览器的“后退”按钮。刚才提交信息的
    `Perl` 脚本又运行了一次，重复创建了你刚刚在数据库中创建的条目。


    对于那些不与数据库交互的 `Perl` 脚本，你不会看到“重新发送表单数据”的对话框。随着我们学习本书的章节，你会发现这种情况经常发生。解决此问题的少数方法之一是在
    `Perl` 脚本中提供一个易于识别的链接，该链接可以将你带回上一页，而无需重新发送表单数据，从而避免重复的数据库条目。


    重新发送表单数据可能对你的网站有害，因为它会在你的数据库中复制数据。虽然重新运行的 `Perl` 脚本可能像计算页面点击量一样简单，但也可能像向服务器上传一打图片那样复杂——你会看到那
    12 张图片在你的服务器上被复制了。


    ## 添加搜索功能


    判断一个网站是否使用数据库的一个可靠方法是它是否提供搜索功能。虽然在不使用数据库的情况下搜索一个网站是可能的，但这在服务器资源方面代价高昂，并不常用。搜索数十甚至数百个静态的
    `HTML` 文件会耗费过多的时间和服务器资源。


    然而，通过数据库搜索内容正是数据库被创造出来的目的。`MySQL` 非常适合做这个，因为它是一个关系型数据库。在本章的另一个小节中，我们将进一步探讨“关系型数据库”这个术语。


    搜索功能在大多数数据库驱动的网站上都很常见。`MySQL` 与 `Perl` 相结合，可以为你的网站集成一些非常强大的搜索功能。在本书后面的章节中，我们将进行的项目就包含一个搜索功能，它能根据用户在搜索框中输入的一个词或短语来查找用户和帖子。


    ## 用户名和密码注意事项


    判断你是否在使用数据库的一个明确且简单的方法是，你是否必须使用用户名和密码登录。虽然存在一种不使用数据库而使用用户名和密码的方法，但这种方法并不涉及真正的数据库。


    在提供用户名和密码时，脚本会告诉数据库首先查找用户名。一旦找到用户名，就检索密码。检索后，如果存档的密码与提供的密码相符，用户就成功登录了。从那时起，数据库最常用于向用户呈现页面，而页面内容大多基于该用户个人信息的某个方面。


    ## 使用 `.htaccess` 文件保护目录


    不使用传统数据库而使用用户名和密码的唯一方法是使用一种较旧的用户识别方法。这种旧方法就是使用 `.htaccess` 文件。该文件内包含一个名称/值对，其中存储了用户名和密码。`.htaccess`
    文件只是一个包含命令和数据的文本文件。


    一旦用户名和密码通过验证，服务器上 `.htaccess` 文件所在目录的直接下级目录就可以被该特定用户访问。此检查由 `Apache` Web 服务器完成，而非
    `Perl` 或数据库。


    虽然这在某些情况下效果很好，但你最多只能使用约 100 个用户。达到 100 个用户的限制后，验证用户名和密码将耗费过多时间。这是因为必须将提供的用户名和密码与简单
    `.htaccess` 文件中的 100 个不同的名称/值对逐一进行比较验证。


    虽然简单用户验证操作是 `.htaccess` 文件的基本功能，但应该知道 `Apache` Web 服务器允许你在其中包含特殊的命令，以限制或更改该 `.htaccess`
    文件所涵盖的每个页面的条件。


    如果你是一名网络管理员，在安装和配置 `Apache` Web 服务器时，你需要在一个名为 `httpd.conf` 的配置文件中进行一系列更改。该文件包含了
    `Apache` Web 服务器成功提供网页所需的所有信息。大多数这些命令，例如用于允许用户访问的命令，都可以放入 `.htaccess` 文件中。这个便捷的功能正是
    `.htaccess` 文件至今仍在互联网上使用的原因。


    ## 何时何地使用数据库


    如果你有向用户展示某个特定网页的需求，并且该网页的主要看点是可变且流动的内容——例如一个根据每个用户而异的用户个人资料页面——那么你通常会使用数据库。


    使用数据库让你能够灵活地向用户呈现动态内容。所谓动态，指的是通常根据用户操作而变化的数据。生成当前用户正在查看的数据的用户可能不是当前用户——由于一个网站上可能有数千甚至数百万用户，查看不同用户生成的数据是很常见的。


    如果你看到需要采用诸如显示单个用户信息、搜索功能等特性，或者需要大量使用 `HTML` 表单，那么你就应该使用数据库。


    在互联网上使用数据库时，你将能够轻松地看出你访问的每个网站中数据库的使用位置和方式。你会了解到数据库驱动网站所能实现的灵活性和强大功能。通过使用像 `HTML`
    这样的简单标记代码，你将看到数据库可以扩展可能的创作范围。


    ## Web 托管基础知识


    假设你有了一个网站的想法，并希望将其变为现实。你首先需要考虑的事情之一就是选择哪家网络托管公司。


    简而言之，网络托管有三种选择——共享计划、`VPS`（虚拟专用服务器）计划和独立服务器计划——每种都有其自身的优缺点。在本章剩余部分，我们将逐一探讨。

    '
- fmt: '## The Shared Server


    共享服务器计划正如你所想——你与许多不同的网站共享你的服务器。这个计划非常适合在网站开发的初期阶段使用。你通常会从共享计划开始，将你的网站开发成一个完整的产品。这是最便宜的选项，同时仍能提供良好的功能，但如果你计划拥有大量用户，这通常不是长久之计。需要注意的是，你的共享服务器有两种寻址方式：基于名称或基于
    IP。基于名称的服务器地址是我们人类通常理解的方式，例如 [`www.domain.com`](http://www.domain.com)。另一种命名约定，基于
    IP，是一种使用数字“八位组”的寻址数字形式。IP 代表 Internet Protocol（互联网协议），即四组由三个数字组成、用句点分隔的数字：


    `127.34.56.124`


    如前例所示的 IP 地址是一个有效的 IP 地址。它包含四个用点分隔的数字。这些数字是互联网上的基础寻址系统。为了将这些数字与我们人类能理解的单词匹配起来，我们需要使用
    DNS 服务器。DNS 代表域名服务器。


    共享托管计划通常具备你将网站从无到有发展成功能齐全的互联网产品所需的所有功能。然而，在你签订合同并为服务器上的空间付费之前，有几件事你必须了解。


    网络托管公司在使用共享服务器计划时，只允许你的网站使用一定数量的资源。资源包括磁盘空间、处理器使用百分比以及通常在 30 天内测量的带宽使用限制。


    有些计划限制了你能够创建和使用的 MySQL 数据库数量。你应该询问你的网络托管商，你的 MySQL 数据库是在你正在使用的同一台服务器上，还是通过本地网络上专门运行
    MySQL 数据库的服务器访问。这一点很重要，因为为了使用数据库，你必须知道在数据库位于专用服务器上时使用网址作为位置，或者在数据库与网站其余部分存储在同一台服务器上时使用“localhost”。这种寻址方式将反映在每个使用数据库的
    Perl 脚本中，因此了解这一点很重要。


    由于本书的主要脚本语言是 Perl，询问网络托管公司是否允许你安装更多不属于标准 Perl 发行版的 Perl 模块（例如 `DBI.pm`）非常重要。在本书的后续章节中，你还需要使用
    `size.pm` 和 `resize.pm`。`size.pm` 和 `resize.pm` 是用于返回图像大小 (`size.pm`) 和调整图像大小
    (`resize.pm`) 的 Perl 模块。关于这两个 Perl 模块的更多内容将在后面的章节中介绍。


    你还应该询问你的网络托管商 Perl 可执行文件的位置。这条信息是每个 Perl 脚本最顶部的一行代码，被称为“shebang”。如果脚本找不到 Perl
    可执行文件，它将无法运行。Perl 最常见的位置如下：


    ```

    #!/usr/bin/perl

    ```


    我遇到过一些网络托管公司，它们将每个最新版本的 Perl 都列为 shebang，让你可以选择使用哪个版本。有些公司使用不寻常的 shebang。请查看网络托管商网站上的常见问题解答或支持部分以获取
    Perl 的位置。


    我曾遇到过一家不提供 Perl 作为脚本语言的网络托管公司。他们的借口是 Perl 不可扩展，这与事实相去甚远。Perl 是无限可扩展的——你只需要知道如何做到。通过使用子域名和文件，你可以将一个极其复杂的网站分散到整个服务器阵列上。


    ## The VPS Server


    虚拟专用服务器计划在服务器能力和可定制性方面比共享计划更进一步。VPS 计划保证了处理器使用百分比、内存（RAM）和硬盘空间。它在不产生专用服务器较高成本的情况下，高度模拟了专用服务器。大多数计划在每个
    30 天周期内分配的带宽也比共享服务器计划多。


    VPS 计划模拟了专用服务器的功能。它们比共享计划更昂贵，但额外的费用通常是值得的。当你的网站处于最终测试阶段时，可以使用 VPS 服务器。再次提醒，请注意你的
    VPS 服务器上允许和禁止的内容。VPS 服务器是那些需要专用服务器功能但又不想承担额外成本的低流量、低带宽网站的良好解决方案。


    ## The Dedicated Server


    专用计划是三种常见计划类型中最昂贵的，也是功能最丰富的，因为通常只有一个网站位于单台服务器上。一些网络托管公司允许你在每台专用服务器上拥有多个网站。


    你通常会在网站完成并开始有用户访问后使用专用服务器。它们是网络托管公司提供的最昂贵的计划，因为只有你的网站使用该服务器。当你的流量开始导致服务器运行缓慢，或者你在共享或
    VPS 服务器上的硬盘空间不足时，可以使用专用服务器。


    专用服务器通常以功能和性能的滑动比例提供。如果你打算租用专用服务器，请确保它具有硬盘冗余功能，例如 `RAID 1`。`RAID` 代表独立磁盘冗余阵列。


    最常见的两种 `RAID` 类型是 `RAID 1` 和 `RAID 5`。`RAID 1` 涉及两个相互镜像数据的独立硬盘驱动器。只涉及两个硬盘驱动器，其理念是如果一个硬盘驱动器发生故障，数据在另一个镜像磁盘上仍然可用。这是最常见的
    `RAID` 形式。


    `RAID 5` 被称为磁盘条带化。最多可以有七个磁盘参与存储你的数据。如果一个磁盘丢失，其余正常工作的硬盘驱动器上仍保留足够的信息来重建已故障并被更换的硬盘驱动器上的数据。


    ## Email Options


    你应该向网络托管商咨询的另一项基本服务是 Linux 的 `sendmail` 功能。虽然大多数人都熟悉 Windows，但它在互联网上很少用作服务器。这就是
    Linux 的用武之地。Linux 是用于提供你每天看到的网页的主流服务器。


    为了通过脚本发送电子邮件，你需要使用 `sendmail`。`sendmail` 是一个非常基础的电子邮件服务器，已使用了几十年。通过它，你可以根据脚本操作动态发送电子邮件。


    你还需要询问关于在线电子邮件客户端的情况。有许多电子邮件客户端可供选择，它们的功能都大致相同。然而，你要找的是一个稳定且经过时间考验的客户端。最常见的电子邮件客户端是
    Horde，它运行良好。它是可用的最古老、开发最完善的在线电子邮件客户端之一。这是一项成熟的技术。通过它，你将能够从任何具有互联网服务的计算机在线接收和发送电子邮件。你收到的电子邮件存储在服务器上，因此只要你记住了服务器的地址，就可以从任何地方访问。'
  raw: '### The Shared Server


    Shared server plans are just what you think they are – you share your server with
    many different websites. This plan is great for developing your website in its
    infant stage. You would normally start out with the shared plan in order to develop
    your website into a finished product. It is the cheapest option that still gives
    a good amount of functionality, although it usually isn’t the option to stay with
    if you plan on having a large amount of users. It should be noted that there are
    two ways your shared server will be addressed: name based or IP based. A name-based
    server address is the way we humans usually understand [`www.domain.com`](http://www.domain.com),
    for example. The other naming convention, IP based, is a numeric form of addressing
    that uses an “octet” of numbers. IP stands for Internet Protocol, that is, four
    groups of three numbers separated by a period:


    127.34.56.124


    The IP address as seen in the preceding example is a valid IP address. It contains
    four numbers separated by dots. These numbers are the base addressing system on
    the Internet. In order to match these numbers with words that us humans understand,
    we would have to use a DNS server. DNS stands for Domain Name Server.


    Shared hosting plans usually have all of the functionality you’ll need to get
    your website from nothing to a fully functioning Internet offering. However, there
    are a few things you have to know of before you sign the contract and pay the
    company for space on one of its servers.


    Web hosting companies only allow a certain amount of resources for your site when
    using a shared server plan. Resources are things like disk space, a percentage
    of processor usage, and a limit on bandwidth that can be used, usually measured
    within a 30-day period.


    Some limit the amount of MySQL databases you are able to create and use. You should
    ask your web host if your MySQL databases are on the same server you’re using
    or accessed via the local network on a server dedicated to running MySQL databases.
    This is important because in order to use the database, you’ll have to know whether
    to use a web address as the location if the database is on a dedicated server
    or “localhost” if the database resides on the same server the rest of your website
    is stored on. This addressing will be reflected in every Perl script that uses
    the database, so knowing this is important.


    Since the primary scripting language of this book is Perl, it is important that
    you ask the web hosting company if they allow you to install more Perl modules
    that don’t come with the standard Perl distribution, such as DBI.pm. In later
    chapters of this book, you will also need to use size.pm and resize.pm. size.pm
    and resize.pm are Perl modules that are used to return the size of an image (size.pm)
    and resize the image (resize.pm). More on those two Perl modules in a later chapter.


    You should also ask your web host where the Perl executables are located. This
    piece of information is the one line of code at the very top of every Perl script,
    known as the “shebang.” If the script can’t find the Perl executables, the script
    won’t run. The most common location of Perl is as follows:


    ```

    #!/usr/bin/perl

    ```


    I have encountered web hosting companies that list every recent version of Perl
    as the shebang, giving you the option of what version to use. Some companies use
    an unusual shebang. Look to the FAQ or support section of the web host’s website
    for the location of Perl.


    I have run into a web hosting company that doesn’t offer Perl as a scripting language.
    Their excuse was that Perl is not scalable, which couldn’t be further from the
    truth. Perl is infinitely scalable – you just have to know how to do it. Between
    the use of subdomains and files, you’re able to spread an extremely complicated
    site over an entire array of servers.


    ### The VPS Server


    The Virtual Private Server (VPS) plan is a step up from the shared plan in terms
    of server ability and customization. A VPS plan gives a guaranteed percentage
    of processor use, memory (RAM), and hard drive space. It closely emulates a dedicated
    server without the higher cost of a dedicated sever. Most plans also allocate
    more bandwidth per 30-day period than you would get with a shared server plan.


    A VPS plan is one that emulates the functionality of a dedicated server. They’re
    pricier than a shared plan, but the extra expense is usually worth the cost. Use
    a VPS server when you’re in the final beta testing stage of your site’s life cycle.
    Again, be careful about what is and isn’t allowed on your VPS server. The VPS
    server is a good solution for low-traffic, low-bandwidth sites that require the
    functionality of a dedicated server without the added cost.


    ### The Dedicated Server


    Dedicated plans are the costliest of the three common plan types and are also
    the most feature-rich, since it is usually only the one website on a single server.
    Some web hosting companies allow you to have more than one website on each dedicated
    server.


    You would normally use a dedicated server after your site is complete and is already
    taking on users. They’re the most expensive plan that a web hosting company provides,
    as yours is the only site using that server. Use a dedicated server when your
    traffic starts to bog down or you run low on hard drive space on your shared or
    VPS server.


    Dedicated servers usually are offered on a sliding scale of functionality and
    capability. If you’re going to lease a dedicated server, make sure it has hard
    drive redundancy, such as RAID 1\. RAID stands for Redundant Array of Independent
    Disks.


    The two most common flavors of RAID are RAID 1 and RAID 5\. RAID 1 involves two
    separate hard drives that mirror each other’s data. Only two hard drives are involved,
    with the idea being that if one hard drive fails, the data is still in a usable
    form on the other mirrored disk. This is the most common form of RAID.


    RAID 5 is known as disk striping. Up to seven disks may be involved in storing
    your data. If one disk is lost, enough information remains on the other functioning
    hard drives to rebuild the data on the hard drive that had failed and was replaced.


    ## Email Options


    Another basic service you should query your web host about is Linux’s sendmail
    feature. While most people are familiar with Windows, it is rarely used on the
    Internet as a server. This is where Linux comes in. Linux is the prevalent server
    used to serve the web pages you see every day.


    In order to send email via a script, you’ll need sendmail to do it with. sendmail
    is a very basic email server that has been in use for decades. With it, you’re
    able to send email on the fly according to scripted action.


    You’ll also want to ask about your online email client. There are many email clients
    to choose from, and all offer pretty much the same functions. What you’re looking
    for, though, is a client that is stable and time tested. The most common email
    client is Horde, and it works very well. It is one of the oldest and most developed
    online email clients available. It is a mature technology. With it, you’ll be
    able to retrieve and send email online from any computer with Internet service.
    The emails you receive are stored on your server and therefore are available from
    anywhere, should you memorize the address to the server.'
