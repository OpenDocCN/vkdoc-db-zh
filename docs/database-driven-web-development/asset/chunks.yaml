    ### page.cgi


    As with all Perl scripts, we start with the shebang. I always declare the modules
    to be used at the top of the script. This makes it easy to see at a glance what
    modules the script is using. There are two parameters being passed to the script:
    `id1` and `id2`. They are contained within the intuitively named `$id1` and `$id2`
    variables. `page.cgi` shows the ease with which values can be passed to a script.
    It also shows where to fit in your database calls and the generation of HTML content.


    Examine Listing 11-3, which is a complete script that stores the `id1` and `id2`
    parameters in a table named `pages`. Notice also that there is a “hits” column.
    This is incremented every time the script is run with its own very simple statement.


    ```perl

    #!/usr/bin/perl

    use DBI;

    use CGI;

    use CGI::Carp qw(fatalsToBrowser);

    $cgi = new CGI;

    $id1 = $cgi->param(''id1'');

    $id2 = $cgi->param(''id2'');

    ### connect, damnit !!!

    $dbh = DBI->connect(''DBI:mysql:host=localhost;

    database=menu_system'', ''user_name'', ''password'', {''RaiseError'' => 1})

    or die "Cannot Connect to Database";

    $query = qq{INSERT INTO pages (id1, id2) VALUES (''$id1'', ''$id2'') WHERE id2
    = $id2};

    $sth = $dbh->prepare($query);

    $sth->execute;

    $query = qq{UPDATE pages SET Hits = Hits + 1 WHERE id2 = $id2};

    $sth = $dbh->prepare($query);

    $sth->execute;

    $query = qq{SELECT id1, id2, hits FROM pages WHERE id2 = $id2};

    $sth = $dbh->prepare($query);

    $sth->execute();

    while (@thisid = $sth->fetchrow_array()) {

    $id1 = $thisid[0];

    $id2 = $thisid[1];

    $hits = $thisid[2];

    }

    $sth->finish();

    $dbh->disconnect();

    ### print da shtuff

    print qq{Content-type: text/html\n\n};

    print qq{


    Experiment


    Heading $id1, Page $id2, Visited $hits times


    };

    ```


