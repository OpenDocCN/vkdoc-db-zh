    如同往常，在设计脚本时需要考虑诸多因素。我发现，在脚本顶部处理参数和数据效果最佳，因为 Perl 是从上到下读取和执行的。同时我也认识到，始终保持脚本尽可能简单总是最佳实践。可以看到，所有变量都具有唯一标识。


    开发者编写第一个上传器时最常犯的错误，是仅使用 `param()` 方法来捕获数据，或仅使用 `upload()` 方法来捕获数据。实际上必须同时使用这两种方法，正如前一个代码块所示。使用
    `param()` 方法处理文件名，而文件内的数据则通过 `upload()` 方法传输。


    接下来便是有趣的部分。本节我们将处理文件和 Perl 模块，那么首先说明我为何要使用 `length()` 方法进行文件操作。我检查变量长度的原因是为确认
    HTML 输入字段是否留空。共有三个文件上传位置。我通过检查变量长度来判断输入字段是否为空。若为空，则不会向 `@thumb` 和 `@thesefiles`
    推送数据。这将影响代码清单 10-4 中的代码逻辑。


    ```

    $thisLength0 = length($thisfilename0);

    if ($thisLength0 > 0) {

    open(FILE0, ">/$dirPath/$thisfilename0;

    while() {

    print FILE0;

    };

    close FILE0;

    push @thumb, "tn_" . $thisfilename0;

    push @thesefiles, $thisfilename0;

    copy ("/$dirPath/$thisfilename0",  "/$dirPath/tn_$thisfilename0");

    };

    代码清单 10-4

    检测数据长度并执行相应操作

    ```


    在检测 `$thisfilename0` 后，简单的 `if` 语句将决定是否创建、存储并命名文件。接着是 `while()` 语句，用于读取 `$thisfile0`
    中的数据。随后 `print FILE0` 语句将数据写入以 `$thisfilename0` 命名的文件。之后数据流被关闭。


    为正确引用存储数据的变量名（尤其是文件名），我将文件名和缩略图名称分别推送到数组 `@thumb` 和 `@thesefiles`。通过对原始文件名进行简单拼接可知，将为上传的文件生成缩略图，其名称以
    `tn_` 开头。


    ```

    $count = "0";

    foreach (@thesefiles) {

    // 根据需要调整原始图像尺寸。高度需超过 1500，宽度需超过 640

    // 获取上传文件的尺寸

    ($globe_x, $globe_y) = imgsize("/$dirPath/$thesefiles[$count]");

    // 判断是否需要调整原始图像尺寸

    if (($globe_x or $globe_y) > 640) {

    // 通过 if 语句规避 x/y 除零风险

    if ($globe_x  640) {

    $globe_y = "640";

    $globe_x = $globe_y / $ratio;

    }

    $newwidth1 = int($globe_y);

    // 根据需要将高度按比例调整至最大 1500

    $ratio = $globe_y / $globe_x;

    if ($globe_x >= 1500) {

    $globe_x = "1500";

    $globe_y = $globe_x / $ratio;

    }

    $newheight1 = int($globe_x);

    $image = Image::Magick->new();

    $image->Read("/$dirPath/$thesefiles[$count]");

    $image->Resize(geometry => "$newheight1x$newwidth1");

    $image->Write("/$dirPath/$thesefiles[$count]");

    };

    ```


    接下来是调整图像尺寸的决策环节。首先需要生成的比例关系是 `$globe_x` 与 `$globe_y` 的比值，即 `$ratio = $globe_y
    / $globe_x`。随后通过 `if` 语句检测尺寸：若超过 640，则 `globe_y` 设为 640，`$globe_x` 设为 `$globe_y
    / $ratio` 的计算结果。当宽度超过 640 像素限制时，`$newwidth1` 将取 `$globe_x` 的整数值作为最终调整前的参数。


    判断图像宽度是否需要调整的同一套代码，也用于计算最大高度。高度超过 1500 像素的图像将被调整尺寸。


    现在将进行实际图像处理。通过创建新的 `Image::Magick` 对象来调用该模块，随后依次执行三行独立操作：`Read()`、`Resize()` 和
    `Write()`。


    我们从 `$count = "0"` 声明开始。基于零值的 `$count` 将输入 `foreach` 循环。每次循环迭代时，都会生成一个保持比例的 100×100
    像素缩略图，如代码清单 10-5 所示。


    ```

    ### 开始处理 @thumbs 数组

    $count = "0";

    foreach (@thumb) {

    ### 开始处理 $thumb，调整为 100 像素正方形

