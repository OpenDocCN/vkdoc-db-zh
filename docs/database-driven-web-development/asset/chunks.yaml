    如你所见，声明它是一件很简单的事。`CGI::Carp` 模块会将错误打印到浏览器，而无需使用命令行提示符来调试脚本。这些报告非常直观且易于理解。

    这些报告会通知错误信息、脚本名称以及发生致命错误的脚本行号。

    通常在网站开发阶段你会使用此模块。在你解决了所有网站错误后，建议你注释掉 `CGI::Carp`，这样用户就无法推断出你的脚本或数据库模型。在活动脚本上保持
    `CGI::Carp` 处于激活状态会使你面临恶意用户的攻击。


    ## 用户名与密码维护


    用户名与密码维护是开发网站的重要组成部分。除非你使用安全外壳连接（这超出了本书的范围），否则你通常使用 FTP 将文件放置在它们应该在的位置。

    每月更改一次密码会让你安心，知道其他开发者将无法访问你网站的关键文件。使用不同的用户名创建新账户也会增加你网站的安全性。

    当涉及到数据库用户名和密码时，更改它们通常是一项大工程，因为除非你更改连接语句中的用户名和密码，否则所有数据库调用都将失败。你将不得不更改每个使用数据库的
    Perl 脚本的用户名和密码。

    如果你的站点上运行的脚本数量较少，那么更改用户名和密码是一项可行的安全措施。

    与其在数据库连接脚本中更改用户名和密码，不如使用一个精心设计的密码。在这种情况下，一个好的密码长度是 10 到 12 个字符。

    在密码中使用大小写字母、数字和标点符号，可以降低他人通过你的数据库连接语句获取访问权限的几率。需要注意的是，在 MySQL 上，用户名和密码都是区分大小写的。


    ## 每用户使用情况统计


    在某些网站上，跟踪用户是必需的操作。如果网站是按服务收费的，用户根据其使用的服务付费，通常就是这种情况。


    跟踪用户最容易的方式是通过他们的 IP 地址。使用 `CGI` 模块，跟踪 IP（互联网协议）地址变得很容易。考虑以下代码：


    ```

    $userip = $cgi->remote_host();

    ```


    这条语句将返回用户的 IP 地址，允许你随意记录它或对其进行操作。一些网站通过 IP 地址来缩小用户的地址范围，使他们能够记录你的大致位置或在销售宣传中使用它。

    跟踪每个用户访问的页面是许多网站的常见功能。通过跟踪用户的活动轨迹，可以了解网站的哪些部分被使用，哪些部分没有被使用。这将使你能够对那些未被充分利用的网站功能做出明智的调整。


    跟踪用户需要一两次数据库调用。有两种常用方法来记录脚本（以及你网站的一个页面）是否被访问。第一种是如清单 4-7 所示的直接的两步法。


    ```

    $query = qq{SELECT hits FROM tracker};

    $sth = $dbh->prepare($query);

    $sth->execute();

    $thisHit = $sth->fetchrow()

    };

    ++$thisHit;

    $query = qq{UPDATE tracker SET hits = ''$thisHit''};

    $sth = $dbh->prepare($query);

    $sth->execute();

    };

    ```

    **清单 4-7** 使用 MySQL 的点击计数器


    你可以看到执行了两次数据库调用。首先，使用上面的语句获取点击计数。然后我们递增检索到的值，并将新值更新回数据库。这是记录单个页面点击的一种良好而直接的方法。


    单次调用法可能是两种方法中更优雅的一种。通过它，你只需进行一次数据库调用，并让 MySQL 为你完成工作：


    ```

    $query = qq{UPDATE tracker SET hits + 1};

    $sth = $dbh->prepare($query);

    $sth->execute();

    };

    ```


    如你所见，单次 Perl 调用使得脚本更简洁，同时也让执行速度更快的 MySQL 为你进行递增操作。


    ## 删除表


    删除表可能是一个有风险的操作，特别是因为 MySQL 没有可靠的恢复功能。表一旦被删除，就永远消失了，所以必须格外小心。你通常通过脚本操作来删除表。确保在删除表之前进行了适当的有效性检查。

    例如，如果用户正在删除他们的账户，在检查了删除脚本的其余部分已评估完毕并确认需要删除表之后，才应删除该表。然后你就可以成功地删除一个表了。


    删除表的正确术语是“丢弃”（dropping）该表，这反映在数据库调用的语法中，如下所示：


    ```

    $query = qq{DROP TABLE username_master};

    $sth = $dbh->prepare($query);

    $sth->execute();

    ```


    如你所见，删除表很简单且几乎没有冗余操作。另外，请确保你删除的是正确的表，否则会带来麻烦。


    ## 删除行


    删除表中的一行是一种常见做法，通常通过脚本操作完成。删除数据库中的整行可以通过匹配行中的某个值来实现，以此告诉 MySQL 要删除哪一行。

    正如我之前所说，务必在每个表中都有一个 `autoincrement id` 列。由于这个 `id` 从零开始并向上递增（因此称为 `autoincrement`），即使在拥有数千条记录的表中，这也是标识要删除的单个行的非常安全的方法。

    要在数千行中缩小要删除的行的范围，你会使用 `WHERE` 子句。只需通过 `id` 列匹配要删除的行，就能确保安全地删除表中预期的行。


    查看清单 4-8 中删除行的示例，其中要删除的行是通过该行的 `id` 列找到的。


    ```

    $query = qq{DELETE thisrow FROM master WHERE id = 1234};

    $sth = $dbh->prepare($query);

    $sth->execute();

    ```

    **清单 4-8** 删除行


    你可以看到如何以及在哪里在你的数据库调用中使用 `WHERE` 子句。我在示例中使用 `1234` 作为行标识符。使用变量而不是像示例中那样的静态行名，是一种完全可行且常用的删除方法。

    另请注意，我们使用了 `id` 列名来决定删除该行。我发现，在使用任何类型的数据库时，这种方法都非常宝贵。


    ## 上传文件


    上传文件可能是你在使用 Perl 和 MySQL 的过程中会遇到的最复杂的操作。实际用于上传文件的 Perl 脚本超出了本书当前章节的范围，但在你开始考虑为未来使用编写上传脚本之前，你必须了解一些事项。


    当你处理文件上传时，首先要考虑的是 HTML 表单元素必须反映要上传文件这一事实。检查以下 HTML 表单语句：

    '
- fmt: '# Managing Images and Files


    ## Managing files


    Managing files via scripted action can be confusing for the newbie developer.
    While there are many Perl modules that can be used to manage your file collection,
    you don’t have to use them. Once again, use the backtick (`` ` ``) operator.


    The backtick operator allows you to make system calls directly to the server’s
    operating system. Most Internet servers run the Linux operating system, so all
    of the database calls we’ll make in the coming chapters will reflect this.


    In web development, for every file, there are two locations. The first is the
    URL, which is the file’s location that your users will see via the browser. The
    second is the file’s location within the server’s operating system.


    We’ll be primarily working with the latter file location `–` the place the file
    resides on the server. All Linux servers use basically the same commands when
    it comes to dealing with files, so do use the backtick operator liberally.


    As you can see, there are a couple of things to include in a form that wouldn’t
    usually be there. The first is the `ENCTYPE`, which in the example is set to `"multipart/form-data"`.
    This tells the browser, then the server, that an upload of several parts is being
    uploaded. The first part is the `ENCTYPE`, which will hold the name of the file
    as well as a different data container that will hold the digital coding of the
    file itself.


    The next part of the form that has changed is the `type`, which is set to `"file"`.
    This tells the browser to display a form element that has a Select button and
    a small space to show the file name.


    Click the “Select” button, and a dialog box appears with your computer’s file
    system shown within it. Navigate to the desired file, click it once to select
    it, and click the OK button.


    The file name, now selected, will be displayed next to the button. Click the Submit
    button and your file will be uploaded to the script given in the form.


    Depending on your browser, you should see a progress indicator somewhere that
    shows, as a percentage of the total size of the file, how much of the file has
    been uploaded and therefore how much more that has to still be uploaded.


    ## Summary


    This was a fun chapter. We explored date and time formatting, loading your links,
    and the external content template. A few SQL commands were studied, and we discussed
    concerns regarding gathering your database-generated content and applying HTML
    markup. We also opened discussions on file and image uploads, topics that will
    be expanded in the chapters to come.


    # 5. Understanding the Document Object Model (DOM)


    Now that we’ve covered the basics, we’ll delve into the intricacies of the Document
    Object Model, or DOM for short. As its name implies, DOM is the process of accessing
    and perhaps changing the properties of the individual objects that comprise your
    HTML document.


    Every object in your page has a certain set of properties associated with it.
    Those properties are the equivalent of the attributes of a page element. Each
    of these attributes or rules may be changed or set by a simple DOM statement or
    by a more in-depth JavaScript function. We’ll concentrate for the time being on
    the more simple DOM statements, accumulating your knowledge until a JavaScript
    function will make sense to you, the reader.


    You’ll see as you progress through the following chapters that the specific implementation
    of the DOM language is different from browser to browser and from operating system
    platform to platform. In this section of this book, you’ll see that some of the
    DOM statements for the major browsers differ slightly in their implementation.
    The valid DOM statements for each browser are included with the reference for
    each object, property, method, and event handler.


    In an effort to alleviate the confusion caused by the individual implementations
    of DOM by the major browsers, the W3C is working on a universal standard which
    will hopefully be embraced by the major browser vendors. Until then, we’ll just
    have to slug it out with the varying uses and implementations of DOM and its associated
    languages.


    Within the DOM specifications, there are five separate components that are used
    to construct a valid and complete DOM statement. They are as follows:


    1.  Objects

    2.  Methods

    3.  Arrays

    4.  Properties

    5.  Values


    While you most likely won’t use all of the preceding components in one statement,
    you must know and understand the capabilities of each. The easiest way to learn
    is to just dive right in. With that in mind, consider the following valid DOM
    statement. Try to spot the HTML tag and attribute which this statement reflects.
    Drawing on the knowledge gleaned from previous chapters, you’ll find that it is
    very easy to do.


    ```

    document.body.alink = "red"

    ```'
