    ## Code Block Three


    Now comes the BODY of the document. The HTML markup we’re exploring is simple
    and intuitive even if you only have a glimmer of what is entailed in writing document
    content. We begin with a simple table declaration that shows the basic dimensions
    of the table followed by further table data, utilized by `TR` and `TD` elements.
    Note that the bottommost block of markup shows two columns, side by side. This
    will translate into a multicolumn menu when the `visible()` method is toggled.


    ```html

    &nbsp;&nbsp;Heading 01


    List Item


    List Item


    Heading 02&nbsp;&nbsp;


    List Item


    List Item


    List Item


    List Item

    ```


    Take note of how the menu data is placed in the document. You can have as many
    drop-down menu windows as you can fit on a page. Of particular import are the
    `id` and `name` attributes. They are stated in multiple locations to ensure the
    menu data is displayed in the right menu.


    ## Begin Code Block Four


    Block four consists of the declaration of a simple table that encapsulates an
    `iFrame`. As you might have noticed in an earlier code example, all of the anchor
    elements had the `target` attribute set to `output`. The `iFrame` is designated
    as `output` via the `name` attribute. Because of this, the output of the scripts
    will be written to the `iFrame`. The entire page won’t refresh, only the contents
    of the `iFrame`. All of the scripts in this chapter are put together in this way
    so all output is written to the `iFrame`.


    As you can see, the file named `empty.html` is first loaded into the `iFrame`
    window. This could just as easily have been a fully formed Perl script that is
    able to perform database interactions and then write the generated content to
    the `iFrame`.


    ## Summary


    In this chapter, we explored the creation of a simple but functional database-driven
    drop-down menu system. Drop-down menu systems are here to stay. Now you know how
    to create a basic drop-down menu, but you can also play around with it and add
    features.


