  raw: 'Return the Cursor’s Coordinates

    If you’re going to be using any type of positioning in your web

    development, it will be absolutely necessary to know and understand how

    coordinates are recalculated, returned, and altered by the browser.

    Coordinates in a

    browser are represented by the X axis and Y axis. Each has their own

    objects and methods to read or alter the X and Y values built in to the

    browser.

    We’ll use the event.clientX and event.clientY attributes to return

    the values of the current position of the exact tip of the mouse pointer

    as it sits on the web page the moment the function is triggered. The

    value is returned very quickly, and you can act on and alter that value

    through scripted action just as quickly.


    You’ll see this code in every page you’ve seen that has movable buttons

    or flying banners. It’s a universal operation, so it’s best to take a

    long look at it and commit it to memory. It’s much simpler than it

    sounds.


    ```


    function show_coords(event) {

    x=event.clientX;

    y=event.clientY;

    alert("X coords: " + x + ", Y coords: " + y);

    }


    Click Anywhere To Return The Mouse Position


    Listing 6-35

    Returning the cursor’s coordinates

    ```


    Notice how easy this is? It is very important, though. The script is

    set up to show an alert box when you click anywhere on the document, as

    shown through the use of the onClick event handler that has been placed

    as an attribute of the BODY element.


    Make Your Text Follow the Cursor

    You can instruct the browser to have a string of text follow the cursor

    around anywhere in the active window. We first determine the X and Y

    coordinates of the mouse pointer. Then we determine some idea as to what

    the text should look like and assign them with common CSS rules.

    Positioning is determined and the text is set to follow the pointer,

    while the X and Y coordinates are being generated and passed along the

    bubbling order of the JavaScript functions in the head of the

    document.

    The text is actually always there – we just set it to hidden with the

    style.visibility

    attribute and to visible when we need to. The onMouseMove event

    handler triggers the JavaScript functions when you move the cursor on

    the X or Y axis 1 pixel. If you stay still, so will the text.


    To have a finer degree of control over the rendering of the moving – if

    it looks jerky – just alter the amount that the X or Y axis is

    incremented with every iteration of the script. A smaller value will

    result in a smoother look but might lag a little behind if you’re

    showing a lot of text trailing behind the cursor or if the computer is

    being used heavily. If this is a concern, increase the increment of the

    positioning and the text will move quicker and will stay with the

    cursor.


    ```


    function cursor(event) {

    document.getElementById(''trail'').style.visibility="visible";

    document.getElementById(''trail'').style.position="absolute";

    document.getElementById(''trail'').style.left=event.clientX+10;

    document.getElementById(''trail'').style.top=event.clientY;

    }


    Cursor Text


    Listing 6-36

    Making the text follow the pointer

    ```


    You can assign an image to follow the cursor as well. Just state a

    simple IMG element with the same given preceding attributes for the

    textual version. The coordinate system works the same for text as it

    does for images, as it’s initially based not on the location of the text

    or image, but on the position of the mouse pointer.


    Summary

    We covered a lot of ground in this chapter. We explored how HTML,

    CSS, DOM, and JavaScript work together in a web page. We touched on

    formatting and design. We introduced concepts such as creating and

    loading variables and arrays – and using what is contained within

    them.


    7. Installing and Using the Perl

    Server


    This chapter is

    brief, as there is only so much you need to know to install and use a

    Perl server. For the most part, most operations are simple and

    intuitively obvious.


    Where’s Perl?

    As mentioned in a previous chapter, the first line

    of any Perl script is called the *shebang*. It is

    the location on the hard drive of the Perl executables. On Linux

    operating systems, it’s usually #!/usr/bin/perl.

    On the Windows

    operating system, the location of Perl is a little convoluted and

    not very intuitive. All of the Perl .msi packages

    available install directly to c:\Program Files\Perl\bin\perl.exe. This

    has the very irritating drawback of the space between the word Program

    and the word Files throwing errors because scripts and other programs

    get stuck by that pesky space. To counter that, the path to Perl should

    be #!c:/progra~1/perl/bin/perl.exe.

    I recommend installing Perl to the root of the C drive, as follows:

    C:\Perl\bin\perl.exe. You would have to specify this during the

    installation of the Perl binaries.


    Preparing Your Workstation

    As with most software installations, you will have to close all

    programs, being sure to save your work first. Once all programs are shut

    down and your work is saved, double-click the .msi package you

    downloaded to begin the installation. The name of this .msi package

    depends on the flavor of Perl you decided to use.


    Installing the Perl Server

    Once you click the .msi

    package, the

    installation will be halted by a window that asks for permission for the

    installing program to make changes to your operating system and install

    the program. If you decline, the installation promptly halts.

    There will invariably be a logo screen as the first window of the

    install program. Some flavors of Perl put the End User License Agreement

    in the first window. If the agreement isn’t on the first window, it’ll

    be on the second. Click “I Agree” to accept the terms of the

    contract.

    Next up is a window that either asks what to install or where to

    install it to on your hard drive. This location, by default, is

    C:\Program Files\Perl for a Windows workstation and #!/usr/bin/perl for

    a Linux workstation.

    If the second window wasn’t the

    installation option, the third will be. I recommend you install

    everything. This includes the Perl executables and support libraries as

    well as the literature on the use of your Perl server. Including the

    literature increases the install time by about two minutes.


    Topics to Consider

    One of the topics to consider during installation is simply the

    location of Perl. I recommend your path on a Windows operating system be

    C:\Perl. This goes

    against the default path, but you’ll actually benefit from it further

    down the road.

    Some programs don’t like the space between Program and Files if you

    were to use the default path during installation. There is a workaround

    to this, which is a bit unintuitive. The path C:\Progra~@\Perl is the

    path that some programs that don’t like the space will require to

    operate. Installing to C:\Perl allows these

    legacy programs to find Perl without adding extra work such as including

    PATH statements, which is a direct change to the operating system and is

    beyond the scope of this book.


    Perl Is Always Ready

    One of the best things about Perl is you don’t have to start a server

    or service to use the full capabilities of the Perl server. It is always

    ready to take on work. The first line of every Perl script gives the

    location to the Perl executables. The Perl server springs into action

    with minimal fuss.

    Perl is an inline

    language, meaning that execution begins at the top of the script

    and moves down, following the instructions as they are placed within the

    body of the script.'
  trans: "\n# 返回光标坐标\n\n如果您要在网页开发中使用任何类型的定位功能，了解并理解浏览器如何重新计算、返回和修改坐标是绝对必要的。\n\n浏览器中的坐标由\
    \ X 轴和 Y 轴表示。浏览器内置了各自独立的对象和方法来读取或修改 X 和 Y 值。\n\n我们将使用 `event.clientX` 和 `event.clientY`\
    \ 属性来返回函数触发时，鼠标指针尖端在网页上当前位置的精确坐标值。该值会非常快速地返回，您也可以通过脚本操作同样迅速地对该值进行操作和修改。\n\n您会在任何具有可移动按钮或飘浮横幅的页面中看到这段代码。这是一个通用操作，因此最好仔细研究并记住它。它比听起来简单得多。\n\
    \n```javascript\nfunction show_coords(event) {\n    x = event.clientX;\n    y\
    \ = event.clientY;\n    alert(\"X coords: \" + x + \", Y coords: \" + y);\n}\n\
    ```\n\n点击任意位置以返回鼠标位置\n\n列表 6-35\n返回光标坐标\n\n注意到这有多简单了吗？不过，这非常重要。该脚本设置为在您点击文档任意位置时显示一个警告框，这是通过作为\
    \ `BODY` 元素属性放置的 `onClick` 事件处理程序来实现的。\n\n# 让文本跟随光标\n\n您可以指示浏览器让一串文本在活动窗口内跟随光标移动。我们首先确定鼠标指针的\
    \ X 和 Y 坐标。然后我们确定文本应该呈现的样式想法，并使用常见的 CSS 规则来分配它们。\n\n定位被确定，文本被设置为跟随指针，同时 X 和 Y\
    \ 坐标在文档头部的 JavaScript 函数的冒泡顺序中被生成和传递。\n\n文本实际上一直存在——我们只是用 `style.visibility` 属性将其设置为隐藏，并在需要时设置为可见。当您沿\
    \ X 轴或 Y 轴移动光标 1 个像素时，`onMouseMove` 事件处理程序会触发 JavaScript 函数。如果您保持不动，文本也会保持不动。\n\
    \n为了对移动的渲染进行更精细的控制——如果看起来有些抖动——只需修改脚本每次迭代中 X 或 Y 轴递增的量即可。较小的值会使外观更平滑，但如果您在光标后显示大量文本或者计算机使用负载很高，可能会稍微滞后。如果担心这一点，可以增加定位的增量，文本会移动得更快并紧跟光标。\n\
    \n```javascript\nfunction cursor(event) {\n    document.getElementById('trail').style.visibility\
    \ = \"visible\";\n    document.getElementById('trail').style.position = \"absolute\"\
    ;\n    document.getElementById('trail').style.left = event.clientX + 10;\n   \
    \ document.getElementById('trail').style.top = event.clientY;\n}\n```\n\n光标文本\n\
    \n列表 6-36\n让文本跟随指针\n\n您也可以分配一个图像来跟随光标。只需为图像版本声明一个简单的 `IMG` 元素，并使用与文本版本相同的前述属性即可。坐标系统对文本和图像的工作方式相同，因为它最初不是基于文本或图像的位置，而是基于鼠标指针的位置。\n\
    \n# 总结\n\n我们在本章中涵盖了很多内容。我们探讨了 HTML、CSS、DOM 和 JavaScript 如何在网页中协同工作。我们涉及了格式和设计。我们介绍了诸如创建和加载变量与数组——以及使用其中包含的内容等概念。\n\
    \n# 7. 安装和使用 Perl 服务器\n\n本章内容简短，因为安装和使用 Perl 服务器需要了解的知识就这么多。在大多数情况下，操作都很简单且直观明了。\n\
    \n## Perl 在哪里？\n\n如前一章所述，任何 Perl 脚本的第一行被称为 *shebang*。它是 Perl 可执行文件在硬盘上的位置。在 Linux\
    \ 操作系统上，通常是 `#!/usr/bin/perl`。\n\n在 Windows 操作系统上，Perl 的位置有点复杂且不太直观。所有可用的 Perl\
    \ `.msi` 软件包都直接安装到 `c:\\Program Files\\Perl\\bin\\perl.exe`。这有一个非常恼人的缺点，即单词 Program\
    \ 和单词 Files 之间的空格会导致错误，因为脚本和其他程序会被这个讨厌的空格卡住。为了解决这个问题，Perl 的路径应该是 `#!c:/progra~1/perl/bin/perl.exe`。\n\
    \n我建议将 Perl 安装到 C 盘的根目录，如下所示：`C:\\Perl\\bin\\perl.exe`。您必须在安装 Perl 二进制文件时指定此路径。\n\
    \n## 准备您的工作站\n\n与大多数软件安装一样，您需要关闭所有程序，并务必先保存您的工作。所有程序关闭并保存工作后，双击您下载的 `.msi` 软件包开始安装。此\
    \ `.msi` 软件包的名称取决于您决定使用的 Perl 版本。\n\n## 安装 Perl 服务器\n\n单击 `.msi` 软件包后，安装将被一个窗口中断，该窗口要求安装程序获得对您的操作系统进行更改并安装程序的许可。如果您拒绝，安装将立即停止。\n\
    \n安装程序的第一个窗口总会有一个徽标屏幕。某些版本的 Perl 将最终用户许可协议放在第一个窗口中。如果协议不在第一个窗口，那它就在第二个窗口。单击“我同意”以接受合同条款。\n\
    \n接下来是一个窗口，询问要安装什么或安装到硬盘的哪个位置。默认情况下，对于 Windows 工作站，此位置是 `C:\\Program Files\\Perl`，对于\
    \ Linux 工作站是 `#!/usr/bin/perl`。\n\n如果第二个窗口不是安装选项，那么第三个窗口将是。我建议您安装所有内容。这包括 Perl\
    \ 可执行文件和支持库，以及关于如何使用 Perl 服务器的文档。包含文档会使安装时间增加大约两分钟。\n\n## 需要考虑的主题\n\n安装期间需要考虑的主题之一就是\
    \ Perl 的位置。我建议您在 Windows 操作系统上的路径为 `C:\\Perl`。这与默认路径相悖，但您将来实际上会从中受益。\n\n如果您在安装时使用默认路径，某些程序不喜欢\
    \ Program 和 Files 之间的空格。有一个变通方法，但有点不直观。一些不喜欢空格的程序需要路径 `C:\\Progra~@\\Perl` 才能运行。安装到\
    \ `C:\\Perl` 允许这些遗留程序找到 Perl，而无需添加额外的工作，例如包含 `PATH` 语句（这是对操作系统的直接更改，超出了本书的范围）。\n\
    \n## Perl 随时待命\n\nPerl 最好的一点是，您无需启动服务器或服务即可使用 Perl 服务器的全部功能。它总是准备好接受工作。每个 Perl\
    \ 脚本的第一行给出了 Perl 可执行文件的位置。Perl 服务器会以最小的麻烦迅速启动。\n\nPerl 是一种内联语言，意味着执行从脚本顶部开始，向下移动，按照放置在脚本主体中的指令执行。\n"
- fmt: '# Installing Perl Modules


    On a Perl server, extra functionality comes from Perl modules. A Perl module is
    a software package that enhances and extends the capabilities of your standard
    Perl installation. The most oft-used Perl modules come standard with the installation
    binaries and can be identified by their `.pm` extension. Two Perl modules that
    we’ll be using extensively are `DBD.pm` and `DBI.pm`. They allow interaction between
    the Perl script and the database server (that you’ll install in the next chapter).


    There are two methods of installing a Perl module – using `CPAN.bat` and `PPM.bat`.
    They both work fine most of the time, but since there are thousands of Perl modules
    to choose from, you might have to switch between `CPAN` and `PPM` in order to
    have a successful installation. That is, if one doesn’t work, try the other.


    There are some modules that rely on other modules to complete their functionality.
    The aforementioned `DBD.pm` has to be installed before `DBI.pm` is installed,
    for example. If you leave out `DBD.pm` and only install `DBI.pm`, you’ll get fatal
    errors to be thrown. Most of the time, the installing program knows what modules
    need to be installed and installs them automatically, with minimum fuss.


    ## CPAN.bat


    `CPAN` stands for Comprehensive Perl Archive Network. It is the means by which
    you’ll be installing the Perl modules used in the projects in later chapters.
    The website for the Perl modules is `CPAN.org`. It is an easy-to-use and complete
    list of all of the functionality that Perl has to offer.


    To start `CPAN.bat`, simply double-click the link that you’ll find in the `Perl/bin`
    directory. A dialog box will open with a flashing cursor, signifying that `CPAN.bat`
    is ready to work. Then type a question mark at the command prompt, and the `CPAN.bat`
    help options will appear as shown in Figure 7-1.


    ![](images/485616_2_En_7_Chapter/485616_2_En_7_Fig1_HTML.jpg)


    *A screenshot of an output window titled C slash window slash systems 32 slash
    C M D. E X E. The page includes display information, command arguments, upgrade
    installed modules, pragmas, and others.*


    **Figure 7-1**

    CPAN.bat help options


    Simply type instructions such as:

    ```

    Install DBD

    ```

    and `CPAN.bat` will chug and install the `DBD.pm` module. Do this before `DBI.pm`
    is installed, as stated earlier in this chapter. As mentioned before, `CPAN.bat`
    usually knows what libraries are required to install the full capabilities of
    each module.


    ## The Perl Package Manager (PPM)


    The Perl Package Manager is the other means to install Perl modules. Some say
    it’s easier to use, and this is probably the case, but there are restrictions
    on what `PPM` can do. For example, `CPAN.bat` knows what libraries to install
    for pretty much every module created to date. `PPM` doesn’t have a comprehensive
    database, so sometimes `PPM` won’t work.


    As with `CPAN.bat`, simply double-click the `ppm.bat` windows batch file. A command
    dialog box will be displayed. Enter the word `help` at the command prompt and
    the screen in Figure 7-2 will appear.


    ![](images/485616_2_En_7_Chapter/485616_2_En_7_Fig2_HTML.jpg)


    *A screenshot of an output window titled C slash windows slash system 32 slash
    C M D. E X E. The page displays P P M interactive shell, type, and lists of commands
    below.*


    **Figure 7-2**

    PPM.bat


    As you can see, `PPM` is easier to use than `CPAN.bat` due to its lack of optional
    commands. While most modules will install just fine, be ready for when one or
    two modules you require won’t install with `PPM`.


    ## Commonly Used Perl Modules


    As you’ll see in a later chapter, there is a module for pretty much everything
    that is possible on the Internet to date. Also mentioned was the fact that some
    Perl modules require that supporting modules be installed first.


    In the projects to come in later chapters, you’ll see the list of Perl modules
    required for the Perl scripts to work stated at the top of every script. I’ve
    found that the most oft-used modules that aren’t in the standard distribution
    are as follows:


    - `Size.pm`

    - `Resize.pm`

    - `File::Copy`

    - `Image::Magick`


    They are all intuitively obvious as to what they do by their names. `Size.pm`
    is used to return the size, measured in pixels, of an image. `Resize.pm` is used
    to resize an image to a larger or smaller size. As with all things Perl, there
    are a couple of details to keep in mind. Both the `Size.pm` and `Resize.pm` modules
    will only work with `jpg` (jpeg), `gif`, and `png` file formats.


    The `Image::Magick` module requires that its software package be installed on
    your server in order to be able to access the higher capabilities of the `Image::Magick`
    module. There are both source code (for Linux) and binaries (for Windows) available
    to be downloaded and installed. The installation is very easy and simple on both
    operating systems. `Image::Magick` supports pretty much every image file format
    in creation. With it, you can manipulate images via scripted action, as touched
    on in Chapter 6.


    ## Summary


    In this chapter, we installed Perl and reviewed the finer points of a typical
    Perl installation. We discussed Perl modules and how they work. We also explored
    installing Perl modules with `CPAN.bat` and `PPM.bat`.


    # 8. Installing and Using the MySQL Database Server


    The MySQL database server has been around for years and as such is a robust and
    practical piece of software. Its features are many and are powerful. MySQL is
    the most oft-used database in the world. It has to be good to earn that designation.
    Quite the accomplishment. Even compared to giant database vendors like Oracle,
    MySQL stands up to the task. SQL (Structured Query Language) is a simple database
    language to learn, and the server is easy to install, use, and configure. MySQL
    is a memory-resident piece of software, meaning that the entire functional pieces
    of the server are loaded into memory and are ready to execute queries without
    pausing to load more software into memory to accomplish the task at hand.


    ## Locating and Downloading the MySQL Server Binaries


    The software you’re looking for to install the MySQL server is available from
    `MySQL.com`. They offer the MySQL database for free. The pay ware package is for
    production environments that require high-level functionality such as clustering
    and other technologies that are required to accommodate high-traffic networks.
    They sell you the software, and it comes with technical support options. Most
    believe it is a better piece of software than the free flavor, and in terms of
    capability, they’re right. The binary package from `MySQL.com` is designed for
    websites and doesn’t offer support for clustering or database farms.


    ## What’s a Beta?


    If you’ve installed software in the past, you’ve probably run past an option to
    download a beta. Betas are software pieces that are in the process of being debugged.
    They are written but still contain errors or omissions. Expect errors from a beta.
    It is not recommended that you use a beta for your active database server, as
    there is going to be errors that will cause headaches to ensue. They’re fun to
    play around with, but running it live will just frustrate you.


    ## Preparing Your Workstation


    It is recommended that you save all of your work and close down any active software
    before you start the installation process. Having software run that might interfere
    or be incompatible with the server is a real threat to the basic health of your
    installation as well as the workstation as a whole. It is also recommended that
    you restart the workstation before you begin the installation. This will ensure
    you’re working with an operating system that is not running with errors or shortcomings
    instituted by other software.'
