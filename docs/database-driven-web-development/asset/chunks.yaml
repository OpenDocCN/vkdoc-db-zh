    ```javascript

    function showmenu(elmnt) {

    document.getElementById(elmnt).style.visibility="visible";

    }

    function hidemenu(elmnt) {

    document.getElementById(elmnt).style.visibility="hidden";

    }


    代码清单 11-4

    getElementById() 语句的语法

    ```


    这段代码，即代码清单 11-4，将 `visibility()` 切换为 `visible` 或 `hidden`。我们在此这样做的原因是，我们希望整个文档都能选择使用下拉菜单。每次都将你的
    JavaScript 代码插入到文档的头部始终是一个好主意。


    ## 代码块三


    现在进入文档的 BODY 部分。我们正在探讨的 HTML 标记简单而直观，即使你对编写文档内容所涉及的内容只有模糊的了解。我们从一个简单的表格声明开始，该声明显示了表格的基本维度，然后是进一步的表格数据，由
    `TR` 和 `TD` 元素使用。请注意，最底部的代码块显示了两列，并排排列。当 `visible()` 方法被切换时，这将转化为多列菜单。


    ```html

    &nbsp;&nbsp;标题 01


    列表项


    列表项


    标题 02&nbsp;&nbsp;


    列表项


    列表项


    列表项


    列表项

    ```


    请注意菜单数据是如何放置在文档中的。你可以在一个页面上放置尽可能多的下拉菜单窗口。特别重要的是 `id` 和 `name` 属性。它们在多个位置声明，以确保菜单数据显示在正确的菜单中。


    ## 开始代码块四


    代码块四包含一个封装了 `iFrame` 的简单表格的声明。正如你可能在之前的代码示例中注意到的，所有的锚点元素都将 `target` 属性设置为 `output`。`iFrame`
    通过 `name` 属性被指定为 `output`。因此，脚本的输出将被写入 `iFrame`。整个页面不会刷新，只有 `iFrame` 的内容会刷新。本章中的所有脚本都以这种方式组合在一起，因此所有输出都被写入
    `iFrame`。


    正如你所看到的，名为 `empty.html` 的文件首先被加载到 `iFrame` 窗口中。这原本也可以是一个功能完整的 Perl 脚本，该脚本能够执行数据库交互，然后将生成的内容写入
    `iFrame`。


    ## 总结


    在本章中，我们探讨了一个简单但功能齐全的数据库驱动的下拉菜单系统的创建。下拉菜单系统将长期存在。现在你知道了如何创建一个基本的下拉菜单，但你也可以尝试使用它并添加功能。


