    # 安装 Perl 模块


    在 Perl 服务器上，额外的功能来自于 Perl 模块。Perl 模块是一个软件包，用于增强和扩展标准 Perl 安装的功能。最常用的 Perl 模块随安装二进制文件标准提供，并可通过其
    `.pm` 扩展名识别。我们将广泛使用的两个 Perl 模块是 `DBD.pm` 和 `DBI.pm`。它们允许 Perl 脚本与数据库服务器（您将在下一章中安装）进行交互。


    安装 Perl 模块有两种方法——使用 `CPAN.bat` 和 `PPM.bat`。大多数情况下它们都能正常工作，但由于有数千个 Perl 模块可供选择，您可能需要在
    `CPAN` 和 `PPM` 之间切换才能成功安装。也就是说，如果一种方法不起作用，请尝试另一种。


    有些模块依赖其他模块来完成其功能。例如，前面提到的 `DBD.pm` 必须在安装 `DBI.pm` 之前安装。如果您遗漏了 `DBD.pm` 而只安装了 `DBI.pm`，将会引发致命错误。大多数情况下，安装程序知道需要安装哪些模块并会自动安装它们，过程非常简便。


    ## CPAN.bat


    `CPAN` 代表 Comprehensive Perl Archive Network（综合 Perl 档案网）。它是您将在后续章节项目中安装 Perl
    模块的方式。Perl 模块的网站是 `CPAN.org`。它是 Perl 提供的所有功能的易用且完整的列表。


    要启动 `CPAN.bat`，只需双击您在 `Perl/bin` 目录中找到的链接。将打开一个带有闪烁光标的对话框，表示 `CPAN.bat` 已准备就绪。然后在命令提示符处输入问号，`CPAN.bat`
    的帮助选项将如图 7-1 所示出现。


    ![](img/485616_2_En_7_Fig1_HTML.jpg)


    *一个标题为 C slash window slash systems 32 slash C M D. E X E 的输出窗口截图。页面包含显示信息、命令参数、升级已安装模块、指令和其他。*


    **图 7-1**

    CPAN.bat 帮助选项


    只需输入如下指令：

    ```

    Install DBD

    ```

    `CPAN.bat` 就会开始工作并安装 `DBD.pm` 模块。如本章前面所述，请在安装 `DBI.pm` 之前执行此操作。如前所述，`CPAN.bat`
    通常知道安装每个模块的全部功能需要哪些库。


    ## Perl 包管理器 (PPM)


    Perl 包管理器是安装 Perl 模块的另一种方法。有人说它更易用，可能确实如此，但 `PPM` 的功能存在限制。例如，`CPAN.bat` 知道迄今为止创建的几乎每个模块所需安装的库。`PPM`
    没有一个全面的数据库，因此有时 `PPM` 无法工作。


    与 `CPAN.bat` 一样，只需双击 `ppm.bat` Windows 批处理文件。将显示一个命令对话框。在命令提示符处输入单词 `help`，将出现如图
    7-2 所示的屏幕。


    ![](img/485616_2_En_7_Fig2_HTML.jpg)


    *一个标题为 C slash windows slash system 32 slash C M D. E X E 的输出窗口截图。页面显示 P P M 交互式
    shell，键入和下方的命令列表。*


    **图 7-2**

    PPM.bat


    如您所见，由于缺少可选命令，`PPM` 比 `CPAN.bat` 更易于使用。虽然大多数模块都能顺利安装，但要做好准备，当您需要的一两个模块无法用 `PPM`
    安装时。


    ## 常用 Perl 模块


    正如您将在后面的章节中看到的，几乎对于目前互联网上可能实现的任何事情，都有一个相应的模块。之前也提到过，有些 Perl 模块需要先安装支持模块。


    在后续章节的项目中，您将在每个脚本的顶部看到 Perl 脚本工作所需的 Perl 模块列表。我发现标准发行版中最常用的模块如下：


    - `Size.pm`

    - `Resize.pm`

    - `File::Copy`

    - `Image::Magick`


    从它们的名称就可以直观地看出它们的用途。`Size.pm` 用于以像素为单位返回图像的大小。`Resize.pm` 用于将图像调整为更大或更小的尺寸。与所有
    Perl 事物一样，有几点需要注意。`Size.pm` 和 `Resize.pm` 模块都只适用于 `jpg` (jpeg)、`gif` 和 `png` 文件格式。


    `Image::Magick` 模块需要在您的服务器上安装其软件包，才能访问 `Image::Magick` 模块的高级功能。有源代码（用于 Linux）和二进制文件（用于
    Windows）可供下载和安装。在两种操作系统上安装都非常简单容易。`Image::Magick` 支持几乎所有现有的图像文件格式。借助它，您可以通过脚本操作来处理图像，正如第
    6 章所提及的。


    ## 总结


    在本章中，我们安装了 Perl 并回顾了典型 Perl 安装的要点。我们讨论了 Perl 模块及其工作原理。我们还探讨了如何使用 `CPAN.bat` 和
    `PPM.bat` 安装 Perl 模块。


    # 8. 安装和使用 MySQL 数据库服务器


    MySQL 数据库服务器已存在多年，因此它是一款健壮且实用的软件。其功能众多且强大。MySQL 是世界上使用最广泛的数据库。要获得这个称号，它必须足够优秀。这是一项相当了不起的成就。即使与
    Oracle 这样的大型数据库供应商相比，MySQL 也能胜任。SQL（结构化查询语言）是一种易于学习的简单数据库语言，而服务器本身也易于安装、使用和配置。MySQL
    是一款内存驻留型软件，这意味着服务器的所有功能部件都加载到内存中，准备好执行查询，而无需暂停以将更多软件加载到内存来完成手头的任务。


    ## 定位和下载 MySQL 服务器二进制文件


    您要安装 MySQL 服务器的软件可以从 `MySQL.com` 获取。他们免费提供 MySQL 数据库。付费软件包适用于需要高级功能（如集群和其他用于容纳高流量网络所需技术）的生产环境。他们向您销售该软件，并附带技术支持选项。大多数人认为它比免费版本更好，就功能而言，他们是对的。来自
    `MySQL.com` 的二进制包是为网站设计的，不提供对集群或数据库场的支持。


    ## 什么是 Beta 版？


    如果您过去安装过软件，您可能遇到过下载 Beta 版的选项。Beta 版是处于调试过程中的软件片段。它们已经编写完成，但仍包含错误或遗漏。请预期 Beta
    版会出现错误。不建议您在活动的数据库服务器上使用 Beta 版，因为其中存在的错误将导致麻烦接踵而至。它们玩玩很有趣，但在实际生产环境中运行只会让您感到沮丧。


    ## 准备您的工作站


    建议您在开始安装过程之前保存所有工作并关闭任何活动的软件。运行可能干扰服务器或与服务器不兼容的软件，确实会对您的安装以及整个工作站的基本健康构成威胁。还建议您在开始安装前重新启动工作站。这将确保您使用的是一个未因其他软件而引入错误或缺陷的操作系统。

