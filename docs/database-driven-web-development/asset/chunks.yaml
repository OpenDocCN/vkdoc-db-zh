  trans: '# 3. MySQL 核心技能


    ## 摘要

    在本章中，我们探讨了 Perl 与 DBI 模块协同工作以实现各种强大操作的不同方式。我们研究了数据库结构以及选择或插入相关数据的方法。


    在深入探讨构成本书项目的脚本之前，我们应先打好基础。在本章中，我们将回顾一些必要的技能，以便理解后续内容。您可能已经熟悉这些概念，但在将其应用于实际运行的脚本之前进行复习总是有益的。


    本章我们将梳理项目中将要使用的函数。我们仅涵盖项目中会用到的函数——例如，我们不会涵盖 DBI 模块提供的所有功能。


    ## MySQL 列与索引类型

    MySQL 中提供了多种不同的数据类型，您可以定制数据库表以接受它们。从常见的文本字符到二进制信息，都可以提供支持。任何有效的数据类型都可以使用。有效类型例如数字或字符串。


    列类型在创建表时声明。有许多不同的类型，我们将在后续章节中逐一介绍。虽然我们在项目中不会用到每一种列类型，但了解和理解可用类型的完整范围至关重要。如果您计划扩展其中一个项目（例如一个功能齐全的公告板系统），这些知识将派上用场。


    ### 整数列类型

    我们从整数列类型开始。整数列类型是一种数字类型的列，仅用于存储数字——如果您尝试插入文本，MySQL 将抛出错误。


    整数类型范围非常广泛——可用的有符号数字范围巨大。所谓有符号，是指包含负数表示。请注意，正数的范围比相应的负数范围少一。这是因为数字零仍被视为整数。零是一个值——不应与空值混淆，后者被视为值的缺失。


    ### 浮点数列类型

    浮点数列类型是指包含小数点的列类型。小数点可以从一个位置“浮动”到另一个位置，因此得名浮点数。


    当整数列类型的范围对于手头的任务来说不够高或不够低时，通常使用浮点数。需要注意的是，浮点数是近似值——MySQL 会将浮点数四舍五入到您在创建表时定义的小数位数。


    ### 字符串列类型

    字符串类型包括 `CHAR` 或 `VARCHAR`。`CHAR` 代表“字符”，`VARCHAR` 代表“可变字符”。在创建表时会为列设置一个固定长度。如果数据的长度短于声明的
    `CHAR` 或 `VARCHAR` 长度，剩余空间将用空格填充。需要注意的是，如果您插入的值本身设计上就带有尾随空格，这些空格将被移除。您必须在 Perl
    脚本中处理这种情况，以添加尾随空格。


    如果您需要一个二进制、区分大小写的 `CHAR` 或 `VARCHAR` 列，请使用 `BINARY` 标志进行设置。如果存在 `BINARY` 标志，则该列在用于排序或比较时区分大小写。否则，字符串不区分大小写。


    ### BLOB 列类型

    `BLOB` 列类型具有可变宽度。`BLOB` 代表二进制大对象。它们能够存储非常大的数据集，并且不会修剪尾随空格。`BLOB` 列区分大小写。超过最大长度的值将被截断。`BLOB`
    类型不能有默认值。


    ### 枚举或集合列类型

    枚举和集合是字符串列，它们具有一组有限的可能值。如果在创建表时未声明任何值，则将插入空字符串。`ENUM` 列类型的最大值为 64 KB（65535 字节），`SET`
    列类型的最大值为 64 字节。


    要向 `ENUM` 列插入值，请使用字符串字面量，即用引号将字符串括起来。要向 `SET` 列插入多个值，请在开闭引号内用逗号分隔这些值。


    ### 时间列类型

    MySQL 提供了广泛的日期和时间戳类型。时间取自 MySQL 数据库所在服务器的操作系统。


    MySQL 能够在 `ORDER BY` 子句中使用时间和日期戳，因此您可以按日期和时间对数据进行排序。如果您希望按日期、时间或两者对表内容进行排序，这个强大的功能就非常方便。


    所有日期和时间值都是整数。如果由于某种原因，您的日期中包含浮点数，MySQL 将四舍五入到以下最接近的有效值：月份值限制在 1 到 12。日期值限制在 1
    到 31。小时值为 0 到 23，而分钟和秒的值范围是 0 到 59。


    ## Perl 与 MySQL 函数回顾

    无论一项技能的深度如何，复习总是好事，因为您总能获得新的视角。在本节中，我们将回顾将在后续章节开始的项目中使用的特定技能。


    从语法上讲，用 Perl 做某件事总有不止一种方法。因此，我将尝试以不止一种方式呈现本节中的每个主题。


    我们声明 `$count` 并将其设置为零。然后声明 `foreach` 循环，并使用 `@col1` 作为参数。我们可以使用 `@col1` 作为参数，因为每个数组的长度相同——没有数据会在插入时被遗漏。我们声明了查询并将其存储在
    `$query` 中。然后我们使用 `prepare()` 准备查询。我们使用 `execute()` 执行查询，并为循环的下一次迭代递增 `$count`，重新开始该过程并插入更多数据。


    请注意，我采用了更纵向的方式来组织查询，将查询的每个元素放在单独的行上。在 Perl 中，您可以将更复杂的代码分解成更易读的形式。这是我的方式。您会找到适合您的方式。另外请注意，为了使这种方法成为可能，您不应使用双引号来定义查询——双引号仅在整个查询位于一行时才有效。将您的查询嵌套在
    Perl 的 `qq{}` 语句中，以允许您的查询跨越多行。


    您可以看到 Perl `DBI` 模块的工作是多么强大和直观。有了它，您能够从数据库中存储和检索任何数据。虽然我们使用了非常简单的示例作为学习工具，但您未来
    `DBI` 操作的复杂性和能力基本上没有限制。限制在于您的技能和想象力——Perl 和 MySQL 完全能胜任这项任务。


    ### 创建表

    创建表是一件直接了当的事情，但您需要先了解一些事项。我们将使用三步法来创建表。我们在第 2 章中介绍过这个三步法。


    创建表时，您首先需要知道将要使用的列类型。您还需要知道列的名称。记住，列名区分大小写，因此请相应地命名您的列。


    在即将到来的项目中，主键是第一列，名为“id”。如代码清单 3-1 中的表创建示例所示，它是一个自增列。'
- fmt: '# Loops


    As you can see, creating a table is a simple but very powerful function. The `id`
    column is an integer and is the primary key of the table. The other `VARCHAR`
    columns range in size from 20 to 250 characters. The 20-character limited columns
    are numbers and the date, all of which will not exceed 20 characters in length.
    The `title` column is set to 250 characters, as it is the title of a thread. The
    maximum character count (defined in a different script within the project) is
    250 characters because it is a descriptive column of the table – the thread name
    may be up to 250 characters. You’ll see this table creation in `putnewthread.cgi`
    within the project we’ll soon be working on, so I won’t show any more of the code
    for now. Please focus on the table structure within the Perl code.


    The most common functions we’ll be using in the project are simple loops. We’ll
    be constructing lists that are accrued via the use of a loop that selects data
    from the database and formats it into an HTML segment. This segment of HTML and
    the data from the database are then added to the final results and are displayed
    in the user’s browser.


    There are two forms of loops used in the project: the `foreach()` loop and the
    `while()` loop. Each is used in slightly different ways and locations, as you’ll
    see in the coming discussions.


    ## The while( ) Loop


    The `while()` loop is used to select one piece of data at a time. If there is
    only one result, it is placed in a scalar variable. If there are multiple results,
    the data is pushed onto an array, as given in Listing 3-2.


    ```perl

    $query = "SELECT id FROM $thistopic WHERE id >= 0 ";

    $sth = $dbh->prepare($query);

    $sth->execute;

    while ($thisvalue = $sth->fetchrow()) {

    push @theseids, $thisvalue;

    };

    ```


    The `while()` loop iterates until there are no more results being pushed onto
    the array by MySQL. Note that the primary key, `id`, is being selected. You’ll
    see a lot of that in the scripts to follow.


    ## The foreach( ) Loop


    We use the `foreach()` loop mostly to construct the final HTML markup that will
    be displayed to the user, although that is not the only place it is used. It can
    also be used to loop through table rows via a previous database call. Using the
    `id` column as a means to limit your database queries is a good place to use a
    `foreach()` loop, as shown in Listing 3-3.


    ```perl

    $count = "0";

    foreach (@theseids) {

    $query = qq{SELECT title, threadid, posts, date

    FROM $thistopic

    WHERE id = $theseids[$count] LIMIT 30};

    $sth = $dbh->prepare($query);

    $sth->execute();

    while (@thisvalue = $sth->fetchrow_array()) {

    push @titles, $thisvalue[0];

    push @threadids, $thisvalue[1];

    push @posts, $thisvalue[2];

    push @date, $thisvalue[3];

    }

    ++$count;

    };

    ```


    This code snippet was taken from `threads.cgi`. It shows a `foreach()` loop that
    will iterate through the loop as long as there is a value (a previously gathered
    array based on the `id` primary key) within `@theseids`. You can also see that
    a `while()` loop is being used to gather data from the database based on the `$theseids[$count]`
    array. We’ll delve further into the workings of a construction such as this in
    a later chapter. For now, this basic construction has been an example of what
    is to come in terms of loops.


    ## Pushing an Array


    By “pushing” an array, it means that a value is being added to the end of an array.
    An array can be likened to a list, with each list item being given an index number,
    starting at zero. Every time you push an array, you’re adding to the end of the
    list. The syntax for pushing an array is as follows:


    ```perl

    push @thisarray, $thisvariable;

    ```


    The scalar variable `$thisvariable` is being added to the end of the list, that
    is, `@thisarray`. Simple.


    We’ll be using this snippet of code in almost every script within the project,
    so it is important that you understand the process now before we start examining
    code in great detail.


    ## Gathering Content


    Every script we’ll be using is a collection of individual sets of data that have
    been formatted into HTML markup. In collecting the data, you do so in a fashion
    that is conducive to being easily formatted. What is usually done once the data
    is collected is the data is placed in the logically ordered HTML markup, which
    can be text within a table or anchor tag links, although you are not limited to
    just those two options. Examine the snippet of code given in Listing 3-4.


    ```perl

    $count = "0";

    foreach (@these_ids) {

    $oneContentElement = qq{

    $thislink[$count] };

    push @endarray, $oneContentElement;

    ++$count;

    };

    ```


    First, a `$count` is declared and is set to zero. We then initiated a `foreach()`
    loop using `@these_ids` as the argument. The newly declared scalar variable, `$oneContentElement`,
    is stuffed with some HTML markup. Notice that there are three separate and distinct
    arrays being used (`@id`, `@id2`, and `@thislink`). Each array’s index items are
    used as the unique data for every iteration of `@these_ids`. Since the `$count`
    is being incremented every time the loop iterates, the data within each of the
    three arrays (three links) changes and is pushed onto `@endarray`.


    It is the entire HTML markup that is pushed onto `@endarray` that is to be displayed
    in the user’s browser. This example contains only the code for three links. In
    the project to come, we’ll be adding images, links, and other useful page elements
    to the mix.


    ## Ordering Your Arrays: Perl reverse( ) vs. MySQL ASC or DESC


    In working with an array, it is sometimes favorable to reverse it and apply formatting
    to the data that has been reversed. There are three options available: one via
    Perl and two via MySQL.


    The Perl `reverse()` function is one such option. You would apply the reversal
    to every array that you are working with. This takes MySQL out of the loop and
    is sometimes favorable in situations where you’ve already retrieved data from
    the database. Use the `reverse()` method as follows:


    ```perl

    @this_new_array = reverse(@this_array);

    ```


    You can see how easy it is to use the `reverse()` function. It is equally easy
    to use the `ASC` (ascending) and `DESC` (descending) clauses via MySQL. Examine
    the following examples:


    ```sql

    $query = qq{SELECT fieldone, fieldtwo FROM this_table

    ORDER BY id ASC};

    ```


    Or


    ```sql

    $query = qq{SELECT fieldone, fieldtwo FROM this_table

    ORDER BY id DESC};

    ```


    Each MySQL statement uses the `id` primary key to organize the data returned –
    what direction the data is actually retrieved from is a function of the `ASC`
    or `DESC` clauses.


    `DESC` orders the information in a descending manner. That is, the data that is
    at the top of the table is also the oldest. A descending order returns the data
    organized from the oldest data on the top of the list to the newest data on the
    bottom of the list. The `ASC` clause places the oldest data at the bottom of the
    list, leaving the newest data at the top of the list.


    There are pros and cons for all three methods of ordering your data. While the
    Perl `reverse()` function is useful, it is the slowest of the three methods. The
    `ASC` and `DESC` methods are faster, since MySQL is written in a faster programming
    language optimized for this kind of operation and is already memory resident.
    What method to use is entirely up to you – tailor to your situation.


