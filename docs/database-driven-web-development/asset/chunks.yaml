    ## 4. Nuts and Bolts

    With all that you have learned so far, there are still a few things that you need
    to know to get the job done. This chapter introduces the skills needed for you
    to expand your working knowledge of database-driven web development.

    We’ll begin with simple date and time formatting and move on to more involved
    topics, such as gathering your data and presenting it to your users via the browser.
    Most of these concepts were introduced as examples of code in previous chapters.
    They were kept as simple as possible to enable you to learn. From now on, I’ll
    be using actual functioning code from the example projects we’ll be discussing
    in the coming chapters. There’s a lot to cover, so let’s get to work.


    ### Date and Time Formatting

    There are a number of different Perl modules that can be used to present the date
    and time to your users. These modules are usually very hefty and slow, and to
    be honest, they aren’t required in most cases. This is because you can take the
    date and time directly from the operating system using the backtick operator (``
    ` ``). The backtick operator is used to make system calls to whatever operating
    system you’re using.

    These modules all use the backtick operator to retrieve the date and time eventually,
    so you can speed things up by doing it yourself. We’ll stick to Linux date and
    time, as this is the most prevalent operating system used on Internet servers.

    You might be asking why there are so many different Perl modules just to format
    the date and time. The answer is there are simply many ways to present the date
    and time. This is what the date and time modules do – format what they get from
    a system call for the date and time into something a little more presentable.
    The reason they’re so large is because they have many different ways to present
    the date and time all in one module. All of this complication translates into
    a slow functioning Perl module.


    The system call syntax to retrieve the date and time on Linux is very simple.
    Examine the following code snippet:


    ```

    $date = `date`;

    ```


    On Linux, the `“date”` command brings up both the date and time down to the last
    second. In this case, these date and time are stored in the `$date` variable,
    which now contains the following:


    ```

    Fri Nov 20 11:18:44 PST 2023

    ```


    You can see that a full representation of both the date and time is given. This
    might not be what you’d like to see as your date or time – this is true in most
    cases. What we need to do now is format the date and time into something more
    aesthetically pleasing. You can do this very simply with the concatenation operator
    (`.`) and the `split()` function, as shown in Listing 4-1.


    ```

    @date_raw   = split(/ /, $date);

    $date_complete = $date_raw[0] . ", " . $date_raw[1] . " " .  $date_raw[2] . ",
    " . " " . $date_raw[5];

    Listing 4-1

    Formatting $date

    ```


    What I just did is split the contents of `$date` on the spaces with the `split`
    function and pushed the results into the `@date_raw` array. I then created `$date_complete`
    and concatenated index numbers 0, 1, 2, and 5 to come to the formatted date:


    ```

    Fri, Nov 20, 2023

    ```


    You can see that I didn’t use the time and time zone, which reside in index items
    3 and 4 (`$date_raw[3]` and `$date_raw[4]`). You can also see from within the
    concatenations that I’ve added commas between index items 0 and 1 and 2 and 5.


    ### Website Parameters

    You’ll eventually need to include parameters in your scripts. Catching and using
    your parameters is a common occurrence, so you’ll have to fully understand their
    use.

    Know a website parameter as the jumble of letters, numbers, and special characters
    that come after the question mark (`?`) following the file name:

    `[`http://www.domain.com/cgi-bin/script.cgi?id=123456&id2=abcdefg`](http://www.domain.com/cgi-bin/script.cgi?id=123456&id2=abcdefg)`

    As you can see, the fully qualified domain name given holds two parameters and
    a file name. The parameters given are the `id` and `id2` parameters. They each
    hold values and are separated by an ampersand (`&`). You may have as many parameters
    as needed, with the usual maximum being about half a dozen parameters.

    This particular parameter method is known as the GET method. There is another
    method of submitting parameters called the POST method. These concepts were visited
    briefly in a past chapter.


    In order to use the POST method, you must submit the parameters from within an
    HTML form element, as shown in Listing 4-2.


    ```


    Listing 4-2

    Using a FORM with the method set to POST

    ```


    You can see from the preceding example that I’ve inserted the parameters within
    opening and closing HTML form elements in type `“hidden”` `INPUT`s. The parameters
    will be uploaded to the server when the Submit button is clicked.

    Since the method of POST is used, the parameters will be passed to the server
    within the message body instead of within the values in the address bar.


    ### Catching the Parameters

    The easiest way to catch a parameter is with the `param()` method, which is within
    the capabilities of the `CGI` module. In order to invoke the `param()` method,
    you must first create a new instance of the `CGI` module, as shown in Listing
    4-3.


    ```

    USE CGI;

    $cgi = new CGI;

    $id = $cgi->param(''id'');

    $id2 = $cgi->param(''id2'');

    Listing 4-3

    Catching parameters using the param() method

    ```


    You can see that I first included a `“USE CGI;”` statement. I then created a new
    instance of the `CGI` module through the use of the `“$cgi = new CGI;”` statement.
    The `id` and `id2` parameters were then caught with the `“$id = $cgi->param(''id'');”`
    and `“$id2 = $cgi->param(''id2'');”` methods, the values of which are now stored
    in `$id` and `$id2`. It should be noted that the parameter names are case sensitive.

    You may have as many parameters as necessary, with the limit being between five
    and ten in one script. It should be noted that the POST method can pass more parameters
    than can the GET method.


    ### Processing the Parameters

    There are many ways of processing a parameter. What I’ve found is that regular
    expressions are used often and can be applied to the data contained in the parameter’s
    variable in order to combat malicious attacks.


    A regular expression that only allows numbers to be within a parameter’s variable:


    ```

    $id =~ s/[A-Za-z\s]+//g;

    ```


    As you can see in the regular expression, all letters will be stripped from the
    variable, `$id`. This allows only numbers to be contained within the parameter’s
    variable. Malicious users won’t have a chance to hack your script because it is
    impossible to gain entrance to a script without using textual commands in some
    way.


    You may also put the parameter’s values directly into a database if security isn’t
    an issue. Since a parameter has a logical use, you may prepare your data to be
    used in the next script or format it to be able to access a particular database
    table, with the parameter’s value being the unique identifier. Consider the following
    example:


    ```

    $profileid = $id . "profile";

    ```


    I used the concatenation operator again to join the `$id` and the word `“profile”`
    in quotes. Note that the word `“profile”` is contained within opening and closing
    double quotes. This tells Perl that the contents are textual in nature. The `$profileid`
    variable now holds the following value:


    ```

    123456profile

    ```'
