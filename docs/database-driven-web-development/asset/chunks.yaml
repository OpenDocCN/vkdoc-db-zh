  trans: "\n# 动态网页效果教程\n\n## 图像鼠标事件\n我们使用`onMouseOver`事件触发第一次改变，使用`onMouseOut`事件将图像变回原始状态。这对于需要位于不同目录甚至不同服务器上的图像很有优势。根据需要，URL\
    \ 可以声明为绝对路径或相对路径。如果要更换服务器，请务必使用绝对路径`http://www.domain.com/`以避免混淆。\n\n## 改变图像位置\n\
    你是否访问过有飞动横幅的页面？这种引人注目的显示选项有许多用途。有些人将其发挥到极致，但现在，我们将保持简单。这是快速理解动态定位概念的一个很好的练习。\n\
    \n我们将同时使用绝对定位和相对定位技术。第一个位置是绝对的，第二个位置是相对于第一个绝对位置的。如果需要，你可以使用增量运算符（`++`）将文档坐标逐个改变，甚至使用加法运算符（`+`）以十为单位跳跃（或任何给定的数字）。`style.left`属性用于以像素为单位给出图像位置。你可以在这里声明一个静态值，也可以使用变量或数组项通过脚本操作获得新坐标。\n\
    \n图像可以是任何尺寸或格式，只要该格式受浏览器支持。动态更改图像也是一个很好的效果。\n\n我们使用`getElementById()`方法来访问该图像的显示属性，包括它在页面上的位置。必须在`IMG`元素中声明`id`属性，以便浏览器识别要定位的元素。\n\
    \n```javascript\nfunction moveleft() {\n    document.getElementById('image').style.position=\"\
    absolute\";\n    document.getElementById('image').style.left=\"0\";\n}\nfunction\
    \ moveback() {\n    document.getElementById('image').style.position=\"relative\"\
    ;\n}\n\n清单 6-25\n处理图像定位\n```\n\n要更改回原始位置，需使用相对定位方法。它会调用图像在页面上的原始位置并相应地操作。如果你要在页面中的表格内移动图像，必须考虑图像将在其中移动的区域，否则表格将自动调整以适应新的图像位置。例如，如果你要将一个宽度为\
    \ 100 像素的图像在两个方向上各移动 10 像素，则包含它的`TD`元素中必须留有 120 像素宽的空间——左边 10 像素，右边 10 像素，加上原始\
    \ 100 像素宽的图像。\n\n## 改变背景图像\n只需更改`BODY`标签的该参数，即可更改整个文档的背景图像。我们将使用`document.body.background`语句来实现这一点。背景图像可以是浏览器支持的任何格式。其位置可以声明为绝对路径或相对路径。\n\
    \n根据正常功能，要显示的背景图像将按其实际尺寸显示。如果图像大于浏览器窗口区域，则大于窗口的图像部分将不会被显示。如果背景图像小于浏览器窗口，则图像将重复（平铺）以填充剩余的背景区域。\n\
    \n```javascript\nfunction bgChange(bg) {\n    document.body.background=bg;\n}\n\
    \n清单 6-26\n更改背景图像\n```\n\n另外请注意，这可以在表格中使用——而不仅仅是整个显示文档。只需更改文档头部 JavaScript 函数中给出的\
    \ DOM 语句。表格可以选择显示图像作为背景，因此研究一下这个可能是个好主意。在这种情况下使用`getElementById.style.background`语句。根据需要提供图像的位置，并使用`onLoad`事件处理程序在页面加载时应用背景图像，或使用`onMouseOver`事件在用户选择时显示背景图像。\n\
    \n## 图像查看器\n这是一个很好的实验。你可以使用这个基本应用程序在不使用服务器端脚本的情况下实现一些惊人的效果。我们使用预加载器将图像数据下载到数组中。然后我们引用数组项并相应地显示。\n\
    \n`getElementById()`方法用于访问每个图像的属性。然后显示图像。这可以更进一步——例如制作幻灯片，或者只是以你想要的方式显示图像。\n\n\
    ```javascript\nmyImages=new Array();\nmyImages[0]=\"image1.gif\";\nmyImages[1]=\"\
    bulbon.gif\";\nmyImages[2]=\"landscape.jpg\";\nmyImages[3]=\"image2.gif\";\nmyImages[4]=\"\
    bulboff.gif\";\nmyImages[5]=\"smiley.gif\";\nimagecounter=myImages.length-1;\n\
    i=0;\nfunction first() {\n    document.getElementById('imageviewer').src=myImages[0];\n\
    \    i=0;\n}\nfunction previous() {\n    if (i>0) {\n        i--;\n        document.getElementById('imageviewer').src=myImages[i];\n\
    \    }\n}\nfunction next() {\n    if (i\n\n清单 6-27\n浏览器内的图像查看器\n```\n\n单击可访问文档头部\
    \ JavaScript 函数中声明的数组中的下一个、上一个、第一个或最后一个图像。创建了四个函数，每个函数都有特定的操作来访问数组中的索引项。原始图像甚至不必被看到——它可以是一个\
    \ 1 像素乘 1 像素的透明图像，或者一个与页面背景大小和颜色相同的图像。\n\n## 数字时钟\n时钟无处不在，所以它们也应该在你的网页中。你可以根据你的品味让它们显眼或低调。在这个例子中，我们显示十张图像作为时钟的数字。每个数字是一个唯一的图像，预加载到一个数组中。然后我们以秒、分或小时的增量显示图像。\n\
    \n```javascript\nfunction getDigits() {\n    num=new Array(\"0.gif\",\"1.gif\"\
    ,\"2.gif\",\"3.gif\",\"4.gif\",\"5.gif\",\"6.gif\",\"7.gif\",\"8.gif\",\"9.gif\"\
    );\n    time=new Date();\n    hour=time.getHours()\n    if (hour\n\n清单 6-28\n\
    一个简单的数字时钟\n```\n\n它看起来比实际复杂一点。图像被放在一个数组中。使用`getSeconds()`、`getMinutes()`和`getHours()`方法读取日期。然后，我们根据以毫秒为单位声明的秒、分、小时增量来递增这些值。对于毫秒的每一次递增，从我们预加载的数组中显示相应的图像。\n\
    \n## 下拉菜单\n这个简单的下拉菜单使用 CSS 规则以及`style`对象的`hidden`和`visible`属性。菜单始终存在——它只是被设置为隐藏。当鼠标悬停在其上时，属性更改为`visible`，你就能看到菜单了。很简单。\n\
    \n我们使用`getElementById()`方法来访问页面属性并仅更改`hidden`或`visible`属性。根据需要使用简单或复杂的菜单。这并不重要。通过简单的\
    \ CSS 规则更改其外观。我包含了八条规则，但实际远不止这些。\n\n```css\nbody{font-family:arial;}\ntable{font-size:80%;background:black}\n\
    a{color:black;text-decoration:none;font:bold}\na:hover{color:#606060}\ntd.menu{background:lightblue}\n\
    table.menu {\n    font-size:100%;\n    position:absolute;\n    visibility:hidden;\n\
    }\n```\n\n```javascript\nfunction showmenu(elmnt) {\n    document.getElementById(elmnt).style.visibility=\"\
    visible\";\n}\nfunction hidemenu(elmnt) {\n    document.getElementById(elmnt).style.visibility=\"\
    hidden\";\n}\n```\n\n```html\n教程\n    <table class=\"menu\">\n        <tr><td>列表项</td></tr>\n\
    \        <tr><td>列表项</td></tr>\n        <tr><td>列表项</td></tr>\n        <tr><td>列表项</td></tr>\n\
    \    </table>\n脚本\n    <table class=\"menu\">\n        <tr><td>列表项</td></tr>\n\
    \        <tr><td>列表项</td></tr>\n        <tr><td>列表项</td></tr>\n        <tr><td>列表项</td></tr>\n\
    \        <tr><td>列表项</td></tr>\n    </table>\n验证\n    <table class=\"menu\">\n\
    \        <tr><td>列表项</td></tr>\n        <tr><td>列表项</td></tr>\n        <tr><td>列表项</td></tr>\n\
    \        <tr><td>列表项</td></tr>\n        <tr><td>列表项</td></tr>\n    </table>\n\n\
    清单 6-29\n一个下拉菜单系统\n```\n\n列表项在给定的表格内显示。注意使用了一些嵌套表格。你可以根据需要将其做得更复杂，并使用任何有效的 HTML\
    \ 编码包含任何格式选项。你甚至可以在每个下拉列表中放置图像和/或带有许多输入元素的表单。\n"
- fmt: "# Create Inset or Outset Border Buttons\n\nSo when you’ve learned to use bulleted\
    \ lists, you were introduced to the concept of inset and outset placed buttons.\
    \ Each bulleted item is placed in relation to the beginning location of the `UL`\
    \ or `OL` element. Each list item is then stated with an `LI` element. Inset bullets\
    \ are set to the right of the starting location specified by the `OL` or `UL`\
    \ element. Outset bullets are further to the left.\n\nThe `style.borderStyle`\
    \ attribute works the same way. You are able to position the border in an inset\
    \ or outset styled display. The easiest way to understand this is to simply run\
    \ the script given in Listing [6-30](#485616_2_En_6_Chapter.xhtml#PC30).\n\n```\n\
    function inset(elmnt) {\n    elmnt.style.borderStyle=\"inset\";\n}\nfunction outset(elmnt)\
    \ {\n    elmnt.style.borderStyle=\"outset\";\n}\n\ntd {\n    background:C0C0C0;\n\
    \    border:2px outset;\n}\n\nItem One\nItem Two\nItem Three\nItem Four\n```\n\
    Listing 6-30: Creating inset or outset buttons\n\nWe used the `onMouseOver` and\
    \ `onMouseOut` to trigger the different border styles. You don’t have to go back\
    \ to the original style, however, and can adjust the bordering styles as needed.\
    \ A good example of this is to create a display of the sections of a document\
    \ the user has read or reviewed. When they’re finished reviewing the entire document,\
    \ all of the border styles will be the same, letting them know in an easy way\
    \ that they’re finished what they started.\n\nIt is an unusual occurrence that\
    \ this code snippet is not supported in Microsoft Edge. The days of massive differences\
    \ between the implementations of any given markups are over, for the most part.\
    \ You can attribute this to increased public input and a very well-run and organized\
    \ `W3C.org` (World Wide Web Consortium).\n\n# A Description Menu\n\nThis is a\
    \ good way to add some surprising functionality to your links. You can link to\
    \ anything in a different document or to a place within the current document as\
    \ provided by the attributes you use within the anchor tag. Links may be relative\
    \ or absolutely stated. CSS rules that apply to a normal link apply and are given\
    \ in the head of the document.\n\nWe use the `getElementById()` method to access\
    \ the properties of the anchor element, in this case, to assign the locations\
    \ and other attributes of the links.\n\n```\nTable {\n    background:black;\n\
    }\na {\n    text-decoration:none;\n    color:#000000;\n}\nth {\n    width:150px;\n\
    \    background:#FF8080;\n}\ntd {\n    font:bold;\n    background:#ADD8E6;\n}\n\
    \nfunction get(txt) {\n    document.getElementById('tip').innerHTML=\"txt\";\n\
    }\nfunction reset() {\n    document.getElementById('tip').innerHTML=\" \";\n}\n\
    \nItem One\nItem Two\nItem Three\n```\nListing 6-31: A descriptive menu feature\n\
    \nI’ve put the links in a table, but they don’t have to be. You can place them\
    \ anywhere you like using any method you like, as long as they’re able to be rendered\
    \ by the browser.\n\n# Create a Description Box for an Image\n\nThis series of\
    \ instructions shows a small pop-up description according to whatever you’re interested\
    \ in showing. You place the descriptive text within the functions as they’re placed\
    \ in the document. The functions are triggered with an `onMouseOver` event handler\
    \ and reset by calling a `reset()` method with an `onMouseOut` event handler.\n\
    \nAssign any CSS rules you like, as long as they’re applicable to a textual link.\
    \ If you’d like to play around, you can include many different formatting styles\
    \ and any valid CSS rule that is reflected within the DOM specifications. There\
    \ are many, some 400 of them.\n\n```\ntable {\n    background:black;\n}\na {\n\
    \    text-decoration:none;\n    color:#000000;\n}\ntd {\n    font:bold;\n    background:#ADD8E6;\n\
    }\n\nfunction get(image) {\n    document.getElementById('tip').innerHTML=\"\"\
    ;\n}\nfunction reset() {\n    document.getElementById('tip').innerHTML=\" \";\n\
    }\n\nItem One\nItem Two\nItem Three\n```\nListing 6-32: A description box for\
    \ an image\n\nI have placed the links inside a table and have provided a `reset()`\
    \ method to clear the descriptive text from being displayed. You might not want\
    \ to do this, though – just leave the descriptions up if you need to, without\
    \ calling a `reset()` method.\n\n# A Sliding Horizontal Menu\n\nThese menus have\
    \ always been very popular because they’re very impressive and useful. We use\
    \ a series of CSS rules to assign formatting and positioning. The JavaScript functions\
    \ are called with an `onMouseOver` event handler to open the menu and an `onMouseOut`\
    \ event handler to close the menu.\n\nThe `getElementById()` method is used to\
    \ access the display properties for the initial formatting and display options.\
    \ We then alter these options according to the directions given in the rest of\
    \ the script.\n\nThe speed that the menu opens with is an option that can be set\
    \ according to your preference. If you’d like a quicker slide, decrease this value.\
    \ If you’d like a slower slide, increase the value.\n\n```\nbody {\n    font-family:arial;\n\
    }\na {\n    color:black;text-decoration:none;font:bold;\n}\na:hover {\n    color:#606060;\n\
    }\ntd.menu {\n    background:lightblue;\n}\ntable.nav {\n    background:black;\n\
    \    position:relative;\n    font: bold 80% arial;\n    top:0px;\n    left:-135px;\n\
    }\n\nvar i=-135;\nvar intHide;\nvar speed=3;\nfunction showmenu() {\n    clearInterval(intHide);\n\
    \    intShow=setInterval(\"show()\",10);\n}\nfunction hidemenu() {\n    clearInterval(intShow);\n\
    \    intHide=setInterval(\"hide()\",10);\n}\nfunction show() {\n    if (i-135)\
    \ {\n        i=i-speed;\n        document.getElementById('myMenu').style.left=i;\n\
    \    }\n}\n\nItem One\nItem Two\nItem Three\nItem Four\nItem Five\n```\nListing\
    \ 6-33: A sliding horizontal menu\n\nYou may include any valid HTML coding into\
    \ your sliding menu. A few examples of this are forms, images, and embedded files\
    \ for video and audio. By segregating the `class=` attributes, you’re able to\
    \ assign specific formatting to every element within your menu on an individual\
    \ basis.\n\n# A Click-Driven Horizontal Sliding Menu\n\nSo you’ve all seen the\
    \ horizontal menus that zoom out when you mouse over them, but it is entirely\
    \ possible to change this if you find that it just isn’t what you’re looking for.\
    \ You can initiate the menu with a click of the mouse (an `onClick` event handler)\
    \ and slide it back with an `onMouseOut` event that collapses the menu. If you’d\
    \ like to have the menu slide out when the button goes down and slide back when\
    \ it goes up, use the `onMouseDown` and `onMouseUp` event handlers.\n\nAny CSS\
    \ rule can be applied, and any HTML element can be used within the menu. You can\
    \ even put a form on it if you so choose. Definitely add some images, small or\
    \ large, to add some appeal.\n\nWe use the `getElementById()` method to access\
    \ the properties of the page elements and act upon them. A single `onClick` event\
    \ handler executes the JavaScript functions within the head of the document, and\
    \ the menu slides out.\n\n```\nbody{\n    font-family:arial;\n}\na {\n    color:black;text-decoration:none;font:bold;\n\
    }\na:hover {\n    color:#606060;\n}\ntd.menu {\n    background:lightblue;\n}\n\
    table.nav {\n    background:black;\n    position:relative;\n    font: bold 80%\
    \ arial;\n    top:0px;\n    left:-135px;\n    margin-left:3px;\n}\n\nvar i=-135;\n\
    var c=0;\nvar intHide;\nvar speed=3;\nfunction show_hide_menu() {\n    if (c==0)\n\
    \    {\n        c=1;\n        clearInterval(intHide);\n        intShow=setInterval(\"\
    show()\",10);\n    } else {\n        c=0;\n        clearInterval(intShow);\n \
    \       intHide=setInterval(\"hide()\",10);\n    }\n}\nfunction show() {\n   \
    \ if (i-135)\n    {\n        i=i-speed;\n        document.getElementById('myMenu').style.left=i;\n\
    \    }\n}\n\nItem One\nItem Two\nItem Three\nItem Four\nItem Five\n```\nListing\
    \ 6-34: A click-driven horizontal menu\n\nThere can be as many menu items as you\
    \ wish, and they don’t have to be in one single column as I have them here. Multicolumn\
    \ menus are entirely possible – if it can be rendered in a normal page, you can\
    \ include it in your menu."
  raw: 'Create Inset or Outset Border Buttons

    So when you’ve learned to use bulleted lists, you were introduced to

    the concept of inset and

    outset placed buttons. Each bulleted item is placed in relation

    to the beginning location of the UL or OL element. Each list item is

    then stated with an LI element. Inset bullets are set to the right of

    the starting location specified by the OL or UL element. Outset bullets

    are further to the left.


    The style.borderStyle

    attribute works the same way. You are able to position the border

    in an inset or outset styled display. The easiest way to understand this

    is to simply run the script given in Listing [6-30](#485616_2_En_6_Chapter.xhtml#PC30).


    ```


    function inset(elmnt) {

    elmnt.style.borderStyle="inset";

    }

    function outset(elmnt) {

    elmnt.style.borderStyle="outset";

    }


    td {

    background:C0C0C0;

    border:2px outset;

    }


    Item One


    Item Two


    Item Three


    Item Four


    Listing 6-30

    Creating inset or outset buttons

    ```


    We used the onMouseOver and onMouseOut to trigger the different

    border styles. You don’t have to go back to the original style, however,

    and can adjust the bordering styles as needed. A good example of this is

    to create a display of the sections of a document the user has read or

    reviewed. When they’re finished reviewing the entire document, all of

    the border styles will be the same, letting them know in an easy way

    that they’re finished what they started.

    It is an unusual occurrence that this code snippet is not supported

    in Microsoft Edge. The days of massive differences between the

    implementations of any given markups are over, for the most part. You

    can attribute this to increased public input and a very well-run and

    organized W3C.org (World Wide Web Consortium).


    A Description Menu

    This is a good way to add some surprising functionality to your

    links. You can link to anything in a different document or to a place

    within the current document as provided by the attributes you use within

    the anchor tag. Links may be relative or absolutely stated. CSS rules

    that apply to a normal link apply and are given in the head of the

    document.


    We use the getElementById()

    method to

    access the properties of the anchor element, in this case, to assign the

    locations and other attributes of the links.


    ```


    Table {

    background:black;

    }

    a {

    text-decoration:none;

    color:#000000;

    }

    th {

    width:150px;

    background:#FF8080;

    }

    td {

    font:bold;

    background:#ADD8E6;

    }


    function get(txt) {

    document.getElementById(''tip'').innerHTML="txt";

    }

    function reset() {

    document.getElementById(''tip'').innerHTML=" ";

    }


    Item One


    Item Two


    Item Three


    Listing 6-31

    A descriptive menu feature

    ```


    I’ve put the links in a table, but they don’t have to be. You can

    place them anywhere you like using any method you like, as long as

    they’re able to be rendered by the browser.


    Create a Description Box for an Image

    This series of instructions shows a small pop-up description according to

    whatever you’re interested in showing. You place the descriptive text

    within the functions as they’re placed in the document. The functions

    are triggered with an onMouseOver event handler and reset by calling a

    reset() method with an onMouseOut event handler.


    Assign any CSS rules you like, as long as they’re applicable to a

    textual link. If you’d like to play around, you can include many

    different formatting styles and any valid CSS rule that is reflected

    within the DOM specifications. There are many, some 400 of them.


    ```


    table {

    background:black;

    }

    a {

    text-decoration:none;

    color:#000000;

    }

    td {

    font:bold;

    background:#ADD8E6;

    }


    function get(image) {

    document.getElementById(''tip'').innerHTML="";

    }

    function reset() {

    document.getElementById(''tip'').innerHTML=" ";

    }


    Item One


    Item Two


    Item Three


    Listing 6-32

    A description box for an image

    ```


    I have placed the links inside a table and have provided a reset()

    method to clear the descriptive text from being displayed. You might not

    want to do this, though – just leave the descriptions up if you need to,

    without calling a reset() method.


    A Sliding Horizontal Menu

    These menus have always been very popular because they’re very

    impressive and useful. We use a series of CSS rules to assign formatting

    and positioning. The JavaScript functions are called with an onMouseOver

    event handler to open the menu and an onMouseOut event handler to close

    the menu.

    The getElementById()

    method is used to access the display properties for the initial

    formatting and display options. We then alter these options according to

    the directions given in the rest of the script.


    The speed that the menu opens with is an option that can be set

    according to your preference. If you’d like a quicker slide, decrease

    this value. If you’d like a slower slide, increase the value.


    ```


    body {

    font-family:arial;

    }

    a {

    color:black;text-decoration:none;font:bold;

    }

    a:hover {

    color:#606060;

    }

    td.menu {

    background:lightblue;

    }

    table.nav {

    background:black;

    position:relative;

    font: bold 80% arial;

    top:0px;

    left:-135px;

    }


    var i=-135;

    var intHide;

    var speed=3;

    function showmenu() {

    clearInterval(intHide);

    intShow=setInterval("show()",10);

    }

    function hidemenu() {

    clearInterval(intShow);

    intHide=setInterval("hide()",10);

    }

    function show() {

    if (i-135) {

    i=i-speed;

    document.getElementById(''myMenu'').style.left=i;

    }

    }


    Item One


    Item Two


    Item Three


    Item Four


    Item Five


    Listing 6-33

    A sliding horizontal menu

    ```


    You may include any valid HTML coding into your sliding menu. A few

    examples of this are forms, images, and embedded files for video and

    audio. By segregating the class= attributes, you’re able to assign

    specific formatting to every element within your menu on an individual

    basis.


    A Click-Driven Horizontal Sliding Menu

    So you’ve all seen the horizontal menus that zoom out when

    you mouse over them, but it is entirely possible to change this if you

    find that it just isn’t what you’re looking for. You can initiate the

    menu with a click of the mouse (an onClick event handler) and slide it

    back with an onMouseOut event that collapses the menu. If you’d like to

    have the menu slide out when the button goes down and slide back when it

    goes up, use the onMouseDown and onMouseUp event handlers.

    Any CSS rule can be applied, and any HTML element can be used within

    the menu. You can even put a form on it if you so choose. Definitely add

    some images, small or large, to add some appeal.


    We use the getElementById() method

    to access the properties of the page elements and act upon them. A

    single onClick event handler executes the JavaScript functions within

    the head of the document, and the menu slides out.


    ```


    body{

    font-family:arial;

    }

    a {

    color:black;text-decoration:none;font:bold;

    }

    a:hover {

    color:#606060;

    }

    td.menu {

    background:lightblue;

    }

    table.nav {

    background:black;

    position:relative;

    font: bold 80% arial;

    top:0px;

    left:-135px;

    margin-left:3px;

    }


    var i=-135;

    var c=0;

    var intHide;

    var speed=3;

    function show_hide_menu() {

    if (c==0)

    {

    c=1;

    clearInterval(intHide);

    intShow=setInterval("show()",10);

    } else {

    c=0;

    clearInterval(intShow);

    intHide=setInterval("hide()",10);

    }

    }

    function show() {

    if (i-135)

    {

    i=i-speed;

    document.getElementById(''myMenu'').style.left=i;

    }

    }


    Item One


    Item Two


    Item Three


    Item Four


    Item Five


    Listing 6-34

    A click-driven horizontal menu

    ```


    There can be as many menu items as you wish, and they don’t have to

    be in one single column as I have them here. Multicolumn menus are

    entirely possible – if it can be rendered in a normal page, you can

    include it in your menu.'
  trans: "# 创建内嵌或外凸边框按钮\n\n当你学会使用项目符号列表时，就已经接触过内嵌和外凸放置按钮的概念。每个项目符号项都相对于 `UL` 或 `OL`\
    \ 元素的起始位置放置。每个列表项随后用 `LI` 元素声明。内嵌项目符号被设置在 `OL` 或 `UL` 元素指定起始位置的右侧。外凸项目符号则更靠左。\n\
    \n`style.borderStyle` 属性的工作方式相同。你能够以内嵌或外凸样式的显示方式来定位边框。理解这一点最简单的方法是直接运行清单 6-30\
    \ 中给出的脚本。\n\n```\nfunction inset(elmnt) {\n    elmnt.style.borderStyle=\"inset\"\
    ;\n}\nfunction outset(elmnt) {\n    elmnt.style.borderStyle=\"outset\";\n}\n\n\
    td {\n    background:C0C0C0;\n    border:2px outset;\n}\n\n项目一\n项目二\n项目三\n项目四\n\
    ```\n清单 6-30：创建内嵌或外凸按钮\n\n我们使用 `onMouseOver` 和 `onMouseOut` 来触发不同的边框样式。然而，你不必非要恢复到原始样式，而是可以根据需要调整边框样式。一个很好的例子是创建一个显示用户已阅读或审阅文档各部分的展示。当他们审阅完整个文档后，所有的边框样式将变得一致，让他们以一种简单的方式知道自己已完成所开始的任务。\n\
    \n这个代码片段不受 Microsoft Edge 支持的情况并不常见。在很大程度上，任何给定标记语言实现之间存在巨大差异的时代已经过去。你可以将此归因于公众参与度的提高以及\
    \ `W3C.org`（万维网联盟）的出色运营和组织。\n\n# 描述性菜单\n\n这是为你的链接增添一些令人惊喜功能的好方法。你可以链接到另一个文档中的任何内容，或使用锚标签内的属性链接到当前文档中的某个位置。链接可以是相对的或绝对的。适用于普通链接的\
    \ CSS 规则同样适用，并在文档的头部给出。\n\n我们使用 `getElementById()` 方法来访问锚元素的属性，在本例中，用于分配链接的位置和其他属性。\n\
    \n```\nTable {\n    background:black;\n}\na {\n    text-decoration:none;\n   \
    \ color:#000000;\n}\nth {\n    width:150px;\n    background:#FF8080;\n}\ntd {\n\
    \    font:bold;\n    background:#ADD8E6;\n}\n\nfunction get(txt) {\n    document.getElementById('tip').innerHTML=\"\
    txt\";\n}\nfunction reset() {\n    document.getElementById('tip').innerHTML=\"\
    \ \";\n}\n\n项目一\n项目二\n项目三\n```\n清单 6-31：描述性菜单功能\n\n我把链接放在了一个表格里，但这并非必须。你可以使用任何你喜欢的方法将它们放置在任何你喜欢的位置，只要它们能够被浏览器渲染出来即可。\n\
    \n# 为图像创建描述框\n\n这一系列指令根据你想要展示的内容显示一个小的弹出式描述。你将描述性文本放置在它们位于文档中的函数内。这些函数通过 `onMouseOver`\
    \ 事件处理程序触发，并通过调用 `onMouseOut` 事件处理程序中的 `reset()` 方法来重置。\n\n分配任何你喜欢的 CSS 规则，只要它们适用于文本链接。如果你想尝试一下，可以包含许多不同的格式样式以及任何反映在\
    \ DOM 规范中的有效 CSS 规则。这样的规则有很多，大约有 400 个。\n\n```\ntable {\n    background:black;\n\
    }\na {\n    text-decoration:none;\n    color:#000000;\n}\ntd {\n    font:bold;\n\
    \    background:#ADD8E6;\n}\n\nfunction get(image) {\n    document.getElementById('tip').innerHTML=\"\
    \";\n}\nfunction reset() {\n    document.getElementById('tip').innerHTML=\" \"\
    ;\n}\n\n项目一\n项目二\n项目三\n```\n清单 6-32：图像描述框\n\n我已将链接放置在表格内，并提供了一个 `reset()` 方法来清除描述文本的显示。不过，你可能不想这样做——如果需要，可以保持描述显示而不调用\
    \ `reset()` 方法。\n\n# 滑动水平菜单\n\n这些菜单一直非常受欢迎，因为它们既令人印象深刻又实用。我们使用一系列 CSS 规则来分配格式和定位。JavaScript\
    \ 函数通过 `onMouseOver` 事件处理程序调用来打开菜单，并通过 `onMouseOut` 事件处理程序调用来关闭菜单。\n\n`getElementById()`\
    \ 方法用于访问初始格式和显示选项的显示属性。然后我们根据脚本其余部分给出的说明来更改这些选项。\n\n菜单打开的速度是一个可以根据你的偏好设置的选项。如果你希望滑动得更快，请减小此值。如果你希望滑动得更慢，请增大该值。\n\
    \n```\nbody {\n    font-family:arial;\n}\na {\n    color:black;text-decoration:none;font:bold;\n\
    }\na:hover {\n    color:#606060;\n}\ntd.menu {\n    background:lightblue;\n}\n\
    table.nav {\n    background:black;\n    position:relative;\n    font: bold 80%\
    \ arial;\n    top:0px;\n    left:-135px;\n}\n\nvar i=-135;\nvar intHide;\nvar\
    \ speed=3;\nfunction showmenu() {\n    clearInterval(intHide);\n    intShow=setInterval(\"\
    show()\",10);\n}\nfunction hidemenu() {\n    clearInterval(intShow);\n    intHide=setInterval(\"\
    hide()\",10);\n}\nfunction show() {\n    if (i-135) {\n        i=i-speed;\n  \
    \      document.getElementById('myMenu').style.left=i;\n    }\n}\n\n项目一\n项目二\n\
    项目三\n项目四\n项目五\n```\n清单 6-33：滑动水平菜单\n\n你可以在你的滑动菜单中包含任何有效的 HTML 代码。其中的一些例子包括表单、图像以及用于视频和音频的嵌入文件。通过区分\
    \ `class=` 属性，你能够为菜单内的每个元素单独分配特定的格式。\n\n# 点击驱动的水平滑动菜单\n\n你们都见过鼠标悬停时会弹出的水平菜单，但如果你发现这不符合你的需求，完全有可能改变这一点。你可以通过鼠标点击（`onClick`\
    \ 事件处理程序）来启动菜单，并用一个 `onMouseOut` 事件使其滑动回去从而收起菜单。如果你希望菜单在按钮按下时滑出，在按钮抬起时滑回，请使用 `onMouseDown`\
    \ 和 `onMouseUp` 事件处理程序。\n\n可以应用任何 CSS 规则，并且可以在菜单内使用任何 HTML 元素。你甚至可以在上面放置一个表单，如果你选择这样做的话。一定要添加一些或大或小的图像来增加吸引力。\n\
    \n我们使用 `getElementById()` 方法来访问页面元素的属性并对其执行操作。一个单独的 `onClick` 事件处理程序执行文档头部的 JavaScript\
    \ 函数，然后菜单就会滑出。\n\n```\nbody{\n    font-family:arial;\n}\na {\n    color:black;text-decoration:none;font:bold;\n\
    }\na:hover {\n    color:#606060;\n}\ntd.menu {\n    background:lightblue;\n}\n\
    table.nav {\n    background:black;\n    position:relative;\n    font: bold 80%\
    \ arial;\n    top:0px;\n    left:-135px;\n    margin-left:3px;\n}\n\nvar i=-135;\n\
    var c=0;\nvar intHide;\nvar speed=3;\nfunction show_hide_menu() {\n    if (c==0)\n\
    \    {\n        c=1;\n        clearInterval(intHide);\n        intShow=setInterval(\"\
    show()\",10);\n    } else {\n        c=0;\n        clearInterval(intShow);\n \
    \       intHide=setInterval(\"hide()\",10);\n    }\n}\nfunction show() {\n   \
    \ if (i-135)\n    {\n        i=i-speed;\n        document.getElementById('myMenu').style.left=i;\n\
    \    }\n}\n\n项目一\n项目二\n项目三\n项目四\n项目五\n```\n清单 6-34：点击驱动的水平菜单\n\n菜单项可以如你所愿地设置多个，而且它们不一定非得像我这里这样放在单独的一列中。多列菜单是完全可能的——如果它可以在普通页面中渲染，你就可以将其包含在你的菜单中。"
- fmt: "# Return the Cursor’s Coordinates\n\nIf you’re going to be using any type\
    \ of positioning in your web development, it will be absolutely necessary to know\
    \ and understand how coordinates are recalculated, returned, and altered by the\
    \ browser.\n\nCoordinates in a browser are represented by the X axis and Y axis.\
    \ Each has their own objects and methods to read or alter the X and Y values built\
    \ in to the browser.\n\nWe’ll use the `event.clientX` and `event.clientY` attributes\
    \ to return the values of the current position of the exact tip of the mouse pointer\
    \ as it sits on the web page the moment the function is triggered. The value is\
    \ returned very quickly, and you can act on and alter that value through scripted\
    \ action just as quickly.\n\nYou’ll see this code in every page you’ve seen that\
    \ has movable buttons or flying banners. It’s a universal operation, so it’s best\
    \ to take a long look at it and commit it to memory. It’s much simpler than it\
    \ sounds.\n\n```javascript\nfunction show_coords(event) {\n    x = event.clientX;\n\
    \    y = event.clientY;\n    alert(\"X coords: \" + x + \", Y coords: \" + y);\n\
    }\n```\n\nClick Anywhere To Return The Mouse Position\n\nListing 6-35\nReturning\
    \ the cursor’s coordinates\n\nNotice how easy this is? It is very important, though.\
    \ The script is set up to show an alert box when you click anywhere on the document,\
    \ as shown through the use of the `onClick` event handler that has been placed\
    \ as an attribute of the `BODY` element.\n\n# Make Your Text Follow the Cursor\n\
    \nYou can instruct the browser to have a string of text follow the cursor around\
    \ anywhere in the active window. We first determine the X and Y coordinates of\
    \ the mouse pointer. Then we determine some idea as to what the text should look\
    \ like and assign them with common CSS rules.\n\nPositioning is determined and\
    \ the text is set to follow the pointer, while the X and Y coordinates are being\
    \ generated and passed along the bubbling order of the JavaScript functions in\
    \ the head of the document.\n\nThe text is actually always there – we just set\
    \ it to hidden with the `style.visibility` attribute and to visible when we need\
    \ to. The `onMouseMove` event handler triggers the JavaScript functions when you\
    \ move the cursor on the X or Y axis 1 pixel. If you stay still, so will the text.\n\
    \nTo have a finer degree of control over the rendering of the moving – if it looks\
    \ jerky – just alter the amount that the X or Y axis is incremented with every\
    \ iteration of the script. A smaller value will result in a smoother look but\
    \ might lag a little behind if you’re showing a lot of text trailing behind the\
    \ cursor or if the computer is being used heavily. If this is a concern, increase\
    \ the increment of the positioning and the text will move quicker and will stay\
    \ with the cursor.\n\n```javascript\nfunction cursor(event) {\n    document.getElementById('trail').style.visibility\
    \ = \"visible\";\n    document.getElementById('trail').style.position = \"absolute\"\
    ;\n    document.getElementById('trail').style.left = event.clientX + 10;\n   \
    \ document.getElementById('trail').style.top = event.clientY;\n}\n```\n\nCursor\
    \ Text\n\nListing 6-36\nMaking the text follow the pointer\n\nYou can assign an\
    \ image to follow the cursor as well. Just state a simple `IMG` element with the\
    \ same given preceding attributes for the textual version. The coordinate system\
    \ works the same for text as it does for images, as it’s initially based not on\
    \ the location of the text or image, but on the position of the mouse pointer.\n\
    \n# Summary\n\nWe covered a lot of ground in this chapter. We explored how HTML,\
    \ CSS, DOM, and JavaScript work together in a web page. We touched on formatting\
    \ and design. We introduced concepts such as creating and loading variables and\
    \ arrays – and using what is contained within them.\n\n# 7. Installing and Using\
    \ the Perl Server\n\nThis chapter is brief, as there is only so much you need\
    \ to know to install and use a Perl server. For the most part, most operations\
    \ are simple and intuitively obvious.\n\n## Where’s Perl?\n\nAs mentioned in a\
    \ previous chapter, the first line of any Perl script is called the *shebang*.\
    \ It is the location on the hard drive of the Perl executables. On Linux operating\
    \ systems, it’s usually `#!/usr/bin/perl`.\n\nOn the Windows operating system,\
    \ the location of Perl is a little convoluted and not very intuitive. All of the\
    \ Perl `.msi` packages available install directly to `c:\\Program Files\\Perl\\\
    bin\\perl.exe`. This has the very irritating drawback of the space between the\
    \ word Program and the word Files throwing errors because scripts and other programs\
    \ get stuck by that pesky space. To counter that, the path to Perl should be `#!c:/progra~1/perl/bin/perl.exe`.\n\
    \nI recommend installing Perl to the root of the C drive, as follows: `C:\\Perl\\\
    bin\\perl.exe`. You would have to specify this during the installation of the\
    \ Perl binaries.\n\n## Preparing Your Workstation\n\nAs with most software installations,\
    \ you will have to close all programs, being sure to save your work first. Once\
    \ all programs are shut down and your work is saved, double-click the `.msi` package\
    \ you downloaded to begin the installation. The name of this `.msi` package depends\
    \ on the flavor of Perl you decided to use.\n\n## Installing the Perl Server\n\
    \nOnce you click the `.msi` package, the installation will be halted by a window\
    \ that asks for permission for the installing program to make changes to your\
    \ operating system and install the program. If you decline, the installation promptly\
    \ halts.\n\nThere will invariably be a logo screen as the first window of the\
    \ install program. Some flavors of Perl put the End User License Agreement in\
    \ the first window. If the agreement isn’t on the first window, it’ll be on the\
