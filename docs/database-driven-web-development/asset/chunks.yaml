    # 11. A Database-Driven Menu System


    So we’ve all seen drop-down menus on great sites. They’re a timeless feature –
    they’ve been used for decades and will no doubt be used for many more. In this
    chapter, we’ll be using the knowledge presented in an earlier chapter on JavaScript
    machinations about how HTML, CSS, DOM, and JavaScript work together to provide
    some pretty amazing functionality. Employ the Perl scripting language and the
    MySQL database and you’ve got the makings of a very powerful web page feature.


    ## How Do Drop-down Menus Work?


    Drop-down menus are simple to understand, given a few pointers. Your drop-down
    menu uses the `GET` method for loading the links that you’ll be using. Values
    are passed to a script via the parameters stated within the anchor element.


    ### create.pl


    As with most Perl scripts, there are always a few tables that have to be created
    before the script with the working features is called upon. These scripts are
    usually for account information like contact information or personal details –
    names and addresses, for example. The limit to what you can do is governed by
    your imagination.


    `create.pl` is a simple script that begins our foray into the drop-down menu system.
    I use it to create the base tables that we’ll be working with in a later section
    of this chapter. We aren’t filling in any values in this simple script. We’re
    simply creating the base tables where the values will be stored through the use
    of other scripts. Examine Listing 11-1.


    ```perl

    #!/usr/bin/perl

    use DBI;

    use CGI;

    use CGI::Carp qw(fatalsToBrowser);

    $cgi = new CGI;

    ### connect

    $dbh = DBI->connect(''DBI:mysql:host=localhost;

    database=menu_system'', ''user_name'', ''password'',

    {''RaiseError'' => 1}) or die "Cannot Connect to Database";

    $query = qq{CREATE TABLE pages (

    id INT NOT NULL AUTO_INCREMENT PRIMARY KEY,

    id1 VARCHAR (250) NOT NULL,

    id2 VARCHAR (250) NOT NULL,

    hits VARCHAR (250) NOT NULL

    )};

    $sth = $dbh->prepare($query);

    $sth->execute();

    $sth->finish();

    $dbh->disconnect();

    ### print da shtuff

    print qq{Content-type: text/html\n\n};

    print qq{


    Create Menu Tables


    Database Tables Created


    };

    1;

    ```

    Listing 11-1

    Examining `create.pl`


    As you can see, we connect to the database and create a table named “pages.” This
    is an empty table right now, but the next working script will put values in the
    database, as you’ll see soon. This is the first time you’ll see the `id`, `id1`,
    `id2`, and `hits` columns. I use them with pretty much every project I take on.
    They’re a starting point of the database model. As your project grows, so too
    will the complexity of your database system.


    The first step in this small script is simply the database connection code. It
    has four items that are used to state where the database is (`localhost`), what
    database is being used (database name), a username, and a password.


    The database location is stated as `localhost`. This is used when the Perl script
    and the MySQL database are running on the same server. If you were using a multiserver
    setup, you could state a URL or IP address as this value.


    The database name is simply what you named the database. It can be any letter
    or number, but try not to incorporate punctuation into your database names. Some
    commonly used punctuation can interfere with a script. The left single quote is
    notorious for this. Depending where and what you’re doing with the script, a warning
    message could be thrown or a fatal error could be thrown. Usernames and passwords
    should follow this convention as well.


    After the database connection code comes the creation of the tables. Note that
    the `id` column is `auto_increment`. This means that the `id` column will start
    with a value of zero. This number will be increased by one every time a new table
    row gets inserted into the database. This is a handy way of specifying the order
    your table data will be organized within the variables and arrays that will be
    used to generate the completed document.


    The other columns within the table I created are `id1`, `id2`, and `hits`. `id1`
    and `id2` can be any type of data you wish. I’m including them here to give you
    a better understanding of how you should organize your database tables, rows,
    and columns.


    After completing the table creation, I send a small but fully formed HTML document
    to the browser’s target, which is the current browser window. The table is now
    ready to use.


    ### populate.pl


    The `populate.pl` script is used to insert values into the database. As I stated
