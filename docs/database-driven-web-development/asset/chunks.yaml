    \n使用多个数组来表示多个列是一个值得遵循的良好编程规范。它使数据库数据易于理解，也更容易操作。\n\n我在清单 2-5 中提供的示例中，数组是`@col1`、`@col2`和`@col3`。它们完美地反映了数据库中存在的原始数据。你可以看到，我们使用了一个简单的数组`push`操作，将后续的数据片段加载到这三个数组中。\n\
    \n通过使用`WHERE`子句，我们能够选择数据库中那些列里的每一条数据。使用`>=`（大于或等于）这样的运算符可以让 MySQL 确切地知道你需要哪些信息。`id`列是一个`AUTO_INCREMENT`（自增）列。\n\
    \n你可以按前面提到的`AUTO_INCREMENT` `id`列对查询进行排序，而无需将`id`列选入变量或数组——MySQL 会为你完成这项工作。你甚至不必选中`id`列；只需在你的查询中引用它，MySQL\
    \ 就会相应地操作。这样做的好处是保持变量或数组的数量易于管理，并简化了整个脚本。`id`列存在于我们将要使用的每一个假设表中，并且是表的主键。\n\n`AUTO_INCREMENT`\
    \ `id`列存在于我们将要使用的每个表中，因为它是一种引用表行和表列内容的便捷方式。使用这种方法将确保你在这种 Perl、MySQL 和 Apache 的组合下，拥有最快、功能最强大的查询。请考虑以下示例：\n\
    \n```perl\n$query = qq{SELECT col1, col2, col3 FROM $this_table WHERE id >= 0\
    \ ORDER BY id DESC};\n$sth = $dbh->prepare($query);\n$sth->execute();\nwhile (@this_data\
    \ = $sth->fetchrow_array()) {\n    push @col1, $this_data[0];\n    push @col2,\
    \ $this_data[1];\n    push @col3, $this_data[2];\n};\n```\n\n我们构造了一个查询；在本例中，查询针对三个项目：`col1`、`col2`和`col3`。我们使用\
    \ DBI.pm 的`prepare()`方法准备查询。这会检查查询的语法是否正确。然后我们使用`execute()`执行查询，这会将查询发送到数据库。接着，我们使用\
    \ DBI.pm 的`fetchrow_array()`方法收集数据。数据现在包含在`@col1`、`@col2`和`@col3`中，并且与数据库的列和行完全匹配。\n\
    \n我们使用`fetchrow_array()`是因为我们想从数据库中拉取多条信息。对于`while`语句的每一次迭代，我们将数据收集到`@this_data`数组中。然后，使用一个简单的`push`语句将数据推入`@col1`、`@col2`和`@col3`。接着`while`语句再次循环，一组新的数据被推入`@this_data`，然后又被推入那三个列数组中，这个过程重复进行，直到没有更多数据可以从数据库中检索为止。\n\
    \n关于系统资源需要说几句。使用如此强大的结构可能会导致服务器过载。这是因为在示例中，可能会有大量数据被提取到三个列数组中。关于你的数据，一个很好的惯例是考虑服务器可用的`RAM`（内存）量。在大多数系统上，你可以使用各种程序检查平均可用内存量。我们不会深入探讨这类程序的工作原理。我们现在需要知道的是服务器上可用的`RAM`量。简单来说，就是不要获取超过你拥有的内存量的数据。\n\
    \n## 从一个数组插入多个数据库项\n\n使用数组来插入数据库项有点复杂，但仍然是一项相当简单的任务。只是在使用这种方法时需要考虑几个问题。本节将解释它们。\n\
    \n使用一个在每次循环迭代时递增的`$count`变量，可以根据需要动态插入任意多行。你的限制是你的资源，所以必须谈谈系统资源。因为这种插入表行的方法非常强大，如果使用一个包含数据量超过服务器能够成功且及时处理能力的数组，就有可能使服务器不堪重击。你不应该使用这样的结构来一次性插入数千行表数据，尤其是当每条数据都包含许多千字节信息时。由此产生的操作，虽然仍然是安全的，但可能会让你的服务器过载。\n\
    \n虽然在你的结构中使用`while`循环也可以实现相同的结果，但带有`$count`变量的`foreach`循环的效率和简洁性使其成为更好的选择。使用`foreach`循环要处理的事情更少，因为我们只是遍历数组的索引项并增加计数。`foreach`循环会自动遍历整个数组，并在到达给定参数数组的末尾时停止。\n\
    \n使用`while`语句，你需要执行一个测试，检查`$count`是否与数组中的索引项数量匹配。这会稍微减慢速度。然而，如果你事先知道数组中的项目数量，那么请务必使用`while`语句。请记住，这仅适用于你事先知道要使用的数组长度的情况。\n\
    \n### 使用 foreach 循环从数组插入\n\n我们声明了数据库查询并将其放入`$query`。然后我们调用`prepare()`方法来准备执行`$query`。`execute()`方法用于执行数据库调用，我们使用`while`循环遍历表列，在每次迭代时推入数组。\n\
    \n使用 Perl 和 MySQL，完全可以在一次数据库查询中选择大量信息。你最终会想创建一些非常大的信息列表，这些列表反映了数据库的许多列和行。就像我之前说的，你希望你的数组和变量反映你数据库的内容。\n\
    \n因为脚本多次调用数据库，所以必须通过让变量和数组反映数据库结构来保持清晰和简单。对于数据库的每一行，都有一组相应的数组来表示表的列。这种在变量和数组中反映数据库结构的简单而有效的方法，是一个值得坚持的良好编程规范。它将使你未来更复杂的脚本更容易理解，并为未来的复杂操作提供更复杂的数据库模型。\n\
    \n接下来的例子展示了如何将来自多行表的数据放入反映数据库结构的列中。你可以看到，检索到的数据被放入三个不同的数组中以便处理。DBI.pm 模块的`fetchrow_array()`方法用于执行多列查询。数据库的每一列都反映在随后的数组中，每个数组对应一列。各行被构造为每个连续数组的索引项。\n"
- fmt: "# Perl中从数组插入数据库数据的方法\n\n## 使用循环处理单数组插入\n\n从示例中可以看出，使用Perl循环遍历数组的索引项是件简单的事。`$count`变量为你跟踪索引项，使数据库列精确反映`@this_column`的内容。随着`@this_column`的每次迭代，`$this_column[$count]`的值发生变化并被加载到数据库中。我们使用了一个简单的单列MySQL语句来完成任务（见清单2-6）。\n\
    \n```perl\n$count = \"0\";\nforeach (@this_column) {\n    $query = qq{INSERT INTO\
    \ this_table (col1)\n                VALUES\n                ('$this_column[$count]')};\n\
    \    $sth = $dbh->prepare($query);\n    $sth->execute();\n    ++$count;\n};\n\
    # Listing 2-6\n# 使用 foreach 循环从数组执行 INSERT 操作\n```\n\n我们声明了一个计数器并声明了一个`foreach`循环，该循环将迭代直到达到`@this_column`的长度。然后我们声明查询并将其放入`$query`。接着使用`prepare()`函数为查询执行做准备。我们使用`execute()`函数执行查询，并为循环的下一次迭代递增`$count`。\n\
    \n请注意，我们使用了执行数据库查询的三步法。还有另外两种方法可用于声明、准备和执行查询，如清单2-7所示。\n\n```perl\n$count = \"\
    0\";\nforeach (@this_column) {\n    $sth = $dbh->prepare(INSERT INTO this_table\
    \ (col1) VALUES ('$this_column[$count]'));\n    $sth->execute();\n    ++$count;\n\
    };\n# Listing 2-7\n# 使用两步法从数组执行 INSERT 操作\n```\n\n前面的示例任务展示了实现成功插入查询的两步法。你可以看到我们省略了`$query`标量变量，而是将查询作为参数传递给`prepare()`函数。然后调用了`execute()`函数。这种便捷的方法被广泛使用，因为它产生了一个更简洁的查询，比三步法占用更少的资源。\n\
    \n在我们之前的示例中，我们使用`prepare()`函数来处理查询。清单2-8提供了一种可用的一步法，它完全省略了`prepare()`和`execute()`函数。\n\
    \n```perl\n$count = \"0\";\nforeach (@this_column) {\n    $sth = $dbh->do(INSERT\
    \ INTO this_table (col1) VALUES ('$this_column[$count]'));\n    ++$count;\n};\n\
    # Listing 2-8\n# 使用一步法从数组执行 INSERT 操作\n```\n\n使用`do()`方法来执行查询是一个方便的一行代码，既实用又强大。通过它，你可以执行任何有效的MySQL查询。\n\
    \n至此，我们探索了使用三步法、两步法和一步法从数组执行插入操作。这些简单的语句是任何Web开发人员众多技巧和构建方法的核心。我们在此探讨的简单插入语句同样可以是非常复杂的JOIN语句，充分利用了这两种编程语言的全部能力和灵活性。限制在于你对语言的理解和你的实际需求。虽然大型、强大的JOIN操作可能很有趣，但请保持简单，并使用最简单的方法来达到你期望的最终结果。当你需要处理一年前创建的脚本并期望理解它时，你会感谢自己选择了简单的方法。\n\
    \n## 从多个数组插入多个数据库条目\n\n当你需要将大量数据从多个数组插入到数据库时，时机将会到来。在本节中，我们将探讨如何将存在于多个数组中的数据插入到你的数据库中。引入更多数组并不是坏事；我们只是开始学习这种编程工具组合的巨大灵活性。\n\
    \n我们将首先定义几个虚构的数组，每个数组长度相同。数据可以是文本/ASCII或二进制。但请注意，你必须使用正确的列类型来创建列。列类型超出了本节的范围，因此我们将假设我们处理的所有数据都是纯文本，并且被放入VARCHAR或BLOB列类型中。\n\
    \n将数据从多个数组插入到数据库中的最简单方法是使用`foreach`循环遍历这些数组。你会声明一个初始设置为零的`$count`。这是因为Perl中所有的数组都是基于零的。它们按照从零开始的数字系统进行索引。在Perl中，零是一个完整的数字（一个整数）。\n\
    \n对于循环的每次迭代，都会引用多个数组。这会导致可能大量的数据被插入到数据库中。请确保将自己限制在300或400次迭代以内，尽管如果每次插入的数据量相当小并且你的服务器资源充足，可以使用更多次迭代。你可以根据需要插入任意多的行和列——这种结构具有无限的可扩展性。如果需要，请使用`LIMIT`声明来限制要创建的数据库行数。\n\
    \n你可以使用`foreach`循环或`while`循环来实现相同的结果。当你有特定数量的行要插入时，使用`while`循环。也就是说，如果你事先知道要插入多少行，那么使用`while`。如果你要插入的数据库行数量不固定，请使用`foreach`循环来遍历你收集到的数组。\n\
    \n### 使用 foreach 循环从多个数组插入多个条目\n\n在清单2-9给出的示例任务中，你可以看到，对于`@col1`的每个元素，由于`$count`的迭代，我们循环遍历了三个数组（`@col1`、`@col2`和`@col3`）的索引项。该示例假定你为每个表列准备了三个长度相等的数组。行被一次插入一行，并精确地反映了数组数据。\n\
    \n```perl\n$count = \"0\";\nforeach (@col1) {\n    $query = qq{INSERT INTO this_table\
    \ (\n                    col1,\n                    col2,\n                  \
    \  col3\n                ) VALUES (\n                    '$col1[$count]',\n  \
    \                  '$col2[$count]',\n                    '$col3[$count]'\n   \
    \             )\"};\n    $sth = $dbh->prepare($query);\n    $sth->execute();\n\
    \    ++$count;\n};\n# Listing 2-9\n# 使用 foreach 循环执行插入操作\n```"
  raw: 'You can see from the example how looping through the array’s index items

    is an easy thing with Perl. The $count variable keeps

    track of the index items for you so the database column exactly reflects

    the contents of @this_column. With each iteration of @this_column, the value

    of $this_column[$count] changed and was loaded into the database. We

    used a simple one-column MySQL statement to accomplish our task (Listing

    [2-6](#485616_2_En_2_Chapter.xhtml#PC20)).


    ```

    $count = "0";

    foreach (@this_column) {

    $query = qq{INSERT INTO this_table (col1)

    VALUES

    (''$this_column[$count]'')};

    $sth = $dbh->prepare($query);

    $sth->execute();

    ++$count;

    };

    Listing 2-6

    Using a foreach loop to INSERT from an array

    ```


    We declared a count and declared a foreach loop that will iterate

    until the length of @this_column is

    reached. We then declared the query and put it in $query. The query was

    then prepared for execution using prepare(). We executed the query using

    execute() and incremented the $count for the next iteration of the

    loop.


    Note that we used the three-step method of performing your database

    query. There are two other methods that may be used to have your query

    declared, prepared, and executed, as shown in Listing [2-7](#485616_2_En_2_Chapter.xhtml#PC21).


    ```

    $count = "0";

    foreach (@this_column) {

    $sth = $dbh->prepare(INSERT INTO this_table (col1) VALUES (''$this_column[$count]''));

    $sth->execute();

    ++$count;

    };

    Listing 2-7

    Using the two-step method to INSERT from an array

    ```


    The preceding example task shows the two-step method of achieving a

    successful insertion query. You can see that we eliminated the $query

    scalar variable and instead passed the query as the argument to the

    prepare()

    function. The execute() function was

    then called. This handy method is used extensively because it results in

    a clean query that uses less resources than does the three-step

    method.


    In our previous examples, we used the prepare() function to

    handle the query. Listing [2-8](#485616_2_En_2_Chapter.xhtml#PC22) provides a

    one-step method that can be used that omits both the prepare() and

    execute() functions entirely.


    ```

    $count = "0";

    foreach (@this_column) {

    $sth = $dbh->do(INSERT INTO this_table (col1) VALUES (''$this_column[$count]''));

    ++$count;

    };

    Listing 2-8

    Using the one-step method to INSERT from an array

    ```


    Using the do()

    method of performing your query is a handy one liner that is both

    useful and powerful. With it, you may perform any valid MySQL query.

    So we’ve explored an insertion from an array using the three-step,

    two-step, and one-step methods of performing your database query. These

    easy statements are the core of any web developer’s plethora of tricks

    and constructions.

    The simple insertion statements we’ve explored here can just as

    easily be very complicated JOIN statements that utilize the full power

    and flexibility of this duo of programming languages. The limit is your

    understanding of the languages and the needs of your situation. While

    big, powerful JOINs can be fun to work with, keep things simple and use

    the simplest method for achieving your desired end result. You’ll thank

    me when you have to work with a script that you created a year before

    and are expected to understand it.


    Inserting Many Database Items from Many Arrays

    The time will come when you require a large, multi-array insertion

    into your database. What we’ll

    explore in this section are the ways that you may insert the data that

    exists in many arrays into your database. The introduction of more

    arrays into the equation isn’t a bad thing; we’re just starting to learn

    the tremendous flexibility of this combination of programming tools.

    We’ll begin by defining several fictitious arrays, each of the same

    length. The data may be textual/ASCII or binary. Note, though, that you

    would have to create the column using the right column type. Column

    types are beyond the scope of this section, so we’ll assume all the data

    we’re working with is textual only and is being put into VARCHAR or BLOB

    column types.

    The easiest way to insert the data from many arrays into your

    database is to loop through the arrays with a foreach loop. You would

    declare a $count that is initially set to zero. This is because all

    arrays within Perl are zero based. They’re indexed according to a number

    system that starts with zero. With Perl, zero is a whole number (an

    integer).

    For each iteration of the loop, more than one array is being referred

    to. This results in a potentially massive amount of data being inserted

    into the database. Be sure to limit yourself to 300 or 400 iterations,

    although more can be used if the amount of data is fairly small for each

    insertion and your server has plenty of resources. You may have as many

    row and column insertions as you need – this construction is infinitely

    scalable. Use a LIMIT declaration to limit the amount of database rows

    to be created if that is required.

    You may use either a foreach loop or a while loop to achieve the same

    result. Use a while loop when you have a specific number of rows to be

    inserted. That is, if you know beforehand how many rows are to be

    inserted, then use while. If you have a varying amount of database rows

    to be inserted, use the foreach loop to iterate through your gathered

    arrays.


    Using a foreach Loop to Insert Many Items from Many

    Arrays


    You can see in the example task given in Listing [2-9](#485616_2_En_2_Chapter.xhtml#PC23)
    that for each

    element of @col1,

    we looped through the index items of three arrays (@col1, @col2, and

    @col3) due to the iteration of $count. The example assumes you have

    three arrays of equal length for each table column. The rows are

    inserted one at a time and perfectly reflect the array data.


    ```

    $count = "0";

    foreach (@col1) {

    $query = qq{INSERT INTO this_table (

    col1,

    col2,

    col3

    ) VALUES (

    ''$col1[$count]'',

    ''$col2[$count]'',

    ''$col3[$count]''

    )}";

    $sth = $dbh->prepare($query);

    $sth->execute();

    ++$count;

    };

    Listing 2-9

    Using a foreach loop with an insertion

    ```'
