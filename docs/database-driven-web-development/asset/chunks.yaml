    \ 模块，它为你的程序提供持久的数据库连接。它通过覆盖 `DBI` 的 `connect` 方法并保持一个开放数据库句柄的缓存来实现这一点。`Apache::DBI`\
    \ 最好的一点是，你不需要修改你现有的 `DBI` 代码来使用它。只需在你的 `use DBI;` 调用之前添加以下内容：\n\n```perl\nuse\
    \ Apache::DBI;\n```\n\n你甚至不需要移除调用 `disconnect` 的代码，因为 `Apache::DBI` 会覆盖这些调用并确保句柄实际上不会被断开连接。这种持久连接通过避免为脚本的连续调用而重新连接数据库来加快执行速度——因为一个开放的数据库连接已经存在。\n\
    \n## 启动 Apache 服务器\n\n正确启动你的 Apache 服务器是一项简单但重要的任务。`httpd` 在被调用时做的第一件事是定位并读取配置文件\
    \ `httpd.conf`。在此文件中包含了 Apache 服务器启动的位置和设置。你将指定你的根 web 位置是什么，以及其他几十个配置指令。\n在启动期间，Apache\
    \ 服务器解析 `httpd.conf` 文件，并将该文件中的设置和指令应用到该 Apache 服务器实例。你的文件位置可以在当前机器上的任何位置，无论是在\
    \ Linux 操作系统还是 Windows 操作系统上。在安装 Apache 之前，默认用户已熟练掌握这两种操作系统中的一种或两种。\n\n### 在 Windows\
    \ 操作系统上启动\n\n在 Windows 操作系统上安装时，你可以选择从源代码编译服务器的文件或使用预编译的二进制文件。如果你的 Windows 版本高于\
    \ Windows 98 并且 `MSI` 安装程序是最新的，你可以下载 `.msi` 包在你的 Windows 机器上安装 Apache。这是推荐的做法，因为它大大简化了安装过程，并确保安装程序能处理和修复可能发生的任何错误。`MSI`\
    \ 安装程序是一个内部包含了在 Windows 操作系统上安装几乎所有程序规则的程序。\n\n在 Windows 操作系统上启动是一件容易的事情。你只需指定\
    \ `Apache.exe` 文件的路径以及一两个开关。然后你给出 `httpd.conf` 文件的位置和 Apache 源文件目录的根目录：\n\n```cmd\n\
    C:\\Apache\\bin\\Apache.exe -w -f \"C:\\Apache\\conf\\httpd.conf\" -d \"C:\\Apache\"\
    \n```\n\n首先，我们声明了 `Apache.exe` 可执行文件的路径。然后我们包含了启动开关。接下来，我们包含了 `httpd.conf` 文件的路径以用于启动选项。最后，我们给出了\
    \ Apache 安装的根目录位置。\n\n## 停止或重启服务器\n\n为了停止或重启 Apache，你必须向正在运行的 `httpd` 进程发送信号。我们将先检查在\
    \ Windows 机器上停止服务器。在大多数情况下，这就像按下 `Ctrl+C` 一样简单，因此我们不会深入探讨在 Windows 机器上停止 Apache\
    \ 服务器。相反，让我们专注于命令行开关，除了可执行文件的路径外，这些开关在 Linux 和 Windows 操作系统上是相同的。\n有许多开关可用于启动、停止或重启服务器。这些开关的完整列表超出了本书的范围。但是，Apache\
    \ 安装附带的手册解释了所有这些开关以及更多内容——建议你在使用 Apache 固有的任何高级功能之前阅读该手册。\n\n### 停止 Apache 服务器\n\
    \n停止你的 Apache 安装是一件非常容易的事情，但为了你将来能使用 Apache，必须涵盖这一点。以下命令显示了如何在 Linux 系统上停止 Apache\
    \ 服务器：\n\n```bash\napachectl -k stop\n```\n\n此示例假设你位于 Apache 的工作目录内。如果不是，那么你需要使用\
    \ `apachectl` 可执行文件的完整路径。\n在 Windows 上，有两种选择可以停止已启动并在控制台中运行的 Apache web 服务器。你可以按\
    \ `Ctrl+C` 退出，或者转到任务管理器窗口并从那里退出程序。\n\n### 优雅地重启 Apache 服务器\n"
- fmt: 'There are several ways to restart your server. You can use a command-line
    directive, or you can use the operating system to stop the Apache process. You
    would then have to restart according to the procedure given in an earlier section
    of this document. Examine the following command:


    ```

    apachectl -k graceful

    ```


    A graceful restart will restart the server after all waiting server calls have
    completed. The server then restarts and accepts new calls. This has the benefit
    of completing the waiting calls to the server before restarting. You would normally
    restart in this fashion after a configuration change within your `httpd.conf`
    file.


    ## Reviewing Runtime Configuration Directives


    Runtime configuration directives are the commands and configuration notes that
    Apache uses to start the server. There are perhaps 200 of these directives, so
    a full explanation of these directives is beyond the scope of this book. See the
    manual that comes with the Apache distribution for an exhaustive and detailed
    explanation of every runtime configuration directive.


    There are nine general types of runtime directives. They are server config, virtual
    host, directory, `.htaccess`, Core, MPM (Multi-Processing Modules), Base, Extension,
    and Experimental. Each of these runtime configuration types is an integral part
    of your Apache server’s configuration and is read at server startup time.


    The configuration directives are grouped into three basic sections within the
    `httpd.conf` file:


    1.  Directives that control the operation of the Apache server process as a whole
    (the “global environment”).

    2.  Directives that define the parameters of the “main” or “default” server, which
    responds to requests that aren’t handled by a virtual host. These directives also
    provide default values for the settings of all virtual hosts.

    3.  Settings for virtual hosts, which allow web requests to be sent to different
    IP addresses or hostnames and have them handled by the same Apache server process.


    You’ll get a feel for what each type of directive does with further use of the
    server and after reading the Apache manual.


    ### Setting the Server Root


    The server root is the place where the Apache executable and configuration files
    are stored on the local machine.


    ```

    ServerRoot "C:/Apache "

    ```


    The `ServerRoot` directive tells the Apache server where the website documents,
    executables, and configuration files start.


    ### Setting the Server Name


    The server name is the domain name that the Apache server will be serving files
    to. You may specify a domain name or an IP address as the server name attribute,
    but in this case, you would enter the local loopback address: `ServerName 127.0.0.1`


    The `ServerName` directive tells the Apache server what the URL of the server
    is to be. If you are using Apache as a developer server on your own desktop computer,
    use a server name of “127.0.0.1.” This is the local loopback address and will
    allow you to serve pages on your own machine from your own machine.


    ### Setting the Document Root


    The document root is the location of the directory that will be serving the pages
    for your website. It is given as a file system location. The following example
    is a document root as given on a Windows machine:


    ```

    DocumentRoot "C:\Apache\htdocs"

    ```


    The `DocumentRoot` directive tells the server where to find the HTML files that
    will be served and is a reflection of your file system. It is also used to show
    the general location of the CGI-BIN for Perl scripts.


    ### Setting the CGI-BIN Location


    In order to use Perl with your Apache installation, Perl will have to be installed
    on the local machine. The CGI-BIN location shows the location of the Perl scripts
    that your Apache server will be serving:


    ```

    ScriptAlias /cgi-bin/ "C:\apache\htdocs\cgi-bin\"

    ```


    The example sets the `ScriptAlias` location. This tells the server where to expect
    CGI scripts. Your `ScriptAlias` doesn’t need to be within the document or server
    root – you can have it anywhere on the local machine, on any operating system
    supported.


    You may specify the location and name of your CGI-BIN as something other than
    the norm. Apache has provided this functionality for those server setups that
    don’t conform to the norm. Using a setup in this manner isn’t the norm but can
    be a fun way to personalize your website to your specifications. You don’t even
    have to have your CGI scripts end with the `.cgi` or `.pl` extension. You can
    use something descriptive to conform to your site’s theme. Simply use the knowledge
    in the coming pages to change the Apache directives to conform to your theme.


    What you would do is alter the default settings within your `httpd.conf` file,
    which is the main configuration file that Apache uses at startup to apply the
    settings that you have chosen. These settings don’t have to include the default
    settings – you may specify anything you like. There are several large sites that
    I’ve encountered that use a custom setup such as this. They’ve used the theme
    of their site to their advantage, adding a customized flair to their configuration
    files that are reflected in the address bar in the browser.


    ## Summary


    In this chapter, we learned about the Apache web server. Apache is a great server
    to work with, as we touched on. It’s a powerful and capable server that offers
    many configuration options. Every option and all functionality possibilities of
    the Apache are beyond the scope of this book – it is a book unto itself.


    ## 10. Scripted Email: Using sendmail


    This chapter will cover `sendmail`, a widely known Linux daemon that enables you
    to schedule and send a larger number of emails. I’ll show you how to do this quickly
    and easily using Perl scripts, with values taken from a database.


    ### Setting the Stage


    To start, we must lay the ground work, starting with some simple HTML markup.
    The HTML code to allow a `FORM` control to upload an image is simple but very
    important in its constituent parts. The HTML markup that we’ll use for this section’s
    discussion is given in Listing 10-1.


    ```

    1.

    2.

    3.

    Listing 10-1

    The HTML markup

    ```


    As you can see, there are three file fields being displayed. Each one has a `name`
    attribute that is unique and is listed in a logical order. The input type of “file”
    tells the browser to expect a file upload of some kind. The `enctype="multipart/form-data"`
    is essential to the success of the upload and cannot be left out. The name of
    the file and then the data (the file’s contents) are sent to the server in two
    completely separate parts. Because of this, it is said to be a multipart form.


    The simple HTML I used for the example really is all it takes to make an aesthetically
    pleasing page element. Now let’s get into the upload script itself. As with all
    Perl scripts, the script starts on its first line, an area called the shebang.
    Linux servers are the norm on the Web, so the path to find `Perl.exe` is usually
    `#!/usr/bin/perl`.


    The path may be anything, really, but it’s always good to stay with normal conventions
    and protocols when describing the path to an object. On a Windows computer, the
    shebang is usually as shown in Listing 10-2.


    ```

    C:\Progra~@\Perl\bin\perl

    Listing 10-2

    The shebang on a Windows workstation

    ```


    The first chunk of Perl script to be addressed is as shown in Listing 10-3.


    ```

    $thisfilename0 = $cgi->param(''FILE0'');

    $thisfilename1 = $cgi->param(''FILE1'');

    $thisfilename2 = $cgi->param(''FILE2'');

    $thisfile0 = $cgi->upload(''FILE0'');

    $thisfile1 = $cgi->upload(''FILE1'');

    $thisfile2 = $cgi->upload(''FILE2'');

    Listing 10-3

    Required param() and upload() code snippets

    ```'
