  trans: '

    # 2. Perl CGI 与 MySQL 基础


    Perl 通用网关接口（`CGI`）模块是一个能够在你的 Perl 脚本中动态生成 HTML 标记代码的模块。它主要被用作捕获页面参数的一种手段。虽然你可以使用
    `CGI` 模块中包含的方法来创建整个页面，但这过程冗长且效率不高。使用一个简单的 `print` 语句，将你的 HTML 标记作为打印内容，是 `CGI`
    模块更实际的用法。


    在本章中，我们将探索即将在项目中使用的 Perl 模块。我们还将使用错误控制技术，并介绍项目中用来捕获错误的方法，以使脚本能继续运行。


    接着，我们将探索 Perl 和 MySQL 查询的语法与用法——这些我们最终都会遇到——并重点介绍从数据库检索信息的方法，其间会穿插一些有趣的例外情况。


    但首先，让我们快速地进一步定义一下 `CGI`。


    ## CGI 入门


    `CGI` 是一组网络标准的组合，它定义了网络服务器与脚本之间如何交换信息。`CGI` 规范目前由 `NCSA` 维护，该标准将 `CGI` 定义为外部网关程序与
    `HTTP` 服务器等网络服务器交互的标准。创建 `CGI` 模块是为了将一些高级编程方法集中到一个紧凑而强大的源中。利用它，你能够控制表单、创建页面重定向，并访问
    Perl 环境以获取诸如用户的 `IP` 地址等信息。


    通过 `CGI` 模块的方法，你只需几个标准命令就能创建和控制 Perl 脚本的功能。我发现使用 `HTML` 表单和 `CGI.pm` 是一项不错的编程投资，因为你可以选择如何处理通过表单提交的数据。


    ## `HTTP` 方法


    `HTTP` 代表超文本传输协议，是通过网页在互联网上发送信息的基本形式。`HTML` 表单是与服务器交互并借助 `HTTP` 将信息从你的网页发送到 `CGI`
    脚本的工具。实现这一点有几种方式。


    ### `GET` 方法


    将数据从你的网页发送到服务器的 `GET` 方法可能是实现此目的的最常见方式。表单内的信息作为页面 `URL` 的一部分发送到服务器。它通常用于当你没有大量数据需要发送到服务器的情况。请查看清单
    2-1 中给出的表单元素。


    ```

    清单 2-1

    展示提交表单数据的 GET 方法

    ```


    你可以看到在 `HTML` 表单元素中调用了 `GET` 方法。如果你有少量信息需要发送到服务器进行处理并返回报告，你会使用此方法。当向服务器提交用户名和密码时，你不应该使用
    `GET` 方法，因为用户名和密码会在浏览器的地址栏中可见。


    ### `POST` 方法


    向服务器发送数据的 `POST` 方法适用于大块信息。数据在页面提交的主体中发送到服务器。只有数据发送到的脚本的 `URL` 会出现在浏览器的地址栏中。例如，如果你要上传图片，你会使用
    `POST` 方法。请查看清单 2-2 中给出的使用 `POST` 方法的示例。


    ```

    清单 2-2

    应用提交表单数据的 POST 方法

    ```


    从前面的例子可以看出，`POST` 方法用于表明数据将在文档主体内发送到服务器。还请注意，在表单元素中使用了 `enctype` 属性。这告诉服务器正在发送一大块数据，以两种形式呈现——数据本身和数据的名称，在本例中，是你上传照片的文件名。输入类型被设置为
    `FILE`。这告诉服务器正在上传文件。当你上传文件时，浏览器会打开一个对话框，其中包含你计算机硬盘上的文件夹和文件。你可以选择一个文件并双击它。然后，它将显示在网页上的文本框中。点击
    `Submit` 按钮，文件将通过名为 `perlscript.pl` 的 Perl 上传脚本进行上传。


    ## 运行 Perl `CGI` 程序


    Perl `CGI.pm` 模块需要安装在 Perl 服务器中，才能使其库可供使用。你可以从 `CPAN.org` 下载源文件来安装该模块。互联网是一个广阔的天地。`CPAN`
    库包含了数十万个 Perl 模块，以便在这个广阔的天地中工作。


    基本上有两种方式可以安装 Perl 模块：`CPAN.bat` 或 Perl 包管理器（`PPM`）。两者都易于使用，只需要与配置 Perl 本身相同的知识。我的意思是，只需简单地设置指向你计算机上资源的路径，例如本例中
    Perl 的位置。


    ### `CPAN.bat`


    `CPAN.bat` 是一个传统的基于文本的批处理文件，可在 `Windows` 或 `Linux` 操作系统上运行。它设置简单，只需要 Perl 的位置以及它可能需要用于安装
    Perl 模块的其他几个简单程序的位置。


    由于它是一个基于文本的程序，一旦你双击 `CPAN.bat`，就会看到一个命令行实用程序框打开。你可以在构成 Perl 的目录中找到 `CPAN.bat`。它与
    Perl 可执行文件（如 `perl.exe` 本身）位于同一目录中。


    配置好后，你只需输入以下命令即可安装 `CGI` 模块：


    ```

    install CGI

    ```


    `CPAN.bat` 将联系 `CPAN.org` 以获取安装所需的可执行文件。`CPAN.bat` 的一个便利功能是，它还能安装被安装模块可能需要的任何其他
    Perl 模块。也就是说，`CPAN.bat` 会安装 `CGI` 模块正常工作所需的其他 Perl 模块。


    ### Perl 包管理器


    Perl 包管理器比 `CPAN.bat` 更易用一些。它有一个 `GUI`，主要用于显示和管理你已安装的所有 Perl 模块。


    虽然你可以使用 `CPAN.bat` 查看已安装的模块，但 `PPM` 会显示完整的列表，而 `CPAN.bat` 仅根据你键入的模块名称来验证该 Perl
    模块是否已安装。在管理你的 Perl 安装方面，`PPM` 是两者中更好的选择。


    使用 `PPM` 安装 Perl 模块是小菜一碟。会显示一个小的命令行。你输入想要安装的 Perl 模块，它就会进行安装。我发现有些模块在 `PPM` 下比在
    `CPAN.bat` 下安装得更好。例如，用于处理数据库的 `DBD.pm` 模块通过 `CPAN.bat` 安装时会遇到问题，而使用 `PPM` 安装则几乎不费吹灰之力。`CPAN`
    和 `PPM` 的深入使用超出了本书的范围。


    ## 在你的脚本中包含 `CGI` 模块


    为了让一个 Perl 脚本能使用任何已创建的模块，它首先必须用 `use` 指令声明，如下所示：


    ```

    use CGI;

    ```


    这一行必须放在 Perl 脚本的顶部，就在 shebang 行之下。为了开始使用 `CGI` 模块，你必须首先声明该模块的一个新实例：


    ```

    $cgi = new CGI;

    ```


    这会生成 `CGI` 模块的一个新实例，并允许你整体使用 `CGI` 模块中包含的强大方法。

    '
- fmt: '### Manager Using the `param()` Method


    One of the most oft-used methods made available by the `CGI` module is the `param()`
    method. It is used to catch the parameters sent to the Perl script from the HTML
    page the user is interacting with:


    ```

    $param1 = $cgi->param(''input1'');

    ```


    As you can see, catching a parameter with the `CGI` module is a simple affair.
    If you need more than one parameter caught, simply start a new `param()` method
    on the next line, as follows:


    ```

    $param1 = $cgi->param(''input1'');

    $param2 = $cgi->param(''input2'');

    ```


    The second parameter is caught in exactly the same way as was the first. The only
    differences between the two are the Perl variable names and the parameter names.
    Simple.


    ### Obtaining Calling IP Address


    As you’ll see when we get into later chapters of this book, it is sometimes a
    necessity to know who is doing what on your website. In the project in later chapters,
    you’ll be uploading photos to your server to be displayed as your avatar. Because
    this functionality can be maliciously attacked with illegal images or images that
    aren’t suitable, it is of paramount importance that you know who is uploading
    the photo. The `CGI` module has prepared for this eventuality by including a means
    to retrieve the user’s IP (Internet Protocol) address.


    Every computer and server on the Internet has a unique IP address. This is needed
    because if you had two computers with the same IP address, the other computers
    on the Internet wouldn’t know which one to send the information to.


    The `CGI` module provides for this with the following simple statement:


    ```

    $userip = $cgi->remote_host();

    ```


    Using this simple-to-use line of code in your Perl script tells you the IP address
    of the person that has just interacted with your script. You need not limit this
    functionality to one upload script. Because it is so easy to use, you could record
    the user’s IP address in every script that is being used and stuff it into your
    database.


    #### Making System Calls


    Because `CGI.pm` doesn’t do absolutely everything, you will soon find the need
    to use your server’s operating system to retrieve certain pieces of information.
    The first thing that comes to mind is the date and time. `CGI.pm` can do a lot,
    but not time and date stamping. As you learned in a previous chapter, `MySQL`
    allows for time stamping, but that is only the time that the record was created
    in the database.


    In order to make a system call, you would use the Perl backtick (\`) operator.
    The following shows how to use the backtick operator to find the date:


    ```

    $date = `date`;

    ```


    As you can see, retrieving the exact date and time is a fairly simple and straightforward
    operation. Because the backtick operator allows for any system command to be executed,
    it is possible to work with files and directories via scripted action as well.


    ### Error Handling


    In working with Perl, you’ll have to include error handling within the structure
    of your script. By error handling, it is meant that unforeseen errors may occur
    that are either a pitfall of your script or as a product of malicious attacks
    by your users.


    There are a few ways to handle errors in Perl, and we’ll discuss all of them in
    this section. Before you can handle your errors, it is advisable that you first
    set your scripts up to report the error or errors properly. That is where the
    `CGI::Carp` module comes into play.


    ### `CGI::Carp`


    This module is an invaluable tool for the developer. With it, the errors that
    are thrown by Perl are echoed to the browser for you to read there. If you weren’t
    using `CGI::Carp`, your browser would display an “Error 500. A critical system
    error has occurred,” which doesn’t tell you much. You’d have to look in the Apache
    error log every time your script throws a fatal error. This can be very annoying
    and will certainly slow you down by a considerable amount of time.


    The `CGI::Carp` module must be declared at the top of the script along with the
    other Perl modules the script will be using:


    ```

    use CGI::Carp qw(fatalsToBrowser);

    ```


    It may be entered in no particular order in the list of modules you’re using.
    Used in this way, every error thrown will be sent to the browser. The error that
    has occurred is in plain language as well as the line of the Perl script and the
    Perl script name that the error occurred within is reported. You can then tell
    exactly what happened to cause the error and find a speedy solution to the problem.


    ### Where and When to Use Error Handling


    Error handling can be a bit of a hit or miss thing. A fatal error may be thrown
    in a way and from a part of your script that you didn’t think would cause problems.
    You’ll learn where to use error handling as you debug your scripts.


    I normally automatically include error handling on every database call. Even the
    slightest error is fatal when using `MySQL`. Most of the time the error is caused
    by the user using your script in a way that you didn’t anticipate. Malicious users
    are the bane of every web developer as well.


    There are a few ways to handle the errors that your scripts will throw. One is
    to wrap the Perl code in an `eval` statement or to redirect the user to a different
    custom error page.'
