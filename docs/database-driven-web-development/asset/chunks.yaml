- fmt: "## Selecting Many Items to Many Arrays\n\nSelecting large pieces of varying\
    \ data from the database can be a tricky thing for the uninitiated. This book,\
    \ among other reasons, was written to dispel the questions that we all had about\
    \ selecting many different pieces of information from your database.\n\nThe first\
    \ thing to think about is the form you want your data to be in. That is, the arrangement\
    \ of the arrays that we’ll be using should reflect the database data perfectly.\
    \ Each column will be selected into one array. Each row of that column will be\
    \ an index item of the array.\n\nUsing multiple arrays to represent multiple columns\
    \ is a good programming convention to follow. It keeps the database data easy\
    \ to understand and easier to act upon.\n\nIn the example that I’ve provided in\
    \ Listing 2-5, the arrays are `@col1`, `@col2`, and `@col3`. They perfectly reflect\
    \ the database data as it exists within the database. You can see that we used\
    \ a simple array `push` to load the subsequent pieces of data into the three arrays.\n\
    \nYou can see that through the use of a `WHERE` clause, we are able to select\
    \ essentially every piece of data within those columns of the database. Using\
    \ an operator such as `>=` (greater than or equal to) lets MySQL know exactly\
    \ what pieces of information that you require. The `id` column is an `AUTO_INCREMENT`\
    \ column.\n\nYou may order your query by the aforementioned `AUTO_INCREMENT` `id`\
    \ column without selecting the `id` column into a variable or array – MySQL does\
    \ the work for you. You don’t even have to select the `id` column; just reference\
    \ it in your query and MySQL will act accordingly. This has the benefit of keeping\
    \ the number of variables or arrays at a manageable number and simplifies the\
    \ script as a whole. The `id` column is present in every hypothetical table that\
    \ we’ll be using and is the primary key of the table.\n\nThe `AUTO_INCREMENT`\
    \ `id` column is present in every table that we’ll be using because it is such\
    \ a handy way to refer to the contents of the table rows and columns. Using this\
    \ method will ensure that you have the fastest and most capable queries possible\
    \ with this combination of Perl, MySQL, and Apache. Consider the following:\n\n\
    ```perl\n$query = qq{SELECT col1, col2, col3 FROM $this_table WHERE id >= 0 ORDER\
    \ BY id DESC};\n$sth = $dbh->prepare($query);\n$sth->execute();\nwhile (@this_data\
    \ = $sth->fetchrow_array()) {\n    push @col1, $this_data[0];\n    push @col2,\
    \ $this_data[1];\n    push @col3, $this_data[2];\n};\n```\n\nWe constructed a\
    \ query; in this case, the query is for three items: `col1`, `col2`, and `col3`.\
    \ We prepare the query using the DBI.pm `prepare()` method. This reviews the query\
    \ for syntactical correctness. We then execute the query using `execute()`. This\
    \ sends the query to the database. Then we gathered the data using the DBI.pm\
    \ `fetchrow_array()` method. The data is now contained in `@col1`, `@col2`, and\
    \ `@col3` and matches the database columns and rows exactly.\n\nWe used `fetchrow_array()`\
    \ because we wanted more than one piece of information to be pulled from the database.\
    \ For each iteration of the `while` statement, we gathered the data into the `@this_data`\
    \ array. The data is then pushed into `@col1`, `@col2`, and `@col3` using a simple\
    \ `push` statement. The `while` statement then loops again, and a new set of data\
    \ is pushed on `@this_data`, which is then pushed onto the three column arrays,\
    \ and the process repeats until there is no more data to be retrieved from the\
    \ database.\n\nA few words should be given to system resources. Using such a powerful\
    \ construction can potentially lead to an overwhelmed server. This is because\
    \ of the massive amount of data that can be fetched into the three column arrays\
    \ in our example. A good convention to follow regarding your data is related to\
    \ the amount of `RAM` your server has available. On most systems, you may check\
    \ the average amount of memory available using various programs. We won’t get\
    \ into the workings of such a program. What we need to know right now is the amount\
    \ of free `RAM` you have on your server. Simply don’t fetch more data than the\
    \ amount of memory you have.\n\n## Inserting Many Database Items from One Array\n\
    \nUsing an array to insert your database items is a bit complicated but is still\
    \ a fairly simple task. There are just a few things that you would have to consider\
    \ while using this approach. This section will explain them.\n\nUsing a `$count`\
    \ that increments with every iteration of the loop, it is possible to dynamically\
    \ insert as many rows as you have a need for. Your limit is your resources, so\
    \ a few words must be given to system resources. Because this method of inserting\
    \ table rows is a very powerful one, it is possible to overwhelm your server by\
    \ using an array that contains more data than can be handled successfully and\
    \ in a timely fashion by the server. You wouldn’t use a construction such as this\
    \ to insert thousands of table rows with each piece of data having many kilobytes\
    \ of information. The resulting operation, while still safe, might leave you with\
    \ an overwhelmed server.\n\nWhile it is possible to use a `while` loop in your\
    \ constructions to achieve the same result, the efficiency and simplicity of the\
    \ `foreach` loop with a `$count` variable make it a better choice. There is less\
    \ to do with a `foreach` loop, since all we’re doing is iterating through the\
    \ array’s index items and incrementing a count. The `foreach` loop automatically\
    \ loops through the entire array and stops when it has reached the end of the\
    \ array given as the argument.\n\nWith a `while` statement, you would have to\
    \ have a test be performed to see if the `$count` matches the number of index\
    \ items in the array. This slows things down, just a bit. However, if you know\
    \ beforehand the number of items in the array, by all means use a `while` statement.\
    \ Keep in mind this is only if you previously know the length of the array to\
    \ be used.\n\n### Using a foreach Loop to Insert from an Array\n\nWe stated the\
    \ database query and placed it in `$query`. We then called the `prepare()` method\
    \ to prepare the `$query` for execution. The `execute()` method was used to execute\
    \ the database call, and we used a `while` loop to iterate through the table columns,\
    \ pushing the array for each iteration.\n\nWith Perl and MySQL, it is entirely\
    \ possible to select a large amount of information in one database query. You\
    \ eventually want to make some very large lists of information that reflect many\
    \ columns and rows of the database. Like I said before, you want your arrays and\
    \ variables to reflect the contents of your database.\n\nBecause the script makes\
    \ multiple calls to the database, it is a necessity to keep things clear and simple\
    \ by reflecting the database structure in your variables and arrays. For each\
    \ row of the database, there is a corresponding set of arrays that represent the\
    \ table columns. This simple yet effective method of reflecting the database structure\
    \ in your variables and arrays is a good programming convention to stick to. It\
    \ will make your more complicated future scripts much simpler to follow and will\
    \ allow a much more complicated database model for future machinations.\n\nThe\
    \ coming examples show how to put the data from many table rows in columns that\
    \ reflect the structure of the database. You can see that the data retrieved is\
    \ placed in three different arrays to be acted upon. The `fetchrow_array()` method\
    \ of the DBI.pm module is used to perform the multicolumn query. Each column of\
    \ the database is reflected in the arrays that follow, one array to each column.\
    \ The rows are structured as the index items of each successive array."
