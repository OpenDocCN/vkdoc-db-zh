    # 1. Database-Driven Web Development Fundamentals


    The database was first created by software engineers at North American Rockwell
    in the mid-1970s. They were previously using static files to catalogue the work
    they were producing. They began to notice that efforts were being duplicated,
    as a project such as the designing of an Apollo-era rocket generates hundreds
    of thousands of different parts. Each part was given a static file. Keeping track
    of these hundreds of thousands of parts was a nightmare before the relational
    database was put into practice. With it, they were able to find the duplicated
    efforts and eliminate them.


    We’ll begin this chapter by reviewing the fundamentals of database-driven websites
    before moving on to the pros and cons of web hosting, delving into the options
    that are available. You’ll see how the modern database fits into the process of
    using three different servers (the Perl, Apache, and MySQL servers) to generate
    a web page. These three servers are what we’ll be learning to use together in
    this book. Read on, it’s going to be fun!


    ## The Evolution of the Database-Driven Approach


    During the infancy of the Internet, databases weren’t used with websites. All
    pages were static HTML pages. Today, they’d be pretty boring sites to surf, as
    we’ve all become accustomed to the modern database-driven website.


    The world caught on to the idea that databases were the more efficient way to
    go, eventually leading to our database-driven world. All of our worldly services
    from banking to social networks now use a database of some flavor.


    Of particular note is the Internet. Databases are widely used to serve the pages
    that we all look at every day. They integrate seamlessly into a web page and have
    changed the world we live in. Databases are here to stay, so it is of paramount
    importance that you know a thing or two about them.


    Since the database runs on a server, there has to be a way to access these databases.
    There are many different ways to do this, as there are many different languages
    used in modern computing. We’ll be concentrating on the interactions between the
    MySQL database and the Perl scripting language.


    Perl has great capabilities when it comes to interacting with databases. It is
    a powerful language that has been around for decades. It is a mature technology
    and is best suited to working with text. Perl stands for Practical Exporting and
    Reporting Language and was first used to manipulate text within common static
    text files. Since the languages we use in web development are textually based,
    Perl is the way to go when dealing with large textual documents (e.g., HTML markup).


    Coupled with a database, Perl is a powerful and capable engine to power the modern
    website. Perl usually runs on the same server or at least the same network that
    the database runs on. This allows for fast and efficient interactions comprised
    of large blocks of textual data, such as the HTML code used in every page on the
    Internet today.


    Databases are evolving to fill the need for newer, faster, and more powerful websites.
    It is common for one website to use many databases to serve its web pages. This
    scalable ability is the cornerstone of today’s website. As the site grows, more
    databases are required to run the website. Parceling your website data from one
    or two databases into, say, a dozen allows you to access these databases from
    different parts of the website in a timely fashion under a heavy user load.


    ## How to Spot a Database-Driven Website


    Most people just take it for granted that their web page will just load with the
    information they expect to be there. As a developer, you need to know how to spot
    a database-driven website. There are a few ways you can do this. We’ll examine
    the different ways to spot one and to know, in general, what database is being
    used, in what way, and why.


    ### The Website Address (URL)


    The first, and perhaps easiest, method to use to spot a database-driven website
    is the URL in the address bar of the browser. If you were to look at a web page
    that is a static HTML page, you would see an address that ends in a file name
    with the `.html` file extension. Examine the following example:


    `http://www.domain.com/index.html`


    You can see the constituent parts of the web address clearly: the address starts
    with the standard `http://www.domain.com` and ends with the file named `index.html`.


    Most websites use `index.html` as the default starting point of their website.
    It is the main page that the Apache web server sees as the base file of any given
    website, although it is entirely possible to use a different file name as the
    starting point of your website. Configuring your web server is tackled in a coming
    chapter of this book.


    The `.html` extension tells you that the page is a static HTML page. There is
    nothing to the right of the address bar, so it is a good bet that a database isn’t
    being used at all on that website.


    When you use Perl to present a database-driven page, the file extension is either
    `.cgi` or `.pl`. If there’s a database being used, a question mark will be displayed
    after the file name extension. What follows the question mark is unique to each
    website. Examine the following URL:


    `http://www.domain.com/thisfile.cgi?id=1234`


    You can see the basic constituent parts of a URL, including a Perl script named
    `thisfile` with the extension `.cgi`. Then comes a question mark followed by the
    `id=1234` statement. This is a good indicator that a database is being used. There
    may be many different statements after the question mark, each separated with
    an ampersand (`&`), as follows:


    `http://www.domain.com/thisfile.cgi?id=1234&id2=5678`


    You can see now that the URL shows two different statements called parameters.
    These parameters show that two sets of data within the parameters are being passed
    to the server. While it is possible that a database isn’t being used with these
    parameters, it is very uncommon to see more than one parameter that is being used
    without a database being in the loop somewhere.'
