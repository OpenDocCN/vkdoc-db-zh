    the script via their browsers within your cgi-bin.


    ## Obtaining Your Path Statement with printenv.pl


    One of the first things you need to know about your server’s setup is the path
    statement. Within the path statement is the hierarchy of directories that extend
    from the root directory of your account to the working directories you’ll be using,
    such as the cgi-bin directory that will hold all of your site’s cgi scripts.


    To obtain your path statement, it is required that you run a small but powerful
    script called printenv.pl. Simply upload the file and adjust its rights and permissions
    to chmod 755\. Run the script in your browser and you’ll be able to pick out the
    path statement. The following is code used in this small script:


    ```

    print "Content-type: text/plain; charset=iso-8859-1\n\n";

    foreach $var (sort(keys(%ENV))) {

    $val = $ENV{$var};

    $val =~ s|\n|\\n|g;

    $val =~ s|"|\\"|g;

    print "${var}=\"${val}\"\n";

    }

    ```


    This small piece of code tells you everything that is within the server’s environment,
    including the path statement to many resources that will come in handy in later
    chapters of this book.


    The path statements on a server are pointers to resources that are accessed directly
    from the operating system or the server in question. For example, a path statement
    in Windows can be set up to affect the Perl shebang. If you were to install Apache
    to c:\Apache, the shebang in your Perl script will be as follows:


    ```

    C:\Apache\bin\perl

    ```


    As you can see, the location allows for the server to find perl, but you may have
    to give the path to the perl.exe executable, as follows:


    ```

    C:\Apache\bin\Perl\perl.exe

    ```


    Giving the fully formed location to perl.exe is a security nightmare. Use it only
    if you don’t want to set up an operating system’s path statements from the control
    panel.


    ## Summary


    In this chapter, we touched on the basic functionality of the various technologies
    we’ll be using to create fully formed web pages. We discussed your web hosting
    options and how the three servers (Perl, MySQL, and Apache) are used together.


    We touched on rights and permissions and basic knowledge that we will be building
    on in the chapters to come.'
  trans: '

    ## 安全交易


    一个需要询问的重要事项是，您是否能在收集支付信息或敏感信息的网站部分使用 SSL（安全套接层）。许多网络托管公司仅允许在独立服务器或`VPS`服务器上启用
    SSL。


    您可以通过查看浏览器的地址栏来判断一个页面是否受到 SSL 保护。地址栏开头不是`http://`，协议应为`https://`。这表明正在使用数字证书，您的数据处于安全保护之下，免受窥探。有些网站并不将
    SSL 的使用局限于特定部分——他们使用 SSL 来保护整个网站的数据。虽然这样做没问题，但通常没有必要。


    ## Plesk 还是 cPanel？


    大多数网络托管公司会提供两种不同的网络应用程序来管理您的服务器，即`Plesk`或`cPanel`。它们的功能大致相同，只有少许差异。它们看起来略有不同，但实现的目标一致。选择使用哪种服务器管理应用程序取决于您。有些人更喜欢`Plesk`，有些人则偏好`cPanel`。使用哪种应用程序完全由您决定，因为大多数网络托管公司都会提供这两种最常见服务器管理器的选择。


    ## 硬盘空间和数据传输限制


    另一个值得关注的问题是分配给您的硬盘空间量。`MySQL`数据库会占用大量空间，因此您应该选择至少有 5GB 可用硬盘空间的共享主机方案。


    如果您计划上传文件，请确保有足够的空间来维持网站运行。如果您使用的是共享主机方案，请选择提供硬盘空间最多的方案。当您使用的空间达到租用空间的三分之二时，就该考虑升级您的主机解决方案了。您的服务器管理器（`Plesk`或`cPanel`）会以易于理解的方式告诉您已使用的空间量和剩余空间量。


    大多数网络托管公司对您在 30 天内可使用的数据传输量有限制。请务必询问您账户的带宽限制，以及如果您的数据传输需求超出带宽配额需要支付的额外费用。


    ## 转售商


    大多数网络托管公司允许通过第三方转售其服务。这些转售商通常只提供非常低价的共享网络托管服务，例如每月 3.99 美元。他们纯粹是共享服务提供商，通常不提供独立服务器或`VPS`方案，因此您的升级选择有限。


    虽然这些转售商在您网站生命周期的初期阶段尚可使用，但如果您已经收集了用户数据并不得不迁移到独立服务器或`VPS`服务器，他们可能会带来一些问题。您需要找到一种方法，将用户数据从转售商的共享服务器迁移到您主要网络托管公司的独立服务器或`VPS`服务器。


    使用非主要服务提供商的网络托管公司，有时也会导致对共享服务器进行某些更改时出现漫长的延迟。您的技术支持请求需要先经过转售商，然后转到主要托管公司寻求解决方案，之后再返回给转售商，转售商再将请求结果告知您。这个过程可能耗时很长，导致您不得不坐着等待结果。以上就是关于共享服务器的内容；接下来让我们继续探讨`VPS`服务器。


    ## 安装 Perl 模块


    在互联网上使用 Perl 时，您最终会需要安装更多的 Perl 模块来完成某些任务。如前一节所述，您可以使用`Plesk`或`cPanel`来完成此操作。两种方法都适用，并分别使用`CPAN.bat`或`PPM`。深入探讨`CPAN.bat`和`PPM`超出了本书的范围。


    ## 文件传输协议（FTP）客户端


    FTP 客户端是允许您使用 FTP 远程访问服务器上文件的程序。借助它们，您可以在服务器上移动文件、创建目录，并在创建和调试时更新您的 cgi 脚本。


    有许多不同的 FTP 客户端可供选择。到目前为止，我发现最好的是一款名为`FileZilla`的免费软件应用程序。它有一个连接管理器，允许您保存要连接的不同网站列表，并提供将您的网站打造成一个完整互联网产品所需的所有功能。


    ### 文件权限


    您服务器上的每个文件都分配有一组权限。有些是自动分配的，有些则需要您手动分配。Perl cgi 脚本一旦上传，会缺乏用户通过浏览器运行它们所需的权限。


    要分配适当的权限，请查看您的 FTP 客户端。应该有一种简单的方法来更改相关文件或文件的权限。


    Linux 的`chmod`命令用于更改文件的权限。在`FileZilla`中，只需选中您需要更改权限的文件或文件。右键单击选中的文件或文件，然后选择`权限`。将打开一个包含九个复选选项的对话框。还有一个字段，您可以根据
    Linux 的权限体系直接输入正确的权限代码。要让用户在您的服务器上运行 cgi 脚本，请在此字段中输入`755`（不带引号）。您会看到对话框会自动更新相应的字段。点击`确定`，您就更改了文件的权限，允许用户通过其浏览器在您的`cgi-bin`目录中执行脚本。


    ## 使用 printenv.pl 获取您的路径语句


    关于服务器设置，您首先需要了解的事情之一就是路径语句。路径语句中包含了从您账户的根目录到您将使用的工作目录（例如将存放您所有网站 cgi 脚本的`cgi-bin`目录）的目录层级结构。


    要获取您的路径语句，您需要运行一个虽小但功能强大的脚本，名为`printenv.pl`。只需上传该文件并将其权限调整为`chmod 755`。在浏览器中运行该脚本，您就能找到路径语句。以下是这个小脚本中使用的代码：


    ```

    print "Content-type: text/plain; charset=iso-8859-1\n\n";

    foreach $var (sort(keys(%ENV))) {

    $val = $ENV{$var};

    $val =~ s|\n|\\n|g;

    $val =~ s|"|\\"|g;

    print "${var}=\"${val}\"\n";

    }

    ```


    这段小代码告诉您服务器环境中的所有信息，包括许多资源的路径语句，这些资源在本书后续章节中会派上用场。


    服务器上的路径语句是指向可直接从操作系统或相关服务器访问的资源的指针。例如，在 Windows 中设置的路径语句可能会影响 Perl 的 shebang（解释器路径）。如果您将
    Apache 安装到`c:\Apache`，您 Perl 脚本中的 shebang 将如下所示：


    ```

    C:\Apache\bin\perl

    ```


    如您所见，这个位置允许服务器找到`perl`，但您可能需要给出`perl.exe`可执行文件的完整路径，如下所示：


    ```

    C:\Apache\bin\Perl\perl.exe

    ```


    提供`perl.exe`的完整路径是一个安全隐患。仅当您不想从控制面板设置操作系统的路径语句时才使用它。


    ## 总结


    在本章中，我们概述了将用于创建完整网页的各种技术的基本功能。我们讨论了您的网络托管选项，以及三个服务器（Perl、`MySQL`和 Apache）如何协同工作。


    我们介绍了权限和基本知识，这些内容将在接下来的章节中进一步构建。

    '
- fmt: '# 2. Perl CGI and MySQL Essentials


    The Perl Common Gateway Interface (`CGI`) module is a module capable of creating
    HTML markup code on the fly within your Perl script. It is mostly used as a means
    to catch the parameters of a page. While you could create entire pages with the
    methods included in the `CGI` module, it is a lengthy process and isn’t very efficient.
    A simple `print` statement with your HTML markup as the printed material is a
    much more practical use of the `CGI` module.


    In this chapter, we’ll be exploring the Perl modules that will be used in the
    upcoming project. We’ll also be using error control techniques and will introduce
    the methods used in the project to trap the errors in a manner that allows the
    script to continue running.


    We’ll then be exploring the syntax and use of Perl and the MySQL queries that
    we all will come across eventually and concentrate on retrieving information from
    the database, with a few exceptions for fun.


    But first, let’s quickly define `CGI` a bit further.


    ## CGI Primer


    `CGI` is a combination of web standards that defines how information is exchanged
    between the web server and the script. `CGI` specifications are currently maintained
    by the `NCSA` that defines `CGI` as a standard for external gateway programs to
    interface with web servers such as `HTTP` servers. The `CGI` module was created
    in order to make available some of the higher forms of programming methods available
    in one compact and powerful source. With it, you’re able to control forms, create
    page redirects, and access the Perl environment to retrieve things like the user’s
    `IP` address.


    Through the methods of the `CGI` module, you will be able to create and control
    your Perl script’s capabilities with only a few standard commands. I’ve found
    that working with `HTML` forms and `CGI.pm` is a good programming investment,
    as you’re given a few options as to how the data submitted via the form will be
    handled.


    ## `HTTP` Methods


    `HTTP` stands for Hypertext Transfer Protocol and is the base form of sending
    information over the Internet via your web page. An `HTML` form is the tool to
    interact with the server and send information from your web page to the `CGI`
    script via `HTTP`. There are a couple of ways to do this.


    ### The `GET` Method


    The `GET` method of sending data from your web page to the server is perhaps the
    most common way of achieving this. The information within the form is sent to
    the server as part of the `URL` of the page. It is mostly used when you don’t
    have a lot of data to be sent to the server. Examine the form element given in
    Listing 2-1.


    ```

    Listing 2-1

    Displaying the GET method of submitting FORM data

    ```


    You can see where the `GET` method is invoked within the `HTML` form element.
    You would use this if you have a small amount of information to be sent to the
    server to be acted upon and reported back. You wouldn’t use the `GET` method when
    submitting a username and password to the server, as the username and password
    would be visible within the browser’s address bar.


    ### The `POST` Method


    The `POST` method of sending data to the server is for large blocks of information.
    The data is sent to the server in the body of the page submission. Only the `URL`
    of the script that the data is being sent to appears in the address bar of the
    browser. You would use the `POST` method if you’re uploading an image, for example.
    Examine the example of using the `POST` method given in Listing 2-2.


    ```

    Listing 2-2

    Applying the POST method of submitting FORM data

    ```


    As you can see from the preceding example, the `POST` method was used to signify
    that the data is to be sent to the server within the body of the document. Notice
    also that an `enctype` attribute was used within the form element. This tells
    the server that a large block of data is being sent, in two forms – the data itself
    and the name of the data, in this case, the file name of the photo you’re uploading.
    The input type is set to `FILE`. This tells the server that a file is being uploaded.
    When you are uploading a file, the browser opens a dialog box, within which are
    the folders and files on the hard drive of your computer. You would select a file
    and double-click it. It will then be made visible within the text box on the web
    page. Click the `Submit` button and the file will be uploaded via the Perl upload
    script named `perlscript.pl`.


    ## Running Perl `CGI` Programs


    The Perl `CGI.pm` module is required to be installed within the Perl server for
    its libraries to be made available for use. The source files may be downloaded
    from `CPAN.org` in order for you to install the module. The Internet is a vast
    thing. The `CPAN` library contains hundreds of thousands of Perl modules in order
    to work in this vastness.


    There are basically two ways that you can install a Perl module: `CPAN.bat` or
    the Perl Package Manager (`PPM`). Each is easy to use, requiring only the same
    knowledge required to configure Perl itself. By this, I mean simple path statements
    to resources on your computer such as, in this case, the location of Perl.


    ### `CPAN.bat`


    `CPAN.bat` is an old-fashioned text-based batch file that runs on either `Windows`
    or `Linux` operating systems. It is easy to set up, requiring only the locations
    of Perl and a couple of other simple programs it may need in order to install
    the Perl modules.


    Since it is a text-based program, you’ll see a command-line utility box open once
    you double-click `CPAN.bat`. You can find `CPAN.bat` within the directories that
    make up Perl. It is in the same directory as the Perl executables, such as `perl.exe`
    itself.


    Once configured, you simply enter the following command in order to install the
    `CGI` module:


    ```

    install CGI

    ```


    `CPAN.bat` will contact `CPAN.org` in order to fetch the executables required
    for the installation. A handy feature of `CPAN.bat` is its ability to also install
    any other Perl modules that may be required for the installing module. That is,
    `CPAN.bat` installs the other Perl modules that the `CGI` module will require
    to work properly.


    ### The Perl Package Manager


    The Perl Package Manager is a bit easier to use than `CPAN.bat`. It has a `GUI`
    that is used primarily to display and manage all of the Perl modules you have
    installed.


    While you can use `CPAN.bat` to see what modules you have installed, `PPM` displays
    the entire list as `CPAN.bat` only verifies the Perl module is installed according
    to your typing the name of the module in question. `PPM` is the better of the
    two at managing your Perl installation.


    Installing a Perl module with the `PPM` is a breeze. A small command line is displayed.
    You enter the Perl module you’d like to install and it does so. I’ve found that
    some modules install better under `PPM` than `CPAN.bat`. The `DBD.pm` module for
    working with databases, for example, has problems installing via `CPAN.bat`, while
    it installs with a minimum of fuss with `PPM`. The in-depth use of both `CPAN`
    and `PPM` is beyond the scope of this book.


    ## Including the `CGI` Module in Your Script


    In order for a Perl script to use any module ever made, it first must be declared
    with the `use` directive, as follows:


    ```

    use CGI;

    ```


    This line must be put at the top of the Perl script, just below the shebang. In
    order to start using the `CGI` module, you must first declare a new instance of
    the module:


    ```

    $cgi = new CGI;

    ```


    This generates a new instance of the `CGI` module and allows you to use the powerful
    methods contained within the `CGI` module as a whole.'
