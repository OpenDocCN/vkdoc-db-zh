  trans: '# 图 9-2


    Apache 二进制安装程序的启动画面。


    如同所有软件安装一样，首先会显示一个标题页面，展示重要数据，如版本和版权声明。接下来是许可协议和法律条款。您必须审阅此页面上的信息，以确保不会违反合同。内容相当基础。


    许可协议本身并不冗长或复杂。其中大部分是基本规则和通用使用说明。基本上，只要您不修改源代码并期望它正常工作，就可以使用。


    协议中的另一项重要声明是，您不得将 Apache 服务器作为自己的产品出售，即使在修改了大部分源代码之后。


    请务必阅读该协议。只需几分钟，但它回答了许多关于如何以及如何不能使用此软件的问题。


    点击图 9-3 所示的接受选项，然后点击下一步。


    ![](img/485616_2_En_9_Fig3_HTML.jpg)


    一个标题为 "Apache HTTP server 2.2 安装向导" 的窗口截图。该页面显示许可协议及其下方的条款和条件。要进入下一页，需选择接受选项。


    ## 图 9-3


    接受许可协议。


    免费软件中使用的协议通常始于 GNU 公共许可证，这是 Apache 等免费软件早期使用的标准协议。


    许可协议之后是一个窗口，您需要在两处输入本地回环地址 `127.0.0.1`，如图 9-4 所示。该页面要求提供网络域名 Internet 地址、服务器名称、管理员电子邮件，以及是作为服务安装还是在控制台中手动安装。


    ![](img/485616_2_En_9_Fig4_HTML.jpg)


    一个标题为 "Apache HTTP server 2.2 安装向导" 的窗口截图。该页面显示服务器信息。它包括网络域名、服务器名称和管理员的电子邮件地址。


    ## 图 9-4


    填写安装选项。


    这里我们需要解释一下。一个程序——在此情况下是一个服务器——可以作为操作系统的**服务**运行，也可以作为控制台中的**程序**运行。在控制台中运行的程序是从命令行启动的，并在黑底白字的屏幕上显示其操作参数。


    选择哪种方式通常取决于您安装的用途。如果 Apache 安装在将作为实时 Web 服务器运行、通过 Internet 提供页面的服务器上，请选择作为服务安装。如果它将是一个
    Web 开发工作站，请选择手动启动（即在命令提示符下启动）。在控制台中启动仍然提供完整功能，但不会持续运行，例如当您不编写网页时。


    您可能想知道为什么我在 "网络域名" 和 "服务器名称" 字段中都使用本地回环地址。为了提供域名服务，您必须安装并使用 `DNS`（域名服务器）。`DNS`
    服务器将计算机理解的 `IP` 地址匹配成人类可以理解的形式，即域名。虽然您可以轻松地通过 `IP` 地址找到网站，但对大多数人来说，如果想再次找到该网站，记住单词比数字更有效。`DNS`
    服务器如何完成这些工作超出了本书的范围。为了使工作站能为自身提供网页服务，您需要使用此地址，操作系统会自动将其视为本地安装。


    作为服务安装 Apache 需要管理员权限。停止和启动服务器也需要此权限，如果您以这种方式安装，将会看到。


    作为手动启动的程序安装，允许您根据需要简单地停止和启动 Apache 服务器，而不是在您不编程或不提供页面时，它始终作为一个占用资源的活动服务。下一个窗口，图
    9-5，要求您选择 "自定义" 或 "典型" 安装。选择 "自定义" 并点击下一步。


    ![](img/485616_2_En_9_Fig5_HTML.jpg)


