- fmt: '# Selecting Many Database Items into Many Variables


    You would normally use the one-step `do()` method if you need to quickly perform
    a small amount of work. You wouldn’t want to use the `do()` method with a `foreach`
    loop that is a million iterations long.


    Since there will be a future need to select many pieces of information into many
    variables, the examples will show this. However, there are a few points to consider
    before continuing. This section of the book will delve into these points to remember
    and offer example tasks that reflect the functionality that we’re shooting for.


    There are two general functions that you may use to retrieve data from a database
    using the Perl `DBI` module. One is used for single pieces of data being pulled
    from the database. This is the `fetchrow()` method. It is used to retrieve single
    pieces of information from a database that will be stored either in one scalar
    variable or within one simple array. Since we’ll be retrieving more than one piece
    of information, it is recommended that you use the `fetchrow_array()` method to
    achieve your database query.


    The `fetchrow_array()` method is of a higher order than is the `fetchrow()` method,
    making the executions with this method very fast and very reliable. The simple
    constructions used with the `fetchrow_array()` method are effective and intuitive,
    which no doubt lends to the massive popularity of the Perl `DBI` module.


    The database query itself must be of a sort that allows for more than one piece
    of data to be retrieved. Using a `WHERE` clause is the easiest and most straightforward
    way of accomplishing this. For example, if you were to use one definite value
    with your `WHERE` clause, you would only be able to retrieve one piece of data.
    Through the use of a `WHERE` clause that is designed to offer more than one result,
    the script is able to retrieve multiple values from multiple columns or rows,
    as the examples suggest. A simple `>` (greater than) operator achieves this very
    well, as you’ll see in the coming examples.


    The examples outline the constructions that can be used to retrieve many pieces
    of information and store them in several scalar variables. You can use an array
    in place of the variables, but this is not recommended. Keep your coding as simple
    as possible and you’ll have the best results.


    As always, the data retrieved should be presented in your variables and arrays
    as it exists in the database. This lends to a clean and concise database model
    and an easy-to-understand script. This is also a very easy-and-simple-to-implement
    approach to working with a database.


    # Selecting Many Database Items into One Array


    Let’s start using arrays as the end product of our database queries. We’ll begin
    with the simplest of constructions, pulling many pieces of information from the
    database and putting them in one array. Since there is only one piece of information
    to be pulled from the database at one time, the `fetchrow()` method will be used.
    The successive database data items are `push`ed onto an array to achieve the final
    result – an array that reflects your database columns exactly.


    The example pulls many rows of data from one table and places the table data in
    one array. You may then access the data within the array by index numbers or loop
    through the entire array for one large list. Of note in the example tasks is the
    `id >= 0`, which tells `MySQL` to fetch all of the columns whose `id` value is
    greater than or equal to zero. This will essentially pull every row of the table
    and place the data in one array, which will be a perfect reflection of what you
    have in that one database column.


    You wouldn’t use `fetchrow_array()` because we are fetching only one column of
    the database table. Although we are fetching only one column, the columns will
    span across many rows. In this situation, the `fetchrow_array()` method is not
    needed. The `fetchrow()` method fits the need very well.


    In the examples, it can be seen that every conceivable option for pulling data
    from the database is explored – the `DBI` module is a great piece of work to use.
    You can see from the example tasks that a very large amount of information can
    be fetched using the methods described. You may then act upon the data as you
    see fit. With a database call like this one, you are conceivably working with
    a very large amount of data. Constructing a list is a simple affair of looping
    through the index items with a `foreach` or `while` statement.


    # Selecting Many Pieces of Information Using a WHERE Clause


    `WHERE` clauses are wonderfully useful tools to use. They are easy to understand
    and use and make your database calls easy to implement. You can apply string or
    number type syntax. As you can see in Listing 2-5, mathematical operators may
    be used in your `MySQL` statement.


    ```perl

    $query = "SELECT col1 FROM this_table WHERE id >= 0";

    $sth = $dbh->prepare($query);

    $sth->execute();

    while ($thisvalue = $sth->fetchrow()) {

    push @thisarray, $thisvalue;

    }

    ```

    Listing 2-5: Implementing a WHERE clause'
  raw: 'You would normally use the one-step do() method if you need to

    quickly perform a small amount of work. You wouldn’t want to use the

    do() method with a

    foreach loop that is a million iterations long.


    Selecting Many Database Items into Many

    Variables

    Since there will be a future need to select many pieces of

    information into many variables, the examples will show this. However,

    there are a few points to consider before continuing. This section of

    the book will delve into these points to remember and offer example

    tasks that reflect the functionality that we’re shooting for.

    There are two general functions that you may use to retrieve data

    from a database using the Perl DBI module. One is

    used for single pieces of data being pulled from the database. This is

    the fetchrow() method. It is used to retrieve single pieces of

    information from a database that will be stored either in one scalar

    variable or within one simple array. Since we’ll be retrieving more than

    one piece of information, it is recommended that you use the

    fetchrow_array() method to achieve your database query.

    The fetchrow_array()

    method is of a higher order than is the fetchrow() method, making

    the executions with this method very fast and very reliable. The simple

    constructions used with the fetchrow_array() method are effective and

    intuitive, which no doubt lends to the massive popularity of the Perl

    DBI module.

    The database query itself must be of a sort that allows for more than

    one piece of data to be retrieved. Using a WHERE clause is the

    easiest and most straightforward way of accomplishing this. For example,

    if you were to use one definite value with your WHERE clause, you would

    only be able to retrieve one piece of data. Through the use of a WHERE

    clause that is designed to offer more than one result, the script is

    able to retrieve multiple values from multiple columns or rows, as the

    examples suggest. A simple > (greater than) operator achieves this

    very well, as you’ll see in the coming examples.

    The examples outline the constructions that can be used to retrieve

    many pieces of information and store them in several scalar variables.

    You can use an array in place of the variables, but this is not

    recommended. Keep your coding as simple as possible and you’ll have the

    best results.

    As always, the data retrieved should be presented in your variables

    and arrays as it exists in the database. This lends to a clean and

    concise database model and an easy-to-understand script. This is also a

    very easy-and-simple-to-implement approach to working with a

    database.


    Selecting Many Database Items into One Array

    Let’s start using arrays as the end product of our database queries.

    We’ll begin with the simplest of constructions, pulling many pieces of

    information from the database and putting them in one array. Since there

    is only one piece of information to be pulled from the database at one

    time, the fetchrow()

    method will be used. The successive database data items are

    pushed onto an array to achieve the final result – an array that

    reflects your database columns exactly.

    The example pulls many rows of data from one table and places the

    table data in one array. You may then access the data within the array

    by index numbers or loop through the entire array for one large list. Of

    note in the example tasks is the id >= 0, which tells MySQL to fetch

    all of the columns whose id value is greater than or equal to zero. This

    will essentially pull every row of the table and place the data in one

    array, which will be a perfect reflection of what you have in that one

    database column.

    You wouldn’t use fetchrow_array() because

    we are fetching only one column of the database table. Although we are

    fetching only one column, the columns will span across many rows. In

    this situation, the fetchrow_array() method is not needed. The

    fetchrow() method fits the need very well.

    In the examples, it can be seen that every conceivable option for

    pulling data from the database is explored – the DBI module is a great

    piece of work to use. You can see from the example tasks that a very

    large amount of information can be fetched using the methods described.

    You may then act upon the data as you see fit. With a database call like

    this one, you are conceivably working with a very large amount of data.

    Constructing a list is a simple affair of looping through the index

    items with a foreach or while statement.


    Selecting Many Pieces of Information Using a WHERE

    Clause


    WHERE clauses are

    wonderfully useful tools to use. They are easy to understand and use and

    make your database calls easy to implement. You can apply string or

    number type syntax. As you can see in Listing [2-5](#485616_2_En_2_Chapter.xhtml#PC18),
    mathematical

    operators may be used in your MySQL statement.


    ```

    $query = "SELECT col1 FROM this_table WHERE id >= 0";

    $sth = $dbh->prepare($query);

    $sth->execute();

    while ($thisvalue = $sth->fetchrow()) {

    push @thisarray, $thisvalue;

    }

    Listing 2-5

    Implementing a WHERE clause

    ```'
