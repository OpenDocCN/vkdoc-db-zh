- fmt: '# Installing the MySQL Server


    ## Setup Type Selection


    As with most software installations, the first thing you’re asked is if you’ll
    allow changes to be made to the operating system. Click `Yes` or `No`. `Yes` will
    allow the installation of the MySQL server to begin. `No` will promptly end the
    installation.


    The first dialog box of the installation program to open is the setup type. There
    are five different installation options. While they all should be explored eventually,
    for purposes of discussion, we’ll go with the `Full` setup type. This will install
    every feature and ability that is possible with the binary, including the official
    manuals.


    The MySQL server installation and configuration typically take about ten minutes,
    depending on the resources that are available to you and what you’ve chosen to
    install. You’ll be asked for basic things like usernames and passwords and networking
    concerns that we’ll discuss as needed.


    The MySQL install packages come in two general installation types: a small, 4-
    or 5-megabyte installer and a 450-megabyte installer. The difference between the
    two is in the way the installation is allowed to proceed. The small package is
    a web installer. If you use this package, the installation will start but will
    eventually pause to download the rest of the setup software. The big one is the
    entire installation package in one `MSI` installer.


    It is recommended that you download the entire 450 megabyte package so you can
    still install and configure the workstation should Internet connectivity become
    a problem (Figure 8-1).


    ![](images/485616_2_En_8_Chapter/485616_2_En_8_Fig1_HTML.jpg)


    *A screenshot of a window titled My S Q L installer. The page includes choosing
    a setup type with developer default, server only, client only, full, and custom.
    Here full suite option is marked. A setup-type description box is provided on
    the left side of the screen.*


    **Figure 8-1** Choosing the setup type


    It is intuitively obvious as to what each installation type does. Select each
    option to cause a brief description of what will happen being given in the Setup
    Type Description box to the right of the radio buttons. The installer is a very
    stable and capable entity.


    We selected `Full` because it is handy to have all manuals and documentation at
    your fingertips on the local workstation. The manuals and tools included with
    a `Full` installation are indispensable.


    If you’ve installed the `Full` version, you’ll have all of the capabilities ready
    to use. If you installed the `Developer` version, you won’t get the literature
    or tools included in the `Full` installation, but your installation will still
    be very capable.


    Selecting the `Custom` installation will give you the wide array of available
    features, selected through radio buttons, check boxes, and drop-down lists.


    ## Checking System Requirements


    The next dialog box (Figure 8-2) checks your workstation for system requirements.
    Depending on what software had been previously installed, there may be up to ten
    system requirements that the installer will try to install.


    ![](images/485616_2_En_8_Chapter/485616_2_En_8_Fig2_HTML.jpg)


    *A screenshot of a window titled My S Q L. The right side of the screen includes
    choosing setup, check requirements, installation, product, and installation configuration.
    The check requirement option is selected. The page opens in the middle with a
    description. It provides the product and associated requirements below.*


    **Figure 8-2** Checking for system requirements


    There may be a few system requirements that the installer can’t install. These
    requirements aren’t normally needed unless you’re using tools that don’t pertain
    to serving data to web pages. As you can see in Figure 8-2, the only two system
    requirements that are left for full capability aren’t normally used on Internet
    sites and are beyond the scope of this book.


    The requirements that are labeled as “Manual” require you to locate, download,
    and install supporting software to end up with a full installation with full capabilities.
    Like I mentioned, these products aren’t typically used in today’s web pages.


    ## Installation Process


    As you can see in Figure 8-3, there are ten products ready to be installed. This
    is typical of a `Full` installation. You’re able to do pretty much anything that
    is required of a modern web page with these products.


    ![](images/485616_2_En_8_Chapter/485616_2_En_8_Fig3_HTML.jpg)


    *A screenshot of a window titled My S Q L. The right side of the screen includes
    choosing setup, installation, product, and installation configuration. The installation
    option is selected. The page opens in the middle with the following products.
    My S Q L server 8.0.23, my S Q L shell 8.0.23, and others.*


    **Figure 8-3** Software to be installed


    It should be noted that now is the time that the operating system will halt the
    installation should there not be enough free space on the hard drive you’re installing
    to. The downloaded `MSI` is about 450 megabytes. Expect more space to be used
    after unpacking the compressed files, in the range of 520 megabytes. The total
    space required, then, is about a gigabyte. Be sure you have enough space on your
    hard drive. Examine Figure 8-4:


    ![](images/485616_2_En_8_Chapter/485616_2_En_8_Fig4_HTML.jpg)


    *A screenshot of a window titled My S Q L. The right side of the screen includes
    choosing setup, installation, product, and installation configuration. Here installation
    option is selected. It includes lists of products, status, progress, and notes.
    The first two products are completed and the third is in installing status.*


    **Figure 8-4** In the process of installing the MySQL server


    The maximum time I’ve seen this stage take is ten minutes. Any moderately new
    workstation will be able to handle the requirements of the installer with ease.
    Successfully installed products are given a green check. Products currently being
    installed are shown with a cute pencil icon.


    This section is where you basically sit back and watch the installer do its thing.
    The installation will have reported errors by now, so it’s a good bet that the
    installation is going to be successful. If you’d like to see exactly what is going
    on in real time, click the `Show Details` button.


    There might be trouble with the installation if software that accesses the same
    resources that the installer does is running. Be sure to shut everything down
    that you can, especially software that uses the Internet or communications. Don’t
    keep the web browser you used to download the binaries running either.


    ## Completion


    As you can see in Figure 8-5, all of the products were successfully installed.
    Now the installation program will present a series of dialog boxes that will ask
    for usernames and passwords. I recommend you write this down in many different
    locations until it becomes secondhand knowledge that you’ll be using several times
    a day to configure your installation.


    ![](images/485616_2_En_8_Chapter/485616_2_En_8_Fig5_HTML.jpg)


    *A screenshot of a window titled My S Q L. The right side of the screen includes
    choosing setup, installation, product, and installation configuration. Here installation
    option is selected. It includes lists of products, status, progress, and notes.
    All the products are in complete status. The third product is squared.*


    **Figure 8-5** All products completely installed'
