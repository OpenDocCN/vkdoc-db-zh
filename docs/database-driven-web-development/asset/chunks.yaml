    ## 总结

    本章涵盖了数据类型，以及如何插入和检索大量数据。我们探讨了通过 Perl 的`reverse()`方法以及 MySQL 的`ASC`和`DESC`属性来对数组进行排序的概念。随后，我们向数据库执行了几次可能包含大量数据的插入操作。


    ## 4. 核心细节

    尽管你已经学到了目前所学的一切，但要完成工作，仍有一些知识需要了解。本章将介绍扩展你在数据库驱动的 Web 开发方面所需工作知识的技能。


    我们将从简单的日期和时间格式化开始，然后转向更复杂的主题，例如收集数据并通过浏览器呈现给用户。这些概念大多在之前的章节中以代码示例的形式引入过，为了便于学习，它们都被尽可能简化了。从现在开始，我将在接下来的章节讨论的示例项目中使用实际可运行的代码。内容很多，让我们开始工作吧。


    ### 日期和时间格式化

    有许多不同的 Perl 模块可用于向用户展示日期和时间。这些模块通常非常庞大且运行缓慢，而且老实说，在大多数情况下它们并非必需。这是因为你可以使用反引号运算符（``
    ` ``）直接从操作系统获取日期和时间。反引号运算符用于对任何你正在使用的操作系统进行系统调用。


    这些模块最终都使用反引号运算符来获取日期和时间，因此你可以通过自己操作来加速。我们将专注于 Linux 的日期和时间，因为它是互联网服务器上最流行的操作系统。


    你可能会问，为什么有这么多不同的 Perl 模块仅仅用于格式化日期和时间。答案很简单，因为展示日期和时间的方式有很多种。这就是日期和时间模块的作用——将它们从系统调用获取的日期和时间格式化成更美观的形式。它们之所以如此庞大，是因为它们在一个模块中提供了许多不同的日期和时间展示方式。所有这些复杂性转化为一个运行缓慢的
    Perl 模块。


    在 Linux 上获取日期和时间的系统调用语法非常简单。查看以下代码片段：


    ```

    $date = `date`;

    ```


    在 Linux 上，`“date”`命令会显示精确到秒的日期和时间。在这个例子中，这些日期和时间存储在`$date`变量中，现在它包含以下内容：


    ```

    Fri Nov 20 11:18:44 PST 2023

    ```


    你可以看到，它给出了日期和时间的完整表示。但这可能不是你希望看到的日期或时间格式——大多数情况下确实如此。我们现在需要做的是将日期和时间格式化成更美观的形式。你可以使用连接运算符（`.`）和`split()`函数非常简单地完成这项工作，如清单
    4-1 所示。


    ```

    @date_raw   = split(/ /, $date);

    $date_complete = $date_raw[0] . ", " . $date_raw[1] . " " .  $date_raw[2] . ",
    " . " " . $date_raw[5];

    清单 4-1

    格式化 $date

    ```


    我刚才做的是使用`split`函数按空格分割`$date`的内容，并将结果推入`@date_raw`数组。然后我创建了`$date_complete`，并将索引
    0、1、2 和 5 连接起来，得到了格式化后的日期：


    ```

    Fri, Nov 20, 2023

    ```


    你可以看到我没有使用位于索引项 3 和 4（`$date_raw[3]`和`$date_raw[4]`）的时间和时区。你还可以从连接中看到，我在索引项 0
    和 1 之间、2 和 5 之间添加了逗号。


    ### 网站参数

    你最终需要在脚本中包含参数。捕获和使用参数是常见情况，因此你必须完全理解它们的用法。


    网站参数是指文件名后问号（`?`）之后出现的字母、数字和特殊字符的组合：

    `[`http://www.domain.com/cgi-bin/script.cgi?id=123456&id2=abcdefg`](http://www.domain.com/cgi-bin/script.cgi?id=123456&id2=abcdefg)`

    如你所见，给出的完整域名包含两个参数和一个文件名。给出的参数是`id`和`id2`参数。它们各自持有值，并用与号（`&`）分隔。你可以根据需要使用任意多个参数，通常的上限大约是半打（6
    个）参数。


    这种特定的参数方法被称为 GET 方法。还有另一种提交参数的方法叫做 POST 方法。这些概念在过去的章节中简要介绍过。


    为了使用 POST 方法，你必须在 HTML 表单元素内提交参数，如清单 4-2 所示。


    ```


    清单 4-2

    使用 method 设置为 POST 的 FORM

    ```


    从前面的示例中可以看到，我将参数插入在 HTML 表单元素的开始和结束标记之间，作为类型为`“hidden”`的`INPUT`元素。当点击提交按钮时，参数将被上传到服务器。

    由于使用了 POST 方法，参数将在消息体中传递给服务器，而不是在地址栏的值中。


    ### 捕获参数

    捕获参数最简单的方法是使用`CGI`模块中的`param()`方法。为了调用`param()`方法，你必须首先创建一个`CGI`模块的新实例，如清单 4-3
    所示。


    ```

    USE CGI;

    $cgi = new CGI;

    $id = $cgi->param(''id'');

    $id2 = $cgi->param(''id2'');

    清单 4-3

    使用 param() 方法捕获参数

    ```


    你可以看到我首先包含了一个`“USE CGI;”`语句。然后通过使用`“$cgi = new CGI;”`语句创建了一个`CGI`模块的新实例。接着，使用`“$id
    = $cgi->param(''id'');”`和`“$id2 = $cgi->param(''id2'');”`方法捕获了`id`和`id2`参数，它们的值现在存储在`$id`和`$id2`中。需要注意的是，参数名是区分大小写的。


    你可以根据需要使用任意多个参数，一个脚本中的限制大约在五到十个之间。需要注意的是，POST 方法可以比 GET 方法传递更多的参数。


    ### 处理参数

    处理参数的方法有很多种。我发现经常使用正则表达式，并可以将其应用于参数变量中包含的数据，以抵御恶意攻击。


    一个只允许参数变量中包含数字的正则表达式：


    ```

    $id =~ s/[A-Za-z\s]+//g;

    ```


    如你所见，在这个正则表达式中，变量`$id`中的所有字母都将被去除。这使得参数变量中只包含数字。恶意用户将没有机会入侵你的脚本，因为如果不以某种方式使用文本命令，就不可能进入脚本。


    如果安全不是问题，你也可以将参数值直接放入数据库。由于参数有逻辑用途，你可以准备数据供下一个脚本使用，或者将其格式化以访问特定的数据库表，其中参数值作为唯一标识符。考虑以下示例：


    ```

    $profileid = $id . "profile";

    ```


    我再次使用了连接运算符将`$id`和引号中的单词`“profile”`连接起来。注意，单词`“profile”`包含在开始和结束的双引号中。这告诉 Perl
    内容本质上是文本。`$profileid`变量现在持有以下值：


    ```

    123456profile

    ```'
