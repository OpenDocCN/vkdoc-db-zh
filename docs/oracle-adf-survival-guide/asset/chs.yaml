  \n图 5-3. 声明式验证失败时向用户显示的消息\n\n### 添加托管 Bean\n\n当您需要在应用程序的用户界面层应用逻辑时（用于高级验证、计算等），您需要用\
  \ Java 编写托管 Bean，并将它们连接到页面上的项目。在 ADF（和 JSF）中，实际的用户界面与表现层逻辑是分开的，通过将这两个功能拆分到不同的文件中：\n\
  \n*   用户界面存储在 JavaServer Faces (JSF) 和 JavaServer Faces Fragment (JSFF) 文件中。\n*\
  \   表现层逻辑的源代码存储在 Java Bean 文件中。\n\n您的应用程序将包含许多 Java 文件。您通过将它们定义为任务流中的托管 Bean 来声明哪些文件是表现层的一部分，然后通过设置\
  \ UI 组件的属性以使用表达式语言语法引用 Bean 类，将它们连接到您的 UI 组件。\n\nADF 框架为您管理这些 Bean。这意味着它们会在适当的时间自动实例化，并在不再需要时自动销毁。它们存在的时间长短由其作用域决定，将在后面的小节中描述。\n\
  \n### Bean 类\n\n您想在应用程序用户界面层使用的所有类都必须是有效的 Java Bean。这意味着它们必须：\n\n1.  具有一个公共的、无参数的默认构造函数。\n\
  2.  允许使用标准的 setter 和 getter 方法访问所有属性。\n3.  是可序列化的。\n\n构造函数只是一个与类同名且不接受参数的方法。ADF\
  \ 框架在创建 Bean 类的实例时调用此方法。\n\nsetter 和 getter 方法必须按照 JavaBean 约定命名。例如，如果 Bean 有一个名为\
  \ `firstName` 的 `String` 属性，则它必须具有 `setFirstName()` 和 `getFirstName()` 方法。\n\n注意\n\
  \n您的 Java Bean 源代码中的属性必须以小写字母开头。\n\nBean 是可序列化的意味着它可以被存储、从内存中删除，并在以后完全恢复，包括它之前拥有的所有内部状态。这对于您打算在比请求（Request）更长的作用域中使用的所有\
  \ Bean 都是必需的。\n\n注意\n\n短寿命 Bean（请求作用域和后备 Bean 作用域）永远不需要存储和恢复，因此它们不需要是可序列化的。\n\n\
  一个只包含属性值和代码的典型 Bean，可以通过简单地实现 `java.io.Serializable` 接口来使其可序列化。请注意，UI 组件和业务组件不是可序列化的，因此您不应尝试在托管\
  \ Bean 中存储这些内容。\n\n\n\n### Bean 作用域\n\n通过将托管 Bean 定义为有界任务流的一部分，您可以将它们添加到 ADF 应用程序中。每当您添加一个\
  \ Bean 时，也需要定义其作用域。如果您熟悉 JSF，那么会对 `Application`、`Session`、`View` 和 `Request` 作用域有所了解，但\
  \ ADF 拥有更多作用域。ADF 应用程序中存在以下作用域，按其生命周期从长到短排列：\n\n*   `Application`：应用作用域中的 Bean 会一直存在，直到应用程序停止。这意味着它们会持续存在于用户会话之间——用户可以关闭浏览器，几天后再次访问应用程序，仍然能在应用作用域中找到相同的值。直到应用服务器管理员在服务器上终止应用程序（或应用程序崩溃），它们才会被清除。这可用于存储您希望保存在内存中的应用程序配置。\n\
  *   `Session`：会话作用域中的 Bean 在用户首次访问应用程序时创建，并持续到用户会话结束——无论是用户关闭浏览器，还是会话因不活动而超时。如果用户决定在同一浏览器中运行两个应用程序实例，会话作用域的\
  \ Bean 是危险的。某些浏览器会将同一浏览器不同标签页中的两个应用程序实例视为同一会话的一部分，而其他浏览器则会将它们视为两个独立的会话。\n*   `PageFlow`：页面流作用域中的\
  \ Bean 在用户访问页面流中的第一个页面时创建，并持续到她离开该页面流为止。它们在有界任务流中非常有用，用于存储需要从所有页面和任务流的其他元素访问的值。在包含主页面的无界任务流中创建的页面流作用域\
  \ Bean，是存储您希望在用户运行应用程序期间始终可用的信息的理想位置。它们比会话作用域 Bean 更安全，因为它们总是会为应用程序的独立实例而分离，无论浏览器如何处理会话。\n\
  *   `View`：视图作用域中的 Bean 在特定视图（页面或页面片段）的持续期间存在。JSF 和 ADF 都定义了视图作用域；在 ADF 应用程序中，当您引用\
  \ Bean 时，总是获得 ADF 视图作用域。\n*   `Request`：请求作用域中的 Bean 在一个请求（即一次服务器往返）的持续期间存在。此作用域中的\
  \ Bean 可以从页面上的所有任务流访问。这意味着，如果同一个页面上存在两个有界任务流实例，则它们会共享一个请求作用域 Bean。这通常不是期望的行为，因此对于短暂存在的\
  \ Bean，您应优先选择后备 Bean 作用域。\n*   `BackingBean`：后备 Bean 作用域中的 Bean 仅在请求的持续期间存在；这隔离了页面上同一有界任务流的独立实例。将此作用域用于无状态的纯逻辑——即需要响应事件而运行的代码。一旦请求被处理且响应发送回浏览器，后备\
  \ Bean 作用域的 Bean 就会被终止。\n\n当您刚开始使用 ADF 时，请尽量限制自己使用 `PageFlow` 和 `BackingBean` 作用域：`PageFlow`\
  \ 用于所有需要长时间存储的内容，而 `BackingBean` 用于无状态的纯逻辑。这使您的代码更简单，并降低了团队中一名开发人员将某些内容存储在一个作用域，而另一名开发人员却期望在另一个作用域中找到它的风险。\n\
  \n### 向用户界面添加 Bean\n\nJDeveloper 提供了一些便捷的快捷方式，可直接将 Bean 添加到页面上的用户界面元素。\n\n### 向按钮添加\
