  清单 4-6. 在视图行类中通过访问器访问另一个视图对象


  `changeDept()`方法首先使用视图访问器获取对`DepartmentsVO1`视图对象实例中所有行的引用。如何创建访问器将在下一节描述。代码然后首先为旧部门创建一个`Key`对象，并检索该部门的国家
  ID，然后创建另一个`Key`来检索新部门的国家。如果两者不同，则将当前视图行的薪资设置为当前薪资的 1.1 倍，从而实现当员工被调动到另一个国家的部门时加薪
  10%。


  ### 视图访问器


  视图行类要能访问其他视图行对象，必须存在一个指向该对象的访问器。这通过在视图对象的`Accessors`选项卡中点击绿色加号图标来创建。在如图 4-11 所示的`View
  Accessors`对话框中，您可以选择要创建哪些访问器。


  ![A437725_1_En_4_Fig11_HTML.jpg](img/A437725_1_En_4_Fig11_HTML.jpg)

  图 4-11. 创建视图访问器


  底层实体对象之间必须存在关联，以便`JDeveloper`和`ADF`能够确定如何从一个视图对象中的记录导航到另一个视图对象中的记录。


  ### 应用模块中的逻辑


  业务组件层的最后一部分是应用模块，您也可以创建自己的 Java 对象来实现您的应用模块。


  您可以从`Java`选项卡为应用模块创建 Java 类，如图 4-12 所示。


  ![A437725_1_En_4_Fig12_HTML.jpg](img/A437725_1_En_4_Fig12_HTML.jpg)

  图 4-12. 为应用模块创建 Java 类


  应用模块包含一些您可能想要覆盖的方法，您也可能希望向应用模块添加自己的业务逻辑。


  ### 覆盖应用模块功能


  应用模块包含视图对象实例的集合，并控制数据库事务。因此，在特定于应用的应用模块类中通常被覆盖的许多方法都与数据库事务或连接相关。


  在覆盖应用模块方法时，通常您希望更改整个应用程序（即每个应用模块）的行为。因此，应用模块方法通常在您作为所有应用模块基础的基类中被覆盖。有关指定自己的业务组件基类的更多信息，请参阅第
  2 章。


  在应用模块类中最常被覆盖的方法是`prepareSession()`，该方法在应用模块首次创建时被调用。由于应用模块可以在多个`ADF`会话之间共享，因此每当应用模块被交给一个新的`ADF`会话时，该方法也会被执行。


  如果您希望在每次应用模块连接到数据库时执行一些数据库初始化，可以使用此方法。您可能希望设置包变量、更改 SQL 会话（例如，启动 SQL 跟踪），或为使用`Oracle
  Virtual Private Database (VPD)`建立会话上下文。


  应用模块还包含诸如`beforeCommit()`、`beforeRollback()`、`afterCommit()`和`afterRollback()`之类的方法，您可以覆盖它们以实现自定义事务处理。


  ### 添加自定义应用模块逻辑


  您添加到应用模块的自定义方法也可以像视图对象上的方法一样在用户界面中使用。这经常用于实现对数据库中存储过程的调用，如本章前面“调用存储过程”一节所述。其语法类似于本章前面“实体对象中的逻辑”一节中清单
  4-3 所示的语法，从`getDBTransaction()`开始以获取对所有视图对象实例都参与的当前事务的引用。


  如果您为应用模块方法创建了客户端接口，它会显示在`Data Controls`窗格中内置的`Commit`和`Rollback`操作旁边。您可以直接将该操作作为一个`ADF`按钮拖放到页面片段上，或者为该方法创建一个操作绑定并从托管
  bean 中调用它。




  '
- '# 向客户端公开逻辑


  默认情况下，您添加到视图对象或应用程序模块中的逻辑对用户界面层是不可用的。要使您的方法可用，您需要从视图对象或应用程序模块的 Java 选项卡创建客户端接口。图
  4-13 展示了为视图对象创建客户端接口。


  ![A437725_1_En_4_Fig13_HTML.jpg](img/A437725_1_En_4_Fig13_HTML.jpg)


  图 4-13. 创建客户端接口


  对于视图对象，您可以为视图对象类和视图行类创建客户端接口。对于应用程序模块，只有一种客户端接口类型。类中的所有方法都会显示在“编辑客户端界面”对话框的左侧，您可以将想要公开的方法移动到右侧的“已选择”框中。


  当您像这样公开方法后，它们会与属性一起显示在“数据控制”面板中，如图 4-14 所示。


  ![A437725_1_En_4_Fig14_HTML.jpg](img/A437725_1_En_4_Fig14_HTML.jpg)


  图 4-14. 在数据控件窗格中公开的客户端方法


  一旦您的方法出现在“数据控件”窗格中，它们就可以被拖放到页面或页面片段上，并作为 ADF 操作元素（按钮或命令链接）放置。如果您想在用户界面中使用来自 Java
  Bean 的方法，您需要从相关页面的“绑定”选项卡创建一个操作绑定，如图 4-15 所示。我们将在第 5 章回到在用户界面中使用 Java Bean 的话题。


  ![A437725_1_En_4_Fig15_HTML.jpg](img/A437725_1_En_4_Fig15_HTML.jpg)


  图 4-15. 为客户端方法创建绑定


  ## 总结


  在本章中，您已经了解了如何使用自己的逻辑扩展 ADF 业务组件的标准功能。在某些情况下，您会覆盖标准的 ADF 方法，添加功能，甚至完全替换标准的 ADF 处理。在其他情况下，您向视图对象或应用程序模块添加自己的逻辑，并通过客户端接口使该逻辑对用户界面层可用。


  在下一章中，您将看到如何在用户界面层添加业务逻辑。


