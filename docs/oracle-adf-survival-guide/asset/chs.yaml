  \ Java 文件的名称。按照约定，Bean 名称以小写字母开头，类名以大写字母开头。与特定页面相关的 Bean（通常是 `BackingBean` 作用域）应以该页面命名，而与整个任务流相关的\
  \ Bean（通常是 `PageFlow` 作用域）应以该流命名。\n\n您定义 Bean 所属的包；按照约定，Bean 应放在视图/控制器项目基础包下的 `.beans`\
  \ 子包中。最后，选择一个作用域，并保持选中创建类的复选框。\n\n当您单击 **确定** 时，将返回到图 5-4 所示的 **绑定操作属性** 对话框。`JDeveloper`\
  \ 会自动在 **方法** 字段中填入一些它生成的内容。不要接受此默认值；点击该字段并输入一个有用的方法名，然后再单击 **确定**。`JDeveloper`\
  \ 将创建您的类，其外观将类似于清单 5-2。\n\n```java\npackage com.vesterli.hrdemo.deptemp.view.beans;\n\
  public class EmpPage {\n    public EmpPage() {\n    }\n    public String giveRaise()\
  \ {\n        // 在此添加事件代码...\n        return null;\n    }\n}\n```\n清单 5-2. 后备 Bean\
  \ 示例\n\n如果您查看所点击按钮的 **操作** 属性，会发现 `JDeveloper` 已根据您选择的作用域、类名和方法名自动填入了正确的值：`#{backingBeanScope.empPage.giveRaise}`。\n\
  \n如果您查看您的页面或页面片段所属的任务流，可以在 **概览** 选项卡的 **托管 Bean** 子选项卡上看到该 Bean 已被添加，如图 5-5 所示。\n\
  \n![A437725_1_En_5_Fig5_HTML.jpg](img/A437725_1_En_5_Fig5_HTML.jpg)\n\n图 5-5. 已添加到任务流的托管\
  \ Bean\n\n### 向数据绑定组件添加 Bean\n\n您也可以通过双击数据绑定组件（如 **输入文本**）来添加 Bean。此时会出现 **绑定验证器属性**\
  \ 对话框，允许您创建一个新的 Bean（如前所述），或选择一个现有的 Bean。您必须为数据验证提供一个方法名，`JDeveloper` 会自动将该方法放入您的\
  \ Bean 代码中，并在该项上设置 **验证器** 属性。\n\n对于所有绑定到业务组件属性的 UI 组件，通常最好将验证放在业务组件上。这样，您只需定义一次验证，即可应用于所有地方。如果您决定在\
  \ Bean 中实现自定义验证器，您的 Bean 代码需要抛出 `ValidatorException` 以向 ADF 指示验证失败。此异常的一个参数是包含严重性和消息文本的\
  \ `FacesMessage` 对象实例。清单 5-3 展示了一个验证方法的示例。\n\n```java\npackage com.vesterli.hrdemo.deptemp.view.beans;\n\
  import javax.faces.application.FacesMessage;\nimport javax.faces.component.UIComponent;\n\
  import javax.faces.context.FacesContext;\nimport javax.faces.validator.ValidatorException;\n\
  public class EmployeeBean {\n    public EmployeeBean() {\n    }\n    ...\n    public\
  \ void salaryValidator(FacesContext facesContext,\n        UIComponent uIComponent,\
  \ Object object)\n        throws ValidatorException {\n        if (object != null)\
  \ {\n            int sal = Integer.valueOf(object.toString());\n            if((sal\
  \ % 10) != 0) {\n                throw new ValidatorException(\n               \
  \     new FacesMessage(FacesMessage.SEVERITY_WARN,\n                        \"薪资应为整数\"\
  , null));\n            }\n        }\n    }\n}\n```\n清单 5-3. 托管 Bean 中的验证器方法\n\n\n\
  \n### 向任务流添加 Bean\n\n虽然直接向按钮添加 Bean 和方法很有用，但在大多数情况下，你需要对这个过程有更多的控制权。向任务流添加 Bean\
  \ 的常规做法是：先创建类，然后将其添加到相关的任务流中。\n\n你像创建任何其他 Java 类一样创建这个类。然后，在你想使用它的任务流中打开，选择“概览”选项卡，再选择右侧的“托管\
  \ Bean”子选项卡。点击绿色加号，提供一个 Bean 名称，指向该类并选择一个作用域。添加 Bean 后，其外观如图 5-5 所示。\n\n### 与 UI\
  \ 组件交互\n\n如果你的 Bean 代码需要与页面上的 UI 组件交互，则需要在 Bean 代码中创建一个组件引用，并将其连接到页面上的 UI 组件。例如，你可能想添加一个用于建议加薪的新字段，以及一个调用\
  \ Java 逻辑来读取现有工资并建议加薪的按钮，如图 5-6 所示。\n\n![A437725_1_En_5_Fig6_HTML.jpg](img/A437725_1_En_5_Fig6_HTML.jpg)\n\
  \n图 5-6.\n与 Bean 逻辑交互的屏幕示例\n\n### 创建组件引用\n\n在 Bean 中，你创建一个属性，该属性是 `ComponentReference`\
  \ 的一个实例，并创建使用与 UI 组件对应的类的 setter 和 getter 方法。UI 组件类的名称通常是“Rich”后跟组件名称——例如，`RichInputText`\
  \ 对应于输入文本元素。所有这些类都可以在 `oracle.adf.view.rich.component` 的子包中找到。\n\n提示\n完整的 ADF RichClient\
  \ API 文档可以在 [`http://jdevadf.oracle.com/adf-richclient-demo/docs/apidocs/index.html`](http://jdevadf.oracle.com/adf-richclient-demo/docs/apidocs/index.html)\
  \ 找到。\n\n清单 5-4 中的代码展示了两个组件引用的实现：一个用于包含现有工资值（例如，来自业务组件）的输入文本元素，另一个用于将包含计算出的加薪额的另一个输入文本元素。`SuggestRaise()`\
  \ 方法计算当前工资的 5%，并将该值放入建议加薪字段。\n\n```\npackage com.vesterli.hrdemo.deptemp.view.beans;\n\
  import org.apache.myfaces.trinidad.util.ComponentReference;\n...\npublic class EmpPage\
  \ {\nprivate ComponentReference salary;\nprivate ComponentReference raise;\npublic\
  \ void setSalary(RichInputText salary) {\nthis.salary = ComponentReference.newUIComponentReference(salary);\n\
  }\npublic RichInputText getSalary() {\nif (salary != null) {\nreturn (RichInputText)salary.getComponent();\n\
  } else {\nreturn null;\n}\n}\npublic void setRaise(RichInputText raise) {\nthis.raise\
  \ = ComponentReference.newUIComponentReference(raise);\n}\npublic RichInputText\
  \ getRaise() {\nif (raise != null) {\nreturn (RichInputText)raise.getComponent();\n\
  } else {\nreturn null;\n}\n}\npublic String suggestRaise() {\nBigDecimal orgSal\
  \ = (BigDecimal)getSalary().getValue();\nBigDecimal suggestedRaise = orgSal.multiply(new\
  \ BigDecimal(0.05));\nsuggestedRaise = suggestedRaise.setScale(0, BigDecimal.ROUND_DOWN);\n\
  getRaise().setValue(suggestedRaise);\nAdfFacesContext.getCurrentInstance().addPartialTarget(getRaise());\n\
  return null;\n}\n...\n}\n```\n清单 5-4.\n操作 UI 组件值的 Bean 示例\n\n注意，`SuggestRaise()`\
  \ 中的 `getValue()` 返回一个通用的 `Object`。因为我们是从绑定到数字字段的 `salary` 中检索数据，所以该对象可以被强制转换为 `BigDecimal`。然后我们创建另一个\
  \ `BigDecimal`，进行一些计算和舍入，最后获取 `raise` 组件并设置其值。\n\n每次属性更改时都让 ADF 自动刷新页面将是浪费的。因此，我们必须明确请求组件刷新，我们通过将其推入使用\
  \ `addPartialTarget()` 待重绘的对象列表来实现。\n\n你只需要对未绑定到数据源的 UI 组件调用 `setValue()`。如果你想更改已绑定到业务组件属性的组件的值，你应该直接更改绑定属性的值，如本章后面的“与业务组件交互”部分所述。\n\
  \n### 将 Bean 连接到 UI 组件\n\n要将 Bean 中的组件引用连接到 UI 组件，组件的 `Binding` 属性必须设置为指向 Bean 属性。要设置此属性，你可以单击属性右侧的齿轮图标并选择“编辑”，以调出图\
  \ 5-7 所示的“编辑属性：绑定”对话框。\n\n![A437725_1_En_5_Fig7_HTML.jpg](img/A437725_1_En_5_Fig7_HTML.jpg)\n\
  \n图 5-7.\n“编辑属性绑定”对话框\n\n当你选择一个托管 Bean 时，“属性”下拉列表将只显示 Bean 中类型正确的属性。在此示例中，你需要为工资和建议加薪字段都设置\
  \ `Binding` 属性。要使按钮调用 `suggestRaise()`，你必须如前所述设置按钮的 `Action` 属性。\n\n注意\n你也可以创建或选择一个\
  \ Bean，然后单击“属性”旁边的“新建”来创建一个新属性。如果你这样做，你将需要稍微修改代码以包含一个 `ComponentReference`，如清单 5-4\
  \ 所示。\n\n### 与业务组件交互\n\n当你想从用户界面层使用业务组件时，你需要通过绑定层。不要尝试直接访问数据库数据，因为应用程序的其余部分确实使用了绑定层。如果你的应用程序的一部分试图绕过绑定层，你将会遇到神秘且难以发现的错误。\n\
  \n### 绑定层\n\n要查看页面上可用的绑定，请选择页面窗口底部的“绑定”选项卡。你将看到一个绑定的图形化表示，如图 5-8 所示。\n\n![A437725_1_En_5_Fig8_HTML.jpg](img/A437725_1_En_5_Fig8_HTML.jpg)\n\
  \n图 5-8.\n属性值绑定和操作绑定\n\n当你将某些内容从“数据控件”窗格拖放到页面或页面片段上时，ADF 会自动为你创建绑定：\n* 当你拖放单个属性时，你会得到一个\
  \ `attributeValues` 绑定和一个单属性组件（如输入文本）。图 5-8 上的 `FirstName` 绑定是一个 `attributeValue`\
  \ 绑定。\n* 当你拖放一个操作时，你会得到一个 `action` 绑定和一个操作组件（如按钮）。图 5-8 上的 `Previous` 绑定是一个 `action`\
  \ 绑定。\n* 当你拖放整个视图对象实例时，你会得到一个树绑定和一个多属性组件（如表）。图 5-9 展示了一个树绑定。\n\n    ![A437725_1_En_5_Fig9_HTML.jpg](img/A437725_1_En_5_Fig9_HTML.jpg)\n\
  \n    图 5-9.\n    树绑定\n\n如果你想访问尚未拖放到页面上的属性，你必须手动单击“绑定”选项卡上的绿色加号来创建属性绑定。\n\n提示\n\
  如果你想让 JDeveloper 帮助你，也可以尝试将元素拖放到页面上，然后在页面的源视图中删除匹配的 UI 组件。如果你从“设计”选项卡或“结构”窗口中删除组件，JDeveloper\
  \ 会自动清理并删除相应的绑定。但如果你在“源”选项卡上删除组件，JDeveloper 会保留绑定不变。\n\n\n### 访问绑定层\n\n为了从代码中访问绑定层，首先需要创建一个\
  \ `BindingContainer` 的实例，如清单 5-5 所示。\n\n```java\nimport oracle.adf.model.BindingContext;\n\
  import oracle.binding.BindingContainer;\n...\npublic class EmpPage {\n...\npublic\
  \ String processEmp {\nBindingContainer bc =\nBindingContext.getCurrent().getCurrentBindingsEntry();\n\
  ...\n}\n...\n}\n清单 5-5.\n获取 BindingContainer\n```\n\n在 JDeveloper 中编写代码时，通常无需手动输入\
  \ `import` 语句；该工具会自动提供建议。但是，`BindingContainer` 和 `BindingContext` 都有多个选项：您应该选择清单\
  \ 5-5 中所示的那几个。\n\n获取 `BindingContainer` 是您在代码中经常要执行的操作，因此在您的实用程序代码项目中的实用程序类里为此创建一个方法是很有意义的。\n\
  \n### 访问属性值\n\n当您拥有一个 `BindingContainer` 对象后，您可以从中检索属性绑定，如清单 5-6 所示。\n\n```java\n\
  ...\nimport java.math.BigDecimal;\nimport java.sql.Timestamp;\nimport oracle.adf.model.BindingContext;\n\
  import oracle.binding.AttributeBinding;\nimport oracle.binding.BindingContainer;\n\
  ...\npublic class EmpPage {\n...\npublic String getEmpValues() {\n...\nAttributeBinding\
  \ fnb =\n(AttributeBinding)bc.getControlBinding(\"FirstName\");\nAttributeBinding\
  \ salb =\n(AttributeBinding)bc.getControlBinding(\"Salary\");\nAttributeBinding\
  \ hdb =\n(AttributeBinding)bc.getControlBinding(\"HireDate\");\nString firstName\
  \ = (String)fnb.getInputValue();\nBigDecimal sal = (BigDecimal)salb.getInputValue();\n\
  Timestamp hireDate = (Timestamp)hdb.getInputValue();\n...\nreturn null;\n}\n}\n\
  清单 5-6.\n获取属性值\n```\n\n属性名称必须与视图对象中写的完全一致，包括大小写。\n\n`getInputValue()` 方法的签名是返回一个通用的\
  \ `Object`。但是，ADF 使用在视图对象的“属性”选项卡上为该属性定义的对象，因此您可以将 `getInputValue()` 的输出强制转换为相关类型。JDeveloper\
  \ 中的视图对象向导将根据您为业务组件初始化模型项目时定义的“数据类型映射”设置创建对象。当您使用默认的“Oracle 的 Java 扩展”映射时，会发生以下映射：\n\
  \n*   数据库 `VARCHAR2` 变为 `java.lang.String`\n*   数据库 `NUMBER` 变为 `java.math.BigDecimal`\n\
  *   数据库 `DATE` 变为 `java.sql.Timestamp`\n\n### 访问操作\n\n正如您在第 4 章所见，业务组件带有内置操作，并且您可以创建自己的操作。所有内置操作以及您决定暴露给用户界面层的操作都会显示在“应用程序”窗口的“数据控件”窗格中。\n\
  \n#### 提示\n\n如果您的某个自定义操作即使在使用蓝色双箭头图标刷新后仍未显示在“数据控件”窗格中，可能是您忘记创建客户端接口了。请参阅第 4 章。\n\
  \n要从托管 Bean 代码中执行操作，您也需要通过绑定层。必要的代码如清单 5-7 所示。\n\n```java\n...\nimport java.util.List;\n\
  import java.util.Map;\nimport oracle.adf.model.BindingContext;\nimport oracle.binding.OperationBinding;\n\
  ...\npublic class EmpPage {\n...\npublic String changeDept(Integer empId, Integer\
  \ deptId) {\n...\nOperationBinding ob = bc.getOperationBinding(\"moveDept\");\n\
  Map obParam = ob.getParamsMap();\nobParam.put(\"empId\", empId);\nobParam.put(\"\
  deptId\", deptId);\nObject result = ob.execute();\nif(!ob.getErrors().isEmpty())\
  \ {\nhandleErrors(ob.getErrors());\nreturn null;\n}\n...\nreturn null;\n}\n}\n清单\
  \ 5-7.\n执行操作\n```\n\n与属性绑定类似，操作的名称必须与您在“绑定”选项卡上看到的完全一致，包括大小写。\n\n您的操作可能需要一个或多个参数。如果是这种情况，您需要从操作绑定中检索一个\
  \ `Map` 对象，并将您的参数放入此映射中。如果您没有任何参数要传递，则不需要这些代码行。\n\n执行操作绑定总是返回一个通用的 `Object`；根据底层代码，这对于调用该方法的\
  \ Bean 可能有用也可能没用。\n\n您应该始终调用 `getErrors()` 来检查执行操作时是否出错。此方法的返回值是一个 `java.util.List`\
  \ 对象，其中包含任何错误的 `Throwable` 对象。\n\n### 访问迭代器\n\n当您想要处理整个数据集，而不仅仅是一个值时，您需要访问树形绑定的迭代器。为此，您需要将绑定容器强制转换为\
  \ `DCBindingContainer`，如清单 5-8 所示。\n\n```java\n...\nimport oracle.adf.model.BindingContext;\n\
  import oracle.adf.model.binding.DCBindingContainer;\nimport oracle.adf.model.binding.DCIteratorBinding;\n\
  import oracle.adf.view.rich.component.rich.data.RichTable;\nimport oracle.adf.view.rich.context.AdfFacesContext;\n\
  import oracle.jbo.Row;\n...\npublic class EmployeeBean {\n...\nprivate ComponentReference\
  \ empTab;\n...\npublic void setEmpTab(RichTable empTab) {\nthis.empTab = ComponentReference.newUIComponentReference(empTab);\n\
  }\npublic RichTable getEmpTab() {\nif (empTab != null) {\nreturn (RichTable)empTab.getComponent();\n\
  } else {\nreturn null;\n}\n}\n...\npublic String DeptRaise() {\nBindingContainer\
  \ bc =\nBindingContext.getCurrent().getCurrentBindingsEntry();\nDCBindingContainer\
  \ dcb =(DCBindingContainer)bc;\nDCIteratorBinding iter =\n(DCIteratorBinding)dcb\n\
  .findIteratorBinding(\"EmployeesInDeptVOIterator\");\nRow[] allRows = iter.getAllRowsInRange();\n\
  BigDecimal currSal;\nfor (Row r: allRows) {\ncurrSal = (BigDecimal)r.getAttribute(\"\
  Salary\");\nr.setAttribute(\"Salary\", currSal.multiply(new BigDecimal(1.05))\n\
  .setScale(0, BigDecimal.ROUND_DOWN));\n}\nAdfFacesContext.getCurrentInstance().addPartialTarget(getEmpTab());\n\
  return null;\n}\n}\n清单 5-8.\n遍历数据集\n```\n\n您使用 `findIteratorBinding()` 从容器中检索迭代器绑定。与所有其他绑定一样，您必须准确输入其在“绑定”选项卡上存在的名称。此迭代器有许多有用的功能，其中之一是\
  \ `getAllRowsInRange()`，它返回一个 `Row` 对象数组。在上面的示例中，我们简单地遍历此数组，并给每个人加薪 5%。\n\n更改属性的值本身并不会更新\
  \ UI 组件。要使显示来自迭代器数据的 ADF 表自我更新，我们需要：\n\n*   为表组件创建一个 `ComponentReference`\n*   创建接收和返回\
  \ `RichTable` 的 setter 和 getter 方法\n*   将表的 `Binding` 属性设置为我们的 `RichTable` 属性（使用类似\
  \ `#{backingBeanScope.EmployeeBean.empTab}` 的表达式）\n*   使用 `AdfFacesContext.getCurrentInstance().addPartialTarget(getEmpTab());`\
  \ 将表作为部分页面渲染目标添加到 ADF Faces 上下文中\n\n\n### 处理选定行\n\n如果你想处理在显示来自迭代器的数据的 ADF 表中当前记录，你可能会尝试使用\
  \ `DCIteratorBinding` 对象中存在的 `getCurrentRow()` 方法。然而，该方法返回的是视图对象实例中的当前行，而不是用户界面中当前选定的行。要访问\
  \ ADF 表组件中选定的一个或多个行，你需要先处理该表组件。\n\nADF 表有一个 `rowSelection` 属性，可以设置为 `none`、`single`\
  \ 和 `multiple`。当你将视图对象实例拖放到页面上时，这是你可以在“创建表”向导中进行的选择之一，当然你以后也可以随时更改它。如果你在表中允许选择，那么就可以通过连接到\
  \ UI 组件的 `RichTable` 对象的 `getSelectedRowKeys()` 方法，检索所有选定记录的 `Key` 对象，如代码清单 5-9\
  \ 所示。\n\n```java\n...\nimport oracle.adf.model.BindingContext;\nimport oracle.adf.model.binding.DCBindingContainer;\n\
  import oracle.adf.model.binding.DCIteratorBinding;\nimport oracle.adf.view.rich.component.rich.data.RichTable;\n\
  import oracle.jbo.Key;\nimport oracle.jbo.Row;\nimport oracle.jbo.RowSetIterator;\n\
  import org.apache.myfaces.trinidad.model.RowKeySet;\n...\npublic class EmpPage {\n\
  ...\nprivate ComponentReference empTab;\n...\npublic void setEmpTab(RichTable empTab)\
  \ {\n    this.empTab = ComponentReference.newUIComponentReference(empTab);\n}\n\
  public RichTable getEmpTab() {\n    if (empTab != null) {\n        return (RichTable)empTab.getComponent();\n\
  \    } else {\n        return null;\n    }\n}\n...\npublic String ProcessEmps()\
  \ {\n    RowKeySet selectedEmps = getEmpTab().getSelectedRowKeys();\n    Iterator\
  \ selIter = selectedEmps.iterator();\n    BindingContainer bc =\n        BindingContext.getCurrent().getCurrentBindingsEntry();\n\
  \    DCBindingContainer dcb =(DCBindingContainer)bc;\n    DCIteratorBinding empIter\
  \ =\n        (DCIteratorBinding)dcb.\n            findIteratorBinding(\"EmployeesInDeptVOIterator\"\
  );;\n    RowSetIterator rsi = empIter.getRowSetIterator();\n    Row curr = null;\n\
  \    while (selIter.hasNext()) {\n        Key key = (Key)((List)selIter.next()).get(0);\n\
  \        curr = rsi.getRow(key);\n        // process row\n        ...\n    }\n \
  \   return null;\n}\n}\n```\n**代码清单 5-9.** 在表中处理选定行\n\n当你有了行键集合后，你可以为选定的行获取一个 `Iterator`\
  \ 对象。这是一个遍历用户界面中行的迭代器，与连接到视图对象实例的迭代器无关。\n\n为了实际处理选定行的数据，你仍然需要像上一个例子中那样使用 `DCIteratorBinding`。不过，在这种情况下，我们从中获取一个\
  \ `RowSetIterator`。这个对象的优点在于，它使得基于键查找特定行变得容易。当我们循环遍历所有选定行时，可以检索到 `Key`，然后使用 `getRow(key)`\
  \ 从视图对象中检索实际的行。\n\n### 与用户交互\n\n当验证失败时，你可以使用 ADF 提供的默认通信机制。这种机制会显示一个或多个消息，并高亮显示任何验证失败的字段。如果你想对显示给用户的消息有更多控制，就需要通过使用\
  \ JSF 上下文来创建自己的消息。这个对象是自动创建的，它处理所有与服务器往返相关的信息。\n\n### 默认消息\n\n如代码清单 5-10 所示，当你将你自己的消息添加到\
  \ JSF faces 上下文时，它们会被添加到应用程序想要向用户显示的所有其他消息中，并在一个对话框中一起显示。\n\n```java\n...\nimport\
  \ javax.faces.application.FacesMessage;\nimport javax.faces.context.FacesContext;\n\
  ...\npublic class DeptPage {\n...\npublic String ShowMessage() {\n    FacesContext\
  \ fctx = FacesContext.getCurrentInstance();\n    FacesMessage fm = new FacesMessage(\"\
  General message\");\n    fm1.setSeverity(FacesMessage.SEVERITY_WARN);\n    fctx.addMessage(null,\
  \ fm);\n    return null;\n}\n...\n}\n```\n**代码清单 5-10.** 在默认位置向用户显示消息\n\n如你所见，你将消息创建为\
  \ `FacesMessage` 对象，包含消息文本，并可选择性地设置严重性。有四种严重性可用：\n\n-   `SEVERITY_FATAL`（不常用；致命错误通常会导致应用程序崩溃）\n\
  -   `SEVERITY_ERROR`\n-   `SEVERITY_WARN`\n-   `SEVERITY_INFO`\n\n如上所示，当你使用 `null`\
  \ 作为第一个参数将消息添加到 faces 上下文时，该消息会显示在应用程序窗口上半部分的中心位置，如图 5-10 所示。\n\n![A437725_1_En_5_Fig10_HTML.jpg](img/A437725_1_En_5_Fig10_HTML.jpg)\n\
  \n**图 5-10.** 默认位置的消息\n\n### 与组件相关的消息\n\n如果你的消息与页面上的特定 UI 组件相关，你可以提供该项的客户端 ID 作为第一个参数。代码清单\
  \ 5-11 展示了这一点。\n\n```java\n...\nimport javax.faces.application.FacesMessage;\nimport\
  \ javax.faces.context.FacesContext;\nimport oracle.adf.view.rich.component.rich.input.RichInputText;\n\
  ...\npublic class DeptPage{\n    private ComponentReference dname;\n...\npublic\
  \ void setDname(RichInputText dname) {\n    this.dname = ComponentReference.newUIComponentReference(dname);\n\
  }\npublic RichInputText getDname() {\n    if (dname != null) {\n        return (RichInputText)dname.getComponent();\n\
  \    } else {\n        return null;\n    }\n}\n...\npublic String ShowAnother()\
  \ {\n    FacesContext fctx = FacesContext.getCurrentInstance();\n    FacesMessage\
  \ fm = new FacesMessage(FacesMessage.SEVERITY_INFO,\n        \"Summary\", \"This\
  \ is the detailed message\");\n    String dnameItem = getDname().getClientId(fctx);\n\
  \    logger.finer(\"Dname field is \" + dnameItem);\n    fctx.addMessage(dnameItem,\
  \ fm);\n    return null;\n}\n...\n}\n```\n**代码清单 5-11.** 与特定组件相关地向用户显示消息\n\n这要求该组件连接到\
  \ bean 属性——在前面的示例中，部门名称项的 `Binding` 属性被设置为 `#{backingBeanScope.deptPage.dname}`。\n\
  \n请注意，尽管 `addMessage()` 的第一个参数在技术上只是一个 `String`，但你不能只在这里写组件 ID。你需要组件的完整位置，这取决于包含该组件的所有容器。正确的值类似于\
  \ `pt1:r1:0:pt1:it2`，所以你应该让 `getClientId()` 为你处理这个。\n\n当你将消息与组件放在一起时，效果如图 5-11 所示。\n\
  \n![A437725_1_En_5_Fig11_HTML.jpg](img/A437725_1_En_5_Fig11_HTML.jpg)\n\n**图 5-11.**\
  \ 与 UI 组件对齐的消息\n\n可以向页面同时添加通用消息和与组件对齐的消息。ADF 会尽力显示所有消息，但结果对大多数用户来说是令人困惑的。如果你打算添加自己的消息，请只使用一种位置。\n\
  \n### 使用消息区域\n\n如果你不希望你的通用消息显示在弹出窗口中，你也可以在页面上的某处添加一个内联的 `Messages` 组件 (`<af:messages\
  \ inline=\"true\">`)。所有通用的（非组件对齐的）ADF 消息随后都将显示在此区域中。\n\n### 任务流中的逻辑\n\n通过托管 Bean，你可以在页面中实现自定义行为，但你也可以添加自己的代码来控制任务流中的行为。\n\
  \n\n\n### 调用托管 Bean 任务流\n\n如果您想在任务流中的两个页面之间运行某些代码，可以从“组件”窗口将“方法调用活动”拖放到任务流的“图示”视图中。为您的方法调用命名，并将“方法”属性设置为指向您要执行的方法。您可以点击字段左侧的齿轮图标，打开“方法表达式生成器”。这样您就可以通过点击来找到所需的方法，如图\
  \ `5-12` 所示。\n\n![A437725_1_En_5_Fig12_HTML.jpg](img/A437725_1_En_5_Fig12_HTML.jpg)\n\
  图 5-12. 方法表达式生成器\n\n设置好“方法”后，您可以使用常规的“控制流用例”箭头将您的方法调用连接到任务流中的其他活动。您需要恰好有一条箭头从方法调用活动指出，并且该“控制流用例”上的文本必须与“固定结果”属性的值匹配。\n\
  \n### 在任务流中使用业务逻辑\n\n您还可以从业务组件添加逻辑。在“应用程序”窗口的“数据控件”窗格中显示的每个操作，都可以拖放到“图示”视图上，并自动成为“方法调用活动”。如果绑定尚不存在，JDeveloper\
  \ 会自动建立绑定，并设置匹配的“方法”属性。其值将类似于 `#{binding.CreateWithParams.execute}`。\n\n请记住，您可以将自定义方法添加到\
  \ ADF 业务组件。如果您选择为您的方法创建“客户端接口”，它会显示在“数据控件”窗格中，并且可以像内置的 ADF 操作一样使用。\n\n### 如何使用路由器组件\n\
  \n“方法调用活动”始终只有一个结果，任务流会沿着匹配的箭头转到下一个活动。但是，您可以使用“路由器活动”在任务流中做出分支决策。\n\n一个“路由器”可以有任意数量的“控制流用例”指向其他活动。其中必须有一个与路由器的“默认结果”属性匹配。除此之外，您还可以定义多个“用例”，每个用例将一个“表达式”匹配到一个“结果”（箭头）。\n\
  \n表达式使用表达式语言编写，语法为 `#{ … }`，或者您可以使用“表达式生成器”通过点击组合一个表达式。请注意，“表达式生成器”包含可用于比较值的操作数。\n\
  \n提示：表达式语言中的字面值是用花括号内的单引号编写的，如下所示：`#{'This is a literal value'}`。\n\n对于比简单比较更复杂的任何逻辑，通常最好在托管\
  \ bean 中创建一个方法来执行必要的计算。表达式语言很快就会变得难以阅读。\n\n### 任务流切换逻辑\n\n在前面的章节中，我们已经看到，一个企业 ADF\
  \ 应用程序通常由多个使用页面片段的有界任务流，以及一个包含菜单结构并处理安全性的主页面构成。为了允许从主页面上的菜单切换任务流，我们需要一个“动态区域”组件和一些代码。\n\
  \n### 动态区域如何工作\n\n当您将一个任务流拖放到页面上时，系统会提示您创建“区域”或“动态区域”。对于静态测试页面，您可以直接创建静态“区域”，但在一个应该能够显示不同任务流的主页面中，您需要一个“动态区域”。\n\
  \n页面上的 UI 组件在两种情况下都是 `<af:region>`，但如果您选择动态区域，JDeveloper 将帮助您创建必要的附加代码。\n\n当您创建静态区域时，JDeveloper\
  \ 只会创建一个指向任务流固定路径的任务流绑定。其形式类似于 `/WEB-INF/dept-emp-flow.xml#dept-emp-flow`。\n\n当您创建动态区域时，JDeveloper\
  \ 会执行多项操作：\n* 创建一个指向托管 bean 的任务流绑定。其形式类似于 `${viewScope.PageSwitcherBean.dynamicTaskFlowId}`。\n\
  * 提示您输入控制该区域的 bean 名称，并向 bean 类中填充示例内容。\n* 将该 bean 添加到视图项目的无界任务流中。\n\n### 构建主页面\n\
  \n当您构建好前两个任务流后（无论是在一个子系统还是两个子系统中），您就可以创建主应用程序和具有任务流切换功能的主页面。\n\n首先，您需要为主页面创建一个模板。这是在基础工作空间中完成的。您的模板需要两个\
  \ facet：一个用于菜单，一个用于页面内容。通常，您会使用一个“面板网格布局”，包含两行，每行一个单元格，将顶部行的高度设置为一个较小的值（如 30 像素）用于菜单。第二行应占据所有剩余空间，因此其高度应设置为“自动”。在顶部单元格中，放置一个用于菜单的\
  \ facet，在底部单元格中，放置一个用于内容的 facet。\n\n根据模块化 ADF 应用程序架构，主应用程序需要能够访问构成应用程序的所有组件。这意味着您需要将基础层中的所有\
  \ ADF 库，以及包含子系统的 ADF 库添加到主工作空间中。\n\n添加完所有库后，基于该模板创建主页面。在菜单 facet 中，放置一个“菜单栏”组件，然后添加一个或多个“菜单”组件。在菜单上，再放置与您希望显示的任务流相对应的“菜单项”组件。\n\
  \n创建好菜单后，在“资源”窗口中打开子系统 ADF 库，如图 `5-13` 所示。在“ADF 任务流”标题下，您可以看到 ADF 库中的所有任务流。将其中一个拖放到主页面的内容\
  \ facet 上，并选择“动态区域”，让 JDeveloper 完成上一节描述的必要工作。\n\n![A437725_1_En_5_Fig13_HTML.jpg](img/A437725_1_En_5_Fig13_HTML.jpg)\n\
  图 5-13. 显示子系统任务流的“资源”窗口\n\n运行此主页面时，您应该会看到页面显示菜单和您拖放到页面上的那个任务流。\n\n### 存储状态\n\n控制动态区域的\
  \ bean 必须在视图作用域中。这意味着它仅在显示特定页面时存在，因此它无法存储选择了哪个任务流。为此，我们需要另一个具有更长作用域的 bean。一个不错的选择是在主应用程序的无界任务流中创建一个具有页面流作用域的\
  \ bean。当主应用程序启动时，无界任务流启动，实例化其页面流作用域 bean，并显示主页面。由于主应用程序中的无界任务流在应用程序运行期间一直保持活动状态，因此此作用域中的\
  \ bean 将持续到应用程序运行结束。\n\n您需要创建一个如代码清单 `5-12` 所示的状态存储 bean。\n\n```\npackage com.vesterli.hrdemo.master.view.beans;\n\
  import java.io.Serializable;\npublic class UiStateBean implements Serializable {\n\
  private String currentTF = \"/WEB-INF/dept-emp-flow.xml#dept-emp-flow\";\npublic\
  \ void setCurrentTF(String s) {\nthis.currentTF = s;\n}\npublic String getCurrentTF()\
  \ {\nreturn currentTF;\n}\n}\n```\n代码清单 5-12. 用于存储所选任务流的 Bean\n\n该 bean 仅保存一个包含所选任务流路径的字符串变量。应将其初始化为您希望应用程序首先显示的任务流。\n\
  \n您需要将此 bean 添加到主工作空间视图项目的无界任务流 (`adfc-config.xml`) 中，并指定其作用域为页面流作用域。\n\n\n\n###\
  \ 使用存储状态\n\n当你有一个用于存储应用程序状态的 Bean 时，需要将提供当前任务流的 Bean 更改为动态区域。此 Bean 已包含 JDeveloper\
  \ 自动创建的一些内容，但应将其修改为如代码清单 5-13 所示。\n\n```java\npackage com.vesterli.hrdemo.master.view.beans;\n\
  import java.io.Serializable;\nimport oracle.adf.controller.TaskFlowId;\npublic class\
  \ PageSwitcherBean implements Serializable {\n    private UiStateBean currentUiState;\n\
  \    public PageSwitcherBean() {\n    }\n    public TaskFlowId getDynamicTaskFlowId()\
  \ {\n        return TaskFlowId.parse(currentUiState.getCurrentTF());\n    }\n  \
  \  public void setUiState(UiStateBean state) {\n        currentUiState = state;\n\
  \    }\n}\n```\n代码清单 5-13. 为动态区域提供任务流 ID 的 Bean\n\n此 Bean 现在包含一个 UI 状态 Bean 的私有实例以及一个用于设置它的方法。它仍然包含\
  \ JDeveloper 创建的 `getDynamicTaskFlowId()` 方法，但该方法现在返回存储在私有 UI 状态 Bean 中的字符串。\n\n\
  ### 连接 Bean\n\n为了使 ADF 在每次初始化时都能将 UI 状态 Bean 传递给页面切换器 Bean，我们使用了一项称为托管属性的 ADF 功能。所有\
  \ Bean 都是托管 Bean；也就是说，由 ADF 框架创建和销毁它们。但 ADF 还可以管理这些 Bean 的属性。这是在任务流的“概述”选项卡下的“托管属性”标题下完成的，如图\
  \ 5-14 所示。\n\n![A437725_1_En_5_Fig14_HTML.jpg](img/A437725_1_En_5_Fig14_HTML.jpg)\n\
  图 5-14. 使用托管属性将 UI 状态连接到页面切换器 Bean\n\n要设置此属性，首先选择页面切换器 Bean，然后单击“托管属性”旁边的绿色加号以创建新的托管属性。每当创建页面切换器\
  \ Bean 时，ADF 将自动设置该属性。与属性“名称”匹配的设置器方法将使用“值”属性的内容被调用。例如，如果名称是 `uiState`，ADF 将调用 `setUiState()`。在图\
  \ 5-14 中，您可以看到“值”是 `#{pageFlowScope.UiStateBean}`。这意味着每当创建页面切换器 Bean 时，都会从页面流作用域插入\
  \ `UiStateBean`。\n\n### 连接菜单项\n\n现在所有代码都已就位，我们实际需要在用户选择菜单项时设置一些值。这是通过将“设置属性监听器”组件（来自“组件”窗口的“操作”部分）拖放到每个菜单项上来完成的。这将打开如图\
  \ 5-15 所示的“插入设置属性监听器”对话框。\n\n![A437725_1_En_5_Fig15_HTML.jpg](img/A437725_1_En_5_Fig15_HTML.jpg)\n\
  图 5-15. “插入设置属性监听器”对话框\n\n“来源”参数是一个作为表达式语言表达式的字面值：即您希望该菜单项显示的任务流的路径。“目标”参数是您希望将值分配给的\
  \ UI 状态 Bean 中的属性，“操作”参数是您希望分配发生的时间。对于菜单项上的属性监听器，您希望分配在操作时（即用户选择菜单项时）发生。\n\n在页面的源视图中，带有设置属性监听器的菜单将类似于代码清单\
  \ 5-14。\n\n```xml\n...\n```\n代码清单 5-14. 带有属性监听器的菜单\n\n通过这种方式，您可以在用户选择每个菜单项时，将不同任务流的路径分配给\
  \ UI 状态 Bean。\n\n### 刷新主页面\n\n最后一步是在 UI 状态值更改时要求区域重绘自身。区域 UI 组件不知道您已更改了 UI 状态 Bean\
  \ 的值，因此您必须通知它刷新。这是通过在区域上设置 `PartialTriggers` 属性来完成的。\n\n当您单击该属性右侧的齿轮图标并选择“编辑”时，将出现“编辑属性：`PartialTriggers`”对话框，如图\
  \ 5-16 所示。\n\n![A437725_1_En_5_Fig16_HTML.jpg](img/A437725_1_En_5_Fig16_HTML.jpg)\n\
  图 5-16. “编辑属性：`PartialTriggers`”对话框\n\n在此对话框中，您指定应触发区域刷新的组件。在左侧，导航到您的菜单项，选择每个项，然后单击\
  \ ➤ 按钮将其移至右侧。对右侧“选定”框中的任何项目执行操作都将导致组件刷新，正如用户对现代 Web 应用程序所期望的那样。\n\n当您运行主页面时，每次单击菜单项，设置属性监听器都会在\
  \ UI 状态 Bean 中存储一个新值，并告诉区域刷新。区域将刷新，向页面切换器 Bean 请求要显示的任务流的路径，而页面切换器 Bean 将从 UI 状态\
  \ Bean 中读取此路径。\n\n## 结论\n\n您现在已了解如何向应用程序添加表示逻辑，以补充业务层中的逻辑，从而使您的应用程序能够执行任何您需要的功能。但正如编程中常见的那样，有时您的代码可能无法首次正确运行。在下一章中，我们将讨论如何使用\
  \ ADF 的日志记录和调试功能来修复代码中的任何问题。\n\n"
- "# 6. 日志记录和调试\n\n您已经了解了如何使用强大的声明式功能构建 ADF 应用程序，以及如何将自己的业务逻辑添加到业务组件和用户界面层。但是，有时您的应用程序的工作方式与您预期的并不完全一致。这时日志记录和调试就派上用场了。\n\
  \n## 使用 ADF Logger\n\n帮助您理解应用程序工作方式的第一项功能是日志记录。Java 内置了基本的日志功能，还有像 `Log4J` 这样的几个\
  \ Java 日志框架。在 ADF 应用程序中，您应该使用 ADF 特定的 `ADFLogger` 类进行日志记录。ADF Logger 使用标准的 Java\
  \ 日志 API。\n\n**注意**：切勿在生产代码中使用 `System.out.println()`，即使互联网上有一半的 Java 示例都这样做。您无法关闭此类日志记录，因此会产生无法管理的大量日志。\n\
  \n与标准 Java 日志记录相比，ADF Logger 有几个优点，特别是所有由同一 ADF 事件引起的日志消息都被赋予相同的执行上下文 ID（`ECID`），因此您可以轻松找到与特定消息相关的所有日志条目。您还可以在应用程序运行时更改日志级别，甚至可以为应用程序的特定用户设置更高的日志级别。\n\
  \n\n## 为类添加日志记录\n\n您所有的 Java 类都应包含一个 `ADFLogger` 实例。在您的团队中，请统一决定其命名，以便每个人都能轻松地在任何地方添加新的日志语句，并确信记录器已存在。我建议直接将此实例命名为\
  \ `logger`。\n\n您可以使用 `ADFLogger` 类中的 `createADFLogger()` 工厂方法来创建它，并传入当前类的名称，如清单\
  \ 6-1 所示。\n\n```java\npackage com.vesterli.hrdemo.deptemp.model.view;\nimport ...\n\
  public class EmployeesVORowImpl extends ViewRowImpl implements EmployeesVORow {\n\
  \    private ADFLogger logger =\n        ADFLogger.createADFLogger(EmployeesVORowImpl.class);\n\
  \    ...\n}\n```\n**清单 6-1.** 创建 ADFLogger 实例\n\n如果不提供当前类的名称，您将会收到大量日志消息，但无法查明它们的来源。因此，请始终提供类名。\n\
  \n当您的类中拥有一个记录器对象后，您就可以使用 `ADFLogger` 类提供的各种方法向代码中添加日志语句。所有日志语句都有一个日志级别，重要的是您的团队需要就如何使用它们做出统一决定。下表显示了我的建议。\n\
  \n| 日志级别 | 用途 |\n| :--- | :--- |\n| `SEVERE` | 阻止应用程序继续运行的严重错误。您的服务器管理员应设置对 ADF\
  \ 日志文件的监控，以便在发生此类错误时，他和/或您能收到警报。 |\n| `WARNING` | 表示应用程序存在问题的警告。通常用于指示配置错误、意外的数据库错误、错误消息或来自外部系统无响应。\
  \ |\n| `INFO` | 面向业务用户的应用程序操作信息。 |\n| `CONFIG` | 类的初始化。从数据库或文件读取初始配置。 |\n| `FINE`\
  \ | 粗粒度的调试日志。使用 `FINE` 记录方法进入和/或退出（即，一个方法内不超过两次）。 |\n| `FINER` | 中等粒度的调试日志。使用 `FINER`\
  \ 记录方法内部的更详细信息。 |\n| `FINEST` | 细粒度的调试日志。循环中的日志记录应使用 `FINEST`。 |\n\n在清单 6-2 中，您可以看到一些\
  \ ADF 日志语句的示例。\n\n```java\npackage com.vesterli.hrdemo.deptemp.view.beans;\nimport\
  \ ...\npublic class EmpPage {\n    ADFLogger logger = ADFLogger.createADFLogger(EmpPage.class);\n\
  \    ...\n    public String MultiRaise() {\n        logger.fine(\"Entering MultiRaise()\"\
  );\n        RowKeySet selectedEmps = getEmpTab().getSelectedRowKeys();\n       \
  \ Iterator selIter = selectedEmps.iterator();\n        logger.finer(\"Get iterator\
  \ for all VO records\");\n        BindingContainer bc =\n            BindingContext.getCurrent().getCurrentBindingsEntry();\n\
  \        DCBindingContainer dcb =(DCBindingContainer)bc;\n        DCIteratorBinding\
  \ empIter =\n            dcb.findIteratorBinding(\"EmployeesInDeptVOIterator\");\n\
  \        RowSetIterator rsi = empIter.getRowSetIterator();\n        logger.finer(\"\
  Loop over selected employees, give raise\");\n        Row currEmp = null;\n    \
  \    String oldSalString;\n        BigDecimal oldSal;\n        BigDecimal newSal;\n\
  \        while (selIter.hasNext()) {\n            Key key = (Key)((List)selIter.next()).get(0);\n\
  \            currEmp = rsi.getRow(key);\n            logger.finest(\"Working on\
  \ \" + currEmp.getAttribute(\"EmployeeId\"));\n            oldSalString = (String)currEmp.getAttribute(\"\
  SalaryString\");\n            oldSal = new BigDecimal(oldSalString);\n         \
  \   logger.finest(\"Old sal is \" + oldSal);\n            newSal = oldSal.multiply(new\
  \ BigDecimal(1.05))\n                .setScale(0, BigDecimal.ROUND_DOWN);\n    \
  \        currEmp.setAttribute(\"SalaryString\", newSal.toString());\n          \
  \  logger.finest(\"New sal is \" + currEmp.getAttribute(\"SalaryString\"));\n  \
  \      }\n        logger.finer(\"Done increasing salaries, refreshing UI\");\n \
  \       AdfFacesContext.getCurrentInstance().addPartialTarget(empTab);\n       \
  \ return null;\n    }\n    ...\n}\n```\n**清单 6-2.** ADF 日志记录示例\n\n在方法开头有一个 `logger.fine()`\
  \ 语句，在方法执行流程中有一些 `logger.finer()` 语句提供信息。在代码后半部分的循环内部，使用了 `logger.finest()`。\n\n\
  ### 配置日志记录\n\n您希望使用不同日志级别的原因在于，您可以对日志应用相关过滤器。您可以为单个类或 Java 包设置日志阈值，只有达到或超过阈值的日志语句才会实际写入日志。这样一来，额外的日志语句在几乎所有实际情况下都是“免费”的，因为低于阈值的日志语句在运行时的开销非常低。\n\
  \n默认情况下，您只会看到 `WARNING` 级别或更高级别的日志。这是因为您的 `ADFLogger` 实例继承了根记录器的配置，而根记录器被设置为 `WARNING`。要查看您自己不同级别的日志，您需要添加以您的类和包命名的记录器，并定义它们的日志级别。\n\
  \n这可以在 `logging.xml` 文件中完成，但无需直接编辑此文件。对于 JDeveloper 内置的 WebLogic 服务器，您可以从日志窗口中点击\
  \ **Actions**（操作），然后选择 **Configure Oracle Diagnostic Logging**（配置 Oracle 诊断日志），如图\
  \ 6-1 所示。\n\n![A437725_1_En_6_Fig1_HTML.jpg](img/A437725_1_En_6_Fig1_HTML.jpg)\n\
  **图 6-1.** 在 JDeveloper 中配置 ADF 日志记录\n\n这会在 JDeveloper 中打开 `logging.xml` 文件。因为 JDeveloper\
  \ 将此文件识别为特殊配置文件，它提供了一个 **Overview**（概述）选项卡，您可以在其中轻松更改日志配置。如果您想查看原始配置文件，可以选择 `logging.xml`\
  \ 窗口底部的 **Source**（源）选项卡。\n\nADF 既有在程序调用之间持续存在的持久记录器，也有每当实例化包含日志语句的类时由 ADF 创建的瞬态记录器。如果在应用程序在内置\
  \ WebLogic 服务器中运行时打开 `logging.xml` 窗口，您将看到许多记录器。为了获得更好的概览，请选中 **Hide Transient Loggers**（隐藏瞬态记录器）复选框，如图\
  \ 6-2 所示。\n\n![A437725_1_En_6_Fig2_HTML.jpg](img/A437725_1_En_6_Fig2_HTML.jpg)\n\
  **图 6-2.** logging.xml 的“概述”选项卡\n\n您自己添加的记录器应该是持久记录器。要添加这些记录器，请点击绿色加号并选择 **Add Persistent\
  \ Logger**（添加持久记录器）。在对话框中，输入记录器名称并选择日志阈值。\n\n*   如果您的记录器名称是包名，则该包中每个类达到或超过阈值的日志语句都将写入日志。\n\
  *   如果您的记录器名称是特定类的名称，则只有该特定类达到或超过阈值的日志语句才会写入日志。\n\n所有记录器都会自动排列在根记录器下的层级结构中，每个记录器都可以有自己的日志级别。这使您可以很好地控制哪些内容被写入日志文件。\n\
  \n例如，在图 6-2 中，我指定了：\n\n*   一个 `com.vesterli` 记录器，允许对未由更低级别记录器显式设置日志记录的每个类进行 `FINE`\
  \ 级别的日志记录。您的组织产生的所有 Java 代码都应位于类似的基准 Java 包下。\n*   一个 `com.vesterli.hrdemo` 记录器，允许对作为我的\
  \ HRDemo 应用程序一部分的每个类进行 `FINER` 级别的日志记录。通过使用这样一个应用程序基准包，您可以使用一个记录器控制整个应用程序的日志记录。\n\
  *   一个 `com.vesterli.hrdemo.foundation` 记录器，仅对此包中的类显示 `INFO` 级别的日志记录。一旦您的基础类在应用程序中经过测试和使用，您通常不希望从它们那里获得非常详细的日志。\n\
  \n### 读取日志\n\n达到相关阈值的日志语句将被写入 WebLogic 日志文件和/或显示在控制台中。\n\n### 在 JDeveloper 中读取日志\n\
  \n当你在`JDeveloper`内置的 WebLogic 服务器中运行应用程序时，你会看到日志条目出现在日志窗口中。`ADF`不会区分你编写的日志语句和`ADF`自身产生的日志。`JDeveloper`的默认配置为`ADF`包设置了一个相当高的阈值，因此除非你添加或重新配置了记录器，否则应该不会看到大量`ADF`内部日志信息。\n\
  \n注意\n即使你通过拖放组件到页面上来构建页面，你也可能会收到一些`ADF`警告。实际上，这是`JDeveloper`在抱怨它自己生成的代码。这些警告可以安全地忽略。通常不值得花时间去追踪和修复根本原因。\n\
  \n不要在“操作”菜单中取消选择名为`Verbose Server Log`的选项。这虽然能减少日志输出，但不会区分你的日志和内部`ADF`日志，因此你也看不到任何自己的日志。\n\
  \n如果你有一个很大的日志文件，可以使用`Oracle 诊断日志分析器 (ODLA)`来检查它。要启动它，你从“操作”按钮菜单中选择`Analyze Log ➤\
  \ Current in Console`。`ODLA`会如图 6-3 所示打开。\n\n![A437725_1_En_6_Fig3_HTML.jpg](img/A437725_1_En_6_Fig3_HTML.jpg)\n\
  图 6-3. Oracle 诊断日志分析器\n\n在`ODLA`窗口顶部，你可以输入搜索条件并执行搜索。最常见的搜索是在顶部的单选按钮组中选择`By Log Message`。在底部的搜索条件行中，你通常会在第一个下拉菜单中选择`Message`，在第二个中选择`Contains`，然后输入一个搜索字符串。\n\
  \n在`ODLA`窗口下半部分的结果区域中，请注意左侧概览框右上角的小三角形。这允许你选择要在概览中查看哪些属性。如图 6-3 所示，如果你选择了`Related`，你会得到一列带有一个小图标的字段。\n\
  \n这是一个非常强大的功能。如果你点击那个小图标，你会得到一些选项，包括`Related by Request`。如果你选择这个选项，你会看到由同一次服务器往返触发的所有日志消息。这让你能够看到由于相同用户交互（通常是鼠标点击或按键）而在所有类中发生的一切。拥有问题发生之前的消息通常非常有帮助，特别是当其他事件产生的无关消息被过滤掉时。\n\
  \n### 在其他工具中读取日志\n\n当你将应用程序部署到外部 WebLogic 服务器用于测试或生产时，日志配置不会被包含在内。你需要在每个 WebLogic\
  \ 服务器上单独配置日志记录。这意味着，即使你在`JDeveloper`内置的 WebLogic 服务器中配置了大量日志记录，当你将应用程序部署到另一个 WebLogic\
  \ 服务器时，默认情况下你将看不到任何日志记录。\n\n在独立的 WebLogic 服务器上，你在 Enterprise Manager 中配置日志记录。为此，在`Application\
  \ Deployments`下找到`ADF`应用程序，然后选择`Application Deployment ➤ ADF ➤ ADF Log Configuration`。\n\
  \n日志也可以在 Enterprise Manager 中查看，这让你的 WebLogic 管理员能够了解你的应用程序运行状况。甚至，开发人员可以指导运维人员采取某些措施来缓解日志中揭示的问题。例如，当`ADF`应用程序无法联系数据库或外部服务时，就可能出现这种情况。\n\
  \n当你在 Enterprise Manager Grid Control 中查看日志时，你会看到该特定托管服务器上创建的所有日志。你很可能需要过滤日志以追踪问题。类似于`JDeveloper`中`Oracle\
  \ 诊断日志分析器`的工作方式，你可以搜索包含特定字符串的日志消息，然后点击`View Related Messages`，并通过选择`by ECID (Execution\
  \ Context ID)`来查找来自同一次服务器往返的消息。\n\nOracle 还宣布了一项非常有趣的云服务，名为`Oracle Management Cloud`。这项云服务可以接收来自各类应用程序的日志文件，并提供带有可视化和下钻功能的综合概览。`Oracle\
  \ Management Cloud`将接收的日志输入之一就是来自`ADF`应用程序的日志，这些应用程序既包括在您数据中心 WebLogic 服务器上运行的`ADF`应用，也包括部署到`Oracle\
  \ Java Cloud Service`上的`ADF`应用。在撰写本文时它尚未发布，但你可以访问`cloud.oracle.com`查看它是否可用以及是否符合你的需求。\n\
  \n最后，你可以自己阅读原始日志文件，或者配置一些工具来监控和展示它们。`ADF`日志条目会写入你部署应用程序所对应的托管服务器的 WebLogic 服务器日志中。如果你部署到一个名为`MyManagedServer`的托管服务器，你可以在`MyManagedServer-diagnostic.log`文件中找到你的`ADF`条目。你的服务器管理员可以帮助你找到这个文件，也可以使用\
  \ Enterprise Manager 将其移动到其他位置。\n\n注意\n如果你无法访问服务器文件系统，请询问你的服务器管理员，是否可以将测试服务器的日志文件放在共享网络驱动器上。\n\
  \n如果你想查看`JDeveloper`内置 WebLogic 服务器的日志文件，你可以在域主目录中找到它们。在 Windows 上，路径类似于`C:\\Users\\\
  <你的用户名>\\AppData\\Roaming\\<systemX.Y.Z>\\DefaultDomain\\servers\\DefaultServer\\\
  logs\\DefaultServer-diagnostic.log`。\n\n### 常规调试\n\n`JDeveloper`是一个完整的`集成开发环境 (IDE)`，因此它当然包含了你期望的所有调试功能。\n\
  \n### 设置断点\n\n要调试你的 Java 代码，你需要打开相关的类，然后在左侧边距处点击以设置一个断点。它会用一个红点和该行代码的红色背景标记出来，如图\
  \ 6-4 所示。\n\n![A437725_1_En_6_Fig4_HTML.jpg](img/A437725_1_En_6_Fig4_HTML.jpg)\n\
  图 6-4. 设置断点\n\n它在右侧边距也会用一个小粉色方框标记。如果你显示了迷你地图，带有断点的行在那里也会显示为粉红线。你可以在迷你地图或右侧边距点击，以跳转到某个断点（或代码中的任何其他位置）。\n\
  \n注意\n源代码视图右侧的迷你地图可以让你快速概览大型类。你可以右键单击并设置各种选项以及隐藏该地图。要再次显示它，请按`Alt+Shift+句点`或在源代码中右键单击上下文菜单中选择`Source\
  \ ➤ Show Mini-Map`。\n\n如果你将鼠标悬停在左侧边距的红色断点圆点上，会弹出一个对话框，如图 6-4 所示。在这个对话框中，你可以选择，例如，只在第五次到达该断点时停止，或者基于某些条件停止。如果你右键单击断点圆点并选择`Edit\
  \ Breakpoint`，你会获得更多选项来定制该断点。\n\n### 以调试模式运行\n\n一旦设置了所需的断点，你就可以右键单击一个可运行的元素并选择`Debug`（而不是通常的`Run`）。\n\
  \n对于子系统中的任务流，你通常运行一个包含要调试的任务流的测试页面。要测试应用程序中的 Java 类，你通常会有调用它们的单元测试类，因此你可以直接运行这些单元测试来调用和调试你的类。\n\
  \n如果内置的 WebLogic 服务器已经以正常（`运行`）模式启动，系统会提示你是否要重启服务器。以`调试`模式运行会稍慢一些，并且需要重启 WebLogic，因此`JDeveloper`会保护你免于意外地在`运行`和`调试`模式之间切换。\n\
  \n\n### 单步执行代码\n\n当你在代码中遇到断点时，执行会停止，JDeveloper 会高亮显示代码中的当前行。如果在任何内容返回给 Web 浏览器之前中断，浏览器将只是一片空白，显示尚未收到响应的指示。\n\
  \n执行停止后，你有几个选项：\n\n*   单步跳过（`F8`）\n*   单步进入（`F7`）\n*   单步跳出（`Shift+F7`）\n*   执行至方法结束\n\
  *   运行至光标处（`F4`）\n*   继续执行（`F9`）\n\n其中一些选项可从源视图上方的工具栏中找到，所有选项都可以在“源”菜单中找到。\n\n常规方法是使用“单步跳过”逐行执行你类中的代码。JDeveloper\
  \ 会在最左侧边距中显示执行次数、一些变量和一些控制流，如图 6-5 所示。\n\n![A437725_1_En_6_Fig5_HTML.jpg](img/A437725_1_En_6_Fig5_HTML.jpg)\n\
  \n图 6-5.\n\n在 JDeveloper 中调试代码\n\n默认情况下，最左侧边距（常规边距中行号的左侧）相当狭窄，但你可以拖动其边缘以查看更多调试信息，如上图所示。\n\
  \n“单步进入”将进入包含当前打开类所调用方法的类。如果当前代码行调用了多个其他类的方法，系统会提示你选择要进入哪个类。如果你的代码中存在嵌套调用层次结构，这将非常有用，但有时只会将你带入\
  \ Oracle 的 ADF 源代码中。除非你已按本章后面说明请求并安装了源代码，否则尝试进入 ADF 代码只会导致缺少源代码的错误。\n\n你也可以直接点击将光标置于代码更下方的位置，然后按\
  \ `F4` “运行至光标处”。当你收集到所需信息后，按“继续执行”（`F9`）允许 JDeveloper 继续执行。\n\n### 收集信息\n\n当你以调试模式启动内置的\
  \ WebLogic 服务器时，JDeveloper 会自动在“日志”窗口中为你打开几个新选项卡：\n\n*   `数据`\n*   `智能数据`\n*   `监视点`\n\
  *   `EL 求值器`\n*   `ADF 数据`\n*   `断点`\n\n“数据”选项卡显示当前内存中所有对象的信息，而“智能数据”选项卡会猜测在此代码位置与你最相关的内容并仅显示这些。\n\
  \n如果你对这两个窗口中都没有的某些内容感兴趣，可以在“监视点”选项卡上添加一个监视点。你可以键入表达式，也可以在代码视图中选择某些内容，右键单击，然后选择“监视”。\n\
  \n“EL 求值器”允许你计算表达式语言表达式的值，这在调试如下所述的流程时特别有用。\n\n“ADF 数据”选项卡显示 ADF 内存作用域（pageFlowScope、requestScope\
  \ 等）中的所有内容，而“断点”选项卡则提供代码中所有断点的概述。你可以关闭不需要的选项卡，并从 JDeveloper 的“窗口”菜单的“调试器”子菜单中重新打开这些及其他调试选项卡。\n\
  \n此外，你可以将光标置于任何变量上并按 `Ctrl+I`（或右键单击并选择“检查”）以打开一个独立的弹出式“检查器”窗口，显示该变量。\n\n### 调试任务流\n\
  \n当你能够找出导致问题的代码时，调试代码是有效的。但有时，可能很难找到正在运行的代码，或者应用程序中的执行路径与你预期的不同。幸运的是，JDeveloper\
  \ 为你提供了在比代码更高的层次进行调试的能力：在任务流中。\n\n要调试任务流，你在“图表”视图中打开它，并右键单击某个任务流活动。它会出现一个小红点，如图\
  \ 6-6 所示。\n\n![A437725_1_En_6_Fig6_HTML.jpg](img/A437725_1_En_6_Fig6_HTML.jpg)\n\
  \n图 6-6.\n\n在任务流中设置断点\n\n当你运行应用程序时，执行会在任务流中的断点处停止。在 JDeveloper 中，焦点位于带有活动断点的任务流图上，并且\
  \ JDeveloper 通常会移到开发机器的前台（位于活动浏览器窗口前面）。\n\n当你在任务流中停止执行时，实际上没有代码可以单步执行，但你可以使用表达式语言（EL）检查应用程序的状态。你在“日志”窗口的“表达式语言”选项卡上进行此操作，如图\
  \ 6-7 所示。\n\n![A437725_1_En_6_Fig7_HTML.jpg](img/A437725_1_En_6_Fig7_HTML.jpg)\n\
  \n图 6-7.\n\n调试任务流时计算表达式语言\n\n通过此窗口，你可以检查托管 Bean 和公开为 EL 的 ADF 内部值中的值。例如：\n\n*  \
  \ `#{pageFlowScope.myBean.myAttribute}` 将为你提供页面流作用域中 Bean `myBean` 的 `myAttribute`\
  \ 属性的值。请注意，如果你选择了错误的作用域，表达式语言将只计算为 null。\n*   `#{securityContext.userName}` 将为你提供当前登录用户的名称。如果用户尚未登录，此值将计算为\
  \ `anonymous`。\n*   `#{facesContext.viewRoot.locale.language}` 将为你提供应用程序当前运行的语言（来自浏览器）。这对于调试翻译或本地化错误非常有用。\n\
  \n### 调试进入 ADF 库\n\n正如你在第 2 章所看到的，一个 ADF 应用程序通常由多个子系统和一个主应用程序组成。每个子系统都部署为一个 ADF\
  \ 库，主应用程序使用这些库。但是，当你追踪的错误在单独测试任务流时不出现时，如何调试整个应用程序呢？解决方案很简单：你将源代码与子系统的 ADF 库一起包含。\n\
  \n### 部署源代码\n\n为了允许调试器在子系统代码中中断并显示相关源代码，它需要访问源代码。默认情况下，ADF 库仅包含已编译的 Java 类文件（字节码），而不包含源文件。这对于部署生产应用程序来说没问题，因为你不想让最终用户不需要的源代码使库膨胀。在某些情况下，你的\
  \ ADF 应用程序甚至可能由你不希望其查看源代码的最终客户使用。\n\n但对于调试，你需要部署子系统的源代码。为此，你创建一个单独的部署配置文件，将你的源代码打包到\
  \ JAR 文件中。选择常规的 `文件` ➤ `新建` ➤ `常规` ➤ `部署配置文件`，然后选择 `JAR 文件`（而不是常规的 `ADF 库 JAR 文件`）。你应该为源\
  \ JAR 文件确定标准命名——我建议加上 `source` 前缀，例如 `sourceDeptEmp`。\n\n在 `编辑 JAR 部署配置文件属性` 对话框中，你需要打开\
  \ `文件组` ➤ `项目输出` ➤ `贡献者` 并更改 JDeveloper 建议的默认内容。你不需要 `项目输出目录` 和 `项目依赖项`，但你需要 `项目源路径`，如图\
  \ 6-8 所示。\n\n![A437725_1_En_6_Fig8_HTML.jpg](img/A437725_1_En_6_Fig8_HTML.jpg)\n\
  \n图 6-8.\n\n为源 JAR 部署设置属性\n\n\n### 在库代码中中断\n\n当您为相关子系统创建了源代码 JAR 文件后，您可以像添加其他 JAR\
  \ 一样将它们添加到您的主应用程序视图项目中：`Project Properties`（项目属性）➤ `Libraries and Classpath`（库和类路径）➤\
  \ `Add JAR/Directory`（添加 JAR/目录）。\n\n要查看源代码 JAR 文件并在其中设置断点，您需要重新配置`Applications`（应用程序）窗口以显示所包含的库。这可以通过`Applications`（应用程序）窗口右上角的`Navigator\
  \ Display Options`（导航器显示选项）按钮来完成。选择`Show Libraries`（显示库），如图 6-9 所示。\n\n![A437725_1_En_6_Fig9_HTML.jpg](img/A437725_1_En_6_Fig9_HTML.jpg)\n\
  \n图 6-9. 配置`Applications`（应用程序）窗口以显示库\n\n现在，所有库都显示在`Applications`（应用程序）窗口中。找到您想要在其中设置断点的子系统对应的源代码\
  \ JAR 文件，打开它并双击 Java 文件以打开源文件。您可以在这些子系统文件中设置断点，如图 6-10 所示。当您运行主应用程序时，执行将在您选择的相关子系统中的位置停止。\n\
  \n![A437725_1_En_6_Fig10_HTML.jpg](img/A437725_1_En_6_Fig10_HTML.jpg)\n\n图 6-10.\
  \ 从主应用程序在子系统源代码中放置断点\n\n### 添加 ADF 源代码\n\n在调试 ADF 应用程序时，您经常会看到图 6-11 所示的对话框。\n\n\
  ![A437725_1_En_6_Fig11_HTML.jpg](img/A437725_1_En_6_Fig11_HTML.jpg)\n\n图 6-11. 无法找到源文件\n\
  \n这个对话框意味着您希望继续单步调试，但 `JDeveloper` 无法找到包含下一个要执行的代码片段的源文件。如果执行继续到您自己的某些类中，而您又没有按照前面所述创建源代码\
  \ JAR，就可能发生这种情况。但最常见的情况是，执行进入了 `Oracle` 提供的大型 ADF 代码库。默认情况下，您没有 `Oracle` ADF 的源代码。\n\
  \n### 获取 ADF 源代码\n\n但如果您与 `Oracle` 签订了有效的支持合同，您可以获取源代码。该过程在 `My Oracle Support`\
  \ 上的 `Doc ID 971256.1` 中有描述，主要步骤如下：\n\n1.  您通过 `My Oracle Support` 提交一个 `Service\
  \ Request`（服务请求），并要求获取您所需版本的 ADF 源代码。您必须提供一个有权代表您的组织与 `Oracle` 签署 `Source Code Agreement`\
  \ (`SCA`)（源代码协议）的人员的姓名、电子邮件和传真号码（是的，确实需要）。如果您是开发者，这个人可能是您的经理。\n2.  `Oracle` 会向您发送\
  \ `SCA`。\n3.  您组织中被授权的人员签署并将 `SCA` 返回。\n4.  `SR`（服务请求）会更新一个指向相关源代码 `ZIP` 文件的 `URL`\
  \ 以及打开该 `ZIP` 文件的密码。\n5.  您下载 `ZIP` 文件（其名称通常类似于 `adf_vvvv_nnnn_source.zip`，其中 `vvvv`\
  \ 是版本号，`nnnn` 是构建号）。\n\n### 将 ADF 源代码添加到 JDeveloper\n\n从 `Oracle` 获得 ADF 源代码后，您通常需要为其创建一个用户库。为此，选择\
  \ `Tools`（工具）➤ `Manage Libraries`（管理库）以打开 `Manage Libraries`（管理库）对话框。在此对话框中，单击 `New`（新建）以添加一个用于\
  \ ADF 源代码的新库。提供一个名称，并将 `ZIP` 文件作为一个新的 `Source Path`（源路径）条目添加。不要选中 `Deployed by Default`（默认部署）复选框。\n\
  \n### 将 ADF 源代码添加到项目\n\n定义了 ADF 源代码用户库后，您可以在每个相关项目的 `Project Properties`（项目属性）➤\
  \ `Libraries and Classpaths`（库和类路径）➤ `Add Library`（添加库）下将其添加进去。您的 ADF 源代码库应出现在 `Users`（用户）节点下。\n\
  \n将 ADF 源代码作为项目的一部分后，您就可以调试进入 ADF 本身了。如果您需要更多信息来帮助调试一个棘手的问题，您还可以跟踪从您自己的应用程序到内部 ADF\
  \ 类的执行路径。如果您对 ADF 内部工作原理感到好奇，您甚至可以在 `Oracle` 的代码中设置断点。\n\n"
- '# 提示与技巧


  当您的 ADF 应用程序出现问题时，首先运行 `ADF Model Tester`（ADF 模型测试器）。这将告诉您问题是出在业务组件层还是用户界面层。


  ### 如果模型无法运行


  某些类型的错误意味着模型测试器根本无法启动。在这种情况下，`JDeveloper` 无法提供任何好的建议，您在 `Log`（日志）窗口中看到的只是类似清单 6-3
  的内容。


  ```

  C:\Java\jdk1.8.0_102\bin\javaw.exe -server -classpath ...

  Apr 17, 2017 5:31:10 PM oracle.security.jps.JpsStartup start

  INFO: Jps initializing.

  Apr 17, 2017 5:31:11 PM oracle.security.jps.JpsStartup start

  INFO: Jps started.

  Apr 17, 2017 5:31:20 PM oracle.jbo.jbotester.MainFrame main

  INFO: BC4J Tester started.

  ```


  清单 6-3. `ADF Model Tester`（ADF 模型测试器）未完全启动


  如果您没有看到 `jdev tester server connecting on port...`，则表示模型测试器未正确启动。这种情况下，您的业务组件中的某些代码存在问题，您需要检查所有业务组件的源文件。


  您需要打开 `XML` 文件（在业务组件的 `Source`（源）选项卡上）以及您生成的任何 `Java` 类。一个没有问题的文件在右边距顶部有一个绿色方块，并且右边距没有其他标记，如图
  6-12 所示。


  ![A437725_1_En_6_Fig12_HTML.jpg](img/A437725_1_En_6_Fig12_HTML.jpg)


  图 6-12. 没有问题的业务组件文件


  如果文件存在问题，右上角的方块是橙色或红色的，并且在右边距的不同位置会出现橙色和/或红色的标记，如图 6-13 所示。


  ![A437725_1_En_6_Fig13_HTML.jpg](img/A437725_1_En_6_Fig13_HTML.jpg)


  图 6-13. 有问题的业务组件文件


  每个问题都在代码中以橙色或红色下划线突出显示，您可以将鼠标指针指向它，`JDeveloper` 就会告知它认为是什么问题。


  ## 如果页面是空白的


  如果您的网页显示为空白，并且 `JDeveloper` 日志没有告知您问题所在，您需要检查该页面的源文件。查找右边距中用红色和/或黄色条标记的错误和警告，以及代码中的下划线。


  如果这无助于解决问题，您可以回退到久经考验的调试方法：注释掉代码。由于页面的源是 `XML`，您需要使用 `XML` 注释语法 `<!--   -->`。


  首先，在页面顶部附近放置一个起始注释，并注释掉所有包含表达式语言（绑定、操作监听器等）的内容。然后从 `Components`（组件）窗口中放入一些简单的组件，如清单
  6-4 所示。


  ```

  ...

  -->

  ```


  清单 6-4. 注释掉页面的部分内容


  现在，当您运行页面时，应该只看到简单的组件。然后移动注释开始和结束标记，以包含越来越多的 `UI` 组件，直到找到导致问题的那一个。


  '
- '# 总结


  您已经了解了如何为您的 ADF 代码添加适当的检测，以及如何调试企业级 ADF 应用程序。您需要知道的最后一件事是如何为高效的企业 ADF 开发实施良好的工作流程。


  '
- "# 7. 您的工作流程\n\n`JDeveloper` 是一个企业级工具，它支持并与许多您需要的工具集成，以支持企业应用程序开发流程。\n\n\n### 工作流程\n\
  \n由于 ADF 提供了多种方式来实现一次通用功能，然后在多个应用间共享，因此**从一开始就以正确的方式设置项目至关重要**。\n\n开发工作应在装有 `JDeveloper`\
  \ 的开发工作站上进行，最好还配有一份数据库副本。现代工作站性能强大，足以同时运行 `JDeveloper`、`WebLogic` 和数据库。当面对数据库不可避免的变更时，这种配置能为你提供更大的灵活性。\n\
  \n你需要将完成的代码交付至中央代码仓库，然后由构建过程（最好是自动化的）生成应用程序的某个版本，并将其部署到集成环境。\n\n### 设计工作\n\n第一步是与实际最终用户一起设计应用程序。确保设计小组中有各类用户的代表。一个常见的问题是应用程序由专家用户开发——这通常会导致界面过于复杂，普通用户和新手用户难以理解。\n\
  \n除了用户之外，为了快速高效地使用 ADF 开发出用户友好的应用程序，你还需要三种不同的技术技能：\n\n*   用户体验（UX）设计师\n*   经验丰富的\
  \ Oracle ADF 开发人员\n*   数据库设计师\n\n用户体验设计师通过研讨会引导用户设计出满足其需求的界面和导航，同时确保一致性和用户体验最佳实践的实施。Oracle\
  \ 已对用户体验进行了广泛研究，并免费提供了其所有最佳实践。你团队中的 UX 设计师应熟悉《Oracle 应用程序用户体验设计模式》（ [`www.oracle.com/webfolder/ux/applications/DPG/index.html`](http://www.oracle.com/webfolder/ux/applications/DPG/index.html)\
  \ ），并阅读免费的 Oracle 电子书以获取灵感。如果你的 ADF 应用程序旨在扩展 Oracle 的云应用程序，则应按照“简化用户体验”指南构建你的应用程序，使其看起来与\
  \ Oracle 云应用程序套件中的应用程序一致。\n\n当用户体验（界面和导航）的初稿完成后，UX 设计师会与首席 ADF 开发人员进行讨论。开发人员可以通过以下两种方式为设计做出贡献：\n\
  \n*   建议使用专门的 ADF 组件，可能以较低成本提供额外功能或便利\n*   如果建议的设计在标准 ADF 中难以实现，则提出满足特定需求的替代方案\n\
  \n然后，UX 设计师会进行必要的修改，以纳入 ADF 开发人员的意见，并与用户一起最终确定设计。\n\n设计完成后，数据库设计师根据设计来识别所有数据实体及其关系和属性。在此阶段，可能需要返回用户处澄清关系、属性和有效值，然后再构建数据库。\n\
  \n### 应用程序架构\n\n随着应用程序规范开始具体化，你可以开始建立应用程序架构。\n\n如果这是你构建的第一个 ADF 应用程序，你应该从第 2 章中描述的模块化\
  \ ADF 架构开始，该架构由一个基础层、若干子系统和一个主应用程序组成。\n\n如果你已经知道将构建许多 ADF 应用程序，并且你的团队中有一些经验丰富的 ADF\
  \ 开发人员，你也可以从一开始就建立一个企业级 ADF 架构。这种更复杂的架构也在第 2 章中进行了描述，涉及为所有应用程序建立企业基础层，以及为每个应用程序建立独立的应用程序基础层。\n\
  \n此时，你需要决定子系统的数量，包括每个子系统的名称、范围和 Java 包名称。\n\n### 初始开发\n\n应用程序架构就位后，你就可以开始初始开发了。如果你正在按照敏捷方法运行项目，可以将此视为第一个冲刺阶段。\n\
  \n### 开发标准\n\n你需要某个地方来记录你的开发标准。为了便于更新和跟踪变更，这最好是一个 Wiki 或类似工具，而不是文字处理文档。\n\n你的开发标准必须包括基础层、所有子系统和主应用程序的\
  \ Java 包名称。它还应包括 Java 编码准则（现在就解决制表符与空格之争，一劳永逸）以及 ADF 对象和 Java 类的命名标准。\n\n**提示**\n\
  \n要获取 ADF 命名标准的灵感，你可以查看由 ADF 企业方法组制定的《ADF 命名与项目布局指南》（ [`www.oracle.com/technetwork/developer-tools/adf/learnmore/adf-naming-layout-guidelines-v2-00-1904828.pdf`](http://www.oracle.com/technetwork/developer-tools/adf/learnmore/adf-naming-layout-guidelines-v2-00-1904828.pdf)\
  \ ）。\n\n`JDeveloper` 有许多可以设置的偏好选项。请确保至少设置以下内容：\n\n*   环境 ➤ 编码（设置为 `UTF8`。某些平台上的某些\
  \ `JDeveloper` 版本默认为其他编码）\n*   ADF 业务组件 ➤ 基类（设置为你自己的 BC 基类）\n*   ADF 业务组件 ➤ 包（为实体、关联、视图对象、视图链接和应用程序模块提供不同的子包，以便在代码和\
  \ `JDeveloper` 中将它们分离）\n*   代码编辑器 ➤ 代码样式（复制一个配置文件并根据你的需要进行调整）\n\n### 创建所有 JDeveloper\
  \ 工作区\n\n标准就位后，你的首席开发人员或架构师应创建应用程序的所有 `JDeveloper` 工作区，包括其中的项目。这些工作区应创建在一个新目录中，该目录除用于\
  \ ADF 工作区和 ADF 库外不作他用。我们称此目录为你的 `$ADF_ROOT` 目录（例如，`C:\\JDeveloper\\hrdemo`）。\n\n\
  在模块化 ADF 架构中，这意味着创建：\n\n*   基础层工作区，包含通用模型、通用 UI、通用实用程序代码和业务组件基类等项目\n*   所有子系统工作区，每个都包含一个模型项目和一个视图/控制器项目\n\
  *   主应用程序工作区\n*   一个用于存放你的 ADF 库的目录\n\n### 创建初始基础层\n\n现在，在基础层工作区内，你应该创建整个应用程序所依赖的元素：\n\
  \n*   业务组件基类\n*   页面模板\n*   页面片段模板\n*   任务流模板\n*   应用程序皮肤\n\n你的业务组件基类目前可以为空，但你需要创建它们并设置\
  \ `JDeveloper`，以便在创建 ADF 业务组件时使用这些基类。\n\n**注意**\n\n`JDeveloper` 并未提供简便的方法将配置从一个\
  \ `JDeveloper` 实例迁移到另一个实例，因此无法将正确的 `JDeveloper` 设置分发给你整个团队，除非给每人一台预装了正确配置的 `JDeveloper`\
  \ 的虚拟机。\n\n同样，你的模板和皮肤目前也可以为空。有关这些元素的更多详细信息，请参阅第 2 章。\n\n创建这些初始代码后，从通用 UI 和业务组件基类项目创建\
  \ ADF 库。将这些 ADF 库 `JAR` 文件放入 ADF 项目目录中的通用 ADF 库目录中。然后，按照本章后面“源代码控制”部分的描述，将所有工作区置于版本控制之下，并将\
  \ ADF 库目录置于版本控制之下。\n\n\n\n### 创建数据库\n\n在创建 JDeveloper 工作空间和初始基础架构的同时，您的数据库设计团队可以为应用程序创建初始的数据模型。\n\
  \n一个成功的 Oracle ADF 项目基于一个设计良好的数据库。数据库设计超出了本书的范围。\n\n**提示**  \n确保数据库对象（如表）的版本控制可能很困难。可以考虑使用像\
  \ `Flyway`（ [`https://flywaydb.org/`](https://flywaydb.org/) ）这样的工具，来处理任何项目中都不可避免的数据库变更。\n\
  \n如果您想使用 JDeveloper 来开发数据库，请研究 JDeveloper 中称为离线表的功能。这些表在 JDeveloper 中定义，可以与实际的数据库进行比较，并且\
  \ JDeveloper 可以自动生成必要的脚本，使数据库与离线定义保持一致。\n\n### 初始应用\n\n初始应用的目的有两个：一是确保所有部分协同工作，并在开始正式构建前修复任何问题；二是向您的用户展示应用程序将是什么样子。在敏捷开发中，一个基本原则是能够在每两到三周的冲刺结束时演示一些新的功能。即使您不实施敏捷方法的其他部分，通过定期向用户展示应用程序的演示来让他们了解进度，也是一个好主意。\n\
  \n一旦数据库的第一个版本准备就绪，您就可以使用“从业务组件生成表”向导在公共模型项目中创建所有实体对象。然后从公共模型项目创建一个 ADF 库。\n\n接着，您构建一个简单的子系统，实现应用程序设计中的一个界面。如果您的应用程序包含用于维护参考数据的界面，那么其中某个界面可能是一个适合在初始应用中实现的候选。该子系统将涉及一个基于来自公共模型\
  \ ADF 库的实体对象的视图对象，以及一个包含单个页面片段的任务流。将完成的子系统部署为 ADF 库。\n\n在构建子系统的同时，您的团队还应按照第 5 章所述构建带有菜单和任务流切换逻辑的主应用程序。如果您的应用程序将要实施\
  \ ADF 安全性，请现在就使用示例用户为主应用程序应用安全性，用于演示。\n\n**注意**  \n不要等到项目结束时才实施安全性。如果您的应用程序需要将您的\
  \ WebLogic 应用服务器与另一个身份提供程序（如 Microsoft Active Directory）集成，您需要在项目早期启动此过程，以便有时间修复可能出现的任何问题。\n\
  \n按照第 5 章所述，将子系统 ADF 库添加到主应用程序中，并测试是否可以调用来自子系统的任务流，以及是否可以更改页面片段上的数据并将这些更改后的数据存储到数据库中。\n\
  \n然后向用户展示这个基本应用程序。这让他们对最终的 ADF 应用程序将是什么样子有了初步的了解，并向他们证明项目正在进展中。\n\n### 构建应用程序\n\n\
  初始应用已经证明了整个技术栈是可行的，或者可能已经识别出您需要处理的领域（例如，安全性集成）。要构建应用程序的其余部分，您需要在子系统中实现所有设计好的界面和其他功能。\n\
  \n如果您使用敏捷开发方法，您会为每个冲刺选择一些用户故事，并不断从子系统部署新的 ADF 库，并将它们集成到主应用程序中。如果您按照传统的瀑布模型运行项目，请确保在计划中设置一些里程碑，在这些里程碑点将所有工作集成到主应用程序中，以便向最终用户和其他利益相关者演示应用程序的当前状态。\n\
  \n### 处理数据库变更\n\n在开发过程中，数据库总是会发生变化。会有对现有表中属性的小改动（新增或修改的列），也可能涉及新表和表关系变更的较大的结构性变化。\n\
  \n当您需要对数据库中的表进行小改动时，编写脚本来在本地数据库中进行更改。然后更改基础工作区中公共模型项目中的相应实体对象。您可以右键单击实体对象并选择“与数据库同步”，以寻求\
  \ JDeveloper 的帮助。“与数据库同步”对话框如图 7-1 所示。\n\n![A437725_1_En_7_Fig1_HTML.jpg](img/A437725_1_En_7_Fig1_HTML.jpg)\n\
  *图 7-1.*\n将数据库更改与 ADF 实体对象同步\n\n您需要单击“同步”或“全部同步”来让 JDeveloper 实际更改您的实体对象——如果只是单击“确定”，则不会进行任何更改。确认您需要更改后，JDeveloper\
  \ 会确认哪些更改已成功。\n\n请注意，实体对象中的属性更改不会自动应用于使用该实体对象的视图对象，并且对于视图对象也没有相应的“同步”功能。您必须手动处理任何视图对象的更改。您可以右键单击实体对象并选择“查找用法”，以查找依赖于该实体对象的视图对象。\n\
  \n### 处理其他基础架构变更\n\n对业务组件基类的更改不应破坏现有代码。同样，对页面和任务流模板的更改可能会影响页面的视觉外观，但不应破坏应用程序（除非您意外删除了某些页面中使用的\
  \ facet）。\n\n但是，您应始终执行回归测试，以验证您的应用程序是否仍然有效。通过用户界面自动化应用程序测试是一个好主意。\n\n### 源代码控制\n\
  \n您需要将 ADF 应用程序源代码和库置于版本控制之下。如果您的组织以前使用过像 Oracle Forms 这样的工具，它将所有源代码组织在少数几个大文件中，那么您可能至今还没有适当的版本控制。一旦开始使用包含大量小型但相互依赖的文件的\
  \ ADF，您就绝对需要实施源代码控制。\n\n当今最流行的版本控制软件是 `Git`。图 7-2 显示了来自 Google Trends 的各种版本控制工具随时间变化的比较。\n\
  \n![A437725_1_En_7_Fig2_HTML.jpg](img/A437725_1_En_7_Fig2_HTML.jpg)\n*图 7-2.*\n\
  版本控制软件流行度\n\n`Git` 是一个免费的开源工具，可以从 [`https://git-scm.com/`](https://git-scm.com/)\
  \ 下载并在本地运行，或者您可以使用托管实例，如 `GitHub`（ [`https://github.com/`](https://github.com/)\
  \ ）。本章稍后描述的 Oracle Developer Cloud Service (DCS) 也使用 `Git`。不过，`JDeveloper` 内置了对\
  \ `Apache Subversion` 的支持，您可以从 `JDeveloper` 扩展中心（ [`http://apex.oracle.com/pls/apex/f?p=updatecenter:uc`](http://apex.oracle.com/pls/apex/f?p=updatecenter:uc)\
  \ ）下载用于 `CVS`、`Perforce` 等的扩展。\n\n\n\n### 对整个应用程序进行初始版本控制\n\n本节介绍如何使用 Git 对应用程序进行版本控制。由于\
  \ Git 是一个分布式版本控制系统，您通常先将更改提交到您的私有本地仓库，然后将更改推送到中央仓库。因为 Git 已经与 JDeveloper 集成，所以您无需单独下载和安装它。\n\
  \n**提示**\n如果您正在使用任何 Oracle 云服务（例如 Java Cloud Service），则 Oracle Developer Cloud Service\
  \ (DCS) 已包含在内，您无需额外付费即可使用。此服务包含一个中央 Git 仓库和许多其他工具。如果您计划使用 DCS，请参阅本章后面关于 DCS 的具体章节。\n\
  \n如前所述，您的技术主管或架构师应在开发开始前构建所有必要的工作区。他还应将所有文件置于版本控制之下。此过程涉及四个步骤：\n\n1.  将您的 ADF 根目录初始化为本地\
  \ Git 仓库\n2.  将所有项目文件添加到此本地仓库\n3.  将所有项目文件提交到本地仓库\n4.  将本地仓库推送到所有开发者均可访问的中央 Git\
  \ 仓库\n\n**注意**\n如果您使用 `Team ➤ Version Application`（团队 ➤ 版本化应用程序），则会运行 `Import to\
  \ Git wizard`（导入 Git 向导），并将单个应用程序工作区版本化到一个 Git 仓库中。但是，initialize-add-commit（初始化-添加-提交）方法会将一个目录中的所有工作区版本化到同一个\
  \ Git 仓库中，因此这是推荐的方法。\n\n### 初始化本地 Git 仓库\n\n首先，将所有 ADF 工作区及 ADF 库目录所在的目录初始化为 Git\
  \ 仓库。Git 仓库只是一个带有一些 Git 可识别的额外文件的目录。在本章中，我们将此目录称为 `$ADF_ROOT`。\n\n为此，请选择 `Team ➤\
  \ Git ➤ Initialize`（团队 ➤ Git ➤ 初始化）。仅当您在 JDeveloper 中打开着一个未版本化的应用程序工作区时，此菜单项才处于活动状态。在“初始化仓库”对话框中，提供所有\
  \ ADF 工作区及 ADF 库目录的根目录名称，如图 7-3 所示。\n\n![A437725_1_En_7_Fig3_HTML.jpg](img/A437725_1_En_7_Fig3_HTML.jpg)\n\
  \n图 7-3. 初始化 Git 仓库\n\n这会添加一个隐藏的 `.git` 子目录，从而将您指定的目录转变为一个 Git 仓库。\n\n### 添加所有文件\n\
  \n完成此步骤后，您会在 JDeveloper 的“Applications”（应用程序）窗口中看到，所有文件夹和文件图标的左下角都添加了一个小标记，如图 7-4\
  \ 所示。如果将鼠标光标指向某个文件或文件夹，弹出的小提示框会显示 `Git: Unversioned`（Git：未版本化）。\n\n![A437725_1_En_7_Fig4_HTML.jpg](img/A437725_1_En_7_Fig4_HTML.jpg)\n\
  \n图 7-4. 未版本化的应用程序工作区\n\n工作区中的所有文件也会出现在“Pending Changes window”（待定更改窗口）的“Candidates\
  \ tab”（候选选项卡）上。如果此窗口未作为新标签页在屏幕底部的“Log window”（日志窗口）旁边自动打开，您可以通过选择 `Team ➤ Git ➤\
  \ Pending Changes`（团队 ➤ Git ➤ 待定更改）来打开它。\n\n要添加所有文件，请选择 `Team ➤ Git ➤ Add all`（团队\
  \ ➤ Git ➤ 全部添加）。将出现“Add All”（全部添加）窗口，其大小可调整，如图 7-5 所示。\n\n![A437725_1_En_7_Fig5_HTML.jpg](img/A437725_1_En_7_Fig5_HTML.jpg)\n\
  \n图 7-5. “添加全部”对话框（已展开）\n\n请注意，“Add All”（全部添加）对话框包含 `$ADF_ROOT` 下所有工作区的所有文件。因为您将\
  \ `$ADF_ROOT` 目录初始化为一个 Git 仓库，“Add All”（全部添加）操作会作用于该目录及其子目录中的所有文件。\n\n“Applications”（应用程序）窗口中图标上的标记变为加号，所有文件移动到“Pending\
  \ Changes window”（待定更改窗口）的“Outgoing”（传出）选项卡，如图 7-6 所示。\n\n![A437725_1_En_7_Fig6_HTML.jpg](img/A437725_1_En_7_Fig6_HTML.jpg)\n\
  \n图 7-6. 文件已添加并准备提交到 Git\n\n### 提交所有文件\n\n要将所有文件提交到您的本地 Git 仓库，请从 JDeveloper 主菜单中选择\
  \ `Team ➤ Git ➤ Commit All`（团队 ➤ Git ➤ 全部提交），或从“Applications window”（应用程序窗口）的上下文菜单中选择\
  \ `Versioning ➤ Commit All`（版本控制 ➤ 全部提交）。将出现“Commit All”（全部提交）对话框，如图 7-7 所示。\n\n\
  ![A437725_1_En_7_Fig7_HTML.jpg](img/A437725_1_En_7_Fig7_HTML.jpg)\n\n图 7-7. “全部提交”对话框\n\
  \n请确保勾选 `Commit non-staged files`（提交未暂存的文件）复选框。Git 实际上使用一个单独的暂存区，文件可以是 `Staged`（已暂存）或\
  \ `Not Staged`（未暂存）（您可以在“Pending Changes window”（待定更改窗口）的“Status column”（状态列）中看到这一点）。高级\
  \ Git 用户可以通过控制文件是否已暂存来仅提交部分已更改的文件。对于日常 Git 使用，只需勾选该复选框并提交所有文件，无论其是否已暂存。\n\n\n\n\
  ### 使用中央仓库\n\n当你从 JDeveloper 提交文件时，更改会存储在你的本地 Git 仓库（即你之前初始化的 `$ADF_ROOT` 目录）中。正因为你是针对本地仓库进行操作，所以提交速度非常快，并且没有你提交的代码会破坏他人代码的风险。\n\
  \n当然，存储在本地仓库的文件距离被遗忘仅一次硬盘崩溃之遥，因此你需要将更改推送到一个公共仓库进行安全保存，并允许其他人在需要时使用最新代码。为此，你需要为你的团队设置一个中央仓库。\n\
  \n如果你使用 Oracle Cloud，你可以免费访问 Oracle Developer Cloud Service，其中包含一个中央 Git 仓库。如果不使用，你将需要为你的团队搭建一个中央\
  \ Git 实例，或者使用像 GitHub ([`www.github.com`](http://www.github.com)) 这样的托管解决方案。\n\n\
  ### 推送到中央 Git 实例\n\n要将你的应用程序推送到 GitHub，你需要创建一个 GitHub 账户，登录，并为每个工作区（foundation、subsystems、master）创建空仓库。不要用\
  \ README 文件初始化它们——它们将从 JDeveloper 中填充内容。当你准备好仓库后，在“应用程序”窗口的上下文菜单中选择 `版本管理 ➤ 推送`，或者在\
  \ JDeveloper 主菜单中选择 `团队 ➤ Git ➤ 推送`。“推送到 Git”向导将帮助你将每个应用程序工作区推送到远程仓库。\n\n如果你在自己的组织中运行自己的中央\
  \ Git 实例，过程也是类似的。\n\n将所有应用程序工作区推送到中央 Git 实例是应用程序初始版本管理的一部分，应在所有文件都已提交到本地仓库后，由首席开发人员或架构师尽快完成。\n\
  \n### 从中央 Git 实例克隆工作区\n\n一旦首席开发人员或应用程序架构师将工作区推送到共享位置，每个开发人员都可以从服务器获取自己的副本。用 Git\
  \ 的术语来说，开发人员**克隆**了该仓库。要启动“从 Git 克隆”向导，请选择 `团队 ➤ Git ➤ 克隆`。\n\n输入一个远程名称（按惯例为 `origin`）并提供你仓库的\
  \ URL。在第 4 步中，指定本地 Git 仓库目录应放置的本地目录（你的 `$ADF_ROOT`）。因为克隆过程会自动创建一个与你的 Git 仓库同名的目录，所以你应选择希望成为你的\
  \ `$ADF_ROOT` 的父目录。例如，如果你的 Git 仓库名为 `hrdemo`，并且你选择 `C:\\JDeveloper` 作为本地目录，那么你的\
  \ Git 仓库目录将位于 `C:\\JDeveloper\\hrdemo`。\n\n下载完所有内容后，JDeveloper 会向你显示它在仓库中找到的 ADF\
  \ 应用程序，你可以选择要在 JDeveloper 中打开哪些应用程序。\n\n### 从中央 Git 实例获取更改\n\n要下载其他开发人员已推送到中央仓库服务器的更改，并将其合并到你的代码中，你可以使用\
  \ JDeveloper 菜单中的 `团队 ➤ Git ➤ 拉取`。“从 Git 拉取”向导会帮助你下载更改。如果你遇到 JDeveloper 无法自动解决的合并冲突，它们会显示在“待处理更改”窗口中，你可以在每个冲突上右键单击并选择\
  \ `解决冲突` 来解决它。\n\n### Git 文件生命周期\n\n文件在 Git 中可以有几种不同的状态，如图 7-8 所示。\n\n![A437725_1_En_7_Fig8_HTML.jpg](img/A437725_1_En_7_Fig8_HTML.jpg)\n\
  \n图 7-8. Git 文件状态生命周期\n\n当你将中央仓库克隆到本地开发工作站时，所有文件都将被提交到本地仓库，状态为 `未更改`。\n\n当你添加一个新文件时，它处于\
  \ `未版本控制` 状态。它也会出现在“待处理更改”窗口的 `候选` 选项卡上，如图 7-9 所示。\n\n![A437725_1_En_7_Fig9_HTML.jpg](img/A437725_1_En_7_Fig9_HTML.jpg)\n\
  \n图 7-9. 待处理更改，候选\n\n当你通过在“待处理更改”选项卡上选择文件并单击绿色加号图标，或者右键单击文件并选择 `版本管理 ➤ 添加` 来 `添加`\
  \ 文件时，文件状态变为 `已暂存以备添加`。它也会从 `候选` 选项卡消失并出现在 `传出` 选项卡上，如图 7-10 所示。\n\n![A437725_1_En_7_Fig10_HTML.jpg](img/A437725_1_En_7_Fig10_HTML.jpg)\n\
  \n图 7-10. 待处理更改，传出\n\n你编辑的文件状态会变为 `已修改`，也会出现在此选项卡上（例如，上图中的 `ApplicationModuleImpl.java`）。在“待处理更改”窗口中，你可以右键单击并选择\
  \ `全部提交`。你也可以在“应用程序”窗口中右键单击并选择 `版本管理 ➤ 全部提交`。\n\n**提示**\n\n你在 JDeveloper 中进行的某些更改会影响多个文件，因此最安全的方法是始终使用\
  \ `全部提交` 来提交更改。\n\n当你选择任一命令时，将出现“全部提交”对话框，你可以在其中提供提交注释。\n\n请确保勾选 `提交未暂存的文件` 复选框以提交所有文件。如前所述，Git\
  \ 有一些高级的“暂存”功能，但通常情况下，无论文件的暂存状态如何，你都需要提交所有文件。\n\n\n\n## 使用功能分支\n\n如果你之前使用过其他版本控制系统，你可能会非常不愿意创建新的代码分支。实际上，历史上将分支合并回去确实异常困难。\n\
  \n在 Git 中，通常会使用更多的分支。通常，你会为每个新功能创建一个单独的分支，有些组织甚至为每个错误修复使用独立的分支。使用功能分支有三个主要好处：\n\n\
  *   每个开发者可以按需频繁地提交和推送代码\n*   每个开发者可以随时将主线（mainline）合并到自己的分支中，这样合并冲突就不会累积变大\n*  \
  \ 在构建发布版本时，发布经理可以决定哪些功能分支要纳入发布分支\n\n### 启动功能分支\n\n要启动一个新分支，选择 Team ➤ Git ➤ Create\
  \ Branch 以打开 Create Branch 对话框，如图 7-11 所示。\n\n![A437725_1_En_7_Fig11_HTML.jpg](img/A437725_1_En_7_Fig11_HTML.jpg)\n\
  *图 7-11. 创建分支*\n\n为你分支起一个简短但有意义的名称。使用来自你的任务/问题跟踪器的简短名称通常是个好选择。确保勾选了 Checkout Created\
  \ Branch 复选框，以便立即开始在你的功能分支上工作。现在，在 Applications 窗口中，每个项目后的方括号里显示的就是你的分支名称。\n\n###\
  \ 在功能分支上工作\n\n在功能分支上工作与其他开发工作并无不同。你可以自由地向本地仓库提交代码，并且应该至少每天向中央仓库推送一次以作备份。\n\n在工作过程中，如果你知道正在使用的代码有重大更新，你可能偶尔需要从中央仓库拉取（pull）最新代码。\n\
  \n### 合并功能分支\n\n一旦你的功能开发完成并在本地提交，你可以通过 Team ➤ Git ➤ Checkout 切换到主分支（master）。在 Checkout\
  \ Revision 对话框中，选择 `master` 分支（位于 `local` 节点下）。你会看到 Applications 窗口中项目名后的方括号内更新为\
  \ `[master]`。\n\n然后执行 `Git pull` 来获取主分支的最新更改，接着执行 `Git merge`。在 Merge 对话框中，选择你的功能分支（在\
  \ `Local` 节点下）并点击 OK。通常，合并会自动完成而不会出错。如果有任何合并冲突，它们会显示在 Pending Changes 窗口中，并用感叹号标记。右键单击并选择\
  \ Resolve Conflict 以打开冲突解决窗口，在那里你可以选择哪个更改优先保留，或者手动创建新的合并代码。\n\n合并后，你需要将更改推送到中央仓库。Push\
  \ to Git 对话框允许你选择要推送的分支。确保推送新合并的主分支。为了便于其他开发者将来可能接手工作，也推送功能分支是一个好的实践。\n\n### 质量保证\n\
  \n你的 ADF 工作流程的一部分必须是确保代码编写良好、文档完善且正确。所有常用的行业工具都适用于 ADF 应用程序，但 JDeveloper 提供了一些额外的功能。\n\
  \n### 审核代码\n\n在 Build 菜单中，你可以找到一个名为 Audit… 的条目。选择此项后，系统会要求你选择一个配置文件，然后就可以运行自动化的代码审核。注意\
  \ Edit 按钮——它会调出如图 7-12 所示的 Audit Profile 对话框。\n\n![A437725_1_En_7_Fig12_HTML.jpg](img/A437725_1_En_7_Fig12_HTML.jpg)\n\
  *图 7-12. 编辑审核配置文件*\n\n在此对话框中，你决定哪些规则在哪个配置文件中处于激活状态。\n\n当你运行审核时，你会在可展开的树形结构中得到大量结果，如图\
  \ 7-13 所示。\n\n![A437725_1_En_7_Fig13_HTML.jpg](img/A437725_1_En_7_Fig13_HTML.jpg)\n\
  *图 7-13. 审核结果*\n\n在结果树上方的工具栏中，你可以更改显示方式并关闭低优先级的问题。在树中的一个折叠节点里，Severity 列的值是该节点或其子节点中找到的最高严重级别。\n\
  \n如果你发现某个特定的警告对你没有帮助，你可以编辑配置文件以停止运行该测试。你也可以通过右键单击一个实例来隐藏所有同类型的问题。\n\n提示：Oracle ADF\
  \ 企业方法学组（ADF EMG）的志愿者们专门针对 ADF 开发了额外的审核规则。参见 [`https://adfaudit.atlassian.net/wiki/spaces/ADFAUDIT`](https://adfaudit.atlassian.net/wiki/spaces/ADFAUDIT)\n\
  \n### 文档生成\n\n如果你选择 Build ➤ Javadoc …，JDeveloper 可以为你自动生成 Javadoc 文档。当然，文档的实用性取决于你在代码中编写的\
  \ Javadoc 注释的数量。\n\n你还可以为可视化任务流生成文档。当 Diagram 选项卡处于活动状态时，JDeveloper 会显示一个 Diagram\
  \ 菜单，其中的 Publish Diagram 菜单项可以将你的图表保存为 PNG 文件，供你在文档中使用。\n\n要为业务组件生成文档，你可以通过 File\
  \ ➤ New ➤ From Gallery ➤ General ➤ Diagrams 创建一个业务组件图。这会给你一个空白的图表，你可以将 ADF 业务组件拖放到上面。\n\
  \n## 构建流程\n\n你已经了解了开发者如何使用上下文菜单将应用程序部署到 ADF 库，以及如何将主应用程序部署为可部署的 EAR 文件。但在现代专业的开发环境中，这个过程应该被自动化并通过脚本运行。幸运的是，JDeveloper\
  \ 可以帮助你做到这一点。\n\n本节描述如何使用 Apache Ant 构建，这是一个非常灵活、适用于任何项目结构的构建工具。要定义一个 Ant 构建，你需要创建一个构建文件（通常称为\
  \ `build.xml`），其中包含如 `compile` 或 `deploy` 等多个目标（targets）。\n\n注意：Apache Maven 是一个更现代的构建工具，同时也处理依赖管理。从\
  \ 12c 版本开始，JDeveloper 也支持 Maven。由于 Maven 假设的标准目录结构与默认的 ADF 项目不匹配，因此使用 Maven 构建 ADF\
  \ 项目需要一些 Maven 技能。如果你具备这些技能，Maven 也是一个很好的构建工具选择。\n\n由于构建脚本包含了目录名称，包括 JDeveloper\
  \ 安装的完整路径，因此所有开发者的工作站都应将 JDeveloper 和 `$ADF_ROOT` 目录设置在相同的位置。\n\n\n### 构建单个项目\n\n\
  要使用 Ant 构建单个项目，您可以选择 File ➤ New ➤ From Gallery ➤ General ➤ Ant ➤ Buildfile from\
  \ Project。此时将出现“从项目创建构建文件”对话框，如图 7-14 所示。\n\n![A437725_1_En_7_Fig14_HTML.jpg](img/A437725_1_En_7_Fig14_HTML.jpg)\n\
  \n图 7-14. 从项目创建构建文件\n\n请确保勾选“包含打包任务（使用 `ojdeploy`）”复选框。此选项意味着 JDeveloper 将包含用于将所有内容实际打包到\
  \ ADF 库中的构建任务。JDeveloper 包含在您的构建文件中的任务取决于与 JDeveloper 一起安装的 `ojdeploy` 实用程序。目前无法仅在构建服务器上安装\
  \ `ojdeploy` 实用程序，因此您必须在构建服务器上安装 JDeveloper 才能使用 `ojdeploy`。\n\n为项目自动生成的构建文件将构建所有部署配置文件和所有相关项目。为了仅构建所需内容，您应该删除任何多余的部署配置文件，例如\
  \ JDeveloper 创建的默认配置文件。\n\n在所有 ADF 工作区中，JDeveloper 默认注册了一个从视图/控制器项目到模型项目的依赖项。Ant\
  \ 构建会遵循此依赖关系，并在您构建视图/控制器时自动构建模型项目。这意味着您只需为每个子系统工作区中的视图/控制器项目创建一个 Ant 构建文件。\n\n当您为项目创建构建文件时，JDeveloper\
  \ 会创建一个包含各种设置和目录名的 `build.properties` 文件，以及 `build.xml` 文件本身。这些文件会显示在“应用程序”窗口的“资源”节点下。\n\
  \n`build.xml` 看起来与清单 7-1 中的类似。\n\n```\n...\n\n...\n\n...\n\n清单 7-1. 自动生成的 build.xml\
  \ 文件\n```\n\n您可以看到 `all` 目标依赖于 `deploy`、`compile` 和 `copy`。这意味着如果您选择构建 `all` 目标，所有依赖的构建目标也将被构建。这些任务大多仅使用标准的\
  \ Ant 功能，文档位于 [`http://ant.apache.org/manual`](http://ant.apache.org/manual)。特定于\
  \ ADF 的任务是 `ojdeploy`，位于 `deploy` 目标中。此任务指向构建所需的 `ojdeploy` 类并设置必要的参数。此目标的效果与从 JDeveloper\
  \ 内部手动构建部署配置文件相同。\n\n### 构建主应用程序\n\n在为主应用程序创建 `build.xml` 文件之前，您需要确保已为视图/控制器项目创建了\
  \ WAR 部署配置文件，并为应用程序创建了 EAR 部署配置文件。\n\nWAR 部署配置文件的创建位置在项目属性的 Deployment 节点下，创建方式与子系统\
  \ ADF 库部署配置文件相同。\n\nEAR 部署配置文件是应用程序属性的一部分。选择 Application ➤ Application Properties\
  \ ➤ Deployment 以创建 EAR 文件部署配置文件。在 Application Assembly 节点上包含主视图项目。\n\n拥有这两个部署配置文件后，为应用程序创建一个\
  \ Ant 构建。通过 File ➤ New ➤ From Gallery ➤ General ➤ Ant ➤ Buildfile from Application\
  \ 完成。应用程序的构建文件和构建属性文件将显示在“应用程序”窗口的“应用程序资源”部分，而不是在项目下。您可以通过右键单击构建文件并选择 Run Ant Target\
  \ ➤ deploy 来构建完整的应用程序。\n\n### 构建基础框架和子系统\n\n要构建所有子系统，您可以向主构建文件添加一个新目标，该目标使用 `<ant>`\
  \ 任务调用子目录中的 Ant 脚本。如果您的构建文件具有默认的 `build.xml` 名称，您只需将 Ant 指向所有基础框架和子系统目录即可。您的新目标可能如清单\
  \ 7-2 所示。\n\n```\n...\n\n清单 7-2. 调用基础框架和子系统构建目标的 Ant 目标\n```\n\n根据您的目录布局，您可能需要调整对其他构建文件的引用。您可以通过在\
  \ JDeveloper 中右键单击 Ant 脚本并选择 Debug Ant Target，然后选择您的目标来调试您的 Ant 脚本。这将为您提供更详细的输出，可用于查找任何错误。\n\
  \n`inheritall=false` 是指示 Ant 不要将主构建文件参数传递给子系统构建，允许子系统使用其各自的 `build.properties` 文件。\n\
  \n### 复制 ADF 库\n\n所有基础框架和子系统的 ADF 库默认构建在其各自的部署目录中。您需要通过编写另一个使用 ant `copy` 任务的目标，将它们复制到您的公共\
  \ ADF 库位置。此目标可能如清单 7-3 所示。\n\n```\n...\n\n清单 7-3. 将所有 ADF 库复制到公共位置的 Ant 目标\n```\n\
  \n注意\n\n前面清单中的 `file=` 参数应位于一行：它仅因书籍格式限制而换行。查询 ID=\"Q3\" 文本=\"请注意书籍格式限制的引用。\"。\n\
  \n### 组合构建\n\n最后，您可以修改 `deploy` 目标，使其依赖于这两个新任务，如下所示：`<target name=\"deploy\" depends=\"\
  buildsub,copysub\" ... >`。这可确保它们在部署之前总是被调用，先是 `buildsub`，然后是 `copysub`。\n\n通过这种方法，您可以使用一个\
  \ Ant 构建指令构建整个应用程序，包括所有 ADF 库和主应用程序 EAR。该指令可以手动运行，也可以集成到您可能使用的任何持续构建工具中。\n\n## 使用开发者云服务\n\
  \n如果您正在使用任何 Oracle 云服务，Oracle 开发者云服务（DCS）是免费包含在内的。这项基于云的服务提供了一套全面的集成开发支持功能，包括：\n\
  \n*   Git 仓库\n*   代码审查工作流\n*   任务/问题跟踪器\n*   Wiki\n*   构建服务器\n*   部署到其他 Oracle 云服务\n\
  \n其他供应商如 Atlassian 或 GitHub 提供类似的服务，但由于如果您拥有其他 Oracle 云服务，该 Oracle 服务是免费的，因此您尝试一下可能是有意义的。\n\
  \n### 创建用户\n\n第一步是将您的开发者创建为 Oracle 开发者云服务的用户。从 [`http://cloud.oracle.com`](http://cloud.oracle.com)\
  \ 上的登录链接开始，您需要选择您的云服务运行在哪个数据中心，以及您的身份域，并输入您的用户名和密码。所有这些信息都可以在您注册 Oracle 云时收到的欢迎邮件中找到。\n\
  \n从 Oracle 云仪表板，您可以单击右上角的“用户”按钮，将您的开发者定义为 Oracle 云服务的用户。在如图 7-15 所示的“添加用户”对话框中，请确保为您的开发者分配正确的角色。要使用开发者云服务，您的开发者需要“开发者服务用户角色”，而您的首席开发者和架构师可能需要“开发者服务管理员”。\n\
  \n![A437725_1_En_7_Fig15_HTML.jpg](img/A437725_1_En_7_Fig15_HTML.jpg)\n\n图 7-15.\
  \ 为开发者云服务用户分配角色\n\n在撰写本文时，这不是一个非常直观的过程。要分配开发者服务用户角色，首先选择开发者服务（名称类似 `developer69750`），然后勾选“其他角色”复选框，最后单击\
  \ ➤ 链接将该角色分配给用户。要分配开发者服务管理员角色，您需要勾选相应的复选框。希望在您阅读本书时，此过程已经变得更加用户友好。\n\n新创建的用户现在会收到一封包含账户信息和临时密码的电子邮件。\n\
  \n\n### 创建项目\n\n开发者云服务（DCS）可以包含许多独立的项目。这些是真正意义上的项目，而非功能受限的 JDeveloper 项目。您可以通过 DCS\
  \ 网页界面创建项目，但在处理模块化或企业级 ADF 架构中的多个 JDeveloper 工作区时，直接从 JDeveloper 创建项目会更加便捷。这是一项由首席开发人员或架构师在初始工作区创建完成后执行一次的任务。\n\
  \n## 连接到开发者云服务\n\n首先，您需要从 JDeveloper 创建到您的云服务实例的连接。这可以通过 JDeveloper 主菜单中的 `Team`\
  \ ➤ `Team Server` ➤ `Add Team Server` 完成。在 `New Team Server` 对话框中，为您的服务提供一个名称和 URL。您可以从欢迎邮件或网页浏览器中复制该\
  \ URL——其形式类似于 `https://developer.us2.oraclecloud.com/developer12345-a667788`。\n\n\
  然后选择 `Team` ➤ `Team Server` ➤ （您的服务名称） ➤ `Login`。\n\n**注意**\n要以新创建的 Oracle Cloud\
  \ 用户身份登录，您必须先通过网页浏览器登录一次以设置密码和其他身份验证信息。\n\n### 创建项目\n\n登录后，选择 `Team` ➤ `Team Server`\
  \ ➤ （您的服务名称） ➤ `New project`。此时会出现 `New Project on Oracle Developer Cloud Service`\
  \ 对话框。在第一步中，您需要提供项目名称以及其他一些信息。`Private/Shared` 设置用于控制项目是仅对明确授予访问权限的用户可访问，还是对您身份域中的所有用户可访问。\n\
  \n在向导的第二步（如图 7-16 所示），您需要选择本地 Git 仓库的放置目录，并选择所有希望成为此 Git 仓库和开发者云服务项目一部分的应用程序工作区。\n\
  \n![A437725_1_En_7_Fig16_HTML.jpg](img/A437725_1_En_7_Fig16_HTML.jpg)\n**图 7-16.**\
  \ 将应用程序工作区添加到开发者云服务\n\n在最后一步，您将看到一个确认信息，说明您的应用程序工作区将被移动到新的本地仓库位置。然后，该过程将运行一段时间，移动工作区并在开发者云服务上创建一个新项目。\n\
  \n过程完成后，您需要从新位置打开其中一个应用程序工作区。如果您有任何从原始位置打开的工作区，请关闭它们。`Pending Changes` 窗口将在 `Candidates`\
  \ 选项卡上显示您工作区中的文件。由于本地和中央仓库都是 Git，前面描述的相同命令适用：首先 `Add All`，然后 `Commit All`。\n\n**注意**\n\
  请注意，在 `Commit All` 对话框底部，您的开发者云服务现在会自动列在 `Task Repository` 下。我们将在本章后面部分再次讨论这一点。\n\
  \n当所有内容都提交到本地仓库后，执行 `Push` 操作推送到中央仓库。当您通过网页浏览器查看您的开发者云服务实例时，现在可以看到您的新项目。打开它，您将看到如图\
  \ 7-17 所示的项目视图。\n\n![A437725_1_En_7_Fig17_HTML.jpg](img/A437725_1_En_7_Fig17_HTML.jpg)\n\
  **图 7-17.** 开发者云服务中的一个项目\n\n如果您将项目设置为 `Private`，则必须在 `TEAM` 选项卡（最右侧）上将所有相关开发人员添加到您的项目中。如果您将项目设置为\
  \ `Shared`，则所有具有开发者服务用户角色的 Oracle Cloud 用户都可以在其上工作。\n\n### 任务管理\n\n开发者云服务还具有任务/问题跟踪功能。您可以在\
  \ JDeveloper 的 `Team` 窗口（其中称为 Tasks）或通过网页界面（其中称为 Issues）创建它们。JDeveloper 会自动将 JDeveloper\
  \ 中的任务与服务器上的任务保持同步。\n\n任务具有所有常见属性，包括优先级、产品、组件、分配、截止日期、估算、时间跟踪等。\n\n一个有趣的功能是，您可以为任务添加私有详细信息，包括注释和您个人安排该任务的日期。\n\
  \n如果您使用开发者云服务，应该利用这个内置的任务管理功能，因为每次向 Git 提交代码时，您都可以选择一个任务。这使您可以完全了解哪些代码更改与哪个任务相关联。\n\
  \n### 处理代码\n\n开发者云服务使用 Git，因此工作流程类似于本章前面描述的常规 Git 工作流程：创建功能分支并检出，在分支中进行代码更改，并定期提交到本地仓库。\n\
  \n当 JDeveloper 连接到开发者云服务实例时，`Commit` 对话框允许您注明提交所属的任务，如图 7-18 所示。\n\n![A437725_1_En_7_Fig18_HTML.jpg](img/A437725_1_En_7_Fig18_HTML.jpg)\n\
  **图 7-18.** 连接到开发者云服务时的提交对话框\n\n请注意，您可以选择一个任务与提交关联。您还可以在提交时选择关闭任务和/或将任务信息添加到提交注释中。您可以决定是在本地提交时（`After\
  \ Commit`）执行此操作，还是等到将更改推送到中央仓库时（`After Push`）再执行。\n\n### 代码审查\n\n当您准备好将更改提交到中央仓库时，请推送您的功能分支。使用开发者云服务时，请不要进行本地合并。\n\
  \n推送功能分支后，转到 DCS 网页的 `Merge Requests` 部分，然后单击 `New Merge Request`。选择您希望将功能分支与 master\
  \ 合并，如图 7-19 所示。\n\n![A437725_1_En_7_Fig19_HTML.jpg](img/A437725_1_En_7_Fig19_HTML.jpg)\n\
  **图 7-19.** 创建新的合并请求\n\n在此向导的第二步中，选择将此合并请求链接到的问题，并选择代码审查人。\n\n代码审查人现在将在 `Assigned\
  \ to Me` 下看到此代码请求。当审查人打开它时，他可以查看所有更改的文件和提交，并可以对审查整体或特定代码行进行评论，如图 7-20 所示。\n\n![A437725_1_En_7_Fig20_HTML.jpg](img/A437725_1_En_7_Fig20_HTML.jpg)\n\
  **图 7-20.** 对合并请求进行评论\n\n一旦合并请求获得批准，功能分支就可以实际合并到 master 分支。如果您愿意，还可以让开发者云服务在提交完成后删除功能分支。\n\
  \n**提示**\n由于工具支持不佳，代码审查在项目中经常被忽视。如果您使用开发者云服务，强烈建议利用此合并请求功能。\n\n"
- '# 其他开发者云服务功能


  开发者云服务还具有其他功能，包括：


  *   **Wiki**：用于记录各种文档的普通 Wiki 功能。

  *   **代码片段**：存储有用代码片段的能力，可以仅供自己私有使用，也可以与项目上的其他开发人员共享。

  *   **敏捷开发**：在根据敏捷方法进行开发时有用的一些看板和报告。

  *   **构建**：一个构建服务器，您可以在其中定义作业以自动构建和测试代码。提供使用 Ant、Maven、SQL、Shell 脚本和其他工具的各种触发点和构建步骤。

  *   **部署**：定义部署配置的能力，以便您可以自动将代码部署到 Oracle Java Cloud Service 等。


  '
