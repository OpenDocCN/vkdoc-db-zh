- '# 1. 拖放式构建


  `Oracle 应用开发框架 (ADF)` 提供极高生产力的秘诀在于无需编写代码即可构建大量功能。在构建 `ADF` 应用程序时，您应该力求编写尽可能少的代码，使用
  `JDeveloper` 通过拖放方式组合应用程序中每个页面的初始版本。


  本章将介绍如何使用 `ADF 业务组件` 向导和图形化任务流构建器，以及如何构建具有自动数据绑定的页面。


  ## ADF 应用程序的剖析


  `Oracle` 最初是一家数据库公司，这一传统在其大多数开发工具中熠熠生辉。像 `Oracle Forms`、`Oracle Application Express
  (APEX)` 和 `Oracle ADF` 这样的工具都基于一个前提：您已经拥有一个设计良好的关系型数据库，其中包含存储数据所需的所有表。


  在数据库之上，`ADF` 应用程序有两层：业务服务层和用户界面层。在这两层之间，您会发现绑定层，它定义了用户界面层如何连接到业务服务层。图 1-1 展示了 `ADF`
  的高层架构。


  ![A437725_1_En_1_Fig1_HTML.jpg](img/A437725_1_En_1_Fig1_HTML.jpg)


  图 1-1.

  `ADF` 高层架构


  ### 业务服务层


  业务服务层提供应用程序的主要功能。这包括各种计算、业务规则，以及非常重要的数据存储功能。业务服务层背后可能是其他技术——通常会有一个关系型数据库来存储数据，但您的
  `ADF` 应用程序也可以纯粹基于 Web 服务。在本书中，我们将讨论业务服务层由基于 `Oracle` 数据库表的 `ADF` 业务组件组成的 `ADF` 应用程序。这是构建
  `ADF` 应用程序最常见的方式，也是 `Oracle` 推荐的方法。


  ### 用户界面层


  用户界面层包含用户将用来与您的应用程序交互的网页。构建用户界面层涉及：


  *   决定您的应用程序将包含哪些页面

  *   定义页面间的导航流程

  *   设计包含字段、按钮和其他用户界面组件的实际页面


  ### 绑定层


  绑定层将用户界面层连接到业务服务层，是 `Oracle ADF` 的“秘诀”。当您使用 `JDeveloper` 中的拖放功能创建应用程序时，绑定层会自动为您创建。因此，即使从不接触绑定层，也可以构建功能完备的
  `ADF` 应用程序。但由于对绑定层的基本理解在现实的 `ADF` 应用程序开发中非常有用，我们将在本章末尾简要讨论它。


  ### 创建 ADF 工作区


  一个企业级 `ADF` 应用程序由许多工作区组成，每个工作区生成整体应用程序的一部分。当您使用 `ADF` 时，您在 `JDeveloper` 中通过 `文件
  ➤ 新建 ➤ 应用程序` 创建工作区，并选择 `ADF Fusion Web 应用程序` 类型。当您创建这样一个工作区时，`JDeveloper` 会自动在工作区内创建两个项目：


  *   用于业务组件的模型项目

  *   用于用户界面的视图/控制器项目


  `JDeveloper` 还会自动为每个项目添加正确的 `ADF` 库，并在它们之间定义依赖关系，因此视图/控制器项目可以访问在模型项目中创建的业务组件。


  `JDeveloper` 将工作区称为“应用程序”。这是一个不太恰当的措辞，因为除了最简单的 `ADF` 应用程序外，其他所有应用程序都会涉及多个工作区。


  ### 数据库业务组件


  如引言所述，`Oracle ADF` 应用程序通常构建在关系型数据库之上。`Oracle JDeveloper` 提供了多个向导，使您能够轻松构建业务服务层所需的所有类型的
  `ADF` 业务组件。主要有五种类型的业务组件：


  *   `实体对象`：这些对象直接对应表，因此您应用程序使用的每个表都将有一个实体对象。实体对象处理将属性值更改转换为发送到数据库的 `INSERT`、`UPDATE`
  和 `DELETE` 语句的技术细节。

  *   `关联`：这些对象定义实体对象之间的关系，对应于数据库中的外键关系。`JDeveloper` 向导通常会自动检测外键并创建匹配的关联，但您也可以手动创建它们。

  *   `视图对象`：这些对象定义特定用例所需的具体数据。一个视图对象可以使用来自多个实体对象（因此也来自多个表）的数据。例如，一个 `Employees` 视图对象除了显示来自
  `Employees` 实体对象的员工信息外，还可能显示来自 `Departments` 实体对象的部门名称。

  *   `视图链接`：这些对象表示视图对象之间的主从关系，并允许 `ADF` 协调从记录与主记录。例如，如果您显示一个部门及其员工列表，连接您的 `Departments`
  视图对象与 `Employees` 视图对象的视图链接可确保 `Employees` 视图对象仅显示该部门的记录。

  *   `应用程序模块`：这些对象收集应用程序或子系统中使用的所有视图对象的实例。应用程序模块控制数据库事务，允许您在应用程序模块中对许多不同的视图对象进行更改，然后在一个事务中提交或回滚所有更改。


  不同的 `ADF` 业务组件可以可视化为如图 1-2 所示。


  ![A437725_1_En_1_Fig2_HTML.jpg](img/A437725_1_En_1_Fig2_HTML.jpg)


  图 1-2.

  `ADF` 业务组件


  ### 保持条理


  您的 `ADF` 应用程序将包含大量所有五种类型的业务组件。为了更轻松地区分它们以便找到您需要的那一个，`JDeveloper` 提供了一个您应该设置的偏好设置。


  在 `JDeveloper` 偏好设置对话框的 `ADF Business Components` 节点下，更改每种类型的包前缀设置。此设置意味着每次 `JDeveloper`
  向导为您创建业务组件时，它都会自动将其放置在您的业务组件项目根包下适当命名的子包中。


  我建议使用如图 1-3 所示的设置。


  ![A437725_1_En_1_Fig3_HTML.jpg](img/A437725_1_En_1_Fig3_HTML.jpg)


  图 1-3.

  `ADF` 业务组件包的偏好设置



  ## 向导演示


  当你开始使用 Oracle ADF 时，应该使用 `JDeveloper` 中的 **从业务组件建表向导** 来构建你的业务组件。此向导会为业务组件初始化项目，包括创建从
  `JDeveloper` 到包含你应用表的数据库的连接。


  在开始创建 ADF 业务组件之前，请确保已选择你的业务服务层（模型）项目。


  **提示**


  在项目早期就确定一个数据库连接名称，并让所有团队成员使用相同的名称。当你从多个子系统组合主应用程序时，如果每个人都使用相同的数据源名称，事情会容易得多。


  该向导会引导你完成最多六个步骤，并可选择性地显示摘要。


  1.  创建实体对象。你可以查询数据库连接，并选择要为其创建实体对象的表。向导会自动为所选表之间数据库中的所有外键创建关联。

  2.  创建基于实体的视图对象。会为你选择的每个实体对象创建一个默认视图对象。它将包含来自该实体对象的所有属性。

  3.  创建基于查询的视图对象。此步骤允许你直接基于 SQL 查询（而非实体对象）创建额外的视图对象。这些对象将不可更新。

  4.  创建一个应用程序模块，并以所有可能的组合方式添加所有视图对象的实例。

  5.  创建任何 REST Web 服务。你需要为你的业务组件定义 REST API 的初始版本，然后选择你想要作为 REST Web 服务公开的视图对象。

  6.  定义你希望包含在每个 REST Web 服务中的属性。


  在第一步之后的任何时间，你都可以点击 **完成** 来结束向导。


  运行该向导并从标准的 Oracle HR 示例模式中选择 `EMPLOYEES` 和 `DEPARTMENTS` 表，将创建如图 1-4 所示的业务组件。


  ![A437725_1_En_1_Fig4_HTML.jpg](img/A437725_1_En_1_Fig4_HTML.jpg)


  **图 1-4.**

  针对 `EMPLOYEES` 和 `DEPARTMENTS` 的 ADF 业务组件


  ### 测试业务组件


  由于一个 ADF 应用程序同时包含业务服务层和用户界面层，仅通过运行应用程序并与用户界面交互可能很难调试问题。你无法判断是应该在业务服务层还是用户界面层查找问题。


  为了应对这一挑战，`JDeveloper` 提供了 **Oracle ADF 模型测试器**。可以通过在 `JDeveloper` 中右键单击一个应用程序模块并选择
  **运行** 来启动这个小程序。当你这样做时，Oracle ADF 模型测试器应用程序会启动，加载你点击的应用程序模块，并展示该应用程序模块内的所有视图对象实例。你可以点击每个视图对象，查看应用了所有业务组件逻辑后的数据库中的实际数据。ADF
  模型测试器应用程序外观如图 1-5 所示。


  ![A437725_1_En_1_Fig5_HTML.jpg](img/A437725_1_En_1_Fig5_HTML.jpg)


  **图 1-5.**

  ADF 模型测试器


  你应该始终使用这个小程序对你的 ADF 业务组件进行简单测试，以验证你的查询、验证和业务逻辑是否按预期工作。


  ### 实体对象


  实体对象直接对应于数据库表，负责处理对象/关系映射和数据验证逻辑。每个数据库表应恰好对应一个实体对象，这使你能够在一个地方实现业务规则和验证，并确保它始终被应用。


  默认情况下，创建实体对象的 `JDeveloper` 向导会为对应表中的每一列创建一个属性。将每一列都表示为属性并不会带来性能损失，因为 ADF 会自动进行优化，只查询在任何给定情况下相关的属性/列。


  ### 构建实体对象


  由于实体对象直接对应于表，因此在创建实体对象时需要做的决定很少。你可以使用“从业务组件建表向导”来创建初始的实体对象——只需不选择创建任何视图对象或应用程序模块即可。


  创建实体对象后，你应该打开每一个，并为每个属性定义将显示给用户的默认标签。这可以在 **属性** 选项卡下的 **UI 提示** 子选项卡中完成，如图 1-6
  所示。


  ![A437725_1_En_1_Fig6_HTML.jpg](img/A437725_1_En_1_Fig6_HTML.jpg)


  **图 1-6.**

  为实体对象属性设置 UI 提示


  **标签** 属性以及 **UI 提示** 子选项卡上的其他元素将成为显示该属性的用户界面组件的默认值。如果你不在这里指定任何内容，则属性名（源自底层数据库列）将成为默认标签。在实体对象级别提供的值可以在每个基于该实体对象的视图对象中被覆盖。


  你可能有一个为数据库中新记录创建主键值的数据库触发器。为了告诉 ADF 这一点，你需要将主键属性的类型更改为特殊的 `DBSequence` 类型。打开实体对象，然后在
  **属性** 选项卡上打开主键属性。当你在 **详细信息** 选项卡上更改 **类型** 字段时，其他几个设置也会随之更改，包括 **插入时刷新** 设置。这些更改共同意味着，你的
  ADF 应用程序接受在创建新记录时不输入主键值，并且 ADF 将在执行 `INSERT` 语句时要求数据库返回新的主键值。


  ### 构建关联


  如果你在一次通过“从业务组件建表向导”中构建了所有的实体对象，那么该向导应该会自动为数据库中的所有外键关系创建关联。如果你不是在同一时间创建所有实体对象，`JDeveloper`
  可能不会创建关联。在这种情况下，你可以手动在 `JDeveloper` 中创建关联。如果你的数据库由于某种原因不包含外键，这也是必要的。


  为了从 `JDeveloper` 向导中获得最大收益，你应该确保 `JDeveloper` 了解你数据模型中的关系。


  ### 视图对象


  实体对象面向数据库，而视图对象则面向用户。每个视图对象代表为满足特定需求而收集的特定数据集。你的用户界面定义了你所需的视图对象，包括必须包含哪些属性。



  '
- '# 图形导航流程设计


  当您为应用程序构建好所需的业务服务后，接下来需要创建用户界面层。构建此层分为三个步骤：


  1.  将您的应用程序划分为独立的导航流。

  2.  设计每个导航流。

  3.  在每个导航流内构建页面。


  本节描述如何划分您的应用程序并设计导航流；构建实际页面的内容将在本章后续部分介绍。


  ### 构建视图对象


  由于每个视图对象都是为特定目的而构建的，您不能像处理实体对象那样简单地运行向导来构建一整套对象。相反，您需要使用 `JDeveloper` 中的视图对象向导逐个构建视图对象。


  运行向导时，首先选择一个将作为视图对象基础实体对象的实体对象。默认情况下，该实体对象将被标记为可更新。


  如果您需要来自其他实体对象的额外数据，可以在添加第一个之后继续添加。默认情况下，这些实体对象在 `JDeveloper` 中将被标记为 `Reference`
  对象。在图 1-7 中，首先选择了 `Employees` 实体对象并标记为可更新。随后添加了 `Departments` 实体对象以获取部门名称。


  ![A437725_1_En_1_Fig7_HTML.jpg](img/A437725_1_En_1_Fig7_HTML.jpg)


  图 1-7。


  构建视图对象


  从图中可以看出，`JDeveloper` 已识别出两个实体对象之间的连接，并引用了相应的关联。如果 `Employees` 和 `Departments` 实体对象之间没有关联，`JDeveloper`
  将无法连接它们。


  记录的排序也是视图对象定义的一部分（步骤 5，查询）。


  视图对象的属性在 `Attributes` 选项卡上也有一个 `UI Hints` 子选项卡，就像实体对象一样。这允许您指定默认标签、工具提示和其他用户界面元素。如果您在此处未指定任何内容，则将使用来自实体对象的
  UI 提示。如果实体对象也未设置 UI 提示，则属性名称（源自底层数据库列）将成为标签。


  ### 定义值列表


  在您希望将某些属性的值限制为特定集合的应用程序位置，通常会定义一个代码列，该列带有一个指向允许值表的外键。在用户界面中，这通常通过下拉列表实现。这种关系在 Oracle
  ADF 的视图对象（即业务服务层）中建模。当您稍后在应用程序页面上使用该视图对象时，可以选择如何表示此允许值列表（各种列表组件、单选按钮组或其他选项）。


  要定义这样的值列表，需要做两件事：


  1.  创建包含允许值列表的视图对象

  2.  将属性与值列表视图对象关联起来


  要创建此关联，请打开视图对象，转到 `Attributes` 子选项卡，并选择要关联列表的属性。在属性下方的 `List of Values` 选项卡上，单击绿色加号以添加一个值列表。在
  `Create List of Values` 对话框中，单击 `List Data Source` 旁边的绿色加号，选择 `View Definition`
  单选按钮，然后选择包含您的列表值和描述的视图对象。图 1-8 显示了所有这些对话框。


  ![A437725_1_En_1_Fig8_HTML.jpg](img/A437725_1_En_1_Fig8_HTML.jpg)


  图 1-8。


  定义值列表


  不要忽略 `Create List of Values` 对话框的 `UI Hints` 选项卡。这是您定义向用户显示哪个值的地方。


  如果您有少量且预计不会更改的值，可以通过在 `Create View Object` 向导的第一步中将 `Data Source` 设置为 `Static List`
  来创建一个静态视图对象。


  ### 构建视图链接


  当您的用户界面包含主从关系时，例如订单与订单行项目，或部门与其员工，您需要一个视图链接。


  一旦您创建了主视图对象和从视图对象，就可以使用 `JDeveloper` 向导手动创建这些链接。通常，视图链接将由主视图对象背后的主要实体对象和从视图对象背后的主要实体对象之间的关联来支撑。在视图链接向导中，您需要标识主视图对象和从视图对象，以及用于建立连接的属性（一个或多个）。如果有可用的关联，您应该选择该关联的两端，如图
  1-9 所示。


  ![A437725_1_En_1_Fig9_HTML.jpg](img/A437725_1_En_1_Fig9_HTML.jpg)


  图 1-9。


  构建视图链接


  请注意，只有当您想在用户界面中显示主从关系时，才需要视图链接。如果您只是想用来自不同实体对象的数据丰富一个数据集，则可以创建一个基于两个实体对象的视图对象，而无需创建视图链接。


  ### 创建视图标准


  视图对象总是包含相同的属性和相同的排序顺序（除非您以编程方式更改它），但它不必总是返回相同的记录。为了限制视图对象返回的记录，您可以添加视图标准和绑定变量。如果您熟悉
  SQL，可以将视图标准视为一个命名的、声明式的 `WHERE` 子句。


  您可以在视图对象的 `View Criteria` 选项卡上添加视图标准。在 `Create View Criteria` 对话框中，为您的标准命名，并可以添加多个用
  `AND` 或 `OR` 连接的标准。每个标准将单个属性与您硬编码到视图标准中的字面值，或者您可以在此对话框中创建的绑定变量进行比较。图 1-10 显示了一个视图标准。


  ![A437725_1_En_1_Fig10_HTML.jpg](img/A437725_1_En_1_Fig10_HTML.jpg)


  图 1-10。


  定义视图标准


  创建视图标准后，可以在向应用程序模块添加视图对象实例时使用它。您也可以以编程方式将其应用于视图对象——我们将在第 5 章回到这一点。


  ### 构建应用程序模块


  最后一个 ADF 业务组件是应用程序模块。这些对象收集将在您的应用程序或子系统中使用的多个视图对象实例。应用程序模块控制数据库事务，允许用户通过多个不同的屏幕对许多不同的视图对象进行更改，然后将所有内容作为一个事务提交到数据库。


  每个视图对象实例都基于一个视图对象，但一个视图对象可以在应用程序模块中的多个视图对象实例中使用。例如，图 1-11 显示了一个包含 `EmployeeView`
  视图对象三个不同实例的应用程序模块。


  ![A437725_1_En_1_Fig11_HTML.jpg](img/A437725_1_En_1_Fig11_HTML.jpg)


  图 1-11。


  应用程序模块中的视图对象实例


  实例 `AllEmployees` 位于应用程序模块的根级别，将显示所有员工。


  实例 `EmployeesInDept` 从属于 `AllDepartments`，将仅显示该部门的员工。要创建此类从属视图对象实例，您需要通过视图链接添加视图对象。在图中，`EmployeesInDept`
  实例是通过选择右侧的 `AllDepartments`，然后通过 `DeptEmptLink` 选择左侧的 `EmployeesView` 来创建的。


  实例 `HighSalaryEmployees` 也是 `EmployeesView` 上的根级别实例，但在本例中，已对其应用了视图标准。您可以通过选择视图对象实例，然后单击右上角的
  `Edit` 按钮来应用视图标准。这将调出 `Edit View Instance` 对话框，您可以在其中设置绑定变量并应用视图标准。




  ### 应用程序分区


  所有企业级 ADF 应用程序都将包含许多独立的导航流，每个导航流都定义了用户如何在页面之间导航。由于 Oracle 是为其自身非常庞大的应用程序（如 Oracle
  Fusion Applications，一套完整的 ERP 套件）而开发 ADF 的，因此模块化是 ADF 开发的核心。


  因此，开发 ADF 应用程序用户界面的第一步是决定你需要哪些导航流。你的需求通常是一个很好的起点，每个用例或用户故事都是成为独立导航流的候选。


  ### 有界和无界任务流


  你在 ADF 中构建的导航流被称为任务流，有时也称为页面流。ADF 任务流是模块化的，你可以在一个任务流中包含另一个任务流。这允许你将整个应用程序构建和维护为多个独立的、可重用的任务流，并将它们组合成一个应用程序。我们将在下一章回到整个应用程序的架构。


  任务流包含实际展示给用户的页面或页面片段，以及定义用户被允许如何在页面或片段之间导航的控制流。它还可以包含流程逻辑（分支）并调用业务逻辑。


  ADF 中有两种类型的任务流：


  *   无界任务流

  *   有界任务流


  ### 无界任务流


  一个无界任务流由多个页面组成，用户可以从这些页面中的任何一个启动任务流。因此，任务流周围没有严格的边界。


  因为每个 ADF 视图/控制器项目总是有一个名为 `adfc-config` 的无界任务流，所以你通常不需要自己创建这些。


  无界任务流通常仅用于应用程序中的第一层导航。许多 ADF 应用程序在其无界任务流中只有一个页面，然后使用各种有界任务流来展示应用程序的功能。如何切换不同的有界上下文将在第
  4 章讨论。


  ### 有界任务流


  一个有界任务流通常由多个页面片段组成。它具有一个明确定义的入口点、一个或多个页面以及一个或多个出口点。你的大部分应用程序功能通常将以带有页面片段的有界任务流的形式实现。


  你使用页面片段构建有界任务流是为了能够重用它们。一个页面片段应仅包含执行其设计任务所需的用户界面元素。它不应包含任何通用信息，如标题栏、徽标或菜单。这样，该任务流就可以在你的整个应用程序甚至不同的应用程序中使用和重用。


  因为页面片段本身不可运行，所以你需要将其嵌入页面中才能运行。


  ### 创建任务流


  最常见的 ADF 架构由一个无界任务流和多个使用页面片段的有界任务流组成。由于每个 ADF Faces 项目都会自动获得一个无界任务流，因此你通常只需要创建使用页面片段的有界任务流。因为你的任务流是应用程序用户界面层的一部分，所以在开始创建任务流之前，请确保在工作区中选择了视图项目。


  你可以在“新建库”（New Gallery）的“Web 层” ➤ “JSF/Facelets”下找到任务流。在“创建任务流”对话框中，请确保勾选“创建为有界任务流”和“使用页面片段创建”两个复选框，如图
  1-12 所示。在真实的企业应用程序中，你应该使用模板。我们将在第 2 章讨论模板。


  ![A437725_1_En_1_Fig12_HTML.jpg](img/A437725_1_En_1_Fig12_HTML.jpg)


  图 1-12. 创建带有片段的有界任务流


  创建任务流后，你将看到一个空白图表，中间有一条说明文字。


  ### 添加视图组件


  从这里开始，你从组件面板（通常在右侧）拖入视图组件。你需要为应用程序中想要的每个页面或页面片段准备一个视图组件。


  请注意，你创建的第一个视图组件会自动获得一个绿色的“光晕”，表明它是这个有界任务流的入口点。如果你想让另一个活动作为入口点，可以右键单击你希望首先调用的活动的图标，然后选择“标记活动”
  ➤ “默认活动”。


  请注意，你在此处添加的视图活动最初只是占位符。实际的页面或页面片段直到你双击视图活动时才会创建。如果你仔细观察视图活动图标，可以看到初始图标的轮廓底部是虚线。一旦你创建了页面或页面片段，图标就会变为整个轮廓都是实线的图标。


  ### 添加返回活动


  每个有界任务流应该至少有一个任务流返回活动（灰色的角箭头）。这表示出口点，即控制权返回到任何调用此任务流的其他任务流的地方。如果你没有返回活动，你将无法从另一个任务流调用这个有界任务流，因为没有方法可以返回。请注意，返回活动有一个可以设置的
  `outcome` 属性。如果你有多个任务流返回活动，你可以向调用者指示流程内部发生了什么——例如，你可能有一个返回 `success`，另一个返回 `error`。


  ### 添加控制流


  当你有了视图活动和返回活动后，你需要添加控制流案例（箭头）来定义它们之间允许的导航。你可以（并且应该）为每个控制流案例指定一个简短的名称。当你构建页面并添加像按钮这样的命令组件时，从页面片段出发的各种流程将作为选项提供。图
  1-13 展示了一个任务流可能包含几个视图活动、一个返回活动和一些控制流的样子。


  ![A437725_1_En_1_Fig13_HTML.jpg](img/A437725_1_En_1_Fig13_HTML.jpg)


  图 1-13. 一个任务流


  如果你愿意，还可以添加路由器活动。这些活动允许流程根据表达式语言（EL）编写的表达式的求值结果，处理到不同的控制流案例。我们将在第 4 章回到这一点，在那里我们还将讨论如何从业务组件中放入代码元素。


  ### 拖放页面


  当你在任务流设计中为页面创建了占位符后，就可以创建相应的页面片段了。为此，在带有片段的有界任务流中双击一个视图活动，以打开“创建 ADF 页面片段”对话框。


  ### 页面布局


  在“创建 ADF 页面片段”对话框中，你有三个选项：


  *   创建空白页面

  *   引用 ADF 模板

  *   复制快速开始布局


  在学习 ADF 时，请使用“复制快速开始布局”选项。这允许你从可视化目录中选择一个示例，如图 1-14 所示。当你做出选择时，JDeveloper 会将相应的布局组件添加到你的页面片段中。


  ![A437725_1_En_1_Fig14_HTML.jpg](img/A437725_1_En_1_Fig14_HTML.jpg)


  图 1-14. ADF 快速开始布局


  在真实的企业 ADF 应用程序中，你希望将所有页面和页面片段都基于页面模板。我们将在下一章回到页面模板。


  请注意，你的页面片段不应包含装饰性元素，如徽标或页面标题栏。如果你的应用程序需要这些元素，它们应该被添加到作为页面片段任务流框架的母版页中。页面片段通常只采用一列拉伸布局，以利用所有可用的屏幕区域。




  ### 查看和配置您的页面


  当您创建页面后，它会在 JDeveloper 主窗口中打开。有几种方式可以查看您的应用程序：


  *   设计视图

  *   源代码视图

  *   结构窗口


  此外，JDeveloper 会显示一个“属性”窗口，其中包含当前所选项目的详细信息。


  **提示**：您可以根据自己的喜好重新排列 JDeveloper 中的窗口。要恢复为默认的窗口布局，请选择 `窗口 ➤ 将窗口重置为出厂设置`。


  ### 设计视图


  页面的初始视图是设计视图。在此视图中，JDeveloper 会尝试显示页面在运行时的大致样子。窗口顶部的工具栏（如图 1-15 所示）允许您更改视图。


  ![图 1-15：设计视图](img/A437725_1_En_1_Fig15_HTML.jpg)


  “设计”设置显示有关页面的技术细节，在构建页面时可能有用：例如，布局组件的边框以及字段及其值的技术细节。“真实”设置则显示页面在运行时的样子，使用正确数据类型（文本、数字、日期）的虚拟数据。“焦点”按钮只显示一个布局容器，当您有包含多个嵌套容器的复杂布局时，这可能很有用。不同的屏幕图标允许您以各种尺寸和方向（桌面、横向平板电脑、纵向平板电脑、横向智能手机、纵向智能手机）测试布局。您可以自定义每个尺寸具体应代表多少像素。最后，您可以在配置的各种浏览器中查看带有虚拟数据的页面或页面片段。


  ### 源代码视图


  要查看页面背后的实际源代码，您可以点击窗口底部的“源代码”选项卡切换到源代码视图。此视图显示所有组件和设置，并允许您自由进行任何更改。


  ADF 页面的所有组件都是层次结构的一部分，您可以使用左侧边距中的 + 和 – 图标折叠和展开节点。窗口顶部的工具栏允许您启用“区块着色”，其中每个节点获得自己的颜色，以使结构更清晰。如果您进行了手动更改，还可以要求
  JDeveloper 重新格式化您的代码。


  默认情况下，JDeveloper 会在右侧边距显示“迷你地图”，为您提供代码的视觉概览。您可以从地图的上下文菜单中关闭它，并再次从源代码的上下文菜单中显示它（`源代码
  ➤ 显示迷你地图`）。


  最右侧边距的顶部如果显示一个绿色方块，表示您的代码有效。如果存在错误，顶部的区块会变为红色，并且您会在边距中对应错误位置的地方看到红色条。类似地，橙色表示警告。


  如果您有错误或警告，左侧边距通常会显示一个快速修复图标，提供 JDeveloper 对如何修复代码的最佳猜测。


  如果您想查看行号，可以在左侧边距中右键单击，然后从上下文菜单中选择“切换行号”。


  要切换回设计视图，请点击窗口底部的“设计”选项卡。


  ### 结构窗口


  如图 1-16 所示的“结构窗口”展示了页面组件层次结构的另一种视图。


  ![图 1-16：结构窗口](img/A437725_1_En_1_Fig16_HTML.jpg)


  默认情况下，此窗口位于 JDeveloper 的左下角。您在源代码视图中的选择以及在结构窗口中的选择会由 JDeveloper 保持同步，因此您可以点击结构窗口中的元素以快速跳转到页面源代码中的相应位置。设计视图、源代码视图、结构窗口和属性窗口只是应用程序的不同表现形式，因此，如果您在源代码视图中进行更改，例如，它会立即反映在结构窗口中。


  ### 添加数据绑定组件


  在一个包含模型和视图/控制器项目的简单 ADF Fusion 工作区中，您会自动在“应用程序”窗口的“数据控件”窗格中找到从您的应用程序模块创建的数据控件，如图
  1-17 所示。


  ![图 1-17：数据控件窗格](img/A437725_1_En_1_Fig17_HTML.jpg)


  JDeveloper 会为每个应用程序模块自动创建一个数据控件。在数据控件内部，您可以看到相应应用程序模块中的所有视图对象实例。从“数据控件”面板，您可以拖放一个视图对象实例（方形的红色/橙色图标，例如
  `AllDepartments`）或一个单独的属性（矩形的 XYZ 图标，例如 `DepartmentName`）到页面片段上。


  当您将数据控件窗格中的一个项目拖放到页面或页面片段上时，JDeveloper 会自动提示您选择要添加的用户界面组件类型。列表取决于项目的类型，只显示与该项目相关的组件。


  ### 添加视图对象实例


  当您拖放一个视图对象实例时，您会得到一个很长的可能用户界面对象列表，但最常用的是 ADF 表单和 ADF 表格（`ADF 表格` 在 Table/List View
  的子菜单下可以找到）。


  如果您选择 ADF 表单，您将获得一个一次显示一条记录的页面。属性将垂直排列，每个属性有一个单独的字段。您可以勾选“行导航”复选框（如图 1-18 所示），要求
  JDeveloper 同时添加用于导航到第一条、上一条、下一条和最后一条记录的按钮。


  ![图 1-18：创建 ADF 表单](img/A437725_1_En_1_Fig18_HTML.jpg)


  如果您没有为每个属性提供标签，ADF 将使用视图对象中的 UI 提示。如果视图对象中没有设置 UI 提示，ADF 将退而使用实体对象上设置的任何 UI 提示。如果那里也没有指定标签，则标签将变成从数据库列派生的属性名称。


  从技术上讲，JDeveloper 创建一个 `<af:PanelFormLayout>` 组件，其中包含连接到您拖放的视图对象实例中各个属性的单独 `<af:InputText>`
  组件。如果您勾选了“行导航”复选框，您还会获得连接到每个视图对象自动提供的标准操作“第一条”、“上一条”、“下一条”和“最后一条”的按钮。


  如果您选择 ADF 表格，您将获得一个在表格中显示多条记录的页面，每条记录作为表格中的一行。您可以选择复选框来启用排序（通过点击列标题）和启用过滤（在每列顶部添加一个过滤条件框）。如果您不想使用默认值，还可以指定每个属性的标签。从技术上讲，JDeveloper
  创建一个绑定到整个视图对象实例的 `<af:Table>` 组件。


  ### 添加单个属性


  您也可以将单个属性拖放到页面或页面片段上。在这种情况下，您的用户界面组件选择是不同的——最常用的组件是带标签的 ADF 输入文本，它会如您所料地显示为带标签的输入字段。您可以显式指定一个标签，或者接受来自视图对象
  UI 提示、实体对象 UI 提示或数据库列名称的默认值。




  ### 添加操作


  如果在“数据控件”窗格中展开一个视图对象实例的“`操作`”选项卡，您将看到 ADF 为每个视图对象自动提供的许多标准操作。当将这些操作拖放到页面或页面片段上时，系统会显示一个对该操作有意义的界面组件列表。最常用的是“`ADF
  按钮`”和“`ADF 链接`”。


  在第 5 章，您将学习如何向视图对象和应用程序模块添加自己的逻辑。您添加并决定发布的方法也会出现在“`数据控件`”窗格中，并且可以以相同的方式轻松添加到您的应用程序中。


  ### 添加提交和回滚


  与视图对象一样，应用程序模块在“`数据控件`”面板的最底部（所有视图对象实例下方）也有一个“`操作`”选项卡。应用程序模块的两个标准操作是“`提交`”和“`回滚`”。为了执行对数据库的提交或回滚，您只需将其中一项操作拖放到您的页面或页面片段上。ADF
  会为您处理好一切，因此您无需编写任何代码即可构建功能齐全的数据库应用程序。


  ### 实现导航


  当您向任务流添加控制流案例时，就定义了页面之间可能的导航。要在用户界面中实际实现导航，您需要将一个操作项（例如按钮）拖放到您的页面上。选中操作项后，打开“`属性`”窗口，找到“`操作`”属性，并从选项列表中选择。您会看到此下拉列表包含了所有已定义的、从当前页面出发的控制流案例。


  当用户点击您连接到某个控制流案例的操作项时，您的 ADF 应用程序就会切换到对应的页面。


  **提示**

  ADF 会处理用户在页面间导航时的临时值存储。当用户最终选择“`提交`”或“`回滚`”操作时，所有更改都将被提交到数据库。


  ### 检查绑定


  当您运行使用这些拖放功能构建的应用程序时，来自业务组件的数据将自动显示在网页的字段中。页面上的更改会自动传播回业务组件，如果您执行提交操作，更改将一直传播到数据库。连接业务组件和用户界面元素的机制称为
  *绑定*。


  JDeveloper 会自动为您创建绑定，您可以通过点击页面底部的“`绑定`”选项卡来访问它们。这将生成一个可视化的绑定表示，如图 1-19 所示。


  ![A437725_1_En_1_Fig19_HTML.jpg](img/A437725_1_En_1_Fig19_HTML.jpg)

  *图 1-19. 绑定的可视化表示*


  左侧的“`绑定`”列显示了不同的绑定。最常用的有：

  - 用于单个属性的属性绑定（带有 XY 图标）。

  - 用于整个视图对象实例的树绑定（带有文件夹层次结构图标）。

  - 用于操作的动作绑定（带有齿轮图标）。


  当您点击一个绑定时，会出现一个箭头指向中间列的“`可执行对象`”。这通常是一个迭代器，代表指向右侧列所示数据控件中数据集合的指针。


  每个页面都有一个绑定，存储在页面定义文件中。要查看绑定的实际源代码，您需要点击绑定窗口顶部的“`页面定义文件`”链接，或在“`应用程序`”窗口中找到该绑定。


  在许多 ADF 应用程序中，您无需更改 JDeveloper 为您创建的绑定。然而，在高级 ADF 应用程序中，您可能需要手动创建绑定。您可以点击“`绑定`”窗口中的绿色加号来创建绑定和可执行对象。


  **注意**

  如果您在“`设计`”选项卡上从页面或页面片段中删除一个元素，JDeveloper 会尝试通过自动删除相应的绑定来帮助您。如果您从“`源`”选项卡中删除一个元素，JDeveloper
  会假定您是一位高级 ADF 开发人员，并保留绑定不变，以便您决定是保留它还是手动删除它。


  ### 最小可行产品


  一个企业级 ADF 应用程序通常由许多使用页面片段的有界任务流和一个带有菜单的主页面组成。当用户选择另一个菜单项时，相应的任务流会显示在主页面的动态区域中。由于这种构建应用程序的方式需要一些代码，我们将在第
  4 章回到这一点。


  但是，您可以在不编写任何代码的情况下构建一个功能齐全的应用程序。这使您可以快速向用户展示一个可运行的原型并收集初步反馈。


  ### 一个简单的主页面


  一个基本的主页面可以基于“`单列页眉（拉伸）`”快速启动布局来构建，如图 1-20 所示。


  ![A437725_1_En_1_Fig20_HTML.jpg](img/A437725_1_En_1_Fig20_HTML.jpg)

  *图 1-20. 单列页眉（拉伸）*


  在该页面内，在顶部的页眉区域放置一个“`输出文本`”组件，在窗口的主区域放置一个“`面板选项卡式`”组件。这些组件默认位于 JDeveloper 窗口的右侧，在“`组件`”窗口中可以找到。


  **提示**

  您可以使用“`组件`”窗口顶部的搜索框按名称搜索组件。


  在“`创建面板选项卡式`”对话框中，为您想要测试的应用程序所有部分创建选项卡。


  选择您的页眉文本，并使用“`属性`”窗口更改文本、字体样式和大小。


  然后将您的页面流拖放到应用程序的选项卡上。当提示选择用户界面组件时，选择“`区域`”。我们将在第 4 章回到另一个选项（“`动态区域`”）。您将正常看到主页面的元素，以及任务流第一页的灰度图像，如图
  1-21 所示。


  ![A437725_1_En_1_Fig21_HTML.jpg](img/A437725_1_En_1_Fig21_HTML.jpg)

  *图 1-21. 显示包含有界任务流的区域的主页面*


  现在您可以右键单击主页面并运行您的应用程序。


  在安装 JDeveloper 后第一次运行应用程序时，系统会提示您输入内置 WebLogic 服务器的密码，并且服务器需要一些时间来进行首次初始化和启动。


  您应该能在不同的选项卡上看到您的任务流，并能够在选项卡之间导航。


  ### 结论


  您现在已经了解了如何利用 ADF 和 JDeveloper 的强大功能，在不编写一行代码的情况下构建一个完整的、功能齐全的 ADF 应用程序。


  在下一章中，我们将讨论如何构建利用 ADF 企业应用程序开发功能的更大规模的应用程序，在后续章节中，您将学习如何添加实现业务逻辑的 Java 代码。


  ## 2. ADF 企业架构


  在上一章中，您看到了构建小型但功能齐全的 ADF 应用程序是多么容易。本章将讨论如何在企业环境中构建更大的应用程序。


  ### ADF 库


  ADF 企业级功能背后的秘密是“`ADF 库`”。一个“`ADF 库`”类似于一个普通的 Java 归档（`JAR`）文件，但它包含有关其内容的额外元数据。这些元数据使
  JDeveloper 能够显示内容，并使得在 JDeveloper 中复用“`ADF 库`”内的组件变得容易。



  ### 创建 ADF 库


  ADF 库是基于工作区内的某个项目创建的。当工作区中的项目之间存在依赖关系时，该库将自动包含其所依赖项目的所有对象。在典型的 ADF Fusion Web Application
  类型的工作区中，JDeveloper 会自动添加从视图/控制器项目到模型项目的依赖项。这意味着，当你从视图/控制器项目创建 ADF 库时，模型项目的内容也会自动包含在你的库中。


  要从项目创建 ADF 需要一个部署配置。你通过右键单击项目并选择 **Deploy ➤ New Deployment Profile** 来创建它。选择一个 ADF
  Library JAR 文件类型，并为你的配置文件起一个有意义的名称。按照约定，配置文件名格式为 `adflibXxx`（例如 `adflibHrDemoCommon`）。配置文件名将成为
  ADF 库文件的默认名称。


  **提示**


  由于你可能需要在 JDeveloper 之外处理 ADF 库文件（例如，在版本控制系统中或在应用服务器上），因此应用程序名称应作为库文件名的一部分，以便你能够区分这些文件。


  在如图 2-1 所示的 **Edit ADF Library JAR Deployment Profile Properties** 对话框中，有一项设置你总是需要更改：`Connections`。


  ![A437725_1_En_2_Fig1_HTML.jpg](img/A437725_1_En_2_Fig1_HTML.jpg)


  **图 2-1.** 编辑 ADF 库 JAR 部署配置文件属性对话框


  默认选项 `Connection Details` 意味着你的库将包含数据库连接详情。你不希望你的库包含指向本地开发数据库的连接信息。因此，你需要选择 `Connection
  Name Only`。这意味着你的库将只包含连接的名称，而非技术细节。然后，将由你的应用服务器管理员来定义具有此名称的数据源，并指向正确的数据库。


  ### 管理 ADF 库


  由于 ADF 库是开发过程的核心，因此妥善管理它们非常重要。每位开发者都可以随时发布新的 ADF 库，但在将库共享给整个团队之前，你需要一个评审流程。


  默认情况下，ADF 库是在项目内的 `deploy` 子目录中创建的。你可以将它们留在那里，然后在新的版本准备好进行更广泛的分发时告知你的构建/部署管理员。


  然后，构建/部署管理员将确保你的 ADF 库文件经过测试，并放置在所有人都能获取其 ADF 库的中央位置。这个经过批准的版本应该被置于版本控制之下。


  你的流程可以是自动化的，也可以是手动的，但你需要一个中间步骤，该步骤接收某个团队构建的 ADF 库，对其进行验证，然后发布供其他团队使用。


  ### 使用 ADF 库


  要使用一个 ADF 库，你需要定义一个指向已批准库存储位置的文件系统连接，并将它们添加到需要的项目中。


  该连接在 `Resources` 窗口中定义，该窗口默认位于 JDeveloper 窗口的右侧。如果看不到，可以从 `Window` 菜单打开。在此窗口中，单击窗口顶部的
  New 图标，然后选择 **IDE Connections ➤ File System**。为你的连接命名，并选择指向公共 ADF 库的路径。`Resources`
  窗口现在将显示该目录中所有可用的库。


  要在项目中使用 ADF 库，请在 `Applications` 窗口中选择该项目。然后右键单击 `Resources` 窗口中的库并选择 `Add to Project`。


  **提示**


  如果你想查看项目中包含了哪些 ADF 库，可以右键单击项目并选择 `Refresh ADF Library Dependencies …`。这将使 JDeveloper
  重新读取项目的所有 ADF 库并将它们打印到 `Messages` 窗口。


  ### ADF 架构模型


  借助 ADF 库的强大功能，你可以创建适合需求的 ADF 架构。存在多种可能性，但三种良好的架构如下：


  *   简单型

  *   模块型

  *   企业型


  ### 简单型 ADF 架构


  在简单型 ADF 架构中，你将所有内容保存在一个工作区中。你将拥有一个包含公共代码的基础项目、一个包含你的 ADF 业务组件的模型项目，以及一个包含你的任务流和主页面的视图/控制器项目。


  此架构适用于不超过 20 个任务流、由不超过三到四名开发者的团队实现的应用程序。如果应用程序变得更大，则很难找到需要处理的组件，并且由于 JDeveloper
  必须处理更多对象之间的相互依赖关系，其运行速度会变慢。如果团队变得太大，成员们往往会相互干扰，并且可能对 `DataBindings.cpx` 等中心应用程序文件产生争用。


  **提示**


  为了简化对大型应用程序工作区的视图，请查看 JDeveloper 的功能 `Working Sets` ，位于 `Application` 窗口顶部的 Working
  Set 图标（一个漏斗）下。此功能允许你限制在 JDeveloper 中看到的内容。



  ### 模块化 ADF 架构


  在构建单个大型 ADF 应用程序时，应采用模块化架构。这涉及多个工作空间和项目，每个项目由一至四人的小团队负责。


  将包含一个基础层、少量子系统和一个主应用程序，如图 2-2 所示。


  ![A437725_1_En_2_Fig2_HTML.jpg](img/A437725_1_En_2_Fig2_HTML.jpg)


  图 2-2. 模块化 ADF 架构


  ### 基础层


  基础层应保存在一个工作空间中，包含四个项目：


  *   通用模型

  *   通用 UI

  *   通用工具代码

  *   业务组件基类


  创建基础工作空间时，请选择 `ADF Fusion Web Application`。此向导允许您创建通用模型和通用 UI 项目。然后，使用 `File` ->
  `New` -> `Project` -> `ADF Model Project` 添加一个额外的项目用于工具和业务组件基类。选择 ADF 模型项目的原因是，JDeveloper
  中的此项目模板已包含您所需的技术。


  通用模型项目应包含可在整个应用程序中共享的所有业务组件。由于实体对象直接映射到数据库表，这些可以共享并放入通用模型项目。类似地，用于值列表的视图对象也可以共享并放入通用模型。


  通用 UI 项目包含属于用户界面层的所有共享元素。此项目中的元素可能包括模板、皮肤和声明式组件。


  通用工具代码项目包含您将在整个应用程序中使用的任何通用工具类。


  **提示**


  查找 Oracle 的 Fusion Order Demo 应用程序并下载。此演示应用程序包含几个有用的工具类。虽然不是 Oracle 官方支持的软件，但它可以作为您自己工具的良好起点。


  业务组件基类项目包含您自己的 ADF 业务组件基类，它们扩展了 Oracle 提供的类。本章后面的“创建您自己的基类”一节解释了为什么需要这些类以及如何构建它们。


  ### 子系统


  实现应用程序功能需求的任务流被放入少量子系统中。每个子系统应有自己的工作空间，包含一个模型项目和一个视图/控制器项目。一个典型的项目将有三到八个子系统，每个子系统分配给一个由一或两名开发人员组成的团队。


  模型项目应包含该子系统实现的用例所特有的视图对象。


  视图/控制器项目应包含实现子系统用例的有界任务流及其页面片段。


  ### 主应用程序


  主应用程序包含带有全局菜单的主页面。所有功能都通过子系统生成的 ADF 库包含在主应用程序中。安全性在主应用程序中定义。


  ### 企业级 ADF 架构


  如果您的组织已战略性的选择 ADF 作为其开发平台，那么您很可能会构建许多 ADF 应用程序。在这种情况下，建立一个企业级 ADF 架构是合理的。


  这涉及一个对所有应用程序通用的企业基础层和一个用于每个应用程序的应用程序基础层。将会有少量子系统以及一个或多个利用部分子系统功能的主应用程序。在企业级 ADF
  架构中，某些子系统可能是共享的，并在多个主应用程序中使用。该架构如图 2-3 所示。


  ![A437725_1_En_2_Fig3_HTML.jpg](img/A437725_1_En_2_Fig3_HTML.jpg)


  图 2-3. 企业级 ADF 架构


  ### 企业基础层


  企业基础层包含在整个企业内通用的代码。此层应保存在一个工作空间中，包含至少两个项目：


  *   企业业务组件基类

  *   企业通用工具代码


  与模块化架构类似，业务组件基类项目包含对 Oracle 的 ADF 业务组件基类的扩展。在企业层面，您可以添加希望组织中每个 ADF 业务组件都具有的功能。


  类似地，企业通用工具代码项目包含预计将在组织内所有 ADF 应用程序中使用的工具类。


  ### 应用程序基础层


  应用程序基础层包含特定于应用程序的代码：


  *   对企业业务组件基类的应用特定扩展

  *   应用特定的通用工具代码

  *   通用模型


  特定于应用程序的业务组件扩展扩展了企业级业务组件基类，并添加了仅此特定应用程序需要的任何额外功能。同样，通用工具代码项目包含仅在此应用程序中有用的通用类。


  通用模型项目包含跨应用程序共享的业务组件，如同模块化架构中那样（即，实体对象和值列表视图对象）。


  ### 子系统


  ADF 企业架构中的子系统类似于模块化架构中的子系统，每个子系统由一个模型项目和一个视图/控制器项目组成。


  ### 主应用程序


  每个主应用程序也类似于模块化架构中的主应用程序。在 ADF 企业架构中，同一个子系统可以在多个主应用程序中使用。


  ### 部署 ADF 应用程序


  使用这些 ADF 架构时，您的粒度单位是子系统。如果您进行更改，则必须重建子系统 ADF 库，然后构建并部署主应用程序 EAR 文件。


  如果您希望子系统更改生效而无需重建主应用程序，您可以考虑将 ADF 库部署为 WebLogic 共享库，或者研究称为“远程区域”的 ADF 功能。


  ### 业务组件代码


  在第一章中，您看到了如何在不编写任何代码的情况下构建 Oracle ADF 应用程序。当然，您并不局限于 ADF 默认的业务组件功能，而是可以根据需要扩展和自定义它。


  ### 隐式业务组件


  如果您不自己编写任何代码，您就是在隐式使用 Oracle 作为 ADF 框架的一部分提供的 ADF 类。例如，每当您的应用程序使用实体对象时，ADF 将自动创建
  `oracle.jbo.server.EntityObject` 类的一个实例。该类读取您的实体对象的定义（表、列和其他设置），并为 ADF 业务组件栈的其余部分提供多个接口以供调用。



  ### 显式业务组件


  您可以通过单击 Java 选项卡右上角的铅笔图标，为业务组件在 Java 选项卡上创建显式业务组件。这将打开“选择 Java 选项”对话框。不同类型的业务组件，该对话框也不同：图
  2-4 展示了其实体对象的外观。


  ![A437725_1_En_2_Fig4_HTML.jpg](img/A437725_1_En_2_Fig4_HTML.jpg)

  图 2-4. 为实体对象生成 Java


  如果您执行此操作，您将看到得到一个扩展了 Oracle 提供的业务组件基类的 Java 类。部分代码如清单 2-1 所示。


  ```java

  package com.vesterli.hrdemo.foundation.model.entity;

  ...

  import oracle.jbo.server.EntityImpl;

  ...

  // ---------------------------------------------------------------------

  // ---    File generated by Oracle ADF Business Components Design Time.

  // ---    Sat Feb 04 15:17:10 CET 2017

  // ---    Custom code may be added to this class.

  // ---    Warning: Do not modify method signatures of generated methods.

  // ---------------------------------------------------------------------

  public class DepartmentsImpl extends EntityImpl {

  ...

  /**

  * This is the default constructor (do not remove).

  */

  ...

  /**

  * Gets the attribute value for DepartmentName, using the alias name DepartmentName.

  * @return the value of DepartmentName

  */

  public String getDepartmentName() {

  return (String) getAttributeInternal(DEPARTMENTNAME);

  }

  /**

  * Sets value as the attribute value for DepartmentName.

  * @param value value to set the DepartmentName

  */

  public void setDepartmentName(String value) {

  setAttributeInternal(DEPARTMENTNAME, value);

  }

  ...

  /**

  * Add locking logic here.

  */

  public void lock() {

  super.lock();

  }

  /**

  * Custom DML update/insert/delete logic here.

  * @param operation the operation type

  * @param e the transaction event

  */

  protected void doDML(int operation, TransactionEvent e) {

  super.doDML(operation, e);

  }

  }

  ```

  清单 2-1. 实体对象 Java 代码的一部分


  您可以看到您的类被称为 `EntityImpl`。import 语句表明这意味着 `oracle.jbo.server.EntityImpl`。根据您在“选择
  Java 选项”对话框中的选择，JDeveloper 将在类中创建一些占位符方法，您可以在其中添加自己的代码。例如，“数据操作方法”复选框导致 JDeveloper
  创建了 `lock()` 和 `doDML()` 方法。


  您可以随时在代码中任意位置右键单击并选择“源”➤“重写方法”，以要求 JDeveloper 为 Oracle 提供的基类中的任何方法添加占位符。


  正如 JDeveloper 所创建的那样，这些方法只是调用 Oracle 提供的超类中的相应方法。这意味着，在您添加一些自己的代码之前，为业务组件生成 Java
  不会改变应用程序的功能。


  您对特定业务组件（如本示例中的 `DepartmentsImpl`）所做的任何更改将仅适用于该业务组件。但您也可以通过创建自己的 ADF 业务组件基类来进行将应用于应用程序中每个业务组件的更改。


  ### 您自己的基类


  您应该始终创建自己的 ADF 业务组件基类，扩展 Oracle 提供的类。您不必添加任何功能，但重要的是您要创建这层额外的代码，以便将来在所有组件中放置您可能需要的任何通用功能。图
  2-5 展示了您自己的基类如何位于 Oracle 提供的类与应用程序中使用的特定业务组件之间。


  ![A437725_1_En_2_Fig5_HTML.jpg](img/A437725_1_En_2_Fig5_HTML.jpg)

  图 2-5. 扩展 Oracle 的业务组件基类


  ### 创建您自己的基类


  在 BCBase 项目中创建您自己的业务组件基类之前，您需要让 JDeveloper 加载 ADF 业务组件功能。您可以通过右键单击项目并选择“项目属性”来完成此操作。然后选择“ADF
  业务组件”并勾选“为业务组件初始化项目”复选框。


  完成此操作后，创建您自己的基类作为标准 Java 类（“文件”➤“新建”➤“Java 类”）。共有 11 个 ADF 业务组件基类。您可能只会为其中的几个添加功能，但由于添加您自己的基类没有任何成本，而且您永远不知道将来哪一个可能有用，因此您应该创建所有这些类的自己版本。Oracle
  类（都可以在 `oracle.jbo.server` 包中找到）如下：


  *   `EntityCache`

  *   `EntityImpl`

  *   `ProgrammaticEntityImpl`

  *   `EntityDefImpl`

  *   `ViewObjectImpl`

  *   `ViewRowImpl`

  *   `ProgrammaticViewObjectImpl`

  *   `ProgrammaticViewRowImpl`

  *   `ViewDefImpl`

  *   `ApplicationModuleImpl`

  *   `ApplicationModuleDefImpl`


  对于每一个类，创建您自己的版本，扩展相关的 Oracle 类，如图 2-6 所示。


  ![A437725_1_En_2_Fig6_HTML.jpg](img/A437725_1_En_2_Fig6_HTML.jpg)

  图 2-6. 创建您自己的业务组件基类


  您的代码将类似于清单 2-2。


  ```java

  package com.vesterli.hrdemo.foundation.bcbase;

  public class EntityImpl extends oracle.jbo.server.EntityImpl {

  }

  ```

  清单 2-2. 您自己的业务组件基类代码


  注意这个类有多简单：它只有一个名称和它扩展了 Oracle 提供的基类的信息。这是项目开始时您所需要的全部——您可以根据需要添加自己的方法，重写 Oracle
  类中的方法。


  完成后，从您的 BCBase 项目创建一个 ADF 库，并将其放在您的公共 ADF 库目录中供所有人使用。


  ### 使用您自己的基类


  一旦创建了您自己的 ADF 业务组件基类，您就可以设置 JDeveloper，使其在创建新业务组件时始终使用它们。您可以在 JDeveloper 首选项中的“ADF
  业务组件”➤“基类”下进行设置。对于每个基类，将 `oracle.jbo.server` 替换为您的基类所在的包，如图 2-7 所示。


  ![A437725_1_En_2_Fig7_HTML.jpg](img/A437725_1_En_2_Fig7_HTML.jpg)

  图 2-7. 配置 JDeveloper 使用您的 ADF 基类


  在 JDeveloper 首选项下进行更改意味着从此创建的每个业务组件都将基于这些类。这也意味着，如果包含您的 ADF 业务组件基类的 ADF 库未添加到项目中，您的应用程序将在运行时失败。


  如果您想为单个项目更改基类，“项目属性”下有一个类似的设置。


  ### 使用模板


  正如企业开发框架所预期的那样，Oracle ADF 也提供了各种选项，让您可以基于模板构建用户界面元素。如果您在模板上创建页面、页面片段和任务流，您将可以选择在以后轻松地在整个应用程序或企业中添加或更改内容。如果您不使用模板，您必须在每个页面、片段或任务流中单独进行任何必要的全局更改。


  除了前期需要一点思考外，将所有内容基于模板没有任何成本，因此您应该始终使用它们。即使项目开始时没有任何内容需要放入模板，也请创建空模板并在其上构建您的应用程序。


  所有模板都在您的基础工作区中的视图/控制器项目中创建。如果您使用企业架构，那么您的企业基础和应用程序基础都应具有模板。


  ### 页面模板


  许多 ADF 应用程序只有一个主页面，但您仍应将其基于页面模板构建，以便于后续扩展和/或开发其他应用程序。


  页面模板包含一些通用元素，例如页眉栏或您希望在每个页面上显示的公共页脚。您应在 `CommonUI` 项目中使用 `File ➤ New ➤ Web Tier
  ➤ JSF/Facelets ➤ ADF Page Template` 来创建它。在创建页面模板时，您通常需要复制一个快速启动布局。


  作为模板创建的一部分，您至少需要定义一个 facet，可能还需要定义属性，如图 2-8 所示。


  ![A437725_1_En_2_Fig8_HTML.jpg](img/A437725_1_En_2_Fig8_HTML.jpg)


  图 2-8. 定义模板 facet 和属性


  ### 使用 Facet


  Facet 是一个位置，模板使用者可以在其中添加他们自己的内容。一个模板通常有一个 facet，但如果您的布局需要两个独立的内容区域，也可能有多个。


  创建模板后，它会显示在 JDeveloper 主窗口中。在这里，您可以添加徽标、页眉等装饰元素。模板中的所有元素都将成为基于该模板的每个页面的一部分。


  在您希望放置实际页面内容的位置，从组件面板中拖放一个 Facet 定义 (`<af:facetRef>`)。系统会提示您输入 facet 名称，选项是您在创建模板时定义的那些
  facet。


  ### 使用属性


  通常，您希望能够更改放置在模板区域中的文本。例如，您的模板可能在页面顶部定义了一个彩色条，您希望将页面名称写在这个条内。在基于模板的页面上，您无法在模板区域内添加任何内容。但是，您可以为模板属性赋值。


  具体用法如下：


  -   定义模板时，创建一个属性（例如 `pageTitle`）。

  -   在模板中，将您希望显示页面名称的地方放置一个文本元素（例如 `<af:outputText>`）。将该文本元素的“值”属性设置为与属性对应（例如 `#{attrs.pageTitle}`）。为该文本元素应用您想要的任何样式（字体大小等）。

  -   基于该模板创建一个页面。在“源”视图中，选择 `<af:pageTemplate>` 元素，在“属性”窗口中找到模板属性的字段，并将其设置为所需的值。


  ### 页面片段模板


  您应用程序的主体将由有界任务流中的页面片段组成。因为这些片段将驻留在您应用程序的主页面内，所以它们通常不包含任何页眉或页脚等装饰。


  因此，您的页面片段模板通常仅包含一个拉伸的一列布局，以确保您的片段能充分利用页面上的所有可用空间。定义一个内容 facet 并将该 facet 引用放置在拉伸布局中。


  **注意：** 为页面片段基于模板构建可能看起来多余，但这样做没有任何成本，并且在您确实需要向每个页面片段添加某些通用内容的罕见情况下，它可以为您节省大量工作。


  ### 任务流模板


  您也可以将有界任务流基于模板构建。这允许您后续添加功能，或在整个应用程序范围内全局设置属性。


  这样做的一个原因可能是向每个任务流添加通用的初始化器和终结器。这些是 ADF 在进入和离开任务流时自动执行的代码片段，通常用于应用程序性能跟踪。


  与页面片段模板类似，您可能没有立即对任务流模板的需求，但创建它们没有任何成本。通过将您所有应用程序的任务流都基于模板构建，您就获得了轻松对每个任务流进行一些更改的选项。


  ### 应用程序皮肤


  您应用程序的视觉外观部分由 ADF Skin 决定。如果您不创建一个，将使用 ADF 默认皮肤。


  您自己的 ADF Skin 总是基于 ADF 附带的标准皮肤之一，任何您未显式更改的部分都将具有默认的 ADF 外观。这意味着您可以在项目开始时创建一个空皮肤，并将其置于基础工作空间中，而不影响应用程序的外观。


  如果您将所有子系统和主应用程序都基于此皮肤，您就再次建立了一个进行应用程序范围更改的单一入口点。


  我们将在第 3 章中再次讨论皮肤。


  ## 通用模型


  在 ADF 应用程序中，您还可以跨子系统重用一些业务组件。这些可重用组件应放置在基础工作空间中的通用模型项目中。业务组件通常只能在单个应用程序内重用，因此 ADF
  企业架构中的企业基础层不太可能包含共享的业务组件。


  当您将基础工作空间创建为 ADF Fusion Web 应用程序时，JDeveloper 会自动在模型 (`CommonModel`) 和视图/控制器 (`CommonUI`)
  项目之间建立依赖关系。您应在基础项目中删除此依赖关系（项目属性 ➤ 依赖关系）。该依赖关系意味着当您从视图/控制器项目创建 ADF 库时，模型项目中的所有内容都会自动包含在内。这对于子系统来说没问题，但在基础层中，您需要显式地将每个项目部署到
  ADF 库。


  ### 共享实体对象


  请记住，实体对象将数据库表映射为可供视图对象使用的对象表示形式。这意味着对于每个数据库表，您只需要一个实体对象。因此，将它们全部创建在一个通用模型项目中，然后从基础工作空间中的通用模型项目部署为
  ADF 库是有意义的。


  ### 共享值列表视图对象


  视图对象包含为特定目的收集的属性。这意味着它们通常作为子系统的一部分构建，以实现该子系统中的用例或故事。但是，每次为属性实现值列表时，您也需要一个视图对象。其中许多将在多个子系统中使用，因此将它们与实体对象一起放在基础层的通用模型项目中是有意义的。


  您的通用模型项目还需要一个应用程序模块。这允许您运行和测试您的值列表视图对象，并且该应用程序模块也可以用作共享应用程序模块。有关共享应用程序模块的更多信息，请参阅
  Oracle 手册《使用 Oracle 应用程序开发框架开发 Fusion Web 应用程序》中的“共享应用程序模块视图实例”章节。



  ### 构建子系统


  ADF 应用程序的主体部分将置于各个子系统中。每个子系统应在独立的工作区中创建，并包含一个模型项目和一个视图/控制器项目。


  你的子系统工作区将利用基础层中的所有 ADF 库：`common UI`、`common model`、业务组件基类以及任何通用工具代码。


  在模型项目中，你需要创建实现该子系统故事或用例所需的视图对象和视图链接。所有这些都应基于来自 `common model` 的实体对象。


  **提示**


  如果在创建视图对象时没有看到任何实体对象，可能是你未正确添加对 `common model` ADF 库的依赖。


  在视图/控制器项目中，你需要创建带有页面片段的有界任务流，以匹配你的用例、故事或 UI 线框图。这些应基于来自 `common UI` ADF 库的页面流模板。


  创建任务流后，再基于你的页面片段模板创建实际的页面片段。


  因为你无法直接运行带有页面片段的任务流，所以你的子系统通常还包含每个任务流的测试页面。你也可以使用 `ADF EMG Task Flow Tester`，这是一个由
  ADF 企业方法学组（`ADF EMG`）成员开发的 `JDeveloper` 扩展。像安装其他 `JDeveloper` 扩展一样，通过选择 `帮助 ➤ 检查更新`
  来安装这个实用工具。务必在 `检查更新` 向导的第一步中勾选 `开源和合作伙伴扩展` 复选框。你应该能在向导的第二步中看到此工具，如图 2-9 所示。


  ![A437725_1_En_2_Fig9_HTML.jpg](img/A437725_1_En_2_Fig9_HTML.jpg)


  图 2-9.


  安装 `ADF EMG Task Flow Tester`


  允许 `JDeveloper` 重启，并按照说明开始使用 `ADF EMG Task Flow Tester`。


  ### 构建主应用程序


  主应用程序是所有子系统汇集的地方。它拥有自己的工作区，并使用来自基础层和所有子系统的 ADF 库。在主应用程序工作区中，你仅使用视图/控制器项目——所有业务组件都驻留在基础层或某个子系统中。


  ### 主应用程序内容


  主应用程序包含基于页面模板的主页（是一个完整的页面，而非片段）。


  由于页面模板包含所有应用程序装饰（标题栏、徽标等），页面本身将仅包含一个菜单、一个动态区域和一些代码。该代码用于处理动态区域内容的切换，以显示另一个有界任务流。我们将在第
  5 章讨论应用程序逻辑时看到必要的代码示例。


  ### 安全性


  最后，你在主应用程序中应用安全性。要应用安全性，请选择 `应用程序 ➤ 安全 ➤ 配置 ADF 安全性` 并完成 `配置 ADF 安全性` 向导。


  **注意**


  `ADF 安全性` 在运行于 `WebLogic` 和 `WebSphere` 应用服务器上的 ADF 应用程序中可用。如果你运行的是免费的 `ADF Essentials`
  版本并部署在 `GlassFish` 上，则无法使用 `ADF 安全性`。你可以通过其他方式（例如 `Apache Shiro`）保护网页，但如果希望在任务流级别限制访问，则必须自行编写授权代码。


  ### 运行配置 ADF 安全性向导


  在第一步中，选择 `ADF 认证和授权` 以请求 `ADF` 处理认证（识别用户）和授权（用户被允许做什么）。


  在第二步中，选择 `基于表单的认证` 并勾选 `生成默认页面` 复选框。这将创建包含所有必要信息和字段的基本登录页面。然后你可以修改它们以匹配你的应用程序。`HTTP
  基本` 和 `HTTP 摘要` 将登录交给浏览器处理，向用户显示其浏览器用于认证的任何对话框。


  在第三步中，选择 `无自动授予` 以表示你将显式分配访问权限。


  在第四步中，不要勾选 `认证成功后重定向` 复选框。你通常只想向用户显示主页，而不是重定向到其他页面。


  当你完成向导时，你的应用程序即受到安全保护，并将提示你输入用户名和密码。在定义访问权限之前，它也不允许你访问任何内容。


  ### 定义访问权限


  访问权限在安全向导创建的 `jazn-data.xml` 文件中定义。你可以选择 `应用程序 ➤ 安全 ➤ 应用程序角色`，在用户友好的对话框中查看此文件，而不必直接编辑文件本身。


  作为应用程序开发者，你为应用程序中不同类型的用户创建应用程序角色。许多应用程序只有一级安全性，即每个经过认证的用户都可以使用应用程序的全部功能。在这种情况下，你只需要一个应用程序角色。其他应用程序有几种用户类型，因此需要多个应用程序角色。


  在 `jazn-data.xml` 文件的 `应用程序角色` 选项卡上，你命名这些应用程序角色。在 `资源授权` 选项卡上，你选择资源并将其授予特定角色。如果你有复杂的安全要求，你可能还会使用权利授予（即资源组）。


  典型的 `ADF 安全性` 使用以下授权：


  *   对应用程序主页的 `网页` 授权，授予每个应用程序角色。

  *   对不同任务流的 `任务流` 授权，根据需要授予不同的应用程序角色。


  在使用模块化或企业架构的 `ADF 应用程序` 中，任务流在子系统中开发，并通过 `ADF 库` 引入主应用程序。要授予对这些任务流的访问权限，请务必勾选 `显示从
  ADF 库导入的任务流` 复选框。


  如果你想保护数据集，可以使用 `ADF 实体对象` 授权。如果你想保护单个属性，则使用 `ADF 实体对象属性` 授权。


  ### 在内置的 WebLogic 中运行


  在 `测试用户和角色` 选项卡上，你可以定义测试用户并为他们分配角色。这些用户仅在 `JDeveloper` 内置的 `WebLogic` 服务器中运行应用程序时使用。


  你可以将应用程序中定义的应用程序角色分配给单个测试用户或用户组（在 `JDeveloper` 中称为 `企业角色`）。这允许你模拟部署到独立应用服务器时将适用的授权逻辑。


  ### 部署到测试和生产服务器


  当你将应用程序部署到独立的测试和生产服务器时，部署的一部分工作是将应用程序角色映射到服务器上的用户或组。


  在典型的企业环境中，你的 `WebLogic` 服务器将与某个身份提供者（例如 `Microsoft Active Directory`）集成。这意味着当你在
  `Oracle Enterprise Manager Grid Control` 中分配应用程序角色时，你可以看到并分配给你的 `AD` 用户和组。


  例如，你的应用程序可能有 `readonly`、`normal` 和 `superuser` 应用程序角色。在你的身份管理系统中，可能有名为 `Trainee`、`Customer
  Service` 和 `Senior advisor` 的用户组。部署应用程序时，你可以将 `readonly` 映射到 `Trainee`，`normal`
  映射到 `Customer Service`，`superuser` 映射到 `Senior advisor`。


  ## 总结


  你已经了解了 `ADF 库` 如何让你将即使非常大型的企业应用程序的开发也拆分成可管理的部分，以及如何在开始认真构建之前构建所需的所有基础元素。


  在下一章中，我们将讨论如何为你的应用程序实现所需的布局和外观。




  '
- '# 3. 布局与皮肤


  正如你在第 1 章所看到的，在构建简单的拖放式 ADF 应用程序时，JDeveloper 能够生成可接受的布局和视觉外观。本章将解释如何更深入地控制 ADF 应用程序的布局和外观。


  为此，ADF 提供了以下功能：


  *   布局组件

  *   单独的组件样式设置

  *   应用程序级别的皮肤定制


  你可以使用诸如 `Panel Grid Layout` 之类的布局组件来排列页面和页面片段上的组件。你可以将布局组件相互嵌套，以实现你想要的确切布局，并通过 `Spacer`
  组件来控制元素之间的间距。


  要更改单个组件的外观，你可以修改其 `InlineStyle` 属性。ADF 组件由标准的层叠样式表（CSS）格式控制，你可以为一个组件设置显式样式，或定义一个样式类。


  整个应用程序中每个组件的外观都由应用程序皮肤控制。一个皮肤包含一个 CSS 文件，可选择性地辅以资源包来自定义 ADF 应用程序中使用的默认字符串，可能还包括你自己的图像文件。你的应用程序始终基于一个默认皮肤，因此你只需要更改那些你希望与默认外观不同的部分。


  ### 布局


  许多年前，第一个使用 Java 生成网页的技术是 JavaServer Pages（JSP）。在 JSP 中，展示逻辑和 Java 代码中的业务逻辑与定义呈现给用户的页面的
  HTML 标签混合在一起。这导致网页非常难以维护。随着时间的推移，开发人员学会了将 Java 代码分离到标签库中，以试图清理这种混乱，但正确使用标签库仍然需要开发人员的自律。


  JavaServer Faces（JSF）一劳永逸地解决了这个问题。一个 JSF 页面只包含组件，任何展示逻辑都被放在单独的 Java Bean 类中。我们将在第
  5 章回到展示逻辑。ADF 基于 JSF，其用户界面组件是 Oracle 提供的特殊 JSF 组件。


  一些组件（如数据输入字段和下拉列表）用于显示数据。其他组件执行操作，如执行导航和调用业务逻辑。最后，还有一些组件用于在页面上排列其他组件。这些就是我们本章将要讨论的布局组件。


  ### 布局管理器 vs. 固定格式


  在某些开发工具（例如 Oracle Forms）中，你将组件放置在页面上的固定位置。例如，你可能将一个输入字段放置在位置 x=150, y=220。这意味着该组件将始终放置在距左边距
  150 像素、距上边距 220 像素的位置。这种方法让你拥有完全的控制权，但也缺乏灵活性。如果用户在更大的显示器上运行应用程序，所有内容将保持开发人员定义的原样，多余的空间无法被利用。


  在 ADF 应用程序中，布局是动态的，可以取决于应用程序运行所在的浏览器窗口的大小。布局由布局管理器组件处理，这些组件负责排列放置在其内部的组件。布局管理器可以控制其他布局管理器，从而形成一个完整的布局管理器层次结构。这允许你创建你想要的确切布局。


  一些布局组件仅控制其他元素——例如，面板网格布局控制网格行组件，选项卡面板控制详细信息项。其他布局组件具有可以容纳其他组件的 facet。例如，面板拉伸布局具有
  top、bottom、start、center 和 end facet，它们有特定的位置。放置在面板拉伸布局的 top facet 中的组件将始终位于屏幕最上方，而
  center facet 中的所有内容将位于其下方。


  **注意**


  一些组件（如 `panel stretch layout`）具有 start 和 end facet，而不是 left 和 right。这是因为 ADF 支持从右到左的语言，如阿拉伯语、希伯来语或波斯语。如果你的应用程序配置为使用其中一种语言，start
  facet 会移动到右侧，因为那是阅读开始的地方。


  ### 可拉伸与不可拉伸


  当布局管理器在屏幕上排列组件时，它们会考虑每个布局组件的拉伸属性。ADF 布局组件有四种类型：


  *   可以拉伸自身也可以拉伸其子组件的组件

  *   自身不可拉伸但可以拉伸其子组件的组件

  *   可以拉伸自身但不拉伸其子组件的组件

  *   自身不可拉伸且不拉伸其子组件的组件


  一个 ADF 应用程序通常从一个可拉伸的外部布局容器开始，该容器会拉伸其子组件（例如，一个行高为 100%、单元格宽度为 100% 的 `Panel Grid
  Layout`）。这确保你的应用程序将使用所有可用的浏览器空间。


  有些组件无法拉伸（例如，`Input Text`），因此你应避免将这些组件作为将尝试拉伸其子组件的布局容器的直接子项。相反，你应该将不可拉伸的组件包装在一个布局组件（如
  `Panel Group Layout`）中，该组件本身可拉伸但不拉伸其子组件。


  ### 快速入门布局


  在学习 ADF 布局时，最佳起点是**快速入门布局**。这些布局展示了最佳实践，并随 ADF 一起演进。例如，在早期的 ADF 版本中，快速入门布局的外部布局容器是
  `Panel Stretch Layout`。然而，当 ADF 在 11.1.2 版本中引入了改进的 `Panel Grid Layout` 组件后，一些快速入门布局随之改变，以展示使用这个新组件的正确方式。


  当你创建一个页面或页面片段时，选择 **复制快速入门布局**，然后选择最接近你想要实现效果的示例。首先，从左侧的“类别”面板中选择列数（一列、两列或三列）。然后，选择一种类型，最后选择一个布局，如图
  3-1 所示。


  ![A437725_1_En_3_Fig1_HTML.jpg](img/A437725_1_En_3_Fig1_HTML.jpg)

  图 3-1. 使用快速入门布局


  在布局选择中，你会看到几种不同的图标：


  *   四向箭头表示一个区域将尽可能拉伸。这对于页面的主要工作区域是一个很好的选择。

  *   挂锁表示一个大小不会改变的区域。JDeveloper 只在边距周围（顶部、左侧、底部，在少数情况下是右侧）提供这些固定大小的区域。这些区域通常用于页面页眉、菜单和任务列表，因为你知道它们只会占用有限的空间。

  *   三角形表示 JDeveloper 将使用 `<af:panelSplitter>` 组件。在应用程序中，该组件显示为一条带小三角形的线，用户可以点击三角形来折叠三角形所指向的区域。这通常用于为用户可能不需要一直看到的补充信息创建一个位置。

  *   滚动条表示 JDeveloper 将使用一个布局为 `scroll` 的 `<af:panelGroupLayout>`。在应用程序中，如果组件数量超过页面所能容纳的范围，该布局将显示滚动条。单列布局提供垂直滚动条，而两列和三列布局提供水平滚动条。如果你知道页面包含的信息会超出屏幕范围，应使用这些布局。你应尽量避免强制用户滚动。


  ### 使用面板网格布局


  面板网格布局是用途最广泛的布局组件，也可能是你使用最多的组件。它还有一个额外优势，即其布局方式与 HTML 表格的布局方式相匹配，因此与其他 ADF 布局组件相比，它提供了更好的性能。




  '
- '# 面板网格布局示例


  如果你查看快速入门示例的源代码，你会发现其中许多都使用了`<af:panelGridLayout>`组件，其中包含`<af:gridRow>`和`<af:gridCell>`组件。


  面板网格布局组件只是一个具有一些属性的容器，其布局主要由内部的行和单元格控制。


  在最简单的布局（称为“单列（拉伸）”）中，你只会得到一行和一个单元格。该行的高度属性设置为`100%`，这意味着该行将拉伸以占据所有垂直空间。在该行内部，单元格的宽度属性设置为`100%`，这意味着该单元格将拉伸以占据所有水平空间。该单元格的`halign`（水平对齐）和`valign`（垂直对齐）属性也都设置为“拉伸”。这意味着该单元格将尝试拉伸其内部的组件。这些组件和设置的综合效果是，布局将占据浏览器窗口中的所有可用空间，并将其用于其内容。


  '
- '# 创建你自己的面板网格布局


  你也可以从“组件”窗口中向页面添加面板网格布局。如果你希望更详细地控制页面某部分的布局，这会很有用。经验丰富的 ADF 开发者也常常先创建空白页面，然后自己添加布局组件。


  当你将面板网格布局组件放到页面上时，“创建面板网格布局”向导会出现，如图 3-2 所示。


  ![A437725_1_En_3_Fig2_HTML.jpg](img/A437725_1_En_3_Fig2_HTML.jpg)


  图 3-2. “创建面板网格布局”向导


  你需要决定行数和列数以及边距。内部网格边距定义了网格内行和单元格之间的间距，而外部网格边距则定义了面板网格布局边缘与最外层单元格之间的间距。例如，在上图中，从网格布局顶部到第一行为
  30 像素，行与行之间为 10 像素，最后一行与面板网格布局底部之间为 40 像素。


  在向导的第二步，你可以定义单元格的初始宽度和高度，并定义某些单元格是否应跨越多行或多列。


  你在“网格宽度”选项卡上所做的选择将用作该列所有单元格的宽度属性。默认情况下，JDeveloper 向导以百分比指定宽度，在列之间均匀分配空间。


  提示： 以百分比指定单元格宽度，并确保总和为 100%。如果你混合使用单位（例如像素和百分比）或没有分配所有空间，结果将是未定义的。


  你也可以将宽度设置为`auto`（自动）或`dontCare`（不关注）。对于单元格，`auto`宽度意味着它将根据单元格中的组件进行大小调整。单元格的`dontCare`设置意味着该列中的其他单元格可以定义宽度。你可能不希望将整个列设置为`dontCare`，因为这意味
  ADF 可以自由地给该列任何它想要的宽度。


  在“网格高度”选项卡上，行高始终是`auto`，意味着高度由行中的组件定义。向导完成后，你可以将高度更改为百分比（相对于尚未分配给其他行的空间）。


  在如图 3-3 所示的“跨度”选项卡上，你可以指定是否有任何单元格跨越多行或多列。你可以在右侧的预览中看到单元格的名称——它们将被命名为类似`gc1,3`的形式。


  ![A437725_1_En_3_Fig3_HTML.jpg](img/A437725_1_En_3_Fig3_HTML.jpg)


  图 3-3. 网格布局中的行和列跨度


  你通过定义“起始网格单元格（左上角）”和“结束网格单元格（右下角）”来定义每个跨度。JDeveloper 会尝试在第二个下拉列表中只显示有意义的选项，但你也可以创建无意义的、不合理的跨度。在这种情况下，应用程序中的显示效果当然是未定义的。


  当你完成向导时，JDeveloper 会创建一个`<af:panelGridLayout>`标签，并在其中放置必要的`<af:gridRow>`和`<af:gridCell>`标签，并设置相关属性。你可以在“属性”窗口或源代码视图中更改这些属性。跨度由`columnSpan`和`rowSpan`属性控制：你为这些属性设置的值表示你希望合并的单元格数量。这与
  HTML `<td>`标签使用`colspan`和`rowspan`属性的方式类似。


  ### 使用面板表单布局


  一种非常常见的布局是将多个输入元素排列在一列中，彼此上下相邻。你可以使用面板网格构建这种布局，但 ADF 为此提供了一个专门的布局管理器：面板表单布局（`<af:panelFormLayout>`）。


  你可以通过从“组件”窗口将“面板表单布局”组件拖到页面上来创建此布局。当你像第 1 章中看到的那样，从“数据控件”窗格将集合放到页面上时，JDeveloper
  也会使用面板表单布局。


  在面板表单布局内部，你可以放置所需的数据组件。通常，你会从“数据控件”面板将这些组件作为单个属性拖入，以便 JDeveloper 自动创建必要的数据绑定。


  面板表单布局包含一个页脚 facet，通常用于放置导航按钮、保存数据或执行业务逻辑的按钮，这些按钮通常放置在面板组布局内。例如，当你将视图对象实例作为 ADF
  表单放下并选中“行导航”复选框时得到的代码，看起来如清单 3-1 所示。


  ```

  清单 3-1. 面板表单布局示例

  ```


  控制面板表单布局的两个最重要的属性是`MaxColumns`（最大列数）和`Rows`（行数）属性。


  *   `Rows`控制 ADF 在开始新列之前渲染多少个输入元素。如果未输入值，所有输入元素将显示在一列中。例如，如果你将值设置为 10，ADF 将在第一列中渲染前
  10 个元素，然后为第 11 到 20 个项目开始第二列。

  *   `MaxColumns`定义允许的列数——桌面应用程序的默认值为 3，在平板电脑或智能手机上运行时默认值为 2。


  如果你的元素数量超过了`Rows`乘以`MaxColumns`，则`MaxColumns`限制具有优先权。也就是说，如果你有 30 个元素，`Rows`为`8`，`MaxColumns`为`3`，ADF
  将遵守`MaxColumns`限制并覆盖`Rows`设置，将你的元素渲染为 10 行乘以 3 列。



  ### 使用面板集合布局


  另一个专门的布局组件是面板集合布局（`<af:panelCollectionLayout>`）。该组件旨在与`<af:table>`组件一起使用，以同时显示多条数据记录。


  它包含三个方面：

  *   `menus` 方面用于在面板集合布局提供的内置菜单项之外添加额外的项目。

  *   `toolbar` 方面用于当你需要带按钮的工具栏时。

  *   `statusbar` 方面用于在表格下方的状态栏中显示附加信息。


  要使用面板集合，请从“组件”窗口将其放置到你的页面上。然后，从“数据控制”窗格将一个集合以 ADF 表的形式放置到面板集合上。如果你已经将集合放置为表格，可以右键单击表格组件并选择“源”
  ➤ “环绕”，然后在“环绕方式”对话框中选择“面板集合”。


  默认情况下，面板集合会显示为表格上方的一行额外内容。它包含一个“视图”菜单，其功能包括选择要显示的列、如何对列进行排序等。图 3-4 展示了默认菜单。


  ![A437725_1_En_3_Fig4_HTML.jpg](img/A437725_1_En_3_Fig4_HTML.jpg)


  图 3-4.


  带有 ADF 表格的面板集合


  你可以通过在“源”视图或 JDeveloper 窗口左下角的“结构”面板中将菜单组件（`<af:menu>`）放置到 `menus` 方面，在内置的“视图”菜单旁边添加额外的菜单。在此菜单内部，你添加菜单项，通常是
  `<af:commandMenuItem>`，它们会调用你编写的 Java Bean 类中的方法。我们将在第 5 章回到 Java Bean 的讨论。


  如果你想直接向面板集合的顶部栏添加按钮，可以将工具栏（`<af:toolbar>`）放置到“工具栏”方面，然后将按钮组件（`<af:button>`）放置到工具栏上。


  要在表格下方创建状态栏，你需要将工具栏放置到 `statusbar` 方面，然后在状态栏中放置所需的组件。通常，这会是一个输出文本组件，其值属性设置为某种计算出的状态。在第
  4 章，我们将回到如何在 Java 代码中计算值并将其显示在输出文本中。


  ### 使用选项卡和手风琴式布局


  如果你的信息量超出一页所能容纳的范围，并且用户需要能够在所有元素之间快速来回切换，你可以考虑使用选项卡或手风琴式布局对其进行分组。两者都是交互式容器项，它们包含其他布局组件，而这些布局组件又包含用户将与之交互的实际数据元素或操作项。


  ### 面板选项卡式布局


  我们已经在第 1 章末尾讨论过面板选项卡式布局组件。该组件在运行应用程序时，会将其中的每个详细信息项渲染为单独的选项卡。当你将面板选项卡式布局（`<af:panelTabbed>`）放置到页面或页面片段上时，JDeveloper
  会显示“创建面板选项卡式布局”向导。在此向导中，你可以定义所有选项卡并选择它们的放置位置（上方、下方、上下方、左侧、右侧、起始端或末尾端）。起始端和末尾端位置会遵循你的区域设置，对于像英语这样从左到右的语言显示在左侧，对于像阿拉伯语这样从右到左的语言显示在右侧。


  该向导当然是创建多个组件的快捷方式。如果你后来决定更改选项卡放置位置，可以更改“位置”属性。如果你发现需要一个额外的选项卡，可以从“组件”窗口添加一个“显示详细信息项”，或者在“源”视图中编写或复制一个
  `<af:showDetailItem>` 标签。


  如果你的所有选项卡无法在屏幕上完全显示，ADF 将自动显示左右滚动箭头，以及一个“列出所有选项卡”图标（一个向下的三角形）。


  ### 面板手风琴式布局


  另一个允许用户在应用程序的不同视图之间进行选择的布局组件是面板手风琴式布局。它以这种可以展开和收缩的乐器命名。


  当你从“组件”窗口将面板手风琴式布局放置到页面上时，会出现“创建面板手风琴式布局”向导。与创建选项卡式布局的向导类似，此窗口允许你定义手风琴式布局内部的窗格。在对话框顶部，你可以在“一次显示一个窗格”和“同时显示多个窗格”之间进行选择。如果你选择一次显示一个，那么当用户选择一个新的窗格时，打开的手风琴式窗格将自动关闭。当然，如果你选择只允许一个窗格打开，你只能为一个窗格选择“已披露”。如果你选择允许多个窗格打开，“已披露”列将变为复选框，你可以选择多个窗格。


  如果你以后想添加一个新窗格，只需将“显示详细信息项”放置到面板手风琴式布局内部即可。要在显示一个和多个窗格之间切换，你需要更改“披露多个”属性的值。对于手风琴式布局中的每个详细信息项，你可以通过设置“已披露”属性来控制其是否最初显示。


  提示


  你可以仅通过更改面板组件，在面板选项卡式布局和面板手风琴式布局之间进行转换。“显示详细信息项”组件在这两种面板类型中的工作方式相同。


  ### 其他布局组件


  面板网格布局、面板表单布局和面板集合布局是最常用的布局组件，而面板选项卡式布局和面板手风琴式布局在页面非常复杂时可以提供帮助。除此之外，ADF 还提供了许多其他布局组件，包括：


  *   面板拉伸布局，其中心方面用于放置内容，可选的上、下、起始端和末尾端方面用于放置附加信息。

  *   面板分割器，具有两个方面，其中一个方面可以折叠。这允许用户在单个方面使用整个屏幕区域或在两个方面之间分割屏幕之间做出选择。

  *   显示详细信息提供了一个可折叠区域，可用于补充信息或可选输入。请注意，“显示详细信息”与“显示详细信息项”不同。“显示详细信息”是独立使用的，而“显示详细信息项”是在面板选项卡式布局、面板手风琴式布局或其他布局容器的上下文中使用的。

  *   卡片组在不同视图之间提供过渡效果（如幻灯片放映），而面板仪表板允许你创建一个带有框格的布局，用户可以重新排列这些框格。


  有时，你可能只想对布局额外调整一点间距，例如，为了更好地对齐项目。为此，你可以使用间距组件。这些不可见的组件具有你可以以像素为单位设置的固定宽度和高度。


  注意


  建议的对齐方法是使用正确配置的面板网格布局。你的设计不应依赖于间距组件。


  ### 响应式设计


  响应式设计意味着构建能够根据可用屏幕尺寸而变化的应用程序。其理念是构建一个应用程序，使其在大型桌面工作站和平板电脑甚至智能手机等小型设备上都具有良好的显示效果。ADF
  12c 第 2 版（12.2.x）有两个功能使这一点更容易实现：瀑布流布局和匹配媒体行为。



  ### 瀑布流布局


  瀑布流布局管理器以网格形式动态排列特殊格式的详细信息项。虽然“瀑布流”这个名字可能让人联想到固定的墙壁，但实际上它是一种非常动态的布局，会在页面首次渲染时排列“砖块”，并在应用程序浏览器窗口每次更改大小时重新排列它们。ADF
  文档将砖块称为瓦片。


  这种布局适用于仪表板类型的应用程序，其中有许多小的信息元素需要呈现。小型数据可视化组件（如环形图）在瀑布流布局中效果很好，既可以单独使用，也可以作为链接指向包含更详细信息的其他页面。


  有几种不同的布局组件可以用作砖块——最常见的是 `Panel Box` 和 `Panel Group Layout`。文档没有具体说明哪些组件适用，但大多数组件不能作为砖块在瀑布流布局中使用。


  **提示**


  在当前版本的 JDeveloper (12.2.1.2.0) 中创建瀑布流布局时，它默认填充了两个 `Panel Box` 组件。默认的 `Panel Box`
  可以折叠，但不幸的是，瀑布流布局不会注意到这一点，从而导致布局错位。将 `Show Disclosure` 属性更改为 `false`，这样用户就不会弄乱瀑布流布局。


  就像乐高积木一样，瀑布流布局中的砖块都必须具有标准尺寸。瀑布流布局的默认最小砖块尺寸为 170 × 170 像素，所有其他砖块都是此尺寸的倍数，同时考虑了砖块之间的间距。


  ## 砖块尺寸


  瀑布流布局中组件的尺寸必须使用 `Style Class` 属性来定义。Oracle 为我们提供了八种标准尺寸：


  *   `AFMasonryTileSize1x1`

  *   `AFMasonryTileSize1x2`

  *   `AFMasonryTileSize1x3`

  *   `AFMasonryTileSize2x1`

  *   `AFMasonryTileSize2x2`

  *   `AFMasonryTileSize2x3`

  *   `AFMasonryTileSize3x1`

  *   `AFMasonryTileSize3x2`


  如果这些尺寸都不符合您的需求，瀑布流布局还可以识别更高的尺寸类名，最高可达 `AFMasonryTileSize10x10`。但是，如果您想使用这些更大的尺寸，必须在您的皮肤
  CSS 文件中定义相应的 CSS 类。


  1 × 1 砖块的默认尺寸是 170 × 170 像素。默认边框是 8 像素，因此两个相邻砖块之间的距离是 16 像素。为了使瀑布流正确对齐，较大的砖块尺寸必须是基础尺寸加上砖块间距的倍数。例如，两个相邻的
  1 × 1 砖块的总宽度是 2 × 170 像素 + 它们之间 2 × 8 像素的边框。因此，2 × 1 砖块的宽度是 356 像素。


  **注意**


  可以在您自己的 CSS 文件中覆盖 `AFMasonryTileSize` 类，从而创建具有不同砖块尺寸的瀑布流布局。因为瀑布流布局是 ADF 12.2 中的一项全新功能，仍有一些不足之处，所以不建议使用非标准的砖块尺寸。


  ## 运行时砖块对齐


  在运行时，ADF 通过按照它们在 `<af:masonryLayout>` 标签内列出的顺序添加砖块来呈现瀑布流布局。它们按照从左到右的阅读顺序添加（除非您的
  ADF 应用程序配置为从右到左的语言）。砖块一次添加一个，直到下一个砖块无法再放入当前行。无法放入的砖块将成为新行的第一个砖块。一旦布局有多行，ADF 就会尝试将下一个砖块放入每行的任何开放空间中。只有当它无处可放时，才会将其添加到底部行的末尾。


  例如，如果一个宽的 3x1 砖块导致 ADF 开始第二行，它仍然可能将任何后续的 1x1 或 2x1 砖块放入第一行。同样，ADF 会尝试填充由不同高度的砖块留下的任何空隙。


  ## 瀑布流最佳实践


  如果您有很多大砖块，如图 3-5 所示，ADF 无法真正将它们很好地组合成一个美观的布局。


  ![A437725_1_En_3_Fig5_HTML.jpg](img/A437725_1_En_3_Fig5_HTML.jpg)


  图 3-5. 瀑布流布局中有太多大砖块


  要使瀑布流布局良好运行，您需要有充足的小 (1 × 1) 砖块供应，以便 ADF 可以将它们放入大砖块留下的任何空间中，如图 3-6 所示。


  ![A437725_1_En_3_Fig6_HTML.jpg](img/A437725_1_En_3_Fig6_HTML.jpg)


  图 3-6. 有足够小砖块的瀑布流布局


  在大显示器上，瀑布流布局最终会变成单行，如图 3-7 所示，除非您限制它。


  ![A437725_1_En_3_Fig7_HTML.jpg](img/A437725_1_En_3_Fig7_HTML.jpg)


  图 3-7. 非常宽的瀑布流布局


  为了避免这种情况，您可以将瀑布流布局放置在另一个具有宽度限制的容器内。您可以将其放在一个 `Panel Group Layout` 中，并将其 `InlineStyle`
  属性设置为，例如 `max-width:750px`。


  ### 屏幕相关格式化


  瀑布流布局是实现响应式设计的一种自动方式——ADF 尽可能地将定义的砖块放入布局中。


  然而，ADF 还提供了另一种根据屏幕大小控制页面布局的方法：通过 `<af:matchMediaBehavior>` 标签。当您将此标签放置在另一个组件内部时，它可以控制其周围标签的某些属性。例如，您可以控制
  `Panel Form Layout` 的 `Rows` 属性，如代码清单 3-2 所示。


  ```

  ...

  ```


  代码清单 3-2. 使用 `<af:matchMediaBehavior>`


  在此示例中，`Panel Form Layout` 的 `Rows` 属性具有默认值 `6`，但如果屏幕尺寸低于 768 像素，`Rows` 的值将更改为 `12`。


  `<af:matchMediaBehavior>` 的属性指定了要更改的包含标签的哪个属性（`propertyName`），以及该属性的值应是什么（`matchedPropertyValue`）。条件放在
  `mediaQuery` 属性中，并遵循标准的 CSS3 媒体查询语法。


  重要的是，该属性必须在包含标签中显式定义——在本例中，即 `Panel Form Layout` 必须定义了 `Rows` 属性。否则，您的应用程序将因 `NullPointerException`
  而失败。


  在撰写本书时当前版本的 ADF (12.2.1.2.0) 中，`<af:matchMediaBehavior>` 标签除了文档中的一个简短示例外没有其他文档——它甚至没有出现在在线标签文档
  [`docs.oracle.com/middleware/12212/adf/tag-reference-faces/toc.htm`](http://docs.oracle.com/middleware/12212/adf-tag-reference-faces/toc.htm)
  中。它似乎无法做太多事情，除了更改这个特定属性。如果您能更改元素的宽度，那将非常有用，但在当前版本中似乎无法实现。如果能够更改 `Rendered` 属性（控制特定组件是否显示），那也将是一个极好的功能。


  **注意**


  请查阅文档和标签指南，以了解 `<af:matchMediaBehavior>` 的功能是否自本书撰写以来有所改进。


