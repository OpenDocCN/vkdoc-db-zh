    calling a stored procedure called `INSERT_REC` in the `EMP_API` package. As part
    of the statement, question marks indicate parameters. After the statement object
    is created, the attribute values from the entity object are connected to the parameters
    with some `setString()` calls, and the statement is executed.


    If the operation was not an INSERT , normal `doDML()` processing is handled in
    the `else` branch with a call to `super.doDML()`.'
  trans: '

    ### 访问器


    如果为某个属性生成访问器，你可以在 `setXXX()` 方法中修改存储的值，并在 `getXXX()` 方法中修改返回值。


    例如，你可以修改 `setEmail()` 方法，始终将值转换为小写，如清单 4-1 所示。


    ```

    package com.vesterli.hrdemo.foundation.model.entity;

    ...

    import com.vesterli.hrdemo.foundation.bcbase.EntityImpl;

    ...

    public class EmployeesImpl extends EntityImpl {

    ...

    /**

    * 将值设置为 Salary 属性的值。

    * @param value 要设置的 Salary 值

    */

    public void setEmail (String value) {

    setAttributeInternal(EMAIL, value.toLowerCase());

    }

    ...

    }

    清单 4-1.

    重写访问器

    ```


    如果你想屏蔽值，可以重写 `getXXX()` 方法，为部分或全部用户返回屏蔽后的值。对于 `String` 属性，你可以简单地重写 getter 方法，返回
    `******` 而非实际值。对于像 `Salary` 这样的数值属性，你只能返回数值，因此解决方案是使用一个瞬态字符串属性。


    你可以通过单击绿色加号并选择“新建属性”，然后添加一个 `String` 属性（例如属性名为 `SalaryString`），在实体对象的“属性”选项卡上添加瞬态属性。完成后，在“详细信息”选项卡上将该属性标记为“瞬态”，这样
    ADF 就不会尝试将其包含在发送到数据库的 SQL 中。


    当你为实体对象创建访问器时，也会为瞬态属性创建 setter 和 getter 方法。你可以在 `getSalaryString()` 方法中添加逻辑，仅向具有
    `salary-admin-role` 的用户返回真实值，如果用户没有此角色，则返回一串星号，如清单 4-2 所示。


    ```

    package com.vesterli.hrdemo.foundation.model.entity;

    ...

    import com.vesterli.hrdemo.foundation.bcbase.EntityImpl;

    import oracle.adf.share.ADFContext;

    import oracle.adf.share.security.SecurityContext;

    ...

    public class EmployeesImpl extends EntityImpl {

    /**

    * 获取 Salary 属性的值，使用别名 Salary。

    * @return Salary 的值

    */

    public BigDecimal getSalary() {

    throw new JboException("读取 Salary 时发生内部错误");

    }

    /**

    * 将值设置为 Salary 属性的值。

    * @param value 要设置的 Salary 值

    */

    public void setSalary(BigDecimal value) {

    throw new JboException("写入 Salary 时发生内部错误");

    }

    /**

    * 获取 SalaryString 属性的值，

    * 使用别名 SalaryString。

    * @return SalaryString 的值

    */

    public String getSalaryString() {

    ADFContext actx = ADFContext.getCurrent();

    SecurityContext sctx = actx.getSecurityContext();

    if (sctx.isUserInRole("salary-admin-role")) {

    return ((BigDecimal) getAttributeInternal(SALARY)).toString();

    } else {

    return "*******";

    }

    }

    /**

    * 将值设置为 SalaryString 属性的值。

    * @param value 要设置的 SalaryString 值

    */

    public void setSalaryString(String value) {

    try {

    BigDecimal sal = new BigDecimal(value);

    ADFContext actx = ADFContext.getCurrent();

    SecurityContext sctx = actx.getSecurityContext();

    if (sctx.isUserInRole("salary-admin-role")) {

    setAttributeInternal(SALARY, sal);

    } else {

    throw new JboException("用户不允许更改工资");

    }

    } catch (NumberFormatException e) {

    throw new JboException("工资必须是数字");

    }

    }

    ...

    }

    清单 4-2.

    使用瞬态属性屏蔽值

    ```


    清单中也重写了 setter，接收 `String` 值并转换为所需的 `BigDecimal`。然后，它实现了你在前一清单中看到的相同访问控制逻辑，然后才调用内部方法来设置对应于数据库列的实际
    `Salary` 属性。同时实现了自定义的 setter 和 getter 后，用户界面就可以使用这个 `SalaryString` 属性来代替原始的 `Salary`
    属性。


    **提示**


    为防止 UI 开发者意外使用原始的 `Salary` 属性，清单 4-2 中的代码会在应用程序尝试直接操作该属性时抛出异常。你还可以将 `Salary` 属性的“显示”属性设置为“隐藏”（在“UI
    提示”选项卡上），以进一步降低开发者使用它的风险。


    ### 与数据库交互


    #### 处理数据库触发器


    你的数据库可能包含在插入或更新后更改值的触发器。如果是这种情况，你需要告知实体对象预期这些更改，并确保它更新自身。这需要在“属性”选项卡上为每个属性进行设置。在“详细信息”子选项卡上，选中“插入时刷新”和/或“更新时刷新”复选框，如图
    4-8 所示。


    ![A437725_1_En_4_Fig8_HTML.jpg](img/A437725_1_En_4_Fig8_HTML.jpg)


    图 4-8.

    插入时刷新属性


    此设置告诉 ADF 在插入或更新后分别从数据库重新读取该属性。


    在 Oracle 数据库中，触发器常用于提供主键值。在这种情况下，你需要设置“插入后刷新”。当使用 Oracle 数据库时，ADF 会利用 Oracle 特有的
    `RETURNING … INTO` 子句，在一次往返中从数据库获取更新后的值。对于其他数据库，则需要从应用服务器到数据库进行一次额外的往返来刷新属性。


    #### 调用存储过程


    当你重写 `doDML()` 方法时，JDeveloper 会自动在你的实体对象 Java 类中放置对 `super.doDML()` 的调用。这确保了正常的
    ADF 实体对象处理得以进行，向数据库发送 INSERT、UPDATE 或 DELETE SQL 语句。


    但是，如果你不希望发生这种情况，可以移除这个调用。例如，如果你希望表中的所有插入都由数据库中的存储过程处理，这会很有用。在这种情况下，你希望 ADF 调用该过程，而不是向数据库发送
    INSERT。例如，如果你有一个包含过程 `INSERT_REC` 的 `EMP_API` 包，该过程接受四个参数，可能如清单 4-3 所示。


    ```

    /**

    * 此处为自定义 DML 更新/插入/删除逻辑。

    * @param operation 操作类型

    * @param e 事务事件

    */

    protected void doDML(int operation, TransactionEvent e) {

    CallableStatement cstmt = null;

    if (operation == DML_INSERT) {

    String insStmt = "{call emp_api.insert_rec(?,?,?,?)}";

    cstmt = getDBTransaction().createCallableStatement(insStmt, 0);

    try {

    cstmt.setString(1, getFirstName());

    cstmt.setString(2, getLastName());

    cstmt.setString(3, getJobId());

    cstmt.setInteger(4, getDepartmentId());

    }

    catch (Exception ex) {

    // 处理 SQL 异常

    } finally {

    try {

    cstmt.close();

    } catch (SQLException ex) {

    // 如果关闭时出错，则忽略

    }

    }

    } else {

    super.doDML(operation, e);

    }

    }

    清单 4-3.

    在 doDML() 中调用存储过程

    ```


    此代码首先检查语句是否为 INSERT。如果是，它获取当前的事务上下文，并使用调用 `EMP_API` 包中名为 `INSERT_REC` 的存储过程的 SQL
    CALL 语句创建一个 `CallableStatement`。作为语句的一部分，问号表示参数。创建语句对象后，通过一些 `setString()` 调用将实体对象中的属性值连接到参数，然后执行该语句。


    如果操作不是 INSERT，则在 `else` 分支中通过调用 `super.doDML()` 来处理正常的 `doDML()` 处理。

