    \n### 连接 Bean\n\n为了使 ADF 在每次初始化时都能将 UI 状态 Bean 传递给页面切换器 Bean，我们使用了一项称为托管属性的 ADF\
    \ 功能。所有 Bean 都是托管 Bean；也就是说，由 ADF 框架创建和销毁它们。但 ADF 还可以管理这些 Bean 的属性。这是在任务流的“概述”选项卡下的“托管属性”标题下完成的，如图\
    \ 5-14 所示。\n\n![A437725_1_En_5_Fig14_HTML.jpg](img/A437725_1_En_5_Fig14_HTML.jpg)\n\
    图 5-14. 使用托管属性将 UI 状态连接到页面切换器 Bean\n\n要设置此属性，首先选择页面切换器 Bean，然后单击“托管属性”旁边的绿色加号以创建新的托管属性。每当创建页面切换器\
    \ Bean 时，ADF 将自动设置该属性。与属性“名称”匹配的设置器方法将使用“值”属性的内容被调用。例如，如果名称是 `uiState`，ADF 将调用\
