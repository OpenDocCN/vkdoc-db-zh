    The logs can also be seen in Enterprise Manager, allowing your WebLogic administrator
    to see how your application is doing. Possibly, developers can even instruct operations
    personnel what they might do to alleviate any problems revealed by the logs. This
    could be the case if an ADF application is unable to contact the database or an
    external service.


    When you view logs in Enterprise Manager Grid Control, you see all the logs created
    on that specific managed server. You will likely have to filter the log to track
    down an issue. Similar to the way the Oracle Diagnostic Log Analyzer works in
    JDeveloper, you can search for a log message that contains a specific string and
    then click View Related Messages and find the messages from the same server roundtrip
    by choosing by ECID (Execution Context ID).


    Oracle has also announced a very interesting cloud service called Oracle Management
    Cloud . This cloud service can receive log files from all types of applications
    and present a comprehensive overview with visualizations and drill-down capability.
    One of the log inputs that Oracle Management Cloud will ingest is logs from ADF
    applications, both from ADF applications running on a WebLogic server in your
    datacenter and from ADF applications deployed to the Oracle Java Cloud Service.
    It was not released at the time of writing, but go to cloud.oracle.com and see
    if it is available and whether it would fit your needs.


    Finally, you can read the raw log files yourself or configure some tool to monitor
    and present them. The ADF log entries are written to the WebLogic server log for
    the managed server you deploy your application to. If you deploy to a managed
    server called `MyManagedServer`, you find your ADF entries in the `MyManagedServer-diagnostic.log`
    file. Your server administrator can help you find this file, and can also use
    Enterprise Manager to move it to another location.


    Note


    If you don’t have access to the server file system, ask your server administrator
    if the log files from test servers could be placed on a shared network drive.


    If you want to look at the log files from the WebLogic server built into JDeveloper,
    you find these in the domain home directory. On Windows, this will be something
    like `C:\Users\<your_user>\AppData\Roaming\<systemX.Y.Z>\DefaultDomain\servers\DefaultServer\logs\DefaultServer-diagnostic.log`.


    ## Normal Debugging


    JDeveloper is a complete Integrated Development Environment (IDE), so it, of course,
    contains all the debugging features you expect.


    ### Setting a Breakpoint


    To debug your Java code, you open the relevant class and click in the left margin
    to set a breakpoint . It is marked with a red dot and a red background behind
    the line with the breakpoint, as shown in Figure [6-4](#A437725_1_En_6_Chapter.html#Fig4).


    ![A437725_1_En_6_Fig4_HTML.jpg](A437725_1_En_6_Fig4_HTML.jpg)


    Figure 6-4.


    Setting a breakpoint


    It is also marked in the right-hand margin with a small pink box, and if you are
    displaying the mini-map, the line with the breakpoint shows up as a pink line
    there as well. You can click in the mini-map or in the right margin to jump to
    a breakpoint (or any other point in the code).


    Note


    The Mini-map to the right in source view gives you a quick overview of large classes.
    You can right-click and set various settings and hide the map. To display it again,
    press Alt+Shift+period or choose Source ➤ Show Mini-Map from the right-click context
    menu in the source.


    If you hover with the mouse over the red breakpoint dot in the left margin, you
    get a pop-up dialog , as shown in Figure [6-4](#A437725_1_En_6_Chapter.html#Fig4).
    In this dialog, you can choose, for example, to stop only when you reach the breakpoint
    the fifth time or stop based on some condition. If you right-click the breakpoint
    dot and choose Edit Breakpoint, you get even more options to customize the breakpoint
    .


    ### Running in Debug Mode


    Once you have set the breakpoints you need, you right-click a runnable element
    and choose Debug (instead of the normal Run).


    For task flows in subsystems, you normally run a test page containing the task
    flow you want to debug. To test the Java classes in your application, you will
    normally have unit test classes that invoke them, so you can just run these unit
    tests to invoke and debug your classes.


    If the built-in WebLogic server is already started in normal (Run) mode, you will
    be prompted if you want to restart the server. Running in Debug mode is a bit
    slower and requires you to restart WebLogic, so JDeveloper protects you from accidentally
    changing between Run and Debug modes.'
  trans: '#### 在 JDeveloper 中读取日志


    当你在`JDeveloper`内置的 WebLogic 服务器中运行应用程序时，你会看到日志条目出现在日志窗口中。`ADF`不会区分你编写的日志语句和`ADF`自身产生的日志。`JDeveloper`的默认配置为`ADF`包设置了一个相当高的阈值，因此除非你添加或重新配置了记录器，否则应该不会看到大量`ADF`内部日志信息。


    注意

    即使你通过拖放组件到页面上来构建页面，你也可能会收到一些`ADF`警告。实际上，这是`JDeveloper`在抱怨它自己生成的代码。这些警告可以安全地忽略。通常不值得花时间去追踪和修复根本原因。


    不要在“操作”菜单中取消选择名为`Verbose Server Log`的选项。这虽然能减少日志输出，但不会区分你的日志和内部`ADF`日志，因此你也看不到任何自己的日志。


    如果你有一个很大的日志文件，可以使用`Oracle 诊断日志分析器 (ODLA)`来检查它。要启动它，你从“操作”按钮菜单中选择`Analyze Log ➤
    Current in Console`。`ODLA`会如图 6-3 所示打开。


    ![A437725_1_En_6_Fig3_HTML.jpg](img/A437725_1_En_6_Fig3_HTML.jpg)

    图 6-3. Oracle 诊断日志分析器


    在`ODLA`窗口顶部，你可以输入搜索条件并执行搜索。最常见的搜索是在顶部的单选按钮组中选择`By Log Message`。在底部的搜索条件行中，你通常会在第一个下拉菜单中选择`Message`，在第二个中选择`Contains`，然后输入一个搜索字符串。


    在`ODLA`窗口下半部分的结果区域中，请注意左侧概览框右上角的小三角形。这允许你选择要在概览中查看哪些属性。如图 6-3 所示，如果你选择了`Related`，你会得到一列带有一个小图标的字段。


    这是一个非常强大的功能。如果你点击那个小图标，你会得到一些选项，包括`Related by Request`。如果你选择这个选项，你会看到由同一次服务器往返触发的所有日志消息。这让你能够看到由于相同用户交互（通常是鼠标点击或按键）而在所有类中发生的一切。拥有问题发生之前的消息通常非常有帮助，特别是当其他事件产生的无关消息被过滤掉时。


    #### 在其他工具中读取日志


    当你将应用程序部署到外部 WebLogic 服务器用于测试或生产时，日志配置不会被包含在内。你需要在每个 WebLogic 服务器上单独配置日志记录。这意味着，即使你在`JDeveloper`内置的
    WebLogic 服务器中配置了大量日志记录，当你将应用程序部署到另一个 WebLogic 服务器时，默认情况下你将看不到任何日志记录。


    在独立的 WebLogic 服务器上，你在 Enterprise Manager 中配置日志记录。为此，在`Application Deployments`下找到`ADF`应用程序，然后选择`Application
    Deployment ➤ ADF ➤ ADF Log Configuration`。


    日志也可以在 Enterprise Manager 中查看，这让你的 WebLogic 管理员能够了解你的应用程序运行状况。甚至，开发人员可以指导运维人员采取某些措施来缓解日志中揭示的问题。例如，当`ADF`应用程序无法联系数据库或外部服务时，就可能出现这种情况。


    当你在 Enterprise Manager Grid Control 中查看日志时，你会看到该特定托管服务器上创建的所有日志。你很可能需要过滤日志以追踪问题。类似于`JDeveloper`中`Oracle
    诊断日志分析器`的工作方式，你可以搜索包含特定字符串的日志消息，然后点击`View Related Messages`，并通过选择`by ECID (Execution
    Context ID)`来查找来自同一次服务器往返的消息。


    Oracle 还宣布了一项非常有趣的云服务，名为`Oracle Management Cloud`。这项云服务可以接收来自各类应用程序的日志文件，并提供带有可视化和下钻功能的综合概览。`Oracle
    Management Cloud`将接收的日志输入之一就是来自`ADF`应用程序的日志，这些应用程序既包括在您数据中心 WebLogic 服务器上运行的`ADF`应用，也包括部署到`Oracle
    Java Cloud Service`上的`ADF`应用。在撰写本文时它尚未发布，但你可以访问`cloud.oracle.com`查看它是否可用以及是否符合你的需求。


    最后，你可以自己阅读原始日志文件，或者配置一些工具来监控和展示它们。`ADF`日志条目会写入你部署应用程序所对应的托管服务器的 WebLogic 服务器日志中。如果你部署到一个名为`MyManagedServer`的托管服务器，你可以在`MyManagedServer-diagnostic.log`文件中找到你的`ADF`条目。你的服务器管理员可以帮助你找到这个文件，也可以使用
    Enterprise Manager 将其移动到其他位置。


    注意

    如果你无法访问服务器文件系统，请询问你的服务器管理员，是否可以将测试服务器的日志文件放在共享网络驱动器上。


    如果你想查看`JDeveloper`内置 WebLogic 服务器的日志文件，你可以在域主目录中找到它们。在 Windows 上，路径类似于`C:\Users\<你的用户名>\AppData\Roaming\<systemX.Y.Z>\DefaultDomain\servers\DefaultServer\logs\DefaultServer-diagnostic.log`。


    ## 常规调试


    `JDeveloper`是一个完整的`集成开发环境 (IDE)`，因此它当然包含了你期望的所有调试功能。


    ### 设置断点


    要调试你的 Java 代码，你需要打开相关的类，然后在左侧边距处点击以设置一个断点。它会用一个红点和该行代码的红色背景标记出来，如图 6-4 所示。


    ![A437725_1_En_6_Fig4_HTML.jpg](img/A437725_1_En_6_Fig4_HTML.jpg)

    图 6-4. 设置断点


    它在右侧边距也会用一个小粉色方框标记。如果你显示了迷你地图，带有断点的行在那里也会显示为粉红线。你可以在迷你地图或右侧边距点击，以跳转到某个断点（或代码中的任何其他位置）。


    注意

    源代码视图右侧的迷你地图可以让你快速概览大型类。你可以右键单击并设置各种选项以及隐藏该地图。要再次显示它，请按`Alt+Shift+句点`或在源代码中右键单击上下文菜单中选择`Source
    ➤ Show Mini-Map`。


    如果你将鼠标悬停在左侧边距的红色断点圆点上，会弹出一个对话框，如图 6-4 所示。在这个对话框中，你可以选择，例如，只在第五次到达该断点时停止，或者基于某些条件停止。如果你右键单击断点圆点并选择`Edit
    Breakpoint`，你会获得更多选项来定制该断点。


    ### 以调试模式运行


    一旦设置了所需的断点，你就可以右键单击一个可运行的元素并选择`Debug`（而不是通常的`Run`）。


    对于子系统中的任务流，你通常运行一个包含要调试的任务流的测试页面。要测试应用程序中的 Java 类，你通常会有调用它们的单元测试类，因此你可以直接运行这些单元测试来调用和调试你的类。


    如果内置的 WebLogic 服务器已经以正常（`运行`）模式启动，系统会提示你是否要重启服务器。以`调试`模式运行会稍慢一些，并且需要重启 WebLogic，因此`JDeveloper`会保护你免于意外地在`运行`和`调试`模式之间切换。'
- fmt: '### Stepping Through Code


    When you reach a breakpoint in your code, execution stops and JDeveloper highlights
    the current line in the code. If you break before anything is returned to the
    web browser, the browser is just blank, showing the indication that a response
    has not been received yet.


    With execution stopped, you have several options:


    *   Step over (`F8`)

    *   Step into (`F7`)

    *   Step out (`Shift+F7`)

    *   Step to end of method

    *   Run to cursor (`F4`)

    *   Resume (`F9`)


    Some of these options are available from the toolbar above the source view, and
    all of them can be found on the Source menu.


    The normal approach is to use Step Over to execute the code in your class line
    by line. JDeveloper shows execution times, some variables, and some control flow
    in the far left margin, as shown in Figure [6-5](#A437725_1_En_6_Chapter.html#Fig5).


    ![A437725_1_En_6_Fig5_HTML.jpg](A437725_1_En_6_Fig5_HTML.jpg)


    Figure 6-5.


    Debugging code in JDeveloper


    By default, the far left margin (to the left of the line numbers in the regular
    margin) is rather narrow, but you can grab the edge of it to see more of the debug
    information, as shown in the preceding figure.


    Step Into will step into the class that contains the method invoked by the currently
    open class. If the current line of code invokes methods from multiple other classes,
    you are prompted to select which class you want to step into. This is useful if
    you have a nested call hierarchy in your own code, but will sometimes just take
    you into the ADF source code from Oracle. Unless you have requested and installed
    the source code as explained later in this chapter, attempting to step into the
    ADF code will just give you an error about missing source code.


    You can also just click to place the cursor further down in the code and press
    `F4` to Run to Cursor. When you have gathered the information you need, you press
    Resume (`F9`) to allow JDeveloper to continue the execution.


    ### Gathering Information


    When you start the built-in WebLogic server in debug mode, JDeveloper automatically
    opens several new tabs for you in the Log window :


    *   `Data`

    *   `Smart Data`

    *   `Watches`

    *   `EL Evaluator`

    *   `ADF Data`

    *   `Breakpoints`


    The Data tab shows information about all the objects currently in memory, while
    the Smart Data tab makes a guess at what is most relevant to you at this point
    in the code and only shows you this.


    If you are interested in something that is not in either of these windows, you
    can add a Watch on the Watches tab. You can either type in an expression or select
    something in the code view, right-click, and choose Watch.


    The EL Evaluator allows you to evaluate the value of an expression language expression,
    which is especially useful when debugging task flows as described in the following.


    The ADF Data tab shows you everything in the ADF memory scopes (pageFlowScope,
    requestScope, etc.), and the Breakpoints tab gives an overview of all breakpoints
    in your code. You can close the tabs you don’t need and reopen these and other
    debug tabs from the Debugger submenu of the JDeveloper Window menu.


    In addition, you can place the cursor on any variable and press `Ctrl+I` (or right-click
    and choose Inspect) to open an independent pop-up Inspector window showing that
    variable.


    ### Debugging Task Flows


    Debugging code works when you can figure out which code is causing the problem.
    But sometimes, it can be hard to find the code that is running, or the execution
    flow through the application takes a different path from what you expect. Fortunately,
    JDeveloper offers you the ability to debug at a higher level than code: in the
    task flows.


    To debug a task flow, you open it in the Diagram view and right-click a task flow
    activity. It gets a little red dot, as shown in Figure [6-6](#A437725_1_En_6_Chapter.html#Fig6).


    ![A437725_1_En_6_Fig6_HTML.jpg](A437725_1_En_6_Fig6_HTML.jpg)


    Figure 6-6.


    Setting a breakpoint in a task flow


    When you run the application, execution stops at the breakpoint in the task flow.
    In JDeveloper, focus is on the task flow diagram with the active breakpoint, and
    JDeveloper is often moved to the foreground of your development machine (in front
    of the active browser window).


    When you have stopped execution in a task flow, there isn’t really any code to
    step through, but you can examine the state of the application using expression
    language (EL). You do this on the Expression Language tab in the Log window, as
    shown in Figure [6-7](#A437725_1_En_6_Chapter.html#Fig7).


    ![A437725_1_En_6_Fig7_HTML.jpg](A437725_1_En_6_Fig7_HTML.jpg)


    Figure 6-7.


    Evaluating Expression Language when debugging task flow


    From this window, you can check values in managed beans and ADF internal values
    exposed as EL. Examples:


    *   `#{pageFlowScope.myBean.myAttribute}` will give you the value of the attribute
    `myAttribute` in the bean `myBean` in page flow scope. Note that if you choose
    the wrong scope, the expression language will just evaluate to null.

    *   `#{securityContext.userName}` will give you the name of the currently logged-in
    user. If the user has not logged in, this value will evaluate to `anonymous`.

    *   `#{facesContext.viewRoot.locale.language}` will give you the current language
    the application is running in (from the browser). This can be useful to debug
    translation or localization errors.


    ### Debugging into ADF Libraries


    As you saw in Chapter [2](#A437725_1_En_2_Chapter.html), an ADF application normally
    consists of several subsystems and a master application. Each subsystem is deployed
    as an ADF library, and the master application uses these libraries. But how do
    you debug a complete application when the bug you are chasing does not occur when
    testing the individual task flow? The solution is simple: you include the source
    code with the subsystems’ ADF library.


    ### Deploying Source Code


    To allow the debugger to break in subsystem code and to display the relevant source
    code, it needs access to the source code. By default, an ADF library contains
    only the compiled Java class files (the bytecode), but not the source files. That
    is fine for deploying a production application where you don’t want to bloat your
    libraries with source code the end user doesn’t need. In some cases, your ADF
    application might even be used by an end customer that you don’t want poking around
    in your source code.


    But for debugging, you need to deploy the source code from your subsystems. To
    do this, you create a separate deployment profile that will package your source
    code into a JAR file. Choose the normal `File` ➤ `New` ➤ `General` ➤ `Deployment
    Profiles` and then choose `JAR File` (instead of the normal `ADF Library JAR File`).
    You should decide on standard naming for your source JAR files—I recommend prefixing
    them with `source`, for example, `sourceDeptEmp`.


    In the `Edit JAR Deployment Profile Properties` dialog, you need to open `File
    Groups` ➤ `Project Output` ➤ `Contributors` and change the default content that
    JDeveloper suggests. You do not need `Project Output Directory` and `Project Dependencies`,
    but you do need `Project Source Path`, as shown in Figure [6-8](#A437725_1_En_6_Chapter.html#Fig8).


    ![A437725_1_En_6_Fig8_HTML.jpg](A437725_1_En_6_Fig8_HTML.jpg)


    Figure 6-8.


    Setting properties for a source JAR deployment'
