- fmt: '### Accessors


    If you generate accessors for an attribute, you can modify the value being stored
    in the `setXXX()` method and modify the return value in the `getXXX()` method.


    For example, you could modify the `setEmail()` method to always convert the value
    to lowercase, as shown in Listing [4-1](#A437725_1_En_4_Chapter.html#Par69).


    ```

    package com.vesterli.hrdemo.foundation.model.entity;

    ...

    import com.vesterli.hrdemo.foundation.bcbase.EntityImpl;

    ...

    public class EmployeesImpl extends EntityImpl {

    ...

    /**

    * Sets value as the attribute value for Salary.

    * @param value value to set the Salary

    */

    public void setEmail (String value) {

    setAttributeInternal(EMAIL, value.toLowerCase());

    }

    ...

    }

    Listing 4-1.

    Overriding an Accessor

    ```


    If you want to mask values, you can override the `getXXX()` method to return a
    masked value for some or all users. For `String` attributes, you can simply override
    the getter method to return `******` instead of the actual value. For numeric
    attributes like `Salary`, you can only return numeric values, so the solution
    is to use a transient String attribute.


    You can add transient attributes to an entity object on the Attributes tab by
    clicking the green plus icon and choosing New Attribute and adding a `String`
    attribute, for example with the attribute name `SalaryString`. When done, mark
    the attribute Transient on the Details tab so ADF will not try to include it in
    the SQL sent to the database.


    When you create Accessors for an entity object, a setter and getter method is
    also created for transient attributes. You can add logic to the `getSalaryString()`
    method to return the true value only to users with the `salary-admin-role` and
    a series of asterisks if the user does not have this role. This is shown in Listing
    [4-2](#A437725_1_En_4_Chapter.html#Par73).


    ```

    package com.vesterli.hrdemo.foundation.model.entity;

    ...

    import com.vesterli.hrdemo.foundation.bcbase.EntityImpl;

    import oracle.adf.share.ADFContext;

    import oracle.adf.share.security.SecurityContext;

    ...

    public class EmployeesImpl extends EntityImpl {

    /**

    * Gets the attribute value for Salary, using the alias name Salary.

    * @return the value of Salary

    */

    public BigDecimal getSalary() {

    throw new JboException("Internal error reading Salary");

    }

    /**

    * Sets value as the attribute value for Salary.

    * @param value value to set the Salary

    */

    public void setSalary(BigDecimal value) {

    throw new JboException("Internal error writing Salary");

    }

    /**

    * Gets the attribute value for SalaryString,

    * using the alias name SalaryString.

    * @return the value of SalaryString

    */

    public String getSalaryString() {

    ADFContext actx = ADFContext.getCurrent();

    SecurityContext sctx = actx.getSecurityContext();

    if (sctx.isUserInRole("salary-admin-role")) {

    return ((BigDecimal) getAttributeInternal(SALARY)).toString();

    } else {

    return "*******";

    }

    }

    /**

    * Sets value as the attribute value for SalaryString.

    * @param value value to set the SalaryString

    */

    public void setSalaryString(String value) {

    try {

    BigDecimal sal = new BigDecimal(value);

    ADFContext actx = ADFContext.getCurrent();

    SecurityContext sctx = actx.getSecurityContext();

    if (sctx.isUserInRole("salary-admin-role")) {

    setAttributeInternal(SALARY, sal);

    } else {

    throw new JboException("User not allowed to change salary");

    }

    } catch (NumberFormatException e) {

    throw new JboException("Salary must be numeric");

    }

    }

    ...

    }

    Listing 4-2.

    Masking Values with a Transient Attribute

    ```


    The listing also overrides the setter, taking the `String` value and converting
    into the necessary `BigDecimal`. It then implements the same access control logic
    you saw in the previous listing before calling the internal method to set the
    actual `Salary` attribute that corresponds to the database column. With both a
    custom setter and getter implemented, the user interface can work with this `SalaryString`
    attribute instead of the original `Salary`.


    **Tip**


    To prevent a UI developer from accidentally using the original `Salary` attribute,
    the code in Listing [4-2](#A437725_1_En_4_Chapter.html#Par73) throws an exception
    if the application tries to manipulate that attribute directly. You can also set
    the Display property of the `Salary` attribute to Hide (on the UI Hints tab) to
    further reduce the risk of a developer using it.


    ### Working with the Database


    #### Handling Database Triggers


    Your database might contain triggers that change values after insert or update.
    If this is the case, you need to tell the entity object to expect these changes
    and make sure it updates itself. This is done for each attribute on the Attributes
    tab. On the Details subtab, you check the Refresh on Insert and/or Refresh on
    Update check boxes, as shown in Figure [4-8](#A437725_1_En_4_Chapter.html#Fig8).


    ![A437725_1_En_4_Fig8_HTML.jpg](A437725_1_En_4_Fig8_HTML.jpg)


    Figure 4-8.

    Refresh attribute on insert


    This setting tells ADF to reread that attribute from the database after an insert
    or an update, respectively.


    In an Oracle database, triggers are often used to provide primary key values.
    In this case, you need to set Refresh after Insert. When working with an Oracle
    database, ADF makes use of the Oracle-specific `RETURNING … INTO` clause to get
    updated values back from the database in one roundtrip. For other databases, it
    will take an extra roundtrip from the application server to the database to refresh
    the attributes.


    #### Calling Stored Procedures


    When you override the `doDML()` method, JDeveloper automatically places a call
    to `super.doDML()` in your entity object Java class. This ensures that normal
    ADF entity object processing takes place, sending an INSERT, UPDATE, or DELETE
    SQL statement to the database.


    However, you remove this call if you don’t want this to happen. This can be useful
    for example if you want all inserts into the table to be handled by a stored procedure
    in the database. In this case, you want ADF to call that procedure instead of
    sending an INSERT to the database. For example, if you have an `EMP_API` package
    containing a procedure `INSERT_REC` taking four parameters, this could look as
    shown in Listing [4-3](#A437725_1_En_4_Chapter.html#Par81).


    ```

    /**

    * Custom DML update/insert/delete logic here.

    * @param operation the operation type

    * @param e the transaction event

    */

    protected void doDML(int operation, TransactionEvent e) {

    CallableStatement cstmt = null;

    if (operation == DML_INSERT) {

    String insStmt = "{call emp_api.insert_rec(?,?,?,?)}";

    cstmt = getDBTransaction().createCallableStatement(insStmt, 0);

    try {

    cstmt.setString(1, getFirstName());

    cstmt.setString(2, getLastName());

    cstmt.setString(3, getJobId());

    cstmt.setInteger(4, getDepartmentId());

    }

    catch (Exception ex) {

    // Handle SQL exceptions

    } finally {

    try {

    cstmt.close();

    } catch (SQLException ex) {

    // if error closing, ignore

    }

    }

    } else {

    super.doDML(operation, e);

    }

    }

    Listing 4-3.

    Calling a Stored Procedure in doDML()

    ```


    This code first checks if the statement is an INSERT. If so, it gets the current
    transaction context and creates a `CallableStatement` with an SQL CALL statement
    calling a stored procedure called `INSERT_REC` in the `EMP_API` package. As part
    of the statement, question marks indicate parameters. After the statement object
    is created, the attribute values from the entity object are connected to the parameters
    with some `setString()` calls, and the statement is executed.


    If the operation was not an INSERT, normal `doDML()` processing is handled in
    the `else` branch with a call to `super.doDML()`.'
