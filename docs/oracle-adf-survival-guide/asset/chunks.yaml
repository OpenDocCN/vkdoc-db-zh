    # 瀑布流布局


    瀑布流布局管理器以网格形式动态排列特殊格式的详细信息项。虽然“瀑布流”这个名字可能让人联想到固定的墙壁，但实际上它是一种非常动态的布局，会在页面首次渲染时排列“砖块”，并在应用程序浏览器窗口每次更改大小时重新排列它们。ADF
    文档将砖块称为瓦片。


    这种布局适用于仪表板类型的应用程序，其中有许多小的信息元素需要呈现。小型数据可视化组件（如环形图）在瀑布流布局中效果很好，既可以单独使用，也可以作为链接指向包含更详细信息的其他页面。


    有几种不同的布局组件可以用作砖块——最常见的是 `Panel Box` 和 `Panel Group Layout`。文档没有具体说明哪些组件适用，但大多数组件不能作为砖块在瀑布流布局中使用。


    **提示**


    在当前版本的 JDeveloper (12.2.1.2.0) 中创建瀑布流布局时，它默认填充了两个 `Panel Box` 组件。默认的 `Panel Box`
    可以折叠，但不幸的是，瀑布流布局不会注意到这一点，从而导致布局错位。将 `Show Disclosure` 属性更改为 `false`，这样用户就不会弄乱瀑布流布局。


    就像乐高积木一样，瀑布流布局中的砖块都必须具有标准尺寸。瀑布流布局的默认最小砖块尺寸为 170 × 170 像素，所有其他砖块都是此尺寸的倍数，同时考虑了砖块之间的间距。


    ## 砖块尺寸


    瀑布流布局中组件的尺寸必须使用 `Style Class` 属性来定义。Oracle 为我们提供了八种标准尺寸：


    *   `AFMasonryTileSize1x1`

    *   `AFMasonryTileSize1x2`

    *   `AFMasonryTileSize1x3`

    *   `AFMasonryTileSize2x1`

    *   `AFMasonryTileSize2x2`

    *   `AFMasonryTileSize2x3`

    *   `AFMasonryTileSize3x1`

    *   `AFMasonryTileSize3x2`


    如果这些尺寸都不符合您的需求，瀑布流布局还可以识别更高的尺寸类名，最高可达 `AFMasonryTileSize10x10`。但是，如果您想使用这些更大的尺寸，必须在您的皮肤
    CSS 文件中定义相应的 CSS 类。


    1 × 1 砖块的默认尺寸是 170 × 170 像素。默认边框是 8 像素，因此两个相邻砖块之间的距离是 16 像素。为了使瀑布流正确对齐，较大的砖块尺寸必须是基础尺寸加上砖块间距的倍数。例如，两个相邻的
    1 × 1 砖块的总宽度是 2 × 170 像素 + 它们之间 2 × 8 像素的边框。因此，2 × 1 砖块的宽度是 356 像素。


    **注意**


    可以在您自己的 CSS 文件中覆盖 `AFMasonryTileSize` 类，从而创建具有不同砖块尺寸的瀑布流布局。因为瀑布流布局是 ADF 12.2 中的一项全新功能，仍有一些不足之处，所以不建议使用非标准的砖块尺寸。


    ## 运行时砖块对齐


    在运行时，ADF 通过按照它们在 `<af:masonryLayout>` 标签内列出的顺序添加砖块来呈现瀑布流布局。它们按照从左到右的阅读顺序添加（除非您的
    ADF 应用程序配置为从右到左的语言）。砖块一次添加一个，直到下一个砖块无法再放入当前行。无法放入的砖块将成为新行的第一个砖块。一旦布局有多行，ADF 就会尝试将下一个砖块放入每行的任何开放空间中。只有当它无处可放时，才会将其添加到底部行的末尾。


    例如，如果一个宽的 3x1 砖块导致 ADF 开始第二行，它仍然可能将任何后续的 1x1 或 2x1 砖块放入第一行。同样，ADF 会尝试填充由不同高度的砖块留下的任何空隙。


    ## 瀑布流最佳实践


    如果您有很多大砖块，如图 3-5 所示，ADF 无法真正将它们很好地组合成一个美观的布局。


    ![A437725_1_En_3_Fig5_HTML.jpg](img/A437725_1_En_3_Fig5_HTML.jpg)


    图 3-5. 瀑布流布局中有太多大砖块


    要使瀑布流布局良好运行，您需要有充足的小 (1 × 1) 砖块供应，以便 ADF 可以将它们放入大砖块留下的任何空间中，如图 3-6 所示。


    ![A437725_1_En_3_Fig6_HTML.jpg](img/A437725_1_En_3_Fig6_HTML.jpg)


    图 3-6. 有足够小砖块的瀑布流布局


    在大显示器上，瀑布流布局最终会变成单行，如图 3-7 所示，除非您限制它。


    ![A437725_1_En_3_Fig7_HTML.jpg](img/A437725_1_En_3_Fig7_HTML.jpg)


    图 3-7. 非常宽的瀑布流布局


    为了避免这种情况，您可以将瀑布流布局放置在另一个具有宽度限制的容器内。您可以将其放在一个 `Panel Group Layout` 中，并将其 `InlineStyle`
    属性设置为，例如 `max-width:750px`。


    # 屏幕相关格式化


    瀑布流布局是实现响应式设计的一种自动方式——ADF 尽可能地将定义的砖块放入布局中。


    然而，ADF 还提供了另一种根据屏幕大小控制页面布局的方法：通过 `<af:matchMediaBehavior>` 标签。当您将此标签放置在另一个组件内部时，它可以控制其周围标签的某些属性。例如，您可以控制
    `Panel Form Layout` 的 `Rows` 属性，如代码清单 3-2 所示。


    ```

    ...

    ```


    代码清单 3-2. 使用 `<af:matchMediaBehavior>`


    在此示例中，`Panel Form Layout` 的 `Rows` 属性具有默认值 `6`，但如果屏幕尺寸低于 768 像素，`Rows` 的值将更改为
    `12`。


    `<af:matchMediaBehavior>` 的属性指定了要更改的包含标签的哪个属性（`propertyName`），以及该属性的值应是什么（`matchedPropertyValue`）。条件放在
    `mediaQuery` 属性中，并遵循标准的 CSS3 媒体查询语法。


    重要的是，该属性必须在包含标签中显式定义——在本例中，即 `Panel Form Layout` 必须定义了 `Rows` 属性。否则，您的应用程序将因 `NullPointerException`
    而失败。


    在撰写本书时当前版本的 ADF (12.2.1.2.0) 中，`<af:matchMediaBehavior>` 标签除了文档中的一个简短示例外没有其他文档——它甚至没有出现在在线标签文档
    [`docs.oracle.com/middleware/12212/adf/tag-reference-faces/toc.htm`](http://docs.oracle.com/middleware/12212/adf-tag-reference-faces/toc.htm)
    中。它似乎无法做太多事情，除了更改这个特定属性。如果您能更改元素的宽度，那将非常有用，但在当前版本中似乎无法实现。如果能够更改 `Rendered` 属性（控制特定组件是否显示），那也将是一个极好的功能。


    **注意**


    请查阅文档和标签指南，以了解 `<af:matchMediaBehavior>` 的功能是否自本书撰写以来有所改进。


    # 样式


    所有 ADF 组件都有可接受的默认视觉外观。然而，大多数组织都希望以某种方式更改外观，而 ADF 支持这一点。由于 ADF 应用程序是在浏览器中运行的 Web
    应用程序，因此普通的层叠样式表 (CSS) 样式适用于 ADF 组件。本节介绍如何更改单个组件的外观。


    几乎每个 ADF 组件都有一个 `InlineStyle` 属性，您可以在其中编写 CSS 样式。一些组件还有一个 `ContentStyle` 属性，少数组件还有一个额外的
    `LabelStyle` 属性。


    还有一个 `StyleClass` 属性，您可以在其中输入对 CSS 样式类的引用。使用此属性需要您的应用程序有一个单独的 CSS 文件。

