  trans: '

    # 1. 拖放式构建


    `Oracle 应用开发框架 (ADF)` 提供极高生产力的秘诀在于无需编写代码即可构建大量功能。在构建 `ADF` 应用程序时，您应该力求编写尽可能少的代码，使用
    `JDeveloper` 通过拖放方式组合应用程序中每个页面的初始版本。


    本章将介绍如何使用 `ADF 业务组件` 向导和图形化任务流构建器，以及如何构建具有自动数据绑定的页面。


    ## ADF 应用程序的剖析


    `Oracle` 最初是一家数据库公司，这一传统在其大多数开发工具中熠熠生辉。像 `Oracle Forms`、`Oracle Application Express
    (APEX)` 和 `Oracle ADF` 这样的工具都基于一个前提：您已经拥有一个设计良好的关系型数据库，其中包含存储数据所需的所有表。


    在数据库之上，`ADF` 应用程序有两层：业务服务层和用户界面层。在这两层之间，您会发现绑定层，它定义了用户界面层如何连接到业务服务层。图 1-1 展示了
    `ADF` 的高层架构。


    ![A437725_1_En_1_Fig1_HTML.jpg](img/A437725_1_En_1_Fig1_HTML.jpg)


    图 1-1.

    `ADF` 高层架构


    ### 业务服务层


    业务服务层提供应用程序的主要功能。这包括各种计算、业务规则，以及非常重要的数据存储功能。业务服务层背后可能是其他技术——通常会有一个关系型数据库来存储数据，但您的
    `ADF` 应用程序也可以纯粹基于 Web 服务。在本书中，我们将讨论业务服务层由基于 `Oracle` 数据库表的 `ADF` 业务组件组成的 `ADF`
    应用程序。这是构建 `ADF` 应用程序最常见的方式，也是 `Oracle` 推荐的方法。


    ### 用户界面层


    用户界面层包含用户将用来与您的应用程序交互的网页。构建用户界面层涉及：


    *   决定您的应用程序将包含哪些页面

    *   定义页面间的导航流程

    *   设计包含字段、按钮和其他用户界面组件的实际页面


    ### 绑定层


    绑定层将用户界面层连接到业务服务层，是 `Oracle ADF` 的“秘诀”。当您使用 `JDeveloper` 中的拖放功能创建应用程序时，绑定层会自动为您创建。因此，即使从不接触绑定层，也可以构建功能完备的
    `ADF` 应用程序。但由于对绑定层的基本理解在现实的 `ADF` 应用程序开发中非常有用，我们将在本章末尾简要讨论它。


    ### 创建 ADF 工作区


    一个企业级 `ADF` 应用程序由许多工作区组成，每个工作区生成整体应用程序的一部分。当您使用 `ADF` 时，您在 `JDeveloper` 中通过 `文件
    ➤ 新建 ➤ 应用程序` 创建工作区，并选择 `ADF Fusion Web 应用程序` 类型。当您创建这样一个工作区时，`JDeveloper` 会自动在工作区内创建两个项目：


    *   用于业务组件的模型项目

    *   用于用户界面的视图/控制器项目


    `JDeveloper` 还会自动为每个项目添加正确的 `ADF` 库，并在它们之间定义依赖关系，因此视图/控制器项目可以访问在模型项目中创建的业务组件。


    `JDeveloper` 将工作区称为“应用程序”。这是一个不太恰当的措辞，因为除了最简单的 `ADF` 应用程序外，其他所有应用程序都会涉及多个工作区。


    ## 数据库业务组件


    如引言所述，`Oracle ADF` 应用程序通常构建在关系型数据库之上。`Oracle JDeveloper` 提供了多个向导，使您能够轻松构建业务服务层所需的所有类型的
    `ADF` 业务组件。主要有五种类型的业务组件：


    *   `实体对象`：这些对象直接对应表，因此您应用程序使用的每个表都将有一个实体对象。实体对象处理将属性值更改转换为发送到数据库的 `INSERT`、`UPDATE`
    和 `DELETE` 语句的技术细节。

    *   `关联`：这些对象定义实体对象之间的关系，对应于数据库中的外键关系。`JDeveloper` 向导通常会自动检测外键并创建匹配的关联，但您也可以手动创建它们。

    *   `视图对象`：这些对象定义特定用例所需的具体数据。一个视图对象可以使用来自多个实体对象（因此也来自多个表）的数据。例如，一个 `Employees`
    视图对象除了显示来自 `Employees` 实体对象的员工信息外，还可能显示来自 `Departments` 实体对象的部门名称。

    *   `视图链接`：这些对象表示视图对象之间的主从关系，并允许 `ADF` 协调从记录与主记录。例如，如果您显示一个部门及其员工列表，连接您的 `Departments`
    视图对象与 `Employees` 视图对象的视图链接可确保 `Employees` 视图对象仅显示该部门的记录。

    *   `应用程序模块`：这些对象收集应用程序或子系统中使用的所有视图对象的实例。应用程序模块控制数据库事务，允许您在应用程序模块中对许多不同的视图对象进行更改，然后在一个事务中提交或回滚所有更改。


    不同的 `ADF` 业务组件可以可视化为如图 1-2 所示。


    ![A437725_1_En_1_Fig2_HTML.jpg](img/A437725_1_En_1_Fig2_HTML.jpg)


    图 1-2.

    `ADF` 业务组件


    ### 保持条理


    您的 `ADF` 应用程序将包含大量所有五种类型的业务组件。为了更轻松地区分它们以便找到您需要的那一个，`JDeveloper` 提供了一个您应该设置的偏好设置。


    在 `JDeveloper` 偏好设置对话框的 `ADF Business Components` 节点下，更改每种类型的包前缀设置。此设置意味着每次 `JDeveloper`
    向导为您创建业务组件时，它都会自动将其放置在您的业务组件项目根包下适当命名的子包中。


    我建议使用如图 1-3 所示的设置。


    ![A437725_1_En_1_Fig3_HTML.jpg](img/A437725_1_En_1_Fig3_HTML.jpg)


    图 1-3.

    `ADF` 业务组件包的偏好设置

    '
- fmt: '## The Demo Wizard


    When you start out with Oracle ADF, you should build your business components
    using the Business Components from Tables wizard in `JDeveloper`. This wizard
    initializes the project for business components, including the creation of a database
    connection from `JDeveloper` to the database that contains your application tables.


    Make sure you select your business services layer (model) project before you start
    creating ADF Business components.


    **Tip**


    Decide on a database connection name early in the project and have everybody use
    that same name. When you combine your master application from multiple subsystems,
    it is much easier if everybody uses the same datasource name.


    It takes you through up to six steps and optionally shows a summary.


    1.  Create entity objects. You can query the database connection and select the
    tables you want to create entity objects for. The wizard automatically creates
    associations for all foreign keys in the database between the selected tables.

    2.  Create entity-based view objects. A default view object is created for each
    entity object you select. It will contain all attributes from the entity object.

    3.  Create query-based view objects. This step allows you to create additional
    view objects based directly on SQL queries and not entity objects. These will
    not be updatable.

    4.  Create an application module and add an instance of all view objects in all
    possible combinations.

    5.  Create any REST web services. You’ll need to define an initial version of
    the REST API to your business components and then select the view object you want
    to expose as REST web services.

    6.  Define which attributes you want included in each REST web service.


    You can end the wizard at any time after the first step by clicking **Finish**.


    Running the wizard and selecting the `EMPLOYEES` and `DEPARTMENTS` tables from
    the normal Oracle HR demo schema creates the business components shown in Figure
    1-4.


    ![A437725_1_En_1_Fig4_HTML.jpg](A437725_1_En_1_Fig4_HTML.jpg)


    **Figure 1-4.**

    ADF business components for `EMPLOYEES` and `DEPARTMENTS`


    ## Testing Business Components


    Because an ADF application consists of both a business services layer and a user
    interface layer, it can be hard to debug problems by just running the application
    and interacting with the user interface. You can’t tell if you should look for
    the problem in the business services layer or the user interface layer.


    To address this challenge, `JDeveloper` offers the Oracle ADF Model Tester. This
    small application can be started from within `JDeveloper` by right-clicking an
    application module and selecting **Run**. When you do that, the Oracle ADF Model
    Tester application starts, loads the application module you clicked, and presents
    all the view object instances inside the application module. You can click each
    view object to see the actual data in the database with all business component
    logic applied. The ADF Model Tester application looks as shown in Figure 1-5.


    ![A437725_1_En_1_Fig5_HTML.jpg](A437725_1_En_1_Fig5_HTML.jpg)


    **Figure 1-5.**

    ADF Model Tester


    You should always perform a simple test of your ADF business components with this
    little application to verify that your selection, validation, and business logic
    work the way you expect.


    ## Entity Objects


    Entity Objects correspond directly to database tables and handle object/relational
    mapping and data validation logic. There should be exactly one entity object for
    every database table, which allows you to implement business rules and validations
    in one place and be sure that it will always be applied.


    By default, the `JDeveloper` wizards that create entity objects will create one
    attribute for every column in the corresponding table. There is no performance
    penalty involved in having every column represented as an attribute, because ADF
    will automatically perform optimizations to only query the attributes/columns
    that are relevant in any given situation.


    ### Building Entity Objects


    Because entity objects correspond directly to tables, there are few decisions
    to make when creating entity objects. You can use the Business Components from
    Tables wizard to create your initial entity objects—just don’t select to create
    any view objects or application module.


    When you have created your entity objects, you should open each of them and define
    the default label for each attribute that will be displayed to the user. You do
    this on the **Attributes** tab under the **UI Hints** subtab, as shown in Figure
    1-6.


    ![A437725_1_En_1_Fig6_HTML.jpg](A437725_1_En_1_Fig6_HTML.jpg)


    **Figure 1-6.**

    Setting UI Hints for an entity object attribute


    The **Label** property and other elements on the **UI Hints** subtab will become
    the default values used in the user interface components showing that attribute.
    If you don’t specify anything here, the attribute name (derived from the underlying
    database column) becomes the default label. The values provided at the entity
    object level can be overridden in each view object based on the entity object.


    You might have a database trigger that creates primary key values for new records
    in the database. To tell ADF this, you need to change the type of your primary
    key attribute to the special `DBSequence` type. Open the entity object and then
    open the primary key attribute on the **Attributes** tab. When you change the
    **Type** field on the **Details** tab, several other settings change, including
    the **Refresh on Insert** setting. Together, these changes mean that your ADF
    application accepts that you don’t enter a primary key value when creating a new
    record, and that ADF will ask the database to return the new primary key value
    when issuing an `INSERT` statement.


    ### Building Associations


    If you build all your entity objects in one pass through the Business Components
    from Tables wizard, the wizard should automatically create associations for all
    foreign key relationships in the database. If you don’t create all entity objects
    at the same time, `JDeveloper` might not create the associations. In this case,
    you can create associations manually from `JDeveloper`. This is also necessary
    if your database for some reason does not contain foreign keys.


    To get the maximum benefit from the `JDeveloper` wizards, you should make sure
    that `JDeveloper` knows about the relations in your data model.


    ## View Objects


    Where entity objects are oriented toward the database, view objects are oriented
    toward the user. Each view object represents a specific set of data collected
    for a specific need. Your user interface defines the view objects you need, including
    which attributes must be included.'
