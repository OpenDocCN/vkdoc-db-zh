  trans: '### 页面模板


    许多 ADF 应用程序只有一个主页面，但您仍应将其基于页面模板构建，以便于后续扩展和/或开发其他应用程序。


    页面模板包含一些通用元素，例如页眉栏或您希望在每个页面上显示的公共页脚。您应在 `CommonUI` 项目中使用 `File ➤ New ➤ Web Tier
    ➤ JSF/Facelets ➤ ADF Page Template` 来创建它。在创建页面模板时，您通常需要复制一个快速启动布局。


    作为模板创建的一部分，您至少需要定义一个 facet，可能还需要定义属性，如图 2-8 所示。


    ![A437725_1_En_2_Fig8_HTML.jpg](img/A437725_1_En_2_Fig8_HTML.jpg)


    图 2-8. 定义模板 facet 和属性


    #### 使用 Facet


    Facet 是一个位置，模板使用者可以在其中添加他们自己的内容。一个模板通常有一个 facet，但如果您的布局需要两个独立的内容区域，也可能有多个。


    创建模板后，它会显示在 JDeveloper 主窗口中。在这里，您可以添加徽标、页眉等装饰元素。模板中的所有元素都将成为基于该模板的每个页面的一部分。


    在您希望放置实际页面内容的位置，从组件面板中拖放一个 Facet 定义 (`<af:facetRef>`)。系统会提示您输入 facet 名称，选项是您在创建模板时定义的那些
    facet。


    #### 使用属性


    通常，您希望能够更改放置在模板区域中的文本。例如，您的模板可能在页面顶部定义了一个彩色条，您希望将页面名称写在这个条内。在基于模板的页面上，您无法在模板区域内添加任何内容。但是，您可以为模板属性赋值。


    具体用法如下：


    -   定义模板时，创建一个属性（例如 `pageTitle`）。

    -   在模板中，将您希望显示页面名称的地方放置一个文本元素（例如 `<af:outputText>`）。将该文本元素的“值”属性设置为与属性对应（例如 `#{attrs.pageTitle}`）。为该文本元素应用您想要的任何样式（字体大小等）。

    -   基于该模板创建一个页面。在“源”视图中，选择 `<af:pageTemplate>` 元素，在“属性”窗口中找到模板属性的字段，并将其设置为所需的值。


    ### 页面片段模板


    您应用程序的主体将由有界任务流中的页面片段组成。因为这些片段将驻留在您应用程序的主页面内，所以它们通常不包含任何页眉或页脚等装饰。


    因此，您的页面片段模板通常仅包含一个拉伸的一列布局，以确保您的片段能充分利用页面上的所有可用空间。定义一个内容 facet 并将该 facet 引用放置在拉伸布局中。


    **注意：** 为页面片段基于模板构建可能看起来多余，但这样做没有任何成本，并且在您确实需要向每个页面片段添加某些通用内容的罕见情况下，它可以为您节省大量工作。


    ### 任务流模板


    您也可以将有界任务流基于模板构建。这允许您后续添加功能，或在整个应用程序范围内全局设置属性。


    这样做的一个原因可能是向每个任务流添加通用的初始化器和终结器。这些是 ADF 在进入和离开任务流时自动执行的代码片段，通常用于应用程序性能跟踪。


    与页面片段模板类似，您可能没有立即对任务流模板的需求，但创建它们没有任何成本。通过将您所有应用程序的任务流都基于模板构建，您就获得了轻松对每个任务流进行一些更改的选项。


    ### 应用程序皮肤


    您应用程序的视觉外观部分由 ADF Skin 决定。如果您不创建一个，将使用 ADF 默认皮肤。


    您自己的 ADF Skin 总是基于 ADF 附带的标准皮肤之一，任何您未显式更改的部分都将具有默认的 ADF 外观。这意味着您可以在项目开始时创建一个空皮肤，并将其置于基础工作空间中，而不影响应用程序的外观。


    如果您将所有子系统和主应用程序都基于此皮肤，您就再次建立了一个进行应用程序范围更改的单一入口点。


    我们将在第 3 章中再次讨论皮肤。


    ## 通用模型


    在 ADF 应用程序中，您还可以跨子系统重用一些业务组件。这些可重用组件应放置在基础工作空间中的通用模型项目中。业务组件通常只能在单个应用程序内重用，因此
    ADF 企业架构中的企业基础层不太可能包含共享的业务组件。


    当您将基础工作空间创建为 ADF Fusion Web 应用程序时，JDeveloper 会自动在模型 (`CommonModel`) 和视图/控制器 (`CommonUI`)
    项目之间建立依赖关系。您应在基础项目中删除此依赖关系（项目属性 ➤ 依赖关系）。该依赖关系意味着当您从视图/控制器项目创建 ADF 库时，模型项目中的所有内容都会自动包含在内。这对于子系统来说没问题，但在基础层中，您需要显式地将每个项目部署到
    ADF 库。


    ### 共享实体对象


    请记住，实体对象将数据库表映射为可供视图对象使用的对象表示形式。这意味着对于每个数据库表，您只需要一个实体对象。因此，将它们全部创建在一个通用模型项目中，然后从基础工作空间中的通用模型项目部署为
    ADF 库是有意义的。


    ### 共享值列表视图对象


    视图对象包含为特定目的收集的属性。这意味着它们通常作为子系统的一部分构建，以实现该子系统中的用例或故事。但是，每次为属性实现值列表时，您也需要一个视图对象。其中许多将在多个子系统中使用，因此将它们与实体对象一起放在基础层的通用模型项目中是有意义的。


    您的通用模型项目还需要一个应用程序模块。这允许您运行和测试您的值列表视图对象，并且该应用程序模块也可以用作共享应用程序模块。有关共享应用程序模块的更多信息，请参阅
    Oracle 手册《使用 Oracle 应用程序开发框架开发 Fusion Web 应用程序》中的“共享应用程序模块视图实例”章节。'
- fmt: '## Building Subsystems


    The main body of an ADF application goes into the subsystems. Each subsystem should
    be created in a separate workspace with a model and a view/controller project.


    Your subsystem workspace will make use of all the ADF libraries from the foundation
    layer: `common UI`, `common model`, business component base classes, and any common
    utility code.


    In the model project, you create the view objects and view links that are needed
    to implement the stories or use cases of the subsystem. All of them should be
    based on entity objects that come from the `common model`.


    **Tip**


    If you don’t see any entity objects when creating view objects, you probably did
    not add the dependency to the `common model` ADF library properly.


    In the view/controller project, you create bounded task flows with page fragments,
    matching your use cases, stories, or UI wireframes. These should be based on the
    page flow template from the `common UI` ADF library.


    After creating the task flows, you create the actual page fragments, based on
    your page fragment template.


    Because you can’t run task flows with page fragments directly, your subsystem
    normally also contains a test page for each task flow. You can also use the `ADF
    EMG Task Flow Tester`, which is a `JDeveloper` extension developed by members
    of the ADF Enterprise Methodology Group (`ADF EMG`). You install this useful tool
    like other `JDeveloper` extensions by selecting `Help ➤ Check for Updates`. Be
    sure to check the check box `Open Source and Partner Extensions` in the first
    step of the `Check for Updates` wizard. You should see this tool in step two of
    the wizard, as shown in Figure 2-9.


    ![A437725_1_En_2_Fig9_HTML.jpg](A437725_1_En_2_Fig9_HTML.jpg)


    Figure 2-9.


    Installing the `ADF EMG Task Flow Tester`


    Allow `JDeveloper` to restart and follow the instructions to start using the `ADF
    EMG Task Flow Tester`.


    ## Building the Master Application


    The master application is where all the subsystems come together. It has its own
    workspace and uses all the ADF libraries from the foundation level and all subsystems.
    In the master application workspace, you only use the view/controller project—all
    business components reside in a foundation layer or in a subsystem.


    ### Master Application Content


    The master application contains the master page (a page, not a fragment), based
    on the page template.


    Since the page template contains any application decoration (header bar, logo,
    etc.), the page itself will only contain a menu, a dynamic region, and some code.
    The code handles swapping the content of the dynamic region to show another bounded
    task flow. We’ll see an example of the necessary code in Chapter 5, where we discuss
    application logic.


    ### Security


    Finally, you apply security in the master application. To apply security, you
    select `Application ➤ Secure ➤ Configure ADF Security` and go through the `Configure
    ADF Security` wizard.


    **Note**


    `ADF Security` is available in ADF applications running on `WebLogic` and `WebSphere`
    application servers. If you are running the free `ADF Essentials` edition and
    deploying on `GlassFish`, you do not have access to `ADF security`. You can secure
    web pages through other means (e.g., `Apache Shiro`) but must write your own authorization
    code if you want to limit access at the task flow level.


    #### Running the Configure ADF Security Wizard


    In the first step, choose `ADF Authentication and Authorization` to ask `ADF`
    to handle both authentication (identifying the user) and authorization (what the
    user is allowed to do).


    In the second step, choose `Form-Based Authentication` and check the check box
    `Generate Default Pages`. This creates basic login pages with all the necessary
    information and fields. You can then change them to match your application. `HTTP
    Basic` and `HTTP Digest` leave the login to the browser, presenting your user
    with whatever ugly dialog box their browser uses for authentication.


    In the third step, chose `No Automatic Grants` to indicate that you will explicitly
    assign access rights.


    In the fourth step, don’t check the `Redirect Upon Successful Authentication`
    check box. You normally just want to show the master page to the user, not redirect
    to some other page.


    When you finish the wizard, your application is secure and will prompt you for
    a username and password. It also won’t allow you access to anything until you
    define access rights.


    #### Defining Access Rights


    Access rights are defined in the `jazn-data.xml` file created by the security
    wizard. You can choose `Application ➤ Secure ➤ Application Roles` to view this
    file in a user-friendly dialog instead of having to edit the file itself.


    As an application developer, you create application roles for the different types
    of users in your application. Many applications have only one level of security
    where every authenticated user can use the full functionality of the application.
    In this case, you only need one application role. Other applications have several
    types of users and would need multiple application roles.


    On the `Application Roles` tab of the `jazn-data.xml` file, you name these application
    roles. On the `Resource Grants` tab, you select resources and grant them to specific
    roles. If you have complicated security requirements, you might also use entitlement
    grants, which are groups of resources.


    Typical `ADF security` uses the following grants:


    *   `Web Page` grant for the application master page to every application role.

    *   `Task Flow` grant for the different task flows to different application roles
    if necessary.


    In an `ADF application` using the modular or enterprise architecture, the task
    flows are developed in subsystems and brought into the master application through
    `ADF libraries`. To grant access to these task flows, be sure to check the check
    box `Show task flows imported from ADF libraries`.


    If you want to secure data sets, you can use `ADF Entity Object` grants. If you
    want to secure individual attributes, you use `ADF Entity Object Attribute` grants.


    #### Running in the Built-in WebLogic


    On the `Test Users & Roles` tab, you can define test users and assign roles to
    them. These users are only used when running the application in the built-in `WebLogic`
    server in `JDeveloper`.


    You can assign the application roles defined in your application to individual
    test users or to groups of users (called `Enterprise Roles` in `JDeveloper`).
    This allows you simulate the authorization logic that will apply when deploying
    to a stand-alone application server.


    #### Deploying to Test and Production Servers


    When you deploy your application to stand-alone test and production servers, part
    of the deployment is to map application roles to the users or groups on the server.


    In a typical enterprise setting, your `WebLogic` server will be integrated with
    some identity provider (e.g., `Microsoft Active Directory`). This means that when
    you assign application roles in `Oracle Enterprise Manager Grid Control`, you
    can see and assign to your `AD` users and groups.


    For example, your application might have application roles `readonly`, `normal`,
    and `superuser`. In your identity management system, you might have groups of
    users called `Trainee`, `Customer Service`, and `Senior advisor`. When deploying
    the application, you could map `readonly` to `Trainee`, `normal` to `Customer
    Service`, and `superuser` to `Senior advisor`.


    ## Conclusion


    You’ve seen how `ADF Libraries` allows you to split the development of even very
    large enterprise applications into manageable pieces, and how to build all the
    foundation elements you need before you start building in earnest.


    In the next chapter, we will discuss how to achieve the layout and appearance
    you want for your application.'
