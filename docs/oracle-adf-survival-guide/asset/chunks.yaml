  trans: '# 在库代码中中断


    当您为相关子系统创建了源代码 JAR 文件后，您可以像添加其他 JAR 一样将它们添加到您的主应用程序视图项目中：`Project Properties`（项目属性）➤
    `Libraries and Classpath`（库和类路径）➤ `Add JAR/Directory`（添加 JAR/目录）。


    要查看源代码 JAR 文件并在其中设置断点，您需要重新配置`Applications`（应用程序）窗口以显示所包含的库。这可以通过`Applications`（应用程序）窗口右上角的`Navigator
    Display Options`（导航器显示选项）按钮来完成。选择`Show Libraries`（显示库），如图 6-9 所示。


    ![A437725_1_En_6_Fig9_HTML.jpg](img/A437725_1_En_6_Fig9_HTML.jpg)


    图 6-9. 配置`Applications`（应用程序）窗口以显示库


    现在，所有库都显示在`Applications`（应用程序）窗口中。找到您想要在其中设置断点的子系统对应的源代码 JAR 文件，打开它并双击 Java 文件以打开源文件。您可以在这些子系统文件中设置断点，如图
    6-10 所示。当您运行主应用程序时，执行将在您选择的相关子系统中的位置停止。


    ![A437725_1_En_6_Fig10_HTML.jpg](img/A437725_1_En_6_Fig10_HTML.jpg)


    图 6-10. 从主应用程序在子系统源代码中放置断点


    # 添加 ADF 源代码


    在调试 ADF 应用程序时，您经常会看到图 6-11 所示的对话框。


    ![A437725_1_En_6_Fig11_HTML.jpg](img/A437725_1_En_6_Fig11_HTML.jpg)


    图 6-11. 无法找到源文件


    这个对话框意味着您希望继续单步调试，但 `JDeveloper` 无法找到包含下一个要执行的代码片段的源文件。如果执行继续到您自己的某些类中，而您又没有按照前面所述创建源代码
    JAR，就可能发生这种情况。但最常见的情况是，执行进入了 `Oracle` 提供的大型 ADF 代码库。默认情况下，您没有 `Oracle` ADF 的源代码。


    ## 获取 ADF 源代码


    但如果您与 `Oracle` 签订了有效的支持合同，您可以获取源代码。该过程在 `My Oracle Support` 上的 `Doc ID 971256.1`
    中有描述，主要步骤如下：


    1.  您通过 `My Oracle Support` 提交一个 `Service Request`（服务请求），并要求获取您所需版本的 ADF 源代码。您必须提供一个有权代表您的组织与
    `Oracle` 签署 `Source Code Agreement` (`SCA`)（源代码协议）的人员的姓名、电子邮件和传真号码（是的，确实需要）。如果您是开发者，这个人可能是您的经理。

    2.  `Oracle` 会向您发送 `SCA`。

    3.  您组织中被授权的人员签署并将 `SCA` 返回。

    4.  `SR`（服务请求）会更新一个指向相关源代码 `ZIP` 文件的 `URL` 以及打开该 `ZIP` 文件的密码。

    5.  您下载 `ZIP` 文件（其名称通常类似于 `adf_vvvv_nnnn_source.zip`，其中 `vvvv` 是版本号，`nnnn` 是构建号）。


    ## 将 ADF 源代码添加到 JDeveloper


    从 `Oracle` 获得 ADF 源代码后，您通常需要为其创建一个用户库。为此，选择 `Tools`（工具）➤ `Manage Libraries`（管理库）以打开
    `Manage Libraries`（管理库）对话框。在此对话框中，单击 `New`（新建）以添加一个用于 ADF 源代码的新库。提供一个名称，并将 `ZIP`
    文件作为一个新的 `Source Path`（源路径）条目添加。不要选中 `Deployed by Default`（默认部署）复选框。


    ## 将 ADF 源代码添加到项目


    定义了 ADF 源代码用户库后，您可以在每个相关项目的 `Project Properties`（项目属性）➤ `Libraries and Classpaths`（库和类路径）➤
    `Add Library`（添加库）下将其添加进去。您的 ADF 源代码库应出现在 `Users`（用户）节点下。


    将 ADF 源代码作为项目的一部分后，您就可以调试进入 ADF 本身了。如果您需要更多信息来帮助调试一个棘手的问题，您还可以跟踪从您自己的应用程序到内部 ADF
    类的执行路径。如果您对 ADF 内部工作原理感到好奇，您甚至可以在 `Oracle` 的代码中设置断点。


    # 提示与技巧


    当您的 ADF 应用程序出现问题时，首先运行 `ADF Model Tester`（ADF 模型测试器）。这将告诉您问题是出在业务组件层还是用户界面层。


    ## 如果模型无法运行


    某些类型的错误意味着模型测试器根本无法启动。在这种情况下，`JDeveloper` 无法提供任何好的建议，您在 `Log`（日志）窗口中看到的只是类似清单
    6-3 的内容。


    ```

    C:\Java\jdk1.8.0_102\bin\javaw.exe -server -classpath ...

    Apr 17, 2017 5:31:10 PM oracle.security.jps.JpsStartup start

    INFO: Jps initializing.

    Apr 17, 2017 5:31:11 PM oracle.security.jps.JpsStartup start

    INFO: Jps started.

    Apr 17, 2017 5:31:20 PM oracle.jbo.jbotester.MainFrame main

    INFO: BC4J Tester started.

    ```


    清单 6-3. `ADF Model Tester`（ADF 模型测试器）未完全启动


    如果您没有看到 `jdev tester server connecting on port...`，则表示模型测试器未正确启动。这种情况下，您的业务组件中的某些代码存在问题，您需要检查所有业务组件的源文件。


    您需要打开 `XML` 文件（在业务组件的 `Source`（源）选项卡上）以及您生成的任何 `Java` 类。一个没有问题的文件在右边距顶部有一个绿色方块，并且右边距没有其他标记，如图
    6-12 所示。


    ![A437725_1_En_6_Fig12_HTML.jpg](img/A437725_1_En_6_Fig12_HTML.jpg)


    图 6-12. 没有问题的业务组件文件


    如果文件存在问题，右上角的方块是橙色或红色的，并且在右边距的不同位置会出现橙色和/或红色的标记，如图 6-13 所示。


    ![A437725_1_En_6_Fig13_HTML.jpg](img/A437725_1_En_6_Fig13_HTML.jpg)


    图 6-13. 有问题的业务组件文件


    每个问题都在代码中以橙色或红色下划线突出显示，您可以将鼠标指针指向它，`JDeveloper` 就会告知它认为是什么问题。


    ## 如果页面是空白的


    如果您的网页显示为空白，并且 `JDeveloper` 日志没有告知您问题所在，您需要检查该页面的源文件。查找右边距中用红色和/或黄色条标记的错误和警告，以及代码中的下划线。


    如果这无助于解决问题，您可以回退到久经考验的调试方法：注释掉代码。由于页面的源是 `XML`，您需要使用 `XML` 注释语法 `<!--   -->`。


    首先，在页面顶部附近放置一个起始注释，并注释掉所有包含表达式语言（绑定、操作监听器等）的内容。然后从 `Components`（组件）窗口中放入一些简单的组件，如清单
    6-4 所示。


    ```

    ...

    -->

    ```


    清单 6-4. 注释掉页面的部分内容


    现在，当您运行页面时，应该只看到简单的组件。然后移动注释开始和结束标记，以包含越来越多的 `UI` 组件，直到找到导致问题的那一个。


    # 总结


    您已经了解了如何为您的 ADF 代码添加适当的检测，以及如何调试企业级 ADF 应用程序。您需要知道的最后一件事是如何为高效的企业 ADF 开发实施良好的工作流程。


    # 7. 您的工作流程


    `JDeveloper` 是一个企业级工具，它支持并与许多您需要的工具集成，以支持企业应用程序开发流程。'
- fmt: '## Work Process


    Because ADF provides for so many ways of implementing common functionality once
    and then sharing it across one or more applications, it is important that you
    set up your project in the right way from the beginning.


    Development work should happen on development workstations containing `JDeveloper`
    and preferably a copy of the database. Modern workstations are powerful enough
    that you can run `JDeveloper`, `WebLogic`, and a database at the same time, and
    this configuration gives you much more flexibility when you are faced with the
    inevitable changes to the database.


    You deliver finished code to the central code repository, and a build process
    (preferably automated) produces a version of the application and deploys it to
    an integration environment.


    ### Design Work


    The first step is to design the application together with actual end users. Make
    sure you have all kinds of users represented in the design group. It is a common
    problem that applications are developed by expert users—this typically leads to
    overcomplicated screens that are unintelligible by regular and novice users.


    In addition to users, you need three different technical skills in order to produce
    user-friendly applications quickly and efficiently with ADF:


    *   A User Experience (UX) designer

    *   An experienced Oracle ADF developer

    *   A database designer


    The user experience designer facilitates workshops with the users to design screens
    and navigation that meet their needs while ensuring consistency and that UX best
    practice is being implemented. Oracle has researched user experience extensively,
    and has made all its best practices freely available. The UX designer on your
    team should familiarize herself with the Oracle Applications User Experience design
    patterns ( [`www.oracle.com/webfolder/ux/applications/DPG/index.html`](http://www.oracle.com/webfolder/ux/applications/DPG/index.html)
    ) and read the free Oracle eBookQuery ID="Q1" Text="“eBook” OK for Oracle? (Seems
    in line with Apress and other web sites.)" for inspiration. If your ADF application
    is intended to extend Oracle’s Cloud Applications, you should build your application
    in accordance with the Simplified User Experience guidelines so it looks like
    the applications in the Oracle Cloud Applications suite.


    When the first draft of the user experience (screens and navigation) has been
    produced, the UX designer discusses it with the lead ADF developer. The developer
    can contribute to the design in two ways:


    *   By suggesting specialized ADF components that might provide additional functionality
    or convenience at little cost

    *   By suggesting alternative ways to meet a specific requirement if the suggested
    design will be hard to implement in standard ADF


    The UX designer then makes any necessary changes to incorporate the input from
    the ADF developer and finalizes the design with the users.


    When the design is done, the database designer works from the design to identity
    all data entities, along with their relations and attributes. At this stage, it
    might be necessary to go back to the users to clarify relationships, attributes,
    and valid values before the database is built.


    ### Application Architecture


    As the application specifications start to crystallize, you can start establishing
    the application architecture.


    If this is the first ADF application you are building, you should start with a
    modular ADF architecture as described in Chapter [2](#A437725_1_En_2_Chapter.html),
    consisting of a foundation, several subsystems, and a master application.


    If you already know that you will be building many ADF applications, and you have
    some experienced ADF developers on your team, you can also establish an enterprise
    ADF architecture from the beginning. This more complex architecture is also described
    in Chapter [2](#A437725_1_En_2_Chapter.html) and involves establishing both an
    enterprise foundation layer for all applications as well as individual application
    foundation layers for each application.


    At this time, you need to decide on the number of subsystems, including names,
    scope, and Java package name for each.


    ### Initial Development


    Once the application architecture is in place, you can start the initial development.
    If you are running your project in accordance with an agile methodology, you might
    consider this the first sprint.


    #### Development Standards


    You need some place to document your development standards. To make it easy to
    update and track changes, this should preferably be a Wiki or similar, not a word
    processing document.


    Your development standards must include Java package names for the foundation,
    all subsystems, and the master application. It should also include Java coding
    guidelines (fight the tabs-vs.-spaces war now and be done with it) and naming
    standards for ADF objects and Java classes.


    Tip


    For inspiration to your ADF naming standards, you can look at the ADF Naming and
    Project Layout Guidelines developed by the ADF Enterprise Methodology Group (
    [`www.oracle.com/technetwork/developer-tools/adf/learnmore/adf-naming-layout-guidelines-v2-00-1904828.pdf`](http://www.oracle.com/technetwork/developer-tools/adf/learnmore/adf-naming-layout-guidelines-v2-00-1904828.pdf)
    ).


    `JDeveloper` has a long list of preferences you can set. Make sure you set at
    least the following:


    *   Environment ➤ Encoding (set to `UTF8`. Some `JDeveloper` versions on some
    platforms have another default)

    *   ADF Business Components ➤ Base Classes (set to your own BC base classes)

    *   ADF Business Components ➤ Packages (provide different subpackages for entities,
    associations, view objects, view links, and application modules in order to separate
    them in your code and in `JDeveloper`)

    *   Code Editor ➤ Code Style (duplicate a profile and adapt to your needs)


    #### Create All JDeveloper Workspaces


    With the standards in place, your lead developer or architect should create all
    the `JDeveloper` workspaces of your application, including the projects inside
    them. These workspaces should be created in a new directory not used for anything
    other than ADF workspaces and ADF libraries. We will refer to this directory as
    your `$ADF_ROOT` directory (e.g., `C:\JDeveloper\hrdemo`).


    In a modular ADF architecture, this means creating


    *   The foundation workspace with projects for common model, common UI, common
    utility code, and business component base classes

    *   All the subsystem workspaces, each with a model and a view/controller project

    *   The master application workspace

    *   A directory to hold your ADF libraries


    #### Create the Initial Foundation


    Inside the foundation workspace, you should now create the elements that the entire
    application depends on:


    *   Business component base classes

    *   Page template

    *   Page fragment template

    *   Task flow template

    *   Application skin


    Your business component base classes can be empty for now, but you need to create
    them and set up `JDeveloper` to use these base classes whenever you create ADF
    business components.


    Note


    `JDeveloper`Query ID="Q2" Text="“Note” OK? Also added 6x below." doesn’t offer
    an easy way to move configurations from one `JDeveloper` instance to another,
    so there is no way to distribute a correct `JDeveloper` setup to your entire team,
    short of giving everybody a virtual machine with `JDeveloper` correctly installed.


    Similarly, your templates and skin can be empty. Refer to Chapter [2](#A437725_1_En_2_Chapter.html)
    for more details on these elements.


    When you have created this initial code, create ADF libraries from the common
    UI and business component base class projects. Place these ADF library `JAR` files
    in the common ADF library directories in your ADF project directory. Then place
    all your workspaces under version control and the ADF library directory under
    version control as described in the section “Source Control” later in this chapter.'
