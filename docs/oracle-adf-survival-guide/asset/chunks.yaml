    lock on a specific record.

    *   Create Method: This creates a local `create()` method that takes an `AttributeList`
    object as parameter. It is called when ADF wants to create a new record, before
    the doDML() that happens right before the actual INSERT statement is sent to the
    database. Customizations often involve modifying the `AttributeList` to add missing
    values or manipulate the values passed from the user interface.

    *   Remove Method : This creates a local `remove()` method that is called whenever
    ADF wants to remove a record, before the `doDML()` call that happens before a
    DELETE is sent to the database.


    You can always add individual methods inside the generated class by right-clicking
    in the source code and choosing Source ➤ Override Methods . This will bring up
    the Override Methods dialog shown in Figure [4-7](#A437725_1_En_4_Chapter.html#Fig7).


    ![A437725_1_En_4_Fig7_HTML.jpg](A437725_1_En_4_Fig7_HTML.jpg)


    Figure 4-7.


    The Override Methods dialog


    From this dialog, you can select one or more methods to override. This makes JDeveloper
    add those methods to your entity object Java class so you can modify standard
    behavior.


    Caution


    If you use the edit (pencil) icon to bring up the Select Java Options dialog again
    and deselect a check box, JDeveloper will delete the corresponding methods without
    warning, including any code you have added. Should this happen to you, use the
    History tab at the bottom of the Java class to find the previous version.'
  trans: '

    #### 脚本表达式验证


    你还可以选择**脚本表达式**类型的验证，并编写一个 `Groovy` 表达式。这种编程语言具有类似 Java 的语法，可在 ADF 的许多地方使用。Oracle
    手册 *《使用 Oracle 应用程序开发框架开发 Fusion Web 应用程序》* 描述了如何将 `Groovy` 用于验证、默认值等等。该表达式必须返回
    `true`（表示验证成功）或 `false`（表示验证失败）。或者，如果你需要发出错误或警告，可以在表达式中调用 `adf.error.raise()`
    或 `adf.error.warn()`。


    #### 方法验证


    如果声明性验证或脚本验证都无法满足你的需求，你总是可以创建一个**方法验证**。为此，选择类型为 `方法`，并保持 `创建并选择方法` 复选框为选中状态，如图
    4-4 所示。


    ![A437725_1_En_4_Fig4_HTML.jpg](img/A437725_1_En_4_Fig4_HTML.jpg)

    图 4-4. 添加方法验证


    如果你尚未为你的实体对象创建 Java 类，`JDeveloper` 将询问你是否需要创建该类。在该类中，将创建一个具有正确名称和签名的验证方法：

    *   属性验证的方法签名必须是 `public boolean validateXXX(YYY value)`，其中 `XXX` 是属性的名称，`YYY`
    是与该属性匹配的数据类型。

    *   实体验证的方法签名必须是 `public boolean validateZZZ()`，其中 `ZZZ` 是实体对象的名称。


    当然，你需要为验证成功返回 `true`，如果验证失败则返回 `false`。


    #### 失败处理


    如果你尝试在 `失败处理` 选项卡上未定义消息的情况下关闭 `添加验证` 对话框，`JDeveloper` 会发出警告。你应该始终转到图 4-5 所示的 `失败处理`
    选项卡，来定义与验证失败关联的消息。


    ![A437725_1_En_4_Fig5_HTML.jpg](img/A437725_1_En_4_Fig5_HTML.jpg)

    图 4-5. 定义验证失败的消息


    在此选项卡上，你可以决定验证失败是应被视为**错误**还是**警告**。错误会阻止应用程序继续执行，并在有问题的属性周围显示红色边框。警告则以橙色边框显示，用户可以选择忽略警告并继续将值提交到数据库（例如）。


    你提供一条消息，甚至可以使用花括号 `{ }` 在文本中定义变量标记。对于你使用的每一对花括号，`标记消息表达式` 表中都会出现相应的行，允许你输入一个将在运行时被计算并插入到消息中的表达式。


    #### 使用触发器


    ADF 12c 的一个新特性是能够定义**实体级触发器**。这些触发器类似于实体级验证，也是在 `业务规则` 选项卡上添加的。触发器是一个 `Groovy`
    验证表达式，在触发条件发生时执行。触发条件列表包括：

    *   插入前和插入后

    *   更新前和更新后

    *   删除前和删除后

    *   回滚前和回滚后

    *   提交前

    *   事务被提交到数据库后


    你编写的 `Groovy` 表达式默认是**不受信任的**。普通的 `Groovy` 代码可以正常运行，你也可以调用 Java 通用 API。但是，你无法使用（例如）`java.io.file`
    来读取文件。你也无法从 `Groovy` 表达式中调用你在实体对象上定义的方法。


    如果你想明确地将你的 `Groovy` 脚本标记为**受信任的**，你必须在实体对象的 XML 视图中（在 `源` 选项卡上）找到对该脚本的引用。其中会有一行
    `trustMode="untrusted"`，你可以将其改为 `trustMode="trusted"`。


    如果你想调用你自己编写的方法，你也可以用 `@AllowUntrustedScriptAccess` 注解该方法，以表明不受信任的脚本调用该方法是可以的。请参阅
    Oracle 手册 *《使用 Oracle 应用程序开发框架开发 Fusion Web 应用程序》* 中“关于不受信任的 Groovy 表达式你可能需要了解的内容”一节，了解如何在
    Java 类中配置信任的示例。


    ### 创建 Java 对象


    为了向特定实体对象添加业务逻辑，你需要为该对象创建一个 Java 类。如果你尚未通过定义方法类型的验证来创建它，你可以转到实体对象的 `Java` 选项卡并单击编辑（铅笔）图标，调出
    `选择 Java 选项` 对话框，如图 4-6 所示。


    ![A437725_1_En_4_Fig6_HTML.jpg](img/A437725_1_En_4_Fig6_HTML.jpg)

    图 4-6. 为实体对象创建 Java


    通常你只会创建 `实体对象类`。应用程序需要创建自己的 `实体集合类`（处理数据缓存）或 `实体定义类`（定义实体对象的内部工作方式）的情况非常罕见。


    你在 `实体对象类` 的 `包含` 部分所做的选择，决定了 `JDeveloper` 将哪些方法放入实体对象 Java 类中。Java 类将扩展相关的业务组件基类，所有添加的方法都将调用基类中的相应方法。这意味着实体对象的行为将与生成
    Java 之前完全一样——但现在你有了一个针对特定实体对象的 Java 类，你可以在其中添加自己的逻辑。


    `包含` 部分提供以下选项：

    *   `访问器`：为实体对象中的所有属性创建 setter 和 getter 方法。所有这些方法都调用 `setAttributeInternal()`
    和 `getAttributeInternal()` 以维持默认功能。

    *   `数据操作方法`：创建 `doDML()` 方法和 `lock()` 方法。每当 ADF 框架希望向数据库发送 `INSERT`、`UPDATE`
    或 `DELETE` 语句时，`doDML()` 方法都会作为标准 ADF 处理的一部分被调用。本章后面，我们将看到一个如何使用此方法的示例。当 ADF 希望对特定记录建立数据库锁时，会调用
    `lock()` 方法。

    *   `创建方法`：创建一个本地的 `create()` 方法，该方法以 `AttributeList` 对象作为参数。当 ADF 想要创建新记录时，会在实际
    `INSERT` 语句发送到数据库之前的 `doDML()` 操作之前调用它。定制化通常涉及修改 `AttributeList` 以添加缺失的值或处理从用户界面传递过来的值。

    *   `移除方法`：创建一个本地的 `remove()` 方法，每当 ADF 想要移除记录时，都会在 `DELETE` 发送到数据库之前的 `doDML()`
    调用之前调用它。


    你总是可以通过在生成的类中右键单击并选择 `源` ➤ `覆盖方法` 来添加单个方法。这将调出图 4-7 所示的 `覆盖方法` 对话框。


    ![A437725_1_En_4_Fig7_HTML.jpg](img/A437725_1_En_4_Fig7_HTML.jpg)

    图 4-7. 覆盖方法对话框


    通过此对话框，你可以选择一个或多个方法进行覆盖。这会使 `JDeveloper` 将这些方法添加到你的实体对象 Java 类中，以便你可以修改标准行为。


    **注意**

    如果你再次使用编辑（铅笔）图标调出 `选择 Java 选项` 对话框并取消选中一个复选框，`JDeveloper` 会在不发出警告的情况下删除相应的方法，包括你添加的任何代码。如果发生这种情况，请使用
    Java 类底部的 `历史记录` 选项卡查找以前的版本。

