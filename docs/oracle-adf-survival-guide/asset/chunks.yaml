- fmt: '### View Row Class Logic


    While the view object class works on the entire data set, the view row class methods
    work on individual records. This means that modifying data and responding to data
    changes belong in the view row class.


    A typical change you make in the view row class is to override one or more accessor
    methods (setter and/or getter for specific attributes). If you check the `Include
    accessors` check box in the `Select Java Options` dialog, `JDeveloper` will automatically
    create accessor methods for all attributes in the view object. It doesn’t cost
    you any performance to have a lot of accessor methods in your view row class,
    but it does make the code larger and it will take more time to find the method
    you want to change.


    Note: You can also override the accessors in an entity object. If you want the
    change to apply throughout the entire application, you should override the accessor
    in the entity object. If you only want to change the accessor in one place, you
    should make the change in the relevant view row object.


    Another example is more complex logic related to data changes. Consider for example
    the default `HR` schema with `employees` and `departments`. If a user can freely
    change the department of an employee, `ADF` default functionality works fine.
    You simply allow the department number on the `employees` screen to be editable
    (typically implemented with a drop-down list of all departments). But if you want
    to add additional processing before initiating a department transfer, you could
    create a `changeDept()` method on the employee view row class, taking the new
    department ID as a parameter. In the user interface, you might create a separate
    input element to select the new department—an element not connected to the database.
    You would then have a button to call that method and connect the UI element for
    the new department to the method call.


    The example `changeDept()` method in Listing 4-6 uses a View Accessor to work
    with data outside the employee view row object and compares the location of the
    existing department with the location of the new department. If the country is
    different, the employee deserves a 10% raise for having to move to a different
    country.


    ```java

    package com.vesterli.hrdemo.deptemp.model.view;

    import com.vesterli.hrdemo.deptemp.model.view.common.EmployeesVORow;

    import com.vesterli.hrdemo.foundation.model.entity.DepartmentsImpl;

    import com.vesterli.hrdemo.foundation.bcbase.ViewRowImpl;

    ...

    import oracle.jbo.Key;

    import oracle.jbo.Row;

    import oracle.jbo.RowSet;

    public class EmployeesVORowImpl extends ViewRowImpl

    implements EmployeesVORow {

    ...

    public void changeDept(Integer newDeptId) {

    RowSet rs = getDepartmentsVO1();

    Row row = null;

    Object[] keyVals = new Object[1];

    keyVals[0] = getDepartmentId();

    Key oldDeptKey = new Key(keyVals);

    row = rs.getRow(oldDeptKey);

    String oldCountryId = (String)row.getAttribute("CountryId");

    keyVals[0] = newDeptId;

    Key newDeptKey = new Key(keyVals);

    row = rs.getRow(newDeptKey);

    String newCountryId = (String)row.getAttribute("CountryId");

    if (!oldCountryId.equals(newCountryId)) {

    setSalary(getSalary().multiply(new BigDecimal(1.1))

    .setScale(0, BigDecimal.ROUND_HALF_UP));

    }

    }

    ...

    /**

    * Sets value as attribute value for SALARY using the alias name Salary.

    * @param value value to set the SALARY

    */

    public void setSalary(BigDecimal value) {

    setAttributeInternal(SALARY, value);

    }

    ...

    /**

    * Gets the view accessor RowSet DepartmentsVO1.

    */

    public RowSet getDepartmentsVO1() {

    return (RowSet) getAttributeInternal(DEPARTMENTSVO1);

    }

    ...

    }

    ```

    Listing 4-6. Accessing Another View Object Through an Accessor in a View Row Class


    The `changeDept()` method first uses a view accessor to get a handle to all of
    the rows in the `DepartmentsVO1` view object instance. How to create accessors
    is described in the following section. The code then first creates a `Key` object
    for the old department and retrieves the country ID for that department, and then
    creates another `Key` to retrieve the country of the new department. If they are
    different, the salary of the current view row is set to 1.1 times the current
    salary, thus implementing a 10% raise when an employee is moved to a department
    in another country.


    ### View Accessors


    For a view row class to be able to access other view row objects, there must be
    an accessor to that object. This is created from the `Accessors` tab in the view
    object by clicking the green plus icon. In the `View Accessors` dialog shown in
    Figure 4-11, you can choose which accessors you want to create.


    ![A437725_1_En_4_Fig11_HTML.jpg](A437725_1_En_4_Fig11_HTML.jpg)

    Figure 4-11. Creating a view accessor


    There must be an association between the underlying entity objects so that `JDeveloper`
    and `ADF` can figure out how to get from a record in one view object to a record
    in another.


    ### Logic in Application Modules


    The last part of the business component layer is the application modules, and
    you can also create your own Java objects implementing your application modules.


    You create a Java class for an application module from the `Java` tab, as shown
    in Figure 4-12.


    ![A437725_1_En_4_Fig12_HTML.jpg](A437725_1_En_4_Fig12_HTML.jpg)

    Figure 4-12. Creating a Java class for an application module


    Application modules contain methods that you might want to override, and you might
    also want to add your own business logic to application modules.


    ### Overriding Application Module Functionality


    Application modules contain a collection of view object instances and control
    the database transaction. Therefore, many of the methods typically overridden
    in application-specific application module classes relate to the database transaction
    or connection.


    When overriding application module methods, you normally want to change the behavior
    of the entire application (i.e., every application module). For this reason, application
    module methods are typically overridden in the base class that you base all your
    application modules on. Refer to Chapter 2 for more on specifying your own business
    component base classes.


    The method most often overridden in application modules classes is `prepareSession()`,
    which is invoked when an application module is first created. Because application
    modules can be shared among multiple `ADF` sessions, it is also executed whenever
    an application module is given to a new `ADF` session.


    This can be used if you want to perform some database initialization every time
    the application module connects to the database. You might want to set package
    variables, alter the SQL session (e.g., to start SQL tracing), or establish a
    session context for use with `Oracle Virtual Private Database (VPD)` .


    The application module also contains methods like `beforeCommit()`, `beforeRollback()`,
    `afterCommit()`, and `afterRollback()` that you can override to implement custom
    transaction handling.


    ### Adding Custom Application Module Logic


    Custom methods you add to your application modules can also be used in the user
    interface just like methods on view objects. This is very often used to implement
    calls to stored procedures in the database as described in the section “Calling
    Stored Procedures” earlier in this chapter. The syntax is similar to the one shown
    in Listing 4-3 in the section on logic in entity objects, starting with `getDBTransaction()`
    to get a handle to the current transaction that all view object instances participate
    in.


    If you create a client interface for an application module method, it shows up
    in the `Data Controls` pane next to the built-in `Commit` and `Rollback` operations.
    You can either just drag the operation onto a page fragment as an `ADF` button,
    or create an operations binding for the method and call it from a managed bean.'
