- fmt: '## Using Feature Branches


    If you have worked with other version control systems before, you are probably
    very reluctant to create new code branches. And it has indeed historically been
    unreasonably hard to merge branches back together.


    In Git, it is customary to use many more branches. Typically, you create a new
    branch for each new feature, and some organizations use separate branches for
    every bug fix. There are three main benefits to using feature branches:


    *   Each developer can commit and push as often as he wants

    *   Each developer can merge the mainline into his branch as often as he wants,
    so merge conflicts don’t grow large

    *   When building a release, the release manager can decide which feature branches
    go into the release branch


    ### Starting a Feature Branch


    To start a new branch, choose Team ➤ Git ➤ Create Branch to bring up the Create
    Branch dialog, as shown in Figure [7-11](#A437725_1_En_7_Chapter.html#Fig11).


    ![A437725_1_En_7_Fig11_HTML.jpg](A437725_1_En_7_Fig11_HTML.jpg)

    *Figure 7-11. Creating a branch*


    Name your branch something short, but meaningful. The short name from your task/issue
    tracker is normally a good name. Make sure you leave the Checkout Created Branch
    check box checked in order to start working on your feature branch. You see the
    branch name in square brackets after each project in the Applications window now
    shows the name of your branch.


    ### Working on a Feature Branch


    Working on a feature branch is no different from other development work. You can
    commit freely to your local repository and should push to the central repository
    at least twice a day for backup.


    While you are working, you might occasionally pull from the central repository
    if you know significant changes have been made to code you might be using.


    ### Merging a Feature Branch


    Once your feature is complete and committed locally, you switch to the master
    branch with Team ➤ Git ➤ Checkout. In the Checkout Revision dialog, you select
    the `master` branch (on the `local` node). You will see the branch name in the
    square brackets in the Applications window update to `[master]`.


    Then do a `Git pull` to get the latest changes to the master branch followed by
    a `Git merge`. In the Merge dialog, select your feature branch (under the `Local`
    node) and click OK. Normally, the merge happens automatically without error. If
    there are any merge conflicts, they will show up in the Pending Changes window
    marked with an exclamation mark. Right-click and choose Resolve Conflict to open
    the conflict resolution window, where you can choose which change goes in first,
    or manually create new merged code.


    After the merge, you push the changes to the central repository. The Push to Git
    dialog allows you to choose the branches you want to push. Make sure to push the
    new merged master. It is also good practice to push the feature branch in case
    another developer will have to work on it sometime in the future.


    ## Quality Assurance


    Part of your ADF workflow must be to ensure that your code is well written, well
    documented, and correct. All of the usual tools of the trade apply to ADF applications,
    but JDeveloper offers a few extra features.


    ### Auditing Your Code


    On the Build menu, you find an entry called Audit…. If you choose this, you are
    asked to select a profile and can then run an automated code audit. Note the Edit
    button—this calls up the Audit Profile dialog shown in Figure [7-12](#A437725_1_En_7_Chapter.html#Fig12).


    ![A437725_1_En_7_Fig12_HTML.jpg](A437725_1_En_7_Fig12_HTML.jpg)

    *Figure 7-12. Editing audit profiles*


    In this dialog, you decide which rules are active in which profile.


    When you run the audit, you get a lot of results in an expandable tree, as shown
    in Figure [7-13](#A437725_1_En_7_Chapter.html#Fig13).


    ![A437725_1_En_7_Fig13_HTML.jpg](A437725_1_En_7_Fig13_HTML.jpg)

    *Figure 7-13. Audit result*


    In the toolbar above the result tree, you can change the display and turn of lower-priority
    issues. In a collapsed node in the tree, the value in the Severity column is the
    highest found in that node or its subnodes.


    If you find that a specific warning does not help you, you can edit the profile
    to stop running that test. You can also hide all issues of a specific type by
    right-clicking one instance.


    Tip: Volunteers from the Oracle ADF Enterprise Methodology Group (ADF EMG) have
    developed extra audit rules specifically for ADF. See [`https://adfaudit.atlassian.net/wiki/spaces/ADFAUDIT`](https://adfaudit.atlassian.net/wiki/spaces/ADFAUDIT)


    ### Documenting


    JDeveloper offers to automatically produce Javadoc documentation for you if you
    choose Build ➤ Javadoc …. Naturally, the usefulness of the documentation depends
    on the amount of Javadoc comments you have placed in your code.


    You can also document your visual task flows. When the Diagram tab is active,
    JDeveloper shows a Diagram menu, and the Publish Diagram menu item saves a PNG
    file of your diagram you can use in your documentation.


    To document business components, you can create a Business Component Diagram with
    File ➤ New ➤ From Gallery ➤ General ➤ Diagrams. This gives you a blank diagram
    that you can drag and drop your ADF business components onto.


    ## Build Process


    You’ve seen how a developer can use the context menu to deploy an application
    to an ADF library, and to deploy the master application as a deployable EAR file.
    But in a modern, professional development environment, this process should be
    automated and run by a script. Fortunately, JDeveloper helps you do that.


    This section describes how to build with Apache Ant, which is a very flexible
    build tool compatible with any project structure. To define an Ant build, you
    need to create a buildfile (normally called `build.xml`) that contains a number
    of targets like `compile` or `deploy`.


    Note: Apache Maven is a more modern build tool that also handles dependency management,
    and from version 12c, JDeveloper also supports Maven. Since Maven assumes a standard
    directory structure that doesn’t match the default ADF project, it takes some
    Maven skills to build ADF projects with Maven. If you have those skills, Maven
    is also a good choice as build tool.


    Because the build scripts include directory names, including the complete path
    to where JDeveloper is installed, all developer workstations should be set up
    with JDeveloper and the `$ADF_ROOT` directory in the same location.'
