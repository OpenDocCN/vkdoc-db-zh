- fmt: '#### Script Expression Validation


    You can also select validations of type Script Expression and write a `Groovy`
    expression. This programming language has a Java-like syntax and can be used in
    many places in ADF. The Oracle manual *Developing Fusion Web Applications with
    Oracle Application Development Framework* describes how to use `Groovy` for validation,
    default values, and much more. The expression must return either `true` (for validation
    success) or `false` (for validation failure). Alternatively, you can call `adf.error.raise()`
    or `adf.error.warn()` in case you might need to issue either an error or a warning.


    #### Method Validation


    If none of the declarative validations or script validation fit your needs, you
    can always create a Method validation. To do this, select type `Method` and leave
    the `Create and Select Method` check box checked, as shown in Figure [4-4](#A437725_1_En_4_Chapter.html#Fig4).


    ![A437725_1_En_4_Fig4_HTML.jpg](A437725_1_En_4_Fig4_HTML.jpg)

    Figure 4-4. Adding Method validation


    If you have not already created a Java class for your entity object, `JDeveloper`
    will ask if you want the class created. In the class, a validation method will
    be created with the right name and signature:

    *   An attribute validation must have the form `public boolean validateXXX(YYY
    value)`, where `XXX` is the name of the attribute and `YYY` is a datatype matching
    the attribute.

    *   An entity validation must have the form `public boolean validateZZZ()`, where
    `ZZZ` is the name of the entity object.


    Naturally, you need to return `true` for validation success and `false` if the
    validation failed.


    #### Failure Handling


    If you try to close the `Add Validation` dialog without defining a message on
    the `Failure Handling` tab, you get a warning from `JDeveloper`. You should always
    go to the `Failure Handling` tab shown in Figure [4-5](#A437725_1_En_4_Chapter.html#Fig5)
    to define the message associated with a validation failure.


    ![A437725_1_En_4_Fig5_HTML.jpg](A437725_1_En_4_Fig5_HTML.jpg)

    Figure 4-5. Defining a message for validation failure


    On this tab, you decide whether a validation failure should be considered an error
    or a warning. Errors prevent the application from continuing and are shown with
    a red border around the offending attribute. Warnings are shown with an orange
    border, and the user can decide to ignore the warning and continue committing
    the value to the database (for example).


    You provide a message and can even define variable tokens by using curly brackets
    `{ }` in the text. For every set of curly brackets you use, a corresponding line
    appears in the `Token Message Expressions` table, allowing you to enter an expression
    that will be evaluated and inserted into the message at runtime.


    #### Using Triggers


    A new feature in ADF 12c is the ability to define entity-level triggers. These
    are similar to entity-level validations and are also added on the `Business Rules`
    tab. A trigger is a `Groovy` validation expression that is executed when the triggering
    condition occurs. The list of triggering conditions includes:

    *   Before and after insert

    *   Before and after update

    *   Before and after delete

    *   Before and after rollback

    *   Before commit

    *   After the transaction is posted to the database


    The `Groovy` expression you write is by default untrusted. Normal `Groovy` will
    run just fine, and you can call Java general-purpose APIs. However, you can’t
    use `java.io.file` (for example) to read from a file. You also can’t call methods
    defined on your entity objects from `Groovy` expressions.


    If you want to explicitly mark your `Groovy` script as trustworthy, you have to
    find the reference to the script in the XML view of your entity object (on the
    `Source` tab). There will be a line `trustMode="untrusted"` that you can change
    to `trustMode="trusted"`.


    If you want to call a method you have written yourself, you can also annotate
    that method with `@AllowUntrustedScriptAccess` to indicate that it is OK that
    untrusted scripts call the method. Refer to the section “What You May Need to
    Know About Untrusted Groovy Expressions” in the Oracle manual *Developing Fusion
    Web Applications with Oracle Application Development Framework* for an example
    of how to configure trust in a Java class.


    ### Creating a Java Object


    In order to add business logic to a specific entity object, you need a Java class
    for the object. If you haven’t created one already by defining a method type validation,
    you can create one by going to the `Java` tab of your entity object and clicking
    the edit (pencil) icon to bring up the `Select Java Options` dialog, as shown
    in Figure [4-6](#A437725_1_En_4_Chapter.html#Fig6).


    ![A437725_1_En_4_Fig6_HTML.jpg](A437725_1_En_4_Fig6_HTML.jpg)

    Figure 4-6. Creating Java for an entity object


    You will normally only create the `Entity Object Class`. It is very rare that
    an application needs to create its own `Entity Collection Class` (which handles
    the caching of data) or its own `Entity Definition Class` (which defines the inner
    working of the entity object).


    Your choices in the `Include` section for `Entity Object Class` decide which methods
    `JDeveloper` will place into the entity object Java class. The Java class will
    extend the relevant business component base class, and all the methods added will
    call the relevant methods from the base class. This means that the entity object
    will work exactly as it did before you generated Java—but now you have a Java
    class for one specific entity object where you can add your own logic.


    The `Include` section gives you the following options:

    *   `Accessors`: This creates setter and getter methods for all attributes in
    the entity object. All of these methods call `setAttributeInternal()` and `getAttributeInternal()`
    to maintain default functionality.

    *   `Data Manipulation Methods`: This creates a `doDML()` method and a `lock()`
    method. The `doDML()` method is invoked as part of standard ADF processing whenever
    the ADF framework wishes to send an `INSERT`, `UPDATE`, or `DELETE` statement
    to the database. Later in this chapter, we will see an example of how this method
    can be used. The `lock()` method is invoked when ADF wishes to establish a database
    lock on a specific record.

    *   `Create Method`: This creates a local `create()` method that takes an `AttributeList`
    object as parameter. It is called when ADF wants to create a new record, before
    the `doDML()` that happens right before the actual `INSERT` statement is sent
    to the database. Customizations often involve modifying the `AttributeList` to
    add missing values or manipulate the values passed from the user interface.

    *   `Remove Method`: This creates a local `remove()` method that is called whenever
    ADF wants to remove a record, before the `doDML()` call that happens before a
    `DELETE` is sent to the database.


    You can always add individual methods inside the generated class by right-clicking
    in the source code and choosing `Source` ➤ `Override Methods`. This will bring
    up the `Override Methods` dialog shown in Figure [4-7](#A437725_1_En_4_Chapter.html#Fig7).


    ![A437725_1_En_4_Fig7_HTML.jpg](A437725_1_En_4_Fig7_HTML.jpg)

    Figure 4-7. The Override Methods dialog


    From this dialog, you can select one or more methods to override. This makes `JDeveloper`
    add those methods to your entity object Java class so you can modify standard
    behavior.


    **Caution**

    If you use the edit (pencil) icon to bring up the `Select Java Options` dialog
    again and deselect a check box, `JDeveloper` will delete the corresponding methods
    without warning, including any code you have added. Should this happen to you,
    use the `History` tab at the bottom of the Java class to find the previous version.'
