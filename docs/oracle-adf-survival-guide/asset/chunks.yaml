    \ 对象中存在的 `getCurrentRow()` 方法。然而，该方法返回的是视图对象实例中的当前行，而不是用户界面中当前选定的行。要访问 ADF 表组件中选定的一个或多个行，你需要先处理该表组件。\n\
    \nADF 表有一个 `rowSelection` 属性，可以设置为 `none`、`single` 和 `multiple`。当你将视图对象实例拖放到页面上时，这是你可以在“创建表”向导中进行的选择之一，当然你以后也可以随时更改它。如果你在表中允许选择，那么就可以通过连接到\
    \ UI 组件的 `RichTable` 对象的 `getSelectedRowKeys()` 方法，检索所有选定记录的 `Key` 对象，如代码清单 5-9\
    \ 所示。\n\n```java\n...\nimport oracle.adf.model.BindingContext;\nimport oracle.adf.model.binding.DCBindingContainer;\n\
    import oracle.adf.model.binding.DCIteratorBinding;\nimport oracle.adf.view.rich.component.rich.data.RichTable;\n\
