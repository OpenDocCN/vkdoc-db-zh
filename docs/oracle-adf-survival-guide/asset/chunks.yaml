    only the compiled Java class files (the bytecode), but not the source files. That
    is fine for deploying a production application where you don’t want to bloat your
    libraries with source code the end user doesn’t need. In some cases, your ADF
    application might even be used by an end customer that you don’t want poking around
    in your source code.


    But for debugging, you need to deploy the source code from your subsystems. To
    do this, you create a separate deployment profile that will package your source
    code into a JAR file. Choose the normal File ➤ New ➤ General ➤ Deployment Profiles
    and then choose JAR File (instead of the normal ADF Library JAR File). You should
    decide on standard naming for your source JAR files—I recommend prefixing them
    with `source`, for example, `sourceDeptEmp`.


    In the Edit JAR Deployment Profile Properties dialog, you need to open File Groups
    ➤ Project Output ➤ Contributors and change the default content that JDeveloper
    suggests. You do not need Project Output Directory and Project Dependencies, but
    you do need Project Source Path, as shown in Figure [6-8](#A437725_1_En_6_Chapter.html#Fig8).


    ![A437725_1_En_6_Fig8_HTML.jpg](A437725_1_En_6_Fig8_HTML.jpg)


    Figure 6-8.


    Setting properties for a source JAR deployment'
  trans: '

    ### 单步执行代码


    当你在代码中遇到断点时，执行会停止，JDeveloper 会高亮显示代码中的当前行。如果在任何内容返回给 Web 浏览器之前中断，浏览器将只是一片空白，显示尚未收到响应的指示。


    执行停止后，你有几个选项：


    *   单步跳过（`F8`）

    *   单步进入（`F7`）

    *   单步跳出（`Shift+F7`）

    *   执行至方法结束

    *   运行至光标处（`F4`）

    *   继续执行（`F9`）


    其中一些选项可从源视图上方的工具栏中找到，所有选项都可以在“源”菜单中找到。


    常规方法是使用“单步跳过”逐行执行你类中的代码。JDeveloper 会在最左侧边距中显示执行次数、一些变量和一些控制流，如图 6-5 所示。


    ![A437725_1_En_6_Fig5_HTML.jpg](img/A437725_1_En_6_Fig5_HTML.jpg)


    图 6-5.


    在 JDeveloper 中调试代码


    默认情况下，最左侧边距（常规边距中行号的左侧）相当狭窄，但你可以拖动其边缘以查看更多调试信息，如上图所示。


    “单步进入”将进入包含当前打开类所调用方法的类。如果当前代码行调用了多个其他类的方法，系统会提示你选择要进入哪个类。如果你的代码中存在嵌套调用层次结构，这将非常有用，但有时只会将你带入
    Oracle 的 ADF 源代码中。除非你已按本章后面说明请求并安装了源代码，否则尝试进入 ADF 代码只会导致缺少源代码的错误。


    你也可以直接点击将光标置于代码更下方的位置，然后按 `F4` “运行至光标处”。当你收集到所需信息后，按“继续执行”（`F9`）允许 JDeveloper
    继续执行。


    ### 收集信息


    当你以调试模式启动内置的 WebLogic 服务器时，JDeveloper 会自动在“日志”窗口中为你打开几个新选项卡：


    *   `数据`

    *   `智能数据`

    *   `监视点`

    *   `EL 求值器`

    *   `ADF 数据`

    *   `断点`


    “数据”选项卡显示当前内存中所有对象的信息，而“智能数据”选项卡会猜测在此代码位置与你最相关的内容并仅显示这些。


    如果你对这两个窗口中都没有的某些内容感兴趣，可以在“监视点”选项卡上添加一个监视点。你可以键入表达式，也可以在代码视图中选择某些内容，右键单击，然后选择“监视”。


    “EL 求值器”允许你计算表达式语言表达式的值，这在调试如下所述的流程时特别有用。


    “ADF 数据”选项卡显示 ADF 内存作用域（pageFlowScope、requestScope 等）中的所有内容，而“断点”选项卡则提供代码中所有断点的概述。你可以关闭不需要的选项卡，并从
    JDeveloper 的“窗口”菜单的“调试器”子菜单中重新打开这些及其他调试选项卡。


    此外，你可以将光标置于任何变量上并按 `Ctrl+I`（或右键单击并选择“检查”）以打开一个独立的弹出式“检查器”窗口，显示该变量。


    ### 调试任务流


    当你能够找出导致问题的代码时，调试代码是有效的。但有时，可能很难找到正在运行的代码，或者应用程序中的执行路径与你预期的不同。幸运的是，JDeveloper
    为你提供了在比代码更高的层次进行调试的能力：在任务流中。


    要调试任务流，你在“图表”视图中打开它，并右键单击某个任务流活动。它会出现一个小红点，如图 6-6 所示。


    ![A437725_1_En_6_Fig6_HTML.jpg](img/A437725_1_En_6_Fig6_HTML.jpg)


    图 6-6.


    在任务流中设置断点


    当你运行应用程序时，执行会在任务流中的断点处停止。在 JDeveloper 中，焦点位于带有活动断点的任务流图上，并且 JDeveloper 通常会移到开发机器的前台（位于活动浏览器窗口前面）。


    当你在任务流中停止执行时，实际上没有代码可以单步执行，但你可以使用表达式语言（EL）检查应用程序的状态。你在“日志”窗口的“表达式语言”选项卡上进行此操作，如图
    6-7 所示。


    ![A437725_1_En_6_Fig7_HTML.jpg](img/A437725_1_En_6_Fig7_HTML.jpg)


    图 6-7.


    调试任务流时计算表达式语言


    通过此窗口，你可以检查托管 Bean 和公开为 EL 的 ADF 内部值中的值。例如：


    *   `#{pageFlowScope.myBean.myAttribute}` 将为你提供页面流作用域中 Bean `myBean` 的 `myAttribute`
    属性的值。请注意，如果你选择了错误的作用域，表达式语言将只计算为 null。

    *   `#{securityContext.userName}` 将为你提供当前登录用户的名称。如果用户尚未登录，此值将计算为 `anonymous`。

    *   `#{facesContext.viewRoot.locale.language}` 将为你提供应用程序当前运行的语言（来自浏览器）。这对于调试翻译或本地化错误非常有用。


    ### 调试进入 ADF 库


    正如你在第 2 章所看到的，一个 ADF 应用程序通常由多个子系统和一个主应用程序组成。每个子系统都部署为一个 ADF 库，主应用程序使用这些库。但是，当你追踪的错误在单独测试任务流时不出现时，如何调试整个应用程序呢？解决方案很简单：你将源代码与子系统的
    ADF 库一起包含。


    ### 部署源代码


    为了允许调试器在子系统代码中中断并显示相关源代码，它需要访问源代码。默认情况下，ADF 库仅包含已编译的 Java 类文件（字节码），而不包含源文件。这对于部署生产应用程序来说没问题，因为你不想让最终用户不需要的源代码使库膨胀。在某些情况下，你的
    ADF 应用程序甚至可能由你不希望其查看源代码的最终客户使用。


    但对于调试，你需要部署子系统的源代码。为此，你创建一个单独的部署配置文件，将你的源代码打包到 JAR 文件中。选择常规的 `文件` ➤ `新建` ➤ `常规`
    ➤ `部署配置文件`，然后选择 `JAR 文件`（而不是常规的 `ADF 库 JAR 文件`）。你应该为源 JAR 文件确定标准命名——我建议加上 `source`
    前缀，例如 `sourceDeptEmp`。


    在 `编辑 JAR 部署配置文件属性` 对话框中，你需要打开 `文件组` ➤ `项目输出` ➤ `贡献者` 并更改 JDeveloper 建议的默认内容。你不需要
    `项目输出目录` 和 `项目依赖项`，但你需要 `项目源路径`，如图 6-8 所示。


    ![A437725_1_En_6_Fig8_HTML.jpg](img/A437725_1_En_6_Fig8_HTML.jpg)


    图 6-8.


    为源 JAR 部署设置属性

