- fmt: '# Exposing Logic to Clients


    By default, logic you add to your view objects or application modules is not available
    to the user interface layer. In order to make your methods available, you need
    to create a client interface from the Java tab of your view object or application
    module. Figure [4-13](#A437725_1_En_4_Chapter.html#Fig13) shows creating a client
    interface for a view object.


    ![A437725_1_En_4_Fig13_HTML.jpg](A437725_1_En_4_Fig13_HTML.jpg)


    Figure 4-13. Creating a client interface


    For a view object, you can create client interfaces for both the view object class
    and the view row class. For application modules, there is only one type of client
    interface. All the methods in the class show up on the left side of the Edit Client
    Interface dialog, and you shuffle the ones you want to be exposed to the Selected
    box to the right.


    When you have exposed your methods like this, they show up in the Data Control
    panel next to the attributes, as shown in Figure [4-14](#A437725_1_En_4_Chapter.html#Fig14).


    ![A437725_1_En_4_Fig14_HTML.jpg](A437725_1_En_4_Fig14_HTML.jpg)


    Figure 4-14. A client method exposed in the Data Controls pane


    Once your methods show up in the Data Controls pane, they can be dragged onto
    pages or page fragments and dropped as ADF action elements (button or command
    link). If you want to use a method from a Java Bean in the user interface, you
    need to create an Action binding from the Binding tab on the relevant page, as
    shown in Figure [4-15](#A437725_1_En_4_Chapter.html#Fig15). We’ll return to using
    Java beans in the user interface in Chapter [5](#A437725_1_En_5_Chapter.html).


    ![A437725_1_En_4_Fig15_HTML.jpg](A437725_1_En_4_Fig15_HTML.jpg)


    Figure 4-15. Creating a binding for a client method


    ## Conclusion


    In this chapter, you have seen how you can extend the standard functionality of
    ADF business components with your own logic. In some cases, you override the normal
    ADF methods, add functionality, or even completely replace standard ADF processing.
    In other cases, you add your own logic to view objects or application modules
    and make this logic available to the user interface layer with client interfaces.


    In the next chapter, you will see how to add business logic in the user interface
    layer.


    # 5. Presentation Logic


    As you saw in Chapter [1](#A437725_1_En_1_Chapter.html), ADF handles all the basic
    functionality of getting data from the database onto the web page, accepting changes,
    and storing data back. It’s not until you want something other than the default
    functionality that you need to start writing code.


    This chapter describes how to add logic to the presentation layer. ADF offers
    several ways:


    *   Prebuilt UI component validators (declarative)

    *   Managed beans (server-side Java code)

    *   Custom client-side JavaScript


    ## Prebuilt Validators


    You saw in Chapter [4](#A437725_1_En_4_Chapter.html) that it is possible to add
    a lot of validation to business component attributes, both declarative and programmatic.
    But this validation happens on the server, necessitating a server roundtrip. Some
    types of validation are so simple that they can be handled by client-side JavaScript,
    and ADF offers several prebuilt validators.


    You find these in the Components window under the Operations heading near the
    bottom. They are shown in Figure [5-1](#A437725_1_En_5_Chapter.html#Fig1).


    ![A437725_1_En_5_Fig1_HTML.jpg](A437725_1_En_5_Fig1_HTML.jpg)


    Figure 5-1. Declarative validators for UI components


    To use one of these, you simply drop them onto a relevant UI component, for example,
    an Input Text. When you have done this, they will appear in the Source view of
    the page, as shown in Listing [5-1](#A437725_1_En_5_Chapter.html#Par9).


    ```

    ...

    ...

    ```


    Listing 5-1. Example of Declarative Validator in Page Source


    They also appear in the Structure window in the bottom left corner of the JDeveloper
    window, as shown in Figure [5-2](#A437725_1_En_5_Chapter.html#Fig2).


    ![A437725_1_En_5_Fig2_HTML.jpg](A437725_1_En_5_Fig2_HTML.jpg)


    Figure 5-2. Declarative validator in Structure window and its properties


    When you select the validator in either source view or the Structure window, its
    properties are shown in the Properties window. Here you can configure the validator
    and provide the message to be shown to the end user if the validation fails.


    Declarative validations run on the client and are triggered as soon as the user
    leaves the field. Figure [5-3](#A437725_1_En_5_Chapter.html#Fig3) shows the result
    displayed in the user interface when a declarative validation fails.


    ![A437725_1_En_5_Fig3_HTML.jpg](A437725_1_En_5_Fig3_HTML.jpg)


    Figure 5-3. Message to user when declarative validation fails


    ## Adding Managed Beans


    When you need to apply logic in the user interface layer of the application (for
    advanced validations, calculations, etc.), you write managed beans in Java and
    connect them to the items on your page. In ADF (and JSF), the actual user interface
    is kept separate from the presentation logic by splitting these two functions
    into different files:


    *   The user interface is stored in the JavaServer Faces (JSF) and JavaServer
    Faces Fragment (JSFF) files.

    *   The presentation logic source code is stored in Java bean files.


    Your application will contain many Java files. You declare which ones are part
    of the presentation layer by defining them as managed beans in your task flows,
    and then connect them to your user interface components by setting properties
    of the UI components to refer to the bean classes using Expression Language syntax.


    The ADF framework manages these beans for you. This means that they are automatically
    instantiated at the right time, and automatically destroyed when they are no longer
    needed. How long they exist is determined by their scope, described in a later
    section.


    ### Bean Classes


    All classes you want to use in the user interface layer of your application must
    be valid Java beans. That means that they must:


    1.  Have a public, no-argument default constructor.

    2.  Allow access to all properties with standard setter and getter methods.

    3.  Be serializable.


    The constructor is simply a method with the same name as the class, taking no
    arguments. The ADF framework calls this method when it creates an instance of
    the bean class.


    The setter and getter methods must be named in accordance with the JavaBean conventions.
    If for example the bean has a `String` attribute called `firstName`, it must have
    `setFirstName()` and `getFirstName()` methods.


    Note


    The attributes in your Java Bean source code must start with a lowercase letter.


    That the bean is serializable means that it can be stored and deleted from memory,
    and later restored completely with all the internal state it had earlier. This
    is necessary for all beans you intend to use with a scope longer than Request.


    Note


    Short-lived beans (Request and BackingBean) will never have to be stored and restored,
    so they don’t need to be serializable.


    A typical bean that only contains attribute values and code can be made serializable
    simply by implementing the `java.io.Serializable` interface. Note that UI components
    and business components are not serializable, so you should not attempt to store
    these in your managed beans.'
