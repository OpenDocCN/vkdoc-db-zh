    */

    public void lock() {

    super.lock();

    }

    /**

    * Custom DML update/insert/delete logic here.

    * @param operation the operation type

    * @param e the transaction event

    */

    protected void doDML(int operation, TransactionEvent e) {

    super.doDML(operation, e);

    }

    }

    Listing 2-1.

    Part of the Java for an Entity Object

    ```


    You can see that your class is called `EntityImpl`. The import statement shows
    that this means `oracle.jbo.server.EntityImpl`. Depending on your choices in the
    Select Java Options dialog, JDeveloper will create some placeholder methods in
    the class where you can add your own code. For example, the Data Manipulation
    Methods check box has caused JDeveloper to create the `lock()` and `doDML()` methods.


    You can always right-click anywhere in the code and choose Source ➤ Override Methods
    to ask JDeveloper to add a placeholder for any method in the Oracle-supplied base
    class.


    As created by JDeveloper, these methods just invoke the corresponding method in
    the Oracle-supplied superclass. This means that generating Java for a business
    component does not change the functionality of the application until you add some
    of your own code.


    Any changes you make to the specific business component (like `DepartmentsImpl`
    in this example) will only apply to that one business component. But you can also
    make changes that will apply to every business component in your application by
    creating your own ADF business component base classes.


    ### Your Own Base Classes


    You should always create your own ADF business component base classes , extending
    the Oracle-supplied classes. You don’t have to add any functionality, but it is
    important that you create this extra layer of code so you have somewhere to place
    any common functionality you might desire in the future across all components.
    Figure [2-5](#A437725_1_En_2_Chapter.html#Fig5) shows how your own base classes
    fit in between the Oracle-supplied classes and the specific business components
    used in your application.


    ![A437725_1_En_2_Fig5_HTML.jpg](A437725_1_En_2_Fig5_HTML.jpg)


    Figure 2-5.


    Extending Oracle’s business component base classes


    #### Creating Your Own Base Classes


    Before you can create your own business component base classes in the BCBase project,
    you need to have JDeveloper load the ADF business component functionality. You
    do this by right-clicking the project and choosing Project Properties. Then choose
    ADF Business Components and check the check box Initialize Project for Business
    Components.


    When you have done this, create your own base classes as standard Java classes
    (File ➤ New ➤ Java Class). There are 11 ADF business component base classes. You
    are only likely to ever add functionality to a few of these, but since it doesn’t
    cost you anything to add your own base classes, and you never know when one of
    them might be useful in the future, you should create your own version of all
    of them. The Oracle classes, all of which can be found in the `oracle.jbo.server`
    package, are as follows:


    *   EntityCache

    *   EntityImpl

    *   ProgrammaticEntityImpl

    *   EntityDefImpl

    *   ViewObjectImpl

    *   ViewRowImpl

    *   ProgrammaticViewObjectImpl

    *   ProgrammaticViewRowImpl

    *   ViewDefImpl

    *   ApplicationModuleImpl

    *   ApplicationModuleDefImpl


    For each of these, create your own version extending the relevant Oracle class,
    as shown in Figure [2-6](#A437725_1_En_2_Chapter.html#Fig6).


    ![A437725_1_En_2_Fig6_HTML.jpg](A437725_1_En_2_Fig6_HTML.jpg)


    Figure 2-6.


    Creating your own business component base class


    Your code will look similar to Listing [2-2](#A437725_1_En_2_Chapter.html#Par82).


    ```

    package com.vesterli.hrdemo.foundation.bcbase;

    public class EntityImpl extends oracle.jbo.server.EntityImpl {

    }

    Listing 2-2.

    Code for Your Own Business Component Base Class

    ```


    Note how simple this class is: it only has a name and the information that it
    extends the Oracle-supplied base class. This is all you need at the beginning
    of a project—you can add your own methods, overriding the method from the Oracle
    class as needed.


    When done, create an ADF library from your BCBase project and place it in your
    common ADF library directory for everybody to use.


    #### Using Your Own Base Classes


    Once you have created your own ADF business component base classes, you can set
    up JDeveloper to always use them whenever creating new business components. You
    do this under JDeveloper preferences under ADF Business Components ➤ Base Classes.
    For every base class, replace `oracle.jbo.server` with the package that your base
    classes reside in, as shown in Figure [2-7](#A437725_1_En_2_Chapter.html#Fig7).


    ![A437725_1_En_2_Fig7_HTML.jpg](A437725_1_En_2_Fig7_HTML.jpg)


    Figure 2-7.


    Configuring JDeveloper to use your ADF base classes


    Making the change under JDeveloper preferences means that every business component
    created from now on will be based on these classes. This also means that your
    application will fail at runtime if the ADF library containing your ADF business
    component base classes is not added to the project.


    If you want to change the base classes for an individual project, there is a similar
    setting under Project Properties.


    ## Using Templates


    As is to be expected from an enterprise development framework, Oracle ADF also
    offers various options to base your user interface elements on templates. If you
    create your pages, page fragments, and task flows on templates, you have the option
    to easily add or change things across your entire application or enterprise later.
    If you don’t use templates, you must make any necessary global changes in each
    page, fragment, or task flow.


    Since there is no cost involved in basing everything on templates except the need
    for a little thought up front, you should always use them. Even if you don’t have
    any content to go into the templates at the start of the project, create empty
    templates and build your application on these.


    All templates are created in a view/controller project in your foundation workspace.
    If you are using an enterprise architecture, both your enterprise foundation and
    your application foundation should have templates.'
  trans: '### 显式业务组件


    您可以通过单击 Java 选项卡右上角的铅笔图标，为业务组件在 Java 选项卡上创建显式业务组件。这将打开“选择 Java 选项”对话框。不同类型的业务组件，该对话框也不同：图
    2-4 展示了其实体对象的外观。


    ![A437725_1_En_2_Fig4_HTML.jpg](img/A437725_1_En_2_Fig4_HTML.jpg)

    图 2-4. 为实体对象生成 Java


    如果您执行此操作，您将看到得到一个扩展了 Oracle 提供的业务组件基类的 Java 类。部分代码如清单 2-1 所示。


    ```java

    package com.vesterli.hrdemo.foundation.model.entity;

    ...

    import oracle.jbo.server.EntityImpl;

    ...

    // ---------------------------------------------------------------------

    // ---    File generated by Oracle ADF Business Components Design Time.

    // ---    Sat Feb 04 15:17:10 CET 2017

    // ---    Custom code may be added to this class.

    // ---    Warning: Do not modify method signatures of generated methods.

    // ---------------------------------------------------------------------

    public class DepartmentsImpl extends EntityImpl {

    ...

    /**

    * This is the default constructor (do not remove).

    */

    ...

    /**

    * Gets the attribute value for DepartmentName, using the alias name DepartmentName.

    * @return the value of DepartmentName

    */

    public String getDepartmentName() {

    return (String) getAttributeInternal(DEPARTMENTNAME);

    }

    /**

    * Sets value as the attribute value for DepartmentName.

    * @param value value to set the DepartmentName

    */

    public void setDepartmentName(String value) {

    setAttributeInternal(DEPARTMENTNAME, value);

    }

    ...

    /**

    * Add locking logic here.

    */

    public void lock() {

    super.lock();

    }

    /**

    * Custom DML update/insert/delete logic here.

    * @param operation the operation type

    * @param e the transaction event

    */

    protected void doDML(int operation, TransactionEvent e) {

    super.doDML(operation, e);

    }

    }

    ```

    清单 2-1. 实体对象 Java 代码的一部分


    您可以看到您的类被称为 `EntityImpl`。import 语句表明这意味着 `oracle.jbo.server.EntityImpl`。根据您在“选择
    Java 选项”对话框中的选择，JDeveloper 将在类中创建一些占位符方法，您可以在其中添加自己的代码。例如，“数据操作方法”复选框导致 JDeveloper
    创建了 `lock()` 和 `doDML()` 方法。


    您可以随时在代码中任意位置右键单击并选择“源”➤“重写方法”，以要求 JDeveloper 为 Oracle 提供的基类中的任何方法添加占位符。


    正如 JDeveloper 所创建的那样，这些方法只是调用 Oracle 提供的超类中的相应方法。这意味着，在您添加一些自己的代码之前，为业务组件生成 Java
    不会改变应用程序的功能。


    您对特定业务组件（如本示例中的 `DepartmentsImpl`）所做的任何更改将仅适用于该业务组件。但您也可以通过创建自己的 ADF 业务组件基类来进行将应用于应用程序中每个业务组件的更改。


    ### 您自己的基类


    您应该始终创建自己的 ADF 业务组件基类，扩展 Oracle 提供的类。您不必添加任何功能，但重要的是您要创建这层额外的代码，以便将来在所有组件中放置您可能需要的任何通用功能。图
    2-5 展示了您自己的基类如何位于 Oracle 提供的类与应用程序中使用的特定业务组件之间。


    ![A437725_1_En_2_Fig5_HTML.jpg](img/A437725_1_En_2_Fig5_HTML.jpg)

    图 2-5. 扩展 Oracle 的业务组件基类


    #### 创建您自己的基类


    在 BCBase 项目中创建您自己的业务组件基类之前，您需要让 JDeveloper 加载 ADF 业务组件功能。您可以通过右键单击项目并选择“项目属性”来完成此操作。然后选择“ADF
    业务组件”并勾选“为业务组件初始化项目”复选框。


    完成此操作后，创建您自己的基类作为标准 Java 类（“文件”➤“新建”➤“Java 类”）。共有 11 个 ADF 业务组件基类。您可能只会为其中的几个添加功能，但由于添加您自己的基类没有任何成本，而且您永远不知道将来哪一个可能有用，因此您应该创建所有这些类的自己版本。Oracle
    类（都可以在 `oracle.jbo.server` 包中找到）如下：


    *   `EntityCache`

    *   `EntityImpl`

    *   `ProgrammaticEntityImpl`

    *   `EntityDefImpl`

    *   `ViewObjectImpl`

    *   `ViewRowImpl`

    *   `ProgrammaticViewObjectImpl`

    *   `ProgrammaticViewRowImpl`

    *   `ViewDefImpl`

    *   `ApplicationModuleImpl`

    *   `ApplicationModuleDefImpl`


    对于每一个类，创建您自己的版本，扩展相关的 Oracle 类，如图 2-6 所示。


    ![A437725_1_En_2_Fig6_HTML.jpg](img/A437725_1_En_2_Fig6_HTML.jpg)

    图 2-6. 创建您自己的业务组件基类


    您的代码将类似于清单 2-2。


    ```java

    package com.vesterli.hrdemo.foundation.bcbase;

    public class EntityImpl extends oracle.jbo.server.EntityImpl {

    }

    ```

    清单 2-2. 您自己的业务组件基类代码


    注意这个类有多简单：它只有一个名称和它扩展了 Oracle 提供的基类的信息。这是项目开始时您所需要的全部——您可以根据需要添加自己的方法，重写 Oracle
    类中的方法。


    完成后，从您的 BCBase 项目创建一个 ADF 库，并将其放在您的公共 ADF 库目录中供所有人使用。


    #### 使用您自己的基类


    一旦创建了您自己的 ADF 业务组件基类，您就可以设置 JDeveloper，使其在创建新业务组件时始终使用它们。您可以在 JDeveloper 首选项中的“ADF
    业务组件”➤“基类”下进行设置。对于每个基类，将 `oracle.jbo.server` 替换为您的基类所在的包，如图 2-7 所示。


    ![A437725_1_En_2_Fig7_HTML.jpg](img/A437725_1_En_2_Fig7_HTML.jpg)

    图 2-7. 配置 JDeveloper 使用您的 ADF 基类


    在 JDeveloper 首选项下进行更改意味着从此创建的每个业务组件都将基于这些类。这也意味着，如果包含您的 ADF 业务组件基类的 ADF 库未添加到项目中，您的应用程序将在运行时失败。


    如果您想为单个项目更改基类，“项目属性”下有一个类似的设置。


    ### 使用模板


    正如企业开发框架所预期的那样，Oracle ADF 也提供了各种选项，让您可以基于模板构建用户界面元素。如果您在模板上创建页面、页面片段和任务流，您将可以选择在以后轻松地在整个应用程序或企业中添加或更改内容。如果您不使用模板，您必须在每个页面、片段或任务流中单独进行任何必要的全局更改。


    除了前期需要一点思考外，将所有内容基于模板没有任何成本，因此您应该始终使用它们。即使项目开始时没有任何内容需要放入模板，也请创建空模板并在其上构建您的应用程序。


    所有模板都在您的基础工作区中的视图/控制器项目中创建。如果您使用企业架构，那么您的企业基础和应用程序基础都应具有模板。'
- fmt: '### Page Template


    Many ADF applications have just one master page, but you should still base it
    on a page template to allow for later expansion and/or development of additional
    applications.


    The page template contains common elements like a header bar or a common footer
    you want on every page. It should be created in your `CommonUI` project using
    `File ➤ New ➤ Web Tier ➤ JSF/Facelets ➤ ADF Page Template`. You will normally
    copy a quick start layout when creating a page template.


    As part of the template creation, you will also define at least one facet and
    possibly also attributes, as shown in Figure [2-8](#A437725_1_En_2_Chapter.html#Fig8).


    ![A437725_1_En_2_Fig8_HTML.jpg](A437725_1_En_2_Fig8_HTML.jpg)


    Figure 2-8. Defining template facets and attributes


    #### Using Facets


    A facet is a place where the user of the template can add his or her own content.
    A template normally has one facet, but there could be multiple if your layout
    requires two separate content areas.


    When you have created the template, it is shown in the JDeveloper main window.
    Here, you add decorations like logos, headers, and so forth. All of the elements
    in the template will become part of every page based on the template.


    In the place where you want the actual page content, you drop a Facet Definition
    (`<af:facetRef>`) from the Components palette. You will be prompted for a facet
    name, with the options being the facets you defined when creating the template.


    #### Using Attributes


    Often, you want to be able to change text placed in the template area. For example,
    your template might define a colored bar across the top of the page, and you want
    the page name to be written inside this bar. On the page based on the template,
    you can’t add anything inside the template area. However, you can assign values
    to template attributes.


    This is used as follows:


    - When defining the template, create an attribute (e.g., `pageTitle`).

    - In the template, place a text element (e.g., `<af:outputText>`) where you want
    the page name. Set the Value property of the text element to match the attribute
    (e.g., `#{attrs.pageTitle}`). Apply any style you want to the text element (font
    size, etc.).

    - Create a page based on the template. In the Source view, select the `<af:pageTemplate>`
    element, find the field for the template attribute in the Properties window, and
    set it to the desired value.


    ### Page Fragment Template


    The body of your application will consist of page fragments in bounded task flows.
    Because these fragments will live inside a master page in your application, they
    do not normally contain any decoration like headers or footers.


    Your page fragment template will therefore normally just consist of a one-column
    stretched layout to ensure that your fragment will make use of all available space
    on the page. Define one content facet and place the facet reference in the stretch
    layout.


    **Note:** It might seem superfluous to base page fragments on a template, but
    it doesn’t cost anything to do, and it can save you from a lot of work in the
    rare cases where you do find the need to add something common to every page fragment.


    ### Task Flow Template


    You can also base your bounded task flows on a template. This allows you to add
    functionality later or to set properties globally across your entire application.


    One reason to do this could be to add common initializers and finalizers to each
    task flow. These are pieces of code that ADF will automatically execute on entering
    and leaving a task flow, and they are often used for application performance tracking.


    Like page fragment templates, you might not have an immediate need for task flow
    templates, but it doesn’t cost you anything to create them. By basing all your
    application task flows on templates, you get the option to easily make some changes
    to every task flow.


    ### Application Skin


    The visual appearance of your application is determined in part by the ADF Skin.
    If you do not create one, an ADF default skin will be used.


    Your own ADF skins are always based on one of the standard skins that are part
    of ADF, and everything that you do not explicitly change will have the default
    ADF look. This means that you can create an empty skin at the outset of your project
    and place it in the foundation workspace without affecting the look of the application.


    If you base all your subsystems and the master application on this skin, you have
    again established one point to make application-wide changes.


    We’ll return to skins in Chapter [3](#A437725_1_En_3_Chapter.html).


    ## Common Model


    In an ADF application, you can also reuse some business components across subsystems.
    These reusable components should be placed in a common model project in the foundation
    workspace. Business components can typically only be reused within an application,
    so the enterprise foundation layer in an ADF enterprise architecture is unlikely
    to contain shared business components.


    When you create the foundation workspace as an ADF Fusion Web Application, JDeveloper
    will automatically establish a dependency between the model (`CommonModel`) and
    the view/controller (`CommonUI`) project. You should remove this dependency in
    your foundation project (Project Properties ➤ Dependencies). The dependency means
    that when you create an ADF library from the view/controller project, everything
    in the model project is automatically included. That’s fine for subsystems, but
    in the foundation, you want to explicitly deploy each project to an ADF library.


    ### Sharing Entity Objects


    Remember that entity objects map database tables to an object representation that
    can be used by view objects. This means that for every database table, you only
    need one entity object. Therefore, it makes sense to create all of them in a common
    model project that you deploy as an ADF library from a common model project in
    your foundation workspace.


    ### Sharing List of Value View Objects


    View objects contain attributes collected for a specific purpose. This means that
    they are generally built as part of a subsystem to implement the use cases or
    stories in that subsystem. However, every time you implement a value list for
    an attribute, you also need a view object. Many of these will be used in multiple
    subsystems, so it makes sense to place them in the common model project in the
    foundation together with the entity objects.


    Your common model project also needs one application module. This allows you to
    run and test your list of value view objects, and the application module can also
    be used as a shared application module. Refer to the chapter Sharing Application
    Module View Instances in the Oracle manual Developing Fusion Web Applications
    with Oracle Application Development Framework for more on shared application modules.'
