    In order to access the binding layer from your code, the first thing you need
    to do is to create an instance of a `BindingContainer`, as shown in Listing [5-5](#A437725_1_En_5_Chapter.html#Par69).


    ```java

    import oracle.adf.model.BindingContext;

    import oracle.binding.BindingContainer;

    ...

    public class EmpPage {

    ...

    public String processEmp {

    BindingContainer bc =

    BindingContext.getCurrent().getCurrentBindingsEntry();

    ...

    }

    ...

    }

    Listing 5-5.

    Getting a BindingContainer

    ```


    You normally don’t have to type `import` statements when writing code in JDeveloper;
    the tool automatically provides suggestions. However, there are several options
    for both `BindingContainer` and `BindingContext`: you should choose the ones shown
    in Listing [5-5](#A437725_1_En_5_Chapter.html#Par69).


    Getting the `BindingContainer` is something you’ll be doing a lot in your code,
    so it makes sense to create a method for this in a utility class in your utility
    code project.


    ### Accessing an Attribute Value


    When you have a `BindingContainer` object, you can retrieve an attribute binding
    from it, as shown in Listing [5-6](#A437725_1_En_5_Chapter.html#Par73).


    ```java

    ...

    import java.math.BigDecimal;

    import java.sql.Timestamp;

    import oracle.adf.model.BindingContext;

    import oracle.binding.AttributeBinding;

    import oracle.binding.BindingContainer;

    ...

    public class EmpPage {

    ...

    public String getEmpValues() {

    ...

    AttributeBinding fnb =

    (AttributeBinding)bc.getControlBinding("FirstName");

    AttributeBinding salb =

    (AttributeBinding)bc.getControlBinding("Salary");

    AttributeBinding hdb =

    (AttributeBinding)bc.getControlBinding("HireDate");

    String firstName = (String)fnb.getInputValue();

    BigDecimal sal = (BigDecimal)salb.getInputValue();

    Timestamp hireDate = (Timestamp)hdb.getInputValue();

    ...

    return null;

    }

    }

    Listing 5-6.

    Getting Attribute Values

    ```


    The attribute name must be spelled exactly as written in the view object, with
    the exact same use of upper- and lowercase.


    The signature of the `getInputValue()` method is that it returns a generic `Object`.
    However, ADF uses the object defined for the attribute on the Attributes tab in
    the view object, so you can cast the output of `getInputValue()` to the relevant
    type. The view object wizard in JDeveloper will create objects based on the Data
    Type Map setting defined when you initialize the model project for business components.
    When you use the default Java Extended for Oracle mapping, the following mappings
    occur:


    *   Database `VARCHAR2` becomes `java.lang.String`

    *   Database `NUMBER` becomes `java.math.BigDecimal`

    *   Database `DATE` becomes `java.sql.Timestamp`


    ### Accessing an Operation


    As you saw in Chapter [4](#A437725_1_En_4_Chapter.html), business components come
    with built-in operations, and you can create your own operations. All the built-in
    operations and the operations that you have decided to expose to the user interface
    layer show up in the Data Controls pane in the Applications window.


    #### Tip


    If one of your custom operations doesn’t show in the Data Controls pane, even
    after refreshing it with the blue double arrow icon, you probably forgot to create
    a client interface. See Chapter [4](#A437725_1_En_4_Chapter.html).


    To execute an operation from managed bean code, you also go through the binding
    layer. The necessary code is shown in Listing [5-7](#A437725_1_En_5_Chapter.html#Par82).


    ```java

    ...

    import java.util.List;

    import java.util.Map;

    import oracle.adf.model.BindingContext;

    import oracle.binding.OperationBinding;

    ...

    public class EmpPage {

    ...

    public String changeDept(Integer empId, Integer deptId) {

    ...

    OperationBinding ob = bc.getOperationBinding("moveDept");

    Map obParam = ob.getParamsMap();

    obParam.put("empId", empId);

    obParam.put("deptId", deptId);

    Object result = ob.execute();

    if(!ob.getErrors().isEmpty()) {

    handleErrors(ob.getErrors());

    return null;

    }

    ...

    return null;

    }

    }

    Listing 5-7.

    Executing an Operation

    ```


    Like the attribute binding, the name of the operation must be exactly as you see
    it on the Bindings tab, including use of upper- and lowercase.


    Your operation might take one or more parameters. If this is the case, you retrieve
    a `Map` object from the operations binding and place your parameters in this map.
    If you don’t have any parameters to pass, you don’t need these lines of code.


    Executing an operations binding always returns a generic `Object`; depending on
    the underlying code, that might or might not be useful in the bean calling the
    method.


    You should always call `getErrors()` to check if anything went wrong when executing
    the operation. The return value from this method is a `java.util.List` object
    containing `Throwable` objects for any errors.


    ### Accessing an Iterator


    When you want to work with a whole data set, not just a single value, you need
    to access the iterator of a tree binding. To do this, you cast your binding container
    to a `DCBindingContainer`, as shown in Listing [5-8](#A437725_1_En_5_Chapter.html#Par88).


    ```java

    ...

    import oracle.adf.model.BindingContext;

    import oracle.adf.model.binding.DCBindingContainer;

    import oracle.adf.model.binding.DCIteratorBinding;

    import oracle.adf.view.rich.component.rich.data.RichTable;

    import oracle.adf.view.rich.context.AdfFacesContext;

    import oracle.jbo.Row;

    ...

    public class EmployeeBean {

    ...

    private ComponentReference empTab;

    ...

    public void setEmpTab(RichTable empTab) {

    this.empTab = ComponentReference.newUIComponentReference(empTab);

    }

    public RichTable getEmpTab() {

    if (empTab != null) {

    return (RichTable)empTab.getComponent();

    } else {

    return null;

    }

    }

    ...

    public String DeptRaise() {

    BindingContainer bc =

    BindingContext.getCurrent().getCurrentBindingsEntry();

    DCBindingContainer dcb =(DCBindingContainer)bc;

    DCIteratorBinding iter =

    (DCIteratorBinding)dcb

    .findIteratorBinding("EmployeesInDeptVOIterator");

    Row[] allRows = iter.getAllRowsInRange();

    BigDecimal currSal;

    for (Row r: allRows) {

    currSal = (BigDecimal)r.getAttribute("Salary");

    r.setAttribute("Salary", currSal.multiply(new BigDecimal(1.05))

    .setScale(0, BigDecimal.ROUND_DOWN));

    }

    AdfFacesContext.getCurrentInstance().addPartialTarget(getEmpTab());

    return null;

    }

    }

    Listing 5-8.

    Iterating over a Data Set

    ```


    You retrieve the iterator binding from the container with `findIteratorBinding()`.
    Like all other bindings, you must type the name exactly as it exists on the Bindings
    tab. This iterator has a number of useful functions, one of which is `getAllRowsInRange()`,
    which returns an array of `Row` objects. In the preceding example, we simply loop
    over this array and give everybody a raise of 5%.


    Changing the value of the attribute does not in itself update the UI component.
    To get the ADF table that displays the data from the iterator to update itself,
    we need to:


    *   Create a `ComponentReference` for the table component

    *   Create setter and getter methods receiving and returning a `RichTable`

    *   Set the `Binding` property of the table to our `RichTable` property (with
    an expression like `#{backingBeanScope.EmployeeBean.empTab}`)

    *   Add the table to the ADF Faces Context as a partial page rendering target
    with `AdfFacesContext.getCurrentInstance().addPartialTarget(getEmpTab());`'
