  trans: '

    ## 使用功能分支


    如果你之前使用过其他版本控制系统，你可能会非常不愿意创建新的代码分支。实际上，历史上将分支合并回去确实异常困难。


    在 Git 中，通常会使用更多的分支。通常，你会为每个新功能创建一个单独的分支，有些组织甚至为每个错误修复使用独立的分支。使用功能分支有三个主要好处：


    *   每个开发者可以按需频繁地提交和推送代码

    *   每个开发者可以随时将主线（mainline）合并到自己的分支中，这样合并冲突就不会累积变大

    *   在构建发布版本时，发布经理可以决定哪些功能分支要纳入发布分支


    ### 启动功能分支


    要启动一个新分支，选择 Team ➤ Git ➤ Create Branch 以打开 Create Branch 对话框，如图 7-11 所示。


    ![A437725_1_En_7_Fig11_HTML.jpg](img/A437725_1_En_7_Fig11_HTML.jpg)

    *图 7-11. 创建分支*


    为你分支起一个简短但有意义的名称。使用来自你的任务/问题跟踪器的简短名称通常是个好选择。确保勾选了 Checkout Created Branch 复选框，以便立即开始在你的功能分支上工作。现在，在
    Applications 窗口中，每个项目后的方括号里显示的就是你的分支名称。


    ### 在功能分支上工作


    在功能分支上工作与其他开发工作并无不同。你可以自由地向本地仓库提交代码，并且应该至少每天向中央仓库推送一次以作备份。


    在工作过程中，如果你知道正在使用的代码有重大更新，你可能偶尔需要从中央仓库拉取（pull）最新代码。


    ### 合并功能分支


    一旦你的功能开发完成并在本地提交，你可以通过 Team ➤ Git ➤ Checkout 切换到主分支（master）。在 Checkout Revision
    对话框中，选择 `master` 分支（位于 `local` 节点下）。你会看到 Applications 窗口中项目名后的方括号内更新为 `[master]`。


    然后执行 `Git pull` 来获取主分支的最新更改，接着执行 `Git merge`。在 Merge 对话框中，选择你的功能分支（在 `Local` 节点下）并点击
    OK。通常，合并会自动完成而不会出错。如果有任何合并冲突，它们会显示在 Pending Changes 窗口中，并用感叹号标记。右键单击并选择 Resolve
    Conflict 以打开冲突解决窗口，在那里你可以选择哪个更改优先保留，或者手动创建新的合并代码。


    合并后，你需要将更改推送到中央仓库。Push to Git 对话框允许你选择要推送的分支。确保推送新合并的主分支。为了便于其他开发者将来可能接手工作，也推送功能分支是一个好的实践。


    ## 质量保证


    你的 ADF 工作流程的一部分必须是确保代码编写良好、文档完善且正确。所有常用的行业工具都适用于 ADF 应用程序，但 JDeveloper 提供了一些额外的功能。


    ### 审核代码


    在 Build 菜单中，你可以找到一个名为 Audit… 的条目。选择此项后，系统会要求你选择一个配置文件，然后就可以运行自动化的代码审核。注意 Edit
    按钮——它会调出如图 7-12 所示的 Audit Profile 对话框。


    ![A437725_1_En_7_Fig12_HTML.jpg](img/A437725_1_En_7_Fig12_HTML.jpg)

    *图 7-12. 编辑审核配置文件*


    在此对话框中，你决定哪些规则在哪个配置文件中处于激活状态。


    当你运行审核时，你会在可展开的树形结构中得到大量结果，如图 7-13 所示。


    ![A437725_1_En_7_Fig13_HTML.jpg](img/A437725_1_En_7_Fig13_HTML.jpg)

    *图 7-13. 审核结果*


    在结果树上方的工具栏中，你可以更改显示方式并关闭低优先级的问题。在树中的一个折叠节点里，Severity 列的值是该节点或其子节点中找到的最高严重级别。


    如果你发现某个特定的警告对你没有帮助，你可以编辑配置文件以停止运行该测试。你也可以通过右键单击一个实例来隐藏所有同类型的问题。


    提示：Oracle ADF 企业方法学组（ADF EMG）的志愿者们专门针对 ADF 开发了额外的审核规则。参见 [`https://adfaudit.atlassian.net/wiki/spaces/ADFAUDIT`](https://adfaudit.atlassian.net/wiki/spaces/ADFAUDIT)


    ### 文档生成


    如果你选择 Build ➤ Javadoc …，JDeveloper 可以为你自动生成 Javadoc 文档。当然，文档的实用性取决于你在代码中编写的 Javadoc
    注释的数量。


    你还可以为可视化任务流生成文档。当 Diagram 选项卡处于活动状态时，JDeveloper 会显示一个 Diagram 菜单，其中的 Publish Diagram
    菜单项可以将你的图表保存为 PNG 文件，供你在文档中使用。


    要为业务组件生成文档，你可以通过 File ➤ New ➤ From Gallery ➤ General ➤ Diagrams 创建一个业务组件图。这会给你一个空白的图表，你可以将
    ADF 业务组件拖放到上面。


    ## 构建流程


    你已经了解了开发者如何使用上下文菜单将应用程序部署到 ADF 库，以及如何将主应用程序部署为可部署的 EAR 文件。但在现代专业的开发环境中，这个过程应该被自动化并通过脚本运行。幸运的是，JDeveloper
    可以帮助你做到这一点。


    本节描述如何使用 Apache Ant 构建，这是一个非常灵活、适用于任何项目结构的构建工具。要定义一个 Ant 构建，你需要创建一个构建文件（通常称为 `build.xml`），其中包含如
    `compile` 或 `deploy` 等多个目标（targets）。


    注意：Apache Maven 是一个更现代的构建工具，同时也处理依赖管理。从 12c 版本开始，JDeveloper 也支持 Maven。由于 Maven
    假设的标准目录结构与默认的 ADF 项目不匹配，因此使用 Maven 构建 ADF 项目需要一些 Maven 技能。如果你具备这些技能，Maven 也是一个很好的构建工具选择。


    由于构建脚本包含了目录名称，包括 JDeveloper 安装的完整路径，因此所有开发者的工作站都应将 JDeveloper 和 `$ADF_ROOT` 目录设置在相同的位置。

    '
- fmt: '### Building One Project


    To build one project with Ant, you can choose File ➤ New ➤ From Gallery ➤ General
    ➤ Ant ➤ Buildfile from Project. The Create Buildfile from Project dialog appears
    as shown in Figure [7-14](#A437725_1_En_7_Chapter.html#Fig14).


    ![A437725_1_En_7_Fig14_HTML.jpg](A437725_1_En_7_Fig14_HTML.jpg)


    Figure 7-14. Creating a buildfile from a project


    Make sure you check the Include Packaging Tasks (uses `ojdeploy`) check box. This
    option means that JDeveloper will include build tasks for actually packaging everything
    up into ADF libraries. The tasks that JDeveloper include in your build file depend
    on the `ojdeploy` utility installed with JDeveloper. There is currently no way
    to install only the `ojdeploy` utility on a build server, so you have to install
    JDeveloper on your build server in order to be able to use `ojdeploy`.


    The autogenerated build file for a project will build all deployment profiles
    and all dependent projects. To build only what you need, you should delete any
    superfluous deployment profiles like the default profile created by JDeveloper.


    In all ADF workspaces, JDeveloper by default registers a dependency from the view/controller
    project to the model project. The Ant build respects this dependency and automatically
    builds the model project when you build the view/controller. This means you only
    have to create an Ant build file for the view/controller project in each subsystem
    workspace.


    When you create the buildfile for a project, JDeveloper creates a `build.properties`
    file containing various settings and directory names, and the `build.xml` file
    itself. These files show up in the Applications window under the Resources node.


    The `build.xml` looks similar to the one in Listing [7-1](#A437725_1_En_7_Chapter.html#Par135).


    ```

    ...


    ...


    ...


    Listing 7-1. Autogenerated build.xml File

    ```


    You can see the target `all` depends on `deploy`, `compile`, and `copy`. This
    means that if you choose to build the `all` target, all the dependent build targets
    are also built. Most of these tasks use just standard Ant functionality documented
    at [`http://ant.apache.org/manual`](http://ant.apache.org/manual). The ADF-specific
    task is `ojdeploy`, found in the `deploy` target. This task point to the `ojdeploy`
    class necessary to build and sets the necessary parameters. The effect of this
    target is the same as manually building a deployment profile from within JDeveloper.


    ### Building the Master Application


    Before you create the `build.xml` file for the master application, you need to
    make sure you have a WAR deployment profile for the view/controller project, and
    an EAR deployment profile for the application.


    The WAR deployment profile is created under project properties under the Deployment
    node in the same way subsystem ADF library deployment profiles are created.


    The EAR deployment profile is part of the application properties. Choose Application
    ➤ Application Properties ➤ Deployment to create an EAR File deployment profile.
    Include the master view project on the Application Assembly node.


    Once you have these two deployment profiles, create an Ant build for the application.
    This is done with File ➤ New ➤ From Gallery ➤ General ➤ Ant ➤ Buildfile from Application.
    The build file and the build properties file for the application show up in the
    Application Resources section of the Applications window, not under the project.
    You can build the complete application by right-clicking the build file and choosing
    Run Ant Target ➤ deploy.


    ### Building Foundation and Subsystems


    To build all the subsystems, you can add a new target to your master build file
    that uses `<ant>` tasks to call the Ant scripts from the subdirectories. If your
    buildfiles have the default `build.xml` name, you simply need to point Ant to
    all your foundation and subsystem directories. Your new target could look like
    Listing [7-2](#A437725_1_En_7_Chapter.html#Par142).


    ```

    ...


    Listing 7-2. Ant Target Calling the Build Target for Foundation and Subsystems

    ```


    Depending on your directory layout, you might need to tweak the references to
    the other build files. You can debug your Ant script by right-clicking it in JDeveloper
    and choosing Debug Ant Target and then your target. This gives you more verbose
    output you can use to find any errors.


    The `inheritall=false` is an instruction to Ant to not send the master buildfile
    parameters to the subsystem builds, allowing the subsystems to use their individual
    `build.properties` files.


    ### Copying ADF Libraries


    All the foundation and subsystem ADF libraries are by default built in their respective
    deploy directories. You need to copy them to your common ADF library location
    by writing another target that uses ant `copy` tasks. This target could look as
    shown in Listing [7-3](#A437725_1_En_7_Chapter.html#Par146).


    ```

    ...


    Listing 7-3. Ant Target Copying All ADF Libraries to Common Location

    ```


    Note


    The `file=` parameter in the preceding listing should be on one line: it is wrapped
    only because of the limitations of the book formatQuery ID="Q3" Text="Please note
    reference to book format limitations.".


    ### Combined Build


    Finally, you can modify the `deploy` target to depend on these two new tasks,
    like this: `<target name="deploy" depends="buildsub,copysub" ... >`. This ensures
    that they are always called before deployment, first `buildsub` and then `copysub`.


    With this approach, you can build the entire application including all ADF libraries
    and the master application EAR with one Ant build instruction that can be run
    manually or integrated into any continuous build tool you might be using.


    ## Using Developer Cloud Service


    If you are using any Oracle Cloud services, the Oracle Developer Cloud Service
    (DCS) is included at no extra cost. This cloud-based service offers a comprehensive
    set of integrated development support features, including


    *   Git repository

    *   Code review workflow

    *   Task/Issue tracker

    *   Wiki

    *   Build server

    *   Deployment to other Oracle Cloud services


    Other vendors like Atlassian or GitHub offer similar services, but since the Oracle
    service is free if you have other Oracle Cloud services, it might make sense for
    you to try it out.


    ### Creating Users


    The first step is to create your developers as users of the Oracle Developer Cloud
    Service. Starting from the Sign In link on [`http://cloud.oracle.com`](http://cloud.oracle.com),
    you need to select which data center your cloud services are running in, along
    with your identity domain, and enter your username and password. All this information
    can be found in the welcome e-mail you receive from Oracle when you sign up for
    the Oracle cloud.


    From the Oracle Cloud dashboard, you can click the Users button at the top right
    to define your developers as users of Oracle Cloud services. In the Add User dialog
    shown in Figure [7-15](#A437725_1_En_7_Chapter.html#Fig15), make sure to assign
    the correct roles to your developers. To use Developer Cloud Service, your developers
    need the Developer Service User Role, and your lead developers and architects
    will probably need Developer Service Administrator.


    ![A437725_1_En_7_Fig15_HTML.jpg](A437725_1_En_7_Fig15_HTML.jpg)


    Figure 7-15. Assigning roles to Developer Cloud Service users


    At the time of writing, this is not a very intuitive process. To assign the developer
    service user role, first select the developer service (called something like `developer69750`),
    then check the check box Other Roles, and finally click the ➤ link to assign that
    role to the user. To assign the developer service administrator role, you check
    the corresponding check box. Hopefully, this process will have been made more
    user-friendly by the time you read this book.


    The newly created user now receives an e-mail with account information and a temporary
    password.'
