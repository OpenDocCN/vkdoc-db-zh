    If you don’t provide the name of the current class, you will get a lot of log
    messages but will have no way to find out where the originated. Therefore, always
    provide a class name.


    When you have a logger object in your class, you can add log statements to your
    code using the various methods offered by the `ADFLogger` class. All log statements
    have a log level , and it is important that your team makes a choice about how
    to use them. The following table shows my recommendation.


    | Log level | Used for |

    | SEVERE | Critical errors that prevent the application from continuing. Your
    server administrator should set up monitoring of the ADF log files so that he
    and/or you get an alert if this happens. |

    | WARNING | Warnings that indicate something wrong with the application. Often
    used to indicate misconfigurations, unexpected database errors, error messages,
    or no response from external systems. |

    | INFO | Information for business users about what the application is doing. |

    | CONFIG | Initialization of classes. Reading initial configuration from database
    or files. |

    | FINE | Coarse-grained debug logging. Use FINE to log when methods are entered
    and/or exited (i.e., not more than twice in a method). |

    | FINER | Medium-grained debug logging. Use FINER for more detailed logging inside
    methods. |

    | FINEST | Fine-grained debug logging. Logging in loops should use FINEST. |


    In Listing [6-2](#A437725_1_En_6_Chapter.html#Par11), you can see some examples
    of ADF log statements.


    ```

    package com.vesterli.hrdemo.deptemp.view.beans;

    import ...

    public class EmpPage {

    ADFLogger logger = ADFLogger.createADFLogger(EmpPage.class);

    ...

    public String MultiRaise() {

    logger.fine("Entering MultiRaise()");

    RowKeySet selectedEmps = getEmpTab().getSelectedRowKeys();

    Iterator selIter = selectedEmps.iterator();

    logger.finer("Get iterator for all VO records");

    BindingContainer bc =

    BindingContext.getCurrent().getCurrentBindingsEntry();

    DCBindingContainer dcb =(DCBindingContainer)bc;

    DCIteratorBinding empIter =

    dcb.findIteratorBinding("EmployeesInDeptVOIterator");

    RowSetIterator rsi = empIter.getRowSetIterator();

    logger.finer("Loop over selected employees, give raise");

    Row currEmp = null;

    String oldSalString;

    BigDecimal oldSal;

    BigDecimal newSal;

    while (selIter.hasNext()) {

    Key key = (Key)((List)selIter.next()).get(0);

    currEmp = rsi.getRow(key);

    logger.finest("Working on " + currEmp.getAttribute("EmployeeId"));

    oldSalString = (String)currEmp.getAttribute("SalaryString");

    oldSal = new BigDecimal(oldSalString);

    logger.finest("Old sal is " + oldSal);

    newSal = oldSal.multiply(new BigDecimal(1.05))

    .setScale(0, BigDecimal.ROUND_DOWN);

    currEmp.setAttribute("SalaryString", newSal.toString());

    logger.finest("New sal is " + currEmp.getAttribute("SalaryString"));

    }

    logger.finer("Done increasing salaries, refreshing UI");

    AdfFacesContext.getCurrentInstance().addPartialTarget(empTab);

    return null;

    }

    ...

    }

    Listing 6-2.

    Examples of ADF Logging

    ```


    There is a single `logger.fine()` statement at the start of the method and a number
    of `logger.finer()` statements providing information through the flow of the method.
    Inside the loop in the second half of the code, `logger.finest()` is used.


    ### Configuring Logging


    The reason you want to use different log levels is so that you can apply relevant
    filters to your log. You can set the log threshold for an individual class or
    a Java package, and only the log statements that are at or above the threshold
    actually get written in the log. In this way, extra log statements are for all
    practical purposes “free,” because the cost at runtime for a log statement below
    the threshold is so low.


    By default, you will only see logs that are of level WARNING or higher. That is
    because your `ADFLogger` instances inherit their configuration from the Root Logger,
    which is set to WARNING. To see your own logs at different levels, you will need
    to add loggers named after your classes and packages and define their log levels.


    This is done in the `logging.xml` file, but there is no need to edit this file
    directly. For the WebLogic server built into JDeveloper, you can click Actions
    and then Configure Oracle Diagnostic Logging from the Log window, as shown in
    Figure [6-1](#A437725_1_En_6_Chapter.html#Fig1).


    ![A437725_1_En_6_Fig1_HTML.jpg](A437725_1_En_6_Fig1_HTML.jpg)


    Figure 6-1.


    Configuring ADF logging in JDeveloper


    This brings up the logging.xml file in JDeveloper . Because JDeveloper recognizes
    this file as a special configuration file, it provides an Overview tab where you
    can easily change log configuration. If you want to look at the raw configuration
    file, you can choose the Source tab at the bottom of the logging.xml window.


    ADF has both persistent loggers that remain between invocations of your program
    and transient loggers created by ADF whenever an instance of a class with a log
    statement is instantiated. If you open the logging.xml window while an application
    is running in the built-in WebLogic server, you will see a lot of loggers. To
    get a better overview, check the Hide Transient Loggers check box, as shown in
    Figure [6-2](#A437725_1_En_6_Chapter.html#Fig2).


    ![A437725_1_En_6_Fig2_HTML.jpg](A437725_1_En_6_Fig2_HTML.jpg)


    Figure 6-2.


    The logging.xml Overview tab


    The loggers you add yourself should be Persistent loggers. To add these, click
    the green plus sign and choose Add Persistent Logger. In the dialog, enter a logger
    name and choose a log threshold .


    *   If your logger name is a package name, log statements at or above the threshold
    for every class in that package will be written to the log.

    *   If your logger name is the name of a specific class, only log statements at
    or above the threshold from that specific class are written to the log.


    All the loggers are automatically arranged in a hierarchy below the Root Logger,
    and each logger can have its own log level. This gives you excellent control over
    what gets written to the log file.


    For example, in Figure [6-2](#A437725_1_En_6_Chapter.html#Fig2), I have specified


    *   A `com.vesterli` logger that allows FINE logging for every class where logging
    is not explicitly set by a lower-level logger. All the Java code produced by your
    organization should be under a similar base Java package.

    *   A `com.vesterli.hrdemo` logger that allows FINER logging for every class that
    is part of my HRDemo application. By using an application base package like this,
    you can control the logging for the entire application with one logger.

    *   A `com.vesterli.hrdemo.foundation` logger that shows only INFO logging for
    the classes in this package. You often don’t want very detailed logging from your
    foundation classes once they are tested and used in your application.


    ### Reading Logs


    The log statements above the relevant threshold get written in the WebLogic log
    file and/or shown in the console.'
  trans: "## 为类添加日志记录\n\n您所有的 Java 类都应包含一个 `ADFLogger` 实例。在您的团队中，请统一决定其命名，以便每个人都能轻松地在任何地方添加新的日志语句，并确信记录器已存在。我建议直接将此实例命名为\
    \ `logger`。\n\n您可以使用 `ADFLogger` 类中的 `createADFLogger()` 工厂方法来创建它，并传入当前类的名称，如清单\
    \ 6-1 所示。\n\n```java\npackage com.vesterli.hrdemo.deptemp.model.view;\nimport\
    \ ...\npublic class EmployeesVORowImpl extends ViewRowImpl implements EmployeesVORow\
    \ {\n    private ADFLogger logger =\n        ADFLogger.createADFLogger(EmployeesVORowImpl.class);\n\
    \    ...\n}\n```\n**清单 6-1.** 创建 ADFLogger 实例\n\n如果不提供当前类的名称，您将会收到大量日志消息，但无法查明它们的来源。因此，请始终提供类名。\n\
    \n当您的类中拥有一个记录器对象后，您就可以使用 `ADFLogger` 类提供的各种方法向代码中添加日志语句。所有日志语句都有一个日志级别，重要的是您的团队需要就如何使用它们做出统一决定。下表显示了我的建议。\n\
    \n| 日志级别 | 用途 |\n| :--- | :--- |\n| `SEVERE` | 阻止应用程序继续运行的严重错误。您的服务器管理员应设置对 ADF\
    \ 日志文件的监控，以便在发生此类错误时，他和/或您能收到警报。 |\n| `WARNING` | 表示应用程序存在问题的警告。通常用于指示配置错误、意外的数据库错误、错误消息或来自外部系统无响应。\
    \ |\n| `INFO` | 面向业务用户的应用程序操作信息。 |\n| `CONFIG` | 类的初始化。从数据库或文件读取初始配置。 |\n| `FINE`\
    \ | 粗粒度的调试日志。使用 `FINE` 记录方法进入和/或退出（即，一个方法内不超过两次）。 |\n| `FINER` | 中等粒度的调试日志。使用\
    \ `FINER` 记录方法内部的更详细信息。 |\n| `FINEST` | 细粒度的调试日志。循环中的日志记录应使用 `FINEST`。 |\n\n在清单\
    \ 6-2 中，您可以看到一些 ADF 日志语句的示例。\n\n```java\npackage com.vesterli.hrdemo.deptemp.view.beans;\n\
    import ...\npublic class EmpPage {\n    ADFLogger logger = ADFLogger.createADFLogger(EmpPage.class);\n\
    \    ...\n    public String MultiRaise() {\n        logger.fine(\"Entering MultiRaise()\"\
    );\n        RowKeySet selectedEmps = getEmpTab().getSelectedRowKeys();\n     \
    \   Iterator selIter = selectedEmps.iterator();\n        logger.finer(\"Get iterator\
    \ for all VO records\");\n        BindingContainer bc =\n            BindingContext.getCurrent().getCurrentBindingsEntry();\n\
    \        DCBindingContainer dcb =(DCBindingContainer)bc;\n        DCIteratorBinding\
    \ empIter =\n            dcb.findIteratorBinding(\"EmployeesInDeptVOIterator\"\
    );\n        RowSetIterator rsi = empIter.getRowSetIterator();\n        logger.finer(\"\
    Loop over selected employees, give raise\");\n        Row currEmp = null;\n  \
    \      String oldSalString;\n        BigDecimal oldSal;\n        BigDecimal newSal;\n\
    \        while (selIter.hasNext()) {\n            Key key = (Key)((List)selIter.next()).get(0);\n\
    \            currEmp = rsi.getRow(key);\n            logger.finest(\"Working on\
    \ \" + currEmp.getAttribute(\"EmployeeId\"));\n            oldSalString = (String)currEmp.getAttribute(\"\
    SalaryString\");\n            oldSal = new BigDecimal(oldSalString);\n       \
    \     logger.finest(\"Old sal is \" + oldSal);\n            newSal = oldSal.multiply(new\
    \ BigDecimal(1.05))\n                .setScale(0, BigDecimal.ROUND_DOWN);\n  \
    \          currEmp.setAttribute(\"SalaryString\", newSal.toString());\n      \
    \      logger.finest(\"New sal is \" + currEmp.getAttribute(\"SalaryString\"));\n\
    \        }\n        logger.finer(\"Done increasing salaries, refreshing UI\");\n\
    \        AdfFacesContext.getCurrentInstance().addPartialTarget(empTab);\n    \
    \    return null;\n    }\n    ...\n}\n```\n**清单 6-2.** ADF 日志记录示例\n\n在方法开头有一个\
    \ `logger.fine()` 语句，在方法执行流程中有一些 `logger.finer()` 语句提供信息。在代码后半部分的循环内部，使用了 `logger.finest()`。\n\
    \n## 配置日志记录\n\n您希望使用不同日志级别的原因在于，您可以对日志应用相关过滤器。您可以为单个类或 Java 包设置日志阈值，只有达到或超过阈值的日志语句才会实际写入日志。这样一来，额外的日志语句在几乎所有实际情况下都是“免费”的，因为低于阈值的日志语句在运行时的开销非常低。\n\
    \n默认情况下，您只会看到 `WARNING` 级别或更高级别的日志。这是因为您的 `ADFLogger` 实例继承了根记录器的配置，而根记录器被设置为 `WARNING`。要查看您自己不同级别的日志，您需要添加以您的类和包命名的记录器，并定义它们的日志级别。\n\
    \n这可以在 `logging.xml` 文件中完成，但无需直接编辑此文件。对于 JDeveloper 内置的 WebLogic 服务器，您可以从日志窗口中点击\
    \ **Actions**（操作），然后选择 **Configure Oracle Diagnostic Logging**（配置 Oracle 诊断日志），如图\
    \ 6-1 所示。\n\n![A437725_1_En_6_Fig1_HTML.jpg](img/A437725_1_En_6_Fig1_HTML.jpg)\n\
    **图 6-1.** 在 JDeveloper 中配置 ADF 日志记录\n\n这会在 JDeveloper 中打开 `logging.xml` 文件。因为\
    \ JDeveloper 将此文件识别为特殊配置文件，它提供了一个 **Overview**（概述）选项卡，您可以在其中轻松更改日志配置。如果您想查看原始配置文件，可以选择\
    \ `logging.xml` 窗口底部的 **Source**（源）选项卡。\n\nADF 既有在程序调用之间持续存在的持久记录器，也有每当实例化包含日志语句的类时由\
    \ ADF 创建的瞬态记录器。如果在应用程序在内置 WebLogic 服务器中运行时打开 `logging.xml` 窗口，您将看到许多记录器。为了获得更好的概览，请选中\
    \ **Hide Transient Loggers**（隐藏瞬态记录器）复选框，如图 6-2 所示。\n\n![A437725_1_En_6_Fig2_HTML.jpg](img/A437725_1_En_6_Fig2_HTML.jpg)\n\
    **图 6-2.** logging.xml 的“概述”选项卡\n\n您自己添加的记录器应该是持久记录器。要添加这些记录器，请点击绿色加号并选择 **Add\
    \ Persistent Logger**（添加持久记录器）。在对话框中，输入记录器名称并选择日志阈值。\n\n*   如果您的记录器名称是包名，则该包中每个类达到或超过阈值的日志语句都将写入日志。\n\
    *   如果您的记录器名称是特定类的名称，则只有该特定类达到或超过阈值的日志语句才会写入日志。\n\n所有记录器都会自动排列在根记录器下的层级结构中，每个记录器都可以有自己的日志级别。这使您可以很好地控制哪些内容被写入日志文件。\n\
    \n例如，在图 6-2 中，我指定了：\n\n*   一个 `com.vesterli` 记录器，允许对未由更低级别记录器显式设置日志记录的每个类进行 `FINE`\
    \ 级别的日志记录。您的组织产生的所有 Java 代码都应位于类似的基准 Java 包下。\n*   一个 `com.vesterli.hrdemo` 记录器，允许对作为我的\
    \ HRDemo 应用程序一部分的每个类进行 `FINER` 级别的日志记录。通过使用这样一个应用程序基准包，您可以使用一个记录器控制整个应用程序的日志记录。\n\
    *   一个 `com.vesterli.hrdemo.foundation` 记录器，仅对此包中的类显示 `INFO` 级别的日志记录。一旦您的基础类在应用程序中经过测试和使用，您通常不希望从它们那里获得非常详细的日志。\n\
    \n## 读取日志\n\n达到相关阈值的日志语句将被写入 WebLogic 日志文件和/或显示在控制台中。"
- fmt: '#### Reading Logs in JDeveloper


    As you run your application in the built-in WebLogic server in `JDeveloper`, you
    will see log entries appearing in the Log window. `ADF` doesn’t distinguish between
    your log statements and the log that `ADF` itself produces. The default configuration
    of `JDeveloper` sets a fairly high threshold for the `ADF` packages, so you should
    not see a lot of `ADF` internal log information unless you add or reconfigure
    loggers.


    Note

    Even when you build your page by dragging and dropping components onto the page,
    you might get several `ADF` warnings. In effect, `JDeveloper` is complaining about
    the code it built itself. These warnings can safely be ignored. It is normally
    not worth the time to track down and fix the root cause.


    Do not deselect the option called `Verbose Server Log` on the Action menu. This
    cuts down on logging output but doesn’t discriminate between your logging and
    internal `ADF` logging, so you won’t see any of your own logging either.


    If you have a large log, you can use the `Oracle Diagnostic Log Analyzer (ODLA)`
    to examine it. To start this, you choose `Analyze Log ➤ Current in Console` from
    the Action button menu. The `ODLA` opens as shown in Figure 6-3.


    ![A437725_1_En_6_Fig3_HTML.jpg](A437725_1_En_6_Fig3_HTML.jpg)

    Figure 6-3. The Oracle Diagnostic Log Analyzer


    At the top of the `ODLA` window, you can enter search criteria and execute a search.
    The most common search is to choose `By Log Message` in the radio group at the
    top. In the bottom row of search criteria, you will normally choose `Message`
    in the first drop-down and `Contains` in the second and then enter a search string.


    In the results section in the lower part of the `ODLA` window, note the little
    triangle in the top right corner of the left-hand overview box. This allows you
    to select what attributes you want to see in the overview. If you choose `Related`,
    as shown in Figure 6-3, you get a column with a little icon.


    This is a very powerful feature. If you click the little icon, you get a few options
    including `Related by Request`. If you choose this, you get every log message
    that was triggered by the same server roundtrip. This allows you to see everything
    that happened in all classes as result of the same user interaction (typically
    a mouse click or a keypress). Having the messages that came before the problem
    can often be very helpful, especially when all the irrelevant messages from other
    events are filtered out.


    #### Reading Logs in Other Tools


    When you deploy your application to an external WebLogic server for testing or
    production, the log configuration is not included. You configure the logging on
    each WebLogic server separately. This means that even if you have configured a
    lot of logging in the built-in WebLogic server in `JDeveloper`, you will by default
    not see any logging at all when you deploy the application to another WebLogic
    server.


    On stand-alone WebLogic servers, you configure logging in Enterprise Manager.
    To do this, find the `ADF` application under `Application Deployments` and choose
    `Application Deployment ➤ ADF ➤ ADF Log Configuration`.


    The logs can also be seen in Enterprise Manager, allowing your WebLogic administrator
    to see how your application is doing. Possibly, developers can even instruct operations
    personnel what they might do to alleviate any problems revealed by the logs. This
    could be the case if an `ADF` application is unable to contact the database or
    an external service.


    When you view logs in Enterprise Manager Grid Control, you see all the logs created
    on that specific managed server. You will likely have to filter the log to track
    down an issue. Similar to the way the `Oracle Diagnostic Log Analyzer` works in
    `JDeveloper`, you can search for a log message that contains a specific string
    and then click `View Related Messages` and find the messages from the same server
    roundtrip by choosing `by ECID (Execution Context ID)`.


    Oracle has also announced a very interesting cloud service called `Oracle Management
    Cloud`. This cloud service can receive log files from all types of applications
    and present a comprehensive overview with visualizations and drill-down capability.
    One of the log inputs that `Oracle Management Cloud` will ingest is logs from
    `ADF` applications, both from `ADF` applications running on a WebLogic server
    in your datacenter and from `ADF` applications deployed to the `Oracle Java Cloud
    Service`. It was not released at the time of writing, but go to `cloud.oracle.com`
    and see if it is available and whether it would fit your needs.


    Finally, you can read the raw log files yourself or configure some tool to monitor
    and present them. The `ADF` log entries are written to the WebLogic server log
    for the managed server you deploy your application to. If you deploy to a managed
    server called `MyManagedServer`, you find your `ADF` entries in the `MyManagedServer-diagnostic.log`
    file. Your server administrator can help you find this file, and can also use
    Enterprise Manager to move it to another location.


    Note

    If you don’t have access to the server file system, ask your server administrator
    if the log files from test servers could be placed on a shared network drive.


    If you want to look at the log files from the WebLogic server built into `JDeveloper`,
    you find these in the domain home directory. On Windows, this will be something
    like `C:\Users\<your_user>\AppData\Roaming\<systemX.Y.Z>\DefaultDomain\servers\DefaultServer\logs\DefaultServer-diagnostic.log`.


    ## Normal Debugging


    `JDeveloper` is a complete `Integrated Development Environment (IDE)`, so it,
    of course, contains all the debugging features you expect.


    ### Setting a Breakpoint


    To debug your Java code, you open the relevant class and click in the left margin
    to set a breakpoint. It is marked with a red dot and a red background behind the
    line with the breakpoint, as shown in Figure 6-4.


    ![A437725_1_En_6_Fig4_HTML.jpg](A437725_1_En_6_Fig4_HTML.jpg)

    Figure 6-4. Setting a breakpoint


    It is also marked in the right-hand margin with a small pink box, and if you are
    displaying the mini-map, the line with the breakpoint shows up as a pink line
    there as well. You can click in the mini-map or in the right margin to jump to
    a breakpoint (or any other point in the code).


    Note

    The Mini-map to the right in source view gives you a quick overview of large classes.
    You can right-click and set various settings and hide the map. To display it again,
    press `Alt+Shift+period` or choose `Source ➤ Show Mini-Map` from the right-click
    context menu in the source.


    If you hover with the mouse over the red breakpoint dot in the left margin, you
    get a pop-up dialog, as shown in Figure 6-4. In this dialog, you can choose, for
    example, to stop only when you reach the breakpoint the fifth time or stop based
    on some condition. If you right-click the breakpoint dot and choose `Edit Breakpoint`,
    you get even more options to customize the breakpoint.


    ### Running in Debug Mode


    Once you have set the breakpoints you need, you right-click a runnable element
    and choose `Debug` (instead of the normal `Run`).


    For task flows in subsystems, you normally run a test page containing the task
    flow you want to debug. To test the Java classes in your application, you will
    normally have unit test classes that invoke them, so you can just run these unit
    tests to invoke and debug your classes.


    If the built-in WebLogic server is already started in normal (`Run`) mode, you
    will be prompted if you want to restart the server. Running in `Debug` mode is
    a bit slower and requires you to restart WebLogic, so `JDeveloper` protects you
    from accidentally changing between `Run` and `Debug` modes.'
