    Delaware corporation. For developers who are solving problems, not just writing
    code Introduction


    This book introduces you to Oracle ADF, which is used by many Oracle customers.
    ADF is a highly productive tool and is used to efficiently build user-friendly
    enterprise applications. Some of these ADF applications are new, some are replacements
    for legacy technologies like Oracle Forms, and some are extensions to Oracle’s
    suite of Software-as-a-Service applications.


    ADF developers are in high demand, and this book contains all the information
    you need to become a competent ADF developer.


    In Chapter [1](#A437725_1_En_1_Chapter.html) , you learn about building ADF applications
    using the declarative tools in JDeveloper. The power of ADF allows you to deliver
    a lot of bug-free functionality without having to write any code.


    Chapter [2](#A437725_1_En_2_Chapter.html) explains ADF architecture and how to
    use ADF features to construct maintainable applications of all sizes.


    In Chapter [3](#A437725_1_En_3_Chapter.html) , you learn how to control the visual
    appearance of your application, and how to achieve the exact layout you want.


    Chapters [4](#A437725_1_En_4_Chapter.html) and [5](#A437725_1_En_5_Chapter.html)
    explain how to add business logic to your application, both in the business component
    layer and the user interface layer.


    In Chapter [6](#A437725_1_En_6_Chapter.html) , you learn how to use ADF logging
    and debugging, and chapter [7](#A437725_1_En_7_Chapter.html) rounds off the book
    with a look at how to establish an efficient ADF development workflow.


    Acknowledgments


    I want to thank Oracle for providing us with Oracle ADF, which is the best tool
    for rapidly and efficiently producing user-friendly full stack applications. I
    appreciate that Oracle gives us this powerful technology for free in the form
    of Oracle ADF Essentials, and that Oracle is continually evolving ADF. With new,
    even cooler visualizations and the ability to publish ADF business logic as REST
    web services, ADF continues to serve as the centerpiece of the application architecture
    at many Oracle customers.


    Oracle is also sharing their experience building the Oracle Cloud Applications
    with ADF through the Oracle Applications User Experience team. If you are building
    ADF applications, you can find user experience design patterns and beautiful,
    user-friendly sample applications with full source code at [`www.oracle.com/usableapps`](http://www.oracle.com/usableapps)
    . I encourage you to visit.


    I would also like to thank Oracle ACE Michael Rosenblum for the discussion over
    dinner overlooking the San Francisco Bay that led to this ADF Survival Guide,
    Jonathan Gennick from Apress for believing in the idea, Jill Balzano from Apress
    for shepherding the project to completion, and Oracle ACE Director Luc Bors for
    his many invaluable review comments.


    Finally, I thank my wonderful wife for her love and support, and for accepting
    yet another batch of weekends marked “Book deadline” in our calendar.'
