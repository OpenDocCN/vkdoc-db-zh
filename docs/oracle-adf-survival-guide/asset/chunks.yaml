  trans: '

    ### 模块化 ADF 架构


    在构建单个大型 ADF 应用程序时，应采用模块化架构。这涉及多个工作空间和项目，每个项目由一至四人的小团队负责。


    将包含一个基础层、少量子系统和一个主应用程序，如图 2-2 所示。


    ![A437725_1_En_2_Fig2_HTML.jpg](img/A437725_1_En_2_Fig2_HTML.jpg)


    图 2-2. 模块化 ADF 架构


    #### 基础层


    基础层应保存在一个工作空间中，包含四个项目：


    *   通用模型

    *   通用 UI

    *   通用工具代码

    *   业务组件基类


    创建基础工作空间时，请选择 `ADF Fusion Web Application`。此向导允许您创建通用模型和通用 UI 项目。然后，使用 `File`
    -> `New` -> `Project` -> `ADF Model Project` 添加一个额外的项目用于工具和业务组件基类。选择 ADF 模型项目的原因是，JDeveloper
    中的此项目模板已包含您所需的技术。


    通用模型项目应包含可在整个应用程序中共享的所有业务组件。由于实体对象直接映射到数据库表，这些可以共享并放入通用模型项目。类似地，用于值列表的视图对象也可以共享并放入通用模型。


    通用 UI 项目包含属于用户界面层的所有共享元素。此项目中的元素可能包括模板、皮肤和声明式组件。


    通用工具代码项目包含您将在整个应用程序中使用的任何通用工具类。


    **提示**


    查找 Oracle 的 Fusion Order Demo 应用程序并下载。此演示应用程序包含几个有用的工具类。虽然不是 Oracle 官方支持的软件，但它可以作为您自己工具的良好起点。


    业务组件基类项目包含您自己的 ADF 业务组件基类，它们扩展了 Oracle 提供的类。本章后面的“创建您自己的基类”一节解释了为什么需要这些类以及如何构建它们。


    #### 子系统


    实现应用程序功能需求的任务流被放入少量子系统中。每个子系统应有自己的工作空间，包含一个模型项目和一个视图/控制器项目。一个典型的项目将有三到八个子系统，每个子系统分配给一个由一或两名开发人员组成的团队。


    模型项目应包含该子系统实现的用例所特有的视图对象。


    视图/控制器项目应包含实现子系统用例的有界任务流及其页面片段。


    #### 主应用程序


    主应用程序包含带有全局菜单的主页面。所有功能都通过子系统生成的 ADF 库包含在主应用程序中。安全性在主应用程序中定义。


    ### 企业级 ADF 架构


    如果您的组织已战略性的选择 ADF 作为其开发平台，那么您很可能会构建许多 ADF 应用程序。在这种情况下，建立一个企业级 ADF 架构是合理的。


    这涉及一个对所有应用程序通用的企业基础层和一个用于每个应用程序的应用程序基础层。将会有少量子系统以及一个或多个利用部分子系统功能的主应用程序。在企业级 ADF
    架构中，某些子系统可能是共享的，并在多个主应用程序中使用。该架构如图 2-3 所示。


    ![A437725_1_En_2_Fig3_HTML.jpg](img/A437725_1_En_2_Fig3_HTML.jpg)


    图 2-3. 企业级 ADF 架构


    #### 企业基础层


    企业基础层包含在整个企业内通用的代码。此层应保存在一个工作空间中，包含至少两个项目：


    *   企业业务组件基类

    *   企业通用工具代码


    与模块化架构类似，业务组件基类项目包含对 Oracle 的 ADF 业务组件基类的扩展。在企业层面，您可以添加希望组织中每个 ADF 业务组件都具有的功能。


    类似地，企业通用工具代码项目包含预计将在组织内所有 ADF 应用程序中使用的工具类。


    #### 应用程序基础层


    应用程序基础层包含特定于应用程序的代码：


    *   对企业业务组件基类的应用特定扩展

    *   应用特定的通用工具代码

    *   通用模型


    特定于应用程序的业务组件扩展扩展了企业级业务组件基类，并添加了仅此特定应用程序需要的任何额外功能。同样，通用工具代码项目包含仅在此应用程序中有用的通用类。


    通用模型项目包含跨应用程序共享的业务组件，如同模块化架构中那样（即，实体对象和值列表视图对象）。


    #### 子系统


    ADF 企业架构中的子系统类似于模块化架构中的子系统，每个子系统由一个模型项目和一个视图/控制器项目组成。


    #### 主应用程序


    每个主应用程序也类似于模块化架构中的主应用程序。在 ADF 企业架构中，同一个子系统可以在多个主应用程序中使用。


    ### 部署 ADF 应用程序


    使用这些 ADF 架构时，您的粒度单位是子系统。如果您进行更改，则必须重建子系统 ADF 库，然后构建并部署主应用程序 EAR 文件。


    如果您希望子系统更改生效而无需重建主应用程序，您可以考虑将 ADF 库部署为 WebLogic 共享库，或者研究称为“远程区域”的 ADF 功能。


    ### 业务组件代码


    在第一章中，您看到了如何在不编写任何代码的情况下构建 Oracle ADF 应用程序。当然，您并不局限于 ADF 默认的业务组件功能，而是可以根据需要扩展和自定义它。


    #### 隐式业务组件


    如果您不自己编写任何代码，您就是在隐式使用 Oracle 作为 ADF 框架的一部分提供的 ADF 类。例如，每当您的应用程序使用实体对象时，ADF 将自动创建
    `oracle.jbo.server.EntityObject` 类的一个实例。该类读取您的实体对象的定义（表、列和其他设置），并为 ADF 业务组件栈的其余部分提供多个接口以供调用。

    '
- fmt: '### Explicit Business Components


    You can create explicit business components on the Java tab for a business component
    by clicking the pencil icon in the top right corner of the tab. This brings up
    the Select Java Options dialog. The dialog is different for the different types
    of business components: Figure [2-4](#A437725_1_En_2_Chapter.html#Fig4) shows
    what it looks like for an entity object.


    ![A437725_1_En_2_Fig4_HTML.jpg](A437725_1_En_2_Fig4_HTML.jpg)

    Figure 2-4. Generating Java for an Entity Object


    If you do this, you will see that you get a Java class that extends the Oracle-supplied
    business component base class. Part of the code is shown in Listing [2-1](#A437725_1_En_2_Chapter.html#Par61).


    ```java

    package com.vesterli.hrdemo.foundation.model.entity;

    ...

    import oracle.jbo.server.EntityImpl;

    ...

    // ---------------------------------------------------------------------

    // ---    File generated by Oracle ADF Business Components Design Time.

    // ---    Sat Feb 04 15:17:10 CET 2017

    // ---    Custom code may be added to this class.

    // ---    Warning: Do not modify method signatures of generated methods.

    // ---------------------------------------------------------------------

    public class DepartmentsImpl extends EntityImpl {

    ...

    /**

    * This is the default constructor (do not remove).

    */

    ...

    /**

    * Gets the attribute value for DepartmentName, using the alias name DepartmentName.

    * @return the value of DepartmentName

    */

    public String getDepartmentName() {

    return (String) getAttributeInternal(DEPARTMENTNAME);

    }

    /**

    * Sets value as the attribute value for DepartmentName.

    * @param value value to set the DepartmentName

    */

    public void setDepartmentName(String value) {

    setAttributeInternal(DEPARTMENTNAME, value);

    }

    ...

    /**

    * Add locking logic here.

    */

    public void lock() {

    super.lock();

    }

    /**

    * Custom DML update/insert/delete logic here.

    * @param operation the operation type

    * @param e the transaction event

    */

    protected void doDML(int operation, TransactionEvent e) {

    super.doDML(operation, e);

    }

    }

    ```

    Listing 2-1. Part of the Java for an Entity Object


    You can see that your class is called `EntityImpl`. The import statement shows
    that this means `oracle.jbo.server.EntityImpl`. Depending on your choices in the
    Select Java Options dialog, JDeveloper will create some placeholder methods in
    the class where you can add your own code. For example, the Data Manipulation
    Methods check box has caused JDeveloper to create the `lock()` and `doDML()` methods.


    You can always right-click anywhere in the code and choose Source ➤ Override Methods
    to ask JDeveloper to add a placeholder for any method in the Oracle-supplied base
    class.


    As created by JDeveloper, these methods just invoke the corresponding method in
    the Oracle-supplied superclass. This means that generating Java for a business
    component does not change the functionality of the application until you add some
    of your own code.


    Any changes you make to the specific business component (like `DepartmentsImpl`
    in this example) will only apply to that one business component. But you can also
    make changes that will apply to every business component in your application by
    creating your own ADF business component base classes.


    ### Your Own Base Classes


    You should always create your own ADF business component base classes, extending
    the Oracle-supplied classes. You don’t have to add any functionality, but it is
    important that you create this extra layer of code so you have somewhere to place
    any common functionality you might desire in the future across all components.
    Figure [2-5](#A437725_1_En_2_Chapter.html#Fig5) shows how your own base classes
    fit in between the Oracle-supplied classes and the specific business components
    used in your application.


    ![A437725_1_En_2_Fig5_HTML.jpg](A437725_1_En_2_Fig5_HTML.jpg)

    Figure 2-5. Extending Oracle’s business component base classes


    #### Creating Your Own Base Classes


    Before you can create your own business component base classes in the BCBase project,
    you need to have JDeveloper load the ADF business component functionality. You
    do this by right-clicking the project and choosing Project Properties. Then choose
    ADF Business Components and check the check box Initialize Project for Business
    Components.


    When you have done this, create your own base classes as standard Java classes
    (File ➤ New ➤ Java Class). There are 11 ADF business component base classes. You
    are only likely to ever add functionality to a few of these, but since it doesn’t
    cost you anything to add your own base classes, and you never know when one of
    them might be useful in the future, you should create your own version of all
    of them. The Oracle classes, all of which can be found in the `oracle.jbo.server`
    package, are as follows:


    *   `EntityCache`

    *   `EntityImpl`

    *   `ProgrammaticEntityImpl`

    *   `EntityDefImpl`

    *   `ViewObjectImpl`

    *   `ViewRowImpl`

    *   `ProgrammaticViewObjectImpl`

    *   `ProgrammaticViewRowImpl`

    *   `ViewDefImpl`

    *   `ApplicationModuleImpl`

    *   `ApplicationModuleDefImpl`


    For each of these, create your own version extending the relevant Oracle class,
    as shown in Figure [2-6](#A437725_1_En_2_Chapter.html#Fig6).


    ![A437725_1_En_2_Fig6_HTML.jpg](A437725_1_En_2_Fig6_HTML.jpg)

    Figure 2-6. Creating your own business component base class


    Your code will look similar to Listing [2-2](#A437725_1_En_2_Chapter.html#Par82).


    ```java

    package com.vesterli.hrdemo.foundation.bcbase;

    public class EntityImpl extends oracle.jbo.server.EntityImpl {

    }

    ```

    Listing 2-2. Code for Your Own Business Component Base Class


    Note how simple this class is: it only has a name and the information that it
    extends the Oracle-supplied base class. This is all you need at the beginning
    of a project—you can add your own methods, overriding the method from the Oracle
    class as needed.


    When done, create an ADF library from your BCBase project and place it in your
    common ADF library directory for everybody to use.


    #### Using Your Own Base Classes


    Once you have created your own ADF business component base classes, you can set
    up JDeveloper to always use them whenever creating new business components. You
    do this under JDeveloper preferences under ADF Business Components ➤ Base Classes.
    For every base class, replace `oracle.jbo.server` with the package that your base
    classes reside in, as shown in Figure [2-7](#A437725_1_En_2_Chapter.html#Fig7).


    ![A437725_1_En_2_Fig7_HTML.jpg](A437725_1_En_2_Fig7_HTML.jpg)

    Figure 2-7. Configuring JDeveloper to use your ADF base classes


    Making the change under JDeveloper preferences means that every business component
    created from now on will be based on these classes. This also means that your
    application will fail at runtime if the ADF library containing your ADF business
    component base classes is not added to the project.


    If you want to change the base classes for an individual project, there is a similar
    setting under Project Properties.


    ### Using Templates


    As is to be expected from an enterprise development framework, Oracle ADF also
    offers various options to base your user interface elements on templates. If you
    create your pages, page fragments, and task flows on templates, you have the option
    to easily add or change things across your entire application or enterprise later.
    If you don’t use templates, you must make any necessary global changes in each
    page, fragment, or task flow.


    Since there is no cost involved in basing everything on templates except the need
    for a little thought up front, you should always use them. Even if you don’t have
    any content to go into the templates at the start of the project, create empty
    templates and build your application on these.


    All templates are created in a view/controller project in your foundation workspace.
    If you are using an enterprise architecture, both your enterprise foundation and
    your application foundation should have templates.'
