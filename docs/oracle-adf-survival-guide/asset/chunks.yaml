- fmt: '# 1. Drag-and-Drop Building


    The secret behind the very high productivity that `Oracle Application Development
    Framework (ADF)` offers is the ability to build a lot of functionality without
    writing code. When building `ADF` applications, you should aim to write as little
    code as possible, using `JDeveloper` to drag and drop together the initial version
    of every page in your application.


    This chapter explains how to use the `ADF Business Component` wizards and the
    graphical task flow builder, and how to build pages with automatic data binding.


    ## Anatomy of an ADF Application


    `Oracle` started out as a database company, and this heritage shines through in
    most of their development tools. Tools like `Oracle Forms`, `Oracle Application
    Express (APEX)`, and `Oracle ADF` all start from the assumption that you already
    have a well-designed relational database with all the tables you need to store
    your data.


    Above the database, an `ADF` application has two layers: the business services
    layer and the user interface layer . Between these two layers you find the binding
    layer that defines how the user interface layer is connected to the business services
    layer. Figure 1-1 shows the `ADF` high-level architecture.


    ![A437725_1_En_1_Fig1_HTML.jpg](A437725_1_En_1_Fig1_HTML.jpg)


    Figure 1-1.

    `ADF` high-level architecture


    ### Business Services Layer


    The business services layer provides the main functionality of the application.
    This includes all kinds of calculations, business rules, and the very important
    functionality of storing data. Behind the business service layer might be other
    technologies—there will typically be a relational database to store data, but
    your `ADF` application could also be purely based on web services. In this book,
    we will discuss `ADF` applications where the business services layer consists
    of `ADF` business components based on `Oracle` database tables. This is by far
    the most common way of building `ADF` applications and the approach recommended
    by `Oracle`.


    ### User Interface Layer


    The user interface layer contains the web pages your users will use to interact
    with your application. Building the user interface layer involves


    *   Deciding which pages your application is going to have

    *   Defining the navigation flow between pages

    *   Designing the actual pages with fields, buttons, and other user interface
    components


    ### Binding Layer


    The binding layer connects the user interface layer to the business services layer
    and is the secret sauce of `Oracle ADF`. When you create your application using
    the drag-and-drop functionality in `JDeveloper`, the binding layer is automatically
    created for you. It is thus possible to build perfectly functioning `ADF` applications
    without ever visiting the binding layer. But because a basic understanding of
    the binding layer is very useful in real-life `ADF` application development, we’ll
    discuss it briefly at the end of this chapter.


    ### Creating ADF Workspaces


    An enterprise `ADF` application consists of many workspaces that each produce
    part of the overall application. When you work with `ADF`, you create your workspaces
    using `File ➤ New ➤ Application` and choosing the type `ADF Fusion Web Application`
    in `JDeveloper`. When you create such a workspace, `JDeveloper` will automatically
    create two projects inside the workspace:


    *   A model project for business components

    *   A view/controller project for the user interface


    `JDeveloper` also automatically adds the right `ADF` libraries to each project
    and defines a dependency between them, so the view/controller project has access
    to the business components created in the model project.


    `JDeveloper` calls a workspace an “application.” This is a poor choice of word,
    because all but the very simplest `ADF` applications will involve more than one
    workspace.


    ## Database Business Components


    As mentioned in the introduction, `Oracle ADF` applications are normally built
    on top of a relational database. `Oracle JDeveloper` offers several wizards that
    make it easy to build all the types of `ADF` business components you will need
    in your business services layer. There are five main types of business components
    :


    *   `Entity Objects` : These objects correspond directly to tables, so there will
    be one entity object for every table your application uses. The entity objects
    handle the technical details of converting attribute value changes to `INSERT`,
    `UPDATE`, and `DELETE` statements sent to the database.

    *   `Associations` : These objects define relationships between entity objects
    and correspond to foreign key relationships in the database. The `JDeveloper`
    wizard normally automatically detects foreign key and creates matching associations,
    but you can also create them manually.

    *   `View Objects` : These objects define the specific data you need for a particular
    use case. A view object can use data from multiple entity objects and thus from
    multiple tables. For example, an `Employees` view object might show a department
    name from the `Departments` entity object in addition to the employee information
    from the `Employees` entity object.

    *   `View Links` : These objects represent master-detail relationships between
    view objects and allow `ADF` to coordinate the detail records with the master.
    For example, if you show a department with a list of its employees, the view link
    connecting your `Departments` view object with your `Employees` view object ensures
    that the `Employees` view object only shows records for that department.

    *   `Application Modules` : These objects collect instances of all the view objects
    used in an application or a subsystem. Application modules control the database
    transactions, allowing you to make changes in many different view objects in the
    application module and them commit or roll back all the changes in one transaction.


    The different `ADF` business components can be visualized as shown in Figure 1-2.


    ![A437725_1_En_1_Fig2_HTML.jpg](A437725_1_En_1_Fig2_HTML.jpg)


    Figure 1-2.

    `ADF` business components


    ### Keeping Organized


    Your `ADF` application is going to contain a lot of business components of all
    five types. To make it easier for you to keep them separate so you can find the
    one you want, `JDeveloper` offers a preference setting that you should set.


    In the `JDeveloper` preferences dialog under the `ADF Business Components` node,
    change the package prefix setting for each type. This setting means that every
    time a `JDeveloper` wizard creates a business component for you, it will automatically
    place it in an appropriately named subpackage under the root package of your business
    component project.


    I recommend the settings shown in Figure 1-3.


    ![A437725_1_En_1_Fig3_HTML.jpg](A437725_1_En_1_Fig3_HTML.jpg)


    Figure 1-3.

    Preference settings for `ADF` business component packages'
