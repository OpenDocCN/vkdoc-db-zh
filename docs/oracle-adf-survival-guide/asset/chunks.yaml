    \ set a severity. There are four severities available:\n\n- `SEVERITY_FATAL` (not\
    \ often used; a fatal error typically crashes the application)\n- `SEVERITY_ERROR`\n\
    - `SEVERITY_WARN`\n- `SEVERITY_INFO`\n\nWhen you add the message to the faces\
    \ context with `null` as the first parameter, as shown in the preceding, the message\
    \ is displayed centered in the upper half of the application window, as shown\
    \ in Figure [5-10](#A437725_1_En_5_Chapter.html#Fig10).\n\n![A437725_1_En_5_Fig10_HTML.jpg](A437725_1_En_5_Fig10_HTML.jpg)\n\
    \n**Figure 5-10.** Message in default location\n\n## Message Related to a Component\n\
