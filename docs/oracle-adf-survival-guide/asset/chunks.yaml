    a view object instance (the square red/orange icon, e.g., AllDepartments) or an
    individual attribute (the rectangular XYZ icon, e.g., DepartmentName) and drop
    it onto the page fragment.


    When you drop an item from the data controls pane onto a page or page fragment,
    JDeveloper will automatically prompt you to select what type of user interface
    component you want to add. The list depends on the type of item, showing only
    those that are relevant to that item.


    #### Adding a View Object Instance


    When you drop a view object instance, you get a long list of possible user interface
    objects to create, but the most commonly used are ADF Form and ADF Table (ADF
    Table is found on a submenu under Table/List View).


    If you select an ADF Form , you get a page that shows one record at a time. The
    attributes will be arranged vertically with a separate field for each attribute.
    You can check the Row Navigation check box, as shown in Figure [1-18](#A437725_1_En_1_Chapter.html#Fig18),
    to ask JDeveloper to also add buttons to navigate to first, previous, next, and
    last record.


    ![A437725_1_En_1_Fig18_HTML.jpg](A437725_1_En_1_Fig18_HTML.jpg)


    Figure 1-18.


    Creating an ADF Form


    If you do not provide a label for each attribute, ADF will use the UI hint from
    the view object. If no UI hint was set in the view object, ADF will then fall
    back to any UI hint sent on the entity object. If no label is specified there
    either, the label becomes the attribute name derived from the database column.


    Technically, JDeveloper creates an `<af:PanelFormLayout>` component containing
    individual `<af:InputText>` components connected to the attributes in the view
    object instance you drop. If you checked the Row Navigation check box, you also
    get buttons connected to the standard operations First, Previous, Next, and Last
    that every view object automatically offers.


    If you select an ADF Table , you get a page that shows many records in a table
    with each record as one row in the table. You can select check boxes to enable
    sorting (by clicking the column header) and enable filtering (adding a filter
    criteria box at the top of each column). You can also specify each attribute label
    if you don’t want to use the default. Technically, JDeveloper creates an `<af:Table>`
    component bound to the entire view object instance.


    #### Adding an Individual Attribute


    You can also drop an individual attribute onto a page or page fragment. In that
    case, your choices of user interface component are different—the most commonly
    used component is an ADF Input Text w/ Label that displays as a labeled input
    field as you’d expect. You can explicitly specify a label or accept the default
    coming from the view object UI hints, the entity object UI hints, or the database
    column name.'
  trans: '

    ## 查看和配置您的页面


    当您创建页面后，它会在 JDeveloper 主窗口中打开。有几种方式可以查看您的应用程序：


    *   设计视图

    *   源代码视图

    *   结构窗口


    此外，JDeveloper 会显示一个“属性”窗口，其中包含当前所选项目的详细信息。


    **提示**：您可以根据自己的喜好重新排列 JDeveloper 中的窗口。要恢复为默认的窗口布局，请选择 `窗口 ➤ 将窗口重置为出厂设置`。


    ### 设计视图


    页面的初始视图是设计视图。在此视图中，JDeveloper 会尝试显示页面在运行时的大致样子。窗口顶部的工具栏（如图 1-15 所示）允许您更改视图。


    ![图 1-15：设计视图](img/A437725_1_En_1_Fig15_HTML.jpg)


    “设计”设置显示有关页面的技术细节，在构建页面时可能有用：例如，布局组件的边框以及字段及其值的技术细节。“真实”设置则显示页面在运行时的样子，使用正确数据类型（文本、数字、日期）的虚拟数据。“焦点”按钮只显示一个布局容器，当您有包含多个嵌套容器的复杂布局时，这可能很有用。不同的屏幕图标允许您以各种尺寸和方向（桌面、横向平板电脑、纵向平板电脑、横向智能手机、纵向智能手机）测试布局。您可以自定义每个尺寸具体应代表多少像素。最后，您可以在配置的各种浏览器中查看带有虚拟数据的页面或页面片段。


    ### 源代码视图


    要查看页面背后的实际源代码，您可以点击窗口底部的“源代码”选项卡切换到源代码视图。此视图显示所有组件和设置，并允许您自由进行任何更改。


    ADF 页面的所有组件都是层次结构的一部分，您可以使用左侧边距中的 + 和 – 图标折叠和展开节点。窗口顶部的工具栏允许您启用“区块着色”，其中每个节点获得自己的颜色，以使结构更清晰。如果您进行了手动更改，还可以要求
    JDeveloper 重新格式化您的代码。


    默认情况下，JDeveloper 会在右侧边距显示“迷你地图”，为您提供代码的视觉概览。您可以从地图的上下文菜单中关闭它，并再次从源代码的上下文菜单中显示它（`源代码
    ➤ 显示迷你地图`）。


    最右侧边距的顶部如果显示一个绿色方块，表示您的代码有效。如果存在错误，顶部的区块会变为红色，并且您会在边距中对应错误位置的地方看到红色条。类似地，橙色表示警告。


    如果您有错误或警告，左侧边距通常会显示一个快速修复图标，提供 JDeveloper 对如何修复代码的最佳猜测。


    如果您想查看行号，可以在左侧边距中右键单击，然后从上下文菜单中选择“切换行号”。


    要切换回设计视图，请点击窗口底部的“设计”选项卡。


    ### 结构窗口


    如图 1-16 所示的“结构窗口”展示了页面组件层次结构的另一种视图。


    ![图 1-16：结构窗口](img/A437725_1_En_1_Fig16_HTML.jpg)


    默认情况下，此窗口位于 JDeveloper 的左下角。您在源代码视图中的选择以及在结构窗口中的选择会由 JDeveloper 保持同步，因此您可以点击结构窗口中的元素以快速跳转到页面源代码中的相应位置。设计视图、源代码视图、结构窗口和属性窗口只是应用程序的不同表现形式，因此，如果您在源代码视图中进行更改，例如，它会立即反映在结构窗口中。


    ## 添加数据绑定组件


    在一个包含模型和视图/控制器项目的简单 ADF Fusion 工作区中，您会自动在“应用程序”窗口的“数据控件”窗格中找到从您的应用程序模块创建的数据控件，如图
    1-17 所示。


    ![图 1-17：数据控件窗格](img/A437725_1_En_1_Fig17_HTML.jpg)


    JDeveloper 会为每个应用程序模块自动创建一个数据控件。在数据控件内部，您可以看到相应应用程序模块中的所有视图对象实例。从“数据控件”面板，您可以拖放一个视图对象实例（方形的红色/橙色图标，例如
    `AllDepartments`）或一个单独的属性（矩形的 XYZ 图标，例如 `DepartmentName`）到页面片段上。


    当您将数据控件窗格中的一个项目拖放到页面或页面片段上时，JDeveloper 会自动提示您选择要添加的用户界面组件类型。列表取决于项目的类型，只显示与该项目相关的组件。


    ### 添加视图对象实例


    当您拖放一个视图对象实例时，您会得到一个很长的可能用户界面对象列表，但最常用的是 ADF 表单和 ADF 表格（`ADF 表格` 在 Table/List
    View 的子菜单下可以找到）。


    如果您选择 ADF 表单，您将获得一个一次显示一条记录的页面。属性将垂直排列，每个属性有一个单独的字段。您可以勾选“行导航”复选框（如图 1-18 所示），要求
    JDeveloper 同时添加用于导航到第一条、上一条、下一条和最后一条记录的按钮。


    ![图 1-18：创建 ADF 表单](img/A437725_1_En_1_Fig18_HTML.jpg)


    如果您没有为每个属性提供标签，ADF 将使用视图对象中的 UI 提示。如果视图对象中没有设置 UI 提示，ADF 将退而使用实体对象上设置的任何 UI 提示。如果那里也没有指定标签，则标签将变成从数据库列派生的属性名称。


    从技术上讲，JDeveloper 创建一个 `<af:PanelFormLayout>` 组件，其中包含连接到您拖放的视图对象实例中各个属性的单独 `<af:InputText>`
    组件。如果您勾选了“行导航”复选框，您还会获得连接到每个视图对象自动提供的标准操作“第一条”、“上一条”、“下一条”和“最后一条”的按钮。


    如果您选择 ADF 表格，您将获得一个在表格中显示多条记录的页面，每条记录作为表格中的一行。您可以选择复选框来启用排序（通过点击列标题）和启用过滤（在每列顶部添加一个过滤条件框）。如果您不想使用默认值，还可以指定每个属性的标签。从技术上讲，JDeveloper
    创建一个绑定到整个视图对象实例的 `<af:Table>` 组件。


    ### 添加单个属性


    您也可以将单个属性拖放到页面或页面片段上。在这种情况下，您的用户界面组件选择是不同的——最常用的组件是带标签的 ADF 输入文本，它会如您所料地显示为带标签的输入字段。您可以显式指定一个标签，或者接受来自视图对象
    UI 提示、实体对象 UI 提示或数据库列名称的默认值。

