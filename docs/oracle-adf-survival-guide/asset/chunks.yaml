  trans: '

    # 向客户端公开逻辑


    默认情况下，您添加到视图对象或应用程序模块中的逻辑对用户界面层是不可用的。要使您的方法可用，您需要从视图对象或应用程序模块的 Java 选项卡创建客户端接口。图
    4-13 展示了为视图对象创建客户端接口。


    ![A437725_1_En_4_Fig13_HTML.jpg](img/A437725_1_En_4_Fig13_HTML.jpg)


    图 4-13. 创建客户端接口


    对于视图对象，您可以为视图对象类和视图行类创建客户端接口。对于应用程序模块，只有一种客户端接口类型。类中的所有方法都会显示在“编辑客户端界面”对话框的左侧，您可以将想要公开的方法移动到右侧的“已选择”框中。


    当您像这样公开方法后，它们会与属性一起显示在“数据控制”面板中，如图 4-14 所示。


    ![A437725_1_En_4_Fig14_HTML.jpg](img/A437725_1_En_4_Fig14_HTML.jpg)


    图 4-14. 在数据控件窗格中公开的客户端方法


    一旦您的方法出现在“数据控件”窗格中，它们就可以被拖放到页面或页面片段上，并作为 ADF 操作元素（按钮或命令链接）放置。如果您想在用户界面中使用来自 Java
    Bean 的方法，您需要从相关页面的“绑定”选项卡创建一个操作绑定，如图 4-15 所示。我们将在第 5 章回到在用户界面中使用 Java Bean 的话题。


    ![A437725_1_En_4_Fig15_HTML.jpg](img/A437725_1_En_4_Fig15_HTML.jpg)


    图 4-15. 为客户端方法创建绑定


    ## 总结


    在本章中，您已经了解了如何使用自己的逻辑扩展 ADF 业务组件的标准功能。在某些情况下，您会覆盖标准的 ADF 方法，添加功能，甚至完全替换标准的 ADF
    处理。在其他情况下，您向视图对象或应用程序模块添加自己的逻辑，并通过客户端接口使该逻辑对用户界面层可用。


    在下一章中，您将看到如何在用户界面层添加业务逻辑。


    # 5. 表现层逻辑


    正如您在第 1 章所见，ADF 处理了将数据从数据库获取到网页、接受更改并存储回数据的所有基本功能。只有当您需要默认功能之外的东西时，才需要开始编写代码。


    本章描述了如何向表现层添加逻辑。ADF 提供了几种方式：


    *   预构建的 UI 组件验证器（声明式）

    *   托管 Bean（服务器端 Java 代码）

    *   自定义客户端 JavaScript


    ## 预构建的验证器


    您在第 4 章中看到，可以为业务组件属性添加大量验证，包括声明式和编程式。但这种验证发生在服务器端，需要进行服务器往返。有些类型的验证非常简单，可以通过客户端
    JavaScript 来处理，而 ADF 提供了几个预构建的验证器。


    您可以在“组件”窗口中底部附近的“操作”标题下找到这些验证器。如图 5-1 所示。


    ![A437725_1_En_5_Fig1_HTML.jpg](img/A437725_1_En_5_Fig1_HTML.jpg)


    图 5-1. UI 组件的声明式验证器


    要使用其中之一，您只需将其拖放到相关的 UI 组件上，例如“输入文本”组件。完成此操作后，它们将出现在页面的“源”视图中，如代码清单 5-1 所示。


    ```

    ...

    ...

    ```


    代码清单 5-1. 页面源码中声明式验证器的示例


    它们也会出现在 JDeveloper 窗口左下角的“结构”窗口中，如图 5-2 所示。


    ![A437725_1_En_5_Fig2_HTML.jpg](img/A437725_1_En_5_Fig2_HTML.jpg)


    图 5-2. “结构”窗口中的声明式验证器及其属性


    当您在源视图或“结构”窗口中选择验证器时，其属性会显示在“属性”窗口中。在这里，您可以配置验证器，并提供验证失败时要显示给最终用户的消息。


    声明式验证在客户端运行，并在用户离开字段时立即触发。图 5-3 显示了声明式验证失败时在用户界面中显示的结果。


    ![A437725_1_En_5_Fig3_HTML.jpg](img/A437725_1_En_5_Fig3_HTML.jpg)


    图 5-3. 声明式验证失败时向用户显示的消息


    ## 添加托管 Bean


    当您需要在应用程序的用户界面层应用逻辑时（用于高级验证、计算等），您需要用 Java 编写托管 Bean，并将它们连接到页面上的项目。在 ADF（和 JSF）中，实际的用户界面与表现层逻辑是分开的，通过将这两个功能拆分到不同的文件中：


    *   用户界面存储在 JavaServer Faces (JSF) 和 JavaServer Faces Fragment (JSFF) 文件中。

    *   表现层逻辑的源代码存储在 Java Bean 文件中。


    您的应用程序将包含许多 Java 文件。您通过将它们定义为任务流中的托管 Bean 来声明哪些文件是表现层的一部分，然后通过设置 UI 组件的属性以使用表达式语言语法引用
    Bean 类，将它们连接到您的 UI 组件。


    ADF 框架为您管理这些 Bean。这意味着它们会在适当的时间自动实例化，并在不再需要时自动销毁。它们存在的时间长短由其作用域决定，将在后面的小节中描述。


    ### Bean 类


    您想在应用程序用户界面层使用的所有类都必须是有效的 Java Bean。这意味着它们必须：


    1.  具有一个公共的、无参数的默认构造函数。

    2.  允许使用标准的 setter 和 getter 方法访问所有属性。

    3.  是可序列化的。


    构造函数只是一个与类同名且不接受参数的方法。ADF 框架在创建 Bean 类的实例时调用此方法。


    setter 和 getter 方法必须按照 JavaBean 约定命名。例如，如果 Bean 有一个名为 `firstName` 的 `String` 属性，则它必须具有
    `setFirstName()` 和 `getFirstName()` 方法。


    注意


    您的 Java Bean 源代码中的属性必须以小写字母开头。


    Bean 是可序列化的意味着它可以被存储、从内存中删除，并在以后完全恢复，包括它之前拥有的所有内部状态。这对于您打算在比请求（Request）更长的作用域中使用的所有
    Bean 都是必需的。


    注意


    短寿命 Bean（请求作用域和后备 Bean 作用域）永远不需要存储和恢复，因此它们不需要是可序列化的。


    一个只包含属性值和代码的典型 Bean，可以通过简单地实现 `java.io.Serializable` 接口来使其可序列化。请注意，UI 组件和业务组件不是可序列化的，因此您不应尝试在托管
    Bean 中存储这些内容。

