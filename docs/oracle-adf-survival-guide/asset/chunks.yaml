  raw: '### Working with Selected Rows


    If you want to work with the current record in the ADF table that displays data
    from an iterator, you might try the `getCurrentRow()` method that exists in the
    `DCIteratorBinding` object. However, that method returns the current row in the
    view object instance, not the currently selected row in the user interface. To
    access the selected row or rows in an ADF table component, you need to work with
    the table component first.


    An ADF table has a property rowSelection that you can set to none, single, and
    multiple. When you drop a view object instance on a page, this is one of the selections
    you can make in the Create Table wizard, but you can of course always change it
    later. If you allow selection in a table, you can then retrieve the Key object
    for all selected records with the `getSelectedRowKeys()` method from the `RichTable`
    object connected to the UI component, as shown in Listing [5-9](#A437725_1_En_5_Chapter.html#Par97).


    ```

    ...

    import oracle.adf.model.BindingContext;

    import oracle.adf.model.binding.DCBindingContainer;

    import oracle.adf.model.binding.DCIteratorBinding;

    import oracle.adf.view.rich.component.rich.data.RichTable;

    import oracle.jbo.Key;

    import oracle.jbo.Row;

    import oracle.jbo.RowSetIterator;

    import org.apache.myfaces.trinidad.model.RowKeySet;

    ...

    public class EmpPage {

    ...

    private ComponentReference empTab;

    ...

    public void setEmpTab(RichTable empTab) {

    this.empTab = ComponentReference.newUIComponentReference(empTab);

    }

    public RichTable getEmpTab() {

    if (empTab != null) {

    return (RichTable)empTab.getComponent();

    } else {

    return null;

    }

    }

    ...

    public String ProcessEmps() {

    RowKeySet selectedEmps = getEmpTab().getSelectedRowKeys();

    Iterator selIter = selectedEmps.iterator();

    BindingContainer bc =

    BindingContext.getCurrent().getCurrentBindingsEntry();

    DCBindingContainer dcb =(DCBindingContainer)bc;

    DCIteratorBinding empIter =

    (DCIteratorBinding)dcb.

    findIteratorBinding("EmployeesInDeptVOIterator");;

    RowSetIterator rsi = empIter.getRowSetIterator();

    Row curr = null;

    while (selIter.hasNext()) {

    Key key = (Key)((List)selIter.next()).get(0);

    curr = rsi.getRow(key);

    // process row

    ...

    }

    return null;

    }

    }

    Listing 5-9.

    Working with Selected Rows in a Table

    ```


    When you have the set of row keys, you can get an Iterator object for the selected
    rows. This is an iterator over rows in the user interface and has nothing to do
    with the iterator connected with the view object instance.


    To actually work with the data of the selected rows, you still need the `DCIteratorBinding`
    as in the previous example. However, in this case, we get a `RowSetIterator` from
    it. The advantage of this object is that it makes it easy to find a specific row
    based on its key. As we loop over all the selected rows, we can retrieve the `Key`
    and then use that to retrieve the actual row from the view object with `getRow(key)`.


    ## Interacting with the User


    When a validation fails, you can use the default communication that ADF provides.
    This mechanism shows one or more messages and highlights any fields that fail
    validation. If you want more control over the messages displayed to your users,
    you need to create your own messages through using the JSF context. This object
    is created automatically and handles all the information around a server roundtrip.


    ### Default Message


    When you add your own messages to the JSF faces context, as shown in Listing [5-10](#A437725_1_En_5_Chapter.html#Par102),
    they are added to all the other messages your application wants to display to
    the user and displayed together in one dialog box.


    ```

    ...

    import javax.faces.application.FacesMessage;

    import javax.faces.context.FacesContext;

    ...

    public class DeptPage {

    ...

    public String ShowMessage() {

    FacesContext fctx = FacesContext.getCurrentInstance();

    FacesMessage fm = new FacesMessage("General message");

    fm1.setSeverity(FacesMessage.SEVERITY_WARN);

    fctx.addMessage(null, fm);

    return null;

    }

    ...

    }

    Listing 5-10.

    Displaying a Message to the User in Default Position

    ```


    As you can see, you create your message as `FacesMessage` objects with a message
    text and optionally set a severity. There are four severities available:


    *   SEVERITY_FATAL (not often used; a fatal error typically crashes the application)

    *   SEVERITY_ERROR

    *   SEVERITY_WARN

    *   SEVERITY_INFO


    When you add the message to the faces context with null as the first parameter,
    as shown in the preceding, the message is displayed centered in the upper half
    of the application window, as shown in Figure [5-10](#A437725_1_En_5_Chapter.html#Fig10).


    ![A437725_1_En_5_Fig10_HTML.jpg](A437725_1_En_5_Fig10_HTML.jpg)


    Figure 5-10.


    Message in default location


    ### Message Related to a Component


    If your message is related to a specific UI component on the page, you can provide
    the client ID of that item as the first parameter. Listing [5-11](#A437725_1_En_5_Chapter.html#Par110)
    shows this.


    ```

    ...

    import javax.faces.application.FacesMessage;

    import javax.faces.context.FacesContext;

    import oracle.adf.view.rich.component.rich.input.RichInputText;

    ...

    public class DeptPage{

    private ComponentReference dname;

    ...

    public void setDname(RichInputText dname) {

    this.dname = ComponentReference.newUIComponentReference(dname);

    }

    public RichInputText getDname() {

    if (dname != null) {

    return (RichInputText)dname.getComponent();

    } else {

    return null;

    }

    }

    ...

    public String ShowAnother() {

    FacesContext fctx = FacesContext.getCurrentInstance();

    FacesMessage fm = new FacesMessage(FacesMessage.SEVERITY_INFO,

    "Summary", "This is the detailed message");

    String dnameItem = getDname().getClientId(fctx);

    logger.finer("Dname field is " + dnameItem);

    fctx.addMessage(dnameItem, fm);

    return null;

    }

    ...

    }

    Listing 5-11.

    Displaying a Message to the User in Relation to a Specific Component

    ```


    This requires that the component is connected to a bean property—in the preceding
    example, the Binding property of the department name item is set to `#{backingBeanScope.deptPage.dname}`.


    Note that even though the first parameter of `addMessage()` is technically just
    a `String`, you can’t just write the component ID here. You need the full location
    of the component, which depends on all the containers enclosing the component.
    The correct value will be something like `pt1:r1:0:pt1:it2`, so you should let
    `getClientId()` handle that for you.


    When you place the message together with the component, it looks as shown in Figure
    [5-11](#A437725_1_En_5_Chapter.html#Fig11).


    ![A437725_1_En_5_Fig11_HTML.jpg](A437725_1_En_5_Fig11_HTML.jpg)


    Figure 5-11.


    Message aligned with UI component


    It is possible to add both general and component-aligned messages to a page. ADF
    does its best to show all of them, but the result is confusing to most users.
    If you are going to add your own messages, use only one position.


    ### Using a Message Area


    If you don’t want your general messages displayed in a pop-up window, you can
    also add an inline Messages component (`<af:messages inline="true">`) somewhere
    on your page. All general (not component aligned) ADF messages will then be displayed
    in this area.


    ## Logic in Task Flows


    With managed beans, you can implement custom behavior in your pages, but you can
    also add your own code to control behavior in task flows.'
