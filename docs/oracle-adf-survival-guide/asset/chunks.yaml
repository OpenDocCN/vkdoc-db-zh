  trans: '### 构建单个项目


    要使用 Ant 构建单个项目，您可以选择 File ➤ New ➤ From Gallery ➤ General ➤ Ant ➤ Buildfile from
    Project。此时将出现“从项目创建构建文件”对话框，如图 7-14 所示。


    ![A437725_1_En_7_Fig14_HTML.jpg](img/A437725_1_En_7_Fig14_HTML.jpg)


    图 7-14. 从项目创建构建文件


    请确保勾选“包含打包任务（使用 `ojdeploy`）”复选框。此选项意味着 JDeveloper 将包含用于将所有内容实际打包到 ADF 库中的构建任务。JDeveloper
    包含在您的构建文件中的任务取决于与 JDeveloper 一起安装的 `ojdeploy` 实用程序。目前无法仅在构建服务器上安装 `ojdeploy` 实用程序，因此您必须在构建服务器上安装
    JDeveloper 才能使用 `ojdeploy`。


    为项目自动生成的构建文件将构建所有部署配置文件和所有相关项目。为了仅构建所需内容，您应该删除任何多余的部署配置文件，例如 JDeveloper 创建的默认配置文件。


    在所有 ADF 工作区中，JDeveloper 默认注册了一个从视图/控制器项目到模型项目的依赖项。Ant 构建会遵循此依赖关系，并在您构建视图/控制器时自动构建模型项目。这意味着您只需为每个子系统工作区中的视图/控制器项目创建一个
    Ant 构建文件。


    当您为项目创建构建文件时，JDeveloper 会创建一个包含各种设置和目录名的 `build.properties` 文件，以及 `build.xml`
    文件本身。这些文件会显示在“应用程序”窗口的“资源”节点下。


    `build.xml` 看起来与清单 7-1 中的类似。


    ```

    ...


    ...


    ...


    清单 7-1. 自动生成的 build.xml 文件

    ```


    您可以看到 `all` 目标依赖于 `deploy`、`compile` 和 `copy`。这意味着如果您选择构建 `all` 目标，所有依赖的构建目标也将被构建。这些任务大多仅使用标准的
    Ant 功能，文档位于 [`http://ant.apache.org/manual`](http://ant.apache.org/manual)。特定于
    ADF 的任务是 `ojdeploy`，位于 `deploy` 目标中。此任务指向构建所需的 `ojdeploy` 类并设置必要的参数。此目标的效果与从 JDeveloper
    内部手动构建部署配置文件相同。


    ### 构建主应用程序


    在为主应用程序创建 `build.xml` 文件之前，您需要确保已为视图/控制器项目创建了 WAR 部署配置文件，并为应用程序创建了 EAR 部署配置文件。


    WAR 部署配置文件的创建位置在项目属性的 Deployment 节点下，创建方式与子系统 ADF 库部署配置文件相同。


    EAR 部署配置文件是应用程序属性的一部分。选择 Application ➤ Application Properties ➤ Deployment 以创建
    EAR 文件部署配置文件。在 Application Assembly 节点上包含主视图项目。


    拥有这两个部署配置文件后，为应用程序创建一个 Ant 构建。通过 File ➤ New ➤ From Gallery ➤ General ➤ Ant ➤ Buildfile
    from Application 完成。应用程序的构建文件和构建属性文件将显示在“应用程序”窗口的“应用程序资源”部分，而不是在项目下。您可以通过右键单击构建文件并选择
    Run Ant Target ➤ deploy 来构建完整的应用程序。


    ### 构建基础框架和子系统


    要构建所有子系统，您可以向主构建文件添加一个新目标，该目标使用 `<ant>` 任务调用子目录中的 Ant 脚本。如果您的构建文件具有默认的 `build.xml`
    名称，您只需将 Ant 指向所有基础框架和子系统目录即可。您的新目标可能如清单 7-2 所示。


    ```

    ...


    清单 7-2. 调用基础框架和子系统构建目标的 Ant 目标

    ```


    根据您的目录布局，您可能需要调整对其他构建文件的引用。您可以通过在 JDeveloper 中右键单击 Ant 脚本并选择 Debug Ant Target，然后选择您的目标来调试您的
    Ant 脚本。这将为您提供更详细的输出，可用于查找任何错误。


    `inheritall=false` 是指示 Ant 不要将主构建文件参数传递给子系统构建，允许子系统使用其各自的 `build.properties` 文件。


    ### 复制 ADF 库


    所有基础框架和子系统的 ADF 库默认构建在其各自的部署目录中。您需要通过编写另一个使用 ant `copy` 任务的目标，将它们复制到您的公共 ADF 库位置。此目标可能如清单
    7-3 所示。


    ```

    ...


    清单 7-3. 将所有 ADF 库复制到公共位置的 Ant 目标

    ```


    注意


    前面清单中的 `file=` 参数应位于一行：它仅因书籍格式限制而换行。查询 ID="Q3" 文本="请注意书籍格式限制的引用。"。


    ### 组合构建


    最后，您可以修改 `deploy` 目标，使其依赖于这两个新任务，如下所示：`<target name="deploy" depends="buildsub,copysub"
    ... >`。这可确保它们在部署之前总是被调用，先是 `buildsub`，然后是 `copysub`。


    通过这种方法，您可以使用一个 Ant 构建指令构建整个应用程序，包括所有 ADF 库和主应用程序 EAR。该指令可以手动运行，也可以集成到您可能使用的任何持续构建工具中。


    ## 使用开发者云服务


    如果您正在使用任何 Oracle 云服务，Oracle 开发者云服务（DCS）是免费包含在内的。这项基于云的服务提供了一套全面的集成开发支持功能，包括：


    *   Git 仓库

    *   代码审查工作流

    *   任务/问题跟踪器

    *   Wiki

    *   构建服务器

    *   部署到其他 Oracle 云服务


    其他供应商如 Atlassian 或 GitHub 提供类似的服务，但由于如果您拥有其他 Oracle 云服务，该 Oracle 服务是免费的，因此您尝试一下可能是有意义的。


    ### 创建用户


    第一步是将您的开发者创建为 Oracle 开发者云服务的用户。从 [`http://cloud.oracle.com`](http://cloud.oracle.com)
    上的登录链接开始，您需要选择您的云服务运行在哪个数据中心，以及您的身份域，并输入您的用户名和密码。所有这些信息都可以在您注册 Oracle 云时收到的欢迎邮件中找到。


    从 Oracle 云仪表板，您可以单击右上角的“用户”按钮，将您的开发者定义为 Oracle 云服务的用户。在如图 7-15 所示的“添加用户”对话框中，请确保为您的开发者分配正确的角色。要使用开发者云服务，您的开发者需要“开发者服务用户角色”，而您的首席开发者和架构师可能需要“开发者服务管理员”。


    ![A437725_1_En_7_Fig15_HTML.jpg](img/A437725_1_En_7_Fig15_HTML.jpg)


    图 7-15. 为开发者云服务用户分配角色


    在撰写本文时，这不是一个非常直观的过程。要分配开发者服务用户角色，首先选择开发者服务（名称类似 `developer69750`），然后勾选“其他角色”复选框，最后单击
    ➤ 链接将该角色分配给用户。要分配开发者服务管理员角色，您需要勾选相应的复选框。希望在您阅读本书时，此过程已经变得更加用户友好。


    新创建的用户现在会收到一封包含账户信息和临时密码的电子邮件。'
- fmt: '# Creating Projects


    Developer Cloud Service (DCS) can contain many independent projects. These are
    projects in the real meaning of the word, not the limited JDeveloper projects.
    You can create projects through the DCS web interface, but when working with multiple
    JDeveloper workspaces in a modular or enterprise ADF architecture, it is easier
    to create your project from JDeveloper. This is a task done once by the lead developer
    or architect once the initial workspaces are created.


    ## Connecting to Developer Cloud Service


    To begin, you need to create a connection to your cloud service instance from
    JDeveloper. This is done from the JDeveloper main menu under `Team` ➤ `Team Server`
    ➤ `Add Team Server`. In the `New Team Server` dialog, provide a name for your
    service and the URL. You can copy the URL from the welcome mail or your web browser—it
    will be something like `https://developer.us2.oraclecloud.com/developer12345-a667788`.


    Then select `Team` ➤ `Team Server` ➤ (your service name) ➤ `Login`.


    **Note**

    To log on with a newly created Oracle Cloud user, you must log on through your
    web browser once to set your password and other authentication information.


    ## Creating a Project


    When you are logged in, choose `Team` ➤ `Team Server` ➤ (your service name) ➤
    `New project`. The `New Project on Oracle Developer Cloud Service` dialog appears.
    In the first step, you provide a project name and a few other pieces of information.
    The `Private/Shared` setting controls if the project is only accessible to users
    who have explicitly been granted access, or to all users that are part of your
    identity domain.


    In step two of the wizard, shown in Figure 7-16, you select the directory where
    you want your local Git repository to be placed, and select all the application
    workspaces you want to be part of this Git repository and Developer Cloud Service
    project.


    ![A437725_1_En_7_Fig16_HTML.jpg](A437725_1_En_7_Fig16_HTML.jpg)

    **Figure 7-16.** Adding application workspaces to Developer Cloud Service


    In the final step, you are given a confirmation that explains that your application
    workspaces will be moved to the new local repository location. The process then
    runs for a while, moving the workspaces and creating a new project on the Developer
    Cloud Service.


    When the process completes, you need to open one of the application workspaces
    from the new location. If you have any workspaces open from the original location,
    close these. The `Pending Changes` window will show the files in your workspace
    on the `Candidates` tab. Since the local and the central repository is Git, the
    same commands as described earlier apply: first you `Add All` and then you `Commit
    All`.


    **Note**

    Notice in the `Commit All` dialog box that your Developer Cloud Service is now
    automatically listed at the bottom under `Task Repository`. We’ll get back to
    that later in this chapter.


    When everything is committed to the local repository, do a `Push` to the central
    repository. When you look at your Developer Cloud Service instance from a web
    browser, you can now see your new project. When you open it, you see the project
    view shown in Figure 7-17.


    ![A437725_1_En_7_Fig17_HTML.jpg](A437725_1_En_7_Fig17_HTML.jpg)

    **Figure 7-17.** A project in Developer Cloud Service


    If you set your project to `Private`, you will have to add all relevant developers
    to your project on the `TEAM` tab (to the far right). If you set your project
    to `Shared`, all your Oracle Cloud users with the developer service user role
    can work on it.


    # Task Management


    The Developer Cloud Service also has a task/issue tracking feature. You can create
    them from within JDeveloper in the `Team` window (where they are called Tasks)
    or through the web interface (where they are called Issues). JDeveloper automatically
    keeps the tasks in JDeveloper in sync with the tasks on the server.


    The tasks have all the usual attributes, including priority, product, component,
    assignment, due date, estimate, time tracking, and so on.


    One interesting feature is that you can add private details to a task, including
    notes and a date you personally schedule that task for.


    If you use Developer Cloud Service, you should make use of this built-in task
    management, because you can choose a task each time you commit code to Git. This
    allows you full visibility into which code changes are associated with which task.


    # Working on Code


    Developer Cloud Service uses Git, so the workflow is similar to the regular Git
    workflow described earlier in this chapter: create a feature branch and check
    it out, make your code changes in the branch, and commit regularly to the local
    repository.


    When JDeveloper is connected to a Developer Cloud Service instance, the `Commit`
    dialog allows you to note which task the commit belongs to, as shown in Figure
    7-18.


    ![A437725_1_En_7_Fig18_HTML.jpg](A437725_1_En_7_Fig18_HTML.jpg)

    **Figure 7-18.** Commit dialog when connected to Developer Cloud Service


    Note that you can select a task to associate with the commit. You can also choose
    to close the task when committing and/or add task information to the commit comment.
    You decide whether to do this as soon as you commit locally (`After Commit`) or
    not until you push the change to the central repository (`After Push`).


    # Code Review


    When you are ready to submit your change to the central repository, you push your
    feature branch. Don’t do a local merge when working with Developer Cloud Service.


    When your feature branch has been pushed, go to the `Merge Requests` section on
    the DCS web pages and click `New Merge Request`. Select that you want to merge
    your feature branch with the master, as shown in Figure 7-19.


    ![A437725_1_En_7_Fig19_HTML.jpg](A437725_1_En_7_Fig19_HTML.jpg)

    **Figure 7-19.** Creating a new merge request


    In the second step of this wizard, choose the issue to link this merge request
    to, and select code reviewers.


    The code review will now see this code request under `Assigned to Me`. When the
    reviewer opens it, he can see all changed files and commits and can comment either
    on the review in general or on specific code lines, as shown in Figure 7-20.


    ![A437725_1_En_7_Fig20_HTML.jpg](A437725_1_En_7_Fig20_HTML.jpg)

    **Figure 7-20.** Commenting on a merge request


    Once the merge request has been approved, the feature branch can then actually
    be merged into the master branch. If you want, you can also let Developer Cloud
    Service delete the feature branch once the commit is complete.


    **Tip**

    Code reviews are often neglected in projects due to poor tool support. If you
    are using Developer Cloud Service, it is highly recommended to make use of this
    merge request feature.


    # Other Developer Cloud Service Features


    The Developer Cloud Service also has other features, including:


    *   **Wiki**: Normal wiki functionality for documentation of all kinds.

    *   **Snippets**: The ability to store useful pieces for code, either privately
    for yourself or shared with other developers on the project.

    *   **Agile**: A couple of boards and reports useful when developing in accordance
    with agile methodology.

    *   **Build**: A build server where you can define jobs to automatically build
    and test your code. Offers various trigger points and build steps using Ant, Maven,
    SQL, shell scripts, and other tools.

    *   **Deploy**: The ability to define deployment configurations so you can automatically
    deploy your code to Oracle Java Cloud Service, for example.


    # Conclusion


    Using the workflow described in this chapter, you can build high-quality enterprise
    applications. Together with the information from previous chapters about drag-and-drop
    building basic applications, enterprise architecture, user interface design, business
    logic, and logging and debugging, you are ready to work on real-life enterprise
    ADF applications.'
