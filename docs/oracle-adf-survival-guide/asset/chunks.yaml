  trans: '

    # 面板网格布局示例


    如果你查看快速入门示例的源代码，你会发现其中许多都使用了`<af:panelGridLayout>`组件，其中包含`<af:gridRow>`和`<af:gridCell>`组件。


    面板网格布局组件只是一个具有一些属性的容器，其布局主要由内部的行和单元格控制。


    在最简单的布局（称为“单列（拉伸）”）中，你只会得到一行和一个单元格。该行的高度属性设置为`100%`，这意味着该行将拉伸以占据所有垂直空间。在该行内部，单元格的宽度属性设置为`100%`，这意味着该单元格将拉伸以占据所有水平空间。该单元格的`halign`（水平对齐）和`valign`（垂直对齐）属性也都设置为“拉伸”。这意味着该单元格将尝试拉伸其内部的组件。这些组件和设置的综合效果是，布局将占据浏览器窗口中的所有可用空间，并将其用于其内容。


    # 创建你自己的面板网格布局


    你也可以从“组件”窗口中向页面添加面板网格布局。如果你希望更详细地控制页面某部分的布局，这会很有用。经验丰富的 ADF 开发者也常常先创建空白页面，然后自己添加布局组件。


    当你将面板网格布局组件放到页面上时，“创建面板网格布局”向导会出现，如图 3-2 所示。


    ![A437725_1_En_3_Fig2_HTML.jpg](img/A437725_1_En_3_Fig2_HTML.jpg)


    图 3-2. “创建面板网格布局”向导


    你需要决定行数和列数以及边距。内部网格边距定义了网格内行和单元格之间的间距，而外部网格边距则定义了面板网格布局边缘与最外层单元格之间的间距。例如，在上图中，从网格布局顶部到第一行为
    30 像素，行与行之间为 10 像素，最后一行与面板网格布局底部之间为 40 像素。


    在向导的第二步，你可以定义单元格的初始宽度和高度，并定义某些单元格是否应跨越多行或多列。


    你在“网格宽度”选项卡上所做的选择将用作该列所有单元格的宽度属性。默认情况下，JDeveloper 向导以百分比指定宽度，在列之间均匀分配空间。


    提示： 以百分比指定单元格宽度，并确保总和为 100%。如果你混合使用单位（例如像素和百分比）或没有分配所有空间，结果将是未定义的。


    你也可以将宽度设置为`auto`（自动）或`dontCare`（不关注）。对于单元格，`auto`宽度意味着它将根据单元格中的组件进行大小调整。单元格的`dontCare`设置意味着该列中的其他单元格可以定义宽度。你可能不希望将整个列设置为`dontCare`，因为这意味
    ADF 可以自由地给该列任何它想要的宽度。


    在“网格高度”选项卡上，行高始终是`auto`，意味着高度由行中的组件定义。向导完成后，你可以将高度更改为百分比（相对于尚未分配给其他行的空间）。


    在如图 3-3 所示的“跨度”选项卡上，你可以指定是否有任何单元格跨越多行或多列。你可以在右侧的预览中看到单元格的名称——它们将被命名为类似`gc1,3`的形式。


    ![A437725_1_En_3_Fig3_HTML.jpg](img/A437725_1_En_3_Fig3_HTML.jpg)


    图 3-3. 网格布局中的行和列跨度


    你通过定义“起始网格单元格（左上角）”和“结束网格单元格（右下角）”来定义每个跨度。JDeveloper 会尝试在第二个下拉列表中只显示有意义的选项，但你也可以创建无意义的、不合理的跨度。在这种情况下，应用程序中的显示效果当然是未定义的。


    当你完成向导时，JDeveloper 会创建一个`<af:panelGridLayout>`标签，并在其中放置必要的`<af:gridRow>`和`<af:gridCell>`标签，并设置相关属性。你可以在“属性”窗口或源代码视图中更改这些属性。跨度由`columnSpan`和`rowSpan`属性控制：你为这些属性设置的值表示你希望合并的单元格数量。这与
    HTML `<td>`标签使用`colspan`和`rowspan`属性的方式类似。


    ## 使用面板表单布局


    一种非常常见的布局是将多个输入元素排列在一列中，彼此上下相邻。你可以使用面板网格构建这种布局，但 ADF 为此提供了一个专门的布局管理器：面板表单布局（`<af:panelFormLayout>`）。


    你可以通过从“组件”窗口将“面板表单布局”组件拖到页面上来创建此布局。当你像第 1 章中看到的那样，从“数据控件”窗格将集合放到页面上时，JDeveloper
    也会使用面板表单布局。


    在面板表单布局内部，你可以放置所需的数据组件。通常，你会从“数据控件”面板将这些组件作为单个属性拖入，以便 JDeveloper 自动创建必要的数据绑定。


    面板表单布局包含一个页脚 facet，通常用于放置导航按钮、保存数据或执行业务逻辑的按钮，这些按钮通常放置在面板组布局内。例如，当你将视图对象实例作为 ADF
    表单放下并选中“行导航”复选框时得到的代码，看起来如清单 3-1 所示。


    ```

    清单 3-1. 面板表单布局示例

    ```


    控制面板表单布局的两个最重要的属性是`MaxColumns`（最大列数）和`Rows`（行数）属性。


    *   `Rows`控制 ADF 在开始新列之前渲染多少个输入元素。如果未输入值，所有输入元素将显示在一列中。例如，如果你将值设置为 10，ADF 将在第一列中渲染前
    10 个元素，然后为第 11 到 20 个项目开始第二列。

    *   `MaxColumns`定义允许的列数——桌面应用程序的默认值为 3，在平板电脑或智能手机上运行时默认值为 2。


    如果你的元素数量超过了`Rows`乘以`MaxColumns`，则`MaxColumns`限制具有优先权。也就是说，如果你有 30 个元素，`Rows`为`8`，`MaxColumns`为`3`，ADF
    将遵守`MaxColumns`限制并覆盖`Rows`设置，将你的元素渲染为 10 行乘以 3 列。

    '
- fmt: '### Using Panel Collection Layout


    Another specialized layout component is the Panel Collection Layout (`<af:panelCollectionLayout>`).
    This component is intended to be used together with an `<af:table>` component
    for displaying multiple data records at the same time.


    It contains three facets:


    *   The `menus` facet is used if you want to add extra items to the built-in menu
    items provided by the panel collection layout.

    *   The `toolbar` facet is used if you need a toolbar with buttons.

    *   The `statusbar` facet is used if you want to display additional information
    in a status bar below the table.


    To use a panel collection, drop it onto your page from the Components window.
    Then, drop a collection from the Data Controls pane onto the panel collection
    as an ADF Table. If you have already dropped a collection as a table, you can
    right-click the table component and choose Source ➤ Surround and then select a
    Panel Collection from the Surround With dialog.


    By default, the panel collection will show up as an extra line above the table.
    It contains a View menu with functionality to select which columns to display,
    how to sort them, and more. Figure [3-4](#A437725_1_En_3_Chapter.html#Fig4) shows
    the default menu.


    ![A437725_1_En_3_Fig4_HTML.jpg](A437725_1_En_3_Fig4_HTML.jpg)


    Figure 3-4.


    Panel collection with ADF table


    You can add additional menus next to the built-in View menu by dropping a Menu
    component (`<af:menu>`) onto the `menus` facet, either in the source view or in
    the Structure panel at the bottom left of the JDeveloper window. Inside this menu,
    you add menu items, normally `<af:commandMenuItem>`, that invoke methods in Java
    Bean classes you write. We’ll return to Java Beans in Chapter [5](#A437725_1_En_5_Chapter.html).


    If you want to add buttons directly to the panel collection top bar, you drop
    a Toolbar (`<af:toolbar>`) onto the toolbar facet and then drop Button components
    (`<af:button>`) onto the toolbar.


    To create a status bar below the table, you drop a Toolbar onto the `statusbar`
    facet and then place the desired component in the status bar. Often, this will
    be an Output Text with the value property set to some calculated status. In Chapter
    [4](#A437725_1_En_4_Chapter.html), we’ll return to how to compute values in Java
    code and display the result in an Output Text.


    ### Using Tabs and Accordions


    If you have more information than you can fit on one page, and the user needs
    to be able to switch quickly back and forth among all the elements, you can consider
    grouping it using tabs or accordions. Both are interactive container items that
    contain other layout components, which again contain the actual data elements
    or action items the user will be interacting with.


    #### Panel Tabbed


    We already discussed the Panel Tabbed component at the end of Chapter [1](#A437725_1_En_1_Chapter.html).
    This component will render each detail item within it as a separate tab when running
    the application. When you drop a Panel Tabbed (`<af:panelTabbed>`) onto a page
    or page fragment, JDeveloper shows the Create Panel Tabbed wizard. In this wizard,
    you can define all your tabs and select where to place them (above, below, both,
    left, right, start, or end). The start and end locations respect your regional
    settings and will show to the left for left-to-right languages like English and
    show to the right for right-to-left languages like Arabic.


    The wizard is of course just a shortcut to create multiple components at the same
    time. If you later decide you want another tab placement, you can change the Position
    attribute. If you find that you need an additional tab, you can add a Show Detail
    Item from the Components window or write or copy an `<af:showDetailItem>` tag
    in source view.


    If all your tabs do not fit on the screen, ADF will automatically display both
    scroll arrows, allowing you to scroll right and left, and a List all tabs icon
    (a downward-pointing triangle).


    #### Panel Accordion


    Another layout component that allows the user to choose between different views
    of your application is the Panel Accordion . This is named after the musical instrument
    that can also be expanded and contracted.


    When you drop a Panel Accordion onto a page from the Components window, the Create
    Panel Accordion appears. Similar to the wizard for creating a tabbed layout, this
    window allows you to define the panes you want inside the accordion. At the top
    of the dialog, you choose between One pane at a time and Multiple panes at the
    same time. If you choose to display one at a time, the open accordion will automatically
    close when the user selects a new one. You can of course only select Disclosed
    for one pane if you chose to have only one open. If you choose to allow the user
    to have multiple panes open, the Disclosed column changes to a check box where
    you can select multiple panes.


    If you later want to add a new pane, simply drop a Show Detail Item inside the
    panel accordion. To change between displaying one and many panes, you change the
    value of the Disclose Many property. For each detail within the accordion, you
    can control whether it is initially displayed by setting the Disclosed property.


    Tip


    You can convert your layout between Panel Tabbed and Panel Accordion by changing
    the just the panel component. The Show Detail Item components work the same way
    in both types of panel.


    ### Other Layout Components


    Panel Grid, Panel Form, and Panel Collection are the most commonly used layout
    components, and Panel Tabbed and Panel Accordion can help you if you have very
    complex pages. In addition to these, ADF offers a long list of other layout components,
    including


    *   Panel Stretch Layout with a center facet for content and optional top, bottom,
    start, and end facets for additional information.

    *   Panel Splitter with two facets, one of which can be collapsed. This allows
    the user the choice between using the entire screen area on one facet or to split
    the screen between the two facets.

    *   Show Detail offers a collapsible area you can use for supplementary information
    or optional input. Note that Show Detail is different from Show Detail Item. Show
    Detail is used on its own, but Show Detail Item is used in the context of a Panel
    Tabbed, Panel Accordion, or other layout containers.

    *   Decks offer a transition between different views (like a slideshow), and Panel
    Dashboard allows you to create a layout with boxes that can be rearranged by the
    user.


    Sometimes, you just want to adjust a little extra spacing to your layout, for
    example, to align items better. You can use Spacer components for this. These
    invisible components have a fixed width and height you can set in pixels.


    Note


    The recommended approach for alignment is to use a correctly configured Panel
    Grid Layout. Your design should not depend on Spacers.


    ### Responsive Design


    Responsive Design means applications that are built to change in response to available
    screen size. The idea is to build one application that looks good on both large
    desktop workstations and small tablets or even smartphones. ADF 12c release 2
    (12.2.x) has two features that make this easier: Masonry Layout and Match Media
    Behavior.'
  raw: '### Using Panel Collection Layout


    Another specialized layout component is the Panel Collection Layout (`<af:panelCollectionLayout>`).
    This component is intended to be used together with an `<af:table>` component
    for displaying multiple data records at the same time.


    It contains three facets :


    *   The `menus` facet is used if you want to add extra items to the built-in menu
    items provided by the panel collection layout.

    *   The `toolbar` facet is used if you need a toolbar with buttons.

    *   The `statusbar` facet is used if you want to display additional information
    in a status bar below the table.


    To use a panel collection, drop it onto your page from the Components window.
    Then, drop a collection from the Data Controls pane onto the panel collection
    as an ADF Table. If you have already dropped a collection as a table, you can
    right-click the table component and choose Source ➤ Surround and then select a
    Panel Collection from the Surround With dialog.


    By default, the panel collection will show up as an extra line above the table.
    It contains a View menu with functionality to select which columns to display,
    how to sort them, and more. Figure [3-4](#A437725_1_En_3_Chapter.html#Fig4) shows
    the default menu.


    ![A437725_1_En_3_Fig4_HTML.jpg](A437725_1_En_3_Fig4_HTML.jpg)


    Figure 3-4.


    Panel collection with ADF table


    You can add additional menus next to the built-in View menu by dropping a Menu
    component (`<af:menu>`) onto the `menus` facet, either in the source view or in
    the Structure panel at the bottom left of the JDeveloper window. Inside this menu,
    you add menu items, normally `<af:commandMenuItem>`, that invoke methods in Java
    Bean classes you write. We’ll return to Java Beans in Chapter [5](#A437725_1_En_5_Chapter.html).


    If you want to add buttons directly to the panel collection top bar, you drop
    a Toolbar (`<af:toolbar>`) onto the toolbar facet and then drop Button components
    (`<af:button>`) onto the toolbar.


    To create a status bar below the table, you drop a Toolbar onto the `statusbar`
    facet and then place the desired component in the status bar. Often, this will
    be an Output Text with the value property set to some calculated status. In Chapter
    [4](#A437725_1_En_4_Chapter.html), we’ll return to how to compute values in Java
    code and display the result in an Output Text.


    ### Using Tabs and Accordions


    If you have more information than you can fit on one page, and the user needs
    to be able to switch quickly back and forth among all the elements, you can consider
    grouping it using tabs or accordions. Both are interactive container items that
    contain other layout components, which again contain the actual data elements
    or action items the user will be interacting with.


    #### Panel Tabbed


    We already discussed the Panel Tabbed component at the end of Chapter [1](#A437725_1_En_1_Chapter.html).
    This component will render each detail item within it as a separate tab when running
    the application. When you drop a Panel Tabbed (`<af:panelTabbed>`) onto a page
    or page fragment, JDeveloper shows the Create Panel Tabbed wizard. In this wizard,
    you can define all your tabs and select where to place them (above, below, both,
    left, right, start, or end). The start and end locations respect your regional
    settings and will show to the left for left-to-right languages like English and
    show to the right for right-to-left languages like Arabic.


    The wizard is of course just a shortcut to create multiple components at the same
    time. If you later decide you want another tab placement, you can change the Position
    attribute. If you find that you need an additional tab, you can add a Show Detail
    Item from the Components window or write or copy an `<af:showDetailItem>` tag
    in source view.


    If all your tabs do not fit on the screen, ADF will automatically display both
    scroll arrows, allowing you to scroll right and left, and a List all tabs icon
    (a downward-pointing triangle).


    #### Panel Accordion


    Another layout component that allows the user to choose between different views
    of your application is the Panel Accordion . This is named after the musical instrument
    that can also be expanded and contracted.


    When you drop a Panel Accordion onto a page from the Components window, the Create
    Panel Accordion appears. Similar to the wizard for creating a tabbed layout, this
    window allows you to define the panes you want inside the accordion. At the top
    of the dialog, you choose between One pane at a time and Multiple panes at the
    same time. If you choose to display one at a time, the open accordion will automatically
    close when the user selects a new one. You can of course only select Disclosed
    for one pane if you chose to have only one open. If you choose to allow the user
    to have multiple panes open, the Disclosed column changes to a check box where
    you can select multiple panes.


    If you later want to add a new pane, simply drop a Show Detail Item inside the
    panel accordion. To change between displaying one and many panes, you change the
    value of the Disclose Many property. For each detail within the accordion, you
    can control whether it is initially displayed by setting the Disclosed property.


    Tip


    You can convert your layout between Panel Tabbed and Panel Accordion by changing
    the just the panel component. The Show Detail Item components work the same way
    in both types of panel.


    ### Other Layout Components


    Panel Grid, Panel Form, and Panel Collection are the most commonly used layout
    components, and Panel Tabbed and Panel Accordion can help you if you have very
    complex pages. In addition to these, ADF offers a long list of other layout components,
    including


    *   Panel Stretch Layout with a center facet for content and optional top, bottom,
    start, and end facets for additional information.

    *   Panel Splitter with two facets, one of which can be collapsed. This allows
    the user the choice between using the entire screen area on one facet or to split
    the screen between the two facets.

    *   Show Detail offers a collapsible area you can use for supplementary information
    or optional input. Note that Show Detail is different from Show Detail Item. Show
    Detail is used on its own, but Show Detail Item is used in the context of a Panel
    Tabbed, Panel Accordion, or other layout containers.

    *   Decks offer a transition between different views (like a slideshow), and Panel
    Dashboard allows you to create a layout with boxes that can be rearranged by the
    user.


    Sometimes, you just want to adjust a little extra spacing to your layout, for
    example, to align items better. You can use Spacer components for this. These
    invisible components have a fixed width and height you can set in pixels.


    Note


    The recommended approach for alignment is to use a correctly configured Panel
    Grid Layout. Your design should not depend on Spacers.


    ## Responsive Design


    Responsive Design means applications that are built to change in response to available
    screen size. The idea is to build one application that looks good on both large
    desktop workstations and small tablets or even smartphones. ADF 12c release 2
    (12.2.x) has two features that make this easier: Masonry Layout and Match Media
    Behavior.'
  trans: '### 使用面板集合布局


    另一个专门的布局组件是面板集合布局（`<af:panelCollectionLayout>`）。该组件旨在与`<af:table>`组件一起使用，以同时显示多条数据记录。


    它包含三个方面：

    *   `menus` 方面用于在面板集合布局提供的内置菜单项之外添加额外的项目。

    *   `toolbar` 方面用于当你需要带按钮的工具栏时。

    *   `statusbar` 方面用于在表格下方的状态栏中显示附加信息。


    要使用面板集合，请从“组件”窗口将其放置到你的页面上。然后，从“数据控制”窗格将一个集合以 ADF 表的形式放置到面板集合上。如果你已经将集合放置为表格，可以右键单击表格组件并选择“源”
    ➤ “环绕”，然后在“环绕方式”对话框中选择“面板集合”。


    默认情况下，面板集合会显示为表格上方的一行额外内容。它包含一个“视图”菜单，其功能包括选择要显示的列、如何对列进行排序等。图 3-4 展示了默认菜单。


    ![A437725_1_En_3_Fig4_HTML.jpg](img/A437725_1_En_3_Fig4_HTML.jpg)


    图 3-4.


    带有 ADF 表格的面板集合


    你可以通过在“源”视图或 JDeveloper 窗口左下角的“结构”面板中将菜单组件（`<af:menu>`）放置到 `menus` 方面，在内置的“视图”菜单旁边添加额外的菜单。在此菜单内部，你添加菜单项，通常是
    `<af:commandMenuItem>`，它们会调用你编写的 Java Bean 类中的方法。我们将在第 5 章回到 Java Bean 的讨论。


    如果你想直接向面板集合的顶部栏添加按钮，可以将工具栏（`<af:toolbar>`）放置到“工具栏”方面，然后将按钮组件（`<af:button>`）放置到工具栏上。


    要在表格下方创建状态栏，你需要将工具栏放置到 `statusbar` 方面，然后在状态栏中放置所需的组件。通常，这会是一个输出文本组件，其值属性设置为某种计算出的状态。在第
    4 章，我们将回到如何在 Java 代码中计算值并将其显示在输出文本中。


    ### 使用选项卡和手风琴式布局


    如果你的信息量超出一页所能容纳的范围，并且用户需要能够在所有元素之间快速来回切换，你可以考虑使用选项卡或手风琴式布局对其进行分组。两者都是交互式容器项，它们包含其他布局组件，而这些布局组件又包含用户将与之交互的实际数据元素或操作项。


    #### 面板选项卡式布局


    我们已经在第 1 章末尾讨论过面板选项卡式布局组件。该组件在运行应用程序时，会将其中的每个详细信息项渲染为单独的选项卡。当你将面板选项卡式布局（`<af:panelTabbed>`）放置到页面或页面片段上时，JDeveloper
    会显示“创建面板选项卡式布局”向导。在此向导中，你可以定义所有选项卡并选择它们的放置位置（上方、下方、上下方、左侧、右侧、起始端或末尾端）。起始端和末尾端位置会遵循你的区域设置，对于像英语这样从左到右的语言显示在左侧，对于像阿拉伯语这样从右到左的语言显示在右侧。


    该向导当然是创建多个组件的快捷方式。如果你后来决定更改选项卡放置位置，可以更改“位置”属性。如果你发现需要一个额外的选项卡，可以从“组件”窗口添加一个“显示详细信息项”，或者在“源”视图中编写或复制一个
    `<af:showDetailItem>` 标签。


    如果你的所有选项卡无法在屏幕上完全显示，ADF 将自动显示左右滚动箭头，以及一个“列出所有选项卡”图标（一个向下的三角形）。


    #### 面板手风琴式布局


    另一个允许用户在应用程序的不同视图之间进行选择的布局组件是面板手风琴式布局。它以这种可以展开和收缩的乐器命名。


    当你从“组件”窗口将面板手风琴式布局放置到页面上时，会出现“创建面板手风琴式布局”向导。与创建选项卡式布局的向导类似，此窗口允许你定义手风琴式布局内部的窗格。在对话框顶部，你可以在“一次显示一个窗格”和“同时显示多个窗格”之间进行选择。如果你选择一次显示一个，那么当用户选择一个新的窗格时，打开的手风琴式窗格将自动关闭。当然，如果你选择只允许一个窗格打开，你只能为一个窗格选择“已披露”。如果你选择允许多个窗格打开，“已披露”列将变为复选框，你可以选择多个窗格。


    如果你以后想添加一个新窗格，只需将“显示详细信息项”放置到面板手风琴式布局内部即可。要在显示一个和多个窗格之间切换，你需要更改“披露多个”属性的值。对于手风琴式布局中的每个详细信息项，你可以通过设置“已披露”属性来控制其是否最初显示。


    提示


    你可以仅通过更改面板组件，在面板选项卡式布局和面板手风琴式布局之间进行转换。“显示详细信息项”组件在这两种面板类型中的工作方式相同。


    ### 其他布局组件


    面板网格布局、面板表单布局和面板集合布局是最常用的布局组件，而面板选项卡式布局和面板手风琴式布局在页面非常复杂时可以提供帮助。除此之外，ADF 还提供了许多其他布局组件，包括：


    *   面板拉伸布局，其中心方面用于放置内容，可选的上、下、起始端和末尾端方面用于放置附加信息。

    *   面板分割器，具有两个方面，其中一个方面可以折叠。这允许用户在单个方面使用整个屏幕区域或在两个方面之间分割屏幕之间做出选择。

    *   显示详细信息提供了一个可折叠区域，可用于补充信息或可选输入。请注意，“显示详细信息”与“显示详细信息项”不同。“显示详细信息”是独立使用的，而“显示详细信息项”是在面板选项卡式布局、面板手风琴式布局或其他布局容器的上下文中使用的。

    *   卡片组在不同视图之间提供过渡效果（如幻灯片放映），而面板仪表板允许你创建一个带有框格的布局，用户可以重新排列这些框格。


    有时，你可能只想对布局额外调整一点间距，例如，为了更好地对齐项目。为此，你可以使用间距组件。这些不可见的组件具有你可以以像素为单位设置的固定宽度和高度。


    注意


    建议的对齐方法是使用正确配置的面板网格布局。你的设计不应依赖于间距组件。


    ### 响应式设计


    响应式设计意味着构建能够根据可用屏幕尺寸而变化的应用程序。其理念是构建一个应用程序，使其在大型桌面工作站和平板电脑甚至智能手机等小型设备上都具有良好的显示效果。ADF
    12c 第 2 版（12.2.x）有两个功能使这一点更容易实现：瀑布流布局和匹配媒体行为。'
- fmt: '# Masonry Layout


    The Masonry Layout manager dynamically arranges specially formatted detail items
    in a grid. While the name “masonry” might imply a fixed wall, it is actually a
    very dynamic layout, arranging the “bricks” when the page is first rendered, and
    rearranging them every time the application browser window changes in size. The
    ADF documentation calls the bricks tiles.


    This kind of layout makes sense in a dashboard-type application where you have
    many small information elements to present. Small data visualization components
    like donut charts work well in a masonry layout, either by themselves or as links
    to other pages with more detailed information.


    There are several different layout components you can use as bricks—the most common
    are `Panel Box` and `Panel Group Layout`. The documentation doesn’t state which
    ones work, but most components do not work as bricks in a masonry layout.


    **Tip**


    When you create a masonry layout in the current version of JDeveloper (12.2.1.2.0),
    it is filled with two default `Panel Box` components. A default `Panel Box` can
    be collapsed, but the masonry layout, unfortunately, doesn’t notice this, leading
    to a misaligned layout. Change the `Show Disclosure` property to `false` so the
    user can’t mess up the masonry layout.


    Just like Lego bricks, the bricks in a masonry layout must all have a standard
    size. The masonry layout has a default smallest brick of 170 × 170 pixels, and
    all other bricks are multiples of this size, taking into account the spacing between
    bricks.


    ## Brick Size


    The size of a component inside a masonry layout must be defined using the `Style
    Class` property. Oracle supplies eight standard sizes for us:


    *   `AFMasonryTileSize1x1`

    *   `AFMasonryTileSize1x2`

    *   `AFMasonryTileSize1x3`

    *   `AFMasonryTileSize2x1`

    *   `AFMasonryTileSize2x2`

    *   `AFMasonryTileSize2x3`

    *   `AFMasonryTileSize3x1`

    *   `AFMasonryTileSize3x2`


    If none of these fit your need, the masonry layout recognizes style class names
    above these, all the way up to `AFMasonryTileSize10x10`. However, if you want
    to use these larger sizes, you must define the corresponding CSS classes in your
    skin CSS file.


    The default size of a 1 × 1 brick is 170 by 170 pixels. The default border is
    8 pixels, so the distance between two adjacent bricks is 16 pixels. In order for
    the masonry to line up correctly, larger bricks must have a size that is a multiple
    of the base size plus the distance between bricks. For example, the total width
    of two 1 × 1 bricks next to each other is 2 × 170 pixel + 2 × 8 pixel border between
    them. Therefore, the 2 × 1 brick is 356 pixels wide.


    **Note**


    It is possible to override the `AFMasonryTileSize` classes in your own CSS file,
    creating a masonry layout with different brick sizes. Because masonry layout is
    a brand-new feature in ADF 12.2 and still has some rough edges, it is not recommended
    to use a nonstandard brick size.


    ## Brick Alignment at Runtime


    At runtime, ADF renders a masonry layout by adding bricks in the order they are
    listed inside the `<af:masonryLayout>` tag. They are added in reading order from
    left to right (unless you have configured your ADF application for a right-to-left
    language). Bricks are added one at a time until the next brick can no longer fit
    in the current row. The brick that didn’t fit then becomes the first brick in
    a new row. As soon as the layout has more than one row, ADF tries to fit the next
    brick into any open space in each row. Only if it does not fit anywhere, is it
    added to the end of the bottom row.


    For example, if a wide 3x1 brick has caused ADF to start a second row, it might
    still be able to fit any subsequent 1x1 or 2x1 bricks into the first row. Similarly,
    ADF tries to fill any holes left over by bricks of different height.


    ## Masonry Best Practice


    If you have many large bricks, as shown in Figure [3-5](#A437725_1_En_3_Chapter.html#Fig5),
    ADF can’t really fit them together into a nice-looking layout.


    ![A437725_1_En_3_Fig5_HTML.jpg](A437725_1_En_3_Fig5_HTML.jpg)


    Figure 3-5. Too many large bricks in a masonry layout


    To make a masonry layout work well, you need a good supply of small (1 × 1) bricks
    that ADF can fit into any spaces left over by the larger bricks, as shown in Figure
    [3-6](#A437725_1_En_3_Chapter.html#Fig6).


    ![A437725_1_En_3_Fig6_HTML.jpg](A437725_1_En_3_Fig6_HTML.jpg)


    Figure 3-6. Masonry layout with enough small bricks


    On a large monitor, a masonry layout will end up on one line, as shown in Figure
    [3-7](#A437725_1_En_3_Chapter.html#Fig7), unless you limit it.


    ![A437725_1_En_3_Fig7_HTML.jpg](A437725_1_En_3_Fig7_HTML.jpg)


    Figure 3-7. Very wide masonry layout


    To avoid this, you can place the masonry layout inside another container with
    a limited with. You can place it inside a `Panel Group Layout` where you set the
    `InlineStyle` property to, for example, `max-width:750px`.


    # Screen-Dependent Formatting


    The masonry layout is an automatic way of implementing responsive design—ADF fits
    the defined bricks into the layout as well as it can.


    However, ADF also offers another way of controlling the layout of pages depending
    on screen size: through the `<af:matchMediaBehavior>` tag. When you place this
    tag inside another component, it can control some attributes of its surrounding
    tag. For example, you can control the `Rows` attribute of a `Panel Form Layout`,
    as shown in Listing [3-2](#A437725_1_En_3_Chapter.html#Par105).


    ```

    ...

    ```


    Listing 3-2. Using `<af:matchMediaBehavior>`


    In this example, the `Rows` property of the `Panel Form Layout` has the default
    value `6`, but if the screen size falls below 768 pixels, the value of `Rows`
    changes to `12`.


    The `<af:matchMediaBehavior>` attributes specify which attribute of the containing
    tag is to be changed (`propertyName`), and what the value is to be (`matchedPropertyValue`).
    The condition is placed in the `mediaQuery` property and follows standard CSS3
    media query syntax.


    It is important that the property is explicitly defined in the containing tag—in
    this case, that the `Panel Form Layout` has `Rows` defined. Otherwise, your application
    will fail with a `NullPointerException`.


    In the version of ADF current when this book was written (12.2.1.2.0), the `<af:matchMediaBehavior>`
    tag has no documentation except a short example in the documentation—it doesn’t
    even appear in the online tag documentation at [http://docs.oracle.com/middleware/12212/adf/tag-reference-faces/toc.htm](http://docs.oracle.com/middleware/12212/adf/tag-reference-faces/toc.htm)
    . It doesn’t seem to be able to do much more than changing this specific attribute.
    It would be very useful if you could change the width of an element, but that
    doesn’t seem to work in the current version. It would also be an excellent feature
    if you could change the `Rendered` property, which controls whether a specific
    component is shown or not.


    **Note**


    Check the documentation and the tag guide to see if the functionality of `<af:matchMediaBehavior>`
    has improved since this book was written.


    # Styling


    All the ADF components have an acceptable default visual appearance. However,
    most organizations want to change the look in some way, and ADF supports that.
    Because an ADF application is a web application running in a browser, normal Cascading
    Style Sheet (CSS) styling works for ADF components. This section describes how
    to change the look of individual components.


    Almost every ADF component has an `InlineStyle` property where you can write CSS
    styling. Some components also have a `ContentStyle` property and a few have an
    additional `LabelStyle` property.


    There is also a `StyleClass` property where you can enter a reference to a CSS
    style class. Using this property requires that your application has a separate
    CSS file.'
  raw: "### Masonry Layout\n\nThe Masonry Layout manager dynamically arranges specially\
    \ formatted detail items in a grid. While the name “masonry” might imply a fixed\
    \ wall, it is actually a very dynamic layout, arranging the “bricks” when the\
    \ page is first rendered, and rearranging them every time the application browser\
    \ window changes in size. The ADF documentation calls the bricks tiles.\n\nThis\
    \ kind of layout makes sense in a dashboard-type application where you have many\
    \ small information elements to present. Small data visualization components like\
    \ donut charts work well in a masonry layout, either by themselves or as links\
    \ to other pages with more detailed information.\n\nThere are several different\
    \ layout components you can use as bricks—the most common are Panel Box and Panel\
    \ Group Layout. The documentation doesn’t state which ones work, but most components\
    \ do not work as bricks in a masonry layout.\n\nTip\n\nWhen you create a masonry\
    \ layout in the current version of JDeveloper (12.2.1.2.0), it is filled with\
    \ two default Panel Box components. A default Panel Box can be collapsed, but\
    \ the masonry layout, unfortunately, doesn’t notice this, leading to a misaligned\
    \ layout. Change the Show Disclosure property to false so the user can’t mess\
    \ up the masonry layout.\n\nJust like Lego bricks, the bricks in a masonry layout\
    \ must all have a standard size. The masonry layout has a default smallest brick\
    \ of 170 × 170 pixels, and all other bricks are multiples of this size, taking\
    \ into account the spacing between bricks.\n\n#### Brick Size\n\nThe size of a\
    \ component inside a masonry layout must be defined using the Style Class property.\
    \ Oracle supplies eight standard sizes for us:\n\n*   AFMasonryTileSize1x1\n*\
    \   AFMasonryTileSize1x2\n*   AFMasonryTileSize1x3\n*   AFMasonryTileSize2x1\n\
    *   AFMasonryTileSize2x2\n*   AFMasonryTileSize2x3\n*   AFMasonryTileSize3x1\n\
    *   AFMasonryTileSize3x2\n\nIf none of these fit your need, the masonry layout\
    \ recognizes style class names above these, all the way up to AFMasonryTileSize10x10.\
    \ However, if you want to use these larger sizes, you must define the corresponding\
    \ CSS classes in your skin CSS file.\n\nThe default size of a 1 × 1 brick is 170\
    \ by 170 pixels. The default border is 8 pixels, so the distance between two adjacent\
    \ bricks is 16 pixels. In order for the masonry to line up correctly, larger bricks\
    \ must have a size that is a multiple of the base size plus the distance between\
    \ bricks. For example, the total width of two 1 × 1 bricks next to each other\
    \ is 2 × 170 pixel + 2 × 8 pixel border between them. Therefore, the 2 × 1 brick\
    \ is 356 pixels wide.\n\nNote\n\nIt is possible to override the AFMasonryTileSize\
    \ classes in your own CSS file, creating a masonry layout with different brick\
    \ sizes. Because masonry layout is a brand-new feature in ADF 12.2 and still has\
    \ some rough edges, it is not recommended to use a nonstandard brick size.\n\n\
    #### Brick Alignment at Runtime\n\nAt runtime, ADF renders a masonry layout by\
    \ adding bricks in the order they are listed inside the `<af:masonryLayout>` tag.\
    \ They are added in reading order from left to right (unless you have configured\
    \ your ADF application for a right-to-left language). Bricks are added one at\
    \ a time until the next brick can no longer fit in the current row. The brick\
    \ that didn’t fit then becomes the first brick in a new row. As soon as the layout\
    \ has more than one row, ADF tries to fit the next brick into any open space in\
    \ each row. Only if it does not fit anywhere, is it added to the end of the bottom\
    \ row.\n\nFor example, if a wide 3x1 brick has caused ADF to start a second row,\
    \ it might still be able to fit any subsequent 1x1 or 2x1 bricks into the first\
    \ row. Similarly, ADF tries to fill any holes left over by bricks of different\
    \ height.\n\n#### Masonry Best Practice\n\nIf you have many large bricks, as shown\
    \ in Figure [3-5](#A437725_1_En_3_Chapter.html#Fig5), ADF can’t really fit them\
    \ together into a nice-looking layout.\n\n![A437725_1_En_3_Fig5_HTML.jpg](A437725_1_En_3_Fig5_HTML.jpg)\n\
    \nFigure 3-5.\n\nToo many large bricks in a masonry layout\n\nTo make a masonry\
    \ layout work well, you need a good supply of small (1 × 1) bricks that ADF can\
    \ fit into any spaces left over by the larger bricks, as shown in Figure [3-6](#A437725_1_En_3_Chapter.html#Fig6).\n\
    \n![A437725_1_En_3_Fig6_HTML.jpg](A437725_1_En_3_Fig6_HTML.jpg)\n\nFigure 3-6.\n\
    \nMasonry layout with enough small bricks\n\nOn a large monitor, a masonry layout\
    \ will end up on one line, as shown in Figure [3-7](#A437725_1_En_3_Chapter.html#Fig7),\
    \ unless you limit it.\n\n![A437725_1_En_3_Fig7_HTML.jpg](A437725_1_En_3_Fig7_HTML.jpg)\n\
    \nFigure 3-7.\n\nVery wide masonry layout\n\nTo avoid this, you can place the\
    \ masonry layout inside another container with a limited with. You can place it\
    \ inside a Panel Group Layout where you set the InlineStyle property to, for example,\
    \ `max-width:750px`.\n\n### Screen-Dependent Formatting\n\nThe masonry layout\
    \ is an automatic way of implementing responsive design—ADF fits the defined bricks\
    \ into the layout as well as it can.\n\nHowever, ADF also offers another way of\
    \ controlling the layout of pages depending on screen size: through the `<af:matchMediaBehavior\
    \ >` tag. When you place this tag inside another component, it can control some\
    \ attributes of its surrounding tag. For example, you can control the Rows attribute\
    \ of a Panel Form Layout, as shown in Listing [3-2](#A437725_1_En_3_Chapter.html#Par105).\n\
    \n```\n\n...\n\nListing 3-2.\nUsing \n```\n\nIn this example, the Rows property\
    \ of the Panel Form Layout has the default value `6`, but if the screen size falls\
    \ below 768 pixels, the value of Rows changes to `12`.\n\nThe `<af:matchMediaBehavior>`\
    \ attributes specify which attribute of the containing tag is to be changed (`propertyName`),\
    \ and what the value is to be (`matchedPropertyValue`). The condition is placed\
    \ in the `mediaQuery` property and follows standard CSS3 media query syntax.\n\
    \nIt is important that the property is explicitly defined in the containing tag—in\
    \ this case, that the Panel Form Layout has Rows defined. Otherwise, your application\
    \ will fail with a `NullPointerException`.\n\nIn the version of ADF current when\
    \ this book was written (12.2.1.2.0), the `<af:matchMediaBehavior>` tag has no\
    \ documentation except a short example in the documentation—it doesn’t even appear\
    \ in the online tag documentation at [http://docs.oracle.com/middleware/12212/adf/tag-reference-faces/toc.htm](http://docs.oracle.com/middleware/12212/adf/tag-reference-faces/toc.htm)\
    \ . It doesn’t seem to be able to do much more than changing this specific attribute.\
    \ It would be very useful if you could change the width of an element, but that\
    \ doesn’t seem to work in the current version. It would also be an excellent feature\
    \ if you could change the Rendered property, which controls whether a specific\
    \ component is shown or not.\n\nNote\n\nCheck the documentation and the tag guide\
    \ to see if the functionality of `<af:matchMediaBehavior>` has improved since\
    \ this book was written.\n\n## Styling\n\nAll the ADF components have an acceptable\
    \ default visual appearance. However, most organizations want to change the look\
    \ in some way, and ADF supports that. Because an ADF application is a web application\
    \ running in a browser, normal Cascading Style Sheet (CSS) styling works for ADF\
    \ components. This section describes how to change the look of individual components.\n\
    \nAlmost every ADF component has an InlineStyle property where you can write CSS\
    \ styling. Some components also have a ContentStyle property and a few have an\
    \ additional LabelStyle property.\n\nThere is also a StyleClass property where\
    \ you can enter a reference to a CSS style class. Using this property requires\
    \ that your application has a separate CSS file."
