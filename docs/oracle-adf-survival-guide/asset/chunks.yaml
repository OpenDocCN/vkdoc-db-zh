    \ (RichInputText)dname.getComponent();\n    } else {\n        return null;\n \
    \   }\n}\n...\npublic String ShowAnother() {\n    FacesContext fctx = FacesContext.getCurrentInstance();\n\
    \    FacesMessage fm = new FacesMessage(FacesMessage.SEVERITY_INFO,\n        \"\
    Summary\", \"This is the detailed message\");\n    String dnameItem = getDname().getClientId(fctx);\n\
    \    logger.finer(\"Dname field is \" + dnameItem);\n    fctx.addMessage(dnameItem,\
    \ fm);\n    return null;\n}\n...\n}\n```\n**代码清单 5-11.** 与特定组件相关地向用户显示消息\n\n这要求该组件连接到\
    \ bean 属性——在前面的示例中，部门名称项的 `Binding` 属性被设置为 `#{backingBeanScope.deptPage.dname}`。\n\
    \n请注意，尽管 `addMessage()` 的第一个参数在技术上只是一个 `String`，但你不能只在这里写组件 ID。你需要组件的完整位置，这取决于包含该组件的所有容器。正确的值类似于\
    \ `pt1:r1:0:pt1:it2`，所以你应该让 `getClientId()` 为你处理这个。\n\n当你将消息与组件放在一起时，效果如图 5-11\
    \ 所示。\n\n![A437725_1_En_5_Fig11_HTML.jpg](img/A437725_1_En_5_Fig11_HTML.jpg)\n\
    \n**图 5-11.** 与 UI 组件对齐的消息\n\n可以向页面同时添加通用消息和与组件对齐的消息。ADF 会尽力显示所有消息，但结果对大多数用户来说是令人困惑的。如果你打算添加自己的消息，请只使用一种位置。\n\
    \n## 使用消息区域\n\n如果你不希望你的通用消息显示在弹出窗口中，你也可以在页面上的某处添加一个内联的 `Messages` 组件 (`<af:messages\
    \ inline=\"true\">`)。所有通用的（非组件对齐的）ADF 消息随后都将显示在此区域中。\n\n# 任务流中的逻辑\n\n通过托管 Bean，你可以在页面中实现自定义行为，但你也可以添加自己的代码来控制任务流中的行为。\n"
- fmt: '### Calling Managed Beans Task Flows


    If you want to run some code between two pages in your task flow, you drop a Method
    Call activity from the Components window onto the Diagram view of your task flow.
    Give your method call a name and set the Method property to point to the method
    you want to execute. You can click the gearwheel icon to the left of the field
    to bring up the Method Expression Builder. This allows you to click your way to
    the method you need, as shown in Figure `5-12`.


    ![A437725_1_En_5_Fig12_HTML.jpg](A437725_1_En_5_Fig12_HTML.jpg)

    Figure 5-12. Method Expression Builder


    When you have set the Method, you use regular Control Flow Case arrows to connect
    your Method Call to the other activities in the task flow. You need exactly one
    arrow going away from the Method Call, and the text on that Control Flow Case
    must match the value of the Fixed Outcome property.


    ### Using Business Logic in Task Flows


    You can also add logic from business components. Every operation shown in the
    Data Controls pane in the Applications window can be dragged onto the Diagram
    view and automatically becomes a Method Call activity. JDeveloper automatically
    establishes a binding if it doesn’t already exist, and sets the Method property
    to match. The value will be something like `#{binding. CreateWithParams.execute}`.


    Remember that you can add your own methods to ADF business components. If you
    have selected to create a Client Interface for your method, it shows up in the
    Data Control pane and can be used just like the built-in ADF operations.


    ### How to Use Router Components


    Method Call activities always have one outcome and the task flow follows the matching
    arrow to the next activity. However, you can make branching decisions in task
    flows using a Router activity.


    A Router can have any number of Control Flow Cases leading away to other activities.
    One of these must match the Default Outcome property of the Router. In addition
    to this, you can define a number of Cases, each matching an Expression to an Outcome
    (arrow).


    The expressions are written in Expression Language with the `#{ … }` syntax, or
    you can use the Expression Builder to click together an expression. Notice that
    the Expression Builder contains operands you can use to compare values.


    Tip: A literal value in Expression Language is written with single quotes inside
    the curly brackets, like this: `#{''This is a literal value''}`.


    For any logic more complicated than simple comparisons, it is normally best to
    create a method in a managed bean that does the necessary calculations. Expression
    Language quickly becomes hard to read.


    ## Task Flow Switching Logic


    In earlier chapters, we have seen that an enterprise ADF application is normally
    structured with a number of bounded task flows using page fragments and a master
    page containing a menu structure and handling security. To allow switching between
    task flows from a menu on the master page, we need a Dynamic Region component
    and some code.


    ### How Dynamic Regions Work


    When you drag a task flow onto a page, you are given the option to create either
    a Region or a Dynamic Region. For static test pages, you can just create a static
    Region, but in a master page that should be able to show different task flows,
    you need a Dynamic Region.


    The UI component on the page is an `<af:region>` in both cases, but if you choose
    a dynamic region, JDeveloper will help you create the additional code necessary.


    When you create a static region, JDeveloper just creates a task flow binding pointing
    to the fixed path of the task flow. This will look something like `/WEB-INF/dept-emp-flow.xml#dept-emp-flow`.


    When you create a dynamic region, JDeveloper does several things:

    * Creates a task flow binding pointing to a managed bean. This will look something
    like `${viewScope.PageSwitcherBean.dynamicTaskFlowId}`.

    * Prompts you for a name for the bean controlling the region and fills the bean
    class with sample content.

    * Adds the bean to the unbounded task flow of the view project.


    ### Building the Master Page


    When you have built the first two task flows, whether in one subsystem or two,
    you can create the master application and the master page with task flow switching.


    First, you need to create a template for the master page. This is done in the
    foundation workspace. Your template needs two facets: one for a menu and one for
    the page content. Normally, you would use a Panel Grid Layout with two rows of
    each one cell, setting the height of the top row to a small value like 30 pixels
    for the menu. The second row should take up all remaining space, so its height
    should be Auto. In the top cell, place a facet for the menu, and in the bottom
    cell, place a facet for the content.


    In accordance with the modular ADF application architecture, the master application
    needs to have access to all the components that make up the application. This
    means that you need to add all the ADF libraries from your foundation layer as
    well as the ADF libraries containing the subsystems to the master workspace.


    When you have added all the libraries, create the master page based on the template.
    In the menu facet, drop a Menu Bar component and then add one or more Menu components.
    On the Menu, you then drop Menu Item components that correspond with the task
    flows you want to display.


    When you have created the menu, you open the subsystem ADF Library in the Resources
    window, as shown in Figure `5-13`. Under the ADF Task Flows heading, you see all
    the task flows in the ADF Library. Drop one of these onto the content facet of
    your master page and choose Dynamic Region to get JDeveloper to do the necessary
    work described in the preceding section.


    ![A437725_1_En_5_Fig13_HTML.jpg](A437725_1_En_5_Fig13_HTML.jpg)

    Figure 5-13. The Resources window showing task flows from subsystems


    When you run this master page, you should see the page showing the menu and the
    one task flow you dropped on the page.


    ### Storing State


    The bean controlling the dynamic region has to be in view scope. This means it
    only exists while a specific page is being displayed, so it can’t store which
    task flow is selected. For this, we need another bean with a longer scope. A good
    choice is to create a bean with page flow scope in the unbounded task flow in
    the master application. When the master application is started, the unbounded
    task flow starts, instantiates its page flow scope beans, and displays the master
    page. Because the unbounded task flow in the master application is active as long
    as the application runs, a bean in this scope will last as long as the application
    runs.


    You need to create a state storing bean that looks as shown in Listing `5-12`.


    ```

    package com.vesterli.hrdemo.master.view.beans;

    import java.io.Serializable;

    public class UiStateBean implements Serializable {

    private String currentTF = "/WEB-INF/dept-emp-flow.xml#dept-emp-flow";

    public void setCurrentTF(String s) {

    this.currentTF = s;

    }

    public String getCurrentTF() {

    return currentTF;

    }

    }

    ```

    Listing 5-12. Bean for Storing Selected Task Flow


    This bean simply holds a String variable containing the path to the selected task
    flow. It should be initialized with the first task flow you want your application
    to display.


    You need to add this bean to the unbounded task flow (`adfc-config.xml`) in the
    view project of the master workspace in pageFlow scope.'
  raw: '### Calling Managed Beans Task Flows


    If you want to run some code between two pages in your task flow , you drop a
    Method Call activity from the Components window onto the Diagram view of your
    task flow. Give your method call a name and set the Method property to point to
    the method you want to execute. You can click the gearwheel icon to the left of
    the field to bring up the Method Expression Builder. This allows you to click
    your way to the method you need, as shown in Figure [5-12](#A437725_1_En_5_Chapter.html#Fig12).


    ![A437725_1_En_5_Fig12_HTML.jpg](A437725_1_En_5_Fig12_HTML.jpg)


    Figure 5-12.


    Method Expression Builder


    When you have set the Method, you use regular Control Flow Case arrows to connect
    your Method Call to the other activities in the task flow. You need exactly one
    arrow going away from the Method Call, and the text on that Control Flow Case
    must match the value of the Fixed Outcome property.


    ### Using Business Logic in Task Flows


    You can also add logic from business components. Every operation shown in the
    Data Controls pane in the Applications window can be dragged onto the Diagram
    view and automatically becomes a Method Call activity. JDeveloper automatically
    establishes a binding if it doesn’t already exist, and sets the Method property
    to match. The value will be something like `#{binding. CreateWithParams.execute}`.


    Remember that you can add your own methods to ADF business components. If you
    have selected to create a Client Interface for your method, it shows up in the
    Data Control pane and can be used just like the built-in ADF operations .


    ### How to Use Router Components


    Method Call activities always have one outcome and the task flow follows the matching
    arrow to the next activity. However, you can make branching decisions in task
    flows using a Router activity.


    A Router can have any number of Control Flow Cases leading away to other activities.
    One of these must match the Default Outcome property of the Router. In addition
    to this, you can define a number of Cases, each matching an Expression to an Outcome
    (arrow).


    The expressions are written in Expression Language with the `#{ … }` syntax, or
    you can use the Expression Builder to click together an expression. Notice that
    the Expression Builder contains operands you can use to compare values.


