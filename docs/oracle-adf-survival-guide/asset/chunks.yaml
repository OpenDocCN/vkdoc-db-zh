    \ of the component, which depends on all the containers enclosing the component.\
    \ The correct value will be something like `pt1:r1:0:pt1:it2`, so you should let\
    \ `getClientId()` handle that for you.\n\nWhen you place the message together\
    \ with the component, it looks as shown in Figure [5-11](#A437725_1_En_5_Chapter.html#Fig11).\n\
    \n![A437725_1_En_5_Fig11_HTML.jpg](A437725_1_En_5_Fig11_HTML.jpg)\n\n**Figure\
    \ 5-11.** Message aligned with UI component\n\nIt is possible to add both general\
