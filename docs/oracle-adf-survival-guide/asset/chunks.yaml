- fmt: '# Panel Grid Layout Example


    If you look at the source code for the quick start examples, you will see that
    many of them use an `<af:panelGridLayout>` component, containing `<af:gridRow>`
    and `<af:gridCell>` components.


    The panel grid layout component is just a container with a few properties, and
    the layout is mainly controlled by the rows and cells inside it.


    In the simplest possible layout, called One Column (Stretched), you get just one
    row and one cell. The height property of the row is set to `100%`, meaning the
    row will stretch to take up all vertical space. Inside the row, the cell has the
    width property set to `100%`, meaning the cell will stretch to take up all horizontal
    space. The cell also has both the `halign` and `valign` properties set to stretch.
    This means that the cell will attempt to stretch components inside it. The net
    effect of these components and settings is a layout that will take up all available
    space in the browser window and use it for its content.


    # Creating Your Own Panel Grid Layout


    You can also add a panel grid layout to a page from the Components window. This
    can be useful if you decide you want more detailed control over the layout of
    a part of the page. Experienced ADF developers also often just create their pages
    blank and add layout components themselves.


    When you drop a panel grid layout component on a page, the Create Panel Grid Layout
    wizard appears as shown in Figure [3-2](#A437725_1_En_3_Chapter.html#Fig2).


    ![A437725_1_En_3_Fig2_HTML.jpg](A437725_1_En_3_Fig2_HTML.jpg)


    Figure 3-2. Create Panel Grid Layout wizard


    You decide on the number of rows and columns and the margins. The inner grid margins
    define the spacing between rows and cells inside the grid, and the outer grid
    margins define the spacing between the edge of the panel grid layout and the outermost
    cells. For example, in the preceding figure, there are 30 pixels from the top
    of the grid layout to the first row, then 10 pixels between rows, and then 40
    pixels between the last row and the bottom of the panel grid layout.


    In the second step of the wizard, you can define the initial width and height
    of the cells and define if some cells should span several rows or columns.


    The choice you make on the Grid Width tab is used as the width property of all
    cells in the column. By default, the JDeveloper wizard specifies width in percent,
    distributing space evenly between the columns.


    Tip: Specify cell widths in percent and make sure the total adds up to 100%. If
    you mix units (pixels and percent, for instance) or don’t allocate all space,
    the results are undefined.


    You can also set the width to `auto` or `dontCare`. For a cell, `auto` width means
    it will be sized according to the components in the cell. The `dontCare` setting
    for a cell means that the other cells in the column can define the width. You
    probably don’t want to set `dontCare` for a whole column, because this means ADF
    is free to give the column whatever width it feels like.


    On the Grid Height tab, the row height is always `auto`, meaning the height is
    defined by the components in the row. After the wizard is complete, you can change
    the height to a percentage (of the space not already allocated to other rows).


    On the Spans tab shown in Figure [3-3](#A437725_1_En_3_Chapter.html#Fig3), you
    can specify if any cells span multiple rows or columns. You can see the name of
    the cells in the Preview to the right—they will be named something like `gc1,3`.


    ![A437725_1_En_3_Fig3_HTML.jpg](A437725_1_En_3_Fig3_HTML.jpg)


    Figure 3-3. Row and column spans in grid layout


    You define each span by defining the From grid cell (top, left) and the To grid
    cell (bottom, right). JDeveloper will try to show only the options that make sense
    in the second drop-down, but you can create impossible spans that don’t make sense.
    In this case, the appearance in the application is, of course, undefined.


    When you finish the wizard, JDeveloper creates an `<af:panelGridLayout>` tag and
    places the necessary `<af:gridRow>` and `<af:gridCell>` tags inside it with the
    relevant properties set. You can change the properties either in the Properties
    window or in the source view. Spans are controlled with the `columnSpan` and `rowSpan`
    properties: the value you set for these properties indicates how many cells you
    want to merge. This is similar to the way HTML `<td>` tag uses `colspan` and `rowspan`
    properties.


    ## Using Panel Form Layout


    A very common layout is having several input elements arranged below each other
    in one column. You can build this kind of layout with panel grid, but ADF has
    a specialized layout manager for this: the Panel Form Layout (`<af:panelFormLayout>`).


    You create this layout by dragging a Panel Form Layout component onto your page
    from the Components window. When you drop a collection onto a page from the Data
    Controls pane as you saw in Chapter [1](#A437725_1_En_1_Chapter.html), JDeveloper
    will also use a panel form layout.


    Inside the panel form layout, you can place the data components you need. Often,
    you will drag these in from the Data Controls panel as individual attributes in
    order to get JDeveloper to create the necessary data binding automatically.


    The panel form layout contains a footer facet that is often used for buttons to
    navigate, save data, or execute business logic, typically placed inside a panel
    group layout. For example, the code you get when you drop a view object instance
    as an ADF Form and check the Row Navigation check box looks like Listing [3-1](#A437725_1_En_3_Chapter.html#Par49).


    ```

    Listing 3-1. Example of Panel Form Layout

    ```


    The two most important properties controlling a panel form layout is the `MaxColumns`
    and `Rows` properties.


    *   `Rows` control how many input elements ADF render before it starts a new column.
    If you don’t enter a value, all your input elements will be shown in one column.
    If for example, you set the value 10, ADF will render the first 10 elements in
    the first column and then start a second column for items 11 through 20.

    *   `MaxColumns` defines how many columns are allowed—the default value is 3 for
    desktop applications and 2 when running on a tablet or smartphone.


    If you have more elements than `Rows` times `MaxColumns`, the `MaxColumns` limitation
    has priority. That is, if you have 30 elements, `Rows` is `8` and `MaxColumns`
    is `3`, ADF will adhere to the `MaxColumns` limitation and override the `Rows`
    setting, rendering your elements as 10 rows by 3 columns.'
