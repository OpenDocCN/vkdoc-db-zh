  trans: '## 向导演示


    当你开始使用 Oracle ADF 时，应该使用 `JDeveloper` 中的 **从业务组件建表向导** 来构建你的业务组件。此向导会为业务组件初始化项目，包括创建从
    `JDeveloper` 到包含你应用表的数据库的连接。


    在开始创建 ADF 业务组件之前，请确保已选择你的业务服务层（模型）项目。


    **提示**


    在项目早期就确定一个数据库连接名称，并让所有团队成员使用相同的名称。当你从多个子系统组合主应用程序时，如果每个人都使用相同的数据源名称，事情会容易得多。


    该向导会引导你完成最多六个步骤，并可选择性地显示摘要。


    1.  创建实体对象。你可以查询数据库连接，并选择要为其创建实体对象的表。向导会自动为所选表之间数据库中的所有外键创建关联。

    2.  创建基于实体的视图对象。会为你选择的每个实体对象创建一个默认视图对象。它将包含来自该实体对象的所有属性。

    3.  创建基于查询的视图对象。此步骤允许你直接基于 SQL 查询（而非实体对象）创建额外的视图对象。这些对象将不可更新。

    4.  创建一个应用程序模块，并以所有可能的组合方式添加所有视图对象的实例。

    5.  创建任何 REST Web 服务。你需要为你的业务组件定义 REST API 的初始版本，然后选择你想要作为 REST Web 服务公开的视图对象。

    6.  定义你希望包含在每个 REST Web 服务中的属性。


    在第一步之后的任何时间，你都可以点击 **完成** 来结束向导。


    运行该向导并从标准的 Oracle HR 示例模式中选择 `EMPLOYEES` 和 `DEPARTMENTS` 表，将创建如图 1-4 所示的业务组件。


    ![A437725_1_En_1_Fig4_HTML.jpg](img/A437725_1_En_1_Fig4_HTML.jpg)


    **图 1-4.**

    针对 `EMPLOYEES` 和 `DEPARTMENTS` 的 ADF 业务组件


    ## 测试业务组件


    由于一个 ADF 应用程序同时包含业务服务层和用户界面层，仅通过运行应用程序并与用户界面交互可能很难调试问题。你无法判断是应该在业务服务层还是用户界面层查找问题。


    为了应对这一挑战，`JDeveloper` 提供了 **Oracle ADF 模型测试器**。可以通过在 `JDeveloper` 中右键单击一个应用程序模块并选择
    **运行** 来启动这个小程序。当你这样做时，Oracle ADF 模型测试器应用程序会启动，加载你点击的应用程序模块，并展示该应用程序模块内的所有视图对象实例。你可以点击每个视图对象，查看应用了所有业务组件逻辑后的数据库中的实际数据。ADF
    模型测试器应用程序外观如图 1-5 所示。


    ![A437725_1_En_1_Fig5_HTML.jpg](img/A437725_1_En_1_Fig5_HTML.jpg)


    **图 1-5.**

    ADF 模型测试器


    你应该始终使用这个小程序对你的 ADF 业务组件进行简单测试，以验证你的查询、验证和业务逻辑是否按预期工作。


    ## 实体对象


    实体对象直接对应于数据库表，负责处理对象/关系映射和数据验证逻辑。每个数据库表应恰好对应一个实体对象，这使你能够在一个地方实现业务规则和验证，并确保它始终被应用。


    默认情况下，创建实体对象的 `JDeveloper` 向导会为对应表中的每一列创建一个属性。将每一列都表示为属性并不会带来性能损失，因为 ADF 会自动进行优化，只查询在任何给定情况下相关的属性/列。


    ### 构建实体对象


    由于实体对象直接对应于表，因此在创建实体对象时需要做的决定很少。你可以使用“从业务组件建表向导”来创建初始的实体对象——只需不选择创建任何视图对象或应用程序模块即可。


    创建实体对象后，你应该打开每一个，并为每个属性定义将显示给用户的默认标签。这可以在 **属性** 选项卡下的 **UI 提示** 子选项卡中完成，如图 1-6
    所示。


    ![A437725_1_En_1_Fig6_HTML.jpg](img/A437725_1_En_1_Fig6_HTML.jpg)


    **图 1-6.**

    为实体对象属性设置 UI 提示


    **标签** 属性以及 **UI 提示** 子选项卡上的其他元素将成为显示该属性的用户界面组件的默认值。如果你不在这里指定任何内容，则属性名（源自底层数据库列）将成为默认标签。在实体对象级别提供的值可以在每个基于该实体对象的视图对象中被覆盖。


    你可能有一个为数据库中新记录创建主键值的数据库触发器。为了告诉 ADF 这一点，你需要将主键属性的类型更改为特殊的 `DBSequence` 类型。打开实体对象，然后在
    **属性** 选项卡上打开主键属性。当你在 **详细信息** 选项卡上更改 **类型** 字段时，其他几个设置也会随之更改，包括 **插入时刷新** 设置。这些更改共同意味着，你的
    ADF 应用程序接受在创建新记录时不输入主键值，并且 ADF 将在执行 `INSERT` 语句时要求数据库返回新的主键值。


    ### 构建关联


    如果你在一次通过“从业务组件建表向导”中构建了所有的实体对象，那么该向导应该会自动为数据库中的所有外键关系创建关联。如果你不是在同一时间创建所有实体对象，`JDeveloper`
    可能不会创建关联。在这种情况下，你可以手动在 `JDeveloper` 中创建关联。如果你的数据库由于某种原因不包含外键，这也是必要的。


    为了从 `JDeveloper` 向导中获得最大收益，你应该确保 `JDeveloper` 了解你数据模型中的关系。


    ## 视图对象


    实体对象面向数据库，而视图对象则面向用户。每个视图对象代表为满足特定需求而收集的特定数据集。你的用户界面定义了你所需的视图对象，包括必须包含哪些属性。'
- fmt: '# Graphical Navigation Flow Design


    When you have built the business services you need for your application, you need
    to create the user interface layer. You build this layer in three steps:


    1.  Partition your application into separate navigation flows.

    2.  Design each navigation flow.

    3.  Build the pages inside each navigation flow.


    This section describes how to partition your application and design the navigation
    flows; building the actual pages is covered later in the chapter.


    ## Building View Objects


    Because each view object is built for a specific purpose, you can''t simply run
    a wizard and build a whole stack of them like you can with entity objects. Instead,
    you build view objects individually using the view object wizard in `JDeveloper`.


    When running the wizard, you first select an entity object that will serve as
    the base entity object for the view object. By default, that entity object will
    be marked as updatable.


    If you need additional data from other entity objects, you add those after adding
    the first. By default, these entity objects will be marked as `Reference` objects
    in `JDeveloper`. In Figure [1-7](#A437725_1_En_1_Chapter.html#Fig7), the `Employees`
    entity object is selected first and is updatable. The `Departments` entity object
    is added later to get access to the department name.


    ![A437725_1_En_1_Fig7_HTML.jpg](A437725_1_En_1_Fig7_HTML.jpg)


    Figure 1-7.


    Building a view object


    You can see from the figure that `JDeveloper` has figured out the connection between
    the two entity objects and refers to the corresponding association. If there were
    no association between the `Employees` and `Departments` entity objects, `JDeveloper`
    would have no way of connecting them.


    The ordering of records is also defined as part of the view object definition
    (step 5, Query).


    View object attributes also has a `UI Hints` subtab on the `Attributes` tab, just
    like entity objects do. This allows you to specify a default label, tool tip,
    and other user interface elements. If you don''t specify anything here, the UI
    hints from the entity objects are used. If no UI hints were set at the entity
    object either, the attribute name (derived from the underlying database column)
    becomes the label.


    ## Defining Lists of Values


    In the places in your application where you want to limit the value of some attribute
    to a certain set, you normally define a code column with a foreign key to a table
    of allowed values. In the user interface, this is typically implemented with a
    drop-down list. This kind of relation is modeled in the view object in Oracle
    ADF, that is, in the business services layer. When you later use the view object
    on a page in your application, you can select how to represent this list of allowed
    values (various list components, radio groups, or other options).


    There are two things to do to define a list of values like this:


    1.  Create the view object that contains the list of allowed values

    2.  Associate the attribute with the value list view object


    To create this association, you open the view object, go to the `Attributes` subtab,
    and select the attribute that you want to associate the list with. On the `List
    of Values` tab below the attributes, you click the green plus to add a list of
    values. In the `Create List of Values` dialog, you click the green plus sign next
    to `List Data Source`, select the `View Definition` radio button, and then select
    the view object containing your list values and descriptions. Figure [1-8](#A437725_1_En_1_Chapter.html#Fig8)
    shows all of these dialog boxes.


    ![A437725_1_En_1_Fig8_HTML.jpg](A437725_1_En_1_Fig8_HTML.jpg)


    Figure 1-8.


    Defining a list of values


    Don''t overlook the `UI Hints` tab of the `Create List of Values` dialog. This
    is where you define which value is displayed to the user .


    If you have a small number of values that you do not expect to change, you can
    create a static view object by setting the `Data Source` to `Static List` in the
    first step of the `Create View Object` wizard.


    ## Building View Links


    When your user interface contains a master-detail relation, like orders and order
    lines, or departments with their employees, you need a view link.


    These are created manually with a `JDeveloper` wizard once you have created both
    the master and the detail view objects. Normally, a view link will be underpinned
    by an association between the main entity object behind the master and the main
    entity object behind the detail. In the view link wizard, you identify the master
    and detail view objects and the attribute or attributes to use to establish the
    connection. If there is an association available, you should choose the two ends
    of that association, as shown in Figure [1-9](#A437725_1_En_1_Chapter.html#Fig9).


    ![A437725_1_En_1_Fig9_HTML.jpg](A437725_1_En_1_Fig9_HTML.jpg)


    Figure 1-9.


    Building a view link


    Note that you only need a view link if you want to display a master-detail relationship
    in your user interface. If you just want to enrich one data set with data from
    a different entity object, you create one view object on two entity objects without
    having to create a view link.


    ## Creating View Criteria


    A view object always contains the same attributes and the same sort order (unless
    you programmatically change it), but it doesn''t have to always return the same
    records. To limit which records are returned by a view object, you can add view
    criteria and bind variables . If you are familiar with SQL, you can consider a
    view criterion as a named, declarative `WHERE` clause.


    You add view criteria on the `View Criteria` tab in a view object. In the `Create
    View Criteria` dialog, you give your criteria a name and can add multiple criteria
    connected with `AND` or `OR`. Each criterion compares an individual attribute
    with either a literal value you hard-wire into the view criteria, or a bind variable
    you can create in this dialog. Figure [1-10](#A437725_1_En_1_Chapter.html#Fig10)
    shows a view criterion.


    ![A437725_1_En_1_Fig10_HTML.jpg](A437725_1_En_1_Fig10_HTML.jpg)


    Figure 1-10.


    Defining a view criterion


    When you have created a view criterion, you can use it when you add a view object
    instance to an application module. You can also programmatically apply it to a
    view object—we''ll get back to that in Chapter [5](#A437725_1_En_5_Chapter.html).


    ## Building Application Modules


    The last ADF business component is the application module . These objects collect
    a number of view object instances that will be used in your application or subsystem.
    The application module controls the database transaction, allowing the user to
    make changes to many different view objects through many different screens and
    then committing everything to the database as one transaction.


    Each view object instance is based on a view object, but one view object can be
    used in multiple view object instances in an application module. For example,
    Figure [1-11](#A437725_1_En_1_Chapter.html#Fig11) shows an application module
    that contains three different instances of the `EmployeeView` view object.


    ![A437725_1_En_1_Fig11_HTML.jpg](A437725_1_En_1_Fig11_HTML.jpg)


    Figure 1-11.


    View object instances in an application module


    The instance `AllEmployees` is at the root level of the application module and
    will show all employees.


    The instance `EmployeesInDept` is subordinate to `AllDepartments` and will only
    show the employees in that department. To create one of these subordinate view
    object instances, you add the view object via a view link. In the figure, the
    `EmployeesInDept` instance is created by selecting `AllDepartments` to the right
    and selecting `EmployeesView` via `DeptEmptLink` to the left.


    The instance `HighSalaryEmployees` is also a root-level instance on `EmployeesView`,
    but in this case, a view criterion has been applied to it. You can apply a view
    criterion by selecting the view object instance and then clicking the `Edit` button
    at the top right. This brings up the `Edit View Instance` dialog where you can
    set bind variables and apply view criteria.'
  raw: '#### Building View Objects


    Because each view object is built for a specific purpose, you can’t simply run
    a wizard and build a whole stack of them like you can with entity objects. Instead,
    you build view objects individually using the view object wizard in JDeveloper.


    When running the wizard, you first select an entity object that will serve as
    the base entity object for the view object. By default, that entity object will
    be marked as updatable.


    If you need additional data from other entity objects, you add those after adding
    the first. By default, these entity objects will be marked as Reference objects
    in JDeveloper. In Figure [1-7](#A437725_1_En_1_Chapter.html#Fig7), the Employees
    entity object is selected first and is updatable. The Departments entity object
    is added later to get access to the department name.


    ![A437725_1_En_1_Fig7_HTML.jpg](A437725_1_En_1_Fig7_HTML.jpg)


    Figure 1-7.


    Building a view object


    You can see from the figure that JDeveloper has figured out the connection between
    the two entity objects and refers to the corresponding association. If there were
    no association between the Employees and Departments entity objects, JDeveloper
    would have no way of connecting them.


    The ordering of records is also defined as part of the view object definition
    (step 5, Query).


    View object attributes also has a UI Hints subtab on the Attributes tab, just
    like entity objects do. This allows you to specify a default label, tool tip,
    and other user interface elements. If you don’t specify anything here, the UI
    hints from the entity objects are used. If no UI hints were set at the entity
    object either, the attribute name (derived from the underlying database column)
    becomes the label.


    #### Defining Lists of Values


    In the places in your application where you want to limit the value of some attribute
    to a certain set, you normally define a code column with a foreign key to a table
    of allowed values. In the user interface, this is typically implemented with a
    drop-down list. This kind of relation is modeled in the view object in Oracle
    ADF, that is, in the business services layer. When you later use the view object
    on a page in your application, you can select how to represent this list of allowed
    values (various list components, radio groups, or other options).


    There are two things to do to define a list of values like this:


    1.  Create the view object that contains the list of allowed values  

    2.  Associate the attribute with the value list view object  


    To create this association, you open the view object, go to the Attributes subtab,
    and select the attribute that you want to associate the list with. On the List
    of Values tab below the attributes, you click the green plus to add a list of
    values. In the Create List of Values dialog, you click the green plus sign next
    to List Data Source, select the View Definition radio button, and then select
    the view object containing your list values and descriptions. Figure [1-8](#A437725_1_En_1_Chapter.html#Fig8)
    shows all of these dialog boxes.


    ![A437725_1_En_1_Fig8_HTML.jpg](A437725_1_En_1_Fig8_HTML.jpg)


    Figure 1-8.


    Defining a list of values


    Don’t overlook the UI Hints tab of the Create List of Values dialog. This is where
    you define which value is displayed to the user .


    If you have a small number of values that you do not expect to change, you can
    create a static view object by setting the Data Source to Static List in the first
    step of the Create View Object wizard.


    #### Building View Links


    When your user interface contains a master-detail relation, like orders and order
    lines, or departments with their employees, you need a view link.


    These are created manually with a JDeveloper wizard once you have created both
    the master and the detail view objects. Normally, a view link will be underpinned
    by an association between the main entity object behind the master and the main
    entity object behind the detail. In the view link wizard, you identify the master
    and detail view objects and the attribute or attributes to use to establish the
    connection. If there is an association available, you should choose the two ends
    of that association, as shown in Figure [1-9](#A437725_1_En_1_Chapter.html#Fig9).


    ![A437725_1_En_1_Fig9_HTML.jpg](A437725_1_En_1_Fig9_HTML.jpg)


    Figure 1-9.


    Building a view link


    Note that you only need a view link if you want to display a master-detail relationship
    in your user interface. If you just want to enrich one data set with data from
    a different entity object, you create one view object on two entity objects without
    having to create a view link.


    #### Creating View Criteria


    A view object always contains the same attributes and the same sort order (unless
    you programmatically change it), but it doesn’t have to always return the same
    records. To limit which records are returned by a view object, you can add view
    criteria and bind variables . If you are familiar with SQL, you can consider a
    view criterion as a named, declarative WHERE clause.


    You add view criteria on the View Criteria tab in a view object. In the Create
    View Criteria dialog, you give your criteria a name and can add multiple criteria
    connected with AND or OR. Each criterion compares an individual attribute with
    either a literal value you hard-wire into the view criteria, or a bind variable
    you can create in this dialog. Figure [1-10](#A437725_1_En_1_Chapter.html#Fig10)
    shows a view criterion.


    ![A437725_1_En_1_Fig10_HTML.jpg](A437725_1_En_1_Fig10_HTML.jpg)


    Figure 1-10.


    Defining a view criterion


    When you have created a view criterion, you can use it when you add a view object
    instance to an application module. You can also programmatically apply it to a
    view object—we’ll get back to that in Chapter [5](#A437725_1_En_5_Chapter.html).


    ### Building Application Modules


    The last ADF business component is the application module . These objects collect
    a number of view object instances that will be used in your application or subsystem.
    The application module controls the database transaction, allowing the user to
    make changes to many different view objects through many different screens and
    then committing everything to the database as one transaction.


    Each view object instance is based on a view object, but one view object can be
    used in multiple view object instances in an application module. For example,
    Figure [1-11](#A437725_1_En_1_Chapter.html#Fig11) shows an application module
    that contains three different instances of the EmployeeView view object.


    ![A437725_1_En_1_Fig11_HTML.jpg](A437725_1_En_1_Fig11_HTML.jpg)


    Figure 1-11.


    View object instances in an application module


    The instance AllEmployees is at the root level of the application module and will
    show all employees.


    The instance EmployeesInDept is subordinate to AllDepartments and will only show
    the employees in that department. To create one of these subordinate view object
    instances, you add the view object via a view link. In the figure, the EmployeesInDept
    instance is created by selecting AllDepartments to the right and selecting EmployeesView
    via DeptEmptLink to the left.


    The instance HighSalaryEmployees is also a root-level instance on EmployeesView,
    but in this case, a view criterion has been applied to it. You can apply a view
    criterion by selecting the view object instance and then clicking the Edit button
    at the top right. This brings up the Edit View Instance dialog where you can set
    bind variables and apply view criteria.


    ## Graphical Navigation Flow Design


    When you have built the business services you need for your application, you need
    to create the user interface layer. You build this layer in three steps:


    1.  Partition your application into separate navigation flows.  

    2.  Design each navigation flow.  

    3.  Build the pages inside each navigation flow.  


    This section describes how to partition your application and design the navigation
    flows; building the actual pages is covered later in the chapter.'
  trans: '

    # 图形导航流程设计


    当您为应用程序构建好所需的业务服务后，接下来需要创建用户界面层。构建此层分为三个步骤：


    1.  将您的应用程序划分为独立的导航流。

    2.  设计每个导航流。

    3.  在每个导航流内构建页面。


    本节描述如何划分您的应用程序并设计导航流；构建实际页面的内容将在本章后续部分介绍。


    ## 构建视图对象


    由于每个视图对象都是为特定目的而构建的，您不能像处理实体对象那样简单地运行向导来构建一整套对象。相反，您需要使用 `JDeveloper` 中的视图对象向导逐个构建视图对象。


    运行向导时，首先选择一个将作为视图对象基础实体对象的实体对象。默认情况下，该实体对象将被标记为可更新。


    如果您需要来自其他实体对象的额外数据，可以在添加第一个之后继续添加。默认情况下，这些实体对象在 `JDeveloper` 中将被标记为 `Reference`
    对象。在图 1-7 中，首先选择了 `Employees` 实体对象并标记为可更新。随后添加了 `Departments` 实体对象以获取部门名称。


    ![A437725_1_En_1_Fig7_HTML.jpg](img/A437725_1_En_1_Fig7_HTML.jpg)


    图 1-7。


    构建视图对象


    从图中可以看出，`JDeveloper` 已识别出两个实体对象之间的连接，并引用了相应的关联。如果 `Employees` 和 `Departments`
    实体对象之间没有关联，`JDeveloper` 将无法连接它们。


    记录的排序也是视图对象定义的一部分（步骤 5，查询）。


    视图对象的属性在 `Attributes` 选项卡上也有一个 `UI Hints` 子选项卡，就像实体对象一样。这允许您指定默认标签、工具提示和其他用户界面元素。如果您在此处未指定任何内容，则将使用来自实体对象的
    UI 提示。如果实体对象也未设置 UI 提示，则属性名称（源自底层数据库列）将成为标签。


    ## 定义值列表


    在您希望将某些属性的值限制为特定集合的应用程序位置，通常会定义一个代码列，该列带有一个指向允许值表的外键。在用户界面中，这通常通过下拉列表实现。这种关系在
    Oracle ADF 的视图对象（即业务服务层）中建模。当您稍后在应用程序页面上使用该视图对象时，可以选择如何表示此允许值列表（各种列表组件、单选按钮组或其他选项）。


    要定义这样的值列表，需要做两件事：


    1.  创建包含允许值列表的视图对象

    2.  将属性与值列表视图对象关联起来


    要创建此关联，请打开视图对象，转到 `Attributes` 子选项卡，并选择要关联列表的属性。在属性下方的 `List of Values` 选项卡上，单击绿色加号以添加一个值列表。在
    `Create List of Values` 对话框中，单击 `List Data Source` 旁边的绿色加号，选择 `View Definition`
    单选按钮，然后选择包含您的列表值和描述的视图对象。图 1-8 显示了所有这些对话框。


    ![A437725_1_En_1_Fig8_HTML.jpg](img/A437725_1_En_1_Fig8_HTML.jpg)


    图 1-8。


    定义值列表


    不要忽略 `Create List of Values` 对话框的 `UI Hints` 选项卡。这是您定义向用户显示哪个值的地方。


    如果您有少量且预计不会更改的值，可以通过在 `Create View Object` 向导的第一步中将 `Data Source` 设置为 `Static
    List` 来创建一个静态视图对象。


    ## 构建视图链接


    当您的用户界面包含主从关系时，例如订单与订单行项目，或部门与其员工，您需要一个视图链接。


    一旦您创建了主视图对象和从视图对象，就可以使用 `JDeveloper` 向导手动创建这些链接。通常，视图链接将由主视图对象背后的主要实体对象和从视图对象背后的主要实体对象之间的关联来支撑。在视图链接向导中，您需要标识主视图对象和从视图对象，以及用于建立连接的属性（一个或多个）。如果有可用的关联，您应该选择该关联的两端，如图
    1-9 所示。


    ![A437725_1_En_1_Fig9_HTML.jpg](img/A437725_1_En_1_Fig9_HTML.jpg)


    图 1-9。


    构建视图链接


    请注意，只有当您想在用户界面中显示主从关系时，才需要视图链接。如果您只是想用来自不同实体对象的数据丰富一个数据集，则可以创建一个基于两个实体对象的视图对象，而无需创建视图链接。


    ## 创建视图标准


    视图对象总是包含相同的属性和相同的排序顺序（除非您以编程方式更改它），但它不必总是返回相同的记录。为了限制视图对象返回的记录，您可以添加视图标准和绑定变量。如果您熟悉
    SQL，可以将视图标准视为一个命名的、声明式的 `WHERE` 子句。


    您可以在视图对象的 `View Criteria` 选项卡上添加视图标准。在 `Create View Criteria` 对话框中，为您的标准命名，并可以添加多个用
    `AND` 或 `OR` 连接的标准。每个标准将单个属性与您硬编码到视图标准中的字面值，或者您可以在此对话框中创建的绑定变量进行比较。图 1-10 显示了一个视图标准。


    ![A437725_1_En_1_Fig10_HTML.jpg](img/A437725_1_En_1_Fig10_HTML.jpg)


    图 1-10。


    定义视图标准


    创建视图标准后，可以在向应用程序模块添加视图对象实例时使用它。您也可以以编程方式将其应用于视图对象——我们将在第 5 章回到这一点。


    ## 构建应用程序模块


    最后一个 ADF 业务组件是应用程序模块。这些对象收集将在您的应用程序或子系统中使用的多个视图对象实例。应用程序模块控制数据库事务，允许用户通过多个不同的屏幕对许多不同的视图对象进行更改，然后将所有内容作为一个事务提交到数据库。


    每个视图对象实例都基于一个视图对象，但一个视图对象可以在应用程序模块中的多个视图对象实例中使用。例如，图 1-11 显示了一个包含 `EmployeeView`
    视图对象三个不同实例的应用程序模块。


    ![A437725_1_En_1_Fig11_HTML.jpg](img/A437725_1_En_1_Fig11_HTML.jpg)


    图 1-11。


    应用程序模块中的视图对象实例


    实例 `AllEmployees` 位于应用程序模块的根级别，将显示所有员工。


    实例 `EmployeesInDept` 从属于 `AllDepartments`，将仅显示该部门的员工。要创建此类从属视图对象实例，您需要通过视图链接添加视图对象。在图中，`EmployeesInDept`
    实例是通过选择右侧的 `AllDepartments`，然后通过 `DeptEmptLink` 选择左侧的 `EmployeesView` 来创建的。


    实例 `HighSalaryEmployees` 也是 `EmployeesView` 上的根级别实例，但在本例中，已对其应用了视图标准。您可以通过选择视图对象实例，然后单击右上角的
    `Edit` 按钮来应用视图标准。这将调出 `Edit View Instance` 对话框，您可以在其中设置绑定变量并应用视图标准。

    '
- fmt: '# Partitioning Your Applications


    All enterprise ADF applications will contain many separate navigation flows that
    each define how the user navigates between pages. Because Oracle developed ADF
    for their own very large applications (like Oracle Fusion Applications, a full
    ERP suite), modularity is central to ADF development.


    The first step in developing the user interface of an ADF application is therefore
    to decide on which navigation flows you need. Your requirements normally serve
    as a good starting point, with each use case or user story a candidate to become
    a separate navigation flow.


    ## Bounded and Unbounded Task Flows


    The navigation flows you build in ADF are called task flows or sometimes page
    flows. ADF task flows are modular, and you can include one task flow in another.
    This allows you to build and maintain your entire application as a number of separate,
    reusable task flows that are combined into an application. We’ll return to the
    architecture of the entire application in the next chapter.


    Task flows contain actual pages or page fragments displayed to the user and control
    flows that define how the user is allowed to navigate between pages or fragments.
    It can also contain flow logic (branching) and can call business logic.


    There are two types of task flows in ADF:


    *   Unbounded task flows

    *   Bounded task flows


    ### Unbounded Task Flows


    An unbounded task flow consists of a number of pages, and the user can start the
    task flow from any of these pages. There is thus not a strict boundary around
    the task flow.


    Because every ADF view/controller project always has an unbounded task flow called
    `adfc-config`, you normally don’t need to create these yourself.


    An unbounded task flow is normally only used for first layer of navigation in
    the application. Many ADF applications have only one page in their unbounded task
    flow and then use various bounded task flows to expose the functionality of the
    application. How to swap different bounded contexts in and out will be discussed
    in Chapter [4](#A437725_1_En_4_Chapter.html).


    ### Bounded Task Flows


    A bounded task flow normally consists of a number of page fragments. It has a
    single well-defined entry point, one or more pages, and one or more exit points.
    Most of your application functionality will normally be implemented in the form
    of bounded task flows with page fragments.


    You build your bounded task flows with page fragments in order to be able to reuse
    them. A page fragment should contain only the user interface elements necessary
    to perform the task it is designed for. It should not contain any common information
    like a header bar, logo, or menu. In this way, the task flow can be used and reused
    all over your application or even in different applications.


    Because a page fragment is not runnable in itself, you need to embed it in a page
    in order to run it.


    ## Creating Task Flows


    The most common ADF architecture consists of one unbounded task flow and a number
    of bounded task flows using page fragments. Since you automatically get an unbounded
    task flow with every ADF Faces project, you will normally only need to create
    bounded task flows using page fragments. Because your task flows are part of the
    user interface layer of your application, make sure to select the view project
    in your workspace before you start creating task flows.


    You find task flows in the New Gallery under Web Tier ➤ JSF/Facelets. In the Create
    Task Flow dialog, make sure you check both the Create as Bounded Task Flow and
    Create with Page Fragments check boxes, as shown in Figure [1-12](#A437725_1_En_1_Chapter.html#Fig12).
    In a real-life enterprise application, you should use a template. We’ll discuss
    templates in Chapter [2](#A437725_1_En_2_Chapter.html).


    ![A437725_1_En_1_Fig12_HTML.jpg](A437725_1_En_1_Fig12_HTML.jpg)


    Figure 1-12. Creating a bounded task flow with fragments


    When you have created a task flow, you are presented with a blank diagram with
    an instruction text in the middle.


    ### Adding View Components


    From here, you drag in View components from the Components palette (normally to
    the right). You need one view component for each page or page fragment you want
    in your application.


    Note that the first view component you create automatically acquires a green “halo”
    behind it, indicating that it is the entry point of the bounded task flow. If
    you want another activity to be the entry point, you can right-click the icon
    for the activity you want invoked first and choose Mark Activity ➤ Default Activity.


    Note that the view activities you add here are initially only placeholders. The
    actual page or page fragment is not created until you double-click a view activity.
    If you look carefully at the view activity icon, you can see that the bottom of
    the outline of the initial icons is a dashed line. Once you have created the page
    or page fragment, the icon changes to one with a solid outline all the way around.


    ### Adding a Return Activity


    Every bounded task flow should have at least one task flow return activity (the
    gray angle arrow). That indicates the exit point, that is, the point where control
    returns to any task flow that called this one. If you don’t have a return activity,
    you won’t be able to call the bounded task flow from another task flow because
    there is no way to return. Note that the return activity has an outcome property
    that you can set. If you have multiple task flow return activities, you can indicate
    to a caller what happened inside the flow—for example, you might have a return
    with `success` and another with `error`.


    ### Adding Control Flow


    When you have your view activities and the return activity, you add control flow
    cases (arrows) to define the navigation allowed between them. You can (and should)
    give each control flow case a short name. When you build your page and add a command
    component like a button, the various flows away from a page fragment will be offered
    as options. Figure [1-13](#A437725_1_En_1_Chapter.html#Fig13) shows what a task
    flow might look like with a few view activities, a return activity, and some control
    flows.


    ![A437725_1_En_1_Fig13_HTML.jpg](A437725_1_En_1_Fig13_HTML.jpg)


    Figure 1-13. A task flow


    If you want, you can also add Router activities. These allow the flow to process
    to different control flow cases based on the evaluation of an expression written
    in expression language (EL). We’ll get back to that in Chapter [4](#A437725_1_En_4_Chapter.html),
    where we will also discuss how to drop in code elements from your business components.


    ## Drag-and-Drop Pages


    When you have created placeholders for your pages in the task flow design, it
    is time to create the corresponding page fragments. To do so, you double-click
    a view activity in a bounded task flow with fragments to open the Create ADF Page
    Fragment dialog.


    ### Page Layout


    In the Create ADF Page Fragment dialog, you have three options:


    *   Create Blank Page

    *   Reference ADF Template

    *   Copy Quick Start Layout


    While learning ADF, use the Copy Quick Start Layout option. This allows you to
    select an example from a visual directory, as shown in Figure [1-14](#A437725_1_En_1_Chapter.html#Fig14).
    When you make a selection, JDeveloper will add the corresponding layout components
    to your page fragment.


    ![A437725_1_En_1_Fig14_HTML.jpg](A437725_1_En_1_Fig14_HTML.jpg)


    Figure 1-14. ADF Quick Start Layouts


    In a real-life enterprise ADF application, you want to base all your pages and
    page fragments on page templates. We’ll return to page templates in the next chapter.


    Note that your page fragment should not contain decorative elements like a logo
    or a page header bar. If you need these elements in your application, they should
    be added to the master page that serves as the frame around your page fragment
    task flows. Page fragments often just have a one-column stretched layout in order
    to make use of all the available screen area.'
  raw: '### Partitioning Your Applications


    All enterprise ADF applications will contain many separate navigation flows that
    each define how the user navigates between pages. Because Oracle developed ADF
    for their own very large applications (like Oracle Fusion Applications, a full
    ERP suite), modularity is central to ADF development.


    The first step in developing the user interface of an ADF application is therefore
    to decide on which navigation flows you need. Your requirements normally serve
    as a good starting point, with each use case or user story a candidate to become
    a separate navigation flow.


    ### Bounded and Unbounded Task Flows


    The navigation flows you build in ADF are called task flows or sometimes page
    flows . ADF task flows are modular, and you can include one task flow in another.
    This allows you to build and maintain your entire application as a number of separate,
    reusable task flows that are combined into an application. We’ll return to the
    architecture of the entire application in the next chapter.


    Task flows contain actual pages or page fragments displayed to the user and control
    flows that define how the user is allowed to navigate between pages or fragments.
    It can also contain flow logic (branching) and can call business logic.


    There are two types of task flows in ADF:


    *   Unbounded task flows

    *   Bounded task flows


    #### Unbounded Task Flows


    An unbounded task flow consists of a number of pages, and the user can start the
    task flow from any of these pages. There is thus not a strict boundary around
    the task flow.


    Because every ADF view/controller project always has an unbounded task flow called
    `adfc-config`, you normally don’t need to create these yourself.


    An unbounded task flow is normally only used for first layer of navigation in
    the application. Many ADF applications have only one page in their unbounded task
    flow and then use various bounded task flows to expose the functionality of the
    application. How to swap different bounded contexts in and out will be discussed
    in Chapter [4](#A437725_1_En_4_Chapter.html).


    #### Bounded Task Flows


    A bounded task flow normally consists of a number of page fragments. It has a
    single well-defined entry point, one or more pages, and one or more exit points.
    Most of your application functionality will normally be implemented in the form
    of bounded task flows with page fragments.


    You build your bounded task flows with page fragments in order to be able to reuse
    them. A page fragment should contain only the user interface elements necessary
    to perform the task it is designed for. It should not contain any common information
    like a header bar, logo, or menu. In this way, the task flow can be used and reused
    all over your application or even in different applications.


    Because a page fragment is not runnable in itself, you need to embed it in a page
    in order to run it.


    ### Creating Task Flows


    The most common ADF architecture consists of one unbounded task flow and a number
    of bounded task flows using page fragments. Since you automatically get an unbounded
    task flow with every ADF Faces project, you will normally only need to create
    bounded task flows using page fragments. Because your task flows are part of the
    user interface layer of your application, make sure to select the view project
    in your workspace before you start creating task flows.


    You find task flows in the New Gallery under Web Tier ➤ JSF/Facelets. In the Create
    Task Flow dialog, make sure you check both the Create as Bounded Task Flow and
    Create with Page Fragments check boxes, as shown in Figure [1-12](#A437725_1_En_1_Chapter.html#Fig12).
    In a real-life enterprise application, you should use a template. We’ll discuss
    templates in Chapter [2](#A437725_1_En_2_Chapter.html).


    ![A437725_1_En_1_Fig12_HTML.jpg](A437725_1_En_1_Fig12_HTML.jpg)


    Figure 1-12.


    Creating a bounded task flow with fragments


    When you have created a task flow, you are presented with a blank diagram with
    an instruction text in the middle.


    #### Adding View Components


    From here, you drag in View components from the Components palette (normally to
    the right). You need one view component for each page or page fragment you want
    in your application.


    Note that the first view component you create automatically acquires a green “halo”
    behind it, indicating that it is the entry point of the bounded task flow. If
    you want another activity to be the entry point, you can right-click the icon
    for the activity you want invoked first and choose Mark Activity ➤ Default Activity.


    Note that the view activities you add here are initially only placeholders. The
    actual page or page fragment is not created until you double-click a view activity.
    If you look carefully at the view activity icon, you can see that the bottom of
    the outline of the initial icons is a dashed line. Once you have created the page
    or page fragment, the icon changes to one with a solid outline all the way around.


    #### Adding a Return Activity


    Every bounded task flow should have at least one task flow return activity (the
    gray angle arrow). That indicates the exit point, that is, the point where control
    returns to any task flow that called this one. If you don’t have a return activity,
    you won’t be able to call the bounded task flow from another task flow because
    there is no way to return. Note that the return activity has an outcome property
    that you can set. If you have multiple task flow return activities, you can indicate
    to a caller what happened inside the flow—for example, you might have a return
    with `success` and another with `error`.


    #### Adding Control Flow


    When you have your view activities and the return activity, you add control flow
    cases (arrows) to define the navigation allowed between them. You can (and should)
    give each control flow case a short name. When you build your page and add a command
    component like a button, the various flows away from a page fragment will be offered
    as options. Figure [1-13](#A437725_1_En_1_Chapter.html#Fig13) shows what a task
    flow might look like with a few view activities, a return activity, and some control
    flows.


    ![A437725_1_En_1_Fig13_HTML.jpg](A437725_1_En_1_Fig13_HTML.jpg)


    Figure 1-13.


    A task flow


    If you want, you can also add Router activities. These allow the flow to process
    to different control flow cases based on the evaluation of an expression written
    in expression language (EL). We’ll get back to that in Chapter [4](#A437725_1_En_4_Chapter.html),
    where we will also discuss how to drop in code elements from your business components.


    ## Drag-and-Drop Pages


    When you have created placeholders for your pages in the task flow design, it
    is time to create the corresponding page fragments. To do so, you double-click
    a view activity in a bounded task flow with fragments to open the Create ADF Page
    Fragment dialog.


    ### Page Layout


    In the Create ADF Page Fragment dialog, you have three options:


    *   Create Blank Page

    *   Reference ADF Template

    *   Copy Quick Start Layout


    While learning ADF, use the Copy Quick Start Layout option. This allows you to
    select an example from a visual directory, as shown in Figure [1-14](#A437725_1_En_1_Chapter.html#Fig14).
    When you make a selection, JDeveloper will add the corresponding layout components
    to your page fragment.


    ![A437725_1_En_1_Fig14_HTML.jpg](A437725_1_En_1_Fig14_HTML.jpg)


    Figure 1-14.


    ADF Quick Start Layouts


    In a real-life enterprise ADF application, you want to base all your pages and
    page fragments on page templates. We’ll return to page templates in the next chapter.


    Note that your page fragment should not contain decorative elements like a logo
    or a page header bar. If you need these elements in your application, they should
    be added to the master page that serves as the frame around your page fragment
    task flows. Page fragments often just have a one-column stretched layout in order
    to make use of all the available screen area.'
  trans: '

    # 应用程序分区


    所有企业级 ADF 应用程序都将包含许多独立的导航流，每个导航流都定义了用户如何在页面之间导航。由于 Oracle 是为其自身非常庞大的应用程序（如 Oracle
    Fusion Applications，一套完整的 ERP 套件）而开发 ADF 的，因此模块化是 ADF 开发的核心。


    因此，开发 ADF 应用程序用户界面的第一步是决定你需要哪些导航流。你的需求通常是一个很好的起点，每个用例或用户故事都是成为独立导航流的候选。


    ## 有界和无界任务流


    你在 ADF 中构建的导航流被称为任务流，有时也称为页面流。ADF 任务流是模块化的，你可以在一个任务流中包含另一个任务流。这允许你将整个应用程序构建和维护为多个独立的、可重用的任务流，并将它们组合成一个应用程序。我们将在下一章回到整个应用程序的架构。


    任务流包含实际展示给用户的页面或页面片段，以及定义用户被允许如何在页面或片段之间导航的控制流。它还可以包含流程逻辑（分支）并调用业务逻辑。


    ADF 中有两种类型的任务流：


    *   无界任务流

    *   有界任务流


    ### 无界任务流


    一个无界任务流由多个页面组成，用户可以从这些页面中的任何一个启动任务流。因此，任务流周围没有严格的边界。


    因为每个 ADF 视图/控制器项目总是有一个名为 `adfc-config` 的无界任务流，所以你通常不需要自己创建这些。


    无界任务流通常仅用于应用程序中的第一层导航。许多 ADF 应用程序在其无界任务流中只有一个页面，然后使用各种有界任务流来展示应用程序的功能。如何切换不同的有界上下文将在第
    4 章讨论。


    ### 有界任务流


    一个有界任务流通常由多个页面片段组成。它具有一个明确定义的入口点、一个或多个页面以及一个或多个出口点。你的大部分应用程序功能通常将以带有页面片段的有界任务流的形式实现。


    你使用页面片段构建有界任务流是为了能够重用它们。一个页面片段应仅包含执行其设计任务所需的用户界面元素。它不应包含任何通用信息，如标题栏、徽标或菜单。这样，该任务流就可以在你的整个应用程序甚至不同的应用程序中使用和重用。


    因为页面片段本身不可运行，所以你需要将其嵌入页面中才能运行。


    ## 创建任务流


    最常见的 ADF 架构由一个无界任务流和多个使用页面片段的有界任务流组成。由于每个 ADF Faces 项目都会自动获得一个无界任务流，因此你通常只需要创建使用页面片段的有界任务流。因为你的任务流是应用程序用户界面层的一部分，所以在开始创建任务流之前，请确保在工作区中选择了视图项目。


    你可以在“新建库”（New Gallery）的“Web 层” ➤ “JSF/Facelets”下找到任务流。在“创建任务流”对话框中，请确保勾选“创建为有界任务流”和“使用页面片段创建”两个复选框，如图
    1-12 所示。在真实的企业应用程序中，你应该使用模板。我们将在第 2 章讨论模板。


    ![A437725_1_En_1_Fig12_HTML.jpg](img/A437725_1_En_1_Fig12_HTML.jpg)


    图 1-12. 创建带有片段的有界任务流


    创建任务流后，你将看到一个空白图表，中间有一条说明文字。


    ### 添加视图组件


    从这里开始，你从组件面板（通常在右侧）拖入视图组件。你需要为应用程序中想要的每个页面或页面片段准备一个视图组件。


    请注意，你创建的第一个视图组件会自动获得一个绿色的“光晕”，表明它是这个有界任务流的入口点。如果你想让另一个活动作为入口点，可以右键单击你希望首先调用的活动的图标，然后选择“标记活动”
    ➤ “默认活动”。


    请注意，你在此处添加的视图活动最初只是占位符。实际的页面或页面片段直到你双击视图活动时才会创建。如果你仔细观察视图活动图标，可以看到初始图标的轮廓底部是虚线。一旦你创建了页面或页面片段，图标就会变为整个轮廓都是实线的图标。


    ### 添加返回活动


    每个有界任务流应该至少有一个任务流返回活动（灰色的角箭头）。这表示出口点，即控制权返回到任何调用此任务流的其他任务流的地方。如果你没有返回活动，你将无法从另一个任务流调用这个有界任务流，因为没有方法可以返回。请注意，返回活动有一个可以设置的
    `outcome` 属性。如果你有多个任务流返回活动，你可以向调用者指示流程内部发生了什么——例如，你可能有一个返回 `success`，另一个返回 `error`。


    ### 添加控制流


    当你有了视图活动和返回活动后，你需要添加控制流案例（箭头）来定义它们之间允许的导航。你可以（并且应该）为每个控制流案例指定一个简短的名称。当你构建页面并添加像按钮这样的命令组件时，从页面片段出发的各种流程将作为选项提供。图
    1-13 展示了一个任务流可能包含几个视图活动、一个返回活动和一些控制流的样子。


    ![A437725_1_En_1_Fig13_HTML.jpg](img/A437725_1_En_1_Fig13_HTML.jpg)


    图 1-13. 一个任务流


    如果你愿意，还可以添加路由器活动。这些活动允许流程根据表达式语言（EL）编写的表达式的求值结果，处理到不同的控制流案例。我们将在第 4 章回到这一点，在那里我们还将讨论如何从业务组件中放入代码元素。


    ## 拖放页面


    当你在任务流设计中为页面创建了占位符后，就可以创建相应的页面片段了。为此，在带有片段的有界任务流中双击一个视图活动，以打开“创建 ADF 页面片段”对话框。


    ### 页面布局


    在“创建 ADF 页面片段”对话框中，你有三个选项：


    *   创建空白页面

    *   引用 ADF 模板

    *   复制快速开始布局


    在学习 ADF 时，请使用“复制快速开始布局”选项。这允许你从可视化目录中选择一个示例，如图 1-14 所示。当你做出选择时，JDeveloper 会将相应的布局组件添加到你的页面片段中。


    ![A437725_1_En_1_Fig14_HTML.jpg](img/A437725_1_En_1_Fig14_HTML.jpg)


    图 1-14. ADF 快速开始布局


    在真实的企业 ADF 应用程序中，你希望将所有页面和页面片段都基于页面模板。我们将在下一章回到页面模板。


    请注意，你的页面片段不应包含装饰性元素，如徽标或页面标题栏。如果你的应用程序需要这些元素，它们应该被添加到作为页面片段任务流框架的母版页中。页面片段通常只采用一列拉伸布局，以利用所有可用的屏幕区域。

