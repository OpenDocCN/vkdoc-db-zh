- fmt: '### Adding an Operation


    If you expand the `Operations` tab of a view object instance in the `Data Controls`
    pane, you will see a number of standard operations that ADF automatically provides
    for every view object. When dropping these onto a page or page fragment, you will
    be presented with a list of user interface components that make sense for an operation.
    The most commonly used are `ADF Button` and `ADF Link`.


    In Chapter [5](#A437725_1_En_5_Chapter.html), you will learn how to add your own
    logic to view objects and application modules. The methods you add and decide
    to publish will also appear in the `Data Controls` pane and can easily be added
    to your application in the same way.


    ### Adding Commit and Rollback


    Just like the view objects, the application module also has an `Operations` tab
    at the very bottom in the `Data Control` panel (under all the view object instances).
    The two standard operations for an application module are `Commit` and `Rollback`.
    In order to perform a commit or rollback to the database, you simply need to drop
    one of these operations onto your page or page fragment. ADF will take care of
    everything for you, so you can build fully functional database applications without
    writing any code.


    ### Implementing Navigation


    You define the possible navigation between pages when you add control flow cases
    to your task flow. To actually implement the navigation in your user interface,
    you drop an action item (e.g., a button) onto your page. With the action item
    selected, open the `Properties` window, find the `Action` property, and choose
    from the list of options. You will see that this drop-down list contains all the
    control flow cases you have defined away from the current page.


    When the user clicks the action item you have connected to the control flow case,
    your ADF application changes to that page.


    **Tip**

    ADF handles temporary storage of values as the user navigates between pages. When
    the user eventually chooses a `Commit` or `Rollback` action, any changes will
    be committed to the database.


    ### Examining Bindings


    When you run an application you have built with these drag-and-drop features,
    data from your business components will automatically show up in the fields on
    your web pages. Changes made on the page are automatically propagated back to
    the business components, and if you commit, all the way to the database. The mechanism
    that connects business components to user interface elements is called *bindings*.


    JDeveloper automatically creates them for you, and you can access them by clicking
    the `Bindings` tab at the bottom of your page. This produces a visual representation
    of the bindings that looks as shown in Figure [1-19](#A437725_1_En_1_Chapter.html#Fig19).


    ![A437725_1_En_1_Fig19_HTML.jpg](A437725_1_En_1_Fig19_HTML.jpg)

    *Figure 1-19. Visual representation of bindings*


    The `Bindings` column to the left shows the different bindings. The most commonly
    used are:

    - Attribute bindings (with the XY icon) for a single attribute.

    - Tree bindings (with a folder hierarchy icon) for a whole view object instance.

    - Action binding (with the gearwheel icon) for actions.


    When you click a binding, an arrow appears pointing to an `Executable` in the
    middle column. This is most often an iterator that represents a pointer to a data
    collection in the data control shown in the right column.


    There is a binding for each page, stored in a page definition file. To see the
    actual source code of the binding, you need to click the `Page Definition File`
    link at the top of the bindings window, or find the binding in the `Applications`
    window.


    In many ADF applications, you won’t need to change the bindings that JDeveloper
    creates for you. However, in advanced ADF applications, you might need to create
    a binding manually. You can click the green plus signs in the `Bindings` window
    to create both bindings and executables.


    **Note**

    If you delete an element from a page or page fragment on the `Design` tab, JDeveloper
    tries to help you by automatically removing the corresponding binding. If you
    delete an element from the `Source` tab, JDeveloper assumes you are an advanced
    ADF developer and leaves the binding intact, so you can decide whether to keep
    it or manually delete it.


    ### Minimum Viable Product


    An enterprise ADF application normally consists of a number of bounded task flows
    using page fragments and a master page with a menu. When the user selects another
    menu item, the corresponding task flow is shown in a dynamic region on the master
    page. Because this way of building applications requires a bit of code, we’ll
    return to it in Chapter [4](#A437725_1_En_4_Chapter.html).


    However, you can build a fully functional application without any code. This allows
    you to present a running prototype to your users quickly and gather initial feedback.


    #### A Simple Master Page


    A basic master page can be built on the `One Column Header (Stretched)` Quick
    Start layout, as shown in Figure [1-20](#A437725_1_En_1_Chapter.html#Fig20).


    ![A437725_1_En_1_Fig20_HTML.jpg](A437725_1_En_1_Fig20_HTML.jpg)

    *Figure 1-20. One Column Header (Stretched)*


    Inside that page, drop an `Output Text` component in the header area at the top
    and a `Panel Tabbed` component in the main area of the window. You find these
    in the `Components` window, by default in the right side of the JDeveloper window.


    **Tip**

    You can use the search field at the top of the `Components` window to search for
    components by name.


    In the `Create Panel Tabbed` dialog, create tabs for all the parts of your application
    you want to test.


    Select your header text and use the `Properties` window to change the text, font
    style, and size.


    Then drag your page flows onto the tabs of your application. When prompted for
    a user interface component, choose `Region`. We’ll return to the other option
    (`Dynamic Region`) in Chapter [4](#A437725_1_En_4_Chapter.html). You will see
    the elements of your master page normally, and a grayed-out image of the first
    page of your task flow, as shown in Figure [1-21](#A437725_1_En_1_Chapter.html#Fig21).


    ![A437725_1_En_1_Fig21_HTML.jpg](A437725_1_En_1_Fig21_HTML.jpg)

    *Figure 1-21. A master page showing a region containing a bounded task flow*


    You can now right-click the master page and run your application.


    The first time you run an application after installing JDeveloper, you will be
    prompted for a password for the built-in WebLogic server, and it will take a while
    for the server to perform first-time initialization and startup.


    You should see your task flows on the different tabs and be able to navigate between
    tabs.


    ### Conclusion


    You have now seen how to use the power of ADF and JDeveloper to build an entire,
    fully functional ADF application without writing a single line of code.


    In the next chapter, we’ll talk about how to build larger applications that make
    use of ADF’s enterprise application development features, and in subsequent chapters
    you’ll learn how to add Java code implementing business logic.


    ## 2. ADF Enterprise Architecture


    In the previous chapter, you saw how easy it is to build small, but fully functional
    ADF applications. This chapter will discuss how to build larger applications in
    an enterprise setting.


    ### ADF Libraries


    The secret behind ADF enterprise functionality is `ADF libraries`. An `ADF library`
    is like a normal Java Archive (`JAR`) file, but it contains extra metadata about
    its contents. This metadata allows JDeveloper to display the content and makes
    it easy to reuse components inside `ADF libraries` in JDeveloper.'
