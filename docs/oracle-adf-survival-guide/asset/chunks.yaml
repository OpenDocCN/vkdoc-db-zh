    \        curr = rsi.getRow(key);\n        // process row\n        ...\n    }\n\
    \    return null;\n}\n}\n```\n**代码清单 5-9.** 在表中处理选定行\n\n当你有了行键集合后，你可以为选定的行获取一个\
    \ `Iterator` 对象。这是一个遍历用户界面中行的迭代器，与连接到视图对象实例的迭代器无关。\n\n为了实际处理选定行的数据，你仍然需要像上一个例子中那样使用\
    \ `DCIteratorBinding`。不过，在这种情况下，我们从中获取一个 `RowSetIterator`。这个对象的优点在于，它使得基于键查找特定行变得容易。当我们循环遍历所有选定行时，可以检索到\
    \ `Key`，然后使用 `getRow(key)` 从视图对象中检索实际的行。\n\n# 与用户交互\n\n当验证失败时，你可以使用 ADF 提供的默认通信机制。这种机制会显示一个或多个消息，并高亮显示任何验证失败的字段。如果你想对显示给用户的消息有更多控制，就需要通过使用\
    \ JSF 上下文来创建自己的消息。这个对象是自动创建的，它处理所有与服务器往返相关的信息。\n\n## 默认消息\n\n如代码清单 5-10 所示，当你将你自己的消息添加到\
