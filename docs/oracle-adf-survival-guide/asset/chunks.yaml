    \ the Application Development Framework\n*Sten Vesterli*\n\n![A437725_1_En_BookFrontmatter_Figa_HTML.png](A437725_1_En_BookFrontmatter_Figa_HTML.png)\n\
    \n任何作者在本书中引用的源代码或其他补充材料，读者均可通过本书在 GitHub 上的产品页面获取：[`www.apress.com/9781484228197`](http://www.apress.com/9781484228197)。更详细信息请访问：[`http://www.apress.com/source-code`](http://www.apress.com/source-code)。\n\
