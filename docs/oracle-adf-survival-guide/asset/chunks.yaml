    ### 添加操作


    如果在“数据控件”窗格中展开一个视图对象实例的“`操作`”选项卡，您将看到 ADF 为每个视图对象自动提供的许多标准操作。当将这些操作拖放到页面或页面片段上时，系统会显示一个对该操作有意义的界面组件列表。最常用的是“`ADF
    按钮`”和“`ADF 链接`”。


    在第 5 章，您将学习如何向视图对象和应用程序模块添加自己的逻辑。您添加并决定发布的方法也会出现在“`数据控件`”窗格中，并且可以以相同的方式轻松添加到您的应用程序中。


    ### 添加提交和回滚


    与视图对象一样，应用程序模块在“`数据控件`”面板的最底部（所有视图对象实例下方）也有一个“`操作`”选项卡。应用程序模块的两个标准操作是“`提交`”和“`回滚`”。为了执行对数据库的提交或回滚，您只需将其中一项操作拖放到您的页面或页面片段上。ADF
    会为您处理好一切，因此您无需编写任何代码即可构建功能齐全的数据库应用程序。


    ### 实现导航


    当您向任务流添加控制流案例时，就定义了页面之间可能的导航。要在用户界面中实际实现导航，您需要将一个操作项（例如按钮）拖放到您的页面上。选中操作项后，打开“`属性`”窗口，找到“`操作`”属性，并从选项列表中选择。您会看到此下拉列表包含了所有已定义的、从当前页面出发的控制流案例。


    当用户点击您连接到某个控制流案例的操作项时，您的 ADF 应用程序就会切换到对应的页面。


    **提示**

    ADF 会处理用户在页面间导航时的临时值存储。当用户最终选择“`提交`”或“`回滚`”操作时，所有更改都将被提交到数据库。


    ### 检查绑定


    当您运行使用这些拖放功能构建的应用程序时，来自业务组件的数据将自动显示在网页的字段中。页面上的更改会自动传播回业务组件，如果您执行提交操作，更改将一直传播到数据库。连接业务组件和用户界面元素的机制称为
    *绑定*。


    JDeveloper 会自动为您创建绑定，您可以通过点击页面底部的“`绑定`”选项卡来访问它们。这将生成一个可视化的绑定表示，如图 1-19 所示。


    ![A437725_1_En_1_Fig19_HTML.jpg](img/A437725_1_En_1_Fig19_HTML.jpg)

    *图 1-19. 绑定的可视化表示*


    左侧的“`绑定`”列显示了不同的绑定。最常用的有：

    - 用于单个属性的属性绑定（带有 XY 图标）。

    - 用于整个视图对象实例的树绑定（带有文件夹层次结构图标）。

    - 用于操作的动作绑定（带有齿轮图标）。


    当您点击一个绑定时，会出现一个箭头指向中间列的“`可执行对象`”。这通常是一个迭代器，代表指向右侧列所示数据控件中数据集合的指针。


    每个页面都有一个绑定，存储在页面定义文件中。要查看绑定的实际源代码，您需要点击绑定窗口顶部的“`页面定义文件`”链接，或在“`应用程序`”窗口中找到该绑定。


    在许多 ADF 应用程序中，您无需更改 JDeveloper 为您创建的绑定。然而，在高级 ADF 应用程序中，您可能需要手动创建绑定。您可以点击“`绑定`”窗口中的绿色加号来创建绑定和可执行对象。


    **注意**

    如果您在“`设计`”选项卡上从页面或页面片段中删除一个元素，JDeveloper 会尝试通过自动删除相应的绑定来帮助您。如果您从“`源`”选项卡中删除一个元素，JDeveloper
    会假定您是一位高级 ADF 开发人员，并保留绑定不变，以便您决定是保留它还是手动删除它。


    ### 最小可行产品


    一个企业级 ADF 应用程序通常由许多使用页面片段的有界任务流和一个带有菜单的主页面组成。当用户选择另一个菜单项时，相应的任务流会显示在主页面的动态区域中。由于这种构建应用程序的方式需要一些代码，我们将在第
    4 章回到这一点。


    但是，您可以在不编写任何代码的情况下构建一个功能齐全的应用程序。这使您可以快速向用户展示一个可运行的原型并收集初步反馈。


    #### 一个简单的主页面


    一个基本的主页面可以基于“`单列页眉（拉伸）`”快速启动布局来构建，如图 1-20 所示。


    ![A437725_1_En_1_Fig20_HTML.jpg](img/A437725_1_En_1_Fig20_HTML.jpg)

    *图 1-20. 单列页眉（拉伸）*


    在该页面内，在顶部的页眉区域放置一个“`输出文本`”组件，在窗口的主区域放置一个“`面板选项卡式`”组件。这些组件默认位于 JDeveloper 窗口的右侧，在“`组件`”窗口中可以找到。


    **提示**

    您可以使用“`组件`”窗口顶部的搜索框按名称搜索组件。


    在“`创建面板选项卡式`”对话框中，为您想要测试的应用程序所有部分创建选项卡。


    选择您的页眉文本，并使用“`属性`”窗口更改文本、字体样式和大小。


    然后将您的页面流拖放到应用程序的选项卡上。当提示选择用户界面组件时，选择“`区域`”。我们将在第 4 章回到另一个选项（“`动态区域`”）。您将正常看到主页面的元素，以及任务流第一页的灰度图像，如图
    1-21 所示。


    ![A437725_1_En_1_Fig21_HTML.jpg](img/A437725_1_En_1_Fig21_HTML.jpg)

    *图 1-21. 显示包含有界任务流的区域的主页面*


    现在您可以右键单击主页面并运行您的应用程序。


    在安装 JDeveloper 后第一次运行应用程序时，系统会提示您输入内置 WebLogic 服务器的密码，并且服务器需要一些时间来进行首次初始化和启动。


    您应该能在不同的选项卡上看到您的任务流，并能够在选项卡之间导航。


    ### 结论


    您现在已经了解了如何利用 ADF 和 JDeveloper 的强大功能，在不编写一行代码的情况下构建一个完整的、功能齐全的 ADF 应用程序。


    在下一章中，我们将讨论如何构建利用 ADF 企业应用程序开发功能的更大规模的应用程序，在后续章节中，您将学习如何添加实现业务逻辑的 Java 代码。


    ## 2. ADF 企业架构


    在上一章中，您看到了构建小型但功能齐全的 ADF 应用程序是多么容易。本章将讨论如何在企业环境中构建更大的应用程序。


    ### ADF 库


    ADF 企业级功能背后的秘密是“`ADF 库`”。一个“`ADF 库`”类似于一个普通的 Java 归档（`JAR`）文件，但它包含有关其内容的额外元数据。这些元数据使
    JDeveloper 能够显示内容，并使得在 JDeveloper 中复用“`ADF 库`”内的组件变得容易。

    '
- fmt: '### Creating ADF Libraries


    An ADF library is created from a project inside a workspace. When there are dependencies
    between projects in a workspace, the library will automatically include all objects
    from any projects it is dependent on. In a typical workspace of type ADF Fusion
    Web Application , JDeveloper automatically adds a dependency from the view/controller
    project to the model project. This means that when you create an ADF library from
    the view/controller project, you automatically get the content of the model project
    included in your library.


    To create an ADF library from a project, you need a deployment profile . You create
    this by right-clicking the project and choosing Deploy ➤ New Deployment Profile
    . Choose an ADF Library JAR file type and give your profile a meaningful name.
    By convention, the profile name is of the format `adflibXxx` (e.g., `adflibHrDemoCommon`).
    The profile name becomes the default name of the ADF Library file.


    **Tip**


    Because you might be handling ADF Library files outside JDeveloper (e.g., in your
    version control system or on application servers), the application name should
    be part of the library file name so you can tell the files apart.


    In the Edit ADF Library JAR Deployment Profile Properties dialog shown in Figure
    [2-1](#A437725_1_En_2_Chapter.html#Fig1), there is one setting you always need
    to change: `Connections`.


    ![A437725_1_En_2_Fig1_HTML.jpg](A437725_1_En_2_Fig1_HTML.jpg)


    **Figure 2-1.** Edit ADF Library JAR Deployment Profile Properties dialog


    The default option `Connection Details` means that your library will include the
    database connection details. You don’t want your libraries to include the connection
    information to your local development database. Therefore, you need to select
    `Connection Name Only`. This means that your library will just include the name
    of your connection, not the technical details. It will then be up to your application
    server administrator to define a datasource with this name, pointing to the right
    database.


    ### Managing ADF Libraries


    Because ADF libraries are central to your development process, it is important
    that you manage them well. Each developer is free to release new ADF libraries
    at any time, but you need a review process before the libraries are shared to
    the whole team.


    By default, ADF libraries are created in a `deploy` subdirectory within the project.
    You can leave them there and then tell your build/deployment manager when a new
    version is ready for wider distribution.


    The build/deployment manager will then ensure that your ADF library file is tested
    and placed in the central location where everybody gets their ADF libraries. This
    approved version should be placed under version control.


    Your process might be automated or manual, but you need an intermediate step that
    takes the ADF library built by some team, verifies it, and releases it for other
    teams to use.


    ### Using ADF Libraries


    To use an ADF library, you define a connection to the location in the file system
    where the approved libraries are stored, and add them to the project that needs
    them.


    The connection is defined in the `Resources` window, by default to the right of
    the JDeveloper window. If you don’t see it, you can open it from the `Window`
    menu. In this window, click the New icon at the top of the window and choose IDE
    Connections ➤ File System. Give your connection a name and select the path to
    the common ADF Library. The `Resources` window will now show all available libraries
    in that directory.


    To use an ADF library in a project, select the project in the `Applications` window.
    Then right-click the library in the `Resources` window and choose `Add to Project`.


    **Tip**


    If you want to see which ADF Libraries are included in a project, you can right-click
    the project and choose `Refresh ADF Library Dependencies …` This causes JDeveloper
    to reread all ADF libraries for the project and print them to the `Messages` window.


    ## ADF Architecture Models


    With the power of ADF libraries, you can create an ADF architecture that fits
    your need. There are many possibilities, but three good architectures are as follows:


    *   Simple

    *   Module

    *   Enterprise


    ### Simple ADF Architecture


    In a simple ADF architecture, you keep everything in one workspace. You will have
    a foundation project containing common code, a model project with your ADF business
    components, and a view/controller project with your task flows and master page.


    This architecture works up to an application of no more than 20 task flows, implemented
    by a team of no more than three or four developers. If the application gets bigger
    than this, it becomes hard to find the component you need to work on, and JDeveloper
    gets slower as it must handle the interdependencies between more objects. If the
    team gets too big, members tend to get in each other’s way, and there can be contention
    for central application files like `DataBindings.cpx`.


    **Tip**


    To simplify your view of a large application workspace, check out the JDeveloper
    feature `Working Sets` , found under the Working Set icon (a funnel) at the top
    of the `Application` window. This feature allows you to limit what you see in
    JDeveloper.'
