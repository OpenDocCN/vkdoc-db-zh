- fmt: '## Viewing and Configuring Your Page


    When you have created your page, it opens in the JDeveloper main window. There
    are several ways you can view your application:


    *   Design view

    *   Source view

    *   Structure window


    In addition, JDeveloper shows a Properties window with details of the currently
    selected item.


    **Tip**: You can reorder the windows in JDeveloper to your liking. To return to
    the default window layout, choose `Window ➤ Reset Windows to Factory Settings`.


    ### Design View


    The initial view of your page is the Design view. In this view, JDeveloper attempts
    to show your page as it will look at runtime. The toolbar at the top of the window,
    shown in Figure 1-15, allows you to change the view.


    ![Figure 1-15: Design view](A437725_1_En_1_Fig15_HTML.jpg)


    The Design setting shows technical details about your page that can be useful
    when building the page: for example, the borders of layout components and technical
    details about the fields and their values. The True setting shows your page as
    it will look at runtime, with dummy data of the right data type (text, number,
    date). The Focus button shows only one layout container, which can be useful when
    you have a complicated layout with many nested containers. The different screen
    icons allow you to test your layout in various sizes and orientations (desktop,
    tablet horizontal, tablet vertical, smartphone horizontal, smartphone vertical).
    You can customize exactly how many pixels each size should represent. Finally,
    you can view your page or page fragment with dummy data in the various browsers
    you configure.


    ### Source View


    To see the actual source behind your page, you can change to the Source view by
    clicking the Source tab at the bottom of the window. This view shows all components
    and settings and allows you to freely make any change.


    All components of an ADF page are part of a hierarchy, and you can collapse and
    expand nodes with the + and – icons in the left margin. The toolbar at the top
    of the window allows you to enable Block Coloring, where each node gets its own
    color to make the structure clearer. You can also ask JDeveloper to reformat your
    code if you have made manual changes.


    By default, JDeveloper will show the Mini-Map in the right margin, giving you
    a visual overview of your code. You can close it from the context menu in the
    map, and display it again from the context menu in the source code (`Source ➤
    Show Mini-Map`).


    The far-right margin shows a green square at the top if your code is valid. If
    there are errors, the block at the top turns red, and you get red bars in the
    margin corresponding to the location of the errors. Similarly, orange color indicates
    warnings.


    If you have errors or warnings, a quick fix icon will often appear in the left
    margin, offering you JDeveloper''s best guess at how to fix the code.


    If you want to see line numbers, you can right-click in the left margin and choose
    Toggle Line Numbers from the context menu.


    To change back to the design view, click the Design tab at the bottom of the window.


    ### Structure Window


    The Structure window, shown in Figure 1-16, shows another view of the hierarchy
    of components on your page.


    ![Figure 1-16: The Structure window](A437725_1_En_1_Fig16_HTML.jpg)


    By default, this window is placed in the bottom left corner of JDeveloper. The
    selections you make in the Source view and the selection in the Structure window
    are kept in sync by JDeveloper, so you can click an element in the Structure window
    to quickly jump to that place in the page source code. The Design and Source views,
    the Structure window, and the Properties window are just different representations
    of your application, so if you make a change in the Source view, for example,
    it is immediately reflected in the Structure window.


    ## Adding Data-Bound Components


    In a simple ADF Fusion workspace with a model and a view/controller project, you
    will automatically find the Data Control created from your application module
    in the Data Controls pane in the Applications window, as shown in Figure 1-17.


    ![Figure 1-17: Data Controls pane](A437725_1_En_1_Fig17_HTML.jpg)


    JDeveloper automatically creates one data control for every application module.
    Inside the data control, you can see all the view object instances in the corresponding
    application modules. From the Data Controls panel, you can, for example, drag
    a view object instance (the square red/orange icon, e.g., `AllDepartments`) or
    an individual attribute (the rectangular XYZ icon, e.g., `DepartmentName`) and
    drop it onto the page fragment.


    When you drop an item from the data controls pane onto a page or page fragment,
    JDeveloper will automatically prompt you to select what type of user interface
    component you want to add. The list depends on the type of item, showing only
    those that are relevant to that item.


    ### Adding a View Object Instance


    When you drop a view object instance, you get a long list of possible user interface
    objects to create, but the most commonly used are ADF Form and ADF Table (`ADF
    Table` is found on a submenu under Table/List View).


    If you select an ADF Form, you get a page that shows one record at a time. The
    attributes will be arranged vertically with a separate field for each attribute.
    You can check the `Row Navigation` check box, as shown in Figure 1-18, to ask
    JDeveloper to also add buttons to navigate to first, previous, next, and last
    record.


    ![Figure 1-18: Creating an ADF Form](A437725_1_En_1_Fig18_HTML.jpg)


    If you do not provide a label for each attribute, ADF will use the UI hint from
    the view object. If no UI hint was set in the view object, ADF will then fall
    back to any UI hint set on the entity object. If no label is specified there either,
    the label becomes the attribute name derived from the database column.


    Technically, JDeveloper creates an `<af:PanelFormLayout>` component containing
    individual `<af:InputText>` components connected to the attributes in the view
    object instance you drop. If you checked the `Row Navigation` check box, you also
    get buttons connected to the standard operations `First`, `Previous`, `Next`,
    and `Last` that every view object automatically offers.


    If you select an ADF Table, you get a page that shows many records in a table
    with each record as one row in the table. You can select check boxes to enable
    sorting (by clicking the column header) and enable filtering (adding a filter
    criteria box at the top of each column). You can also specify each attribute label
    if you don''t want to use the default. Technically, JDeveloper creates an `<af:Table>`
    component bound to the entire view object instance.


    ### Adding an Individual Attribute


    You can also drop an individual attribute onto a page or page fragment. In that
    case, your choices of user interface component are different—the most commonly
    used component is an ADF Input Text w/ Label that displays as a labeled input
    field as you''d expect. You can explicitly specify a label or accept the default
    coming from the view object UI hints, the entity object UI hints, or the database
    column name.'
