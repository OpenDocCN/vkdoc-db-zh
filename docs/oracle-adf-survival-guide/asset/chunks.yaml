    }\npublic RichInputText getDname() {\n    if (dname != null) {\n        return\
    \ (RichInputText)dname.getComponent();\n    } else {\n        return null;\n \
    \   }\n}\n...\npublic String ShowAnother() {\n    FacesContext fctx = FacesContext.getCurrentInstance();\n\
    \    FacesMessage fm = new FacesMessage(FacesMessage.SEVERITY_INFO,\n        \"\
    Summary\", \"This is the detailed message\");\n    String dnameItem = getDname().getClientId(fctx);\n\
    \    logger.finer(\"Dname field is \" + dnameItem);\n    fctx.addMessage(dnameItem,\
    \ fm);\n    return null;\n}\n...\n}\n```\n**Listing 5-11.** Displaying a Message\
    \ to the User in Relation to a Specific Component\n\nThis requires that the component\
    \ is connected to a bean property—in the preceding example, the `Binding` property\
    \ of the department name item is set to `#{backingBeanScope.deptPage.dname}`.\n\
    \nNote that even though the first parameter of `addMessage()` is technically just\
