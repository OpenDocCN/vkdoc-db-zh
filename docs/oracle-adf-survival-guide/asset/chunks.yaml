  trans: '

    ## 构建子系统


    ADF 应用程序的主体部分将置于各个子系统中。每个子系统应在独立的工作区中创建，并包含一个模型项目和一个视图/控制器项目。


    你的子系统工作区将利用基础层中的所有 ADF 库：`common UI`、`common model`、业务组件基类以及任何通用工具代码。


    在模型项目中，你需要创建实现该子系统故事或用例所需的视图对象和视图链接。所有这些都应基于来自 `common model` 的实体对象。


    **提示**


    如果在创建视图对象时没有看到任何实体对象，可能是你未正确添加对 `common model` ADF 库的依赖。


    在视图/控制器项目中，你需要创建带有页面片段的有界任务流，以匹配你的用例、故事或 UI 线框图。这些应基于来自 `common UI` ADF 库的页面流模板。


    创建任务流后，再基于你的页面片段模板创建实际的页面片段。


    因为你无法直接运行带有页面片段的任务流，所以你的子系统通常还包含每个任务流的测试页面。你也可以使用 `ADF EMG Task Flow Tester`，这是一个由
    ADF 企业方法学组（`ADF EMG`）成员开发的 `JDeveloper` 扩展。像安装其他 `JDeveloper` 扩展一样，通过选择 `帮助 ➤
    检查更新` 来安装这个实用工具。务必在 `检查更新` 向导的第一步中勾选 `开源和合作伙伴扩展` 复选框。你应该能在向导的第二步中看到此工具，如图 2-9
    所示。


    ![A437725_1_En_2_Fig9_HTML.jpg](img/A437725_1_En_2_Fig9_HTML.jpg)


    图 2-9.


    安装 `ADF EMG Task Flow Tester`


    允许 `JDeveloper` 重启，并按照说明开始使用 `ADF EMG Task Flow Tester`。


    ## 构建主应用程序


    主应用程序是所有子系统汇集的地方。它拥有自己的工作区，并使用来自基础层和所有子系统的 ADF 库。在主应用程序工作区中，你仅使用视图/控制器项目——所有业务组件都驻留在基础层或某个子系统中。


    ### 主应用程序内容


    主应用程序包含基于页面模板的主页（是一个完整的页面，而非片段）。


    由于页面模板包含所有应用程序装饰（标题栏、徽标等），页面本身将仅包含一个菜单、一个动态区域和一些代码。该代码用于处理动态区域内容的切换，以显示另一个有界任务流。我们将在第
    5 章讨论应用程序逻辑时看到必要的代码示例。


    ### 安全性


    最后，你在主应用程序中应用安全性。要应用安全性，请选择 `应用程序 ➤ 安全 ➤ 配置 ADF 安全性` 并完成 `配置 ADF 安全性` 向导。


    **注意**


    `ADF 安全性` 在运行于 `WebLogic` 和 `WebSphere` 应用服务器上的 ADF 应用程序中可用。如果你运行的是免费的 `ADF Essentials`
    版本并部署在 `GlassFish` 上，则无法使用 `ADF 安全性`。你可以通过其他方式（例如 `Apache Shiro`）保护网页，但如果希望在任务流级别限制访问，则必须自行编写授权代码。


    #### 运行配置 ADF 安全性向导


    在第一步中，选择 `ADF 认证和授权` 以请求 `ADF` 处理认证（识别用户）和授权（用户被允许做什么）。


    在第二步中，选择 `基于表单的认证` 并勾选 `生成默认页面` 复选框。这将创建包含所有必要信息和字段的基本登录页面。然后你可以修改它们以匹配你的应用程序。`HTTP
    基本` 和 `HTTP 摘要` 将登录交给浏览器处理，向用户显示其浏览器用于认证的任何对话框。


    在第三步中，选择 `无自动授予` 以表示你将显式分配访问权限。


    在第四步中，不要勾选 `认证成功后重定向` 复选框。你通常只想向用户显示主页，而不是重定向到其他页面。


    当你完成向导时，你的应用程序即受到安全保护，并将提示你输入用户名和密码。在定义访问权限之前，它也不允许你访问任何内容。


    #### 定义访问权限


    访问权限在安全向导创建的 `jazn-data.xml` 文件中定义。你可以选择 `应用程序 ➤ 安全 ➤ 应用程序角色`，在用户友好的对话框中查看此文件，而不必直接编辑文件本身。


    作为应用程序开发者，你为应用程序中不同类型的用户创建应用程序角色。许多应用程序只有一级安全性，即每个经过认证的用户都可以使用应用程序的全部功能。在这种情况下，你只需要一个应用程序角色。其他应用程序有几种用户类型，因此需要多个应用程序角色。


    在 `jazn-data.xml` 文件的 `应用程序角色` 选项卡上，你命名这些应用程序角色。在 `资源授权` 选项卡上，你选择资源并将其授予特定角色。如果你有复杂的安全要求，你可能还会使用权利授予（即资源组）。


    典型的 `ADF 安全性` 使用以下授权：


    *   对应用程序主页的 `网页` 授权，授予每个应用程序角色。

    *   对不同任务流的 `任务流` 授权，根据需要授予不同的应用程序角色。


    在使用模块化或企业架构的 `ADF 应用程序` 中，任务流在子系统中开发，并通过 `ADF 库` 引入主应用程序。要授予对这些任务流的访问权限，请务必勾选
    `显示从 ADF 库导入的任务流` 复选框。


    如果你想保护数据集，可以使用 `ADF 实体对象` 授权。如果你想保护单个属性，则使用 `ADF 实体对象属性` 授权。


    #### 在内置的 WebLogic 中运行


    在 `测试用户和角色` 选项卡上，你可以定义测试用户并为他们分配角色。这些用户仅在 `JDeveloper` 内置的 `WebLogic` 服务器中运行应用程序时使用。


    你可以将应用程序中定义的应用程序角色分配给单个测试用户或用户组（在 `JDeveloper` 中称为 `企业角色`）。这允许你模拟部署到独立应用服务器时将适用的授权逻辑。


    #### 部署到测试和生产服务器


    当你将应用程序部署到独立的测试和生产服务器时，部署的一部分工作是将应用程序角色映射到服务器上的用户或组。


    在典型的企业环境中，你的 `WebLogic` 服务器将与某个身份提供者（例如 `Microsoft Active Directory`）集成。这意味着当你在
    `Oracle Enterprise Manager Grid Control` 中分配应用程序角色时，你可以看到并分配给你的 `AD` 用户和组。


    例如，你的应用程序可能有 `readonly`、`normal` 和 `superuser` 应用程序角色。在你的身份管理系统中，可能有名为 `Trainee`、`Customer
    Service` 和 `Senior advisor` 的用户组。部署应用程序时，你可以将 `readonly` 映射到 `Trainee`，`normal`
    映射到 `Customer Service`，`superuser` 映射到 `Senior advisor`。


    ## 总结


    你已经了解了 `ADF 库` 如何让你将即使非常大型的企业应用程序的开发也拆分成可管理的部分，以及如何在开始认真构建之前构建所需的所有基础元素。


    在下一章中，我们将讨论如何为你的应用程序实现所需的布局和外观。

    '
- fmt: '# 3. Layout and Skins


    As you saw in Chapter [1](#A437725_1_En_1_Chapter.html), JDeveloper can produce
    acceptable layouts and visual appearance when building simple drag-and-drop ADF
    applications. This chapter will explain how to get more control over the layout
    and appearance of your ADF application.


    For this, ADF offers the following functionality:


    *   Layout components

    *   Individual component styling

    *   Application-wide skinning


    You use layout components like `Panel Grid Layout` to arrange components on your
    pages and page fragments. You can nest layout components within each other to
    achieve exactly the layout you want, and control the spacing between elements
    with `Spacer` components.


    To change the look of an individual component, you change the `InlineStyle` property.
    ADF components are controlled with standard Cascading Style Sheet (CSS) formatting,
    and you can set an explicit style for one component or define a style class.


    The look of every component in the entire application is controlled by the application
    skin. A skin consists of a CSS file, optionally supplemented with resource bundles
    to customize the default strings used in ADF applications, and possibly also your
    own image files. Your application is always based on a default skin, so you only
    need to change the things that you want to look different from the default.


    ## Layout


    Many years ago, the first technology for producing web pages with Java was JavaServer
    Pages (JSP) . In JSP, presentation and business logic in Java code were mixed
    together with the HTML tags that defined the page shown to the user. This made
    for web pages that were very hard to maintain. Over time, developers learned to
    separate the Java code into tag libraries to try to clean up the mess, but using
    tag libraries right still required discipline from the developer.


    JavaServer Faces (JSF) solves this problem once and for all. A JSF page consists
    only of components, and any presentation logic is placed in separate Java Bean
    classes. We’ll return to presentation logic in Chapter [5](#A437725_1_En_5_Chapter.html).
    ADF is based on JSF, and ADF user interface components are special JSF components
    delivered by Oracle.


    Some components like data input fields and drop-downs display data. Other components
    perform actions like performing navigation and invoking business logic. Finally,
    some components serve to arrange components on the page. These are the layout
    components that we will be discussing in this chapter.


    ### Layout Managers vs. Fixed Formatting


    In some development tools (e.g., Oracle Forms), you place components in a fixed
    position on the page. For example, you might place an input field at position
    x=150, y=220 . This means that the component will always be placed 150 pixels
    in from the left margin, and 220 pixels below the top margin. This approach gives
    you full control but is also inflexible. If the user runs the application on a
    larger monitor, everything will stay as defined by the developer and the extra
    space goes unused.


    In an ADF application, the layout is dynamic and can depend on the size of the
    browser window the application runs in. The layout is handled by layout manager
    components that arrange the components placed inside them. Layout managers can
    control other layout managers, leading to a whole hierarchy of layout managers.
    This allows you to create the exact layout you want.


    Some layout components simply control other elements—for example, a panel grid
    layout control grid row components, and a tabbed panel controls detail items.
    Other layout components have facets that can hold other components. For example,
    a panel stretch layout has top, bottom, start, center, and end facets with specific
    locations. Components you drop in the top facet of a panel stretch layout will
    always be placed highest on the screen, and everything in the center facet will
    be below that.


    Note


    Some components (like `panel stretch layout`) have start and end facets, not left
    and right. This is because ADF supports right-to-left languages like Arabic, Hebrew,
    or Persian. If you configure your application for one of these languages, the
    start facet moves to the right, because that is where reading starts.


    ### Stretching and Nonstretching


    When the layout managers arrange components on the screen, they take into account
    the stretching properties of each layout component. There are four types of ADF
    layout components:


    *   Those who can stretch themselves and stretch their children

    *   Those who don’t stretch themselves, but do stretch their children

    *   Those who can stretch themselves, but don’t stretch their children

    *   Those who don’t stretch themselves and don’t stretch their children


    An ADF application normally starts with a stretchable outer layout container that
    stretches its children (like a `Panel Grid Layout` with a 100% height row and
    a 100% width cell). This makes sure that your application will use all available
    browser space.


    Some components can’t stretch (e.g., `Input Text`), so you should avoid placing
    these as direct children of a layout container that will attempt to stretch its
    children. Instead, you wrap your nonstretchable components in a layout component
    like `Panel Group Layout`, which stretches itself but doesn’t stretch its children.


    ### Quick Start Layouts


    When learning about ADF layout, the best starting point is the Quick Start Layouts
    . These demonstrate best practice and evolve together with ADF. For example, in
    earlier versions of ADF, the outer layout container of the quick start layouts
    was a `Panel Stretch Layout`. However, when ADF got the improved `Panel Grid Layout`
    component in version 11.1.2, some of the quick start layouts changed to demonstrate
    the right way to use this new component.


    When you create a page or page fragments, choose **Copy Quick Start Layout** and
    choose the example that most closely matches what you are trying to achieve. First,
    select the number of columns (one, two, or three) from the Categories panel to
    the left. Then, choose a type and finally a layout, as shown in Figure [3-1](#A437725_1_En_3_Chapter.html#Fig1).


    ![A437725_1_En_3_Fig1_HTML.jpg](A437725_1_En_3_Fig1_HTML.jpg)

    Figure 3-1. Using a quick start layout


    In the layout selection, you will see a few different icons:


    *   The four-way arrow indicates an area that will stretch as much as possible.
    This is a good choice for the main work area of your page.

    *   The padlock indicates an area that will not change in size. JDeveloper only
    offers these fixed-size areas around the margins (top, left, bottom, and in a
    few cases, to the right). These areas are normally used for page headers, menus,
    and task lists that you know will take up only limited space.

    *   The triangle indicates that JDeveloper will use an `<af:panelSplitter>` component.
    This component is shown in the application as a line with a little triangle, and
    the user can click the triangle to collapse the area that the triangle points
    to. This is often used to create a place for supplementary information that the
    user might or might not need to see all the time.

    *   The scrollbar indicates that JDeveloper will use an `<af:panelGroupLayout>`
    with layout `scroll`. In the application, this layout will be shown with a scrollbar
    if there are more components than will fit on the page. The one-column layouts
    offer a vertical scrollbar while the two- and three-column layouts offer a horizontal
    scrollbar. These layouts are used if you know that your pages will contain more
    information than will fit on the screen. You should try to avoid forcing the user
    to scroll.


    ### Using Panel Grid Layout


    The panel grid layout is the most versatile layout component and probably the
    one you will use the most. It has the additional benefit that it matches the way
    HTML tables are laid out, so it offers good performance compared to other ADF
    layout components.'
