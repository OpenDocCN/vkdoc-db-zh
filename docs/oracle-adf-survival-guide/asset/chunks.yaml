    \n然后向用户展示这个基本应用程序。这让他们对最终的 ADF 应用程序将是什么样子有了初步的了解，并向他们证明项目正在进展中。\n\n### 构建应用程序\n\
    \n初始应用已经证明了整个技术栈是可行的，或者可能已经识别出您需要处理的领域（例如，安全性集成）。要构建应用程序的其余部分，您需要在子系统中实现所有设计好的界面和其他功能。\n\
    \n如果您使用敏捷开发方法，您会为每个冲刺选择一些用户故事，并不断从子系统部署新的 ADF 库，并将它们集成到主应用程序中。如果您按照传统的瀑布模型运行项目，请确保在计划中设置一些里程碑，在这些里程碑点将所有工作集成到主应用程序中，以便向最终用户和其他利益相关者演示应用程序的当前状态。\n\
    \n#### 处理数据库变更\n\n在开发过程中，数据库总是会发生变化。会有对现有表中属性的小改动（新增或修改的列），也可能涉及新表和表关系变更的较大的结构性变化。\n\
    \n当您需要对数据库中的表进行小改动时，编写脚本来在本地数据库中进行更改。然后更改基础工作区中公共模型项目中的相应实体对象。您可以右键单击实体对象并选择“与数据库同步”，以寻求\
    \ JDeveloper 的帮助。“与数据库同步”对话框如图 7-1 所示。\n\n![A437725_1_En_7_Fig1_HTML.jpg](img/A437725_1_En_7_Fig1_HTML.jpg)\n\
    *图 7-1.*\n将数据库更改与 ADF 实体对象同步\n\n您需要单击“同步”或“全部同步”来让 JDeveloper 实际更改您的实体对象——如果只是单击“确定”，则不会进行任何更改。确认您需要更改后，JDeveloper\
    \ 会确认哪些更改已成功。\n\n请注意，实体对象中的属性更改不会自动应用于使用该实体对象的视图对象，并且对于视图对象也没有相应的“同步”功能。您必须手动处理任何视图对象的更改。您可以右键单击实体对象并选择“查找用法”，以查找依赖于该实体对象的视图对象。\n\
    \n#### 处理其他基础架构变更\n\n对业务组件基类的更改不应破坏现有代码。同样，对页面和任务流模板的更改可能会影响页面的视觉外观，但不应破坏应用程序（除非您意外删除了某些页面中使用的\
    \ facet）。\n\n但是，您应始终执行回归测试，以验证您的应用程序是否仍然有效。通过用户界面自动化应用程序测试是一个好主意。\n\n## 源代码控制\n\
    \n您需要将 ADF 应用程序源代码和库置于版本控制之下。如果您的组织以前使用过像 Oracle Forms 这样的工具，它将所有源代码组织在少数几个大文件中，那么您可能至今还没有适当的版本控制。一旦开始使用包含大量小型但相互依赖的文件的\
    \ ADF，您就绝对需要实施源代码控制。\n\n当今最流行的版本控制软件是 `Git`。图 7-2 显示了来自 Google Trends 的各种版本控制工具随时间变化的比较。\n\
    \n![A437725_1_En_7_Fig2_HTML.jpg](img/A437725_1_En_7_Fig2_HTML.jpg)\n*图 7-2.*\n\
    版本控制软件流行度\n\n`Git` 是一个免费的开源工具，可以从 [`https://git-scm.com/`](https://git-scm.com/)\
    \ 下载并在本地运行，或者您可以使用托管实例，如 `GitHub`（ [`https://github.com/`](https://github.com/)\
    \ ）。本章稍后描述的 Oracle Developer Cloud Service (DCS) 也使用 `Git`。不过，`JDeveloper` 内置了对\
    \ `Apache Subversion` 的支持，您可以从 `JDeveloper` 扩展中心（ [`http://apex.oracle.com/pls/apex/f?p=updatecenter:uc`](http://apex.oracle.com/pls/apex/f?p=updatecenter:uc)\
    \ ）下载用于 `CVS`、`Perforce` 等的扩展。\n"
- fmt: '### Initial Versioning of an Entire Application


    This section describes how to version an application using Git. Because Git is
    a distributed version control system, you normally commit changes to your private,
    local repository first and then push your changes to a central repository. Because
    Git is already integrated with JDeveloper, you don’t have to download and install
    it.


    Tip

    If you are using any Oracle Cloud service (like Java Cloud Service), the Oracle
    Developer Cloud Service (DCS) is included and available to you at no extra cost.
    This service includes a central Git repository and many other tools. If you plan
    to use DCS, refer to the specific section on DCS later in this chapter.


    As mentioned earlier, your lead developer or architect should build all the necessary
    workspaces before development starts. He should also place all files under version
    control. This process involves four steps:


    1.  Initialize your ADF base directory as a local Git repository

    2.  Add all project files to this local repository

    3.  Commit all project files to the local repository

    4.  Push the local repository to a central Git repository accessible to all developers


    Note

    If you use `Team ➤ Version Application`, the `Import to Git wizard` runs and versions
    a single application workspace into a Git repository. However, the initialize-add-commit
    method versions all workspaces in a directory into the same Git repository, so
    this is the recommended approach.


    #### Initializing the Local Git Repository


    You start by initializing the directory where all your ADF workspaces and your
    ADF library directory reside as a Git repository. A Git repository is just a directory
    with some extra files that Git understands. In this chapter, we will refer to
    this directory as `$ADF_ROOT`.


    To do this, choose `Team ➤ Git ➤ Initialize`. This menu item is only active if
    you have a nonversioned application workspace open in JDeveloper. In the Initialize
    Repository dialog, provide the name of the root directory for all your ADF workspaces
    and the ADF library directory, as shown in Figure [7-3](#A437725_1_En_7_Chapter.html#Fig3).


    ![A437725_1_En_7_Fig3_HTML.jpg](A437725_1_En_7_Fig3_HTML.jpg)


    Figure 7-3. Initializing the Git repository


    This adds a hidden `.git` subdirectory, turning the directory you specify into
    a Git repository .


    #### Adding All Files


    After this step, you will see in JDeveloper has added a little marker at the bottom
    left corner of the icons for all folders and files in the Applications window,
    as shown in Figure [7-4](#A437725_1_En_7_Chapter.html#Fig4). If you point to a
    file or folder with the mouse cursor, the little pop-up field shows `Git: Unversioned`.


    ![A437725_1_En_7_Fig4_HTML.jpg](A437725_1_En_7_Fig4_HTML.jpg)


    Figure 7-4. Unversioned application workspace


    All the files in the workspace also show up in the `Pending Changes window` on
    the `Candidates tab`. If this window did not open automatically as a new tab next
    to the `Log window` at the bottom of the screen, you can open it by choosing `Team
    ➤ Git ➤ Pending Changes`.


    To add all files, choose `Team ➤ Git ➤ Add all`. The `Add All` window appears
    and can be resized as shown in Figure [7-5](#A437725_1_En_7_Chapter.html#Fig5).


    ![A437725_1_En_7_Fig5_HTML.jpg](A437725_1_En_7_Fig5_HTML.jpg)


    Figure 7-5. The Add All dialog, expanded


    Notice that the `Add All` dialog includes all files from all workspaces under
    your `$ADF_ROOT`. Because you initialized the `$ADF_ROOT` directory as one Git
    repository, `Add All` works on all files in this directory and its subdirectories.


    The marker on the icons in the `Applications window` changes to a plus sign and
    all files move to the `Outgoing` tab in the `Pending Changes window`, as shown
    in Figure [7-6](#A437725_1_En_7_Chapter.html#Fig6).


    ![A437725_1_En_7_Fig6_HTML.jpg](A437725_1_En_7_Fig6_HTML.jpg)


    Figure 7-6. Files added and ready to be committed to Git


    #### Committing All Files


    To commit all files to your local Git repository , choose `Team ➤ Git ➤ Commit
    All` from the JDeveloper main menu or `Versioning ➤ Commit All` from the context
    menu in the `Applications window`. The `Commit All` dialog appears as shown in
    Figure [7-7](#A437725_1_En_7_Chapter.html#Fig7).


    ![A437725_1_En_7_Fig7_HTML.jpg](A437725_1_En_7_Fig7_HTML.jpg)


    Figure 7-7. The Commit All dialog


    Make sure you check the `Commit non-staged files` check box. Git actually works
    with a separate staging area, and files can be `Staged` or `Not Staged` (you can
    see this in the `Status column` in the `Pending Changes window` ). Advanced Git
    users can use this feature to commit only some of the changed files by controlling
    whether they are staged or not. For everyday Git use, simply check the check box
    and commit all files whether staged or not.'
