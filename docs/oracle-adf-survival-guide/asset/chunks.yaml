  trans: '### 创建 ADF 库


    ADF 库是基于工作区内的某个项目创建的。当工作区中的项目之间存在依赖关系时，该库将自动包含其所依赖项目的所有对象。在典型的 ADF Fusion Web
    Application 类型的工作区中，JDeveloper 会自动添加从视图/控制器项目到模型项目的依赖项。这意味着，当你从视图/控制器项目创建 ADF
    库时，模型项目的内容也会自动包含在你的库中。


    要从项目创建 ADF 需要一个部署配置。你通过右键单击项目并选择 **Deploy ➤ New Deployment Profile** 来创建它。选择一个
    ADF Library JAR 文件类型，并为你的配置文件起一个有意义的名称。按照约定，配置文件名格式为 `adflibXxx`（例如 `adflibHrDemoCommon`）。配置文件名将成为
    ADF 库文件的默认名称。


    **提示**


    由于你可能需要在 JDeveloper 之外处理 ADF 库文件（例如，在版本控制系统中或在应用服务器上），因此应用程序名称应作为库文件名的一部分，以便你能够区分这些文件。


    在如图 2-1 所示的 **Edit ADF Library JAR Deployment Profile Properties** 对话框中，有一项设置你总是需要更改：`Connections`。


    ![A437725_1_En_2_Fig1_HTML.jpg](img/A437725_1_En_2_Fig1_HTML.jpg)


    **图 2-1.** 编辑 ADF 库 JAR 部署配置文件属性对话框


    默认选项 `Connection Details` 意味着你的库将包含数据库连接详情。你不希望你的库包含指向本地开发数据库的连接信息。因此，你需要选择 `Connection
    Name Only`。这意味着你的库将只包含连接的名称，而非技术细节。然后，将由你的应用服务器管理员来定义具有此名称的数据源，并指向正确的数据库。


    ### 管理 ADF 库


    由于 ADF 库是开发过程的核心，因此妥善管理它们非常重要。每位开发者都可以随时发布新的 ADF 库，但在将库共享给整个团队之前，你需要一个评审流程。


    默认情况下，ADF 库是在项目内的 `deploy` 子目录中创建的。你可以将它们留在那里，然后在新的版本准备好进行更广泛的分发时告知你的构建/部署管理员。


    然后，构建/部署管理员将确保你的 ADF 库文件经过测试，并放置在所有人都能获取其 ADF 库的中央位置。这个经过批准的版本应该被置于版本控制之下。


    你的流程可以是自动化的，也可以是手动的，但你需要一个中间步骤，该步骤接收某个团队构建的 ADF 库，对其进行验证，然后发布供其他团队使用。


    ### 使用 ADF 库


    要使用一个 ADF 库，你需要定义一个指向已批准库存储位置的文件系统连接，并将它们添加到需要的项目中。


    该连接在 `Resources` 窗口中定义，该窗口默认位于 JDeveloper 窗口的右侧。如果看不到，可以从 `Window` 菜单打开。在此窗口中，单击窗口顶部的
    New 图标，然后选择 **IDE Connections ➤ File System**。为你的连接命名，并选择指向公共 ADF 库的路径。`Resources`
    窗口现在将显示该目录中所有可用的库。


    要在项目中使用 ADF 库，请在 `Applications` 窗口中选择该项目。然后右键单击 `Resources` 窗口中的库并选择 `Add to Project`。


    **提示**


    如果你想查看项目中包含了哪些 ADF 库，可以右键单击项目并选择 `Refresh ADF Library Dependencies …`。这将使 JDeveloper
    重新读取项目的所有 ADF 库并将它们打印到 `Messages` 窗口。


    ## ADF 架构模型


    借助 ADF 库的强大功能，你可以创建适合需求的 ADF 架构。存在多种可能性，但三种良好的架构如下：


    *   简单型

    *   模块型

    *   企业型


    ### 简单型 ADF 架构


    在简单型 ADF 架构中，你将所有内容保存在一个工作区中。你将拥有一个包含公共代码的基础项目、一个包含你的 ADF 业务组件的模型项目，以及一个包含你的任务流和主页面的视图/控制器项目。


    此架构适用于不超过 20 个任务流、由不超过三到四名开发者的团队实现的应用程序。如果应用程序变得更大，则很难找到需要处理的组件，并且由于 JDeveloper
    必须处理更多对象之间的相互依赖关系，其运行速度会变慢。如果团队变得太大，成员们往往会相互干扰，并且可能对 `DataBindings.cpx` 等中心应用程序文件产生争用。


    **提示**


    为了简化对大型应用程序工作区的视图，请查看 JDeveloper 的功能 `Working Sets` ，位于 `Application` 窗口顶部的 Working
    Set 图标（一个漏斗）下。此功能允许你限制在 JDeveloper 中看到的内容。'
- fmt: '### Modular ADF Architecture


    When building a single large ADF application, you should use a modular architecture.
    This involves several workspaces and projects, each worked on by a small team
    of one to four people.


    There will be a foundation layer, a small number of subsystems, and a master application,
    as shown in Figure [2-2](#A437725_1_En_2_Chapter.html#Fig2).


    ![A437725_1_En_2_Fig2_HTML.jpg](A437725_1_En_2_Fig2_HTML.jpg)


    Figure 2-2. Modular ADF architecture


    #### Foundation Layer


    The foundation layer should be kept in one workspace with four projects:


    *   Common model

    *   Common UI

    *   Common utility code

    *   Business component base classes


    When you create your foundation workspace, choose `ADF Fusion Web Application`.
    This wizard allows you to create the common model and common UI projects. Then
    add an extra project for utility and business component base classes with `File`
    -> `New` -> `Project` -> `ADF Model Project`. The reason you choose ADF model
    project is that this project template in JDeveloper already contains the technologies
    you need.


    The common model project should contain all business components that can be shared
    across the entire application. Because entity objects map directly to database
    tables, these can be shared and go into the common model project. Similarly, view
    objects used for lists of values can also be shared and go into the common model.


    The common UI project contains all shared elements that belong to the user interface
    layer. Elements in this project might include templates, skins, and declarative
    components.


    The common utility code project contains any common utility classes that you will
    be using throughout your application.


    Tip


    Find the Fusion Order Demo application from Oracle and download it. This demo
    application contains several useful utility classes. Though not officially supported
    Oracle software, it can serve as a good starting point for your own utilities.


    The business component base classes project contains your own ADF business component
    base classes that extend the Oracle-supplied classes. The section “Creating Your
    Own Base Classes” later in this chapter explains why you need these classes and
    how to build them.


    #### Subsystems


    The task flows that implement the functional requirements of the applications
    go into a small number of subsystems. Each subsystem should have its own workspace
    with a model and a view/controller project. A typical project will have three
    to eight subsystems, each assigned to a team of one or two developers.


    The model project should contain the view objects that are specific to the use
    cases implemented by that subsystem.


    The view/controller project should contain the bounded task flows that implement
    the use cases of the subsystem, together with their page fragments.


    #### Master Application


    The master application contains the master page with the global menu. All functionality
    is included in the master application through ADF libraries produced by the subsystems.
    Security is defined in the master application.


    ### Enterprise ADF Architecture


    If your organization has made a strategic choice of ADF as its development platform,
    you are likely to be building many ADF applications. In this case, it makes sense
    to establish an enterprise ADF architecture.


    This involves an enterprise foundation layer common to all applications and an
    application foundation layer for each application. There will be a small number
    of subsystems and one or more master applications that utilize functionality from
    some of the subsystems. In an enterprise ADF architecture, some subsystems might
    be shared and used in several master applications. The architecture is illustrated
    in Figure [2-3](#A437725_1_En_2_Chapter.html#Fig3).


    ![A437725_1_En_2_Fig3_HTML.jpg](A437725_1_En_2_Fig3_HTML.jpg)


    Figure 2-3. Enterprise ADF architecture


    #### Enterprise Foundation


    The enterprise foundation layer contains the code that is common across the entire
    enterprise. This layer should be kept in one workspace with at least two projects:


    *   Enterprise business component base classes

    *   Enterprise common utility code


    As for the modular architecture, the business component base classes project contains
    extensions to Oracle’s ADF business component base classes. At the enterprise
    level, you can add functionality that you want every ADF business component in
    the organization to have.


    Similarly, the enterprise common utility code project contains utility classes
    that are expected to be used across all ADF applications in the organization.


    #### Application Foundation


    The application foundation layer contains application-specific code:


    *   Application-specific extensions to the enterprise business component base
    classes

    *   Application-specific common utility code

    *   Common model


    The application-specific business component extensions extend the enterprise-level
    business component base classes and add any additional functionality only needed
    by this specific application. In the same way, the common utility code project
    contains common classes only useful in this application.


    The common model project contains business components shared across the application
    as for the modular architecture (i.e., entity objects and a list of values view
    objects).


    #### Subsystems


    Subsystems in an ADF enterprise architecture are like subsystems in a modular
    architecture, and each consists of a model and a view/controller project.


    #### Master Applications


    Each master application is also like a master application in a modular architecture.
    In an ADF enterprise architecture, the same subsystem can be used in multiple
    master applications.


    ### Deploying ADF Applications


    Using these ADF architectures, your unit of granularity is the subsystem. If you
    make a change, you have to rebuild the subsystem ADF library and then build and
    deploy the master application EAR file.


    If you want changes to your subsystems to take effect without needing to rebuild
    the master application, you can look at deploying your ADF libraries as WebLogic
    shared libraries, or investigate the ADF feature called Remote Regions.


    ### Business Component Code


    In the first chapter, you saw how you can build an Oracle ADF application without
    writing a single line of code. Of course, you are not limited by the ADF default
    business component functionality but can extend and customize it as you see fit.


    #### Implicit Business Components


    If you don’t write any code yourself, you are implicitly using the ADF classes
    that Oracle delivers as part of the ADF framework. For example, whenever your
    application uses an entity object, ADF will automatically create an instance of
    the `oracle.jbo.server.EntityObject` class. That class reads the definition of
    your entity object (table, columns, and other settings) and provides a number
    of interfaces for the rest of the ADF Business component stack to call.'
