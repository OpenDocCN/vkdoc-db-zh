- fmt: "# Working with Selected Rows\n\nIf you want to work with the current record\
    \ in the ADF table that displays data from an iterator, you might try the `getCurrentRow()`\
    \ method that exists in the `DCIteratorBinding` object. However, that method returns\
    \ the current row in the view object instance, not the currently selected row\
    \ in the user interface. To access the selected row or rows in an ADF table component,\
    \ you need to work with the table component first.\n\nAn ADF table has a property\
    \ `rowSelection` that you can set to `none`, `single`, and `multiple`. When you\
    \ drop a view object instance on a page, this is one of the selections you can\
    \ make in the Create Table wizard, but you can of course always change it later.\
    \ If you allow selection in a table, you can then retrieve the `Key` object for\
    \ all selected records with the `getSelectedRowKeys()` method from the `RichTable`\
    \ object connected to the UI component, as shown in Listing [5-9](#A437725_1_En_5_Chapter.html#Par97).\n\
    \n```java\n...\nimport oracle.adf.model.BindingContext;\nimport oracle.adf.model.binding.DCBindingContainer;\n\
