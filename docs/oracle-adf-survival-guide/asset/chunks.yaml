- fmt: "### Bean Scope\n\nYou add managed beans to an ADF application by defining\
    \ them as part of your bounded task flow. Whenever you add a bean, you also define\
    \ its scope. If you are familiar with JSF, you will recognize `Application`, `Session`,\
    \ `View`, and `Request` scopes, but ADF has more scopes. The following scopes\
    \ exist in an ADF application, in order from the longest-lived to the shortest-lived:\n\
    \n*   `Application`: Beans in application scope last until the application stops.\
    \ This means they persist across user sessions—the user can close his browser\
    \ and access the application days later and still find the same values in application\
    \ scope. They are not cleared until an application server administrator terminates\
    \ the application on the server (or it crashes). This can be used for application\
    \ configurations you want to store in memory.\n*   `Session`: Beans in session\
    \ scope are created when the user first accesses an application and last until\
    \ the user session ends—either because the user closes the browser or because\
    \ the session times out due to inactivity. Session scoped beans are dangerous\
    \ if the user should decide to run two instances of the application in the same\
    \ browser. Some browsers will consider two instances of the application on separate\
    \ browser tabs to be part of the same session, while other browsers will consider\
    \ them two separate sessions.\n*   `PageFlow`: Beans in page flow scope are created\
    \ when the user accesses the first page in a page flow and last until she leaves\
    \ the page flow. They are useful in bounded task flows to store values that need\
    \ to be accessible from all pages and other elements of the task flow. Page flow\
    \ scope beans created in the unbounded task flow containing the master page are\
    \ good places to store information you want to be available as long as the user\
    \ is running the application. They are safer than session scope beans because\
    \ they will always be separate for separate instances of the application, irrespective\
    \ of how the browser handles sessions.\n*   `View`: Beans in view scope exist\
    \ for the duration of a specific view (page or page fragment). Both JSF and ADF\
    \ define a view scope; in an ADF application, you always get the ADF view scope\
    \ when you refer to a bean.\n*   `Request`: Beans in request scope exist for the\
    \ duration of one request (i.e., one server roundtrip). A bean in this scope can\
    \ be accessed from all task flows on a page. This means that if a bounded task\
    \ flow exists in two instances on the same page, a request scope bean is shared\
    \ between them. This is normally not desirable, so you should prefer backing bean\
    \ scope for short-lived beans.\n*   `BackingBean`: Beans in backing bean scope\
    \ exist only for the duration of a request; this isolates separate instances of\
    \ the same bounded task flow on a page. Use this scope for pure logic without\
    \ state—code that needs to run in response to an event. As soon as the request\
    \ is processed and the response sent back to the browser, a backing bean scope\
    \ bean is terminated.\n\nWhen you start out with ADF, try to limit yourself to\
    \ `PageFlow` and `BackingBean` scopes : `PageFlow` for everything that needs to\
    \ be stored for longer periods, and `BackingBean` for pure logic without state.\
    \ This makes your code simpler and reduces the risk that one developer on your\
    \ team stores something in one scope and another developer expects to find it\
    \ in another.\n\n### Adding a Bean to the User Interface\n\nJDeveloper offers\
    \ you a couple of convenient shortcuts to add beans directly to the user interface\
    \ elements on a page.\n\n#### Adding a Bean to a Button\n\nIf you simply double-click\
    \ a button in the Design view of a page in `JDeveloper`, the **Bind Action Property**\
    \ dialog is shown. From this, you can either select an existing managed bean or\
    \ click **New** to open the **Create Managed Bean** dialog shown in Figure [5-4](#A437725_1_En_5_Chapter.html#Fig4).\n\
    \n![A437725_1_En_5_Fig4_HTML.jpg](A437725_1_En_5_Fig4_HTML.jpg)\n\nFigure 5-4.\
    \ The **Create Managed Bean** dialog\n\nIn this dialog, you enter a bean name\
    \ and a class name. The bean name is used when referring to the bean in expression\
    \ language expressions and the class name is the name of the corresponding Java\
    \ file. By convention, the bean name starts with a lowercase letter and the class\
    \ name starts with an uppercase letter. Beans related to a specific page (typically\
    \ `BackingBean` scope) should be named after that page, and beans related to a\
    \ whole task flow (often `PageFlow` scope) should be named after the flow.\n\n\
    You define the package your beans go into; by convention, beans go into a `.beans`\
    \ subpackage under the base package of your view/controller project. Finally,\
    \ you select a scope and leave the check box to create the class checked.\n\n\
    When you click **OK**, you are returned to the **Bind Action Property** dialog\
    \ shown in Figure [5-4](#A437725_1_En_5_Chapter.html#Fig4). `JDeveloper` will\
    \ have filled in the **Method** field with something it has made up. Don’t accept\
    \ this default; click in the field and type a useful method name before you click\
    \ **OK**. `JDeveloper` creates your class, which will look something like Listing\
    \ [5-2](#A437725_1_En_5_Chapter.html#Par41).\n\n```java\npackage com.vesterli.hrdemo.deptemp.view.beans;\n\
    public class EmpPage {\n    public EmpPage() {\n    }\n    public String giveRaise()\
    \ {\n        // Add event code here...\n        return null;\n    }\n}\n```\n\
    Listing 5-2. Backing Bean Example\n\nIf you look at the **Action** property for\
    \ the button you clicked, you will find that `JDeveloper` has automatically filled\
    \ it in with the correct value for the scope, class name, and method name you\
    \ selected: `#{backingBeanScope.empPage.giveRaise}`.\n\nIf you look at the task\
    \ flow your page or page fragment is part of, you can see on the **Managed Beans**\
    \ subtab on the **Overview** tab that the bean has been added, as shown in Figure\
    \ [5-5](#A437725_1_En_5_Chapter.html#Fig5).\n\n![A437725_1_En_5_Fig5_HTML.jpg](A437725_1_En_5_Fig5_HTML.jpg)\n\
    \nFigure 5-5. A managed bean added to a task flow\n\n#### Adding a Bean to a databound\
    \ Component\n\nYou can also add a bean by double-clicking a databound component\
    \ like an **Input Text**. The **Bind Validator Property** dialog appears and allows\
    \ you to create a new bean as shown in the preceding, or select an existing bean.\
    \ You must provide a method name for your data validation, and `JDeveloper` will\
    \ automatically place the method in your bean code and set the **Validator** property\
    \ on the item.\n\nFor all UI components bound to business component attributes,\
    \ it is normally better to place the validation on the business component. In\
    \ this way, you only need to define the validation once and have it applied everywhere.\
    \ If you decide to implement a custom validator in a bean, your bean code needs\
    \ to throw a `ValidatorException` to indicate to ADF that the validation failed.\
    \ One of the parameters to this exception is an instance of `FacesMessage` object\
    \ containing the severity and the message text. Listing [5-3](#A437725_1_En_5_Chapter.html#Par46)\
    \ shows an example of a validation method.\n\n```java\npackage com.vesterli.hrdemo.deptemp.view.beans;\n\
    import javax.faces.application.FacesMessage;\nimport javax.faces.component.UIComponent;\n\
    import javax.faces.context.FacesContext;\nimport javax.faces.validator.ValidatorException;\n\
    public class EmployeeBean {\n    public EmployeeBean() {\n    }\n    ...\n   \
    \ public void salaryValidator(FacesContext facesContext,\n        UIComponent\
    \ uIComponent, Object object)\n        throws ValidatorException {\n        if\
    \ (object != null) {\n            int sal = Integer.valueOf(object.toString());\n\
    \            if((sal % 10) != 0) {\n                throw new ValidatorException(\n\
    \                    new FacesMessage(FacesMessage.SEVERITY_WARN,\n          \
    \              \"Salary should be round number\", null));\n            }\n   \
    \     }\n    }\n}\n```\nListing 5-3. Validator Method in a Managed Bean"
  raw: '### Bean Scope


    You add managed beans to an ADF application by defining them as part of your bounded
    task flow. Whenever you add a bean, you also define its scope. If you are familiar
    with JSF, you will recognize Application, Session, View, and Request scopes, but
    ADF has more scopes. The following scopes exist in an ADF application, in order
    from the longest-lived to the shortest-lived:


    *   Application: Beans in application scope last until the application stops.
    This means they persist across user sessions—the user can close his browser and
    access the application days later and still find the same values in application
    scope. They are not cleared until an application server administrator terminates
    the application on the server (or it crashes). This can be used for application
    configurations you want to store in memory

    *   Session: Beans in session scope are created when the user first accesses an
    application and last until the user session ends—either because the user closes
    the browser or because the session times out due to inactivity. Session scoped
    beans are dangerous if the user should decide to run two instances of the application
    in the same browser. Some browsers will consider two instances of the application
    on separate browser tabs to be part of the same session, while other browsers
    will consider them two separate sessions.

    *   PageFlow: Beans in page flow scope are created when the user accesses the
    first page in a page flow and last until she leaves the page flow. They are useful
    in bounded task flows to store values that need to be accessible from all pages
    and other elements of the task flow. Page flow scope beans created in the unbounded
    task flow containing the master page are good places to store information you
    want to be available as long as the user is running the application. They are
    safer than session scope beans because they will always be separate for separate
    instances of the application, irrespective of how the browser handles sessions.

    *   View: Beans in view scope exist for the duration of a specific view (page
    or page fragment). Both JSF and ADF define a view scope; in an ADF application,
    you always get the ADF view scope when you refer to a bean.

    *   Request: Beans in request scope exist for the duration of one request (i.e.,
    one server roundtrip). A bean in this scope can be accessed from all task flows
    on a page. This means that if a bounded task flow exists in two instances on the
    same page, a request scope bean is shared between them. This is normally not desirable,
    so you should prefer backing bean scope for short-lived beans.

    *   BackingBean: Beans in backing bean scope exist only for the duration of a
    request; this isolates separate instances of the same bounded task flow on a page.
    Use this scope for pure logic without state—code that needs to run in response
    to an event. As soon as the request is processed and the response sent back to
    the browser, a backing bean scope bean is terminated.


    When you start out with ADF, try to limit yourself to PageFlow and BackingBean
    scopes : PageFlow for everything that needs to be stored for longer periods, and
    BackingBean for pure logic without state. This makes your code simpler and reduces
    the risk that one developer on your team stores something in one scope and another
    developer expects to find it in another.


    ### Adding a Bean to the User Interface


    JDeveloper offers you a couple of convenient shortcuts to add beans directly to
    the user interface elements on a page.


    #### Adding a Bean to a Button


    If you simply double-click a button in the Design view of a page in JDeveloper
    , the Bind Action Property dialog is shown. From this, you can either select an
    existing managed bean or click New to open the Create Managed Bean dialog shown
    in Figure [5-4](#A437725_1_En_5_Chapter.html#Fig4).


    ![A437725_1_En_5_Fig4_HTML.jpg](A437725_1_En_5_Fig4_HTML.jpg)


    Figure 5-4.


    The Create Managed Bean dialog


    In this dialog, you enter a bean name and a class name. The bean name is used
    when referring to the bean in expression language expressions and the class name
    is the name of the corresponding Java file. By convention, the bean name starts
    with a lowercase letter and the class name starts with an uppercase letter. Beans
    related to a specific page (typically BackingBean scope) should be named after
    that page, and beans related to a whole task flow (often PageFlow scope) should
    be named after the flow.


    You define the package your beans go into; by convention, beans go into a `.beans`
    subpackage under the base package of your view/controller project. Finally, you
    select a scope and leave the check box to create the class checked.


    When you click OK, you are returned to the Bind Action Property dialog shown in
    Figure [5-4](#A437725_1_En_5_Chapter.html#Fig4). JDeveloper will have filled in
    the Method field with something it has made up. Don’t accept this default; click
    in the field and type a useful method name before you click OK. JDeveloper creates
    your class, which will look something like Listing [5-2](#A437725_1_En_5_Chapter.html#Par41).


    ```

    package com.vesterli.hrdemo.deptemp.view.beans;

    public class EmpPage {

    public EmpPage() {

    }

    public String giveRaise() {

    // Add event code here...

    return null;

    }

    }

    Listing 5-2.

    Backing Bean Example

    ```


    If you look at the Action property for the button you clicked, you will find that
    JDeveloper has automatically filled it in with the correct value for the scope,
    class name, and method name you selected: `#{backingBeanScope.empPage.giveRaise}`.


    If you look at the task flow your page or page fragment is part of, you can see
    on the Managed Beans subtab on the Overview tab that the bean has been added,
    as shown in Figure [5-5](#A437725_1_En_5_Chapter.html#Fig5).


    ![A437725_1_En_5_Fig5_HTML.jpg](A437725_1_En_5_Fig5_HTML.jpg)


    Figure 5-5.


    A managed bean added to a task flow


    #### Adding a Bean to a databound Component


    You can also add a bean by double-clicking a databound component like an Input
    Text. The Bind Validator Property dialog appears and allows you to create a new
    bean as shown in the preceding, or select an existing bean. You must provide a
    method name for your data validation, and JDeveloper will automatically place
    the method in your bean code and set the Validator property on the item.


    For all UI components bound to business component attributes, it is normally better
    to place the validation on the business component. In this way, you only need
    to define the validation once and have it applied everywhere. If you decide to
    implement a custom validator in a bean, your bean code needs to throw a `ValidatorException`
    to indicate to ADF that the validation failed. One of the parameters to this exception
    is an instance of `FacesMessage` object containing the severity and the message
    text. Listing [5-3](#A437725_1_En_5_Chapter.html#Par46) shows an example of a
    validation method.


    ```

    package com.vesterli.hrdemo.deptemp.view.beans;

    import javax.faces.application.FacesMessage;

    import javax.faces.component.UIComponent;

    import javax.faces.context.FacesContext;

    import javax.faces.validator.ValidatorException;

    public class EmployeeBean {

    public EmployeeBean() {

    }

    ...

    public void salaryValidator(FacesContext facesContext,

    UIComponent uIComponent, Object object)

    throws ValidatorException {

    if (object != null) {

    int sal = Integer.valueOf(object.toString());

    if((sal % 10) != 0) {

    throw new ValidatorException(

    new FacesMessage(FacesMessage.SEVERITY_WARN,

    "Salary should be round number", null));

    }

    }

    }

    }

    Listing 5-3.

    Validator Method in a Managed Bean

    ```'
  trans: "\n### Bean 作用域\n\n通过将托管 Bean 定义为有界任务流的一部分，您可以将它们添加到 ADF 应用程序中。每当您添加一个 Bean\
    \ 时，也需要定义其作用域。如果您熟悉 JSF，那么会对 `Application`、`Session`、`View` 和 `Request` 作用域有所了解，但\
    \ ADF 拥有更多作用域。ADF 应用程序中存在以下作用域，按其生命周期从长到短排列：\n\n*   `Application`：应用作用域中的 Bean\
    \ 会一直存在，直到应用程序停止。这意味着它们会持续存在于用户会话之间——用户可以关闭浏览器，几天后再次访问应用程序，仍然能在应用作用域中找到相同的值。直到应用服务器管理员在服务器上终止应用程序（或应用程序崩溃），它们才会被清除。这可用于存储您希望保存在内存中的应用程序配置。\n\
    *   `Session`：会话作用域中的 Bean 在用户首次访问应用程序时创建，并持续到用户会话结束——无论是用户关闭浏览器，还是会话因不活动而超时。如果用户决定在同一浏览器中运行两个应用程序实例，会话作用域的\
    \ Bean 是危险的。某些浏览器会将同一浏览器不同标签页中的两个应用程序实例视为同一会话的一部分，而其他浏览器则会将它们视为两个独立的会话。\n*   `PageFlow`：页面流作用域中的\
    \ Bean 在用户访问页面流中的第一个页面时创建，并持续到她离开该页面流为止。它们在有界任务流中非常有用，用于存储需要从所有页面和任务流的其他元素访问的值。在包含主页面的无界任务流中创建的页面流作用域\
    \ Bean，是存储您希望在用户运行应用程序期间始终可用的信息的理想位置。它们比会话作用域 Bean 更安全，因为它们总是会为应用程序的独立实例而分离，无论浏览器如何处理会话。\n\
    *   `View`：视图作用域中的 Bean 在特定视图（页面或页面片段）的持续期间存在。JSF 和 ADF 都定义了视图作用域；在 ADF 应用程序中，当您引用\
    \ Bean 时，总是获得 ADF 视图作用域。\n*   `Request`：请求作用域中的 Bean 在一个请求（即一次服务器往返）的持续期间存在。此作用域中的\
    \ Bean 可以从页面上的所有任务流访问。这意味着，如果同一个页面上存在两个有界任务流实例，则它们会共享一个请求作用域 Bean。这通常不是期望的行为，因此对于短暂存在的\
    \ Bean，您应优先选择后备 Bean 作用域。\n*   `BackingBean`：后备 Bean 作用域中的 Bean 仅在请求的持续期间存在；这隔离了页面上同一有界任务流的独立实例。将此作用域用于无状态的纯逻辑——即需要响应事件而运行的代码。一旦请求被处理且响应发送回浏览器，后备\
    \ Bean 作用域的 Bean 就会被终止。\n\n当您刚开始使用 ADF 时，请尽量限制自己使用 `PageFlow` 和 `BackingBean`\
    \ 作用域：`PageFlow` 用于所有需要长时间存储的内容，而 `BackingBean` 用于无状态的纯逻辑。这使您的代码更简单，并降低了团队中一名开发人员将某些内容存储在一个作用域，而另一名开发人员却期望在另一个作用域中找到它的风险。\n\
    \n### 向用户界面添加 Bean\n\nJDeveloper 提供了一些便捷的快捷方式，可直接将 Bean 添加到页面上的用户界面元素。\n\n####\
    \ 向按钮添加 Bean\n\n如果您在 `JDeveloper` 的页面设计视图中双击一个按钮，将显示 **绑定操作属性** 对话框。从这里，您可以选择现有的托管\
    \ Bean，或单击 **新建** 以打开如图 5-4 所示的 **创建托管 Bean** 对话框。\n\n![A437725_1_En_5_Fig4_HTML.jpg](img/A437725_1_En_5_Fig4_HTML.jpg)\n\
    \n图 5-4. **创建托管 Bean** 对话框\n\n在此对话框中，您输入 Bean 名称和类名。Bean 名称在表达式语言表达式中引用 Bean 时使用，类名是相应\
    \ Java 文件的名称。按照约定，Bean 名称以小写字母开头，类名以大写字母开头。与特定页面相关的 Bean（通常是 `BackingBean` 作用域）应以该页面命名，而与整个任务流相关的\
    \ Bean（通常是 `PageFlow` 作用域）应以该流命名。\n\n您定义 Bean 所属的包；按照约定，Bean 应放在视图/控制器项目基础包下的\
    \ `.beans` 子包中。最后，选择一个作用域，并保持选中创建类的复选框。\n\n当您单击 **确定** 时，将返回到图 5-4 所示的 **绑定操作属性**\
    \ 对话框。`JDeveloper` 会自动在 **方法** 字段中填入一些它生成的内容。不要接受此默认值；点击该字段并输入一个有用的方法名，然后再单击 **确定**。`JDeveloper`\
    \ 将创建您的类，其外观将类似于清单 5-2。\n\n```java\npackage com.vesterli.hrdemo.deptemp.view.beans;\n\
    public class EmpPage {\n    public EmpPage() {\n    }\n    public String giveRaise()\
    \ {\n        // 在此添加事件代码...\n        return null;\n    }\n}\n```\n清单 5-2. 后备 Bean\
    \ 示例\n\n如果您查看所点击按钮的 **操作** 属性，会发现 `JDeveloper` 已根据您选择的作用域、类名和方法名自动填入了正确的值：`#{backingBeanScope.empPage.giveRaise}`。\n\
    \n如果您查看您的页面或页面片段所属的任务流，可以在 **概览** 选项卡的 **托管 Bean** 子选项卡上看到该 Bean 已被添加，如图 5-5 所示。\n\
    \n![A437725_1_En_5_Fig5_HTML.jpg](img/A437725_1_En_5_Fig5_HTML.jpg)\n\n图 5-5.\
    \ 已添加到任务流的托管 Bean\n\n#### 向数据绑定组件添加 Bean\n\n您也可以通过双击数据绑定组件（如 **输入文本**）来添加 Bean。此时会出现\
    \ **绑定验证器属性** 对话框，允许您创建一个新的 Bean（如前所述），或选择一个现有的 Bean。您必须为数据验证提供一个方法名，`JDeveloper`\
    \ 会自动将该方法放入您的 Bean 代码中，并在该项上设置 **验证器** 属性。\n\n对于所有绑定到业务组件属性的 UI 组件，通常最好将验证放在业务组件上。这样，您只需定义一次验证，即可应用于所有地方。如果您决定在\
    \ Bean 中实现自定义验证器，您的 Bean 代码需要抛出 `ValidatorException` 以向 ADF 指示验证失败。此异常的一个参数是包含严重性和消息文本的\
    \ `FacesMessage` 对象实例。清单 5-3 展示了一个验证方法的示例。\n\n```java\npackage com.vesterli.hrdemo.deptemp.view.beans;\n\
    import javax.faces.application.FacesMessage;\nimport javax.faces.component.UIComponent;\n\
    import javax.faces.context.FacesContext;\nimport javax.faces.validator.ValidatorException;\n\
    public class EmployeeBean {\n    public EmployeeBean() {\n    }\n    ...\n   \
    \ public void salaryValidator(FacesContext facesContext,\n        UIComponent\
    \ uIComponent, Object object)\n        throws ValidatorException {\n        if\
    \ (object != null) {\n            int sal = Integer.valueOf(object.toString());\n\
    \            if((sal % 10) != 0) {\n                throw new ValidatorException(\n\
    \                    new FacesMessage(FacesMessage.SEVERITY_WARN,\n          \
    \              \"薪资应为整数\", null));\n            }\n        }\n    }\n}\n```\n\
    清单 5-3. 托管 Bean 中的验证器方法\n"
- fmt: "## 向任务流添加 Bean\n\n虽然能够直接向按钮添加 Bean 和方法很有用，但在大多数情况下，你需要对这个过程有更多的控制权。向任务流添加\
    \ Bean 的常规做法是：先创建类，然后将其添加到相关的任务流中。\n\n你像创建任何其他 Java 类一样创建这个类。然后，在你想使用它的任务流中打开，选择“概览”选项卡，再选择右侧的“托管\
    \ Bean”子选项卡。点击绿色加号，提供一个 Bean 名称，指向该类并选择一个作用域。添加 Bean 后，其外观如图 [5-5](#A437725_1_En_5_Chapter.html#Fig5)\
    \ 所示。\n\n## 与 UI 组件交互\n\n如果你的 Bean 代码需要与页面上的 UI 组件交互，则需要在 Bean 代码中创建一个组件引用，并将其连接到页面上的\
    \ UI 组件。例如，你可能想添加一个用于建议加薪的新字段，以及一个调用 Java 逻辑来读取现有工资并建议加薪的按钮，如图 [5-6](#A437725_1_En_5_Chapter.html#Fig6)\
    \ 所示。\n\n![A437725_1_En_5_Fig6_HTML.jpg](A437725_1_En_5_Fig6_HTML.jpg)\n\n图 5-6.\n\
    与 Bean 逻辑交互的屏幕示例\n\n### 创建组件引用\n\n在 Bean 中，你创建一个属性，该属性是 `ComponentReference` 的一个实例，并创建使用与\
    \ UI 组件对应的类的 setter 和 getter 方法。UI 组件类的名称通常是“Rich”后跟组件名称——例如，`RichInputText` 对应于输入文本元素。所有这些类都可以在\
    \ `oracle.adf.view.rich.component` 的子包中找到。\n\n提示\n完整的 ADF RichClient API 文档可以在\
    \ [`http://jdevadf.oracle.com/adf-richclient-demo/docs/apidocs/index.html`](http://jdevadf.oracle.com/adf-richclient-demo/docs/apidocs/index.html)\
    \ 找到。\n\n清单 [5-4](#A437725_1_En_5_Chapter.html#Par53) 中的代码展示了两个组件引用的实现：一个用于包含现有工资值（例如，来自业务组件）的输入文本元素，另一个用于将包含计算出的加薪额的另一个输入文本元素。`SuggestRaise()`\
    \ 方法计算当前工资的 5%，并将该值放入建议加薪字段。\n\n```\npackage com.vesterli.hrdemo.deptemp.view.beans;\n\
    import org.apache.myfaces.trinidad.util.ComponentReference;\n...\npublic class\
    \ EmpPage {\nprivate ComponentReference salary;\nprivate ComponentReference raise;\n\
    public void setSalary(RichInputText salary) {\nthis.salary = ComponentReference.newUIComponentReference(salary);\n\
    }\npublic RichInputText getSalary() {\nif (salary != null) {\nreturn (RichInputText)salary.getComponent();\n\
    } else {\nreturn null;\n}\n}\npublic void setRaise(RichInputText raise) {\nthis.raise\
    \ = ComponentReference.newUIComponentReference(raise);\n}\npublic RichInputText\
    \ getRaise() {\nif (raise != null) {\nreturn (RichInputText)raise.getComponent();\n\
    } else {\nreturn null;\n}\n}\npublic String suggestRaise() {\nBigDecimal orgSal\
    \ = (BigDecimal)getSalary().getValue();\nBigDecimal suggestedRaise = orgSal.multiply(new\
    \ BigDecimal(0.05));\nsuggestedRaise = suggestedRaise.setScale(0, BigDecimal.ROUND_DOWN);\n\
    getRaise().setValue(suggestedRaise);\nAdfFacesContext.getCurrentInstance().addPartialTarget(getRaise());\n\
    return null;\n}\n...\n}\n```\n清单 5-4.\n操作 UI 组件值的 Bean 示例\n\n注意，`SuggestRaise()`\
    \ 中的 `getValue()` 返回一个通用的 `Object`。因为我们是从绑定到数字字段的 `salary` 中检索数据，所以该对象可以被强制转换为\
    \ `BigDecimal`。然后我们创建另一个 `BigDecimal`，进行一些计算和舍入，最后获取 `raise` 组件并设置其值。\n\n每次属性更改时都让\
    \ ADF 自动刷新页面将是浪费的。因此，我们必须明确请求组件刷新，我们通过将其推入使用 `addPartialTarget()` 待重绘的对象列表来实现。\n\
    \n你只需要对未绑定到数据源的 UI 组件调用 `setValue()`。如果你想更改已绑定到业务组件属性的组件的值，你应该直接更改绑定属性的值，如本章后面的“与业务组件交互”部分所述。\n\
    \n### 将 Bean 连接到 UI 组件\n\n要将 Bean 中的组件引用连接到 UI 组件，组件的 `Binding` 属性必须设置为指向 Bean\
    \ 属性。要设置此属性，你可以单击属性右侧的齿轮图标并选择“编辑”，以调出图 [5-7](#A437725_1_En_5_Chapter.html#Fig7)\
    \ 所示的“编辑属性：绑定”对话框。\n\n![A437725_1_En_5_Fig7_HTML.jpg](A437725_1_En_5_Fig7_HTML.jpg)\n\
    \n图 5-7.\n“编辑属性绑定”对话框\n\n当你选择一个托管 Bean 时，“属性”下拉列表将只显示 Bean 中类型正确的属性。在此示例中，你需要为工资和建议加薪字段都设置\
    \ `Binding` 属性。要使按钮调用 `suggestRaise()`，你必须如前所述设置按钮的 `Action` 属性。\n\n注意\n你也可以创建或选择一个\
    \ Bean，然后单击“属性”旁边的“新建”来创建一个新属性。如果你这样做，你将需要稍微修改代码以包含一个 `ComponentReference`，如清单\
    \ [5-4](#A437725_1_En_5_Chapter.html#Par53) 所示。\n\n## 与业务组件交互\n\n当你想从用户界面层使用业务组件时，你需要通过绑定层。不要尝试直接访问数据库数据，因为应用程序的其余部分确实使用了绑定层。如果你的应用程序的一部分试图绕过绑定层，你将会遇到神秘且难以发现的错误。\n\
    \n### 绑定层\n\n要查看页面上可用的绑定，请选择页面窗口底部的“绑定”选项卡。你将看到一个绑定的图形化表示，如图 [5-8](#A437725_1_En_5_Chapter.html#Fig8)\
    \ 所示。\n\n![A437725_1_En_5_Fig8_HTML.jpg](A437725_1_En_5_Fig8_HTML.jpg)\n\n图 5-8.\n\
    属性值绑定和操作绑定\n\n当你将某些内容从“数据控件”窗格拖放到页面或页面片段上时，ADF 会自动为你创建绑定：\n* 当你拖放单个属性时，你会得到一个\
    \ `attributeValues` 绑定和一个单属性组件（如输入文本）。图 [5-8](#A437725_1_En_5_Chapter.html#Fig8)\
    \ 上的 `FirstName` 绑定是一个 `attributeValue` 绑定。\n* 当你拖放一个操作时，你会得到一个 `action` 绑定和一个操作组件（如按钮）。图\
    \ [5-8](#A437725_1_En_5_Chapter.html#Fig8) 上的 `Previous` 绑定是一个 `action` 绑定。\n\
    * 当你拖放整个视图对象实例时，你会得到一个树绑定和一个多属性组件（如表）。图 [5-9](#A437725_1_En_5_Chapter.html#Fig9)\
    \ 展示了一个树绑定。\n\n    ![A437725_1_En_5_Fig9_HTML.jpg](A437725_1_En_5_Fig9_HTML.jpg)\n\
    \n    图 5-9.\n    树绑定\n\n如果你想访问尚未拖放到页面上的属性，你必须手动单击“绑定”选项卡上的绿色加号来创建属性绑定。\n\n提示\n\
    如果你想让 JDeveloper 帮助你，也可以尝试将元素拖放到页面上，然后在页面的源视图中删除匹配的 UI 组件。如果你从“设计”选项卡或“结构”窗口中删除组件，JDeveloper\
    \ 会自动清理并删除相应的绑定。但如果你在“源”选项卡上删除组件，JDeveloper 会保留绑定不变。"
  raw: "### Adding a Bean to a Task Flow\n\nWhile the ability to add a bean and method\
    \ directly to a button is useful, in most cases you need more control over the\
    \ process. The normal way of adding a bean to a task flow is to first create the\
    \ class and then add it to the relevant task flow.\n\nYou create the class like\
    \ any other Java class. Then open the task flow where you want to use it and select\
    \ the Overview tab and then the Managed Beans subtab to the right. Click the green\
    \ plus sign, provide a bean name, point to the class and select a scope. When\
    \ your bean is added, it looks as shown in Figure [5-5](#A437725_1_En_5_Chapter.html#Fig5).\n\
    \n## Interacting with UI Components\n\nIf your bean code needs to interact with\
    \ UI components on the page, you need to create a component reference in the bean\
    \ code and connect it to the UI components on the page. For example, you might\
    \ want to add a new field for a suggested raise, and a button calling Java logic\
    \ to read the existing salary and suggest a raise, as shown in Figure [5-6](#A437725_1_En_5_Chapter.html#Fig6).\n\
    \n![A437725_1_En_5_Fig6_HTML.jpg](A437725_1_En_5_Fig6_HTML.jpg)\n\nFigure 5-6.\n\
    \nExample of screen interacting with bean logic\n\n### Creating a Component Reference\n\
    \nIn the bean, you create a property that is an instance of `ComponentReference`,\
    \ and setter and getter methods that use the class corresponding to the UI component.\
    \ The name of the UI component class is generally “Rich” followed by the component\
    \ name—for example, the `RichInputText` corresponds to an Input Text element.\
    \ All of these classes are fund in subpackages under `oracle.adf.view.rich.component`.\n\
    \nTip\n\nThe full ADF RichClient API documentation can be found at [`http://jdevadf.oracle.com/adf-richclient-demo/docs/apidocs/index.html`](http://jdevadf.oracle.com/adf-richclient-demo/docs/apidocs/index.html)\
    \ .\n\nThe code in Listing [5-4](#A437725_1_En_5_Chapter.html#Par53) shows an\
    \ implementation of two component references: one for the input text element containing\
    \ the existing salary value (e.g., from a business component) and one for another\
    \ input text element that will contain the calculated raise. The `SuggestRaise()`\
    \ method calculates 5% of the current salary and places that value into the suggested\
    \ raise field.\n\n```\npackage com.vesterli.hrdemo.deptemp.view.beans;\nimport\
    \ org.apache.myfaces.trinidad.util.ComponentReference;\n...\npublic class EmpPage\
    \ {\nprivate ComponentReference salary;\nprivate ComponentReference raise;\npublic\
    \ void setSalary(RichInputText salary) {\nthis.salary = ComponentReference.newUIComponentReference(salary);\n\
    }\npublic RichInputText getSalary() {\nif (salary != null) {\nreturn (RichInputText)salary.getComponent();\n\
    } else {\nreturn null;\n}\n}\npublic void setRaise(RichInputText raise) {\nthis.raise\
    \ = ComponentReference.newUIComponentReference(raise);\n}\npublic RichInputText\
    \ getRaise() {\nif (raise != null) {\nreturn (RichInputText)raise.getComponent();\n\
    } else {\nreturn null;\n}\n}\npublic String suggestRaise() {\nBigDecimal orgSal\
    \ = (BigDecimal)getSalary().getValue();\nBigDecimal suggestedRaise = orgSal.multiply(new\
    \ BigDecimal(0.05));\nsuggestedRaise = suggestedRaise.setScale(0, BigDecimal.ROUND_DOWN);\n\
    getRaise().setValue(suggestedRaise);\nAdfFacesContext.getCurrentInstance().addPartialTarget(getRaise());\n\
    return null;\n}\n...\n}\nListing 5-4.\nExample of a Bean Manipulating UI Component\
    \ Values\n```\n\nNote that `getValue()` in `SuggestRaise()` returns a generic\
    \ `Object`. Because we are retrieving from `salary`, which is bound to a numeric\
    \ field, that object can be cast to a `BigDecimal`. We then create another `BigDecimal`,\
    \ do some calculations and rounding, and finally get the `raise` components and\
    \ set its value.\n\nIt would be wasteful for ADF to automatically refresh the\
    \ page every time an attribute changes. We must therefore explicitly ask for a\
    \ component refresh, which we do by pushing it onto the list of objects to be\
    \ redrawn with `addPartialTarget()`.\n\nYou would only need to call `setValue()`\
    \ on UI components that are not bound to a data source. If you want to change\
    \ a value of a component that has a binding to a business component attribute,\
    \ you should change the value of the bound attribute directly, as described in\
    \ the section “Interacting with Business Components” later in this chapter.\n\n\
    ### Connecting the Bean to the UI Components\n\nTo connect the component references\
    \ in the bean to the UI components, the Binding property of the components must\
    \ be set to point to the bean attribute. To set the property, you can click the\
    \ gearwheel icon to the right of the property and choose Edit to bring up the\
    \ Edit Property: Binding dialog shown in Figure [5-7](#A437725_1_En_5_Chapter.html#Fig7).\n\
    \n![A437725_1_En_5_Fig7_HTML.jpg](A437725_1_En_5_Fig7_HTML.jpg)\n\nFigure 5-7.\n\
    \nThe Edit Property Binding dialog\n\nWhen you select a managed bean, the Property\
    \ drop-down will only display the attributes in the bean of the right type. In\
    \ this example, you would need to set the Binding property for both the salary\
    \ and suggested raise fields. To make the button call `suggestRaise()`, you’d\
    \ have to set the Action property of the button as described previously.\n\nNote\n\
    \nYou can also create or select a bean and then click New next to Property to\
    \ create a new property. If you do so, you will have to change the code slightly\
    \ to include a `ComponentReference`, as shown in Listing [5-4](#A437725_1_En_5_Chapter.html#Par53).\n\
    \n## Interacting with Business Components\n\nWhen you want to work with business\
    \ components from the user interface layer, you go through the binding layer.\
    \ Don’t try to access database data directly, because the rest of your application\
    \ does use the binding layer. If one part of your application tries to circumvent\
    \ the binding layer, you will get mysterious and hard-to-find bugs.\n\n### The\
    \ Binding Layer\n\nTo see the available bindings on a page, you select the Bindings\
    \ tab at the bottom of the page window. You will see a graphical representation\
    \ of your bindings, as shown in Figure [5-8](#A437725_1_En_5_Chapter.html#Fig8).\n\
    \n![A437725_1_En_5_Fig8_HTML.jpg](A437725_1_En_5_Fig8_HTML.jpg)\n\nFigure 5-8.\n\
    \nAttribute value and action bindings\n\nADF automatically creates bindings for\
    \ you when you drop something from the Data Controls pane onto a page or page\
    \ fragment:\n\n*   When you drop an individual attribute, you get an attributeValues\
    \ binding and a single-attribute component like an Input Text. The `FirstName`\
    \ binding on Figure [5-8](#A437725_1_En_5_Chapter.html#Fig8) is an attributeValue\
    \ binding.\n*   When you drop an operation, you get an action binding and an action\
    \ component like a Button. The `Previous` binding on Figure [5-8](#A437725_1_En_5_Chapter.html#Fig8)\
    \ is an action binding.\n*   When you drop a whole view object instance, you get\
    \ a tree binding and a multiattribute component like a Table. Figure [5-9](#A437725_1_En_5_Chapter.html#Fig9)\
    \ shows a tree binding.\n\n    ![A437725_1_En_5_Fig9_HTML.jpg](A437725_1_En_5_Fig9_HTML.jpg)\n\
    \n    Figure 5-9.\n\n    Tree binding\n\nIf you want to access an attribute that\
    \ you haven’t dropped onto a page, you must create an attribute binding by hand\
    \ by clicking the green plus sign on the Bindings tab.\n\nTip\n\nIf you want JDeveloper\
    \ to help you, you can also try dropping an element on the page and then deleting\
    \ the matching UI component in the source view of the page. If you delete the\
    \ component from the Design tab or the Structure window, JDeveloper automatically\
    \ cleans up and removes the corresponding binding. But if you delete a component\
    \ on the Source tab, JDeveloper leaves the binding intact."
