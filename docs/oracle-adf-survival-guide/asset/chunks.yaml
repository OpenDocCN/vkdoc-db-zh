    all files move to the Outgoing tab in the Pending Changes window, as shown in
    Figure [7-6](#A437725_1_En_7_Chapter.html#Fig6).


    ![A437725_1_En_7_Fig6_HTML.jpg](A437725_1_En_7_Fig6_HTML.jpg)


    Figure 7-6.


    Files added and ready to be committed to Git


    #### Committing All Files


    To commit all files to your local Git repository , choose Team ➤ Git ➤ Commit
    All from the JDeveloper main menu or Versioning ➤ Commit All from the context
    menu in the Applications window. The Commit All dialog appears as shown in Figure
    [7-7](#A437725_1_En_7_Chapter.html#Fig7).


    ![A437725_1_En_7_Fig7_HTML.jpg](A437725_1_En_7_Fig7_HTML.jpg)


    Figure 7-7.


    The Commit All dialog


    Make sure you check the Commit non-staged files check box. Git actually works
    with a separate staging area, and files can be Staged or Not Staged (you can see
    this in the Status column in the Pending Changes window ). Advanced Git users
    can use this feature to commit only some of the changed files by controlling whether
    they are staged or not. For everyday Git use, simply check the check box and commit
    all files whether staged or not.'
  trans: '

    ### 对整个应用程序进行初始版本控制


    本节介绍如何使用 Git 对应用程序进行版本控制。由于 Git 是一个分布式版本控制系统，您通常先将更改提交到您的私有本地仓库，然后将更改推送到中央仓库。因为
    Git 已经与 JDeveloper 集成，所以您无需单独下载和安装它。


    **提示**

    如果您正在使用任何 Oracle 云服务（例如 Java Cloud Service），则 Oracle Developer Cloud Service (DCS)
    已包含在内，您无需额外付费即可使用。此服务包含一个中央 Git 仓库和许多其他工具。如果您计划使用 DCS，请参阅本章后面关于 DCS 的具体章节。


    如前所述，您的技术主管或架构师应在开发开始前构建所有必要的工作区。他还应将所有文件置于版本控制之下。此过程涉及四个步骤：


    1.  将您的 ADF 根目录初始化为本地 Git 仓库

    2.  将所有项目文件添加到此本地仓库

    3.  将所有项目文件提交到本地仓库

    4.  将本地仓库推送到所有开发者均可访问的中央 Git 仓库


    **注意**

    如果您使用 `Team ➤ Version Application`（团队 ➤ 版本化应用程序），则会运行 `Import to Git wizard`（导入
    Git 向导），并将单个应用程序工作区版本化到一个 Git 仓库中。但是，initialize-add-commit（初始化-添加-提交）方法会将一个目录中的所有工作区版本化到同一个
    Git 仓库中，因此这是推荐的方法。


    #### 初始化本地 Git 仓库


    首先，将所有 ADF 工作区及 ADF 库目录所在的目录初始化为 Git 仓库。Git 仓库只是一个带有一些 Git 可识别的额外文件的目录。在本章中，我们将此目录称为
    `$ADF_ROOT`。


    为此，请选择 `Team ➤ Git ➤ Initialize`（团队 ➤ Git ➤ 初始化）。仅当您在 JDeveloper 中打开着一个未版本化的应用程序工作区时，此菜单项才处于活动状态。在“初始化仓库”对话框中，提供所有
    ADF 工作区及 ADF 库目录的根目录名称，如图 7-3 所示。


    ![A437725_1_En_7_Fig3_HTML.jpg](img/A437725_1_En_7_Fig3_HTML.jpg)


    图 7-3. 初始化 Git 仓库


    这会添加一个隐藏的 `.git` 子目录，从而将您指定的目录转变为一个 Git 仓库。


    #### 添加所有文件


    完成此步骤后，您会在 JDeveloper 的“Applications”（应用程序）窗口中看到，所有文件夹和文件图标的左下角都添加了一个小标记，如图 7-4
    所示。如果将鼠标光标指向某个文件或文件夹，弹出的小提示框会显示 `Git: Unversioned`（Git：未版本化）。


    ![A437725_1_En_7_Fig4_HTML.jpg](img/A437725_1_En_7_Fig4_HTML.jpg)


    图 7-4. 未版本化的应用程序工作区


    工作区中的所有文件也会出现在“Pending Changes window”（待定更改窗口）的“Candidates tab”（候选选项卡）上。如果此窗口未作为新标签页在屏幕底部的“Log
    window”（日志窗口）旁边自动打开，您可以通过选择 `Team ➤ Git ➤ Pending Changes`（团队 ➤ Git ➤ 待定更改）来打开它。


    要添加所有文件，请选择 `Team ➤ Git ➤ Add all`（团队 ➤ Git ➤ 全部添加）。将出现“Add All”（全部添加）窗口，其大小可调整，如图
    7-5 所示。


    ![A437725_1_En_7_Fig5_HTML.jpg](img/A437725_1_En_7_Fig5_HTML.jpg)


    图 7-5. “添加全部”对话框（已展开）


    请注意，“Add All”（全部添加）对话框包含 `$ADF_ROOT` 下所有工作区的所有文件。因为您将 `$ADF_ROOT` 目录初始化为一个 Git
    仓库，“Add All”（全部添加）操作会作用于该目录及其子目录中的所有文件。


    “Applications”（应用程序）窗口中图标上的标记变为加号，所有文件移动到“Pending Changes window”（待定更改窗口）的“Outgoing”（传出）选项卡，如图
    7-6 所示。


    ![A437725_1_En_7_Fig6_HTML.jpg](img/A437725_1_En_7_Fig6_HTML.jpg)


    图 7-6. 文件已添加并准备提交到 Git


    #### 提交所有文件


    要将所有文件提交到您的本地 Git 仓库，请从 JDeveloper 主菜单中选择 `Team ➤ Git ➤ Commit All`（团队 ➤ Git ➤
    全部提交），或从“Applications window”（应用程序窗口）的上下文菜单中选择 `Versioning ➤ Commit All`（版本控制
    ➤ 全部提交）。将出现“Commit All”（全部提交）对话框，如图 7-7 所示。


    ![A437725_1_En_7_Fig7_HTML.jpg](img/A437725_1_En_7_Fig7_HTML.jpg)


    图 7-7. “全部提交”对话框


    请确保勾选 `Commit non-staged files`（提交未暂存的文件）复选框。Git 实际上使用一个单独的暂存区，文件可以是 `Staged`（已暂存）或
    `Not Staged`（未暂存）（您可以在“Pending Changes window”（待定更改窗口）的“Status column”（状态列）中看到这一点）。高级
    Git 用户可以通过控制文件是否已暂存来仅提交部分已更改的文件。对于日常 Git 使用，只需勾选该复选框并提交所有文件，无论其是否已暂存。

    '
- fmt: '### Working with a Central Repository


    When you commit files from JDeveloper, the change is stored in your local Git
    repository (the `$ADF_ROOT` catalog you initialized earlier). The fact that you
    work against the local repository makes commits very fast, and there is no risk
    that code you commit will break anybody else’s code.


    Of course, files stored in your local repository are only one hard disk crash
    away from oblivion, so you want to push your changes to a common repository for
    safekeeping and to allow others to use the latest code when they want. For this,
    you need a central repository for your team.


    If you are using the Oracle Cloud, you have access to Oracle Developer Cloud Service
    at no cost, and that includes a central Git repository. If not, you will need
    to either set up a central Git instance for your team or use a hosted solution
    like GitHub ([`www.github.com`](http://www.github.com)).


    #### Pushing to a Central Git Instance


    To push your application to GitHub, you create a GitHub account, log on, and create
    empty repositories for each workspace (foundation, subsystems, master). Do not
    initialize them with a README file—they will be filled from JDeveloper. When you
    have your repositories ready, you choose `Versioning ➤ Push` from the context
    menu in the Applications window or `Team ➤ Git ➤ Push` from the JDeveloper main
    menu. The Push to Git wizard helps you get each application workspace into the
    remote repository.


    The process is similar if you are running your own central Git instance in your
    organization.


    Pushing all the application workspaces to the central Git instance is part of
    the initial versioning of the application and should be done by the lead developer
    or architect as soon as all files have been committed to the local repository.


    #### Cloning Workspaces from the Central Git Instance


    Once the lead developer or application architect has pushed the workspaces to
    a shared location, each developer can get his own copy from the server. In Git
    terminology, the developer clones the repository. To start the Clone from Git
    wizard, choose `Team ➤ Git ➤ Clone`.


    Enter a remote name (by convention `origin`) and provide the URL to your repository.
    In step 4, provide the local directory where the local Git repository directory
    should be placed (your `$ADF_ROOT`). Because the cloning process will automatically
    create a directory with the same name as your Git repository, you should select
    the directory you want to be the parent of your `$ADF_ROOT`. For example, if your
    Git repository is called `hrdemo`, and you choose `C:\JDeveloper` as local directory,
    your Git repository directory becomes in `C:\JDeveloper\hrdemo`.


    After downloading everything, JDeveloper will show you the ADF applications it
    found in the repository, and you can choose which applications you want to open
    in JDeveloper.


    #### Getting Changes from the Central Git Instance


    To download changes that other developers have pushed to the central repository
    server and merge them into your code, you use `Team ➤ Git ➤ Pull` from the JDeveloper
    menu. The Pull from Git wizard helps you download the changes. If you have merge
    conflicts that JDeveloper cannot resolve automatically, they will show up in the
    Pending Changes window, where you can choose `Resolve Conflict` from the right-click
    menu on each conflict to resolve it.


    ### Git File Life Cycle


    A file can have several different states in Git, as shown in Figure [7-8](#A437725_1_En_7_Chapter.html#Fig8).


    ![A437725_1_En_7_Fig8_HTML.jpg](A437725_1_En_7_Fig8_HTML.jpg)


    Figure 7-8. Git file status life cycle


    When you clone the central repository to your local development workstation, all
    files will be committed to the local repository and have status `No Change`.


    When you add a new file, it is `Unversioned`. It will also show up in the Pending
    Changes window on the `Candidates` tab, as shown in Figure [7-9](#A437725_1_En_7_Chapter.html#Fig9).


    ![A437725_1_En_7_Fig9_HTML.jpg](A437725_1_En_7_Fig9_HTML.jpg)


    Figure 7-9. Pending Changes, Candidates


    When you `Add` the file by selecting it on the Pending Changes tab and clicking
    the green plus icon, or right-clicking the file and choosing `Versioning ➤ Add`,
    the file moves to status `Scheduled for Addition`. It also disappears from the
    `Candidates` tab and appears on the `Outgoing` tab, as shown in Figure [7-10](#A437725_1_En_7_Chapter.html#Fig10).


    ![A437725_1_En_7_Fig10_HTML.jpg](A437725_1_En_7_Fig10_HTML.jpg)


    Figure 7-10. Pending Changes, Outgoing


    Files you edit will change to status `Modified` and also appear on this tab (e.g.,
    `ApplicationModuleImpl.java` in the preceding figure). From the Pending Changes
    window, you can right-click and choose `Commit All`. You can also right-click
    in the Applications window and choose `Versioning ➤ Commit All`.


    **Tip**


    Some changes you make in JDeveloper affect multiple files, so it is safest to
    always use `Commit All` to commit changes.


    When you choose either of these commands, the Commit All dialog appears where
    you can provide a commit comment.


    Make sure to check `Commit non-staged files` check box to commit all files. As
    mentioned earlier, Git has some advanced “staging” features, but you normally
    want to commit all files irrespective of their staging status.'
  raw: '### Working with a Central Repository


    When you commit files from JDeveloper, the change is stored in your local Git
    repository (the $ADF_ROOT catalog you initialized earlier). The fact that you
    work against the local repository makes commits very fast, and there is no risk
    that code you commit will break anybody else’s code.


    Of course, files stored in your local repository are only one hard disk crash
    away from oblivion, so you want to push your changes to a common repository for
    safekeeping and to allow others to use the latest code when they want. For this,
    you need a central repository for your team.


    If you are using the Oracle Cloud, you have access to Oracle Developer Cloud Service
    at no cost, and that includes a central Git repository. If not, you will need
    to either set up a central Git instance for your team or use a hosted solution
    like GitHub ( [`www.github.com`](http://www.github.com) ).


    #### Pushing to a Central Git Instance


    To push your application to GitHub , you create a GitHub account, log on, and
    create empty repositories for each workspace (foundation, subsystems, master).
    Do not initialize them with a README file—they will be filled from JDeveloper.
    When you have your repositories ready, you choose Versioning ➤ Push from the context
    menu in the Applications window or Team ➤ Git ➤ Push from the JDeveloper main
    menu. The Push to Git wizard helps you get each application workspace into the
    remote repository.


    The process is similar if you are running your own central Git instance in your
    organization.


    Pushing all the application workspaces to the central Git instance is part of
    the initial versioning of the application and should be done by the lead developer
    or architect as soon as all files have been committed to the local repository.


    #### Cloning Workspaces from the Central Git Instance


    Once the lead developer or application architect has pushed the workspaces to
    a shared location, each developer can get his own copy from the server. In Git
    terminology, the developer clones the repository. To start the Clone from Git
    wizard, choose Team ➤ Git ➤ Clone.


    Enter a remote name (by convention `origin`) and provide the URL to your repository.
    In step 4, provide the local directory where the local Git repository directory
    should be placed (your $ADF_ROOT). Because the cloning process will automatically
    create a directory with the same name as your Git repository, you should select
    the directory you want to be the parent of your $ADF_ROOT. For example, if your
    Git repository is called `hrdemo`, and you choose `C:\JDeveloper` as local directory,
    your Git repository directory becomes in `C:\JDeveloper\hrdemo`.


    After downloading everything, JDeveloper will show you the ADF applications it
    found in the repository, and you can choose which applications you want to open
    in JDeveloper.


    #### Getting Changes from the Central Git Instance


    To download changes that other developers have pushed to the central repository
    server and merge them into your code, you use Team ➤ Git ➤ Pull from the JDeveloper
    menu. The Pull from Git wizard helps you download the changes. If you have merge
    conflicts that JDeveloper cannot resolve automatically, they will show up in the
    Pending Changes window, where you can choose Resolve Conflict from the right-click
    menu on each conflict to resolve it.


    ### Git File Life Cycle


    A file can have several different states in Git , as shown in Figure [7-8](#A437725_1_En_7_Chapter.html#Fig8).


    ![A437725_1_En_7_Fig8_HTML.jpg](A437725_1_En_7_Fig8_HTML.jpg)


    Figure 7-8.


    Git file status life cycle


    When you clone the central repository to your local development workstation, all
    files will be committed to the local repository and have status No Change.


    When you add a new file, it is Unversioned. It will also show up in the Pending
    Changes window on the Candidates tab, as shown in Figure [7-9](#A437725_1_En_7_Chapter.html#Fig9).


    ![A437725_1_En_7_Fig9_HTML.jpg](A437725_1_En_7_Fig9_HTML.jpg)


    Figure 7-9.


    Pending Changes, Candidates


    When you Add the file by selecting it on the Pending Changes tab and clicking
    the green plus icon, or right-clicking the file and choosing Versioning ➤ Add,
    the file moves to status Scheduled for Addition. It also disappears from the Candidates
    tab and appears on the Outgoing tab, as shown in Figure [7-10](#A437725_1_En_7_Chapter.html#Fig10).


    ![A437725_1_En_7_Fig10_HTML.jpg](A437725_1_En_7_Fig10_HTML.jpg)


    Figure 7-10.


    Pending Changes, Outgoing


    Files you edit will change to status Modified and also appear on this tab (e.g.,
    `ApplicationModuleImpl.java` in the preceding figure). From the Pending Changes
    window, you can right-click and choose Commit All. You can also right-click in
    the Applications window and choose Versioning ➤ Commit All.


    Tip


    Some changes you make in JDeveloper affect multiple files, so it is safest to
    always use Commit All to commit changes.


    When you choose either of these commands, the Commit All dialog appears where
    you can provide a commit comment.


    Make sure to check Commit non-staged files check box to commit all files. As mentioned
    earlier, Git has some advanced “staging” features, but you normally want to commit
    all files irrespective of their staging status.'
  trans: '

    ### 使用中央仓库


    当你从 JDeveloper 提交文件时，更改会存储在你的本地 Git 仓库（即你之前初始化的 `$ADF_ROOT` 目录）中。正因为你是针对本地仓库进行操作，所以提交速度非常快，并且没有你提交的代码会破坏他人代码的风险。


    当然，存储在本地仓库的文件距离被遗忘仅一次硬盘崩溃之遥，因此你需要将更改推送到一个公共仓库进行安全保存，并允许其他人在需要时使用最新代码。为此，你需要为你的团队设置一个中央仓库。


    如果你使用 Oracle Cloud，你可以免费访问 Oracle Developer Cloud Service，其中包含一个中央 Git 仓库。如果不使用，你将需要为你的团队搭建一个中央
    Git 实例，或者使用像 GitHub ([`www.github.com`](http://www.github.com)) 这样的托管解决方案。


    #### 推送到中央 Git 实例


    要将你的应用程序推送到 GitHub，你需要创建一个 GitHub 账户，登录，并为每个工作区（foundation、subsystems、master）创建空仓库。不要用
    README 文件初始化它们——它们将从 JDeveloper 中填充内容。当你准备好仓库后，在“应用程序”窗口的上下文菜单中选择 `版本管理 ➤ 推送`，或者在
    JDeveloper 主菜单中选择 `团队 ➤ Git ➤ 推送`。“推送到 Git”向导将帮助你将每个应用程序工作区推送到远程仓库。


    如果你在自己的组织中运行自己的中央 Git 实例，过程也是类似的。


    将所有应用程序工作区推送到中央 Git 实例是应用程序初始版本管理的一部分，应在所有文件都已提交到本地仓库后，由首席开发人员或架构师尽快完成。


    #### 从中央 Git 实例克隆工作区


    一旦首席开发人员或应用程序架构师将工作区推送到共享位置，每个开发人员都可以从服务器获取自己的副本。用 Git 的术语来说，开发人员**克隆**了该仓库。要启动“从
    Git 克隆”向导，请选择 `团队 ➤ Git ➤ 克隆`。


    输入一个远程名称（按惯例为 `origin`）并提供你仓库的 URL。在第 4 步中，指定本地 Git 仓库目录应放置的本地目录（你的 `$ADF_ROOT`）。因为克隆过程会自动创建一个与你的
    Git 仓库同名的目录，所以你应选择希望成为你的 `$ADF_ROOT` 的父目录。例如，如果你的 Git 仓库名为 `hrdemo`，并且你选择 `C:\JDeveloper`
    作为本地目录，那么你的 Git 仓库目录将位于 `C:\JDeveloper\hrdemo`。


    下载完所有内容后，JDeveloper 会向你显示它在仓库中找到的 ADF 应用程序，你可以选择要在 JDeveloper 中打开哪些应用程序。


    #### 从中央 Git 实例获取更改


    要下载其他开发人员已推送到中央仓库服务器的更改，并将其合并到你的代码中，你可以使用 JDeveloper 菜单中的 `团队 ➤ Git ➤ 拉取`。“从 Git
    拉取”向导会帮助你下载更改。如果你遇到 JDeveloper 无法自动解决的合并冲突，它们会显示在“待处理更改”窗口中，你可以在每个冲突上右键单击并选择 `解决冲突`
    来解决它。


    ### Git 文件生命周期


    文件在 Git 中可以有几种不同的状态，如图 7-8 所示。


    ![A437725_1_En_7_Fig8_HTML.jpg](img/A437725_1_En_7_Fig8_HTML.jpg)


    图 7-8. Git 文件状态生命周期


    当你将中央仓库克隆到本地开发工作站时，所有文件都将被提交到本地仓库，状态为 `未更改`。


    当你添加一个新文件时，它处于 `未版本控制` 状态。它也会出现在“待处理更改”窗口的 `候选` 选项卡上，如图 7-9 所示。


    ![A437725_1_En_7_Fig9_HTML.jpg](img/A437725_1_En_7_Fig9_HTML.jpg)


    图 7-9. 待处理更改，候选


    当你通过在“待处理更改”选项卡上选择文件并单击绿色加号图标，或者右键单击文件并选择 `版本管理 ➤ 添加` 来 `添加` 文件时，文件状态变为 `已暂存以备添加`。它也会从
    `候选` 选项卡消失并出现在 `传出` 选项卡上，如图 7-10 所示。


    ![A437725_1_En_7_Fig10_HTML.jpg](img/A437725_1_En_7_Fig10_HTML.jpg)


    图 7-10. 待处理更改，传出


    你编辑的文件状态会变为 `已修改`，也会出现在此选项卡上（例如，上图中的 `ApplicationModuleImpl.java`）。在“待处理更改”窗口中，你可以右键单击并选择
    `全部提交`。你也可以在“应用程序”窗口中右键单击并选择 `版本管理 ➤ 全部提交`。


    **提示**


    你在 JDeveloper 中进行的某些更改会影响多个文件，因此最安全的方法是始终使用 `全部提交` 来提交更改。


    当你选择任一命令时，将出现“全部提交”对话框，你可以在其中提供提交注释。


    请确保勾选 `提交未暂存的文件` 复选框以提交所有文件。如前所述，Git 有一些高级的“暂存”功能，但通常情况下，无论文件的暂存状态如何，你都需要提交所有文件。

