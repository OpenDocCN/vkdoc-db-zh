    \ Bean 时，都会从页面流作用域插入 `UiStateBean`。\n\n### 连接菜单项\n\n现在所有代码都已就位，我们实际需要在用户选择菜单项时设置一些值。这是通过将“设置属性监听器”组件（来自“组件”窗口的“操作”部分）拖放到每个菜单项上来完成的。这将打开如图\
    \ 5-15 所示的“插入设置属性监听器”对话框。\n\n![A437725_1_En_5_Fig15_HTML.jpg](img/A437725_1_En_5_Fig15_HTML.jpg)\n\
    图 5-15. “插入设置属性监听器”对话框\n\n“来源”参数是一个作为表达式语言表达式的字面值：即您希望该菜单项显示的任务流的路径。“目标”参数是您希望将值分配给的\
    \ UI 状态 Bean 中的属性，“操作”参数是您希望分配发生的时间。对于菜单项上的属性监听器，您希望分配在操作时（即用户选择菜单项时）发生。\n\n在页面的源视图中，带有设置属性监听器的菜单将类似于代码清单\
    \ 5-14。\n\n```xml\n...\n```\n代码清单 5-14. 带有属性监听器的菜单\n\n通过这种方式，您可以在用户选择每个菜单项时，将不同任务流的路径分配给\
    \ UI 状态 Bean。\n\n### 刷新主页面\n\n最后一步是在 UI 状态值更改时要求区域重绘自身。区域 UI 组件不知道您已更改了 UI 状态\
    \ Bean 的值，因此您必须通知它刷新。这是通过在区域上设置 `PartialTriggers` 属性来完成的。\n\n当您单击该属性右侧的齿轮图标并选择“编辑”时，将出现“编辑属性：`PartialTriggers`”对话框，如图\
    \ 5-16 所示。\n\n![A437725_1_En_5_Fig16_HTML.jpg](img/A437725_1_En_5_Fig16_HTML.jpg)\n\
    图 5-16. “编辑属性：`PartialTriggers`”对话框\n\n在此对话框中，您指定应触发区域刷新的组件。在左侧，导航到您的菜单项，选择每个项，然后单击\
    \ ➤ 按钮将其移至右侧。对右侧“选定”框中的任何项目执行操作都将导致组件刷新，正如用户对现代 Web 应用程序所期望的那样。\n\n当您运行主页面时，每次单击菜单项，设置属性监听器都会在\
    \ UI 状态 Bean 中存储一个新值，并告诉区域刷新。区域将刷新，向页面切换器 Bean 请求要显示的任务流的路径，而页面切换器 Bean 将从 UI\
    \ 状态 Bean 中读取此路径。\n\n## 结论\n\n您现在已了解如何向应用程序添加表示逻辑，以补充业务层中的逻辑，从而使您的应用程序能够执行任何您需要的功能。但正如编程中常见的那样，有时您的代码可能无法首次正确运行。在下一章中，我们将讨论如何使用\
    \ ADF 的日志记录和调试功能来修复代码中的任何问题。\n\n# 6. 日志记录和调试\n\n您已经了解了如何使用强大的声明式功能构建 ADF 应用程序，以及如何将自己的业务逻辑添加到业务组件和用户界面层。但是，有时您的应用程序的工作方式与您预期的并不完全一致。这时日志记录和调试就派上用场了。\n\
    \n## 使用 ADF Logger\n\n帮助您理解应用程序工作方式的第一项功能是日志记录。Java 内置了基本的日志功能，还有像 `Log4J` 这样的几个\
    \ Java 日志框架。在 ADF 应用程序中，您应该使用 ADF 特定的 `ADFLogger` 类进行日志记录。ADF Logger 使用标准的 Java\
    \ 日志 API。\n\n**注意**：切勿在生产代码中使用 `System.out.println()`，即使互联网上有一半的 Java 示例都这样做。您无法关闭此类日志记录，因此会产生无法管理的大量日志。\n\
    \n与标准 Java 日志记录相比，ADF Logger 有几个优点，特别是所有由同一 ADF 事件引起的日志消息都被赋予相同的执行上下文 ID（`ECID`），因此您可以轻松找到与特定消息相关的所有日志条目。您还可以在应用程序运行时更改日志级别，甚至可以为应用程序的特定用户设置更高的日志级别。\n"
- fmt: "## Adding Logging to Your Classes\n\nAll your Java classes should contain\
    \ an instance of `ADFLogger`. In your team, decide on what you call it so that\
    \ everyone can easily add new log statements everywhere in the knowledge that\
    \ the logger exists. I recommend simply calling this instance `logger`.\n\nYou\
    \ create it using the `createADFLogger()` factory method in the `ADFLogger` class,\
    \ passing in the name of the current class, as shown in Listing 6-1.\n\n```java\n\
    package com.vesterli.hrdemo.deptemp.model.view;\nimport ...\npublic class EmployeesVORowImpl\
    \ extends ViewRowImpl implements EmployeesVORow {\n    private ADFLogger logger\
    \ =\n        ADFLogger.createADFLogger(EmployeesVORowImpl.class);\n    ...\n}\n\
    ```\n**Listing 6-1.** Creating an ADFLogger Instance\n\nIf you don’t provide the\
    \ name of the current class, you will get a lot of log messages but will have\
    \ no way to find out where they originated. Therefore, always provide a class\
    \ name.\n\nWhen you have a logger object in your class, you can add log statements\
    \ to your code using the various methods offered by the `ADFLogger` class. All\
    \ log statements have a log level, and it is important that your team makes a\
    \ choice about how to use them. The following table shows my recommendation.\n\
    \n| Log level | Used for |\n| :--- | :--- |\n| `SEVERE` | Critical errors that\
    \ prevent the application from continuing. Your server administrator should set\
    \ up monitoring of the ADF log files so that he and/or you get an alert if this\
    \ happens. |\n| `WARNING` | Warnings that indicate something wrong with the application.\
    \ Often used to indicate misconfigurations, unexpected database errors, error\
    \ messages, or no response from external systems. |\n| `INFO` | Information for\
    \ business users about what the application is doing. |\n| `CONFIG` | Initialization\
    \ of classes. Reading initial configuration from database or files. |\n| `FINE`\
    \ | Coarse-grained debug logging. Use `FINE` to log when methods are entered and/or\
    \ exited (i.e., not more than twice in a method). |\n| `FINER` | Medium-grained\
    \ debug logging. Use `FINER` for more detailed logging inside methods. |\n| `FINEST`\
    \ | Fine-grained debug logging. Logging in loops should use `FINEST`. |\n\nIn\
    \ Listing 6-2, you can see some examples of ADF log statements.\n\n```java\npackage\
    \ com.vesterli.hrdemo.deptemp.view.beans;\nimport ...\npublic class EmpPage {\n\
    \    ADFLogger logger = ADFLogger.createADFLogger(EmpPage.class);\n    ...\n \
    \   public String MultiRaise() {\n        logger.fine(\"Entering MultiRaise()\"\
    );\n        RowKeySet selectedEmps = getEmpTab().getSelectedRowKeys();\n     \
    \   Iterator selIter = selectedEmps.iterator();\n        logger.finer(\"Get iterator\
    \ for all VO records\");\n        BindingContainer bc =\n            BindingContext.getCurrent().getCurrentBindingsEntry();\n\
    \        DCBindingContainer dcb =(DCBindingContainer)bc;\n        DCIteratorBinding\
    \ empIter =\n            dcb.findIteratorBinding(\"EmployeesInDeptVOIterator\"\
    );\n        RowSetIterator rsi = empIter.getRowSetIterator();\n        logger.finer(\"\
    Loop over selected employees, give raise\");\n        Row currEmp = null;\n  \
    \      String oldSalString;\n        BigDecimal oldSal;\n        BigDecimal newSal;\n\
    \        while (selIter.hasNext()) {\n            Key key = (Key)((List)selIter.next()).get(0);\n\
    \            currEmp = rsi.getRow(key);\n            logger.finest(\"Working on\
    \ \" + currEmp.getAttribute(\"EmployeeId\"));\n            oldSalString = (String)currEmp.getAttribute(\"\
    SalaryString\");\n            oldSal = new BigDecimal(oldSalString);\n       \
    \     logger.finest(\"Old sal is \" + oldSal);\n            newSal = oldSal.multiply(new\
    \ BigDecimal(1.05))\n                .setScale(0, BigDecimal.ROUND_DOWN);\n  \
    \          currEmp.setAttribute(\"SalaryString\", newSal.toString());\n      \
    \      logger.finest(\"New sal is \" + currEmp.getAttribute(\"SalaryString\"));\n\
    \        }\n        logger.finer(\"Done increasing salaries, refreshing UI\");\n\
    \        AdfFacesContext.getCurrentInstance().addPartialTarget(empTab);\n    \
    \    return null;\n    }\n    ...\n}\n```\n**Listing 6-2.** Examples of ADF Logging\n\
    \nThere is a single `logger.fine()` statement at the start of the method and a\
    \ number of `logger.finer()` statements providing information through the flow\
    \ of the method. Inside the loop in the second half of the code, `logger.finest()`\
    \ is used.\n\n## Configuring Logging\n\nThe reason you want to use different log\
    \ levels is so that you can apply relevant filters to your log. You can set the\
    \ log threshold for an individual class or a Java package, and only the log statements\
    \ that are at or above the threshold actually get written in the log. In this\
    \ way, extra log statements are for all practical purposes “free,” because the\
    \ cost at runtime for a log statement below the threshold is so low.\n\nBy default,\
    \ you will only see logs that are of level `WARNING` or higher. That is because\
    \ your `ADFLogger` instances inherit their configuration from the Root Logger,\
    \ which is set to `WARNING`. To see your own logs at different levels, you will\
    \ need to add loggers named after your classes and packages and define their log\
    \ levels.\n\nThis is done in the `logging.xml` file, but there is no need to edit\
    \ this file directly. For the WebLogic server built into JDeveloper, you can click\
    \ **Actions** and then **Configure Oracle Diagnostic Logging** from the Log window,\
    \ as shown in Figure 6-1.\n\n![A437725_1_En_6_Fig1_HTML.jpg](A437725_1_En_6_Fig1_HTML.jpg)\n\
    **Figure 6-1.** Configuring ADF logging in JDeveloper\n\nThis brings up the `logging.xml`\
    \ file in JDeveloper. Because JDeveloper recognizes this file as a special configuration\
    \ file, it provides an **Overview** tab where you can easily change log configuration.\
    \ If you want to look at the raw configuration file, you can choose the **Source**\
    \ tab at the bottom of the `logging.xml` window.\n\nADF has both persistent loggers\
    \ that remain between invocations of your program and transient loggers created\
    \ by ADF whenever an instance of a class with a log statement is instantiated.\
    \ If you open the `logging.xml` window while an application is running in the\
    \ built-in WebLogic server, you will see a lot of loggers. To get a better overview,\
    \ check the **Hide Transient Loggers** check box, as shown in Figure 6-2.\n\n\
    ![A437725_1_En_6_Fig2_HTML.jpg](A437725_1_En_6_Fig2_HTML.jpg)\n**Figure 6-2.**\
    \ The logging.xml Overview tab\n\nThe loggers you add yourself should be Persistent\
    \ loggers. To add these, click the green plus sign and choose **Add Persistent\
    \ Logger**. In the dialog, enter a logger name and choose a log threshold.\n\n\
    *   If your logger name is a package name, log statements at or above the threshold\
    \ for every class in that package will be written to the log.\n*   If your logger\
    \ name is the name of a specific class, only log statements at or above the threshold\
    \ from that specific class are written to the log.\n\nAll the loggers are automatically\
    \ arranged in a hierarchy below the Root Logger, and each logger can have its\
    \ own log level. This gives you excellent control over what gets written to the\
    \ log file.\n\nFor example, in Figure 6-2, I have specified\n\n*   A `com.vesterli`\
    \ logger that allows `FINE` logging for every class where logging is not explicitly\
    \ set by a lower-level logger. All the Java code produced by your organization\
    \ should be under a similar base Java package.\n*   A `com.vesterli.hrdemo` logger\
    \ that allows `FINER` logging for every class that is part of my HRDemo application.\
    \ By using an application base package like this, you can control the logging\
    \ for the entire application with one logger.\n*   A `com.vesterli.hrdemo.foundation`\
    \ logger that shows only `INFO` logging for the classes in this package. You often\
    \ don’t want very detailed logging from your foundation classes once they are\
    \ tested and used in your application.\n\n## Reading Logs\n\nThe log statements\
    \ above the relevant threshold get written in the WebLogic log file and/or shown\
    \ in the console."
