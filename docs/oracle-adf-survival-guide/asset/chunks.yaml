  trans: '

    ## 工作流程


    由于 ADF 提供了多种方式来实现一次通用功能，然后在多个应用间共享，因此**从一开始就以正确的方式设置项目至关重要**。


    开发工作应在装有 `JDeveloper` 的开发工作站上进行，最好还配有一份数据库副本。现代工作站性能强大，足以同时运行 `JDeveloper`、`WebLogic`
    和数据库。当面对数据库不可避免的变更时，这种配置能为你提供更大的灵活性。


    你需要将完成的代码交付至中央代码仓库，然后由构建过程（最好是自动化的）生成应用程序的某个版本，并将其部署到集成环境。


    ### 设计工作


    第一步是与实际最终用户一起设计应用程序。确保设计小组中有各类用户的代表。一个常见的问题是应用程序由专家用户开发——这通常会导致界面过于复杂，普通用户和新手用户难以理解。


    除了用户之外，为了快速高效地使用 ADF 开发出用户友好的应用程序，你还需要三种不同的技术技能：


    *   用户体验（UX）设计师

    *   经验丰富的 Oracle ADF 开发人员

    *   数据库设计师


    用户体验设计师通过研讨会引导用户设计出满足其需求的界面和导航，同时确保一致性和用户体验最佳实践的实施。Oracle 已对用户体验进行了广泛研究，并免费提供了其所有最佳实践。你团队中的
    UX 设计师应熟悉《Oracle 应用程序用户体验设计模式》（ [`www.oracle.com/webfolder/ux/applications/DPG/index.html`](http://www.oracle.com/webfolder/ux/applications/DPG/index.html)
    ），并阅读免费的 Oracle 电子书以获取灵感。如果你的 ADF 应用程序旨在扩展 Oracle 的云应用程序，则应按照“简化用户体验”指南构建你的应用程序，使其看起来与
    Oracle 云应用程序套件中的应用程序一致。


    当用户体验（界面和导航）的初稿完成后，UX 设计师会与首席 ADF 开发人员进行讨论。开发人员可以通过以下两种方式为设计做出贡献：


    *   建议使用专门的 ADF 组件，可能以较低成本提供额外功能或便利

    *   如果建议的设计在标准 ADF 中难以实现，则提出满足特定需求的替代方案


    然后，UX 设计师会进行必要的修改，以纳入 ADF 开发人员的意见，并与用户一起最终确定设计。


    设计完成后，数据库设计师根据设计来识别所有数据实体及其关系和属性。在此阶段，可能需要返回用户处澄清关系、属性和有效值，然后再构建数据库。


    ### 应用程序架构


    随着应用程序规范开始具体化，你可以开始建立应用程序架构。


    如果这是你构建的第一个 ADF 应用程序，你应该从第 2 章中描述的模块化 ADF 架构开始，该架构由一个基础层、若干子系统和一个主应用程序组成。


    如果你已经知道将构建许多 ADF 应用程序，并且你的团队中有一些经验丰富的 ADF 开发人员，你也可以从一开始就建立一个企业级 ADF 架构。这种更复杂的架构也在第
    2 章中进行了描述，涉及为所有应用程序建立企业基础层，以及为每个应用程序建立独立的应用程序基础层。


    此时，你需要决定子系统的数量，包括每个子系统的名称、范围和 Java 包名称。


    ### 初始开发


    应用程序架构就位后，你就可以开始初始开发了。如果你正在按照敏捷方法运行项目，可以将此视为第一个冲刺阶段。


    #### 开发标准


    你需要某个地方来记录你的开发标准。为了便于更新和跟踪变更，这最好是一个 Wiki 或类似工具，而不是文字处理文档。


    你的开发标准必须包括基础层、所有子系统和主应用程序的 Java 包名称。它还应包括 Java 编码准则（现在就解决制表符与空格之争，一劳永逸）以及 ADF
    对象和 Java 类的命名标准。


    **提示**


    要获取 ADF 命名标准的灵感，你可以查看由 ADF 企业方法组制定的《ADF 命名与项目布局指南》（ [`www.oracle.com/technetwork/developer-tools/adf/learnmore/adf-naming-layout-guidelines-v2-00-1904828.pdf`](http://www.oracle.com/technetwork/developer-tools/adf/learnmore/adf-naming-layout-guidelines-v2-00-1904828.pdf)
    ）。


    `JDeveloper` 有许多可以设置的偏好选项。请确保至少设置以下内容：


    *   环境 ➤ 编码（设置为 `UTF8`。某些平台上的某些 `JDeveloper` 版本默认为其他编码）

    *   ADF 业务组件 ➤ 基类（设置为你自己的 BC 基类）

    *   ADF 业务组件 ➤ 包（为实体、关联、视图对象、视图链接和应用程序模块提供不同的子包，以便在代码和 `JDeveloper` 中将它们分离）

    *   代码编辑器 ➤ 代码样式（复制一个配置文件并根据你的需要进行调整）


    #### 创建所有 JDeveloper 工作区


    标准就位后，你的首席开发人员或架构师应创建应用程序的所有 `JDeveloper` 工作区，包括其中的项目。这些工作区应创建在一个新目录中，该目录除用于 ADF
    工作区和 ADF 库外不作他用。我们称此目录为你的 `$ADF_ROOT` 目录（例如，`C:\JDeveloper\hrdemo`）。


    在模块化 ADF 架构中，这意味着创建：


    *   基础层工作区，包含通用模型、通用 UI、通用实用程序代码和业务组件基类等项目

    *   所有子系统工作区，每个都包含一个模型项目和一个视图/控制器项目

    *   主应用程序工作区

    *   一个用于存放你的 ADF 库的目录


    #### 创建初始基础层


    现在，在基础层工作区内，你应该创建整个应用程序所依赖的元素：


    *   业务组件基类

    *   页面模板

    *   页面片段模板

    *   任务流模板

    *   应用程序皮肤


    你的业务组件基类目前可以为空，但你需要创建它们并设置 `JDeveloper`，以便在创建 ADF 业务组件时使用这些基类。


    **注意**


    `JDeveloper` 并未提供简便的方法将配置从一个 `JDeveloper` 实例迁移到另一个实例，因此无法将正确的 `JDeveloper` 设置分发给你整个团队，除非给每人一台预装了正确配置的
    `JDeveloper` 的虚拟机。


    同样，你的模板和皮肤目前也可以为空。有关这些元素的更多详细信息，请参阅第 2 章。


    创建这些初始代码后，从通用 UI 和业务组件基类项目创建 ADF 库。将这些 ADF 库 `JAR` 文件放入 ADF 项目目录中的通用 ADF 库目录中。然后，按照本章后面“源代码控制”部分的描述，将所有工作区置于版本控制之下，并将
    ADF 库目录置于版本控制之下。

    '
- fmt: "#### 创建数据库\n\n在创建 JDeveloper 工作空间和初始基础架构的同时，您的数据库设计团队可以为应用程序创建初始的数据模型。\n\n\
    一个成功的 Oracle ADF 项目基于一个设计良好的数据库。数据库设计超出了本书的范围。\n\n**提示**  \n确保数据库对象（如表）的版本控制可能很困难。可以考虑使用像\
    \ `Flyway`（ [`https://flywaydb.org/`](https://flywaydb.org/) ）这样的工具，来处理任何项目中都不可避免的数据库变更。\n\
    \n如果您想使用 JDeveloper 来开发数据库，请研究 JDeveloper 中称为离线表的功能。这些表在 JDeveloper 中定义，可以与实际的数据库进行比较，并且\
    \ JDeveloper 可以自动生成必要的脚本，使数据库与离线定义保持一致。\n\n#### 初始应用\n\n初始应用的目的有两个：一是确保所有部分协同工作，并在开始正式构建前修复任何问题；二是向您的用户展示应用程序将是什么样子。在敏捷开发中，一个基本原则是能够在每两到三周的冲刺结束时演示一些新的功能。即使您不实施敏捷方法的其他部分，通过定期向用户展示应用程序的演示来让他们了解进度，也是一个好主意。\n\
    \n一旦数据库的第一个版本准备就绪，您就可以使用“从业务组件生成表”向导在公共模型项目中创建所有实体对象。然后从公共模型项目创建一个 ADF 库。\n\n\
    接着，您构建一个简单的子系统，实现应用程序设计中的一个界面。如果您的应用程序包含用于维护参考数据的界面，那么其中某个界面可能是一个适合在初始应用中实现的候选。该子系统将涉及一个基于来自公共模型\
    \ ADF 库的实体对象的视图对象，以及一个包含单个页面片段的任务流。将完成的子系统部署为 ADF 库。\n\n在构建子系统的同时，您的团队还应按照第 5\
    \ 章所述构建带有菜单和任务流切换逻辑的主应用程序。如果您的应用程序将要实施 ADF 安全性，请现在就使用示例用户为主应用程序应用安全性，用于演示。\n\n\
    **注意**  \n不要等到项目结束时才实施安全性。如果您的应用程序需要将您的 WebLogic 应用服务器与另一个身份提供程序（如 Microsoft Active\
    \ Directory）集成，您需要在项目早期启动此过程，以便有时间修复可能出现的任何问题。\n\n按照第 5 章所述，将子系统 ADF 库添加到主应用程序中，并测试是否可以调用来自子系统的任务流，以及是否可以更改页面片段上的数据并将这些更改后的数据存储到数据库中。\n\
    \n然后向用户展示这个基本应用程序。这让他们对最终的 ADF 应用程序将是什么样子有了初步的了解，并向他们证明项目正在进展中。\n\n### 构建应用程序\n\
    \n初始应用已经证明了整个技术栈是可行的，或者可能已经识别出您需要处理的领域（例如，安全性集成）。要构建应用程序的其余部分，您需要在子系统中实现所有设计好的界面和其他功能。\n\
    \n如果您使用敏捷开发方法，您会为每个冲刺选择一些用户故事，并不断从子系统部署新的 ADF 库，并将它们集成到主应用程序中。如果您按照传统的瀑布模型运行项目，请确保在计划中设置一些里程碑，在这些里程碑点将所有工作集成到主应用程序中，以便向最终用户和其他利益相关者演示应用程序的当前状态。\n\
    \n#### 处理数据库变更\n\n在开发过程中，数据库总是会发生变化。会有对现有表中属性的小改动（新增或修改的列），也可能涉及新表和表关系变更的较大的结构性变化。\n\
    \n当您需要对数据库中的表进行小改动时，编写脚本来在本地数据库中进行更改。然后更改基础工作区中公共模型项目中的相应实体对象。您可以右键单击实体对象并选择“与数据库同步”，以寻求\
    \ JDeveloper 的帮助。“与数据库同步”对话框如图 7-1 所示。\n\n![A437725_1_En_7_Fig1_HTML.jpg](A437725_1_En_7_Fig1_HTML.jpg)\n\
    *图 7-1.*\n将数据库更改与 ADF 实体对象同步\n\n您需要单击“同步”或“全部同步”来让 JDeveloper 实际更改您的实体对象——如果只是单击“确定”，则不会进行任何更改。确认您需要更改后，JDeveloper\
    \ 会确认哪些更改已成功。\n\n请注意，实体对象中的属性更改不会自动应用于使用该实体对象的视图对象，并且对于视图对象也没有相应的“同步”功能。您必须手动处理任何视图对象的更改。您可以右键单击实体对象并选择“查找用法”，以查找依赖于该实体对象的视图对象。\n\
    \n#### 处理其他基础架构变更\n\n对业务组件基类的更改不应破坏现有代码。同样，对页面和任务流模板的更改可能会影响页面的视觉外观，但不应破坏应用程序（除非您意外删除了某些页面中使用的facet）。\n\
    \n但是，您应始终执行回归测试，以验证您的应用程序是否仍然有效。通过用户界面自动化应用程序测试是一个好主意。\n\n## 源代码控制\n\n您需要将 ADF\
    \ 应用程序源代码和库置于版本控制之下。如果您的组织以前使用过像 Oracle Forms 这样的工具，它将所有源代码组织在少数几个大文件中，那么您可能至今还没有适当的版本控制。一旦开始使用包含大量小型但相互依赖的文件的\
    \ ADF，您就绝对需要实施源代码控制。\n\n当今最流行的版本控制软件是 `Git`。图 7-2 显示了来自 Google Trends 的各种版本控制工具随时间变化的比较。\n\
    \n![A437725_1_En_7_Fig2_HTML.jpg](A437725_1_En_7_Fig2_HTML.jpg)\n*图 7-2.*\n版本控制软件流行度\n\
    \n`Git` 是一个免费的开源工具，可以从 [`https://git-scm.com/`](https://git-scm.com/) 下载并在本地运行，或者您可以使用托管实例，如\
    \ `GitHub`（ [`https://github.com/`](https://github.com/) ）。本章稍后描述的 Oracle Developer\
    \ Cloud Service (DCS) 也使用 `Git`。不过，`JDeveloper` 内置了对 `Apache Subversion` 的支持，您可以从\
    \ `JDeveloper` 扩展中心（ [`http://apex.oracle.com/pls/apex/f?p=updatecenter:uc`](http://apex.oracle.com/pls/apex/f?p=updatecenter:uc)\
    \ ）下载用于 `CVS`、`Perforce` 等的扩展。"
  raw: '#### Create the Database


    In parallel with the work of creating JDeveloper workspaces and the initial foundation,
    your database design team can create the initial data model for your application.


    A successful Oracle ADF project is based on a well-designed database. Database
    design is outside the scope of this book.


    Tip


    It can be hard to ensure versioning of database objects like tables. Look at a
    tool like Flyway ( [`https://flywaydb.org/`](https://flywaydb.org/) ) for one
    solution to handle the changes to the database that are inevitable in any project.


    If you want to use JDeveloper to develop your database, look into the JDeveloper
    feature called offline tables. These are defined in JDeveloper and can be compared
    to an actual database, and JDeveloper can automatically create the necessary scripts
    to make the database look like the offline definitions .


    #### Initial Application


    The purpose of the initial application is twofold: you want to make sure that
    all the parts work together, and fix any issues before you start building in earnest.
    And you want to demonstrate to your users what the application is going to look
    like. In agile development, it is a basic tenet to be able to demonstrate some
    new functionality at the end of every two- or three-week sprint. Even if you are
    not implementing any other part of the agile methodology, it is a good idea to
    keep your users informed of progress by showing them regular demonstrations of
    the application.


    Once the first version of the database is ready, you can create all the entity
    objects in the common model project using the Business Components from Tables
    wizard. Then create an ADF library from the common model project.


    Then you build a simple subsystem implementing one screen from the application
    design. If your application contains screens for maintaining reference data, one
    of these screens might be a good candidate to implement in the initial application.
    The subsystem will involve a view object based on entity objects from the common
    model ADF library, and a task flow with a single page fragment. Deploy the finished
    subsystem as an ADF library.


    In parallel with building the subsystem , your team should also build the master
    application with a menu and task flow switching logic as described in Chapter
    [5](#A437725_1_En_5_Chapter.html). If your application is going to implement ADF
    security, apply security to the master application now, using sample users for
    the demo.


    Note


    Don’t wait until the end of the project to implement security. If your application
    involves getting your WebLogic application server integrated with another identity
    provider like Microsoft Active Directory, you want to start this process early
    in the project so you have time to fix any issues that might occur.


    Add the subsystem ADF library to the master application as described in Chapter
    [5](#A437725_1_En_5_Chapter.html) and test that you can invoke the task flow from
    the subsystem, and that you can make changes to data on the page fragment and
    store this changed data in the database.


    Then show this basic application to your users. This gives them a first idea of
    what the finished ADF application will look like and proves to them that the project
    is progressing.


    ### Constructing the Application


    The initial application has proven that the entire technology stack works, or
    might have identified areas you need to work on (e.g., security integration).
    To build the rest of the application, you implement all the designed screens and
    other functionality in the subsystems.


    If you are using an agile development approach, you choose a number of user stories
    for each sprint and continually deploy new ADF libraries from your subsystems
    and integrate them into the master application. If you are running your project
    in accordance with a traditional waterfall model, make sure to place some milestones
    in your plan where you integrate all of your work in the master application so
    you can demonstrate the current state of the application to the end users and
    other stakeholders.


    #### Handling Database Changes


    During development , there will always be changes to the database. There will
    be small changes to attributes within existing tables (new or modified columns),
    and maybe also larger, structural changes that involve new tables and changes
    to relations between tables.


    When you need to make a small change to a table in the database, write a script
    to make the change in your local database. Then change the corresponding entity
    object in the common model project in the foundation workspace. You can right-click
    the entity object and select Synchronize with Database to ask JDeveloper to help
    you. The Synchronize with Database dialog appears as shown in Figure [7-1](#A437725_1_En_7_Chapter.html#Fig1).


    ![A437725_1_En_7_Fig1_HTML.jpg](A437725_1_En_7_Fig1_HTML.jpg)


    Figure 7-1.


    Synchronizing database changes with an ADF entity object


    You need to click Synchronize or Synchronize All to ask JDeveloper to actually
    change your entity object—if you just click OK, no changes are made. After you
    confirm you want the change, JDeveloper confirms which changes were successful.


    Note that attribute changes in the entity object are not automatically applied
    to the view objects using that entity object, and there is no corresponding “synchronize”
    feature for view objects. You must handle any view object changes manually. You
    can right-click the entity object and choose Find Usages to find the view objects
    that depend on that entity object.


    #### Handling Other Foundation Changes


    Changes to business component base classes should not break existing code. Similarly,
    changes to page and task flow templates might affect the visual appearance of
    the page, but should not break the application (unless you accidentally delete
    a facet used on some pages).


    However, you should always perform a regression test to verify that your application
    still works. It is a good idea to automate application testing through the user
    interface .


    ## Source Control


    You need to keep your ADF application source code and libraries under version
    control. If your organization has worked with a tool like Oracle Forms that keeps
    all source organized in a few large files, you might have gotten by without proper
    version control until now. Once you start with ADF that uses a lot of small, but
    interdependent files, you absolutely need to implement source control.


    The most popular version control software today is Git. Figure [7-2](#A437725_1_En_7_Chapter.html#Fig2)
    shows a comparison of various version control tools over time from Google Trends.


    ![A437725_1_En_7_Fig2_HTML.jpg](A437725_1_En_7_Fig2_HTML.jpg)


    Figure 7-2.


    Version Control software popularity


    Git is a free, open source tool that can be downloaded from [`https://git-scm.com/`](https://git-scm.com/)
    and run locally, or you can use a hosted instance like GitHub ( [`https://github.com/`](https://github.com/)
    ). The Oracle Developer Cloud Service (DCS) described later in this chapter also
    uses Git. However, JDeveloper also has support for Apache Subversion built in,
    and you can download JDeveloper extensions for CVS, Perforce and others from the
    JDeveloper extension center at [`http://apex.oracle.com/pls/apex/f?p=updatecenter:uc`](http://apex.oracle.com/pls/apex/f?p=updatecenter:uc)
    .'
