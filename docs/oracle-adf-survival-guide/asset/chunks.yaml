    \        curr = rsi.getRow(key);\n        // process row\n        ...\n    }\n\
    \    return null;\n}\n}\n```\n**Listing 5-9.** Working with Selected Rows in a\
    \ Table\n\nWhen you have the set of row keys, you can get an `Iterator` object\
    \ for the selected rows. This is an iterator over rows in the user interface and\
