- fmt: '#### Replacing Standard Database Operations


    Another place where overriding the `doDML()` method comes in handy is if you want
    to implement logical deletes instead of actually deleting a record. This means
    that your table and entity object needs an extra column indicated if the record
    has been deleted, and every attempt to send a `DELETE` to the database must be
    intercepted and changed to an `UPDATE` that sets the delete indicator attribute.
    If you create a new database column `DELETED_YN` with a corresponding attribute
    in the entity object, the code could look as shown in Listing 4-4.


    ```java

    package com.vesterli.hrdemo.foundation.model.entity;

    ...

    public class DepartmentsImpl extends EntityImpl {

    ...

    /**

    * Add entity remove logic in this method.

    */

    public void remove() {

    setDeletedYn("Y");

    super.remove();

    }

    ...

    /**

    * Custom DML update/insert/delete logic here.

    * @param operation the operation type

    * @param e the transaction event

    */

    protected void doDML(int operation, TransactionEvent e) {

    if (operation == DML_DELETE) {

    operation = DML_UPDATE;

    }

    super.doDML(operation, e);

    }

    /**

    * Gets the attribute value for DeletedYn, using the alias name DeletedYn.

    * @return the value of DeletedYn

    */

    public String getDeletedYn() {

    return (String) getAttributeInternal(DELETEDYN);

    }

    /**

    * Sets value as the attribute value for DeletedYn.

    * @param value value to set the DeletedYn

    */

    public void setDeletedYn(String value) {

    setAttributeInternal(DELETEDYN, value);

    }

    ...

    }

    ```

    Listing 4-4. Implementing Logical Delete


    The `doDML()` method simply replaces a `DELETE` with an `UPDATE`, and the `remove()`
    method sets the attribute indicating that the record hard been deleted.


    **Tip**


    Because records that are logically deleted remain in the database, your view object
    will have to filter out the records that have been logically deleted. See the
    section “Permanent Filtering” later in the following section on view object logic
    for an example.


    ## Logic in View Objects


    While the bulk of entity object logic is found in one class, view object logic
    is found in two classes:


    *   **View object classes**: These represent the query or whole data set of the
    view object, and the built-in functionality of these objects relates to all the
    records. Examples of functionality in view object classes are changing sort order,
    view criteria, or executing the query.

    *   **View row classes**: These represent individual rows in the record set defined
    by the view object. The functionality in these objects is related to one row.
    The typical function you will override in a view row object is an accessor.


    ### Creating Java Objects


    Similar to the way you create Java objects for entity objects, you create Java
    objects for view objects on the Java tab of the object by clicking the edit (pencil)
    icon. This brings the Select Java Options dialog for view objects shown in Figure
    4-9.


    ![A437725_1_En_4_Fig9_HTML.jpg](A437725_1_En_4_Fig9_HTML.jpg)

    Figure 4-9. Creating Java for a view object


    From this dialog, you can create both a View Object Class and a View Row Class
    and select which methods you want JDeveloper to add to the generated class. You
    can always edit the code later or override methods with Source ➤ Override Methods.


    **Caution**


    If you bring up Select Java Options dialog again and deselect a check box, JDeveloper
    will unceremoniously delete the corresponding methods, including any of your code.
    If you lose code in this way, use the History tab in the Java class to revert
    to a previous version.


    ### View Object Class Logic


    When you add business logic to entity objects, you typically override an existing
    method to make ADF do extra things in addition to the standard functionality.
    This means that entity object logic normally happens “behind the scenes” as the
    result of an operation started elsewhere.


    View object logic is different. If you add a method to a view object class and
    create a client interface, that method is accessible from the user interface layer
    of your application. It shows up in the Data Controls pane, and for simple methods,
    you can just drag the operation onto a page fragment and drop it as an ADF button.
    In more complicated cases, you create an operations binding for your method and
    then call it from a managed bean in your user interface layer.


    **Note**


    If your logic mainly manipulates data, it belongs in a view object class in the
    business component layer. If your logic mainly manipulates the user interface,
    it belongs in a managed bean in the user interface layer as described in Chapter
    5.


    View object logic works on the entire data set of the view object. If you want
    to filter or sort data differently in response to choices made by the user, you
    invoke a method on the view object class.


    #### Enabling and Disabling View Criteria


    A typical use case is enabling and disabling view criteria. View criteria are
    restrictions on a view object that can be enabled and disabled, and the user interface
    often contains buttons or check boxes for record filtering. Methods for showing
    and hiding records based on a view criterion could look as shown in Listing 4-5.


    ```java

    package com.vesterli.hrdemo.deptemp.model.view;

    ...

    import com.vesterli.hrdemo.foundation.bcbase.ViewObjectImpl;

    ...

    public class DepartmentsViewImpl extends ViewObjectImpl

    implements DepartmentsView {

    ...

    public void showDeleted() {

    removeViewCriteria("DontShowDeleted");

    executeQuery();

    }

    public void dontShowDeleted() {

    ViewCriteria vc = getViewCriteria("DontShowDeleted");

    applyViewCriteria(vc);

    executeQuery();

    }

    ...

    }

    ```

    Listing 4-5. Changing View Criteria in a View Object Class


    Note that changing the data in the view object is not automatically reflected
    in the user interface. If for instance you call one of these methods from a button,
    you need to set the Partial Triggers property of the element showing the data
    (e.g., a Table component) to point to the button that changes the view criteria.
    The concept of partial page rendering and the partial triggers property will be
    explained in Chapter 5.


    #### Permanent Filtering


    In the entity object example earlier in this chapter, you saw how a logical delete
    could be implemented in the entity object. This method leaves logically deleted
    records in the database, and to prevent them from being shown to the user, you
    can have your view object filter out these deleted objects. This could be done
    for example with a view criterion, as shown in Figure 4-10.


    ![A437725_1_En_4_Fig10_HTML.jpg](A437725_1_En_4_Fig10_HTML.jpg)

    Figure 4-10. A view criterion for filtering out logically deleted records


    You can add this view criterion permanently to the view object instance in the
    application module to prevent the deleted records from ever being shown to the
    user. To do this, open the Data Model tab of the application module and select
    the instance of the `Departments` view object. Then, click Edit to bring up the
    Edit View Instance dialog where you can apply the view criteria permanently in
    this view object instance.'
