    -   `SEVERITY_ERROR`\n-   `SEVERITY_WARN`\n-   `SEVERITY_INFO`\n\n如上所示，当你使用 `null`\
    \ 作为第一个参数将消息添加到 faces 上下文时，该消息会显示在应用程序窗口上半部分的中心位置，如图 5-10 所示。\n\n![A437725_1_En_5_Fig10_HTML.jpg](img/A437725_1_En_5_Fig10_HTML.jpg)\n\
