- fmt: '# Breaking in Library Code


    When you have created source code JAR files for the relevant subsystems, you add
    them to your master application view project like any other JAR: `Project Properties`
    ➤ `Libraries and Classpath` ➤ `Add JAR/Directory`.


    To see the source JAR file and set a breakpoint in it, you need to reconfigure
    the `Applications` window to show included libraries. This is done from the `Navigator
    Display Options` button in the top right corner of the `Applications` window.
    Select `Show Libraries`, as shown in Figure [6-9](#A437725_1_En_6_Chapter.html#Fig9).


    ![A437725_1_En_6_Fig9_HTML.jpg](A437725_1_En_6_Fig9_HTML.jpg)


    Figure 6-9. Configuring the `Applications` window to show libraries


    Now all libraries are shown in the `Applications` window. Find the source JAR
    file for the subsystem that you want to break inside, open it and double-click
    the Java file to open the source file. You can set breakpoints in these subsystem
    files, as shown in Figure [6-10](#A437725_1_En_6_Chapter.html#Fig10), and when
    you run the master application, execution stops at the point you chose in the
    relevant subsystem.


    ![A437725_1_En_6_Fig10_HTML.jpg](A437725_1_En_6_Fig10_HTML.jpg)


    Figure 6-10. Placing a breakpoint in subsystem source code from the master application


    # Adding the ADF Source Code


    When you are debugging ADF applications, you will often see the dialog box in
    Figure [6-11](#A437725_1_En_6_Chapter.html#Fig11).


    ![A437725_1_En_6_Fig11_HTML.jpg](A437725_1_En_6_Fig11_HTML.jpg)


    Figure 6-11. Unable to find source file


    This dialog means that you wanted to continue single-line debugging, but `JDeveloper`
    couldn’t find the source file containing the next piece of code to be executed.
    This can happen if execution continues into some of your own classes and you have
    not created a source code JAR as described in the preceding. But most often, it
    happens because execution continues into the large ADF code base delivered by
    `Oracle`. And by default, you don’t have the `Oracle` ADF source code.


    ## Getting the ADF Source Code


    But if you have a valid support contract with `Oracle`, you can get the source
    code. The procedure is described in `Doc ID 971256.1` on `My Oracle Support`,
    and the main steps are as follows:


    1.  You open a `Service Request` with `My Oracle Support` and ask for the ADF
    source code for the versions you need. You must supply the name, e-mail, and fax
    number (yes, really) of a person authorized to sign the `Source Code Agreement`
    (`SCA`) with `Oracle`. If you are a developer, this might be your manager.

    2.  `Oracle` sends you the `SCA`.

    3.  An authorized person from your organization signs and returns the `SCA`.

    4.  The `SR` is updated with a `URL` to the relevant source code `ZIP` and a password
    to open the `ZIP` file.

    5.  You download the `ZIP` file (it normally has a name like `adf_vvvv_nnnn_source.zip`,
    where `vvvv` is version number and `nnnn` is build).


    ## Adding the ADF Source Code to JDeveloper


    Once you have the ADF source code from `Oracle`, you normally create a user library
    for it. To do this, choose `Tools` ➤ `Manage Libraries` to bring up the `Manage
    Libraries` dialog. In this dialog, click `New` to add a new library for the ADF
    source. Provide a name and add the `ZIP` file as a new `Source Path` entry. Don’t
    select the `Deployed by Default` check box.


    ## Adding the ADF Source Code to a Project


    When you have defined the ADF source user library, you can add it to each relevant
    project under `Project Properties` ➤ `Libraries and Classpaths` ➤ `Add Library`.
    Your ADF source library should appear under the `Users` node.


    With the ADF source code part of your project, you can debug into ADF itself.
    You can also follow the execution path from your own application into the internal
    ADF classes if you need more information to help you debug a tricky issue. If
    you are curious about what ADF is doing internally, you can even set breakpoints
    in `Oracle`’s code.


    # Tips and Tricks


    When you have a problem with your ADF application, first run the `ADF Model Tester`.
    This will tell if you the problem is in the business components layer or the user
    interface layer.


    ## If the Model Doesn’t Run


    Some types of errors mean that the model tester won’t start at all. In this case,
    `JDeveloper` can’t really offer any good advice, and all you see is in the `Log`
    window is something like Listing [6-3](#A437725_1_En_6_Chapter.html#Par103).


    ```

    C:\Java\jdk1.8.0_102\bin\javaw.exe -server -classpath ...

    Apr 17, 2017 5:31:10 PM oracle.security.jps.JpsStartup start

    INFO: Jps initializing.

    Apr 17, 2017 5:31:11 PM oracle.security.jps.JpsStartup start

    INFO: Jps started.

    Apr 17, 2017 5:31:20 PM oracle.jbo.jbotester.MainFrame main

    INFO: BC4J Tester started.

    ```


    Listing 6-3. `ADF Model Tester` Incomplete Start


    If you don’t see `jdev tester server connecting on port...` the model tester didn’t
    start correctly. In this case, there is a problem with some of the code in your
    business components, and you need to check the source files for all your business
    components.


    You need to open the `XML` file (on the `Source` tab for the business component)
    and any `Java` classes that you generated. A file with no problems has a green
    square at the top of the right margin and no other indications in the right margin,
    as shown in Figure [6-12](#A437725_1_En_6_Chapter.html#Fig12).


    ![A437725_1_En_6_Fig12_HTML.jpg](A437725_1_En_6_Fig12_HTML.jpg)


    Figure 6-12. A business component file without problems


    If there is a problem with a file, the square at the top right is orange or red,
    and there will be orange and/or red lines in various places in the right margin,
    as shown in Figure [6-13](#A437725_1_En_6_Chapter.html#Fig13).


    ![A437725_1_En_6_Fig13_HTML.jpg](A437725_1_En_6_Fig13_HTML.jpg)


    Figure 6-13. A business component file with problems


    Each problem is highlighted in the code with an orange or red underline, and you
    can point to it to get `JDeveloper` to tell you what it thinks the problem is.


    ## If the Page Is Empty


    If your web page shows up empty, and the `JDeveloper` log doesn’t tell you what
    is wrong, you need to examine the source file of the page. Look for errors and
    warnings marked with red and/or yellow bars in the right margin and underlines
    in the code.


    If this doesn’t help you, you can fall back to the time-proven way of debugging:
    commenting out code. Since the source of your page is `XML`, you need to use `XML`
    comment syntax of `<!--   -->`.


    Start by placing a start comment near the very top of the page and comment out
    everything that contains expression language (bindings, action listeners, etc.).
    Then drop in some simple component from the `Components` window, as shown in Listing
    [6-4](#A437725_1_En_6_Chapter.html#Par111).


    ```

    ...

    -->

    ```


    Listing 6-4. Commenting Out Parts of a Page


    Now, when you run your page, you should see only the simple component. Then move
    the comment start and end marks to include more and more of your `UI` components
    until you find the one that causes the problem.


    # Conclusion


    You have seen how to add proper instrumentation to your ADF code and how to debug
    enterprise ADF applications. The last thing you need to know is how to implement
    a good workflow for effective enterprise ADF development.


    # 7. Your ADF Workflow


    `JDeveloper` is an enterprise-level tool that supports and integrates with many
    of the tools you need to support an enterprise application development process.'
