    ### 视图行类逻辑


    视图对象类作用于整个数据集，而视图行类方法则作用于单个记录。这意味着修改数据以及响应数据变化的功能应归属于视图行类。


    您在视图行类中所做的典型更改是覆盖一个或多个访问器方法（针对特定属性的 setter 和/或 getter）。如果您在`Select Java Options`对话框中勾选了`Include
    accessors`复选框，`JDeveloper`将自动为视图对象中的所有属性创建访问器方法。在视图行类中拥有大量访问器方法不会带来任何性能开销，但这会使代码变得冗长，并且需要更多时间才能找到您想要更改的方法。


    注意：您也可以在实体对象中覆盖访问器。如果您希望更改在整个应用程序中生效，则应在实体对象中覆盖访问器。如果您只想在一个地方更改访问器，则应在相关的视图行对象中进行更改。


    另一个例子是与数据变化相关的更复杂的逻辑。例如，考虑默认的`HR`模式，其中包含`employees`和`departments`。如果用户可以自由更改员工的部门，`ADF`的默认功能就能正常工作。您只需允许`employees`屏幕上的部门编号可编辑（通常通过包含所有部门的下拉列表实现）。但如果您想在启动部门调动之前添加额外的处理逻辑，您可以在员工视图行类上创建一个`changeDept()`方法，将新的部门
    ID 作为参数。在用户界面中，您可以创建一个单独的输入元素来选择新部门——一个不连接到数据库的元素。然后，您可以设置一个按钮来调用该方法，并将新部门的 UI
    元素连接到该方法调用。


