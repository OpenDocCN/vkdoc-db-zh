- fmt: "### Using Stored State\n\nWhen you have a bean to store application state,\
    \ you need to change the bean that provides the current task flow to the dynamic\
    \ region. This bean already has some content that JDeveloper automatically created,\
    \ but it should be changed to look like Listing [5-13](#A437725_1_En_5_Chapter.html#Par146).\n\
    \n```java\npackage com.vesterli.hrdemo.master.view.beans;\nimport java.io.Serializable;\n\
    import oracle.adf.controller.TaskFlowId;\npublic class PageSwitcherBean implements\
    \ Serializable {\n    private UiStateBean currentUiState;\n    public PageSwitcherBean()\
    \ {\n    }\n    public TaskFlowId getDynamicTaskFlowId() {\n        return TaskFlowId.parse(currentUiState.getCurrentTF());\n\
    \    }\n    public void setUiState(UiStateBean state) {\n        currentUiState\
    \ = state;\n    }\n}\n```\nListing 5-13. Bean for Providing Task Flow ID to Dynamic\
    \ Region\n\nThis bean now contains a private instance of the UI State bean and\
    \ a method to set it. It still contains the `getDynamicTaskFlowId()` method created\
    \ by JDeveloper, but the method now returns the string stored in the private UI\
    \ state bean.\n\n### Connecting the Beans\n\nIn order to get ADF to pass the UI\
    \ State bean to the page switcher bean each time it is initialized, we use an\
    \ ADF feature called managed properties. All of the beans are managed beans; that\
    \ is, the ADF framework creates and destroys them. But ADF can also manage the\
    \ properties of these beans. This is done under the Managed Properties heading\
    \ on the Overview tab of a task flow, as shown in Figure [5-14](#A437725_1_En_5_Chapter.html#Fig14).\n\
    \n![A437725_1_En_5_Fig14_HTML.jpg](A437725_1_En_5_Fig14_HTML.jpg)\nFigure 5-14.\
    \ Using a managed property to connect UI state to page switcher bean\n\nTo set\
    \ this property, first select the page switcher bean and then click the green\
    \ plus sign next to Managed Properties to create a new managed property. Whenever\
    \ the page switcher bean is created, ADF will automatically set the property.\
    \ The setter method matching the Name of the property will be called with the\
    \ content of the Value property. For example, if the name is `uiState`, ADF will\
    \ call `setUiState()`. In Figure [5-14](#A437725_1_En_5_Chapter.html#Fig14), you\
    \ see that the Value is `#{pageFlowScope.UiStateBean}`. This means that the `UiStateBean`\
    \ from the page flow scope is always inserted into the page switcher bean whenever\
    \ it is created.\n\n### Connecting Menu Items\n\nWith all the code in place, we\
    \ now need to actually set some values when the user selects a menu item. This\
    \ is done by dropping a Set Property Listener component from the Operations section\
    \ in the Components window onto each menu item. This brings up the Insert Set\
    \ Property Listener dialog shown in Figure [5-15](#A437725_1_En_5_Chapter.html#Fig15).\n\
    \n![A437725_1_En_5_Fig15_HTML.jpg](A437725_1_En_5_Fig15_HTML.jpg)\nFigure 5-15.\
    \ The Insert Set Property Listener dialog\n\nThe From parameter is a literal value\
    \ as an Expression Language expression: the path to the task flow you want that\
    \ menu item to show. The To parameter is the property in your UI state bean that\
    \ you want the value assigned to, and the Action parameter is when you want the\
    \ assignment to happen. For a property listener on a menu item, you want the assignment\
    \ to happen on action (i.e., when the user selects the menu item).\n\nIn the Source\
    \ view of your page, your menu with set property listeners will look something\
    \ like Listing [5-14](#A437725_1_En_5_Chapter.html#Par153).\n\n```xml\n...\n```\n\
    Listing 5-14. A menu with property listeners\n\nIn this way, you can assign the\
    \ paths to the different task flows to the UI state bean when the user selects\
    \ each menu item.\n\n### Refreshing the Master Page\n\nThe final step is to ask\
    \ the region to redraw itself whenever the value of the UI state changes. The\
    \ region UI component doesn’t know that you’ve changed the value of the UI state\
    \ bean, so you have to tell it to refresh. This is done by setting the `PartialTriggers`\
    \ property on the region.\n\nWhen you click the gearwheel icon to the right of\
    \ that property and select Edit, the Edit Property: `PartialTriggers` dialog appears\
    \ as shown in Figure [5-16](#A437725_1_En_5_Chapter.html#Fig16).\n\n![A437725_1_En_5_Fig16_HTML.jpg](A437725_1_En_5_Fig16_HTML.jpg)\n\
    Figure 5-16. The Edit Property: `PartialTriggers` dialog\n\nIn this dialog, you\
    \ specify the components that should trigger a refresh of the region. In the left\
    \ side, you navigate to your menu item, select each one, and click the ➤ button\
    \ to shuffle it to the right. Any action on an item in the Selected box to the\
    \ right will cause the component to refresh as the user would expect from a modern\
    \ web application.\n\nWhen you run the master page, every time you click a menu\
    \ item, the set property listener will store a new value in the UI state bean\
    \ and tell the region to refresh. The region will refresh, asking the page switcher\
    \ bean for the path to the task flow to be displayed, and the page switcher bean\
    \ will read this from the UI state bean.\n\n## Conclusion\n\nYou have now seen\
    \ how you can add presentation logic to your application to supplement the logic\
    \ in the business layer to make your application do anything you need. But as\
    \ always in programming, sometimes your code doesn’t run correctly in the first\
    \ attempt. In the next chapter, we’ll discuss how you can use ADF’s logging and\
    \ debugging features to fix any problems with your code.\n\n# 6. Logging and Debugging\n\
    \nYou’ve seen how to build an ADF application with powerful declarative features,\
    \ and how to add your own business logic to both the business component and the\
    \ user interface layer. However, sometimes your application doesn’t work quite\
    \ the way you expect it to. This is where logging and debugging comes into play.\n\
    \n## Using ADF Logger\n\nThe first feature that helps you understand how your\
    \ application works is logging. Java has basic logging features built in, and\
    \ there are also several logging Java frameworks like `Log4J`. In an ADF application,\
    \ you should use the ADF-specific `ADFLogger` class for your logging. The ADF\
    \ Logger uses the standard Java logging API.\n\n**Caution**: Don’t ever use `System.out.println()`\
    \ in production code, even if half the Java examples on the Internet do. You can’t\
    \ turn off this kind of logging, so you’ll get an unmanageable amount of logging.\n\
    \nThe ADF Logger has several benefits over standard Java logging, especially the\
    \ fact that all log messages caused by the same ADF event are given the same Execution\
    \ Context ID (`ECID`) so you can easily find all the log entries that are related\
    \ to a specific message. You can also change log levels while the application\
    \ is running, and even set a higher log level for a specific user of your application."
  raw: '### Using Stored State


    When you have a bean to store application state, you need to change the bean that
    provides the current task flow to the dynamic region. This bean already has some
    content that JDeveloper automatically created, but it should be changed to look
    like Listing [5-13](#A437725_1_En_5_Chapter.html#Par146).


    ```

    package com.vesterli.hrdemo.master.view.beans;

    import java.io.Serializable;

    import oracle.adf.controller.TaskFlowId;

    public class PageSwitcherBean implements Serializable {

    private UiStateBean currentUiState;

    public PageSwitcherBean() {

    }

    public TaskFlowId getDynamicTaskFlowId() {

    return TaskFlowId.parse(currentUiState.getCurrentTF());

    }

    public void setUiState(UiStateBean state) {

    currentUiState = state;

    }

    }

    Listing 5-13.

    Bean for Providing Task Flow ID to Dynamic Region

    ```


    This bean now contains a private instance of the UI State bean and a method to
    set it. It still contains the `getDynamicTaskFlowId()` method created by JDeveloper,
    but the method now returns the string stored in the private UI state bean.


    ### Connecting the Beans


    In order to get ADF to pass the UI State bean to the page switcher bean each time
    it is initialized, we use an ADF feature called managed properties . All of the
    beans are managed beans; that is, the ADF framework creates and destroys them.
    But ADF can also manage the properties of these beans. This is done under the
    Managed Properties heading on the Overview tab of a task flow, as shown in Figure
    [5-14](#A437725_1_En_5_Chapter.html#Fig14).


    ![A437725_1_En_5_Fig14_HTML.jpg](A437725_1_En_5_Fig14_HTML.jpg)


    Figure 5-14.


    Using a managed property to connect UI state to page switcher bean


    To set this property, first select the page switcher bean and then click the green
    plus sign next to Managed Properties to create a new managed property. Whenever
    the page switcher bean is created, ADF will automatically set the property. The
    setter method matching the Name of the property will be called with the content
    of the Value property. For example, if the name is `uiState`, ADF will call `setUiState()`.
    In Figure [5-14](#A437725_1_En_5_Chapter.html#Fig14), you see that the Value is
    `#{pageFlowScope.UiStateBean}`. This means that the UiStateBean from the page
    flow scope is always inserted into the page switcher bean whenever it is created.


    ### Connecting Menu Items


    With all the code in place, we now need to actually set some values when the user
    selects a menu item. This is done by dropping a Set Property Listener component
    from the Operations section in the Components window onto each menu item. This
    brings up the Insert Set Property Listener dialog shown in Figure [5-15](#A437725_1_En_5_Chapter.html#Fig15).


    ![A437725_1_En_5_Fig15_HTML.jpg](A437725_1_En_5_Fig15_HTML.jpg)


    Figure 5-15.


    The Insert Set Property Listener dialog


    The From parameter is a literal value as an Expression Language expression: the
    path to the task flow you want that menu item to show. The To parameter is the
    property in your UI state bean that you want the value assigned to, and the Action
    parameter is when you want the assignment to happen. For a property listener on
    a menu item, you want the assignment to happen on action (i.e., when the user
    selects the menu item).


    In the Source view of your page, your menu with set property listeners will look
    something like Listing [5-14](#A437725_1_En_5_Chapter.html#Par153).


    ```

    ...


    ...

    Listing 5-14. A menu with property listeners

    ```


    In this way, you can assign the paths to the different task flows to the UI state
    bean when the user selects each menu item.


    ### Refreshing the Master Page


    The final step is to ask the region to redraw itself whenever the value of the
    UI state changes. The region UI component doesn’t know that you’ve changed the
    value of the UI state bean, so you have to tell it to refresh. This is done by
    setting the PartialTriggers property on the region.


    When you click the gearwheel icon to the right of that property and select Edit,
    the Edit Property: PartialTriggers dialog appears as shown in Figure [5-16](#A437725_1_En_5_Chapter.html#Fig16).


    ![A437725_1_En_5_Fig16_HTML.jpg](A437725_1_En_5_Fig16_HTML.jpg)


    Figure 5-16.


    The Edit Property: PartialTriggers dialog


    In this dialog, you specify the components that should trigger a refresh of the
    region. In the left side, you navigate to your menu item, select each one, and
    click the ➤ button to shuffle it to the right. Any action on an item in the Selected
    box to the right will cause the component to refresh as the user would expect
    from a modern web application.


    When you run the master page, every time you click a menu item, the set property
    listener will store a new value in the UI state bean and tell the region to refresh.
    The region will refresh, asking the page switcher bean for the path to the task
    flow to be displayed, and the page switcher bean will read this from the UI state
    bean.


    ## Conclusion


    You have now seen how you can add presentation logic to your application to supplement
    the logic in the business layer to make your application do anything you need.
    But as always in programming, sometimes your code doesn’t run correctly in the
    first attempt. In the next chapter, we’ll discuss how you can use ADF’s logging
    and debugging features to fix any problems with your code.


    # 6. Logging and Debugging


    You’ve seen how to build an ADF application with powerful declarative features,
    and how to add your own business logic to both the business component and the
    user interface layer. However, sometimes your application doesn’t work quite the
    way you expect it to. This is where logging and debugging comes into play.


    ## Using ADF Logger


    The first feature that helps you understand how your application works is logging.
    Java has basic logging features built in, and there are also several logging Java
    frameworks like Log4J . In an ADF application, you should use the ADF-specific
    `ADFLogger` class for your logging. The ADF Logger uses the standard Java logging
    API.


    Caution


    Don’t ever use `System.out.println()` in production code, even if half the Java
    examples on the Internet do. You can’t turn off this kind of logging, so you’ll
    get an unmanageable amount of logging.


    The ADF Logger has several benefits over standard Java logging, especially the
    fact that all log messages caused by the same ADF event are given the same Execution
    Context ID (ECID) so you can easily find all the log entries that are related
    to a specific message. You can also change log levels while the application is
    running, and even set a higher log level for a specific user of your application.'
