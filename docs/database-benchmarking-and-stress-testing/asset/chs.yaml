  ## 关于技术审校者


  '
- "# 1. 基准测试基础\n\n本书旨在向读者阐明与数据库`基准测试`、`压力测试`和`工作负载捕获/回放`相关的一切。此刻你可能觉得这些是同一个主题，或者仅仅认为它们之间的区别无关紧要。此外，你可能认为这些主题有些深奥，因此更适合学术界和理论家，但与你工作的现实世界并不真正相关。最后，你可能简单地认为进行此类测试活动所需的时间和精力是不值得的，或者至少很难证明其合理性。结果，许多人怀疑这些活动的真正价值。本书致力于改变这种错误的看法，或者至少让读者了解这些主题的真正价值。\n\
  \n本章提供了关于数据库`基准测试`、`压力测试`和`工作负载捕获/回放`的所有基本定义和我们的通用词汇。此外，它还解释了为什么、何时以及如何运用这些不同的技术是值得的。最后，也是最重要的，本章详细阐述了如何从这些不同的方法中做出最佳选择，因为我们通常都会发现，在生活中知道何时为特定工作使用特定工具是最有价值的。当我们看到涉及钉子的任务时，我们会想到锤子；当涉及螺丝时，我们会想到螺丝刀。一旦你对这些数据库技术也有了同样的、本能的“*直觉*”，你会发现每一种技术都是你工具带上不可或缺的工具。达到这种熟练程度需要一些时间，但非常值得。\n\
  \n\n\n## 什么是数据库压力测试？\n\n这看似一个极其简单的问题，但其答案可能比你想象的更为重要。大多数人对被称为**心脏压力测试**的简单程序都有基本了解。这是指医生（通常是心脏病专家）将你连接到心脏监护仪上，让你在跑步机上快走或跑上一段时间。用外行的话来说，其目标是\
  \ `让你的心率上升` 并 `让你出汗`。医生通过将患者连接到心电图监护仪上，当然是为了获取更有价值的详细信息。虽然这样的测试通常无法识别具体的病症，但它对于检测值得关注的早期迹象具有很高的预测价值。简而言之，这种简单的医学测试非常宝贵，因此它如此频繁地被进行。\n\
  \n那么，你的数据库呢？它有多健康？虽然你的数据库在当今典型的、已知的工作负载下的性能可能不是问题，但如果你把数据库推到 `让它心率上升` 并 `让它出汗` 的地步，会发生什么？你可能会认为这种数据库压力测试属于简单而审慎的容量规划范畴。这将允许数据库管理员回答关键的管理问题，例如数据库应用程序的资源消耗何时会增长到需要订购更多计算资源的地步？然而，尽管这听起来很有用，但这通常并不是你被要求或认为明智进行任何数据库压力测试的原因（本章稍后会详述）。\n\
  \n那么，你究竟如何对数据库施加压力以 `让它心率上升` 并 `让它出汗`？与心脏病专家有明确界定且几乎普遍接受的既定最佳实践和程序不同，当所有数据库本质上都大不相同时，如何对数据库进行可靠且可重复的压力测试？对于许多数据库管理员来说，答案是他们在高峰使用时段监控数据库，并捕获数据库应用程序中那些看起来开销很大的、预期中显著的一部分语句。然后，这些语句被拼凑成一个单独的脚本或程序，数据库管理员可以执行它，以测量特定更改前后或一段时间内的结果，从而评估潜在的差异。\n\
  \n虽然这看起来相当合理，但这种简单的方法有几个缺点。首先，它具有很大的随机性。如果数据库管理员选择了错误的监控时间段，或者在监控期间遗漏了一些重要且开销大的数据库语句执行怎么办？其次，一旦被捕获，它就成为了数据库应用程序在被捕获那天状况的一个快照。如果应用程序的下一个版本在性质上发生重大变化怎么办？第三，不同的数据库管理员可能不会选择相同的监控时间段或设定哪些数据库语句执行是重要的。事实上，即使是同一个数据库管理员，如果重复进行第二次监控和捕获过程，也可能无法做到。因此，这种方法缺乏实际的可靠性和可预测性。它确实有一些有限的价值，但不能现实地作为先测量然后比较数据库性能的普遍接受的方法。需要更多（的手段）。\n\
  \n## 什么是数据库基准测试？\n\n一般来说，数据库基准测试是一种定义明确、普遍接受、行业标准的数据库压力测试，具有清晰的性能度量指标，用于针对给定的数据库规模和并发用户工作负载测量和比较结果。此外，在相同参数下，这些压力测试原则上被认为是跨多次运行可靠的。这意味着，从统计学上讲，所归因的性能分数在不同测试运行之间不应有显著变化。而且，这种压力测试被认为在不同数据库版本、数据库供应商甚至显著不同的数据库部署场景（例如，在专用服务器\
  \ vs. 虚拟服务器、本地部署 vs. 云端等）中都是可行且可靠的。简而言之，数据库基准测试是数据库管理员在逻辑上等同于心脏病专家的跑步机心脏压力测试的东西。\n\
  \n那么，这些数据库基准测试从何而来？更重要的是，在众多来源中，哪些被认为是创造了真诚且持久的行业标准？最后，数据库管理员应将哪些来源以及由此产生的数据库基准测试添加到他的工具库中？这些都是重要的问题，需要简要回顾历史，以便为有意义的欣赏提供适当的背景和上下文。\n\
  \n随着 20 世纪 80 年代初基于结构化查询语言的关系数据库的出现，能够为新的数据库赋予某些性能指标变得重要得多。早期的网络和层次数据库通常性能很高，因为它们基于物理指针的基本性质。然而，基于科德\
  \ 12 条规则的新型关系数据库则截然不同，它们依赖基于数据值的逻辑引用。这种方法使数据库程序员从专注于 `如何访问` 中解放出来，允许他们专注于 `要访问什么`。数据库系统现在负责存储数据的数据结构和解析查询的检索过程。这种从物理数据访问到逻辑数据访问的根本转变并非没有代价，因此产生了能够可靠地度量该成本的需求，从而产生了对数据库基准测试的新需求。\n\
  \n数据库基准测试的一个明显早期来源是学术界，因为关系数据库如此新颖，并且基于关系代数和关系演算的数学基础。其中一个早期例子是 1983 年^(¹)来自威斯康星大学计算机科学系的\
  \ `Wisconsin Benchmark`。其主要目标是提供一种测试关系数据库系统所有主要底层组件性能的方法。\n\n然后在 1985 年，`Debit-Credit\
  \ Benchmark`^(²)（后来被称为 TP1）首次亮相，由吉姆·格雷编写，学术界、数据库供应商甚至用户都做出了贡献。\n\n随后在 1987 年，吉姆·格雷使用借记-贷记工作负载编写了\
  \ `Top Gun Benchmark`^(³)。\n\n从 1985 年（在 *Datamation* 杂志发表一篇数据库基准测试文章之后）到 1988 年，一场数据库基准测试之战随之而来，硬件和软件供应商开始了一场争强斗胜的较量。格雷招募了其他人，并试图通过成立事务处理理事会（\
  \ [`www.tpc.org`](http://www.tpc.org) ）来为这种混乱带来秩序，其使命声明^(⁴)写道：\n\n> TPC 是一个非营利性公司，旨在定义事务处理和数据库基准测试，并向行业传播客观、可验证的\
  \ TPC 性能数据。\n\n数据库基准测试的另一个来源是大型硬件供应商（例如，吉姆·格雷在创作他的一些作品时就在 Tandem Computers 公司）。其中一些基准测试在数据库方面是相当中立的。一个很好的例子是，戴尔为\
  \ SQL Server、Oracle、MySQL 和 PostgreSQL 提供了非常流行的开源 `DVD Store Benchmark`。该基准测试的目的写道：\n\
  \n\n\n>*DVD Store Version 2 (DS2)* 是一个完整的**在线电子商务测试**应用程序，包含后端数据库组件、Web 应用层和驱动程序。设计数据库组件和中间层应用的目标在于充分利用许多高级数据库特性（事务、存储过程、触发器、参照完整性），同时保持数据库易于安装和理解。DS2\
  \ 工作负载可用于测试数据库，也可作为任何目的的压力测试工具。\n\n然而，虽然某些硬件供应商的数据库基准测试可以在不同数据库供应商之间进行一定程度的公平和可靠性的比较（如戴尔\
  \ DVD Store 基准测试），但那些侧重于特定组件（如 I/O 子系统）的其他硬件供应商数据库基准测试通常则不能。一个很好的例子是非常流行的 \"`Silly\
  \ Little Oracle Benchmark`\" (SLOB)。该基准测试旨在突出基于闪盘系统的原始数据库写入性能。因此，它的设计更侧重于测试写入活动而非读取。本质上，它只发出两个命令：大规模更新和计数选择。因此，它实际上并不测试查询优化器或数据库引擎的任何其他高级方面——只测试它写入数据的速度有多快。这并不意味着它是一个糟糕的测试或需要避免使用它。但你需要了解它实际测试的是什么以及它真正报告的是什么。事实上，作者^(⁵)\
  \ 在他的网页上明确指出：\n\n>*`SLOB` 不是数据库基准测试。`SLOB` 是一个 Oracle I/O 工作负载生成工具包。我需要指出，由于习惯使然，许多\
  \ `SLOB` 用户将 `SLOB` 与基准测试和负载等术语互换使用。`SLOB` 旨在填补 `Orion` 和 `CALIBRATE_IO`（正如这里部分解释的，两者都不产生合法的数据库\
  \ I/O）与全功能事务基准测试（如 `Swingbench`）之间的空白。事务负载旨在测试数据库的事务处理能力。*\n\n数据库基准测试的另一个来源是一些开源工作，特别是一些较大的开源数据库项目。例如，PostgreSQL\
  \ 提供 \"`pgbench`\" 作为比较性能的标准工具。虽然它使运行测试变得相当容易，但它仅适用于 PostgreSQL，并且更重要的是，文档明确指出：\n\
  \n>*要进行基准测试，必须执行与生产负载和查询类型相似的测试。例如，`pgbench` 查询不执行连接、在文本字段上使用正则表达式的 where 子句，以及许多应用程序中会出现的其他查询类型。*\n\
  \n此外，MySQL 提供了 \"`MySQL Benchmark Tool`\"，它仅针对 MySQL 数据库运行三个数据库基准测试：\n1.  `DBT2`\n\
  2.  `SysBench`\n3.  `flexAsynch`\n\n其中文档对这些数据库基准测试定义如下：\n\n>*`DBT2` 是一个模拟拥有大量仓库的公司\
  \ OLTP 应用的开源基准测试。它包含处理新订单、订单录入、订单状态、支付和库存处理的事务。`FlexAsynch` 是专门开发用于测试 MySQL Cluster\
  \ 可扩展性的基准测试。`Sysbench` 是一个流行的开源基准测试，用于测试开源 DBMS。*\n\n到目前为止，数据库基准测试拥有一个漫长、多样且非常有趣的历史，这一点应该相当清楚了。然而，同样显而易见的是，只有\
  \ `TPC` 基准测试旨在客观地测试现实世界的数据库性能并提供公平的结果。我们将在第 2 章更全面地介绍所有相关的 `TPC` 数据库基准测试。\n\n##\
  \ 什么是工作负载捕获/回放？\n\n对许多人来说，针对特定目的（如\"`在线事务处理`\" (`OLTP`) 或 \"`数据仓库`\" (`DW`)）的行业标准数据库基准测试这一概念已经足够。但对有些人来说，这些预先封装的\"\
  `合成`\"测试还不够。他们希望根据其数据库应用程序的实际性质，获得更现实和有意义的东西。他们本质上渴望的是进行数据库压力测试的第一种方法（即监控和捕获命令），但希望是针对\
  \ 100%的活动，而不仅仅是手动、有些随机的样本。他们想要全部。他们希望在一段定义的时间内获得其所有数据库活动的完整快照。此外，他们希望它以可按需回放的方式打包。简而言之，他们想要的就是所谓的**工作负载捕获和回放**。这基本上就是它的名字所表达的意思，对于许多数据库管理员来说，这是他们认为唯一有意义的基准测试。\n\
  \n很难反驳这种自然而合乎逻辑的观点。这完全符合常识。但正如谚语所说，\"`通往地狱的道路由善意铺就`\"，意思是说，良好的意愿在付诸行动时可能会产生意想不到的后果。为了使工作负载捕获/回放真正具有代表性，你必须使用大小完全相同且数据相同（或至少数据分布相同）的数据库，这样结果才准确。这意味着需要复制你整个\
  \ 100TB 的生产数据库，保持数据原样进行测试，因此不能进行数据子集化或数据屏蔽。这转化为非常大的硬件和软件成本，此外，由于真实的生产数据现在在你的测试环境中完全可用，这构成了巨大的安全风险。你的管理层可能会对预算影响有点小题大做，但你的安全与合规人员会因为你这样做而让你丢掉工作。\n\
  \n工作负载捕获和回放的另一个主要问题是，并非每个数据库供应商都提供此功能，而对于那些提供的供应商来说，该功能可能成本高昂（Microsoft SQL Server\
  \ 是一个显著的例外）。当然，数据库供应商的工作负载捕获/回放工具只适用于其自身的数据库。对于许多公司来说，这意味着需要采用多种工具，因为如今我们都部署不止一个数据库供应商的产品。也有一些第三方软件供应商，但数据库供应商通常不会共享其系统内部细节，因此有些人质疑在没有这种访问权限和洞察力的情况下，此类解决方案的有效性和效率如何。尽管如此，对于那些希望其数据库基准测试能反映其数据库应用程序实际性能的人来说，工作负载捕获/回放仍然是他们追求的圣杯。\n\
  \n## 为什么这些技术有用\n\n如前所述，数据库基准测试有其真正的怀疑论者。然而，我们中没有人会像环保署 (`EPA`) 那样驾驶车辆来验证燃油经济性，但我们都会寻找购买任何新车时贴在车窗上的标签，当油价昂贵时，我们常常将那个数字视为重要信息。因此，我们清楚地看到了该基准测试的预测价值，并接受它所提供的洞察力。虽然我们不期望在自己的驾驶中达到相同的燃油经济性评级，但我们确实真诚地期望它在比较车辆时相对准确。作为人类，拥有这样一个对其可靠性有一定信念的比较是非常令人安心的，并使决策过程压力小一些。\n\
  \n在日常生活中，人们依赖的类似基准测试有几十种，然而数据库基准测试却常常受到极大的怀疑。所以，让我们来审视一些你可能需要回答的问题，对于这些问题，你可能需要基准测试可能提供的一些见解（当然，前提是选择了合适的基准测试）。关键在于，如果你在购买新车时会欣然依赖\
  \ `EPA` 的油耗基准测试，那么你一定相信某些基准测试的价值，那为什么对你的数据库不能同样如此呢？\n\n\n## 这些技术何时具有价值\n\n想象一下，作为数据库管理员，你的老板问你：“如果我们进行以下操作，预计会对生产数据库性能产生什么影响？”：\n\
  \n*   对操作系统和/或数据库应用主要版本升级？\n*   从基于 RISC CPU 的专有 UNIX 系统迁移到基于 Intel CISC CPU 的 Linux\
  \ 系统？\n*   在戴尔、惠普和联想同等价位的服务器中选择？\n*   从 Windows Server 迁移到 Linux，或反之亦然？\n*   从物理服务器迁移到虚拟机监控程序？\n\
  *   从 VMware 等商业虚拟机监控程序迁移到 KVM 等开源方案？\n*   按实例整合数据库？\n*   从本地部署迁移到云端？\n*   升级到下一个云定价层级？\n\
  \n这些只是其中少数几个问题。那么，你该如何回答这类问题呢？即使拥有超过 30 年的数据库经验，我也只能对其中少数几个问题提供合理的见解，而且可能无法结合当时所需的具体上下文，向管理层提供可靠的建议。因此，在这种情况下，经验丰富的数据库管理员通常会进行一些测试，通常被称为\
  \ `概念验证`（POC）项目。那时，你必须决定是进行简单的压力测试、数据库基准测试，还是工作负载捕获/重放。\n\n一个常见的合理反驳是：“我们不经常做出此类决策，所以在遇到这类问题之前，这并不太重要或不值得担心。”我非常理解，数据库管理员总是被要求或被告知要用更少的资源做更多的事。他们根本没有足够的时间或精力去精通每一项技术。但过去十年数据库领域发生的变化表明，数据库的部署方式已经演变：先是虚拟化，现在正迁移到云端。因此，这类问题比过去发生的频率高得多。事实上，如今的数据库管理员或数据架构师很少不面对这类问题。\n\
  \n## 如何在这些选项中做选择\n\n既然我们已经探讨了这些不同技术为何重要以及何时重要，剩下的问题就是：应该选择哪一种？就像生活中任何重大决定一样，一个合理而非轻率的回答是\
  \ `这要视情况而定。` 然而，我主张在许多（即使不是大多数）情况下，你应该给数据库基准测试一个实际的考虑。可以说，它比通过临时监控数据库来创建压力测试脚本、捕获你认为并希望是真正代表性的工作负载，要更快、更可靠。它也不需要使用可能涉及机密、甚至可能非法复制到测试环境中的真实数据。最后，它不会增加工作负载捕获/重放工具的额外成本，而且该工具也依赖于使用真实数据。\n\
  \n是的，你可能会争辩说数据库基准测试依赖于合成的工作负载。然而，存在许多数据库基准测试，可以近似模拟各种工作负载类型，包括在线事务处理（OLTP）、数据仓库（DW）查询、批处理系统，以及用户自定义的、加权组合的所有上述类型。因此，你确实应该能够快速、轻松地组合一系列基准测试，以有意义且可接受地近似你的系统。这将使你能够专注于快速、准确地比较\
  \ `同类` 场景。\n\n对于资深的数据库管理员，你可能已经对你会做什么或者在提议的选项中有所偏好看法。我只是建议你以公正、开放的心态阅读本书，认识到数据库基准测试很可能会补充你现有的技能库。记住中国哲学家孔子的话：“开卷有益。”\n\
  \n对于更初级的数据库管理员或那些只是不习惯应对这些棘手的 `假设性` 数据库性能问题的人，你可能希望这本书能提供所有答案。然而，没有任何一本书能够拥有你对你的数据库及其数据的全部经验和洞察力。因此，我建议你阅读本书时，寻找你的目标与你所处的数据库上下文之间的最佳契合点。正如\
  \ `科学小子` 比尔·奈所说：“你遇到的每个人都知道一些你不知道的东西，因此你应该倾听他人并‘尊重他们的知识’。”\n\n## 后续内容\n\n假设你现在更加接受数据库基准测试的理念，你可能会问以下问题：\n\
  \n*   `第` 2 `章`\n    *   我应该学习和使用哪些行业标准的数据库基准测试？\n*   `第` 3 `章`\n    *   有哪些软件工具可以支持不同的数据库基准测试工作？\n\
  *   `第` 4 `章`\n    *   如何为真实的数据库基准测试工作做准备？\n*   `第` 5 `章`\n    *   在数据库基准测试过程中会出现哪些常见问题或失误？\n\
  *   `第` 6 `章`\n    *   在数据库基准测试工作中，哪些硬件选项很重要？\n*   `第` 7 `章`\n    *   在数据库基准测试工作中，哪些软件选项很重要？\n\
  *   `第` 8 `章`\n    *   如何有效地为数据库整合进行基准测试？\n*   `第` 9 `章`\n    *   如何有效地为数据库虚拟化进行基准测试？\n\
  *   `第` 10 `章`\n    *   如何有效地为公有云中的数据库进行基准测试？\n*   `第` 11 `章`\n    *   如何有效地执行数据库工作负载捕获和重放？\n\
  *   `第` 12 `章`\n    *   如何有效地执行简单的数据库压力测试？\n\n脚注 1  2  3  4  5\n\n\n"
- "# 2. 行业标准基准测试\n\n在第 1 章中，我们区分了数据库基准测试、数据库压力测试和工作负载捕获/回放。通过理解这些不同的方法，我们为共同的理解和术语奠定了基础。另外，我们还了解了为什么这些不同的技术是有用的，以及何时最好地利用它们。回顾一下，我们的基本定义是：\n\
  \n*   数据库压力测试本质上是不确定且有限的、人工的工作负载，旨在基本施压数据库的底层性能（即，让数据库“出汗”）。\n*   数据库基准测试是一个定义明确且被普遍接受的、行业标准的数据库压力测试，具有明确的性能指标，用于在给定的数据库大小和并发用户工作负载下衡量和比较结果。\n\
  *   工作负载捕获是实际数据库应用程序活动的一个定义明确且有限的快照，被记录下来以创建一个具有非人工工作负载的数据库基准测试，用于回放以比较前后性能。\n\n\
  在本章中，我们将回顾所有重要的行业标准数据库基准测试。此外，我们将它们分为两大类：当前流行的和现已不受欢迎的。这些数据库基准测试大多由事务处理委员会（[`www.tpc.org`](http://www.tpc.org)）开发，少数起源于大学。了解当前流行和不再受欢迎的行业标准数据库基准测试都很重要，因为前者往往植根于后者。最后请注意，每个行业标准数据库基准测试往往专注于特定类型的工作负载；因此，了解所有这些基准测试将使您能够为您的需求选择合适的一个。事实上，您很可能会发现，为了最好地近似您想要测试的工作负载，您需要混合使用多种基准测试。所以，再次强调，掌握所有这些基准测试的知识对于您进行测试至关重要。\n\
  \n## 最流行的基准测试\n\n现在让我们讨论最流行的基准测试。\n\n### TPC-C\n\nTPC-C 可能是认知度最高、理解度最低，且经常被错误引用的数据库基准测试。它也是大多数数据库基准测试工具所提供的，但这些工具可能由于程序默认设置或超出规范的、用户可定义的选项，并未遵守基准测试规范的本意。此外，这些数据库基准测试工具可能会要求用户提供定义测试性质的运行时参数，但除非用户阅读过数据库基准测试规范，否则他们不知道如何正确提供这些参数。再者，大多数数据库基准测试工具不以一致的方式报告其结果，或者因其默认设置（可能符合也可能不符合规范）而获得截然不同的结果。最后，大多数人只是孤立地关注测试结果的一部分，例如每秒事务数（`TPS`），而没有适当的上下文进行任何有意义的解释。因此，TPC-C\
  \ 因各种错误的原因而声名狼藉。\n\n让我们从查看 [`tpc.org`](http://tpc.org) 网站和 TPC-C 规范中的数据库定义开始：\n\n\
  *   网站：TPC-C 是一个 OLTP 基准测试。由于它包含多种事务类型、更复杂的数据库和整体执行结构，因此它比之前的 OLTP 基准测试（如 TPC-A）更复杂。\n\
  *   TPC-C 规范：TPC-C 是一种 OLTP 工作负载。它是只读和更新密集型数据库事务的混合，模拟了一个复杂 OLTP 应用程序的活动。\n\n这两个定义除了说明它是基于\
  \ OLTP 的之外，并没有真正提供关于应用程序负载性质的任何有意义的见解。这里是一个更彻底、因此更有用的定义：\n\n> *TPC-C 于 1992 年获批，是最初的\
  \ OLTP 基准测试*，*其包含五种事务（新订单、支付、订单状态、发货和库存水平）的工作负载，试图模拟一个批发分销商，其拥有相当少的仓库来服务相对大量的零售地点。性能以每分钟新订单数来衡量。*\n\
  \n请注意，TPC-C 现在已经超过 25 年的历史了。它不能充分模拟当今现实世界的数据库工作负载，也不能正确施压当今硬件和数据库引擎的能力。因此，TPC-C\
  \ 正迅速失宠。TPC-C 现在被认为非常“`老派`”，并已被 TPC-E 所取代，这是一个更新且复杂得多的 OLTP 数据库基准测试，本章后面将介绍。尽管如此，TPC-C\
  \ 仍然是使用最广泛、被引用最多的基准测试，这就是为什么详细涵盖 TPC-C 数据库基准测试至关重要。让我们通过查看图 2-1 所示的 TPC-C 数据模型来继续我们的研究。\n\
  \n![../images/464117_1_En_2_Chapter/464117_1_En_2_Fig1_HTML.jpg](img/464117_1_En_2_Fig1_HTML.jpg)\n\
  \n图 2-1 TPC-C 数据模型\n\n\n### TPC-C 与 TPC-E 基准测试对比分析\n\n首先需要注意的是，按照当今典型数据库应用的标准，这个数据模型相当简单且规模极小，仅有九个表。事实上，它被认为如此简单和微小，以至于几乎没有价值，这也是为什么更新的\
  \ TPC-E 数据库基准被创建出来的原因。其次，观察其设计，它从左上角的`WAREHOUSE`表开始，该表与`DISTRICT`表存在 10 对 1 的父子关系。关键思想是每个`WAREHOUSE`拥有\
  \ 10 个终端，这相当于可能的并发用户会话数。这一点至关重要，因为规范明确要求数据库规模或缩放因子为每 10 个并发数据库用户会话对应 1 个仓库。如果你试图用超出规范的低`WAREHOUSE`数量（例如\
  \ 100 个用户，缩放因子为 1）来运行高用户负载，那么你的基准测试结果很可能会失真，并且你很可能会遇到数据库争用或锁定问题。然而，大多数数据库基准测试工具允许用户这样做，即请求运行\
  \ 1,000 个并发数据库会话，而缩放因子远低于规范要求的 100。\n\n## TPC-C 的数据库设计与问题\n\n为了更好地理解这一点，我们将检查规范要求的逻辑数据库设计，你会发现`DISTRICT`表存在一个固有的低效率。查看图\
  \ 2-2 所示的`DISTRICT`表所需定义。\n\n![../images/464117_1_En_2_Chapter/464117_1_En_2_Fig2_HTML.jpg](img/464117_1_En_2_Fig2_HTML.jpg)\n\
  \n图 2-2：DISTRICT 表布局\n\n注意，`D_NEXT_O_ID`列保存下一个可用的订单号，因此一个会话必须锁定该行以获取当前值，然后将其递增。这是在自动递增列或与序列号生成器绑定的表触发器出现之前，实现此概念的旧方式。之所以这样做，是因为并非所有数据库都提供这些高级功能。这就是为什么对于给定的缩放因子运行错误的用户负载（例如，1,000\
  \ 个用户，缩放因子为 1）会导致严重的数据库争用和锁定问题，因为所有会话都必须争夺有限数量的`DISTRICT`表行上的锁。然而，我几乎普遍看到那些没有阅读基准规范的人犯这个错误，他们只是抱怨数据库基准测试工具很差劲（即，不会报告他们期望看到的极高数值）。\n\
  \n## TPC-C 允许的高级特性\n\n数据库设计的另一个方面是，哪些高级物理数据库选项或模式对象定义修改是允许的？TPC-C 规范对此相当明确。以下是允许的：\n\
  \n*   用于主键约束的唯一索引\n*   水平表分区\n*   垂直表分区\n*   表复制\n\n一项不允许的高级数据库功能是物理表数据行聚类；然而，你会发现许多已发布的基准测试结果使用了此功能，因此是非官方的。幸运的是，大多数数据库基准测试工具通常默认或作为选项都不提供表聚类。不过，有些工具确实提供了水平分区表的功能。但分区方案往往相当通用，通常可以通过数据库管理员手动定义分区方案以最好地利用其硬件和数据库优化器来超越。最后请注意，由于\
  \ TPC-C 是一个较旧的数据库基准，来自数据库功能少得多的时代，它不推荐也不要求引用完整性（即外键约束）或其上的索引。然而，由于这是现代最佳实践，大多数数据库基准测试工具将创建外键以及在这些外键列上的索引。虽然从技术讲这“*不符合规范*”，但如果一致使用，这似乎是一个公平的改进。而且，当使用关系数据库时，它只是“*感觉对了*”。\n\
  \n## TPC-E 基准概述\n\nTPC-E 是一个旨在取代 TPC-C 的现代 OLTP 测试。TPC-E 试图解决 TPC-C 所有已知的缺点。自 2007\
  \ 年左右首次亮相以来，它的知名度要低得多，除了一些硬件和数据库供应商外，尚未那么流行。虽然数据库管理员可能听说过 TPC-E，但几乎没有人运行过这个数据库基准。此外，很少有数据库基准测试工具实现了\
  \ TPC-E；事实上目前只有两个，这将在第 3 章我们回顾当前可用的流行数据库基准测试软件时介绍。\n\n和之前一样，让我们首先从[tpc.org](http://tpc.org)网站和\
  \ TPC-E 规范来看 TPC-E 数据库基准的定义：\n\n*   网站：TPC-E 比以前的 OLTP 基准（如 TPC-C）更复杂，因为它具有多样化的事务类型、更复杂的数据库和整体执行结构。TPC-E\
  \ 涉及 12 种不同类型和复杂度的并发事务的混合。\n*   TPC-E 规范：TPC-E 是一种混合了只读和更新密集型事务的 OLTP 工作负载，模拟了在现代、复杂的\
  \ OLTP 应用环境中发现的活动。\n\n同样，这两个定义都没有真正提供任何关于应用程序工作负载性质的深刻见解，只是说它是一个更复杂、更现代的 OLTP 基准。这里是一个更全面、因此更有用的定义：\n\
  \n> TPC-E 基准模拟了一家经纪公司的 OLTP 工作负载。该基准的重点是执行与公司客户账户相关事务的中央数据库。尽管 TPC-E 的底层业务模型是一家经纪公司，但其数据库模式、数据填充、事务和实现规则被设计为广泛代表现代\
  \ OLTP 系统。\n\nTPC-E 的设计确实看起来、表现起来和感觉起来都像一个基于互联网的经纪公司可能实施的真实数据库应用。最有趣的是，TPC-E 包含了消费者对企业（C2B）以及企业对企业（B2B）类型的事务。此外，规范中促使其高度真实性的四个特点是：\n\
  \n*   同时执行跨越广泛复杂度的多种事务类型\n*   磁盘输入/输出和处理器使用的平衡混合\n*   通过主键和辅助键进行均匀和非均匀数据访问的混合\n\
  *   由大量具有各种大小、属性和关系的表组成的数据库，内容真实\n\n和之前一样，让我们通过检查图 2-3 所示的 TPC-E 数据模型来继续我们的研究。\n\
  \n![../images/464117_1_En_2_Chapter/464117_1_En_2_Fig3_HTML.jpg](img/464117_1_En_2_Fig3_HTML.jpg)\n\
  \n图 2-3：TPC-E 数据模型\n\n详细检查图 2-3 中的每个表并不重要。重要的是要注意，它看起来更像一个真实世界的数据模型，而不仅仅是某个学术练习的模型。与表很少且关系是简单父子性质的\
  \ TPC-C 不同，TPC-E 有很多表，关系也很复杂。事实上，如下面表 2-1 所示，这两个基准之间有几个重要的区别。\n\n表 2-1：TPC-C 与 TPC-E\
  \ 对比\n\n| 特性 | TPC-C | TPC-E |\n| --- | --- | --- |\n| 业务类型 | 批发分销商 | 经纪公司 |\n|\
  \ 总表数 | 9 | 33 |\n| 总列数 | 92 | 188 |\n| 每表列数范围 | 3 – 21 | 2 - 24 |\n| 平均每表列数 | 10.2\
  \ | 5.7 |\n| 只读事务数 | 2 | 6 |\n| 只读事务百分比 | 8% | 76.9% |\n| 读写事务数 | 3 | 4 |\n| 读写事务百分比\
  \ | 92% | 23.1% |\n| 数据生成方式 | 随机 | 普查数据 |\n| 检查约束数 | 0 | 22 |\n| 引用完整性 | 否 | 是 |\n\
  \n\n### 数据库基准测试：TPC-E 与 TPC-H\n\n#### TPC-E\n\n从表 **2-1** 中可以注意到四个关键差异。首先，`TPC-E`\
  \ 的表总数是 `TPC-C` 的 3.67 倍。因此它看起来更贴近现实。其次，读写比率更接近常规情况，即大多数活动是密集读取后伴随一些写入。第三，数据基于 2000\
  \ 年的人口普查数据，而不是在定义范围内简单生成的随机值。第四也是最后一点，数据库设计强制实施了当今大多数 `OLTP` 应用程序默认会做的引用完整性（事实上，很少有关系数据库专业人员会构建一个不强制外键的\
  \ `OLTP` 数据库）。因此，虽然 `TPC-E` 可能更难理解，但它值得付出努力，因为它比旧的 `TPC-C` 基准更逼真。然而，`TPC-C` 仍然是最常被引用的。\n\
  \n数据库设计的另一个方面是，允许哪些高级物理数据库选项或模式对象定义修改？`TPC-E` 规范对可以做什么和不可以做什么有相当明确的规定。以下是允许的：\n\n\
  *   表数据行聚簇\n*   用于主键约束的唯一索引\n*   用于外键约束的非唯一索引\n*   水平表分区\n*   垂直表分区\n*   表复制\n\n\
  请注意，`TPC-E` 允许两个 `TPC-C` 所没有的项目：表数据行聚簇和外键索引。这再次促成了数据库应用程序更逼真的普遍感觉。因此，当您正在寻找一个逼真的\
  \ `OLTP` 类型数据库基准时，`TPC-E` 是一个非常好的选择。虽然没有哪个基准是完美的，或者能 100% 准确地模仿您的 `OLTP` 应用程序，但\
  \ `TPC-E` 提供了一个非常合理的仿真版本。\n\n#### TPC-H\n\n`TPC-H` 是我最喜欢的数据库基准之一。事实上，我运行 `TPC-H`\
  \ 基准的次数可能比任何其他基准都多。许多其他人也经常使用和引用这个数据库基准。虽然不如 `TPC-C` 那么流行，但它可能是第二常被引用的数据库基准。在过去的十年左右，随着数据仓库和商业智能（`BI`）话题的热度，`TPC-H`\
  \ 蓬勃发展。而现在，随着数据挖掘和数据分析的兴起，`TPC-H` 仍然吸引了大量关注。\n\n像往常一样，让我们首先从 [tpc.org](http://tpc.org)\
  \ 网站和 `TPC-H` 规范中检查 `TPC-H` 数据库基准的定义：\n\n*   网站：`TPC-H` 是一个决策支持基准，由一套面向业务的即席查询组成。它展示了决策支持系统，这些系统检查大量数据，执行高度复杂的查询，并回答关键的业务问题。\n\
  *   `TPC-H` 规范：`TPC-H` 由一组具有现实业务背景的查询组成，旨在以代表复杂业务分析应用程序的方式测试数据库系统功能。\n\n这一次，网站和规范定义都提供了足够的信息来了解基准的基本要点。然而，这里有一个更全面、因此更有用的定义：\n\
  \n> *`TPC-H` 是一组 22 个非常复杂的 `SQL` 查询，典型于支持 `OLTP` 系统的报表数据库。这些查询旨在模仿最终用户通过商业智能工具提交的即席数据分析查询，以回答关键的业务问题。*\n\
  \n请注意它**没有**说明的是：`TPC-H` 不是一个星型模式设计的数据仓库（那是接下来要介绍的 `TPC-DS`）。当您检查图 **2-4** 中显示的\
  \ `TPC-H` 数据模型时，您会看到它实际上是另一个简单化的数据库设计，很像 `TPC-C`。\n\n![../images/464117_1_En_2_Chapter/464117_1_En_2_Fig4_HTML.jpg](img/464117_1_En_2_Fig4_HTML.jpg)\n\
  \n图 2-4 TPC-H 数据模型\n\n如果您仔细观察图 **2-4**，您会看到每个表都有一定数量的行，这取决于比例因子。因此，`LINEITEM` 表每个比例因子有\
  \ 600 万行。那么，当您运行 `TPC-H` 基准时，应该选择什么比例因子呢？规范并没有真正说明，也不应该说明，因为它旨在描述基准设计要求。然而，在那些经常运行\
  \ `TPC-H` 基准的人中，普遍共识是如下选择：小 = `300`；中 = `3,000`；大 = `30,000`；巨大 = `300,000`。虽然不完全准确，但您可以估算每个比例因子大约\
  \ `1GB`。因此，您可以指望的大致数据库大小估算是：小 = `300GB`；中 = `3TB`；大 = `300TB`；巨大 = `3PB`。请记住，根据定义，`TPC-H`\
  \ 执行的是扫描大量数据的 22 个复杂查询，因此这个数据库基准高度依赖于 `IO` 子系统的性能。如果您想在传统的旋转磁盘上执行中等规模或更大的 `TPC-H`，那么您应该拥有超过\
  \ `100` 个磁盘轴。`TPC-H` 确实要求被扫描的数据存储在并分布在许多磁盘上。当然，新的 `IO` 技术，如固态硬盘（`SSD`）、全闪存磁盘阵列、`PCIe`\
  \ 闪存磁盘和非易失性内存快速通道（`NVMe`），提供了更高的 `IO` 能力和更低的延迟，因此（目前）还没有关于如何最好地将大量 `TPC-H` 数据分布在它们之上的金科玉律。\n\
  \n数据库设计的另一个方面是，允许哪些高级物理数据库选项或模式对象定义修改？`TPC-H` 规范对可以做什么和不可以做什么有相当明确的规定。以下是允许的：\n\n\
  *   表数据行聚簇\n*   用于主键约束的唯一索引\n*   用于外键约束的非唯一索引\n\n\n\n*   水平表分区（包括多级分区）\n*   辅助数据结构（存在一些限制）\n\
  \n请注意，TPC-H 仅允许水平分区，不允许垂直分区。此外，TPC-H 也不允许数据复制。然而，允许使用辅助数据结构这一点是最独特且强大的特性。因此，常见的数据库管理员（DBA）查询优化技术，例如创建一个完全满足查询的索引，是被允许的。此外，像物化视图（即自动化的聚合表）这样的高级技术也被允许，并且可以显著提升性能。但请注意，目前没有数据库基准测试工具能自动或通过选项来利用这些特性。因此，需要由您作为\
  \ DBA 手动将它们添加到测试中。这种额外的努力通常是完全值得的。\n\n最后，为了更全面地理解 TPC-H，您真的需要查阅其规范并仔细研究所有 22 个复杂的查询。它们都是为了刻意给数据库内部的\
  \ SQL 优化器和执行引擎的各个方面施加压力而设计的。列表 2-1 展示了 TPC-H 中一个最不复杂且易于阅读的查询，即潜在零件促销查询（Q20）。根据 TPC-H\
  \ 规范，此查询用于识别特定国家/地区中，拥有可能是促销活动候选零件的供应商。\n\n```\nSELECT   s_name, s_address\nFROM\
  \ h_supplier, h_nation\nWHERE s_suppkey IN (\nSELECT ps_suppkey\nFROM h_partsupp\n\
  WHERE ps_partkey IN (SELECT p_partkey\nFROM h_part\nWHERE p_name LIKE 'dark%')\n\
  AND ps_availqty >\n(SELECT 0.5 * SUM (l_quantity)\nFROM h_lineitem\nWHERE l_partkey\
  \ = ps_partkey\nAND l_suppkey = ps_suppkey\nAND l_shipdate >=\nTO_DATE ('1997-01-01',\
  \ 'YYYY-MM-DD')\nAND l_shipdate <\nADD_MONTHS (TO_DATE ('1997-01-01',\n'YYYY-MM-DD'\n\
  ),\n\n)))\nAND s_nationkey = n_nationkey\nAND n_name = 'MOROCCO'\nORDER BY s_name\n\
  ```\n列表 2-1\nTPC-H 查询 #20\n\n这 22 个 TPC-H 查询的复杂性在预期的使用方面产生了一个非常有趣的副作用。我发现这 22 个查询非常适合比较数据库在大版本发布或小补丁更新后的相对性能提升或下降。我也发现它们同样适用于比较一个数据库供应商的\
  \ SQL 优化器和引擎与另一个的差异。这就是为什么 TPC-H 是我经常使用的最喜欢的基准测试之一的真实原因。\n\n##### TPC-DS\n\n最新且较为流行的数据库基准测试是\
  \ TPC-DS，它只存在了两年多一点（2015 年 8 月）。与 TPC-E 类似，TPC-DS 往往更受硬件和数据库供应商的青睐。一个值得注意的例外是 Jim\
  \ Czuprynski, Deiby Gomez 和 Bert Scalzo 最近出版的书《*Oracle Database 12c Release 2 Testing\
  \ Tools and Techniques for Performance and Scalability*》（Mc-Graw Hill Education,\
  \ 2017）。在那本书中，作者广泛使用 TPC-DS 基准测试来展示性能优化和数据库可扩展性的宝贵技术。事实上，这本书简直充满了来自 TPC-DS 的示例查询和工作负载，并附有修改建议以及优化前后的结果。这是因为，与\
  \ TPC-H 类似，TPC-DS 可用于比较数据库在大版本发布或小补丁更新后的相对性能提升或下降，也可用于比较一个数据库与另一个。\n\n让我们再次从[tpc.org](http://tpc.org)网站和\
  \ TPC-DS 规范开始，了解 TPC-DS 数据库基准测试的定义：\n\n*   网站：TPC-DS 是一个决策支持基准测试，它模拟了决策支持系统的多个通用方面，包括查询和数据维护。它为通用决策支持系统的性能提供了具有代表性的评估。\n\
  *   TPC-DS 规范：与网站定义相同。\n\n和之前一样，这两种定义都没有真正提供任何关于应用工作负载本质的有意义的洞见，只是说它模拟了决策支持系统的某些方面。这里有一个更详尽、也因此更有用的定义：\n\
  \n> *TPC-DS 模式专门设计用于模拟一个零售产品供应商的复杂数据仓库应用工作负载，该供应商为其客户提供通过三个主要销售渠道生成商品订单的能力：邮购目录、实体店和网站。该模式包含七个事实表和十七个维度，涵盖了从三个销售渠道中的任何一个处理退货的功能，以及库存跟踪功能。*\n\
  \nTPC-E 的设计非常复杂，而且它是一个真正的星型模式设计的数据仓库。七个主要的星型结构如图 2-5 至 2-11 所示。\n\n![../images/464117_1_En_2_Chapter/464117_1_En_2_Fig11_HTML.jpg](img/464117_1_En_2_Fig11_HTML.jpg)\n\
  \n图 2-11\n\nINVENTORY 的星型结构\n\n![../images/464117_1_En_2_Chapter/464117_1_En_2_Fig10_HTML.jpg](img/464117_1_En_2_Fig10_HTML.jpg)\n\
  \n图 2-10\n\nWEB_RETURNS 的星型结构\n\n![../images/464117_1_En_2_Chapter/464117_1_En_2_Fig9_HTML.jpg](img/464117_1_En_2_Fig9_HTML.jpg)\n\
  \n图 2-9\n\nWEB_SALES 的星型结构\n\n![../images/464117_1_En_2_Chapter/464117_1_En_2_Fig8_HTML.jpg](img/464117_1_En_2_Fig8_HTML.jpg)\n\
  \n图 2-8\n\nSTORE_RETURNS 的星型结构\n\n![../images/464117_1_En_2_Chapter/464117_1_En_2_Fig7_HTML.jpg](img/464117_1_En_2_Fig7_HTML.jpg)\n\
  \n图 2-7\n\nSTORE_SALES 的星型结构\n\n![../images/464117_1_En_2_Chapter/464117_1_En_2_Fig6_HTML.jpg](img/464117_1_En_2_Fig6_HTML.jpg)\n\
  \n图 2-6\n\nCATALOG_RETURNS 的星型结构\n\n![../images/464117_1_En_2_Chapter/464117_1_En_2_Fig5_HTML.jpg](img/464117_1_En_2_Fig5_HTML.jpg)\n\
  \n图 2-5\n\nCATALOG_SALES 的星型结构\n\n数据库设计的另一个方面是允许使用哪些高级物理数据库选项或模式对象定义修改？TPC-DS 规范对可以做什么和不可以做什么有相当明确的规定。以下是允许的：\n\
  \n*   表数据行聚簇\n*   用于主键约束的唯一索引\n*   用于外键约束的非唯一索引\n*   水平表分区（包括多级分区）\n*   垂直表分区\n\
  *   辅助数据结构（存在一些限制）\n    *   显式创建——作为某个指令的直接结果而自动创建\n\n\n\n*   **隐式** —— 并非因指令而创建。\n\
  \n请注意，`TPC-H` 仅允许水平分区，而不允许垂直分区。此外，`TPC-H` 也不允许数据复制。然而，其独特且强大的地方在于允许使用辅助数据结构。因此，常见的\
  \ `DBA` 查询优化技术（例如创建一个能完全满足查询需求的索引）是被允许的。此外，高级技术如物化视图（即自动化聚合表）也被允许使用，并能带来显著的性能提升。但请注意，目前没有任何数据库基准测试工具能自动或通过选项来利用这些功能。因此，需要由你作为\
  \ `DBA` 手动将这些添加到测试组合中。这种额外的努力通常是完全值得的。\n\n为了更全面地理解 `TPC-DS`，你确实需要查阅其规范并研究所有 100\
  \ 个复杂查询。`TPC-DS` 规范主要关注从可能海量的数据集中获取业务答案。从这个角度来看，`TPCDS` 基准测试最重要的部分是那近 100 个独立的查询，它们试图为这些特定的业务问题提供答案。每个\
  \ `TPC-DS` 查询都实现了不同程度的分析复杂性；有些查询会访问 10 个或更多的事实表和维度表，因此会根据为查询选择条件提供的值产生不同且复杂的执行计划。清单\
  \ 2-2 展示了一个 `TPC-DS` 的查询，业务查询 6 (`Q6`)。根据 `TPC-DS` 规范，此查询列出了所有至少有 10 名客户的州，这些客户在给定月份购买了价格比同类商品平均价格至少高出\
  \ 20% 的商品。\n\n```\nSELECT a.ca_state state, COUNT(*) cnt\nFROM  tpcds.customer_address\
  \ a ,\ntpcds.customer c ,\ntpcds.store_sales s ,\ntpcds.date_dim d ,\ntpcds.item\
  \ i\nWHERE a.ca_address_sk   = c.c_current_addr_sk\nAND c.c_customer_sk   = s.ss_customer_sk\n\
  AND s.ss_sold_date_sk = d.d_date_sk\nAND s.ss_item_sk      = i.i_item_sk\nAND d.d_month_seq\
  \ = (SELECT DISTINCT (d_month_seq)\nFROM  tpcds.date_dim\nWHERE d_year = 2001\n\
  AND d_moy    = 6)\nAND i.i_current_price > 1.2 * (SELECT AVG(j.i_current_price)\n\
  FROM  tpcds.item j\nWHERE j.i_category = i.i_category)\nGROUP BY a.ca_state\nHAVING\
  \ COUNT(*) >= 10\nORDER BY cnt\n```\n清单 2-2\n`TPC-DS` 查询 #6\n\n请注意，目前只有一个数据库基准测试工具实现了\
  \ `TPC-DS` 基准测试。但鉴于当前市场对与数据分析相关的所有事物的热情，我预计其他工具在不久的将来也会跟进。然而，这个包含 7 个星型模式和 100 个复杂查询的基准测试在实现上提出了巨大的挑战。\n\
  \n### 注意\n\n以下章节将对剩余的不太流行或已过时的数据库基准测试进行较简略的介绍。这并不一定意味着它们不够复杂或不值得，只是因为前述的数据库基准测试更为常见，因此读者更有可能会去执行它们。\n\
  \n## 较不流行的基准测试\n\n### TPC-DI\n\n回顾流行的数据库基准测试，我们有针对 `OLTP`、通用报表和星型模式数据仓库的测试。那么缺少的是什么？是通过批处理作业将数据加载到报表系统和数据仓库中！事实上，多年来，被加载和保留的数据量急剧增长。其规模之大，使得“提取、转换和加载”\
  \ (`ETL`) 这一术语已被更全面的“数据集成” (`DI`) 所取代。因此，`TPC-DI` 基准测试应运而生，以满足这一特殊而重要的细分需求。`TPC-DI`\
  \ 系统架构的概念模型如图 2-12 所示。\n\n![../images/464117_1_En_2_Chapter/464117_1_En_2_Fig12_HTML.jpg](img/46117_1_En_2_Fig12_HTML.jpg)\n\
  图 2-12\n`TPC-DS` 系统概念模型\n\n这个图应该不会让任何人感到意外，因为这是创建数据仓库时展示的典型架构图。有些人可能会跳过暂存区概念，直接加载到数据仓库中，这就是为什么暂存区用虚线框表示（即可选）。目标数据仓库设计是一个传统的维度模型，通常称为星型模式。这种方法在\
  \ 2002 年 Ralph Kimball 的著作《`The Data Warehouse Toolkit`》（Wiley）中得到了最佳描述。然而，Ralph\
  \ 实际上在早年 `Redbrick`（一家早期进入数据仓库数据库供应商领域的公司）时就首次提出了这样的设计。我实际上在 1995 年左右见过 Ralph，当时他正在做现场研讨会。他教了我星型模式，我教了他数据建模（我当时在\
  \ `Erwin` 数据建模工具的制造商 `Logic Works` 工作）。基于我在 1995 年学到并在之后八年多实践中运用的知识，我也在 2003 年写了一本书，名为《`Oracle\
  \ DBA Guide to Data Warehousing and Star Schemas`》（Prentice Hall）。尽管那本书距今已有 15 年，但其所倡导的技术至今仍然适用。\n\
  \n`TPC-DI` 数据仓库的基本概念数据模型如图 2-13 所示。\n\n![../images/46117_1_En_2_Chapter/46117_1_En_2_Fig13_HTML.jpg](img/46117_1_En_2_Fig13_HTML.jpg)\n\
  图 2-13\n`TPC-DS` 概念数据模型\n\n对于数据仓库的新手，这里出现了两个不同的术语。维度表是较小的、反规范化的表，包含最终用户查询的业务描述性列。这些表通常会被完全索引以最好地支持即席查询。事实表是非常大的表，其主键由所有相关维度表的外键列连接而成，并包含可用于最终用户查询期间计算的、可数字加总的非关键列。\n\
  \n### TPC-VMS\n\n随着过去十年虚拟化的热潮，数据库——即使是大型、任务关键的数据库——最终在 `Hypervisor`（例如 `VMware`）上作为虚拟机\
  \ (`VM`) 运行已成必然趋势。`SQL Server` 数据库管理员和开源数据库的用户欣然接受了这一转变。在 `Oracle` 等一些数据库平台上，数据库管理员起初是抗拒的，后来也缓慢地全面采用。然而，随着时间的推移以及现在数据库上云，几乎没有数据库管理员会对将其数据库放在\
  \ `VM` 上有任何保留意见。这导致了对一种可靠的、用于虚拟机环境的数据库基准测试的需求。请记住，服务器上的一个 `Hypervisor` 可能同时运行许多\
  \ `VM`，因此还必须处理数据库整合不同类型数据库的特殊考虑。\n\n`TPC-VMS` 于 2012 年推出，旨在满足这一特殊需求。`TPC-VM` 基准测试利用了前一节中流行的基准测试（即\
  \ `TPC-C`、`TPC-E`、`TPC-H` 和 `TPC-DS`）。然而，`TPC-VM` 认为其每个测试的版本都是独特的，因此它们彼此之间不可比较，与它们所派生的基准测试也不可比较。当你实例化一个\
  \ `TPC-VM` 基准测试时，你会选择上述四个基准测试中的一个，然后运行三个 `VM`，每个 `VM` 都运行所选基准测试下相同规模的数据库。结果的计算方式也有所不同。但由于它并不非常流行，我们将省略这些细节。它们在规范中有完整定义。\n\
  \n我唯一的缺点是，我宁愿让 `TPC-VMS` 运行四个基准测试中的三个甚至全部四个，以便可以测试不同的工作负载。也许这将在未来的规范更新中得到解决，或者甚至可能出现一个全新的基准测试（因为评分方式可能不得不有所不同）。\n\
  \n\n\n### 威斯康星基准\n\n威斯康星基准测试是业界最古老的数据库基准测试之一。它大约诞生于 1981 年，正值基于 SQL 的新关系数据库兴起之际。我将威斯康星基准纳入本书，是因为它具有重大的历史相关性。它源于一个计算机性能孱弱、磁盘空间成本高昂、关系数据库刚刚崭露头角的时代。因此，威斯康星基准的模式仅有三张表：一张仅含\
  \ 1,000 行，另外两张各含 10,000 行。整个数据库的大小仅为 5 兆字节。此外，它总共包含 32 条 SQL 命令（26 次插入、2 次更新、2 次删除和\
  \ 2 次选择）。在 SQL 数据库新技术初现、计算机资源有限的早期，这个测试或许相当合理。但以今天的计算标准来看，它作为测试基准实在太薄弱了，无法用于任何有意义的评估。然而，作为最早的数据库基准测试之一，也是后来那些基准的前身，它至少值得我们了解。\n\
  \n### AS³AP 基准\n\nANSI SQL 标准可扩展且可移植基准是另一项相当古老的业界标准数据库基准。它大约诞生于 1984 年，在很多方面都是威斯康星基准的扩展。我将其纳入本书，是因为你仍然能找到对它的引用，并且其中一款数据库基准测试工具仍然提供它。AS³AP\
  \ 的模式仅有五张表：一张有 1 列 1 行，另外四张表的行数根据缩放因子从 10,000 行到十亿行不等。因此，其总数据库大小从 4 兆字节到 400 千兆字节不等（再次强调，以今天的标准看非常小）。你需要选择能在\
  \ 12 小时或更短时间内完成基准测试的最大缩放因子（目标是尽可能接近 12 小时）。该基准包括单用户和多用户工作负载，并包含了创建、加载和索引数据库的所有时间。此基准要求的唯一度量指标是在\
  \ 12 小时窗口限制内的总查询耗时。\n\n## 已过时的基准测试\n\n### TPC-A 基准\n\nTPC-A 基准是源自[tpc.org](http://tpc.org)工作的第一个官方基准。它是第一代联机事务处理数据库基准，力求模拟典型银行的交易工作负载，并侧重于更新（由于工作负载存在偏向且被人为地保持简单，TPC-A\
  \ 并不代表一个真正的 OLTP 基准）。TPC-A 仅有四张表：账户、分行、出纳员和历史，如图 2-14 所示。每个分行有 10 个出纳员、10 个终端和 100,000\
  \ 个账户。它起源于 1989 年，并在 1995 年被视为已过时。\n\n![../images/464117_1_En_2_Chapter/464117_1_En_2_Fig14_HTML.jpg](img/464117_1_En_2_Fig14_HTML.jpg)\n\
  \n图 2-14: TPC-A 数据模型\n\n### TPC-B 基准\n\nTPC-B 基准实际上是一个数据库压力测试（这些术语的区别在第 1 章中已阐述）。它专门设计用于对数据库系统的核心部分（如\
  \ IO 带宽和处理时间）进行压力测试。它本质上就是 TPC-A，拥有与图 2-14 所示相同的简单表结构，但采用了截然不同且人为设计的工作负载。TPC-B 使用单一、简单、更新密集型的交易来对数据库施加压力。它通过产生大量的小型读写任务来对内存和磁盘\
  \ I/O 子系统进行压力测试。它起源于 1990 年，并在 1995 年被视为已过时。\n\n### TPC-D 基准\n\nTPC-D 基准是第一个面向数据仓库类工作负载的基准。在许多方面，它是\
  \ TPC-H 基准的前身（甚至拥有相同的数据库设计——请回顾图 2-4）。主要区别在于它只有 17 个查询，而不是 22 个。它起源于 1989 年，并在 1999\
  \ 年被视为已过时。\n\n### TPC-R 基准\n\nTPC-R 基准是 TPC-H 基准的一个无限制版本（相同的 22 个查询和相同的数据库设计——请回顾图\
  \ 2-4）。主要区别在于它允许无限制的索引和分区，以便让人们能更充分地利用数据库功能。它起源于 1999 年，并在 2005 年被视为已过时。\n\n###\
  \ TPC-W 基准\n\n可以说，TPC-W 基准甚至算不上一个真正的数据库基准，而是一个包含数据库的 Web 应用程序基准。事实上，该规范甚至允许将数据库替换为你喜欢的任何数据存储，甚至包括文件系统解决方案。其工作负载本质是一个模拟面向商业的交易型\
  \ Web 服务器活动的互联网商务环境。它起源于 2003 年，并在 2005 年被视为已过时。如图 2-15 所示，在此提及它仅为了完整性。\n\n![../images/464117_1_En_2_Chapter/464117_1_En_2_Fig15_HTML.jpg](img/464117_1_En_2_Fig15_HTML.jpg)\n\
  \n图 2-15: TPC-W 数据模型\n\n"
- '# 总结


  基准测试如此之多，时间却如此有限！在本章中，我们回顾了各种数据库基准测试、它们的起源及其大致用途。之所以用整章篇幅来介绍这些历史和背景，是为了让读者能够明智地从众多基准中选择那些最符合自己兴趣的。此外，本书提供了足够的信息，鼓励读者去寻找并阅读所选数据库基准测试的规范文档，其中提供了更详细的信息。例如，TPC
  规范都包含一个附录，详细说明了用于创建所有数据库对象的 SQL DDL。因此，虽然本书可以为读者指明正确的方向，但只有实际的规范才能回答所有问题。所以，它们是取得成功必读的材料。




  '
- '# 3. 基准测试工具


  在第 1 章中，我们区分了数据库基准测试、数据库压力测试以及工作负载捕获/重放。接着在第 2 章，我们涵盖了所有相关的数据库基准测试，包括当前和过去的（即已淘汰的）。这很像一个青少年学习驾驶汽车，你现在已经学习了交通规则并通过了笔试，获得了学习驾驶许可证。现在是时候运用这些知识，进行一些实际驾驶了（远在参加最终路考之前）。为此，这位既紧张又兴奋的青少年需要一辆车和一位坐在副驾驶的合法驾驶员（注意还有其他限制，例如不能载其他青少年，不能在夜间驾驶）。类似地，对于数据库基准测试，你需要一些工具，在获得足够经验之前，你需要在限制条件下进行一些测试驾驶，然后才能真刀真枪地干。因此，在第
  3 章，我们将介绍一些可用的数据库基准测试工具以及如何最好地使用它们。此外，我们还将介绍一些你可能认为是基准测试工具，但更符合数据库压力测试或工作负载捕获/重放工具类别的其他工具。


  汽车驾驶的例子也适用于描述各种数据库基准测试工具的实际使用复杂程度。有些车是自动挡，而另一些是手动挡。大多数人会同意自动挡更容易驾驶，但由一个经验丰富的司机驾驶手动挡应该能获得更好的油耗。同样，我们基本上都偏爱有动力转向和刹车的汽车，因为这些功能确实让驾驶变得轻松得多。当前的数据库基准测试工具也是如此；有些自动化程度高，因此易于使用，而另一些则更困难，但可能提供更大的灵活性。因此，需要根据要使用的工具类型进行适当的准备。此外，就像汽车一样，你应该能够使用任何一种类型到达你的目的地。当然，你的油耗和经验可能会有所不同。


  最后，请注意，虽然本章旨在为你提供所有必备的基础知识以及一些有用的技巧和窍门，但合乎逻辑的是，要成为一名能够合理测试高级场景以获得可靠且**可重复**结果的专家，需要时间和毅力。请注意，`可重复`是最难也是最重要的目标。一辆车能跑一次
  125 英里/小时，并不意味着它能轻易重复这一壮举。在此过程中有许多变量在起作用。结果必须与所有变量相关联，并且条件必须能在某个合理的接近范围内重复。否则，就只是一个非常幸运的`一次性`结果，几乎没有价值。


  ## 存储基准测试


  在研究数据库基准测试工具之前，我们必须首先认识到那些即使非常流行但也不被归类为真正数据库基准测试工具的工具。有时，数据库管理员（通常与存储管理员合作）会专注于每秒的
  IO 速率或 IOPS。他们对磁盘驱动器读写数据的速度比数据库引擎本身更感兴趣。因此，他们不关心实际的数据库事务，而是关心原始的 IO 速率。例如，仅通过了解发动机的
  RPM（每分钟转速）你无法真正知道一辆车能跑多快。同样，仅通过了解磁盘的 IOPS，你也无法了解实际的数据库性能特征。是的，磁盘的 IOPS 越快，数据库可能也越快，但仅凭
  IOPS 你确实只能**猜测**数据库性能。虽然这是一个影响因素，但它不是唯一的因素，甚至在很多情况下不是最重要的因素。就像汽车一样，我们需要知道除 RPM 之外的其他因素，例如变速箱齿轮比和轮胎尺寸。尽管如此，即使这些工具只能提供真实数据库性能的最基本概念，它们仍然非常受欢迎。


  ### WINSAT


  如果你的数据库运行在 Microsoft Windows 机器上，那么一个非常简单的内置 IO 测试工具是 `WINSAT` 命令。在我的 Windows 机器上，数据库数据文件位于
  `D:` 盘，这是一个三星 SATA-III SSD；因此命令将是 `winsat disk –drive D`（注意：驱动器字母后不要加冒号）。图 3-1 显示了输出示例。


  ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig1_HTML.jpg](img/464117_1_En_3_Fig1_HTML.jpg)


  图 3-1


  Windows `WINSAT` 实用程序


  ### HDPARM


  如果你的数据库运行在 Linux 机器上，那么一个非常简单的内置 IO 测试工具是 `hdparm` 命令。在我的 Linux 机器上，数据库数据文件位于 `/disk2`
  盘，这是一个三星的传统 SATA-III 磁盘；因此命令将是 `hdparm –x /dev/sdb1`。图 3-2 显示了输出示例。


  ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig2_HTML.jpg](img/464117_1_En_3_Fig2_HTML.jpg)


  图 3-2


  Linux `HDPARM` 实用程序


  ### SQLIO


  如果你的数据库运行在 Microsoft Windows 机器上，那么一个已过时但仍流行的 IO 测试工具是 `SQLIO` 实用程序。虽然它已不再在 Microsoft
  网站上提供，但许多免费软件网站仍然可以找到它。在我的 Windows 机器上，数据库数据文件位于 `D:` 盘，这是一个三星 SATA-III SSD；因此命令将是
  `sqlio –dD`（注意：驱动器字母后不要加冒号）。图 3-3 显示了输出示例。


  ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig3_HTML.jpg](img/464117_1_En_3_Fig3_HTML.jpg)


  图 3-3


  Microsoft `SQLIO` 实用程序


  ### DISKSPD


  如果你的数据库运行在 Microsoft Windows 机器上，那么当前流行的 IO 测试工具是 `DISKSPD` 实用程序。你可以从 Microsoft
  网站 [`https://aka.ms/diskspd`](https://aka.ms/diskspd) 获取它。在我的 Windows 机器上，数据库数据文件位于
  `D:` 盘，这是一个三星 SATA-III SSD；因此命令将是 `diskspd d:`。图 3-4 显示了输出示例。


  ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig4_HTML.jpg](img/464117_1_En_3_Fig4_HTML.jpg)


  图 3-4


  Microsoft `DISKSPD` 实用程序


  ## 数据库模拟


  数据库模拟的概念相当简单；数据库供应商知道其数据库引擎通常会产生什么样的 IO 模式，因此他们可以提供工具来模拟这些 IO 模式进行测试，而无需实际创建和基准测试数据库。虽然这类产品不是真正的基准测试工具，但对于一些想要在
  IO 层面（通常是着眼于 IOPS）检查更低层性能的数据库管理员来说，它们仍然提供了有价值的见解。


  ### SQLIOSTRESS


  如果你的数据库是 Microsoft SQL Server，那么一个已过时但仍被铭记的数据库模拟工具是 `SQLIOSTRESS` 实用程序。它已不再在 Microsoft
  网站上提供，我也无法在任何免费软件网站上找到它。我在这里提及它只是为了完整性，因为它已被 `SQLIOSIM` 取代。




  ### SQLIOSIM


  如果您的数据库是 Microsoft SQL Server，那么当前的数据库模拟工具是 SQLIOSIM 实用程序。您可以通过网络搜索获取 Microsoft
  网站 URL 以下载当前版本。还需注意，SQLIOSIM 甚至不需要安装 SQL Server，因为它完全模拟了 SQL Server 会向 I/O 子系统请求的
  I/O 命令。SQLIOSIM 是一个非常强大的工具，但其选项过多，无法在此详述。对于最简单的部署，只需将下载的文件解压缩到一个目录中。同时，也解压缩包含在该主
  zip 文件中的配置文件。然后将默认配置文件 `sqliosim.default.cfg.ini` 复制为 `sqliosim.cfg.ini`。最后，编辑该复制的文件，在接近底部的位置取消注释两个
  FILE 部分，以指定要模拟的设备上的 SQL Server 数据和日志文件。现在，您已准备好开始。您可以通过运行 `sqliosim.com` 在命令行中运行此实用程序，并通过运行
  `sqliosim.exe` 在图形模式下运行，如图 3-5 所示。此实用程序运行需要相当长的时间（除非您减少配置文件中的 `TestCycleDuration`
  值），日志文件包含有关结果的详细 HTML 报告。


  ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig5_HTML.jpg](img/464117_1_En_3_Fig5_HTML.jpg)


  图 3-5


  在图形模式下运行 SQLIOSIM


  ### Orion


  如果您的数据库是 Oracle，那么一个众所周知的数据库模拟工具是 ORION 实用程序（ORION 代表 ORacle IO Numbers）。它位于数据库和/或网格的
  `$ORACLE_HOME/bin` 目录中。虽然它位于 Oracle 安装目录中，但它实际上并不需要 Oracle 数据库的存在。Orion 是一个非常强大且功能齐全的工具，因此建议在进行任何详细测试之前阅读
  Orion 手册，但对于本书，我们可以看一个简单的例子。在我的 Windows 机器上，我的数据库数据文件位于 D: 盘上，这是一个三星 SATA-III SSD；因此命令将是
  `$ORACLE_HOME\orion -run normal -testname d_drive`，其中测试名参数指定了带有 `.lun` 后缀的文本文件，该文件只是要测试的
  LUN 或磁盘驱动器的列表。在 Linux 上，文件内容形式为 `/dev/sdb1`，而在 Windows 上则为 `\\.\D:`。图 3-6 显示了输出的示例。注意达到的两个关键值：514
  MBS 和 10,472 IOPS。


  ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig6_HTML.jpg](img/464117_1_En_3_Fig6_HTML.jpg)


  图 3-6


  运行 Oracle ORION


  Orion 还将创建一系列文本 `.TXT` 和电子表格 `.CSV` 文件，您可以使用后者来绘制详细的结果数据。文件名将采用以下形式：


  *   `test_name_date_time_summary.txt`

  *   `test_name_date_time_iops.csv`

  *   `test_name_date_time_mbps.csv`

  *   `test_name_date_time_lat.csv`

  *   `test_name_date_time_trace.txt`

  *   `test_name_date_time_hist.txt`


  ### 注意


  Orion 输出的 CSV 文件可以非常容易地导入 Microsoft Excel 电子表格中作为图表。


  ### Calibrate IO


  如果您的数据库是 Oracle，那么一个非常流行的数据库模拟工具是 `CALIBRATE_IO` 实用程序。根据 Oracle 数据库性能调整指南：“此过程向数据库文件发出
  I/O 密集型只读工作负载（由 1 MB 的随机 I/O 组成），以确定存储子系统可以维持的最大 IOPS 和 MBPS。”调用此实用程序的代码非常简单，如下所示。


  *调用 Oracle 的 Calibrate IO 实用程序*


  ```sql

  SET SERVEROUTPUT ON

  DECLARE

  lat  INTEGER;

  iops INTEGER;

  mbps INTEGER;

  BEGIN

  -- DBMS_RESOURCE_MANAGER.CALIBRATE_IO (physical disks,

  max latency, iops, mbps, lat);

  DBMS_RESOURCE_MANAGER.CALIBRATE_IO (1, 10,

  iops, mbps, lat);

  DBMS_OUTPUT.PUT_LINE (''max_iops = '' || iops);

  DBMS_OUTPUT.PUT_LINE (''latency  = '' || lat);

  dbms_output.put_line(''max_mbps = '' || mbps);

  end;

  /

  ```


  在我的 Windows 机器上，我的数据库数据文件位于 D: 盘上，这是一个三星 SATA-III SSD；因此我调用 `CALIBRATE_IO` 实用程序时，第一个参数设置为一个磁盘，第二个参数设置为最大延迟
  10 毫秒。显然，您的数据库服务器可能拥有更多的磁盘驱动器，并且随着 NVMe 闪存盘等新技术的出现，您的延迟也可能设置得更低。因此，您必须根据您的环境进行实验。我在笔记本电脑上运行了
  `CALIBRATE_IO`，得到了如图 3-7 所示的结果。注意报告的数值：528 MBS 和 54,767 IOPS。


  ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig7_HTML.jpg](img/464117_1_En_3_Fig7_HTML.jpg)


  图 3-7


  运行 Oracle CALIBRATE_IO


  现在，我不想阻止任何人使用 `CALIBRATE_IO`（如果它适合您的特定情况）。但您会发现许多作者和博主都会列出此实用程序方法的诸多缺点。以下是我从网上找到的关于此实用程序的一些转述示例（我完全同意）：


  *   `CALIBRATE_IO` 也许更好地被描述为集成在数据库内部的 Oracle ORION 工具的简化版本

  *   `CALIBRATE_IO` 的最大 IOPS、最大 MBPS 和观察到的延迟值的结果并不总是准确的

  *   `CALIBRATE_IO` 的结果既不可靠也不可重复

  *   `CALIBRATE_IO` 执行使用异步 I/O 调用缓冲在进程堆中的单块随机读取，这与绝大多数被称为 `db file sequential read`
  的单块随机 I/O（在 SGA 中缓冲且是同步 I/O）毫无共同之处

  *   `CALIBRATE_IO` 和 Orion 都不访问从存储中读取的数据，它们真正做的只是执行 I/O 并让缓冲区中的数据保持不变


  尽管如此，您会发现许多 DBA 依赖并引用此实用程序，仿佛这些数字在某种程度上是福音。因此，即使这个工具易于使用且输出简单，也不要陷入过度依赖像 `CALIBRATE_IO`
  这样单一、用途有限的工具的陷阱。请记住，简单往往不等同于好。


  ## 数据库基准测试




  ### HammerDB


  #### 简介与资源


  在众多适用于多种数据库平台的知名且广受欢迎的数据库基准测试工具中，HammerDB 当属其一。它的前身是 HammerORA，当时还只是一个 Oracle 专属工具。多年来我一直使用这款工具，并认为对于那些希望快速执行并获取行业标准数据库基准测试结果的人来说，尤其是在那些仅偶尔进行此类测试、并非数据库基准测试专家的人看来，它堪称最优秀的数据库基准测试工具之一。尽管
  HammerDB 的图形用户界面（GUI）需要一点时间来适应，但其工作流程足够简单，大多数人无需阅读文档即可完成。


  HammerDB 是一款开源的数据库基准测试工具，支持 Oracle、SQL Server、DB2、TimesTen、MySQL、MariaDB、PostgreSQL、Greenplum、Postgres
  Plus Advanced Server、Redis、Amazon Aurora 和 Redshift，以及 Hadoop 上的 Trafodion SQL。你可以在以下网址分别找到
  HammerDB 的网页、SourceForge 项目以及 Git 源代码版本控制仓库。


  *   `http://www.hammerdb.com`

  *   `https://sourceforge.net/projects/hammerora`

  *   `https://sourceforge.net/p/hammerora/code/ci/master/tree/`


  #### 安装与启动


  HammerDB 提供适用于 32 位和 64 位平台的 Windows 和 Linux 版本。当前的 2.23 版本发布于 2017 年 6 月，按其历史上每年发布一到两次的惯例来看，是时候更新了。在
  Windows 上运行安装程序时，它会将软件安装在 `C:\Program Files` 或 `C:\program Files (x86)` 目录下（具体取决于所安装版本的位数），这符合预期。然后要运行软件，只需双击
  `hammerdb.bat` 文件。在 Linux 上运行安装程序时，它会安装在 `~/` 或 `$HOME` 目录下。然后要运行软件，只需双击 `hammerdb.tcl`
  文件。当 HammerDB 软件启动时，它会显示如图 3-8 所示的屏幕。


  ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig8_HTML.jpg](img/464117_1_En_3_Fig8_HTML.jpg)

  *图 3-8 HammerDB 程序启动*


  默认情况下，HammerDB 假定你想针对 Oracle 数据库执行 TPC-C 基准测试。这些默认设置包含在 HammerDB 基础安装目录下一个名为 `config.xml`
  的 XML 文件中。我们稍后会再讨论如何修改此配置文件，先让我们更好地了解可用的各种选项和设置。现在假设我们只是想改为对 SQL Server 数据库执行 TPC-H
  基准测试。为此，我们只需选择主菜单 ➤ 选项，以打开如图 3-9 所示的弹出窗口。然后，我们只需选择 SQL Server 作为数据库，TPC-H 作为基准测试。还需注意，虽然
  HammerDB 支持许多数据库平台，但它目前仅提供两种行业标准数据库基准测试：TPC-C 和 TPC-H。然而，其网站常见问题解答（FAQ）指出，TPC-E
  已在其路线图上，并计划在未来版本中推出。


  ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig9_HTML.jpg](img/464117_1_En_3_Fig9_HTML.jpg)

  *图 3-9 HammerDB 选择数据库和基准测试*


  #### 执行基准测试的流程


  既然我们已经选择了数据库平台和基准测试，是时候深入了解使用 HammerDB 成功运行数据库基准测试的四个步骤了：


  1.  构建数据库模式对象并加载数据。

  2.  加载驱动脚本，其代码实现了所选的数据库基准测试。

  3.  创建所有将运行所选数据库基准测试工作负载的并发虚拟用户会话。

  4.  启动所有并发虚拟用户会话，开始运行所选数据库基准测试的工作负载。


  ##### 步骤一：构建数据库对象


  因此，我们首先展开“模式构建”树形视图节点，然后双击“选项”节点，这将启动基准测试模式构建选项，如图 3-10 所示。


  ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig10_HTML.jpg](img/464117_1_En_3_Fig10_HTML.jpg)

  *图 3-10 HammerDB 模式构建选项*


  在这里，我们只需定义数据库连接标准、在哪个数据库中创建对象、最大并行度（`MAXDOP`）以及数据库基准测试的比例因子（记住，第 2 章中解释过，对于 TPC-H，每个比例因子大约相当于
  1 GB）。如果我们选择在 Oracle 上运行 TPC-H 数据库基准测试，那么此屏幕上显示的字段会略有不同，如图 3-11 所示。虽然此屏幕可能因数据库平台而异，但大多数数据库管理员会发现所有要求填写的信息都相当直观。


  ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig11_HTML.jpg](img/464117_1_En_3_Fig11_HTML.jpg)

  *图 3-11 HammerDB 用于 Oracle 的 Oracle 构建选项*


  选定了模式构建选项后，就该启动由这些选定选项控制的构建过程了。为此，我们再次查看“模式构建”树形视图节点下方，但现在双击“构建”节点，这将启动基准测试模式的构建（和加载）执行，如图
  3-12 所示。


  ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig12_HTML.jpg](img/464117_1_En_3_Fig12_HTML.jpg)

  *图 3-12 启动数据库对象的构建与加载*


  在选择“是”并实际创建和加载数据库基准测试对象之前，重新审视构建选项并重点关注屏幕底部附近突出显示的两个数字非常重要，如图 3-13 所示。这些是“比例因子”和“构建模式的虚拟用户数”设置。


  ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig13_HTML.jpg](img/464117_1_En_3_Fig13_HTML.jpg)

  *图 3-13 关键的构建模式选项*


  比例因子就是要创建的数据库的大小，对于 TPC-H，大约每个比例因子对应 1 GB。对于出于有限目的（如学习）在简单的笔记本电脑或台式机上进行测试，小的比例因子是可以的。然而，大多数数据库基准测试专家认为，只有至少
  100 GB 的比例因子才值得关注。实际上，大多数已发布的测试结果都是针对 300 GB 或 1 TB 的。随着比例因子的增加，你肯定需要生成额外的并发会话来加载这些数据；因此，你至少要指定四个会话（当然这取决于你的数据库服务器及其
  IO 带宽）。请注意，图 3-13 中比例因子设置为 10 GB，并使用 4 个并发会话来加载数据。第二个数字，即构建模式的并发会话数，将直接影响构建过程的运行时间及其在执行期间的显示方式。


  现在我们已经重新审视了这两个关键的值设置，可以通过选择图 3-12 中的“是”来启动创建过程。这将导致显示构建日志窗口，如图 3-14 所示。这个窗口有点复杂，因此值得详细审视。


  ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig14_HTML.jpg](img/464117_1_En_3_Fig14_HTML.jpg)

  *图 3-14 关键的构建模式选项*




  这个窗口有两大关注区域：右上角和中间部分。中间部分相当简单：它显示正在运行的虚拟用户、它们的状态以及是否已完成。第一个值得注意的点是，虽然我们选择了四个虚拟用户，但实际上有五个；为什么呢？答案很简单。当你请求多个虚拟用户时，会有一个协调器/监控用户会话，在本例中就是虚拟用户#1。你可以通过查看每个虚拟用户的第一行来辨别，用户#2
  到#5 显示为等待工作线程，这意味着它们正在等待控制会话。


  当构建过程最终完成 100%时，你会知道，其显示内容包含图 3-15 中突出显示的四个关键项目。第一，虚拟用户线程已全部完成。第二，每个虚拟用户的状态都显示一个绿色对勾。第三，每个子虚拟用户线程都以`TABLES
  COMPLETE`结束。第四，也是最后一点，主虚拟用户线程显示`CREATING INDEXES`、`UPDATING STATISTICS`和`SCHEMA
  COMPLETE`。缺少任何一点，你都需要删除数据库及其对象才能重复此步骤。请注意，可能出现问题的地方很多，所以如果你确实需要重复此步骤，也不要惊讶或沮丧。


  ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig15_HTML.jpg](img/464117_1_En_3_Fig15_HTML.jpg)


  图 3-15


  HammerDB 加载完成


  #### 步骤 #2：加载驱动脚本


  我们现在继续，展开 `Driver Script` 树视图节点，然后双击 `Options` 节点，这会启动基准测试脚本编码选项，如图 3-16 所示。请注意，步骤#2
  整体上比前一步骤简单得多，因此也更短；所以本节内容相对简短是有意为之。


  ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig16_HTML.jpg](img/464117_1_En_3_Fig16_HTML.jpg)


  图 3-16


  HammerDB 驱动脚本选项


  我们再次简单地定义数据库连接标准，即哪个数据库包含这些对象、最大并行度(`MAXDOP`)，以及每个虚拟用户执行 22 个 TPC-H 查询的迭代次数。和之前一样，尽管此屏幕可能因数据库平台而异，但大多数数据库管理员会发现所有要求的信息都相当明显。


  与之前的模式选项屏幕类似，驱动选项屏幕也会根据所设置的数据库基准测试略有不同，如图 3-17 所示。请注意，HammerDB 默认将`keying`和`thinking`时间设置为未选中（即零时间），即使规范要求设置这些。我怀疑这是因为产品名称中包含`hammer`一词，因此默认设置倾向于对数据库施加压力以获得尽可能高的
  TPS。然而，其他数据库基准测试工具（例如，Benchmark Factory）没有提供启用或禁用这些设置的功能。我见过许多数据库管理员 wonder 为什么一个工具会产生截然不同的
  TPS 和平均响应时间，正是因为他们忽略了这一个细节。他们通常只是假设 HammerDB 更优越，因为它获得了更高的 TPS。因此，如果你希望能够进行公平的比较，请务必注意不同工具中这类设置的差异。


  ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig17_HTML.jpg](img/464117_1_En_3_Fig17_HTML.jpg)


  图 3-17


  不同的 HammerDB 驱动选项


  现在选择了驱动脚本选项，是时候简单地加载反映了这些值的基准测试脚本了。为此，我们再次查看 `Driver Script` 树视图节点下，但现在双击 `Load`
  节点，这会将生成的基准测试执行脚本加载到脚本编辑器中，如图 3-18 所示。


  ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig18_HTML.jpg](img/464117_1_En_3_Fig18_HTML.jpg)


  图 3-18


  HammerDB 生成的驱动脚本


  我想任何称职的 TCL 编程语言编码员都可以选择修改生成的脚本。然而，我发现这段 TCL 代码试图实现基准测试规范，因此相当复杂。所以我的建议是，只修改选项并重新加载新的结果脚本。不过我不再是程序员了，也许我只是感到害怕和懒惰。读者可以自行判断是否可能对生成的代码进行改进。请记住，务必保存你修改后的脚本，以便将来使用。




  ## 步骤 #3：创建虚拟用户


  我们现在继续展开 `虚拟用户` 树状视图节点，然后双击 `选项` 节点，这将启动虚拟用户选项，如图 3-19 所示。请注意，步骤 #3 也是一个更简短、更简单的步骤；因此，与第
  #2 节类似，本节内容特意较为简略。


  ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig19_HTML.jpg](img/464117_1_En_3_Fig19_HTML.jpg)


  图 3-19：HammerDB 虚拟用户选项


  在这里，我们必须指定所需的并发虚拟用户数量、虚拟用户延迟或 `思考时间` 的长度、处理延迟或 `滞后时间` 的长度，以及每个虚拟用户重复整个工作负载的迭代次数。请注意，尽管图
  3-18 中的这个屏幕看起来相当直观和简单，但您需要在此屏幕上花些时间，因为这些值可能是由规范定义和/或强制要求的，并且在此屏幕上可能不会默认设置得当。不注意这一点很可能导致意外且不可重复的结果。


  例如，假设我们当时进行的是 `TPC-C` 基准测试，并且在数据库对象创建和数据加载阶段请求了，比如说，`10 个仓库`。`TPC-C` 规范明确定义了每个仓库允许的最大用户数量为
  `10`。然而，这个屏幕会允许我们请求 `200 个并发虚拟用户`，并且进一步地，不会警告这超出了规范范围。这可能会导致不必要的数据库行争用，并且由于没有足够的、独立的行供用户处理而导致结果不正确。您甚至可能会看到数据库死锁错误。无论如何，结果很可能不可靠且不可重复。


  这里还有一个重要的注意事项值得提及。虽然 HammerDB 提供了定义虚拟用户开始处理之间以及迭代之间延迟的功能，但其他工具可能没有。再次强调，这样的设置可能使两个不同的数据库基准测试工具看起来产生了不同的结果。但严酷的事实是，种瓜得瓜，种豆得豆。因此，请注意这类细节。


  现在选择了虚拟用户选项后，是时候生成那些处于空闲状态但已准备就绪的虚拟用户会话进程了。为此，我们再次查看 `虚拟用户` 树状视图节点下方，但现在双击 `创建`
  节点，这将生成或分叉那些空闲的虚拟用户会话，如图 3-20 所示。


  ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig20_HTML.jpg](img/464117_1_En_3_Fig20_HTML.jpg)


  图 3-20：HammerDB 虚拟用户启动


  图 3-20 中有几个值得注意的项目需要认识和理解。首先，生成的虚拟用户数量正好是请求数量，并且没有像数据库对象加载阶段那样的控制或监控附加项。其次，如果您请求了
  `100 个虚拟用户`，那么请确保滚动浏览列表并验证您实际生成了请求数量的虚拟用户并已准备就绪。人们很容易忘记这一步，并且没有意识到结果不可重复的原因是虚拟用户数量由于某些不可预见的问题（如机器内存不足或数据库允许的并发连接数限制）而发生了变化。


  ## 步骤 #4：执行基准测试


  我们终于到了最重要的阶段：实际运行数据库基准测试。为此，我们继续展开 `虚拟用户` 树状视图节点（假设虚拟用户已经生成），然后双击 `运行` 节点，这将简单地释放空闲的虚拟用户会话，让每个会话使用用户定义的脚本选项执行生成的脚本，如图
  3-21 所示。


  ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig21_HTML.jpg](img/464117_1_En_3_Fig21_HTML.jpg)


  图 3-21：HammerDB 执行基准测试


  请注意，输出显示正在运行的是规范中定义的 22 个查询中的第一个查询，即查询 #14。不要让这使您感到困惑或困扰，因为它将按要求运行所有查询。顺序只是被随机化了，这样并非所有并发会话都会在同一时间运行相同的查询。随机顺序将更接近地匹配真实用户大多在不同时间运行不同查询的情况。当您看到如图
  3-22 所示的屏幕输出时，您就会知道基准测试已成功完成。请注意，虚拟用户显示其以绿色状态完成，并且运行 22 个查询花费了 `150 秒`。


  ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig22_HTML.jpg](img/464117_1_En_3_Fig22_HTML.jpg)


  图 3-22：HammerDB 基准测试完成


  #### 监控性能


  请注意，仅仅知道运行基准测试花了多长时间通常不是最健壮和最有用的统计数据。对于 `TPC-H`，每小时查询数（`QpH`）可能更有用，而对于 `TPC-C`，则是每分钟事务数（`TpM`）。这两者都不是规范要求的为发布而计算的最终报告值，但对于大多数
  DBA 来说通常已经足够好。那么，我们如何从 HammerDB 获取这样的信息呢？实际上相当简单；我们只需启动事务计数器。许多 DBA 只在基准测试的执行部分这样做，尽管如果您愿意，也可以监控创建和加载阶段。无论哪种方式，您所需要做的就是定义事务计数器的数据库连接信息，如图
  3-23 所示。


  ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig23_HTML.jpg](img/464117_1_En_3_Fig23_HTML.jpg)


  图 3-23：配置事务计数器


  然后，您只需双击 `计数器` 树状视图节点来启动事务计数器数据收集，这将导致事务计数器屏幕进入等待状态，如图 3-24 所示。


  ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig24_HTML.jpg](img/464117_1_En_3_Fig24_HTML.jpg)


  图 3-24：事务计数器等待中


  现在，当您运行数据库基准测试时，您将看到事务计数器屏幕更新，如图 3-25 所示。


  ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig25_HTML.jpg](img/464117_1_En_3_Fig25_HTML.jpg)


  图 3-25：事务计数器工作中




  #### 系列执行


  使用 HammerDB 时，有一个最终的技巧需要学习：“我们如何运行一系列递增的虚拟用户数，以找出可能的最大值？” 事实上，你完全可以说所有的基准测试工作都应该以这种方式进行；因此，这是一个需要学习和掌握的关键方面。实际上这相当简单，在完成数据库对象和驱动加载步骤后，你只需启用
  `Autopilot` 功能，指定每次迭代的运行时间和每次迭代的虚拟用户数，如图 3-26 所示。


  ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig26_HTML.jpg](img/464117_1_En_3_Fig26_HTML.jpg)

  *图 3-26：使用 HammerDB 自动驾驶模式*


  在图 3-26 中，我指定了 1、然后 2、然后 4，最后是 8 个虚拟用户场景。我无法要求更多，因为我知道我只创建了一个仓库，因此根据规格不能有超过 10 个虚拟用户。我还勾选了显示虚拟用户输出的复选框，并将每个用户的迭代记录到一个唯一命名的文件中。特别注意，我指定了五分钟的迭代周期。我是如何选择这个数字的呢？很简单，它是基于你在驱动脚本中为定时运行所指定的值，如图
  3-27 所示。


  ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig27_HTML.jpg](img/464117_1_En_3_Fig27_HTML.jpg)

  *图 3-27：自动驾驶模式的驱动设置*


  首先，你必须选择定时驱动选项。其次，预热时间和测试持续时间的总和必须小于图 3-26 中为每个序列指定的分钟数。另外，强烈建议在每次迭代之间执行一个检查点，以确保数据库在每次迭代开始时处于一致状态。最后，请注意，此步骤必须被选中，以代替创建虚拟用户和运行基准测试（即本章前面的步骤
  #3 和 #4），因为所有这些步骤现在将完全自动化。


  现在我们只需要启动自动驾驶模式，如图 3-28 所示。请注意，这个过程大约需要运行 20 分钟，因为我指定了四次迭代，每次五分钟。你可能需要尝试找到合适的周期值，因为预热时间
  + 测试时间 + 检查点时间并不总是完全精确。我的建议是选择一个比它们的总和至少多一到四分钟的值。


  ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig28_HTML.jpg](img/464117_1_En_3_Fig28_HTML.jpg)

  *图 3-28：HammerDB 自动驾驶模式运行中*


  当整个测试运行完毕后，你就可以从图 3-28 的日志窗口中，或者从文本日志文件中获取每次迭代的 `TPM` 数值并绘图。


  ### Benchmark Factory


  另一款支持多种数据库平台的流行数据库基准测试工具是 Quest Software 的 `Benchmark Factory for Databases`。虽然它是一款商业软件（当然需要花钱），但也有一个非常好的免费版本（限制
  100 个并发数据库会话）。我使用这个工具多年，认为对于希望快速执行并获得行业标准数据库基准测试评分的人来说，它是一款非常出色的数据库基准测试工具。在这方面，它与
  HammerDB 非常相似。然而，与 HammerDB 最初可能难以学习的用户界面不同，Benchmark Factory 提供了非常简单的向导来完成 HammerDB
  中的所有步骤，将之前的 20 页内容简化为几个简单的步骤。因此，本节将比上一节短得多。


  你可以在以下网址分别找到 Benchmark Factory 的网页、社区和免费软件下载。


  *   [`www.quest.com/products/benchmark-factory`](https://www.quest.com/products/benchmark-factory)

  *   [`community.toadworld.com/products/benchmark-factory`](https://community.toadworld.com/products/benchmark-factory)

  *   [`www.toadworld.com/download/benchmark-factory-for-databases/freeware`](https://www.toadworld.com/download/benchmark-factory-for-databases/freeware)


  `Benchmark Factory` 仅提供 Windows 版本，支持 32 位和 64 位。当前版本是 8.0。当你在 Windows 上运行安装程序时，它会按照你的预期（基于所安装版本的位数）将软件安装在
  `C:\Program Files` 或 `C:\Program Files (x86)` 目录下。然后要运行软件，你只需双击 Benchmark Factory
  的桌面或开始菜单图标。当 Benchmark Factory 软件启动时，它会显示如图 3-29 所示的屏幕。


  ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig29_HTML.jpg](img/464117_1_En_3_Fig29_HTML.jpg)

  *图 3-29：Quest 的 Benchmark Factory*


  为了定义和运行数据库基准测试，你只需按下图 3-29 中高亮显示的新建工具栏图标。你也可以通过文件菜单进入。向导的第一步将为运行基准测试定义一个数据库连接，如图
  3-30 所示。


  ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig30_HTML.jpg](img/464117_1_En_3_Fig30_HTML.jpg)

  *图 3-30：定义数据库连接*


  如果我们选择在 Oracle 上运行 TPC-C 数据库基准测试，那么此屏幕上显示的字段会略有不同。因此，尽管此屏幕可能因数据库平台而异，但大多数数据库管理员都会发现所有请求的信息都相当直观。


  向导的第二步是选择要运行的数据库基准测试，如图 3-31 所示。请注意顶部附近的下拉框，它显示了行业标准基准测试。`Benchmark Factory` 还提供了其他几种测试，包括可扩展性测试、用户基于现有测试设计的自定义测试（例如，50%
  TPC-C 和 50% TPC-H），以及工作负载捕获/重放。


  ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig31_HTML.jpg](img/464117_1_En_3_Fig31_HTML.jpg)

