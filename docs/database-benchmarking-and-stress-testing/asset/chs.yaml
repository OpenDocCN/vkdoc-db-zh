  ### Swingbench


  另一款流行的、免费的负载生成器和数据库基准测试工具是 Swingbench，它仅适用于 Oracle 数据库。我喜欢这款工具的原因非常简单：它是迄今为止我找到的唯一提供较新的
  `TPC-DS` 基准测试的工具。事实上，这个包含 100 个复杂查询的基准测试是我所知的最佳数据库性能工具之一（除了实际的工作负载）。我和我的合著者在我们 2017
  年的 Oracle 书籍《*Oracle Database 12c Release 2 Testing Tools and Techniques for Performance
  and Scalability*》中使用了它。事实上，该工具的作者与我们合作才使这本书得以出版，我们对此深表感谢（谢谢，Dominic）。


  您可以在以下网址分别找到 Swingbench 的网页和下载链接。


  *   [`http://dominicgiles.com/swingbench.html`](http://dominicgiles.com/swingbench.html)


  *   [`http://dominicgiles.com/downloads.html`](http://dominicgiles.com/downloads.html)


  Swingbench 的下载文件是一个简单的 zip 文件，只需解压即可。它是一个纯粹的基于 `Java` 的工具，因此可以在大多数操作系统上运行；所以它要求您的机器上已加载
  `Java`。需要注意有两种类型的可执行文件：大约十几个用于加载所需工作负载或基准测试的实用程序，以及实际运行这些测试的 Swingbench 引擎。这里我们只演示如何运行
  `TPC-DS` 基准测试。但该工具提供的其他测试流程也大同小异。


  运行 `TPC-DS` 创建向导会引导您完成创建数据库连接、是否删除或创建数据库对象，以及在如图 3-36 所示的屏幕上设置所需表和索引的所有者及表空间。


  ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig36_HTML.jpg](img/464117_1_En_3_Fig36_HTML.jpg)


  图 3-36


  TPC-DS 创建向导


  在此过程中，向导会询问数据库对象的大小，其中每个比例因子相当于 1 GB。然后，向导最后询问创建这些对象时要使用的并行度。接着它开始创建这些对象，如图 3-37
  所示。请注意，我选择了 8 个并行线程（这是默认值），目前该工具已加载了我 13% 的数据。


  ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig37_HTML.jpg](img/464117_1_En_3_Fig37_HTML.jpg)


  图 3-37


  TPC-DS 创建运行中


  在数据库对象成功创建并加载后，现在该运行 Swingbench 实用程序本身了。在启动时提示选择要运行的工作负载或数据库基准测试时，请选择 `TPCDS` 类测试。然后，只需在如图
  3-38 所示的屏幕上输入数据库连接信息，再按开始执行工具栏按钮。请注意，主屏幕左下角的“Load”（负载）选项卡提供了几个非常重要的关键选项，包括事务间的最小/最大延迟、登录延迟时间、是否等待所有会话连接后才开始以及总运行时间。所有这些都可能影响您的结果，因此请务必参考相应的基准测试规范以获取设置这些参数的建议。


  ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig38_HTML.jpg](img/464117_1_En_3_Fig38_HTML.jpg)


  图 3-38


  TPC-DS 启动执行


  在测试运行时，您将看到所有正在处理的查询（记住有 100 个）以及一些关键性能指标，如图 3-39 所示。我个人认为 Swingbench 呈现的所有性能信息是所有数据库基准测试工具中最好的。请注意，Swingbench
  显示了两个重要的图表：每秒事务数和响应时间。正如本书后面在解释如何解读结果时将要说明的，这是需要检查的两个最重要的指标——而且通常需要将它们作为一个整体来看，而不是孤立地看待。


  ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig39_HTML.jpg](img/464117_1_En_3_Fig39_HTML.jpg)


