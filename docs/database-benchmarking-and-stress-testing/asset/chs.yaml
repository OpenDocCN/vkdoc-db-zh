  ### SLOB


  Oracle DBA 最流行且广泛使用的工具之一是 **SLOB**，其全称是“小 Oracle 基准测试工具”（Silly Little Oracle Benchmark）。它是免费的，这进一步增加了其受欢迎程度。我称其为“高度使用”，是因为几乎每个
  Oracle DBA 都知道并使用它。但这并不一定意味着他们理解了其真正的目的。引用该工具作者 Kevin Closson 的话：


  > *SLOB 不是一个数据库基准测试工具。SLOB 是一个 Oracle I/O 工作负载生成工具包。我需要指出，由于习惯使然，许多 SLOB 用户会交替使用“基准测试”和“工作负载”等术语来指代
  SLOB。SLOB 旨在填补 Orion 与 `CALIBRATE_IO` 以及全功能事务性基准测试之间的空白。*


  因此，SLOB 实际上并不适合放在前面专门讨论存储基准测试的章节中，也不完全适合放在这里与数据库基准测试工具一起讨论。但正如我所说，大多数 Oracle DBA
  都在使用它，甚至连该工具的作者也承认他们经常将其误解为数据库基准测试工具。所以，基于以上说明，我们将在本节末尾介绍它。


  你可以在以下网址分别找到 SLOB 的网页和下载链接。


  *   [`https://kevinclosson.net/slob/`](https://kevinclosson.net/slob/)

  *   [`https://github.com/therealkevinc/SLOB_distribution`](https://github.com/therealkevinc/SLOB_distribution)


  SLOB 是一系列 Linux shell 脚本和一些基于 C 语言的程序。要使用 SLOB，你需要了解两个脚本：`setup.sh` 和 `runit.sh`。还有一个名为
  `slob.conf` 的文本文件，其中包含控制 SLOB 运行时行为的各种参数。你很可能需要根据你的环境编辑此文件。在我的案例中，我更改了 `SYSTEM`
  密码并将快照机制改为 AWR。


  第一个脚本 `setup.sh` 接受两个输入参数：用于创建其模式及其对象的表空间，以及要创建的模式数量。在我的案例中，我在笔记本电脑上运行一个 Linux 虚拟机，因此我希望最小化设置：使用现有的
  `USERS` 表空间并仅加载一个模式。图 3-40 展示了使用这些值执行 `setup.sh` 的情况。


  ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig40_HTML.jpg](img/464117_1_En_3_Fig40_HTML.jpg)


  图 3-40


  SLOB `setup.sh` 执行


  一旦 `setup.sh` 无错误完成，就该执行第二个脚本 `runit.sh` 了，它只接受一个参数：要测试的模式数量（该值应与你为 `setup.sh` 提供的值相同或更少）。


  任务执行完成后，运行 Oracle STATSPACK 或 AWR 报告，报告的开始和结束快照由 `runit.sh` 的输出列出。然后检查报告，重点关注负载配置文件部分中引用的物理
  I/O。我的结果如图 3-41 所示。


  ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig41_HTML.jpg](img/464117_1_En_3_Fig41_HTML.jpg)


  图 3-41


  来自 AWR 负载配置文件的 IOPS


  因此，根据大多数运行 SLOB 然后读取 AWR 报告的负载配置文件部分来计算 IOPs 的人的说法，我的笔记本电脑大约运行在 428 IOPS。然而，我认为这个数字并非
  100% 准确。我更倾向于查看 AWR 报告中更靠下的部分，如图 3-42 所示，查看按文件类型汇总的 IOStat，其显示的总数更接近 990 IOPS。


  ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig42_HTML.jpg](img/464117_1_En_3_Fig42_HTML.jpg)


  图 3-42


  来自 AWR IOStat 汇总的 IOPS


  '
- '# 总结


  在本章中，我们相当详细地介绍了所有知名且流行的 IO 子系统压力测试和数据库基准测试工具。对于后者，我们涵盖了运行数据库基准测试所需的所有步骤。有些工具比其他工具简单得多。有些工具只提供一种基准测试，而另一些则提供多种。但目前没有一种工具能提供所有行业标准的数据库基准测试。因此，作为一名数据库基准测试专业人员，你可能需要精通其中的几种工具。


  '
- '# 4. 基准测试准备


  此时，你可能认为自己已经完全准备好开始数据库基准测试工作了，凭借的仅是迄今为止提供的信息：数据库基础知识、各种行业标准数据库基准测试的概述，以及可用的 IO 子系统和数据库基准测试工具的阐明。因此，你们中的一些人可能觉得本章只是填充内容或花哨的装饰。但我要强调，本章实际上是整本书中最关键的一章，应该以最多的注意力来阅读。事实上，我将进一步说明，未能按本章所述进行准备，可以说是导致下一章出现失误和失败的最大因素。


  当我年轻的时候，我曾是美国童子军的一员。虽然我可能没有成为鹰级童子军或获得很多徽章，但我确实学到了很多。那时深深烙印在我脑海里的是童子军的座右铭：时刻准备着！这两个简单的词蕴含着巨大的智慧。将这一理念延伸，本杰明·富兰克林说过：“不为成功做准备，就是在准备失败。”这些话在生活中的许多方面都千真万确，尤其是在数据库基准测试方面。想象一位美式橄榄球（不是足球）教练不准备比赛计划，当他输掉比赛时，你真的会感到惊讶吗？事实上，你可能会和其他球迷一起要求换掉教练，如果现任教练毫无计划或计划不佳就参加比赛。对教练有益的东西，对数据库基准测试专业人员同样有益。如果准备不足，那么或许就是换人的时候了。



  ## 基准测试准备


  如同任何希望获得最大成功机会的商业项目一样，首先要清晰界定和阐明的，是任何数据库基准测试工作所要达成的**使命声明**。这一步骤常常被跳过或仅仅被边缘化。据我所知，没有哪家公司的使命声明仅仅是“赚钱”。同样，大多数有能力的橄榄球教练可能也不会说，比赛计划仅仅是为了赢而赢（尽管有一个值得注意、可以理解且完全被允许的例外——俄亥俄州立大学的教练，他们必须击败密歇根队，只因为对手是密歇根队）。


  那么，在商业中，什么构成一个好的使命声明？关于这个问题，你会发现很多观点和说法。就我们的目的而言，最适用和最重要的四点包括：


  *   能够建立预期

  *   目标切实可行

  *   具备审慎的适应性

  *   简短但目的明确


  让我们按照这四个标准来剖析下面这个使命声明示例：


  > *验证将我们最大的数据仓库和决策支持数据库从本地服务器和存储区域网络（SAN）迁移到云端后，在合理甚至更优的总体成本下，性能表现至少一样好。*


  哇——这看起来像一个值得尊敬的使命声明。事实上，它可能与你管理层已经在考虑或即将要求你处理的那些想法非常相似。实际上，就在过去的 12 到 18 个月里，我参与的所有数据库基准测试项目都或多或少遵循这个思路。这似乎是当下一个非常常见的主题。


  在我们开始剖析这个使命声明之前，我们首先需要认同，它包含技术和非技术两方面，可能需要分工负责。与我共事的大多数数据库管理员实际上只负责技术层面——即，在什么样的云配置（规模）下，其性能表现达到或超过当前系统。这并不是说另一部分不重要，因为它涉及成本。但大多数
  DBA 最适合的还是技术层面。因此，现在让我们只剖析这个使命声明，去掉与成本相关的那七个字。


  预期似乎相当直接明了；云端的性能能否与当前系统一样好？但在“最大的数据仓库和决策支持数据库”这个短语中，隐含着几个重要问题。“大”究竟有多大？数据仓库（DW）和决策支持（DSS）工作负载是否主要是复杂查询，外加一些在非高峰时段的批量加载？终端用户的查询主要是来自预定义的报表，还是用户自定义的即席报表？我们仅仅是把当前的
  Oracle 或 MS SQL Server 这样的关系型数据库迁移到云端，还是迁移至 Hadoop 或 Cassandra 这样的 NoSQL 数据库？如果存在
  BI（商业智能）服务器，它是保留在本地，还是也迁移到云端？现在，基于所有这些问题，你可能会认为我要说这个使命声明示例在建立预期方面失败了。但如果它以一种能引发这些问题并获取有用答案的方式撰写，那么我会说，使命已经达成（至少对于第一个要点而言）。


  接下来看目标。同样，使命声明示例中有一部分引发了许多问题：“迁移到云端”具体指哪里？“性能表现至少一样好”又是什么意思？我们是迁移到 Amazon AWS、Microsoft
  Azure、Google Cloud 还是 Oracle Cloud？我们是否知道允许使用何种类型和规模的虚拟机镜像？我们可以自由使用 NVMe 和 SSD，还是仅限于标准存储磁盘？我们打算如何测试性能？我们会复制数据库，在云端并行运行应用程序吗？或者我们会选择某个行业标准的数据库和/或应用程序基准测试并在云端运行？当前的服务级别协议（SLA）是什么？新的
  SLA 必须满足哪些差异（如果有的话）？例如，大多数云供应商提供 99.9 或 99.99 或 99.999 的正常运行时间（例如，99.9999% 对比 99.99999%）。这种可靠性水平可能比当前的本地
  SLA 要好，那么我们是否必须全面达到这个提升后的 SLA？所有这些问题实际上都归结为一个核心问题：我们如何判断通过还是失败？你可能已经注意到，这个使命声明再次提出了比答案更多的问题。这具有巨大价值。本章内容完全围绕准备展开。如果使命声明能在我们开始基准测试之前，就促使这些问题得到解答，那么我们将减少时间浪费，增加成功的机会。


  这个使命声明的适应性又如何呢？获取迄今为止所有问题的答案，自然会引出关于预留空间以修订或调整方法的问题。例如，如果被告知必须使用 Amazon AWS，而最初的想法是使用`通用型`镜像类型，那么是否允许我们建议使用`内存优化型`或`存储优化型`，因为它们可能更符合数据库服务器的需求？在涉及时间估算时，适应性问题变得至关重要。如果被告知不行，镜像类型必须是通用型，那么你可以合理地预期时间表是相对固定的。另一方面，如果被告知从通用型开始探索最佳镜像类型，那么你的时间表就会延长——甚至可能延长两倍或三倍。作为适应性的一部分，还有其他隐藏的方面值得询问吗？例如，也许我们知道当前使用本地数据库的应用程序实际上并未利用任何`企业版`特性。那么，我们是否应该进行测试，以验证一个更低、更便宜的数据库版本是否足以满足需求，从而降低许可成本？所以，是的，还有更多需要答案的问题。但这正是“做好准备”的准确定义。换句话说，“*三思而后行*”，以免遭遇伊索寓言中山羊的类似命运：狐狸告诉它干旱将至，它跳进了井里，而狐狸的真实目的只是想找个垫脚石逃出井。将允许的适应性确定下来，对你大有裨益，因为它常常直接代表着范围蔓延。



  ## 项目使命陈述


  最后一个要点，即使命陈述是否简短且目标明确，似乎是最容易理解的部分。什么是“大局”概念以及这样做的理由是什么？在这个例子中，这很明确：在不产生任何负面影响的情况下迁移到云端。然而，我曾参与过一个大型数据库基准测试项目，该公司想知道哪家硬件供应商能最好地运行他们首选的数据库。因此，实际目的其实是看未来
  5-10 年内谁能获得约一万台服务器的订单。这个事实让我们肩负了更大的责任，以确保我们是在进行公平的比较，没有“调包计”之类的花招。这个真实的潜在动机显然改变了我们对该项目的看法和方法。虽然这项工作的成本可能只有
  2 万美元，但它却是一个关系到任务成败、具有战略意义的问题，上升到了最高管理层。掌握了这一事实后，我们能够提供一个可以证明和论证的明确结论。所以，有时扮演牙医、深挖问题是值得的，因为有时那些看似简单无害的事情，只要稍微深究一下，就会发现其实是一个重大问题。


  至此应该清楚了，使命陈述应该是你提出大量问题的脚本，目的是为了构建和验证一个检查清单，该清单将成为基准测试项目中资源分配、调度和预算的关键因素。这个检查清单也将确保最大的成功机会。然而，这个关键步骤几乎总是被跳过，导致交付成果缺失和时间超支。因此，我无法再强调这一步有多么关键。它可能是取得成功的唯一最大因素。


  ## 数据库准备


  在与进行数据库基准测试项目的公司合作时，最令我震惊的领域之一往往是数据库准备的缺乏。事实上，这种情况发生的频率超乎我的想象。此外，它还能以多种方式表现出来。


  在足够多的情况下（值得列出），我看到基准测试项目由业务分析师或应用项目负责人执行。我无法解释第一种情况，但它确实会发生。第二种情况更容易理解；应用程序是最终用户看到和感受到的东西，因此有时会要求应用程序团队测试将数据库应用程序从一种部署模型迁移到另一种的效果。无论哪种方式，最终效果都是要求非数据库管理员来完成一项工作，而其中一些最关键的要求恰恰属于不同资源的技能范畴。我也遇到过应用开发团队中有
  DBA 的情况，但他们是一位应用 DBA，其工作是设计应用程序所需的表和索引。他们通常不是详细性能分析和优化技术方面的专家。无论由谁负责执行数据库基准测试项目，他们都应该包括一名在目标数据库和平台上拥有丰富技能的资深
  DBA。我甚至更进一步地建议，未能包含一名胜任的 DBA 几乎普遍会保证项目失败。


  另一个令人惊讶的怪事是，在我参与的数据库基准测试项目中，大约有 50%只是使用预先配置好的默认值安装数据库。在某些情况下，如前所述，团队可能缺乏具备部署技能的
  DBA，但在其他情况下，这似乎仅仅是懒惰或对细节缺乏关注。并非所有数据库都能自动适应分配给服务器或虚拟机的 CPU 和/或 RAM（内存）的增加。同样，某些工作负载类型通常开箱就需要不同的配置。此外，基准测试的数据库规模或大小以及并发用户数也需要不同的设置。除非你只是进行简单的教育性或相对较小的基准测试工作，否则你需要正确配置数据库。关键点是，对于基准测试工作，你应该进行与生产系统完全相同的优化。


  数据库准备中另一个经常被忽视的主要领域是存储分配。大多数数据库基准测试工具不理解你的存储逻辑单元或其 RAID 特性（例如条带宽度和深度）。大多数基准测试工具只是在用户运行创建和加载步骤的默认存储区域中创建所需的基准测试对象（表和索引）。其中一些工具确实提供了创建分区对象的选项，但同样，对你存储设置的“智能”考虑很少。我告诉人们的是，将任何数据库基准测试作为两个独立的主要步骤运行：创建/加载与执行。其思路是将第一步隔离运行，以便你可以修改或重新创建数据库对象，以最好地利用我们的存储布局。然后对那个布局合理的数据进行备份，以便对于同一执行的后续迭代，你只需进行恢复即可。我甚至见过一个足够智能的数据库基准测试工具，它提供了对此类方法的支持（Quest’s
  Benchmark Factory）。请相信我，当你只需要基准测试工具在第一次加载数据时，一个 3TB 的 TPC-H 会运行得更好、更快。我见过一个 3TB
  的 TPC-H 初始加载花了三天时间，但恢复备份只用了三个小时。当你处于一个两到三周的日程安排中时，这一差异可能决定你工作的成败。


  数据库准备中最后一个被忽视的领域是正确的统计信息和直方图收集，以及运行测试迭代比较报告前后的执行性能指标快照。这些工具都无法替代你的 DBA 的经验和见解。一些工具允许在前后运行脚本，这样你可以手动编码这些项并将其手动添加到项目中。很少有工具将其内置到它们的工作流或图形用户界面中。因此，你的
  DBA 需要学习你的数据库基准测试工具，了解它能做什么、不能做什么，然后在适当的地方加入他们专业的操作。我曾见过忽视这个问题导致诊断或优化性能的能力很差。如果做得好，我见过它能带来高达
  400%的差异。这非常值得关注。



  ## 基准测试时间规划


  一个数据库基准测试项目应该花多长时间？这应该基于项目的目标声明以及它引发的数十个问题的答案（这些问题最好能得到解答）。然后，你应该制定一个项目计划，包含所有开始前必需的先决条件。然而，我参与的许多项目里，获批的计划却是我们只有两周时间来运行一个
  `TPC-C` 或 `TPC-H` 测试，并显示出可接受的 `TPS`。有一个案例，他们要运行 `TPC-H`，但设备尚未部署，软件尚未安装，而且资源紧张，难以完成这项工作。然后他们告诉我，我们必须运行几次
  3 TB 或更大规模的 `TPC-H` 测试。想象一下，当我说不如今天就报告说这次努力失败了，省时省力时，他们有多惊讶。当然，他们以为我在开玩笑，于是我们开始了项目。硬件和软件准备就绪花了四天。初始数据加载花了三天。所以到第二周的周一，我们只剩五天时间，却要从零开始。这并非个例；几乎每一个数据库基准测试项目似乎都被严重错误估算，以至于几乎扼杀了任何成功的合理机会。


  在理想情况下，如果所有硬件和软件都已设置好，预先选定了合适的服务器或虚拟机规格，操作系统和数据库都经过优化，拥有用于执行和调整测试运行（以便进行迭代测试）的适当资源，并且目标明确，那么两周时间可能（我只说可能）是足够的。我告诉那些询问的人，初步预估应以三到四周为起点，此时大多数人会说他们没有那么多时间。当我质疑这个限制时，通常被告知我们只需开始，看看两周内能进展到哪里——然后就停止。我会问那些没有当场解雇我的人：他们是否愿意让一个外科医生开始手术，然后不管进行到哪一步，两小时后就直接停止？答案当然总是否定的，但与医生不同，这些专业人士大多不愿回去对管理层说“需要更多时间，否则就算了”。所以在这些情况下，我们尽力在两周内完成，但多半时候我们未能达成预期结果。


  时间规划的另一个关键方面是：当分配的资源不正确或不充足时会发生什么？还记得我上面提到的那个 3 TB `TPC-H` 项目吗？嗯，为存储订购的硬件是一个直连存储柜，里面有
  15 块机械磁盘。我解释说，`TPC-H` 基准测试的性质决定了其性能与机械磁盘数量直接相关，当时发布的所有同等规模的基准测试都是在不少于 100 块磁盘上完成的。当然，我们不可能再弄到
  85 块磁盘，因为他们只负担得起增加一个存储柜，总共 30 块磁盘。这又花了一周时间才到位并准备好。所以，看到了吗，这些项目为什么几乎不可能在两周内完成？不要让自己在没有救生圈的情况下被扔进泳池的深水区。如果有人要求你在过于有限的时间内完成一个数据库基准测试项目，那就直接说“不”。


  好吧——我知道向管理层说“不”几乎不可能，而且对职业生涯来说很鲁莽（尽管我已经做过很多次了，也许这就是我从未“发达”的原因）。但请努力争取更多时间，或降低期望值，或缩小范围。如果那个
  3 TB `TPC-H` 项目愿意考虑将数据库规模缩减到 300 GB（这是该数据库基准测试的最低有意义规模），并添置第二个磁盘柜，我们本可以成功的。我们本可以在第一周搭建好并运行测试，使一切就绪；然后在第二周添加第二个存储柜并重新运行测试，以获得最佳最终数据。所以，要寻找创造性的解决方案。


  ## 基准测试规模设定


  当人们问我规模设定的问题时，比如我的 `TPC-C` 数据库应该多大、应该运行多少并发用户？我总是感到惊讶。作为一个来帮忙的外人，我其实不了解他们现有的系统或最终用户池的规模。你作为内部人员，会比任何外部顾问都更有优势，但他们可以提供协助。所以，这个决策应该由你主导。


  不久前，我帮助一家大型全国性保险公司进行他们的基准测试工作。他们正考虑从大型机转向客户端-服务器和关系型数据库。他们对于运行一个基于 `OLTP` 的基准测试作为衡量标准表示
  `OK`。起初，他们只为基准测试运行 100 个并发用户会话。原因是当时使用的一个免费工具有 100 用户的限制。对于一家如此庞大的公司来说，这显然是不可接受的。管理层迅速购买了一个商业许可证，但数据库管理员（`DBA`）最初只选择运行
  2000 个用户。当我询问（并随后真正追问）原因时，答案是运行基准测试工具在达到这个数量级前很容易，但要扩展到更高规模则需要更多的工作。于是我问：既然我知道这个系统必须处理你们整个全国代理网络的负载，那么你们目前看到的最大并发会话数是多少？答案是
  15,000 到 20,000。于是，我们不得不购买额外的数据库基准测试工具许可证，以便将其部署为一个控制台，配以 10 个运行在其他服务器上的代理，每个代理运行
  2000 个并发会话，总计 20,000 个并发会话。现在知道 `TPC-C` 规范规定 `每 10 个用户对应 1 个仓库`，我们知道规模因子必须设为 2000，这转化为
  150 GB 的数据库规模。


  在 `OLTP` 案例中，这一切听起来都很好，但如果你需要运行的是数据仓库（`TPC-H`）或决策支持（`TPC-DS`）类型的基准测试呢？首先也是最重要的，尽量提前弄清楚高级管理层到底想把多少数据保留在热的、可快速访问的存储上。我听过业务人员说我们要永久保留数据。但热数据通常真的只是一个可管理的子集。例如，也许这家零售杂货连锁店想对客户在一年内购买的商品进行购物篮或趋势分析，同时考虑天气条件、假日和体育赛事。以如今相当低廉的存储成本来看，答案可能高达五到七年的详细交易数据，这轻易就能达到数十甚至数百
  TB。另外，你可能还需要保留聚合数据或摘要数据，以及索引和任何其他占用空间的结构。因此，为 3 到 30 TB 左右的这些需求进行基准测试可能是有意义的。你需要确定的另一个因素是，在这个环境中，高管们愿意为一个有意义的战略报告等待多久。记住，这些数据仓库和决策支持类型的查询往往需要处理数千万甚至数亿行数据才能形成答案。高级管理人员可能愿意等待四个小时来获得一个能直接并积极影响利润的结果。所以，你需要足够的数据来近似模拟这类环境。


  你需要牢记的最重要的一点是：磁盘空间很便宜，因此企业希望数据集越来越大。将你的基准测试数据库规模定得太小对任何人都没有好处。只需记住，数据库基准测试工具在数据加载过程中非常缓慢，因此你会希望采用前面提到的拆分项目和备份方法以求快捷。




  '
- '# 5. 基准测试常见错误


  ## 工作负载捕获


  有时我们很幸运，拥有相应的工具和能力来捕获实际工作负载，然后将其回放作为我们的数据库基准测试方法。之前提到的一些工具以及部分数据库供应商提供了这样的功能。此时，关键问题在于：选择哪个时间段来捕获工作负载才是合适的？再次强调，咨询了解应用程序的内部人员，远比询问外部顾问要好得多。你可能会发现需要捕获多种工作负载：一个典型的业务日、一个典型的业务夜，再加上一个或多个业务事件时段。第一个显而易见的问题是选择正确数量和时间点的工作负载时段进行捕获。但另一个常常被遗忘直到最后一刻的问题是，需要为捕获过程在生产服务器上产生的额外开销以及存储这些元数据所需的额外存储空间做好安排。有些生产服务器本身负载已经非常重，申请给系统增加
  3-5%的负载都难以获得批准。关于工作负载捕获和回放，另一个需要提前准备的主要问题是，你必须制作生产数据库的完整副本才能运行捕获的工作负载。这意味着需要额外的磁盘空间来存放该副本，以及进行完整冷备份或离线备份所需的时间。因此，尽管工作负载捕获和回放看似是进行基准测试的最佳方式之一，但现实情况是，在许多情况下它并不可行。这还没考虑工作负载捕获和回放软件的额外成本，对于许多平台来说，这类软件相当昂贵。你可能非常想进行工作负载捕获和回放，但最终不得不退而求其次选择简单的基准测试。如果你的使命宣言及其所有问题的答案能够通过数据库基准测试而非工作负载捕获和回放来满足，那也无妨。


  ## 扭曲因素


  在“准备”这个主题下，这一小节乍看可能有些奇怪。但在准备阶段，确实有许多因素需要提前考虑，它们可能对你的数据库基准测试结果产生重大的扭曲或干扰作用。如果你打算在共享存储（如
  SAN 或 NAS）上进行测试，能否至少拥有自己的 LUN（逻辑单元号）？在共享的 SAN 或 NAS 上，能否避开诸如备份之类的常规维护任务时段？数据库服务器和基准测试机能否隔离在单独的网段上？有太多外围问题可能悄然出现并困扰你。让我举几个在基准测试前未考虑到、并彻底导致结果无效的例子。


  有一次，在我们进行基准测试的一个周末，网络交换机进行了固件升级。我们对此并不知情，而且所有人都认为这不可能影响到我们的测试。大错特错！不知何故，`VNETs`和`Jumbo
  Frames`的设置在固件升级过程中被破坏了。我们花了两周时间徒劳无功，才查明并证实是某个外部因素扭曲了我们的结果。这本来不该发生，但它确实发生了。而且这类问题排查起来非常棘手。因此，当你一周的测试结果与另一周截然不同时，请务必寻找任何不常见的原因。因为一般来说，如果操作得当，数据库基准测试结果的变化幅度不应超过
  5-10%。


  另一次，在测试一个`Oracle 真正应用集群 (RAC)`配置时，我们某一周的结果又莫名其妙地出了问题。我们排查了将近四天才有人发现，我们的一块绑定网卡正在产生低层错误，而这些错误并未上升到操作系统日志中。而且因为是绑定网卡，它并未报错，只是运行速度大大降低，这给集群带来了许多问题，包括节点无故掉线。一度有位数据库管理员（DBA）想把这个问题正式记录为
  Oracle 的一个缺陷，认为`RAC`无法可靠地扩展到 20 个节点。不要轻易将异常行为归咎于操作系统或数据库的缺陷。当然，这种情况可能发生。但那将是罕见的例外，而非普遍规律。人们很容易陷入这个思维陷阱。


  最后一个例子又是另一个奇怪的硬件问题。是的，我知道我之前说过这类问题应该相当罕见，但如果你进行的基准测试足够多，你就会遇到更多罕见情况。我们有一个属于`RAID
  5 LUN`的磁盘驱动器开始出现故障。磁盘故障还未达到危急程度，`RAID`仍在进行补偿。但在几乎每次 I/O 操作上增加的那些额外奇偶校验检查累积起来，足以扭曲测试结果。我们非常幸运，只花了大约四个小时就发现了这个问题。但当你处于一个基准测试项目的最后一周，得到暗示其他结果可能已被污染的数据时，这会让人极度不安。


  '
- "# 总结\n\n尽管这一章篇幅相对简短，但它涵盖了成功进行数据库基准测试的最重要方面之一：准备。准备永远不嫌充分。你应该分配足够的时间和资源。你应该有一个计划并清楚自己的期望。数据库基准测试项目极其重要，通常时间紧迫，因此你不能毫无准备地即兴发挥。我的建议是效仿亚伯拉罕·林肯总统解决问题的方式，他说：“给我六个小时砍倒一棵树，我会用前四个小时磨斧头。”这就是准备。\n\
  \n正如前一章所强调的，充分的准备或准备不足，可以成就也可以毁掉一次数据库基准测试工作。例如，并非任何人都具备成功运行数据库基准测试所需的全部背景知识和技能。他们必须对数据库有深入了解，尤其是正确的配置、性能监控和调优技术。同样，你需要为这项工作安排充足的时间和其他资源。但即使你做到了所有这些，在数据库基准测试工作进行过程中，仍然可能出现许多问题。本章将重点介绍一些困扰许多数据库基准测试项目的主要和最常见的失误。\n\
  \n本章的关键要点应该是：即使你做了所有准备，事情仍然可能出错。记住那句老话：“老鼠和人类精心设计的计划常常落空。”我可以诚实地说，我参与过的数据库基准测试项目中，没有一个能\
  \ 100%按计划进行而全程毫无波折。然而，知道了这一点，我只是建议你在工作中保持灵活性，避免固执己见的行为。此外，我建议记住罗伯特·舒勒的话：“问题不是停止标志；它们是指南针。”第一章提出的核心观点是，数据库基准测试的定义就是努力“让数据库汗流浃背”。因此，你应该合理预期会遇到边界条件，否则说明你对系统的压力测试还不够充分。\n\
  \n### 注意\n\n[tpc.org](http://tpc.org) 网站目前似乎发布的完整披露报告远少于过去。事实上，现在某些数据库供应商的测试结果似乎完全不见了。\n\
  \n\n\n## 所有必备工具\n\n在第 1 章中，我将数据库基准测试比作心脏压力测试。那是一个通常由心脏病专家执行的流程：医生将你连接到心脏监护仪上，让你在跑步机上快步走或跑步一段时间。医生的目标是\
  \ \"*让你的心率上升*\" 和 \"*让你出汗*\"。每当讨论成功执行数据库基准测试所需条件时，我都喜欢参考此处展示的图 5-1。\n\n![../images/464117_1_En_5_Chapter/464117_1_En_5_Fig1_HTML.jpg](img/464117_1_En_5_Fig1_HTML.jpg)\n\
  \n图 5-1：基准测试如同心脏压力测试\n\n对于心脏压力测试，有医生、心电图监护仪、跑步机和病人。同样，数据库基准测试有数据库专家（通常是 DBA）、数据库监控工具、他们的数据库以及数据库基准测试软件。对于心脏压力测试，医生将决定跑步机的倾斜度、速度、持续时间、监测内容、诊断方法、治疗方案等等。同样，数据库专家将选择基准测试、其数据库大小、用户数量、持续时间等等。看起来很简单——对吧？\n\
  \n在我协助数据库基准测试项目时遇到的一个反复出现的主要问题是，数据库专家（或者如果没有指派专家，则是非专家）错误地假设基准测试工具将监控数据库、报告问题并提出建议。我必须提醒他们，基准测试工具只是跑步机。它唯一的工作就是给数据库施加压力让它“出汗”。至于他们为何期望数据库基准测试工具能完成所有工作，对我来说是个谜。我猜这只是一厢情愿的想法，但在我协助的项目中，大约有\
  \ 25% 都存在这种情况。通常这是我加入项目后需要解决的第一个问题。最后请记住，大多数数据库监控工具只显示症状，它们不会提供纠正措施的建议。即使它们提供，这些建议通常也相当笼统，并非专门针对您的硬件和工作负载进行调优。\n\
  \n## 没有“大红简单”按钮\n\n这最后一个问题——期望数据库基准测试工具完成一切——实际上只是我常称之为 \"*寻找大红简单按钮*\" 这种致命问题的一个症状。因此，我向人们展示图\
  \ 5-2，试图解释：尽管办公用品商店 Staples 可能宣传他们让一切订购变得非常简单，展示着那个大红简单按钮，但在执行数据库基准测试时，实际上并没有这种东西。没有任何基准测试工具是一站式提供大红简单按钮体验的全能解决方案。令人惊讶的是，这似乎让大多数人感到震惊。无论你如何分析，数据库基准测试都是艰苦的工作。这个事实根本无法绕过。\n\
  \n![../images/464117_1_En_5_Chapter/464117_1_En_5_Fig2_HTML.jpg](img/464117_1_En_5_Fig2_HTML.jpg)\n\
  \n图 5-2：Staples 办公用品商店的大红简单按钮\n\n大多数数据库基准测试工具的工作方式相当类似，因此大多数数据库基准测试工作也以大致相同的方式进行。因此，让我们研究一下，无论使用何种数据库基准测试工具，任何成功的数据库基准测试工作为了达到预期结果，必须完整执行的基本步骤。理解这些步骤将有助于更好地解释\
  \ \"*没有大红简单按钮*\" 的含义！\n\n1.  配置和优化独立的网段。\n2.  配置和优化服务器硬件。\n3.  安装和优化服务器操作系统。\n4.\
  \  安装和优化数据库软件（例如 Oracle、SQL Server、PostgreSQL、MySQL 等）。\n5.  创建和优化 \"TEST\" 数据库。\n\
  6.  创建用户或模式来拥有基准测试的数据库对象（即表和索引）。\n7.  **创建并加载基准数据库对象至其初始、工作负载前的状态（显然要删除任何预先存在的数据库对象）。**\n\
  8.  **按照规范运行基准测试工作负载或事务（在大多数情况下会更改数据，因此如果再次运行需要重新加载）。**\n9.  监控工作负载下的数据库性能，诊断问题，然后进行优化。\n\
  10. 重复步骤 7、8、9 和 10，直到满意为止（即结果接近或匹配预期）。\n\n在这个过度简化的 10 步流程中，基准测试工具最多只能真正自动化步骤 7\
  \ 和 8（上面已加粗标出）。同时请注意，这些步骤本质上效率低下，因为执行迭代（这是一种最佳实践且非常普遍）要求数据库基准测试工具每次都重新加载所有数据。对于一个\
  \ 30TB 的 TPC-H 来说，这可能需要一周时间！所以一定有更好、更高效的方法。我建议用以下分解步骤替换步骤 6、7 和 8。\n\n*   创建两个数据库模式：\n\
  \    *   SCHEMA-1 用于保存由基准测试工具创建的 \"*默认*\" 数据库对象的静态副本，不允许进行任何结构性优化\n    *   SCHEMA-2\
  \ 用于保存为执行迭代准备的、经过结构优化的数据库对象副本\n*   为所需规模的基准测试创建数据库基准测试工具的标准项目定义。\n*   将标准基准测试工具项目分成两个不同的阶段：\n\
  \    *   PHASE-1 用于创建数据库对象并将数据加载到 SCHEMA-1\n    *   PHASE-2 将所有数据从 SCHEMA-1 复制到\
  \ SCHEMA-2，并运行下一次迭代的执行\n*   运行 PHASE-1。\n*   备份或导出 SCHEMA-1（以防任何意外故障）。\n*   手动编写一个\
  \ SQL 脚本来创建优化后的数据库对象副本，并使用 \"create table as select\"（CTAS）进行加载（在数据库服务器上运行，因此速度非常快）。\n\
  *   手动将 CTAS SQL 脚本添加到 PHASE-2 中，用于从 SCHEMA-1 复制到 SCHEMA-2，然后运行测试。\n*   运行 PHASE-2\
  \ 以根据需要多次执行测试。\n\n虽然这把简单的 10 步流程扩展到了 15 步，但它实际上使流程更易于理解（即分而治之），并且使重复测试执行的速度提高了几个数量级。另外，如果您想添加其他\
  \ SQL 脚本来收集统计信息和直方图，现在您有了适当的处理阶段划分和可以添加它们的位置。因此，正如您所看到的，“大红简单按钮”或简单基准测试的想法显然是错误的。数据库基准测试是艰苦的工作，需要注重细节以及手动工作来优化一个原本效率不高的过程。\n\
  \n\n\n## 正确的工具部署方式\n\n虽然大多数数据库基准测试工具都易于下载、安装和运行，但它们通常还具备更为复杂的部署方式，却少有用户研究或使用。未能理解并利用这些部署模式可能会严重扭曲测试结果，甚至导致基准测试整体失败。假设你想运行一个拥有\
  \ 10,000 个并发用户的 `TPC-C` 测试。你真的认为你的单台台式机或笔记本电脑能向数据库服务器发送如此大的流量吗？即便你认为可以，那网络带宽呢？一块千兆以太网卡能处理的流量是有限的。虽然测试可能无错误地运行至结束，但这真的代表了数据库服务器所能达到的真实性能吗？然而，许多人正是这么做的，然后纳闷为何结果无法复现或不如预期。\n\
  \n让我们来看一个典型的客户端/服务器类型部署模型，许多数据库基准测试工具都提供此模型以支持运行此类工作负载。在本演示中，我将使用 Quest Software\
  \ 的 `Benchmark Factory (BMF)`。除了在单台计算机上安装和运行 `BMF` 之外，你还可以在其他服务器上部署 `BMF` 代理，以构建如图\
  \ 5-3 所示的分布式架构。\n\n![../images/464117_1_En_5_Chapter/464117_1_En_5_Fig3_HTML.jpg](img/464117_1_En_5_Fig3_HTML.jpg)\n\
  \n图 5-3\n\nBenchmark Factory 分布式架构\n\n核心思想是，台式机或笔记本电脑仅运行中央控制台，而非实际向数据库服务器请求工作的数据库用户会话。这种分布式代理的方法有两个主要优点。首先，用户会话及其工作负载可以分布在许多服务器上，从而分布在多个\
  \ CPU 和内存上。其次，代理服务器可以位于机房内，与数据库服务器有高速网络连接，这样网络带宽和延迟就不会影响性能结果。我曾参与的基准测试项目中，一次测试运行最多使用了多达\
  \ 120 个代理。这确实是运行此类大型测试唯一可靠的方式。请注意，虽然像 `BMF` 这样的工具提供了从控制台自动部署代理的机制，但其他工具则需要先安装软件，然后通过其网络\
  \ IP 地址手动进行链接。这可能为证明像 `BMF` 这样的商业工具的额外成本提供了充分理由。\n\n## 意想不到的人为因素\n\n我将保持本节非常简短，因为我不想听起来像个站在肥皂箱上的传教士。但尽管如此，你至少需要意识到，除了简单的数据库性能之外，其他因素有时可能才是进行基准测试的真正目的。了解这个目的有时可以将努力引导至最有利于达成必要结果的方向。\n\
  \n如果请求或执行数据库基准测试的人心里已经有了定论，那么基准测试本身很可能只是为了通向某个预设结论而需要勾掉的“*待办事项*”清单上的一项。这纯粹是人之常情。它既没有错，也难以避免。意识到这类人为因素有助于取得真正的成功。\n\
  \n### 验证我们的方向\n\n假设你的管理层说：“我们要迁移到云端，因此你需要提供基准测试结果，表明性能相当或更好，以支持成本节约的论点。” 那么，为什么还要测试呢？所有云厂商都提供多种虚拟机配置（例如，通用型、内存密集型、CPU\
  \ 密集型、IO 密集型等），并且为每种配置类型提供可扩展的 CPU 和内存资源分配。管理层真正想要的可能是，哪种规模合适的云虚拟机镜像能够交付所有必需的关键性能指标。这彻底改变了基准测试项目的范围，因为现在你既需要提供建议，也需要提供其性能数据。但这类澄清往往直到基准测试项目进行中才变得清晰起来。\n\
  \n### 自我应验的预言\n\n现在，假设你的管理层说：“我们要用基于 Intel/Linux 的服务器替换现有的 Oracle SPARC/Solaris\
  \ 服务器，因此你需要提供基准测试结果，表明性能相当或更好，以支持成本节约的论点。” 但这个简单的陈述中隐含着一个重大障碍/问题。如果许多目前在 SPARC/Solaris\
  \ 上运行 Oracle 数据库的 DBA 对此次迁移感到不快，而他们最终将执行此次数据库基准测试，那该怎么办？别笑，这发生在我参与的一个主要基准测试项目中。根本无法说服那些\
  \ DBA，新的 Intel/Linux 服务器能够胜任。我不会说有蓄意破坏行为，但我可以说，本应轻松的努力却并非如此，并且花费的时间远超计划。再次强调，你很可能直到基准测试项目进行中才会发现这类问题。\n\
  \n## 十大数据库基准测试误解\n\n我对数据库基准测试的科学及其所有实践者都怀有极大的敬意。然而，如果没有适当的准备和所有必要的工具，这门科学并不适合新手或无知的尝试。然而，每当我加入一个已经进行中并遇到问题的基准测试工作时，我总会发现一些常见的失误。以下是我经常遇到的前\
  \ 10 大误解（其中一些在前面的章节中已经提到）。\n\n### #1：我使用的是像 Quest 的 `Benchmark Factory` 这样的工具，所以这就是我所需要的一切\n\
  \n错误。我强烈建议任何进行基准测试的人，阅读他们将要执行的任何行业标准测试的规范。这是因为自动化这些测试的软件会提出问题或呈现选项，除非你理解这些选项背后的上下文（这在规范中有定义），否则你无法真正定义它们。\n\
  \n例如，非常流行的称为“`TPC-C Benchmark`” ([`http://tpc.org/tpcc/spec/tpcc_current.pdf`](http://tpc.org/tpcc/spec/tpcc_current.pdf))\
  \ 的“OLTP”测试，对“规模”因子定义如下：\n\n> `第 4.2.1 节：` *WAREHOUSE 表用作基本的规模单位。所有其他表（ITEM 表除外）的基数都是已配置仓库数量（即\
  \ WAREHOUSE 表的基数）的函数。这个数量反过来决定了施加于被测系统 (SUT) 的负载，从而产生报告的吞吐量（见第 5.4 条）。*\n\n> `第\
  \ 4.2.2 节：` *对于数据库中的每个活动仓库，SUT 必须接受来自 10 个终端用户群体的事务请求。*\n\n因此，当像 `Benchmark Factory`\
  \ 这样的工具要求提供规模因子时，它指的不是并发用户的数量——而是仓库的数量。所以规模因子 300 意味着 300 个仓库，从而最多支持 3,000 个并发用户。\n\
  \n阅读规范的要求至关重要。它将是我下面提到的每一个剩余误解和问题的根本原因。\n\n\n\n## 2：我拥有昂贵的 SAN，因此无需为 IO 配置任何特殊设置\n\
  \n错误。测试的规模、类型和性质可能要求截然不同的硬件设置，甚至一直深入到 SAN 的最底层。例如，像 TPC-H 这样的数据仓库测试，最适合使用将“预读取”和“数据缓存”设置偏向于读而非写的\
  \ SAN 来处理，而 OLTP TPC-C 则恰恰相反，受益于偏向于写的设置。依赖默认设置可能是一个非常大的错误。\n\n同样，针对这些不同的用途，SAN 的条带深度和条带宽度硬件设置也应该有所不同。此外，当然文件系统和数据库的\
  \ IO 大小应是条带深度的倍数。事实上，一个常见的经验法则是：\n\n`条带深度 >= 数据库块大小 X 数据库文件多块读取计数`\n\n此外，选择最佳的硬件\
  \ RAID 级别通常也应考虑基准测试的性质。OLTP 可能选择 RAID-5，而数据仓库可能更适合 RAID-0+1。\n\n最后，磁盘数量也可能至关重要。例如，TPC-H\
  \ 测试起始规模约为 300 GB。因此，在此规模下，少于 100 个主轴（磁盘）通常是在浪费时间。随着规模扩大，800 个或更多驱动器成为推荐的最小配置是很常见的。关键在于，没有任何\
  \ SAN 缓存对于庞大数据仓库查询的工作负载来说是足够大的。\n\n我曾见过因改变 SAN 设置和磁盘数量而导致`结果差异高达 500%`的情况。\n\n##\
  \ 3：我可以直接使用开箱即用的默认操作系统配置\n\n错误。大多数数据库需要一些先决的操作系统调整，而且大多数基准测试还能从一些额外的调整中受益。例如，我见过通过仅调整一个简单的文件系统参数，Oracle\
  \ 和 SQL Server 运行 TPC-C 基准测试的结果差异达到 50%到 150%。然而，该参数并非这两个数据库的安装或配置推荐的一部分。\n\n现在你可能会争辩说，因为所有测试的机器设置都相同，所以这是“苹果对苹果”的比较，因此可以跳过此步骤。好的，但为什么要可能因此多等三倍的时间，却得到更差的结果呢？因为一个\
  \ 300 GB 的 TPC-H 测试光是加载数据就可能需要数天时间，所以为了在时限内完成，效率往往是至关重要的。\n\n## 4：我可以直接使用开箱即用的默认数据库设置/配置\n\
  \n错误。虽然像 SQL Server 这样的数据库在默认配置下可能“普遍适用”，但像 Oracle 这样的数据库则不然。例如，Oracle 的默认并发会话数是\
  \ 50。因此，如果你尝试运行一个超过 50 个用户的 TPC-C 测试，你已经陷入麻烦了。\n\n同样，基准测试的性质再次决定了应设置多少不同的数据库配置参数。例如，在\
  \ Oracle 上运行 TPC-C 测试，将`init.ora`参数设置为以下值可能非常有益：\n\n*   `SGA_TARGET` & `SGA_MAX_SIZE`\
  \ = 内存的 60%\n*   `PGA_AGGREGATE_TARGET` = 内存的 20%\n*   `CURSOR_SHARING` = SIMILAR\n\
  *   `OPTIMIZER_INDEX_CACHING` = 80\n*   `OPTIMIZER_INDEX_COST_ADJ` = 20\n\n我曾见过仅调整少数几个这样的参数，就带来了`高达\
  \ 533%的数据库基准测试性能提升`，所以想象一下，仔细审查所有针对测试性质的数据库配置参数能带来什么！\n\n## 5：像 Benchmark Factory\
  \ 这样的工具会为我的硬件创建最优设计的数据库对象\n\n错误。像 Benchmark Factory 这样的软件只是一个工具，用于自动化执行基准测试所必需的复杂而繁琐的过程。例如，TPC-H\
  \ 只是 22 个非常长且复杂的`SELECT`语句的集合，它们针对一个非常简单的数据库设计（包含一些非常大的表）。它测试数据库优化器在处理复杂语句解释计划及其执行方面的效率。因此，最优的数据库结构设计可能在达到的性能中扮演重要角色。\n\
  \n然而，大多数数据库基准测试工具提供的简单`CREATE TABLE`语句是次优的。我请你回顾本章前面关于那个大的红色简易按钮以及执行数据库基准测试的 15\
  \ 个推荐步骤的部分。为了获得最佳结果，你应该手动优化数据库对象的结构设计，即使像 Benchmark Factory 这样的工具提供了一些有限的优化能力，因为该工具无法知晓你的硬件配置。\n\
  \n## 6：像 Benchmark Factory 这样的工具会自动监控、调整和优化我的所有硬件、操作系统和数据库配置参数\n\n错误。正如前文所述，数据库基准测试工具仅仅是设计用来让数据库“流汗”的跑步机——仅此而已。像\
  \ HammerDB 这样的工具运行查询和/或 DML，让数据库在特定场景下努力工作，以便了解瓶颈可能存在于何处——但不是为了查找或识别这些问题。\n\n如果你想为了此类测试监控、诊断或调整/优化你的数据库，你将需要适当的工具，如\
  \ Quest Software 的 Spotlight for Oracle 或带有调优和诊断包的 Oracle Enterprise Manager。请记住，像\
  \ Benchmark Factory 这样的数据库基准测试工具只是一个`“负载生成器”`。\n\n## 7：我不需要 DBA 来执行基准测试——任何技术人员都可以做\n\
  \n错误。再次查看上面所有问题——有时数据库开发人员或其他仅具备技术数据库知识的人可能没有意识到或无权做出此类决策。关键点再次在于，基准测试不仅仅需要有人来运行测试——它需要懂基准测试并且能够解决上述所有问题的人。否则，你得到的结果并不能真正反映你的硬件能力。而上面提到的\
  \ 500%以上的性能差异不仅仅是无价值的背景噪音；你可能会基于这种错误信息做出错误的战略决策。\n\n## 8：我可以在相同的硬件平台上非常容易地比较数据库供应商\n\
  \n可能可以。如果你有一个或多个 DBA 能够为每个不同的数据库平台解决上述所有问题，那么当然可以。否则，你无法仅仅通过为每个数据库安装并运行相同的测试来可靠地比较它们。依赖和变量太多，无法信任这种过于简单的方法。\n\
  \n## 9：每秒事务数（即 TPS）是基准测试中最关键的指标\n\n很少。我认为 TPS 是最具误导性的数值之一——但每个人似乎首先关注它。让我解释一下。当你增加用户数或执行的任务数时，根据定义，你实际上是在增加\
  \ TPS。在某个时刻它可能会趋于平稳，但这能告诉你什么呢？下图 5-4 显示了在改变上述误区 4 中的各种 Oracle 配置参数时运行 TPC-C 基准测试的结果。仅看\
  \ TPS 数字，我们并没有看到被引用的 533%的提升。\n\n![../images/464117_1_En_5_Chapter/464117_1_En_5_Fig4_HTML.jpg](img/464117_1_En_5_Fig4_HTML.jpg)\n\
  \n图 5-4 TPC-C 每秒事务数结果\n\n然而，当我们查看这些相同测试运行的平均响应时间时（如下图 5-5 所示），现在 533%的数字应该明显得多。使用默认数据库配置设置的测试运行#1\
  \ 在 500 个并发用户下的平均响应时间为 5 秒，而测试运行#4 和#5 的平均响应时间约为五分之一秒。平均响应时间不仅在用户或 SLA 方面具有实际意义，而且更加明显和易于理解。\n\
  \n![../images/464117_1_En_5_Chapter/464117_1_En_5_Fig5_HTML.jpg](img/464117_1_En_5_Fig5_HTML.jpg)\n\
  \n图 5-5 TPC-C 平均响应时间结果\n\n\n"
- '# 6. 基准测试硬件选项


  ## 概要


  本章涵盖了在进行数据库基准测试时，你几乎必然会遇到的大多数常见意外和陷阱——即使你已经遵循了前面章节中所有推荐的准备工作。简而言之，基准测试过于复杂，任何人都无法识别出每一个可能影响测试工作及其结果的变量或问题。因此，准备好随时处理这些突发问题至关重要。本章最后详细介绍了在许多数据库基准测试项目中观察到的十大误解。


  ### #10：我们只需花几天时间就能基准测试所有我们感兴趣的内容


  绝不可能。几乎无一例外，所有依赖组件的正确设置可能就需要一到两周——而在进行大规模基准测试时，有时数据加载和索引创建还能再增加一周时间。因此，请务必仔细规划完成这些工作所需的时间。因为即使你遵循了以上所有建议，途中也总会有意外发生。


  ## 绘制架构图


  当使用本地硬件时，第一个且通常至关重要的步骤是，从上到下构建所有组件（包括所有网络和存储）的架构图。这样做有几个原因：


  *   作为理解、规划和部署所有必要硬件的共同参考

  *   为问题诊断和解决提供所有必要组件的完整路线图

  *   应包含在描述基准测试工作的任何可交付成果或已发布的文档中


  虽然所有三个原因都有价值，但用于问题诊断的路线图通常最为关键。这是因为，任何数据库应用程序所体验或感知到的性能，是由众多必需组件的协同努力共同决定的。这一点至关重要，因为数据库本身可能并不总是性能问题的根本原因。正如我在前面章节中提到的，有时一个配置错误的网络交换机、一个故障的网卡（NIC）或磁盘存储
  LUN 配置，可能才是真正的罪魁祸首，只是让数据库看起来很慢。因此，拥有这些信息可能成就或破坏一次数据库基准测试工作。现在看一下图 6-1，这是我曾经测试过的一个
  10 节点 Oracle 真正应用集群（RAC）。


  ![../images/464117_1_En_6_Chapter/464117_1_En_6_Fig1_HTML.jpg](img/464117_1_En_6_Fig1_HTML.jpg)


  图 6-1：十节点 Oracle RAC 集群


  还记得心脏压力测试的类比吗？这里我们有运行在 Benchmark Factory“跑步机”上的 Oracle 数据库，连接到一个名为 Spotlight on
  RAC 的“心脏监护仪”。然而，无论此图看起来多么详细，它都缺少了实际的存储信息，如 RAID 级别、条带宽度和深度、每个 LUN 的磁盘数以及 SAN 或 NAS
  控制器/缓存信息。因此，你可能需要几张图才能获得所有关键硬件组件及其配置的完整概览。在一个典型的项目中，通常需要三到五张图才能全面理解，这并不少见。


  有时，负责执行数据库基准测试的团队会质疑这种图的必要性。他们的服务器都已经连接好并准备就绪了。测试的是数据库，如果真的出现问题，他们认为图真的没必要。我通常会反问：如果没有路线图、没有
  GPS、没有智能手机，你能从纽约市开车到达达拉斯而不迷路或不比预期花更长时间吗？想象一下，数据库监视器报告了等待事件，例如非常高的延迟或 I/O 读写。许多数据库管理员会首先关注那些对这些等待负最大责任的
  SQL 语句。但是，如果数据库设计合理、查询编写良好、执行计划也相当优化呢？你可能会花费时间试图从“石头里榨油”，假设数据库需要更改某个神奇的配置参数、在最大的表上添加新索引，或者试验
  SQL 以识别更好的执行计划。有时这确实是正确的方法。但当你有意对整个系统施加压力时，任何一个组件的故障或失效也很可能就是罪魁祸首。你必须保持开放的心态和视野，认识到问题可能出在哪里，才能从该系统中获得尽可能高的数据库性能。


  ## CPU 与内存


  通常，最初被认为最关键的系统组件是 CPU 和内存。对于 CPU，需要关注插槽数量、每个插槽的核心数以及是否支持超线程。然后是内存，有多少 RAM 可以分配给数据库？此外，这些
  RAM 应该如何在可用的各种数据库内存分配之间分配？这些显然都是重要问题。但是，当你购买一辆汽车时，你不会把发动机马力和油箱大小作为两个最重要的问题。还有许多其他因素，比如网络延迟和最大
  I/O 速率，很可能才是真正限制性能的因素。然而，专注于那些容易吹嘘或夸耀的东西是人的天性，比如系统有 64 个线程。不过，在数据库基准测试工作中，利用的 CPU
  和内存资源少于服务器本身具备的资源，这种情况并不少见。


  好了，既然我说了不要只关注 CPU 和内存，但有一个例外。某些数据库版本或版本可能会限制数据库实际可以使用的 CPU 和内存量。例如，Microsoft SQL
  Server 2017 的 CPU 限制如图 6-2 所示。


  ![../images/464117_1_En_6_Chapter/464117_1_En_6_Fig2_HTML.jpg](img/464117_1_En_6_Fig2_HTML.jpg)


  图 6-2：SQL Server CPU 限制


  假设你正在一个具有双路插槽的服务器上测试标准版，每个 CPU 有 16 个核心加上超线程，总计 64 个线程。由于这远远超过了 24 个的限制，SQL Server
  将仅利用总 CPU 容量的一部分。事实上，因为我们想确保 SQL Server 在任何给定时间都使用最高效的 CPU，我们可能需要禁用超线程，以便确定 SQL
  Server 所使用的 CPU 是全功能的、真正的物理核心。因此，在服务器 BIOS 中禁用超线程可能是可取的。具体情况会有所不同，因此最好对此进行测试，而不是直接将其视为事实。


  ## 旋转磁盘


  在本节中，我们将讨论范围限定在传统的旋转磁介质磁盘。无论使用 SAS 还是 SATA 磁盘，此处包含的概念同样适用。


  任何数据库的**阿喀琉斯之踵**都是 I/O。无论数据库使用多少个 CPU，它们在某个时刻都必须等待 I/O。事实上，随着 CPU 每插槽核心数和超线程技术的提高，如今
  CPU 的处理能力很容易超过磁盘的读写速度。此外，像 `TPC-H`（可能还有 `TPC-DS`）这样的数据库基准测试，其性能通常受限于磁盘主轴的数量。再者，诸如磁盘阵列的控制器数量、磁头数量、缓存大小以及某些固件设置等因素，都会影响所能达到的整体
  I/O 带宽。而 RAID 配置对于数据库而言可能至关重要。让我们深入探讨这些方面。


  我们假设您正在一个非共享或专用的 NAS 或 SAN 上进行基准测试，这样您可以要求进行与基准测试工作相关的更改。一个常被忽视的方面是固件的预读算法选择以及读/写缓存大小的配置。我曾遇到过一个
  `TPC-H` 基准测试项目，用户对我们达成的性能结果不满意。当时我们尚未深入到这种级别的优化细节。后来我们更改了固件设置，看到了完成项目所需的性能提升。有时，小细节确实很重要。


  我在基准测试中遇到的另一个令人沮丧的领域（在生产环境中也是非常糟糕的做法）是，数据库过度使用 `RAID 5` 或 `RAID 6`。我理解每个人都想做 RAID，而且我们都认为越大越好（这里的“越大”意味着总的可用空间越多）。但我总是向人们强调，为了获得最佳的数据库性能（无论是基准测试还是生产环境），最好的级别是
  `RAID-10`（有时称为 `RAID-1+0`），无论损失多少空间。空间足够快比拥有大量缓慢的空间要好。然而，我总是发现自己需要提醒人们注意图 6-3 所展示的
  RAID 开销。


  ![../images/464117_1_En_6_Chapter/464117_1_En_6_Fig3_HTML.jpg](img/464117_1_En_6_Fig3_HTML.jpg)


  图 6-3

  不同 RAID 级别的 I/O 影响


  `RAID-10` 的写入次数可能是两次，但那是两次同时将相同数据写入两个不同磁盘的操作，通常任意一次相同的并发 I/O 完成就表示成功。现在看看 `RAID-5`
  和 `RAID-6`，其值分别为 4 和 6。这些写入操作涉及的都是不同的数据。有些是实际数据的切片，有些是奇偶校验字节。关键点在于需要完成的总 I/O 操作多得多，而且必须全部完成后，I/O
  操作才会报告成功。实际性能下降并非真的是 2 倍或 3 倍，但非常明显。因此，在所有数据库基准测试项目（以及生产环境）中都应避免使用 `RAID-5`。


  现在，我们来谈谈数据库基准测试中最常被忽视的 I/O 考虑因素之一：条带宽度和深度（或大小）。假设您的数据库块或页大小为 4K。再假设您的存储管理员为您创建了一个由
  8 个磁盘组成的 `RAID-10` LUN，因此每个数据副本有 4 个磁盘。那么条带宽度就是 4。一个可能的理想条带深度可以这样计算：`N * 块或页大小`，其中
  `N >=1`。这被称为**粗粒度条带化**，旨在通过将许多并发的 I/O 请求分散到更多磁盘上来最大化总体 I/O 吞吐量。这对于高并发 OLTP 系统以及数据仓库被认为是可取的。有时人们（错误地）选择**细粒度条带化**，他们希望每个单一的
  I/O 请求都跨越所有磁盘。他们将条带深度计算为 `块或页大小 / 条带宽度`。虽然这种选择可能使单个 I/O 更快，但它也会使处理大量并发 I/O 操作变慢，因为它们需要排队。请记住，大多数数据库需要处理大量的并发
  I/O，因此选择这个选项可能会导致非常不理想的性能。选择它时，请确保您有充分的理由。


  ## 新存储技术


  过去十年，存储领域发生了三大积极变化：价格更便宜，磁盘容量变得非常大（12TB/盘），并且出现了比传统旋转介质磁盘快得多的新存储技术。让我们探讨一些更常见的新技术。


  第一个突破是固态硬盘或 `SSD`。它们本质上是 NAND 芯片，封装了处理器和控制器，提供的存储在外观和感觉上都与传统磁盘非常相似，但运行速度要快得多。图 6-4
  展示了一个架构示例。


  ![../images/464117_1_En_6_Chapter/464117_1_En_6_Fig4_HTML.jpg](img/464117_1_En_6_Fig4_HTML.jpg)


  图 6-4

  固态硬盘的架构


  然而，`SSD` 有一个主要缺点：它们使用旧的 `AHCI` 和 `SAS/SATA` 协议来访问 NAND 芯片。这些协议是为旋转介质编写和优化的。因此，它们包含了针对内磁道与外磁道以及其他许多不再需要的逻辑。此外，即使
  NAND 芯片可以快速处理数据，这些协议也存在内置的瓶颈，受制于 `SAS/SATA` 的 600 MB/s 和 1200 MB/s 数据传输限制。尽管如此，`SSD`
  仍开启了一个更快 I/O 的时代。


  第二代基于闪存的技术基本上是将 `SSD` 磁盘技术做到一张卡上，插入快速的 `PCIe` 总线，这将数据传输速率大幅提升至 2000 到 8000 MB/s。这些卡可以放置在数据库服务器上，在某些情况下也可以放置在
  `SAN` 或 `NAS` 存储阵列上。事实上，很快出现了一种全新的存储解决方案，称为**全闪存阵列**。


  第三代基于闪存的技术是用非易失性内存快速通道（`NVMe`）取代旧的 `AHCI` 和 `SAS/SATA` 协议。这个新协议是从零开始编写的，专为处理闪存而设计，没有遗留旋转磁盘的包袱。因此，`NVMe`
  提供高达 32000 MB/s 的数据传输速率。这比第一代 `SSD` 快了 53 倍以上。


  此外，还有一些令人兴奋的新技术即将成为主流，例如傲腾（Optane），它提供了接近 RAM 内存的速度，同时具有 `SSD` 般的容量。


  那么，这些新技术如何影响数据库基准测试呢？简单明了的答案是，您可以将数据库放在 `SSD` 或 `NVMe` 闪存上以获得更好的结果。如果您的数据库对于基于闪存的存储来说太大，您仍然可以将
  `TEMP`、`ROLLBACK`、`LOGGING` 等区域放在这些设备上，以加速许多内部数据库操作。我见过一些数据仓库基准测试，我们有 30TB 的数据，无法全部放在闪存上，但仅仅将其用于排序和分组的临时区域，就带来了显著的性能提升。同样，在
  OLTP 基准测试中，仅将闪存用于日志记录和回滚活动，结果也相当惊人。关键在于，即使不能把所有东西都放在闪存上，通过选择合适的、有限的项目放在闪存上，也能带来益处。


  ## 专用设备


  最后一个你可能需要为其进行基准测试的领域是专用数据库或 I/O 设备。这些设备在主流云技术兴起之前相当流行。本质上，这些设备只是硬件厂商构建的超融合计算机系统，旨在通过优化组件选择和整体系统配置来提升数据库性能。以下是一些示例：


  *   `Oracle Exadata`

  *   `Oracle Database Appliance (ODA)`

  *   `Dell Fusion IO`

  *   `HP StorageWorks IO Accelerator`

  *   各种超融合系统解决方案


  如果你遇到其中任何一种需要进行数据库基准测试的专用环境，我的建议是聘请熟悉此类系统的顾问。例如，`Oracle Exadata`非常复杂。我管理过一个`Exadata`系统四年。我学到了许多利用`Exadata`独特功能来优化数据库基准测试结果的新方法。没有一本书能涵盖如此丰富的详细信息。你显然需要一些帮助。


  '
- '# 总结


  本章篇幅较短，涵盖了在任何数据库基准测试项目中值得注意和纳入的关键硬件问题。请记住，我们不能简单地通过堆砌硬件来解决性能问题。但反之亦然：在试图解决数据库性能问题时，我们也不能忽视硬件选项。至少，仅仅添加一个廉价的`SSD`来存放临时数据或日志数据就能产生可观的效果。此外，一些新技术提供了超过`50
  倍`的`IO`速度提升，而且更好的技术即将到来。因此，在进行数据库基准测试时，永远不要忘记考虑硬件方面和选项。


  '
- "# 7. 基准测试软件选项\n\n上一章涵盖了一些在执行数据库基准测试项目时需要审查和考虑更换的重要硬件选项。尽管过去十年的硬件进步令人惊叹（例如，我刚组装了一台新的桌面`PC`，其`CPU`提供了`16`个逻辑核心或线程），但我们不能也不应总是自动地寻求硬件来解决性能问题。实际上，大多数基准测试工作可以通过利用适当的新数据库功能来获得最大的性能分数提升。数据库厂商同样做出了重大改进，通常是为了利用许多新的硬件技术。本章将重点讨论需要考虑的常规数据库功能，以及利用这些新技术的新功能。\n\
  \n在考虑这些新数据库功能时，你需要将两个想法放在首位。首先，基准测试规范是否允许使用这些强大的新数据库功能，或者至少没有明确说明不能使用？其次，你的数据库厂商是否需要为这些酷炫的新功能支付额外的许可费用？例如，一些数据库厂商对`多租户`、`分区`、`高级压缩`和`内存中`等功能收取额外费用，而其他厂商则不收。事实上，一家主要厂商从其最新版本开始，所有版本都提供所有功能，只是根据版本限制了最大`CPU`和内存。*我个人希望其他人也能效仿这个好榜样。*\n\
  \n### 注意\n\n虽然本章可能重点举例某个特定数据库厂商，但贯穿本章展示的主要原则和概念将保持不变。因此，请不要过于关注提到的任何特定数据库或厂商。\n\n\
  ## 绘制图表\n\n在处理任何数据库应用程序软件时，尤其是在进行数据库基准测试项目时，首要且通常是关键的一步是构建所有主要持久化对象的数据库结构图 (`DSD`)。请注意，我故意没有说实体关系图\
  \ (`ERD`) 或数据模型，因为许多 `DBA` 既不喜欢也不使用它们。所以我希望这样引用可以避免任何反对意见。当在这个图表问题上受到质疑时，我会问那些反对的\
  \ `DBA`，如果他们在为孩子组装一辆新自行车，而说明书里一张图片都没有，他们会作何感想？我坚信，为了排查数据库性能问题，你必须有一张图表，因为你可能并未参与最初的数据库设计，或者它实在太大了，无法在脑海中想象出来。\n\
  \n回到数据库基准测试，大多数规范都包含这样的结构图，如 `TPC-H` 基准测试的 `图 [7-1]` 所示。请注意，此图显然不是 `ERD`，因为它没有使用任何标准的数据建模符号。充其量，这是一个纯粹的物理模型，应该更容易被大多数\
  \ `DBA` 所接受。但从这个图中我们可以看出表的名称、它们包含的列、它们是如何连接的，以及基于比例因子的一些大小估计。但缺少一些关键项目，例如列的数据类型和哪些列被索引。因此，供你考虑的一个建议是，一旦你的基准测试工具创建了对象，就使用数据建模工具对数据库设计进行逆向工程。这样你就能获得所有额外的关键信息，并且可以根据你的喜好来组织图表布局。\n\
  \n![../images/464117_1_En_7_Chapter/464117_1_En_7_Fig1_HTML.jpg](img/464117_1_En_7_Fig1_HTML.jpg)\n\
  \n`图 7-1` `TPC-H` 基准测试的完整模式\n\n不要因为这个简单的示例图而放松警惕；旧的数据库基准测试过于简单。然而，新的数据库基准测试则复杂得多，也更贴近现实。例如，`TPC-DS`\
  \ 使用了一个星型模式设计，包含七个不同的星（即主题领域）。`图 [7-2]` 仅显示了 `TPC-DS` 中关于商店销售的星型模式。在整个数据库设计中还有另外六个同样复杂的星。请注意，`图\
  \ [7-2]` 和其他六个主题领域仅列出了表名并显示了基本关系，没有说明是哪些列相关。因此，我再次强烈建议你，一旦基准测试工具创建了对象，就使用数据建模工具对数据库设计进行逆向工程。\n\
  \n![../images/464117_1_En_7_Chapter/464117_1_En_7_Fig2_HTML.jpg](img/464117_1_En_7_Fig2_HTML.jpg)\n\
  \n`图 7-2` `TPC-DS` 基准测试的销售星型模式\n\n但在我看来，最复杂的数据库设计是 `图 [7-3]` 所示的 `TPC-DS` 基准测试的设计。你几乎无法看清表或列的名称。但你可以看到有\
  \ `34` 个表，它们之间有着非常复杂的相互关系。在这方面，`TPC-DS` 数据库设计非常类似于你可能为某些内部数据库应用程序开发的现实世界数据库设计。想象一下，看一个长达\
  \ `30` 行、引用了 `7` 个表的 `TPC-DS` 查询。没有图表，你如何理解它试图完成什么，更不用说这些表之间实际是如何关联的，以及应该如何连接了。此外，在没有这些知识的情况下，你如何建议新的索引或优化器提示？为了对\
  \ `图 [7-3]` 进行逆向工程，我使用了 `Quest Software` 的 `Toad Data Modeler`。但任何提供逆向工程功能的好数据建模工具都应该足够。事实上，大多数工具都提供免费版本，可用于有限数量的对象（例如\
  \ `25` 或 `50` 个），因此你甚至不需要购买工具来构建这些图表。\n\n![../images/464117_1_En_7_Chapter/464117_1_En_7_Fig3_HTML.jpg](img/464117_1_En_7_Fig3_HTML.jpg)\n\
  \n`图 7-3` 复杂的 `TPC-DS` 基准测试模式\n\n### 注意\n\n从此处开始引用的功能在你的数据库厂商的产品中可能可用，也可能不可用，并且它可能是一个额外收费的项目。因此，在使用这些想法之前，请确保你已获得适当的许可。\n\
  \n\n## 对大型对象进行分区\n\n对于非常大的表和索引——通常数据仓库和超大规模 OLTP 基准测试需要它们——数据库提供的将对象分区或拆分到单独“桶”中的选项是一种极其有用的技术。这些桶看起来和行为上都像一个逻辑上的大桶。其思想是查询可以通过一个称为**分区消除**的过程更快地找到行。想象一个名为\
  \ `ORDERS` 的非常大的表，其数据按年份分区到桶中，如图`7-4`所示。假设我们查询 `ORDERS` 表，请求当前年份和前一年中任何超过 500 美元的订单的平均订单大小。因此数据库优化器知道它只需扫描\
  \ 2017 和 2018 桶的索引，而可以跳过或消除 2015 和 2016 年的索引扫描。\n\n![../images/464117_1_En_7_Chapter/464117_1_En_7_Fig4_HTML.png](img/464117_1_En_7_Fig4_HTML.png)\n\
  图 7-4：按年份分区的 `ORDERS` 表\n\n对于足够大的对象，分区消除可以极大提高查询性能。然而，当用于较小的表时，净收益可能微不足道，甚至对查询来说效率更低。因此，您应该谨慎地仅在合适的时候使用此功能。历史上，我分区表时，每个桶包含数千万到数亿行。不要将这些数字视为硬性建议，而应将其作为一个示例，让您了解按当今标准“非常大”究竟意味着什么。还要注意，您也可以进行**子分区**。假设我们是亚马逊（Amazon），每年有数十亿个订单。那么一个年份的桶仍然会相当大。在这种情况下，您可以对分区再进行分区：这称为子分区。因此，在本例中，我们可能进一步按月对每一年进行分区。现在优化器可以在子分区级别进行进一步的消除。但请注意，在我们的例子中，对于当前年份和前一年中任何超过\
  \ 500 美元的订单，优化器无法消除任何子分区，因此它实际上必须处理 12 个较小的索引扫描，而不是一个大的扫描。这可能更慢，所以再次强调，要明智选择。\n\n\
  为了演示分区能提供什么样的性能提升，现在请看图`7-5`。该图显示了针对一个 300GB 数据库运行 22 个 TPC-H 查询所需的时间，对比了非分区实现与分区实现（其中\
  \ `ORDERS` 和 `LINEITEM` 表已分区）。具体的分区方案没有详细说明，因为关于最佳方式确实没有一个普遍的答案。您应该根据许多因素进行分区，包括存储子系统的带宽和能力。还要注意，这种仅为\
  \ 22 个查询的总运行时间评分的简单方法并不是对 TPC-H 基准测试进行评分的正确方式，但对于此目的来说，它是合理且足够的。对于我的数据库服务器、数据库版本和配置，性能提升了`35.93%`。您的结果可能会有所不同。\n\
  \n![../images/464117_1_En_7_Chapter/464117_1_En_7_Fig5_HTML.png](img/464117_1_En_7_Fig5_HTML.png)\n\
  图 7-5：分区带来的 TPC-H 改进\n\n## 高级数据压缩\n\n尽管过去几年磁盘空间的每 GB 成本已大幅下降，但数据压缩仍能从某些方面使数据库性能受益。借助能够大幅缩减数据的高级数据压缩，压缩和解压缩数据的成本可以被读写更少数据所带来的收益所抵消。此外，数据在数据库的数据缓存中占用的空间更小，因此缓存本质上表现得如同更大（即，拥有更多内存）。另外，如果您的存储是通过\
  \ Infiniband、以太网或光纤通道传输数据的 SAN 或 NAS，那么需要传输的数据量也会减少。所有这些优势有时可以累积成显著的性能提升。但与分区一样，您需要明智地选择何时使用压缩（特别是如果它还需要额外成本的话）。\n\
  \n为了演示压缩能带来什么样的改进，现在请看图`7-6`。该图显示了针对一个 300GB 数据库运行 22 个 TPC-H 查询所需的时间，对比了非压缩实现与压缩实现（其中\
  \ `ORDERS` 和 `LINEITEM` 表已压缩）。请注意，不同的数据库提供差异很大的不同压缩选项。但压缩选项通常分为三大类：\n\n![../images/464117_1_En_7_Chapter/464117_1_En_7_Fig6_HTML.png](img/464117_1_En_7_Fig6_HTML.png)\n\
  图 7-6：压缩带来的 TPC-H 改进\n\n*   未压缩 vs. 压缩（简单的二进制选项）\n*   页级压缩 vs. 行级压缩\n*   多级压缩层次：\n\
  \    *   基础表压缩\n    *   高级行压缩\n    *   混合列式压缩 - 低\n    *   混合列式压缩 - 高\n\n请记住，这种仅为\
  \ 22 个查询的总运行时间评分的简单方法并不是对 TPC-H 基准测试进行评分的正确方式，但对于此目的来说，它是合理且足够的。对于我的数据库服务器、数据库版本和配置，性能提升了`19.92%`。如前所述，与分区一样，您的压缩效果也会有所不同。\n\
  \n现在，并非本章介绍的每一个高级数据库功能都能轻易组合以获得累积的正面收益；然而，根据您的数据库平台，分区和压缩通常可以结合使用。此外，我们必须现实地看待我们的性能改进期望。图`7-7`显示了结合分区和压缩的净效果；性能提升了`46.04%`。请注意，性能提升并不像我们预期的那样具有累积性。虽然我们本可以预期\
  \ 36% + 20% 总共 56%，但我们只得到了 46%。原因很简单。同时实现多个功能带来的好处通常不会导致纯粹的加性改进，因为不同技术之间的复杂交互往往会相互扭曲。而且，可实现的改进是有限的。正如俗话所说，“你无法从芜菁中榨出血来”。\n\
  \n![../images/464117_1_En_7_Chapter/464117_1_En_7_Fig7_HTML.png](img/464117_1_En_7_Fig7_HTML.png)\n\
  图 7-7：分区与压缩共同带来的 TPC-H 改进\n\n\n## 使用 SSD 扩展内存\n\n一些数据库供应商提供了一项有趣且独特的功能，允许数据库管理员将闪存盘或\
  \ SSD 挂载为数据库 RAM 数据缓存的扩展。当然，闪存盘或 SSD 的运行速度比标准 RAM 内存慢，但基本上整个闪存盘或 SSD 就成了数据库 RAM\
  \ 数据缓存的二级内存。这项功能非常吸引人有两个原因。首先，它是免费的（没有额外成本）。其次，它实施起来快速简便。Oracle 将此功能称为 `Database\
  \ Smart Flash Cache`（不要与 Oracle Exadata 的 Smart Flash Cache 混淆）。Microsoft SQL Server\
  \ 有一个类似的功能，称为 `Buffer Pool Extensions`。它们本质上做的都是完全相同的事情。\n\n为了演示通过闪存盘或 SSD 扩展内存能提供怎样的性能示例，请看图\
  \ 7-8。该图显示了在 RAM-only 数据库数据缓存设置下，与通过 64GB SSD 盘扩展 RAM 相比，针对一个 300GB 数据库运行 22 个 TPC-H\
  \ 查询所需的时间。对于我的数据库服务器、数据库版本和配置，性能提升仅为 10.33%。你可能会疑惑为什么这个功能表现没有更好。有几个合理的原因。首先，TPC-H\
  \ 倾向于对非常大的行数据集合应用聚合函数。因此缓存往往不堪重负。其次，可能存在一个临界点，超过该点后向缓存中添加较慢的闪存盘或 SSD 会适得其反。扫描混合速度技术来匹配缓存块或页面可能造成的损害大于改进。实际上，我使用较小的闪存盘（16GB）得到了更好的结果。但我不能断言总是使用较小的容量就是最好的；在我的测试环境下恰好如此。我还使用\
  \ PCIe NVME 闪存盘得到了更好的结果，但这仍然不足以让我断然否定使用 SSD 盘进行缓存扩展。但常识合理地表明，在相同容量下，基于上一章强调的关键原因，PCIe\
  \ NVMe 闪存盘应该始终是用于此目的的最佳 SSD 盘。\n\n![../images/464117_1_En_7_Chapter/464117_1_En_7_Fig8_HTML.png](img/464117_1_En_7_Fig8_HTML.png)\n\
  \n**图 7-8**\nSSD 扩展带来的 TPC-H 性能提升\n\n## 在内存中固定表\n\n一些数据库提供了机制来建议甚至强制某些表和索引应固定在内存中，或者以极其缓慢的速度老化淘汰，从而有效地看起来像是被固定。你可能会使用如下语法或命令：\n\
  \n```\nCREATE or ALTER TABLE ... CACHE\nALTER object_name PIN | KEEP\nEXECUTE function\
  \ PINTABLE | KEEP\n```\n\n另一种方法是允许数据库数据缓存被划分为具有不同老化特性的区域，例如 `KEEP` 和 `RECYCLE`。然后，你只需创建或更改对象以指定应用哪个不同的缓存区域，从而应用不同的老化特性。需要记住的关键点是，这些都不是将表或索引锁定在内存中的真正方法（这是本章后面讨论的另一个功能）。\n\
  \n为了演示在内存中固定对象能提供怎样的性能示例，请看图 7-9。该图显示了在未固定设置下，与将较小的查找表和所有索引固定后的设置相比，针对一个 300GB 数据库运行\
  \ 22 个 TPC-H 查询所需的时间。对于我的数据库服务器、数据库版本和配置，性能提升仅为 16.02%。你可能再次期望更大的提升，因为固定在内存中应该非常快。但有几个原因可以解释这个结果。首先，数据库实际上只是尝试将对象固定在内存中或使其老化淘汰得更慢。因此，这不是真正的内存解决方案。其次，TPC-H\
  \ 倾向于对非常大的行数据集合应用聚合函数。因此，无论你如何努力控制，缓存往往都会不堪重负。第三，即使对于只有八张表（及其索引）的模式，选择合适的对象和应用的老化特性也很困难。\n\
  \n![../images/464117_1_En_7_Chapter/464117_1_En_7_Fig9_HTML.png](img/464117_1_En_7_Fig9_HTML.png)\n\
  \n**图 7-9**\n固定对象带来的 TPC-H 性能提升\n\n## 列存存储与行存存储\n\n传统的关系型数据库，如 `Oracle` 和 `SQL Server`，基于关系代数和关系演算，并且遵守任何关系型数据库都应遵循的\
  \ `Codd 的 12 条规则`。其中的关键是数据以元组或行的形式表示和存储。对于许多传统的商业应用程序（如 OLTP）来说，这种范式运作良好。然而，随着数据仓库等新型商业数据库应用需求的出现，关系模型未能如预期那样良好地扩展。因此，列式数据库应运而生，例如\
  \ `Vertica`、`Sybase IQ`、`Teradata`、`Greenplum` 等许多其他产品。这些新的列式数据库处理超大型数据库，提供三大优势：\n\
  \n1.  所需空间更少（并且数据压缩效果更好）\n2.  从非常大到极大的规模扩展性好得多\n3.  报表查询运行速度快得多，且 IO 操作大幅减少\n\n\
  随着关系型数据库多年来开始添加非关系类型的功能，例如多值列和嵌套表（根据 `Codd 的 12 条规则`，这两者都是主要的不合规项），关系型数据库供应商自然希望整合并受益于列式方法。其中一些供应商只是简单地添加了列存存储选项，而另一些则将内存技术（下一节）与列存存储相结合。图\
  \ 7-10 突出了表以行存储与以列存储之间的主要区别。请注意，尽管这是两种截然不同的方法，但用于处理它们的 `SQL` 语言并未改变。数据库优化器和引擎在处理列式数据时，可以在内部更快地执行某些查询操作。一个常见的例子是在对一个非常大的表中的列执行\
  \ `group` 函数时。\n\n![../images/464117_1_En_7_Chapter/464117_1_En_7_Fig10_HTML.jpg](img/464117_1_En_7_Fig10_HTML.jpg)\n\
  \n**图 7-10**\n行存储磁盘布局 vs. 列存储\n\n为了演示列式方法能提供怎样的性能示例，请看图 7-11。该图显示了将一个 300GB 数据库保存为行存格式与列存格式时，运行\
  \ 22 个 TPC-H 查询所需的时间。对于我的数据库服务器、数据库版本和配置，性能提升达到了惊人的 67.48%！考虑到一些 TPC-H 查询执行的操作并不最受益于列存格式，这个结果已经相当不错了。数据库所需的磁盘空间也减少了约\
  \ 60%（未指定额外的高级压缩选项）。\n\n![../images/464117_1_En_7_Chapter/464117_1_En_7_Fig11_HTML.png](img/464117_1_En_7_Fig11_HTML.png)\n\
  \n**图 7-11**\n行存格式带来的 TPC-H 性能提升\n\n## 新的“内存中”表\n\n多个主要关系型数据库供应商已采用的一项热门新技术是内存表。与之前关于固定表的部分更多是一种请求不同，这些新的内存表是真正的\
  \ **100% 内存中**。当然，除了数据库通常分配的所有其他内存外，你还需要具有足够 RAM 内存的数据库服务器来容纳这些表。一般来说，你无法将整个数据库放入内存，因此需要有选择地挑选那些预期能带来最大回报的表。此外，一些数据库供应商（如\
  \ Oracle）将内存中和列存储结合为一个单一功能。对于这些数据库，只有内存表是列存储的，其余部分仍然是磁盘上的行存储。图 7-12 展示了 Oracle 内存管理的复杂性。\n\
  \n![../images/464117_1_En_7_Chapter/464117_1_En_7_Fig12_HTML.jpg](img/464117_1_En_7_Fig12_HTML.jpg)\n\
  \n**图 7-12**\nOracle 的内存列存架构\n\n如你在图 7-12 中所见，本章的许多其他功能都发挥了作用。对于 DBA 来说，了解 Oracle\
  \ 如何工作的工作变得更加困难了。我想这就是为什么他们据说能赚大钱吧。\n\n为了演示内存表能提供怎样的性能示例，现在请看图 7-13。该图显示了针对一个保存为行存储与列存储的\
  \ 300GB 数据库运行 22 个 TPC-H 查询所需的时间。对于我的数据库服务器、数据库版本和配置，整体性能提升达到了惊人的 **90.89%**！然后，当我同时为内存表添加高级压缩后，运行时间相同，但所需的内存空间几乎减少了\
  \ 75%！因此，即使我的数据库服务器只有 256GB 内存，该表也只需要 75GB 内存。所以我的数据库仍然有足够的内存用于正常的数据库分配和消耗。事实上，如果服务器只需处理此工作负载，那么使用内存更少的服务器也是可行的。你注意到这个转折点了吗？将表置于内存中，在某些情况下反而可能减少对内存的需求！\n\
  \n![../images/464117_1_En_7_Chapter/464117_1_En_7_Fig13_HTML.png](img/464117_1_En_7_Fig13_HTML.png)\n\
  \n**图 7-13**\n内存表带来的 TPC-H 性能提升\n\n"
- '# 总结


  本章回顾了执行数据库基准测试时可能利用的许多数据库特性和技术。虽然上一章介绍的硬件进步以惊人的速度发展，但对数据库性能的益处是可衡量的。然而，随着近期数据库的进步，性能提升确实令人惊叹。想象一下，查询运行时间减少
  91%，空间占用减少 75%。这听起来几乎像是科幻小说。但这些特性及其结果是真实的。任何从事数据库基准测试项目的 DBA 都应努力了解过去几年以及未来将出现的所有主要数据库增强功能。这些进步目前能带来最大的收益，有时只需付出很小的努力。只需确保你已获得适当许可来使用这些漂亮的新工具。


  '
- '# 8. 整合基准测试


  在本章中，我们将回顾当你为了整合数据库实例而测试场景时的基准测试注意事项。数据库整合发生在你试图减少数据库许可证总数以降低成本时。随着数据库许可证成本的上升，以及业务部门将数据库视为仅仅是应用程序所需的、现成的构建块对象，你的管理层可能需要进行整合工作。此外，如今的服务器非常强大，拥有多核
  CPU 和大量廉价内存，我们不再需要刻意采用传统“孤岛”方式（每个服务器一个数据库）来隔离数据库。DBA 现在可以实际考虑将来自多个数据库实例的所有数据共同定位到单个数据库实例下。有时，此类工作可能与主要的数据库版本升级或许可“合规调整”工作同时进行。但有一点是肯定的，由于过去
  20 年发生的“数据库蔓延”，我们拥有的数据库实例数量比任何人合理想象的都要多。因此，数据库整合工作可能比你想象的更常见。


  我也见过管理层试图减少他们需要应对的数据库供应商数量的整合努力。例如，开发团队多年来可能同时使用了 Oracle 和 SQL Server，因此现在可能认为值得只标准化一个数据库供应商。我还见过整合工作寻求从单一数据库供应商（如
  Oracle）迁移到同时纳入第二个开源供应商（如 PostgreSQL）。其想法是一石二鸟：即减少高成本许可证的数量，并整合到一个开源平台上。无论真实目标是什么，大多数数据库整合工作都可以简单地视为将来自不同实例的许多数据库合并到能力更强的服务器上的更少实例中。简而言之，就是减少物理数据库部署。因此，在本章的剩余部分，为了简化问题，我们将仅从这样一个单一维度的视角来看待这类工作。


  ## 整合方法


  在执行数据库整合时，首先必须决定的是，将采用何种方法或途径来实现整合。因此，让我们先设想一下需要整合的数据库。假设我们有六个数据库，分布在三个实例中，而这三个实例位于三台不同的服务器上，如图
  8-1 所示。这是一个非常简单但又常见的场景。你可能拥有远不止三台服务器，但本质上问题完全相同，只是规模更大。请注意，在图 8-1 中，我们起始于三台独立的物理数据库服务器，因为这些是多年前在虚拟化和云技术出现之前部署的遗留数据库。那么，我们有哪些选择呢？


  ![../images/464117_1_En_8_Chapter/464117_1_En_8_Fig1_HTML.png](img/464117_1_En_8_Fig1_HTML.png)

  *图 8-1：待整合的数据库实例*


  第一种选择是购买一台大型物理服务器，运行一个数据库实例，并将所有六个数据库放置在该服务器上，如图 8-2 所示。我展示这个选项主要是因为它简单，也是过去人们会采用的方式。但请记住，如今大多数数据库实例都是在虚拟机管理程序上作为虚拟机运行，而不是在专用服务器上。因此，我并不是在推荐图
  8-2 中的解决方案，而是出于遗留原因展示它，并且因为它从概念上或逻辑上展示了期望的最终结果（即所有六个数据库都在单个实例和数据库许可之下，以降低许可成本）。这种方法有点契合那句著名的三剑客格言：“人人为我，我为人人。”


  ![../images/464117_1_En_8_Chapter/464117_1_En_8_Fig2_HTML.png](img/464117_1_En_8_Fig2_HTML.png)

  *图 8-2：整合到物理服务器上*


  因此，如今随着虚拟化技术的广泛普及，我们更可能将图 8-2 转变为本质上相同的基本设计，但作为虚拟机运行，如图 8-3 所示。现在你可能在想，最后这两个例子是显而易见的，因此有些多余。但图
  8-3 为我们将在本章以及接下来两章讨论虚拟化数据库和云中的数据库奠定了基础。因此，图 8-3 应当被注意并记住。


  ![../images/464117_1_En_8_Chapter/464117_1_En_8_Fig3_HTML.png](img/464117_1_En_8_Fig3_HTML.png)

  *图 8-3：整合到单个虚拟机上*


  现实情况是，由于任何真实世界的应用程序几乎普遍需要数据库，而这正导致了整合试图纠正的数据库蔓延问题，因此将会存在太多的数据库，无法整合成图 8-2 中的单个服务器或图
  8-3 中的单个虚拟机。你需要确定合适的拆分点，使尽可能多的数据库能够共存，从而导致最少数量的物理服务器或虚拟机。假设采用虚拟化技术，并以此为基础（基于图 8-3），我们的首要目标必须是确定合适的实例和虚拟机数量，假设一台无限可扩展的服务器能够处理全部负载，从而形成图
  8-4 所示的架构。我们将这第一步作为“*分而治之策略*”，这样一旦我们知道合适的虚拟机总数，接下来就可以确定托管这些虚拟机的物理服务器的合适数量。换一种说法，从科学角度看，我们是在有意识地限制所考虑的变量数量，以确保不会给结论引入不确定性。


  ![../images/464117_1_En_8_Chapter/464117_1_En_8_Fig4_HTML.png](img/464117_1_En_8_Fig4_HTML.png)

  *图 8-4：整合到多个虚拟机上*


  一旦我们知道了哪些数据库可以因为它们的工作负载合理兼容（意味着它们的净请求累积起来不会过度压垮可用资源）而在单个虚拟机上和平共存，我们就可以查看每台虚拟机及其数据库集合需要多少台什么规模的物理服务器。此外，我们可以确定一台服务器是否可以托管多个虚拟机。例如，在图
  8-4 中，如果我们知道虚拟机 #1 及其数据库需要 `2X` 的资源，而虚拟机 #2 需要 `3X` 的资源，那么我们就需要一台具有 `5X` 资源的服务器，或者用独立的物理服务器来托管它们。这就是我们将在本章中尝试进行基准测试的内容。


  ## 数据库共存


  第一步是找出目前独立的数据库实例及其数据库中，哪些可以共存于单台虚拟机上。让我们假设目前跨物理服务器的分离是正确的，或者至少是基于兼容的工作负载而合理的。那么我们试图通过图
  8-1 来探索的是，我们能否将物理服务器#1 和#2 连同它们的两个实例和四个数据库合并起来？为了实现这一点，我们需要按照图 8-5 所示进行基准测试。


  这个图表相当复杂，所以我们来检查三个主要部分。该图的底部区域与图 8-4 的左半部分一致，目的是找出可以共存于一台虚拟机上的数据库。该图的顶部区域代表安装了数据库基准测试软件以运行中央命令控制台的台式机或笔记本电脑。该图的中间区域代表基准测试中央命令控制台当前运行的每个实例所需的代理（agents）。


  目前可用的基准测试工具都无法轻松地同时运行多个测试，至少不那么容易或可靠。因此，如果我们需要运行两个并发的数据库基准测试工作负载，以正确模拟之前访问不同物理服务器的应用程序，那么我们将需要运行两个独立的基准测试控制台。此外，根据基准测试规模系数和并发用户会话的数量，每个中央控制台可能需要多个基准测试代理来运行累积的工作负载。事实上，你甚至可能需要将代理分布在多个虚拟机上，甚至跨物理服务器分布，以处理运行整个基准测试工作负载所需的资源。


  ![../images/464117_1_En_8_Chapter/464117_1_En_8_Fig5_HTML.png](img/464117_1_En_8_Fig5_HTML.png)


  **图 8-5** 用于整合的基准测试设置


  图 8-5 所示的架构带来了一些可能不易察觉的管理问题。


  首先，你需要手动协调两个独立基准测试控制台的所有工作。数据库基准测试的运行不会有自动或同步的启动和停止。


  其次，所有关于警告或错误以及运行时性能结果的日志都将是独立且不相关的。因此，同样需要手动努力来剖析和划分你在给定基准测试中获取的信息。


  第三，你可能需要比最初考虑的更多的物理服务器和虚拟机，因此构建如图 8-5 所示的适当数据库基准测试架构可能需要可观的时间和精力。例如，我曾参与一个项目，我们需要超过
  300 个独立的代理，分布在 100 多台虚拟机和十几台物理服务器上，以生成足够的工作负载来充分压力测试候选的、已整合的数据库。所以请相应地做好计划。


  ## 意外问题


  在尝试合并数据库实例及其数据库时，可能会出现一些意外问题。


  想象一下，数据库管理员（DBA）首先通过简单地将两个实例的某个设置相加来设置一个实例配置参数。例如，如果实例#1 需要 100GB 内存，实例#2 需要 50GB
  内存，DBA 可能会将单个整合后的实例配置为 150GB 内存。然而，根据我痛苦的经历，生活中没有什么事情，尤其是数据库实例配置参数，会如此简单。你需要做足功课，很可能需要审查所有关键的数据库实例配置参数。根据你的数据库平台，正确的净设置值可能大于或小于简单相加之和。在某些情况下，比如当该值本应大于总和时，它很可能会扭曲数据库基准测试结果。


  另一个经常冒出来的问题是存储情况。我们一直关注服务器整合，而没有考虑 IO，但我们都知道任何数据库的致命弱点都是物理磁盘 IO。关键问题是，假设存储阵列和 LUN
  保持不变，那就是 IO 带宽。运行 hypervisor 的虚拟化服务器能否提供所有整合数据库所需的最大净 IO 吞吐量，并且最好有额外余量来处理非典型的峰值负载？


  我们将在下一章关于虚拟化数据库基准测试的内容中介绍一些与实现此目标相关的具体问题。目前，这只是一个值得注意的、在整合时需要考虑的事项。当前的基本问题是：物理服务器#1
  是否拥有足够数量的主机总线适配器（HBA）或网络接口卡（NIC），并具有正确的多路径配置，以处理至少两倍于可能的最大并发 IO 请求？如果没有，那么在数据库基准测试工作中很可能会发生
  IO 瓶颈，因为规模和并发用户会话将被特意设定为压力测试最大值。结果当然就是不准确的数据。所以请务必检查 IO 带宽。


  ## 服务器分配


  一旦确定了哪些数据库实例及其所有数据库可以被整合，下一个逻辑问题是：哪些（如果有的话）聚合后的实例可以放在同一台物理或虚拟化服务器上？


  让我们假设你已经虚拟化或使用了云环境，那么这个问题的重要性就大大降低了，因为这些实例可以被重新定位，或者根据需要调整其虚拟机的规模。例如（回到图 8-4），如果我们知道虚拟机#1
  及其实例和四个数据库需要 5X 资源（如本章前面计算的），然后我们确定实例#2 及其两个数据库需要 4X 资源，那么我们就知道我们需要一台能够提供至少 9X 资源的物理服务器。


  但我们需要再次考虑整合中的无形因素，这些因素可能会扭曲孤立进行的简单计算。我想建议的是，如果计算结果是 9X，那么将其解释为合并后需要 10X 或略大的资源将是更安全的选择。同样，这看起来像是一个懒惰的过度简化，但借助动态虚拟化
  VM 重定位和云服务提供的、覆盖广泛可能性的可调整大小的 VM，精确解决这个问题的必要性远低于简单的整合步骤。



  ## 混合基准测试


  当着手整合数据库实例及其数据库时，你几乎可以肯定，这些数据库在性质和用途上会有所不同，因此它们的工作负载也会大相径庭。在所有情况下，你都极不可能试图整合性质几乎相同的数据库，因此你很可能需要定制你的数据库基准测试，以最好地近似你试图整合的交易性质和混合情况。听起来很简单。问题在于，再次重申，目前大多数可用的数据库基准测试工具通常都不提供一种简便的方法来通过组合现有测试并赋予不同的权重或百分比来构建你自己的数据库基准。因此，最终你得到的是一个甚至更复杂的架构，如
  `图 8-6` 所示。想象一下，你希望为每个数据库运行 50% 的 `TPC-C` 和 50% 的 `TPC-H` 的混合负载。现在，你必须为每个基准测试运行一个中央控制台，或者总共四个基准测试中央控制台——再次需要手动管理所有的时间安排、依赖关系以及它们之间的交互。这对于一般的基准测试用户来说基本上太笨重了。肯定有更好的方法。


  ![../images/464117_1_En_8_Chapter/464117_1_En_8_Fig6_HTML.png](img/464117_1_En_8_Fig6_HTML.png)


  `图 8-6` 混合数据库基准类型


  出于多种原因，我特意克制没有推荐任何一款数据库基准测试工具。首先，这些工具都不完美，无法成为你唯一且的解决方案。其次，我不想听起来像是在为某个方案做代言而像个厂商的托儿。但话虽如此，我可以诚实地说，对于这种并发、混合数据库基准测试执行的场景，确实有一款工具提供了一个功能，使这种需求变得可行得多。该工具就是
  Quest Software 的 `Benchmark Factory (BMF)`。它有一个非常简单且有用的向导，使用户能够构建他们自定义的数据库基准，如 `图
  8-7` 所示，包括允许从以下选项中进行有意义的组合：


  ![../images/464117_1_En_8_Chapter/464117_1_En_8_Fig7_HTML.jpg](img/464117_1_En_8_Fig7_HTML.jpg)


  `图 8-7` BMF 允许用户自定义基准


  *   行业标准数据库基准

  *   应用事务（`OLTP` 与 `DW`）

  *   SQL 语句（`SELECT`、`INSERT`、`UPDATE` 和 `DELETE`）

  *   硬件压力测试（`CPU`、`内存`、`磁盘 IO` 和 `网络`）


  让我们来审视这四个选项中最有价值的两个：应用事务和硬件压力测试。`图 8-8` 展示了非常简单但非常有用的应用事务选项，你只需指定 `OLTP` 类型事务的百分比与数据仓库的百分比。接下来，你为每种测试类型提供一个比例因子，这样就完成了。`BMF`
  将随后按这些百分比随机混合这些类型的事务，并以混合顺序运行它们。仅凭这一个功能，大多数用户就可以快速轻松地构建出有效的数据库整合所需的数据库基准。


  ![../images/464117_1_En_8_Chapter/464117_1_En_8_Fig8_HTML.jpg](img/464117_1_En_8_Fig8_HTML.jpg)


  `图 8-8` BMF 提供混合事务工作负载


  `图 8-9` 展示了第二个同样简单且有用的硬件压力测试选项，你只需指定应用于每个硬件资源的压力百分比。接下来，你为每种测试类型提供一个比例因子，这样就完成了。`BMF`
  将再次按这些百分比随机混合这些类型的事务，并以混合顺序运行它们。我认为前一种自定义测试更适合整合数据库，而后一种更适合计算服务器分布（这两个主题本章前面已介绍过）。然而，你可能会发现两者在每个阶段都很有用。


  ![../images/464117_1_En_8_Chapter/464117_1_En_8_Fig9_HTML.jpg](img/464117_1_En_8_Fig9_HTML.jpg)


  `图 8-9` BMF 提供硬件压力测试工作负载


