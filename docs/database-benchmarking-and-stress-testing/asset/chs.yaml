- '# 总结


  在本章中，我们研究了为支持数据库整合工作而执行数据库基准测试的问题和技术。我们假设被整合的数据库也会被虚拟化，原因包括虚拟机的动态迁移以及为云环境进行虚拟机或镜像的规模调整。本章还强调了同时测试多个数据库所需的特殊挑战，以及当今大多数基准测试工具所需的复杂架构。最后，我们审视了一款工具——`Benchmark
  Factory`，它提供了一些关键功能，使数据库整合测试工作变得容易得多。


  '
- '# 9. 面向虚拟化的基准测试


  在本章中，我们将回顾当你需要为数据库实例及其数据库进行虚拟化而测试各种场景时的基准测试考量。在很多方面，前一章关于数据库整合的内容是本章的先决条件。前一章的基准测试工作旨在识别哪些数据库可以共享一个实例以减少实例数量，以及需要多少服务器来承载这些实例，这两者在很大程度上是相同的。因此，我们将把前一章视为虚拟化工作的第一部分。本章将处理第二部分：是否存在与特定虚拟化相关的问题，可能影响数据库基准测试工作及其结果。


  本章展示的示例将来自 VMware 的虚拟机管理程序。再次说明，我并非建议你选择任何特定厂商，也不是在代言任何厂商。在此情况下，我展示 VMware 有两个原因。首先，我家里实验室正好有一台
  VMware ESX 服务器。其次，VMware 拥有大部分市场份额，因此许多（如果不是大多数的话）数据库管理员对其都比较熟悉。我也经常使用 VMware Workstation、VMware
  Player、Oracle Virtual Box、Oracle VM（基于 Xen 的解决方案）、QEMU 和 Linux KVM。我提到这些主要是为了向读者保证，我充分接触过多个厂商的方案，因此我知道本章提出的概念在大多数虚拟化厂商解决方案中都有相关且类似的对应物。


  ### 注意


  虽然本章可能重点介绍某个给定虚拟化厂商的示例，但本章展示的所有原则和概念都适用于任何虚拟化厂商的解决方案。确切的名称或术语可能会改变，但基本概念仍然适用。


  ## 服务器 BIOS


  在开始基准测试之前，数据库管理员需要检查的第一件也是最明显的事情是，物理服务器的 `BIOS` 是否已针对运行任何虚拟机管理程序进行了正确配置。你可能会假设任何服务器出厂时都带有
  `表 9-1` 中推荐的设置，但情况并非总是如此。此外，如果服务器是重新利用或购买的二手货呢？在这两种情况下，都需要再次检查这些设置。我曾见过一两次，这些设置未被设置，却以为已设置，后来在我们的基准测试工作中才发现，结果要么低于预期，要么无法重复。因此，在服务器启动时花五分钟检查一下
  `BIOS` 设置，以确保万无一失。


  `表 9-1` 虚拟化的 BIOS 设置


  | `BIOS 设置` | `建议值` |

  | --- | --- |

  | 虚拟化技术 | 是 |

  | VT-x, VT-d, AMD-V, AMD-Vi | 是 |

  | 节点交错 | 否 |

  | 睿频模式 | 是 |

  | 超线程 | 是 |




  ### 注意事项


  一些数据库管理员可能还记得，在超线程技术早期，它对数据库并不高效。然而，英特尔公司早已修复了那个最初的问题。但如果时间允许，您可能仍想在关闭超线程的情况下进行基准测试，以防您的数据库是个例外。


  ## 虚拟机配置


  在创建用于托管其数据库的虚拟机镜像定义时，许多数据库管理员可能会首先关注 CPU 和内存，其次才会考虑到分配的磁盘。但还有其他重要设置需要留意，而且其中许多设置都有多层选项。本书的目的并非提供在虚拟机监控程序上部署数据库的完整最佳实践，但我们将在本章中涵盖那些被证明对数据库基准测试有显著影响的关键配置。


  ### CPU


  首要且最重要的 CPU 准则是**不要过度分配处理器**。这对数据库管理员来说是个难以改掉的习惯，因为在物理服务器的几十年里，我们通常必须超量订购以应对增长和不可预测的峰值工作负载。所以这几乎已根深蒂固。但在虚拟化环境中，我们可以在需要时动态添加
  CPU，通常无需重启（取决于虚拟机操作系统和数据库）。此外，虚拟机也可以被迁移到更大的服务器或总工作负载较少（因此有额外 CPU 周期可利用）的服务器上。最后要记住，所有虚拟机都必须共享有限的资源，包括
  CPU，因此我们不应过度分配，否则很快就会导致每个物理服务器上只运行一两个虚拟机。


  不应过度分配 CPU 资源的另一个原因是，有时它实际上并不能带来任何净收益。例如，假设您运行的是 SQL Server 标准版，它有一个限制，即`lesser`（两者中较小者）为
  4 个插槽或 24 个核心。因此，当您为虚拟机分配虚拟 CPU 时，很容易在不经意间选择一个次优值。事实上，世界知名的 SQL Server MVP 和专家 Brent
  Ozar 就这一主题撰写过博客和文章。看图 9-1；这台运行 SQL Server 的虚拟机，其 CPU 数量定义为 12，即 12 个插槽，每个 CPU 插槽一个线程。因此，SQL
  Server 不会使用全部 12 个，而是将其 CPU 使用率限制在 4。CPU 设置本应设为 3 个插槽，每个插槽 4 个线程。这是一个非常容易犯也容易忽视的错误，尤其是在诊断性能不佳时。SQL
  Server 并非唯一存在此类问题的数据库，我只是以此为例来说明观点。这可能是提高虚拟机数据库性能最快速、最简单的纠正措施之一。您的虚拟化管理员可能不了解任何此类数据库限制，因此这个错误的发生频率可能超出您的想象。


  ![../images/464117_1_En_9_Chapter/464117_1_En_9_Fig1_HTML.jpg](img/464117_1_En_9_Fig1_HTML.jpg)

  图 9-1


  低效的虚拟机 CPU 配置


  我要讲的最后一个数据库虚拟化问题是，**不要高估超线程的有效性**。人们很容易相信炒作，认为 CPU 数量翻倍就意味着 CPU 能力翻倍。网上许多数据库管理员引用的共识是，超线程似乎能现实且可靠地带来大约
  10%到 30%的提升。我怀疑这是对早期版本超线程技术残留的怀疑态度所致，因此我个人建议的经验法则是，将超线程视为 50%–60%的提升。如果您没有过度分配资源，这个值应该是安全的，并且对大多数情况来说足够好。但您必须自己决定赋予它什么值。只需意识到，赋予
  100%（或接近 100%）的值是轻率的。


  从数据库基准测试的角度来看，虚拟机 CPU 设置及其有效性可以带来显著的性能提升。假设您正在运行一个大规模因子（例如，1000 个仓库）的 TPC-C 测试，使得您可以运行
  10,000 个并发用户会话。显然，当您运行数千个会话时，虚拟机的 CPU 资源分配至关重要。但再假设您正在运行一个大规模的 TPC-H 或 TPC-DS；然而，如果用户会话数量要少得多，您可能会认为
  CPU 设置不那么重要。那您就错了！这些大型数据仓库工作负载通常运行极其复杂的查询，且往往针对分区表。大多数数据库优化器会尝试细分并并行执行分区之间和分区内部的操作，以及大表和索引扫描。因此，这个设置在这里同样至关重要。


  ### 内存


  第二个同样关键的领域是虚拟机内存分配。很多时候，数据库管理员只是假设他们可以沿用过去的黄金法则。这在某种程度上是对的，但有一些非常重要的转折。在物理服务器上部署数据库时，该数据库可用的内存就是服务器所包含的内存量。然后，数据库管理员会做一些粗略的计算，类似于：


  `虚拟机总内存 = 数据库总内存分配 + (数据库进程数 + 操作系统进程数) * 2MB + 操作系统内存 + 虚拟机开销`


  然而，对于虚拟机，您还必须结合虚拟机监控程序管理虚拟机内存的方式。一些虚拟机监控程序需要在虚拟机上安装一个驱动程序，允许虚拟机监控程序从一个虚拟机窃取空闲内存来服务另一个虚拟机。VMware
  称之为`气球驱动程序`。但虚拟机监控程序显然不能借用所有内存，因此存在一个限制（或下限）。您可以为虚拟机设置该限制，它通常被称为保留内存。您可以将其视为虚拟机监控程序无法再借用的绝对内存下限，其设置方式如图
  9-2 所示。因此，在这种情况下，我按照上面的公式进行计算，得出的数字是 16GB。当我排除最后两项（即操作系统内存和虚拟机开销）后，值是 12GB，所以我将保留内存设为
  12GB。此内存设置应显著降低气球膨胀和虚拟机操作系统交换的概率，从而保证虚拟机保留其最佳性能所需的内存。请注意，保留内存还有另一个重要作用。假设您的虚拟机监控程序允许动态虚拟机迁移，那么新的主机必须至少有该虚拟机的保留内存量是空闲的，否则虚拟机无法迁移到该主机。


  ![../images/464117_1_En_9_Chapter/464117_1_En_9_Fig2_HTML.jpg](img/464117_1_En_9_Fig2_HTML.jpg)

  图 9-2


  设置一个借用内存下限


  从数据库基准测试的角度来看，虚拟机内存设置也能带来有影响的性能提升。但其原因更多与虚拟化的性质有关，而非数据库视角。如果所有或大多数虚拟机都过度使用内存，那么虚拟机监控程序可能需要执行交换。这可能代价高昂，因为虚拟机监控程序不知道客户虚拟机操作系统的内部内存使用情况，因此它可能选择交换出对客户操作系统来说非最优的内存页。它可能交换出客户操作系统本不会交换的关键虚拟机内存页，例如
  Linux 内核。虚拟机监控程序也可能选择交换出在客户操作系统级别是“干净”的内存页（即空页）。最后，可能发生一种称为“双重分页”的情况，即虚拟机监控程序和客户操作系统都交换出同一个内存页，当该页被调回时就会引发问题。




  ### 网络


  对于正在进行任何数据库基准测试的虚拟机，网络设置只涉及两个非常简单的问题和建议。首先，也是最重要的，网络适配器应设置为适当且最优的驱动程序。我曾参与过几次基准测试工作，预期的结果未能达成，且没人能确切知道原因。经过调查他们的虚拟机网络设置（如图
  9-3 所示），发现指定了一个次优的驱动程序。在虚拟机创建或转换/迁移到主机服务器时，网络驱动程序被设置为客户操作系统的通用默认值（本例中是 `E1000`）。然而，对于此虚拟机管理程序（即
  VMware ESX），最佳驱动程序是一种称为 `VMXNET3` 的半虚拟化驱动。这又是一个非常简单、易于检查并修正的事情。请记住，这个用于大型 OLTP 基准测试的数据库虚拟机可能要处理数十万到数百万的用户会话请求并返回结果。对于数据仓库基准测试，它可能会返回相当大量的数据。无论哪种情况，网络都将成为整体性能的严重瓶颈。在
  OLTP 测试案例中，这个简单的设置更改使平均响应时间提升了 500%，而这正是我们最希望优化的指标。如果你好奇为什么会这样，那是因为 `E1000` 驱动程序是针对通用千兆网卡的软件模拟，而
  `VMXNET3` 则支持万兆。为什么会这样？虚拟机必须在客户操作系统中安装供应商的工具软件，此选项才可用。因此，除非你手动安装供应商工具，否则网络驱动程序会设置为次优的默认值。


  ![../images/464117_1_En_9_Chapter/464117_1_En_9_Fig3_HTML.jpg](img/464117_1_En_9_Fig3_HTML.jpg)


  图 9-3


  选择最优的虚拟机管理程序网络驱动程序


  第二个网络考虑因素是，如果你的虚拟机管理程序允许物理设备的“*直通*”模式，那么你可以选择一块网卡并将其标记为启用直通。然后你可以将该网卡分配给虚拟机，使得客户操作系统能看到实际的硬件，从而使用原生的操作系统硬件驱动程序——这也意味着你的网络流量将完全绕过虚拟机管理程序及其开销。然而，使用此技术有一个主要缺点：动态虚拟机迁移可能会变得不可能或困难得多，因为服务器可能具有不同的硬件，或者所有新主机的硬件可能已被分配，没有剩余资源用于新的直通设置。因此，你很可能会得出结论：对于网络流量而言，最优的虚拟机管理程序网络驱动程序（例如
  `VMXNET3`）在保留整体最大灵活性的同时，性能也相当可接受，这就足够了。我个人两种方式都尝试过，无法给出任何明确的建议。请记住，虚拟机管理程序主机可能配置了链路聚合控制协议，将多个网卡的吞吐量合并起来，而如果你为一两个网卡使用自己专用的直通设置，就会错失这点。例如，我的服务器有八个千兆网卡，其中六个分配给了
  LACP 组。


  ### 磁盘 IO


  正如本书多次提到的，我们都知道物理磁盘 IO 是数据库性能的阿喀琉斯之踵。请记住之前的关键要点：


  -   对于数据库数据和索引文件，避免使用 RAID 5。

  -   对于数据库数据和索引文件，建议使用 RAID 10。

  -   存储 LUN 要具有适当的条带宽度和深度/大小。


  那么，在进行虚拟化数据库的基准测试时，我们需要在这个列表中添加哪些考虑因素呢？只有三个额外的点，而且它们都非常直接：


  -   避免使用虚拟化快照（会增加不必要的开销）。

  -   与网络类似，在合理的情况下，考虑为总线适配器使用直通驱动（就像网络一样，此选择可能会妨碍动态虚拟机迁移）。

  -   选择最高效的磁盘初始化模式以实现最优的数据库 IO。


  最后一点需要解释。许多 DBA 会同意，对于那些允许数据库数据文件动态增长的数据库平台来说，动态空间分配的成本可能是一个可测量的负担。例如，想象一个数据库文件，初始设置为
  50MB，随着空间使用需要，按 50MB 的幅度增长，用于容纳一个 300GB TPC-H 的架构。仅数据加载过程就会导致大约 600 次动态磁盘空间扩展，索引可能还有
  100 次。聪明的 DBA 会直接创建一个大约 500GB 磁盘空间的数据文件，以避免所有这些动态分配的开销。同样的原则也适用于你的虚拟机磁盘分配。例如，VMware
  提供三种置备模式：


  -   `Thin`：文件从零大小开始，随着请求的空间动态增长。

  -   `延迟置零厚置备`（又名 `Flat`）：文件从指定大小开始，块在写入前必须动态清零。

  -   `精置零厚置备`：文件从指定大小开始，所有块在文件可供使用前预先清零。


  因此，在进行数据库基准测试并寻求最佳磁盘 IO 时，你不仅应该最小化数据库级别的动态磁盘增长，还应该通过选择完全预分配模式（如图 9-4 所示）来消除虚拟机管理程序级别的动态磁盘增长，以作补充。


  ![../images/464117_1_En_9_Chapter/464117_1_En_9_Fig4_HTML.jpg](img/464117_1_En_9_Fig4_HTML.jpg)


  图 9-4


  选择最优的磁盘置备方法


  ## 监控问题


  回到第 5 章，我们将数据库基准测试工作可视化，类似于心脏压力测试，如图 9-5 所示。在本书中，直到现在我们都没有过多提及监控方面。一个相当众所周知的事实是，并非所有的操作系统和数据库监控工具在客户操作系统及其数据库被虚拟化时都能报告准确的值。如果监控工具不是虚拟化感知的，或者仅仅在客户操作系统级别进行监控，那么监控软件看到的
  CPU 时钟可能会漂移和偏移。这可能导致错误的诊断和解决方案。此外，目前可用的数据库基准测试工具本身都没有处理这个问题，因为它们的任务只是充当跑步机，单纯地给数据库施加压力。所以我的建议是，投资一个好的、完全虚拟化感知的监控解决方案。


  ![../images/464117_1_En_9_Chapter/464117_1_En_9_Fig5_HTML.jpg](img/464117_1_En_9_Fig5_HTML.jpg)


  图 9-5


  基准测试如同心脏压力测试


  '
- '# 总结


  在本章中，我们探讨了在虚拟化环境下执行数据库基准测试的问题和技术。核心信息是，从 BIOS 到所有虚拟机硬件资源配置设置，有众多选择会影响可实现的基准测试性能。因此，非常值得花时间去验证并在必要时修正这些设置，以达到基准测试的预期。



  '
- '# 10. 公有云基准测试


  在本章中，我们将探讨当您考虑或将数据库实例及其数据库迁移到公有云时，需要考虑的基准测试要点。本章特意保持简短，以便聚焦于主要问题，因为云环境变量众多，且每天都在发展。仅部署云数据库这一主题就足以单独写成一整本书。因此，这里我们必须集中讨论最具价值的核心事项。


  本章所示示例和引述将来自亚马逊 AWS 和微软 Azure 云。再次说明，我并非建议您选择任何特定供应商，也不为任何供应商背书。但这两者是目前的主要参与者。最后请注意，前两章关于数据库整合和虚拟化的讨论，为部署到云奠定了基础。因此，如果您跳过了那些章节，或对其概念不完全熟悉，建议在继续之前回顾一下。


  ### 注意


  虽然本章可能重点介绍某个特定公有云供应商的示例，但本章展示的所有原则和概念适用于任何云供应商的解决方案。具体名称或术语可能会有变化，但基本概念仍然适用。


  ## 镜像规格选择


  DBA 在将任何数据库部署到云之前，首要且最明显的任务是定义要选择何种类型和规模的镜像。问题是，可选种类多不胜数。表 10-1 按主要类别进行了简单分类。请注意，每个类别下有多种不同规格，此外，有些供应商并不提供所有类别，而是允许用户为任何配置添加
  GPU 和额外存储。


  表 10-1


  各类主要的云镜像类别


  | | 亚马逊 (Amazon) | Azure | 谷歌 (Google) |

  | --- | --- | --- | --- |

  | 通用型 | T2, M5, M4 | B, Dsv3, Dv3, DSv2, Dv2, Av2 | n1-standard |

  | 计算优化型 | C5, C4 | Fsv2, Fs, F | n1-highcpu |

  | 内存优化型 | X1e, X1, R4 | Esv3, Ev3, M, GS, G, DSv2, Dv2 | n1-highmem, n1-ultramem
  |

  | 存储优化型 | H1, I3, D2 | Ls | <none> |

  | 加速计算型 | P3, P2, G3, F1 | NV, NC, NCv2, NCv3, ND | <none> |


  假设您选择的云提供商是亚马逊，您已经阅读了其各种镜像类别的详细信息，并选择了 `M4` 类型镜像。我并非在推广或暗示这是数据库应选的规格。以下是 `M4` 的推荐使用场景：中小型数据库、需要额外内存的数据处理任务、缓存集群，以及运行
  `SAP`、`Microsoft SharePoint`、集群计算和其他企业应用程序的后端服务器。我选择 `M4` 的原因很简单：它有如表 10-2 所示的合理数量的规格选项。如果我选择了
  `M5`（对许多人来说可能是一个不错的`稳妥选择`），其规格表可能长达两页或更多。关键在于，选择正确的镜像类别，然后为该类别选择合适的规格，是一项艰巨的任务。好消息是，您可以相对轻松地更改规格。至于类别更改，则取决于云供应商是否支持以及更改的难度。


  表 10-2


  亚马逊 `M4` 镜像规格示例


  | 型号 | vCPU | 内存 (GiB) | SSD 存储 (GB) | 专用 EBS 带宽 (Mbps) |

  | --- | --- | --- | --- | --- |

  | `m4.large` | 2 | 8 | `仅 EBS` | 450 |

  | `m4.xlarge` | 4 | 16 | `仅 EBS` | 750 |

  | `m4.2xlarge` | 8 | 32 | `仅 EBS` | 1,000 |

  | `m4.4xlarge` | 16 | 64 | `仅 EBS` | 2,000 |

  | `m4.10xlarge` | 40 | 160 | `仅 EBS` | 4,000 |

  | `m4.16xlarge` | 64 | 256 | `仅 EBS` | 10,000 |


  从数据库基准测试的角度来看，重要的是不要为了省钱而人为选择过小的规格，也不要为了展示最佳结果而选择过大的规格。您应该选择与计划在云上部署的生产环境相同的规格。因此，例如，如果您知道将要在
  `m5d.xlarge` 镜像（包含 `NVMe SSD`）上部署运行于 `Oracle Enterprise Linux` 之上的 `Oracle 12g`，那么您进行所有基准测试时也应选择该规格。您可能认为这显而易见，无需多言，但我曾协助过许多基准测试工作，其中明显他们陷入了“我们只是在完成一个复选框项目”的模式，因此只是使用一个小型、便宜的镜像。我只想说，如此获得的结果可以说是相当无价值的。如果不选择相同的镜像类别和规格，存在的差异和选项太多，无法据此得出任何结论。


  ## 部署架构


  DBA 在部署任何数据库到云端时需要定义的第二个同样重要的事情是部署架构。这里指的是您的镜像将位于何处。为此，我们首先需要定义一些特定于云部署选项的术语：“`regions`”
  和 “`availability zones`”。


  一个区域（region）在词典中被定义为一个地区或分区，尤其指一个国家或世界的一部分，具有可定义的特征但边界并不固定。然而，简单、更通俗的含义通常就足够了：一个区域就是一个国家的一部分。例如，在美国，我们通常认为这个国家被划分为五个主要区域：东北部、东南部、中西部、西南部和西部，如图
  10-1 所示。


  ![../images/464117_1_En_10_Chapter/464117_1_En_10_Fig1_HTML.jpg](img/464117_1_En_10_Fig1_HTML.jpg)


  *图 10-1：美国五大主要区域*


  然而，云提供商将区域定义为在一个延迟定义的边界内部署并通过专用的区域低延迟网络连接的一组数据中心。正如人们所预料的那样，不同的云区域在地理上分散在很远的距离，而其数据中心在该区域内则分布得更紧密。表
  10-3 显示了 Amazon 和 Azure 的区域。


  *表 10-3：云提供商美国区域*


  | Amazon | Azure |

  | --- | --- |

  | 区域 | 位置 | 区域 | 位置 |

  | --- | --- | --- | --- |

  | us-east-1 | US East (N. Virginia) | East US | Virginia |

  | us-east-2 | US East (Ohio) | East US 2 | Virginia |

  | us-west-1 | US West (N. California) | Central US | Iowa |

  | us-west-2 | US West (Oregon) | North Central US | Illinois |

  |   |   | South Central US | Texas |

  |   |   | West Central US | Wyoming |

  |   |   | West US | California |

  |   |   | West US 2 | Washington |


  一个可用区（availability zone）或多或少等同于给定云区域内的一个数据中心。请注意，这些数据中心之间的距离足够远，因此应该不会受到常见的本地问题（如停电或风暴）的影响，但又足够近以保持它们之间的低延迟。一些云提供商公开其所有区域的数据中心位置，而另一些则将其视为某种机密。我猜“在云中”确实意味着确切的地点并不那么重要，只要区域的可用区在该区域提供高弹性即可。最后请注意，可用区的数量因区域而异。例如，在
  Amazon 云上，弗吉尼亚区域提供六个可用区，而俄亥俄州只有三个。例如，在创建集群数据库并希望在不同可用区拥有一定数量的节点时，这些信息可能很重要。我通常更喜欢
  Amazon 对这些概念的示意图，如图 10-2 所示。图 10-3 显示了对应的 Azure 示意图，以便您可以清楚地认识到这些概念在各种云提供商之间基本上是相同的。


  ![../images/464117_1_En_10_Chapter/464117_1_En_10_Fig3_HTML.jpg](img/464117_1_En_10_Fig3_HTML.jpg)


  *图 10-3：Azure 区域和可用区*


  ![../images/464117_1_En_10_Chapter/464117_1_En_10_Fig2_HTML.jpg](img/464117_1_En_10_Fig2_HTML.jpg)


  *图 10-2：Amazon 区域和可用区*


  那么，所有这些与数据库基准测试有什么关系呢？很简单，您应该将您的云镜像部署在同一区域内，以避免任何延迟偏差。如果使用单实例（非集群）数据库，那么您可能还需要将所有镜像保留在同一可用区内，以进一步减少任何延迟偏差——尽管可用区之间的延迟默认保持较低。它仍然不如在同一可用区内低。现在，如果您正在使用一个多节点数据库实例，您可能将一个节点放在一个可用区，另一个放在第二个可用区，您可能需要考虑类似于图
  10-4 所示的拆分方式。这本质上只是对第 8 章图 8-6 的重新设计。您应该回顾该图，然后检查图 10-4 如何为云和多节点集群数据库进行调整。


  ![../images/464117_1_En_10_Chapter/464117_1_En_10_Fig4_HTML.jpg](img/464117_1_En_10_Fig4_HTML.jpg)


  *图 10-4：复杂的集群云部署*


  ## 摘要


  在本章中，我们探讨了为公有云执行数据库基准测试的问题和技术。如前所述，本章保持简短，因为关于云部署、调优和优化的注意事项，完全可以写一整本书。但是有两个必须理解并正确选择的**关键概念**：镜像类型和大小，以及镜像的部署位置（即区域和可用区）。我们还指出，使用与您预期实际使用不同的镜像类型、镜像大小或云镜像部署模型进行数据库基准测试，几乎是徒劳的。您应该始终使用您打算实际使用的东西进行测试。



  '
- '# 11. 工作负载捕获与回放


  在本章中，我们将探讨数据库工作负载的捕获与回放。这种用于压力测试或数据库基准测试的方法具有若干显而易见的优势。首先，这些事务活动源自您自己的应用程序和数据库。因此，它与您当前面临的实际性能状况和问题直接相关且切题。其次，您已对数据库设计及其处理的一般业务需求非常熟悉，无需再阅读和理解规格说明。第三，基于这种熟悉度，研究和提出潜在解决方案会更为容易。此外，也便于与同样熟悉情况的同行交流想法。基于这些原因（以及其他一些因素），有些人很可能认为这是进行压力测试或数据库基准测试的理想方法。这种逻辑很难反驳，我理解他们的观点。尽管第
  8 章可能展示了一种创建混合行业标准基准以近似任何目标系统的方法，但这充其量仍只是一种近似。我们很容易忽略某个可能彻底扭曲可达成结果的方面。而运行实际工作负载的准确性是无可比拟的。


  关于数据库工作负载捕获与回放，还有更多好消息。虽然多年来一直有第三方软件供应商提供解决方案，但近年来，许多数据库供应商也开始提供此类工具。对于那些倾向于使用工作负载捕获与回放的人来说，这是一大胜利，因为对于某些关键的数据库管理任务（例如数据库监控、数据库复制、数据库备份等），当认为供应商具有天然优势时，倾向于选择数据库供应商提供的解决方案是很常见的。不仅如此，关键的数据库供应商不仅进入了这一领域，而且迅速发展和改进了他们的产品。因此，如今数据库管理员（DBA）拥有比以往任何时候都更多、更好的选择。这一点非常重要，因为我们正被要求处理截然不同的部署环境，例如在虚拟机管理程序上、容器内或云中的数据库。再加上在所有这些环境中采用
  SSD 和 NVMe 等高级存储选项，还需要克服额外的复杂性层。拥有数据库工作负载捕获与回放的选项，在掌握所有这些情况方面发挥着重要作用。


  ## 万事俱备


  为了成功执行工作负载回放，DBA 首先且最需要做的是创建源数据库及其原始数据状态的副本。该副本随后将被用作回放的独立目标系统。可以理解的是，您需要在捕获源数据库的工作负载之前进行此复制，以便在任何可能更改数据的事务运行之前，拥有时间点零
  (`T0`) 的数据库副本。然后，需要将该副本加载到目标系统中，以便任何捕获的、在 `T0` 数据上操作的工作负载，能够以完全相同的数据和完全相同的顺序进行回放，从而希望产生完全相同的结果。


  有了捕获的工作负载，存在两种关键的回放场景。第一种是在不对硬件或软件进行重大更改的情况下诊断和解决性能问题。这可能是更常见和更可能出现的场景。这可能包括与小型操作系统或数据库补丁相关的测试。第二种是测试硬件、软件或部署模型（例如虚拟化或迁移到云）中的一些重大变更。虽然这种场景可能不那么常见，但从战略和长期成功的角度来看，它可能是最重要的。让我们看看这两种场景。


  在第一种场景中，我们测试的是在不进行重大平台更改情况下的简单性能优化。这意味着我们需要两个数据库许可证、两台服务器和双倍的磁盘空间。此外，我们应努力使服务器和磁盘存储特性尽可能与原始环境相似。因此，如果我们生产数据库服务器配备双路八核至强处理器、256GB
  内存和 10TB RAID-10 存储，那么用于回放的测试系统应该相同或尽可能相似。另外，如果我们的生产数据库许可证是企业版并带有一些可选的付费附加组件，那么我们也必须为测试机器购买相同的配置。其理念在于，如果环境基本相同，那么在目标系统上进行的任何调优或优化很可能在源系统上也有效。这样，我们就能找出可以改进生产数据库的措施。


  还需注意，我们还需要一些可以挂载并由两台机器共享的磁盘空间，来存放工作负载捕获文件。根据工作负载的不同，这些文件可能非常大，因此请相应规划。您还需要确保到该共享空间的
  I/O 带宽足够强大，以免扭曲源或目标数据库服务器的性能。这在生产服务器上尤为关键，因为用户绝不能察觉到此操作导致了任何明显的减速，影响其正常工作。无论如何，这意味着额外的成本和风险。


  在第二种场景中，由于所提议并测试内容的性质，限制较少。例如，我们可能试图通过切换到“标准版”来降低数据库许可费用。我们可能在比较当前服务器供应商与另一家供应商（例如戴尔
  vs. 惠普 vs. 联想）。我们可能想看看是否能将数据库虚拟化或迁移到云中。我们也可能只是考虑用新供应商或全新技术（例如 SSD 或 VVMe）来取代当前的
  NAS 或 SAN 设备，以替换旋转磁盘。因此，虽然我们可能需要两份某些类别的组件，但它们很可能差异很大，因为这正是测试的目的——测试这种差异。


  一旦所有这些必要的基础设施就绪，通常就可以通过标准的备份和恢复来复制整个数据库，而且由于您很可能已经在执行备份，因此不会引入额外开销。您只需要将工作负载捕获的开始时间安排在完整备份之后，以便为捕获和回放都准备好真正的
  `T0` 数据。完成之后，您就可以将目标系统恢复到初始状态，而不会对生产系统产生任何影响。


  ## 捕获/回放工具


  用于执行数据库工作负载捕获与回放的工具基本上有四种类型：


  -   提供使用原生数据库跟踪文件或配置文件进行捕获/回放的数据库基准测试工具（例如，HammerDB、结合 Trace Analyzer 的 Swingbench，以及
  Quest Software 的 Benchmark Factory）

  -   提供内置且低开销捕获/回放机制的数据库供应商工具（例如，SQL Server Distributed Replay 和 Oracle Real Application
  Testing，又名 RAT）

  -   第三方供应商的数据库捕获回放工具（例如，ExactSolution 的 iReplay 和 ITGain 的 SQLReplayer）

  -   开源数据库捕获/回放工具（例如，用于 SQL Server 的 Query Store Replay）


  由于本书是关于数据库基准测试的，我们将讨论范围限制在提供工作负载捕获/回放的基准测试工具上，因为供应商解决方案虽然通常很好，但仅适用于他们自己的数据库。此外，对于某些数据库供应商，此功能是需要为源和目标数据库都购买的额外付费项目，因此成本再次加倍。




  ## 捕获时长


  负责监控工作负载捕获的数据库管理员首先需要考虑的关键因素是捕获的时间和持续时间，这一点至关重要。虽然这看似一个显而易见且简单的问题，但我见过最常见的错误就是未能选择一个合适的工作负载捕获时段。捕获应选择在一天中工作负载较高的典型时段进行。是的，这会给生产环境增加额外开销，这从来不是一件受欢迎的事情。但在其他任何时段捕获工作负载，对于进行适当的调优和优化所产生的重放效果会大打折扣。事实上，我甚至认为，如果你对工作负载捕获和重放的需求不足以支持你在高峰活动时段进行操作，那么这可能根本就不值得做。想象一下，一名外科医生必须因为感染组织扩散而决定是否截肢。这是一个无需犹豫的决定，必须尽快执行，因为不这样做的代价很高。如果管理层说这项任务很重要，却不允许在高峰时段进行捕获，那么你应该解释这种立场的谬误所在，并极力争取进行一次无论成本如何都有价值的捕获。如果答案仍然是“不”，那么你应该据理力争，反对执行此操作，或者至少降低对其价值以及在次优捕获条件下可达成结果的期望。


  一旦你获得了在高峰活动时段进行捕获的批准，下一个问题就是捕获运行多长时间。我们希望捕获运行足够长的时间，以收集有意义的、有用的样本。但我们也希望尽可能快地完成，以最小化对生产和最终用户的影响。我见过人们执行短至
  15 分钟、长至 8 小时（甚至有一次长达 24 小时，但那是罕见的例外）的捕获。虽然没有绝对的正确或错误答案，但我建议这两个极端很可能是错误的。选择最佳时长的最佳方法是询问业务人员，真正关键的、高峰工作时段的小时数是哪些。例如，虽然一个典型的
  OLTP 系统可能主要在上午 8 点到下午 5 点处理活动，但业务用户可能会在这个时间段内识别出一个关键范围来缩短时长。也许因为业务横跨美国的四个时区，关键时段就是所有时区都处于正常工作时间的时候，如表
  11-1 所示。因此，最佳时段是上午 11 点到下午 5 点的任何时间。由于所有员工都有传统的中午一小时午休时间，我们排除了包含 12:00 的行。因此，我们现在只有两个选项：从
  11:00 到 12:00 或从 16:00 到 17:00。事情并不总是这么简单，但核心思想是，通过向业务人员提出一些问题，合适的捕获时段选项就会显现出来。


  ***表 11-1.*** *寻找最佳捕获时段*


  ![../images/464117_1_En_11_Chapter/464117_1_En_11_Figa_HTML.gif](img/464117_1_En_11_Figa_HTML.gif)


  我将通过说明我的观点来结束这个话题：对我而言，理想的捕获时段通常且典型地不少于一小时且不超过四小时。总的来说，你需要捕获的活动既不能太少也不能太多，而应正好足以解决手头的任务。当然也会有例外。例如，假设季度末处理需要八小时来完成其任务，那么那就是针对该活动进行工作负载捕获的正确时段。最后一个考虑因素通常是捕获事务所需的处理开销和磁盘空间。因此，虽然较长的时段可能是最好的，但有时你可能不得不由于这些其他考虑因素及其成本而限制在最小可行时段内。


  ## 重放架构


  采用提供捕获/重放功能的数据库基准测试工具这种方法，基准测试工具本身的部署架构至关重要。请看图 11-1，然后问问自己，为什么这张图如此复杂？


  ![../images/464117_1_En_11_Chapter/464117_1_En_11_Fig1_HTML.png](img/464117_1_En_11_Fig1_HTML.png)


  图 11-1 推荐的重放架构


  答案很简单：你需要足够多的基准测试工具代理，以充分负载均衡数据库看到的所有工作，这些工作可能来自许多应用程序客户端和服务器。想象一下，一个由 10,000 名用户运行的传统客户端/服务器类型应用程序，或者一个基于
  Web 的应用程序服务器每秒向数据库发送数千个事务。你必须在计算资源上分布足够的代理，以正确模拟原始工作负载的传输速度。否则，基准测试代理可能成为瓶颈，扭曲结果。


  最后一点说明，数据库供应商的捕获/重放工具在所需架构方面的工作方式几乎相同。虽然数据库本身再次捕获工作负载，但你可能需要部署多个数据库重放代理，以便进行负载均衡并近似模拟工作负载的传输。另请注意，对于那些对此功能收费的数据库，它们要求你在源和目标数据库上都获得捕获/重放的许可。在某些情况下，这个成本可能相当可观。但是，它们不额外收取执行重放所需的代理费用；只是按数据库实例收费。


  ## 结果解读


  对于行业标准的数据库基准测试评分，结果相当简单；你可以查看每秒事务数、平均响应时间或运行至完成的时间。换句话说，有一些简单的分数可以比较，这些分数在多次执行之间可能提高或不提高，以测试各种数据库的变更。但对于捕获/重放工作来说，事情就没那么简单了。很少有应用程序的计量方式能够恰当地提供简单的性能比较。此外，并非所有数据库都天然提供诸如每秒事务数或每秒读写兆字节等指标。再者，即使它们提供了，很可能
  SQL 代码才是性能问题的根源，而不是其他任何东西。因此，利用重放的最佳方式是使用标准的数据库监控工具来发现并修正糟糕的 SQL。此外，你或许能够识别出那些不能很好地协同工作的
  SQL 语句及其对应的任务。例如，我曾担任一家公司的主要生产数据库管理员，我们大多数批处理作业周期的问题，仅仅是需要重新安排那些资源密集型或需要对相同表进行大量操作的任务。


  数据库管理员通常喜欢采用的另一种方法是，找到消耗过多时间的关键数据库等待事件，并纠正其根本原因。是的，有时这是一个数据库配置参数或其他一些数据库问题。但大多数时候，根本原因要么是糟糕的
  SQL，要么是 SQL 重叠导致竞争数据库资源。因此，对于那些喜欢从等待事件入手的人，我不会质疑你的方法。我只想说，在 80%或更多的时间里，生产系统中的罪魁祸首是
  SQL 代码。那么，为什么不首先寻找这样的 SQL 呢？



  ## 捕获/回放示例


  本节将演示如何使用数据库基准测试工具执行工作负载的捕获与回放。不过，我打算“作弊”，因为我将同时使用该基准测试工具来生成用于捕获的工作负载。因此，我将针对源数据库运行一个`TPC-H`基准测试，并通过原生数据库机制（本例中是`Oracle`跟踪文件）捕获该工作负载。然后，我将使用相同的基准测试工具来读取并回放这些事务。这个示例本身可能不太实用，但它将完整演示应遵循的正确流程。我们将使用的基准测试工具是
  Quest Software 的 `Benchmark Factory`。


  第一步是按照第 5 章的建议创建两个`TPC-H`数据库基准测试作业：第一个用于加载数据库对象，第二个用于运行实际的基准测试工作负载。其次，运行数据库加载对象项目。在加载项目运行的同时，我们可以对基准测试的执行进行一些微小的修改。请记住，在本例中我们使用的是`Oracle`，但对于其他数据库平台，其概念和流程是相似的。我们只需要在基准测试的执行中手动添加一些语句，如图
  11-2 所示。我添加了 `START_TRACE_1` 和 `START_TRACE_2`，它们分别包含以下两个`Oracle`命令：


  ![../images/464117_1_En_11_Chapter/464117_1_En_11_Fig2_HTML.jpg](img/464117_1_En_11_Fig2_HTML.jpg)

  *图 11-2：向数据库日志工作负载中添加命令*


  *   `ALTER SESSION SET tracefile_identifier=TPC_H;`

  *   `ALTER SESSION SET EVENTS''10046 trace name context forever, level 12'';`


  通过添加这两个非常特殊的`SQL`语句，`Oracle`将创建跟踪文件，并在其文件名中包含字符串`TPC_H`，从而使这些文件更易于识别。然后，我只需运行基准测试执行项目，该项目将运行`TPC-H`行业标准基准测试的
  22 条复杂`SQL SELECT`命令，并生成一个跟踪文件（包含所有绑定变量值），如图 11-3 所示。


  ![../images/464117_1_En_11_Chapter/464117_1_En_11_Fig3_HTML.jpg](img/464117_1_En_11_Fig3_HTML.jpg)

  *图 11-3：基准测试运行创建的 Oracle 跟踪文件*


  然后，这个跟踪文件可以由基准测试工具作为项目的命令加载并运行，如图 11-4 所示。同样请注意此图，除了`Oracle`跟踪文件之外，还有其他选项可用于创建工作负载回放测试。例如，如果你的应用程序是可计量的，并且可以指示其生成所运行`SQL`语句及其绑定值的文本文件日志，那么该日志也可以被解析并加载到此工具中。因此，除了数据库供应商的解决方案外，执行工作负载捕获与回放的方法不止几种。虽然我在此重点介绍了`Benchmark
  Factory`，但`HammerDB`和`Swingbench`都提供类似的功能和特性。


  ![../images/464117_1_En_11_Chapter/464117_1_En_11_Fig4_HTML.jpg](img/464117_1_En_11_Fig4_HTML.jpg)

  *图 11-4：从跟踪文件创建基准测试作业*


  好处在于，当`Benchmark Factory`加载和解析跟踪文件时，它提供了导入整个文件或将其限制在某个日期/时间范围内的选项，如图 11-5 所示。这非常有用，因为可能捕获了数小时的活动，但只想回放其中一部分事务。事实上，这在调优和优化时非常有用。想象一下，第一次运行从上午
  10:00 到下午 2:00 的工作负载回放，并能够识别出最大的问题发生在 12:00 到 12:30 之间。现在，你可能尝试通过更改数据库配置参数来纠正该问题。然后，你可以简单地重新运行工作负载回放，并将其限制在相关时间段内。仅此一项功能就能节省大量时间，使此特性非常值得使用。


  ![../images/464117_1_En_11_Chapter/464117_1_En_11_Fig5_HTML.jpg](img/464117_1_En_11_Fig5_HTML.jpg)

  *图 11-5：限制用于回放的跟踪文件输入*


