  向导的第三步允许用户定义所有执行参数和选项，如图 3-32 所示。请注意，我选择运行比例因子为 2 的 TPC-C，这将消耗 162 MB 的空间，并且用户会话迭代次数为
  1、2、4 和 8，就像之前使用 HammerDB 时所做的那样。剩下的就是按下运行作业按钮。


  ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig32_HTML.jpg](img/464117_1_En_3_Fig32_HTML.jpg)

  *图 3-32：选择数据库基准测试*




  当作业开始运行时，它将首先创建并加载数据库对象，如图 3-34 所示。请注意，这包括创建所有必需的索引、键约束以及进行统计信息收集。此外，对于某些数据库平台（如
  Oracle），还提供了一些额外的选项，例如在测试前后获取 `AWR` 或 `STATSPACK` 快照。


  ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig33_HTML.jpg](img/464117_1_En_3_Fig33_HTML.jpg)


  图 3-33


  加载测试数据


  数据加载完成后，基准测试开始运行，如图 3-34 所示。请注意它运行时提供的信息量比 HammerDB 多得多。对于待运行的迭代次数和当前执行的完成百分比，都有清晰的进度条。此外，还有一个每隔几秒更新一次的美观图表。最后，它还显示了当前的
  `TPS`（每秒事务数）和平均响应时间值。因此，Benchmark Factory 的作业执行过程信息量很大，非常值得在运行时观察，以洞察遇到性能瓶颈的情况。


  ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig34_HTML.jpg](img/464117_1_En_3_Fig34_HTML.jpg)


