  trans: '

    # HammerDB


    ## 简介与资源


    在众多适用于多种数据库平台的知名且广受欢迎的数据库基准测试工具中，HammerDB 当属其一。它的前身是 HammerORA，当时还只是一个 Oracle
    专属工具。多年来我一直使用这款工具，并认为对于那些希望快速执行并获取行业标准数据库基准测试结果的人来说，尤其是在那些仅偶尔进行此类测试、并非数据库基准测试专家的人看来，它堪称最优秀的数据库基准测试工具之一。尽管
    HammerDB 的图形用户界面（GUI）需要一点时间来适应，但其工作流程足够简单，大多数人无需阅读文档即可完成。


    HammerDB 是一款开源的数据库基准测试工具，支持 Oracle、SQL Server、DB2、TimesTen、MySQL、MariaDB、PostgreSQL、Greenplum、Postgres
    Plus Advanced Server、Redis、Amazon Aurora 和 Redshift，以及 Hadoop 上的 Trafodion SQL。你可以在以下网址分别找到
    HammerDB 的网页、SourceForge 项目以及 Git 源代码版本控制仓库。


    *   `http://www.hammerdb.com`

    *   `https://sourceforge.net/projects/hammerora`

    *   `https://sourceforge.net/p/hammerora/code/ci/master/tree/`


    ## 安装与启动


    HammerDB 提供适用于 32 位和 64 位平台的 Windows 和 Linux 版本。当前的 2.23 版本发布于 2017 年 6 月，按其历史上每年发布一到两次的惯例来看，是时候更新了。在
    Windows 上运行安装程序时，它会将软件安装在 `C:\Program Files` 或 `C:\program Files (x86)` 目录下（具体取决于所安装版本的位数），这符合预期。然后要运行软件，只需双击
    `hammerdb.bat` 文件。在 Linux 上运行安装程序时，它会安装在 `~/` 或 `$HOME` 目录下。然后要运行软件，只需双击 `hammerdb.tcl`
    文件。当 HammerDB 软件启动时，它会显示如图 3-8 所示的屏幕。


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig8_HTML.jpg](img/464117_1_En_3_Fig8_HTML.jpg)

    *图 3-8 HammerDB 程序启动*


    默认情况下，HammerDB 假定你想针对 Oracle 数据库执行 TPC-C 基准测试。这些默认设置包含在 HammerDB 基础安装目录下一个名为 `config.xml`
    的 XML 文件中。我们稍后会再讨论如何修改此配置文件，先让我们更好地了解可用的各种选项和设置。现在假设我们只是想改为对 SQL Server 数据库执行
    TPC-H 基准测试。为此，我们只需选择主菜单 ➤ 选项，以打开如图 3-9 所示的弹出窗口。然后，我们只需选择 SQL Server 作为数据库，TPC-H
    作为基准测试。还需注意，虽然 HammerDB 支持许多数据库平台，但它目前仅提供两种行业标准数据库基准测试：TPC-C 和 TPC-H。然而，其网站常见问题解答（FAQ）指出，TPC-E
    已在其路线图上，并计划在未来版本中推出。


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig9_HTML.jpg](img/464117_1_En_3_Fig9_HTML.jpg)

    *图 3-9 HammerDB 选择数据库和基准测试*


    ## 执行基准测试的流程


    既然我们已经选择了数据库平台和基准测试，是时候深入了解使用 HammerDB 成功运行数据库基准测试的四个步骤了：


    1.  构建数据库模式对象并加载数据。

    2.  加载驱动脚本，其代码实现了所选的数据库基准测试。

    3.  创建所有将运行所选数据库基准测试工作负载的并发虚拟用户会话。

    4.  启动所有并发虚拟用户会话，开始运行所选数据库基准测试的工作负载。


    ### 步骤一：构建数据库对象


    因此，我们首先展开“模式构建”树形视图节点，然后双击“选项”节点，这将启动基准测试模式构建选项，如图 3-10 所示。


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig10_HTML.jpg](img/464117_1_En_3_Fig10_HTML.jpg)

    *图 3-10 HammerDB 模式构建选项*


    在这里，我们只需定义数据库连接标准、在哪个数据库中创建对象、最大并行度（`MAXDOP`）以及数据库基准测试的比例因子（记住，第 2 章中解释过，对于 TPC-H，每个比例因子大约相当于
    1 GB）。如果我们选择在 Oracle 上运行 TPC-H 数据库基准测试，那么此屏幕上显示的字段会略有不同，如图 3-11 所示。虽然此屏幕可能因数据库平台而异，但大多数数据库管理员会发现所有要求填写的信息都相当直观。


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig11_HTML.jpg](img/464117_1_En_3_Fig11_HTML.jpg)

    *图 3-11 HammerDB 用于 Oracle 的 Oracle 构建选项*


    选定了模式构建选项后，就该启动由这些选定选项控制的构建过程了。为此，我们再次查看“模式构建”树形视图节点下方，但现在双击“构建”节点，这将启动基准测试模式的构建（和加载）执行，如图
    3-12 所示。


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig12_HTML.jpg](img/464117_1_En_3_Fig12_HTML.jpg)

    *图 3-12 启动数据库对象的构建与加载*


    在选择“是”并实际创建和加载数据库基准测试对象之前，重新审视构建选项并重点关注屏幕底部附近突出显示的两个数字非常重要，如图 3-13 所示。这些是“比例因子”和“构建模式的虚拟用户数”设置。


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig13_HTML.jpg](img/464117_1_En_3_Fig13_HTML.jpg)

    *图 3-13 关键的构建模式选项*


    比例因子就是要创建的数据库的大小，对于 TPC-H，大约每个比例因子对应 1 GB。对于出于有限目的（如学习）在简单的笔记本电脑或台式机上进行测试，小的比例因子是可以的。然而，大多数数据库基准测试专家认为，只有至少
    100 GB 的比例因子才值得关注。实际上，大多数已发布的测试结果都是针对 300 GB 或 1 TB 的。随着比例因子的增加，你肯定需要生成额外的并发会话来加载这些数据；因此，你至少要指定四个会话（当然这取决于你的数据库服务器及其
    IO 带宽）。请注意，图 3-13 中比例因子设置为 10 GB，并使用 4 个并发会话来加载数据。第二个数字，即构建模式的并发会话数，将直接影响构建过程的运行时间及其在执行期间的显示方式。


    现在我们已经重新审视了这两个关键的值设置，可以通过选择图 3-12 中的“是”来启动创建过程。这将导致显示构建日志窗口，如图 3-14 所示。这个窗口有点复杂，因此值得详细审视。


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig14_HTML.jpg](img/464117_1_En_3_Fig14_HTML.jpg)

    *图 3-14 关键的构建模式选项*

    '
- fmt: 'There are two aspects of this window to focus upon: the upper right and middle
    sections. The middle is fairly simple: it’s a display of the virtual users running,
    their status, and if they have completed. The first noteworthy item is that while
    we chose four virtual users there are, in fact, five’ why? The answer is simple.
    When you ask for more than one virtual user then there is a coordinator/monitor
    user session, in this case virtual user #1\. You can tell by looking at the first
    line for each virtual user, user #2 though #5 shows waiting on the worker thread,
    which means they are waiting on the controlling session.


    You’ll know when the build process is finally 100% when the display contains the
    four key items highlighted in Figure [3-15](#464117_1_En_3_Chapter.xhtml#Fig15).
    First that the virtual user threads have all completed. Second that the status
    for each virtual user shows a green check mark. Third that each of the child virtual
    user threads ends with TABLES COMPLETE. Fourth and finally that the main virtual
    user thread shows CREATING INDEXES, UPDATING STATISTICS, and SCHEMA COMPLETE.
    Anything less and you will need to drop the database and its objects in order
    to repeat this step. Note that there are many things that can go wrong, so don’t
    be surprised nor upset if you do in fact have to repeat this step.


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig15_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig15_HTML.jpg)


    Figure 3-15


    HammerDB Load Complete


    #### Step #2: Load Driver Script


    We now continue by expanding the `Driver Script` tree-view node and then double-clicking
    on the `Options` node, which launches the benchmark script coding options as shown
    in Figure [3-16](#464117_1_En_3_Chapter.xhtml#Fig16). Note that step #2 as a whole
    is much simpler and thus shorter than the prior step; therefore this section is
    rather brief on purpose.


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig16_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig16_HTML.jpg)


    Figure 3-16


    HammerDB Driver Script Options


    Once again we simply define the database connection criteria, which database contains
    the objects in, the maximum degree of parallelism (`MAXDOP`), and how many iterations
    of the 22 TPC-H queries per virtual user. As before while this screen can vary
    by database platform, most database administrators will find all of the requested
    information fairly obvious.


    As with prior schema options screen, the driver options screen can vary slightly
    depending on the database benchmark being set up as shown in Figure [3-17](#464117_1_En_3_Chapter.xhtml#Fig17).
    Note well that HammerDB defaults the `keying` and `thinking` times to unchecked
    (meaning zero time) even though required by the spec. I suspect that’s because
    of the product’s name, which contains the word `hammer` and so the default was
    chosen to favor hammering the database for the highest TPS possible. Yet other
    database benchmarking tools (e.g., Benchmark Factory) do not offer the ability
    to enable or disable these settings. I’ve seen many DBAs wonder why one tool produces
    radically different TPS and average response times due to their lack of attention
    to this one detail. They usually just assume that HammerDB is superior since it
    scored higher TPS. So make sure to pay attention to these types of settings across
    tools if you want to be able to make apples to apples comparisons.


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig17_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig17_HTML.jpg)


    Figure 3-17


    Differing HammerDB Driver Options


    With the driver script options now selected, it’s time to simply load the benchmarking
    script with those values reflected. For that we again look under `Driver Script`
    tree-view node, but now double-click on the `Load` node, which loads the resulting
    benchmark execution script into the script editor as shown in Figure [3-18](#464117_1_En_3_Chapter.xhtml#Fig18).


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig18_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig18_HTML.jpg)


    Figure 3-18


    HammerDB Resulting Driver Script


    I suppose that any competent TCL programming language coder could choose to modify
    the generated script. However, I’ve discovered that this TCL code attempts to
    implement the benchmarking spec and is thus fairly complex. So my recommendation
    is to just change options and reload the new resulting script. But I am not a
    programmer anymore so maybe I’m just being scared and lazy. I leave it up to the
    reader to decide if they can possibly improve upon the generated code. Just remember
    to be sure to save your modified script such that it’s available for future use.'
