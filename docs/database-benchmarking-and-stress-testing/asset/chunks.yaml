    option to be available. So until you manually install the vendor’s tools, the
    network driver is set to the suboptimal default.


    ![../images/464117_1_En_9_Chapter/464117_1_En_9_Fig3_HTML.jpg](images/464117_1_En_9_Chapter/464117_1_En_9_Fig3_HTML.jpg)


    Figure 9-3


    Choose Optimal Hypervisor Network Driver


    The second networking consideration is if your hypervisor permits “*passthrough*”
    mode for a physical device, then you can choose one of your network interface
    cards and mark it as passthrough enabled. Then you can assign that NIC to the
    VM such that the guest OS sees the actual hardware and therefore uses the native
    OS hardware driver – which also means your network traffic will entirely bypass
    the hypervisor and its overhead. However, there is one major drawback to this
    using the technique: dynamic virtual machine relocation might be impossible or
    far more difficult since servers could have different hardware or all that new
    hosts hardware could already be provisioned such that nothing is left for any
    new passthrough setups. As such, you may well conclude that for network traffic
    that the optimal hypervisor network driver (e.g., VMXNET3) is sufficient in order
    to retain the most overall flexibility with reasonably acceptable performance.
    I’ve personally done this both ways and cannot really make any recommendations.
    Remember that the hypervisor host may have a Link Aggregation Control Protocol
    (LACP) setup combining the throughput of multiple NICs that you’d miss out on
    by doing your own dedicated passthrough on one or two NICs. For example, my server
    has eight gigabit NIC’s, of which six are allocated to the LACP group.


    ## Disk IO


    As has been said several times in this book, we all know that physical disk IO
    is the Achilles’ heel of database performance. Remember the key points from earlier:


    *   Avoid RAID 5 for database data and index files.


    *   Suggest RAID 10 for database data and index files.


    *   Storage LUNs with proper stripe width and depth/size.


    So what considerations do we need to add to this list when doing benchmarking
    for virtualized databases? There are just three additional, and they are all pretty
    straightforward:


    *   Avoid virtualization snapshots (adds unnecessary overhead).


    *   As with the network, consider passthrough drivers for host bus adapters (HBAs)
    when reasonable (just as with networking this choice may preclude dynamic virtual
    machine relocation).


    *   Choose the most efficient disk initialization mode for optimal database IO.


    It’s this last item that requires explanation. Many DBAs would agree that for
    those database platforms that allow for database data files to grow dynamically,
    the cost of dynamic space allocation can be a measurable burden. For example,
    imagine a database file set to start at 50MB and to grow by 50M as space needed
    is being utilized to house the schema for a 300GB TPC-H. The data loading process
    will cause roughly 600 dynamic disk space extensions just for the data, with maybe
    another 100 for the indexes. The smart DBA would just create a data file with
    maybe 500GB of disk space and avoid all that dynamic allocation overhead. The
    same principle holds true for your virtual machine disk allocations. For example,
    VMware offers three provisioning modes:


    *   Thin: file starts at zero size and dynamically grows as space requested.


    *   Lazy Zero Thick (aka Flat): file starts at the specified size and blocks must
    be dynamically zeroed out before written.


    *   Eager Zero Thick: file starts at the specified size and all blocks pre-zeroed
    out before file made available for use.


    So when database benchmarking and looking for the best disk IO possible, you should
    not only minimize database-level dynamic disk growth but also complement that
    by eliminating hypervisor-level dynamic disk growth by choosing the entirely preallocated
    mode as shown in Figure [9-4](#464117_1_En_9_Chapter.xhtml#Fig4).


    ![../images/464117_1_En_9_Chapter/464117_1_En_9_Fig4_HTML.jpg](images/464117_1_En_9_Chapter/464117_1_En_9_Fig4_HTML.jpg)


    Figure 9-4


    Choose Optimal Disk Provisiong Method


    ## Monitoring Issues


    Back in Chapter [5](#464117_1_En_5_Chapter.xhtml) we visualized the database benchmarking
    effort as being similar to a cardiac stress test as shown here again in Figure
    [9-5](#464117_1_En_9_Chapter.xhtml#Fig5). We’ve not made much mention of the monitoring
    aspect throughout the book, until now that is. It’s a fairly well-known fact that
    not all OS and database monitoring tools report accurate values when the guest
    OS and its database is virtualized. If the monitoring tool is not virtually aware
    or simply monitors at the guest OS level, then there can be CPU clock drift and
    skew as seen by the monitoring software. This can lead to incorrect diagnostics
    and remedies. Furthermore, none of the currently available database benchmarking
    tools inherently handle this because their job is just to be the treadmill and
    simply stress the database. So my advice is to invest in a good monitoring solution
    that’s fully virtualization aware.


    ![../images/464117_1_En_9_Chapter/464117_1_En_9_Fig5_HTML.jpg](images/464117_1_En_9_Chapter/464117_1_En_9_Fig5_HTML.jpg)


    Figure 9-5


    Benchmarking like Cardiac Stress Test


    ## Summary


    In this chapter we examined the issues and techniques for performing database
    benchmarking for virtualization. The basic message being that from the BIOS up
    through all the virtual machine hardware resource configuration settings, there
    are numerous choices to be made that affect achievable benchmarking performance.
    Therefore it’s very worth the time to verify and, where necessary, correct these
    settings in order to meet the benchmarking expectations.'
  trans: '

    ## 网络


    对于正在进行任何数据库基准测试的虚拟机，网络设置只涉及两个非常简单的问题和建议。首先，也是最重要的，网络适配器应设置为适当且最优的驱动程序。我曾参与过几次基准测试工作，预期的结果未能达成，且没人能确切知道原因。经过调查他们的虚拟机网络设置（如图
    9-3 所示），发现指定了一个次优的驱动程序。在虚拟机创建或转换/迁移到主机服务器时，网络驱动程序被设置为客户操作系统的通用默认值（本例中是 `E1000`）。然而，对于此虚拟机管理程序（即
    VMware ESX），最佳驱动程序是一种称为 `VMXNET3` 的半虚拟化驱动。这又是一个非常简单、易于检查并修正的事情。请记住，这个用于大型 OLTP
    基准测试的数据库虚拟机可能要处理数十万到数百万的用户会话请求并返回结果。对于数据仓库基准测试，它可能会返回相当大量的数据。无论哪种情况，网络都将成为整体性能的严重瓶颈。在
    OLTP 测试案例中，这个简单的设置更改使平均响应时间提升了 500%，而这正是我们最希望优化的指标。如果你好奇为什么会这样，那是因为 `E1000` 驱动程序是针对通用千兆网卡的软件模拟，而
    `VMXNET3` 则支持万兆。为什么会这样？虚拟机必须在客户操作系统中安装供应商的工具软件，此选项才可用。因此，除非你手动安装供应商工具，否则网络驱动程序会设置为次优的默认值。


    ![../images/464117_1_En_9_Chapter/464117_1_En_9_Fig3_HTML.jpg](img/464117_1_En_9_Fig3_HTML.jpg)


    图 9-3


    选择最优的虚拟机管理程序网络驱动程序


    第二个网络考虑因素是，如果你的虚拟机管理程序允许物理设备的“*直通*”模式，那么你可以选择一块网卡并将其标记为启用直通。然后你可以将该网卡分配给虚拟机，使得客户操作系统能看到实际的硬件，从而使用原生的操作系统硬件驱动程序——这也意味着你的网络流量将完全绕过虚拟机管理程序及其开销。然而，使用此技术有一个主要缺点：动态虚拟机迁移可能会变得不可能或困难得多，因为服务器可能具有不同的硬件，或者所有新主机的硬件可能已被分配，没有剩余资源用于新的直通设置。因此，你很可能会得出结论：对于网络流量而言，最优的虚拟机管理程序网络驱动程序（例如
    `VMXNET3`）在保留整体最大灵活性的同时，性能也相当可接受，这就足够了。我个人两种方式都尝试过，无法给出任何明确的建议。请记住，虚拟机管理程序主机可能配置了链路聚合控制协议，将多个网卡的吞吐量合并起来，而如果你为一两个网卡使用自己专用的直通设置，就会错失这点。例如，我的服务器有八个千兆网卡，其中六个分配给了
    LACP 组。


    ## 磁盘 IO


    正如本书多次提到的，我们都知道物理磁盘 IO 是数据库性能的阿喀琉斯之踵。请记住之前的关键要点：


    -   对于数据库数据和索引文件，避免使用 RAID 5。

    -   对于数据库数据和索引文件，建议使用 RAID 10。

    -   存储 LUN 要具有适当的条带宽度和深度/大小。


    那么，在进行虚拟化数据库的基准测试时，我们需要在这个列表中添加哪些考虑因素呢？只有三个额外的点，而且它们都非常直接：


    -   避免使用虚拟化快照（会增加不必要的开销）。

    -   与网络类似，在合理的情况下，考虑为总线适配器使用直通驱动（就像网络一样，此选择可能会妨碍动态虚拟机迁移）。

    -   选择最高效的磁盘初始化模式以实现最优的数据库 IO。


    最后一点需要解释。许多 DBA 会同意，对于那些允许数据库数据文件动态增长的数据库平台来说，动态空间分配的成本可能是一个可测量的负担。例如，想象一个数据库文件，初始设置为
    50MB，随着空间使用需要，按 50MB 的幅度增长，用于容纳一个 300GB TPC-H 的架构。仅数据加载过程就会导致大约 600 次动态磁盘空间扩展，索引可能还有
    100 次。聪明的 DBA 会直接创建一个大约 500GB 磁盘空间的数据文件，以避免所有这些动态分配的开销。同样的原则也适用于你的虚拟机磁盘分配。例如，VMware
    提供三种置备模式：


    -   `Thin`：文件从零大小开始，随着请求的空间动态增长。

    -   `延迟置零厚置备`（又名 `Flat`）：文件从指定大小开始，块在写入前必须动态清零。

    -   `精置零厚置备`：文件从指定大小开始，所有块在文件可供使用前预先清零。


    因此，在进行数据库基准测试并寻求最佳磁盘 IO 时，你不仅应该最小化数据库级别的动态磁盘增长，还应该通过选择完全预分配模式（如图 9-4 所示）来消除虚拟机管理程序级别的动态磁盘增长，以作补充。


    ![../images/464117_1_En_9_Chapter/464117_1_En_9_Fig4_HTML.jpg](img/464117_1_En_9_Fig4_HTML.jpg)


    图 9-4


    选择最优的磁盘置备方法


    ## 监控问题


    回到第 5 章，我们将数据库基准测试工作可视化，类似于心脏压力测试，如图 9-5 所示。在本书中，直到现在我们都没有过多提及监控方面。一个相当众所周知的事实是，并非所有的操作系统和数据库监控工具在客户操作系统及其数据库被虚拟化时都能报告准确的值。如果监控工具不是虚拟化感知的，或者仅仅在客户操作系统级别进行监控，那么监控软件看到的
    CPU 时钟可能会漂移和偏移。这可能导致错误的诊断和解决方案。此外，目前可用的数据库基准测试工具本身都没有处理这个问题，因为它们的任务只是充当跑步机，单纯地给数据库施加压力。所以我的建议是，投资一个好的、完全虚拟化感知的监控解决方案。


    ![../images/464117_1_En_9_Chapter/464117_1_En_9_Fig5_HTML.jpg](img/464117_1_En_9_Fig5_HTML.jpg)


    图 9-5


    基准测试如同心脏压力测试


    ## 总结


    在本章中，我们探讨了在虚拟化环境下执行数据库基准测试的问题和技术。核心信息是，从 BIOS 到所有虚拟机硬件资源配置设置，有众多选择会影响可实现的基准测试性能。因此，非常值得花时间去验证并在必要时修正这些设置，以达到基准测试的预期。

    '
- fmt: '# 10. Benchmarking for Public Cloud


    In this chapter we’re going to review benchmarking considerations for when you’re
    considering or moving database instances and their databases to the public cloud.
    This chapter is purposefully kept short in order to focus on just the main issues,
    because the cloud has so many variables plus it is evolving every day. A whole
    book covering just the topic of deploying databases in the cloud would fill a
    volume all by itself. So here we must concentrate on the big-ticket items that
    are of the most value.


    In this chapter the examples and quotes shown will be from Amazon’s AWS and Microsoft
    Azure clouds. Again, I am not suggesting that you choose any particular vendor
    nor endorsing any vendor. But these two are the major players (for now). Finally
    note that the prior two chapters covering database consolidation and virtualization
    provide the basic foundation for deploying to the cloud. So if you have skipped
    those chapters or are not entirely comfortable with their concepts, it would be
    advisable to review them before processing.


    ## Note


    While this chapter may highlight examples from a given public cloud vendor, all
    the principles and concepts shown in this chapter would apply for any cloud vendor’s
    solution. The exact name or terminology might change, but the basic concepts would
    still apply.


    ## Image Right Sizing


    The first and most obvious thing DBAs need to define before deploying any database
    to the cloud is what type and size of image to select. The problem is that there
    are more choices than you can shake a stick at. Table 10-1 shows a simple breakdown
    by major category. Note that there are many different sizes per category, plus
    some vendors do not offer every category but rather allow users to add GPU’s and
    extra storage to any configuration.


    Table 10-1


    Various Major Cloud Image Categories


    | | Amazon | Azure | Google |

    | --- | --- | --- | --- |

    | General Purpose | T2, M5, M4 | B, Dsv3, Dv3, DSv2, Dv2, Av2 | n1-standard |

    | Compute Optimized | C5, C4 | Fsv2, Fs, F | n1-highcpu |

    | Memory Optimized | X1e, X1, R4 | Esv3, Ev3, M, GS, G, DSv2, Dv2 | n1-highmem,
    n1-ultramem |

    | Storage Optimized | H1, I3, D2 | Ls | <none> |

    | Accelerated Computing | P3, P2, G3, F1 | NV, NC, NCv2, NCv3, ND | <none> |


    Let’s assume that your chosen cloud provider is Amazon, that you’ve read the details
    about their various image categories, and that you have selected image type `M4`.
    Now I am not promoting or hinting that this is the size to pick for a database.
    Here are the use cases recommended for `M4`: small and mid-size databases, data
    processing tasks that require additional memory, caching fleets, and for running
    back-end servers for `SAP`, `Microsoft SharePoint`, cluster computing, and other
    enterprise applications. The reason I chose `M4` was simple: it has a reasonable
    number of sizes as shown in Table 10-2. If I had instead chosen `M5`, which might
    for many represent a good `safe bet` choice, the table of sizes would have spanned
    two pages or more. The point is that between choosing the right image category
    and then the proper size for that category is a Herculean task. The good news
    is that you can change the size fairly easy. As for category changes, that depends
    on the cloud provider as to whether possible and, if so, how difficult.


    Table 10-2


    Example Amazon `M4` Image Sizes


    | Model | vCPU | Mem (GiB) | SSD Storage (GB) | Dedicated EBS Bandwidth (Mbps)
    |

    | --- | --- | --- | --- | --- |

    | `m4.large` | 2 | 8 | `EBS-only` | 450 |

    | `m4.xlarge` | 4 | 16 | `EBS-only` | 750 |

    | `m4.2xlarge` | 8 | 32 | `EBS-only` | 1,000 |

    | `m4.4xlarge` | 16 | 64 | `EBS-only` | 2,000 |

    | `m4.10xlarge` | 40 | 160 | `EBS-only` | 4,000 |

    | `m4.16xlarge` | 64 | 256 | `EBS-only` | 10,000 |


    The important thing to keep in mind from a database benchmarking perspective is
    not to choose an artificially small size to save money or a large one to show
    optimum results. You should choose the same as you are planning to deploy for
    production on the cloud. So if you know, for example, that you’re going to deploy
    `Oracle 12g` running under `Oracle Enterprise Linux` on an `m5d.xlarge` image
    (which includes `NVMe SSD`), then that’s the size you should also chose for doing
    all your benchmarking. You may think this so obvious as to not need it said, but
    I have assisted many benchmarking efforts where clearly they fall into `we''re
    just doing this as a check-box item` mode and so just use a small, cheap image.
    I’ll just say that any such obtained results are arguably quite worthless. There
    are too many differences and options to base any conclusions when not choosing
    the same image category and size.'
