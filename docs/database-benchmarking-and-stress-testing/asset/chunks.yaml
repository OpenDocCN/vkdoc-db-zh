  trans: '## 专用设备


    最后一个你可能需要为其进行基准测试的领域是专用数据库或 I/O 设备。这些设备在主流云技术兴起之前相当流行。本质上，这些设备只是硬件厂商构建的超融合计算机系统，旨在通过优化组件选择和整体系统配置来提升数据库性能。以下是一些示例：


    *   `Oracle Exadata`

    *   `Oracle Database Appliance (ODA)`

    *   `Dell Fusion IO`

    *   `HP StorageWorks IO Accelerator`

    *   各种超融合系统解决方案


    如果你遇到其中任何一种需要进行数据库基准测试的专用环境，我的建议是聘请熟悉此类系统的顾问。例如，`Oracle Exadata`非常复杂。我管理过一个`Exadata`系统四年。我学到了许多利用`Exadata`独特功能来优化数据库基准测试结果的新方法。没有一本书能涵盖如此丰富的详细信息。你显然需要一些帮助。


    ## 总结


    本章篇幅较短，涵盖了在任何数据库基准测试项目中值得注意和纳入的关键硬件问题。请记住，我们不能简单地通过堆砌硬件来解决性能问题。但反之亦然：在试图解决数据库性能问题时，我们也不能忽视硬件选项。至少，仅仅添加一个廉价的`SSD`来存放临时数据或日志数据就能产生可观的效果。此外，一些新技术提供了超过`50
    倍`的`IO`速度提升，而且更好的技术即将到来。因此，在进行数据库基准测试时，永远不要忘记考虑硬件方面和选项。


    # 7. 基准测试软件选项


    上一章涵盖了一些在执行数据库基准测试项目时需要审查和考虑更换的重要硬件选项。尽管过去十年的硬件进步令人惊叹（例如，我刚组装了一台新的桌面`PC`，其`CPU`提供了`16`个逻辑核心或线程），但我们不能也不应总是自动地寻求硬件来解决性能问题。实际上，大多数基准测试工作可以通过利用适当的新数据库功能来获得最大的性能分数提升。数据库厂商同样做出了重大改进，通常是为了利用许多新的硬件技术。本章将重点讨论需要考虑的常规数据库功能，以及利用这些新技术的新功能。


    在考虑这些新数据库功能时，你需要将两个想法放在首位。首先，基准测试规范是否允许使用这些强大的新数据库功能，或者至少没有明确说明不能使用？其次，你的数据库厂商是否需要为这些酷炫的新功能支付额外的许可费用？例如，一些数据库厂商对`多租户`、`分区`、`高级压缩`和`内存中`等功能收取额外费用，而其他厂商则不收。事实上，一家主要厂商从其最新版本开始，所有版本都提供所有功能，只是根据版本限制了最大`CPU`和内存。*我个人希望其他人也能效仿这个好榜样。*


    ### 注意


    虽然本章可能重点举例某个特定数据库厂商，但贯穿本章展示的主要原则和概念将保持不变。因此，请不要过于关注提到的任何特定数据库或厂商。


    ## 绘制图表


    在处理任何数据库应用程序软件时，尤其是在进行数据库基准测试项目时，首要且通常是关键的一步是构建所有主要持久化对象的数据库结构图 (`DSD`)。请注意，我故意没有说实体关系图
    (`ERD`) 或数据模型，因为许多 `DBA` 既不喜欢也不使用它们。所以我希望这样引用可以避免任何反对意见。当在这个图表问题上受到质疑时，我会问那些反对的
    `DBA`，如果他们在为孩子组装一辆新自行车，而说明书里一张图片都没有，他们会作何感想？我坚信，为了排查数据库性能问题，你必须有一张图表，因为你可能并未参与最初的数据库设计，或者它实在太大了，无法在脑海中想象出来。


    回到数据库基准测试，大多数规范都包含这样的结构图，如 `TPC-H` 基准测试的 `图 [7-1]` 所示。请注意，此图显然不是 `ERD`，因为它没有使用任何标准的数据建模符号。充其量，这是一个纯粹的物理模型，应该更容易被大多数
    `DBA` 所接受。但从这个图中我们可以看出表的名称、它们包含的列、它们是如何连接的，以及基于比例因子的一些大小估计。但缺少一些关键项目，例如列的数据类型和哪些列被索引。因此，供你考虑的一个建议是，一旦你的基准测试工具创建了对象，就使用数据建模工具对数据库设计进行逆向工程。这样你就能获得所有额外的关键信息，并且可以根据你的喜好来组织图表布局。


    ![../images/464117_1_En_7_Chapter/464117_1_En_7_Fig1_HTML.jpg](img/464117_1_En_7_Fig1_HTML.jpg)


    `图 7-1` `TPC-H` 基准测试的完整模式


    不要因为这个简单的示例图而放松警惕；旧的数据库基准测试过于简单。然而，新的数据库基准测试则复杂得多，也更贴近现实。例如，`TPC-DS` 使用了一个星型模式设计，包含七个不同的星（即主题领域）。`图
    [7-2]` 仅显示了 `TPC-DS` 中关于商店销售的星型模式。在整个数据库设计中还有另外六个同样复杂的星。请注意，`图 [7-2]` 和其他六个主题领域仅列出了表名并显示了基本关系，没有说明是哪些列相关。因此，我再次强烈建议你，一旦基准测试工具创建了对象，就使用数据建模工具对数据库设计进行逆向工程。


    ![../images/464117_1_En_7_Chapter/464117_1_En_7_Fig2_HTML.jpg](img/464117_1_En_7_Fig2_HTML.jpg)


    `图 7-2` `TPC-DS` 基准测试的销售星型模式


    但在我看来，最复杂的数据库设计是 `图 [7-3]` 所示的 `TPC-DS` 基准测试的设计。你几乎无法看清表或列的名称。但你可以看到有 `34` 个表，它们之间有着非常复杂的相互关系。在这方面，`TPC-DS`
    数据库设计非常类似于你可能为某些内部数据库应用程序开发的现实世界数据库设计。想象一下，看一个长达 `30` 行、引用了 `7` 个表的 `TPC-DS` 查询。没有图表，你如何理解它试图完成什么，更不用说这些表之间实际是如何关联的，以及应该如何连接了。此外，在没有这些知识的情况下，你如何建议新的索引或优化器提示？为了对
    `图 [7-3]` 进行逆向工程，我使用了 `Quest Software` 的 `Toad Data Modeler`。但任何提供逆向工程功能的好数据建模工具都应该足够。事实上，大多数工具都提供免费版本，可用于有限数量的对象（例如
    `25` 或 `50` 个），因此你甚至不需要购买工具来构建这些图表。


    ![../images/464117_1_En_7_Chapter/464117_1_En_7_Fig3_HTML.jpg](img/464117_1_En_7_Fig3_HTML.jpg)


    `图 7-3` 复杂的 `TPC-DS` 基准测试模式


    ### 注意


    从此处开始引用的功能在你的数据库厂商的产品中可能可用，也可能不可用，并且它可能是一个额外收费的项目。因此，在使用这些想法之前，请确保你已获得适当的许可。'
- fmt: "## Partitioning Larger Objects\n\n对于非常大的表和索引，通常数据仓库和超大规模OLTP基准测试需要它们，数据库提供的将对象分区或拆分到单独桶（bucket）中的选项是一种极其有用的技术，这些桶看起来和行为上都像一个逻辑上的大桶。其思想是查询可以通过一个称为**分区消除（partition\
    \ elimination）**的过程更快地找到行。想象一个名为 `ORDERS` 的非常大的表，其数据按年份分区到桶中，如图`7-4`所示。假设我们查询\
    \ `ORDERS` 表，请求当前年份和前一年中任何超过500美元的订单的平均订单大小。因此数据库优化器知道它只需扫描2017和2018桶的索引，而可以跳过或消除2015和2016年的索引扫描。\n\
    \n![../images/464117_1_En_7_Chapter/464117_1_En_7_Fig4_HTML.png](images/464117_1_En_7_Chapter/464117_1_En_7_Fig4_HTML.png)\n\
    图 7-4：按年份分区的 `ORDERS` 表\n\n对于足够大的对象，分区消除可以极大提高查询性能。然而，当用于较小的表时，净收益可能微不足道，甚至对查询来说效率更低。因此，您应该谨慎地仅在合适的时候使用此功能。历史上，我分区表时，每个桶包含数千万到数亿行。不要将这些数字视为硬性建议，而应将其作为一个示例，让您了解按当今标准“非常大”究竟意味着什么。还要注意，您也可以进行**子分区（subpartitioning）**。假设我们是亚马逊（Amazon），每年有数十亿个订单。那么一个年份的桶仍然会相当大。在这种情况下，您可以对分区再进行分区：这称为子分区。因此，在本例中，我们可能进一步按月对每一年进行分区。现在优化器可以在子分区级别进行进一步的消除。但请注意，在我们的例子中，对于当前年份和前一年中任何超过500美元的订单，优化器无法消除任何子分区，因此它实际上必须处理12个较小的索引扫描，而不是一个大的扫描。这可能更慢，所以再次强调，要明智选择。\n\
    \n为了演示分区能提供什么样的性能提升，现在请看图`7-5`。该图显示了针对一个300GB数据库运行22个TPC-H查询所需的时间，对比了非分区实现与分区实现（其中\
    \ `ORDERS` 和 `LINEITEM` 表已分区）。具体的分区方案没有详细说明，因为关于最佳方式确实没有一个普遍的答案。您应该根据许多因素进行分区，包括存储子系统的带宽和能力。还要注意，这种仅为22个查询的总运行时间评分的简单方法并不是对TPC-H基准测试进行评分的正确方式，但对于此目的来说，它是合理且足够的。对于我的数据库服务器、数据库版本和配置，性能提升了`35.93%`。您的结果可能会有所不同。\n\
    \n![../images/464117_1_En_7_Chapter/464117_1_En_7_Fig5_HTML.png](images/464117_1_En_7_Chapter/464117_1_En_7_Fig5_HTML.png)\n\
    图 7-5：分区带来的TPC-H改进\n\n## Advanced Data Compression\n\n尽管过去几年磁盘空间的每GB成本已大幅下降，但数据压缩仍能从某些方面使数据库性能受益。借助能够大幅缩减数据的高级数据压缩，压缩和解压缩数据的成本可以被读写更少数据所带来的收益所抵消。此外，数据在数据库的数据缓存中占用的空间更小，因此缓存本质上表现得如同更大（即，拥有更多内存）。另外，如果您的存储是通过Infiniband、以太网或光纤通道传输数据的SAN或NAS，那么需要传输的数据量也会减少。所有这些优势有时可以累积成显著的性能提升。但与分区一样，您需要明智地选择何时使用压缩（特别是如果它还需要额外成本的话）。\n\
    \n为了演示压缩能带来什么样的改进，现在请看图`7-6`。该图显示了针对一个300GB数据库运行22个TPC-H查询所需的时间，对比了非压缩实现与压缩实现（其中\
    \ `ORDERS` 和 `LINEITEM` 表已压缩）。请注意，不同的数据库提供差异很大的不同压缩选项。但压缩选项通常分为三大类：\n\n![../images/464117_1_En_7_Chapter/464117_1_En_7_Fig6_HTML.png](images/464117_1_En_7_Chapter/464117_1_En_7_Fig6_HTML.png)\n\
    图 7-6：压缩带来的TPC-H改进\n\n*   未压缩 vs. 压缩（简单的二进制选项）\n*   页级压缩 vs. 行级压缩\n*   多级压缩层次：\n\
    \    *   基础表压缩\n    *   高级行压缩\n    *   混合列式压缩 - 低\n    *   混合列式压缩 - 高\n\n请记住，这种仅为22个查询的总运行时间评分的简单方法并不是对TPC-H基准测试进行评分的正确方式，但对于此目的来说，它是合理且足够的。对于我的数据库服务器、数据库版本和配置，性能提升了`19.92%`。如前所述，与分区一样，您的压缩效果也会有所不同。\n\
    \n现在，并非本章介绍的每一个高级数据库功能都能轻易组合以获得累积的正面收益；然而，根据您的数据库平台，分区和压缩通常可以结合使用。此外，我们必须现实地看待我们的性能改进期望。图`7-7`显示了结合分区和压缩的净效果；性能提升了`46.04%`。请注意，性能提升并不像我们预期的那样具有累积性。虽然我们本可以预期36%\
    \ + 20% 总共56%，但我们只得到了46%。原因很简单。同时实现多个功能带来的好处通常不会导致纯粹的加性改进，因为不同技术之间的复杂交互往往会相互扭曲。而且，可实现的改进是有限的。正如俗话所说，“你无法从芜菁中榨出血来”。\n\
    \n![../images/464117_1_En_7_Chapter/464117_1_En_7_Fig7_HTML.png](images/464117_1_En_7_Chapter/464117_1_En_7_Fig7_HTML.png)\n\
    图 7-7：分区与压缩共同带来的TPC-H改进"
  raw: "## Partitioning Larger Objects\n\nFor very large tables and indexes, generally\
    \ required by data warehousing and extremely large-scale OLTP benchmarks, the\
    \ database option to partition or split objects into separate buckets that look\
    \ and behave like one logical big bucket is an extremely useful technique. The\
    \ idea is that queries can find rows quicker by a process known as partition elimination.\
    \ Imagine a very large table called ORDERS where the data is partitioned into\
    \ buckets by year as shown in Figure [7-4](#464117_1_En_7_Chapter.xhtml#Fig4).\
    \ Suppose we query the ORDERS table and request average order size for any order\
    \ over $500 in the current and prior years. Thus the database optimizer knows\
    \ it can scan the indexes just for the 2017 and 2018 buckets, and it can skip\
    \ or eliminate the 2015 and 2016 index scans.\n\n![../images/464117_1_En_7_Chapter/464117_1_En_7_Fig4_HTML.png](images/464117_1_En_7_Chapter/464117_1_En_7_Fig4_HTML.png)\n\
    \nFigure 7-4\n\nORDERS Table Paritioned by Year\n\nFor appropriately very large\
    \ objects, partition elimination can greatly increase query performance. However\
    \ when used for smaller-sized tables the net benefit could be negligible or even\
    \ less efficient for queries. So you should be careful to only use this feature\
    \ when appropriate. Historically I’ve partitioned tables where each bucket held\
    \ tens to hundreds of millions of rows. Do not take those numbers as hard advice,\
    \ but rather an example to give you some idea of what very large really means\
    \ by today’s standards. Note too that you can also subpartition as well. So imagine\
    \ that we’re Amazon and have many billions of orders per year. So the bucket for\
    \ a year would still be quite large. In that case you can partition the partitions:\
    \ this is called subpartitioning. So in this case we might further partition each\
    \ year by month. Now the optimizer can do further elimination at the subpartition\
    \ level. But note in our example for any order over $500 in the current and prior\
    \ years that the optimizer cannot eliminate any of the subpartitions, so it must\
    \ in fact process 12 smaller index scans rather than one large one. This could\
    \ be slower, so again choose wisely.\n\nTo demonstrate an example what performance\
    \ partitioning can provide, look now at Figure [7-5](#464117_1_En_7_Chapter.xhtml#Fig5).\
    \ The graph shows the time to run the 22 TPC-H queries against a 300GB database\
    \ for a non-partitioned implementation vs. a partitioned one (where the ORDERS\
    \ and LINEITEM tables are partitioned). The actual partitioning scheme is not\
    \ elaborated as there’s really no one universal answer as to the best ways to\
    \ do it. You should partition based upon many factors, including your storage\
    \ subsystem’s bandwidth and capabilities. Also note that this simple method of\
    \ just scoring the total runtime for the 22 queries is not the proper way to score\
    \ a TPC-H benchmark, but it’s reasonable and sufficient for this purpose. For\
    \ my database server, database version, and configuration, the performance improvement\
    \ was **35.93%**. Your mileage will vary.\n\n![../images/464117_1_En_7_Chapter/464117_1_En_7_Fig5_HTML.png](images/464117_1_En_7_Chapter/464117_1_En_7_Fig5_HTML.png)\n\
    \nFigure 7-5\n\nTPC-H Improvments from Partitioning\n\n## Advanced Data Compression\n\
    \nEven though the cost per GB of disk space has dropped dramatically over the\
    \ past few years, there are still some reasons that data compression can benefit\
    \ database performance. With the more advanced data compression that can radically\
    \ shrink the data, the cost to compress and uncompress the data can be offset\
    \ by the gains from reading and writing less data. Moreover the data takes less\
    \ room in the database’s data cache, thus the cache essentially behaves as if\
    \ it were larger (i.e., had more memory). Plus if your storage is a SAN or NAS\
    \ that transfers data across Infiniband, Ethernet, or Fibre Channel, the amount\
    \ of data to transfer is also reduced. All of these advantages can sometimes add\
    \ up to a noticeable performance improvement. But as with partitioning, you need\
    \ to choose wisely when to use compression (especially if it also costs extra).\n\
    \nTo demonstrate an example of what improvements compression can provide, look\
    \ now at Figure [7-6](#464117_1_En_7_Chapter.xhtml#Fig6). The graph shows the\
    \ time to run the 22 TPC-H queries against a 300GB database for a non-compressed\
    \ implementation vs. a compressed one (where the ORDERS and LINEITEM tables are\
    \ compressed). Note that different databases offer different compression options\
    \ that vary quite a bit. But compression options generally fall into three major\
    \ categories:\n\n![../images/464117_1_En_7_Chapter/464117_1_En_7_Fig6_HTML.png](images/464117_1_En_7_Chapter/464117_1_En_7_Fig6_HTML.png)\n\
    \nFigure 7-6\n\nTPC-H Improvements from Compression\n\n*   Uncompressed vs. compressed\
    \ (simple binary option)\n\n*   Page-level compression vs. row-level compression\n\
    \n*   Multi-leveled compression hierarchy:\n    *   Basic table compression\n\n\
    \    *   Advanced row compression\n\n    *   Hybrid columnar compression - low\n\
    \n    *   Hybrid columnar compression - high\n\nRemember that this simple method\
    \ of just scoring the total runtime for the 22 queries is not the proper way to\
    \ score a TPC-H benchmark, but it’s reasonable and sufficient for this purpose.\
    \ For my database server, database version, and configuration, the performance\
    \ improvement was **19.92%**. As before with partitioning, your compression mileage\
    \ will vary.\n\nNow not every advanced database feature presented in this chapter\
    \ can be easily combined for a cumulative, positive benefit; however partitioning\
    \ and compression generally can be depending on your database platform. Moreover\
    \ we have to be realistic regarding our performance improvement expectations.\
    \ Figure [7-7](#464117_1_En_7_Chapter.xhtml#Fig7) shows the net effect of combining\
    \ partitioning and compression; the performance improved **46.04%**. Note that\
    \ the performance improvement was not as cumulative as we might have expected.\
    \ While we could have expected 36% + 20% for a total of 56%, instead we got only\
    \ 46%. The reason is simple. The benefits of implementing multiple features at\
    \ once generally do not result in purely additive improvements as the complex\
    \ interactions between differing techniques often skew each other. Plus there’s\
    \ only so much improvement that can be achieved. As the saying goes, “You can’t\
    \ squeeze blood from a turnip.”\n\n![../images/464117_1_En_7_Chapter/464117_1_En_7_Fig7_HTML.png](images/464117_1_En_7_Chapter/464117_1_En_7_Fig7_HTML.png)\n\
    \nFigure 7-7\n\nTPC-H Improvments from Partitioing & Compression"
  trans: "\n## 对大型对象进行分区\n\n对于非常大的表和索引——通常数据仓库和超大规模 OLTP 基准测试需要它们——数据库提供的将对象分区或拆分到单独“桶”中的选项是一种极其有用的技术。这些桶看起来和行为上都像一个逻辑上的大桶。其思想是查询可以通过一个称为**分区消除**的过程更快地找到行。想象一个名为\
    \ `ORDERS` 的非常大的表，其数据按年份分区到桶中，如图`7-4`所示。假设我们查询 `ORDERS` 表，请求当前年份和前一年中任何超过 500\
    \ 美元的订单的平均订单大小。因此数据库优化器知道它只需扫描 2017 和 2018 桶的索引，而可以跳过或消除 2015 和 2016 年的索引扫描。\n\
    \n![../images/464117_1_En_7_Chapter/464117_1_En_7_Fig4_HTML.png](img/464117_1_En_7_Fig4_HTML.png)\n\
    图 7-4：按年份分区的 `ORDERS` 表\n\n对于足够大的对象，分区消除可以极大提高查询性能。然而，当用于较小的表时，净收益可能微不足道，甚至对查询来说效率更低。因此，您应该谨慎地仅在合适的时候使用此功能。历史上，我分区表时，每个桶包含数千万到数亿行。不要将这些数字视为硬性建议，而应将其作为一个示例，让您了解按当今标准“非常大”究竟意味着什么。还要注意，您也可以进行**子分区**。假设我们是亚马逊（Amazon），每年有数十亿个订单。那么一个年份的桶仍然会相当大。在这种情况下，您可以对分区再进行分区：这称为子分区。因此，在本例中，我们可能进一步按月对每一年进行分区。现在优化器可以在子分区级别进行进一步的消除。但请注意，在我们的例子中，对于当前年份和前一年中任何超过\
    \ 500 美元的订单，优化器无法消除任何子分区，因此它实际上必须处理 12 个较小的索引扫描，而不是一个大的扫描。这可能更慢，所以再次强调，要明智选择。\n\
    \n为了演示分区能提供什么样的性能提升，现在请看图`7-5`。该图显示了针对一个 300GB 数据库运行 22 个 TPC-H 查询所需的时间，对比了非分区实现与分区实现（其中\
    \ `ORDERS` 和 `LINEITEM` 表已分区）。具体的分区方案没有详细说明，因为关于最佳方式确实没有一个普遍的答案。您应该根据许多因素进行分区，包括存储子系统的带宽和能力。还要注意，这种仅为\
    \ 22 个查询的总运行时间评分的简单方法并不是对 TPC-H 基准测试进行评分的正确方式，但对于此目的来说，它是合理且足够的。对于我的数据库服务器、数据库版本和配置，性能提升了`35.93%`。您的结果可能会有所不同。\n\
    \n![../images/464117_1_En_7_Chapter/464117_1_En_7_Fig5_HTML.png](img/464117_1_En_7_Fig5_HTML.png)\n\
    图 7-5：分区带来的 TPC-H 改进\n\n## 高级数据压缩\n\n尽管过去几年磁盘空间的每 GB 成本已大幅下降，但数据压缩仍能从某些方面使数据库性能受益。借助能够大幅缩减数据的高级数据压缩，压缩和解压缩数据的成本可以被读写更少数据所带来的收益所抵消。此外，数据在数据库的数据缓存中占用的空间更小，因此缓存本质上表现得如同更大（即，拥有更多内存）。另外，如果您的存储是通过\
    \ Infiniband、以太网或光纤通道传输数据的 SAN 或 NAS，那么需要传输的数据量也会减少。所有这些优势有时可以累积成显著的性能提升。但与分区一样，您需要明智地选择何时使用压缩（特别是如果它还需要额外成本的话）。\n\
    \n为了演示压缩能带来什么样的改进，现在请看图`7-6`。该图显示了针对一个 300GB 数据库运行 22 个 TPC-H 查询所需的时间，对比了非压缩实现与压缩实现（其中\
    \ `ORDERS` 和 `LINEITEM` 表已压缩）。请注意，不同的数据库提供差异很大的不同压缩选项。但压缩选项通常分为三大类：\n\n![../images/464117_1_En_7_Chapter/464117_1_En_7_Fig6_HTML.png](img/464117_1_En_7_Fig6_HTML.png)\n\
    图 7-6：压缩带来的 TPC-H 改进\n\n*   未压缩 vs. 压缩（简单的二进制选项）\n*   页级压缩 vs. 行级压缩\n*   多级压缩层次：\n\
    \    *   基础表压缩\n    *   高级行压缩\n    *   混合列式压缩 - 低\n    *   混合列式压缩 - 高\n\n请记住，这种仅为\
    \ 22 个查询的总运行时间评分的简单方法并不是对 TPC-H 基准测试进行评分的正确方式，但对于此目的来说，它是合理且足够的。对于我的数据库服务器、数据库版本和配置，性能提升了`19.92%`。如前所述，与分区一样，您的压缩效果也会有所不同。\n\
    \n现在，并非本章介绍的每一个高级数据库功能都能轻易组合以获得累积的正面收益；然而，根据您的数据库平台，分区和压缩通常可以结合使用。此外，我们必须现实地看待我们的性能改进期望。图`7-7`显示了结合分区和压缩的净效果；性能提升了`46.04%`。请注意，性能提升并不像我们预期的那样具有累积性。虽然我们本可以预期\
    \ 36% + 20% 总共 56%，但我们只得到了 46%。原因很简单。同时实现多个功能带来的好处通常不会导致纯粹的加性改进，因为不同技术之间的复杂交互往往会相互扭曲。而且，可实现的改进是有限的。正如俗话所说，“你无法从芜菁中榨出血来”。\n\
    \n![../images/464117_1_En_7_Chapter/464117_1_En_7_Fig7_HTML.png](img/464117_1_En_7_Fig7_HTML.png)\n\
    图 7-7：分区与压缩共同带来的 TPC-H 改进\n"
- fmt: '## SSD to Extend Memory


    Several database vendors offer an interesting and unique feature whereby the DBA
    can mount a flash disk or SSD as an extension of the database’s RAM data cache.
    Of course, the flash disk or SSD will operate slower than standard RAM memory,
    but basically the entire flash disk or SSD becomes second-tier memory for the
    database’s RAM data cache. There are two reasons this feature is very appealing.
    First, it’s free (no added cost). Second, it’s quick and easy to implement. Oracle
    calls this feature the `Database Smart Flash Cache` (not to be confused with Oracle
    Exadata’s Smart Flash Cache). Microsoft SQL Server has a similar feature known
    as `Buffer Pool Extensions`. They both essentially do the exact same thing.


    To demonstrate an example of what performance extending the memory via a flash
    disk or SSD can provide, look now at Figure 7-8. The graph shows the time to run
    the 22 TPC-H queries against a 300GB database for a RAM-only database data cache
    setup vs. extending that RAM via a 64GB SSD disk. For my database server, database
    version, and configuration, the performance improvement was only 10.33%. You may
    wonder why this feature did not score better. There are several plausible reasons.
    First, the TPC-H queries tend to apply aggregate functions to very large collections
    of row data. So the cache tends to be overwhelmed. Second, there may be a point
    at which adding slower flash disk or SSD to the cache backfires. It’s possible
    that scanning of mixed speed technologies for matching cache blocks or pages becomes
    more of a detriment than improvement. I actually got better results with a smaller
    flash disk (16GB). But I cannot state for sure that always going with a smaller
    size will be best; it just happened that way during my testing circumstances.
    I also got better results using a PCIe NVME flash disk, but once again not enough
    to say for sure to universally condemn using SSD disks for cache extension. But
    common sense would reasonably suggest that at the same size, PCIe NVMe flash disks
    should always be the best SSD disks for the key reasons highlighted in the last
    chapter.


    ![../images/464117_1_En_7_Chapter/464117_1_En_7_Fig8_HTML.png](images/464117_1_En_7_Chapter/464117_1_En_7_Fig8_HTML.png)


    **Figure 7-8**

    TPC-H Improvments from SSD Extension


    ## Pinning Tables in Memory


    Some databases provide mechanisms to suggest or even enforce that certain tables
    and indexes should either be pinned in memory or be aged out ever so slowly as
    to effectively seem pinned. You may use syntax or commands such as:


    ```

    CREATE or ALTER TABLE ... CACHE

    ALTER object_name PIN | KEEP

    EXECUTE function PINTABLE | KEEP

    ```


    Another method is to allow the database data cache to be segregated into areas
    with different aging characteristics such as `KEEP` and `RECYCLE`. You then simply
    create or alter the objects to specify which of the different cache areas and
    thus aging characteristics to apply. The key thing to remember is that none of
    these are true methods for locking a table or index in memory (that’s another
    feature discussed later in this chapter).


    To demonstrate an example of what performance pinning objects in memory can provide,
    look now at Figure 7-9. The graph shows the time to run the 22 TPC-H queries against
    a 300GB database for non-pinned setup vs. one where the smaller, lookup tables
    and all indexes were pinned. For my database server, database version, and configuration,
    the performance improvement was only 16.02%. Once again you may have been expecting
    a greater improvement since pinning in memory should be really fast. But there
    are several reasons why this result makes sense. First, the database is really
    only attempting to pin the objects in memory or aging them out more slowly. So
    this is not a true in-memory solution. Second, the TPC-H queries tend to apply
    aggregate functions to very large collections of row data. So the cache tends
    to be overwhelmed no matter how hard you try to control it. Third, the selection
    of the proper objects and the aging characteristic to apply is difficult even
    for a schema with just eight tables (and their indexes).


    ![../images/464117_1_En_7_Chapter/464117_1_En_7_Fig9_HTML.png](images/464117_1_En_7_Chapter/464117_1_En_7_Fig9_HTML.png)


    **Figure 7-9**

    TPC-H Improvements from Pinning Objects


    ## Columnstore vs. Rowstore


    Traditionally relational databases such as `Oracle` and `SQL Server` were based
    upon relational algebra and relational calculus, plus they adhered to `Codd’s
    12 rules` for any relational database. Key to this was that data was both represented
    and stored as tuples or rows. For many traditional business applications such
    as OLTP, this paradigm worked well. However, as newer business database app needs
    such as data warehouses debuted, the relational model did not scale as well as
    expected. As a result, column-oriented databases debuted, with names such as `Vertica`,
    `Sybase IQ`, `Teradata`, `Greenplum`, and many others. These new column-oriented
    databases handled very large databases providing three major advantages:


    1.  Required less space (and compressed data far better)

    2.  Scaled from very large to extreme sizes much better

    3.  Reporting queries run much faster with far less IO


    As relational databases began to add non-relational type features over the years
    such as multi-valued columns and nested tables (both major no-no’s according to
    `Codd’s 12 rules`), the relational database vendors naturally wanted to incorporate
    and benefit from the column-oriented approach. Some of these vendors simply added
    columnstore options while others combined in-memory (next section) with columnstore.
    Figure 7-10 highlights the major differences between a table stored as rows vs.
    columns. Note that even though these are two radically different approaches, the
    `SQL` language to work with them is unchanged. The database optimizer and engine
    simply can internally perform some query operations much faster when working with
    column-oriented data. The common example is when performing a `group` function
    on a column that’s in a very large table.


    ![../images/464117_1_En_7_Chapter/464117_1_En_7_Fig10_HTML.jpg](images/464117_1_En_7_Chapter/464117_1_En_7_Fig10_HTML.jpg)


    **Figure 7-10**

    Row Store Disk Layout vs. Column Store


    To demonstrate an example what performance a column-oriented approach can provide,
    look now at Figure 7-11. The graph shows the time to run the 22 TPC-H queries
    against a 300GB database saved as rowstore vs. columnstore. For my database server,
    database version, and configuration, the performance improvement was an amazing
    67.48%! That’s pretty darned good considering that some of the TPC-H queries don’t
    perform operations that benefit most from columnstore format. The database also
    required about 60% less disk space (without specifying additional advanced compression
    options).


    ![../images/464117_1_En_7_Chapter/464117_1_En_7_Fig11_HTML.png](images/464117_1_En_7_Chapter/464117_1_En_7_Fig11_HTML.png)


    **Figure 7-11**

    TPC-H Improvements from Rowstore Format'
