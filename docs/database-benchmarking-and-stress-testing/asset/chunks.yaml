    这一次，网站和规范定义都提供了足够的信息来了解基准的基本要点。然而，这里有一个更全面、因此更有用的定义：


    > *`TPC-H` 是一组 22 个非常复杂的 `SQL` 查询，典型于支持 `OLTP` 系统的报表数据库。这些查询旨在模仿最终用户通过商业智能工具提交的即席数据分析查询，以回答关键的业务问题。*


    请注意它**没有**说明的是：`TPC-H` 不是一个星型模式设计的数据仓库（那是接下来要介绍的 `TPC-DS`）。当您检查图 **2-4** 中显示的
    `TPC-H` 数据模型时，您会看到它实际上是另一个简单化的数据库设计，很像 `TPC-C`。


    ![../images/464117_1_En_2_Chapter/464117_1_En_2_Fig4_HTML.jpg](img/464117_1_En_2_Fig4_HTML.jpg)


