  trans: "\n## 所有必备工具\n\n在第 1 章中，我将数据库基准测试比作心脏压力测试。那是一个通常由心脏病专家执行的流程：医生将你连接到心脏监护仪上，让你在跑步机上快步走或跑步一段时间。医生的目标是\
    \ \"*让你的心率上升*\" 和 \"*让你出汗*\"。每当讨论成功执行数据库基准测试所需条件时，我都喜欢参考此处展示的图 5-1。\n\n![../images/464117_1_En_5_Chapter/464117_1_En_5_Fig1_HTML.jpg](img/464117_1_En_5_Fig1_HTML.jpg)\n\
    \n图 5-1：基准测试如同心脏压力测试\n\n对于心脏压力测试，有医生、心电图监护仪、跑步机和病人。同样，数据库基准测试有数据库专家（通常是 DBA）、数据库监控工具、他们的数据库以及数据库基准测试软件。对于心脏压力测试，医生将决定跑步机的倾斜度、速度、持续时间、监测内容、诊断方法、治疗方案等等。同样，数据库专家将选择基准测试、其数据库大小、用户数量、持续时间等等。看起来很简单——对吧？\n\
    \n在我协助数据库基准测试项目时遇到的一个反复出现的主要问题是，数据库专家（或者如果没有指派专家，则是非专家）错误地假设基准测试工具将监控数据库、报告问题并提出建议。我必须提醒他们，基准测试工具只是跑步机。它唯一的工作就是给数据库施加压力让它“出汗”。至于他们为何期望数据库基准测试工具能完成所有工作，对我来说是个谜。我猜这只是一厢情愿的想法，但在我协助的项目中，大约有\
    \ 25% 都存在这种情况。通常这是我加入项目后需要解决的第一个问题。最后请记住，大多数数据库监控工具只显示症状，它们不会提供纠正措施的建议。即使它们提供，这些建议通常也相当笼统，并非专门针对您的硬件和工作负载进行调优。\n\
    \n## 没有“大红简单”按钮\n\n这最后一个问题——期望数据库基准测试工具完成一切——实际上只是我常称之为 \"*寻找大红简单按钮*\" 这种致命问题的一个症状。因此，我向人们展示图\
    \ 5-2，试图解释：尽管办公用品商店 Staples 可能宣传他们让一切订购变得非常简单，展示着那个大红简单按钮，但在执行数据库基准测试时，实际上并没有这种东西。没有任何基准测试工具是一站式提供大红简单按钮体验的全能解决方案。令人惊讶的是，这似乎让大多数人感到震惊。无论你如何分析，数据库基准测试都是艰苦的工作。这个事实根本无法绕过。\n\
    \n![../images/464117_1_En_5_Chapter/464117_1_En_5_Fig2_HTML.jpg](img/464117_1_En_5_Fig2_HTML.jpg)\n\
    \n图 5-2：Staples 办公用品商店的大红简单按钮\n\n大多数数据库基准测试工具的工作方式相当类似，因此大多数数据库基准测试工作也以大致相同的方式进行。因此，让我们研究一下，无论使用何种数据库基准测试工具，任何成功的数据库基准测试工作为了达到预期结果，必须完整执行的基本步骤。理解这些步骤将有助于更好地解释\
    \ \"*没有大红简单按钮*\" 的含义！\n\n1.  配置和优化独立的网段。\n2.  配置和优化服务器硬件。\n3.  安装和优化服务器操作系统。\n\
    4.  安装和优化数据库软件（例如 Oracle、SQL Server、PostgreSQL、MySQL 等）。\n5.  创建和优化 \"TEST\" 数据库。\n\
    6.  创建用户或模式来拥有基准测试的数据库对象（即表和索引）。\n7.  **创建并加载基准数据库对象至其初始、工作负载前的状态（显然要删除任何预先存在的数据库对象）。**\n\
    8.  **按照规范运行基准测试工作负载或事务（在大多数情况下会更改数据，因此如果再次运行需要重新加载）。**\n9.  监控工作负载下的数据库性能，诊断问题，然后进行优化。\n\
    10. 重复步骤 7、8、9 和 10，直到满意为止（即结果接近或匹配预期）。\n\n在这个过度简化的 10 步流程中，基准测试工具最多只能真正自动化步骤\
    \ 7 和 8（上面已加粗标出）。同时请注意，这些步骤本质上效率低下，因为执行迭代（这是一种最佳实践且非常普遍）要求数据库基准测试工具每次都重新加载所有数据。对于一个\
    \ 30TB 的 TPC-H 来说，这可能需要一周时间！所以一定有更好、更高效的方法。我建议用以下分解步骤替换步骤 6、7 和 8。\n\n*   创建两个数据库模式：\n\
    \    *   SCHEMA-1 用于保存由基准测试工具创建的 \"*默认*\" 数据库对象的静态副本，不允许进行任何结构性优化\n    *   SCHEMA-2\
    \ 用于保存为执行迭代准备的、经过结构优化的数据库对象副本\n*   为所需规模的基准测试创建数据库基准测试工具的标准项目定义。\n*   将标准基准测试工具项目分成两个不同的阶段：\n\
    \    *   PHASE-1 用于创建数据库对象并将数据加载到 SCHEMA-1\n    *   PHASE-2 将所有数据从 SCHEMA-1 复制到\
    \ SCHEMA-2，并运行下一次迭代的执行\n*   运行 PHASE-1。\n*   备份或导出 SCHEMA-1（以防任何意外故障）。\n*   手动编写一个\
    \ SQL 脚本来创建优化后的数据库对象副本，并使用 \"create table as select\"（CTAS）进行加载（在数据库服务器上运行，因此速度非常快）。\n\
    *   手动将 CTAS SQL 脚本添加到 PHASE-2 中，用于从 SCHEMA-1 复制到 SCHEMA-2，然后运行测试。\n*   运行 PHASE-2\
    \ 以根据需要多次执行测试。\n\n虽然这把简单的 10 步流程扩展到了 15 步，但它实际上使流程更易于理解（即分而治之），并且使重复测试执行的速度提高了几个数量级。另外，如果您想添加其他\
    \ SQL 脚本来收集统计信息和直方图，现在您有了适当的处理阶段划分和可以添加它们的位置。因此，正如您所看到的，“大红简单按钮”或简单基准测试的想法显然是错误的。数据库基准测试是艰苦的工作，需要注重细节以及手动工作来优化一个原本效率不高的过程。\n"
- fmt: '## Proper Tool Deployment


    While most of the database benchmarking tools are easy to download, install, and
    run, they also often have far more complex deployment methods that few users research
    or utilize. Failure to understand and leverage such deployment models can radically
    skew results or even result in failed benchmark testing overall. Suppose you want
    to run a `TPC-C` with 10,000 concurrent users. Do you really think your lone desktop
    or laptop PC can send that much traffic to your database server? Even if you say
    yes, what about network bandwidth? There’s only so much traffic a single gigabit
    Ethernet card can process. While the test might run to conclusion without error,
    does that really represent what the database server could have really achieved?
    Yet many people do just this and wonder why the results are not repeatable nor
    as good as they had expected.


    Let’s examine a typical client/server type deployment model that many database
    benchmarking tools provide to accommodate running such workloads. For this demonstration
    I’ll use Quest Software’s `Benchmark Factory (BMF)`. Instead of just installing
    and running `BMF` on a lone computer, you can deploy `BMF` agents on other servers
    to construct a distributed architecture such as the one shown in Figure [5-3](#464117_1_En_5_Chapter.xhtml#Fig3).


    ![../images/464117_1_En_5_Chapter/464117_1_En_5_Fig3_HTML.jpg](images/464117_1_En_5_Chapter/464117_1_En_5_Fig3_HTML.jpg)


    Figure 5-3


    Benchmark Factory Distributed Architecture


    The central concept is that the desktop or laptop PC simply runs the central control
    console, not the actual database user sessions requesting work from the database
    server. There are two main advantages to this approach of distributing the agents.
    First, the user sessions and their workloads can be spread across many servers,
    and therefore across many CPU’s and memory. Second, the agent servers can be in
    the server room with high-speed network connections to the database server such
    that network bandwidth and latency don’t skew the performance results. I’ve worked
    on benchmarking projects where we had as many as 120 agents for a given benchmark
    test run. This is really the only reliable way to run such large tests. Note that
    while some tools such as `BMF` provide an automatic mechanism to automatically
    deploy the agents from the console, other tools require installing the software
    and then manually linking them up by their network IP address. That might provide
    sufficient reason to justify the extra cost of a commercial tool like `BMF`.


    ## Unexpected Human Factors


    I am going to keep this section very brief since I don’t want to sound like an
    evangelist on a soapbox. But nonetheless you need to at least be aware of the
    possibility that factors other than simple database performance may be the true
    agenda for benchmarking. Knowing this agenda can sometimes steer the effort in
    a direction that best suits reaching the necessary results.


    If those requesting or performing the database benchmark have already made up
    their minds, then the benchmarking itself effort may well just be a “*checklist*”
    item to cross off on the way to some presupposed conclusion. This is quite simply
    human nature. It’s neither wrong nor avoidable. Being aware of these kinds of
    human factors can help to achieve real success.


    ### Validate Our Direction


    Suppose your management says, “We’re moving to the cloud, so you need to provide
    benchmark results showing that the performance is comparable or better to complement
    the cost savings argument.” So why test? All the cloud vendors offer numerous
    virtual machine configurations (e.g., general purpose, memory intensive, CPU intensive,
    IO intensive, etc.), plus offer scalable CPU and memory resource allocations for
    each configuration type. Possibly what management is really asking for is what’s
    the right-sized cloud virtual machine image that can deliver all the required,
    key performance metrics. That radically changes the scope of the benchmarking
    project, because now you need to both provide a recommendation and its performance.
    But this type of clarification often does not become clear until the benchmarking
    project is underway.


    ### Self-Fulfilling Prophecy


    Now instead suppose your management says, “We’re replacing our Oracle SPARC/Solaris
    servers with Intel/Linux servers, so you need to provide benchmark results showing
    that the performance is comparable or better to complement the cost savings argument.”
    But there’s a major wrinkle/issue embedded in this simple statement. What if many
    of the DBA’s for current Oracle databases on SPARC/Solaris who end up performing
    this database benchmarking are not happy about the move? Don’t laugh, it happened
    on a major benchmarking project that I was involved with. There simply was no
    convincing those DBA’s that the new Intel/Linux servers could ever measure up.
    I won’t say that sabotage occurred, but I can say what should have been an easy
    effort was not and took far longer than planned. Once again, you may well not
    spot such issues until the benchmarking project is underway.


    ## Top Ten Benchmarking Misconceptions


    I have great respect for the science of database benchmarking and all those who
    practice it. Yet it’s not a science that lends itself to novice or ignorant attempts
    without proper preparation and all the necessary tools. However, whenever I join
    a benchmarking effort already underway and who has encountered issues, I find
    some common missteps. Below are the top 10 misconceptions that I encounter on
    a regular basis (some of which have been mentioned in earlier chapters).


    ### #1: I’m using a tool like Quest’s `Benchmark Factory`, so that’s all I need


    Wrong. I highly recommend that anyone doing benchmarking read the specs for whatever
    industry standard tests they are going to perform. This is because software to
    automate these tests will ask questions or present options that you cannot really
    define unless you understand their context, which is defined in the spec.


    For example, the highly popular “OLTP” test known as the “`TPC-C Benchmark`” ([`http://tpc.org/tpcc/spec/tpcc_current.pdf`](http://tpc.org/tpcc/spec/tpcc_current.pdf))
    defines “scale” factor as follows:


    > `Section 4.2.1:` *The WAREHOUSE table is used as the base unit of scaling. The
    cardinality of all other tables (except for ITEM) is a function of the number
    of configured warehouses (i.e., cardinality of the WAREHOUSE table). This number,
    in turn, determines the load applied to the system under test which results in
    a reported throughput (see Clause 5.4).*


    > `Section 4.2.2:` *For each active warehouse* *in the database, the SUT must
    accept requests for* *transactions from a population of 10 terminals.*


    So when a tool like `Benchmark Factory` asks for the scale factor, it does NOT
    mean the number of concurrent users – but rather the number of warehouses. So
    a scaling factor of 300 means 300 warehouses, and therefore up to 3,000 concurrent
    users.


    This requirement to read the spec is critical. It will be an underlying issue
    for every remaining misconception and problem that I’ll mention below.'
