    benchmark in this chapter.'
  trans: '## 整合方法


    在执行数据库整合时，首先必须决定的是，将采用何种方法或途径来实现整合。因此，让我们先设想一下需要整合的数据库。假设我们有六个数据库，分布在三个实例中，而这三个实例位于三台不同的服务器上，如图
    8-1 所示。这是一个非常简单但又常见的场景。你可能拥有远不止三台服务器，但本质上问题完全相同，只是规模更大。请注意，在图 8-1 中，我们起始于三台独立的物理数据库服务器，因为这些是多年前在虚拟化和云技术出现之前部署的遗留数据库。那么，我们有哪些选择呢？


    ![../images/464117_1_En_8_Chapter/464117_1_En_8_Fig1_HTML.png](img/464117_1_En_8_Fig1_HTML.png)

    *图 8-1：待整合的数据库实例*


    第一种选择是购买一台大型物理服务器，运行一个数据库实例，并将所有六个数据库放置在该服务器上，如图 8-2 所示。我展示这个选项主要是因为它简单，也是过去人们会采用的方式。但请记住，如今大多数数据库实例都是在虚拟机管理程序上作为虚拟机运行，而不是在专用服务器上。因此，我并不是在推荐图
    8-2 中的解决方案，而是出于遗留原因展示它，并且因为它从概念上或逻辑上展示了期望的最终结果（即所有六个数据库都在单个实例和数据库许可之下，以降低许可成本）。这种方法有点契合那句著名的三剑客格言：“人人为我，我为人人。”


    ![../images/464117_1_En_8_Chapter/464117_1_En_8_Fig2_HTML.png](img/464117_1_En_8_Fig2_HTML.png)

    *图 8-2：整合到物理服务器上*


    因此，如今随着虚拟化技术的广泛普及，我们更可能将图 8-2 转变为本质上相同的基本设计，但作为虚拟机运行，如图 8-3 所示。现在你可能在想，最后这两个例子是显而易见的，因此有些多余。但图
    8-3 为我们将在本章以及接下来两章讨论虚拟化数据库和云中的数据库奠定了基础。因此，图 8-3 应当被注意并记住。


    ![../images/464117_1_En_8_Chapter/464117_1_En_8_Fig3_HTML.png](img/464117_1_En_8_Fig3_HTML.png)

    *图 8-3：整合到单个虚拟机上*


    现实情况是，由于任何真实世界的应用程序几乎普遍需要数据库，而这正导致了整合试图纠正的数据库蔓延问题，因此将会存在太多的数据库，无法整合成图 8-2 中的单个服务器或图
    8-3 中的单个虚拟机。你需要确定合适的拆分点，使尽可能多的数据库能够共存，从而导致最少数量的物理服务器或虚拟机。假设采用虚拟化技术，并以此为基础（基于图
    8-3），我们的首要目标必须是确定合适的实例和虚拟机数量，假设一台无限可扩展的服务器能够处理全部负载，从而形成图 8-4 所示的架构。我们将这第一步作为“*分而治之策略*”，这样一旦我们知道合适的虚拟机总数，接下来就可以确定托管这些虚拟机的物理服务器的合适数量。换一种说法，从科学角度看，我们是在有意识地限制所考虑的变量数量，以确保不会给结论引入不确定性。


    ![../images/464117_1_En_8_Chapter/464117_1_En_8_Fig4_HTML.png](img/464117_1_En_8_Fig4_HTML.png)

    *图 8-4：整合到多个虚拟机上*


    一旦我们知道了哪些数据库可以因为它们的工作负载合理兼容（意味着它们的净请求累积起来不会过度压垮可用资源）而在单个虚拟机上和平共存，我们就可以查看每台虚拟机及其数据库集合需要多少台什么规模的物理服务器。此外，我们可以确定一台服务器是否可以托管多个虚拟机。例如，在图
    8-4 中，如果我们知道虚拟机 #1 及其数据库需要 `2X` 的资源，而虚拟机 #2 需要 `3X` 的资源，那么我们就需要一台具有 `5X` 资源的服务器，或者用独立的物理服务器来托管它们。这就是我们将在本章中尝试进行基准测试的内容。'
- fmt: '## Database Coexistence


    The first step is to find which currently separate database instances and their
    databases can coexist on a single virtual machine. Let’s assume that the current
    separation across physical servers is correct or at least is justifiable based
    upon compatible workloads. Then what we are trying to discover is using Figure
    [8-1](#464117_1_En_8_Chapter.xhtml#Fig1), can we combine physical servers #1 and
    #2 along with their two instances and four databases? To accomplish this, we need
    to benchmark as shown in Figure [8-5](#464117_1_En_8_Chapter.xhtml#Fig5).


    This diagram is rather complex, so let’s examine the three major pieces. The bottom
    portion of this figure coincides with the left half of Figure [8-4](#464117_1_En_8_Chapter.xhtml#Fig4),
    finding the databases that can coexist on one virtual machine. The top portion
    of this figure represents the desktop or laptop PC where you have installed database
    benchmarking software for running the central command console. The middle portion
    of the figure represents the agent or agents required for each currently running
    instance of the benchmarking central command console.


    None of the currently available benchmarking tools offers the ability to easily
    run multiple tests at the same time, at least not easily nor reliably. So if we
    need to run two concurrent database benchmarking workloads in order to correctly
    simulate the applications previously hitting separate physical servers, then we’ll
    need to run two separate benchmarking consoles. Furthermore, based upon the benchmark
    scale factor and number of concurrent users’ sessions, each central console may
    require multiple benchmarking agents to run the cumulative workload. In fact,
    you may even need to spread the agents across virtual machines and possibly across
    physical servers in order to handle the resources required to run the entire benchmark
    workload.


    ![../images/464117_1_En_8_Chapter/464117_1_En_8_Fig5_HTML.png](images/464117_1_En_8_Chapter/464117_1_En_8_Fig5_HTML.png)


    **Figure 8-5** Benchmarking Setup for Consolidation


    There are a couple of management issues required by the architecture shown in
    Figure [8-5](#464117_1_En_8_Chapter.xhtml#Fig5) that are probably not readily
    obvious.


    First, you will need to manually coordinate all the efforts across two separate
    benchmarking consoles. There will not be any automatic or synchronized start and
    stop for the running of database benchmarks.


    Second, all the logging for warnings or errors and for runtime performance results
    will be separate and non-correlated. So once again there will be manual efforts
    required to dissect and divide what you have learned for a given benchmark test.


    Third, you are probably going to need additional physical servers and virtual
    machines than originally considered, so there may be both measurable time and
    effort required to assemble the proper database benchmarking architecture as shown
    in Figure [8-5](#464117_1_En_8_Chapter.xhtml#Fig5). For example, I worked on one
    project where we required 300 separate agents across over 100 virtual machines
    and a dozen physical servers in order to generate the proper workload to adequately
    stress the candidate, consolidated databases. So plan accordingly.


    ## Unforeseen Issues


    When attempting to combine database instances and their databases, some unforeseen
    issues can arise.


    Imagine the DBA starts by setting an instance configuration setting by simply
    adding that setting from the two instances. So, for example, if instance #1 required
    100GB of memory and instance #2 required 50GB or memory, the DBA might configure
    the single consolidated instance at 150GB of memory. However, it’s been my painful
    experience that nothing in life, especially not database instance configuration
    parameters, is quite that easy. You’re going to need to do your homework, most
    likely reviewing all the key database instance configuration parameters. It’s
    possible, depending upon your database platform, that the proper, net setting
    could be either more or less than the simple sum of the values. In some cases,
    such as when the value should have been larger than the sum, it could well skew
    the database benchmarking results.


    Another issues that often rears its ugly head is the storage situation. We have
    been focusing on server consolidation without regard to the IO, yet we all know
    that the Achilles’ heel of any database is physical disk IO. The key issue, assuming
    that the storage arrays and LUN’s remain the same is IO bandwidth. Can the virtualization
    server running the hypervisor offer at least the maximum net IO throughput required
    by all the consolidated databases, with extra being desirable for atypical peak
    loads?


    We’ll cover some specific issues pertinent to achieving this goal in the next
    chapter on benchmarking virtualized databases. For now it’s just a noteworthy
    item for consideration when consolidating. The basic question for now is does
    physical server #1 possess a sufficient number of host bus adapters (HBAs) or
    network interface cards (NICs) with proper multi-path configurations in order
    to handle at least two times the probable maximum concurrent IO requests? If not,
    then it’s very likely that such an IO bottleneck will occur during database benchmarking
    efforts since the scale and concurrent user sessions will be purposefully specified
    to stress the maximums. The result will of course be inaccurate results. So make
    sure to check the IO bandwidth.


    ## Server Distribution


    Once you establish which database instances and all their databases can be consolidated,
    the next logical question is which, if any, aggregated instances can be combined
    on the same physical or virtualization server?


    Let’s assume that you are either virtualized or in the cloud, then the importance
    of this issue is greatly reduced because these instances can either be relocated
    or their virtual machines augmented as needed. For example (returning to Figure
    [8-4](#464117_1_En_8_Chapter.xhtml#Fig4)), if we know that virtual machine #1
    with its instance and four databases requires 5X resources (as calculated earlier
    in this chapter), and then we next determine that instance #2 and its two databases
    require 4X resources, then we know that we need a physical server that can provide
    at least 9X resources.


    But once again we need to consider intangible issues in consolidating, which might
    tend to skew the simple calculations performed in isolation. What I am suggesting
    is that if the calculation yields 9X, that interpreting that to mean 10X or slightly
    larger when combined will be the safe bet. Again, this may appear like a lazy
    oversimplification, but with dynamic virtualization VM relocation and the cloud
    offering resizable VM sizings that cover a wide spectrum of possibilities, the
    need to nail this one is far less important than the simple consolidation step.'
