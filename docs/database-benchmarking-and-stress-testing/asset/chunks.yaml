- fmt: '# HammerDB


    ## 简介与资源


    One of the best known and most popular database benchmarking tools that works
    with multiple database platforms is HammerDB, formerly known as HammerORA from
    when it was an Oracle-only tool. I have used this tool for many years and believe
    it to be among the best database benchmarking tools for those wishing to quickly
    execute and score an industry-standard database benchmark, especially for those
    who do so only infrequently and thus are not database benchmarking experts. While
    HammerDB’s graphical user interface (GUI) takes a little getting used to, the
    workflow is simple enough for most to get through without having to read the documentation.


    HammerDB is an open source database benchmarking tool for Oracle, SQL Server,
    DB2, TimesTen, MySQL, MariaDB, PostgreSQL, Greenplum, Postgres Plus Advanced Server,
    Redis, Amazon Aurora and Redshift, and Trafodion SQL on Hadoop. You will find
    HammerDB’s web page, source forge project, and Git source code version control
    repository at the following URLs respectively.


    *   `http://www.hammerdb.com`

    *   `https://sourceforge.net/projects/hammerora`

    *   `https://sourceforge.net/p/hammerora/code/ci/master/tree/`


    ## 安装与启动


    HammerDB offers both Windows and Linux versions for both 32-bit and 64-bit platforms.
    The current 2.23 version debuted in June of 2017, so it’s due for an update as
    it historically has had one or two a year. When you run the installer on Windows,
    it will install the software under the `C:\Program Files` or `C:\program Files
    (x86)` directory as you would expect (based upon the bit size of the version being
    installed). Then to run the software, you just double-click on the `hammerdb.bat`
    file. When you run the installer on Linux it installs in the `~/` or `$HOME` directory.
    Then to run the software you just double-click on the `hammerdb.tcl` file. When
    the HammerDB software launches, it displays the screen shown in Figure 3-8.


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig8_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig8_HTML.jpg)

    *Figure 3-8 HammerDB Program Launch*


    By default, HammerDB assumes that you want to perform a TPC-C benchmark against
    an Oracle database. These default settings are contained in an XML file named
    `config.xml` in the HammerDB base install directory. We’ll look at modifying this
    configuration file later, after we get a better feel for the various kinds of
    options and settings that are available. Let’s assume for now that we simply want
    to instead perform a TPC-H benchmark for an SQL Server database. For that we would
    simply choose the Main Menu ➤ Options to get the pop-up window shown in Figure
    3-9. Then we’d simply select SQL Server as the database and TPC-H as the benchmark.
    Note as well that while HammerDB offers many database platforms, it currently
    offers just the two industry-standard database benchmarks, the TPC-C and TPC-H.
    However, the website FAQ states that the TPC-E is on their roadmap and planned
    for a future version.


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig9_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig9_HTML.jpg)

    *Figure 3-9 HammerDB Select Database and Benchmark*


    ## 执行基准测试的流程


    Now that we have our database platform and benchmark selected, it’s time to dive
    into the four steps for successfully running a database benchmark test using HammerDB:


    1.  Build the database schema objects and load the data.

    2.  Load the driver script whose code implements the selected database benchmark.

    3.  Create all the concurrent virtual user sessions that will run the selected
    database benchmark’s workload.

    4.  Initiate all the concurrent virtual user sessions to now run the selected
    database benchmark’s workload.


    ### 步骤一：构建数据库对象


    So we begin by expanding the “Schema Build” tree-view node and then double-clicking
    on the “Options” node, which launches the benchmark schema build options as shown
    in Figure 3-10.


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig10_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig10_HTML.jpg)

    *Figure 3-10 HammerDB Schema Build Options*


    Here we simply define the database connection criteria, which database to create
    the objects in, the maximum degree of parallelism (`MAXDOP`), and the scale factor
    for the database benchmark (remember it was explained in Chapter 2 that for the
    TPC-H, each scale factor equates to about one gigabyte). Had we instead chosen
    to run the TPC-H database benchmark on Oracle, then the fields presented on this
    screen would have been slightly different as shown in Figure 3-11. While this
    screen can vary by database platform, most database administrators will find all
    of the requested information fairly obvious.


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig11_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig11_HTML.jpg)

    *Figure 3-11 HammerDB Oracle Build Options for Oracle*


    With the schema build options now selected, it’s time to simply initiate the build
    process controlled by those selected options. For that we again look under “Schema
    Build” tree-view node, but now double-click on the “Build” node, which launches
    the benchmark schema build (and load) execution as shown in Figure 3-12.


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig12_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig12_HTML.jpg)

    *Figure 3-12 Initiate Building & Loading Database Objects*


    Before choosing “Yes” and actually creating and loading the database benchmark
    objects, it’s important to revisit the build options and focus on the two numbers
    highlighted near the bottom of the screen as shown in Figure 3-13. These are the
    “Scale Factor” and “Virtual Users to Build Schema” settings.


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig13_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig13_HTML.jpg)

    *Figure 3-13 Critical Build Schema Options*


    The scale factor is simply the size of the database to create, and for the TPC-H
    it’s about one gigabyte per scale factor. For simple laptop or desktop computer
    tests for the limited purpose of learning a small-scale factor is OK. However,
    most database benchmarking experts argue that only scale factors of at least 100
    GB’s are noteworthy. In fact most published results are for either 300 GB’s or
    1 TB. As you increase the scale factor you will definitely want to spawn additional
    concurrent sessions to load that data; therefore you’ll want to specify at least
    four sessions (depending of course on you database server and its IO bandwidth).
    Please note in Figure 3-13 the scale factor is set to 10 GB and 4 concurrent sessions
    to load the data. The second number, the number of concurrent sessions to build
    the schema, will directly affect the build process run time and how it’s displayed
    during execution.


    Now that we’ve revisited these TWO critical value settings, it’s OK to initiate
    the creation process by choosing yes in Figure 3-12. This will result in display
    of the build logging window as show in Figure 3-14. This window is a little complicated
    and thus deserves a detailed review.


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig14_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig14_HTML.jpg)

    *Figure 3-14 Critical Build Schema Options*'
