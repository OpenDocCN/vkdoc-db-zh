- fmt: '### Wisconsin


    The Wisconsin benchmark is one of the oldest industry standard database benchmarks.
    It came into existence circa 1981, around the time that new SQL-based relational
    databases were coming onto the scene. I include the Wisconsin benchmark in this
    book because of its significant historical relevance. It came from a period when
    computers were anemic, disk space costs were high, and relational databases were
    just emerging. As such the Wisconsin’s schema has just three tables: one with
    just 1,000 rows and two with 10,000 rows each. The total database size was just
    5 megabytes. Moreover it contained a total of 32 SQL commands (26 inserts, 2 updates,
    2 deletes, and 2 selects). In those early days with new SQL database technology
    and limited computer resources this test was probably quite reasonable. But by
    today’s computing standards it’s simply far too anemic of a test to use for anything
    meaningful. However as one of the very earliest database benchmarks and a precursor
    to those that followed, it’s at least worth knowing about.


    ### AS³AP


    The ANSI SQL Standard Scalable and Portable (AS³AP) benchmark is another fairly
    old industry standard database benchmark. It came into existence circa 1984 and
    was in many respects an extension of the Wisconsin benchmark. I include it in
    this book because you can still find references to it and one of the database
    benchmarking tools still offers it. The AS³AP’s schema has just five tables: one
    with 1 column and 1 row, and four with from 10,000 to one billion rows each based
    on the scale factor. As such its total database size was from 4 megabytes to 400
    gigabytes (once again very small by today’s standards). You would choose the maximum
    scale factor that would complete the benchmark in 12 hours or less (with a goal
    being to run as close to 12 hours as possible). The benchmark consisted of both
    single and multi-user workloads, plus included all the time to create, load, and
    index the database. The only measurement required by this benchmark is total query
    elapsed time, within the 12-hour window limit.


    ## Obsolete Benchmarks


    ### TPC-A


    The TPC-A benchmark was the first official benchmark that spawned from the [tpc.org](http://tpc.org)
    effort. It was a first-generation OLTP database benchmark that strived to approximate
    a typical bank’s transaction workload with an emphasis on updates (since the workload
    is skewed and kept artificially simple as well, the TBC-A does not represent a
    true OLTP benchmark). The TPC-A had just four tables: ACCOUNT, BRANCH, TELLER,
    and HISTORY as shown in Figure [2-14](#464117_1_En_2_Chapter.xhtml#Fig14). For
    each branch you would have 10 tellers, 10 terminals, and 100,000 accounts. It
    originated in 1989 and was deemed obsolete by 1995.


    ![../images/464117_1_En_2_Chapter/464117_1_En_2_Fig14_HTML.jpg](images/464117_1_En_2_Chapter/464117_1_En_2_Fig14_HTML.jpg)


    Figure 2-14: TPC-A Data Model


    ### TPC-B


    The TPC-B benchmark is actually a database stress test (the difference in these
    terms was covered in Chapter [1](#464117_1_En_1_Chapter.xhtml)). It was specifically
    designed to be a stress test on the core portion of a database system (such as
    IO bandwidth and processing time). It is essentially the TPC-A having the same
    simple tables shown in Figure [2-14](#464117_1_En_2_Chapter.xhtml#Fig14) but with
    a radically different and artificial transaction workload. The TPC-B uses a single,
    simple, update-intensive transaction to stress the database. It stresses the memory
    and disk I/O subsystems by causing large amounts of small read and write jobs.
    It originated in 1990 and was deemed obsolete by 1995.


    ### TPC-D


    The TPC-D benchmark is the first intended for data warehouse type workloads. In
    many respects it was a precursor to the TPC-H benchmark (even having the same
    database design – refer back to Figure [2-4](#464117_1_En_2_Chapter.xhtml#Fig4)).
    The primary difference was that it had just 17 queries instead of 22. It originated
    in 1989 and was deemed obsolete by 1999.


    ### TPC-R


    The TPC-R benchmark is an unrestricted version of the TPC-H benchmark (same 22
    queries and same database design – refer back to Figure [2-4](#464117_1_En_2_Chapter.xhtml#Fig4)).
    The primary difference is it allowed for unrestricted indexing and partitioning
    in order to allow people to more fully leverage database features. It originated
    in 1999 and was deemed obsolete by 2005.


    ### TPC-W


    The TPC-W benchmark is arguably not even a real database benchmark, but rather
    a web application benchmark that includes a database. In fact the spec even allows
    replacing the database with any data store you like, even including a file system
    solution. The workload nature is that of an internet commerce environment that
    simulates activities of a business-oriented transactional web server. It originated
    in 2003 and was deemed obsolete by 2005. Shown in Figure [2-15](#464117_1_En_2_Chapter.xhtml#Fig15),
    it is included here only for completeness.


    ![../images/464117_1_En_2_Chapter/464117_1_En_2_Fig15_HTML.jpg](images/464117_1_En_2_Chapter/464117_1_En_2_Fig15_HTML.jpg)


    Figure 2-15: TPC-W Data Model


    ### Summary


    So many benchmarks, so little time! In this chapter we reviewed all the various
    database benchmarks, their origin, and their general purpose. The reason for spending
    an entire chapter on this history and context is to equip the reader to intelligently
    select from among the many benchmarks those that most align with their interests.
    Moreover, just enough information is provided to encourage the reader to seek
    out and read the chosen database benchmark’s specification document where far
    more detailed information is provided. For example, the TPC specs all include
    an appendix that details the SQL DDL to create all the database objects. So while
    this book can point the reader in a proper direction, only the actual spec can
    answer all questions. Therefore, they are must-read materials for success.'
