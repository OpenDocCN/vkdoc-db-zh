    DBBENCHMARK will create both a directory and a single zip file of that directory’s
    content, both using the following naming format:


    *   DBBENCHMARK_ + YYYY_MM_DD_ + HH.MM.SS


    There will be three types of files in that directory: SAR files per iteration,
    rollups of the key SAR data, and four GNU Plot JPEG files. Figure [12-1](#464117_1_En_12_Chapter.xhtml#Fig1)
    shows an example of this directory structure and file names.


    ![../images/464117_1_En_12_Chapter/464117_1_En_12_Fig1_HTML.jpg](images/464117_1_En_12_Chapter/464117_1_En_12_Fig1_HTML.jpg)


    Figure 12-1


    Example Output from DBBENCHMARK Run


    These log files contain lots of detailed monitoring information that is summarized
    by iteration for each of four major categories (CPU, RAM, IO, and run queues)
    at the end of utility’s text output as shown above. But if you’re anything like
    me, you really require a simple picture to more fully comprehend the true findings
    in the results. Thus, DBBENCHMARK can automatically actually plot all the key
    results for you in the JPEG files in this directory. The first JPEG file, shown
    in Figure [12-2](#464117_1_En_12_Chapter.xhtml#Fig2), shows the CPU usage. It’s
    clear that from a processor perspective, this database server can probably handle
    well over 100 concurrent users. CPU is not the bottleneck.


    ![../images/464117_1_En_12_Chapter/464117_1_En_12_Fig2_HTML.jpg](images/464117_1_En_12_Chapter/464117_1_En_12_Fig2_HTML.jpg)


    Figure 12-2


    DBBENCMARK Generated CPU Diagram


    The second JPEG file, shown in Figure [12-3](#464117_1_En_12_Chapter.xhtml#Fig3),
    shows the average run queue length – often a key metric for detecting an overloaded
    system. It’s clear that from a run queue perspective, this database server has
    room left. You often can scale up until the run queue depth averages consistently
    above four. So the run queue is not the bottleneck either.


    ![../images/464117_1_En_12_Chapter/464117_1_En_12_Fig3_HTML.jpg](images/464117_1_En_12_Chapter/464117_1_En_12_Fig3_HTML.jpg)


    Figure 12-3


    DBBENCMARK Generated RUN QUE Diagram


    The third JPEG file, shown in Figure [12-4](#464117_1_En_12_Chapter.xhtml#Fig4),
    shows the RAM usage. It’s clear that from a memory perspective, this database
    server is running right around the ideal 80% memory level, so it may well be a
    limiting factor far more than CPU. While I might not be able to allocate any additional
    memory to the database for caching, there seems to be sufficient memory for spawning
    OS sessions to run the command-line interface. But it’s probably true that memory
    will constrain the upper limit far more than CPU. So the memory is probably not
    the bottleneck either.


    ![../images/464117_1_En_12_Chapter/464117_1_En_12_Fig4_HTML.jpg](images/464117_1_En_12_Chapter/464117_1_En_12_Fig4_HTML.jpg)


    Figure 12-4


    DBBENCMARK Generated RAM Diagram


    The fourth JPEG file, shown in Figure [12-5](#464117_1_En_12_Chapter.xhtml#Fig5),
    shows the read and write transaction rates. It’s clear that from an IO perspective,
    this database server is again lightly loaded. An SSD disk should be able to handle
    lots more than six IO operations per second. So the IO also is not the bottleneck.


    ![../images/464117_1_En_12_Chapter/464117_1_En_12_Fig5_HTML.jpg](images/464117_1_En_12_Chapter/464117_1_En_12_Fig5_HTML.jpg)


    Figure 12-5


    DBBENCMARK Generated IO Diagram


    What these four diagrams tell me is that while I was afraid to run more than 10
    concurrent user sessions on this notebook computer, that in fact it can handle
    far more workload. In fact, I did not reach a maximum until I increased the parameters
    for sessions from 1 to 10 increment by 1, to 20 to 200 increment by 10\. That
    test range yielded that the greatest throughput or inflection point of diminishing
    results around 180 concurrent database sessions. While the IO and run queue lengths
    both maxed out – I was still under 20% CPU utilization. So even this modest notebook
    could scale even greater with additional SSD disks added to spread the IO load.'
