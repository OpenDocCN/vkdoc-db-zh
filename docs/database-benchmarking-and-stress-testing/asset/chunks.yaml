- fmt: "## When These Techniques Are Valuable\n\nImagine as the database administrator\
    \ your boss asks you, “What impact can we expect on our production database performance\
    \ if we were to”:\n\n*   Apply a major version upgrade to the operating system\
    \ and/or database?\n*   Migrate from proprietary UNIX on RISC CPUs to Linux on\
    \ Intel CISC CPUs?\n*   Choose among equivalently priced servers from Dell, HP,\
    \ and Lenovo?\n*   Migrate from a Windows Server to Linux, or vice versa?\n* \
    \  Migrate from raw iron to hypervisor?\n*   Migrate from commercial hypervisor\
    \ like VMware to open source such as KVM?\n*   Consolidate databases per instance?\n\
    *   Migrate from on premise to the cloud?\n*   Upgrade to the next cloud pricing\
    \ tier?\n\nThese are but just a few such questions. So how would you answer questions\
    \ like these? Even with 30+ years of database experience, I could only reasonably\
    \ provide my opinion on a few of these, and probably not for the contextual specifics\
    \ in play required to provide management with reliable recommendations. So in\
    \ such cases the experienced database administrator will perform some testing,\
    \ often labeled as a `proof of concept` (POC) project. It’s at that time when\
    \ you must decide whether you will perform just simple stress testing, database\
    \ benchmarking, or workload capture/replay.\n\nNow a logical pushback is often,\
    \ “We don’t make those types of decisions very often, so it’s not too important\
    \ or worth worrying about until and when we have such questions.” I really do\
    \ get it, database administrators are forever being asked and/or told to do more\
    \ with less. They simply do not have sufficient time or energy to master every\
    \ little technique. But if anything, the past decade has shown databases is that\
    \ where databases are deployed has evolved, first being virtualized and are now\
    \ moving to the cloud. So these types of questions and issues are happening far\
    \ more than in days past. In fact, it’s rare these days that database administrators\
    \ or data architects don’t fact such questions.\n\n## How to Choose Between These\
    \ Options\n\nSo now that we’ve examined both why and when these various techniques\
    \ are of importance, the remaining question is which one should you chose? As\
    \ with any big decision in life, the legitimate and unflippant answer is `It all\
    \ depends.` However I advocate that in many if not most cases, you should give\
    \ database benchmarking practical consideration. It is arguably quicker and more\
    \ reliable than creating a stress test script via ad hoc monitoring the database\
    \ to capture what you believe and hope is a truly representative workload. It\
    \ also does not require using real data that may be confidential and possibly\
    \ even illegal to copy into a test environment. Finally it does not add the extra\
    \ cost of a workload capture/replay tool and it too relies upon using real data.\n\
    \nYes you could argue that database benchmarking relies upon a synthetic workload.\
    \ However, numerous database benchmarks exist that approximate all of the various\
    \ workload types, including online transaction processing (OLTP); data warehousing\
    \ (DW) queries; batch processing systems; and user defined, weighted combinations\
    \ of all the above. So you really should be able to quickly and easily cobble\
    \ together a mixture of benchmark tests that meaningfully and acceptably approximate\
    \ your system. This will permit you to then focus on quickly and accurately comparing\
    \ `apples to apples` scenarios.\n\nAs for veteran database administrators, you\
    \ may already have a feel for what you would do or possibly even a preference\
    \ among the proposed choices. I will simply suggest that you read this book with\
    \ a fair and open mind that database benchmarking might very well augment your\
    \ existing repertoire. Remember what the Chinese philosopher Confucius said, “You\
    \ cannot open a book without learning something.”\n\nAs for more junior database\
    \ administrators or those simply unaccustomed to such tough `what if` database\
    \ performance questions, you may hope this book provides all the answers. However\
    \ no book could ever possess all of your experience and insights into your database\
    \ and its data. Thus I suggest that you read this book looking for a best fit\
    \ of your goals vs. the database context you’re working in. As Bill Nye the `Science\
    \ Guy` said, “Everyone you will ever meet knows something you don’t, and therefore\
    \ you should listen to others and “respect their knowledge.”\n\n## Where We Go\
    \ from Here\n\nAssuming that you now are far more accepting of the idea of database\
    \ benchmarking, you might well ask the following questions:\n\n*   `Chapter` [2](#464117_1_En_2_Chapter.xhtml)\n\
    \    *   What industry standard database benchmarks should I learn and use?\n\
    *   `Chapter` [3](#464117_1_En_3_Chapter.xhtml)\n    *   What software tools exist\
    \ to support varying database benchmarking efforts?\n*   `Chapter` [4](#464117_1_En_4_Chapter.xhtml)\n\
    \    *   How does one prepare for a real-world database benchmarking effort?\n\
    *   `Chapter` [5](#464117_1_En_5_Chapter.xhtml)\n    *   What common problems\
    \ or missteps occur during a database benchmarking effort?\n*   `Chapter` [6](#464117_1_En_6_Chapter.xhtml)\n\
    \    *   What hardware options are important during a database benchmarking effort?\n\
    *   `Chapter` [7](#464117_1_En_7_Chapter.xhtml)\n    *   What software options\
    \ are important during a database benchmarking effort?\n*   `Chapter` [8](#464117_1_En_8_Chapter.xhtml)\n\
    \    *   How does one effectively benchmark for database consolidation?\n*   `Chapter`\
    \ [9](#464117_1_En_9_Chapter.xhtml)\n    *   How does one effectively benchmark\
    \ for database virtualization?\n*   `Chapter` [10](#464117_1_En_10_Chapter.xhtml)\n\
    \    *   How does one effectively benchmark for databases in the public cloud?\n\
    *   `Chapter` [11](#464117_1_En_11_Chapter.xhtml)\n    *   How does one effectively\
    \ perform a database workload capture and replay?\n*   `Chapter` [12](#464117_1_En_12_Chapter.xhtml)\n\
    \    *   How does one effectively perform a simple database stress test?\n\nFootnotes\
    \ [1](#464117_1_En_1_Chapter.xhtml#Fn1_source)  [2](#464117_1_En_1_Chapter.xhtml#Fn2_source)\
    \  [3](#464117_1_En_1_Chapter.xhtml#Fn3_source)  [4](#464117_1_En_1_Chapter.xhtml#Fn4_source)\
    \  [5](#464117_1_En_1_Chapter.xhtml#Fn5_source)"
