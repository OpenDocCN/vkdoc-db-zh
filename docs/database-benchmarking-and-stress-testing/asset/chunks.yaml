  trans: "## 这些技术何时具有价值\n\n想象一下，作为数据库管理员，你的老板问你：“如果我们进行以下操作，预计会对生产数据库性能产生什么影响？”：\n\
    \n*   对操作系统和/或数据库应用主要版本升级？\n*   从基于 RISC CPU 的专有 UNIX 系统迁移到基于 Intel CISC CPU 的\
    \ Linux 系统？\n*   在戴尔、惠普和联想同等价位的服务器中选择？\n*   从 Windows Server 迁移到 Linux，或反之亦然？\n\
    *   从物理服务器迁移到虚拟机监控程序？\n*   从 VMware 等商业虚拟机监控程序迁移到 KVM 等开源方案？\n*   按实例整合数据库？\n\
    *   从本地部署迁移到云端？\n*   升级到下一个云定价层级？\n\n这些只是其中少数几个问题。那么，你该如何回答这类问题呢？即使拥有超过 30 年的数据库经验，我也只能对其中少数几个问题提供合理的见解，而且可能无法结合当时所需的具体上下文，向管理层提供可靠的建议。因此，在这种情况下，经验丰富的数据库管理员通常会进行一些测试，通常被称为\
    \ `概念验证`（POC）项目。那时，你必须决定是进行简单的压力测试、数据库基准测试，还是工作负载捕获/重放。\n\n一个常见的合理反驳是：“我们不经常做出此类决策，所以在遇到这类问题之前，这并不太重要或不值得担心。”我非常理解，数据库管理员总是被要求或被告知要用更少的资源做更多的事。他们根本没有足够的时间或精力去精通每一项技术。但过去十年数据库领域发生的变化表明，数据库的部署方式已经演变：先是虚拟化，现在正迁移到云端。因此，这类问题比过去发生的频率高得多。事实上，如今的数据库管理员或数据架构师很少不面对这类问题。\n\
    \n## 如何在这些选项中做选择\n\n既然我们已经探讨了这些不同技术为何重要以及何时重要，剩下的问题就是：应该选择哪一种？就像生活中任何重大决定一样，一个合理而非轻率的回答是\
    \ `这要视情况而定。` 然而，我主张在许多（即使不是大多数）情况下，你应该给数据库基准测试一个实际的考虑。可以说，它比通过临时监控数据库来创建压力测试脚本、捕获你认为并希望是真正代表性的工作负载，要更快、更可靠。它也不需要使用可能涉及机密、甚至可能非法复制到测试环境中的真实数据。最后，它不会增加工作负载捕获/重放工具的额外成本，而且该工具也依赖于使用真实数据。\n\
    \n是的，你可能会争辩说数据库基准测试依赖于合成的工作负载。然而，存在许多数据库基准测试，可以近似模拟各种工作负载类型，包括在线事务处理（OLTP）、数据仓库（DW）查询、批处理系统，以及用户自定义的、加权组合的所有上述类型。因此，你确实应该能够快速、轻松地组合一系列基准测试，以有意义且可接受地近似你的系统。这将使你能够专注于快速、准确地比较\
    \ `同类` 场景。\n\n对于资深的数据库管理员，你可能已经对你会做什么或者在提议的选项中有所偏好看法。我只是建议你以公正、开放的心态阅读本书，认识到数据库基准测试很可能会补充你现有的技能库。记住中国哲学家孔子的话：“开卷有益。”\n\
    \n对于更初级的数据库管理员或那些只是不习惯应对这些棘手的 `假设性` 数据库性能问题的人，你可能希望这本书能提供所有答案。然而，没有任何一本书能够拥有你对你的数据库及其数据的全部经验和洞察力。因此，我建议你阅读本书时，寻找你的目标与你所处的数据库上下文之间的最佳契合点。正如\
    \ `科学小子` 比尔·奈所说：“你遇到的每个人都知道一些你不知道的东西，因此你应该倾听他人并‘尊重他们的知识’。”\n\n## 后续内容\n\n假设你现在更加接受数据库基准测试的理念，你可能会问以下问题：\n\
    \n*   `第` 2 `章`\n    *   我应该学习和使用哪些行业标准的数据库基准测试？\n*   `第` 3 `章`\n    *   有哪些软件工具可以支持不同的数据库基准测试工作？\n\
    *   `第` 4 `章`\n    *   如何为真实的数据库基准测试工作做准备？\n*   `第` 5 `章`\n    *   在数据库基准测试过程中会出现哪些常见问题或失误？\n\
    *   `第` 6 `章`\n    *   在数据库基准测试工作中，哪些硬件选项很重要？\n*   `第` 7 `章`\n    *   在数据库基准测试工作中，哪些软件选项很重要？\n\
    *   `第` 8 `章`\n    *   如何有效地为数据库整合进行基准测试？\n*   `第` 9 `章`\n    *   如何有效地为数据库虚拟化进行基准测试？\n\
    *   `第` 10 `章`\n    *   如何有效地为公有云中的数据库进行基准测试？\n*   `第` 11 `章`\n    *   如何有效地执行数据库工作负载捕获和重放？\n\
    *   `第` 12 `章`\n    *   如何有效地执行简单的数据库压力测试？\n\n脚注 1  2  3  4  5"
- fmt: '# 2. Industry Standard Benchmarks


    In Chapter [1](#464117_1_En_1_Chapter.xhtml) we differentiated between a database
    benchmark, database stress test, and workload capture/replay. By understanding
    these differing approaches, we formed the foundation for a common understanding
    and vocabulary. Plus we learned why these different techniques are useful and
    when to best utilize them. To recap, our basic definitions were:


    *   A database stress test is an indefinite and limited in nature, artificial
    workload meant to basically stress the database’s low-level performance (i.e.,
    to make the database sweat).

    *   A database benchmark is a well-defined and universally accepted, industry
    standard database stress test with clear performance metrics to measure and compare
    results for a given database size and concurrent user workload.

    *   A workload capture is a well-defined and limited snapshot of actual database
    application activity recorded to create a database benchmark with a non-artificial
    workload to be replayed to compare before and after performance.


    In this chapter we’ll now review all of the industry standard database benchmarks
    of significance. Moreover, we’ll break them down into two major categories: those
    which are current and those now out of favor. Most of these database benchmarks
    were developed by the Transaction Processing Council ([`www.tpc.org`](http://www.tpc.org))
    while a few originated at universities. It’s important to know both the current
    and unpopular industry standard database benchmarks as the former often have roots
    in the latter. Finally note that each industry standard database benchmark tends
    to focus on a particular type of workload; therefore knowing all these benchmarks
    will enable you to select the proper one for your needs. In fact, you may well
    discover that you require a mixture of benchmarks in order to best approximate
    the workload you desire to test. So once again the knowledge of all these benchmarks
    will be critical in your pursuit of testing.


    ## Most Popular Benchmarks


    Let us now discuss the most popular benchmarks.


    ### TPC-C


    The TPC-C is probably the most recognized, least understood, and often misquoted
    database benchmark. It’s also the one offered by the most database benchmarking
    tools, but which may not adhere to the intent of the benchmark’s specification
    due to program defaults or user definable options that are out of spec. Moreover,
    these database benchmarking tools may ask for user supplied runtime parameters
    that define the nature of the test but which users do not know how to correctly
    provide unless they have read the database benchmark spec. Furthermore, most database
    benchmarking tools do not report their results in a consistent manner or achieve
    radically different results based upon their default settings (which may or may
    not be to spec). Finally, most people focus on just a portion of the test results
    in a vacuum, such as transactions per second (`TPS`), without the proper context
    for any meaningful interpretation. As such the TPC-C has garnered a bad reputation
    for all the wrong reasons.


    Let’s start by looking at the TPC-C database definitions from the [`tpc.org`](http://tpc.org)
    web site and the TPC-C spec:


    *   Website: TPC-C is an OLTP benchmark. It’s more complex than previous OLTP
    benchmarks such as TPC-A because of its multiple transaction types, more complex
    database, and overall execution structure.

    *   TPC-C spec: TPC-C is an OLTP workload. It’s a mix of read-only and update
    intensive database transactions that simulate the activities of a complex OLTP
    application.


    Neither definition really provides any kind of meaningful insight into the nature
    of the application workload other than saying it is OLTP based. Here is a more
    thorough and therefore more useful definition:


    > *Approved in 1992 the TPC-C is the original OLTP benchmark* *whose workload
    of five transactions (New-Order, Payment, Order-Status, Delivery and Stock-Level)
    attempts to approximate a wholesale distributor with a fairly small number of
    warehouses to service a relatively large number of retail locations. Performance
    is a measure of new orders per minute.*


    Note that the TPC-C is now over 25 years old. It does not adequately mimic today’s
    real-world database workloads, nor does it properly stress the capabilities of
    today’s hardware and database engines. As such, the TPC-C is quickly losing favor.
    The TPC-C is now considered awfully "`old school`" and has been superseded by
    the TPC-E, a newer and far more complex OLTP database benchmark covered later
    in this chapter. Nonetheless the TPC-C remains the most widely used and heavily
    quoted benchmark, hence why it’s critical to cover TPC-C database benchmark in
    great detail. Let’s continue our investigation by examining the TPC-C data model
    shown in Figure [2-1](#464117_1_En_2_Chapter.xhtml#Fig1).


    ![../images/464117_1_En_2_Chapter/464117_1_En_2_Fig1_HTML.jpg](images/464117_1_En_2_Chapter/464117_1_En_2_Fig1_HTML.jpg)


    Figure 2-1 TPC-C Data Model'
