    ## 步骤 #3：创建虚拟用户


    我们现在继续展开 `虚拟用户` 树状视图节点，然后双击 `选项` 节点，这将启动虚拟用户选项，如图 3-19 所示。请注意，步骤 #3 也是一个更简短、更简单的步骤；因此，与第
    #2 节类似，本节内容特意较为简略。


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig19_HTML.jpg](img/464117_1_En_3_Fig19_HTML.jpg)


    图 3-19：HammerDB 虚拟用户选项


    在这里，我们必须指定所需的并发虚拟用户数量、虚拟用户延迟或 `思考时间` 的长度、处理延迟或 `滞后时间` 的长度，以及每个虚拟用户重复整个工作负载的迭代次数。请注意，尽管图
    3-18 中的这个屏幕看起来相当直观和简单，但您需要在此屏幕上花些时间，因为这些值可能是由规范定义和/或强制要求的，并且在此屏幕上可能不会默认设置得当。不注意这一点很可能导致意外且不可重复的结果。


    例如，假设我们当时进行的是 `TPC-C` 基准测试，并且在数据库对象创建和数据加载阶段请求了，比如说，`10 个仓库`。`TPC-C` 规范明确定义了每个仓库允许的最大用户数量为
    `10`。然而，这个屏幕会允许我们请求 `200 个并发虚拟用户`，并且进一步地，不会警告这超出了规范范围。这可能会导致不必要的数据库行争用，并且由于没有足够的、独立的行供用户处理而导致结果不正确。您甚至可能会看到数据库死锁错误。无论如何，结果很可能不可靠且不可重复。


    这里还有一个重要的注意事项值得提及。虽然 HammerDB 提供了定义虚拟用户开始处理之间以及迭代之间延迟的功能，但其他工具可能没有。再次强调，这样的设置可能使两个不同的数据库基准测试工具看起来产生了不同的结果。但严酷的事实是，种瓜得瓜，种豆得豆。因此，请注意这类细节。


    现在选择了虚拟用户选项后，是时候生成那些处于空闲状态但已准备就绪的虚拟用户会话进程了。为此，我们再次查看 `虚拟用户` 树状视图节点下方，但现在双击 `创建`
    节点，这将生成或分叉那些空闲的虚拟用户会话，如图 3-20 所示。


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig20_HTML.jpg](img/464117_1_En_3_Fig20_HTML.jpg)


    图 3-20：HammerDB 虚拟用户启动


    图 3-20 中有几个值得注意的项目需要认识和理解。首先，生成的虚拟用户数量正好是请求数量，并且没有像数据库对象加载阶段那样的控制或监控附加项。其次，如果您请求了
    `100 个虚拟用户`，那么请确保滚动浏览列表并验证您实际生成了请求数量的虚拟用户并已准备就绪。人们很容易忘记这一步，并且没有意识到结果不可重复的原因是虚拟用户数量由于某些不可预见的问题（如机器内存不足或数据库允许的并发连接数限制）而发生了变化。


    ## 步骤 #4：执行基准测试


    我们终于到了最重要的阶段：实际运行数据库基准测试。为此，我们继续展开 `虚拟用户` 树状视图节点（假设虚拟用户已经生成），然后双击 `运行` 节点，这将简单地释放空闲的虚拟用户会话，让每个会话使用用户定义的脚本选项执行生成的脚本，如图
    3-21 所示。


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig21_HTML.jpg](img/464117_1_En_3_Fig21_HTML.jpg)


    图 3-21：HammerDB 执行基准测试


    请注意，输出显示正在运行的是规范中定义的 22 个查询中的第一个查询，即查询 #14。不要让这使您感到困惑或困扰，因为它将按要求运行所有查询。顺序只是被随机化了，这样并非所有并发会话都会在同一时间运行相同的查询。随机顺序将更接近地匹配真实用户大多在不同时间运行不同查询的情况。当您看到如图
    3-22 所示的屏幕输出时，您就会知道基准测试已成功完成。请注意，虚拟用户显示其以绿色状态完成，并且运行 22 个查询花费了 `150 秒`。


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig22_HTML.jpg](img/464117_1_En_3_Fig22_HTML.jpg)


    图 3-22：HammerDB 基准测试完成


    ## 监控性能


    请注意，仅仅知道运行基准测试花了多长时间通常不是最健壮和最有用的统计数据。对于 `TPC-H`，每小时查询数（`QpH`）可能更有用，而对于 `TPC-C`，则是每分钟事务数（`TpM`）。这两者都不是规范要求的为发布而计算的最终报告值，但对于大多数
    DBA 来说通常已经足够好。那么，我们如何从 HammerDB 获取这样的信息呢？实际上相当简单；我们只需启动事务计数器。许多 DBA 只在基准测试的执行部分这样做，尽管如果您愿意，也可以监控创建和加载阶段。无论哪种方式，您所需要做的就是定义事务计数器的数据库连接信息，如图
    3-23 所示。


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig23_HTML.jpg](img/464117_1_En_3_Fig23_HTML.jpg)


    图 3-23：配置事务计数器


    然后，您只需双击 `计数器` 树状视图节点来启动事务计数器数据收集，这将导致事务计数器屏幕进入等待状态，如图 3-24 所示。


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig24_HTML.jpg](img/464117_1_En_3_Fig24_HTML.jpg)


    图 3-24：事务计数器等待中


    现在，当您运行数据库基准测试时，您将看到事务计数器屏幕更新，如图 3-25 所示。


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig25_HTML.jpg](img/464117_1_En_3_Fig25_HTML.jpg)


    图 3-25：事务计数器工作中

