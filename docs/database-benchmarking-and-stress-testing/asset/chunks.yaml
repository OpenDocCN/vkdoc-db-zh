- fmt: '## Network


    There are just two very simple issues and recommendations involving network settings
    for a virtual machine undergoing any database benchmarks. First and foremost,
    the network adapter should be set to the proper and optimal driver. I’ve been
    involved in a handful of benchmarking efforts where the expected results were
    not being met and no one was quite sure why. Upon investigating their VM network
    settings, as shown in Figure [9-3](#464117_1_En_9_Chapter.xhtml#Fig3), a suboptimal
    driver had been designated. When the VM was either created or converted/migrated
    to the host server, the network driver was set to the common default for the guest
    OS (in this case, `E1000`). However, for this hypervisor (i.e., VMware ESX), the
    best driver was a paravirtualized driver known as `VMXNET3`. Once again, a very
    simple and easy thing to check and then correct. Remember that this database VM
    for a large OLTP benchmark could be handling hundreds of thousands to millions
    of user session requests and returned results. For a data warehousing benchmark,
    it could be returning fairly large amounts of data. Either way the network will
    be a serious constraint on overall performance. In the case of an OLTP test this
    simple setting change made a 500% improvement in average response time, which
    was the factor we were most interested in optimizing. If you’re wondering how
    that could be, the `E1000` driver is software emulation for a generic 1 gigabit
    NIC, whereas the `VMXNET3` is for 10 gigabits. Why does this happen? The virtual
    machine must have the vendor’s tools software installed in the guest OS for the
    option to be available. So until you manually install the vendor’s tools, the
    network driver is set to the suboptimal default.


    ![../images/464117_1_En_9_Chapter/464117_1_En_9_Fig3_HTML.jpg](images/464117_1_En_9_Chapter/464117_1_En_9_Fig3_HTML.jpg)


    Figure 9-3


    Choose Optimal Hypervisor Network Driver


    The second networking consideration is if your hypervisor permits “*passthrough*”
    mode for a physical device, then you can choose one of your network interface
    cards and mark it as passthrough enabled. Then you can assign that NIC to the
    VM such that the guest OS sees the actual hardware and therefore uses the native
    OS hardware driver – which also means your network traffic will entirely bypass
    the hypervisor and its overhead. However, there is one major drawback to this
    using the technique: dynamic virtual machine relocation might be impossible or
    far more difficult since servers could have different hardware or all that new
    hosts hardware could already be provisioned such that nothing is left for any
    new passthrough setups. As such, you may well conclude that for network traffic
    that the optimal hypervisor network driver (e.g., `VMXNET3`) is sufficient in
    order to retain the most overall flexibility with reasonably acceptable performance.
    I’ve personally done this both ways and cannot really make any recommendations.
    Remember that the hypervisor host may have a Link Aggregation Control Protocol
    (LACP) setup combining the throughput of multiple NICs that you’d miss out on
    by doing your own dedicated passthrough on one or two NICs. For example, my server
    has eight gigabit NIC’s, of which six are allocated to the LACP group.


    ## Disk IO


    As has been said several times in this book, we all know that physical disk IO
    is the Achilles’ heel of database performance. Remember the key points from earlier:


    - Avoid RAID 5 for database data and index files.

    - Suggest RAID 10 for database data and index files.

    - Storage LUNs with proper stripe width and depth/size.


    So what considerations do we need to add to this list when doing benchmarking
    for virtualized databases? There are just three additional, and they are all pretty
    straightforward:


    - Avoid virtualization snapshots (adds unnecessary overhead).

    - As with the network, consider passthrough drivers for host bus adapters (HBAs)
    when reasonable (just as with networking this choice may preclude dynamic virtual
    machine relocation).

    - Choose the most efficient disk initialization mode for optimal database IO.


    It’s this last item that requires explanation. Many DBAs would agree that for
    those database platforms that allow for database data files to grow dynamically,
    the cost of dynamic space allocation can be a measurable burden. For example,
    imagine a database file set to start at 50MB and to grow by 50M as space needed
    is being utilized to house the schema for a 300GB TPC-H. The data loading process
    will cause roughly 600 dynamic disk space extensions just for the data, with maybe
    another 100 for the indexes. The smart DBA would just create a data file with
    maybe 500GB of disk space and avoid all that dynamic allocation overhead. The
    same principle holds true for your virtual machine disk allocations. For example,
    VMware offers three provisioning modes:


    - `Thin`: file starts at zero size and dynamically grows as space requested.

    - `Lazy Zero Thick` (aka `Flat`): file starts at the specified size and blocks
    must be dynamically zeroed out before written.

    - `Eager Zero Thick`: file starts at the specified size and all blocks pre-zeroed
    out before file made available for use.


    So when database benchmarking and looking for the best disk IO possible, you should
    not only minimize database-level dynamic disk growth but also complement that
    by eliminating hypervisor-level dynamic disk growth by choosing the entirely preallocated
    mode as shown in Figure [9-4](#464117_1_En_9_Chapter.xhtml#Fig4).


    ![../images/464117_1_En_9_Chapter/464117_1_En_9_Fig4_HTML.jpg](images/464117_1_En_9_Chapter/464117_1_En_9_Fig4_HTML.jpg)


    Figure 9-4


    Choose Optimal Disk Provisiong Method


    ## Monitoring Issues


    Back in Chapter [5](#464117_1_En_5_Chapter.xhtml) we visualized the database benchmarking
    effort as being similar to a cardiac stress test as shown here again in Figure
    [9-5](#464117_1_En_9_Chapter.xhtml#Fig5). We’ve not made much mention of the monitoring
    aspect throughout the book, until now that is. It’s a fairly well-known fact that
    not all OS and database monitoring tools report accurate values when the guest
    OS and its database is virtualized. If the monitoring tool is not virtually aware
    or simply monitors at the guest OS level, then there can be CPU clock drift and
    skew as seen by the monitoring software. This can lead to incorrect diagnostics
    and remedies. Furthermore, none of the currently available database benchmarking
    tools inherently handle this because their job is just to be the treadmill and
    simply stress the database. So my advice is to invest in a good monitoring solution
    that’s fully virtualization aware.


    ![../images/464117_1_En_9_Chapter/464117_1_En_9_Fig5_HTML.jpg](images/464117_1_En_9_Chapter/464117_1_En_9_Fig5_HTML.jpg)


    Figure 9-5


    Benchmarking like Cardiac Stress Test


    ## Summary


    In this chapter we examined the issues and techniques for performing database
    benchmarking for virtualization. The basic message being that from the BIOS up
    through all the virtual machine hardware resource configuration settings, there
    are numerous choices to be made that affect achievable benchmarking performance.
    Therefore it’s very worth the time to verify and, where necessary, correct these
    settings in order to meet the benchmarking expectations.'
