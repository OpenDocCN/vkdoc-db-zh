  trans: '

    ## 正确的工具部署方式


    虽然大多数数据库基准测试工具都易于下载、安装和运行，但它们通常还具备更为复杂的部署方式，却少有用户研究或使用。未能理解并利用这些部署模式可能会严重扭曲测试结果，甚至导致基准测试整体失败。假设你想运行一个拥有
    10,000 个并发用户的 `TPC-C` 测试。你真的认为你的单台台式机或笔记本电脑能向数据库服务器发送如此大的流量吗？即便你认为可以，那网络带宽呢？一块千兆以太网卡能处理的流量是有限的。虽然测试可能无错误地运行至结束，但这真的代表了数据库服务器所能达到的真实性能吗？然而，许多人正是这么做的，然后纳闷为何结果无法复现或不如预期。


    让我们来看一个典型的客户端/服务器类型部署模型，许多数据库基准测试工具都提供此模型以支持运行此类工作负载。在本演示中，我将使用 Quest Software
    的 `Benchmark Factory (BMF)`。除了在单台计算机上安装和运行 `BMF` 之外，你还可以在其他服务器上部署 `BMF` 代理，以构建如图
    5-3 所示的分布式架构。


    ![../images/464117_1_En_5_Chapter/464117_1_En_5_Fig3_HTML.jpg](img/464117_1_En_5_Fig3_HTML.jpg)


    图 5-3


    Benchmark Factory 分布式架构


    核心思想是，台式机或笔记本电脑仅运行中央控制台，而非实际向数据库服务器请求工作的数据库用户会话。这种分布式代理的方法有两个主要优点。首先，用户会话及其工作负载可以分布在许多服务器上，从而分布在多个
    CPU 和内存上。其次，代理服务器可以位于机房内，与数据库服务器有高速网络连接，这样网络带宽和延迟就不会影响性能结果。我曾参与的基准测试项目中，一次测试运行最多使用了多达
    120 个代理。这确实是运行此类大型测试唯一可靠的方式。请注意，虽然像 `BMF` 这样的工具提供了从控制台自动部署代理的机制，但其他工具则需要先安装软件，然后通过其网络
    IP 地址手动进行链接。这可能为证明像 `BMF` 这样的商业工具的额外成本提供了充分理由。


    ## 意想不到的人为因素


    我将保持本节非常简短，因为我不想听起来像个站在肥皂箱上的传教士。但尽管如此，你至少需要意识到，除了简单的数据库性能之外，其他因素有时可能才是进行基准测试的真正目的。了解这个目的有时可以将努力引导至最有利于达成必要结果的方向。


    如果请求或执行数据库基准测试的人心里已经有了定论，那么基准测试本身很可能只是为了通向某个预设结论而需要勾掉的“*待办事项*”清单上的一项。这纯粹是人之常情。它既没有错，也难以避免。意识到这类人为因素有助于取得真正的成功。


    ### 验证我们的方向


    假设你的管理层说：“我们要迁移到云端，因此你需要提供基准测试结果，表明性能相当或更好，以支持成本节约的论点。” 那么，为什么还要测试呢？所有云厂商都提供多种虚拟机配置（例如，通用型、内存密集型、CPU
    密集型、IO 密集型等），并且为每种配置类型提供可扩展的 CPU 和内存资源分配。管理层真正想要的可能是，哪种规模合适的云虚拟机镜像能够交付所有必需的关键性能指标。这彻底改变了基准测试项目的范围，因为现在你既需要提供建议，也需要提供其性能数据。但这类澄清往往直到基准测试项目进行中才变得清晰起来。


    ### 自我应验的预言


    现在，假设你的管理层说：“我们要用基于 Intel/Linux 的服务器替换现有的 Oracle SPARC/Solaris 服务器，因此你需要提供基准测试结果，表明性能相当或更好，以支持成本节约的论点。”
    但这个简单的陈述中隐含着一个重大障碍/问题。如果许多目前在 SPARC/Solaris 上运行 Oracle 数据库的 DBA 对此次迁移感到不快，而他们最终将执行此次数据库基准测试，那该怎么办？别笑，这发生在我参与的一个主要基准测试项目中。根本无法说服那些
    DBA，新的 Intel/Linux 服务器能够胜任。我不会说有蓄意破坏行为，但我可以说，本应轻松的努力却并非如此，并且花费的时间远超计划。再次强调，你很可能直到基准测试项目进行中才会发现这类问题。


    ## 十大数据库基准测试误解


    我对数据库基准测试的科学及其所有实践者都怀有极大的敬意。然而，如果没有适当的准备和所有必要的工具，这门科学并不适合新手或无知的尝试。然而，每当我加入一个已经进行中并遇到问题的基准测试工作时，我总会发现一些常见的失误。以下是我经常遇到的前
    10 大误解（其中一些在前面的章节中已经提到）。


    ### #1：我使用的是像 Quest 的 `Benchmark Factory` 这样的工具，所以这就是我所需要的一切


    错误。我强烈建议任何进行基准测试的人，阅读他们将要执行的任何行业标准测试的规范。这是因为自动化这些测试的软件会提出问题或呈现选项，除非你理解这些选项背后的上下文（这在规范中有定义），否则你无法真正定义它们。


    例如，非常流行的称为“`TPC-C Benchmark`” ([`http://tpc.org/tpcc/spec/tpcc_current.pdf`](http://tpc.org/tpcc/spec/tpcc_current.pdf))
    的“OLTP”测试，对“规模”因子定义如下：


    > `第 4.2.1 节：` *WAREHOUSE 表用作基本的规模单位。所有其他表（ITEM 表除外）的基数都是已配置仓库数量（即 WAREHOUSE 表的基数）的函数。这个数量反过来决定了施加于被测系统
    (SUT) 的负载，从而产生报告的吞吐量（见第 5.4 条）。*


    > `第 4.2.2 节：` *对于数据库中的每个活动仓库，SUT 必须接受来自 10 个终端用户群体的事务请求。*


    因此，当像 `Benchmark Factory` 这样的工具要求提供规模因子时，它指的不是并发用户的数量——而是仓库的数量。所以规模因子 300 意味着
    300 个仓库，从而最多支持 3,000 个并发用户。


    阅读规范的要求至关重要。它将是我下面提到的每一个剩余误解和问题的根本原因。

    '
- fmt: '## 2: I have an expensive SAN, so I don’t need to configure anything special
    for IO


    Wrong. The size, type, and nature of the test may require radically different
    hardware settings, even all the way down to the deepest level of your SAN. For
    example, a data warehousing test like the TPC-H is best handled by a SAN whose
    “read-ahead” and “data-cache” settings are set more for read than write, while
    the OLTP TPC-C would benefit from just the opposite. Relying on defaults can be
    a really big mistake.


    Likewise, the SAN hardware settings for stripe depth and stripe width should be
    set differently for these different usages. Plus of course the file system and
    database IO sizes should be a multiple of the stripe depth. In fact, a common
    rule of thumb is:


    `Stripe Depth >= db_block_size X db_file_multiblock_read_count`


    Furthermore, selecting the optimal hardware RAID level quite often should factor
    in the benchmark nature as well. Where OLTP might choose RAID-5, data warehousing
    might be better served by RAID-0+1.


    Finally, the number of disks can also be critical. For example, TPC-H tests start
    at around 300 GB in size. So anything less than 100 spindles at that size is generally
    a waste of time. And as you scale larger, 800 or more drives becomes common as
    the minimum recommended setup. The point is that no SAN cache is ever large enough
    for monstrous data warehousing queries’ workload.


    I’ve seen `up to 500% result differences` when varying SAN settings and the number
    of disks.


    ## 3: I can just use the default operating system configuration right out of the
    box


    Wrong. Most databases require some prerequisite operating system tweaks, plus
    most benchmarks can benefit from a few additional adjustments. For example, I’ve
    seen from 50–150% benchmark differences running TPC-C benchmarks for both Oracle
    and SQL Server by adjusting but one simple file system parameter. Yet that parameter
    is not part of either database’s install or configuration recommendations.


    Now you might argue that you can skip this step since it will be an “apples to
    apples” comparison because the machine setup will be the same across tests. OK,
    but why potentially wait three times as long for worse results. Since a 300 GB
    TPC-H test can take days just to load, efficiency is often critical in order to
    meet your time deadlines.


    ## 4: I can just use the default database setup/configuration right out of the
    box


    Wrong. While some databases like SQL Server might be “universally useful” as configured
    out of the box, other databases like Oracle are not. For example, the default
    number of concurrent sessions for Oracle is 50. So if you try to run a TPC-C test
    with more than 50 users, you’re already in trouble.


    Likewise the nature of the benchmark once again dictates how many various database
    configuration parameters should be set. A TPC-C test on Oracle, for example, might
    well benefit from `init.ora` parameter settings of:


    *   `SGA_TARGET` & `SGA_MAX_SIZE` = 60% memory

    *   `PGA_AGGREGATE_TARGET` = 20% memory

    *   `CURSOR_SHARING` = SIMILAR

    *   `OPTIMIZER_INDEX_CACHING` = 80

    *   `OPTIMIZER_INDEX_COST_ADJ` = 20


    I’ve seen `as much as 533% database benchmarking performance improvement` from
    just adjusting a few such parameters, so imagine what a careful review of all
    the database configuration parameters for the test nature could provide!


    ## 5: Tools like Benchmark Factory will create optimally designed database objects
    for my hardware


    Wrong. Software like Benchmark Factory is simply a tool to automate the complex
    and tedious process necessary to execute a benchmark. For example, the TPC-H is
    simply a collection of 22 very long and complex `SELECT` statements against a
    very simple database design with some really big tables. It tests the database
    optimizer’s efficiency in handling complex statement explain plans and their executions.
    So optimal database structural design could play a major role in the performance
    achieved.


    Yet the simple `CREATE TABLE` statements from most database benchmarking tools
    is suboptimal. I refer you back to this chapter’s earlier section about the big
    red easy button and the 15 recommended steps for performing a database benchmark.
    You should manually optimize your database object structural design for the best
    results, even if the tool like Benchmark Factory offers some limited capabilities
    to do so since the tool cannot know your hardware.


    ## 6: Tools like Benchmark Factory will automatically monitor, tune, and optimize
    all my hardware, operating system, and database configuration parameters


    Wrong. As was stated in the prior issue, database benchmarking tools are simply
    the treadmill designed to make a database sweat – and that’s it. A tool like HammerDB
    runs queries and/or DML to make the database work hard for a specified scenario
    in order to learn where any bottlenecks might exist – but not to find or identify
    those issues.


    If you want to monitor, diagnose, or tune/optimize your database for such tests,
    you’ll need the appropriate tools like Quest Software’s Spotlight for Oracle or
    Oracle Enterprise Manager with the Tuning and Diagnostics packs. Remember, database
    benchmarking tools like Benchmark Factory are simply a `“load generator.”`


    ## 7: I don’t need a DBA to perform benchmark tests – anyone technical can do
    it


    Wrong. Look at all the issues above again – sometimes database developers or other
    simply technical database savvy people may not be cognizant or authorized to make
    such decisions. The key point once again is that benchmarking requires more than
    just someone to run tests – it requires someone who knows benchmarking and can
    speak to all the issues above. Otherwise, you’ll simply get results that are not
    really what your hardware could do. And 500+% performance differences mentioned
    above are more than just worthless background noise; you could make a mistaken
    strategic decision with such misinformation.


    ## 8: I can very easily compare database vendors on the same hardware platform


    Possibly. If you have one or more DBA’s who can address all the above issues for
    each different database platform, then by all means yes. Otherwise, you simply
    cannot compare the databases reliably by simply installing and running the same
    test for each. There are far too many dependencies and variables to trust such
    a simplistic approach.


    ## 9: Transactions per Second (i.e., TPS) are what matter most in benchmarking


    Rarely. I think TPS is one of the most misleading values – but everyone seems
    to focus on that one first. Let me explain. As you increase the number of users
    or tasks being performed, by definition you’re actually increasing the TPS. At
    some point it may plateau, but what does that tell you? Figure 5-4 below shows
    the results from running the TPC-C benchmark while changing various Oracle configuration
    parameters from misconception #4 above. We don’t see the 533% improvement that
    was quoted by looking just at the TPS numbers.


    ![../images/464117_1_En_5_Chapter/464117_1_En_5_Fig4_HTML.jpg](images/464117_1_En_5_Chapter/464117_1_En_5_Fig4_HTML.jpg)


    Figure 5-4 TPC-C Results for Transactions per Second


    However, when we look at the average response times for those same test runs as
    shown below in Figure 5-5, now the 533% number should be far more evident. Test
    run #1 with default database configuration settings had an average response time
    of 5 seconds at 500 concurrent users, while test runs #4 and #5 were around a
    fifth of a second average response time. Not only does average response time mean
    something real in user or SLA terms, but it’s far more obvious and understandable.


    ![../images/464117_1_En_5_Chapter/464117_1_En_5_Fig5_HTML.jpg](images/464117_1_En_5_Chapter/464117_1_En_5_Fig5_HTML.jpg)


    Figure 5-5 TPC-C Results for Avg Response Time'
  raw: '### #2: I have an expensive SAN, so I don’t need to configure anything special
    for IO


    Wrong. The size, type, and nature of the test may require radically different
    hardware settings, even all the way down to the deepest level of your SAN. For
    example, a data warehousing test like the TPC-H is best handled by a SAN whose
    “read-ahead” and “data-cache” settings are set more for read than write, while
    the OLTP TPC-C would benefit from just the opposite. Relying on defaults can be
    a really big mistake.


    Likewise, the SAN hardware settings for stripe depth and stripe width should be
    set differently for these different usages. Plus of course the file system and
    database IO sizes should be a multiple of the stripe depth. In fact, a common
    rule of thumb is:


    *   **Stripe Depth >= db_block_size X db_file_multiblock_read_count**


    Furthermore, selecting the optimal hardware RAID level quite often should factor
    in the benchmark nature as well. Where OLTP might choose RAID-5, data warehousing
    might be better served by RAID-0+1.


    Finally, the number of disks can also be critical. For example, TPC-H tests start
    at around 300 GB in size. So anything less than 100 spindles at that size is generally
    a waste of time. And as you scale larger, 800 or more drives becomes common as
    the minimum recommended setup. The point is that no SAN cache is ever large enough
    for monstrous data warehousing queries’ workload.


    I’ve seen **up to 500% result differences** when varying SAN settings and the
    number of disks.


    ### #3: I can just use the default operating system configuration right out of
    the box


    Wrong. Most databases require some prerequisite operating system tweaks, plus
    most benchmarks can benefit from a few additional adjustments. For example, I’ve
    seen from 50–150% benchmark differences running TPC-C benchmarks for both Oracle
    and SQL Server by adjusting but one simple file system parameter. Yet that parameter
    is not part of either database’s install or configuration recommendations.


    Now you might argue that you can skip this step since it will be an “apples to
    apples” comparison because the machine setup will be the same across tests. OK,
    but why potentially wait three times as long for worse results. Since a 300 GB
    TPC-H test can take days just to load, efficiency is often critical in order to
    meet your time deadlines.


    ### #4: I can just use the default database setup/configuration right out of the box


    Wrong. While some databases like SQL Server might be “universally useful” as configured
    out of the box, other databases like Oracle are not. For example, the default
    number of concurrent sessions for Oracle is 50\. So if you try to run a TPC-C
    test with more than 50 users, you’re already in trouble.


    Likewise the nature of the benchmark once again dictates how many various database
    configuration parameters should be set. A TPC-C test on Oracle, for example, might
    well benefit from init.ora parameter settings of:


    *   **SGA_TARGET & SGA_MAX_SIZE = 60% memory**


    *   **PGA_AGGREGATE_TARGET = 20% memory**


    *   **CURSOR_SHARING = SIMILAR**


    *   **OPTIMIZER_INDEX_CACHING = 80**


    *   **OPTIMIZER_INDEX_COST_ADJ = 20**


    I’ve seen **as much as 533% database benchmarking performance improvement** from
    just adjusting a few such parameters, so imagine what a careful review of all
    the database configuration parameters for the test nature could provide!


    ### #5: Tools like Benchmark Factory will create optimally designed database objects
    for my hardware


    Wrong. Software like Benchmark Factory is simply a tool to automate the complex
    and tedious process necessary to execute a benchmark. For example, the TPC-H is
    simply a collection of 22 very long and complex SELECT statements against a very
    simple database design with some really big tables. It tests the database optimizer’s
    efficiency in handling complex statement explain plans and their executions. So
    optimal database structural design could play a major role in the performance
    achieved.


    Yet the simple CREATE TABLE statements from most database benchmarking tools is
    suboptimal. I refer you back to this chapter’s earlier section about the big red
    easy button and the 15 recommended steps for performing a database benchmark.
    You should manually optimize your database object structural design for the best
    results, even if the tool like Benchmark Factory offers some limited capabilities
    to do so since the tool cannot know your hardware.


    ### #6: Tools like Benchmark Factory will automatically monitor, tune, and optimize
    all my hardware, operating system, and database configuration parameters


    Wrong. As was stated in the prior issue, database benchmarking tools are simply
    the treadmill designed to make a database sweat – and that’s it. A tool like HammerDB
    runs queries and/or DML to make the database work hard for a specified scenario
    in order to learn where any bottlenecks might exist – but not to find or identify
    those issues.


    If you want to monitor, diagnose, or tune/optimize your database for such tests,
    you’ll need the appropriate tools like Quest Software’s Spotlight for Oracle or
    Oracle Enterprise Manager with the Tuning and Diagnostics packs. Remember, database
    benchmarking tools like Benchmark Factory are simply a *“load generator.”*


    ### #7: I don’t need a DBA to perform benchmark tests – anyone technical can do
    it


    Wrong. Look at all the issues above again – sometimes database developers or other
    simply technical database savvy people may not be cognizant or authorized to make
    such decisions. The key point once again is that benchmarking requires more than
    just someone to run tests – it requires someone who knows benchmarking and can
    speak to all the issues above. Otherwise, you’ll simply get results that are not
    really what your hardware could do. And 500+% performance differences mentioned
    above are more than just worthless background noise; you could make a mistaken
    strategic decision with such misinformation.


    ### #8: I can very easily compare database vendors on the same hardware platform


    Possibly. If you have one or more DBA’s who can address all the above issues for
    each different database platform, then by all means yes. Otherwise, you simply
    cannot compare the databases reliably by simply installing and running the same
    test for each. There are far too many dependencies and variables to trust such
    a simplistic approach.


    ### #9: Transactions per Second (i.e., TPS) are what matter most in benchmarking


    Rarely. I think TPS is one of the most misleading values – but everyone seems
    to focus on that one first. Let me explain. As you increase the number of users
    or tasks being performed, by definition you’re actually increasing the TPS. At
    some point it may plateau, but what does that tell you? Figure [5-4](#464117_1_En_5_Chapter.xhtml#Fig4)
    below shows the results from running the TPC-C benchmark while changing various
    Oracle configuration parameters from misconception #4 above. We don’t see the
    533% improvement that was quoted by looking just at the TPS numbers.


    ![../images/464117_1_En_5_Chapter/464117_1_En_5_Fig4_HTML.jpg](images/464117_1_En_5_Chapter/464117_1_En_5_Fig4_HTML.jpg)


    Figure 5-4


    TPC-C Results for Transactions per Second


    However, when we look at the average response times for those same test runs as
    shown below in Figure [5-5](#464117_1_En_5_Chapter.xhtml#Fig5), now the 533% number
    should be far more evident. Test run #1 with default database configuration settings
    had an average response time of 5 seconds at 500 concurrent users, while test
    runs #4 and #5 were around a fifth of a second average response time. Not only
    does average response time mean something real in user or SLA terms, but it’s
    far more obvious and understandable.


    ![../images/464117_1_En_5_Chapter/464117_1_En_5_Fig5_HTML.jpg](images/464117_1_En_5_Chapter/464117_1_En_5_Fig5_HTML.jpg)


    Figure 5-5


    TPC-C Results for Avg Response Time'
  trans: '

    ## 2：我拥有昂贵的 SAN，因此无需为 IO 配置任何特殊设置


    错误。测试的规模、类型和性质可能要求截然不同的硬件设置，甚至一直深入到 SAN 的最底层。例如，像 TPC-H 这样的数据仓库测试，最适合使用将“预读取”和“数据缓存”设置偏向于读而非写的
    SAN 来处理，而 OLTP TPC-C 则恰恰相反，受益于偏向于写的设置。依赖默认设置可能是一个非常大的错误。


    同样，针对这些不同的用途，SAN 的条带深度和条带宽度硬件设置也应该有所不同。此外，当然文件系统和数据库的 IO 大小应是条带深度的倍数。事实上，一个常见的经验法则是：


    `条带深度 >= 数据库块大小 X 数据库文件多块读取计数`


    此外，选择最佳的硬件 RAID 级别通常也应考虑基准测试的性质。OLTP 可能选择 RAID-5，而数据仓库可能更适合 RAID-0+1。


    最后，磁盘数量也可能至关重要。例如，TPC-H 测试起始规模约为 300 GB。因此，在此规模下，少于 100 个主轴（磁盘）通常是在浪费时间。随着规模扩大，800
    个或更多驱动器成为推荐的最小配置是很常见的。关键在于，没有任何 SAN 缓存对于庞大数据仓库查询的工作负载来说是足够大的。


    我曾见过因改变 SAN 设置和磁盘数量而导致`结果差异高达 500%`的情况。


    ## 3：我可以直接使用开箱即用的默认操作系统配置


    错误。大多数数据库需要一些先决的操作系统调整，而且大多数基准测试还能从一些额外的调整中受益。例如，我见过通过仅调整一个简单的文件系统参数，Oracle 和
    SQL Server 运行 TPC-C 基准测试的结果差异达到 50%到 150%。然而，该参数并非这两个数据库的安装或配置推荐的一部分。


    现在你可能会争辩说，因为所有测试的机器设置都相同，所以这是“苹果对苹果”的比较，因此可以跳过此步骤。好的，但为什么要可能因此多等三倍的时间，却得到更差的结果呢？因为一个
    300 GB 的 TPC-H 测试光是加载数据就可能需要数天时间，所以为了在时限内完成，效率往往是至关重要的。


    ## 4：我可以直接使用开箱即用的默认数据库设置/配置


    错误。虽然像 SQL Server 这样的数据库在默认配置下可能“普遍适用”，但像 Oracle 这样的数据库则不然。例如，Oracle 的默认并发会话数是
    50。因此，如果你尝试运行一个超过 50 个用户的 TPC-C 测试，你已经陷入麻烦了。


    同样，基准测试的性质再次决定了应设置多少不同的数据库配置参数。例如，在 Oracle 上运行 TPC-C 测试，将`init.ora`参数设置为以下值可能非常有益：


    *   `SGA_TARGET` & `SGA_MAX_SIZE` = 内存的 60%

    *   `PGA_AGGREGATE_TARGET` = 内存的 20%

    *   `CURSOR_SHARING` = SIMILAR

    *   `OPTIMIZER_INDEX_CACHING` = 80

    *   `OPTIMIZER_INDEX_COST_ADJ` = 20


    我曾见过仅调整少数几个这样的参数，就带来了`高达 533%的数据库基准测试性能提升`，所以想象一下，仔细审查所有针对测试性质的数据库配置参数能带来什么！


    ## 5：像 Benchmark Factory 这样的工具会为我的硬件创建最优设计的数据库对象


    错误。像 Benchmark Factory 这样的软件只是一个工具，用于自动化执行基准测试所必需的复杂而繁琐的过程。例如，TPC-H 只是 22 个非常长且复杂的`SELECT`语句的集合，它们针对一个非常简单的数据库设计（包含一些非常大的表）。它测试数据库优化器在处理复杂语句解释计划及其执行方面的效率。因此，最优的数据库结构设计可能在达到的性能中扮演重要角色。


    然而，大多数数据库基准测试工具提供的简单`CREATE TABLE`语句是次优的。我请你回顾本章前面关于那个大的红色简易按钮以及执行数据库基准测试的 15
    个推荐步骤的部分。为了获得最佳结果，你应该手动优化数据库对象的结构设计，即使像 Benchmark Factory 这样的工具提供了一些有限的优化能力，因为该工具无法知晓你的硬件配置。


    ## 6：像 Benchmark Factory 这样的工具会自动监控、调整和优化我的所有硬件、操作系统和数据库配置参数


    错误。正如前文所述，数据库基准测试工具仅仅是设计用来让数据库“流汗”的跑步机——仅此而已。像 HammerDB 这样的工具运行查询和/或 DML，让数据库在特定场景下努力工作，以便了解瓶颈可能存在于何处——但不是为了查找或识别这些问题。


    如果你想为了此类测试监控、诊断或调整/优化你的数据库，你将需要适当的工具，如 Quest Software 的 Spotlight for Oracle 或带有调优和诊断包的
    Oracle Enterprise Manager。请记住，像 Benchmark Factory 这样的数据库基准测试工具只是一个`“负载生成器”`。


    ## 7：我不需要 DBA 来执行基准测试——任何技术人员都可以做


    错误。再次查看上面所有问题——有时数据库开发人员或其他仅具备技术数据库知识的人可能没有意识到或无权做出此类决策。关键点再次在于，基准测试不仅仅需要有人来运行测试——它需要懂基准测试并且能够解决上述所有问题的人。否则，你得到的结果并不能真正反映你的硬件能力。而上面提到的
    500%以上的性能差异不仅仅是无价值的背景噪音；你可能会基于这种错误信息做出错误的战略决策。


    ## 8：我可以在相同的硬件平台上非常容易地比较数据库供应商


    可能可以。如果你有一个或多个 DBA 能够为每个不同的数据库平台解决上述所有问题，那么当然可以。否则，你无法仅仅通过为每个数据库安装并运行相同的测试来可靠地比较它们。依赖和变量太多，无法信任这种过于简单的方法。


    ## 9：每秒事务数（即 TPS）是基准测试中最关键的指标


    很少。我认为 TPS 是最具误导性的数值之一——但每个人似乎首先关注它。让我解释一下。当你增加用户数或执行的任务数时，根据定义，你实际上是在增加 TPS。在某个时刻它可能会趋于平稳，但这能告诉你什么呢？下图
    5-4 显示了在改变上述误区 4 中的各种 Oracle 配置参数时运行 TPC-C 基准测试的结果。仅看 TPS 数字，我们并没有看到被引用的 533%的提升。


    ![../images/464117_1_En_5_Chapter/464117_1_En_5_Fig4_HTML.jpg](img/464117_1_En_5_Fig4_HTML.jpg)


    图 5-4 TPC-C 每秒事务数结果


    然而，当我们查看这些相同测试运行的平均响应时间时（如下图 5-5 所示），现在 533%的数字应该明显得多。使用默认数据库配置设置的测试运行#1 在 500
    个并发用户下的平均响应时间为 5 秒，而测试运行#4 和#5 的平均响应时间约为五分之一秒。平均响应时间不仅在用户或 SLA 方面具有实际意义，而且更加明显和易于理解。


    ![../images/464117_1_En_5_Chapter/464117_1_En_5_Fig5_HTML.jpg](img/464117_1_En_5_Fig5_HTML.jpg)


    图 5-5 TPC-C 平均响应时间结果

