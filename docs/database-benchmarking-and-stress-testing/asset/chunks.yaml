- fmt: '# 11. Workload Capture and Replay


    In this chapter we’re going to review database workload capture and replay. This
    approach to stress testing or database benchmarking has some fairly obvious advantages.
    First, it’s your application and database from which the transactional activity
    is derived. Therefore it has a direct correlation and relevance to your actual
    performance situation and issues at hand. Second, you already are intimately familiar
    with both the database design and the general business requirements being handled.
    So there are no specs to read and learn. Third, it’s easier to research and propose
    potential solutions due to this familiarity. Plus it’s easy to bounce ideas off
    of peers who also have such familiarity. For reasons such as these (and several
    others), some people might well consider this the ideal approach to stress testing
    or database benchmarking. It’s hard to argue against such logic. I see their point.
    While Chapter [8](#464117_1_En_8_Chapter.xhtml) may have shown a way to create
    a mixture of industry-standard benchmarks in an attempt to approximate any system
    of interest, it nonetheless remains an approximation at best. We could easily
    forget some aspect that could radically skew the achievable results. You simply
    cannot be more accurate than running the actual workload.


    There is yet still more good news regarding database workload capture and reply.
    While for a fair number of years there were solutions from third-party software
    vendors, in recent years many of the database vendors have begun to offer such
    tools. For those who prefer workload capture and replay, this is a major victory
    as it’s not uncommon to prefer a database vendor provided solution for certain
    key database management tasks where the vendor is perceived to have a natural
    advantage (e.g., database monitoring, database replication, database backup, etc.).
    Moreover, not only have the key database vendors entered this space, but they
    have rapidly evolved and improved their offerings. Therefore, these days DBAs
    have more and better options than in any time prior. This is very important as
    we’re being asked to handle vastly different deployments such as databases on
    hypervisors, within containers, or in the cloud. Plus with advanced storage options
    such as SSD and NVMe in all those options, there are yet additional layers of
    complexity to overcome. Having the option for database workload capture and replay
    plays an important role in mastering all these situations.


    ## Double Everything


    The first and most obvious thing DBAs need to create in order to perform a successful
    workload replay is to make a copy of the source database and its original state
    of data. That copy will then be used as a separate target for the replay. Understandably
    you will need to take the copy before capturing the workload from the source such
    that you have a copy of the database at time zero (`T0`) before any transactions
    have been run that might change the data. That copy will then need to be loaded
    into the target such that any workload captured operating on `T0` data will then
    be able to be replayed with the exact same data and in the same exact order to
    hopefully produce the exact same results.


    With the workload captured, there are two key replay scenarios. The first is to
    simply diagnose and solve a performance problem without any major charges to either
    hardware or software. This is probably the more common and likely scenario. This
    could include testing related to minor operating system or database patches. The
    second is to test some significant change in hardware, software, or in the deployment
    model, such as virtualizing or moving to the cloud. While this scenario might
    not be as common, it nonetheless could be the most important in terms of strategy
    and long-term success. Let’s look both scenarios.


    In the first scenario, we are testing simple performance optimizations without
    major platform changes. This means is that we need two database licenses, two
    servers, and double the disk space. Moreover we should strive to keep the servers
    and disk storage nature as similar as possible to the original. So if our production
    database server has dual octa core Xeons with 256GB of memory with 10TB of RAID-10
    storage, then our test system for the replay should be the same or as similar
    as possible. Plus if our production database license is the enterprise edition
    with some optional cost add-ons, then we must also purchase the same for the test
    machine. The idea being that if mostly identical, then any tuning or optimization
    made on the target will most likely work on the source. That way we can find what
    things can be done to improve our production database.


    Note, too, that we’ll also need some disk space that can be mounted and shared
    with both machines to hold the workload capture files. These files could be quite
    large depending on the workload, so plan accordingly. You also will want to guarantee
    that the IO bandwidth to that shared space is sufficiently capable such that it
    does not skew either the source or target database servers. This is especially
    critical on the productions server since users must not be able to perceive that
    this effort caused any noticeable slowdowns that impact their normal work. No
    matter how you slice this, it means extra costs and risks.


    In the second scenario, things are less constrained due to the very nature of
    what’s being proposed and thus tested. We might be attempting to reduce database
    licensing fees by switching over to a "standard edition," for example. We might
    be comparing the current server vendor to another (e.g., Dell vs. HP vs. Lenovo).
    We might want to see if we can virtualize the database or move it to the cloud.
    We could just be looking at replacing the current NAS or SAN device with either
    a new vendor or an entirely new technology such as SSD or VVMe to replace a spinning
    disk. So while we might require two of certain categories of each component, they
    very well could be quite different as that’s the purpose of the test – to test
    that difference.


    Once you have all this necessary infrastructure in place, then you can usually
    copy the entire database via a standard backup and recovery, and since you most
    likely already perform backups no overhead is introduced. You will just need to
    time your workload capture to start after a full backup such that you have true
    `T0` data for both the capture and replay. Once you have that you can restore
    the target system back to the initial state without any impact to the production
    system.


    ## Capture/Replay Tools


    There are essentially four types of tools for performing database workload capture
    and replay:


    - Database benchmarking tools offering capture/relay using native database trace
    files or profiles (e.g., HammerDB, Swingbench combined with Trace Analyzer, and
    Quest Software’s Benchmark Factory)

    - Database vendor tools offering intrinsic and low-overhead capture/replay mechanisms
    (e.g., SQL Server Distributed Replay and Oracle Real Application Testing a.k.a.
    RAT)

    - Third-party vendor database capture replay tools (e.g., ExactSolution’s iReplay,
    and ITGain’s SQLReplayer)

    - Open source database capture/replay tools (e.g., Query Store Replay for SQL
    Server)


    As this book is all about database benchmarking, we’re going to restrict our discussion
    to benchmarking tools that offer workload capture/replay since the vendor solutions,
    while often very good, only work for their own database. Besides, for some database
    vendors, this feature is an extra cost item that must be purchased for both the
    source and target databases, so once again double the costs.'
  raw: '# 11. Workload Capture and Replay


    In this chapter we’re going to review database workload capture and replay. This
    approach to stress testing or database benchmarking has some fairly obvious advantages.
    First, it’s your application and database from which the transactional activity
    is derived. Therefore it has a direct correlation and relevance to your actual
    performance situation and issues at hand. Second, you already are intimately familiar
    with both the database design and the general business requirements being handled.
    So there are no specs to read and learn. Third, it’s easier to research and propose
    potential solutions due to this familiarity. Plus it’s easy to bounce ideas off
    of peers who also have such familiarity. For reasons such as these (and several
    others), some people might well consider this the ideal approach to stress testing
    or database benchmarking. It’s hard to argue against such logic. I see their point.
    While Chapter [8](#464117_1_En_8_Chapter.xhtml) may have shown a way to create
    a mixture of industry-standard benchmarks in an attempt to approximate any system
    of interest, it nonetheless remains an approximation at best. We could easily
    forget some aspect that could radically skew the achievable results. You simply
    cannot be more accurate than running the actual workload.


    There is yet still more good news regarding database workload capture and reply.
    While for a fair number of years there were solutions from third-party software
    vendors, in recent years many of the database vendors have begun to offer such
    tools. For those who prefer workload capture and replay, this is a major victory
    as it’s not uncommon to prefer a database vendor provided solution for certain
    key database management tasks where the vendor is perceived to have a natural
    advantage (e.g., database monitoring, database replication, database backup, etc.).
    Moreover, not only have the key database vendors entered this space, but they
    have rapidly evolved and improved their offerings. Therefore, these days DBAs
    have more and better options than in any time prior. This is very important as
    we’re being asked to handle vastly different deployments such as databases on
    hypervisors, within containers, or in the cloud. Plus with advanced storage options
    such as SSD and NVMe in all those options, there are yet additional layers of
    complexity to overcome. Having the option for database workload capture and replay
    plays an important role in mastering all these situations.


    ## Double Everything


    The first and most obvious thing DBAs need to create in order to perform a successful
    workload replay is to make a copy of the source database and its original state
    of data. That copy will then be used as a separate target for the replay. Understandably
    you will need to take the copy before capturing the workload from the source such
    that you have a copy of the database at time zero (**T0**) before any transactions
    have been run that might change the data. That copy will then need to be loaded
    into the target such that any workload captured operating on **T0** data will
    then be able to be replayed with the exact same data and in the same exact order
    to hopefully produce the exact same results.


    With the workload captured, there are two key replay scenarios. The first is to
    simply diagnose and solve a performance problem without any major charges to either
    hardware or software. This is probably the more common and likely scenario. This
    could include testing related to minor operating system or database patches. The
    second is to test some significant change in hardware, software, or in the deployment
    model, such as virtualizing or moving to the cloud. While this scenario might
    not be as common, it nonetheless could be the most important in terms of strategy
    and long-term success. Let’s look at both scenarios.


    In the first scenario, we are testing simple performance optimizations without
    major platform changes. This means is that we need two database licenses, two
    servers, and double the disk space. Moreover we should strive to keep the servers
    and disk storage nature as similar as possible to the original. So if our production
    database server has dual octa core Xeons with 256GB of memory with 10TB of RAID-10
    storage, then our test system for the replay should be the same or as similar
    as possible. Plus if our production database license is the enterprise edition
    with some optional cost add-ons, then we must also purchase the same for the test
    machine. The idea being that if mostly identical, then any tuning or optimization
    made on the target will most likely work on the source. That way we can find what
    things can be done to improve our production database.


    Note, too, that we’ll also need some disk space that can be mounted and shared
    with both machines to hold the workload capture files. These files could be quite
    large depending on the workload, so plan accordingly. You also will want to guarantee
    that the IO bandwidth to that shared space is sufficiently capable such that it
    does not skew either the source or target database servers. This is especially
    critical on the productions server since users must not be able to perceive that
    this effort caused any noticeable slowdowns that impact their normal work. No
    matter how you slice this, it means extra costs and risks.


    In the second scenario, things are less constrained due to the very nature of
    what’s being proposed and thus tested. We might be attempting to reduce database
    licensing fees by switching over to a “*standard edition*,” for example. We might
    be comparing the current server vendor to another (e.g., Dell vs. HP vs. Lenovo).
    We might want to see if we can virtualize the database or move it to the cloud.
    We could just be looking at replacing the current NAS or SAN device with either
    a new vendor or an entirely new technology such as SSD or VVMe to replace a spinning
    disk. So while we might require two of certain categories of each component, they
    very well could be quite different as that’s the purpose of the test – to test
    that difference.


    Once you have all this necessary infrastructure in place, then you can usually
    copy the entire database via a standard backup and recovery, and since you most
    likely already perform backups no overhead is introduced. You will just need to
    time your workload capture to start after a full backup such that you have true
    **T0** data for both the capture and replay. Once you have that you can restore
    the target system back to the initial state without any impact to the production
    system.


    ## Capture/Replay Tools


    There are essentially four types of tools for performing database workload capture
    and replay:


    *   Database benchmarking tools offering capture/relay using native database trace
    files or profiles (e.g., HammerDB, Swingbench combined with Trace Analyzer, and
    Quest Software’s Benchmark Factory)


    *   Database vendor tools offering intrinsic and low-overhead capture/replay mechanisms
    (e.g., SQL Server Distributed Replay and Oracle Real Application Testing a.k.a.
    RAT)


    *   Third-party vendor database capture replay tools (e.g., ExactSolution’s iReplay,
    and ITGain’s SQLReplayer)


    *   Open source database capture/replay tools (e.g., Query Store Replay for SQL
    Server)


    As this book is all about database benchmarking, we’re going to restrict our discussion
    to benchmarking tools that offer workload capture/replay since the vendor solutions,
    while often very good, only work for their own database. Besides, for some database
    vendors, this feature is an extra cost item that must be purchased for both the
    source and target databases, so once again double the costs.'
