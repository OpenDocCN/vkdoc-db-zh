  trans: '## 旋转磁盘


    在本节中，我们将讨论范围限定在传统的旋转磁介质磁盘。无论使用 SAS 还是 SATA 磁盘，此处包含的概念同样适用。


    任何数据库的**阿喀琉斯之踵**都是 I/O。无论数据库使用多少个 CPU，它们在某个时刻都必须等待 I/O。事实上，随着 CPU 每插槽核心数和超线程技术的提高，如今
    CPU 的处理能力很容易超过磁盘的读写速度。此外，像 `TPC-H`（可能还有 `TPC-DS`）这样的数据库基准测试，其性能通常受限于磁盘主轴的数量。再者，诸如磁盘阵列的控制器数量、磁头数量、缓存大小以及某些固件设置等因素，都会影响所能达到的整体
    I/O 带宽。而 RAID 配置对于数据库而言可能至关重要。让我们深入探讨这些方面。


    我们假设您正在一个非共享或专用的 NAS 或 SAN 上进行基准测试，这样您可以要求进行与基准测试工作相关的更改。一个常被忽视的方面是固件的预读算法选择以及读/写缓存大小的配置。我曾遇到过一个
    `TPC-H` 基准测试项目，用户对我们达成的性能结果不满意。当时我们尚未深入到这种级别的优化细节。后来我们更改了固件设置，看到了完成项目所需的性能提升。有时，小细节确实很重要。


    我在基准测试中遇到的另一个令人沮丧的领域（在生产环境中也是非常糟糕的做法）是，数据库过度使用 `RAID 5` 或 `RAID 6`。我理解每个人都想做 RAID，而且我们都认为越大越好（这里的“越大”意味着总的可用空间越多）。但我总是向人们强调，为了获得最佳的数据库性能（无论是基准测试还是生产环境），最好的级别是
    `RAID-10`（有时称为 `RAID-1+0`），无论损失多少空间。空间足够快比拥有大量缓慢的空间要好。然而，我总是发现自己需要提醒人们注意图 6-3
    所展示的 RAID 开销。


    ![../images/464117_1_En_6_Chapter/464117_1_En_6_Fig3_HTML.jpg](img/464117_1_En_6_Fig3_HTML.jpg)


    图 6-3

    不同 RAID 级别的 I/O 影响


    `RAID-10` 的写入次数可能是两次，但那是两次同时将相同数据写入两个不同磁盘的操作，通常任意一次相同的并发 I/O 完成就表示成功。现在看看 `RAID-5`
    和 `RAID-6`，其值分别为 4 和 6。这些写入操作涉及的都是不同的数据。有些是实际数据的切片，有些是奇偶校验字节。关键点在于需要完成的总 I/O 操作多得多，而且必须全部完成后，I/O
    操作才会报告成功。实际性能下降并非真的是 2 倍或 3 倍，但非常明显。因此，在所有数据库基准测试项目（以及生产环境）中都应避免使用 `RAID-5`。


    现在，我们来谈谈数据库基准测试中最常被忽视的 I/O 考虑因素之一：条带宽度和深度（或大小）。假设您的数据库块或页大小为 4K。再假设您的存储管理员为您创建了一个由
    8 个磁盘组成的 `RAID-10` LUN，因此每个数据副本有 4 个磁盘。那么条带宽度就是 4。一个可能的理想条带深度可以这样计算：`N * 块或页大小`，其中
    `N >=1`。这被称为**粗粒度条带化**，旨在通过将许多并发的 I/O 请求分散到更多磁盘上来最大化总体 I/O 吞吐量。这对于高并发 OLTP 系统以及数据仓库被认为是可取的。有时人们（错误地）选择**细粒度条带化**，他们希望每个单一的
    I/O 请求都跨越所有磁盘。他们将条带深度计算为 `块或页大小 / 条带宽度`。虽然这种选择可能使单个 I/O 更快，但它也会使处理大量并发 I/O 操作变慢，因为它们需要排队。请记住，大多数数据库需要处理大量的并发
    I/O，因此选择这个选项可能会导致非常不理想的性能。选择它时，请确保您有充分的理由。


    ## 新存储技术


    过去十年，存储领域发生了三大积极变化：价格更便宜，磁盘容量变得非常大（12TB/盘），并且出现了比传统旋转介质磁盘快得多的新存储技术。让我们探讨一些更常见的新技术。


    第一个突破是固态硬盘或 `SSD`。它们本质上是 NAND 芯片，封装了处理器和控制器，提供的存储在外观和感觉上都与传统磁盘非常相似，但运行速度要快得多。图
    6-4 展示了一个架构示例。


    ![../images/464117_1_En_6_Chapter/464117_1_En_6_Fig4_HTML.jpg](img/464117_1_En_6_Fig4_HTML.jpg)


    图 6-4

    固态硬盘的架构


    然而，`SSD` 有一个主要缺点：它们使用旧的 `AHCI` 和 `SAS/SATA` 协议来访问 NAND 芯片。这些协议是为旋转介质编写和优化的。因此，它们包含了针对内磁道与外磁道以及其他许多不再需要的逻辑。此外，即使
    NAND 芯片可以快速处理数据，这些协议也存在内置的瓶颈，受制于 `SAS/SATA` 的 600 MB/s 和 1200 MB/s 数据传输限制。尽管如此，`SSD`
    仍开启了一个更快 I/O 的时代。


    第二代基于闪存的技术基本上是将 `SSD` 磁盘技术做到一张卡上，插入快速的 `PCIe` 总线，这将数据传输速率大幅提升至 2000 到 8000 MB/s。这些卡可以放置在数据库服务器上，在某些情况下也可以放置在
    `SAN` 或 `NAS` 存储阵列上。事实上，很快出现了一种全新的存储解决方案，称为**全闪存阵列**。


    第三代基于闪存的技术是用非易失性内存快速通道（`NVMe`）取代旧的 `AHCI` 和 `SAS/SATA` 协议。这个新协议是从零开始编写的，专为处理闪存而设计，没有遗留旋转磁盘的包袱。因此，`NVMe`
    提供高达 32000 MB/s 的数据传输速率。这比第一代 `SSD` 快了 53 倍以上。


    此外，还有一些令人兴奋的新技术即将成为主流，例如傲腾（Optane），它提供了接近 RAM 内存的速度，同时具有 `SSD` 般的容量。


    那么，这些新技术如何影响数据库基准测试呢？简单明了的答案是，您可以将数据库放在 `SSD` 或 `NVMe` 闪存上以获得更好的结果。如果您的数据库对于基于闪存的存储来说太大，您仍然可以将
    `TEMP`、`ROLLBACK`、`LOGGING` 等区域放在这些设备上，以加速许多内部数据库操作。我见过一些数据仓库基准测试，我们有 30TB 的数据，无法全部放在闪存上，但仅仅将其用于排序和分组的临时区域，就带来了显著的性能提升。同样，在
    OLTP 基准测试中，仅将闪存用于日志记录和回滚活动，结果也相当惊人。关键在于，即使不能把所有东西都放在闪存上，通过选择合适的、有限的项目放在闪存上，也能带来益处。'
- fmt: '## Specialized Appliances


    One last area where you may be asked to benchmark for is specialized database
    or IO appliances. These were quite popular before the major cloud movement. In
    essence these were simply hardware vendors constructing hyperconverged computer
    systems aimed at improving database performance, typically by both optimizing
    component selection and overall system configuration. Here are some examples:


    *   `Oracle Exadata`

    *   `Oracle Database Appliance (ODA)`

    *   `Dell Fusion IO`

    *   `HP StorageWorks IO Accelerator`

    *   Various Hyperconverged System Solutions


    If you run into any one of these specialized environments where you are to perform
    database benchmarking, my advice is to hire a consultant familiar with such systems.
    For example, `Oracle Exadata` is very complex. I managed an `Exadata` system for
    four years. I learned so many new methods for optimizing database benchmarking
    results utilizing `Exadata`’s unique capabilities. No one book can cover such
    a wealth of detailed information. You’re simply going to need some help.


    ## Summary


    This chapter was somewhat short and covered the key hardware issues worth noting
    and incorporating into any database benchmarking project. Remember that we cannot
    simple throw hardware at a performance problem to solve it. But the corollary
    is also true: we cannot ignore hardware options while trying to solve database
    performance problems. If nothing else, just simply adding an inexpensive `SSD`
    to hold temporary or logging data can yield worthwhile results. Plus some of the
    newer technologies offer over `50X` faster `IO`, with even better things coming
    soon. So never forget to cover the hardware aspects and options when doing database
    benchmarking.


    # 7. Benchmarking Software Options


    The last chapter covered some hardware options important to review and consider
    changing when performing database benchmarking projects. While hardware advances
    the past decade have been nothing short of amazing (e.g., I just built a new desktop
    `PC` where the `CPU` offers `16` logical cores or threads), we cannot and should
    not always automatically look to hardware for solutions to performance issues.
    In reality, most benchmarking efforts can see the largest improvements to performance
    scores by leveraging appropriate new database features. The database vendors have
    likewise made significant improvements, often in response to leverage many new
    hardware technologies. This chapter will focus on both normal database features
    to consider as well as the newer ones that leverage these new hardware technologies.


    You do need to keep two thoughts at the forefront of your thought process related
    to such new database features. First, do the benchmark specs permit using such
    powerful new database features, or at least not specifically state that they cannot
    be used? Second, does your database vendor require additional licensing fees to
    use these cool new features? For example, some database vendors charge extra for
    things such as `multitenant`, `partitioning`, `advanced compression`, and `in-memory`
    while others do not. In fact, one major vendor starting with their latest version
    has all editions offer all features with just the maximum `CPU` and memory limited
    to what is allowed for that edition. *I for one hope others follow this fine example.*


    ### Note


    While this chapter may highlight examples from a given database vendor, the main
    principles and concepts shown throughout this chapter would remain the same. So
    don’t focus on any particular database or vendor mentioned.


    ## Draw a Picture


    When working with any database application software, and especially when doing
    database benchmarking projects, the first and often critical step is to construct
    a database structural diagram (`DSD`) of all the major persistent objects. Note
    that I purposefully did not say an entity relationship diagram (`ERD`) or data
    model since many `DBA`’s neither like nor use them. So I hope that referencing
    it like this will get past any objections. When challenged on this diagramming
    issue, I ask those `DBA`’s who object how they would feel if they were assembling
    a new bicycle for their child and the instructions had zero pictures? I strongly
    believe that in order to troubleshoot database performance issues, you must have
    a diagram since you may not have been part of that initial database design or
    it’s simply too big to visualize in your mind.


    Returning to database benchmarking, most of the specs contain such a structural
    diagram as shown in `Figure [7-1]` for the `TPC-H` benchmark. Note that this diagram
    is clearly not an `ERD` since it does not utilize any standard data modeling notations.
    At best this is a purely physical model that should be more amenable to most `DBA`’s.
    But we can tell from this diagram what the tables are named, what columns they
    have, how they are joined, and some size estimates based on scale factor. But
    there are some key items missing, such as the columns data types and which columns
    are indexed. So a recommendation for your consideration is to reverse engineer
    the database design using a data modeling tool once your benchmarking tool has
    created the objects. That way you’ll have all that extra important information,
    plus you’ll be able to organize the diagram layout to suit your tastes.


    ![../images/464117_1_En_7_Chapter/464117_1_En_7_Fig1_HTML.jpg](images/464117_1_En_7_Chapter/464117_1_En_7_Fig1_HTML.jpg)


    `Figure 7-1` The `TPC-H` Benchmark Entire Schema


    Don’t let this one simple example diagram lull you into a sense of false security;
    the old database benchmarks were overly simple. However, the newer database benchmarks
    are far more complex and realistic. For example, the `TPC-DS` uses a star schema
    design that possesses seven different stars (i.e., subject areas). `Figure [7-2]`
    shows just the `TPC-DS` star schema for store sales. There are six other equally
    complex stars in the overall database design. Note that `Figure [7-2]` and the
    other six subject areas only list the table names and show the base relationship
    without the context of what columns are related. So once again I highly advise
    you reverse engineer the database design using a data modeling tool once your
    benchmarking tool has created the objects.


    ![../images/464117_1_En_7_Chapter/464117_1_En_7_Fig2_HTML.jpg](images/464117_1_En_7_Chapter/464117_1_En_7_Fig2_HTML.jpg)


    `Figure 7-2` `TPC-DS` Benchmark Sales Star Schema


    But the most complicated database design in my opinion is that of the `TPC-DS`
    benchmark shown in `Figure [7-3]`. You really cannot read the table or columns
    names. But you can see there are `34` tables with very complex interrelationships.
    In this respect the `TPC-DS` database design is very much like a real-world database
    design that you might develop for some in-house database application. Imagine
    looking at a `TPC-DS` query that’s `30` lines long and which references `7` tables.
    Without the diagram, how can you comprehend what it’s trying to accomplish let
    alone how those tables are really related and thus how they should be joined.
    Moreover, how could you suggest new indexes or optimizer hints without such knowledge?
    To reverse engineer `Figure [7-3]`, I used `Quest Software`’s `Toad Data Modeler`.
    But any good data modeling tool that offers reverse engineering should suffice.
    In fact, most offer a freeware that’s good for some limited number of objects
    (e.g., `25` or `50`), so you don’t even have to buy a tool to build these diagrams.


    ![../images/464117_1_En_7_Chapter/464117_1_En_7_Fig3_HTML.jpg](images/464117_1_En_7_Chapter/464117_1_En_7_Fig3_HTML.jpg)


    `Figure 7-3` The Complex `TPC-DS` Benchmark Schema


    ### Note


    The features referenced from this point on may or may not be available in your
    database vendor’s offering, and it may be an extra cost item. So make sure to
    verify that you’re properly licensed before using these ideas.'
