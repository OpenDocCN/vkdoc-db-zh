  trans: '## 数据库共存


    第一步是找出目前独立的数据库实例及其数据库中，哪些可以共存于单台虚拟机上。让我们假设目前跨物理服务器的分离是正确的，或者至少是基于兼容的工作负载而合理的。那么我们试图通过图
    8-1 来探索的是，我们能否将物理服务器#1 和#2 连同它们的两个实例和四个数据库合并起来？为了实现这一点，我们需要按照图 8-5 所示进行基准测试。


    这个图表相当复杂，所以我们来检查三个主要部分。该图的底部区域与图 8-4 的左半部分一致，目的是找出可以共存于一台虚拟机上的数据库。该图的顶部区域代表安装了数据库基准测试软件以运行中央命令控制台的台式机或笔记本电脑。该图的中间区域代表基准测试中央命令控制台当前运行的每个实例所需的代理（agents）。


    目前可用的基准测试工具都无法轻松地同时运行多个测试，至少不那么容易或可靠。因此，如果我们需要运行两个并发的数据库基准测试工作负载，以正确模拟之前访问不同物理服务器的应用程序，那么我们将需要运行两个独立的基准测试控制台。此外，根据基准测试规模系数和并发用户会话的数量，每个中央控制台可能需要多个基准测试代理来运行累积的工作负载。事实上，你甚至可能需要将代理分布在多个虚拟机上，甚至跨物理服务器分布，以处理运行整个基准测试工作负载所需的资源。


    ![../images/464117_1_En_8_Chapter/464117_1_En_8_Fig5_HTML.png](img/464117_1_En_8_Fig5_HTML.png)


    **图 8-5** 用于整合的基准测试设置


    图 8-5 所示的架构带来了一些可能不易察觉的管理问题。


    首先，你需要手动协调两个独立基准测试控制台的所有工作。数据库基准测试的运行不会有自动或同步的启动和停止。


    其次，所有关于警告或错误以及运行时性能结果的日志都将是独立且不相关的。因此，同样需要手动努力来剖析和划分你在给定基准测试中获取的信息。


    第三，你可能需要比最初考虑的更多的物理服务器和虚拟机，因此构建如图 8-5 所示的适当数据库基准测试架构可能需要可观的时间和精力。例如，我曾参与一个项目，我们需要超过
    300 个独立的代理，分布在 100 多台虚拟机和十几台物理服务器上，以生成足够的工作负载来充分压力测试候选的、已整合的数据库。所以请相应地做好计划。


    ## 意外问题


    在尝试合并数据库实例及其数据库时，可能会出现一些意外问题。


    想象一下，数据库管理员（DBA）首先通过简单地将两个实例的某个设置相加来设置一个实例配置参数。例如，如果实例#1 需要 100GB 内存，实例#2 需要 50GB
    内存，DBA 可能会将单个整合后的实例配置为 150GB 内存。然而，根据我痛苦的经历，生活中没有什么事情，尤其是数据库实例配置参数，会如此简单。你需要做足功课，很可能需要审查所有关键的数据库实例配置参数。根据你的数据库平台，正确的净设置值可能大于或小于简单相加之和。在某些情况下，比如当该值本应大于总和时，它很可能会扭曲数据库基准测试结果。


    另一个经常冒出来的问题是存储情况。我们一直关注服务器整合，而没有考虑 IO，但我们都知道任何数据库的致命弱点都是物理磁盘 IO。关键问题是，假设存储阵列和
    LUN 保持不变，那就是 IO 带宽。运行 hypervisor 的虚拟化服务器能否提供所有整合数据库所需的最大净 IO 吞吐量，并且最好有额外余量来处理非典型的峰值负载？


    我们将在下一章关于虚拟化数据库基准测试的内容中介绍一些与实现此目标相关的具体问题。目前，这只是一个值得注意的、在整合时需要考虑的事项。当前的基本问题是：物理服务器#1
    是否拥有足够数量的主机总线适配器（HBA）或网络接口卡（NIC），并具有正确的多路径配置，以处理至少两倍于可能的最大并发 IO 请求？如果没有，那么在数据库基准测试工作中很可能会发生
    IO 瓶颈，因为规模和并发用户会话将被特意设定为压力测试最大值。结果当然就是不准确的数据。所以请务必检查 IO 带宽。


    ## 服务器分配


    一旦确定了哪些数据库实例及其所有数据库可以被整合，下一个逻辑问题是：哪些（如果有的话）聚合后的实例可以放在同一台物理或虚拟化服务器上？


    让我们假设你已经虚拟化或使用了云环境，那么这个问题的重要性就大大降低了，因为这些实例可以被重新定位，或者根据需要调整其虚拟机的规模。例如（回到图 8-4），如果我们知道虚拟机#1
    及其实例和四个数据库需要 5X 资源（如本章前面计算的），然后我们确定实例#2 及其两个数据库需要 4X 资源，那么我们就知道我们需要一台能够提供至少 9X
    资源的物理服务器。


    但我们需要再次考虑整合中的无形因素，这些因素可能会扭曲孤立进行的简单计算。我想建议的是，如果计算结果是 9X，那么将其解释为合并后需要 10X 或略大的资源将是更安全的选择。同样，这看起来像是一个懒惰的过度简化，但借助动态虚拟化
    VM 重定位和云服务提供的、覆盖广泛可能性的可调整大小的 VM，精确解决这个问题的必要性远低于简单的整合步骤。'
- fmt: '# Mixing Benchmarks


    When looking to consolidate database instances and their databases, you can almost
    bet money that the databases will be different in nature and purpose, and thus
    their workloads will also be quite different. It’s highly unlikely that you’ll
    be trying to consolidate nearly identical natured databases in all cases, thus
    you will most likely need to tailor your database benchmark tests to best approximate
    the transactional nature and mix you’re attempting to consolidate. Sounds simple
    enough. The problem is that, once again, most of the currently available database
    benchmarking tools generally do not offer an easy way to construct your own database
    benchmarks by combining the existing ones with different weightings or percentages.
    So you end up with an even more complex architecture as shown in `Figure 8-6`.
    Imagine you want to run a mixture of 50% of a `TPC-C` and 50% of a `TPC-H` per
    database. You’d have to have a central console running for each benchmark now,
    or four total benchmarking central consoles – once again having to manually manage
    all the timing, dependencies, and interactions between them. This is basically
    too unwieldy for the average benchmarking user. There simply has to be a better
    way.


    ![../images/464117_1_En_8_Chapter/464117_1_En_8_Fig6_HTML.png](images/464117_1_En_8_Chapter/464117_1_En_8_Fig6_HTML.png)


    `Figure 8-6` Mixing Database Benchmark Types


    I’ve purposefully restrained from recommending any one database benchmarking tool
    for a host of reasons. First, none of these tools is perfect and can be your one
    and only solution. Second, I don’t want to sound like a vendor schill by endorsing
    any solution. But that said, I can honestly say that for this kind of concurrent,
    mixed-database benchmarking execution, scenarios that one tool does offer a feature
    to make this need far more tenable. That tool is Quest Software’s `Benchmark Factory
    (BMF)`. It has a very simple and useful wizard which enables the user to construct
    their own custom database benchmarks as shown in `Figure 8-7`, including allowing
    for meaningful combinations from among the following:


    ![../images/464117_1_En_8_Chapter/464117_1_En_8_Fig7_HTML.jpg](images/464117_1_En_8_Chapter/464117_1_En_8_Fig7_HTML.jpg)


    `Figure 8-7` BMF Allows User-Customized Benchmarks


    *   Industry-standard database benchmarks

    *   application transactions (`OLTP` vs. `DW`)

    *   SQL statements (`SELECT`, `INSERT`, `UPDATE`, and `DELETE`)

    *   Hardware stressing (`CPU`, `Memory`, `Disk IO`, and `Network`)


    Let’s examine the two most valuable of those four options: application transactions
    and hardware stressing. `Figure 8-8` shows the very simple but highly useful application
    transactions option where you simply specify what percentage of `OLTP` type transactions
    vs. the percentage for a data warehouse. Next you provide a scale factor for each
    type of test and you’re done. `BMF` will then create a random mixture of those
    types of transactions in those percentages and run them all in an intermixed order.
    With this one feature alone, most users can quickly and easily construct the database
    benchmarks they require for effective database consolidation.


    ![../images/464117_1_En_8_Chapter/464117_1_En_8_Fig8_HTML.jpg](images/464117_1_En_8_Chapter/464117_1_En_8_Fig8_HTML.jpg)


    `Figure 8-8` BMF Offers Mixed Transaction Workloads


    `Figure 8-9` shows the second, also simple, and useful hardware stressing option
    where you simply specify what percentage of stress to apply to each hardware resource.
    Next you provide a scale factor for each type of test and you’re done. `BMF` will
    once again then create a random mixture of those types of transactions in those
    percentages and run them all in an intermixed order. I would argue that the former
    custom test is better suited for consolidating databases and the latter for calculating
    server distribution (both topics previously covered in this chapter). However,
    you may well find both useful for each stage.


    ![../images/464117_1_En_8_Chapter/464117_1_En_8_Fig9_HTML.jpg](images/464117_1_En_8_Chapter/464117_1_En_8_Fig9_HTML.jpg)


    `Figure 8-9` BMF Offers Hardware Stressing Workloads


    ## Summary


    In this chapter we examined the issues and techniques for performing database
    benchmarking for the purpose of supporting database consolidation efforts. We
    assumed that databases being consolidated would also be virtualized for several
    reasons, including dynamic relocation of virtual machines and virtual machine
    or image sizing for the cloud. This chapter also stressed the special challenges
    required to test multiple databases concurrently and the complex architecture
    required by most of today’s benchmarking tools. Finally, we examined one tool,
    `Benchmark Factory`, that offers some key functionalities that make database consolidation
    testing efforts far easier.


    # 9. Benchmarking for Virtualization


    In this chapter we’re going to review benchmarking considerations for when you
    are benchmarking scenarios in order to virtualize database instances and their
    databases. In many respects the prior chapter on database consolidation is a prerequisite
    for this chapter. That chapter’s benchmarking efforts to identify which databases
    can share an instance in order to reduce the instance count, and then how many
    servers are required to host those instances are much the same. As such, we’ll
    therefore consider the prior chapter the first past part of the virtualization
    effort. This chapter will then deal with the second part: are their issues pertinent
    and specific virtualization that can affect database benchmarking efforts and
    their results.


    In this chapter the examples shown will be from VMware’s hypervisor. Again, I
    am not suggesting that you choose any particular vendor nor endorsing any vendor.
    In this case I am showing VMware for two reasons. First, I happen to have a VMware
    ESX server handy here in my home lab. Second, VMware has a majority market share
    and thus many, if not most, DBAs are somewhat familiar with it. I also have regularly
    utilized VMware Workstation, VMware Player, Oracle Virtual Box, Oracle VM (a Xen-based
    solution), QEMU, and Linux KVM. I mention this mostly to reassure the reader that
    I have sufficient exposure to multiple vendors, and thus I know that the concepts
    presented in this chapter have relevant and similar counterparts across most virtualization
    vendor solutions.


    ### Note


    While this chapter may highlight examples from a given virtualization vendor,
    all the principles and concepts shown in this chapter would apply for any virtualization
    vendor’s solution. The exact name or terminology might change, but the basic concepts
    would still apply.


    ## Server BIOS


    The first and most obvious thing that DBAs need to check before benchmarking is
    whether the physical server’s `BIOS` has been properly configured for running
    any hypervisor. You might assume that any server is shipped from the factory with
    the recommended setting shown in `Table 9-1`, but that’s not always true. Plus
    what if the server has been repurposed or was purchased used; in either case,
    once again, these settings should be checked. I have seen one or twice where these
    were not set, were assumed set, and later discovered during our benchmarking efforts
    when the results were either below expectation or not repeatable. So spend the
    five minutes during a server boot to check the `BIOS` settings just to be sure.


    `Table 9-1` BIOS Settings for Virtualization


    | `BIOS Setting` | `Recommend` |

    | --- | --- |

    | Virtualization Technology | YES |

    | VT-x, VT-d, AMD-V, AMD-Vi | YES |

    | Node Interleaving | NO |

    | Turbo Mode | YES |

    | Hyperthreading | YES |'
  raw: '## Mixing Benchmarks


    When looking to consolidate database instances and their databases, you can almost
    bet money that the databases will be different in nature and purpose, and thus
    their workloads will also be quite different. It’s highly unlikely that you’ll
    be trying to consolidate nearly identical natured databases in all cases, thus
    you will most likely need to tailor your database benchmark tests to best approximate
    the transactional nature and mix you’re attempting to consolidate. Sounds simple
    enough. The problem is that, once again, most of the currently available database
    benchmarking tools generally do not offer an easy way to construct your own database
    benchmarks by combining the existing ones with different weightings or percentages.
    So you end up with an even more complex architecture as shown in Figure [8-6](#464117_1_En_8_Chapter.xhtml#Fig6).
    Imagine you want to run a mixture of 50% of a TPC-C and 50% of a TPC-H per database.
    You’d have to have a central console running for each benchmark now, or four total
    benchmarking central consoles – once again having to manually manage all the timing,
    dependencies, and interactions between them. This is basically too unwieldy for
    the average benchmarking user. There simply has to be a better way.


    ![../images/464117_1_En_8_Chapter/464117_1_En_8_Fig6_HTML.png](images/464117_1_En_8_Chapter/464117_1_En_8_Fig6_HTML.png)


