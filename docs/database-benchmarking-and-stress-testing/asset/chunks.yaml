- fmt: '# 5. Benchmarking Mistakes


    ## Workload Capture


    Sometimes we’re lucky enough to have the tools and the ability to capture real
    workloads and then replay them as our database benchmarking approach. Some of
    the previously mentioned tools offer such capabilities, as well as a few of the
    database vendors. The critical question becomes when is a good time period to
    capture such a workload? Once again it will be far better to question your own
    in-house people who know the application than some outside consultant. You may
    well find that you need to capture multiple workloads: a typical business day,
    a typical business night, plus one or more business event periods. The first obvious
    issue is selecting the proper number and timings of workload periods to capture.
    But another issue often forgotten until the last moment is making arrangements
    for the extra overhead on the production servers for the capture processes plus
    the extra storage to hold that metadata. Some production boxes are so overloaded
    as it is, that getting permission to put an extra 3–5% load on the system is a
    nonstarter. The other major issue with workload capture and replay to prepare
    for is that you must make a complete copy of the production database in order
    to be able to run the captured workload. So more overhead in terms of the disk
    space for that copy plus the time to take a full cold or offline backup. Therefore,
    while workload capture and replay may seem like two very best ways to benchmark,
    the realities are that in many cases it’s just not feasible. And that is without
    considering the extra cost for the workload capture and replay software, which
    for many platforms is quite expensive. You may very much want to do workload capture
    and replay but have to fall back to simple benchmarking. That’s OK if your mission
    statement and answers to all of its questions can be met via database benchmarking
    instead of workload capture and replay.


    ## Distorting Factors


    This may at first seem like an odd section under the topic of preparation. But
    there are many factors to consider up front during preparation, which can have
    a major skewing or distorting effect on your database benchmarking results. If
    you’re going to test on shared storage such as a SAN or NAS, can you at least
    have your own LUNs? Are there periods on a shared SAN or NAS where the normal
    maintenance tasks such as backups can be avoided? Can the database server and
    benchmarking machines be kept on a segregated network segment? There are simply
    too many peripheral issues that could sneak up and bite you. Let me give just
    a few examples of things that were not accounted for prior to benchmarking and
    which totally invalidated our results.


    On one occasion a network switch firmware upgrade was done one weekend during
    our benchmarking efforts. We had not been aware of it, and everyone just assumed
    it could in no way harm our efforts. Wrong! Somehow `VNETs` and `Jumbo Frames`
    settings got hosed during the firmware upgrade. We spent two weeks spinning our
    wheels before we could figure out and prove that some external factor had skewed
    our results. It’s not supposed to happen and yet it did. And this kind of issue
    was a bear to troubleshoot. So when you get radically different benchmarking results
    one week vs. another, then do look for any rare causes. Because generally speaking,
    database benchmarking results really should not vary by more than 5–10% when done
    right.


    On another occasion while testing an `Oracle Real Application Cluster (RAC)` setup,
    our results one week again just went haywire. We looked for nearly four days before
    someone spotted that one of our bonded network cards was throwing low-level errors
    not bubbling up to the OS logs. And because it was bonded it did not fault, it
    just ran much slower, which caused lots of issues for the cluster including nodes
    dropping for no readily apparent reason. At one point one of the DBAs wanted to
    log the problem as an official bug with Oracle that `RAC` could not scale to 20
    nodes reliably. Don’t assume that odd behavior can be ascribed to OS or database
    bugs. Sure, it could happen. But it will be the rare exception and not the rule.
    But it’s very easy to get caught in that trap.


    This last example is yet another strange hardware example. And yes, I know that
    I said these kinds of issues should be quite rare, but if you do enough benchmarks
    then you will encounter more rarities. We had a disk drive starting to fail that
    was part of a `RAID 5 LUN`. The disk failures were not quite critical yet and
    the `RAID` was compensating. But adding those additional parity checks on almost
    every IO added up to the point of skewing the results. We were very lucky as we
    caught this problem with only four hours of lost time in total. But when you’re
    in the final week of a benchmarking project, getting results that suggest the
    other results are tainted is highly unnerving.


    ## Summary


    Although this was a fairly short chapter, it nonetheless covered one of the most
    important aspects of successful database benchmarking: preparation. You can never
    be too prepared. You should allocate sufficient time and resources. You should
    have a plan and know what your expectations are. Database benchmarking projects
    are too important and usually on a tight time line, so you cannot afford to fly
    by the seat of your pants. My advice would be to approach a problem like president
    Abraham Lincoln who said: “Give me six hours to chop down a tree and I will spend
    the first four sharpening the axe.” That’s preparation.


    As the prior chapter stressed, sufficient preparation or lack thereof can make
    or break a database benchmarking effort. For example, not just anyone has all
    the requisite background and skills to successfully run a database benchmark.
    They must know a lot about databases, especially proper configurations, performance
    monitoring, and tuning techniques. Likewise you need to have scheduled ample time
    and other resources for the effort. But assuming you’ve done all that, there are
    still many things that can go wrong during a database benchmarking effort. This
    chapter will highlight some of the major and most common missteps that plague
    many database benchmarking projects once they are underway.


    The key takeaway from this chapter should be that you can do all the preparation
    and yet things can still go wrong. Remember the old saying: “The best-laid plans
    of mice and men often go awry.” I can honestly say that none of the database benchmarking
    projects I’ve worked on went 100% as planned with zero speed bumps along the way.
    However, by knowing that luck, I simply suggest that you remain flexible and avoid
    intransigent behavior during the effort. Moreover, I suggest remembering what
    Robert Schuller said, “Problems are not stop signs; they are guidelines.” The
    central idea presented in Chapter 1 is that database benchmarking by definition
    endeavors “to make the database sweat.” Therefore, you should reasonably expect
    to hit boundary conditions or you’re not pushing the system hard enough.


    ### Note


    The [tpc.org](http://tpc.org) website currently seems to have far less published
    full disclosure reports than in days past. In fact, some database vendor results
    now appear totally absent.'
