    # 数据库基准测试：TPC-E 与 TPC-H


    ## TPC-E


    从表 **2-1** 中可以注意到四个关键差异。首先，`TPC-E` 的表总数是 `TPC-C` 的 3.67 倍。因此它看起来更贴近现实。其次，读写比率更接近常规情况，即大多数活动是密集读取后伴随一些写入。第三，数据基于
    2000 年的人口普查数据，而不是在定义范围内简单生成的随机值。第四也是最后一点，数据库设计强制实施了当今大多数 `OLTP` 应用程序默认会做的引用完整性（事实上，很少有关系数据库专业人员会构建一个不强制外键的
    `OLTP` 数据库）。因此，虽然 `TPC-E` 可能更难理解，但它值得付出努力，因为它比旧的 `TPC-C` 基准更逼真。然而，`TPC-C` 仍然是最常被引用的。


    数据库设计的另一个方面是，允许哪些高级物理数据库选项或模式对象定义修改？`TPC-E` 规范对可以做什么和不可以做什么有相当明确的规定。以下是允许的：


    *   表数据行聚簇

    *   用于主键约束的唯一索引

    *   用于外键约束的非唯一索引

    *   水平表分区

    *   垂直表分区

    *   表复制


    请注意，`TPC-E` 允许两个 `TPC-C` 所没有的项目：表数据行聚簇和外键索引。这再次促成了数据库应用程序更逼真的普遍感觉。因此，当您正在寻找一个逼真的
    `OLTP` 类型数据库基准时，`TPC-E` 是一个非常好的选择。虽然没有哪个基准是完美的，或者能 100% 准确地模仿您的 `OLTP` 应用程序，但
    `TPC-E` 提供了一个非常合理的仿真版本。


