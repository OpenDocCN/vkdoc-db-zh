- fmt: '### Note


    Some DBAs may remember that in the early days of Hyperthreading that it was not
    effective for databases. However, Intel has long since rectified that initial
    issue. But time permitting, you might still want to benchmark with it off just
    in case your database is an exception to the norm.


    ## VM Configuration


    When creating the virtual machine image definition to host their databases, many
    DBAs might focus on the CPU and memory first, with some thought then also to the
    disks allocated. But there are other important settings to be aware of and many
    levels of options for many of these settings. This book is not intended to provide
    a complete, best practices for deploying databases on a hypervisor, but we will
    cover the key ones in this chapter that are proven to have a significant impact
    on database benchmarking.


    ### CPU


    The first and most important CPU guideline is to not overallocate processors.
    This is a hard habit for DBAs to break since for decades, on physical servers
    we generally had to overorder to account for growth and unpredictable peak workloads.
    So it’s sort of ingrained now in our nature. But with virtualization we can dynamically
    add CPUs when needed, often without a reboot depending on the VM operating system
    and database. Plus virtual machines can also be relocated to larger servers or
    those with less total workload (and therefore have extra CPU cycles to leverage).
    Finally remember that all virtual machines must share limited resources, including
    CPUs, so we should not overallocate or we’ll soon end up with just one or two
    virtual machines per physical server.


    Another reason not to overallocate CPU resources is that sometimes it can actually
    not provide any net benefit. For example, let’s assume that you’re running SQL
    Server standard edition, which has a limit of the `lesser` of 4 sockets or 24
    cores. So when you allocate the virtual machine virtual CPUs, you can easily choose
    a suboptimal value without realizing it. In fact, Brent Ozar, a world-renowned
    SQL Server MVP and expert, has written blogs and papers on this very topic. Look
    at Figure [9-1](#464117_1_En_9_Chapter.xhtml#Fig1); this virtual machine, which
    is running SQL Server, has its CPU count defined as 12, meaning 12 sockets, with
    one thread per CPU socket. Therefore SQL Server will not use all 12, but instead
    cap its CPU usage at 4. What the CPU setting should have been set to is 3 with
    4 threads per socket. This is a very easy mistake to make and to overlook when
    diagnosing poor performance. SQL Server is not the only database with such issues,
    I just used it as an example to make the point. This is probably one of the quickest
    and easiest things to correct to improve virtual machine database performance.
    Your virtualization administrators may not be aware of any such database limits,
    so this mistake happens more than you might suspect.


    ![../images/464117_1_En_9_Chapter/464117_1_En_9_Fig1_HTML.jpg](images/464117_1_En_9_Chapter/464117_1_En_9_Fig1_HTML.jpg)

    Figure 9-1


    Inefficient VM CPU Configuration


    The final database virtualization issue I’ll make is not to overassume hyperthreading
    effectiveness. It’s easy to buy the hype and think it means 2X the CPU power since
    the count doubles. The consensus quoted by many DBAs across the web is that hyperthreading
    seems to realistically and reliably yield about 10 to 30% improvement. I suspect
    that there’s some leftover skepticism from earlier versions of hyperthreading,
    so my personal recommended rule of thumb is to count hyperthreading as 50–60%.
    If you’re not overprovisioning, this value should be safe and work well enough
    for most cases. But you’ll have to decide for yourself what value to ascribe.
    Just realize it would be imprudent to assign a value of 100% (or even close to
    it).


    From a database benchmarking perspective, the VM CPU setting and its effectiveness
    can yield a dramatic improvement. Let’s assume you’re running a TPC-C with a large-scale
    factor (e.g., 1,000 warehouses) such that you can run 10,000 concurrent user sessions.
    Clearly the virtual machine’s CPU resource allocation is important when you’re
    running thousands of sessions. But let’s instead assume that you’re running a
    large scale TPC-H or TPC-DS; however with far fewer user sessions, you might then
    consider the CPU setting as less important. But you’d be wrong! These large data
    warehouse workloads run extremely complex queries often against partitioned tables.
    Most database optimizers will attempt to subdivide and parallelize the execution
    of inter and intra partition operations, as well as for large table and index
    scans. So this setting can be critical here as well.


    ### Memory


    The second and equally critical area is virtual machine memory allocations. A
    lot of times DBAs just assume they can use golden rules from days past. That’s
    kind of true, but with some very important twists. When deploying a database on
    a physical server the memory available to that database was just the amount the
    server contained. The DBA would then do some rough calculations along the lines
    of the following:


    `Total VM Mem = Total DB Mem Allocation + (# DB processes + # OS Processes) *
    2MB + OS Mem + VM Overhead`


    However, for a virtual machine you must also incorporate the way the hypervisor
    manages VM memory. Some hypervisors require a driver installed on the VM, which
    permits the hypervisor to steal idle memory from one VM to serve another. VMware
    calls this the `balloon driver`. However the hypervisor obviously cannot borrow
    all the memory, so there is a limit (or floor). You can set that limit for the
    virtual machine, and it is often referred to as reserved memory. You can think
    of it as the absolute memory floor below which the hypervisor cannot borrow further,
    and is set like that shown in Figure [9-2](#464117_1_En_9_Chapter.xhtml#Fig2).
    So in this case I did the calculation like the one above and the number came out
    to 16GB. When I then exclude the last two items (i.e., OS Mem and VM Overheard)
    the value is 12GB, so that’s what I set the reserved memory to. This memory setting
    should significantly reduce the probability of both ballooning and VM OS swapping,
    thereby guaranteeing that the VM reserves the memory it needs for optimum performance.
    Note that the reserved memory plays one other significant role. Let’s assume that
    your hypervisor allows for dynamic VM relocation, then the new host would have
    to have at least the VM’s reserved memory amount free or the VM could not be migrated
    to it.


    ![../images/464117_1_En_9_Chapter/464117_1_En_9_Fig2_HTML.jpg](images/464117_1_En_9_Chapter/464117_1_En_9_Fig2_HTML.jpg)

    Figure 9-2


    Setting a Borrowed Memory Floor


    From a database benchmarking perspective, the VM memory setting can also yield
    impactful improvements. But the reason is related more to the nature of virtualization
    than from a database perspective. If all or most of the virtual machines overcommit
    memory, then the hypervisor might need to perform swapping. This can be very costly
    because the hypervisor does not know the internal VM OS context of its memory
    usage, thus the hypervisor could select memory pages to swap that are suboptimal
    for the guest OS. It could swap out critical VM memory pages that the guest OS
    would not, such as the Linux kernel. The hypervisor could also choose to swap
    out memory pages that are clean at the guest OS level (i.e., empty). Finally,
    a condition referred to as double paging can occur, where both the hypervisor
    and guest OS swap out the same page, which then cause problems when brought back
    in.'
  raw: '### Note


    Some DBAs may remember that in the early days of Hyperthreading that it was not
    effective for databases. However, Intel has long since rectified that initial
    issue. But time permitting, you might still want to benchmark with it off just
    in case your database is an exception to the norm.


    ## VM Configuration


    When creating the virtual machine image definition to host their databases, many
    DBAs might focus on the CPU and memory first, with some thought then also to the
    disks allocated. But there are other important settings to be aware of and many
    levels of options for many of these settings. This book is not intended to provide
    a complete, best practices for deploying databases on a hypervisor, but we will
    cover the key ones in this chapter that are proven to have a significant impact
    on database benchmarking.


    ### CPU


    The first and most important CPU guideline is to not overallocate processors.
    This is a hard habit for DBAs to break since for decades, on physical servers
    we generally had to overorder to account for growth and unpredictable peak workloads.
    So it’s sort of ingrained now in our nature. But with virtualization we can dynamically
    add CPUs when needed, often without a reboot depending on the VM operating system
    and database. Plus virtual machines can also be relocated to larger servers or
    those with less total workload (and therefore have extra CPU cycles to leverage).
    Finally remember that all virtual machines must share limited resources, including
    CPUs, so we should not overallocate or we’ll soon end up with just one or two
    virtual machines per physical server.


    Another reason not to overallocate CPU resources is that sometimes it can actually
    not provide any net benefit. For example, let’s assume that you’re running SQL
    Server standard edition, which has a limit of the **lesser** of 4 sockets or 24
    cores. So when you allocate the virtual machine virtual CPUs, you can easily choose
    a suboptimal value without realizing it. In fact, Brent Ozar, a world-renowned
    SQL Server MVP and expert, has written blogs and papers on this very topic. Look
    at Figure [9-1](#464117_1_En_9_Chapter.xhtml#Fig1); this virtual machine, which
    is running SQL Server, has its CPU count defined as 12, meaning 12 sockets, with
    one thread per CPU socket. Therefore SQL Server will not use all 12, but instead
    cap its CPU usage at 4\. What the CPU setting should have been set to is 3 with
    4 threads per socket. This is a very easy mistake to make and to overlook when
    diagnosing poor performance. SQL Server is not the only database with such issues,
    I just used it as an example to make the point. This is probably one of the quickest
    and easiest things to correct to improve virtual machine database performance.
    Your virtualization administrators may not be aware of any such database limits,
    so this mistake happens more than you might suspect.


    ![../images/464117_1_En_9_Chapter/464117_1_En_9_Fig1_HTML.jpg](images/464117_1_En_9_Chapter/464117_1_En_9_Fig1_HTML.jpg)


    Figure 9-1


    Inefficient VM CPU Configuration


    The final database virtualization issue I’ll make is not to overassume hyperthreading
    effectiveness. It’s easy to buy the hype and think it means 2X the CPU power since
    the count doubles. The consensus quoted by many DBAs across the web is that hyperthreading
    seems to realistically and reliably yield about 10 to 30% improvement. I suspect
    that there’s some leftover skepticism from earlier versions of hyperthreading,
    so my personal recommended rule of thumb is to count hyperthreading as 50–60%.
    If you’re not overprovisioning, this value should be safe and work well enough
    for most cases. But you’ll have to decide for yourself what value to ascribe.
    Just realize it would be imprudent to assign a value of 100% (or even close to
    it).


    From a database benchmarking perspective, the VM CPU setting and its effectiveness
    can yield a dramatic improvement. Let’s assume you’re running a TPC-C with a large-scale
    factor (e.g., 1,000 warehouses) such that you can run 10,000 concurrent user sessions.
    Clearly the virtual machine’s CPU resource allocation is important when you’re
    running thousands of sessions. But let’s instead assume that you’re running a
    large scale TPC-H or TPC-DS; however with far fewer user sessions, you might then
    consider the CPU setting as less important. But you’d be wrong! These large data
    warehouse workloads run extremely complex queries often against partitioned tables.
    Most database optimizers will attempt to subdivide and parallelize the execution
    of inter and intra partition operations, as well as for large table and index
    scans. So this setting can be critical here as well.


    ### Memory


    The second and equally critical area is virtual machine memory allocations. A
    lot of times DBAs just assume they can use golden rules from days past. That’s
    kind of true, but with some very important twists. When deploying a database on
    a physical server the memory available to that database was just the amount the
    server contained. The DBA would then do some rough calculations along the lines
    of the following:


    *   `Total VM Mem = Total DB Mem Allocation + (# DB processes + # OS Processes)
    * 2MB + OS Mem + VM Overhead`


    However, for a virtual machine you must also incorporate the way the hypervisor
    manages VM memory. Some hypervisors require a driver installed on the VM, which
    permits the hypervisor to steal idle memory from one VM to serve another. VMware
    calls this the “*balloon driver.*” However the hypervisor obviously cannot borrow
    all the memory, so there is a limit (or floor). You can set that limit for the
    virtual machine, and it is often referred to as reserved memory. You can think
    of it as the absolute memory floor below which the hypervisor cannot borrow further,
    and is set like that shown in Figure [9-2](#464117_1_En_9_Chapter.xhtml#Fig2).
    So in this case I did the calculation like the one above and the number came out
    to 16GB. When I then exclude the last two items (i.e., OS Mem and VM Overheard)
    the value is 12GB, so that’s what I set the reserved memory to. This memory setting
    should significantly reduce the probability of both ballooning and VM OS swapping,
    thereby guaranteeing that the VM reserves the memory it needs for optimum performance.
    Note that the reserved memory plays one other significant role. Let’s assume that
    your hypervisor allows for dynamic VM relocation, then the new host would have
    to have at least the VM’s reserved memory amount free or the VM could not be migrated
    to it.


    ![../images/464117_1_En_9_Chapter/464117_1_En_9_Fig2_HTML.jpg](images/464117_1_En_9_Chapter/464117_1_En_9_Fig2_HTML.jpg)


    Figure 9-2


    Setting a Borrowed Memory Floor


    From a database benchmarking perspective, the VM memory setting can also yield
    impactful improvements. But the reason is related more to the nature of virtualization
    than from a database perspective. If all or most of the virtual machines overcommit
    memory, then the hypervisor might need to perform swapping. The can be very costly
    because the hypervisor does not know the internal VM OS context of its memory
    usage, thus the hypervisor could select memory pages to swap that are suboptimal
    for the guest OS. It could swap out critical VM memory pages that the guest OS
    would not, such as the Linux kernel. The hypervisor could also choose to swap
    out memory pages that are clean at the guest OS level (i.e., empty). Finally,
    a condition referred to as double paging can occur, where both the hypervisor
    and guest OS swap out the same page, which then cause problems when brought back
    in.'
  trans: '

    ### 注意事项


    一些数据库管理员可能还记得，在超线程技术早期，它对数据库并不高效。然而，英特尔公司早已修复了那个最初的问题。但如果时间允许，您可能仍想在关闭超线程的情况下进行基准测试，以防您的数据库是个例外。


    ## 虚拟机配置


    在创建用于托管其数据库的虚拟机镜像定义时，许多数据库管理员可能会首先关注 CPU 和内存，其次才会考虑到分配的磁盘。但还有其他重要设置需要留意，而且其中许多设置都有多层选项。本书的目的并非提供在虚拟机监控程序上部署数据库的完整最佳实践，但我们将在本章中涵盖那些被证明对数据库基准测试有显著影响的关键配置。


    ### CPU


    首要且最重要的 CPU 准则是**不要过度分配处理器**。这对数据库管理员来说是个难以改掉的习惯，因为在物理服务器的几十年里，我们通常必须超量订购以应对增长和不可预测的峰值工作负载。所以这几乎已根深蒂固。但在虚拟化环境中，我们可以在需要时动态添加
    CPU，通常无需重启（取决于虚拟机操作系统和数据库）。此外，虚拟机也可以被迁移到更大的服务器或总工作负载较少（因此有额外 CPU 周期可利用）的服务器上。最后要记住，所有虚拟机都必须共享有限的资源，包括
    CPU，因此我们不应过度分配，否则很快就会导致每个物理服务器上只运行一两个虚拟机。


    不应过度分配 CPU 资源的另一个原因是，有时它实际上并不能带来任何净收益。例如，假设您运行的是 SQL Server 标准版，它有一个限制，即`lesser`（两者中较小者）为
    4 个插槽或 24 个核心。因此，当您为虚拟机分配虚拟 CPU 时，很容易在不经意间选择一个次优值。事实上，世界知名的 SQL Server MVP 和专家
    Brent Ozar 就这一主题撰写过博客和文章。看图 9-1；这台运行 SQL Server 的虚拟机，其 CPU 数量定义为 12，即 12 个插槽，每个
    CPU 插槽一个线程。因此，SQL Server 不会使用全部 12 个，而是将其 CPU 使用率限制在 4。CPU 设置本应设为 3 个插槽，每个插槽 4
    个线程。这是一个非常容易犯也容易忽视的错误，尤其是在诊断性能不佳时。SQL Server 并非唯一存在此类问题的数据库，我只是以此为例来说明观点。这可能是提高虚拟机数据库性能最快速、最简单的纠正措施之一。您的虚拟化管理员可能不了解任何此类数据库限制，因此这个错误的发生频率可能超出您的想象。


    ![../images/464117_1_En_9_Chapter/464117_1_En_9_Fig1_HTML.jpg](img/464117_1_En_9_Fig1_HTML.jpg)

    图 9-1


    低效的虚拟机 CPU 配置


    我要讲的最后一个数据库虚拟化问题是，**不要高估超线程的有效性**。人们很容易相信炒作，认为 CPU 数量翻倍就意味着 CPU 能力翻倍。网上许多数据库管理员引用的共识是，超线程似乎能现实且可靠地带来大约
    10%到 30%的提升。我怀疑这是对早期版本超线程技术残留的怀疑态度所致，因此我个人建议的经验法则是，将超线程视为 50%–60%的提升。如果您没有过度分配资源，这个值应该是安全的，并且对大多数情况来说足够好。但您必须自己决定赋予它什么值。只需意识到，赋予
    100%（或接近 100%）的值是轻率的。


    从数据库基准测试的角度来看，虚拟机 CPU 设置及其有效性可以带来显著的性能提升。假设您正在运行一个大规模因子（例如，1000 个仓库）的 TPC-C 测试，使得您可以运行
    10,000 个并发用户会话。显然，当您运行数千个会话时，虚拟机的 CPU 资源分配至关重要。但再假设您正在运行一个大规模的 TPC-H 或 TPC-DS；然而，如果用户会话数量要少得多，您可能会认为
    CPU 设置不那么重要。那您就错了！这些大型数据仓库工作负载通常运行极其复杂的查询，且往往针对分区表。大多数数据库优化器会尝试细分并并行执行分区之间和分区内部的操作，以及大表和索引扫描。因此，这个设置在这里同样至关重要。


    ### 内存


    第二个同样关键的领域是虚拟机内存分配。很多时候，数据库管理员只是假设他们可以沿用过去的黄金法则。这在某种程度上是对的，但有一些非常重要的转折。在物理服务器上部署数据库时，该数据库可用的内存就是服务器所包含的内存量。然后，数据库管理员会做一些粗略的计算，类似于：


    `虚拟机总内存 = 数据库总内存分配 + (数据库进程数 + 操作系统进程数) * 2MB + 操作系统内存 + 虚拟机开销`


    然而，对于虚拟机，您还必须结合虚拟机监控程序管理虚拟机内存的方式。一些虚拟机监控程序需要在虚拟机上安装一个驱动程序，允许虚拟机监控程序从一个虚拟机窃取空闲内存来服务另一个虚拟机。VMware
    称之为`气球驱动程序`。但虚拟机监控程序显然不能借用所有内存，因此存在一个限制（或下限）。您可以为虚拟机设置该限制，它通常被称为保留内存。您可以将其视为虚拟机监控程序无法再借用的绝对内存下限，其设置方式如图
    9-2 所示。因此，在这种情况下，我按照上面的公式进行计算，得出的数字是 16GB。当我排除最后两项（即操作系统内存和虚拟机开销）后，值是 12GB，所以我将保留内存设为
    12GB。此内存设置应显著降低气球膨胀和虚拟机操作系统交换的概率，从而保证虚拟机保留其最佳性能所需的内存。请注意，保留内存还有另一个重要作用。假设您的虚拟机监控程序允许动态虚拟机迁移，那么新的主机必须至少有该虚拟机的保留内存量是空闲的，否则虚拟机无法迁移到该主机。


    ![../images/464117_1_En_9_Chapter/464117_1_En_9_Fig2_HTML.jpg](img/464117_1_En_9_Fig2_HTML.jpg)

    图 9-2


    设置一个借用内存下限


    从数据库基准测试的角度来看，虚拟机内存设置也能带来有影响的性能提升。但其原因更多与虚拟化的性质有关，而非数据库视角。如果所有或大多数虚拟机都过度使用内存，那么虚拟机监控程序可能需要执行交换。这可能代价高昂，因为虚拟机监控程序不知道客户虚拟机操作系统的内部内存使用情况，因此它可能选择交换出对客户操作系统来说非最优的内存页。它可能交换出客户操作系统本不会交换的关键虚拟机内存页，例如
    Linux 内核。虚拟机监控程序也可能选择交换出在客户操作系统级别是“干净”的内存页（即空页）。最后，可能发生一种称为“双重分页”的情况，即虚拟机监控程序和客户操作系统都交换出同一个内存页，当该页被调回时就会引发问题。

