  trans: '

    这个窗口有两大关注区域：右上角和中间部分。中间部分相当简单：它显示正在运行的虚拟用户、它们的状态以及是否已完成。第一个值得注意的点是，虽然我们选择了四个虚拟用户，但实际上有五个；为什么呢？答案很简单。当你请求多个虚拟用户时，会有一个协调器/监控用户会话，在本例中就是虚拟用户#1。你可以通过查看每个虚拟用户的第一行来辨别，用户#2
    到#5 显示为等待工作线程，这意味着它们正在等待控制会话。


    当构建过程最终完成 100%时，你会知道，其显示内容包含图 3-15 中突出显示的四个关键项目。第一，虚拟用户线程已全部完成。第二，每个虚拟用户的状态都显示一个绿色对勾。第三，每个子虚拟用户线程都以`TABLES
    COMPLETE`结束。第四，也是最后一点，主虚拟用户线程显示`CREATING INDEXES`、`UPDATING STATISTICS`和`SCHEMA
    COMPLETE`。缺少任何一点，你都需要删除数据库及其对象才能重复此步骤。请注意，可能出现问题的地方很多，所以如果你确实需要重复此步骤，也不要惊讶或沮丧。


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig15_HTML.jpg](img/464117_1_En_3_Fig15_HTML.jpg)


    图 3-15


    HammerDB 加载完成


    #### 步骤 #2：加载驱动脚本


    我们现在继续，展开 `Driver Script` 树视图节点，然后双击 `Options` 节点，这会启动基准测试脚本编码选项，如图 3-16 所示。请注意，步骤#2
    整体上比前一步骤简单得多，因此也更短；所以本节内容相对简短是有意为之。


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig16_HTML.jpg](img/464117_1_En_3_Fig16_HTML.jpg)


    图 3-16


    HammerDB 驱动脚本选项


    我们再次简单地定义数据库连接标准，即哪个数据库包含这些对象、最大并行度(`MAXDOP`)，以及每个虚拟用户执行 22 个 TPC-H 查询的迭代次数。和之前一样，尽管此屏幕可能因数据库平台而异，但大多数数据库管理员会发现所有要求的信息都相当明显。


    与之前的模式选项屏幕类似，驱动选项屏幕也会根据所设置的数据库基准测试略有不同，如图 3-17 所示。请注意，HammerDB 默认将`keying`和`thinking`时间设置为未选中（即零时间），即使规范要求设置这些。我怀疑这是因为产品名称中包含`hammer`一词，因此默认设置倾向于对数据库施加压力以获得尽可能高的
    TPS。然而，其他数据库基准测试工具（例如，Benchmark Factory）没有提供启用或禁用这些设置的功能。我见过许多数据库管理员 wonder 为什么一个工具会产生截然不同的
    TPS 和平均响应时间，正是因为他们忽略了这一个细节。他们通常只是假设 HammerDB 更优越，因为它获得了更高的 TPS。因此，如果你希望能够进行公平的比较，请务必注意不同工具中这类设置的差异。


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig17_HTML.jpg](img/464117_1_En_3_Fig17_HTML.jpg)


    图 3-17


    不同的 HammerDB 驱动选项


    现在选择了驱动脚本选项，是时候简单地加载反映了这些值的基准测试脚本了。为此，我们再次查看 `Driver Script` 树视图节点下，但现在双击 `Load`
    节点，这会将生成的基准测试执行脚本加载到脚本编辑器中，如图 3-18 所示。


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig18_HTML.jpg](img/464117_1_En_3_Fig18_HTML.jpg)


    图 3-18


    HammerDB 生成的驱动脚本


    我想任何称职的 TCL 编程语言编码员都可以选择修改生成的脚本。然而，我发现这段 TCL 代码试图实现基准测试规范，因此相当复杂。所以我的建议是，只修改选项并重新加载新的结果脚本。不过我不再是程序员了，也许我只是感到害怕和懒惰。读者可以自行判断是否可能对生成的代码进行改进。请记住，务必保存你修改后的脚本，以便将来使用。

    '
- fmt: '## Step #3: Create Virtual Users


    We now continue by expanding the `Virtual User` tree-view node and then double-clicking
    on the `Options` node, which launches the virtual users options as shown in Figure
    [3-19](#464117_1_En_3_Chapter.xhtml#Fig19). Note that step #3 is also a shorter
    and less complex step; therefore like section #2 this section is rather brief
    on purpose.


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig19_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig19_HTML.jpg)


    Figure 3-19: HammerDB Virtual User Options


    Here we must specify the number of concurrent virtual users desired, length of
    virtual user delay or `think time`, length of the processing delay or `lag time`,
    and the number of iterations to repeat the entire workload per virtual user. Note
    that while this screen in Figure [3-18](#464117_1_En_3_Chapter.xhtml#Fig18) seems
    pretty straightforward and easy, you want to take your time on this screen as
    these values may be defined and/or mandated by the spec and not default appropriately
    on this screen. Failure to pay attention here could well result in unexpected
    and unrepeatable results.


    For example, let’s assume we had instead been instead doing a `TPC-C` benchmark
    and during the database object creation and data loading stage had requested,
    say, `10 warehouses`. The `TPC-C` spec clearly defines the maximum allowable number
    of users per warehouse as `10`. Yet this screen would allow us to request `200
    concurrent virtual users` and further would not warn that this is out of spec.
    This would likely result in undo database row contention and also incorrect results
    due to insufficient, separate rows for the users to process. You might even see
    database deadlock errors. No matter what, the results will likely be unreliable
    and unrepeatable.


    There is also one more major caveat worth mentioning here. While HammerDB offers
    the ability to define both the delays between virtual users starting their processing
    and between iterations, other tools might not. Once again settings like this can
    make two different database benchmarking tools seem to yield different results.
    But the harsh fact is you reap what you sow. Therefore, pay attention to details
    like these.


    With the virtual user options now selected, it’s time to spawn those virtual user
    session processes as idle, but ready to go. For that we again look under the `Virtual
    User` tree-view node, but now double-click on the `Create` node, which then spawns
    or forks those idle virtual user sessions as shown in Figure [3-20](#464117_1_En_3_Chapter.xhtml#Fig20).


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig20_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig20_HTML.jpg)


    Figure 3-20: HammerDB Virtual User Launch


    There are a couple of noteworthy items in Figure [3-20](#464117_1_En_3_Chapter.xhtml#Fig20)
    to recognize and appreciate. First, there are exactly the requested number of
    virtual users, and there are no controlling or monitoring additions as there was
    in the database object loading stage. Second, if you have requested `100 virtual
    users`, then make sure to scroll through the list and verify that you actually
    got the requested number spawned and ready to go. It’s very easy to forget that
    step and not realize the reason the results are unrepeatable are that the virtual
    user count has varied due to some unforeseen issue such as insufficient memory
    on your machine or database limits on the number of concurrent connections allowed.


    ## Step #4: Execute the Benchmark


    We are finally to the most important stage: actually running the database benchmark.
    For that we continue by expanding the `Virtual User` tree-view node (with the
    assumption that the virtual users are already spawned) and then double-click on
    the `Run` node, which simply releases the idle virtual user sessions to each execute
    the generated script with the user-defined scripting options as shown in Figure
    [3-21](#464117_1_En_3_Chapter.xhtml#Fig21).


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig21_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig21_HTML.jpg)


    Figure 3-21: HammerDB Executing a Benchmark


    Note that the output shows that the first query of the 22 defined in the spec
    being run is query #14. Don’t let that confuse or bother you as it will run all
    the queries as required. The order is simply randomized such that not all concurrent
    sessions will run the same query at the same time. The random order will more
    closely match how real users would mostly all be running different queries at
    different times. You’ll know when the benchmark has successfully completed when
    you see screen output like that shown in Figure [3-22](#464117_1_En_3_Chapter.xhtml#Fig22).
    Note that the virtual user shows it completed with a green status and that it
    took `150 seconds` to run the 22 queries.


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig22_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig22_HTML.jpg)


    Figure 3-22: HammerDB Benchmark Completed


    ## Monitoring the Performance


    Note that simply knowing how long it took to run a benchmark is generally not
    the most robust and useful statistic. For the `TPC-H` the queries per hour (`QpH`)
    might be more useful, and for the `TPC-C` the transactions per minute (`TpM`).
    Neither of these is the final reported value that the spec requires be calculated
    for publication, but usually these are good enough for most DBAs. So how do we
    get such information from HammerDB? It’s quite easy actually; we simply initiate
    the transaction counter. Many DBAs do this only during the execution portion of
    the benchmark, although you can monitor the create and load phase as well if you
    wish. Either way all you have to do is to define the transaction counter’s database
    connection info as shown in Figure [3-23](#464117_1_En_3_Chapter.xhtml#Fig23).


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig23_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig23_HTML.jpg)


    Figure 3-23: Configuring the Transaction Counter


    Then you simply initiate the transaction counter collection by double-clicking
    on the `Counter` tree-view node, which results in the waiting status for the transaction
    counter screen as shown in Figure [3-24](#464117_1_En_3_Chapter.xhtml#Fig24).


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig24_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig24_HTML.jpg)


    Figure 3-24: Transaction Counter Waiting


    Now when you run a database benchmark you will see the transaction counter screen
    updated as shown in Figure [3-25](#464117_1_En_3_Chapter.xhtml#Fig25).


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig25_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig25_HTML.jpg)


    Figure 3-25: Transaction Counter Working'
