    improvements. Note however that none of the current database benchmarking tools
    offers to leverage such features either automatically or via options. So it’s
    up to you as the DBA to manually add these to the mix. This extra effort is often
    more than justified.


    Finally to better understand the TPC-DS more fully, you really need to review
    the spec and examine all 100 complex queries. The TPC-DS specification is focused
    mainly on obtaining business answers from a potentially massive dataset. From
    that viewpoint, the most important part of the TPCDS benchmark are the nearly
    100 individual queries that attempt to provide answers for these particular business
    questions. Each of the TPC-DS queries implements varying degrees of analytic complexity;
    some queries access 10 or more fact and dimension tables, thus producing varying
    and complex execution plans depending upon the values supplied for the query selection
    criteria. Listing [2-2](#464117_1_En_2_Chapter.xhtml#PC2) shows one of the TPC-DS’s
    queries, the business query 6 (Q6). As per the TPC-DS spec, this query lists all
    the states with at least 10 customers who during a given month bought items with
    the price tag at least 20% higher than the average price of items in the same
    category.


    ```

    SELECT a.ca_state state, COUNT(*) cnt

    FROM  tpcds.customer_address a ,

    tpcds.customer c ,

    tpcds.store_sales s ,

    tpcds.date_dim d ,

    tpcds.item i

    WHERE a.ca_address_sk   = c.c_current_addr_sk

    AND c.c_customer_sk   = s.ss_customer_sk

    AND s.ss_sold_date_sk = d.d_date_sk

    AND s.ss_item_sk      = i.i_item_sk

    AND d.d_month_seq = (SELECT DISTINCT (d_month_seq)

    FROM  tpcds.date_dim

    WHERE d_year = 2001

    AND d_moy    = 6)

    AND i.i_current_price > 1.2 * (SELECT AVG(j.i_current_price)

    FROM  tpcds.item j

    WHERE j.i_category = i.i_category)

    GROUP BY a.ca_state

    HAVING COUNT(*) >= 10

    ORDER BY cnt

    Listing 2-2

    TPC-DS Query #6

    ```


    Note that there is currently only one database benchmarking tool that has implemented
    the TPC-DS benchmark. But given the current market hype on all things related
    to data analytics, I would expect other tools to follow suit in the near future.
    However, this benchmark with 7 star schemas and 100 complex queries presents a
    formidable challenge to implement.


    ### Note


    The following sections will cover the remaining less popular or obsolete database
    benchmarks in lesser detail. That doesn’t necessarily mean they are not as complex
    or not worthwhile, just that the prior database benchmarks are more common and
    thus ones that readers are likely to perform.


    ## Less Popular Benchmarks


    ### TPC-DI


    Looking back over the popular database benchmarks we have tests for OLTP, general
    reporting, and star schema data warehouses. What’s missing is loading data via
    batch jobs into reporting systems and data warehouses? In fact, over the years
    the sheer amount of data being loaded and retained has mushroomed. So much so
    that term extract, transform, and load (ETL) has been replaced with the more comprehensive
    term data integration (DI). And so the TPC-DI benchmark was born to address this
    special and important niche. The conceptual model of the TPC-DI system architecture
    is shown in Figure [2-12](#464117_1_En_2_Chapter.xhtml#Fig12).


    ![../images/464117_1_En_2_Chapter/464117_1_En_2_Fig12_HTML.jpg](images/464117_1_En_2_Chapter/464117_1_En_2_Fig12_HTML.jpg)


    Figure 2-12


    TPC-DS System Conceptual Model


    This diagram should not surprise anyone as it’s the typical architecture diagram
    shown whenever creating a data warehouse. Some people might skip the staging area
    concept and load directly into the data warehouse, hence why the staging area
    is surrounded by a dotted line (i.e., optional). The target data warehouse design
    is a traditional dimensional model, commonly referred to as a star schema. This
    approach was best described in 2002 by Ralph Kimball’s book *The Data Warehouse
    Toolkit* (Wiley). However, Ralph actually first proposed such design while he
    was at Redbrick, an early entrant into the data warehouse database vendor space.
    I actually met Ralph back around 1995 when he was doing live seminars. He taught
    me star schema and I taught him data modeling (I was working for Logic Works,
    the maker of the Erwin data modeling tool). I also wrote a book in 2003 based
    on what I learned in 1995 and then practiced for over eight years titled *Oracle
    DBA Guide to Data Warehousing and Star Schemas* (Prentice Hall). While that book
    may be 15 years old now, the techniques espoused remain relevant even today.


    The TPC-DI data warehouse’s basic conceptual data model is shown in Figure [2-13](#464117_1_En_2_Chapter.xhtml#Fig13).


    ![../images/464117_1_En_2_Chapter/464117_1_En_2_Fig13_HTML.jpg](images/464117_1_En_2_Chapter/464117_1_En_2_Fig13_HTML.jpg)


    Figure 2-13


    TPC-DS Conceptual Data Model


    For those new to data warehousing, two different terms show up. Dimension tables
    are smaller, de-normalized tables containing business descriptive columns that
    end users query on. It’s not uncommon for these tables to be fully indexed to
    best support ad hoc queries. Fact tables are very large tables with primary keys
    formed from the concatenation of all related dimension table foreign key columns,
    and possessing numerically additive, non-key columns used for calculations during
    end-user queries.


    ### TPC-VMS


    With the virtualization craze the past decade, it was inevitable that databases,
    even large, mission critical ones, would end up running as a virtual machine (VM)
    on a Hypervisor (e.g., VMware). SQL Server database administrators and those on
    open source databases readily embraced this move. On some database platforms such
    as Oracle the database administrators resisted at first and then were slow to
    fully adopt. However, with time and now databases in the cloud, few if any database
    administrators have any reservations about placing their database on a VM. That
    resulted in the need for a reliable database benchmark for a virtual machine environment.
    Remember that a Hypervisor on a server may have many VM’s running concurrently,
    thus special considerations for database consolidation of dissimilar types of
    databases must also be handled.


    Introduced in 2012 the TPC-VMS was designed to meet this special need. The TPC-VM
    benchmark leverages the popular benchmarks from the prior section (i.e., TPC-C,
    TPC-E, TPC-H, and TPC-DS). However, the TPC-VM considers its version of each test
    to be unique, and thus comparable neither to each other nor to the base benchmarks
    from which they were derived. When you instantiate a TPC-VM benchmark you select
    one of the four, and then three VM’s each running the same size database for the
    chosen benchmark are run. The way the results are calculated is also different.
    But since it’d not very popular we’ll forgo those. They are defined in full in
    the spec.


    The only shortcoming in my opinion is that I would rather have had the TPC-VMS
    run three different benchmarks of the four or even all four so that dissimilar
    workloads could be tested. Maybe this will be addressed in a future spec update
    or possibly even a whole new benchmark (since the scoring would probably have
    to be different).'
