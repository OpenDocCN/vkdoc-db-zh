  trans: '## 捕获/回放示例


    本节将演示如何使用数据库基准测试工具执行工作负载的捕获与回放。不过，我打算“作弊”，因为我将同时使用该基准测试工具来生成用于捕获的工作负载。因此，我将针对源数据库运行一个`TPC-H`基准测试，并通过原生数据库机制（本例中是`Oracle`跟踪文件）捕获该工作负载。然后，我将使用相同的基准测试工具来读取并回放这些事务。这个示例本身可能不太实用，但它将完整演示应遵循的正确流程。我们将使用的基准测试工具是
    Quest Software 的 `Benchmark Factory`。


    第一步是按照第 5 章的建议创建两个`TPC-H`数据库基准测试作业：第一个用于加载数据库对象，第二个用于运行实际的基准测试工作负载。其次，运行数据库加载对象项目。在加载项目运行的同时，我们可以对基准测试的执行进行一些微小的修改。请记住，在本例中我们使用的是`Oracle`，但对于其他数据库平台，其概念和流程是相似的。我们只需要在基准测试的执行中手动添加一些语句，如图
    11-2 所示。我添加了 `START_TRACE_1` 和 `START_TRACE_2`，它们分别包含以下两个`Oracle`命令：


    ![../images/464117_1_En_11_Chapter/464117_1_En_11_Fig2_HTML.jpg](img/464117_1_En_11_Fig2_HTML.jpg)

    *图 11-2：向数据库日志工作负载中添加命令*


    *   `ALTER SESSION SET tracefile_identifier=TPC_H;`

    *   `ALTER SESSION SET EVENTS''10046 trace name context forever, level 12'';`


    通过添加这两个非常特殊的`SQL`语句，`Oracle`将创建跟踪文件，并在其文件名中包含字符串`TPC_H`，从而使这些文件更易于识别。然后，我只需运行基准测试执行项目，该项目将运行`TPC-H`行业标准基准测试的
    22 条复杂`SQL SELECT`命令，并生成一个跟踪文件（包含所有绑定变量值），如图 11-3 所示。


    ![../images/464117_1_En_11_Chapter/464117_1_En_11_Fig3_HTML.jpg](img/464117_1_En_11_Fig3_HTML.jpg)

    *图 11-3：基准测试运行创建的 Oracle 跟踪文件*


    然后，这个跟踪文件可以由基准测试工具作为项目的命令加载并运行，如图 11-4 所示。同样请注意此图，除了`Oracle`跟踪文件之外，还有其他选项可用于创建工作负载回放测试。例如，如果你的应用程序是可计量的，并且可以指示其生成所运行`SQL`语句及其绑定值的文本文件日志，那么该日志也可以被解析并加载到此工具中。因此，除了数据库供应商的解决方案外，执行工作负载捕获与回放的方法不止几种。虽然我在此重点介绍了`Benchmark
    Factory`，但`HammerDB`和`Swingbench`都提供类似的功能和特性。


    ![../images/464117_1_En_11_Chapter/464117_1_En_11_Fig4_HTML.jpg](img/464117_1_En_11_Fig4_HTML.jpg)

    *图 11-4：从跟踪文件创建基准测试作业*


    好处在于，当`Benchmark Factory`加载和解析跟踪文件时，它提供了导入整个文件或将其限制在某个日期/时间范围内的选项，如图 11-5 所示。这非常有用，因为可能捕获了数小时的活动，但只想回放其中一部分事务。事实上，这在调优和优化时非常有用。想象一下，第一次运行从上午
    10:00 到下午 2:00 的工作负载回放，并能够识别出最大的问题发生在 12:00 到 12:30 之间。现在，你可能尝试通过更改数据库配置参数来纠正该问题。然后，你可以简单地重新运行工作负载回放，并将其限制在相关时间段内。仅此一项功能就能节省大量时间，使此特性非常值得使用。


    ![../images/464117_1_En_11_Chapter/464117_1_En_11_Fig5_HTML.jpg](img/464117_1_En_11_Fig5_HTML.jpg)

    *图 11-5：限制用于回放的跟踪文件输入*


    ## 总结


    在本章中，我们探讨了执行数据库工作负载捕获与回放的问题和技术。关键问题在于，工作负载捕获/回放由于其性质，需要双倍的硬件和软件许可证。此外，你必须确定合适的时间段和持续时间，以捕获既不太短也不太长的有用工作负载。然后，你需要一个适用于你的数据库平台的捕获/回放工具，可能来自供应商或第三方。接着，你可以重复回放捕获的工作负载，以便通过你当前使用的任何标准数据库监控和调优工具来识别和纠正`SQL`语句性能问题。其目标简单来说，就是改善用户对数据库系统性能的感知。


    # 12. 数据库压力测试


    在这最后一章中，我们将讨论简单的数据库压力测试，并介绍一个我编写的免费脚本工具，供大家使用或修改以满足其特定需求。压力测试很像行业标准基准测试，因为它试图对数据库施加压力。但两者又有很大不同，因为它应用简单、原子性的事务仅仅是为了对底层子系统，特别是`IO`带宽施加压力。我认为压力测试更像是“猛踩汽车发动机油门”，此时汽车处于空挡，你只是想看看在到达红线区之前`RPM`（每分钟转速）能升到多高。这并不意味着此类测试价值较低，只是它基本服务于不同的测试目的。对许多人来说，这对于他们可能称为数据库基准测试的需求来说已经足够了。'
- fmt: '## Raw Stress Testing


    正如本书前面章节所讨论的，数据库管理员通常希望测试数据库的原始性能，这通常意味着测量和比较一些极低层次的指标，比如每秒IO次数（IOPS）。有几个原因。首先，IOPS易于理解，并且不包含像行业标准基准测试延迟这样的扭曲因素。其次，存储供应商经常用这些术语来表达性能和吞吐量。因此，假设你想测量像IOPS这样的`raw
    performance`指标，你会希望使用一个设计和目的与该目标相匹配的数据库基准测试工具。最流行的低层次数据库性能测试工具之一是`Simple Little
    Oracle Benchmark (SLOB)`，这在第[3](#464117_1_En_3_Chapter.xhtml)章末尾提到过。许多人信赖这个工具，并且有些人编写了扩展或封装程序来改进它。但在我看来，SLOB有显著的局限性：


    *   首先，逻辑在C程序中硬编码，并且还依赖于另一个用于信号量管理的C程序。我更喜欢将所有代码保留在shell脚本和ANSI SQL中，这些对于任何人按需修改都容易得多。

    *   其次，设置和运行需要一个多步骤的过程。我更喜欢一个简单的命令行接口，无需设置即可直接调用。无需编译或链接。

    *   第三，SLOB的核心IO设计是“读取”进行轻量级块访问，“写入”绕过索引开销。我更喜欢更自然的数据库IO模式，更可能匹配真实世界的数据库使用情况。

    *   最后，生成的SLOB负载配置文件是文本形式的，并且是针对单次运行的（因此才有了那些附加的封装程序和扩展）。


    我更喜欢一个简单的工具，它能进行迭代测试并在一张易于阅读的图表中生成结果。因此，我编写并免费提供了我自己的工具，名为`DBBENCHMARK`。它基本上是一个类似SLOB的工具，完全解决了所有这些局限性。此外，`DBBENCHMARK`是一个简单的Linux
    shell脚本，使用了很少的shell脚本`special magic`，因此对于想在Windows上运行它的人来说，可以轻松地转换为Power Shell。它的Linux软件包依赖非常少，它只是调用任何数据库的命令行接口。因此，一旦我最初为Oracle编写了这个工具，将其转换为MySQL是相当微不足道的。欢迎读者将其转换为PostgreSQL、SQL
    Server或任何其他数据库。我只是要求人们将此类修改公之于众，以造福大家。


    ### Note


    您可以从我的个人网站下载此工具：[`www.bertscalzo.com`](http://www.bertscalzo.com)。


    ## DBBENCHMARK Tool


    运行`DBBENCHMARK`非常简单——只需简单地调用一个Linux shell脚本，用户只需指定几个相对不言自明的参数，如下所示（这是Oracle版本的脚本）：


    ```

    [oracle@linux68 ~]$ ./dbbenchmark-oracle.sh -h

    ===============================================================

    Usage: dbbenchmark-oracle.sh -h -u -p -d -z -s -S -i -r -P -T -a -b

    ===============================================================

    CREDITS: utility for testing database performance by Bert Scalzo

    OPTIONS:

    -h   Help           (print this help information)   --DEFAULTS--

    -u   Username       Database username               ()

    -p   Password       Database password               ()

    -d   Database       Database db name                ()

    -z   Test Size      Values: SMALL, MEDIUM, LARGE    (SMALL)

    -s   Session Start  Beginning user session count    (1)

    -S   Session Stop   Ending user session count       (10)

    -i   Increment by   Increment session count by      (1)

    -r   Run Time       Run Time in Seconds             (30)

    -P   Plot Data      Plot graphs of SAR data: Y/N    (Y)

    -T   Tablespace      Default tablespace              (USERS)

    -a   AWR Snapshot   Take AWR snapshots: Y/N         (N)

    -b   AWR baseline   Create AWR baseline: Y/N        (N)

    ===============================================================

    ```


    这是同一个脚本的MySQL版本。请注意，有些参数要么不同，要么缺失（即，MySQL没有AWR功能）。同样请记住，这个版本调用不同的命令行接口，并传递一些略有不同的SQL来计算测试结果。


    ```

    [oracle@linux68 ~]$ ./dbbenchmark-mysql.sh -h

    ===============================================================

    Usage: dbbenchmark-mysql.sh -h -u -p -d -z -s -S -i -r -P

    ===============================================================

    CREDITS: utility for testing database performance by Bert Scalzo

    OPTIONS:

    -h    Help           (print this help information)   --DEFAULTS--

    -u    Username       Database username               ()

    -p    Password       Database password               ()

    -d    Database       Database db name                ()

    -z    Test Size      Values: SMALL, MEDIUM, LARGE    (SMALL)

    -s    Session Start  Beginning user session count    (1)

    -S    Session Stop   Ending user session count       (10)

    -i    Increment by   Increment session count by      (1)

    -r    Run Time       Run Time in Seconds             (30)

    -P    Plot Data      Plot graphs of SAR data: Y/N    (Y)

    ===============================================================

    ```


    下面是一个实际针对运行在SSD驱动器上的Oracle 12c R2数据库运行此实用程序的示例。我只指定了用户名、密码和数据库的最小必需参数。我还只显示了脚本输出的开始和结束部分，而不是全部10次迭代（从1个用户到10个用户）。'
  raw: '## Raw Stress Testing


    As was discussed in the early chapters of this book, DBAs often just want to test
    raw database performance, which typically means to measure and compare some extremely
    low-level metrics such as IO’s per second (IOPS). There are several reasons for
    this. First, IOPS is simple to understand and does not include any skewing factors
    like industry-standard benchmark delays. Second, storage vendors often express
    performance and throughput in these terms. Thus, assuming you want to measure
    “*raw performance*” metrics like IOPS, you’ll want to use a database benchmarking
    tool whose design and purpose match that goal. One of the most popular lower-level
    database performance testing tools is Simple Little Oracle Benchmark (SLOB), which
    was mentioned near the end of Chapter [3](#464117_1_En_3_Chapter.xhtml). Many
    people swear by this tool, and several have written extensions or wrappers to
    improve upon it. But SLOB has notable limitations in my opinion:


    *   First, the logic is hard-coded in a C program and also depends on a C program
    for semaphore management. I prefer to keep all the code in shell script and ANSI
    SQL. which are all far easier for anyone to change as needed.


    *   Second, setup and running requires a multi-step process. I prefer one simple
    command interface with zero setup that you can simply invoke. Nothing to compile
    or link.


    *   Third, SLOB’s core IO design is “reads” do lightweight block access and “writes”
    bypass index overhead. I prefer more natural database IO patterns more likely
    to match real-world database usage.


    *   Finally, the resulting SLOB load profiles are textual and for a single run
    (hence why some of the add-on wrappers and extensions).


    I prefer a simple tool that does iterative testing and produces on one easy-to-read
    chart. Thus I wrote and have made freely available my own tool called DBBENCHMARK.
    It’s basically a SLOB-like tool that completely addresses all these limitations.
    Furthermore, DBBENCHMARK is a simple Linux shell script using very few shells
    scripting “*special magic*,” and so it can easily be converted to Power Shell
    for those wanting to run it on Windows. There are very few Linux package dependencies,
    and it simply makes calls to the any database’s command-line interface. So once
    I originally wrote this tool for Oracle, to convert it to MySQL was fairly trivial.
    Readers are welcome to convert it for PostgreSQL, SQL Server, or any other database.
    I merely request that people make such modifications publicly available for everyone’s
    benefit.


    ### Note


    You can download this tool from my personal website: [`www.bertscalz` `o.com`](http://www.bertscalzo.com)
    .


    ## DBBENCHMARK Tool


    Running DBBENCHMARK is very easy – it’s just a simple call to one Linux shell
    script requiring the user to specify just a couple relatively self-explanatory
    parameters as shown here for the Oracle version of the script:


    ```

    [oracle@linux68 ~]$ ./dbbenchmark-oracle.sh -h

    ===============================================================

    Usage: dbbenchmark-oracle.sh -h -u -p -d -z -s -S -i -r -P -T -a -b

    ===============================================================

    CREDITS: utility for testing database performance by Bert Scalzo

    OPTIONS:

    -h   Help           (print this help information)   --DEFAULTS--

    -u   Username       Database username               ()

    -p   Password       Database password               ()

    -d   Database       Database db name                ()

    -z   Test Size      Values: SMALL, MEDIUM, LARGE    (SMALL)

    -s   Session Start  Beginning user session count    (1)

    -S   Session Stop   Ending user session count       (10)

    -i   Increment by   Increment session count by      (1)

    -r   Run Time       Run Time in Seconds             (30)

    -P   Plot Data      Plot graphs of SAR data: Y/N    (Y)

    -T   Tablespace      Default tablespace              (USERS)

    -a   AWR Snapshot   Take AWR snapshots: Y/N         (N)

    -b   AWR baseline   Create AWR baseline: Y/N        (N)

    ===============================================================

    ```


    Here is the MySQL version of the same script. Note of course that some parameters
    are either different or missing (i.e., MySQL does not have AWR facility). Remember
    too that this version calls a different command-line interface and passes some
    slightly different SQL to calculate the test results.


    ```

    [oracle@linux68 ~]$ ./dbbenchmark-mysql.sh -h

    ===============================================================

    Usage: dbbenchmark-mysql.sh -h -u -p -d -z -s -S -i -r -P

    ===============================================================

    CREDITS: utility for testing database performance by Bert Scalzo

    OPTIONS:

    -h    Help           (print this help information)   --DEFAULTS--

    -u    Username       Database username               ()

    -p    Password       Database password               ()

    -d    Database       Database db name                ()

    -z    Test Size      Values: SMALL, MEDIUM, LARGE    (SMALL)

    -s    Session Start  Beginning user session count    (1)

    -S    Session Stop   Ending user session count       (10)

    -i    Increment by   Increment session count by      (1)

    -r    Run Time       Run Time in Seconds             (30)

    -P    Plot Data      Plot graphs of SAR data: Y/N    (Y)

    ===============================================================

    ```


    Below is an actual example of running this utility against an Oracle 12c R2 database
    sitting on an SSD drive. I’ve specified only the minimum required parameters for
    the user name, password, and database. I also show only the beginning and ending
    portions of the script output, and not all 10 iterations (for 1 user to 10 users).'
