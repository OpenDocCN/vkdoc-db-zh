    ### Swingbench


    Another popular, free load generator and database benchmarking tool that works
    with just Oracle databases is Swingbench. I like this tool for one very simple
    reason: it’s the only one I’ve found so far that offers the newer `TPC-DS` benchmark.
    In fact, this benchmark with its 100 complex queries is one of the best database
    performance tools that I know of (besides actual real workloads). My coauthors
    and I used this in our 2017 Oracle book titled *Oracle Database 12c Release 2
    Testing Tools and Techniques for Performance and Scalability*. In fact, the tool’s
    author worked with us to make this book possible for which we are grateful (thanks,
    Dominic).


    You will find Swingbench’s web page and download at the following URLs respectively.


    *   [`http://dominicgiles.com/swingbench.html`](http://dominicgiles.com/swingbench.html)


    *   [`http://dominicgiles.com/downloads.html`](http://dominicgiles.com/downloads.html)


    The Swingbench download is a simple zip file that just needs to be unzipped. It’s
    a purely `Java`-based tool so it can run on most any operating system; therefore
    it requires that `Java` be loaded on your machine. There are two types of executable
    files to be aware of: the roughly dozen utilities to load the desired workloads
    or benchmarks, and the actual Swingbench engine to run those tests. Here we’ll
    just demonstrate running a `TPC-DS` benchmark. But the process is much the same
    for the other tests this tool offers.


    Running the `TPC-DS` creation wizard walks you through creating a database connection,
    whether to drop or create the database objects, plus the owner and tablespaces
    for the required tables and indexes on the screen shown in Figure [3-36](#464117_1_En_3_Chapter.xhtml#Fig36).


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig36_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig36_HTML.jpg)


    Figure 3-36


    TPC-DS Creation Wizard


    Along the way the wizard asks how big to make the database objects where each
    scale factor equates to 1 GB. The wizard then wraps up by asking the degree of
    parallelism to use while creating those objects. It then creates those objects
    as shown in Figure [3-37](#464117_1_En_3_Chapter.xhtml#Fig37). Note that I have
    selected 8 parallel threads (which is the default) and currently the tool has
    loaded 13% of my data.


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig37_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig37_HTML.jpg)


    Figure 3-37


    TPC-DS Creation Running


    After the database objects have successfully been created and loaded, it’s now
    time to run the Swingbench utility itself. When prompted during launch for what
    workload or database benchmark to run, choose the `TPCDS`-like test. Then simply
    enter the database connection info on the screen shown in Figure [3-38](#464117_1_En_3_Chapter.xhtml#Fig38)
    and press the start execution toolbar button. Note that the “Load” tab in the
    bottom left of the main screen offers several key options that are quite important,
    including the min/max delays between transactions, logon delay time, whether to
    wait until all sessions connect before starting, and total run time. All of these
    can skew your results, so as always refer to the appropriate benchmark spec for
    advice and setting these parameters.


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig38_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig38_HTML.jpg)


    Figure 3-38


    TPC-DS Initiate Execution


    While the test is running you will see all the queries being processed (remember
    there are 100) and some key performance metrics as shown in Figure [3-39](#464117_1_En_3_Chapter.xhtml#Fig39).
    I personally find all of the performance information that Swingbench presents
    to be the best of all the database benchmarking tools. Note that Swingbench shows
    two important graphs of note: the transactions per second and response time. As
    will be explained later in this book on how to interpret results, these are the
    two most important metrics to examine – and often you need to look at both as
    a whole rather than in isolation.


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig39_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig39_HTML.jpg)


    Figure 3-39


    TPC-DS Logging and Performance'
