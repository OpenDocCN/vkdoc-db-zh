  trans: '## 使用 SSD 扩展内存


    一些数据库供应商提供了一项有趣且独特的功能，允许数据库管理员将闪存盘或 SSD 挂载为数据库 RAM 数据缓存的扩展。当然，闪存盘或 SSD 的运行速度比标准
    RAM 内存慢，但基本上整个闪存盘或 SSD 就成了数据库 RAM 数据缓存的二级内存。这项功能非常吸引人有两个原因。首先，它是免费的（没有额外成本）。其次，它实施起来快速简便。Oracle
    将此功能称为 `Database Smart Flash Cache`（不要与 Oracle Exadata 的 Smart Flash Cache 混淆）。Microsoft
    SQL Server 有一个类似的功能，称为 `Buffer Pool Extensions`。它们本质上做的都是完全相同的事情。


    为了演示通过闪存盘或 SSD 扩展内存能提供怎样的性能示例，请看图 7-8。该图显示了在 RAM-only 数据库数据缓存设置下，与通过 64GB SSD
    盘扩展 RAM 相比，针对一个 300GB 数据库运行 22 个 TPC-H 查询所需的时间。对于我的数据库服务器、数据库版本和配置，性能提升仅为 10.33%。你可能会疑惑为什么这个功能表现没有更好。有几个合理的原因。首先，TPC-H
    倾向于对非常大的行数据集合应用聚合函数。因此缓存往往不堪重负。其次，可能存在一个临界点，超过该点后向缓存中添加较慢的闪存盘或 SSD 会适得其反。扫描混合速度技术来匹配缓存块或页面可能造成的损害大于改进。实际上，我使用较小的闪存盘（16GB）得到了更好的结果。但我不能断言总是使用较小的容量就是最好的；在我的测试环境下恰好如此。我还使用
    PCIe NVME 闪存盘得到了更好的结果，但这仍然不足以让我断然否定使用 SSD 盘进行缓存扩展。但常识合理地表明，在相同容量下，基于上一章强调的关键原因，PCIe
    NVMe 闪存盘应该始终是用于此目的的最佳 SSD 盘。


    ![../images/464117_1_En_7_Chapter/464117_1_En_7_Fig8_HTML.png](img/464117_1_En_7_Fig8_HTML.png)


    **图 7-8**

    SSD 扩展带来的 TPC-H 性能提升


    ## 在内存中固定表


    一些数据库提供了机制来建议甚至强制某些表和索引应固定在内存中，或者以极其缓慢的速度老化淘汰，从而有效地看起来像是被固定。你可能会使用如下语法或命令：


    ```

    CREATE or ALTER TABLE ... CACHE

    ALTER object_name PIN | KEEP

    EXECUTE function PINTABLE | KEEP

    ```


    另一种方法是允许数据库数据缓存被划分为具有不同老化特性的区域，例如 `KEEP` 和 `RECYCLE`。然后，你只需创建或更改对象以指定应用哪个不同的缓存区域，从而应用不同的老化特性。需要记住的关键点是，这些都不是将表或索引锁定在内存中的真正方法（这是本章后面讨论的另一个功能）。


    为了演示在内存中固定对象能提供怎样的性能示例，请看图 7-9。该图显示了在未固定设置下，与将较小的查找表和所有索引固定后的设置相比，针对一个 300GB 数据库运行
    22 个 TPC-H 查询所需的时间。对于我的数据库服务器、数据库版本和配置，性能提升仅为 16.02%。你可能再次期望更大的提升，因为固定在内存中应该非常快。但有几个原因可以解释这个结果。首先，数据库实际上只是尝试将对象固定在内存中或使其老化淘汰得更慢。因此，这不是真正的内存解决方案。其次，TPC-H
    倾向于对非常大的行数据集合应用聚合函数。因此，无论你如何努力控制，缓存往往都会不堪重负。第三，即使对于只有八张表（及其索引）的模式，选择合适的对象和应用的老化特性也很困难。


    ![../images/464117_1_En_7_Chapter/464117_1_En_7_Fig9_HTML.png](img/464117_1_En_7_Fig9_HTML.png)


    **图 7-9**

    固定对象带来的 TPC-H 性能提升


    ## 列存存储与行存存储


    传统的关系型数据库，如 `Oracle` 和 `SQL Server`，基于关系代数和关系演算，并且遵守任何关系型数据库都应遵循的 `Codd 的 12 条规则`。其中的关键是数据以元组或行的形式表示和存储。对于许多传统的商业应用程序（如
    OLTP）来说，这种范式运作良好。然而，随着数据仓库等新型商业数据库应用需求的出现，关系模型未能如预期那样良好地扩展。因此，列式数据库应运而生，例如 `Vertica`、`Sybase
    IQ`、`Teradata`、`Greenplum` 等许多其他产品。这些新的列式数据库处理超大型数据库，提供三大优势：


    1.  所需空间更少（并且数据压缩效果更好）

    2.  从非常大到极大的规模扩展性好得多

    3.  报表查询运行速度快得多，且 IO 操作大幅减少


    随着关系型数据库多年来开始添加非关系类型的功能，例如多值列和嵌套表（根据 `Codd 的 12 条规则`，这两者都是主要的不合规项），关系型数据库供应商自然希望整合并受益于列式方法。其中一些供应商只是简单地添加了列存存储选项，而另一些则将内存技术（下一节）与列存存储相结合。图
    7-10 突出了表以行存储与以列存储之间的主要区别。请注意，尽管这是两种截然不同的方法，但用于处理它们的 `SQL` 语言并未改变。数据库优化器和引擎在处理列式数据时，可以在内部更快地执行某些查询操作。一个常见的例子是在对一个非常大的表中的列执行
    `group` 函数时。


    ![../images/464117_1_En_7_Chapter/464117_1_En_7_Fig10_HTML.jpg](img/464117_1_En_7_Fig10_HTML.jpg)


    **图 7-10**

    行存储磁盘布局 vs. 列存储


    为了演示列式方法能提供怎样的性能示例，请看图 7-11。该图显示了将一个 300GB 数据库保存为行存格式与列存格式时，运行 22 个 TPC-H 查询所需的时间。对于我的数据库服务器、数据库版本和配置，性能提升达到了惊人的
    67.48%！考虑到一些 TPC-H 查询执行的操作并不最受益于列存格式，这个结果已经相当不错了。数据库所需的磁盘空间也减少了约 60%（未指定额外的高级压缩选项）。


    ![../images/464117_1_En_7_Chapter/464117_1_En_7_Fig11_HTML.png](img/464117_1_En_7_Fig11_HTML.png)


    **图 7-11**

    行存格式带来的 TPC-H 性能提升'
- fmt: '## New "In-Memory" Tables


    One of the hottest new technologies that several major relational database vendors
    have adopted is the in-memory table. Unlike the earlier section on pinning tables,
    which was more of a request, these new in-memory tables are truly 100% in-memory.
    Of course you''ll need database servers with enough RAM memory for these tables
    in addition to all the other memory normally allocated to the database. Generally
    speaking, you won''t be able to place the entire database in-memory, so you''ll
    want to selectively choose those that are expected to yield the greatest return.
    Moreover some database vendors (Oracle) combine in-memory and columnstore as a
    single feature. For those databases only the in-memory tables are columnstore
    and the rest remain rowstore on disk. Figure 7-12 shows the complexities of Oracle''s
    memory management.


    ![../images/464117_1_En_7_Chapter/464117_1_En_7_Fig12_HTML.jpg](images/464117_1_En_7_Chapter/464117_1_En_7_Fig12_HTML.jpg)


    **Figure 7-12**

    Oracle''s In-Memory Column Store Architecture


    As you can see in Figure 7-12, many of the other features from this chapter come
    into play. For the DBA their job of knowing how Oracle works just got a lot harder.
    I guess that''s why they supposedly make the big money.


    To demonstrate an example what performance in-memory tables can provide, look
    now at Figure 7-13. The graph shows the time to run the 22 TPC-H queries against
    a 300GB database saved as rowstore vs. columnstore. For my database server, database
    version, and configuration, the overall performance improvement was an amazing
    **90.89%**! And then when I also added advanced compression to the in-memory table,
    the runtime was the same and it required almost 75% less memory space! So even
    though my database server has only 256GB of memory, the table only needed 75GB
    of memory. So my database still had plenty of memory for normal database allocation
    and consumption. In fact, if the server only had to handle this workload, then
    one with less memory could be utilized. Did you catch that twist? Placing tables
    in-memory might possibly in some cases reduce the need for memory!


    ![../images/464117_1_En_7_Chapter/464117_1_En_7_Fig13_HTML.png](images/464117_1_En_7_Chapter/464117_1_En_7_Fig13_HTML.png)


    **Figure 7-13**

    TPC-H Improvements from In-Memory


    ## Summary


    This chapter reviewed many database features and technologies that might be utilized
    when performing database benchmarks. While hardware advances covered in the last
    chapter have occurred at an astonishing pace, the benefits to database performance
    were measured. However, with recent database advances, the performance benefits
    have been truly amazing. Imagine queries running in 91% less time with 75% space
    reduction. It almost sounds like science fiction. However, the features and their
    results are real. Any DBA working on database benchmarking projects should strive
    to stay abreast of all the major database enhancements of the past few years and
    those yet to come. These advances currently yield the greatest benefits and sometimes
    with very little effort. Just make sure you''re properly licensed to use these
    nice new toys.


    # 8. Benchmarking for Consolidation


    In this chapter we''re going to review benchmarking considerations for when you
    are testing scenarios in order to consolidate database instances. Database consolidation
    occurs when you attempt to reduce the total number of database licenses in order
    to reduce costs. With the rising cost of database licenses and the business considering
    a database as just a commodity, building-block object required for an application,
    your management might be required to undertake consolidation efforts. Moreover
    with today''s servers being so powerful, with multi-core CPUs and lots of cheap
    memory, we no longer must intentionally segregate databases using the traditional
    "silo" approach of one database per server. DBAs can now realistically look to
    co-locate all the data from multiple databases instances under a single database
    instance. Sometimes such efforts may coincide with a major database version upgrade
    or a licensing "true up" effort. One thing is for sure, with all the "database
    sprawl" that has occurred over the past 20 years, we all have more database instances
    than anyone could have reasonably imagined. So database consolidation efforts
    are more common than you might think.


    I also have seen consolidation efforts where management is attempting to reduce
    the number of database vendors they have to deal with. For example, development
    teams over the years may have used both Oracle and SQL Server, so now it might
    be considered worthwhile to standardize on just one database vendor. I''ve also
    seen where consolidation efforts look to move from a single database vendor such
    as Oracle to now include a second open source vendor like PostgreSQL. The idea
    being to kill two birds with one stone: that is, reduce the number of high-cost
    licenses and consolidate on an open source platform. No matter the true goal,
    most database consolidation efforts can be viewed as simply combining many databases
    from different instances to fewer instances on more capable servers. In short,
    a physical database deployment reduction. So for the rest of this chapter we''ll
    just look at this type of effort from such a one-dimensional viewpoint in order
    to keep things simple.'
