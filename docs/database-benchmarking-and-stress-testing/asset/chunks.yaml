    # 2. 行业标准基准测试


    在第 1 章中，我们区分了数据库基准测试、数据库压力测试和工作负载捕获/回放。通过理解这些不同的方法，我们为共同的理解和术语奠定了基础。另外，我们还了解了为什么这些不同的技术是有用的，以及何时最好地利用它们。回顾一下，我们的基本定义是：


    *   数据库压力测试本质上是不确定且有限的、人工的工作负载，旨在基本施压数据库的底层性能（即，让数据库“出汗”）。

    *   数据库基准测试是一个定义明确且被普遍接受的、行业标准的数据库压力测试，具有明确的性能指标，用于在给定的数据库大小和并发用户工作负载下衡量和比较结果。

    *   工作负载捕获是实际数据库应用程序活动的一个定义明确且有限的快照，被记录下来以创建一个具有非人工工作负载的数据库基准测试，用于回放以比较前后性能。


    在本章中，我们将回顾所有重要的行业标准数据库基准测试。此外，我们将它们分为两大类：当前流行的和现已不受欢迎的。这些数据库基准测试大多由事务处理委员会（[`www.tpc.org`](http://www.tpc.org)）开发，少数起源于大学。了解当前流行和不再受欢迎的行业标准数据库基准测试都很重要，因为前者往往植根于后者。最后请注意，每个行业标准数据库基准测试往往专注于特定类型的工作负载；因此，了解所有这些基准测试将使您能够为您的需求选择合适的一个。事实上，您很可能会发现，为了最好地近似您想要测试的工作负载，您需要混合使用多种基准测试。所以，再次强调，掌握所有这些基准测试的知识对于您进行测试至关重要。


    ## 最流行的基准测试


    现在让我们讨论最流行的基准测试。


    ### TPC-C


    TPC-C 可能是认知度最高、理解度最低，且经常被错误引用的数据库基准测试。它也是大多数数据库基准测试工具所提供的，但这些工具可能由于程序默认设置或超出规范的、用户可定义的选项，并未遵守基准测试规范的本意。此外，这些数据库基准测试工具可能会要求用户提供定义测试性质的运行时参数，但除非用户阅读过数据库基准测试规范，否则他们不知道如何正确提供这些参数。再者，大多数数据库基准测试工具不以一致的方式报告其结果，或者因其默认设置（可能符合也可能不符合规范）而获得截然不同的结果。最后，大多数人只是孤立地关注测试结果的一部分，例如每秒事务数（`TPS`），而没有适当的上下文进行任何有意义的解释。因此，TPC-C
    因各种错误的原因而声名狼藉。


    让我们从查看 [`tpc.org`](http://tpc.org) 网站和 TPC-C 规范中的数据库定义开始：


    *   网站：TPC-C 是一个 OLTP 基准测试。由于它包含多种事务类型、更复杂的数据库和整体执行结构，因此它比之前的 OLTP 基准测试（如 TPC-A）更复杂。

    *   TPC-C 规范：TPC-C 是一种 OLTP 工作负载。它是只读和更新密集型数据库事务的混合，模拟了一个复杂 OLTP 应用程序的活动。


    这两个定义除了说明它是基于 OLTP 的之外，并没有真正提供关于应用程序负载性质的任何有意义的见解。这里是一个更彻底、因此更有用的定义：


    > *TPC-C 于 1992 年获批，是最初的 OLTP 基准测试*，*其包含五种事务（新订单、支付、订单状态、发货和库存水平）的工作负载，试图模拟一个批发分销商，其拥有相当少的仓库来服务相对大量的零售地点。性能以每分钟新订单数来衡量。*


    请注意，TPC-C 现在已经超过 25 年的历史了。它不能充分模拟当今现实世界的数据库工作负载，也不能正确施压当今硬件和数据库引擎的能力。因此，TPC-C
    正迅速失宠。TPC-C 现在被认为非常“`老派`”，并已被 TPC-E 所取代，这是一个更新且复杂得多的 OLTP 数据库基准测试，本章后面将介绍。尽管如此，TPC-C
    仍然是使用最广泛、被引用最多的基准测试，这就是为什么详细涵盖 TPC-C 数据库基准测试至关重要。让我们通过查看图 2-1 所示的 TPC-C 数据模型来继续我们的研究。


    ![../images/464117_1_En_2_Chapter/464117_1_En_2_Fig1_HTML.jpg](img/464117_1_En_2_Fig1_HTML.jpg)


    图 2-1 TPC-C 数据模型

    '
- fmt: '# TPC-C 与 TPC-E 基准测试对比分析


    首先需要注意的是，按照当今典型数据库应用的标准，这个数据模型相当简单且规模极小，仅有九个表。事实上，它被认为如此简单和微小，以至于几乎没有价值，这也是为什么更新的
    TPC-E 数据库基准被创建出来的原因。其次，观察其设计，它从左上角的`WAREHOUSE`表开始，该表与`DISTRICT`表存在 10 对 1 的父子关系。关键思想是每个`WAREHOUSE`拥有
    10 个终端，这相当于可能的并发用户会话数。这一点至关重要，因为规范明确要求数据库规模或缩放因子为每 10 个并发数据库用户会话对应 1 个仓库。如果你试图用超出规范的低`WAREHOUSE`数量（例如
    100 个用户，缩放因子为 1）来运行高用户负载，那么你的基准测试结果很可能会失真，并且你很可能会遇到数据库争用或锁定问题。然而，大多数数据库基准测试工具允许用户这样做，即请求运行
    1,000 个并发数据库会话，而缩放因子远低于规范要求的 100。


    ## TPC-C 的数据库设计与问题


    为了更好地理解这一点，我们将检查规范要求的逻辑数据库设计，你会发现`DISTRICT`表存在一个固有的低效率。查看图[2-2](#464117_1_En_2_Chapter.xhtml#Fig2)所示的`DISTRICT`表所需定义。


    ![../images/464117_1_En_2_Chapter/464117_1_En_2_Fig2_HTML.jpg](images/464117_1_En_2_Chapter/464117_1_En_2_Fig2_HTML.jpg)


    图 2-2：DISTRICT 表布局


    注意，`D_NEXT_O_ID`列保存下一个可用的订单号，因此一个会话必须锁定该行以获取当前值，然后将其递增。这是在自动递增列或与序列号生成器绑定的表触发器出现之前，实现此概念的旧方式。之所以这样做，是因为并非所有数据库都提供这些高级功能。这就是为什么对于给定的缩放因子运行错误的用户负载（例如，1,000
    个用户，缩放因子为 1）会导致严重的数据库争用和锁定问题，因为所有会话都必须争夺有限数量的`DISTRICT`表行上的锁。然而，我几乎普遍看到那些没有阅读基准规范的人犯这个错误，他们只是抱怨数据库基准测试工具很差劲（即，不会报告他们期望看到的极高数值）。


    ## TPC-C 允许的高级特性


    数据库设计的另一个方面是，哪些高级物理数据库选项或模式对象定义修改是允许的？TPC-C 规范对此相当明确。以下是允许的：


    *   用于主键约束的唯一索引

    *   水平表分区

    *   垂直表分区

    *   表复制


    一项不允许的高级数据库功能是物理表数据行聚类；然而，你会发现许多已发布的基准测试结果使用了此功能，因此是非官方的。幸运的是，大多数数据库基准测试工具通常默认或作为选项都不提供表聚类。不过，有些工具确实提供了水平分区表的功能。但分区方案往往相当通用，通常可以通过数据库管理员手动定义分区方案以最好地利用其硬件和数据库优化器来超越。最后请注意，由于
    TPC-C 是一个较旧的数据库基准，来自数据库功能少得多的时代，它不推荐也不要求引用完整性（即外键约束）或其上的索引。然而，由于这是现代最佳实践，大多数数据库基准测试工具将创建外键以及在这些外键列上的索引。虽然从技术上讲这“*不符合规范*”，但如果一致使用，这似乎是一个公平的改进。而且，当使用关系数据库时，它只是“*感觉对了*”。


    ## TPC-E 基准概述


    TPC-E 是一个旨在取代 TPC-C 的现代 OLTP 测试。TPC-E 试图解决 TPC-C 所有已知的缺点。自 2007 年左右首次亮相以来，它的知名度要低得多，除了一些硬件和数据库供应商外，尚未那么流行。虽然数据库管理员可能听说过
    TPC-E，但几乎没有人运行过这个数据库基准。此外，很少有数据库基准测试工具实现了 TPC-E；事实上目前只有两个，这将在第[3](#464117_1_En_3_Chapter.xhtml)章我们回顾当前可用的流行数据库基准测试软件时介绍。


    和之前一样，让我们首先从[tpc.org](http://tpc.org)网站和 TPC-E 规范来看 TPC-E 数据库基准的定义：


    *   网站：TPC-E 比以前的 OLTP 基准（如 TPC-C）更复杂，因为它具有多样化的事务类型、更复杂的数据库和整体执行结构。TPC-E 涉及 12
    种不同类型和复杂度的并发事务的混合。

    *   TPC-E 规范：TPC-E 是一种混合了只读和更新密集型事务的 OLTP 工作负载，模拟了在现代、复杂的 OLTP 应用环境中发现的活动。


    同样，这两个定义都没有真正提供任何关于应用程序工作负载性质的深刻见解，只是说它是一个更复杂、更现代的 OLTP 基准。这里是一个更全面、因此更有用的定义：


    > TPC-E 基准模拟了一家经纪公司的 OLTP 工作负载。该基准的重点是执行与公司客户账户相关事务的中央数据库。尽管 TPC-E 的底层业务模型是一家经纪公司，但其数据库模式、数据填充、事务和实现规则被设计为广泛代表现代
    OLTP 系统。


    TPC-E 的设计确实看起来、表现起来和感觉起来都像一个基于互联网的经纪公司可能实施的真实数据库应用。最有趣的是，TPC-E 包含了消费者对企业（C2B）以及企业对企业（B2B）类型的事务。此外，规范中促使其高度真实性的四个特点是：


    *   同时执行跨越广泛复杂度的多种事务类型

    *   磁盘输入/输出和处理器使用的平衡混合

    *   通过主键和辅助键进行均匀和非均匀数据访问的混合

    *   由大量具有各种大小、属性和关系的表组成的数据库，内容真实


    和之前一样，让我们通过检查图[2-3](#464117_1_En_2_Chapter.xhtml#Fig3)所示的 TPC-E 数据模型来继续我们的研究。


    ![../images/464117_1_En_2_Chapter/464117_1_En_2_Fig3_HTML.jpg](images/464117_1_En_2_Chapter/464117_1_En_2_Fig3_HTML.jpg)


    图 2-3：TPC-E 数据模型


    详细检查图[2-3](#464117_1_En_2_Chapter.xhtml#Fig3)中的每个表并不重要。重要的是要注意，它看起来更像一个真实世界的数据模型，而不仅仅是某个学术练习的模型。与表很少且关系是简单父子性质的
    TPC-C 不同，TPC-E 有很多表，关系也很复杂。事实上，如下面表[2-1](#464117_1_En_2_Chapter.xhtml#Tab1)所示，这两个基准之间有几个重要的区别。


    表 2-1：TPC-C 与 TPC-E 对比


    | 特性 | TPC-C | TPC-E |

    | --- | --- | --- |

    | 业务类型 | 批发分销商 | 经纪公司 |

    | 总表数 | 9 | 33 |

    | 总列数 | 92 | 188 |

    | 每表列数范围 | 3 – 21 | 2 - 24 |

    | 平均每表列数 | 10.2 | 5.7 |

    | 只读事务数 | 2 | 6 |

    | 只读事务百分比 | 8% | 76.9% |

    | 读写事务数 | 3 | 4 |

    | 读写事务百分比 | 92% | 23.1% |

    | 数据生成方式 | 随机 | 普查数据 |

    | 检查约束数 | 0 | 22 |

    | 引用完整性 | 否 | 是 |'
  raw: 'First note that this data model is by today’s typical database application
    standards quite simple and trivially small with just nine tables. In fact, it’s
    seen as so simple and small to arguably be of little or no value, hence why the
    newer TPC-E database benchmark was created. Second observe that the design begins
    in the upper left corner with the WAREHOUSE table that possesses a 10 to 1 parent/child
    relationship with the DISTRICT table. The key idea being that each WAREHOUSE possesses
    10 terminals, which equates to a concurrent user session possible. This is critical
    as the spec clearly mandates a database size or scale factor of 1 warehouse per
    10 concurrent database user sessions. If you try to run a high user workload with
    an out of spec low WAREHOUSE count such as 100 users with a scale factor of 1,
    then your benchmark results will likely be skewed and you may well encounter database
    contention or locking issues. Yet most database benchmarking tools permit their
    users to do just that, that is, request running 1,000 concurrent database sessions
    with a scale factor far less than the 100 required by the spec.


    To better understand this, we shall inspect the logical database design mandated
    by the spec where you will find that the DISTIRCT table has a built-in inefficiency.
    Examine the required table definition for the DISTRICT table shown in Figure [2-2](#464117_1_En_2_Chapter.xhtml#Fig2).


    ![../images/464117_1_En_2_Chapter/464117_1_En_2_Fig2_HTML.jpg](images/464117_1_En_2_Chapter/464117_1_En_2_Fig2_HTML.jpg)


    Figure 2-2


    DISTRICT Table Layout


    Note that the D_NEXT_O_ID column holds the next available order number, so a session
    must lock the row in order to fetch the current value and then increment it. This
    is the old-fashioned way to implement this concept before auto increment columns
    or table triggers tied to sequence number generators became available. It is done
    this way since not all databases offer these advanced features. That’s why running
    the wrong user load for given scale factor such as 1,000 users with a scale factor
    of 1 ends up with severe database contention and locking issues as all the sessions
    must fight for locks on the limited number of DISTRICT table rows. Yet I almost
    universally see this mistake by people who’ve not read the benchmark spec and
    who just complain that the database benchmarking tools stink (i.e., won’t report
    the extremely high numbers they expect and want to see).


    Another aspect of the database design is what advanced physical database options
    or schema object definition modifications are permissible? The TPC-C spec is fairly
    clear about what can and cannot be done. The following are allowed:


    *   Unique indexes for primary key constraints


    *   Horizontal table partitioning


    *   Vertical table partitioning


    *   Replication of tables


    One advanced database feature not permitted is physical table data row clustering;
    however you will find many published benchmark test results that utilize this
    feature and are therefore non-sanctioned. Fortunately, most database benchmarking
    tools generally do not offer table clustering either by default or as an option.
    Some, however, do offer to partition tables horizontally. But often the partitioning
    scheme is rather generic and can quite often be outdone by the DBA manually defining
    the partitioning scheme to best leverage their hardware and database optimizer.
    Finally note that as an older database benchmark from times when databases had
    far fewer features, the TPC-C does not recommend nor require referential integrity
    (i.e., foreign key constraints) or indexes upon them. However, as this is a modern
    best practice, most database benchmarking tools will create foreign keys and indexes
    on those FK columns. While this is technically speaking “*out of spec*,” it seems
    like a fair improvement if utilized consistently. Plus it just “*feels right*”
    when working with a relational database.


    ### TPC-E


    The TPC-E is a modern OLTP test meant to replace the TPC-C. The TPC-E attempts
    to resolve all the known shortcomings of the TPC-C. Since it first debuted circa
    2007, it is far less known and not yet as popular except with some of the hardware
    and database vendors. While database administrators may have heard of the TPC-E,
    hardly any have run this database benchmark. Furthermore, few database benchmarking
    tools implement the TPC-E; in fact only two currently do so this will be covered
    in Chapter [3](#464117_1_En_3_Chapter.xhtml) where we review the popular database
    benchmarking software currently available.


    As before, let’s start by looking at the TPC-E database benchmark definition from
    the [tpc.​org](http://tpc.org) web site and the TPC-E spec:


    *   Website: TPC-E is more complex than previous OLTP benchmarks such as TPC-C
    because of its diverse transaction types, more complex database, and overall execution
    structure. TPC-E involves a mix of 12 concurrent transactions of different types
    and complexity.


    *   TPC-E spec: TPC-E is an OLTP workload that is a mixture of read-only and update-intensive
    transactions that simulate the activities found in modern, complex OLTP application
    environments.


    Once again neither definition really provides any kind of meaningful insight into
    the nature of the application workload other than saying it’s a more complex and
    modern OLTP benchmark. Here is a more thorough and therefore more useful definition:


    > *The TPC-E benchmark simulates the OLTP workload of a brokerage firm. The focus
    of the benchmark is the central database that executes transactions related to
    the firm’s customer accounts. Although the underlying business model of TPC-E
    is a brokerage firm, the database schema, data population, transactions, and implementation
    rules have been designed to be broadly representative of modern OLTP systems.*


    The TPC-E design really does appear, behave, and feel like a genuine database
    application that an internet-based brokerage house might implement. Most interestingly
    the TPC-E contains both Consumer-to-Business as well as Business-to-Business type
    transactions. Furthermore, four characteristics from the spec that contribute
    to its highly realistic nature are:


    *   The simultaneous execution of multiple transaction types that span a breadth
    of complexity


    *   A balanced mixture of disk input/output and processor usage


    *   A mixture of uniform and non-uniform data access through primary and secondary
    keys


    *   Databases consisting of many tables with a wide variety of sizes, attributes,
    and relationships with realistic content


    As before, let’s continue our investigation by examining the TPC-E data model
    shown in Figure [2-3](#464117_1_En_2_Chapter.xhtml#Fig3).


    ![../images/464117_1_En_2_Chapter/464117_1_En_2_Fig3_HTML.jpg](images/464117_1_En_2_Chapter/464117_1_En_2_Fig3_HTML.jpg)


    Figure 2-3


    TPC-E Data Model


    It’s not important to examine every table shown in Figure [2-3](#464117_1_En_2_Chapter.xhtml#Fig3)
    in detail. What’s important to note is that it looks more like a real-world data
    model and not just one from some academic exercise. Unlike the TPC-C that has
    few tables and whose relationships are simple parent/child in nature, the TPC-E
    has many tables and also complex relationships. In fact, there are several important
    differences between these two benchmarks as highlighted in Table [2-1](#464117_1_En_2_Chapter.xhtml#Tab1)
    shown below.


    Table 2-1


    Comparison of TPC-C vs. TPC-E


    | Characteristic | TPC-C | TPC-E |

    | --- | --- | --- |

    | Business Type | wholesale distributor | brokerage house |

    | Total # Tables | 9 | 33 |

    | Total # Columns | 92 | 188 |

    | Cols/Table Range | 3 – 21 | 2 - 24 |

    | Avg Cols/Table | 10.2 | 5.7 |

    | # RO Transactions | 2 | 6 |

    | % RO Transactions | 8% | 76.9% |

    | # RW Transactions | 3 | 4 |

    | % RW Transactions | 92% | 23.1% |

    | Data generation | random | census data |

    | Check Constraints | 0 | 22 |

    | Referential Integrity | NO | YES |'
  trans: '# TPC-C 与 TPC-E 基准测试对比分析


    首先需要注意的是，按照当今典型数据库应用的标准，这个数据模型相当简单且规模极小，仅有九个表。事实上，它被认为如此简单和微小，以至于几乎没有价值，这也是为什么更新的
    TPC-E 数据库基准被创建出来的原因。其次，观察其设计，它从左上角的`WAREHOUSE`表开始，该表与`DISTRICT`表存在 10 对 1 的父子关系。关键思想是每个`WAREHOUSE`拥有
    10 个终端，这相当于可能的并发用户会话数。这一点至关重要，因为规范明确要求数据库规模或缩放因子为每 10 个并发数据库用户会话对应 1 个仓库。如果你试图用超出规范的低`WAREHOUSE`数量（例如
    100 个用户，缩放因子为 1）来运行高用户负载，那么你的基准测试结果很可能会失真，并且你很可能会遇到数据库争用或锁定问题。然而，大多数数据库基准测试工具允许用户这样做，即请求运行
    1,000 个并发数据库会话，而缩放因子远低于规范要求的 100。


    ## TPC-C 的数据库设计与问题


    为了更好地理解这一点，我们将检查规范要求的逻辑数据库设计，你会发现`DISTRICT`表存在一个固有的低效率。查看图 2-2 所示的`DISTRICT`表所需定义。


    ![../images/464117_1_En_2_Chapter/464117_1_En_2_Fig2_HTML.jpg](img/464117_1_En_2_Fig2_HTML.jpg)


    图 2-2：DISTRICT 表布局


    注意，`D_NEXT_O_ID`列保存下一个可用的订单号，因此一个会话必须锁定该行以获取当前值，然后将其递增。这是在自动递增列或与序列号生成器绑定的表触发器出现之前，实现此概念的旧方式。之所以这样做，是因为并非所有数据库都提供这些高级功能。这就是为什么对于给定的缩放因子运行错误的用户负载（例如，1,000
    个用户，缩放因子为 1）会导致严重的数据库争用和锁定问题，因为所有会话都必须争夺有限数量的`DISTRICT`表行上的锁。然而，我几乎普遍看到那些没有阅读基准规范的人犯这个错误，他们只是抱怨数据库基准测试工具很差劲（即，不会报告他们期望看到的极高数值）。


    ## TPC-C 允许的高级特性


    数据库设计的另一个方面是，哪些高级物理数据库选项或模式对象定义修改是允许的？TPC-C 规范对此相当明确。以下是允许的：


    *   用于主键约束的唯一索引

    *   水平表分区

    *   垂直表分区

    *   表复制


    一项不允许的高级数据库功能是物理表数据行聚类；然而，你会发现许多已发布的基准测试结果使用了此功能，因此是非官方的。幸运的是，大多数数据库基准测试工具通常默认或作为选项都不提供表聚类。不过，有些工具确实提供了水平分区表的功能。但分区方案往往相当通用，通常可以通过数据库管理员手动定义分区方案以最好地利用其硬件和数据库优化器来超越。最后请注意，由于
    TPC-C 是一个较旧的数据库基准，来自数据库功能少得多的时代，它不推荐也不要求引用完整性（即外键约束）或其上的索引。然而，由于这是现代最佳实践，大多数数据库基准测试工具将创建外键以及在这些外键列上的索引。虽然从技术讲这“*不符合规范*”，但如果一致使用，这似乎是一个公平的改进。而且，当使用关系数据库时，它只是“*感觉对了*”。


    ## TPC-E 基准概述


    TPC-E 是一个旨在取代 TPC-C 的现代 OLTP 测试。TPC-E 试图解决 TPC-C 所有已知的缺点。自 2007 年左右首次亮相以来，它的知名度要低得多，除了一些硬件和数据库供应商外，尚未那么流行。虽然数据库管理员可能听说过
    TPC-E，但几乎没有人运行过这个数据库基准。此外，很少有数据库基准测试工具实现了 TPC-E；事实上目前只有两个，这将在第 3 章我们回顾当前可用的流行数据库基准测试软件时介绍。


    和之前一样，让我们首先从[tpc.org](http://tpc.org)网站和 TPC-E 规范来看 TPC-E 数据库基准的定义：


    *   网站：TPC-E 比以前的 OLTP 基准（如 TPC-C）更复杂，因为它具有多样化的事务类型、更复杂的数据库和整体执行结构。TPC-E 涉及 12
