    ## 系列执行


    使用 HammerDB 时，有一个最终的技巧需要学习：“我们如何运行一系列递增的虚拟用户数，以找出可能的最大值？” 事实上，你完全可以说所有的基准测试工作都应该以这种方式进行；因此，这是一个需要学习和掌握的关键方面。实际上这相当简单，在完成数据库对象和驱动加载步骤后，你只需启用
    `Autopilot` 功能，指定每次迭代的运行时间和每次迭代的虚拟用户数，如图 3-26 所示。


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig26_HTML.jpg](img/464117_1_En_3_Fig26_HTML.jpg)

    *图 3-26：使用 HammerDB 自动驾驶模式*


    在图 3-26 中，我指定了 1、然后 2、然后 4，最后是 8 个虚拟用户场景。我无法要求更多，因为我知道我只创建了一个仓库，因此根据规格不能有超过 10
    个虚拟用户。我还勾选了显示虚拟用户输出的复选框，并将每个用户的迭代记录到一个唯一命名的文件中。特别注意，我指定了五分钟的迭代周期。我是如何选择这个数字的呢？很简单，它是基于你在驱动脚本中为定时运行所指定的值，如图
    3-27 所示。


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig27_HTML.jpg](img/464117_1_En_3_Fig27_HTML.jpg)

    *图 3-27：自动驾驶模式的驱动设置*


    首先，你必须选择定时驱动选项。其次，预热时间和测试持续时间的总和必须小于图 3-26 中为每个序列指定的分钟数。另外，强烈建议在每次迭代之间执行一个检查点，以确保数据库在每次迭代开始时处于一致状态。最后，请注意，此步骤必须被选中，以代替创建虚拟用户和运行基准测试（即本章前面的步骤
    #3 和 #4），因为所有这些步骤现在将完全自动化。


    现在我们只需要启动自动驾驶模式，如图 3-28 所示。请注意，这个过程大约需要运行 20 分钟，因为我指定了四次迭代，每次五分钟。你可能需要尝试找到合适的周期值，因为预热时间
    + 测试时间 + 检查点时间并不总是完全精确。我的建议是选择一个比它们的总和至少多一到四分钟的值。


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig28_HTML.jpg](img/464117_1_En_3_Fig28_HTML.jpg)

    *图 3-28：HammerDB 自动驾驶模式运行中*


    当整个测试运行完毕后，你就可以从图 3-28 的日志窗口中，或者从文本日志文件中获取每次迭代的 `TPM` 数值并绘图。


    ### Benchmark Factory


    另一款支持多种数据库平台的流行数据库基准测试工具是 Quest Software 的 `Benchmark Factory for Databases`。虽然它是一款商业软件（当然需要花钱），但也有一个非常好的免费版本（限制
    100 个并发数据库会话）。我使用这个工具多年，认为对于希望快速执行并获得行业标准数据库基准测试评分的人来说，它是一款非常出色的数据库基准测试工具。在这方面，它与
    HammerDB 非常相似。然而，与 HammerDB 最初可能难以学习的用户界面不同，Benchmark Factory 提供了非常简单的向导来完成 HammerDB
    中的所有步骤，将之前的 20 页内容简化为几个简单的步骤。因此，本节将比上一节短得多。


    你可以在以下网址分别找到 Benchmark Factory 的网页、社区和免费软件下载。


    *   [`www.quest.com/products/benchmark-factory`](https://www.quest.com/products/benchmark-factory)

    *   [`community.toadworld.com/products/benchmark-factory`](https://community.toadworld.com/products/benchmark-factory)

    *   [`www.toadworld.com/download/benchmark-factory-for-databases/freeware`](https://www.toadworld.com/download/benchmark-factory-for-databases/freeware)


    `Benchmark Factory` 仅提供 Windows 版本，支持 32 位和 64 位。当前版本是 8.0。当你在 Windows 上运行安装程序时，它会按照你的预期（基于所安装版本的位数）将软件安装在
    `C:\Program Files` 或 `C:\Program Files (x86)` 目录下。然后要运行软件，你只需双击 Benchmark Factory
    的桌面或开始菜单图标。当 Benchmark Factory 软件启动时，它会显示如图 3-29 所示的屏幕。


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig29_HTML.jpg](img/464117_1_En_3_Fig29_HTML.jpg)

    *图 3-29：Quest 的 Benchmark Factory*


    为了定义和运行数据库基准测试，你只需按下图 3-29 中高亮显示的新建工具栏图标。你也可以通过文件菜单进入。向导的第一步将为运行基准测试定义一个数据库连接，如图
    3-30 所示。


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig30_HTML.jpg](img/464117_1_En_3_Fig30_HTML.jpg)

    *图 3-30：定义数据库连接*


    如果我们选择在 Oracle 上运行 TPC-C 数据库基准测试，那么此屏幕上显示的字段会略有不同。因此，尽管此屏幕可能因数据库平台而异，但大多数数据库管理员都会发现所有请求的信息都相当直观。


    向导的第二步是选择要运行的数据库基准测试，如图 3-31 所示。请注意顶部附近的下拉框，它显示了行业标准基准测试。`Benchmark Factory` 还提供了其他几种测试，包括可扩展性测试、用户基于现有测试设计的自定义测试（例如，50%
    TPC-C 和 50% TPC-H），以及工作负载捕获/重放。


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig31_HTML.jpg](img/464117_1_En_3_Fig31_HTML.jpg)

    *图 3-31：选择数据库基准测试*


    向导的第三步允许用户定义所有执行参数和选项，如图 3-32 所示。请注意，我选择运行比例因子为 2 的 TPC-C，这将消耗 162 MB 的空间，并且用户会话迭代次数为
    1、2、4 和 8，就像之前使用 HammerDB 时所做的那样。剩下的就是按下运行作业按钮。


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig32_HTML.jpg](img/464117_1_En_3_Fig32_HTML.jpg)

    *图 3-32：选择数据库基准测试*

