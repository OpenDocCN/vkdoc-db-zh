- fmt: "## All the Required Tools\n\nIn Chapter [1](#464117_1_En_1_Chapter.xhtml),\
    \ I likened database benchmarking to a cardiac stress test. That’s the procedure\
    \ where a doctor, most often a cardiologist, hooks you up to a heart monitor and\
    \ has you walk briskly or run on a treadmill for some prolonged duration. The\
    \ doctor’s goal is to “*get your heart rate up*” and “*to make you sweat.*” I\
    \ like to reference Figure [5-1](#464117_1_En_5_Chapter.xhtml#Fig1) shown here\
    \ whenever discussing what’s required to successfully perform a database benchmark.\n\
    \n![../images/464117_1_En_5_Chapter/464117_1_En_5_Fig1_HTML.jpg](images/464117_1_En_5_Chapter/464117_1_En_5_Fig1_HTML.jpg)\n\
    \nFigure 5-1: Benchmarking like Cardiac Stress Test\n\nFor a cardiac stress test,\
    \ there is a doctor, the electrocardiogram (ECG) monitor, the treadmill, and the\
    \ patient. Likewise the database benchmark has a database expert, often a DBA,\
    \ a database monitoring tool, their database, and the database benchmarking software.\
    \ For the cardiac stress test the doctor will decide what treadmill inclination,\
    \ what speed, what duration, what to monitor, how to diagnose, how to treat, and\
    \ so on. Similarly the database expert will choose a benchmark, it’s database\
    \ size, the number of users, the duration, and so on. Seems simple enough – right?\n\
    \nThe one recurring, major problem that I encounter when assisting with database\
    \ benchmarking projects is that the database expert (or the nonexpert if none\
    \ is assigned) mistakenly assumes that the benchmarking tool will monitor the\
    \ database, report on the issues, and then make recommendations. I have to remind\
    \ them that the benchmarking tool is just the treadmill. Its only job is to stress\
    \ the database to make it sweat. How or why they expected the database benchmarking\
    \ tool to do it all is a mystery to me. I guess it’s just wishful thinking, but\
    \ I see it in about 25% of the projects I help. It’s often the first problem we\
    \ have to address when I join the project. Finally remember that most database\
    \ monitoring tools only show the symptoms, they do not give advice on the corrective\
    \ actions. Plus even if they do, often that advice is rather generic in nature\
    \ and not specifically attuned to your hardware and workload.\n\n## No Big Red\
    \ Easy Button\n\nThis last issue, expecting the database benchmarking tool, is\
    \ actually just one symptom of a debilitating condition I commonly refer to as\
    \ “*Looking for the big red easy button.*” So I show people Figure [5-2](#464117_1_En_5_Chapter.xhtml#Fig2)\
    \ in an effort to explain that while the office supply store Staples may market\
    \ that they make all ordering very simple, showcasing the big red easy button,\
    \ there is in fact no such thing when performing database benchmarking. That no\
    \ benchmarking tool is an all-in-one stop offering a big read easy button experience.\
    \ Astoundingly this seems to shock most people. Database benchmarking is hard\
    \ work no matter how you slice it. There is simply no getting around this fact.\n\
    \n![../images/464117_1_En_5_Chapter/464117_1_En_5_Fig2_HTML.jpg](images/464117_1_En_5_Chapter/464117_1_En_5_Fig2_HTML.jpg)\n\
    \nFigure 5-2: The Staples Office Store Big Red Easy Button\n\nMost database benchmarking\
    \ tools work fairly similarly, and thus most database benchmarking efforts proceed\
    \ in much the same way. As such, let’s examine what basics steps any successful\
    \ database benchmark effort, regardless of database benchmarking tool, must perform\
    \ in their entirety in order to meet expected results. Understanding these steps\
    \ will help to better explain what’s meant by “*no big red easy button!*”\n\n\
    1.  Configure and optimize an isolated network segment.\n2.  Configure and optimize\
    \ the server hardware.\n3.  Install and optimize the server operating system.\n\
    4.  Install and optimize the database software (e.g., Oracle, SQL Server, PostgreSQL,\
    \ MySQL, etc.).\n5.  Create and optimize the “TEST” database.\n6.  Create user\
    \ or schema to own the benchmark’s database objects (i.e., tables and indexes).\n\
    7.  **Create and load the benchmark database objects to their initial, pre-workload\
    \ state (obviously dropping any preexisting database objects).**\n8.  **Run the\
    \ benchmark workload or transactions as defined by the spec (in most cases altering\
    \ the data, thereby requiring reload if run again).**\n9.  Monitor database performance\
    \ under workload, diagnose, and then optimize.\n10. Repeat steps 7, 8, 9, and\
    \ 10 until satisfied (i.e., results approximate or match expectations).\n\nIn\
    \ this oversimplified 10-step process, at best benchmarking tools can really only\
    \ automate steps 7 and 8 (highlighted in bold above). Also note that those steps\
    \ are inherently inefficient in that execution iterations, which is a best practice\
    \ and quite common, requires the database benchmarking tool to reload all the\
    \ data each time. In the case of a 30TB TPC-H, that might take a week! So there\
    \ must be a better, more efficient way. I suggest replacing steps 6,7, and 8 with\
    \ the breakdown below.\n\n*   Create two database schemas:\n    *   SCHEMA-1 for\
    \ holding a static copy of the “*default*” database objects as created by the\
    \ benchmarking tool without any permissible structural optimizations\n    *  \
    \ SCHEMA-2 for holding a structurally optimized copy of the database objects for\
    \ an execution iteration\n*   Create the database benchmarking tool’s standard\
    \ project definition for the desired benchmark of a given size.\n*   Separate\
    \ the standard benchmarking tool’s project into two distinct phases:\n    *  \
    \ PHASE-1 to create the database objects and load the data into SCHEMA-1\n   \
    \ *   PHASE-2 copy all the data from SCHEMA-1 to SCHEMA-2 and run the next iteration’s\
    \ execution\n*   Run the PHASE-1.\n*   Back up or export SCHEMA-1 (for any unplanned\
    \ failures).\n*   Manually write a SQL script to create optimized copies of the\
    \ database objects, and load them using “create table as select” (CTAS) (runs\
    \ on database server so very quickly).\n*   Manually add the CTAS SQL script to\
    \ PHASE-2 copying from SCHEMA-1 to SCHEMA-2 and then running the test.\n*   Run\
    \ PHASE-2 to execute a test as many times as you like.\n\nWhile this takes the\
    \ simple 10-step process to 15 steps, it actually makes the process easier to\
    \ understand (i.e., divide and conquer) and makes repetitive test execution several\
    \ orders of magnitude faster. Plus now if you want to add other SQL scripts to\
    \ collect statistics and histograms, you now have proper segregation of processing\
    \ and locations where you can add them. So as you can see, the idea of a big red\
    \ easy button or simple benchmarking is patently false. Database benchmarking\
    \ is tough work and requires attention to detail plus manual work to optimize\
    \ an otherwise inefficient process."
