- fmt: "*   水平表分区（包括多级分区）\n*   辅助数据结构（存在一些限制）\n\n请注意，TPC-H仅允许水平分区，不允许垂直分区。此外，TPC-H也不允许数据复制。然而，允许使用辅助数据结构这一点是最独特且强大的特性。因此，常见的数据库管理员（DBA）查询优化技术，例如创建一个完全满足查询的索引，是被允许的。此外，像物化视图（即自动化的聚合表）这样的高级技术也被允许，并且可以显著提升性能。但请注意，目前没有数据库基准测试工具能自动或通过选项来利用这些特性。因此，需要由您作为DBA手动将它们添加到测试中。这种额外的努力通常是完全值得的。\n\
    \n最后，为了更全面地理解TPC-H，您真的需要查阅其规范并仔细研究所有22个复杂的查询。它们都是为了刻意给数据库内部的SQL优化器和执行引擎的各个方面施加压力而设计的。列表[2-1](#464117_1_En_2_Chapter.xhtml#PC1)展示了TPC-H中一个最不复杂且易于阅读的查询，即潜在零件促销查询（Q20）。根据TPC-H规范，此查询用于识别特定国家/地区中，拥有可能是促销活动候选零件的供应商。\n\
    \n```\nSELECT   s_name, s_address\nFROM h_supplier, h_nation\nWHERE s_suppkey\
    \ IN (\nSELECT ps_suppkey\nFROM h_partsupp\nWHERE ps_partkey IN (SELECT p_partkey\n\
    FROM h_part\nWHERE p_name LIKE 'dark%')\nAND ps_availqty >\n(SELECT 0.5 * SUM\
    \ (l_quantity)\nFROM h_lineitem\nWHERE l_partkey = ps_partkey\nAND l_suppkey =\
    \ ps_suppkey\nAND l_shipdate >=\nTO_DATE ('1997-01-01', 'YYYY-MM-DD')\nAND l_shipdate\
    \ <\nADD_MONTHS (TO_DATE ('1997-01-01',\n'YYYY-MM-DD'\n),\n\n)))\nAND s_nationkey\
    \ = n_nationkey\nAND n_name = 'MOROCCO'\nORDER BY s_name\n```\n列表 2-1\nTPC-H 查询\
    \ #20\n\n这22个TPC-H查询的复杂性在预期的使用方面产生了一个非常有趣的副作用。我发现这22个查询非常适合比较数据库在大版本发布或小补丁更新后的相对性能提升或下降。我也发现它们同样适用于比较一个数据库供应商的SQL优化器和引擎与另一个的差异。这就是为什么TPC-H是我经常使用的最喜欢的基准测试之一的真实原因。\n\
    \n### TPC-DS\n\n最新且较为流行的数据库基准测试是TPC-DS，它只存在了两年多一点（2015年8月）。与TPC-E类似，TPC-DS往往更受硬件和数据库供应商的青睐。一个值得注意的例外是Jim\
    \ Czuprynski, Deiby Gomez 和 Bert Scalzo 最近出版的书《*Oracle Database 12c Release 2\
    \ Testing Tools and Techniques for Performance and Scalability*》（Mc-Graw Hill\
    \ Education, 2017）。在那本书中，作者广泛使用TPC-DS基准测试来展示性能优化和数据库可扩展性的宝贵技术。事实上，这本书简直充满了来自TPC-DS的示例查询和工作负载，并附有修改建议以及优化前后的结果。这是因为，与TPC-H类似，TPC-DS可用于比较数据库在大版本发布或小补丁更新后的相对性能提升或下降，也可用于比较一个数据库与另一个。\n\
    \n让我们再次从[tpc.org](http://tpc.org)网站和TPC-DS规范开始，了解TPC-DS数据库基准测试的定义：\n\n*   网站：TPC-DS是一个决策支持基准测试，它模拟了决策支持系统的多个通用方面，包括查询和数据维护。它为通用决策支持系统的性能提供了具有代表性的评估。\n\
    *   TPC-DS 规范：与网站定义相同。\n\n和之前一样，这两种定义都没有真正提供任何关于应用工作负载本质的有意义的洞见，只是说它模拟了决策支持系统的某些方面。这里有一个更详尽、也因此更有用的定义：\n\
    \n> *TPC-DS 模式专门设计用于模拟一个零售产品供应商的复杂数据仓库应用工作负载，该供应商为其客户提供通过三个主要销售渠道生成商品订单的能力：邮购目录、实体店和网站。该模式包含七个事实表和十七个维度，涵盖了从三个销售渠道中的任何一个处理退货的功能，以及库存跟踪功能。*\n\
    \nTPC-E的设计非常复杂，而且它是一个真正的星型模式设计的数据仓库。七个主要的星型结构如图[2-5](#464117_1_En_2_Chapter.xhtml#Fig5)至[2-11](#464117_1_En_2_Chapter.xhtml#Fig11)所示。\n\
    \n![../images/464117_1_En_2_Chapter/464117_1_En_2_Fig11_HTML.jpg](images/464117_1_En_2_Chapter/464117_1_En_2_Fig11_HTML.jpg)\n\
    \n图 2-11\n\nINVENTORY 的星型结构\n\n![../images/464117_1_En_2_Chapter/464117_1_En_2_Fig10_HTML.jpg](images/464117_1_En_2_Chapter/464117_1_En_2_Fig10_HTML.jpg)\n\
    \n图 2-10\n\nWEB_RETURNS 的星型结构\n\n![../images/464117_1_En_2_Chapter/464117_1_En_2_Fig9_HTML.jpg](images/464117_1_En_2_Chapter/464117_1_En_2_Fig9_HTML.jpg)\n\
    \n图 2-9\n\nWEB_SALES 的星型结构\n\n![../images/464117_1_En_2_Chapter/464117_1_En_2_Fig8_HTML.jpg](images/464117_1_En_2_Chapter/464117_1_En_2_Fig8_HTML.jpg)\n\
    \n图 2-8\n\nSTORE_RETURNS 的星型结构\n\n![../images/464117_1_En_2_Chapter/464117_1_En_2_Fig7_HTML.jpg](images/464117_1_En_2_Chapter/464117_1_En_2_Fig7_HTML.jpg)\n\
