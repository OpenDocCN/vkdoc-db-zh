- fmt: '### SLOB


    Oracle DBA 最流行且广泛使用的工具之一是 SLOB，其全称是 Silly Little Oracle Benchmark。它是免费的，这进一步增加了其受欢迎程度。我称其为“高度使用”，是因为几乎每个
    Oracle DBA 都知道并使用它。但这并不一定意味着他们理解了其真正的目的。引用该工具作者 Kevin Closson 的话：


    > *SLOB 不是一个数据库基准测试工具。SLOB 是一个 Oracle I/O 工作负载生成工具包。我需要指出，由于习惯使然，许多 SLOB 用户会交替使用“基准测试”和“工作负载”等术语来指代
    SLOB。SLOB 旨在填补 Orion 与 CALIBRATE_IO 以及全功能事务性基准测试之间的空白。*


    因此，SLOB 实际上并不适合放在前面专门讨论存储基准测试的章节中，也不完全适合放在这里与数据库基准测试工具一起讨论。但正如我所说，大多数 Oracle DBA
    都在使用它，甚至连该工具的作者也承认他们经常将其误解为数据库基准测试工具。所以，基于以上说明，我们将在本节末尾介绍它。


    你可以在以下网址分别找到 SLOB 的网页和下载链接。


    *   [`https://kevinclosson.net/slob/`](https://kevinclosson.net/slob/)


    *   [`https://github.com/therealkevinc/SLOB_distribution`](https://github.com/therealkevinc/SLOB_distribution)


    SLOB 是一系列 Linux shell 脚本和一些基于 C 语言的程序。要使用 SLOB，你需要了解两个脚本：`setup.sh` 和 `runit.sh`。还有一个名为
    `slob.conf` 的文本文件，其中包含控制 SLOB 运行时行为的各种参数。你很可能需要根据你的环境编辑此文件。在我的案例中，我更改了 `SYSTEM`
    密码并将快照机制改为 AWR。


    第一个脚本 `setup.sh` 接受两个输入参数：用于创建其模式及其对象的表空间，以及要创建的模式数量。在我的案例中，我在笔记本电脑上运行一个 Linux
    虚拟机，因此我希望最小化设置：使用现有的 `USERS` 表空间并仅加载一个模式。图 [3-40](#464117_1_En_3_Chapter.xhtml#Fig40)
    展示了使用这些值执行 `setup.sh` 的情况。


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig40_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig40_HTML.jpg)


    图 3-40


    SLOB `setup.sh` 执行


    一旦 `setup.sh` 无错误完成，就该执行第二个脚本 `runit.sh` 了，它只接受一个参数：要测试的模式数量（该值应与你为 `setup.sh`
    提供的值相同或更少）。


    任务执行完成后，运行 Oracle STATSPACK 或 AWR 报告，报告的开始和结束快照由 `runit.sh` 的输出列出。然后检查报告，重点关注负载配置文件部分中引用的物理
    I/O。我的结果如图 [3-41](#464117_1_En_3_Chapter.xhtml#Fig41) 所示。


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig41_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig41_HTML.jpg)


    图 3-41


    来自 AWR 负载配置文件的 IOPS


    因此，根据大多数运行 SLOB 然后读取 AWR 报告的负载配置文件部分来计算 IOPs 的人的说法，我的笔记本电脑大约运行在 428 IOPS。然而，我认为这个数字并非
    100% 准确。我更倾向于查看 AWR 报告中更靠下的部分，如图 [3-42](#464117_1_En_3_Chapter.xhtml#Fig42) 所示，查看按文件类型汇总的
    IOStat，其显示的总数更接近 990 IOPS。


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig42_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig42_HTML.jpg)


    图 3-42


    来自 AWR IOStat 汇总的 IOPS


    ## 总结


    在本章中，我们相当详细地介绍了所有知名且流行的 IO 子系统压力测试和数据库基准测试工具。对于后者，我们涵盖了运行数据库基准测试所需的所有步骤。有些工具比其他工具简单得多。有些工具只提供一种基准测试，而另一些则提供多种。但目前没有一种工具能提供所有行业标准的数据库基准测试。因此，作为一名数据库基准测试专业人员，你可能需要精通其中的几种工具。


    # 4. 基准测试准备


    此时，你可能认为自己已经完全准备好开始数据库基准测试工作了，凭借的仅是迄今为止提供的信息：数据库基础知识、各种行业标准数据库基准测试的概述，以及可用的 IO
    子系统和数据库基准测试工具的阐明。因此，你们中的一些人可能觉得本章只是填充内容或花哨的装饰。但我要强调，本章实际上是整本书中最关键的一章，应该以最多的注意力来阅读。事实上，我将进一步说明，未能按本章所述进行准备，可以说是导致下一章出现失误和失败的最大因素。


    当我年轻的时候，我曾是美国童子军的一员。虽然我可能没有成为鹰级童子军或获得很多徽章，但我确实学到了很多。那时深深烙印在我脑海里的是童子军的座右铭：时刻准备着！这两个简单的词蕴含着巨大的智慧。将这一理念延伸，本杰明·富兰克林说过：“不为成功做准备，就是在准备失败。”这些话在生活中的许多方面都千真万确，尤其是在数据库基准测试方面。想象一位美式橄榄球（不是足球）教练不准备比赛计划，当他输掉比赛时，你真的会感到惊讶吗？事实上，你可能会和其他球迷一起要求换掉教练，如果现任教练毫无计划或计划不佳就参加比赛。对教练有益的东西，对数据库基准测试专业人员同样有益。如果准备不足，那么或许就是换人的时候了。'
  raw: '### SLOB


    One of the most popular and highly utilized tools for Oracle DBA’s is SLOB, which
    stands for Silly Little Oracle Benchmark. It’s also free so that tends to add
    to its popularity. I say highly used because almost every Oracle DBA under the
    sun knows about and uses it. But that does not necessarily mean that they appreciate
    its true purpose. To quote Kevin Closson, the tool’s author:


    > *SLOB is not a database benchmark. SLOB is an Oracle I/O workload generation
    tool kit. I need to point out that by force of habit many SLOB users refer to
    SLOB with terms like benchmark and workload interchangeably. SLOB aims to fill
    the gap between Orion and CALIBRATE_IO and full-function transactional benchmarks.*


    Therefore SLOB really doesn’t fit in the prior section dedicated to storage benchmarking,
    nor does it legitimately fit in here with the database benchmarking tools. But
    as I said, most Oracle DBAs utilize it, and even the tool’s author admits they
    often misinterpret it as a database benchmarking tool. So we’ll cover it here
    at the end of this section with those caveats.


    You will find SLOB’s web page and download at the following URLs respectively.


    *   [`https://kevinclosson.net/slob/`](https://kevinclosson.net/slob/)


    *   [`https://github.com/therealkevinc/SLOB_distribution`](https://github.com/therealkevinc/SLOB_distribution)


    SLOB is a collection of Linux shell scripts and some C programming language-based
    programs. There are two scripts you need to be aware of to use SLOB: setup.sh
    and runit.sh. There is also a text file named slob.conf that contains various
    parameters that control SLOB’s runtime behavior. You will most likely need to
    edit this file for your environment. In my case I changed the SYSTEM password
    and the snapshot mechanism to AWR.


    The first script, setup.sh, takes two input parameters: the tablespace where to
    create its schemas and their objects, plus the number of schemas to create. In
    my case I’m running a Linux virtual machine on my laptop so I want a minimal setup:
    use my exiting USERS tablespace and load just one schema. Figure [3-40](#464117_1_En_3_Chapter.xhtml#Fig40)
    shows the execution of setup.sh with those values.


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig40_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig40_HTML.jpg)


    Figure 3-40


    SLOB setup.sh execution


    Once setup.sh completes with no errors, then it’s time to execute the second script,
    runit.sh, which takes just one parameter: the number of schemas to test (which
    should be the same or less than the value you gave for setup.sh).


    Once the job execution completes. then run an Oracle STATSPACK or AWR report for
    the begin and end snapshots listed by runit.sh output. Then examine the report
    concentrating on load profile section for the physical IO’s quoted. My results
    are shown in Figure [3-41](#464117_1_En_3_Chapter.xhtml#Fig41).


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig41_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig41_HTML.jpg)


    Figure 3-41


    IOPS from AWRLoad Profile


    So according to most people who run SLOB and then read the AWR report’s Load Profile
    section to calculate the IOPs, my laptop was running around 428 IOPS. However,
    I think that this number is not 100% accurate. I prefer to instead look further
    down in the AWR report as shown in Figure [3-42](#464117_1_En_3_Chapter.xhtml#Fig42)
    at the IOStat by Filetype Summary, which shows the total to be more like 990 IOPS.


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig42_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig42_HTML.jpg)


    Figure 3-42


    IOPS from AWR IOState Summary


    ## Summary


    In this rather lengthy chapter, we covered all the well-known and popular IO subsystem
    stress testing and database benchmarking tools. For the latter, we covered all
    the steps required to run a database benchmark. Some tools were far easier than
    others. Some tools offered just one benchmark while others offered several. But
    no one tool currently offers all the industry-standard database benchmarks. So
    as a database benchmarking professional, you will likely need to master several
    of these tools.


    # 4. Benchmarking Preparation


    At this point you may believe yourself fully ready to start your database benchmarking
    efforts, armed with just the information provided thus far: the database benchmarking
    basics, an overview of the various industry-standard database benchmarks, and
    an elucidation of the IO subsystem and database benchmarking tools available.
    Therefore, some of you might feel like this chapter is merely filler or fluff.
    But I’m going to impress that this chapter is, in fact, the most critical one
    in the entire book, and should be read with the most attention. In fact, I will
    further state that failure to prepare as described in this chapter is arguably
    the single largest contributor to the next chapter: missteps and failure.


    When I was a young man I belonged to the Boy Scouts of America. While I may not
    have made Eagle Scout or earned lots of badges, I did learn quite a lot. The one
    thing permanently etched into my mind from then is the Boy Scouts motto: Be prepared!
    There is great wisdom in those two simple words. Taking that concept further,
    Benjamin Franklin said, “By failing to prepare, you are preparing to fail.” Those
    words ring true for many things in life, but especially database benchmarking.
    Imagine an American football (not that soccer stuff) coach who does not prepare
    a game plan, would you really be surprised when they lost? In fact, you might
    join other fans in asking for a new coach if the current coach entered a game
    with no plan or even just a poor plan. What’s good for the coach is good for a
    database benchmarking professional. If ill prepared, then probably it is time
    for a new person.'
