    *   **隐式** —— 并非因指令而创建。


    请注意，`TPC-H` 仅允许水平分区，而不允许垂直分区。此外，`TPC-H` 也不允许数据复制。然而，其独特且强大的地方在于允许使用辅助数据结构。因此，常见的
    `DBA` 查询优化技术（例如创建一个能完全满足查询需求的索引）是被允许的。此外，高级技术如物化视图（即自动化聚合表）也被允许使用，并能带来显著的性能提升。但请注意，目前没有任何数据库基准测试工具能自动或通过选项来利用这些功能。因此，需要由你作为
    `DBA` 手动将这些添加到测试组合中。这种额外的努力通常是完全值得的。


    为了更全面地理解 `TPC-DS`，你确实需要查阅其规范并研究所有 100 个复杂查询。`TPC-DS` 规范主要关注从可能海量的数据集中获取业务答案。从这个角度来看，`TPCDS`
    基准测试最重要的部分是那近 100 个独立的查询，它们试图为这些特定的业务问题提供答案。每个 `TPC-DS` 查询都实现了不同程度的分析复杂性；有些查询会访问
    10 个或更多的事实表和维度表，因此会根据为查询选择条件提供的值产生不同且复杂的执行计划。清单 2-2 展示了一个 `TPC-DS` 的查询，业务查询 6
    (`Q6`)。根据 `TPC-DS` 规范，此查询列出了所有至少有 10 名客户的州，这些客户在给定月份购买了价格比同类商品平均价格至少高出 20% 的商品。


    ```

    SELECT a.ca_state state, COUNT(*) cnt

    FROM  tpcds.customer_address a ,

    tpcds.customer c ,

    tpcds.store_sales s ,

    tpcds.date_dim d ,

    tpcds.item i

    WHERE a.ca_address_sk   = c.c_current_addr_sk

    AND c.c_customer_sk   = s.ss_customer_sk

    AND s.ss_sold_date_sk = d.d_date_sk

    AND s.ss_item_sk      = i.i_item_sk

    AND d.d_month_seq = (SELECT DISTINCT (d_month_seq)

    FROM  tpcds.date_dim

    WHERE d_year = 2001

    AND d_moy    = 6)

    AND i.i_current_price > 1.2 * (SELECT AVG(j.i_current_price)

    FROM  tpcds.item j

    WHERE j.i_category = i.i_category)

    GROUP BY a.ca_state

    HAVING COUNT(*) >= 10

    ORDER BY cnt

    ```

    清单 2-2

    `TPC-DS` 查询 #6


    请注意，目前只有一个数据库基准测试工具实现了 `TPC-DS` 基准测试。但鉴于当前市场对与数据分析相关的所有事物的热情，我预计其他工具在不久的将来也会跟进。然而，这个包含
    7 个星型模式和 100 个复杂查询的基准测试在实现上提出了巨大的挑战。


    ## 注意


    以下章节将对剩余的不太流行或已过时的数据库基准测试进行较简略的介绍。这并不一定意味着它们不够复杂或不值得，只是因为前述的数据库基准测试更为常见，因此读者更有可能会去执行它们。


    ## 较不流行的基准测试


    ### TPC-DI


    回顾流行的数据库基准测试，我们有针对 `OLTP`、通用报表和星型模式数据仓库的测试。那么缺少的是什么？是通过批处理作业将数据加载到报表系统和数据仓库中！事实上，多年来，被加载和保留的数据量急剧增长。其规模之大，使得“提取、转换和加载”
    (`ETL`) 这一术语已被更全面的“数据集成” (`DI`) 所取代。因此，`TPC-DI` 基准测试应运而生，以满足这一特殊而重要的细分需求。`TPC-DI`
    系统架构的概念模型如图 2-12 所示。


    ![../images/464117_1_En_2_Chapter/464117_1_En_2_Fig12_HTML.jpg](img/46117_1_En_2_Fig12_HTML.jpg)

    图 2-12

    `TPC-DS` 系统概念模型


    这个图应该不会让任何人感到意外，因为这是创建数据仓库时展示的典型架构图。有些人可能会跳过暂存区概念，直接加载到数据仓库中，这就是为什么暂存区用虚线框表示（即可选）。目标数据仓库设计是一个传统的维度模型，通常称为星型模式。这种方法在
    2002 年 Ralph Kimball 的著作《`The Data Warehouse Toolkit`》（Wiley）中得到了最佳描述。然而，Ralph
    实际上在早年 `Redbrick`（一家早期进入数据仓库数据库供应商领域的公司）时就首次提出了这样的设计。我实际上在 1995 年左右见过 Ralph，当时他正在做现场研讨会。他教了我星型模式，我教了他数据建模（我当时在
    `Erwin` 数据建模工具的制造商 `Logic Works` 工作）。基于我在 1995 年学到并在之后八年多实践中运用的知识，我也在 2003 年写了一本书，名为《`Oracle
    DBA Guide to Data Warehousing and Star Schemas`》（Prentice Hall）。尽管那本书距今已有 15 年，但其所倡导的技术至今仍然适用。


    `TPC-DI` 数据仓库的基本概念数据模型如图 2-13 所示。


    ![../images/46117_1_En_2_Chapter/46117_1_En_2_Fig13_HTML.jpg](img/46117_1_En_2_Fig13_HTML.jpg)

    图 2-13

    `TPC-DS` 概念数据模型


    对于数据仓库的新手，这里出现了两个不同的术语。维度表是较小的、反规范化的表，包含最终用户查询的业务描述性列。这些表通常会被完全索引以最好地支持即席查询。事实表是非常大的表，其主键由所有相关维度表的外键列连接而成，并包含可用于最终用户查询期间计算的、可数字加总的非关键列。


    ### TPC-VMS


    随着过去十年虚拟化的热潮，数据库——即使是大型、任务关键的数据库——最终在 `Hypervisor`（例如 `VMware`）上作为虚拟机 (`VM`) 运行已成必然趋势。`SQL
    Server` 数据库管理员和开源数据库的用户欣然接受了这一转变。在 `Oracle` 等一些数据库平台上，数据库管理员起初是抗拒的，后来也缓慢地全面采用。然而，随着时间的推移以及现在数据库上云，几乎没有数据库管理员会对将其数据库放在
    `VM` 上有任何保留意见。这导致了对一种可靠的、用于虚拟机环境的数据库基准测试的需求。请记住，服务器上的一个 `Hypervisor` 可能同时运行许多
    `VM`，因此还必须处理数据库整合不同类型数据库的特殊考虑。


    `TPC-VMS` 于 2012 年推出，旨在满足这一特殊需求。`TPC-VM` 基准测试利用了前一节中流行的基准测试（即 `TPC-C`、`TPC-E`、`TPC-H`
    和 `TPC-DS`）。然而，`TPC-VM` 认为其每个测试的版本都是独特的，因此它们彼此之间不可比较，与它们所派生的基准测试也不可比较。当你实例化一个
    `TPC-VM` 基准测试时，你会选择上述四个基准测试中的一个，然后运行三个 `VM`，每个 `VM` 都运行所选基准测试下相同规模的数据库。结果的计算方式也有所不同。但由于它并不非常流行，我们将省略这些细节。它们在规范中有完整定义。


    我唯一的缺点是，我宁愿让 `TPC-VMS` 运行四个基准测试中的三个甚至全部四个，以便可以测试不同的工作负载。也许这将在未来的规范更新中得到解决，或者甚至可能出现一个全新的基准测试（因为评分方式可能不得不有所不同）。

