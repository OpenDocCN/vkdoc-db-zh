    >*DVD Store Version 2 (DS2)* 是一个完整的**在线电子商务测试**应用程序，包含后端数据库组件、Web 应用层和驱动程序。设计数据库组件和中间层应用的目标在于充分利用许多高级数据库特性（事务、存储过程、触发器、参照完整性），同时保持数据库易于安装和理解。DS2
    工作负载可用于测试数据库，也可作为任何目的的压力测试工具。


    然而，虽然某些硬件供应商的数据库基准测试可以在不同数据库供应商之间进行一定程度的公平和可靠性的比较（如戴尔 DVD Store 基准测试），但那些侧重于特定组件（如
    I/O 子系统）的其他硬件供应商数据库基准测试通常则不能。一个很好的例子是非常流行的 "`Silly Little Oracle Benchmark`" (SLOB)。该基准测试旨在突出基于闪盘系统的原始数据库写入性能。因此，它的设计更侧重于测试写入活动而非读取。本质上，它只发出两个命令：大规模更新和计数选择。因此，它实际上并不测试查询优化器或数据库引擎的任何其他高级方面——只测试它写入数据的速度有多快。这并不意味着它是一个糟糕的测试或需要避免使用它。但你需要了解它实际测试的是什么以及它真正报告的是什么。事实上，作者^(⁵)
    在他的网页上明确指出：


    >*`SLOB` 不是数据库基准测试。`SLOB` 是一个 Oracle I/O 工作负载生成工具包。我需要指出，由于习惯使然，许多 `SLOB` 用户将
    `SLOB` 与基准测试和负载等术语互换使用。`SLOB` 旨在填补 `Orion` 和 `CALIBRATE_IO`（正如这里部分解释的，两者都不产生合法的数据库
    I/O）与全功能事务基准测试（如 `Swingbench`）之间的空白。事务负载旨在测试数据库的事务处理能力。*


    数据库基准测试的另一个来源是一些开源工作，特别是一些较大的开源数据库项目。例如，PostgreSQL 提供 "`pgbench`" 作为比较性能的标准工具。虽然它使运行测试变得相当容易，但它仅适用于
    PostgreSQL，并且更重要的是，文档明确指出：


    >*要进行基准测试，必须执行与生产负载和查询类型相似的测试。例如，`pgbench` 查询不执行连接、在文本字段上使用正则表达式的 where 子句，以及许多应用程序中会出现的其他查询类型。*


    此外，MySQL 提供了 "`MySQL Benchmark Tool`"，它仅针对 MySQL 数据库运行三个数据库基准测试：

    1.  `DBT2`

    2.  `SysBench`

    3.  `flexAsynch`


    其中文档对这些数据库基准测试定义如下：


    >*`DBT2` 是一个模拟拥有大量仓库的公司 OLTP 应用的开源基准测试。它包含处理新订单、订单录入、订单状态、支付和库存处理的事务。`FlexAsynch`
    是专门开发用于测试 MySQL Cluster 可扩展性的基准测试。`Sysbench` 是一个流行的开源基准测试，用于测试开源 DBMS。*


    到目前为止，数据库基准测试拥有一个漫长、多样且非常有趣的历史，这一点应该相当清楚了。然而，同样显而易见的是，只有 `TPC` 基准测试旨在客观地测试现实世界的数据库性能并提供公平的结果。我们将在第
    2 章更全面地介绍所有相关的 `TPC` 数据库基准测试。


    ## 什么是工作负载捕获/回放？


    对许多人来说，针对特定目的（如"`在线事务处理`" (`OLTP`) 或 "`数据仓库`" (`DW`)）的行业标准数据库基准测试这一概念已经足够。但对有些人来说，这些预先封装的"`合成`"测试还不够。他们希望根据其数据库应用程序的实际性质，获得更现实和有意义的东西。他们本质上渴望的是进行数据库压力测试的第一种方法（即监控和捕获命令），但希望是针对
    100%的活动，而不仅仅是手动、有些随机的样本。他们想要全部。他们希望在一段定义的时间内获得其所有数据库活动的完整快照。此外，他们希望它以可按需回放的方式打包。简而言之，他们想要的就是所谓的**工作负载捕获和回放**。这基本上就是它的名字所表达的意思，对于许多数据库管理员来说，这是他们认为唯一有意义的基准测试。


    很难反驳这种自然而合乎逻辑的观点。这完全符合常识。但正如谚语所说，"`通往地狱的道路由善意铺就`"，意思是说，良好的意愿在付诸行动时可能会产生意想不到的后果。为了使工作负载捕获/回放真正具有代表性，你必须使用大小完全相同且数据相同（或至少数据分布相同）的数据库，这样结果才准确。这意味着需要复制你整个
    100TB 的生产数据库，保持数据原样进行测试，因此不能进行数据子集化或数据屏蔽。这转化为非常大的硬件和软件成本，此外，由于真实的生产数据现在在你的测试环境中完全可用，这构成了巨大的安全风险。你的管理层可能会对预算影响有点小题大做，但你的安全与合规人员会因为你这样做而让你丢掉工作。


    工作负载捕获和回放的另一个主要问题是，并非每个数据库供应商都提供此功能，而对于那些提供的供应商来说，该功能可能成本高昂（Microsoft SQL Server
    是一个显著的例外）。当然，数据库供应商的工作负载捕获/回放工具只适用于其自身的数据库。对于许多公司来说，这意味着需要采用多种工具，因为如今我们都部署不止一个数据库供应商的产品。也有一些第三方软件供应商，但数据库供应商通常不会共享其系统内部细节，因此有些人质疑在没有这种访问权限和洞察力的情况下，此类解决方案的有效性和效率如何。尽管如此，对于那些希望其数据库基准测试能反映其数据库应用程序实际性能的人来说，工作负载捕获/回放仍然是他们追求的圣杯。


    ## 为什么这些技术有用


    如前所述，数据库基准测试有其真正的怀疑论者。然而，我们中没有人会像环保署 (`EPA`) 那样驾驶车辆来验证燃油经济性，但我们都会寻找购买任何新车时贴在车窗上的标签，当油价昂贵时，我们常常将那个数字视为重要信息。因此，我们清楚地看到了该基准测试的预测价值，并接受它所提供的洞察力。虽然我们不期望在自己的驾驶中达到相同的燃油经济性评级，但我们确实真诚地期望它在比较车辆时相对准确。作为人类，拥有这样一个对其可靠性有一定信念的比较是非常令人安心的，并使决策过程压力小一些。


    在日常生活中，人们依赖的类似基准测试有几十种，然而数据库基准测试却常常受到极大的怀疑。所以，让我们来审视一些你可能需要回答的问题，对于这些问题，你可能需要基准测试可能提供的一些见解（当然，前提是选择了合适的基准测试）。关键在于，如果你在购买新车时会欣然依赖
    `EPA` 的油耗基准测试，那么你一定相信某些基准测试的价值，那为什么对你的数据库不能同样如此呢？

