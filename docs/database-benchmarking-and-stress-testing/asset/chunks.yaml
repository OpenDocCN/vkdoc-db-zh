- fmt: '## Capture Duration


    The first and primary consideration that the DBA overseeing a workload capture
    must decide is the time and duration. This is critical. While it may seem like
    an obvious and simple issue, the most common mistake I’ve seen is not picking
    an appropriate workload capture period. It should be during an exemplary period
    of the day when the workload is high. Yes, this will add overhead to production,
    which is never a welcome thing. But to capture the workload during any other time
    yields far less-effective replays for proper tuning and optimization. In fact,
    I’d argue that if your need for a workload capture and replay does not justify
    performing it during a peak activity period, then it’s probably not worth doing
    at all. Imagine a surgeon having to make a decision regarding an amputation due
    to infected tissue spreading. That’s a no-brainer decision that would be done
    as soon as possible because the cost of not doing it is high. If management says
    this task is important yet they will not permit performing the capture during
    a peak period, then you should explain the fallacy in such a position and push
    hard to be allowed to do a one-time capture that has value regardless of cost.
    When the answer is still no, then you should argue against doing it at all or
    at least lower the expectations on the value and thus achievable results given
    a suboptimal capture.


    Once you get approval for a peak activity period, the next question is how long
    to run the capture. We want to run the capture long enough to collect a meaningful
    and useful sample. But we also want to run it as quick as possible to minimize
    impacts to production and end users. I’ve seen people perform a capture from as
    short as 15 minutes to as long as 8 hours (and once even 24 hours, but that was
    a rare exception). While there is no true right or wrong answer, I am going to
    suggest that those two extremes are most likely wrong. The best way to pick the
    duration is to ask the businesspeople what are the true mission-critical, peak
    workload hours. For example, while an example OLTP system might process activity
    primarily from 8 a.m. to 5 p.m., it may be that the business users can shorten
    that duration by identifying a key range within that period. Maybe because the
    business spans the four time zones in the United States that the key period is
    when all time zones are in normal business hours highlighted in Table [11-1](#464117_1_En_11_Chapter.xhtml#Par17).
    Therefore, the best period is anytime from 11 a.m. to 5 p.m. Since there is a
    traditional one-hour, noon lunch break for all employees, we strike out those
    rows that contain 12:00. Therefore we now have but two options: from 11:00 to
    12:00 or from 4:00 to 5:00. It’s not always this easy, but the idea is that by
    asking business users some questions that options for a good period will present
    themselves.


    ***Table 11-1.*** *Finding the Optimal Capture Period*


    ![../images/464117_1_En_11_Chapter/464117_1_En_11_Figa_HTML.gif](images/464117_1_En_11_Chapter/464117_1_En_11_Figa_HTML.gif)


    I’ll conclude this topic by stating that for me, the ideal capture period is often
    and typically no shorter than one hour and no longer than four hours. In general,
    you need to capture neither too little nor too much activity, but rather whatever
    is the right amount for the task at hand to be solved. There of course will be
    exceptions. For example, let’s assume that quarter-end processing takes eight
    hours to perform its task, then that’s the right period of time for a workload
    capture of that activity. A final consideration often will be the processing overhead
    and disk space required for the captured transactions. So while a longer period
    might be best, sometimes you may have to restrict to the minimum viable period
    due to these other considerations and their costs.


    ## Replay Architecture


    With this approach of using database benchmarking tools offering capture/relay,
    the deployment architecture for the benchmarking tool itself is critical. Look
    at Figure [11-1](#464117_1_En_11_Chapter.xhtml#Fig1), and then ask yourself why
    such a complex picture?


    ![../images/464117_1_En_11_Chapter/464117_1_En_11_Fig1_HTML.png](images/464117_1_En_11_Chapter/464117_1_En_11_Fig1_HTML.png)


    Figure 11-1 Recommended Replay Architecture


    The answer is simple: you need sufficient benchmarking tool agents to adequately
    load balance all the work the database sees, which may have come from many application
    clients and servers. Imagine a traditional client/server type application being
    run by 10,000 users, or a web-based application server sending thousands of transactions
    per second to the database. You must have sufficient agents spread across computing
    resources to properly facsimilate the original workload delivery speed. If not,
    the benchmarking agent could become a bottleneck that skews the results.


    One final note, the database vendor capture/replay tools work nearly the same
    way in terms of the required architecture. While the database itself again captures
    the workload, you may need to deploy multiple database replay agents in order
    to load balance and approximate the delivery of the workload. Also note that for
    those databases that charge for the capability, they require you to license the
    capture/replay on both the source and target databases. In some cases this cost
    be quite substantial. But they do not charge extra for the agents required to
    perform the replay; it’s just charged by the database instances.


    ## Interpreting Results


    For industry-standard database benchmarking scoring, the results are fairly easy;
    you can look at transactions per second, average response time, or runtime to
    completion. In other words, there are simple scores that one can compare that
    either improve or not between executions to test various database alterations.
    But it’s not that easy with capture/replay efforts. Very few applications are
    properly metered in such a way as to provide simple performance comparisons. Plus
    not all databases inherently offer metrics such as transactions per second or
    megabytes of read/write per second. Plus even if they do, it’s probable that the
    SQL code is the performance culprit more than anything else. Hence the best way
    to utilize replays is to use standard database monitoring tools to find and correct
    bad SQL. Moreover you might be able to identify SQL statements and their corresponding
    jobs that do not play well together. For example, at one company where I was the
    primary production DBA, the majority of our batch job cycles issues were simply
    a matter of rescheduling jobs that were resource intensive or needed to be hammered
    to the same tables.


    Another method DBAs often like to pursue is to find key database wait events consuming
    too much time and correcting the root cause. Yes, sometimes it is a database configuration
    parameter or some other database issue. But most times the underlying cause is
    either bad SQL or SQL overlap that fight for competing database resources. So
    for those who prefer to start with wait events. I will not challenge your approach.
    I’ll just say that 80% of the time or more. it will be SQL code in a production
    system that is the culprit. So why not look for such SQL first?'
