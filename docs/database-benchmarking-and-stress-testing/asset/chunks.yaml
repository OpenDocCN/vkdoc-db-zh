- fmt: '# 6. Benchmarking Hardware Options


    ## Summary


    This chapter covers most of the common surprises and gotchas that you will invariably
    encounter when performing database benchmarking, even if you have followed all
    the recommended preparation in prior chapters. What it boils down to is that benchmarking
    is far too complex for anyone to identify every possible variable or issue likely
    to skew the effort and its results. Thus, being ready to handle these on-the-fly
    issues is critical. The chapter wraps up by detailing the top 10 misconceptions
    seen on many database benchmarking projects.


    ### #10: We can spend just a few days and benchmark everything we’re interested
    in


    Never. Almost universally, the proper setup of all the dependent components can
    take a week or two – and when doing large-scale benchmarks, you can sometimes
    add up to a week for data loads and index creation. So make sure to carefully
    project your time to complete such efforts. Because there will be surprises along
    the way, even if you do follow all the above advice.


    ## Draw a Picture


    When working with on-premise hardware, the first and often critical step is to
    construct an architectural diagram of all the components from top to bottom, including
    all networking and storage. There are several reasons for doing this.


    *   Serves as a common reference for comprehension, planning, and rollout of all
    the necessary hardware

    *   Provides a complete road map of all the moving parts required for problem
    diagnosis and resolution

    *   Should be included with any deliverables or published documentation describing
    the benchmarking effort


    While all three reasons have merit, it’s the road map for problem diagnosis that
    is often most critical. There are simply far too many required components whose
    sum efforts contribute to the experienced or perceived performance of any database
    application. That’s vital because the database might not always be the underlying
    reason for a performance issue. As I’ve mentioned in earlier chapters, sometimes
    a misconfigured network switch, a bad network interface card (NIC), or disk storage
    LUN configuration may be the real culprit that just makes the database appear
    slow. So having this info could make or break a database benchmarking effort.
    Look now at Figure 6-1, a 10-node Oracle Real Application Cluster (RAC) that I
    once benchmarked.


    ![../images/464117_1_En_6_Chapter/464117_1_En_6_Fig1_HTML.jpg](images/464117_1_En_6_Chapter/464117_1_En_6_Fig1_HTML.jpg)


    Figure 6-1: Ten-Node Oracle RAC Cluster


    Remember the cardiac stress test analogy, so here we have the Oracle database
    on the Benchmark Factory treadmill connected to a cardiac monitor called Spotlight
    on RAC. However as detailed as this diagram may appear, it is lacking the actual
    storage information for RAID level, stripe width and depth, disks per LUN, and
    SAN or NAS controller/caching information. So it may well be that you’ll need
    a couple of diagrams to have a complete overview of all the critical hardware
    components and their configuration. On a typical effort it’s not uncommon to need
    three to five diagrams to have a full understanding.


    Sometimes the team responsible for performing a database benchmark will question
    the need for such diagrams. They have the servers all connected and ready to go.
    It’s the database that’s being benchmarked, and if any issues do arise they believe
    the picture is really not necessary. Usually I counter with the question: Could
    you drive from New York City to Dallas with no road map, no GPS, and no smartphone
    without getting lost or the trip taking longer than it should? Imagine the database
    monitor reports wait events such as very high latency or IO reads and writes.
    Many DBA’s would focus first on the SQL statement most responsible for those waits.
    But what if the database design is sound, the query well written, and the execution
    plan is fairly optimal? You could spend time trying to get “blood out of a turnip”
    by assuming that the database needs some magic configuration parameter changed,
    a new index on the largest tables, or experimenting with the SQL in order to identify
    a better execution plan. Sometimes that is the right approach. But when you are
    on purpose stressing the system as a whole, it’s also very likely the breakdown
    or failure of any component is to blame. You must keep an open mind and view of
    where the problems could be in order to get the highest possible database performance
    from that system.


    ## CPU and Memory


    Often the initial system components that are thought to be the most critical are
    the CPU and memory. For the CPU, what’s the count of the sockets, how many cores
    per socket, and is hyperthreading available? Then for memory, how much RAM can
    be allocated to the database? Furthermore, how should that RAM be distributed
    among the various database memory allocations available? These obviously are all
    important issues. But when you purchase an automobile you wouldn’t make the two
    most important issues the engine’s horsepower and gas tank size. There are many
    other factors such as network latency and maximum IO rates that could well be
    the true limiting factors. Yet it’s human nature to focus on things easy to brag
    or boast about, such as the system has 64 threads. But it’s not uncommon to see
    database benchmarking efforts utilizing less CPU and memory than the server possesses.


    OK, now that I’ve said not to focus on CPU and memory, there is one exception.
    Some database versions or editions may limit the CPU and memory that the database
    can actually use. For example, Microsoft SQL Server 2017 has the CPU limits shown
    in Figure 6-2.


    ![../images/464117_1_En_6_Chapter/464117_1_En_6_Fig2_HTML.jpg](images/464117_1_En_6_Chapter/464117_1_En_6_Fig2_HTML.jpg)


    Figure 6-2: SQL Server CPU Limits


    So imagine you’re benchmarking a standard edition on a server with two sockets,
    where each CPU has 16 cores plus hyperthreading for a grand total of 64 threads.
    As this is way over the limit of 24, SQL Server will leverage only a portion of
    the total CPU capacity. In fact, since we want to make sure that SQL Server always
    uses the most efficient CPU at any given time, we may want to disable hyperthreading
    so that we are sure the CPU’s that SQL Server does use are full blown, real CPUs.
    Thus it may be advisable to disable hyperthreading in the server’s BIOS. Your
    mileage will vary, so it is best to test this and not just take it as fact.'
