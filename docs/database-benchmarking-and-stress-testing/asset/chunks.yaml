    ## 输出文件结构


    `DBBENCHMARK` 将创建一个目录和一个包含该目录内容的 zip 文件，两者都使用以下命名格式：

    *   `DBBENCHMARK_ + YYYY_MM_DD_ + HH.MM.SS`


    该目录中将包含三种类型的文件：每次迭代的 SAR 文件、关键 SAR 数据的汇总文件以及四个 GNU Plot JPEG 文件。图 [12-1](#464117_1_En_12_Chapter.xhtml#Fig1)
    展示了此目录结构和文件名的示例。


    ![../images/464117_1_En_12_Chapter/464117_1_En_12_Fig1_HTML.jpg](images/464117_1_En_12_Chapter/464117_1_En_12_Fig1_HTML.jpg)


    图 12-1：`DBBENCHMARK` 运行的输出示例


    ## 性能图表分析


    这些日志文件包含大量详细的监控信息，在工具文本输出的末尾（如上所示），会按每次迭代对四个主要类别（CPU、RAM、IO 和运行队列）进行汇总。但如果你和我一样，可能需要一张简单的图表来更充分地理解结果中的真实发现。因此，`DBBENCHMARK`
    可以自动将所有关键结果绘制为此目录中的 JPEG 文件。


    ### CPU 使用率


    第一张 JPEG 文件（如图 [12-2](#464117_1_En_12_Chapter.xhtml#Fig2) 所示）显示了 CPU 使用率。很明显，从处理器角度看，这台数据库服务器可能可以轻松处理超过
    100 个并发用户。CPU 不是瓶颈。


    ![../images/464117_1_En_12_Chapter/464117_1_En_12_Fig2_HTML.jpg](images/464117_1_En_12_Chapter/464117_1_En_12_Fig2_HTML.jpg)


    图 12-2：`DBBENCHMARK` 生成的 CPU 图表


    ### 运行队列长度


    第二张 JPEG 文件（如图 [12-3](#464117_1_En_12_Chapter.xhtml#Fig3) 所示）显示了平均运行队列长度——这通常是检测系统过载的关键指标。很明显，从运行队列角度看，这台数据库服务器还有余量。通常，当平均运行队列深度持续高于四时，系统可能达到扩展上限。因此，运行队列也不是瓶颈。


    ![../images/464117_1_En_12_Chapter/464117_1_En_12_Fig3_HTML.jpg](images/464117_1_En_12_Chapter/464117_1_En_12_Fig3_HTML.jpg)


    图 12-3：`DBBENCHMARK` 生成的运行队列图表


    ### RAM 使用率


    第三张 JPEG 文件（如图 [12-4](#464117_1_En_12_Chapter.xhtml#Fig4) 所示）显示了 RAM 使用率。很明显，从内存角度看，这台数据库服务器的运行内存使用率接近理想的
    80% 水平，因此它很可能比 CPU 更是一个限制因素。虽然我可能无法为数据库缓存分配更多内存，但似乎有足够的内存来生成运行命令行界面的操作系统会话。但内存很可能比
    CPU 更能约束上限。因此，内存可能也不是瓶颈。


    ![../images/464117_1_En_12_Chapter/464117_1_En_12_Fig4_HTML.jpg](images/464117_1_En_12_Chapter/464117_1_En_12_Fig4_HTML.jpg)


    图 12-4：`DBBENCHMARK` 生成的内存图表


    ### IO 事务率


    第四张 JPEG 文件（如图 [12-5](#464117_1_En_12_Chapter.xhtml#Fig5) 所示）显示了读写事务率。很明显，从 IO
    角度看，这台数据库服务器同样负载很轻。一块 SSD 磁盘应该能够处理远超过每秒六次的 IO 操作。因此，IO 也不是瓶颈。


    ![../images/464117_1_En_12_Chapter/464117_1_En_12_Fig5_HTML.jpg](images/464117_1_En_12_Chapter/464117_1_En_12_Fig5_HTML.jpg)


    图 12-5：`DBBENCHMARK` 生成的 IO 图表


    ## 总结


    这四张图表告诉我，虽然我曾担心在这台笔记本电脑上运行超过 10 个并发用户会话，但实际上它可以处理更多的工作负载。事实上，直到我将会话参数从 1 到 10
    递增 1，改为 20 到 200 递增 10，我才达到最大值。该测试范围表明，最大吞吐量或性能下降的拐点出现在大约 180 个并发数据库会话附近。虽然 IO
    和运行队列长度都达到了最大值——但我的 CPU 利用率仍低于 20%。因此，即使这台普通的笔记本电脑，通过添加额外的 SSD 磁盘来分散 IO 负载，也可以进一步扩展。'
