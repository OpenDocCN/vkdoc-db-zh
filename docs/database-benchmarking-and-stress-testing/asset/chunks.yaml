    ## Summary


    This chapter covers most of the common surprises and gotchas that you will invariably
    encounter when performing database benchmarking, even if you have followed all
    the recommended preparation in prior chapters. What it boils down to is that benchmarking
    is far too complex for anyone to identify every possible variable or issue likely
    to skew the effort and its results. Thus, being ready to handle these on-the-fly
    issues is critical. The chapter wraps up by detailing the top 10 misconceptions
    seen on many database benchmarking projects.


    # 6. Benchmarking Hardware Options


    The first five chapters have educated and prepared you for performing database
    benchmarking. Now it’s time to leverage that knowledge. This chapter focuses on
    issue if you’re working on physical servers or “*raw iron*,*”* and not working
    with virtualization or the cloud. While both of those paradigms are both new and
    hot, nonetheless there still remains the need on occasion to work with on-premise
    database servers. Your company may not be quite ready for database deployments
    on a hypervisor or the cloud, plus you may need to benchmark on premises as a
    baseline in order to compare to virtualization or the cloud. There are many other
    reasons as well, so let’s now look at what one should do when benchmarking on
    premise.


    ### Note


    While this chapter may highlight examples from a given hardware setup, the principles
    and concepts shown throughout this chapter would remain the same. So don’t focus
    on any particular hardware or vendor mentioned.


    ## Draw a Picture


    When working with on-premise hardware, the first and often critical step is to
    construct an architectural diagram of all the components from top to bottom, including
    all networking and storage. There are several reasons for doing this.


    *   Serves as a common reference for comprehension, planning, and rollout of all
    the necessary hardware


    *   Provides a complete road map of all the moving parts required for problem
    diagnosis and resolution


    *   Should be included with an deliverables or published documentation describing
    the benchmarking effort


    While all three reasons have merit, it’s the road map for problem diagnosis that
    is often most critical. There are simply far too many required components whose
    sum efforts contribute to the experienced or perceived performance of any database
    application. That’s vital because the database might not always be the underlying
    reason for a performance issue. As I’ve mentioned in earlier chapters, sometimes
    a misconfigured network switch, a bad network interface card (NIC) , or disk storage
    LUN configuration may be the real culprit that just makes the database appear
    slow. So having this info could make or break a database benchmarking effort.
    Look now at Figure [6-1](#464117_1_En_6_Chapter.xhtml#Fig1), a 10-node Oracle
    Real Application Cluster (RAC) that I once benchmarked.


    ![../images/464117_1_En_6_Chapter/464117_1_En_6_Fig1_HTML.jpg](images/464117_1_En_6_Chapter/464117_1_En_6_Fig1_HTML.jpg)


    Figure 6-1


    Ten-Node Oracle RAC Cluster


    Remember the cardiac stress test analogy, so here we have the Oracle database
    on the Benchmark Factory treadmill connected to a cardiac monitor called Spotlight
    on RAC. However as detailed as this diagram may appear, it is lacking the actual
    storage information for RAID level, stripe width and depth, disks per LUN, and
    SAN or NAS controller/caching information. So it may well be that you’ll need
    a couple of diagrams to have a complete overview of all the critical hardware
    components and their configuration. On a typical effort it’s not uncommon to need
    three to five diagrams to have a full understanding.


    Sometimes the team responsible for performing a database benchmark will question
    the need for such diagrams. They have the servers all connected and ready to go.
    It’s the database that’s being benchmarked, and if any issues do arise they believe
    the picture is really not necessary. Usually I counter with the question: Could
    you drive from New York City to Dallas with no road map, no GPS, and no smartphone
    without getting lost or the trip taking longer than it should? Imagine the database
    monitor reports wait events such as very high latency or IO reads and writes.
    Many DBA’s would focus first on the SQL statement most responsible for those waits.
    But what if the database design is sound, the query well written, and the execution
    plan is fairly optimal? You could spend time trying to get “*blood out of a turnip*”
    by assuming that the database needs some magic configuration parameter changed,
    a new index on the largest tables, or experimenting with the SQL in order to identify
    a better execution plan. Sometimes that is the right approach. But when you are
    on purpose stressing the system as a whole, it’s also very likely the breakdown
    or failure of any component is to blame. You must keep an open mind and view of
    where the problems could be in order to get the highest possible database performance
    from that system.


    ## CPU and Memory


    Often the initial system components that are thought to be the most critical are
    the CPU and memory. For the CPU, what’s the count of the sockets, how many cores
    per socket, and is hyperthreading available? Then for memory, how much RAM can
    be allocated to the database? Furthermore, how should that RAM be distributed
    among the various database memory allocations available? These obviously are all
    important issues. But when you purchase an automobile you wouldn’t make the two
    most important issues the engine’s horsepower and gas tank size. There are many
    other factors such as network latency and maximum IO rates that could well be
    the true limiting factors. Yet it’s human nature to focus on things easy to brag
    or boast about, such as the system has 64 threads. But it’s not uncommon to see
    database benchmarking efforts utilizing less CPU and memory than the server possesses.


    OK, now that I’ve said not to focus on CPU and memory, there is one exception.
    Some database versions or editions may limit the CPU and memory that the database
    can actually use. For example, Microsoft SQL Server 2017 has the CPU limits shown
    in Figure [6-2](#464117_1_En_6_Chapter.xhtml#Fig2).


    ![../images/464117_1_En_6_Chapter/464117_1_En_6_Fig2_HTML.jpg](images/464117_1_En_6_Chapter/464117_1_En_6_Fig2_HTML.jpg)


    Figure 6-2


    SQL Server CPU Limits


    So imagine you’re benchmarking a standard edition on a server with two sockets,
    where each CPU has 16 cores plus hyperthreading for a grand total of 64 threads.
    As this is way over the limit of 24, SQL Server will leverage only a portion of
    the total CPU capacity. In fact, since we want to make sure that SQL Server always
    uses the most efficient CPU at any given time, we may want to disable hyperthreading
    so that we are sure the CPU’s that SQL Server does use are full blown, real CPUs.
    Thus it may be advisable to disable hyperthreading in the server’s BIOS. Your
    mileage will vary, so it is best to test this and not just take it as fact.'
  trans: '# 6. 基准测试硬件选项


    ## 概要


    本章涵盖了在进行数据库基准测试时，你几乎必然会遇到的大多数常见意外和陷阱——即使你已经遵循了前面章节中所有推荐的准备工作。简而言之，基准测试过于复杂，任何人都无法识别出每一个可能影响测试工作及其结果的变量或问题。因此，准备好随时处理这些突发问题至关重要。本章最后详细介绍了在许多数据库基准测试项目中观察到的十大误解。


    ### #10：我们只需花几天时间就能基准测试所有我们感兴趣的内容


    绝不可能。几乎无一例外，所有依赖组件的正确设置可能就需要一到两周——而在进行大规模基准测试时，有时数据加载和索引创建还能再增加一周时间。因此，请务必仔细规划完成这些工作所需的时间。因为即使你遵循了以上所有建议，途中也总会有意外发生。


    ## 绘制架构图


    当使用本地硬件时，第一个且通常至关重要的步骤是，从上到下构建所有组件（包括所有网络和存储）的架构图。这样做有几个原因：


    *   作为理解、规划和部署所有必要硬件的共同参考

    *   为问题诊断和解决提供所有必要组件的完整路线图

    *   应包含在描述基准测试工作的任何可交付成果或已发布的文档中


    虽然所有三个原因都有价值，但用于问题诊断的路线图通常最为关键。这是因为，任何数据库应用程序所体验或感知到的性能，是由众多必需组件的协同努力共同决定的。这一点至关重要，因为数据库本身可能并不总是性能问题的根本原因。正如我在前面章节中提到的，有时一个配置错误的网络交换机、一个故障的网卡（NIC）或磁盘存储
    LUN 配置，可能才是真正的罪魁祸首，只是让数据库看起来很慢。因此，拥有这些信息可能成就或破坏一次数据库基准测试工作。现在看一下图 6-1，这是我曾经测试过的一个
    10 节点 Oracle 真正应用集群（RAC）。


    ![../images/464117_1_En_6_Chapter/464117_1_En_6_Fig1_HTML.jpg](img/464117_1_En_6_Fig1_HTML.jpg)


    图 6-1：十节点 Oracle RAC 集群


    还记得心脏压力测试的类比吗？这里我们有运行在 Benchmark Factory“跑步机”上的 Oracle 数据库，连接到一个名为 Spotlight on
    RAC 的“心脏监护仪”。然而，无论此图看起来多么详细，它都缺少了实际的存储信息，如 RAID 级别、条带宽度和深度、每个 LUN 的磁盘数以及 SAN 或
    NAS 控制器/缓存信息。因此，你可能需要几张图才能获得所有关键硬件组件及其配置的完整概览。在一个典型的项目中，通常需要三到五张图才能全面理解，这并不少见。


    有时，负责执行数据库基准测试的团队会质疑这种图的必要性。他们的服务器都已经连接好并准备就绪了。测试的是数据库，如果真的出现问题，他们认为图真的没必要。我通常会反问：如果没有路线图、没有
    GPS、没有智能手机，你能从纽约市开车到达达拉斯而不迷路或不比预期花更长时间吗？想象一下，数据库监视器报告了等待事件，例如非常高的延迟或 I/O 读写。许多数据库管理员会首先关注那些对这些等待负最大责任的
    SQL 语句。但是，如果数据库设计合理、查询编写良好、执行计划也相当优化呢？你可能会花费时间试图从“石头里榨油”，假设数据库需要更改某个神奇的配置参数、在最大的表上添加新索引，或者试验
    SQL 以识别更好的执行计划。有时这确实是正确的方法。但当你有意对整个系统施加压力时，任何一个组件的故障或失效也很可能就是罪魁祸首。你必须保持开放的心态和视野，认识到问题可能出在哪里，才能从该系统中获得尽可能高的数据库性能。


    ## CPU 与内存


    通常，最初被认为最关键的系统组件是 CPU 和内存。对于 CPU，需要关注插槽数量、每个插槽的核心数以及是否支持超线程。然后是内存，有多少 RAM 可以分配给数据库？此外，这些
    RAM 应该如何在可用的各种数据库内存分配之间分配？这些显然都是重要问题。但是，当你购买一辆汽车时，你不会把发动机马力和油箱大小作为两个最重要的问题。还有许多其他因素，比如网络延迟和最大
    I/O 速率，很可能才是真正限制性能的因素。然而，专注于那些容易吹嘘或夸耀的东西是人的天性，比如系统有 64 个线程。不过，在数据库基准测试工作中，利用的
    CPU 和内存资源少于服务器本身具备的资源，这种情况并不少见。


    好了，既然我说了不要只关注 CPU 和内存，但有一个例外。某些数据库版本或版本可能会限制数据库实际可以使用的 CPU 和内存量。例如，Microsoft SQL
    Server 2017 的 CPU 限制如图 6-2 所示。


    ![../images/464117_1_En_6_Chapter/464117_1_En_6_Fig2_HTML.jpg](img/464117_1_En_6_Fig2_HTML.jpg)


    图 6-2：SQL Server CPU 限制


    假设你正在一个具有双路插槽的服务器上测试标准版，每个 CPU 有 16 个核心加上超线程，总计 64 个线程。由于这远远超过了 24 个的限制，SQL Server
    将仅利用总 CPU 容量的一部分。事实上，因为我们想确保 SQL Server 在任何给定时间都使用最高效的 CPU，我们可能需要禁用超线程，以便确定 SQL
    Server 所使用的 CPU 是全功能的、真正的物理核心。因此，在服务器 BIOS 中禁用超线程可能是可取的。具体情况会有所不同，因此最好对此进行测试，而不是直接将其视为事实。'
- fmt: '## Spinning Disks


    For this section we’re going to limit our discussion to traditional spinning magnetic
    media disks. The same concepts contained here will apply equally regardless of
    whether SAS or SATA disks.


    The Achilles’ heel of any database is IO. No matter how many CPUs the database
    is using, they each will have to wait on IO at some point. In fact, with CPUs
    having such high cores per socket and hyperthreading, it’s fairly easy these days
    to have the CPUs outpace the disks. Moreover some database benchmarks like the
    `TPC-H` (and possibly `TPC-DS`) are generally performance constrained by the number
    of spindles. Furthermore, issues like the number of controllers or heads on a
    disk array, the amount of cache, and certain firmware settings all contribute
    to the overall IO bandwidth that is achievable. Then there’s the RAID configuration
    that for databases can be critical. Let’s look into these.


    Let’s assume that you are benchmarking on a non-shared or dedicated NAs or SAN,
    so that you can request changes pertinent to your benchmarking efforts. One often-overlooked
    aspect is the firmware’s read-ahead algorithm choices and read vs. write cache
    sizing. I once had a `TPC-H` benchmarking effort where the user was not happy
    with the performance results we had achieved. We had not drilled down to this
    level of optimization details. We then changed the firmware settings and saw the
    performance bump that we needed to complete the project. Sometimes little things
    do matter.


    Another area of benchmarking frustration (as well as being a very bad practice
    for production) that I encounter is with the overutilization of `RAID 5` or `RAID
    6` for databases. I understand that everyone wants to do RAID and we all think
    bigger is better (where bigger means more total usable space). But I always stress
    to people that for optimal database performance for database benchmarking (as
    well as production), the best level is `RAID-10` (sometimes called `RAID-1+0`)
    regardless of the loss of space. It’s better to have just enough space that’s
    fast rather than lots of space that’s slow. Yet I always find myself reminding
    people of the RAID overhead shown in Figure 6-3.


    ![../images/464117_1_En_6_Chapter/464117_1_En_6_Fig3_HTML.jpg](images/464117_1_En_6_Chapter/464117_1_En_6_Fig3_HTML.jpg)


    Figure 6-3

    IO Impacts of RAID Levels


    The number of writes on `RAID-10` may be two, but that’s two simultaneous writes
    of the same data to two different disks where often completion of either identical,
    concurrent IO signals success. Now examine `RAID-5` and `RAID-6` with values of
    4 and 6 respectively. These writes are all different data. Some are slices of
    the actual data, others are parity bytes. The key point is that’s a lot more total
    IOs that must complete, and they must all complete before the IO operation reports
    success. The actual performance degradation is not really 2X or 3X, but it is
    very, very noticeable. So avoid `RAID-5` on all database benchmarking projects
    (and on production too).


    We now arrive at one of the most often overlooked IO considerations when database
    benchmarking: stripe width and depth or size. Let’s assume that your database
    block or page size is 4K. Let’s also assume that your storage admin has created
    a `RAID-10` LUN for you with 8 total disks, so there are 4 disks per copy of the
    data. Thus the stripe width is 4. Now a possible ideal stripe depth could be calculated
    as: `N * block or page size`, where `N >=1`. This is known as coarse-grained striping,
    which strives to maximize total overall I/O throughput by spreading many simultaneous
    IO requests across more disks. This is considered desirable for high concurrency
    OLTP systems as well as data warehouses. Sometimes people instead (mistakenly)
    chose fine-grained striping where they prefer to have each single IO request spread
    across all the disks. They calculate their stripe depth as `block or page size
    / stripe width`. While this choice might make that single IO faster, it also makes
    handling many concurrent IO operations slower as they queue up. Remember that
    most databases need to handle lots of concurrent IO, so choosing this option can
    result in very suboptimal performance. Make sure you have a good reason whenever
    selecting it.


    ## New Storage Technologies


    Three great things have occurred the past decade with storage: it’s cheaper, disks
    have grown very large (12TB/disk), and new storage technologies have emerged that
    are much faster than traditional spinning media disks. Let’s examine some of the
    more common, newer technologies.


    The first breakthrough were solid state disks or `SSD`’s. These were essentially
    NAND chips packaged with a processor and controller to provide storage that looked
    and felt much liked traditional disks but operated much faster. Figure 6-4 shows
    an example of the architecture.


    ![../images/464117_1_En_6_Chapter/464117_1_En_6_Fig4_HTML.jpg](images/464117_1_En_6_Chapter/464117_1_En_6_Fig4_HTML.jpg)


    Figure 6-4

    Architecture of a Solid State Disk


    However, `SSD`’s had one major drawback: they used the old `AHCI` and `SAS/SATA`
    protocols to access the NAND chips. These protocols were written and optimized
    for spinning media. As such they included logic for inner tracks vs. outer tracks
    and many other levels of no-longer necessary logic. Plus even though NAND chips
    could process data quickly, these protocols had a built-in bottleneck that they
    were hamstrung by the `SAS/SATA` data transfer limits of 600 and 1200 MB/s. Nonetheless
    `SSD`’s ushered in an era of much faster IO.


    The second generation of flash-based technology was basically `SSD` disk technology
    on a card on the fast `PCIe` bus, which provided a major boost of data transfer
    rates to between 2000 and 8000 MB/s. These cards could be placed on database servers,
    and in some cases on either `SAN` or `NAS` storage arrays. In fact, a whole new
    storage solution referred to as `all flash arrays` soon followed.


    The third generation of flash-based technology was to replace the old `AHCI` and
    `SAS/SATA` protocols with non-volatile memory express or `NVMe`. This new protocol
    was written from the ground up to handle flash with no leftover baggage from legacy
    spinning disks. As such, `NVMe` offers data transfers rates of up to 32000 MB/s.
    That’s over 53X faster than the first-generation `SSD`’s.


    Plus there are some exciting new technologies that will soon make mainstream,
    such as Optane, which offers near RAM memory-like speeds but with capacities like
    `SSD`’s.


    So how do these new technologies affect database benchmarking? The simple and
    obvious answer is you can place your databases on `SSD` or `NVMe` flash to get
    much better results. If your databases are too big for the flash-based storage,
    you can still place areas like `TEMP`, `ROLLBACK`, `LOGGING`, etc., on these devices
    to speed up many internal database operations. I’ve seen some data warehousing
    benchmarks where we had 30TB of data, so we could not put it all on flash, yet
    by using it just for temporary areas for sorting and grouping resulted in major
    performance improvements. Likewise, on OLTP benchmarks where flash was used for
    logging and rollback activity alone, again the results were quite astounding.
    The point is even if you cannot put everything on flash, by selecting the right,
    limited set of items to place on flash, this can be beneficial.'
