    # 11. 工作负载捕获与回放


    在本章中，我们将探讨数据库工作负载的捕获与回放。这种用于压力测试或数据库基准测试的方法具有若干显而易见的优势。首先，这些事务活动源自您自己的应用程序和数据库。因此，它与您当前面临的实际性能状况和问题直接相关且切题。其次，您已对数据库设计及其处理的一般业务需求非常熟悉，无需再阅读和理解规格说明。第三，基于这种熟悉度，研究和提出潜在解决方案会更为容易。此外，也便于与同样熟悉情况的同行交流想法。基于这些原因（以及其他一些因素），有些人很可能认为这是进行压力测试或数据库基准测试的理想方法。这种逻辑很难反驳，我理解他们的观点。尽管第
    8 章可能展示了一种创建混合行业标准基准以近似任何目标系统的方法，但这充其量仍只是一种近似。我们很容易忽略某个可能彻底扭曲可达成结果的方面。而运行实际工作负载的准确性是无可比拟的。


    关于数据库工作负载捕获与回放，还有更多好消息。虽然多年来一直有第三方软件供应商提供解决方案，但近年来，许多数据库供应商也开始提供此类工具。对于那些倾向于使用工作负载捕获与回放的人来说，这是一大胜利，因为对于某些关键的数据库管理任务（例如数据库监控、数据库复制、数据库备份等），当认为供应商具有天然优势时，倾向于选择数据库供应商提供的解决方案是很常见的。不仅如此，关键的数据库供应商不仅进入了这一领域，而且迅速发展和改进了他们的产品。因此，如今数据库管理员（DBA）拥有比以往任何时候都更多、更好的选择。这一点非常重要，因为我们正被要求处理截然不同的部署环境，例如在虚拟机管理程序上、容器内或云中的数据库。再加上在所有这些环境中采用
    SSD 和 NVMe 等高级存储选项，还需要克服额外的复杂性层。拥有数据库工作负载捕获与回放的选项，在掌握所有这些情况方面发挥着重要作用。


    ## 万事俱备


    为了成功执行工作负载回放，DBA 首先且最需要做的是创建源数据库及其原始数据状态的副本。该副本随后将被用作回放的独立目标系统。可以理解的是，您需要在捕获源数据库的工作负载之前进行此复制，以便在任何可能更改数据的事务运行之前，拥有时间点零
    (`T0`) 的数据库副本。然后，需要将该副本加载到目标系统中，以便任何捕获的、在 `T0` 数据上操作的工作负载，能够以完全相同的数据和完全相同的顺序进行回放，从而希望产生完全相同的结果。


    有了捕获的工作负载，存在两种关键的回放场景。第一种是在不对硬件或软件进行重大更改的情况下诊断和解决性能问题。这可能是更常见和更可能出现的场景。这可能包括与小型操作系统或数据库补丁相关的测试。第二种是测试硬件、软件或部署模型（例如虚拟化或迁移到云）中的一些重大变更。虽然这种场景可能不那么常见，但从战略和长期成功的角度来看，它可能是最重要的。让我们看看这两种场景。


    在第一种场景中，我们测试的是在不进行重大平台更改情况下的简单性能优化。这意味着我们需要两个数据库许可证、两台服务器和双倍的磁盘空间。此外，我们应努力使服务器和磁盘存储特性尽可能与原始环境相似。因此，如果我们生产数据库服务器配备双路八核至强处理器、256GB
    内存和 10TB RAID-10 存储，那么用于回放的测试系统应该相同或尽可能相似。另外，如果我们的生产数据库许可证是企业版并带有一些可选的付费附加组件，那么我们也必须为测试机器购买相同的配置。其理念在于，如果环境基本相同，那么在目标系统上进行的任何调优或优化很可能在源系统上也有效。这样，我们就能找出可以改进生产数据库的措施。


    还需注意，我们还需要一些可以挂载并由两台机器共享的磁盘空间，来存放工作负载捕获文件。根据工作负载的不同，这些文件可能非常大，因此请相应规划。您还需要确保到该共享空间的
    I/O 带宽足够强大，以免扭曲源或目标数据库服务器的性能。这在生产服务器上尤为关键，因为用户绝不能察觉到此操作导致了任何明显的减速，影响其正常工作。无论如何，这意味着额外的成本和风险。


    在第二种场景中，由于所提议并测试内容的性质，限制较少。例如，我们可能试图通过切换到“标准版”来降低数据库许可费用。我们可能在比较当前服务器供应商与另一家供应商（例如戴尔
    vs. 惠普 vs. 联想）。我们可能想看看是否能将数据库虚拟化或迁移到云中。我们也可能只是考虑用新供应商或全新技术（例如 SSD 或 VVMe）来取代当前的
    NAS 或 SAN 设备，以替换旋转磁盘。因此，虽然我们可能需要两份某些类别的组件，但它们很可能差异很大，因为这正是测试的目的——测试这种差异。


    一旦所有这些必要的基础设施就绪，通常就可以通过标准的备份和恢复来复制整个数据库，而且由于您很可能已经在执行备份，因此不会引入额外开销。您只需要将工作负载捕获的开始时间安排在完整备份之后，以便为捕获和回放都准备好真正的
    `T0` 数据。完成之后，您就可以将目标系统恢复到初始状态，而不会对生产系统产生任何影响。


    ## 捕获/回放工具


    用于执行数据库工作负载捕获与回放的工具基本上有四种类型：


    -   提供使用原生数据库跟踪文件或配置文件进行捕获/回放的数据库基准测试工具（例如，HammerDB、结合 Trace Analyzer 的 Swingbench，以及
    Quest Software 的 Benchmark Factory）

    -   提供内置且低开销捕获/回放机制的数据库供应商工具（例如，SQL Server Distributed Replay 和 Oracle Real Application
    Testing，又名 RAT）

    -   第三方供应商的数据库捕获回放工具（例如，ExactSolution 的 iReplay 和 ITGain 的 SQLReplayer）

    -   开源数据库捕获/回放工具（例如，用于 SQL Server 的 Query Store Replay）


    由于本书是关于数据库基准测试的，我们将讨论范围限制在提供工作负载捕获/回放的基准测试工具上，因为供应商解决方案虽然通常很好，但仅适用于他们自己的数据库。此外，对于某些数据库供应商，此功能是需要为源和目标数据库都购买的额外付费项目，因此成本再次加倍。

