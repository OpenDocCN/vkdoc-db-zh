    # 混合基准测试


    当着手整合数据库实例及其数据库时，你几乎可以肯定，这些数据库在性质和用途上会有所不同，因此它们的工作负载也会大相径庭。在所有情况下，你都极不可能试图整合性质几乎相同的数据库，因此你很可能需要定制你的数据库基准测试，以最好地近似你试图整合的交易性质和混合情况。听起来很简单。问题在于，再次重申，目前大多数可用的数据库基准测试工具通常都不提供一种简便的方法来通过组合现有测试并赋予不同的权重或百分比来构建你自己的数据库基准。因此，最终你得到的是一个甚至更复杂的架构，如
    `图 8-6` 所示。想象一下，你希望为每个数据库运行 50% 的 `TPC-C` 和 50% 的 `TPC-H` 的混合负载。现在，你必须为每个基准测试运行一个中央控制台，或者总共四个基准测试中央控制台——再次需要手动管理所有的时间安排、依赖关系以及它们之间的交互。这对于一般的基准测试用户来说基本上太笨重了。肯定有更好的方法。


    ![../images/464117_1_En_8_Chapter/464117_1_En_8_Fig6_HTML.png](img/464117_1_En_8_Fig6_HTML.png)


    `图 8-6` 混合数据库基准类型


    出于多种原因，我特意克制没有推荐任何一款数据库基准测试工具。首先，这些工具都不完美，无法成为你唯一且的解决方案。其次，我不想听起来像是在为某个方案做代言而像个厂商的托儿。但话虽如此，我可以诚实地说，对于这种并发、混合数据库基准测试执行的场景，确实有一款工具提供了一个功能，使这种需求变得可行得多。该工具就是
    Quest Software 的 `Benchmark Factory (BMF)`。它有一个非常简单且有用的向导，使用户能够构建他们自定义的数据库基准，如
    `图 8-7` 所示，包括允许从以下选项中进行有意义的组合：


    ![../images/464117_1_En_8_Chapter/464117_1_En_8_Fig7_HTML.jpg](img/464117_1_En_8_Fig7_HTML.jpg)


    `图 8-7` BMF 允许用户自定义基准


    *   行业标准数据库基准

    *   应用事务（`OLTP` 与 `DW`）

    *   SQL 语句（`SELECT`、`INSERT`、`UPDATE` 和 `DELETE`）

    *   硬件压力测试（`CPU`、`内存`、`磁盘 IO` 和 `网络`）


    让我们来审视这四个选项中最有价值的两个：应用事务和硬件压力测试。`图 8-8` 展示了非常简单但非常有用的应用事务选项，你只需指定 `OLTP` 类型事务的百分比与数据仓库的百分比。接下来，你为每种测试类型提供一个比例因子，这样就完成了。`BMF`
    将随后按这些百分比随机混合这些类型的事务，并以混合顺序运行它们。仅凭这一个功能，大多数用户就可以快速轻松地构建出有效的数据库整合所需的数据库基准。


    ![../images/464117_1_En_8_Chapter/464117_1_En_8_Fig8_HTML.jpg](img/464117_1_En_8_Fig8_HTML.jpg)


    `图 8-8` BMF 提供混合事务工作负载


    `图 8-9` 展示了第二个同样简单且有用的硬件压力测试选项，你只需指定应用于每个硬件资源的压力百分比。接下来，你为每种测试类型提供一个比例因子，这样就完成了。`BMF`
    将再次按这些百分比随机混合这些类型的事务，并以混合顺序运行它们。我认为前一种自定义测试更适合整合数据库，而后一种更适合计算服务器分布（这两个主题本章前面已介绍过）。然而，你可能会发现两者在每个阶段都很有用。


    ![../images/464117_1_En_8_Chapter/464117_1_En_8_Fig9_HTML.jpg](img/464117_1_En_8_Fig9_HTML.jpg)


    `图 8-9` BMF 提供硬件压力测试工作负载


    ## 总结


    在本章中，我们研究了为支持数据库整合工作而执行数据库基准测试的问题和技术。我们假设被整合的数据库也会被虚拟化，原因包括虚拟机的动态迁移以及为云环境进行虚拟机或镜像的规模调整。本章还强调了同时测试多个数据库所需的特殊挑战，以及当今大多数基准测试工具所需的复杂架构。最后，我们审视了一款工具——`Benchmark
    Factory`，它提供了一些关键功能，使数据库整合测试工作变得容易得多。


    # 9. 面向虚拟化的基准测试


    在本章中，我们将回顾当你需要为数据库实例及其数据库进行虚拟化而测试各种场景时的基准测试考量。在很多方面，前一章关于数据库整合的内容是本章的先决条件。前一章的基准测试工作旨在识别哪些数据库可以共享一个实例以减少实例数量，以及需要多少服务器来承载这些实例，这两者在很大程度上是相同的。因此，我们将把前一章视为虚拟化工作的第一部分。本章将处理第二部分：是否存在与特定虚拟化相关的问题，可能影响数据库基准测试工作及其结果。


    本章展示的示例将来自 VMware 的虚拟机管理程序。再次说明，我并非建议你选择任何特定厂商，也不是在代言任何厂商。在此情况下，我展示 VMware 有两个原因。首先，我家里实验室正好有一台
    VMware ESX 服务器。其次，VMware 拥有大部分市场份额，因此许多（如果不是大多数的话）数据库管理员对其都比较熟悉。我也经常使用 VMware
    Workstation、VMware Player、Oracle Virtual Box、Oracle VM（基于 Xen 的解决方案）、QEMU 和 Linux
    KVM。我提到这些主要是为了向读者保证，我充分接触过多个厂商的方案，因此我知道本章提出的概念在大多数虚拟化厂商解决方案中都有相关且类似的对应物。


    ### 注意


    虽然本章可能重点介绍某个给定虚拟化厂商的示例，但本章展示的所有原则和概念都适用于任何虚拟化厂商的解决方案。确切的名称或术语可能会改变，但基本概念仍然适用。


    ## 服务器 BIOS


    在开始基准测试之前，数据库管理员需要检查的第一件也是最明显的事情是，物理服务器的 `BIOS` 是否已针对运行任何虚拟机管理程序进行了正确配置。你可能会假设任何服务器出厂时都带有
    `表 9-1` 中推荐的设置，但情况并非总是如此。此外，如果服务器是重新利用或购买的二手货呢？在这两种情况下，都需要再次检查这些设置。我曾见过一两次，这些设置未被设置，却以为已设置，后来在我们的基准测试工作中才发现，结果要么低于预期，要么无法重复。因此，在服务器启动时花五分钟检查一下
    `BIOS` 设置，以确保万无一失。


    `表 9-1` 虚拟化的 BIOS 设置


    | `BIOS 设置` | `建议值` |

    | --- | --- |

    | 虚拟化技术 | 是 |

    | VT-x, VT-d, AMD-V, AMD-Vi | 是 |

    | 节点交错 | 否 |

    | 睿频模式 | 是 |

    | 超线程 | 是 |

