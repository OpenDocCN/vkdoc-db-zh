    The TPC-W benchmark is arguably not even a real database benchmark, but rather
    a web application benchmark that includes a database. In fact the spec even allows
    replacing the database with any data store you like, even including a file system
    solution. The workload nature is that of an internet commerce environment that
    simulates activities of a business-oriented transactional web server. It originated
    in 2003 and was deemed obsolete by 2005\. Shown in Figure [2-15](#464117_1_En_2_Chapter.xhtml#Fig15),
    it is included here only for completeness.


    ![../images/464117_1_En_2_Chapter/464117_1_En_2_Fig15_HTML.jpg](images/464117_1_En_2_Chapter/464117_1_En_2_Fig15_HTML.jpg)


    Figure 2-15


    TPC-W Data Model


    ### Summary


    So many benchmarks, so little time! In this chapter we reviewed all the various
    database benchmarks, their origin, and their general purpose. The reason for spending
    an entire chapter on this history and context is to equip the reader to intelligently
    select from among the many benchmarks those that most align with their interests.
    Moreover, just enough information is provided to encourage the reader to seek
    out and read the chosen database benchmark’s specification document where far
    more detailed information is provided. For example, the TPC specs all include
    an appendix that details the SQL DDL to create all the database objects. So while
    this book can point the reader in a proper direction, only the actual spec can
    answer all questions. Therefore, they are must-read materials for success.'
  trans: '

    ### 威斯康星基准


    威斯康星基准测试是业界最古老的数据库基准测试之一。它大约诞生于 1981 年，正值基于 SQL 的新关系数据库兴起之际。我将威斯康星基准纳入本书，是因为它具有重大的历史相关性。它源于一个计算机性能孱弱、磁盘空间成本高昂、关系数据库刚刚崭露头角的时代。因此，威斯康星基准的模式仅有三张表：一张仅含
    1,000 行，另外两张各含 10,000 行。整个数据库的大小仅为 5 兆字节。此外，它总共包含 32 条 SQL 命令（26 次插入、2 次更新、2 次删除和
    2 次选择）。在 SQL 数据库新技术初现、计算机资源有限的早期，这个测试或许相当合理。但以今天的计算标准来看，它作为测试基准实在太薄弱了，无法用于任何有意义的评估。然而，作为最早的数据库基准测试之一，也是后来那些基准的前身，它至少值得我们了解。


    ### AS³AP 基准


    ANSI SQL 标准可扩展且可移植基准是另一项相当古老的业界标准数据库基准。它大约诞生于 1984 年，在很多方面都是威斯康星基准的扩展。我将其纳入本书，是因为你仍然能找到对它的引用，并且其中一款数据库基准测试工具仍然提供它。AS³AP
    的模式仅有五张表：一张有 1 列 1 行，另外四张表的行数根据缩放因子从 10,000 行到十亿行不等。因此，其总数据库大小从 4 兆字节到 400 千兆字节不等（再次强调，以今天的标准看非常小）。你需要选择能在
    12 小时或更短时间内完成基准测试的最大缩放因子（目标是尽可能接近 12 小时）。该基准包括单用户和多用户工作负载，并包含了创建、加载和索引数据库的所有时间。此基准要求的唯一度量指标是在
    12 小时窗口限制内的总查询耗时。


    ## 已过时的基准测试


    ### TPC-A 基准


    TPC-A 基准是源自[tpc.org](http://tpc.org)工作的第一个官方基准。它是第一代联机事务处理数据库基准，力求模拟典型银行的交易工作负载，并侧重于更新（由于工作负载存在偏向且被人为地保持简单，TPC-A
    并不代表一个真正的 OLTP 基准）。TPC-A 仅有四张表：账户、分行、出纳员和历史，如图 2-14 所示。每个分行有 10 个出纳员、10 个终端和 100,000
    个账户。它起源于 1989 年，并在 1995 年被视为已过时。


    ![../images/464117_1_En_2_Chapter/464117_1_En_2_Fig14_HTML.jpg](img/464117_1_En_2_Fig14_HTML.jpg)


    图 2-14: TPC-A 数据模型


    ### TPC-B 基准


    TPC-B 基准实际上是一个数据库压力测试（这些术语的区别在第 1 章中已阐述）。它专门设计用于对数据库系统的核心部分（如 IO 带宽和处理时间）进行压力测试。它本质上就是
    TPC-A，拥有与图 2-14 所示相同的简单表结构，但采用了截然不同且人为设计的工作负载。TPC-B 使用单一、简单、更新密集型的交易来对数据库施加压力。它通过产生大量的小型读写任务来对内存和磁盘
    I/O 子系统进行压力测试。它起源于 1990 年，并在 1995 年被视为已过时。


    ### TPC-D 基准


    TPC-D 基准是第一个面向数据仓库类工作负载的基准。在许多方面，它是 TPC-H 基准的前身（甚至拥有相同的数据库设计——请回顾图 2-4）。主要区别在于它只有
    17 个查询，而不是 22 个。它起源于 1989 年，并在 1999 年被视为已过时。


    ### TPC-R 基准


    TPC-R 基准是 TPC-H 基准的一个无限制版本（相同的 22 个查询和相同的数据库设计——请回顾图 2-4）。主要区别在于它允许无限制的索引和分区，以便让人们能更充分地利用数据库功能。它起源于
    1999 年，并在 2005 年被视为已过时。


    ### TPC-W 基准


    可以说，TPC-W 基准甚至算不上一个真正的数据库基准，而是一个包含数据库的 Web 应用程序基准。事实上，该规范甚至允许将数据库替换为你喜欢的任何数据存储，甚至包括文件系统解决方案。其工作负载本质是一个模拟面向商业的交易型
    Web 服务器活动的互联网商务环境。它起源于 2003 年，并在 2005 年被视为已过时。如图 2-15 所示，在此提及它仅为了完整性。


    ![../images/464117_1_En_2_Chapter/464117_1_En_2_Fig15_HTML.jpg](img/464117_1_En_2_Fig15_HTML.jpg)


    图 2-15: TPC-W 数据模型


    ### 总结


    基准测试如此之多，时间却如此有限！在本章中，我们回顾了各种数据库基准测试、它们的起源及其大致用途。之所以用整章篇幅来介绍这些历史和背景，是为了让读者能够明智地从众多基准中选择那些最符合自己兴趣的。此外，本书提供了足够的信息，鼓励读者去寻找并阅读所选数据库基准测试的规范文档，其中提供了更详细的信息。例如，TPC
    规范都包含一个附录，详细说明了用于创建所有数据库对象的 SQL DDL。因此，虽然本书可以为读者指明正确的方向，但只有实际的规范才能回答所有问题。所以，它们是取得成功必读的材料。

