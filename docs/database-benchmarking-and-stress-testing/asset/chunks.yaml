  raw: '## What Is a Database Stress Test?


    This may seem like a trivially easy question, but the answer may be more significant
    than you thought. Most people have a basic knowledge of the simple procedure known
    as a cardiac stress test. That’s the procedure where a doctor, most often a cardiologist,
    hooks you up to a heart monitor and either has you walk briskly or run on a treadmill
    for some extended duration. The goal in lay terms is to “*get your heart rate
    up*” and “*to make you sweat.*” The doctor of course is looking for more valuable
    detailed information by connecting the patient to an electrocardiogram (ECG) monitor.
    While such a test usually cannot identify a specific medical condition, it nonetheless
    has great predictive value for detection of early signs of conditions that warrant
    concern. In short, this simple medical test is invaluable, hence why it is so
    often performed.


    Now what about your database, just how healthy is it? While your database performance
    under today’s typical, well-known workload might not be a problem, what would
    happen if you pushed your database to “*get its heart rate up*” and “*to make
    it sweat*”? You might consider such database stress testing to fall under the
    simple and prudent category of capacity planning. That would allow the database
    administrator to answer critical management questions such as when will the database
    application’s resource consumption increase to the point where ordering more computing
    resources is required? However useful as that may sound, it is not the usual reason
    you may be asked to or think it wise to perform any database stress testing (more
    about that later in this chapter).


    So just how do you stress a database in order to “*get its heart rate up*” and
    “*to make it sweat*”? Unlike the cardiologist where the prescribed best practice
    and procedure are well defined and almost universally accepted, just how does
    one perform a reliable and repeatable stress test upon a database when all databases
    are essentially quite different? For many database administrators the answer is
    that they monitor the database during peak usage periods and capture an expectantly
    significant subset of the database application’s overall statements that seem
    expensive. These statements are then cobbled together into a single script or
    program that the database administrator can then execute to measure before and
    after results for a specific set of changes or over a period of time to gauge
    potential differences.


    While seemingly quite reasonable, this simple approach has several shortcomings.
    First, it is very random in nature. What if the database administrator picks the
    wrong time period to monitor or misses some important and expensive database statement
    executions while monitoring? Second, once captured it becomes a snapshot of what
    the database application was on the day it was captured. What if the next version
    of the application changes significantly in nature? Third, different database
    administrators might not choose the same time periods to monitor or set database
    statement executions as important. In fact, the same database administrator might
    not be able to do so if repeating that monitor and capture process a second time.
    As a result this approach lacks practical reliability and predictability. It does
    have some limited value, but cannot realistically serve as the generally accepted
    method for first measuring and then comparing database performance. Something
    more is needed.


    ## What Is a Database Benchmark?


    Generally speaking a database benchmark is a well-defined and universally accepted,
    industry standard database stress test with clear performance metrics to measure
    and compare results for a given database size and concurrent user workload. Moreover
    these stress tests are regarded as principally reliable across repeat runs given
    the same parameters. That means the performance scores attributed should not vary
    significantly across test runs, statistically speaking. Moreover such stress tests
    are considered both viable and reliable across different database versions, database
    vendors, and even significantly different database deployment scenarios (i.e.,
    upon dedicated vs. virtual server, on premise vs. in the cloud, etc.). In short,
    a database benchmark is the database administrator’s logical equivalent to the
    cardiologist’s treadmill heart stress test.


    So just where do these database benchmarks come from? Plus importantly, which
    of the various sources are considered to have created sincere and enduring industry
    standards? Finally, which sources and thus database benchmarks should a database
    administrator add to his or her tool belt? These are important questions that
    require a brief historical recount in order to provide proper background and context
    for meaningful appreciation.


    With the emergence of Structured Query Language (SQL)-based relational databases
    in the early 1980s, it became far more important to be able to ascribe some performance
    metrics to new databases. Earlier generation network and hierarchical databases
    were generally highly performant due to their fundamental nature that was based
    on physical pointers. However newer relational databases based upon Codd’s 12
    rules were radically different, instead relying on logical references based upon
    the data values. This approach freed database programmers from focusing on “*how
    to access*” permitting them to focus on “*what to access.*” The database systems
    now became responsible for the data structures for storing the data and retrieval
    procedures for resolving queries. This fundamental shift from physical to logical
    data access was not cost free, so the need arose to be able to reliably measure
    that cost, hence the new need for database benchmarks.


    An obvious early source of database benchmarks was academia since relational databases
    were so novel and based upon the mathematics of relational algebra and relational
    calculus. One such early example was the “*Wisconsin Benchmark*” in 1983^([¹](#fn1))
    from the computer sciences department at the University of Wisconsin.


    Its primary objective was to provide a method for testing the performance of all
    the major underlying components of a relational database system. Then in 1985
    the “*Debit-Credit Benchmark*,*”*^([²](#fn2)) later known as the TP1 , debuted,
    written by Jim Gray with contributions from academia, database vendors, and even
    users. Then in 1987 Jim Gray authored the “*Top Gun Benchmark*”^([³](#fn3)) using
    the Debit-Credit workload. From 1985 (after a database benchmarking article in
    *Datamation*) to 1988 a database benchmarking war ensued where hardware and software
    vendors began battles of one-upmanship. Gray recruited others and attempted to
    bring order to this chaos by forming the Transaction Processing Council ( [`www.tpc.org`](http://www.tpc.org)
    ), whose mission statement^([⁴](#fn4)) reads:


    > *The TPC is a non-profit corporation founded to define transaction processing
    and database benchmarks and to disseminate objective, verifiable TPC performance
    data to the industry.*


    Another source of database benchmarks has been larger hardware vendors (e.g.,
    Jim Gray was at Tandem Computers while creating some of his works). Some of these
    have been reasonably database agnostic. A good example is that Dell offers the
    very popular, open source “*DVD Store Benchmark*” for SQL Server, Oracle, MySQL,
    and PostgreSQL. This benchmark’s purpose reads:'
  trans: '

    ## 什么是数据库压力测试？


    这看似一个极其简单的问题，但其答案可能比你想象的更为重要。大多数人对被称为**心脏压力测试**的简单程序都有基本了解。这是指医生（通常是心脏病专家）将你连接到心脏监护仪上，让你在跑步机上快走或跑上一段时间。用外行的话来说，其目标是
    `让你的心率上升` 并 `让你出汗`。医生通过将患者连接到心电图监护仪上，当然是为了获取更有价值的详细信息。虽然这样的测试通常无法识别具体的病症，但它对于检测值得关注的早期迹象具有很高的预测价值。简而言之，这种简单的医学测试非常宝贵，因此它如此频繁地被进行。


    那么，你的数据库呢？它有多健康？虽然你的数据库在当今典型的、已知的工作负载下的性能可能不是问题，但如果你把数据库推到 `让它心率上升` 并 `让它出汗` 的地步，会发生什么？你可能会认为这种数据库压力测试属于简单而审慎的容量规划范畴。这将允许数据库管理员回答关键的管理问题，例如数据库应用程序的资源消耗何时会增长到需要订购更多计算资源的地步？然而，尽管这听起来很有用，但这通常并不是你被要求或认为明智进行任何数据库压力测试的原因（本章稍后会详述）。


    那么，你究竟如何对数据库施加压力以 `让它心率上升` 并 `让它出汗`？与心脏病专家有明确界定且几乎普遍接受的既定最佳实践和程序不同，当所有数据库本质上都大不相同时，如何对数据库进行可靠且可重复的压力测试？对于许多数据库管理员来说，答案是他们在高峰使用时段监控数据库，并捕获数据库应用程序中那些看起来开销很大的、预期中显著的一部分语句。然后，这些语句被拼凑成一个单独的脚本或程序，数据库管理员可以执行它，以测量特定更改前后或一段时间内的结果，从而评估潜在的差异。


    虽然这看起来相当合理，但这种简单的方法有几个缺点。首先，它具有很大的随机性。如果数据库管理员选择了错误的监控时间段，或者在监控期间遗漏了一些重要且开销大的数据库语句执行怎么办？其次，一旦被捕获，它就成为了数据库应用程序在被捕获那天状况的一个快照。如果应用程序的下一个版本在性质上发生重大变化怎么办？第三，不同的数据库管理员可能不会选择相同的监控时间段或设定哪些数据库语句执行是重要的。事实上，即使是同一个数据库管理员，如果重复进行第二次监控和捕获过程，也可能无法做到。因此，这种方法缺乏实际的可靠性和可预测性。它确实有一些有限的价值，但不能现实地作为先测量然后比较数据库性能的普遍接受的方法。需要更多（的手段）。


    ## 什么是数据库基准测试？


    一般来说，数据库基准测试是一种定义明确、普遍接受、行业标准的数据库压力测试，具有清晰的性能度量指标，用于针对给定的数据库规模和并发用户工作负载测量和比较结果。此外，在相同参数下，这些压力测试原则上被认为是跨多次运行可靠的。这意味着，从统计学上讲，所归因的性能分数在不同测试运行之间不应有显著变化。而且，这种压力测试被认为在不同数据库版本、数据库供应商甚至显著不同的数据库部署场景（例如，在专用服务器
    vs. 虚拟服务器、本地部署 vs. 云端等）中都是可行且可靠的。简而言之，数据库基准测试是数据库管理员在逻辑上等同于心脏病专家的跑步机心脏压力测试的东西。


    那么，这些数据库基准测试从何而来？更重要的是，在众多来源中，哪些被认为是创造了真诚且持久的行业标准？最后，数据库管理员应将哪些来源以及由此产生的数据库基准测试添加到他的工具库中？这些都是重要的问题，需要简要回顾历史，以便为有意义的欣赏提供适当的背景和上下文。


    随着 20 世纪 80 年代初基于结构化查询语言的关系数据库的出现，能够为新的数据库赋予某些性能指标变得重要得多。早期的网络和层次数据库通常性能很高，因为它们基于物理指针的基本性质。然而，基于科德
    12 条规则的新型关系数据库则截然不同，它们依赖基于数据值的逻辑引用。这种方法使数据库程序员从专注于 `如何访问` 中解放出来，允许他们专注于 `要访问什么`。数据库系统现在负责存储数据的数据结构和解析查询的检索过程。这种从物理数据访问到逻辑数据访问的根本转变并非没有代价，因此产生了能够可靠地度量该成本的需求，从而产生了对数据库基准测试的新需求。


    数据库基准测试的一个明显早期来源是学术界，因为关系数据库如此新颖，并且基于关系代数和关系演算的数学基础。其中一个早期例子是 1983 年^(¹)来自威斯康星大学计算机科学系的
    `Wisconsin Benchmark`。其主要目标是提供一种测试关系数据库系统所有主要底层组件性能的方法。


    然后在 1985 年，`Debit-Credit Benchmark`^(²)（后来被称为 TP1）首次亮相，由吉姆·格雷编写，学术界、数据库供应商甚至用户都做出了贡献。


    随后在 1987 年，吉姆·格雷使用借记-贷记工作负载编写了 `Top Gun Benchmark`^(³)。


    从 1985 年（在 *Datamation* 杂志发表一篇数据库基准测试文章之后）到 1988 年，一场数据库基准测试之战随之而来，硬件和软件供应商开始了一场争强斗胜的较量。格雷招募了其他人，并试图通过成立事务处理理事会（
    [`www.tpc.org`](http://www.tpc.org) ）来为这种混乱带来秩序，其使命声明^(⁴)写道：


    > TPC 是一个非营利性公司，旨在定义事务处理和数据库基准测试，并向行业传播客观、可验证的 TPC 性能数据。


    数据库基准测试的另一个来源是大型硬件供应商（例如，吉姆·格雷在创作他的一些作品时就在 Tandem Computers 公司）。其中一些基准测试在数据库方面是相当中立的。一个很好的例子是，戴尔为
    SQL Server、Oracle、MySQL 和 PostgreSQL 提供了非常流行的开源 `DVD Store Benchmark`。该基准测试的目的写道：

    '
- fmt: '>*The* *DVD Store Version 2 (DS2)* *is a complete* *online e-commerce test*
    *application, with a backend database component, a web application layer, and
    driver programs. The goal in designing the database component as well as the mid-tier
    application was to utilize many advanced database features (transactions, stored
    procedures, triggers, referential integrity) while keeping the database easy to
    install and understand. The DS2 workload may be used to test databases or as a
    stress tool for any purpose.*


    However while some of the hardware vendors’ database benchmarks can be leveraged
    across database vendors like the Dell DVD Store benchmark with some degree of
    fairness and reliability, other hardware vendor database benchmarks whose focus
    is on specific components such as IO subsystems often cannot. A good example would
    be the extremely popular "`Silly Little Oracle Benchmark`" (SLOB). This benchmark
    was written to highlight raw database write performance on flash disk-based systems.
    As such, it designed more to test write activity than reads. Essentially it issues
    just two commands: large updates and select counts. Thus it really does not test
    the query optimizer or any other advanced aspect of the database engine – just
    how fast can it write data. That does not mean that it’s a bad test or to avoid
    it. But you need to know what it does test and what it really reports. In fact,
    the author^([⁵](#fn5)) clearly states this on his web page:


    >*`SLOB` is not a database benchmark. `SLOB` is an Oracle I/O workload generation
    tool kit. I need to point out that by force of habit many `SLOB` users refer to
    `SLOB` with terms like benchmark and workload interchangeably. `SLOB` aims to
    fill the gap between `Orion` and `CALIBRATE_IO` (neither generate legitimate database
    I/O as explained partly here) and full-function transactional benchmarks (such
    as `Swingbench`). Transactional workloads are intended to test the transactional
    capability of a database.*


    Another source of database benchmarks has been some of the open source efforts,
    specifically some of the larger open source database projects. For example, PostgreSQL
    offers "`pgbench`" as the standard tool for comparing performance. While it makes
    running a test fairly easy, it only works with PostgreSQL and more importantly
    the documentation clearly says:


    >*To benchmark the production application tests must be performed that are similar
    to production loads and query types. The `pgbench` queries for example do not
    perform joins, where clauses using regular expressions on text fields and other
    query types that would be found in many applications.*


    In addition MySQL offers the "`MySQL Benchmark Tool`" that runs three database
    benchmarks for MySQL databases only:


    1.  `DBT2`

    2.  `SysBench`

    3.  `flexAsynch`


    Where the documentation defines those database benchmarks as follows:


    >*`DBT2` is an open source benchmark that mimics an OLTP application for a company
    owning large amounts of warehouses. It contains transactions to handle New Orders,
    Order Entry, Order Status, Payment and Stock handling. `FlexAsynch` is a benchmark
    specifically developed to test scalability of MySQL Cluster. `Sysbench` is a popular
    open source benchmark to test open source DBMSs.*


    It should be fairly clear by now that database benchmarking has a long, varied,
    and very interesting history. However it should also be evident that only the
    `TPC` benchmarks are designed to objectively test real-world database performance
    with fair results. We’ll more fully cover all the relevant `TPC` database benchmarks
    in Chapter [2](#464117_1_En_2_Chapter.xhtml).


    ## What Is Workload Capture/Replay?


    For many people the concept of an industry standard database benchmark for a specific
    defined purpose such as "`online transaction processing`" (`OLTP`) or "`data warehousing`"
    (`DW`) is sufficient. But for some people such pre-canned "`synthetic`" tests
    are not. They prefer something more realistic and meaningful for their database
    application’s actual nature. What they desire is essentially the first method
    of doing a database stress test (i.e., monitor and capture the commands), but
    for 100% of the activity and not just a manual, somewhat random sample. They want
    it all. They want a complete snapshot of all their database activity for a defined
    period of time. Furthermore they want it packaged in a way such that it can be
    replayed on demand. In a nutshell they want what is referred to as workload capture
    and replay. It is pretty much exactly what the name says, which for many database
    administrators is the only benchmark they consider meaningful.


    It’s hard to argue against such a natural and logical viewpoint. It simply makes
    good common sense. But as the proverb says, "`The road to hell is paved with good
    intentions`," meaning that good intentions when acted upon may have unintended
    consequences. For workload capture/replay to be truly representative you must
    use a database of exactly the same size and with the same data (or at least data
    skew) such that the results are accurate. That means copying your entire 100-Terabyte
    production database to test with the data intact as is, so no data subsetting
    or data masking. That translates into very large hardware and software costs,
    plus it poses a huge security risk as real production data is now completely available
    in your test environment. Your management may have a minor fit on the budget impact,
    but your security and compliance people will have your job for doing that.


    Another major problem with workload capture and replay is that not every database
    vendor offers it, and for those who do the feature can be costly (the notable
    exception being Microsoft SQL Server). Plus of course database vendors workload
    capture/replay tools only work for their database. For many shops, that would
    mean adopting multiple tools since we all deploy more than just one database vendor
    these days. There are also some third-party software vendors, but the database
    vendors do not generally share any of their system internals, so some people question
    just how effective and efficient such solutions can be without such access and
    insight. Nonetheless workload capture/replay remains the Holy Grail for those
    who want their database benchmark to reflect what their database application really
    performs.


    ## Why These Techniques Are Useful


    As was pointed out earlier, database benchmarking has its share of genuine skeptics.
    However none of us drives our vehicles the same way the environmental protection
    agency (`EPA`) does in order to verify the fuel economy, yet we all look for that
    window sticker posted on any new car we purchase, often treating that number as
    vital information when oil is expensive. So we clearly see the predictive value
    in that benchmark and accept it for what insights it provides. While we don’t
    expect to achieve that same fuel economy rating in our driving, we nonetheless
    do genuinely expect it to be relatively accurate for comparing vehicles. As humans,
    having such a comparison with some belief as to its reliability is very reassuring,
    and makes the decision process a little less stressful.


    There are literally dozens of such benchmarks people rely upon in everyday life,
    yet often database benchmarking is still treated with great skepticism. So let’s
    examine some questions that you might be asked to answer for which you may need
    some insight that a benchmark might provide (assuming of course that an appropriate
    benchmark is selected). The point being that if you readily rely on an `EPA` gas
    mileage benchmark when buying a new car, then you must believe in the value of
    some benchmarks, so why not with your databases too?'
