- fmt: '## Benchmark Preparation


    As with any business venture wanting the best chance to succeed, the first thing
    to clearly identify and articulate is the mission statement for whatever database
    benchmarking efforts are to be made. Way too often this step is either skipped
    or simply marginalized. I know of no company whose mission statement is just “To
    make money.” Likewise, most competent football coaches would probably not say
    that the game plan is to win just for the sake of winning (although with the notable,
    understandable, and entirely permissible exception of an Ohio State coach who
    must always beat Michigan just because they are Michigan).


    So what in business constitutes a good mission statement? You will find many opinions
    and statements on this question. For our purposes, the four that are most applicable
    and important include:


    *   Creates expectations

    *   Goals genuinely realistic

    *   Is judiciously adaptable

    *   Is short, but with a clear purpose


    Let’s dissect this example mission statement along those four criteria:


    > *To verify that moving our largest data warehouse and decision support databases
    from on premiss servers and a storage area network (SAN) to the cloud will perform
    just as well, for reasonable if not better overall costs.*


    Wow – now that’s seems like a respectable mission statement. In fact, it may well
    seem very similar to those thoughts that your management is already considering
    or will be asking you to address. In fact, over just the past 12 to 18 months,
    all the database benchmarking projects that I’ve been involved with have more
    or less been along these lines. It seems to be a very common theme these days.


    Before we begin to dissect this mission statement, let’s first agree that there
    are both technical and nontechnical aspects to it which might require a separation
    of responsibilities. Most of the DBAs that I work with are really only responsible
    for technical aspect – that is, at what cloud configuration (sizing) does it perform
    as well or better. That’s not to say that the other part is not just as important,
    because it deals with costs. But most DBAs are best suited for just the technical
    aspect. So let’s now only dissect the mission statement minus the seven words
    related to costs.


    The expectations seem fairly straight forward; can the cloud perform as well as
    current systems? But there are several important questions buried in the phrase
    “largest data warehouse and decision support databases.” Just how big is big?
    Are the DW and DSS workloads mostly complex queries, with some batch loading during
    off hours? Are end-user queries mostly from pre-canned reports or ad hoc, user-defined
    reports? Are we simply moving our current relational database such as Oracle or
    MS SQL Server to the cloud, or are we moving to a NoSQL database such as Hadoop
    or Cassandra? If there is a BI (business intelligence) server, will it remain
    on premises, or is it moving to the cloud? Now based on all these questions, you
    might very well assume that I’m going to say that this example mission statement
    missed on expectations. But if it’s written in a way that induces one to ask such
    questions and to obtain useful answers, then I’d say mission accomplished (at
    least for the first bullet item).


    Now on to the goals. Once again, we have a portion of the example mission statement
    that raises many questions: Where does “move to the cloud” mean and what does
    “perform just as well” mean? Are we moving to Amazon AWS, Microsoft Azure, Google
    Cloud, or Oracle Cloud. Do we know what type and size virtual machine images we’re
    permitted to use? Are we free to use NVMe and SSD, or are we restricted to standard
    storage disks? How are we going to test performance? Will we copy the database
    to run the application in parallel on the cloud? Or will we choose some industry-standard
    database and/or application benchmark and run that in the cloud? What is the current
    service level agreement (SLA) and what, if any, differences must be met for the
    new SLA? For example, most cloud vendors offer 99 point nine with either four
    or five repeating nines of uptime (e.g., 99.9999% vs. 99.99999%). That level of
    reliability probably is better than the current on-premise SLA, so do we have
    to meet the increased SLA across the board? All these questions actually relate
    to just one issue, how can we judge pass vs. fail? You may have noticed that once
    again the mission statement has raised more questions than answers. There is great
    value to this. This chapter is all about preparation. If the mission statement
    induces answers to all these questions before we start benchmarking, then we’ll
    waste less time and increase our chance of success.


    What about the adaptability of this mission statement? Getting answers to all
    the questions raised thus far should naturally raise issues of lead way to revise
    or adjust the approach. For example, if you are told it must be Amazon AWS and
    the initial thought was image types of `general purpose`, are you permitted to
    suggest either `memory optimized` or `storage optimized` since those might better
    fit the requirements of a database server? The question of adaptability becomes
    critical when it comes to time estimates. If you are told no, the image types
    must be general purpose, then you can reasonably expect the schedule to be somewhat
    fixed. If on the other hand you are told to discover the best image type starting
    with general purpose, then your schedule just got expanded – possibly even doubled
    or tripleed. Want about are there other hidden aspects worth inquiring about as
    part of adaptability? For example, maybe we know that the current application
    using the on-premise database does not in fact leverage any of the `enterprise
    edition` features. Therefore, should we perform testing to verify if a lower,
    less expensive edition of the database will suffice in order to lower licensing
    costs? So yes, even more questions that require yet more answers. But that’s the
    very definition of being prepared. In other words, “*look before you leap*,” lest
    you suffer a similar fate as the goat in Aesop’s fable who jumped into a well
    because the fox told him there was a drought coming but who just wanted something
    to stand on to get out of the well. You will be well served to nail down the allowed
    adaptability since it often simply represents scope creep.'
  raw: '## Benchmark Preparation


    As with any business venture wanting the best chance to succeed, the first thing
    to clearly identify and articulate is the mission statement for whatever database
    benchmarking efforts are to be made. Way too often this step is either skipped
    or simply marginalized. I know of no company whose mission statement is just “To
    make money.” Likewise, most competent football coaches would probably not say
    that the game plan is to win just for the sake of winning (although with the notable,
    understandable, and entirely permissible exception of an Ohio State coach who
    must always beat Michigan just because they are Michigan).


    So what in business constitutes a good mission statement? You will find many opinions
    and statements on this question. For our purposes, the four that are most applicable
    and important include:


    *   Creates expectations


    *   Goals genuinely realistic


    *   Is judiciously adaptable


    *   Is short, but with a clear purpose


    Let’s dissect this example mission statement along those four criteria:


    > *To verify that moving our largest data warehouse and decision support databases
    from on premiss servers and a* *storage area network (SAN)* *to the cloud will
    perform just as well, for reasonable if not better overall costs.*


    Wow – now that’s seems like a respectable mission statement. In fact, it may well
    seem very similar to those thoughts that your management is already considering
    or will be asking you to address. In fact, over just the past 12 to 18 months,
    all the database benchmarking projects that I’ve been involved with have more
    or less been along these lines. It seems to be a very common theme these days.


    Before we begin to dissect this mission statement, let’s first agree that there
    are both technical and nontechnical aspects to it which might require a separation
    of responsibilities. Most of the DBAs that I work with are really only responsible
    for technical aspect – that is, at what cloud configuration (sizing) does it perform
    as well or better. That’s not to say that the other part is not just as important,
    because it deals with costs. But most DBAs are best suited for just the technical
    aspect. So let’s now only dissect the mission statement minus the seven words
    related to costs.


    The expectations seem fairly straight forward; can the cloud perform as well as
    current systems? But there are several important questions buried in the phrase
    “largest data warehouse and decision support databases.” Just how big is big?
    Are the DW and DSS workloads mostly complex queries, with some batch loading during
    off hours? Are end-user queries mostly from pre-canned reports or ad hoc, user-defined
    reports? Are we simply moving our current relational database such as Oracle or
    MS SQL Server to the cloud, or are we moving to a NoSQL database such as Hadoop
    or Cassandra? If there is a BI (business intelligence) server, will it remain
    on premises, or is it moving to the cloud? Now based on all these questions, you
    might very well assume that I’m going to say that this example mission statement
    missed on expectations. But if it’s written in a way that induces one to ask such
    questions and to obtain useful answers, then I’d say mission accomplished (at
    least for the first bullet item).


    Now on to the goals. Once again, we have a portion of the example mission statement
    that raises many questions: Where does “move to the cloud” mean and what does
    “perform just as well” mean? Are we moving to Amazon AWS, Microsoft Azure, Google
    Cloud, or Oracle Cloud. Do we know what type and size virtual machine images we’re
    permitted to use? Are we free to use NVMe and SSD, or are we restricted to standard
    storage disks? How are we going to test performance? Will we copy the database
    to run the application in parallel on the cloud? Or will we choose some industry-standard
    database and/or application benchmark and run that in the cloud? What is the current
    service level agreement (SLA) and what, if any, differences must be met for the
    new SLA? For example, most cloud vendors offer 99 point nine with either four
    or five repeating nines of uptime (e.g., 99.9999% vs. 99.99999%). That level of
    reliability probably is better than the current on-premise SLA, so do we have
    to meet the increased SLA across the board? All these questions actually relate
    to just one issue, how can we judge pass vs. fail? You may have noticed that once
    again the mission statement has raised more questions than answers. There is great
    value to this. This chapter is all about preparation. If the mission statement
    induces answers to all these questions before we start benchmarking, then we’ll
    waste less time and increase our chance of success.


    What about the adaptability of this mission statement? Getting answers to all
    the questions raised thus far should naturally raise issues of lead way to revise
    or adjust the approach. For example, if you are told it must be Amazon AWS and
    the initial thought was image types of “*general purpose*”, are you permitted
    to suggest either “*memory optimized*” or “*storage optimized*” since those might
    better fit the requirements of a database server? The question of adaptability
    becomes critical when it comes to time estimates. If you are told no, the image
    types must be general purpose, then you can reasonably expect the schedule to
    be somewhat fixed. If on the other hand you are told to discover the best image
    type starting with general purpose, then your schedule just got expanded – possibly
    even doubled or tripled. Want about are there other hidden aspects worth inquiring
    about as part of adaptability? For example, maybe we know that the current application
    using the on-premise database does not in fact leverage any of the “*enterprise
    edition*” features. Therefore, should we perform testing to verify if a lower,
    less expensive edition of the database will suffice in order to lower licensing
    costs? So yes, even more questions that require yet more answers. But that’s the
    very definition of being prepared. In other words, “*look before you leap*,” lest
    you suffer a similar fate as the goat in Aesop’s fable who jumped into a well
    because the fox told him there was a drought coming but who just wanted something
    to stand on to get out of the well. You will be well served to nail down the allowed
    adaptability since it often simply represents scope creep.'
  trans: '

    ## 基准测试准备


    如同任何希望获得最大成功机会的商业项目一样，首先要清晰界定和阐明的，是任何数据库基准测试工作所要达成的**使命声明**。这一步骤常常被跳过或仅仅被边缘化。据我所知，没有哪家公司的使命声明仅仅是“赚钱”。同样，大多数有能力的橄榄球教练可能也不会说，比赛计划仅仅是为了赢而赢（尽管有一个值得注意、可以理解且完全被允许的例外——俄亥俄州立大学的教练，他们必须击败密歇根队，只因为对手是密歇根队）。


    那么，在商业中，什么构成一个好的使命声明？关于这个问题，你会发现很多观点和说法。就我们的目的而言，最适用和最重要的四点包括：


    *   能够建立预期

    *   目标切实可行

    *   具备审慎的适应性

    *   简短但目的明确


    让我们按照这四个标准来剖析下面这个使命声明示例：


    > *验证将我们最大的数据仓库和决策支持数据库从本地服务器和存储区域网络（SAN）迁移到云端后，在合理甚至更优的总体成本下，性能表现至少一样好。*


    哇——这看起来像一个值得尊敬的使命声明。事实上，它可能与你管理层已经在考虑或即将要求你处理的那些想法非常相似。实际上，就在过去的 12 到 18 个月里，我参与的所有数据库基准测试项目都或多或少遵循这个思路。这似乎是当下一个非常常见的主题。


    在我们开始剖析这个使命声明之前，我们首先需要认同，它包含技术和非技术两方面，可能需要分工负责。与我共事的大多数数据库管理员实际上只负责技术层面——即，在什么样的云配置（规模）下，其性能表现达到或超过当前系统。这并不是说另一部分不重要，因为它涉及成本。但大多数
    DBA 最适合的还是技术层面。因此，现在让我们只剖析这个使命声明，去掉与成本相关的那七个字。


    预期似乎相当直接明了；云端的性能能否与当前系统一样好？但在“最大的数据仓库和决策支持数据库”这个短语中，隐含着几个重要问题。“大”究竟有多大？数据仓库（DW）和决策支持（DSS）工作负载是否主要是复杂查询，外加一些在非高峰时段的批量加载？终端用户的查询主要是来自预定义的报表，还是用户自定义的即席报表？我们仅仅是把当前的
    Oracle 或 MS SQL Server 这样的关系型数据库迁移到云端，还是迁移至 Hadoop 或 Cassandra 这样的 NoSQL 数据库？如果存在
    BI（商业智能）服务器，它是保留在本地，还是也迁移到云端？现在，基于所有这些问题，你可能会认为我要说这个使命声明示例在建立预期方面失败了。但如果它以一种能引发这些问题并获取有用答案的方式撰写，那么我会说，使命已经达成（至少对于第一个要点而言）。


    接下来看目标。同样，使命声明示例中有一部分引发了许多问题：“迁移到云端”具体指哪里？“性能表现至少一样好”又是什么意思？我们是迁移到 Amazon AWS、Microsoft
    Azure、Google Cloud 还是 Oracle Cloud？我们是否知道允许使用何种类型和规模的虚拟机镜像？我们可以自由使用 NVMe 和 SSD，还是仅限于标准存储磁盘？我们打算如何测试性能？我们会复制数据库，在云端并行运行应用程序吗？或者我们会选择某个行业标准的数据库和/或应用程序基准测试并在云端运行？当前的服务级别协议（SLA）是什么？新的
    SLA 必须满足哪些差异（如果有的话）？例如，大多数云供应商提供 99.9 或 99.99 或 99.999 的正常运行时间（例如，99.9999% 对比
    99.99999%）。这种可靠性水平可能比当前的本地 SLA 要好，那么我们是否必须全面达到这个提升后的 SLA？所有这些问题实际上都归结为一个核心问题：我们如何判断通过还是失败？你可能已经注意到，这个使命声明再次提出了比答案更多的问题。这具有巨大价值。本章内容完全围绕准备展开。如果使命声明能在我们开始基准测试之前，就促使这些问题得到解答，那么我们将减少时间浪费，增加成功的机会。


    这个使命声明的适应性又如何呢？获取迄今为止所有问题的答案，自然会引出关于预留空间以修订或调整方法的问题。例如，如果被告知必须使用 Amazon AWS，而最初的想法是使用`通用型`镜像类型，那么是否允许我们建议使用`内存优化型`或`存储优化型`，因为它们可能更符合数据库服务器的需求？在涉及时间估算时，适应性问题变得至关重要。如果被告知不行，镜像类型必须是通用型，那么你可以合理地预期时间表是相对固定的。另一方面，如果被告知从通用型开始探索最佳镜像类型，那么你的时间表就会延长——甚至可能延长两倍或三倍。作为适应性的一部分，还有其他隐藏的方面值得询问吗？例如，也许我们知道当前使用本地数据库的应用程序实际上并未利用任何`企业版`特性。那么，我们是否应该进行测试，以验证一个更低、更便宜的数据库版本是否足以满足需求，从而降低许可成本？所以，是的，还有更多需要答案的问题。但这正是“做好准备”的准确定义。换句话说，“*三思而后行*”，以免遭遇伊索寓言中山羊的类似命运：狐狸告诉它干旱将至，它跳进了井里，而狐狸的真实目的只是想找个垫脚石逃出井。将允许的适应性确定下来，对你大有裨益，因为它常常直接代表着范围蔓延。

    '
- fmt: '## 项目使命陈述


    最后一个要点，即使命陈述是否简短且目标明确，似乎是最容易理解的部分。什么是“大局”概念以及这样做的理由是什么？在这个例子中，这很明确：在不产生任何负面影响的情况下迁移到云端。然而，我曾参与过一个大型数据库基准测试项目，该公司想知道哪家硬件供应商能最好地运行他们首选的数据库。因此，实际目的其实是看未来5-10年内谁能获得约一万台服务器的订单。这个事实让我们肩负了更大的责任，以确保我们是在进行公平的比较，没有“调包计”之类的花招。这个真实的潜在动机显然改变了我们对该项目的看法和方法。虽然这项工作的成本可能只有2万美元，但它却是一个关系到任务成败、具有战略意义的问题，上升到了最高管理层。掌握了这一事实后，我们能够提供一个可以证明和论证的明确结论。所以，有时扮演牙医、深挖问题是值得的，因为有时那些看似简单无害的事情，只要稍微深究一下，就会发现其实是一个重大问题。


    至此应该清楚了，使命陈述应该是你提出大量问题的脚本，目的是为了构建和验证一个检查清单，该清单将成为基准测试项目中资源分配、调度和预算的关键因素。这个检查清单也将确保最大的成功机会。然而，这个关键步骤几乎总是被跳过，导致交付成果缺失和时间超支。因此，我无法再强调这一步有多么关键。它可能是取得成功的唯一最大因素。


    ## 数据库准备


    在与进行数据库基准测试项目的公司合作时，最令我震惊的领域之一往往是数据库准备的缺乏。事实上，这种情况发生的频率超乎我的想象。此外，它还能以多种方式表现出来。


    在足够多的情况下（值得列出），我看到基准测试项目由业务分析师或应用项目负责人执行。我无法解释第一种情况，但它确实会发生。第二种情况更容易理解；应用程序是最终用户看到和感受到的东西，因此有时会要求应用程序团队测试将数据库应用程序从一种部署模型迁移到另一种的效果。无论哪种方式，最终效果都是要求非数据库管理员来完成一项工作，而其中一些最关键的要求恰恰属于不同资源的技能范畴。我也遇到过应用开发团队中有DBA的情况，但他们是一位应用DBA，其工作是设计应用程序所需的表和索引。他们通常不是详细性能分析和优化技术方面的专家。无论由谁负责执行数据库基准测试项目，他们都应该包括一名在目标数据库和平台上拥有丰富技能的资深DBA。我甚至更进一步地建议，未能包含一名胜任的DBA几乎普遍会保证项目失败。


    另一个令人惊讶的怪事是，在我参与的数据库基准测试项目中，大约有50%只是使用预先配置好的默认值安装数据库。在某些情况下，如前所述，团队可能缺乏具备部署技能的DBA，但在其他情况下，这似乎仅仅是懒惰或对细节缺乏关注。并非所有数据库都能自动适应分配给服务器或虚拟机的CPU和/或RAM（内存）的增加。同样，某些工作负载类型通常开箱就需要不同的配置。此外，基准测试的数据库规模或大小以及并发用户数也需要不同的设置。除非你只是进行简单的教育性或相对较小的基准测试工作，否则你需要正确配置数据库。关键点是，对于基准测试工作，你应该进行与生产系统完全相同的优化。


    数据库准备中另一个经常被忽视的主要领域是存储分配。大多数数据库基准测试工具不理解你的存储逻辑单元或其RAID特性（例如条带宽度和深度）。大多数基准测试工具只是在用户运行创建和加载步骤的默认存储区域中创建所需的基准测试对象（表和索引）。其中一些工具确实提供了创建分区对象的选项，但同样，对你存储设置的“智能”考虑很少。我告诉人们的是，将任何数据库基准测试作为两个独立的主要步骤运行：创建/加载与执行。其思路是将第一步隔离运行，以便你可以修改或重新创建数据库对象，以最好地利用我们的存储布局。然后对那个布局合理的数据进行备份，以便对于同一执行的后续迭代，你只需进行恢复即可。我甚至见过一个足够智能的数据库基准测试工具，它提供了对此类方法的支持（Quest’s
    Benchmark Factory）。请相信我，当你只需要基准测试工具在第一次加载数据时，一个3TB的TPC-H会运行得更好、更快。我见过一个3TB的TPC-H初始加载花了三天时间，但恢复备份只用了三个小时。当你处于一个两到三周的日程安排中时，这一差异可能决定你工作的成败。


    数据库准备中最后一个被忽视的领域是正确的统计信息和直方图收集，以及运行测试迭代比较报告前后的执行性能指标快照。这些工具都无法替代你的DBA的经验和见解。一些工具允许在前后运行脚本，这样你可以手动编码这些项并将其手动添加到项目中。很少有工具将其内置到它们的工作流或图形用户界面中。因此，你的DBA需要学习你的数据库基准测试工具，了解它能做什么、不能做什么，然后在适当的地方加入他们专业的操作。我曾见过忽视这个问题导致诊断或优化性能的能力很差。如果做得好，我见过它能带来高达400%的差异。这非常值得关注。'
  raw: 'The last bullet, is the mission statement short with a clear purpose, is seemingly
    the easiest part to digest. What is the “*big picture*” concept and the rationale
    for doing so? In this example, it’s clear: to move to the cloud without any negative
    impacts. However, I once participated in a big large database benchmarking project
    where the company wanted to know which hardware vendor ran their preferred database
    the best. So the actual purpose was really who would get orders for some 10,000
    servers over the next 5–10 years. That fact placed a greater onus on us to make
    sure that we were comparing apples to apples, and that there was no bait and switch
    shenanigans. This true underlying motivation clearly changed both our perception
    and approach to the project. While this effort may have cost only $20,000, nonetheless
    it was a mission-critical, strategic issue that rose to the most senior management
    levels. Armed with knowledge of this fact, we were able to provide a clear finding
    that we could justify and prove. So sometimes it pays to play dentist and to pull
    teeth, because at times what seems easy and innocuous is in fact a major issue
    if you just dig a little below the surface.


    By now it should be clear, the mission statement should be your script from which
    to ask tons of questions in order to construct and verify a checklist that will
    become a key factor in resource allocation, scheduling, and budget for the benchmarking
    project. His checklist will also assure the best chance for success. Yet this
    critical step is almost always skipped, resulting in missed deliverables and time
    overruns. So I cannot stress enough just how critical this step really is. It’s
    probably the single biggest factor in achieving success.


    ## Database Preparation


    The one area that shocks me the most when working with companies doing database
    benchmarking projects is often the lack of database preparation. In fact, it occurs
    more times than I would have ever thought possible. Plus there are multiple ways
    in which it can exhibit itself.


    On enough occasion to warrant listing it, I have seen benchmarking projects being
    performed by business analysts or application project leads. I cannot explain
    the first scenario, but it happens. The second scenario is a little easier to
    understand; the application is what the end user sees and feels, so it’s the application
    team that sometimes gets asked to test the effect of moving the database application
    from one deployment model to another. Either way the net effect is that non database
    administrators are asked to do a job where some of the most critical requirements
    are simply in a different resource’s skill set. I have also seen where the application
    development team has a DBA, but they are an application DBA whose job it is to
    design tables and indexes needed by the application. They often are not experts
    in detailed performance analysis and optimization techniques. Regardless who is
    tasked to perform the database benchmarking project, they should include a seasoned
    DBA with skills on the target database and platform. I will even go so far as
    to suggest that the failure to include a competent DBA will almost universally
    guarantee project failure.


    Another surprising oddity is the fact that about 50% of the database benchmarking
    projects I have been involved with simply install the database with preconfigured
    defaults across the board. In some cases, because as stated, the team may lack
    a DBA with deployment skills, but in other cases it seems to be simply laziness
    or lack of attention to detail. Not all databases automatically adjust to increases
    in CPU and/or RAM (memory) allocated to the server or virtual machine. Likewise,
    certain workload types very often require different configurations out of the
    box. Moreover, the scale or size of the database and the number of concurrent
    users for the benchmark also require different setups. Unless you are doing a
    simple educational or relatively small benchmarking effort, then you need to properly
    configure the database. The key point is you should do the exact same optimizations
    for a benchmarking effort as you do for production systems.


    The next major area of database preparation that quite often gets overlooked is
    storage allocations. Most database benchmarking tools do not understand your storage
    logical units (LUNs) or their RAID characteristics such as stripe width and depth.
    Most benchmarking tools simply create the required benchmark objects (tables and
    indexes) in the default storage area for the user running the creation and loading
    step. Some of these tools do offer an option to create partitioned objects, but
    once again with very little smarts as to your storage setup. What I tell people
    is to run any database benchmark as two separate major steps: create/load vs.
    execute. The idea being to run the first step in isolation so that you can modify
    or re-create the database objects to best utilize our storage layout. Then take
    a backup of that properly laid-out data such that for future iterations of the
    same execution you can just do a restore. I’ve even seen one database benchmarking
    tool that’s smart enough to offer support for such a methodology (Quest’s Benchmark
    Factory). Trust me when I tell you that a 3 TB TPC-H will run better and quicker
    if you only ask the benchmarking tool to load the data the first time. I’ve seen
    a 3 TB TPC-H take three days for the initial load, but restoring the backup only
    took three hours. When you are on a two- or three-week schedule, that one difference
    can make or break your efforts.


    The last area of database preparation that also gets ignored is proper statistics
    and histogram collections, as well as running pre and post execution performance
    metric snapshots for test iteration comparison reporting. None of these tools
    can replace your DBAs’ experience and insights. Some tools offer pre and post
    script allowances such that you can hand code those items and manually add them
    to the project. Very few offer that built into their workflow or graphical user
    interface. So your DBA will need to learn your database benchmarking tool, what
    it does vs. what it doesn’t, and then add their expert insertions where appropriate.
    I’ve seen oversight of this issue resulting in poor ability to diagnose or optimize
    performance. When done right, I have seen it make as much as a 400% difference.
    It’s well worth paying attention to this.'
  trans: '## 项目使命陈述


    最后一个要点，即使命陈述是否简短且目标明确，似乎是最容易理解的部分。什么是“大局”概念以及这样做的理由是什么？在这个例子中，这很明确：在不产生任何负面影响的情况下迁移到云端。然而，我曾参与过一个大型数据库基准测试项目，该公司想知道哪家硬件供应商能最好地运行他们首选的数据库。因此，实际目的其实是看未来
    5-10 年内谁能获得约一万台服务器的订单。这个事实让我们肩负了更大的责任，以确保我们是在进行公平的比较，没有“调包计”之类的花招。这个真实的潜在动机显然改变了我们对该项目的看法和方法。虽然这项工作的成本可能只有
    2 万美元，但它却是一个关系到任务成败、具有战略意义的问题，上升到了最高管理层。掌握了这一事实后，我们能够提供一个可以证明和论证的明确结论。所以，有时扮演牙医、深挖问题是值得的，因为有时那些看似简单无害的事情，只要稍微深究一下，就会发现其实是一个重大问题。


    至此应该清楚了，使命陈述应该是你提出大量问题的脚本，目的是为了构建和验证一个检查清单，该清单将成为基准测试项目中资源分配、调度和预算的关键因素。这个检查清单也将确保最大的成功机会。然而，这个关键步骤几乎总是被跳过，导致交付成果缺失和时间超支。因此，我无法再强调这一步有多么关键。它可能是取得成功的唯一最大因素。


    ## 数据库准备


    在与进行数据库基准测试项目的公司合作时，最令我震惊的领域之一往往是数据库准备的缺乏。事实上，这种情况发生的频率超乎我的想象。此外，它还能以多种方式表现出来。


    在足够多的情况下（值得列出），我看到基准测试项目由业务分析师或应用项目负责人执行。我无法解释第一种情况，但它确实会发生。第二种情况更容易理解；应用程序是最终用户看到和感受到的东西，因此有时会要求应用程序团队测试将数据库应用程序从一种部署模型迁移到另一种的效果。无论哪种方式，最终效果都是要求非数据库管理员来完成一项工作，而其中一些最关键的要求恰恰属于不同资源的技能范畴。我也遇到过应用开发团队中有
    DBA 的情况，但他们是一位应用 DBA，其工作是设计应用程序所需的表和索引。他们通常不是详细性能分析和优化技术方面的专家。无论由谁负责执行数据库基准测试项目，他们都应该包括一名在目标数据库和平台上拥有丰富技能的资深
    DBA。我甚至更进一步地建议，未能包含一名胜任的 DBA 几乎普遍会保证项目失败。


    另一个令人惊讶的怪事是，在我参与的数据库基准测试项目中，大约有 50%只是使用预先配置好的默认值安装数据库。在某些情况下，如前所述，团队可能缺乏具备部署技能的
    DBA，但在其他情况下，这似乎仅仅是懒惰或对细节缺乏关注。并非所有数据库都能自动适应分配给服务器或虚拟机的 CPU 和/或 RAM（内存）的增加。同样，某些工作负载类型通常开箱就需要不同的配置。此外，基准测试的数据库规模或大小以及并发用户数也需要不同的设置。除非你只是进行简单的教育性或相对较小的基准测试工作，否则你需要正确配置数据库。关键点是，对于基准测试工作，你应该进行与生产系统完全相同的优化。


    数据库准备中另一个经常被忽视的主要领域是存储分配。大多数数据库基准测试工具不理解你的存储逻辑单元或其 RAID 特性（例如条带宽度和深度）。大多数基准测试工具只是在用户运行创建和加载步骤的默认存储区域中创建所需的基准测试对象（表和索引）。其中一些工具确实提供了创建分区对象的选项，但同样，对你存储设置的“智能”考虑很少。我告诉人们的是，将任何数据库基准测试作为两个独立的主要步骤运行：创建/加载与执行。其思路是将第一步隔离运行，以便你可以修改或重新创建数据库对象，以最好地利用我们的存储布局。然后对那个布局合理的数据进行备份，以便对于同一执行的后续迭代，你只需进行恢复即可。我甚至见过一个足够智能的数据库基准测试工具，它提供了对此类方法的支持（Quest’s
    Benchmark Factory）。请相信我，当你只需要基准测试工具在第一次加载数据时，一个 3TB 的 TPC-H 会运行得更好、更快。我见过一个 3TB
    的 TPC-H 初始加载花了三天时间，但恢复备份只用了三个小时。当你处于一个两到三周的日程安排中时，这一差异可能决定你工作的成败。


    数据库准备中最后一个被忽视的领域是正确的统计信息和直方图收集，以及运行测试迭代比较报告前后的执行性能指标快照。这些工具都无法替代你的 DBA 的经验和见解。一些工具允许在前后运行脚本，这样你可以手动编码这些项并将其手动添加到项目中。很少有工具将其内置到它们的工作流或图形用户界面中。因此，你的
    DBA 需要学习你的数据库基准测试工具，了解它能做什么、不能做什么，然后在适当的地方加入他们专业的操作。我曾见过忽视这个问题导致诊断或优化性能的能力很差。如果做得好，我见过它能带来高达
    400%的差异。这非常值得关注。'
- fmt: '## Benchmarking Time Line


    How long should a database benchmarking project take? It should be based off the
    mission statement and the answers to the dozens of questions it raised, and hopefully
    got answered. Then you should form a project plan that includes all the prerequisites
    necessary to even begin. Yet I show up at many efforts and the approved plan is
    we have two weeks to run a `TPC-C` or `TPC-H` that shows acceptable `TPS`. In
    one case, running a `TPC-H`, the equipment had not been deployed, the software
    had not been installed, and resources were tight to get such work done. Then they
    tell me we have to run several `TPC-H` runs at 3 TB or larger. Imagine their surprise
    when I said to just report today that effort failed and save the time and effort.
    Of course, they thought I was joking, so we began working on the project. It took
    four days to get the hardware and software ready to go. It took three days for
    the initial data load. So on Monday of the second week, we had were starting from
    ground zero with just five days left. This is not the exception; almost every
    database benchmarking project seems to be so misestimated as to severely limit
    any legitimate chances for success.


    In the ideal scenario where all the hardware and software are set up, the correct
    server or virtual machine size preselected, both the `OS` and database optimized,
    the proper resources available for executing and adjusting the test runs for adjusting
    for iterative testing, and with a clear goal in mind, then two weeks might (and
    I only say might) suffice. I tell people who ask to figure on three to four weeks
    to start as an initial estimate, at which point most say we don’t have that much
    time. When I question that limitation, I am usually told we simply have to start
    and see where we get in two weeks – and then stop. I will ask those who won’t
    just fire me on the spot, would they like a surgeon to start a procedure and then
    just quit at two hours no matter where they were in the procedure? Of course the
    answer is always no, but unlike a doctor, most of these professionals are hesitant
    to go back to management and say more time or forget it. So in those cases we
    try our best in the two weeks, but more often than not we do not achieve the desired
    results.


    Another key aspect of the timing is what happens when the incorrect or insufficient
    resources are allocated? Remember that 3 TB `TPC-H` project that I mentioned above?
    Well the hardware that had been ordered for the storage was one direct connect
    storage enclosure with 15 spinning disks. I explained that the nature of the `TPC-H`
    benchmark was such that it was directly correlated to the number of spinning disks,
    and that all published benchmarks at that time of the same size were done on no
    fewer than 100 disks. Of course we were not going to get 85 more disks, as they
    could only afford to go to a second enclosure and a total of 30 disks. That took
    a week to get in place and ready to go. So see how these projects almost never
    finish in just two weeks? Do not let yourself be thrown into the deep end of the
    pool without a life preserver. If you are asked to perform a database benchmarking
    project in a too limited time, then just say no.


    OK – I know it’s damn near impossible and reckless career wise to tell management
    “no” (even though I’ve done it lots of times, maybe that’s why I have never made
    it big time). But do try to fight for more time or to lower the expectations or
    to lessen the scope. Had that 3 TB `TPC-H` project been open to the idea of reducing
    the database size to 300 GB (the lowest meaningful size for that database benchmark)
    and getting the second disk enclosure, we could have succeeded. We could have
    set up and run the tests to get all our ducks in a row the first week, and then
    the second week added the second enclosure and rerun our tests to get the best
    final numbers. So look for creative solutions.


    ## Benchmark Sizing


    I am always surprised when people ask me sizing questions such as how big should
    my `TPC-C` database be and how many concurrent users should we run? As the outsider
    coming on to help, I really don’t know their existing systems or the size of their
    end-user pool. You are going to be far better equipped than any outside consultant,
    but they can assist. So you should drive that decision.


    A while back I helped a large national insurance company with their benchmarking
    efforts. They were considering a switch from mainframe to client server and relational
    databases. They were `OK` with running an `OLTP`-based benchmark as a gauge. In
    the beginning they were only running 100 concurrent user sessions for the benchmark.
    The reason was the 100-user limit on a freeware tool being used. As this was a
    very large company, that was simply not acceptable. The management quickly bought
    a commercial license, but the `DBA`s initially chose just to run 2,000 users.
    When I inquired (and then really pressed) as to why, the answer was that running
    the benchmarking tool was easy for up to that number, but required far more work
    to scale higher. So I asked since I know this system must handle your entire national
    network of agents, what is the maximum number of concurrent sessions you see today?
    The answer was 15,000 to 20,000. So then we had to buy additional licenses of
    the database benchmarking tool in order to deploy it as a console with 10 agents
    on other servers where each agent ran 2,000 concurrent sessions for a total of
    20,000 concurrent sessions. Now knowing that the `TPC-C` spec says `1 warehouse
    per 10 users`, we knew our scale factor had to be set to 2,000. which translated
    into a database size of 150 GB.


    Now that all sounds well and fine in the case of `OLTP`, but what if you instead
    have to run a data warehousing (`TPC-H`) or decision support (`TPC-DS`) type benchmark?
    First and foremost, try to figure out in advance just how much data senior management
    wants to keep on hot, quickly accessible storage. I’ve heard businesspeople say
    we want to keep data forever. But the hot data often is really just a manageable
    subset. For example, maybe the retail grocery chain wants to perform basket or
    trend analysis on what their customers buy during a typical year, also considering
    weather conditions, holidays, and sporting events. With today’s fairly cheap storage
    costs, the answer might be as high as five to seven years’ worth of detailed transaction
    data, which easily total tens or even hundreds of terabytes. Plus you might also
    be required to keep aggregate or summary data as well, plus indexes and any other
    structures that consume space. So benchmarking for these needs with say between
    3 and 30 TB might make sense. The other factor you need to nail down is how long
    will executives in this environment wait for a meaningful strategic report. Remember,
    too, these data warehousing and decision support type of queries tend to process
    tens or even hundreds of millions of rows to form answers. High-level executives
    may be willing to wait four hours for an answer, which can directly and positively
    affect the bottom line. So you are going to need sufficient data to approximate
    these types of environments.


    The single most important issue to keep in the forefront of your mind is that
    disk space is cheap and thus the business is wanting ever-bigger data sets. It
    won’t do anyone any good to size your benchmarking database too small. Just remember
    that the database benchmarking tools are very slow on the data load process so
    you’ll want to use the previously mentioned split project and backup method for
    expediency.'
