- fmt: '## Series of Executions


    There is one final trick to learn when using HammerDB, “How do we run a series
    of increasing virtual user counts in order to find the maximum value possible?”
    In fact, you might well argue that all of your benchmarking efforts will be done
    this way; therefore this is a critical aspect to learn and master. It’s actually
    quite easy, after the database object and driver load steps you simply enable
    the `Autopilot` feature, specify the run time per iteration, and the number of
    virtual users per iteration as shown in Figure [3-26](#464117_1_En_3_Chapter.xhtml#Fig26).


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig26_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig26_HTML.jpg)

    *Figure 3-26: Using HammerDB Autopilot*


    In Figure [3-26](#464117_1_En_3_Chapter.xhtml#Fig26), I have specified 1, then
    2, then 4, and finally 8 virtual user scenarios. I cannot ask for more since I
    know that I created only one warehouse and thus cannot have more than 10 virtual
    users as per the spec. I also checked the boxes to show the virtual user output
    and to log each user iteration to a uniquely named file. Take special note that
    I specified a five-minute iteration period. How did I choose that number? Simple,
    it’s based on what you specified for a timed run in the driver script as shown
    in Figure [3-27](#464117_1_En_3_Chapter.xhtml#Fig27).


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig27_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig27_HTML.jpg)

    *Figure 3-27: Driver Settings for Autopilot*


    First, you must choose the timed driver option. Next, the ramp up and test duration
    times must total less than the minutes specified per sequence back in Figure [3-26](#464117_1_En_3_Chapter.xhtml#Fig26).
    Plus, it’s highly recommended to have a checkpoint performed between each iteration
    to make sure that the database is in a consistent state at the start of each.
    Finally, note that this step must be chosen in lieu of creating virtual users
    and running the benchmark (i.e., steps #3 and #4 from earlier in this chapter)
    as all those steps now will be entirely automated.


    Now we simply need to launch the autopilot as shown in Figure [3-28](#464117_1_En_3_Chapter.xhtml#Fig28).
    Note that this process will take roughly 20 minutes to run as I have specified
    four iterations each of five minutes. You may have to experiment with finding
    the right time period value as the ramp up time + test time + checkpoint time
    won’t always be exact. My advice is to choose a value that’s at least one to four
    minutes more than their total.


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig28_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig28_HTML.jpg)

    *Figure 3-28: HammerDB Autopilot Running*


    When the entire test is finished running, you can then plot the `TPM` numbers
    for each iteration either from the log window in Figure [3-28](#464117_1_En_3_Chapter.xhtml#Fig28)
    or fetch the values from the textual log files.


    ### Benchmark Factory


    Another popular database benchmarking tool that works with multiple database platforms
    is Quest Software’s `Benchmark Factory for Databases`. While it is a commercial
    software offering (which of course costs money), there is also a very good freeware
    version (with a 100 concurrent database session limit). I have used this tool
    for many years and believe it to be a darned good database benchmarking tool for
    those wishing to quickly execute and score an industry-standard database benchmark.
    In that respect, it’s very similar to HammerDB. However, unlike HammerDB whose
    user interface can be difficult to learn at first, Benchmark Factory offers very
    simple wizards to perform all the steps in HammerDB, which took the prior 20 pages
    in just a few simple steps. As such, this section will be far shorter than the
    last one.


    You will find Benchmark Factory’s web page, community, and freeware download at
    the following URLs respectively.


    *   [https://www.quest.com/products/benchmark-factory](https://www.quest.com/products/benchmark-factory)

    *   [https://community.toadworld.com/products/benchmark-factory](https://community.toadworld.com/products/benchmark-factory)

    *   [https://www.toadworld.com/download/benchmark-factory-for-databases/freeware](https://www.toadworld.com/download/benchmark-factory-for-databases/freeware)


    `Benchmark Factory` offers only a Windows version for both 32-bit and 64-bit.
    The current version is 8.0\. When you run the installer on Windows it will install
    the software under the `C:\Program Files` or `C:\program Files (x86)` directory
    as you would expect (based upon the bit size of the version being installed).
    Then to run the software you just double-click on the Benchmark Factory desktop
    or start menu icon. When the Benchmark Factory software launches, it displays
    the screen shown in Figure [3-29](#464117_1_En_3_Chapter.xhtml#Fig29).


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig29_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig29_HTML.jpg)

    *Figure 3-29: Quest’s Benchmark Factory*


    In order to define and run a database benchmark you simply press the new toolbar
    icon that is highlighted in Figure [3-29](#464117_1_En_3_Chapter.xhtml#Fig29).
    You can also get to this via the File menu. The first step in the wizard will
    define a database connection for running the benchmark as shown in Figure [3-30](#464117_1_En_3_Chapter.xhtml#Fig30).


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig30_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig30_HTML.jpg)

    *Figure 3-30: Define Database Connection*


    Had we instead chosen to run the TPC-C database benchmark on Oracle then the fields
    presented on this screen would have been slightly different. So even though this
    screen can vary by database platform, most database administrators will find all
    of the requested information fairly obvious.


    The second step in the wizard is to select a database benchmark to run as shown
    in Figure [3-31](#464117_1_En_3_Chapter.xhtml#Fig31). Note the drop-down box near
    the top that shows industry-standard benchmarks. `Benchmark Factory` offers several
    other tests, including scalability tests, custom tests designed by the user from
    existing tests (e.g., 50% TPC-C and 50% TPC-H), and workload capture/replay.


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig31_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig31_HTML.jpg)

    *Figure 3-31: Select Database Benchmark*


    The third step in the wizard allows the user to define all the execution parameters
    and options as shown in Figure [3-32](#464117_1_En_3_Chapter.xhtml#Fig32). Note
    that I’ve selected to run a TPC-C with a scale factor of two, which will consume
    162 MB of space, and with user session iteration counts of 1, 2, 4, and 8 like
    was done in the prior section with HammerDB. All that’s left to do is to press
    the run job button.


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig32_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig32_HTML.jpg)

    *Figure 3-32: Select Database Benchmark*'
