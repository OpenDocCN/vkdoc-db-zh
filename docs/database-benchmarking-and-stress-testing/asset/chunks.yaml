- fmt: '# 数据库基准测试：TPC-E 与 TPC-H


    ## TPC-E


    从表 **[2-1](#464117_1_En_2_Chapter.xhtml#Tab1)** 中可以注意到四个关键差异。首先，`TPC-E` 的表总数是
    `TPC-C` 的 3.67 倍。因此它看起来更贴近现实。其次，读写比率更接近常规情况，即大多数活动是密集读取后伴随一些写入。第三，数据基于 2000 年的人口普查数据，而不是在定义范围内简单生成的随机值。第四也是最后一点，数据库设计强制实施了当今大多数
    `OLTP` 应用程序默认会做的引用完整性（事实上，很少有关系数据库专业人员会构建一个不强制外键的 `OLTP` 数据库）。因此，虽然 `TPC-E` 可能更难理解，但它值得付出努力，因为它比旧的
    `TPC-C` 基准更逼真。然而，`TPC-C` 仍然是最常被引用的。


    数据库设计的另一个方面是，允许哪些高级物理数据库选项或模式对象定义修改？`TPC-E` 规范对可以做什么和不可以做什么有相当明确的规定。以下是允许的：


    *   表数据行聚簇

    *   用于主键约束的唯一索引

    *   用于外键约束的非唯一索引

    *   水平表分区

    *   垂直表分区

    *   表复制


    请注意，`TPC-E` 允许两个 `TPC-C` 所没有的项目：表数据行聚簇和外键索引。这再次促成了数据库应用程序更逼真的普遍感觉。因此，当您正在寻找一个逼真的
    `OLTP` 类型数据库基准时，`TPC-E` 是一个非常好的选择。虽然没有哪个基准是完美的，或者能 100% 准确地模仿您的 `OLTP` 应用程序，但
    `TPC-E` 提供了一个非常合理的仿真版本。


    ## TPC-H


    `TPC-H` 是我最喜欢的数据库基准之一。事实上，我运行 `TPC-H` 基准的次数可能比任何其他基准都多。许多其他人也经常使用和引用这个数据库基准。虽然不如
    `TPC-C` 那么流行，但它可能是第二常被引用的数据库基准。在过去的十年左右，随着数据仓库和商业智能（`BI`）话题的热度，`TPC-H` 蓬勃发展。而现在，随着数据挖掘和数据分析的兴起，`TPC-H`
    仍然吸引了大量关注。


    像往常一样，让我们首先从 [tpc.org](http://tpc.org) 网站和 `TPC-H` 规范中检查 `TPC-H` 数据库基准的定义：


    *   网站：`TPC-H` 是一个决策支持基准，由一套面向业务的即席查询组成。它展示了决策支持系统，这些系统检查大量数据，执行高度复杂的查询，并回答关键的业务问题。

    *   `TPC-H` 规范：`TPC-H` 由一组具有现实业务背景的查询组成，旨在以代表复杂业务分析应用程序的方式测试数据库系统功能。


    这一次，网站和规范定义都提供了足够的信息来了解基准的基本要点。然而，这里有一个更全面、因此更有用的定义：


    > *`TPC-H` 是一组 22 个非常复杂的 `SQL` 查询，典型于支持 `OLTP` 系统的报表数据库。这些查询旨在模仿最终用户通过商业智能工具提交的即席数据分析查询，以回答关键的业务问题。*


    请注意它**没有**说明的是：`TPC-H` 不是一个星型模式设计的数据仓库（那是接下来要介绍的 `TPC-DS`）。当您检查图 **[2-4](#464117_1_En_2_Chapter.xhtml#Fig4)**
    中显示的 `TPC-H` 数据模型时，您会看到它实际上是另一个简单化的数据库设计，很像 `TPC-C`。


    ![../images/464117_1_En_2_Chapter/464117_1_En_2_Fig4_HTML.jpg](images/464117_1_En_2_Chapter/464117_1_En_2_Fig4_HTML.jpg)


    图 2-4 TPC-H 数据模型


    如果您仔细观察图 **[2-4](#464117_1_En_2_Chapter.xhtml#Fig4)**，您会看到每个表都有一定数量的行，这取决于比例因子。因此，`LINEITEM`
    表每个比例因子有 600 万行。那么，当您运行 `TPC-H` 基准时，应该选择什么比例因子呢？规范并没有真正说明，也不应该说明，因为它旨在描述基准设计要求。然而，在那些经常运行
    `TPC-H` 基准的人中，普遍共识是如下选择：小 = `300`；中 = `3,000`；大 = `30,000`；巨大 = `300,000`。虽然不完全准确，但您可以估算每个比例因子大约
    `1GB`。因此，您可以指望的大致数据库大小估算是：小 = `300GB`；中 = `3TB`；大 = `300TB`；巨大 = `3PB`。请记住，根据定义，`TPC-H`
    执行的是扫描大量数据的 22 个复杂查询，因此这个数据库基准高度依赖于 `IO` 子系统的性能。如果您想在传统的旋转磁盘上执行中等规模或更大的 `TPC-H`，那么您应该拥有超过
    `100` 个磁盘轴。`TPC-H` 确实要求被扫描的数据存储在并分布在许多磁盘上。当然，新的 `IO` 技术，如固态硬盘（`SSD`）、全闪存磁盘阵列、`PCIe`
    闪存磁盘和非易失性内存快速通道（`NVMe`），提供了更高的 `IO` 能力和更低的延迟，因此（目前）还没有关于如何最好地将大量 `TPC-H` 数据分布在它们之上的金科玉律。


    数据库设计的另一个方面是，允许哪些高级物理数据库选项或模式对象定义修改？`TPC-H` 规范对可以做什么和不可以做什么有相当明确的规定。以下是允许的：


    *   表数据行聚簇

    *   用于主键约束的唯一索引

    *   用于外键约束的非唯一索引'
  raw: 'There are four key differences to note from Table [2-1](#464117_1_En_2_Chapter.xhtml#Tab1).
    First, the total number of tables in the TPC-E is 3.67 times as large as that
    of the TPC-C. So it genuinely looks more realistic. Second, the read vs. write
    ratio is much closer to the norm where most activity is heavy reads followed by
    some writes. Third, the data is based off year 2000 census data rather than simply
    being randomly generated values within a defined range. Fourth and final, the
    database design enforces referential integrity that most of today’s OLTP applications
    do by default (in fact, very few relational database professionals would build
    an OLTP database where there we no foreign keys being enforced). So while the
    TPC-E might be harder to digest, it’s worth the effort since it is more lifelike
    than the old TPC-C benchmark. However the TPC-C remains the most quoted.


    Another aspect of the database design is what advanced physical database options
    or schema object definition modifications are permissible? The TPC-E spec is fairly
    clear about what can and cannot be done. The following are allowed:


    *   Table data row clustering


    *   Unique indexes for primary key constraints


    *   Non-unique indexes for foreign key constraints


    *   Horizontal table partitioning


    *   Vertical table partitioning


    *   Replication of tables


    Note that the TPC-E allows for two items that the TPC-C did not: table data row
    clustering and foreign key indexes. Once again this contributes to the general
    feeling that the database application is more realistic. So if and when you’re
    looking for a realistic OLTP type database benchmark, the TPC-E is a very good
    choice. While no benchmark is perfect or 100% accurately mimics your OLTP applications,
    the TPC-E provides a very reasonable facsimile.


    ### TPC-H


    The TPC-H is one of my favorite database benchmarks. In fact, I have likely run
    more TPC-H benchmarks than any other. Many other people routinely use and quote
    this database benchmark as well. While not quite as popular as the TPC-C, it is
    probably the second most quoted database benchmark. For the past decade or so
    while the topics of data warehouses and business intelligence (BI) were hot, the
    TPC-H flourished. And now with data mining and data analytics, the TPC-H still
    draws lots of attention.


    As usual let’s begin by examining at the TPC-H database benchmark definition from
    the [tpc.​org](http://tpc.org) web site and the TPC-H spec:


    *   Website: TPC-H is a decision support benchmark that consists of a suite of
    business-oriented ad-hoc queries. It illustrates decision support systems that
    examine large volumes of data, executes queries with a high degree of complexity,
    and answers critical business questions.


    *   TPC-E spec: TPC-H is comprised of a set of business queries (that have been
    given a realistic context) designed to exercise database system functionalities
    in a manner representative of complex business analysis applications.


    For once both the website and spec definitions provide sufficient information
    to get the basic gist of the benchmark. However here is a more thorough and therefore
    more useful definition:


    > *The TPC-H is a collection of 22 very complex SQL queries typical for a reporting
    database that supports of an OLTP system. These queries are meant to mimic ad-hoc
    data analysis queries submitted by end users via business intelligence tools in
    order to answer critical business questions.*


    Note what it does not say: the TPC-H is not a star schema designed data warehouse
    (that’s the TPC-DS, which is covered next). As you examine the TPC-H data model
    shown in Figure [2-4](#464117_1_En_2_Chapter.xhtml#Fig4) you’ll see that it’s
    really another simplistic database design much like the TPC-C.


    ![../images/464117_1_En_2_Chapter/464117_1_En_2_Fig4_HTML.jpg](images/464117_1_En_2_Chapter/464117_1_En_2_Fig4_HTML.jpg)


    Figure 2-4


    TPC-H Data Model


    If you look closer at Figure [2-4](#464117_1_En_2_Chapter.xhtml#Fig4) you’ll see
    that each table has a number of rows dependent on the scale factor. Accordingly
    the LINEITEM table has 6 million rows per scale factor. So what scale factor should
    you choose when you run the TPC-H benchmark? The spec does not really say nor
    should it really as it’s intended as a description of the benchmark design requirements.
    However, the general consensus among thus who routinely run the TPC-H benchmark,
    you should choose as follows: small = 300; medium = 3,000; large = 30,000; and
    huge = 300,000\. While not 100% true, you can guesstimate about 1GB per scale
    factor. Therefore. the approximate database size estimate you could count on is
    roughly: small = 300GB; medium = 3TB; large = 300TB; and huge = 3PB. Remember
    that the TPC-H by definition executes 22 complex queries that scan large volumes
    of data, and as such this database benchmark is highly dependent on the IO subsystem
    performance. If you wanted to perform a medium sized or larger TPC-H on traditional
    spinning magnetic disk, then you should have well over 100 spindles. The TPC-H
    genuinely requires the data being scanned to be housed on and spread across many
    disks. Of course, new IO technologies such as solid state disk (SSD), all flash
    disk arrays, PCIe flash disk, and non-volatile memory express (NVMe) offer higher
    IO capabilities with lower latencies such that there is no golden rule (as of
    yet) on how to best spread large amounts of TPC-H data across them.


    Another aspect of the database design is what advanced physical database options
    or schema object definition modifications are permissible? The TPC-E spec is fairly
    clear about what can and cannot be done. The following are allowed:


    *   Table data row clustering


    *   Unique indexes for primary key constraints


    *   Non-unique indexes for foreign key constraints'
