- fmt: '## Summary


    In this chapter I presented you with a free database stress testing tool known
    as `DBBENCHMARK` that’s easy to use and does not require compiling any code like
    `SLOB` does. Plus you can easily edit the script to work for just about any database.
    I have provided both Oracle and MySQL versions, but to switch to `PostgreSQL`
    or just about any other relational database should be at most an hour’s work.
    The real beauty behind `DBBENCHMARK` is that it can graph the results so that
    you don’t have to look through lots of monitoring or logging output to find patterns.
    The pictures are truly worth a thousand words. I also showed that using `DBBENCHMARK`
    that I was able to figure in very little time and with very little effort that
    my notebook computer with a single `SSD` can handle no more than 180 concurrent
    database sessions. I’d need to add more disks to spread the IO in order to scale
    higher. And it took less than an hour to find the magic number. Your mileage will
    vary, but you should be able to just as easily figure the max workload for just
    about any database server with this tool.


