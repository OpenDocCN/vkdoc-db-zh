- fmt: '# 3. Benchmarking Tools


    In Chapter [1](#464117_1_En_1_Chapter.xhtml) we differentiated between a database
    benchmark, database stress test, and workload capture/replay. Then in Chapter
    [2](#464117_1_En_2_Chapter.xhtml), we covered all the relevant database benchmarks,
    both current and past (i.e., obsolete). So much like a teen learning to drive
    a car, you’ve now studied the rules of the road and passed the written test to
    obtain a learner’s permit. Now it’s time to exercise that knowledge and to do
    some actual driving (long before ever taking the final road test). For that, the
    anxious and excited teen would need the use of a car and a legal driver as a passenger
    (note that there are other limitations such as no other teens and no driving at
    night). So similarly for database benchmarking, you are going to need some tools
    and to do some test driving with limits until you get sufficient experience before
    doing it for real. Thus, here in Chapter [3](#464117_1_En_3_Chapter.xhtml), we’ll
    cover some of the database benchmarking tools that are available and how to best
    use them. Furthermore, we’ll cover some other tools that you may consider a benchmarking
    tool but which better fit under the category of database stress test or workload
    capture/replay tools.


    The car driving example also applies as it relates to how complex are the various
    database benchmarking tools to actually use. Some cars have an automatic transmission
    while others have a manual. Most people would agree that the automatic transmission
    is easier to drive, but that a manual one with a sophisticated driver should be
    able to get better gas mileage. Likewise, we all pretty much prefer a car with
    both power-assisted steering and brakes, as again such features make driving much
    easier. The same is true for current database benchmarking tools; some are far
    more automated and thus easy to use while others are more difficult but might
    offer greater flexibility. Therefore, proper preparation for the type of tool
    to be used is required. Moreover, as with a car, you should be able to utilize
    either type to get to your destination. Plus of course, your mileage and experience
    may vary.


    Finally, note that while this chapter aims to provide you with all mandatory basics
    plus some useful tips and tricks, it quite logically takes both time and perseverance
    to become an expert who can reasonably test advanced scenarios to obtain reliable
    and repeatable results. Note that `repeatable` is the hardest and more important
    goal to achieve. Just because a car can go 125 MPH one time does not mean it can
    readily repeat that feat. Many variables come into play during such an effort.
    The results must correlate to all the variables, plus the conditions must be repeatable
    within some reasonably close range. Anything else is just a very lucky `one-off`
    result of little to no value.


    ## Storage Benchmarking


    Before looking at database benchmarking tools, we must first recognize those tools
    that are not classified as true database benchmarking tools even though they are
    quite popular. Sometimes database administrators, often working with storage administrators,
    will concentrate on IO rates per second or IOPS. They are more interested in how
    fast the disk drives can read and write data than the database engine itself.
    So they are not interested in actual database transactions, but rather raw IO
    rates. As an example, you cannot really know just how fast a car can travel by
    knowing the engine RPM rate. Likewise you cannot know the actual database performance
    characteristics by knowing just the disk IOPS. Yes, the faster the IOPS of the
    disks the faster the database might be, but you really can only guesstimate the
    database performance based upon IOPS alone. While a contributing factor, it’s
    not the only one, nor even the most significant in many cases. Just as with the
    automobile, we need to know other factors than simply the RPM’s, such as the transmission
    gearing and tire size. Nonetheless these tools remain highly popular even if they
    can only provide the most basic idea of true database performance.


    ### WINSAT


    If your database is on a Microsoft Windows box, then a very simple built-in IO
    testing tool is the `WINSAT` command. On my Windows box my database data files
    are located on the `D:` drive, which is a Samsung SATA-III SSD; therefore the
    command would be `winsat disk –drive D` (note: do not put a colon after the drive
    letter). Figure [3-1](#464117_1_En_3_Chapter.xhtml#Fig1) shows an example of the
    output.


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig1_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig1_HTML.jpg)


    Figure 3-1


    Windows `WINSAT` Utility


    ### HDPARM


    If your database is on a Linux box, then a very simple built-in IO testing tool
    is the `hdparm` command. On my Linux box my database data files are located on
    the `/disk2` drive, which is a Samsung traditional SATA-III disk; therefore the
    command would be `hdparm –x /dev/sdb1`. Figure [3-2](#464117_1_En_3_Chapter.xhtml#Fig2)
    shows an example of the output.


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig2_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig2_HTML.jpg)


    Figure 3-2


    Linux `HDPARM` Utility


    ### SQLIO


    If your database is on a Microsoft Windows box, then a deprecated but still popular
    IO testing tool is the `SQLIO` utility. While it’s no longer available on the
    Microsoft website, many freeware sites still list it. On my Windows box my database
    data files are located on the `D:` drive, which is a Samsung SATA-III SSD; therefore
    the command would be `sqlio –dD` (note: do not put a colon after the drive letter).
    Figure [3-3](#464117_1_En_3_Chapter.xhtml#Fig3) shows an example of the output.


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig3_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig3_HTML.jpg)


    Figure 3-3


    Microsoft `SQLIO` Utility


    ### DISKSPD


    If your database is on a Microsoft Windows box, then the current and popular IO
    testing tool is the `DISKSPD` utility. You can obtain it off the Microsoft website
    at [`https://aka.ms/diskspd`](https://aka.ms/diskspd). On my Windows box my database
    data files are located on the `D:` drive, which is a Samsung SATA-III SSD; therefore
    the command would be `diskspd d:`. Figure [3-4](#464117_1_En_3_Chapter.xhtml#Fig4)
    shows an example of the output.


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig4_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig4_HTML.jpg)


    Figure 3-4


    Microsoft `DISKSPD` Utility


    ## Database Simulation


    The concept of database simulation is fairly simple; the database vendors know
    what kinds of IO patterns their database engines generally produce, so they can
    offer tools to simulate those IO patterns for testing without actually creating
    and benchmarking databases. While such offerings are not true benchmarking tools,
    they nonetheless offer a valuable insight for some DBAs who want to examine lower-level
    performance at the IO level – often with an eye toward IOPS.


    ### SQLIOSTRESS


    If your database is Microsoft SQL Server, then a deprecated, but still well remembered
    database simulation tool is the `SQLIOSTRESS` utility. It’s no longer available
    on the Microsoft website, and I also could no longer locate it on any freeware
    site. I only mention it here for completeness as it has been replaced by `SQLIOSIM`.'
