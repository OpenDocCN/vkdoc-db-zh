    ## Introduction


    `Database Benchmarking and Stress Testing` is for database administrators and
    professionals responsible for advising on any and all database architectural decisions
    ultimately affecting overall database performance. This book provides an empirical
    method for answering “what if” questions about database performance, helping database
    administrators make sound architectural decisions in a fast-changing landscape
    of virtualized servers and container-based solutions. Today’s database administrators
    face numerous such questions:


    - What if we consolidate databases using multitenant features?

    - What if we virtualize database servers as Docker containers?

    - What if we deploy the latest in NVMe flash disks to speed up IO access?

    - Do features such as compression, partitioning, and in-memory OLTP earn back
    their price?

    - What if we move our databases to the cloud?


    As an administrator, do you know the answers or even how to test the assumptions?
    You should know how to test and find answers to these questions, and doing so
    is what this book is about. `Database Benchmarking and Stress Testing` introduces
    you to database benchmarking using industry-standard test suites such as the TCP
    series of benchmarks, which are the same benchmarks that vendors rely upon. You’ll
    learn to run these industry-standard benchmarks and collect results to use in
    answering questions about the performance impact of architectural changes, technology
    changes, even down to the brand of database software. You’ll learn to measure
    performance and predict the specific impact of changes to your environment. You’ll
    learn the limitations of the benchmarks and the crucial difference between benchmarking
    and workload capture/reply.


    `Database Benchmarking and Stress Testing` is about creating empirical evidence
    in support of business and technology decisions. It’s about not guessing when
    you should be measuring. Empirical testing is scientific testing that delivers
    measurable results. Begin with a hypothesis about the impact of a possible architecture
    or technology change. Then run the appropriate benchmarks to gather data and predict
    whether the change you’re exploring will be beneficial, and by what order of magnitude.
    Stop guessing. Start measuring. Let `Database Benchmarking and Stress Testing`
    show the way.


    ## Acknowledgments


    I have been doing database work, including benchmarking, for over three decades.
    Much of what I’ve learned has come from working alongside other great people who
    were very willing to share their expertise. So rather than list a few people and
    risk missing anyone, let me just say thanks to all those people “along the way”
    who’ve helped me to learn so much.


    I also owe a debt of gratitude to the following companies for excellent opportunities
    and experience:


    - `IDERA`

    - `Quest Software`

    - `Embarcadero Technologies`

    - `Logic Works`

    - `Dell`

    - `IBM`

    - `EDS`

    - `Citicorp`

    - `Oracle Corporation`

    - `Nationwide Insurance`

    - `Battelle Memorial Institute`


    ## About the Author and About the Technical Reviewer


    ### About the Author


    ### About the Technical Reviewer


    # 1. Benchmarking Basics


    This book intends to enlighten readers on all things related to database `benchmarking`,
    `stress testing`, and `workload capture/replay`. At this moment you may feel that
    these are one and the same topic, or simply that what differentiates them is inconsequential.
    Moreover you may consider these topics as somewhat esoteric and thus more suited
    for academia and theoreticians, but not really relevant in the real world where
    you work. Finally, you might simply believe that the time and effort for performing
    such testing activities is unwarranted, or at least very difficult to justify.
    As a result, many people are skeptical about the true value of these activities.
    This book endeavors to transform that mistaken opinion or at least enlighten the
    reader as to the genuine value of these topics.


    This first chapter provides all of the basic required definitions and our common
    vocabulary for database `benchmarking`, `stress testing`, and `workload capture/replay`.
    Moreover it explains the why, when, and how these different techniques are worthwhile.
    Finally, and most importantly, this chapter expounds upon how to best choose from
    among these different methods, because we all generally find that knowing when
    to use a specific tool for a particular job in life is what is most valuable.
    When we see a task that involves a nail we think hammer, when it involves a screw
    we think screwdriver. Once you have that same kind of instinctually “*gut feel*”
    for these database techniques, you’ll find each to be an invaluable tool on your
    tool belt. It will take some time to reach this level of comfort, but it is well
    worth it.'
