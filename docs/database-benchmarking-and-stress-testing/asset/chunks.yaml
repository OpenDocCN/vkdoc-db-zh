    and disk space required for the captured transactions. So while a longer period
    might be best, sometimes you may have to restrict to the minimum viable period
    due to these other considerations and their costs.


    ## Replay Architecture


    With this approach of using database benchmarking tools offering capture/relay,
    the deployment architecture for the benchmarking tool itself is critical. Look
    at Figure [11-1](#464117_1_En_11_Chapter.xhtml#Fig1), and then ask yourself why
    such a complex picture?


    ![../images/464117_1_En_11_Chapter/464117_1_En_11_Fig1_HTML.png](images/464117_1_En_11_Chapter/464117_1_En_11_Fig1_HTML.png)


    Figure 11-1


    Recommended Replay Architecture


    The answer is simple: you need sufficient benchmarking tool agents to adequately
    load balance all the work the database sees, which may have come from many application
    clients and servers. Imagine a traditional client/server type application being
    run by 10,000 users, or a web-based application server sending thousands of transactions
    per second to the database. You must have sufficient agents spread across computing
    resources to properly facsimilate the original workload delivery speed. If not,
    the benchmarking agent could become a bottleneck that skews the results.


    One final note, the database vendor capture/replay tools work nearly the same
    way in terms of the required architecture. While the database itself again captures
    the workload, you may need to deploy multiple database replay agents in order
    to load balance and approximate the delivery of the workload. Also note that for
    those databases that charge for the capability, they require you to license the
    capture/replay on both the source and target databases. In some cases this cost
    be quite substantial. But they do not charge extra for the agents required to
    perform the replay; it’s just charged by the database instances.


    ## Interpreting Results


    For industry-standard database benchmarking scoring, the results are fairly easy;
    you can look at transactions per second, average response time, or runtime to
    completion. In other words, there are simple scores that one can compare that
    either improve or not between executions to test various database alterations.
    But it’s not that easy with capture/replay efforts. Very few applications are
    properly metered in such a way as to provide simple performance comparisons. Plus
    not all databases inherently offer metrics such as transactions per second or
    megabytes of read/write per second. Plus even if they do, it’s probable that the
    SQL code is the performance culprit more than anything else. Hence the best way
    to utilize replays is to use standard database monitoring tools to find and correct
    bad SQL. Moreover you might be able to identify SQL statements and their corresponding
    jobs that do not play well together. For example, at one company where I was the
    primary production DBA, the majority of our batch job cycles issues were simply
    a matter of rescheduling jobs that were resource intensive or needed to be hammered
    to the same tables.


    Another method DBAs often like to pursue is to find key database wait events consuming
    too much time and correcting the root cause. Yes, sometimes it is a database configuration
    parameter or some other database issue. But most times the underlying cause is
    either bad SQL or SQL overlap that fight for competing database resources. So
    for those who prefer to start with wait events. I will not challenge your approach.
    I’ll just say that 80% of the time or more. it will be SQL code in a production
    system that is the culprit. So why not look for such SQL first?'
  trans: '

    ## 捕获时长


    负责监控工作负载捕获的数据库管理员首先需要考虑的关键因素是捕获的时间和持续时间，这一点至关重要。虽然这看似一个显而易见且简单的问题，但我见过最常见的错误就是未能选择一个合适的工作负载捕获时段。捕获应选择在一天中工作负载较高的典型时段进行。是的，这会给生产环境增加额外开销，这从来不是一件受欢迎的事情。但在其他任何时段捕获工作负载，对于进行适当的调优和优化所产生的重放效果会大打折扣。事实上，我甚至认为，如果你对工作负载捕获和重放的需求不足以支持你在高峰活动时段进行操作，那么这可能根本就不值得做。想象一下，一名外科医生必须因为感染组织扩散而决定是否截肢。这是一个无需犹豫的决定，必须尽快执行，因为不这样做的代价很高。如果管理层说这项任务很重要，却不允许在高峰时段进行捕获，那么你应该解释这种立场的谬误所在，并极力争取进行一次无论成本如何都有价值的捕获。如果答案仍然是“不”，那么你应该据理力争，反对执行此操作，或者至少降低对其价值以及在次优捕获条件下可达成结果的期望。


    一旦你获得了在高峰活动时段进行捕获的批准，下一个问题就是捕获运行多长时间。我们希望捕获运行足够长的时间，以收集有意义的、有用的样本。但我们也希望尽可能快地完成，以最小化对生产和最终用户的影响。我见过人们执行短至
    15 分钟、长至 8 小时（甚至有一次长达 24 小时，但那是罕见的例外）的捕获。虽然没有绝对的正确或错误答案，但我建议这两个极端很可能是错误的。选择最佳时长的最佳方法是询问业务人员，真正关键的、高峰工作时段的小时数是哪些。例如，虽然一个典型的
    OLTP 系统可能主要在上午 8 点到下午 5 点处理活动，但业务用户可能会在这个时间段内识别出一个关键范围来缩短时长。也许因为业务横跨美国的四个时区，关键时段就是所有时区都处于正常工作时间的时候，如表
    11-1 所示。因此，最佳时段是上午 11 点到下午 5 点的任何时间。由于所有员工都有传统的中午一小时午休时间，我们排除了包含 12:00 的行。因此，我们现在只有两个选项：从
    11:00 到 12:00 或从 16:00 到 17:00。事情并不总是这么简单，但核心思想是，通过向业务人员提出一些问题，合适的捕获时段选项就会显现出来。


    ***表 11-1.*** *寻找最佳捕获时段*


    ![../images/464117_1_En_11_Chapter/464117_1_En_11_Figa_HTML.gif](img/464117_1_En_11_Figa_HTML.gif)


    我将通过说明我的观点来结束这个话题：对我而言，理想的捕获时段通常且典型地不少于一小时且不超过四小时。总的来说，你需要捕获的活动既不能太少也不能太多，而应正好足以解决手头的任务。当然也会有例外。例如，假设季度末处理需要八小时来完成其任务，那么那就是针对该活动进行工作负载捕获的正确时段。最后一个考虑因素通常是捕获事务所需的处理开销和磁盘空间。因此，虽然较长的时段可能是最好的，但有时你可能不得不由于这些其他考虑因素及其成本而限制在最小可行时段内。


    ## 重放架构


    采用提供捕获/重放功能的数据库基准测试工具这种方法，基准测试工具本身的部署架构至关重要。请看图 11-1，然后问问自己，为什么这张图如此复杂？


    ![../images/464117_1_En_11_Chapter/464117_1_En_11_Fig1_HTML.png](img/464117_1_En_11_Fig1_HTML.png)


    图 11-1 推荐的重放架构


    答案很简单：你需要足够多的基准测试工具代理，以充分负载均衡数据库看到的所有工作，这些工作可能来自许多应用程序客户端和服务器。想象一下，一个由 10,000
    名用户运行的传统客户端/服务器类型应用程序，或者一个基于 Web 的应用程序服务器每秒向数据库发送数千个事务。你必须在计算资源上分布足够的代理，以正确模拟原始工作负载的传输速度。否则，基准测试代理可能成为瓶颈，扭曲结果。


    最后一点说明，数据库供应商的捕获/重放工具在所需架构方面的工作方式几乎相同。虽然数据库本身再次捕获工作负载，但你可能需要部署多个数据库重放代理，以便进行负载均衡并近似模拟工作负载的传输。另请注意，对于那些对此功能收费的数据库，它们要求你在源和目标数据库上都获得捕获/重放的许可。在某些情况下，这个成本可能相当可观。但是，它们不额外收取执行重放所需的代理费用；只是按数据库实例收费。


    ## 结果解读


    对于行业标准的数据库基准测试评分，结果相当简单；你可以查看每秒事务数、平均响应时间或运行至完成的时间。换句话说，有一些简单的分数可以比较，这些分数在多次执行之间可能提高或不提高，以测试各种数据库的变更。但对于捕获/重放工作来说，事情就没那么简单了。很少有应用程序的计量方式能够恰当地提供简单的性能比较。此外，并非所有数据库都天然提供诸如每秒事务数或每秒读写兆字节等指标。再者，即使它们提供了，很可能
    SQL 代码才是性能问题的根源，而不是其他任何东西。因此，利用重放的最佳方式是使用标准的数据库监控工具来发现并修正糟糕的 SQL。此外，你或许能够识别出那些不能很好地协同工作的
    SQL 语句及其对应的任务。例如，我曾担任一家公司的主要生产数据库管理员，我们大多数批处理作业周期的问题，仅仅是需要重新安排那些资源密集型或需要对相同表进行大量操作的任务。


    数据库管理员通常喜欢采用的另一种方法是，找到消耗过多时间的关键数据库等待事件，并纠正其根本原因。是的，有时这是一个数据库配置参数或其他一些数据库问题。但大多数时候，根本原因要么是糟糕的
    SQL，要么是 SQL 重叠导致竞争数据库资源。因此，对于那些喜欢从等待事件入手的人，我不会质疑你的方法。我只想说，在 80%或更多的时间里，生产系统中的罪魁祸首是
    SQL 代码。那么，为什么不首先寻找这样的 SQL 呢？

    '
- fmt: '## Capture/Replay Example


    This section will demonstrate how to perform a workload capture replay using a
    database benchmarking tool. I am going to cheat though as I am going to also use
    the benchmarking tool to generate a workload for capture. So I’m going to run
    a `TPC-H` benchmark against the source database and capture that workload via
    the native database mechanism (in this case. `Oracle` trace files). Then I’m going
    to use the same benchmarking tool to read and replay those transactions. This
    example may not be very useful in itself, but it will fully demonstrate the proper
    process to follow. The benchmarking tool that we’ll be using is Quest Software’s
    `Benchmark Factory`.


    The first step is to create two `TPC-H` database benchmarking jobs as recommended
    in Chapter [5](#464117_1_En_5_Chapter.xhtml): the first to load the database objects
    and the second to run the actual benchmark’s workload. Second, run the database
    load object project. While the load project is running. we can make a minor change
    to execute the benchmark. Remember in this example we’re working with `Oracle`,
    but the concept and process would be similar for other database platforms. We
    just need to manually add some statements to the benchmark’s execution as shown
    in Figure [11-2](#464117_1_En_11_Chapter.xhtml#Fig2). I’ve added `START_TRACE_1`
    and `START_TRACE_2`, which respectively contain the following two `Oracle` commands:


    ![../images/464117_1_En_11_Chapter/464117_1_En_11_Fig2_HTML.jpg](images/464117_1_En_11_Chapter/464117_1_En_11_Fig2_HTML.jpg)

    *Figure 11-2: Add Commands to Database Logs Workload*


    *   `ALTER SESSION SET tracefile_identifier=TPC_H;`

    *   `ALTER SESSION SET EVENTS''10046 trace name context forever, level 12'';`


    By adding these two very special `SQL` statements, `Oracle` will now create trace
    files that contain as part of their name the string `TPC_H` to make those files
    more easily identifiable. Then I simply run the benchmark execution project that
    will run the `TPC-H` industry-standard benchmark’s 22 complex `SQL SELECT` commands
    and generate a single trace file (containing all bind variable values) as shown
    in Figure [11-3](#464117_1_En_11_Chapter.xhtml#Fig3).


    ![../images/464117_1_En_11_Chapter/464117_1_En_11_Fig3_HTML.jpg](images/464117_1_En_11_Chapter/464117_1_En_11_Fig3_HTML.jpg)

    *Figure 11-3: Oracle Trace Files Created by Benchmark Run*


    This trace file can then be loaded by the benchmarking tool as the commands for
    a project and run as shown in Figure [11-4](#464117_1_En_11_Chapter.xhtml#Fig4).
    Note too in this figure that there are other options for creating a workload replay
    test other than just `Oracle` trace files. For example, if your application is
    metered and can be instructed to generate a text file log of `SQL` statements
    it runs and their bind values, then that can be parsed and loaded into this tool
    as well. So there are more than a few ways to perform workload capture and replays
    other than the database vendor solutions. While here I highlighted `Benchmark
    Factory`, both `HammerDB` and `Swingbench` offer similar features and capabilities.


    ![../images/464117_1_En_11_Chapter/464117_1_En_11_Fig4_HTML.jpg](images/464117_1_En_11_Chapter/464117_1_En_11_Fig4_HTML.jpg)

    *Figure 11-4: Create Benchmark Job from a Trace File*


    What’s nice is that as `Benchmark Factory` loads and parses the trace file, it
    offers one the option to either import the entire file or to restrict it to some
    date/time range as shown in Figure [11-5](#464117_1_En_11_Chapter.xhtml#Fig5).
    That’s very useful since one might capture several hours’ activity but only wish
    to replay a portion of the transactions. In fact, that’s very useful when tuning
    and optimizing. Imagine running the workload replay the first time for 10:00 a.m.
    to 2:00 p.m. and being able to identify that the biggest problem occurs from 12:00
    to 12:30. Now you might try to correct that issue by changing a database configuration
    parameter. Now you can simply rerun the workload replay and simply restrict it
    to just the time in question. This one capability alone is a great time saver
    that makes this feature worthwhile.


    ![../images/464117_1_En_11_Chapter/464117_1_En_11_Fig5_HTML.jpg](images/464117_1_En_11_Chapter/464117_1_En_11_Fig5_HTML.jpg)

    *Figure 11-5: Limit Trace File Input for Replay*


    ## Summary


    In this chapter we examined the issues and techniques for performing database
    workload capture and reply. The key issues were that workload capture/replay,
    by its very nature, requires double the hardware and software licenses. Plus you
    must identify the proper time period and duration for capturing a useful workload
    that’s neither too brief nor too long. Then you need a capture/replay tool that
    works for your database platform, possibly from the vendor or from a third party.
    Then you can repetitively replay captured workloads in order to identify and correct
    `SQL` statement performance issues via whatever standard database monitoring and
    tuning tools you currently use. The goal is to simply improve the user’s perception
    of the database system performance.


    # 12. Database Stress Testing


    In this final chapter, we’re going to discuss simple database stress testing,
    plus present a free scripting tool that I’ve written for people to utilize or
    alter to fit their specific needs. A stress test is much like an industry-standard
    benchmark in that it attempts to press the database. It’s quite different as it
    applies simple, atomic transactions to merely stress the underlying subsystems,
    especially the `IO` bandwidth. I think of stress testing as being more like “gunning
    the engine” of an automobile, where the car is in neutral and you just want to
    see how high the `RPM’s` can go before redlining. That does not mean that such
    testing is any less valuable, just that it basically serves a different testing
    purpose. For many people this is sufficient for what they might call database
    benchmarking.'
