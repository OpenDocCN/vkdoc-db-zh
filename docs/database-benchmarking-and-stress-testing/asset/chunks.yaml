  trans: '

    # 3. 基准测试工具


    在第 1 章中，我们区分了数据库基准测试、数据库压力测试以及工作负载捕获/重放。接着在第 2 章，我们涵盖了所有相关的数据库基准测试，包括当前和过去的（即已淘汰的）。这很像一个青少年学习驾驶汽车，你现在已经学习了交通规则并通过了笔试，获得了学习驾驶许可证。现在是时候运用这些知识，进行一些实际驾驶了（远在参加最终路考之前）。为此，这位既紧张又兴奋的青少年需要一辆车和一位坐在副驾驶的合法驾驶员（注意还有其他限制，例如不能载其他青少年，不能在夜间驾驶）。类似地，对于数据库基准测试，你需要一些工具，在获得足够经验之前，你需要在限制条件下进行一些测试驾驶，然后才能真刀真枪地干。因此，在第
    3 章，我们将介绍一些可用的数据库基准测试工具以及如何最好地使用它们。此外，我们还将介绍一些你可能认为是基准测试工具，但更符合数据库压力测试或工作负载捕获/重放工具类别的其他工具。


    汽车驾驶的例子也适用于描述各种数据库基准测试工具的实际使用复杂程度。有些车是自动挡，而另一些是手动挡。大多数人会同意自动挡更容易驾驶，但由一个经验丰富的司机驾驶手动挡应该能获得更好的油耗。同样，我们基本上都偏爱有动力转向和刹车的汽车，因为这些功能确实让驾驶变得轻松得多。当前的数据库基准测试工具也是如此；有些自动化程度高，因此易于使用，而另一些则更困难，但可能提供更大的灵活性。因此，需要根据要使用的工具类型进行适当的准备。此外，就像汽车一样，你应该能够使用任何一种类型到达你的目的地。当然，你的油耗和经验可能会有所不同。


    最后，请注意，虽然本章旨在为你提供所有必备的基础知识以及一些有用的技巧和窍门，但合乎逻辑的是，要成为一名能够合理测试高级场景以获得可靠且**可重复**结果的专家，需要时间和毅力。请注意，`可重复`是最难也是最重要的目标。一辆车能跑一次
    125 英里/小时，并不意味着它能轻易重复这一壮举。在此过程中有许多变量在起作用。结果必须与所有变量相关联，并且条件必须能在某个合理的接近范围内重复。否则，就只是一个非常幸运的`一次性`结果，几乎没有价值。


    ## 存储基准测试


    在研究数据库基准测试工具之前，我们必须首先认识到那些即使非常流行但也不被归类为真正数据库基准测试工具的工具。有时，数据库管理员（通常与存储管理员合作）会专注于每秒的
    IO 速率或 IOPS。他们对磁盘驱动器读写数据的速度比数据库引擎本身更感兴趣。因此，他们不关心实际的数据库事务，而是关心原始的 IO 速率。例如，仅通过了解发动机的
    RPM（每分钟转速）你无法真正知道一辆车能跑多快。同样，仅通过了解磁盘的 IOPS，你也无法了解实际的数据库性能特征。是的，磁盘的 IOPS 越快，数据库可能也越快，但仅凭
    IOPS 你确实只能**猜测**数据库性能。虽然这是一个影响因素，但它不是唯一的因素，甚至在很多情况下不是最重要的因素。就像汽车一样，我们需要知道除 RPM
    之外的其他因素，例如变速箱齿轮比和轮胎尺寸。尽管如此，即使这些工具只能提供真实数据库性能的最基本概念，它们仍然非常受欢迎。


    ### WINSAT


    如果你的数据库运行在 Microsoft Windows 机器上，那么一个非常简单的内置 IO 测试工具是 `WINSAT` 命令。在我的 Windows
    机器上，数据库数据文件位于 `D:` 盘，这是一个三星 SATA-III SSD；因此命令将是 `winsat disk –drive D`（注意：驱动器字母后不要加冒号）。图
    3-1 显示了输出示例。


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig1_HTML.jpg](img/464117_1_En_3_Fig1_HTML.jpg)


    图 3-1


    Windows `WINSAT` 实用程序


    ### HDPARM


    如果你的数据库运行在 Linux 机器上，那么一个非常简单的内置 IO 测试工具是 `hdparm` 命令。在我的 Linux 机器上，数据库数据文件位于
    `/disk2` 盘，这是一个三星的传统 SATA-III 磁盘；因此命令将是 `hdparm –x /dev/sdb1`。图 3-2 显示了输出示例。


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig2_HTML.jpg](img/464117_1_En_3_Fig2_HTML.jpg)


    图 3-2


    Linux `HDPARM` 实用程序


    ### SQLIO


    如果你的数据库运行在 Microsoft Windows 机器上，那么一个已过时但仍流行的 IO 测试工具是 `SQLIO` 实用程序。虽然它已不再在 Microsoft
    网站上提供，但许多免费软件网站仍然可以找到它。在我的 Windows 机器上，数据库数据文件位于 `D:` 盘，这是一个三星 SATA-III SSD；因此命令将是
    `sqlio –dD`（注意：驱动器字母后不要加冒号）。图 3-3 显示了输出示例。


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig3_HTML.jpg](img/464117_1_En_3_Fig3_HTML.jpg)


    图 3-3


    Microsoft `SQLIO` 实用程序


    ### DISKSPD


    如果你的数据库运行在 Microsoft Windows 机器上，那么当前流行的 IO 测试工具是 `DISKSPD` 实用程序。你可以从 Microsoft
    网站 [`https://aka.ms/diskspd`](https://aka.ms/diskspd) 获取它。在我的 Windows 机器上，数据库数据文件位于
    `D:` 盘，这是一个三星 SATA-III SSD；因此命令将是 `diskspd d:`。图 3-4 显示了输出示例。


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig4_HTML.jpg](img/464117_1_En_3_Fig4_HTML.jpg)


    图 3-4


    Microsoft `DISKSPD` 实用程序


    ## 数据库模拟


    数据库模拟的概念相当简单；数据库供应商知道其数据库引擎通常会产生什么样的 IO 模式，因此他们可以提供工具来模拟这些 IO 模式进行测试，而无需实际创建和基准测试数据库。虽然这类产品不是真正的基准测试工具，但对于一些想要在
    IO 层面（通常是着眼于 IOPS）检查更低层性能的数据库管理员来说，它们仍然提供了有价值的见解。


    ### SQLIOSTRESS


    如果你的数据库是 Microsoft SQL Server，那么一个已过时但仍被铭记的数据库模拟工具是 `SQLIOSTRESS` 实用程序。它已不再在 Microsoft
    网站上提供，我也无法在任何免费软件网站上找到它。我在这里提及它只是为了完整性，因为它已被 `SQLIOSIM` 取代。

    '
- fmt: '### SQLIOSIM


    如果您的数据库是 Microsoft SQL Server，那么当前的数据库模拟工具是 SQLIOSIM 实用程序。您可以通过网络搜索获取 Microsoft
    网站 URL 以下载当前版本。还需注意，SQLIOSIM 甚至不需要安装 SQL Server，因为它完全模拟了 SQL Server 会向 I/O 子系统请求的
    I/O 命令。SQLIOSIM 是一个非常强大的工具，但其选项过多，无法在此详述。对于最简单的部署，只需将下载的文件解压缩到一个目录中。同时，也解压缩包含在该主
    zip 文件中的配置文件。然后将默认配置文件 `sqliosim.default.cfg.ini` 复制为 `sqliosim.cfg.ini`。最后，编辑该复制的文件，在接近底部的位置取消注释两个
    FILE 部分，以指定要模拟的设备上的 SQL Server 数据和日志文件。现在，您已准备好开始。您可以通过运行 `sqliosim.com` 在命令行中运行此实用程序，并通过运行
    `sqliosim.exe` 在图形模式下运行，如图 [3-5](#464117_1_En_3_Chapter.xhtml#Fig5) 所示。此实用程序运行需要相当长的时间（除非您减少配置文件中的
    `TestCycleDuration` 值），日志文件包含有关结果的详细 HTML 报告。


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig5_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig5_HTML.jpg)


    图 3-5


    在图形模式下运行 SQLIOSIM


    ### Orion


    如果您的数据库是 Oracle，那么一个众所周知的数据库模拟工具是 ORION 实用程序（ORION 代表 ORacle IO Numbers）。它位于数据库和/或网格的
    `$ORACLE_HOME/bin` 目录中。虽然它位于 Oracle 安装目录中，但它实际上并不需要 Oracle 数据库的存在。Orion 是一个非常强大且功能齐全的工具，因此建议在进行任何详细测试之前阅读
    Orion 手册，但对于本书，我们可以看一个简单的例子。在我的 Windows 机器上，我的数据库数据文件位于 D: 盘上，这是一个三星 SATA-III
    SSD；因此命令将是 `$ORACLE_HOME\orion -run normal -testname d_drive`，其中测试名参数指定了带有 `.lun`
    后缀的文本文件，该文件只是要测试的 LUN 或磁盘驱动器的列表。在 Linux 上，文件内容形式为 `/dev/sdb1`，而在 Windows 上则为 `\\.\D:`。图
    [3-6](#464117_1_En_3_Chapter.xhtml#Fig6) 显示了输出的示例。注意达到的两个关键值：514 MBS 和 10,472
    IOPS。


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig6_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig6_HTML.jpg)


    图 3-6


    运行 Oracle ORION


    Orion 还将创建一系列文本 `.TXT` 和电子表格 `.CSV` 文件，您可以使用后者来绘制详细的结果数据。文件名将采用以下形式：


    *   `test_name_date_time_summary.txt`

    *   `test_name_date_time_iops.csv`

    *   `test_name_date_time_mbps.csv`

    *   `test_name_date_time_lat.csv`

    *   `test_name_date_time_trace.txt`

    *   `test_name_date_time_hist.txt`


    ### 注意


    Orion 输出的 CSV 文件可以非常容易地导入 Microsoft Excel 电子表格中作为图表。


    ### Calibrate IO


    如果您的数据库是 Oracle，那么一个非常流行的数据库模拟工具是 `CALIBRATE_IO` 实用程序。根据 Oracle 数据库性能调整指南：“此过程向数据库文件发出
    I/O 密集型只读工作负载（由 1 MB 的随机 I/O 组成），以确定存储子系统可以维持的最大 IOPS 和 MBPS。”调用此实用程序的代码非常简单，如下所示。


    *调用 Oracle 的 Calibrate IO 实用程序*


    ```sql

    SET SERVEROUTPUT ON

    DECLARE

    lat  INTEGER;

    iops INTEGER;

    mbps INTEGER;

    BEGIN

    -- DBMS_RESOURCE_MANAGER.CALIBRATE_IO (physical disks,

    max latency, iops, mbps, lat);

    DBMS_RESOURCE_MANAGER.CALIBRATE_IO (1, 10,

    iops, mbps, lat);

    DBMS_OUTPUT.PUT_LINE (''max_iops = '' || iops);

    DBMS_OUTPUT.PUT_LINE (''latency  = '' || lat);

    dbms_output.put_line(''max_mbps = '' || mbps);

    end;

    /

    ```


    在我的 Windows 机器上，我的数据库数据文件位于 D: 盘上，这是一个三星 SATA-III SSD；因此我调用 `CALIBRATE_IO` 实用程序时，第一个参数设置为一个磁盘，第二个参数设置为最大延迟
    10 毫秒。显然，您的数据库服务器可能拥有更多的磁盘驱动器，并且随着 NVMe 闪存盘等新技术的出现，您的延迟也可能设置得更低。因此，您必须根据您的环境进行实验。我在笔记本电脑上运行了
    `CALIBRATE_IO`，得到了如图 [3-7](#464117_1_En_3_Chapter.xhtml#Fig7) 所示的结果。注意报告的数值：528
    MBS 和 54,767 IOPS。


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig7_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig7_HTML.jpg)


    图 3-7


    运行 Oracle CALIBRATE_IO


    现在，我不想阻止任何人使用 `CALIBRATE_IO`（如果它适合您的特定情况）。但您会发现许多作者和博主都会列出此实用程序方法的诸多缺点。以下是我从网上找到的关于此实用程序的一些转述示例（我完全同意）：


    *   `CALIBRATE_IO` 也许更好地被描述为集成在数据库内部的 Oracle ORION 工具的简化版本

    *   `CALIBRATE_IO` 的最大 IOPS、最大 MBPS 和观察到的延迟值的结果并不总是准确的

    *   `CALIBRATE_IO` 的结果既不可靠也不可重复

    *   `CALIBRATE_IO` 执行使用异步 I/O 调用缓冲在进程堆中的单块随机读取，这与绝大多数被称为 `db file sequential read`
    的单块随机 I/O（在 SGA 中缓冲且是同步 I/O）毫无共同之处

    *   `CALIBRATE_IO` 和 Orion 都不访问从存储中读取的数据，它们真正做的只是执行 I/O 并让缓冲区中的数据保持不变


    尽管如此，您会发现许多 DBA 依赖并引用此实用程序，仿佛这些数字在某种程度上是福音。因此，即使这个工具易于使用且输出简单，也不要陷入过度依赖像 `CALIBRATE_IO`
    这样单一、用途有限的工具的陷阱。请记住，简单往往不等同于好。


    ## 数据库基准测试'
  raw: '### SQLIOSIM


    If your database is Microsoft SQL Server, then the current database simulation
    tool is the SQLIOSIM utility. You can do a web search to obtain the Microsoft
    web site URL from where to download the current version. Note as well that SQLIOSIM
    does not require SQL Server to even be installed as it totally simulates the IO
    commands that SQL Server would request from the IO subsystem. SQLIOSIM is a very
    robust tool, but it has too many options to fully discuss here. For the simplest
    deployment, just unzip the download file into a directory. Also unzip the configuration
    file that was also contained in that main zip file. Then copy the default config
    file **sqliosim.default.cfg.ini** to **sqliosim.cfg.ini**. Finally edit that copied
    file and near the bottom uncomment the two FILE sections to specify both a SQL
    Server data and log file on the device to be simulated against. Now you’re ready
    to go. You can run this utility in command line by running [sqliosim.​com](http://sqliosim.com),
    and in graphical mode by running sqliosim.exe as show in in Figure [3-5](#464117_1_En_3_Chapter.xhtml#Fig5).
    This utility takes quite a while to run (unless you reduce the TestCycleDuration
    value in the config file) and the log file contains a detailed HTML report on
    the results.


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig5_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig5_HTML.jpg)


    Figure 3-5


    Running SQLIOSIM in Graphical Mode


    ### Orion


    If your database is Oracle, then the one well-known database simulation tool is
    the ORION utility (where ORION stands for ORacle IO Numbers). It is found in the
    database and/or grid $ORACLE_HOME/bin directory. And although it’s located in
    an Oracle installation directory, it really does not require the Oracle database
    to be present. Orion is a very robust and capable tool, so it’s advisable to read
    the Orion manual before doing any detailed testing, but for this book we can look
    at a simple example. On my Windows box my database data files are located on the
    D: drive, which is a Samsung SATA-III SSD; thus the command would be **$ORACLE_HOME\orion
    -run normal -testname d_drive**, where the test name parameter specifies the text
    file with a .lun suffix, which is simply a list of the LUN’s or disk drives to
    test. On Linux the file contents would be of the form /dev/sdb1, whereas on Windows
    of the form \\.\D:. Figure [3-6](#464117_1_En_3_Chapter.xhtml#Fig6) shows an example
    of the output. Note the two key values achieved of 514 MBS and 10,472 IOPS.


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig6_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig6_HTML.jpg)


    Figure 3-6


    Running Oracle ORION


    Orion will also create a collection of text .TXT and spreadsheet .CSV files, the
    latter of which you can use to plot the detailed resulting data. The file names
    will be of the form:


    *   test_name_date_time_summary.txt


    *   test_name_date_time _iops.csv


    *   test_name_date_time _mbps.csv


    *   test_name_date_time _lat.csv


    *   test_name_date_time _trace.txt


    *   test_name_date_time _hist.txt


    ### Note


    The CSV files output by Orion can very easily be imported into a Microsoft Excel
    spreadsheet as a graph.


    ### Calibrate IO


    If your database is Oracle, then the one very popular database simulation tool
    is the CALIBRATE_IO utility. According to the Oracle Database Performance Tuning
    Guide: “This procedure issues an I/O intensive read-only workload (made up of
    one megabyte of random of I/Os) to the database files to determine the maximum
    number of IOPS and MBPS that can be sustained by the storage subsystem.” The code
    to call this utility is very simple as shown below.


    *Calling Oracle’s Calibrate IO Utility*


    ```

    SET SERVEROUTPUT ON

    DECLARE

    lat  INTEGER;

    iops INTEGER;

    mbps INTEGER;

    BEGIN

    -- DBMS_RESOURCE_MANAGER.CALIBRATE_IO (physical disks,

    max latency, iops, mbps, lat);

    DBMS_RESOURCE_MANAGER.CALIBRATE_IO (1, 10,

    iops, mbps, lat);

    DBMS_OUTPUT.PUT_LINE (''max_iops = '' || iops);

    DBMS_OUTPUT.PUT_LINE (''latency  = '' || lat);

    dbms_output.put_line(''max_mbps = '' || mbps);

    end;

    /

    ```


    On my Windows box my database data files are located on the D: drive, which is
    a Samsung SATA-III SSD; thus I called CALIBRATE_IO utility with the first parameter
    set to one disk, and the second parameter set to for a latency maximum of 10 ms.
    Obviously your database server will likely have far more disk drives and with
    new technologies such as NVMe flash disks, your latency may also be set far lower.
    You will therefore have to experiment based on your environment. I ran the CALIBRATE_IO
    on my notebook and got the results shown in Figure [3-7](#464117_1_En_3_Chapter.xhtml#Fig7).
    Note the reported values of 528 MBS and 54,767 IOPS.


    ![../images/464117_1_En_3_Chapter/464117_1_En_3_Fig7_HTML.jpg](images/464117_1_En_3_Chapter/464117_1_En_3_Fig7_HTML.jpg)


    Figure 3-7


    Running Oracle CALIBRATE_IO


    Now I don’t want to discourage anyone from using CALIBRATE_IO if it makes sense
    for your particular situation. But you will find many authors and bloggers who
    will list numerous shortcomings with this utility’s approach. Here are a few paraphrased
    examples of what you will find said across the web about this utility (and with
    which I fully agree):


    *   CALIBRATE_IO might better be described as a simplified version of Oracle’s
    ORION tool integrated inside the database


    *   CALIBRATE_IO results of the max IOPS, max MBPS and observed latency values
    are not always accurate


    *   CALIBRATE_IO results are neither reliable nor repeatable


    *   CALIBRATE_IO performs single-block random reads with asynchronous I/O calls
    buffered in the process heap which has nothing in common with the vast majority
    of single-block random I/O is known as db file sequential read – which is buffered
    in the SGA and is synchronous I/O


    *   Neither CALIBRATE_IO nor Orion access the data that is being read from storage,
    all they really do is perform the I/O and let the data in the buffer remain untouched


    Nonetheless, you will find many DBAs who rely upon and quote this utility solely
    as if the numbers were somehow gospel. So even though this tool is easy to use
    with simple output, don’t get caught in the trap of overreliance upon a single,
    limited use case tool such as CALIBRATE_IO. Remember that easy often does not
    equate to good.


    ## Database Benchmarking'
