  trans: '## 新的“内存中”表


    多个主要关系型数据库供应商已采用的一项热门新技术是内存表。与之前关于固定表的部分更多是一种请求不同，这些新的内存表是真正的 **100% 内存中**。当然，除了数据库通常分配的所有其他内存外，你还需要具有足够
    RAM 内存的数据库服务器来容纳这些表。一般来说，你无法将整个数据库放入内存，因此需要有选择地挑选那些预期能带来最大回报的表。此外，一些数据库供应商（如 Oracle）将内存中和列存储结合为一个单一功能。对于这些数据库，只有内存表是列存储的，其余部分仍然是磁盘上的行存储。图
    7-12 展示了 Oracle 内存管理的复杂性。


    ![../images/464117_1_En_7_Chapter/464117_1_En_7_Fig12_HTML.jpg](img/464117_1_En_7_Fig12_HTML.jpg)


    **图 7-12**

    Oracle 的内存列存架构


    如你在图 7-12 中所见，本章的许多其他功能都发挥了作用。对于 DBA 来说，了解 Oracle 如何工作的工作变得更加困难了。我想这就是为什么他们据说能赚大钱吧。


    为了演示内存表能提供怎样的性能示例，现在请看图 7-13。该图显示了针对一个保存为行存储与列存储的 300GB 数据库运行 22 个 TPC-H 查询所需的时间。对于我的数据库服务器、数据库版本和配置，整体性能提升达到了惊人的
    **90.89%**！然后，当我同时为内存表添加高级压缩后，运行时间相同，但所需的内存空间几乎减少了 75%！因此，即使我的数据库服务器只有 256GB 内存，该表也只需要
    75GB 内存。所以我的数据库仍然有足够的内存用于正常的数据库分配和消耗。事实上，如果服务器只需处理此工作负载，那么使用内存更少的服务器也是可行的。你注意到这个转折点了吗？将表置于内存中，在某些情况下反而可能减少对内存的需求！


    ![../images/464117_1_En_7_Chapter/464117_1_En_7_Fig13_HTML.png](img/464117_1_En_7_Fig13_HTML.png)


    **图 7-13**

    内存表带来的 TPC-H 性能提升


    ## 总结


    本章回顾了执行数据库基准测试时可能利用的许多数据库特性和技术。虽然上一章介绍的硬件进步以惊人的速度发展，但对数据库性能的益处是可衡量的。然而，随着近期数据库的进步，性能提升确实令人惊叹。想象一下，查询运行时间减少
    91%，空间占用减少 75%。这听起来几乎像是科幻小说。但这些特性及其结果是真实的。任何从事数据库基准测试项目的 DBA 都应努力了解过去几年以及未来将出现的所有主要数据库增强功能。这些进步目前能带来最大的收益，有时只需付出很小的努力。只需确保你已获得适当许可来使用这些漂亮的新工具。


    # 8. 整合基准测试


    在本章中，我们将回顾当你为了整合数据库实例而测试场景时的基准测试注意事项。数据库整合发生在你试图减少数据库许可证总数以降低成本时。随着数据库许可证成本的上升，以及业务部门将数据库视为仅仅是应用程序所需的、现成的构建块对象，你的管理层可能需要进行整合工作。此外，如今的服务器非常强大，拥有多核
    CPU 和大量廉价内存，我们不再需要刻意采用传统“孤岛”方式（每个服务器一个数据库）来隔离数据库。DBA 现在可以实际考虑将来自多个数据库实例的所有数据共同定位到单个数据库实例下。有时，此类工作可能与主要的数据库版本升级或许可“合规调整”工作同时进行。但有一点是肯定的，由于过去
    20 年发生的“数据库蔓延”，我们拥有的数据库实例数量比任何人合理想象的都要多。因此，数据库整合工作可能比你想象的更常见。


    我也见过管理层试图减少他们需要应对的数据库供应商数量的整合努力。例如，开发团队多年来可能同时使用了 Oracle 和 SQL Server，因此现在可能认为值得只标准化一个数据库供应商。我还见过整合工作寻求从单一数据库供应商（如
    Oracle）迁移到同时纳入第二个开源供应商（如 PostgreSQL）。其想法是一石二鸟：即减少高成本许可证的数量，并整合到一个开源平台上。无论真实目标是什么，大多数数据库整合工作都可以简单地视为将来自不同实例的许多数据库合并到能力更强的服务器上的更少实例中。简而言之，就是减少物理数据库部署。因此，在本章的剩余部分，为了简化问题，我们将仅从这样一个单一维度的视角来看待这类工作。'
- fmt: '## Consolidation Approaches


    The first thing one must decide when performing database consolidations is by
    what method or approach will that consolidation be achieved. So let’s begin by
    first picturing what databases we need to consolidate. Let’s assume that we have
    six databases, spread across three instances, on three different servers as shown
    in Figure [8-1](#464117_1_En_8_Chapter.xhtml#Fig1). This is a very simple yet
    common scenario. You might have a lot more than just three servers, but essentially
    it’s the exact same problem just on a larger scale. Note that in Figure [8-1](#464117_1_En_8_Chapter.xhtml#Fig1)
    we’re starting on three separate physical database servers since these are legacy
    databases from deployment done years ago before virtualization and the cloud.
    So what options do we have?


    ![../images/464117_1_En_8_Chapter/464117_1_En_8_Fig1_HTML.png](images/464117_1_En_8_Chapter/464117_1_En_8_Fig1_HTML.png)

    *Figure 8-1: Database Instances to Consolidate*


    The first option is to buy a single large physical server, have a single database
    instance, and place all six databases on that one server as shown in Figure [8-2](#464117_1_En_8_Chapter.xhtml#Fig2).
    I show this option mostly because it’s simple and how one would have done it in
    the past. But remember that today most database instances are running on hypervisors
    as virtual machines rather than dedicated servers. So I am not advising on the
    solution in Figure [8-2](#464117_1_En_8_Chapter.xhtml#Fig2), but rather showing
    it for legacy reasons and because it conceptually or logically shows the desired
    end results (i.e., all six databases under a single instance and thus database
    license in order to reduce licensing costs). This approach sort of fits the well-known
    motto of the Three Musketeers: "One for all, and all for one."


    ![../images/464117_1_En_8_Chapter/464117_1_En_8_Fig2_HTML.png](images/464117_1_En_8_Chapter/464117_1_En_8_Fig2_HTML.png)

    *Figure 8-2: Consolidation onto a Physical Server*


    So today with the overwhelming popularity of virtualization, we would more likely
    transform Figure [8-2](#464117_1_En_8_Chapter.xhtml#Fig2) into essentially the
    same basic design instead, running as a virtual machine as shown in Figure [8-3](#464117_1_En_8_Chapter.xhtml#Fig3).
    Now you may be thinking that these last two examples were blatantly obvious and
    thus superfluous. But Figure [8-3](#464117_1_En_8_Chapter.xhtml#Fig3) provides
    the foundation for what we’ll be discussing in this chapter, as well as the next
    two chapters covering virtualized databases and databases in the cloud. Therefore
    Figure [8-3](#464117_1_En_8_Chapter.xhtml#Fig3) should be both noted and remembered.


    ![../images/464117_1_En_8_Chapter/464117_1_En_8_Fig3_HTML.png](images/464117_1_En_8_Chapter/464117_1_En_8_Fig3_HTML.png)

    *Figure 8-3: Consolidation onto a Single Virtual Machine*


    The reality is that since databases are almost universally required for any real-world
    application that has resulted in the very database sprawl that consolidation attempts
    to rectify, there are going to be far too many databases to result in either a
    single server as in Figure [8-2](#464117_1_En_8_Chapter.xhtml#Fig2) or a single
    virtual machine as in Figure [8-3](#464117_1_En_8_Chapter.xhtml#Fig3). You are
    going to need to identify the proper split where the most databases can coexist,
    thus resulting in the fewest number of physical servers or virtual machines. Assuming
    virtualization and thus building upon Figure [8-3](#464117_1_En_8_Chapter.xhtml#Fig3),
    our first goal must be to identify the split for the right number of instances
    and virtual machines assuming a single infinitely scalable server can handle the
    entire load resulting in Figure [8-4](#464117_1_En_8_Chapter.xhtml#Fig4). We are
    doing this first step as a "divide and conquer strategy" such that once we know
    the proper total number of virtual machines, we can next identify the proper number
    of physical servers to host those virtual machines. Another way to state this
    is that from a scientific point of view, we’re purposefully limiting the number
    of variables being considered such that we guarantee that we don’t introduce uncertainty
    to the conclusions.


    ![../images/464117_1_En_8_Chapter/464117_1_En_8_Fig4_HTML.png](images/464117_1_En_8_Chapter/464117_1_En_8_Fig4_HTML.png)

    *Figure 8-4: Consolidation onto Multiple Virtual Machines*


    Once we know which databases can peacefully coexist on a single virtual machine
    because their workloads are reasonably compatible, meaning that the workloads
    don’t make net requests that cumulatively overly stress the available resources,
    we can then see how many actual servers of what size are required for each virtual
    machine and its collections of databases. Moreover, we can ascertain whether multiple
    virtual machines can be hosted by a server. For example, in Figure [8-4](#464117_1_En_8_Chapter.xhtml#Fig4),
    if we know that virtual machine #1 and its databases require `2X` resources and
    virtual machine #2 requires `3X` resources, then we require a server with `5X`
    resources or separate physical servers to host them. That’s what we’ll be attempting
    to benchmark in this chapter.'
