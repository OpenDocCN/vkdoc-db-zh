- '# 13. 与内存 OLTP 相关的等待类型


  随着 SQL Server 2014 的发布，微软引入了一项全新的 SQL Server 功能，称为内存 OLTP（或代号 Hekaton）。内存 OLTP 是一个内存优化的数据库引擎，直接集成到
  SQL Server 2014 引擎中。内存 OLTP 是一项仅适用于企业版的功能，旨在通过将表完全放入 SQL Server 实例的内存中来提高性能——根据微软的说法，性能可提升高达
  20 倍。这些内存优化表是完全持久的，并使用无锁和无闩锁的结构来优化并发控制。


  随着内存 OLTP 的引入，SQL Server 2014 中添加了各种新的等待类型。其中大多数可以通过等待类型名称中的 `_XTP_`（或 eXtreme Transaction
  Processing）部分来识别。在本章中，我们将了解 SQL Server 2014 或更高版本中可用的一些新的、与内存 OLTP 相关的等待类型。


  在深入研究这些等待类型之前，让我们先（简单且简要地）了解一下内存 OLTP 是什么以及它是如何工作的。本章我将重点关注内存优化表。内存 OLTP 还引入了其他功能，如本机编译存储过程和哈希索引，但这些超出了本章的范围。


  单击“文件”->“导出”->“脚本跟踪定义”->“适用于 SQL Server 2005 – SQL2017”选项后，系统将要求我们保存一个 `.sql` 文件。整个跟踪定义将被脚本化到这个
  `.sql` 文件中。我们可以在 SQL Server Management Studio 中打开此文件，修改脚本中的文件位置和其他一些选项，然后执行它。这将返回我们刚创建的跟踪的
  ID，并将跟踪信息保存到我们在脚本顶部指定的文件中。图 12-16 显示了在我们的测试 SQL Server 实例上导出的跟踪定义的一部分。


  ![../images/340881_2_En_12_Chapter/340881_2_En_12_Fig16_HTML.jpg](img/340881_2_En_12_Fig16_HTML.jpg)

  **图 12-16**

  跟踪定义


  执行脚本以创建服务器端跟踪后，我们收到了一个跟踪 ID 为 2。跟踪 ID 非常重要，因为它是启动或停止服务器端跟踪的唯一方法。创建后，服务器端跟踪会自动启动。如果我们查询
  `sys.traces` 目录视图，我们可以看到刚刚创建的服务器端跟踪，如图 12-17 所示。


  ![../images/340881_2_En_12_Chapter/340881_2_En_12_Fig17_HTML.jpg](img/340881_2_En_12_Fig17_HTML.jpg)

  **图 12-17**

  sys.traces


  与我们创建的服务器端跟踪交互的唯一方法是执行 `sp_trace_setstatus` 存储过程并提供跟踪 ID 和状态 ID。例如，执行以下查询将停止跟踪 ID
  为 2 的服务器端跟踪：


  ```

  EXEC sp_trace_setstatus 2, 0

  ```


  要重新启动它，我们可以执行此命令：


  ```

  EXEC sp_trace_setstatus 2, 1

  ```


  最后，要完全关闭跟踪，我们可以执行以下命令：


  ```

  EXEC sp_trace_setstatus 2, 3

  ```


  然而，这并不会删除服务器端跟踪。事实上，服务器端跟踪只能通过重启 SQL Server 服务来移除。


  因为服务器端跟踪只能捕获到跟踪文件，所以你可以导航到在服务器端跟踪定义中提供的文件，并在 SQL Server Profiler 中打开该文件。这样，你可以捕获与使用
  SQL Server Profiler 应用程序相同的信息，但性能开销要低得多。


  ### TRACEWRITE 总结


  `TRACEWRITE` 等待类型表明当前正在针对 SQL Server 实例执行 SQL Server Profiler 跟踪。SQL Server Profiler
  跟踪可能对 SQL Server 实例的性能产生相当大的影响，因此监控针对 SQL Server 实例运行的跟踪数量非常重要。值得庆幸的是，有一些 SQL Server
  Profiler 跟踪的替代方案。你可以选择将 SQL Server Profiler 跟踪转换为扩展事件会话，或者使用服务器端跟踪执行 SQL Server
  Profiler 跟踪。




  ## 内存 OLTP 简介


  传统的基于磁盘的表与内存优化表之间的主要区别在于，内存优化表完全驻留在 SQL Server 实例的内存中。与传统表（其数据页会在磁盘和内存之间来回移动）不同，内存优化表在
  SQL Server 启动时被移入系统内存，并且永远不会离开内存（当然，除非内存优化表被删除）。虽然这乍听起来可能有点吓人，但默认情况下，内存优化表是完全持久的。这意味着如果你的
  SQL Server 实例崩溃，内存优化表的数据不会丢失。


  当然，让整个表驻留在 SQL Server 实例的内存中也有其缺点。你需要确保有足够的空闲内存来容纳整个内存优化表（以及一些额外的内存来容纳访问此类表时使用的行版本）。计算内存需求可能很困难，但下面这篇文章可以帮你：[`https://msdn.microsoft.com/en-us/library/dn282389.aspx`](https://msdn.microsoft.com/en-us/library/dn282389.aspx)。


  你为内存优化表保留的内存会被 SQL Server 占用，并且不会被清除；如果你的内存优化表使用了太多内存，你的 SQL Server 实例将面临内存不足的问题，导致性能下降，或者在最坏的情况下导致
  SQL Server 崩溃。这是一个主要区别，例如，与缓冲区缓存不同，在缓冲区缓存中，当内存压力发生时，页面会从内存中清除。


  另一个缺点是，许多数据类型或 SQL Server 功能不支持用于内存优化表。可以使用和不可以使用的完整列表可以在 [`https://msdn.microsoft.com/en-us/library/dn246937(v=sql.120).aspx`](https://msdn.microsoft.com/en-us/library/dn246937(v=sql.120).aspx)
  和 [`https://msdn.microsoft.com/en-us/library/dn133181(v=sql.120).aspx`](https://msdn.microsoft.com/en-us/library/dn133181(v=sql.120).aspx)
  找到。随着 SQL Server 2016 的发布，一些主要的限制得到了解决，使该功能更具吸引力，限制更少。


  那么，内存优化表是如何工作的，为什么它们的性能比传统的基于磁盘的表快那么多？让我们来看看内存 OLTP 的一些内部机制。


  ### CFPs（检查点文件对）


  正如我之前提到的，默认情况下内存优化表是持久的（你可以选择创建一个非持久表，其内容在 SQL Server 服务重启时被清除，但你必须明确指定这一点）。实现这种持久性的方式是通过所谓的检查点文件对（`CFPs`）。`CFPs`由两个文件组成，一个数据文件和一个增量文件，它们存在于一个特殊的内存优化文件组中，你必须为你希望使用内存优化表的数据库创建这个文件组。


  与传统表将行数据存储在数据页内不同，数据文件存储`所有`内存优化表的行。我强调“所有”这个词，是因为单个数据文件可以容纳许多内存优化表的行，这与为单个表存储行数据的数据页不同。数据文件内的行是根据它们插入到内存优化表的时间顺序存储的。这与数据页不同，数据页在传统表的区中保存行信息。因为行在数据文件中是顺序存储的，所以读取行时性能有所提升，因为它消除了从传统表读取行时发生的随机读取。图
  13-1 显示了数据文件及其所包含行数据的抽象视图。


  ![../images/340881_2_En_13_Chapter/340881_2_En_13_Fig1_HTML.jpg](img/340881_2_En_13_Fig1_HTML.jpg)


  图 13-1 内存优化表的数据文件


  内存优化文件组中总是有多个数据文件。当你第一次创建内存优化文件组时，SQL Server 会自动在文件组的文件位置预分配一定数量的数据文件。数据文件的大小总是固定的，在内存超过
  16 GB 的系统上为 128 MB，在内存小于或等于 16 GB 时为 16 MB。当一个数据文件满了时，会自动创建一个新的数据文件，新的行将被插入到这个新数据文件中。


  重要的是要知道，数据文件根据将行插入到数据文件中的事务提交时间戳（如图 13-1 中的数字所示）来跟踪行。即使添加了新的数据文件并且行分布在多个数据文件上，数据文件也总是具有连续的事务范围。图
  13-2 显示了多个数据文件以及与这些数据文件相关联的事务提交时间戳。


  ![../images/340881_2_En_13_Chapter/340881_2_En_13_Fig2_HTML.jpg](img/340881_2_En_13_Fig2_HTML.jpg)


  图 13-2 数据文件和事务时间戳


  注意在图 13-2 中，最后一个数据文件仍有空间容纳新行——它没有表示文件已满的事务时间戳，因此新行将被添加到该文件中。


  数据文件的另一个重要特征是，被删除的行不会直接从文件中移除。相反，它们由与数据文件关联的增量文件跟踪。增量文件记录数据文件中进行的任何删除操作，并通过事务时间戳范围与数据文件连接。内存优化表的行更新被跟踪为删除和插入操作。


  数据和增量文件的填充是由一个后台线程执行的——称为离席检查点线程——它持续在 SQL Server 后台运行。这与用于传统表的检查点过程不同，后者是将页面按间隔写入数据库数据文件。离席检查点线程监视事务日志中对内存优化表执行的操作，并直接写入数据和增量文件。


  随着时间的推移，当数据文件累积了更多已删除的行时，将发生合并操作，将多个数据文件合并为一个数据文件。合并操作将创建新的数据和增量文件，并将一个或多个数据和增量文件的内容移动到新文件中，但它不会移动标记为已删除的行。新的数据和增量文件中的事务提交时间戳将被调整，以匹配被合并文件的时间戳。图
  13-3 显示了数据文件级别合并操作的简化视图。请记住，合并也会影响增量文件。


  ![../images/340881_2_En_13_Chapter/340881_2_En_13_Fig3_HTML.jpg](img/340881_2_En_13_Fig3_HTML.jpg)


  图 13-3 合并操作



  ### 隔离


  对内存优化表的并发访问通过基于快照的事务隔离处理。该隔离级别与我们可以在基于磁盘的表上使用的快照隔离共享许多特征，但也存在一些差异以优化吞吐量。首先，基于快照的事务隔离在并发事务希望访问同一行时使用行版本。与常规快照隔离将行版本存储在
  TempDB 数据库中不同，内存优化表的行版本是**内联**存储在数据文件本身的。


  另一个区别是基于快照的事务隔离采用乐观并发控制。这意味着 SQL Server 假设并发事务访问相同数据时不会发生事务冲突。由于此假设，无需锁或闩锁来保护内存优化表数据。然而，存在一种冲突检测机制是活跃的，当它检测到冲突发生时，将终止其中一个事务，该事务需要重试。


  无需放置和维护锁与闩锁，这是 In-Memory OLTP 性能的另一个主要贡献。


  ### 事务日志更改


  本节要讨论的最后差异是针对内存优化表的事务日志行为的修改。对于传统表，无论事务是否提交，都会在事务启动时生成日志记录。对于内存优化表，日志记录仅在事务开始提交处理时才生成。这意味着不会记录已回滚事务的任何信息。这最大限度地减少了与磁盘上事务日志的交互，从而提高了性能。


  另一项修改是，对内存优化表上索引的更改不会记录在事务日志中。由于在内存优化表上创建的索引也完全在内存中维护，因此无需记录更改。内存优化表上的索引在 SQL Server
  服务启动时重新生成。


  我想提到的最后一个差异是将多个事务分组到一个日志记录中。对于传统表，每个事务将至少生成一个日志记录。针对内存优化表的事务被分组在一起，然后作为一个日志记录写入（当前最大大小为
  24 KB）。例如，如果你对传统表有 200 次插入操作，将至少生成 200 个日志记录。如果我们可以将 100 次插入操作容纳到一个内存优化表的日志记录中，我们只需要两个日志记录，而不是至少
  200 个。同样，这提高了内存优化表的吞吐量。


  现在，我们已经（简化且简短地）了解了内存优化表的一些内部工作原理，接下来让我们看一些与 In-Memory OLTP 相关的等待类型。本章将讨论的三种等待类型中的大多数，都或多或少地与
  In-Memory OLTP 引入的新脱机检查点进程有关。


  ## WAIT_XTP_HOST_WAIT


  本章我们将讨论的第一个等待类型是 `WAIT_XTP_HOST_WAIT`。这种等待类型与我们已在第 12 章“后台和杂项等待类型”中讨论过的 `CHECKPOINT_QUEUE`
  等待类型共享一些特征，即它似乎持续运行，但仅在特定条件下才将其等待信息写入 `sys.dm_os_wait_stats`。


  ### WAIT_XTP_HOST_WAIT 等待类型是什么？


  如果我们在在线丛书（Books Online）上查找关于 `WAIT_XTP_HOST_WAIT` 等待类型的一些信息，我们会得到一个不那么有用的定义：“当等待由数据库引擎触发并由主机实现时发生。”这并没有给我们太多关于可能与
  `WAIT_XTP_HOST_WAIT` 等待类型相关的进程的线索，这意味着我们需要自己做一些深入调查。


  在我们开始研究 `WAIT_XTP_HOST_WAIT` 等待类型之前，我们需要创建一个内存优化表。我使用了清单 13-1 所示的脚本，创建了一个包含单个内存优化表的新数据库。此脚本中有一些路径引用，您需要更改这些引用以确保数据库数据和日志文件在正确的位置创建。


  ```sql

  -- 创建数据库

  -- 如果需要，请确保更改文件位置

  USE [master]

  GO

  CREATE DATABASE [OLTP_Test] CONTAINMENT = NONE

  ON PRIMARY

  (

  NAME = N''OLTP_Test'', FILENAME = N''E:\Data\OLTP_Test_Data.mdf'' , SIZE = 51200KB
  , FILEGROWTH = 10%

  )

  LOG ON

  (

  NAME = N''OLTP_Test_log'', FILENAME = N''E:\Log\OLTP_Test_Log.ldf'' , SIZE = 10240KB
  , FILEGROWTH = 10%

  );

  GO

  -- 添加内存优化文件组

  ALTER DATABASE OLTP_Test ADD FILEGROUP OLTP_MO CONTAINS MEMORY_OPTIMIZED_DATA;

  GO

  -- 向新创建的文件组添加一个文件。

  -- 如果需要，请更改驱动器/文件夹位置。

  ALTER DATABASE OLTP_Test ADD FILE (name=''OLTP_mo_01'', filename=''E:\data\OLTP_Test_mo_01.ndf'')
  TO FILEGROUP OLTP_MO;

  GO

  -- 创建我们的测试表

  USE [OLTP_Test]

  GO

  CREATE TABLE OLTP

  (

  ID INT IDENTITY (1,1) PRIMARY KEY NONCLUSTERED,

  RandomData1 VARCHAR(50),

  RandomData2 VARCHAR(50),

  ID2 UNIQUEIDENTIFIER

  )

  WITH (MEMORY_OPTIMIZED=ON);

  GO

  清单 13-1

  创建测试数据库和内存优化表

  ```


  现在我们有了一个可用于测试的内存优化表，让我们使用以下查询查看 `sys.dm_os_wait_stats` 和 `sys.dm_os_waiting_tasks`
  DMV 中的 `WAIT_XTP_HOST_WAIT` 等待类型：


  ```sql

  SELECT *

  FROM sys.dm_os_waiting_tasks

  WHERE wait_type = ''WAIT_XTP_HOST_WAIT'';

  SELECT *

  FROM sys.dm_os_wait_stats

  WHERE wait_type = ''WAIT_XTP_HOST_WAIT'';

  ```


  在我的测试 SQL Server 实例上执行此查询的结果可以在图 13-4 中看到。


  ![../images/340881_2_En_13_Chapter/340881_2_En_13_Fig4_HTML.jpg](img/340881_2_En_13_Fig4_HTML.jpg)


  图 13-4


  WAIT_XTP_HOST_WAIT 等待


  您会注意到的第一件事是，`WAIT_XTP_HOST_WAIT` 等待类型持续出现在 `sys.dm_os_waiting_tasks` DMV 中，并且随着时间的推移等待时间增加。此外，与
  `WAIT_XTP_HOST_WAIT` 等待类型相关的 `session_id` 表明它是记录等待的内部 SQL Server 线程。根据这些信息，我们已经可以对
  `WAIT_XTP_HOST_WAIT` 等待类型得出一些结论：它与一个持续运行的内部后台进程相关。同样有趣的是，如果您第二次运行该查询，`sys.dm_os_waiting_tasks`
  DMV 中的等待时间会增加，但 `sys.dm_os_wait_stats` 中的等待时间保持不变。到目前为止，我们遇到过另一种共享此特征的等待类型，即 `CHECKPOINT_QUEUE`
  等待类型，我们在第 12 章“后台和杂项等待类型”中讨论过。


  由于 `CHECKPOINT_QUEUE` 等待类型具有有趣的行为，即仅在发生自动检查点时才将 `sys.dm_os_waiting_tasks` DMV 中累积的等待时间写入
  `sys.dm_os_wait_stats` DMV，我决定使用清单 13-1 创建的 `OLTP_Test` 数据库简单地运行一个检查点命令，然后再次查询这两个
  DMV。对 `WAIT_XTP_HOST_WAIT` 等待类型等待时间的影响可以在图 13-5 中看到。


  ![../images/340881_2_En_13_Chapter/340881_2_En_13_Fig5_HTML.jpg](img/340881_2_En_13_Fig5_HTML.jpg)

  **图 13-5** 检查点后的 `WAIT_XTP_HOST_WAIT` 等待信息


  如图 **13-5** 所示，`sys.dm_os_waiting_tasks` DMV 中的等待时间再次变得非常小，但 `sys.dm_os_wait_stats`
  DMV 中的等待时间却大幅增加。基于这种行为，我认为 `WAIT_XTP_HOST_WAIT` 等待类型与内存优化表相关的离线检查点进程有关。


  为了验证我的猜测，我需要更深入地研究在对内存优化表执行检查点时，SQL Server 内部发生了什么。为此，我创建了一个扩展事件会话，用于捕获每当 SQL Server
  遇到 `WAIT_XTP_HOST_WAIT` 等待时的调用堆栈。我不会在此详述创建此扩展事件会话的具体方法，但 Paul Randal 写了一篇精彩的博客文章，介绍了如何在特定等待发生时捕获调用堆栈，你可以参考它来收集一些调用堆栈。你可以在这里找到
  Paul 的博客文章：[`www.sqlskills.com/blogs/paul/determine-causes-particular-wait-type/`](http://www.sqlskills.com/blogs/paul/determine-causes-particular-wait-type/)。


