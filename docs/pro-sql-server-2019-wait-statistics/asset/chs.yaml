- '# 引言


  性能是许多数据库实施中的一个热点问题。许多企业在其数据库负载增加或规模扩大时，都会遇到与性能相关的问题。存在多种方法可在各个层面提高 SQL Server 的性能。其中许多性能优化方法被认为是最佳实践，例如执行索引维护以确保碎片化的索引不会拖慢您的查询，或更新统计信息以便
  SQL Server 数据库引擎能拥有正确的信息来生成良好的执行计划。除了这些数据库维护方法外，您也可以选择更深入地钻研特定的查询性能故障排查，例如通过确保用成本较低的运算符替换成本高昂的运算符来优化查询。当然，总还有“大锤”式的方法，即用更新、性能更好的硬件替换当前硬件，希望这能解决您遇到的性能问题。


  无论您选择哪种方法来优化或排查 SQL Server 性能，总涉及两个常见资源：时间和金钱。理想情况下，我们在致力于提高性能时，希望花费尽可能少的时间和金钱。知道应将时间和金钱集中于何处至关重要。如果您能发现性能问题的根源并在该层面解决它，就可以节省大量本会花在分析表象上的时间和金钱。


  在某种程度上，我们可以将对性能问题核心的探寻比作医疗检查。医生并非只是开出各种药物直到某种药物实际见效，而是始终试图找到问题的根源，以便能对症下药，开出最适合该特定病症且不引起副作用的药物。同样的方法也适用于
  SQL Server。不审视问题的真正根源就实施所有可能的解决方案，很可能无法解决真正的根本问题（除非您运气特别好），甚至可能使情况恶化。


  这正是等待统计信息能提供帮助的地方。等待统计信息是在 SQL Server 数据库引擎执行查询的核心位置生成和维护的，为了解是什么拖慢了您的查询提供了宝贵的见解。在最新版的
  SQL Server（SQL Server 2017）中，有 921 种不同类型的等待统计信息，并且随着新功能的引入或现有功能的修改和扩展，每个版本中这个数字都在增长。这是一大量可免费获取以帮助您进行故障排查的信息！


  本书是我帮助您理解 SQL Server 等待统计信息的尝试。它将详细阐述等待统计信息是如何生成的，以及您如何利用这些信息来优化或排查您的 SQL Server
  安装的性能。我还将描述特定的等待统计信息，并就如何自行解决问题为您提供指导。就本书而言，我个人认为过程比到达目的地更重要。因此，我花了更多时间描述和解释导致特定等待类型发生的原因，而不是写下所有可能降低其等待时间的方法。如果您理解了为什么会产生某种等待类型，以及它与
  SQL Server 的哪个部分相关，您将很快发现自己的方法来降低它们的等待时间。


  遗憾的是，由于不同等待统计信息的数量庞大，不可能描述和讨论全部。为此，我不得不选择一部分等待统计信息纳入本书。我的选择方法是从许多不同的 SQL Server
  安装中收集等待统计信息数据，并挑选出最常见或对性能破坏性最大的那些，最终选定了 45 种不同的（或分组的）等待类型。




  '
- '# 书籍布局


  正如我在引言中所写，本书的目标是让你更深入地理解 SQL Server 的等待统计，并详细描述各种等待统计。为此，本书被分为两部分：第一部分描述等待统计分析的基础，第二部分详细描述各种具体的等待统计。我尝试在第二部分中，根据等待统计所影响的系统部分（例如
  `CPU`、`Memory` 等）对它们进行分类。有些等待统计不那么容易分类，因为它们可能影响多个系统部分。在这些情况下，我尝试根据它们影响最大的部分进行归类。


  '
- '# 第一部分：等待统计分析基础


  -   第 `1` 章：“等待统计内部机制”首先简要介绍了 SQL Server 等待统计的历史，并探讨了 `SQLOS` 架构。由于等待统计与您系统的处理器密切相关，我们将详细讨论调度器、任务和工作线程。


  -   第 `2` 章：“查询 SQL Server 等待统计”介绍了通过使用 `DMVs`、扩展事件和 `Perfmon` 访问 SQL Server 数据库引擎内部等待统计信息的各种方法。


  -   第 `3` 章：“查询存储”探讨了 SQL Server 2016 中引入的一项新功能——`查询存储`。由于 `查询存储` 对您执行性能分析的方式可能产生巨大影响，我专门用一章来介绍如何使用这个出色的新功能。


  -   第 `4` 章：“建立可靠的基线”涵盖了为性能故障排查建立和使用基线的重要性。基线在分析等待统计时尤其重要，我将向您展示如何为等待统计分析创建一个基线的示例。


  '
- '# 第二部分：等待类型


  -   第 `5` 章：“与 CPU 相关的等待类型”介绍了与 CPU 相关的等待类型。


  -   第 `6` 章：“与 IO 相关的等待类型”描述了与 IO 相关的等待类型。


  -   第 `7` 章：“与备份相关的等待类型”介绍了与备份事件相关的等待类型。


  -   第 `8` 章：“与锁相关的等待类型”首先简要介绍了 SQL Server 中的锁定和阻塞，然后深入探讨与锁相关的等待类型。


  -   第 `9` 章：“与闩锁相关的等待类型”首先深入探讨了闩锁，描述了它们是什么以及在 SQL Server 内部如何工作。介绍之后，我们将准备查看不同的与闩锁相关的等待类型。


  -   第 `10` 章：“高可用性和灾难恢复等待类型”描述了与 SQL Server 中可用的各种 `HA` 和 `DR` 配置相关的等待类型。


  -   第 `11` 章：“抢占式等待类型”介绍了与 SQL Server 的操作系统有直接关系的不同等待类型。


  -   第 `12` 章：“后台和杂项等待类型”包含了由 `SQLOS` 作为后台进程生成的各种等待类型。本章还将描述无法归入前述类别的等待类型。


  -   第 `13` 章：“内存中 OLTP 相关的等待类型”描述了与 SQL Server 2014 中发布的 `内存中 OLTP` 功能相关的一些等待类型。


  -   附录 I：“SQL Server 示例机器配置”描述了本书中我使用的虚拟机的配置。


  -   附录 II：“自旋锁”解释了所谓的轻量级同步原语——自旋锁的工作原理，以及它们可能对您的 SQL Server 配置产生的影响。


  -   附录 III：“闩锁类”包含了 SQL Server 内部大部分不同闩锁类的列表。该列表结合了在线手册的信息以及关于特定闩锁类的补充信息。


  '
- '# 警告


  本书中我们访问等待统计信息的方式主要是通过 SQL 查询。因此，本书包含大量的 SQL 代码行。本书第一部分中的大多数查询都涉及使用动态管理视图（或 `DMVs`）收集或捕获等待统计，因此除非另有说明，它们是无害的。然而，第二部分中的一些查询是专门编写的，旨在损害性能，以便演示特定的等待类型。当您计划使用某些脚本时，请记住这一点，并在测试系统上彻底测试它们。


  '
