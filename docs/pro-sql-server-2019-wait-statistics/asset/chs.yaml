- '# 第一部分：等待统计分析基础




  '
- "# 1. 等待统计详解\n\nSQL Server 等待统计是一个重要工具，可用于分析与性能相关的问题或优化 SQL Server 的性能。然而，许多数据库管理员或开发人员对其并不十分了解。我认为这与其相对复杂的性质、不同类型的等待统计数量庞大以及许多类型缺乏文档说明有关。等待统计还与你分析它们所用的\
  \ SQL Server 直接相关，这意味着即使服务器 A 和服务器 B 拥有完全相同的硬件和数据库配置，也无法比较它们的等待统计。每一个配置选项，从硬件固件级别到客户端计算机上\
  \ SQL Server 本机客户端的配置，都会对等待统计产生影响！\n\n基于上述原因，我坚信我们应该从 SQL Server 等待统计的基础和内部原理开始，以便你能熟悉它们是如何生成的、如何访问它们以及如何利用它们进行性能故障排查。这种方法将为你学习本书第二部分（我们将深入研究特定的等待统计）做好准备。\n\
  \n在本章中，我们将简要回顾等待统计在 SQL Server 各个版本中的历史。随后，我们将仔细研究 SQL 操作系统，即 `SQLOS`。`SQLOS` 的架构与等待统计以及一般的性能故障排查密切相关。本章的剩余部分将致力于讨论等待统计最重要的一个方面：线程调度。\n\
  \n在开始介绍 SQL Server 等待统计的基础和内部原理之前，我想先说明几个与讨论等待统计时使用的术语相关的问题。在本书的引言和前文中，我只提到了等待统计这个术语。句子“比较服务器\
  \ A 与服务器 B 的等待统计”实际上是不正确的，因为我们只能比较特定等待类型（与我们正在等待的资源相关的具体等待类型）的等待时间（我们在某个资源上等待的总时间）。从此时起，当我使用术语“等待统计”时，我指的是等待统计这一概念，并在适当时使用正确的术语“等待时间”和“等待类型”。\n\
  \n## 等待统计简史\n\nSQL Server 已经存在相当长的时间了；其第一个版本发布于 1989 年，面向 OS/2 平台。直到 1995 年发布的 SQL\
  \ Server 6.0，微软一直与 Sybase 合作开发 SQL Server。然而在 1995 年，微软和 Sybase 分道扬镳。微软和 Sybase\
  \ 在数据库领域都保持活跃（SAP 实际上于 2010 年收购了 Sybase），到 2019 年，微软发布了 SQL Server 2019，而 SAP 则在\
  \ 2014 年发布了 SAP Sybase ASE 16（至今仍在维护），两者都是关系型企业级数据库系统。\n\n从 SQL Server 6.0 到 SQL\
  \ Server 2019，发生了如此多的变化，以至于你根本无法比较这两个版本。然而，多年来有一件事未曾改变，那就是等待统计。SQL Server 会以某种方式存储其内部进程的信息，尽管我们访问这些信息的方式多年来已经改变，但等待统计仍然是内部日志记录过程的重要组成部分。\n\
  \n在 SQL Server 的早期版本中，我们需要使用未公开文档的命令来访问等待统计。图 1-1 展示了在 SQL Server 6.5 中使用 `DBCC`\
  \ 命令查询等待统计信息的方法。\n\n![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig1_HTML.jpg](img/340881_2_En_1_Fig1_HTML.jpg)\n\
  \n图 1-1\n\nSQL Server 6.5 中的等待统计\n\nSQL Server 2005 引入的重大变更之一是将许多内部函数和命令转换为 `动态管理视图（DMV）`，其中包括等待统计信息。这使得查询和分析函数或命令返回的信息变得容易得多。随着\
  \ Tom Davidson 的微软白皮书《SQL Server 2005 Waits and Queues》的发布，一种新的性能分析方法诞生了。\n\n在 SQL\
  \ Server 的各个版本中，每当引入新功能或配置选项时，不同等待类型的数量都会呈指数级增长。如果你仔细观察图 1-1，你会注意到它返回了 21 种不同的等待类型。图\
  \ 1-2 显示了 SQL Server 2017 中可用的等待类型数量，即返回的行数。\n\n![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig2_HTML.jpg](img/340881_2_En_1_Fig2_HTML.jpg)\n\
  \n图 1-2\n\nSQL Server 2017 中的等待统计\n\n这 921 行都是不同的等待类型，保存了 SQL Server 引擎不同部分的等待信息。随着\
  \ SQL Server 2019 社区技术预览版（`CTP`）2.4 的发布，等待类型的数量进一步增加，超过了 1000 种。随着新功能的引入或现有功能的改变，等待类型的数量在未来\
  \ SQL Server 版本中将继续增长。值得庆幸的是，现在关于等待统计的信息比 SQL Server 6.5 时代要丰富得多！\n\n\n## SQLOS\n\
  \n计算机硬件世界在不断变化。每年，甚至在某些情况下是每个月，我们都设法在处理器中加入更多核心，提高主板的内存容量，或者引入全新的硬件概念，比如基于 PCI 的持久化闪存存储。数据库管理系统（DBMS）总是最先想要利用新硬件趋势的应用程序类型之一。由于硬件的快速变化特性以及需要一有新的硬件选项就加以利用，SQL\
  \ Server 团队在 SQL Server 2005 中决定改变 SQL Server 的平台层。\n\n在 SQL Server 2005 之前，SQL\
  \ Server 的平台层限制很多，许多操作都是由操作系统执行的。这意味着 SQL Server 很难跟上快速变化的服务器硬件世界，因为为了利用更快的硬件或新的硬件特性而更改整个操作系统是一项耗时且复杂的操作。\n\
  \n图 1-3 展示了在 SQL Server 2005 引入 SQLOS 之前，SQL Server 的（简化）架构。\n\n![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig3_HTML.jpg](img/340881_2_En_1_Fig3_HTML.jpg)\n\
  \n图 1-3\n引入 SQLOS 之前的 SQL Server 架构\n\nSQL Server 2005 引入了迄今为止 SQL Server 引擎最大的变化之一：SQLOS。这是一个全新的平台层，充当用户级别的操作系统。这个新的操作系统使得充分利用当前和未来的硬件成为可能，并实现了诸如高级并行性等功能。SQLOS\
  \ 高度可配置，会根据其运行的硬件进行调整，因此对于高端或低端系统都具有完美的可扩展性。\n\n图 1-4 展示了 SQL Server 2005 的（简化）架构，包括\
  \ SQLOS 层。\n\n![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig4_HTML.jpg](img/340881_2_En_1_Fig4_HTML.jpg)\n\
  \n图 1-4\nSQL Server 2005 架构\n\nSQLOS 通过引入调度器（schedulers）、任务（tasks）和工作线程（worker threads），改变了\
  \ SQL Server 访问处理器资源的方式。这使得 SQLOS 能够更好地控制如何由处理器来完成工作。Windows 操作系统采用*抢占式调度*方法。这意味着\
  \ Windows 会给每个需要处理器时间的进程分配一个优先级和固定的时间片，或称为*量程*。这个进程优先级是根据许多变量计算得出的，如资源使用情况、预期运行时间、当前活动等。通过使用抢占式调度，Windows\
  \ 操作系统可以选择在某个进程需要处理器时间但优先级更高的进程到来时中断当前进程。这种调度方式可能对 SQL Server 生成的进程产生负面影响，因为这些进程很容易被更高优先级的进程（包括其他应用程序的进程）中断。因此，SQLOS\
  \ 使用自己的（协作式）非抢占式调度机制，确保 Windows 进程无法中断 SQLOS 进程。\n\nSQL Server 7 和 SQL Server 2000\
  \ 也使用用户模式调度（UMS）进行非抢占式调度。SQLOS 将更多的系统组件紧密地结合在一起，从而实现了更好的性能和可扩展性。\n\n在 SQLOS 无法使用非抢占式调度的情况下也有一些例外，例如当\
  \ SQLOS 需要通过 Windows 操作系统访问资源时。我们将在本书后面的第 11 章“抢占式等待类型”中讨论这些例外情况。\n\n## 调度器、任务和工作线程\n\
  \n由于 SQLOS 使用与 Windows 操作系统不同的方法来执行请求，SQL Server 引入了一种不同的方式来调度处理器时间，使用调度器、任务和工作线程。图\
  \ 1-5 展示了 SQL Server 调度的不同部分以及它们之间的关系。\n\n![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig5_HTML.jpg](img/340881_2_En_1_Fig5_HTML.jpg)\n\
  \n图 1-5\nSQL Server 调度\n\n### 会话\n\n一个*会话*是客户端与其连接的 SQL Server 之间建立的连接（在成功通过身份验证之后）。我们可以通过使用以下查询查询\
  \ `sys.dm_exec_sessions` DMV 来轻松访问会话信息：\n\n```sql\nSELECT * FROM sys.dm_exec_sessions;\n\
  ```\n\n一般来说，用户会话的 `session_id` 大于 50；小于 50 的都保留给内部 SQL Server 进程。然而，在非常繁忙的服务器上，SQL\
  \ Server 有可能需要使用大于 50 的 `session_id`。如果你只对用户发起的会话信息感兴趣，最好使用 `is_user_process` 列来过滤\
  \ `sys.dm_exec_sessions` DMV 的结果，而不是过滤 `session_id` 大于 50。以下查询将只返回用户会话并过滤掉内部系统会话：\n\
  \n```sql\nSELECT * FROM sys.dm_exec_sessions\nWHERE is_user_process = 1;\n```\n\n\
  图 1-6 显示了此查询结果的一小部分。\n\n![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig6_HTML.jpg](img/340881_2_En_1_Fig6_HTML.jpg)\n\
  \n图 1-6\n`sys.dm_exec_sessions` 结果\n\n`sys.dm_exec_sessions` DMV 返回的列要多得多，这些列提供了关于特定会话的信息。一些更有趣、值得额外解释的列包括\
  \ `host_process_id`，这是连接到 SQL Server 的客户端程序的进程 ID（PID）。`cpu_time` 列将告诉你该会话自建立以来已使用的处理器时间（以毫秒为单位）。`memory_usage`\
  \ 列显示会话使用的内存量。这不是以 MB 或 KB 为单位，而是使用的 8 KB 页面数。另一个我想重点说明的列是 `status` 列。这将显示会话是否有活动请求。`status`\
  \ 列最常见的值是“Running”，表示当前正在从此会话处理一个或多个请求；以及“Sleeping”，表示当前没有从此会话处理任何请求。\n\n### 请求\n\
  \n一个*请求*是 SQL Server 执行引擎对由会话提交的查询的表示。同样，我们可以使用一个 DMV 来查询关于请求的信息；在本例中，我们可以针对 `sys.dm_exec_requests`\
  \ DMV 运行一个查询，如下所示：\n\n```sql\nSELECT * FROM sys.dm_exec_requests;\n```\n\n图 1-7\
  \ 显示了此查询结果的一部分。\n\n![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig7_HTML.jpg](img/340881_2_En_1_Fig7_HTML.jpg)\n\
  \n图 1-7\n`sys.dm_exec_requests` 结果\n\n`sys.dm_exec_requests` DMV 是在对任何与性能相关的问题进行故障排除时使用的极其强大的工具。原因是它包含大量关于正在执行的实际查询的信息，并且可以帮助你相对快速地检测到性能瓶颈。因为\
  \ `sys.dm_exec_requests` DMV 也显示与等待统计相关的信息，我们将在第 2 章“查询 SQL Server 等待统计信息”中对其进行详细研究。\n\
  \n### 任务\n\n`任务`代表 SQLOS 需要执行的实际工作，但任务本身并不执行任何工作。当 SQL Server 接收到请求时，会创建一个或多个任务来完成该请求。为一个请求生成的任务数量取决于查询请求是使用并行方式执行还是串行方式执行。\n\
  \n我们可以使用 `sys.dm_os_tasks` 动态管理视图 (DMV) 来查询任务信息，就像我在以下示例查询中所做的那样：\n\n```sql\nSELECT\
  \ * sys.dm_os_tasks;\n```\n\n图 1-8 显示了该查询的部分结果。\n\n![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig8_HTML.jpg](img/340881_2_En_1_Fig8_HTML.jpg)\n\
  \n图 1-8\n\nsys.dm_os_tasks 查询结果\n\n当你查询 `sys.dm_os_tasks` DMV 时，你会发现即使在没有用户活动的服务器上，它也会返回大量结果。这是因为\
  \ SQL Server 也会为自己的进程使用任务；你可以通过查看 `session_id` 列来识别这些任务。\n\n在这个 DMV 中有一些有趣的列，值得探索以了解不同\
  \ DMV 之间的关系。`task_address` 列将显示任务的内存地址。`session_id` 将返回请求该任务的会话 ID，而 `worker_address`\
  \ 将保存与该任务关联的工作线程的内存地址。\n\n### 工作线程\n\n`工作线程`是请求的实际工作得以执行的地方。每个创建的任务都会被分配一个工作线程，然后由该工作线程执行任务请求的操作。\n\
  \n实际上，工作线程本身并不执行工作；它会向 Windows 操作系统请求一个线程来替它执行工作。为了简单起见，并且考虑到实际的 Windows 线程运行在 SQLOS\
  \ 之外，我已将此步骤从图 1-5 中省略了。如果你感兴趣，可以通过查询 `sys.dm_os_threads` 来访问有关 Windows 操作系统线程的信息。\n\
  \n当任务请求工作线程时，SQL Server 会查找一个空闲的工作线程并将其分配给该任务。如果找不到空闲的工作线程，并且工作线程的最大数量已经达到，则该请求将被排队，直到某个工作线程完成其当前工作并变得可用。\n\
  \nSQL Server 用于处理请求的工作线程数量是有限的。这个数字将在启动时由 SQL Server 自动计算和配置。我们也可以使用以下公式自己计算最大工作线程数：\n\
  \n*   32 位系统，逻辑处理器数量小于或等于 4：\n    256 个工作线程\n*   32 位系统，逻辑处理器数量大于 4：\n    256 +\
  \ ((逻辑处理器数量 – 4) * 8)\n*   64 位系统，逻辑处理器数量小于或等于 4：\n    512 个工作线程\n*   64 位系统，逻辑处理器数量大于\
  \ 4：\n    512 + ((逻辑处理器数量 – 4) * 16)\n\n示例：如果我们有一个 64 位系统，配备 16 个处理器（或核心），我们可以使用公式\
  \ 512 + ((16 – 4) * 16) 计算最大工作线程数，得出最大工作线程数为 704。\n\n工作线程的数量可以从默认值 `0`（这意味着 SQL\
  \ Server 在启动时使用上述公式设置最大工作线程数）进行更改，方法是更改 SQL Server 属性中的 `最大工作线程数` 选项，如图 1-9 所示。\n\
  \n![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig9_HTML.jpg](img/340881_2_En_1_Fig9_HTML.jpg)\n\
  \n图 1-9\n\n服务器属性中的处理器页面\n\n一般来说，不需要更改 `最大工作线程数` 选项，我的建议是保持默认设置不变，因为它只应在非常特定的情况下进行更改（我将在第\
  \ 5 章“与 CPU 相关的等待类型”中讨论其中一种可能的情况，届时我们将讨论 THREADPOOL 等待）。\n\n需要记住的一点是，工作线程需要内存才能工作。对于\
  \ 32 位系统，每个工作线程需要 512 KB；64 位系统则需要 2048 KB。因此，更改工作线程数量可能会影响 SQL Server 的内存需求。这并不意味着你需要为工作线程配备大量内存——如果工作线程空闲超过\
  \ 15 分钟或 SQL Server 面临严重的内存压力，SQL Server 会自动销毁工作线程。\n\nSQL Server 提供了一个 DMV 来查询工作线程的信息：`sys.dm_os_workers`。图\
  \ 1-10 显示了此查询的部分结果：\n\n![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig10_HTML.jpg](img/340881_2_En_1_Fig10_HTML.jpg)\n\
  \n图 1-10\n\n查询 sys.dm_os_workers 的结果\n\n```sql\nSELECT * FROM sys.dm_os_workers;\n\
  ```\n\n`sys.dm_os_workers` DMV 是一个非常庞大且复杂的 DMV，其中许多列被 Microsoft 标记为“仅供内部使用”。在这个\
  \ DMV 中，`task_address` 和 `scheduler_address` 列可用于链接我们讨论过的不同 DMV。\n\n工作线程在被暴露给处理器时会经历不同的阶段，我们可以通过查看\
  \ `sys.dm_os_workers` DMV 中的 `state` 列来观察：\n\n*   `INIT`：工作线程正由 SQLOS 初始化。\n*  \
  \ `RUNNING`：工作线程当前正在处理器上执行工作。\n*   `RUNNABLE`：工作线程已准备好在处理器上运行。\n*   `SUSPENDED`：工作线程正在等待某个资源。\n\
  \n工作线程在执行工作时经历的状态是本书的主要主题之一。每当工作线程不处于 `RUNNING` 状态时，它就必须等待，SQLOS 会将此信息记录到等待统计信息中，这使我们能够深入了解工作线程一直在等待什么以及等待了多长时间。\n\
  \n\n### 调度器\n\n`调度器`组件的主要任务是——正如其名——将工作（以任务的形式）调度到物理处理器上。当一个任务请求处理器时间时，正是调度器为该任务分配工作线程，以便请求得到处理。它还负责确保工作线程相互协作，并在它们分配到的时间片（或称为量程）到期时让出处理器。我们称此为**协同调度**。工作线程在其处理器时间到期时必须让出的原因在于，调度器一次只允许一个工作线程在处理器上运行。如果工作线程无需让出，一个工作线程可能无限期地占用处理器，从而阻塞对该处理器的所有使用。\n\
  \n处理器与调度器之间是一一对应的关系。如果你的系统有两个处理器，每个处理器有四个核心，那么 SQLOS 将可以使用八个调度器来处理用户请求，每个调度器映射到一个逻辑处理器。\n\
  \n我们可以通过查询 `sys.dm_os_schedulers` DMV（动态管理视图）来获取关于调度器的信息：\n\n```sql\nSELECT * FROM\
  \ sys.dm_os_schedulers;\n```\n\n查询结果如图 1-11 所示。\n\n![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig11_HTML.jpg](img/340881_2_En_1_Fig11_HTML.jpg)\n\
  \n图 1-11\n\n`sys.dm_os_schedulers` 查询结果\n\n我运行此查询的 SQL Server 实例有一个双核处理器，这意味着应该有两个调度器可以处理我的用户请求。然而，如果我们查看图\
  \ 1-11，会注意到查询返回的调度器不止两个。SQL Server 使用其自己的调度器来执行内部任务，这些调度器也会被 DMV 返回，并在其 `status`\
  \ 列中标记为“HIDDEN ONLINE”。可供用户请求使用的调度器在 DMV 中被标记为“VISIBLE ONLINE”。还有一种特殊类型的调度器，其 `status`\
  \ 为“VISIBLE ONLINE (DAC)”。这是一个专用于**专用管理员连接**的调度器。当 SQL Server 无响应时（例如，处理用户请求的调度器上没有空闲的工作线程），此调度器可以让你连接到\
  \ SQL Server。\n\n通过查看 `current_workers_count` 列，我们可以看到一个调度器关联了多少个工作线程。这个数字也包括了未执行任何工作的工作线程。`active_workers_count`\
  \ 向我们显示了在特定调度器上处于活动状态的工作线程。这并不意味着它们实际在处理器上运行，因为状态为“RUNNING”、“RUNNABLE”和“SUSPENDED”的工作线程也会计入此数字。`work_queue_count`\
  \ 也是一个有趣的列，因为它能让你了解有多少任务正在等待空闲的工作线程。如果你在此列中看到较大的数字，可能意味着你正经历 CPU 压力。\n\n### 综合概述\n\
  \n到目前为止，我们讨论的 SQL Server 调度的所有部分都是相互关联的，每个请求都经过这些相同的组件。以下文本是一个查询请求如何被处理的示例。\n\n\
  用户通过应用程序连接到 SQL Server。登录过程成功完成后，SQL Server 将为该用户创建一个会话。当用户向 SQL Server 发送查询时，将创建一个任务和一个请求来表示需要完成的工作单元。调度器将为该任务分配工作线程以便完成。\n\
  \n为了在 SQL Server 中查看所有这些信息，我们可以连接一些使用过的 DMV。代码清单 1-1 中的查询将向你展示一个示例，说明如何组合不同的 DMV\
  \ 来获取特定会话（本例中为 ID 是 55 的会话）的调度信息。\n\n```sql\nSELECT\nr.session_id AS '会话 ID',\n\
  r.command AS '请求类型',\nqt.[text] AS '查询文本',\nt.task_address AS '任务地址',\nt.task_state\
  \ AS '任务状态',\nw.worker_address AS '工作线程地址',\nw.[state] AS '工作线程状态',\ns.scheduler_address\
  \ AS '调度器地址',\ns.[status] AS '调度器状态'\nFROM sys.dm_exec_requests r\nCROSS APPLY sys.dm_exec_sql_text(r.sql_handle)\
  \ qt\nINNER JOIN sys.dm_os_tasks t\nON r.task_address = t.task_address\nINNER JOIN\
  \ sys.dm_os_workers w\nON t.worker_address = w.worker_address\nINNER JOIN sys.dm_os_schedulers\
  \ s\nON w.scheduler_address = s.scheduler_address\nWHERE r.session_id = 55\n```\n\
  \n代码清单 1-1\n\n连接不同的 DMV 以查询调度信息\n\n图 1-12 显示了在我的测试 SQL Server 上该查询返回的信息。为了保持结果可读性，我只选择了\
  \ DMV 中的一些列来展示它们之间的关系。\n\n![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig12_HTML.jpg](img/340881_2_En_1_Fig12_HTML.jpg)\n\
  \n图 1-12\n\n代码清单 1-1 中查询的结果\n\n在结果中，我们可以看到会话 ID 53 发起了一个 `SELECT` 查询请求。我使用了 `sys.dm_exec_sql_text`\
  \ 动态管理对象进行交叉应用，以显示该请求的查询文本。该请求映射到了一个任务，并且该任务已开始运行。然后，该任务映射到一个工作线程，该工作线程当时也处于运行状态。这意味着此查询开始在处理器上被处理。`调度器地址`\
  \ 列显示了我们的工作线程在哪个特定的调度器上运行。\n\n\n## 等待统计\n\n到目前为止，我们已经深入了解了为 SQL Server 执行调度的不同组件以及它们是如何相互连接的，但我们并未过多关注本书的主题：等待统计。\n\
  \n在本章前面关于工作线程的部分，我描述了工作线程在调度器上执行工作时可能处于的状态。当一个工作线程执行其工作时，它会在调度器进程中经历三个不同的阶段（或队列）。根据工作线程所处的阶段（或队列），它将分别获得“运行中”、“可运行”或“已暂停”状态。图\
  \ 1-13 展示了一个具有这三个不同阶段的调度器的抽象视图。\n\n![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig13_HTML.jpg](img/340881_2_En_1_Fig13_HTML.jpg)\n\
  \n图 1-13：调度器及其阶段和队列\n\n当一个工作线程获得访问调度器的权限时，它通常会在等待列表中启动，并获得“已暂停”状态。`等待列表`是一个无序列表，包含所有处于“已暂停”状态并等待资源变得可用的工作线程。这些资源可以是系统中几乎任何东西，从数据页到锁请求。当一个工作线程位于`等待列表`中时，SQLOS\
  \ 会记录它继续工作所需的资源类型（等待类型）以及该特定资源变得可用之前所花费的等待时间，即`资源等待时间`。\n\n每当一个工作线程获得其所需资源的访问权限时，它将移动到`可运行队列`，这是一个先进先出的列表，包含所有已获得资源访问权限并准备好在处理器上运行的工作线程。工作线程在`可运行队列`中花费的时间被记录为`信号等待时间`。\n\
  \n`可运行队列`中的第一个工作线程将移动到“运行中”阶段，在那里它将获得处理器时间来执行其工作。它在处理器上花费的时间被记录为 `CPU 时间`。与此同时，`可运行队列`中的其他工作线程将在列表中向上移动一个位置，而已获得其请求资源的工作线程将从`等待列表`移动到`可运行队列`中。\n\
  \n当一个工作线程处于“运行中”阶段时，可能发生以下三种情况：\n\n*   工作线程需要额外的资源；在这种情况下，它将从“运行中”阶段移动到`等待列表`。\n\
  *   工作线程用完了其时间量（固定值为 4 毫秒）并且必须让出处理器；该工作线程被移动到`可运行队列`的底部。\n*   工作线程完成其工作并将离开调度器。\n\
  \n工作线程不断地在这三个不同阶段中移动，并且一个工作线程在其工作完成之前多次经历这些阶段是非常常见的。\n\n图 1-14 将向你展示图 1-13 中的调度器视图，结合了不同类型的等待时间以及工作线程的流动。\n\
  \n![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig14_HTML.jpg](img/340881_2_En_1_Fig14_HTML.jpg)\n\
  \n图 1-14：包含等待时间和工作线程流动的完整调度器视图\n\n了解请求在三个不同阶段中各自花费的所有不同时长，就可以计算出总的请求执行时间，以及请求为等待处理器时间或资源时间所花费的总时间。图\
  \ 1-15 展示了总执行时间及其不同部分的计算方式。\n\n![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig15_HTML.jpg](img/340881_2_En_1_Fig15_HTML.jpg)\n\
  \n图 1-15：请求执行时间计算\n\n由于 SQL Server 中工作线程调度涉及大量术语，我想给你举一个例子来说明工作线程是如何在调度器中移动的。\n\n\
  图 1-16 将向你展示一个类似于我们之前看过的调度器的抽象图像，但这次我添加了正在由该调度器处理的请求。\n\n![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig16_HTML.jpg](img/340881_2_En_1_Fig16_HTML.jpg)\n\
  \n图 1-16：带有运行请求的调度器\n\n在这个例子中，我们看到 `SID`（会话 ID）为 76 的请求当前正在处理器上执行；该请求的状态将是“运行中”。还有另外两个请求，`SID\
  \ 83` 和 `SID 51`，位于`等待列表`中，等待它们请求的资源。它们正在等待的等待类型是 `LCK_M_S` 和 `CXPACKET`。这里我不详细介绍这些等待类型，因为我们将在本书的第二部分讨论它们。当这两个会话位于`等待列表`中时，SQL\
  \ Server 会将它们在那里花费的时间记录为等待时间，并将等待类型记录为它们正在等待的资源的代表。如果我们查询关于这两个线程的信息，它们都将具有“已暂停”状态。`SID\
  \ 59`、`SID 98` 和 `SID 74` 已准备好它们的资源，正在`可运行队列`中等待 `SID 76` 完成其在处理器上的工作。当它们在`可运行队列`中等待时，SQL\
  \ Server 将它们在那里花费的时间记录为信号等待时间，并将该时间添加到总等待时间中。这三个工作线程的状态将是“可运行”。\n\n在图 1-17 中，我们向前移动了几毫秒的时间；请注意调度器和工作线程是如何在不同阶段和队列中移动的。\n\
  \n![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig17_HTML.jpg](img/340881_2_En_1_Fig17_HTML.jpg)\n\
  \n图 1-17：几毫秒后的调度器\n\n`SID 76` 完成了它在处理器上的时间；它不需要任何额外的资源来完成其请求，因此离开了调度器。`SID 59` 是`可运行队列`中的第一个工作线程，现在处理器空闲了，它将从`可运行队列`移动到处理器，其状态将从“可运行”变为“运行中”。`SID\
  \ 51` 已完成对 `CXPACKET` 等待类型的等待，并从`等待列表`移动到`可运行队列`的底部，其状态从“已暂停”变为“可运行”。\n\n## 总结\n\
  \n在本章中，我们回顾了 SQL Server 各个版本中等待统计的历史。尽管使用等待统计分析 SQL Server 性能的方法相对较新，但等待统计作为 SQL\
  \ Server 引擎的一部分已经存在很长时间了。\n\n随着 SQL Server 2005 中 SQLOS 的引入，SQL Server 处理请求的方式发生了很大变化，引入了调度器、工作线程和任务。所有这些不同部分的信息都存储在动态管理视图（`DMVs`）或动态管理函数（`DMFs`）中，这些视图和函数易于查询，并能返回大量关于\
  \ SQL Server 内部的信息。\n\n使用这些 `DMVs`，我们可以查看请求在 SQL Server 调度器处理时的进度，并了解它们是否正在等待任何特定资源。请求所等待的资源以及它们为等待这些资源所花费的时间被记录为等待统计，这是本书的主要主题。\n\
  \n\n"
- "# 2. 查询 SQL Server 等待统计信息\n\n随着 SQL Server 2005 中动态管理视图（DMV）的引入，查看和分析等待统计信息变得容易了许多，不再那么繁琐。在\
  \ SQL Server 2005 之前的版本中，我们只能通过 `DBCC SQLPERF('WAITSSTATS')` 命令来查看等待统计信息。目前，有多种\
  \ DMV 可以返回与等待统计相关的信息，在本章中，我们将详细查看其中四个最有用的 DMV：`sys.dm_os_wait_stats`、`sys.dm_os_waiting_tasks`、`sys.dm_exec_requests`\
  \ 和 `sys.dm_exec_session_wait_stats`。\n\n查看等待统计信息并不仅限于 DMV。我们还可以使用 Windows 性能监视器（Perfmon）来查看等待统计信息。SQL\
  \ Server 2008 引入了另一种查看等待统计信息的选项：扩展事件（Extended Events）。虽然在 SQL Server 2008 中使用扩展事件相当复杂，意味着您必须用\
  \ T-SQL 编写一个完整的扩展事件会话，但微软在 SQL Server 2012 中极大地改进了扩展事件，使其更加用户友好且易于使用。\n\nSQL Server\
  \ 2016 SP1 引入了两种访问等待统计信息的新方法：通过一个名为 `sys.dm_exec_session_wait_stats` 的新 DMV，以及在执行计划中按查询添加等待统计信息。\n\
  \n在 SQL Server 2017 中，微软通过将等待统计信息包含在查询存储中，进一步推进了等待统计信息的记录。查询存储是 SQL Server 2016\
  \ 中引入的一项功能，它就像您查询工作负载的“飞行记录器”，记录查询语句、性能和资源利用情况。\n\n在本章中，我们将查看前面段落中提到的所有捕获等待统计信息的来源，从各种\
  \ DMV 开始。由于查询存储功能对于在 SQL Server 2017 及更高版本中对查询性能（包括等待统计信息）进行故障排除和分析具有重大影响，我们将在第\
  \ 3 章“查询存储”中对其进行深入探讨。\n\n## Sys.dm_os_wait_stats\n\n`sys.dm_os_wait_stats` DMV 可能是有关等待统计信息最重要的\
  \ DMV 之一。该 DMV 是 SQL Server 2005 之前您必须使用的 `DBCC SQLPERF('WAITSTATS')` 命令的替代品。`DBCC\
  \ SQLPERF('WAITSTATS')` 命令返回的所有信息都包含在 `sys.dm_os_wait_stats` DMV 中，甚至更多一些。\n\n`sys.dm_os_wait_stats`\
  \ DMV 显示自 SQL Server 启动（或重新启动）以来，每个等待类型的总等待时间。它也是累积性的，将等待时间添加到不同的等待类型中，导致总数不断增加。查询\
  \ `sys.dm_os_wait_stats` DMV 将使您深入了解您的 SQL Server 自启动或重新启动以来最常等待的是什么。如果您想查找每种等待类型的总等待时间，这可能会很有帮助，但很多时候您会对特定时间段内的等待时间感兴趣。在这种情况下，可以通过使用\
  \ `DBCC SQLPERF('sys.dm_os_wait_stats', CLEAR)` SQL 命令来重置 `sys.dm_os_wait_stats`\
  \ DMV，而无需重新启动 SQL Server。这将把所有等待统计信息重置回 0，意味着您将丢失重置之前的所有信息。在第 4 章“建立稳固的基线”中，我们将探讨一种不会完全重置\
  \ `sys.dm_os_wait_stats` DMV 的方法。\n\n与 SQL Server 中的每个 DMV 一样，我们可以像查询表一样对 `sys.dm_os_wait_stats`\
  \ DMV 运行查询，在本例中为 `SELECT * FROM sys.dm_os_wait_stats`。此查询的结果如图 2-1 所示。\n\n![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig1_HTML.jpg](img/340881_2_En_2_Fig1_HTML.jpg)\n\
  \n图 2-1: Sys.dm_os_wait_stats\n\n以下是 `sys.dm_os_wait_stats` DMV 中可用的列，以及每个列所能提供信息的描述：\n\
  \n*   `wait_type`：返回等待类型。`sys.dm_os_wait_stats` 将始终为该特定 SQL Server 版本中可能的每种等待类型返回一行。\n\
  *   `waiting_tasks_count`：显示工作线程必须等待该特定等待类型的总次数。\n*   `wait_time_ms`：返回自 SQL Server\
  \ 实例启动或手动重置 DMV 以来，该特定等待类型的总等待时间（以毫秒为单位，1/1000 秒）。这是工作线程在“SUSPENDED”状态下在等待者列表（Waiter\
  \ List）中花费的时间。它还包括工作线程在“RUNNABLE”状态下在可运行队列（Runnable Queue）中等待调度器授予其处理器时间所花费的时间。\n\
  *   `max_wait_time_ms`：显示工作线程等待该特定等待类型的最大等待时间（毫秒）。\n*   `signal_wait_time_ms`：告诉我们工作线程在可运行队列中等待处理器时间所花费的时间量（毫秒）。在联机事务处理（OLTP）系统中，信号等待时间是不可避免且正常的，因为有大量查询正在处理，所有这些查询都请求处理器时间。信号等待时间也是检测\
  \ CPU 压力的重要指标。一般来说，由于这取决于您系统的硬件，如果看到信号等待时间指标超过总等待时间的 25%，可能表明存在 CPU 压力，因为工作线程正在等待处理器变得可用，而不是在使用资源。\n\
  \n您可能已经注意到，`sys.dm_os_wait_stats` DMV 没有返回资源等待时间的列。如果我们想将资源等待时间显示为附加列，就需要自己计算该值。\n\
  \n清单 2-1 展示了一个您可以用来分析 `sys.dm_os_wait_stats` DMV 的查询。除了常规列之外，它还将为返回的每种等待类型添加两列：资源等待时间和平均等待时间。\n\
  \n```sql\nSELECT\n    wait_type AS 'Wait Type',\n    waiting_tasks_count AS 'Waiting\
  \ Tasks Count',\n    (wait_time_ms - signal_wait_time_ms) AS 'Resource Wait Time',\n\
  \    signal_wait_time_ms AS 'Signal Wait Time',\n    wait_time_ms AS 'Total Wait\
  \ Time',\n    COALESCE(wait_time_ms / NULLIF(waiting_tasks_count,0), 0) AS 'Average\
  \ Wait Time'\nFROM sys.dm_os_wait_stats;\n```\n\n清单 2-1: 包含附加信息的 sys.dm_os_wait_stats\n\
  \n此查询将返回如图 2-2 所示的结果。\n\n![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig2_HTML.jpg](img/340881_2_En_2_Fig2_HTML.jpg)\n\
  \n图 2-2: 扩展了更多等待信息的 sys.dm_os_wait_stats\n\n通过拥有特定等待类型的出现次数和总等待时间，可以通过将 `wait_time_ms`\
  \ 值除以 `waiting_tasks_count` 值来计算该特定等待类型的平均等待时间（由图 2-2 中的 `Average Wait Time` 列表示）。\n\
  \n`sys.dm_os_wait_stats` 是一个功能强大的 DMV，通过它可以检索有关不同等待类型的大量信息。它也是第 4 章“建立稳固的基线”中概述的等待统计基线方法的基础。\n\
  \n## Sys.dm_os_waiting_tasks\n\n虽然 `sys.dm_os_wait_stats` DMV 提供自服务器重启以来的累积等待统计信息，但\
  \ `sys.dm_os_waiting_tasks` DMV 可以提供 SQL Server 当前正在等待什么的信息。查询此 DMV 将为您提供所有当前任务的概览，这些任务的工作线程正在等待者列表或可运行队列中等待资源或处理器时间。\n\
  \n\n### 理解 sys.dm_os_waiting_tasks\n\n由于 `sys.dm_os_waiting_tasks` 这一 DMV 能够洞察当前正在等待的任务，因此它通常是使用等待统计信息来审查\
  \ SQL Server 实例性能时查询的第一个 DMV。它还为某些等待类型提供了一些额外的信息，这在排查问题时非常有用。\n\n图 2-3 展示了 `SELECT\
  \ * FROM sys.dm_os_waiting_tasks;` 查询的结果。\n\n![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig3_HTML.jpg](img/340881_2_En_2_Fig3_HTML.jpg)\n\
  \n图 2-3\n\nsys.dm_os_waiting_tasks\n\n以下是 `sys.dm_os_waiting_tasks` DMV 返回的列列表及其所返回信息的描述：\n\
  \n*   `waiting_task_address` 显示当前正在等待的任务的地址。\n*   `session_id` 提供与特定任务关联的会话 ID。\n\
  *   `exec_context_id` 将返回执行上下文的 ID。只有当任务使用并行性执行时，此值才会从默认值 0 更改。这意味着任务正在使用多个线程而不是单个（串行）线程执行。\n\
  *   `wait_duration_ms` 显示任务已经等待的时间（以毫秒为单位）。与 `sys.dm_os_wait_stats` DMV 中一样，此时间包括资源等待时间和信号等待时间。\n\
  *   `wait_type` 返回任务当前正在等待的等待类型。\n*   `resource_address` 返回关于当前正在等待的资源的内存地址信息。并非所有等待类型都会记录此内存地址，因此它经常返回为\
  \ `NULL`。\n*   `blocking_task_address` 将返回当前正在阻塞等待任务的任务地址。当任务未被另一个任务阻塞时，此列将返回 `NULL`。\n\
  *   `blocking_session_id` 返回当前正在阻塞任务的会话的会话 ID。与 `blocking_task_address` 一样，仅当此任务当前被另一个任务阻塞时才包含此信息。当没有阻塞或无法检索或识别有关阻塞任务的会话信息时，它将返回\
  \ `NULL`。我们将在第 8 章“与锁相关的等待类型”中解释阻塞和锁定，届时我们将讨论锁等待类型。\n*   `blocking_exec_context_id`\
  \ 是另一个专门用于阻塞信息的列。在这种情况下，它将返回执行上下文的 ID。只有当任务使用并行性执行并且其中一个线程负责阻塞时，此列才会返回非 `NULL` 的结果。然后，`blocking_exec_context_id`\
  \ 可用于识别哪个线程是阻塞的根源。\n*   DMV 的最后一列 `resource_description` 将提供有关任务正在等待的资源的附加信息。没有多少等待类型会填充此列——最常见的是与并行性、锁或门闩相关的等待类型。它可能是一个非常有用的列，尤其是在分析锁或门闩相关的等待类型时；在这些情况下，我们可以精确定位我们正在等待其可用性的数据库对象（数据页、行、表等）。本书后面的一些示例（最著名的是第\
  \ 8 章“与锁相关的等待类型”和第 9 章“与门闩相关的等待类型”）将使用此列来收集有关我们正在等待的资源的额外信息。\n\n### 查询 sys.dm_os_waiting_tasks\n\
  \n由于 `sys.dm_os_waiting_tasks` DMV 返回了丰富的信息，因此根据你想要分析或排查的问题，有各种查询它的方式。\n\n我在互联网上的各种论坛上经常看到以下查询：\n\
  \n```sql\nSELECT * FROM sys.dm_os_waiting_tasks\nWHERE session_id > 50;\n```\n\n\
  此查询将过滤掉所有 SQL Server 内部会话 ID，并且只返回源自用户会话的等待任务。在我测试的 SQL Server 上，查询结果如图 2-4 所示。\n\
  \n![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig4_HTML.jpg](img/340881_2_En_2_Fig4_HTML.jpg)\n\
  \n图 2-4\n\nsys.dm_os_waiting_tasks where session_id is greater than 50\n\n虽然过滤掉内部\
  \ SQL Server 进程的方法适用于许多等待类型并提高了可读性，但在运行此查询时，某些特定的等待类型将不会被返回。\n\n一个很好的例子是 `THREADPOOL`\
  \ 等待类型，我们将在第 5 章“与 CPU 相关的等待类型”中讨论。这种等待类型可能对你的 SQL Server 性能产生巨大的负面影响，但如果只查询用户会话，则不会返回。这可能会影响你的分析，因为你遗漏了重要的事实。\n\
  \n另一个建议在不过滤会话 ID 的情况下查询 DMV 的原因是，关于会话 ID 以及会话 ID 是用户会话还是内部会话的关系存在一个很大的误解。虽然通常认为大于\
  \ 50 的会话 ID 是用户会话，但不能保证大于 50 的会话 ID 实际上*就是*用户会话。SQL Server 可能需要超过 50 个内部会话，在这种情况下，你可能会看到会话\
  \ ID 高于 50 的内部会话，并可能误认为是用户会话。\n\n我相信查询 `sys.dm_os_waiting_tasks` DMV 的最佳方式是选择所有内容，并且只在寻找特定的等待类型或会话时才应用过滤器。与过滤会话\
  \ ID 大于 50 相比，这将返回更多的行，如图 2-5 所示，但它会向你展示完整的画面，并最大程度地减少你可能错过重要等待类型的机会。一个好主意可能是按 `session_id`\
  \ 列排序，这样可以在不忽视内部会话的情况下，使结果更易于阅读。\n\n![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig5_HTML.jpg](img/340881_2_En_2_Fig5_HTML.jpg)\n\
  \n图 2-5\n\nsys.dm_os_waiting_tasks\n\n## Sys.dm_exec_requests\n\n`sys.dm_exec_requests`\
  \ DMV 返回有关当前正在由 SQL Server 处理的所有请求的信息。\n\n### 理解 sys.dm_exec_requests\n\n与之前的动态管理视图（DMV）类似，我们可以通过一个简单的\
  \ `SELECT * FROM sys.dm_exec_requests;` 查询 `sys.dm_exec_requests` DMV，以返回当前所有正在执行的操作。图\
  \ 2-6 展示了我的测试 SQL Server 上返回的部分结果。\n\n![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig6_HTML.jpg](img/340881_2_En_2_Fig6_HTML.jpg)\n\
  \n图 2-6\n\n`sys.dm_exec_requests` DMV 返回的列比我们之前讨论的 `sys.dm_os_wait_stats` 或 `sys.dm_os_waiting_tasks`\
  \ DMV 要多得多。为了保持可读性，我将只描述我们经常用于等待统计信息分析的列。列表如下：\n\n*   `session_id` 返回此请求关联的会话 ID。\n\
  *   `start_time` 显示请求创建的日期和时间。这与你查询 DMV 的时间和日期可能不同，尤其是当有长时间运行的查询正在执行时。\n*   `command`\
  \ 返回有关请求正在执行何种操作的信息。最常见的命令与查询相关，如 `SELECT`、`INSERT`、`UPDATE` 和 `DELETE`，但根据请求执行的操作，还有更多命令。\n\
  *   `sql_handle` 为我们提供请求中正在执行的 SQL 文本的哈希值。并非所有请求都有 SQL 句柄，通常只有当请求由用户会话发起且涉及 SQL\
  \ 查询时，你才会看到 SQL 句柄。SQL 句柄哈希可以用作动态管理函数（DMF）`sys.dm_exec_sql_text` 的输入，以检回该请求正在执行的查询。\n\
  *   `plan_handle` 返回执行计划的哈希值。执行计划将向你展示 SQL Server 执行查询时执行的操作，是查询执行信息的绝佳来源。我们可以像使用\
  \ `sql_handle` 一样使用 `plan_handle`，但不同的是，它返回的不是查询本身，而是查询的执行计划。我们可以将该哈希值用作 DMF `sys.dm_exec_query_plan`\
  \ 的输入，以返回该请求正在执行的查询的执行计划。\n*   `wait_type` 如果请求处于“SUSPENDED”（已挂起）或“RUNNABLE”（可运行）状态，则返回当前的等待类型。如果请求当前正在处理中，则该值将为\
  \ `NULL`。\n*   `last_wait_type` 列返回请求在其执行过程中如果必须等待时，上一次遇到的等待类型。\n*   `total_elapsed_time`\
  \ 列返回从请求创建开始处理它所花费的总时间（以毫秒为单位）。\n\n此 DMV 中还有更多列可用，它们各有不同的用途。完整的描述可在 Microsoft MSDN\
  \ 页面 [`https://msdn.microsoft.com/en-us/library/ms177648.aspx`](https://msdn.microsoft.com/en-us/library/ms177648.aspx)\
  \ 上找到，我鼓励你阅读该文章。`sys.dm_exec_requests` DMV 是你 DBA 工具包中的一个强大工具，也是除了分析等待统计信息之外，你还会经常用于各种目的的\
  \ DMV 之一。\n\n### 查询 sys.dm_exec_requests\n\n`sys.dm_exec_requests` DMV 是那些可以通过返回查询和计划句柄来让我们访问查询语句及其相应执行计划的\
  \ DMV 之一。如果你对此信息感兴趣（大多数时候你可能确实如此），你需要将 `sql_handle` 和 `plan_handle` 传递给它们对应的 DMF，以便将哈希值转换为我们人类可以阅读和理解的内容。\n\
  \n清单 2-2 展示了一个针对 `sys.dm_exec_requests` DMV 的查询，同时也检回了查询语句和执行计划。为了保持结果集较小，并且因为我确实只对本示例中的用户查询感兴趣，我排除了执行查询的会话\
  \ ID 并忽略了小于 50 的会话 ID。\n\n```sql\nSELECT\n    r.session_id AS 'Session ID',\n  \
  \  r.start_time AS 'Request Start',\n    r.[status] AS 'Current State',\n    r.[command]\
  \ AS 'Request Command',\n    t.[text] AS 'Query',\n    p.query_plan AS 'Execution\
  \ Plan'\nFROM sys.dm_exec_requests r\nOUTER APPLY sys.dm_exec_sql_text(r.sql_handle)\
  \ AS t\nOUTER APPLY sys.dm_exec_query_plan(r.plan_handle) p\nWHERE r.session_id\
  \ > 50 AND r.session_id  @@SPID;\n```\n\n清单 2-2\n\n在我的测试系统上，得到了如图 2-7 所示的结果。\n\n\
  ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig7_HTML.jpg](img/340881_2_En_2_Fig7_HTML.jpg)\n\
  \n图 2-7\n\n使用清单 2-2 中的查询，我们可以立即看到会话 ID 55 正在执行一个 `SELECT` 查询，因为 `Query` 列显示了正在执行的完整语句。`Execution\
  \ Plan` 列以 XML 格式返回执行计划。SQL Server Management Studio 的一个很棒的功能是，我们可以点击返回的 XML 链接来查看图形化的执行计划，如图\
  \ 2-8 所示。\n\n![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig8_HTML.jpg](img/340881_2_En_2_Fig8_HTML.jpg)\n\
  \n图 2-8\n\n使用执行计划，我们可以深入了解查询是如何被 SQL Server 引擎执行的。本书不会深入探讨执行计划的细节，但在优化查询性能时你会经常用到它们，因此知道如何从\
  \ `sys.dm_exec_requests` DMV 访问它们是很有益的。如果你想了解更多关于执行计划的知识，Grant Fritchey 的 *Execution\
  \ Plan Basics* 是一个很好的起点：[`www.simple-talk.com/sql/performance/execution-plan-basics/`](http://www.simple-talk.com/sql/performance/execution-plan-basics/)。\n\
  \n## `sys.dm_exec_session_wait_stats`\n\n在与等待统计相关的 DMV 中，较新的一个是 `sys.dm_exec_session_wait_stats`\
  \ DMV。它在 SQL Server 2016 SP1 中引入，按会话级别返回等待统计信息。如果你还记得阅读本书第 1 章“等待统计内部原理”，会话是用户或进程与\
  \ SQL Server 建立的活动连接。一个会话可以有多个请求，而每个请求又可以有多个任务来执行查询所需的操作。\n\n图 2-9 展示了该 DMV 的列以及来自我测试系统的一些等待统计信息。\n\
  \n![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig9_HTML.jpg](img/340881_2_En_2_Fig9_HTML.jpg)\n\
  \n图 2-9 `sys.dm_exec_session_wait_stats`\n\n上图看起来是否熟悉？很可能熟悉，因为它实际上与 `sys.dm_os_wait_stats`\
  \ DMV 几乎完全相同，只是多了一个 `session_id` 列。\n\n需要重点指出的是，通过此 DMV 记录的等待统计信息是特定会话在活动期间执行的所有操作的累计值。例如，如果你在一个会话内执行十个不同的查询，DMV\
  \ 返回的所有等待时间都是这十个查询的总等待时间。这意味着理解会话生命周期内发生的事情非常重要。该会话是否已经在忙于执行大批量的查询？还是只执行了单个查询语句？在依赖此\
  \ DMV 分析会话等待统计之前，了解这些问题的答案至关重要。\n\n此外，会话 ID 在会话关闭后会被重用，这意味着如果不小心，你可能会看到一个重用该会话 ID\
  \ 的新会话的等待统计信息。当会话 ID 被重用（或在连接池中重置）时，该 DMV 中针对该特定会话的所有等待统计信息也会被重置。\n\n考虑到以上信息，我们可以得出结论：当报告性能缓慢时，此\
  \ DMV 并不直接适合作为“首选查看对象”。然而，它仍然有其用武之地，特别是当你能够针对涉及多个查询的特定操作重现特定性能问题时。在这种情况下，你可以聚焦于一个特定的会话\
  \ ID 并重现问题，捕获查询执行过程中发生的所有事件的等待统计信息。\n\n## 结合 DMV 检测当前等待\n\n既然我们已经查看了一些用于等待统计分析的最重要\
  \ DMV，现在让我们看一个如何使用这些 DMV 来找出是什么拖慢了你的 SQL Server 的示例。收集这些信息不会立即解决你的问题，但它会给你提供一个从何处开始寻找解决方案的线索。\n\
  \n考虑以下场景：你是一家大公司的数据库管理员（DBA），该公司使用单一数据库存储所有销售信息。数据库运行在 SQL Server 2014 实例上，每天有几百名用户查询该数据库。\n\
  \n通常一切运行良好——用户可以快速访问所需信息，每个需要使用数据库的人都感到满意。然而，今天对你这个 DBA 来说不是个好日子。电话从上午 10 点开始就没停过，一些用户聚集在你办公室门口，眼神愤怒——查询和插入销售信息的速度慢得令人难以置信。\n\
  \n由于本书是关于等待统计的，让我们看看如何分析该场景中性能问题的等待统计信息。\n\n我们知道 `sys.dm_os_wait_stats` DMV 显示累计的等待统计信息，因此对于此场景，它不会有太大帮助。一个更好的起点是\
  \ `sys.dm_os_waiting_tasks` DMV，因为它会显示当前所有正在等待的任务。\n\n我们对 `sys.dm_os_waiting_tasks`\
  \ DMV 运行以下查询：\n\n```\nSELECT * FROM sys.dm_os_waiting_tasks\nORDER BY session_id\
  \ ASC;\n```\n\n向下滚动查看结果时，我们看到许多用户会话都有等待任务，如图 2-10 所示。\n\n![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig10_HTML.jpg](img/340881_2_En_2_Fig10_HTML.jpg)\n\
  \n图 2-10 对 `sys.dm_os_waiting_tasks` DMV 查询的结果\n\n我们注意到会话 52、56、57 的等待时间相当高，并且它们都在以等待类型\
  \ `LCK_M_S` 等待。在不深入探讨此特定等待类型细节的情况下（将在第 8 章“锁相关的等待类型”中详细讨论），只需知道此等待类型与锁定相关即可。显然，这些会话正在等待获取锁，这意味着它们很可能被另一个持有同一对象锁的进程阻塞。我们可以通过查看\
  \ `blocking_` 列，从 `sys.dm_os_waiting_tasks` DMV 中提取锁定和阻塞信息。出于可读性原因，我修改了前面的查询，使其仅返回来自\
  \ `sys.dm_os_waiting_tasks` DMV 的阻塞信息。图 2-11 显示了这些列。\n\n![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig11_HTML.png](img/340881_2_En_2_Fig11_HTML.png)\n\
  \n图 2-11 来自 `sys.dm_os_waiting_tasks` DMV 的阻塞信息\n\n从这里我们可以看到，会话 56 和 57 被会话 52 阻塞。然而，会话\
  \ 52 被会话 ID 54 阻塞。我们没有在 `sys.dm_os_waiting_tasks` DMV 中看到此会话 ID 被返回，这意味着该会话当前正在执行，并且没有在任何资源上等待。\n\
  \n让我们检查另一个 DMV `sys.dm_exec_requests`，以获取有关会话 54 的一些信息：\n\n```\nSELECT * FROM sys.dm_exec_requests\n\
  WHERE session_id = 54;\n```\n\n图 2-12 显示了此查询的结果。\n\n![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig12_HTML.jpg](img/340881_2_En_2_Fig12_HTML.jpg)\n\
  \n图 2-12 对 `sys.dm_exec_requests` 查询的结果\n\n还记得我曾写道 `sys.dm_exec_requests` DMV 返回当前正在处理的请求信息吗？显然，会话\
  \ ID 54 没有未完成的请求，因为没有返回任何信息。\n\n\n"
- "# 使用 DMV 和 Perfmon 分析等待统计信息\n\n## 查询会话信息并解决阻塞程序\n\n如果我们想获取有关此会话的更多信息，可以使用第 1 章“等待统计信息内部原理”中讨论过的\
  \ `sys.dm_exec_sessions` DMV，执行以下查询：\n\n```sql\nSELECT\n    session_id,\n    [status],\n\
  \    [host_name],\n    [program_name],\n    login_name,\n    is_user_process,\n\
  \    open_transaction_count\nFROM sys.dm_exec_sessions\nWHERE session_id = 54;\n\
  ```\n\n此查询返回的结果如图 2-13 所示。\n\n![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig13_HTML.jpg](img/340881_2_En_2_Fig13_HTML.jpg)\n\
  \n*图 2-13. sys.dm_exec_sessions 的结果*\n\n我们可以假定该会话 ID 目前没有任何正在运行的请求，因为它的状态是“sleeping”，这就是为什么对\
  \ `sys.dm_exec_requests` 的查询没有返回任何信息。如果我们查看 `program_name` 列，可以看到此会话是由 EVDL-SQL2017-01\\\
  Administrator 用户通过 Microsoft SQL Server Management Studio 程序发起的。\n\n我包含 `is_user_process`\
  \ 列是为了确认它是一个用户会话，而 `open_transaction_count` 列显示此用户会话有一个未关闭的事务。\n\n我们现在掌握了足够的信息来采取纠正措施。我们知道是谁阻塞了其他任务，我们可以决定打电话询问他正在执行的操作，或者选择结束他的会话。使用\
  \ `KILL [session_id]` 命令结束用户会话应该是最后的手段，因为我们可能正在中断重要的操作。使用 `KILL` 命令结束会话将导致正在运行的事务回滚，撤销其执行的所有更改，这可能需要很长时间才能完成。在这种情况下，我接受回滚的风险，并将自己结束该会话：\n\
  \n```sql\nKILL 54;\n```\n\n在我们杀死会话 ID 54 之后，用户立即报告他们的查询再次开始运行。如果我们查询 `sys.dm_os_waiting_tasks`\
  \ DMV 以获取有关这些会话 ID 的信息，则不会返回任何内容，这意味着它们不再被阻塞。\n\n希望这个示例让您了解了如何使用 SQL Server 中提供的各种\
  \ DMV 来收集当前正在等待的任务的信息。在这个例子中，示例包含一个阻塞其他查询的事务，我们决定杀死导致阻塞锁的用户会话。在许多情况下，解决方案并不这么简单，但收集等待统计信息以深入调查问题根源的方法几乎适用于每个与性能相关的事件。\n\
  \n正如我在本节开头指出的，仅查看等待统计信息在大多数情况下并不能解决性能问题，但它是开始调查的良好起点。为了全面了解系统的性能，我们通常会将等待统计信息与其他指标结合起来，例如来自\
  \ Windows 性能监视器、其他 DMV 或特定于供应商的信息（如存储指标）。\n\n图 2-14 展示了一个流程图，说明如何使用等待统计信息来分析性能问题。\n\
  \n![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig14_HTML.jpg](img/340881_2_En_2_Fig14_HTML.jpg)\n\
  \n*图 2-14. 等待统计信息流程图*\n\n我们将在第 4 章“建立可靠的基线”中扩展这个流程图，在那里我们将为等待统计信息分析方法引入基线。\n\n##\
  \ 使用 Perfmon 查看等待统计信息\n\n分析等待统计信息时，访问我们所需额外指标的最重要工具之一是 Windows 性能监视器，即 Perfmon。Perfmon\
  \ 在每个 Windows 操作系统上都可用，并且包含系统几乎所有部分的计数器，包括与 SQL Server 相关的性能计数器。您可以通过在 Windows 运行对话框或命令行中执行\
  \ `perfmon` 命令来启动 Perfmon。\n\n除了提供有关系统性能的信息外，Perfmon 还可用于查看等待统计信息。在 Perfmon 应用程序中添加计数器时，可以在\
  \ `SQLServer:Wait Statistics` 类别下查看这些计数器，如图 2-15 所示。\n\n![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig15_HTML.jpg](img/340881_2_En_2_Fig15_HTML.jpg)\n\
  \n*图 2-15. Perfmon 中的等待统计信息计数器*\n\n在图 2-15 中你会注意到一件事，即 Perfmon 中的等待统计信息是按类别分组的。我们在这里找不到关于特定等待类型的信息，因此如果我们想使用\
  \ Perfmon 分析等待统计信息，应该大致了解特定等待类型在 Perfmon 中属于哪个类别。它能够显示每个等待统计信息类别的平均等待时间、累计等待时间、当前总等待次数以及新开始的等待次数。如果我们需要一个更高层次的视图——例如，我们想知道有多少任务正在等待与锁相关的等待类型——我们可以使用\
  \ Perfmon 来获取该信息。如果我们想要获得关于特定等待类型的更多详细信息，则应该使用我们之前讨论过的 `sys.dm_os_wait_stats` 或\
  \ `sys.dm_os_waiting_tasks` DMV。\n\nPerfmon 的一个很好的特性是它可以直接将测量值转换为图表，为我们提供一种更直观的方式来查看信息，而无需自己创建图表。图\
  \ 2-16 是一个图表示例，其中显示了 Lock waits 类别的“平均等待时间”和“每秒开始的等待次数”。\n\n![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig16_HTML.jpg](img/340881_2_En_2_Fig16_HTML.jpg)\n\
  \n*图 2-16. 显示等待统计信息的 Perfmon 图表*\n\n在本书中，我们将大量使用 Perfmon 来分析与特定等待类型相关的指标，如 CPU 时间、磁盘延迟和内存使用情况。我们不会过多使用\
  \ Perfmon 中的等待统计信息计数器，因为我相信 SQL Server DMV 更适合此任务，因为它们提供了完整分析所需的详细程度。\n\n\n## 使用扩展事件捕获等待统计信息\n\
  \nSQL Server 中的大多数等待统计信息是累积记录的，并且由于许多内部进程也会生成等待统计信息，因此很难检测单个查询对它们的影响程度。这正是扩展事件的用武之地；通过扩展事件，可以捕获查询遇到的确切等待时间以及它必须等待的等待类型。这些信息可以帮助我们分析那些对系统影响较大的查询，并可能对其进行优化，以减小其影响。或者，我们可以捕获执行时遇到特定等待类型的查询。\n\
  \n扩展事件在 SQL Server 2008 中引入，或多或少地取代了 SQL Server Profiler。Microsoft 已宣布弃用 SQL Server\
  \ Profiler，并建议我们转向扩展事件。扩展事件比 SQL Server Profiler 强大得多，而且随着 SQL Server 的每个版本发布，我们可以用扩展事件捕获的事件数量不断增加，而\
  \ SQL Server Profiler 中的事件数量则保持不变。此外，性能也是使用扩展事件的一个充分理由。捕获扩展事件比使用 SQL Server Profiler\
  \ 更轻量。\n\n扩展事件一直被认为难以使用，虽然这在 SQL Server 2008 中首次引入时尤其如此，但到了 SQL Server 2012，使用 GUI\
  \ 创建扩展事件会话变得容易得多，情况大为改观。\n\n使用扩展事件时，可以使用许多不同的与等待相关的事件。我们可以通过查询 `sys.dm_xe_map_values`\
  \ DMV 来查看这些事件，该视图保存了所有不同的扩展事件事件类型：\n\n```sql\nSELECT *\nFROM sys.dm_xe_map_values\n\
  WHERE name = 'wait_types';\n```\n\n图 2-17 显示了此查询结果的一小部分。\n\n![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig17_HTML.png](img/340881_2_En_2_Fig17_HTML.png)\n\
  **图 2-17** `sys.dm_xe_map_values` 的结果\n\n在 SQL Server 2019 CTP2.4 中，总共有大约 1260 个不同的等待统计信息相关事件可用。这些事件与不同的等待类型并非一一对应，事实上，在某些情况下，等待类型的名称与事件的名称并不匹配，尽管它们含义相同。`ASYNC_NETWORK_IO`\
  \ 等待类型就是一个例子，扩展事件将其命名为 `NETWORK_IO`。Jonathan Kehayias 在 [`SQLskills.com`](http://sqlskills.com)\
  \ 上写了一篇博客文章，将一些等待类型映射到扩展事件；你可以在这里查看：[`www.sqlskills.com/blogs/jonathan/mapping-wait-types-in-dm_os_wait_stats-to-extended-events/`](http://www.sqlskills.com/blogs/jonathan/mapping-wait-types-in-dm_os_wait_stats-to-extended-events/)。\n\
  \n虽然本书不会深入探讨扩展事件的细节，但我想向你展示如何使用扩展事件 GUI 和 T-SQL 来捕获等待统计信息相关信息。\n\n### 捕获特定查询的等待统计信息\n\
  \n让我们看看如何配置一个扩展事件会话来捕获特定查询的等待统计信息。我们将对执行查询的会话 ID 设置筛选器，然后执行我们要分析的查询。\n\n我们要做的第一件事是打开\
  \ SQL Server Management Studio 并连接到 SQL Server 实例。请注意，扩展事件的 GUI 是在 SQL Server 2012\
  \ 中添加的，因此如果你打算按照此处的步骤操作，需要 SQL Server 2012 或更高版本的实例。\n\n连接后，我们打开“管理”文件夹，然后选择“扩展事件”选项。右键单击“会话”文件夹并选择“新建会话”选项，如图\
  \ 2-18 所示。\n\n![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig18_HTML.jpg](img/340881_2_En_2_Fig18_HTML.jpg)\n\
  **图 2-18** 添加新的扩展事件会话\n\n“新建会话”对话框将出现，我们可以在此输入此扩展事件会话的名称并设置一些附加选项。我们现在将忽略这些选项，只填写扩展事件会话的名称，如图\
  \ 2-19 所示。\n\n![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig19_HTML.jpg](img/340881_2_En_2_Fig19_HTML.jpg)\n\
  **图 2-19** 配置等待统计信息扩展事件会话\n\n下一步是配置此扩展事件会话需要监视哪些事件，这可以通过在“新建会话”对话框中选择“事件”页面来完成。\n\
  \n由于我们对等待统计信息感兴趣，我在“事件库”中搜索了 `wait_info` 事件并将其添加到“选定的事件”框中，如图 2-20 所示。\n\n![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig20_HTML.jpg](img/340881_2_En_2_Fig20_HTML.jpg)\n\
  **图 2-20** 选择要监视的事件\n\n如果现在保存此扩展事件会话，我们将捕获每个必须等待资源的进程的信息。由于我们只对特定查询相关的等待统计信息感兴趣，我们将配置一个筛选器，仅返回特定会话的等待统计信息。为此，我们可以单击“新建会话”对话框中的“配置”按钮，这将打开一个新部分，我们可以在其中选择“全局字段”，这些字段将在触发\
  \ `wait_info` 事件时记录额外信息。在此情况下，我勾选了 `sql_text` 全局字段，如图 2-21 所示，以便在捕获事件时可以查看实际的查询。\n\
  \n![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig21_HTML.jpg](img/340881_2_En_2_Fig21_HTML.jpg)\n\
  **图 2-21** 设置 `sql_text` 全局字段\n\n接下来是“筛选器（谓词）”选项卡。在这里我们将设置一个筛选器，仅捕获来自特定会话 ID 的事件。我们可以通过单击“字段”框内并选择\
  \ `sqlserver.session_id` 字段，然后将“值”设置为我们想要监视的会话 ID 来完成此操作。在此情况下，我将筛选器配置为仅捕获会话 ID\
  \ 为 52 的事件，如图 2-22 所示。\n\n![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig22_HTML.jpg](img/340881_2_En_2_Fig22_HTML.jpg)\n\
  **图 2-22** 设置事件筛选器\n\n这就是我们现在需要配置的全部内容，因此我们可以单击“确定”关闭此对话框并保存扩展事件会话。\n\n默认情况下，扩展事件会话在创建后不会自动启动。为此，我们必须再次打开“会话”文件夹，导航到\
  \ SQL Server Management Studio 中的“管理”➤“扩展事件”文件夹。右键单击我们刚创建的扩展事件会话并选择“启动会话”选项，如图 2-23\
  \ 所示。\n\n\n![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig23_HTML.jpg](img/340881_2_En_2_Fig23_HTML.jpg)\n\
  \n图 2-23\n\n### 启动扩展事件会话\n\n启动扩展事件会话后，它将开始收集信息。我们可以通过选择“实时查看数据”选项来查看实时收集到的信息。这将在\
  \ SQL Server Management Studio 中打开一个新选项卡，我们可以在其中监视扩展事件会话。查看实时扩展事件数据会带来一点开销，但这远低于使用\
  \ SQL Profiler 的开销。如果您担心查看实时数据的开销，可以选择将扩展事件会话写入事件文件，方法是在扩展事件会话的“数据存储”页面中添加一个文件位置。\n\
  \n在此示例中，我对 AdventureWorks 数据库执行了一个简单查询，以返回 `Person.Person` 表中的所有内容，如下所示：\n\n```sql\n\
  SELECT *\nFROM Person.Person;\n```\n\n在设置扩展事件会话的筛选器时，我会特别注意使其与我在 SQL Server Management\
  \ Studio 中执行查询的选项卡的会话 ID 相匹配。可以通过查看选项卡上括号内的数字找到会话 ID。扩展事件实时数据选项卡返回的信息如图 2-24 所示。\n\
  \n![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig24_HTML.jpg](img/340881_2_En_2_Fig24_HTML.jpg)\n\
  \n图 2-24\n\n来自扩展事件会话的实时等待统计信息\n\n如图 2-24 所示，我们的请求遇到了 `NETWORK_IO` 等待类型。这是扩展事件中的等待名称与等待统计信息\
  \ DMV 中的名称不匹配的示例之一。`NETWORK_IO` 等待名称与 SQLOS 使用的 `ASYNC_NETWORK_IO` 等待类型是相同的等待。我们可以在\
  \ `sql_text` 字段中查看我们执行的查询。\n\n扩展事件会话中还可以包含许多其他可能值得捕获的全局字段，例如执行计划句柄或任务执行时间。所有这些全局字段都将为您提供额外的信息，这些信息会在返回扩展事件会话信息时显示，为您提供极其丰富的详细信息。\n\
  \n如果出于某些原因，您不想使用 GUI 来创建和运行扩展事件会话，或者您运行的是 SQL Server 2008，您可以使用 T-SQL 来创建和配置一个。要创建与我们使用\
  \ GUI 创建的相同的扩展事件会话，您可以执行清单 2-3 中的查询。\n\n```sql\nCREATE EVENT SESSION [WaitStats\
  \ Query] ON SERVER\nADD EVENT sqlos.wait_info\n(\nACTION(sqlserver.sql_text)\nWHERE\
  \ ([sqlserver].[session_id]=(52))\n)\nADD TARGET package0.event_file\n(\nSET filename\
  \ = N'E:\\Data\\WaitStats_XE.xel', metadatafile = N'E:\\Data\\WaitStats_XE.xem'\n\
  );\n```\n清单 2-3\n创建等待统计信息扩展事件会话\n\n我们通过在上面的脚本中设置 `metadatafile` 参数包含了元数据文件。如果您运行的是\
  \ SQL Server 2012 或更高版本，则不再需要此参数。\n\n记录扩展事件会话的最简单方法是将其保存到文件；在本例中，我的文件名是 `E:\\Data\\\
  WaitStats_XE.xel`（SQL Server 会向文件名添加一个唯一的数字标识符，实际文件名是 `WaitStats_XE_0_130702270937280000.xel`）。我还包含了对会话\
  \ ID 52 的筛选，以捕获该会话生成的等待统计信息。\n\n接下来我们要做的是启动扩展事件会话，这可以通过执行 `ALTER EVENT SESSION`\
  \ 命令来完成：\n\n```sql\nALTER EVENT SESSION \"WaitStats Query\" ON SERVER STATE = start;\n\
  ```\n\n然后，我们在筛选的会话 ID 下，执行与扩展事件 GUI 示例中相同的查询。让扩展事件会话运行一小段时间后，我们可以使用 `ALTER EVENT\
  \ SESSION` 命令将其停止：\n\n```sql\nALTER EVENT SESSION \"WaitStats Query\" ON SERVER\
  \ STATE = stop;\n```\n\n现在我们已经停止了扩展事件会话，我们需要将文件中的信息（作为 XML）导入到表中，以便实际查看会话捕获的内容；我们使用\
  \ `sys.fn_xe_file_target_read_file` 函数来完成此操作。然后，我们可以解析 XML 信息，以更易读的格式返回结果。清单 2-4\
  \ 中的查询可用于读取扩展事件文件，将其导入临时表，并将结果作为行返回。\n\n```sql\n-- Check if temp table is present\n\
  -- Drop if exist\nIF OBJECT_ID('tempdb..#XE_Data') IS NOT NULL\nDROP TABLE #XE_Data\n\
  -- Create temp table to hold raw XE data\nCREATE TABLE #XE_Data\n(\nXE_Data XML\n\
  );\nGO\n-- Write contents of the XE file\n-- into our table\nINSERT INTO #XE_Data\n\
  (\nXE_Data\n)\nSELECT\nCAST (event_data AS XML)\nFROM sys.fn_xe_file_target_read_file\n\
  (\n'E:\\Data\\WaitStats_XE_0_130702270937280000.xel',\n'E:\\Data\\WaitStats_XE_0_130702270940210000.xem',\n\
  null,\nnull\n);\nGO\n-- Query information from our temp table\nSELECT\nXE_Data.value\
  \ ('(/event/@timestamp)[1]', 'DATETIME') AS 'Date/Time',\nXE_Data.value ('(/event/data[@name=\"\
  opcode\"]/text)[1]', 'VARCHAR(100)') AS 'Operation',\nXE_Data.value ('(/event/data[@name=\"\
  wait_type\"]/text)[1]', 'VARCHAR(100)') AS 'Wait Type',\nXE_Data.value ('(/event/data[@name=\"\
  duration\"]/value)[1]', 'BIGINT') AS 'Wait Time',\nXE_Data.value ('(/event/data[@name=\"\
  signal_duration\"]/value)[1]', 'BIGINT') AS 'Signal Wait Time',\nXE_Data.value ('(/event/action[@name=\"\
  sql_text\"]/value)[1]', 'VARCHAR(100)') AS 'Query'\nFROM #XE_Data\nORDER BY 'Date/Time'\
  \ ASC\n;\n```\n清单 2-4\n将扩展事件文件作为行返回\n\n清单 2-4 中查询的结果如图 2-25 所示。\n\n![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig25_HTML.jpg](img/340881_2_En_2_Fig25_HTML.jpg)\n\
  \n图 2-25\n\n清单 2-4 中查询的结果\n\n就其返回的行数据而言，大多数列不言自明。有两个列值得稍作解释，即 `Operation`（操作）和 `Wait\
  \ Time`（等待时间）列。`Operation` 列将显示等待事件的开始或结束。`Wait Time` 列将以毫秒为单位返回等待时间，但它只会在操作结束时被记录。\n\
  \n\n### 基于执行计划按查询分析等待统计信息\n\n到目前为止，我们主要查看了由各种后台进程或我们执行的查询所产生的聚合等待时间。由于我是唯一一个向我的测试机执行查询的人，因此很容易将等待时间与我的特定查询关联起来。不幸的是，在繁忙的系统上，大量会话不断执行许多查询，各种等待统计信息\
  \ DMV 对于分析特定查询的等待类型和等待时间几乎毫无用处。\n\n值得庆幸的是，SQL Server 2016 SP1 的发布改变了这一情况，并引入了在查询执行计划内部捕获等待统计信息的功能！这意味着您可以轻松地查看您的查询在运行时遇到了哪些等待类型和等待时间。尽管这似乎显而易见，但请注意，每查询等待统计信息仅在查看**实际执行计划**时可用，**估算执行计划**则不行。\n\
  \n实际执行计划是在查询执行期间实际使用的执行计划。SQL Server Management Studio 中有一个选项可以查看估算执行计划。使用该选项时，SQL\
  \ Server 引擎会编译出最有可能在查询执行期间使用的执行计划；然而，它实际上并不执行查询本身。由于没有实际执行查询，因此在编译估算执行计划时也没有等待统计信息可以记录。\n\
  \n公开每查询等待统计信息的最简单方法是启用 `Include Actual Execution Plan` 选项（如图 2-26 所示），可以通过单击菜单项“查询\
  \ – 包含实际执行计划”或使用组合键 `CTRL_M` 来实现，然后执行您的查询。\n\n![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig26_HTML.jpg](img/340881_2_En_2_Fig26_HTML.jpg)\n\
  \n图 2-26\n`Include Actual Execution Plan` 选项\n\n当您启用 `Include Actual Execution Plan`\
  \ 选项执行查询时，查询结果将返回一个名为 `Execution plan` 的额外选项卡。单击该选项卡将显示执行查询时所使用的执行计划的可视化表示。图 2-27\
  \ 显示了一个实际执行计划的示例。\n\n![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig27_HTML.jpg](img/340881_2_En_2_Fig27_HTML.jpg)\n\
  \n图 2-27\n`Execution plan`\n\n打开实际执行计划后，我们可以通过右键单击第一个运算符（在图 2-28 的例子中是 `SELECT`\
  \ 运算符）并选择 `Properties` 来访问每查询等待统计信息。这将打开 SQL Server Management Studio 内部的执行计划属性窗口，并揭示有关查询执行以及所选运算符各种属性的丰富信息，例如使用的并行度或处理的行数。\n\
  \n![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig28_HTML.jpg](img/340881_2_En_2_Fig28_HTML.jpg)\n\
  \n图 2-28\n`Execution plan properties`\n\n由于我们对等待统计信息感兴趣，执行计划属性中最有趣的部分记录在属性窗口的最底部。展开\
  \ `WaitStats` 属性后，您就能够看到此特定查询在执行时遇到的所有等待类型和等待时间。图 2-29 显示了此特定示例查询的每查询等待统计信息。\n\n\
  ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig29_HTML.jpg](img/340881_2_En_2_Fig29_HTML.jpg)\n\
  \n图 2-29\n`Execution plan properties` 中的每查询等待统计信息\n\n在本例中，我们的查询在执行时遇到了三种不同的等待类型：`PAGEIOLATCH_SH`、`MEMORY_ALLOCATION_EXT`\
  \ 和 `ASYNC_NETWORK_IO`。对于每种等待类型，您都可以看到等待花费了多少时间，以及我们在该等待类型上等待了多少次。当查看单个查询在其执行期间遇到的等待统计信息时，此信息非常有用，并且也许能为您提供一些关于如何调整查询性能的见解。例如，如果您发现一个查询经常遇到与存储相关的等待统计信息，那么研究如何最小化对该特定查询的存储访问可能是值得的，以便其执行得更快。\n\
  \n我想再次指出的一点是，每查询等待统计信息仅记录在**实际执行计划**中！我再次提及的原因是，实际执行计划只能通过在查询执行前启用它来获得。没有其他方法可以访问实际执行计划，甚至通过查询存储也不行，我们将在下一章中看到。事实上，存储在\
  \ SQL Server 计划缓存中的执行计划是估算执行计划，而不是实际计划。这意味着如果您期望通过计划缓存检索每查询等待统计信息，您将会失望。\n\n值得庆幸的是，尽管查询存储功能最初不记录实际执行计划，但它确实（随着\
  \ SQL Server 2017 的发布）将等待统计信息和其他查询运行时信息与估算执行计划一起记录了下来。将这些信息混合在一起意味着，通过查询存储，我们可以回溯历史，查看查询遇到了哪些等待统计信息！\n\
  \n## 本章小结\n\n在本章中，我们回顾了访问等待统计信息的各种方法。我们深入探讨了一些关于等待统计信息最重要的 DMV：`sys.dm_os_wait_stats`、`sys.dm_os_waiting_tasks`、`sys.dm_exec_requests`\
  \ 和 `sys.dm_exec_session_wait_stats`。我描述了它们的功能和返回的数据，并为您提供了一些可用于这些 DMV 的示例查询。我们还通过一个示例场景，其中我们组合了一些\
  \ DMV 来分析示例中是什么减慢了 SQL Server 的速度。示例中展示的步骤是在性能问题发生时分析系统性能问题的好方法。简要地，我们查看了 Windows\
  \ 性能监视器（或 `Perfmon`），以及如何从其中访问等待统计信息。之后，我们仔细研究了扩展事件（Extended Events），以及如何使用扩展事件\
  \ GUI 或 `T-SQL` 来捕获特定查询或会话的等待相关信息。我们以查看执行计划记录的等待统计信息结束了本章。\n\n"
- "# 3. 查询存储\n\n随着 SQL Server 2016 的发布，微软引入了一种全新的分析和排除查询性能问题的方法：查询存储（Query Store）。查询存储常被宣传为\
  \ SQL Server 的“飞行记录仪”，因为它提供了对查询何时执行、执行性能如何以及在查询执行期间使用了哪个执行计划的深入了解。虽然查询存储最初并未公开查询执行期间遇到的等待统计信息，但\
  \ SQL Server 2017 的发布包含了这一备受期待的补充。\n\n由于查询存储在查询性能分析和调优方面是一个颠覆性的功能，我认为它值得一些额外的关注，以便您能从这一特性中获得最大收益。\n\
  \n## 什么是查询存储？\n\n查询存储功能首次发布于 SQL Server 2016，其目标是以更简单、更易访问的方式揭示查询性能。在查询存储出现之前，查询性能分析是一个充满挑战且耗时的过程，需要对\
  \ SQL Server 如何处理查询以及如何通过各种 `DMVs` 分析信息有非常透彻的了解。虽然查询执行方面的经验和知识仍然非常有帮助，但查询存储能以更易访问和可视化的方式帮助你获取所需的性能信息。\n\
  \n`查询存储`直接集成在 SQL Server 引擎内部。这意味着它可以在查询执行发生的地方捕获并分析查询执行情况。与通过其他方法（如执行计划缓存）进行查询分析相比，这是一个主要区别，后者的查询运行时信息仅在后期阶段才可用。`查询存储`的另一个优势是它会将查询运行时信息持久化到磁盘。这意味着你可以为查询建立运行时指标的历史记录，并且可以更轻松地比较历史运行时统计信息与当前统计信息。这与\
  \ `DMVs` 不同，后者仅记录 SQL Server 运行期间的信息，并在 SQL Server 重启时清空所有记录的信息，这意味着所有计数器又从 0 开始。继续比较\
  \ `查询存储` 与 `DMVs`，虽然所有 `DMVs` 都在 SQL Server 实例级别记录信息，但 `查询存储` 允许你基于每个数据库捕获查询运行时指标。这使得在一个包含多个数据库的实例中，针对特定数据库分析性能变得相当容易和快捷。\n\
  \n使用 `查询存储` 还有更多优势，例如轻松强制使用执行计划，但由于这是一本关于等待统计信息的书，我不会涵盖 `查询存储` 所有的功能。如果你对更深入了解 `查询存储`\
  \ 感兴趣，我写了一系列文章，描述了 `查询存储` 几乎所有的功能，文章在这里： [`www.red-gate.com/simple-talk/sql/database-administration/the-sql-server-2016-query-store-overview-and-architecture/`](http://www.red-gate.com/simple-talk/sql/database-administration/the-sql-server-2016-query-store-overview-and-architecture/)。\n\
  \n## 查询存储架构\n\n为了让你很好地了解 `查询存储` 如何工作，我创建了图 3-1 中的图像，展示了查询运行时信息如何在 `查询存储` 内部被记录和存储。如果你想将\
  \ `查询存储` 作为分析查询性能和等待统计信息的工具，这些知识很重要。\n\n![../images/340881_2_En_3_Chapter/340881_2_En_3_Fig1_HTML.jpg](img/340881_2_En_3_Fig1_HTML.jpg)\n\
  \n图 3-1\n\n查询存储架构\n\n一旦查询开始执行，并且你已经在查询所针对的数据库上启用了 `查询存储`，`查询存储` 将查询运行时信息分为三个部分：查询执行计划、查询文本和查询执行的运行时统计信息。执行计划和查询文本都在执行计划编译期间立即记录在\
  \ `查询存储` 中。运行时统计信息（包括等待统计信息）仅在查询执行后才可用，这意味着它们将在查询执行后添加到 `查询存储`。\n\n所有 `查询存储` 指标首先存储在\
  \ SQL Server 的保留内存区域中。这意味着它们可以通过查询或内置报告直接访问，但尚未固化到磁盘（新执行计划除外，它们会直接固化）。基于 `查询存储`\
  \ 中一个名为 `数据刷新间隔` 的可配置设置，你可以配置 `查询存储` 应以多快的速度将信息固化到磁盘。\n\n我们可以通过两种方法访问 `查询存储` 记录的所有信息：`查询存储\
  \ DMVs` 和内置报告。为了在 `查询存储` 中揭示等待统计信息，我们将使用这两种选项，但我认为在查看等待统计信息数据时，`DMV` 方法更有用。\n\n\
  ## 等待统计信息在查询存储中如何处理\n\n在我们开始查看如何访问 `查询存储` 中记录的等待统计信息之前，我们需要了解 `查询存储` 如何处理等待统计信息，因为它与我在本书第\
  \ 1 章“等待统计信息内幕”中描述的过程不同。在那一章中，我描述了 SQL Server 引擎如何跟踪查询在特定资源或等待类型上花费的等待时间。这些信息以非常细的粒度记录；例如，`PAGEIOLATCH_SH`\
  \ 等待类型表示查询正在等待数据页从磁盘读取到缓冲区高速缓存，而 `PAGEIOLATCH_EX` 表示查询正在等待数据页移动到缓冲区高速缓存以进行修改。`查询存储`\
  \ 开发团队认为，为了避免性能和资源利用开销，需要更高级别的等待类型概览，而不是在如此详细的级别记录等待时间。最终，他们选择将各种等待类型分组到类别中，并在类别级别记录等待时间，而不是单个等待类型。这意味着在\
  \ `查询存储` 记录的等待统计信息中搜索特定的等待类型是不可能的，并且属于同一类别的等待类型无法相互区分。举个例子，`CMEMTHREAD` 和 `RESOURCE_SEMAPHORE`\
  \ 等待类型（你将在第 6 章“I/O 相关等待类型”中了解更多）都被记录在 `查询存储` 的 `Memory` 类别中，尽管这两种等待类型指示不同的事情。\n\
  \n表 3-1 显示了 `查询存储` 中使用的等待类型与等待类别之间的映射关系。该表绝不是映射的完整概述，但应能让你很好地了解在哪里可以找到某个特定的等待类型。\n\
  \n表 3-1\n\n等待类型与类别之间的映射\n\n## 等待类别与等待类型对照表\n\n| 等待类别 | 关联的等待类型 |\n| --- | --- |\n\
  | **未知** | 未知 |\n| **CPU** | SOS_SCHEDULER_YIELD |\n| **工作线程** | THREADPOOL |\n\
  | **锁** | LCK_M_% |\n| **闩锁** | LATCH_% |\n| **缓冲区闩锁** | PAGELATCH_% |\n| **缓冲区\
  \ IO** | PAGEIOLATCH_% |\n| **编译*** | RESOURCE_SEMAPHORE_QUERY_COMPILE |\n| **SQL\
  \ CLR** | CLR%，SQLCLR% |\n| **镜像** | DBMIRROR% |\n| **事务** | XACT%，DTC%，TRAN_MARKLATCH_%，MSQL_XACT_%，TRANSACTION_MUTEX\
  \ |\n| **空闲** | SLEEP_%，LAZYWRITER_SLEEP，SQLTRACE_BUFFER_FLUSH，SQLTRACE_INCREMENTAL_FLUSH_SLEEP，SQLTRACE_WAIT_ENTRIES，FT_IFTS_SCHEDULER_IDLE_WAIT，XE_DISPATCHER_WAIT，REQUEST_FOR_DEADLOCK_SEARCH，LOGMGR_QUEUE，ONDEMAND_TASK_QUEUE，CHECKPOINT_QUEUE，XE_TIMER_EVENT\
  \ |\n| **抢占式** | PREEMPTIVE_% |\n| **Service Broker** | BROKER_%（但不包括 BROKER_RECEIVE_WAITFOR）\
  \ |\n| **事务日志 IO** | LOGMGR，LOGBUFFER，LOGMGR_RESERVE_APPEND，LOGMGR_FLUSH，LOGMGR_PMM_LOG，CHKPT，WRITELOGF\
  \ |\n| **网络 IO** | ASYNC_NETWORK_IO，NET_WAITFOR_PACKET，PROXY_NETWORK_IO，EXTERNAL_SCRIPT_NETWORK_IOF\
  \ |\n| **并行性** | CXPACKET，EXCHANGE |\n| **内存** | RESOURCE_SEMAPHORE，CMEMTHREAD，CMEMPARTITIONED，EE_PMOLOCK，MEMORY_ALLOCATION_EXT，RESERVED_MEMORY_ALLOCATION_EXT，MEMORY_GRANT_UPDATE\
  \ |\n| **用户等待** | WAITFOR，WAIT_FOR_RESULTS，BROKER_RECEIVE_WAITFOR |\n| **跟踪** |\
  \ TRACEWRITE，SQLTRACE_LOCK，SQLTRACE_FILE_BUFFER，SQLTRACE_FILE_WRITE_IO_COMPLETION，SQLTRACE_FILE_READ_IO_COMPLETION，SQLTRACE_PENDING_BUFFER_WRITERS，SQLTRACE_SHUTDOWN，QUERY_TRACEOUT，TRACE_EVTNOTIFF\
  \ |\n| **全文搜索** | FT_RESTART_CRAWL，FULLTEXT GATHERER，MSSEARCH，FT_METADATA_MUTEX，FT_IFTSHC_MUTEX，FT_IFTSISM_MUTEX，FT_IFTS_RWLOCK，FT_COMPROWSET_RWLOCK，FT_MASTER_MERGE，FT_PROPERTYLIST_CACHE，FT_MASTER_MERGE_COORDINATOR，PWAIT_RESOURCE_SEMAPHORE_FT_PARALLEL_QUERY_SYNC\
  \ |\n| **其他磁盘 IO** | ASYNC_IO_COMPLETION，IO_COMPLETION，BACKUPIO，WRITE_COMPLETION，IO_QUEUE_LIMIT，IO_RETRY\
  \ |\n| **复制** | SE_REPL_%，REPL_%，HADR_%（但不包括 HADR_THROTTLE_LOG_RATE_GOVERNOR），PWAIT_HADR_%，REPLICA_WRITES，FCB_REPLICA_WRITE，FCB_REPLICA_READ，PWAIT_HADRSIM\
  \ |\n| **日志速率调控器** | LOG_RATE_GOVERNOR，POOL_LOG_RATE_GOVERNOR，HADR_THROTTLE_LOG_RATE_GOVERNOR，INSTANCE_LOG_RATE_GOVERNOR\
  \ |\n\n## 通过查询存储报告访问等待统计\n\n查看查询存储中可用的等待统计信息最用户友好的方式是通过内置报告。这些报告在数据库上启用查询存储功能后，可在\
  \ SQL Server Management Studio (SSMS) 中获得。图 3-2 显示了在撰写本书时可用的默认内置查询存储报告。\n\n![../images/340881_2_En_3_Chapter/340881_2_En_3_Fig2_HTML.jpg](img/340881_2_En_3_Fig2_HTML.jpg)\n\
  \n图 3-2 查询存储报告\n\n如图 3-2 所示，目前（尚）没有专用的等待统计报告。我们可以通过专门选择以下三个报告中的`等待时间 (毫秒)`指标来查看查询遇到的等待类别：\n\
  \n*   性能下降的查询\n*   资源消耗最大的查询\n*   高差异查询\n\n要在前面的任何报告中查看等待类别，首先需要将指标配置为等待时间（毫秒），如图\
  \ 3-3 所示。\n\n![../images/340881_2_En_3_Chapter/340881_2_En_3_Fig3_HTML.jpg](img/340881_2_En_3_Fig3_HTML.jpg)\n\
  \n图 3-3 将指标配置为等待时间（毫秒）\n\n这会将图表更改为（默认）返回按总等待时间排序的前 25 个查询。\n\n更改指标后，您可以将鼠标悬停在图表中显示的任何查询上以检索等待类别信息，如图\
  \ 3-4 所示。\n\n![../images/340881_2_En_3_Chapter/340881_2_En_3_Fig4_HTML.jpg](img/340881_2_En_3_Fig4_HTML.jpg)\n\
  \n图 3-4 查询存储中显示的等待类别\n\n如图 3-4 所示，这个特定查询遇到了多种等待类别：网络 IO、内存和缓冲区 IO。我们可以看到每个类别的等待时间以及所有类别的总等待时间，但如前所述，我们无法知道查询具体遇到了哪些等待类型。\n\
  \n## 通过查询存储 DMV 访问等待统计\n\n虽然内置的查询存储报告对于直观识别具有高等待时间的查询非常有用，但我们可以通过使用 SQL Server 2017\
  \ 中可用的一个新查询存储 DMV 轻松生成更多信息：`sys.query_store_wait_stats`。查询此 DMV 返回的列主要显示与特定执行计划\
  \ ID 的各种等待类别的等待类型相关的各种统计信息。\n\n查询存储使用其自己的唯一标识符来标识查询、执行计划和运行时区间。考虑到这一点，您可以通过在查询存储中查找查询\
  \ ID 来标识查询，或者通过搜索计划 ID 来标识执行计划。\n\n图 3-5 显示了为每个执行计划 ID 记录的不同统计信息，这些信息按不同的等待类别进行拆分。\n\
  \n![../images/340881_2_En_3_Chapter/340881_2_En_3_Fig5_HTML.jpg](img/340881_2_En_3_Fig5_HTML.jpg)\n\
  \n图 3-5 `sys.query_store_wait_stats` 中的等待类别统计信息\n\n虽然我们可以直接查询 `sys.query_store_wait_stats`\
  \ DMV 并查看每个或特定执行计划 ID 的各种统计信息，但通过将各种查询存储 DMV 连接在一起可以获得更多信息。\n\n例如，以下查询连接了各种查询存储\
  \ DMV，以返回遇到高总等待时间的查询概览。\n\n```\nSELECT\n    qsws.plan_id,\n    qsq.query_id,\n \
  \   qsws.runtime_stats_interval_id,\n    qsqt.query_sql_text,\n    qsws.wait_category_desc,\n\
  \    qsws.total_query_wait_time_ms\nFROM sys.query_store_wait_stats qsws\nINNER\
  \ JOIN sys.query_store_plan qsp\n    ON qsws.plan_id = qsp.plan_id\nINNER JOIN sys.query_store_query\
  \ qsq\n    ON qsp.query_id = qsq.query_id\nINNER JOIN sys.query_store_query_text\
  \ qsqt\n    ON qsq.query_text_id = qsqt.query_text_id\nORDER BY qsws.total_query_wait_time_ms\
  \ DESC\n```\n\n此查询的结果如图 3-6 所示。\n\n![../images/340881_2_En_3_Chapter/340881_2_En_3_Fig6_HTML.jpg](img/340881_2_En_3_Fig6_HTML.jpg)\n\
  \n图 3-6 来自查询存储的等待统计信息\n\n使用前面的查询，我们可以立即看到，针对 `Sales.SalesOrderDetail` 表的 `SELECT`\
  \ 查询大部分等待时间花费在与并行性相关的等待类型上。\n\n通过按查询 ID 过滤来稍微修改查询，我们可以深入了解特定查询并分析其等待行为。以下是修改后的查询，您还会看到我添加了一些返回各种有用统计信息的附加列。\n\
  \n```\nSELECT\n    qsws.plan_id,\n    qsq.query_id,\n    qsws.runtime_stats_interval_id,\n\
  \    qsqt.query_sql_text,\n    qsws.wait_category_desc,\n    qsws.total_query_wait_time_ms,\n\
  \    qsws.avg_query_wait_time_ms,\n    qsws.last_query_wait_time_ms\nFROM sys.query_store_wait_stats\
  \ qsws\nINNER JOIN sys.query_store_plan qsp\n    ON qsws.plan_id = qsp.plan_id\n\
  INNER JOIN sys.query_store_query qsq\n    ON qsp.query_id = qsq.query_id\nINNER\
  \ JOIN sys.query_store_query_text qsqt\n    ON qsq.query_text_id = qsqt.query_text_id\n\
  WHERE qsq.query_id = 8\nORDER BY runtime_stats_interval_id ASC\n```\n\n图 3-7 显示了运行此版本查询的输出。\n\
  \n![../images/340881_2_En_3_Chapter/340881_2_En_3_Fig7_HTML.jpg](img/340881_2_En_3_Fig7_HTML.jpg)\n\
  \n图 3-7 特定查询的等待统计信息\n\n\n在图 3-7 所示的查询及查询结果中，可以看到我添加了一个名为`runtime_stats_interval_id`的额外列。查询存储对运行时等待时间进行分组和聚合，其指标也是基于区间进行汇总的。默认情况下，这些区间为一小时的时间块，这意味着前面示例中针对特定查询返回的等待统计信息，是该区间内一次或多次查询执行的聚合结果。虽然你可以通过设置查询存储属性中的`统计信息收集间隔`将区间调整为更小的时间段，但这可能对\
  \ SQL Server 实例的性能产生负面影响，因此修改此设置时需谨慎。\n\n我仅向你展示了从查询存储中检索等待统计相关指标的几个示例。查询存储收集的所有信息，犹如一片汪洋，其中蕴含着大量可与等待统计指标相结合的其他信息。例如，你可以筛选特定的等待类别，或检测查询是否生成不同的执行计划，以及这些执行计划对该特定查询的等待有何影响。我强烈建议所有使用\
  \ SQL Server 2016 或更高版本的用户启用查询存储，并探索它所收集的所有强大指标。\n\n虽然查询存储仅在 SQL Server 2016 及更高版本中可用，但\
  \ William Durkin（Twitter 账号@sql_williamd）和我本人发布了一个名为 Open Query Store 的项目，它为低于 2016\
  \ 版本的 SQL Server 模拟了查询存储的数据收集功能。该项目是完全开源且免费的，可通过其 GitHub 页面 `https://github.com/OpenQueryStore/OpenQueryStore`\
  \ 获取。\n\n## 本章小结\n\n本章我们探讨了 SQL Server 2016 引入的一项新的查询性能与分析功能：查询存储。我们深入探究了查询存储的底层工作原理，以及如何在\
  \ SQL Server 2017 版本查询存储的内置报表中访问查询等待统计信息。\n\n最后，我们介绍了如何使用新的查询存储动态管理视图（DMV）来访问查询存储等待统计信息，并展示了一些示例查询，帮助你开始着手查询查询存储。\n\
  \n"
- '# 4. 构建稳固的基线


  在第 2 章“查询 SQL Server 等待统计信息”中，我们花费了大量时间描述和使用各种访问等待统计信息的方法。这些方法大多侧重于利用这些信息来检测当前发生的性能问题。虽然通过这些实时方法可以找到性能问题的确切原因，但这需要深入了解各种等待类型，以及——最重要的——对你所管理的
  SQL Server 性能有丰富的经验。如果你只管理一个 SQL Server 实例，相对可以较快熟悉它在不同情况下的反应。但如果你管理着数百个 SQL Server
  实例，要熟悉它们各自的性能表现几乎是不可能的。由于 SQL Server 等待统计信息很大程度上取决于 SQL Server 实例的工作负载，没有任何两个 SQL
  Server 实例会对相同的等待类型有完全相同的等待时间。这使得检测潜在问题变得困难，因为我们不能仅仅因为 CXPACKET 等待类型的等待时间为 20,000
  毫秒就断定出现了问题。这完全取决于你系统的配置和工作负载。一个 SQL Server 实例可能每分钟在 CXPACKET 等待类型上花费 20,000 毫秒（20
  秒）的等待时间而没有遇到任何性能问题，而另一个实例即使只有 1,000 毫秒的等待时间，用户也可能不断抱怨性能不佳。


  如果我们想对等待统计信息或任何与性能相关的数据进行深入分析，就需要一种收集相关性能指标并赋予其意义的方法。仅仅检测到你花费了 10,000 毫秒等待资源并没有任何意义，因为我们不知道这是否导致了性能问题。是的，也许你的用户正在抱怨性能极差，而你也注意到了这
  10,000 毫秒的等待时间，但无法确定该等待是否确实是导致用户所经历的性能问题的根源。在这种情况下，我们常常只能猜测，并假定该特定的资源等待就是性能问题的源头。在与世界各地的许多
  DBA 交流后，我了解到 DBA 们不喜欢猜测是什么拖慢了他们的 SQL Server 实例。我们想要确定性能问题的根源确实是那个资源等待。这就是基线可以提供帮助的地方。


  基线通过为你提供系统正常状态的定义，帮助你为性能指标赋予意义。没有系统的基线，我们无从知晓它是运行良好还是异常缓慢。基线至关重要；事实上，它们如此重要，以至于我决定在本书中用一整章来讲述。没有稳固的基线，你的测量结果毫无意义！尽管本书侧重于等待统计信息，但基线可以应用于你能在系统上捕获的任何与性能相关的指标，为你提供一种宝贵的性能分析方法。


  如果你通读了前一章关于查询存储的内容，可能会倾向于认为查询存储可以满足你所有的基线需求（如果你运行的是 SQL Server 2016 或更高版本）。虽然查询存储绝对为捕获和监控查询性能提供了一个非常有用的工具，但它并不一定提供对整个
  SQL Server 实例的性能概览。我个人认为，查询存储是常规的基线捕获和监控流程的补充，而非替代。



  ## 何为基线？


  如果我们查阅牛津词典中的“baseline”（基线）一词，会得到如下定义：“用于比较的最低或起始点。” 这句话通过使用“起始点”和“比较”这两个关键词，完美地捕捉到了基线的本质。基线通常是我们将后续测量与之进行比较的起始点，或者在我们的语境中，即测量标准。理想情况下，我们会在正常或标准情况下记录我们的基线测量值。如果我们在以后的某个时间点再次执行相同的测量，就可以将该测量值与基线进行比较。如果在比较过程中我们的测量值不一致，则说明可能发生了某些变化。


  即使你在分析性能时尚未使用基线比较，无论你是否意识到，你其实一直在与基线打交道。例如，如果你每月第一天收到薪水，那就是你的情况，或者在本章的语境中，即你的基线。如果由于某种原因你没有在每月第一天收到薪水，你就会注意到与基线相比出现了偏差。这可能成为你调查为何没有按时收到薪水的原因。也许发薪日从每月一号改到了五号，或者最坏的情况是，你工作的公司无法再支付你的薪水了。在任何一种情况下，我们都可以采取行动：要么接受变化，从而创建一个新的基线；要么将情况恢复到基线状态。图
  4-1 展示了这一过程。


  ![../images/340881_2_En_4_Chapter/340881_2_En_4_Fig1_HTML.jpg](img/340881_2_En_4_Fig1_HTML.jpg)


  **图 4-1：变更影响基线**


  定义和维护基线是一个迭代的过程。系统上发生的每一次变更都可能影响你的基线。你正在使用的应用程序发布新版本可能会改变一些查询，或者你的公司可能授予新部门访问数据库的权限，从而增加了连接数。在这两个例子中，我们都需要对基线进行调整，因为正常情况已经发生了变化。


  所有这些随着系统每次变更而调整和测量基线的工作听起来很繁重，有时也确实如此。但请相信我——拥有基线的益处远远大于成本。基线将帮助你比仅仅查看单次测量更快地发现问题，而且在等待统计信息的情况下，它是找到问题可靠、确定答案的唯一方法。让我们用
  DBA 吉姆的一个更技术性的例子来说明这一点。


  吉姆维护着一个托管单一用户数据库的 `SQL Server` 实例。该数据库供公司每位销售人员使用，记录公司与客户之间的每一笔财务交易。用户可以通过 `应用程序
  X` 访问数据库。`应用程序 X` 目前运行的是 `版本 2.4`，非常稳定。性能良好，用户满意，财源滚滚。听起来很棒，对吧？一天，一位顾问走进来，想要将 `应用程序
  X` 升级到全新的 `版本 3.0`。升级到 `版本 3.0` 的过程轻而易举，没有出现任何问题，所有用户都喜欢新功能。


  两天后，电话响了，克里斯的经理刚收到销售团队的反馈，称 `版本 3.0` 的性能糟糕透顶，并要求立即解决。


  幸运的是，吉姆知道基线的重要性，他在升级到 `版本 3.0` 之前创建了一个基线。利用 `版本 2.4` 的基线，吉姆将基线中的测量值与 `版本 3.0` 中进行的测量值进行比较，立即发现了
  `锁等待时间` 测量值上的巨大差异。由于其他测量值与 `2.4` 基线相比基本保持不变，吉姆将注意力集中在长时间运行的锁上，并识别出一个正在锁表的更新查询。他回滚了该查询，情况恢复正常。随后，他联系了应用程序供应商，了解到这种行为是软件中的一个错误导致的。


  这个例子可能听起来有点牵强，但它实际上是我每天在测量变更影响或分析性能问题时所使用方法的简化版本。如果吉姆没有 `锁等待时间` 的基线，只是在变更到 `版本 3.0`
  后查询 `锁等待时间`，他将无法知道等待时间增加了，因为他没有可以比较的对象。他可能选择查看其他指标而不是 `锁等待时间`，从而浪费了宝贵的时间和金钱。


  这里的道理很简单：基线将帮助你更快地检测异常情况并解决性能问题！


  ### 可视化你的基线


  基线通常通过图表进行可视化。将基线测量值转化为图表的一大优势是，图表可以让你更容易地检测出那些与基线相比增幅或降幅最大的测量值。此外，如果你需要证明特定配置正在影响性能，可视化你的数据可能有助于你更轻松地阐明观点。例如，你需要说服你的存储管理员，存储配置的变更已经影响了性能。如果你能交给他一张图表，展示正常行为与变更后行为的对比，他可能会更愿意提供帮助。图
  4-2 中的图表展示了基线测量值与后期测量值的对比。


  ![../images/340881_2_En_4_Chapter/340881_2_En_4_Fig2_HTML.jpg](img/340881_2_En_4_Fig2_HTML.jpg)


  **图 4-2：基线图表示例**


  如图 4-2 所示，你将能够非常快速地识别潜在问题。显然，在 08:00 到 12:00 之间，`每秒事务数` 高于正常情况，这可能值得花时间进行调查。



  ### 基线类型与统计


  根据我们所关注的信息，我们会频繁使用不同类型的基线。通常，没有一个单一的基线能够满足我们所有的需求，特别是当你使用基线进行性能故障排查时。例如，我们可以为每一种等待类型都创建一个基线，或者我们也可以选择只为对系统影响最大的等待类型创建基线。我们还可以选择为特定的日期或时间段创建基线，比如营业时间，并为非营业时间创建另一个基线。


  除了选择或限制我们要为其建立基线的测量指标外，我们还必须就如何计算基线做出选择。这些选择涉及一些数学计算，通常需要计算平均值。在许多情况下，我们的基线由许多数据点的平均值组成，这取决于你执行了多少次测量。如果你在很长一段时间内收集测量数据，并从这些数据中计算平均值，那么你就能建立一个比只有一天测量数据更可靠的基线。基于平均值创建基线也有其缺点。最重要的是，平均值受偏斜数据的影响很大。在不过多深入统计细节的情况下，偏斜数据是指存在非常高或非常低的值，从而影响了你的平均值。比如说，一组学生参加了一次考试，我们想通过计算考试的平均结果来了解该组的表现（学生评分在
  1 到 10 之间，1 表示非常差，10 表示优秀；需要 6 分或以上才能通过考试）。图 4-3 以图表形式显示了考试结果。


  ![../images/340881_2_En_4_Chapter/340881_2_En_4_Fig3_HTML.jpg](img/340881_2_En_4_Fig3_HTML.jpg)


  图 4-3


  考试结果


  如图 4-3 所示，只有四名学生的成绩高于通过考试所需的 6 分。其余学生的成绩远低于要求。然而，如果我们看这组学生的平均表现，他们实际上考得不算太差，平均分是
  6 分。我们可能会因为平均分达到 6 分而得出该组表现良好的结论，但这样我们就会忽略大多数人表现不佳，实际上只有四名学生通过了考试这一事实。当你处理基于平均值的基线时，牢记这一信息非常重要。如果你看到平均基线出现尖峰，这总是值得你调查的，因为它会影响你的基线。


  有一些统计方法可用于处理偏斜数据和平均值，其中一种是`trimmed (or truncated) mean`（截尾均值）。这种方法会去除数据序列中最高和最低的`x`%的测量值，从而创建一个更稳定的平均值。对于基线使用，我们不会更深入地探讨截尾均值，但如果你想了解更多，我建议你阅读
  Bob Newstadt 在[`www.sqlteam.com/article/computing-the-trimmed-mean-in-sql`](http://www.sqlteam.com/article/computing-the-trimmed-mean-in-sql)上发表的博客文章。尽管这篇文章已经有些年头了，但它展示了使用`T-SQL`计算截尾均值的一种方法。


  ## 基线陷阱


  希望上一节已经让你相信了基线的重要性，但在你着手捕获每一个性能指标并将其转换为基线测量值之前，有一些陷阱你需要避免。


  ### 信息过载


  尽管你可以自由地为系统中的所有内容建立基线，但这通常被认为是坏主意。收集过多信息可能会在你寻找答案时蒙蔽你的双眼。如果每次发生性能问题时，你都必须将 100,000
  个不同的指标与基线进行比较，那是在浪费时间。这里的建议是保持你的基线精简，只包含对系统最重要的性能指标。例如，你可以包含与`可用性组`相关的性能指标，但如果你的系统不使用此功能，那么包含它们就毫无用处。


  ### 了解你的指标


  选择性能指标时，另一个重要方面是理解。如果你不理解一个性能指标代表什么，就很难得出正确的结论，甚至可能将你引向错误的方向。


  ### 关注大幅测量变化


  将测量值与基线进行比较时，始终关注大幅增加或减少。特别是对于等待统计，等待时间的微小增长（1-2%）不值得担心。如果你的某个等待时间测量值上升了 20%，那就是开始调查的一个好信号。


  ### 使用固定间隔


  捕获等待统计信息时，应始终使用固定间隔。如果我们随机捕获等待时间，就几乎不可能建立一个可靠的基线。这就像拿苹果和橘子作比较一样。自动化捕获等待统计信息的最佳方式是使用`SQL
  Server Agent`（SQL Server 代理），并将其设置为固定间隔，例如每 15 分钟一次。




  ## 为等待统计分析建立基线


  既然我们已经熟悉了基线的概念，现在让我们开始工作，创建一个可用于等待统计分析的基线。正如我在本章开头所提到的，如果你想使用等待统计信息来分析性能问题，基线是极其重要的。没有人的系统与你的系统拥有完全相同的等待类型和等待时间，因此你需要创建一个可以用于比较的基线。


  在本节中，我将向你展示一种我用来创建、维护和比较基线与测量结果的方法。这并不一定意味着这是正确的做法，你可能会发现其他方法更适合你的需求。


  由于我们将捕获 SQL Server 等待统计测量数据，我更喜欢将我的测量数据存储在一个名为“Baseline”的独立数据库中。这样，我的测量信息就不会存储在用户表之间。由于等待统计信息是在
  SQL Server 实例级别记录的，因此在每个 SQL Server 实例中创建一个独立的测量数据库是合理的。图 4-4 展示了我在 SQL Server Management
  Studio 中的基线数据库。


  ![../images/340881_2_En_4_Chapter/340881_2_En_4_Fig4_HTML.jpg](img/340881_2_En_4_Fig4_HTML.jpg)


  图 4-4: 基线数据库


  你可以使用清单 4-1 中的脚本自行创建该数据库，记得更改文件位置。数据库数据文件在创建时将是 1.5 GB，这为捕获数周的等待统计信息提供了足够的空间。


  ```sql

  -- 创建 Baseline 数据库

  CREATE DATABASE [Baseline]

  ON PRIMARY

  (

  NAME = N''Baseline'', FILENAME = N''E:\Data\baseline_data.mdf'' , SIZE = 1536000KB
  , FILEGROWTH = 10%

  )

  LOG ON

  (

  NAME = N''Baseline_log'', FILENAME = N''E:\Log\baseline_log.ldf'' , SIZE = 102400KB
  , FILEGROWTH = 10%

  )

  GO

  ALTER DATABASE [Baseline] SET RECOVERY SIMPLE

  GO

  ```

  清单 4-1: 创建 Baseline 数据库


  我们将使用 `sys.dm_os_wait_stats` DMV 作为测量数据的来源，这意味着容纳我们测量数据的表必须能够处理从 DMV 返回的信息。我们不仅会存储等待类型和等待时间，还会添加额外的信息来丰富数据，以便我们可以轻松地创建多个基线。


  清单 4-2 显示了可用于创建名为 `WaitStats` 的表的查询，该表将用于存储我们用于创建基线的等待统计信息。


  ```sql

  USE [BaseLine]

  GO

  CREATE TABLE WaitStats

  (

  ws_ID INT IDENTITY(1,1) PRIMARY KEY,

  ws_DateTime DATETIME,

  ws_Day INT,

  ws_Month INT,

  ws_Year INT,

  ws_Hour INT,

  ws_Minute INT,

  ws_DayOfWeek VARCHAR(15),

  ws_WaitType VARCHAR(50),

  ws_WaitTime INT,

  ws_WaitingTasks INT,

  ws_SignalWaitTime INT

  )

  ```

  清单 4-2: 创建等待统计表


  正如你在清单中所看到的，我们捕获了等待类型、等待时间、信号等待时间和等待任务数量。我们还捕获了记录等待统计信息的日期和时间。我们还将日期和时间拆分到额外的列中，以便对数据进行分段，从而更容易基于特定的日期、小时、月份等构建特定的基线，而无需每次都转换
  `datetime` 数据类型。


  现在我们的表已经准备好了，是时候捕获一些等待统计信息并将其插入到我们的 `WaitStats` 表中了。因为 `sys.dm_os_wait_stats` DMV
  返回的是累计等待时间，所以我们需要使用一种方法来仅捕获两个捕获时刻之间等待时间的差异。如果我们直接从 `sys.dm_os_wait_stats` DMV 捕获信息，我们将总是收到不断增长的等待时间，这将使比较变得毫无用处。有两种方法可以捕获两次测量之间等待时间的变化，每种方法都有其优缺点。


  第一种方法，我称之为重置法，它将从 `sys.dm_os_wait_stats` DMV 捕获等待统计信息，然后使用 `DBCC SQLPERF(''sys.dm_os_wait_stats'',
  CLEAR)` 命令重置 DMV。这种方法的主要优点是使用非常简单，因为我们只需要捕获信息，然后再次重置，并在下一次测量时开始相同的过程。不需要计算增量，因为在我们的第一次测量之后，计数器就被重置为
  0。缺点是 `DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR)` 命令会重置 `sys.dm_os_wait_stats`
  DMV 内部的信息。这意味着你将丢失 DMV 内部的累计信息，这些信息可能是你不想丢失的。图 4-5 说明了这种捕获等待统计的方法。


  ![../images/340881_2_En_4_Chapter/340881_2_En_4_Fig5_HTML.jpg](img/340881_2_En_4_Fig5_HTML.jpg)


  图 4-5: 使用重置法捕获等待统计


  第二种选择，我命名为增量法，它不使用 `DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR)` 命令，而是计算两次测量之间等待时间的差异或增量。不使用
  `DBCC` 命令的优点是你不会丢失 `sys.dm_os_wait_stats` DMV 内部的累计等待时间。它的主要缺点是与第一种方法相比，计算增量要复杂得多。它通常还需要在
  T-SQL 脚本中包含一个 `WAITFOR DELAY` 命令来设置间隔。这可能意味着，如果你计划使用 SQL Server Agent 捕获等待统计信息，你最终可能会得到一个几乎持续运行的
  SQL Server Agent 作业。图 4-6 说明了捕获等待统计的增量选项。


  ![../images/340881_2_En_4_Chapter/340881_2_En_4_Fig6_HTML.jpg](img/340881_2_En_4_Fig6_HTML.jpg)


  图 4-6: 使用增量法捕获等待统计


  还有更多可用的方法来捕获等待统计信息，但我最常见到的是这两种，或者是它们的变体。你想使用哪种方法取决于你自己，因为最终两种方法都会返回相同的结果。


  ### 重置捕获法


  重置等待统计捕获法包含一个单一的 T-SQL 脚本，该脚本将从 `sys.dm_os_wait_stats` DMV 捕获信息，然后重置 DMV 内部的计数器。清单
  4-3 显示了可用于填充我们之前创建的 `WaitStats` 表的 T-SQL 脚本。


  ```sql

  USE [Baseline]

  GO

  -- 将 Wait Stats 插入到 Baseline 表

  INSERT INTO WaitStats

  SELECT

  GETDATE() AS ''DateTime'',

  DATEPART(DAY,GETDATE()) AS ''Day'',

  DATEPART(MONTH,GETDATE()) AS ''Month'',

  DATEPART(YEAR,GETDATE()) AS ''Year'',

  DATEPART(HOUR, GETDATE()) AS ''Hour'',

  DATEPART(MINUTE, GETDATE()) AS ''Minute'',

  DATENAME(DW, GETDATE()) AS ''DayOfWeek'',

  wait_type AS ''WaitType'',

  wait_time_ms AS ''WaitTime'',

  waiting_tasks_count AS ''WaitingTasks'',

  signal_wait_time_ms AS ''SignalWaitTime''

  FROM sys.dm_os_wait_stats;

  -- 清除 sys.dm_os_wait_stats

  DBCC SQLPERF (''sys.dm_os_wait_stats'',CLEAR)

  GO

  ```

  清单 4-3: 重置捕获法




  ### 增量捕获方法


  增量捕获方法也仅包含一个 T-SQL 脚本，但它比重置捕获方法稍复杂一些。它使用一个临时表来存储第一次测量，然后等待 15 分钟，执行第二次测量，并计算增量差值。结果会被插入到
  `WaitStats` 表中。清单 4-4 展示了如果你计划使用此方法收集等待统计指标，可以使用的 T-SQL 脚本。


  ```

  USE [Baseline]

  GO

  -- 检查临时表是否已存在

  -- 如果存在，则删除它。

  IF EXISTS

  (

  SELECT *

  FROM tempdb.dbo.sysobjects

  WHERE ID = OBJECT_ID(N''tempdb..#ws_Capture'')

  )

  DROP TABLE #ws_Capture;

  -- 创建临时表以保存我们的第一次测量

  CREATE TABLE #ws_Capture

  (

  wst_WaitType VARCHAR(50),

  wst_WaitTime INT,

  wst_WaitingTasks INT,

  wst_SignalWaitTime INT

  );

  -- 将我们的第一次测量插入到临时表

  INSERT INTO #ws_Capture

  SELECT

  wait_type,

  wait_time_ms,

  waiting_tasks_count,

  signal_wait_time_ms

  FROM sys.dm_os_wait_stats;

  -- 等待下一次测量

  -- 在此例中，我们将等待 15 分钟

  WAITFOR DELAY ''00:15:00''

  -- 将第一次测量与新的测量合并

  -- 并计算增量差值

  -- 将结果写入 WaitStats 表

  INSERT INTO WaitStats

  SELECT

  GETDATE() AS ''DateTime'',

  DATEPART(DAY,GETDATE()) AS ''Day'',

  DATEPART(MONTH,GETDATE()) AS ''Month'',

  DATEPART(YEAR,GETDATE()) AS ''Year'',

  DATEPART(HOUR, GETDATE()) AS ''Hour'',

  DATEPART(MINUTE, GETDATE()) AS ''Minute'',

  DATENAME(DW, GETDATE()) AS ''DayOfWeek'',

  dm.wait_type AS ''WaitType'',

  dm.wait_time_ms - ws.wst_WaitTime AS ''WaitTime'',

  dm.waiting_tasks_count - ws.wst_WaitingTasks AS ''WaitingTasks'',

  dm.signal_wait_time_ms - ws.wst_SignalWaitTime AS ''SignalWaitTime''

  FROM sys.dm_os_wait_stats dm

  INNER JOIN #ws_Capture ws

  ON dm.wait_type = ws.wst_WaitType;

  -- 清理临时表

  DROP TABLE #ws_Capture;

  ```

  清单 4-4

  增量捕获方法


  ### 使用 SQL Server Agent 安排测量


  选择捕获方法后，我们需要运行捕获 T-SQL 脚本，以用等待统计信息填充我们的 `WaitStats` 表。如前面基线陷阱部分所述，始终以固定间隔执行测量非常重要。这使得比较测量结果容易得多，因为你总是在比较相同的时间段。实现此目的的最佳方法是使用设置为固定间隔的
  `SQL Server Agent` 作业。间隔可以根据你的选择设置——设置的间隔越大，你可以比较的时间段数量就越少。将间隔设置得更短会给你更多的时间段，但同时也意味着需要存储的数据量增加。我个人倾向于将间隔设置为
  15 分钟。在大多数情况下，这给了我足够的时间段进行比较。


  这里我不会详细介绍如何创建 `SQL Server Agent` 作业来捕获等待统计信息，但我想指出我的作业作为示例供你参考。我通常最终会创建一个 `SQL Server
  Agent` 作业，其中只包含一个 T-SQL 脚本步骤。在此步骤中，我根据想要使用的方法复制捕获脚本。图 4-7 显示了我的 `SQL Server Agent`
  作业的截图。


  ![../images/340881_2_En_4_Chapter/340881_2_En_4_Fig7_HTML.jpg](img/340881_2_En_4_Fig7_HTML.jpg)


  图 4-7

  捕获 WaitStats 的 `SQL Server Agent` 作业步骤


  在此例中，我使用了重置捕获方法来将等待统计信息捕获到我的 `WaitStats` 表中。


  图 4-8 显示了我用来在固定间隔捕获等待统计信息的计划。如你所见，我将其设置为每 15 分钟一次，每天执行。


  ![../images/340881_2_En_4_Chapter/340881_2_En_4_Fig8_HTML.jpg](img/340881_2_En_4_Fig8_HTML.jpg)


  图 4-8

  `SQL Server Agent` 作业计划


  再次说明，你可以自由选择自己的捕获间隔，但请确保始终以相同的间隔时长进行捕获。


  在我们创建了 `SQL Server Agent` 作业来收集等待统计信息后，我们需要让它运行一段时间。作业运行的时间越长，我们收集的信息就越多，从而提高了我们基线的质量。



  ## 等待统计基线分析


  在让 SQL Server 代理作业收集了一段时间的等待统计指标后，我们现在已准备好实际创建一些基线。我们的方法是查询之前创建的 `WaitStats` 表。我将给你一些创建基线的查询示例，以便你进行对比；不过，这些并非唯一可运行的查询，我鼓励你尝试不同的查询来返回你最感兴趣的信息。


  在开始构建基线之前，我想回到第 2 章“查询 SQL Server 等待统计”中的图 2-14。在那个流程图中，我向你展示了分析当前正在发生的资源等待可以采取的步骤。既然我们现在能够访问基线，就可以在流程图中添加一个额外的步骤。图
  4-9 展示了如何完善该流程图，包括基线比较步骤。


  ![../images/340881_2_En_4_Chapter/340881_2_En_4_Fig9_HTML.jpg](img/340881_2_En_4_Fig9_HTML.jpg)


  ### 图 4-9

  完整的等待统计性能分析流程图


  你创建的基线是调查性能问题时，对你所收集指标的一个额外输入。它们是一个非常有价值的输入，因为它们将向你展示问题未发生时的信息。


  让我们通过一个例子来走一遍流程，再次以 DBA Jim 为例，回顾图 4-9 所示流程图的所有步骤。在这个例子中，我将向你展示针对 `WaitStats` 表的查询，以构建对性能分析过程有用的基线。


  周二上午 9 点左右，DBA Jim 接到电话，称针对销售数据库的日常报表比平时慢了很多。问题大约在上午 8 点开始，用户仍在经历性能问题。这些报表是计划作业的一部分，每个工作日从上午
  8 点开始运行。


  Jim 首先使用以下查询动态管理视图 `sys.dm_os_waiting_tasks`：


  ```sql

  SELECT * FROM sys.dm_os_waiting_tasks

  ORDER BY session_id ASC;

  ```


  Jim 关注的是用户会话（通常 ID 高于 50），但他没有看到任何用户会话有很长的等待时间，如图 4-10 所示。


  ![../images/340881_2_En_4_Chapter/340881_2_En_4_Fig10_HTML.jpg](img/340881_2_En_4_Fig10_HTML.jpg)


  ### 图 4-10

  sys.dm_os_waiting_tasks


  在多次执行对 `sys.dm_os_waiting_tasks` DMV 的查询后，Jim 注意到每次查询该 DMV 时都会返回等待类型 `PAGEIOLATCH_SH`。每次返回的会话
  ID 不同，但等待时间相对较短。


  Jim 使用相同的 T-SQL 脚本将等待统计指标捕获到 `WaitStats` 表中，正如本章前面所讨论的那样。由于 Jim 可以访问历史等待统计信息，他决定为
  `PAGEIOLATCH_SH` 等待时间创建一个基线。他首先做的是查看今天 `PAGEIOLATCH_SH` 的等待时间，筛选显示上午 8 点到 9 点之间捕获的测量值，使用如代码清单
  4-5 所示的查询。


  ```sql

  -- 今天上午 8 点到 9 点之间的 PAGEIOLATCH_SH 等待

  SELECT

  CONVERT(VARCHAR(5), ws_DateTime, 108) AS ''时间'',

  ws_WaitTime AS ''等待时间''

  FROM WaitStats

  WHERE ws_WaitType = ''PAGEIOLATCH_SH''

  AND (ws_Hour >= 8 AND ws_Hour < 9)

  AND CONVERT(VARCHAR(5), ws_DateTime, 105) = CONVERT(VARCHAR(5), GETDATE(), 105)

  ```


  **代码清单 4-5**

  显示今天上午 8 点到 9 点之间 `PAGEIOLATCH_SH` 的等待时间


  查询返回的结果如图 4-11 所示。


  ![../images/340881_2_En_4_Chapter/340881_2_En_4_Fig11_HTML.jpg](img/340881_2_En_4_Fig11_HTML.jpg)


  ### 图 4-11

  今天 `PAGEIOLATCH_SH` 的等待时间


  现在 Jim 已经获得了 `PAGEIOLATCH_SH` 等待类型今天的等待时间，下一步是从 `PAGEIOLATCH_SH` 等待类型的历史测量值创建基线，以便将今天的测量值与基线进行比较。Jim
  使用如代码清单 4-6 所示的查询来构建他的基线。


  ```sql

  -- 工作日上午 8 点到 9 点之间的基线

  -- 不包括今天进行的测量

  SELECT

  CONVERT(VARCHAR(5), ws_DateTime, 108) AS ''时间'',

  AVG(ws_WaitTime) AS ''基线''

  FROM WaitStats

  WHERE ws_WaitType = ''PAGEIOLATCH_SH''

  AND ws_DayOfWeek IN (''Monday'', ''Tuesday'', ''Wednesday'', ''Thursday'',''Friday'')

  AND (ws_Hour >= 8 AND ws_Hour < 9)

  AND CONVERT(VARCHAR(5), ws_DateTime, 105) < CONVERT(VARCHAR(5), GETDATE(), 105)

  GROUP BY CONVERT(VARCHAR(5), ws_DateTime, 108);

  ```


  **代码清单 4-6**

  `PAGEIOLATCH_SH` 基线


  此查询构建的基线具有以下特征：返回在工作日上午 8 点到 9 点之间捕获的 `PAGEIOLATCH_SH` 等待类型的平均等待时间，不包括今天。排除今天的原因是今天在性能问题发生期间进行的测量可能会影响平均值。另一个建议可能是仅筛选最近
  *x* 周内捕获的数据，以限制需要计算平均值的数据量。


  代码清单 4-6 所示查询的结果如图 4-12 所示。


  ![../images/340881_2_En_4_Chapter/340881_2_En_4_Fig12_HTML.jpg](img/340881_2_En_4_Fig12_HTML.jpg)


  ### 图 4-12

  `PAGEIOLATCH_SH` 基线


  正如你对比图 4-11 和 4-12 中的等待时间时立即能看到的那样，今天进行的测量值远高于历史基线中的值。为了更容易看出差异，我创建了两个测量值的图表，如图
  4-13 所示。


  ![../images/340881_2_En_4_Chapter/340881_2_En_4_Fig13_HTML.png](img/340881_2_En_4_Fig13_HTML.png)


  ### 图 4-13

  `PAGEIOLATCH_SH` 等待类型的基线比较图


  由于 `PAGEIOLATCH_SH` 等待类型的基线与今天之间的等待时间差异如此之大，Jim 认为 `PAGEIOLATCH_SH` 等待类型需要进一步调查。


  我们将在第 9 章“与 Latch 相关的等待类型”中详细探讨 `PAGEIOLATCH_SH` 等待类型，但为了给你一个（非常）简短的解释，较长的 `PAGEIOLATCH_SH`
  等待可能表明存储问题。


  为了进一步调查，Jim 启动了 Windows 性能监视器，以查看与存储子系统相关的指标，特别是磁盘延迟计数器。如图 4-14 所示，数据库数据文件所在磁盘的延迟峰值达到了非常高的数值，超过
  4000 毫秒！为了使 SQL Server 达到最佳性能，磁盘延迟应尽可能低，至少低于 20 毫秒。


  ![../images/340881_2_En_4_Chapter/340881_2_En_4_Fig14_HTML.jpg](img/340881_2_En_4_Fig14_HTML.jpg)


  ### 图 4-14

  磁盘读取延迟



  有了等待统计的基准信息和`Perfmon`指标，Jim 认为问题与存储有关，并联系了存储管理员。Jim 收集的指标也对存储管理员有帮助，因为他可以将自己测量的存储相关指标与
  Jim 提供的进行对比。存储管理员确认问题与销售数据库所在的磁盘有关，并通过更换磁盘阵列中的一个故障磁盘解决了问题。磁盘更换后，磁盘延迟恢复到平均 6 毫秒，高延迟峰值消失。磁盘更换后，Jim
  再次从`WaitStats`表中查询等待时间，注意到`PAGEIOLATCH_SH`等待类型的等待时间再次接近基准值。用户也告知 Jim，报表运行再次恢复正常。


  在这个示例中，Jim 遵循了图 4-9 所示的等待统计性能分析流程图的所有步骤：


  1.  用户在运行报表时遇到性能下降。

  2.  Jim 查询`sys.dm_os_waiting_tasks` DMV，以查明是否存在高等待时间或频繁出现的等待类型。`PAGEIOLATCH_SH`等待类型似乎频繁出现。

  3.  Jim 通过捕获当天的`PAGEIOLATCH_SH`等待时间，并与基准进行比较，来收集指标。他还从`Perfmon`收集了额外的指标。

  4.  所有指标都向 Jim 表明，问题很可能与存储有关，Jim 于是联系了存储管理员。

  5.  存储管理员更换了阵列中的一个损坏磁盘。存储延迟值降至 6 毫秒。

  6.  Jim 再次检查`PAGEIOLATCH_SH`等待类型的等待时间，确认其已接近基准值。


  尽管这个示例看起来可能很简单，但它实际上基于我在现实世界中遇到的一个性能问题。通过结合使用来自等待统计性能分析流程图的步骤和基准指标，我能够非常快速地识别并解决问题。


  在我展示的示例中，你看到了清单 4-6 中的查询，它为`PAGEIOLATCH_SH`等待类型创建了一个基准线。这个查询只是你可以针对`WaitStats`表使用的示例。你可以修改它以满足自己的需求；例如，你可以选择不限制工作日的结果，只显示特定日期捕获的平均等待时间。或者你可以请求特定日期的实际等待时间。


  如果你要长时间捕获等待统计测量值，将结果拆分到多个表中可能是一个好主意，这样查询起来会更简单、更快速。例如，你可以使用以下查询将三月份完成的所有等待统计测量值插入到它们自己的表中：


  ```sql

  SELECT *

  INTO WaitStats_March

  FROM WaitStats

  WHERE ws_Month = 3;

  ```


  这也为我们提供了选项，可以通过将不同的表连接在一起来比较不同时间段内的特定等待时间。图 4-15 展示了我通常最终得到的基准数据库表，数据按月份排序。


  ![../images/340881_2_En_4_Chapter/340881_2_En_4_Fig15_HTML.jpg](img/340881_2_En_4_Fig15_HTML.jpg)


  图 4-15: 按月份拆分的等待统计测量值。


  你可以自行决定如何拆分测量值；也许你想为使用的每个应用程序版本将等待统计测量值存储在一个单独的表中，或者将特定等待类型的所有测量值存储在一个单独的表中。选择权在你手中。


  希望本章能让你对如何存储等待统计测量值并从这些测量值创建基准线有所启发。我尽量避免确切地告诉你要做什么以及如何做，因为我相信单一的方法并不适用于所有人。你需要编写和调整自己的查询来创建你感兴趣的基准线，但我希望本章为你展示了可以进一步构建的基础。


  ## 总结


  在本章中，我们从理论和实践两个角度仔细研究了基准线。基准线对于你执行的任何类型的性能分析都极其重要。对于等待统计，如果你想对与 SQL Server 相关的性能问题进行故障排除，基准线是经常需要的。由于等待统计对于你的系统是唯一的，比较等待时间的方法只有一种——基准线。


  我给你提供了一些示例和 T-SQL 脚本，来创建你自己的等待统计基准表，这样你现在就可以开始捕获等待统计信息。我们还通过一个示例，了解了如何查询该基准信息并将其与实际测量值进行比较，以对与性能相关的事件进行故障排除。


  '
- '# 第二部分：等待类型


  '
- '# 5. 与 CPU 相关的等待类型


  在过去的几十年里，处理器取得了巨大的发展，像英特尔或 AMD 这样的处理器制造商每年都能制造出更快的处理器。虽然处理器的速度已接近极限，但制造商能够在处理器中集成的核心数量却一直在增长。在撰写本书时，你可以购买一个内置
  24 核的单处理器来为你的系统提供动力。处理器也是系统中比较难以更换的部分之一。虽然你可以相对简单地扩展系统内存，但更换一个速度更快或核心更多的处理器，通常也需要更换系统主板，因为
  CPU 插槽不兼容。这意味着我们通常会一直使用现有的处理器，直到更换整个系统为止。


  处理器对于 SQL Server 也非常重要。更高的处理器速度将加速与处理器相关的指令，而更多的核心意味着 SQL Server 可以用来执行请求的更多调度器。但即使有了速度和核心数的所有这些升级，也无法避免我们有时仍需等待处理器资源。在本章中，我们将了解一些与系统处理器相关的等待类型。


  ## CXPACKET


  第一个与 CPU 相关的等待类型，也是 SQL Server 实例在默认、开箱即用的配置下运行时最常见的等待类型。它也是最被误解的等待类型之一，有时甚至不需要降低其等待时间来让你的查询运行得更快；事实上，降低`CXPACKET`等待时间有时反而会降低查询性能！如果你运行的是
  SQL Server 2016 SP2 或 SQL Server 2017，处理`CXPACKET`等待的方式有一些变化。我们将在本节末尾讨论这些变化的影响，包括新的与并行相关的等待类型`CXCONSUMER`。





  ## 什么是 `CXPACKET` 等待类型？


  `CXPACKET` 等待类型在查询以并行而非串行方式执行时出现。如果工作可以分配给多个工作线程，并行查询相比串行查询可以具有性能优势。对于返回大型结果集的查询，这种优势更大；仅返回少量行的查询从并行中获益甚少，并且在很多情况下，并行会减慢这些查询的执行速度。这并不意味着我们应该立即关闭并行性，因为我还没见过一个真正的
  OLTP 数据库中每个查询都只返回寥寥数行。许多系统必须处理混合负载，通常既要处理大量短查询，也要处理大型、运行时间较长的报表查询。


  并行查询将使用多个工作线程来执行一个请求。除了为执行请求工作而创建的工作线程外，并行查询还会使用一个 0 号线程，称为控制线程。这个 0 号线程的任务是协调其他工作线程的工作。当
  0 号线程等待其他工作线程完成分配给他们的工作时，它将记录 `CXPACKET` 等待类型的等待时间。为了更好地理解这种关系，请看图 5-1。


  ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig1_HTML.jpg](img/340881_2_En_5_Fig1_HTML.jpg)


  **图 5-1：并行查询线程化**


  一旦 SQL Server 查询优化器决定使用并行执行计划，你就会看到 `CXPACKET` 等待出现。如果你预期查询将并行运行且性能符合预期，这完全是正常现象，无需担心。在这种情况下，你可以忽略
  `CXPACKET` 等待类型的长等待时间。然而，也存在你不希望使用并行性的情况，或者因为工作负载不均衡，并行性正在对查询性能产生负面影响。


  ### 配置并行度设置


  由于 `CXPACKET` 等待类型与 SQL Server 实例的并行度设置直接相关，我们可以通过调整这些设置来相对容易地影响它。我们可以在 SQL Server
  实例的 **服务器属性** ➤ **高级** ➤ **并行度** 部分找到并行度设置，如图 5-2 所示。


  ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig2_HTML.jpg](img/340881_2_En_5_Fig2_HTML.jpg)


  **图 5-2：并行度配置**


  在这些设置中，`并行度的成本阈值` 和 `最大并行度` 设置对并行查询的影响最大。


  `并行度的成本阈值` 设置配置了查询优化器考虑将查询并行运行的成本阈值。如果一个串行查询的成本高于 `并行度的成本阈值` 中配置的值，查询优化器可能会决定生成并行计划而非串行计划。默认情况下，此设置的值为
  5，可配置为 0 到 32,767 之间的值。


  `最大并行度` 设置配置了执行并行计划时使用的调度器数量。默认情况下，此设置配置为 0，这意味着执行并行计划时可以使用所有可用的调度器。


  ### 数据库作用域配置


  如果你运行的是 SQL Server 2016 或更高版本，你还可以通过数据库作用域配置项在数据库级别配置并行度设置，如图 5-3 所示。


  ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig3_HTML.jpg](img/340881_2_En_5_Fig3_HTML.jpg)


  **图 5-3：数据库作用域并行度配置**


  引入在每个数据库级别（而非整个 SQL Server 实例）配置并行度等设置的功能，是一个非常受欢迎的改变。例如，假设你有多个数据库位于同一个 SQL Server
  实例中。理想情况下，这些数据库中的每一个都将使用针对其查询负载优化的配置设置。在 SQL Server 2016 之前，我们无法在每个数据库级别进行配置，因此通常你会坚持使用某种最佳实践或通用配置值。既然数据库作用域配置成为可能，为每个单独的数据库配置最优设置就变得非常可行。


  随着能够为并行度设置添加数据库作用域配置值，SQL Server 引擎处理这些配置的方式有所不同：


  *   数据库作用域配置设置仅当其被设置为非默认值时才会覆盖当前的实例设置。

  *   如果数据库作用域配置设置为其默认值，则将使用实例范围的配置设置。


  例如，如果 `最大并行度` 设置在实例级别配置为 4，在数据库级别配置为 0（默认值），那么可以并行执行的查询最多可以使用四个调度器。如果将数据库作用域设置更改为值
  2，则针对该数据库执行的查询最多可以使用两个调度器，覆盖了实例级别的设置值 4。




  ### 通过调整并行度配置降低 CXPACKET 等待时间


  有多种方法可用于降低 `CXPACKET` 等待时间，但在使用之前，你必须确认 `CXPACKET` 等待确实引起了问题。正如我之前所说，只要为你的 SQL Server
  实例启用了并行度，`CXPACKET` 等待就完全是正常的。我在网络论坛上经常看到的一个解决方案是，通过将 `最大并行度` 选项设置为 1 来禁用并行度。在大多数情况下，这不是一个好主意。禁用并行度会完全消除
  `CXPACKET` 等待，但由于某些查询无法再并行运行，它们的性能可能会差很多。


  降低 `CXPACKET` 等待的一个更好方法是，调整 `并行度代价阈值` 和 `最大并行度` 选项，使其与你的工作负载相匹配。这样，你可以确保只有从并行中获益最多的查询才会并行运行。找到这个并行度甜点区的一种方法是比较查询在串行运行与并行运行时的执行时间。通常，你应该重点关注那些访问大量信息且本身运行时间较长的查询，因为这些查询将从并行中获益最多。


  考虑以下示例，我们有一个针对 `AdventureWorks` 数据库的查询，从 `Sales.SalesOrderDetail` 表请求信息：

  ```sql

  SELECT *

  FROM Sales.SalesOrderDetail

  ORDER BY CarrierTrackingNumber DESC;

  ```

  我们可以通过检查查询的估计代价来判断此查询是否适合并行运行。要查看此信息，我们需要查看查询在串行运行时的估计执行计划。为确保查询串行运行，我们必须添加查询选项
  `MAXDOP 1`。我们还对查询的运行时间感兴趣，因此我们在查询中添加了 `SET STATISTICS TIME ON` 选项：

  ```sql

  SET STATISTICS TIME ON

  SELECT *

  FROM Sales.SalesOrderDetail

  ORDER BY CarrierTrackingNumber DESC

  OPTION (MAXDOP 1);

  SET STATISTICS TIME OFF

  ```

  图 5-4 显示了查询在串行运行时的估计代价。


  ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig4_HTML.jpg](img/340881_2_En_5_Fig4_HTML.jpg)


  *图 5-4 使用 MAXDOP 1 时的查询估计代价*


  在此示例中，在我的测试 SQL Server 上估计代价为 10.4907。当我执行查询时，我的系统上的执行时间为 2256 毫秒。


  由于我的测试服务器上 `并行度代价阈值` 仍配置为默认值 5，我相当确定如果我移除 `MAXDOP` 查询提示，查询将会并行运行。


  图 5-5 显示了在运行不带 `MAXDOP 1` 选项的查询后的实际执行计划。


  ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig5_HTML.jpg](img/340881_2_En_5_Fig5_HTML.jpg)


  *图 5-5 不带 MAXDOP 1 选项的实际执行计划*


  如你所见，正如我们预期的那样，查询使用了并行度运行，因为其估计代价高于 `并行度代价阈值` 选项中配置的值。使用并行度的查询执行时间为 1959 毫秒。如果我们查看实际执行计划中
  `SELECT` 操作的属性，可以查看一些附加信息，如图 5-6 所示。


  ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig6_HTML.jpg](img/340881_2_En_5_Fig6_HTML.jpg)


  *图 5-6 SELECT 操作属性*


  `SELECT` 操作的属性显示查询是使用两个线程执行的。估计代价下降到了 7.08005。


  尽管估计代价下降了，但对于此查询，执行时间的改进非常小。我们可以将 `并行度代价阈值` 值更改为高于默认值 5 的数字。这样，我们可以确保像本示例中的这种相对较小的查询不使用并行度，而繁重的报表查询则使用。


  另一个需要记住的设置是 `最大并行度` 选项。当它设置为默认值 0 时，查询并行运行时可以使用所有可用的调度程序。但是，使用更多的调度程序并不一定意味着查询执行得更快。在使用超过
  8 个调度程序后，使用更多调度程序带来的好处会逐渐变小。微软在 KB2806535 中推荐以下配置：

  *   对于核心数超过八个的服务器，将 `最大并行度` 选项设置为 8。

  *   对于核心数少于八个的服务器，将 `最大并行度` 选项设置为 0 或服务器的核心数。


  这是一个通用建议，具体情况可能有所不同。`并行度代价阈值` 和 `最大并行度` 两个选项的设置高度依赖于你系统的工作负载，需要仔细测试才能找出哪些设置有效，哪些无效。不过，它们会影响你的
  `CXPACKET` 等待时间，因此，在更改 `并行度代价阈值` 或 `最大并行度` 选项后，请将你的 `CXPACKET` 等待时间与基线进行比较，以衡量更改的影响。


  ### 通过解决倾斜的工作负载来降低 CXPACKET 等待时间


  倾斜的工作负载意味着并非所有工作线程都接收到相同数量的工作来执行。这不是一个最优的情况，因为如果一个工作线程必须完成大部分工作，而另一个只完成很少一部分，那么线程
  0 仍然必须等待运行时间最长的工作线程完成，在等待期间记录 `CXPACKET` 等待时间。图 5-7 显示了一个倾斜工作负载的抽象示例。


  ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig7_HTML.jpg](img/340881_2_En_5_Fig7_HTML.jpg)


  *图 5-7 倾斜的并行查询线程分配*


  如果我们可以将线程 2 的部分工作交给线程 3，查询可能会执行得更快，从而降低 `CXPACKET` 等待时间。


  我们可以在实际执行计划中并行操作的 `实际行数` 属性中查看线程分布情况。图 5-8 显示了使用并行度执行的聚集索引扫描操作的属性。此操作发生在我们上一节中针对
  `Sales.SalesOrderDetail` 表使用的示例查询中。


  ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig8_HTML.jpg](img/340881_2_En_5_Fig8_HTML.jpg)


  *图 5-8 并行线程分布*


  在此示例中，我们看到聚集索引扫描返回了 121,317 行，分布在两条线程上（请注意，线程 0，即协调线程，不处理任何行）。在这种情况下，行数的分布相对均匀，因此我们可能没有遇到倾斜的工作负载问题。


  倾斜的工作负载通常由过时的统计信息引起。如果查询优化器认为表中的行数少于（或多于）实际数量，它可能会将工作不均匀地分配给各个线程。请确保定期对统计信息进行维护，以防止出现倾斜的工作负载。




  ### SQL Server 2016 SP2 和 2017 CU3 中 CXCONSUMER 等待类型简介


  在 SQL Server 2017 CU3（以及后续的 SQL Server 2016 SP2）发布中，微软推送了一项关于并行等待记录方式的更改。开发团队的主要目标是使并行等待更具可操作性。正如你在前面章节中所读到的，这一点非常受欢迎，因为要确定并行等待何时会导致查询性能问题往往很困难。


  正如我们前面所述，并行由两部分组成：`生产者` 和 `消费者`。最简单的方式是将我们之前引入的 0 线程视为生产者（`producers`）。0 线程的工作是将工作分配给可用的并行工作线程。这些工作线程被称为消费者（`consumers`），它们执行生产者发送给它们的实际工作。


  在 SQL Server 2017 CU3 和 SQL Server 2016 SP2 之前，没有办法区分例如消费者是否在花费时间等待生产者向它们发送工作。所有内容在内部都被记录为
  `CXPACKET` 等待时间。随着 SQL Server 2017 CU3 和 SQL Server 2016 SP2 中的更改，开发团队将并行等待时间分成了两个不同的类别：`CXPACKET`
  和 `CXCONSUMER`。随着这一更改，这两种等待类型的意义也与早期的 SQL Server 版本相比发生了一些变化。


  当消费者线程等待生产者发送行时，就可能发生 `CXCONSUMER` 等待。这或多或少是正常行为，在查看等待统计信息时，在大多数情况下可以安全地忽略。


  `CXPACKET` 等待现在记录时不再包含 `CXCONSUMER` 等待时间，这意味着看到 `CXPACKET` 等待时间不仅表示发生了并行操作，而且较高的等待时间更清楚地表明了并行操作方面的问题（例如，线程在所需的缓冲区或线程同步方面遇到问题）。这实际上意味着，如果你运行的是
  SQL Server 2017 CU3 或 SQL Server 2016 SP2 或更高版本，看到 `CXPACKET` 等待比在较低的 SQL Server
  版本中更清楚地表明并行问题，从而使等待类型更具可操作性，这正是开发团队所期望的。本章前面描述的关于处理高并行等待时间的建议仍然有效，尽管现在它对 `CXPACKET`
  等待时间有更直接的影响。


  ### CXPACKET 概述


  `CXPACKET` 等待类型直接与查询执行期间并行的使用相关。如果你允许查询使用并行运行，你将总是看到 `CXPACKET` 等待。通常这没什么可担心的，所以要避免膝跳反射式地完全关闭并行。相反，专注于调整最大并行度（`Max
  Degree of Parallelism`）和并行开销阈值（`Cost Threshold for Parallelism`）选项，使阈值足够高，以便你的大型查询可以从使用并行中受益，而小型查询不会受到负面影响。同时，通过确保统计信息是最新的来避免偏斜的工作负载。


  如果你运行的是 SQL Server 2017 CU3 或 SQL Server 2016 SP2（或更高版本），`CXPACKET` 等待时间的含义有了一些变化，导致
  `CXPACKET` 等待比在低于这些提到的 SQL Server 版本中更有可能表明发生了并行问题。


  ## SOS_SCHEDULER_YIELD


  与 `CXPACKET` 类似，`SOS_SCHEDULER_YIELD` 是一种等待类型，它会经常出现在你系统上总等待时间的前十名中。同样与 `CXPACKET`
  等待类型一样，`SOS_SCHEDULER_YIELD` 等待时间并不一定表明你的 SQL Server 实例存在问题。一旦你在 SQL Server 实例上开始运行查询，就会出现
  `SOS_SCHEDULER_YIELD` 等待，它们与 SQL Server 调度密切相关。


  ### SOS_SCHEDULER_YIELD 等待类型是什么？


  在我们回答 `SOS_SCHEDULER_YIELD` 等待类型的含义之前，我们必须回到本书的第 1 章“等待统计内部原理”（“Wait Statistics
  Internals”），我们在其中讨论了 SQL Server 调度。还记得 SQLOS 使用自己的协作式非抢占式调度模型来确保 Microsoft Windows
  进程不会中断 SQL Server 自己的进程吗？`SOS_SCHEDULER_YIELD` 等待类型与 SQLOS 的协作式非抢占式调度模型有直接关系。为了使它更容易理解，我包含了图
  5-9，你应该很熟悉它，因为它代表了我们在第 1 章中讨论的调度器。


  ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig9_HTML.jpg](img/340881_2_En_5_Fig9_HTML.jpg)


  图 5-9

  调度器及其阶段和队列


  如果你还记得第 1 章“等待统计内部原理”，工作线程以固定的顺序通过不同的阶段和队列。通常，工作线程在等待资源时从等待者列表（`Waiter List`）开始，然后移动到可运行队列（`Runnable
  Queue`）等待在处理器上运行的机会，最后获得处理器时间来执行其请求，进入“运行中”（`RUNNING`）状态。如果工作线程在“运行中”状态时需要额外的资源，它会移回等待者列表，并开始一次穿过不同队列和阶段的新旅程。


  这种行为有一个例外，它发生在一个工作线程处于“运行中”状态且不需要额外资源来完成其工作时。如果 SQLOS 让一个工作线程在处理器上运行，只要它不需要任何额外的资源，处理器就可能被一个工作线程无限期地“劫持”。为了确保这种情况不会发生，调度器给每个工作线程一个特定的时间片，它们需要在这个时间片内完成其工作。我们称这个时间片为量子（`quantum`），它是一个固定的、不可更改的
  4 毫秒。如果一个工作线程用完了它的量子，它必须让出（`yield`）处理器，然后它移回到可运行队列的末尾。它会跳过等待者列表，因为该工作线程不需要额外的资源。当工作线程等待再次移回处理器时，会记录
  `SOS_SCHEDULER_YIELD` 等待类型。图 5-10 显示了这种行为。


  ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig10_HTML.jpg](img/340881_2_En_5_Fig10_HTML.jpg)


  图 5-10

  工作线程自愿让出处理器


  正如你可能想到的，工作线程一直在自愿让出，尤其是在长时间运行的查询上，因为那里不需要额外的资源。但请记住，`SOS_SCHEDULER_YIELD` 等待类型的等待时间只有在工作线程实际上不得不在可运行队列中等待时才会被记录。如果让出的工作线程前面没有其他工作线程，它将直接移回处理器而不等待（尽管它仍然会经过可运行队列）。为了向你展示一个例子，我在测试的
  SQL Server 上对 `AdventureWorks` 数据库执行了以下查询，那里完全没有并发：


  ```sql

  -- Clear Wait Stats

  DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

  -- Simple select

  SELECT *

  FROM Sales.SalesOrderDetail

  ORDER BY CarrierTrackingNumber DESC;

  -- Check for SOS_SCHEDULER_YIELD waits

  SELECT *

  FROM sys.dm_os_wait_stats

  WHERE wait_type = ''SOS_SCHEDULER_YIELD'';

  ```


  图 5-11 显示了针对 `sys.dm_os_wait_stats` DMV 执行此查询的结果。


  ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig11_HTML.jpg](img/340881_2_En_5_Fig11_HTML.jpg)


  图 5-11




  '
- "# SOS_SCHEDULER_YIELD 等待\n\n如图 5-11 所示，针对`AdventureWorks`数据库的查询在执行过程中遇到了 30 次`SOS_SCHEDULER_YIELD`等待类型。由于当时这是唯一运行的查询，因此它不需要在可运行队列中等待其他工作线程。如果它曾经花费时间等待其他工作线程，`wait_time_ms`列的值将大于\
  \ 0。\n\n正如本节开头所述，`SOS_SCHEDULER_YIELD`等待类型通常无需引起担忧。然而，如果等待时间显著高于你的基线值，这可能是一个需要进行额外研究的原因。在处理`SOS_SCHEDULER_YIELD`等待时，基本上会遇到三种情况，如图\
  \ 5-12 所示。\n\n![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig12_HTML.jpg](img/340881_2_En_5_Fig12_HTML.jpg)\n\
  **图 5-12** SOS_SCHEDULER_YIELD 情况\n\n让我们来看看如何分析和解决 SQL Server CPU 压力问题。\n\n### 降低\
  \ SOS_SCHEDULER_YIELD 等待\n\n如果你遇到高于正常水平的 `SOS_SCHEDULER_YIELD` 等待时间和大量的等待次数，你的系统上可能确实存在与\
  \ CPU 相关的问题。为了降低 `SOS_SCHEDULER_YIELD` 等待，我们将重点关注图 5-12 的右上角部分，该部分显示了大量的等待任务和高等待时间。\n\
  \n如果你遇到 `SOS_SCHEDULER_YIELD` 等待类型的高等待时间，同时伴随大量等待任务，你可以认为你有一个非常繁忙的 SQL Server 实例。工作线程会主动让出处理器，但由于可运行队列中有许多其他线程在等待，它们需要很长时间才能再次回到处理器上。正如我们在前面第\
  \ 1 章“等待统计内部原理”中所讨论的，可运行队列是一个先进先出的列表，这意味着可运行队列中等待的工作线程越多，工作线程通过队列所需的时间就越长。你通常会看到系统上\
  \ SQL Server 进程的 CPU 使用率很高。\n\n为了向你展示此问题的示例，我们将使用 Ostress 实用程序从多个线程同时执行一个特定查询。Ostress\
  \ 实用程序是 SQL Server RML 实用程序的一部分，你可以在此处下载：[`support.microsoft.com/en-us/kb/944837`](https://support.microsoft.com/en-us/kb/944837)。\n\
  \n我们要做的第一件事是将以下查询保存到测试服务器上的 `C:\\sos_scheduler_yield.sql`：\n\n```sql\nWHILE (1=1)\n\
  BEGIN\nSELECT COUNT(*)\nFROM Sales.SalesOrderDetail\nWHERE SalesOrderID BETWEEN\
  \ 45125 AND 54185\nEND;\n```\n\n此查询将对 `AdventureWorks` 数据库的 `Sales.SalesOrderDetail`\
  \ 表中两个 `SalesOrderID` 之间的行数进行计数。它会以无限循环的方式执行此操作。\n\n保存查询后，我们使用以下命令启动 Ostress 实用程序：\n\
  \n```powershell\n\"C:\\Program Files\\Microsoft Corporation\\RMLUtils\\ostress.exe\"\
  \ -E -dAdventureWorks -i\"C:\\sos_scheduler_yield.sql\" -n20 -r1 -q\n```\n\n这将启动\
  \ Ostress 实用程序，它连接到 `AdventureWorks` 数据库并使用 20 个线程执行 `sos_scheduler_yield.sql` 脚本。\n\
  \n一旦我们启动 Ostress，测试 SQL Server 的 CPU 就会立即达到 100%，如图 5-13 所示。\n\n![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig13_HTML.jpg](img/340881_2_En_5_Fig13_HTML.jpg)\n\
  **图 5-13** Ostress 对 CPU 的影响\n\n如图 5-13 所示，CPU 负载来自 `sqlserv#1` 进程，这恰好是我们正在运行 Ostress\
  \ 查询的 SQL Server 实例。\n\n如果我们查询 `sys.dm_os_waiting_tasks` DMV 来检查 `SOS_SCHEDULER_YIELD`\
  \ 等待类型是否是导致高 CPU 使用率的原因，我们会感到惊讶，如图 5-14 所示。\n\n![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig14_HTML.jpg](img/340881_2_En_5_Fig14_HTML.jpg)\n\
  **图 5-14** 未发生 SOS_SCHEDULER_YIELD 等待\n\n这就是 `SOS_SCHEDULER_YIELD` 等待类型的棘手之处，因为它通常不会被\
  \ `sys.dm_os_waiting_tasks` DMV 返回——这是捕获和使用等待统计基线的另一个原因！\n\n为了证明高 CPU 使用率与 `SOS_SCHEDULER_YIELD`\
  \ 等待类型有关，我们必须查看累积等待统计 DMV `sys.dm_os_wait_stats`。我们可以使用以下查询，在运行 Ostress 实用程序时（我们可以在启动\
  \ Ostress 实用程序之前重置 DMV 以保持数值较小）显示按等待时间排序的前五种等待类型：\n\n```sql\nSELECT TOP 5 *\nFROM\
  \ sys.dm_os_wait_stats\nORDER by wait_time_ms DESC;\n```\n\n此查询的结果如图 5-15 所示。\n\n\
  \n\n![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig15_HTML.jpg](img/340881_2_En_5_Fig15_HTML.jpg)\n\
  \n**图 5-15** Ostress 执行期间前五名的等待类型\n\n如你所见，迄今为止排名第一的等待类型是 `SOS_SCHEDULER_YIELD`，其\
  \ `waiting_tasks` 数量和总 `wait_time` 都相当高。\n\n如果你在生产环境的 SQL Server 实例中遇到此问题，首先应关注那些非常小、非常快的查询，就像本示例中执行的那些。这类查询的数量是否增加了？执行这些查询的\
  \ SQL Server 的用户连接数是否增加了？这是你应该立即询问和检查的两个问题。事务量或用户连接数的突然增长都可能导致 `SOS_SCHEDULER_YIELD`\
  \ 等待时间变长。\n\n导致 `SOS_SCHEDULER_YIELD` 高等待的另一个原因，连同非常高的 CPU 使用率，可能是一种称为 `spinlock\
  \ contention`（自旋锁争用）的现象。微软将自旋锁定义为“用于保护数据结构访问的轻量级同步原语”，这是一个非常高级的话题。本章末尾的附录 II 为有兴趣进一步了解自旋锁的读者提供了更多细节。\n\
  \n非常大、非常复杂的查询也可能导致更高的 `SOS_SCHEDULER_YIELD` 等待时间。试着寻找那些消耗大量 CPU 时间且内部包含复杂计算或数据类型转换的活动查询。我常用的一个识别\
  \ CPU 密集型查询的查询，如**代码清单 5-1**所示。\n\n```sql\nSELECT TOP 10\n    QText.TEXT AS 'Query',\n\
  \    QStats.execution_count AS 'Nr of Executions',\n    QStats.total_worker_time/1000\
  \ AS 'Total CPU Time (ms)',\n    QStats.last_worker_time/1000 AS 'Last CPU Time\
  \ (ms)',\n    QStats.last_execution_time AS 'Last Execution',\n    QPlan.query_plan\
  \ AS 'Query Plan'\nFROM sys.dm_exec_query_stats QStats\nCROSS APPLY sys.dm_exec_sql_text(QStats.sql_handle)\
  \ QText\nCROSS APPLY sys.dm_exec_query_plan(QStats.plan_handle) QPlan\nORDER BY\
  \ QStats.total_worker_time DESC;\n```\n*代码清单 5-1: 检测昂贵的 CPU 查询*\n\n在测试 SQL Server\
  \ 上执行**代码清单 5-1**中的查询，结果如**图 5-16**所示。\n\n![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig16_HTML.jpg](img/340881_2_En_5_Fig16_HTML.jpg)\n\
  \n**图 5-16** 昂贵的 CPU 查询\n\n如你所见，我们使用 Ostress 工具执行的查询是执行次数最多、总 CPU 时间最高的查询。这个查询可以作为一个很好的调查起点。也许可以对该查询进行优化或重写，以减少其\
  \ CPU 时间消耗。\n\n另一种可用于识别 CPU 密集型查询的方法是使用查询存储。查询存储提供了一个名为“资源消耗最高的查询”的内置报告，该报告可让你立即按\
  \ CPU 时间进行筛选，如**图 5-17**所示。\n\n![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig17_HTML.jpg](img/340881_2_En_5_Fig17_HTML.jpg)\n\
  \n**图 5-17** 通过查询存储可视化昂贵的 CPU 查询\n\n### SOS_SCHEDULER_YIELD 总结\n\n`SOS_SCHEDULER_YIELD`\
  \ 等待类型在每个 SQL Server 实例上都会始终出现，因为它与 SQL Server 用于授予工作线程处理器访问权限的调度模型直接相关。如果总等待时间或总等待任务数量与你的基线测量相比突然增加，则可能表明存在问题。大多数情况下，`SOS_SCHEDULER_YIELD`\
  \ 等待的大幅增加也意味着 CPU 负载的增加。这种增加可能是由 SQL Server 进程本身引起的，也可能是由 SQL Server 之外需要大量处理器时间的其他进程引起的，从而限制了\
  \ SQL Server 访问处理器的时间。如果 CPU 负载的增加是由 SQL Server 进程负责，你应该尝试将 `SOS_SCHEDULER_YIELD`\
  \ 等待的增加与用户活动的增加关联起来。另一个选择是查询 `sys.dm_exec_query_stats` DMV，如**代码清单 5-1**所示，或使用查询存储来查找那些需要最多处理器时间的查询，并集中优化这些查询。\n\
  \n## THREADPOOL\n\n最 notorious（声名狼藉）的等待类型之一是 `THREADPOOL` 等待类型。与 `CXPACKET` 和 `SOS_SCHEDULER_YIELD`\
  \ 等待类型（即使你的 SQL Server 实例没有遇到任何问题也会出现）不同，高的 `THREADPOOL` 等待时间通常确实表明存在性能问题。正如我们在本书中讨论的其他两种与\
  \ CPU 相关的等待类型一样，`THREADPOOL` 等待类型与 SQL Server 调度工作的方式密切相关。\n\n\n\n### 什么是 `THREADPOOL`\
  \ 等待类型？\n\n如果你在系统上看到 `THREADPOOL` 等待的发生时间远超正常值，并且你的 SQL Server 几乎没有响应，那么你很可能遇到了一个称为线程池匮乏的问题。线程池匮乏发生在没有空闲的工作线程来处理请求时。当这种情况发生时，当前等待分配到工作线程的任务将记录\
  \ `THREADPOOL` 等待类型。\n\nSQL Server 为调度器提供一定数量的工作线程来处理请求。系统可用的工作线程数量取决于处理器数量和处理器架构。表\
  \ 5-1 显示了最多具有 64 个逻辑 CPU 的系统可用的最大工作线程数。\n\n表 5-1. 最大工作线程数\n\n| CPU 数量 | 32 位架构 |\
  \ 64 位架构 |\n| :--- | :--- | :--- |\n| ≤4 | 256 | 512 |\n| 8 | 288 | 576 |\n| 16\
  \ | 352 | 704 |\n| 32 | 480 | 960 |\n| 64 | 736 | 1472 |\n\n你也可以使用以下公式计算可用的最大工作线程数：\n\
  *   逻辑处理器小于或等于 4 个的 32 位系统：256 个工作线程\n*   逻辑处理器多于 4 个的 32 位系统：`256 + ((逻辑处理器数量 −\
  \ 4) × 8)`\n*   逻辑处理器小于或等于 4 个的 64 位系统：512 个工作线程\n*   逻辑处理器多于 4 个的 64 位系统：`512 +\
  \ ((逻辑处理器数量 − 4) × 16)`\n\n尽管 SQL Server 会自动计算可用的最大工作线程数（仅在启动时计算一次），但你可以通过更改 SQL\
  \ Server 实例的处理器属性中的 **最大工作线程数** 选项来覆盖默认值，如图 5-18 所示。默认情况下，**最大工作线程数** 选项的值为 0，这意味着\
  \ SQL Server 将使用前述公式计算并分配可用的最大工作线程数。\n\n![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig18_HTML.jpg](img/340881_2_En_5_Fig18_HTML.jpg)\n\
  图 5-18. SQL Server 实例的处理器配置\n\n你也可以通过运行以下查询来查看分配给 SQL Server 实例的工作线程数：\n```sql\n\
  SELECT\n    max_workers_count\nFROM sys.dm_os_sys_info;\n```\n对于我的拥有两个逻辑处理器的 64\
  \ 位测试 SQL Server，我有 512 个工作线程可用，如图 5-19 所示。\n\n![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig19_HTML.jpg](img/340881_2_En_5_Fig19_HTML.jpg)\n\
  图 5-19. 我测试机上的工作线程数\n\n我经常在网上读到一条关于 `THREADPOOL` 等待的建议，即将 **最大工作线程数** 选项更改为比 SQL\
  \ Server 实例默认值更高的值。我强烈建议不要更改此选项的默认值。将设置更改为比默认获得的工作线程数更高的值，实际上可能会降低 SQL Server 的性能，因为上下文切换会更频繁地发生。另一个不更改设置的原因是，每个工作线程都需要一点内存来运行；对于\
  \ 32 位系统，每个工作线程需要 512 KB，而对于 64 位系统，则是 2048 KB。\n\n### THREADPOOL 示例\n\n让我们从一个在我的测试\
  \ SQL Server 实例上发生 `THREADPOOL` 等待的例子开始。尽管我已经多次警告你确保不要在本书中将任何演示脚本运行于生产环境，但这个例子值得特别提醒。运行本节中的演示脚本可能导致你的\
  \ SQL Server 完全无响应，不接受任何新连接，并最终可能需要重启 SQL Server 服务！请不要在不允许变得无响应的 SQL Server 上运行此脚本！\n\
  \n在这个例子中，我们将再次使用 Ostress 工具来模拟针对测试 SQL Server 实例的并发和负载。首先，我们创建另一个 `.sql` 文件 (`select_rnd.sql`)，其中包含我们将使用\
  \ Ostress 执行的以下查询：\n```sql\nSELECT TOP 1 *\nFROM Sales.SalesOrderDetail\nORDER BY\
  \ NEWID()\nOPTION (MAXDOP 1)\n```\n此查询将从 `AdventureWorks` 数据库的 `Sales.SalesOrderDetail`\
  \ 表中随机选择一行。我包含此查询选项以串行运行此查询是有原因的，稍后我会解释。\n\n现在，在我们启动 Ostress 执行上述查询之前，我们特意将测试 SQL\
  \ Server 上可用的最大工作线程数降低。为此，我们执行以下查询：\n```sql\nEXEC sp_configure 'show advanced options',\
  \ 1;\nGO\nRECONFIGURE\nGO\nEXEC sp_configure 'max worker threads', 128;\nGO\nRECONFIGURE\n\
  GO\n```\n这将把可用的最大工作线程数设置为 128，这是 64 位 SQL Server 实例的最小值。\n\n让我们启动 Ostress 并执行我们之前创建的\
  \ `.sql` 脚本：\n```\n\"C:\\Program Files\\Microsoft Corporation\\RMLUtils\\ostress.exe\"\
  \ -E -dAdventureWorks -i\"C:\\select_rnd.sql\" -n150 -r10 -q\n```\n在这种情况下，我们将启动\
  \ 150 个不同的线程，每个线程将执行 `select_rnd.sql` 文件中的查询 10 次。生成 150 个线程的原因是这个值大于测试 SQL Server\
  \ 实例上可用的最大工作线程数，但又不至于高到我们无法再执行查询。\n\n当脚本运行时，让我们使用 `sys.dm_os_schedulers` DMV 查看正在运行和等待的工作线程数：\n\
  ```sql\nSELECT\n    scheduler_id,\n    current_tasks_count,\n    runnable_tasks_count,\n\
  \    current_workers_count,\n    active_workers_count,\n    work_queue_count\nFROM\
  \ sys.dm_os_schedulers\nWHERE status = 'VISIBLE ONLINE';\n```\n此查询的结果如图 5-20 所示。\n\
  \n![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig20_HTML.jpg](img/340881_2_En_5_Fig20_HTML.jpg)\n\
  图 5-20. 每个调度器的任务和工作线程\n\n这里最重要的列是 `current_workers_count`、`active_workers_count`\
  \ 和 `work_queue_count` 列。`current_workers_count` 列显示与此调度器关联的工作线程数；此数字还包括尚未分配给任务的工作线程。`active_workers_count`\
  \ 列返回处于“*正在运行*”、“*可运行*”或“*已暂停*”状态的工作线程数。`current_workers_count` 和 `active_workers_count`\
  \ 列之间的主要区别在于，`active_workers_count` 是已分配给任务的工作线程数，而 `current_workers_count` 返回所有工作线程。`work_queue_count`\
  \ 列显示当前等待分配工作线程的任务数。如果你在所有调度器上较长时间看到此列的值大于 0，那么你正在经历线程池匮乏。\n\n让我们检查 `sys.dm_os_waiting_tasks`\
  \ DMV 以查找源自用户会话的等待任务。注意，我们过滤掉了所有会话 ID 小于 50 的会话，尽管我在第 2 章“查询 SQL Server 等待统计信息”中告诉过你不要这样做：\n\
  \n\n\n### 线程池等待：诊断与解决\n\nSELECT *\nFROM sys.dm_os_waiting_tasks\nWHERE session_id\
  \ > 50;\n\n如果我们在测试 SQL Server 实例上检查结果，可能会得出没有任务在等待的结论，如图 5-21 所示。然而，该测试 SQL Server\
  \ 实例响应速度极其缓慢，查询任何内容都需要数秒。\n\n![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig21_HTML.jpg](img/340881_2_En_5_Fig21_HTML.jpg)\n\
  \n图 5-21\n\n没有任务在等待\n\n让我们检查一下不过滤会话 ID 的 `sys.dm_os_waiting_tasks` DMV：\n\n```sql\n\
  SELECT *\nFROM sys.dm_os_waiting_tasks;\n```\n\n如图 5-22 所示，`THREADPOOL` 等待并未作为用户会话记录，实际上其会话\
  \ ID 为空。这就是我总是建议不要对 `sys.dm_os_waiting_tasks` DMV 按会话 ID 进行过滤的原因。\n\n![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig22_HTML.png](img/340881_2_En_5_Fig22_HTML.png)\n\
  \n图 5-22\n\n线程池等待\n\n存在相当多的 `THREADPOOL` 等待，等待时间各不有些甚至长达数秒。情况可能比这更糟。图 5-23 显示了我运行\
  \ `Ostress` 工具时尝试连接到测试 SQL Server 实例所遇到的错误。\n\n![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig23_HTML.jpg](img/340881_2_En_5_Fig23_HTML.jpg)\n\
  \n图 5-23\n\n发生超时，SQL Server 无响应\n\n现在我们已经看到了线程池资源枯竭可能引发的问题类型，接下来让我们看看如何降低甚至解决 `THREADPOOL`\
  \ 等待。\n\n### 在发生线程池等待时访问我们的 SQL Server\n\n`THREADPOOL` 等待可能非常难以排查，这主要是因为导致 SQL Server\
  \ 没有可用的工作线程的原因有很多。此外，`THREADPOOL` 等待可能完全锁死您的 SQL Server 实例，使其（以及对其进行排查）几乎不可能连接，正如您在前面的例子中所看到的。\n\
  \n为了确保您不会陷入无法连接到 SQL Server 实例进行排查的境地，您应该采取的第一步是启用专用管理员连接（`DAC`）。如果您还记得第 1 章“等待统计信息内部原理”中关于调度器的部分，您可能会想起一个为\
  \ `DAC` 保留的特殊类型的调度器。这个专用调度器，如图 5-24 所示，是专门为 `DAC` 保留的，并且可以访问其自己的工作线程。\n\n![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig24_HTML.jpg](img/340881_2_En_5_Fig24_HTML.jpg)\n\
  \n图 5-24\n\n专用管理员连接调度器\n\n如果您通过 `DAC` 连接到 SQL Server 实例，您的会话将映射到 `DAC` 调度器。这使得即使所有其他调度器都有大量任务队列，也可能连接并执行查询。\n\
  \n您可以通过执行以下查询来启用 `DAC`：\n\n```sql\nsp_configure 'remote admin connections', 1\n\
  GO\nRECONFIGURE\nGO\n```\n\n如果您想使用 `DAC` 连接到 SQL Server 实例，需要在连接的服务器名称前添加 `ADMIN:`\
  \ 前缀，如图 5-25 所示。您只能在未连接到服务器的情况下，从 SQL Server Management Studio 内部执行新查询时使用 `DAC`\
  \ 进行连接。\n\n![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig25_HTML.jpg](img/340881_2_En_5_Fig25_HTML.jpg)\n\
  \n图 5-25\n\n使用专用管理员连接进行连接\n\n现在您能够使用 `DAC` 连接到 SQL Server 实例，即使 SQL Server 实例不接受任何新连接，您也始终有办法进入。\n\
  \n在启用 `DAC` 后，让我们讨论一下 `THREADPOOL` 等待的一些常见原因。\n\n### 降低由并行度引起的线程池等待\n\n我遇到的最常见的\
  \ `THREADPOOL` 等待原因之一与查询执行期间大量使用并行度有关。在并行查询执行期间，会使用多个工作线程来执行所需的工作。如果您将与并行度相关的配置选项——`最大并行度`\
  \ 和 `并行度的成本阈值`——保留为默认值，可能会导致比预期更多的查询并行运行。根据您的 SQL Server 可访问的处理器数量，以及并行查询期间使用的工作线程数量，单个并行查询可能需要许多工作线程。\n\
  \n如果您遇到这种特定情况的高频高 `THREADPOOL` 等待，通常也会看到许多 `CXPACKET` 等待（有时等待时间很长）。为了展示这种行为，我修改了我们用于生成\
  \ `THREADPOOL` 等待的查询，使其以并行方式执行。在这个例子中，我注释掉了 `MAXDOP` 查询选项：\n\n```sql\nSELECT TOP\
  \ 1 *\nFROM Sales.SalesOrderDetail\nORDER BY NEWID()\n-- OPTION (MAXDOP 1)\n```\n\
  \n对于此示例，我还将 `最大并行度` 配置为其默认值 0，并将 `并行度的成本阈值` 选项设置为 1。这样我就能 100%确定查询将以并行方式运行。我将 `最大工作线程数`\
  \ 选项保留为之前配置的 128。\n\n如果我们现在重复本章前面执行的相同 `Ostress` 测试，执行以下命令，我们应该会在 `sys.dm_os_waiting_tasks`\
  \ DMV 中再次看到 `THREADPOOL` 等待发生，如图 5-26 所示。\n\n![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig26_HTML.jpg](img/340881_2_En_5_Fig26_HTML.jpg)\n\
  \n图 5-26\n\n线程池等待\n\n```shell\n\"C:\\Program Files\\Microsoft Corporation\\RMLUtils\\\
  ostress.exe\" -E -dAdventureWorks -i\"C:\\select_rnd.sql\" -n150 -r10 -q\n```\n\n\
  但这一次，因为我们的测试查询是以并行方式执行的，我们还会在 `sys.dm_os_waiting_tasks` DMV 返回的结果中发现许多 `CXPACKET`\
  \ 等待，如图 5-27 所示。\n\n![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig27_HTML.jpg](img/340881_2_En_5_Fig27_HTML.jpg)\n\
  \n图 5-27\n\nCXPACKET 和线程池等待\n\n如果您在 SQL Server 实例上观察到这种行为，检查您的并行度配置可能是值得的。本章第一节讨论了\
  \ `CXPACKET` 等待以及如何降低它们。另一个可能引导您朝此方向检查的提示是，这种特定情况下的 `CPU` 负载通常高于正常水平。在我的测试 SQL Server\
  \ 实例情况下，所有 `CPU` 都达到了 100%。\n\n\n### 降低由用户连接引起的 THREADPOOL 等待\n\n另一个导致 `THREADPOOL`\
  \ 等待的常见原因是，连接并针对你的 SQL Server 实例执行查询的用户数量突然增加。例如，如果连接到 SQL Server 实例的应用程序使用多个连接，就可能出现此问题。这里的主要问题是，这些连接保持活动状态并持续获取工作线程。\n\
  \n为了举例说明这个问题，我们将再次使用 `Ostress` 连接并针对我的测试 SQL Server 实例执行查询。这次，我们将使用一个不同的 `.sql`\
  \ 文件，保存为 `wait.sql`，作为 `Ostress` 的输入，其内容如下查询：\n\n```\nWAITFOR DELAY '00:05:00'\n\
  ```\n\n这个查询唯一的作用就是等待 5 分钟。5 分钟后，查询结束，连接断开。\n\n让我们使用 `wait.sql` 文件运行 `Ostress`：\n\
  \n```\n\"C:\\Program Files\\Microsoft Corporation\\RMLUtils\\ostress.exe\" -E -dAdventureWorks\
  \ -i\"C:\\wait.sql\" -n120 -r1 -q\n```\n\n我们将 `Ostress` 生成的线程数更改为 120，并再次将 `Max\
  \ Worker Threads` 选项保留设置为 128 个工作线程。\n\n当我们使用以下查询查询 `sys.dm_exec_sessions` DMV 时，可以看到由\
  \ `Ostress` 工具生成的许多新用户会话处于活动状态，如图 5-28 所示。\n\n![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig28_HTML.jpg](img/340881_2_En_5_Fig28_HTML.jpg)\n\
  \n图 5-28\n\n`Ostress` 用户会话\n\n```\nSELECT *\nFROM sys.dm_exec_sessions\nWHERE is_user_process\
  \ = 1;\n```\n\n如果我们查询 `sys.dm_os_waiting_tasks` DMV，可以看到正在发生 `THREADPOOL` 等待，如图\
  \ 5-29 所示。\n\n![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig29_HTML.jpg](img/340881_2_En_5_Fig29_HTML.jpg)\n\
  \n图 5-29\n\n`sys.dm_os_waiting_tasks` DMV 内的 `THREADPOOL` 等待\n\n由过度并行度引起的 `THREADPOOL`\
  \ 等待与用户连接增加引起的 `THREADPOOL` 等待之间的最大区别在于，在后一种情况下，我的测试 SQL Server 实例的 CPU 保持较低水平，如图\
  \ 5-30 所示。\n\n![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig30_HTML.jpg](img/340881_2_En_5_Fig30_HTML.jpg)\n\
  \n图 5-30\n\nCPU 使用率\n\nCPU 使用率历史图表中的小尖峰是由启动 `Ostress` 工具引起的。之后，CPU 保持在持续较低的使用百分比。\n\
  \n解决由用户连接增加引起的 `THREADPOOL` 等待应从源头着手。用户连接来自哪里？这些连接在做什么？我遇到过一些情况，应用程序在一次更新后突然使用了数百个活动用户连接，而\
  \ SQL Server 实例并未设计用于处理如此大量并发的活动连接，从而导致了 `THREADPOOL` 等待。\n\n请记住，用户连接只有在实际运行查询时才应引起\
  \ `THREADPOOL` 等待。连接到 SQL Server 实例但未执行任何操作的用户连接不应成为 `THREADPOOL` 等待的原因。\n\n此外，针对数据库的许多不同活动用户连接可能会在行或表上创建许多锁。如果你注意到与锁相关的高等待时间与\
  \ `THREADPOOL` 等待同时出现，问题可能是正在发生大量的锁和阻塞。在这种情况下，你应该尝试找出导致锁等待的查询，并查看是否可以优化它们。我们将在第\
  \ 7 章“与锁相关的等待类型”中讨论与锁相关的等待类型以及你可以采取的措施。\n\n### THREADPOOL 总结\n\n`THREADPOOL` 等待是你\
  \ SQL Server 实例上最令人担忧的等待类型之一。它们的发生是因为没有足够的空闲工作线程可用于处理请求，因此请求工作线程的任务将不得不等待，直到有新的工作线程可用。值得庆幸的是，`THREADPOOL`\
  \ 等待并不常见，因为它们有可能将你完全锁定在 SQL Server 实例之外。在这些情况下，连接的唯一方法是使用 `Dedicated Administrator\
  \ Connection`（或 `DAC`），我强烈建议你在所有 SQL Server 实例上启用此功能。\n\n过度使用并行度和活动用户连接的大幅增加是 `THREADPOOL`\
  \ 等待两个最常见的原因。前者与我们之前讨论的 `CXPACKET` 等待类型有直接关系，因此解决 `CXPACKET` 等待类型的方法也有助于解决 `THREADPOOL`\
  \ 等待。后者则需要深入调查为什么活动用户连接数量突然增加。也许它们是应用程序连接到 SQL Server 实例时出现错误的结果。我们还简要提及了锁和阻塞行为作为\
  \ `THREADPOOL` 等待的可能原因。我们将在第 7 章“与锁相关的等待类型”中更深入地探讨如何解决与锁相关的等待。\n\n"
- '# 6. 与 IO 相关的等待类型


  在本章中，我们将从最广泛的意义上探讨与 IO 相关的等待类型。我选择了与系统存储、内存或网络组件相关的等待类型。有人可能会争辩说，大多数等待类型都符合这一类别，这很可能是对的，但为了防止本章涵盖本书中
  90% 的等待类型，我必须谨慎选择。我认为本章中的等待类型与存储、内存或网络有直接关系，但不直接与 SQL Server 中的功能或概念相关。例如，`PAGEIOLATCH_xx`
  等待类型经常与存储相关，但它们未包含在本章中。原因在于它们也是一种自旋锁等待类型，并且我认为由于其在 SQL Server 中的功能，自旋锁等待类型值得单独一章讨论。


  IO 相关组件的性能对 SQL Server 极其重要。SQL Server 几乎每个部分都以某种方式与这些组件交互，无论是需要从磁盘读取到内存中的数据页，还是需要通过网络传输给最终用户的查询结果。如果这些组件中的任何一个无法处理你在
  SQL Server 实例上生成的工作负载，或者配置不当，你的性能就会下降。


  本章中的等待类型可以帮助你追踪是哪个 IO 组件拖慢了速度，以便你采取适当措施预防或解决与性能相关的事件。


  ## ASYNC_IO_COMPLETION


  `ASYNC_IO_COMPLETION` 等待类型是一种相当常见的等待类型，每当 SQL Server 在存储子系统上执行文件相关操作并必须等待其完成时发生。当你执行与存储子系统交互的操作（如备份）时，会经常看到这种等待类型。与大多数等待类型一样，如果你看到这种等待类型出现，并不一定意味着你的存储子系统有问题。只有当等待时间相比你的基线值（我们在第
  4 章“构建可靠的基线”中讨论过）超出预期时，它才会成为问题。



  ### 什么是 ASYNC_IO_COMPLETION 等待类型？


  如果我们在 Books Online (BOL) 中查询 `ASYNC_IO_COMPLETION` 等待类型，会看到如下定义：“当任务等待 I/O 完成时发生。”这是一个相当简短且模糊的定义。让我们增加一些细节。当任务等待与存储相关的操作完成时，就会发生
  `ASYNC_IO_COMPLETION` 等待。该任务由 SQL Server 发起和监控。图 6-1 以视觉方式展示了这种等待类型。


  ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig1_HTML.jpg](img/340881_2_En_6_Fig1_HTML.jpg)


  图 6-1


  发生的 ASYNC_IO_COMPLETION 等待


  只要与存储相关的操作正在运行，`ASYNC_IO_COMPLETION` 等待时间就会被记录。正如你所想的那样，你的存储子系统越快，`ASYNC_IO_COMPLETION`
  等待时间就越低。


  正如我之前所说，通常 `ASYNC_IO_COMPLETION` 等待无需担心。它们会在许多需要访问存储子系统的 SQL Server 操作（如备份或创建新数据库）期间正常发生。但是，如果与你的基线测量值相比，等待时间超出预期，它可能就成为一个值得关注的原因。


  ### ASYNC_IO_COMPLETION 示例


  让我们通过一个示例来生成 `ASYNC_IO_COMPLETION` 等待。我们不需要任何额外的工具；仅仅运行一个数据库备份就会触发 `ASYNC_IO_COMPLETION`
  等待。


  在这个例子中，我将在我的测试服务器上执行 `AdventureWorks` 数据库的备份。


  为了执行此操作，我将使用清单 6-1 中的查询。此查询将重置 `sys.dm_os_wait_stats` DMV，执行数据库备份，然后查询 `sys.dm_os_wait_stats`
  DMV 中的 `ASYNC_IO_COMPLETION` 等待。


  ```

  USE [master]

  GO

  DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

  BACKUP DATABASE [AdventureWorks]

  TO  DISK = N''F:\Backup\aw_backup.bak''

  WITH

  NAME = N''AdventureWorks-Full Database Backup'',

  STATS = 2;

  GO

  SELECT *

  FROM sys.dm_os_wait_stats

  WHERE wait_type = ''ASYNC_IO_COMPLETION'';

  清单 6-1

  生成 ASYN_IO_COMPLETION 等待

  ```


  在我的测试 SQL Server 实例上，备份操作耗时 1 秒。图 6-2 显示了清单 6-1 中查询的结果。


  ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig2_HTML.jpg](img/340881_2_En_6_Fig2_HTML.jpg)


  图 6-2


  ASYNC_IO_COMPLETION 等待时间


  如你所见，在数据库备份的几乎整个持续时间内，都记录了 `ASYNC_IO_COMPLETION` 等待。


  ### 降低 ASYNC_IO_COMPLETION 等待


  高 `ASYNC_IO_COMPLETION` 等待时间的一个常见原因是数据库备份，正如你刚才在示例中看到的。如果你想查明你的 `ASYNC_IO_COMPLETION`
  等待是否因正在执行备份而发生，请尝试查找同时发生的与备份相关的等待。


  如果我们稍微修改清单 6-1 中最后一个 `sys.dm_os_waiting_tasks` 查询，我们将看到 DMV 返回与备份相关的等待类型：


  ```

  SELECT *

  FROM sys.dm_os_wait_stats

  WHERE wait_type IN

  (

  ''ASYNC_IO_COMPLETION'',

  ''BACKUPIO'',

  ''BACKUPBUFFER''

  );

  ```


  图 6-3 显示了经过此修改后的清单 6-1 查询结果。


  ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig3_HTML.jpg](img/340881_2_En_6_Fig3_HTML.jpg)


  图 6-3


  ASYNC_IO_COMPLETION 等待与备份相关等待一起出现


  如果你看到两者同时发生，很可能是数据库备份导致了你的 `ASYNC_IO_COMPLETION` 等待。


  另一种可能降低 `ASYNC_IO_COMPLETION` 等待的方法是配置 `即时文件初始化`。`即时文件初始化` 在 Windows 2003 中引入，通过消除将文件清零（在文件可以使用前向文件内写入零）的需要，极大地加速了在磁盘上分配空间的过程。这不会影响你的备份速度，但在创建数据库、向数据库添加文件或恢复数据库时，会提高性能。`即时文件初始化`
  默认情况下不启用，除非你是在具有本地管理员权限的账户下运行 SQL Server 服务。在 SQL Server 2016 的安装过程中，微软增加了一个额外的复选框，用于在
  SQL Server 安装期间启用 `即时文件初始化`，如图 6-4 所示。


  ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig4_HTML.jpg](img/340881_2_En_6_Fig4_HTML.jpg)


  图 6-4


  SQL Server 2016 安装程序中的“授予 SQL Server 数据库引擎服务执行卷维护任务权限”复选框


  如果你在安装 SQL Server 2016 或更高版本时没有启用“授予 SQL Server 数据库引擎服务执行卷维护任务权限”复选框，或者安装的是较低版本的
  SQL Server，则需要在安装后手动配置 `即时文件初始化`。配置 `即时文件初始化` 的方法是通过在 SQL Server 运行的计算机上设置本地安全策略，将你的
  SQL Server 服务运行所用的账户添加进去。


  你可以通过在“控制面板”的“管理工具”下打开“本地安全策略”MMC 来找到此策略。展开“本地策略”➤“用户权限分配”文件夹，向下滚动到“执行卷维护任务”策略，如图
  6-5 所示。


  ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig5_HTML.jpg](img/340881_2_En_6_Fig5_HTML.jpg)


  图 6-5


  “执行卷维护任务”本地策略


  双击该策略将其打开，然后添加你的 SQL Server 服务运行所用的账户。最后一步是重启你的 SQL Server 服务。重启后，SQL Server 就可以使用
  `即时文件初始化` 了。


  为了向你展示 `即时文件初始化` 的影响，我使用了清单 6-2 中的查询。此查询先清空 `sys.dm_os_wait_stats` DMV，然后创建一个包含
  500 MB 数据文件和 100 MB 日志文件的新数据库。接着查询 `sys.dm_os_wait_stats` DMV 中的 `ASYNC_IO_COMPLETION`
  等待类型。



  ## ASYNC_IO_COMPLETION


  ```

  DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

  CREATE DATABASE [IO_test]

  ON  PRIMARY

  (

  NAME = N''IO_test'', FILENAME = N''E:\Data\IO_test.mdf'' , SIZE = 512000KB , FILEGROWTH
  = 10%

  )

  LOG ON

  (

  NAME = N''IO_test_log'', FILENAME = N''E:\Log\IO_test_log.ldf'' , SIZE = 102400KB
  , FILEGROWTH = 10%

  );

  GO

  SELECT *

  FROM sys.dm_os_wait_stats

  WHERE wait_type = ''ASYNC_IO_COMPLETION'';

  清单 6-2

  测量即时文件初始化对 ASYNC_IO_COMPLETION 等待的影响

  ```


  图 6-6 显示了配置即时文件初始化前后的等待统计信息。


  ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig6_HTML.jpg](img/340881_2_En_6_Fig6_HTML.jpg)


  图 6-6：即时文件初始化对 `ASYNC_IO_COMPLETION` 等待的影响。


  即使对于这个相对较小的数据库，使用即时文件初始化带来的收益也相当可观，正如你在等待时间的差异中所看到的那样。在启用即时文件初始化之前，清单 6-2 中的查询耗时
  11 秒完成；更改后，它降至 2 秒。


  如果你已配置即时文件初始化，并且检查确认在看到高 `ASYNC_IO_COMPLETION` 等待时没有备份正在执行，那么问题可能出在你的存储子系统上。分析潜在存储问题的一个好方法是使用
  Perfmon 来监控数据库所在磁盘的 `Avg. Disk/sec Read` 和 `Avg. Disk/sec Write` 计数器，如图 6-7 所示。这些计数器显示了对磁盘的读写延迟（以秒为单位）（这意味着
  0.005 的值代表 5 毫秒）。SQL Server 在最大延迟为 5 毫秒时性能最佳。超过 20 毫秒，延迟将导致明显的性能下降。延迟值越高，存储相关等待类型的等待时间就越长。


  ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig7_HTML.jpg](img/340881_2_En_6_Fig7_HTML.jpg)


  图 6-7：`Avg. Disk sec/Read` 和 `Avg. Disk sec/Write` Perfmon 计数器。


  关于存储性能，请谨慎下结论。在你断定存储子系统是瓶颈之前，务必与你的存储管理员（如果有）沟通，并向其展示你的测量结果。存储是存储管理员的领域，他/她可以帮助你分析和解决性能问题。


  ### ASYNC_IO_COMPLETION 总结


  当你在 SQL Server 实例内部执行与存储子系统相关的操作时（最显著的是数据库备份和创建新数据库），会发生 `ASYNC_IO_COMPLETION` 等待类型。虽然
  `ASYNC_IO_COMPLETION` 等待完全正常，但如果等待时间高于正常值，则可能表明存在存储相关问题。在你跑去寻找存储管理员之前，请确保确实存在性能问题。一种可能的检查方法是查看你的存储延迟，因为高延迟值也会影响
  `ASYNC_IO_COMPLETION` 等待时间。同时，请检查较高的 `ASYNC_IO_COMPLETION` 等待时间是否与正在执行的数据库备份直接相关。降低
  `ASYNC_IO_COMPLETION` 等待时间的一个绝佳方法是启用即时文件初始化，方法是将你的 SQL Server 服务账户添加到 Perfmon 卷维护任务本地策略中。


  ## ASYNC_NETWORK_IO


  与 `ASYNC_IO_COMPLETION` 等待类型类似，`ASYNC_NETWORK_IO` 等待类型也与吞吐量有关。但区别在于，`ASYNC_NETWORK_IO`
  等待类型与你的 SQL Server 实例和客户端之间网络连接的吞吐量相关。同样，看到这种特定等待类型的等待时间并不一定意味着存在网络相关问题，因为 `ASYNC_NETWORK_IO`
  等待总是会发生，即使你在 SQL Server 本身查询其实例时也是如此。


  ### 什么是 ASYNC_NETWORK_IO 等待类型？


  `ASYNC_NETWORK_IO` 等待通常在客户端应用程序处理查询结果速度不够快时，或者当你存在网络相关性能问题时发生。前者在大多数情况下是最可能的原因，因为许多应用程序逐行处理
  SQL Server 结果，或者根本无法处理大量数据。这迫使 SQL Server 等待通过网络发送查询结果。在 SQL Server 等待发送请求的数据期间，会记录
  `ASYNC_NETWORK_IO` 等待类型。另一种可能发生 `ASYNC_NETWORK_IO` 等待的情况是，当你使用链接服务器查询远程数据库时。图 6-8
  展示了这一过程的图形化表示。


  ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig8_HTML.jpg](img/340881_2_En_6_Fig8_HTML.jpg)


  图 6-8：`ASYNC_NETWORK_IO`。


  ### ASYNC_NETWORK_IO 示例


  展示 `ASYNC_NETWORK_IO` 等待类型的示例不需要复杂的测试环境。清单 6-3 显示了一个查询，当从另一台计算机使用 SQL Server Management
  Studio 针对我的测试 SQL Server 实例运行时，它将生成 `ASYNC_NETWORK_IO` 等待，这应该就足够了。该查询将先清除 `sys.dm_os_wait_stats`
  DMV，然后对 `AdventureWorks` 数据库执行实际查询。最后一句将向我们展示 `ASYNC_NETWORK_IO` 等待类型的等待时间。


  ```

  DBCC SQLPERF (''sys.dm_os_wait_stats'', CLEAR);

  SELECT *

  FROM Person.Person;

  SELECT *

  FROM sys.dm_os_wait_stats

  WHERE wait_type = ''ASYNC_NETWORK_IO'';

  清单 6-3

  生成 ASYNC_NETWORK_IO 等待

  ```


  图 6-9 显示了 `ASYNC_NETWORK_IO` 等待类型的等待时间。


  ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig9_HTML.jpg](img/340881_2_En_6_Fig9_HTML.jpg)


  图 6-9：`ASYNC_NETWORK_IO` 等待时间。


  在此示例中，针对 `AdventureWorks` 数据库的查询结果无法被 SQL Server Management Studio 应用程序以 SQL Server
  实例提供结果的同样速度进行处理，因此发生了 `ASYNC_NETWORK_IO` 等待。



  ### 降低 ASYNC_NETWORK_IO 等待


  降低 `ASYNC_NETWORK_IO` 等待最“简单”的方法之一，是识别那些会向应用程序返回大型结果集的查询。例如，如果我们修改查询使其只返回前 100 行，SQL
  Server Management Studio 可能就能跟上返回给它的信息：


  ```

  DBCC SQLPERF (''sys.dm_os_wait_stats'', CLEAR);

  SELECT TOP 100 *

  FROM Person.Person;

  SELECT *

  FROM sys.dm_os_wait_stats

  WHERE wait_type = ''ASYNC_NETWORK_IO'';

  ```


  此修改后的等待时间可参见图 6-10。


  ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig10_HTML.jpg](img/340881_2_En_6_Fig10_HTML.jpg)


  图 6-10

  修改查询后的 ASYNC_NETWORK_IO 等待时间


  如你所见，这次我们没有遇到任何 `ASYNC_NETWORK_IO` 等待。SQL Server Management Studio 能够跟上返回的结果，因此我们查询的
  SQL Server 实例不必延迟向客户端发送结果。


  限制返回结果的另一种方法，是通过使用 `WHERE` 子句过滤掉应用程序根本不使用的信息。更小的结果集将导致更低的 `ASYNC_NETWORK_IO` 等待时间。


  如果你认为 `ASYNC_NETWORK_IO` 等待并非由返回应用程序的大型结果集或应用程序处理结果的速度引起，那么也有可能是你的网络配置拖慢了你。在这种情况下，你应该首先检查你的网络利用率。遗憾的是，Performance
  Monitor 中没有一个计数器能直接显示网络利用率而无需你进行一些计算。相反，你可以使用任务管理器的“联网”选项卡来查看你的网卡利用率，如图 6-11 所示。


  ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig11_HTML.jpg](img/340881_2_En_6_Fig11_HTML.jpg)


  图 6-11

  任务管理器网络利用率


  如果你在遇到高于正常的 `ASYNC_NETWORK_IO` 等待时间的同时，注意到网络利用率很高，那么可能是网络拖慢了你。在这种情况下，与你的网络管理员沟通可能是个好主意。通常，网络配置包含许多部分，如交换机、路由器、防火墙、网线、驱动程序、固件、操作系统的潜在虚拟化等等。所有这些部分都可能降低你的网络吞吐量，并可能是导致
  `ASYNC_NETWORK_IO` 等待的潜在原因。


  ### ASYNC_NETWORK_IO 总结


  `ASYNC_NETWORK_IO` 等待类型发生在应用程序通过网络从 SQL Server 实例请求查询结果，且无法足够快地处理返回的结果时。看到 `ASYNC_NETWORK_IO`
  等待发生是完全正常的，但高于正常的等待时间可能是由返回的查询结果发生变化或网络相关问题引起的。降低与应用程序相关的 `ASYNC_NETWORK_IO` 等待时间，可以通过减少返回给应用程序的行数和/或列数来实现。


  ## CMEMTHREAD


  `CMEMTHREAD` 等待类型与内存相关，表明某些 SQL Server 相关的内存对象存在压力。这些内存对象为 SQL Server 的各个部分（如缓冲区缓存和计划缓存）分配内存。每当发生
  `CMEMTHREAD` 等待时，意味着多个线程试图同时访问同一个内存对象。


  ### 什么是 CMEMTHREAD 等待类型？


  要解释 `CMEMTHREAD` 等待类型的产生机制，我们需要更深入地了解一些编程术语，特别是术语 *互斥*、*临界区* 和 *线程安全*。这三个概念在 `CMEMTHREAD`
  等待类型的产生中扮演着直接角色。


  临界区由一段访问共享资源的代码组成，该资源一次只能由一个线程访问。在我们的例子中，共享资源将是一个 SQL Server 内存对象。SQL Server 内存对象一次只能由一个线程访问，以确保不会发生内存对象损坏。因为有许多线程想要访问内存对象，所以我们必须使用一种方法来确保一次只有一个线程获得访问权。这种方法称为互斥。SQL
  Server 使用一个互斥体（Mutex）对象，以确保并发线程在访问内存对象时不会同时处于其临界区内。互斥体通过将线程对内存对象的访问串行化来实现这一点。只有一个线程可以成为互斥体对象的所有者，当一个线程拥有所有权时，它就可以访问共享资源。当该线程完成操作后，互斥体对象将移交给队列中的下一个线程。通过使用这些对象，我们创建了线程安全的代码，其中多个线程不会并发访问内存对象。图
  6-12 展示了这种情况。


  ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig12_HTML.jpg](img/340881_2_En_6_Fig12_HTML.jpg)


  图 6-12

  线程等待互斥体对象以访问共享资源


  一个简化的行为例子是，当你和其他一大群人正在等待一个唯一的取票机购买摇滚乐队演唱会的门票。在这个例子中，取票机是共享资源，一次只能由一个人访问。当我们到达取票机时，我们可以拿到一张票，而我们后面的人必须等到轮到他们的时间。在我们买完票后，队列中的下一个人获得取票机的访问权。


  我们也可以在 SQL Server 中观察这种行为，但要做到这一点，我们需要使用调试器（如 WinDbg）。图 6-13 显示了 SQL Server 中的一个线程如何等待互斥体，因为对内存对象的访问权被授予了另一个线程。为了捕获此图像，我使用了一个扩展事件会话，该会话在发生
  `CMEMTHREAD` 等待时创建了一个 SQL Server 小型转储。然后我使用 WinDbg 打开小型转储并返回了堆栈。


  ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig13_HTML.jpg](img/340881_2_En_6_Fig13_HTML.jpg)


  图 6-13

  小型转储中发生 CMEMTHREAD 等待的示例


  这里重要的行是 `SOS_UnfairMutexPair::LongWait`，它产生了 `CMEMTHREAD` 等待，因为我们在此监控的线程必须等待另一个当前拥有内存对象访问权的线程。其后的
  `SOS_UnfairMutexPair::AcquirePair` 表示该线程获得了互斥体，紧接着是访问由 `CMemThread<CmemObj>::Alloc`
  表示的内存对象。




  ### 降低 CMEMTHREAD 等待


  由于 SQL Server 中存在许多可能产生 `CMEMTHREAD` 等待的不同内存对象，因此降低 `CMEMTHREAD` 等待时间的解决方案也有很多，具体取决于被访问的内存对象。


  发生 `CMEMTHREAD` 等待的一个更常见情况是，系统正在执行大量短小的、并发的、即席查询。每次执行一个无法参数化的即席查询时，查询优化器都会为该查询生成一个新的执行计划。所有这些新的执行计划都需要被输入到过程缓存中，并且会访问一个用于分配缓存描述符的内存对象。由于该内存对象是线程安全的，如果插入速率足够高，就可能出现
  `CMEMTHREAD` 等待。如果你怀疑 `CMEMTHREAD` 等待是由于即席查询导致的，一个很好的切入点就是检查过程缓存。清单 6-4 中的查询将为你提供有关过程缓存中执行计划数量的信息。


  ```

  SELECT

  objtype,

  COUNT_BIG (*) AS ''Total Plans'',

  SUM(CAST(size_in_bytes AS DECIMAL(12,2)))/1024/1024 AS ''Size (MB)''

  FROM sys.dm_exec_cached_plans

  GROUP BY objtype;

  清单 6-4

  查询过程缓存

  ```


  该查询的结果应如图 6-14 所示，尽管在你的系统上数字会有所不同。


  ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig14_HTML.jpg](img/340881_2_En_6_Fig14_HTML.jpg)


  图 6-14

  查询过程缓存的结果


  我们应该关注即席执行计划的数量。如果你看到这个数字在快速增长，并且遇到 `CMEMTHREAD` 等待，那么分析其中一些即席查询可能是值得的。如果可能，尝试优化查询以生成可重用的计划。如果你的应用程序使用了许多动态查询，那么请尝试使用
  `sp_executesql` 系统存储过程，而不是 `EXECUTE` (`EXEC`) 命令。使用 `EXEC` 命令很可能只会生成使用一次的计划。


  Microsoft 已经在 SQL Server 2005 SP2 中针对此问题发布了各种修复（最显著的是跨 CPU 分区某些内存对象），使得如今这种情况变得不那么常见。即使你使用的是比
  SQL Server 2005 更新的版本，升级到最新的可用 Service Pack 可能也是一个好主意，因为每个 SQL Server 版本中都有各种与内存相关的错误修复。


  ### CMEMTHREAD 总结


  `CMEMTHREAD` 等待类型是一种与内存相关的等待类型。当多个线程尝试访问一次只能由一个线程访问的内存对象时，就会发生 `CMEMTHREAD` 等待。其他线程等待轮到自己访问内存对象的时间被记录为
  `CMEMTHREAD` 等待时间。发生 `CMEMTHREAD` 等待的一个更常见情况是系统使用大量即席查询。每次生成新的执行计划时，SQL Server 都会访问一个内存对象；如果生成了许多执行计划，这可能会导致想要访问该内存对象的线程排队，从而导致
  `CMEMTHREAD` 等待。


  ## IO_COMPLETION


  与 `ASYNC_IO_COMPLETION` 等待类型类似，当 SQL Server 正在等待存储相关操作完成时，会发生 `IO_COMPLETION` 等待。同样，与
  `ASYNC_IO_COMPLETION` 等待类型类似，看到 `IO_COMPLETION` 等待类型的等待时间很长，并不一定意味着你的存储系统有问题。`IO_COMPLETION`
  等待在 SQL Server 实例运行期间会正常发生，只有当等待时间比正常情况高出很多时，才应该引起关注。


  ### IO_COMPLETION 等待类型是什么？


  `ASYNC_IO_COMPLETION` 等待类型在执行数据库相关操作（如数据库备份）时被记录，而 `IO_COMPLETION` 等待则在涉及非数据页时发生，例如还原事务日志备份或访问位图分配页（如
  GAM 页）。当执行需要对存储子系统进行读写操作（例如 `Merge Join` 运算符）的查询时，也可能发生 `IO_COMPLETION` 等待。


  ### IO_COMPLETION 示例


  让我们通过还原一个事务日志备份来生成一些 `IO_COMPLETION` 等待。在这个例子中，我们将再次使用 `AdventureWorks` 数据库。清单 6-5
  中的查询将执行 `AdventureWorks` 数据库的完整备份，进行一些更改，然后执行事务日志备份。完成后，我们将再次还原完整备份，清除 `sys.dm_os_wait_stats`
  DMV，还原事务日志备份，并检查 `IO_COMPLETION` 等待。


  ```

  -- 确保 AdventureWorks 处于完整恢复模式

  ALTER DATABASE AdventureWorks SET RECOVERY FULL

  GO

  -- 首先执行完整备份

  -- 否则完整恢复模式将不会生效

  BACKUP DATABASE [AdventureWorks]

  TO  DISK = N''F:\Backup\AW_Full.bak''

  GO

  -- 对 AW 数据库进行一些更改

  USE AdventureWorks

  GO

  UPDATE Person.Address

  SET City = ''Portland''

  WHERE City = ''Bothell''

  -- 备份事务日志

  BACKUP LOG [AdventureWorks]

  TO  DISK = N''F:\Backup\AW_Log.trn''

  GO

  -- 使用 NORECOVERY 还原之前的完整备份

  USE [master]

  GO

  RESTORE DATABASE [AdventureWorks]

  FROM  DISK = N''F:\Backup\AW_Full.bak''

  WITH  NORECOVERY, REPLACE

  GO

  -- 清除 sys.dm_os_wait_stats

  dbcc sqlperf (''sys.dm_os_wait_stats'', CLEAR)

  -- 还原上次的事务日志备份

  RESTORE LOG [AdventureWorks] FROM  DISK = N''F:\Backup\AW_Log.trn''

  GO

  -- 检查 IO_COMPLETION 等待

  SELECT *

  FROM sys.dm_os_wait_stats

  WHERE wait_type = ''IO_COMPLETION''

  清单 6-5

  生成 IO_Completion 等待

  ```


  在我的测试系统上，针对 `sys.dm_os_wait_stats` DMV 的此查询结果如图 6-15 所示。


  ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig15_HTML.jpg](img/340881_2_En_6_Fig15_HTML.jpg)


  图 6-15

  IO_COMPLETION 等待


  我们使用清单 6-5 中的查询只修改了几个记录，因此由于事务日志备份还原得很快，总等待时间相当低。


  `IO_COMPLETION` 等待时间也可能在启动数据库后发生，例如在重新启动 SQL Server 服务之后。这意味着在重新启动或故障转移后，你应该预期会出现
  `IO_COMPLETION` 等待；这些都是完全正常的。同样，如果数据库启用了 AUTO_CLOSE（Express 版本中的默认设置）并且数据库正在启动，你也应该会经历
  `IO_COMPLETION` 等待。


  ### 降低 IO_COMPLETION 等待


  大多数情况下，`IO_COMPLETION` 等待不应该引起关注。当它们远高于基线中的等待时间时，你应该像在“降低 `ASYNC_IO_COMPLETION`”一节中描述的那样，分析存储子系统的性能。虽然某些查询操作也可能导致
  `IO_COMPLETION` 等待，但它们通常不是导致等待时间高于正常水平的原因。


  ### IO_COMPLETION 总结


  与 `ASYNC_IO_COMPLETION` 等待类型类似，当访问存储子系统时，会发生 `IO_COMPLETION` 等待。当 SQL Server 正在等待非数据页操作（如事务日志还原操作或读取位图页，例如
  GAM 页）完成时，会发生 `IO_COMPLETION` 等待。看到 `IO_COMPLETION` 类型的等待是完全正常的，除非等待时间远高于基线值，否则这些通常不需要深入分析。在那些情况下，首先关注存储子系统的性能（尤其是延迟）。


  ## LOGBUFFER 和 WRITELOG


  我在本节中合并了 `LOGBUFFER` 和 `WRITELOG`。这是因为这两种等待类型彼此密切相关。两者都与事务日志和存储子系统有关。




  ### 什么是 LOGBUFFER 和 WRITELOG 等待类型？


  要理解 `LOGBUFFER` 和 `WRITELOG` 这些等待类型代表什么，我们需要对 SQL Server 如何写入事务日志有所了解。简而言之，每当我们在数据库内部更改或添加数据时，会发生以下事件：


  1.  数据所在的数据页在缓冲区缓存中被修改；如果该页尚未在缓冲区缓存中，则会首先将其读入缓冲区缓存。

  2.  该数据页将在缓冲区缓存中被标记为“脏页”。

  3.  表示此次修改的日志记录被保存在日志缓冲区中。

  4.  发生日志刷新（这可能出于多种原因，我们稍后讨论），将日志记录从日志缓冲区写入事务日志。

  5.  脏数据页被写入数据文件。


  为了展示这一行为，我提供了图 6-16。


  ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig16_HTML.jpg](img/340881_2_En_6_Fig16_HTML.jpg)

  **图 6-16**

  **事务移动过程**


  代表脏数据页移动的操作以及将日志记录写入事务日志的操作以虚线显示。我特意这样做是为了说明这两个操作并不一定会直接发生。


  如你所知，脏数据页首先在缓冲区缓存中更新，只有在发生检查点操作时才会写入数据文件。这意味着即使在你的事务提交后，脏页仍可能驻留在内存中。


  对于日志缓冲区中的日志记录，情况则不同。一旦你的事务提交，并且该事务在日志缓冲区中有活动的日志记录，该日志缓冲区内的所有日志记录都会被写入（或刷新）到磁盘上的事务日志中。但这不仅仅发生在事务提交时。日志缓冲区的固定大小为
  60 KB，一旦日志缓冲区已满，它将刷新其中的所有记录到事务日志。


  现在让我们把本节讨论的两种等待类型加入这个故事中。每当 SQL Server 正在将日志缓冲区的内容刷新到磁盘上的事务日志时，就会发生 `WRITELOG` 等待类型。当在日志缓冲区中插入日志记录时，如果插入时
  SQL Server 必须等待日志缓冲区中的可用空间，则会发生 `LOGBUFFER` 等待类型。我在图 6-17 中它们可能产生的位置添加了这两种等待类型。


  ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig17_HTML.jpg](img/340881_2_En_6_Fig17_HTML.jpg)

  **图 6-17**

  **事务移动以及 LOGBUFFER 和 WRITELOG 等待类型**


  你现在可能能看出这两种等待类型是如何关联的了。每当发生长时间的 `WRITELOG` 等待时，如果正在将日志记录写入磁盘上事务日志的进程处理速度跟不上日志记录进入日志缓冲区的速度，你很可能也会看到
  `LOGBUFFER` 等待。


  这种情况经常发生在具有大量并发数据修改的系统上。这导致需要写入磁盘的事务量很高。另一个常见原因是事务日志文件所在的存储子系统的性能。如果存储子系统性能不佳，你的
  `WRITELOG` 等待时间将会增加，并且如果事务量足够高，还有可能发生 `LOGBUFFER` 等待。


  事务日志的性能对整个数据库的性能至关重要。缓慢的事务日志性能将对你在数据库内部执行的每一个更改产生影响，因为每一次修改都必须在提交前写入事务日志。


  ### LOGBUFFER 和 WRITELOG 示例


  为了给你一个 `LOGBUFFER` 和 `WRITELOG` 等待发生的示例，我使用清单 6-6 中的脚本创建一个新数据库。


  ```

  USE master

  GO

  -- Create demo database

  CREATE DATABASE [trans_demo]

  ON PRIMARY

  (

  NAME = N''trans_demo'', FILENAME = N''D:\Data\trans_demo.mdf'' , SIZE = 153600KB
  , FILEGROWTH = 10%

  )

  LOG ON

  (

  NAME = N''trans_demo_log'', FILENAME = N''D:\Log\trans_demo.ldf'' , SIZE = 51200KB
  , FILEGROWTH = 10%

  )

  GO

  -- Make sure recovery model is set to full

  ALTER DATABASE [trans_demo] SET RECOVERY FULL

  GO

  -- Perform full backup first

  -- Otherwise FULL recovery model will not be affected

  BACKUP DATABASE [trans_demo]

  TO  DISK = N''F:\Backup\trans_demo_Full.bak''

  GO

  -- Create a simple test table

  USE trans_demo

  GO

  CREATE TABLE transactions

  (

  t_guid VARCHAR(50)

  )

  GO

  ```

  **清单 6-6**

  **创建 trans_demo 数据库**


  既然我们已经创建了一个全新的数据库，我将使用 Ostress 工具对 `trans_demo` 数据库生成负载。我将执行清单 6-7 中的查询（我将其保存到 `logbuffer_impl.sql`
  文件），使用以下命令通过 200 个并发连接运行：`"C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe"
  -E -dtrans_demo -i"C:\logbuffer_impl.sql" -n200 -r1 -q`。


  ```

  DECLARE @i INT

  SET @i = 1

  WHILE @i < 10000

  BEGIN

  INSERT INTO transactions

  (t_guid)

  VALUES

  (newid())

  SET @i = @i + 1

  END

  ```

  **清单 6-7**

  **在 trans_demo 数据库中插入行**


  在启动 Ostress 工具之前，我清除了 `sys.dm_os_wait_stats` DMV。


  在我的测试 SQL Server 上大约 1 分钟后，Ostress 工具执行完了工作负载。如果我查询 `sys.dm_os_wait_stats` DMV 并查找
  `LOGBUFFER` 和 `WRITELOG` 等待类型，我会得到如图 6-18 所示的结果。


  ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig18_HTML.jpg](img/340881_2_En_6_Fig18_HTML.jpg)

  **图 6-18**

  **WRITELOG 和 LOGBUFFER 等待**



  ### 降低 LOGBUFFER 和 WRITELOG 等待


  通常有两种方法可以降低 `LOGBUFFER` 和 `WRITELOG` 等待，但需谨记，`WRITELOG` 等待也会正常发生，只有当其等待时间异常偏高时才需要引起关注。


  第一种方法是仔细审视事务的执行方式。在前面的例子中，我们为每个 `INSERT` 语句都进行了隐式提交。这意味着一旦 `INSERT` 语句的日志记录进入日志缓冲区，它就需要再次被刷写。如果我们显式地提交整个
  `WHILE` 循环，我们将有更大的写入量需要刷写到事务日志，从而获得更好的性能。这是因为频繁写入小数据块通常比间隔较大地写入大数据块要慢。游标也可能产生与我们所用示例相同的效果，因此应尽量少用它们。


  另一种方法基于存储子系统。如果 SQL Server 无法足够快地写入日志记录，您可能会遇到 `LOGBUFFER` 和 `WRITELOG` 等待。作为最佳实践，请确保将事务日志与数据库数据文件分开存放在不同的磁盘上，这样在高负载情况下它们就不会相互影响。同时，使用
  Perfmon 中的磁盘性能计数器（如显示写入延迟的 `Avg. Disk sec/write` 和显示写入 IOPS 的 `Disk Writes/sec`）来监控事务日志所在的磁盘，并检查这些值是否在可接受的范围内。


  如果您的 SQL Server 实例运行的是 SQL Server 2014，您可以选择使用 `延迟持久性` 选项，该选项在 SQL Server 2014 中引入。简而言之，启用此选项后，事务提交时将不再立即将日志缓冲区内容刷写到磁盘，而是等到日志缓冲区满（60
  KB）后再将内容刷写到事务日志。通过启用此选项，您将面临这样的风险：那些已提交但尚未写入事务日志的事务，在发生故障时可能会丢失，因为它们只会在日志缓冲区满时才被写入事务日志。


  ### LOGBUFFER 和 WRITELOG 总结


  `LOGBUFFER` 和 `WRITELOG` 这两种等待类型都与 SQL Server 处理事务的方式有关。`WRITELOG` 等待类型在每次将日志记录写入事务日志时都会发生，通常无需担心。但当它与较高的
  `LOGBUFFER` 等待时间同时出现时，较高的 `WRITELOG` 等待时间可能表明事务日志存在压力。要降低这些等待时间，请尽量避免使用 `cursor`
  和 `WHILE` 语句，因为 `cursor` 或 `WHILE` 子句中的语句通常会被隐式提交，从而产生大量小型写入操作。同时检查您的存储配置，确保事务日志没有与数据库数据文件放在同一个驱动器上。如果仍然出现较高的等待时间，请分析事务日志所在磁盘的性能。


  ## RESOURCE_SEMAPHORE


  `RESOURCE_SEMAPHORE` 等待类型是一种与内存相关的等待类型，当查询内存请求无法立即获得批准时可能出现。这种等待可能发生在正经历内存压力的服务器上，或者当大量并发查询为排序或连接等昂贵操作请求内存时。


  ### RESOURCE_SEMAPHORE 等待类型是什么？


  在 SQL Server 中执行查询时，在实际执行之前会发生一系列步骤。第一步是生成已编译的计划。该计划包含满足查询请求所需的逻辑指令或操作。在生成已编译计划期间，会执行一个计算以确定执行查询所需的内存量，这取决于已编译计划中涉及的操作。一些需要内存的操作包括排序和连接，它们会临时将行数据存储在
  SQL Server 的内存中。执行这些排序或连接所需的最小内存量被称为 `required memory`，没有它查询根本无法执行。例如，如果排序过程中需要更多内存来在内存中存储行数据，它将被计算为
  `additional memory`。没有这些额外内存，查询仍然可以执行，但临时行数据将写入磁盘而不是内存。


  当查询执行时，将根据已编译计划中计算出的所需内存和额外内存值来确定内存授予。此内存授予需要在名为 `resource semaphore` 的内部对象上执行内存保留。资源信号量负责保留查询执行所需的内存，但它也在太多查询同时请求内存保留或当时没有足够可用内存时管理内存节流。它通过维护一个请求内存的查询队列来实现这一点。如果队列中没有查询且有新查询请求内存，资源信号量会将内存授予该查询（如果有足够的可用内存）。但是，如果存在队列，新查询将被放在队列末尾，它必须等待轮到自己才能获得内存授予。


  在资源信号量将请求的内存授予查询之前，它会检查是否有足够的可用内存来执行该查询。如果由于某种原因，可用内存量少于查询请求的内存量，该查询将再次被放入队列，直到有足够的内存可用。当一个查询在资源信号量队列中等待其请求的内存时，它在队列中花费的时间将被记录为
  `RESOURCE_SEMAPHORE` 等待类型。


  资源信号量可用的最大内存量是从缓冲区缓存中分配的。资源信号量最多可以从缓冲区缓存分配 75% 的内存用于内存授予，但单个查询获得的内存量永远不能超过此数量的 25%。例如，如果我们有一个缓冲区缓存最大可达
  500 MB 的 SQL Server，那么内存授予的最大值将是 375 MB。在此示例中，单个查询永远无法获得超过 93 MB 的内存。向查询授予如此多的内存可能会出现问题，因为这些内存没有用于缓冲区缓存，这意味着需要更多的
  IO 操作到存储子系统来检索和写入数据页。



  ### 资源信号量示例


  在本例中，我们将针对 `AdventureWorks` 数据库执行一个涉及排序操作的查询。正如我在上一节中提到的，涉及排序的查询会向资源信号量请求内存以执行排序操作。我们还将使用
  `Ostress` 工具来创建多个查询同时请求内存的情况，从而在资源信号量处形成队列。


  让我们看一下我们将要执行的查询及其内存授予信息，如代码清单 6-8 所示。


  ```

  SELECT

  SalesOrderID,

  SalesOrderDetailID,

  ProductID,

  CarrierTrackingNumber

  FROM

  Sales.SalesOrderDetail

  ORDER BY CarrierTrackingNumber ASC

  Listing 6-8

  针对 AdventureWorks 数据库的排序查询

  ```


  如你所见，这是一个相对简单的查询，它从 `Sales.SalesOrderDetail` 表中返回一些信息，并按 `CarrierTrackingNumber`
  排序。


  如果我们启用“包含实际执行计划”选项并执行该查询，就可以查看执行它所需的内存量。在我的测试 SQL Server 上的结果如图 6-19 所示。你可以通过显示属性窗口（查看
  ➤ 属性窗口）或按 F4 并选择 `SELECT` 运算符来访问这些属性。


  ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig19_HTML.jpg](img/340881_2_En_6_Fig19_HTML.jpg)


  图 6-19：执行计划属性中的 `MemoryGrantInfo`


  因为我们请求了实际执行计划，所以也可以看到授予查询执行的内存量。在本例中，查询获得了资源信号量授予的 13,568 KB（13.5 MB）内存，如 `GrantedMemory`
  属性所示。执行查询所需的最小内存量，即必需内存，为 512 KB，由 `RequiredMemory` 属性显示。查询请求了 13,568 KB，如 `DesiredMemory`
  属性所示，这是必需内存和额外内存的总和。我们可以看到查询获得了它所请求的全部内存，因为 `GrantedMemory` 和 `DesiredMemory` 具有相同的值。


  我想指出图 6-19 中的另外两个属性：`SerialDesiredMemory` 和 `SerialRequiredMemory` 属性。对于此查询，这两个属性的值分别与
  `DesiredMemory` 和 `RequiredMemory` 属性的值相同。这是因为查询是在未使用并行化的情况下执行的。当在查询中使用并行化时，由于工作被分配到多个线程，执行排序操作需要更多内存。图
  6-20 显示了当我强制代码清单 6-8 中的查询使用并行化，将工作分配到四个线程时的 `MemoryGrantInfo` 属性。


  ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig20_HTML.jpg](img/340881_2_En_6_Fig20_HTML.jpg)


  图 6-20：执行并行查询时的 `MemoryGrantInfo` 属性


  如你所见，`SerialRequiredMemory` 的值与我们串行执行查询时相同。`RequiredMemory` 和 `RequestedMemory`
  的大小有所增加，以便能够使用并行化完成排序操作。当你遇到与内存相关的问题，并且你的许多查询都涉及使用并行化执行的排序和联接操作时，应该记住这一点，因为并行化确实需要更多内存。


  现在我们知道了执行代码清单 6-8 中的查询需要多少内存，让我们使用 `Ostress` 通过多个连接来执行该查询。在我启动 `Ostress` 之前，我必须使用以下查询将最大服务器内存值更改为
  250 MB：


  ```

  EXEC sys.sp_configure N''max server memory (MB)'', N''250''

  GO

  RECONFIGURE WITH OVERRIDE

  GO

  ```


  我将代码清单 6-8 中的查询保存到名为 `resource_semaphore.sql` 的 `.sql` 文件中，并使用以下命令行执行 `Ostress`：`"C:\Program
  Files\Microsoft Corporation\RMLUtils\ostress.exe" -E -dAdventureWorks -i"C:\resource_semaphore.sql"
  -n20 -r1 -q`


  这将使用 20 个并发连接针对 `AdventureWorks` 数据库执行 `resource_semaphore.sql` 脚本，每个连接执行一次查询。


  当 `Ostress` 运行时，我查询 `sys.dm_os_waiting_tasks` DMV，寻找 `RESOURCE_SEMAPHORE` 等待；部分结果如图
  6-21 所示。


  ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig21_HTML.jpg](img/340881_2_En_6_Fig21_HTML.jpg)


  图 6-21：`sys.dm_os_waiting_tasks` DMV 中的 `RESOURCE_SEMAPHORE` 等待


  由于我们将最大服务器内存设置为 250 MB，且每个查询请求 13.25 MB 内存，我们没有足够的空闲内存来授予所有请求的内存。这将导致你在图 6-21 中看到的
  `RESOURCE_SEMAPHORE` 等待类型。


  我们可以使用各种其他资源来分析 `RESOURCE_SEMAPHORE` 等待。资源信号量本身有其自己的 DMV，即 `sys.dm_exec_query_resource_semaphores`，它将返回有关其内存消耗、未完成和等待的授予的信息。图
  6-22 显示了在运行 `Ostress` 工作负载时，针对 `sys.dm_exec_query_resource_semaphores` DMV 执行以下查询的结果：


  ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig22_HTML.jpg](img/340881_2_En_6_Fig22_HTML.jpg)


  图 6-22：`sys.dm_exec_query_resource_semaphores`


  ```

  SELECT

  target_memory_kb,

  max_target_memory_kb,

  total_memory_kb,

  available_memory_kb,

  granted_memory_kb,

  grantee_count,

  waiter_count

  FROM sys.dm_exec_query_resource_semaphores

  WHERE pool_id = 2

  ```


  我过滤掉了 `pool_id` 为 1 的资源池，因为这个池不处理用户查询。


  你可能已经注意到，返回了两行数据。这是因为实际上有两个不同的资源信号量。顶部一行是“常规”资源信号量。它将处理请求超过 5 MB 内存的查询。第二行（由 `max_target_memory_kb`
  列的 `NULL` 值标识）返回“小型”资源信号量的信息，它处理小于 5 MB 的查询。因为我们的查询请求了超过 5 MB 的内存，所以我们将从常规资源信号量获得内存授予。


  让我们浏览一下针对 `sys.dm_exec_query_resource_semaphores` DMV 查询返回的各个列：


  *   `target_memory_kb` 列返回此资源信号量计划用作其可授予查询的最大内存量的千字节数。

  *   `max_target_memory_kb` 列返回此资源信号量可授予的最大内存量。

  *   `total_memory_kb` 列返回资源信号量持有的总内存，是 `available_memory_kb` 和 `granted_memory_kb`
  的总和。

  *   `granted_memory_kb` 返回当前已授予查询的内存量。

  *   `grantee_count` 和 `waiter_count` 列返回当前已满足或正在资源信号量队列中等待的授予数量。


  从这些信息中我们可以看到，`granted_memory_kb` 列返回的信息是正确的，并且我们的测试查询正在请求内存授予。我们从执行计划中知道，我们的测试查询将请求
  13,568 KB。由于 `grantee_count` 列显示有两个内存请求已授予，我们可以将内存请求数量乘以每个查询的内存量（2 × 13,568 KB），结果为
  27,136 KB，这正是图 6-22 中显示的已授予内存量。




  我们可以使用`Perfmon`通过查看`SQLServer:Memory Manager\Granted Workspace Memory (KB)`计数器来监控已授予内存的总量，如图
  6-23 所示。


  ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig23_HTML.jpg](img/340881_2_En_6_Fig23_HTML.jpg)


  图 6-23


  已授予工作区内存 (KB) Perfmon 计数器


  请注意图 6-23 中的峰值，这是在我执行`Ostress`工作负载时发生的，并且与图 6-22 中的结果一样，授予的内存量为 27,136 KB。


  ### 降低 RESOURCE_SEMAPHORE 等待


  您可以使用多种可能的方法来降低甚至解决 `RESOURCE_SEMAPHORE` 等待类型的等待时间。最显而易见的方法是增加更多内存，但这最终可能是一个昂贵的解决方案，同时存在其他不那么昂贵的选项。


  第一个可能的解决方案是查看那些在执行时请求大量内存的查询。您应重点关注执行大型排序或连接（尤其是哈希连接）的查询，并检查是否可以减少需要排序或连接的行数，或者完全避免排序或连接。避免排序操作的一种方法是向执行排序的表添加索引。如果索引内的值顺序与排序操作相同，则不再需要排序操作，因为索引已经对结果进行了排序。


  另一种解决方案涉及并行度。如果查询在排序或连接操作中使用了并行度，则会比串行执行查询时请求更多的内存。通过使用查询提示或更改整个 SQL Server 实例的并行度配置来修改查询使其不使用并行度，将导致执行查询所需的内存量减少。


  最后，如果您运行的是 SQL Server 企业版，则可以使用资源调控器功能来配置每个资源池的内存使用量。通过配置某个资源池可以使用的内存量，您还可以设置资源信号量可以授予的内存量。本书不会详细介绍资源调控器功能，但可以在资源调控器的
  MSDN 页面上找到更多信息，链接如下：[`https://msdn.microsoft.com/en-us/library/bb933866.aspx`](https://msdn.microsoft.com/en-us/library/bb933866.aspx)。


  ### RESOURCE_SEMAPHORE 总结


  `RESOURCE_SEMAPHORE` 等待类型与查询执行某些操作（如排序和连接）所需的内存量有关。一个名为资源信号量的对象负责管理和限制查询的内存请求。如果查询请求的内存超过资源信号量可以授予的量，该内存请求将被移入资源信号量队列。当内存请求位于资源信号量队列中时，会记录
  `RESOURCE_SEMAPHORE` 等待时间。有多种方法可以降低或解决 `RESOURCE_SEMAPHORE` 等待。您可以选择向 SQL Server
  实例添加更多内存，或者优化查询以使排序和连接不需要那么多内存。另一个选项是使用资源调控器，您可以在其中定义资源池，以最小化大型内存请求的影响。


  ## RESOURCE_SEMAPHORE_QUERY_COMPILE


  在上一节中，我们讨论了 `RESOURCE_SEMAPHORE` 等待类型，它表示对于某些查询操作（如排序和连接）没有足够的可用内存。与 `RESOURCE_SEMAPHORE`
  等待类型类似，`RESOURCE_SEMAPHORE_QUERY_COMPILE` 等待类型也与 SQL Server 实例的内存相关。但 `RESOURCE_SEMAPHORE_QUERY_COMPILE`
  等待类型表示的不是查询内存的短缺，而是查询编译过程中的内存短缺。


  ### 什么是 RESOURCE_SEMAPHORE_QUERY_COMPILE 等待类型？


  在解释 `RESOURCE_SEMAPHORE` 等待类型时，我们讨论了什么是资源信号量及其作用。为了说明 `RESOURCE_SEMAPHORE_QUERY_COMPILE`
  等待类型，我们将更深入地探讨资源信号量的内部工作原理。


  您应将资源信号量视为“网关”，它们限制对内存资源的直接访问。资源信号量可以执行不同的任务。在上一节中，我们讨论了负责为某些操作（如排序和连接）授予内存的资源信号量。我们还注意到，有两种资源信号量负责授予此内存——常规资源信号量处理请求
  5 MB 或更多内存的查询，小型资源信号量处理请求少于 5 MB 内存的查询。


  与 `RESOURCE_SEMAPHORE_QUERY_COMPILE` 等待类型相关的资源信号量负责查询编译过程中所需的内存授予，不包括查询执行所需的内存。与上一节中的资源信号量类似，负责编译期间内存授予的资源信号量也有不同的网关。图
  6-24 显示了编译内存资源信号量的不同网关。


  ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig24_HTML.jpg](img/340881_2_En_6_Fig24_HTML.jpg)


  图 6-24


  编译内存资源信号量


  默认有三个网关：小型、中型和大型。根据查询编译所需的内存量，它将被分配到这三个网关之一。如果编译所需的内存量小于小型网关的内存阈值，则查询无需通过网关。可以同时通过网关进行并发编译或查询的数量由
  SQL Server 实例可用的逻辑处理器数量计算得出。例如，如果您的 SQL Server 实例有四个逻辑处理器，则小型网关将允许 16 个并发编译，中型网关允许
  4 个。大型网关始终只允许一次一个查询进行编译。


  小型网关的内存阈值是静态的，但中型和大型网关的阈值是动态的。这意味着达到中型或大型网关所需的编译内存在 SQL Server 实例的运行期间可以更改。


  这些网关的整个目的是确保编译内存的需求保持在可控范围内。这可以避免在许多大型编译内存请求被自动授予并耗尽 SQL Server 实例内存的情况下发生内存不足的情况。


  在我们继续并查看如何从 SQL Server 内部访问网关信息之前，让我们看一个查询编译的示例。


  假设我们有一个需要 1560 KB 编译内存的查询。查询将首先请求一个网关。由于我们的小型网关阈值为 370 KB，中型网关阈值为 5346 KB，该查询最终将进入小型网关。如果小型网关当前有任何查询在队列中，该查询将进入队列并等待轮到它，同时一直记录
  `RESOURCE_SEMAPHORE_QUERY_COMPILE` 等待时间。在查询编译期间，会跟踪编译期间使用的内存量；如果查询最终使用更多内存并达到中型网关的阈值，它将被移动到中型网关。当查询编译完成时，它将从网关中移除。




  我们可以通过在 SQL Server 内部执行 `DBCC MEMORYSTATUS` 命令来访问有关资源信号量网关的信息。在返回的大量结果中，您会找到如图 6-25
  所示的网关信息。


  ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig25_HTML.jpg](img/340881_2_En_6_Fig25_HTML.jpg)


  图 6-25：`DBCC MEMORYSTATUS` 命令返回的网关信息


  让我们逐一查看为网关返回的结果。


  `Configured Units` 行返回此网关允许的**最大并发编译数**。这取决于您的 SQL Server 实例可用的逻辑处理器数量。由于我的测试 SQL
  Server 有两个逻辑处理器，因此小型网关有八个插槽（4 × 逻辑处理器数），中型网关有两个。`Available Units` 行显示此网关当前可用的空闲插槽数，而
  `Acquires` 行显示当前被编译任务占用的插槽数。必须等待空闲插槽数量的查询数显示在 `Waiters` 行。`Threshold` 值是查询编译为了进入网关所需的内存量（以字节为单位）。对于我的测试
  SQL Server 系统，小型网关的阈值为 380,000 字节，即 371 KB。您可能会注意到，在图 6-25 中，中型网关的阈值为 -1。这是因为中型和大型网关的阈值具有动态性。由于在中型网关以下的网关没有活动，因此尚未设置阈值。


  ### RESOURCE_SEMAPHORE_QUERY_COMPILE 示例


  为了向您展示 `RESOURCE_SEMAPHORE_QUERY_COMPILE` 等待的实例，我将使用许多并发连接来多次执行清单 6-9 中的查询。该查询是一个动态查询，从
  `AdventureWorks` 数据库中连接的两个表中随机选择一行。在这种情况下，是否返回任何结果并不重要——我们这里试图实现的是制造编译内存争用。


  ```sql

  DECLARE @ID VARCHAR(250)

  DECLARE @SQL VarChar(MAX)

  SET @ID = FLOOR(RAND()*(20000-1)+1);

  SET @SQL =

  ''

  SELECT

  '' + @ID + '',

  SUM(soh.SubTotal),

  COUNT(soh.SubTotal)

  FROM sales.SalesOrderHeader soh

  INNER JOIN person.Person p

  ON soh.SalesPersonID = p.BusinessEntityID

  WHERE p.BusinessEntityID = '' + @ID + ''

  ''

  EXEC (@SQL)

  ```

  清单 6-9：`RESOURCE_SEMAPHORE_QUERY_COMPILE` 等待查询


  在我们使用许多并发连接执行查询之前，让我们检查一下需要多少编译内存。我们可以通过在 SQL Server Management Studio 中执行清单 6-9
  中的查询并启用实际执行计划来做到这一点。


  执行查询并打开实际执行计划后，我们需要查看 `CompileMemory` 属性。您可以通过显示“属性”窗口（视图 ➤ 属性窗口）或按 F4 并选择 SELECT
  运算符来访问这些属性。图 6-26 显示了我的测试 SQL Server 上的实际执行计划属性。


  ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig26_HTML.jpg](img/340881_2_En_6_Fig26_HTML.jpg)


  图 6-26：杂项执行计划属性


  `CompileMemory` 属性返回的值是以 KB 表示的所需编译内存量。此查询需要 408 KB 进行编译。我的测试 SQL Server 上小型网关的阈值是
  371 KB，因此我相当确定该查询将访问小型网关。


  我们将再次使用 Ostress 实用程序生成所需的并发连接来执行该查询。我将查询保存到 `resource_semaphore_compile.sql` 文件，然后使用该文件作为以下
  Ostress 命令的输入。因为查询执行非常快，我让每个连接执行它 100 次，这样我们就有些时间来查看等待统计信息。


  ```bash

  "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -E -dAdventureWorks
  -i"C:\resource_semaphore_compile.sql" -n200 -r100 -q

  ```


  几秒钟后，在 `sys.dm_os_waiting_tasks` DMV 中可以看到许多 `RESOURCE_SEMAPHORE_QUERY_COMPILE`
  等待，如图 6-27 所示。


  ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig27_HTML.jpg](img/340881_2_En_6_Fig27_HTML.jpg)


  图 6-27：`RESOURCE_SEMAPHORE_QUERY_COMPILE` 等待


  如果我们现在执行 `DBCC MEMORYSTATUS` 命令，我们应该能够找出编译争用发生在哪个网关。图 6-28 显示了我的测试 SQL Server 上
  `DBCC MEMORYSTATUS` 命令的网关输出。


  ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig28_HTML.jpg](img/340881_2_En_6_Fig28_HTML.jpg)


  图 6-28：编译争用期间的 `DBCC MEMORYSTATUS`


  如图 6-28 所示，如果我们查看 `Available Units` 的数量，会发现没有可用的插槽留给新的编译内存请求。实际上，我们有 22 个编译内存请求在资源信号量队列中等待。另请注意，中型网关的
  `threshold` 现在已从 -1 更改为 7,041,820 字节（6876 KB）。由于争用现在发生在较低级别的网关上，即使没有编译内存请求由该网关处理，中型网关的阈值也被动态确定了。




  ### 降低 RESOURCE_SEMAPHORE_QUERY_COMPILE 等待时间


  在很多情况下，你可以用来降低 `RESOURCE_SEMAPHORE_QUERY_COMPILE` 等待类型等待时间的方法，与降低或解决 `RESOURCE_SEMAPHORE`
  等待的方法是相同的。与 `RESOURCE_SEMAPHORE` 等待类型类似，`RESOURCE_SEMAPHORE_QUERY_COMPILE` 等待类型也与内存相关，因此，如果你能增加用于查询编译的总可用内存，就很有可能降低或解决
  `RESOURCE_SEMAPHORE_QUERY_COMPILE` 的等待时间。然而，增加内存在很多情况下是最后手段。


  由于我们可以使用 `DBCC MEMORYSTATUS` 命令访问有关处理编译内存的资源信号量门控的非常具体的信息，一个良好的第一步是分析这些门控的使用模式。如果你注意到某个特定门控持续存在等待的内存请求，那么该门控的内存阈值，或者说所允许的最大并发编译内存请求数量，应该能为你提供一些关于根本原因的线索。例如，如果你在大型门控（该门控一次只允许一个查询）处注意到许多排队的编译内存请求，那么导致你出现
  `RESOURCE_SEMAPHORE_QUERY_COMPILE` 等待时间的源头，可能是那些请求大量编译内存的查询。另一个原因可能是大量并发查询都需要访问小型门控——这正是我们示例中的情况，从而导致在门控处形成队列。


  在这些情况下，你应该找出导致门控处队列的具体查询，并尝试优化它们，方法是减少其编译内存需求量，或者确保减少编译发生的次数。后者可以通过确保你的查询被正确参数化来实现。每次执行时都生成即席计划的查询，可能是导致
  `RESOURCE_SEMAPHORE_QUERY_COMPILE` 等待的原因，特别是当它们被执行得非常频繁且并发时。SQLskills 的 Jonathan
  Kehayias 撰写了一篇优秀的博客文章，讲解如何查询计划缓存以检测高编译时间的语句；文章位于 [`www.sqlskills.com/blogs/jonathan/identifying-high-compile-time-statements-from-the-plan-cache/`](http://www.sqlskills.com/blogs/jonathan/identifying-high-compile-time-statements-from-the-plan-cache/)
  。使用 Jonathan 博客文章中的脚本应能帮助你检测那些需要大量编译内存的查询。


  如果你的 SQL Server 正处于内存压力之下，也可能看到 `RESOURCE_SEMAPHORE_QUERY_COMPILE` 等待的发生。这种情况的发生是由于中型和大型门控的动态编译内存阈值所致。如果
  SQL Server 处于内存压力之下，这两个门控的阈值都会降低，从而给予更多查询使用中型或大型门控的机会。但由于中型和大型门控允许的并发编译数量较少，在小型门控中，可用的并发槽位会更快地被填满。


  与 `RESOURCE_SEMAPHORE` 等待类型一样，你可以使用资源调控器将工作负载拆分到特定的资源池中。每个资源池将拥有自己的资源信号量，负责授予编译内存，从而可以将繁重的编译内存使用情况分散到多个资源池中。


  ### RESOURCE_SEMAPHORE_QUERY_COMPILE 总结


  就像为特定查询操作授予内存请求所需的资源信号量一样，也存在用于访问编译内存的资源信号量。这些资源信号量通过使用门控来调节对编译内存的访问。当一个查询被编译时，它会根据其所需的编译内存数量来接近一个门控。然后，该门控可以授予所请求的编译内存，或者如果有更多请求并发地想要访问该门控，则将该请求放入队列。当一个查询在其中一个队列中等待时，就会记录下
  `RESOURCE_SEMAPHORE_QUERY_COMPILE` 等待类型。


  解决或降低 `RESOURCE_SEMAPHORE_QUERY_COMPILE` 等待时间通常通过释放更多内存或降低查询的编译内存需求来实现。


  ## SLEEP_BPOOL_FLUSH


  `SLEEP_BPOOL_FLUSH` 等待类型与 SQL Server 内部的检查点过程直接相关。检查点进程负责将缓冲池中已修改的（或“脏的”）数据页写入磁盘上的数据库数据文件。因此，除了与检查点过程有密切关系外，`SLEEP_BPOOL_FLUSH`
  等待也与你的存储子系统的性能有关。如果我们在 SQL Server 联机丛书中搜索 `SLEEP_BPOOL_FLUSH` 等待类型的定义，微软将其描述为“当检查点正在限制新
  I/O 的发出以避免淹没磁盘子系统时”发生。


  看到 `SLEEP_BPOOL_FLUSH` 等待发生是相当普遍的，并且通常它们并不表示存在问题。然而，在某些情况下，`SLEEP_BPOOL_FLUSH` 等待可能指示与检查点过程或存储子系统相关的性能问题。





  ### 什么是 `SLEEP_BPOOL_FLUSH` 等待类型？


  为了更好地理解 `SLEEP_BPOOL_FLUSH` 等待类型是如何被记录的，我们需要了解 SQL Server 内部检查点进程的工作原理。


  检查点进程是 SQL Server 的一个内部进程，负责将缓冲区缓存中已修改（脏）的页面写入数据库数据文件。这样做的主要原因之一是为了在发生意外故障时加快数据库的恢复速度。当发生意外故障时，SQL
  Server 需要将数据库恢复到故障发生前的状态。它将通过使用事务日志的内容来重做或撤销对数据页面所做的更改来实现这一点。如果数据页面已被修改，但更改尚未写入数据库数据文件，SQL
  Server 将需要重做对该数据页面的更改。如果检查点已将更改的数据页面写入数据库数据文件，则此步骤就不再需要，这会加快数据库的恢复过程，因为 SQL Server
  知道数据已被写入数据库数据文件。图 6-29 展示了数据页面被修改时发生的（简化）过程。


  ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig29_HTML.jpg](img/340881_2_En_6_Fig29_HTML.jpg)


  图 6-29：数据修改过程


  当一个已提交的事务修改数据页面时，首先发生的事情是更改将被记录在事务日志中（首先在日志缓冲区中，然后如 `WRITELOG` 和 `LOGBUFFER` 等待类型部分所述写入磁盘）。对数据页面的修改将在缓冲区缓存中进行，并且该数据页面将被标记为脏（红色页面图标）。当发生检查点时（可能有多种原因，我们稍后会讨论），自上一个检查点以来所有被标记为脏的数据页面都将被写入存储子系统上的物理数据库数据文件，无论创建这些脏页面的事务状态如何（绿色页面图标）。


  检查点进程由 SQL Server 自动执行，大约每分钟一次，这是 SQL Server 2016 之前低版本的默认 `recovery interval`（恢复间隔）。这并不意味着检查点会精确地每分钟发生一次。你可以为
  `recovery interval` 指定的值是检查点应发生的时间上限，检查点进程会分析未完成的 I/O 请求和延迟；并限制检查点操作以避免使存储子系统过载。


  以下列表将描述 SQL Server 中可用的各种检查点类型：


  -   内部检查点类型不可配置，在执行某些操作时会自动发生；例如，数据库备份。

  -   自动：这些是默认的检查点，在 SQL Server 2016 之前的版本中，当保持其默认值 0 时，大约每分钟发生一次。我们可以通过在 SQL Server
  Management Studio 的“服务器属性 ➤ 数据库设置”页面下更改 `recovery interval` 配置选项来更改检查点进程的间隔。我们只能将其更改为分钟值，并且它将用于
  SQL Server 实例中的所有数据库。

  -   手动：你可以通过发出 `CHECKPOINT` T-SQL 命令手动触发检查点。你还可以选择指定检查点必须完成的时间（以秒为单位）。如果你确实发出了手动检查点，它将在当前数据库的上下文中运行。例如，在查询窗口中执行
  `CHECKPOINT 10` 将在执行查询后的 10 秒内执行一次检查点。

  -   间接：SQL Server 2012 增加了一个额外的选项，用于在每个数据库级别配置检查点间隔。将此选项配置为大于默认值 0 的值将覆盖特定数据库的自动检查点进程。你可以使用以下命令为特定数据库启用间接检查点：`ALTER
  DATABASE [数据库名称] SET TARGET_RECOVERY_TIME = [以秒或分钟为单位的时间]`。


  随着 SQL Server 2016 的发布，间接检查点成为检查点进程的新默认设置（值为 60）。


  如前所述，如果 SQL Server 认为有必要，它将尝试限制检查点进程以避免使存储子系统过载。它会监控存储子系统的未完成请求数量，并尝试检测是否存在任何延迟。利用这些信息，它将限制检查点进程产生的
  IO 量，以避免对存储子系统造成过重的负载。当检查点进程受到限制时，就会记录 `SLEEP_BPOOL_FLUSH` 等待类型。




  ### SLEEP_BPOOL_FLUSH 示例


  以下示例展示了 `SLEEP_BPOOL_FLUSH` 等待类型对早于 SQL Server 2016 版本的影响。如前所述，在 SQL Server 2016
  中，SQL Server 处理 `检查点` 过程的方式发生了变化，这意味着在如下示例中该等待类型出现的可能性要小得多。


  生成 `SLEEP_BPOOL_FLUSH` 等待相对简单，清单 6-10 中的脚本（与我们用于 `LOGBUFFER` 和 `WRITELOG` 等待类型的脚本几乎相同）将对检查点过程施加压力，从而导致
  `SLEEP_BPOOL_FLUSH` 等待发生。


  ```sql

  USE trans_demo

  GO

  DECLARE @i INT

  SET @i = 1

  WHILE @i < 100

  BEGIN

  INSERT INTO transactions

  (t_guid)

  VALUES

  (newid())

  SET @i = @i + 1

  -- 在 1 秒内强制执行一个检查点

  CHECKPOINT 1

  END

  ```

  清单 6-10

  生成 `SLEEP_BPOOL_FLUSH` 等待


  由于我们也使用了与 `LOGBUFFER` 和 `WRITELOG` 等待类型示例中相同的数据库，清单 6-11 展示了如果该数据库尚不存在则创建它的脚本。


  ```sql

  USE master

  GO

  -- 创建演示数据库

  CREATE DATABASE [trans_demo]

  ON PRIMARY

  (

  NAME = N''trans_demo'', FILENAME = N''D:\Data\trans_demo.mdf'' , SIZE = 153600KB
  , FILEGROWTH = 10%

  )

  LOG ON

  (

  NAME = N''trans_demo_log'', FILENAME = N''D:\Log\trans_demo.ldf'' , SIZE = 51200KB
  , FILEGROWTH = 10%

  )

  GO

  -- 确保恢复模式设置为完整

  ALTER DATABASE [trans_demo] SET RECOVERY FULL

  GO

  -- 首先执行完整备份

  -- 否则完整恢复模式将不会生效

  BACKUP DATABASE [trans_demo]

  TO  DISK = N''F:\Backup\trans_demo_Full.bak''

  GO

  -- 创建一个简单的测试表

  USE trans_demo

  GO

  CREATE TABLE transactions

  (

  t_guid VARCHAR(50)

  )

  GO

  ```

  清单 6-11

  创建 `trans_demo` 数据库


  清单 6-10 中的脚本将执行的操作是：在一个执行 100 次的循环中，向 `transactions` 表插入一个随机的 GUID。每次插入一个新的 GUID
  后，它都会发出一个时间限制为 1 秒的 `CHECKPOINT` 命令。这会强制检查点过程在 1 秒的时间限制内执行一次检查点。


  在运行清单 6-10 中的脚本之前，我使用 `DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR)` 命令清空了 `sys.dm_os_wait_stats`
  DMV。


  在我的测试 SQL Server 上，该脚本在近 70 秒后完成。然后我执行了以下查询来查看 `SLEEP_BPOOL_FLUSH` 等待时间：


  ```sql

  SELECT *

  FROM sys.dm_os_wait_stats

  WHERE wait_type = ''SLEEP_BPOOL_FLUSH'';

  ```


  查询结果如图 6-30 所示。


  ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig30_HTML.jpg](img/340881_2_En_6_Fig30_HTML.jpg)


  图 6-30

  `SLEEP_BPOOL_FLUSH` 等待


  如你所见，运行清单 6-10 中的脚本后，`SLEEP_BPOOL_FLUSH` 等待时间非常高。通常，你会期望这些等待时间要么很低，要么接近于零。如果我们完全从脚本中移除
  `CHECKPOINT` 命令，让 SQL Server 自行决定何时运行检查点过程，我们不仅会得到如图 6-31 所示的完全不同的结果，而且脚本的运行时间也会减少到仅仅几毫秒。


  ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig31_HTML.jpg](img/340881_2_En_6_Fig31_HTML.jpg)


  图 6-31

  移除 `CHECKPOINT` 后的 `SLEEP_BPOOL_FLUSH` 等待时间


  ### 降低 SLEEP_BPOOL_FLUSH 等待


  尽管由 `SLEEP_BPOOL_FLUSH` 等待类型引起的性能问题并不常见，但有多种方法可以降低等待时间。


  最明显的方法是检查可用的各种配置选项，以手动配置我们之前讨论过的 `恢复间隔`。`恢复间隔` 的值越低，检查点过程发生的频率就越高，遇到 `SLEEP_BPOOL_FLUSH`
  等待的可能性也就越大。此外，正如你在示例中注意到的那样，在事务中执行频繁的 `CHECKPOINT` 命令也可能导致 `SLEEP_BPOOL_FLUSH` 等待。


  另一个可能的原因是数据库数据文件所在的存储子系统。如前所述，检查点过程会分析存储子系统的负载，然后决定是否需要限制其吞吐量。如果因为存储子系统繁忙而频繁需要限制，你更有可能看到
  `SLEEP_BPOOL_FLUSH` 等待发生。


  如果你运行的是 SQL Server 2016，很可能永远不会遇到非常高的 `SLEEP_BPOOL_FLUSH` 等待时间，因为 SQL Server 处理此过程的默认方式已经改变。


  ### SLEEP_BPOOL_FLUSH 总结


  `SLEEP_BPOOL_FLUSH` 等待类型与 SQL Server 中的检查点过程密切相关。检查点过程负责将缓冲区缓存中已修改的（或脏的）数据页写入数据库数据文件。检查点过程在将脏页写入磁盘之前会分析存储子系统的性能，如果存储子系统繁忙，检查点过程将限制其吞吐量，从而导致
  `SLEEP_BPOOL_FLUSH` 等待。看到非常高的 `SLEEP_BPOOL_FLUSH` 等待时间并不常见，但它们仍然可能影响性能。频繁执行 `CHECKPOINT`
  T-SQL 命令的查询，或配置得非常低的 `恢复间隔`，都可能是看到 `SLEEP_BPOOL_FLUSH` 等待发生的原因。存储子系统的性能也可能影响检查点过程，如果它被迫限制其吞吐量的话。


  ## WRITE_COMPLETION


  与 `ASYNC_IO_COMPLETION` 和 `IO_COMPLETION` 等待类型类似，`WRITE_COMPLETION` 等待类型与 SQL Server
  在存储子系统上执行的特定操作相关。同样，在你的 SQL Server 实例上看到 `WRITE_COMPLETION` 等待发生是非常正常的，只有当等待时间远高于正常水平时才应引起关注。


  ### 什么是 WRITE_COMPLETION 等待类型？


  `WRITE_COMPLETION` 等待类型是 `IO_COMPLETION` 等待类型的近亲。但是，`IO_COMPLETION` 等待类型是为特定的读写操作记录的，而
  `WRITE_COMPLETION` 等待类型仅针对一些非常特定的写操作记录。其中一些写操作包括扩展数据或日志文件，或者执行 `DBCC CHECKDB` 命令。


  由于 `WRITE_COMPLETION` 等待类型与将 SQL Server 数据写入存储子系统有关，因此存储子系统的性能会对其等待时间产生影响。



  ### WRITE_COMPLETION 等待示例


  为了向你展示一个 `WRITE_COMPLETION` 等待发生的例子，我将使用 `DBCC SQLPERF(''sys.dm_os_wait_stats'',
  CLEAR)` 命令清除 `sys.dm_os_wait_stats` DMV 后，对 `AdventureWorks` 数据库执行一次 `CHECKDB`。


  请记住，此示例是 `WRITE_COMPLETION` 等待可能发生的完全正常情况，它不应阻止你执行常规的数据库一致性检查！


  清单 6-12 展示了我为生成一些 `WRITE_COMPLETION` 等待而执行的查询。


  ```sql

  DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

  DBCC CHECKDB (''AdventureWorks'');

  SELECT * FROM sys.dm_os_wait_stats

  WHERE wait_type = ''WRITE_COMPLETION'';

  ```

  **清单 6-12** 生成 WRITE_COMPLETION 等待


  批处理中最后一个查询的结果如图 6-32 所示。


  ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig32_HTML.jpg](img/340881_2_En_6_Fig32_HTML.jpg)


  **图 6-32** WRITE_COMPLETION 等待


  如你所见，等待时间量非常低，不会引起任何担忧。这部分也是由于 `AdventureWorks` 数据库非常小，并且我的测试机存储性能非常快。对更大的数据库运行
  `CHECKDB` 可能会导致更高的等待时间。


  ### 降低 WRITE_COMPLETION 等待


  如果你看到 `WRITE_COMPLETION` 等待时间很高，尝试找出是哪个进程导致了这些等待。在许多情况下，这可能是由 `CHECKDB` 或数据库数据/日志文件增长引起的。


  一个值得检查的事情是本章前面在 `ASYNC_IO_COMPLETION` 部分讨论的即时文件初始化选项。不使用此选项可能会影响 `WRITE_COMPLETION`
  等待时间的持续时间。


  另一个导致 `WRITE_COMPLETION` 等待时间较高的、远不常见的原因是当你在页面空闲空间页（或 PFS）上遇到页面闩锁争用时。PFS 页跟踪数据页中的空闲空间量。如果一个进程需要非常频繁地修改
  PFS 页，就有可能看到 `WRITE_COMPLETION` 等待与许多 `PAGELATCH_UP` 等待一起发生，我们将在第 9 章“与闩锁相关的等待类型”中讨论。为了给你这样一个场景的例子，考虑大量并发查询，它们都创建一个临时表，插入几行，然后再次删除临时表。在这种情况下，`tempdb`
  数据库的 PFS 页需要非常频繁地更新以反映临时表的创建和删除。


  ### WRITE_COMPLETION 总结


  `WRITE_COMPLETION` 等待类型，就像 `ASYNC_IO_COMPLETION` 和 `IO_COMPLETION` 等待类型一样，与 SQL
  Server 执行的特定存储相关操作有关。看到 `WRITE_COMPLETION` 等待是非常正常的，在许多情况下不会引起担忧。诸如 `CHECKDB` 和数据库数据/日志文件增长等操作可能导致
  `WRITE_COMPLETION` 等待。


  '
- '# 7. 与备份相关的等待类型


  备份是数据库管理中非常重要的一部分，在许多情况下，它们对你所在公司的生存至关重要。数据对业务变得如此重要，如果某些灾难导致数据丢失，公司可能会损失大量资金，甚至倒闭。


  我们可以在 IT 基础架构的各个层面实施许多方法，以确保在灾难期间数据不会丢失（或尽可能少丢失）。我们可以实施 SAN 以确保我们的数据不存储在服务器的本地磁盘驱动器上。或者我们可以设计
  SQL Server AlwaysOn 可用性组以跨数据中心复制我们的数据。但我们应该采取，并且希望已经采取的第一步，是在我们的 SQL Server 数据库内执行定期备份。


  实施和安排 SQL Server 备份不是一项非常困难的任务，没有理由不执行备份。备份的类型和备份操作的间隔由你所工作的组织的需求决定，并通常以“RTO”（恢复时间目标）和“RPO”（恢复点目标）时间表示。这些时间代表从灾难中恢复所需的时间量以及灾难发生时可接受的数据丢失量。这两个时间应该是你
  SQL Server 备份策略的主要输入。


  值得庆幸的是，SQL Server 开箱即用提供了不同的选项来满足 RTO 和 RPO 要求。这意味着我们可以使用 SQL Server 自己的备份机制来满足我们公司的
  RTO 和 RPO 时间；我们不一定依赖第三方备份软件。由于 SQL Server 备份操作是一个内部过程，因此与之关联了不同的等待类型，在本章中，我们将查看与执行备份和还原直接相关的三种最常见的等待类型。


  注意到这些备份/还原相关等待类型上的高等待时间，不太可能导致 SQL Server 实例的性能下降。但是，我们确实可以选择优化 SQL Server 备份过程，从而缩短备份和还原时间。由于数据库的备份/还原对你公司的生存至关重要，优化备份和还原吞吐量非常值得付出努力。


  ## BACKUPBUFFER


  我们将讨论的第一个与备份相关的等待类型是 `BACKUPBUFFER`。如果我们在在线手册上查找此等待类型的定义，会得到以下文本：“当备份任务正在等待数据，或正在等待存储数据的缓冲区时发生。此类型不常见，除非任务正在等待磁带装载。”
  显然，我们只会在将备份写入磁带设备时看到这种等待类型，但这是错误的。无论备份文件的目标是什么，在备份操作期间实际上总是会记录 `BACKUPBUFFER` 等待。原因在于
  SQL Server 备份操作使用缓冲区从数据库读取数据并将其写入备份文件的方式。




  ### 什么是 `BACKUPBUFFER` 等待类型？


  要理解 `BACKUPBUFFER` 等待是如何产生的，我们需要深入了解 SQL Server 备份过程的内部机制。无论您使用何种备份方法（即事务日志备份、差异备份或完整备份），这些内部机制基本相同，因此它们会遇到相同的等待类型。


  SQL Server 为备份进程分配缓冲区。这些缓冲区将被来自数据库的数据填充，并在备份/还原过程中移动，以便写入备份文件（对于还原操作则相反）。缓冲区在系统内存中分配，但位于缓冲区缓存内存之外，以避免从缓冲区缓存中窃取内存。备份缓冲区的大小和数量由
  SQL Server 自动计算，但我们也可以将这些值作为备份/还原命令的参数自行配置。图 7-1 展示了这些备份缓冲区如何通过一个“读取器”（从数据库或备份文件读取数据到缓冲区）和一个“写入器”（将数据从缓冲区写入备份文件或数据库）进行排序和移动。


  ![通过读取器和写入器移动的备份缓冲区](img/340881_2_En_7_Fig1_HTML.jpg)


  我们可以通过启用两个跟踪标志 `3213` 和 `3605` 来查看备份或还原操作期间有关缓冲区数量和大小的信息，这两个标志会将备份/还原信息输出到 SQL Server
  错误日志中。清单 7-1 中的查询启用了这两个跟踪标志，并对我的测试 SQL Server 上的 `AdventureWorks` 数据库执行了一次完整备份。


  ```

  -- 启用跟踪标志

  DBCC TRACEON (3213);

  DBCC TRACEON (3605);

  -- 备份数据库

  BACKUP DATABASE [AdventureWorks]

  TO  DISK = N''F:\Backup\aw_21042015.bak''

  WITH NAME = N''AdventureWorks-Full Database Backup'';

  GO

  -- 禁用跟踪标志

  DBCC TRACEOFF (3213);

  DBCC TRACEOFF (3605);

  清单 7-1

  使用备份信息跟踪标志执行完整数据库备份

  ```


  请记住，SQL Server 内部的跟踪标志只应在 Microsoft 支持人员的指导下使用。我现在启用它们是为了在我的测试 SQL Server 上显示备份信息，但我建议不要在生产系统上使用它们。


  在 SQL Server 错误日志中，记录了有关我们刚刚执行的备份的附加信息，如图 7-2 所示。


  ![附加备份信息](img/340881_2_En_7_Fig2_HTML.jpg)


  在这种情况下，备份操作创建了七个缓冲区（由 `BufferCount` 参数显示），每个缓冲区大小为 1024 KB（由 `MaxTransferSize` 参数显示）。创建缓冲区所需的总内存由
  `Total buffer space` 参数显示，为 7 MB (`BufferCount` * `MaxTransferSize`)。返回的另一个有趣信息是
  `memory limit`。这将显示备份操作可以访问的、位于缓冲区缓存之外的最大内存量。


  现在我们对 SQL Server 内部的备份过程有了概念，让我们来看看 `BACKUPBUFFER` 等待类型是在哪里出现的。


  正如我们之前描述的那样，SQL Server 备份过程使用缓冲区来存储需要写入备份文件的数据。每当没有可用的缓冲区时，就会发生 `BACKUPBUFFER` 等待，使进程等待，直到一个已满的缓冲区被写入备份文件并再次可用。


  ### `BACKUPBUFFER` 示例


  产生 `BACKUPBUFFER` 等待非常简单——只需执行一次备份操作即可。对于此示例，我运行了清单 7-2 中显示的查询。该查询将首先重置 `sys.dm_os_wait_stats`
  DMV，然后对 `AdventureWorks` 数据库执行完整备份，最后返回 `BACKUPBUFFER` 等待类型的等待统计信息。


  ```

  -- 清除 sys.dm_os_wait_stats

  DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

  -- 备份数据库

  BACKUP DATABASE [AdventureWorks]

  TO DISK = N''F:\Backup\aw_21042015.bak''

  WITH

  NAME = N''AdventureWorks-Full Database Backup'';

  GO

  -- 查询 BACKUPBUFFER 等待

  SELECT *

  FROM sys.dm_os_wait_stats

  WHERE wait_type = ''BACKUPBUFFER'';

  清单 7-2

  生成 BACKUPBUFFER 等待

  ```


  对 `sys.dm_os_wait_stats` DMV 查询的结果如图 7-3 所示。


  ![BACKUPBUFFER 等待](img/340881_2_En_7_Fig3_HTML.jpg)


  在我的测试 SQL Server 上，备份操作的总持续时间约为 1 秒。在这 1 秒中，只有 88 毫秒是花在等待空闲备份缓冲区上。


  ### 降低 `BACKUPBUFFER` 等待


  正如本章引言所述，与备份相关的等待通常无需担心，因为它们通常不会影响 SQL Server 实例的性能。然而，我们可以利用各种备份相关等待类型的等待统计信息来提高备份性能。


  降低 `BACKUPBUFFER` 等待时间的最常用方法之一是为备份操作添加更多缓冲区，覆盖自动分配。我们可以通过在 `BACKUP` T-SQL 命令中指定
  `BUFFERCOUNT` 选项来实现这一点。然而，更改备份操作可使用的缓冲区数量有一个问题。创建的每个缓冲区都将分配 `MAXTRANSFERSIZE` 选项的值；此值可由
  SQL Server 自动计算，或由您自己在 `BACKUP` 命令中设置（最大为 4,194,304 字节）。由于备份操作在缓冲区缓存之外分配内存，使用过多或过大的缓冲区可能会导致内存不足问题。因此，在测试您的
  SQL Server 实例的最佳值时要小心。


  清单 7-3 展示了对清单 7-2 中查询的修改，我们用它来演示发生的 `BACKUPBUFFER` 等待。在这个案例中，我们添加了 `BUFFERCOUNT`
  选项并将其配置为 200。


  ```

  -- 清除 sys.dm_os_wait_stats

  DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

  -- 备份数据库

  BACKUP DATABASE [AdventureWorks]

  TO DISK = N''F:\Backup\aw_21042015.bak''

  WITH

  NAME = N''AdventureWorks-Full Database Backup'',

  BUFFERCOUNT = 200;

  GO

  -- 查询 BACKUPBUFFER 等待

  SELECT *

  FROM sys.dm_os_wait_stats

  WHERE wait_type = ''BACKUPBUFFER'';

  清单 7-3

  配置了 BUFFERCOUNT 的数据库备份

  ```


  对 `sys.dm_os_wait_stats` DMV 查询的结果如图 7-4 所示。


  ![配置 BUFFERCOUNT 后的 BACKUPBUFFER 等待](img/340881_2_En_7_Fig4_HTML.jpg)


  如您所见，花在 `BACKUPBUFFER` 等待上的时间减少到了 0 毫秒，而我们未提供 `BUFFERCOUNT` 参数时是 88 毫秒。之所以发生这种情况，是因为我们指定的缓冲区数量足以处理备份操作，无需分配额外的缓冲区。由于不需要额外的缓冲区，我们就不需要花时间等待它们的分配。


  另一个选项是在 `BACKUP` T-SQL 命令中配置 `MAXTRANSFERSIZE` 选项。这将允许缓冲区以更大的工作单位进行填充，最高可达 4,194,304
  字节，即 4 MB。同样，为缓冲区分配更多空间将导致保留更大的内存。




  ### BACKUPBUFFER 等待类型概述


  `BACKUPBUFFER` 等待通常在备份或恢复操作期间发生，当备份/恢复操作需要等待可用的空闲缓冲区时就会出现。由于这是正常现象，因此无需担忧。我们确实有一些选项可以减少
  `BACKUPIO` 等待时间，但这也会对备份/恢复操作的持续时间产生影响。不过，这些参数需要经过仔细配置和测试，因为设置得过高可能会导致内存不足错误。


  ## BACKUPIO


  与 `BACKUPBUFFER` 等待类型类似，`BACKUPIO` 等待类型在备份或恢复操作的某个部分遇到争用问题时发生。另一个相似之处是 Books Online
  上对该等待类型的描述：“当备份任务正在等待数据，或正在等待用于存储数据的缓冲区时发生。此类型并不典型，除非任务正在等待磁带挂载。” 同样，在执行备份或恢复操作时，即使备份目标或恢复源不是磁带设备，这种等待类型也很常见。


  ### 什么是 BACKUPIO 等待类型？


  为了更好地理解 `BACKUPIO` 等待是如何产生的，我们需要查看图 7-5，该图先前作为图 7-1 展示过。


  ![../images/340881_2_En_7_Chapter/340881_2_En_7_Fig5_HTML.jpg](img/340881_2_En_7_Fig5_HTML.jpg)


  图 7-5：备份操作的内部机制


  在之前讨论 `BACKUPBUFFER` 等待类型的部分，我们解释了 `BACKUPBUFFER` 等待类型发生在我们等待一个空闲（空）缓冲区可用时。在很大程度上，`BACKUPBUFFER`
  等待类型位于图 7-5 的左侧，即读取器部分。而 `BACKUPIO` 等待类型主要发生在图 7-5 的右侧，即写入器部分。当 `BACKUPIO` 等待发生时，意味着写入器在写入数据时出现了延迟。这种延迟可能由多种原因引起；例如，将备份写入速度较慢的磁盘、将备份写入网络位置，或者在还原数据库时。


  在执行数据库备份或还原时，`BACKUPIO` 等待类型经常会伴随着 `ASYNC_IO_COMPLETION` 等待。


  ### BACKUPIO 示例


  我们可以使用与演示 `BACKUPBUFFER` 等待类型相同的示例。我对查询做了一点修改，以返回 `BACKUPIO` 等待而不是 `BACKUPBUFFER`
  等待，并且在对 `sys.dm_os_wait_stats` DMV 的查询结果中包含了 `ASYNC_IO_COMPLETION`。清单 7-4 显示了修改后的备份查询。


  ```sql

  -- 清除 sys.dm_os_wait_stats

  DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

  BACKUP DATABASE [AdventureWorks]

  TO DISK = N''F:\Backup\aw_21042015.bak''

  WITH

  NAME = N''AdventureWorks-Full Database Backup'';

  GO

  -- 查询 BACKUPIO 等待

  SELECT *

  FROM sys.dm_os_wait_stats

  WHERE wait_type = ''BACKUPIO''

  OR wait_type = ''ASYNC_IO_COMPLETION'';

  清单 7-4: 生成 BACKUPIO 等待

  ```


  对 `sys.dm_os_wait_stats` DMV 的查询结果如图 7-6 所示。


  ![../images/340881_2_En_7_Chapter/340881_2_En_7_Fig6_HTML.jpg](img/340881_2_En_7_Fig6_HTML.jpg)


  图 7-6：ASYNC_IO_COMPLETION 和 BACKUPIO 等待


  如图 7-6 所示，数据库备份导致了这两种等待类型的产生，大部分时间都花费在了 `ASYNC_IO_COMPLETION` 等待上，该等待负责读取需要写入备份文件的数据页。由于我的备份目标在
  SSD 磁盘上，因此我们没有遇到非常高的 `BACKUPIO` 等待时间。


  ### 减少 BACKUPIO 等待


  调整 `BUFFERCOUNT` 和 `MAXTRANSFERSIZE` 选项对 `BACKUPIO` 等待类型的影响不如它们对 `BACKUPBUFFER`
  等待类型的影响那么大。当你看到 `BACKUPIO` 等待类型的等待时间高于正常水平时，问题很可能与存储子系统的吞吐量或你正在写入/读取备份的网络位置有关。务必检查这两个位置是否存在潜在的性能问题，例如高延迟或网络利用率过高。


  ### BACKUPIO 概述


  与 `BACKUPBUFFER` 等待类型类似，`BACKUPIO` 等待类型在执行备份或恢复操作时发生。`BACKUPBUFFER` 等待类型主要与备份操作访问备份缓冲区的速度有关，而
  `BACKUPIO` 等待类型则与这些备份缓冲区写入磁盘的速度有关。在执行完整数据库备份或还原时，`BACKUPIO` 等待经常与 `ASYNC_IO_COMPLETION`
  等待同时出现。当看到 `BACKUPIO` 等待类型的等待时间高于正常水平时，请检查你写入或读取备份文件位置的性能指标。减少 `BACKUPIO` 等待时间不会影响系统的查询性能，但将有助于加快备份和还原操作的速度。


  ## BACKUPTHREAD


  `BACKUPTHREAD` 等待类型在对数据库执行还原操作时经常出现，但在备份操作期间也可能发生。当另一个线程正在等待备份/还原操作完成以便继续处理时，就会发生这种等待。


  ### 什么是 BACKUPTHREAD 等待类型？


  当你看到 `BACKUPTHREAD` 等待发生时，意味着另一个线程想要访问当前正被备份或还原操作占用的资源。在线程必须等待备份/还原完成的期间，将记录 `BACKUPTHREAD`
  等待时间。此类等待的一个例子是，当数据库数据文件正在被还原时，一个线程想要访问它；例如，`ASYNC_IO_COMPLETION` 等待类型正在将数据文件写入磁盘。


  `BACKUPTHREAD` 等待通常不是引起关注的原因。它们只是表明其他线程正在等待备份/还原操作完成，并且它们的持续时间通常与你的备份或还原完成所需的时间相同。然而，如果等待时间超出预期，它们确实会给你一个提示，表明可能存在其他值得调查的等待。


  因为一图胜千言，图 7-7 展示了 `BACKUPTHREAD` 等待类型与还原操作以及其他正在发生的等待之间的关系。


  ![../images/340881_2_En_7_Chapter/340881_2_En_7_Fig7_HTML.jpg](img/340881_2_En_7_Fig7_HTML.jpg)


  图 7-7：BACKUPTHREAD 与其他线程的关系


  在图 7-7 中，你可以看到 `BACKUPTHREAD` 等待正在发生，因为另一个线程也想要访问一个当前正由还原操作拥有的资源。



  ### BACKUPTHREAD 示例


  演示 `BACKUPTHREAD` 等待发生的一个简单方法是执行还原操作。当您执行还原时，其他进程将需要访问数据库数据文件，以将备份文件中的信息写入数据库数据文件。


  清单 7-5 展示了一个脚本，用于还原我之前在测试 SQL Server 上为 `AdventureWorks` 数据库制作的备份文件。


  ```sql

  -- Restore database

  USE [master]

  RESTORE DATABASE [AdventureWorks]

  FROM DISK = N''F:\Backup\AWBackup.bak''

  WITH  FILE = 1, REPLACE;

  GO

  ```


  清单 7-5

  还原 AdventureWorks 数据库


  如果在备份运行期间查看 `sys.dm_os_waiting_tasks` DMV，我们会看到发生的等待，如图 7-8 所示，该图显示了我测试 SQL Server
  上的一部分等待。


  ![../images/340881_2_En_7_Chapter/340881_2_En_7_Fig8_HTML.jpg](img/340881_2_En_7_Fig8_HTML.jpg)


  图 7-8

  BACKUPTHREAD 及其他等待


  如图 7-8 所示，`BACKUPTHREAD` 等待类型的等待时间与 `PREEMPTIVE_OS_WRITEFILEGATHER` 等待类型非常接近。此等待类型负责将数据写入文件系统，但我们将在第
  11 章 “抢占式等待类型” 中更深入地探讨此特定等待类型。


  ### 降低 BACKUPTHREAD 等待


  虽然 `BACKUPTHREAD` 等待类型本身并不表示任何问题，但它与其他等待类型的结合可能是一些额外研究的原因。基本上，任何可以用来加速备份或恢复过程的方法都会对
  `BACKUPTHREAD` 等待时间产生影响。


  一些好的起点是可以在 `BACKUP` 和 `RESTORE` T-SQL 命令上指定的 `BufferCount` 和 `MaxTransferSize` 选项。我们在讨论
  `BACKUPBUFFER` 和 `BACKUPIO` 等待类型时曾涉及这些设置。调整这些设置可以使您的备份和还原花费更少的时间，从而导致更低的 `BACKUPTHREAD`
  等待时间。


  另一个可以显著改善备份和还原时间的设置是即时文件初始化选项，我们在第 6 章 “与 I/O 相关的等待类型” 的 `ASYNC_IO_COMPLETION` 部分讨论过。


  ### BACKUPTHREAD 总结


  `BACKUPTHREAD` 等待时间并不表示对特定资源的访问，而是表示另一个进程正在等待备份或还原操作完成。看到这种等待类型非常常见，尤其是在还原操作期间。减少备份和还原操作的持续时间也会反映在
  `BACKUPTHREAD` 等待类型的等待时间中。您可以用来降低 `BACKUPTHREAD` 等待时间的方法之一是检查是否启用了即时文件初始化。此设置不会直接影响
  `BACKUPTHREAD` 等待类型，但它会影响其他等待类型，进而影响 `BACKUPTHREAD` 等待时间。


  ## 8. 与锁相关的等待类型


  锁定是每个关系数据库或关系数据库管理系统（RDBMS）的基本组成部分。SQL Server 基于关系数据库模型，因此在访问数据时使用锁定。尽管我们经常将锁定与性能问题联系起来，但它在确保数据在并发工作负载期间的可靠性方面起着至关重要的作用。SQL
  Server 或任何其他 RDBMS 处理这种数据可靠性的方式是通过遵循 “ACID” 属性，这些属性最初由 Jim Gray 在 1970 年代定义，但在 1983
  年由 Andreas Reuter 和 Theo Härder 命名。这些 ACID 属性被强制执行于单一操作上，即我们所知的事务。首字母缩写词 ACID 包含了保证事务内部数据可靠性的四个特征。以下列表描述了这些特征中的每一个：


  *   原子性：原子性特征要求事务是全有或全无的。这意味着如果事务的一部分失败，则整个事务失败，并且在事务内完成的所有更改都需要回滚到事务开始之前的状态。

  *   一致性：一致性特征要求事务写入数据库的数据是合法的。这意味着数据必须剔除非法或不良的输入。

  *   隔离性：隔离性特征要求每个事务对其他并发事务是不可见的。从事务的角度来看，这意味着每个事务都是串行执行的。

  *   持久性：持久性特征要求每个已提交的事务保持已提交状态，即使在发生电源故障或灾难时也是如此。


  正如您可能从阅读不同的 ACID 属性中猜到的那样，SQL Server 中的锁定与隔离性特征密切相关。


  由于本章专门讨论与锁相关的等待类型，除了隔离性之外，我们不会详细介绍 ACID 属性。如果您有兴趣了解更多关于 ACID 属性和数据库理论的知识，一个很好的起点是
  Andreas Reuter 和 Theo Harder 的研究论文 “Principles of Transaction-Oriented Database
  Recovery”，其中详细描述了 ACID 属性。


  为了更好地理解隔离性特征的工作原理，我们需要理解事务。一个事务代表与数据库的一次交互，可以包含多个操作，并且与其他事务分离。


  为了确保我们的事务不会与其他并发事务冲突，SQL Server 使用锁。这些锁确保没有其他事务可以修改您的事务正在同时处理的数据。例如，如果您从银行账户中提取
  100 美元，您不希望另一个并发的提取操作修改该金额。其他事务必须等待其提取操作，直到您的事务完成。在 SQL Server 内部，这个过程的工作方式相同。当您从数据库请求数据时，您希望获得您所请求的数据返回，而没有数据在您请求时被修改的风险。


  当您运行事务时，它将受到 SQL Server 在您正在访问的对象上放置的锁的保护。如果另一个事务想要与同一对象交互，则会发生阻塞。当发生阻塞时，后一个事务将必须等待，直到对象上的锁被移除。然后，该事务可以在对象上放置自己的锁并开始其交互。


  在 SQL Server 中，我们有许多可用选项来控制锁定和阻塞的行为，其中大多数与更改针对数据库的某些或所有事务的隔离级别有关。在 SQL Server 内部，我们也可以访问大量关于锁定和阻塞的信息，其中非常重要的一部分就在等待统计中。事务等待访问锁定对象的时间被记录为特定的、与锁相关的等待类型的等待时间（取决于事务打算放置的锁的类型）。


  在本章中，我们将讨论与锁定和阻塞相关的各种等待类型，以及如何降低或甚至解决它们。这需要一些关于 SQL Server 如何使用锁的知识，因此我专门包含了一节内容，让我们在深入研究锁等待类型之前熟悉锁定和阻塞。


  ## 锁与阻塞简介


  正如我们刚才讨论的，SQL Server 使用锁来隔离不同的并发事务，使得数据在任一时刻仅被一个事务访问或修改。SQL Server 可以使用多种锁类型，或称为锁模式，并且可以对不同级别的对象放置锁。更为复杂的是，不同的锁模式之间不一定兼容，当两个不兼容的锁相遇时，就会发生阻塞。


  ### 锁模式与兼容性


  首先，让我们熟悉一下 SQL Server 内部的不同锁类型，或称锁模式。下面的列表描述了最常见的锁模式。SQL Server 内部还有更多的锁模式，但它们仅在执行非常特定的操作时才会出现。所有不同锁模式的完整列表可以在
  MSDN 上讨论锁模式的页面找到：[`https://technet.microsoft.com/en-us/library/ms175519.aspx`](https://technet.microsoft.com/en-us/library/ms175519.aspx)。SQL
  Server 使用缩写来指示正在使用的锁模式。这些缩写显示在括号中：


  *   共享 (`S`)：当查询从某个资源中选择数据时，将在该资源上放置共享锁。例如，执行 `SELECT * FROM [table]`。


  *   更新 (`U`)：更新锁模式用于查询想要修改资源时。引入它是为了防止“死锁”，即在并发事务中，多个锁相互等待释放以修改同一资源的情况。


  *   排他 (`X`)：当事务想要修改资源时，会放置排他锁。当排他锁就位时，其他事务无法修改该资源。例如，`INSERT`、`UPDATE` 或 `DELETE`
  T-SQL 语句将导致排他锁。


  *   架构 (`Sch`)：架构锁在表被修改时使用。例如向表中添加一列。


  *   意向 (`I`)：意向锁用于表示在锁层次结构的较低级别已经放置了锁。我们稍后会详细讨论锁层次结构。


  当不同的锁需要相互交互时，SQL Server 会对涉及的锁模式执行锁兼容性检查。并非所有的锁模式都彼此兼容，这意味着当两个不同的事务因为锁不兼容而无法同时访问资源时，就会发生阻塞。例如，当放置共享锁来读取一行时，另一个事务想要通过放置排他锁来修改该行，则排他锁将必须等待，直到共享锁被移除。表
  8-1 显示了共享、更新和排他锁模式的锁模式兼容性。


  表 8-1 锁兼容性


  | 锁模式 | 共享 | 更新 | 排他 |

  | --- | --- | --- | --- |

  | **共享** | 是 | 是 | 否 |

  | **更新** | 是 | 否 | 否 |

  | **排他** | 否 | 否 | 否 |


  让我们通过一个例子来说明锁兼容性。假设你想通过针对某个表执行 `SELECT` 语句来读取其中一行。当你执行查询时，SQL Server 会检查你想要访问的行上是否已存在任何锁，以及该锁是否与你想要放置在该行上的锁兼容。假设在你运行查询时没有锁存在。这种情况下，将在该行上放置一个共享锁，表明你的查询正在从该行读取数据。在你执行查询之后，另一个用户发起了另一个事务，想要修改你正在访问的行中的数据。SQL
  Server 将检测到该行上已存在一个共享锁，这使得第二个事务在放置其排他锁之前需要等待，因为共享锁和排他锁不兼容。运行第二个事务的用户可能会遇到延迟，因为该事务正在等待共享锁被移除，然后才能放置其排他锁。如果启动了第三个事务，想要读取与你事务相同的行，则不会发生锁冲突。共享锁与其他共享锁是兼容的，这意味着第三个事务无需等待即可放置其锁，并且直接获得它请求的结果。


  图 8-1 展示了这个例子，其中虚线表示必须等待的不兼容锁。


  ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig1_HTML.jpg](img/340881_2_En_8_Fig1_HTML.jpg)

  图 8-1 并发锁情况


  ### 锁层次结构


  SQL Server 使用多粒度锁机制，允许为不同级别的对象放置不同的锁。这样做是为了最小化锁的开销成本。可以放置锁的最低级别的对象是行，最大的是数据库。在这两个粒度级别之间有许多级别，SQL
  Server 自动决定应在哪个级别放置锁以最小化锁开销。以下列表显示了最常见的锁级别，从最高粒度到最小粒度排序：


  *   数据库


  *   数据库文件


  *   表/对象


  *   区


  *   页


  *   `RID`（堆中的行）/`KEY`（聚集索引中的行）


  我们之前讨论的意向锁在在不同的粒度级别上放置锁也起着重要作用。SQL Server 会在较高粒度级别的对象上放置意向锁，以指示已在较低级别放置了锁。这保护了较低级别的锁免受较高级别对象上更改的影响。从最高粒度级别到对象上的实际锁，所有放置的意向锁一起查看时，被称为锁层次结构。


  图 8-2 展示了修改行内数据的锁层次结构的图形表示，这将需要在行上放置排他锁，并在层次结构的更高层级放置意向排他锁。


  ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig2_HTML.jpg](img/340881_2_En_8_Fig2_HTML.jpg)

  图 8-2 锁层次结构示例


  请注意数据库级别的共享锁。每个请求总是会放置一个共享锁，以在事务活动时保护数据库免受更改。这确保了，例如，你无法在事务仍处于活动状态时删除数据库。另请注意，意向锁将在最低级别的对象上使用相同的锁模式，在本例中是意向排他锁
  (`IX`)。如果放置了共享锁，意向锁的锁模式也会相应改变，在本例中变为意向共享锁 (`IS`)。我们将在本章后面更深入地探讨意向锁。



  ### 隔离级别


  我们可以通过更改隔离级别来控制事务放置的锁的类型。隔离级别定义了在并发操作期间事务彼此隔离的程度。我们可以在连接或事务基础上更改隔离级别。更改隔离级别只会更改共享锁的行为；数据修改所需的排他锁不受影响。更改隔离级别还会引入某些现象。这些现象会影响读取事务的结果，并且是因为事务期间放置和持有共享锁的方式发生变化而产生的。以下列表按从最低到最高的顺序显示了
  SQL Server 中可用的各种隔离级别以及与之相关的现象：


  #### Read Uncommitted（未提交读）

  此隔离级别允许在另一个事务正在修改同一对象时进行读取。它不会等待对象上的排他锁被释放。这使得可以读取未提交的值，称为“脏读”。脏读可能很糟糕（如果您不期望它们的话），因为它们可能返回数据库中不再最新的值。例如，如果有人正在将值从“A”更新为“B”，而其他用户在同一时间查询相同数据，可能会得到旧值“A”而不是更新后的“B”值。


  #### Read Committed（已提交读）

  这是 SQL Server 中的默认隔离级别。使用此隔离级别将使读取事务等待，直到并发的写入事务完成。将在行上放置一个共享锁，并在读取该行后立即释放。与此隔离级别相关的现象称为“不一致分析”。这意味着如果数据在两次读取事务之间的时间被另一个事务修改，那么相同的读取查询可能会得到不同的结果。


  #### Repeatable Read（可重复读）

  将隔离级别设置为可重复读会锁定事务正在读取的行。但是，可重复读不会在读取行后释放共享锁，而是会一直持有该锁，直到整个事务完成。可重复读可能允许“幻读”发生。幻读发生在另一个事务添加或更改了尚未被读取事务锁定的数据时。


  #### Serializable（可序列化）

  可序列化隔离级别是您可以使用的最高可能隔离级别，这意味着它会放置最多的锁，以确保您读取的数据在事务运行期间不会被修改。它通过锁定您正在选择的数据的整个范围（例如，整个表）来实现这一点，使得无法更改该数据。由于您正在选择的整个数据范围在事务开始时就被锁定，因此不可能出现任何现象。


  SQL Server 2005 添加了另一种用于隔离事务的方法，称为行版本控制。行版本控制使用数据修改的版本，并将它们返回给读取查询而不会导致阻塞。当事务修改数据时，该更改将被记录为一个版本。当读取事务访问相同数据时，它将收到在修改事务提交之前的更改版本。有关行版本控制的更多信息可以在在线手册中找到：[`https://technet.microsoft.com/en-us/library/ms189050.aspx`](https://technet.microsoft.com/en-us/library/ms189050.aspx)。


  由于隔离级别及其锁定行为可能很复杂，我添加了图 8-3，它显示了各种隔离级别在读取操作期间实现锁定的方式。方框代表表中的行，带有锁的行表示该行上有一个活动的共享锁。


  ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig3_HTML.jpg](img/340881_2_En_8_Fig3_HTML.jpg)


  图 8-3：隔离级别和锁定行为


  您希望使用与默认的 Read Committed 不同的隔离级别有各种原因。在许多情况下，这些原因与您预期工作负载产生的锁/阻塞量，或者您的事务返回的数据应该有多“正确”有关。例如，在默认的
  Read Committed 隔离级别下，其他事务有可能在您的事务运行时修改数据，这意味着事务结束时的结果与事务开始时不同。为了确保在您的事务运行时没有数据可以更改，您可以使用
  Serializable 隔离级别，但这意味着需要放置和维护更多的锁，从而在并发 SQL Server 环境中导致更多的阻塞。


  我们只能通过专门为连接配置不同的隔离级别或提供表提示（一个例外是快照隔离，它是在数据库级别配置的）来更改默认的 Read Committed 隔离级别。例如，下面的两个查询展示了两种不同的方法来执行使用
  Read Uncommitted 隔离级别的查询。第一个查询为整个会话设置事务隔离级别：


  ```

  SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED

  GO

  BEGIN TRANSACTION

  SELECT *

  FROM Person.Person

  COMMIT TRANSACTION;

  GO

  ```


  另一种方法是使用表提示将隔离级别设置为 Read Uncommitted：


  ```

  SELECT *

  FROM Person.Person

  WITH (READUNCOMMITTED);

  ```


  这两种方法都将达到相同的效果，但请记住，为会话设置隔离级别将导致在此之后在该特定会话中执行的所有查询都使用选定的隔离级别。



  ### 查询锁信息


  若要查看当前已放置的锁，我们可以使用 `sys.dm_tran_locks` 这个动态管理视图。此 DMV 会为 SQL Server 实例中的每一个活动锁返回一行记录，其中包含锁的类型、资源类型、放置该锁的会话
  ID，以及该锁是已授予还是正在等待被放置等信息。图 8-4 展示了我的测试 SQL Server 机器上该 DMV 输出的一小部分内容。

  ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig4_HTML.jpg](img/340881_2_En_8_Fig4_HTML.jpg)

  图 8-4. `sys.dm_tran_locks` 输出


  如果我们看一下图 8-4，可以看到多个排他锁已被授予并放置在键锁级别。这意味着一个事务当前正在修改聚集索引内的数据。在键锁级别之上的页面级别还有一个意向排他锁，这表明在层次结构的下方存在一个排他锁。另外请注意，一个共享锁当前正等待在同一数据页
  (`1:20432`) 上被放置。该锁还不能被授予，因为存在一个不兼容的意向排他锁。


  由于共享锁必须等待才能放置到数据页上，我们可以通过查看等待统计信息来观察它已经等待了多久。图 8-5 显示了针对 `sys.dm_os_waiting_tasks`
  DMV 进行查询的部分结果。

  ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig5_HTML.jpg](img/340881_2_En_8_Fig5_HTML.jpg)

  图 8-5 `sys.dm_os_waiting_tasks` 中的锁信息


  通过使用 `sys.dm_os_waiting_tasks` DMV，我们可以看到会话 ID 55 当前正在等待一个名为 `LCK_M_S` 的资源。这代表一个共享锁资源类型。会话
  ID 55 当前被会话 ID 53 阻塞，而会话 ID 53 恰好就是那个在会话 ID 55 试图查询的对象上放置了排他锁和意向排他锁的会话。`sys.dm_os_waiting_tasks`
  DMV 还会返回一些信息，这些信息可以用作 `sys.dm_tran_locks` DMV 的输入。此信息将位于 `sys.dm_os_waiting_tasks`
  DMV 的 `resource_description` 列中，如图 8-6 所示。

  ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig6_HTML.jpg](img/340881_2_En_8_Fig6_HTML.jpg)

  图 8-6 阻塞期间 `sys.dm_os_waiting_tasks` DMV 的 `resource_description` 列


  如果我们复制 `associatedObjectID` 并将其用作针对 `sys.dm_tran_locks` DMV 的 `WHERE` 子句的输入，我们将获得更多关于此任务为什么等待以及在等待什么的信息。以下查询将检索
  `sys.dm_tran_locks` DMV 中所有 `resource_associated_entity_id` 为 `72057594045333504`
  的行：

  ```sql

  SELECT *

  FROM sys.dm_tran_locks

  WHERE resource_associated_entity_id = '' 72057594045333504'';

  ```

  在我的测试 SQL Server 上，该查询返回了 32 个锁，其中 26 个是聚集索引中行上的排他锁；还有多个数据页上的意向排他锁，以及一个等待被放置到页面上的共享锁。这个等待中的共享锁就是
  `sys.dm_os_waiting_tasks` DMV 所返回的那个锁。部分结果显示在图 8-7 中。

  ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig7_HTML.jpg](img/340881_2_En_8_Fig7_HTML.jpg)

  图 8-7 来自 `sys.dm_tran_locks` 的锁信息


  在锁和阻塞发生很多的系统上，通过查询 `sys.dm_tran_locks` DMV 来查找锁信息并弄清楚谁在阻塞谁可能是一个挑战，因为该 DMV 会为每一个放置的锁返回一行。另一种更简单的方法来分析锁和阻塞是使用
  Adam Machanic 创建的 `sp_WhoIsActive` 存储过程。此存储过程将返回当时正在运行的所有内容的信息，是分析性能问题的绝佳工具。通过一些额外的参数，它还会返回丰富的锁信息，而无需你自己连接各种
  DMV。你可以从其网站 [`http://whoisactive.com/downloads/`](http://whoisactive.com/downloads/)
  下载 `sp_WhoIsActive`。


  为了向你展示 `sp_WhoIsActive` 存储过程的例子，我在我的测试 SQL Server 遭遇阻塞问题时运行了它。最基本的方法是直接执行它：

  ```sql

  EXEC sp_WhoIsActive;

  ```

  图 8-8 显示了结果的一小部分。还有许多其他可用的列，可以向你显示额外信息，例如阻塞会话的会话 ID。

  ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig8_HTML.jpg](img/340881_2_En_8_Fig8_HTML.jpg)

  图 8-8 `sp_WhoIsActive` 默认结果


  我们可以直接识别等待统计信息以及此时正在执行的查询。因为 `blocking_session_id` 列对于 `SELECT` 查询返回了会话 ID 55，我们应该查看由会话
  ID 55 执行的查询正在做什么。通过单击 `sql_text` 列内的查询链接，我们可以查看整个查询文本，如图 8-9 所示。

  ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig9_HTML.jpg](img/340881_2_En_8_Fig9_HTML.jpg)

  图 8-9 来自 `sp_WhoIsActive` 的 `sql_text` 输出


  在这个特定案例中，我们可能可以相当快地解决阻塞问题。造成阻塞的查询让其事务保持打开状态，而没有执行 `COMMIT` 或 `ROLLBACK`。只要一个事务保持打开，锁就会被保持而不释放。


  `sp_WhoIsActive` 存储过程还有一个参数可以返回额外的锁信息，包括有关锁层次结构的信息。下面的查询将执行 `sp_WhoIsActive` 存储过程并为当前正在执行的查询检索额外的锁信息：

  ```sql

  EXEC sp_WhoIsActive @get_locks=1;

  ```

  图 8-10 显示了添加到 `sp_WhoIsActive` 输出中的新列。

  ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig10_HTML.jpg](img/340881_2_En_8_Fig10_HTML.jpg)

  图 8-10 `sp_WhoIsActive` 返回的锁信息


  通过单击 `locks` 列下方的链接，我们可以查看正在使用哪些锁以及它们放置在哪些对象上。这还将让我们很好地了解此特定查询所使用的锁层次结构。图 8-11 显示了图
  8-10 中第一个返回查询的额外锁信息。

  ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig11_HTML.png](img/340881_2_En_8_Fig11_HTML.png)

  图 8-11 `sp_WhoIsActive` 返回的额外锁信息


  在这里，我们看到在 `OBJECT` 级别放置了一个意向排他锁，这意味着在 XML 模式的 `Object name` 字段中显示的对象上放置了一个锁——本例中是
  `Address`，这是一个表。再下一级，在页面级别，我们还看到在 `Address` 表的两个不同索引内有两个意向排他锁。在底层，我们看到排他锁，它们放置在
  `KEY` 对象上，这表示索引中的行。


  `sp_WhoIsActive` 存储过程还有许多其他可用的参数，每一个都会返回关于 SQL Server 各个部分的更多信息。这使得 `sp_WhoIsActive`
  存储过程成为了解 SQL Server 实例内部情况的一个极好工具，我鼓励你尝试一下。


  既然我们已经讨论了锁和阻塞的许多方面，从锁模式和层次结构到分析锁和阻塞，我们应该准备好去了解一下 SQL Server 中与锁相关的等待类型了。请记住，这个关于锁和阻塞的介绍远非该主题的完整指南，因为深入探讨
  SQL Server 内部锁和并发的工作原理本身就足以写成一本书。


  ## LCK_M_S


  第一个与锁相关的等待类型是 `LCK_M_S` 等待类型。此等待类型表示一个任务正在等待在某个资源上放置共享锁。


  ### 什么是 LCK_M_S 等待类型？


  `LCK_M_S` 等待类型表明一个任务正在或已经等待在某个资源上放置共享锁。需要理解的是，只有当发生某种形式的阻塞时，你才会看到这种等待类型，因为任务正在等待放置共享锁。这并不意味着资源上有一个活动的共享锁。这对于每一个与锁相关的等待类型都是成立的，因为它们只在发生阻塞情况时才会被记录。


  由于 `LCK_M_S` 等待类型与共享锁相关，它会在执行读取操作但因我们想要读取的资源上已存在不兼容的锁而必须等待时发生。我们能够放置共享锁之前所等待的时间，会被记录为
  `LCK_M_S` 等待类型的等待时间。


  图 8-12 展示了一个通常会导致 `LCK_M_S` 等待发生的常见情况。在这种情况下，T1 已在一个页面上放置了独占锁，表示正在进行数据修改。当 T2 想要从该页面读取数据时，它需要放置一个共享锁，但由于独占锁和共享锁不兼容，因此发生了
  `LCK_M_S` 等待。


  ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig12_HTML.jpg](img/340881_2_En_8_Fig12_HTML.jpg)


  图 8-12

  LCK_M_S 等待正在发生


  ### LCK_M_S 示例


  创建一个 `LCK_M_S` 等待发生的例子并不困难，因为我们只需要在数据修改查询和数据读取查询之间制造一个阻塞情况。


  在这个例子中，我们将针对 `AdventureWorks` 数据库运行清单 8-1 中所示的查询。此查询将启动一个事务并修改几行数据，但不会提交或回滚该事务。由于我们通过提供
  `BEGIN TRAN` 显式地指定了此事务，SQL Server 将保持锁不变，直到我们显式执行 `COMMIT` 或 `ROLLBACK` 命令。


  ```

  BEGIN TRAN

  UPDATE Sales.SalesOrderDetail

  SET CarrierTrackingNumber = ''4E0A-4F89-AD''

  WHERE SalesOrderID = ''43661'';

  清单 8-1

  启动一个修改事务

  ```


  当我们执行查询时，会很快收到结果；在我的例子中，有 15 行被更新。但正如我之前所说，事务尚未完成，因此它将保持运行状态，在其修改的对象上保留锁。


  到目前为止，我们并未引起任何阻塞，因为这是一个测试 SQL Server，没有其他查询在运行。让我们改变这一点，制造一个阻塞情况。


  为此，我们将在 SQL Server Management Studio 中打开第二个窗口，并执行清单 8-2 中所示的查询。这将仅对 `Sales.SalesOrderDetail`
  表执行一个 `SELECT` 操作，也就是我们当前正在修改数据的同一张表。


  ```

  SELECT *

  FROM AdventureWorks.Sales.SalesOrderDetail;

  清单 8-2

  从正在执行修改操作的表中选择数据

  ```


  一旦我们运行这个 `SELECT` 查询，就会注意到没有结果返回，并且查询会一直运行。这是一个典型的阻塞操作示例，其中一个事务正在修改另一个事务中我们想要读取的数据。


  如果我们查询 `sys.dm_os_waiting_tasks` DMV，就能够看到 `LCK_M_S` 等待类型，如图 8-13 所示。


  ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig13_HTML.jpg](img/340881_2_En_8_Fig13_HTML.jpg)


  图 8-13

  LCK_M_S 等待正在发生


  `LCK_M_S` 等待得以解决的唯一方式是移除不兼容的锁。在这个案例中，我们回滚了在第一个 SQL Server Management Studio 窗口中启动的修改事务。我们通过在同一个会话窗口中运行
  `ROLLBACK` 命令来完成此操作。在执行事务回滚后，我们立即收到了 `SELECT` 查询请求的结果。查询 `sys.dm_os_waiting_tasks`
  也显示 `LCK_M_S` 等待已解决。


  ### 减少 LCK_M_S 等待


  看到 `LCK_M_S` 等待发生并不一定意味着出了问题。然而，它确实表明有阻塞正在发生。如果你注意到 `LCK_M_S` 等待类型的等待时间很长，这意味着某人的读取事务当前需要很长时间才能完成，因为它必须等待放置共享锁。因此，第一步将是识别导致阻塞的查询。我们可以通过使用
  `sys.dm_os_waiting_tasks` DMV 并查看 `blocking_session_id` 列来实现。当只有一个活动的阻塞时，这样做相对快速，但当许多并发查询被其他事务阻塞时，情况可能会变得复杂。在这种情况下，我们必须沿着阻塞链追踪，直到找到头阻塞者（即对象上的第一个锁）。另一个选择是使用我们在本章开头“锁和阻塞介绍”中讨论过的
  `sp_WhoIsActive` 存储过程。此存储过程将为你遍历阻塞链，直接显示头阻塞者。


  找到导致阻塞发生的查询后，我们需要对其进行分析，看看是否可以优化该查询。也许它请求的锁比实际需要的多，因此需要很长时间才能完成。优化该查询的一种方法是查看是否应添加任何索引，以便需要锁定的行更少。或者，你可以将单个事务拆分为多个事务，每个事务访问更少的对象。另一个可能导致比必要更多锁的潜在问题是过时的统计信息。统计信息用作查询计划的输入，如果它们不能准确反映表或索引的内容，可能会导致不良的查询计划，进而可能导致比必要的更多的锁。


  另一个选择是更改读取事务的隔离级别，这样就不需要共享锁来读取数据。例如，将隔离级别设置为未提交读（Read Uncommitted）将不放置共享锁，读取事务也就不会被阻塞。这确实引入了另一个与隔离级别相关的问题，即脏读，我们在本章的“锁和阻塞介绍”部分讨论过。除了使用未提交读，你还可以使用快照隔离（Snapshot
  Isolation），这将导致更少的共享锁，但不会引起脏读。快照隔离确实会给 TempDB 数据库带来更大的负载，因为如果许多并发事务正在修改数据，它必须维护数据的版本。


  ### LCK_M_S 总结


  当某个资源上正在放置一个不兼容的锁，而另一个事务想要在同一资源上放置共享锁时，就会发生 `LCK_M_S` 等待类型。看到 `LCK_M_S` 等待类型意味着事务正在被阻塞。你应该尝试识别哪些查询导致了阻塞的发生，并查看是否可以优化这些查询以产生更少的锁或持续时间更短的锁。作为最后的手段，你可以选择更改读取事务的隔离级别，尽管这确实会带来其他副作用，例如脏读或
  TempDB 内部负载的增加。


  ## LCK_M_U


  `LCK_M_U` 等待类型与使用更新（U）模式的锁相关。当一个任务想要在某个资源上放置更新锁，但该资源上已存在一个不兼容的锁时，就会发生 `LCK_M_U`
  等待。



  ## LCK_M_U


  ### 什么是 LCK_M_U 等待类型？


  更新锁是一种特殊的锁模式，表示即将发生数据修改。尽管其名称可能让人以为它仅与 `UPDATE` 查询相关，但更新锁也可能在执行 `INSERT` 或 `DELETE`
  语句时出现。


  更新锁的存在主要是为了防止发生死锁。死锁指的是两个事务都试图修改同一个对象，并无限期地等待对方释放资源上的独占锁。要理解死锁是如何发生的，以及更新锁如何防止这种情况，请看以下未使用更新锁时可能发生的情形。


  当两个并发事务想要修改同一个对象时，两个事务首先会在其打算修改的数据所在位置放置一个共享锁。由于共享锁与其他共享锁是兼容的，两个事务不会相互阻塞。当其中一个事务找到需要修改的数据时，它会将其共享锁转换为独占锁，此时问题就会出现。由于共享锁与独占锁不兼容，并且另一个事务也在该资源上持有共享锁，因此共享锁无法转换为独占锁。该事务需要等待另一个事务的共享锁被移除后，才能将其自己的共享锁转换为独占锁，但另一个事务也想将其共享锁转换为独占锁，最终两个事务都会无限期地相互等待，从而形成死锁。SQL
  Server 会自动检测死锁情况，并选择其中一个事务作为牺牲品进行回滚，从而结束死锁状态。图 8-14 以图形化方式展示了这种情况。


  ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig14_HTML.jpg](img/340881_2_En_8_Fig14_HTML.jpg)


  图 8-14：锁转换期间的死锁


  当在 SQL Server 中使用更新锁时，不会发生死锁。更新锁与共享锁兼容，但与独占锁或其他更新锁不兼容。在前面的场景中，第一个找到需要修改数据的事务不会直接转换为独占锁，而是先转换为更新锁。由于更新锁和共享锁是兼容的，即使另一个事务已持有共享锁，转换为更新锁也不会有问题。然后，更新锁会转换为独占锁，以便进行数据修改。图
  8-15 展示了这种锁行为。


  ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig15_HTML.jpg](img/340881_2_En_8_Fig15_HTML.jpg)


  图 8-15：并发数据修改期间的更新锁


  当一个事务想要放置更新锁，但该对象上已存在不兼容的锁（例如独占锁）时，系统将记录 `LCK_M_U` 等待类型。


  ### LCK_M_U 示例


  为了向您展示一个发生 `LCK_M_U` 等待的示例，我们需要创建一个并发事务想要修改同一资源的场景。为此，我们将使用 Ostress 工具通过多个连接执行相同的查询。我将要执行的查询如清单
  8-3 所示。该查询将对 `AdventureWorks` 数据库中的 `Person.Address` 表执行 `UPDATE` 操作。我将该查询保存在一个名为
  `LCK_M_U.sql` 的 .sql 文件中。


  ```

  UPDATE Person.Address

  SET City = ''Los Angeles''

  WHERE StateProvinceID = 9;

  清单 8-3：修改 Person.Address 表

  ```


  保存文件后，我使用以下命令运行 Ostress 工具：


  ```

  "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -E -dAdventureWorks2012
  -i"C:\lck_m_u.sql" -n150 -r5 -q

  ```


  这将创建 150 个并发连接，每个连接执行清单 8-3 中的查询五次。这应该足以产生一些阻塞。


  在 Ostress 工具运行时，我查询 `sys.dm_os_waiting_tasks` DMV 以了解有哪些任务正在等待。结果的一小部分如图 8-16 所示。


  ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig16_HTML.jpg](img/340881_2_En_8_Fig16_HTML.jpg)


  图 8-16：发生的 LCK_M_U 等待


  如图 8-16 所示，许多不同的会话都在等待获取更新锁，但都被会话 ID 161 阻塞。如果我们查询 `sys.dm_tran_locks` DMV 来获取有关此会话的锁信息，可以看到它已被授予一个不兼容的独占锁，如图
  8-17 所示。


  ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig17_HTML.jpg](img/340881_2_En_8_Fig17_HTML.jpg)


  图 8-17：会话 ID 161 持有独占锁


  所有其他会话将不得不等待，直到会话 ID 161 的独占锁被移除。然后，其中一个会话将获取其请求的更新锁，将其转换为独占锁，并执行其修改操作。这个循环会重复进行，直到所有会话完成其修改。


  ### 降低 LCK_M_U 等待


  降低 `LCK_M_U` 等待的方法与降低 `LCK_M_S` 等待类型的方法相同：尝试识别导致阻塞发生的事务，并尝试优化其锁行为。


  更改隔离级别对 `LCK_M_U` 等待时间影响不大，因为其他隔离级别主要影响执行读取的事务。因此，如果你需要降低 `LCK_M_U` 等待类型异常高的等待时间，优化查询和/或索引是可行之道。


  ### LCK_M_U 总结


  `LCK_M_U` 等待类型与使用更新锁模式的锁相关。更新锁用于防止当并发事务尝试将其共享锁转换为独占锁时发生死锁。降低 `LCK_M_U` 等待时间主要通过优化可能引起阻塞的查询或索引来实现。


  ## LCK_M_X


  另一种最常见的与锁相关的等待类型是 `LCK_M_X` 等待类型。就像我们讨论过的前两种与锁相关的等待类型一样，`LCK_M_X` 等待类型与一种特定的锁类型（这里是独占锁）相关。同样，看到这种等待类型就意味着正在发生某种形式的阻塞。


  ### 什么是 LCK_M_X 等待类型？


  当任务等待在对象上放置独占锁时，就会发生 `LCK_M_X` 等待。由于独占锁与几乎所有其他锁模式（包括其他独占锁）都不兼容，因此在存在大量并发修改时看到阻塞发生是相当常见的。这意味着看到
  `LCK_M_U` 等待发生也很常见，尤其是在具有高并发事务量的系统中。




  ### LCK_M_X 示例


  为了演示 `LCK_M_X` 等待的发生，我们将执行一个 `SELECT` 语句但不提交它。在运行 `SELECT` 之前，我们将把隔离级别设置为可重复读（Repeatable
  Read）。这样做可以确保在事务仍在运行时共享锁不会被移除。由于我们不会结束事务，锁将保留在对象上，直到我们终止事务或执行 `COMMIT` 或 `ROLLBACK`。下面的查询显示了我们将在
  `AdventureWorks` 数据库上执行的 `SELECT` 语句：


  ```sql

  SET TRANSACTION ISOLATION LEVEL REPEATABLE READ

  BEGIN TRANSACTION

  SELECT *

  FROM HumanResources.Employee;

  -- COMMIT

  ```


  请注意，我们注释掉了 `COMMIT` 部分以确保锁保持不变。执行查询后会很快返回结果，仅仅 1 秒后我就得到了 `HumanResources.Employee`
  表的所有行。如果我们查询 `sys.dm_tran_locks` 动态管理视图（DMV），应该能看到所有的共享锁仍然存在，如图 8-18 所示。


  ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig18_HTML.jpg](img/340881_2_En_8_Fig18_HTML.jpg)


  **图 8-18**

  共享锁仍然存在


  在这些锁仍然生效时，我们将在 SQL Server Management Studio 的一个新窗口中运行另一个查询。下面的查询将对同一个 `HumanResources.Employee`
  表中的单行执行 `UPDATE` 操作：


  ```sql

  UPDATE HumanResources.Employee

  SET JobTitle = ''Tester''

  WHERE BusinessEntityID = 5;

  ```


  一旦我们执行前面的查询，就会注意到发生了阻塞，因为查询持续运行而不返回任何结果。这是预期的行为，因为该行（具体来说是索引键）上存在一个共享锁，阻止我们对其进行更新。


  当我们查看 `sys.dm_os_waiting_tasks` DMV 时（如图 8-19 所示），会注意到第二个窗口中的查询正在等待放置一个排他锁，由 `LCK_M_X`
  等待类型指示。


  ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig19_HTML.jpg](img/340881_2_En_8_Fig19_HTML.jpg)


  **图 8-19**

  发生 LCK_M_X 等待


  如果我们结束 `SELECT` 查询，无论是通过执行 `COMMIT` 语句还是关闭 SQL Server Management Studio 中的窗口，共享锁都会被移除，然后第二个查询就能够执行其
  `UPDATE` 命令，从而结束 `LCK_M_X` 等待。


  ### 降低 LCK_M_X 等待


  要降低 `LCK_M_X` 等待时间，您应该采用与降低其他与锁相关的等待类型相同的方法。尝试识别哪些查询导致了阻塞，并查看是否可以优化它们以减少阻塞。


  ### LCK_M_X 总结


  `LCK_M_X` 等待类型与排他锁被同一资源上已存在的其他锁阻塞有关。由于排他锁几乎与所有其他锁类型不兼容，因此在经历并发查询执行的 SQL Server 实例上看到
  `LCK_M_X` 等待发生并不罕见。


  ## LCK_M_I[xx]


  看到 `LCK_M_I[xx]` 等待类型意味着一个任务在放置意向锁时被阻塞。由于我们已经在前面讨论过对象上的各种锁模式，在讨论这种等待类型时，我将意向锁使用的锁模式用
  `[xx]` 代替。`[xx]` 可以替换为多种不同的锁模式；例如，意向共享锁上的阻塞将由 `LCK_M_IS` 等待类型表示，而意向排他锁上的阻塞则显示为 `LCK_M_IX`。


  ### LCK_M_I[xx] 等待类型是什么？


  `LCK_M_I[xx]` 等待类型表示一个任务正在等待在对象上放置意向锁。正如我们从本章开头的“锁和阻塞简介”部分所学，意向锁指示在锁层次结构的较低级别对象上放置了相同类型的锁。这并不意味着意向锁的存在仅仅是为了警告
  SQL Server 在层次结构的下方还有锁。意向锁的行为就像任何其他锁一样，一个意向锁完全有可能阻塞另一个不兼容的意向锁。意向锁在与其他不兼容的意向锁方面确实具有更多的灵活性。例如，在同一个页面对象上存在两个意向排他锁是可能的，这指示某一行将被修改。甚至可以在页面对象上同时存在一个意向共享锁和一个意向排他锁，因为这两个锁可以读取和/或修改不同的行。


  除了指示锁层次结构下方存在的锁类型外，意向锁还具有一些其他锁模式所没有的“特殊”模式。意向锁可以代表锁层次结构较低级别的多种锁模式。下面的列表描述了这三种意向锁模式：


  *   **共享意向排他锁（SIX）**：此锁模式表示在较低级别的所有对象上存在共享锁，并且在其中一些对象上存在意向排他锁。这些锁由一个事务获取，该事务希望读取数据并同时计划修改其他数据。当任务在尝试放置
  SIX 锁时被阻塞，将由 `LCK_M_SIX` 等待类型记录。


  *   **共享意向更新锁（SIU）**：此锁模式是共享锁和意向更新锁的组合。同样，单个事务可以同时在较低级别获取并持有这两种锁模式。如果在尝试放置此锁时发生阻塞，`LCK_M_SIU`
  等待类型将用于记录等待时间。


  *   **更新意向排他锁（UIX）**：此锁模式是另外两种锁模式——更新锁和意向排他锁——的组合。此锁模式上的阻塞将由 `LCK_M_UIX` 等待类型表示。


  在意向锁上看到高等待时间并不常见，因为意向锁在相互不兼容性方面要灵活得多。这意味着在意向级别的阻塞通常比锁层次结构更低的级别要少。




  ### LCK_M_I[xx] 示例


  在本例中，我们将生成一个 `LCK_M_IX` 等待类型。这意味着一个事务正在等待获取锁层次结构中更高级别的意向排他锁。


  我们将使用与 `LCK_M_X` 等待类型几乎相同的示例，通过运行一个使用 `REPEATABLE READ` 隔离级别的 `SELECT` 语句且不完成事务来实现。下面的查询是我将针对
  `AdventureWorks` 数据库的 `Person.Address` 表运行的查询：


  ```sql

  SET TRANSACTION ISOLATION LEVEL REPEATABLE READ

  BEGIN TRAN

  SELECT * FROM Person.Address;

  --COMMIT

  ```


  `COMMIT` 命令已被注释掉，以使事务保持打开状态。


  如果我们查看图 8-20 所示的 `sys.dm_tran_locks` DMV，我们会看到在查询运行时，当前只有一个活动的锁，即在 `OBJECT` 资源类型上的共享锁。这表明整个表已被锁定。由于此锁存在于如此高的级别，因此无需在层次结构的更低级别设置其他共享锁。


  ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig20_HTML.jpg](img/340881_2_En_8_Fig20_HTML.jpg)


  图 8-20：表上的共享锁


  如果另一个事务想要更新同一表中的一行，它将首先尝试获取表和页级别的意向排他锁，然后才能获取行级别的排他锁。下面的查询就是这样一个事务，在本例中，我们将尝试更新单行：


  ```sql

  UPDATE Person.Address

  SET AddressLine1 = ''1227 Shoe St.''

  WHERE AddressID = 5;

  ```


  您会注意到，只要 `SELECT` 查询仍然持有其表上的共享锁，前面的查询就会“挂起”。尽管意向锁在大多数情况下与同一对象上的其他意向锁兼容，但在本例中，在表级别持有共享锁的同时尝试在更低的层次执行数据修改，将导致阻塞发生。共享锁和意向排他锁是不兼容的。


  如果我们查看 `sys.dm_os_waiting_tasks` DMV，我们应该能够看到设置意向排他锁的任务正在等待，如图 8-21 所示。


  ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig21_HTML.jpg](img/340881_2_En_8_Fig21_HTML.jpg)


  图 8-21：正在发生的 LCK_M_IX 等待


  ### 降低 LCK_M_I[xx] 等待


  与我们之前讨论的其他与锁相关的等待类型一样，在尝试降低 `LCK_M_I[xx]` 等待时间时，应专注于导致阻塞的查询。因为 `LCK_M_I[xx]` 等待仅当锁层次结构中更高级别的对象上持有不兼容的锁时才会发生，所以花时间调查为什么这些锁被放置在层次结构的如此高位置是值得的。锁升级可能导致这种情况发生。当
  SQL Server 在锁层次结构的更高级别放置单个锁比在更低级别锁定多个对象更高效时，就会发生锁升级。例如，SQL Server 可以决定在表级别放置一个共享锁，而不是在行上放置数千个共享锁。这比维护数千个单个锁所需资源少得多。事实上，这正是我在向您展示的
  `LCK_M_IX` 等待类型示例中发生的情况。我们使用 `SELECT` 查询的 `Person.Address` 表包含超过 19,000 行。当我们对表运行
  `SELECT *` 查询时，这意味着至少需要 19,000 个行锁。由于放置和维护如此多的锁将消耗大量资源，SQL Server 决定在表上放置一个共享锁，而不是在行上放置
  19,000 个锁。


  如果我们能重写查询以减少所需的锁，例如，只选择前 *x* 行而不是所有内容，SQL Server 可能会选择再次锁定行，而不是整个表。


  ### LCK_M_I[xx] 总结


  `LCK_M_I[xx]` 等待类型与意向锁相关，或者更确切地说，与另一个不兼容的锁阻止设置意向锁的情况相关。意向锁被放置在更高级别的对象上，以表示在锁层次结构的更低级别上已放置了锁。与我们之前讨论的仅表示一种锁类型的锁模式不同，意向锁可以表示锁层次结构中更低级别的不同锁模式。`LCK_M_I[xx]`
  等待类型高等待时间的一个常见原因是 SQL Server 将较低级别的锁升级为更高级别的锁。在这种情况下，意向锁将被阻止且无法获取。


  ## LCK_M_SCH_S 和 LCK_M_SCH_M


  本章我想讨论的最后两个与锁相关的等待类型是 `LCK_M_SCH_S` 和 `LCK_M_SCH_M` 等待类型。这两种等待类型都与表上的锁相关，即所谓的架构锁。我们在本章前面没有过多关注架构锁，但由于它们在发生时可能对等待时间产生相当大的影响，因此我想在此介绍它们。


  ### 什么是 LCK_M_SCH_S 和 LCK_M_SCH_M 等待类型？


  `LCK_M_SCH_S` 和 `LCK_M_SCH_M` 等待类型都与架构锁相关。架构锁被放置在表级别，以在查询访问表时保护表不被修改，或者在表被修改时阻止查询访问表。架构锁有两种不同的类型：架构稳定性锁
  (Sch-S) 和架构修改锁 (Sch-M)。当任务被阻止获取架构稳定性锁或架构修改锁时，它们各自关联有不同的等待类型。当架构稳定性锁在获取前必须等待时，会记录
  `LCK_M_SCH_S` 等待类型（表示对表的读取访问）；当架构修改锁在等待获取时，会记录 `LCK_M_SCH_M` 等待类型（表示表架构将被更改）。


  两种架构锁与其他锁类型的兼容性都相当极端。架构稳定性锁与除架构修改锁以外的所有其他类型的锁都兼容。另一方面，架构修改锁与所有其他锁类型（包括意向锁）都不兼容。


  使用架构稳定性锁时，在查询当前正在读取或写入表的过程中，无法以任何方式修改或更改表。由于架构稳定性锁与所有锁模式（架构修改锁除外）兼容，因此在表级别看到架构稳定性锁与例如指示表内较低级别正在发生数据修改的意向排他锁共存是完全正常的。


  架构修改锁与架构稳定性锁相反，它们在执行对表的修改时阻止任何查询访问该表。


  ### LCK_M_SCH_S 与 LCK_M_SCH_M 示例


  对于第一个示例，我将向一个现有表中添加一个新列，并且像本章前面示例中所做的那样，通过不提供 `COMMIT` 或 `ROLLBACK` 命令来保持事务处于打开状态。接下来的查询在
  `AdventureWorks` 数据库的 `Person.Address` 表中添加了一个额外的列，但我将 `ROLLBACK` 命令保持为注释状态，以便锁保持不变：


  ```sql

  BEGIN TRAN

  ALTER TABLE Person.Address

  ADD

  Test VARCHAR(10);

  --ROLLBACK

  ```


  在 SQL Server Management Studio 的一个新窗口中，我将对 `Person.Address` 表执行一个简单的 `SELECT` 查询，如下所示：


  ```sql

  SELECT *

  FROM Person.Address;

  ```


  如果我们在两个查询都在运行时查看 `sys.dm_tran_locks` DMV，我们应该能够看到是否有任何阻塞发生。图 8-22 显示了针对 `sys.dm_tran_locks`
  DMV 执行 `SELECT *` 查询的部分输出。


  ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig22_HTML.jpg](img/340881_2_En_8_Fig22_HTML.jpg)


  图 8-22 Sch-M 和 Sch-S 锁


  从图 8-22 中可以看出，我们启动的第一个查询，其目标是向 `Person.Address` 表添加一列，导致该表上出现了一个 Sch-M 锁。第二个 `SELECT`
  查询正在等待获取同一表上的 Sch-S 锁。


  如果我们查询 `sys.dm_os_waiting_tasks` DMV，应该能看到一个正在等待 `LCK_M_SCH_S` 等待类型的任务。图 8-23 显示了在两个查询都在运行时
  `sys.dm_os_waiting_tasks` 的输出。


  ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig23_HTML.jpg](img/340881_2_En_8_Fig23_HTML.jpg)


  图 8-23 LCK_M_SCH_S 等待发生


  正如我们所料，`SELECT` 查询正在等待获取其架构稳定性锁。


  如果我们反转这个示例，通过启动一个读取事务并保持其打开状态，然后尝试修改同一个表，我们应该会遇到 `LCK_M_SCH_M` 等待，因为只有在我们要修改的表中没有活动事务时，我们才能获取架构修改锁。


  为了展示这种情况，我执行了以下查询。这将以可重复读隔离级别启动一个 `SELECT` 查询，但我保持事务打开以便锁保持不变：


  ```sql

  SET TRANSACTION ISOLATION LEVEL REPEATABLE READ

  BEGIN TRANSACTION

  SELECT * FROM

  Person.Address;

  -- COMMIT

  ```


  在 SQL Server Management Studio 的一个新窗口中，我将执行之前用于演示 `LCK_M_SCH_S` 等待类型的表修改查询，但这次不保持事务打开：


  ```sql

  ALTER TABLE Person.Address

  ADD

  Test VARCHAR(10);

  ```


  在执行第二个查询时，你可能会注意到没有任何结果返回，并且查询持续运行，这清楚地表明发生了阻塞。


  让我们再次查看 `sys.dm_tran_locks` DMV，看看能发现什么。图 8-24 显示了我的测试 SQL Server 上的输出。


  ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig24_HTML.jpg](img/340881_2_En_8_Fig24_HTML.jpg)


  图 8-24 等待被获取的 Sch-M 锁


  在这种情况下，该表因 `SELECT` 查询而持有一个共享锁。因为我们从一个相当大的表中选择信息，SQL Server 决定放置一个表级锁，而不是在较低级别放置锁。由于架构修改锁与所有其他锁类型都不兼容，因此发生了阻塞，我们将不得不等待，直到共享锁消失，才能执行表修改操作。


  查看 `sys.dm_os_waiting_tasks` DMV 向我们展示了预期的结果，一个 `LCK_M_SCH_M` 等待，如图 8-25 所示。


  ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig25_HTML.jpg](img/340881_2_En_8_Fig25_HTML.jpg)


  图 8-25 LCK_M_SCH_M 等待发生


  ### 降低 LCK_M_SCH_S 和 LCK_M_SCH_M 等待


  当你看到 `LCK_M_SCH_S` 或 `LCK_M_SCH_M` 等待类型发生时，可能有一个活动的事务想要修改该表。在 `LCK_M_SCH_S` 等待类型等待时间长的情况下，表修改事务已经在运行；而看到
  `LCK_M_SCH_M` 等待时，修改操作正在等待所有活动事务移除它们在该表上的锁。


  修改表并非在生产 SQL Server 实例上每天都会发生的事情（希望如此）。更改大型表尤其可能成为问题，并导致较高的 `LCK_M_SCH_S` 等待时间，试图查询正在被修改的表的用户会注意到延迟。然而，如果你确实需要修改一个表，但同时有一些长时间运行的查询正在从该表检索信息，那么你可能会遇到
  `LCK_M_SCH_M` 等待。


  降低这两种等待类型的等待时间与执行表修改操作直接相关。一个建议是在非工作时间执行表修改，或者在访问该表的并发事务尽可能少的时候进行，而不是在有很多针对该表的活动事务时进行修改。


  ### LCK_M_SCH_S 与 LCK_M_SCH_M 总结


  `LCK_M_SCH_S` 和 `LCK_M_SCH_M` 等待类型是架构稳定性或架构修改锁被其他锁阻塞的结果。看到这两种等待类型的高等待时间表明，要么是表修改操作正在等待移除该表上所有活动锁，要么是表修改操作当前正在运行，并因此阻塞了其他事务。


