  最有趣的部分是调用 `OfflineCheckpointWorker` 函数时。为了便于阅读，这里是涉及 `OfflineCheckpointWorker` 函数的部分：


  ```

  sqlmin.dll!SequencedObject,0>::WaitUntilSequenceAdvances+0x160

