  sqlmin.dll!OfflineCheckpointWorker::WorkLoop+0x3fc

  ```


  看到这个堆栈转储让我相信，离线检查点进程启动后，通过从事务日志读取日志记录 (`LogBlock`) 来开始寻找工作，抓取它需要处理的第一个 `LogBlock`，并循环处理直到所有
  `LogBlock` 处理完毕。完成之后，我推测离线检查点会再次进入休眠状态，等待大约 5 秒，然后唤醒并检查是否有新的日志记录。


  这种行为让我相信 `WAIT_XTP_OFFLINE_CKPT_NEW_LOG` 等待类型是无害的。它仅仅表明离线检查点进程正在等待工作到达。


  ### WAIT_XTP_OFFLINE_CKPT_NEW_LOG 总结


  `WAIT_XTP_OFFLINE_CKPT_NEW_LOG` 等待类型与离线检查点进程相关，并表明该进程正在等待工作到达。由于 `WAIT_XTP_OFFLINE_CKPT_NEW_LOG`
  等待类型仅表示离线检查点进程在等待工作，我认为该等待类型不表示任何性能问题，可以安全地忽略。


