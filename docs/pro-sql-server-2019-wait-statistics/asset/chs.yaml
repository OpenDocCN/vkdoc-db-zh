  我认为最有趣的一行是 `sqlmin.dll!CheckpointWithOptionalTruncate+0xe6`，它似乎是执行截断操作的函数。紧随其后的是
  `sqlmin.dll!HkCheckpointCtxtImpl::WaitForCkptComplete+0xd0` 这一行，我认为它记录了先前检查点函数所花费的时间，该时间随后被发布到等待统计
  DMV 中。


  我不认为看到 `WAIT_XTP_CKPT_CLOSE` 等待发生是需要直接担忧的原因。它们表明检查点正在被执行。我可以想象，`WAIT_XTP_CKPT_CLOSE`
  等待类型的突发高等待时间可能表明存在性能问题。正如我们在上一节中看到的，对内存优化表执行检查点将导致创建额外的 CFP。我猜测，如果 CFP 的分配耗时很长，那么检查点操作完成所需的时间也会更长，从而导致更高的
  `WAIT_XTP_CKPT_CLOSE` 等待时间。


  检查点需要处理的数据量可能也意味着更高的 `WAIT_XTP_CKPT_CLOSE` 等待时间。由于检查点将数据写入存储子系统，存储的性能也可能会影响 `WAIT_XTP_CKPT_CLOSE`
  等待时间。


  ### `WAIT_XTP_CKPT_CLOSE` 总结


  `WAIT_XTP_CKPT_CLOSE` 等待类型似乎与执行检查点操作密切相关。它表明对内存优化表执行的检查点完成所需的时间。我不认为这直接表明性能问题，因为它只是记录检查点完成所花费的时间。


  检查点需要处理的工作量可能会导致更高的 `WAIT_XTP_CKPT_CLOSE` 等待时间。存储子系统的性能可能也会影响 `WAIT_XTP_CKPT_CLOSE`
  等待时间。


  ## `WAIT_XTP_OFFLINE_CKPT_NEW_LOG`


  本章要讨论的最后一个与内存中 OLTP 相关的等待类型是 `WAIT_XTP_OFFLINE_CKPT_NEW_LOG` 等待类型。这是另一个与 SQL Server
  2014 中引入的离线检查点进程相关的等待类型。



  ### 什么是 WAIT_XTP_OFFLINE_CKPT_NEW_LOG 等待类型？


  `WAIT_XTP_OFFLINE_CKPT_NEW_LOG` 等待类型看起来是一种良性的等待类型，它记录离线检查点进程等待工作的时间长度。这一点已由联机丛书证实，其定义如下：“当离线检查点正在等待要扫描的新日志记录时发生。”


  正如本章前面所讨论的，离线检查点进程监视事务日志中影响内存优化表的事务，以便这些事务可以被记录在数据和增量文件中。这是 SQL Server 后台持续运行的一个进程，这意味着当你查询
  `sys.dm_os_waiting_tasks` DMV 时，你会看到一个具有 `WAIT_XTP_OFFLINE_CKPT_NEW_LOG` 等待类型的内部进程，如图
  13-8 所示。


  ![../images/340881_2_En_13_Chapter/340881_2_En_13_Fig8_HTML.jpg](img/340881_2_En_13_Fig8_HTML.jpg)


  图 13-8. `sys.dm_os_waiting_tasks` 内部的 WAIT_XTP_OFFLINE_CKPT_NEW_LOG 等待


  与 `WAIT_XTP_HOST_WAIT` 等待类型不同，后者仅在特定条件发生时才将其等待时间信息写入 `sys.dm_os_wait_stats` DMV，而
  `WAIT_XTP_OFFLINE_CKPT_NEW_LOG` 等待类型似乎会等待大约 5 秒，将等待时间添加到 `sys.dm_os_wait_stats`
  DMV，然后再次重置 `sys.dm_os_waiting_tasks` DMV 中的等待时间。这可能表明离线检查点进程以大约 5 秒的间隔检查是否有新工作。


  为了更深入地了解离线检查点进程，我在每次发生 `WAIT_XTP_OFFLINE_CKPT_NEW_LOG` 等待时捕获了一个堆栈转储。该堆栈转储让我们对该进程本身有了一些有趣的见解，如下所示：


  ```

