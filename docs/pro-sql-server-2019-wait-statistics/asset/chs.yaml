  我发现的第一部分非常有趣，它包含了一个新的 .dll 文件 `hkengine.dll`。由于内存 OLTP 的代号是 Hekaton，我猜测这个 .dll 文件包含了新的内存
  OLTP 函数，因此让我们仔细看看那个特定的调用：

  ```

  hkengine.dll!CkptFilePair::CreateInstance+0x61b

  ```

  看到函数名，我猜它与检查点文件对相关，而 `CreateInstance` 部分表明在我执行 `CHECKPOINT` 命令时创建了一个新的 CFP。我们可以通过访问清单
  **13-1** 中创建的内存文件的位置来验证这一点。向内存文件组添加文件的一个有趣之处在于，它实际上会创建一个目录，在此目录中有一个具有唯一 ID 字符串的文件夹。如果你进一步深入目录树，最终会到达一个包含编号文件的文件夹。图
  **13-6** 展示了我的测试机器上该文件夹内容的一部分。

  ![../images/340881_2_En_13_Chapter/340881_2_En_13_Fig6_HTML.jpg](img/340881_2_En_13_Fig6_HTML.jpg)

  **图 13-6.** 内存文件组文件


  事实上，你在这里看到的文件是与我们之前创建的内存优化表相关联的数据文件和增量文件。1 MB 的文件是增量文件，16 MB 的文件是数据文件。


  由于我猜测检查点会创建另一个 CFP，我在执行 `CHECKPOINT` 之前检查了文件夹中的文件数量，为 28 个文件。然后我执行了 `CHECKPOINT`
  命令，并再次查看了文件数量，结果发现检查点之后现在有 30 个文件。


  ### WAIT_XTP_HOST_WAIT 总结


  我认为 `WAIT_XTP_HOST_WAIT` 等待类型与新检查点文件对的创建有明确的关系。显然，手动运行 `CHECKPOINT` 语句会为内存优化表生成一个新的
  CFP。因为 `WAIT_XTP_HOST_WAIT` 等待类型会在后台持续生成等待时间，并将其写入 `sys.dm_os_wait_stats` DMV（当新的
  CFP 被创建时——无论是通过手动检查点、当现有 CFP 已满、还是当 `Merge` 操作发生时），我相信 `WAIT_XTP_HOST_WAIT` 等待类型并不直接表示性能问题。它主要表示已向内存文件组添加了一个新的
  CFP。然而，这并不意味着这是唯一产生 `WAIT_XTP_HOST_WAIT` 等待的过程。也可能存在其他同样会导致此等待的过程，但到目前为止，它们只发生在需要添加新
  CFP 的时候。


  ## WAIT_XTP_CKPT_CLOSE


  `WAIT_XTP_CKPT_CLOSE` 等待类型是 SQL Server 2014 中引入的另一个新等待类型。顾名思义，它似乎与内存 OLTP 功能引入的新离线检查点进程有关。



  ### 什么是 `WAIT_XTP_CKPT_CLOSE` 等待类型？


  `WAIT_XTP_CKPT_CLOSE` 等待类型似乎与 SQL Server 2014 引入内存中 OLTP 时一同推出的新离线检查点进程相关。根据我对该等待类型行为的分析，它似乎只在检查点发生时记录等待时间，无论是自动检查点还是手动检查点。`WAIT_XTP_CKPT_CLOSE`
  等待类型所代表的等待时间，似乎是检查点操作完成所需的时间。


  我们可以通过对我们之前在讨论 `WAIT_XTP_HOST_WAIT` 等待类型时创建的数据库和表执行一条 `CHECKPOINT` 命令来轻松验证这一点。我使用了清单
  13-2 中的脚本来清除 `sys.dm_os_wait_stats` DMV，向内存优化表中插入几行数据，执行一个 `CHECKPOINT` 操作，然后查询
  `sys.dm_os_wait_stats` DMV 以获取 `WAIT_XTP_CKPT_CLOSE` 等待类型信息。


  ```sql

  USE [OLTP_Test];

  GO

  -- Clear sys.dm_os_wait_stats

  DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

  -- Insert some rows

  INSERT INTO OLTP

  (

  RandomData1,

  RandomData2,

  ID2

  )

  VALUES

  (

  CONVERT(VARCHAR(50), NEWID()),

  CONVERT(VARCHAR(50), NEWID()),

  NEWID()

  );

  GO 1000

  -- Perform a CHECKPOINT

  CHECKPOINT

  -- Query sys.dm_os_wait_stats for WAIT_XTP_CKPT_CLOSE waits

  SELECT *

  FROM sys.dm_os_wait_stats

  WHERE wait_type = ''WAIT_XTP_CKPT_CLOSE'';

  ```


  清单 13-2 生成 `WAIT_XTP_CKPT_CLOSE` 等待


