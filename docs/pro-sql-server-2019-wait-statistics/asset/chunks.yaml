    4 个。大型网关始终只允许一次一个查询进行编译。


    小型网关的内存阈值是静态的，但中型和大型网关的阈值是动态的。这意味着达到中型或大型网关所需的编译内存在 SQL Server 实例的运行期间可以更改。


    这些网关的整个目的是确保编译内存的需求保持在可控范围内。这可以避免在许多大型编译内存请求被自动授予并耗尽 SQL Server 实例内存的情况下发生内存不足的情况。


    在我们继续并查看如何从 SQL Server 内部访问网关信息之前，让我们看一个查询编译的示例。


    假设我们有一个需要 1560 KB 编译内存的查询。查询将首先请求一个网关。由于我们的小型网关阈值为 370 KB，中型网关阈值为 5346 KB，该查询最终将进入小型网关。如果小型网关当前有任何查询在队列中，该查询将进入队列并等待轮到它，同时一直记录
    `RESOURCE_SEMAPHORE_QUERY_COMPILE` 等待时间。在查询编译期间，会跟踪编译期间使用的内存量；如果查询最终使用更多内存并达到中型网关的阈值，它将被移动到中型网关。当查询编译完成时，它将从网关中移除。

    '
- fmt: 'We can access information about the resource semaphore gateways from inside
    SQL Server by executing the `DBCC MEMORYSTATUS` command. Somewhere in the enormous
    amount of results you will find the gateway information as shown in Figure [6-25](#340881_2_En_6_Chapter.xhtml#Fig25).


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig25_HTML.jpg](images/340881_2_En_6_Chapter/340881_2_En_6_Fig25_HTML.jpg)


    Figure 6-25: Gateway information returned by the `DBCC MEMORYSTATUS` command


    Let’s go through the results that are returned for the gateways.


    The `Configured Units` row returns the maximum amount of concurrent compilations
    allowed for this gateway. This is determined by the number of logical processors
    available for your SQL Server instance. Because my test SQL Server has two logical
    processors, I have eight slots for the small gateway (4 × logical number of processors)
    and two for the medium gateway. The `Available Units` row shows the number of
    currently free slots for this gateway, while the `Acquires` row shows the slots
    currently taken by compilations. The number of queries that have to wait for a
    free slot are shown in the `Waiters` row. The `Threshold` value is the amount
    of memory in bytes that a query compilation would need in order to enter the gateway.
    For my test SQL Server system, the small gateway has a threshold of 380,000 bytes,
    or 371 KB. As you might notice in Figure [6-25](#340881_2_En_6_Chapter.xhtml#Fig25),
    the medium gateway has a threshold of -1. This is because of the dynamic nature
    of the thresholds of the medium and big gateways. Since there is no activity at
    the gateway below the medium one, there is no need to set a threshold yet.


    ### RESOURCE_SEMAPHORE_QUERY_COMPILE Example


    To show you an example of `RESOURCE_SEMAPHORE_QUERY_COMPILE` waits in action,
    I am going to execute the query in Listing [6-9](#340881_2_En_6_Chapter.xhtml#PC13)
    multiple times, using many concurrent connections. The query is a dynamic query
    that selects a random row from two joined tables inside the `AdventureWorks` database.
    In this case it doesn’t matter if any results are returned or not—the thing we
    are trying to achieve here is the creation of compilation-memory contention.


    ```sql

    DECLARE @ID VARCHAR(250)

    DECLARE @SQL VarChar(MAX)

    SET @ID = FLOOR(RAND()*(20000-1)+1);

    SET @SQL =

    ''

    SELECT

    '' + @ID + '',

    SUM(soh.SubTotal),

    COUNT(soh.SubTotal)

    FROM sales.SalesOrderHeader soh

    INNER JOIN person.Person p

    ON soh.SalesPersonID = p.BusinessEntityID

    WHERE p.BusinessEntityID = '' + @ID + ''

    ''

    EXEC (@SQL)

    ```

    Listing 6-9: `RESOURCE_SEMAPHORE_QUERY_COMPILE` wait query


    Before we execute the query with many concurrent connections, let’s check how
    much compilation memory would be needed. We can do this by executing the query
    in Listing [6-9](#340881_2_En_6_Chapter.xhtml#PC13) in SQL Server Management Studio
    and enabling the actual execution plan.


    After executing the query and opening the actual execution plan, we need to look
    at the `CompileMemory` property. You can access these properties by showing the
    Properties window (View ➤ Properties Window) or by pressing F4 and selecting the
    SELECT operator. Figure [6-26](#340881_2_En_6_Chapter.xhtml#Fig26) shows the actual
    execution plan properties on my Test SQL Server.


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig26_HTML.jpg](images/340881_2_En_6_Chapter/340881_2_En_6_Fig26_HTML.jpg)


    Figure 6-26: Miscellaneous execution plan properties


    The value returned by the `CompileMemory` property is the amount of compile memory
    needed expressed in KB. For this query 408 KB is needed for compilation. The threshold
    for the small gateway on my Test SQL Server was 371 KB, so I am pretty sure the
    query will access the small gateway.


    Again, we are going to use the Ostress utility to generate the needed concurrent
    connections to execute the query. I saved the query to the `resource_semaphore_compile.sql`
    file and then used that file as input for the following Ostress command. Because
    the query is very fast, I let every connection execute it 100 times so that we
    have some time to look at the wait statistics.


    ```bash

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -E -dAdventureWorks
    -i"C:\resource_semaphore_compile.sql" -n200 -r100 -q

    ```


    After a few seconds many `RESOURCE_SEMAPHORE_QUERY_COMPILE` waits can be seen
    in the `sys.dm_os_waiting_tasks` DMV , as shown in Figure [6-27](#340881_2_En_6_Chapter.xhtml#Fig27).


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig27_HTML.jpg](images/340881_2_En_6_Chapter/340881_2_En_6_Fig27_HTML.jpg)


    Figure 6-27: `RESOURCE_SEMAPHORE_QUERY_COMPILE` waits


    If we now execute the `DBCC MEMORYSTATUS` command we should be able to find out
    at what gateway the compilation contention is occurring. Figure [6-28](#340881_2_En_6_Chapter.xhtml#Fig28)
    shows the gateway output of the `DBCC MEMORYSTATUS` command on my test SQL Server.


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig28_HTML.jpg](images/340881_2_En_6_Chapter/340881_2_En_6_Fig28_HTML.jpg)


    Figure 6-28: `DBCC MEMORYSTATUS` during compilation contention


    As you can see in Figure [6-28](#340881_2_En_6_Chapter.xhtml#Fig28), if we look
    at the number of `Available Units`, there are no available slots left for new
    compilation-memory requests. As a matter of fact, we have 22 compilation-memory
    requests waiting in the resource semaphore queue. Also note that the `threshold`
    of the medium gateway has now changed from -1 to 7,041,820 bytes (6876 KB). Now
    that contention is occurring on a lower gateway, the threshold for the medium
    gateway is dynamically determined, even though there are no compilation-memory
    requests being processed by this gateway.'
