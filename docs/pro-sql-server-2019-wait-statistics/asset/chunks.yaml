  trans: '

    ## 基于我迄今为止向您展示的各种来源的信息，您应该能够检查 AlwaysOn 可用性组的整体健康状况。然后，您可以将这些信息与其他影响辅助副本性能的指标结合起来考虑，例如存储子系统和网络连接的性能。由于
    `HADR_SYNC_COMMIT` 等待类型与辅助副本直接相关，因此您应重点关注托管辅助副本的 SQL Server。例如，如果您的存储子系统无法跟上需要在辅助副本上提交的事务数量，您会在更高的
    `HADR_SYNC_COMMIT` 等待时间以及 AlwaysOn 仪表板、DMV 或 Perfmon 中的各种计数器中注意到这一点。


    很难就如何降低 `HADR_SYNC_COMMIT` 等待时间给出通用建议，因为它们高度依赖于无数变量，也取决于您的工作负载。当您的工作负载由大量读取查询组成时，您会注意到
    `HADR_SYNC_COMMIT` 等待时间低于执行大量数据修改操作的工作负载。这意味着分析和优化您的查询工作负载也有助于降低 `HADR_SYNC_COMMIT`
    等待时间。


    ### HADR_SYNC_COMMIT 总结


    `HADR_SYNC_COMMIT` 等待类型仅发生在配置为使用同步复制模式的副本所组成的 AlwaysOn 可用性组上。`HADR_SYNC_COMMIT`
    等待类型将让您深入了解辅助副本将事务提交到磁盘所花费的时间。由于 `HADR_SYNC_COMMIT` 会在同步复制期间始终记录等待时间，因此您只需在等待时间远高于预期时才需要关注。值得庆幸的是，有多种方法可供您分析
    AlwaysOn 可用性组的性能，包括 AlwaysOn 仪表板、DMV 和 Perfmon 计数器。


    由于辅助副本的性能对 `HADR_SYNC_COMMIT` 等待时间影响最大，在排查此等待类型问题时，您的注意力应集中在辅助副本上。存储子系统和网络连接在辅助副本将其日志记录写入其事务日志的速度方面都起着重要作用。您的工作负载也会影响
    `HADR_SYNC_COMMIT` 等待时间，优化工作负载以使数据修改更好地分散开，将导致更低的 `REDO_THREAD_PENDING_WORK` 等待时间。


    ### REDO_THREAD_PENDING_WORK


    本章最后一个等待类型是 `REDO_THREAD_PENDING_WORK` 等待类型。尽管它缺少标识 AlwaysOn 相关等待类型的特征性 `HADR_`
    前缀，但它确实与 AlwaysOn 相关。`REDO_THREAD_PENDING_WORK` 等待类型，与 `HADR_LOGCAPTURE_WAIT`
    和 `HADR_WORK_QUEUE` 等待类型一样，是一种在没有工作可做时会随时间累积的等待类型。并且就像 `HADR_LOGCAPTURE_WAIT`
    和 `HADR_WORK_QUEUE` 等待类型一样，在大多数情况下可以忽略它，因为它并不表示存在性能问题。


    尽管这是一个在 99% 的情况下都可以安全忽略的等待类型，但我仍想将其包含在本章中，原因有二。它通常是 AlwaysOn 可用性组辅助副本上排名靠前的等待类型之一，而且理解其与
    SQL Server 内部相关的过程将使您对 AlwaysOn 的内部工作原理有更好的理解。


    ### 什么是 REDO_THREAD_PENDING_WORK 等待类型？


    `REDO_THREAD_PENDING_WORK` 等待类型与仅发生在 AlwaysOn 可用性组内部辅助副本上的一个进程相关，即 Redo Thread（重做线程）。


    在本章的前面部分，我们讨论了 AlwaysOn 可用性组中的辅助副本如何处理日志记录、将其持久化到自己的事务日志，并向主副本发送确认。当使用同步复制时，主副本会在向启动事务的客户端发送事务完成消息之前等待；而当使用异步复制时，消息会在不等待辅助副本持久化的情况下发送。但到目前为止，我们还没有讨论将在辅助数据库中执行日志记录中所描述修改的进程。这就是辅助副本上
    Redo Thread 的用武之地。该线程负责执行主副本发送给它的日志记录中所记录的数据修改。与 Redo Thread 相关的一个非常重要的概念是：它不影响来自辅助副本的提交确认。这意味着，在事务已被告知客户端提交（主副本和辅助副本均已持久化日志记录，并且
    AlwaysOn 可用性组处于同步状态）之后很长时间，Redo Thread 可能仍在执行工作。


    这意味着，即使您的 AlwaysOn 可用性组已同步，辅助数据库中的数据也未必与主数据库完全相同。这实际上比您第一眼想到的要次要一些。因为辅助副本已将日志记录持久化到其磁盘上的事务日志中，所以它拥有执行重做操作所需的所有信息。如果主副本发生故障，事务不会丢失，因为辅助副本在其自己的事务日志中拥有所有已执行的事务，并且可以重做所有事务。这与独立的
    SQL Server 实例的工作方式非常相似，在独立实例中，事务也是在数据实际更改之前先持久化到磁盘。如果 SQL Server 在这种情况下崩溃，SQL
    Server 将使用事务日志来重做或撤消数据修改。图 10-15 展示了同步复制与 Redo Thread 一起工作的示例。请注意，Redo Thread
    是一个独立的操作，不影响事务完成消息的持续时间。


    ![Figure 10-15](img/340881_2_En_10_Fig15_HTML.jpg)


    **图 10-15** 同步 AlwaysOn 可用性组与 Redo Thread


    那么，`REDO_THREAD_PENDING_WORK` 等待类型从何而来？嗯，如果 Redo Thread 正在等待工作到达，它将把不活动的时间记录为
    `REDO_THREAD_PENDING_WORK` 等待类型的等待时间。这种情况在同步和异步复制模式下都会发生，但仅限于辅助副本上。


    因为该等待类型只表示 Redo Thread 没有执行任何工作，所以除了极其罕见的情况外，可以安全地忽略它。而且，由于在没有工作可做时，`REDO_THREAD_PENDING_WORK`
    等待类型的等待时间会自然累积，因此无需编写示例来演示此等待类型。针对辅助副本上的 `sys.dm_os_wait_stats` DMV 运行一个简单的查询来检索
    `REDO_THREAD_PENDING_WORK` 等待类型信息，将向您显示等待时间在增加，尤其是在没有针对 AlwaysOn 可用性组的用户活动时，如图
    10-16 所示。


    ![Figure 10-16](img/340881_2_En_10_Fig16_HTML.jpg)


    **图 10-16** REDO_THREAD_PENDING_WORK 等待信息

