- fmt: '## What Are Baselines?


    If we look up the word “baseline” in the Oxford dictionary, we would get the following
    definition: “A minimum or starting point used for comparisons.” This sentence
    captures the essence of a baseline perfectly by using the important words “starting
    point” and “comparisons.” A baseline will generally be the starting point, or
    in our case, measurement, that we will compare later measurements against. Ideally,
    we will capture our baseline measurement in a normal or standard situation. If
    we perform the same measurement again at a later point in time, we can compare
    that measurement against the baseline. If our measurements are not the same during
    the comparison, something might have changed.


    Even if you do not yet use baseline comparisons when analyzing performance, you
    are still working with baselines constantly whether you realize it or not. For
    instance, if you receive a salary every first day of the month, that would be
    your normal situation or, in the context of this chapter, your baseline. If for
    some reason you didn’t receive your salary on the first day of the month, you
    would notice a deviation compared to the baseline. This might be a reason to investigate
    why you didn’t receive your salary on time. Maybe the day changed from the first
    to the fifth of the month or, in the worst case, the company you work for can’t
    pay your salary anymore. In any of these cases, there are actions we can take:
    either accept the change, and by doing so create a new baseline, or revert the
    situation back to the baseline state again. Figure [4-1](#340881_2_En_4_Chapter.xhtml#Fig1)
    shows this process.


    ![../images/340881_2_En_4_Chapter/340881_2_En_4_Fig1_HTML.jpg](images/340881_2_En_4_Chapter/340881_2_En_4_Fig1_HTML.jpg)


    Figure 4-1: Changes impact baseline


    Defining and maintaining baselines is an iterative process. Every change occurring
    on your system can impact your baseline. A new release of the application you
    are using might change a number of queries, or your company might grant a new
    department access to the database, increasing the number of connections. In both
    these examples we would need to make adjustments to the baseline, since the normal
    situation would have changed.


    All of this adjusting and measuring baselines with every change to the system
    sounds like a lot of work, and sometimes it is. But believe me—the benefits of
    having a baseline far outweigh the costs. Baselines will help you detect problems
    far faster than just looking at a single measurement, and in the case of wait
    statistics, it is the only way to find a reliable, definitive answer to your problem.
    Let’s use a more technical example to illustrate this using DBA Jim.


    Jim maintains a `SQL Server` instance that hosts a single-user database. This
    database is used by every sales person in the company and records every financial
    transaction between the company and its customers. Users can access the database
    through `Application X`. `Application X` is currently running `version 2.4` and
    is very stable. Performance is good, users are happy, and the money keeps rolling
    in. Sounds great, right? One day a consultant walks in and wants to upgrade `Application
    X` to the brand new `version 3.0` version. The update to `version 3.0` was a breeze
    and completed without any problems, and all the users love the new features.


    Two days later the phone is ringing, Chris’s manager just received word from the
    sales team that the performance in `version 3.0` is horrible and he demands it
    get resolved right away.


    Thankfully, Jim knew the importance of a baseline, and he created one before the
    upgrade to `version 3.0`. Using the `version 2.4` baseline, Jim compares the measurements
    in the baseline to the measurements done in `version 3.0` and immediately spots
    a large difference in the `lock wait time` measurements. Since other measurements
    remain more or less the same compared to the `2.4` baseline, Jim focuses on long-running
    locks and identifies an update query that is locking a table. He rolls back the
    query, and the situation returns to normal. He then contacts the application’s
    vendor and learns this behavior was a result of a bug in the software.


    Now this example might sound a little far-fetched, but it is actually a simplified
    version of the method I use almost every day when measuring the impact of changes
    or analyzing performance problems. If Jim didn’t have a baseline of the `lock
    wait time` and just queried the `lock wait time` after the change to `version
    3.0`, he wouldn’t know that the wait time had increased, since he had nothing
    to compare against. He might have chosen to look at other metrics instead of the
    `lock wait time` and would have wasted valuable time and money.


    The message here is simple: baselines will help you detect abnormal situations
    and resolve performance problems faster!


    ### Visualizing Your Baselines


    Baselines are frequently visualized through graphs. The big advantage of turning
    your baseline measurements into graphs is that a graph can make it easier for
    you to detect those measurements that have the highest increase or decrease compared
    to your baseline. Also, visualizing your data might help you get your point across
    easier if you have to prove that a specific configuration is impacting performance.
    For example, you need to convince your storage administrator that the change in
    the storage configuration has impacted your performance. If you can hand him a
    graph that shows the normal behavior compared to the behavior after the change,
    he might be more inclined to help. The graph in Figure [4-2](#340881_2_En_4_Chapter.xhtml#Fig2)
    shows the baseline measurements compared to the measurements done at a later time.


    ![../images/340881_2_En_4_Chapter/340881_2_En_4_Fig2_HTML.jpg](images/340881_2_En_4_Chapter/340881_2_En_4_Fig2_HTML.jpg)


    Figure 4-2: Example of a baseline graph


    As you can see in Figure [4-2](#340881_2_En_4_Chapter.xhtml#Fig2), you would be
    able to identify the potential problem very quickly. Apparently, between 08:00
    and 12:00 the number of `transactions per second` is higher than the normal situation,
    and it might be worth taking the time to investigate.'
