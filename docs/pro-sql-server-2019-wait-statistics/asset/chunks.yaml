    \ B 树每一级存在多少页。最高的`index_level`编号是根级，最低的是叶级。\n\n虽然新的级别是在 B 树中创建的，但并发的插入查询在遍历 B\
    \ 树之前必须等待，从而导致了`LATCH_SH`等待。\n\n## 降低 LATCH_[xx]等待\n\n在前面的例子中，我介绍了一种特定的闩锁争用情况，它发生在索引根页拆分以扩展\
    \ B 树结构时。正如我之前提到的，`LATCH_[xx]`等待类型报告了许多许多其他的闩锁类。这使得描述“一刀切”的建议变得不可能。不过，我可以描述一种通用的方法，使用这里的列表：\n\
    \n*   如果发生`LATCH_[xx]`等待，请查询`sys.dm_os_waiting_tasks`。`resource_description`列可以向你显示有关特定闩锁类的附加信息。如果你遇到`LATCH_[xx]`等待未显示在`sys.dm_os_waiting_tasks`中，但在`sys.dm_os_wait_stats`\
    \ DMV 中可见高等待时间的情况，那么`sys.dm_os_latch_waits` DMV 应该是你的起点。\n\n    另一个有用的 DMV 可能是`sys.dm_exec_requests`\
    \ DMV。与`sys.dm_exec_sql_text` DMF 结合使用，它可能帮助你找到导致`LATCH_[xx]`等待的查询。\n\n*   查询`sys.dm_os_latch_waits`，查看是否与`sys.dm_os_waiting_tasks`\
    \ DMV 的`resource_description`列中显示的闩锁类相关。\n\n*   查阅联机丛书或本书的附录 III，以获取有关特定闩锁类的更多信息。\n\
    \n关于常见闩锁类的另一个有用资源是 Paul Randal 的博客文章“最常见的闩锁类及其含义”，网址是[`www.sqlskills.com/blogs/paul/most-common-latch-classes-and-what-they-mean/`](http://www.sqlskills.com/blogs/paul/most-common-latch-classes-and-what-they-mean/)。尽管\
    \ Paul 只描述了十种最常见的闩锁类，但它可以作为你调查的良好起点。\n\n值得庆幸的是，`LATCH_[xx]`等待类型出现持续高等待时间的情况并不常见，因为导致`LATCH_[xx]`等待发生的情况通常与非常特定的工作负载和数据库设计相关。"
- fmt: '### LATCH_[xx] Summary


    The `LATCH_[xx]` wait type represents waits encountered by a large selection of
    different, non-buffer-related latch classes inside SQL Server. These non-buffer-related
    latch classes have their own latch wait DMV, `sys.dm_os_latch_waits`, that returns
    the wait times of those latch classes. Troubleshooting `LATCH_[xx]` waits can
    be difficult since the latch classes that are associated with the wait type are
    minimally documented. Thankfully, it is not very common to see high wait times
    on the `LATCH_[xx]` wait type since they only occur for very specific situations
    and workloads.


    ## PAGEIOLATCH_[xx]


    The final latch-related wait type we will discuss in this chapter is the `PAGEIOLATCH_[xx]`
    wait type. The `PAGEIOLATCH_[xx]` wait type is by far the most common latch-related
    wait type and together with the `CXPACKET` wait type is the most common wait type
    to see on any SQL Server instance.


    Just like the two previous latch wait types we discussed, the `PAGEIOLATCH_[xx]`
    has different access modes that I replaced with `[xx]` in this chapter. Since
    we already described the different latch modes in the introduction, we won’t discuss
    them further in this chapter.


    So far we have discussed two of the three latch-related wait types and the areas
    they are related to. The `PAGELATCH_[xx]` wait type was related to latches being
    placed on memory pages inside the buffer cache, and the `LATCH_[xx]` wait type
    is related to latches on non-buffer objects. The `PAGEIOLATCH_[xx]` wait type
    also indicates the use of latches on a specific area in SQL Server, in this case
    the IO latches.


    ### What Is the PAGEIOLATCH_[xx] Wait Type?


    Disk operations inside SQL Server are very expensive. Accessing the disk subsystem
    of your system requires extra resources and is always slower than accessing information
    that is inside the memory of your system. Because SQL Server is a database, and
    accessing and storing data inside the database is its primary function, the way
    SQL Server accesses data is extremely important. If data access is slow, SQL Server
    will perform slower as well, and this can result in noticeable performance degradation
    inside your queries or applications. To make IO interactions as efficient as possible,
    SQL Server uses a buffer cache to cache data pages that were previously accessed
    into the memory of your system. By caching data pages SQL Server only has to access
    the disk subsystem once, when the first query requests those specific data pages.
    When later queries require the same data pages as the first query, SQL Server
    will detect that those pages are already inside the buffer cache, through the
    Buffer Manager, and will access the data pages from inside the buffer cache instead
    of performing extra interactions with the disk subsystem. Figure [9-23](#340881_2_En_9_Chapter.xhtml#Fig23)
    shows the buffer cache behavior when a query requires data pages from the storage
    subsystem.


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig23_HTML.jpg](images/340881_2_En_9_Chapter/340881_2_En_9_Fig23_HTML.jpg)


    Figure 9-23 Moving a page from the storage subsystem to the buffer cache


    During the movement of data pages from the storage subsystem to the buffer cache,
    latches are used to “reserve” a buffer page for the data page on the storage subsystem.
    This makes sure no other concurrent transactions allocate the same buffer page,
    or simultaneously attempt to transfer the same data page from the storage subsystem
    to the buffer cache.


    While SQL Server is transferring the data page from the storage subsystem into
    the buffer cache, an Exclusive latch will be placed on the buffer page. Because
    Exclusive latches are incompatible with almost every other latch mode (save for
    the Keep mode), it is guaranteed that no other latch can access the buffer page
    while it is being transferred. From the user perspective, a `PAGEIOLATCH_[xx]`
    wait will be recorded for the duration of the transfer of the data page. The mode
    of the latch depends on the action that initiated the movement of the data page
    from the storage subsystem to the buffer cache. A `PAGEIOLATCH_SH` will be recorded
    if the data is being moved for read access, and a `PAGEIOLATCH_UP` or `PAGEIOLATCH_EX`
    will be used if the data page is being moved for a modification. Figure [9-24](#340881_2_En_9_Chapter.xhtml#Fig24)
    shows the data page movement including latches and latch waits.


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig24_HTML.jpg](images/340881_2_En_9_Chapter/340881_2_En_9_Fig24_HTML.jpg)


    Figure 9-24 Movement of data page


    To summarize the preceding section, if you see `PAGEIOLATCH_[xx]` waits occurring,
    it means your SQL Server instance is reading data from your storage subsystem
    into your buffer cache. Because this is a very common operation to perform, it
    is easy to see why the `PAGEIOLATCH_[xx]` wait type is one of the most common
    wait types on any SQL Server instance.


    ### PAGEIOLATCH_[xx] Example


    Creating an example for `PAGEIOLATCH_[xx]` waits is extremely easy—just run a
    `SELECT` query against a freshly restarted SQL Server instance. A restart of the
    SQL Server service will empty the buffer cache of all data pages. This will leave
    you with a buffer cache without any user data inside it. There is, however, another
    way to clear the buffer cache without needing to restart the SQL Server service.
    Running the `DBCC DROPCLEANBUFFERS` command will remove all the unmodified data
    pages from the buffer cache. Combining it with the `CHECKPOINT` command will ensure
    the modified pages are also written to disk, leaving you with an empty, or “cold,”
    buffer cache.


    The query in Listing [9-3](#340881_2_En_9_Chapter.xhtml#PC24) will perform a `CHECKPOINT`,
    followed by a `DBCC DROPCLEANBUFFERS`. It will then reset the `sys.dm_os_wait_stats`
    DMV and run a query against the `AdventureWorks` database. After the query against
    some of the tables inside the `AdventureWorks` database, we will query the `sys.dm_os_wait_stats`
    DMV for `PAGEIOLATCH_[xx]` waits.


    ```sql

    CHECKPOINT 1;

    GO

    DBCC DROPCLEANBUFFERS;

    GO

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    GO

    SELECT

    SOD.SalesOrderID,

    SOD.CarrierTrackingNumber,

    SOH.CustomerID,

    C.AccountNumber,

    SOH.OrderDate,

    SOH.DueDate

    FROM Sales.SalesOrderDetail SOD

    INNER JOIN Sales.SalesOrderHeader SOH

    ON SOD.SalesOrderID = SOH.SalesOrderID

    INNER JOIN Sales.Customer C

    ON SOH.CustomerID = C.CustomerID;

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type LIKE ''PAGEIOLATCH_%'';

    ```


    Listing 9-3 Generate `PAGEIOLATCH_SH` waits


    Figure [9-25](#340881_2_En_9_Chapter.xhtml#Fig25) shows the results of the last
    query against the `sys.dm_os_wait_stats` DMV on my test SQL Server instance.


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig25_HTML.jpg](images/340881_2_En_9_Chapter/340881_2_En_9_Fig25_HTML.jpg)


    Figure 9-25 `PAGEIOLATCH_SH` wait time information


    It makes sense to see only `PAGEIOLATCH_SH` waits recorded, since we are executing
    a `SELECT` query instead of performing data modification. If we were to perform
    some form of data modification against the rows, we would see `PAGEIOLATCH_EX`
    waits in the results.'
