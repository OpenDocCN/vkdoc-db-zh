- fmt: 'There is a lot more information available on various Microsoft blogs that
    covers more of the functionality and the design choices of the SQLPAL. If you
    want to know more about the SQLPAL, or how it came to life, a good recommendation
    is to read the "SQL Server on Linux: How? Introduction" article over at [`https://cloudblogs.microsoft.com/sqlserver/2016/12/16/sql-server-on-linux-how-introduction/`](https://cloudblogs.microsoft.com/sqlserver/2016/12/16/sql-server-on-linux-how-introduction/).


    For the remainder of this chapter, I will frequently refer to functions used by
    the Windows operating system. If you are running SQL Server on Linux, remember
    that the functionality described in this chapter is handled by SQLPAL on Linux
    but still has the same functionality as on Windows.


    ## PREEMPTIVE_OS_ENCRYPTMESSAGE and PREEMPTIVE_OS_DECRYPTMESSAGE


    The first preemptive wait types we are going to discuss in this chapter are the
    `PREEMPTIVE_OS_ENCRYPTMESSAGE` and `PREEMPTIVE_OS_DECRYPTMESSAGE` wait types.
    As you can probably guess from the wait type names, the functions are related
    to either encrypting or decrypting messages through the Windows operating system.


    ### What Are the PREEMPTIVE_OS_ENCRYPTMESSAGE and PREEMPTIVE_OS_DECRYPTMESSAGE
    Wait Types?


    As I noted in the previous section, the `PREEMPTIVE_OS_ENCRYPTMESSAGE` and `PREEMPTIVE_OS_DECRYPTMESSAGE`
    wait types are related to the encryption and decryption of messages. More specifically,
    they are related to encrypting and decrypting network traffic to and from the
    SQL Server instance. One case where this is used is when connecting to your SQL
    Server instance using certificates to encrypt the data that is sent between the
    client and the SQL Server instance. In that case, SQL Server will need to access
    the Windows operating system to perform the encryption of the messages that it
    is sending to the client or to decrypt the messages that are received. The encryption
    and decryption do not happen inside SQL Server, unlike, for instance, Transparent
    Data Encryption (TDE), where the encryption/decryption process happens entirely
    inside SQL Server.


    Both the `PREEMPTIVE_OS_ENCRYPTMESSAGE` and `PREEMPTIVE_OS_DECRYPTMESSAGE` wait
    types do not necessarily indicate any performance problems. They just show you
    encryption is being used, so there is no real need to troubleshoot these wait
    types. The overhead of encrypting and decrypting messages is so small that it
    rarely causes any serious issues (I have yet to come across a case where using
    certificates to connect to SQL Server caused performance problems).


    ### PREEMPTIVE_OS_ENCRYPTMESSAGE and PREEMPTIVE_OS_DECRYPTMESSAGE Example


    To show you an example of both the `PREEMPTIVE_OS_ENCRYPTMESSAGE` and `PREEMPTIVE_OS_DECRYPTMESSAGE`
    wait types, I am going to configure a certificate that will be used to encrypt
    the connection to the SQL Server instance. To make this example reproducible,
    I have included the steps for creating a self-signed certificate. Normally, in
    production environments you will use a certificate issued by a certificate authority,
    but for testing purposes a self-signed certificate is fine.


    The first thing I did to be able to generate a self-signed certificate is install
    Internet Information Services (IIS) on my test virtual machine. IIS makes generating
    a self-signed certificate very simple.


    After the installation of `IIS` is completed, I open the `IIS Manager` from Administrative
    Tools. Then I click the name of my machine and select the `Server Certificates`
    option in the Features View, as shown in Figure [11-4](#340881_2_En_11_Chapter.xhtml#Fig4).


    ![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig4_HTML.jpg](images/340881_2_En_11_Chapter/340881_2_En_11_Fig4_HTML.jpg)


    Figure 11-4: Features View inside the IIS Manager


    This will open a new `Server Certificates` view inside the `IIS Manager`. Inside
    the Action Pane, I click the `Create Self-Signed Certificate` option. I am then
    asked to supply a name for my certificate, so I filled in the name of my test
    virtual machine as you can see in Figure [11-5](#340881_2_En_11_Chapter.xhtml#Fig5).


    ![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig5_HTML.jpg](images/340881_2_En_11_Chapter/340881_2_En_11_Fig5_HTML.jpg)


    Figure 11-5: Create self-signed certificate


    I click `OK`, and the self-signed certificate will be created and automatically
    placed inside the correct certificate store on my machine (`Local Machine ➤ Personal
    Certificates`).


    Now that my self-signed certificate is created and stored inside the certificate
    store, I need to make sure the account my `SQL Server` service is running under
    has permissions to access the certificates. I open `MMC` by clicking `Start ➤
    Run`, entering `MMC`, and pressing `OK`. Now that the `MMC` console is open, I
    need to add the Certificates snap-in. I do this by clicking `File ➤ Add/Remove
    Snap-in`, selecting the `Certificates` snap-in, and clicking `Add`. When prompted
    for which account I want to manage certificates, I select `Computer account`,
    as shown in Figure [11-6](#340881_2_En_11_Chapter.xhtml#Fig6), and click `Next`
    and `Finish`.


    ![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig6_HTML.jpg](images/340881_2_En_11_Chapter/340881_2_En_11_Fig6_HTML.jpg)


    Figure 11-6: Certificate account selection


    Inside the `Certificates` console, I open the folder `Certificates (Local Computer)
    ➤ Personal ➤ Certificates`. If the generation of the self-signed certificate inside
    `IIS` was correct, I should see the certificate here. Figure [11-7](#340881_2_En_11_Chapter.xhtml#Fig7)
    shows the certificate on my test virtual machine.


    ![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig7_HTML.jpg](images/340881_2_En_11_Chapter/340881_2_En_11_Fig7_HTML.jpg)


    Figure 11-7: Self-signed certificate


    I right-click the self-signed certificate and select `All Tasks ➤ Manage Private
    Keys`. A permissions dialog opens. Here I need to add the account under which
    the `SQL Server` service is running. In my case that is the local administrator
    user which is added by default. If you run your `SQL Server` service under a different
    account, the account only needs read permission on the certificate, as shown in
    Figure [11-8](#340881_2_En_11_Chapter.xhtml#Fig8).


    ![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig8_HTML.jpg](images/340881_2_En_11_Chapter/340881_2_En_11_Fig8_HTML.jpg)


    Figure 11-8: Self-signed certificate permissions'
