    Lowering `LCK_M_U` waits uses the same approach as lowering `LCK_M_S` wait types:
    try to identify the transaction that is causing the blocking to occur and try
    to optimize its locking behavior.


    Changing the Isolation level will have little effect on `LCK_M_U` wait times since
    other Isolation levels have the most impact on transactions that perform reads.
    This makes optimizing your queries and/or indexes the way to go if you need to
    lower higher-than-normal wait times on the `LCK_M_U` wait type.


    ### LCK_M_U Summary


    The `LCK_M_U` wait type is related to locks that use the Update lock mode. Update
    locks are used to prevent deadlocks from occurring when concurrent transactions
    try to convert their Shared locks to Exclusive locks. Lowering `LCK_M_U` wait
    times is primarily achieved by optimizing potential blocking queries or indexes.


    ## LCK_M_X


    Another of the most common lock-related wait types is the `LCK_M_X` wait type.
    Just like both lock-related wait types we have already discussed, the `LCK_M_X`
    wait type is related to a specific lock type, in this case the Exclusive lock.
    And just like the other two lock-related wait types, seeing this wait type means
    there is some form of blocking occurring.


    ### What Is the LCK_M_X Wait Type?


    The `LCK_M_X` wait type occurs when a task is waiting to place an Exclusive lock
    on an object. Since Exclusive locks are not compatible with just about any other
    lock mode, including other Exclusive locks, seeing blocking occur when there are
    many concurrent modifications is pretty common. This means that seeing `LCK_M_X`
    waits occur is pretty common as well, especially in systems that have a high amount
    of concurrent transactions.'
  trans: '

    ## LCK_M_U


    ### 什么是 LCK_M_U 等待类型？


    更新锁是一种特殊的锁模式，表示即将发生数据修改。尽管其名称可能让人以为它仅与 `UPDATE` 查询相关，但更新锁也可能在执行 `INSERT` 或 `DELETE`
    语句时出现。


    更新锁的存在主要是为了防止发生死锁。死锁指的是两个事务都试图修改同一个对象，并无限期地等待对方释放资源上的独占锁。要理解死锁是如何发生的，以及更新锁如何防止这种情况，请看以下未使用更新锁时可能发生的情形。


    当两个并发事务想要修改同一个对象时，两个事务首先会在其打算修改的数据所在位置放置一个共享锁。由于共享锁与其他共享锁是兼容的，两个事务不会相互阻塞。当其中一个事务找到需要修改的数据时，它会将其共享锁转换为独占锁，此时问题就会出现。由于共享锁与独占锁不兼容，并且另一个事务也在该资源上持有共享锁，因此共享锁无法转换为独占锁。该事务需要等待另一个事务的共享锁被移除后，才能将其自己的共享锁转换为独占锁，但另一个事务也想将其共享锁转换为独占锁，最终两个事务都会无限期地相互等待，从而形成死锁。SQL
    Server 会自动检测死锁情况，并选择其中一个事务作为牺牲品进行回滚，从而结束死锁状态。图 8-14 以图形化方式展示了这种情况。


    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig14_HTML.jpg](img/340881_2_En_8_Fig14_HTML.jpg)


    图 8-14：锁转换期间的死锁


    当在 SQL Server 中使用更新锁时，不会发生死锁。更新锁与共享锁兼容，但与独占锁或其他更新锁不兼容。在前面的场景中，第一个找到需要修改数据的事务不会直接转换为独占锁，而是先转换为更新锁。由于更新锁和共享锁是兼容的，即使另一个事务已持有共享锁，转换为更新锁也不会有问题。然后，更新锁会转换为独占锁，以便进行数据修改。图
    8-15 展示了这种锁行为。


    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig15_HTML.jpg](img/340881_2_En_8_Fig15_HTML.jpg)


    图 8-15：并发数据修改期间的更新锁


    当一个事务想要放置更新锁，但该对象上已存在不兼容的锁（例如独占锁）时，系统将记录 `LCK_M_U` 等待类型。


    ### LCK_M_U 示例


    为了向您展示一个发生 `LCK_M_U` 等待的示例，我们需要创建一个并发事务想要修改同一资源的场景。为此，我们将使用 Ostress 工具通过多个连接执行相同的查询。我将要执行的查询如清单
    8-3 所示。该查询将对 `AdventureWorks` 数据库中的 `Person.Address` 表执行 `UPDATE` 操作。我将该查询保存在一个名为
    `LCK_M_U.sql` 的 .sql 文件中。


    ```

    UPDATE Person.Address

    SET City = ''Los Angeles''

    WHERE StateProvinceID = 9;

    清单 8-3：修改 Person.Address 表

    ```


    保存文件后，我使用以下命令运行 Ostress 工具：


    ```

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -E -dAdventureWorks2012
    -i"C:\lck_m_u.sql" -n150 -r5 -q

    ```


    这将创建 150 个并发连接，每个连接执行清单 8-3 中的查询五次。这应该足以产生一些阻塞。


    在 Ostress 工具运行时，我查询 `sys.dm_os_waiting_tasks` DMV 以了解有哪些任务正在等待。结果的一小部分如图 8-16
    所示。


    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig16_HTML.jpg](img/340881_2_En_8_Fig16_HTML.jpg)


    图 8-16：发生的 LCK_M_U 等待


    如图 8-16 所示，许多不同的会话都在等待获取更新锁，但都被会话 ID 161 阻塞。如果我们查询 `sys.dm_tran_locks` DMV 来获取有关此会话的锁信息，可以看到它已被授予一个不兼容的独占锁，如图
    8-17 所示。


    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig17_HTML.jpg](img/340881_2_En_8_Fig17_HTML.jpg)


    图 8-17：会话 ID 161 持有独占锁


    所有其他会话将不得不等待，直到会话 ID 161 的独占锁被移除。然后，其中一个会话将获取其请求的更新锁，将其转换为独占锁，并执行其修改操作。这个循环会重复进行，直到所有会话完成其修改。


    ### 降低 LCK_M_U 等待


    降低 `LCK_M_U` 等待的方法与降低 `LCK_M_S` 等待类型的方法相同：尝试识别导致阻塞发生的事务，并尝试优化其锁行为。


    更改隔离级别对 `LCK_M_U` 等待时间影响不大，因为其他隔离级别主要影响执行读取的事务。因此，如果你需要降低 `LCK_M_U` 等待类型异常高的等待时间，优化查询和/或索引是可行之道。


    ### LCK_M_U 总结


    `LCK_M_U` 等待类型与使用更新锁模式的锁相关。更新锁用于防止当并发事务尝试将其共享锁转换为独占锁时发生死锁。降低 `LCK_M_U` 等待时间主要通过优化可能引起阻塞的查询或索引来实现。


    ## LCK_M_X


    另一种最常见的与锁相关的等待类型是 `LCK_M_X` 等待类型。就像我们讨论过的前两种与锁相关的等待类型一样，`LCK_M_X` 等待类型与一种特定的锁类型（这里是独占锁）相关。同样，看到这种等待类型就意味着正在发生某种形式的阻塞。


    ### 什么是 LCK_M_X 等待类型？


    当任务等待在对象上放置独占锁时，就会发生 `LCK_M_X` 等待。由于独占锁与几乎所有其他锁模式（包括其他独占锁）都不兼容，因此在存在大量并发修改时看到阻塞发生是相当常见的。这意味着看到
    `LCK_M_U` 等待发生也很常见，尤其是在具有高并发事务量的系统中。

    '
- fmt: '## LCK_M_X 示例


    为了演示 `LCK_M_X` 等待的发生，我们将执行一个 `SELECT` 语句但不提交它。在运行 `SELECT` 之前，我们将把隔离级别设置为可重复读（Repeatable
    Read）。这样做可以确保在事务仍在运行时共享锁不会被移除。由于我们不会结束事务，锁将保留在对象上，直到我们终止事务或执行 `COMMIT` 或 `ROLLBACK`。下面的查询显示了我们将在
    `AdventureWorks` 数据库上执行的 `SELECT` 语句：


    ```sql

    SET TRANSACTION ISOLATION LEVEL REPEATABLE READ

    BEGIN TRANSACTION

    SELECT *

    FROM HumanResources.Employee;

    -- COMMIT

    ```


    请注意，我们注释掉了 `COMMIT` 部分以确保锁保持不变。执行查询后会很快返回结果，仅仅 1 秒后我就得到了 `HumanResources.Employee`
    表的所有行。如果我们查询 `sys.dm_tran_locks` 动态管理视图（DMV），应该能看到所有的共享锁仍然存在，如图 [8-18](#340881_2_En_8_Chapter.xhtml#Fig18)
    所示。


    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig18_HTML.jpg](images/340881_2_En_8_Chapter/340881_2_En_8_Fig18_HTML.jpg)


    **图 8-18**

    共享锁仍然存在


    在这些锁仍然生效时，我们将在 SQL Server Management Studio 的一个新窗口中运行另一个查询。下面的查询将对同一个 `HumanResources.Employee`
    表中的单行执行 `UPDATE` 操作：


    ```sql

    UPDATE HumanResources.Employee

    SET JobTitle = ''Tester''

    WHERE BusinessEntityID = 5;

    ```


    一旦我们执行前面的查询，就会注意到发生了阻塞，因为查询持续运行而不返回任何结果。这是预期的行为，因为该行（具体来说是索引键）上存在一个共享锁，阻止我们对其进行更新。


    当我们查看 `sys.dm_os_waiting_tasks` DMV 时（如图 [8-19](#340881_2_En_8_Chapter.xhtml#Fig19)
    所示），会注意到第二个窗口中的查询正在等待放置一个排他锁，由 `LCK_M_X` 等待类型指示。


    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig19_HTML.jpg](images/340881_2_En_8_Chapter/340881_2_En_8_Fig19_HTML.jpg)


    **图 8-19**

    发生 LCK_M_X 等待


    如果我们结束 `SELECT` 查询，无论是通过执行 `COMMIT` 语句还是关闭 SQL Server Management Studio 中的窗口，共享锁都会被移除，然后第二个查询就能够执行其
    `UPDATE` 命令，从而结束 `LCK_M_X` 等待。


    ## 降低 LCK_M_X 等待


    要降低 `LCK_M_X` 等待时间，您应该采用与降低其他与锁相关的等待类型相同的方法。尝试识别哪些查询导致了阻塞，并查看是否可以优化它们以减少阻塞。


    ## LCK_M_X 总结


    `LCK_M_X` 等待类型与排他锁被同一资源上已存在的其他锁阻塞有关。由于排他锁几乎与所有其他锁类型不兼容，因此在经历并发查询执行的 SQL Server
    实例上看到 `LCK_M_X` 等待发生并不罕见。


    ## LCK_M_I[xx]


    看到 `LCK_M_I[xx]` 等待类型意味着一个任务在放置意向锁时被阻塞。由于我们已经在前面讨论过对象上的各种锁模式，在讨论这种等待类型时，我将意向锁使用的锁模式用
    `[xx]` 代替。`[xx]` 可以替换为多种不同的锁模式；例如，意向共享锁上的阻塞将由 `LCK_M_IS` 等待类型表示，而意向排他锁上的阻塞则显示为
    `LCK_M_IX`。


    ### LCK_M_I[xx] 等待类型是什么？


    `LCK_M_I[xx]` 等待类型表示一个任务正在等待在对象上放置意向锁。正如我们从本章开头的“锁和阻塞简介”部分所学，意向锁指示在锁层次结构的较低级别对象上放置了相同类型的锁。这并不意味着意向锁的存在仅仅是为了警告
    SQL Server 在层次结构的下方还有锁。意向锁的行为就像任何其他锁一样，一个意向锁完全有可能阻塞另一个不兼容的意向锁。意向锁在与其他不兼容的意向锁方面确实具有更多的灵活性。例如，在同一个页面对象上存在两个意向排他锁是可能的，这指示某一行将被修改。甚至可以在页面对象上同时存在一个意向共享锁和一个意向排他锁，因为这两个锁可以读取和/或修改不同的行。


    除了指示锁层次结构下方存在的锁类型外，意向锁还具有一些其他锁模式所没有的“特殊”模式。意向锁可以代表锁层次结构较低级别的多种锁模式。下面的列表描述了这三种意向锁模式：


    *   **共享意向排他锁（SIX）**：此锁模式表示在较低级别的所有对象上存在共享锁，并且在其中一些对象上存在意向排他锁。这些锁由一个事务获取，该事务希望读取数据并同时计划修改其他数据。当任务在尝试放置
    SIX 锁时被阻塞，将由 `LCK_M_SIX` 等待类型记录。


    *   **共享意向更新锁（SIU）**：此锁模式是共享锁和意向更新锁的组合。同样，单个事务可以同时在较低级别获取并持有这两种锁模式。如果在尝试放置此锁时发生阻塞，`LCK_M_SIU`
    等待类型将用于记录等待时间。


    *   **更新意向排他锁（UIX）**：此锁模式是另外两种锁模式——更新锁和意向排他锁——的组合。此锁模式上的阻塞将由 `LCK_M_UIX` 等待类型表示。


    在意向锁上看到高等待时间并不常见，因为意向锁在相互不兼容性方面要灵活得多。这意味着在意向级别的阻塞通常比锁层次结构更低的级别要少。'
  raw: '### LCK_M_X Example


    To demonstrate `LCK_M_X` waits occurring we are going to execute a `SELECT` statement
    without committing it. Before we run the `SELECT`, we are going to set the Isolation
    level to Repeatable Read. Doing so makes sure the Shared locks are not removed
    while the transaction is still running. Since we do not end the transaction, the
    locks will remain on the objects until we either kill the transaction or perform
    a `COMMIT` or `ROLLBACK`. The query that follows shows the `SELECT` statement
    we will execute against the `AdventureWorks` database:


    ```

    SET TRANSACTION ISOLATION LEVEL REPEATABLE READ

    BEGIN TRANSACTION

    SELECT *

    FROM HumanResources.Employee;

    -- COMMIT

    ```


    Notice we commented out the `COMMIT` section to make sure the locks remain in
    place. Executing the query returns results pretty quickly, after just 1 second
    I got all the rows of the `HumanResources.Employee` returned. If we query the
    `sys.dm_tran_locks` DMV , we should see that all the Shared locks are still in
    place, as shown in Figure [8-18](#340881_2_En_8_Chapter.xhtml#Fig18).


    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig18_HTML.jpg](images/340881_2_En_8_Chapter/340881_2_En_8_Fig18_HTML.jpg)


    Figure 8-18


    Shared locks still in place


    While the locks are still in place, we will run another query inside a new window
    in SQL Server Management Studio. The query that follows will perform an `UPDATE`
    on a single row inside the same `HumanResources.Employee` table :


    ```

    UPDATE HumanResources.Employee

    SET JobTitle = ''Tester''

    WHERE BusinessEntityID = 5;

    ```


    As soon as we execute the preceding query, we’ll notice a block occurring since
    the query keeps running without returning any results. This is as expected since
    there is a Shared lock in place on the row, or specifically the index key, that
    prevents us from updating it.


    When we look at the `sys.dm_os_waiting_tasks` DMV , shown in Figure [8-19](#340881_2_En_8_Chapter.xhtml#Fig19),
    we will notice that the query in the second window is waiting to place an Exclusive
    lock, indicated by the `LCK_M_X` wait type.


    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig19_HTML.jpg](images/340881_2_En_8_Chapter/340881_2_En_8_Fig19_HTML.jpg)


    Figure 8-19


    LCK_M_X wait occurring


    If we end the `SELECT` query, by either executing the `COMMIT` statement or by
    closing the windows inside SQL Server Management Studio, the Shared locks are
    removed and the second query will be able to execute its `UPDATE` command, ending
    the `LCK_M_X` wait.


    ### Lowering LCK_M_X Waits


    To lower `LCK_M_X` wait times, you should use the same approach as for lowering
    other lock-related wait types. Try and identify what queries are causing the blocking
    and see if you can optimize them so they cause less blocking.


    ### LCK_M_X Summary


    The `LCK_M_X` wait type is related to Exclusive locks being blocked by other locks
    already in place on the same resource. Since Exclusive locks are incompatible
    with just about every other lock type, seeing `LCK_M_X` waits occurring is not
    uncommon for SQL Server instances that experience concurrent query execution.


    ## LCK_M_I[xx]


    Seeing the `LCK_M_I[xx]` wait type means that a task is being blocked when placing
    an Intent lock. Since we already discussed the various lock modes on objects,
    I replaced the lock mode used for the Intent lock as `[xx]` when discussing this
    wait type. The `[xx]` can be replaced by a variety of different lock modes; for
    instance, a block on an Intent Shared lock would be represented by the `LCK_M_IS`
    wait type, while a block on an Intent Exclusive lock would be shown as `LCK_M_IX`.


    ### What Is the LCK_M_I[xx] Wait Type?


    `LCK_M_I[xx]` wait types indicate that a task is waiting to place an Intent lock
    on an object. As we learned from the “Introduction to Locking and Blocking” section
    at the start of this chapter, Intent locks indicate that a lock of the same type
    is placed on an object lower down in the locking hierarchy. This doesn’t mean
    Intent locks are only there to warn SQL Server that there is a lock further down
    the hierarchy. Intent locks behave just like any other lock, and it is entirely
    possible that one Intent lock can block another, incompatible, Intent lock. Intent
    locks do have a little bit more flexibility regarding other incompatible Intent
    locks. For instance, it is possible for two Intent Exclusive locks to exist on
    the same page object, indicating that a row is going to be modified. It is even
    possible to have an Intent Shared lock on a page object together with an Intent
    Exclusive, because both of the locks can read and/or modify different rows.


    Next to indicating the type of lock that exists lower down in the locking hierarchy,
    Intent locks have a few “special” modes the other lock modes do not have. It is
    possible for Intent locks to represent more than one lock mode on lower levels
    of the locking hierarchy. The list that follows describes these three Intent lock
    modes:


    *   Shared with Intent Exclusive (SIX): This lock mode represents that there are
    Shared Locks on all objects at a lower level, and Intent Exclusive locks on some
    of these objects. These locks are acquired by one transaction that wants to read
    data and plans to modify other data at the same time. When a task is being blocked
    while trying to place the SIX lock, it will be recorded by the `LCK_M_SIX` wait
    type.


    *   Shared Intent Update (SIU): This lock mode is a combination of Shared and
    Intent Update locks. Again, it is possible for a single transaction to acquire,
    and hold, both these lock modes at the same time at a lower level. If a block
    occurs while trying to place this lock, the `LCK_M_SIU` wait type will be used
    to record the wait time.


    *   Update Intent Exclusive (UIX): This lock mode is another combination of two
    other lock modes, Update and Intent Exclusive. Blocks on this lock mode will be
    represented by the `LCK_M_UIX` wait type.


    Seeing high wait times on Intent locks is not very common, since Intent locks
    are a lot more flexible regarding their incompatibility with each other. This
    means there generally is less blocking on the Intent level than there is further
    down the locking hierarchy.'
  trans: '

    ## LCK_M_X 示例


    为了演示 `LCK_M_X` 等待的发生，我们将执行一个 `SELECT` 语句但不提交它。在运行 `SELECT` 之前，我们将把隔离级别设置为可重复读（Repeatable
    Read）。这样做可以确保在事务仍在运行时共享锁不会被移除。由于我们不会结束事务，锁将保留在对象上，直到我们终止事务或执行 `COMMIT` 或 `ROLLBACK`。下面的查询显示了我们将在
    `AdventureWorks` 数据库上执行的 `SELECT` 语句：


    ```sql

    SET TRANSACTION ISOLATION LEVEL REPEATABLE READ

    BEGIN TRANSACTION

    SELECT *

    FROM HumanResources.Employee;

    -- COMMIT

    ```


    请注意，我们注释掉了 `COMMIT` 部分以确保锁保持不变。执行查询后会很快返回结果，仅仅 1 秒后我就得到了 `HumanResources.Employee`
    表的所有行。如果我们查询 `sys.dm_tran_locks` 动态管理视图（DMV），应该能看到所有的共享锁仍然存在，如图 8-18 所示。


    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig18_HTML.jpg](img/340881_2_En_8_Fig18_HTML.jpg)


    **图 8-18**

    共享锁仍然存在


    在这些锁仍然生效时，我们将在 SQL Server Management Studio 的一个新窗口中运行另一个查询。下面的查询将对同一个 `HumanResources.Employee`
    表中的单行执行 `UPDATE` 操作：


    ```sql

    UPDATE HumanResources.Employee

    SET JobTitle = ''Tester''

    WHERE BusinessEntityID = 5;

    ```


    一旦我们执行前面的查询，就会注意到发生了阻塞，因为查询持续运行而不返回任何结果。这是预期的行为，因为该行（具体来说是索引键）上存在一个共享锁，阻止我们对其进行更新。


    当我们查看 `sys.dm_os_waiting_tasks` DMV 时（如图 8-19 所示），会注意到第二个窗口中的查询正在等待放置一个排他锁，由 `LCK_M_X`
    等待类型指示。


    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig19_HTML.jpg](img/340881_2_En_8_Fig19_HTML.jpg)


    **图 8-19**

    发生 LCK_M_X 等待


    如果我们结束 `SELECT` 查询，无论是通过执行 `COMMIT` 语句还是关闭 SQL Server Management Studio 中的窗口，共享锁都会被移除，然后第二个查询就能够执行其
    `UPDATE` 命令，从而结束 `LCK_M_X` 等待。


    ## 降低 LCK_M_X 等待


    要降低 `LCK_M_X` 等待时间，您应该采用与降低其他与锁相关的等待类型相同的方法。尝试识别哪些查询导致了阻塞，并查看是否可以优化它们以减少阻塞。


    ## LCK_M_X 总结


    `LCK_M_X` 等待类型与排他锁被同一资源上已存在的其他锁阻塞有关。由于排他锁几乎与所有其他锁类型不兼容，因此在经历并发查询执行的 SQL Server
    实例上看到 `LCK_M_X` 等待发生并不罕见。


    ## LCK_M_I[xx]


    看到 `LCK_M_I[xx]` 等待类型意味着一个任务在放置意向锁时被阻塞。由于我们已经在前面讨论过对象上的各种锁模式，在讨论这种等待类型时，我将意向锁使用的锁模式用
    `[xx]` 代替。`[xx]` 可以替换为多种不同的锁模式；例如，意向共享锁上的阻塞将由 `LCK_M_IS` 等待类型表示，而意向排他锁上的阻塞则显示为
    `LCK_M_IX`。


    ### LCK_M_I[xx] 等待类型是什么？


    `LCK_M_I[xx]` 等待类型表示一个任务正在等待在对象上放置意向锁。正如我们从本章开头的“锁和阻塞简介”部分所学，意向锁指示在锁层次结构的较低级别对象上放置了相同类型的锁。这并不意味着意向锁的存在仅仅是为了警告
    SQL Server 在层次结构的下方还有锁。意向锁的行为就像任何其他锁一样，一个意向锁完全有可能阻塞另一个不兼容的意向锁。意向锁在与其他不兼容的意向锁方面确实具有更多的灵活性。例如，在同一个页面对象上存在两个意向排他锁是可能的，这指示某一行将被修改。甚至可以在页面对象上同时存在一个意向共享锁和一个意向排他锁，因为这两个锁可以读取和/或修改不同的行。


    除了指示锁层次结构下方存在的锁类型外，意向锁还具有一些其他锁模式所没有的“特殊”模式。意向锁可以代表锁层次结构较低级别的多种锁模式。下面的列表描述了这三种意向锁模式：


    *   **共享意向排他锁（SIX）**：此锁模式表示在较低级别的所有对象上存在共享锁，并且在其中一些对象上存在意向排他锁。这些锁由一个事务获取，该事务希望读取数据并同时计划修改其他数据。当任务在尝试放置
    SIX 锁时被阻塞，将由 `LCK_M_SIX` 等待类型记录。


    *   **共享意向更新锁（SIU）**：此锁模式是共享锁和意向更新锁的组合。同样，单个事务可以同时在较低级别获取并持有这两种锁模式。如果在尝试放置此锁时发生阻塞，`LCK_M_SIU`
    等待类型将用于记录等待时间。


    *   **更新意向排他锁（UIX）**：此锁模式是另外两种锁模式——更新锁和意向排他锁——的组合。此锁模式上的阻塞将由 `LCK_M_UIX` 等待类型表示。


    在意向锁上看到高等待时间并不常见，因为意向锁在相互不兼容性方面要灵活得多。这意味着在意向级别的阻塞通常比锁层次结构更低的级别要少。

