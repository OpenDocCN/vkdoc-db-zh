    # 配置 SQL Server 使用自签名证书加密连接


    在添加账户并选择了正确的权限后，我点击“确定”关闭对话框。现在权限已设置正确，SQL Server 服务账户能够访问证书，我需要将自签名证书添加到我希望启用加密的
    SQL Server 实例的网络配置中。我打开“SQL Server 配置管理器”并点击“SQL Server 网络配置”选项。右键单击应使用自签名证书的
    SQL Server 实例，然后选择“属性”。接着，我打开“证书”选项卡并选择我们之前创建的自签名证书。图 11-9 显示了在我测试虚拟机上的对话框。


    ![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig9_HTML.jpg](img/340881_2_En_11_Fig9_HTML.jpg)

    图 11-9 证书选择


    选择自签名证书后，我点击“确定”关闭对话框。系统通知我证书将在重启 SQL Server 服务后生效，因此我执行了 SQL Server 服务的重启。


    目前，SQL Server 已可以使用自签名证书，但为确保网络消息被加密，我必须连接到 SQL Server 实例并告知它需要使用加密。在此示例中，我将使用位于与
    SQL Server 实例同一虚拟机上的 SQL Server Management Studio 连接到该实例。如果您从另一台计算机连接到 SQL Server
    实例，则需要确保该机器上也提供了自签名证书。当 SQL Server Management Studio 中出现“连接到服务器”对话框时，我点击对话框右下角的“选项”按钮。这将打开到
    SQL Server 实例连接的附加属性。我勾选“加密连接”复选框，如图 11-10 所示，然后连接到我的 SQL Server 实例。


    ![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig10_HTML.jpg](img/340881_2_En_11_Fig10_HTML.jpg)

    图 11-10 SQL Server Management Studio 中的连接属性


    至此，我已完成所有配置，确保 SQL Server 将使用自签名证书加密 SQL Server 实例与 SQL Server Management Studio
    之间的消息，因此我终于可以查看 `PREEMPTIVE_OS_ENCRYPTMESSAGE` 和 `PREEMPTIVE_OS_DECRYPTMESSAGE`
    等待类型了！


    现在生成 `PREEMPTIVE_OS_ENCRYPTMESSAGE` 和 `PREEMPTIVE_OS_DECRYPTMESSAGE` 等待非常简单。基本上，我现在从
    SQL Server Management Studio 执行的每个查询都将被加密，即使我在与 SQL Server 实例相同的机器上运行 SQL Server
    Management Studio 也是如此。我使用清单 11-1 中的查询重置 `sys.dm_os_wait_stats` DMV，连接到 `AdventureWorks`
    数据库，执行一个简单查询，然后查看在 `PREEMPTIVE_OS_ENCRYPTMESSAGE` 和 `PREEMPTIVE_OS_DECRYPTMESSAGE`
    等待类型上发生的等待。


    ```sql

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR)

    USE AdventureWorks

    GO

    SELECT *

    FROM Sales.SalesOrderDetail;

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''PREEMPTIVE_OS_ENCRYPTMESSAGE''

    OR wait_type = ''PREEMPTIVE_OS_DECRYPTMESSAGE'';

    -- 清单 11-1 使用加密连接的选择查询

    ```


    在我的测试 SQL Server 实例上，这些查询的结果如图 11-11 所示。


    ![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig11_HTML.jpg](img/340881_2_En_11_Fig11_HTML.jpg)

    图 11-11 PREEMPTIVE_OS_DECRYPTMESSAGE 和 PREEMPTIVE_OS_ENCRYPTMESSAGE 等待


    如您所见，`PREEMPTIVE_OS_ENCRYPTMESSAGE` 等待时间和等待次数更多。这是合理的，因为我执行了一个选择查询，它只需要解密来自客户端的确认网络消息。查询结果必须由
    SQL Server 加密，这导致 `PREEMPTIVE_OS_ENCRYPTMESSAGE` 等待类型的等待时间更高。


    ### 降低 PREEMPTIVE_OS_ENCRYPTMESSAGE 和 PREEMPTIVE_OS_DECRYPTMESSAGE 等待


    在正常情况下，无需专注于降低 `PREEMPTIVE_OS_ENCRYPTMESSAGE` 和 `PREEMPTIVE_OS_DECRYPTMESSAGE`
    等待类型。它们大多只表示正在发生消息加密，这可能是在配置 SQL Server 实例时做出的选择。禁用加密将显著降低 `PREEMPTIVE_OS_ENCRYPTMESSAGE`
    和 `PREEMPTIVE_OS_DECRYPTMESSAGE` 等待时间，但会以安全性为代价。


    ### PREEMPTIVE_OS_ENCRYPTMESSAGE 和 PREEMPTIVE_OS_DECRYPTMESSAGE 总结


    `PREEMPTIVE_OS_ENCRYPTMESSAGE` 和 `PREEMPTIVE_OS_DECRYPTMESSAGE` 等待类型表示 SQL Server
    实例与客户端之间正在进行加密。这些等待类型通常可以忽略，因为它们并不直接表明存在性能问题。降低它们可以通过禁用加密来实现，但这会牺牲安全性。


    # PREEMPTIVE_OS_WRITEFILEGATHER


    `PREEMPTIVE_OS_WRITEFILEGATHER` 等待类型与存储交互有关，更具体地说是通过 Windows 操作系统写入文件。


    ### 什么是 PREEMPTIVE_OS_WRITEFILEGATHER 等待类型？


    `PREEMPTIVE_OS_WRITEFILEGATHER` 等待类型与 Windows 操作系统内部的 `WriteFileGather` 函数有关。如果我们在
    Books Online 上查找此函数的定义，会得到以下描述：“从缓冲区数组中检索数据并将数据写入文件。” 从这个描述我们可以推断，当需要向文件写入数据时，会调用此函数。然而，这并非
    SQL Server 内部的每一次存储子系统写入操作都如此。通常，SQL Server 不需要超出其自身引擎范围去等待一个抢占式操作。但是，存在一些例外情况，这些情况可能导致
    `PREEMPTIVE_OS_WRITEFILEGATHER` 等待（取决于用于执行存储子系统交互的 Windows 函数）。SQL Server 内部一个总会导致
    `PREEMPTIVE_OS_WRITEFILEGATHER` 等待的特定操作是数据文件的增长。每当 SQL Server 想要增长一个数据文件时，它需要在存储子系统上分配额外的空间并“清零”新空间以便
    SQL Server 使用。额外空间的分配不是在 SQL Server 引擎内部发生的，因此必须进行一个抢占式操作，这可能导致在 `WriteFileGather`
    函数上发生抢占式等待。

    '
- fmt: "# PREEMPTIVE_OS_WRITEFILEGATHER Example\n\nTo show you an example of `PREEMPTIVE_OS_WRITEFILEGATHER`\
    \ waits occurring, I am going to replicate the situation I described in the previous\
    \ section, growing a database data file. For this example I will restore a backup\
    \ of the `AdventureWorks` database; in the SQL Server 2016 version of the database,\
    \ there exists only a single database data file with a size of 208 MB, as shown\
    \ in Figure [11-12](#340881_2_En_11_Chapter.xhtml#Fig12).\n\n![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig12_HTML.jpg](images/340881_2_En_11_Chapter/340881_2_En_11_Fig12_HTML.jpg)\n\
    Figure 11-12: Default database file configuration of AdventureWorks (2016 edition)\n\
    \nI am going to grow the single database data file to a size of 10 GB. Because\
    \ the allocation of the extra space needed for the data file is performed outside\
    \ SQL Server, this should result in `PREEMPTIVE_OS_WRITEFILEGATHER` waits.\n\n\
    To perform the action of enlarging the database data file I used the script shown\
    \ in Listing [11-2](#340881_2_En_11_Chapter.xhtml#PC2). This script will clear\
    \ the `sys.dm_os_wait_stats` DMV, enlarge the `AdventureWorks` data file to 800\
    \ MB, and then query the `sys.dm_os_wait_stats` DMV for `PREEMPTIVE_OS_WRITEFILEGATHER`.\n\
    \n```sql\nDBCC SQLPERF('sys.dm_os_wait_stats', CLEAR)\nUSE [master]\nGO\nALTER\
    \ DATABASE [AdventureWorks]\nMODIFY FILE\n(\n    NAME = N'AdventureWorks2016_Data',\n\
    \    SIZE = 819200KB\n);\nGO\nSELECT *\nFROM sys.dm_os_wait_stats\nWHERE wait_type\
    \ = 'PREEMPTIVE_OS_WRITEFILEGATHER';\n```\nListing 11-2: Enlarge AdventureWorks\
    \ database data file\n\nThe query in Listing [11-2](#340881_2_En_11_Chapter.xhtml#PC2)\
    \ is almost instantly completed on my test SQL Server instance, it has very fast\
    \ storage, and results in the wait information shown in Figure [11-13](#340881_2_En_11_Chapter.xhtml#Fig13)\
    \ for the `PREEMPTIVE_OS_WRITEFILEGATHER` wait type.\n\n![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig13_HTML.jpg](images/340881_2_En_11_Chapter/340881_2_En_11_Fig13_HTML.jpg)\n\
    Figure 11-13: PREEMPTIVE_OS_WRITEFILEGATHER waits\n\nNotice that there was only\
    \ one single wait on the `PREEMPTIVE_OS_WRITEFILEGATHER` wait type, and the duration\
    \ was practically as long as it took to perform the enlargement of the data file.\n\
    \n## Lowering PREEMPTIVE_OS_WRITEFILEGATHER Waits\n\nWhen you notice higher-than-normal\
    \ wait times on the `PREEMPTIVE_OS_WRITEFILEGATHER` wait type, it means that a\
    \ process from inside SQL Server is performing actions on the storage subsystem\
    \ through the Windows operating system. The first matter of action should be to\
    \ investigate what process initiated the action that resulted in `PREEMPTIVE_OS_WRITEFILEGATHER`\
    \ waits. Very frequently this will be the (automatic) growth of a database data\
    \ or log file. If you allow the data or log files to grow automatically when they\
    \ are full, you can expect to see `PREEMPTIVE_OS_WRITEFILEGATHER` waits occur\
    \ whenever an auto-growth event occurs. This does not necessarily mean there is\
    \ a problem, but if auto-growth events take a long time to complete because, for\
    \ instance, the storage subsystem is experiencing performance problems, your queries\
    \ might experience performance degradation as well.\n\nThere is one Windows setting\
    \ available that I frequently see not configured, instant file initialization.\
    \ We discussed this setting, and how you can enable it, already in Chapter [6](#340881_2_En_6_Chapter.xhtml),\
    \ “IO-Related Wait Types,” under the `ASYNC_IO_COMPLETION` wait type so I won’t\
    \ go into detail on how to enable the setting again. Figure [11-14](#340881_2_En_11_Chapter.xhtml#Fig14)\
    \ shows the results of the query in Listing [11-2](#340881_2_En_11_Chapter.xhtml#PC2)\
    \ with instant file initialization enabled, and as you can see, the amount of\
    \ wait time spent on the `PREEMPTIVE_OS_WRITEFILEGATHER` wait time disappeared\
    \ completely.\n\n![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig14_HTML.jpg](images/340881_2_En_11_Chapter/340881_2_En_11_Fig14_HTML.jpg)\n\
    Figure 11-14: PREEMPTIVE_OS_WRITEFILEGATHER waits with instant file initialization\
    \ turned on\n\nNext to using instant file initialization, the performance of the\
    \ storage subsystem plays a large part in the `PREEMPTIVE_OS_WRITEFILEGATHER`\
    \ wait times. The better your storage subsystem performs, the lower the wait times\
    \ on the `PREEMPTIVE_OS_WRITEFILEGATHER` wait type.\n\nAnother SQL Server action\
    \ that can cause higher-than-normal `PREEMPTIVE_OS_WRITEFILEGATHER` wait times\
    \ is performing database restores. Much like expending a data file, before SQL\
    \ Server can restore a database, it needs to allocate free storage for it. This\
    \ is also related to instant file initialization, which will also speed up database\
    \ restores just like file enlargements.\n\n## PREEMPTIVE_OS_WRITEFILEGATHER Summary\n\
    \nThe `PREEMPTIVE_OS_WRITEFILEGATHER` wait type indicates that SQL Server is asking\
    \ the Windows operating system to perform an operation on the storage subsystem.\
    \ Not all operations can be handled from inside the SQL Server engine and actions;\
    \ for example, the growing of a data file requires the execution of a Windows\
    \ function to allocate the desired space on the storage subsystem. Instant file\
    \ initialization is a setting in Windows that can lower the amount of `PREEMPTIVE_OS_WRITEFILEGATHER`\
    \ wait time drastically, but the performance of the storage subsystem itself also\
    \ plays a large role in `PREEMPTIVE_OS_WRITEFILEGATHER` wait times.\n\n# PREEMPTIVE_OS_AUTHENTICATIONOPS\n\
    \nThe `PREEMPTIVE_OS_AUTHENTICATIONOPS` wait type is another preemptive wait type\
    \ that is related to various Windows authentication functions.\n\n## What Is the\
    \ PREEMPTIVE_OS_AUTHENTICATIONOPS Wait Type?\n\nThe `PREEMPTIVE_OS_AUTHENTICATIONOPS`\
    \ wait type is recorded whenever SQL Server needs to perform an account authentication,\
    \ for instance, to authenticate the SQL Server Windows login when it connects\
    \ to SQL Server. Seeing `PREEMPTIVE_OS_AUTHENTICATIONOPS` waits occur is to be\
    \ expected, especially when using mixed-mode authentication and Windows logins\
    \ inside your SQL Server instance.\n\nOne common misconception about the `PREEMPTIVE_OS_AUTHENTICATIONOPS`\
    \ wait type is that it is only related to SQL Server logins that use Windows authentication\
    \ inside a domain. This is not entirely correct. While it is true that `PREEMPTIVE_OS_AUTHENTICATIONOPS`\
    \ wait times will frequently be higher when using Active Directory accounts to\
    \ connect to SQL Server, `PREEMPTIVE_OS_AUTHENTICATIONOPS` waits will also occur\
    \ if the SQL Server instance is installed on a machine outside of a domain; the\
    \ wait times will generally be lower though.\n\nFigure [11-15](#340881_2_En_11_Chapter.xhtml#Fig15)\
    \ shows a simplified image of how SQL Server connects to an Active Directory domain\
    \ controller to validate the SQL Server Windows login. Keep in mind that the Windows\
    \ operating system takes care of the communication between the domain controller\
    \ and the SQL Server, hence the preemptive wait type.\n\n![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig15_HTML.jpg](images/340881_2_En_11_Chapter/340881_2_En_11_Fig15_HTML.jpg)\n\
    Figure 11-15: SQL Server Windows login authentication inside domain\n\nOn a machine\
    \ that has a SQL Server instance installed but is not part of a domain, the authentication\
    \ of the Windows login will occur on the machine itself (local accounts).\n\n\
    Because it will generally take a longer time to authenticate a Windows login through\
    \ a domain controller (the request has to travel across the network and authenticate\
    \ on another machine), the wait times for the `PREEMPTIVE_OS_AUTHENTICATIONOPS`\
    \ wait type will generally be higher for a SQL Server instance inside a domain."
  raw: '### PREEMPTIVE_OS_WRITEFILEGATHER Example


    To show you an example of `PREEMPTIVE_OS_WRITEFILEGATHER` waits occurring, I am
    going to replicate the situation I described in the previous section, growing
    a database data file. For this example I will restore a backup of the `AdventureWorks`
    database; in the SQL Server 2016 version of the database, there exists only a
    single database data file with a size of 208 MB, as shown in Figure [11-12](#340881_2_En_11_Chapter.xhtml#Fig12).


    ![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig12_HTML.jpg](images/340881_2_En_11_Chapter/340881_2_En_11_Fig12_HTML.jpg)


    Figure 11-12


    Default database file configuration of AdventureWorks (2016 edition)


    I am going to grow the single database data file to a size of 10 GB. Because the
    allocation of the extra space needed for the data file is performed outside SQL
    Server, this should result in `PREEMPTIVE_OS_WRITEFILEGATHER` waits.


    To perform the action of enlarging the database data file I used the script shown
    in Listing [11-2](#340881_2_En_11_Chapter.xhtml#PC2). This script will clear the
    `sys.dm_os_wait_stats` DMV, enlarge the `AdventureWorks` data file to 800 MB,
    and then query the `sys.dm_os_wait_stats` DMV for `PREEMPTIVE_OS_WRITEFILEGATHER`.


    ```

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR)

    USE [master]

    GO

    ALTER DATABASE [AdventureWorks]

    MODIFY FILE

    (

    NAME = N''AdventureWorks2016_Data'',

    SIZE = 819200KB

    );

    GO

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''PREEMPTIVE_OS_WRITEFILEGATHER'';

    Listing 11-2

    Enlarge AdventureWorks database data file

    ```


    The query in Listing [11-2](#340881_2_En_11_Chapter.xhtml#PC2) is almost instantly
    completed on my test SQL Server instance, it has very fast storage, and results
    in the wait information shown in Figure [11-13](#340881_2_En_11_Chapter.xhtml#Fig13)
    for the `PREEMPTIVE_OS_WRITEFILEGATHER` wait type.


    ![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig13_HTML.jpg](images/340881_2_En_11_Chapter/340881_2_En_11_Fig13_HTML.jpg)


    Figure 11-13


    PREEMPTIVE_OS_WRITEFILEGATHER waits


    Notice that there was only one single wait on the `PREEMPTIVE_OS_WRITEFILEGATHER`
    wait type, and the duration was practically as long as it took to perform the
    enlargement of the data file.


    ### Lowering PREEMPTIVE_OS_WRITEFILEGATHER Waits


    When you notice higher-than-normal wait times on the `PREEMPTIVE_OS_WRITEFILEGATHER`
    wait type, it means that a process from inside SQL Server is performing actions
    on the storage subsystem through the Windows operating system. The first matter
    of action should be to investigate what process initiated the action that resulted
    in `PREEMPTIVE_OS_WRITEFILEGATHER` waits. Very frequently this will be the (automatic)
    growth of a database data or log file. If you allow the data or log files to grow
    automatically when they are full, you can expect to see `PREEMPTIVE_OS_WRITEFILEGATHER`
    waits occur whenever an auto-growth event occurs. This does not necessarily mean
    there is a problem, but if auto-growth events take a long time to complete because,
    for instance, the storage subsystem is experiencing performance problems, your
    queries might experience performance degradation as well.


    There is one Windows setting available that I frequently see not configured, instant
    file initialization. We discussed this setting, and how you can enable it, already
    in Chapter [6](#340881_2_En_6_Chapter.xhtml), “IO-Related Wait Types,” under the
    `ASYNC_IO_COMPLETION` wait type so I won’t go into detail on how to enable the
    setting again. Figure [11-14](#340881_2_En_11_Chapter.xhtml#Fig14) shows the results
    of the query in Listing [11-2](#340881_2_En_11_Chapter.xhtml#PC2) with instant
    file initialization enabled, and as you can see, the amount of wait time spent
    on the `PREEMPTIVE_OS_WRITEFILEGATHER` wait time disappeared completely.


    ![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig14_HTML.jpg](images/340881_2_En_11_Chapter/340881_2_En_11_Fig14_HTML.jpg)


    Figure 11-14


    PREEMPTIVE_OS_WRITEFILEGATHER waits with instant file initialization turned on


    Next to using instant file initialization, the performance of the storage subsystem
    plays a large part in the `PREEMPTIVE_OS_WRITEFILEGATHER` wait times. The better
    your storage subsystem performs, the lower the wait times on the `PREEMPTIVE_OS_WRITEFILEGATHER`
    wait type.


    Another SQL Server action that can cause higher-than-normal `PREEMPTIVE_OS_WRITEFILEGATHER`
    wait times is performing database restores. Much like expending a data file, before
    SQL Server can restore a database, it needs to allocate free storage for it. This
    is also related to instant file initialization, which will also speed up database
    restores just like file enlargements.


    ### PREEMPTIVE_OS_WRITEFILEGATHER Summary


    The `PREEMPTIVE_OS_WRITEFILEGATHER` wait type indicates that SQL Server is asking
    the Windows operating system to perform an operation on the storage subsystem.
    Not all operations can be handled from inside the SQL Server engine and actions;
    for example, the growing of a data file requires the execution of a Windows function
    to allocate the desired space on the storage subsystem. Instant file initialization
    is a setting in Windows that can lower the amount of `PREEMPTIVE_OS_WRITEFILEGATHER`
    wait time drastically, but the performance of the storage subsystem itself also
    plays a large role in `PREEMPTIVE_OS_WRITEFILEGATHER` wait times.


    ## PREEMPTIVE_OS_AUTHENTICATIONOPS


    The `PREEMPTIVE_OS_AUTHENTICATIONOPS` wait type is another preemptive wait type
    that is related to various Windows authentication functions.


    ### What Is the PREEMPTIVE_OS_AUTHENTICATIONOPS Wait Type?


    The `PREEMPTIVE_OS_AUTHENTICATIONOPS` wait type is recorded whenever SQL Server
    needs to perform an account authentication, for instance, to authenticate the
    SQL Server Windows login when it connects to SQL Server. Seeing `PREEMPTIVE_OS_AUTHENTICATIONOPS`
    waits occur is to be expected, especially when using mixed-mode authentication
    and Windows logins inside your SQL Server instance.


    One common misconception about the `PREEMPTIVE_OS_AUTHENTICATIONOPS` wait type
    is that it is only related to SQL Server logins that use Windows authentication
    inside a domain. This is not entirely correct. While it is true that `PREEMPTIVE_OS_AUTHENTICATIONOPS`
    wait times will frequently be higher when using Active Directory accounts to connect
    to SQL Server, `PREEMPTIVE_OS_AUTHENTICATIONOPS` waits will also occur if the
    SQL Server instance is installed on a machine outside of a domain; the wait times
    will generally be lower though.


    Figure [11-15](#340881_2_En_11_Chapter.xhtml#Fig15) shows a simplified image of
    how SQL Server connects to an Active Directory domain controller to validate the
    SQL Server Windows login. Keep in mind that the Windows operating system takes
    care of the communication between the domain controller and the SQL Server, hence
    the preemptive wait type.


    ![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig15_HTML.jpg](images/340881_2_En_11_Chapter/340881_2_En_11_Fig15_HTML.jpg)


    Figure 11-15


    SQL Server Windows login authentication inside domain


    On a machine that has a SQL Server instance installed but is not part of a domain,
    the authentication of the Windows login will occur on the machine itself (local
    accounts).


    Because it will generally take a longer time to authenticate a Windows login through
    a domain controller (the request has to travel across the network and authenticate
    on another machine), the wait times for the `PREEMPTIVE_OS_AUTHENTICATIONOPS`
    wait type will generally be higher for a SQL Server instance inside a domain.'
  trans: "\n# PREEMPTIVE_OS_WRITEFILEGATHER 示例\n\n为了向您展示一个 `PREEMPTIVE_OS_WRITEFILEGATHER`\
    \ 等待发生的示例，我将复现我在前一节中描述的情况，即扩展数据库数据文件。在这个示例中，我将还原 `AdventureWorks` 数据库的备份；在 SQL\
    \ Server 2016 版本的数据库中，只存在一个大小为 208 MB 的数据库数据文件，如图 11-12 所示。\n\n![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig12_HTML.jpg](img/340881_2_En_11_Fig12_HTML.jpg)\n\
    图 11-12：AdventureWorks（2016 版）的默认数据库文件配置\n\n我将把该数据库数据文件的大小扩展到 10 GB。由于数据文件所需额外空间的分配是在\
    \ SQL Server 外部执行的，这应该会导致 `PREEMPTIVE_OS_WRITEFILEGATHER` 等待。\n\n为了执行扩展数据库数据文件的操作，我使用了清单\
    \ 11-2 中所示的脚本。此脚本将清除 `sys.dm_os_wait_stats` DMV，将 `AdventureWorks` 数据文件增大到 800\
    \ MB，然后查询 `sys.dm_os_wait_stats` DMV 中的 `PREEMPTIVE_OS_WRITEFILEGATHER`。\n\n```sql\n\
    DBCC SQLPERF('sys.dm_os_wait_stats', CLEAR)\nUSE [master]\nGO\nALTER DATABASE\
    \ [AdventureWorks]\nMODIFY FILE\n(\n    NAME = N'AdventureWorks2016_Data',\n \
    \   SIZE = 819200KB\n);\nGO\nSELECT *\nFROM sys.dm_os_wait_stats\nWHERE wait_type\
    \ = 'PREEMPTIVE_OS_WRITEFILEGATHER';\n```\n清单 11-2：扩展 AdventureWorks 数据库数据文件\n\
    \n在我的测试 SQL Server 实例上，清单 11-2 中的查询几乎瞬间完成，它的存储速度非常快，并导致了如图 11-13 所示的关于 `PREEMPTIVE_OS_WRITEFILEGATHER`\
    \ 等待类型的等待信息。\n\n![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig13_HTML.jpg](img/340881_2_En_11_Fig13_HTML.jpg)\n\
    图 11-13：PREEMPTIVE_OS_WRITEFILEGATHER 等待\n\n请注意，`PREEMPTIVE_OS_WRITEFILEGATHER`\
    \ 等待类型只有一次单独的等待，其持续时间实际上与执行数据文件扩展操作所需的时间一样长。\n\n## 降低 PREEMPTIVE_OS_WRITEFILEGATHER\
    \ 等待\n\n当您注意到 `PREEMPTIVE_OS_WRITEFILEGATHER` 等待类型的等待时间高于正常水平时，这意味着 SQL Server\
    \ 内部的一个进程正在通过 Windows 操作系统对存储子系统执行操作。首要行动应是调查是哪个进程发起了导致 `PREEMPTIVE_OS_WRITEFILEGATHER`\
    \ 等待的操作。很多时候，这将是数据库数据文件或日志文件的（自动）增长。如果您允许数据或日志文件在已满时自动增长，那么每当发生自动增长事件时，您都可能看到\
    \ `PREEMPTIVE_OS_WRITEFILEGATHER` 等待发生。这不一定意味着存在问题，但如果自动增长事件因为（例如）存储子系统出现性能问题而需要很长时间才能完成，您的查询也可能会经历性能下降。\n\
    \n有一个我经常看到未配置的 Windows 设置，即即时文件初始化。我们已经在第 6 章“I/O 相关等待类型”中关于 `ASYNC_IO_COMPLETION`\
    \ 等待类型的部分讨论过此设置以及如何启用它，因此我不会再详细说明如何启用该设置。图 11-14 显示了在启用即时文件初始化后，清单 11-2 中查询的结果，正如您所看到的，花费在\
    \ `PREEMPTIVE_OS_WRITEFILEGATHER` 等待类型上的等待时间完全消失了。\n\n![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig14_HTML.jpg](img/340881_2_En_11_Fig14_HTML.jpg)\n\
    图 11-14：开启即时文件初始化后的 PREEMPTIVE_OS_WRITEFILEGATHER 等待\n\n除了使用即时文件初始化外，存储子系统的性能在\
    \ `PREEMPTIVE_OS_WRITEFILEGATHER` 等待时间中也起着重要作用。您的存储子系统性能越好，`PREEMPTIVE_OS_WRITEFILEGATHER`\
    \ 等待类型的等待时间就越低。\n\n另一个可能导致 `PREEMPTIVE_OS_WRITEFILEGATHER` 等待时间高于正常水平的 SQL Server\
    \ 操作是执行数据库还原。与扩展数据文件类似，在 SQL Server 可以还原数据库之前，它需要为其分配空闲存储空间。这也与即时文件初始化有关，它将像扩展文件一样加快数据库还原速度。\n\
    \n## PREEMPTIVE_OS_WRITEFILEGATHER 总结\n\n`PREEMPTIVE_OS_WRITEFILEGATHER` 等待类型表明\
    \ SQL Server 正在请求 Windows 操作系统对存储子系统执行一项操作。并非所有操作都可以在 SQL Server 引擎和操作内部处理；例如，扩展数据文件需要执行\
    \ Windows 函数来在存储子系统上分配所需空间。即时文件初始化是 Windows 中的一个设置，可以大幅减少 `PREEMPTIVE_OS_WRITEFILEGATHER`\
    \ 等待时间，但存储子系统本身的性能也在 `PREEMPTIVE_OS_WRITEFILEGATHER` 等待时间中扮演重要角色。\n\n# PREEMPTIVE_OS_AUTHENTICATIONOPS\n\
    \n`PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待类型是另一种抢占式等待类型，与各种 Windows 身份验证函数相关。\n\n\
    ## 什么是 PREEMPTIVE_OS_AUTHENTICATIONOPS 等待类型？\n\n每当 SQL Server 需要执行账户身份验证时，例如在\
    \ Windows 登录名连接到 SQL Server 时对其进行身份验证，就会记录 `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待类型。看到\
    \ `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待发生是预料之中的事，尤其是在您的 SQL Server 实例中使用混合模式身份验证和\
    \ Windows 登录名时。\n\n关于 `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待类型的一个常见误解是，它仅与在域内使用\
    \ Windows 身份验证的 SQL Server 登录名相关。这并不完全正确。虽然确实在使用 Active Directory 账户连接到 SQL Server\
    \ 时，`PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待时间通常会更高，但如果 SQL Server 实例安装在域外的机器上，`PREEMPTIVE_OS_AUTHENTICATIONOPS`\
    \ 等待也会发生；不过等待时间通常会较低。\n\n图 11-15 展示了一个简化的图像，说明 SQL Server 如何连接到 Active Directory\
    \ 域控制器以验证 SQL Server Windows 登录名。请记住，Windows 操作系统负责处理域控制器和 SQL Server 之间的通信，因此是抢占式等待类型。\n\
    \n![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig15_HTML.jpg](img/340881_2_En_11_Fig15_HTML.jpg)\n\
    图 11-15：域内的 SQL Server Windows 登录名身份验证\n\n在安装了 SQL Server 实例但不在域中的机器上，Windows\
    \ 登录名的身份验证将在本机（本地账户）上进行。\n\n由于通过域控制器对 Windows 登录名进行身份验证通常需要更长时间（请求必须通过网络传输并在另一台机器上进行身份验证），因此对于域内的\
    \ SQL Server 实例，`PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待类型的等待时间通常会更高。\n"
- fmt: '### PREEMPTIVE_OS_AUTHENTICATIONOPS Example


    To generate an example of `PREEMPTIVE_OS_AUTHENTICATIONOPS` waits occurring, I
    do not need to perform any complex actions. Opening a new connection to the SQL
    Server instance using Windows authentication should be enough. One way to make
    this easy to measure is by connecting to the SQL Server instance with SQL Server
    Management Studio, using Windows authentication. Figure 11-16 shows the SQL Server
    Management Studio connect dialog to my test SQL Server instance. Note that my
    test SQL Server instance is not inside a domain, and that I use the local administrator
    account on my machine to connect.


    ![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig16_HTML.jpg](images/340881_2_En_11_Chapter/340881_2_En_11_Fig16_HTML.jpg)


    Figure 11-16


    Connect SQL Server Management Studio using local Windows authentication


    The next step I perform is opening a new Query Window inside SQL Server Management
    Studio and performing the steps inside the query shown in Listing 11-3.


    ```sql

    -- Step 1 Clear sys.dm_os_wait_stats

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    -- Step 2 Open a new Query Window inside

    -- SQL Server Management Studio

    -- Step 3 go back to this Query Window

    -- and run the query below

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''PREEMPTIVE_OS_AUTHENTICATIONOPS'';

    ```

    Listing 11-3

    Generate `PREEMPTIVE_OS_AUTHENTICATIONOPS` waits


    If you follow the steps commented inside the script in Listing 11-3, you should
    see `PREEMPTIVE_OS_AUTHENTICATIONOPS` waits occurring after running the query
    in step 3. Figure 11-17 shows the results of the query in step 3 on my test machine.


    ![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig17_HTML.jpg](images/340881_2_En_11_Chapter/340881_2_En_11_Fig17_HTML.jpg)


    Figure 11-17


    `PREEMPTIVE_OS_AUTHENTICATIONOPS` waits


    As you can see, the number of waits occurring and their wait times are very low.
    The point of this example is not to show you an example of very high `PREEMPTIVE_OS_AUTHENTICATIONOPS`
    wait times, but rather how they occur naturally when connecting to a SQL Server
    instance. Because I opened a new Query Window inside SQL Server Management Studio,
    a new connection to the SQL Server instance will be made using the Windows login
    I used to connect to my SQL Server instance. Because it is a new connection, the
    account I used to connect had to be authenticated, resulting in `PREEMPTIVE_OS_AUTHENTICATIONOPS`
    waits.


    ### Lowering PREEMPTIVE_OS_AUTHENTICATIONOPS Waits


    In the example, I have shown you how `PREEMPTIVE_OS_AUTHENTICATIONOPS` waits occur
    naturally whenever you connect to a SQL Server instance. Now imagine a situation
    where your SQL Server instance is part of a domain environment and it uses Windows
    authentication to authenticate domain users (or groups) against an Active Directory.
    In that case your authentication request has to travel across the network in order
    to perform the authentication of the account. There are many factors involved
    that can impact the speed of the authentication request; for instance, if your
    Domain Controller is under a lot of stress, it can take longer to perform the
    authentication, or if your network experiences performance degradation, it will
    also impact the authentication request. These factors also contribute to the `PREEMPTIVE_OS_AUTHENTICATIONOPS`
    wait type and can result in higher wait times.


    I would like to describe to you a case I encountered at a client that involved
    the `PREEMPTIVE_OS_AUTHENTICATIONOPS` wait type to give you an idea of how you
    can lower `PREEMPTIVE_OS_AUTHENTICATIONOPS` wait times.


    At this client they used an application that connected to SQL Server using the
    Windows account that was logged in on the computer that ran the application. The
    computers and the SQL Server were all part of a domain. From a security perspective,
    the application was well designed, as it did not require separate SQL Server users
    who needed permission on the database and also didn’t use a generic account to
    connect to the SQL Server instance and execute queries. Inside, the database-specific
    objects (like tables) were also secured based on domain users and groups.


    The client started to experience server performance problems inside the application
    after deploying it to every (3000+) computer inside the company. The DBA at the
    client couldn’t find any problems, there were no infrastructure-related performance
    problems on the SQL Server instance, and executing the queries on the SQL Server
    instance itself revealed no issues. When we looked at the wait statistics, we
    noticed that the most prevalent wait type was the `PREEMPTIVE_OS_AUTHENTICATIONOPS`
    wait type. We also noticed that the application would connect to the SQL Server
    instance, run a query, then disconnect again. Because so many concurrent users
    were using the application, it resulted in a high amount of Windows authentication
    requests, so many that the Domain Controller couldn’t handle them, resulting in
    the slower processing of authentication requests.


    In this case the Domain Controller was a virtual machine, and after adding more
    processor and memory resources, it was able to keep up with the high amount of
    authentication requests.


    As you can see from this case, seeing high `PREEMPTIVE_OS_AUTHENTICATIONOPS` wait
    times does not necessarily mean your SQL Server instance is running into problems,
    especially in a domain environment, as the performance of your Domain Controller
    also plays a large role in `PREEMPTIVE_OS_AUTHENTICATIONOPS` wait times.


    The moral of the story is, if you notice higher-than-normal `PREEMPTIVE_OS_AUTHENTICATIONOPS`
    wait times, you will need to investigate much more than the SQL Server instance.
    Make sure to check the performance of your Domain Controllers if you are using
    Windows authentication inside a domain. Check every infrastructure part between
    your SQL Server instance and the Domain Controller, like network switches, firewalls,
    and so on. All of these infrastructure parts will add additional latency for each
    authentication request, which will result in higher `PREEMPTIVE_OS_AUTHENTICATIONOPS`
    wait times, making it a difficult wait type to troubleshoot.


    ### PREEMPTIVE_OS_AUTHENTICATIONOPS Summary


    The `PREEMPTIVE_OS_AUTHENTICATIONOPS` wait type is related to performing authentication
    requests by the Windows operating system. It is normal to see `PREEMPTIVE_OS_AUTHENTICATIONOPS`
    waits occur, especially when your SQL Server instance is part of a domain and
    uses Windows authentication to authenticate users. Higher-than-normal wait times
    can indicate that authentication requests are taking longer than normal to complete.
    This does not necessarily mean that your SQL Server instance is running into a
    performance problem. If the Domain Controller cannot process the authentication
    requests fast enough, it will result in higher `PREEMPTIVE_OS_AUTHENTICATIONOPS`
    wait times. A slow network connection to the Domain Controller, firewall, or switch
    configurations can also impact `PREEMPTIVE_OS_AUTHENTICATIONOPS` wait times.'
