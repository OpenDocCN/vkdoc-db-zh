    option in the Features View, as shown in Figure [11-4](#340881_2_En_11_Chapter.xhtml#Fig4).


    ![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig4_HTML.jpg](images/340881_2_En_11_Chapter/340881_2_En_11_Fig4_HTML.jpg)


    Figure 11-4


    Features View inside the IIS Manager


    This will open a new Server Certificates view inside the IIS Manager. Inside the
    Action Pane, I click the Create Self-Signed Certificate option. I am then asked
    to supply a name for my certificate, so I filled in the name of my test virtual
    machine as you can see in Figure [11-5](#340881_2_En_11_Chapter.xhtml#Fig5).


    ![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig5_HTML.jpg](images/340881_2_En_11_Chapter/340881_2_En_11_Fig5_HTML.jpg)


    Figure 11-5


    Create self-signed certificate


    I click OK, and the self-signed certificate will be created and automatically
    placed inside the correct certificate store on my machine (Local Machine ➤ Personal
