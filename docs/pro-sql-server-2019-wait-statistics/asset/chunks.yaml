  trans: '

    # LCK_M_I[xx] 示例


    在本例中，我们将生成一个 `LCK_M_IX` 等待类型。这意味着一个事务正在等待获取锁层次结构中更高级别的意向排他锁。


    我们将使用与 `LCK_M_X` 等待类型几乎相同的示例，通过运行一个使用 `REPEATABLE READ` 隔离级别的 `SELECT` 语句且不完成事务来实现。下面的查询是我将针对
    `AdventureWorks` 数据库的 `Person.Address` 表运行的查询：


    ```sql

    SET TRANSACTION ISOLATION LEVEL REPEATABLE READ

    BEGIN TRAN

    SELECT * FROM Person.Address;

    --COMMIT

    ```


    `COMMIT` 命令已被注释掉，以使事务保持打开状态。


    如果我们查看图 8-20 所示的 `sys.dm_tran_locks` DMV，我们会看到在查询运行时，当前只有一个活动的锁，即在 `OBJECT` 资源类型上的共享锁。这表明整个表已被锁定。由于此锁存在于如此高的级别，因此无需在层次结构的更低级别设置其他共享锁。


    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig20_HTML.jpg](img/340881_2_En_8_Fig20_HTML.jpg)


    图 8-20：表上的共享锁


    如果另一个事务想要更新同一表中的一行，它将首先尝试获取表和页级别的意向排他锁，然后才能获取行级别的排他锁。下面的查询就是这样一个事务，在本例中，我们将尝试更新单行：


    ```sql

    UPDATE Person.Address

    SET AddressLine1 = ''1227 Shoe St.''

    WHERE AddressID = 5;

    ```


    您会注意到，只要 `SELECT` 查询仍然持有其表上的共享锁，前面的查询就会“挂起”。尽管意向锁在大多数情况下与同一对象上的其他意向锁兼容，但在本例中，在表级别持有共享锁的同时尝试在更低的层次执行数据修改，将导致阻塞发生。共享锁和意向排他锁是不兼容的。


    如果我们查看 `sys.dm_os_waiting_tasks` DMV，我们应该能够看到设置意向排他锁的任务正在等待，如图 8-21 所示。


    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig21_HTML.jpg](img/340881_2_En_8_Fig21_HTML.jpg)


    图 8-21：正在发生的 LCK_M_IX 等待


    ## 降低 LCK_M_I[xx] 等待


    与我们之前讨论的其他与锁相关的等待类型一样，在尝试降低 `LCK_M_I[xx]` 等待时间时，应专注于导致阻塞的查询。因为 `LCK_M_I[xx]` 等待仅当锁层次结构中更高级别的对象上持有不兼容的锁时才会发生，所以花时间调查为什么这些锁被放置在层次结构的如此高位置是值得的。锁升级可能导致这种情况发生。当
    SQL Server 在锁层次结构的更高级别放置单个锁比在更低级别锁定多个对象更高效时，就会发生锁升级。例如，SQL Server 可以决定在表级别放置一个共享锁，而不是在行上放置数千个共享锁。这比维护数千个单个锁所需资源少得多。事实上，这正是我在向您展示的
    `LCK_M_IX` 等待类型示例中发生的情况。我们使用 `SELECT` 查询的 `Person.Address` 表包含超过 19,000 行。当我们对表运行
    `SELECT *` 查询时，这意味着至少需要 19,000 个行锁。由于放置和维护如此多的锁将消耗大量资源，SQL Server 决定在表上放置一个共享锁，而不是在行上放置
    19,000 个锁。


    如果我们能重写查询以减少所需的锁，例如，只选择前 *x* 行而不是所有内容，SQL Server 可能会选择再次锁定行，而不是整个表。


    ## LCK_M_I[xx] 总结


    `LCK_M_I[xx]` 等待类型与意向锁相关，或者更确切地说，与另一个不兼容的锁阻止设置意向锁的情况相关。意向锁被放置在更高级别的对象上，以表示在锁层次结构的更低级别上已放置了锁。与我们之前讨论的仅表示一种锁类型的锁模式不同，意向锁可以表示锁层次结构中更低级别的不同锁模式。`LCK_M_I[xx]`
    等待类型高等待时间的一个常见原因是 SQL Server 将较低级别的锁升级为更高级别的锁。在这种情况下，意向锁将被阻止且无法获取。


    # LCK_M_SCH_S 和 LCK_M_SCH_M


    本章我想讨论的最后两个与锁相关的等待类型是 `LCK_M_SCH_S` 和 `LCK_M_SCH_M` 等待类型。这两种等待类型都与表上的锁相关，即所谓的架构锁。我们在本章前面没有过多关注架构锁，但由于它们在发生时可能对等待时间产生相当大的影响，因此我想在此介绍它们。


    ## 什么是 LCK_M_SCH_S 和 LCK_M_SCH_M 等待类型？


    `LCK_M_SCH_S` 和 `LCK_M_SCH_M` 等待类型都与架构锁相关。架构锁被放置在表级别，以在查询访问表时保护表不被修改，或者在表被修改时阻止查询访问表。架构锁有两种不同的类型：架构稳定性锁
    (Sch-S) 和架构修改锁 (Sch-M)。当任务被阻止获取架构稳定性锁或架构修改锁时，它们各自关联有不同的等待类型。当架构稳定性锁在获取前必须等待时，会记录
    `LCK_M_SCH_S` 等待类型（表示对表的读取访问）；当架构修改锁在等待获取时，会记录 `LCK_M_SCH_M` 等待类型（表示表架构将被更改）。


    两种架构锁与其他锁类型的兼容性都相当极端。架构稳定性锁与除架构修改锁以外的所有其他类型的锁都兼容。另一方面，架构修改锁与所有其他锁类型（包括意向锁）都不兼容。


    使用架构稳定性锁时，在查询当前正在读取或写入表的过程中，无法以任何方式修改或更改表。由于架构稳定性锁与所有锁模式（架构修改锁除外）兼容，因此在表级别看到架构稳定性锁与例如指示表内较低级别正在发生数据修改的意向排他锁共存是完全正常的。


    架构修改锁与架构稳定性锁相反，它们在执行对表的修改时阻止任何查询访问该表。'
- fmt: '### LCK_M_SCH_S and LCK_M_SCH_M Example


    For the first example, I am going to add a new column to an existing table, and
    just as we did in the examples earlier in this chapter, I am going to keep the
    transaction open by not supplying a `COMMIT` or `ROLLBACK` command. The query
    that follows adds an extra column to the `Person.Address` table in the `AdventureWorks`
    database, but I left the `ROLLBACK` command commented so the locks stay in place:


    ```sql

    BEGIN TRAN

    ALTER TABLE Person.Address

    ADD

    Test VARCHAR(10);

    --ROLLBACK

    ```


    In a new window in SQL Server Management Studio, I am going to execute a simple
    `SELECT` query against the `Person.Address` table, like the one here:


    ```sql

    SELECT *

    FROM Person.Address;

    ```


    If we take a look at the `sys.dm_tran_locks` DMV while both queries are running,
    we should be able to see if there is any blocking going on. Figure 8-22 shows
    a part of the output of a `SELECT *` query against the `sys.dm_tran_locks` DMV.


    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig22_HTML.jpg](images/340881_2_En_8_Chapter/340881_2_En_8_Fig22_HTML.jpg)


    Figure 8-22 Sch-M and Sch-S locks


    As you can see from Figure 8-22, the first query we started, with the goal of
    adding a column to the `Person.Address` table, resulted in a Sch-M lock on the
    table. The second `SELECT` query is waiting to receive a Sch-S lock on the same
    table.


    If we query the `sys.dm_os_waiting_tasks` DMV, we should see a task that is waiting
    on the `LCK_M_SCH_S` wait type. Figure 8-23 shows the output of `sys.dm_os_waiting_tasks`
    while both queries are running.


    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig23_HTML.jpg](images/340881_2_En_8_Chapter/340881_2_En_8_Fig23_HTML.jpg)


    Figure 8-23 LCK_M_SCH_S wait occurring


    Just as we expected, the `SELECT` query is waiting to acquire its Schema Stability
    lock.


    If we were to reverse the example by starting a read transaction and leaving it
    open, and then try to modify the same table, we should run into a `LCK_M_SCH_M`
    wait, since we can only acquire a Schema Modification lock when there are no active
    transactions inside the table we want to modify.


    To show this situation I executed the query that follows. This starts a `SELECT`
    query with the Repeatable Read Isolation level, but I am leaving the transaction
    open so the locks stay in place:


    ```sql

    SET TRANSACTION ISOLATION LEVEL REPEATABLE READ

    BEGIN TRANSACTION

    SELECT * FROM

    Person.Address;

    -- COMMIT

    ```


    In a new window inside SQL Server Management Studio, I am going to execute the
    table modification query we used earlier to demonstrate the `LCK_M_SCH_S` wait
    type, but without leaving the transaction open:


    ```sql

    ALTER TABLE Person.Address

    ADD

    Test VARCHAR(10);

    ```


    As you will probably notice when executing the second query, nothing is returned
    and the query keeps running, a clear indication of a block occurring.


    Let’s take a look at the `sys.dm_tran_locks` DMV again to see what we can find
    out. Figure 8-24 shows the output on my test SQL Server.


    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig24_HTML.jpg](images/340881_2_En_8_Chapter/340881_2_En_8_Fig24_HTML.jpg)


    Figure 8-24 Sch-M lock waiting to be acquired


    In this case the table has a Shared lock on it from the `SELECT` query. Because
    we are selecting information from a pretty large table, SQL Server decided to
    place a table lock instead of placing locks on a lower level. Because a Schema
    Modification lock is incompatible with every other lock type, a block occurs,
    and we will have to wait until the Shared lock is gone before we can perform our
    table modification.


    Looking at the `sys.dm_os_waiting_tasks` DMV shows us the results we are expecting,
    a `LCK_M_SCH_M` wait, as shown in Figure 8-25.


    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig25_HTML.jpg](images/340881_2_En_8_Chapter/340881_2_En_8_Fig25_HTML.jpg)


    Figure 8-25 LCK_M_SCH_M wait occurring


    ### Lowering LCK_M_SCH_S and LCK_M_SCH_M Waits


    When you see waits occurring of either the `LCK_M_SCH_S` or `LCK_M_SCH_M` wait
    type, there is probably a transaction active that wants to modify the table. In
    the case of high wait times on the `LCK_M_SCH_S` wait type, the table modification
    transaction is already running; when seeing `LCK_M_SCH_M` waits, the modification
    is waiting for all active transactions to remove their locks on the table.


    Modifying a table is not something that happens every day on production SQL Server
    instances (hopefully). Changing large tables can especially be problematic and
    a cause for high `LCK_M_SCH_S` wait times, and users that are trying to query
    the table that is being modified will notice delays. If, however, you absolutely
    need to modify a table, but there are some long-running queries retrieving information
    from that table, you can expect `LCK_M_SCH_M` waits.


    Lowering the wait times of both wait types is directly related to performing modifications
    to tables. A suggestion could be to perform the table modification after office
    hours, or when there are as few as possible concurrent transactions accessing
    the table, instead of doing the modification when there are many transactions
    active against the table.


    ### LCK_M_SCH_S and LCK_M_SCH_M Summary


    The `LCK_M_SCH_S` and `LCK_M_SCH_M` wait types are the result of Schema Stability
    or Schema Modification locks being blocked by other locks. Seeing high wait times
    of either wait type indicates that either a table modification is waiting for
    all active locks on that table to be removed, or a table modification is currently
    running and other transactions are being blocked by it.


    # 9. Latch-Related Wait Types


    In Chapter 8, “Lock-Related Wait Types,” we took a pretty deep look at locking
    and blocking inside SQL Server, together with different wait types that indicate
    blocking is occurring. Latches look a lot like the locks we discussed earlier;
    in some cases they even appear to use the same modes as the locks we discussed
    in Chapter 8. Make no mistake though, latches are completely different than locks,
    even though they seem to share some features. While locks are used to guarantee
    transactions are isolated and consistent, latches are used to guarantee the consistency
    of in-memory objects.


    Latches are, just like locking and blocking, a pretty complex subject inside SQL
    Server. Latches even have their own latch-statistics DMV that records how much
    time has been spent waiting on specific latch types.


    Because of the complexity of latches and their function inside SQL Server, I believe
    they require an introduction to better understand how you can troubleshoot latch-related
    wait types later in this chapter. For this reason, we will start this chapter
    with an introduction to latches, just as we did with the introduction to locking
    inside Chapter 8, “Lock-Related Wait Types.”'
