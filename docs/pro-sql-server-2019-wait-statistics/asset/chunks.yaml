- fmt: '### Lowering CXPACKET Wait Time by Tuning the Parallelism Configuration


    There are various methods you can use to lower `CXPACKET` wait times, but before
    you go and use them you have to be sure that `CXPACKET` waits are actually causing
    you problems. Like I said earlier, `CXPACKET` waits are completely normal whenever
    you have parallelism enabled for your SQL Server instance. One solution I read
    frequently on Internet forums is to disable parallelism by setting the `Max Degree
    of Parallelism` option to a value of 1. In most cases this is not a good idea.
    Disabling parallelism will make the `CXPACKET` waits go away completely, but some
    of your queries might be performing a lot worse since they cannot be run in parallel
    anymore.


    A better approach to lowering `CXPACKET` waits is to tune the `Cost Threshold
    for Parallelism` and `Max Degree of Parallelism` options so they match with your
    workload. This way you can make sure only the queries that benefit the most from
    parallelism will be run in parallel. A way to find this parallelism sweet spot
    is by comparing the runtime of a query when it ran serially vs. in parallel. You
    should generally focus on queries that access a lot of information and have a
    longer runtime in general, as those will be the queries that benefit the most
    from parallelism.


    Consider this example where we have a query against the `AdventureWorks` database
    that requests information from the `Sales.SalesOrderDetail` table:

    ```sql

    SELECT *

    FROM Sales.SalesOrderDetail

    ORDER BY CarrierTrackingNumber DESC;

    ```

    We can check if this query would be a candidate to be run in parallel by checking
    the estimated cost of the query. To view this information we need to take a look
    at the estimated execution plan for if the query were to be run serially. To make
    sure the query runs serially we must add the query option `MAXDOP 1`. We are also
    interested in the runtime of the query, so we add the `SET STATISTICS TIME ON`
    option to the query:

    ```sql

    SET STATISTICS TIME ON

    SELECT *

    FROM Sales.SalesOrderDetail

    ORDER BY CarrierTrackingNumber DESC

    OPTION (MAXDOP 1);

    SET STATISTICS TIME OFF

    ```

    Figure 5-4 shows the estimated cost of the query when run serially.


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig4_HTML.jpg](images/340881_2_En_5_Chapter/340881_2_En_5_Fig4_HTML.jpg)


    *Figure 5-4 Estimated cost of the query with MAXDOP 1*


    In this case the estimated cost is 10.4907 on my test SQL Server. When I executed
    the query, the execution time was 2256 milliseconds on my system.


    Because the `Cost Threshold for Parallelism` is still configured on the default
    value of 5 on my test server, I am pretty sure the query would be run in parallel
    if I were to remove the `MAXDOP` query hint.


    Figure 5-5 shows the actual execution plan after running the query without the
    `MAXDOP 1` option.


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig5_HTML.jpg](images/340881_2_En_5_Chapter/340881_2_En_5_Fig5_HTML.jpg)


    *Figure 5-5 Actual execution plan without MAXDOP 1 option*


    As you can see, the query ran using parallelism, just as we expected, since the
    estimated cost was higher than the value configured in the `Cost Threshold for
    Parallelism` option. The execution time of the query with parallelism was 1959
    milliseconds. If we take a look at the properties of the `SELECT` operation in
    the actual execution plan, we can view some additional information, as shown in
    Figure 5-6.


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig6_HTML.jpg](images/340881_2_En_5_Chapter/340881_2_En_5_Fig6_HTML.jpg)


    *Figure 5-6 SELECT operation properties*


    The properties of the `SELECT` operation show us that the query was executed using
    two threads. The estimated cost went down to 7.08005.


    Even though the estimated cost went down, the improvement in execution time is
    pretty small for this query. We could change the `Cost Threshold for Parallelism`
    value to a higher number than the default of 5. This way we are making sure relatively
    small queries like the one in this example don’t use parallelism but that heavy
    reporting queries do.


    Another setting to keep in mind is the `Max Degree of Parallelism` option. When
    it is set at its default of 0 all available schedulers can be used when a query
    runs in parallel. Using more schedulers doesn’t necessarily mean the query executes
    faster though. The benefits of using more schedulers slowly get smaller after
    using more than 8. Microsoft recommends the following configuration in KB2806535:

    *   For servers with more than eight cores, set the `Max Degree of Parallelism`
    option to 8.

    *   For servers with less than eight cores, set the `Max Degree of Parallelism`
    option to 0 or to the number of cores in your server.


    This is a general recommendation, and your mileage may vary. The setting of both
    the `Cost Threshold for Parallelism` and `Max Degree of Parallelism` options highly
    depends on the workload of your system and requires careful testing to find out
    what works for you and what doesn’t. They will impact your `CXPACKET` wait time
    though, so compare your `CXPACKET` wait times against a baseline after changing
    the `Cost Threshold for Parallelism` or `Max Degree of Parallelism` options to
    measure the impact of the change.


    ### Lowering CXPACKET Wait Time by Resolving Skewed Workloads


    A skewed workload means that all of the worker threads do not receive the same
    amount of work to perform. This is not an optimal situation, because if one worker
    thread has to do most of the work while another only a little bit, Thread 0 still
    has to wait for the longest-running worker thread to complete, logging `CXPACKET`
    waits as the time it is waiting. Figure 5-7 shows an abstract example of a skewed
    workload.


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig7_HTML.jpg](images/340881_2_En_5_Chapter/340881_2_En_5_Fig7_HTML.jpg)


    *Figure 5-7 Skewed parallel query threading*


    If we could give some of Thread 2’s work to Thread 3, the query would probably
    perform faster, resulting in lower `CXPACKET` wait times.


    We can view the thread distribution in the `actual number of rows` property of
    the parallel operation in the actual execution plan. Figure 5-8 shows the properties
    of a clustered index scan that has been performed using parallelism. The operation
    occurred in the example query we used in the previous section against the `Sales.SalesOrderDetail`
    table.


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig8_HTML.jpg](images/340881_2_En_5_Chapter/340881_2_En_5_Fig8_HTML.jpg)


    *Figure 5-8 Parallel thread distribution*


    In this example we see that the clustered index scan returned 121.317 rows that
    were distributed among two threads (notice that Thread 0, the coordination thread,
    doesn’t process any rows). The distribution of the number of rows is relatively
    even in this case, so we probably aren’t running into a skewed workload problem.


    Skewed workloads are often caused by outdated statistics. If the Query Optimizer
    believes there are fewer (or more rows) in the table than there actually are,
    it can distribute the work unevenly across the threads. Make sure to regularly
    perform maintenance on your statistics to prevent skewed workloads.'
