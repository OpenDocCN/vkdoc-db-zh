    ## Start Extended Event session


    After we have started the Extended Events session it will begin collecting information.
    We can view this information as it gets gathered by selecting the Watch Live Data
    option. This will open up a new tab in SQL Server Management Studio where we can
    watch the Extended Event session. Viewing live Extended Event data takes a little
    overhead, but this is far lower than the overhead of using SQL Profiler. If you
    are worried about the overhead of viewing live data, you could choose to write
    the Extended Event session to an event file by adding a file location inside the
    Data Storage page of your Extended Event session.


    For this example I executed a simple query against the AdventureWorks database
    to return everything in the `Person.Person` table, as follows:


    ```sql

    SELECT *

    FROM Person.Person;

    ```


    I pay close attention when setting the filter in the Extended Event session to
    match the session ID of the tab in SQL Server Management Studio where I am executing
    the query. The session ID can be found when looking at the number between parentheses
    on the tab. The Extended Events Live Data tab returned the information shown in
    Figure [2-24](#340881_2_En_2_Chapter.xhtml#Fig24).


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig24_HTML.jpg](images/340881_2_En_2_Chapter/340881_2_En_2_Fig24_HTML.jpg)


    Figure 2-24


    Live wait statistics information from an Extended Event session


    As you can see in Figure [2-24](#340881_2_En_2_Chapter.xhtml#Fig24), our request
    encountered a `NETWORK_IO` wait type. This is one of those examples where the
    wait name in Extended Events doesn’t match the one in the wait statistics DMVs.
    The `NETWORK_IO` wait name is the same wait as the `ASYNC_NETWORK_IO` wait type
    the SQLOS uses. We can view the query we executed in the `sql_text` field.


    There are many more global fields you can include in the Extended Events session
    that might be interesting to capture, like the Execution Plan handle or the Task
    Execution Time. All of these global fields will give you additional information
    that is shown when Extended Event session information is returned, giving you
    an impressive amount of detail.


    If, for some reason, you do not want to use the GUI to create and run an Extended
    Event session or you are running SQL Server 2008, you can use T-SQL to create
    and configure one. To create the same Extended Event session as we did using the
    GUI, you can execute the query seen in Listing [2-3](#340881_2_En_2_Chapter.xhtml#PC10).


    ```sql

    CREATE EVENT SESSION [WaitStats Query] ON SERVER

    ADD EVENT sqlos.wait_info

    (

    ACTION(sqlserver.sql_text)

    WHERE ([sqlserver].[session_id]=(52))

    )

    ADD TARGET package0.event_file

    (

    SET filename = N''E:\Data\WaitStats_XE.xel'', metadatafile = N''E:\Data\WaitStats_XE.xem''

    );

    ```

    Listing 2-3

    Create wait statistics Extended Event session


    We included the metadata file in the preceding script by setting the `metadatafile`
    parameter. If you are running SQL Server 2012 or higher, this is no longer required.


    The easiest way to log the Extended Event session is by saving it to a file; in
    this case my filename is `E:\Data\WaitStats_XE.xel` (SQL Server will add a unique
    numeric identifier to the filename, in this case the actual filename is `WaitStats_XE_0_130702270937280000.xel`).
    I also included the filter on session ID 52 to capture wait statistics generated
    by that session.


    The next thing we want to do is start the Extended Event session, which we can
    do by executing the `ALTER EVENT SESSION` command :


    ```sql

    ALTER EVENT SESSION "WaitStats Query" ON SERVER STATE = start;

    ```


    We then execute the same query as we did in the Extended Events GUI example under
    the session ID we are filtering on. After letting the Extended Event session run
    for a little while, we can stop it using the `ALTER EVENT SESSION` command:


    ```sql

    ALTER EVENT SESSION "WaitStats Query" ON SERVER STATE = stop;

    ```


    Now that we have stopped the Extended Event session, we need to import the information
    in the file (as XML) into a table so we can actually see what the session captured;
    we do this using the `sys.fn_xe_file_target_read_file` function. We can then parse
    the XML information to return the results in a more readable format. The query
    in Listing [2-4](#340881_2_En_2_Chapter.xhtml#PC13) can be used to read an Extended
    Events file, import it into a temporary table, and return the results as rows.


    ```sql

    -- Check if temp table is present

    -- Drop if exist

    IF OBJECT_ID(''tempdb..#XE_Data'') IS NOT NULL

    DROP TABLE #XE_Data

    -- Create temp table to hold raw XE data

    CREATE TABLE #XE_Data

    (

    XE_Data XML

    );

    GO

    -- Write contents of the XE file

    -- into our table

    INSERT INTO #XE_Data

    (

    XE_Data

    )

    SELECT

    CAST (event_data AS XML)

    FROM sys.fn_xe_file_target_read_file

    (

    ''E:\Data\WaitStats_XE_0_130702270937280000.xel'',

    ''E:\Data\WaitStats_XE_0_130702270940210000.xem'',

    null,

    null

    );

    GO

    -- Query information from our temp table

    SELECT

    XE_Data.value (''(/event/@timestamp)[1]'', ''DATETIME'') AS ''Date/Time'',

    XE_Data.value (''(/event/data[@name="opcode"]/text)[1]'', ''VARCHAR(100)'') AS
    ''Operation'',

    XE_Data.value (''(/event/data[@name="wait_type"]/text)[1]'', ''VARCHAR(100)'')
    AS ''Wait Type'',

    XE_Data.value (''(/event/data[@name="duration"]/value)[1]'', ''BIGINT'') AS ''Wait
    Time'',

    XE_Data.value (''(/event/data[@name="signal_duration"]/value)[1]'', ''BIGINT'')
    AS ''Signal Wait Time'',

    XE_Data.value (''(/event/action[@name="sql_text"]/value)[1]'', ''VARCHAR(100)'')
    AS ''Query''

    FROM #XE_Data

    ORDER BY ''Date/Time'' ASC

    ;

    ```

    Listing 2-4

    Return Extend Event file as rows


    The result of the query in Listing [2-4](#340881_2_En_2_Chapter.xhtml#PC13) can
    be seen in Figure [2-25](#340881_2_En_2_Chapter.xhtml#Fig25).


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig25_HTML.jpg](images/340881_2_En_2_Chapter/340881_2_En_2_Fig25_HTML.jpg)


    Figure 2-25


    Results of the query in Listing [2-4](#340881_2_En_2_Chapter.xhtml#PC13)


    Most of the columns speak for themselves in terms of the row data they return.
    Two columns that deserve some extra explanation are the `Operation` and `Wait
    Time` columns. The `Operation` column will show you the beginning or the end of
    the wait event. The `Wait Time` column will return the wait time in milliseconds,
    but it will only be recorded at the end of an operation.'
