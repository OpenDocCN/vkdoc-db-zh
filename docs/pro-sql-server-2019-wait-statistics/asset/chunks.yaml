    图 1-6 显示了此查询结果的一小部分。


    ![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig6_HTML.jpg](img/340881_2_En_1_Fig6_HTML.jpg)


    图 1-6

    `sys.dm_exec_sessions` 结果


