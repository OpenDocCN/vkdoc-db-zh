  trans: '## 等待统计


    到目前为止，我们已经深入了解了为 SQL Server 执行调度的不同组件以及它们是如何相互连接的，但我们并未过多关注本书的主题：等待统计。


    在本章前面关于工作线程的部分，我描述了工作线程在调度器上执行工作时可能处于的状态。当一个工作线程执行其工作时，它会在调度器进程中经历三个不同的阶段（或队列）。根据工作线程所处的阶段（或队列），它将分别获得“运行中”、“可运行”或“已暂停”状态。图
    1-13 展示了一个具有这三个不同阶段的调度器的抽象视图。


    ![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig13_HTML.jpg](img/340881_2_En_1_Fig13_HTML.jpg)


    图 1-13：调度器及其阶段和队列


    当一个工作线程获得访问调度器的权限时，它通常会在等待列表中启动，并获得“已暂停”状态。`等待列表`是一个无序列表，包含所有处于“已暂停”状态并等待资源变得可用的工作线程。这些资源可以是系统中几乎任何东西，从数据页到锁请求。当一个工作线程位于`等待列表`中时，SQLOS
    会记录它继续工作所需的资源类型（等待类型）以及该特定资源变得可用之前所花费的等待时间，即`资源等待时间`。


    每当一个工作线程获得其所需资源的访问权限时，它将移动到`可运行队列`，这是一个先进先出的列表，包含所有已获得资源访问权限并准备好在处理器上运行的工作线程。工作线程在`可运行队列`中花费的时间被记录为`信号等待时间`。


    `可运行队列`中的第一个工作线程将移动到“运行中”阶段，在那里它将获得处理器时间来执行其工作。它在处理器上花费的时间被记录为 `CPU 时间`。与此同时，`可运行队列`中的其他工作线程将在列表中向上移动一个位置，而已获得其请求资源的工作线程将从`等待列表`移动到`可运行队列`中。


    当一个工作线程处于“运行中”阶段时，可能发生以下三种情况：


    *   工作线程需要额外的资源；在这种情况下，它将从“运行中”阶段移动到`等待列表`。

    *   工作线程用完了其时间量（固定值为 4 毫秒）并且必须让出处理器；该工作线程被移动到`可运行队列`的底部。

    *   工作线程完成其工作并将离开调度器。


    工作线程不断地在这三个不同阶段中移动，并且一个工作线程在其工作完成之前多次经历这些阶段是非常常见的。


    图 1-14 将向你展示图 1-13 中的调度器视图，结合了不同类型的等待时间以及工作线程的流动。


    ![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig14_HTML.jpg](img/340881_2_En_1_Fig14_HTML.jpg)


    图 1-14：包含等待时间和工作线程流动的完整调度器视图


    了解请求在三个不同阶段中各自花费的所有不同时长，就可以计算出总的请求执行时间，以及请求为等待处理器时间或资源时间所花费的总时间。图 1-15 展示了总执行时间及其不同部分的计算方式。


    ![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig15_HTML.jpg](img/340881_2_En_1_Fig15_HTML.jpg)


    图 1-15：请求执行时间计算


    由于 SQL Server 中工作线程调度涉及大量术语，我想给你举一个例子来说明工作线程是如何在调度器中移动的。


    图 1-16 将向你展示一个类似于我们之前看过的调度器的抽象图像，但这次我添加了正在由该调度器处理的请求。


    ![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig16_HTML.jpg](img/340881_2_En_1_Fig16_HTML.jpg)


    图 1-16：带有运行请求的调度器


    在这个例子中，我们看到 `SID`（会话 ID）为 76 的请求当前正在处理器上执行；该请求的状态将是“运行中”。还有另外两个请求，`SID 83` 和 `SID
    51`，位于`等待列表`中，等待它们请求的资源。它们正在等待的等待类型是 `LCK_M_S` 和 `CXPACKET`。这里我不详细介绍这些等待类型，因为我们将在本书的第二部分讨论它们。当这两个会话位于`等待列表`中时，SQL
    Server 会将它们在那里花费的时间记录为等待时间，并将等待类型记录为它们正在等待的资源的代表。如果我们查询关于这两个线程的信息，它们都将具有“已暂停”状态。`SID
    59`、`SID 98` 和 `SID 74` 已准备好它们的资源，正在`可运行队列`中等待 `SID 76` 完成其在处理器上的工作。当它们在`可运行队列`中等待时，SQL
    Server 将它们在那里花费的时间记录为信号等待时间，并将该时间添加到总等待时间中。这三个工作线程的状态将是“可运行”。


    在图 1-17 中，我们向前移动了几毫秒的时间；请注意调度器和工作线程是如何在不同阶段和队列中移动的。


    ![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig17_HTML.jpg](img/340881_2_En_1_Fig17_HTML.jpg)


    图 1-17：几毫秒后的调度器


    `SID 76` 完成了它在处理器上的时间；它不需要任何额外的资源来完成其请求，因此离开了调度器。`SID 59` 是`可运行队列`中的第一个工作线程，现在处理器空闲了，它将从`可运行队列`移动到处理器，其状态将从“可运行”变为“运行中”。`SID
    51` 已完成对 `CXPACKET` 等待类型的等待，并从`等待列表`移动到`可运行队列`的底部，其状态从“已暂停”变为“可运行”。


    ## 总结


    在本章中，我们回顾了 SQL Server 各个版本中等待统计的历史。尽管使用等待统计分析 SQL Server 性能的方法相对较新，但等待统计作为 SQL
    Server 引擎的一部分已经存在很长时间了。


    随着 SQL Server 2005 中 SQLOS 的引入，SQL Server 处理请求的方式发生了很大变化，引入了调度器、工作线程和任务。所有这些不同部分的信息都存储在动态管理视图（`DMVs`）或动态管理函数（`DMFs`）中，这些视图和函数易于查询，并能返回大量关于
    SQL Server 内部的信息。


    使用这些 `DMVs`，我们可以查看请求在 SQL Server 调度器处理时的进度，并了解它们是否正在等待任何特定资源。请求所等待的资源以及它们为等待这些资源所花费的时间被记录为等待统计，这是本书的主要主题。'
- fmt: "# 2. Querying SQL Server Wait Statistics\n\nWith the introduction of Dynamic\
    \ Management Views (DMVs) in SQL Server 2005, viewing and analyzing wait statistics\
    \ has become a lot easier and less tedious. In SQL Server versions prior to SQL\
    \ Server 2005, we were limited to the `DBCC SQLPERF('WAITSSTATS')` command to\
    \ view wait statistics. Presently there are a variety of DMVs that return wait\
    \ statistics–related information, and in this chapter, we will take a detailed\
    \ look at four of the most useful DMVs: `sys.dm_os_wait_stats`, `sys.dm_os_waiting_tasks`,\
    \ `sys.dm_exec_requests`, and `sys.dm_exec_session_wait_stats`.\n\nViewing wait\
    \ statistics information is not only limited to DMVs though. We can also use the\
    \ Windows Performance Monitor, or Perfmon, to view wait statistics information.\
    \ SQL Server 2008 introduced yet another option to view wait statistics, Extended\
    \ Events. While Extended Events were pretty complicated to work with in SQL Server\
    \ 2008, meaning you would have to write an entire Extended Event session in T-SQL,\
    \ Microsoft has drastically improved Extended Events in SQL Server 2012, making\
    \ them a lot more user-friendly and easier to use.\n\nSQL Server 2016 SP1 introduced\
    \ two new methods to access wait statistics: through a new DMV called `sys.dm_exec_session_wait_stats`\
    \ and by adding wait statistics information on a per-query basis inside execution\
    \ plans.\n\nIn SQL Server 2017 Microsoft took recording wait statistics another\
    \ step forward by including them inside the Query Store. The Query Store is a\
    \ feature that was introduced in SQL Server 2016 and acts like a flightrecorder\
    \ for your query workload, logging query statement, performance, and resource\
    \ utilization.\n\nWe will take a look at all of the sources that capture wait\
    \ statistics that are mentioned in the previous paragraphs inside this chapter,\
    \ starting with the various DMVs. Because the Query Store feature has such a big\
    \ impact on how you can troubleshoot and analyze query performance, including\
    \ wait statistics in SQL Server 2017 and higher, we are going to take a thorough\
    \ look at it in Chapter 3, “The Query Store.”\n\n## Sys.dm_os_wait_stats\n\nThe\
    \ `sys.dm_os_wait_stats` DMV is probably one of the most important DMVs regarding\
    \ wait statistics. This DMV is the replacement for the `DBCC SQLPERF('WAITSTATS')`\
    \ command you would have had to use before SQL Server 2005. All of the information\
    \ the `DBCC SQLPERF('WAITSTATS')` command returned is included in the `sys.dm_os_wait_stats`\
    \ DMV, plus a little bit more.\n\nThe `sys.dm_os_wait_stats` DMV shows the total\
    \ amount of wait time for every wait type since the start (or restart) of your\
    \ SQL Server. It is also cumulative, adding wait time to the different wait types,\
    \ resulting in an ever-increasing total. Querying the `sys.dm_os_wait_stats` DMV\
    \ will give you insight into what your SQL Server has been waiting on the most\
    \ since the time it started or was restarted. This can be helpful if you are looking\
    \ for that grand total of wait time for every wait type, but many times you are\
    \ interested in the wait time for a specific time segment. In this case it is\
    \ possible to reset the `sys.dm_os_wait_stats` DMV without having to restart your\
    \ SQL Server by using the `DBCC SQLPERF('sys.dm_os_wait_stats', CLEAR)` SQL command.\
    \ This will reset all wait statistics information back to 0 again, meaning you\
    \ will lose all information before the reset. In Chapter 4, “Building a Solid\
    \ Baseline,” we will take a look at a method that does not completely reset the\
    \ `sys.dm_os_wait_stats` DMV.\n\nAs with every DMV in SQL Server, we can run a\
    \ query against the `sys.dm_os_wait_stats` DMV just like we would against a table,\
    \ in this case `SELECT * FROM sys.dm_os_wait_stats`. The results of this query\
    \ are shown in Figure 2-1.\n\n![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig1_HTML.jpg](images/340881_2_En_2_Chapter/340881_2_En_2_Fig1_HTML.jpg)\n\
    \nFigure 2-1: Sys.dm_os_wait_stats\n\nFollowing are the available columns in the\
    \ `sys.dm_os_wait_stats` DMV, along with a description of what each column can\
    \ tell you:\n\n*   `wait_type` returns the wait type. The `sys.dm_os_wait_stats`\
    \ will always return one row for every wait type possible in that specific SQL\
    \ Server version.\n*   `waiting_tasks_count` shows a total of how many times a\
    \ worker thread had to wait for that specific wait type.\n*   `wait_time_ms` returns\
    \ the total wait time in milliseconds (1/1000 of a second) for that specific wait\
    \ type since the start of the SQL Server instance or a manual reset of the DMV.\
    \ This is the time a worker thread has spent in the Waiter List in the “SUSPENDED”\
    \ state. It also includes the time the worker thread spent in the Runnable Queue\
    \ in the “RUNNABLE” state while waiting for the scheduler to grant it processor\
    \ time.\n*   `max_wait_time_ms` shows the maximum wait time in milliseconds a\
    \ worker thread waited on that specific wait type.\n*   `signal_wait_time_ms`\
    \ tells us the amount of time in milliseconds the worker thread spent in Runnable\
    \ Queue waiting for processor time. Signal wait times are unavoidable and normal\
    \ in Online Transaction Processing (OLTP) systems where a large number of queries\
    \ are being processed, all of them requesting time on the processor. The signal\
    \ wait time is also an important metric for detecting CPU pressure. Generally\
    \ speaking, as it depends on the hardware of your system, seeing signal wait time\
    \ metrics higher than 25% of the total wait time can indicate CPU pressure, because\
    \ the worker threads are waiting for the processor to become available instead\
    \ of using resources.\n\nYou may have noticed that the `sys.dm_os_wait_stats`\
    \ DMV does not return a column for the resource wait time. If we want to display\
    \ the resource wait time as an additional column, we will need to calculate the\
    \ value ourselves.\n\nListing 2-1 shows a query you could use to analyze the `sys.dm_os_wait_stats`\
    \ DMV. Besides the regular columns, it will add two more columns for every wait\
    \ type returned, the resource wait time and the average wait time.\n\n```sql\n\
    SELECT\n    wait_type AS 'Wait Type',\n    waiting_tasks_count AS 'Waiting Tasks\
    \ Count',\n    (wait_time_ms - signal_wait_time_ms) AS 'Resource Wait Time',\n\
    \    signal_wait_time_ms AS 'Signal Wait Time',\n    wait_time_ms AS 'Total Wait\
    \ Time',\n    COALESCE(wait_time_ms / NULLIF(waiting_tasks_count,0), 0) AS 'Average\
    \ Wait Time'\nFROM sys.dm_os_wait_stats;\n```\n\nListing 2-1: sys.dm_os_wait_stats\
    \ with additional information\n\nThis query will return results as shown in Figure\
    \ 2-2.\n\n![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig2_HTML.jpg](images/340881_2_En_2_Chapter/340881_2_En_2_Fig2_HTML.jpg)\n\
    \nFigure 2-2: sys.dm_os_wait_stats expended with more wait information\n\nHaving\
    \ both the number of occurrences of a specific wait type and the total wait time\
    \ makes it possible to calculate an average wait time (represented by the `Average\
    \ Wait Time` column in Figure 2-2) for that specific wait type by dividing the\
    \ `wait_time_ms` value by the `waiting_tasks_count` value.\n\nThe `sys.dm_os_wait_stats`\
    \ is a powerful DMV with which you can retrieve a lot of information about the\
    \ different wait types. It is also the basis of the wait statistics baseline methodology\
    \ outlined in Chapter 4, “Building a Solid Baseline.”\n\n## Sys.dm_os_waiting_tasks\n\
    \nWhile the `sys.dm_os_wait_stats` DMV gives you the cumulative wait statistics\
    \ information since server restart, the `sys.dm_os_waiting_tasks` DMV can give\
    \ you information about what your SQL Server is currently waiting on. Querying\
    \ this DMV will give you an overview of all the tasks that currently have worker\
    \ threads waiting in the Waiter List or Runnable Queue for either resource or\
    \ processor time."
  raw: '# 2. Querying SQL Server Wait Statistics


    With the introduction of Dynamic Management Views (DMVs) in SQL Server 2005, viewing
    and analyzing wait statistics has become a lot easier and less tedious. In SQL
    Server versions prior to SQL Server 2005, we were limited to the `DBCC SQLPERF(''WAITSSTATS'')`
    command to view wait statistics. Presently there are a variety of DMVs that return
    wait statistics–related information, and in this chapter, we will take a detailed
    look at four of the most useful DMVs: `sys.dm_os_wait_stats`, `sys.dm_os_waiting_tasks`,
    `sys.dm_exec_requests, and sys.dm_exec_session_wait_stats`.


    Viewing wait statistics information is not only limited to DMVs though. We can
    also use the Windows Performance Monitor, or Perfmon, to view wait statistics
    information. SQL Server 2008 introduced yet another option to view wait statistics,
    Extended Events. While Extended Events were pretty complicated to work with in
    SQL Server 2008, meaning you would have to write an entire Extended Event session
    in T-SQL, Microsoft has drastically improved Extended Events in SQL Server 2012,
    making them a lot more user-friendly and easier to use.


    SQL Server 2016 SP1 introduced two new methods to access wait statistics: through
    a new DMV called **sys.dm_exec_session_wait_stats** and by adding wait statistics
    information on a per-query basis inside execution plans.


    In SQL Server 2017 Microsoft took recording wait statistics another step forward
    by including them inside the Query Store. The Query Store is a feature that was
    introduced in SQL Server 2016 and acts like a flightrecorder for your query workload,
    logging query statement, performance, and resource utilization.


    We will take a look at all of the sources that capture wait statistics that are
    mentioned in the previous paragraphs inside this chapter, starting with the various
    DMVs. Because the Query Store feature has such a big impact on how you can troubleshoot
    and analyze query performance, including wait statistics in SQL Server 2017 and
    higher, we are going to take a thorough look at it in Chapter [3](#340881_2_En_3_Chapter.xhtml),
    “The Query Store.”


    ## Sys.dm_os_wait_stats


    The `sys.dm_os_wait_stats` DMV is probably one of the most important DMVs regarding
    wait statistics. This DMV is the replacement for the `DBCC SQLPERF(''WAITSTATS'')`
    command you would have had to use before SQL Server 2005\. All of the information
    the `DBCC SQLPERF(''WAITSTATS'')` command returned is included in the `sys.dm_os_wait_stats`
    DMV, plus a little bit more.


    The `sys.dm_os_wait_stats` DMV shows the total amount of wait time for every wait
    type since the start (or restart) of your SQL Server. It is also cumulative, adding
    wait time to the different wait types, resulting in an ever-increasing total.
    Querying the `sys.dm_os_wait_stats` DMV will give you insight into what your SQL
    Server has been waiting on the most since the time it started or was restarted.
    This can be helpful if you are looking for that grand total of wait time for every
    wait type, but many times you are interested in the wait time for a specific time
    segment. In this case it is possible to reset the `sys.dm_os_wait_stats` DMV without
    having to restart your SQL Server by using the `DBCC SQLPERF(''sys.dm_os_wait_stats'',
    CLEAR)` SQL command. This will reset all wait statistics information back to 0
    again, meaning you will lose all information before the reset. In Chapter [4](#340881_2_En_4_Chapter.xhtml),
    “Building a Solid Baseline,” we will take a look at a method that does not completely
    reset the `sys.dm_os_wait_stats` DMV.


    As with every DMV in SQL Server, we can run a query against the `sys.dm_os_wait_stats`
    DMV just like we would against a table, in this case `SELECT * FROM sys.dm_os_wait_stats`.
    The results of this query are shown in Figure [2-1](#340881_2_En_2_Chapter.xhtml#Fig1).


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig1_HTML.jpg](images/340881_2_En_2_Chapter/340881_2_En_2_Fig1_HTML.jpg)


    Figure 2-1


    Sys.dm_os_wait_stats


    Following are the available columns in the `sys.dm_os_wait_stats` DMV, along with
    a description of what each column can tell you:


    *   `wait_type` returns the wait type. The `sys.dm_os_wait_stats` will always
    return one row for every wait type possible in that specific SQL Server version.


    *   `waiting_tasks_count` shows a total of how many times a worker thread had
    to wait for that specific wait type.


    *   `wait_time_ms` returns the total wait time in milliseconds (1/1000 of a second)
    for that specific wait type since the start of the SQL Server instance or a manual
    reset of the DMV. This is the time a worker thread has spent in the Waiter List
    in the “SUSPENDED” state. It also includes the time the worker thread spent in
    the Runnable Queue in the “RUNNABLE” state while waiting for the scheduler to
    grant it processor time.


    *   `max_wait_time_ms` shows the maximum wait time in milliseconds a worker thread
    waited on that specific wait type.


    *   `signal_wait_time_ms` tells us the amount of time in milliseconds the worker
    thread spent in Runnable Queue waiting for processor time. Signal wait times are
    unavoidable and normal in Online Transaction Processing (OLTP) systems where a
    large number of queries are being processed, all of them requesting time on the
    processor. The signal wait time is also an important metric for detecting CPU
    pressure. Generally speaking, as it depends on the hardware of your system, seeing
    signal wait time metrics higher than 25% of the total wait time can indicate CPU
    pressure, because the worker threads are waiting for the processor to become available
    instead of using resources.


    You may have noticed that the `sys.dm_os_wait_stats` DMV does not return a column
    for the resource wait time. If we want to display the resource wait time as an
    additional column, we will need to calculate the value ourselves.


    Listing [2-1](#340881_2_En_2_Chapter.xhtml#PC1) shows a query you could use to
    analyze the `sys.dm_os_wait_stats` DMV. Besides the regular columns, it will add
    two more columns for every wait type returned, the resource wait time and the
    average wait time.


    ```

    SELECT

    wait_type AS ''Wait Type'',

    waiting_tasks_count AS ''Waiting Tasks Count'',

    (wait_time_ms - signal_wait_time_ms) AS ''Resource Wait Time'',

    signal_wait_time_ms AS ''Signal Wait Time'',

    wait_time_ms AS ''Total Wait Time'',

    COALESCE(wait_time_ms / NULLIF(waiting_tasks_count,0), 0) AS ''Average Wait Time''

    FROM sys.dm_os_wait_stats;

    Listing 2-1

    sys.dm_os_wait_stats with additional information

    ```


    This query will return results as shown in Figure [2-2](#340881_2_En_2_Chapter.xhtml#Fig2).


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig2_HTML.jpg](images/340881_2_En_2_Chapter/340881_2_En_2_Fig2_HTML.jpg)


    Figure 2-2


    sys.dm_os_wait_stats expended with more wait information


    Having both the number of occurrences of a specific wait type and the total wait
    time makes it possible to calculate an average wait time (represented by the `Average
    Wait Time` column in Figure [2-2](#340881_2_En_2_Chapter.xhtml#Fig2)) for that
    specific wait type by dividing the `wait_time_ms` value by the `waiting_tasks_count`
    value.


    The `sys.dm_os_wait_stats` is a powerful DMV with which you can retrieve a lot
    of information about the different wait types. It is also the basis of the wait
    statistics baseline methodology outlined in Chapter [4](#340881_2_En_4_Chapter.xhtml),
    “Building a Solid Baseline.”


    ## Sys.dm_os_waiting_tasks


    While the `sys.dm_os_wait_stats` DMV gives you the cumulative wait statistics
    information since server restart, the `sys.dm_os_waiting_tasks` DMV can give you
    information about what your SQL Server is currently waiting on. Querying this
    DMV will give you an overview of all the tasks that currently have worker threads
    waiting in the Waiter List or Runnable Queue for either resource or processor
    time.'
  trans: "\n# 2. 查询 SQL Server 等待统计信息\n\n随着 SQL Server 2005 中动态管理视图（DMV）的引入，查看和分析等待统计信息变得容易了许多，不再那么繁琐。在\
    \ SQL Server 2005 之前的版本中，我们只能通过 `DBCC SQLPERF('WAITSSTATS')` 命令来查看等待统计信息。目前，有多种\
    \ DMV 可以返回与等待统计相关的信息，在本章中，我们将详细查看其中四个最有用的 DMV：`sys.dm_os_wait_stats`、`sys.dm_os_waiting_tasks`、`sys.dm_exec_requests`\
    \ 和 `sys.dm_exec_session_wait_stats`。\n\n查看等待统计信息并不仅限于 DMV。我们还可以使用 Windows 性能监视器（Perfmon）来查看等待统计信息。SQL\
    \ Server 2008 引入了另一种查看等待统计信息的选项：扩展事件（Extended Events）。虽然在 SQL Server 2008 中使用扩展事件相当复杂，意味着您必须用\
    \ T-SQL 编写一个完整的扩展事件会话，但微软在 SQL Server 2012 中极大地改进了扩展事件，使其更加用户友好且易于使用。\n\nSQL Server\
    \ 2016 SP1 引入了两种访问等待统计信息的新方法：通过一个名为 `sys.dm_exec_session_wait_stats` 的新 DMV，以及在执行计划中按查询添加等待统计信息。\n\
    \n在 SQL Server 2017 中，微软通过将等待统计信息包含在查询存储中，进一步推进了等待统计信息的记录。查询存储是 SQL Server 2016\
    \ 中引入的一项功能，它就像您查询工作负载的“飞行记录器”，记录查询语句、性能和资源利用情况。\n\n在本章中，我们将查看前面段落中提到的所有捕获等待统计信息的来源，从各种\
    \ DMV 开始。由于查询存储功能对于在 SQL Server 2017 及更高版本中对查询性能（包括等待统计信息）进行故障排除和分析具有重大影响，我们将在第\
    \ 3 章“查询存储”中对其进行深入探讨。\n\n## Sys.dm_os_wait_stats\n\n`sys.dm_os_wait_stats` DMV\
    \ 可能是有关等待统计信息最重要的 DMV 之一。该 DMV 是 SQL Server 2005 之前您必须使用的 `DBCC SQLPERF('WAITSTATS')`\
    \ 命令的替代品。`DBCC SQLPERF('WAITSTATS')` 命令返回的所有信息都包含在 `sys.dm_os_wait_stats` DMV\
    \ 中，甚至更多一些。\n\n`sys.dm_os_wait_stats` DMV 显示自 SQL Server 启动（或重新启动）以来，每个等待类型的总等待时间。它也是累积性的，将等待时间添加到不同的等待类型中，导致总数不断增加。查询\
    \ `sys.dm_os_wait_stats` DMV 将使您深入了解您的 SQL Server 自启动或重新启动以来最常等待的是什么。如果您想查找每种等待类型的总等待时间，这可能会很有帮助，但很多时候您会对特定时间段内的等待时间感兴趣。在这种情况下，可以通过使用\
    \ `DBCC SQLPERF('sys.dm_os_wait_stats', CLEAR)` SQL 命令来重置 `sys.dm_os_wait_stats`\
    \ DMV，而无需重新启动 SQL Server。这将把所有等待统计信息重置回 0，意味着您将丢失重置之前的所有信息。在第 4 章“建立稳固的基线”中，我们将探讨一种不会完全重置\
    \ `sys.dm_os_wait_stats` DMV 的方法。\n\n与 SQL Server 中的每个 DMV 一样，我们可以像查询表一样对 `sys.dm_os_wait_stats`\
    \ DMV 运行查询，在本例中为 `SELECT * FROM sys.dm_os_wait_stats`。此查询的结果如图 2-1 所示。\n\n![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig1_HTML.jpg](img/340881_2_En_2_Fig1_HTML.jpg)\n\
    \n图 2-1: Sys.dm_os_wait_stats\n\n以下是 `sys.dm_os_wait_stats` DMV 中可用的列，以及每个列所能提供信息的描述：\n\
    \n*   `wait_type`：返回等待类型。`sys.dm_os_wait_stats` 将始终为该特定 SQL Server 版本中可能的每种等待类型返回一行。\n\
    *   `waiting_tasks_count`：显示工作线程必须等待该特定等待类型的总次数。\n*   `wait_time_ms`：返回自 SQL Server\
    \ 实例启动或手动重置 DMV 以来，该特定等待类型的总等待时间（以毫秒为单位，1/1000 秒）。这是工作线程在“SUSPENDED”状态下在等待者列表（Waiter\
    \ List）中花费的时间。它还包括工作线程在“RUNNABLE”状态下在可运行队列（Runnable Queue）中等待调度器授予其处理器时间所花费的时间。\n\
    *   `max_wait_time_ms`：显示工作线程等待该特定等待类型的最大等待时间（毫秒）。\n*   `signal_wait_time_ms`：告诉我们工作线程在可运行队列中等待处理器时间所花费的时间量（毫秒）。在联机事务处理（OLTP）系统中，信号等待时间是不可避免且正常的，因为有大量查询正在处理，所有这些查询都请求处理器时间。信号等待时间也是检测\
    \ CPU 压力的重要指标。一般来说，由于这取决于您系统的硬件，如果看到信号等待时间指标超过总等待时间的 25%，可能表明存在 CPU 压力，因为工作线程正在等待处理器变得可用，而不是在使用资源。\n\
    \n您可能已经注意到，`sys.dm_os_wait_stats` DMV 没有返回资源等待时间的列。如果我们想将资源等待时间显示为附加列，就需要自己计算该值。\n\
    \n清单 2-1 展示了一个您可以用来分析 `sys.dm_os_wait_stats` DMV 的查询。除了常规列之外，它还将为返回的每种等待类型添加两列：资源等待时间和平均等待时间。\n\
    \n```sql\nSELECT\n    wait_type AS 'Wait Type',\n    waiting_tasks_count AS 'Waiting\
    \ Tasks Count',\n    (wait_time_ms - signal_wait_time_ms) AS 'Resource Wait Time',\n\
    \    signal_wait_time_ms AS 'Signal Wait Time',\n    wait_time_ms AS 'Total Wait\
    \ Time',\n    COALESCE(wait_time_ms / NULLIF(waiting_tasks_count,0), 0) AS 'Average\
    \ Wait Time'\nFROM sys.dm_os_wait_stats;\n```\n\n清单 2-1: 包含附加信息的 sys.dm_os_wait_stats\n\
    \n此查询将返回如图 2-2 所示的结果。\n\n![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig2_HTML.jpg](img/340881_2_En_2_Fig2_HTML.jpg)\n\
    \n图 2-2: 扩展了更多等待信息的 sys.dm_os_wait_stats\n\n通过拥有特定等待类型的出现次数和总等待时间，可以通过将 `wait_time_ms`\
    \ 值除以 `waiting_tasks_count` 值来计算该特定等待类型的平均等待时间（由图 2-2 中的 `Average Wait Time` 列表示）。\n\
    \n`sys.dm_os_wait_stats` 是一个功能强大的 DMV，通过它可以检索有关不同等待类型的大量信息。它也是第 4 章“建立稳固的基线”中概述的等待统计基线方法的基础。\n\
    \n## Sys.dm_os_waiting_tasks\n\n虽然 `sys.dm_os_wait_stats` DMV 提供自服务器重启以来的累积等待统计信息，但\
    \ `sys.dm_os_waiting_tasks` DMV 可以提供 SQL Server 当前正在等待什么的信息。查询此 DMV 将为您提供所有当前任务的概览，这些任务的工作线程正在等待者列表或可运行队列中等待资源或处理器时间。\n"
- fmt: '### Understanding sys.dm_os_waiting_tasks


    因为 `sys.dm_os_waiting_tasks` DMV 能够洞察当前正在等待的任务，所以它通常是使用等待统计信息来审查 SQL Server 实例性能时查询的第一个
    DMV。它还为某些等待类型提供了一些额外的信息，这在排查问题时非常有用。


    图 [2-3](#340881_2_En_2_Chapter.xhtml#Fig3) 展示了 `SELECT * FROM sys.dm_os_waiting_tasks;`
    查询的结果。


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig3_HTML.jpg](images/340881_2_En_2_Chapter/340881_2_En_2_Fig3_HTML.jpg)


    Figure 2-3


    sys.dm_os_waiting_tasks


    以下是 `sys.dm_os_waiting_tasks` DMV 返回的列列表及其所返回信息的描述：


    *   `waiting_task_address` 显示当前正在等待的任务的地址。

    *   `session_id` 提供与特定任务关联的会话 ID。

    *   `exec_context_id` 将返回执行上下文的 ID。只有当任务使用并行性执行时，此值才会从默认值 0 更改。这意味着任务正在使用多个线程而不是单个（串行）线程执行。

    *   `wait_duration_ms` 显示任务已经等待的时间（以毫秒为单位）。与 `sys.dm_os_wait_stats` DMV 中一样，此时间包括资源等待时间和信号等待时间。

    *   `wait_type` 返回任务当前正在等待的等待类型。

    *   `resource_address` 返回关于当前正在等待的资源的内存地址信息。并非所有等待类型都会记录此内存地址，因此它经常返回为 `NULL`。

    *   `blocking_task_address` 将返回当前正在阻塞等待任务的任务地址。当任务未被另一个任务阻塞时，此列将返回 `NULL`。

    *   `blocking_session_id` 返回当前正在阻塞任务的会话的会话 ID。与 `blocking_task_address` 一样，仅当此任务当前被另一个任务阻塞时才包含此信息。当没有阻塞或无法检索或识别有关阻塞任务的会话信息时，它将返回
    `NULL`。我们将在第 [8](#340881_2_En_8_Chapter.xhtml) 章“与锁相关的等待类型”中解释阻塞和锁定，届时我们将讨论锁等待类型。

    *   `blocking_exec_context_id` 是另一个专门用于阻塞信息的列。在这种情况下，它将返回执行上下文的 ID。只有当任务使用并行性执行并且其中一个线程负责阻塞时，此列才会返回非
    `NULL` 的结果。然后，`blocking_exec_context_id` 可用于识别哪个线程是阻塞的根源。

    *   DMV 的最后一列 `resource_description` 将提供有关任务正在等待的资源的附加信息。没有多少等待类型会填充此列——最常见的是与并行性、锁或门闩相关的等待类型。它可能是一个非常有用的列，尤其是在分析锁或门闩相关的等待类型时；在这些情况下，我们可以精确定位我们正在等待其可用性的数据库对象（数据页、行、表等）。本书后面的一些示例（最著名的是第
    [8](#340881_2_En_8_Chapter.xhtml) 章“与锁相关的等待类型”和第 [9](#340881_2_En_9_Chapter.xhtml)
    章“与门闩相关的等待类型”）将使用此列来收集有关我们正在等待的资源的额外信息。


    ### Querying sys.dm_os_waiting_tasks


    因为 `sys.dm_os_waiting_tasks` DMV 返回了丰富的信息，所以根据你想要分析或排查的问题，有各种查询它的方式。


    我在互联网上的各种论坛上经常看到以下查询：


    ```sql

    SELECT * FROM sys.dm_os_waiting_tasks

    WHERE session_id > 50;

    ```


    此查询将过滤掉所有 SQL Server 内部会话 ID，并且只返回源自用户会话的等待任务。在我测试的 SQL Server 上，查询结果如图 [2-4](#340881_2_En_2_Chapter.xhtml#Fig4)
    所示。


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig4_HTML.jpg](images/340881_2_En_2_Chapter/340881_2_En_2_Fig4_HTML.jpg)


    Figure 2-4


    sys.dm_os_waiting_tasks where session_id is greater than 50


    虽然过滤掉内部 SQL Server 进程的方法适用于许多等待类型并提高了可读性，但在运行此查询时，某些特定的等待类型将不会被返回。


    一个很好的例子是 `THREADPOOL` 等待类型，我们将在第 [5](#340881_2_En_5_Chapter.xhtml) 章“与 CPU 相关的等待类型”中讨论。这种等待类型可能对你的
    SQL Server 性能产生巨大的负面影响，但如果只查询用户会话，则不会返回。这可能会影响你的分析，因为你遗漏了重要的事实。


    另一个建议在不过滤会话 ID 的情况下查询 DMV 的原因是，关于会话 ID 以及会话 ID 是用户会话还是内部会话的关系存在一个很大的误解。虽然通常认为大于
    50 的会话 ID 是用户会话，但不能保证大于 50 的会话 ID 实际上*就是*用户会话。SQL Server 可能需要超过 50 个内部会话，在这种情况下，你可能会看到会话
    ID 高于 50 的内部会话，并可能误认为是用户会话。


    我相信查询 `sys.dm_os_waiting_tasks` DMV 的最佳方式是选择所有内容，并且只在寻找特定的等待类型或会话时才应用过滤器。与过滤会话
    ID 大于 50 相比，这将返回更多的行，如图 [2-5](#340881_2_En_2_Chapter.xhtml#Fig5) 所示，但它会向你展示完整的画面，并最大程度地减少你可能错过重要等待类型的机会。一个好主意可能是按
    `session_id` 列排序，这样可以在不忽视内部会话的情况下，使结果更易于阅读。


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig5_HTML.jpg](images/340881_2_En_2_Chapter/340881_2_En_2_Fig5_HTML.jpg)


    Figure 2-5


    sys.dm_os_waiting_tasks


    ## Sys.dm_exec_requests


    `sys.dm_exec_requests` DMV 返回有关当前正在由 SQL Server 处理的所有请求的信息。'
  raw: '### Understanding sys.dm_os_waiting_tasks


    Because the `sys.dm_os_waiting_tasks` DMV gives insight into what’s waiting currently,
    it is usually the first DMV you query when using wait statistics to review the
    performance of your SQL Server instance. It also supplies some additional information
    for certain wait types that can be useful while troubleshooting.


    Figure [2-3](#340881_2_En_2_Chapter.xhtml#Fig3) shows the results of a `SELECT
    * FROM sys.dm_os_waiting_tasks;` query.


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig3_HTML.jpg](images/340881_2_En_2_Chapter/340881_2_En_2_Fig3_HTML.jpg)


    Figure 2-3


    sys.dm_os_waiting_tasks


    Following is a list of columns returned by the `sys.dm_os_waiting_tasks` DMV and
    a description of the information they return:


    *   `waiting_task_address` shows the address of the task that is currently waiting.


    *   `session_id` gives us the ID of the session that is associated with the specific
    task.


    *   `exec_context_id` will return the ID of the execution context. This value
    will only change from the default of 0 if the task is being performed using parallelism.
    This means that the task is being executed using multiple threads instead of a
    single (serial) thread.


    *   `wait_duration_ms` shows us the time in milliseconds that the task has been
    waiting. Just like in the `sys.dm_os_wait_stats` DMV, this time includes both
    the resource wait time and the signal wait time.


    *   `wait_type` returns the wait type the task is currently waiting on.


    *   `resource_address` returns memory address information about the resource we
    are currently waiting for. Not all wait types will log this memory address, so
    it will frequently be returned as `NULL`.


    *   `blocking_task_address` will return the address of the task that is currently
    blocking the waiting task. When the task is not being blocked by another task,
    this column will return `NULL`.


    *   `blocking_session_id` returns the session ID of the session that is currently
    blocking the task. Just like the `blocking_task_address`, this information is
    only included when this task is being currently blocked by another task. It will
    return `NULL` when there is no blocking or when the session information about
    the blocking task cannot be retrieved or identified. We will explain blocking
    and locking in Chapter [8](#340881_2_En_8_Chapter.xhtml), “Lock-Related Wait Types,”
    when we discuss lock wait types.


    *   `blocking_exec_context_id` is another column dedicated to information regarding
    blocking. In this case it will return the ID of the execution context. This will
    only return a result other than `NULL` when a task gets executed using parallelism
    and one of the threads is responsible for the block. The `blocking_exec_context_id`
    can then be used to identify which one of the threads is responsible for the block.


    *   The last column of the DMV, `resource_description`, will give additional information
    about the resource the task is waiting for. There aren’t many wait types that
    will fill this column—most often parallelism, lock-, or latch-related wait types.
    It can be a very useful column, especially when analyzing lock- or latch-related
    wait types; in those cases we can pinpoint the database object (data page, row,
    table, etc.) whose availability we are waiting for. Some of the examples later
    in this book (most notably Chapter [8](#340881_2_En_8_Chapter.xhtml), “Lock-Related
    Wait Types,” and Chapter [9](#340881_2_En_9_Chapter.xhtml), “Latch-Related Wait
    Types”) will make use of this column to gather extra information about the resource
    we are waiting for.


    ### Querying sys.dm_os_waiting_tasks


    Because the `sys.dm_os_waiting_tasks` DMV returns a wealth of information, there
    are various ways to query it depending on what you want to analyze or troubleshoot.


    One query that I see a lot on various forums on the Internet is the following:


    ```

    SELECT * FROM sys.dm_os_waiting_tasks

    WHERE session_id > 50;

    ```


    This query will filter out all of the SQL Server internal session IDs and only
    returns waiting tasks that originate from user sessions. The results of the query
    on my test SQL Server are shown in Figure [2-4](#340881_2_En_2_Chapter.xhtml#Fig4).


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig4_HTML.jpg](images/340881_2_En_2_Chapter/340881_2_En_2_Fig4_HTML.jpg)


    Figure 2-4


    sys.dm_os_waiting_tasks where session_id is greater than 50


    While the method of filtering out internal SQL Server processes will work fine
    for many wait types and improves readability, there are specific wait types that
    will not be returned when running this query.


    One good example of this is the `THREADPOOL` wait type, which we will discuss
    in Chapter [5](#340881_2_En_5_Chapter.xhtml), “CPU-Related Wait Types.” This wait
    type can have a large negative impact on the performance of your SQL Server but
    will not be returned if you only query the user sessions. This can impact your
    analysis because you are missing important facts.


    Another reason to query the DMV without filtering on session IDs is that there
    is a big misconception about the relation of the session ID and whether or not
    the session ID is a user or internal session. While session IDs larger than 50
    are generally considered to be user sessions, there is no guarantee that a session
    ID larger than 50 actually *is* a user session. It is possible that there is a
    need for SQL Server to have more than 50 internal sessions, in which case there
    is a chance you will see internal sessions with a session ID higher than 50 that
    you can mistake for a user session.


    I believe the best way to query the `sys.dm_os_waiting_tasks` DMV is by selecting
    everything and only applying a filter if you are looking for a specific wait type
    or session. This will return many more rows than filtering on session IDs larger
    than 50, as you can see in Figure [2-5](#340881_2_En_2_Chapter.xhtml#Fig5), but
    it will show you the complete picture and minimizes the chance that you might
    miss important wait types. A good idea might be to sort on the `session_id` column
    to make the results a little bit more readable without losing sight of the internal
    sessions.


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig5_HTML.jpg](images/340881_2_En_2_Chapter/340881_2_En_2_Fig5_HTML.jpg)


    Figure 2-5


    sys.dm_os_waiting_tasks


    ## Sys.dm_exec_requests


    The `sys.dm_exec_requests` DMV returns information about all the requests that
    are currently getting processed by SQL Server.'
