  trans: '

    ### 什么是 LAZYWRITER_SLEEP 等待类型？


    正如我们在本章讨论的其他等待类型一样，`LAZYWRITER_SLEEP` 等待类型出现在一个内部 SQL Server 进程（此处是惰性写入器进程）等待工作时。惰性写入器是一个后台进程，它会在特定的时间间隔被激活。当它被激活时，它会扫描缓冲区缓存的大小，并判断其中是否有足够的可用页。在缓冲区缓存中始终保持一定数量的可用页非常重要，这样新的页请求可以直接分配空间，而无需先换出其他页。如果惰性写入器进程判断缓冲区缓存中有足够的可用页，它就会再次进入休眠，并在休眠期间记录
    `LAZYWRITER_SLEEP` 等待类型。然而，如果缓冲区缓存中没有足够的可用页，惰性写入器进程会在检查点之间检测缓冲区缓存中哪些“脏页”一段时间未被访问，将它们写入数据库数据文件，并从缓冲区缓存中清除它们。因此，如果缓冲区缓存中有多余的可用页，惰性写入器进程就没什么工作要做。如果你的
    SQL Server 实例正经历内存压力，惰性写入器进程在换出脏页和腾出缓冲区缓存空间时将会忙碌得多。图 12-6 通过流程图展示了检查点进程与惰性写入器进程之间的关系。


    ![../images/340881_2_En_12_Chapter/340881_2_En_12_Fig6_HTML.jpg](img/340881_2_En_12_Fig6_HTML.jpg)


    图 12-6

    检查点与惰性写入器进程


    由于 `LAZYWRITER_SLEEP` 等待类型表示惰性写入器进程处于休眠或等待工作的时间，它是另一种可以安全忽略的等待类型。然而，有一个需要注意的地方——如果惰性写入器进程持续工作，将脏页从缓冲区缓存移动到数据库数据文件，这可能表明你的
    SQL Server 实例正在经历内存压力。这对性能不利，因为每个页在读取或修改之前都必须先移动到缓冲区缓存。这种行为可能导致 `LAZYWRITER_SLEEP`
    等待类型的等待时间低于正常水平。


    ### LAZYWRITER_SLEEP 总结


    `LAZYWRITER_SLEEP` 等待类型与 SQL Server 内部的惰性写入器进程相关。惰性写入器进程按固定的时间间隔启动，如果缓冲区缓存中没有足够的可用页，它负责将脏数据页写入数据库数据文件。`LAZYWRITER_SLEEP`
    等待类型表明惰性写入器进程当前未在运行，或处于休眠状态，直到收到唤醒信号并检查缓冲区缓存。由于 `LAZYWRITER_SLEEP` 等待类型仅向我们展示惰性写入器进程处于非活动状态的时间，因此在大多数情况下可以忽略。


    ## MSQL_XP


    在第 11 章“抢占式等待类型”的最后部分，我们讨论了 `PREEMPTIVE_GETPROCADDRESS` 等待类型。我们了解到，`PREEMPTIVE_GETPROCADDRESS`
    等待类型在加载扩展存储过程的入口点时记录等待时间。我注意到的一个重要点是，`PREEMPTIVE_GETPROCADDRESS` 等待类型不记录扩展存储过程的执行时间，只记录加载入口点的时间。扩展存储过程的执行时间实际上由另一种等待类型
    `MSQL_XP` 来跟踪。


    ### 什么是 MSQL_XP 等待类型？


    `MSQL_XP` 等待类型记录 SQL Server 实例上扩展存储过程的执行时间。`MSQL_XP` 等待类型也用于在使用多活动结果集时检测死锁情况。MARS
    是一项功能，允许通过单个 SQL Server 连接执行多个（并发的）批处理。我们不会深入探讨 MARS 的细节，但你可以在这里找到更多信息：[`https://msdn.microsoft.com/en-us/library/ms131686.aspx`](https://msdn.microsoft.com/en-us/library/ms131686.aspx)。


    看到 `MSQL_XP` 等待类型的等待时间高于正常水平的最常见原因是扩展存储过程的执行。只要扩展存储过程的执行时间保持不变，这并不一定意味着存在问题。然而，如果某个扩展存储过程花费的时间比预期长，当你将等待时间与基线进行比较时，肯定会注意到
    `MSQL_XP` 等待时间的增加。


    ### MSQL_XP 示例


    为了证明扩展存储过程执行时会发生 MSQL_XP 等待，我使用清单 12-2 中的脚本创建了一个简单的例子。该脚本将重置 `sys.dm_os_wait_stats`
    DMV，执行一个扩展存储过程（此处是 `master` 数据库中的 `xp_dirtree` 扩展存储过程），然后查询 `sys.dm_os_wait_stats`
    以获取 MSQL_XP 等待信息。


    ```

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    EXEC master..xp_dirtree ''c:\windows'';

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''MSQL_XP'';

    ```

    清单 12-2

    MSQL_XP 示例


    在我的测试 SQL Server 实例上执行清单 12-2 的查询结果如图 12-7 所示。顶部窗口显示了 `xp_dirtree` 的结果，底部窗口显示了对
    `sys.dm_os_waits_stats` DMV 的查询结果。


    ![../images/340881_2_En_12_Chapter/340881_2_En_12_Fig7_HTML.jpg](img/340881_2_En_12_Fig7_HTML.jpg)


    图 12-7

    MSQL_XP 等待


    `sys.dm_os_wait_stats` DMV 中的信息显示，在 `MSQL_XP` 等待类型上发生了一次等待，等待时间为 21,224 毫秒。在我的测试
    SQL Server 实例上，这与执行清单 12-2 中查询所花费的时间（21 秒）几乎相同。


    ### 降低 MSQL_XP 等待


    当注意到 `MSQL_XP` 等待类型的等待时间高于正常水平时，很可能是正在使用的扩展存储过程完成所需的时间比正常情况要长。你的首要行动点应该是识别正在使用哪些扩展存储过程以及它们的用途。由于扩展存储过程也可以在
    SQL Server 之外执行任务，它们可能会遇到其他可能使其变慢的 Windows 进程。了解扩展存储过程的函数及其功能，可以帮助你快速识别它遇到问题的位置。


    如果你正在使用 MARS，你可能遇到了 MARS 连接的死锁。已经发布了多个 SQL Server 更新来减少 MARS 死锁发生的机会，因此请确保你的 SQL
    Server 实例已打好补丁。同时务必检查使用 MARS 执行查询的应用程序代码是否存在潜在问题。


    ### MSQL_XP 总结


    `MSQL_XP` 等待类型做两件不同的事情：它检测执行扩展存储过程所需的时间，并为 MARS 连接提供死锁检测。频繁看到 `MSQL_XP` 等待类型的等待时间高于正常水平，通常表明某个扩展存储过程完成所需的时间比正常情况长。尝试检测正在执行哪个扩展存储过程及其功能，这将使对扩展存储过程进行故障排除更容易。


    ## OLEDB


    每当 SQL Server 必须访问对象链接与嵌入数据库提供程序时，就会出现 `OLEDB` 等待类型。SQL Server 使用 OLEDB 客户端提供程序的原因有多种，每当它使用时，SQL
    Server 都会在 OLEDB 等待类型上记录等待时间。

    '
- fmt: '### What Is the OLEDB Wait Type?


    SQL Server uses the OLEDB Client Provider for many different actions inside SQL
    Server. For instance, linked server traffic will move through the OLEDB Client
    Provider and will result in OLEDB waits. Other actions, especially when SQL Server
    has to retrieve data from an outside source, can also result in OLEDB Client Provider
    usage.


    Some actions inside SQL Server will also use the OLEDB Client Provider, even though
    they occur internally. One good example of this is the `DBCC` command, which I
    will demonstrate in the following example section.


    ### OLEDB Example


    One interesting process that uses the OLEDB Client Provider is the `DBCC` command
    inside SQL Server. Whenever you execute a `DBCC` command, you are bound to see
    `OLEDB` waits occur. Listing 12-3 shows an example of `OLEDB` waits occurring
    after a `DBCC CHECKDB`. The example script will clear the `sys.dm_os_wait_stats`
    DMV, perform a `CHECKDB` against the `AdventureWorks` database, and then query
    the `sys.dm_os_wait_stats` DMV for `OLEDB` waits.


    ```

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    DBCC CHECKDB(''AdventureWorks'');

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''OLEDB'';

    Listing 12-3

    Generate OLEDB waits

    ```


    The results of the query in Listing 12-3 as performed against my test SQL Server
    instance can be seen in Figure 12-8.


    ![../images/340881_2_En_12_Chapter/340881_2_En_12_Fig8_HTML.jpg](images/340881_2_En_12_Chapter/340881_2_En_12_Fig8_HTML.jpg)


    Figure 12-8 OLEDB waits


    As you can see from Figure 12-8, performing a `DBCC CHECKDB` will lead to `OLEDB`
    waits.


    ### Lowering OLEDB Waits


    As you could see in the previous example, performing a `DBCC CHECKDB` against
    a database will result in `OLEDB` waits. This doesn’t mean there is a problem
    related to the OLEDB Client Provider, however; rather, it just indicates that
    the `DBCC CHECKDB` command makes use of the OLEDB Client Provider. Running `DBCC
    CHECKDB` is a vital part of making sure your databases are healthy. Avoiding consistency
    checks just to lower `OLEDB` wait times is bad practice, and I strongly advise
    against it. Seeing high `OLEDB` wait times occur outside `DBCC` commands can indicate
    there is a performance issue somewhere in your SQL Server environment. If you
    are dealing with remote sources, such as linked servers or Excel files, you are
    also affected by the performance of the remote source. For instance, if you are
    querying information from a linked server and the linked server is experiencing
    performance problems, it will probably also be reflected in the `OLEDB` wait time.
    Also, certain operations, like sorts, can also impact the query duration on the
    linked server. Network connections to the remote source can also play a role in
    higher-than-normal `OLEDB` wait times. If the network connection through which
    you are accessing your remote source experiences performance degradation, you
    will again notice this in the `OLEDB` wait times.


    Because the `OLEDB` wait can occur for various reasons, some of which are benign
    like `DBCC` commands, and some that can be related to performance issues, I advise
    you not to ignore the `OLEDB` wait type, but rather to monitor it like other performance-indicating
    wait types.


    ### OLEDB Summary


    The `OLEDB` wait type can occur due to various sources that use the Object Linking
    and Embedding Database (OLEDB) Client Provider. Most of the sources are related
    to remote data sources, like linked servers. Some internal processes also use
    the OLEDB Client Provider, most notably the `DBCC` command. Seeing higher-than-normal
    wait times on the `OLEDB` wait type doesn’t have to mean there is a performance
    problem, especially when they can be correlated to a planned `DBCC` command execution.
    Seeing higher-than-normal wait times outside `DBCC` command when you are using
    remote data sources like linked servers can mean that the remote data source is
    experiencing performance problems. In this case, focus on the data source; if
    the source has problems it is bound to affect the `OLEDB` wait times as well.


    ## TRACEWRITE


    The `TRACEWRITE` wait type is a special wait type that only collects wait time
    when a trace is running, and most commonly a SQL Profiler trace. A trace is a
    background process in SQL Server that collects various, often user-specified,
    information about the performance of a SQL Server instance. For example, it is
    possible to use SQL Server Profiler to capture currently executing queries, filtered
    against a single database, with runtime information. There are various trace methods
    available in SQL Server, but the most common one that affects the `TRACEWRITE`
    wait type is the SQL Server Profiler trace.


    SQL Server Profiler is an application that is part of the SQL Server, and starting
    from SQL Server 2016 the separate SQL Server Management Studio product, and allows
    users to create and monitor traces against SQL Server instances. The SQL Server
    Profiler was announced as deprecated by Microsoft with the introduction of SQL
    Server 2012, and Microsoft recommends using Extended Events to capture traces.
    Even though the SQL Server Profiler is deprecated, it is still available in SQL
    Server 2014 and is installed whenever you deploy the separate SQL Server Management
    Studio product from SQL Server 2016 onward. Many people still rely on SQL Server
    Profiler traces instead of Extended Events to troubleshoot and monitor query performance.


    The bad news about using SQL Server Profiler is that it can cause some performance
    overhead while a trace is being performed. Microsoft released an article that
    concluded that running SQL Server Profiler traces on busy systems can have an
    impact of 10% on the amount of transactions per seconds; you can find the article
    here: [`https://msdn.microsoft.com/en-us/library/cc293614.aspx`](https://msdn.microsoft.com/en-us/library/cc293614.aspx).
    Because SQL Server Profiler traces can have such a big impact on the performance
    of your system, I believe it is important to monitor the `TRACEWRITE` wait time.


    ### What Is the TRACEWRITE Wait Type?


    As we just noted, the `TRACEWRITE` wait type will show up on your system when
    traces are being performed against your SQL Server instance using the SQL Server
    Profiler. Because SQL Server Profiler traces can have such an impact on the performance
    of your SQL Server instance, it is advisable that you monitor the wait type to
    detect if any SQL Server Profiler traces are being performed.


    There are a variety of reasons why you would want to run a SQL Server Profiler
    trace; for instance, if you want to troubleshoot a very specific query problem
    or when monitoring how many times a specific query gets executed. Even though
    there are alternatives to the SQL Server Profiler, like server-side traces and
    Extended Events, the SQL Server Profiler tool is very easy to use compared to
    the often complex Extended Events.'
  raw: '### What Is the OLEDB Wait Type?


    SQL Server uses the OLEDB Client Provider for many different actions inside SQL
    Server. For instance, linked server traffic will move through the OLEDB Client
    Provider and will result in OLEDB waits. Other actions, especially when SQL Server
    has to retrieve data from an outside source, can also result in OLEDB Client Provider
    usage.


    Some actions inside SQL Server will also use the OLEDB Client Provider, even though
    they occur internally. One good example of this is the `DBCC` command, which I
    will demonstrate in the following example section.


