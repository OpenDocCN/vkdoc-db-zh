- fmt: '## Introduction to In-Memory OLTP


    The main difference between traditional, disk-based tables and memory-optimized
    tables is that memory-optimized tables reside completely in the memory of your
    SQL Server instance. Unlike traditional tables, where data pages from that table
    are moved from disk into memory and back out again, memory-optimized tables are
    moved to your system’s memory at SQL Server startup and never leave the memory
    (unless the memory-optimized table is removed, of course). While this might sound
    a bit scary at first, memory-optimized tables are, by default, fully durable.
    This means that if your SQL Server instance crashes, memory-optimized table data
    is not lost.


    Of course, having an entire table reside in the memory of your SQL Server instance
    also has its disadvantages. You need to make sure you have enough free memory
    to accommodate the entire memory-optimized table (and some extra memory to accommodate
    row versions used when accessing such tables). Calculating the memory requirements
    can be difficult, but the following article can help you out [`https://msdn.microsoft.com/en-us/library/dn282389.aspx`](https://msdn.microsoft.com/en-us/library/dn282389.aspx).


    The memory you reserve for memory-optimized tables is claimed by SQL Server and
    will not be wiped out; if your memory-optimized tables use too much memory, your
    SQL Server instance will run into memory starvation issues that cause performance
    degradation or, worst-case, cause SQL Server to crash. This is a major difference
    compared to, for instance, the buffer cache, where pages are wiped out of memory
    when memory pressure occurs.


    Another disadvantage is that many data types or SQL Server features are not supported
    for memory-optimized tables. The complete list of what can and cannot be used
    can be found at [`https://msdn.microsoft.com/en-us/library/dn246937(v=sql.120).aspx`](https://msdn.microsoft.com/en-us/library/dn246937%2528v%253Dsql.120%2529.aspx)
    and at [`https://msdn.microsoft.com/en-us/library/dn133181(v=sql.120).aspx`](https://msdn.microsoft.com/en-us/library/dn133181%2528v%253Dsql.120%2529.aspx).
    With the release of SQL Server 2016, some of the major limitations were resolved,
    making the feature more attractive and less restrictive.


    So, how do memory-optimized tables work, and why do they perform that much faster
    than traditional disk-based tables? Let’s take a look at some of the internals
    of In-Memory OLTP.


    ### CFPs


    Like I mentioned earlier, by default memory-optimized tables are durable (you
    can choose to create a non-durable table that has its contents cleared on a SQL
    Server Service restart, but you have to explicitly specify this). The way this
    durability is achieved is through so-called checkpoint file pairs (`CFPs`). `CFPs`
    consist of two files, a data and a delta file, that exist inside a special memory-optimized
    filegroup that you have to create for the database where you want to use memory-optimized
    tables.


    Unlike traditional tables that store row data inside data pages, data files store
    the rows of `all` your memory-optimized tables. I emphasize the word `all` because
    a single data file can hold the rows of many memory-optimized tables, unlike data
    pages that store row data for a single table. The rows inside a data file are
    stored sequentially based on the time they were inserted into a memory-optimized
    table. This is different than with data pages, which hold row information inside
    extents for traditional tables. Because rows are stored sequentially inside the
    data files, there is a performance increase when reading rows since it eliminates
    the random reads that occur when reading rows from traditional tables. Figure
    [13-1](#340881_2_En_13_Chapter.xhtml#Fig1) shows an abstract view of a data file
    and the row data it holds.


    ![../images/340881_2_En_13_Chapter/340881_2_En_13_Fig1_HTML.jpg](images/340881_2_En_13_Chapter/340881_2_En_13_Fig1_HTML.jpg)


    Figure 13-1 Memory-optimized table’s data file


    There are always multiple data files inside a memory-optimized filegroup. When
    you first create the memory-optimized filegroup, SQL Server will automatically
    pre-allocate a number of data files in the file location of the memory-optimized
    filegroup. The data files will always have a fixed file size, either 128 MB on
    systems with more than 16 GB memory or 16 MB when there is less than or equal
    to 16 GB memory. When a data file is full, a new data file will automatically
    be created and new rows will be inserted into the new data file.


    It is important to know that the data file keeps track of rows based on the transaction-commit
    timestamp that inserted the row into the data file (shown by the number inside
    Figure [13-1](#340881_2_En_13_Chapter.xhtml#Fig1)). Even if new data files are
    added and rows are spread across multiple data files, the data files will always
    have a contiguous range of transactions. Figure [13-2](#340881_2_En_13_Chapter.xhtml#Fig2)
    shows multiple data files and the transaction-commit timestamps associated with
    those data files.


    ![../images/340881_2_En_13_Chapter/340881_2_En_13_Fig2_HTML.jpg](images/340881_2_En_13_Chapter/340881_2_En_13_Fig2_HTML.jpg)


    Figure 13-2 Data files and transaction timestamps


    Notice in Figure [13-2](#340881_2_En_13_Chapter.xhtml#Fig2) that the last data
    file still has room for new rows—it doesn’t have a transaction timestamp to indicate
    the file is full, so new rows will be added to that file.


    Another important characteristic of the data file is that rows that are deleted
    are not directly removed from the file. Instead they are tracked by the delta
    file that is associated with the data file. The delta file logs any deletes made
    in the data file and is connected to the data file by the transaction timestamp
    range. Row updates for memory-optimized tables are tracked as a delete and insert
    operation.


    The population of the data and delta files is performed by a background thread—called
    the offline checkpoint thread—that runs constantly in the background of SQL Server.
    This is different than the checkpoint process used for traditional tables where
    pages are written to the database data files at intervals. The offline checkpoint
    thread monitors the transaction log for operations performed on memory-optimized
    tables and directly writes to the data and delta files.


    Over time, when data files accumulate more deleted rows, a merge operation will
    take place that will merge multiple data files together into one data file. The
    merge operation will create new data and delta files and move the contents of
    one or more data and delta files into the new files, but it will not move the
    rows that were marked as deleted. The transaction-commit timestamps will be adjusted
    in the new data and delta files so they match the timestamps of the files that
    were merged. Figure [13-3](#340881_2_En_13_Chapter.xhtml#Fig3) shows a simplified
    view of a merge operation on a data-file level. Keep in mind that a merge will
    also impact the delta file.


    ![../images/340881_2_En_13_Chapter/340881_2_En_13_Fig3_HTML.jpg](images/340881_2_En_13_Chapter/340881_2_En_13_Fig3_HTML.jpg)


    Figure 13-3 Merge operation'
