- fmt: '### Lowering CMEMTHREAD Waits


    Since there are many different memory objects present in SQL Server that could
    potentially generate `CMEMTHREAD` waits, there are many possible solutions to
    lowering `CMEMTHREAD` wait times depending on the memory object that is being
    accessed.


    One of the more common situations where `CMEMTHREAD` waits can occur is when large
    amounts of short, concurrent, ad hoc queries are being executed. Every time an
    ad hoc query is executed that could not be parameterized, the Query Optimizer
    will generate a new execution plan for the query. All these new execution plans
    need to be entered into the procedure cache, and a memory object for allocating
    cache descriptors is accessed. Since the memory object is thread-safe, `CMEMTHREAD`
    waits can occur if the rate of insertion is high enough. A good place to start
    looking if you suspect `CMEMTHREAD` waits are going to occur because of ad hoc
    queries is the procedure cache. The query in Listing 6-4 will give you information
    about the number of execution plans in the procedure cache.


    ```

    SELECT

    objtype,

    COUNT_BIG (*) AS ''Total Plans'',

    SUM(CAST(size_in_bytes AS DECIMAL(12,2)))/1024/1024 AS ''Size (MB)''

    FROM sys.dm_exec_cached_plans

    GROUP BY objtype;

    Listing 6-4

    Query procedure cache

    ```


    The results of this query should look like Figure 6-14, though the numbers will
    be different on your system.


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig14_HTML.jpg](images/340881_2_En_6_Chapter/340881_2_En_6_Fig14_HTML.jpg)


    Figure 6-14

    Results of querying procedure cache


    We should focus on the number of ad hoc execution plans. If you see this number
    growing rapidly and experience `CMEMTHREAD` waits, it might be worth the effort
    to analyze some of those ad hoc queries. If possible, try to optimize the queries
    so they generate a reusable plan. If your application uses many dynamic queries
    then try to use the `sp_executesql` system-stored procedure instead of the `EXECUTE`
    (`EXEC`) command. Using the `EXEC` command will most likely result in a plan that
    will only be used once.


    Microsoft has released various fixes (most notably the partitioning of certain
    memory objects across CPUs) for this problem in SQL Server 2005 SP2, making it
    less common these days. Even if you are using newer SQL Server editions than SQL
    Server 2005, it might be a good idea to upgrade to the latest available Service
    Pack since there have been various memory-related bug fixes in every SQL Server
    edition.


    ### CMEMTHREAD Summary


    The `CMEMTHREAD` wait type is a memory-related wait type. `CMEMTHREAD` waits occur
    when multiple threads try to access memory objects that can only be accessed by
    one thread at a time. The time other threads spend waiting for their turn to access
    the memory object is recorded as `CMEMTHREAD` wait time. One of the more common
    cases where `CMEMTHREAD` waits can occur is when your system uses a high amount
    of ad hoc queries. Every time a new execution plan is generated, SQL Server will
    access a memory object; if many execution plans are generated this can lead to
    a queue of threads that want access to the memory object, resulting in `CMEMTHREAD`
    waits.


    ## IO_COMPLETION


    Just like the `ASYNC_IO_COMPLETION` wait type, `IO_COMPLETION` waits occur when
    SQL Server is waiting for storage-related actions to complete. And just like the
    `ASYNC_IO_COMPLETION` wait type, seeing high wait times of the `IO_COMPLETION`
    wait type doesn’t necessarily mean there is something wrong with your storage
    system. `IO_COMPLETION` waits occur normally while your SQL Server instance is
    running and should only be a concern if wait times are a lot higher than normal.


    ### What Is the IO_COMPLETION Wait Type?


    While the `ASYNC_IO_COMPLETION` wait type is recorded when database-related actions
    are performed, like a database backup, `IO_COMPLETION` waits occur when non-data
    pages are involved, like the restore of a transaction log backup or when bitmap
    allocation pages, like the GAM page, are accessed. `IO_COMPLETION` waits can also
    occur when queries are being executed that perform read or write operations to
    the storage subsisted, like a `Merge Join` operator.


    ### IO_COMPLETION Example


    Let’s generate some `IO_COMPLETION` waits by restoring a transaction log backup.
    For this example we will make use of the `AdventureWorks` database again. The
    query in Listing 6-5 will perform a full backup of the `AdventureWorks` database
    , make some changes, and perform a transaction log backup. When that is complete
    we will restore the full backup again, clear the `sys.dm_os_wait_stats` DMV ,
    restore the transaction log backup, and check for `IO_COMPLETION` waits.


    ```

    -- Make sure AdventureWorks is in Full recovery model

    ALTER DATABASE AdventureWorks SET RECOVERY FULL

    GO

    -- Perform full backup first

    -- Otherwise FULL recovery model will not be affected

    BACKUP DATABASE [AdventureWorks]

    TO  DISK = N''F:\Backup\AW_Full.bak''

    GO

    -- Make some changes to AW database

    USE AdventureWorks

    GO

    UPDATE Person.Address

    SET City = ''Portland''

    WHERE City = ''Bothell''

    -- Backup Transaction Log

    BACKUP LOG [AdventureWorks]

    TO  DISK = N''F:\Backup\AW_Log.trn''

    GO

    -- Restore the previous full backup with NORECOVERY

    USE [master]

    GO

    RESTORE DATABASE [AdventureWorks]

    FROM  DISK = N''F:\Backup\AW_Full.bak''

    WITH  NORECOVERY, REPLACE

    GO

    -- Clear sys.dm_os_wait_stats

    dbcc sqlperf (''sys.dm_os_wait_stats'', CLEAR)

    -- Restore last Transaction Log backup

    RESTORE LOG [AdventureWorks] FROM  DISK = N''F:\Backup\AW_Log.trn''

    GO

    -- Check IO_COMPLETION waits

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''IO_COMPLETION''

    Listing 6-5

    Generate IO_Completion waits

    ```


    The results of this query against the `sys.dm_os_wait_stats` DMV on my test system
    can be seen in Figure 6-15.


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig15_HTML.jpg](images/340881_2_En_6_Chapter/340881_2_En_6_Fig15_HTML.jpg)


    Figure 6-15

    IO_COMPLETION waits


    We only modified a few records using the query in Listing 6-5, so the total wait
    time is pretty low since the restore of the transaction log backup occurred fast.


    `IO_COMPLETION` wait times also occur when you are starting up your databases
    after, for instance, a restart of the SQL Server service. This means you should
    expect `IO_COMPLETION` waits after a restart or a failover; these are completely
    normal. Also when AUTO_CLOSE is enabled on a database (default in Express versions)
    and a database is starting, you should experience `IO_COMPLETION` waits.


    ### Lowering IO_COMPLETION Waits


    Most of the time `IO_COMPLETION` waits shouldn’t be a cause for concern. When
    they are a lot higher than the wait times in your baseline, you should analyze
    the storage subsystem performance like I described in the “Lowering `ASYNC_IO_COMPLETION`”
    section. While certain query operations can also cause `IO_COMPLETION` waits,
    these are frequently not the cause for higher-than-normal wait times.


    ### IO_COMPLETION Summary


    Just like the `ASYNC_IO_COMPLETION` wait type, `IO_COMPLETION` waits occur when
    accessing your storage subsystem. `IO_COMPLETION` waits occur when SQL Server
    is waiting on non-data page operations to complete, like a transaction log restore
    operation or the reading of bitmap pages, like the GAM page. Seeing waits of the
    `IO_COMPLETION` type occur is completely normal and these frequently do not require
    deeper analysis unless the wait times are a lot higher than the values in your
    baseline. In those cases focus on the performance (and especially latency) of
    your storage subsystem first.


    ## LOGBUFFER and WRITELOG


    I have combined both `LOGBUFFER` and `WRITELOG` in this section. This is because
    both wait types have a close relation to each other. Both of them are related
    to the transaction log and the storage subsystem.'
  raw: '### Lowering CMEMTHREAD Waits


    Since there are many different memory objects present in SQL Server that could
    potentially generate `CMEMTHREAD` waits, there are many possible solutions to
    lowering `CMEMTHREAD` wait times depending on the memory object that is being
    accessed.


    One of the more common situations where `CMEMTHREAD` waits can occur is when large
    amounts of short, concurrent, ad hoc queries are being executed. Every time an
    ad hoc query is executed that could not be parameterized, the Query Optimizer
    will generate a new execution plan for the query. All these new execution plans
    need to be entered into the procedure cache, and a memory object for allocating
    cache descriptors is accessed. Since the memory object is thread-safe, `CMEMTHREAD`
    waits can occur if the rate of insertion is high enough. A good place to start
    looking if you suspect `CMEMTHREAD` waits are going to occur because of ad hoc
    queries is the procedure cache. The query in Listing [6-4](#340881_2_En_6_Chapter.xhtml#PC6)
    will give you information about the number of execution plans in the procedure
    cache.


    ```

    SELECT

    objtype,

    COUNT_BIG (*) AS ''Total Plans'',

    SUM(CAST(size_in_bytes AS DECIMAL(12,2)))/1024/1024 AS ''Size (MB)''

    FROM sys.dm_exec_cached_plans

    GROUP BY objtype;

    Listing 6-4

    Query procedure cache

    ```


    The results of this query should look like Figure [6-14](#340881_2_En_6_Chapter.xhtml#Fig14),
    though the numbers will be different on your system.


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig14_HTML.jpg](images/340881_2_En_6_Chapter/340881_2_En_6_Fig14_HTML.jpg)


    Figure 6-14


    Results of querying procedure cache


    We should focus on the number of ad hoc execution plans. If you see this number
    growing rapidly and experience `CMEMTHREAD` waits, it might be worth the effort
    to analyze some of those ad hoc queries. If possible, try to optimize the queries
    so they generate a reusable plan. If your application uses many dynamic queries
    then try to use the `sp_executesql` system-stored procedure instead of the `EXECUTE`
    (`EXEC`) command. Using the `EXEC` command will most likely result in a plan that
    will only be used once.


    Microsoft has released various fixes (most notably the partitioning of certain
    memory objects across CPUs) for this problem in SQL Server 2005 SP2, making it
    less common these days. Even if you are using newer SQL Server editions than SQL
    Server 2005, it might be a good idea to upgrade to the latest available Service
    Pack since there have been various memory-related bug fixes in every SQL Server
    edition.


    ### CMEMTHREAD Summary


    The `CMEMTHREAD` wait type is a memory-related wait type. `CMEMTHREAD` waits occur
    when multiple threads try to access memory objects that can only be accessed by
    one thread at a time. The time other threads spend waiting for their turn to access
    the memory object is recorded as `CMEMTHREAD` wait time. One of the more common
    cases where `CMEMTHREAD` waits can occur is when your system uses a high amount
    of ad hoc queries. Every time a new execution plan is generated, SQL Server will
    access a memory object; if many execution plans are generated this can lead to
    a queue of threads that want access to the memory object, resulting in `CMEMTHREAD`
    waits.


    ## IO_COMPLETION


    Just like the `ASYNC_IO_COMPLETION` wait type, `IO_COMPLETION` waits occur when
    SQL Server is waiting for storage-related actions to complete. And just like the
    `ASYNC_IO_COMPLETION` wait type, seeing high wait times of the `IO_COMPLETION`
    wait type doesn’t necessarily mean there is something wrong with your storage
    system. `IO_COMPLETION` waits occur normally while your SQL Server instance is
    running and should only be a concern if wait times are a lot higher than normal.


    ### What Is the IO_COMPLETION Wait Type?


    While the `ASYNC_IO_COMPLETION` wait type is recorded when database-related actions
    are performed, like a database backup, `IO_COMPLETION` waits occur when non-data
    pages are involved, like the restore of a transaction log backup or when bitmap
    allocation pages, like the GAM page, are accessed. IO_COMPLETION waits can also
    occur when queries are being executed that perform read or write operations to
    the storage subsisted, like a `Merge Join` operator.


    ### IO_COMPLETION Example


    Let’s generate some `IO_COMPLETION` waits by restoring a transaction log backup.
    For this example we will make use of the `AdventureWorks` database again. The
    query in Listing [6-5](#340881_2_En_6_Chapter.xhtml#PC7) will perform a full backup
    of the `AdventureWorks` database , make some changes, and perform a transaction
    log backup. When that is complete we will restore the full backup again, clear
    the `sys.dm_os_wait_stats` DMV , restore the transaction log backup, and check
    for `IO_COMPLETION` waits.


    ```

    -- Make sure AdventureWorks is in Full recovery model

    ALTER DATABASE AdventureWorks SET RECOVERY FULL

    GO

    -- Perform full backup first

    -- Otherwise FULL recovery model will not be affected

    BACKUP DATABASE [AdventureWorks]

    TO  DISK = N''F:\Backup\AW_Full.bak''

    GO

    -- Make some changes to AW database

    USE AdventureWorks

    GO

    UPDATE Person.Address

    SET City = ''Portland''

    WHERE City = ''Bothell''

    -- Backup Transaction Log

    BACKUP LOG [AdventureWorks]

    TO  DISK = N''F:\Backup\AW_Log.trn''

    GO

    -- Restore the previous full backup with NORECOVERY

    USE [master]

    GO

    RESTORE DATABASE [AdventureWorks]

    FROM  DISK = N''F:\Backup\AW_Full.bak''

    WITH  NORECOVERY, REPLACE

    GO

    -- Clear sys.dm_os_wait_stats

    dbcc sqlperf (''sys.dm_os_wait_stats'', CLEAR)

    -- Restore last Transaction Log backup

    RESTORE LOG [AdventureWorks] FROM  DISK = N''F:\Backup\AW_Log.trn''

    GO

    -- Check IO_COMPLETION waits

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''IO_COMPLETION''

    Listing 6-5

    Generate IO_Completion waits

    ```


    The results of this query against the `sys.dm_os_wait_stats` DMV on my test system
    can be seen in Figure [6-15](#340881_2_En_6_Chapter.xhtml#Fig15).


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig15_HTML.jpg](images/340881_2_En_6_Chapter/340881_2_En_6_Fig15_HTML.jpg)


    Figure 6-15


    IO_COMPLETION waits


    We only modified a few records using the query in Listing [6-5](#340881_2_En_6_Chapter.xhtml#PC7),
    so the total wait time is pretty low since the restore of the transaction log
    backup occurred fast.


    `IO_COMPLETION` wait times also occur when you are starting up your databases
    after, for instance, a restart of the SQL Server service. This means you should
    expect `IO_COMPLETION` waits after a restart or a failover; these are completely
    normal. Also when AUTO_CLOSE is enabled on a database (default in Express versions)
    and a database is starting, you should experience IO_COMPLETION waits.


    ### Lowering IO_COMPLETION Waits


    Most of the time `IO_COMPLETION` waits shouldn’t be a cause for concern. When
    they are a lot higher than the wait times in your baseline, you should analyze
    the storage subsystem performance like I described in the “Lowering `ASYNC_IO_COMPLETION`”
    section. While certain query operations can also cause `IO_COMPLETION` waits,
    these are frequently not the cause for higher-than-normal wait times.


    ### IO_COMPLETION Summary


    Just like the `ASYNC_IO_COMPLETION` wait type, `IO_COMPLETION` waits occur when
    accessing your storage subsystem. `IO_COMPLETION` waits occur when SQL Server
    is waiting on non-data page operations to complete, like a transaction log restore
    operation or the reading of bitmap pages, like the GAM page. Seeing waits of the
    `IO_COMPLETION` type occur is completely normal and these frequently do not require
    deeper analysis unless the wait times are a lot higher than the values in your
    baseline. In those cases focus on the performance (and especially latency) of
    your storage subsystem first.


    ## LOGBUFFER and WRITELOG


    I have combined both `LOGBUFFER` and `WRITELOG` in this section. This is because
    both wait types have a close relation to each other. Both of them are related
    to the transaction log and the storage subsystem.'
  trans: '

    ### 降低 CMEMTHREAD 等待


    由于 SQL Server 中存在许多可能产生 `CMEMTHREAD` 等待的不同内存对象，因此降低 `CMEMTHREAD` 等待时间的解决方案也有很多，具体取决于被访问的内存对象。


    发生 `CMEMTHREAD` 等待的一个更常见情况是，系统正在执行大量短小的、并发的、即席查询。每次执行一个无法参数化的即席查询时，查询优化器都会为该查询生成一个新的执行计划。所有这些新的执行计划都需要被输入到过程缓存中，并且会访问一个用于分配缓存描述符的内存对象。由于该内存对象是线程安全的，如果插入速率足够高，就可能出现
    `CMEMTHREAD` 等待。如果你怀疑 `CMEMTHREAD` 等待是由于即席查询导致的，一个很好的切入点就是检查过程缓存。清单 6-4 中的查询将为你提供有关过程缓存中执行计划数量的信息。


    ```

    SELECT

    objtype,

    COUNT_BIG (*) AS ''Total Plans'',

    SUM(CAST(size_in_bytes AS DECIMAL(12,2)))/1024/1024 AS ''Size (MB)''

    FROM sys.dm_exec_cached_plans

    GROUP BY objtype;

    清单 6-4

    查询过程缓存

    ```


    该查询的结果应如图 6-14 所示，尽管在你的系统上数字会有所不同。


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig14_HTML.jpg](img/340881_2_En_6_Fig14_HTML.jpg)


    图 6-14

    查询过程缓存的结果


    我们应该关注即席执行计划的数量。如果你看到这个数字在快速增长，并且遇到 `CMEMTHREAD` 等待，那么分析其中一些即席查询可能是值得的。如果可能，尝试优化查询以生成可重用的计划。如果你的应用程序使用了许多动态查询，那么请尝试使用
    `sp_executesql` 系统存储过程，而不是 `EXECUTE` (`EXEC`) 命令。使用 `EXEC` 命令很可能只会生成使用一次的计划。


    Microsoft 已经在 SQL Server 2005 SP2 中针对此问题发布了各种修复（最显著的是跨 CPU 分区某些内存对象），使得如今这种情况变得不那么常见。即使你使用的是比
    SQL Server 2005 更新的版本，升级到最新的可用 Service Pack 可能也是一个好主意，因为每个 SQL Server 版本中都有各种与内存相关的错误修复。


    ### CMEMTHREAD 总结


    `CMEMTHREAD` 等待类型是一种与内存相关的等待类型。当多个线程尝试访问一次只能由一个线程访问的内存对象时，就会发生 `CMEMTHREAD` 等待。其他线程等待轮到自己访问内存对象的时间被记录为
    `CMEMTHREAD` 等待时间。发生 `CMEMTHREAD` 等待的一个更常见情况是系统使用大量即席查询。每次生成新的执行计划时，SQL Server
    都会访问一个内存对象；如果生成了许多执行计划，这可能会导致想要访问该内存对象的线程排队，从而导致 `CMEMTHREAD` 等待。


    ## IO_COMPLETION


    与 `ASYNC_IO_COMPLETION` 等待类型类似，当 SQL Server 正在等待存储相关操作完成时，会发生 `IO_COMPLETION`
    等待。同样，与 `ASYNC_IO_COMPLETION` 等待类型类似，看到 `IO_COMPLETION` 等待类型的等待时间很长，并不一定意味着你的存储系统有问题。`IO_COMPLETION`
    等待在 SQL Server 实例运行期间会正常发生，只有当等待时间比正常情况高出很多时，才应该引起关注。


    ### IO_COMPLETION 等待类型是什么？


    `ASYNC_IO_COMPLETION` 等待类型在执行数据库相关操作（如数据库备份）时被记录，而 `IO_COMPLETION` 等待则在涉及非数据页时发生，例如还原事务日志备份或访问位图分配页（如
    GAM 页）。当执行需要对存储子系统进行读写操作（例如 `Merge Join` 运算符）的查询时，也可能发生 `IO_COMPLETION` 等待。


    ### IO_COMPLETION 示例


    让我们通过还原一个事务日志备份来生成一些 `IO_COMPLETION` 等待。在这个例子中，我们将再次使用 `AdventureWorks` 数据库。清单
    6-5 中的查询将执行 `AdventureWorks` 数据库的完整备份，进行一些更改，然后执行事务日志备份。完成后，我们将再次还原完整备份，清除 `sys.dm_os_wait_stats`
    DMV，还原事务日志备份，并检查 `IO_COMPLETION` 等待。


    ```

    -- 确保 AdventureWorks 处于完整恢复模式

    ALTER DATABASE AdventureWorks SET RECOVERY FULL

    GO

    -- 首先执行完整备份

    -- 否则完整恢复模式将不会生效

    BACKUP DATABASE [AdventureWorks]

    TO  DISK = N''F:\Backup\AW_Full.bak''

    GO

    -- 对 AW 数据库进行一些更改

    USE AdventureWorks

    GO

    UPDATE Person.Address

    SET City = ''Portland''

    WHERE City = ''Bothell''

    -- 备份事务日志

    BACKUP LOG [AdventureWorks]

    TO  DISK = N''F:\Backup\AW_Log.trn''

    GO

    -- 使用 NORECOVERY 还原之前的完整备份

    USE [master]

    GO

    RESTORE DATABASE [AdventureWorks]

    FROM  DISK = N''F:\Backup\AW_Full.bak''

    WITH  NORECOVERY, REPLACE

    GO

    -- 清除 sys.dm_os_wait_stats

    dbcc sqlperf (''sys.dm_os_wait_stats'', CLEAR)

    -- 还原上次的事务日志备份

    RESTORE LOG [AdventureWorks] FROM  DISK = N''F:\Backup\AW_Log.trn''

    GO

    -- 检查 IO_COMPLETION 等待

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''IO_COMPLETION''

    清单 6-5

    生成 IO_Completion 等待

    ```


    在我的测试系统上，针对 `sys.dm_os_wait_stats` DMV 的此查询结果如图 6-15 所示。


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig15_HTML.jpg](img/340881_2_En_6_Fig15_HTML.jpg)


    图 6-15

    IO_COMPLETION 等待


    我们使用清单 6-5 中的查询只修改了几个记录，因此由于事务日志备份还原得很快，总等待时间相当低。


    `IO_COMPLETION` 等待时间也可能在启动数据库后发生，例如在重新启动 SQL Server 服务之后。这意味着在重新启动或故障转移后，你应该预期会出现
    `IO_COMPLETION` 等待；这些都是完全正常的。同样，如果数据库启用了 AUTO_CLOSE（Express 版本中的默认设置）并且数据库正在启动，你也应该会经历
    `IO_COMPLETION` 等待。


    ### 降低 IO_COMPLETION 等待


    大多数情况下，`IO_COMPLETION` 等待不应该引起关注。当它们远高于基线中的等待时间时，你应该像在“降低 `ASYNC_IO_COMPLETION`”一节中描述的那样，分析存储子系统的性能。虽然某些查询操作也可能导致
    `IO_COMPLETION` 等待，但它们通常不是导致等待时间高于正常水平的原因。


    ### IO_COMPLETION 总结


    与 `ASYNC_IO_COMPLETION` 等待类型类似，当访问存储子系统时，会发生 `IO_COMPLETION` 等待。当 SQL Server 正在等待非数据页操作（如事务日志还原操作或读取位图页，例如
    GAM 页）完成时，会发生 `IO_COMPLETION` 等待。看到 `IO_COMPLETION` 类型的等待是完全正常的，除非等待时间远高于基线值，否则这些通常不需要深入分析。在那些情况下，首先关注存储子系统的性能（尤其是延迟）。


    ## LOGBUFFER 和 WRITELOG


    我在本节中合并了 `LOGBUFFER` 和 `WRITELOG`。这是因为这两种等待类型彼此密切相关。两者都与事务日志和存储子系统有关。

    '
- fmt: '### What Are the LOGBUFFER and WRITELOG Wait Types?


    To understand what the `LOGBUFFER` and `WRITELOG` wait types represent, we need
    to have some understanding of how SQL Server writes to the transaction log. In
    short, the following events happen whenever we change or add data inside a database:


    1.  Data page where the data resides is modified in the buffer cache; if the page
    wasn’t already in the buffer cache, it will get read into the buffer cache first.

    2.  The data page will be marked as “dirty” inside the buffer cache.

    3.  The log records that represent the modification get saved in the log buffer.

    4.  A log flush occurs (this can be for multiple reasons, which we will discuss
    later), writing the log records from the log buffer to the transaction log.

    5.  The dirty data page gets written to the data file.


    To show this behavior I have included Figure 6-16.


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig16_HTML.jpg](images/340881_2_En_6_Chapter/340881_2_En_6_Fig16_HTML.jpg)

    Figure 6-16

    How a transaction moves


    The action representing the movement of a dirty data page and the action of writing
    the log records to the transaction log are shown as dashed lines. I did this on
    purpose to illustrate that both of these actions do not necessarily happen directly.


    As you probably know, dirty data pages are updated inside the buffer cache first,
    and are only written to the data file when a checkpoint operation occurs. This
    means that a dirty page can stay inside the memory even after your transaction
    was committed.


    This is not true for log records inside the log buffer. As soon as your transaction
    commits, and that transaction has an active log record in the log buffer, all
    the log records inside that log buffer are written (or flushed) to the transaction
    log on disk. But this doesn’t only occur when the transaction is committed. The
    log buffer has a fixed size of 60 KB, and as soon as the log buffer is full, it
    will flush all the records inside it to the transaction log.


    Let’s add both wait types we are discussing in this section to the story. The
    `WRITELOG` wait type occurs whenever SQL Server is flushing the contents of the
    log buffer to the transaction log on disk. The `LOGBUFFER` wait type occurs when
    inserting log records in the log buffer, when at the time of insertion SQL Server
    has to wait for free space inside the log buffer. I have added both the wait types
    at the parts where they can get generated in Figure 6-17.


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig17_HTML.jpg](images/340881_2_En_6_Chapter/340881_2_En_6_Fig17_HTML.jpg)

    Figure 6-17

    Transaction movement and the LOGBUFFER and WRITELOG wait types


    You can now probably see how both wait types are related. Whenever a long `WRITELOG`
    wait occurs, chances are you will also see `LOGBUFFER` waits if the process that
    is writing the log records to the transaction log on disk cannot process them
    as fast as the log records enter the log buffer.


    This situation frequently occurs on systems with a lot of concurrent data modifications.
    This results in a high volume of transactions that need to be written to disk.
    Another common cause is the performance of the storage subsystem where the transaction
    log file resides. If the storage subsystem has suboptimal performance, your `WRITELOG`
    wait times will increase, with the possibility existing that `LOGBUFFER` waits
    can occur if the volume of transactions is high enough.


    The performance of your transaction log is critical for the performance of your
    entire database. Slow transaction log performance will have an impact on every
    change you perform inside your database, as every modification has to be written
    to the transaction log before it can get committed.


    ### LOGBUFFER and WRITELOG Example


    To give you an example of `LOGBUFFER` and `WRITELOG` waits occurring, I am creating
    a new database using the script in Listing 6-6.


    ```

    USE master

    GO

    -- Create demo database

    CREATE DATABASE [trans_demo]

    ON PRIMARY

    (

    NAME = N''trans_demo'', FILENAME = N''D:\Data\trans_demo.mdf'' , SIZE = 153600KB
    , FILEGROWTH = 10%

    )

    LOG ON

    (

    NAME = N''trans_demo_log'', FILENAME = N''D:\Log\trans_demo.ldf'' , SIZE = 51200KB
    , FILEGROWTH = 10%

    )

    GO

    -- Make sure recovery model is set to full

    ALTER DATABASE [trans_demo] SET RECOVERY FULL

    GO

    -- Perform full backup first

    -- Otherwise FULL recovery model will not be affected

    BACKUP DATABASE [trans_demo]

    TO  DISK = N''F:\Backup\trans_demo_Full.bak''

    GO

    -- Create a simple test table

    USE trans_demo

    GO

    CREATE TABLE transactions

    (

    t_guid VARCHAR(50)

    )

    GO

    ```

    Listing 6-6

    Create trans_demo database


    Now that we have created a brand new database, I am going to use the Ostress utility
    to generate load against the `trans_demo` database. I am going to execute the
    query in Listing 6-7, which I saved to the `logbuffer_impl.sql` file, with 200
    concurrent connections using the following command `"C:\Program Files\Microsoft
    Corporation\RMLUtils\ostress.exe" -E -dtrans_demo -i"C:\logbuffer_impl.sql" -n200
    -r1 -q`.


    ```

    DECLARE @i INT

    SET @i = 1

    WHILE @i < 10000

    BEGIN

    INSERT INTO transactions

    (t_guid)

    VALUES

    (newid())

    SET @i = @i + 1

    END

    ```

    Listing 6-7

    Insert rows inside the trans_demo database


    Before I started the Ostress utility, I cleared the `sys.dm_os_wait_stats` DMV.


    After about 1 minute on my test SQL Server, the Ostress utility finished executing
    the workload. If I query the `sys.dm_os_wait_stats` DMV and look for the `LOGBUFFER`
    and `WRITELOG` wait types, I get the results shown in Figure 6-18.


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig18_HTML.jpg](images/340881_2_En_6_Chapter/340881_2_En_6_Fig18_HTML.jpg)

    Figure 6-18

    WRITELOG and LOGBUFFER waits'
