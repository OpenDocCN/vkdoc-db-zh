    task began running. The task was then mapped to a worker thread that was then
    also in a running state. This meant that this query began being processed on a
    processor. The `Scheduler Address` column shows on which specific scheduler our
    worker thread was being run.'
  trans: '

    ### 调度器


    `调度器`组件的主要任务是——正如其名——将工作（以任务的形式）调度到物理处理器上。当一个任务请求处理器时间时，正是调度器为该任务分配工作线程，以便请求得到处理。它还负责确保工作线程相互协作，并在它们分配到的时间片（或称为量程）到期时让出处理器。我们称此为**协同调度**。工作线程在其处理器时间到期时必须让出的原因在于，调度器一次只允许一个工作线程在处理器上运行。如果工作线程无需让出，一个工作线程可能无限期地占用处理器，从而阻塞对该处理器的所有使用。


    处理器与调度器之间是一一对应的关系。如果你的系统有两个处理器，每个处理器有四个核心，那么 SQLOS 将可以使用八个调度器来处理用户请求，每个调度器映射到一个逻辑处理器。


    我们可以通过查询 `sys.dm_os_schedulers` DMV（动态管理视图）来获取关于调度器的信息：


    ```sql

    SELECT * FROM sys.dm_os_schedulers;

    ```


    查询结果如图 1-11 所示。


    ![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig11_HTML.jpg](img/340881_2_En_1_Fig11_HTML.jpg)


    图 1-11


    `sys.dm_os_schedulers` 查询结果


    我运行此查询的 SQL Server 实例有一个双核处理器，这意味着应该有两个调度器可以处理我的用户请求。然而，如果我们查看图 1-11，会注意到查询返回的调度器不止两个。SQL
    Server 使用其自己的调度器来执行内部任务，这些调度器也会被 DMV 返回，并在其 `status` 列中标记为“HIDDEN ONLINE”。可供用户请求使用的调度器在
    DMV 中被标记为“VISIBLE ONLINE”。还有一种特殊类型的调度器，其 `status` 为“VISIBLE ONLINE (DAC)”。这是一个专用于**专用管理员连接**的调度器。当
    SQL Server 无响应时（例如，处理用户请求的调度器上没有空闲的工作线程），此调度器可以让你连接到 SQL Server。


    通过查看 `current_workers_count` 列，我们可以看到一个调度器关联了多少个工作线程。这个数字也包括了未执行任何工作的工作线程。`active_workers_count`
    向我们显示了在特定调度器上处于活动状态的工作线程。这并不意味着它们实际在处理器上运行，因为状态为“RUNNING”、“RUNNABLE”和“SUSPENDED”的工作线程也会计入此数字。`work_queue_count`
    也是一个有趣的列，因为它能让你了解有多少任务正在等待空闲的工作线程。如果你在此列中看到较大的数字，可能意味着你正经历 CPU 压力。


    ### 综合概述


    到目前为止，我们讨论的 SQL Server 调度的所有部分都是相互关联的，每个请求都经过这些相同的组件。以下文本是一个查询请求如何被处理的示例。


    用户通过应用程序连接到 SQL Server。登录过程成功完成后，SQL Server 将为该用户创建一个会话。当用户向 SQL Server 发送查询时，将创建一个任务和一个请求来表示需要完成的工作单元。调度器将为该任务分配工作线程以便完成。


    为了在 SQL Server 中查看所有这些信息，我们可以连接一些使用过的 DMV。代码清单 1-1 中的查询将向你展示一个示例，说明如何组合不同的 DMV
    来获取特定会话（本例中为 ID 是 55 的会话）的调度信息。


    ```sql

    SELECT

    r.session_id AS ''会话 ID'',

    r.command AS ''请求类型'',

    qt.[text] AS ''查询文本'',

    t.task_address AS ''任务地址'',

    t.task_state AS ''任务状态'',

    w.worker_address AS ''工作线程地址'',

    w.[state] AS ''工作线程状态'',

    s.scheduler_address AS ''调度器地址'',

    s.[status] AS ''调度器状态''

    FROM sys.dm_exec_requests r

    CROSS APPLY sys.dm_exec_sql_text(r.sql_handle) qt

    INNER JOIN sys.dm_os_tasks t

    ON r.task_address = t.task_address

    INNER JOIN sys.dm_os_workers w

    ON t.worker_address = w.worker_address

    INNER JOIN sys.dm_os_schedulers s

    ON w.scheduler_address = s.scheduler_address

    WHERE r.session_id = 55

    ```


    代码清单 1-1


    连接不同的 DMV 以查询调度信息


    图 1-12 显示了在我的测试 SQL Server 上该查询返回的信息。为了保持结果可读性，我只选择了 DMV 中的一些列来展示它们之间的关系。


    ![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig12_HTML.jpg](img/340881_2_En_1_Fig12_HTML.jpg)


    图 1-12


    代码清单 1-1 中查询的结果


    在结果中，我们可以看到会话 ID 53 发起了一个 `SELECT` 查询请求。我使用了 `sys.dm_exec_sql_text` 动态管理对象进行交叉应用，以显示该请求的查询文本。该请求映射到了一个任务，并且该任务已开始运行。然后，该任务映射到一个工作线程，该工作线程当时也处于运行状态。这意味着此查询开始在处理器上被处理。`调度器地址`
    列显示了我们的工作线程在哪个特定的调度器上运行。

    '
- fmt: '## Wait Statistics


    So far, we have gone pretty deep into the different components that perform scheduling
    for SQL Server and how they are interconnected, but we haven’t given a lot of
    attention to the topic of this book: wait statistics.


    In the section about worker threads earlier in this chapter, I described the states
    a worker thread can be in while it is performing work on a scheduler. When a worker
    thread is performing its work, it goes through three different phases (or queues)
    in the scheduler process. Depending on the phase (or queue) a worker thread is
    in, it will get either the "RUNNING," "RUNNABLE," or "SUSPENDED" state. Figure
    1-13 shows an abstract view of a scheduler with the three different phases.


    ![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig13_HTML.jpg](images/340881_2_En_1_Chapter/340881_2_En_1_Fig13_HTML.jpg)


    Figure 1-13: Scheduler and its phases and queues


    When a worker thread gets access to a scheduler it will generally start in the
    Waiter List and get the "SUSPENDED" state. The `Waiter List` is an unordered list
    of worker threads that have the "SUSPENDED" state and are waiting for resources
    to become available. Those resources can be just about anything on the system,
    from data pages to a lock request. While a worker thread is in the `Waiter List`
    the SQLOS records the type of resource it needs to continue its work (the wait
    type) and the time it spends waiting before that specific resource becomes available,
    known as the `resource wait time`.


    Whenever a worker thread receives access to the resources it needs, it will move
    to the `Runnable Queue`, a first-in-first-out list of all the worker threads that
    have access to their resources and are ready to be run on the processor. The time
    a worker thread spends in the `Runnable Queue` is recorded as the `signal wait
    time`.


    The first worker thread in the `Runnable Queue` will move to the "RUNNING" phase,
    where it will receive processor time to perform its work. The time it spends on
    the processor is recorded as `CPU time`. In the meantime, the other worker threads
    in the `Runnable Queue` will move a spot higher in the list, and worker threads
    that have received their requested resources will move from the `Waiter List`
    into the `Runnable Queue`.


    While a worker thread is in the "RUNNING" phase there are three scenarios that
    can happen:


    *   The worker thread needs additional resources; in this case it will move from
    the "RUNNING" phase to the `Waiter List`.

    *   The worker thread spends its quantum (fixed value of 4 milliseconds) and has
    to yield; the worker thread is moved to the bottom of the `Runnable Queue`.

    *   The worker thread is done with its work and will leave the scheduler.


    Worker threads move through the three different phases all the time, and it is
    very common that one worker thread moves through them multiple times until its
    work is done.


    Figure 1-14 will show you the scheduler view from Figure 1-13 combined with the
    different types of wait time and the flow of worker threads.


    ![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig14_HTML.jpg](images/340881_2_En_1_Chapter/340881_2_En_1_Fig14_HTML.jpg)


    Figure 1-14: Scheduler view complete with wait times and worker thread flow


    Knowing all the different lengths of time a request spends in one of the three
    different phases makes it possible to calculate the total request execution time,
    and also the total time a request had to wait for either processor time or resource
    time. Figure 1-15 shows the calculation of the total execution time and its different
    parts.


    ![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig15_HTML.jpg](images/340881_2_En_1_Chapter/340881_2_En_1_Fig15_HTML.jpg)


    Figure 1-15: Request execution time calculation


    Since there is a lot of terminology involved into the scheduling of worker threads
    in SQL Server, I would like to give you an example on how worker threads move
    through a scheduler.


    Figure 1-16 will show you an abstract image of a scheduler like those we have
    already looked at, but this time I added requests that are being handled by that
    scheduler.


    ![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig16_HTML.jpg](images/340881_2_En_1_Chapter/340881_2_En_1_Fig16_HTML.jpg)


    Figure 1-16: Scheduler with running requests


    In this example we see that the request from `SID` (Session ID) 76 is currently
    being executed on the processor; this request will have the state "RUNNING." There
    are two other requests, `SID 83` and `SID 51`, in the `Waiter List` waiting for
    their requested resources. The wait types they are waiting for are `LCK_M_S` and
    `CXPACKET`. I won’t go into detail here about these wait types since we will be
    covering both of them in Part II of this book. While these two sessions are in
    the `Waiter List`, SQL Server will be recording the time they spend there as wait
    time, and the wait type will be noted as the representation of the resource they
    are waiting on. If we were to query information about these two threads, they
    would both have the "SUSPENDED" state. `SID 59`, `SID 98`, and `SID 74` have their
    resources ready and are waiting in the `Runnable Queue` for `SID 76` to complete
    its work on the processor. While they are waiting in the `Runnable Queue`, SQL
    Server records the time they spend there as the signal wait time and adds that
    time to the total wait time. These three worker threads will have the status of
    "RUNNABLE."


    In Figure 1-17 we have moved a few milliseconds forward in time; notice how the
    scheduler and worker threads have moved through the different phases and queues.


    ![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig17_HTML.jpg](images/340881_2_En_1_Chapter/340881_2_En_1_Fig17_HTML.jpg)


    Figure 1-17: Scheduler a few milliseconds later


    `SID 76` completed its time on the processor; it didn’t need any additional resources
    to complete its request and thus left the scheduler. `SID 59` was the first worker
    thread in the `Runnable Queue`, and now that the processor is free it will move
    from the `Runnable Queue` to the processor, and its state will change from "RUNNABLE"
    to "RUNNING." `SID 51` is done waiting on the `CXPACKET` wait type and moved from
    the `Waiter List` to the bottom of the `Runnable Queue`, changing its state from
    "SUSPENDED" to "RUNNABLE."


    ## Summary


    In this chapter we took a look at the history of wait statistics throughout various
    versions of SQL Server. Even though the method of analyzing SQL Server performance
    using wait statistics is relatively new, wait statistics have been a part of the
    SQL Server engine for a very long time.


    With the introduction of the SQLOS in SQL Server 2005 a lot changed in how SQL
    Server processed requests, introducing schedulers, worker threads, and tasks.
    All the information for the various parts are stored in Dynamic Management Views
    (`DMVs`) or Dynamic Management Functions (`DMFs`), which are easily queried and
    return a lot of information about the internals of SQL Server.


    Using these `DMVs`, we can view the progress of requests while they are being
    handled by a SQL Server scheduler and learn if they are waiting for any specific
    resources. The resources the requests are waiting for and the time they spend
    waiting for those resources are recorded as wait statistics, which is the main
    topic of this book.'
