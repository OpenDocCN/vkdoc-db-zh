- fmt: '# Book Layout


    As I wrote in the introduction, the goal of this book is to give you a deeper
    understanding of SQL Server wait statistics and also to describe various wait
    statistics in detail. For this reason this book has been split up into two parts,
    Part I describing the foundation of wait statistics analysis and Part II describing
    various specific wait statistics in detail. I tried to categorize the wait statistics
    in Part II by the part of the system they affect (i.e., `CPU`, `Memory`, etc.).
    Some wait statistics aren’t that easily categorized, since they can affect multiple
    system parts. In those cases, I tried to categorize them with the part they have
    the most effect on.


    ## Part I: Foundations of Wait Statistics Analysis


    - Chapter `1`: “Wait Statistics Internals” starts off with a brief history of
    SQL Server wait statistics and a look at the `SQLOS` architecture. Because wait
    statistics have a close relationship with the processor(s) of your system, we
    will discuss schedulers, tasks, and worker threads in detail.


    - Chapter `2`: “Querying SQL Server Wait Statistics” introduces the various ways
    you can access the wait statistics information inside the SQL Server Database
    Engine by using `DMVs`, Extended Events, and `Perfmon`.


    - Chapter `3`: “The Query Store” explores a new SQL Server feature that became
    available in SQL Server 2016, the `Query Store`. Since the `Query Store` can have
    a massive impact on how you perform performance analysis, I dedicated a chapter
    on how you can use this amazing new feature.


    - Chapter `4`: “Building a Solid Baseline” covers the importance of building and
    using a baseline for performance troubleshooting. Baselines are especially important
    when analyzing wait statistics, and I will show you examples of how you can create
    one for wait statistics analysis.


    ## Part II: Wait Types


    - Chapter `5`: “CPU-Related Wait Types” introduces wait types that are CPU related.


    - Chapter `6`: “IO-Related Wait Types” describes wait types that are IO related.


    - Chapter `7`: “Backup-Related Wait Types” presents the wait types that are related
    to backup events.


    - Chapter `8`: “Lock-Related Wait Types” starts off with a short introduction
    to locking and blocking in SQL Server before diving into the lock-related wait
    types.


    - Chapter `9`: “Latch-Related Wait Types” starts off with a close look at latches,
    describing what they are and how they work inside SQL Server. After this introduction
    we are ready to take a look at different latch-related wait types.


    - Chapter `10`: “High-Availability and Disaster-Recovery Wait Types” describes
    wait types that are related to the various `HA` and `DR` configurations available
    in SQL Server.


    - Chapter `11`: “Preemptive Wait Types” presents different wait types that have
    a direct relationship with the operating system of your SQL Server.


    - Chapter `12`: “Background and Miscellaneous Wait Types” includes various wait
    types that are being generated by the `SQLOS` as a background process. This is
    also the chapter where we will describe wait types that couldn’t be categorized
    in one of the preceding categories.


    - Chapter `13`: “In-Memory OLTP–Related Wait Types” describes some of the wait
    types that are related to the `In-Memory OLTP` feature which was released in SQL
    Server 2014.


    - Appendix I: “Example SQL Server Machine Configurations” describes the configuration
    of the virtual machines I used in the book.


    - Appendix II: “Spinlocks” explains the working of so-called lightweight synchronization
    primitives called spinlocks and the impact they can have on your SQL Server configuration.


    - Appendix III: “Latch Classes” contains a list of a large portion of different
    latch classes inside SQL Server. The list is a combination of information from
    Books Online and additional information about the specific latch class.


    ## Word of Warning


    The way we access wait statistics information in this book is mostly by SQL queries.
    For this reason this book has quite a lot of lines of SQL code. Most of the queries
    in Part I of this book deal with gathering or capturing wait statistics using
    Dynamic Management Views (or `DMVs`) and as such are, unless stated otherwise,
    harmless. Some of the queries in Part II, however, are written to actually harm
    performance so specific wait types can be demonstrated. Please keep this in mind
    when you plan to use some of the scripts and test them thoroughly on a test system.


    ## Acknowledgments


    First and foremost, I want to thank my family for supporting me while writing
    this book. They had some experience in that area from when I worked on the first
    edition of this book, but writing the second edition of this book still proved
    to be a big undertaking.


    I want to thank Apress, especially Jonathan and Jill, for helping me write this
    book. When Jonathan asked me whether I was interested in updating the first edition,
    I could only answer with a “yes!”. So many things in SQL Server changed in the
    4 years between the first edition and this book, and being able to update the
    book to reflect those changes means a lot to me.


    A big thanks goes out to the technical editors, Eelco Drost and Borbala Toth-Apathy.
    The comments they provided helped clarify a lot of areas inside this book and
    resulted in a far higher quality.


    Finally, a massive shout-out to the SQL Server community. You are a technical
    community that has no equal, and I am honored to be a part of it.


    ### About the Author and About the Technical Reviewers


    ### About the Author


    ### About the Technical Reviewers


    ## Part I: Foundations of Wait Statistics Analysis'
