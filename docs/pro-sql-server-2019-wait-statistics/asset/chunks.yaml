    create a baseline we can use in our wait statistics analysis. As I mentioned at
    the beginning of this chapter, baselines are incredibly important if you want
    to analyze performance problems using wait statistics. Nobody has the same wait
    types and wait times compared to your system, so it’s up to you to create a baseline
    you can compare against.


    In this section I will show you a method I use to create, maintain, and compare
    baselines and measurements. This does not necessarily mean this is the right way
    to do it, and you might find other methods better suited to your needs.


    Since we are going to capture SQL Server wait statistics measurements , I prefer
    to store my measurements inside a separate database named “Baseline.” This way
    my measurement information doesn’t get stored somewhere between user tables. Since
    wait statistics are logged at the SQL Server instance level, it makes sense to
    create a separate measurement database inside every SQL Server instance. Figure
    [4-4](#340881_2_En_4_Chapter.xhtml#Fig4) shows you my baseline database inside
    the SQL Server Management Studio.


    ![../images/340881_2_En_4_Chapter/340881_2_En_4_Fig4_HTML.jpg](images/340881_2_En_4_Chapter/340881_2_En_4_Fig4_HTML.jpg)


    Figure 4-4


    Baseline database


    You can create the database yourself using the script in Listing [4-1](#340881_2_En_4_Chapter.xhtml#PC1),
    making sure to change the file locations. The database data file will be 1.5 GB
    when it gets created, which gives enough free space to capture weeks of wait statistics
    information.


    ```

    -- Create Baseline database

    CREATE DATABASE [Baseline]

    ON PRIMARY

    (

    NAME = N''Baseline'', FILENAME = N''E:\Data\baseline_data.mdf'' , SIZE = 1536000KB
    , FILEGROWTH = 10%

    )

    LOG ON

    (

    NAME = N''Baseline_log'', FILENAME = N''E:\Log\baseline_log.ldf'' , SIZE = 102400KB
    , FILEGROWTH = 10%

    )

    GO

    ALTER DATABASE [Baseline] SET RECOVERY SIMPLE

    GO

    Listing 4-1

    Creating the Baseline database

    ```


    We will be using the `sys.dm_os_wait_stats` DMV as the source of our measurements,
    which means that the table that will hold our measurements must be able to handle
    the information returned from the DMV. We will not only store the wait types and
    wait times but will also add additional information to enrich the data so that
    we can easily create multiple baselines.


    Listing [4-2](#340881_2_En_4_Chapter.xhtml#PC2) shows the query you can use to
    create a table, named `WaitStats`, to hold the wait statistics information we
    will use for creating our baselines.


    ```

    USE [BaseLine]

    GO

    CREATE TABLE WaitStats

    (

    ws_ID INT IDENTITY(1,1) PRIMARY KEY,

    ws_DateTime DATETIME,

    ws_Day INT,

    ws_Month INT,

    ws_Year INT,

    ws_Hour INT,

    ws_Minute INT,

    ws_DayOfWeek VARCHAR(15),

    ws_WaitType VARCHAR(50),

    ws_WaitTime INT,

    ws_WaitingTasks INT,

    ws_SignalWaitTime INT

    )

    Listing 4-2

    Create a wait statistics table

    ```


    As you can read in the listing, we capture the wait type, wait time, signal wait
    time, and the number of waiting tasks. We also capture the date and time when
    we log the wait statistics information. We also split the date and time into additional
    columns to segment the data, making it easier to build specific baselines based
    on a specific day, hour, month, and so forth, without having to convert the `datetime`
    data type every time.


    Now that we have our table ready, it is time to capture some wait statistics and
    insert them into our `WaitStats` table. Because the `sys.dm_os_wait_stats` DMV
    returns cumulative wait times, we have to use a method to only capture the difference
    in wait time between two capture moments. If we were to only capture the information
    directly from the `sys.dm_os_wait_stats` DMV, we would always receive ever-increasing
    wait times, and that would make comparisons useless. There are two paths we can
    take to capture the change in wait time between two measurements, and both have
    their advantages and disadvantages.


    The first method, which I call the reset method, will capture the wait statistics
    information from the `sys.dm_os_wait_stats` DMV and then reset the DMV using the
    `DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR)` command. The main advantage of
    this method is that it is very simple to use, as we only need to capture the information,
    reset it again, and start the same procedure at the next measurement. There is
    no need to calculate deltas, because after our first measurement the counters
    are reset to 0\. The disadvantage is that the `DBCC SQLPERF(''sys.dm_os_wait_stats'',
    CLEAR)` command resets the information inside the `sys.dm_os_wait_stats` DMV.
    This means that you will lose the cumulative information inside the DMV, information
    you might not want to lose. Figure [4-5](#340881_2_En_4_Chapter.xhtml#Fig5) illustrates
    this method of wait statistics capturing.


    ![../images/340881_2_En_4_Chapter/340881_2_En_4_Fig5_HTML.jpg](images/340881_2_En_4_Chapter/340881_2_En_4_Fig5_HTML.jpg)


    Figure 4-5


    Capturing wait statistics using the reset method


    The second option, which I named the delta method, involves not using the `DBCC
    SQLPERF(''sys.dm_os_wait_stats'', CLEAR)` command, but rather calculating the
    difference, or delta, in wait time between two measurements. The advantage of
    not using the `DBCC` command is that you will not lose the cumulative wait times
    inside the `sys.dm_os_wait_stats` DMV. Its main disadvantage is that it is a lot
    more complex to calculate the deltas compared to the first method. It usually
    also involves a `WAITFOR DELAY` command inside the T-SQL script to set the interval.
    This might mean that if you plan to capture wait statistics information using
    the SQL Server Agent, you could end up with a SQL Server Agent job that is running
    almost continuously. Figure [4-6](#340881_2_En_4_Chapter.xhtml#Fig6) illustrates
    the delta option of capture wait statistics.


    ![../images/340881_2_En_4_Chapter/340881_2_En_4_Fig6_HTML.jpg](images/340881_2_En_4_Chapter/340881_2_En_4_Fig6_HTML.jpg)


    Figure 4-6


    Capturing wait statistics using the delta method


    There are more methods available with which to capture wait statistics information,
    but I most frequently see these two, or variations of them. What method you want
    to use is up to you, as in the end both will return the same results.


    ### Reset Capture Method


    The reset wait statistics capture method consists of a single T-SQL script that
    will capture the information from the `sys.dm_os_wait_stats` DMV followed by a
    reset of the counters inside the DMV. Listing [4-3](#340881_2_En_4_Chapter.xhtml#PC3)
    shows the T-SQL script you can use to fill the `WaitStats` table we created earlier.


    ```

    USE [Baseline]

    GO

    -- Insert Wait Stats into Baseline table

    INSERT INTO WaitStats

    SELECT

    GETDATE() AS ''DateTime'',

    DATEPART(DAY,GETDATE()) AS ''Day'',

    DATEPART(MONTH,GETDATE()) AS ''Month'',

    DATEPART(YEAR,GETDATE()) AS ''Year'',

    DATEPART(HOUR, GETDATE()) AS ''Hour'',

    DATEPART(MINUTE, GETDATE()) AS ''Minute'',

    DATENAME(DW, GETDATE()) AS ''DayOfWeek'',

    wait_type AS ''WaitType'',

    wait_time_ms AS ''WaitTime'',

    waiting_tasks_count AS ''WaitingTasks'',

    signal_wait_time_ms AS ''SignalWaitTime''

    FROM sys.dm_os_wait_stats;

    -- Clear sys.dm_os_wait_stats

    DBCC SQLPERF (''sys.dm_os_wait_stats'',CLEAR)

    GO

    Listing 4-3

    Reset capture method

    ```'
  trans: '

    ## 为等待统计分析建立基线


    既然我们已经熟悉了基线的概念，现在让我们开始工作，创建一个可用于等待统计分析的基线。正如我在本章开头所提到的，如果你想使用等待统计信息来分析性能问题，基线是极其重要的。没有人的系统与你的系统拥有完全相同的等待类型和等待时间，因此你需要创建一个可以用于比较的基线。


    在本节中，我将向你展示一种我用来创建、维护和比较基线与测量结果的方法。这并不一定意味着这是正确的做法，你可能会发现其他方法更适合你的需求。


    由于我们将捕获 SQL Server 等待统计测量数据，我更喜欢将我的测量数据存储在一个名为“Baseline”的独立数据库中。这样，我的测量信息就不会存储在用户表之间。由于等待统计信息是在
    SQL Server 实例级别记录的，因此在每个 SQL Server 实例中创建一个独立的测量数据库是合理的。图 4-4 展示了我在 SQL Server
    Management Studio 中的基线数据库。


    ![../images/340881_2_En_4_Chapter/340881_2_En_4_Fig4_HTML.jpg](img/340881_2_En_4_Fig4_HTML.jpg)


    图 4-4: 基线数据库


    你可以使用清单 4-1 中的脚本自行创建该数据库，记得更改文件位置。数据库数据文件在创建时将是 1.5 GB，这为捕获数周的等待统计信息提供了足够的空间。


    ```sql

    -- 创建 Baseline 数据库

    CREATE DATABASE [Baseline]

    ON PRIMARY

    (

    NAME = N''Baseline'', FILENAME = N''E:\Data\baseline_data.mdf'' , SIZE = 1536000KB
    , FILEGROWTH = 10%

    )

    LOG ON

    (

    NAME = N''Baseline_log'', FILENAME = N''E:\Log\baseline_log.ldf'' , SIZE = 102400KB
    , FILEGROWTH = 10%

    )

    GO

    ALTER DATABASE [Baseline] SET RECOVERY SIMPLE

    GO

    ```

    清单 4-1: 创建 Baseline 数据库


    我们将使用 `sys.dm_os_wait_stats` DMV 作为测量数据的来源，这意味着容纳我们测量数据的表必须能够处理从 DMV 返回的信息。我们不仅会存储等待类型和等待时间，还会添加额外的信息来丰富数据，以便我们可以轻松地创建多个基线。


    清单 4-2 显示了可用于创建名为 `WaitStats` 的表的查询，该表将用于存储我们用于创建基线的等待统计信息。


    ```sql

    USE [BaseLine]

    GO

    CREATE TABLE WaitStats

    (

    ws_ID INT IDENTITY(1,1) PRIMARY KEY,

    ws_DateTime DATETIME,

    ws_Day INT,

    ws_Month INT,

    ws_Year INT,

    ws_Hour INT,

    ws_Minute INT,

    ws_DayOfWeek VARCHAR(15),

    ws_WaitType VARCHAR(50),

    ws_WaitTime INT,

    ws_WaitingTasks INT,

    ws_SignalWaitTime INT

    )

    ```

    清单 4-2: 创建等待统计表


    正如你在清单中所看到的，我们捕获了等待类型、等待时间、信号等待时间和等待任务数量。我们还捕获了记录等待统计信息的日期和时间。我们还将日期和时间拆分到额外的列中，以便对数据进行分段，从而更容易基于特定的日期、小时、月份等构建特定的基线，而无需每次都转换
    `datetime` 数据类型。


    现在我们的表已经准备好了，是时候捕获一些等待统计信息并将其插入到我们的 `WaitStats` 表中了。因为 `sys.dm_os_wait_stats`
    DMV 返回的是累计等待时间，所以我们需要使用一种方法来仅捕获两个捕获时刻之间等待时间的差异。如果我们直接从 `sys.dm_os_wait_stats`
    DMV 捕获信息，我们将总是收到不断增长的等待时间，这将使比较变得毫无用处。有两种方法可以捕获两次测量之间等待时间的变化，每种方法都有其优缺点。


    第一种方法，我称之为重置法，它将从 `sys.dm_os_wait_stats` DMV 捕获等待统计信息，然后使用 `DBCC SQLPERF(''sys.dm_os_wait_stats'',
    CLEAR)` 命令重置 DMV。这种方法的主要优点是使用非常简单，因为我们只需要捕获信息，然后再次重置，并在下一次测量时开始相同的过程。不需要计算增量，因为在我们的第一次测量之后，计数器就被重置为
    0。缺点是 `DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR)` 命令会重置 `sys.dm_os_wait_stats`
    DMV 内部的信息。这意味着你将丢失 DMV 内部的累计信息，这些信息可能是你不想丢失的。图 4-5 说明了这种捕获等待统计的方法。


    ![../images/340881_2_En_4_Chapter/340881_2_En_4_Fig5_HTML.jpg](img/340881_2_En_4_Fig5_HTML.jpg)


    图 4-5: 使用重置法捕获等待统计


    第二种选择，我命名为增量法，它不使用 `DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR)` 命令，而是计算两次测量之间等待时间的差异或增量。不使用
    `DBCC` 命令的优点是你不会丢失 `sys.dm_os_wait_stats` DMV 内部的累计等待时间。它的主要缺点是与第一种方法相比，计算增量要复杂得多。它通常还需要在
    T-SQL 脚本中包含一个 `WAITFOR DELAY` 命令来设置间隔。这可能意味着，如果你计划使用 SQL Server Agent 捕获等待统计信息，你最终可能会得到一个几乎持续运行的
    SQL Server Agent 作业。图 4-6 说明了捕获等待统计的增量选项。


    ![../images/340881_2_En_4_Chapter/340881_2_En_4_Fig6_HTML.jpg](img/340881_2_En_4_Fig6_HTML.jpg)


    图 4-6: 使用增量法捕获等待统计


    还有更多可用的方法来捕获等待统计信息，但我最常见到的是这两种，或者是它们的变体。你想使用哪种方法取决于你自己，因为最终两种方法都会返回相同的结果。


    ### 重置捕获法


    重置等待统计捕获法包含一个单一的 T-SQL 脚本，该脚本将从 `sys.dm_os_wait_stats` DMV 捕获信息，然后重置 DMV 内部的计数器。清单
    4-3 显示了可用于填充我们之前创建的 `WaitStats` 表的 T-SQL 脚本。


    ```sql

    USE [Baseline]

    GO

    -- 将 Wait Stats 插入到 Baseline 表

    INSERT INTO WaitStats

    SELECT

    GETDATE() AS ''DateTime'',

    DATEPART(DAY,GETDATE()) AS ''Day'',

    DATEPART(MONTH,GETDATE()) AS ''Month'',

    DATEPART(YEAR,GETDATE()) AS ''Year'',

    DATEPART(HOUR, GETDATE()) AS ''Hour'',

    DATEPART(MINUTE, GETDATE()) AS ''Minute'',

    DATENAME(DW, GETDATE()) AS ''DayOfWeek'',

    wait_type AS ''WaitType'',

    wait_time_ms AS ''WaitTime'',

    waiting_tasks_count AS ''WaitingTasks'',

    signal_wait_time_ms AS ''SignalWaitTime''

    FROM sys.dm_os_wait_stats;

    -- 清除 sys.dm_os_wait_stats

    DBCC SQLPERF (''sys.dm_os_wait_stats'',CLEAR)

    GO

    ```

    清单 4-3: 重置捕获法

    '
- fmt: '### Delta Capture Method


    The delta capture method also consists of a single T-SQL script, but it is a little
    more complex than the reset capture method. It uses a temporary table to store
    the first measurement, then waits for 15 minutes, performs a second measurement,
    and calculates the deltas. The result is inserted into the `WaitStats` table.
    Listing [4-4](#340881_2_En_4_Chapter.xhtml#PC4) shows the T-SQL script you can
    use if you plan to use this method of collecting wait statistics metrics.


    ```

    USE [Baseline]

    GO

    -- Check if the temp table already exists

    -- if it does drop it.

    IF EXISTS

    (

    SELECT *

    FROM tempdb.dbo.sysobjects

    WHERE ID = OBJECT_ID(N''tempdb..#ws_Capture'')

    )

    DROP TABLE #ws_Capture;

    -- Create temp table to hold our first measurement

    CREATE TABLE #ws_Capture

    (

    wst_WaitType VARCHAR(50),

    wst_WaitTime INT,

    wst_WaitingTasks INT,

    wst_SignalWaitTime INT

    );

    -- Insert our first measurement into the temp table

    INSERT INTO #ws_Capture

    SELECT

    wait_type,

    wait_time_ms,

    waiting_tasks_count,

    signal_wait_time_ms

    FROM sys.dm_os_wait_stats;

    -- Wait for the next measurement

    -- In this case we will wait 15 minutes

    WAITFOR DELAY ''00:15:00''

    -- Combine the first measurement with a new

    -- measurement and calculate the deltas

    -- Write the results into the WaitStats table

    INSERT INTO WaitStats

    SELECT

    GETDATE() AS ''DateTime'',

    DATEPART(DAY,GETDATE()) AS ''Day'',

    DATEPART(MONTH,GETDATE()) AS ''Month'',

    DATEPART(YEAR,GETDATE()) AS ''Year'',

    DATEPART(HOUR, GETDATE()) AS ''Hour'',

    DATEPART(MINUTE, GETDATE()) AS ''Minute'',

    DATENAME(DW, GETDATE()) AS ''DayOfWeek'',

    dm.wait_type AS ''WaitType'',

    dm.wait_time_ms - ws.wst_WaitTime AS ''WaitTime'',

    dm.waiting_tasks_count - ws.wst_WaitingTasks AS ''WaitingTasks'',

    dm.signal_wait_time_ms - ws.wst_SignalWaitTime AS ''SignalWaitTime''

    FROM sys.dm_os_wait_stats dm

    INNER JOIN #ws_Capture ws

    ON dm.wait_type = ws.wst_WaitType;

    -- Clean up the temp table

    DROP TABLE #ws_Capture;

    ```

    Listing 4-4

    Delta capture method


    ### Using SQL Server Agent to Schedule Measurements


    After selecting a capture method, we need to run the capture T-SQL script to fill
    our `WaitStats` table with wait statistics information. As described in the baseline
    pitfalls section earlier, it is very important to always perform your measurements
    at a fixed interval. This makes comparing measurements a lot easier, since you
    are always comparing the same time segments. The best way to do this is by using
    a `SQL Server Agent` job set to a fixed interval. The interval can be set to your
    choosing—the larger you set the interval, the smaller the number of time segments
    you can compare against. Setting the interval to be shorter will give you more
    time segments, but will also mean an increase in data that you need to store.
    I personally prefer to set my interval to 15 minutes. This gives me enough time
    segments to compare in most cases.


    I won’t go into details here about how you can create a `SQL Server Agent` job
    to capture wait statistics information, but I do want to point out how my job
    looks as an example you can use. I usually end up with a `SQL Server Agent` job
    with just one T-SQL script step. In this step I copy the capture script, depending
    on which method I want to use. Figure [4-7](#340881_2_En_4_Chapter.xhtml#Fig7)
    shows a screenshot of my `SQL Server Agent` job.


    ![../images/340881_2_En_4_Chapter/340881_2_En_4_Fig7_HTML.jpg](images/340881_2_En_4_Chapter/340881_2_En_4_Fig7_HTML.jpg)


    Figure 4-7

    Capturing WaitStats `SQL Server Agent` job step


    In this case I used the reset capture method to capture the wait statistics in
    my `WaitStats` table.


    Figure [4-8](#340881_2_En_4_Chapter.xhtml#Fig8) shows the schedule I use to capture
    the wait statistics on a fixed interval. As you can see, I have set it to every
    15 minutes, every day.


    ![../images/340881_2_En_4_Chapter/340881_2_En_4_Fig8_HTML.jpg](images/340881_2_En_4_Chapter/340881_2_En_4_Fig8_HTML.jpg)


    Figure 4-8

    `SQL Server Agent` job schedule


    Again, you are free to choose your own capture interval, but make sure to always
    capture at the same interval length.


    After we have created a `SQL Server Agent` job to gather wait statistics information,
    we need to let it run for a while. The longer the job runs, the more information
    we gather, improving the quality of our baselines.'
