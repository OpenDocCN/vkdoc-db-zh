    \n![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig19_HTML.jpg](images/340881_2_En_5_Chapter/340881_2_En_5_Fig19_HTML.jpg)\n\
    \nFigure 5-19\n\nAmount of worker threads on my test machine\n\nOne piece of advice\
    \ I frequently read on the Internet related to THREADPOOL waits is to change the\
    \ Maximum Worker Threads option to a value higher than the one your SQL Server\
    \ instance has by default. I strongly advise against changing this option from\
    \ its default value. Changing the setting to a higher value than the amount of\
    \ worker threads you would receive by default can actually degrade the performance\
    \ of your SQL Server because context-switching occurs far more often. Another\
    \ reason not to change the setting is that every worker thread requires a bit\
    \ of memory to operate; for 32-bit systems this is 512 KB per worker thread, and\
    \ for 64-bit systems it’s 2048 KB.\n\n### THREADPOOL Example\n\nLet’s start with\
    \ an example of `THREADPOOL` waits occurring on my test SQL Server instance. Even\
    \ though I have warned you multiple times already about making sure to not run\
    \ any of the demo scripts in this book on a production environment, this one deserves\
    \ a special reminder. Running the demo scripts in this section can cause your\
    \ SQL Server to become completely unresponsive, not accepting any new connections,\
    \ and can eventually require a restart of the SQL Server service! Do not run this\
    \ on a SQL Server that isn’t allowed to become unresponsive!\n\nFor this example\
    \ we are going to use the Ostress utility again to simulate concurrency and load\
    \ against the test SQL Server instance. First, we create another .sql file (`select_rnd.sql`)\
    \ that holds the following query that we will execute using Ostress:\n\n```\n\
    SELECT TOP 1 *\nFROM Sales.SalesOrderDetail\nORDER BY NEWID()\nOPTION (MAXDOP\
    \ 1)\n```\n\nThis query will select one random row from the `Sales.SalesOrderDetail`\
    \ table in the `AdventureWorks` database . There is a reason I included the query\
    \ option to serially run this query, and I will explain it later on.\n\nNow, before\
    \ we launch Ostress to execute the preceding query, we are purposely going to\
    \ lower the maximum amount of worker threads available on the test SQL Server.\
    \ To do this we execute this query:\n\n```\nEXEC sp_configure 'show advanced options',\
    \ 1;\nGO\nRECONFIGURE\nGO\nEXEC sp_configure 'max worker threads', 128;\nGO\n\
    RECONFIGURE\nGO\n```\n\nThis will set the maximum number of worker threads available\
    \ to 128, the minimum value for a 64-bit SQL Server instance.\n\nLet’s fire up\
    \ Ostress and execute the .sql script we created earlier:\n\n```\n\"C:\\Program\
    \ Files\\Microsoft Corporation\\RMLUtils\\ostress.exe\" -E -dAdventureWorks -i\"\
    C:\\select_rnd.sql\" -n150 -r10 -q\n```\n\nIn this case we will start 150 different\
    \ threads that will execute the query in the `select_rnd.sql` file 10 times. The\
    \ reason for spawning 150 threads is that this value is higher than the maximum\
    \ amount of worker threads available on the test SQL Server instance, but not\
    \ so high that we cannot execute queries anymore.\n\nWhile the script is running,\
    \ let’s take a look at the number of worker threads running and waiting using\
    \ the `sys.dm_os_schedulers` DMV:\n\n```\nSELECT\nscheduler_id,\ncurrent_tasks_count,\n\
    runnable_tasks_count,\ncurrent_workers_count,\nactive_workers_count,\nwork_queue_count\n\
    FROM sys.dm_os_schedulers\nWHERE status = 'VISIBLE ONLINE';\n```\n\nThe results\
    \ of this query are shown in Figure [5-20](#340881_2_En_5_Chapter.xhtml#Fig20).\n\
    \n![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig20_HTML.jpg](images/340881_2_En_5_Chapter/340881_2_En_5_Fig20_HTML.jpg)\n\
    \nFigure 5-20\n\nTasks and worker threads per scheduler\n\nThe most important\
    \ columns here are the `current_workers_count`, `active_workers_count`, and `work_queue_count`\
    \ columns. The `current_workers_count` column shows the number of worker threads\
    \ associated with this scheduler; this number also includes worker threads that\
    \ are not yet assigned to a task. The `active_workers_count` column returns the\
    \ number of worker threads that are in the “RUNNING,” “RUNNABLE,” or “SUSPENDED”\
    \ states. The big difference between the `current_workers_count` and the `active_workers_count`\
    \ columns is that the `active_workers_count` is the number of worker threads that\
    \ have been assigned to a task, while the `current_workers_count` returns all\
    \ the worker threads. The `work_queue_count` column shows us the number of tasks\
    \ that are currently waiting to get a worker thread assigned to them. If you see\
    \ values higher than 0 in this column for a longer period of time and for all\
    \ schedulers, you are experiencing thread pool starvation.\n\nLet’s check the\
    \ `sys.dm_os_waiting_tasks` DMV for waiting tasks that originate from a user session.\
    \ Notice that we filter out all the sessions that have a session ID lower than\
    \ 50, even though I told you to not do this in Chapter [2](#340881_2_En_2_Chapter.xhtml),\
    \ “Querying SQL Server Wait Statistics”:"
  trans: "\n### 什么是 `THREADPOOL` 等待类型？\n\n如果你在系统上看到 `THREADPOOL` 等待的发生时间远超正常值，并且你的\
    \ SQL Server 几乎没有响应，那么你很可能遇到了一个称为线程池匮乏的问题。线程池匮乏发生在没有空闲的工作线程来处理请求时。当这种情况发生时，当前等待分配到工作线程的任务将记录\
    \ `THREADPOOL` 等待类型。\n\nSQL Server 为调度器提供一定数量的工作线程来处理请求。系统可用的工作线程数量取决于处理器数量和处理器架构。表\
    \ 5-1 显示了最多具有 64 个逻辑 CPU 的系统可用的最大工作线程数。\n\n表 5-1. 最大工作线程数\n\n| CPU 数量 | 32 位架构\
    \ | 64 位架构 |\n| :--- | :--- | :--- |\n| ≤4 | 256 | 512 |\n| 8 | 288 | 576 |\n\
    | 16 | 352 | 704 |\n| 32 | 480 | 960 |\n| 64 | 736 | 1472 |\n\n你也可以使用以下公式计算可用的最大工作线程数：\n\
    *   逻辑处理器小于或等于 4 个的 32 位系统：256 个工作线程\n*   逻辑处理器多于 4 个的 32 位系统：`256 + ((逻辑处理器数量\
    \ − 4) × 8)`\n*   逻辑处理器小于或等于 4 个的 64 位系统：512 个工作线程\n*   逻辑处理器多于 4 个的 64 位系统：`512\
    \ + ((逻辑处理器数量 − 4) × 16)`\n\n尽管 SQL Server 会自动计算可用的最大工作线程数（仅在启动时计算一次），但你可以通过更改\
    \ SQL Server 实例的处理器属性中的 **最大工作线程数** 选项来覆盖默认值，如图 5-18 所示。默认情况下，**最大工作线程数** 选项的值为\
    \ 0，这意味着 SQL Server 将使用前述公式计算并分配可用的最大工作线程数。\n\n![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig18_HTML.jpg](img/340881_2_En_5_Fig18_HTML.jpg)\n\
    图 5-18. SQL Server 实例的处理器配置\n\n你也可以通过运行以下查询来查看分配给 SQL Server 实例的工作线程数：\n```sql\n\
    SELECT\n    max_workers_count\nFROM sys.dm_os_sys_info;\n```\n对于我的拥有两个逻辑处理器的 64\
    \ 位测试 SQL Server，我有 512 个工作线程可用，如图 5-19 所示。\n\n![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig19_HTML.jpg](img/340881_2_En_5_Fig19_HTML.jpg)\n\
    图 5-19. 我测试机上的工作线程数\n\n我经常在网上读到一条关于 `THREADPOOL` 等待的建议，即将 **最大工作线程数** 选项更改为比 SQL\
    \ Server 实例默认值更高的值。我强烈建议不要更改此选项的默认值。将设置更改为比默认获得的工作线程数更高的值，实际上可能会降低 SQL Server\
    \ 的性能，因为上下文切换会更频繁地发生。另一个不更改设置的原因是，每个工作线程都需要一点内存来运行；对于 32 位系统，每个工作线程需要 512 KB，而对于\
    \ 64 位系统，则是 2048 KB。\n\n### THREADPOOL 示例\n\n让我们从一个在我的测试 SQL Server 实例上发生 `THREADPOOL`\
    \ 等待的例子开始。尽管我已经多次警告你确保不要在本书中将任何演示脚本运行于生产环境，但这个例子值得特别提醒。运行本节中的演示脚本可能导致你的 SQL Server\
    \ 完全无响应，不接受任何新连接，并最终可能需要重启 SQL Server 服务！请不要在不允许变得无响应的 SQL Server 上运行此脚本！\n\n\
    在这个例子中，我们将再次使用 Ostress 工具来模拟针对测试 SQL Server 实例的并发和负载。首先，我们创建另一个 `.sql` 文件 (`select_rnd.sql`)，其中包含我们将使用\
    \ Ostress 执行的以下查询：\n```sql\nSELECT TOP 1 *\nFROM Sales.SalesOrderDetail\nORDER\
    \ BY NEWID()\nOPTION (MAXDOP 1)\n```\n此查询将从 `AdventureWorks` 数据库的 `Sales.SalesOrderDetail`\
    \ 表中随机选择一行。我包含此查询选项以串行运行此查询是有原因的，稍后我会解释。\n\n现在，在我们启动 Ostress 执行上述查询之前，我们特意将测试\
    \ SQL Server 上可用的最大工作线程数降低。为此，我们执行以下查询：\n```sql\nEXEC sp_configure 'show advanced\
    \ options', 1;\nGO\nRECONFIGURE\nGO\nEXEC sp_configure 'max worker threads', 128;\n\
    GO\nRECONFIGURE\nGO\n```\n这将把可用的最大工作线程数设置为 128，这是 64 位 SQL Server 实例的最小值。\n\n\
    让我们启动 Ostress 并执行我们之前创建的 `.sql` 脚本：\n```\n\"C:\\Program Files\\Microsoft Corporation\\\
    RMLUtils\\ostress.exe\" -E -dAdventureWorks -i\"C:\\select_rnd.sql\" -n150 -r10\
    \ -q\n```\n在这种情况下，我们将启动 150 个不同的线程，每个线程将执行 `select_rnd.sql` 文件中的查询 10 次。生成 150\
    \ 个线程的原因是这个值大于测试 SQL Server 实例上可用的最大工作线程数，但又不至于高到我们无法再执行查询。\n\n当脚本运行时，让我们使用 `sys.dm_os_schedulers`\
    \ DMV 查看正在运行和等待的工作线程数：\n```sql\nSELECT\n    scheduler_id,\n    current_tasks_count,\n\
    \    runnable_tasks_count,\n    current_workers_count,\n    active_workers_count,\n\
    \    work_queue_count\nFROM sys.dm_os_schedulers\nWHERE status = 'VISIBLE ONLINE';\n\
    ```\n此查询的结果如图 5-20 所示。\n\n![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig20_HTML.jpg](img/340881_2_En_5_Fig20_HTML.jpg)\n\
    图 5-20. 每个调度器的任务和工作线程\n\n这里最重要的列是 `current_workers_count`、`active_workers_count`\
    \ 和 `work_queue_count` 列。`current_workers_count` 列显示与此调度器关联的工作线程数；此数字还包括尚未分配给任务的工作线程。`active_workers_count`\
    \ 列返回处于“*正在运行*”、“*可运行*”或“*已暂停*”状态的工作线程数。`current_workers_count` 和 `active_workers_count`\
    \ 列之间的主要区别在于，`active_workers_count` 是已分配给任务的工作线程数，而 `current_workers_count` 返回所有工作线程。`work_queue_count`\
    \ 列显示当前等待分配工作线程的任务数。如果你在所有调度器上较长时间看到此列的值大于 0，那么你正在经历线程池匮乏。\n\n让我们检查 `sys.dm_os_waiting_tasks`\
    \ DMV 以查找源自用户会话的等待任务。注意，我们过滤掉了所有会话 ID 小于 50 的会话，尽管我在第 2 章“查询 SQL Server 等待统计信息”中告诉过你不要这样做：\n"
- fmt: '# THREADPOOL Waits: Diagnosis and Resolution


    SELECT *

    FROM sys.dm_os_waiting_tasks

    WHERE session_id > 50;


    If we check the results on the test SQL Server instance, we could conclude that
    nothing is waiting, as you can see in Figure [5-21](#340881_2_En_5_Chapter.xhtml#Fig21).
    The test SQL Server is responding incredibly slowly though, and querying anything
    requires multiple seconds.


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig21_HTML.jpg](images/340881_2_En_5_Chapter/340881_2_En_5_Fig21_HTML.jpg)


    Figure 5-21


    No tasks are waiting


    Let’s check the `sys.dm_os_waiting_tasks` DMV without filtering out session IDs:


    ```sql

    SELECT *

    FROM sys.dm_os_waiting_tasks;

    ```


    As you can see in Figure [5-22](#340881_2_En_5_Chapter.xhtml#Fig22), `THREADPOOL`
    waits are not logged as user sessions, but actually have an empty session ID.
    This is the reason I always recommend to not filter the `sys.dm_os_waiting_tasks`
    DMV on session ID numbers.


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig22_HTML.png](images/340881_2_En_5_Chapter/340881_2_En_5_Fig22_HTML.png)


    Figure 5-22


    THREADPOOL waits


    There are quite a lot of `THREADPOOL` waits, with various wait times, some running
    into seconds of wait time. Things can get even worse than this though. Figure
    [5-23](#340881_2_En_5_Chapter.xhtml#Fig23) shows an error I encountered when I
    tried to connect to my test SQL Server instance while running the `Ostress` tool.


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig23_HTML.jpg](images/340881_2_En_5_Chapter/340881_2_En_5_Fig23_HTML.jpg)


    Figure 5-23


    Timeouts are occurring and SQL Server is unresponsive


    Now that we have seen the kind of problems thread pool starvation can create,
    let’s take a look at how we can lower, or even resolve, `THREADPOOL` waits.


    ## Gaining Access to Our SQL Server During THREADPOOL Waits


    `THREADPOOL` waits can be very difficult to troubleshoot, mostly because there
    are many possible reasons why your SQL Server doesn’t have any free worker threads
    available. Also, `THREADPOOL` waits can completely lock down your SQL Server instance,
    making connections to it (and troubleshooting it) almost impossible, as you have
    seen in the earlier example.


    The first step you should take to make sure you do not get into a situation where
    you cannot connect to your SQL Server instance for troubleshooting is to enable
    the Dedicated Administrator Connection (or `DAC`). If you remember the section
    about schedulers in Chapter [1](#340881_2_En_1_Chapter.xhtml), “Wait Statistics
    Internals,” you might recall a special type of scheduler reserved for the `DAC`.
    This dedicated scheduler, shown in Figure [5-24](#340881_2_En_5_Chapter.xhtml#Fig24),
    is strictly reserved for the `DAC` and has access to its own worker threads.


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig24_HTML.jpg](images/340881_2_En_5_Chapter/340881_2_En_5_Fig24_HTML.jpg)


    Figure 5-24


    Dedicated Administrator Connection scheduler


    If you connect through the `DAC` to your SQL Server instance, your session will
    be mapped to the `DAC` scheduler. This makes it possible to connect and execute
    queries even if all the other schedulers have massive task queues.


    You can enable the `DAC` by executing the following query:


    ```sql

    sp_configure ''remote admin connections'', 1

    GO

    RECONFIGURE

    GO

    ```


    If you want to connect to your SQL Server instance using the `DAC` you need to
    add the `ADMIN:` prefix to the server name you are connecting to, as shown in
    Figure [5-25](#340881_2_En_5_Chapter.xhtml#Fig25). You can only connect using
    the `DAC` when you execute a new query from inside SQL Server Management Studio
    without being connected to the server.


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig25_HTML.jpg](images/340881_2_En_5_Chapter/340881_2_En_5_Fig25_HTML.jpg)


    Figure 5-25


    Connect using the Dedicated Administrator Connection


    Now that you are able to connect to your SQL Server instances using the `DAC`,
    you always have a way in, even when the SQL Server instance won’t accept any new
    connections.


    With the `DAC` enabled, let’s discuss some common causes for `THREADPOOL` waits.


    ## Lowering THREADPOOL Waits Caused by Parallelism


    One of the most common causes for `THREADPOOL` waits I encounter is related to
    the extensive use of parallelism during query execution. During the execution
    of a parallel query, multiple worker threads are used to perform the work needed.
    If you left the configuration options related to parallelism—`Max Degree of Parallelism`
    and `Cost Threshold of Parallelism`—at the default values, it might cause more
    queries to run in parallel than was intended. Depending on how many processors
    your SQL Server has access to, and the number of worker threads used during a
    parallel query, one single parallel query can require many worker threads.


    If you run into this specific case of high and frequent `THREADPOOL` waits you
    will usually see many `CXPACKET` waits as well (sometimes with high wait times).
    To show this behavior I have modified the query we used to generate `THREADPOOL`
    waits so that it will execute using parallelism. In this case I commented out
    the `MAXDOP` query option:


    ```sql

    SELECT TOP 1 *

    FROM Sales.SalesOrderDetail

    ORDER BY NEWID()

    -- OPTION (MAXDOP 1)

    ```


    For this example I also configured the `Max Degree of Parallelism` to its default
    value of 0, and set the `Cost Threshold for Parallelism` option to 1. This way
    I am 100% sure the query will be run using parallelism. I left the `Max Worker
    Threads` option on a value of 128 as we configured earlier.


    If we now repeat the same `Ostress` test we performed earlier in this chapter
    by executing the following command, we should see `THREADPOOL` waits occur again
    in the `sys.dm_os_waiting_tasks` DMV, as shown in Figure [5-26](#340881_2_En_5_Chapter.xhtml#Fig26).


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig26_HTML.jpg](images/340881_2_En_5_Chapter/340881_2_En_5_Fig26_HTML.jpg)


    Figure 5-26


    THREADPOOL waits


    ```shell

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -E -dAdventureWorks
    -i"C:\select_rnd.sql" -n150 -r10 -q

    ```


    But this time, because our test query is executed in parallel, we will also find
    many `CXPACKET` waits returned by the `sys.dm_os_waiting_tasks` DMV, as shown
    in Figure [5-27](#340881_2_En_5_Chapter.xhtml#Fig27).


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig27_HTML.jpg](images/340881_2_En_5_Chapter/340881_2_En_5_Fig27_HTML.jpg)


    Figure 5-27


    CXPACKET and THREADPOOL waits


    If you see this behavior occurring on your SQL Server instance, it might be worth
    the effort to check your parallelism configuration. The first section of this
    chapter discussed `CXPACKET` waits and how you can lower them. Another hint that
    might steer you in this direction is that the `CPU` load during this particular
    case is usually higher than normal. In the case of my test SQL Server instance,
    all my `CPUs` went to 100%.'
