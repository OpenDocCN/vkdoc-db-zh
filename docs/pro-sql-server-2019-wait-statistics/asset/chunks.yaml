- fmt: '### Querying Lock Information


    To take a look at currently placed locks we can use the `sys.dm_tran_locks` DMV.
    This DMV will return a row for every active lock inside the SQL Server instance,
    along with information like the type of lock, the resource type, the session ID
    that placed the lock, and whether the lock is granted or is waiting to be placed.
    Figure 8-4 shows a (small) portion of the output of the DMV on my test SQL Server
    machine.

    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig4_HTML.jpg](images/340881_2_En_8_Chapter/340881_2_En_8_Fig4_HTML.jpg)

    Figure 8-4. `sys.dm_tran_locks` output


    If we take a look at Figure 8-4 we can see that a number of Exclusive locks (X)
    have been granted and are placed at the Key lock level. This means a transaction
    is currently modifying data inside a clustered index. There is also an Intent
    Exclusive lock on the Page level, which is above the Key lock level, indicating
    that there is an Exclusive lock lower down in the hierarchy. Also note that a
    Shared lock is currently waiting to get placed on the same data page (`1:20432`).
    The lock cannot be granted just yet, as there is an incompatible Intent Exclusive
    lock in place.


    Since the Shared lock has to wait before it can be placed on the data page, we
    can view the time it has been waiting by looking at the wait statistics. Figure
    8-5 shows a part of the results of a query against the `sys.dm_os_waiting_tasks`
    DMV.

    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig5_HTML.jpg](images/340881_2_En_8_Chapter/340881_2_En_8_Fig5_HTML.jpg)

    Figure 8-5 Lock information inside `sys.dm_os_waiting_tasks`


    By using the `sys.dm_os_waiting_tasks` DMV, we can see that session ID 55 is currently
    waiting on a resource named `LCK_M_S`. This represents a Shared lock resource
    type. Session ID 55 is currently being blocked by session ID 53, which happens
    to be the same session that has the Exclusive and Intent Exclusive locks placed
    on the objects session ID 55 is trying to query. The `sys.dm_os_waiting_tasks`
    DMV will also return information we can use as input for the `sys.dm_tran_locks`
    DMV. This information will be available in the `resource_description` column of
    the `sys.dm_os_waiting_tasks` DMV, as shown in Figure 8-6.

    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig6_HTML.jpg](images/340881_2_En_8_Chapter/340881_2_En_8_Fig6_HTML.jpg)

    Figure 8-6 `resource_description` column of the `sys.dm_os_waiting_tasks` DMV
    during a block


    If we copy the `associatedObjectID` and use it as input in the `WHERE` clause
    against the `sys.dm_tran_locks` DMV, we will receive more information about why,
    and on what, this task is waiting. The following query will retrieve all the rows
    inside the `sys.dm_tran_locks` DMV that have a `resource_associated_entity_id`
    of `72057594045333504`:

    ```sql

    SELECT *

    FROM sys.dm_tran_locks

    WHERE resource_associated_entity_id = '' 72057594045333504'';

    ```

    On my test SQL Server, the query returned 32 locks, 26 of which are Exclusive
    locks on rows inside a clustered index; there are also a number of Intent Exclusive
    locks on data pages and one Shared lock that is waiting to be placed on a page.
    The waiting Shared lock is the one returned by the `sys.dm_os_waiting_tasks` DMV.
    A portion of the results is displayed in Figure 8-7.

    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig7_HTML.jpg](images/340881_2_En_8_Chapter/340881_2_En_8_Fig7_HTML.jpg)

    Figure 8-7 Lock information from `sys.dm_tran_locks`


    Finding lock information and figuring out who is blocking whom by querying the
    `sys.dm_tran_locks` DMV can be a challenge on systems where you have many locks
    and blocks occurring, since the DMV will return a row for every lock placed. Another,
    easier, method to analyze locking and blocking is to use the `sp_WhoIsActive`
    stored procedure created by Adam Machanic. This stored procedure will return information
    about everything that is running at that time and is a great tool for analyzing
    performance problems. With some extra parameters it will also return a wealth
    of locking information without you having to join various DMVs yourself. You can
    download the `sp_WhoIsActive` DMV from its website at [`http://whoisactive.com/downloads/`](http://whoisactive.com/downloads/).


    To show you an example of the `sp_WhoIsActive` stored procedure I ran it on my
    test SQL Server while it was experiencing a blocking problem. The most basic way
    of running it is by just executing it:

    ```sql

    EXEC sp_WhoIsActive;

    ```

    Figure 8-8 shows a small portion of the results. There are many more columns available
    that will show you additional information, like the session ID of the blocking
    session.

    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig8_HTML.jpg](images/340881_2_En_8_Chapter/340881_2_En_8_Fig8_HTML.jpg)

    Figure 8-8 `sp_WhoIsActive` default results


    We can directly identify wait statistics information and the queries that are
    being executed at this time. Because the `blocking_session_id` column returned
    a session ID of 55 for the `SELECT` query, we should take a look at what the query
    that is being executed by session ID 55 is doing. By clicking the query link inside
    the `sql_text` column, we can view the whole query text, as shown in Figure 8-9.

    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig9_HTML.jpg](images/340881_2_En_8_Chapter/340881_2_En_8_Fig9_HTML.jpg)

    Figure 8-9 `sql_text` output from `sp_WhoIsActive`


    In this specific case we can probably resolve the blocking problem pretty quickly.
    The query that is causing the block has left its transaction open without performing
    a `COMMIT` or `ROLLBACK`. As long as a transaction stays open, locks are being
    kept in place and are not released.


    The `sp_WhoIsActive` stored procedure also has a parameter to return additional
    locking information, including information about the lock hierarchy. The query
    that follows will execute the `sp_WhoIsActive` stored procedure and retrieve extra
    lock information for the queries that are currently executing:

    ```sql

    EXEC sp_WhoIsActive @get_locks=1;

    ```

    Figure 8-10 returns the new columns that are added to the output of `sp_WhoIsActive`.

    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig10_HTML.jpg](images/340881_2_En_8_Chapter/340881_2_En_8_Fig10_HTML.jpg)

    Figure 8-10 Lock information returned by `sp_WhoIsActive`


    By clicking the link below the `locks` column, we can view which locks are being
    used and on what objects they are placed. This will also give us a good look at
    the locking hierarchy that is in place for this specific query. Figure 8-11 shows
    the extra lock information for the first returned query in Figure 8-10.

    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig11_HTML.png](images/340881_2_En_8_Chapter/340881_2_En_8_Fig11_HTML.png)

    Figure 8-11 Additional lock information returned by `sp_WhoIsActive`


    Here we can see that an Intent Exclusive lock is placed at the `OBJECT` level,
    which means a lock has been placed on the object that is displayed in the `Object
    name` field of the XML schema—in this case `Address`, which is a table. A level
    down, at the page level, we also see two Intent Exclusive locks in place inside
    two different indexes on the `Address` table. And at the bottom level we see the
    Exclusive locks, which are placed at the `KEY` objects, which indicate rows inside
    an index.


    There are many more parameters available for the `sp_WhoIsActive` stored procedure,
    each one of them returning more information about various parts of SQL Server.
    This makes the `sp_WhoIsActive` Stored Procedure a great tool for finding out
    what is going on inside your SQL Server instance, and I encourage you to give
    it a try.


    Now that we have discussed many aspects of locking and blocking, from lock modes
    and hierarchies to analyzing locks and blocks, we should be ready to take a look
    at the lock-related wait types inside SQL Server. Keep in mind that this introduction
    to locking and blocking is far from a complete guide to the topic, as going into
    more detail on how locking and concurrency works inside SQL Server would fill
    a book by itself.'
