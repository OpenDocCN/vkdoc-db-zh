- fmt: "### Understanding sys.dm_exec_requests\n\nLike the previous DMVs, we can query\
    \ the `sys.dm_exec_requests` DMV with a simple `SELECT * FROM sys.dm_exec_requests;`\
    \ to return everything that is currently executing. Figure 2-6 returns a small\
    \ portion of the results on my test SQL Server.\n\n![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig6_HTML.jpg](images/340881_2_En_2_Chapter/340881_2_En_2_Fig6_HTML.jpg)\n\
    \nFigure 2-6\n\nThe `sys.dm_exec_requests` DMV returns a lot more columns than\
    \ the `sys.dm_os_wait_stats` or `sys.dm_os_waiting_tasks` DMVs we discussed earlier.\
    \ To keep things readable I will only describe the columns we will frequently\
    \ use for wait statistics analysis. Here is the list:\n\n*   `session_id` returns\
    \ the ID of the session this request is associated with.\n*   `start_time` shows\
    \ the date and time when the request got created. This can be a different time\
    \ and even date than the time and date on which you are querying the DMV, especially\
    \ when long-running queries are being executed.\n*   `command` returns information\
    \ about what kind of action the request is performing. The most common commands\
    \ are query related, like `SELECT`, `INSERT`, `UPDATE`, and `DELETE`, but there\
    \ are many more commands depending on what is being executed by the request.\n\
    *   `sql_handle` gives us a hash value of the SQL text that is being executed\
    \ in the request. Not all requests have an SQL handle, and generally you should\
    \ only see a SQL handle if the request was initiated by a user session and an\
    \ SQL query is involved. The SQL handle hash can be used as input for the Dynamic\
    \ Management Function (DMF) `sys.dm_exec_sql_text` to retrieve the query that\
    \ is being executed by the request.\n*   `plan_handle` returns the hash value\
    \ of the execution plan. An execution plan will show you the operations that were\
    \ performed by SQL Server when executing the query and is a great source of query-execution\
    \ information. We can use `plan_handle` the same way as the `sql_handle`, but\
    \ instead of returning the query it will return the execution plan of the query.\
    \ We can use the hash value as input for the DMF `sys.dm_exec_query_plan` in order\
    \ to return the execution plan of the query that is being executed by the request.\n\
    *   `wait_type` returns the current wait type if the request is either “SUSPENDED”\
    \ or “RUNNABLE.” The value will be `NULL` if the request is currently being processed.\n\
    *   The `last_wait_type` column returns the last wait type the request encountered\
    \ if it had to wait during its execution.\n*   `total_elapsed_time` column returns\
    \ the total time, in milliseconds, it took to process the request from the moment\
    \ it got created.\n\nThere are many more columns available in this DMV that all\
    \ have their different uses. A complete description is available on the Microsoft\
    \ MSDN page at [`https://msdn.microsoft.com/en-us/library/ms177648.aspx`](https://msdn.microsoft.com/en-us/library/ms177648.aspx),\
    \ and I encourage you to go through the article. The `sys.dm_exec_requests` DMV\
    \ is a great tool in your DBA toolkit and is one of those DMVs you will use frequently\
    \ for all kinds of purposes besides analyzing wait statistics.\n\n### Querying\
    \ sys.dm_exec_requests\n\nThe `sys.dm_exec_requests` DMV is one of the DMVs that\
    \ can give us access to query statements and corresponding execution plans by\
    \ returning the query and plan handles. If you are interested in this information,\
    \ and most of the time you probably will be, you need to pass the `sql_handle`\
    \ and `plan_handle` to their DMFs so the hashes turn into something we humans\
    \ can read and understand.\n\nListing 2-2 shows a query against the `sys.dm_exec_requests`\
    \ DMV and also retrieves the query statements and execution plans. I am excluding\
    \ the session ID I am executing the query on and ignoring session IDs lower than\
    \ 50 so as to keep the results small, and because I know for a fact that I am\
    \ interested only in user queries for this example.\n\n```sql\nSELECT\n    r.session_id\
    \ AS 'Session ID',\n    r.start_time AS 'Request Start',\n    r.[status] AS 'Current\
    \ State',\n    r.[command] AS 'Request Command',\n    t.[text] AS 'Query',\n \
    \   p.query_plan AS 'Execution Plan'\nFROM sys.dm_exec_requests r\nOUTER APPLY\
    \ sys.dm_exec_sql_text(r.sql_handle) AS t\nOUTER APPLY sys.dm_exec_query_plan(r.plan_handle)\
    \ p\nWHERE r.session_id > 50 AND r.session_id  @@SPID;\n```\n\nListing 2-2\n\n\
    On my test system I got the results as shown in Figure 2-7.\n\n![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig7_HTML.jpg](images/340881_2_En_2_Chapter/340881_2_En_2_Fig7_HTML.jpg)\n\
    \nFigure 2-7\n\nUsing the query in Listing 2-2, we can immediately see that session\
    \ ID 55 is performing a `SELECT` query, as the `query` column shows the complete\
    \ statement that is being executed. The `Execution Plan` column returns the execution\
    \ plan in an XML format. The great part of the SQL Server Management Studio is\
    \ that we can click the XML link that is returned to view the graphical execution\
    \ plan, as shown in Figure 2-8.\n\n![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig8_HTML.jpg](images/340881_2_En_2_Chapter/340881_2_En_2_Fig8_HTML.jpg)\n\
    \nFigure 2-8\n\nUsing the execution plan we can get some insight into how the\
    \ query is getting executed by the SQL Server engine. We won’t get into the details\
    \ about execution plans in this book, but you will be using them frequently when\
    \ you are optimizing query performance, so it is good to know how you can access\
    \ them from the `sys.dm_exec_requests` DMV. A good place to start if you want\
    \ to learn more about execution plans is Grant Fritchey’s *Execution Plan Basics*\
    \ at [`www.simple-talk.com/sql/performance/execution-plan-basics/`](http://www.simple-talk.com/sql/performance/execution-plan-basics/)."
  raw: '### Understanding sys.dm_exec_requests


    Like the previous DMVs, we can query the `sys.dm_exec_requests` DMV with a simple
    `SELECT * FROM sys.dm_exec_requests;` to return everything that is currently executing.
    Figure [2-6](#340881_2_En_2_Chapter.xhtml#Fig6) returns a small portion of the
    results on my test SQL Server.


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig6_HTML.jpg](images/340881_2_En_2_Chapter/340881_2_En_2_Fig6_HTML.jpg)


    Figure 2-6


    sys.dm_exec_requests


    The `sys.dm_exec_requests` DMV returns a lot more columns than the `sys.dm_os_wait_stats`
    or `sys.dm_os_waiting_tasks` DMVs we discussed earlier. To keep things readable
    I will only describe the columns we will frequently use for wait statistics analysis.
    Here is the list:


    *   `session_id` returns the ID of the session this request is associated with.


    *   `start_time` shows the date and time when the request got created. This can
    be a different time and even date than the time and date on which you are querying
    the DMV, especially when long-running queries are being executed.


    *   `command` returns information about what kind of action the request is performing.
    The most common commands are query related, like `SELECT`, `INSERT`, `UPDATE`,
    and `DELETE`, but there are many more commands depending on what is being executed
    by the request.


    *   `sql_handle` gives us a hash value of the SQL text that is being executed
    in the request. Not all requests have an SQL handle, and generally you should
    only see a SQL handle if the request was initiated by a user session and an SQL
    query is involved. The SQL handle hash can be used as input for the Dynamic Management
    Function (DMF) `sys.dm_exec_sql_text` to retrieve the query that is being executed
    by the request.


    *   `plan_handle` returns the hash value of the execution plan. An execution plan
    will show you the operations that were performed by SQL Server when executing
    the query and is a great source of query-execution information. We can use `plan_handle`
    the same way as the `sql_handle`, but instead of returning the query it will return
    the execution plan of the query. We can use the hash value as input for the DMF
    `sys.dm_exec_query_plan` in order to return the execution plan of the query that
    is being executed by the request.


    *   `wait_type` returns the current wait type if the request is either “SUSPENDED”
    or “RUNNABLE.” The value will be `NULL` if the request is currently being processed.


    *   The `last_wait_type` column returns the last wait type the request encountered
    if it had to wait during its execution.


    *   `total_elapsed_time` column returns the total time, in milliseconds, it took
    to process the request from the moment it got created.


    There are many more columns available in this DMV that all have their different
    uses. A complete description is available on the Microsoft MSDN page at [`https://msdn.microsoft.com/en-us/library/ms177648.aspx`](https://msdn.microsoft.com/en-us/library/ms177648.aspx)
    , and I encourage you to go through the article. The `sys.dm_exec_requests` DMV
    is a great tool in your DBA toolkit and is one of those DMVs you will use frequently
    for all kinds of purposes besides analyzing wait statistics.


    ### Querying sys.dm_exec_requests


    The `sys.dm_exec_requests` DMV is one of the DMVs that can give us access to query
    statements and corresponding execution plans by returning the query and plan handles.
    If you are interested in this information, and most of the time you probably will
    be, you need to pass the `sql_handle` and `plan_handle` to their DMFs so the hashes
    turn into something we humans can read and understand.


    Listing [2-2](#340881_2_En_2_Chapter.xhtml#PC3) shows a query against the `sys.dm_exec_requests`
    DMV and also retrieves the query statements and execution plans. I am excluding
    the session ID I am executing the query on and ignoring session IDs lower than
    50 so as to keep the results small, and because I know for a fact that I am interested
    only in user queries for this example.


    ```

    SELECT

    r.session_id AS ''Session ID'',

    r.start_time AS ''Request Start'',

    r.[status] AS ''Current State'',

    r.[command] AS ''Request Command'',

    t.[text] AS ''Query'',

    p.query_plan AS ''Execution Plan''

    FROM sys.dm_exec_requests r

    OUTER APPLY sys.dm_exec_sql_text(r.sql_handle) AS t

    OUTER APPLY sys.dm_exec_query_plan(r.plan_handle) p

    WHERE r.session_id > 50 AND r.session_id  @@SPID;

    Listing 2-2

    Query sys.dm_exec_request and include query statement and plan

    ```


    On my test system I got the results as shown in Figure [2-7](#340881_2_En_2_Chapter.xhtml#Fig7).


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig7_HTML.jpg](images/340881_2_En_2_Chapter/340881_2_En_2_Fig7_HTML.jpg)


    Figure 2-7


    Results of Listing [2-2](#340881_2_En_2_Chapter.xhtml#PC3)


    Using the query in Listing [2-2](#340881_2_En_2_Chapter.xhtml#PC3), we can immediately
    see that session ID 55 is performing a `SELECT` query, as the `query` column shows
    the complete statement that is being executed. The `Execution Plan` column returns
    the execution plan in an XML format. The great part of the SQL Server Management
    Studio is that we can click the XML link that is returned to view the graphical
    execution plan, as shown in Figure [2-8](#340881_2_En_2_Chapter.xhtml#Fig8).


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig8_HTML.jpg](images/340881_2_En_2_Chapter/340881_2_En_2_Fig8_HTML.jpg)


    Figure 2-8


    Execution plan


    Using the execution plan we can get some insight into how the query is getting
    executed by the SQL Server engine. We won’t get into the details about execution
    plans in this book, but you will be using them frequently when you are optimizing
    query performance, so it is good to know how you can access them from the `sys.dm_exec_requests`
    DMV. A good place to start if you want to learn more about execution plans is
    Grant Fritchey’s *Execution Plan Basics* at [`www.simple-talk.com/sql/performance/execution-plan-basics/`](http://www.simple-talk.com/sql/performance/execution-plan-basics/)
    .'
  trans: "### 理解 sys.dm_exec_requests\n\n与之前的动态管理视图（DMV）类似，我们可以通过一个简单的 `SELECT * FROM\
    \ sys.dm_exec_requests;` 查询 `sys.dm_exec_requests` DMV，以返回当前所有正在执行的操作。图 2-6 展示了我的测试\
    \ SQL Server 上返回的部分结果。\n\n![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig6_HTML.jpg](img/340881_2_En_2_Fig6_HTML.jpg)\n\
    \n图 2-6\n\n`sys.dm_exec_requests` DMV 返回的列比我们之前讨论的 `sys.dm_os_wait_stats` 或 `sys.dm_os_waiting_tasks`\
    \ DMV 要多得多。为了保持可读性，我将只描述我们经常用于等待统计信息分析的列。列表如下：\n\n*   `session_id` 返回此请求关联的会话\
    \ ID。\n*   `start_time` 显示请求创建的日期和时间。这与你查询 DMV 的时间和日期可能不同，尤其是当有长时间运行的查询正在执行时。\n\
    *   `command` 返回有关请求正在执行何种操作的信息。最常见的命令与查询相关，如 `SELECT`、`INSERT`、`UPDATE` 和 `DELETE`，但根据请求执行的操作，还有更多命令。\n\
    *   `sql_handle` 为我们提供请求中正在执行的 SQL 文本的哈希值。并非所有请求都有 SQL 句柄，通常只有当请求由用户会话发起且涉及 SQL\
    \ 查询时，你才会看到 SQL 句柄。SQL 句柄哈希可以用作动态管理函数（DMF）`sys.dm_exec_sql_text` 的输入，以检回该请求正在执行的查询。\n\
    *   `plan_handle` 返回执行计划的哈希值。执行计划将向你展示 SQL Server 执行查询时执行的操作，是查询执行信息的绝佳来源。我们可以像使用\
    \ `sql_handle` 一样使用 `plan_handle`，但不同的是，它返回的不是查询本身，而是查询的执行计划。我们可以将该哈希值用作 DMF `sys.dm_exec_query_plan`\
    \ 的输入，以返回该请求正在执行的查询的执行计划。\n*   `wait_type` 如果请求处于“SUSPENDED”（已挂起）或“RUNNABLE”（可运行）状态，则返回当前的等待类型。如果请求当前正在处理中，则该值将为\
    \ `NULL`。\n*   `last_wait_type` 列返回请求在其执行过程中如果必须等待时，上一次遇到的等待类型。\n*   `total_elapsed_time`\
    \ 列返回从请求创建开始处理它所花费的总时间（以毫秒为单位）。\n\n此 DMV 中还有更多列可用，它们各有不同的用途。完整的描述可在 Microsoft\
    \ MSDN 页面 [`https://msdn.microsoft.com/en-us/library/ms177648.aspx`](https://msdn.microsoft.com/en-us/library/ms177648.aspx)\
    \ 上找到，我鼓励你阅读该文章。`sys.dm_exec_requests` DMV 是你 DBA 工具包中的一个强大工具，也是除了分析等待统计信息之外，你还会经常用于各种目的的\
    \ DMV 之一。\n\n### 查询 sys.dm_exec_requests\n\n`sys.dm_exec_requests` DMV 是那些可以通过返回查询和计划句柄来让我们访问查询语句及其相应执行计划的\
    \ DMV 之一。如果你对此信息感兴趣（大多数时候你可能确实如此），你需要将 `sql_handle` 和 `plan_handle` 传递给它们对应的 DMF，以便将哈希值转换为我们人类可以阅读和理解的内容。\n\
    \n清单 2-2 展示了一个针对 `sys.dm_exec_requests` DMV 的查询，同时也检回了查询语句和执行计划。为了保持结果集较小，并且因为我确实只对本示例中的用户查询感兴趣，我排除了执行查询的会话\
    \ ID 并忽略了小于 50 的会话 ID。\n\n```sql\nSELECT\n    r.session_id AS 'Session ID',\n\
    \    r.start_time AS 'Request Start',\n    r.[status] AS 'Current State',\n  \
    \  r.[command] AS 'Request Command',\n    t.[text] AS 'Query',\n    p.query_plan\
    \ AS 'Execution Plan'\nFROM sys.dm_exec_requests r\nOUTER APPLY sys.dm_exec_sql_text(r.sql_handle)\
    \ AS t\nOUTER APPLY sys.dm_exec_query_plan(r.plan_handle) p\nWHERE r.session_id\
    \ > 50 AND r.session_id  @@SPID;\n```\n\n清单 2-2\n\n在我的测试系统上，得到了如图 2-7 所示的结果。\n\
    \n![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig7_HTML.jpg](img/340881_2_En_2_Fig7_HTML.jpg)\n\
    \n图 2-7\n\n使用清单 2-2 中的查询，我们可以立即看到会话 ID 55 正在执行一个 `SELECT` 查询，因为 `Query` 列显示了正在执行的完整语句。`Execution\
    \ Plan` 列以 XML 格式返回执行计划。SQL Server Management Studio 的一个很棒的功能是，我们可以点击返回的 XML 链接来查看图形化的执行计划，如图\
    \ 2-8 所示。\n\n![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig8_HTML.jpg](img/340881_2_En_2_Fig8_HTML.jpg)\n\
    \n图 2-8\n\n使用执行计划，我们可以深入了解查询是如何被 SQL Server 引擎执行的。本书不会深入探讨执行计划的细节，但在优化查询性能时你会经常用到它们，因此知道如何从\
    \ `sys.dm_exec_requests` DMV 访问它们是很有益的。如果你想了解更多关于执行计划的知识，Grant Fritchey 的 *Execution\
    \ Plan Basics* 是一个很好的起点：[`www.simple-talk.com/sql/performance/execution-plan-basics/`](http://www.simple-talk.com/sql/performance/execution-plan-basics/)。"
- fmt: '## `sys.dm_exec_session_wait_stats`


    与等待统计相关的 DMV 中，较新的一个是 `sys.dm_exec_session_wait_stats` DMV。它在 SQL Server 2016
    SP1 中引入，按会话级别返回等待统计信息。如果你还记得阅读本书第 [1](#340881_2_En_1_Chapter.xhtml) 章“等待统计内部原理”，会话是用户或进程与
    SQL Server 建立的活动连接。一个会话可以有多个请求，而每个请求又可以有多个任务来执行查询所需的操作。


    图 [2-9](#340881_2_En_2_Chapter.xhtml#Fig9) 展示了该 DMV 的列以及来自我测试系统的一些等待统计信息。


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig9_HTML.jpg](images/340881_2_En_2_Chapter/340881_2_En_2_Fig9_HTML.jpg)


    图 2-9 `sys.dm_exec_session_wait_stats`


    上图看起来是否熟悉？很可能熟悉，因为它实际上与 `sys.dm_os_wait_stats` DMV 几乎完全相同，只是多了一个 `session_id`
    列。


    需要重点指出的是，通过此 DMV 记录的等待统计信息是特定会话在活动期间执行的所有操作的累计值。例如，如果你在一个会话内执行十个不同的查询，DMV 返回的所有等待时间都是这十个查询的总等待时间。这意味着理解会话生命周期内发生的事情非常重要。该会话是否已经在忙于执行大批量的查询？还是只执行了单个查询语句？在依赖此
    DMV 分析会话等待统计之前，了解这些问题的答案至关重要。


    此外，会话 ID 在会话关闭后会被重用，这意味着如果不小心，你可能会看到一个重用该会话 ID 的新会话的等待统计信息。当会话 ID 被重用（或在连接池中重置）时，该
    DMV 中针对该特定会话的所有等待统计信息也会被重置。


    考虑到以上信息，我们可以得出结论：当报告性能缓慢时，此 DMV 并不直接适合作为“首选查看对象”。然而，它仍然有其用武之地，特别是当你能够针对涉及多个查询的特定操作重现特定性能问题时。在这种情况下，你可以聚焦于一个特定的会话
    ID 并重现问题，捕获查询执行过程中发生的所有事件的等待统计信息。


    ## 结合 DMV 检测当前等待


    既然我们已经查看了一些用于等待统计分析的最重要 DMV，现在让我们看一个如何使用这些 DMV 来找出是什么拖慢了你的 SQL Server 的示例。收集这些信息不会立即解决你的问题，但它会给你提供一个从何处开始寻找解决方案的线索。


    考虑以下场景：你是一家大公司的数据库管理员（DBA），该公司使用单一数据库存储所有销售信息。数据库运行在 SQL Server 2014 实例上，每天有几百名用户查询该数据库。


    通常一切运行良好——用户可以快速访问所需信息，每个需要使用数据库的人都感到满意。然而，今天对你这个 DBA 来说不是个好日子。电话从上午 10 点开始就没停过，一些用户聚集在你办公室门口，眼神愤怒——查询和插入销售信息的速度慢得令人难以置信。


    由于本书是关于等待统计的，让我们看看如何分析该场景中性能问题的等待统计信息。


    我们知道 `sys.dm_os_wait_stats` DMV 显示累计的等待统计信息，因此对于此场景，它不会有太大帮助。一个更好的起点是 `sys.dm_os_waiting_tasks`
    DMV，因为它会显示当前所有正在等待的任务。


    我们对 `sys.dm_os_waiting_tasks` DMV 运行以下查询：


    ```

    SELECT * FROM sys.dm_os_waiting_tasks

    ORDER BY session_id ASC;

    ```


    向下滚动查看结果时，我们看到许多用户会话都有等待任务，如图 [2-10](#340881_2_En_2_Chapter.xhtml#Fig10) 所示。


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig10_HTML.jpg](images/340881_2_En_2_Chapter/340881_2_En_2_Fig10_HTML.jpg)


    图 2-10 对 `sys.dm_os_waiting_tasks` DMV 查询的结果


    我们注意到会话 52、56、57 的等待时间相当高，并且它们都在以等待类型 `LCK_M_S` 等待。在不深入探讨此特定等待类型细节的情况下（将在第 [8](#340881_2_En_8_Chapter.xhtml)
    章“锁相关的等待类型”中详细讨论），只需知道此等待类型与锁定相关即可。显然，这些会话正在等待获取锁，这意味着它们很可能被另一个持有同一对象锁的进程阻塞。我们可以通过查看
    `blocking_` 列，从 `sys.dm_os_waiting_tasks` DMV 中提取锁定和阻塞信息。出于可读性原因，我修改了前面的查询，使其仅返回来自
    `sys.dm_os_waiting_tasks` DMV 的阻塞信息。图 [2-11](#340881_2_En_2_Chapter.xhtml#Fig11)
    显示了这些列。


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig11_HTML.png](images/340881_2_En_2_Chapter/340881_2_En_2_Fig11_HTML.png)


    图 2-11 来自 `sys.dm_os_waiting_tasks` DMV 的阻塞信息


    从这里我们可以看到，会话 56 和 57 被会话 52 阻塞。然而，会话 52 被会话 ID 54 阻塞。我们没有在 `sys.dm_os_waiting_tasks`
    DMV 中看到此会话 ID 被返回，这意味着该会话当前正在执行，并且没有在任何资源上等待。


    让我们检查另一个 DMV `sys.dm_exec_requests`，以获取有关会话 54 的一些信息：


    ```

    SELECT * FROM sys.dm_exec_requests

    WHERE session_id = 54;

    ```


    图 [2-12](#340881_2_En_2_Chapter.xhtml#Fig12) 显示了此查询的结果。


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig12_HTML.jpg](images/340881_2_En_2_Chapter/340881_2_En_2_Fig12_HTML.jpg)


    图 2-12 对 `sys.dm_exec_requests` 查询的结果


    还记得我曾写道 `sys.dm_exec_requests` DMV 返回当前正在处理的请求信息吗？显然，会话 ID 54 没有未完成的请求，因为没有返回任何信息。'
  raw: '## Sys.dm_exec_session_wait_stats


    One of the latest additions to the wait statistic–related DMVs is the **sys.dm_exec_session_wait_stats**
    DMV. It was introduced in SQL Server 2016 SP1 and returns wait statistics information
    on a per session level. If you remembered reading Chapter [1](#340881_2_En_1_Chapter.xhtml),
    “Wait Statistics Internals,” of this book, a session is an active connection a
    user or process has with SQL Server. A session can have multiple requests, which
    in turn can have multiple tasks performing the actions required to execute a query.


    Figure [2-9](#340881_2_En_2_Chapter.xhtml#Fig9) shows the columns of the DMV as
    well as some wait statistics information from my test system.


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig9_HTML.jpg](images/340881_2_En_2_Chapter/340881_2_En_2_Fig9_HTML.jpg)


    Figure 2-9


    sys.dm_exec_session_wait_stats


    Does the preceding figure look familiar? It probably does since it is practically
    identical to the **sys.dm_os_wait_stats** DMV but with an additional column for
    the **session_id**.


    What is important to point out is that wait statistics information that is recorded
    through this DMV is cumulative for all the actions that a specific session performed
    while it was active. For instance, if you execute ten different queries inside
    a single session, all the wait times that are returned by the DMV are the total
    wait time for those ten queries. This means it is very important to understand
    what happened during the lifetime of a session. Has the session already been busy
    executing large batches of queries? Or has it only executed a single query statement?
    Knowing the answers to these questions is very important before resorting to this
    DMV to analyze session wait statistics.


    Also, session IDs are reused after a session has been closed, meaning that if
    you are not careful you can see the wait statistics for a new session that is
    reusing the session ID. When a session ID gets reused (or reset when using connection
    pooling), all the wait statistics information inside this DMV for that specific
    session is reset as well.


    With the preceding information in mind, we can conclude this DMV is not directly
    useful as a “first-place-to-look” when performance is reported to be slow. The
    DMV still has its place though, especially if you can reproduce a specific performance
    issue with a specific action where multiple queries are involved. In that situation
    you can zoom in on a specific session ID and reproduce the issue, capturing wait
    statistics for everything that happens during the execution of the queries.


    ## Combining DMVs to Detect Waits Right Now


    Now that we have taken a look at some of the most important DMVs for wait statistics
    analysis, let’s go into an example of how you could use these DMVs to find out
    what is slowing down your SQL Server. Gathering this information will not solve
    your problems immediately, but it will give you a clue as to where to start looking
    for a solution.


    Consider the following scenario: You are the database administrator (DBA) for
    a large company that uses a single database to store all its sales information.
    The database is running on a SQL Server 2014 instance, and every day a few hundred
    users query the database.


    Normally everything is running fine—users can access the information they want
    quickly, and everyone who needs to work with the database is happy. Today, however,
    is not a good day for you as the DBA. The phone hasn’t stopped ringing since 10
    am and some users are gathering at the door of your office with an angry look
    in their eyes—querying and inserting sales information is incredibly slow.


    Since this book is about wait statistics, let’s take a look at how we could analyze
    wait statistics information about the performance problem in the scenario.


    We know the `sys.dm_os_wait_stats` DMV shows cumulative wait statistics information,
    so for this scenario it wouldn’t be much help. A much better starting place would
    be the `sys.dm_os_waiting_tasks` DMV, since it will show us all the tasks that
    are waiting right now.


    We run the following query against the `sys.dm_os_waiting_tasks` DMV:


    ```

    SELECT * FROM sys.dm_os_waiting_tasks

    ORDER BY session_id ASC;

    ```


    While scrolling down to the bottom of the results, we see a number of user sessions
    with waiting tasks, as shown in Figure [2-10](#340881_2_En_2_Chapter.xhtml#Fig10).


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig10_HTML.jpg](images/340881_2_En_2_Chapter/340881_2_En_2_Fig10_HTML.jpg)


    Figure 2-10


    Results of a query against the sys.dm_os_waiting_tasks DMV


    We notice that the wait times for sessions 52, 56, 57 are pretty high, and we
    also notice that they are all waiting with a wait type `LCK_M_S`. Without going
    into too many details about this particular wait type, it will be discussed in
    detail in Chapter [8](#340881_2_En_8_Chapter.xhtml), “Lock-Related Wait Types,”
    it is enough to know that this wait type is related to locking. Apparently, those
    sessions are waiting to place a lock, which means they are probably being blocked
    by another process that has a lock on the same object. We can extract locking
    and blocking information from the `sys.dm_os_waiting_tasks` DMF by looking at
    the `blocking_` columns. For readability reasons I modified the preceding query
    to return only blocking information from the `sys.dm_os_waiting_tasks` DMV. Figure [2-11](#340881_2_En_2_Chapter.xhtml#Fig11)
    shows those columns.


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig11_HTML.png](images/340881_2_En_2_Chapter/340881_2_En_2_Fig11_HTML.png)


    Figure 2-11


    Blocking information from the sys.dm_os_waiting_tasks DMV


    From what we can see here, sessions 56 and 57 are being blocked by session 52\.
    Session 52, however, is being blocked by session ID 54\. We don’t see this session
    ID returned in the `sys.dm_os_waiting_tasks` DMV, which means the session is currently
    executing and isn’t waiting on any resources.


    Let’s check another DMV, `sys.dm_exec_requests`, to get some information about
    session 54:


    ```

    SELECT * FROM sys.dm_exec_requests

    WHERE session_id = 54;

    ```


    Figure [2-12](#340881_2_En_2_Chapter.xhtml#Fig12) shows the results of this query.


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig12_HTML.jpg](images/340881_2_En_2_Chapter/340881_2_En_2_Fig12_HTML.jpg)


    Figure 2-12


    Results of a query against sys.dm_exec_requests


    Remember when I wrote the `sys.dm_exec_requests` DMV return information about
    requests currently being processed? Apparently, session ID 54 doesn’t have an
    outstanding request since no information is being returned.'
  trans: '## `sys.dm_exec_session_wait_stats`


    在与等待统计相关的 DMV 中，较新的一个是 `sys.dm_exec_session_wait_stats` DMV。它在 SQL Server 2016
    SP1 中引入，按会话级别返回等待统计信息。如果你还记得阅读本书第 1 章“等待统计内部原理”，会话是用户或进程与 SQL Server 建立的活动连接。一个会话可以有多个请求，而每个请求又可以有多个任务来执行查询所需的操作。


    图 2-9 展示了该 DMV 的列以及来自我测试系统的一些等待统计信息。


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig9_HTML.jpg](img/340881_2_En_2_Fig9_HTML.jpg)


    图 2-9 `sys.dm_exec_session_wait_stats`


    上图看起来是否熟悉？很可能熟悉，因为它实际上与 `sys.dm_os_wait_stats` DMV 几乎完全相同，只是多了一个 `session_id`
    列。


    需要重点指出的是，通过此 DMV 记录的等待统计信息是特定会话在活动期间执行的所有操作的累计值。例如，如果你在一个会话内执行十个不同的查询，DMV 返回的所有等待时间都是这十个查询的总等待时间。这意味着理解会话生命周期内发生的事情非常重要。该会话是否已经在忙于执行大批量的查询？还是只执行了单个查询语句？在依赖此
    DMV 分析会话等待统计之前，了解这些问题的答案至关重要。


    此外，会话 ID 在会话关闭后会被重用，这意味着如果不小心，你可能会看到一个重用该会话 ID 的新会话的等待统计信息。当会话 ID 被重用（或在连接池中重置）时，该
    DMV 中针对该特定会话的所有等待统计信息也会被重置。


    考虑到以上信息，我们可以得出结论：当报告性能缓慢时，此 DMV 并不直接适合作为“首选查看对象”。然而，它仍然有其用武之地，特别是当你能够针对涉及多个查询的特定操作重现特定性能问题时。在这种情况下，你可以聚焦于一个特定的会话
    ID 并重现问题，捕获查询执行过程中发生的所有事件的等待统计信息。


    ## 结合 DMV 检测当前等待


    既然我们已经查看了一些用于等待统计分析的最重要 DMV，现在让我们看一个如何使用这些 DMV 来找出是什么拖慢了你的 SQL Server 的示例。收集这些信息不会立即解决你的问题，但它会给你提供一个从何处开始寻找解决方案的线索。


    考虑以下场景：你是一家大公司的数据库管理员（DBA），该公司使用单一数据库存储所有销售信息。数据库运行在 SQL Server 2014 实例上，每天有几百名用户查询该数据库。


    通常一切运行良好——用户可以快速访问所需信息，每个需要使用数据库的人都感到满意。然而，今天对你这个 DBA 来说不是个好日子。电话从上午 10 点开始就没停过，一些用户聚集在你办公室门口，眼神愤怒——查询和插入销售信息的速度慢得令人难以置信。


    由于本书是关于等待统计的，让我们看看如何分析该场景中性能问题的等待统计信息。


    我们知道 `sys.dm_os_wait_stats` DMV 显示累计的等待统计信息，因此对于此场景，它不会有太大帮助。一个更好的起点是 `sys.dm_os_waiting_tasks`
    DMV，因为它会显示当前所有正在等待的任务。


    我们对 `sys.dm_os_waiting_tasks` DMV 运行以下查询：


    ```

    SELECT * FROM sys.dm_os_waiting_tasks

    ORDER BY session_id ASC;

    ```


    向下滚动查看结果时，我们看到许多用户会话都有等待任务，如图 2-10 所示。


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig10_HTML.jpg](img/340881_2_En_2_Fig10_HTML.jpg)


    图 2-10 对 `sys.dm_os_waiting_tasks` DMV 查询的结果


    我们注意到会话 52、56、57 的等待时间相当高，并且它们都在以等待类型 `LCK_M_S` 等待。在不深入探讨此特定等待类型细节的情况下（将在第 8 章“锁相关的等待类型”中详细讨论），只需知道此等待类型与锁定相关即可。显然，这些会话正在等待获取锁，这意味着它们很可能被另一个持有同一对象锁的进程阻塞。我们可以通过查看
    `blocking_` 列，从 `sys.dm_os_waiting_tasks` DMV 中提取锁定和阻塞信息。出于可读性原因，我修改了前面的查询，使其仅返回来自
    `sys.dm_os_waiting_tasks` DMV 的阻塞信息。图 2-11 显示了这些列。


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig11_HTML.png](img/340881_2_En_2_Fig11_HTML.png)


    图 2-11 来自 `sys.dm_os_waiting_tasks` DMV 的阻塞信息


    从这里我们可以看到，会话 56 和 57 被会话 52 阻塞。然而，会话 52 被会话 ID 54 阻塞。我们没有在 `sys.dm_os_waiting_tasks`
    DMV 中看到此会话 ID 被返回，这意味着该会话当前正在执行，并且没有在任何资源上等待。


    让我们检查另一个 DMV `sys.dm_exec_requests`，以获取有关会话 54 的一些信息：


    ```

    SELECT * FROM sys.dm_exec_requests

    WHERE session_id = 54;

    ```


    图 2-12 显示了此查询的结果。


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig12_HTML.jpg](img/340881_2_En_2_Fig12_HTML.jpg)


    图 2-12 对 `sys.dm_exec_requests` 查询的结果


    还记得我曾写道 `sys.dm_exec_requests` DMV 返回当前正在处理的请求信息吗？显然，会话 ID 54 没有未完成的请求，因为没有返回任何信息。'
- fmt: "# Using DMVs and Perfmon to Analyze Wait Statistics\n\n## Querying Session\
    \ Information and Resolving a Blocker\n\nIf we want to find out more information\
    \ about this session, we can use the `sys.dm_exec_sessions` DMV we discussed in\
    \ Chapter [1](#340881_2_En_1_Chapter.xhtml), “Wait Statistics Internals,” by executing\
    \ the following query:\n\n```sql\nSELECT\n    session_id,\n    [status],\n   \
    \ [host_name],\n    [program_name],\n    login_name,\n    is_user_process,\n \
    \   open_transaction_count\nFROM sys.dm_exec_sessions\nWHERE session_id = 54;\n\
    ```\n\nThis query returns the results shown in Figure [2-13](#340881_2_En_2_Chapter.xhtml#Fig13).\n\
    \n![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig13_HTML.jpg](images/340881_2_En_2_Chapter/340881_2_En_2_Fig13_HTML.jpg)\n\
    \n*Figure 2-13. Results from sys.dm_exec_sessions*\n\nWe can assume that session\
    \ ID doesn’t currently have any running requests since its status is “sleeping,”\
    \ which is why the query against the `sys.dm_exec_requests` didn’t return any\
    \ information. If we look at the `program_name` column, we can see that this session\
    \ was initiated from the Microsoft SQL Server Management Studio program by the\
    \ EVDL-SQL2017-01\\Administrator user.\n\nI included the `is_user_process` column\
    \ to make sure it is a user session, and the `open_transaction_count` column shows\
    \ us that this user session has an open transaction.\n\nWe now know enough information\
    \ to take corrective actions. We know who the user is who is blocking our other\
    \ tasks, and we can decide to give him a call about what he is currently performing,\
    \ or we can choose to end his session. Ending a user session by using the `KILL\
    \ [session_id]` command should always be your last resort because we could be\
    \ interrupting something important. Ending a session with the `KILL` command will\
    \ result in a rollback of the running transaction, undoing all the changes it\
    \ performed, which can take a long time to complete. In this case, I accept the\
    \ risk of a rollback and will end the session myself:\n\n```sql\nKILL 54;\n```\n\
    \nImmediately after we kill session ID 54 users report that their queries are\
    \ running again. If we query the `sys.dm_os_waiting_tasks` DMV to give us information\
    \ about those session IDs nothing gets returned, meaning they are no longer being\
    \ blocked.\n\nHopefully this example has given you insight into how you can use\
    \ the various DMVs available in SQL Server to gather information about tasks that\
    \ are currently waiting. In this case the example consisted of a transaction that\
    \ was blocking other queries, and we decided to kill the user session that was\
    \ responsible for the blocking lock. In many situations the solution isn’t this\
    \ relatively simple, but the method of gathering wait statistics information to\
    \ drill down to the bottom of the problem can be used in almost every performance-related\
    \ incident.\n\nAs I noted in the beginning of this section, just looking at the\
    \ wait statistics alone will not, in most cases, solve a performance problem,\
    \ but it is a good starting point to begin your investigation. To get a complete\
    \ picture about the performance of your system, we will often combine the wait\
    \ statistics information with other metrics, like those from the Windows Performance\
    \ Monitor, other DMVs, or vendor-specific information (like storage metrics).\n\
    \nFigure [2-14](#340881_2_En_2_Chapter.xhtml#Fig14) shows a flowchart of how you\
    \ could use wait statistics information to analyze a performance problem.\n\n\
    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig14_HTML.jpg](images/340881_2_En_2_Chapter/340881_2_En_2_Fig14_HTML.jpg)\n\
    \n*Figure 2-14. Wait statistics flowchart*\n\nWe will expand upon this flowchart\
    \ in Chapter [4](#340881_2_En_4_Chapter.xhtml), “Building a Solid Baseline,” where\
    \ we will introduce baselines to the wait statistics analysis method.\n\n## Viewing\
    \ Wait Statistics Using Perfmon\n\nOne of the most important tools for accessing\
    \ the extra metrics we need when analyzing wait statistics is the Windows Performance\
    \ Monitor, or Perfmon. Perfmon is available on every Windows Operating System\
    \ and contains counters for just about every part of the system, including SQL\
    \ Server–related performance counters. You can start Perfmon by executing the\
    \ `perfmon` command from either a Windows Run dialog or the command line.\n\n\
    In addition to giving us information about the performance of our system, Perfmon\
    \ can also be used to view wait statistics. You can view these counters under\
    \ the `SQLServer:Wait Statistics` category when adding counters inside the Perfmon\
    \ application, as shown in Figure [2-15](#340881_2_En_2_Chapter.xhtml#Fig15).\n\
    \n![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig15_HTML.jpg](images/340881_2_En_2_Chapter/340881_2_En_2_Fig15_HTML.jpg)\n\
    \n*Figure 2-15. Wait statistics counters inside Perfmon*\n\nOne thing you’ll notice\
    \ in Figure [2-15](#340881_2_En_2_Chapter.xhtml#Fig15) is that the wait statistics\
    \ inside Perfmon are grouped inside categories. We won’t find information about\
    \ specific wait types here, so if we want to use Perfmon to analyze wait statistics\
    \ we should have a general idea of what category a specific wait type belongs\
    \ to in Perfmon. It is able to display an average wait time, cumulative wait time,\
    \ the current total number of waits, and the amount of new waits started for every\
    \ wait statistics category. If we are interested in a higher-level view—for instance,\
    \ we want to know how many tasks are waiting for lock-related wait types—we can\
    \ use Perfmon to give us that information. If we want to have more detail about\
    \ specific wait type information, we should use the `sys.dm_os_wait_stats` or\
    \ `sys.dm_os_waiting_tasks` DMVs we discussed earlier.\n\nOne nice feature of\
    \ Perfmon is that it can convert the measurements directly into graphs, giving\
    \ us a more visual way to look at the information without having to create the\
    \ graphs ourselves. Figure [2-16](#340881_2_En_2_Chapter.xhtml#Fig16) is an example\
    \ of a graph where we are showing the “Average wait time” and “Waits started per\
    \ second” for the Lock waits category.\n\n![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig16_HTML.jpg](images/340881_2_En_2_Chapter/340881_2_En_2_Fig16_HTML.jpg)\n\
    \n*Figure 2-16. Perfmon graph showing wait statistics information*\n\nDuring this\
    \ book we will use Perfmon a lot for analyzing metrics related to specific wait\
    \ types, like CPU time, disk latency, and memory usage. We will not make much\
    \ use of the wait statistics counters inside Perfmon, because I believe the SQL\
    \ Server DMVs are better suited for this since they supply the level of detail\
    \ needed for a complete analysis."
