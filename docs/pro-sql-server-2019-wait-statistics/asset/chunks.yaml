- fmt: 'We are running into a lot of `PAGELATCH_UP` waits here that indicate that
    a latch is waiting to update a page in-memory. The `resource_description` column
    is very useful here since it indicates the page ID that the latch wants to access.
    In this case the page ID we are trying to access is `2:3:1`. The first number,
    `2`, represents the database ID, which is the `TempDB` database. The second number,
    `2`, indicates the file ID (the TempDB database on my test system consists of
    multiple data files). Finally, the last number indicates the page ID, `1`. Why
    are all those sessions waiting on the same wait type against the same data page?
    This page happens to be a very special page, the Page Free Space (PFS) page. The
    PFS page tracks how much free space is left inside every page inside the database.
    It is always the first page of every database (page ID of 1) and has an interval
    of 8088 pages. So in this example, all the requests are waiting to update the
    first PFS page inside the `TempDB` database.


    Because we are running inserts into a temporary table using many concurrent connections,
    we need to find, or allocate, data pages with free space to hold our rows inside
    the `TempDB`. All this space usage needs to be updated inside the PFS page, and
    latches are used to make sure only one thread gets access to the PFS page at a
    time. Figure [9-6](#340881_2_En_9_Chapter.xhtml#Fig6) shows a Perfmon graph of
    two Perfmon counters, Transaction and Latch Waits/sec. This will show the relationship
    between to-Ostress workload and the number of latch waits occurring.


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig6_HTML.jpg](images/340881_2_En_9_Chapter/340881_2_En_9_Fig6_HTML.jpg)


    **Figure 9-6**


    Latch Waits/sec and Transactions Perfmon graph


    This is actually a classic example of the page-latch contention inside the `TempDB`
    database that can occur when many concurrent queries are creating objects inside
    `TempDB`. One way to resolve this specific case of latch contention is by adding
    more (equally sized) `TempDB` data files. Every new data file will maintain its
    own PFS pages, and adding more data files helps spread the load of updating the
    PFS pages. Using the query that follows, I added three more data files to the
    `TempDB` database:


    ```sql

    USE [master]

    GO

    ALTER DATABASE [tempdb] ADD FILE ( NAME = N''tempdev2'', FILENAME = N''D:\Data\tempdb2.mdf''
    , SIZE = 204800KB , FILEGROWTH = 10%)

    GO

    ALTER DATABASE [tempdb] ADD FILE ( NAME = N''tempdev3'', FILENAME = N''D:\Data\tempdb3.mdf''
    , SIZE = 204800KB , FILEGROWTH = 10%)

    GO

    ALTER DATABASE [tempdb] ADD FILE ( NAME = N''tempdev4'', FILENAME = N''D:\Data\tempdb4.mdf''
    , SIZE = 204800KB , FILEGROWTH = 10%)

    GO

    ```


    When running the Ostress utility again with the same query to insert data into
    a temporary table as we did before, I still notice latch waits occurring on PFS
    pages, but they are spread better across the `TempDB` data files. When looking
    at the Transactions and Latch Waits/sec Perfmon counters, I also see fewer latch
    waits occurring, as shown in Figure [9-7](#340881_2_En_9_Chapter.xhtml#Fig7).


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig7_HTML.jpg](images/340881_2_En_9_Chapter/340881_2_En_9_Fig7_HTML.jpg)


    **Figure 9-7**


    Latch Waits/sec and Transaction Perfmon graph after adding more TempDB files


    By adding more `TempDB` data files, I would be able to lower the amount of latch
    waits even further. Adding too many `TempDB` data files can be a bad idea though,
    since the round-robin algorithm that makes sure the data files receive equal allocations
    can generate noticeable overhead when it needs to manage many `TempDB` data files.
    Paul Randal over at his SQLskills blog has a great post discussing `TempDB` data
    files and latch contention, which you can find here: [`www.sqlskills.com/blogs/paul/a-sql-server-dba-myth-a-day-1230-tempdb-should-always-have-one-data-file-per-processor-core/`](http://www.sqlskills.com/blogs/paul/a-sql-server-dba-myth-a-day-1230-tempdb-should-always-have-one-data-file-per-processor-core/).


    Now that we have discussed what latches are and how they work, and looked at an
    example of latch contention, let’s move on and look at latch-related wait types.


    ## PAGELATCH_[xx]


    The first latch-related wait type we will discuss in this chapter is the `PAGELATCH_[xx]`
    wait type, where the `[xx]` indicates the latch mode used (e.g., SH for Shared).
    Since we already discussed the various latch modes in the introduction of this
    chapter, we won’t describe them again in this chapter.


    ### What Is the PAGELATCH_[xx] Wait Type?


    `PAGELATCH_[xx]` waits occur whenever a latch has to wait before it can access
    a page in-memory. The main cause for these waits is other latches that are already
    in place on the page and are incompatible with the latch mode our request wants
    to use. Just like a lock, the latch we want to place on the page has to wait until
    the incompatible latch is removed from the page. As long as the incompatible latch
    is in place, our request will record `PAGELATCH_[xx]` wait time. Figure [9-8](#340881_2_En_9_Chapter.xhtml#Fig8)
    shows a graphical representation of a `PAGELATCH_UP` wait occurring. I used a
    cogwheel icon to indicate a latch is already in place on the page to avoid confusion
    with SQL Server locks.


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig8_HTML.jpg](images/340881_2_En_9_Chapter/340881_2_En_9_Fig8_HTML.jpg)


    **Figure 9-8**


    PAGELATCH_UP wait occurring


    It’s easy to confuse `PAGELATCH_[xx]` waits with `PAGEIOLATCH_[xx]` waits. Even
    though they look alike in name, both are completely different latch wait types.
    The former indicates access to pages already in memory, while the latter indicates
    pages are being read from disk into memory. We will go into detail regarding the
    `PAGEIOLATCH_[xx]` wait type a bit later in this chapter.'
