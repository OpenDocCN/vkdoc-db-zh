  trans: '## 基于执行计划按查询分析等待统计信息


    到目前为止，我们主要查看了由各种后台进程或我们执行的查询所产生的聚合等待时间。由于我是唯一一个向我的测试机执行查询的人，因此很容易将等待时间与我的特定查询关联起来。不幸的是，在繁忙的系统上，大量会话不断执行许多查询，各种等待统计信息
    DMV 对于分析特定查询的等待类型和等待时间几乎毫无用处。


    值得庆幸的是，SQL Server 2016 SP1 的发布改变了这一情况，并引入了在查询执行计划内部捕获等待统计信息的功能！这意味着您可以轻松地查看您的查询在运行时遇到了哪些等待类型和等待时间。尽管这似乎显而易见，但请注意，每查询等待统计信息仅在查看**实际执行计划**时可用，**估算执行计划**则不行。


    实际执行计划是在查询执行期间实际使用的执行计划。SQL Server Management Studio 中有一个选项可以查看估算执行计划。使用该选项时，SQL
    Server 引擎会编译出最有可能在查询执行期间使用的执行计划；然而，它实际上并不执行查询本身。由于没有实际执行查询，因此在编译估算执行计划时也没有等待统计信息可以记录。


    公开每查询等待统计信息的最简单方法是启用 `Include Actual Execution Plan` 选项（如图 2-26 所示），可以通过单击菜单项“查询
    – 包含实际执行计划”或使用组合键 `CTRL_M` 来实现，然后执行您的查询。


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig26_HTML.jpg](img/340881_2_En_2_Fig26_HTML.jpg)


    图 2-26

    `Include Actual Execution Plan` 选项


    当您启用 `Include Actual Execution Plan` 选项执行查询时，查询结果将返回一个名为 `Execution plan` 的额外选项卡。单击该选项卡将显示执行查询时所使用的执行计划的可视化表示。图
    2-27 显示了一个实际执行计划的示例。


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig27_HTML.jpg](img/340881_2_En_2_Fig27_HTML.jpg)


    图 2-27

    `Execution plan`


    打开实际执行计划后，我们可以通过右键单击第一个运算符（在图 2-28 的例子中是 `SELECT` 运算符）并选择 `Properties` 来访问每查询等待统计信息。这将打开
    SQL Server Management Studio 内部的执行计划属性窗口，并揭示有关查询执行以及所选运算符各种属性的丰富信息，例如使用的并行度或处理的行数。


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig28_HTML.jpg](img/340881_2_En_2_Fig28_HTML.jpg)


    图 2-28

    `Execution plan properties`


    由于我们对等待统计信息感兴趣，执行计划属性中最有趣的部分记录在属性窗口的最底部。展开 `WaitStats` 属性后，您就能够看到此特定查询在执行时遇到的所有等待类型和等待时间。图
    2-29 显示了此特定示例查询的每查询等待统计信息。


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig29_HTML.jpg](img/340881_2_En_2_Fig29_HTML.jpg)


    图 2-29

    `Execution plan properties` 中的每查询等待统计信息


    在本例中，我们的查询在执行时遇到了三种不同的等待类型：`PAGEIOLATCH_SH`、`MEMORY_ALLOCATION_EXT` 和 `ASYNC_NETWORK_IO`。对于每种等待类型，您都可以看到等待花费了多少时间，以及我们在该等待类型上等待了多少次。当查看单个查询在其执行期间遇到的等待统计信息时，此信息非常有用，并且也许能为您提供一些关于如何调整查询性能的见解。例如，如果您发现一个查询经常遇到与存储相关的等待统计信息，那么研究如何最小化对该特定查询的存储访问可能是值得的，以便其执行得更快。


    我想再次指出的一点是，每查询等待统计信息仅记录在**实际执行计划**中！我再次提及的原因是，实际执行计划只能通过在查询执行前启用它来获得。没有其他方法可以访问实际执行计划，甚至通过查询存储也不行，我们将在下一章中看到。事实上，存储在
    SQL Server 计划缓存中的执行计划是估算执行计划，而不是实际计划。这意味着如果您期望通过计划缓存检索每查询等待统计信息，您将会失望。


    值得庆幸的是，尽管查询存储功能最初不记录实际执行计划，但它确实（随着 SQL Server 2017 的发布）将等待统计信息和其他查询运行时信息与估算执行计划一起记录了下来。将这些信息混合在一起意味着，通过查询存储，我们可以回溯历史，查看查询遇到了哪些等待统计信息！


    ## 本章小结


    在本章中，我们回顾了访问等待统计信息的各种方法。我们深入探讨了一些关于等待统计信息最重要的 DMV：`sys.dm_os_wait_stats`、`sys.dm_os_waiting_tasks`、`sys.dm_exec_requests`
    和 `sys.dm_exec_session_wait_stats`。我描述了它们的功能和返回的数据，并为您提供了一些可用于这些 DMV 的示例查询。我们还通过一个示例场景，其中我们组合了一些
    DMV 来分析示例中是什么减慢了 SQL Server 的速度。示例中展示的步骤是在性能问题发生时分析系统性能问题的好方法。简要地，我们查看了 Windows
    性能监视器（或 `Perfmon`），以及如何从其中访问等待统计信息。之后，我们仔细研究了扩展事件（Extended Events），以及如何使用扩展事件
    GUI 或 `T-SQL` 来捕获特定查询或会话的等待相关信息。我们以查看执行计划记录的等待统计信息结束了本章。


    # 3. 查询存储


    随着 SQL Server 2016 的发布，微软引入了一种全新的分析和排除查询性能问题的方法：查询存储（Query Store）。查询存储常被宣传为 SQL
    Server 的“飞行记录仪”，因为它提供了对查询何时执行、执行性能如何以及在查询执行期间使用了哪个执行计划的深入了解。虽然查询存储最初并未公开查询执行期间遇到的等待统计信息，但
    SQL Server 2017 的发布包含了这一备受期待的补充。


    由于查询存储在查询性能分析和调优方面是一个颠覆性的功能，我认为它值得一些额外的关注，以便您能从这一特性中获得最大收益。'
- fmt: '## What Is the Query Store?


    The Query Store feature was first released in SQL Server 2016 and had a goal of
    exposing query performance in an easier and more accessible way. Before the Query
    Store, query performance analysis was a challenging and time-consuming process
    that requires very thorough knowledge of how SQL Server processes queries and
    how you can analyze information through the various `DMVs`. While experience and
    knowledge of query execution is still very helpful, the Query Store helps you
    access the performance information you need in a more accessible and visual manner.


    The `Query Store` is integrated directly inside the SQL Server engine. This means
    that it can capture and analyze query executing where it is occurring. This is
    a major difference compared to query analysis through other methods, like the
    execution plan cache, where query runtime information is only available at a later
    stage. Another advantage of the `Query Store` is that it persists query runtime
    information to disk. This means you can build up a history of runtime metrics
    for your queries and allows easier comparison between historic runtime statistics
    and current ones. This is a difference compared to the `DMVs`, which only records
    information for the time SQL Server is running and flushes all recorded information
    at a restart of SQL Server, meaning you start back with all the counters at 0
    again. To continue the comparison of the `Query Store` vs. `DMVs`, while all the
    `DMVs` record information on the entire SQL Server Instance level, the `Query
    Store` allows you to capture query runtime metrics on a per-databases basis. This
    makes analyzing performance for a specific database inside an Instance with multiple
    databases considerably easier and quicker.


    There are more advantages of using the `Query Store`, for instance, the easy forcing
    of execution plans, but since this is a book about wait statistics, I will not
    cover everything that the `Query Store` has to offer. If you are interested in
    more in-depth look of the `Query Store`, I wrote a series of articles that describes
    just about everything the `Query Store` is capable of and it’s available here:
    [`www.red-gate.com/simple-talk/sql/database-administration/the-sql-server-2016-query-store-overview-and-architecture/`](http://www.red-gate.com/simple-talk/sql/database-administration/the-sql-server-2016-query-store-overview-and-architecture/).


    ## Query Store Architecture


    To give you a good idea on how the `Query Store` works, I created the image in
    Figure [3-1](#340881_2_En_3_Chapter.xhtml#Fig1) that shows how query runtime information
    is recorded and stored inside the `Query Store`. This knowledge is important if
    you want to add the `Query Store` as a tool to analyze query performance and wait
    statistics.


    ![../images/340881_2_En_3_Chapter/340881_2_En_3_Fig1_HTML.jpg](images/340881_2_En_3_Chapter/340881_2_En_3_Fig1_HTML.jpg)


    Figure 3-1


    Query Store architecture


    As soon as a query is starting its execution, and you have the `Query Store` enabled
    on the database the query is being executed against, the `Query Store` splits
    the query runtime information into three parts: the query execution plan, the
    query text, and the runtime statistics of the query execution. Both the execution
    plan and the query text are immediately recorded in the `Query Store` during the
    compilation of the execution plan. The runtime statistics (including wait statistics
    information) are only available after execution of the query, meaning they will
    be added to the `Query Store` after query execution.


    All of the `Query Store` metrics are first stored inside a reserved memory area
    of SQL Server. This means they are directly available through queries or the built-in
    reports, but are not hardened to disk yet (exception is new execution plans, these
    are hardened directly). Based on a configurable setting inside the `Query Store`
    called the `Data flush interval` you can configure how fast the `Query Store`
    should harden the information to disk.


    We can access all the information the `Query Store` records through two methods:
    `Query Store DMVs` and the built-in reports. To expose the wait statistics inside
    the `Query Store`, we will be using both options, though I believe the `DMV` approach
    is more useful when looking at the wait statistics data.


    ## How Wait Statistics Are Processed in the Query Store


    Before we can get started looking at how we can access the wait statistics information
    recorded in the `Query Store`, we need to look at how the `Query Store` processes
    wait statistics, since it is different compared to the process I described in
    Chapter [1](#340881_2_En_1_Chapter.xhtml), “Wait Statistics Internals,” of this
    book. In that chapter I described that the SQL Server engine keeps track of how
    long a query spends waiting on a specific resource, or wait type. This information
    is recorded at a very granular level; for instance, the `PAGEIOLATCH_SH` wait
    type indicates that the query is waiting for data pages to be read from disk to
    the buffer cache and a `PAGEIOLATCH_EX` that the query is waiting for a data page
    to be moved to the buffer cache for modification. Instead of recording wait times
    on such a detailed level, the team behind the development of the `Query Store`
    decided that a more high-level wait type overview was required to avoid performance
    and resource utilization overhead. Ultimately, they chose to group various wait
    types together into categories and record wait times on a category level instead
    of individual wait types. This means that searching for specific wait types inside
    the `Query Store` recorded wait statistics is not possible and wait types that
    share the same category cannot be distinguished from each other. To give you an
    example, both the `CMEMTHREAD` and the `RESOURCE_SEMAPHORE` wait types (of which
    you will learn more in Chapter [6](#340881_2_En_6_Chapter.xhtml), “IO-Related
    Wait Types”) are recorded inside the `Memory` category inside the `Query Store`,
    even though both wait types indicate different things.


    Table [3-1](#340881_2_En_3_Chapter.xhtml#Tab1) shows the mapping between wait
    types and wait categories that are used in the `Query Store`. The table is by
    no means a complete overview of the mappings but should give you a good idea where
    to expect a certain wait type.


    Table 3-1


    Mapping Between wait types and Categories'
  raw: '## What Is the Query Store?


    The Query Store feature was first released in SQL Server 2016 and had a goal of
    exposing query performance in an easier and more accessible way. Before the Query
    Store, query performance analysis was a challenging and time-consuming process
    that requires very thorough knowledge of how SQL Server processes queries and
    how you can analyze information through the various DMVs. While experience and
    knowledge of query execution is still very helpful, the Query Store helps you
    access the performance information you need in a more accessible and visual manner.


    The Query Store is integrated directly inside the SQL Server engine. This means
    that it can capture and analyze query executing where it is occurring. This is
    a major difference compared to query analysis through other methods, like the
    execution plan cache, where query runtime information is only available at a later
    stage. Another advantage of the Query Store is that it persists query runtime
    information to disk. This means you can build up a history of runtime metrics
    for your queries and allows easier comparison between historic runtime statistics
    and current ones. This is a difference compared to the DMVs, which only records
    information for the time SQL Server is running and flushes all recorded information
    at a restart of SQL Server, meaning you start back with all the counters at 0
    again. To continue the comparison of the Query Store vs. DMVs, while all the DMVs
    record information on the entire SQL Server Instance level, the Query Store allows
    you to capture query runtime metrics on a per-databases basis. This makes analyzing
    performance for a specific database inside an Instance with multiple databases
    considerably easier and quicker.


    There are more advantages of using the Query Store, for instance, the easy forcing
    of execution plans, but since this is a book about wait statistics, I will not
    cover everything that the Query Store has to offer. If you are interested in more
    in-depth look of the Query Store, I wrote a series of articles that describes
    just about everything the Query Store is capable of and it’s available here: [`www.red-gate.com/simple-talk/sql/database-administration/the-sql-server-2016-query-store-overview-and-architecture/`](http://www.red-gate.com/simple-talk/sql/database-administration/the-sql-server-2016-query-store-overview-and-architecture/)
    .


    ## Query Store Architecture


    To give you a good idea on how the Query Store works, I created the image in Figure
    [3-1](#340881_2_En_3_Chapter.xhtml#Fig1) that shows how query runtime information
    is recorded and stored inside the Query Store. This knowledge is important if
    you want to add the Query Store as a tool to analyze query performance and wait
    statistics.


    ![../images/340881_2_En_3_Chapter/340881_2_En_3_Fig1_HTML.jpg](images/340881_2_En_3_Chapter/340881_2_En_3_Fig1_HTML.jpg)


    Figure 3-1


    Query Store architecture


    As soon as a query is starting its execution, and you have the Query Store enabled
    on the database the query is being executed against, the Query Store splits the
    query runtime information into three parts: the query execution plan, the query
    text, and the runtime statistics of the query execution. Both the execution plan
    and the query text are immediately recorded in the Query Store during the compilation
    of the execution plan. The runtime statistics (including wait statistics information)
    are only available after execution of the query, meaning they will be added to
    the Query Store after query execution.


    All of the Query Store metrics are first stored inside a reserved memory area
    of SQL Server. This means they are directly available through queries or the built-in
    reports, but are not hardened to disk yet (exception is new execution plans, these
    are hardened directly). Based on a configurable setting inside the Query Store
    called the “Data flush interval” you can configure how fast the Query Store should
    harden the information to disk.


    We can access all the information the Query Store records through two methods:
    Query Store DMVs and the built-in reports. To expose the wait statistics inside
    the Query Store, we will be using both options, though I believe the DMV approach
    is more useful when looking at the wait statistics data.


    ## How Wait Statistics Are Processed in the Query Store


    Before we can get started looking at how we can access the wait statistics information
    recorded in the Query Store, we need to look at how the Query Store processes
    wait statistics, since it is different compared to the process I described in
    Chapter [1](#340881_2_En_1_Chapter.xhtml), “Wait Statistics Internals,” of this
    book. In that chapter I described that the SQL Server engine keeps track of how
    long a query spends waiting on a specific resource, or wait type. This information
    is recorded at a very granular level; for instance, the PAGEIOLATCH_SH wait type
    indicates that the query is waiting for data pages to be read from disk to the
    buffer cache and a PAGEIOLATCH_EX that the query is waiting for a data page to
    be moved to the buffer cache for modification. Instead of recording wait times
    on such a detailed level, the team behind the development of the Query Store decided
    that a more high-level wait type overview was required to avoid performance and
    resource utilization overhead. Ultimately, they chose to group various wait types
    together into categories and record wait times on a category level instead of
    individual wait types. This means that searching for specific wait types inside
    the Query Store recorded wait statistics is not possible and wait types that share
    the same category cannot be distinguished from each other. To give you an example,
    both the CMEMTHREAD and the RESOURCE_SEMAPHORE wait types (of which you will learn
    more in Chapter [6](#340881_2_En_6_Chapter.xhtml), “IO-Related Wait Types”) are
    recorded inside the Memory category inside the Query Store, even though both wait
    types indicate different things.


    Table [3-1](#340881_2_En_3_Chapter.xhtml#Tab1) shows the mapping between wait
    types and wait categories that are used in the Query Store. The table is by no
    means a complete overview of the mappings but should give you a good idea where
    to expect a certain wait type.


    Table 3-1


    Mapping Between wait types and Categories'
  trans: '## 什么是查询存储？


    查询存储功能首次发布于 SQL Server 2016，其目标是以更简单、更易访问的方式揭示查询性能。在查询存储出现之前，查询性能分析是一个充满挑战且耗时的过程，需要对
    SQL Server 如何处理查询以及如何通过各种 `DMVs` 分析信息有非常透彻的了解。虽然查询执行方面的经验和知识仍然非常有帮助，但查询存储能以更易访问和可视化的方式帮助你获取所需的性能信息。


    `查询存储`直接集成在 SQL Server 引擎内部。这意味着它可以在查询执行发生的地方捕获并分析查询执行情况。与通过其他方法（如执行计划缓存）进行查询分析相比，这是一个主要区别，后者的查询运行时信息仅在后期阶段才可用。`查询存储`的另一个优势是它会将查询运行时信息持久化到磁盘。这意味着你可以为查询建立运行时指标的历史记录，并且可以更轻松地比较历史运行时统计信息与当前统计信息。这与
    `DMVs` 不同，后者仅记录 SQL Server 运行期间的信息，并在 SQL Server 重启时清空所有记录的信息，这意味着所有计数器又从 0 开始。继续比较
    `查询存储` 与 `DMVs`，虽然所有 `DMVs` 都在 SQL Server 实例级别记录信息，但 `查询存储` 允许你基于每个数据库捕获查询运行时指标。这使得在一个包含多个数据库的实例中，针对特定数据库分析性能变得相当容易和快捷。


    使用 `查询存储` 还有更多优势，例如轻松强制使用执行计划，但由于这是一本关于等待统计信息的书，我不会涵盖 `查询存储` 所有的功能。如果你对更深入了解 `查询存储`
    感兴趣，我写了一系列文章，描述了 `查询存储` 几乎所有的功能，文章在这里： [`www.red-gate.com/simple-talk/sql/database-administration/the-sql-server-2016-query-store-overview-and-architecture/`](http://www.red-gate.com/simple-talk/sql/database-administration/the-sql-server-2016-query-store-overview-and-architecture/)。


    ## 查询存储架构


    为了让你很好地了解 `查询存储` 如何工作，我创建了图 3-1 中的图像，展示了查询运行时信息如何在 `查询存储` 内部被记录和存储。如果你想将 `查询存储`
    作为分析查询性能和等待统计信息的工具，这些知识很重要。


    ![../images/340881_2_En_3_Chapter/340881_2_En_3_Fig1_HTML.jpg](img/340881_2_En_3_Fig1_HTML.jpg)


    图 3-1


    查询存储架构


    一旦查询开始执行，并且你已经在查询所针对的数据库上启用了 `查询存储`，`查询存储` 将查询运行时信息分为三个部分：查询执行计划、查询文本和查询执行的运行时统计信息。执行计划和查询文本都在执行计划编译期间立即记录在
    `查询存储` 中。运行时统计信息（包括等待统计信息）仅在查询执行后才可用，这意味着它们将在查询执行后添加到 `查询存储`。


    所有 `查询存储` 指标首先存储在 SQL Server 的保留内存区域中。这意味着它们可以通过查询或内置报告直接访问，但尚未固化到磁盘（新执行计划除外，它们会直接固化）。基于
    `查询存储` 中一个名为 `数据刷新间隔` 的可配置设置，你可以配置 `查询存储` 应以多快的速度将信息固化到磁盘。


    我们可以通过两种方法访问 `查询存储` 记录的所有信息：`查询存储 DMVs` 和内置报告。为了在 `查询存储` 中揭示等待统计信息，我们将使用这两种选项，但我认为在查看等待统计信息数据时，`DMV`
    方法更有用。


    ## 等待统计信息在查询存储中如何处理


    在我们开始查看如何访问 `查询存储` 中记录的等待统计信息之前，我们需要了解 `查询存储` 如何处理等待统计信息，因为它与我在本书第 1 章“等待统计信息内幕”中描述的过程不同。在那一章中，我描述了
    SQL Server 引擎如何跟踪查询在特定资源或等待类型上花费的等待时间。这些信息以非常细的粒度记录；例如，`PAGEIOLATCH_SH` 等待类型表示查询正在等待数据页从磁盘读取到缓冲区高速缓存，而
    `PAGEIOLATCH_EX` 表示查询正在等待数据页移动到缓冲区高速缓存以进行修改。`查询存储` 开发团队认为，为了避免性能和资源利用开销，需要更高级别的等待类型概览，而不是在如此详细的级别记录等待时间。最终，他们选择将各种等待类型分组到类别中，并在类别级别记录等待时间，而不是单个等待类型。这意味着在
    `查询存储` 记录的等待统计信息中搜索特定的等待类型是不可能的，并且属于同一类别的等待类型无法相互区分。举个例子，`CMEMTHREAD` 和 `RESOURCE_SEMAPHORE`
    等待类型（你将在第 6 章“I/O 相关等待类型”中了解更多）都被记录在 `查询存储` 的 `Memory` 类别中，尽管这两种等待类型指示不同的事情。


    表 3-1 显示了 `查询存储` 中使用的等待类型与等待类别之间的映射关系。该表绝不是映射的完整概述，但应能让你很好地了解在哪里可以找到某个特定的等待类型。


    表 3-1


    等待类型与类别之间的映射'
- fmt: "# 等待类别与等待类型对照表\n\n| Wait Category | Associated Wait Types |\n| --- | --- |\n\
    | **Unknown** | Unknown |\n| **CPU** | SOS_SCHEDULER_YIELD |\n| **Worker thread**\
    \ | THREADPOOL |\n| **Lock** | LCK_M_% |\n| **Latch** | LATCH_% |\n| **Buffer\
    \ latch** | PAGELATCH_% |\n| **Buffer IO** | PAGEIOLATCH_% |\n| **Compilation***\
    \ | RESOURCE_SEMAPHORE_QUERY_COMPILE |\n| **SQL CLR** | CLR%, SQLCLR% |\n| **Mirroring**\
    \ | DBMIRROR% |\n| **Transaction** | XACT%, DTC%, TRAN_MARKLATCH_%, MSQL_XACT_%,\
    \ TRANSACTION_MUTEX |\n| **Idle** | SLEEP_%, LAZYWRITER_SLEEP, SQLTRACE_BUFFER_FLUSH,\
    \ SQLTRACE_INCREMENTAL_FLUSH_SLEEP, SQLTRACE_WAIT_ENTRIES, FT_IFTS_SCHEDULER_IDLE_WAIT,\
    \ XE_DISPATCHER_WAIT, REQUEST_FOR_DEADLOCK_SEARCH, LOGMGR_QUEUE, ONDEMAND_TASK_QUEUE,\
    \ CHECKPOINT_QUEUE, XE_TIMER_EVENT |\n| **Preemptive** | PREEMPTIVE_% |\n| **Service\
    \ broker** | BROKER_% (but not BROKER_RECEIVE_WAITFOR) |\n| **Tran Log IO** |\
    \ LOGMGR, LOGBUFFER, LOGMGR_RESERVE_APPEND, LOGMGR_FLUSH, LOGMGR_PMM_LOG, CHKPT,\
    \ WRITELOGF |\n| **Network IO** | ASYNC_NETWORK_IO, NET_WAITFOR_PACKET, PROXY_NETWORK_IO,\
    \ EXTERNAL_SCRIPT_NETWORK_IOF |\n| **Parallelism** | CXPACKET, EXCHANGE |\n| **Memory**\
    \ | RESOURCE_SEMAPHORE, CMEMTHREAD, CMEMPARTITIONED, EE_PMOLOCK, MEMORY_ALLOCATION_EXT,\
    \ RESERVED_MEMORY_ALLOCATION_EXT, MEMORY_GRANT_UPDATE |\n| **User wait** | WAITFOR,\
    \ WAIT_FOR_RESULTS, BROKER_RECEIVE_WAITFOR |\n| **Tracing** | TRACEWRITE, SQLTRACE_LOCK,\
    \ SQLTRACE_FILE_BUFFER, SQLTRACE_FILE_WRITE_IO_COMPLETION, SQLTRACE_FILE_READ_IO_COMPLETION,\
    \ SQLTRACE_PENDING_BUFFER_WRITERS, SQLTRACE_SHUTDOWN, QUERY_TRACEOUT, TRACE_EVTNOTIFF\
    \ |\n| **Full text search** | FT_RESTART_CRAWL, FULLTEXT GATHERER, MSSEARCH, FT_METADATA_MUTEX,\
    \ FT_IFTSHC_MUTEX, FT_IFTSISM_MUTEX, FT_IFTS_RWLOCK, FT_COMPROWSET_RWLOCK, FT_MASTER_MERGE,\
    \ FT_PROPERTYLIST_CACHE, FT_MASTER_MERGE_COORDINATOR, PWAIT_RESOURCE_SEMAPHORE_FT_PARALLEL_QUERY_SYNC\
    \ |\n| **Other disk IO** | ASYNC_IO_COMPLETION, IO_COMPLETION, BACKUPIO, WRITE_COMPLETION,\
    \ IO_QUEUE_LIMIT, IO_RETRY |\n| **Replication** | SE_REPL_%, REPL_%, HADR_% (but\
    \ not HADR_THROTTLE_LOG_RATE_GOVERNOR), PWAIT_HADR_%, REPLICA_WRITES, FCB_REPLICA_WRITE,\
    \ FCB_REPLICA_READ, PWAIT_HADRSIM |\n| **Log rate governor** | LOG_RATE_GOVERNOR,\
    \ POOL_LOG_RATE_GOVERNOR, HADR_THROTTLE_LOG_RATE_GOVERNOR, INSTANCE_LOG_RATE_GOVERNOR\
    \ |\n\n# 通过查询存储报告访问等待统计\n\n查看查询存储中可用的等待统计信息最用户友好的方式是通过内置报告。这些报告在数据库上启用查询存储功能后，可在\
    \ SQL Server Management Studio (SSMS) 中获得。图 3-2 显示了在撰写本书时可用的默认内置查询存储报告。\n\n![../images/340881_2_En_3_Chapter/340881_2_En_3_Fig2_HTML.jpg](images/340881_2_En_3_Chapter/340881_2_En_3_Fig2_HTML.jpg)\n\
    \n图 3-2 查询存储报告\n\n如图 3-2 所示，目前（尚）没有专用的等待统计报告。我们可以通过专门选择以下三个报告中的`Wait Time (ms)`指标来查看查询遇到的等待类别：\n\
    \n*   性能下降的查询\n*   资源消耗最大的查询\n*   高差异查询\n\n要在前面的任何报告中查看等待类别，首先需要将指标配置为等待时间（毫秒），如图\
    \ 3-3 所示。\n\n![../images/340881_2_En_3_Chapter/340881_2_En_3_Fig3_HTML.jpg](images/340881_2_En_3_Chapter/340881_2_En_3_Fig3_HTML.jpg)\n\
    \n图 3-3 将指标配置为等待时间（毫秒）\n\n这会将图表更改为（默认）返回按总等待时间排序的前 25 个查询。\n\n更改指标后，您可以将鼠标悬停在图表中显示的任何查询上以检索等待类别信息，如图\
    \ 3-4 所示。\n\n![../images/340881_2_En_3_Chapter/340881_2_En_3_Fig4_HTML.jpg](images/340881_2_En_3_Chapter/340881_2_En_3_Fig4_HTML.jpg)\n\
    \n图 3-4 查询存储中显示的等待类别\n\n如图 3-4 所示，这个特定查询遇到了多种等待类别：网络 IO、内存和缓冲区 IO。我们可以看到每个类别的等待时间以及所有类别的总等待时间，但如前所述，我们无法知道查询具体遇到了哪些等待类型。\n\
    \n# 通过查询存储 DMV 访问等待统计\n\n虽然内置的查询存储报告对于直观识别具有高等待时间的查询非常有用，但我们可以通过使用 SQL Server\
    \ 2017 中可用的一个新查询存储 DMV 轻松生成更多信息：`sys.query_store_wait_stats`。查询此 DMV 返回的列主要显示与特定执行计划\
    \ ID 的各种等待类别的等待类型相关的各种统计信息。\n\n查询存储使用其自己的唯一标识符来标识查询、执行计划和运行时区间。考虑到这一点，您可以通过在查询存储中查找查询\
    \ ID 来标识查询，或者通过搜索计划 ID 来标识执行计划。\n\n图 3-5 显示了为每个执行计划 ID 记录的不同统计信息，这些信息按不同的等待类别进行拆分。\n\
    \n![../images/340881_2_En_3_Chapter/340881_2_En_3_Fig5_HTML.jpg](images/340881_2_En_3_Chapter/340881_2_En_3_Fig5_HTML.jpg)\n\
    \n图 3-5 `sys.query_store_wait_stats` 中的等待类别统计信息\n\n虽然我们可以直接查询 `sys.query_store_wait_stats`\
    \ DMV 并查看每个或特定执行计划 ID 的各种统计信息，但通过将各种查询存储 DMV 连接在一起可以获得更多信息。\n\n例如，以下查询连接了各种查询存储\
    \ DMV，以返回遇到高总等待时间的查询概览。\n\n```\nSELECT\n    qsws.plan_id,\n    qsq.query_id,\n\
    \    qsws.runtime_stats_interval_id,\n    qsqt.query_sql_text,\n    qsws.wait_category_desc,\n\
    \    qsws.total_query_wait_time_ms\nFROM sys.query_store_wait_stats qsws\nINNER\
    \ JOIN sys.query_store_plan qsp\n    ON qsws.plan_id = qsp.plan_id\nINNER JOIN\
    \ sys.query_store_query qsq\n    ON qsp.query_id = qsq.query_id\nINNER JOIN sys.query_store_query_text\
    \ qsqt\n    ON qsq.query_text_id = qsqt.query_text_id\nORDER BY qsws.total_query_wait_time_ms\
    \ DESC\n```\n\n此查询的结果如图 3-6 所示。\n\n![../images/340881_2_En_3_Chapter/340881_2_En_3_Fig6_HTML.jpg](images/340881_2_En_3_Chapter/340881_2_En_3_Fig6_HTML.jpg)\n\
    \n图 3-6 来自查询存储的等待统计信息\n\n使用前面的查询，我们可以立即看到，针对 `Sales.SalesOrderDetail` 表的 `SELECT`\
    \ 查询大部分等待时间花费在与并行性相关的等待类型上。\n\n通过按查询 ID 过滤来稍微修改查询，我们可以深入了解特定查询并分析其等待行为。以下是修改后的查询，您还会看到我添加了一些返回各种有用统计信息的附加列。\n\
    \n```\nSELECT\n    qsws.plan_id,\n    qsq.query_id,\n    qsws.runtime_stats_interval_id,\n\
    \    qsqt.query_sql_text,\n    qsws.wait_category_desc,\n    qsws.total_query_wait_time_ms,\n\
    \    qsws.avg_query_wait_time_ms,\n    qsws.last_query_wait_time_ms\nFROM sys.query_store_wait_stats\
    \ qsws\nINNER JOIN sys.query_store_plan qsp\n    ON qsws.plan_id = qsp.plan_id\n\
    INNER JOIN sys.query_store_query qsq\n    ON qsp.query_id = qsq.query_id\nINNER\
    \ JOIN sys.query_store_query_text qsqt\n    ON qsq.query_text_id = qsqt.query_text_id\n\
    WHERE qsq.query_id = 8\nORDER BY runtime_stats_interval_id ASC\n```\n\n图 3-7 显示了运行此版本查询的输出。\n\
    \n![../images/340881_2_En_3_Chapter/340881_2_En_3_Fig7_HTML.jpg](images/340881_2_En_3_Chapter/340881_2_En_3_Fig7_HTML.jpg)\n\
    \n图 3-7 特定查询的等待统计信息"
  raw: '| Wait Category | Associated Wait Types |

    | --- | --- |

    | **Unknown** | Unknown |

    | **CPU** | SOS_SCHEDULER_YIELD |

    | **Worker thread** | THREADPOOL |

    | **Lock** | LCK_M_% |

    | **Latch** | LATCH_% |

    | **Buffer latch** | PAGELATCH_% |

    | **Buffer IO** | PAGEIOLATCH_% |

    | **Compilation*** | RESOURCE_SEMAPHORE_QUERY_COMPILE |

    | **SQL CLR** | CLR%, SQLCLR% |

    | **Mirroring** | DBMIRROR% |

    | **Transaction** | XACT%, DTC%, TRAN_MARKLATCH_%, MSQL_XACT_%, TRANSACTION_MUTEX
    |

    | **Idle** | SLEEP_%, LAZYWRITER_SLEEP, SQLTRACE_BUFFER_FLUSH, SQLTRACE_INCREMENTAL_FLUSH_SLEEP,
    SQLTRACE_WAIT_ENTRIES, FT_IFTS_SCHEDULER_IDLE_WAIT, XE_DISPATCHER_WAIT, REQUEST_FOR_DEADLOCK_SEARCH,
    LOGMGR_QUEUE, ONDEMAND_TASK_QUEUE, CHECKPOINT_QUEUE, XE_TIMER_EVENT |

    | **Preemptive** | PREEMPTIVE_% |

    | **Service broker** | BROKER_% (but not BROKER_RECEIVE_WAITFOR) |

    | **Tran Log IO** | LOGMGR, LOGBUFFER, LOGMGR_RESERVE_APPEND, LOGMGR_FLUSH, LOGMGR_PMM_LOG,
    CHKPT, WRITELOGF |

    | **Network IO** | ASYNC_NETWORK_IO, NET_WAITFOR_PACKET, PROXY_NETWORK_IO, EXTERNAL_SCRIPT_NETWORK_IOF
    |

    | **Parallelism** | CXPACKET, EXCHANGE |

    | **Memory** | RESOURCE_SEMAPHORE, CMEMTHREAD, CMEMPARTITIONED, EE_PMOLOCK, MEMORY_ALLOCATION_EXT,
    RESERVED_MEMORY_ALLOCATION_EXT, MEMORY_GRANT_UPDATE |

    | **User wait** | WAITFOR, WAIT_FOR_RESULTS, BROKER_RECEIVE_WAITFOR |

    | **Tracing** | TRACEWRITE, SQLTRACE_LOCK, SQLTRACE_FILE_BUFFER, SQLTRACE_FILE_WRITE_IO_COMPLETION,
    SQLTRACE_FILE_READ_IO_COMPLETION, SQLTRACE_PENDING_BUFFER_WRITERS, SQLTRACE_SHUTDOWN,
    QUERY_TRACEOUT, TRACE_EVTNOTIFF |

    | **Full text search** | FT_RESTART_CRAWL, FULLTEXT GATHERER, MSSEARCH, FT_METADATA_MUTEX,
    FT_IFTSHC_MUTEX, FT_IFTSISM_MUTEX, FT_IFTS_RWLOCK, FT_COMPROWSET_RWLOCK, FT_MASTER_MERGE,
    FT_PROPERTYLIST_CACHE, FT_MASTER_MERGE_COORDINATOR, PWAIT_RESOURCE_SEMAPHORE_FT_PARALLEL_QUERY_SYNC
    |

    | **Other disk IO** | ASYNC_IO_COMPLETION, IO_COMPLETION, BACKUPIO, WRITE_COMPLETION,
    IO_QUEUE_LIMIT, IO_RETRY |

    | **Replication** | SE_REPL_%, REPL_%, HADR_% (but not HADR_THROTTLE_LOG_RATE_GOVERNOR),
    PWAIT_HADR_%, REPLICA_WRITES, FCB_REPLICA_WRITE, FCB_REPLICA_READ, PWAIT_HADRSIM
    |

    | **Log rate governor** | LOG_RATE_GOVERNOR, POOL_LOG_RATE_GOVERNOR, HADR_THROTTLE_LOG_RATE_GOVERNOR,
    INSTANCE_LOG_RATE_GOVERNOR |


    ## Accessing Wait Statistics Through the Query Store Reports


    The most user-friendly way to view the wait statistics that are available inside
    the Query Store is through the built-in reports that are available inside SQL
    Server Management Studio after you enabled the Query Store feature on a database.
    Figure [3-2](#340881_2_En_3_Chapter.xhtml#Fig2) shows the default, built-in, Query
    Store reports that are available at the time of writing this book.


    ![../images/340881_2_En_3_Chapter/340881_2_En_3_Fig2_HTML.jpg](images/340881_2_En_3_Chapter/340881_2_En_3_Fig2_HTML.jpg)


    Figure 3-2


    Query Store reports


    As you can see in Figure [3-2](#340881_2_En_3_Chapter.xhtml#Fig2), there are no
    dedicated wait statistics reports (yet). Instead of a dedicated report, we can
    view the wait categories as a query encountered by specifically selecting the
    **Wait Time (ms)** metric inside the following three reports:


    *   Regressed Queries


    *   Top Resource Consuming Queries


    *   Queries with High Variation


    To view the wait categories in any of the preceding reports, you first need to
    configure the metric to Wait Time (ms), as shown in Figure [3-3](#340881_2_En_3_Chapter.xhtml#Fig3).


    ![../images/340881_2_En_3_Chapter/340881_2_En_3_Fig3_HTML.jpg](images/340881_2_En_3_Chapter/340881_2_En_3_Fig3_HTML.jpg)


    Figure 3-3


    Configuring the metric to Wait Time (ms)


    This changes the graph to return (by default) the top 25 queries order by the
    total wait time.


    After changing the metric, you can mouseover on any of the queries that are shown
    in the graph to retrieve the wait category information, as shown in Figure [3-4](#340881_2_En_3_Chapter.xhtml#Fig4).


    ![../images/340881_2_En_3_Chapter/340881_2_En_3_Fig4_HTML.jpg](images/340881_2_En_3_Chapter/340881_2_En_3_Fig4_HTML.jpg)


    Figure 3-4


    Wait categories exposed in the Query Store


    As you can see from Figure [3-4](#340881_2_En_3_Chapter.xhtml#Fig4), this specific
    query ran into various wait categories: Network IO, Memory, and Buffer IO. We
    can see the wait time per category and the total wait time across all of the categories,
    but as mentioned earlier, we have no idea about which exact wait types were encountered
    by the query.


    ## Accessing Wait Statistics Through the Query Store DMVs


    While the built-in Query Store reports are definitely helpful in visibly identifying
    queries with high wait times, we can easily generate far more information by using
    a new Query Store DMV that is available in SQL Server 2017: **sys.query_store_wait_stats**
    . The columns that are returned by querying the DMV mainly show various statistics
    related to the wait types of the various wait categories for a specific execution
    plan ID.


    The Query Store uses its own unique identifiers for queries, execution plans,
    and runtime intervals. With that in mind, you can identify queries by looking
    up the Query ID inside the Query Store, or execution plans by searching on the
    Plan ID.


    Figure [3-5](#340881_2_En_3_Chapter.xhtml#Fig5) shows the different statistics
    that are recorded for each execution plan ID, split up into different wait categories.


    ![../images/340881_2_En_3_Chapter/340881_2_En_3_Fig5_HTML.jpg](images/340881_2_En_3_Chapter/340881_2_En_3_Fig5_HTML.jpg)


    Figure 3-5


    Wait categories statistics inside sys.query_store_wait_stats


    While we can just query the sys.query_store_wait_stats DMV and look at the various
    statistics for each, or a specific, execution plan ID, we can get far more information
    by joining the various Query Store DMVs together.


    As an example, the following query joins various Query Store DMVs to return an
    overview of queries that encounter high total wait times.


    ```

    SELECT

    qsws.plan_id,

    qsq.query_id,

    qsws.runtime_stats_interval_id,

    qsqt.query_sql_text,

    qsws.wait_category_desc,

    qsws.total_query_wait_time_ms

    FROM sys.query_store_wait_stats qsws

    INNER JOIN sys.query_store_plan qsp

    ON qsws.plan_id = qsp.plan_id

    INNER JOIN sys.query_store_query qsq

    ON qsp.query_id = qsq.query_id

    INNER JOIN sys.query_store_query_text qsqt

    ON qsq.query_text_id = qsqt.query_text_id

    ORDER BY qsws.total_query_wait_time_ms DESC

    ```


    The results of this query can be seen in Figure [3-6](#340881_2_En_3_Chapter.xhtml#Fig6).


    ![../images/340881_2_En_3_Chapter/340881_2_En_3_Fig6_HTML.jpg](images/340881_2_En_3_Chapter/340881_2_En_3_Fig6_HTML.jpg)


    Figure 3-6


    Wait statistics information from the Query Store


    Using the preceding query, we can immediately see that the SELECT query against
    the Sales.SalesOrderDetail table spends most of its waiting time on parallelism-related
    wait types.


    Modifying the query a little bit by filtering on the queries Query ID allows us
    to zoom in on a specific query and analyze its wait behavior. Following is the
    modified query, and you’ll see that I also added some additional columns that
    return various useful statistics.


    ```

    SELECT

    qsws.plan_id,

    qsq.query_id,

    qsws.runtime_stats_interval_id,

    qsqt.query_sql_text,

    qsws.wait_category_desc,

    qsws.total_query_wait_time_ms,

    qsws.avg_query_wait_time_ms,

    qsws.last_query_wait_time_ms

    FROM sys.query_store_wait_stats qsws

    INNER JOIN sys.query_store_plan qsp

    ON qsws.plan_id = qsp.plan_id

    INNER JOIN sys.query_store_query qsq

    ON qsp.query_id = qsq.query_id

    INNER JOIN sys.query_store_query_text qsqt

    ON qsq.query_text_id = qsqt.query_text_id

    WHERE qsq.query_id = 8

    ORDER BY runtime_stats_interval_id ASC

    ```


    Figure [3-7](#340881_2_En_3_Chapter.xhtml#Fig7) shows the output from running
    this version of the query.


    ![../images/340881_2_En_3_Chapter/340881_2_En_3_Fig7_HTML.jpg](images/340881_2_En_3_Chapter/340881_2_En_3_Fig7_HTML.jpg)


    Figure 3-7


    Wait statistics information for a specific query'
