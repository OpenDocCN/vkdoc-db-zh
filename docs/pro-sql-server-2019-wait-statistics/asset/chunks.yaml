- fmt: '## Wait Statistics Baseline Analysis


    After letting the SQL Server Agent job collect wait statistics metrics for a while,
    we are ready to actually create some baselines. The way we do this is by querying
    the `WaitStats` table we created earlier. I will give you some examples of queries
    that will create a baseline you can compare against; these are not the only queries
    you can run, however, and I encourage you to experiment with different queries
    to return the information you are most interested in.


    Before we get started with building the baseline, I want to return to Figure [2-14](#340881_2_En_2_Chapter.xhtml#Fig14)
    in Chapter [2](#340881_2_En_2_Chapter.xhtml), “Querying SQL Server Wait Statistics.”
    In this flowchart I showed you steps you can take to analyze resource waits that
    occur right now. Since we now have access to a baseline, we can add an extra step
    to the flowchart. Figure [4-9](#340881_2_En_4_Chapter.xhtml#Fig9) shows how to
    complete the flowchart, including the baseline comparison step.


    ![../images/340881_2_En_4_Chapter/340881_2_En_4_Fig9_HTML.jpg](images/340881_2_En_4_Chapter/340881_2_En_4_Fig9_HTML.jpg)


    ### Figure 4-9

    Complete wait statistics performance-analysis flowchart


    The baselines you create are an extra input to the metrics you gather when looking
    at a performance problem. They are a very valuable input because they will show
    you information about the time the problem didn’t exist.


    Let’s go through an example, using DBA Jim again, where we review all the steps
    of the flowchart shown in Figure [4-9](#340881_2_En_4_Chapter.xhtml#Fig9). In
    this example I will show you queries that you can use against the `WaitStats`
    table so as to build a baseline that is useful for the performance-analysis process.


    Tuesday, around 9 am, DBA Jim receives a phone call that the daily reporting against
    the sales database is a lot slower than normal. The problem started around 8 am,
    and users are still experiencing performance problems. The reports are part of
    a scheduled job that runs every workday, starting at 8 am.


    The first thing Jim does is query the `sys.dm_os_waiting_tasks` DMV using the
    following query:


    ```sql

    SELECT * FROM sys.dm_os_waiting_tasks

    ORDER BY session_id ASC;

    ```


    Jim focuses on user sessions (normally higher than ID 50) but doesn’t see any
    long wait times on any of the user sessions, as shown in Figure [4-10](#340881_2_En_4_Chapter.xhtml#Fig10).


    ![../images/340881_2_En_4_Chapter/340881_2_En_4_Fig10_HTML.jpg](images/340881_2_En_4_Chapter/340881_2_En_4_Fig10_HTML.jpg)


    ### Figure 4-10

    sys.dm_os_waiting_tasks


    After executing the query against the `sys.dm_os_waiting_tasks` DMV multiple times,
    Jim notices that the wait type `PAGEIOLATCH_SH` is returned every time he queries
    the DMV. Each time, the wait type is returned with a different session ID but
    with relatively low wait times.


    Jim uses the same T-SQL script to capture wait statistics metrics into the `WaitStats`
    table, as we discussed earlier in this chapter. Because Jim has access to historic
    wait statistics information, he decides to create a baseline of the `PAGEIOLATCH_SH`
    wait times. The first thing he does is view the `PAGEIOLATCH_SH` wait times of
    today, filtered to show measurements captured between 8 and 9 in the morning,
    using the query shown in Listing [4-5](#340881_2_En_4_Chapter.xhtml#PC6).


    ```sql

    -- PAGEIOLATCH_SH waits, today between 8 and 9 AM

    SELECT

    CONVERT(VARCHAR(5), ws_DateTime, 108) AS ''Time'',

    ws_WaitTime AS ''Wait Time''

    FROM WaitStats

    WHERE ws_WaitType = ''PAGEIOLATCH_SH''

    AND (ws_Hour >= 8 AND ws_Hour < 9)

    AND CONVERT(VARCHAR(5), ws_DateTime, 105) = CONVERT(VARCHAR(5), GETDATE(), 105)

    ```


    **Listing 4-5**

    Show wait times for `PAGEIOLATCH_SH` between 8 and 9 am today


    The query returned the results shown in Figure [4-11](#340881_2_En_4_Chapter.xhtml#Fig11).


    ![../images/340881_2_En_4_Chapter/340881_2_En_4_Fig11_HTML.jpg](images/340881_2_En_4_Chapter/340881_2_En_4_Fig11_HTML.jpg)


    ### Figure 4-11

    `PAGEIOLATCH_SH` wait times of today


    Now that Jim has the wait times for today of the `PAGEIOLATCH_SH` wait type, the
    next step is to create a baseline from the historic measurements of the `PAGEIOLATCH_SH`
    wait type so he can compare today’s measurements against the baseline. Jim uses
    the query shown in Listing [4-6](#340881_2_En_4_Chapter.xhtml#PC7) to build his
    baseline.


    ```sql

    -- Baseline between 8 and 9 on workdays

    -- Not including measurements done today

    SELECT

    CONVERT(VARCHAR(5), ws_DateTime, 108) AS ''Time'',

    AVG(ws_WaitTime) AS ''Baseline''

    FROM WaitStats

    WHERE ws_WaitType = ''PAGEIOLATCH_SH''

    AND ws_DayOfWeek IN (''Monday'', ''Tuesday'', ''Wednesday'', ''Thursday'',''Friday'')

    AND (ws_Hour >= 8 AND ws_Hour < 9)

    AND CONVERT(VARCHAR(5), ws_DateTime, 105) < CONVERT(VARCHAR(5), GETDATE(), 105)

    GROUP BY CONVERT(VARCHAR(5), ws_DateTime, 108);

    ```


    **Listing 4-6**

    `PAGEIOLATCH_SH` baseline


    This query builds a baseline with the following characteristics: return the average
    wait time of `PAGEIOLATCH_SH` wait type captured on a workday between 8 am and
    9 am, excluding today. The reason to exclude today is that the measurements that
    were performed today, during the performance problem, might impact the average.
    Another suggestion could be to filter only data captured in the last *x* weeks
    so as to limit the amount of data that needs to be calculated in the average.


    The results of the query shown in Listing [4-6](#340881_2_En_4_Chapter.xhtml#PC7)
    can be seen in Figure [4-12](#340881_2_En_4_Chapter.xhtml#Fig12).


    ![../images/340881_2_En_4_Chapter/340881_2_En_4_Fig12_HTML.jpg](images/340881_2_En_4_Chapter/340881_2_En_4_Fig12_HTML.jpg)


    ### Figure 4-12

    `PAGEIOLATCH_SH` baseline


    As you can immediately see when you compare the wait times in Figures [4-11](#340881_2_En_4_Chapter.xhtml#Fig11)
    and [4-12](#340881_2_En_4_Chapter.xhtml#Fig12), the measurements done today are
    a lot higher than those in the historic baseline. To make it a little easier to
    see the difference, I created a graph of both measurements, as shown in Figure
    [4-13](#340881_2_En_4_Chapter.xhtml#Fig13).


    ![../images/340881_2_En_4_Chapter/340881_2_En_4_Fig13_HTML.png](images/340881_2_En_4_Chapter/340881_2_En_4_Fig13_HTML.png)


    ### Figure 4-13

    Baseline comparison graph for the `PAGEIOLATCH_SH` wait type


    Because there is such a difference in wait times for the `PAGEIOLATCH_SH` wait
    type between the baseline and today, Jim believes the `PAGEIOLATCH_SH` wait type
    needs further investigation.


    We will take a detailed look at the `PAGEIOLATCH_SH` wait type in Chapter [9](#340881_2_En_9_Chapter.xhtml),
    “Latch-Related Wait Types,” but to give you a (very) short explanation, long `PAGEIOLATCH_SH`
    waits can indicate storage problems.


    To investigate further, Jim starts the Windows Performance Monitor to look at
    metrics related to the storage subsystem, and in particular the disk latency counters.
    As you can see in Figure [4-14](#340881_2_En_4_Chapter.xhtml#Fig14), the latency
    on the disk where the database data file resides peaks to very high values, more
    than 4,000 milliseconds! For SQL Server to perform optimally, the disk latency
    should be as low as possible, and at least below 20 milliseconds.


    ![../images/340881_2_En_4_Chapter/340881_2_En_4_Fig14_HTML.jpg](images/340881_2_En_4_Chapter/340881_2_En_4_Fig14_HTML.jpg)


    ### Figure 4-14

    Disk-read latency'
