    the thread does not have to leave the processor. Instead, a spinlock will “spin”
    until it can be acquired. Figure [AII-01](#340881_2_En_15_Chapter.xhtml#Fig1)
    shows the difference between latches and spinlocks whenever one has to wait before
    it can get acquired.


    ![../images/340881_2_En_15_Chapter/340881_2_En_15_Fig1_HTML.jpg](images/340881_2_En_15_Chapter/340881_2_En_15_Fig1_HTML.jpg)


    Figure AII-01


    Spinlocks and latches and wait phases


    The main advantage of using spinlocks instead of latches to synchronize thread
    access is that spinlocks are even “lighter” synchronization objects than latches.
    Latches cause extra context switching to occur whenever a latch has to wait before
    it can get acquired. Spinlocks do not cause context switching because they will
    never move away from the processor. Because spinlocks do not cause context switching,
    they are used to protect those areas of SQL Server that are used most intensely.
    Spinlocks are not the Holy Grail in protecting access to data structures, however.
    Because they never move away from the processer, they consume processor time,
    even when they are waiting. To avoid spinlocks consuming too much processor time,
    every *x* time around the spinlock will stop spinning and sleep. The interval
    of the spinlock sleep is calculated by an internal algorithm.


    On very busy systems, where many spinlocks are used, it is possible to encounter
    a phenomenon called spinlock contention. If the spinlock contention gets bad enough,
    you can notice an increase in processor time that can be difficult to troubleshoot,
    since this will not always show by analyzing wait statistics.


    ![../images/340881_2_En_15_Chapter/340881_2_En_15_Fig2_HTML.jpg](images/340881_2_En_15_Chapter/340881_2_En_15_Fig2_HTML.jpg)


    Figure AII-02


    sys.dm_os_spinlock_stats


    Thankfully, just like latches, there is a spinlock DMV inside SQL Server that
    tracks the specific spinlock classes (325 in SQL Server 2017), the amount of time
    a spinlock had to wait before it could get acquired, and the total number of spins
    that occurred for that spinlock class. We can access this information by querying
    the `sys.dm_os_spinlock_stats` DMV like the query here:


    ```

    SELECT ∗

    FROM sys.dm_os_spinlock_stats

    ORDER BY spins DESC;

    ```


    This returns results like those shown in Figure [AII-02](#340881_2_En_15_Chapter.xhtml#Fig2).


    The columns returned by the `sys.dm_os_spinlock_stats` are described in the following
    list:


    *   `name`: Shows the name of the spinlock class.


    *   `collisions`: Returns the amount of time this spinlock class encountered a
    wait event because another spinlock was already in place.


    *   `spins`: When a spinlock has to wait, it performs a spin. The spins column
    shows the amount of times spins occurred for this specific spinlock class. You
    can think of a spin as the amount of time the spinlock had to wait before it could
    get acquired.


    *   `spins_per_collision`: The average number of spins per collision.


    *   `sleep_time`: Time that was spent sleeping for this spinlock class.


    *   `backoffs`: The number of times a spinlock went to sleep to allow other threads
    to use the processor.


    While all the columns returned by the `sys.dm_os_spinlock_stats` DMV provide valuable
    information, the `backoffs` column can be the most interesting when you are suspecting
    a case of spinlock contention. If you notice very high CPU usage and cannot directly
    correlate the high CPU usage with queries or specific wait types, but the amount
    of `backoffs` for a specific spinlock class is very high and increasing quickly,
    you might have a case of spinlock contention occurring.


    Spinlock contention is difficult to troubleshoot since it can have a very large
    number of causes. Also, information about specific spinlock classes is often lacking,
    increasing the difficulty of troubleshooting spinlock contention. One method that
    you can use during the analysis of spinlock contention is building a baseline
    of the `sys.dm_os_spinlock_stats` DMV by capturing the contents of the DMV at
    a specific interval, like I described in Chapter [4](#340881_2_En_4_Chapter.xhtml),
    “Building a Solid Baseline.” This baseline can give you valuable insight into
    the usage of spinlocks inside your SQL Server instance. Another great tool to
    diagnose spinlock contention is Extended Events. By using Extended Events you
    can trace various spinlock-related events, like spinlock backoffs.


    To truly analyze why spinlock-class contention is occurring, you will have to
    dive even deeper by debugging SQL Server memory dumps and looking through the
    call stack to find what spinlock class is being accessed. Debugging SQL Server
    memory dumps to identify spinlock contention is beyond the scope of this book
    and requires a deep knowledge of the inner workings of SQL Server. Thankfully,
    there is a free Microsoft whitepaper available on spinlock contention that can
    give you a few pointers for what to do when dealing with spinlock contention.
    You can get the whitepaper at [`www.microsoft.com/en-us/download/details.aspx?id=26666`](http://www.microsoft.com/en-us/download/details.aspx%253Fid%253D26666)
    `.`'
  trans: '

    # 自旋锁


    微软将自旋锁描述为“轻量级同步原语”。这个描述与用于门闩的描述非常相似，门闩被称为“轻量级同步对象”。这并非巧合，因为自旋锁和门闩有很多共同点，两者都用于串行化对内部数据结构的访问。当需要对对象的访问保持非常短的时间时，会同时使用门闩和自旋锁。


    虽然自旋锁和门闩的用途完全相同，但它们之间有一个很大的区别。每当您无法获取门闩时，例如因为已存在另一个不兼容的门闩，您的请求将被迫等待，它会离开处理器并返回到等待器列表（请求接收“挂起”状态）。然后，它被迫在等待器列表中等待，直到可以获取门闩，接着它会通过可运行队列移动，直到最终能够回到处理器上。由于门闩被视为查询执行的资源，它们与等待统计信息密切相关。SQL
    Server 甚至记录了等待获取不同类型和类别门闩的时间，我们在第 9 章“与门闩相关的等待类型”中讨论过这一点。与门闩相关的开销相对较大，因为如果无法立即获得门闩，它必须再次经历调度程序的不同阶段，然后请求才能获取其门闩并在处理器上执行。


    自旋锁的工作方式与门闩非常不同，因为每当自旋锁必须等待另一个已存在的自旋锁才能放置自身时，线程不必离开处理器。相反，自旋锁会“自旋”直到可以获取。图 AII-01
    显示了当门闩或自旋锁需要等待才能获取时的区别。


    ![../images/340881_2_En_15_Chapter/340881_2_En_15_Fig1_HTML.jpg](img/340881_2_En_15_Fig1_HTML.jpg)


    图 AII-01: 自旋锁和门闩及其等待阶段


    使用自旋锁而不是门闩来同步线程访问的主要优点是，自旋锁是比门闩更“轻”的同步对象。每当门闩需要等待才能获取时，都会导致额外的上下文切换。自旋锁不会导致上下文切换，因为它们永远不会离开处理器。由于自旋锁不会导致上下文切换，它们被用于保护
    SQL Server 中那些使用最密集的区域。然而，自旋锁并非保护数据结构访问的万能良药。因为它们从不离开处理器，所以即使在等待时也会消耗处理器时间。为了避免自旋锁消耗过多处理器时间，每经过*x*次自旋后，自旋锁会停止自旋并进入休眠。自旋锁休眠的间隔由内部算法计算。


    在非常繁忙的系统上，如果使用了许多自旋锁，可能会遇到一种称为自旋锁争用的现象。如果自旋锁争用变得足够严重，您可能会注意到处理器时间的增加，而这可能难以进行故障排除，因为通过分析等待统计信息并不总能显示这一点。


    ![../images/340881_2_En_15_Chapter/340881_2_En_15_Fig2_HTML.jpg](img/340881_2_En_15_Fig2_HTML.jpg)


    图 AII-02: sys.dm_os_spinlock_stats


    值得庆幸的是，就像门闩一样，SQL Server 内部有一个自旋锁 DMV，用于跟踪特定的自旋锁类（在 SQL Server 2017 中有 325 个）、自旋锁在获取前必须等待的时间，以及该自旋锁类发生的自旋总次数。我们可以通过查询
    `sys.dm_os_spinlock_stats` DMV 来访问此信息，如下查询所示：


    ```sql

    SELECT *

    FROM sys.dm_os_spinlock_stats

    ORDER BY spins DESC;

    ```


    这将返回如图 AII-02 所示的结果。


    `sys.dm_os_spinlock_stats` 返回的列描述如下：


    *   `name`：显示自旋锁类的名称。

    *   `collisions`：返回此自旋锁类遇到等待事件的次数，原因是另一个自旋锁已存在。

    *   `spins`：当自旋锁必须等待时，它会执行一次自旋。`spins` 列显示此特定自旋锁类发生自旋的次数。您可以将一次自旋视为自旋锁在获取前必须等待的时间量。

    *   `spins_per_collision`：每次冲突的平均自旋次数。

    *   `sleep_time`：此自旋锁类花费在休眠上的时间。

    *   `backoffs`：自旋锁进入休眠以允许其他线程使用处理器的次数。


    虽然 `sys.dm_os_spinlock_stats` DMV 返回的所有列都提供了宝贵的信息，但当您怀疑存在自旋锁争用情况时，`backoffs` 列可能是最有趣的。如果您注意到
    CPU 使用率非常高，并且无法将高 CPU 使用率直接与查询或特定等待类型相关联，但某个特定自旋锁类的 `backoffs` 数量非常高且快速增长，那么您可能遇到了自旋锁争用情况。


    自旋锁争用难以进行故障排除，因为它可能有非常多的原因。此外，关于特定自旋锁类的信息通常缺乏，这增加了故障排除自旋锁争用的难度。在分析自旋锁争用时，您可以使用的一种方法是构建
    `sys.dm_os_spinlock_stats` DMV 的基线，方法是以特定间隔捕获该 DMV 的内容，如我在第 4 章“构建可靠的基线”中所述。此基线可以为您提供有关
    SQL Server 实例内部自旋锁使用情况的宝贵见解。诊断自旋锁争用的另一个优秀工具是扩展事件。通过使用扩展事件，您可以跟踪各种与自旋锁相关的事件，例如自旋锁回退。


    要真正分析自旋锁类争用发生的原因，您必须更深入地研究，通过调试 SQL Server 内存转储并查看调用堆栈以找到正在访问哪个自旋锁类。调试 SQL Server
    内存转储以识别自旋锁争用超出了本书的范围，并且需要深入了解 SQL Server 的内部工作原理。值得庆幸的是，有一份关于自旋锁争用的免费 Microsoft
    白皮书，可以为您提供一些处理自旋锁争用时的指导。您可以在 [`www.microsoft.com/en-us/download/details.aspx?id=26666`](http://www.microsoft.com/en-us/download/details.aspx%253Fid%253D26666)
    获取该白皮书。

    '
