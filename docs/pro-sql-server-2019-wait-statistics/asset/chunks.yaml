  trans: '### 降低由用户连接引起的 THREADPOOL 等待


    另一个导致 `THREADPOOL` 等待的常见原因是，连接并针对你的 SQL Server 实例执行查询的用户数量突然增加。例如，如果连接到 SQL Server
    实例的应用程序使用多个连接，就可能出现此问题。这里的主要问题是，这些连接保持活动状态并持续获取工作线程。


    为了举例说明这个问题，我们将再次使用 `Ostress` 连接并针对我的测试 SQL Server 实例执行查询。这次，我们将使用一个不同的 `.sql`
    文件，保存为 `wait.sql`，作为 `Ostress` 的输入，其内容如下查询：


    ```

    WAITFOR DELAY ''00:05:00''

    ```


    这个查询唯一的作用就是等待 5 分钟。5 分钟后，查询结束，连接断开。


    让我们使用 `wait.sql` 文件运行 `Ostress`：


    ```

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -E -dAdventureWorks
    -i"C:\wait.sql" -n120 -r1 -q

    ```


    我们将 `Ostress` 生成的线程数更改为 120，并再次将 `Max Worker Threads` 选项保留设置为 128 个工作线程。


    当我们使用以下查询查询 `sys.dm_exec_sessions` DMV 时，可以看到由 `Ostress` 工具生成的许多新用户会话处于活动状态，如图
    5-28 所示。


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig28_HTML.jpg](img/340881_2_En_5_Fig28_HTML.jpg)


    图 5-28


    `Ostress` 用户会话


    ```

    SELECT *

    FROM sys.dm_exec_sessions

    WHERE is_user_process = 1;

    ```


    如果我们查询 `sys.dm_os_waiting_tasks` DMV，可以看到正在发生 `THREADPOOL` 等待，如图 5-29 所示。


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig29_HTML.jpg](img/340881_2_En_5_Fig29_HTML.jpg)


    图 5-29


    `sys.dm_os_waiting_tasks` DMV 内的 `THREADPOOL` 等待


    由过度并行度引起的 `THREADPOOL` 等待与用户连接增加引起的 `THREADPOOL` 等待之间的最大区别在于，在后一种情况下，我的测试 SQL
    Server 实例的 CPU 保持较低水平，如图 5-30 所示。


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig30_HTML.jpg](img/340881_2_En_5_Fig30_HTML.jpg)


    图 5-30


    CPU 使用率


    CPU 使用率历史图表中的小尖峰是由启动 `Ostress` 工具引起的。之后，CPU 保持在持续较低的使用百分比。


    解决由用户连接增加引起的 `THREADPOOL` 等待应从源头着手。用户连接来自哪里？这些连接在做什么？我遇到过一些情况，应用程序在一次更新后突然使用了数百个活动用户连接，而
    SQL Server 实例并未设计用于处理如此大量并发的活动连接，从而导致了 `THREADPOOL` 等待。


    请记住，用户连接只有在实际运行查询时才应引起 `THREADPOOL` 等待。连接到 SQL Server 实例但未执行任何操作的用户连接不应成为 `THREADPOOL`
    等待的原因。


    此外，针对数据库的许多不同活动用户连接可能会在行或表上创建许多锁。如果你注意到与锁相关的高等待时间与 `THREADPOOL` 等待同时出现，问题可能是正在发生大量的锁和阻塞。在这种情况下，你应该尝试找出导致锁等待的查询，并查看是否可以优化它们。我们将在第
    7 章“与锁相关的等待类型”中讨论与锁相关的等待类型以及你可以采取的措施。


    ### THREADPOOL 总结


    `THREADPOOL` 等待是你 SQL Server 实例上最令人担忧的等待类型之一。它们的发生是因为没有足够的空闲工作线程可用于处理请求，因此请求工作线程的任务将不得不等待，直到有新的工作线程可用。值得庆幸的是，`THREADPOOL`
    等待并不常见，因为它们有可能将你完全锁定在 SQL Server 实例之外。在这些情况下，连接的唯一方法是使用 `Dedicated Administrator
    Connection`（或 `DAC`），我强烈建议你在所有 SQL Server 实例上启用此功能。


    过度使用并行度和活动用户连接的大幅增加是 `THREADPOOL` 等待两个最常见的原因。前者与我们之前讨论的 `CXPACKET` 等待类型有直接关系，因此解决
    `CXPACKET` 等待类型的方法也有助于解决 `THREADPOOL` 等待。后者则需要深入调查为什么活动用户连接数量突然增加。也许它们是应用程序连接到
    SQL Server 实例时出现错误的结果。我们还简要提及了锁和阻塞行为作为 `THREADPOOL` 等待的可能原因。我们将在第 7 章“与锁相关的等待类型”中更深入地探讨如何解决与锁相关的等待。


    # 6. 与 IO 相关的等待类型


    在本章中，我们将从最广泛的意义上探讨与 IO 相关的等待类型。我选择了与系统存储、内存或网络组件相关的等待类型。有人可能会争辩说，大多数等待类型都符合这一类别，这很可能是对的，但为了防止本章涵盖本书中
    90% 的等待类型，我必须谨慎选择。我认为本章中的等待类型与存储、内存或网络有直接关系，但不直接与 SQL Server 中的功能或概念相关。例如，`PAGEIOLATCH_xx`
    等待类型经常与存储相关，但它们未包含在本章中。原因在于它们也是一种自旋锁等待类型，并且我认为由于其在 SQL Server 中的功能，自旋锁等待类型值得单独一章讨论。


    IO 相关组件的性能对 SQL Server 极其重要。SQL Server 几乎每个部分都以某种方式与这些组件交互，无论是需要从磁盘读取到内存中的数据页，还是需要通过网络传输给最终用户的查询结果。如果这些组件中的任何一个无法处理你在
    SQL Server 实例上生成的工作负载，或者配置不当，你的性能就会下降。


    本章中的等待类型可以帮助你追踪是哪个 IO 组件拖慢了速度，以便你采取适当措施预防或解决与性能相关的事件。


    ## ASYNC_IO_COMPLETION


    `ASYNC_IO_COMPLETION` 等待类型是一种相当常见的等待类型，每当 SQL Server 在存储子系统上执行文件相关操作并必须等待其完成时发生。当你执行与存储子系统交互的操作（如备份）时，会经常看到这种等待类型。与大多数等待类型一样，如果你看到这种等待类型出现，并不一定意味着你的存储子系统有问题。只有当等待时间相比你的基线值（我们在第
    4 章“构建可靠的基线”中讨论过）超出预期时，它才会成为问题。'
- fmt: '### What Is the ASYNC_IO_COMPLETION Wait Type?


    If we look up the `ASYNC_IO_COMPLETION` wait type in Books Online (BOL), we will
    see the following definition: “Occurs when a task is waiting for I/Os to finish.”
    This is a rather short and vague definition. Let’s add a little more detail. `ASYNC_IO_COMPLETION`
    waits occur when a task is waiting for a storage-related action to finish. The
    task is initiated and monitored by SQL Server. Figure [6-1](#340881_2_En_6_Chapter.xhtml#Fig1)
    shows this as a visual representation of the wait type.


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig1_HTML.jpg](images/340881_2_En_6_Chapter/340881_2_En_6_Fig1_HTML.jpg)


    Figure 6-1


    ASYNC_IO_COMPLETION wait occurring


    As long as the storage-related action is running, the `ASYNC_IO_COMPLETION` wait
    time is being logged. As you can imagine, the faster your storage subsystem, the
    lower your `ASYNC_IO_COMPLETION` wait times will be.


    As I said earlier, usually `ASYNC_IO_COMPLETION` waits are no cause for concern.
    They will happen normally during many SQL Server operations that need to access
    the storage subsystem, like backups or the creation of a new database. It can
    become a cause for concern if the wait times are higher than you expected when
    compared to your baseline measurements.


    ### ASYNC_IO_COMPLETION Example


    Let’s go through an example that generates `ASYNC_IO_COMPLETION` waits. We won’t
    need any extra utilities for this; just running a database backup will trigger
    `ASYNC_IO_COMPLETION` waits.


    In this case I will perform a backup of the `AdventureWorks` database on my test
    server.


    To perform this action I will use the query in Listing [6-1](#340881_2_En_6_Chapter.xhtml#PC1).
    This query will reset the `sys.dm_os_wait_stats` DMV, perform the database backup,
    and then query the `sys.dm_os_wait_stats` DMV for the `ASYNC_IO_COMPLETION` waits.


    ```

    USE [master]

    GO

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    BACKUP DATABASE [AdventureWorks]

    TO  DISK = N''F:\Backup\aw_backup.bak''

    WITH

    NAME = N''AdventureWorks-Full Database Backup'',

    STATS = 2;

    GO

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''ASYNC_IO_COMPLETION'';

    Listing 6-1

    Generate ASYN_IO_COMPLETION waits

    ```


    The backup operation took 1 second on my test SQL Server instance. Figure [6-2](#340881_2_En_6_Chapter.xhtml#Fig2)
    shows the results of the query in Listing [6-1](#340881_2_En_6_Chapter.xhtml#PC1).


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig2_HTML.jpg](images/340881_2_En_6_Chapter/340881_2_En_6_Fig2_HTML.jpg)


    Figure 6-2


    ASYNC_IO_COMPLETION wait time


    As you can see, for almost the entire duration of the database backup `ASYNC_IO_COMPLETION`
    waits were logged.


    ### Lowering ASYNC_IO_COMPLETION Waits


    One common cause of high `ASYNC_IO_COMPLETION` wait times is a database backup,
    as you just saw in the example. If you want to find out if your `ASYNC_IO_COMPLETION`
    waits are occurring because a backup is being performed, try to look for backup-related
    waits occurring at the same time.


    If we were to slightly modify the last `sys.dm_os_waiting_tasks` query in Listing
    [6-1](#340881_2_En_6_Chapter.xhtml#PC1), we would see backup-related wait types
    being returned by the DMV:


    ```

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type IN

    (

    ''ASYNC_IO_COMPLETION'',

    ''BACKUPIO'',

    ''BACKUPBUFFER''

    );

    ```


    Figure [6-3](#340881_2_En_6_Chapter.xhtml#Fig3) shows the result of the query
    in Listing [6-1](#340881_2_En_6_Chapter.xhtml#PC1), but with this modification.


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig3_HTML.jpg](images/340881_2_En_6_Chapter/340881_2_En_6_Fig3_HTML.jpg)


    Figure 6-3


    ASYNC_IO_COMPLETION waits together with backup-related waits


    If you see both occurring at the same time, chances are that a database backup
    is causing your `ASYNC_IO_COMPLETION` waits.


    Another possible method of lowering `ASYNC_IO_COMPLETION` waits is by configuring
    `Instant file initialization`. `Instant file initialization` was introduced in
    Windows 2003 and speeds up the process of allocating space on a disk tremendously
    by removing the need to zero-out files (writing zeros inside files before they
    can get used). This does not affect the speed of your backup, but will give increased
    performance when creating a database, adding files to a database, or restoring
    a database. `Instant file initialization` is not enabled by default, unless you
    are running your SQL Server service under an account that has local administrator
    privileges. During the setup of SQL Server 2016, Microsoft added an additional
    checkbox to enable `instant file initialization` during SQL Server setup, as shown
    in Figure [6-4](#340881_2_En_6_Chapter.xhtml#Fig4).


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig4_HTML.jpg](images/340881_2_En_6_Chapter/340881_2_En_6_Fig4_HTML.jpg)


    Figure 6-4


    Grant Perform Volume Maintenance Task privilege to the SQL Server Database Engine
    Service checkbox in SQL Server 2016 setup


    If you didn’t enable the `Grant Perform Volume Maintenance Task privilege to the
    SQL Server Database Engine Service` checkbox during the installation of SQL Server
    2016 or higher, or installed a lower version of SQL Server, you will have to configure
    `instant file initialization` manually after installation. The way to configure
    `instant file initialization` is through a local security policy on the machine
    SQL Server is running on by adding the account your SQL Server service is running
    under.


    You can find this policy by opening the `Local Security Policy` MMC under `Administrative
    Tools` in the `Configuration Panel`. Open up the `Local Policies` ➤ `User Rights
    Assignment` folder and scroll down to the `“Perform volume maintenance tasks”`
    policy, as shown in Figure [6-5](#340881_2_En_6_Chapter.xhtml#Fig5).


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig5_HTML.jpg](images/340881_2_En_6_Chapter/340881_2_En_6_Fig5_HTML.jpg)


    Figure 6-5


    Perform volume maintenance tasks local policy


    Double-click the policy to open it and add the account your SQL Server service
    is running under. The last step is restarting your SQL Server service. After the
    restart, SQL Server can make use of `instant file initialization`.


    To show you the impact of `instant file initialization`, I used the query in Listing
    [6-2](#340881_2_En_6_Chapter.xhtml#PC3). This query clears the `sys.dm_os_wait_stats`
    DMV, then creates a new database with a 500 MB data file and a 100 MB log file.
    It then queries the `sys.dm_os_wait_stats` DMV for the `ASYNC_IO_COMPLETION` wait
    type.'
