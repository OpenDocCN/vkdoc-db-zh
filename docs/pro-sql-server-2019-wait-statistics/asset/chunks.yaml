    .


    For the remainder of this chapter, I will frequently refer to functions used by
    the Windows operating system. If you are running SQL Server on Linux, remember
    that the functionality described in this chapter is handled by SQLPAL on Linux
    but still has the same functionality as on Windows.


    ## PREEMPTIVE_OS_ENCRYPTMESSAGE and PREEMPTIVE_OS_DECRYPTMESSAGE


    The first preemptive wait types we are going to discuss in this chapter are the
    `PREEMPTIVE_OS_ENCRYPTMESSAGE` and `PREEMPTIVE_OS_DECRYPTMESSAGE` wait types.
    As you can probably guess from the wait type names, the functions are related
    to either encrypting or decrypting messages through the Windows operating system.


    ### What Are the PREEMPTIVE_OS_ENCRYPTMESSAGE and PREEMPTIVE_OS_DECRYPTMESSAGE
    Wait Types?


    As I noted in the previous section, the `PREEMPTIVE_OS_ENCRYPTMESSAGE` and `PREEMPTIVE_OS_DECRYPTMESSAGE`
    wait types are related to the encryption and decryption of messages. More specifically,
    they are related to encrypting and decrypting network traffic to and from the
    SQL Server instance. One case where this is used is when connecting to your SQL
    Server instance using certificates to encrypt the data that is sent between the
    client and the SQL Server instance. In that case, SQL Server will need to access
    the Windows operating system to perform the encryption of the messages that it
    is sending to the client or to decrypt the messages that are received. The encryption
    and decryption do not happen inside SQL Server, unlike, for instance, Transparent
    Data Encryption (TDE), where the encryption/decryption process happens entirely
    inside SQL Server.


    Both the `PREEMPTIVE_OS_ENCRYPTMESSAGE` and `PREEMPTIVE_OS_DECRYPTMESSAGE` wait
    types do not necessarily indicate any performance problems. They just show you
    encryption is being used, so there is no real need to troubleshoot these wait
    types. The overhead of encrypting and decrypting messages is so small that it
    rarely causes any serious issues (I have yet to come across a case where using
    certificates to connect to SQL Server caused performance problems).


    ### PREEMPTIVE_OS_ENCRYPTMESSAGE and PREEMPTIVE_OS_DECRYPTMESSAGE Example


    To show you an example of both the `PREEMPTIVE_OS_ENCRYPTMESSAGE` and `PREEMPTIVE_OS_DECRYPTMESSAGE`
    wait types, I am going to configure a certificate that will be used to encrypt
    the connection to the SQL Server instance. To make this example reproducible,
    I have included the steps for creating a self-signed certificate. Normally, in
    production environments you will use a certificate issued by a certificate authority,
    but for testing purposes a self-signed certificate is fine.


