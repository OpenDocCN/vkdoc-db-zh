    interesting additional information like the number of log records that still need
    to be sent or restored, how far behind the mirror currently is, and the send and
    restore rates. In many of my dealings with database mirroring, the database mirroring
    monitor is the first place I’ll check when there are performance issues involving
    the mirror configuration.


    ### DBMIRROR_SEND Summary


    The `DBMIRROR_SEND` wait type is directly related to database mirroring. Seeing
    `DBMIRROR_SEND` waits occur is pretty normal on most mirror configurations. This
    makes using a baseline to identify wait time spikes a necessity. The mirroring
    mode plays a huge part in the `DBMIRROR_SEND` wait times. When using synchronous
    mirroring, `DBMIRROR_SEND` wait times will frequently be higher than when using
    asynchronous mirroring. Not only the mirroring mode influences `DBMIRROR_SEND`
    wait times, though. Having a storage subsystem on the mirror SQL Server instance
    that cannot keep up with the load will have an effect on `DBMIRROR_SEND` waits,
    just like the network connection between the principal and the mirror.


    ## HADR_LOGCAPTURE_WAIT and HADR_WORK_QUEUE


    The `HADR_LOGCAPTURE_WAIT` and `HADR_WORK_QUEUE` wait types are both related to
    AlwaysOn Availability Groups. All wait types that are related to AlwaysOn can
    easily be identified by the `HADR_` prefix in the wait type’s name. AlwaysOn Availability
    Groups was introduced in SQL Server 2012 as a replacement for various SQL Server
    high-availability and disaster-recovery features such as database mirroring. There
    are quite a few different wait types associated with AlwaysOn, totaling 65 in
    SQL Server 2017\. Not all of these wait types necessarily indicate performance
    problems somewhere in your AlwaysOn configuration. The `HADR_LOGCAPTURE_WAIT`
    and `HADR_WORK_QUEUE` are both perfect examples of benign wait types that occur
    naturally over time and do not directly indicate a performance problem. Since
    both these wait types have high wait times associated with them on every AlwaysOn
    configuration, and are thus very common, I wanted to include them in this chapter
    to help you better understand what function they have.'
  trans: '# DBMIRROR_SEND 示例


    在本例中，我在两个测试 SQL Server 实例之间构建了一个同步镜像，使用 `AdventureWorks` 数据库作为在两个实例之间镜像的数据库。


    在 `AdventureWorks` 数据库内部，我使用清单 10-1 中的脚本创建了一个简单的表。


    ```

    USE [AdventureWorks]

    GO

    CREATE TABLE Mirror_Test

    (

    ID UNIQUEIDENTIFIER PRIMARY KEY,

    RandomData VARCHAR(50)

    );

    清单 10-1

    创建 Mirror_Test 表

    ```


    表创建后，我清除了 `sys.dm_os_wait_stats` DMV，并使用清单 10-2 中的查询向 `Mirror_Test` 表插入了 10,000
    行数据。在运行清单 10-2 中的脚本之前，我也确保清除了镜像上的 `sys.dm_os_wait_stats` DMV。


    ```

    DBCC SQLPERF(''sys.dm_os_wait_stats, CLEAR'')

    INSERT INTO Mirror_Test

    (

    ID,

    RandomData

    )

    VALUES

    (

    NEWID(),

    CONVERT(VARCHAR(50), NEWID())

    );

    GO 10000

    清单 10-2

    向 Mirror_Test 表插入 10,000 行数据

    ```


    在脚本运行期间，我使用以下查询查看镜像和主体服务器上的 `DBMIRROR_SEND` 等待时间：


    ```

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''DBMIRROR_SEND''

    ```


    此查询的结果如图 10-3 所示，显示了镜像上的 `DBMIRROR_SEND` 等待时间。图 10-4 显示了主体服务器上的 `DBMIRROR_SEND`
    等待时间。


    ![../images/340881_2_En_10_Chapter/340881_2_En_10_Fig4_HTML.jpg](img/340881_2_En_10_Fig4_HTML.jpg)

    **图 10-4** 主体上的 DBMIRROR_SEND 等待时间


    ![../images/340881_2_En_10_Chapter/340881_2_En_10_Fig3_HTML.jpg](img/340881_2_En_10_Fig3_HTML.jpg)

    **图 10-3** 镜像上的 DBMIRROR_SEND 等待时间


    如你所见，在镜像上，我们花费了相当多的时间等待 `DBMIRROR_SEND` 等待类型，而在主体上则没有 `DBMIRROR_SEND` 等待。


    # 降低 DBMIRROR_SEND 等待


    降低 `DBMIRROR_SEND` 等待时间最常见的建议之一是将镜像模式从同步更改为异步。虽然这无疑会降低等待时间，但也意味着当主体发生灾难时，你可能会丢失数据。降低
    `DBMIRROR_SEND` 等待类型的等待时间将对你查询的持续时间产生积极影响。例如，在上一节的例子中，在我的测试 SQL Server 镜像配置上，插入
    10,000 行大约需要 30 秒。当我将镜像模式从同步更改为异步时，不仅 `DBMIRROR_SEND` 等待类型的等待时间下降了，10,000 次插入的总执行时间也下降到
    3 秒。这提升了近 30 秒！


    尽管这些改进听起来非常诱人，但有时更改镜像模式并不可行。例如，你公司的灾难恢复策略可能要求同步镜像配置。在我看来，将镜像模式从同步更改为异步应该是最后的选择（如果它确实是一个可行的选择）。还有其他部分会影响
    `DBMIRROR_SEND` 等待时间，比如镜像上的存储配置或主体和镜像 SQL Server 实例之间的网络连接。这两个部分都可能成为两个实例之间的瓶颈，导致
    `DBMIRROR_SEND` 等待时间增加。


    除了检查你的存储子系统和网络连接的性能外，SQL Server 还有一个数据库镜像监视器，它会提供有关镜像配置的状态信息。你可以通过右键单击属于镜像一部分的数据库，选择“任务”
    ➤ “数据库镜像监视器”来找到数据库镜像监视器。图 10-5 显示了针对我的测试镜像配置的监视器。


    ![../images/340881_2_En_10_Chapter/340881_2_En_10_Fig5_HTML.jpg](img/340881_2_En_10_Fig5_HTML.jpg)

    **图 10-5** 数据库镜像监视器


    如你所见，数据库镜像监视器可以为你提供一些非常有趣的额外信息，例如仍需发送或还原的日志记录数量、镜像当前落后的程度，以及发送和还原速率。在我处理数据库镜像的许多情况下，当涉及镜像配置的性能问题时，数据库镜像监视器是我会首先检查的地方。


    # DBMIRROR_SEND 总结


    `DBMIRROR_SEND` 等待类型与数据库镜像直接相关。在大多数镜像配置上看到 `DBMIRROR_SEND` 等待发生是相当正常的。这使得使用基线来识别等待时间峰值成为必要。镜像模式在
    `DBMIRROR_SEND` 等待时间中扮演着重要角色。使用同步镜像时，`DBMIRROR_SEND` 等待时间通常会高于使用异步镜像时。不过，不仅镜像模式影响
    `DBMIRROR_SEND` 等待时间。镜像 SQL Server 实例上的存储子系统无法跟上负载也会影响 `DBMIRROR_SEND` 等待，主体与镜像之间的网络连接也是如此。


    # HADR_LOGCAPTURE_WAIT 和 HADR_WORK_QUEUE


    `HADR_LOGCAPTURE_WAIT` 和 `HADR_WORK_QUEUE` 等待类型都与 AlwaysOn 可用性组相关。所有与 AlwaysOn
    相关的等待类型都可以通过其等待类型名称中的 `HADR_` 前缀轻松识别。AlwaysOn 可用性组在 SQL Server 2012 中引入，作为各种 SQL
    Server 高可用性和灾难恢复功能（如数据库镜像）的替代品。与 AlwaysOn 相关的等待类型相当多，在 SQL Server 2017 中总计有 65
    种。并非所有这些等待类型都必然表明你的 AlwaysOn 配置中某处存在性能问题。`HADR_LOGCAPTURE_WAIT` 和 `HADR_WORK_QUEUE`
    都是良性等待类型的完美例子，它们会随时间自然发生，并不直接指示性能问题。由于这两种等待类型在每个 AlwaysOn 配置上都有较高的相关等待时间，因此非常常见，我想在本章中包含它们，以帮助你更好地理解它们的功能。'
- fmt: '### What Are the HADR_LOGCAPTURE_WAIT and HADR_WORK_QUEUE Wait Types?


    As I mentioned in the preceding section, both the `HADR_LOGCAPTURE_WAIT` and `HADR_WORK_QUEUE`
    wait types occur in AlwaysOn configurations. They both occur in different places
    inside your AlwaysOn configuration and have slightly different functions.


    According to Books Online, the `HADR_LOGCAPTURE_WAIT` wait type indicates that
    SQL Server is "waiting for log records to become available. Can occur either when
    waiting for new log records to be generated by connections or for I/O completion
    when reading log not in the cache. This is an expected wait if the log scan is
    caught up to the end of log or is reading from disk." The `HADR_LOGCAPTURE_WAIT`
    wait type occurs on the SQL Server that hosts the primary database inside an AlwaysOn
    Availability Group. Think of the primary database as being just like the principal
    inside a database mirroring configuration.


    AlwaysOn works much the same way as database mirroring and also provides two different
    modes (called Availability modes inside AlwaysOn): Synchronous-commit and Asynchronous-commit.
    Both these Availability modes work in the same way as their database mirroring
    counterparts we were discussing earlier in this chapter do. This means that in
    Synchronous-commit mode the primary replica waits to commit transactions to the
    transaction log until the secondary replica has completed its own log hardening,
    while in Asynchronous-commit mode the primary replica will directly commit the
    transaction to the transaction log without waiting for a confirmation from the
    secondary replica.


    While the primary replica is waiting for work, SQL Server will record the time
    it has spent on waiting for new transactions to become available as the `HADR_LOGCAPTURE_WAIT`
    wait type. This means that seeing high wait times on the `HADR_LOGCAPTURE_WAIT`
    wait type actually means that SQL Server is waiting on new transactions to become
    available so they can be transferred to the secondary replica. This is not dependent
    on the Availability mode you configured for your AlwaysOn Availability Group.
    The `HADR_LOGCAPTURE_WAIT` wait type will always occur, no matter your AlwaysOn
    configuration. Figure [10-6](#340881_2_En_10_Chapter.xhtml#Fig6) shows an AlwaysOn
    Availability Group configuration together with the `HADR_LOGCAPTURE_WAIT` wait
    type on the primary replica, which occurs while waiting for new transactions to
    be sent to the secondary replica.


    ![../images/340881_2_En_10_Chapter/340881_2_En_10_Fig6_HTML.jpg](images/340881_2_En_10_Chapter/340881_2_En_10_Fig6_HTML.jpg)


    Figure 10-6

    AlwaysOn Availability Group and the HADR_LOGCAPTURE_WAIT wait type


    Even though I placed the `HADR_LOGCAPTURE_WAIT` wait type on the primary replica
    in Figure [10-6](#340881_2_En_10_Chapter.xhtml#Fig6), it will also log the `HADR_LOGCAPTURE_WAIT`
    wait type on the secondary replica, although those values will normally be much
    lower than on the primary replica.


    The `HADR_WORK_QUEUE` wait type is almost identical in function to the `HADR_LOGCAPTURE_WAIT`
    wait type. Books Online gives an excellent description of this wait type: "AlwaysOn
    Availability Groups’ background worker thread waiting for new work to be assigned.
    This is an expected wait when there are ready workers waiting for new work, which
    is the normal state." The main difference between both wait types, is that the
    `HADR_LOGCAPTURE_WAIT` wait type is dedicated to waiting until new transactions
    become available, while the `HADR_WORK_QUEUE` indicates that are free threads
    waiting for work. Just like the `HADR_LOGCAPTURE_WAIT` wait type, the `HADR_WORK_QUEUE`
    occurs on both the primary and the secondary replicas, but the `HADR_WORK_QUEUE`
    wait type is much more prevalent on both replicas. As a matter of fact, the `HADR_WORK_QUEUE`
    wait type will frequently be the top AlwaysOn related wait type on every SQL Server
    that is part of an AlwaysOn Availability Group, especially if the work load is
    low.


    Figure [10-7](#340881_2_En_10_Chapter.xhtml#Fig7) shows an AlwaysOn Availability
    Group like the one in Figure [10-6](#340881_2_En_10_Chapter.xhtml#Fig6), but this
    time I added the `HADR_WORK_QUEUE` wait type to the image as well.


    ![../images/340881_2_En_10_Chapter/340881_2_En_10_Fig7_HTML.jpg](images/340881_2_En_10_Chapter/340881_2_En_10_Fig7_HTML.jpg)


    Figure 10-7

    HADR_LOGCAPTURE_WAIT and HADR_WORK_QUEUE wait types


    Since both the `HADR_LOGCAPTURE_WAIT` and `HADR_WORK_QUEUE` wait types occur naturally
    over time, I did not include an example of both the wait types. Also, because
    both these wait types are not directly related to performance problems, there
    is no use including a section on lowering the wait times of both these wait types.


    ### HADR_LOGCAPTURE_WAIT and HADR_WORK_QUEUE Summary


    Both the `HADR_LOGCAPTURE_WAIT` and `HADR_WORK_QUEUE` wait types are benign wait
    types that occur on every SQL Server that is part of an AlwaysOn Availability
    Group. Because the `HADR_LOGCAPTURE_WAIT` and `HADR_WORK_QUEUE` wait types are
    not directly related to performance problems, there is no direct need to focus
    attention on lowering them, and they can, in most cases, be safely ignored.


    ## HADR_SYNC_COMMIT


    The `HADR_SYNC_COMMIT` wait type is another AlwaysOn-related wait type that was
    introduced in SQL Server 2012. In many ways the `HADR_SYNC_COMMIT` wait type closely
    resembles the `DBMIRROR_SEND` wait type we discussed earlier in this chapter.
    There are some differences, however, between both wait types, which we will discuss
    in the following section.


    ### What Is the HADR_SYNC_COMMIT Wait Type?


    The `HADR_SYNC_COMMIT` wait type indicates the time the primary replica spends
    waiting for the secondary replica to harden the log records. `HADR_SYNC_COMMIT`
    waits will only occur on the primary replica and only inside a synchronous-replication
    AlwaysOn Availability Group. As soon as a transaction is received by the primary
    replica and is sent to the secondary replica for hardening, the `HADR_SYNC_COMMIT`
    wait time will start recording. The `HADR_SYNC_COMMIT` wait time will only stop
    recording when the secondary replica has sent its confirmation that the write
    to the secondary’s transaction log was completed. Figure [10-8](#340881_2_En_10_Chapter.xhtml#Fig8)
    shows the `HADR_SYNC_COMMIT` wait time generation inside a timeline.


    ![../images/340881_2_En_10_Chapter/340881_2_En_10_Fig8_HTML.jpg](images/340881_2_En_10_Chapter/340881_2_En_10_Fig8_HTML.jpg)


    Figure 10-8

    HADR_SYNC_COMMIT and synchronous replication


    Since the `HADR_SYNC_COMMIT` wait type will always occur in every synchronous
    replicated AlwaysOn Availability Group, it is normal to expect a certain amount
    of wait time. But just like the `DBMIRROR_SEND` wait type, the wait time of the
    `HADR_SYNC_COMMIT` wait type is highly dependent on the speed at which the secondary
    replica can process the log records. This means that a slow network connection
    between both replicas or the performance of the storage subsystem on the secondary
    replica can impact `HADR_SYNC_COMMIT` wait times. For this reason, it is important
    to understand what the normal wait times for the `HADR_SYNC_COMMIT` wait type
    are for your AlwaysOn configuration so you can identify higher-than-normal wait
    times easily.'
