    DMV will also return information we can use as input for the `sys.dm_tran_locks`
    DMV. This information will be available in the `resource_description` column of
    the `sys.dm_os_waiting_tasks` DMV, as shown in Figure [8-6](#340881_2_En_8_Chapter.xhtml#Fig6).


    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig6_HTML.jpg](images/340881_2_En_8_Chapter/340881_2_En_8_Fig6_HTML.jpg)


    Figure 8-6


    resource_description column of the sys.dm_os_waiting_tasks DMV during a block


    If we copy the `associatedObjectID` and use it as input in the `WHERE` clause
    against the `sys.dm_tran_locks` DMV, we will receive more information about why,
    and on what, this task is waiting. The following query will retrieve all the rows
    inside the `sys.dm_tran_locks` DMV that have a `resource_associated_entity_id`
    of `72057594045333504`:


    ```

    SELECT *

    FROM sys.dm_tran_locks

    WHERE resource_associated_entity_id = '' 72057594045333504'';

    ```


    On my test SQL Server, the query returned 32 locks, 26 of which are Exclusive
    locks on rows inside a clustered index; there are also a number of Intent Exclusive
    locks on data pages and one Shared lock that is waiting to be placed on a page.
    The waiting Shared lock is the one returned by the `sys.dm_os_waiting_tasks` DMV.
    A portion of the results is displayed in Figure [8-7](#340881_2_En_8_Chapter.xhtml#Fig7).


    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig7_HTML.jpg](images/340881_2_En_8_Chapter/340881_2_En_8_Fig7_HTML.jpg)


    Figure 8-7


    Lock information from sys.dm_tran_locks


    Finding lock information and figuring out who is blocking whom by querying the
    `sys.dm_tran_locks` DMV can be a challenge on systems where you have many locks
    and blocks occurring, since the DMV will return a row for every lock placed. Another,
    easier, method to analyze locking and blocking is to use the `sp_WhoIsActive`
    stored procedure created by Adam Machanic. This stored procedure will return information
    about everything that is running at that time and is a great tool for analyzing
    performance problems. With some extra parameters it will also return a wealth
    of locking information without you having to join various DMVs yourself. You can
    download the `sp_WhoIsAc`tive DMV from its website at [`http://whoisactive.com/downloads/`](http://whoisactive.com/downloads/)
    .


    To show you an example of the `sp_WhoIsActive` stored procedure I ran it on my
    test SQL Server while it was experiencing a blocking problem. The most basic way
    of running it is by just executing it:


    ```

    EXEC sp_WhoIsActive;

    ```


    Figure [8-8](#340881_2_En_8_Chapter.xhtml#Fig8) shows a small portion of the results.
    There are many more columns available that will show you additional information,
    like the session ID of the blocking session.


    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig8_HTML.jpg](images/340881_2_En_8_Chapter/340881_2_En_8_Fig8_HTML.jpg)


    Figure 8-8


    sp_WhoIsActive default results


    We can directly identify wait statistics information and the queries that are
    being executed at this time. Because the `blocking_session_id` column returned
    a session ID of 55 for the `SELECT` query, we should take a look at what the query
    that is being executed by session ID 55 is doing. By clicking the query link inside
    the `sql_text` column, we can view the whole query text, as shown in Figure [8-9](#340881_2_En_8_Chapter.xhtml#Fig9).


    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig9_HTML.jpg](images/340881_2_En_8_Chapter/340881_2_En_8_Fig9_HTML.jpg)


    Figure 8-9


    sql_text output from sp_WhoIsActive


    In this specific case we can probably resolve the blocking problem pretty quickly.
    The query that is causing the block has left its transaction open without performing
    a `COMMIT` or `ROLLBACK`. As long as a transaction stays open, locks are being
    kept in place and are not released.


    The `sp_WhoIsActive` stored procedure also has a parameter to return additional
    locking information, including information about the lock hierarchy. The query
    that follows will execute the `sp_WhoIsActive` stored procedure and retrieve extra
    lock information for the queries that are currently executing:


    ```

    EXEC sp_WhoIsActive @get_locks=1;

    ```


    Figure [8-10](#340881_2_En_8_Chapter.xhtml#Fig10) returns the new columns that
    are added to the output of `sp_WhoIsActive` .


    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig10_HTML.jpg](images/340881_2_En_8_Chapter/340881_2_En_8_Fig10_HTML.jpg)


    Figure 8-10


    Lock information returned by sp_WhoIsActive


    By clicking the link below the `locks` column, we can view which locks are being
    used and on what objects they are placed. This will also give us a good look at
    the locking hierarchy that is in place for this specific query. Figure [8-11](#340881_2_En_8_Chapter.xhtml#Fig11)
    shows the extra lock information for the first returned query in Figure [8-10](#340881_2_En_8_Chapter.xhtml#Fig10).


    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig11_HTML.png](images/340881_2_En_8_Chapter/340881_2_En_8_Fig11_HTML.png)


    Figure 8-11


    Additional lock information returned by sp_WhoIsActive


    Here we can see that an Intent Exclusive lock is placed at the `OBJECT` level,
    which means a lock has been placed on the object that is displayed in the `Object
    name` field of the XML schema—in this case `Address`, which is a table. A level
    down, at the page level, we also see two Intent Exclusive locks in place inside
    two different indexes on the `Address` table. And at the bottom level we see the
    Exclusive locks, which are placed at the `KEY` objects, which indicate rows inside
    an index.


    There are many more parameters available for the `sp_WhoIsActive` stored procedure,
    each one of them returning more information about various parts of SQL Server.
    This makes the `sp_WhoIsActive` Stored Procedure a great tool for finding out
    what is going on inside your SQL Server instance, and I encourage you to give
    it a try.


    Now that we have discussed many aspects of locking and blocking, from lock modes
    and hierarchies to analyzing locks and blocks, we should be ready to take a look
    at the lock-related wait types inside SQL Server. Keep in mind that this introduction
    to locking and blocking is far from a complete guide to the topic, as going into
    more detail on how locking and concurrency works inside SQL Server would fill
    a book by itself.'
  trans: '### 查询锁信息


    若要查看当前已放置的锁，我们可以使用 `sys.dm_tran_locks` 这个动态管理视图。此 DMV 会为 SQL Server 实例中的每一个活动锁返回一行记录，其中包含锁的类型、资源类型、放置该锁的会话
    ID，以及该锁是已授予还是正在等待被放置等信息。图 8-4 展示了我的测试 SQL Server 机器上该 DMV 输出的一小部分内容。

    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig4_HTML.jpg](img/340881_2_En_8_Fig4_HTML.jpg)

    图 8-4. `sys.dm_tran_locks` 输出


    如果我们看一下图 8-4，可以看到多个排他锁已被授予并放置在键锁级别。这意味着一个事务当前正在修改聚集索引内的数据。在键锁级别之上的页面级别还有一个意向排他锁，这表明在层次结构的下方存在一个排他锁。另外请注意，一个共享锁当前正等待在同一数据页
    (`1:20432`) 上被放置。该锁还不能被授予，因为存在一个不兼容的意向排他锁。


    由于共享锁必须等待才能放置到数据页上，我们可以通过查看等待统计信息来观察它已经等待了多久。图 8-5 显示了针对 `sys.dm_os_waiting_tasks`
    DMV 进行查询的部分结果。

    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig5_HTML.jpg](img/340881_2_En_8_Fig5_HTML.jpg)

    图 8-5 `sys.dm_os_waiting_tasks` 中的锁信息


    通过使用 `sys.dm_os_waiting_tasks` DMV，我们可以看到会话 ID 55 当前正在等待一个名为 `LCK_M_S` 的资源。这代表一个共享锁资源类型。会话
    ID 55 当前被会话 ID 53 阻塞，而会话 ID 53 恰好就是那个在会话 ID 55 试图查询的对象上放置了排他锁和意向排他锁的会话。`sys.dm_os_waiting_tasks`
    DMV 还会返回一些信息，这些信息可以用作 `sys.dm_tran_locks` DMV 的输入。此信息将位于 `sys.dm_os_waiting_tasks`
    DMV 的 `resource_description` 列中，如图 8-6 所示。

    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig6_HTML.jpg](img/340881_2_En_8_Fig6_HTML.jpg)

    图 8-6 阻塞期间 `sys.dm_os_waiting_tasks` DMV 的 `resource_description` 列


    如果我们复制 `associatedObjectID` 并将其用作针对 `sys.dm_tran_locks` DMV 的 `WHERE` 子句的输入，我们将获得更多关于此任务为什么等待以及在等待什么的信息。以下查询将检索
    `sys.dm_tran_locks` DMV 中所有 `resource_associated_entity_id` 为 `72057594045333504`
    的行：

    ```sql

    SELECT *

    FROM sys.dm_tran_locks

    WHERE resource_associated_entity_id = '' 72057594045333504'';

    ```

    在我的测试 SQL Server 上，该查询返回了 32 个锁，其中 26 个是聚集索引中行上的排他锁；还有多个数据页上的意向排他锁，以及一个等待被放置到页面上的共享锁。这个等待中的共享锁就是
    `sys.dm_os_waiting_tasks` DMV 所返回的那个锁。部分结果显示在图 8-7 中。

    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig7_HTML.jpg](img/340881_2_En_8_Fig7_HTML.jpg)

    图 8-7 来自 `sys.dm_tran_locks` 的锁信息


    在锁和阻塞发生很多的系统上，通过查询 `sys.dm_tran_locks` DMV 来查找锁信息并弄清楚谁在阻塞谁可能是一个挑战，因为该 DMV 会为每一个放置的锁返回一行。另一种更简单的方法来分析锁和阻塞是使用
    Adam Machanic 创建的 `sp_WhoIsActive` 存储过程。此存储过程将返回当时正在运行的所有内容的信息，是分析性能问题的绝佳工具。通过一些额外的参数，它还会返回丰富的锁信息，而无需你自己连接各种
    DMV。你可以从其网站 [`http://whoisactive.com/downloads/`](http://whoisactive.com/downloads/)
    下载 `sp_WhoIsActive`。


    为了向你展示 `sp_WhoIsActive` 存储过程的例子，我在我的测试 SQL Server 遭遇阻塞问题时运行了它。最基本的方法是直接执行它：

    ```sql

    EXEC sp_WhoIsActive;

    ```

    图 8-8 显示了结果的一小部分。还有许多其他可用的列，可以向你显示额外信息，例如阻塞会话的会话 ID。

    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig8_HTML.jpg](img/340881_2_En_8_Fig8_HTML.jpg)

    图 8-8 `sp_WhoIsActive` 默认结果


    我们可以直接识别等待统计信息以及此时正在执行的查询。因为 `blocking_session_id` 列对于 `SELECT` 查询返回了会话 ID 55，我们应该查看由会话
    ID 55 执行的查询正在做什么。通过单击 `sql_text` 列内的查询链接，我们可以查看整个查询文本，如图 8-9 所示。

    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig9_HTML.jpg](img/340881_2_En_8_Fig9_HTML.jpg)

    图 8-9 来自 `sp_WhoIsActive` 的 `sql_text` 输出


    在这个特定案例中，我们可能可以相当快地解决阻塞问题。造成阻塞的查询让其事务保持打开状态，而没有执行 `COMMIT` 或 `ROLLBACK`。只要一个事务保持打开，锁就会被保持而不释放。


    `sp_WhoIsActive` 存储过程还有一个参数可以返回额外的锁信息，包括有关锁层次结构的信息。下面的查询将执行 `sp_WhoIsActive` 存储过程并为当前正在执行的查询检索额外的锁信息：

    ```sql

    EXEC sp_WhoIsActive @get_locks=1;

    ```

    图 8-10 显示了添加到 `sp_WhoIsActive` 输出中的新列。

    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig10_HTML.jpg](img/340881_2_En_8_Fig10_HTML.jpg)

    图 8-10 `sp_WhoIsActive` 返回的锁信息


    通过单击 `locks` 列下方的链接，我们可以查看正在使用哪些锁以及它们放置在哪些对象上。这还将让我们很好地了解此特定查询所使用的锁层次结构。图 8-11
    显示了图 8-10 中第一个返回查询的额外锁信息。

    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig11_HTML.png](img/340881_2_En_8_Fig11_HTML.png)

    图 8-11 `sp_WhoIsActive` 返回的额外锁信息


    在这里，我们看到在 `OBJECT` 级别放置了一个意向排他锁，这意味着在 XML 模式的 `Object name` 字段中显示的对象上放置了一个锁——本例中是
    `Address`，这是一个表。再下一级，在页面级别，我们还看到在 `Address` 表的两个不同索引内有两个意向排他锁。在底层，我们看到排他锁，它们放置在
    `KEY` 对象上，这表示索引中的行。


    `sp_WhoIsActive` 存储过程还有许多其他可用的参数，每一个都会返回关于 SQL Server 各个部分的更多信息。这使得 `sp_WhoIsActive`
    存储过程成为了解 SQL Server 实例内部情况的一个极好工具，我鼓励你尝试一下。


    既然我们已经讨论了锁和阻塞的许多方面，从锁模式和层次结构到分析锁和阻塞，我们应该准备好去了解一下 SQL Server 中与锁相关的等待类型了。请记住，这个关于锁和阻塞的介绍远非该主题的完整指南，因为深入探讨
    SQL Server 内部锁和并发的工作原理本身就足以写成一本书。'
- fmt: '## LCK_M_S


    The first lock-related wait type is the `LCK_M_S` wait type. This wait type represents
    that a task is waiting to place a Shared lock on a resource.


    ### What Is the LCK_M_S Wait Type?


    The `LCK_M_S` wait type indicates that a task is, or has, been waiting to place
    a Shared lock on a resource. It is important to understand that you will only
    see this wait type when some form of blocking is occurring, since a task is waiting
    to place the Shared lock. It doesn’t mean there is a Shared lock active on the
    resource. This is true for every lock-related wait type, as they will only get
    recorded when there is a blocking situation.


    Since the `LCK_M_S` wait type is related to Shared locks, it will occur when a
    read action is being performed but has to wait because an incompatible lock is
    already in place on the resource we want to read. The time we are waiting before
    we are able to place the Shared lock is recorded as the wait time of the `LCK_M_S`
    wait type.


    Figure [8-12](#340881_2_En_8_Chapter.xhtml#Fig12) shows a common situation that
    will result in `LCK_M_S` waits occurring. In this case an Exclusive lock has been
    placed on a page by T1, indicating a data modification. When T2 wants to read
    the data from the page, it will need to place a Shared lock, but since Exclusive
    and Shared locks are incompatible, a `LCK_M_S` wait occurs.


    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig12_HTML.jpg](images/340881_2_En_8_Chapter/340881_2_En_8_Fig12_HTML.jpg)


    Figure 8-12

    LCK_M_S wait occurring


    ### LCK_M_S Example


    Creating an example of a `LCK_M_S` wait occurring is not very difficult, as we
    just need to create a block situation between a data modification query and a
    data read query.


    For this example we are going to run the query seen in Listing [8-1](#340881_2_En_8_Chapter.xhtml#PC6)
    against the `AdventureWorks` database. This query will begin a transaction and
    modify a few rows, but it will not commit or rollback the transaction. Since we
    explicitly indicated this transaction by supplying a `BEGIN TRAN`, SQL Server
    will keep the locks in place until we explicitly execute a `COMMIT` or `ROLLBACK`
    command.


    ```

    BEGIN TRAN

    UPDATE Sales.SalesOrderDetail

    SET CarrierTrackingNumber = ''4E0A-4F89-AD''

    WHERE SalesOrderID = ''43661'';

    Listing 8-1

    Start a modification transaction

    ```


    When we execute the query, we receive a result very quickly; in my case 15 rows
    were updated. But like I said before, the transaction is not yet finished, so
    it will remain running, leaving locks on the objects it modified.


    So far we aren’t causing any blocking, since this is the test SQL Server and no
    other queries are running. Let’s change that and create a blocking situation.


    For this we are going to open a second window in SQL Server Management Studio
    and execute the query seen in Listing [8-2](#340881_2_En_8_Chapter.xhtml#PC7).
    This will just perform a `SELECT` against the `Sales.SalesOrderDetail` table,
    the same table in which we are currently modifying data.


    ```

    SELECT *

    FROM AdventureWorks.Sales.SalesOrderDetail;

    Listing 8-2

    Select data from a table where a modification is being performed

    ```


    As soon as we run this `SELECT` query, we notice that no results are returned
    and that the query will keep running. This is a typical example of a blocking
    operation where a transaction is modifying data we want to read inside another
    transaction.


    If we were to query the `sys.dm_os_waiting_tasks` DMV, we would be able to see
    the `LCK_M_S` wait type, as shown in Figure [8-13](#340881_2_En_8_Chapter.xhtml#Fig13).


    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig13_HTML.jpg](images/340881_2_En_8_Chapter/340881_2_En_8_Fig13_HTML.jpg)


    Figure 8-13

    LCK_M_S wait occurring


    The only way the `LCK_M_S` wait will be resolved is if the incompatible lock is
    removed. In this case we performed a rollback of the modification transaction
    we started in the first SQL Server Management Studio window. We do this by running
    the `ROLLBACK` command in the same session window. Immediately after performing
    the transaction rollback we receive the results the `SELECT` query asked for.
    Querying the `sys.dm_os_waiting_tasks` also showed that the `LCK_M_S` wait was
    resolved.


    ### Lowering LCK_M_S Waits


    Seeing `LCK_M_S` waits occur does not necessarily have to mean something is wrong.
    It does, however, indicate that blocking is occurring. If you notice high wait
    times on the `LCK_M_S` wait type, it means that someone’s read transaction is
    currently taking a long time to complete because it has to wait to place the Shared
    lock. So the first step will be to identify the query that is causing the block.
    We can do this by using the `sys.dm_os_waiting_tasks` DMV and looking at the `blocking_session_id`
    column. This is relatively quick to do when there is only a single block active,
    but can get complex when many concurrent queries are being blocked by other transactions.
    In this case we have to follow the blocking chain until we find the head blocker
    (which is the first lock on an object). Another option is to use the `sp_WhoIsActive`
    stored procedure we discussed in the “Locking and Blocking Introduction” at the
    start of this chapter. This stored procedure will move through the blocking chain
    for you, directly displaying the head blocker.


    After we have found the query that is causing the blocking to occur, we need to
    analyze it and see if we can optimize that query. Maybe it is requesting more
    locks than it actually needs and thus requires a long time to complete. One way
    to optimize that query would be to look at whether any indexes should be added
    so fewer rows are required to be locked. Or maybe you could cut the single transaction
    into multiple transactions that each access fewer objects. Another possible problem
    that can cause more locking than necessary is out-of-date statistics. Statistics
    are used as input for a query plan, and if they do not accurately reflect the
    contents of the table or index, they can lead to a bad query plan, which in turn
    can lead to more locks than necessary.


    Another option would be to change the Isolation level of the read transactions
    so no Shared locks are needed in order to read the data. For instance, setting
    the Isolation level to Read Uncommitted will not place Shared locks, and the read
    transaction will not be blocked. This does introduce another problem related to
    the Isolation level, dirty reads, which we discussed in the “Locking and Blocking
    Introduction” section of this chapter. Next to using Read Uncommitted, you could
    also use Snapshot Isolation, which will result in fewer Shared locks, but will
    not cause dirty reads. Snapshot Isolation does put more load on the TempDB database,
    since it must maintain versions of data if many concurrent transactions are modifying
    that data.


    ### LCK_M_S Summary


    The `LCK_M_S` wait type occurs when an incompatible lock is being placed on a
    resource and another transaction wants to place a Shared lock on the same resource.
    Seeing the `LCK_M_S` wait type means transactions are being blocked. You should
    try to identify which queries are causing the block to occur and see if these
    can be optimized to result in fewer locks or locks that have a shorter duration.
    As a final resort you could choose to change the Isolation level of your read
    transactions, though this does introduce other side effects, like dirty reads
    or increased load inside TempDB.


    ## LCK_M_U


    `LCK_M_U` wait types are related to locks that use the Update (U) mode. When a
    task wants to place an Update lock on a resource but an incompatible lock is already
    in place, `LCK_M_U` waits occur.'
