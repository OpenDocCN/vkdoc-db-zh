    ### PREEMPTIVE_OS_GETPROCADDRESS 示例


    在这个示例中，我将执行 SQL Server 中已有的一个扩展存储过程 `xp_getnetname`，而不是编写一个自定义扩展存储过程，这远远超出了本书的范围。`xp_getnetname`
    是一个未公开的扩展存储过程，它返回托管 SQL Server 实例的计算机的 NETBIOS 名称。在执行 `xp_getnetname` 扩展存储过程之前，我清除了
    `sys.dm_os_wait_stats` DMV，然后在执行 `xp_getnetname` 之后，我查询该 DMV 以获取 `PREEMPTIVE_OS_GETPROCADDRESS`
    等待信息。清单 11-4 显示了我在测试 SQL Server 实例上执行的整个查询。


    ```

    USE [master]

    GO

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    exec xp_getnetname;

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''PREEMPTIVE_OS_GETPROCADDRESS'';

    ```

    清单 11-4 执行 xp_getnetname 并查询等待统计信息


    清单 11-4 中查询的结果可以在图 11-20 中看到。


    ![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig20_HTML.jpg](img/340881_2_En_11_Fig20_HTML.jpg)


    图 11-20 PREEMPTIVE_OS_GETPROCADDRESS 等待


    结果并不引人注目。显然，`xp_getnetname` 扩展存储过程在加载 `.dll` 入口点时不会引起任何问题，因为没有记录到等待时间。但是，如 `waiting_tasks_count`
    列所示，等待确实发生了，只是 SQL Server 加载入口点花费了不到一毫秒的时间。


    ### 降低 PREEMPTIVE_OS_GETPROCADDRESS 等待


    由于 `PREEMPTIVE_OS_GETPROCADDRESS` 等待类型与执行扩展存储过程直接相关，因此您调查的第一步应该是检测正在执行的是哪个扩展存储过程以及它的功能是什么。


    我曾看到 `PREEMPTIVE_OS_GETPROCADDRESS` 等待在多个客户那里发生，因为他们使用的是使用扩展存储过程执行数据库备份的第三方备份应用程序，但高
    `PREEMPTIVE_OS_GETPROCADDRESS` 等待时间可能还有更多其他原因。了解正在执行哪个扩展存储过程可以帮助您追踪是哪个进程在执行该扩展存储过程。


    在 SQL Server 2008 和 2008R2 中也有一些已知的错误，会报告高于正常的 `PREEMPTIVE_OS_GETPROCADDRESS`
    等待时间，因为扩展存储过程的执行时间也被记录在等待时间中，而不仅仅是入口点加载时间。如果您仍在 SQL Server 2008 或 2008R2 上运行，并且遇到非常高的
    `PREEMPTIVE_OS_GETPROCADDRESS` 等待时间，升级到最新的 Service Pack 并检查 `PREEMPTIVE_OS_GETPROCADDRESS`
    等待时间是否下降可能是值得的。或者更好的是，升级到更高版本的 SQL Server，因为 SQL Server 2008R2 已于 2019 年 7 月 9
    日标记为生命周期结束。


    ### PREEMPTIVE_OS_GETPROCADDRESS 总结


    `PREEMPTIVE_OS_GETPROCADDRESS` 等待类型与扩展存储过程的执行直接相关。扩展存储过程可以用多种编程语言（如 C#）编写，允许您执行在
    T-SQL 中原本不可能的操作。每当加载扩展存储过程 `.dll` 内的入口点时，就会记录 `PREEMPTIVE_OS_GETPROCADDRESS` 等待类型的等待时间。在正常情况下，`PREEMPTIVE_OS_GETPROCADDRESS`
    等待类型的等待时间非常低。看到高的 `PREEMPTIVE_OS_GETPROCADDRESS` 等待时间可能表明入口点加载遇到了问题。在 SQL Server
    2008 和 2008R2 中也存在与计算 `PREEMPTIVE_OS_GETPROCADDRESS` 等待类型相关的错误。如果您正在运行 SQL Server
    2008 或 2008R2 并遇到高的 `PREEMPTIVE_OS_GETPROCADDRESS` 等待时间，升级到最新的 Service Pack 或迁移到更高版本的
    SQL Server 可能是值得的，因为 SQL Server 2008R2 已于 2019 年 7 月 9 日标记为生命周期结束。'
- fmt: '# 12. Background and Miscellaneous Wait Types


    SQL Server has many different internal processes that can run into a wait of a
    specific wait type, and so far we have discussed quite a few of them. Some of
    these internal processes are constantly running inside SQL Server, waiting until
    there is work for them to do. While these processes, frequently called `background
    processes`, are waiting for work to arrive, SQL Server will record the time they
    are waiting for work as wait time on specific wait types related to these background
    processes. While these background wait types are not directly related to performance
    problems, they frequently have the highest wait time and will show up at the top
    of the wait time list when you query the top wait types ordered by wait time.


    Frequently these background wait types are called `benign`, and can safely be
    ignored because they simply indicate that an internal process is waiting for work
    to arrive. This logic is also true for the wait types we will discuss in this
    chapter, but instead of just telling you to ignore them when analyzing wait statistics,
    I want to give you some background information about them so you know what they
    measure and why it is safe to ignore them. Keep in mind that we are still talking
    about SQL Server here, which means that “it depends” on many factors as to whether
    you can completely ignore these background wait types. You wouldn’t be the first
    person to run into a performance problem and only to find out that an ignored
    background process was actually the cause of the issue. So my advice is to ignore
    but to not forget about them!


    Next to the background wait types I also added a number of miscellaneous wait
    types that were difficult to place in an earlier chapter because they didn’t quite
    fit in with the chapter’s wait type category.


    Since the background wait types inside this chapter record wait time constantly
    when their associated processes are waiting for work to do, I did not include
    an example section or a lowering wait time section for these wait types.


    ## CHECKPOINT_QUEUE


    The first wait type in this chapter is one of those background wait types that
    accumulates large amounts of wait time over time `CHECKPOINT_QUEUE`. The `CHECKPOINT_QUEUE`
    wait type can in many cases be safely ignored, but understanding what the wait
    type stands for and why it has such high wait times can’t hurt.


    ### What Is the CHECKPOINT_QUEUE Wait Type?


    The `CHECKPOINT_QUEUE` wait type is related to the checkpoint process in SQL Server
    that is responsible for writing “dirty” (modified) data pages from the buffer
    cache to the data file on disk. In Chapter [6](#340881_2_En_6_Chapter.xhtml),
    “IO-Related Wait Types,” we took a good look at the checkpoint process when we
    discussed the `SLEEP_BPOOL_FLUSH` wait type, so I won’t repeat all the information
    again here. What is important to know, and the reason why this wait type can normally
    be ignored, is that the `CHECKPOINT_QUEUE` wait type indicates that the checkpoint
    process is waiting for work. This means that wait times on the `CHECKPOINT_QUEUE`
    wait type don’t indicate any performance issues; they just indicate the time the
    checkpoint processes spent waiting on work. On SQL Server instances that aren’t
    very busy, or don’t see many data modification operations, the wait time can reach
    very high values.


    The recording of `CHECKPOINT_QUEUE` wait times inside the `sys.dm_os_wait_stats`
    and `sys.dm_os_waiting_tasks` DMVs goes through a specific internal routine that
    might return unexpected wait times (like sudden spikes inside your baseline).
    Figure [12-1](#340881_2_En_12_Chapter.xhtml#Fig1) shows the results of queries
    against the `sys.dm_os_wait_stats` and `sys.dm_os_waiting_tasks` DMVs for wait
    information of the `CHECKPOINT_QUEUE` wait type on my test SQL Server instance.


    `../images/340881_2_En_12_Chapter/340881_2_En_12_Fig1_HTML.jpg`


    Figure 12-1: CHECKPOINT_QUEUE waits


    What is interesting to notice here is that the cumulative wait times inside the
    `sys.dm_os_wait_stats` DMV stay at 0, while the wait times inside the `sys.dm_os_waiting_tasks`
    DMV have a very high value. My test SQL Server instance doesn’t perform much work
    in the background, so it is logical that the checkpoint process spends most of
    its time waiting for work. The reason for the difference in wait times between
    both DMVs is related to the way SQL Server executes checkpoint operations. The
    wait times shown in both the DMVs are only recorded by the automatic checkpoint
    process. A manual checkpoint execution does not impact the wait times. As part
    of the automatic checkpoint process, the wait times of the `sys.dm_os_waiting_tasks`
    DMV are moved to the `sys.dm_os_wait_stats` DMV and reset to 0. So, if you notice
    very high `CHECKPOINT_QUEUE` wait times inside the `sys.dm_os_waiting_tasks`,
    it means it was some time ago that the automatic checkpoint process ran.


    To show you a simple demonstration of this behavior, I created a table, reset
    the `sys.dm_os_wait_stats` DMV, inserted a few rows inside the table, performed
    a manual checkpoint, and queried the `sys.dm_os_wait_stats` and `sys.dm_os_waiting_tasks`
    DMV, as shown in Listing [12-1](#340881_2_En_12_Chapter.xhtml#PC1).


    ```sql

    -- Create a table in the AdventureWorks database

    USE [AdventureWorks]

    GO

    CREATE TABLE check_test

    (

    ID UNIQUEIDENTIFIER,

    RandomData VARCHAR(50)

    );

    GO

    -- Clear sys.dm_os_wait_stats

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    -- Insert a few rows into our table

    INSERT INTO check_test

    (

    ID,

    RandomData

    )

    VALUES

    (

    NEWID(),

    CONVERT(varchar(50), NEWID())

    );

    GO 100

    CHECKPOINT 1;

    -- Query Wait Statistics

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''CHECKPOINT_QUEUE'';

    SELECT *

    FROM sys.dm_os_waiting_tasks

    WHERE wait_type = ''CHECKPOINT_QUEUE'';

    ```


    Listing 12-1: CHECKPOINT_QUEUE example


    Figure [12-2](#340881_2_En_12_Chapter.xhtml#Fig2) shows the results of the queries
    made against the `sys.dm_os_wait_stats` and `sys.dm_os_waiting_tasks` DMVs.


    `../images/340881_2_En_12_Chapter/340881_2_En_12_Fig2_HTML.jpg`


    Figure 12-2: CHECKPOINT_QUEUE waits


    As you can see, the manual checkpoint didn’t generate any waits inside the `sys.dm_os_wait_stats`
    DMV. Also, an automatic checkpoint didn’t occur, because inserting 100 rows generated
    too few log records to trigger an automatic checkpoint.


    If we were to insert more rows, we should be able to trigger an automatic checkpoint.
    In this case I ran the following query to insert 100,000 rows into the table we
    created in Listing [12-1](#340881_2_En_12_Chapter.xhtml#PC1). While the insert
    was running, I queried the `sys.dm_os_wait_stats` and `sys.dm_os_waiting_tasks`
    DMVs repeatedly to see if anything changed. See the following:


    ```sql

    INSERT INTO check_test

    (

    ID,

    RandomData

    )

    VALUES

    (

    NEWID(),

    CONVERT(varchar(50), NEWID())

    );

    GO 100000

    ```


    After a few seconds I noticed that the wait time for the `CHECKPOINT_QUEUE` wait
    type was moved to the `sys.dm_os_wait_stats` DMV, as shown in Figure [12-3](#340881_2_En_12_Chapter.xhtml#Fig3).


    `../images/340881_2_En_12_Chapter/340881_2_En_12_Fig3_HTML.jpg`


    Figure 12-3: CHECKPOINT_QUEUE waits


    Apparently, we inserted enough log records to cause an automatic checkpoint to
    occur, and as you can see from this example, only an automatic checkpoint will
    write the wait times of the `CHECKPOINT_QUEUE` to the `sys.dm_os_wait_stats` DMV.


    You should keep this behavior in mind when you notice sudden, very high wait time
    values inside the `sys.dm_os_wait_stats` DMV. This will normally only occur in
    SQL Server instances that either have a very small workload or that have a workload
    mainly consisting of read operations instead of data modification operations.'
