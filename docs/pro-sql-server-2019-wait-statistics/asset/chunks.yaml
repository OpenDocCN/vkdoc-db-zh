    ```


    图 1-7 显示了此查询结果的一部分。


    ![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig7_HTML.jpg](img/340881_2_En_1_Fig7_HTML.jpg)


    图 1-7

    `sys.dm_exec_requests` 结果


    `sys.dm_exec_requests` DMV 是在对任何与性能相关的问题进行故障排除时使用的极其强大的工具。原因是它包含大量关于正在执行的实际查询的信息，并且可以帮助你相对快速地检测到性能瓶颈。因为
