  trans: '

    ### 资源信号量示例


    在本例中，我们将针对 `AdventureWorks` 数据库执行一个涉及排序操作的查询。正如我在上一节中提到的，涉及排序的查询会向资源信号量请求内存以执行排序操作。我们还将使用
    `Ostress` 工具来创建多个查询同时请求内存的情况，从而在资源信号量处形成队列。


    让我们看一下我们将要执行的查询及其内存授予信息，如代码清单 6-8 所示。


    ```

    SELECT

    SalesOrderID,

    SalesOrderDetailID,

    ProductID,

    CarrierTrackingNumber

    FROM

    Sales.SalesOrderDetail

    ORDER BY CarrierTrackingNumber ASC

    Listing 6-8

    针对 AdventureWorks 数据库的排序查询

    ```


    如你所见，这是一个相对简单的查询，它从 `Sales.SalesOrderDetail` 表中返回一些信息，并按 `CarrierTrackingNumber`
    排序。


    如果我们启用“包含实际执行计划”选项并执行该查询，就可以查看执行它所需的内存量。在我的测试 SQL Server 上的结果如图 6-19 所示。你可以通过显示属性窗口（查看
    ➤ 属性窗口）或按 F4 并选择 `SELECT` 运算符来访问这些属性。


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig19_HTML.jpg](img/340881_2_En_6_Fig19_HTML.jpg)


    图 6-19：执行计划属性中的 `MemoryGrantInfo`


    因为我们请求了实际执行计划，所以也可以看到授予查询执行的内存量。在本例中，查询获得了资源信号量授予的 13,568 KB（13.5 MB）内存，如 `GrantedMemory`
    属性所示。执行查询所需的最小内存量，即必需内存，为 512 KB，由 `RequiredMemory` 属性显示。查询请求了 13,568 KB，如 `DesiredMemory`
    属性所示，这是必需内存和额外内存的总和。我们可以看到查询获得了它所请求的全部内存，因为 `GrantedMemory` 和 `DesiredMemory`
    具有相同的值。


    我想指出图 6-19 中的另外两个属性：`SerialDesiredMemory` 和 `SerialRequiredMemory` 属性。对于此查询，这两个属性的值分别与
    `DesiredMemory` 和 `RequiredMemory` 属性的值相同。这是因为查询是在未使用并行化的情况下执行的。当在查询中使用并行化时，由于工作被分配到多个线程，执行排序操作需要更多内存。图
    6-20 显示了当我强制代码清单 6-8 中的查询使用并行化，将工作分配到四个线程时的 `MemoryGrantInfo` 属性。


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig20_HTML.jpg](img/340881_2_En_6_Fig20_HTML.jpg)


    图 6-20：执行并行查询时的 `MemoryGrantInfo` 属性


    如你所见，`SerialRequiredMemory` 的值与我们串行执行查询时相同。`RequiredMemory` 和 `RequestedMemory`
    的大小有所增加，以便能够使用并行化完成排序操作。当你遇到与内存相关的问题，并且你的许多查询都涉及使用并行化执行的排序和联接操作时，应该记住这一点，因为并行化确实需要更多内存。


    现在我们知道了执行代码清单 6-8 中的查询需要多少内存，让我们使用 `Ostress` 通过多个连接来执行该查询。在我启动 `Ostress` 之前，我必须使用以下查询将最大服务器内存值更改为
    250 MB：


    ```

    EXEC sys.sp_configure N''max server memory (MB)'', N''250''

    GO

    RECONFIGURE WITH OVERRIDE

    GO

    ```


    我将代码清单 6-8 中的查询保存到名为 `resource_semaphore.sql` 的 `.sql` 文件中，并使用以下命令行执行 `Ostress`：`"C:\Program
    Files\Microsoft Corporation\RMLUtils\ostress.exe" -E -dAdventureWorks -i"C:\resource_semaphore.sql"
    -n20 -r1 -q`


    这将使用 20 个并发连接针对 `AdventureWorks` 数据库执行 `resource_semaphore.sql` 脚本，每个连接执行一次查询。


    当 `Ostress` 运行时，我查询 `sys.dm_os_waiting_tasks` DMV，寻找 `RESOURCE_SEMAPHORE` 等待；部分结果如图
    6-21 所示。


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig21_HTML.jpg](img/340881_2_En_6_Fig21_HTML.jpg)


    图 6-21：`sys.dm_os_waiting_tasks` DMV 中的 `RESOURCE_SEMAPHORE` 等待


    由于我们将最大服务器内存设置为 250 MB，且每个查询请求 13.25 MB 内存，我们没有足够的空闲内存来授予所有请求的内存。这将导致你在图 6-21
    中看到的 `RESOURCE_SEMAPHORE` 等待类型。


    我们可以使用各种其他资源来分析 `RESOURCE_SEMAPHORE` 等待。资源信号量本身有其自己的 DMV，即 `sys.dm_exec_query_resource_semaphores`，它将返回有关其内存消耗、未完成和等待的授予的信息。图
    6-22 显示了在运行 `Ostress` 工作负载时，针对 `sys.dm_exec_query_resource_semaphores` DMV 执行以下查询的结果：


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig22_HTML.jpg](img/340881_2_En_6_Fig22_HTML.jpg)


    图 6-22：`sys.dm_exec_query_resource_semaphores`


    ```

    SELECT

    target_memory_kb,

    max_target_memory_kb,

    total_memory_kb,

    available_memory_kb,

    granted_memory_kb,

    grantee_count,

    waiter_count

    FROM sys.dm_exec_query_resource_semaphores

    WHERE pool_id = 2

    ```


    我过滤掉了 `pool_id` 为 1 的资源池，因为这个池不处理用户查询。


    你可能已经注意到，返回了两行数据。这是因为实际上有两个不同的资源信号量。顶部一行是“常规”资源信号量。它将处理请求超过 5 MB 内存的查询。第二行（由 `max_target_memory_kb`
    列的 `NULL` 值标识）返回“小型”资源信号量的信息，它处理小于 5 MB 的查询。因为我们的查询请求了超过 5 MB 的内存，所以我们将从常规资源信号量获得内存授予。


    让我们浏览一下针对 `sys.dm_exec_query_resource_semaphores` DMV 查询返回的各个列：


    *   `target_memory_kb` 列返回此资源信号量计划用作其可授予查询的最大内存量的千字节数。

    *   `max_target_memory_kb` 列返回此资源信号量可授予的最大内存量。

    *   `total_memory_kb` 列返回资源信号量持有的总内存，是 `available_memory_kb` 和 `granted_memory_kb`
    的总和。

    *   `granted_memory_kb` 返回当前已授予查询的内存量。

    *   `grantee_count` 和 `waiter_count` 列返回当前已满足或正在资源信号量队列中等待的授予数量。


    从这些信息中我们可以看到，`granted_memory_kb` 列返回的信息是正确的，并且我们的测试查询正在请求内存授予。我们从执行计划中知道，我们的测试查询将请求
    13,568 KB。由于 `grantee_count` 列显示有两个内存请求已授予，我们可以将内存请求数量乘以每个查询的内存量（2 × 13,568 KB），结果为
    27,136 KB，这正是图 6-22 中显示的已授予内存量。

    '
