    我们在这里遇到了大量 `PAGELATCH_UP` 等待，这表明有一个锁存器正在等待更新内存中的页面。`resource_description` 列在这里非常有用，因为它指出了锁存器想要访问的页面
    ID。在这个例子中，我们试图访问的页面 ID 是 `2:3:1`。第一个数字 `2` 代表数据库 ID，这里是 `TempDB` 数据库。第二个数字 `2`
    表示文件 ID（我测试系统上的 TempDB 数据库由多个数据文件组成）。最后一个数字表示页面 ID `1`。为什么所有会话都在同一个等待类型上等待，针对同一个数据页面？这个页面恰好是一个非常特殊的页面，即页自由空间（PFS）页面。PFS
    页面跟踪数据库中每个页面的剩余自由空间。它始终是每个数据库的第一页（页面 ID 为 1），间隔为 8088 页。因此在此示例中，所有请求都在等待更新 `TempDB`
    数据库中的第一个 PFS 页面。


    由于我们正在使用许多并发连接向临时表执行插入操作，我们需要在 `TempDB` 中找到或分配具有自由空间的数据页面来容纳我们的行。所有这些空间使用情况都需要在
    PFS 页面中更新，并且使用锁存器来确保一次只有一个线程能访问 PFS 页面。图 9-6 显示了两个 Perfmon 计数器 Transaction 和 Latch
    Waits/sec 的 Perfmon 图表。这将展示高压工作负载与发生的锁存器等待数量之间的关系。


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig6_HTML.jpg](img/340881_2_En_9_Fig6_HTML.jpg)


    **图 9-6**


    锁存器等待/秒和事务 Perfmon 图表


    这实际上是 `TempDB` 数据库内页面锁存器争用的典型例子，当许多并发查询在 `TempDB` 内创建对象时可能会发生。解决这种特定锁存器争用情况的一种方法是增加更多（大小相同的）`TempDB`
    数据文件。每个新数据文件将维护自己的 PFS 页面，添加更多数据文件有助于分散更新 PFS 页面的负载。使用下面的查询，我向 `TempDB` 数据库添加了三个额外的数据文件：


    ```sql

    USE [master]

    GO

    ALTER DATABASE [tempdb] ADD FILE ( NAME = N''tempdev2'', FILENAME = N''D:\Data\tempdb2.mdf''
    , SIZE = 204800KB , FILEGROWTH = 10%)

    GO

    ALTER DATABASE [tempdb] ADD FILE ( NAME = N''tempdev3'', FILENAME = N''D:\Data\tempdb3.mdf''
    , SIZE = 204800KB , FILEGROWTH = 10%)

    GO

    ALTER DATABASE [tempdb] ADD FILE ( NAME = N''tempdev4'', FILENAME = N''D:\Data\tempdb4.mdf''
    , SIZE = 204800KB , FILEGROWTH = 10%)

    GO

    ```


    当使用与之前相同的向临时表插入数据的查询再次运行 Ostress 实用程序时，我仍然注意到 PFS 页面上发生了锁存器等待，但它们更好地分散在各个 `TempDB`
    数据文件上。查看 Transaction 和 Latch Waits/sec Perfmon 计数器时，我也看到发生的锁存器等待减少了，如图 9-7 所示。


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig7_HTML.jpg](img/340881_2_En_9_Fig7_HTML.jpg)


    **图 9-7**


    添加更多 TempDB 文件后的锁存器等待/秒和事务 Perfmon 图表


    通过添加更多 `TempDB` 数据文件，我本可以进一步减少锁存器等待的数量。然而，添加过多 `TempDB` 数据文件可能是个坏主意，因为确保数据文件获得均等分配的轮询算法在管理许多
    `TempDB` 数据文件时会产生显著的开销。Paul Randal 在他的 SQLskills 博客上有一篇讨论 `TempDB` 数据文件和锁存器争用的精彩文章，你可以在这里找到：
    [`www.sqlskills.com/blogs/paul/a-sql-server-dba-myth-a-day-1230-tempdb-should-always-have-one-data-file-per-processor-core/`](http://www.sqlskills.com/blogs/paul/a-sql-server-dba-myth-a-day-1230-tempdb-should-always-have-one-data-file-per-processor-core/)。


    现在我们已经讨论了锁存器是什么以及它们如何工作，并查看了一个锁存器争用的例子，让我们继续探讨与锁存器相关的等待类型。


    ## PAGELATCH_[xx]


    本章我们将讨论的第一个与锁存器相关的等待类型是 `PAGELATCH_[xx]` 等待类型，其中 `[xx]` 表示使用的锁存器模式（例如，SH 表示共享）。由于我们已在本章引言中讨论了各种锁存器模式，因此本章不再重复描述它们。


    ### 什么是 PAGELATCH_[xx] 等待类型？


    每当锁存器必须在访问内存中的页面之前等待时，就会发生 `PAGELATCH_[xx]` 等待。这些等待的主要原因是页面上已存在其他锁存器，并且这些锁存器与我们的请求想要使用的锁存器模式不兼容。就像锁一样，我们想要放置在页面上的锁存器必须等待，直到页面上不兼容的锁存器被移除。只要不兼容的锁存器存在，我们的请求就会记录
    `PAGELATCH_[xx]` 等待时间。图 9-8 展示了发生 `PAGELATCH_UP` 等待的图示。我使用齿轮图标表示页面上已存在锁存器，以避免与
    SQL Server 锁混淆。


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig8_HTML.jpg](img/340881_2_En_9_Fig8_HTML.jpg)


    **图 9-8**


    正在发生的 PAGELATCH_UP 等待


    很容易将 `PAGELATCH_[xx]` 等待与 `PAGEIOLATCH_[xx]` 等待混淆。尽管它们名称相似，但两者是完全不同的锁存器等待类型。前者表示访问已在内存中的页面，而后者表示页面正从磁盘读入内存。我们将在本章后面详细讨论
    `PAGEIOLATCH_[xx]` 等待类型。

    '
- fmt: '### PAGELATCH_[xx] Example


    In the introduction to this chapter, we took a look at page-latch contention that
    can occur inside the `TempDB` database when many concurrent queries are loading
    data in temporary queries. This isn’t the only form of latch contention that can
    occur inside SQL Server. Another form of latch contention is known as “last-page
    insert contention.” Just like the page-latch contention scenario we discussed
    earlier, last-page insert contention can also be identified by noticing a high
    number of `PAGELATCH` waits. Let’s go through an example of last-page insert contention.


    #### Understanding Last-Page Insert Contention


    Remember that time in database design class when you learned that every table
    should have a clustered index? And that the best candidate for a clustered index
    key column is a narrow, unique, ever-increasing value, like an integer? All of
    that is still true, and it absolutely helps to optimize the performance of queries
    against those tables. There are, however, very specific cases where using this
    practice can cause a performance problem known as last-page insert contention.


    Last-page insert contention can occur on databases that experience a very heavy
    insert workload against a table with relatively small rows; for instance, a table
    with an `ID` column (`Integer` data type, auto increasing) and a `Name` column
    (`Varchar` data type). From a best-practice point of view, we would create a clustered
    index on the `ID` column since it fits the description of a good index key perfectly.
    It is narrow, unique for every row, and always increasing. But because of the
    ever-increasing nature of the auto increment, every newly added row will be added
    at the end of the clustered index, creating a hot-spot for the last data page
    of the clustered index. Figure 9-9 shows the insert behavior of rows into data
    pages inside a clustered index, inside the form of a so-called B-tree structure,
    which is the data structure SQL Server uses to sort indexes.


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig9_HTML.jpg](images/340881_2_En_9_Chapter/340881_2_En_9_Fig9_HTML.jpg)


    Figure 9-9: Last-page insert contention on last page in a clustered index


    Even if the current data page is full, and a new data page is added, the target
    of the inserts will change to the new page, switching the hot-spot to the new
    data page.


    One question I often hear about this behavior is: “Why aren’t locks stopping this?”
    The answer is actually pretty simple: because by default we will be using Exclusive
    row-level locks to insert our new rows instead of locking the page, and you can
    have multiple concurrent Exclusive row locks on one page. Access to the page that’s
    in-memory still needs to occur serially though, so latches are used to make sure
    only one thread has access to the page at any time. Figure 9-10 shows an enlarged
    view of the data pages at the leaf level of the clustered index with locks in
    place.


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig10_HTML.jpg](images/340881_2_En_9_Chapter/340881_2_En_9_Fig10_HTML.jpg)


    Figure 9-10: Leaf page of clustered index with locks in place


    #### Demonstrating the Contention


    To show you an example of last-page insert contention, I will create a new table
    inside the `AdventureWorks` database of my test SQL Server instance using the
    query that follows:


    ```sql

    CREATE TABLE Insert_Test

    (

    ID INT IDENTITY (1,1) PRIMARY KEY,

    RandomData VARCHAR(50)

    );

    ```


    As you can see, this is a pretty small table with an `ID` column that automatically
    increases for every new row inserted, and a `RandomData` column that will hold
    some data. I indicate that the `ID` column is the primary key of this table, which
    will automatically create a clustered index using the `ID` column as the index
    key.


    The next step is running `Ostress` with a highly concurrent workload that inserts
    new rows into the `Insert_Test` table. This time I don’t create a `.sql` input
    file for `Ostress` but rather enter the following query in the `Ostress` command
    line:


    ```sql

    INSERT INTO Insert_Test

    (RandomData)

    VALUES

    (

    CONVERT(varchar(50), NEWID())

    )

    ```


    This will create the following `Ostress` command line that will connect to the
    `AdventureWorks` database and execute the query we supplied using 500 concurrent
    connections, each connection performing the query 100 times. This should create
    enough concurrent inserts to demonstrate last-page insert contention:


    ```bash

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -E -dAdventureWorks
    -Q"INSERT INTO Insert_Test (RandomData) VALUES (CONVERT(varchar(50), NEWID()))"
    -n500 -r100 -q

    ```


    While `Ostress` is running, I query the `sys.dm_os_waiting_tasks` DMV:


    ```sql

    SELECT

    session_id,

    wait_duration_ms,

    wait_type,

    resource_description

    FROM sys.dm_os_waiting_tasks;

    ```


    This query filters out some columns so that a screenshot of the results will fit
    on the page. Figure 9-11 shows a portion of the results.


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig11_HTML.jpg](images/340881_2_En_9_Chapter/340881_2_En_9_Fig11_HTML.jpg)


    Figure 9-11: `PAGELATCH_EX` waits on the same page


    As expected, the insert workload caused a hot-spot to appear on a page inside
    the clustered index, in this case the page with a page ID of `29313`. All of those
    tasks shown in Figure 9-11 (and there were around 300 more not shown) are all
    waiting to place an Exclusive page latch, indicated by the `PAGELATCH_EX` wait
    type, on that page so they can perform their insert operation.


    #### Verifying the Hot-Spot Page


    To prove that page `29313` is a data page, I am going to use the undocumented
    `DBCC IND` command to show us the pages that are associated with the `Insert_Test`
    table. `DBCC IND` will return a row for every page associated with the table we
    supply as a parameter to `DBCC IND`, and, among other things, will show us the
    page type of every page returned.


    Running the command that follows will execute the `DBCC IND` command against the
    `AdventureWorks` database’s `Insert_Test` table. Before we run the actual `DBCC
    IND` command we have to enable Traceflag 3604 so the results of the `DBCC IND`
    command get returned in the SQL Server Management Studio results tab:


    ```sql

    DBCC TRACEON (3604);

    GO

    DBCC IND (AdventureWorks, Insert_Test, 1);

    GO

    ```


    Figure 9-12 shows the results of the `DBCC IND` command. Highlighted is page `29313`,
    the page that was the insert hot-spot during the `Ostress` workload.


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig12_HTML.jpg](images/340881_2_En_9_Chapter/340881_2_En_9_Fig12_HTML.jpg)


    Figure 9-12: `DBCC IND` results


    The information we are interested in resides in the `IndexID` and `PageType` columns.
    The `IndexID` column returns the Index ID that this page is associated with. We
    only have one index on the `Insert_Test` table, and it has an `ID` of 1. The `PageType`
    column returns the page type of the specific page. In this case the `PageType`
    of page `29313` is 1, which indicates that the page is a data page.


    Remember, `DBCC IND` is an undocumented SQL Server command, and I included it
    here to show you information about the page where the last-page insert contention
    was occurring. I strongly advise against using it on production servers.'
