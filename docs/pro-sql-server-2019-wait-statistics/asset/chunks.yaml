- fmt: '## Using the information from the various sources I have shown you so far,
    you should be able to check the general health of your AlwaysOn Availability Group.
    You can then combine this information with other metrics for things that impact
    the performance of your secondary replica, like the performance of your storage
    subsystem and your network connection. Since the `HADR_SYNC_COMMIT` wait type
    is strictly related to the secondary replica, you should focus your analysis on
    the SQL Server that hosts the secondary replica. For instance, if your storage
    subsystem cannot keep up with the number of transactions that need to be committed
    on the secondary replica, you will notice this in higher `HADR_SYNC_COMMIT` wait
    times, and also in the various counters inside the AlwaysOn Dashboard, DMVs, or
    Perfmon.


    It is difficult to give a general recommendation on how to lower `HADR_SYNC_COMMIT`
    wait times since they are highly dependent on myriad variables and also depend
    on your workload. When you have a workload that consists of a large number of
    read queries, you will notice lower `HADR_SYNC_COMMIT` wait times than workloads
    that perform many data modification operations. This means analyzing and optimizing
    your query workload can also contribute to the lowering of `HADR_SYNC_COMMIT`
    wait times.


    ### HADR_SYNC_COMMIT Summary


    The `HADR_SYNC_COMMIT` wait type will only occur on AlwaysOn Availability Groups
    that consist of replicas that are configured to use the synchronous replication
    mode. The `HADR_SYNC_COMMIT` wait type will give you insight into how long it
    took for the secondary replica to commit the transaction to disk. Since the `HADR_SYNC_COMMIT`
    will always record wait times inside synchronous replication, you should only
    worry about the wait times when they are far higher than expected. Thankfully,
    there are various methods available to you to analyze the performance of your
    AlwaysOn Availability Group, including an AlwaysOn Dashboard, DMVs, and Perfmon
    counters.


    Since the performance of the secondary replica has the largest impact on the `HADR_SYNC_COMMIT`
    wait times, your attention should focus on the secondary replica when troubleshooting
    this wait type. The storage subsystem and network connection both play a large
    role in the speed at which the secondary replica can write log records to its
    transaction log. Your workload also impacts `HADR_SYNC_COMMIT` wait times, and
    optimizing it so data modifications are better spread out will result in lower
    `HADR_SYNC_COMMIT` wait times.


    ### REDO_THREAD_PENDING_WORK


    The last wait type in this chapter is the `REDO_THREAD_PENDING_WORK` wait type.
    And even though it misses the characteristic `HADR_` prefix that identifies AlwaysOn-related
    wait types, it is related to AlwaysOn. The `REDO_THREAD_PENDING_WORK` wait type
    is, just like the `HADR_LOGCAPTURE_WAIT` and `HADR_WORK_QUEUE` wait types, a wait
    type that accumulates over time when there is no work to be done. And just like
    the `HADR_LOGCAPTURE_WAIT` and `HADR_WORK_QUEUE` wait types, it can in most cases
    be ignored since it does not indicate a performance problem.


    Even though this is a wait type that can safely be ignored in 99% of the cases,
    I wanted to include it in this chapter for two reasons. It is usually one of the
    top wait types on an AlwaysOn Availability Group secondary replica, and understanding
    its related process inside SQL Server will give you a better understanding of
    the inner workings of AlwaysOn.


    ### What Is the REDO_THREAD_PENDING_WORK Wait Type?


    The `REDO_THREAD_PENDING_WORK` wait type is related to a process that only occurs
    on the secondary replica inside an AlwaysOn Availability Group, the Redo Thread.


    Up to this point in the chapter, we have talked about how the secondary replica
    inside an AlwaysOn Availability Group processes log records, hardens them to its
    own transaction log, and sends a confirmation to the primary replica. When using
    synchronous replication, the primary replica will wait before sending a transaction
    complete message to the client that started the transaction, and when using asynchronous
    replication the message is sent without waiting for the hardening on the secondary.
    But until now we haven’t discussed the process that will perform the modifications
    inside the secondary database described in the log records. This is where the
    Redo Thread on the secondary comes in. This thread is responsible for performing
    the data modifications that were recorded in the log records the primary replica
    sent it. There is one very important concept associated with the Redo Thread:
    it does not impact the commit confirmation from the secondary replica. This means
    that the Redo Thread might be performing work long after the transaction has been
    communicated as committed to the client (both the primary and secondary replica
    have hardened the log record and the AlwaysOn Availability Group has the synchronized
    status).


    This means that even though your AlwaysOn Availability Group is synchronized,
    the data inside the secondary database does not necessarily have to be identical
    to the primary database. This actually matters less than you might think on first
    thought. Because the secondary hardened the log records to its own transaction
    log on disk, it has all the information it needs to perform the redo operation.
    Transactions will not be lost if a failure occurs on the primary since the secondary
    has all the transactions that were performed in its own transaction log and can
    redo all the transactions. This works much the same as a standalone SQL Server
    instance where transactions are also hardened to disk first before data is actually
    changed. If SQL Server were to crash in this situation, SQL Server would use the
    transaction log to redo or undo the data modifications. Figure 10-15 shows an
    example of synchronous replication together with the Redo Thread. Note that the
    Redo Thread is a separate operation that does not impact the duration of the transaction
    complete message.


    ![Figure 10-15](images/340881_2_En_10_Chapter/340881_2_En_10_Fig15_HTML.jpg)


    **Figure 10-15** Synchronous AlwaysOn Availability Group and the Redo Thread


    So, where does the `REDO_THREAD_PENDING_WORK` wait type come in? Well, if the
    Redo Thread is waiting for work to arrive, it will record the time it is inactive
    as wait time on the `REDO_THREAD_PENDING_WORK` wait type. This will occur on both
    synchronous and asynchronous replication modes, but only on the secondary replica.


    Because the wait type only indicates that the Redo Thread is not performing any
    work, it can, save for extremely rare cases, be safely ignored. And because the
    wait time for the `REDO_THREAD_PENDING_WORK` wait type will accumulate naturally
    when there is no work to be done, there is no need to write an example demonstrating
    the wait type. A simple query to retrieve `REDO_THREAD_PENDING_WORK` wait type
    information against the `sys.dm_os_wait_stats` DMV on a secondary replica will
    show you that the wait time increases, especially when there is no user activity
    against the AlwaysOn Availability Group, as shown in Figure 10-16.


    ![Figure 10-16](images/340881_2_En_10_Chapter/340881_2_En_10_Fig16_HTML.jpg)


    **Figure 10-16** REDO_THREAD_PENDING_WORK wait information'
