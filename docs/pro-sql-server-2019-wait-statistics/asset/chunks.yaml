  trans: '## 何为基线？


    如果我们查阅牛津词典中的“baseline”（基线）一词，会得到如下定义：“用于比较的最低或起始点。” 这句话通过使用“起始点”和“比较”这两个关键词，完美地捕捉到了基线的本质。基线通常是我们将后续测量与之进行比较的起始点，或者在我们的语境中，即测量标准。理想情况下，我们会在正常或标准情况下记录我们的基线测量值。如果我们在以后的某个时间点再次执行相同的测量，就可以将该测量值与基线进行比较。如果在比较过程中我们的测量值不一致，则说明可能发生了某些变化。


    即使你在分析性能时尚未使用基线比较，无论你是否意识到，你其实一直在与基线打交道。例如，如果你每月第一天收到薪水，那就是你的情况，或者在本章的语境中，即你的基线。如果由于某种原因你没有在每月第一天收到薪水，你就会注意到与基线相比出现了偏差。这可能成为你调查为何没有按时收到薪水的原因。也许发薪日从每月一号改到了五号，或者最坏的情况是，你工作的公司无法再支付你的薪水了。在任何一种情况下，我们都可以采取行动：要么接受变化，从而创建一个新的基线；要么将情况恢复到基线状态。图
    4-1 展示了这一过程。


    ![../images/340881_2_En_4_Chapter/340881_2_En_4_Fig1_HTML.jpg](img/340881_2_En_4_Fig1_HTML.jpg)


    **图 4-1：变更影响基线**


    定义和维护基线是一个迭代的过程。系统上发生的每一次变更都可能影响你的基线。你正在使用的应用程序发布新版本可能会改变一些查询，或者你的公司可能授予新部门访问数据库的权限，从而增加了连接数。在这两个例子中，我们都需要对基线进行调整，因为正常情况已经发生了变化。


    所有这些随着系统每次变更而调整和测量基线的工作听起来很繁重，有时也确实如此。但请相信我——拥有基线的益处远远大于成本。基线将帮助你比仅仅查看单次测量更快地发现问题，而且在等待统计信息的情况下，它是找到问题可靠、确定答案的唯一方法。让我们用
    DBA 吉姆的一个更技术性的例子来说明这一点。


    吉姆维护着一个托管单一用户数据库的 `SQL Server` 实例。该数据库供公司每位销售人员使用，记录公司与客户之间的每一笔财务交易。用户可以通过 `应用程序
    X` 访问数据库。`应用程序 X` 目前运行的是 `版本 2.4`，非常稳定。性能良好，用户满意，财源滚滚。听起来很棒，对吧？一天，一位顾问走进来，想要将
    `应用程序 X` 升级到全新的 `版本 3.0`。升级到 `版本 3.0` 的过程轻而易举，没有出现任何问题，所有用户都喜欢新功能。


    两天后，电话响了，克里斯的经理刚收到销售团队的反馈，称 `版本 3.0` 的性能糟糕透顶，并要求立即解决。


    幸运的是，吉姆知道基线的重要性，他在升级到 `版本 3.0` 之前创建了一个基线。利用 `版本 2.4` 的基线，吉姆将基线中的测量值与 `版本 3.0`
    中进行的测量值进行比较，立即发现了 `锁等待时间` 测量值上的巨大差异。由于其他测量值与 `2.4` 基线相比基本保持不变，吉姆将注意力集中在长时间运行的锁上，并识别出一个正在锁表的更新查询。他回滚了该查询，情况恢复正常。随后，他联系了应用程序供应商，了解到这种行为是软件中的一个错误导致的。


    这个例子可能听起来有点牵强，但它实际上是我每天在测量变更影响或分析性能问题时所使用方法的简化版本。如果吉姆没有 `锁等待时间` 的基线，只是在变更到 `版本
    3.0` 后查询 `锁等待时间`，他将无法知道等待时间增加了，因为他没有可以比较的对象。他可能选择查看其他指标而不是 `锁等待时间`，从而浪费了宝贵的时间和金钱。


    这里的道理很简单：基线将帮助你更快地检测异常情况并解决性能问题！


    ### 可视化你的基线


    基线通常通过图表进行可视化。将基线测量值转化为图表的一大优势是，图表可以让你更容易地检测出那些与基线相比增幅或降幅最大的测量值。此外，如果你需要证明特定配置正在影响性能，可视化你的数据可能有助于你更轻松地阐明观点。例如，你需要说服你的存储管理员，存储配置的变更已经影响了性能。如果你能交给他一张图表，展示正常行为与变更后行为的对比，他可能会更愿意提供帮助。图
    4-2 中的图表展示了基线测量值与后期测量值的对比。


    ![../images/340881_2_En_4_Chapter/340881_2_En_4_Fig2_HTML.jpg](img/340881_2_En_4_Fig2_HTML.jpg)


    **图 4-2：基线图表示例**


    如图 4-2 所示，你将能够非常快速地识别潜在问题。显然，在 08:00 到 12:00 之间，`每秒事务数` 高于正常情况，这可能值得花时间进行调查。'
- fmt: '### Baseline Types and Statistics


    We will frequently use different types of baselines depending on the information
    we are interested in. There usually isn’t one single baseline to fit all our needs,
    especially not when you are using baselines for performance-troubleshooting purposes.
    For instance, we can create a baseline for every single wait type, or we can choose
    to create only baselines for wait types that impact our system the most. We can
    also choose to create a baseline for specific days or time segments, like business
    hours, and create another for after business hours.


    Next to selecting or limiting the measurements we want to have baselines for,
    we also have to make choices on how we calculate our baselines. These choices
    involve some math and usually require calculating averages. In many cases our
    baseline consists of an average of many data points, depending on how many measurements
    you performed. If you collect measurements for a long period of time and calculate
    an average value from those measurements, you can create a more reliable baseline
    than you can when you only have one day’s worth of measurements. Creating a baseline
    based on averages also has its disadvantages. The most important one is that averages
    are heavily influenced by skewed data. Without going too deep into statistical
    details, skewed data means that there are very high or very low values that impact
    your average. Say, for instance, that a group of students took an exam and we
    wanted to see how the group performed by calculating the average result of the
    exam (the students are rated between 1 and 10, 1 being very poor and 10 being
    excellent; a 6 or higher is required to pass the exam). Figure [4-3](#340881_2_En_4_Chapter.xhtml#Fig3)
    shows the exam results in a graph.


    ![../images/340881_2_En_4_Chapter/340881_2_En_4_Fig3_HTML.jpg](images/340881_2_En_4_Chapter/340881_2_En_4_Fig3_HTML.jpg)


    Figure 4-3


    Exam results


    As you can see in Figure [4-3](#340881_2_En_4_Chapter.xhtml#Fig3), only four students
    scored higher than the required 6 to pass the exam. The rest of the group scored
    way below the requirement. However, if we look at the average performance of the
    group, they actually didn’t do too badly by scoring a 6. We could conclude the
    group is performing well enough by getting an average score of 6, but then we
    would miss that the majority performed badly and only four students actually passed
    the exam. This information is important to keep in mind when you are dealing with
    average baselines. If you see a spike in your average baseline, it is always something
    you should investigate, because it impacts your baseline.


    There are statistical methods available to deal with skewed data and averages,
    one being the `trimmed (or truncated) mean`. This method removes `x` percent of
    the highest and lowest measurements in your series, creating a more stable average.
    We won’t go any deeper into the trimmed mean for baseline use, but if you want
    to learn more about it, I suggest you read Bob Newstadt’s blog post at [`www.sqlteam.com/article/computing-the-trimmed-mean-in-sql`](http://www.sqlteam.com/article/computing-the-trimmed-mean-in-sql)
    . Even though the article is pretty dated, it shows a method of calculating the
    trimmed mean using `T-SQL`.


    ## Baseline Pitfalls


    Hopefully the previous section convinced you that baselines are important, but
    before you go and capture every performance metric and convert it into a baseline
    measurement, there are some pitfalls you will want to avoid.


    ### Too Much Information


    Even though you are free to baseline everything in your system, this is generally
    considered a bad idea. Gathering too much information can blind you in your search
    for answers. If you have to compare 100,000 different metrics against your baseline
    every time a performance problem occurs, you are wasting time. The advice here
    is to keep your baselines small, including only performance metrics that matter
    the most for your system. For instance, you can include performance metrics related
    to `Availability Groups`, but if your system doesn’t use this feature, then there
    is no use including them.


    ### Know Your Metrics


    Another important aspect in the selection of performance metrics is understanding.
    If you do not understand what a performance metric represents, it can be very
    difficult to formulate a correct conclusion, or it can even lead you in the wrong
    direction.


    ### Focus on the Big Measurement Changes


    When comparing measurements against a baseline, always focus on the big increases
    or decreases. Especially for wait statistics, very small increases in wait time
    (1–2%) aren’t a cause for concern. If one of your wait time measurements goes
    up 20%, that would be a good signal to start investigating.


    ### Use Fixed Intervals


    When capturing wait statistics information you should always use a fixed interval.
    If we were to capture wait times at random, it would be almost impossible to build
    a reliable baseline. It would be like comparing apples against oranges. The best
    way to automate the capture of wait statistics information is by using the `SQL
    Server Agent` and setting it to a fixed interval, like every 15 minutes.'
