    图 2-23


    ## 启动扩展事件会话


    启动扩展事件会话后，它将开始收集信息。我们可以通过选择“实时查看数据”选项来查看实时收集到的信息。这将在 SQL Server Management Studio
    中打开一个新选项卡，我们可以在其中监视扩展事件会话。查看实时扩展事件数据会带来一点开销，但这远低于使用 SQL Profiler 的开销。如果您担心查看实时数据的开销，可以选择将扩展事件会话写入事件文件，方法是在扩展事件会话的“数据存储”页面中添加一个文件位置。


    在此示例中，我对 AdventureWorks 数据库执行了一个简单查询，以返回 `Person.Person` 表中的所有内容，如下所示：


    ```sql

    SELECT *

    FROM Person.Person;

    ```


    在设置扩展事件会话的筛选器时，我会特别注意使其与我在 SQL Server Management Studio 中执行查询的选项卡的会话 ID 相匹配。可以通过查看选项卡上括号内的数字找到会话
    ID。扩展事件实时数据选项卡返回的信息如图 2-24 所示。


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig24_HTML.jpg](img/340881_2_En_2_Fig24_HTML.jpg)


    图 2-24


    来自扩展事件会话的实时等待统计信息


    如图 2-24 所示，我们的请求遇到了 `NETWORK_IO` 等待类型。这是扩展事件中的等待名称与等待统计信息 DMV 中的名称不匹配的示例之一。`NETWORK_IO`
    等待名称与 SQLOS 使用的 `ASYNC_NETWORK_IO` 等待类型是相同的等待。我们可以在 `sql_text` 字段中查看我们执行的查询。


    扩展事件会话中还可以包含许多其他可能值得捕获的全局字段，例如执行计划句柄或任务执行时间。所有这些全局字段都将为您提供额外的信息，这些信息会在返回扩展事件会话信息时显示，为您提供极其丰富的详细信息。


    如果出于某些原因，您不想使用 GUI 来创建和运行扩展事件会话，或者您运行的是 SQL Server 2008，您可以使用 T-SQL 来创建和配置一个。要创建与我们使用
    GUI 创建的相同的扩展事件会话，您可以执行清单 2-3 中的查询。


    ```sql

    CREATE EVENT SESSION [WaitStats Query] ON SERVER

    ADD EVENT sqlos.wait_info

    (

    ACTION(sqlserver.sql_text)

    WHERE ([sqlserver].[session_id]=(52))

    )

    ADD TARGET package0.event_file

    (

    SET filename = N''E:\Data\WaitStats_XE.xel'', metadatafile = N''E:\Data\WaitStats_XE.xem''

    );

    ```

    清单 2-3

    创建等待统计信息扩展事件会话


    我们通过在上面的脚本中设置 `metadatafile` 参数包含了元数据文件。如果您运行的是 SQL Server 2012 或更高版本，则不再需要此参数。


    记录扩展事件会话的最简单方法是将其保存到文件；在本例中，我的文件名是 `E:\Data\WaitStats_XE.xel`（SQL Server 会向文件名添加一个唯一的数字标识符，实际文件名是
    `WaitStats_XE_0_130702270937280000.xel`）。我还包含了对会话 ID 52 的筛选，以捕获该会话生成的等待统计信息。


    接下来我们要做的是启动扩展事件会话，这可以通过执行 `ALTER EVENT SESSION` 命令来完成：


    ```sql

    ALTER EVENT SESSION "WaitStats Query" ON SERVER STATE = start;

    ```


    然后，我们在筛选的会话 ID 下，执行与扩展事件 GUI 示例中相同的查询。让扩展事件会话运行一小段时间后，我们可以使用 `ALTER EVENT SESSION`
    命令将其停止：


    ```sql

    ALTER EVENT SESSION "WaitStats Query" ON SERVER STATE = stop;

    ```


    现在我们已经停止了扩展事件会话，我们需要将文件中的信息（作为 XML）导入到表中，以便实际查看会话捕获的内容；我们使用 `sys.fn_xe_file_target_read_file`
    函数来完成此操作。然后，我们可以解析 XML 信息，以更易读的格式返回结果。清单 2-4 中的查询可用于读取扩展事件文件，将其导入临时表，并将结果作为行返回。


    ```sql

    -- Check if temp table is present

    -- Drop if exist

    IF OBJECT_ID(''tempdb..#XE_Data'') IS NOT NULL

    DROP TABLE #XE_Data

    -- Create temp table to hold raw XE data

    CREATE TABLE #XE_Data

    (

    XE_Data XML

    );

    GO

    -- Write contents of the XE file

    -- into our table

    INSERT INTO #XE_Data

    (

    XE_Data

    )

    SELECT

    CAST (event_data AS XML)

    FROM sys.fn_xe_file_target_read_file

    (

    ''E:\Data\WaitStats_XE_0_130702270937280000.xel'',

    ''E:\Data\WaitStats_XE_0_130702270940210000.xem'',

    null,

    null

    );

    GO

    -- Query information from our temp table

    SELECT

    XE_Data.value (''(/event/@timestamp)[1]'', ''DATETIME'') AS ''Date/Time'',

    XE_Data.value (''(/event/data[@name="opcode"]/text)[1]'', ''VARCHAR(100)'') AS
    ''Operation'',

    XE_Data.value (''(/event/data[@name="wait_type"]/text)[1]'', ''VARCHAR(100)'')
    AS ''Wait Type'',

    XE_Data.value (''(/event/data[@name="duration"]/value)[1]'', ''BIGINT'') AS ''Wait
    Time'',

    XE_Data.value (''(/event/data[@name="signal_duration"]/value)[1]'', ''BIGINT'')
    AS ''Signal Wait Time'',

    XE_Data.value (''(/event/action[@name="sql_text"]/value)[1]'', ''VARCHAR(100)'')
    AS ''Query''

    FROM #XE_Data

    ORDER BY ''Date/Time'' ASC

    ;

    ```

    清单 2-4

    将扩展事件文件作为行返回


    清单 2-4 中查询的结果如图 2-25 所示。


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig25_HTML.jpg](img/340881_2_En_2_Fig25_HTML.jpg)


    图 2-25


    清单 2-4 中查询的结果


    就其返回的行数据而言，大多数列不言自明。有两个列值得稍作解释，即 `Operation`（操作）和 `Wait Time`（等待时间）列。`Operation`
    列将显示等待事件的开始或结束。`Wait Time` 列将以毫秒为单位返回等待时间，但它只会在操作结束时被记录。

