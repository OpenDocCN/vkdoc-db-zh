    Another option is to configure the `MAXTRANSFERSIZE` option inside the `BACKUP`
    T-SQL command. This will allow buffers to be filled with larger units of works,
    up to a value of 4,194,304 bytes, or 4 MB. Again, allocating more space for the
    buffers will result in a larger reservation of memory.'
  trans: '

    ### 什么是 `BACKUPBUFFER` 等待类型？


    要理解 `BACKUPBUFFER` 等待是如何产生的，我们需要深入了解 SQL Server 备份过程的内部机制。无论您使用何种备份方法（即事务日志备份、差异备份或完整备份），这些内部机制基本相同，因此它们会遇到相同的等待类型。


    SQL Server 为备份进程分配缓冲区。这些缓冲区将被来自数据库的数据填充，并在备份/还原过程中移动，以便写入备份文件（对于还原操作则相反）。缓冲区在系统内存中分配，但位于缓冲区缓存内存之外，以避免从缓冲区缓存中窃取内存。备份缓冲区的大小和数量由
    SQL Server 自动计算，但我们也可以将这些值作为备份/还原命令的参数自行配置。图 7-1 展示了这些备份缓冲区如何通过一个“读取器”（从数据库或备份文件读取数据到缓冲区）和一个“写入器”（将数据从缓冲区写入备份文件或数据库）进行排序和移动。


    ![通过读取器和写入器移动的备份缓冲区](img/340881_2_En_7_Fig1_HTML.jpg)


    我们可以通过启用两个跟踪标志 `3213` 和 `3605` 来查看备份或还原操作期间有关缓冲区数量和大小的信息，这两个标志会将备份/还原信息输出到 SQL
    Server 错误日志中。清单 7-1 中的查询启用了这两个跟踪标志，并对我的测试 SQL Server 上的 `AdventureWorks` 数据库执行了一次完整备份。


    ```

    -- 启用跟踪标志

    DBCC TRACEON (3213);

    DBCC TRACEON (3605);

    -- 备份数据库

    BACKUP DATABASE [AdventureWorks]

    TO  DISK = N''F:\Backup\aw_21042015.bak''

    WITH NAME = N''AdventureWorks-Full Database Backup'';

    GO

    -- 禁用跟踪标志

    DBCC TRACEOFF (3213);

    DBCC TRACEOFF (3605);

    清单 7-1

    使用备份信息跟踪标志执行完整数据库备份

    ```


    请记住，SQL Server 内部的跟踪标志只应在 Microsoft 支持人员的指导下使用。我现在启用它们是为了在我的测试 SQL Server 上显示备份信息，但我建议不要在生产系统上使用它们。


    在 SQL Server 错误日志中，记录了有关我们刚刚执行的备份的附加信息，如图 7-2 所示。


    ![附加备份信息](img/340881_2_En_7_Fig2_HTML.jpg)


    在这种情况下，备份操作创建了七个缓冲区（由 `BufferCount` 参数显示），每个缓冲区大小为 1024 KB（由 `MaxTransferSize`
    参数显示）。创建缓冲区所需的总内存由 `Total buffer space` 参数显示，为 7 MB (`BufferCount` * `MaxTransferSize`)。返回的另一个有趣信息是
    `memory limit`。这将显示备份操作可以访问的、位于缓冲区缓存之外的最大内存量。


    现在我们对 SQL Server 内部的备份过程有了概念，让我们来看看 `BACKUPBUFFER` 等待类型是在哪里出现的。


    正如我们之前描述的那样，SQL Server 备份过程使用缓冲区来存储需要写入备份文件的数据。每当没有可用的缓冲区时，就会发生 `BACKUPBUFFER`
    等待，使进程等待，直到一个已满的缓冲区被写入备份文件并再次可用。


    ### `BACKUPBUFFER` 示例


    产生 `BACKUPBUFFER` 等待非常简单——只需执行一次备份操作即可。对于此示例，我运行了清单 7-2 中显示的查询。该查询将首先重置 `sys.dm_os_wait_stats`
    DMV，然后对 `AdventureWorks` 数据库执行完整备份，最后返回 `BACKUPBUFFER` 等待类型的等待统计信息。


    ```

    -- 清除 sys.dm_os_wait_stats

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    -- 备份数据库

    BACKUP DATABASE [AdventureWorks]

    TO DISK = N''F:\Backup\aw_21042015.bak''

    WITH

    NAME = N''AdventureWorks-Full Database Backup'';

    GO

    -- 查询 BACKUPBUFFER 等待

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''BACKUPBUFFER'';

    清单 7-2

    生成 BACKUPBUFFER 等待

    ```


    对 `sys.dm_os_wait_stats` DMV 查询的结果如图 7-3 所示。


    ![BACKUPBUFFER 等待](img/340881_2_En_7_Fig3_HTML.jpg)


    在我的测试 SQL Server 上，备份操作的总持续时间约为 1 秒。在这 1 秒中，只有 88 毫秒是花在等待空闲备份缓冲区上。


    ### 降低 `BACKUPBUFFER` 等待


    正如本章引言所述，与备份相关的等待通常无需担心，因为它们通常不会影响 SQL Server 实例的性能。然而，我们可以利用各种备份相关等待类型的等待统计信息来提高备份性能。


    降低 `BACKUPBUFFER` 等待时间的最常用方法之一是为备份操作添加更多缓冲区，覆盖自动分配。我们可以通过在 `BACKUP` T-SQL 命令中指定
    `BUFFERCOUNT` 选项来实现这一点。然而，更改备份操作可使用的缓冲区数量有一个问题。创建的每个缓冲区都将分配 `MAXTRANSFERSIZE`
    选项的值；此值可由 SQL Server 自动计算，或由您自己在 `BACKUP` 命令中设置（最大为 4,194,304 字节）。由于备份操作在缓冲区缓存之外分配内存，使用过多或过大的缓冲区可能会导致内存不足问题。因此，在测试您的
    SQL Server 实例的最佳值时要小心。


    清单 7-3 展示了对清单 7-2 中查询的修改，我们用它来演示发生的 `BACKUPBUFFER` 等待。在这个案例中，我们添加了 `BUFFERCOUNT`
    选项并将其配置为 200。


    ```

    -- 清除 sys.dm_os_wait_stats

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    -- 备份数据库

    BACKUP DATABASE [AdventureWorks]

    TO DISK = N''F:\Backup\aw_21042015.bak''

    WITH

    NAME = N''AdventureWorks-Full Database Backup'',

    BUFFERCOUNT = 200;

    GO

    -- 查询 BACKUPBUFFER 等待

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''BACKUPBUFFER'';

    清单 7-3

    配置了 BUFFERCOUNT 的数据库备份

    ```


    对 `sys.dm_os_wait_stats` DMV 查询的结果如图 7-4 所示。


    ![配置 BUFFERCOUNT 后的 BACKUPBUFFER 等待](img/340881_2_En_7_Fig4_HTML.jpg)


    如您所见，花在 `BACKUPBUFFER` 等待上的时间减少到了 0 毫秒，而我们未提供 `BUFFERCOUNT` 参数时是 88 毫秒。之所以发生这种情况，是因为我们指定的缓冲区数量足以处理备份操作，无需分配额外的缓冲区。由于不需要额外的缓冲区，我们就不需要花时间等待它们的分配。


    另一个选项是在 `BACKUP` T-SQL 命令中配置 `MAXTRANSFERSIZE` 选项。这将允许缓冲区以更大的工作单位进行填充，最高可达 4,194,304
    字节，即 4 MB。同样，为缓冲区分配更多空间将导致保留更大的内存。

