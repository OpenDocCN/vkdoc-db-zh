  trans: '## 隔离


    对内存优化表的并发访问通过基于快照的事务隔离处理。该隔离级别与我们可以在基于磁盘的表上使用的快照隔离共享许多特征，但也存在一些差异以优化吞吐量。首先，基于快照的事务隔离在并发事务希望访问同一行时使用行版本。与常规快照隔离将行版本存储在
    TempDB 数据库中不同，内存优化表的行版本是**内联**存储在数据文件本身的。


    另一个区别是基于快照的事务隔离采用乐观并发控制。这意味着 SQL Server 假设并发事务访问相同数据时不会发生事务冲突。由于此假设，无需锁或闩锁来保护内存优化表数据。然而，存在一种冲突检测机制是活跃的，当它检测到冲突发生时，将终止其中一个事务，该事务需要重试。


    无需放置和维护锁与闩锁，这是 In-Memory OLTP 性能的另一个主要贡献。


    ## 事务日志更改


    本节要讨论的最后差异是针对内存优化表的事务日志行为的修改。对于传统表，无论事务是否提交，都会在事务启动时生成日志记录。对于内存优化表，日志记录仅在事务开始提交处理时才生成。这意味着不会记录已回滚事务的任何信息。这最大限度地减少了与磁盘上事务日志的交互，从而提高了性能。


    另一项修改是，对内存优化表上索引的更改不会记录在事务日志中。由于在内存优化表上创建的索引也完全在内存中维护，因此无需记录更改。内存优化表上的索引在 SQL
    Server 服务启动时重新生成。


    我想提到的最后一个差异是将多个事务分组到一个日志记录中。对于传统表，每个事务将至少生成一个日志记录。针对内存优化表的事务被分组在一起，然后作为一个日志记录写入（当前最大大小为
    24 KB）。例如，如果你对传统表有 200 次插入操作，将至少生成 200 个日志记录。如果我们可以将 100 次插入操作容纳到一个内存优化表的日志记录中，我们只需要两个日志记录，而不是至少
    200 个。同样，这提高了内存优化表的吞吐量。


    现在，我们已经（简化且简短地）了解了内存优化表的一些内部工作原理，接下来让我们看一些与 In-Memory OLTP 相关的等待类型。本章将讨论的三种等待类型中的大多数，都或多或少地与
    In-Memory OLTP 引入的新脱机检查点进程有关。


    ## WAIT_XTP_HOST_WAIT


    本章我们将讨论的第一个等待类型是 `WAIT_XTP_HOST_WAIT`。这种等待类型与我们已在第 12 章“后台和杂项等待类型”中讨论过的 `CHECKPOINT_QUEUE`
    等待类型共享一些特征，即它似乎持续运行，但仅在特定条件下才将其等待信息写入 `sys.dm_os_wait_stats`。


    ### WAIT_XTP_HOST_WAIT 等待类型是什么？


    如果我们在在线丛书（Books Online）上查找关于 `WAIT_XTP_HOST_WAIT` 等待类型的一些信息，我们会得到一个不那么有用的定义：“当等待由数据库引擎触发并由主机实现时发生。”这并没有给我们太多关于可能与
    `WAIT_XTP_HOST_WAIT` 等待类型相关的进程的线索，这意味着我们需要自己做一些深入调查。


    在我们开始研究 `WAIT_XTP_HOST_WAIT` 等待类型之前，我们需要创建一个内存优化表。我使用了清单 13-1 所示的脚本，创建了一个包含单个内存优化表的新数据库。此脚本中有一些路径引用，您需要更改这些引用以确保数据库数据和日志文件在正确的位置创建。


    ```sql

    -- 创建数据库

    -- 如果需要，请确保更改文件位置

    USE [master]

    GO

    CREATE DATABASE [OLTP_Test] CONTAINMENT = NONE

    ON PRIMARY

    (

    NAME = N''OLTP_Test'', FILENAME = N''E:\Data\OLTP_Test_Data.mdf'' , SIZE = 51200KB
    , FILEGROWTH = 10%

    )

    LOG ON

    (

    NAME = N''OLTP_Test_log'', FILENAME = N''E:\Log\OLTP_Test_Log.ldf'' , SIZE = 10240KB
    , FILEGROWTH = 10%

    );

    GO

    -- 添加内存优化文件组

    ALTER DATABASE OLTP_Test ADD FILEGROUP OLTP_MO CONTAINS MEMORY_OPTIMIZED_DATA;

    GO

    -- 向新创建的文件组添加一个文件。

    -- 如果需要，请更改驱动器/文件夹位置。

    ALTER DATABASE OLTP_Test ADD FILE (name=''OLTP_mo_01'', filename=''E:\data\OLTP_Test_mo_01.ndf'')
    TO FILEGROUP OLTP_MO;

    GO

    -- 创建我们的测试表

    USE [OLTP_Test]

    GO

    CREATE TABLE OLTP

    (

    ID INT IDENTITY (1,1) PRIMARY KEY NONCLUSTERED,

    RandomData1 VARCHAR(50),

    RandomData2 VARCHAR(50),

    ID2 UNIQUEIDENTIFIER

    )

    WITH (MEMORY_OPTIMIZED=ON);

    GO

    清单 13-1

    创建测试数据库和内存优化表

    ```


    现在我们有了一个可用于测试的内存优化表，让我们使用以下查询查看 `sys.dm_os_wait_stats` 和 `sys.dm_os_waiting_tasks`
    DMV 中的 `WAIT_XTP_HOST_WAIT` 等待类型：


    ```sql

    SELECT *

    FROM sys.dm_os_waiting_tasks

    WHERE wait_type = ''WAIT_XTP_HOST_WAIT'';

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''WAIT_XTP_HOST_WAIT'';

    ```


    在我的测试 SQL Server 实例上执行此查询的结果可以在图 13-4 中看到。


    ![../images/340881_2_En_13_Chapter/340881_2_En_13_Fig4_HTML.jpg](img/340881_2_En_13_Fig4_HTML.jpg)


    图 13-4


    WAIT_XTP_HOST_WAIT 等待


    您会注意到的第一件事是，`WAIT_XTP_HOST_WAIT` 等待类型持续出现在 `sys.dm_os_waiting_tasks` DMV 中，并且随着时间的推移等待时间增加。此外，与
    `WAIT_XTP_HOST_WAIT` 等待类型相关的 `session_id` 表明它是记录等待的内部 SQL Server 线程。根据这些信息，我们已经可以对
    `WAIT_XTP_HOST_WAIT` 等待类型得出一些结论：它与一个持续运行的内部后台进程相关。同样有趣的是，如果您第二次运行该查询，`sys.dm_os_waiting_tasks`
    DMV 中的等待时间会增加，但 `sys.dm_os_wait_stats` 中的等待时间保持不变。到目前为止，我们遇到过另一种共享此特征的等待类型，即 `CHECKPOINT_QUEUE`
    等待类型，我们在第 12 章“后台和杂项等待类型”中讨论过。


    由于 `CHECKPOINT_QUEUE` 等待类型具有有趣的行为，即仅在发生自动检查点时才将 `sys.dm_os_waiting_tasks` DMV
    中累积的等待时间写入 `sys.dm_os_wait_stats` DMV，我决定使用清单 13-1 创建的 `OLTP_Test` 数据库简单地运行一个检查点命令，然后再次查询这两个
    DMV。对 `WAIT_XTP_HOST_WAIT` 等待类型等待时间的影响可以在图 13-5 中看到。'
- fmt: '![../images/340881_2_En_13_Chapter/340881_2_En_13_Fig5_HTML.jpg](images/340881_2_En_13_Chapter/340881_2_En_13_Fig5_HTML.jpg)

    **图 13-5** 检查点后的 `WAIT_XTP_HOST_WAIT` 等待信息


    如图 **13-5** 所示，`sys.dm_os_waiting_tasks` DMV 中的等待时间再次变得非常小，但 `sys.dm_os_wait_stats`
    DMV 中的等待时间却大幅增加。基于这种行为，我认为 `WAIT_XTP_HOST_WAIT` 等待类型与内存优化表相关的离线检查点进程有关。


    为了验证我的猜测，我需要更深入地研究在对内存优化表执行检查点时，SQL Server 内部发生了什么。为此，我创建了一个扩展事件会话，用于捕获每当 SQL
    Server 遇到 `WAIT_XTP_HOST_WAIT` 等待时的调用堆栈。我不会在此详述创建此扩展事件会话的具体方法，但 Paul Randal 写了一篇精彩的博客文章，介绍了如何在特定等待发生时捕获调用堆栈，你可以参考它来收集一些调用堆栈。你可以在这里找到
    Paul 的博客文章：[`www.sqlskills.com/blogs/paul/determine-causes-particular-wait-type/`](http://www.sqlskills.com/blogs/paul/determine-causes-particular-wait-type/)。


    我捕获 `WAIT_XTP_HOST_WAIT` 等待发生时调用堆栈的扩展事件会话结果如下：

    ```

    sqldk.dll!XeSosPkg::wait_info::Publish+0x138

    sqldk.dll!SOS_Scheduler::UpdateWaitTimeStats+0x2bc

    sqldk.dll!SOS_Task::PostWait+0x9e

    sqlmin.dll!EventInternal::Wait+0x1fb

    sqlmin.dll!HkHostWait::Wait+0xce

    hkengine.dll!CkptFilePair::CreateInstance+0x61b

    sqlmin.dll!HkHostReportFailure::KillProcess+0x372

    sqldk.dll!SOS_Task::Param::Execute+0x21e

    sqldk.dll!SOS_Scheduler::RunTask+0xa8

    sqldk.dll!SOS_Scheduler::ProcessTasks+0x279

    sqldk.dll!SchedulerManager::WorkerEntryPoint+0x24c

    sqldk.dll!SystemThread::RunWorker+0x8f

    sqldk.dll!SystemThreadDispatcher::ProcessWorker+0x3ab

    sqldk.dll!SchedulerManager::ThreadEntryPoint+0x226

    kernel32.dll!BaseThreadInitThunk+0xd

    ntdll.dll!RtlUserThreadStart+0x21

    ```


    我发现的第一部分非常有趣，它包含了一个新的 .dll 文件 `hkengine.dll`。由于内存 OLTP 的代号是 Hekaton，我猜测这个 .dll
    文件包含了新的内存 OLTP 函数，因此让我们仔细看看那个特定的调用：

    ```

    hkengine.dll!CkptFilePair::CreateInstance+0x61b

    ```

    看到函数名，我猜它与检查点文件对相关，而 `CreateInstance` 部分表明在我执行 `CHECKPOINT` 命令时创建了一个新的 CFP。我们可以通过访问清单
    **13-1** 中创建的内存文件的位置来验证这一点。向内存文件组添加文件的一个有趣之处在于，它实际上会创建一个目录，在此目录中有一个具有唯一 ID 字符串的文件夹。如果你进一步深入目录树，最终会到达一个包含编号文件的文件夹。图
    **13-6** 展示了在我的测试机器上该文件夹内容的一部分。

    ![../images/340881_2_En_13_Chapter/340881_2_En_13_Fig6_HTML.jpg](images/340881_2_En_13_Chapter/340881_2_En_13_Fig6_HTML.jpg)

    **图 13-6.** 内存文件组文件


    事实上，你在这里看到的文件是与我们之前创建的内存优化表相关联的数据文件和增量文件。1 MB 的文件是增量文件，16 MB 的文件是数据文件。


    由于我猜测检查点会创建另一个 CFP，我在执行 `CHECKPOINT` 之前检查了文件夹中的文件数量，为 28 个文件。然后我执行了 `CHECKPOINT`
    命令，并再次查看了文件数量，结果发现检查点之后现在有 30 个文件。


    ### WAIT_XTP_HOST_WAIT 总结


    我认为 `WAIT_XTP_HOST_WAIT` 等待类型与新检查点文件对的创建有明确的关系。显然，手动运行 `CHECKPOINT` 语句会为内存优化表生成一个新的
    CFP。因为 `WAIT_XTP_HOST_WAIT` 等待类型会在后台持续生成等待时间，并将其写入 `sys.dm_os_wait_stats` DMV（当新的
    CFP 被创建时——无论是通过手动检查点、当现有 CFP 已满、还是当 `Merge` 操作发生时），我相信 `WAIT_XTP_HOST_WAIT` 等待类型并不直接表示性能问题。它主要表示已向内存文件组添加了一个新的
    CFP。然而，这并不意味着这是唯一产生 `WAIT_XTP_HOST_WAIT` 等待的过程。也可能存在其他同样会导致此等待的过程，但到目前为止，它们只发生在需要添加新
    CFP 的时候。


    ## WAIT_XTP_CKPT_CLOSE


    `WAIT_XTP_CKPT_CLOSE` 等待类型是 SQL Server 2014 中引入的另一个新等待类型。顾名思义，它似乎与内存 OLTP 功能引入的新离线检查点进程有关。'
