- fmt: '# 13. In-Memory OLTP–Related Wait Types


    # WAITFOR


    The final wait type in this chapter is one of the few wait types that are directly
    related to a T-SQL command. The `WAITFOR` wait type doesn’t indicate performance
    problems, though it definitely has an impact on the duration of the query that
    is executing the related `WAITFOR` T-SQL command.


    ## What Is the WAITFOR Wait Type?


    The `WAITFOR` wait type will get recorded whenever a query is being executed that
    uses the `WAITFOR` command. The `WAITFOR` T-SQL command will stop the execution
    of the query until a specific amount of time has passed or a specific point in
    time has been reached. When that happens, the query execution will continue. The
    `WAITFOR` command is frequently used inside queries or scripts to force a pause
    inside the query execution. For instance, in Chapter 4, “Building a Solid Baseline,”
    we used the `WAITFOR` command to wait a specific amount of time so we could compare
    two measurements taken 15 minutes apart.


    While pausing the query execution using the `WAITFOR` command, the transaction
    holding the `WAITFOR` command will remain open until the entire transaction has
    completed. This means that threads are being held by the transaction that cannot
    be used for other processes. SQL Server also reserves a dedicated thread just
    for the `WAITFOR` command; if too many threads are associated with `WAITFOR` commands
    and thread starvation occurs, SQL Server will select random `WAITFOR` threads
    and terminate them to free up more threads.


    In many cases the `WAITFOR` command is explicitly used by the person who wrote
    the query or script, and in that sense only impacts that specific query or script;
    thus, there is no reason to be alarmed when seeing high `WAITFOR` wait times occur.
    It just indicates that queries are using the `WAITFOR` command.


    ## WAITFOR Example


    To show you a quick example of the WAITFOR wait type, you can execute the query
    in Listing 12-4. The query will reset the `sys.dm_os_wait_stats` DMV, execute
    a `WAITFOR DELAY` statement that causes the script execution to wait for 30 seconds,
    and then query the `sys.dm_os_wait_stats` DMV for `WAITFOR` waits.


    ```

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    WAITFOR DELAY ''00:00:30'';

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''WAITFOR'';

    ```

    **Listing 12-4**

    WAITFOR waits


    When the query in Listing 12-4 finishes, you should see that one WAITFOR wait
    occurred, having a total wait time of roughly 30 seconds, as you can see in Figure
    12-18.


    ![../images/340881_2_En_12_Chapter/340881_2_En_12_Fig18_HTML.jpg](images/340881_2_En_12_Chapter/340881_2_En_12_Fig18_HTML.jpg)

    **Figure 12-18**

    WAITFOR wait


    ## WAITFOR Summary


    The `WAITFOR` wait type is one of the few wait types that are directly related
    to the execution of a T-SQL command, in this case `WAITFOR`. The `WAITFOR` wait
    type doesn’t indicate any performance problems with your SQL Server instance,
    it just indicates the `WAITFOR` command is being used by a query or script. The
    `WAITFOR` T-SQL command will only impact the execution time of the query or script
    that uses it; therefore, the only way to lower `WAITFOR` wait times is by removing
    the `WAITFOR` command inside queries.


    # 13. In-Memory OLTP–Related Wait Types


    With the release of SQL Server 2014, Microsoft introduced a brand new SQL Server
    feature called In-Memory OLTP (or codename Hekaton). In-Memory OLTP is a memory-optimized
    database engine that is directly integrated into the SQL Server 2014 SQL Server
    engine. In-Memory OLTP is an enterprise-only feature designed to improve performance—up
    to 20 times, according to Microsoft—by placing tables entirely into the memory
    of your SQL Server instance. These memory-optimized tables are fully durable and
    use lock-and-latch free structures to optimize concurrency control.


    With the introduction of In-Memory OLTP, various new wait types have been added
    to SQL Server 2014. Most of these are recognizable by the `_XTP_` (or eXtreme
    Transaction Processing) section in the wait type name. In this chapter we will
    take a look at some of these new, In-Memory OLTP–related wait types available
    in SQL Server 2014 or higher.


    Before we dive into the wait types though, let’s first take a (simplified and
    short) look at what In-Memory OLTP is and how it works. I will focus on memory-optimized
    tables in this chapter. In-Memory OLTP also introduced other features, like natively
    compiled stored procedures and hash indexes, but these are beyond the scope of
    this chapter.


    After clicking the File ➤ Export ➤ Script Trace Definition ➤ For SQL Server 2005 –
    SQL2017 option, we will be asked to save a `.sql` file. The entire trace definition
    will be scripted inside this `.sql` file. We can open this file in SQL Server
    Management Studio, modify the file location and some other options inside the
    script, and execute it. This will return the ID of the trace we just created and
    save the trace information to a file we specified at the top of the script. Figure
    12-16 shows a part of the exported trace definition on our test SQL Server instance.


    ![../images/340881_2_En_12_Chapter/340881_2_En_12_Fig16_HTML.jpg](images/340881_2_En_12_Chapter/340881_2_En_12_Fig16_HTML.jpg)

    **Figure 12-16**

    Trace definition


    After executing the script to create a server-side trace, we received a trace
    ID of 2. The trace ID is very important because it is the only way to either start
    or stop the server-side trace. After creation, the server-side trace is automatically
    started. If we query the `sys.traces` catalog view, we can see the server-side
    trace that was just created, as shown in Figure 12-17.


    ![../images/340881_2_En_12_Chapter/340881_2_En_12_Fig17_HTML.jpg](images/340881_2_En_12_Chapter/340881_2_En_12_Fig17_HTML.jpg)

    **Figure 12-17**

    sys.traces


    The only way to interact with the server-side trace we created is to execute the
    `sp_trace_setstatus` stored procedure and supply the trace ID and a status ID.
    For instance, executing the query that follows will stop the server-side trace
    with a trace ID of 2:


    ```

    EXEC sp_trace_setstatus 2, 0

    ```


    To start it again we can execute this command:


    ```

    EXEC sp_trace_setstatus 2, 1

    ```


    And finally, to close the trace entirely we can execute the following command:


    ```

    EXEC sp_trace_setstatus 2, 3

    ```


    This does not delete the server-side trace though. As a matter of fact, server-side
    traces are only removed by a restart of the SQL Server service.


    Because a server-side trace can only capture to a trace file, you can navigate
    to the file you supplied in the server-side trace definition and open the file
    in SQL Server Profiler. Thus, you can capture the same information as by using
    the SQL Server Profiler application but at a much lower performance price.


    ## TRACEWRITE Summary


    The `TRACEWRITE` wait type indicates a SQL Server Profiler trace is currently
    being performed against the SQL Server instance. SQL Server Profiler traces can
    have a pretty big impact on the performance of your SQL Server instance, and for
    this reason it is important to monitor the number of traces running against your
    SQL Server instance. Thankfully, there are some alternatives to SQL Server Profiler
    traces. You can either choose to convert your SQL Server Profiler trace to an
    Extended Events session or execute the SQL Server Profiler trace using server-side
    tracing.'
