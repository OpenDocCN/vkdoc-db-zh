- fmt: '# SQL Server 等待类型参考


    ## Index


    ## A


    `ASYNC_IO_COMPLETION`：与 AdventureWorks 数据库备份操作、磁盘 sec/write 性能计数器、即时文件初始化、执行卷维护任务、SQL
    Server 安装、存储子系统、`sys.dm_os_waiting_tasks` 查询的可视化表示相关。


    `ASYNC_NETWORK_IO`：与 AdventureWorks 数据库、意义的图形表示、修改查询、任务管理器网络利用率相关。


    ## B


    后台进程。


    `BACKUPBUFFER`：与附加备份信息、备份/还原操作、数据库备份定义、生成过程、降低等待、`MAXTRANSFERSIZE` 选项、进程读取器和写入器、`BACKUPIO`
    的结果相关。


    `ASYNC_IO_COMPLETION`：定义、内部机制、降低等待、修改备份、`sys.dm_os_wait_stats` DMV 查询。


    `BACKUPTHREAD`：与 AdventureWorks 数据库、降低等待、还原操作、`sys.dm_os_waiting_tasks` DMV、线程相关。


    基准：操作调整与测量。


    `CXPACKET`：数据库定义、过程中的陷阱、实时方法类型、统计可视化、等待统计分析、分析流程图、比较图、数据库增量捕获方法、磁盘读取延迟测量、`PAGEIOLATCH_SH`、性能分析流程图、重置捕获方法、SQL
    Server 代理/计划测量、`sys.dm_os_waiting_tasks`、`sys.dm_os_wait_stats`、表创建。


    `WaitStats`：缓冲区锁存器。


    ## C


    检查点文件对（CFPs）：数据与增量文件、内存优化表的数据文件、合并操作、传统表、事务时间戳。


    `CHECKPOINT_QUEUE`：自动检查点操作、检查点过程、`sys.dm_os_waiting_tasks` 和 `sys.dm_os_wait_stats`
    查询结果。


    `CMEMTHREAD`：`EXECUTE (EXEC)` 命令、内存对象、小型转储、互斥对象、过程缓存、过程缓存查询结果、共享资源。


    公共语言运行时（CLR）。


    协作调度。


    `CXCONSUMER`：等待类型。


    `CXPACKET`：并行配置、SQL Server 2016 SP2 和 2017 CU3、等待类型、数据库配置差异、并行配置、并行查询、并行线程分布、`SELECT`
    操作属性、偏斜工作负载、线程。


    ## D, E, F, G


    `DBMIRROR_SEND`：AdventureWorks 数据库、异步模式、数据库镜像监视器、数据修改操作、降低等待的描述、`Mirror_Test`
    表创建插入、主体服务器、同步镜像、`sys.dm_os_wait_stats`、事务日志流。


    增量捕获方法。


    `DIRTY_PAGE_POLL`。


    动态管理视图（DMVs）：*与* 检测当前等待、阻塞信息查询结果、场景、`sys.dm_exec_sessions`、`sys.dm_os_waiting_tasks`、等待统计流程图、性能监视器（等待统计）、查询存储、`sys.dm_exec_requests`、`sys.dm_exec_session_wait_stats`、`sys.dm_os_waiting_tasks`、`sys.dm_os_wait_stats`。


    ## H


    `HADR_LOGCAPTURE_WAIT` 和 `HADR_WORK_QUEUE`。


    `HADR_SYNC_COMMIT`：添加列、AdventureWorks 数据库、AlwaysOn 可用性组、`AO_Test` 表创建、仪表板、降低等待、性能计数器、主副本和辅助副本模式、同步复制模式、HA/DR
    测试机器。


    ## I, J, K


    内存中 OLTP：CFPs 差异、隔离、内存优化表、事务日志更改。


    `IO_COMPLETION`：AdventureWorks 数据库、备份事务日志、数据库相关操作、降低等待、`NORECOVERY`、`sys.dm_os_wait_stats`
    DMV、事务日志备份。


    I/O 锁存器。


    ## L


    锁存器：兼容性矩阵、`LATCH_[xx]` 模式、`PAGEIOLATCH_SH`、`PAGEIOLATCH_[xx]`、页锁存争用、`PAGELATCH_[xx]`（*参见*
    `PAGELATCH_[xx]`）、SQL Server 同步对象、`sys.dm_os_wait_stats` DMV、事务、等待。


    `LATCH_[xx]`：`ACCESS_METHODS_HOBT_VIRTUAL_ROOT` 方法、B 树索引结构导航、累积视图、数据结构、`INDEXPROPERTY`
    函数、降低等待、内存区域、非缓冲区相关锁存类、非聚集索引、`Ostress` 命令、`resource_description` 列、根页拆分、SQL Server
    实例、`sys.dm_db_index_physical_stats`、测试争用表、`TRUNCATE` 命令。


    `LAZYWRITER_SLEEP`。


    `LCK_M_I[xx]`：`COMMIT` 命令、意向锁、降低等待、`SELECT` 语句、`sys.dm_os_waiting_tasks` DMV。


    `LCK_M_SCH_S` 和 `LCK_M_SCH_M`：降低等待、`ROLLBACK` 命令、架构锁、Sch-M 和 Sch-S 锁、`SELECT`
    查询、`sys.dm_os_waiting_tasks`、`sys.dm_tran_locks` DMV、事务。


    `LCK_M_S` 等待类型：`COMMIT`/`ROLLBACK` 命令、降低等待、修改事务资源、`SELECT` 查询、共享锁、`sys.dm_os_waiting_tasks`
    DMV。


    `LCK_M_U`：AdventureWorks 数据库、并发数据修改、排他锁、锁转换、降低等待、`Ostress` 实用工具、事务、更新锁模式、更新（U）模式。


    `LCK_M_X`：`COMMIT` 命令、排他锁、`HumanResources.Employee` 表、降低等待、`SELECT` 语句、`sys.dm_os_waiting_tasks`
    DMV、`sys.dm_tran_locks` DMV。


    锁定与阻塞：模式特征、`LCK_M_I[xx]`、`LCK_M_S`（*参见* `LCK_M_S` 等待类型）、`LCK_M_SCH_S` 和 `LCK_M_SCH_M`、`LCK_M_U`、`LCK_M_X`
    模式与兼容性、并发锁情况、层次结构、隔离级别、级别与锁定行为、锁兼容性括号、查询信息、已提交读、`resource_description` 列、`sp_WhoIsActive`、`sql_text`
    输出、`sys.dm_os_waiting_tasks` DMV、`sys.dm_tran_locks`、事务。


    `LOGBUFFER` 和 `WRITELOG`：降低等待、`sys.dm_os_wait_stats`、事务、`trans_demo` 数据库。


    ## M


    `MSQL_XP`：死锁检测、执行扩展存储过程、降低等待、`sys.dm_os_wait_stats` 查询结果。


    ## N


    非缓冲区锁存器。


    非抢占式调度。


    ## O


    对象链接与嵌入数据库（OLEDB）：`DBCC` 命令、`Ostress` 命令。


    ## P


    `PAGEIOLATCH_[xx]`：AdventureWorks 数据库、缓冲区缓存、磁盘操作、数据页移动、诊断工具、I/O 性能脚本、降低等待、修改、内存页、监控、存储、`SELECT`
    查询、SQL Server 实例、存储子系统、`sys.dm_os_wait_stats`、等待时间信息。


    页锁存争用。


    `PAGELATCH_[xx]`：优势、AdventureWorks 数据库、B 树、聚集索引与映射争用、数据库设计类、`DBCC IND` 结果、图形表示、哈希分区、锁存争用影响、内存中页、`Insert_Test3`
    表、最后一页插入争用、降低等待、最后一页插入争用、非分区和分区索引、`Ostress` 命令、分区函数、内存中页查询、过滤行分布、TempDB 数据库。


    `PREEMPTIVE_OS_AUTHENTICATIONOPS`：身份验证请求、降低等待、混合模式身份验证、查询窗口输出结果、SQL Server 管理、Windows
    登录身份验证。


    `PREEMPTIVE_OS_ENCRYPTMESSAGE` 和 `PREEMPTIVE_OS_DECRYPTMESSAGE`：证书账户选择、连接属性、加密连接、解密功能视图、降低等待、输出结果、自签名证书、SQL
    Server 实例。


    `PREEMPTIVE_OS_GETPROCADDRESS`：入口点存储过程、降低等待、主数据库选择、`xp_getnetname` 输出结果。


    `PREEMPTIVE_OS_WRITEFILEGATHER`：数据库文件配置、文件初始化、存储子系统、`WriteFileGather` 函数。


    抢占式调度模型：图形表示、PAL 层交互、SQL Server/Linux 类型（*参见* `PREEMPTIVE_OS_ENCRYPTMESSAGE` 和
    `PREEMPTIVE_OS_DECRYPTMESSAGE`）、`WriteFileGather` Windows 函数。


    ## Q


    查询存储：架构、*与* DMVs 对比、类别修改、输出查询、`runtime_stats_interval_id`、统计收集间隔、`sys.query_store_wait_stats`、功能、飞行记录器、等待统计、内置报告、类别、指标-等待时间、进程、类型和类别。


    ## R


    `REDO_THREAD_PENDING_WORK`。


    重置捕获方法。


    `RESOURCE_SEMAPHORE`：附加内存、AdventureWorks 数据库、降低等待、`MemoryGrantInfo`、`RequiredMemory`
    属性、所需内存、资源信号量队列、`resource_semaphore.sql`、`SELECT` 运算符、`SerialRequiredMemory`、`sys.dm_exec_query_resource_semaphore`、`sys.dm_os_waiting_tasks`
    DMV、工作区内存（KB）计数器。


    `RESOURCE_SEMAPHORE_QUERY_COMPILE`：编译内存资源、`CompileMemory` 属性、争用、`DBCC MEMORYSTATUS`
    命令、执行计划属性、降低等待、资源信号量、`sys.dm_os_waiting_tasks` DMV。'
