- fmt: '### Lowering THREADPOOL Waits Caused by User Connections


    Another common cause of `THREADPOOL` waits is a sudden increase in the number
    of users connecting and executing queries against your SQL Server instance. This
    problem can occur if, for instance, the application that is connecting to your
    SQL Server instance uses multiple connections. The main problem here is that those
    connections stay active and keep acquiring worker threads.


    To give you an example of this problem we will again use `Ostress` to connect
    and execute queries against my test SQL Server instance. In this case we will
    use a different `.sql` file, saved as `wait.sql`, as input for `Ostress`, with
    the following query inside it:


    ```

    WAITFOR DELAY ''00:05:00''

    ```


    The only thing this query will do is wait for 5 minutes. After those 5 minutes,
    the query will end and the connection will disconnect.


    Let’s run `Ostress` using the `wait.sql` file:


    ```

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -E -dAdventureWorks
    -i"C:\wait.sql" -n120 -r1 -q

    ```


    We change the number of threads generated by `Ostress` to 120 and again leave
    the `Max Worker Threads` option set to 128 worker threads.


    When we query the `sys.dm_exec_sessions` DMV using the following query, we see
    that many new user sessions, generated by the `Ostress` utility, are active, as
    shown in Figure [5-28](#340881_2_En_5_Chapter.xhtml#Fig28).


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig28_HTML.jpg](images/340881_2_En_5_Chapter/340881_2_En_5_Fig28_HTML.jpg)


    Figure 5-28


    `Ostress` user sessions


    ```

    SELECT *

    FROM sys.dm_exec_sessions

    WHERE is_user_process = 1;

    ```


    If we query the `sys.dm_os_waiting_tasks` DMV, we see that `THREADPOOL` waits
    are occurring, as shown in Figure [5-29](#340881_2_En_5_Chapter.xhtml#Fig29).


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig29_HTML.jpg](images/340881_2_En_5_Chapter/340881_2_En_5_Fig29_HTML.jpg)


    Figure 5-29


    `THREADPOOL` waits inside the `sys.dm_os_waiting_tasks` DMV


    The big difference between `THREADPOOL` waits caused by excessive parallelism
    and an increase in user connections is that the CPU of my test SQL Server instance
    remains low in the latter case, as shown in Figure [5-30](#340881_2_En_5_Chapter.xhtml#Fig30).


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig30_HTML.jpg](images/340881_2_En_5_Chapter/340881_2_En_5_Fig30_HTML.jpg)


    Figure 5-30


    CPU usage


    The small spike in the CPU usage history graph is caused by starting up the `Ostress`
    utility. After that, the CPUs remain at a constant low usage percentage.


    Resolving `THREADPOOL` waits caused by an increase in user connections should
    start at the source. Where do the user connections come from? What are those connections
    performing? I have seen cases where an application suddenly used hundreds of active
    user connections after an update, and as the SQL Server instance was not designed
    to handle that amount of concurrent, active, connections, `THREADPOOL` waits appeared.


    Keep in mind that the user connections should only cause `THREADPOOL` waits when
    they are actually running queries. User connections that are connected to the
    SQL Server instance but are not executing anything should not be a reason for
    `THREADPOOL` waits.


    Also, having many different user connections active against a database can create
    many locks on rows or tables. If you notice high lock-related wait times together
    with `THREADPOOL` waits, the problem could be the high amount of locking and blocking
    occurring. In this case you should try to find the queries that are causing the
    lock waits and see if you can optimize them. We will discuss lock-related wait
    types, and what you can do about them, in Chapter [7](#340881_2_En_7_Chapter.xhtml),
    “Lock-Related Wait Types.”


    ### THREADPOOL Summary


    `THREADPOOL` waits are one of the most alarming wait types to see on your SQL
    Server instance. They occur because there are not enough free worker threads available
    to process requests, so tasks that request a worker thread will have to wait until
    a new worker thread becomes available. Thankfully, `THREADPOOL` waits are not
    very common, as they have the potential to completely lock you out of your SQL
    Server instance. The only way to connect in those cases is by using the `Dedicated
    Administrator Connection` (or `DAC`), which I urge you to enable on all your SQL
    Server instances.


    Excessive use of parallelism and a large increase in active user connections are
    two of the most common causes for `THREADPOOL` waits. The former has a direct
    relation to the `CXPACKET` wait type we discussed earlier, so methods to resolve
    the `CXPACKET` wait type can also help to resolve `THREADPOOL` waits. The latter
    requires a deeper investigation into why the number of active user connections
    suddenly increased. Maybe they are the result of a bug in the application connection
    to the SQL Server instance. We also briefly touched on locking and blocking behavior
    as a possible cause for `THREADPOOL` waits. We will take a deeper look at how
    we can resolve lock-related waits in Chapter [7](#340881_2_En_7_Chapter.xhtml),
    “Lock-Related Wait Types.”


    # 6. IO-Related Wait Types


    In this chapter we will take a look at IO-related wait types in the broadest sense
    of the term. I selected wait types that are related to the storage, memory, or
    network components of your system. One could argue that the majority of wait types
    will fit this category, and that is probably right, but to prevent this chapter
    from covering 90% of all the wait types in this book, I had to choose carefully.
    I consider the wait types in this chapter to have a direct relation to storage,
    memory, or network but to not relate directly to a functionality or concept in
    SQL Server. For instance, the `PAGEIOLATCH_xx` wait types are frequently related
    to storage, but they are not included in this chapter. The reason for this is
    because they are also a latch wait type, and I believe latch wait types deserve
    a separate chapter because of their function in SQL Server.


    The performance of the IO-related components is incredibly important for SQL Server.
    Practically every part of SQL Server interacts with these components in one way
    or another, whether it is a data page that needs to be read from disk into memory
    or the results from a query that need to be transported across the network to
    your end users. If one of these components can’t handle the workload you are generating
    on your SQL Server instance, or isn’t configured properly, your performance will
    decline.


    The wait types in this chapter can help you track down which of your IO components
    is slowing you down so you can take appropriate action to prevent or resolve performance-related
    incidents.


    ## ASYNC_IO_COMPLETION


    The `ASYNC_IO_COMPLETION` wait type is a pretty common wait type that occurs every
    time SQL Server performs a file-related action on the storage subsystem and has
    to wait for it to complete. You will frequently see this wait type when you are
    performing actions that interact with the storage subsystem, like a backup. Just
    like with most wait types, if you are seeing this wait type occur, it doesn’t
    necessarily mean there is a problem with your storage subsystem. It will only
    become a problem if the wait time is longer than you expect it to be compared
    to your baseline values, which we discussed in Chapter [4](#340881_2_En_4_Chapter.xhtml),
    “Building a Solid Baseline.”'
