  trans: '# 12. 背景与其他等待类型


    SQL Server 内部存在许多可能陷入特定等待类型等待的不同进程，到目前为止我们已经讨论了其中不少。其中一些内部进程在 SQL Server 中持续运行，等待着有工作需要处理。当这些通常被称为
    `后台进程` 的进程在等待工作到达时，SQL Server 会将它们等待工作的时间记录为与这些后台进程相关的特定等待类型的等待时间。虽然这些后台等待类型与性能问题没有直接关系，但它们通常拥有最高的等待时间，并且在你按等待时间排序查询顶级等待类型时，会出现在列表的顶部。


    这些后台等待类型常被称为 `良性` 的，可以安全地忽略，因为它们仅仅表明一个内部进程正在等待工作到来。这个逻辑同样适用于本章将要讨论的等待类型。不过，我不仅想告诉你们在分析等待统计信息时可以忽略它们，还想提供一些关于它们的背景信息，以便你们了解它们度量的是什么，以及为什么可以安全地忽略它们。请记住，我们这里讨论的是
    SQL Server，这意味着是否能完全忽略这些后台等待类型“取决于”许多因素。你不会是第一个遇到性能问题，最后却发现问题根源竟是一个被忽略的后台进程的人。所以我的建议是：忽略它们，但不要忘记它们！


    除了后台等待类型，我还加入了一些难以归类到前面章节的其他等待类型，因为它们不太符合那些章节的等待类型类别。


    由于本章中的后台等待类型在其关联进程等待工作时会持续记录等待时间，因此我没有为这些等待类型包含示例章节或降低等待时间章节。


    ## CHECKPOINT_QUEUE


    本章的第一个等待类型是那种会随时间累积大量等待时间的后台等待类型之一：`CHECKPOINT_QUEUE`。在许多情况下，`CHECKPOINT_QUEUE`
    等待类型可以安全地忽略，但了解它代表什么以及为何有如此高的等待时间并无坏处。


    ### CHECKPOINT_QUEUE 等待类型是什么？


    `CHECKPOINT_QUEUE` 等待类型与 SQL Server 中的检查点进程相关，该进程负责将“脏”（已修改的）数据页从缓冲区缓存写入磁盘上的数据文件。在第
    6 章“与 I/O 相关的等待类型”中，我们在讨论 `SLEEP_BPOOL_FLUSH` 等待类型时已经详细探讨了检查点进程，因此这里不再重复所有信息。需要了解的重要一点，也是此等待类型通常可以被忽略的原因是：`CHECKPOINT_QUEUE`
    等待类型表明检查点进程正在等待工作。这意味着 `CHECKPOINT_QUEUE` 等待类型的等待时间并不表示任何性能问题；它们仅表示检查点进程花在等待工作上的时间。在
    SQL Server 实例负载不重，或者没有太多数据修改操作的情况下，其等待时间可能达到非常高的值。


    在 `sys.dm_os_wait_stats` 和 `sys.dm_os_waiting_tasks` 这两个 DMV 中记录 `CHECKPOINT_QUEUE`
    等待时间是通过一个特定的内部例程进行的，该例程可能会返回意外的等待时间（例如基线内的突然峰值）。图 12-1 展示了在我的测试 SQL Server 实例上查询
    `sys.dm_os_wait_stats` 和 `sys.dm_os_waiting_tasks` DMV 以获取 `CHECKPOINT_QUEUE`
    等待类型等待信息的结果。


    `../images/340881_2_En_12_Chapter/340881_2_En_12_Fig1_HTML.jpg`


    图 12-1：CHECKPOINT_QUEUE 等待


    这里值得注意的是，`sys.dm_os_wait_stats` DMV 中的累积等待时间保持为 0，而 `sys.dm_os_waiting_tasks`
    DMV 中的等待时间则非常高。我的测试 SQL Server 实例在后台没有执行太多工作，因此检查点进程大部分时间都在等待工作是合乎逻辑的。两个 DMV 之间等待时间的差异与
    SQL Server 执行检查点操作的方式有关。这两个 DMV 中显示的等待时间仅由自动检查点进程记录。手动检查点的执行不会影响等待时间。作为自动检查点进程的一部分，`sys.dm_os_waiting_tasks`
    DMV 中的等待时间会被转移到 `sys.dm_os_wait_stats` DMV 并重置为 0。因此，如果你在 `sys.dm_os_waiting_tasks`
    中注意到非常高的 `CHECKPOINT_QUEUE` 等待时间，这意味着自动检查点进程已经有一段时间没有运行了。


    为了向你们简单演示这个行为，我创建了一张表，重置了 `sys.dm_os_wait_stats` DMV，向表中插入了几行数据，执行了一次手动检查点，然后查询了
    `sys.dm_os_wait_stats` 和 `sys.dm_os_waiting_tasks` DMV，如清单 12-1 所示。


    ```sql

    -- 在 AdventureWorks 数据库中创建表

    USE [AdventureWorks]

    GO

    CREATE TABLE check_test

    (

    ID UNIQUEIDENTIFIER,

    RandomData VARCHAR(50)

    );

    GO

    -- 清除 sys.dm_os_wait_stats

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    -- 向表中插入几行数据

    INSERT INTO check_test

    (

    ID,

    RandomData

    )

    VALUES

    (

    NEWID(),

    CONVERT(varchar(50), NEWID())

    );

    GO 100

    CHECKPOINT 1;

    -- 查询等待统计信息

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''CHECKPOINT_QUEUE'';

    SELECT *

    FROM sys.dm_os_waiting_tasks

    WHERE wait_type = ''CHECKPOINT_QUEUE'';

    ```


    清单 12-1：CHECKPOINT_QUEUE 示例


    图 12-2 显示了针对 `sys.dm_os_wait_stats` 和 `sys.dm_os_waiting_tasks` DMV 查询的结果。


    `../images/340881_2_En_12_Chapter/340881_2_En_12_Fig2_HTML.jpg`


    图 12-2：CHECKPOINT_QUEUE 等待


    如你所见，手动检查点并没有在 `sys.dm_os_wait_stats` DMV 中生成任何等待。同时，自动检查点也没有发生，因为插入 100 行产生的日志记录太少，不足以触发自动检查点。


    如果我们插入更多行，应该能够触发自动检查点。在这种情况下，我运行了以下查询，向我们在清单 12-1 中创建的表插入 100,000 行。在插入运行时，我反复查询了
    `sys.dm_os_wait_stats` 和 `sys.dm_os_waiting_tasks` DMV，以查看是否有任何变化。如下所示：


    ```sql

    INSERT INTO check_test

    (

    ID,

    RandomData

    )

    VALUES

    (

    NEWID(),

    CONVERT(varchar(50), NEWID())

    );

    GO 100000

    ```


    几秒钟后，我注意到 `CHECKPOINT_QUEUE` 等待类型的等待时间被转移到了 `sys.dm_os_wait_stats` DMV 中，如图 12-3
    所示。


    `../images/340881_2_En_12_Chapter/340881_2_En_12_Fig3_HTML.jpg`


    图 12-3：CHECKPOINT_QUEUE 等待


    显然，我们插入了足够的日志记录导致自动检查点发生。从这个例子可以看出，只有自动检查点才会将 `CHECKPOINT_QUEUE` 的等待时间写入 `sys.dm_os_wait_stats`
    DMV。


    当你注意到 `sys.dm_os_wait_stats` DMV 中突然出现非常高的等待时间值时，你应该记住这个行为。这通常只发生在 SQL Server
    实例工作负载非常小，或者工作负载主要由读取操作而非数据修改操作组成的情况下。'
- fmt: '### CHECKPOINT_QUEUE Summary


    `CHECKPOINT_QUEUE` 等待类型与 SQL Server 内部的检查点操作相关。当 SQL Server 正在等待自动检查点操作发生时，会记录
    `CHECKPOINT_QUEUE` 等待类型的等待时间。这通常是你可以安全忽略的一种等待类型，因为它并不表示存在任何性能问题。`CHECKPOINT_QUEUE`
    等待类型的等待时间在 `sys.dm_os_wait_stats` 和 `sys.dm_os_waiting_tasks` 这两个 DMV 中的记录方式不同，这可能导致在查询
    `sys.dm_os_wait_stats` DMV 时出现突然的高等待时间。当你在 `sys.dm_os_wait_stats` DMV 中注意到较高的
    `CHECKPOINT_QUEUE` 等待时间时，请记住这一行为。


    ### DIRTY_PAGE_POLL


    `DIRTY_PAGE_POLL` 等待类型是在 SQL Server 2012 中随间接检查点功能引入的，其行为与我们之前讨论的 `CHECKPOINT_QUEUE`
    等待类型非常相似。自动检查点进程以1分钟的固定间隔运行，而间接检查点功能允许你基于每个数据库配置特定的检查点间隔。即使你未使用间接检查点，`DIRTY_PAGE_POLL`
    等待类型仍会累积等待时间。


    ### 什么是 DIRTY_PAGE_POLL 等待类型？


    `DIRTY_PAGE_POLL` 等待类型是另一个通常可以安全忽略的后台等待。该等待类型与用于间接检查点功能的恢复写入器进程相关，该进程在 SQL Server
    实例的后台持续运行。由于这种关联，让我们快速了解一下什么是间接检查点以及它们如何工作。


    我们知道，SQL Server 内部的检查点进程负责将缓冲区缓存中修改过的数据页写入磁盘上的数据库数据文件。默认情况下，检查点进程每分钟自动运行一次，或者在生成了足够多的日志记录时运行。当发生崩溃时，检查点进程在
    SQL Server 数据库的恢复持续时间中扮演着至关重要的角色。以以下场景为例：当你在 SQL Server 实例中对数据库执行大量修改操作时，发生崩溃。幸运的是，你能够简单地重启
    SQL Server 服务以使一切恢复运行。SQL Server 首先要做的是启动恢复过程。恢复过程将检查事务日志，查找崩溃发生时未提交的任何事务，并执行回滚。恢复过程还将检查已提交事务修改的数据页是否因为仅在缓冲区缓存中被修改而未写入数据库数据文件。


    如果发现任何这样的页面，SQL Server 将使用事务日志重做这些事务。现在想象你有一个繁忙的 SQL Server 实例，每分钟执行成千上万的修改操作。这意味着有大量脏页尚未写入磁盘的可能性相当高。如果你的
    SQL Server 随后崩溃（或者，例如发生故障转移），恢复过程将需要更多时间来完成。间接检查点可以帮助我们尽可能缩短这个恢复过程。通过配置此功能，我们可以告诉
    SQL Server 更快地将修改过的数据页写入磁盘；例如，每10秒一次。图 [12-4](#340881_2_En_12_Chapter.xhtml#Fig4)
    展示了数据库属性中间接检查点功能的位置和名称。


    ![../images/340881_2_En_12_Chapter/340881_2_En_12_Fig4_HTML.jpg](images/340881_2_En_12_Chapter/340881_2_En_12_Fig4_HTML.jpg)


    图 12-4

    间接检查点功能的位置和值


    默认情况下，**Target Recovery Time (Seconds)** 配置选项的值为 0。这意味着未使用间接检查点。如果你将该值修改为 0 以外的任何值，则会以你指定的秒数间隔发生间接检查点。


    从 SQL Server 2016 开始，当你在 SQL Server 实例中创建新数据库时，会自动配置间接检查点。在这些情况下，**Target Recovery
    Time (Seconds)** 将被设置为 60 而不是 0。


    然而，你在 **Target Recovery Time (Seconds)** 选项中配置的时间并不意味着每 *x* 秒就会执行一次检查点进程。通过设置此值，SQL
    Server 将计算在需要将脏页写入数据库数据文件之前可以存在多少脏页，以确保恢复过程永远不会超过指定的时间。例如，如果你将 **Target Recovery
    Time (Seconds)** 选项配置为 15 秒，SQL Server 将以这样的间隔将脏页写入数据库数据文件：当 SQL Server 实例发生故障时，它可以在
    15 秒内恢复。


    为了监控缓冲区缓存中有多少脏页，以便 SQL Server 知道何时达到脏页阈值，引入了恢复写入器。即使你未配置 **Target Recovery Time
    (Seconds)** 选项，`DIRTY_PAGE_POLL` 等待仍会发生，因为恢复写入器进程仍会轮询缓冲区缓存内的脏页数量，尽管不会针对该数字采取任何操作。如你在图
    [12-5](#340881_2_En_12_Chapter.xhtml#Fig5) 中所见，即使不使用间接检查点，等待时间也很容易达到很高的值。


    ![../images/340881_2_En_12_Chapter/340881_2_En_12_Fig5_HTML.jpg](images/340881_2_En_12_Chapter/340881_2_En_12_Fig5_HTML.jpg)


    图 12-5

    DIRTY_PAGE_POLL 等待


    ```

    -- Query Wait Statistics

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''DIRTY_PAGE_POLL'';

    ```


    间接检查点也存在相关风险。将 **Target Recovery Time (Seconds)** 选项配置为非常低的值可能导致存储子系统负载增加，因为脏页会被持续写入磁盘。在将此设置配置到生产
    SQL Server 实例之前，请务必对其进行广泛测试。


    ### DIRTY_PAGE_POLL Summary


    `DIRTY_PAGE_POLL` 等待类型是在 SQL Server 2012 中随间接检查点功能引入的（该功能最终成为 SQL Server 2016
    或更高版本中新建数据库的默认设置）。即使你不使用间接检查点，由于新的恢复写入器进程，`DIRTY_PAGE_POLL` 等待类型仍会累积等待时间。通常，`DIRTY_PAGE_POLL`
    等待类型并不表示性能问题，因此在分析 SQL Server 实例上的等待统计信息时，可以安全地忽略它。


    ### LAZYWRITER_SLEEP


    `LAZYWRITER_SLEEP` 等待类型，不出所料，与 SQL Server 内部的 lazywriter 进程相关。lazywriter 进程与我们本章前面讨论的检查点进程有一些相似之处，因为它也将脏页从缓冲区缓存写入数据库数据文件。然而，相似之处仅此而已，因为
    lazywriter 进程将这些页面写入数据库数据文件的原因与检查点进程完全不同。'
  raw: '### CHECKPOINT_QUEUE Summary


    The `CHECKPOINT_QUEUE` wait type is related to checkpoint operations inside SQL
    Server. Wait time on the `CHECKPOINT_QUEUE` wait type is recorded while SQL Server
    is waiting for an automatic checkpoint operation to take place. This is one of
    the wait types you can normally safely ignore because it doesn’t indicate there
    are any performance issues. The wait times on the `CHECKPOINT_QUEUE` wait type
    are recorded differently between the `sys.dm_os_wait_stats` and `sys.dm_os_waiting_tasks`
    DMV, and this can cause sudden high wait times when querying the `sys.dm_os_wait_stats`
    DMV. Keep this behavior in mind when noticing high `CHECKPOINT_QUEUE` wait times
    inside the `sys.dm_os_wait_stats` DMV.


    ## DIRTY_PAGE_POLL


    The `DIRTY_PAGE_POLL` wait type was introduced in SQL Server 2012 with the indirect
    checkpoint feature and behaves a lot like the previous wait type we discussed,
    `CHECKPOINT_QUEUE`. While the automatic checkpoint process runs at a set interval
    of 1 minute, the indirect checkpoint feature allows you to configure a specific
    checkpoint interval on a per-database basis. Even if you are not using indirect
    checkpoint, the `DIRTY_PAGE_POLL` wait type will still accumulate wait time.


    ### What Is the DIRTY_PAGE_POLL Wait Type?


    The `DIRTY_PAGE_POLL` wait type is another background wait that can normally be
    safely ignored. The wait type is related to the recovery writer process that is
    used by the indirect checkpoint feature that runs continuously in the background
    of your SQL Server instance. Because of this connection, let’s take a quick look
    what indirect checkpoints are and how they work.


    As we know, the checkpoint process inside SQL Server is responsible for writing
    modified data pages from the buffer cache to the database data file on disk. By
    default, the checkpoint process runs automatically every minute, or when enough
    log records have been generated. The checkpoint process plays a vital part in
    the recovery duration of your SQL Server databases when a crash occurs. Take,
    for instance, the following scenario: while you are performing many modifications
    to a database in your SQL Server instance, a crash occurs. Luckily, you were able
    to simply restart the SQL Server service to get everything up and running again.
    The first thing SQL Server will do is start a recovery process. The recovery process
    will check the transaction log for any transactions that were not committed when
    the crash occurred and perform a rollback of the transaction. The recovery process
    will also check whether any data pages that were modified by a committed transaction
    received their modification inside the database data file because they were only
    modified in the buffer cache.


    If any of those pages are found, SQL Server will use the transaction log to redo
    these transactions. Now imagine you have a busy SQL Server instance where many
    thousands of modifications are performed every minute. This means that the chance
    that there is a high number of dirty pages not written to disk yet is pretty high.
    If your SQL Server then crashes (or, for instance, a failover occurs), the recovery
    process will take more time to complete. Indirect checkpoints can help us keep
    this recovery process as short as possible. By configuring this feature we can
    tell SQL Server to write modified data pages to disk faster; for instance, every
    10 seconds. Figure [12-4](#340881_2_En_12_Chapter.xhtml#Fig4) shows the location
    and name of the indirect checkpoint feature inside the properties of a database.


    ![../images/340881_2_En_12_Chapter/340881_2_En_12_Fig4_HTML.jpg](images/340881_2_En_12_Chapter/340881_2_En_12_Fig4_HTML.jpg)


    Figure 12-4


    Indirect checkpoint feature location and value


    By default, the value of the **Target Recovery Time (Seconds)** configuration
    option is 0\. This means that indirect checkpoints are not being used. If you
    modify the value to anything other than 0, an indirect checkpoint will occur at
    the interval in seconds you specified.


    Starting from SQL Server 2016, indirect checkpoints are automatically configured
    whenever you create a new database inside the SQL Server instance. In those cases
    the **Target Recovery Time (Seconds)** will be set to a value of 60 instead of
    0.


    The time you configure in the **Target Recovery Time (Seconds)** option does not
    mean that every *x* seconds the checkpoint process will be executed, however.
    By setting this value SQL Server will calculate how many dirty pages can exist
    before they need to be written to the database data file so that the recovery
    process never takes longer than the time specified. So, for instance, if you configure
    the **Target Recovery Time (Seconds)** option to 15 seconds, SQL Server will write
    dirty pages to the database data file at such an interval that when the SQL Server
    instance fails it can be recovered within 15 seconds.


    To monitor how many dirty pages are inside the buffer cache so SQL Server knows
    when the dirty-page threshold has been reached, the recovery writer was introduced.
    Even if you do not configure the **Target Recovery Time (Seconds)** option, `DIRTY_PAGE_POLL`
    waits will still occur because the recovery writer process will still poll the
    number of dirty pages inside the buffer cache, even though no action is taken
    upon that number. As you can see in Figure [12-5](#340881_2_En_12_Chapter.xhtml#Fig5),
    the wait times can reach high values easily even when not using indirect checkpoints.


    ![../images/340881_2_En_12_Chapter/340881_2_En_12_Fig5_HTML.jpg](images/340881_2_En_12_Chapter/340881_2_En_12_Fig5_HTML.jpg)


    Figure 12-5


    DIRTY_PAGE_POLL waits


    ```

    -- Query Wait Statistics

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''DIRTY_PAGE_POLL'';

    ```


    Indirect checkpoints also have a risk associated with them. Configuring the **Target
    Recovery Time (Seconds)** option to a very low value can lead to extra load on
    the storage subsystem because dirty pages are continuously written to disk. Be
    sure to test the setting extensively before configuring it on your production
    SQL Server instances.


    ### DIRTY_PAGE_POLL Summary


    The `DIRTY_PAGE_POLL` wait type was introduced in SQL Server 2012 with the introduction
    of the indirect checkpoints feature (which ended up being the default setting
    for new databases created in SQL Server 2016 or higher). Even if you do not use
    indirect checkpoints, the `DIRTY_PAGE_POLL` wait type will still accumulate wait
    time because of the new recovery writer process. Normally the `DIRTY_PAGE_POLL`
    wait type does not indicate a performance problem, and as such it can safely be
    ignored when analyzing wait statistics on your SQL Server instance.


    ## LAZYWRITER_SLEEP


    The `LAZYWRITER_SLEEP` wait type is, surprise, related to the SQL Server internal
    lazywriter process. The lazywriter process shares some similarities with the checkpoint
    process we discussed earlier in this chapter, in that it also writes dirty pages
    from the buffer cache to the database data file. The similarities end here, though,
    because the reason why the lazywriter process writes these pages to the database
    data file is completely different than the checkpoint process.'
