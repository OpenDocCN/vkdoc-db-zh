    available space for heaps and binary large objects (BLOBs). Contention on latches
    of this class can occur when multiple connections try to insert rows into a heap
    or BLOB at the same time. You can reduce this contention by partitioning the object.
    Each partition has its own latch. Partitioning will distribute the inserts across
    multiple latches. | |

