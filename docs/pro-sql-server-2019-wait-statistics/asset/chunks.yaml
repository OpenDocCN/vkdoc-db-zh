    高度可配置，会根据其运行的硬件进行调整，因此对于高端或低端系统都具有完美的可扩展性。


    图 1-4 展示了 SQL Server 2005 的（简化）架构，包括 SQLOS 层。


    ![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig4_HTML.jpg](img/340881_2_En_1_Fig4_HTML.jpg)


