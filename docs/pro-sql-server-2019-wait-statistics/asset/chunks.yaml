    `DIRTY_PAGE_POLL` 等待类型是在 SQL Server 2012 中随间接检查点功能引入的（该功能最终成为 SQL Server 2016
    或更高版本中新建数据库的默认设置）。即使你不使用间接检查点，由于新的恢复写入器进程，`DIRTY_PAGE_POLL` 等待类型仍会累积等待时间。通常，`DIRTY_PAGE_POLL`
    等待类型并不表示性能问题，因此在分析 SQL Server 实例上的等待统计信息时，可以安全地忽略它。


    ### LAZYWRITER_SLEEP


    `LAZYWRITER_SLEEP` 等待类型，不出所料，与 SQL Server 内部的 lazywriter 进程相关。lazywriter 进程与我们本章前面讨论的检查点进程有一些相似之处，因为它也将脏页从缓冲区缓存写入数据库数据文件。然而，相似之处仅此而已，因为
    lazywriter 进程将这些页面写入数据库数据文件的原因与检查点进程完全不同。'
- fmt: '### What Is the LAZYWRITER_SLEEP Wait Type?


    Just like with other wait types we have discussed so far in this chapter, the
    `LAZYWRITER_SLEEP` wait type occurs when an internal SQL Server process, in this
    case the lazywriter process, is waiting for work. The lazywriter process is a
    background process that will become active at a certain time interval. When it
    becomes active it will scan the size of the buffer cache and determine if there
    are enough free pages inside the buffer cache. It is important that there are
    always a certain number of free pages inside the buffer cache so that new page
    requests can fit directly without first having to swap out other pages. If the
    lazywriter process determines there are enough free pages in the buffer cache,
    it will go back to sleep again and record the `LAZYWRITER_SLEEP` wait type while
    it is sleeping. However, if there are not enough free pages inside the buffer
    cache, the lazywriter process will detect, between checkpoints, which dirty pages
    in the buffer cache haven’t been accessed for a while, write them to the database
    data file, and remove them from the buffer cache. So, if there are more than enough
    free pages inside the buffer cache, the lazywriter process doesn’t have much work
    to do. If your SQL Server instance is under memory pressure, the lazywriter process
    will be far busier while swapping out dirty pages and freeing up room inside the
    buffer cache. Figure [12-6](#340881_2_En_12_Chapter.xhtml#Fig6) shows the relationship
    of the checkpoint and lazywriter processes with a flowchart.


    ![../images/340881_2_En_12_Chapter/340881_2_En_12_Fig6_HTML.jpg](images/340881_2_En_12_Chapter/340881_2_En_12_Fig6_HTML.jpg)


    Figure 12-6

    Checkpoint and lazywriter processes


    Because the `LAZYWRITER_SLEEP` wait type indicates the time the lazywriter process
    spends sleeping, or waiting for work, it is another one of those wait types you
    can safely ignore. There is a catch however—if the lazywriter process is constantly
    working to move dirty pages from the buffer cache to the database data file, it
    can indicate your SQL Server instance is experiencing memory pressure. This is
    bad for performance because every page has to be moved to the buffer cache before
    it can get read or modified. This behavior can potentially result in lower-than-normal
    wait times on the `LAZYWRITER_SLEEP` wait type.


    ### LAZYWRITER_SLEEP Summary


    The `LAZYWRITER_SLEEP` wait type is related to the lazywriter internal SQL Server
    process. The lazywriter process starts at a fixed time interval and is responsible
    for writing dirty data pages to the database data file if there are not enough
    free pages available inside the buffer cache. The `LAZYWRITER_SLEEP` wait type
    indicates that the lazywriter process is currently not running, or is sleeping,
    until it is signaled to wake up and check the buffer cache. Because the `LAZYWRITER_SLEEP`
    wait type only shows us how much time the lazywriter process spends being inactive,
    it can in most cases be ignored.


    ## MSQL_XP


    In the last section of Chapter [11](#340881_2_En_11_Chapter.xhtml), “Preemptive
    Wait Types,” we discussed the `PREEMPTIVE_GETPROCADDRESS` wait type. We learned
    that the `PREEMPTIVE_GETPROCADDRESS` wait type records wait time when the entrypoint
    of an extended stored procedure is loaded. One important thing I noted was that
    the `PREEMPTIVE_GETPROCADDRESS` wait type does not record the execution time of
    the extended stored procedure, only the entrypoint loading. The execution time
    of an extended stored procedure is actually tracked by another wait type, `MSQL_XP`.


    ### What Is the MSQL_XP Wait Type?


    The `MSQL_XP` wait type records the execution time of extended stored procedures
    on your SQL Server instance. The `MSQL_XP` wait type is also used to detect deadlock
    situations when using Multiple Active Result Sets (MARS). MARS is a feature that
    allows the execution of multiple (concurrent) batches through a single SQL Server
    connection. We won’t go further into detail about MARS, but you can find some
    more information about it here: [`https://msdn.microsoft.com/en-us/library/ms131686.aspx`](https://msdn.microsoft.com/en-us/library/ms131686.aspx).


    The most common reason for seeing higher-than-normal wait times on the `MSQL_XP`
    wait type is the execution of extended stored procedures. This does not necessarily
    mean there is a problem as long as the execution time of the extended stored procedures
    stays the same. However, if an extended stored procedure takes more time than
    expected, you are sure to notice it in the increase of the `MSQL_XP` wait time
    when comparing the wait time against a baseline.


    ### MSQL_XP Example


    To demonstrate that MSQL_XP waits occur when extended stored procedures are being
    executed, I created a simple example using the script in Listing [12-2](#340881_2_En_12_Chapter.xhtml#PC4).
    The script will reset the `sys.dm_os_wait_stats` DMV, execute an extended stored
    procedure (in this case the `xp_dirtree` extended stored procedure inside the
    `master` database), and query the `sys.dm_os_wait_stats` for MSQL_XP wait information.


    ```

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    EXEC master..xp_dirtree ''c:\windows'';

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''MSQL_XP'';

    ```

    Listing 12-2

    MSQL_XP example


    The results of the query in Listing [12-2](#340881_2_En_12_Chapter.xhtml#PC4)
    on my test SQL Server instance can be seen in Figure [12-7](#340881_2_En_12_Chapter.xhtml#Fig7).
    The top window shows the `xp_dirtree` results, the bottom window the results of
    the query against the `sys.dm_os_waits_stats` DMV.


    ![../images/340881_2_En_12_Chapter/340881_2_En_12_Fig7_HTML.jpg](images/340881_2_En_12_Chapter/340881_2_En_12_Fig7_HTML.jpg)


    Figure 12-7

    MSQL_XP wait


    The information in the `sys.dm_os_wait_stats` DMV shows us that one wait occurred
    on the `MSQL_XP` wait type with a wait time of 21,224 milliseconds. This is almost
    identical to the time it took to execute the query in Listing [12-2](#340881_2_En_12_Chapter.xhtml#PC4),
    which was 21 seconds on my test SQL Server instance.


    ### Lowering MSQL_XP Waits


    When noticing higher-than-normal wait times for the `MSQL_XP` wait type, chances
    are that extended stored procedures are being used and are taking longer than
    normal to complete. Your first point of action should be to identify which extended
    stored procedures are being used and what they are being used for. Because extended
    stored procedures can also perform tasks outside SQL Server, they can run into
    other Windows processes that can slow them down. Knowing what the extended stored
    procedure function is, and what it does, can help you quickly identify where it
    is running into issues.


    If you are using MARS, you are probably running into MARS-connection deadlocks.
    There have been various SQL Server updates that reduce the chances of MARS deadlocks
    occurring, so make sure your SQL Server instance is patched. Also make sure to
    check the application code that executes queries using MARS for potential issues.


    ### MSQL_XP Summary


    The `MSQL_XP` wait type does two different things: it detects the time it takes
    to execute extended stored procedures and serves as deadlock detection for MARS
    connections. Seeing higher-than-normal wait times on the `MSQL_XP` wait type frequently
    indicates an extended stored procedure is taking longer than normal to complete.
    Try to detect which extended stored procedure is being executed and what its function
    is, as this will make troubleshooting the extended stored procedure easier.


    ## OLEDB


    The `OLEDB` wait type occurs whenever SQL Server has to access the Object Linking
    and Embedding Database (OLEDB) Client Provider. There are various reasons why
    SQL Server will use the OLEDB Client Provider, and whenever it does SQL Server
    will record wait time on the OLEDB wait type.'
