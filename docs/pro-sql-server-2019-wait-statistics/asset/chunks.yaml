  trans: '### PAGELATCH_[xx] 示例


    在本章引言中，我们探讨了当许多并发查询正在临时查询中加载数据时，可能在 `TempDB` 数据库内部发生的页闩锁争用。这并不是 SQL Server 中可能发生的唯一一种闩锁争用形式。另一种形式被称为“最后一页插入争用”。就像我们之前讨论的页闩锁争用场景一样，最后一页插入争用也可以通过注意到大量的
    `PAGELATCH` 等待来识别。让我们通过一个最后一页插入争用的例子来详细说明。


    #### 理解最后一页插入争用


    还记得你在数据库设计课上学到的每个表都应该有一个聚集索引吗？并且聚集索引键列的最佳候选者是一个狭窄的、唯一的、不断增长的值，比如一个整数？所有这些仍然正确，并且绝对有助于优化对这些表的查询性能。然而，在某些非常特定的情况下，使用这种做法可能会导致一个称为“最后一页插入争用”的性能问题。


    最后一页插入争用可能发生在那些对具有相对较小行的表执行非常繁重的插入工作负载的数据库上；例如，一个包含 `ID` 列（`Integer` 数据类型，自动增长）和
    `Name` 列（`Varchar` 数据类型）的表。从最佳实践的角度来看，我们会在 `ID` 列上创建聚集索引，因为它完美符合良好索引键的描述。它是狭窄的，每一行都是唯一的，并且总是在增长。但由于自动增长的递增特性，每个新添加的行都将添加到聚集索引的末尾，从而为聚集索引的最后一个数据页创建一个热点。图
    9-9 以所谓的 B 树结构形式展示了行插入聚集索引内部数据页的行为，B 树结构是 SQL Server 用于排序索引的数据结构。


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig9_HTML.jpg](img/340881_2_En_9_Fig9_HTML.jpg)


    图 9-9：聚集索引最后一页上的最后一页插入争用


    即使当前数据页已满并添加了新数据页，插入的目标也会更改为新页面，从而将热点切换到新的数据页。


    关于这种行为，我经常听到一个问题：“为什么锁不能阻止这个？”答案其实很简单：因为默认情况下，我们将使用排他的行级锁来插入新行，而不是锁定整个页，并且一个页上可以同时存在多个并发的排他行锁。然而，对内存中页的访问仍然需要串行进行，因此使用闩锁来确保在任何时候只有一个线程访问该页。图
    9-10 展示了带有锁的聚集索引叶级数据页的放大视图。


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig10_HTML.jpg](img/340881_2_En_9_Fig10_HTML.jpg)


    图 9-10：带有锁的聚集索引叶页


    #### 演示争用


    为了向您展示一个最后一页插入争用的例子，我将使用以下查询在我的测试 SQL Server 实例的 `AdventureWorks` 数据库中创建一个新表：


    ```sql

    CREATE TABLE Insert_Test

    (

    ID INT IDENTITY (1,1) PRIMARY KEY,

    RandomData VARCHAR(50)

    );

    ```


    如您所见，这是一个非常小的表，包含一个 `ID` 列，该列会为插入的每一新行自动增长，以及一个 `RandomData` 列，用于存储一些数据。我将 `ID`
    列指定为该表的主键，这将自动使用 `ID` 列作为索引键创建一个聚集索引。


    下一步是使用高度并发的工作负载运行 `Ostress`，向 `Insert_Test` 表插入新行。这次我没有为 `Ostress` 创建 `.sql` 输入文件，而是在
    `Ostress` 命令行中输入以下查询：


    ```sql

    INSERT INTO Insert_Test

    (RandomData)

    VALUES

    (

    CONVERT(varchar(50), NEWID())

    )

    ```


    这将生成以下 `Ostress` 命令行，该命令行将连接到 `AdventureWorks` 数据库，并使用 500 个并发连接执行我们提供的查询，每个连接执行该查询
    100 次。这应该能产生足够的并发插入来演示最后一页插入争用：


    ```bash

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -E -dAdventureWorks
    -Q"INSERT INTO Insert_Test (RandomData) VALUES (CONVERT(varchar(50), NEWID()))"
    -n500 -r100 -q

    ```


    当 `Ostress` 运行时，我查询 `sys.dm_os_waiting_tasks` DMV：


    ```sql

    SELECT

    session_id,

    wait_duration_ms,

    wait_type,

    resource_description

    FROM sys.dm_os_waiting_tasks;

    ```


    此查询过滤掉了一些列，以便结果的截图可以放在一页上。图 9-11 显示了部分结果。


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig11_HTML.jpg](img/340881_2_En_9_Fig11_HTML.jpg)


    图 9-11：在同一页上出现的 `PAGELATCH_EX` 等待


    正如预期的那样，插入工作负载导致聚集索引内的一个页面（本例中是页 ID 为 `29313` 的页面）出现热点。图 9-11 中显示的所有任务（大约还有 300
    个未显示）都在等待在该页面上放置一个排他页闩锁（由 `PAGELATCH_EX` 等待类型指示），以便执行它们的插入操作。


    #### 验证热点页


    为了证明页 `29313` 是一个数据页，我将使用未公开的 `DBCC IND` 命令来显示与 `Insert_Test` 表关联的页面。`DBCC IND`
    将为作为参数提供给它的表所关联的每个页面返回一行，并且除其他信息外，还会显示每个返回页面的页面类型。


    运行以下命令将对 `AdventureWorks` 数据库的 `Insert_Test` 表执行 `DBCC IND` 命令。在实际运行 `DBCC IND`
    命令之前，我们必须启用 Traceflag 3604，以便 `DBCC IND` 命令的结果能返回到 SQL Server Management Studio
    的结果选项卡中：


    ```sql

    DBCC TRACEON (3604);

    GO

    DBCC IND (AdventureWorks, Insert_Test, 1);

    GO

    ```


    图 9-12 显示了 `DBCC IND` 命令的结果。高亮显示的是页 `29313`，即在 `Ostress` 工作负载期间成为插入热点的页面。


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig12_HTML.jpg](img/340881_2_En_9_Fig12_HTML.jpg)


    图 9-12：`DBCC IND` 结果


    我们感兴趣的信息位于 `IndexID` 和 `PageType` 列中。`IndexID` 列返回此页面所关联的索引 ID。我们在 `Insert_Test`
    表上只有一个索引，其 `ID` 为 1。`PageType` 列返回特定页面的页面类型。在本例中，页 `29313` 的 `PageType` 是 1，这表明该页是数据页。


    请记住，`DBCC IND` 是一个未公开的 SQL Server 命令，我在此包含它是为了向您展示有关发生最后一页插入争用的页面的信息。我强烈建议不要在生产服务器上使用它。'
- fmt: '## Lowering PAGELATCH_[xx] Waits


    So far I have showed you two examples where `PAGELATCH_[xx]` waits can occur,
    page-latch contention on the PFS page of the `TempDB` database and last-page insert
    contention. There is another latch-contention problem that can occur when inserting
    rows into a small table with an index. This case of latch contention can also
    be identified by `PAGELATCH_[xx]` waits occurring, but it also has a connection
    with the `LATCH_[xx]` wait type. For this reason I am saving the explanation and
    example of this specific case of latch contention for the next section of this
    chapter where we will discuss the `LATCH_[xx]` wait type.


    Lowering `PAGELATCH_[xx]` waits can be challenging. Frequently, they are related
    to the design of your database or your workload, and these can prove difficult
    to change in production environments. There are, however, a number of factors
    that can contribute to latch contention that are worth taking the time to check.


    It is more common to see latch contention occurring on systems that have a large
    number of logical processors (16+) and high concurrent OLTP workloads. However,
    having fewer logical processors does not mean latch contention cannot occur. The
    examples of latch contention I have shown you so far in this chapter have all
    been generated on a virtual machine with only two logical processors. I had to
    create a high enough concurrent workload to reach latch contention. Having more
    logical processors means there are more threads available to perform work, which
    also results in more concurrent latches being placed, increasing the chances of
    latch contention. Adding logical processors when experiencing latch contention
    can, in this specific case, cause even more latch contention to occur instead
    of resolving it. Lowering the number of logical processors isn’t an option either,
    because this will slow down all your other workloads.


    The best way to resolve latch contention is by identifying where the contention
    is occurring and what type of contention you are dealing with.


    If you are dealing with PFS page contention, a good first step would be to check
    if you are using one or multiple database data files. If you are using one database
    data file, the first step would be to add additional, equally sized data files
    and measure if this lowers the amount of `PAGELATCH_[xx]` waits occurring. If
    you already have multiple database data files you could try adding more, but be
    careful not to add too many, because having this can introduce other performance
    problems. Your goal should be to find a database data file “sweet spot” where
    you have enough database data files to minimize the impact of latch contention,
    but not so many as to cause the overhead to become too high. This depends entirely
    on your workload, so it is impossible for me to give you a generalized recommendation.


    When dealing with last-page insert contention you could consider changing the
    index key to something else instead of a sequentially increasing value, like a
    GUID. Using a GUID as an index key will result in a larger index because of the
    byte requirements of a GUID. Also, because GUIDs are entirely random, keeping
    the index in order requires more work than when dealing with an ever-increasing,
    sequential value. It can also have consequences for your applications or queries
    that possibly would need to be rewritten to accommodate the change in data type.


    Other factors to consider that can impact latch contention are indexing strategies,
    page fullness, and the number of concurrent connections to the database. Also,
    identifying and optimizing the access patterns to the data inside the database
    can help immensely. For instance, if you know your workload consists of many very
    small inserts against a single table, it might be worth taking the time to see
    if you can combine some of the small inserts into a larger batch, effectively
    lowering the number of latches needed.


    One final option for resolving latch contention is using a method called hash
    partitioning. Hash partitioning splits up your table or index into various partitions
    based on a value that is generated by using a computed column. Partitioning is
    only available in Enterprise Edition (unless you are running SQL Server 2016 SP1
    or higher, in that case table and index partitioning is also available in Standard
    Edition), but it is a method that can minimize, or completely prevent, latch contention.


    Hash partitioning works by cutting up tables or indexes into partitions, with
    each partition holding a set of the data. Partitioning is frequently used for
    archiving data from inside a table to another filegroup that resides on other
    (cheaper) storage, while the current data resides on fast storage. In the case
    of hash partitioning, we are going to calculate a value for every row inside the
    table using a computed column. Based on that value, we will move the row to a
    partition.


    The great advantage of using this method of partitioning indexes is that every
    partition has its own index tree. So even though the insert statements will still
    occur on the last (right-most) page of the index, it will be spread across the
    partitions. If we look at Figure 9-13, we see a case of last-page insert contention,
    where concurrent queries are trying to insert rows into an index as we discussed
    in the preceding example.


    ![Figure 9-13](images/340881_2_En_9_Chapter/340881_2_En_9_Fig13_HTML.png)


    Figure 9-13: Last-page insert contention on the right-most data page of an index


    If we were to use partitioning to cut the index into multiple parts (three in
    this case), we would get the situation shown in Figure 9-14, multiple B-trees,
    each spanning a part of the data.


    ![Figure 9-14](images/340881_2_En_9_Chapter/340881_2_En_9_Fig14_HTML.jpg)


    Figure 9-14: Last-page inserts spread across partitions


    Let’s take a look at the effects of hash partitioning when we run the workload
    to generate last-page insert contention, like we did in the example earlier in
    this chapter.


    The first thing we need to do is create a Partition function. This will map rows
    inside the table or index to partitions based on the value of a column. The following
    script will create a Partition function named `LatchPartFunc` that will divide
    rows into nine partitions based on the value of a column (which we will create
    a bit later). See the following:


    ```sql

    CREATE PARTITION FUNCTION [LatchPartFunc] (INT)

    AS RANGE LEFT FOR VALUES

    (0,1,2,3,4,5,6,7,8);

    ```


    The next step is to create a Partition scheme that will map the partitions to
    a filegroup:


    ```sql

    CREATE PARTITION SCHEME [LatchPartSchema]

    AS PARTITION [LatchPartFunc] ALL TO ([PRIMARY]);

    ```


    In this case I used the `PRIMARY` filegroup, but you are free to create an additional
    filegroup to hold the partitions.


    Next up is creating a new table called `Insert_Test3` using the query that follows.
    Notice the `ID_Hash` column. This is a computed column that will calculate a value
    between 0 and 8 based on the value of the `ID` column:


    ```sql

    CREATE TABLE Insert_Test3

    (

    ID INT IDENTITY(1,1),

    RandomData VARCHAR(50),

    ID_Hash AS (CONVERT(INT, abs(binary_checksum(ID) % (9)), (0))) PERSISTED

    );

    ```


    The last step is to create a clustered index and map it to the Partition scheme:


    ```sql

    CREATE UNIQUE CLUSTERED INDEX idx_ID

    ON Insert_Test3

    (

    ID ASC, ID_Hash

    )

    ON LatchPartSchema(ID_Hash);

    ```


    Now that we have our partitioned table in place, let’s repeat our `ostress` workload
    that caused last-page insert contention in our previous example. I changed the
    target table for the inserts to our new, partitioned `Insert_Test3` table.


    ```cmd

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -E -dAdventureWorks
    -Q"INSERT INTO Insert_Test3 (RandomData) VALUES (CONVERT(varchar(50), NEWID()))"
    -n500 -r100 -q

    ```'
