  trans: '

    有了等待统计的基准信息和`Perfmon`指标，Jim 认为问题与存储有关，并联系了存储管理员。Jim 收集的指标也对存储管理员有帮助，因为他可以将自己测量的存储相关指标与
    Jim 提供的进行对比。存储管理员确认问题与销售数据库所在的磁盘有关，并通过更换磁盘阵列中的一个故障磁盘解决了问题。磁盘更换后，磁盘延迟恢复到平均 6 毫秒，高延迟峰值消失。磁盘更换后，Jim
    再次从`WaitStats`表中查询等待时间，注意到`PAGEIOLATCH_SH`等待类型的等待时间再次接近基准值。用户也告知 Jim，报表运行再次恢复正常。


    在这个示例中，Jim 遵循了图 4-9 所示的等待统计性能分析流程图的所有步骤：


    1.  用户在运行报表时遇到性能下降。

    2.  Jim 查询`sys.dm_os_waiting_tasks` DMV，以查明是否存在高等待时间或频繁出现的等待类型。`PAGEIOLATCH_SH`等待类型似乎频繁出现。

    3.  Jim 通过捕获当天的`PAGEIOLATCH_SH`等待时间，并与基准进行比较，来收集指标。他还从`Perfmon`收集了额外的指标。

    4.  所有指标都向 Jim 表明，问题很可能与存储有关，Jim 于是联系了存储管理员。

    5.  存储管理员更换了阵列中的一个损坏磁盘。存储延迟值降至 6 毫秒。

    6.  Jim 再次检查`PAGEIOLATCH_SH`等待类型的等待时间，确认其已接近基准值。


    尽管这个示例看起来可能很简单，但它实际上基于我在现实世界中遇到的一个性能问题。通过结合使用来自等待统计性能分析流程图的步骤和基准指标，我能够非常快速地识别并解决问题。


    在我展示的示例中，你看到了清单 4-6 中的查询，它为`PAGEIOLATCH_SH`等待类型创建了一个基准线。这个查询只是你可以针对`WaitStats`表使用的示例。你可以修改它以满足自己的需求；例如，你可以选择不限制工作日的结果，只显示特定日期捕获的平均等待时间。或者你可以请求特定日期的实际等待时间。


    如果你要长时间捕获等待统计测量值，将结果拆分到多个表中可能是一个好主意，这样查询起来会更简单、更快速。例如，你可以使用以下查询将三月份完成的所有等待统计测量值插入到它们自己的表中：


    ```sql

    SELECT *

    INTO WaitStats_March

    FROM WaitStats

    WHERE ws_Month = 3;

    ```


    这也为我们提供了选项，可以通过将不同的表连接在一起来比较不同时间段内的特定等待时间。图 4-15 展示了我通常最终得到的基准数据库表，数据按月份排序。


    ![../images/340881_2_En_4_Chapter/340881_2_En_4_Fig15_HTML.jpg](img/340881_2_En_4_Fig15_HTML.jpg)


    图 4-15: 按月份拆分的等待统计测量值。


    你可以自行决定如何拆分测量值；也许你想为使用的每个应用程序版本将等待统计测量值存储在一个单独的表中，或者将特定等待类型的所有测量值存储在一个单独的表中。选择权在你手中。


    希望本章能让你对如何存储等待统计测量值并从这些测量值创建基准线有所启发。我尽量避免确切地告诉你要做什么以及如何做，因为我相信单一的方法并不适用于所有人。你需要编写和调整自己的查询来创建你感兴趣的基准线，但我希望本章为你展示了可以进一步构建的基础。


    ## 总结


    在本章中，我们从理论和实践两个角度仔细研究了基准线。基准线对于你执行的任何类型的性能分析都极其重要。对于等待统计，如果你想对与 SQL Server 相关的性能问题进行故障排除，基准线是经常需要的。由于等待统计对于你的系统是唯一的，比较等待时间的方法只有一种——基准线。


    我给你提供了一些示例和 T-SQL 脚本，来创建你自己的等待统计基准表，这样你现在就可以开始捕获等待统计信息。我们还通过一个示例，了解了如何查询该基准信息并将其与实际测量值进行比较，以对与性能相关的事件进行故障排除。


    # 第二部分：等待类型


    # 5. 与 CPU 相关的等待类型


    在过去的几十年里，处理器取得了巨大的发展，像英特尔或 AMD 这样的处理器制造商每年都能制造出更快的处理器。虽然处理器的速度已接近极限，但制造商能够在处理器中集成的核心数量却一直在增长。在撰写本书时，你可以购买一个内置
    24 核的单处理器来为你的系统提供动力。处理器也是系统中比较难以更换的部分之一。虽然你可以相对简单地扩展系统内存，但更换一个速度更快或核心更多的处理器，通常也需要更换系统主板，因为
    CPU 插槽不兼容。这意味着我们通常会一直使用现有的处理器，直到更换整个系统为止。


    处理器对于 SQL Server 也非常重要。更高的处理器速度将加速与处理器相关的指令，而更多的核心意味着 SQL Server 可以用来执行请求的更多调度器。但即使有了速度和核心数的所有这些升级，也无法避免我们有时仍需等待处理器资源。在本章中，我们将了解一些与系统处理器相关的等待类型。


    ## CXPACKET


    第一个与 CPU 相关的等待类型，也是 SQL Server 实例在默认、开箱即用的配置下运行时最常见的等待类型。它也是最被误解的等待类型之一，有时甚至不需要降低其等待时间来让你的查询运行得更快；事实上，降低`CXPACKET`等待时间有时反而会降低查询性能！如果你运行的是
    SQL Server 2016 SP2 或 SQL Server 2017，处理`CXPACKET`等待的方式有一些变化。我们将在本节末尾讨论这些变化的影响，包括新的与并行相关的等待类型`CXCONSUMER`。

    '
- fmt: '## What Is the `CXPACKET` Wait Type?


    The `CXPACKET` wait type occurs whenever a query is being executed in parallel
    instead of serial. Parallel queries can have a performance advantage compared
    to serial queries, if the work can be divided among multiple worker threads. The
    advantage is bigger for queries that are returning large result sets; queries
    that return only a few rows benefit far less from parallelism, and in many cases
    parallelism can slow down those queries. This doesn''t mean we should turn off
    parallelism immediately as I have yet to see a true OLTP database where every
    query only returns a handful of rows. Many systems have to deal with a mixed workload,
    usually dealing with many short queries but also large, longer-running, reporting
    queries.


    Parallel queries will use multiple worker threads to execute a request. Along
    with the worker threads that are created to perform the work requested, a parallel
    query will also use a 0 thread, called the control thread. This 0 thread''s task
    is to coordinate the work of the other worker threads. While the 0 thread is waiting
    for the other worker threads to finish the work they were assigned to perform,
    it will record wait times of the `CXPACKET` wait type. To understand this relation
    a little bit better, take a look at Figure 5-1.


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig1_HTML.jpg](images/340881_2_En_5_Chapter/340881_2_En_5_Fig1_HTML.jpg)


    Figure 5-1: Parallel query threading


    As soon as the SQL Server Query Optimizer decides on an execution plan that uses
    parallelism, you will see `CXPACKET` waits occur. This can be completely normal
    and is nothing to worry about if you are expecting your queries to run in parallel
    and they are performing as expected. In those cases you can ignore long wait times
    on the `CXPACKET` wait type. There are, however, cases where you don''t want to
    use parallelism, or when parallelism is negatively impacting the performance of
    your queries because of skewed workloads.


    ### Configuring Parallelism Settings


    Because the `CXPACKET` wait type is directly related to the parallelism settings
    of your SQL Server instance, we can influence it relatively easily by adjusting
    these settings. We can find the parallelism settings in the **Server Properties**
    ➤ **Advanced** ➤ **Parallelism** section of your SQL Server instance, as shown
    in Figure 5-2.


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig2_HTML.jpg](images/340881_2_En_5_Chapter/340881_2_En_5_Fig2_HTML.jpg)


    Figure 5-2: Parallelism configuration


    Of these settings, the `Cost Threshold for Parallelism` and `Max Degree of Parallelism`
    settings impact parallel queries the most.


    The `Cost Threshold for Parallelism` setting configures the cost threshold of
    when a query will be considered to be run in parallel by the Query Optimizer.
    If a serial query has a cost higher than the value configured in the `Cost Threshold
    of Parallelism`, the Query Optimizer might decide to generate a parallel plan
    instead of a serial one. By default, the setting has a value of 5 and can be configured
    to have a value between 0 and 32,767.


    The `Max Degree of Parallelism` setting configures the number of schedulers used
    when executing a parallel plan. By default, this setting is configured to be 0,
    which means all available schedulers can be used when a parallel plan is executed.


    ### Database-Scoped Configuration


    If you are running SQL Server 2016 or higher, you are also able to configure the
    parallelism settings on a database level through database scoped configuration
    items, as shown in Figure 5-3.


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig3_HTML.jpg](images/340881_2_En_5_Chapter/340881_2_En_5_Fig3_HTML.jpg)


    Figure 5-3: Database scoped parallelism configuration


    The introduction of the ability to configure setting like parallelism on a per-database
    level instead of the entire SQL Server instance is a very welcome change. Consider,
    for instance, that you have multiple databases inside the same SQL Server instance.
    Ideally each of those databases will use configuration settings that are perfected
    for their query workload. Before SQL Server 2016, we weren''t able to configure
    that on a per-database level, so generally you would stick with a form of a best-practice
    or generalized configuration values. Now that database scoped configuration is
    possible, it is very possible to configure the optimal setting for each individual
    database.


    With the ability to add database scoped configuration values for parallelism settings,
    there is a difference in how the SQL Server engine processes these configurations:


    *   The database scoped configuration setting will overwrite the current instance
    setting only if the database scoped setting is set to a non-default value.

    *   If the database scoped configuration setting is set to its default value,
    the instance-wide configuration setting will be used.


    As an example, if the `Max Degree of Parallelism` setting is configured to be
    4 on the instance level and 0 (default) on the database level, queries that can
    be executed in parallel can use four schedulers. If the database scoped setting
    is changed to be a value of 2, queries executed against the database can use a
    maximum of two schedulers overwriting the instance setting of 4.'
  raw: '### What Is the CXPACKET Wait Type?


    The `CXPACKET` wait type occurs whenever a query is being executed in parallel
    instead of serial. Parallel queries can have a performance advantage compared
    to serial queries, if the work can be divided among multiple worker threads. The
    advantage is bigger for queries that are returning large result sets; queries
    that return only a few rows benefit far less from parallelism, and in many cases
    parallelism can slow down those queries. This doesn’t mean we should turn off
    parallelism immediately as I have yet to see a true OLTP database where every
    query only returns a handful of rows. Many systems have to deal with a mixed workload,
    usually dealing with many short queries but also large, longer-running, reporting
    queries.


    Parallel queries will use multiple worker threads to execute a request. Along
    with the worker threads that are created to perform the work requested, a parallel
    query will also use a 0 thread, called the control thread. This 0 thread’s task
    is to coordinate the work of the other worker threads. While the 0 thread is waiting
    for the other worker threads to finish the work they were assigned to perform,
    it will record wait times of the `CXPACKET` wait type. To understand this relation
    a little bit better, take a look at Figure [5-1](#340881_2_En_5_Chapter.xhtml#Fig1).


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig1_HTML.jpg](images/340881_2_En_5_Chapter/340881_2_En_5_Fig1_HTML.jpg)


    Figure 5-1


    Parallel query threading


    As soon as the SQL Server Query Optimizer decides on an execution plan that uses
    parallelism, you will see `CXPACKET` waits occur. This can be completely normal
    and is nothing to worry about if you are expecting your queries to run in parallel
    and they are performing as expected. In those cases you can ignore long wait times
    on the `CXPACKET` wait type. There are, however, cases where you don’t want to
    use parallelism, or when parallelism is negatively impacting the performance of
    your queries because of skewed workloads.


    Because the `CXPACKET` wait type is directly related to the parallelism settings
    of your SQL Server instance, we can influence it relatively easily by adjusting
    these settings. We can find the parallelism settings in the **Server Properties**
    ➤ **Advanced** ➤ **Parallelism** section of your SQL Server instance, as shown
    in Figure [5-2](#340881_2_En_5_Chapter.xhtml#Fig2).


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig2_HTML.jpg](images/340881_2_En_5_Chapter/340881_2_En_5_Fig2_HTML.jpg)


    Figure 5-2


    Parallelism configuration


    Of these settings, the **Cost Threshold for Parallelism** and **Max Degree of
    Parallelism** settings impact parallel queries the most.


    The **Cost Threshold for Parallelism** setting configures the cost threshold of
    when a query will be considered to be run in parallel by the Query Optimizer.
    If a serial query has a cost higher than the value configured in the **Cost Threshold
    of Parallelism**, the Query Optimizer might decide to generate a parallel plan
    instead of a serial one. By default, the setting has a value of 5 and can be configured
    to have a value between 0 and 32,767.


    The **Max Degree of Parallelism** setting configures the number of schedulers
    used when executing a parallel plan. By default, this setting is configured to
    be 0, which means all available schedulers can be used when a parallel plan is
    executed.


    If you are running SQL Server 2016 or higher, you are also able to configure the
    parallelism settings on a database level through database scoped configuration
    items, as shown in Figure [5-3](#340881_2_En_5_Chapter.xhtml#Fig3).


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig3_HTML.jpg](images/340881_2_En_5_Chapter/340881_2_En_5_Fig3_HTML.jpg)


    Figure 5-3


    Database scoped parallelism configuration


    The introduction of the ability to configure setting like parallelism on a per-database
    level instead of the entire SQL Server instance is a very welcome change. Consider,
    for instance, that you have multiple databases inside the same SQL Server instance.
    Ideally each of those databases will use configuration settings that are perfected
    for their query workload. Before SQL Server 2016, we weren’t able to configure
    that on a per-database level, so generally you would stick with a form of a best-practice
    or generalized configuration values. Now that database scoped configuration is
    possible, it is very possible to configure the optimal setting for each individual
    database.


    With the ability to add database scoped configuration values for parallelism settings,
    there is a difference in how the SQL Server engine processes these configurations:


    *   The database scoped configuration setting will overwrite the current instance
    setting only if the database scoped setting is set to a non-default value;


    *   If the database scoped configuration setting is set to its default value,
    the instance-wide configuration setting will be used.


    As an example, if the Max Degree of Parallelism setting is configured to be 4
    on the instance level and 0 (default) on the database level, queries that can
    be executed in parallel can use four schedulers. If the database scoped setting
    is changed to be a value of 2, queries executed against the database can use a
    maximum of two schedulers overwriting the instance setting of 4.'
