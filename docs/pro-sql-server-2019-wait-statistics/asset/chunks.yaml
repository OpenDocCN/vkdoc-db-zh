    *   隔离性：隔离性特征要求每个事务对其他并发事务是不可见的。从事务的角度来看，这意味着每个事务都是串行执行的。

    *   持久性：持久性特征要求每个已提交的事务保持已提交状态，即使在发生电源故障或灾难时也是如此。


    正如您可能从阅读不同的 ACID 属性中猜到的那样，SQL Server 中的锁定与隔离性特征密切相关。


    由于本章专门讨论与锁相关的等待类型，除了隔离性之外，我们不会详细介绍 ACID 属性。如果您有兴趣了解更多关于 ACID 属性和数据库理论的知识，一个很好的起点是
    Andreas Reuter 和 Theo Harder 的研究论文 “Principles of Transaction-Oriented Database
    Recovery”，其中详细描述了 ACID 属性。


    为了更好地理解隔离性特征的工作原理，我们需要理解事务。一个事务代表与数据库的一次交互，可以包含多个操作，并且与其他事务分离。


    为了确保我们的事务不会与其他并发事务冲突，SQL Server 使用锁。这些锁确保没有其他事务可以修改您的事务正在同时处理的数据。例如，如果您从银行账户中提取
    100 美元，您不希望另一个并发的提取操作修改该金额。其他事务必须等待其提取操作，直到您的事务完成。在 SQL Server 内部，这个过程的工作方式相同。当您从数据库请求数据时，您希望获得您所请求的数据返回，而没有数据在您请求时被修改的风险。


    当您运行事务时，它将受到 SQL Server 在您正在访问的对象上放置的锁的保护。如果另一个事务想要与同一对象交互，则会发生阻塞。当发生阻塞时，后一个事务将必须等待，直到对象上的锁被移除。然后，该事务可以在对象上放置自己的锁并开始其交互。


    在 SQL Server 中，我们有许多可用选项来控制锁定和阻塞的行为，其中大多数与更改针对数据库的某些或所有事务的隔离级别有关。在 SQL Server
    内部，我们也可以访问大量关于锁定和阻塞的信息，其中非常重要的一部分就在等待统计中。事务等待访问锁定对象的时间被记录为特定的、与锁相关的等待类型的等待时间（取决于事务打算放置的锁的类型）。


    在本章中，我们将讨论与锁定和阻塞相关的各种等待类型，以及如何降低或甚至解决它们。这需要一些关于 SQL Server 如何使用锁的知识，因此我专门包含了一节内容，让我们在深入研究锁等待类型之前熟悉锁定和阻塞。'
- fmt: '## Introduction to Locking and Blocking


    As we just discussed, SQL Server uses locks to isolate different concurrent transactions
    from each other so data is only accessed or modified by one transaction at a time.
    There are different lock types, or lock modes, SQL Server can use, and there are
    various object levels SQL Server can place locks on. To make it even more complex,
    different lock modes are not necessarily compatible with each other, and when
    two incompatible locks meet, a block occurs.


    ### Lock Modes and Compatibility


    To start off, let’s get ourselves familiar with the different types of locks,
    or lock modes, inside SQL Server. The list that follows describes the most common
    lock modes. There are more lock modes inside SQL Server, but those only occur
    when you perform very specific actions. A complete list of the different lock
    modes can be found on the MSDN page that discusses lock modes here: [`https://technet.microsoft.com/en-us/library/ms175519.aspx`](https://technet.microsoft.com/en-us/library/ms175519.aspx).
    SQL Server uses acronyms to indicate which lock mode is being used inside SQL
    Server. These acronyms are shown in parentheses:


    *   Shared (`S`): A Shared lock will be placed on a resource when a query is selecting
    data from that resource. For instance, a `SELECT * FROM [table]`.


    *   Update (`U`): The Update lock mode is used when a query wants to modify a
    resource. It was introduced to prevent “deadlocks,” a situation where locks are
    waiting on each other to release in concurrent transactions that want to modify
    the same resource.


    *   Exclusive (`X`): An Exclusive lock is placed when a transaction wants to modify
    the resource. When an Exclusive lock is in place, no other transactions can modify
    the resource. For instance, `INSERT`, `UPDATE`, or `DELETE` T-SQL statements will
    result in Exclusive locks.


    *   Schema (`Sch`): Schema locks are used when a table is being modified. An example
    of this would be adding a column to a table.


    *   Intent (`I`): Intent locks are used to indicate that locks are placed at a
    lower level in the locking hierarchy. We will go into more detail on the lock
    hierarchy in a bit.


    When different locks need to interact with each other, SQL Server performs a lock
    compatibility check on the different lock modes involved. Not all of the lock
    modes are compatible with each other, which means that when two different transactions
    are not able to access the resource at the same time because of incompatible locks,
    a block will occur. For instance, when a Shared lock is placed to read from a
    row, and another transaction wants to modify the row by placing an Exclusive lock,
    the Exclusive lock will have to wait until the Shared lock is removed. Table [8-1](#340881_2_En_8_Chapter.xhtml#Tab1)
    shows the lock mode compatibility for the Shared, Update, and Exclusive lock modes.


    Table 8-1 Lock Compatibility


    | Lock Mode | Shared | Update | Exclusive |

    | --- | --- | --- | --- |

    | **Shared** | Yes | Yes | No |

    | **Update** | Yes | No | No |

    | **Exclusive** | No | No | No |


    Let’s go through an example to illustrate lock compatibility. Say you want to
    read from a row inside a table by executing a `SELECT` statement against that
    table. When you execute your query, SQL Server will check if there is any existing
    lock already in place on the row you want to access, and if it is compatible with
    the lock you want to place on the row. Let’s assume there isn’t a lock in place
    when you run your query. In this case a Shared lock will be placed on the row,
    indicating that your query is reading data from that row. Right after you execute
    your query another transaction is issued by another user that wants to modify
    data inside the row you are accessing. SQL Server will detect that there already
    is a Shared lock in place on the row, making the second transaction wait before
    placing its Exclusive lock, since Shared and Exclusive locks are incompatible.
    The user who ran the second transaction might experience a delay, since the transaction
    is waiting for the Shared lock to be removed before its Exclusive lock can be
    placed. If a third transaction is started that wants to read the same row as your
    transaction, no lock conflict will occur. Shared locks are compatible with other
    Shared locks, meaning that the third transaction does not have to wait to place
    its lock, and it directly receives the results it asked for.


    Figure [8-1](#340881_2_En_8_Chapter.xhtml#Fig1) shows the example where the dotted
    line indicates an incompatible lock that has to wait.


    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig1_HTML.jpg](images/340881_2_En_8_Chapter/340881_2_En_8_Fig1_HTML.jpg)

    Figure 8-1 Concurrent lock situation


    ### Locking Hierarchy


    SQL Server uses multigranular locking to allow different locks for different-level
    objects. It does this to minimize the overhead cost of locking. The lowest possible
    object where a lock can be placed is a row, and the largest is the database. There
    are many levels between those two granularity levels, and SQL Server automatically
    decides on what level the lock should be placed to minimize locking overhead.
    The following list shows the most common lock levels, ordered from the highest
    granularity to the smallest:


    *   Database


    *   Database file


    *   Table/Object


    *   Extent


    *   Page


    *   `RID` (row inside a heap)/`KEY` (row inside a clustered index)


    The Intent locks we discussed earlier also play an important part in the placement
    of locks upon the different granularity levels. SQL Server will place Intent locks
    on objects that are on a higher granularity to indicate a lock has been placed
    at a lower level. This protects the lower-level locks from changes on objects
    at a higher granularity level. All the Intent locks that are placed, from the
    highest granularity level to the actual lock on an object, when looked at together
    are called the locking hierarchy.


    Figure [8-2](#340881_2_En_8_Chapter.xhtml#Fig2) shows a graphical representation
    of a locking hierarchy for the modification of data inside a row, which will require
    an Exclusive lock on the row and Intent Exclusive locks higher in the hierarchy.


    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig2_HTML.jpg](images/340881_2_En_8_Chapter/340881_2_En_8_Fig2_HTML.jpg)

    Figure 8-2 Lock hierarchy example


    Note the Shared lock on the database level. Every request will always place one
    to protect changes to the database while transactions are active. This makes sure
    that, for instance, you cannot delete a database while transactions are still
    active. Also note that the Intent locks will use the same lock mode on the lowest
    object, in this case Intent Exclusive (`IX`). If a Shared lock was placed, the
    lock mode of the Intent lock would change as well, in this case to Intent Shared
    (`IS`). We will go a little deeper into Intent locks a bit further on in this
    chapter.'
