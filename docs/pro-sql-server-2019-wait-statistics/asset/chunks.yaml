  trans: '### OLEDB 等待类型是什么？


    SQL Server 在内部执行许多不同操作时会使用 OLEDB 客户端提供程序。例如，链接服务器的流量会通过 OLEDB 客户端提供程序，并导致 OLEDB
    等待。其他操作，尤其是当 SQL Server 需要从外部源检索数据时，也可能导致使用 OLEDB 客户端提供程序。


    SQL Server 内部的一些操作也会使用 OLEDB 客户端提供程序，即使这些操作发生在内部。一个很好的例子就是 `DBCC` 命令，我将在下面的示例部分进行演示。


    ### OLEDB 示例


    一个使用 OLEDB 客户端提供程序的有趣过程是 SQL Server 内部的 `DBCC` 命令。每当你执行一个 `DBCC` 命令时，你肯定会看到 `OLEDB`
    等待出现。代码清单 12-3 展示了一个在执行 `DBCC CHECKDB` 后出现 `OLEDB` 等待的示例。该示例脚本将清除 `sys.dm_os_wait_stats`
    DMV，对 `AdventureWorks` 数据库执行 `CHECKDB`，然后查询 `sys.dm_os_wait_stats` DMV 中的 `OLEDB`
    等待。


    ```

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    DBCC CHECKDB(''AdventureWorks'');

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''OLEDB'';

    代码清单 12-3

    生成 OLEDB 等待

    ```


    在我测试的 SQL Server 实例上执行代码清单 12-3 中的查询，其结果如图 12-8 所示。


    ![../images/340881_2_En_12_Chapter/340881_2_En_12_Fig8_HTML.jpg](img/340881_2_En_12_Fig8_HTML.jpg)


    图 12-8 OLEDB 等待


    从图 12-8 可以看出，执行 `DBCC CHECKDB` 会导致 `OLEDB` 等待。


    ### 降低 OLEDB 等待


    正如你在前面的示例中所看到的，对数据库执行 `DBCC CHECKDB` 会导致 `OLEDB` 等待。然而，这并不意味着存在与 OLEDB 客户端提供程序相关的问题；相反，它只是表明
    `DBCC CHECKDB` 命令利用了 OLEDB 客户端提供程序。运行 `DBCC CHECKDB` 是确保数据库健康的重要部分。为了避免降低 `OLEDB`
    等待时间而放弃一致性检查，这种做法是糟糕的，我强烈建议不要这样做。在 `DBCC` 命令之外看到较高的 `OLEDB` 等待时间可能表明你的 SQL Server
    环境中某处存在性能问题。如果你正在处理远程源，例如链接服务器或 Excel 文件，你也会受到远程源性能的影响。例如，如果你从链接服务器查询信息，而该链接服务器正遇到性能问题，这很可能也会反映在
    `OLEDB` 等待时间上。此外，某些操作，如排序，也会影响链接服务器上的查询持续时间。到远程源的网络连接也可能在导致高于正常的 `OLEDB` 等待时间中起到作用。如果你访问远程源所经过的网络连接出现性能下降，你将再次在
    `OLEDB` 等待时间中注意到这一点。


    由于 `OLEDB` 等待可能因多种原因而发生，其中一些是良性的，如 `DBCC` 命令，而另一些则可能与性能问题相关，我建议你不要忽略 `OLEDB` 等待类型，而是要像其他指示性能的等待类型一样对其进行监控。


    ### OLEDB 总结


    `OLEDB` 等待类型可能由于各种使用对象链接与嵌入数据库 (OLEDB) 客户端提供程序的源而发生。大多数源与远程数据源（如链接服务器）相关。一些内部进程也使用
    OLEDB 客户端提供程序，最显著的就是 `DBCC` 命令。看到 `OLEDB` 等待类型出现高于正常的等待时间不一定意味着存在性能问题，特别是当它们可以与计划的
    `DBCC` 命令执行相关联时。当你在使用链接服务器等远程数据源时，在 `DBCC` 命令之外看到高于正常的等待时间可能意味着远程数据源正在经历性能问题。在这种情况下，请专注于数据源；如果源有问题，它必然也会影响
    `OLEDB` 等待时间。


    ## TRACEWRITE


    `TRACEWRITE` 等待类型是一种特殊的等待类型，仅在跟踪运行时（最常见的是 SQL Profiler 跟踪）才会收集等待时间。跟踪是 SQL Server
    中的一个后台进程，它收集各种通常是用户指定的关于 SQL Server 实例性能的信息。例如，可以使用 SQL Server Profiler 来捕获当前正在执行的查询，过滤到单个数据库，并包含运行时信息。SQL
    Server 中有多种跟踪方法可用，但影响 `TRACEWRITE` 等待类型最常见的是 SQL Server Profiler 跟踪。


    SQL Server Profiler 是 SQL Server 的一部分应用程序，从 SQL Server 2016 开始，它也包含在独立的 SQL Server
    Management Studio 产品中，允许用户创建和监视针对 SQL Server 实例的跟踪。Microsoft 在引入 SQL Server 2012
    时宣布 SQL Server Profiler 已弃用，并建议使用 Extended Events 来捕获跟踪。尽管 SQL Server Profiler
    已被弃用，但它在 SQL Server 2014 中仍然可用，并且从 SQL Server 2016 开始，无论何时部署独立的 SQL Server Management
    Studio 产品，它都会被安装。许多人仍然依赖 SQL Server Profiler 跟踪而非 Extended Events 来排查和监视查询性能。


    使用 SQL Server Profiler 的坏消息是，在执行跟踪时可能会导致一些性能开销。Microsoft 发布的一篇文章得出结论，在繁忙的系统上运行
    SQL Server Profiler 跟踪可能对每秒事务数量产生 10% 的影响；你可以在此处找到该文章：[`https://msdn.microsoft.com/en-us/library/cc293614.aspx`](https://msdn.microsoft.com/en-us/library/cc293614.aspx)。由于
    SQL Server Profiler 跟踪可能对系统性能产生如此大的影响，我认为监控 `TRACEWRITE` 等待时间非常重要。


    ### TRACEWRITE 等待类型是什么？


    正如我们刚才指出的，当使用 SQL Server Profiler 对 SQL Server 实例执行跟踪时，`TRACEWRITE` 等待类型就会出现在你的系统上。由于
    SQL Server Profiler 跟踪可能对 SQL Server 实例的性能产生如此大的影响，建议你监控此等待类型以检测是否有任何 SQL Server
    Profiler 跟踪正在执行。


    你可能希望运行 SQL Server Profiler 跟踪的原因有很多；例如，如果你想排查一个非常具体的查询问题，或者监视某个特定查询被执行的次数。尽管存在
    SQL Server Profiler 的替代方案，如服务器端跟踪和 Extended Events，但 SQL Server Profiler 工具与通常很复杂的
    Extended Events 相比，非常易于使用。'
- fmt: '### TRACEWRITE Example


    To show you an example of `TRACEWRITE` waits occurring, we are going to have to
    start a SQL Server Profiler trace. The SQL Server Profiler program is part of
    the Management Tools - Complete feature, which you can select when installing
    SQL Server versions lower than SQL Server 2016, or when adding features to an
    existing installation. If you install the separate SQL Server Management Studio
    product, the Profiler feature is automatically installed as well. Figure [12-9](#340881_2_En_12_Chapter.xhtml#Fig9)
    shows the feature inside the SQL Server 2012 Setup.


    ![../images/340881_2_En_12_Chapter/340881_2_En_12_Fig9_HTML.jpg](images/340881_2_En_12_Chapter/340881_2_En_12_Fig9_HTML.jpg)


    Figure 12-9.

    Management Tools - Complete feature in SQL Server 2012 Setup


    When you have installed the Management Tools - Complete feature, you can find
    the SQL Server Profiler in the SQL Server ➤ Performance Tools folder underneath
    the Start menu, or in the `C:\Program Files (x86)\Microsoft SQL Server\[edition
    number]\Tools\Binn` folder.

    If you installed the separate SQL Server Management Studio product the Profiler
    can be found in the `C:\Program Files (x86)\Microsoft SQL Server\140\Tools\Binn`
    folder.


    After starting up the SQL Server Profiler, you can start a new trace by clicking
    the New Trace button, shown in Figure [12-10](#340881_2_En_12_Chapter.xhtml#Fig10),
    or selecting File ➤ New Trace.


    ![../images/340881_2_En_12_Chapter/340881_2_En_12_Fig10_HTML.jpg](images/340881_2_En_12_Chapter/340881_2_En_12_Fig10_HTML.jpg)


    Figure 12-10

    New SQL Server Profiler trace


    When you start a new trace, you will need to connect to the SQL Server instance
    you want to trace. In this case I connected to my test SQL Server instance. After
    logging on to the SQL Server instance, the Trace Properties window will open.
    This window will give you a variety of options with which to configure your trace
    and how you want to store your trace. In this example we are not going to change
    anything in the General tab, but instead will go directly to the Events Selection
    tab. There we can select what events we want to capture, and optionally supply
    filters for those events. By default a selection is preloaded when starting a
    new trace, as you can see in Figure [12-11](#340881_2_En_12_Chapter.xhtml#Fig11).


    ![../images/340881_2_En_12_Chapter/340881_2_En_12_Fig11_HTML.jpg](images/340881_2_En_12_Chapter/340881_2_En_12_Fig11_HTML.jpg)


    Figure 12-11

    SQL Server Profiler default event selection


    For this example we do not need all the extra events that are selected by default.
    In this case we check the Show all columns checkbox, and only select the `SQL:BatchCompleted`
    event, as you can see in Figure [12-12](#340881_2_En_12_Chapter.xhtml#Fig12).
    This will record all the T-SQL statements that are executed against the test SQL
    Server instance and capture all the information available for the event.


    ![../images/340881_2_En_12_Chapter/340881_2_En_12_Fig12_HTML.jpg](images/340881_2_En_12_Chapter/340881_2_En_12_Fig12_HTML.jpg)


    Figure 12-12

    `SQL:BatchCompleted` event selected


    We won’t configure any filters on the event, so we will capture every T-SQL statement
    we execute against the SQL Server instance. We press Run to start the trace, which
    will open the trace window that will show us the events when they take place on
    our SQL Server instance along with additional information about, in this case,
    the query.


    Now that our SQL Server Profiler trace is running, we should be able to notice
    `TRACEWRITE` waits occurring. We execute the query that follows in SQL Server
    Management Studio against the `sys.dm_os_waiting_tasks` DMV:


    ```sql

    SELECT *

    FROM sys.dm_os_waiting_tasks

    WHERE wait_type = ''TRACEWRITE'';

    ```


    The results of this query are shown in Figure [12-13](#340881_2_En_12_Chapter.xhtml#Fig13).


    ![../images/340881_2_En_12_Chapter/340881_2_En_12_Fig13_HTML.jpg](images/340881_2_En_12_Chapter/340881_2_En_12_Fig13_HTML.jpg)


    Figure 12-13

    TRACEWRITE waits


    Even though we are not running any workload on the test SQL Server instance, the
    `TRACEWRITE` wait type will still be logged. This is normal since the `TRACEWRITE`
    wait type will always be recorded as long as a SQL Server Profiler trace is active.


    ### Lowering TRACEWRITE Waits


    As I mentioned before, if you notice `TRACEWRITE` waits occurring it means someone
    is running a SQL Server Profiler trace against your SQL Server instance. Because
    a SQL Server Profiler trace can have such a big impact on the performance of your
    SQL Server instance, it is important to know who is running the SQL Server Profiler
    trace and why.


    Thankfully, there is a catalog view we can query to view trace activity—the `sys.traces`
    view. The `sys.traces` catalog view will give you an overview of traces that are
    either active or paused against the SQL Server instance. The query that follows
    will retrieve all the information inside the `sys.traces` catalog view:


    ```sql

    SELECT *

    FROM sys.traces;

    ```


    Running this query against the test SQL Server instance returns the information
    shown in Figure [12-14](#340881_2_En_12_Chapter.xhtml#Fig14). (some columns did
    not fit inside the image).


    ![../images/340881_2_En_12_Chapter/340881_2_En_12_Fig14_HTML.jpg](images/340881_2_En_12_Chapter/340881_2_En_12_Fig14_HTML.jpg)


    Figure 12-14

    sys.traces


    Some important columns I want to highlight from the `sys.traces` catalog view
    are the `status` and `reader_spid` columns. The `status` column returns either
    a 0 or a 1, where a 0 indicates the trace is stopped or paused and a 1 indicates
    the trace is currently running. The `reader_spid` column returns the session ID
    of the session that started the trace. We can use this information to detect who
    is running the trace.


    In our case, the trace we started in the example has an ID of 2, while the ID
    of 1 is reserved for the background SQL Server trace that is, by default, always
    active. This default trace collects specific information about the health of the
    SQL Server instance and can be used when troubleshooting. Because it is a so-called
    server-side trace, it does not record `TRACEWRITE` wait time while it is running.


    Now that you can identify the user that is running the trace you can take action
    if you believe the trace has a negative effect on the performance of your SQL
    Server instance.


    After stopping SQL Server Profiler traces in order to lower the `TRACEWRITE` wait
    time, there are other methods available if you really need to capture traces against
    your SQL Server instance. The most logical one is recreating your SQL Server Profiler
    trace within an Extended Event session. Extended Events have a much smaller overhead
    than SQL Server Profiler traces and allow even more events and options while capturing
    traces.


    If you still want to use SQL Server Profiler to analyze traces, it can be a good
    idea to convert the trace you would normally run in the SQL Server Profiler application
    to a server-side trace. Just like with Extended Events, server-side traces have
    minimal overhead compared to traces that are performed through the SQL Server
    Profiler application. Let’s convert the SQL Server Profiler trace we created in
    the example section to a server-side trace and monitor the effects on the `TRACEWRITE`
    wait type.


    The easiest way to convert a SQL Server Profiler trace is by defining the trace
    in the SQL Server Profiler application without starting it. Instead, select the
    File ➤ Export ➤ Script Trace Definition ➤ For SQL Server 2005 – SQL2017 option,
    as shown in Figure [12-15](#340881_2_En_12_Chapter.xhtml#Fig15).


    ![../images/340881_2_En_12_Chapter/340881_2_En_12_Fig15_HTML.jpg](images/340881_2_En_12_Chapter/340881_2_En_12_Fig15_HTML.jpg)


    Figure 12-15

    Export SQL Server Profiler trace to trace definition'
  raw: '### TRACEWRITE Example


    To show you an example of `TRACEWRITE` waits occurring, we are going to have to
    start a SQL Server Profiler trace. The SQL Server Profiler program is part of
    the Management Tools - Complete feature, which you can select when installing
    SQL Server versions lower than SQL Server 2016, or when adding features to an
    existing installation. If you install the separate SQL Server Management Studio
    product, the Profiler feature is automatically installed as well. Figure [12-9](#340881_2_En_12_Chapter.xhtml#Fig9)
    shows the feature inside the SQL Server 2012 Setup.


    ![../images/340881_2_En_12_Chapter/340881_2_En_12_Fig9_HTML.jpg](images/340881_2_En_12_Chapter/340881_2_En_12_Fig9_HTML.jpg)


    Figure 12-9.


    Management Tools - Complete feature in SQL Server 2012 Setup


    When you have installed the Management Tools - Complete feature, you can find
    the SQL Server Profiler in the SQL Server ➤ Performance Tools folder underneath
    the Start menu, or in the C:\Program Files (x86)\Microsoft SQL Server\[edition
    number]\Tools\Binn folder.


    If you installed the separate SQL Server Management Studio product the Profiler
    can be found in the C:\Program Files (x86)\Microsoft SQL Server\140\Tools\Binn
    folder.


    After starting up the SQL Server Profiler, you can start a new trace by clicking
    the New Trace button, shown in Figure [12-10](#340881_2_En_12_Chapter.xhtml#Fig10),
    or selecting File ➤ New Trace.


    ![../images/340881_2_En_12_Chapter/340881_2_En_12_Fig10_HTML.jpg](images/340881_2_En_12_Chapter/340881_2_En_12_Fig10_HTML.jpg)


    Figure 12-10


    New SQL Server Profiler trace


    When you start a new trace, you will need to connect to the SQL Server instance
    you want to trace. In this case I connected to my test SQL Server instance. After
    logging on to the SQL Server instance, the Trace Properties window will open.
    This window will give you a variety of options with which to configure your trace
    and how you want to store your trace. In this example we are not going to change
    anything in the General tab, but instead will go directly to the Events Selection
    tab. There we can select what events we want to capture, and optionally supply
    filters for those events. By default a selection is preloaded when starting a
    new trace, as you can see in Figure [12-11](#340881_2_En_12_Chapter.xhtml#Fig11).


    ![../images/340881_2_En_12_Chapter/340881_2_En_12_Fig11_HTML.jpg](images/340881_2_En_12_Chapter/340881_2_En_12_Fig11_HTML.jpg)


    Figure 12-11


    SQL Server Profiler default event selection


    For this example we do not need all the extra events that are selected by default.
    In this case we check the Show all columns checkbox, and only select the SQL:BatchCompleted
    event, as you can see in Figure [12-12](#340881_2_En_12_Chapter.xhtml#Fig12).
    This will record all the T-SQL statements that are executed against the test SQL
    Server instance and capture all the information available for the event.


    ![../images/340881_2_En_12_Chapter/340881_2_En_12_Fig12_HTML.jpg](images/340881_2_En_12_Chapter/340881_2_En_12_Fig12_HTML.jpg)


    Figure 12-12


    SQL:BatchCompleted event selected


    We won’t configure any filters on the event, so we will capture every T-SQL statement
    we execute against the SQL Server instance. We press Run to start the trace, which
    will open the trace window that will show us the events when they take place on
    our SQL Server instance along with additional information about, in this case,
    the query.


    Now that our SQL Server Profiler trace is running, we should be able to notice
    `TRACEWRITE` waits occurring. We execute the query that follows in SQL Server
    Management Studio against the `sys.dm_os_waiting_tasks` DMV:


    ```

    SELECT *

    FROM sys.dm_os_waiting_tasks

    WHERE wait_type = ''TRACEWRITE'';

    ```


    The results of this query are shown in Figure [12-13](#340881_2_En_12_Chapter.xhtml#Fig13).


    ![../images/340881_2_En_12_Chapter/340881_2_En_12_Fig13_HTML.jpg](images/340881_2_En_12_Chapter/340881_2_En_12_Fig13_HTML.jpg)


    Figure 12-13


    TRACEWRITE waits


    Even though we are not running any workload on the test SQL Server instance, the
    `TRACEWRITE` wait type will still be logged. This is normal since the `TRACEWRITE`
    wait type will always be recorded as long as a SQL Server Profiler trace is active.


    ### Lowering TRACEWRITE Waits


    As I mentioned before, if you notice `TRACEWRITE` waits occurring it means someone
    is running a SQL Server Profiler trace against your SQL Server instance. Because
    a SQL Server Profiler trace can have such a big impact on the performance of your
    SQL Server instance, it is important to know who is running the SQL Server Profiler
    trace and why.


    Thankfully, there is a catalog view we can query to view trace activity—the `sys.traces`
    view. The `sys.traces` catalog view will give you an overview of traces that are
    either active or paused against the SQL Server instance. The query that follows
    will retrieve all the information inside the `sys.traces` catalog view:


    ```

    SELECT *

    FROM sys.traces;

    ```


    Running this query against the test SQL Server instance returns the information
    shown in Figure [12-14](#340881_2_En_12_Chapter.xhtml#Fig14). (some columns did
    not fit inside the image).


    ![../images/340881_2_En_12_Chapter/340881_2_En_12_Fig14_HTML.jpg](images/340881_2_En_12_Chapter/340881_2_En_12_Fig14_HTML.jpg)


    Figure 12-14


    sys.traces


    Some important columns I want to highlight from the `sys.traces` catalog view
    are the `status` and `reader_spid` columns. The `status` column returns either
    a 0 or a 1, where a 0 indicates the trace is stopped or paused and a 1 indicates
    the trace is currently running. The `reader_spid` column returns the session ID
    of the session that started the trace. We can use this information to detect who
    is running the trace.


    In our case, the trace we started in the example has an ID of 2, while the ID
    of 1 is reserved for the background SQL Server trace that is, by default, always
    active. This default trace collects specific information about the health of the
    SQL Server instance and can be used when troubleshooting. Because it is a so-called
    server-side trace, it does not record `TRACEWRITE` wait time while it is running.


    Now that you can identify the user that is running the trace you can take action
    if you believe the trace has a negative effect on the performance of your SQL
    Server instance.


    After stopping SQL Server Profiler traces in order to lower the `TRACEWRITE` wait
    time, there are other methods available if you really need to capture traces against
    your SQL Server instance. The most logical one is recreating your SQL Server Profiler
    trace within an Extended Event session. Extended Events have a much smaller overhead
    than SQL Server Profiler traces and allow even more events and options while capturing
    traces.


    If you still want to use SQL Server Profiler to analyze traces, it can be a good
    idea to convert the trace you would normally run in the SQL Server Profiler application
    to a server-side trace. Just like with Extended Events, server-side traces have
    minimal overhead compared to traces that are performed through the SQL Server
    Profiler application. Let’s convert the SQL Server Profiler trace we created in
    the example section to a server-side trace and monitor the effects on the `TRACEWRITE`
    wait type.


    The easiest way to convert a SQL Server Profiler trace is by defining the trace
    in the SQL Server Profiler application without starting it. Instead, select the
    File ➤ Export ➤ Script Trace Definition ➤ For SQL Server 2005 – SQL2017 option,
    as shown in Figure [12-15](#340881_2_En_12_Chapter.xhtml#Fig15).


    ![../images/340881_2_En_12_Chapter/340881_2_En_12_Fig15_HTML.jpg](images/340881_2_En_12_Chapter/340881_2_En_12_Fig15_HTML.jpg)


    Figure 12-15


    Export SQL Server Profiler trace to trace definition'
  trans: '

    ### TRACEWRITE 示例


    为了向你展示一个发生 `TRACEWRITE` 等待的示例，我们需要启动一个 SQL Server Profiler 跟踪。SQL Server Profiler
    程序是“管理工具 - 完整版”功能的一部分，在安装低于 SQL Server 2016 版本的 SQL Server 时，或者向现有安装添加功能时，你可以选择此功能。如果你安装的是独立的
    SQL Server Management Studio 产品，Profiler 功能也会随之自动安装。图 12-9 展示了 SQL Server 2012
    安装程序中的该功能。


    ![../images/340881_2_En_12_Chapter/340881_2_En_12_Fig9_HTML.jpg](img/340881_2_En_12_Fig9_HTML.jpg)


    图 12-9.

    SQL Server 2012 安装程序中的“管理工具 - 完整版”功能


    安装了“管理工具 - 完整版”功能后，你可以在“开始”菜单下的 SQL Server ➤ 性能工具 文件夹中找到 SQL Server Profiler，或者在
    `C:\Program Files (x86)\Microsoft SQL Server\[版本号]\Tools\Binn` 文件夹中找到它。

    如果你安装的是独立的 SQL Server Management Studio 产品，那么 Profiler 可以在 `C:\Program Files (x86)\Microsoft
    SQL Server\140\Tools\Binn` 文件夹中找到。


    启动 SQL Server Profiler 后，你可以通过点击图 12-10 所示的“新建跟踪”按钮，或者选择 文件 ➤ 新建跟踪，来启动一个新跟踪。


    ![../images/340881_2_En_12_Chapter/340881_2_En_12_Fig10_HTML.jpg](img/340881_2_En_12_Fig10_HTML.jpg)


    图 12-10

    新建 SQL Server Profiler 跟踪


    启动新跟踪时，你需要连接到要跟踪的 SQL Server 实例。在本例中，我连接到了我的测试 SQL Server 实例。登录到 SQL Server 实例后，“跟踪属性”窗口将会打开。这个窗口提供了多种选项来配置你的跟踪以及你希望如何存储跟踪数据。在这个示例中，我们不会更改“常规”选项卡中的任何内容，而是直接转到“事件选择”选项卡。在那里，我们可以选择要捕获的事件，并可选择为这些事件提供筛选器。默认情况下，启动新跟踪时会预加载一个选择，如图
    12-11 所示。


    ![../images/340881_2_En_12_Chapter/340881_2_En_12_Fig11_HTML.jpg](img/340881_2_En_12_Fig11_HTML.jpg)


    图 12-11

    SQL Server Profiler 默认事件选择


    对于本示例，我们不需要默认选择的所有额外事件。在这种情况下，我们勾选“显示所有列”复选框，并且只选择 `SQL:BatchCompleted` 事件，如图
    12-12 所示。这将记录所有针对测试 SQL Server 实例执行的 T-SQL 语句，并捕获该事件所有可用的信息。


    ![../images/340881_2_En_12_Chapter/340881_2_En_12_Fig12_HTML.jpg](img/340881_2_En_12_Fig12_HTML.jpg)


    图 12-12

    选择了 `SQL:BatchCompleted` 事件


    我们不会对该事件配置任何筛选器，因此将捕获针对 SQL Server 实例执行的每一条 T-SQL 语句。我们点击“运行”以启动跟踪，这将打开跟踪窗口，该窗口会在事件发生在
    SQL Server 实例上时显示它们，以及在此情况下有关查询的附加信息。


    现在我们的 SQL Server Profiler 跟踪正在运行，我们应该能够注意到 `TRACEWRITE` 等待的发生。我们在 SQL Server Management
    Studio 中针对 `sys.dm_os_waiting_tasks` 动态管理视图 (DMV) 执行以下查询：


    ```sql

    SELECT *

    FROM sys.dm_os_waiting_tasks

    WHERE wait_type = ''TRACEWRITE'';

    ```


    此查询的结果如图 12-13 所示。


    ![../images/340881_2_En_12_Chapter/340881_2_En_12_Fig13_HTML.jpg](img/340881_2_En_12_Fig13_HTML.jpg)


    图 12-13

    TRACEWRITE 等待


    即使我们没有在测试 SQL Server 实例上运行任何工作负载，`TRACEWRITE` 等待类型仍会被记录。这是正常的，因为只要 SQL Server
    Profiler 跟踪处于活动状态，`TRACEWRITE` 等待类型就总是会被记录。


    ### 降低 TRACEWRITE 等待


    正如我之前提到的，如果你注意到发生了 `TRACEWRITE` 等待，这意味着有人正在对你的 SQL Server 实例运行 SQL Server Profiler
    跟踪。因为 SQL Server Profiler 跟踪可能对 SQL Server 实例的性能产生很大影响，所以了解是谁在运行 SQL Server Profiler
    跟踪以及为什么运行非常重要。


    值得庆幸的是，有一个目录视图我们可以查询以查看跟踪活动——即 `sys.traces` 视图。`sys.traces` 目录视图会为你提供针对 SQL Server
    实例处于活动状态或暂停状态的跟踪概览。以下查询将检索 `sys.traces` 目录视图中的所有信息：


    ```sql

    SELECT *

    FROM sys.traces;

    ```


    在测试 SQL Server 实例上运行此查询，返回的信息如图 12-14 所示。（某些列未完全显示在图片中）。


    ![../images/340881_2_En_12_Chapter/340881_2_En_12_Fig14_HTML.jpg](img/340881_2_En_12_Fig14_HTML.jpg)


    图 12-14

    sys.traces


    我想从 `sys.traces` 目录视图中重点强调的一些重要列是 `status` 和 `reader_spid` 列。`status` 列返回 0 或
    1，其中 0 表示跟踪已停止或暂停，1 表示跟踪当前正在运行。`reader_spid` 列返回启动跟踪的会话的会话 ID。我们可以使用此信息来检测是谁在运行跟踪。


    在我们的例子中，示例中启动的跟踪 ID 为 2，而 ID 为 1 的是为后台 SQL Server 跟踪保留的，默认情况下它始终处于活动状态。此默认跟踪收集有关
    SQL Server 实例运行状况的特定信息，可在故障排除时使用。因为它是一个所谓的服务器端跟踪，所以在其运行时不会记录 `TRACEWRITE` 等待时间。


    现在你能够识别运行跟踪的用户，如果你认为该跟踪对 SQL Server 实例的性能有负面影响，就可以采取措施。


    为了降低 `TRACEWRITE` 等待时间而停止 SQL Server Profiler 跟踪后，如果你确实需要捕获 SQL Server 实例的跟踪，还有其他可用的方法。最合乎逻辑的方法是在扩展事件
    (Extended Events) 会话中重建你的 SQL Server Profiler 跟踪。扩展事件的开销比 SQL Server Profiler
    跟踪小得多，并且在捕获跟踪时允许使用更多的事件和选项。


    如果你仍然希望使用 SQL Server Profiler 来分析跟踪，一个好方法是将通常在 SQL Server Profiler 应用程序中运行的跟踪转换为服务器端跟踪。与扩展事件一样，与通过
    SQL Server Profiler 应用程序执行的跟踪相比，服务器端跟踪的开销极小。让我们将在示例部分创建的 SQL Server Profiler 跟踪转换为服务器端跟踪，并监控其对
    `TRACEWRITE` 等待类型的影响。


    转换 SQL Server Profiler 跟踪最简单的方法是在 SQL Server Profiler 应用程序中定义跟踪但不启动它。转而选择 文件 ➤
    导出 ➤ 脚本跟踪定义 ➤ 适用于 SQL Server 2005 – SQL2017 选项，如图 12-15 所示。


    ![../images/340881_2_En_12_Chapter/340881_2_En_12_Fig15_HTML.jpg](img/340881_2_En_12_Fig15_HTML.jpg)


    图 12-15

    将 SQL Server Profiler 跟踪导出为跟踪定义

