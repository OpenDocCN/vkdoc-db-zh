- fmt: '# LCK_M_I[xx] Example


    In this example we will generate a wait of the `LCK_M_IX` wait type. This means
    a transaction is waiting to acquire an Intent Exclusive lock on a higher level
    in the locking hierarchy.


    We will use more or less the same example as we did for the `LCK_M_X` wait type
    by running a `SELECT` statement using the `REPEATABLE READ` Isolation level and
    not completing the transaction. The query that follows is the query I will be
    running against the `AdventureWorks` database, `Person.Address` table:


    ```sql

    SET TRANSACTION ISOLATION LEVEL REPEATABLE READ

    BEGIN TRAN

    SELECT * FROM Person.Address;

    --COMMIT

    ```


    The `COMMIT` command has been commented out to leave the transaction open.


    If we take a look at the `sys.dm_tran_locks` DMV, shown by Figure [8-20](#340881_2_En_8_Chapter.xhtml#Fig20),
    we see that while the query is running there is only one lock currently active,
    a Shared lock on the `OBJECT` resource type. This indicates that the entire table
    is locked. Since this lock exists on this high level, there is no need for other
    Shared locks further down the hierarchy.


    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig20_HTML.jpg](images/340881_2_En_8_Chapter/340881_2_En_8_Fig20_HTML.jpg)


    Figure 8-20: Shared lock on a table


    If another transaction wants to update a row inside the same table, it would first
    try to acquire an Intent Exclusive lock on the table and page level before it
    could acquire an Exclusive lock on the row level. The query that follows is such
    a transaction, and in this case we will try to update a single row:


    ```sql

    UPDATE Person.Address

    SET AddressLine1 = ''1227 Shoe St.''

    WHERE AddressID = 5;

    ```


    You’ll notice that the preceding query “hangs” as long as the `SELECT` query still
    has its Shared lock on the table. Even though Intent locks are in most cases compatible
    with other Intent locks on the same object, having, in this case, a Shared lock
    on the table level while trying to perform a data modification lower in the hierarchy
    will cause a block to occur. Shared locks and Intent Exclusive locks are not compatible.


    If we look at the `sys.dm_os_waiting_tasks` DMV, we should be able to see that
    the task to place the Intent Exclusive lock is waiting, as shown in Figure [8-21](#340881_2_En_8_Chapter.xhtml#Fig21).


    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig21_HTML.jpg](images/340881_2_En_8_Chapter/340881_2_En_8_Fig21_HTML.jpg)


    Figure 8-21: LCK_M_IX wait occurring


    ## Lowering LCK_M_I[xx] Waits


    Just like with the other lock-related wait types we discussed earlier, try to
    focus on the queries that are causing the blocking when trying to lower `LCK_M_I[xx]`
    wait times. Because `LCK_M_I[xx]` waits only occur when incompatible locks are
    being held on objects higher in the locking hierarchy, it can be worth the time
    to investigate why those locks are placed so high in the hierarchy. Lock escalation
    can cause this to happen. Lock escalation occurs when it is more efficient for
    SQL Server to place a single lock higher in the locking hierarchy instead of locking
    many objects lower down. For instance, instead of placing thousands of Shared
    locks on rows, SQL Server can decide to place a single Shared lock on the table
    level. This requires far less resources to place and maintain than thousands of
    single locks. As a matter of fact, this is exactly what is occurring in the example
    I have shown you of the `LCK_M_IX` wait type. The `Person.Address` table we are
    querying with the `SELECT` query has more than 19,000 rows inside it. When we
    ran our `SELECT *` query against the table, it would mean that at least 19,000
    row locks would be needed. Because placing and holding that many locks would take
    a great deal of resources, SQL Server decided to place a single Shared lock on
    the table instead of 19,000 locks on the rows.


    If we can rewrite the query so it requires fewer locks, for instance, by only
    selecting the first *x* rows instead of everything, SQL Server would probably
    choose to lock the rows again, instead of the entire table.


    ## LCK_M_I[xx] Summary


    The `LCK_M_I[xx]` wait type is related to Intent locks, or rather, cases when
    another incompatible lock is blocking the placement of an Intent lock. Intent
    locks are placed on higher-level objects to indicate that a lock has been placed
    on a lower level in the locking hierarchy. Unlike the lock modes we discussed
    earlier that only represent one type of lock, Intent locks can represent different
    lock modes lower down in the locking hierarchy. One common cause of high wait
    times on `LCK_M_I[xx]` wait types is cases when SQL Server escalates lower-level
    locks to a higher-level lock. In this situation Intent locks will be blocked and
    cannot be acquired.


    # LCK_M_SCH_S and LCK_M_SCH_M


    The last two lock-related wait types I want to discuss in this chapter are the
    `LCK_M_SCH_S` and the `LCK_M_SCH_M` wait types. Both of these wait types are related
    to locks that are being placed on tables, the so-called Schema locks. We didn’t
    give a lot of attention to Schema locks earlier in this chapter, but since they
    can have a pretty big impact on wait times when they occur, I wanted to include
    them.


    ## What Are the LCK_M_SCH_S and LCK_M_SCH_M Wait Types?


    The `LCK_M_SCH_S` and `LCK_M_SCH_M` wait types are both related to Schema locks.
    Schema locks are placed at the table level to protect the table from modifications
    while queries access the table, or to prevent queries from accessing the table
    while it is being modified. There are two different types of Schema lock, Schema
    Stability (Sch-S) and Schema Modification (Sch-M). Each of them has a different
    wait type associated with them when a task is being blocked from placing a Schema
    Stability or Schema Modification lock. The `LCK_M_SCH_S` wait type (to indicate
    read access to the table) is recorded when a Schema Stability lock has to wait
    before it can get placed, and the `LCK_M_SCH_M` wait type (to indicate the table
    schema will be changed) is recorded when a Schema Modification lock is waiting
    to get placed.


    Both Schema locks have pretty extreme compatibility with other lock types. The
    Schema Stability lock is compatible with all other types of locks except for the
    Schema Modification lock. The Schema Modification lock, on the other hand, is
    incompatible with every other lock type, including Intent locks.


    When using Schema Stability locks it is impossible to modify or change the table
    in any way while queries are currently reading or writing from or to that table.
    Because Schema Stability locks are compatible with every lock mode (except for
    Schema Modification), it is completely normal to see a Schema Stability lock on
    the table level together with, for example, an Intent Exclusive lock to indicate
    data modification is occurring on a lower level inside the table.


    Schema Modification locks are the opposite from Schema Stability locks, as they
    prevent any queries from accessing a table while a modification to the table is
    being performed.'
