  trans: '## 使用扩展事件捕获等待统计信息


    SQL Server 中的大多数等待统计信息是累积记录的，并且由于许多内部进程也会生成等待统计信息，因此很难检测单个查询对它们的影响程度。这正是扩展事件的用武之地；通过扩展事件，可以捕获查询遇到的确切等待时间以及它必须等待的等待类型。这些信息可以帮助我们分析那些对系统影响较大的查询，并可能对其进行优化，以减小其影响。或者，我们可以捕获执行时遇到特定等待类型的查询。


    扩展事件在 SQL Server 2008 中引入，或多或少地取代了 SQL Server Profiler。Microsoft 已宣布弃用 SQL Server
    Profiler，并建议我们转向扩展事件。扩展事件比 SQL Server Profiler 强大得多，而且随着 SQL Server 的每个版本发布，我们可以用扩展事件捕获的事件数量不断增加，而
    SQL Server Profiler 中的事件数量则保持不变。此外，性能也是使用扩展事件的一个充分理由。捕获扩展事件比使用 SQL Server Profiler
    更轻量。


    扩展事件一直被认为难以使用，虽然这在 SQL Server 2008 中首次引入时尤其如此，但到了 SQL Server 2012，使用 GUI 创建扩展事件会话变得容易得多，情况大为改观。


    使用扩展事件时，可以使用许多不同的与等待相关的事件。我们可以通过查询 `sys.dm_xe_map_values` DMV 来查看这些事件，该视图保存了所有不同的扩展事件事件类型：


    ```sql

    SELECT *

    FROM sys.dm_xe_map_values

    WHERE name = ''wait_types'';

    ```


    图 2-17 显示了此查询结果的一小部分。


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig17_HTML.png](img/340881_2_En_2_Fig17_HTML.png)

    **图 2-17** `sys.dm_xe_map_values` 的结果


    在 SQL Server 2019 CTP2.4 中，总共有大约 1260 个不同的等待统计信息相关事件可用。这些事件与不同的等待类型并非一一对应，事实上，在某些情况下，等待类型的名称与事件的名称并不匹配，尽管它们含义相同。`ASYNC_NETWORK_IO`
    等待类型就是一个例子，扩展事件将其命名为 `NETWORK_IO`。Jonathan Kehayias 在 [`SQLskills.com`](http://sqlskills.com)
    上写了一篇博客文章，将一些等待类型映射到扩展事件；你可以在这里查看：[`www.sqlskills.com/blogs/jonathan/mapping-wait-types-in-dm_os_wait_stats-to-extended-events/`](http://www.sqlskills.com/blogs/jonathan/mapping-wait-types-in-dm_os_wait_stats-to-extended-events/)。


    虽然本书不会深入探讨扩展事件的细节，但我想向你展示如何使用扩展事件 GUI 和 T-SQL 来捕获等待统计信息相关信息。


    ### 捕获特定查询的等待统计信息


    让我们看看如何配置一个扩展事件会话来捕获特定查询的等待统计信息。我们将对执行查询的会话 ID 设置筛选器，然后执行我们要分析的查询。


    我们要做的第一件事是打开 SQL Server Management Studio 并连接到 SQL Server 实例。请注意，扩展事件的 GUI 是在
    SQL Server 2012 中添加的，因此如果你打算按照此处的步骤操作，需要 SQL Server 2012 或更高版本的实例。


    连接后，我们打开“管理”文件夹，然后选择“扩展事件”选项。右键单击“会话”文件夹并选择“新建会话”选项，如图 2-18 所示。


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig18_HTML.jpg](img/340881_2_En_2_Fig18_HTML.jpg)

    **图 2-18** 添加新的扩展事件会话


    “新建会话”对话框将出现，我们可以在此输入此扩展事件会话的名称并设置一些附加选项。我们现在将忽略这些选项，只填写扩展事件会话的名称，如图 2-19 所示。


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig19_HTML.jpg](img/340881_2_En_2_Fig19_HTML.jpg)

    **图 2-19** 配置等待统计信息扩展事件会话


    下一步是配置此扩展事件会话需要监视哪些事件，这可以通过在“新建会话”对话框中选择“事件”页面来完成。


    由于我们对等待统计信息感兴趣，我在“事件库”中搜索了 `wait_info` 事件并将其添加到“选定的事件”框中，如图 2-20 所示。


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig20_HTML.jpg](img/340881_2_En_2_Fig20_HTML.jpg)

    **图 2-20** 选择要监视的事件


    如果现在保存此扩展事件会话，我们将捕获每个必须等待资源的进程的信息。由于我们只对特定查询相关的等待统计信息感兴趣，我们将配置一个筛选器，仅返回特定会话的等待统计信息。为此，我们可以单击“新建会话”对话框中的“配置”按钮，这将打开一个新部分，我们可以在其中选择“全局字段”，这些字段将在触发
    `wait_info` 事件时记录额外信息。在此情况下，我勾选了 `sql_text` 全局字段，如图 2-21 所示，以便在捕获事件时可以查看实际的查询。


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig21_HTML.jpg](img/340881_2_En_2_Fig21_HTML.jpg)

    **图 2-21** 设置 `sql_text` 全局字段


    接下来是“筛选器（谓词）”选项卡。在这里我们将设置一个筛选器，仅捕获来自特定会话 ID 的事件。我们可以通过单击“字段”框内并选择 `sqlserver.session_id`
    字段，然后将“值”设置为我们想要监视的会话 ID 来完成此操作。在此情况下，我将筛选器配置为仅捕获会话 ID 为 52 的事件，如图 2-22 所示。


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig22_HTML.jpg](img/340881_2_En_2_Fig22_HTML.jpg)

    **图 2-22** 设置事件筛选器


    这就是我们现在需要配置的全部内容，因此我们可以单击“确定”关闭此对话框并保存扩展事件会话。


    默认情况下，扩展事件会话在创建后不会自动启动。为此，我们必须再次打开“会话”文件夹，导航到 SQL Server Management Studio 中的“管理”➤“扩展事件”文件夹。右键单击我们刚创建的扩展事件会话并选择“启动会话”选项，如图
    2-23 所示。'
