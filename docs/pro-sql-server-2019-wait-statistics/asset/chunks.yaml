    in the `sys.dm_os_wait_stats` DMV has increased a lot. Because of this behavior,
    I believe the `WAIT_XTP_HOST_WAIT` wait type has something to do with the offline
    checkpoint process that is related to memory-optimized tables.


    To verify my guess I need to dig a little bit deeper to find out what goes on
    underneath the hood of SQL Server when a checkpoint is performed against a memory-optimized
    table. To get this information I create an Extended Events session that captures
    the call stack whenever SQL Server runs into a `WAIT_XTP_HOST_WAIT` wait. I won’t
    bore you with the methods I use for creating this Extended Events session here,
    but Paul Randal wrote an amazing blog post about capturing call stacks whenever
    a specific wait occurs that you can use to collect some call stacks yourself.
    You can find Paul’s blog post here: [`www.sqlskills.com/blogs/paul/determine-causes-particular-wait-type/`](http://www.sqlskills.com/blogs/paul/determine-causes-particular-wait-type/)
    .


    The results of my Extended Events session for capturing the call stack when a
    `WAIT_XTP_HOST_WAIT` wait occurs is shown here:


    ```

    sqldk.dll!XeSosPkg::wait_info::Publish+0x138

    sqldk.dll!SOS_Scheduler::UpdateWaitTimeStats+0x2bc

    sqldk.dll!SOS_Task::PostWait+0x9e

    sqlmin.dll!EventInternal::Wait+0x1fb

    sqlmin.dll!HkHostWait::Wait+0xce

    hkengine.dll!CkptFilePair::CreateInstance+0x61b

    sqlmin.dll!HkHostReportFailure::KillProcess+0x372

    sqldk.dll!SOS_Task::Param::Execute+0x21e

    sqldk.dll!SOS_Scheduler::RunTask+0xa8

    sqldk.dll!SOS_Scheduler::ProcessTasks+0x279

    sqldk.dll!SchedulerManager::WorkerEntryPoint+0x24c

    sqldk.dll!SystemThread::RunWorker+0x8f

    sqldk.dll!SystemThreadDispatcher::ProcessWorker+0x3ab

    sqldk.dll!SchedulerManager::ThreadEntryPoint+0x226

    kernel32.dll!BaseThreadInitThunk+0xd

    ntdll.dll!RtlUserThreadStart+0x21

    ```


    The first part I found really interesting is the inclusion of a new .dll file,
    `hkengine.dll`. Since In-Memory OLTP’s codename was Hekaton, I am guessing that
    this .dll holds the new In-Memory OLTP functions, so let’s zoom in on that particular
    call:


    ```

    hkengine.dll!CkptFilePair::CreateInstance+0x61b

    ```


    Seeing the function name, I am guessing it is related to checkpoint file pairs,
    and the `CreateInstance` bit suggests a new CFP was created when I executed the
    `CHECKPOINT` command. We can verify this by going to the location of the In-Memory
    file that we created in Listing [13-1](#340881_2_En_13_Chapter.xhtml#PC1). The
    interesting thing about adding a file to an In-Memory filegroup is that it will
    actually create a directory, and inside this directory there is a folder with
    a unique ID string. If you go further down the directory tree, you will end up
    in a folder with numbered files. Figure [13-6](#340881_2_En_13_Chapter.xhtml#Fig6)
    shows a part of the contents of this folder on my test machine.


    ![../images/340881_2_En_13_Chapter/340881_2_En_13_Fig6_HTML.jpg](images/340881_2_En_13_Chapter/340881_2_En_13_Fig6_HTML.jpg)


    Figure 13-6.


    In-Memory filegroup files


    As a matter of fact, the files you are seeing here are the data and delta files
    that are associated with the memory-optimized table we created earlier. The 1
    MB files are the delta files and the 16 MB ones are the data files.


    Since I am guessing a checkpoint would create another CFP, I checked the number
    of files in the folder before executing a `CHECKPOINT`, which was 28 files. I
    then executed a `CHECKPOINT` command and looked at the number of files again,
    and it turned out there were now 30 files after the checkpoint.


    ### WAIT_XTP_HOST_WAIT Summary


    I believe the `WAIT_XTP_HOST_WAIT` wait type has a clear relation to the creation
    of new checkpoint file pairs. Apparently, running a manual `CHECKPOINT` statement
    will generate a new CFP for the memory-optimized tables. Because the `WAIT_XTP_HOST_WAIT`
    wait type generates wait time constantly in the background, and writes it to the
    `sys.dm_os_wait_stats` DMV a new CFP was created (either by manual checkpoint,
    when an existing CFP was full, or when a `Merge` operation occurred), I believe
    the `WAIT_XTP_HOST_WAIT` wait type does not directly indicate performance problems.
    It mostly indicates that a new CFP has been added to the In-Memory filegroup.
    This does not mean this is the only process that generates `WAIT_XTP_HOST_WAIT`
    waits, though. There can be other processes that can also cause the waits, but
    so far they only occurred whenever a new CFP needed to be added.


    ## WAIT_XTP_CKPT_CLOSE


    The `WAIT_XTP_CKPT_CLOSE` wait type is another new wait type introduced in SQL
    Server 2014\. As the name suggests, it seems to be related to the new offline
    checkpoint process introduced with the In-Memory OLTP feature.'
