- fmt: '# 1. Wait Statistics Internals


    SQL Server wait statistics are an important tool you can use to analyze performance-related
    problems or to optimize your SQL Server''s performance. They are, however, not
    that well known to many database administrators or developers. I believe this
    has to do with their relatively complex nature, the sheer volume of the different
    types of wait statistics, and the lack of documentation for many types of wait
    statistics. Wait statistics are also directly related to the SQL Server you are
    analyzing them on, which means that it is impossible to compare the wait statistics
    of Server A to the wait statistics of Server B, even if they had an identical
    hardware and database configuration. Every configuration option, from the hardware
    firmware level to the configuration of the SQL Server Native Client on the client
    computers, will have an impact on the wait statistics!


    For the reasons just mentioned, I firmly believe we should start with the foundation
    and internals of SQL Server wait statistics so you can get familiar with how they
    are generated, how you can access them, and how you can use them for performance
    troubleshooting. This approach will get you ready for Part II of this book, where
    we will examine specific wait statistics.


    In this chapter we will take a brief look at the history of wait statistics through
    the various versions of SQL Server. Following that, we will take a close look
    at the SQL Operating System, or `SQLOS`. The architecture of the `SQLOS` is closely
    tied to wait statistics and to performance troubleshooting in general. The rest
    of the chapter is dedicated to one of the most important aspects of wait statistics:
    thread scheduling.


    Before we begin with the foundation and internals of SQL Server wait statistics,
    I would like to mention a few things related to the terminology used when discussing
    wait statistics. In the introduction of this book and the preceding paragraphs,
    I only mentioned the term wait statistics. The sentence “compare the wait statistics
    of Server A to the wait statistics of Server B” is actually wrong, since we can
    only compare the wait time (the total time we have been waiting on a resource)
    of a specific wait type (the specific wait type related to the resource we are
    waiting on). From this point on, when I use the term wait statistics I mean the
    concept of wait statistics, and I will use the correct terms wait time and wait
    type where appropriate.


    ## A Brief History of Wait Statistics


    SQL Server has been around for quite some time now; the first release of SQL Server
    dates back to 1989 and was released for the OS/2 platform. Until SQL Server 6.0,
    released in 1995, Microsoft worked together with Sybase to develop SQL Server.
    In 1995, however, Microsoft and Sybase went their own ways. Microsoft and Sybase
    stayed active in the database world (SAP actually acquired Sybase in 2010), and
    in 2019 Microsoft will release SQL Server 2019 while SAP released SAP Sybase ASE
    16 in 2014 (but is still maintained today), both relational enterprise-level database
    systems.


    Between SQL Server 6.0 and SQL Server 2019, so many things have changed that you
    simply cannot compare the two versions. One thing that hasn’t changed in all these
    years is wait statistics. In one way or another, SQL Server stores information
    about its internal processes, and even though the way we access that information
    has changed over the years, wait statistics remain an important part of the internal
    logging process.


    In early versions of SQL Server we needed to access the wait statistics using
    undocumented commands. Figure [1-1](#340881_2_En_1_Chapter.xhtml#Fig1) shows how
    you would query wait statistics information in SQL Server 6.5 using the `DBCC`
    command.


    ![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig1_HTML.jpg](images/340881_2_En_1_Chapter/340881_2_En_1_Fig1_HTML.jpg)


    Figure 1-1


    SQL Server wait statistics in SQL Server 6.5


    One of the big changes that were introduced in SQL Server 2005 was the conversion
    of many internal functions and commands into `Dynamic Management Views (DMVs)`,
    including wait statistics information. This made it far easier to query and analyze
    the information returned by functions or commands. A new way of performance analysis
    was born with the release of the SQL Server 2005 Microsoft whitepaper “SQL Server
    2005 Waits and Queues” by Tom Davidson.


    In the various releases of SQL Server the amount of different wait types grew
    exponentially whenever new features or configuration options were introduced.
    If you take a good look at Figure [1-1](#340881_2_En_1_Chapter.xhtml#Fig1) you
    will notice that 21 different wait types were returned. Figure [1-2](#340881_2_En_1_Chapter.xhtml#Fig2)
    shows the amount of wait types, as the number of rows returned, available in SQL
    Server 2017.


    ![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig2_HTML.jpg](images/340881_2_En_1_Chapter/340881_2_En_1_Fig2_HTML.jpg)


    Figure 1-2


    SQL Server wait statistics in SQL Server 2017


    Those 921 rows are all different wait types and hold wait information for different
    parts of the SQL Server engine. With the release of SQL Server 2019 Community
    Technology Preview (`CTP`) 2.4, the number of wait types increased even further
    and cross the line of more than 1.000 different wait types. The number of wait
    types will continue to grow in future SQL Server releases, as new features are
    introduced or existing features are changed. Thankfully there is a lot more information
    available about wait statistics now than there was in SQL Server 6.5!'
