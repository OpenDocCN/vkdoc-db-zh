- fmt: '### What Is the BACKUPBUFFER Wait Type?


    To understand how `BACKUPBUFFER` waits are generated we have to take a look at
    the internals of the SQL Server backup process. These internals are mostly the
    same regardless of the backup method you use (i.e., transaction log, differential
    or full backup) and as such they will encounter the same wait types.


    SQL Server allocates buffers for the backup process. These buffers will be filled
    with data from your database and will be moved through a backup/restore process
    in order to get written to the backup file (or vice versa for a restore operation).
    The buffers are allocated inside the memory of your system, but outside the memory
    of your buffer cache so as to avoid stealing memory from the buffer cache. The
    size and the amount of the backup buffers are automatically calculated by SQL
    Server, but we can configure these values ourselves as parameters of the backup/restore
    command. Figure 7-1 shows how these backup buffers are ordered and moved through
    a “reader,” which reads the data from your database or backup file to a buffer,
    and a “writer,” which writes the data from the buffer to the backup file or database.


    ![Backup buffers moving through reader and writer](images/340881_2_En_7_Chapter/340881_2_En_7_Fig1_HTML.jpg)


    We can view information about the buffer amount and size during a backup or restore
    operation by enabling two trace flags, `3213` and `3605`, which will output backup/restore
    information into the SQL Server error log. The query in Listing 7-1 enables both
    trace flags and performs a full database backup of the `AdventureWorks` database
    on my test SQL Server.


    ```

    -- enable trace flags

    DBCC TRACEON (3213);

    DBCC TRACEON (3605);

    -- backup database

    BACKUP DATABASE [AdventureWorks]

    TO  DISK = N''F:\Backup\aw_21042015.bak''

    WITH NAME = N''AdventureWorks-Full Database Backup'';

    GO

    -- disable trace flags

    DBCC TRACEOFF (3213);

    DBCC TRACEOFF (3605);

    Listing 7-1

    Full database backup with backup-information trace flags

    ```


    Keep in mind that trace flags inside SQL Server should only be used under the
    guidance of Microsoft Support. I am enabling them now to show me backup information
    on my test SQL Server, but I would advise against using them on a production system.


    Inside the SQL Server error log, additional information about the backup we just
    performed is logged, as you can see in Figure 7-2.


    ![Additional backup information](images/340881_2_En_7_Chapter/340881_2_En_7_Fig2_HTML.jpg)


    In this case, the backup operation created seven buffers, shown by the `BufferCount`
    parameter, with a size of 1024 KB each, as shown by the `MaxTransferSize` parameter.
    The total memory needed to create the buffers is shown by the `Total buffer space`
    parameter, 7 MB (`BufferCount` * `MaxTransferSize`). Another interesting bit of
    information that is returned is the `memory limit`. This will show the maximum
    amount of memory outside of the buffer cache that the backup operation could access.


    Now that we have an idea of how the backup process works inside SQL Server, let’s
    take a look where the `BACKUPBUFFER` wait type comes in.


    As we described earlier, the SQL Server backup process uses buffers to store data
    that needs to be written to the backup file. Whenever a buffer is not directly
    available, the `BACKUPBUFFER` wait will occur, making the process wait until a
    full buffer is written to the backup file and it becomes available again.


    ### BACKUPBUFFER Example


    Generating `BACKUPBUFFER` waits is very simple—just perform a backup operation.
    For this example I ran the query shown in Listing 7-2. The query will first reset
    the `sys.dm_os_wait_stats` DMV, then will perform a full backup of the `AdventureWorks`
    database, and finally will return the wait statistics information for the `BACKUPBUFFER`
    wait type.


    ```

    -- clear sys.dm_os_wait_stats

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    -- backup database

    BACKUP DATABASE [AdventureWorks]

    TO DISK = N''F:\Backup\aw_21042015.bak''

    WITH

    NAME = N''AdventureWorks-Full Database Backup'';

    GO

    -- Query BACKUPBUFFER waits

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''BACKUPBUFFER'';

    Listing 7-2

    Generating BACKUPBUFFER waits

    ```


    The results of the query against the `sys.dm_os_wait_stats` DMV are shown in Figure
    7-3.


    ![BACKUPBUFFER waits](images/340881_2_En_7_Chapter/340881_2_En_7_Fig3_HTML.jpg)


    The total duration of the backup operation was around 1 second on my test SQL
    Server. Of that 1 second, only 88 milliseconds were spent waiting on free backup
    buffers.


    ### Lowering BACKUPBUFFER Waits


    As stated in the introduction of this chapter, backup-related waits aren’t normally
    any cause for concern since they normally won’t impact the performance of your
    SQL Server instance. However, we can improve backup performance by using the wait
    statistics information of the various backup-related wait types.


    One of the most common ways to lower `BACKUPBUFFER` wait times is by adding more
    buffers for the backup operation to use, overwriting the automatic allocation
    of buffers. We can do this by specifying the `BUFFERCOUNT` option inside the `BACKUP`
    T-SQL command. There is, however, a catch to altering the number of buffers the
    backup operation can use. Every buffer created will allocate the value of the
    `MAXTRANSFERSIZE` option; this value can be automatically calculated by SQL Server
    itself or by setting the value yourself inside the `BACKUP` command (up to a maximum
    of 4,194,304 bytes). Since the backup operation allocates memory outside of the
    buffer cache, there is a chance that using too many or too large buffers can result
    in out-of-memory problems. So, be careful when testing what the optimal value
    for your SQL Server instance is.


    Listing 7-3 shows a modification of the query in Listing 7-2, which we used to
    demonstrate `BACKUPBUFFER` waits occurring. In this case we added the `BUFFERCOUNT`
    option and configured it to a value of 200.


    ```

    -- clear sys.dm_os_wait_stats

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    -- backup database

    BACKUP DATABASE [AdventureWorks]

    TO DISK = N''F:\Backup\aw_21042015.bak''

    WITH

    NAME = N''AdventureWorks-Full Database Backup'',

    BUFFERCOUNT = 200;

    GO

    -- Query BACKUPBUFFER waits

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''BACKUPBUFFER'';

    Listing 7-3

    Database backup with BUFFERCOUNT configured

    ```


    The results of the query against the `sys.dm_os_wait_stats` DMV are shown in Figure
    7-4.


    ![BACKUPBUFFER waits after configuring BUFFERCOUNT](images/340881_2_En_7_Chapter/340881_2_En_7_Fig4_HTML.jpg)


    As you can see, the amount of time spent on the `BACKUPBUFFER` wait time went
    down to 0 milliseconds instead of the 88 milliseconds it spent when we did not
    supply the `BUFFERCOUNT` parameter. This happens because the number of buffers
    we specified were enough to process the backup operation without a need to allocate
    additional buffers. Since no additional buffers were required, we do not spend
    time waiting on their allocation.


    Another option is to configure the `MAXTRANSFERSIZE` option inside the `BACKUP`
    T-SQL command. This will allow buffers to be filled with larger units of works,
    up to a value of 4,194,304 bytes, or 4 MB. Again, allocating more space for the
    buffers will result in a larger reservation of memory.'
