    ### 增量捕获方法


    增量捕获方法也仅包含一个 T-SQL 脚本，但它比重置捕获方法稍复杂一些。它使用一个临时表来存储第一次测量，然后等待 15 分钟，执行第二次测量，并计算增量差值。结果会被插入到
    `WaitStats` 表中。清单 4-4 展示了如果你计划使用此方法收集等待统计指标，可以使用的 T-SQL 脚本。


    ```

    USE [Baseline]

    GO

    -- 检查临时表是否已存在

    -- 如果存在，则删除它。

    IF EXISTS

    (

    SELECT *

    FROM tempdb.dbo.sysobjects

    WHERE ID = OBJECT_ID(N''tempdb..#ws_Capture'')

    )

    DROP TABLE #ws_Capture;

    -- 创建临时表以保存我们的第一次测量

    CREATE TABLE #ws_Capture

    (

    wst_WaitType VARCHAR(50),

    wst_WaitTime INT,

    wst_WaitingTasks INT,

    wst_SignalWaitTime INT

    );

    -- 将我们的第一次测量插入到临时表

    INSERT INTO #ws_Capture

    SELECT

    wait_type,

    wait_time_ms,

    waiting_tasks_count,

    signal_wait_time_ms

    FROM sys.dm_os_wait_stats;

    -- 等待下一次测量

    -- 在此例中，我们将等待 15 分钟

    WAITFOR DELAY ''00:15:00''

    -- 将第一次测量与新的测量合并

    -- 并计算增量差值

    -- 将结果写入 WaitStats 表

    INSERT INTO WaitStats

    SELECT

    GETDATE() AS ''DateTime'',

    DATEPART(DAY,GETDATE()) AS ''Day'',

    DATEPART(MONTH,GETDATE()) AS ''Month'',

    DATEPART(YEAR,GETDATE()) AS ''Year'',

    DATEPART(HOUR, GETDATE()) AS ''Hour'',

    DATEPART(MINUTE, GETDATE()) AS ''Minute'',

    DATENAME(DW, GETDATE()) AS ''DayOfWeek'',

    dm.wait_type AS ''WaitType'',

    dm.wait_time_ms - ws.wst_WaitTime AS ''WaitTime'',

    dm.waiting_tasks_count - ws.wst_WaitingTasks AS ''WaitingTasks'',

    dm.signal_wait_time_ms - ws.wst_SignalWaitTime AS ''SignalWaitTime''

    FROM sys.dm_os_wait_stats dm

    INNER JOIN #ws_Capture ws

    ON dm.wait_type = ws.wst_WaitType;

    -- 清理临时表

    DROP TABLE #ws_Capture;

    ```

    清单 4-4

    增量捕获方法


    ### 使用 SQL Server Agent 安排测量


    选择捕获方法后，我们需要运行捕获 T-SQL 脚本，以用等待统计信息填充我们的 `WaitStats` 表。如前面基线陷阱部分所述，始终以固定间隔执行测量非常重要。这使得比较测量结果容易得多，因为你总是在比较相同的时间段。实现此目的的最佳方法是使用设置为固定间隔的
    `SQL Server Agent` 作业。间隔可以根据你的选择设置——设置的间隔越大，你可以比较的时间段数量就越少。将间隔设置得更短会给你更多的时间段，但同时也意味着需要存储的数据量增加。我个人倾向于将间隔设置为
    15 分钟。在大多数情况下，这给了我足够的时间段进行比较。


    这里我不会详细介绍如何创建 `SQL Server Agent` 作业来捕获等待统计信息，但我想指出我的作业作为示例供你参考。我通常最终会创建一个 `SQL
    Server Agent` 作业，其中只包含一个 T-SQL 脚本步骤。在此步骤中，我根据想要使用的方法复制捕获脚本。图 4-7 显示了我的 `SQL Server
    Agent` 作业的截图。


    ![../images/340881_2_En_4_Chapter/340881_2_En_4_Fig7_HTML.jpg](img/340881_2_En_4_Fig7_HTML.jpg)


    图 4-7

    捕获 WaitStats 的 `SQL Server Agent` 作业步骤


    在此例中，我使用了重置捕获方法来将等待统计信息捕获到我的 `WaitStats` 表中。


    图 4-8 显示了我用来在固定间隔捕获等待统计信息的计划。如你所见，我将其设置为每 15 分钟一次，每天执行。


    ![../images/340881_2_En_4_Chapter/340881_2_En_4_Fig8_HTML.jpg](img/340881_2_En_4_Fig8_HTML.jpg)


    图 4-8

    `SQL Server Agent` 作业计划


    再次说明，你可以自由选择自己的捕获间隔，但请确保始终以相同的间隔时长进行捕获。


    在我们创建了 `SQL Server Agent` 作业来收集等待统计信息后，我们需要让它运行一段时间。作业运行的时间越长，我们收集的信息就越多，从而提高了我们基线的质量。

