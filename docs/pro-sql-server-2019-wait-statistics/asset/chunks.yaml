    as shown in Figure [6-23](#340881_2_En_6_Chapter.xhtml#Fig23).


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig23_HTML.jpg](images/340881_2_En_6_Chapter/340881_2_En_6_Fig23_HTML.jpg)


    Figure 6-23


    Granted Workspace Memory (KB) Perfmon counter


    Notice the spike in Figure [6-23](#340881_2_En_6_Chapter.xhtml#Fig23), which occurred
    when I executed the Ostress workload, and just as in the results in Figure [6-22](#340881_2_En_6_Chapter.xhtml#Fig22),
    the amount of memory granted was 27,136 KB.


    ### Lowering RESOURCE_SEMAPHORE Waits


    There are various possible methods you can use to lower, or even resolve, the
    wait times of the `RESOURCE_SEMAPHORE` wait type. The most obvious one would be
    adding more memory, but this can end up being an expensive solution while other
    less expensive options exist.


    The first possible solution would be to look at the queries that are requesting
    large amounts of memory for their execution. You should focus on the queries that
    are performing large sorts or joins (especially hash joins) and check whether
    you can lower the number of rows that need to be sorted or joined, or avoid the
    sort or join completely. One way to avoid a sort operation would be to add an
    index to the table where the sort is performed. If the order of values inside
    the index were the same as the sort operation, a sort operation would no longer
    be necessary, since the index would already have ordered the results.


    Another solution involves parallelism. If queries use parallelism during sort
    or join operations, more memory is requested than when the query is executed serially.
    Modifying queries so they don’t use parallelism, by either using query hints or
    changing the parallelism configuration for the whole SQL Server instance, will
    result in lower amounts of memory being required to execute the queries.


    Finally, if you are running an Enterprise Edition of SQL Server, you could use
    the resource governor feature to configure the memory usage of each resource pool.
    By configuring the amount of memory a certain resource pool can use, you can also
    set the amount of memory a resource semaphore can grant. We won’t go into detail
    about the resource governor feature in this book, but more information can be
    found on the MSDN page of the resource governor with the following hyperlink:
    [`https://msdn.microsoft.com/en-us/library/bb933866.aspx`](https://msdn.microsoft.com/en-us/library/bb933866.aspx)
    .


    ### RESOURCE_SEMAPHORE Summary


    The `RESOURCE_SEMAPHORE` wait type is related to the amount of memory a query
    needs to perform certain operations, like sorts and joins. An object, named a
    resource semaphore, is responsible for managing and throttling the memory requests
    of queries. If a query requests more memory than the resource semaphore can grant,
    the memory request will be moved into the resource semaphore queue. While the
    memory request is inside the resource semaphore queue, `RESOURCE_SEMAPHORE` wait
    times are recorded. There are various methods to lower or resolve `RESOURCE_SEMAPHORE`
    waits. You can choose to add more memory to the SQL Server instance or optimize
    the queries so sorts and joins do not require as much memory. Another option is
    using the resource governor, where you can define resource pools so as to minimize
    the impact of large memory requests.


    ## RESOURCE_SEMAPHORE_QUERY_COMPILE


    In the previous section we discussed the `RESOURCE_SEMAPHORE` wait type, which
    indicates that there is not enough free memory available for certain query operations
    like sorts and joins. Just like the `RESOURCE_SEMAPHORE` wait type, the `RESOURCE_SEMAPHORE_QUERY_COMPILE`
    wait type is also related to the memory of your SQL Server instance. But instead
    of indicating a shortage in query memory, the `RESOURCE_SEMAPHORE_QUERY_COMPILE`
    wait type indicates a memory shortage during the compilation process of the query.


    ### What Is the RESOURCE_SEMAPHORE_QUERY_COMPILE Wait Type?


    In the explanation of the `RESOURCE_SEMAPHORE` wait type, we discussed what resource
    semaphores are and what they do. For the explanation of the `RESOURCE_SEMAPHORE_QUERY_COMPILE`
    wait type, we are going to dive a little deeper into the inner workings of the
    resource semaphore.


    You should think of resource semaphores as “gateways” that throttle direct access
    to memory resources. There are different tasks a resource semaphore can do. In
    the previous section we discussed the resource semaphores that were responsible
    for granting memory for certain operations, like sorts and joins. We also noted
    that there are two resource semaphores that are responsible for granting this
    memory—the regular resource semaphore that handles queries that request 5 MB or
    more memory and the small resource semaphore that handles memory grants for queries
    that request less than 5 MB memory.


    The resource semaphores that are related to the `RESOURCE_SEMAPHORE_QUERY_COMPILE`
    wait type are responsible for memory grants that are needed during the compilation
    process of a query, excluding the memory needed for query execution. Just like
    the resource semaphores in the previous section, the ones responsible for memory
    grants during the compilation process also have different gateways. Figure [6-24](#340881_2_En_6_Chapter.xhtml#Fig24)
    shows the different gateways for the compilation-memory resource semaphore.


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig24_HTML.jpg](images/340881_2_En_6_Chapter/340881_2_En_6_Fig24_HTML.jpg)


    Figure 6-24


    Compilation-memory resource semaphore


    By default there are three gateways: small, medium, and big. Depending on the
    amount of memory the compilation of a query needs, it will get assigned to either
    of the three. If the amount of memory needed for compilation is less than the
    memory threshold for the small gateway, the query does not have to pass through
    a gateway. The amount of concurrent compilations, or queries, that can move through
    the gateway simultaneously is calculated by the number of logical processors available
    for your SQL Server instance. For example, if your SQL Server instance has four
    logical processors, the small gateway will allow 16 concurrent compilations and
    the medium gateway 4\. The big gateway will always only allow one query at a time
    to compile.


    The memory threshold for the small gateway is static, but for the medium and big
    gateways the thresholds are dynamic. This means that the compilation memory needed
    to reach the medium or big gateways can change during the runtime of your SQL
    Server instance.


    The whole purpose of these gateways is to ensure that the need for compilation
    memory stays under control. This avoids out-of-memory situations in cases where
    many large compilation-memory requests would automatically be granted and would
    drain the SQL Server instance of its memory.


    Before we continue and take a look how we can access gateway information from
    inside SQL Server, let’s go through an example of a query compilation.


    Say we have a query that needs 1560 KB of compilation memory. The query will start
    by requesting a gateway. Since our small gateway has a threshold of 370 KB and
    our medium gateway has a threshold of 5346 KB, the query will end up in the small
    gateway. If there are any queries currently in a queue at the small gateway, the
    query will enter the queue and wait until its turn, all the time logging `RESOURCE_SEMAPHORE_QUERY_COMPILE`
    wait time. While the query is getting compiled, the amount of memory used during
    the compilation is tracked; if the query ends up using more memory and reaches
    the threshold of the medium gateway, it will get moved to the medium gateway.
    When the query compilation is finished, it will be removed from the gateway.'
