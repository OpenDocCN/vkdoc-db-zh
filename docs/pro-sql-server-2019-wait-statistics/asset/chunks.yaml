    A big thanks goes out to the technical editors, Eelco Drost and Borbala Toth-Apathy.
    The comments they provided helped clarify a lot of areas inside this book and
    resulted in a far higher quality.


    Finally, a massive shout-out to the SQL Server community. You are a technical
    community that has no equal, and I am honored to be a part of it.


