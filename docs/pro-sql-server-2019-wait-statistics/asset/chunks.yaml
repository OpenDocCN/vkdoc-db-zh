  trans: '

    ### 什么是 ASYNC_IO_COMPLETION 等待类型？


    如果我们在 Books Online (BOL) 中查询 `ASYNC_IO_COMPLETION` 等待类型，会看到如下定义：“当任务等待 I/O 完成时发生。”这是一个相当简短且模糊的定义。让我们增加一些细节。当任务等待与存储相关的操作完成时，就会发生
    `ASYNC_IO_COMPLETION` 等待。该任务由 SQL Server 发起和监控。图 6-1 以视觉方式展示了这种等待类型。


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig1_HTML.jpg](img/340881_2_En_6_Fig1_HTML.jpg)


    图 6-1


    发生的 ASYNC_IO_COMPLETION 等待


    只要与存储相关的操作正在运行，`ASYNC_IO_COMPLETION` 等待时间就会被记录。正如你所想的那样，你的存储子系统越快，`ASYNC_IO_COMPLETION`
    等待时间就越低。


    正如我之前所说，通常 `ASYNC_IO_COMPLETION` 等待无需担心。它们会在许多需要访问存储子系统的 SQL Server 操作（如备份或创建新数据库）期间正常发生。但是，如果与你的基线测量值相比，等待时间超出预期，它可能就成为一个值得关注的原因。


    ### ASYNC_IO_COMPLETION 示例


    让我们通过一个示例来生成 `ASYNC_IO_COMPLETION` 等待。我们不需要任何额外的工具；仅仅运行一个数据库备份就会触发 `ASYNC_IO_COMPLETION`
    等待。


    在这个例子中，我将在我的测试服务器上执行 `AdventureWorks` 数据库的备份。


    为了执行此操作，我将使用清单 6-1 中的查询。此查询将重置 `sys.dm_os_wait_stats` DMV，执行数据库备份，然后查询 `sys.dm_os_wait_stats`
    DMV 中的 `ASYNC_IO_COMPLETION` 等待。


    ```

    USE [master]

    GO

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    BACKUP DATABASE [AdventureWorks]

    TO  DISK = N''F:\Backup\aw_backup.bak''

    WITH

    NAME = N''AdventureWorks-Full Database Backup'',

    STATS = 2;

    GO

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''ASYNC_IO_COMPLETION'';

    清单 6-1

    生成 ASYN_IO_COMPLETION 等待

    ```


    在我的测试 SQL Server 实例上，备份操作耗时 1 秒。图 6-2 显示了清单 6-1 中查询的结果。


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig2_HTML.jpg](img/340881_2_En_6_Fig2_HTML.jpg)


    图 6-2


    ASYNC_IO_COMPLETION 等待时间


    如你所见，在数据库备份的几乎整个持续时间内，都记录了 `ASYNC_IO_COMPLETION` 等待。


    ### 降低 ASYNC_IO_COMPLETION 等待


    高 `ASYNC_IO_COMPLETION` 等待时间的一个常见原因是数据库备份，正如你刚才在示例中看到的。如果你想查明你的 `ASYNC_IO_COMPLETION`
    等待是否因正在执行备份而发生，请尝试查找同时发生的与备份相关的等待。


    如果我们稍微修改清单 6-1 中最后一个 `sys.dm_os_waiting_tasks` 查询，我们将看到 DMV 返回与备份相关的等待类型：


    ```

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type IN

    (

    ''ASYNC_IO_COMPLETION'',

    ''BACKUPIO'',

    ''BACKUPBUFFER''

    );

    ```


    图 6-3 显示了经过此修改后的清单 6-1 查询结果。


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig3_HTML.jpg](img/340881_2_En_6_Fig3_HTML.jpg)


    图 6-3


    ASYNC_IO_COMPLETION 等待与备份相关等待一起出现


    如果你看到两者同时发生，很可能是数据库备份导致了你的 `ASYNC_IO_COMPLETION` 等待。


    另一种可能降低 `ASYNC_IO_COMPLETION` 等待的方法是配置 `即时文件初始化`。`即时文件初始化` 在 Windows 2003 中引入，通过消除将文件清零（在文件可以使用前向文件内写入零）的需要，极大地加速了在磁盘上分配空间的过程。这不会影响你的备份速度，但在创建数据库、向数据库添加文件或恢复数据库时，会提高性能。`即时文件初始化`
    默认情况下不启用，除非你是在具有本地管理员权限的账户下运行 SQL Server 服务。在 SQL Server 2016 的安装过程中，微软增加了一个额外的复选框，用于在
    SQL Server 安装期间启用 `即时文件初始化`，如图 6-4 所示。


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig4_HTML.jpg](img/340881_2_En_6_Fig4_HTML.jpg)


    图 6-4


    SQL Server 2016 安装程序中的“授予 SQL Server 数据库引擎服务执行卷维护任务权限”复选框


    如果你在安装 SQL Server 2016 或更高版本时没有启用“授予 SQL Server 数据库引擎服务执行卷维护任务权限”复选框，或者安装的是较低版本的
    SQL Server，则需要在安装后手动配置 `即时文件初始化`。配置 `即时文件初始化` 的方法是通过在 SQL Server 运行的计算机上设置本地安全策略，将你的
    SQL Server 服务运行所用的账户添加进去。


    你可以通过在“控制面板”的“管理工具”下打开“本地安全策略”MMC 来找到此策略。展开“本地策略”➤“用户权限分配”文件夹，向下滚动到“执行卷维护任务”策略，如图
    6-5 所示。


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig5_HTML.jpg](img/340881_2_En_6_Fig5_HTML.jpg)


    图 6-5


    “执行卷维护任务”本地策略


    双击该策略将其打开，然后添加你的 SQL Server 服务运行所用的账户。最后一步是重启你的 SQL Server 服务。重启后，SQL Server 就可以使用
    `即时文件初始化` 了。


    为了向你展示 `即时文件初始化` 的影响，我使用了清单 6-2 中的查询。此查询先清空 `sys.dm_os_wait_stats` DMV，然后创建一个包含
    500 MB 数据文件和 100 MB 日志文件的新数据库。接着查询 `sys.dm_os_wait_stats` DMV 中的 `ASYNC_IO_COMPLETION`
    等待类型。

    '
- fmt: '## ASYNC_IO_COMPLETION


    ```

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    CREATE DATABASE [IO_test]

    ON  PRIMARY

    (

    NAME = N''IO_test'', FILENAME = N''E:\Data\IO_test.mdf'' , SIZE = 512000KB , FILEGROWTH
    = 10%

    )

    LOG ON

    (

    NAME = N''IO_test_log'', FILENAME = N''E:\Log\IO_test_log.ldf'' , SIZE = 102400KB
    , FILEGROWTH = 10%

    );

    GO

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''ASYNC_IO_COMPLETION'';

    Listing 6-2

    Measure the impact of instant file initialization on ASYNC_IO_COMPLETION waits

    ```


    Figure 6-6 shows the wait statistics information both before and after configuring
    instant file initialization.


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig6_HTML.jpg](images/340881_2_En_6_Chapter/340881_2_En_6_Fig6_HTML.jpg)


    Figure 6-6: Impact of instant file initialization on `ASYNC_IO_COMPLETION` waits.


    Even for this relatively small database the gain of using instant file initialization
    is pretty big, as you can see in the difference in wait times. Before enabling
    instant file initialization, the query in Listing 6-2 took 11 seconds to complete;
    after the change it went down to 2 seconds.


    If you configured instant file initialization and checked that no backups are
    being performed at the same time that you are seeing high `ASYNC_IO_COMPLETION`
    waits, the problem might be your storage subsystem. A good method of analyzing
    potential storage problems is by using Perfmon to monitor the `Avg. Disk/sec Read`
    and `Avg. Disk/sec Write` counters on the disks on which your database resides,
    as shown in Figure 6-7. These counters show you the read and write latency to
    your disks in seconds (this means a value of 0.005 means 5 milliseconds). SQL
    Server performs optimally with a maximum latency of 5 milliseconds. Above 20 milliseconds,
    latency will cause noticeable performance degradation. The higher the latency
    value, the higher the wait time of storage-related wait types will be.


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig7_HTML.jpg](images/340881_2_En_6_Chapter/340881_2_En_6_Fig7_HTML.jpg)


    Figure 6-7: `Avg. Disk sec/Read` and `Avg. Disk sec/Write` Perfmon counters.


    Be careful about jumping to conclusions regarding your storage performance. Always
    talk to your storage administrator (if you have one) and show him/her your measurements
    before you decide the storage subsystem is the bottleneck. Storage is the domain
    of the storage administrator, and he/she can help you analyze and resolve performance
    problems.


    ## ASYNC_IO_COMPLETION Summary


    The `ASYNC_IO_COMPLETION` wait type occurs when you perform actions related to
    the storage subsystem from inside your SQL Server instance, most notably database
    backups and the creation of new databases. While `ASYNC_IO_COMPLETION` waits are
    completely normal, they can indicate storage-related problems if wait times are
    higher than normal. Before you run to your storage administrator, make sure there
    is actually a performance problem. One possible way to do this is by checking
    your storage latency, as high latency values will impact `ASYNC_IO_COMPLETION`
    wait times as well. Also check whether the higher `ASYNC_IO_COMPLETION` wait times
    are directly related to database backups being performed. One great method to
    lower `ASYNC_IO_COMPLETION` wait times is by enabling instant file initialization
    by adding your SQL Server service account to the Perfmon volume maintenance tasks
    local policy.


    ## ASYNC_NETWORK_IO


    Just like the `ASYNC_IO_COMPLETION` wait type, the `ASYNC_NETWORK_IO` wait type
    is related to throughput. But instead of storage subsystem throughput, the `ASYNC_NETWORK_IO`
    wait type is related to the throughput of your network connection between your
    SQL Server instance and your clients. Again, seeing wait times for this specific
    wait type does not necessarily mean there is a network-related issue, since `ASYNC_NETWORK_IO`
    waits always occur, even if you query your SQL Server instance on the SQL Server
    itself.


    ## What Is the ASYNC_NETWORK_IO Wait Type?


    `ASYNC_NETWORK_IO` waits usually occur when client applications cannot process
    the query results fast enough, or when you have a network-related performance
    problem. The former will in most cases be the most likely, since many applications
    process SQL Server results on a row-by-row basis, or simply cannot handle the
    amount of data. This forces the SQL Server to wait on sending query results across
    the network. While SQL Server is waiting to send the requested data, the `ASYNC_NETWORK_IO`
    wait type is logged. Another situation in which `ASYNC_NETWORK_IO` waits can occur
    is when you are using a linked server to query remote databases. Figure 6-8 shows
    a graphical representation of this.


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig8_HTML.jpg](images/340881_2_En_6_Chapter/340881_2_En_6_Fig8_HTML.jpg)


    Figure 6-8: `ASYNC_NETWORK_IO`.


    ## ASYNC_NETWORK_IO Example


    Showing an example of the `ASYNC_NETWORK_IO` wait type doesn’t require a complicated
    test environment. Listing 6-3 shows a query that will generate `ASYNC_NETWORK_IO`
    waits when run against my test SQL Server instance from another computer using
    SQL Server Management Studio, which should be enough. The query is going to clear
    the `sys.dm_os_wait_stats` DMV, then perform the actual query against the `AdventureWorks`
    database. The last statement will show us the wait times of the `ASYNC_NETWORK_IO`
    wait type.


    ```

    DBCC SQLPERF (''sys.dm_os_wait_stats'', CLEAR);

    SELECT *

    FROM Person.Person;

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''ASYNC_NETWORK_IO'';

    Listing 6-3

    Generate ASYNC_NETWORK_IO waits

    ```


    Figure 6-9 shows the wait times for the `ASYNC_NETWORK_IO` wait type.


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig9_HTML.jpg](images/340881_2_En_6_Chapter/340881_2_En_6_Fig9_HTML.jpg)


    Figure 6-9: `ASYNC_NETWORK_IO` wait times.


    In this example, the results of the query against the `AdventureWorks` database
    couldn’t be processed by the SQL Server Management Studio application as fast
    as the SQL Server instance supplied the results, and `ASYNC_NETWORK_IO` waits
    occurred.'
