- fmt: '## Analyzing Wait Statistics on a Per-Query Basis Using Execution Plans


    So far we have mostly looked at aggregated wait times that were generated by either
    various background processes or by the queries we executed. Since I was the only
    one that was executing queries against my test machine, it is very easy to correlate
    wait times to my specific queries. Unfortunately, on busy systems where many queries
    are constantly being executed by a large number of sessions, the various wait
    statistics DMVs are almost useless to analyze wait types and wait times for specific
    queries.


    Thankfully, the release of SQL Server 2016 SP1 changed that scenario and introduced
    wait statistics capture inside query execution plans! This means you can easily
    see what wait types and wait times your query encountered while running. Even
    though it might seem obvious, this means that per-query wait statistics are only
    available when looking at the actual execution plan, not the estimated execution
    plan.


    The actual execution plan is the execution plan that was used during the execution
    of the query. There is an option in SQL Server Management Studio to look at the
    estimated execution plan. When used, the SQL Server engine compiles the execution
    plan which is most likely to be used during the query’s execution; however, it
    does not actually execute the query itself. Since there is no query execution,
    there are also no wait statistics to record while compiling the estimated execution
    plan.


    The easiest way to expose per-query wait statistics is by enabling the `Include
    Actual Execution Plan` option, shown in Figure [2-26](#340881_2_En_2_Chapter.xhtml#Fig26),
    by clicking the “Query – Include Actual Execution Plan” menu item or by using
    the key combination `CTRL_M`, and then executing your query.


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig26_HTML.jpg](images/340881_2_En_2_Chapter/340881_2_En_2_Fig26_HTML.jpg)


    Figure 2-26

    `Include Actual Execution Plan` option


    When you execute your query with the `Include Actual Execution Plan` option enabled,
    your query results will return with an additional tab called `Execution plan`.
    Clicking the tab will return the visual representation of the execution plan that
    was used while executing your query. Figure [2-27](#340881_2_En_2_Chapter.xhtml#Fig27)
    shows an example of an actual execution plan.


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig27_HTML.jpg](images/340881_2_En_2_Chapter/340881_2_En_2_Fig27_HTML.jpg)


    Figure 2-27

    `Execution plan`


    With the actual execution plan opened, we can access the per-query wait statistics
    by right-clicking the first operator, which in the case of Figure [2-28](#340881_2_En_2_Chapter.xhtml#Fig28)
    is the `SELECT` operator, and selecting `Properties`. This will open up the execution
    plan properties window inside SQL Server Management Studio and reveals a wealth
    of information, like the degree of parallelism used or the number of rows processed,
    about the query execution and the various properties of the operator we selected.


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig28_HTML.jpg](images/340881_2_En_2_Chapter/340881_2_En_2_Fig28_HTML.jpg)


    Figure 2-28

    `Execution plan properties`


    Since we are interested in wait statistics, the most interesting part of the execution
    plan properties is recorded all the way at the bottom of the properties window.
    When expanding the `WaitStats` properties you are able to see all of the wait
    types, and wait times, this specific query ran into while executing. Figure [2-29](#340881_2_En_2_Chapter.xhtml#Fig29)
    shows the per-query wait statistics for this specific example query.


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig29_HTML.jpg](images/340881_2_En_2_Chapter/340881_2_En_2_Fig29_HTML.jpg)


    Figure 2-29

    Per-query wait statistics in the `Execution plan properties`


    In this case our query encountered three different wait types while executing:
    `PAGEIOLATCH_SH`, `MEMORY_ALLOCATION_EXT` and `ASYNC_NETWORK_IO`. For each of
    these wait types you can see how much time was spend waiting, and how many times
    we waited on the wait type. This information can be very useful when looking at
    what an individual query encounters in terms of wait statistics during its execution,
    and perhaps, can give you some insights in how you can tune the performance of
    the query. For instance, if you see that a query frequently runs into storage-related
    wait statistics, it might be worth it to investigate how you can minimize storage
    access for that specific query so it can execute faster.


    One thing that I like to point out again, the per-query wait statistics are only
    recorded in the actual execution plan! The reason why I mention this again is
    that the actual execution plan is only available by enabling it before execution
    of a query. There is no other way to access an actual execution plan, not even
    through the Query Store as we will see in the next chapter. As a matter of fact,
    the execution plans that are stored in the plan cache of SQL Server are the estimated
    execution plans and not the actual plans. This means that if you are expecting
    to retrieve per-query wait statistics through the plan cache you are going to
    be disappointed.


    Thankfully, even though the Query Store feature does not record the actual execution
    plan, it does (with the release of SQL Server 2017) record wait statistics, and
    other query runtime information, together with the estimated execution plan. Mixing
    that information together means that through the Query Store we can look back
    in time and see what queries encountered in terms of wait statistics!


    ## Summary


    In this chapter we reviewed the various ways we can access information about wait
    statistics. We took an in-depth look at some of the most important DMVs regarding
    wait statistics: `sys.dm_os_wait_stats`, `sys.dm_os_waiting_tasks`, `sys.dm_exec_requests`,
    and `sys.dm_exec_session_wait_stats`. I described their functions and the data
    they returned, and gave you some example queries you can use against those DMVs.
    We also went through an example scenario where we combined some of the DMVs to
    analyze what was slowing down the SQL Server in the example. The steps shown in
    the example are a good way to analyze performance problems on your system when
    they are occurring. Briefly, we looked at the Windows Performance Monitor, or
    `Perfmon`, and how you can access wait statistics information from inside it.
    After that we took a good look at Extended Events and how you can use them to
    capture wait-related information for specific queries or sessions using the Extended
    Events GUI or `T-SQL`. We ended the chapter by looking at execution plan recorded
    wait statistics.


    # 3. The Query Store


    With the release of SQL Server 2016, Microsoft introduced an entirely new method
    to analyze and troubleshoot query performance: the Query Store. The Query Store
    is often marketed as the “flightrecorder” of SQL Server in that it gives insights
    into when queries are being executed, how well they performed, and what execution
    plan was used during execution of the query. While the Query Store did not initially
    expose wait statistics that were encountered during query execution, the release
    of SQL Server 2017 included that much awaited addition.


    Since the Query Store is such a gamechanger in terms of query performance analysis
    and tuning, I believe it deserves some additional attention so you can get the
    most from this feature.'
