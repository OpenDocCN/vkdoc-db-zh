    ## 调度器、任务和工作线程


    由于 SQLOS 使用与 Windows 操作系统不同的方法来执行请求，SQL Server 引入了一种不同的方式来调度处理器时间，使用调度器、任务和工作线程。图
    1-5 展示了 SQL Server 调度的不同部分以及它们之间的关系。


    ![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig5_HTML.jpg](img/340881_2_En_1_Fig5_HTML.jpg)


    图 1-5

    SQL Server 调度


    ### 会话


    一个*会话*是客户端与其连接的 SQL Server 之间建立的连接（在成功通过身份验证之后）。我们可以通过使用以下查询查询 `sys.dm_exec_sessions`
    DMV 来轻松访问会话信息：


