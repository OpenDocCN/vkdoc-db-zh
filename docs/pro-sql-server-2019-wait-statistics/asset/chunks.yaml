  trans: '## 等待统计基线分析


    在让 SQL Server 代理作业收集了一段时间的等待统计指标后，我们现在已准备好实际创建一些基线。我们的方法是查询之前创建的 `WaitStats` 表。我将给你一些创建基线的查询示例，以便你进行对比；不过，这些并非唯一可运行的查询，我鼓励你尝试不同的查询来返回你最感兴趣的信息。


    在开始构建基线之前，我想回到第 2 章“查询 SQL Server 等待统计”中的图 2-14。在那个流程图中，我向你展示了分析当前正在发生的资源等待可以采取的步骤。既然我们现在能够访问基线，就可以在流程图中添加一个额外的步骤。图
    4-9 展示了如何完善该流程图，包括基线比较步骤。


    ![../images/340881_2_En_4_Chapter/340881_2_En_4_Fig9_HTML.jpg](img/340881_2_En_4_Fig9_HTML.jpg)


    ### 图 4-9

    完整的等待统计性能分析流程图


    你创建的基线是调查性能问题时，对你所收集指标的一个额外输入。它们是一个非常有价值的输入，因为它们将向你展示问题未发生时的信息。


    让我们通过一个例子来走一遍流程，再次以 DBA Jim 为例，回顾图 4-9 所示流程图的所有步骤。在这个例子中，我将向你展示针对 `WaitStats`
    表的查询，以构建对性能分析过程有用的基线。


    周二上午 9 点左右，DBA Jim 接到电话，称针对销售数据库的日常报表比平时慢了很多。问题大约在上午 8 点开始，用户仍在经历性能问题。这些报表是计划作业的一部分，每个工作日从上午
    8 点开始运行。


    Jim 首先使用以下查询动态管理视图 `sys.dm_os_waiting_tasks`：


    ```sql

    SELECT * FROM sys.dm_os_waiting_tasks

    ORDER BY session_id ASC;

    ```


    Jim 关注的是用户会话（通常 ID 高于 50），但他没有看到任何用户会话有很长的等待时间，如图 4-10 所示。


    ![../images/340881_2_En_4_Chapter/340881_2_En_4_Fig10_HTML.jpg](img/340881_2_En_4_Fig10_HTML.jpg)


    ### 图 4-10

    sys.dm_os_waiting_tasks


    在多次执行对 `sys.dm_os_waiting_tasks` DMV 的查询后，Jim 注意到每次查询该 DMV 时都会返回等待类型 `PAGEIOLATCH_SH`。每次返回的会话
    ID 不同，但等待时间相对较短。


    Jim 使用相同的 T-SQL 脚本将等待统计指标捕获到 `WaitStats` 表中，正如本章前面所讨论的那样。由于 Jim 可以访问历史等待统计信息，他决定为
    `PAGEIOLATCH_SH` 等待时间创建一个基线。他首先做的是查看今天 `PAGEIOLATCH_SH` 的等待时间，筛选显示上午 8 点到 9 点之间捕获的测量值，使用如代码清单
    4-5 所示的查询。


    ```sql

    -- 今天上午 8 点到 9 点之间的 PAGEIOLATCH_SH 等待

    SELECT

    CONVERT(VARCHAR(5), ws_DateTime, 108) AS ''时间'',

    ws_WaitTime AS ''等待时间''

    FROM WaitStats

    WHERE ws_WaitType = ''PAGEIOLATCH_SH''

    AND (ws_Hour >= 8 AND ws_Hour < 9)

    AND CONVERT(VARCHAR(5), ws_DateTime, 105) = CONVERT(VARCHAR(5), GETDATE(), 105)

    ```


    **代码清单 4-5**

    显示今天上午 8 点到 9 点之间 `PAGEIOLATCH_SH` 的等待时间


    查询返回的结果如图 4-11 所示。


    ![../images/340881_2_En_4_Chapter/340881_2_En_4_Fig11_HTML.jpg](img/340881_2_En_4_Fig11_HTML.jpg)


    ### 图 4-11

    今天 `PAGEIOLATCH_SH` 的等待时间


    现在 Jim 已经获得了 `PAGEIOLATCH_SH` 等待类型今天的等待时间，下一步是从 `PAGEIOLATCH_SH` 等待类型的历史测量值创建基线，以便将今天的测量值与基线进行比较。Jim
    使用如代码清单 4-6 所示的查询来构建他的基线。


    ```sql

    -- 工作日上午 8 点到 9 点之间的基线

    -- 不包括今天进行的测量

    SELECT

    CONVERT(VARCHAR(5), ws_DateTime, 108) AS ''时间'',

    AVG(ws_WaitTime) AS ''基线''

    FROM WaitStats

    WHERE ws_WaitType = ''PAGEIOLATCH_SH''

    AND ws_DayOfWeek IN (''Monday'', ''Tuesday'', ''Wednesday'', ''Thursday'',''Friday'')

    AND (ws_Hour >= 8 AND ws_Hour < 9)

    AND CONVERT(VARCHAR(5), ws_DateTime, 105) < CONVERT(VARCHAR(5), GETDATE(), 105)

    GROUP BY CONVERT(VARCHAR(5), ws_DateTime, 108);

    ```


    **代码清单 4-6**

    `PAGEIOLATCH_SH` 基线


    此查询构建的基线具有以下特征：返回在工作日上午 8 点到 9 点之间捕获的 `PAGEIOLATCH_SH` 等待类型的平均等待时间，不包括今天。排除今天的原因是今天在性能问题发生期间进行的测量可能会影响平均值。另一个建议可能是仅筛选最近
    *x* 周内捕获的数据，以限制需要计算平均值的数据量。


    代码清单 4-6 所示查询的结果如图 4-12 所示。


    ![../images/340881_2_En_4_Chapter/340881_2_En_4_Fig12_HTML.jpg](img/340881_2_En_4_Fig12_HTML.jpg)


    ### 图 4-12

    `PAGEIOLATCH_SH` 基线


    正如你对比图 4-11 和 4-12 中的等待时间时立即能看到的那样，今天进行的测量值远高于历史基线中的值。为了更容易看出差异，我创建了两个测量值的图表，如图
    4-13 所示。


    ![../images/340881_2_En_4_Chapter/340881_2_En_4_Fig13_HTML.png](img/340881_2_En_4_Fig13_HTML.png)


    ### 图 4-13

    `PAGEIOLATCH_SH` 等待类型的基线比较图


    由于 `PAGEIOLATCH_SH` 等待类型的基线与今天之间的等待时间差异如此之大，Jim 认为 `PAGEIOLATCH_SH` 等待类型需要进一步调查。


    我们将在第 9 章“与 Latch 相关的等待类型”中详细探讨 `PAGEIOLATCH_SH` 等待类型，但为了给你一个（非常）简短的解释，较长的 `PAGEIOLATCH_SH`
    等待可能表明存储问题。


    为了进一步调查，Jim 启动了 Windows 性能监视器，以查看与存储子系统相关的指标，特别是磁盘延迟计数器。如图 4-14 所示，数据库数据文件所在磁盘的延迟峰值达到了非常高的数值，超过
    4000 毫秒！为了使 SQL Server 达到最佳性能，磁盘延迟应尽可能低，至少低于 20 毫秒。


    ![../images/340881_2_En_4_Chapter/340881_2_En_4_Fig14_HTML.jpg](img/340881_2_En_4_Fig14_HTML.jpg)


    ### 图 4-14

    磁盘读取延迟'
- fmt: 'With both the wait statistics baseline information and the `Perfmon` metrics,
    Jim believes the problem is storage related and contacts the storage administrator.
    The metrics Jim collected also help the storage administrator, since he can compare
    his storage-related measurements against those Jim supplied. The storage administrator
    confirms there is a problem related to the disk that contains the sales database,
    and solves the problem by replacing a faulty disk in the disk array. After the
    disk gets replaced, the disk latency returns to a 6 milliseconds average, and
    the high latency peaks disappear. Jim queries the wait times again from the `WaitStats`
    table after the disk is replaced and notices the wait times for the `PAGEIOLATCH_SH`
    wait type are close to the baseline values again. Users also inform Jim that the
    reports are running normally again.


    During this example Jim went through all the steps of the wait statistics performance-analysis
    flowchart shown in Figure [4-9](#340881_2_En_4_Chapter.xhtml#Fig9):


    1.  Users experience performance degradation while running reports.

    2.  Jim queries the `sys.dm_os_waiting_tasks` DMV to find out if there are high
    wait times or frequently recurring wait types. The `PAGEIOLATCH_SH` wait type
    seems to be recurring frequently.

    3.  Jim gathers metrics by capturing the `PAGEIOLATCH_SH` wait times of today
    and comparing them to the baseline. He also gathers additional metrics from `Perfmon`.

    4.  All the metrics show Jim that the problem is most likely storage related,
    and Jim contacts the storage administrator.

    5.  The storage administrator replaces a broken disk in the array. Storage latency
    values drop to 6 milliseconds.

    6.  Jim checks the wait times of the `PAGEIOLATCH_SH` wait type again and confirms
    that they are close to the baseline values.


    Even though this example might seem very simple, it is actually based on a performance
    problem I encountered in the real world. Using the steps from the wait statistics
    performance-analysis flowchart combined with the baseline metrics, I was able
    to identify and solve the problem very quickly.


    In the example I showed you the query in Listing [4-6](#340881_2_En_4_Chapter.xhtml#PC7)
    that creates a baseline for the `PAGEIOLATCH_SH` wait type. This query is just
    an example of what you can use against the `WaitStats` table. You can modify it
    to suit your own needs; for instance, you can choose to not limit the results
    for weekdays, and only show average wait times captured on a specific day. Or
    you could request the actual wait times on a specific date.


    If you are capturing wait statistics measurements for a long period of time, it
    might be a good idea to split the results into multiple tables for easier and
    faster querying. For instance, you could use the following query to insert all
    the wait statistics measurements done in March into their own table:


    ```sql

    SELECT *

    INTO WaitStats_March

    FROM WaitStats

    WHERE ws_Month = 3;

    ```


    This also gives us options to compare specific wait times during different periods
    of time by joining the different tables together. Figure [4-15](#340881_2_En_4_Chapter.xhtml#Fig15)
    shows the tables of my baseline database that I usually end up with, sorting the
    data per month.


    ![../images/340881_2_En_4_Chapter/340881_2_En_4_Fig15_HTML.jpg](images/340881_2_En_4_Chapter/340881_2_En_4_Fig15_HTML.jpg)


    Figure 4-15: Wait statistics measurement split per month.


    You can decide how you want to split the measurements yourself; maybe you want
    to store the wait statistics measurements in a separate table for every application
    version you use, or store all the measurements of a specific wait type in a separate
    table. The choice is yours.


    This chapter hopefully gave you some ideas on how to store wait statistics measurements
    and create baselines from those measurements. I tried to avoid telling you exactly
    what to do and how to do it, because I believe one single approach doesn’t work
    for everybody. You will need to write and adjust your own queries to create the
    baselines you are interested in, but I hope this chapter showed you the foundations
    to further build upon.


    ## Summary


    In this chapter we took a close look at baselines from both a theoretical and
    a practical point of view. Baselines are incredibly important for any type of
    performance analysis you perform. In the case of wait statistics, baselines are
    frequently required if you want to troubleshoot SQL Server–related performance
    problems. Since wait statistics are unique for your system, there is only one
    method by which to compare wait times—baselines.


    I gave you some examples and T-SQL scripts to create your own wait statistics
    baseline table so you can start capturing wait statistics information right now.
    We also went through an example of how you can query that baseline information
    and compare it to actual measurements to troubleshoot a performance-related incident.


    # Part II: Wait Types


    # 5. CPU-Related Wait Types


    Processors have evolved enormously in the last few decades, and processor manufacturers,
    like Intel or AMD, manage to build faster processors on a yearly basis. And while
    the speed of processors is hitting a ceiling, the number of cores manufacturers
    manage to build inside their processors has only grown. At the time of writing
    this book, you can buy a single processor with 24 cores inside to power your system.
    Processors are also one of the more difficult parts of your system to replace.
    While you can expand your system’s memory relatively simply, replacing a processor
    for one that is faster or has more cores frequently requires you to change your
    system’s motherboard as well due to CPU socket incompatibility. This means we
    are usually stuck with our processors until we replace the system altogether.


    Processors are also very important for SQL Server. Higher processor speeds will
    accelerate processor-related instructions, and more cores means more schedulers
    that SQL Server can use to execute requests. But even all these upgrades in speed
    and cores cannot prevent the fact that we sometimes have to wait on processor
    resources. In this chapter we will take a look at some of those wait types that
    have a relation with your system’s processor.


    ## CXPACKET


    The first CPU-related wait type is also the most common wait type in SQL Server
    instances that run with the default, out-of-the-box, SQL Server configuration.
    It is also one of the most misunderstood wait types and sometimes doesn’t even
    need lowering in order to make your queries perform faster; as a matter of fact,
    lowering `CXPACKET` wait times can sometimes degrade the performance of your queries!
    If you are running SQL Server 2016 SP2 or SQL Server 2017, there have been some
    changes in how to handle `CXPACKET` waits. We will discuss the impact of the changes,
    including the new parallelism-related wait type `CXCONSUMER`, at the end of this
    section.'
