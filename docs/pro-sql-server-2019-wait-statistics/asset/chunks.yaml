    This is not true for log records inside the log buffer. As soon as your transaction
    commits, and that transaction has an active log record in the log buffer, all
    the log records inside that log buffer are written (or flushed) to the transaction
    log on disk. But this doesn’t only occur when the transaction is committed. The
    log buffer has a fixed size of 60 KB, and as soon as the log buffer is full, it
    will flush all the records inside it to the transaction log.


    Let’s add both wait types we are discussing in this section to the story. The
    `WRITELOG` wait type occurs whenever SQL Server is flushing the contents of the
    log buffer to the transaction log on disk. The `LOGBUFFER` wait type occurs when
    inserting log records in the log buffer, when at the time of insertion SQL Server
    has to wait for free space inside the log buffer. I have added both the wait types
    at the parts where they can get generated in Figure [6-17](#340881_2_En_6_Chapter.xhtml#Fig17).


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig17_HTML.jpg](images/340881_2_En_6_Chapter/340881_2_En_6_Fig17_HTML.jpg)


    Figure 6-17


    Transaction movement and the LOGBUFFER and WRITELOG wait types


    You can now probably see how both wait types are related. Whenever a long `WRITELOG`
    wait occurs, chances are you will also see `LOGBUFFER` waits if the process that
    is writing the log records to the transaction log on disk cannot process them
    as fast as the log records enter the log buffer.


    This situation frequently occurs on systems with a lot of concurrent data modifications.
    This results in a high volume of transactions that need to be written to disk.
    Another common cause is the performance of the storage subsystem where the transaction
    log file resides. If the storage subsystem has suboptimal performance, your `WRITELOG`
    wait times will increase, with the possibility existing that `LOGBUFFER` waits
    can occur if the volume of transactions is high enough.


    The performance of your transaction log is critical for the performance of your
    entire database. Slow transaction log performance will have an impact on every
    change you perform inside your database, as every modification has to be written
    to the transaction log before it can get committed.


    ### LOGBUFFER and WRITELOG Example


    To give you an example of LOGBUFFER and WRITELOG waits occurring, I am creating
    a new database using the script in Listing [6-6](#340881_2_En_6_Chapter.xhtml#PC8).


    ```

    USE master

    GO

    -- Create demo database

    CREATE DATABASE [trans_demo]

    ON PRIMARY

    (

    NAME = N''trans_demo'', FILENAME = N''D:\Data\trans_demo.mdf'' , SIZE = 153600KB
    , FILEGROWTH = 10%

    )

    LOG ON

    (

    NAME = N''trans_demo_log'', FILENAME = N''D:\Log\trans_demo.ldf'' , SIZE = 51200KB
    , FILEGROWTH = 10%

    )

    GO

    -- Make sure recovery model is set to full

    ALTER DATABASE [trans_demo] SET RECOVERY FULL

    GO

    -- Perform full backup first

    -- Otherwise FULL recovery model will not be affected

    BACKUP DATABASE [trans_demo]

    TO  DISK = N''F:\Backup\trans_demo_Full.bak''

    GO

    -- Create a simple test table

    USE trans_demo

    GO

    CREATE TABLE transactions

    (

    t_guid VARCHAR(50)

    )

    GO

    Listing 6-6

    Create trans_demo database

    ```


    Now that we have created a brand new database, I am going to use the Ostress utility
    to generate load against the `trans_demo` database. I am going to execute the
    query in Listing [6-7](#340881_2_En_6_Chapter.xhtml#PC9), which I saved to the
    `logbuffer_impl.sql` file, with 200 concurrent connections using the following
    command `"C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -E -dtrans_demo
    -i"C:\logbuffer_impl.sql" -n200 -r1 -q`.


    ```

    DECLARE @i INT

    SET @i = 1

    WHILE @i < 10000

    BEGIN

    INSERT INTO transactions

    (t_guid)

    VALUES

    (newid())

    SET @i = @i + 1

    END

    Listing 6-7

    Insert rows inside the trans_demo database

    ```


    Before I started the Ostress utility, I cleared the `sys.dm_os_wait_stats` DMV.


    After about 1 minute on my test SQL Server, the Ostress utility finished executing
    the workload. If I query the `sys.dm_os_wait_stats` DMV and look for the `LOGBUFFER`
    and `WRITELOG` wait types, I get the results shown in Figure [6-18](#340881_2_En_6_Chapter.xhtml#Fig18).


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig18_HTML.jpg](images/340881_2_En_6_Chapter/340881_2_En_6_Fig18_HTML.jpg)


    Figure 6-18


    WRITELOG and LOGBUFFER waits'
  trans: '

    ### 什么是 LOGBUFFER 和 WRITELOG 等待类型？


    要理解 `LOGBUFFER` 和 `WRITELOG` 这些等待类型代表什么，我们需要对 SQL Server 如何写入事务日志有所了解。简而言之，每当我们在数据库内部更改或添加数据时，会发生以下事件：


    1.  数据所在的数据页在缓冲区缓存中被修改；如果该页尚未在缓冲区缓存中，则会首先将其读入缓冲区缓存。

    2.  该数据页将在缓冲区缓存中被标记为“脏页”。

    3.  表示此次修改的日志记录被保存在日志缓冲区中。

    4.  发生日志刷新（这可能出于多种原因，我们稍后讨论），将日志记录从日志缓冲区写入事务日志。

    5.  脏数据页被写入数据文件。


    为了展示这一行为，我提供了图 6-16。


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig16_HTML.jpg](img/340881_2_En_6_Fig16_HTML.jpg)

    **图 6-16**

    **事务移动过程**


    代表脏数据页移动的操作以及将日志记录写入事务日志的操作以虚线显示。我特意这样做是为了说明这两个操作并不一定会直接发生。


    如你所知，脏数据页首先在缓冲区缓存中更新，只有在发生检查点操作时才会写入数据文件。这意味着即使在你的事务提交后，脏页仍可能驻留在内存中。


    对于日志缓冲区中的日志记录，情况则不同。一旦你的事务提交，并且该事务在日志缓冲区中有活动的日志记录，该日志缓冲区内的所有日志记录都会被写入（或刷新）到磁盘上的事务日志中。但这不仅仅发生在事务提交时。日志缓冲区的固定大小为
    60 KB，一旦日志缓冲区已满，它将刷新其中的所有记录到事务日志。


    现在让我们把本节讨论的两种等待类型加入这个故事中。每当 SQL Server 正在将日志缓冲区的内容刷新到磁盘上的事务日志时，就会发生 `WRITELOG`
    等待类型。当在日志缓冲区中插入日志记录时，如果插入时 SQL Server 必须等待日志缓冲区中的可用空间，则会发生 `LOGBUFFER` 等待类型。我在图
    6-17 中它们可能产生的位置添加了这两种等待类型。


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig17_HTML.jpg](img/340881_2_En_6_Fig17_HTML.jpg)

    **图 6-17**

    **事务移动以及 LOGBUFFER 和 WRITELOG 等待类型**


    你现在可能能看出这两种等待类型是如何关联的了。每当发生长时间的 `WRITELOG` 等待时，如果正在将日志记录写入磁盘上事务日志的进程处理速度跟不上日志记录进入日志缓冲区的速度，你很可能也会看到
    `LOGBUFFER` 等待。


    这种情况经常发生在具有大量并发数据修改的系统上。这导致需要写入磁盘的事务量很高。另一个常见原因是事务日志文件所在的存储子系统的性能。如果存储子系统性能不佳，你的
    `WRITELOG` 等待时间将会增加，并且如果事务量足够高，还有可能发生 `LOGBUFFER` 等待。


    事务日志的性能对整个数据库的性能至关重要。缓慢的事务日志性能将对你在数据库内部执行的每一个更改产生影响，因为每一次修改都必须在提交前写入事务日志。


    ### LOGBUFFER 和 WRITELOG 示例


    为了给你一个 `LOGBUFFER` 和 `WRITELOG` 等待发生的示例，我使用清单 6-6 中的脚本创建一个新数据库。


    ```

    USE master

    GO

    -- Create demo database

    CREATE DATABASE [trans_demo]

    ON PRIMARY

    (

    NAME = N''trans_demo'', FILENAME = N''D:\Data\trans_demo.mdf'' , SIZE = 153600KB
    , FILEGROWTH = 10%

    )

    LOG ON

    (

    NAME = N''trans_demo_log'', FILENAME = N''D:\Log\trans_demo.ldf'' , SIZE = 51200KB
    , FILEGROWTH = 10%

    )

    GO

    -- Make sure recovery model is set to full

    ALTER DATABASE [trans_demo] SET RECOVERY FULL

    GO

    -- Perform full backup first

    -- Otherwise FULL recovery model will not be affected

    BACKUP DATABASE [trans_demo]

    TO  DISK = N''F:\Backup\trans_demo_Full.bak''

    GO

    -- Create a simple test table

    USE trans_demo

    GO

    CREATE TABLE transactions

    (

    t_guid VARCHAR(50)

    )

    GO

    ```

    **清单 6-6**

    **创建 trans_demo 数据库**


    既然我们已经创建了一个全新的数据库，我将使用 Ostress 工具对 `trans_demo` 数据库生成负载。我将执行清单 6-7 中的查询（我将其保存到
    `logbuffer_impl.sql` 文件），使用以下命令通过 200 个并发连接运行：`"C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe"
    -E -dtrans_demo -i"C:\logbuffer_impl.sql" -n200 -r1 -q`。


    ```

    DECLARE @i INT

    SET @i = 1

    WHILE @i < 10000

    BEGIN

    INSERT INTO transactions

    (t_guid)

    VALUES

    (newid())

    SET @i = @i + 1

    END

    ```

    **清单 6-7**

    **在 trans_demo 数据库中插入行**


    在启动 Ostress 工具之前，我清除了 `sys.dm_os_wait_stats` DMV。


    在我的测试 SQL Server 上大约 1 分钟后，Ostress 工具执行完了工作负载。如果我查询 `sys.dm_os_wait_stats` DMV
    并查找 `LOGBUFFER` 和 `WRITELOG` 等待类型，我会得到如图 6-18 所示的结果。


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig18_HTML.jpg](img/340881_2_En_6_Fig18_HTML.jpg)

    **图 6-18**

    **WRITELOG 和 LOGBUFFER 等待**

    '
- fmt: '### Lowering LOGBUFFER and WRITELOG Waits


    There are generally two approaches you can take to lowering `LOGBUFFER` and `WRITELOG`
    waits, keeping in mind though that `WRITELOG` waits do also occur normally and
    its wait time should only be a cause for concern if it is a lot higher than normal.


    The first approach is to take a good look at how your transactions are being executed.
    In the preceding example, we implicitly committed every `INSERT` statement. This
    means that as soon as the log record for the `INSERT` statement entered the log
    buffer it needed to be flushed again. If we would explicitly commit the whole
    `WHILE` loop we would have larger writes to flush to the transaction log, resulting
    in better performance. This is because writing small blocks frequently is generally
    slower than writing large blocks at a larger interval. Cursors can also have the
    same effect as the example we used, so use them as little as possible.


    The other approach is based on the storage subsystem. If SQL Server cannot write
    the log records fast enough, you can encounter `LOGBUFFER` and `WRITELOG` waits.
    As a best practice, make sure to split your transaction log and database data
    files on separate disks, so they do impact each other in times of heavy load.
    Also monitor the disk the transaction log is located on using the disk-performance
    counters in Perfmon, like `Avg. Disk sec/write`, to show you the write latency,
    and `Disk Writes/sec`, to show the write IOPS and check if the values are inside
    the acceptable range.


    If your SQL Server instance is running SQL Server 2014, you could choose to make
    use of the `Delayed Durability` option, which was introduced in SQL Server 2014\.
    In short, enabling this option will no longer flush the log buffer content to
    disk when a transaction commits, but rather will wait until the log buffer is
    full (60 KB) before flushing the contents to the transaction log. By enabling
    this option, you are running a risk that transactions that have committed, but
    have not yet been written to the transaction log, will be lost during a failure
    since they will only be written to the transaction log when the log buffer is
    full.


    ### LOGBUFFER and WRITELOG Summary


    Both the `LOGBUFFER` and `WRITELOG` wait types are related to the way SQL Server
    processes transactions. The `WRITELOG` wait type occurs every time a log record
    is written to the transaction log and generally isn’t a cause for concern. When
    paired with high `LOGBUFFER` wait times, high `WRITELOG` wait times can indicate
    transaction log pressure. To lower those wait times try to avoid `cursor` and
    `WHILE` statements, since the statements inside the `cursor` or `WHILE` clauses
    will often get implicitly committed, creating a large amount of small writes.
    Also check your storage configuration to make sure the transaction log isn’t on
    the same drive as the database data file. If high wait times still occur, analyze
    the performance of the disk on which your transaction log is located.


    ## RESOURCE_SEMAPHORE


    The `RESOURCE_SEMAPHORE` wait type is a memory-related wait type that can show
    itself when a query-memory request cannot be granted immediately. These waits
    can occur on servers that are experiencing memory pressure, or when a great number
    of concurrent queries request memory for expensive operations like sorts or joins.


    ### What Is the RESOURCE_SEMAPHORE Wait Type?


    When a query is executed in SQL Server, a series of steps occur before the actual
    execution. The first step involved is that a compiled plan is generated. This
    plan contains the logical instructions, or operations, needed to fulfill the query
    requests. During the generation of the compiled plan, a calculation is performed
    to determine the amount of memory needed to execute the query, which depends on
    the operations involved in the compiled plan. Some of the operations that require
    memory are sorts and joins, which temporarily store row data in the memory of
    the SQL Server. The minimum amount of memory needed to perform these sorts or
    joins is known as the `required memory` , without which the query simply cannot
    get executed. If more memory is needed to store row data in memory during a sort,
    for instance, it will be calculated as `additional memory` . Without this additional
    memory, a query can still get executed, but instead of writing the temporary row
    data to memory, it will write it to disk.


    When the query gets executed, a memory grant will be determined based on the required
    and additional memory values calculated in the compiled plan. This memory grant
    is needed in order to perform a memory reservation at an internal object called
    the `resource semaphore`. The resource semaphore is responsible for reserving
    the memory a query needs for execution, but it also manages memory throttling
    when too many queries concurrently ask for memory reservations or when there is
    not enough memory available at that time. It does this by maintaining a queue
    of queries that are requesting memory. If there are no queries inside the queue
    and a new query requests memory, the resource semaphore will grant it to the query
    (if enough free memory is available). However, if there is a queue the new query
    will be put at the end of the queue, and it has to wait for its turn to receive
    a memory grant.


    Before the resource semaphore will grant the requested memory to a query, it will
    check whether there is enough free memory to execute it. If, for some reason,
    there is less memory available than the amount requested by the query, the query
    will be put in the queue again until enough memory is available. When a query
    is inside the resource semaphore queue waiting for its requested memory, the time
    it spends inside the queue will be recorded as the `RESOURCE_SEMAPHORE` wait type.


    There is a maximum amount of memory available for the resource semaphore to use,
    and it is allocated from the buffer cache. The resource semaphore can allocate
    up to 75% of the memory from the buffer cache for memory grants, but a single
    query can never get more than 25% of that amount. For instance, if we have a SQL
    Server with a buffer cache that can grow to 500 MB, we would have a maximum of
    375 MB for memory grants. A single query in this example can never receive more
    than 93 MB. Having that much memory being possibly granted to queries can be problematic,
    since that memory is not being used for the buffer cache, meaning more IOs to
    the storage subsystem are needed to retrieve and write data pages.'
