    ## Summary


    In this chapter we looked at a new query performance and analysis feature that
    was introduced in SQL Server 2016: the Query Store. We looked at how the Query
    Store works underneath the covers and how we can access query wait statistics
    information in the built-in reports of the SQL Server 2017 version of the Query
    Store.


    Finally, we looked at accessing Query Store wait statistics using the new Query
    Store DMVs and showed some example queries that can help you get started on querying
    the Query Store.


    # 4. Building a Solid Baseline


    In Chapter [2](#340881_2_En_2_Chapter.xhtml), “Querying SQL Server Wait Statistics,”
    we spent a great deal of time describing and using the various methods of accessing
    wait statistics information. Most of those methods focused on using that information
    for detecting performance problems that are presently occurring. While it is possible
    to find the exact cause of the performance problem using these real-time methods,
    it requires a deep knowledge of the various wait types and—most important—experience
    in the performance of your SQL Server. If you are managing only one SQL Server
    instance, you can get yourself familiar with the way it reacts under different
    circumstances relatively quickly. If you are managing hundreds of SQL Server instances,
    getting yourself familiar with the way they perform is impossible. Because SQL
    Server wait statistics are largely based on the workload of your SQL Server instance,
    no two SQL Server instances will have the same wait times for the same wait types.
    This makes detecting possible problems difficult because we can’t just say “because
    the CXPACKET wait type has a wait time of 20,000 milliseconds we are having a
    problem.” It all depends on the configuration and workload of your system. One
    SQL Server instance can have 20,000 milliseconds (20 seconds) of wait time every
    minute spent on the CXPACKET wait type and experience no performance problems,
    while another instance has 1,000 milliseconds of wait time and users are constantly
    complaining about performance.


    If we want to perform an in-depth analysis of wait statistics, or any performance-related
    data, we need a method of collecting performance-related metrics and giving them
    meaning. Just detecting that you spend 10,000 milliseconds waiting for resources
    doesn’t mean anything, since we do not know if it caused performance problems
    or not. Yes, maybe your users are complaining that performance is horrible while
    you notice that 10,000 milliseconds wait, but there is no way to be sure if that
    wait is actually causing the performance problems your users are experiencing.
    In those cases we frequently take a guess and just assume that the specific resource
    wait is the source of the performance problem. I learned, after talking to many
    DBAs across the world, that DBAs do not like to take guesses at what’s slowing
    down our SQL Server instances. We want to be certain that the source of the performance
    problem actually is that resource wait. This is where baselines can help.


    Baselines will help you give meaning to performance metrics by providing you with
    a definition of what the normal situation is on your system. Without a baseline
    of our system, we have no idea if it is running optimally or terribly slow. Baselines
    are incredibly important; in fact, they are so important that I decided to write
    a complete chapter about them in this book. Without a solid baseline, your measurements
    mean nothing! Even though this book focuses on wait statistics, baselines can
    be used for every performance-related metric you can capture on your system, giving
    you a valuable method of performance analysis.


    If you read through the previous chapter concerning the Query Store, you might
    be tempted to think that the Query Store can handle all your baseline needs (if
    you are running SQL Server 2016 or higher). While the Query Store absolutely provides
    a very useful tool in capturing and monitoring the performance of your query,
    it doesn’t necessarily provide a performance overview of your entire SQL Server
    Instance. I personally consider the Query Store an addition to the regular process
    of capturing and monitoring baselines, not a replacement.'
