    For this we are going to open a second window in SQL Server Management Studio
    and execute the query seen in Listing [8-2](#340881_2_En_8_Chapter.xhtml#PC7).
    This will just perform a `SELECT` against the `Sales.SalesOrderDetail` table,
    the same table in which we are currently modifying data.


    ```

    SELECT *

    FROM AdventureWorks.Sales.SalesOrderDetail;

    Listing 8-2

    Select data from a table where a modification is being performed

    ```


    As soon as we run this `SELECT` query , we notice that no results are returned
    and that the query will keep running. This is a typical example of a blocking
    operation where a transaction is modifying data we want to read inside another
    transaction.


    If we were to query the `sys.dm_os_waiting_tasks` DMV , we would be able to see
    the `LCK_M_S` wait type, as shown in Figure [8-13](#340881_2_En_8_Chapter.xhtml#Fig13).


    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig13_HTML.jpg](images/340881_2_En_8_Chapter/340881_2_En_8_Fig13_HTML.jpg)


    Figure 8-13


    LCK_M_S wait occurring


    The only way the LCK_M_S wait will be resolved is if the incompatible lock is
    removed. In this case we performed a rollback of the modification transaction
    we started in the first SQL Server Management Studio window. We do this by running
    the `ROLLBACK` command in the same session window. Immediately after performing
    the transaction rollback we receive the results the `SELECT` query asked for.
    Querying the `sys.dm_os_waiting_tasks` also showed that the `LCK_M_S` wait was
    resolved.


    ### Lowering LCK_M_S Waits


    Seeing `LCK_M_S` waits occur does not necessarily have to mean something is wrong.
    It does, however, indicate that blocking is occurring. If you notice high wait
    times on the `LCK_M_S` wait type, it means that someone’s read transaction is
    currently taking a long time to complete because it has to wait to place the Shared
    lock. So the first step will be to identify the query that is causing the block.
    We can do this by using the `sys.dm_os_waiting_tasks` DMV and looking at the `blocking_session_id`
    column. This is relatively quick to do when there is only a single block active,
    but can get complex when many concurrent queries are being blocked by other transactions.
    In this case we have to follow the blocking chain until we find the head blocker
    (which is the first lock on an object). Another option is to use the `sp_WhoIsActive`
    stored procedure we discussed in the “Locking and Blocking Introduction” at the
    start of this chapter. This stored procedure will move through the blocking chain
    for you, directly displaying the head blocker.


    After we have found the query that is causing the blocking to occur, we need to
    analyze it and see if we can optimize that query. Maybe it is requesting more
    locks than it actually needs and thus requires a long time to complete. One way
    to optimize that query would be to look at whether any indexes should be added
    so fewer rows are required to be locked. Or maybe you could cut the single transaction
    into multiple transactions that each access fewer objects. Another possible issue
    that can cause more locking than necessary is out-of-date statistics. Statistics
    are used as input for a query plan, and if they do not accurately reflect the
    contents of the table or index, they can lead to a bad query plan, which in turn
    can lead to more locks than necessary.


    Another option would be to change to Isolation level of the read transactions
    so no Shared locks are needed in order to read the data. For instance, setting
    the Isolation level to Read Uncommitted will not place Shared locks, and the read
    transaction will not be blocked. This does introduce another problem related to
    the Isolation level, dirty reads, which we discussed in the “Locking and Blocking
    Introduction” section of this chapter. Next to using Read Uncommitted, you could
    also use Snapshot Isolation, which will result in fewer Shared locks, but will
    not cause dirty reads. Snapshot Isolation does put more load on the TempDB database,
    since it must maintain versions of data if many concurrent transactions are modifying
    that data.


    ### LCK_M_S Summary


    The `LCK_M_S` wait type occurs when an incompatible lock is being placed on a
    resource and another transaction wants to place a Shared lock on the same resource.
    Seeing the `LCK_M_S` wait type means transactions are being blocked. You should
    try to identify which queries are causing the block to occur and see if these
    can be optimized to result in fewer locks or locks that have a shorter duration.
    As a final resort you could choose to change the Isolation level of your read
    transactions, though this does introduce other side effects, like dirty reads
    or increased load inside TempDB.


    ## LCK_M_U


    `LCK_M_U` wait types are related to locks that use the Update (U) mode. When a
    task wants to place an Update lock on a resource but an incompatible lock is already
    in place, `LCK_M_U` waits occur.'
  trans: '## LCK_M_S


    第一个与锁相关的等待类型是 `LCK_M_S` 等待类型。此等待类型表示一个任务正在等待在某个资源上放置共享锁。


    ### 什么是 LCK_M_S 等待类型？


    `LCK_M_S` 等待类型表明一个任务正在或已经等待在某个资源上放置共享锁。需要理解的是，只有当发生某种形式的阻塞时，你才会看到这种等待类型，因为任务正在等待放置共享锁。这并不意味着资源上有一个活动的共享锁。这对于每一个与锁相关的等待类型都是成立的，因为它们只在发生阻塞情况时才会被记录。


    由于 `LCK_M_S` 等待类型与共享锁相关，它会在执行读取操作但因我们想要读取的资源上已存在不兼容的锁而必须等待时发生。我们能够放置共享锁之前所等待的时间，会被记录为
    `LCK_M_S` 等待类型的等待时间。


    图 8-12 展示了一个通常会导致 `LCK_M_S` 等待发生的常见情况。在这种情况下，T1 已在一个页面上放置了独占锁，表示正在进行数据修改。当 T2
    想要从该页面读取数据时，它需要放置一个共享锁，但由于独占锁和共享锁不兼容，因此发生了 `LCK_M_S` 等待。


    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig12_HTML.jpg](img/340881_2_En_8_Fig12_HTML.jpg)


    图 8-12

    LCK_M_S 等待正在发生


    ### LCK_M_S 示例


    创建一个 `LCK_M_S` 等待发生的例子并不困难，因为我们只需要在数据修改查询和数据读取查询之间制造一个阻塞情况。


    在这个例子中，我们将针对 `AdventureWorks` 数据库运行清单 8-1 中所示的查询。此查询将启动一个事务并修改几行数据，但不会提交或回滚该事务。由于我们通过提供
    `BEGIN TRAN` 显式地指定了此事务，SQL Server 将保持锁不变，直到我们显式执行 `COMMIT` 或 `ROLLBACK` 命令。


    ```

    BEGIN TRAN

    UPDATE Sales.SalesOrderDetail

    SET CarrierTrackingNumber = ''4E0A-4F89-AD''

    WHERE SalesOrderID = ''43661'';

    清单 8-1

    启动一个修改事务

    ```


    当我们执行查询时，会很快收到结果；在我的例子中，有 15 行被更新。但正如我之前所说，事务尚未完成，因此它将保持运行状态，在其修改的对象上保留锁。


    到目前为止，我们并未引起任何阻塞，因为这是一个测试 SQL Server，没有其他查询在运行。让我们改变这一点，制造一个阻塞情况。


    为此，我们将在 SQL Server Management Studio 中打开第二个窗口，并执行清单 8-2 中所示的查询。这将仅对 `Sales.SalesOrderDetail`
    表执行一个 `SELECT` 操作，也就是我们当前正在修改数据的同一张表。


    ```

    SELECT *

    FROM AdventureWorks.Sales.SalesOrderDetail;

    清单 8-2

    从正在执行修改操作的表中选择数据

    ```


    一旦我们运行这个 `SELECT` 查询，就会注意到没有结果返回，并且查询会一直运行。这是一个典型的阻塞操作示例，其中一个事务正在修改另一个事务中我们想要读取的数据。


    如果我们查询 `sys.dm_os_waiting_tasks` DMV，就能够看到 `LCK_M_S` 等待类型，如图 8-13 所示。


    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig13_HTML.jpg](img/340881_2_En_8_Fig13_HTML.jpg)


    图 8-13

    LCK_M_S 等待正在发生


    `LCK_M_S` 等待得以解决的唯一方式是移除不兼容的锁。在这个案例中，我们回滚了在第一个 SQL Server Management Studio 窗口中启动的修改事务。我们通过在同一个会话窗口中运行
    `ROLLBACK` 命令来完成此操作。在执行事务回滚后，我们立即收到了 `SELECT` 查询请求的结果。查询 `sys.dm_os_waiting_tasks`
    也显示 `LCK_M_S` 等待已解决。


    ### 减少 LCK_M_S 等待


    看到 `LCK_M_S` 等待发生并不一定意味着出了问题。然而，它确实表明有阻塞正在发生。如果你注意到 `LCK_M_S` 等待类型的等待时间很长，这意味着某人的读取事务当前需要很长时间才能完成，因为它必须等待放置共享锁。因此，第一步将是识别导致阻塞的查询。我们可以通过使用
    `sys.dm_os_waiting_tasks` DMV 并查看 `blocking_session_id` 列来实现。当只有一个活动的阻塞时，这样做相对快速，但当许多并发查询被其他事务阻塞时，情况可能会变得复杂。在这种情况下，我们必须沿着阻塞链追踪，直到找到头阻塞者（即对象上的第一个锁）。另一个选择是使用我们在本章开头“锁和阻塞介绍”中讨论过的
    `sp_WhoIsActive` 存储过程。此存储过程将为你遍历阻塞链，直接显示头阻塞者。


    找到导致阻塞发生的查询后，我们需要对其进行分析，看看是否可以优化该查询。也许它请求的锁比实际需要的多，因此需要很长时间才能完成。优化该查询的一种方法是查看是否应添加任何索引，以便需要锁定的行更少。或者，你可以将单个事务拆分为多个事务，每个事务访问更少的对象。另一个可能导致比必要更多锁的潜在问题是过时的统计信息。统计信息用作查询计划的输入，如果它们不能准确反映表或索引的内容，可能会导致不良的查询计划，进而可能导致比必要的更多的锁。


    另一个选择是更改读取事务的隔离级别，这样就不需要共享锁来读取数据。例如，将隔离级别设置为未提交读（Read Uncommitted）将不放置共享锁，读取事务也就不会被阻塞。这确实引入了另一个与隔离级别相关的问题，即脏读，我们在本章的“锁和阻塞介绍”部分讨论过。除了使用未提交读，你还可以使用快照隔离（Snapshot
    Isolation），这将导致更少的共享锁，但不会引起脏读。快照隔离确实会给 TempDB 数据库带来更大的负载，因为如果许多并发事务正在修改数据，它必须维护数据的版本。


    ### LCK_M_S 总结


    当某个资源上正在放置一个不兼容的锁，而另一个事务想要在同一资源上放置共享锁时，就会发生 `LCK_M_S` 等待类型。看到 `LCK_M_S` 等待类型意味着事务正在被阻塞。你应该尝试识别哪些查询导致了阻塞的发生，并查看是否可以优化这些查询以产生更少的锁或持续时间更短的锁。作为最后的手段，你可以选择更改读取事务的隔离级别，尽管这确实会带来其他副作用，例如脏读或
    TempDB 内部负载的增加。


    ## LCK_M_U


    `LCK_M_U` 等待类型与使用更新（U）模式的锁相关。当一个任务想要在某个资源上放置更新锁，但该资源上已存在一个不兼容的锁时，就会发生 `LCK_M_U`
    等待。'
- fmt: '## LCK_M_U


    ### What Is the LCK_M_U Wait Type?


    The Update lock type is a special type of lock mode that indicates that data modification
    is about to occur. Even though its name might suggest it is only related to `UPDATE`
    queries, Update locks can also appear when performing `INSERT` or `DELETE` statements.


    Update locks primarily exist to prevent deadlocks from occurring. Deadlocks indicate
    that two transactions that want to modify the same object are waiting indefinitely
    on each other to acquire an Exclusive lock on the resource. To understand how
    a deadlock situation can occur, and how Update locks can prevent this, take a
    look at the following scenario that would occur when no Update locks are used.


    When two concurrent transactions want to perform a modification on the same object,
    both transactions would first place a Shared lock on the resource while the data
    they intended to modify was located. Since Shared locks are compatible with other
    Shared locks, both transactions would not block each other. When one of the two
    transactions found the data it needed to modify, it would convert its Shared lock
    to an Exclusive lock, and then a problem would occur. Since Shared locks are incompatible
    with Exclusive locks, and since the other transaction would also have a Shared
    lock on the resource, the conversion from Shared lock to Exclusive lock would
    not occur. The transaction would need to wait until the Shared lock of the other
    transaction was removed before it could convert its own Shared lock to an Exclusive
    lock, but since the other transaction also wants to convert its Shared lock to
    an Exclusive lock, both transactions would end up waiting on each other, and a
    deadlock would occur. SQL Server will automatically detect deadlock situations
    and choose one of the deadlocked transactions as a victim and perform a rollback
    of that transaction, ending the deadlock situation. Figure [8-14](#340881_2_En_8_Chapter.xhtml#Fig14)
    shows a graphical representation of that situation.


    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig14_HTML.jpg](images/340881_2_En_8_Chapter/340881_2_En_8_Fig14_HTML.jpg)


    Figure 8-14: Deadlock during lock conversion


    When Update locks are used inside SQL Server, no deadlock situation could occur.
    Update locks are compatible with Shared locks, but not with Exclusive or other
    Update locks. In the preceding scenario, the first transaction to find the data
    it needed to modify would not directly convert to an Exclusive lock, but rather
    would convert to an Update lock first. Since Update and Shared locks are compatible,
    there would be no problem converting to an Update lock, even though there was
    a Shared lock in place from the other transaction. The Update lock would then
    get converted to an Exclusive lock so the data modification could occur. Figure
    [8-15](#340881_2_En_8_Chapter.xhtml#Fig15) shows this lock behavior.


    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig15_HTML.jpg](images/340881_2_En_8_Chapter/340881_2_En_8_Fig15_HTML.jpg)


    Figure 8-15: Update locks during concurrent data modifications


    When a transaction wants to place an Update lock but there is an incompatible
    lock already in place on the object, for instance, an Exclusive lock, the `LCK_M_U`
    wait type will be recorded.


    ### LCK_M_U Example


    To show you an example of `LCK_M_U` waits occurring, we have to create a situation
    where concurrent transactions want to modify the same resource. For this we are
    going to make use of the Ostress utility to execute an identical query using multiple
    connections. The query I am going to execute can be seen in Listing [8-3](#340881_2_En_8_Chapter.xhtml#PC8).
    This will perform an `UPDATE` against the `Person.Address` table inside the `AdventureWorks`
    database. I saved the query inside a .sql file named `LCK_M_U.sql`.


    ```

    UPDATE Person.Address

    SET City = ''Los Angeles''

    WHERE StateProvinceID = 9;

    Listing 8-3: Modify the Person.Address table

    ```


    After saving the file I run the Ostress utility using the following command:


    ```

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -E -dAdventureWorks2012
    -i"C:\lck_m_u.sql" -n150 -r5 -q

    ```


    This will create 150 concurrent connections, each one executing the query in Listing
    [8-3](#340881_2_En_8_Chapter.xhtml#PC8) five times. This should be enough to create
    some blocking.


    While the Ostress utility is running, I query the `sys.dm_os_waiting_tasks` DMV
    to find out what tasks are waiting. A small portion of the results are shown in
    Figure [8-16](#340881_2_En_8_Chapter.xhtml#Fig16).


    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig16_HTML.jpg](images/340881_2_En_8_Chapter/340881_2_En_8_Fig16_HTML.jpg)


    Figure 8-16: LCK_M_U waits occurring


    As you can see in Figure [8-16](#340881_2_En_8_Chapter.xhtml#Fig16), many different
    sessions are waiting to acquire an Update lock but are all being blocked by session
    ID 161. If we query the `sys.dm_tran_locks` DMV for lock information about this
    session, we can see it is granted an incompatible Exclusive lock, as shown in
    Figure [8-17](#340881_2_En_8_Chapter.xhtml#Fig17).


    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig17_HTML.jpg](images/340881_2_En_8_Chapter/340881_2_En_8_Fig17_HTML.jpg)


    Figure 8-17: Session ID 161 holding an Exclusive lock


    All the other sessions will have to wait until the Exclusive lock of session ID
    161 is removed. Then one of those sessions will acquire the Update lock it is
    requesting, convert it into an Exclusive lock, and perform its modification. That
    cycle will repeat until all the sessions are done with their modifications.


    ### Lowering LCK_M_U Waits


    Lowering `LCK_M_U` waits uses the same approach as lowering `LCK_M_S` wait types:
    try to identify the transaction that is causing the blocking to occur and try
    to optimize its locking behavior.


    Changing the Isolation level will have little effect on `LCK_M_U` wait times since
    other Isolation levels have the most impact on transactions that perform reads.
    This makes optimizing your queries and/or indexes the way to go if you need to
    lower higher-than-normal wait times on the `LCK_M_U` wait type.


    ### LCK_M_U Summary


    The `LCK_M_U` wait type is related to locks that use the Update lock mode. Update
    locks are used to prevent deadlocks from occurring when concurrent transactions
    try to convert their Shared locks to Exclusive locks. Lowering `LCK_M_U` wait
    times is primarily achieved by optimizing potential blocking queries or indexes.


    ## LCK_M_X


    Another of the most common lock-related wait types is the `LCK_M_X` wait type.
    Just like both lock-related wait types we have already discussed, the `LCK_M_X`
    wait type is related to a specific lock type, in this case the Exclusive lock.
    And just like the other two lock-related wait types, seeing this wait type means
    there is some form of blocking occurring.


    ### What Is the LCK_M_X Wait Type?


    The `LCK_M_X` wait type occurs when a task is waiting to place an Exclusive lock
    on an object. Since Exclusive locks are not compatible with just about any other
    lock mode, including other Exclusive locks, seeing blocking occur when there are
    many concurrent modifications is pretty common. This means that seeing `LCK_M_X`
    waits occur is pretty common as well, especially in systems that have a high amount
    of concurrent transactions.'
