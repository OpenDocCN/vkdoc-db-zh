  trans: '

    ## HADR_SYNC_COMMIT 示例


    在本示例中，我构建了一个配置为使用同步复制的 AlwaysOn 可用性组。我所用测试机器的配置可在附录 I 示例 SQL Server 机器配置中找到。我不会详细介绍如何配置
    AlwaysOn 可用性组，因为互联网上有大量信息可帮助您进行配置。一个好的起点是在线丛书中的“[‘入门 AlwaysOn 可用性组’](https://msdn.microsoft.com/en-us/gg509118)”文章。我使用了
    `AdventureWorks` 数据库作为我的 AlwaysOn 可用性组中需要被复制的数据库。


    配置好 AlwaysOn 可用性组后，我使用清单 10-3 中的脚本，在 `AdventureWorks` 数据库中添加了一个名为 `AO_Test` 的额外表。


    ```sql

    USE [AdventureWorks]

    GO

    CREATE TABLE AO_Test

    (

    ID UNIQUEIDENTIFIER PRIMARY KEY,

    RandomData VARCHAR(50)

    );

    -- 清单 10-3

    -- 创建 AO_Test 表

    ```


    表创建后，我首先清空然后查询 `sys.dm_os_wait_stats` DMV，使用以下查询检查主副本和辅助副本上当前 `HADR_SYNC_COMMIT`
    的等待时间：


    ```sql

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''HADR_SYNC_COMMIT'';

    ```


    即使等待几分钟后，`HADR_SYNC_COMMIT` 等待类型的等待时间仍保持为 0，如图 10-9 所示。这符合我的预期，因为到目前为止我们尚未在主副本上执行任何数据修改。


    ![../images/340881_2_En_10_Chapter/340881_2_En_10_Fig9_HTML.jpg](img/340881_2_En_10_Fig9_HTML.jpg)


    图 10-9


    主副本和辅助副本均无活动期间的 HADR_SYNC_COMMIT 等待信息


    这与 `HADR_LOGCAPTURE_WAIT` 和 `HADR_WORK_QUEUE` 不同，后者即使（或因为）AlwaysOn 可用性组内没有用户活动，也会累积等待时间。


    现在表已就位，让我们通过执行一些插入操作来生成一些事务。清单 10-4 中的脚本将向我们之前创建的 `AO_Test` 表中插入 10,000 行。


    ```sql

    INSERT INTO AO_Test

    (

    ID,

    RandomData

    )

    VALUES

    (

    NEWID(),

    CONVERT(VARCHAR(50), NEWID())

    );

    GO 10000

    -- 清单 10-4

    -- 向 AO_Test 表插入 10,000 行

    ```


    当清单 10-4 中的脚本完成后，我再次在主副本和辅助副本上检查 `sys.dm_os_wait_stats` DMV 内的等待统计信息。图 10-10 显示了在主副本上此查询的结果，图
    10-11 显示了在辅助副本上的结果。


    ![../images/340881_2_En_10_Chapter/340881_2_En_10_Fig11_HTML.jpg](img/340881_2_En_10_Fig11_HTML.jpg)


    图 10-11


    辅助副本上的 HADR_SYNC_COMMIT 等待


    ![../images/340881_2_En_10_Chapter/340881_2_En_10_Fig10_HTML.jpg](img/340881_2_En_10_Fig10_HTML.jpg)


    图 10-10


    主副本上的 HADR_SYNC_COMMIT 等待


    查看这两个图表时，您首先会注意到 `HADR_SYNC_COMMIT` 等待只发生在主副本上，而不是辅助副本上，这是预期行为。第二个有趣的事情是发生的等待次数。这与我们插入的行数完全相同。同样，这也是预期行为。由于我们执行了一次插入并重复了
    10,000 次，每次插入都生成了一条需要复制的事务日志记录。利用发生的等待次数和等待时间，可以计算出一次插入操作在副本上提交所花费的平均时间。本例中是 1.53
    毫秒 (15342/10000)，这是一个相当不错的值。


    ## 降低 HADR_SYNC_COMMIT 等待


    看到 `HADR_SYNC_COMMIT` 等待发生并不一定意味着存在问题。只要您的主副本上有数据修改，`HADR_SYNC_COMMIT` 等待就会始终发生。当您将等待时间与您的基线测量值进行比较，发现等待时间远高于预期时，它们才可能表明存在问题。


    将 AlwaysOn 操作模式更改为异步复制将完全消除 `HADR_SYNC_COMMIT` 等待，但存在灾难发生时丢失数据的风险。此外，为了满足您公司的灾难恢复或高可用性需求，您通常无法随意更改
    AlwaysOn 操作模式，我建议您不要仅仅为了降低 `HADR_SYNC_COMMIT` 等待时间而更改它。


    值得庆幸的是，您可以使用许多不同的方法来监控 AlwaysOn 可用性组的性能，包括 AlwaysOn 仪表板、DMV 和 Perfmon 计数器。


    您可以通过右键单击 AlwaysOn 可用性组并选择“显示仪表板”选项来打开 AlwaysOn 仪表板。默认情况下，AlwaysOn 仪表板会提供一些关于
    AlwaysOn 可用性组的通用信息，例如可用性组内的服务器和同步状态，如图 10-12 所示。


    ![../images/340881_2_En_10_Chapter/340881_2_En_10_Fig12_HTML.jpg](img/340881_2_En_10_Fig12_HTML.jpg)


    图 10-12


    AlwaysOn 仪表板


    AlwaysOn 仪表板的默认视图并未提供太多可用于故障排除的信息。值得庆幸的是，您可以通过右键单击列栏并选择您感兴趣的信息来配置视图以适应您自己的需求，如图
    10-13 所示。


    ![../images/340881_2_En_10_Chapter/340881_2_En_10_Fig13_HTML.jpg](img/340881_2_En_10_Fig13_HTML.jpg)


    图 10-13


    AlwaysOn 添加列


    有许多列对于排查同步问题很有用，我建议花时间了解它们，以便确定哪些列最适合您的情况。


    AlwaysOn 仪表板显示的信息最初记录在各种与 AlwaysOn 相关的 DMV 中。这使您可以自己查询这些信息。所有与 AlwaysOn 相关的 DMV
    都可以通过 DMV 名称中的 `dm_hadr` 前缀轻松识别，例如包含您可在 AlwaysOn 仪表板内访问的大部分信息的 `sys.dm_hadr_database_replica_states`
    DMV。


    除了 AlwaysOn 仪表板和与 AlwaysOn 相关的 DMV 外，还有大量专门显示 AlwaysOn 性能的 Perfmon 计数器。这些计数器分组在
    Perfmon 的 `SQLServer:Availability Replica` 和 `SQLServer:Database Replica` 组中。图
    10-14 显示了 `SQLServer:Database Replica` 组中可用计数器的一部分。


    ![../images/340881_2_En_10_Chapter/340881_2_En_10_Fig14_HTML.jpg](img/340881_2_En_10_Fig14_HTML.jpg)


    图 10-14


    与 AlwaysOn 相关的 Perfmon 计数器


    如您至此所读，您有大量选项可用于分析副本之间的 AlwaysOn 性能。

