- fmt: '### REDO_THREAD_PENDING_WORK Summary


    `REDO_THREAD_PENDING_WORK` 等待类型是一种与 AlwaysOn 相关的等待类型。当对 AlwaysOn 可用组没有数据修改活动时，该等待类型会自然累积等待时间。`REDO_THREAD_PENDING_WORK`
    等待类型与 AlwaysOn 可用组中辅助副本内的重做线程相关，表示重做线程当前正在等待工作。由于这种等待类型会发生在每个辅助副本上，尤其是在用户数据修改极少或没有发生时，因此可以安全地忽略它。


    ## 11. 抢占式等待类型


    在第 1 章“等待统计内部原理”中，我们简要介绍了 SQL Server 用于执行线程调度和管理的非抢占式调度模型。与 SQL Server 不同，Windows
    操作系统使用抢占式调度来管理和调度线程。有时，SQL Server 必须通过操作系统使用 Windows 函数来执行特定操作，例如检查 Active Directory
    权限。当这种情况发生时，SQL Server 必须从 Windows 操作系统（SQL Server 外部）请求一个线程，从而使得 SQL Server 无法管理该线程。当
    SQL Server 等待 Windows 操作系统内的抢占式线程完成时，它将记录一个针对抢占式等待类型的等待。图 11-1 展示了此行为的图示。


    ![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig1_HTML.jpg](images/340881_2_En_11_Chapter/340881_2_En_11_Fig1_HTML.jpg)


    *图 11-1 发生抢占式等待*


    SQL Server 内部存在许多不同的抢占式等待类型；在撰写本书时，SQL Server 2017 有 203 种不同的抢占式等待类型。当在 SQL Server
    外部请求线程时记录哪种抢占式等待类型，取决于线程访问的 Windows 函数。SQL Server 中的每种抢占式等待类型都对应一个不同的 Windows
    函数（除了一些作为不同函数的“全能”等待类型的例外情况），并且在许多情况下，等待类型的名称与 Windows 函数的名称相同。这非常有帮助，因为您可以在 MSDN
    上搜索特定的 Windows 函数并了解其功能。如果您知道该函数的功能，也就知道了 SQL Server 为何等待或在等待什么。例如，如果您注意到 `PREEMPTIVE_OS_WRITEFILEGATHER`
    等待类型的等待时间很长，您可以移除 `PREEMPTIVE_OS_` 部分，并在 MSDN 上搜索 `WRITEFILEGATHER` 函数。图 11-2
    显示了我搜索 `WRITEFILEGATHER` 函数得到的结果。


    ![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig2_HTML.jpg](images/340881_2_En_11_Chapter/340881_2_En_11_Fig2_HTML.jpg)


    *图 11-2 WriteFileGather Windows 函数*


    通过阅读相关文章，我们可以了解很多关于此函数的信息；显然，该函数用于将数据写入文件，并且必须在 SQL Server 外部执行。我不会在这里剧透更多，因为我们将在本章后面更详细地讨论
    `PREEMPTIVE_OS_WRITEFILEGATHER` 等待类型。


    我不会在本章中描述每一个可能的抢占式等待类型，因为实在太多了。相反，我专注于最常见的抢占式等待类型。如果您遇到一个本章未详细讨论的抢占式等待类型，建议您使用前述方法在
    MSDN 上查找有关该 Windows 函数的更多信息。希望这些信息能帮助您弄清楚等待发生的原因。


    ## SQL Server on Linux


    在本章的引言中，我提到了 SQL Server 如何从其内部访问 Windows 操作系统功能。然而，从 SQL Server 2017 开始，SQL Server
    不再局限于在 Microsoft Windows 操作系统上可用。在 2016 年 3 月的一次革命性宣布中，Microsoft 宣布下一个版本的 SQL
    Server（2017）将不再是 Windows 独占的产品，也将可在 Linux 上使用。不用说，这个声明引起了相当大的轰动，因为这是没人预料到会发生的事情。


    我现在提及 SQL Server 在 Linux 操作系统上的支持，是因为 SQL Server 内部发生的抢占式等待是平台无关的。这意味着，对仅在 Windows
    操作系统中可用的函数的调用，在查看 SQL-on-Linux 实例的等待统计时也会被记录。这之所以可能，与 Microsoft 用于将 SQL Server
    移植到 Linux 的底层技术有关。


    为了使 SQL Server 能在 Linux 上运行，Microsoft 采用了一个称为平台抽象层（Platform Abstraction Layer，简称
    PAL）的概念。PAL 的思想是将运行 SQL Server 所需的代码与操作系统交互所需的代码分离。由于 SQL Server 以前从未在 Windows
    以外的系统上运行过，其代码中充满了操作系统引用。这意味着，让 SQL Server 在 Linux 上运行将需要耗费大量时间来解决所有的操作系统依赖问题。因此，SQL
    Server 团队寻找不同的方法来解决这个问题，并在名为 Drawbridge 的 Microsoft 研究项目中找到了答案。Drawbridge 的定义可以在其项目页面
    [`www.microsoft.com/en-us/research/project/drawbridge/`](http://www.microsoft.com/en-us/research/project/drawbridge/)
    上找到，其描述为：


    > *Drawbridge 是一种用于应用程序沙盒化的新虚拟化形式的研究原型。Drawbridge 结合了两种核心技术：首先，是一个 picoprocess，它是基于进程的隔离容器，具有最小的内核
    API 表面。其次，是一个库操作系统（Library OS），它是经过优化以在 picoprocess 内高效运行的 Windows 版本。*


    吸引 SQL Server 团队的主要部分是 Drawbridge 项目中的库操作系统技术。这种新技术可以处理非常广泛的 Windows 操作系统调用，并将其转换为主机（在本例中是
    Linux）的操作系统调用。当时，SQL Server 团队并没有完全照搬 Drawbridge 技术，因为该研究项目存在一些挑战。其中之一是研究项目已正式完成，这意味着项目不再提供支持。另一个是
    SQL Server 操作系统（SOS）和 Drawbridge 技术在功能上有大量重叠。两种解决方案都有自己的内存管理和线程/调度处理功能。最终决定将 SQL
    Server OS 和 Drawbridge 合并为一个名为 SQLPAL（SQL 平台抽象层）的新平台层。使用 SQLPAL，SQL Server 团队可以像以往一样进行开发，而将操作系统调用的转换工作留给
    SQLPAL 处理。图 11-3 展示了在 Linux 上运行 SQL Server 时各层之间的交互。


    ![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig3_HTML.jpg](images/340881_2_En_11_Chapter/340881_2_En_11_Fig3_HTML.jpg)


    *图 11-3 SQL-on-Linux 上的 PAL 层交互*'
  raw: '### REDO_THREAD_PENDING_WORK Summary


    The `REDO_THREAD_PENDING_WORK` wait type is an AlwaysOn-related wait type that
    accumulates wait time naturally over time when there is no data modification activity
    against an AlwaysOn Availability Group. The `REDO_THREAD_PENDING_WORK` wait type
    is related to the Redo Thread on the secondary replica inside an AlwaysOn Availability
    Group, and it indicates that the Redo Thread is currently waiting for work. Since
    this wait type will occur on every secondary replica, especially when there is
    minimal to no user data modification occurring, it can safely be ignored.


    # 11. Preemptive Wait Types


    In Chapter [1](#340881_2_En_1_Chapter.xhtml), “Wait Statistics Internals,” we
    briefly touched upon SQL Server’s non-preemptive scheduling model that is used
    to perform thread scheduling and management. Unlike SQL Server, the Windows operating
    system uses preemptive scheduling to schedule and manage threads. Sometimes SQL
    Server has to use Windows functions to perform specific actions through the operating
    system, for instance, when checking Active Directory permissions. When this occurs,
    SQL Server will have to ask a thread from the Windows operating system, outside
    of SQL Server, thus making it impossible for SQL Server to manage that thread.
    While SQL Server is waiting for the preemptive thread inside the Windows operating
    system to complete, SQL Server will record a wait on a preemptive wait type. Figure
    [11-1](#340881_2_En_11_Chapter.xhtml#Fig1) shows a graphical representation of
    this behavior.


    ![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig1_HTML.jpg](images/340881_2_En_11_Chapter/340881_2_En_11_Fig1_HTML.jpg)


    Figure 11-1


    Preemptive wait occurring


    There are many different preemptive wait types inside SQL Server; at the time
    of writing this book SQL Server 2017 has 203 different preemptive wait types.
    Which preemptive wait type is recorded when a thread is requested outside SQL
    Server depends on the Windows function the thread is accessing. Each of the preemptive
    wait types inside SQL Server represents a different Windows function (save for
    some exceptions that act as a catch-all wait type for different functions), and
    in many cases the name of the wait type is identical to the name of the Windows
    function. This is very helpful because you can search for the specific Windows
    function on MSDN and learn what the function does. If you know what the function
    does, you also know why, or on what, SQL Server is waiting. For example, if you
    notice high wait times on the `PREEMPTIVE_OS_WRITEFILEGATHER` wait type, you can
    remove the `PREEMPTIVE_OS_` part and search MSDN for the `WRITEFILEGATHER` function.
    Figure [11-2](#340881_2_En_11_Chapter.xhtml#Fig2) shows the results I got on my
    search for the `WRITEFILEGATHER` function.


    ![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig2_HTML.jpg](images/340881_2_En_11_Chapter/340881_2_En_11_Fig2_HTML.jpg)


    Figure 11-2


    WriteFileGather Windows function


    By reading the article we can learn a lot about this function; apparently this
    function is used when writing data to a file and has to occur outside SQL Server.
    I won’t spoil anything else here, since we will go into more detail about the
    `PREEMPTIVE_OS_WRITEFILEGATHER` wait type a bit further down in this chapter.


    I won’t describe every possible preemptive wait type in this chapter, since there
    are simply too many of them. Instead I have focused on the most common preemptive
    wait types. If you run into a preemptive wait type that is not discussed in detail
    in this chapter, I suggest you use the preceding method to find more information
    about the Windows function on MSDN. Hopefully, that information can help you figure
    out why the wait is occurring.


    ## SQL Server on Linux


    In the introduction of this chapter, I wrote about how SQL Server can access Windows
    operating system functionality from inside SQL Server. However, starting from
    SQL Server 2017, SQL Server is no longer limited to being available on the Microsoft
    Windows operating system. In a revolutionary announcement in March of 2016, Microsoft
    announced the next release of SQL Server (2017) will no longer be a Windows-only
    product, but will also be available on Linux. Needless to say, the announcement
    stirred up quite a bit of dust as it was something nobody would ever expect to
    happen.


    The reason why I bring up the support of SQL Server on Linux operating systems
    now is that preemptive waits that occur inside SQL Server are platform independent.
    Meaning calls to functions that are only available in the Windows operating system
    are also recorded when looking at the wait statistics of a SQL-on-Linux instance.
    The reason why this is possible has everything to do with the underlying technology
    Microsoft used to bring SQL Server to Linux.


    To make SQL Server run on Linux Microsoft adopted a concept called a Platform
    Abstraction Layer (or PAL for short). The idea of a PAL is to separate the code
    needed to run, in this case, SQL Server with the code needed to interact with
    the operating system. Because SQL Server has never run on anything other than
    Windows, it is full of operating system references inside its code. This would
    mean that getting SQL Server to run on Linux would end up taking enormous amounts
    of time because of all the operating system dependencies. So the SQL Server team
    looked for different approaches to resolve this issue and found its answer in
    a Microsoft research project called Drawbridge. The definition of Drawbridge can
    be found on its project page at [`www.microsoft.com/en-us/research/project/drawbridge/`](http://www.microsoft.com/en-us/research/project/drawbridge/)
    and reads:


    > *Drawbridge is a research prototype of a new form of virtualization for application
    sandboxing. Drawbridge combines two core technologies: First, a picoprocess, which
    is a process-based isolation container with a minimal kernel API surface. Second,
    a library OS, which is a version of Windows enlightened to run efficiently within
    a picoprocess*


    The main part that attracted the SQL Server team to the Drawbridge project was
    the Library OS technology. This new technology could handle a very wide variety
    of Windows operating system calls and translate them to the operating system of
    the host, which in this case is Linux. Now, the SQL Server team did not adapt
    the Drawbridge technology one-on-one as there were some challenges involved with
    the research project. One of them was that the research project was officially
    completed which means there was no support on the project. Another one was a large
    overlap of technologies inside the SQL Server OS (SOS) and Drawbridge. Both solutions
    have their own functionalities to handle memory management and threading/scheduling.
    What eventually was decided was to merge the SQL Server OS and Drawbridge into
    a new platform layer called the SQLPAL (SQL Platform Abstraction Layer). Using
    the SQLPAL the SQL Server team can develop code as they have always done and leave
    the translation of operating system calls to the SQLPAL. Figure [11-3](#340881_2_En_11_Chapter.xhtml#Fig3)
    shows the interaction between the various layers while running SQL Server on Linux.


    ![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig3_HTML.jpg](images/340881_2_En_11_Chapter/340881_2_En_11_Fig3_HTML.jpg)


    Figure 11-3


    PAL layer interaction on SQL-on-Linux'
