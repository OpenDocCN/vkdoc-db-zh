  trans: '## ASYNC_IO_COMPLETION


    ```

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    CREATE DATABASE [IO_test]

    ON  PRIMARY

    (

    NAME = N''IO_test'', FILENAME = N''E:\Data\IO_test.mdf'' , SIZE = 512000KB , FILEGROWTH
    = 10%

    )

    LOG ON

    (

    NAME = N''IO_test_log'', FILENAME = N''E:\Log\IO_test_log.ldf'' , SIZE = 102400KB
    , FILEGROWTH = 10%

    );

    GO

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''ASYNC_IO_COMPLETION'';

    清单 6-2

    测量即时文件初始化对 ASYNC_IO_COMPLETION 等待的影响

    ```


    图 6-6 显示了配置即时文件初始化前后的等待统计信息。


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig6_HTML.jpg](img/340881_2_En_6_Fig6_HTML.jpg)


    图 6-6：即时文件初始化对 `ASYNC_IO_COMPLETION` 等待的影响。


    即使对于这个相对较小的数据库，使用即时文件初始化带来的收益也相当可观，正如你在等待时间的差异中所看到的那样。在启用即时文件初始化之前，清单 6-2 中的查询耗时
    11 秒完成；更改后，它降至 2 秒。


    如果你已配置即时文件初始化，并且检查确认在看到高 `ASYNC_IO_COMPLETION` 等待时没有备份正在执行，那么问题可能出在你的存储子系统上。分析潜在存储问题的一个好方法是使用
    Perfmon 来监控数据库所在磁盘的 `Avg. Disk/sec Read` 和 `Avg. Disk/sec Write` 计数器，如图 6-7 所示。这些计数器显示了对磁盘的读写延迟（以秒为单位）（这意味着
    0.005 的值代表 5 毫秒）。SQL Server 在最大延迟为 5 毫秒时性能最佳。超过 20 毫秒，延迟将导致明显的性能下降。延迟值越高，存储相关等待类型的等待时间就越长。


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig7_HTML.jpg](img/340881_2_En_6_Fig7_HTML.jpg)


    图 6-7：`Avg. Disk sec/Read` 和 `Avg. Disk sec/Write` Perfmon 计数器。


    关于存储性能，请谨慎下结论。在你断定存储子系统是瓶颈之前，务必与你的存储管理员（如果有）沟通，并向其展示你的测量结果。存储是存储管理员的领域，他/她可以帮助你分析和解决性能问题。


    ## ASYNC_IO_COMPLETION 总结


    当你在 SQL Server 实例内部执行与存储子系统相关的操作时（最显著的是数据库备份和创建新数据库），会发生 `ASYNC_IO_COMPLETION`
    等待类型。虽然 `ASYNC_IO_COMPLETION` 等待完全正常，但如果等待时间高于正常值，则可能表明存在存储相关问题。在你跑去寻找存储管理员之前，请确保确实存在性能问题。一种可能的检查方法是查看你的存储延迟，因为高延迟值也会影响
    `ASYNC_IO_COMPLETION` 等待时间。同时，请检查较高的 `ASYNC_IO_COMPLETION` 等待时间是否与正在执行的数据库备份直接相关。降低
    `ASYNC_IO_COMPLETION` 等待时间的一个绝佳方法是启用即时文件初始化，方法是将你的 SQL Server 服务账户添加到 Perfmon
    卷维护任务本地策略中。


    ## ASYNC_NETWORK_IO


    与 `ASYNC_IO_COMPLETION` 等待类型类似，`ASYNC_NETWORK_IO` 等待类型也与吞吐量有关。但区别在于，`ASYNC_NETWORK_IO`
    等待类型与你的 SQL Server 实例和客户端之间网络连接的吞吐量相关。同样，看到这种特定等待类型的等待时间并不一定意味着存在网络相关问题，因为 `ASYNC_NETWORK_IO`
    等待总是会发生，即使你在 SQL Server 本身查询其实例时也是如此。


    ## 什么是 ASYNC_NETWORK_IO 等待类型？


    `ASYNC_NETWORK_IO` 等待通常在客户端应用程序处理查询结果速度不够快时，或者当你存在网络相关性能问题时发生。前者在大多数情况下是最可能的原因，因为许多应用程序逐行处理
    SQL Server 结果，或者根本无法处理大量数据。这迫使 SQL Server 等待通过网络发送查询结果。在 SQL Server 等待发送请求的数据期间，会记录
    `ASYNC_NETWORK_IO` 等待类型。另一种可能发生 `ASYNC_NETWORK_IO` 等待的情况是，当你使用链接服务器查询远程数据库时。图
    6-8 展示了这一过程的图形化表示。


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig8_HTML.jpg](img/340881_2_En_6_Fig8_HTML.jpg)


    图 6-8：`ASYNC_NETWORK_IO`。


    ## ASYNC_NETWORK_IO 示例


    展示 `ASYNC_NETWORK_IO` 等待类型的示例不需要复杂的测试环境。清单 6-3 显示了一个查询，当从另一台计算机使用 SQL Server Management
    Studio 针对我的测试 SQL Server 实例运行时，它将生成 `ASYNC_NETWORK_IO` 等待，这应该就足够了。该查询将先清除 `sys.dm_os_wait_stats`
    DMV，然后对 `AdventureWorks` 数据库执行实际查询。最后一句将向我们展示 `ASYNC_NETWORK_IO` 等待类型的等待时间。


    ```

    DBCC SQLPERF (''sys.dm_os_wait_stats'', CLEAR);

    SELECT *

    FROM Person.Person;

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''ASYNC_NETWORK_IO'';

    清单 6-3

    生成 ASYNC_NETWORK_IO 等待

    ```


    图 6-9 显示了 `ASYNC_NETWORK_IO` 等待类型的等待时间。


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig9_HTML.jpg](img/340881_2_En_6_Fig9_HTML.jpg)


    图 6-9：`ASYNC_NETWORK_IO` 等待时间。


    在此示例中，针对 `AdventureWorks` 数据库的查询结果无法被 SQL Server Management Studio 应用程序以 SQL Server
    实例提供结果的同样速度进行处理，因此发生了 `ASYNC_NETWORK_IO` 等待。'
- fmt: '### Lowering ASYNC_NETWORK_IO Waits


    One of the "easiest" ways to lower `ASYNC_NETWORK_IO` waits is to identify queries
    that will return a large result set back to the application. For instance, if
    we modify the query to return only the first 100 rows, the SQL Server Management
    Studio might be able to keep up with the information returned to it:


    ```

    DBCC SQLPERF (''sys.dm_os_wait_stats'', CLEAR);

    SELECT TOP 100 *

    FROM Person.Person;

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''ASYNC_NETWORK_IO'';

    ```


    The resulting wait times after this modification can be seen in Figure 6-10.


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig10_HTML.jpg](images/340881_2_En_6_Chapter/340881_2_En_6_Fig10_HTML.jpg)


    Figure 6-10

    ASYNC_NETWORK_IO wait times after modifying the query


    As you can see, we didn’t run into any `ASYNC_NETWORK_IO` waits this time. The
    SQL Server Management Studio was able to keep up with the results returned, so
    the SQL Server instance we queried didn’t have to delay sending the results back
    to the client.


    Another way to limit results returned could be by filtering out information using
    `WHERE` clauses that isn’t used by the application in the first place. Smaller
    results will result in lower `ASYNC_NETWORK_IO` wait times.


    If you believe that `ASYNC_NETWORK_IO` waits are not caused by large results being
    returned to an application, or by the speed at which an application can process
    the results, there is also a possibility that your network configuration is slowing
    you down. In this case you should first check your network utilization. Sadly,
    there isn’t a counter in Perfmon that directly shows the network utilization without
    having you perform some math to calculate it. Instead, you can use the Networking
    tab of the Task Manager to view your network-card utilization, as shown in Figure
    6-11.


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig11_HTML.jpg](images/340881_2_En_6_Chapter/340881_2_En_6_Fig11_HTML.jpg)


    Figure 6-11

    Task Manager network utilization


    If you notice that the network utilization is high while you are experiencing
    higher than normal `ASYNC_NETWORK_IO` wait times, it could be possible that the
    network is slowing you down. In that case it might be a good idea to talk to your
    network administrator. Usually a network configuration consists of many parts,
    like switches, routers, firewalls, network cables, drivers, firmware, potential
    virtualization of the operating system, and so on. All of these parts can slow
    down your network throughput and can be a potential cause of `ASYNC_NETWORK_IO`
    waits.


    ### ASYNC_NETWORK_IO Summary


    The `ASYNC_NETWORK_IO` wait type occurs whenever an application requests query
    results from a SQL Server instance over the network and cannot process the returned
    results fast enough. Seeing `ASYNC_NETWORK_IO` waits occur is completely normal,
    but higher than normal wait times can be caused by changes in the returned query
    results or network-related problems. Lowering `ASYNC_NETWORK_IO` wait times that
    are application related can be achieved by decreasing the number of rows and/or
    columns returned to the application.


    ## CMEMTHREAD


    Waits of the `CMEMTHREAD` wait type are memory related and indicate a pressure
    on certain SQL Server-related memory objects. These memory objects allocate memory
    for the various parts of SQL Server like the buffer cache and the procedure cache.
    Whenever `CMEMTHREAD` waits occur, it means that multiple threads are trying to
    access the same memory object at the same time.


    ### What Is the CMEMTHREAD Wait Type?


    To explain how `CMEMTHREAD` wait type generation works, we have to dig a little
    deeper inside some programming terminology, specifically the terms *mutual exclusions*,
    *critical sections*, and *thread safety*. These three concepts play a direct role
    in the `CMEMTHREAD` wait type generation.


    A critical section consists of a piece of code that accesses a shared resource
    that can only be accessed by one thread at a time. In our case the shared resource
    would be a SQL Server memory object. The SQL Server memory objects can only be
    accessed one thread at a time so as to ensure no corruption to the memory object
    can occur. Because there are many threads that want access to memory objects,
    we have to use a method to ensure only one thread gets access at a time. This
    method is called mutual exclusion. SQL Server uses a Mutex object to make sure
    concurrent threads are not in their critical sections at the same time when accessing
    the memory object. A Mutex does this by serializing the thread access to the memory
    object. Only a single thread can be the owner of a Mutex object, and while a thread
    has ownership, it can access the shared resource. When the thread is done, the
    Mutex object will move to the next thread in line. By using these objects we have
    created a thread-safe code, where multiple threads do not have concurrent access
    to memory objects. Figure 6-12 shows this situation.


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig12_HTML.jpg](images/340881_2_En_6_Chapter/340881_2_En_6_Fig12_HTML.jpg)


    Figure 6-12

    Thread waiting for a Mutex object to access a shared resource


    A simplified example of this behavior is when you and a large group of other people
    are waiting for a single ticket dispenser to buy a ticket to see your favorite
    rock band. In this case the ticket dispenser is the shared resource, and only
    a single person can access the ticket dispenser at a time. When we reach the ticket
    dispenser, we can get a ticket, and the people behind us have to wait till it’s
    their time. After we have bought a ticket, the next person in line gets access
    to the ticket dispenser.


    We can also view this behavior in SQL Server, but to do this we have to make use
    of a debugger (like WinDbg). Figure 6-13 shows how a thread in SQL server waits
    for a Mutex since access to the memory object was granted to another thread. To
    capture this image I used an Extended Event session that created a SQL Server
    mini-dump when a `CMEMTHREAD` wait occurred. I then used WinDbg to open the mini-dump
    and returned the stack.


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig13_HTML.jpg](images/340881_2_En_6_Chapter/340881_2_En_6_Fig13_HTML.jpg)


    Figure 6-13

    Example of a CMEMTHREAD wait occurring in a mini-dump


    The important line here is the `SOS_UnfairMutexPair::LongWait`, which generates
    the `CMEMTHREAD` wait because the thread we are monitoring here has to wait for
    another thread that currently has access to the memory object. The line after
    that, `SOS_UnfairMutexPair::AcquirePair`, means the thread received the Mutex,
    followed by access to the memory object represented by `CMemThread<CmemObj>::Alloc`.'
  raw: '### Lowering ASYNC_NETWORK_IO Waits


    One of the “easiest” ways to lower `ASYNC_NETWORK_IO` waits is to identify queries
    that will return a large result set back to the application. For instance, if
    we modify the query to return only the first 100 rows, the SQL Server Management
    Studio might be able to keep up with the information returned to it:


    ```

    DBCC SQLPERF (''sys.dm_os_wait_stats'', CLEAR);

    SELECT TOP 100 *

    FROM Person.Person;

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''ASYNC_NETWORK_IO'';

    ```


    The resulting wait times after this modification can be seen in Figure [6-10](#340881_2_En_6_Chapter.xhtml#Fig10).


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig10_HTML.jpg](images/340881_2_En_6_Chapter/340881_2_En_6_Fig10_HTML.jpg)


    Figure 6-10


    ASYNC_NETWORK_IO wait times after modifying the query


    As you can see, we didn’t run into any `ASYNC_NETWORK_IO` waits this time. The
    SQL Server Management Studio was able to keep up with the results returned, so
    the SQL Server instance we queried didn’t have to delay sending the results back
    to the client.


    Another way to limit results returned could be by filtering out information using
    `WHERE` clauses that isn’t used by the application in the first place. Smaller
    results will result in lower `ASYNC_NETWORK_IO` wait times.


