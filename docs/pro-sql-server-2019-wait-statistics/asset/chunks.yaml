  trans: '

    关于 SQLPAL 的功能及其设计选择，各大微软博客提供了大量信息。如果你想了解更多关于 SQLPAL 的内容或其诞生历程，推荐阅读《Linux 上的 SQL
    Server：如何实现？简介》这篇文章，链接如下：[`https://cloudblogs.microsoft.com/sqlserver/2016/12/16/sql-server-on-linux-how-introduction/`](https://cloudblogs.microsoft.com/sqlserver/2016/12/16/sql-server-on-linux-how-introduction/)。


    在本章的剩余部分，我将频繁提及 Windows 操作系统所使用的函数。如果你是在 Linux 上运行 SQL Server，请记住：本章描述的功能在 Linux
    上由 SQLPAL 处理，但其功能表现与在 Windows 上相同。


    ## PREEMPTIVE_OS_ENCRYPTMESSAGE 和 PREEMPTIVE_OS_DECRYPTMESSAGE


    本章我们要讨论的第一种抢占式等待类型是 `PREEMPTIVE_OS_ENCRYPTMESSAGE` 和 `PREEMPTIVE_OS_DECRYPTMESSAGE`。从等待类型的名称你大概能猜到，这些函数与通过
    Windows 操作系统加密或解密消息有关。


    ### PREEMPTIVE_OS_ENCRYPTMESSAGE 和 PREEMPTIVE_OS_DECRYPTMESSAGE 等待类型是什么？


    正如我在前一节提到的，`PREEMPTIVE_OS_ENCRYPTMESSAGE` 和 `PREEMPTIVE_OS_DECRYPTMESSAGE` 等待类型与消息的加密和解密相关。更具体地说，它们涉及加密和解密进出
    SQL Server 实例的网络流量。一个使用场景是：当你使用证书连接 SQL Server 实例以加密客户端与 SQL Server 实例之间发送的数据时。在这种情况下，SQL
    Server 需要访问 Windows 操作系统来执行消息加密，或者解密收到的消息。这与例如透明数据加密（TDE）不同，后者的加密/解密过程完全在 SQL
    Server 内部完成。


    `PREEMPTIVE_OS_ENCRYPTMESSAGE` 和 `PREEMPTIVE_OS_DECRYPTMESSAGE` 这两种等待类型不一定表示存在性能问题。它们只是表明加密功能正在被使用，因此通常无需对这些等待类型进行故障排除。加密和解密消息的开销非常小，很少导致严重问题（我尚未遇到因使用证书连接
    SQL Server 而导致性能问题的案例）。


    ### PREEMPTIVE_OS_ENCRYPTMESSAGE 和 PREEMPTIVE_OS_DECRYPTMESSAGE 示例


    为了展示 `PREEMPTIVE_OS_ENCRYPTMESSAGE` 和 `PREEMPTIVE_OS_DECRYPTMESSAGE` 等待类型的示例，我将配置一个证书来加密到
    SQL Server 实例的连接。为使此示例可复现，我包含了创建自签名证书的步骤。通常在生产环境中，你会使用由证书颁发机构颁发的证书，但出于测试目的，自签名证书是可以的。


    要生成自签名证书，我做的第一件事是在我的测试虚拟机上安装 Internet 信息服务（IIS）。IIS 使得生成自签名证书变得非常简单。


    安装完 `IIS` 后，我从管理工具中打开 `IIS 管理器`。然后，我点击我的计算机名称，并在功能视图中选择 `服务器证书` 选项，如图 11-4 所示。


    ![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig4_HTML.jpg](img/340881_2_En_11_Fig4_HTML.jpg)


    图 11-4: IIS 管理器内的功能视图


    这将在 `IIS 管理器` 内打开一个新的 `服务器证书` 视图。在操作窗格中，我点击 `创建自签名证书` 选项。然后系统会要求我提供证书的名称，于是我填写了我的测试虚拟机的名称，如图
    11-5 所示。


    ![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig5_HTML.jpg](img/340881_2_En_11_Fig5_HTML.jpg)


    图 11-5: 创建自签名证书


    我点击 `确定`，自签名证书将被创建并自动放置在我计算机上正确的证书存储区中（`本地计算机 ➤ 个人 ➤ 证书`）。


    现在我的自签名证书已经创建并存储在证书存储区中，我需要确保运行 `SQL Server` 服务的账户具有访问证书的权限。我通过点击 `开始 ➤ 运行`，输入
    `MMC`，然后点击 `确定` 来打开 `MMC`（微软管理控制台）。`MMC` 控制台打开后，我需要添加证书管理单元。为此，我点击 `文件 ➤ 添加/删除管理单元`，选择
    `证书` 管理单元，然后点击 `添加`。当系统提示我选择要管理哪个账户的证书时，我选择 `计算机账户`，如图 11-6 所示，然后点击 `下一步` 和 `完成`。


    ![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig6_HTML.jpg](img/340881_2_En_11_Fig6_HTML.jpg)


    图 11-6: 证书账户选择


    在 `证书` 控制台中，我打开文件夹 `证书（本地计算机） ➤ 个人 ➤ 证书`。如果在 `IIS` 中生成自签名证书的步骤正确，我应该能在这里看到该证书。图
    11-7 显示了我的测试虚拟机上的证书。


    ![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig7_HTML.jpg](img/340881_2_En_11_Fig7_HTML.jpg)


    图 11-7: 自签名证书


    我右键单击自签名证书，选择 `所有任务 ➤ 管理私钥`。此时会打开一个权限对话框。在这里，我需要添加运行 `SQL Server` 服务的账户。在我的案例中，这是默认添加的本地管理员用户。如果你的
    `SQL Server` 服务在另一个账户下运行，该账户只需要对该证书拥有读取权限即可，如图 11-8 所示。


    ![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig8_HTML.jpg](img/340881_2_En_11_Fig8_HTML.jpg)


    图 11-8: 自签名证书权限

    '
- fmt: '# 配置SQL Server使用自签名证书加密连接


    添加账户并选择正确权限后，我单击“确定”关闭对话框。现在权限设置正确，SQL Server服务账户可以访问证书，我需要将自签名证书添加到我希望启用加密的SQL
    Server实例的网络配置中。我打开“SQL Server 配置管理器”并单击“SQL Server 网络配置”选项。右键单击应使用自签名证书的SQL Server实例，然后选择“属性”。接下来，我打开“证书”选项卡并选择我们之前创建的自签名证书。图[11-9](#340881_2_En_11_Chapter.xhtml#Fig9)显示了我测试虚拟机上的对话框。


    ![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig9_HTML.jpg](images/340881_2_En_11_Chapter/340881_2_En_11_Fig9_HTML.jpg)

    图 11-9 证书选择


    选择自签名证书后，我单击“确定”关闭对话框。系统通知我证书将在重启SQL Server服务后生效，因此我执行了SQL Server服务的重启。


    目前，SQL Server可以使用自签名证书，但为确保网络消息被加密，我必须连接到SQL Server实例并告知它需要使用加密。在此示例中，我将使用位于与SQL
    Server实例同一虚拟机上的SQL Server Management Studio连接到该实例。如果您从另一台计算机连接到SQL Server实例，则需要确保该机器上也提供自签名证书。当SQL
    Server Management Studio中出现“连接到服务器”对话框时，我单击对话框右下角的“选项”按钮。这将打开到SQL Server实例连接的附加属性。我勾选“加密连接”复选框，如图[11-10](#340881_2_En_11_Chapter.xhtml#Fig10)所示，然后连接到我的SQL
    Server实例。


    ![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig10_HTML.jpg](images/340881_2_En_11_Chapter/340881_2_En_11_Fig10_HTML.jpg)

    图 11-10 SQL Server Management Studio中的连接属性


    至此，我已完成所有配置，确保SQL Server将使用自签名证书加密SQL Server实例与SQL Server Management Studio之间的消息，因此我终于可以查看`PREEMPTIVE_OS_ENCRYPTMESSAGE`和`PREEMPTIVE_OS_DECRYPTMESSAGE`等待类型了！


    现在生成`PREEMPTIVE_OS_ENCRYPTMESSAGE`和`PREEMPTIVE_OS_DECRYPTMESSAGE`等待非常简单。基本上，我现在从SQL
    Server Management Studio执行的每个查询都将被加密，即使我在与SQL Server实例相同的机器上运行SQL Server Management
    Studio也是如此。我使用清单[11-1](#340881_2_En_11_Chapter.xhtml#PC1)中的查询重置`sys.dm_os_wait_stats`
    DMV，连接到`AdventureWorks`数据库，执行一个简单查询，然后查看在`PREEMPTIVE_OS_ENCRYPTMESSAGE`和`PREEMPTIVE_OS_DECRYPTMESSAGE`等待类型上发生的等待。


    ```sql

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR)

    USE AdventureWorks

    GO

    SELECT *

    FROM Sales.SalesOrderDetail;

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''PREEMPTIVE_OS_ENCRYPTMESSAGE''

    OR wait_type = ''PREEMPTIVE_OS_DECRYPTMESSAGE'';

    -- 清单 11-1 使用加密连接的选择查询

    ```


    在我的测试SQL Server实例上，这些查询的结果如图[11-11](#340881_2_En_11_Chapter.xhtml#Fig11)所示。


    ![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig11_HTML.jpg](images/340881_2_En_11_Chapter/340881_2_En_11_Fig11_HTML.jpg)

    图 11-11 PREEMPTIVE_OS_DECRYPTMESSAGE 和 PREEMPTIVE_OS_ENCRYPTMESSAGE 等待


    如您所见，`PREEMPTIVE_OS_ENCRYPTMESSAGE`等待时间和等待次数更多。这是合理的，因为我执行了一个选择查询，它只需要解密来自客户端的确认网络消息。查询结果必须由SQL
    Server加密，这导致`PREEMPTIVE_OS_ENCRYPTMESSAGE`等待类型的等待时间更高。


    ### 降低PREEMPTIVE_OS_ENCRYPTMESSAGE和PREEMPTIVE_OS_DECRYPTMESSAGE等待


    在正常情况下，无需专注于降低`PREEMPTIVE_OS_ENCRYPTMESSAGE`和`PREEMPTIVE_OS_DECRYPTMESSAGE`等待类型。它们大多只表示正在发生消息加密，这可能是在配置SQL
    Server实例时做出的选择。禁用加密将显著降低`PREEMPTIVE_OS_ENCRYPTMESSAGE`和`PREEMPTIVE_OS_DECRYPTMESSAGE`等待时间，但会以安全性为代价。


    ### PREEMPTIVE_OS_ENCRYPTMESSAGE和PREEMPTIVE_OS_DECRYPTMESSAGE总结


    `PREEMPTIVE_OS_ENCRYPTMESSAGE`和`PREEMPTIVE_OS_DECRYPTMESSAGE`等待类型表示SQL Server实例与客户端之间正在进行加密。这些等待类型通常可以忽略，因为它们并不直接表明存在性能问题。降低它们可以通过禁用加密来实现，但这会牺牲安全性。


    # PREEMPTIVE_OS_WRITEFILEGATHER


    `PREEMPTIVE_OS_WRITEFILEGATHER`等待类型与存储交互有关，更具体地说是通过Windows操作系统写入文件。


    ### 什么是PREEMPTIVE_OS_WRITEFILEGATHER等待类型？


    `PREEMPTIVE_OS_WRITEFILEGATHER`等待类型与Windows操作系统内部的`WriteFileGather`函数有关。如果我们在Books
    Online上查找此函数的定义，会得到以下描述：“从缓冲区数组中检索数据并将数据写入文件。” 从这个描述我们可以推断，当需要向文件写入数据时，会调用此函数。然而，这并非SQL
    Server内部的每一次存储子系统写入操作都如此。通常，SQL Server不需要超出其自身引擎范围去等待一个抢占式操作。但是，存在一些例外情况，这些情况可能导致`PREEMPTIVE_OS_WRITEFILEGATHER`等待（取决于用于执行存储子系统交互的Windows函数）。SQL
    Server内部一个总会导致`PREEMPTIVE_OS_WRITEFILEGATHER`等待的特定操作是数据文件的增长。每当SQL Server想要增长一个数据文件时，它需要在存储子系统上分配额外的空间并“清零”新空间以便SQL
    Server使用。额外空间的分配不是在SQL Server引擎内部发生的，因此必须进行一个抢占式操作，这可能导致在`WriteFileGather`函数上发生抢占式等待。'
  raw: 'After adding the account and selecting the right permission, I click OK to
    close the dialog. Now that the permissions are correct and the SQL Server Service
    account can access the certificate, I need to add the self-signed certificate
    to the network configuration of the SQL Server instance that I want to enable
    for encryption. I open the SQL Server Configuration Manager and click the SQL
    Server Network Configuration option. I right-click the SQL Server instance that
    should use the self-signed certificate and select Properties. Next, I open the
    Certificates tab and select the self-signed certificate we created earlier. Figure
    [11-9](#340881_2_En_11_Chapter.xhtml#Fig9) shows the dialog on my test virtual
    machine.


    ![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig9_HTML.jpg](images/340881_2_En_11_Chapter/340881_2_En_11_Fig9_HTML.jpg)


    Figure 11-9


    Certificate selection


    After selecting the self-signed certificate, I click OK to close the dialog. I
    am notified that the certificate will become active after a restart of the SQL
    Server service, so I perform a restart of the SQL Server Service.


    Right now SQL Server can use the self-signed certificate, but to make sure my
    network messages are encrypted I have to connect to the SQL Server instance and
    tell it that I want to use encryption. For this example I will use the SQL Server
    Management Studio, on the same virtual machine as my SQL Server instance, to connect
    to the SQL Server instance. If you connect to your SQL Server instance from another
    machine you need to make sure the self-signed certificate is available on that
    machine. When the Connect to Server dialog appears inside SQL Server Management
    Studio, I click the Options button at the bottom right of the dialog. This opens
    up additional properties for the connection to my SQL Server instance. I select
    the Encrypt connection checkbox as shown in Figure [11-10](#340881_2_En_11_Chapter.xhtml#Fig10),
    and connect to my SQL Server instance.


    ![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig10_HTML.jpg](images/340881_2_En_11_Chapter/340881_2_En_11_Fig10_HTML.jpg)


    Figure 11-10


    Connection Properties in SQL Server Management Studio


    Right now I have configured everything I need to make sure SQL Server will use
    the self-signed certificate to encrypt messages between the SQL Server instance
    and SQL Server Management Studio, so I can finally take a look at the `PREEMPTIVE_OS_ENCRYPTMESSAGE`
    and `PREEMPTIVE_OS_DECRYPTMESSAGE` wait types!


    Generating the `PREEMPTIVE_OS_ENCRYPTMESSAGE` and `PREEMPTIVE_OS_DECRYPTMESSAGE`
    waits is very simple now. Basically, every query I execute from the SQL Server
    Management Studio right now will be encrypted, even if I run SQL Server Management
    Studio on the same machine as the SQL Server instance. I use the query in Listing
    [11-1](#340881_2_En_11_Chapter.xhtml#PC1) to reset the `sys.dm_os_wait_stats`
    DMV, connect to the `AdventureWorks` database, perform a simple query, and then
    look at the waits occurring on the `PREEMPTIVE_OS_ENCRYPTMESSAGE` and `PREEMPTIVE_OS_DECRYPTMESSAGE`
    wait types.


    ```

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR)

    USE AdventureWorks

    GO

    SELECT *

    FROM Sales.SalesOrderDetail;

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''PREEMPTIVE_OS_ENCRYPTMESSAGE''

    OR wait_type = ''PREEMPTIVE_OS_DECRYPTMESSAGE'';

    Listing 11-1

    Select query using encrypted connection

    ```


    The results of these queries on my test SQL Server instance are shown in Figure
    [11-11](#340881_2_En_11_Chapter.xhtml#Fig11).


    ![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig11_HTML.jpg](images/340881_2_En_11_Chapter/340881_2_En_11_Fig11_HTML.jpg)


    Figure 11-11


    PREEMPTIVE_OS_DECRYPTMESSAGE and PREEMPTIVE_OS_ENCRYPTMESSAGE waits


    As you can see, the `PREEMPTIVE_OS_ENCRYPTMESSAGE` wait time has more waits and
    wait time associated with it. This is logical since I performed a select query
    and it only had to decrypt the acknowledgment network messages from the client.
    The results of the query had to be encrypted by SQL Server, which leads to higher
    waits on the `PREEMPTIVE_OS_ENCRYPTMESSAGE` wait type.


    ### Lowering PREEMPTIVE_OS_ENCRYPTMESSAGE and PREEMPTIVE_OS_DECRYPTMESSAGE Waits


    Under normal circumstances there should be no need to focus attention on lowering
    the `PREEMPTIVE_OS_ENCRYPTMESSAGE` and `PREEMPTIVE_OS_DECRYPTMESSAGE` wait types.
    They mostly just indicate that message encryption is occurring, which is probably
    a choice that was made when configuring the SQL Server instance. Disabling encryption
    will dramatically lower the `PREEMPTIVE_OS_ENCRYPTMESSAGE` and `PREEMPTIVE_OS_DECRYPTMESSAGE`
    wait times, but at the cost of security.


    ### PREEMPTIVE_OS_ENCRYPTMESSAGE and PREEMPTIVE_OS_DECRYPTMESSAGE Summary


    The `PREEMPTIVE_OS_ENCRYPTMESSAGE` and `PREEMPTIVE_OS_DECRYPTMESSAGE` wait types
    indicate that encryption is occurring between the SQL Server instance and a client.
    These wait types can generally be ignored since they do not directly indicate
    a performance problem. Lowering them can be achieved by disabling the use of encryption,
    but this comes at the cost of security.


    ## PREEMPTIVE_OS_WRITEFILEGATHER


    The `PREEMPTIVE_OS_WRITEFILEGATHER` wait type is related to storage interactions,
    more specifically the writing to files through the Windows operating system.


    ### What Is the PREEMPTIVE_OS_WRITEFILEGATHER Wait Type?


    The `PREEMPTIVE_OS_WRITEFILEGATHER` wait type is related to the `WriteFileGather`
    function inside the Windows operating system. If we look up the definition of
    this function on Books Online, we get the following description: “Retrieves data
    from an array of buffers and writes the data to a file.” From this description
    we can assume the function will be called when there is a need to write data to
    a file. This does not count for every storage subsystem write operation inside
    SQL Server, however. Generally there is no need for SQL Server to move outside
    of its own engine to wait for a preemptive operation. There are some exceptions,
    however, which can result in `PREEMPTIVE_OS_WRITEFILEGATHER` waits (depending
    on the Windows function used to perform the storage subsystem interaction). One
    specific operation inside SQL Server that will always result in `PREEMPTIVE_OS_WRITEFILEGATHER`
    waits is the growing of data files. Whenever SQL Server wants to grow a data file,
    it will need to allocate extra space on the storage subsystem and “zero out” the
    new space so SQL Server can use it. The allocation of the extra space does not
    happen inside the SQL Server engine, thus a preemptive operation has to take place,
    which can lead to preemptive waits on the `WriteFileGather` function.'
