    # Part IIWait Types


    # 5. CPU-Related Wait Types


    Processors have evolved enormously in the last few decades, and processor manufacturers,
    like Intel or AMD, manage to build faster processors on a yearly basis. And while
    the speed of processors is hitting a ceiling, the number of cores manufacturers
    manage to build inside their processors has only grown. At the time of writing
    this book, you can buy a single processor with 24 cores inside to power your system.
    Processors are also one of the more difficult parts of your system to replace.
    While you can expand your system’s memory relatively simply, replacing a processor
    for one that is faster or has more cores frequently requires you to change your
    system’s motherboard as well due to CPU socket incompatibility. This means we
