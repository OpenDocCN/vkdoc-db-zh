- fmt: "### Tasks\n\n`Tasks` represent the actual work that needs to be performed\
    \ by the SQLOS, but they do not perform any work themselves. When a request is\
    \ received by SQL Server, one or more tasks will be created to fulfill the request.\
    \ The number of tasks that get generated for a request depends on if the query\
    \ request is being performed using parallelism or if it’s being run serially.\n\
    \nWe can use the `sys.dm_os_tasks` DMV to query the task information, like I did\
    \ in the following example query:\n\n```sql\nSELECT * sys.dm_os_tasks;\n```\n\n\
    Figure [1-8](#340881_2_En_1_Chapter.xhtml#Fig8) shows a part of the results of\
    \ the query.\n\n![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig8_HTML.jpg](images/340881_2_En_1_Chapter/340881_2_En_1_Fig8_HTML.jpg)\n\
    \nFigure 1-8\n\nsys.dm_os_tasks results\n\nWhen you query the `sys.dm_os_tasks`\
    \ DMV you will discover it will return many results, even on servers that have\
    \ no user activity. This is because SQL Server uses tasks for its own processes\
    \ as well; you can identify those by looking at the `session_id` column.\n\nThere\
    \ are some interesting columns in this DMV that are worth exploring to see the\
    \ relations between the different DMVs. The `task_address` column will show you\
    \ the memory address of the task. The `session_id` will return the ID of the session\
    \ that has requested the task, and the `worker_address` will hold the memory address\
    \ of the worker thread associated with the task.\n\n### Worker Threads\n\n`Worker\
    \ threads` are where the actual work for the request is being performed. Every\
    \ task that gets created will get a worker thread assigned to it, and the worker\
    \ thread will then perform the actions requested by the task.\n\nA worker thread\
    \ will actually not perform the work itself; it will request a thread from the\
    \ Windows operating system to perform the work for it. For the sake of simplicity,\
    \ and the fact the actual Windows thread runs outside the SQLOS, I have left this\
    \ step out of Figure [1-5](#340881_2_En_1_Chapter.xhtml#Fig5). You can access\
    \ information about the Windows operating system threads by querying `sys.dm_os_threads`\
    \ if you are interested.\n\nWhen a task requests a worker thread SQL Server will\
    \ look for an idle worker thread and assign it to the task. In the case when no\
    \ idle worker thread can be located and the maximum number of worker threads has\
    \ been reached, the request will be queued until a worker thread finishes its\
    \ current work and becomes available.\n\nThere is a limit to the number of worker\
    \ threads SQL Server has available for processing requests. This number will be\
    \ automatically calculated and configured by SQL Server during startup. We can\
    \ also calculate the maximum number of worker threads ourselves using these formulas:\n\
    \n*   32-bit system with less than, or equal to, 4 logical processors:\n    256\
    \ worker threads\n*   32-bit system with more than 4 logical processors:\n   \
    \ 256 + ((number of logical processors – 4) * 8)\n*   64-bit system with less\
    \ then, or equal to, 4 logical processors:\n    512 worker threads\n*   64-bit\
    \ system with more than 4 logical processors:\n    512 + ((number of logical processors –\
    \ 4) * 16)\n\nExample: If we have a 64-bit system with 16 processors (or cores)\
    \ we can calculate the maximum number of worker threads using the formula, 512\
    \ + ((16 – 4) * 16), which would give us a maximum of 704 worker threads.\n\n\
    The number of worker threads can be changed from the default of `0` (which means\
    \ SQL Server sets the number of max worker threads using the preceding formulas\
    \ when it starts) by changing the `max worker threads` options in your SQL Server’s\
    \ properties, as illustrated by Figure [1-9](#340881_2_En_1_Chapter.xhtml#Fig9).\n\
    \n![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig9_HTML.jpg](images/340881_2_En_1_Chapter/340881_2_En_1_Fig9_HTML.jpg)\n\
    \nFigure 1-9\n\nProcessors page in the Server Properties\n\nGenerally speaking,\
    \ there should be no need to change the `max worker threads` option, and my advice\
    \ is to leave the setting alone, as it should only be changed in very specific\
    \ cases (I will discuss one of those potential cases in Chapter [5](#340881_2_En_5_Chapter.xhtml),\
    \ “CPU-Related Wait Types,” when we talk about THREADPOOL waits).\n\nOne thing\
    \ to keep in mind is that worker threads require memory to work. For 32-bit systems\
    \ this is 512 KB for every worker thread; 64-bit systems will need 2048 KB for\
    \ every worker thread. Thus, changing the number of worker threads can potentially\
    \ impact the memory requirements of SQL Server. This does not mean you need a\
    \ massive amount of memory just for your worker threads—SQL Server will automatically\
    \ destroy worker threads if they have been idle for 15 minutes or if your SQL\
    \ Server is under heavy memory pressure.\n\nSQL Server supplies us with a DMV\
    \ to query information about the worker threads: `sys.dm_os_workers`. Figure [1-10](#340881_2_En_1_Chapter.xhtml#Fig10)\
    \ shows some of the results of this query:\n\n![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig10_HTML.jpg](images/340881_2_En_1_Chapter/340881_2_En_1_Fig10_HTML.jpg)\n\
    \nFigure 1-10\n\nResults of querying sys.dm_os_workers\n\n```sql\nSELECT * FROM\
    \ sys.dm_os_workers;\n```\n\nThe `sys.dm_os_workers` DMV is a very large and complex\
    \ DMV where many columns are marked as “Internal use only” by Microsoft. In this\
    \ DMV the columns `task_address` and `scheduler_address` are available to link\
    \ together the different DMVs we have discussed.\n\nWorker threads go through\
    \ different phases while they are being exposed to the processor, which we can\
    \ view when we look at the `state` column in the `sys.dm_os_workers` DMV:\n\n\
    *   `INIT`: The worker thread is being initialized by the SQLOS.\n*   `RUNNING`:\
    \ The worker thread is currently performing work on a processor.\n*   `RUNNABLE`:\
    \ The worker thread is ready to run on a processor.\n*   `SUSPENDED`: The worker\
    \ thread is waiting for a resource.\n\nThe states the worker threads go through\
    \ while performing their work are one of the main topics of this book. Every time\
    \ a worker thread is not in the `RUNNING` state, it has to wait, and the SQLOS\
    \ records this information into wait statistics, giving us valuable insight into\
    \ what the worker thread has been waiting on and how long it has been waiting."
  raw: '### Tasks


    *Tasks* represent the actual work that needs to be performed by the SQLOS, but
    they do not perform any work themselves. When a request is received by SQL Server,
    one or more tasks will be created to fulfill the request. The number of tasks
    that get generated for a request depends on if the query request is being performed
    using parallelism or if it’s being run serially.


    We can use the **sys.dm_os_tasks** DMV to query the task information, like I did
    in the following example query:


    ```

    SELECT * sys.dm_os_tasks;

    ```


    Figure [1-8](#340881_2_En_1_Chapter.xhtml#Fig8) shows a part of the results of
    the query.


    ![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig8_HTML.jpg](images/340881_2_En_1_Chapter/340881_2_En_1_Fig8_HTML.jpg)


    Figure 1-8


    sys.dm_os_tasks results


    When you query the **sys.dm_os_tasks** DMV you will discover it will return many
    results, even on servers that have no user activity. This is because SQL Server
    uses tasks for its own processes as well; you can identify those by looking at
    the `session_id` column.


    There are some interesting columns in this DMV that are worth exploring to see
    the relations between the different DMVs. The `task_address` column will show
    you the memory address of the task. The `session_id` will return the ID of the
    session that has requested the task, and the `worker_address` will hold the memory
    address of the worker thread associated with the task.


    ### Worker Threads


    *Worker threads* are where the actual work for the request is being performed.
    Every task that gets created will get a worker thread assigned to it, and the
    worker thread will then perform the actions requested by the task.


    A worker thread will actually not perform the work itself; it will request a thread
    from the Windows operating system to perform the work for it. For the sake of
    simplicity, and the fact the actual Windows thread runs outside the SQLOS, I have
    left this step out of Figure [1-5](#340881_2_En_1_Chapter.xhtml#Fig5). You can
    access information about the Windows operating system threads by querying **sys.dm_os_threads**
    if you are interested.


    When a task requests a worker thread SQL Server will look for an idle worker thread
    and assign it to the task. In the case when no idle worker thread can be located
    and the maximum number of worker threads has been reached, the request will be
    queued until a worker thread finishes its current work and becomes available.


    There is a limit to the number of worker threads SQL Server has available for
    processing requests. This number will be automatically calculated and configured
    by SQL Server during startup. We can also calculate the maximum number of worker
    threads ourselves using these formulas:


    *   32-bit system with less than, or equal to, 4 logical processors:


    256 worker threads


    *   32-bit system with more than 4 logical processors:


    256 + ((number of logical processors – 4) * 8)


    *   64-bit system with less then, or equal to, 4 logical processors:


    512 worker threads


    *   64-bit system with more than 4 logical processors:


    512 + ((number of logical processors – 4) * 16)


    Example: If we have a 64-bit system with 16 processors (or cores) we can calculate
    the maximum number of worker threads using the formula, 512 + ((16 – 4) * 16),
    which would give us a maximum of 704 worker threads.


    The number of worker threads can be changed from the default of **0** (which means
    SQL Server sets the number of max worker threads using the preceding formulas
    when it starts) by changing the **max worker threads** options in your SQL Server’s
    properties, as illustrated by Figure [1-9](#340881_2_En_1_Chapter.xhtml#Fig9).


    ![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig9_HTML.jpg](images/340881_2_En_1_Chapter/340881_2_En_1_Fig9_HTML.jpg)


    Figure 1-9


    Processors page in the Server Properties


    Generally speaking, there should be no need to change the **max worker threads**
    option, and my advice is to leave the setting alone, as it should only be changed
    in very specific cases (I will discuss one of those potential cases in Chapter
    [5](#340881_2_En_5_Chapter.xhtml), “CPU-Related Wait Types,” when we talk about
    THREADPOOL waits).


    One thing to keep in mind is that worker threads require memory to work. For 32-bit
    systems this is 512 KB for every worker thread; 64-bit systems will need 2048
    KB for every worker thread. Thus, changing the number of worker threads can potentially
    impact the memory requirements of SQL Server. This does not mean you need a massive
    amount of memory just for your worker threads—SQL Server will automatically destroy
    worker threads if they have been idle for 15 minutes or if your SQL Server is
    under heavy memory pressure.


    SQL Server supplies us with a DMV to query information about the worker threads:
    **sys.dm_os_workers**. Figure [1-10](#340881_2_En_1_Chapter.xhtml#Fig10) shows
    some of the results of this query:


    ![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig10_HTML.jpg](images/340881_2_En_1_Chapter/340881_2_En_1_Fig10_HTML.jpg)


    Figure 1-10


    Results of querying sys.dm_os_workers


    ```

    SELECT * FROM sys.dm_os_workers;

    ```


    The **sys.dm_os_workers** DMV is a very large and complex DMV where many columns
    are marked as “Internal use only” by Microsoft. In this DMV the columns `task_address`
    and `scheduler_address` are available to link together the different DMVs we have
    discussed.


    Worker threads go through different phases while they are being exposed to the
    processor, which we can view when we look at the `state` column in the **sys.dm_os_workers**
    DMV:


    *   INIT: The worker thread is being initialized by the SQLOS.


    *   RUNNING: The worker thread is currently performing work on a processor.


    *   RUNNABLE: The worker thread is ready to run on a processor.


    *   SUSPENDED: The worker thread is waiting for a resource.


    The states the worker threads go through while performing their work are one of
    the main topics of this book. Every time a worker thread is not in the “RUNNING”
    state, it has to wait, and the SQLOS records this information into wait statistics,
    giving us valuable insight into what the worker thread has been waiting on and
    how long it has been waiting.'
  trans: "### 任务\n\n`任务`代表 SQLOS 需要执行的实际工作，但任务本身并不执行任何工作。当 SQL Server 接收到请求时，会创建一个或多个任务来完成该请求。为一个请求生成的任务数量取决于查询请求是使用并行方式执行还是串行方式执行。\n\
    \n我们可以使用 `sys.dm_os_tasks` 动态管理视图 (DMV) 来查询任务信息，就像我在以下示例查询中所做的那样：\n\n```sql\n\
    SELECT * sys.dm_os_tasks;\n```\n\n图 1-8 显示了该查询的部分结果。\n\n![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig8_HTML.jpg](img/340881_2_En_1_Fig8_HTML.jpg)\n\
    \n图 1-8\n\nsys.dm_os_tasks 查询结果\n\n当你查询 `sys.dm_os_tasks` DMV 时，你会发现即使在没有用户活动的服务器上，它也会返回大量结果。这是因为\
    \ SQL Server 也会为自己的进程使用任务；你可以通过查看 `session_id` 列来识别这些任务。\n\n在这个 DMV 中有一些有趣的列，值得探索以了解不同\
    \ DMV 之间的关系。`task_address` 列将显示任务的内存地址。`session_id` 将返回请求该任务的会话 ID，而 `worker_address`\
    \ 将保存与该任务关联的工作线程的内存地址。\n\n### 工作线程\n\n`工作线程`是请求的实际工作得以执行的地方。每个创建的任务都会被分配一个工作线程，然后由该工作线程执行任务请求的操作。\n\
    \n实际上，工作线程本身并不执行工作；它会向 Windows 操作系统请求一个线程来替它执行工作。为了简单起见，并且考虑到实际的 Windows 线程运行在\
    \ SQLOS 之外，我已将此步骤从图 1-5 中省略了。如果你感兴趣，可以通过查询 `sys.dm_os_threads` 来访问有关 Windows 操作系统线程的信息。\n\
    \n当任务请求工作线程时，SQL Server 会查找一个空闲的工作线程并将其分配给该任务。如果找不到空闲的工作线程，并且工作线程的最大数量已经达到，则该请求将被排队，直到某个工作线程完成其当前工作并变得可用。\n\
    \nSQL Server 用于处理请求的工作线程数量是有限的。这个数字将在启动时由 SQL Server 自动计算和配置。我们也可以使用以下公式自己计算最大工作线程数：\n\
    \n*   32 位系统，逻辑处理器数量小于或等于 4：\n    256 个工作线程\n*   32 位系统，逻辑处理器数量大于 4：\n    256\
    \ + ((逻辑处理器数量 – 4) * 8)\n*   64 位系统，逻辑处理器数量小于或等于 4：\n    512 个工作线程\n*   64 位系统，逻辑处理器数量大于\
    \ 4：\n    512 + ((逻辑处理器数量 – 4) * 16)\n\n示例：如果我们有一个 64 位系统，配备 16 个处理器（或核心），我们可以使用公式\
    \ 512 + ((16 – 4) * 16) 计算最大工作线程数，得出最大工作线程数为 704。\n\n工作线程的数量可以从默认值 `0`（这意味着 SQL\
    \ Server 在启动时使用上述公式设置最大工作线程数）进行更改，方法是更改 SQL Server 属性中的 `最大工作线程数` 选项，如图 1-9 所示。\n\
    \n![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig9_HTML.jpg](img/340881_2_En_1_Fig9_HTML.jpg)\n\
    \n图 1-9\n\n服务器属性中的处理器页面\n\n一般来说，不需要更改 `最大工作线程数` 选项，我的建议是保持默认设置不变，因为它只应在非常特定的情况下进行更改（我将在第\
    \ 5 章“与 CPU 相关的等待类型”中讨论其中一种可能的情况，届时我们将讨论 THREADPOOL 等待）。\n\n需要记住的一点是，工作线程需要内存才能工作。对于\
    \ 32 位系统，每个工作线程需要 512 KB；64 位系统则需要 2048 KB。因此，更改工作线程数量可能会影响 SQL Server 的内存需求。这并不意味着你需要为工作线程配备大量内存——如果工作线程空闲超过\
    \ 15 分钟或 SQL Server 面临严重的内存压力，SQL Server 会自动销毁工作线程。\n\nSQL Server 提供了一个 DMV 来查询工作线程的信息：`sys.dm_os_workers`。图\
    \ 1-10 显示了此查询的部分结果：\n\n![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig10_HTML.jpg](img/340881_2_En_1_Fig10_HTML.jpg)\n\
    \n图 1-10\n\n查询 sys.dm_os_workers 的结果\n\n```sql\nSELECT * FROM sys.dm_os_workers;\n\
    ```\n\n`sys.dm_os_workers` DMV 是一个非常庞大且复杂的 DMV，其中许多列被 Microsoft 标记为“仅供内部使用”。在这个\
    \ DMV 中，`task_address` 和 `scheduler_address` 列可用于链接我们讨论过的不同 DMV。\n\n工作线程在被暴露给处理器时会经历不同的阶段，我们可以通过查看\
    \ `sys.dm_os_workers` DMV 中的 `state` 列来观察：\n\n*   `INIT`：工作线程正由 SQLOS 初始化。\n*\
    \   `RUNNING`：工作线程当前正在处理器上执行工作。\n*   `RUNNABLE`：工作线程已准备好在处理器上运行。\n*   `SUSPENDED`：工作线程正在等待某个资源。\n\
    \n工作线程在执行工作时经历的状态是本书的主要主题之一。每当工作线程不处于 `RUNNING` 状态时，它就必须等待，SQLOS 会将此信息记录到等待统计信息中，这使我们能够深入了解工作线程一直在等待什么以及等待了多长时间。"
- fmt: '### Schedulers


    The `scheduler` component''s main task is to—surprise—schedule work, in the form
    of tasks, on the physical processor(s). When a task requests processor time it
    is the scheduler that assigns worker threads to that task so the request can get
    processed. It is also responsible for making sure worker threads cooperate with
    each other and yield the processor when their slice of time, or quantum, has expired.
    We call this cooperative scheduling. The need for worker threads to yield when
    their processor time has expired comes from the fact that a scheduler will only
    let one worker thread run on a processor at a time. If the worker threads didn''t
    need to yield, a worker thread could stay on the processor for an infinite amount
    of time, blocking all usage of that processor.


    There is a one-on-one relation between processors and schedulers. If your system
    has two processors, each with four cores, there will be eight schedulers that
    the SQLOS can use to process user requests, each of them mapped to one of the
    logical processors.


    We can access information about the schedulers by running a query against the
    `sys.dm_os_schedulers` DMV:


    ```sql

    SELECT * FROM sys.dm_os_schedulers;

    ```


    The results of the query are shown in Figure [1-11](#340881_2_En_1_Chapter.xhtml#Fig11).


    ![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig11_HTML.jpg](images/340881_2_En_1_Chapter/340881_2_En_1_Fig11_HTML.jpg)


    Figure 1-11


    `sys.dm_os_schedulers` query results


    The SQL Server on which I ran this query has one processor with two cores, which
    means there should be two schedulers that can process my user requests. If we
    look at Figure [1-11](#340881_2_En_1_Chapter.xhtml#Fig11), however, we notice
    there are more than two schedulers returned by the query. SQL Server uses its
    own schedulers to perform internal tasks, and those schedulers are also returned
    by the DMV and are marked “HIDDEN ONLINE” in the `status` column of the DMV. The
    schedulers that are available for user requests are marked as “VISIBLE ONLINE”
    in the DMV. There is also a special type of scheduler with the `status` “VISIBLE
    ONLINE (DAC).” This is a scheduler dedicated for use with the Dedicated Administrator
    Connection (DAC). This scheduler makes it possible to connect to SQL Server in
    situations where it is unresponsive; for instance, when there are no free worker
    threads available on the schedulers that process user requests.


    We can view the number of worker threads a scheduler has associated with it by
    looking at the `current_workers_count` column. This number also includes worker
    threads that aren''t performing any work. The `active_workers_count` shows us
    the worker threads that are active on the specific scheduler. This doesn''t mean
    they are actually running on the processor, as worker threads with states of “RUNNING,”
    “RUNNABLE,” and “SUSPENDED” also count toward this number. The `work_queue_count`
    is also an interesting column since it will give you insight into how many tasks
    are waiting for a free worker thread. If you see high numbers in this column,
    it might mean that you are experiencing CPU pressure.


    ### Putting It All Together


    All the parts of the SQL Server scheduling we have discussed so far are connected
    to each other, and every request passes through these same components. The following
    text is an example of how a query request would get processed.


    A user connects to the SQL Server through an application. The SQL Server will
    create a session for that user after the login process is completed successfully.
    When the user sends a query to the SQL Server, a task and a request will be created
    to represent the unit of work that needs to be done. The scheduler will assign
    worker threads to the task so it can be completed.


    To see all this information in SQL Server, we can join some of the DMVs we used.
    The query in Listing [1-1](#340881_2_En_1_Chapter.xhtml#PC7) will show you an
    example of how we can combine the different DMVs to get scheduling information
    about a specific session (in this case a session with an ID of 55).


    ```sql

    SELECT

    r.session_id AS ''Session ID'',

    r.command AS ''Type of Request'',

    qt.[text] AS ''Query Text'',

    t.task_address AS ''Task Address'',

    t.task_state AS ''Task State'',

    w.worker_address AS ''Worker Address'',

    w.[state] AS ''Worker State'',

    s.scheduler_address AS ''Scheduler Address'',

    s.[status] AS ''Scheduler State''

    FROM sys.dm_exec_requests r

    CROSS APPLY sys.dm_exec_sql_text(r.sql_handle) qt

    INNER JOIN sys.dm_os_tasks t

    ON r.task_address = t.task_address

    INNER JOIN sys.dm_os_workers w

    ON t.worker_address = w.worker_address

    INNER JOIN sys.dm_os_schedulers s

    ON w.scheduler_address = s.scheduler_address

    WHERE r.session_id = 55

    ```


    Listing 1-1


    Join the different DMVs together to query scheduling information


    Figure [1-12](#340881_2_En_1_Chapter.xhtml#Fig12) shows the information that the
    query returned on my test SQL Server. To keep the results readable, I only selected
    columns from the DMVs to show the relation between them.


    ![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig12_HTML.jpg](images/340881_2_En_1_Chapter/340881_2_En_1_Fig12_HTML.jpg)


    Figure 1-12


    Results of the query from Listing [1-1](#340881_2_En_1_Chapter.xhtml#PC7)


    In the results we can see that Session ID 53 made a `SELECT` query request. I
    did a cross apply with the `sys.dm_exec_sql_text` Dynamic Management Object to
    show the query text of the request. The request was mapped to a task, and the
    task began running. The task was then mapped to a worker thread that was then
    also in a running state. This meant that this query began being processed on a
    processor. The `Scheduler Address` column shows on which specific scheduler our
    worker thread was being run.'
