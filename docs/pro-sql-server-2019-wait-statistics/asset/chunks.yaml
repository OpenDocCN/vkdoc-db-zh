  raw: '### What Is the WAIT_XTP_OFFLINE_CKPT_NEW_LOG Wait Type?


    The `WAIT_XTP_OFFLINE_CKPT_NEW_LOG` wait type appears to be a benign wait type
    that records the length of time the offline checkpoint process is waiting for
    work. This is confirmed by Books Online, which has the following definition: “occurs
    when offline checkpoint is waiting for new log records to scan.”


    As we discussed earlier in this chapter, the offline checkpoint process monitors
    the transaction log for transactions that impact memory-optimized tables so those
    transactions can be recorded in the data and delta files. This is a constantly
    running process in the background of SQL Server, which means you will see an internal
    process with the `WAIT_XTP_OFFLINE_CKPT_NEW_LOG` wait type when you query the
    `sys.dm_os_waiting_tasks` DMV, as you can see in Figure [13-8](#340881_2_En_13_Chapter.xhtml#Fig8).


    ![../images/340881_2_En_13_Chapter/340881_2_En_13_Fig8_HTML.jpg](images/340881_2_En_13_Chapter/340881_2_En_13_Fig8_HTML.jpg)


    Figure 13-8


    WAIT_XTP_OFFLINE_CKPT_NEW_LOG waits inside sys.dm_os_waiting_tasks


    Unlike the `WAIT_XTP_HOST_WAIT` wait type that only writes its wait time information
    to the `sys.dm_os_wait_stats` DMV when specific conditions occur, the `WAIT_XTP_OFFLINE_CKPT_NEW_LOG`
    wait type appears to wait for around 5 seconds, adds the wait time to the `sys.dm_os_wait_stats`
    DMV, and then resets the wait time in the `sys.dm_os_waiting_tasks` DMV again.
    This might suggest that the offline checkpoint process checks for new work at
    an interval of around 5 seconds.


    To understand a little bit more about the offline checkpoint process, I captured
    a stack dump whenever a `WAIT_XTP_OFFLINE_CKPT_NEW_LOG` wait occurred. The stack
    dump gives us some interesting insight into the process itself, as you can see
    here:


    ```

    sqldk.dll!XeSosPkg::wait_info::Publish+0x138

    sqldk.dll!SOS_Scheduler::UpdateWaitTimeStats+0x2bc

    sqldk.dll!SOS_Task::PostWait+0x9e

    sqlmin.dll!EventInternal::Wait+0x1fb

    sqlmin.dll!SequencedObject,0>::WaitUntilSequenceAdvances+0x160

    sqlmin.dll!OfflineCheckpointWorker::GetNextLogBlock+0x10d

    sqlmin.dll!OfflineCheckpointWorker::DoWorkInternal+0xf7

    sqlmin.dll!OfflineCheckpointWorker::DoWork+0x3aa

    sqlmin.dll!OfflineCheckpointWorker::WorkLoop+0x3fc

    sqldk.dll!SOS_Task::Param::Execute+0x21e

    sqldk.dll!SOS_Scheduler::RunTask+0xa8

    sqldk.dll!SOS_Scheduler::ProcessTasks+0x279

    sqldk.dll!SchedulerManager::WorkerEntryPoint+0x24c

    sqldk.dll!SystemThread::RunWorker+0x8f

    sqldk.dll!SystemThreadDispatcher::ProcessWorker+0x3ab

    sqldk.dll!SchedulerManager::ThreadEntryPoint+0x226

    kernel32.dll!BaseThreadInitThunk+0xd

    ntdll.dll!RtlUserThreadStart+0x21

    ```


    The most interesting parts are when the `OfflineCheckpointWorker` function is
    being called. For readability, here is the section that involves the `OfflineCheckpointWorker`
    function:


    ```

    sqlmin.dll!SequencedObject,0>::WaitUntilSequenceAdvances+0x160

    sqlmin.dll!OfflineCheckpointWorker::GetNextLogBlock+0x10d

    sqlmin.dll!OfflineCheckpointWorker::DoWorkInternal+0xf7

    sqlmin.dll!OfflineCheckpointWorker::DoWork+0x3aa

    sqlmin.dll!OfflineCheckpointWorker::WorkLoop+0x3fc

    ```


    Seeing this stack dump makes me believe the offline checkpoint process is started,
    starts looking for work by reading log records from the transaction log (`LogBlock`),
    grabs the first `LogBlock` it needs to process, and loops until all `LogBlocks`
    are processed. When that is done, I suspect the offline checkpoint goes to sleep
    again, waits for around 5 seconds, then wakes up and checks for new log records.


    Seeing this behavior makes me believe the `WAIT_XTP_OFFLINE_CKPT_NEW_LOG` wait
    type is harmless. It just indicates that the offline checkpoint process is waiting
    for work to arrive.


    ### WAIT_XTP_OFFLINE_CKPT_NEW_LOG Summary


    The `WAIT_XTP_OFFLINE_CKPT_NEW_LOG` wait type is related to the offline checkpoint
    process and indicates that process is waiting for work to arrive. Because the
    `WAIT_XTP_OFFLINE_CKPT_NEW_LOG` wait type only indicates that the offline checkpoint
    process is waiting for work, I believe the wait type doesn’t indicate any performance
    issues and can probably be safely ignored.


    # Example SQL Server Machine Configurations


    During the writing of this book, I used a few different test systems to generate
    the examples that are used. This appendix will describe the configuration of the
    systems I used during the examples and wait type demonstrations. If I needed to
    modify the system to demonstrate a specific wait type or situation occurring,
    this will be included in the text inside the chapter that holds the demonstration.


    All my test systems are virtual machines I created inside Oracle VirtualBox, a
    free-to-use virtualization software product that you can download from [`www.virtualbox.org/`](http://www.virtualbox.org/)
    .


    Another tool I frequently used during examples is Ostress. Ostress is part of
    the RML utilities provided to manage your SQL Server’s performance. You can download
    the RML utilities using this link: [`www.microsoft.com/en-us/download/details.aspx?id=4511`](http://www.microsoft.com/en-us/download/details.aspx%253Fid%253D4511)
