  trans: '

    我们可以通过在 SQL Server 内部执行 `DBCC MEMORYSTATUS` 命令来访问有关资源信号量网关的信息。在返回的大量结果中，您会找到如图
    6-25 所示的网关信息。


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig25_HTML.jpg](img/340881_2_En_6_Fig25_HTML.jpg)


    图 6-25：`DBCC MEMORYSTATUS` 命令返回的网关信息


    让我们逐一查看为网关返回的结果。


    `Configured Units` 行返回此网关允许的**最大并发编译数**。这取决于您的 SQL Server 实例可用的逻辑处理器数量。由于我的测试
    SQL Server 有两个逻辑处理器，因此小型网关有八个插槽（4 × 逻辑处理器数），中型网关有两个。`Available Units` 行显示此网关当前可用的空闲插槽数，而
    `Acquires` 行显示当前被编译任务占用的插槽数。必须等待空闲插槽数量的查询数显示在 `Waiters` 行。`Threshold` 值是查询编译为了进入网关所需的内存量（以字节为单位）。对于我的测试
    SQL Server 系统，小型网关的阈值为 380,000 字节，即 371 KB。您可能会注意到，在图 6-25 中，中型网关的阈值为 -1。这是因为中型和大型网关的阈值具有动态性。由于在中型网关以下的网关没有活动，因此尚未设置阈值。


    ### RESOURCE_SEMAPHORE_QUERY_COMPILE 示例


    为了向您展示 `RESOURCE_SEMAPHORE_QUERY_COMPILE` 等待的实例，我将使用许多并发连接来多次执行清单 6-9 中的查询。该查询是一个动态查询，从
    `AdventureWorks` 数据库中连接的两个表中随机选择一行。在这种情况下，是否返回任何结果并不重要——我们这里试图实现的是制造编译内存争用。


    ```sql

    DECLARE @ID VARCHAR(250)

    DECLARE @SQL VarChar(MAX)

    SET @ID = FLOOR(RAND()*(20000-1)+1);

    SET @SQL =

    ''

    SELECT

    '' + @ID + '',

    SUM(soh.SubTotal),

    COUNT(soh.SubTotal)

    FROM sales.SalesOrderHeader soh

    INNER JOIN person.Person p

    ON soh.SalesPersonID = p.BusinessEntityID

    WHERE p.BusinessEntityID = '' + @ID + ''

    ''

    EXEC (@SQL)

    ```

    清单 6-9：`RESOURCE_SEMAPHORE_QUERY_COMPILE` 等待查询


    在我们使用许多并发连接执行查询之前，让我们检查一下需要多少编译内存。我们可以通过在 SQL Server Management Studio 中执行清单 6-9
    中的查询并启用实际执行计划来做到这一点。


    执行查询并打开实际执行计划后，我们需要查看 `CompileMemory` 属性。您可以通过显示“属性”窗口（视图 ➤ 属性窗口）或按 F4 并选择 SELECT
    运算符来访问这些属性。图 6-26 显示了我的测试 SQL Server 上的实际执行计划属性。


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig26_HTML.jpg](img/340881_2_En_6_Fig26_HTML.jpg)


    图 6-26：杂项执行计划属性


    `CompileMemory` 属性返回的值是以 KB 表示的所需编译内存量。此查询需要 408 KB 进行编译。我的测试 SQL Server 上小型网关的阈值是
    371 KB，因此我相当确定该查询将访问小型网关。


    我们将再次使用 Ostress 实用程序生成所需的并发连接来执行该查询。我将查询保存到 `resource_semaphore_compile.sql` 文件，然后使用该文件作为以下
    Ostress 命令的输入。因为查询执行非常快，我让每个连接执行它 100 次，这样我们就有些时间来查看等待统计信息。


    ```bash

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -E -dAdventureWorks
    -i"C:\resource_semaphore_compile.sql" -n200 -r100 -q

    ```


    几秒钟后，在 `sys.dm_os_waiting_tasks` DMV 中可以看到许多 `RESOURCE_SEMAPHORE_QUERY_COMPILE`
    等待，如图 6-27 所示。


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig27_HTML.jpg](img/340881_2_En_6_Fig27_HTML.jpg)


    图 6-27：`RESOURCE_SEMAPHORE_QUERY_COMPILE` 等待


    如果我们现在执行 `DBCC MEMORYSTATUS` 命令，我们应该能够找出编译争用发生在哪个网关。图 6-28 显示了我的测试 SQL Server
    上 `DBCC MEMORYSTATUS` 命令的网关输出。


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig28_HTML.jpg](img/340881_2_En_6_Fig28_HTML.jpg)


    图 6-28：编译争用期间的 `DBCC MEMORYSTATUS`


    如图 6-28 所示，如果我们查看 `Available Units` 的数量，会发现没有可用的插槽留给新的编译内存请求。实际上，我们有 22 个编译内存请求在资源信号量队列中等待。另请注意，中型网关的
    `threshold` 现在已从 -1 更改为 7,041,820 字节（6876 KB）。由于争用现在发生在较低级别的网关上，即使没有编译内存请求由该网关处理，中型网关的阈值也被动态确定了。

    '
- fmt: '## Lowering RESOURCE_SEMAPHORE_QUERY_COMPILE Waits


    The methods you can use to lower the wait times of the `RESOURCE_SEMAPHORE_QUERY_COMPILE`
    wait type are in many cases the same as those that you would use to lower or resolve
    `RESOURCE_SEMAPHORE` waits. Just like the `RESOURCE_SEMAPHORE` wait type, the
    `RESOURCE_SEMAPHORE_QUERY_COMPILE` wait type is memory related, so if you can
    increase the total amount of memory available for query compilation, chances are
    you will lower or resolve `RESOURCE_SEMAPHORE_QUERY_COMPILE` wait times. Increasing
    memory is, however, in many cases the last resort.


    Because we can access very specific information about the gateways of the resource
    semaphore that is dealing with the compilation memory by using the `DBCC MEMORYSTATUS`
    command, a good first step is to analyze the usage patterns of the gateways. If
    you notice that one specific gateway constantly has waiting memory requests, then
    the memory threshold of that gateway, or the maximum allowed amount of concurrent
    compilation-memory requests, should give you some hints about the root cause.
    For instance, if you notice many queued compilation-memory requests at the big
    gateway (which only allows one query at a time), the source of your `RESOURCE_SEMAPHORE_QUERY_COMPILE`
    wait times may be the queries that request a large amount of compilation memory.
    Another cause may be a large number of concurrent queries that all need to access
    the small gateway, which was the case in our example, causing a queue at the gateway.


    In these cases you should find the specific queries that cause the queues at the
    gateways and try to optimize them, either by lowering the amount of compilation
    memory or by making sure fewer compilations happen. The latter can be done by
    making sure your queries are being parameterized correctly. Queries that generate
    ad hoc plans every time they are executed can be a cause of `RESOURCE_SEMAPHORE_QUERY_COMPILE`
    waits, especially if they are executed very frequently and concurrently. Jonathan
    Kehayias of SQLskills has written an excellent blog post on how you can query
    the plan cache to detect heavy compilation queries; it can be found at [`www.sqlskills.com/blogs/jonathan/identifying-high-compile-time-statements-from-the-plan-cache/`](http://www.sqlskills.com/blogs/jonathan/identifying-high-compile-time-statements-from-the-plan-cache/)
    . Using the script in Jonathan’s blog post should help you with detecting those
    queries that require a large amount of compilation memory.


    If your SQL Server is under memory pressure, it is also possible to see `RESOURCE_SEMAPHORE_QUERY_COMPILE`
    waits occur. This happens because of the dynamic compilation-memory thresholds
    of the medium and big gateways. If SQL Server is under memory pressure, the thresholds
    of both these gateways will lower, giving more queries the chance to use the medium
    or big gateways. But because the medium and big gateways allow fewer concurrent
    compilations, in the small gateway the available concurrent slots will be filled
    faster.


    Just as with the `RESOURCE_SEMAPHORE` wait type, you can use the resource governor
    to split workloads into specific resource pools. Each resource pool will have
    its own resource semaphores responsible for granting compilation memory, making
    it possible to split heavy compilation-memory usage across multiple resource pools.


    ## RESOURCE_SEMAPHORE_QUERY_COMPILE Summary


    Just like the resource semaphores that are needed to grant memory requests for
    specific query operations, resource semaphores exist for access to compilation
    memory. These resource semaphores throttle access to compilation memory through
    the usage of gateways. When a query is compiled, it will approach a gateway based
    on the amount of compilation memory it needs. The gateway can then grant the compilation
    memory requested or put the request in a queue if there are more requests that
    concurrently want to access the gateway. When a query is waiting inside one of
    these queues, the `RESOURCE_SEMAPHORE_QUERY_COMPILE` wait type is recorded.


    Resolving or lowering `RESOURCE_SEMAPHORE_QUERY_COMPILE` wait times is commonly
    achieved by either freeing up more memory or by lowering the compilation-memory
    needs of queries.


    ## SLEEP_BPOOL_FLUSH


    The `SLEEP_BPOOL_FLUSH` wait type is directly related to the checkpoint process
    inside SQL Server. The checkpoint process is responsible for writing modified,
    or “dirty,” data pages from the buffer pool to the database data file on disk.
    So next to having a close relationship with the checkpoint process, `SLEEP_BPOOL_FLUSH`
    waits also have a relationship with the performance of your storage subsystem.
    If we search for the definition of the `SLEEP_BPOOL_FLUSH` wait type on Books
    Online, Microsoft describes the wait type as occurring “when a checkpoint is throttling
    the issuance of new I/Os in order to avoid flooding the disk subsystem.”


    It is pretty common to see `SLEEP_BPOOL_FLUSH` waits occur, and frequently they
    will not indicate a problem. There are, however, cases where `SLEEP_BPOOL_FLUSH`
    waits can indicate performance problems that are related to either the checkpoint
    process or the storage subsystem.'
