  trans: '

    # SOS_SCHEDULER_YIELD 等待


    如图 5-11 所示，针对`AdventureWorks`数据库的查询在执行过程中遇到了 30 次`SOS_SCHEDULER_YIELD`等待类型。由于当时这是唯一运行的查询，因此它不需要在可运行队列中等待其他工作线程。如果它曾经花费时间等待其他工作线程，`wait_time_ms`列的值将大于
    0。


    正如本节开头所述，`SOS_SCHEDULER_YIELD`等待类型通常无需引起担忧。然而，如果等待时间显著高于你的基线值，这可能是一个需要进行额外研究的原因。在处理`SOS_SCHEDULER_YIELD`等待时，基本上会遇到三种情况，如图
    5-12 所示。


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig12_HTML.jpg](img/340881_2_En_5_Fig12_HTML.jpg)

    **图 5-12** SOS_SCHEDULER_YIELD 情况


    让我们来看看如何分析和解决 SQL Server CPU 压力问题。


    ## 降低 SOS_SCHEDULER_YIELD 等待


    如果你遇到高于正常水平的 `SOS_SCHEDULER_YIELD` 等待时间和大量的等待次数，你的系统上可能确实存在与 CPU 相关的问题。为了降低 `SOS_SCHEDULER_YIELD`
    等待，我们将重点关注图 5-12 的右上角部分，该部分显示了大量的等待任务和高等待时间。


    如果你遇到 `SOS_SCHEDULER_YIELD` 等待类型的高等待时间，同时伴随大量等待任务，你可以认为你有一个非常繁忙的 SQL Server 实例。工作线程会主动让出处理器，但由于可运行队列中有许多其他线程在等待，它们需要很长时间才能再次回到处理器上。正如我们在前面第
    1 章“等待统计内部原理”中所讨论的，可运行队列是一个先进先出的列表，这意味着可运行队列中等待的工作线程越多，工作线程通过队列所需的时间就越长。你通常会看到系统上
    SQL Server 进程的 CPU 使用率很高。


    为了向你展示此问题的示例，我们将使用 Ostress 实用程序从多个线程同时执行一个特定查询。Ostress 实用程序是 SQL Server RML 实用程序的一部分，你可以在此处下载：[`support.microsoft.com/en-us/kb/944837`](https://support.microsoft.com/en-us/kb/944837)。


    我们要做的第一件事是将以下查询保存到测试服务器上的 `C:\sos_scheduler_yield.sql`：


    ```sql

    WHILE (1=1)

    BEGIN

    SELECT COUNT(*)

    FROM Sales.SalesOrderDetail

    WHERE SalesOrderID BETWEEN 45125 AND 54185

    END;

    ```


    此查询将对 `AdventureWorks` 数据库的 `Sales.SalesOrderDetail` 表中两个 `SalesOrderID` 之间的行数进行计数。它会以无限循环的方式执行此操作。


    保存查询后，我们使用以下命令启动 Ostress 实用程序：


    ```powershell

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -E -dAdventureWorks
    -i"C:\sos_scheduler_yield.sql" -n20 -r1 -q

    ```


    这将启动 Ostress 实用程序，它连接到 `AdventureWorks` 数据库并使用 20 个线程执行 `sos_scheduler_yield.sql`
    脚本。


    一旦我们启动 Ostress，测试 SQL Server 的 CPU 就会立即达到 100%，如图 5-13 所示。


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig13_HTML.jpg](img/340881_2_En_5_Fig13_HTML.jpg)

    **图 5-13** Ostress 对 CPU 的影响


    如图 5-13 所示，CPU 负载来自 `sqlserv#1` 进程，这恰好是我们正在运行 Ostress 查询的 SQL Server 实例。


    如果我们查询 `sys.dm_os_waiting_tasks` DMV 来检查 `SOS_SCHEDULER_YIELD` 等待类型是否是导致高 CPU
    使用率的原因，我们会感到惊讶，如图 5-14 所示。


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig14_HTML.jpg](img/340881_2_En_5_Fig14_HTML.jpg)

    **图 5-14** 未发生 SOS_SCHEDULER_YIELD 等待


    这就是 `SOS_SCHEDULER_YIELD` 等待类型的棘手之处，因为它通常不会被 `sys.dm_os_waiting_tasks` DMV 返回——这是捕获和使用等待统计基线的另一个原因！


    为了证明高 CPU 使用率与 `SOS_SCHEDULER_YIELD` 等待类型有关，我们必须查看累积等待统计 DMV `sys.dm_os_wait_stats`。我们可以使用以下查询，在运行
    Ostress 实用程序时（我们可以在启动 Ostress 实用程序之前重置 DMV 以保持数值较小）显示按等待时间排序的前五种等待类型：


    ```sql

    SELECT TOP 5 *

    FROM sys.dm_os_wait_stats

    ORDER by wait_time_ms DESC;

    ```


    此查询的结果如图 5-15 所示。

    '
- fmt: "![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig15_HTML.jpg](images/340881_2_En_5_Chapter/340881_2_En_5_Fig15_HTML.jpg)\n\
    \n**Figure 5-15** Top five wait types during Ostress execution\n\nAs you can see,\
    \ the number one wait type, by far, is `SOS_SCHEDULER_YIELD` with a pretty high\
    \ amount of `waiting_tasks` and total `wait_time`.\n\nIf you were to experience\
    \ this problem with a production SQL Server instance, the first thing you should\
    \ focus on are those very small, very quick queries like the ones we executed\
    \ in this example. Has the volume of those queries increased? Has the number of\
    \ user connections to the SQL Server executing those queries increased? Those\
    \ are two quick questions you should ask and check. A sudden growth in transactions\
    \ or user connections can lead to high `SOS_SCHEDULER_YIELD` wait times.\n\nAnother\
    \ cause of high `SOS_SCHEDULER_YIELD` waits, together with very high CPU usage,\
    \ can be a phenomenon called `spinlock contention`. Spinlocks are defined by Microsoft\
    \ as “lightweight synchronization primitives which are used to protect access\
    \ to data structures” and are a very advanced topic. Appendix II, at the back\
    \ of this book, goes into a little bit more detail about spinlocks for those who\
    \ are interested in learning more about them.\n\nVery large, very complex queries\
    \ can also lead to higher `SOS_SCHEDULER_YIELD` wait times. Try looking for active\
    \ queries that consume a lot of CPU time and have complex calculations or data-type\
    \ conversions inside them. One query I use frequently to identify CPU-heavy queries\
    \ is the one in **Listing 5-1**.\n\n```sql\nSELECT TOP 10\n    QText.TEXT AS 'Query',\n\
    \    QStats.execution_count AS 'Nr of Executions',\n    QStats.total_worker_time/1000\
    \ AS 'Total CPU Time (ms)',\n    QStats.last_worker_time/1000 AS 'Last CPU Time\
    \ (ms)',\n    QStats.last_execution_time AS 'Last Execution',\n    QPlan.query_plan\
    \ AS 'Query Plan'\nFROM sys.dm_exec_query_stats QStats\nCROSS APPLY sys.dm_exec_sql_text(QStats.sql_handle)\
    \ QText\nCROSS APPLY sys.dm_exec_query_plan(QStats.plan_handle) QPlan\nORDER BY\
    \ QStats.total_worker_time DESC;\n```\n*Listing 5-1: Detect expensive CPU queries*\n\
    \nThe results of the query in **Listing 5-1** on my test SQL Server can be seen\
    \ in **Figure 5-16**.\n\n![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig16_HTML.jpg](images/340881_2_En_5_Chapter/340881_2_En_5_Fig16_HTML.jpg)\n\
    \n**Figure 5-16** Expensive CPU queries\n\nAs you can see, the query we used with\
    \ the Ostress tool is the query that got executed the most and took the highest\
    \ total CPU time. This query could be a good starting point for an investigation.\
    \ Maybe the query can be optimized or rewritten so it doesn’t consume as much\
    \ CPU time.\n\nAnother method you can use to identify queries that are expensive\
    \ CPU wise is the Query Store. The Query Store offers a built-in report called\
    \ “Top Resource Consuming Queries” that immediately allows you to filter on CPU\
    \ time, as shown in **Figure 5-17**.\n\n![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig17_HTML.jpg](images/340881_2_En_5_Chapter/340881_2_En_5_Fig17_HTML.jpg)\n\
    \n**Figure 5-17** Visualizing expensive CPU queries through the Query Store\n\n\
    ### SOS_SCHEDULER_YIELD Summary\n\nThe `SOS_SCHEDULER_YIELD` wait type will always\
    \ occur on every SQL Server instance since it is directly related to the scheduling\
    \ model that SQL Server uses to grant worker threads access to the processor.\
    \ It can indicate a problem if the total wait time or total amount of waiting\
    \ tasks suddenly increases compared to your baseline measurements. Most of the\
    \ time a large increase in `SOS_SCHEDULER_YIELD` waits also means an increase\
    \ in the CPU load. This increase can either be caused by the SQL Server process\
    \ itself or by another process outside of SQL Server that requires a large amount\
    \ of processor time, limiting the time SQL Server can access the processor. If\
    \ the SQL Server process is responsible for the increase in CPU load, you should\
    \ try to correlate the increase in `SOS_SCHEDULER_YIELD` waits with an increase\
    \ in user activity. Another option is to query the `sys.dm_exec_query_stats` DMV,\
    \ as shown in **Listing 5-1**, or use the Query Store to find the queries that\
    \ require the most processor time and focus on optimizing those queries.\n\n##\
    \ THREADPOOL\n\nOne of the most notorious wait types is the `THREADPOOL` wait\
    \ type. Unlike the `CXPACKET` and `SOS_SCHEDULER_YIELD` wait types that occur\
    \ even if your SQL Server instance isn’t experiencing any issues, high `THREADPOOL`\
    \ wait times do frequently indicate a performance problem. Just as with the other\
    \ two CPU-related wait types we discussed in this book, the `THREADPOOL` wait\
    \ type is very closely related to the way SQL Server scheduling works."
  raw: '![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig15_HTML.jpg](images/340881_2_En_5_Chapter/340881_2_En_5_Fig15_HTML.jpg)


    Figure 5-15


    Top five wait types during Ostress execution


    As you can see, the number one wait type, by far, is `SOS_SCHEDULER_YIELD` with
    a pretty high amount of `waiting_tasks` and total `wait_time`.


    If you were to experience this problem with a production SQL Server instance,
    the first thing you should focus on are those very small, very quick queries like
    the ones we executed in this example. Has the volume of those queries increased?
    Has the number of user connections to the SQL Server executing those queries increased?
    Those are two quick questions you should ask and check. A sudden growth in transactions
    or user connections can lead to high `SOS_SCHEDULER_YIELD` wait times.


    Another cause of high `SOS_SCHEDULER_YIELD` waits, together with very high CPU
    usage, can be a phenomenon called *spinlock contention*. Spinlocks are defined
    by Microsoft as “lightweight synchronization primitives which are used to protect
    access to data structures” and are a very advanced topic. Appendix II, at the
    back of this book, goes into a little bit more detail about spinlocks for those
    who are interested in learning more about them.


    Very large, very complex queries can also lead to higher `SOS_SCHEDULER_YIELD`
    wait times. Try looking for active queries that consume a lot of CPU time and
    have complex calculations or data-type conversions inside them. One query I use
    frequently to identify CPU-heavy queries is the one in Listing [5-1](#340881_2_En_5_Chapter.xhtml#PC7).


    ```

    SELECT TOP 10

    QText.TEXT AS ''Query'',

    QStats.execution_count AS ''Nr of Executions'',

    QStats.total_worker_time/1000 AS ''Total CPU Time (ms)'',

    QStats.last_worker_time/1000 AS ''Last CPU Time (ms)'',

    QStats.last_execution_time AS ''Last Execution'',

    QPlan.query_plan AS ''Query Plan''

    FROM sys.dm_exec_query_stats QStats

    CROSS APPLY sys.dm_exec_sql_text(QStats.sql_handle) QText

    CROSS APPLY sys.dm_exec_query_plan(QStats.plan_handle) QPlan

    ORDER BY QStats.total_worker_time DESC;

    Listing 5-1

    Detect expensive CPU queries

    ```


    The results of the query in Listing [5-1](#340881_2_En_5_Chapter.xhtml#PC7) on
    my test SQL Server can be seen in Figure [5-16](#340881_2_En_5_Chapter.xhtml#Fig16).


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig16_HTML.jpg](images/340881_2_En_5_Chapter/340881_2_En_5_Fig16_HTML.jpg)


    Figure 5-16


    Expensive CPU queries


    As you can see, the query we used with the Ostress tool is the query that got
    executed the most and took the highest total CPU time. This query could be a good
    starting point for an investigation. Maybe the query can be optimized or rewritten
    so it doesn’t consume as much CPU time.


    Another method you can use to identify queries that are expensive CPU wise is
    the Query Store. The Query Store offers a built-in report called “Top Resource
    Consuming Queries” that immediately allows you to filter on CPU time, as shown
    in Figure [5-17](#340881_2_En_5_Chapter.xhtml#Fig17).


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig17_HTML.jpg](images/340881_2_En_5_Chapter/340881_2_En_5_Fig17_HTML.jpg)


    Figure 5-17


    Visualizing expensive CPU queries through the Query Store


    ### SOS_SCHEDULER_YIELD Summary


    The `SOS_SCHEDULER_YIELD` wait type will always occur on every SQL Server instance
    since it is directly related to the scheduling model that SQL Server uses to grant
    worker threads access to the processor. It can indicate a problem if the total
    wait time or total amount of waiting tasks suddenly increases compared to your
    baseline measurements. Most of the time a large increase in `SOS_SCHEDULER_YIELD`
    waits also means an increase in the CPU load. This increase can either be caused
    by the SQL Server process itself or by another process outside of SQL Server that
    requires a large amount of processor time, limiting the time SQL Server can access
    the processor. If the SQL Server process is responsible for the increase in CPU
    load, you should try to correlate the increase in `SOS_SCHEDULER_YIELD` waits
    with an increase in user activity. Another option is to query the `sys.dm_exec_query_stats`
    DMV, as shown in Listing [5-1](#340881_2_En_5_Chapter.xhtml#PC7), or use the Query
    Store to find the queries that require the most processor time and focus on optimizing
    those queries.


    ## THREADPOOL


    One of the most notorious wait types is the `THREADPOOL` wait type. Unlike the
    `CXPACKET` and `SOS_SCHEDULER_YIELD` wait types that occur even if your SQL Server
    instance isn’t experiencing any issues, high `THREADPOOL` wait times do frequently
    indicate a performance problem. Just as with the other two CPU-related wait types
    we discussed in this book, the `THREADPOOL` wait type is very closely related
    to the way SQL Server scheduling works.'
  trans: "\n![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig15_HTML.jpg](img/340881_2_En_5_Fig15_HTML.jpg)\n\
    \n**图 5-15** Ostress 执行期间前五名的等待类型\n\n如你所见，迄今为止排名第一的等待类型是 `SOS_SCHEDULER_YIELD`，其\
    \ `waiting_tasks` 数量和总 `wait_time` 都相当高。\n\n如果你在生产环境的 SQL Server 实例中遇到此问题，首先应关注那些非常小、非常快的查询，就像本示例中执行的那些。这类查询的数量是否增加了？执行这些查询的\
    \ SQL Server 的用户连接数是否增加了？这是你应该立即询问和检查的两个问题。事务量或用户连接数的突然增长都可能导致 `SOS_SCHEDULER_YIELD`\
    \ 等待时间变长。\n\n导致 `SOS_SCHEDULER_YIELD` 高等待的另一个原因，连同非常高的 CPU 使用率，可能是一种称为 `spinlock\
    \ contention`（自旋锁争用）的现象。微软将自旋锁定义为“用于保护数据结构访问的轻量级同步原语”，这是一个非常高级的话题。本章末尾的附录 II 为有兴趣进一步了解自旋锁的读者提供了更多细节。\n\
    \n非常大、非常复杂的查询也可能导致更高的 `SOS_SCHEDULER_YIELD` 等待时间。试着寻找那些消耗大量 CPU 时间且内部包含复杂计算或数据类型转换的活动查询。我常用的一个识别\
    \ CPU 密集型查询的查询，如**代码清单 5-1**所示。\n\n```sql\nSELECT TOP 10\n    QText.TEXT AS 'Query',\n\
    \    QStats.execution_count AS 'Nr of Executions',\n    QStats.total_worker_time/1000\
    \ AS 'Total CPU Time (ms)',\n    QStats.last_worker_time/1000 AS 'Last CPU Time\
    \ (ms)',\n    QStats.last_execution_time AS 'Last Execution',\n    QPlan.query_plan\
    \ AS 'Query Plan'\nFROM sys.dm_exec_query_stats QStats\nCROSS APPLY sys.dm_exec_sql_text(QStats.sql_handle)\
    \ QText\nCROSS APPLY sys.dm_exec_query_plan(QStats.plan_handle) QPlan\nORDER BY\
    \ QStats.total_worker_time DESC;\n```\n*代码清单 5-1: 检测昂贵的 CPU 查询*\n\n在测试 SQL Server\
    \ 上执行**代码清单 5-1**中的查询，结果如**图 5-16**所示。\n\n![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig16_HTML.jpg](img/340881_2_En_5_Fig16_HTML.jpg)\n\
    \n**图 5-16** 昂贵的 CPU 查询\n\n如你所见，我们使用 Ostress 工具执行的查询是执行次数最多、总 CPU 时间最高的查询。这个查询可以作为一个很好的调查起点。也许可以对该查询进行优化或重写，以减少其\
    \ CPU 时间消耗。\n\n另一种可用于识别 CPU 密集型查询的方法是使用查询存储。查询存储提供了一个名为“资源消耗最高的查询”的内置报告，该报告可让你立即按\
    \ CPU 时间进行筛选，如**图 5-17**所示。\n\n![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig17_HTML.jpg](img/340881_2_En_5_Fig17_HTML.jpg)\n\
    \n**图 5-17** 通过查询存储可视化昂贵的 CPU 查询\n\n### SOS_SCHEDULER_YIELD 总结\n\n`SOS_SCHEDULER_YIELD`\
    \ 等待类型在每个 SQL Server 实例上都会始终出现，因为它与 SQL Server 用于授予工作线程处理器访问权限的调度模型直接相关。如果总等待时间或总等待任务数量与你的基线测量相比突然增加，则可能表明存在问题。大多数情况下，`SOS_SCHEDULER_YIELD`\
    \ 等待的大幅增加也意味着 CPU 负载的增加。这种增加可能是由 SQL Server 进程本身引起的，也可能是由 SQL Server 之外需要大量处理器时间的其他进程引起的，从而限制了\
    \ SQL Server 访问处理器的时间。如果 CPU 负载的增加是由 SQL Server 进程负责，你应该尝试将 `SOS_SCHEDULER_YIELD`\
    \ 等待的增加与用户活动的增加关联起来。另一个选择是查询 `sys.dm_exec_query_stats` DMV，如**代码清单 5-1**所示，或使用查询存储来查找那些需要最多处理器时间的查询，并集中优化这些查询。\n\
    \n## THREADPOOL\n\n最 notorious（声名狼藉）的等待类型之一是 `THREADPOOL` 等待类型。与 `CXPACKET` 和\
    \ `SOS_SCHEDULER_YIELD` 等待类型（即使你的 SQL Server 实例没有遇到任何问题也会出现）不同，高的 `THREADPOOL`\
    \ 等待时间通常确实表明存在性能问题。正如我们在本书中讨论的其他两种与 CPU 相关的等待类型一样，`THREADPOOL` 等待类型与 SQL Server\
    \ 调度工作的方式密切相关。\n"
- fmt: "### What Is the `THREADPOOL` Wait Type?\n\nIf you ever see `THREADPOOL` waits\
    \ occur on your system with far longer wait times than normal, and your SQL Server\
    \ is (almost) unresponsive, chances are that you are running into an issue called\
    \ thread pool starvation. Thread pool starvation occurs when there are no more\
    \ free worker threads available to process requests. When this situation occurs,\
    \ tasks that are currently waiting to be assigned to a worker thread will log\
    \ the `THREADPOOL` wait type.\n\nSQL Server provides a number of worker threads\
    \ to the schedulers with which to process requests. The number of worker threads\
    \ that are available for your system depends on the number of processors and the\
    \ processor architecture. Table [5-1](#340881_2_En_5_Chapter.xhtml#Tab1) shows\
    \ the maximum number of worker threads available for systems with up to 64 logical\
    \ CPUs.\n\nTable 5-1. Maximum Number of Worker Threads\n\n| CPU Number | 32-Bit\
    \ Architecture | 64-Bit Architecture |\n| :--- | :--- | :--- |\n| ≤4 | 256 | 512\
    \ |\n| 8 | 288 | 576 |\n| 16 | 352 | 704 |\n| 32 | 480 | 960 |\n| 64 | 736 | 1472\
    \ |\n\nYou can also calculate the maximum number of worker threads available by\
    \ using these formulas:\n*   32-bit systems with less than, or equal to, 4 logical\
    \ processors: 256 worker threads\n*   32-bit system with more than 4 logical processors:\
    \ `256 + ((number of logical processors − 4) × 8)`\n*   64-bit system with less\
    \ than, or equal to, 4 logical processors: 512 worker threads\n*   64-bit system\
    \ with more than 4 logical processors: `512 + ((number of logical processors −\
    \ 4) × 16)`\n\nEven though SQL Server calculates the maximum amount of available\
    \ worker threads automatically (only once during startup), you can choose to overwrite\
    \ the default by changing the **Maximum Worker Threads** option inside the Processors\
    \ properties of your SQL Server instance, as shown in Figure [5-18](#340881_2_En_5_Chapter.xhtml#Fig18).\
    \ By default, the value of the Maximum Worker Threads option will be 0, which\
    \ means SQL Server will calculate and assign the maximum amount of worker threads\
    \ available using the preceding formulas.\n\n![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig18_HTML.jpg](images/340881_2_En_5_Chapter/340881_2_En_5_Fig18_HTML.jpg)\n\
    Figure 5-18. Processors configuration of a SQL Server instance\n\nYou can also\
    \ query the number of worker threads assigned to your SQL Server instance by running\
    \ the following query:\n```sql\nSELECT\n    max_workers_count\nFROM sys.dm_os_sys_info;\n\
    ```\nFor my 64-bit test SQL Server that has two logical processors, I have 512\
    \ worker threads available, as you can see in Figure [5-19](#340881_2_En_5_Chapter.xhtml#Fig19).\n\
    \n![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig19_HTML.jpg](images/340881_2_En_5_Chapter/340881_2_En_5_Fig19_HTML.jpg)\n\
    Figure 5-19. Amount of worker threads on my test machine\n\nOne piece of advice\
    \ I frequently read on the Internet related to `THREADPOOL` waits is to change\
    \ the Maximum Worker Threads option to a value higher than the one your SQL Server\
    \ instance has by default. I strongly advise against changing this option from\
    \ its default value. Changing the setting to a higher value than the amount of\
    \ worker threads you would receive by default can actually degrade the performance\
    \ of your SQL Server because context-switching occurs far more often. Another\
    \ reason not to change the setting is that every worker thread requires a bit\
    \ of memory to operate; for 32-bit systems this is 512 KB per worker thread, and\
    \ for 64-bit systems it’s 2048 KB.\n\n### THREADPOOL Example\n\nLet’s start with\
    \ an example of `THREADPOOL` waits occurring on my test SQL Server instance. Even\
    \ though I have warned you multiple times already about making sure to not run\
    \ any of the demo scripts in this book on a production environment, this one deserves\
    \ a special reminder. Running the demo scripts in this section can cause your\
    \ SQL Server to become completely unresponsive, not accepting any new connections,\
    \ and can eventually require a restart of the SQL Server service! Do not run this\
    \ on a SQL Server that isn’t allowed to become unresponsive!\n\nFor this example\
    \ we are going to use the Ostress utility again to simulate concurrency and load\
    \ against the test SQL Server instance. First, we create another `.sql` file (`select_rnd.sql`)\
    \ that holds the following query that we will execute using Ostress:\n```sql\n\
    SELECT TOP 1 *\nFROM Sales.SalesOrderDetail\nORDER BY NEWID()\nOPTION (MAXDOP\
    \ 1)\n```\nThis query will select one random row from the `Sales.SalesOrderDetail`\
    \ table in the `AdventureWorks` database. There is a reason I included the query\
    \ option to serially run this query, and I will explain it later on.\n\nNow, before\
    \ we launch Ostress to execute the preceding query, we are purposely going to\
    \ lower the maximum amount of worker threads available on the test SQL Server.\
    \ To do this we execute this query:\n```sql\nEXEC sp_configure 'show advanced\
    \ options', 1;\nGO\nRECONFIGURE\nGO\nEXEC sp_configure 'max worker threads', 128;\n\
    GO\nRECONFIGURE\nGO\n```\nThis will set the maximum number of worker threads available\
    \ to 128, the minimum value for a 64-bit SQL Server instance.\n\nLet’s fire up\
    \ Ostress and execute the `.sql` script we created earlier:\n```\n\"C:\\Program\
    \ Files\\Microsoft Corporation\\RMLUtils\\ostress.exe\" -E -dAdventureWorks -i\"\
    C:\\select_rnd.sql\" -n150 -r10 -q\n```\nIn this case we will start 150 different\
    \ threads that will execute the query in the `select_rnd.sql` file 10 times. The\
    \ reason for spawning 150 threads is that this value is higher than the maximum\
    \ amount of worker threads available on the test SQL Server instance, but not\
    \ so high that we cannot execute queries anymore.\n\nWhile the script is running,\
    \ let’s take a look at the number of worker threads running and waiting using\
    \ the `sys.dm_os_schedulers` DMV:\n```sql\nSELECT\n    scheduler_id,\n    current_tasks_count,\n\
    \    runnable_tasks_count,\n    current_workers_count,\n    active_workers_count,\n\
    \    work_queue_count\nFROM sys.dm_os_schedulers\nWHERE status = 'VISIBLE ONLINE';\n\
    ```\nThe results of this query are shown in Figure [5-20](#340881_2_En_5_Chapter.xhtml#Fig20).\n\
    \n![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig20_HTML.jpg](images/340881_2_En_5_Chapter/340881_2_En_5_Fig20_HTML.jpg)\n\
    Figure 5-20. Tasks and worker threads per scheduler\n\nThe most important columns\
    \ here are the `current_workers_count`, `active_workers_count`, and `work_queue_count`\
    \ columns. The `current_workers_count` column shows the number of worker threads\
    \ associated with this scheduler; this number also includes worker threads that\
    \ are not yet assigned to a task. The `active_workers_count` column returns the\
    \ number of worker threads that are in the “RUNNING,” “RUNNABLE,” or “SUSPENDED”\
    \ states. The big difference between the `current_workers_count` and the `active_workers_count`\
    \ columns is that the `active_workers_count` is the number of worker threads that\
    \ have been assigned to a task, while the `current_workers_count` returns all\
    \ the worker threads. The `work_queue_count` column shows us the number of tasks\
    \ that are currently waiting to get a worker thread assigned to them. If you see\
    \ values higher than 0 in this column for a longer period of time and for all\
    \ schedulers, you are experiencing thread pool starvation.\n\nLet’s check the\
    \ `sys.dm_os_waiting_tasks` DMV for waiting tasks that originate from a user session.\
    \ Notice that we filter out all the sessions that have a session ID lower than\
    \ 50, even though I told you to not do this in Chapter [2](#340881_2_En_2_Chapter.xhtml),\
    \ “Querying SQL Server Wait Statistics”:"
