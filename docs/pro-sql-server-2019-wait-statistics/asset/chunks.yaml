  trans: '### 什么是 HADR_LOGCAPTURE_WAIT 和 HADR_WORK_QUEUE 等待类型？


    正如我在前一节提到的，`HADR_LOGCAPTURE_WAIT` 和 `HADR_WORK_QUEUE` 这两种等待类型都出现在 AlwaysOn 配置中。它们发生在
    AlwaysOn 配置内部的不同位置，并且功能略有不同。


    根据联机丛书记载，`HADR_LOGCAPTURE_WAIT` 等待类型表明 SQL Server 正在“等待日志记录变得可用。可能发生在等待连接生成新日志记录时，或在读取非缓存中的日志时等待
    I/O 完成。如果日志扫描已进行到日志末尾或正在从磁盘读取，这是预期的等待。” `HADR_LOGCAPTURE_WAIT` 等待类型发生在 AlwaysOn
    可用性组中托管主数据库的 SQL Server 上。可以将主数据库视作数据库镜像配置中的主体。


    AlwaysOn 的工作方式与数据库镜像非常相似，并且也提供两种不同的模式（在 AlwaysOn 内部称为可用性模式）：同步提交和异步提交。这两种可用性模式的工作方式与我们本章前面讨论的数据库镜像对应模式相同。这意味着，在同步提交模式下，主副本会等待将事务提交到事务日志，直到辅助副本完成其自身的日志固化；而在异步提交模式下，主副本将直接提交事务到事务日志，而无需等待辅助副本的确认。


    当主副本等待工作时，SQL Server 会将其等待新事务可用的时间记录为 `HADR_LOGCAPTURE_WAIT` 等待类型。这意味着，看到 `HADR_LOGCAPTURE_WAIT`
    等待类型的高等待时间，实际上意味着 SQL Server 正在等待新事务变为可用，以便将其传输到辅助副本。这与你为 AlwaysOn 可用性组配置的可用性模式无关。无论你的
    AlwaysOn 配置如何，`HADR_LOGCAPTURE_WAIT` 等待类型总会发生。图 10-6 展示了一个 AlwaysOn 可用性组配置以及主副本上因等待新事务发送到辅助副本而出现的
    `HADR_LOGCAPTURE_WAIT` 等待类型。


    ![../images/340881_2_En_10_Chapter/340881_2_En_10_Fig6_HTML.jpg](img/340881_2_En_10_Fig6_HTML.jpg)


    图 10-6

    AlwaysOn 可用性组与 HADR_LOGCAPTURE_WAIT 等待类型


    尽管我在图 10-6 中将 `HADR_LOGCAPTURE_WAIT` 等待类型放在了主副本上，但它也会在辅助副本上记录 `HADR_LOGCAPTURE_WAIT`
    等待类型，尽管这些值通常会远低于主副本上的值。


    `HADR_WORK_QUEUE` 等待类型的功能几乎与 `HADR_LOGCAPTURE_WAIT` 等待类型相同。联机丛书对此等待类型的描述非常出色：“AlwaysOn
    可用性组的后台工作线程等待分配新工作。当有就绪的工作线程等待新工作时，这是预期的等待，属于正常状态。” 这两种等待类型的主要区别在于，`HADR_LOGCAPTURE_WAIT`
    等待类型专门用于等待新事务变得可用，而 `HADR_WORK_QUEUE` 表明有空闲线程正在等待工作。与 `HADR_LOGCAPTURE_WAIT` 等待类型一样，`HADR_WORK_QUEUE`
    也会出现在主副本和辅助副本上，但 `HADR_WORK_QUEUE` 等待类型在两个副本上都更为普遍。事实上，`HADR_WORK_QUEUE` 等待类型通常会成为每个属于
    AlwaysOn 可用性组的 SQL Server 上最主要的 AlwaysOn 相关等待类型，尤其是在工作负载较低的情况下。


    图 10-7 展示了一个类似于图 10-6 的 AlwaysOn 可用性组，但这次我在图中添加了 `HADR_WORK_QUEUE` 等待类型。


    ![../images/340881_2_En_10_Chapter/340881_2_En_10_Fig7_HTML.jpg](img/340881_2_En_10_Fig7_HTML.jpg)


    图 10-7

    HADR_LOGCAPTURE_WAIT 与 HADR_WORK_QUEUE 等待类型


    由于 `HADR_LOGCAPTURE_WAIT` 和 `HADR_WORK_QUEUE` 这两种等待类型都会随时间自然出现，我没有包含关于这两种等待类型的示例。此外，由于这两种等待类型与性能问题没有直接关系，因此包含关于降低它们等待时间的部分没有意义。


    ### HADR_LOGCAPTURE_WAIT 和 HADR_WORK_QUEUE 总结


    `HADR_LOGCAPTURE_WAIT` 和 `HADR_WORK_QUEUE` 这两种等待类型都是良性的等待类型，出现在每个属于 AlwaysOn 可用性组的
    SQL Server 上。因为 `HADR_LOGCAPTURE_WAIT` 和 `HADR_WORK_QUEUE` 等待类型与性能问题没有直接关系，所以没有必要直接关注降低它们，在大多数情况下可以安全地忽略。


    ## HADR_SYNC_COMMIT


    `HADR_SYNC_COMMIT` 等待类型是另一个与 AlwaysOn 相关的等待类型，在 SQL Server 2012 中引入。在很多方面，`HADR_SYNC_COMMIT`
    等待类型与我们本章前面讨论的 `DBMIRROR_SEND` 等待类型非常相似。然而，这两种等待类型之间存在一些差异，我们将在下一节中讨论。


    ### 什么是 HADR_SYNC_COMMIT 等待类型？


    `HADR_SYNC_COMMIT` 等待类型表示主副本等待辅助副本固化日志记录所花费的时间。`HADR_SYNC_COMMIT` 等待只会在主副本上发生，并且只发生在同步复制
    AlwaysOn 可用性组中。一旦主副本接收到事务并将其发送到辅助副本进行固化，`HADR_SYNC_COMMIT` 等待时间就会开始记录。`HADR_SYNC_COMMIT`
    等待时间只有在辅助副本发送确认，表明已写入辅助事务日志完成后才会停止记录。图 10-8 在时间线内展示了 `HADR_SYNC_COMMIT` 等待时间的生成过程。


    ![../images/340881_2_En_10_Chapter/340881_2_En_10_Fig8_HTML.jpg](img/340881_2_En_10_Fig8_HTML.jpg)


    图 10-8

    HADR_SYNC_COMMIT 与同步复制


    由于 `HADR_SYNC_COMMIT` 等待类型总会出现在每个同步复制的 AlwaysOn 可用性组中，因此预期会有一定的等待时间是正常的。但就像 `DBMIRROR_SEND`
    等待类型一样，`HADR_SYNC_COMMIT` 等待类型的等待时间高度依赖于辅助副本处理日志记录的速度。这意味着两个副本之间缓慢的网络连接或辅助副本上存储子系统的性能都会影响
    `HADR_SYNC_COMMIT` 等待时间。因此，了解你的 AlwaysOn 配置中 `HADR_SYNC_COMMIT` 等待类型的正常等待时间非常重要，这样你才能轻松识别出高于正常水平的等待时间。'
- fmt: '## HADR_SYNC_COMMIT Example


    For this example, I have built an AlwaysOn Availability Group configured to use
    synchronous replication. The configuration of the test machines I will use for
    this can be found in Appendix I Example SQL Server Machine Configuration. I won’t
    go into detail on how you can configure an AlwaysOn Availability Group, as there
    is plenty of information available on the Internet to help you configure AlwaysOn.
    A good starting point is the “Getting Started with AlwaysOn Availability Groups”
    article on Books Online, which you can find here: [`https://msdn.microsoft.com/en-us/gg509118`](https://msdn.microsoft.com/en-us/gg509118).
    I used the `AdventureWorks` database as the database that needed to be replicated
    inside my AlwaysOn Availability Group.


    After my AlwaysOn Availability Group was configured I added an extra table named
    `AO_Test` to the `AdventureWorks` database using the script in Listing [10-3](#340881_2_En_10_Chapter.xhtml#PC4).


    ```sql

    USE [AdventureWorks]

    GO

    CREATE TABLE AO_Test

    (

    ID UNIQUEIDENTIFIER PRIMARY KEY,

    RandomData VARCHAR(50)

    );

    -- Listing 10-3

    -- Create AO_Test table

    ```


    After the table is created, I first clear and then query the `sys.dm_os_wait_stats`
    DMV to check the current wait times on the `HADR_SYNC_COMMIT` wait time on both
    the primary and secondary replicas using the following query:


    ```sql

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''HADR_SYNC_COMMIT'';

    ```


    Even after waiting for a couple of minutes, the wait time of the `HADR_SYNC_COMMIT`
    wait type stays 0, as you can see in Figure [10-9](#340881_2_En_10_Chapter.xhtml#Fig9).
    This is what I expected since we have not performed any data modifications on
    the primary replica so far.


    ![../images/340881_2_En_10_Chapter/340881_2_En_10_Fig9_HTML.jpg](images/340881_2_En_10_Chapter/340881_2_En_10_Fig9_HTML.jpg)


    Figure 10-9


    HADR_SYNC_COMMIT wait information during no activity on both the primary and the
    secondary mode


    This is different compared to `HADR_LOGCAPTURE_WAIT` and `HADR_WORK_QUEUE`, which
    will accumulate wait times even though (or because) there is no user activity
    inside the AlwaysOn Availability Group.


    Now that the table is in place, let’s generate some transactions by performing
    a number of inserts. The script in Listing [10-4](#340881_2_En_10_Chapter.xhtml#PC6)
    will insert 10,000 rows into the `AO_Test` table we created earlier.


    ```sql

    INSERT INTO AO_Test

    (

    ID,

    RandomData

    )

    VALUES

    (

    NEWID(),

    CONVERT(VARCHAR(50), NEWID())

    );

    GO 10000

    -- Listing 10-4

    -- Insert 10,000 rows into the AO_Test table

    ```


    When the script in Listing [10-4](#340881_2_En_10_Chapter.xhtml#PC6) has completed,
    I check the wait statistics information inside the `sys.dm_os_wait_stats` DMV
    again on both the primary and secondary replicas. Figure [10-10](#340881_2_En_10_Chapter.xhtml#Fig10)
    shows the results of this query on the primary, and Figure [10-11](#340881_2_En_10_Chapter.xhtml#Fig11)
    on the secondary.


    ![../images/340881_2_En_10_Chapter/340881_2_En_10_Fig11_HTML.jpg](images/340881_2_En_10_Chapter/340881_2_En_10_Fig11_HTML.jpg)


    Figure 10-11


    HADR_SYNC_COMMIT waits on the secondary replica


    ![../images/340881_2_En_10_Chapter/340881_2_En_10_Fig10_HTML.jpg](images/340881_2_En_10_Chapter/340881_2_En_10_Fig10_HTML.jpg)


    Figure 10-10


    HADR_SYNC_COMMIT waits on the primary replica


    The first thing you will notice when looking at both figures is that the `HADR_SYNC_COMMIT`
    waits only occur on the primary replica and not on the secondary, which is expected
    behavior. The second interesting thing is the number of waits that occurred. This
    is the exact same amount as the number of rows we inserted. Again, this is expected
    behavior. Since we performed a single insert and just repeated it 10,000 times,
    every insert generated a single transaction-log record that needed to be replicated.
    Using the number of waits that occurred and the wait time, it is possible to calculate
    the average time it took for one insert operation to be committed on the replica.
    In this case it is 1.53 milliseconds (15342/10000) which is a pretty decent value.


    ## Lowering HADR_SYNC_COMMIT Waits


    Seeing `HADR_SYNC_COMMIT` waits occur does not necessarily mean there is a problem.
    `HADR_SYNC_COMMIT` waits will always occur whenever there are data modifications
    performed on your primary replica. They can indicate a problem if the wait times
    are much higher than you expect them to be when you compare them to your baseline
    measurements.


    Changing the AlwaysOn operation mode to asynchronous replication will completely
    remove `HADR_SYNC_COMMIT` waits, but at the risk of losing data when a disaster
    occurs. Also, to reach your company’s disaster-recovery or high-availability needs,
    you frequently do not have the luxury of just changing the AlwaysOn operating
    mode, and I advise you not to change it just to lower `HADR_SYNC_COMMIT` wait
    times.


    Thankfully, there are many different methods you can use to monitor the performance
    of your AlwaysOn Availability Group, including the AlwaysOn Dashboard, DMVs, and
    Perfmon counters.


    You can open the AlwaysOn Dashboard by right-clicking your AlwaysOn Availability
    Group and selecting the “Show Dashboard” option. The AlwaysOn Dashboard, by default,
    gives you some general information, like the servers inside the Availability Group
    and the synchronization state, about your AlwaysOn Availability Group, as shown
    in Figure [10-12](#340881_2_En_10_Chapter.xhtml#Fig12).


    ![../images/340881_2_En_10_Chapter/340881_2_En_10_Fig12_HTML.jpg](images/340881_2_En_10_Chapter/340881_2_En_10_Fig12_HTML.jpg)


    Figure 10-12


    AlwaysOn Dashboard


    The default view of the AlwaysOn Dashboard doesn’t provide much information you
    can use for troubleshooting. Thankfully, you can configure the view to suit your
    own needs by right-clicking the column bar and selecting the information you are
    interested in, as shown in Figure [10-13](#340881_2_En_10_Chapter.xhtml#Fig13).


    ![../images/340881_2_En_10_Chapter/340881_2_En_10_Fig13_HTML.jpg](images/340881_2_En_10_Chapter/340881_2_En_10_Fig13_HTML.jpg)


    Figure 10-13


    AlwaysOn add columns


    There are many columns that are interesting for troubleshooting synchronization
    issues, and I recommend taking the time to understand them so you can determine
    which columns are most applicable to your situation.


    The information shown by the AlwaysOn Dashboard is originally recorded inside
    various AlwaysOn-related DMVs. This makes it possible for you to query this information
    yourself. All of the AlwaysOn-related DMVs can easily be identified by the `dm_hadr`
    prefix in the DMV name, like the `sys.dm_hadr_database_replica_states` DMV that
    contains a large part of the information you can access inside the AlwaysOn Dashboard.


    Next to the AlwaysOn and DMVs that are related to AlwaysOn, there are a large
    amount of Perfmon counters that specifically show AlwaysOn performance. These
    counters are grouped in the Perfmon SQLServer:Availability Replica and SQLServer:Database
    Replica groups. Figure [10-14](#340881_2_En_10_Chapter.xhtml#Fig14) shows a part
    of the counters available in the SQLServer:Database Replica group.


    ![../images/340881_2_En_10_Chapter/340881_2_En_10_Fig14_HTML.jpg](images/340881_2_En_10_Chapter/340881_2_En_10_Fig14_HTML.jpg)


    Figure 10-14


    Perfmon counters related to AlwaysOn


    As you have read so far, there are plenty of options available to you for analyzing
    the AlwaysOn performance between replicas.'
