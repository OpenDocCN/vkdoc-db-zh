  trans: '


    ### 什么是 `SLEEP_BPOOL_FLUSH` 等待类型？


    为了更好地理解 `SLEEP_BPOOL_FLUSH` 等待类型是如何被记录的，我们需要了解 SQL Server 内部检查点进程的工作原理。


    检查点进程是 SQL Server 的一个内部进程，负责将缓冲区缓存中已修改（脏）的页面写入数据库数据文件。这样做的主要原因之一是为了在发生意外故障时加快数据库的恢复速度。当发生意外故障时，SQL
    Server 需要将数据库恢复到故障发生前的状态。它将通过使用事务日志的内容来重做或撤销对数据页面所做的更改来实现这一点。如果数据页面已被修改，但更改尚未写入数据库数据文件，SQL
    Server 将需要重做对该数据页面的更改。如果检查点已将更改的数据页面写入数据库数据文件，则此步骤就不再需要，这会加快数据库的恢复过程，因为 SQL Server
    知道数据已被写入数据库数据文件。图 6-29 展示了数据页面被修改时发生的（简化）过程。


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig29_HTML.jpg](img/340881_2_En_6_Fig29_HTML.jpg)


    图 6-29：数据修改过程


    当一个已提交的事务修改数据页面时，首先发生的事情是更改将被记录在事务日志中（首先在日志缓冲区中，然后如 `WRITELOG` 和 `LOGBUFFER` 等待类型部分所述写入磁盘）。对数据页面的修改将在缓冲区缓存中进行，并且该数据页面将被标记为脏（红色页面图标）。当发生检查点时（可能有多种原因，我们稍后会讨论），自上一个检查点以来所有被标记为脏的数据页面都将被写入存储子系统上的物理数据库数据文件，无论创建这些脏页面的事务状态如何（绿色页面图标）。


    检查点进程由 SQL Server 自动执行，大约每分钟一次，这是 SQL Server 2016 之前低版本的默认 `recovery interval`（恢复间隔）。这并不意味着检查点会精确地每分钟发生一次。你可以为
    `recovery interval` 指定的值是检查点应发生的时间上限，检查点进程会分析未完成的 I/O 请求和延迟；并限制检查点操作以避免使存储子系统过载。


    以下列表将描述 SQL Server 中可用的各种检查点类型：


    -   内部检查点类型不可配置，在执行某些操作时会自动发生；例如，数据库备份。

    -   自动：这些是默认的检查点，在 SQL Server 2016 之前的版本中，当保持其默认值 0 时，大约每分钟发生一次。我们可以通过在 SQL Server
    Management Studio 的“服务器属性 ➤ 数据库设置”页面下更改 `recovery interval` 配置选项来更改检查点进程的间隔。我们只能将其更改为分钟值，并且它将用于
    SQL Server 实例中的所有数据库。

    -   手动：你可以通过发出 `CHECKPOINT` T-SQL 命令手动触发检查点。你还可以选择指定检查点必须完成的时间（以秒为单位）。如果你确实发出了手动检查点，它将在当前数据库的上下文中运行。例如，在查询窗口中执行
    `CHECKPOINT 10` 将在执行查询后的 10 秒内执行一次检查点。

    -   间接：SQL Server 2012 增加了一个额外的选项，用于在每个数据库级别配置检查点间隔。将此选项配置为大于默认值 0 的值将覆盖特定数据库的自动检查点进程。你可以使用以下命令为特定数据库启用间接检查点：`ALTER
    DATABASE [数据库名称] SET TARGET_RECOVERY_TIME = [以秒或分钟为单位的时间]`。


    随着 SQL Server 2016 的发布，间接检查点成为检查点进程的新默认设置（值为 60）。


    如前所述，如果 SQL Server 认为有必要，它将尝试限制检查点进程以避免使存储子系统过载。它会监控存储子系统的未完成请求数量，并尝试检测是否存在任何延迟。利用这些信息，它将限制检查点进程产生的
    IO 量，以避免对存储子系统造成过重的负载。当检查点进程受到限制时，就会记录 `SLEEP_BPOOL_FLUSH` 等待类型。


    '
- fmt: '### SLEEP_BPOOL_FLUSH Example


    The following example shows the impact of the `SLEEP_BPOOL_FLUSH` wait type on
    SQL Server versions lower than SQL Server 2016. As mentioned earlier, in SQL Server
    2016, the way SQL Server handles the `Checkpoint` process has changed which means
    it is far less likely for the wait type to show up in an example like the following.


    Generating `SLEEP_BPOOL_FLUSH` waits is relatively simple, and the script in Listing
    6-10, which is almost the same one as we used for the `LOGBUFFER` and `WRITELOG`
    wait types, will put pressure on the checkpoint process such that `SLEEP_BPOOL_FLUSH`
    waits will occur.


    ```sql

    USE trans_demo

    GO

    DECLARE @i INT

    SET @i = 1

    WHILE @i < 100

    BEGIN

    INSERT INTO transactions

    (t_guid)

    VALUES

    (newid())

    SET @i = @i + 1

    -- Force a checkpoint to occur within 1 second

    CHECKPOINT 1

    END

    ```

    Listing 6-10

    Generate `SLEEP_BPOOL_FLUSH` waits


    Since we are also using the same database as in the `LOGBUFFER` and `WRITELOG`
    wait types example, Listing 6-11 shows the script to create the database if it
    doesn’t exist already.


    ```sql

    USE master

    GO

    -- Create demo database

    CREATE DATABASE [trans_demo]

    ON PRIMARY

    (

    NAME = N''trans_demo'', FILENAME = N''D:\Data\trans_demo.mdf'' , SIZE = 153600KB
    , FILEGROWTH = 10%

    )

    LOG ON

    (

    NAME = N''trans_demo_log'', FILENAME = N''D:\Log\trans_demo.ldf'' , SIZE = 51200KB
    , FILEGROWTH = 10%

    )

    GO

    -- Make sure recovery model is set to full

    ALTER DATABASE [trans_demo] SET RECOVERY FULL

    GO

    -- Perform full backup first

    -- Otherwise FULL recovery model will not be affected

    BACKUP DATABASE [trans_demo]

    TO  DISK = N''F:\Backup\trans_demo_Full.bak''

    GO

    -- Create a simple test table

    USE trans_demo

    GO

    CREATE TABLE transactions

    (

    t_guid VARCHAR(50)

    )

    GO

    ```

    Listing 6-11

    Create `trans_demo` database


    What the script in Listing 6-10 will do is perform an insert of a random GUID
    into the `transactions` table inside a loop that is executed 100 times. Every
    time it enters a new GUID, it will issue a `CHECKPOINT` command with a time limit
    of 1 second. This forces the checkpoint process to perform a checkpoint within
    the 1-second time limit.


    Before running the script in Listing 6-10, I cleared the `sys.dm_os_wait_stats`
    DMV using the `DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR)` command.


    After almost 70 seconds the script completed on my test SQL Server. I then executed
    the following query to take a look at the `SLEEP_BPOOL_FLUSH` wait times:


    ```sql

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''SLEEP_BPOOL_FLUSH'';

    ```


    The results of the query can be seen in Figure 6-30.


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig30_HTML.jpg](images/340881_2_En_6_Chapter/340881_2_En_6_Fig30_HTML.jpg)


    Figure 6-30

    `SLEEP_BPOOL_FLUSH` waits


    As you can see, the `SLEEP_BPOOL_FLUSH` wait time has a very high amount of wait
    time after running the script in Listing 6-10. Normally you would expect those
    wait times to be either very low or close to zero. If we were to remove the `CHECKPOINT`
    command from the script completely and let SQL Server decide on when to run the
    checkpoint process, we not only get a completely different result, as shown in
    Figure 6-31, but also the script’s runtime is decreased to just a few milliseconds.


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig31_HTML.jpg](images/340881_2_En_6_Chapter/340881_2_En_6_Fig31_HTML.jpg)


    Figure 6-31

    `SLEEP_BPOOL_FLUSH` wait times after removing `CHECKPOINT`


    ### Lowering SLEEP_BPOOL_FLUSH Waits


    Even though it is not very common to run into performance problems caused by the
    `SLEEP_BPOOL_FLUSH` wait type, there are various methods to lower the wait times.


    The most obvious one would be to check the various configuration options available
    to manually configure the `recovery interval` that we discussed earlier. The lower
    the value of the `recovery interval`, the more often checkpoint processes will
    take place, and the bigger the chance of running into `SLEEP_BPOOL_FLUSH` waits.
    Also, as you noticed in the example, performing frequent `CHECKPOINT` commands
    inside transactions can lead to `SLEEP_BPOOL_FLUSH` waits.


    Another possible cause can be the storage subsystem on which your database data
    file resides. As explained earlier, the checkpoint process calculates the load
    of the storage subsystem and then decides if throttling its throughput is needed.
    If there is a frequent need of throttling because your storage subsystem is busy,
    you are more likely to see `SLEEP_BPOOL_FLUSH` waits occur.


    If you are running SQL Server 2016, chances are you will never run into very high
    `SLEEP_BPOOL_FLUSH` wait times since the default way SQL Server handles the process
    has been changed.


    ### SLEEP_BPOOL_FLUSH Summary


    The `SLEEP_BPOOL_FLUSH` wait type is closely related to the checkpoint process
    in SQL Server. The checkpoint process is responsible for writing modified, or
    dirty, data pages from the buffer cache to the database data file. The checkpoint
    process analyzes the performance of the storage subsystem before it writes the
    dirty pages to disk, and if the storage subsystem is busy, the checkpoint process
    will throttle its throughput, resulting in `SLEEP_BPOOL_FLUSH` waits. It is not
    very common to see very high `SLEEP_BPOOL_FLUSH` wait times, but they can impact
    performance nonetheless. Queries that frequently execute the `CHECKPOINT` T-SQL
    command, or a `recovery interval` that is configured to a very low value, can
    be possible causes for seeing `SLEEP_BPOOL_FLUSH` waits occur. The performance
    of your storage subsystem can also impact the checkpoint process if it is forced
    to throttle its throughput.


    ## WRITE_COMPLETION


    As with the `ASYNC_IO_COMPLETION` and `IO_COMPLETION` wait types, the `WRITE_COMPLETION`
    wait type is related to specific actions SQL Server performs on the storage subsystem.
    Again, it is very normal to see `WRITE_COMPLETION` waits occur on your SQL Server
    instance, and they should only be a cause for concern if the wait times are way
    higher than normal.


    ### What Is the WRITE_COMPLETION Wait Type?


    The `WRITE_COMPLETION` wait type is a relative of the `IO_COMPLETION` wait type.
    But where the `IO_COMPLETION` wait type is logged for specific read and write
    operations, the `WRITE_COMPLETION` wait type is only logged for some very specific
    write operations. Some of these write operations are growing a data or log file
    or performing the `DBCC CHECKDB` command.


    Since the `WRITE_COMPLETION` wait type is related to writing SQL Server data to
    the storage subsystem, the performance of it can have an impact on the wait times.'
  raw: '### SLEEP_BPOOL_FLUSH Example


    The following example shows the impact of the SLEEP_BPOOL_FLUSH wait type on SQL
    Server versions lower than SQL Server 2016\. As mentioned earlier, in SQL Server
    2016, the way SQL Server handles the Checkpoint process has changed which means
    it is far less likely for the wait type to show up in an example like the following.


    Generating `SLEEP_BPOOL_FLUSH` waits is relatively simple, and the script in Listing
    [6-10](#340881_2_En_6_Chapter.xhtml#PC15), which is almost the same one as we
    used for the `LOGBUFFER` and `WRITELOG` wait types, will put pressure on the checkpoint
    process such that `SLEEP_BPOOL_FLUSH` waits will occur.


    ```

    USE trans_demo

    GO

    DECLARE @i INT

    SET @i = 1

    WHILE @i < 100

    BEGIN

    INSERT INTO transactions

    (t_guid)

    VALUES

    (newid())

    SET @i = @i + 1

    -- Force a checkpoint to occur within 1 second

    CHECKPOINT 1

    END

    Listing 6-10

    Generate SLEEP_BPOOL_FLUSH waits

    ```


    Since we are also using the same database as in the `LOGBUFFER` and `WRITELOG`
    wait types example, Listing [6-11](#340881_2_En_6_Chapter.xhtml#PC16) shows the
    script to create the database if it doesn’t exist already.


    ```

    USE master

    GO

    -- Create demo database

    CREATE DATABASE [trans_demo]

    ON PRIMARY

    (

    NAME = N''trans_demo'', FILENAME = N''D:\Data\trans_demo.mdf'' , SIZE = 153600KB
    , FILEGROWTH = 10%

    )

    LOG ON

    (

    NAME = N''trans_demo_log'', FILENAME = N''D:\Log\trans_demo.ldf'' , SIZE = 51200KB
    , FILEGROWTH = 10%

    )

    GO

    -- Make sure recovery model is set to full

    ALTER DATABASE [trans_demo] SET RECOVERY FULL

    GO

    -- Perform full backup first

    -- Otherwise FULL recovery model will not be affected

    BACKUP DATABASE [trans_demo]

    TO  DISK = N''F:\Backup\trans_demo_Full.bak''

    GO

    -- Create a simple test table

    USE trans_demo

    GO

    CREATE TABLE transactions

    (

    t_guid VARCHAR(50)

    )

    GO

    Listing 6-11

    Create trans_demo database

    ```


    What the script in Listing [6-10](#340881_2_En_6_Chapter.xhtml#PC15) will do is
    perform an insert of a random GUID into the `transactions` table inside a loop
    that is executed 100 times. Every time it enters a new GUID, it will issue a `CHECKPOINT`
    command with a time limit of 1 second. This forces the checkpoint process to perform
    a checkpoint within the 1-second time limit.


    Before running the script in Listing [6-10](#340881_2_En_6_Chapter.xhtml#PC15),
    I cleared the `sys.dm_os_wait_stats` DMV using the `DBCC SQLPERF` `(''sys.dm_os_wait_stats'',
    CLEAR)` command.


    After almost 70 seconds the script completed on my test SQL Server. I then executed
    the following query to take a look at the `SLEEP_BPOOL_FLUSH wait` times:


    ```

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''SLEEP_BPOOL_FLUSH'';

    ```


    The results of the query can be seen in Figure [6-30](#340881_2_En_6_Chapter.xhtml#Fig30).


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig30_HTML.jpg](images/340881_2_En_6_Chapter/340881_2_En_6_Fig30_HTML.jpg)


    Figure 6-30


    SLEEP_BPOOL_FLUSH waits


    As you can see, the `SLEEP_BPOOL_FLUSH` wait time has a very high amount of wait
    time after running the script in Listing [6-10](#340881_2_En_6_Chapter.xhtml#PC15).
    Normally you would expect those wait times to be either very low or close to zero.
    If we were to remove the `CHECKPOINT` command from the script completely and let
    SQL Server decide on when to run the checkpoint process, we not only get a completely
    different result, as shown in Figure [6-31](#340881_2_En_6_Chapter.xhtml#Fig31),
    but also the script’s runtime is decreased to just a few milliseconds.


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig31_HTML.jpg](images/340881_2_En_6_Chapter/340881_2_En_6_Fig31_HTML.jpg)


    Figure 6-31


    SLEEP_BPOOL_FLUSH wait times after removing CHECKPOINT


    ### Lowering SLEEP_BPOOL_FLUSH Waits


    Even though it is not very common to run into performance problems caused by the
    `SLEEP_BPOOL_FLUSH` wait type, there are various methods to lower the wait times.


    The most obvious one would be to check the various configuration options available
    to manually configure the recovery interval that we discussed earlier. The lower
    the value of the recovery interval, the more often checkpoint processes will take
    place, and the bigger the chance of running into `SLEEP_BPOOL_FLUSH` waits. Also,
    as you noticed in the example, performing frequent `CHECKPOINT` commands inside
    transactions can lead to `SLEEP_BPOOL_FLUSH` waits.


    Another possible cause can be the storage subsystem on which your database data
    file resides. As explained earlier, the checkpoint process calculates the load
    of the storage subsystem and then decides if throttling its throughput is needed.
    If there is a frequent need of throttling because your storage subsystem is busy,
    you are more likely to see `SLEEP_BPOOL_FLUSH` waits occur.


    If you are running SQL Server 2016, chances are you will never run into very high
    SLEEP_BPOOL_FLUSH wait times since the default way SQL Server handles the process
    has been changed.


    ### SLEEP_BPOOL_FLUSH Summary


    The SLEEP_BPOOL_FLUSH wait type is closely related to the checkpoint process in
    SQL Server. The checkpoint process is responsible for writing modified, or dirty,
    data pages from the buffer cache to the database data file. The checkpoint process
    analyzes the performance of the storage subsystem before it writes the dirty pages
    to disk, and if the storage subsystem is busy, the checkpoint process will throttle
    its throughput, resulting in `SLEEP_BPOOL_FLUSH` waits. It is not very common
    to see very high `SLEEP_BPOOL_FLUSH` wait times, but they can impact performance
    nonetheless. Queries that frequently execute the `CHECKPOINT` T-SQL command, or
    a recovery interval that is configured to a very low value, can be possible causes
    for seeing `SLEEP_BPOOL_FLUSH` waits occur. The performance of your storage subsystem
    can also impact the checkpoint process if it is forced to throttle its throughput.


    ## WRITE_COMPLETION


    As with the `ASYNC_IO_COMPLETION` and `IO_COMPLETION` wait types, the `WRITE_COMPLETION`
    wait type is related to specific actions SQL Server performs on the storage subsystem.
    Again, it is very normal to see `WRITE_COMPLETION` waits occur on your SQL Server
    instance, and they should only be a cause for concern if the wait times are way
    higher than normal.


    ### What Is the WRITE_COMPLETION Wait Type?


    The `WRITE_COMPLETION` wait type is a relative of the `IO_COMPLETION` wait type.
    But where the `IO_COMPLETION` wait type is logged for specific read and write
    operations, the `WRITE_COMPLETION` wait type is only logged for some very specific
    write operations. Some of these write operations are growing a data or log file
    or performing the `DBCC CHECKDB` command .


    Since the `WRITE_COMPLETION` wait type is related to writing SQL Server data to
    the storage subsystem, the performance of it can have an impact on the wait times.'
  trans: '### SLEEP_BPOOL_FLUSH 示例


    以下示例展示了 `SLEEP_BPOOL_FLUSH` 等待类型对早于 SQL Server 2016 版本的影响。如前所述，在 SQL Server 2016
    中，SQL Server 处理 `检查点` 过程的方式发生了变化，这意味着在如下示例中该等待类型出现的可能性要小得多。


    生成 `SLEEP_BPOOL_FLUSH` 等待相对简单，清单 6-10 中的脚本（与我们用于 `LOGBUFFER` 和 `WRITELOG` 等待类型的脚本几乎相同）将对检查点过程施加压力，从而导致
    `SLEEP_BPOOL_FLUSH` 等待发生。


    ```sql

    USE trans_demo

    GO

    DECLARE @i INT

    SET @i = 1

    WHILE @i < 100

    BEGIN

    INSERT INTO transactions

    (t_guid)

    VALUES

    (newid())

    SET @i = @i + 1

    -- 在 1 秒内强制执行一个检查点

    CHECKPOINT 1

    END

    ```

    清单 6-10

    生成 `SLEEP_BPOOL_FLUSH` 等待


    由于我们也使用了与 `LOGBUFFER` 和 `WRITELOG` 等待类型示例中相同的数据库，清单 6-11 展示了如果该数据库尚不存在则创建它的脚本。


    ```sql

    USE master

    GO

    -- 创建演示数据库

    CREATE DATABASE [trans_demo]

    ON PRIMARY

    (

    NAME = N''trans_demo'', FILENAME = N''D:\Data\trans_demo.mdf'' , SIZE = 153600KB
    , FILEGROWTH = 10%

    )

    LOG ON

    (

    NAME = N''trans_demo_log'', FILENAME = N''D:\Log\trans_demo.ldf'' , SIZE = 51200KB
    , FILEGROWTH = 10%

    )

    GO

    -- 确保恢复模式设置为完整

    ALTER DATABASE [trans_demo] SET RECOVERY FULL

    GO

    -- 首先执行完整备份

    -- 否则完整恢复模式将不会生效

    BACKUP DATABASE [trans_demo]

    TO  DISK = N''F:\Backup\trans_demo_Full.bak''

    GO

    -- 创建一个简单的测试表

    USE trans_demo

    GO

    CREATE TABLE transactions

    (

    t_guid VARCHAR(50)

    )

    GO

    ```

    清单 6-11

    创建 `trans_demo` 数据库


    清单 6-10 中的脚本将执行的操作是：在一个执行 100 次的循环中，向 `transactions` 表插入一个随机的 GUID。每次插入一个新的 GUID
    后，它都会发出一个时间限制为 1 秒的 `CHECKPOINT` 命令。这会强制检查点过程在 1 秒的时间限制内执行一次检查点。


    在运行清单 6-10 中的脚本之前，我使用 `DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR)` 命令清空了 `sys.dm_os_wait_stats`
    DMV。


    在我的测试 SQL Server 上，该脚本在近 70 秒后完成。然后我执行了以下查询来查看 `SLEEP_BPOOL_FLUSH` 等待时间：


    ```sql

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''SLEEP_BPOOL_FLUSH'';

    ```


    查询结果如图 6-30 所示。


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig30_HTML.jpg](img/340881_2_En_6_Fig30_HTML.jpg)


    图 6-30

    `SLEEP_BPOOL_FLUSH` 等待


    如你所见，运行清单 6-10 中的脚本后，`SLEEP_BPOOL_FLUSH` 等待时间非常高。通常，你会期望这些等待时间要么很低，要么接近于零。如果我们完全从脚本中移除
    `CHECKPOINT` 命令，让 SQL Server 自行决定何时运行检查点过程，我们不仅会得到如图 6-31 所示的完全不同的结果，而且脚本的运行时间也会减少到仅仅几毫秒。


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig31_HTML.jpg](img/340881_2_En_6_Fig31_HTML.jpg)


    图 6-31

    移除 `CHECKPOINT` 后的 `SLEEP_BPOOL_FLUSH` 等待时间


    ### 降低 SLEEP_BPOOL_FLUSH 等待


    尽管由 `SLEEP_BPOOL_FLUSH` 等待类型引起的性能问题并不常见，但有多种方法可以降低等待时间。


    最明显的方法是检查可用的各种配置选项，以手动配置我们之前讨论过的 `恢复间隔`。`恢复间隔` 的值越低，检查点过程发生的频率就越高，遇到 `SLEEP_BPOOL_FLUSH`
    等待的可能性也就越大。此外，正如你在示例中注意到的那样，在事务中执行频繁的 `CHECKPOINT` 命令也可能导致 `SLEEP_BPOOL_FLUSH`
    等待。


    另一个可能的原因是数据库数据文件所在的存储子系统。如前所述，检查点过程会分析存储子系统的负载，然后决定是否需要限制其吞吐量。如果因为存储子系统繁忙而频繁需要限制，你更有可能看到
    `SLEEP_BPOOL_FLUSH` 等待发生。


    如果你运行的是 SQL Server 2016，很可能永远不会遇到非常高的 `SLEEP_BPOOL_FLUSH` 等待时间，因为 SQL Server 处理此过程的默认方式已经改变。


    ### SLEEP_BPOOL_FLUSH 总结


    `SLEEP_BPOOL_FLUSH` 等待类型与 SQL Server 中的检查点过程密切相关。检查点过程负责将缓冲区缓存中已修改的（或脏的）数据页写入数据库数据文件。检查点过程在将脏页写入磁盘之前会分析存储子系统的性能，如果存储子系统繁忙，检查点过程将限制其吞吐量，从而导致
    `SLEEP_BPOOL_FLUSH` 等待。看到非常高的 `SLEEP_BPOOL_FLUSH` 等待时间并不常见，但它们仍然可能影响性能。频繁执行 `CHECKPOINT`
    T-SQL 命令的查询，或配置得非常低的 `恢复间隔`，都可能是看到 `SLEEP_BPOOL_FLUSH` 等待发生的原因。存储子系统的性能也可能影响检查点过程，如果它被迫限制其吞吐量的话。


    ## WRITE_COMPLETION


    与 `ASYNC_IO_COMPLETION` 和 `IO_COMPLETION` 等待类型类似，`WRITE_COMPLETION` 等待类型与 SQL
    Server 在存储子系统上执行的特定操作相关。同样，在你的 SQL Server 实例上看到 `WRITE_COMPLETION` 等待发生是非常正常的，只有当等待时间远高于正常水平时才应引起关注。


    ### 什么是 WRITE_COMPLETION 等待类型？


    `WRITE_COMPLETION` 等待类型是 `IO_COMPLETION` 等待类型的近亲。但是，`IO_COMPLETION` 等待类型是为特定的读写操作记录的，而
    `WRITE_COMPLETION` 等待类型仅针对一些非常特定的写操作记录。其中一些写操作包括扩展数据或日志文件，或者执行 `DBCC CHECKDB`
    命令。


    由于 `WRITE_COMPLETION` 等待类型与将 SQL Server 数据写入存储子系统有关，因此存储子系统的性能会对其等待时间产生影响。'
- fmt: '### WRITE_COMPLETION Example


    To show you an example of a `WRITE_COMPLETION` wait occurring, I am going to perform
    a `CHECKDB` against the `AdventureWorks` database after clearing the `sys.dm_os_wait_stats`
    DMV using the `DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR)` command.


    Keep in mind that this example is a completely normal situation in which `WRITE_COMPLETION`
    waits can occur, and it shouldn’t stop you from performing regular database consistency
    checks!


    Listing 6-12 shows the query I executed to generate a few `WRITE_COMPLETION` waits.


    ```sql

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    DBCC CHECKDB (''AdventureWorks'');

    SELECT * FROM sys.dm_os_wait_stats

    WHERE wait_type = ''WRITE_COMPLETION'';

    ```

    **Listing 6-12** Generate WRITE_COMPLETION waits


    The results of the last query in the batch are shown in Figure 6-32.


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig32_HTML.jpg](images/340881_2_En_6_Chapter/340881_2_En_6_Fig32_HTML.jpg)


    **Figure 6-32** WRITE_COMPLETION waits


    As you can see, the amount of wait time is so low that it would not be a cause
    of any concern. This is also partly due to the fact that the `AdventureWorks`
    database is very small and the storage performance of my test machine is very
    fast. Running `CHECKDB` against larger databases can result in higher wait times.


    ### Lowering WRITE_COMPLETION Waits


    If you see high `WRITE_COMPLETION` wait times, try to find out what process is
    generating the waits. In many cases it will be caused by a `CHECKDB` or database
    data or log file growth.


    One thing worth checking is the instant file initialization option discussed in
    the `ASYNC_IO_COMPLETION` section earlier in this chapter. Not using this option
    can impact the duration of the `WRITE_COMPLETION` wait time.


    Another, far less common cause for a higher `WRITE_COMPLETION` wait time is when
    you are experiencing page latch contention on your Page Free Space page (or PFS).
    The PFS page tracks the amount of free space in data pages. If a process needs
    to modify the PFS page very frequently, it is possible to see `WRITE_COMPLETION`
    waits occur along with many `PAGELATCH_UP` waits, which we will discuss in Chapter
    9, “Latch-Related Wait Types.” To give you an example of such a scenario, consider
    a high amount of concurrent queries that all create a temporary table, insert
    a few rows, and remove the temporary table again. In this case the PFS page of
    the `tempdb` database needs to get updates very frequently to reflect the creation
    and removal of the temporary tables.


    ### WRITE_COMPLETION Summary


    The `WRITE_COMPLETION` wait type, just like the `ASYNC_IO_COMPLETION` and `IO_COMPLETION`
    wait types, is related to specific storage-related actions performed by SQL Server.
    Seeing `WRITE_COMPLETION` waits is very normal and won’t be cause for concern
    in many situations. Operations such as `CHECKDB` and database data or log file
    growth can cause `WRITE_COMPLETION` waits.


    # 7. Backup-Related Wait Types


    Backups are a very important part of database administration, and in many cases
    they are essential for the survival of the company you work for. Data has become
    so important for businesses that if some disaster causes data to be lost, companies
    can lose large amounts of money, or even go out of business.


    There are many methods we can implement on all levels of your IT infrastructure
    to make sure no data is lost (or as little as possible) during a disaster. We
    could implement a SAN to make sure our data is not stored on a local disk drive
    on your server. Or we could design SQL Server AlwaysOn Availability Groups to
    replicate our data across datacenters. But the first step we should take, and
    hopefully have already taken, is performing regular backups of our data inside
    our SQL Server databases.


    Implementing and scheduling SQL Server backups is not a very difficult task, and
    there is no excuse not to perform a backup. The type of backup and the interval
    of backup operations are dictated by the needs of the organization you work for
    and are frequently expressed in “RTO” (Recovery Time Objective) and “RPO” (Recovery
    Point Objective) times. These times represent the amount of time it should take
    to recover from a disaster and the amount of data loss that is acceptable when
    a disaster occurs. These two times should be the primary input for your SQL Server
    backup strategy.


    Thankfully, SQL Server has different options available to us for meeting RTO and
    RPO requirements right out of the box. This means we can use SQL Server’s own
    backup mechanism to fulfill our company’s RTO and RPO times; we are not necessarily
    dependent on third-party backup software. Since the SQL Server backup operation
    is an internal process, there are different wait types associated with it, and
    in this chapter we will take a look at three of the most common wait types that
    are directly related to performing backups and restores.


    Noticing high wait times on these backup/restore-related wait types will not likely
    lead to a performance degradation of your SQL Server instance. However, we do
    have options to optimize the SQL Server backup process that can result in faster
    backup and restore times. And since backups/restores of your database(s) are vital
    for the survival of your company, optimizing backup and restore throughput can
    be well worth the effort.


    ## BACKUPBUFFER


    The first backup-related wait types we will discuss is `BACKUPBUFFER`. If we look
    up the definition of this wait type on Books Online we would get the following
    text: “Occurs when a backup task is waiting for data, or is waiting for a buffer
    in which to store data. This type is not typical, except when a task is waiting
    for a tape mount.” Apparently, we would only see this wait type when we are writing
    our backups to a tape device, and this is wrong. `BACKUPBUFFER` waits will practically
    always be logged during a backup operation, no matter the destination of the backup
    file. The reason for this is in the way the SQL Server backup operation uses buffers
    to read data from the database and write it to the backup file.'
