  trans: '### PREEMPTIVE_OS_AUTHENTICATIONOPS 示例


    要生成一个出现 `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待的示例，我无需执行任何复杂操作。只需使用 Windows 身份验证打开一个到
    SQL Server 实例的新连接即可。一种便于测量的方法是：使用 SQL Server Management Studio 并通过 Windows 身份验证连接到
    SQL Server 实例。图 11-16 展示了 SQL Server Management Studio 连接到我的测试 SQL Server 实例的对话框。请注意，我的测试
    SQL Server 实例不在域中，我使用的是本机上的本地管理员账户进行连接。


    ![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig16_HTML.jpg](img/340881_2_En_11_Fig16_HTML.jpg)


    图 11-16


    使用本地 Windows 身份验证连接 SQL Server Management Studio


    接下来，我在 SQL Server Management Studio 中打开一个新的查询窗口，并执行清单 11-3 所示查询中的步骤。


    ```sql

    -- Step 1 Clear sys.dm_os_wait_stats

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    -- Step 2 Open a new Query Window inside

    -- SQL Server Management Studio

    -- Step 3 go back to this Query Window

    -- and run the query below

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''PREEMPTIVE_OS_AUTHENTICATIONOPS'';

    ```

    清单 11-3

    生成 `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待


    如果你遵循清单 11-3 脚本注释中的步骤，在运行步骤 3 中的查询后，你应该能看到 `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待出现。图
    11-17 显示了在我的测试机器上执行步骤 3 查询的结果。


    ![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig17_HTML.jpg](img/340881_2_En_11_Fig17_HTML.jpg)


    图 11-17


    `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待


    如你所见，发生的等待次数及其等待时间都非常低。本示例的目的不是展示非常高的 `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待时间，而是展示当连接到
    SQL Server 实例时，它们是如何自然发生的。因为我在 SQL Server Management Studio 中打开了一个新的查询窗口，所以将使用我连接到
    SQL Server 实例的 Windows 登录名建立一个新的连接。由于这是一个新连接，用于连接的账户必须经过身份验证，从而导致了 `PREEMPTIVE_OS_AUTHENTICATIONOPS`
    等待。


    ### 降低 PREEMPTIVE_OS_AUTHENTICATIONOPS 等待


    在示例中，我已向你展示了每当连接到 SQL Server 实例时，`PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待是如何自然发生的。现在想象这样一种情况：你的
    SQL Server 实例是域环境的一部分，并且它使用 Windows 身份验证来针对 Active Directory 验证域用户（或组）。在这种情况下，你的身份验证请求必须通过网络传输以执行账户验证。有许多因素会影响身份验证请求的速度；例如，如果你的域控制器负载很大，执行身份验证可能需要更长时间，或者如果你的网络出现性能下降，也会影响身份验证请求。这些因素也会导致
    `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待类型，并可能导致更高的等待时间。


    我想向你描述一个我在客户那里遇到的涉及 `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待类型的案例，让你了解如何降低 `PREEMPTIVE_OS_AUTHENTICATIONOPS`
    等待时间。


    该客户使用一个应用程序，该应用程序使用运行该应用程序的计算机上登录的 Windows 账户连接到 SQL Server。这些计算机和 SQL Server
    都属于一个域。从安全角度来看，该应用程序设计良好，因为它不需要单独的 SQL Server 用户（这些用户需要在数据库上拥有权限），也没有使用通用账户连接到
    SQL Server 实例并执行查询。在数据库内部，特定对象（如表）也基于域用户和组进行了保护。


    在将应用程序部署到公司内部所有（超过 3000 台）计算机后，客户端开始遇到应用程序内部的服务器性能问题。客户的 DBA 没有发现任何问题，SQL Server
    实例上没有基础设施相关的性能问题，在 SQL Server 实例本身执行查询也没有发现问题。当我们查看等待统计信息时，我们注意到最常见的等待类型是 `PREEMPTIVE_OS_AUTHENTICATIONOPS`
    等待类型。我们还注意到，应用程序会连接到 SQL Server 实例，运行一个查询，然后再次断开连接。因为有如此多的并发用户在使用该应用程序，导致产生了大量的
    Windows 身份验证请求，数量之多以至于域控制器无法处理，从而导致身份验证请求处理变慢。


    在这个案例中，域控制器是一台虚拟机，在增加了更多的处理器和内存资源后，它就能够跟上大量的身份验证请求了。


    从这个案例中可以看出，看到较高的 `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待时间并不一定意味着你的 SQL Server 实例遇到了问题，尤其是在域环境中，因为你的域控制器性能在
    `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待时间中也扮演着重要角色。


    这个故事的寓意是，如果你注意到 `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待时间高于正常水平，你需要调查的远不止 SQL Server
    实例本身。如果你在域内使用 Windows 身份验证，请务必检查域控制器的性能。检查 SQL Server 实例和域控制器之间的每一个基础设施部分，如网络交换机、防火墙等。所有这些基础设施部分都会为每个身份验证请求增加额外的延迟，从而导致更高的
    `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待时间，使其成为一种难以排查的等待类型。


    ### PREEMPTIVE_OS_AUTHENTICATIONOPS 总结


    `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待类型与 Windows 操作系统执行身份验证请求有关。看到 `PREEMPTIVE_OS_AUTHENTICATIONOPS`
    等待发生是正常的，尤其是在你的 SQL Server 实例是域的一部分并使用 Windows 身份验证来验证用户时。高于正常水平的等待时间可能表明身份验证请求完成所需的时间比正常情况更长。这并不一定意味着你的
    SQL Server 实例遇到了性能问题。如果域控制器无法足够快地处理身份验证请求，将导致更高的 `PREEMPTIVE_OS_AUTHENTICATIONOPS`
    等待时间。到域控制器的网络连接缓慢、防火墙或交换机配置也可能影响 `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待时间。'
- fmt: '## PREEMPTIVE_OS_GETPROCADDRESS


    本章要讨论的最后一个等待类型是 `PREEMPTIVE_OS_GETPROCADDRESS`。`PREEMPTIVE_OS_GETPROCADDRESS`
    等待类型与 SQL Server 中扩展存储过程的执行有关。


    扩展存储过程允许您使用 T-SQL 以外的语言（例如 C# 编程语言）创建外部例程。这些扩展存储过程通过 `.dll` 文件加载到 SQL Server 中，能够扩展
    SQL Server 编程的能力，允许您执行在 T-SQL 中无法完成的操作，比如读写 Windows 注册表项。


    扩展存储过程自 SQL Server 2008 起已被标记为弃用，应使用公共语言运行时（CLR）来替代它们。然而，SQL Server 中仍然存在一些需要扩展存储过程的情况，并且一些第三方软件供应商仍然依赖它们。


    ### 什么是 PREEMPTIVE_OS_GETPROCADDRESS 等待类型？


    每当加载扩展存储过程内的入口点时，就会记录 `PREEMPTIVE_OS_GETPROCADDRESS` 等待类型。每当 SQL Server 加载或卸载扩展存储过程的
    `.dll` 文件时，都会调用该入口点。在正常情况下，加载入口点的操作应该很快完成，导致 `PREEMPTIVE_OS_GETPROCADDRESS` 等待时间非常低（如果有的话）。但根据扩展存储过程的不同，或与加载扩展存储过程
    `.dll` 文件相关的问题，可能会注意到更高的等待时间。需要牢记的重要一点是，`PREEMPTIVE_OS_GETPROCADDRESS` 等待类型仅记录加载
    `.dll` 文件入口点所花费的时间，而不是扩展存储过程的执行时间。图 11-18 展示了 SQL Server 执行扩展存储过程的（简化）概览。


    ![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig18_HTML.jpg](images/340881_2_En_11_Chapter/340881_2_En_11_Fig18_HTML.jpg)


    图 11-18 执行扩展存储过程


    您不仅可以编写自己的扩展存储过程来执行 T-SQL 无法完成的操作，SQL Server 本身也自带了许多不同的扩展存储过程。其中大多数可以通过扩展存储过程名称中的
    `xp_` 前缀来识别，尽管并非所有都有此前缀。图 11-19 展示了在我的测试 SQL Server 实例的 `master` 数据库中选择的一部分扩展存储过程。


    ![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig19_HTML.jpg](images/340881_2_En_11_Chapter/340881_2_En_11_Fig19_HTML.jpg)


    图 11-19 master 数据库中的扩展存储过程选集


    可能最臭名昭著的扩展存储过程是 `xp_cmdshell`。`xp_cmdshell` 扩展存储过程使得从 SQL Server 内部在 Windows 命令
    shell 中执行命令成为可能。如果您的 SQL Server 实例遭到入侵，这是一个巨大的安全风险，因为它提供了可以影响整个 Windows 操作系统的命令访问权限。值得庆幸的是，默认情况下无法运行
    `xp_cmdshell` 扩展存储过程；您必须通过配置一个高级配置设置来特别允许其使用。


    ### PREEMPTIVE_OS_GETPROCADDRESS 示例


    在这个示例中，我将执行 SQL Server 中已有的一个扩展存储过程 `xp_getnetname`，而不是编写一个自定义扩展存储过程，这远远超出了本书的范围。`xp_getnetname`
    是一个未公开的扩展存储过程，它返回托管 SQL Server 实例的计算机的 NETBIOS 名称。在执行 `xp_getnetname` 扩展存储过程之前，我清除了
    `sys.dm_os_wait_stats` DMV，然后在执行 `xp_getnetname` 之后，我查询该 DMV 以获取 `PREEMPTIVE_OS_GETPROCADDRESS`
    等待信息。清单 11-4 显示了我在测试 SQL Server 实例上执行的整个查询。


    ```

    USE [master]

    GO

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    exec xp_getnetname;

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''PREEMPTIVE_OS_GETPROCADDRESS'';

    ```

    清单 11-4 执行 xp_getnetname 并查询等待统计信息


    清单 11-4 中查询的结果可以在图 11-20 中看到。


    ![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig20_HTML.jpg](images/340881_2_En_11_Chapter/340881_2_En_11_Fig20_HTML.jpg)


    图 11-20 PREEMPTIVE_OS_GETPROCADDRESS 等待


    结果并不引人注目。显然，`xp_getnetname` 扩展存储过程在加载 `.dll` 入口点时不会引起任何问题，因为没有记录到等待时间。但是，如 `waiting_tasks_count`
    列所示，等待确实发生了，只是 SQL Server 加载入口点花费了不到一毫秒的时间。


    ### 降低 PREEMPTIVE_OS_GETPROCADDRESS 等待


    由于 `PREEMPTIVE_OS_GETPROCADDRESS` 等待类型与执行扩展存储过程直接相关，因此您调查的第一步应该是检测正在执行的是哪个扩展存储过程以及它的功能是什么。


    我曾看到 `PREEMPTIVE_OS_GETPROCADDRESS` 等待在多个客户那里发生，因为他们使用的是使用扩展存储过程执行数据库备份的第三方备份应用程序，但高
    `PREEMPTIVE_OS_GETPROCADDRESS` 等待时间可能还有更多其他原因。了解正在执行哪个扩展存储过程可以帮助您追踪是哪个进程在执行该扩展存储过程。


    在 SQL Server 2008 和 2008R2 中也有一些已知的错误，会报告高于正常的 `PREEMPTIVE_OS_GETPROCADDRESS`
    等待时间，因为扩展存储过程的执行时间也被记录在等待时间中，而不仅仅是入口点加载时间。如果您仍在 SQL Server 2008 或 2008R2 上运行，并且遇到非常高的
    `PREEMPTIVE_OS_GETPROCADDRESS` 等待时间，升级到最新的 Service Pack 并检查 `PREEMPTIVE_OS_GETPROCADDRESS`
    等待时间是否下降可能是值得的。或者更好的是，升级到更高版本的 SQL Server，因为 SQL Server 2008R2 已于 2019 年 7 月 9
    日标记为生命周期结束。


    ### PREEMPTIVE_OS_GETPROCADDRESS 总结


    `PREEMPTIVE_OS_GETPROCADDRESS` 等待类型与扩展存储过程的执行直接相关。扩展存储过程可以用多种编程语言（如 C#）编写，允许您执行在
    T-SQL 中原本不可能的操作。每当加载扩展存储过程 `.dll` 内的入口点时，就会记录 `PREEMPTIVE_OS_GETPROCADDRESS` 等待类型的等待时间。在正常情况下，`PREEMPTIVE_OS_GETPROCADDRESS`
    等待类型的等待时间非常低。看到高的 `PREEMPTIVE_OS_GETPROCADDRESS` 等待时间可能表明入口点加载遇到了问题。在 SQL Server
    2008 和 2008R2 中也存在与计算 `PREEMPTIVE_OS_GETPROCADDRESS` 等待类型相关的错误。如果您正在运行 SQL Server
    2008 或 2008R2 并遇到高的 `PREEMPTIVE_OS_GETPROCADDRESS` 等待时间，升级到最新的 Service Pack 或迁移到更高版本的
    SQL Server 可能是值得的，因为 SQL Server 2008R2 已于 2019 年 7 月 9 日标记为生命周期结束。'
  raw: '## PREEMPTIVE_OS_GETPROCADDRESS


    The final wait type I would like to discuss in this chapter is the `PREEMPTIVE_OS_GETPROCADDRESS`
    wait type. The `PREEMPTIVE_OS_GETPROCADDRESS` wait type is related to the execution
    of extended stored procedures inside SQL Server.


    Extended stored procedures allow you to create external routines in a language
    other than T-SQL; for instance, using the C# programming language. These extended
    stored procedures are loaded into SQL Server using .dll files and can expand the
    capabilities of SQL Server programming by allowing you to perform actions that
    would be impossible in T-SQL, like reading/writing Windows Registry entries.


    Extended stored procedures are marked as deprecated since SQL Server 2008 and
    Common Language Runtime (CLR) should be used instead of them. However, there are
    still cases inside SQL Server that require extended stored procedures, and some
    third-party software vendors still rely on them.


    ### What Is the PREEMPTIVE_OS_GETPROCADDRESS Wait Type?


    The `PREEMPTIVE_OS_GETPROCADDRESS` wait type is recorded whenever the entrypoint
    inside an extended stored procedure is loaded. The entrypoint is called upon whenever
    SQL Server loads or unloads the extended stored procedure .dll file. Under normal
    conditions the loading of the entrypoint should complete quickly, resulting in
    very low `PREEMPTIVE_OS_GETPROCADDRESS` wait times, if any, but depending on the
    extended stored procedure, or problems related to loading the extended stored
    procedure .dll file, it is possible to notice higher wait times. Important to
    keep in mind is that the `PREEMPTIVE_OS_GETPROCADDRESS` wait type only records
    the time it took to load the entrypoint of the .dll file, not the execution time
    of the extended stored procedure. Figure [11-18](#340881_2_En_11_Chapter.xhtml#Fig18)
    shows a (simplified) overview of how extended stored procedures are executed by
    SQL Server.


    ![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig18_HTML.jpg](images/340881_2_En_11_Chapter/340881_2_En_11_Fig18_HTML.jpg)


    Figure 11-18


    Executing an extended stored procedure


    Not only can you write your own extended stored procedures to perform actions
    not possible using T-SQL, SQL Server itself comes shipped with many different
    extended stored procedures. Most of these can be recognized by the `xp_` prefix
    in the extended stored procedure name, though not all of them have this prefix.
    Figure [11-19](#340881_2_En_11_Chapter.xhtml#Fig19) shows a selection of extended
    stored procedures inside the `master` database of my test SQL Server instance.


    ![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig19_HTML.jpg](images/340881_2_En_11_Chapter/340881_2_En_11_Fig19_HTML.jpg)


    Figure 11-19


    Selection of extended stored procedures inside the master database


    Probably the most notorious extended stored procedure is the `xp_cmdshell` extended
    stored procedure. The `xp_cmdshell` extended stored procedures makes it possible
    to execute a command inside a Windows command shell from within SQL Server. This
    is a huge security risk if your SQL Server instance is compromised, since it gives
    access to commands that can affect the entire Windows operating system. Thankfully,
    it is impossible to run the `xp_cmdshell` extended stored procedure by default;
    you have to specifically allow its use by configuring an advanced configuration
    setting.


    ### PREEMPTIVE_OS_GETPROCADDRESS Example


    For this example I will execute an extended stored procedure already present inside
    SQL Server, `xp_getnetname`, instead of writing a custom extended stored procedure,
    which is far beyond the scope of this book. The `xp_getnetname` is an undocumented
    extended stored procedure that returns the NETBIOS name of the machine that hosts
    your SQL Server instance. Before executing the `xp_getnetname` extended stored
    procedure, I clear the `sys.dm_os_wait_stats` DMV, and after the execution of
    `xp_getnetname`, I query the DMV for `PREEMPTIVE_OS_GETPROCADDRESS` wait information.
    Listing [11-4](#340881_2_En_11_Chapter.xhtml#PC4) shows the entire query I executed
    on my test SQL Server instance.


    ```

    USE [master]

    GO

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    exec xp_getnetname;

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''PREEMPTIVE_OS_GETPROCADDRESS'';

    Listing 11-4

    Execute xp_getnetname and query wait statistics

    ```


    The results of the query in Listing [11-4](#340881_2_En_11_Chapter.xhtml#PC4)
    can be seen in Figure [11-20](#340881_2_En_11_Chapter.xhtml#Fig20).


    ![../images/340881_2_En_11_Chapter/340881_2_En_11_Fig20_HTML.jpg](images/340881_2_En_11_Chapter/340881_2_En_11_Fig20_HTML.jpg)


    Figure 11-20


    PREEMPTIVE_OS_GETPROCADDRESS wait


    The results aren’t spectacular. Apparently, the `xp_getnetname` extended stored
    procedure doesn’t cause any problems when loading the .dll entrypoint, since there
    is no wait time recorded. A wait still did occur though, as you can see in the
    `waiting_tasks_count` column, it just took SQL Server less than a millisecond
    to load the entrypoint.


    ### Lowering PREEMPTIVE_OS_GETPROCADDRESS Waits


    Since the `PREEMPTIVE_OS_GETPROCADDRESS` wait type is directly related to executing
    extended stored procedures, the first step in your investigation should be to
    detect what extended stored procedure is being executed and what its function
    is.


    I have seen `PREEMPTIVE_OS_GETPROCADDRESS` waits occur at a number of clients
    because they were using a third-party backup application that used extended stored
    procedures to perform a database backup, but there are many more possible causes
    for high `PREEMPTIVE_OS_GETPROCADDRESS` wait times. Knowing which extended stored
    procedure is being executed can help you trace what process is executing the extended
    stored procedure.


    There have also been some known bugs inside SQL Server 2008 and 2008R2 that reported
    higher-than-normal `PREEMPTIVE_OS_GETPROCADDRESS` wait times because the execution
    time of the extended stored procedure was also recorded in the wait times, instead
    of only the entrypoint loading. If you are still using SQL Server 2008 or 2008R2
    and experience very high `PREEMPTIVE_OS_GETPROCADDRESS` wait times, it might be
    worth your while to upgrade to the latest Service Pack and check if the `PREEMPTIVE_OS_GETPROCADDRESS`
    wait times go down. Or even better, upgrade to a higher version of SQL Server
    since SQL Server 2008R2 is marked end-of-life as of July 9, 2019.


    ### PREEMPTIVE_OS_GETPROCADDRESS Summary


    The `PREEMPTIVE_OS_GETPROCADDRESS` wait type is directly related to the execution
    of extended stored procedures. Extended stored procedures can be written in a
    variety of programming languages like C# and allow you to perform actions that
    would otherwise be impossible in T-SQL. Wait time for the `PREEMPTIVE_OS_GETPROCADDRESS`
    wait type is recorded whenever the entrypoint inside an extended stored procedure
    .dll is loaded. In normal situations wait times for the `PREEMPTIVE_OS_GETPROCADDRESS`
    wait type are very low. Seeing high `PREEMPTIVE_OS_GETPROCADDRESS` wait times
    can indicate that the entrypoint loading is running into problems. There have
    also been bugs related to the calculation of the `PREEMPTIVE_OS_GETPROCADDRESS`
    wait type inside SQL Server 2008 and 2008R2\. If you are running SQL Server 2008
    or 2008R2 and experience high `PREEMPTIVE_OS_GETPROCADDRESS` wait times, it might
    be worth your time to upgrade to the latest Service Pack or move to a higher version
    of SQL Server since SQL Server 2008R2 is marked end-of-life as of July 9, 2019.'
