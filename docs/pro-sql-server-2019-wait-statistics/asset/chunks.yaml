  trans: '### LCK_M_SCH_S 与 LCK_M_SCH_M 示例


    对于第一个示例，我将向一个现有表中添加一个新列，并且像本章前面示例中所做的那样，通过不提供 `COMMIT` 或 `ROLLBACK` 命令来保持事务处于打开状态。接下来的查询在
    `AdventureWorks` 数据库的 `Person.Address` 表中添加了一个额外的列，但我将 `ROLLBACK` 命令保持为注释状态，以便锁保持不变：


    ```sql

    BEGIN TRAN

    ALTER TABLE Person.Address

    ADD

    Test VARCHAR(10);

    --ROLLBACK

    ```


    在 SQL Server Management Studio 的一个新窗口中，我将对 `Person.Address` 表执行一个简单的 `SELECT`
    查询，如下所示：


    ```sql

    SELECT *

    FROM Person.Address;

    ```


    如果我们在两个查询都在运行时查看 `sys.dm_tran_locks` DMV，我们应该能够看到是否有任何阻塞发生。图 8-22 显示了针对 `sys.dm_tran_locks`
    DMV 执行 `SELECT *` 查询的部分输出。


    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig22_HTML.jpg](img/340881_2_En_8_Fig22_HTML.jpg)


    图 8-22 Sch-M 和 Sch-S 锁


    从图 8-22 中可以看出，我们启动的第一个查询，其目标是向 `Person.Address` 表添加一列，导致该表上出现了一个 Sch-M 锁。第二个 `SELECT`
    查询正在等待获取同一表上的 Sch-S 锁。


    如果我们查询 `sys.dm_os_waiting_tasks` DMV，应该能看到一个正在等待 `LCK_M_SCH_S` 等待类型的任务。图 8-23
    显示了在两个查询都在运行时 `sys.dm_os_waiting_tasks` 的输出。


    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig23_HTML.jpg](img/340881_2_En_8_Fig23_HTML.jpg)


    图 8-23 LCK_M_SCH_S 等待发生


    正如我们所料，`SELECT` 查询正在等待获取其架构稳定性锁。


    如果我们反转这个示例，通过启动一个读取事务并保持其打开状态，然后尝试修改同一个表，我们应该会遇到 `LCK_M_SCH_M` 等待，因为只有在我们要修改的表中没有活动事务时，我们才能获取架构修改锁。


    为了展示这种情况，我执行了以下查询。这将以可重复读隔离级别启动一个 `SELECT` 查询，但我保持事务打开以便锁保持不变：


    ```sql

    SET TRANSACTION ISOLATION LEVEL REPEATABLE READ

    BEGIN TRANSACTION

    SELECT * FROM

    Person.Address;

    -- COMMIT

    ```


    在 SQL Server Management Studio 的一个新窗口中，我将执行之前用于演示 `LCK_M_SCH_S` 等待类型的表修改查询，但这次不保持事务打开：


    ```sql

    ALTER TABLE Person.Address

    ADD

    Test VARCHAR(10);

    ```


    在执行第二个查询时，你可能会注意到没有任何结果返回，并且查询持续运行，这清楚地表明发生了阻塞。


    让我们再次查看 `sys.dm_tran_locks` DMV，看看能发现什么。图 8-24 显示了我的测试 SQL Server 上的输出。


    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig24_HTML.jpg](img/340881_2_En_8_Fig24_HTML.jpg)


    图 8-24 等待被获取的 Sch-M 锁


    在这种情况下，该表因 `SELECT` 查询而持有一个共享锁。因为我们从一个相当大的表中选择信息，SQL Server 决定放置一个表级锁，而不是在较低级别放置锁。由于架构修改锁与所有其他锁类型都不兼容，因此发生了阻塞，我们将不得不等待，直到共享锁消失，才能执行表修改操作。


    查看 `sys.dm_os_waiting_tasks` DMV 向我们展示了预期的结果，一个 `LCK_M_SCH_M` 等待，如图 8-25 所示。


    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig25_HTML.jpg](img/340881_2_En_8_Fig25_HTML.jpg)


    图 8-25 LCK_M_SCH_M 等待发生


    ### 降低 LCK_M_SCH_S 和 LCK_M_SCH_M 等待


    当你看到 `LCK_M_SCH_S` 或 `LCK_M_SCH_M` 等待类型发生时，可能有一个活动的事务想要修改该表。在 `LCK_M_SCH_S` 等待类型等待时间长的情况下，表修改事务已经在运行；而看到
    `LCK_M_SCH_M` 等待时，修改操作正在等待所有活动事务移除它们在该表上的锁。


    修改表并非在生产 SQL Server 实例上每天都会发生的事情（希望如此）。更改大型表尤其可能成为问题，并导致较高的 `LCK_M_SCH_S` 等待时间，试图查询正在被修改的表的用户会注意到延迟。然而，如果你确实需要修改一个表，但同时有一些长时间运行的查询正在从该表检索信息，那么你可能会遇到
    `LCK_M_SCH_M` 等待。


    降低这两种等待类型的等待时间与执行表修改操作直接相关。一个建议是在非工作时间执行表修改，或者在访问该表的并发事务尽可能少的时候进行，而不是在有很多针对该表的活动事务时进行修改。


    ### LCK_M_SCH_S 与 LCK_M_SCH_M 总结


    `LCK_M_SCH_S` 和 `LCK_M_SCH_M` 等待类型是架构稳定性或架构修改锁被其他锁阻塞的结果。看到这两种等待类型的高等待时间表明，要么是表修改操作正在等待移除该表上所有活动锁，要么是表修改操作当前正在运行，并因此阻塞了其他事务。


    # 9. 闩锁相关等待类型


    在第 8 章 “锁相关等待类型” 中，我们相当深入地探讨了 SQL Server 内部的锁和阻塞，以及表明阻塞正在发生的不同等待类型。闩锁看起来非常像我们之前讨论的锁；在某些情况下，它们甚至似乎使用了与我们在第
    8 章讨论的锁相同的模式。但请注意，闩锁与锁完全不同，尽管它们似乎共享一些特性。锁用于保证事务的隔离性和一致性，而闩锁用于保证内存中对象的一致性。


    闩锁，就像锁和阻塞一样，是 SQL Server 中一个相当复杂的主题。闩锁甚至有自己的闩锁统计信息 DMV，记录了在特定闩锁类型上等待所花费的时间。


    由于闩锁及其在 SQL Server 内部功能的复杂性，我认为需要先介绍它们，以便更好地理解如何在本章后面排除闩锁相关的等待类型。为此，我们将以对闩锁的介绍开始本章，就像我们在第
    8 章 “锁相关等待类型” 中以锁的介绍开始一样。'
- fmt: '## Introduction to Latches


    Microsoft 在 Books Online 中将锁存器（latches）描述为“各种 SQL Server 组件使用的轻量级同步对象”。这个描述相当模糊，锁存器的深度远不止乍看之下的样子。


    关于锁存器，首先需要理解的重要一点是，它们与锁（locks）完全不同。我听过也读过各种讨论，将锁存器当作锁来看待。这种混淆很容易解释，因为从行为和 SQL
    Server 中的命名约定来看，锁存器乍一看确实与锁很相似。就像锁一样，锁存器有各种“模式”，并且表示模式类型的一些缩写与某些锁模式的缩写相同。锁和锁存器的另一个共同点是，两者都在保持
    SQL Server 对象一致性方面发挥作用，而且它们管理一致性的方法似乎相同。锁用于确保事务的一致性，在事务运行的整个期间保护事务；而锁存器只在必要的持续时间内使用，不与事务的持续时间绑定。在一个事务的持续时间内，许多不同的锁存器会被获取然后再次释放。图
    9-1 可视化了这种行为。


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig1_HTML.jpg](images/340881_2_En_9_Chapter/340881_2_En_9_Fig1_HTML.jpg)

    *Figure 9-1: Lock and latch behavior during transactions*


    在 SQL Server 对象上放置和（尤其是）维护锁是一项昂贵的操作，主要是因为它们需要在整个事务期间保持原位。因为锁存器只在特定操作期间需要，之后就会被释放，所以它们的使用成本远低于锁。这就解释了
    Microsoft 使用的锁存器定义中“轻量级”的部分。


    锁存器定义的第二部分“同步对象”，我们在本书前面讨论过，只是名称不完全相同。如果你通读了本书到目前为止的内容，尤其是在第 6 章“与 IO 相关的等待类型”中，你应该已经注意到
    SQL Server 使用各种方法来处理并发线程访问对象。在第 6 章中，我们讨论了互斥（mutual exclusion），它确保一次只有一个线程可以访问内存对象。在同一章中，我们还讨论了实现门（gates）以限制对内存的并发访问的信号量（semaphores）。锁存器是另一种用于确保并发线程不会威胁内存中对象一致性的方法，其方式与锁非常相似。


    ### Latch Modes


    锁存器在访问对象时有五种不同的可用模式。下面的列表描述了这五种模式，其中一些可能看起来很熟悉：


    *   SH：SH 模式表示共享（Shared）锁存器。此模式在锁存器读取页面数据时使用。

    *   UP：UP 锁存模式由更新（Update）锁存器使用，每当页面需要修改时就会使用。通过使用更新锁存器，其他锁存器仍然可以读取该页面。

    *   EX：EX 锁存模式，即排他（Exclusive）锁存器，也在页面修改时使用。与更新锁存器不同，排他锁存器不允许其他锁存模式进行读或写访问。

    *   KP：KP 锁存模式由保持（Keep）锁存器使用。保持锁存器用于保护页面，使其不会被销毁（Destroy）锁存器销毁。它们与除销毁模式以外的所有其他锁存模式兼容。

    *   DT：DT 锁存模式表示销毁（Destroy）锁存器。销毁锁存器在从内存中移除内容时使用；例如，当 SQL Server 想要释放内存中的数据页时。


    正如你在此列表中所见，前三种锁存模式看起来与锁使用的模式非常相似，功能也或多或少相同。就像锁模式一样，锁存模式彼此之间兼容或不兼容。表 9-1 显示了锁存兼容性矩阵以及不同模式是否彼此兼容。

    *Table 9-1: Latch Compatibility Matrix*


    |   | SH | UP | EX | KP | DT |

    | --- | --- | --- | --- | --- | --- |

    | `SH` | Yes | Yes | No | Yes | No |

    | `UP` | Yes | No | No | Yes | No |

    | `EX` | No | No | No | Yes | No |

    | `KP` | Yes | Yes | Yes | Yes | No |

    | `DT` | No | No | No | No | No |


    与锁不同（锁可以部分通过隔离级别和查询提示控制），锁存器完全由 SQL Server 引擎控制。这意味着我们不能像修改锁那样修改锁存器行为。


    ### Latch Waits


    每当锁存器因为其请求无法立即被授予而必须等待时，就会发生锁存器等待（latch wait）。这些等待由 SQL Server 在 `sys.dm_os_wait_stats`
    DMV 内部跟踪和记录，也在一个专门的、记录特定锁存器等待时间的 DMV `sys.dm_os_latch_waits` 内部记录，我们将在本章后面更详细地讨论后者。


    图 9-2 显示了一个发生锁存器等待的情况。在此示例中，我们正在等待将一个数据页从存储子系统读取到缓冲区缓存中。这种情况下，锁存器用于确保存储子系统上的同一数据页不会被多个线程读入缓冲区缓存。当锁存器等待页面读入内存时，将记录
    `PAGEIOLATCH_SH` 等待类型。


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig2_HTML.jpg](images/340881_2_En_9_Chapter/340881_2_En_9_Fig2_HTML.jpg)

    *Figure 9-2: PAGEIOLATCH_SH occurring*


    SQL Server 中定义了三种不同的锁存器等待类型，可以通过查询 `sys.dm_os_wait_stats` DMV 访问，描述如下：


    *   **缓冲区锁存器（Buffer latches）**：用于保护缓冲区缓存内的数据页。它们不仅用于用户相关的数据页，还用于系统页，例如跟踪数据页内可用空间的页面空闲空间（PFS）页。在
    `sys.dm_os_wait_stats` DMV 中，它们由 `PAGELATCH_[xx]` 等待类型指示，其中 `[xx]` 表示使用的锁存模式。

    *   **非缓冲区锁存器（Non-buffer latches）**：这些锁存器用于保护缓冲区缓存之外的数据结构。在 `sys.dm_os_wait_stats`
    DMV 中，它们由 `LATCH_[xx]` 等待类型指示。

    *   **IO 锁存器（IO latches）**：当数据页从存储子系统读入缓冲区缓存时，会使用 IO 锁存器。此类型由 `PAGEIOLATCH_[xx]`
    等待类型指示。


    图 9-3 显示了由 `sys.dm_os_wait_stats` DMV 记录的不同锁存器等待类型的数量。


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig3_HTML.jpg](images/340881_2_En_9_Chapter/340881_2_En_9_Fig3_HTML.jpg)

    *Figure 9-3: Latch wait types inside sys.dm_os_wait_stats*


    当你查看 `sys.dm_os_wait_stats` DMV 中的 `LATCH_[xx]` 等待类型时，你实际上是在查看这些非缓冲区锁存器等待时间的摘要。SQL
    Server 内部有各种非缓冲区锁存器类，为了更方便地详细分析这些非缓冲区锁存器类，SQL Server 添加了 `sys.dm_os_latch_stats`
    DMV。'
  raw: '## Introduction to Latches


    Microsoft describes latches as “lightweight synchronization objects that are used
    by various SQL Server components” on Books Online. This description is pretty
    vague, and there is a lot more depth to latches than the description would initially
    suggest.


    The first thing that is important to understand about latches, which we lightly
    touched upon in the introduction of this chapter, is that latches are completely
    different than locks. I have heard and read various discussions about latches
    that treat latches as if they were locks. This confusion is easily explained,
    as latches, at first glance, do look similar to locks as regards their behavior
    and naming conventions within SQL Server. Just like locks, latches have various
    “modes,” and some of the acronyms to indicate the type of mode used are the same
    as for some lock modes. Another thing locks and latches have in common is that
    both objects play a role in keeping SQL Server objects consistent, and the way
    they manage this seems identical. While locks are used to make sure transactions
    are consistent, protecting the transaction for the entire duration it is running,
    latches are only used for the duration they are necessary and are not bound to
    the duration of a transaction. During the duration of one transaction, many different
    latches will be acquired and released again. Figure [9-1](#340881_2_En_9_Chapter.xhtml#Fig1)
    visualizes this behavior.


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig1_HTML.jpg](images/340881_2_En_9_Chapter/340881_2_En_9_Fig1_HTML.jpg)


    Figure 9-1


    Lock and latch behavior during transactions


    Placing and especially maintaining locks on SQL Server objects is an expensive
    operation, mostly because they need to stay in place during entire transactions.
    Because latches are only needed for specific operations, and are then released
    again, they are far less costly to use than locks. This explains the “lightweight”
    part in the latch definition Microsoft uses.


    The second part of the latch definition, “synchronization object,” we discussed
    earlier in this book, but not under that exact name. If you have read through
    this book so far, you should have noticed, especially in Chapter [6](#340881_2_En_6_Chapter.xhtml),
    “IO-Related Wait Types,” that SQL Server uses various methods to handle concurrent
    threads accessing objects. In Chapter [6](#340881_2_En_6_Chapter.xhtml), “IO-Related
    Wait Types,” we talked about mutual exclusion, which makes sure only one thread
    at a time can access a memory object. In the same chapter we also discussed semaphores
    that implement gates to limit concurrent access to memory. Latches are another
    method used to make sure concurrent threads do not threaten the consistency of
    in-memory objects, and it does this in a way that looks a lot like locking.


    ### Latch Modes


    Latches have five different modes available to use when accessing objects. The
    list that follows describes these five modes, some of which might look familiar:


    *   SH: The SH mode represents a Shared latch. This mode is used when the latch
    is reading page data.


    *   UP: The UP latch mode is used by Update latches that are used whenever a page
    needs to be modified. By using the Update latch the page can still be read by
    other latches.


    *   EX: The EX latch mode, or Exclusive latch, is also used when page modification
    occurs. Unlike the Update latch, the Exclusive latch does not allow read or write
    access by other latch modes.


    *   KP: The KP latch mode is used by Keep latches. Keep latches are used to protect
    the page so it cannot be destroyed by the Destroy latch. They are compatible with
    every other latch mode except for the Destroy mode.


    *   DT: The DT latch mode indicates Destroy latches. Destroy latches are used
    when removing contents from memory; for instance, when SQL Server wants to free
    up a data page in memory.


    As you can see in this list, the first three latch modes look a lot like those
    used by locks, and function more or less the same way. And just like lock modes,
    latch modes are compatible or incompatible with other latch modes. Table [9-1](#340881_2_En_9_Chapter.xhtml#Tab1)
    shows the latch compatibility matrix and whether the different modes are compatible
    with each other or not.


    Table 9-1


    Latch Compatibility Matrix


    |   | SH | UP | EX | KP | DT |

    | --- | --- | --- | --- | --- | --- |

    | **SH** | Yes | Yes | No | Yes | No |

    | **UP** | Yes | No | No | Yes | No |

    | **EX** | No | No | No | Yes | No |

    | **KP** | Yes | Yes | Yes | Yes | No |

    | **DT** | No | No | No | No | No |


    Unlike locks, which can partly be controlled by Isolation levels and query hints,
    latches are completely controlled by the SQL Server engine. This means we cannot
    modify latch behavior like we can for locks.


    ### Latch Waits


    Whenever a latch has to wait because its request couldn’t be granted immediately,
    a latch wait occurs. These waits are tracked and recorded by SQL Server inside
    the `sys.dm_os_wait_stats` DMV, and also inside a dedicated DMV that records specific
    latch wait times, `sys.dm_os_latch_waits`, which we will discuss in more detail
    a bit further down in this chapter.


    Figure [9-2](#340881_2_En_9_Chapter.xhtml#Fig2) shows a situation in which a latch
    wait occurs. In this example we are waiting for a data page to be read from the
    storage subsystem into the buffer cache. In this case latches are used to make
    sure the same data page on the storage subsystem is not being read into the buffer
    cache by multiple threads. While the latch is waiting for the page to read into
    memory, the `PAGEIOLATCH_SH` wait type will be recorded.


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig2_HTML.jpg](images/340881_2_En_9_Chapter/340881_2_En_9_Fig2_HTML.jpg)


    Figure 9-2


    PAGEIOLATCH_SH occurring


    There are three different latch wait types defined in SQL Server that can be accessed
    by querying the `sys.dm_os_wait_stats` DMV , and they are described in the following
    list:


    *   Buffer latches: Buffer latches are used to protect data pages inside the buffer
    cache. They are not only used for user-related data pages but also for system
    pages like the Page Free Space (PFS) page that tracks free space inside data pages.
    Inside the `sys.dm_os_wait_stats` DMV they are indicated by the `PAGELATCH_[xx]`
    wait type, where the `[xx]` indicates the latch mode used.


    *   Non-buffer latches: These latches are used to protect data structures outside
    of the buffer cache. They are indicated by the `LATCH_[xx]` wait type inside the
    `sys.dm_os_wait_stats` DMV.


    *   IO latches: IO latches are used when data pages are read from the storage
    subsystem into the buffer cache. This type is indicated by the `PAGEIOLATCH_[xx]`
    wait type.


    Figure [9-3](#340881_2_En_9_Chapter.xhtml#Fig3) shows the number of different
    latch wait types recorded by the `sys.dm_os_wait_stats` DMV .


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig3_HTML.jpg](images/340881_2_En_9_Chapter/340881_2_En_9_Fig3_HTML.jpg)


    Figure 9-3


    Latch wait types inside sys.dm_os_wait_stats


    Whenever you are looking at the `LATCH_[xx]` wait type inside the `sys.dm_os_wait_stats`
    DMV, you are actually looking at a summary of the wait times for these non-buffer
    latches. There are various non-buffer latch classes inside SQL Server, and to
    make it easier to analyze these non-buffer latch classes in more detail, the `sys.dm_os_latch_stats`
    DMV was added.'
  trans: '## 锁存器（Latch）简介


    微软在《联机丛书中》将锁存器描述为“各种 SQL Server 组件使用的轻量级同步对象”。这个描述相当模糊，锁存器的深度远不止乍看之下的样子。


    关于锁存器，首先需要理解的重要一点是，它们与锁完全不同。我听过也读过各种讨论，将锁存器当作锁来看待。这种混淆很容易解释，因为从行为和 SQL Server
    中的命名约定来看，锁存器乍一看确实与锁很相似。就像锁一样，锁存器有各种“模式”，并且表示模式类型的一些缩写与某些锁模式的缩写相同。锁和锁存器的另一个共同点是，两者都在保持
    SQL Server 对象一致性方面发挥作用，而且它们管理一致性的方法似乎相同。锁用于确保事务的一致性，在事务运行的整个期间保护事务；而锁存器只在必要的持续时间内使用，不与事务的持续时间绑定。在一个事务的持续时间内，许多不同的锁存器会被获取然后再次释放。图
    9-1 可视化了这种行为。


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig1_HTML.jpg](img/340881_2_En_9_Fig1_HTML.jpg)

    *图 9-1: 事务期间的锁与锁存器行为*


    在 SQL Server 对象上放置和（尤其是）维护锁是一项昂贵的操作，主要是因为它们需要在整个事务期间保持原位。因为锁存器只在特定操作期间需要，之后就会被释放，所以它们的使用成本远低于锁。这就解释了微软使用的锁存器定义中“轻量级”的部分。


    锁存器定义的第二部分“同步对象”，我们在本书前面讨论过，只是名称不完全相同。如果你通读了本书到目前为止的内容，尤其是在第 6 章“与 IO 相关的等待类型”中，你应该已经注意到
    SQL Server 使用各种方法来处理并发线程访问对象。在第 6 章中，我们讨论了互斥，它确保一次只有一个线程可以访问内存对象。在同一章中，我们还讨论了实现门以限制对内存的并发访问的信号量。锁存器是另一种用于确保并发线程不会威胁内存中对象一致性的方法，其方式与锁非常相似。


    ### 锁存器模式


    锁存器在访问对象时有五种不同的可用模式。下面的列表描述了这五种模式，其中一些可能看起来很熟悉：


    *   SH：SH 模式表示共享锁存器。此模式在锁存器读取页面数据时使用。

    *   UP：UP 锁存模式由更新锁存器使用，每当页面需要修改时就会使用。通过使用更新锁存器，其他锁存器仍然可以读取该页面。

    *   EX：EX 锁存模式，即排他锁存器，也在页面修改时使用。与更新锁存器不同，排他锁存器不允许其他锁存模式进行读或写访问。

    *   KP：KP 锁存模式由保持锁存器使用。保持锁存器用于保护页面，使其不会被销毁锁存器销毁。它们与除销毁模式以外的所有其他锁存模式兼容。

    *   DT：DT 锁存模式表示销毁锁存器。销毁锁存器在从内存中移除内容时使用；例如，当 SQL Server 想要释放内存中的数据页时。


    正如你在此列表中所见，前三种锁存模式看起来与锁使用的模式非常相似，功能也或多或少相同。就像锁模式一样，锁存模式彼此之间兼容或不兼容。表 9-1 显示了锁存兼容性矩阵以及不同模式是否彼此兼容。

    *表 9-1: 锁存兼容性矩阵*


    |   | SH | UP | EX | KP | DT |

    | --- | --- | --- | --- | --- | --- |

    | `SH` | Yes | Yes | No | Yes | No |

    | `UP` | Yes | No | No | Yes | No |

    | `EX` | No | No | No | Yes | No |

    | `KP` | Yes | Yes | Yes | Yes | No |

    | `DT` | No | No | No | No | No |


    与锁不同（锁可以部分通过隔离级别和查询提示控制），锁存器完全由 SQL Server 引擎控制。这意味着我们不能像修改锁那样修改锁存器行为。


    ### 锁存器等待


    每当锁存器因为其请求无法立即被授予而必须等待时，就会发生锁存器等待。这些等待由 SQL Server 在 `sys.dm_os_wait_stats` DMV
    内部跟踪和记录，也在一个专门的、记录特定锁存器等待时间的 DMV `sys.dm_os_latch_waits` 内部记录，我们将在本章后面更详细地讨论后者。


    图 9-2 显示了一个发生锁存器等待的情况。在此示例中，我们正在等待将一个数据页从存储子系统读取到缓冲区缓存中。这种情况下，锁存器用于确保存储子系统上的同一数据页不会被多个线程读入缓冲区缓存。当锁存器等待页面读入内存时，将记录
    `PAGEIOLATCH_SH` 等待类型。


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig2_HTML.jpg](img/340881_2_En_9_Fig2_HTML.jpg)

    *图 9-2: PAGEIOLATCH_SH 发生时*


    SQL Server 中定义了三种不同的锁存器等待类型，可以通过查询 `sys.dm_os_wait_stats` DMV 访问，描述如下：


    *   **缓冲区锁存器**：用于保护缓冲区缓存内的数据页。它们不仅用于用户相关的数据页，还用于系统页，例如跟踪数据页内可用空间的页面空闲空间页。在 `sys.dm_os_wait_stats`
    DMV 中，它们由 `PAGELATCH_[xx]` 等待类型指示，其中 `[xx]` 表示使用的锁存模式。

    *   **非缓冲区锁存器**：这些锁存器用于保护缓冲区缓存之外的数据结构。在 `sys.dm_os_wait_stats` DMV 中，它们由 `LATCH_[xx]`
    等待类型指示。

    *   **IO 锁存器**：当数据页从存储子系统读入缓冲区缓存时，会使用 IO 锁存器。此类型由 `PAGEIOLATCH_[xx]` 等待类型指示。


    图 9-3 显示了由 `sys.dm_os_wait_stats` DMV 记录的不同锁存器等待类型的数量。


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig3_HTML.jpg](img/340881_2_En_9_Fig3_HTML.jpg)

    *图 9-3: sys.dm_os_wait_stats 内的锁存器等待类型*


    当你查看 `sys.dm_os_wait_stats` DMV 中的 `LATCH_[xx]` 等待类型时，你实际上是在查看这些非缓冲区锁存器等待时间的摘要。SQL
    Server 内部有各种非缓冲区锁存器类，为了更方便地详细分析这些非缓冲区锁存器类，SQL Server 添加了 `sys.dm_os_latch_stats`
    DMV。'
- fmt: "## Sys.dm_os_latch_stats\n\n`sys.dm_os_latch_stats` DMV 与 `sys.dm_os_wait_stats`\
    \ DMV 非常相似。`sys.dm_os_latch_stats` DMV 同样显示等待发生的次数、总等待时间和最大等待时间。与 `sys.dm_os_wait_stats`\
    \ DMV 相比，唯一缺失的列是 `signal_wait_time_ms`；之所以缺失，是因为锁存器（latch）不遵循与请求相同的执行流程（RUNNING、SUSPENDED、RUNNABLE）。\n\
    \n图 9-4 展示了 `sys.dm_os_latch_stats` DMV 的部分内容。在 SQL Server 2017 中，存在更多非缓冲区锁存器类，总计\
    \ 168 个。\n\n![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig4_HTML.jpg](images/340881_2_En_9_Chapter/340881_2_En_9_Fig4_HTML.jpg)\n\
    \n图 9-4 sys.dm_os_latch_waits\n\n与 `sys.dm_os_wait_stats` DMV 一样，`sys.dm_os_latch_stats`\
    \ DMV 的统计信息自 SQL Server 服务启动以来是累积的。这意味着每当 SQL Server 服务重启时，这些统计信息将被重置为 0。我们也可以使用\
    \ `DBCC SQLPERF` 命令来手动重置 `sys.dm_os_latch_stats` DMV 的等待时间，执行如下命令：\n\n```sql\n\
    DBCC SQLPERF('sys.dm_os_latch_stats', CLEAR)\n```\n\n## Page-Latch Contention\n\
    \n关于锁存器，最常见的问题之一是页锁存器争用（page-latch contention）。当许多并发锁存器试图获取锁存器，但已经存在一个处于不兼容模式的锁存器时，就会发生页锁存器争用，从而导致锁存器等待。因为这个问题可能发生在任何承受并发工作负载的\
    \ SQL Server 实例上，所以在讨论各种与锁存器相关的等待类型之前，我希望为您提供识别页锁存器争用所需的知识。\n\n有多种因素可能导致页锁存器争用的发生。尽管我们对锁存器的放置（记住，锁存器是由\
    \ SQL Server 引擎内部进程放置和持有的）影响甚微，但我们数据库的设计却会影响锁存器的行为。锁存器争用的一个常见原因是并发查询访问数据库中的所谓“热点”（hot-spots）。例如，一个保存少量行的小表，如果需要被应用程序用于获取配置信息，就可能成为潜在的热点。如果许多并发请求需要从这个表中获取数据，许多锁存器可能会遇到其他不兼容的锁存器，导致锁存器等待发生并减慢应用程序的性能。我见过这个问题在不同客户那里多次发生，这是一个真实世界的场景，我将向您展示一个基于其中某个案例的页锁存器争用示例。\n\
    \n在这个案例中，客户运行的应用程序会在特定时间选择大量数据并将结果放入临时表。该应用程序使用大量并发连接来加速这些临时表的创建。为了展示此示例的效果，我将使用\
    \ Ostress 工具来重现该场景，从一个表中选择行，然后将它们插入到一个临时表中。\n\n作为 Ostress 实用程序的输入，我保存了一个名为 `latch_contention.sql`\
    \ 的 .sql 文件，其中包含清单 9-1 所示的查询。\n\n```sql\nSELECT TOP (20000) *\nINTO #tmptable\n\
    FROM Sales.SalesOrderDetail;\n```\n清单 9-1 从 `Sales.SalesOrderDetail` 中选择行并插入临时表\n\
    \n此查询从 `AdventureWorks` 数据库中的 `Sales.SalesOrderDetail` 表中选择前 20,000 行，并将它们插入到临时表\
    \ `#tmptable` 中。\n\n下一步是启动 Ostress 并使用 300 个并发连接执行 `latch_contention.sql` 脚本。我使用的\
    \ Ostress 命令行如下所示：\n\n```shell\n\"C:\\Program Files\\Microsoft Corporation\\RMLUtils\\\
    ostress.exe\" -E -dAdventureWorks -i\"C:\\latch_contention.sql\" -n300 -r1 -q\n\
    ```\n\n在 Ostress 实用程序运行时，让我们查看一下 `sys.dm_os_waiting_tasks` DMV，看看是否有任何任务正在等待。图\
    \ 9-5 显示了执行以下查询时返回的部分结果：\n\n```sql\nSELECT\n    session_id,\n    wait_duration_ms,\n\
    \    wait_type,\n    resource_description\nFROM sys.dm_os_waiting_tasks\nWHERE\
    \ session_id > 50;\n```\n\n![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig5_HTML.jpg](images/340881_2_En_9_Chapter/340881_2_En_9_Fig5_HTML.jpg)\n\
    \n图 9-5 发生了 PAGELATCH_UP 等待"
  raw: '### Sys.dm_os_latch_stats


    The `sys.dm_os_latch_stats` closely resembles the `sys.dm_os_wait_stats` DMV .
    The `sys.dm_os_latch_stats` DMV also shows the number of times a wait occurred,
    the total wait time, and the maximum wait time. The only column missing compared
    to the `sys.dm_os_wait_stats` DMV is `signal_wait_time_ms`; this is missing because
    latches do not follow the same execution process (RUNNING, SUSPENDED, RUNNABLE)
    as requests do.


    Figure [9-4](#340881_2_En_9_Chapter.xhtml#Fig4) shows a part of the `sys.dm_os_latch_stats`
    DMV. There are many more non-buffer latch classes, totaling 168, in SQL Server
    2017.


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig4_HTML.jpg](images/340881_2_En_9_Chapter/340881_2_En_9_Fig4_HTML.jpg)


    Figure 9-4


    sys.dm_os_latch_waits


    Just like the `sys.dm_os_wait_stats` DMV, the `sys.dm_os_latch_stats` DMV is cumulative
    since the start of the SQL Server service. This means it will get reset to 0 value
    again whenever your SQL Server service is restarted. We can also use the `DBCC
    SQLPERF` command against the `sys.dm_os_latch_stats` DMV to reset the wait times
    manually by executing this command:


    ```

    DBCC SQLPERF(''sys.dm_os_latch_stats'', CLEAR)

    ```


    ### Page-Latch Contention


    One of the most common problems encountered regarding latches is page-latch contention.
    Page-latch contention occurs when many concurrent latches try to acquire a latch,
    but there already is a latch in place with an incompatible mode, causing a latch
    wait. Because this problem can occur on every SQL Server instance that is subjected
    to concurrent workloads, I want to provide you with the knowledge needed to identify
    page-latch contention before we discuss the various latch-related wait types.


    There are a variety of things that can cause page-latch contention to occur, and
    even though we have little influence on the latch placement (remember, latches
    are placed and held by an internal process inside the SQL Server engine), the
    design of our database can impact latch behavior. One common cause for latch contention
    is when concurrent queries access so-called hot-spots inside your database. For
    instance, a small table that holds a few rows that need to be accessed by an application
    for configuration information can be a potential hot-spot. If many concurrent
    requests need data from this table, many latches will probably run into other,
    incompatible latches, causing latch waits to occur and slowing down the application’s
    performance. I have seen this problem occurring various times for different clients,
    making this a real-world scenario, and I will show you an example of page-latch
    contention that is based on one of those cases.


    In this case the client ran an application that, at specific times, would select
    large amounts of data and place the results into temporary tables. The application
    used a large amount of concurrent connections to speed up the creation of these
    temporary tables. To show the effects of this example, I am going to reproduce
    the scenario using Ostress to select rows from a table and then insert them into
    a temporary table.


    As input for the Ostress utility, I save a .sql file named `latch_contention.sql`
    with the query shown in Listing [9-1](#340881_2_En_9_Chapter.xhtml#PC2).


    ```

    SELECT TOP (20000) *

    INTO #tmptable

    FROM Sales.SalesOrderDetail;

    Listing 9-1

    Select rows from Sales.SalesOrderDetail into temporary table

    ```


    This query selects the top 20,000 rows from the `Sales.SalesOrderDetail` table
    inside the `AdventureWorks` database and inserts them into a temporary table (`#tmptable`).


    The next step is to fire up Ostress and execute the `latch_contention.sql` script
    with 300 concurrent connections. The Ostress command line I use is shown here:


    ```

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -E -dAdventureWorks
    -i"C:\latch_contention.sql" -n300 -r1 -q

    ```


    While the Ostress utility is running, let’s take a look at the `sys.dm_os_waiting_tasks`
    DMV to see if anything is running into waits. Figure [9-5](#340881_2_En_9_Chapter.xhtml#Fig5)
    shows a part of the results that are returned when the query that follows is executed:


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig5_HTML.jpg](images/340881_2_En_9_Chapter/340881_2_En_9_Fig5_HTML.jpg)


    Figure 9-5


    PAGELATCH_UP waits occurring


    ```

    SELECT

    session_id,

    wait_duration_ms,

    wait_type,

    resource_description

    FROM sys.dm_os_waiting_tasks

    WHERE session_id > 50;

    ```'
