  trans: '

    在两次 Ostress 工作负载运行期间，我使用 Perfmon 监控了每秒发生的锁存等待次数。图 9-15 展示了针对非分区索引的第一次 Ostress
    工作负载和针对我们刚刚创建的分区索引的第二次工作负载的 Perfmon 图表。


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig15_HTML.jpg](img/340881_2_En_9_Fig15_HTML.jpg)


    图 9-15


    针对非分区索引和分区索引的每秒锁存等待次数


    如你所见，配置哈希分区后，发生的锁存等待次数急剧下降！我们可以通过运行以下查询来查看行在不同分区间的分布情况：


    ```sql

    SELECT *

    FROM sys.partitions

    WHERE object_id = OBJECT_ID(''Insert_Test3'');

    ```


    图 9-16 展示了在我的测试 SQL Server 实例上执行此查询的结果。


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig16_HTML.jpg](img/340881_2_En_9_Fig16_HTML.jpg)


    图 9-16


    行在各分区间的分布


    在图 9-16 中，我们看到在 `Insert_Test3` 表上创建的九个分区，通过 `partition_number` 列编号为 1 到 9。`rows`
    列显示了每个分区内的行数，正如你所看到的，它们非常均匀地分布在九个分区中！`hobt_id` 返回存储此分区两行数据的 B 树 ID；所有分区都有不同的 ID，这意味着它们各自拥有独立的
    B 树结构。


    尽管分区是解决锁存争用问题的绝佳方法，但它确实伴随着其独特的挑战和缺点。其中两点是：它是一个仅限企业版的功能（除非你使用的是 SQL Server 2016
    SP1 或更高版本），因此成本高昂；并且它可能影响查询执行计划的生成，导致产生次优计划。


    ### PAGELATCH_[xx] 总结


    `PAGELATCH_[xx]` 等待类型表明用于保护内存中页面的缓冲区锁存遇到了其他不兼容的缓冲区锁存。与锁类似，锁存在不同的模式来保护页面，并非所有模式都是相互兼容的。观察到大量
    `PAGELATCH_[xx]` 等待发生可能表明存在锁存争用情况。解决锁存争用可能具有挑战性，通常需要更改数据库设计或查询。


    ## LATCH_[xx]


    另一种与锁存相关的等待类型是 `LATCH_[xx]` 等待类型。正如我们在上一节讨论的 `PAGELATCH_[xx]` 等待类型一样，`LATCH_[xx]`
    等待与特定的锁存类相关。虽然 `PAGELATCH_[xx]` 等待类型与保护缓冲区缓存内部数据结构的锁存相关，但 `LATCH_[xx]` 等待类型与用于保护缓冲区缓存外部（但仍在
    SQL Server 内存中）数据结构的锁存相关。


    ### 什么是 LATCH_[xx] 等待类型？


    当你看到 `LATCH_[xx]` 等待类型发生时，表明某一特定类的非缓冲区锁存遇到了等待。`LATCH_[xx]` 实际上是这些不同非缓冲区锁存类等待时间的汇总，它本身并非一个独立的锁存类型。所有导致
    `LATCH_[xx]` 等待类型显示等待时间的不同非缓冲区锁存类，都记录在各自的动态管理视图 (DMV) `sys.dm_os_latch_stats`
    中。`LATCH_[xx]` 等待类型代表许多不同的锁存类，在 SQL Server 2017 中总计有 168 种。图 9-17 展示了可能发生 `LATCH_[xx]`
    等待的内存区域。


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig17_HTML.jpg](img/340881_2_En_9_Fig17_HTML.jpg)


    图 9-17


    发生的 LATCH_SH 等待


    由于 `LATCH_[xx]` 等待类型是特定锁存类上发生等待的累积视图，你需要查看 `sys.dm_os_latch_stats` DMV 内部才能找到
    `LATCH_[xx]` 等待的确切原因。我们在本章开头的“锁存介绍”部分已经描述了 `sys.dm_os_latch_stats` DMV 的内部工作机制和列，因此这里不再对该
    DMV 进行更多详细说明。


    ### LATCH_[xx] 示例


    有一种锁存争用情况可能导致 `LATCH_[xx]` 等待。这个问题可能发生在具有浅层 B 树 结构的小表上（我们将在本节稍后详细解释 B 树 结构），尤其是在大量并发插入操作期间。此类表的典型用例可能是充当队列的消息表，并在消息发送后被截断。清单
    9-2 中的脚本将创建一个名为 `Insert_Test2` 的测试表，并在该表上创建一个非聚集索引。


    ```sql

    -- 创建表

    CREATE TABLE Insert_Test2

    (

    ID UNIQUEIDENTIFIER,

    RandomData VARCHAR(50)

    );

    -- 在 ID 列上创建非聚集索引

    CREATE NONCLUSTERED INDEX idx_ID

    ON Insert_Test2 (ID);

    GO

    ```

    清单 9-2

    包含非聚集索引的争用测试表


    ID 列的数据类型为 `UNIQUEIDENTIFIER`，以确保生成随机的、非顺序的值。通过在此列上创建非聚集索引，我们可以确保插入操作会随机分布在与非聚集索引关联的
    B 树 上。


    表创建完成后，我们可以启动 Ostress，其工作负载包含一个将在表中插入单行的插入查询。我们将使用 500 个并发连接运行此工作负载，每个连接执行查询 100
    次。下面的命令展示了 Ostress 命令：


    ```shell

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -E -dAdventureWorks
    -Q"INSERT INTO Insert_Test2 (ID, RandomData) VALUES (NEWID(), CONVERT(varchar(50),
    NEWID()))" -n500 -r100 -q

    ```


    在工作负载运行期间，我可以使用以下查询查看 `sys.dm_os_waiting_tasks` DMV，以便 `resource_description`
    列能适应截图大小：


    ```sql

    SELECT

    session_id,

    wait_duration_ms,

    wait_type,

    resource_description

    FROM sys.dm_os_waiting_tasks;

    ```


    图 9-18 展示了在我的测试 SQL Server 实例上执行此查询的部分结果。


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig18_HTML.jpg](img/340881_2_En_9_Fig18_HTML.jpg)


    图 9-18


    发生的 LATCH_SH 等待


    `sys.dm_os_waiting_tasks` DMV 的 `resource_description` 列将帮助我们识别与 `LATCH_[xx]`
    等待关联的锁存类。在此例中，我们遇到了 `ACCESS_METHODS_HOBT_VIRTUAL_ROOT` 锁存类。


    现在我们知道了哪个锁存类遇到了等待，我们可以查询 `sys.dm_os_latch_stats` DMV 来找出此特定锁存类的等待次数和总等待时间，查询如下：


    ```sql

    SELECT *

    FROM sys.dm_os_latch_stats

    WHERE latch_class = ''ACCESS_METHODS_HOBT_VIRTUAL_ROOT'';

    ```


    图 9-19 展示了在我的测试 SQL Server 实例上执行此查询的结果。


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig19_HTML.jpg](img/340881_2_En_9_Fig19_HTML.jpg)


    图 9-19


    ACCESS_METHOD_HOBT_VIRTUAL_ROOT 锁存等待


    现在我们已经确定了导致 LATCH_SH 等待发生的锁存类，我们可以开始对其进行故障排查。根据在线丛书（Books Online），`ACCESS_METHODS_HOBT_VIRTUAL_ROOT`
    锁存类用于“同步访问内部 B 树 的根页抽象”。尽管描述相当有限，但它应该能给我们一个在排查此特定问题时从何处着手的思路。我在本书的附录 III 中包含了在线丛书上描述的不同锁存类列表，并在可能的情况下补充了一些额外信息。

