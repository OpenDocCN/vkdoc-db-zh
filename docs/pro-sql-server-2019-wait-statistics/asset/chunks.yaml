    # 13. 与内存 OLTP 相关的等待类型


    # WAITFOR


    本章最后介绍的这种等待类型，是少数几种与特定 T-SQL 命令直接相关的等待类型之一。`WAITFOR` 等待类型并不表示性能问题，但它肯定会影响执行相关
    `WAITFOR` T-SQL 命令的查询的持续时间。


    ## 什么是 WAITFOR 等待类型？


    每当执行使用了 `WAITFOR` 命令的查询时，`WAITFOR` 等待类型就会被记录。`WAITFOR` T-SQL 命令会停止查询的执行，直到经过特定的时间或到达特定的时间点。届时，查询执行将继续。`WAITFOR`
    命令经常在查询或脚本中使用，以强制查询执行暂停。例如，在第 4 章“建立可靠的基线”中，我们使用了 `WAITFOR` 命令来等待特定时长，以便我们可以比较相隔
    15 分钟进行的两次测量。


    在使用 `WAITFOR` 命令暂停查询执行时，持有该 `WAITFOR` 命令的事务将保持打开状态，直到整个事务完成。这意味着事务占用了线程，这些线程无法用于其他进程。SQL
    Server 还为 `WAITFOR` 命令保留了专用线程；如果太多线程与 `WAITFOR` 命令关联并发生线程不足，SQL Server 将随机选择 `WAITFOR`
    线程并终止它们以释放更多线程。


    在许多情况下，`WAITFOR` 命令是由编写查询或脚本的人显式使用的，从这个意义上说，它只影响特定的查询或脚本；因此，当看到高 `WAITFOR` 等待时间时，无需惊慌。它只是表明查询正在使用
    `WAITFOR` 命令。


    ## WAITFOR 示例


    为了向你展示 WAITFOR 等待类型的快速示例，你可以执行清单 12-4 中的查询。该查询将重置 `sys.dm_os_wait_stats` DMV，执行一个导致脚本执行等待
    30 秒的 `WAITFOR DELAY` 语句，然后查询 `sys.dm_os_wait_stats` DMV 以获取 `WAITFOR` 等待。


    ```

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    WAITFOR DELAY ''00:00:30'';

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''WAITFOR'';

    ```

    **清单 12-4**

    WAITFOR 等待


    当清单 12-4 中的查询完成时，你应该会看到发生了一次 WAITFOR 等待，总等待时间约为 30 秒，如图 12-18 所示。


    ![../images/340881_2_En_12_Chapter/340881_2_En_12_Fig18_HTML.jpg](img/340881_2_En_12_Fig18_HTML.jpg)

    **图 12-18**

    WAITFOR 等待


    ## WAITFOR 总结


    `WAITFOR` 等待类型是少数几种与 T-SQL 命令执行直接相关的等待类型之一，这里指的是 `WAITFOR`。`WAITFOR` 等待类型并不表示你的
    SQL Server 实例存在任何性能问题，它只是表明查询或脚本正在使用 `WAITFOR` 命令。`WAITFOR` T-SQL 命令只会影响使用它的查询或脚本的执行时间；因此，降低
    `WAITFOR` 等待时间的唯一方法是移除查询中的 `WAITFOR` 命令。


    # 13. 与内存 OLTP 相关的等待类型


    随着 SQL Server 2014 的发布，微软引入了一项全新的 SQL Server 功能，称为内存 OLTP（或代号 Hekaton）。内存 OLTP
    是一个内存优化的数据库引擎，直接集成到 SQL Server 2014 引擎中。内存 OLTP 是一项仅适用于企业版的功能，旨在通过将表完全放入 SQL Server
    实例的内存中来提高性能——根据微软的说法，性能可提升高达 20 倍。这些内存优化表是完全持久的，并使用无锁和无闩锁的结构来优化并发控制。


    随着内存 OLTP 的引入，SQL Server 2014 中添加了各种新的等待类型。其中大多数可以通过等待类型名称中的 `_XTP_`（或 eXtreme
    Transaction Processing）部分来识别。在本章中，我们将了解 SQL Server 2014 或更高版本中可用的一些新的、与内存 OLTP
    相关的等待类型。


    在深入研究这些等待类型之前，让我们先（简单且简要地）了解一下内存 OLTP 是什么以及它是如何工作的。本章我将重点关注内存优化表。内存 OLTP 还引入了其他功能，如本机编译存储过程和哈希索引，但这些超出了本章的范围。


    单击“文件”->“导出”->“脚本跟踪定义”->“适用于 SQL Server 2005 – SQL2017”选项后，系统将要求我们保存一个 `.sql`
    文件。整个跟踪定义将被脚本化到这个 `.sql` 文件中。我们可以在 SQL Server Management Studio 中打开此文件，修改脚本中的文件位置和其他一些选项，然后执行它。这将返回我们刚创建的跟踪的
    ID，并将跟踪信息保存到我们在脚本顶部指定的文件中。图 12-16 显示了在我们的测试 SQL Server 实例上导出的跟踪定义的一部分。


    ![../images/340881_2_En_12_Chapter/340881_2_En_12_Fig16_HTML.jpg](img/340881_2_En_12_Fig16_HTML.jpg)

    **图 12-16**

    跟踪定义


    执行脚本以创建服务器端跟踪后，我们收到了一个跟踪 ID 为 2。跟踪 ID 非常重要，因为它是启动或停止服务器端跟踪的唯一方法。创建后，服务器端跟踪会自动启动。如果我们查询
    `sys.traces` 目录视图，我们可以看到刚刚创建的服务器端跟踪，如图 12-17 所示。


    ![../images/340881_2_En_12_Chapter/340881_2_En_12_Fig17_HTML.jpg](img/340881_2_En_12_Fig17_HTML.jpg)

    **图 12-17**

    sys.traces


    与我们创建的服务器端跟踪交互的唯一方法是执行 `sp_trace_setstatus` 存储过程并提供跟踪 ID 和状态 ID。例如，执行以下查询将停止跟踪
    ID 为 2 的服务器端跟踪：


    ```

    EXEC sp_trace_setstatus 2, 0

    ```


    要重新启动它，我们可以执行此命令：


    ```

    EXEC sp_trace_setstatus 2, 1

    ```


    最后，要完全关闭跟踪，我们可以执行以下命令：


    ```

    EXEC sp_trace_setstatus 2, 3

    ```


    然而，这并不会删除服务器端跟踪。事实上，服务器端跟踪只能通过重启 SQL Server 服务来移除。


    因为服务器端跟踪只能捕获到跟踪文件，所以你可以导航到在服务器端跟踪定义中提供的文件，并在 SQL Server Profiler 中打开该文件。这样，你可以捕获与使用
    SQL Server Profiler 应用程序相同的信息，但性能开销要低得多。


    ## TRACEWRITE 总结


    `TRACEWRITE` 等待类型表明当前正在针对 SQL Server 实例执行 SQL Server Profiler 跟踪。SQL Server Profiler
    跟踪可能对 SQL Server 实例的性能产生相当大的影响，因此监控针对 SQL Server 实例运行的跟踪数量非常重要。值得庆幸的是，有一些 SQL
    Server Profiler 跟踪的替代方案。你可以选择将 SQL Server Profiler 跟踪转换为扩展事件会话，或者使用服务器端跟踪执行 SQL
    Server Profiler 跟踪。

