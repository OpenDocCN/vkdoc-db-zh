    ### 通过调整并行度配置降低 CXPACKET 等待时间


    有多种方法可用于降低 `CXPACKET` 等待时间，但在使用之前，你必须确认 `CXPACKET` 等待确实引起了问题。正如我之前所说，只要为你的 SQL
    Server 实例启用了并行度，`CXPACKET` 等待就完全是正常的。我在网络论坛上经常看到的一个解决方案是，通过将 `最大并行度` 选项设置为 1 来禁用并行度。在大多数情况下，这不是一个好主意。禁用并行度会完全消除
    `CXPACKET` 等待，但由于某些查询无法再并行运行，它们的性能可能会差很多。


    降低 `CXPACKET` 等待的一个更好方法是，调整 `并行度代价阈值` 和 `最大并行度` 选项，使其与你的工作负载相匹配。这样，你可以确保只有从并行中获益最多的查询才会并行运行。找到这个并行度甜点区的一种方法是比较查询在串行运行与并行运行时的执行时间。通常，你应该重点关注那些访问大量信息且本身运行时间较长的查询，因为这些查询将从并行中获益最多。


    考虑以下示例，我们有一个针对 `AdventureWorks` 数据库的查询，从 `Sales.SalesOrderDetail` 表请求信息：

    ```sql

    SELECT *

    FROM Sales.SalesOrderDetail

    ORDER BY CarrierTrackingNumber DESC;

    ```

    我们可以通过检查查询的估计代价来判断此查询是否适合并行运行。要查看此信息，我们需要查看查询在串行运行时的估计执行计划。为确保查询串行运行，我们必须添加查询选项
    `MAXDOP 1`。我们还对查询的运行时间感兴趣，因此我们在查询中添加了 `SET STATISTICS TIME ON` 选项：

    ```sql

    SET STATISTICS TIME ON

    SELECT *

    FROM Sales.SalesOrderDetail

    ORDER BY CarrierTrackingNumber DESC

    OPTION (MAXDOP 1);

    SET STATISTICS TIME OFF

    ```

    图 5-4 显示了查询在串行运行时的估计代价。


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig4_HTML.jpg](img/340881_2_En_5_Fig4_HTML.jpg)


    *图 5-4 使用 MAXDOP 1 时的查询估计代价*


    在此示例中，在我的测试 SQL Server 上估计代价为 10.4907。当我执行查询时，我的系统上的执行时间为 2256 毫秒。


    由于我的测试服务器上 `并行度代价阈值` 仍配置为默认值 5，我相当确定如果我移除 `MAXDOP` 查询提示，查询将会并行运行。


    图 5-5 显示了在运行不带 `MAXDOP 1` 选项的查询后的实际执行计划。


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig5_HTML.jpg](img/340881_2_En_5_Fig5_HTML.jpg)


    *图 5-5 不带 MAXDOP 1 选项的实际执行计划*


    如你所见，正如我们预期的那样，查询使用了并行度运行，因为其估计代价高于 `并行度代价阈值` 选项中配置的值。使用并行度的查询执行时间为 1959 毫秒。如果我们查看实际执行计划中
    `SELECT` 操作的属性，可以查看一些附加信息，如图 5-6 所示。


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig6_HTML.jpg](img/340881_2_En_5_Fig6_HTML.jpg)


    *图 5-6 SELECT 操作属性*


    `SELECT` 操作的属性显示查询是使用两个线程执行的。估计代价下降到了 7.08005。


    尽管估计代价下降了，但对于此查询，执行时间的改进非常小。我们可以将 `并行度代价阈值` 值更改为高于默认值 5 的数字。这样，我们可以确保像本示例中的这种相对较小的查询不使用并行度，而繁重的报表查询则使用。


    另一个需要记住的设置是 `最大并行度` 选项。当它设置为默认值 0 时，查询并行运行时可以使用所有可用的调度程序。但是，使用更多的调度程序并不一定意味着查询执行得更快。在使用超过
    8 个调度程序后，使用更多调度程序带来的好处会逐渐变小。微软在 KB2806535 中推荐以下配置：

    *   对于核心数超过八个的服务器，将 `最大并行度` 选项设置为 8。

    *   对于核心数少于八个的服务器，将 `最大并行度` 选项设置为 0 或服务器的核心数。


    这是一个通用建议，具体情况可能有所不同。`并行度代价阈值` 和 `最大并行度` 两个选项的设置高度依赖于你系统的工作负载，需要仔细测试才能找出哪些设置有效，哪些无效。不过，它们会影响你的
    `CXPACKET` 等待时间，因此，在更改 `并行度代价阈值` 或 `最大并行度` 选项后，请将你的 `CXPACKET` 等待时间与基线进行比较，以衡量更改的影响。


    ### 通过解决倾斜的工作负载来降低 CXPACKET 等待时间


    倾斜的工作负载意味着并非所有工作线程都接收到相同数量的工作来执行。这不是一个最优的情况，因为如果一个工作线程必须完成大部分工作，而另一个只完成很少一部分，那么线程
    0 仍然必须等待运行时间最长的工作线程完成，在等待期间记录 `CXPACKET` 等待时间。图 5-7 显示了一个倾斜工作负载的抽象示例。


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig7_HTML.jpg](img/340881_2_En_5_Fig7_HTML.jpg)


    *图 5-7 倾斜的并行查询线程分配*


    如果我们可以将线程 2 的部分工作交给线程 3，查询可能会执行得更快，从而降低 `CXPACKET` 等待时间。


    我们可以在实际执行计划中并行操作的 `实际行数` 属性中查看线程分布情况。图 5-8 显示了使用并行度执行的聚集索引扫描操作的属性。此操作发生在我们上一节中针对
    `Sales.SalesOrderDetail` 表使用的示例查询中。


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig8_HTML.jpg](img/340881_2_En_5_Fig8_HTML.jpg)


    *图 5-8 并行线程分布*


    在此示例中，我们看到聚集索引扫描返回了 121,317 行，分布在两条线程上（请注意，线程 0，即协调线程，不处理任何行）。在这种情况下，行数的分布相对均匀，因此我们可能没有遇到倾斜的工作负载问题。


    倾斜的工作负载通常由过时的统计信息引起。如果查询优化器认为表中的行数少于（或多于）实际数量，它可能会将工作不均匀地分配给各个线程。请确保定期对统计信息进行维护，以防止出现倾斜的工作负载。

    '
- fmt: '## Introduction of the CXCONSUMER Wait Type in SQL Server 2016 SP2 and 2017
    CU3


    在 SQL Server 2017 CU3（以及之后的 SQL Server 2016 SP2）的发布中，Microsoft 推送了一项关于并行等待记录方式的更改。开发团队的主要目标是使并行等待更具可操作性。正如你在前面章节中所读到的，这一点非常受欢迎，因为很难确定并行等待何时会导致查询性能问题。


    正如我们前面所述，并行由两部分组成：`producers` 和 `consumers`。最简单的方式是将我们之前引入的 0 线程视为生产者（`producers`）。0
    线程的工作是将工作分配给可用的并行工作线程。这些工作线程被称为消费者（`consumers`），它们执行生产者发送给它们的实际工作。


    在 SQL Server 2017 CU3 和 SQL Server 2016 SP2 之前，没有办法区分例如消费者是否在花费时间等待生产者向它们发送工作。所有内容在内部都被记录为
    `CXPACKET` 等待时间。随着 SQL Server 2017 CU3 和 SQL Server 2016 SP2 中的更改，开发团队将并行等待时间分成了两个不同的类别：`CXPACKET`
    和 `CXCONSUMER`。随着这一更改，这两种等待类型的意义也与早期的 SQL Server 版本相比发生了一些变化。


    当消费者线程等待生产者发送行时，就可能发生 `CXCONSUMER` 等待。这或多或少是正常行为，在查看等待统计信息时，在大多数情况下可以安全地忽略。


    `CXPACKET` 等待现在记录时不再包含 `CXCONSUMER` 等待时间，这意味着看到 `CXPACKET` 等待时间不仅表示发生了并行操作，而且较高的等待时间更清楚地表明了并行操作方面的问题（例如，线程在所需的缓冲区或线程同步方面遇到问题）。这实际上意味着，如果你运行的是
    SQL Server 2017 CU3 或 SQL Server 2016 SP2 或更高版本，看到 `CXPACKET` 等待比在较低的 SQL Server
    版本中更清楚地表明并行问题，从而使等待类型更具可操作性，这正是开发团队所期望的。本章前面描述的关于处理高并行等待时间的建议仍然有效，尽管现在它对 `CXPACKET`
    等待时间有更直接的影响。


    ### CXPACKET Summary


    `CXPACKET` 等待类型直接与查询执行期间并行的使用相关。如果你允许查询使用并行运行，你将总是看到 `CXPACKET` 等待。通常这没什么可担心的，所以要避免膝跳反射式地完全关闭并行。相反，专注于调整最大并行度（`Max
    Degree of Parallelism`）和并行开销阈值（`Cost Threshold for Parallelism`）选项，使阈值足够高，以便你的大型查询可以从使用并行中受益，而小型查询不会受到负面影响。同时，通过确保统计信息是最新的来避免偏斜的工作负载。


    如果你运行的是 SQL Server 2017 CU3 或 SQL Server 2016 SP2（或更高版本），`CXPACKET` 等待时间的含义有了一些变化，导致
    `CXPACKET` 等待比在低于这些提到的 SQL Server 版本中更有可能表明发生了并行问题。


    ## SOS_SCHEDULER_YIELD


    与 `CXPACKET` 类似，`SOS_SCHEDULER_YIELD` 是一种等待类型，它会经常出现在你系统上总等待时间的前十名中。同样与 `CXPACKET`
    等待类型一样，`SOS_SCHEDULER_YIELD` 等待时间并不一定表明你的 SQL Server 实例存在问题。一旦你在 SQL Server 实例上开始运行查询，就会出现
    `SOS_SCHEDULER_YIELD` 等待，它们与 SQL Server 调度密切相关。


    ### What Is the SOS_SCHEDULER_YIELD Wait Type?


    在我们回答 `SOS_SCHEDULER_YIELD` 等待类型的含义之前，我们必须回到本书的第 1 章“等待统计内部原理”（“Wait Statistics
    Internals”），我们在其中讨论了 SQL Server 调度。还记得 SQLOS 使用自己的协作式非抢占式调度模型来确保 Microsoft Windows
    进程不会中断 SQL Server 自己的进程吗？`SOS_SCHEDULER_YIELD` 等待类型与 SQLOS 的协作式非抢占式调度模型有直接关系。为了使它更容易理解，我包含了图
    5-9，你应该很熟悉它，因为它代表了我们在第 1 章中讨论的调度器。


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig9_HTML.jpg](images/340881_2_En_5_Chapter/340881_2_En_5_Fig9_HTML.jpg)


    图 5-9

    调度器及其阶段和队列


    如果你还记得第 1 章“等待统计内部原理”，工作线程以固定的顺序通过不同的阶段和队列。通常，工作线程在等待资源时从等待者列表（`Waiter List`）开始，然后移动到可运行队列（`Runnable
    Queue`）等待在处理器上运行的机会，最后获得处理器时间来执行其请求，进入“运行中”（`RUNNING`）状态。如果工作线程在“运行中”状态时需要额外的资源，它会移回等待者列表，并开始一次穿过不同队列和阶段的新旅程。


    这种行为有一个例外，它发生在一个工作线程处于“运行中”状态且不需要额外资源来完成其工作时。如果 SQLOS 让一个工作线程在处理器上运行，只要它不需要任何额外的资源，处理器就可能被一个工作线程无限期地“劫持”。为了确保这种情况不会发生，调度器给每个工作线程一个特定的时间片，它们需要在这个时间片内完成其工作。我们称这个时间片为量子（`quantum`），它是一个固定的、不可更改的
    4 毫秒。如果一个工作线程用完了它的量子，它必须让出（`yield`）处理器，然后它移回到可运行队列的末尾。它会跳过等待者列表，因为该工作线程不需要额外的资源。当工作线程等待再次移回处理器时，会记录
    `SOS_SCHEDULER_YIELD` 等待类型。图 5-10 显示了这种行为。


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig10_HTML.jpg](images/340881_2_En_5_Chapter/340881_2_En_5_Fig10_HTML.jpg)


    图 5-10

    工作线程自愿让出处理器


    正如你可能想到的，工作线程一直在自愿让出，尤其是在长时间运行的查询上，因为那里不需要额外的资源。但请记住，`SOS_SCHEDULER_YIELD` 等待类型的等待时间只有在工作线程实际上不得不在可运行队列中等待时才会被记录。如果让出的工作线程前面没有其他工作线程，它将直接移回处理器而不等待（尽管它仍然会经过可运行队列）。为了向你展示一个例子，我在测试的
    SQL Server 上对 `AdventureWorks` 数据库执行了以下查询，那里完全没有并发：


    ```sql

    -- Clear Wait Stats

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    -- Simple select

    SELECT *

    FROM Sales.SalesOrderDetail

    ORDER BY CarrierTrackingNumber DESC;

    -- Check for SOS_SCHEDULER_YIELD waits

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''SOS_SCHEDULER_YIELD'';

    ```


    图 5-11 显示了针对 `sys.dm_os_wait_stats` DMV 执行此查询的结果。


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig11_HTML.jpg](images/340881_2_En_5_Chapter/340881_2_En_5_Fig11_HTML.jpg)


    图 5-11'
  raw: '### Introduction of the CXCONSUMER Wait Type in SQL Server 2016 SP2 and 2017
    CU3


    In the release of SQL Server 2017 CU3 (and later SQL Server 2016 SP2), Microsoft
    pushed a change in how parallelism waits are recorded. The main goal of the development
    team was to make parallelism wait more actionable. Something that, as you read
    in the preceding sections, is more than welcome since it is very difficult to
    determine when parallelism waits are causing issues in your query’s performance.


    As we described earlier, parallelism consists of two parts: **producers** and
    **consumers**. The easiest way is to think of the 0 thread we introduced earlier
    to be a producer. It is the job of the 0 thread to distribute work to the available
    parallel worker threads. Those worker threads are named consumers and perform
    the actual work the producers send to them.


    Before SQL Server 2017 CU3 and SQL Server 2016 SP2, there is no way to distinguish
    if, for instance, consumers are spending time waiting on producers to send work
    to them. Everything is recorded as CXPACKET wait time internally. With the changes
    in SQL Server 2017 CU3 and SQL Server 2016 SP2, the development team split up
    the wait times for parallelism into two different categories: CXPACKET and CXCONSUMER.
    With this change the meaning of those two wait types also changed a bit compared
    to earlier SQL Server releases.


    CXCONSUMER waits can occur whenever a consumer thread is waiting for producer
    to send rows. This is more or less normal behavior and can in most cases be safely
    ignored when looking at wait statistics information.


    CXPACKET waits are now recorded without the CXCONSUMER wait time, meaning that
    seeing CXPACKET wait times not only indicate parallelism occurring but also that
    high wait times indicate a clearer issue regarding parallelism operations (for
    instance, threads are running into issues with required buffer or thread synchronization).
    Effectively this means that if you are running SQL Server 2017 CU3 or SQL Server
    SP2 or higher, seeing CXPACKET waits more clearly indicate parallelism issues
    than in lower SQL Server versions, thus making the wait type more actionable as
    the development team intended. The advice in dealing with high parallelism wait
    times described earlier in this chapter is still valid, though it now has a more
    direct impact on CXPACKET wait times.


    ### CXPACKET Summary


    The `CXPACKET` wait type is directly related to the usage of parallelism during
    query execution. If you allow queries to be run using parallelism you will always
    see `CXPACKET` waits. Normally this is nothing to worry about, so avoid the knee-jerk
    reaction to turn off parallelism completely. Instead, focus on tuning the Max
    Degree of Parallelism and Cost Threshold for Parallelism options so that the thresholds
    are high enough that your large queries can benefit from using parallelism but
    your small queries do not experience a negative impact. Also, avoid skewed workloads
    by making sure your statistics are up-to-date.


    If you are running SQL Server 2017 CU3 or SQL Server 2016 SP2 (or higher), the
    CXPACKET wait time meaning has changed a bit resulting in that CXPACKET waits
    are far more likely to indicate a parallelism issue occurring than in SQL Server
    versions that are lower than those mentioned.


    ## SOS_SCHEDULER_YIELD


    Just like `CXPACKET`, `SOS_SCHEDULER_YIELD` is a wait type that will frequently
    show up in the top 10 of total wait time on your system. And just like the `CXPACKET`
    wait types, `SOS_SCHEDULER_YIELD` wait times do not necessarily indicate that
    there is a problem with your SQL Server instance. `SOS_SCHEDULER_YIELD` waits
    occur as soon as you start running queries on your SQL Server instance, and they
    are closely related to SQL Server scheduling.


    ### What Is the SOS_SCHEDULER_YIELD Wait Type?


    Before we can answer what the `SOS_SCHEDULER_YIELD` wait type means, we have to
    go back to Chapter [1](#340881_2_En_1_Chapter.xhtml), “Wait Statistics Internals,”
    in this book, where we discussed SQL Server scheduling. Remember that the SQLOS
    uses its own cooperative non-preemptive scheduling model to make sure Microsoft
    Windows processes do not interrupt SQL Server’s own processes? The `SOS_SCHEDULER_YIELD`
    wait type has a direct relation with the SQLOS’s cooperative, non-preemptive scheduling
    model. To make it a little bit easier to understand, I have included Figure [5-9](#340881_2_En_5_Chapter.xhtml#Fig9),
    which should be familiar to you as it represents a scheduler that we discussed
    in Chapter [1](#340881_2_En_1_Chapter.xhtml).


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig9_HTML.jpg](images/340881_2_En_5_Chapter/340881_2_En_5_Fig9_HTML.jpg)


    Figure 5-9


    Scheduler and its phases and queues


    If you remember from Chapter [1](#340881_2_En_1_Chapter.xhtml), “Wait Statistics
    Internals,” worker threads move through the different phases and queues in a fixed
    order. Generally, a worker thread starts on the Waiter List while it waits for
    resources, it then moves to the Runnable Queue waiting for its turn to be run
    on the processor, and finally receives processor time to execute its request,
    receiving the “RUNNING” state. If the worker thread needs additional resources
    while it is in the “RUNNING” state, the worker thread moves back to the Waiter
    List and starts a new trip through the different queues and phases.


    There is one exception to this behavior and it occurs when a worker thread is
    in the “RUNNING” state and doesn’t need additional resources to complete its work.
    If the SQLOS let a worker thread run on the processor for as long as it didn’t
    need any additional resources, the processor could be “hijacked” by one single
    worker thread for an infinite amount of time. To make sure a situation like this
    cannot occur, the scheduler gives every worker thread a specific slice of time
    in which they need to perform their work. We call this slice of time a quantum,
    and it is a fixed, unchangeable, 4 milliseconds. If a worker thread spends its
    quantum it has to yield the processor, and it then moves back to the bottom of
    the Runnable Queue. It will skip the Waiter List because the worker thread doesn’t
    need additional resources. While the worker thread is waiting to move back to
    the processor again, the `SOS_SCHEDULER_YIELD` wait type is recorded. Figure [5-10](#340881_2_En_5_Chapter.xhtml#Fig10)
    shows this behavior.


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig10_HTML.jpg](images/340881_2_En_5_Chapter/340881_2_En_5_Fig10_HTML.jpg)


    Figure 5-10


    Worker thread voluntarily yielding the processor


    As you can probably figure out, worker threads are voluntarily yielding all the
    time, especially on long-running queries where there is no need for additional
    resources. But keep in mind that wait times for the SOS_SCHEDULER_YIELD wait type
    will only be logged if the worker thread actually had to wait in the Runnable
    Queue. If there is no other worker thread in front of the yielding worker thread,
    it will move directly back to the processor without waiting (it will still move
    through the Runnable Queue though). To show you an example of this, I executed
    the following queries against the `AdventureWorks` database on my test SQL Server,
    where there is no concurrency whatsoever:


    ```

    -- Clear Wait Stats

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    -- Simple select

    SELECT *

    FROM Sales.SalesOrderDetail

    ORDER BY CarrierTrackingNumber DESC;

    -- Check for SOS_SCHEDULER_YIELD waits

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''SOS_SCHEDULER_YIELD'';

    ```


    Figure [5-11](#340881_2_En_5_Chapter.xhtml#Fig11) shows the results of this query
    against the `sys.dm_os_wait_stats` DMV .


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig11_HTML.jpg](images/340881_2_En_5_Chapter/340881_2_En_5_Fig11_HTML.jpg)


    Figure 5-11'
  trans: '

    ## SQL Server 2016 SP2 和 2017 CU3 中 CXCONSUMER 等待类型简介


    在 SQL Server 2017 CU3（以及后续的 SQL Server 2016 SP2）发布中，微软推送了一项关于并行等待记录方式的更改。开发团队的主要目标是使并行等待更具可操作性。正如你在前面章节中所读到的，这一点非常受欢迎，因为要确定并行等待何时会导致查询性能问题往往很困难。


    正如我们前面所述，并行由两部分组成：`生产者` 和 `消费者`。最简单的方式是将我们之前引入的 0 线程视为生产者（`producers`）。0 线程的工作是将工作分配给可用的并行工作线程。这些工作线程被称为消费者（`consumers`），它们执行生产者发送给它们的实际工作。


    在 SQL Server 2017 CU3 和 SQL Server 2016 SP2 之前，没有办法区分例如消费者是否在花费时间等待生产者向它们发送工作。所有内容在内部都被记录为
    `CXPACKET` 等待时间。随着 SQL Server 2017 CU3 和 SQL Server 2016 SP2 中的更改，开发团队将并行等待时间分成了两个不同的类别：`CXPACKET`
    和 `CXCONSUMER`。随着这一更改，这两种等待类型的意义也与早期的 SQL Server 版本相比发生了一些变化。


    当消费者线程等待生产者发送行时，就可能发生 `CXCONSUMER` 等待。这或多或少是正常行为，在查看等待统计信息时，在大多数情况下可以安全地忽略。


    `CXPACKET` 等待现在记录时不再包含 `CXCONSUMER` 等待时间，这意味着看到 `CXPACKET` 等待时间不仅表示发生了并行操作，而且较高的等待时间更清楚地表明了并行操作方面的问题（例如，线程在所需的缓冲区或线程同步方面遇到问题）。这实际上意味着，如果你运行的是
    SQL Server 2017 CU3 或 SQL Server 2016 SP2 或更高版本，看到 `CXPACKET` 等待比在较低的 SQL Server
    版本中更清楚地表明并行问题，从而使等待类型更具可操作性，这正是开发团队所期望的。本章前面描述的关于处理高并行等待时间的建议仍然有效，尽管现在它对 `CXPACKET`
    等待时间有更直接的影响。


    ### CXPACKET 概述


    `CXPACKET` 等待类型直接与查询执行期间并行的使用相关。如果你允许查询使用并行运行，你将总是看到 `CXPACKET` 等待。通常这没什么可担心的，所以要避免膝跳反射式地完全关闭并行。相反，专注于调整最大并行度（`Max
    Degree of Parallelism`）和并行开销阈值（`Cost Threshold for Parallelism`）选项，使阈值足够高，以便你的大型查询可以从使用并行中受益，而小型查询不会受到负面影响。同时，通过确保统计信息是最新的来避免偏斜的工作负载。


    如果你运行的是 SQL Server 2017 CU3 或 SQL Server 2016 SP2（或更高版本），`CXPACKET` 等待时间的含义有了一些变化，导致
    `CXPACKET` 等待比在低于这些提到的 SQL Server 版本中更有可能表明发生了并行问题。


    ## SOS_SCHEDULER_YIELD


    与 `CXPACKET` 类似，`SOS_SCHEDULER_YIELD` 是一种等待类型，它会经常出现在你系统上总等待时间的前十名中。同样与 `CXPACKET`
    等待类型一样，`SOS_SCHEDULER_YIELD` 等待时间并不一定表明你的 SQL Server 实例存在问题。一旦你在 SQL Server 实例上开始运行查询，就会出现
    `SOS_SCHEDULER_YIELD` 等待，它们与 SQL Server 调度密切相关。


    ### SOS_SCHEDULER_YIELD 等待类型是什么？


    在我们回答 `SOS_SCHEDULER_YIELD` 等待类型的含义之前，我们必须回到本书的第 1 章“等待统计内部原理”（“Wait Statistics
    Internals”），我们在其中讨论了 SQL Server 调度。还记得 SQLOS 使用自己的协作式非抢占式调度模型来确保 Microsoft Windows
    进程不会中断 SQL Server 自己的进程吗？`SOS_SCHEDULER_YIELD` 等待类型与 SQLOS 的协作式非抢占式调度模型有直接关系。为了使它更容易理解，我包含了图
    5-9，你应该很熟悉它，因为它代表了我们在第 1 章中讨论的调度器。


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig9_HTML.jpg](img/340881_2_En_5_Fig9_HTML.jpg)


    图 5-9

    调度器及其阶段和队列


    如果你还记得第 1 章“等待统计内部原理”，工作线程以固定的顺序通过不同的阶段和队列。通常，工作线程在等待资源时从等待者列表（`Waiter List`）开始，然后移动到可运行队列（`Runnable
    Queue`）等待在处理器上运行的机会，最后获得处理器时间来执行其请求，进入“运行中”（`RUNNING`）状态。如果工作线程在“运行中”状态时需要额外的资源，它会移回等待者列表，并开始一次穿过不同队列和阶段的新旅程。


    这种行为有一个例外，它发生在一个工作线程处于“运行中”状态且不需要额外资源来完成其工作时。如果 SQLOS 让一个工作线程在处理器上运行，只要它不需要任何额外的资源，处理器就可能被一个工作线程无限期地“劫持”。为了确保这种情况不会发生，调度器给每个工作线程一个特定的时间片，它们需要在这个时间片内完成其工作。我们称这个时间片为量子（`quantum`），它是一个固定的、不可更改的
    4 毫秒。如果一个工作线程用完了它的量子，它必须让出（`yield`）处理器，然后它移回到可运行队列的末尾。它会跳过等待者列表，因为该工作线程不需要额外的资源。当工作线程等待再次移回处理器时，会记录
    `SOS_SCHEDULER_YIELD` 等待类型。图 5-10 显示了这种行为。


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig10_HTML.jpg](img/340881_2_En_5_Fig10_HTML.jpg)


    图 5-10

    工作线程自愿让出处理器


    正如你可能想到的，工作线程一直在自愿让出，尤其是在长时间运行的查询上，因为那里不需要额外的资源。但请记住，`SOS_SCHEDULER_YIELD` 等待类型的等待时间只有在工作线程实际上不得不在可运行队列中等待时才会被记录。如果让出的工作线程前面没有其他工作线程，它将直接移回处理器而不等待（尽管它仍然会经过可运行队列）。为了向你展示一个例子，我在测试的
    SQL Server 上对 `AdventureWorks` 数据库执行了以下查询，那里完全没有并发：


    ```sql

    -- Clear Wait Stats

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    -- Simple select

    SELECT *

    FROM Sales.SalesOrderDetail

    ORDER BY CarrierTrackingNumber DESC;

    -- Check for SOS_SCHEDULER_YIELD waits

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''SOS_SCHEDULER_YIELD'';

    ```


    图 5-11 显示了针对 `sys.dm_os_wait_stats` DMV 执行此查询的结果。


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig11_HTML.jpg](img/340881_2_En_5_Fig11_HTML.jpg)


    图 5-11

    '
- fmt: '# SOS_SCHEDULER_YIELD waits


    As you can see in Figure [5-11](#340881_2_En_5_Chapter.xhtml#Fig11), the query
    against the `AdventureWorks` database encountered the `SOS_SCHEDULER_YIELD` wait
    type 30 times during execution. It didn’t have to spend any time waiting for another
    worker thread in the Runnable Queue since this was the only query running at the
    time. If it had spent any time waiting for another worker thread, the `wait_time_ms`
    column would have returned a value higher than 0.


    As I said at the start of this section, the `SOS_SCHEDULER_YIELD` wait type is
    generally not a cause for concern. If, however, the wait times are significantly
    higher than those in your baseline, it can be a reason to perform some additional
    research. There are basically three situations you can encounter when dealing
    with `SOS_SCHEDULER_YIELD` waits, as shown in Figure [5-12](#340881_2_En_5_Chapter.xhtml#Fig12).


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig12_HTML.jpg](images/340881_2_En_5_Chapter/340881_2_En_5_Fig12_HTML.jpg)

    **Figure 5-12** SOS_SCHEDULER_YIELD situations


    Let’s take a look at how we can analyze and resolve the SQL Server CPU pressure
    problem.


    ## Lowering SOS_SCHEDULER_YIELD Waits


    If you are experiencing higher than normal `SOS_SCHEDULER_YIELD` wait times and
    a large number of waits, you could, potentially, have a CPU-related problem on
    your system. To lower the `SOS_SCHEDULER_YIELD` waits, we are going to focus on
    the top-right section of Figure [5-12](#340881_2_En_5_Chapter.xhtml#Fig12), where
    there are a large amount of waiting tasks and high wait times.


    If you are experiencing high wait times for the `SOS_SCHEDULER_YIELD` wait type
    together with a large amount of waiting tasks, you can assume you have a very
    busy SQL Server instance. Worker threads will yield, but it will take them a long
    time to get back on the processor again because there are many other threads waiting
    in the Runnable Queue. As we discussed earlier in Chapter [1](#340881_2_En_1_Chapter.xhtml),
    “Wait Statistics Internals,” the Runnable Queue is a first-in first-out list,
    meaning that the more worker threads that are waiting inside the Runnable Queue,
    the longer it takes for worker threads to move through it. You will usually see
    a high CPU usage on the system by the SQL Server process.


    To show you an example of this problem, we will use the Ostress utility to execute
    a specific query simultaneously from a number of threads. The Ostress utility
    is part of the RML utilities for SQL Server, which you can download here: [https://support.microsoft.com/en-us/kb/944837](https://support.microsoft.com/en-us/kb/944837).


    The first thing we are going to do is save the following query as `C:\sos_scheduler_yield.sql`
    on the test server:


    ```sql

    WHILE (1=1)

    BEGIN

    SELECT COUNT(*)

    FROM Sales.SalesOrderDetail

    WHERE SalesOrderID BETWEEN 45125 AND 54185

    END;

    ```


    This query will count the number of rows between two `SalesOrderID`s in the `Sales.SalesOrderDetail`
    table of the `AdventureWorks` database. It will do this in an endless loop.


    After saving the query we start the Ostress utility using the following command:


    ```powershell

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -E -dAdventureWorks
    -i"C:\sos_scheduler_yield.sql" -n20 -r1 -q

    ```


    This starts the Ostress utility, which connects to the `AdventureWorks` database
    and executes the `sos_scheduler_yield.sql` script using 20 threads.


    As soon as we start Ostress, the CPU of the test SQL Server hits 100%, as shown
    in Figure [5-13](#340881_2_En_5_Chapter.xhtml#Fig13).


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig13_HTML.jpg](images/340881_2_En_5_Chapter/340881_2_En_5_Fig13_HTML.jpg)

    **Figure 5-13** Impact of Ostress on the CPU


    As you can see in Figure [5-13](#340881_2_En_5_Chapter.xhtml#Fig13), the CPU load
    is generated from the `sqlserv#1` process, which happens to be the SQL Server
    instance we are running the Ostress query against.


    If we were to query the `sys.dm_os_waiting_tasks` DMV to check if the `SOS_SCHEDULER_YIELD`
    wait type is responsible for the CPU usage, we would be in for a surprise, as
    you can see in Figure [5-14](#340881_2_En_5_Chapter.xhtml#Fig14).


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig14_HTML.jpg](images/340881_2_En_5_Chapter/340881_2_En_5_Fig14_HTML.jpg)

    **Figure 5-14** No SOS_SCHEDULER_YIELD waits occurring


    This is the tricky part of the `SOS_SCHEDULER_YIELD` wait type, as it frequently
    won’t get returned by the `sys.dm_os_waiting_tasks` DMV—another reason to capture
    and use that wait statistics baseline!


    To show that the high CPU usage is related to the `SOS_SCHEDULER_YIELD` wait type,
    we have to take a look at the cumulative wait statistics DMV, `sys.dm_os_wait_stats`.
    We can use the following query to show the top five wait types ordered by wait
    time while we run the Ostress utility (we can reset the DMV before starting the
    Ostress utility to keep the numbers small):


    ```sql

    SELECT TOP 5 *

    FROM sys.dm_os_wait_stats

    ORDER by wait_time_ms DESC;

    ```


    The results of this query are shown in Figure [5-15](#340881_2_En_5_Chapter.xhtml#Fig15).'
