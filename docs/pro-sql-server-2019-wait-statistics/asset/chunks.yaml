    CFP。然而，这并不意味着这是唯一产生 `WAIT_XTP_HOST_WAIT` 等待的过程。也可能存在其他同样会导致此等待的过程，但到目前为止，它们只发生在需要添加新
    CFP 的时候。


    ## WAIT_XTP_CKPT_CLOSE


    `WAIT_XTP_CKPT_CLOSE` 等待类型是 SQL Server 2014 中引入的另一个新等待类型。顾名思义，它似乎与内存 OLTP 功能引入的新离线检查点进程有关。'
- fmt: '### What Is the `WAIT_XTP_CKPT_CLOSE` Wait Type?


    The `WAIT_XTP_CKPT_CLOSE` wait type seems to be related to the new offline checkpoint
    process that was introduced in SQL Server 2014 with the release of In-Memory OLTP.
    As far as I can tell by analyzing the behavior of this wait type, it only records
    wait time when a checkpoint occurs, no matter if it is an automatic or manual
    checkpoint. The wait time the `WAIT_XTP_CKPT_CLOSE` wait type represents seems
    to be the time it takes for the checkpoint operation to complete.


    We can verify this easily by executing a `CHECKPOINT` command against the database
    and table we created earlier when we discussed the `WAIT_XTP_HOST_WAIT` wait type.
    I used the script in Listing [13-2](#340881_2_En_13_Chapter.xhtml#PC5) to clear
    the `sys.dm_os_wait_stats` DMV, insert a few rows inside the memory-optimized
    table, perform a `CHECKPOINT` operation, and then query the `sys.dm_os_wait_stats`
    DMV for `WAIT_XTP_CKPT_CLOSE` wait type information.


    ```sql

    USE [OLTP_Test];

    GO

    -- Clear sys.dm_os_wait_stats

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    -- Insert some rows

    INSERT INTO OLTP

    (

    RandomData1,

    RandomData2,

    ID2

    )

    VALUES

    (

    CONVERT(VARCHAR(50), NEWID()),

    CONVERT(VARCHAR(50), NEWID()),

    NEWID()

    );

    GO 1000

    -- Perform a CHECKPOINT

    CHECKPOINT

    -- Query sys.dm_os_wait_stats for WAIT_XTP_CKPT_CLOSE waits

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''WAIT_XTP_CKPT_CLOSE'';

    ```


    Listing 13-2 Generate `WAIT_XTP_CKPT_CLOSE` waits


    The results can be seen in Figure [13-7](#340881_2_En_13_Chapter.xhtml#Fig7).


    ![../images/340881_2_En_13_Chapter/340881_2_En_13_Fig7_HTML.jpg](images/340881_2_En_13_Chapter/340881_2_En_13_Fig7_HTML.jpg)


    Figure 13-7 `WAIT_XTP_CKPT_CLOSE` waits


    Just as I did for the `WAIT_XTP_HOST_WAIT` wait type, I also captured the call
    stack when a `WAIT_XTP_CKPT_CLOSE` wait occurred:


    ```

    sqldk.dll!XeSosPkg::wait_info::Publish+0x138

    sqldk.dll!SOS_Scheduler::UpdateWaitTimeStats+0x2bc

    sqldk.dll!SOS_Task::PostWait+0x9e

    sqlmin.dll!EventInternal::Wait+0x1fb

    sqlmin.dll!HkCheckpointCtxtImpl::WaitForCkptComplete+0xd0

    sqlmin.dll!HkHostWaitForCkptComplete+0x13a

    sqlmin.dll!CheckpointWithOptionalTruncate+0xe6

    sqllang.dll!CStmtCheckpoint::XretExecute+0xe7

    sqllang.dll!CMsqlExecContext::ExecuteStmts+0x427

    sqllang.dll!CMsqlExecContext::FExecute+0xa33

    sqllang.dll!CSQLSource::Execute+0x86c

    sqllang.dll!process_request+0xa57

    sqllang.dll!process_commands+0x4a3

    sqldk.dll!SOS_Task::Param::Execute+0x21e

    sqldk.dll!SOS_Scheduler::RunTask+0xa8

    sqldk.dll!SOS_Scheduler::ProcessTasks+0x279

    sqldk.dll!SchedulerManager::WorkerEntryPoint+0x24c

    sqldk.dll!SystemThread::RunWorker+0x8f

    sqldk.dll!SystemThreadDispatcher::ProcessWorker+0x3ab

    sqldk.dll!SchedulerManager::ThreadEntryPoint+0x226

    kernel32.dll!BaseThreadInitThunk+0xd

    ntdll.dll!RtlUserThreadStart+0x21

    ```


    I believe the most interesting line is `sqlmin.dll!CheckpointWithOptionalTruncate+0xe6`,
    which seems to be the function that performs the truncate. It is followed by the
    `sqlmin.dll!HkCheckpointCtxtImpl::WaitForCkptComplete+0xd0` line that I believe
    records the time the previous checkpoint function took place, which gets posted
    later on to the wait statistics DMVs.


    I don’t believe seeing `WAIT_XTP_CKPT_CLOSE` waits occur is a direct cause for
    concern. They indicate that checkpoints are being performed. I can imagine that
    sudden high wait times for the `WAIT_XTP_CKPT_CLOSE` wait type can indicate a
    performance issue. As we saw in the previous section, performing a checkpoint
    against a memory-optimized table will result in extra CFPs being created. I am
    guessing that if the allocation of CFPs takes a long time, the checkpoint operation
    will take longer to complete as well, resulting in higher `WAIT_XTP_CKPT_CLOSE`
    wait times.


    The amount of data a checkpoint has to process will probably also mean higher
    `WAIT_XTP_CKPT_CLOSE` wait times. Since the checkpoint writes data to the storage
    subsystem, the performance of your storage will probably also impact `WAIT_XTP_CKPT_CLOSE`
    wait times.


    ### `WAIT_XTP_CKPT_CLOSE` Summary


    The `WAIT_XTP_CKPT_CLOSE` wait type seems closely related to performing checkpoint
    operations. It indicates the time a checkpoint performed against a memory-optimized
    table took to complete. I don’t believe this directly indicates performance issues,
    since it just records the time it took for the checkpoint to complete.


    The amount of work a checkpoint has to process will probably result in higher
    `WAIT_XTP_CKPT_CLOSE` wait times. Storage subsystem performance will probably
    also impact `WAIT_XTP_CKPT_CLOSE` wait times.


    ## `WAIT_XTP_OFFLINE_CKPT_NEW_LOG`


    The final In-Memory OLTP related wait type that I want to discuss in this chapter
    is the `WAIT_XTP_OFFLINE_CKPT_NEW_LOG` wait type. This is another wait type related
    to the offline checkpoint process that was introduced in SQL Server 2014.'
