    We will expand upon this flowchart in Chapter [4](#340881_2_En_4_Chapter.xhtml),
    “Building a Solid Baseline,” where we will introduce baselines to the wait statistics
    analysis method.


    ## Viewing Wait Statistics Using Perfmon


    One of the most important tools for accessing the extra metrics we need when analyzing
    wait statistics is the Windows Performance Monitor, or Perfmon. Perfmon is available
    on every Windows Operating System and contains counters for just about every part
    of the system, including SQL Server–related performance counters. You can start
    Perfmon by executing the **perfmon** command from either a Windows Run dialog
    or the command line.


    In addition to giving us information about the performance of our system, Perfmon
    can also be used to view wait statistics. You can view these counters under the
    `SQLServer:Wait Statistics` category when adding counters inside the Perfmon application,
    as shown in Figure [2-15](#340881_2_En_2_Chapter.xhtml#Fig15).


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig15_HTML.jpg](images/340881_2_En_2_Chapter/340881_2_En_2_Fig15_HTML.jpg)


    Figure 2-15


    Wait statistics counters inside Perfmon


    One thing you’ll notice in Figure [2-15](#340881_2_En_2_Chapter.xhtml#Fig15) is
    that the wait statistics inside Perfmon are grouped inside categories. We won’t
    find information about specific wait types here, so if we want to use Perfmon
    to analyze wait statistics we should have a general idea of what category a specific
    wait type belongs to in Perfmon. It is able to display an average wait time, cumulative
    wait time, the current total number of waits, and the amount of new waits started
    for every wait statistics category. If we are interested in a higher-level view—for
    instance, we want to know how many tasks are waiting for lock-related wait types—we
    can use Perfmon to give us that information. If we want to have more detail about
    specific wait type information, we should use the `sys.dm_os_wait_stats` or `sys.dm_os_waiting_tasks`
    DMVs we discussed earlier.


    One nice feature of Perfmon is that it can convert the measurements directly into
    graphs, giving us a more visual way to look at the information without having
    to create the graphs ourselves. Figure [2-16](#340881_2_En_2_Chapter.xhtml#Fig16)
    is an example of a graph where we are showing the “Average wait time” and “Waits
    started per second” for the Lock waits category.


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig16_HTML.jpg](images/340881_2_En_2_Chapter/340881_2_En_2_Fig16_HTML.jpg)


    Figure 2-16


    Perfmon graph showing wait statistics information


    During this book we will use Perfmon a lot for analyzing metrics related to specific
    wait types, like CPU time, disk latency, and memory usage. We will not make much
    use of the wait statistics counters inside Perfmon, because I believe the SQL
    Server DMVs are better suited for this since they supply the level of detail needed
    for a complete analysis.'
  trans: "\n# 使用 DMV 和 Perfmon 分析等待统计信息\n\n## 查询会话信息并解决阻塞程序\n\n如果我们想获取有关此会话的更多信息，可以使用第\
    \ 1 章“等待统计信息内部原理”中讨论过的 `sys.dm_exec_sessions` DMV，执行以下查询：\n\n```sql\nSELECT\n\
    \    session_id,\n    [status],\n    [host_name],\n    [program_name],\n    login_name,\n\
    \    is_user_process,\n    open_transaction_count\nFROM sys.dm_exec_sessions\n\
    WHERE session_id = 54;\n```\n\n此查询返回的结果如图 2-13 所示。\n\n![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig13_HTML.jpg](img/340881_2_En_2_Fig13_HTML.jpg)\n\
    \n*图 2-13. sys.dm_exec_sessions 的结果*\n\n我们可以假定该会话 ID 目前没有任何正在运行的请求，因为它的状态是“sleeping”，这就是为什么对\
    \ `sys.dm_exec_requests` 的查询没有返回任何信息。如果我们查看 `program_name` 列，可以看到此会话是由 EVDL-SQL2017-01\\\
    Administrator 用户通过 Microsoft SQL Server Management Studio 程序发起的。\n\n我包含 `is_user_process`\
    \ 列是为了确认它是一个用户会话，而 `open_transaction_count` 列显示此用户会话有一个未关闭的事务。\n\n我们现在掌握了足够的信息来采取纠正措施。我们知道是谁阻塞了其他任务，我们可以决定打电话询问他正在执行的操作，或者选择结束他的会话。使用\
    \ `KILL [session_id]` 命令结束用户会话应该是最后的手段，因为我们可能正在中断重要的操作。使用 `KILL` 命令结束会话将导致正在运行的事务回滚，撤销其执行的所有更改，这可能需要很长时间才能完成。在这种情况下，我接受回滚的风险，并将自己结束该会话：\n\
    \n```sql\nKILL 54;\n```\n\n在我们杀死会话 ID 54 之后，用户立即报告他们的查询再次开始运行。如果我们查询 `sys.dm_os_waiting_tasks`\
    \ DMV 以获取有关这些会话 ID 的信息，则不会返回任何内容，这意味着它们不再被阻塞。\n\n希望这个示例让您了解了如何使用 SQL Server 中提供的各种\
    \ DMV 来收集当前正在等待的任务的信息。在这个例子中，示例包含一个阻塞其他查询的事务，我们决定杀死导致阻塞锁的用户会话。在许多情况下，解决方案并不这么简单，但收集等待统计信息以深入调查问题根源的方法几乎适用于每个与性能相关的事件。\n\
    \n正如我在本节开头指出的，仅查看等待统计信息在大多数情况下并不能解决性能问题，但它是开始调查的良好起点。为了全面了解系统的性能，我们通常会将等待统计信息与其他指标结合起来，例如来自\
    \ Windows 性能监视器、其他 DMV 或特定于供应商的信息（如存储指标）。\n\n图 2-14 展示了一个流程图，说明如何使用等待统计信息来分析性能问题。\n\
    \n![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig14_HTML.jpg](img/340881_2_En_2_Fig14_HTML.jpg)\n\
    \n*图 2-14. 等待统计信息流程图*\n\n我们将在第 4 章“建立可靠的基线”中扩展这个流程图，在那里我们将为等待统计信息分析方法引入基线。\n\n\
    ## 使用 Perfmon 查看等待统计信息\n\n分析等待统计信息时，访问我们所需额外指标的最重要工具之一是 Windows 性能监视器，即 Perfmon。Perfmon\
    \ 在每个 Windows 操作系统上都可用，并且包含系统几乎所有部分的计数器，包括与 SQL Server 相关的性能计数器。您可以通过在 Windows\
    \ 运行对话框或命令行中执行 `perfmon` 命令来启动 Perfmon。\n\n除了提供有关系统性能的信息外，Perfmon 还可用于查看等待统计信息。在\
    \ Perfmon 应用程序中添加计数器时，可以在 `SQLServer:Wait Statistics` 类别下查看这些计数器，如图 2-15 所示。\n\
    \n![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig15_HTML.jpg](img/340881_2_En_2_Fig15_HTML.jpg)\n\
    \n*图 2-15. Perfmon 中的等待统计信息计数器*\n\n在图 2-15 中你会注意到一件事，即 Perfmon 中的等待统计信息是按类别分组的。我们在这里找不到关于特定等待类型的信息，因此如果我们想使用\
    \ Perfmon 分析等待统计信息，应该大致了解特定等待类型在 Perfmon 中属于哪个类别。它能够显示每个等待统计信息类别的平均等待时间、累计等待时间、当前总等待次数以及新开始的等待次数。如果我们需要一个更高层次的视图——例如，我们想知道有多少任务正在等待与锁相关的等待类型——我们可以使用\
    \ Perfmon 来获取该信息。如果我们想要获得关于特定等待类型的更多详细信息，则应该使用我们之前讨论过的 `sys.dm_os_wait_stats`\
    \ 或 `sys.dm_os_waiting_tasks` DMV。\n\nPerfmon 的一个很好的特性是它可以直接将测量值转换为图表，为我们提供一种更直观的方式来查看信息，而无需自己创建图表。图\
    \ 2-16 是一个图表示例，其中显示了 Lock waits 类别的“平均等待时间”和“每秒开始的等待次数”。\n\n![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig16_HTML.jpg](img/340881_2_En_2_Fig16_HTML.jpg)\n\
    \n*图 2-16. 显示等待统计信息的 Perfmon 图表*\n\n在本书中，我们将大量使用 Perfmon 来分析与特定等待类型相关的指标，如 CPU\
    \ 时间、磁盘延迟和内存使用情况。我们不会过多使用 Perfmon 中的等待统计信息计数器，因为我相信 SQL Server DMV 更适合此任务，因为它们提供了完整分析所需的详细程度。\n"
- fmt: '## Capturing Wait Statistics Using Extended Events


    Most of the wait statistics information in SQL Server is recorded cumulatively,
    and because so many internal processes also generate wait statistics it can be
    difficult to detect what impact a single query has on them. This is where Extended
    Events come in; with Extended Events it is possible to capture the exact wait
    times a query encountered and on what wait types it had to wait. This information
    can help us analyze those queries that have a large impact on our system and possibly
    optimize them so their impact becomes smaller. Or we could capture queries that
    encounter a specific wait type while executing.


    Extended Events were introduced in SQL Server 2008 and are, more or less, a replacement
    for the SQL Server Profiler. Microsoft has announced the deprecation of the SQL
    Server Profiler and advises us to move to Extended Events. Extended Events are
    much more powerful than the SQL Server Profiler, and the number of events we can
    capture with Extended Events keeps growing with every release of SQL Server, while
    the number of events in the SQL Server Profiler remains the same. Also performance
    is a good reason to use Extended Events. Capturing Extended Events is more lightweight
    than using the SQL Server Profiler.


    Extended Events have a reputation of being difficult to work with, and, while
    this was especially true in SQL Server 2008 when they were first introduced, working
    with Extended Events became a lot easier in SQL Server 2012 when it became possible
    to create Extended Event sessions using the GUI.


    There are many different wait-related events available when working with Extended
    Events. We can view these events by running a query against the `sys.dm_xe_map_values`
    DMV, which holds all the different Extended Events event types:


    ```sql

    SELECT *

    FROM sys.dm_xe_map_values

    WHERE name = ''wait_types'';

    ```


    Figure 2-17 shows a small part of the results of this query.


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig17_HTML.png](images/340881_2_En_2_Chapter/340881_2_En_2_Fig17_HTML.png)

    **Figure 2-17** Results of `sys.dm_xe_map_values`


    In total there are about 1260 different wait statistics–related events available
    in SQL Server 2019 CTP2.4. These events do not map one-on-one against the different
    wait types, and, as a matter of fact, in some cases the names of the wait types
    do not match those of the events, even though they have the same meaning. An example
    of this is the `ASYNC_NETWORK_IO` wait type, which is named `NETWORK_IO` by Extended
    Events. Jonathan Kehayias wrote a blog post at [`SQLskills.com`](http://sqlskills.com)
    mapping some of the wait types to Extended Events; you can take a look at it here:
    [`www.sqlskills.com/blogs/jonathan/mapping-wait-types-in-dm_os_wait_stats-to-extended-events/`](http://www.sqlskills.com/blogs/jonathan/mapping-wait-types-in-dm_os_wait_stats-to-extended-events/).


    While we won’t go into details about Extended Events in this book, I would like
    to show you how you can use them to capture wait statistics–related information
    using the Extended Events GUI and T-SQL.


    ### Capture Wait Statistics Information for a Specific Query


    Let’s take a look at how we can configure an Extended Event session to capture
    wait statistics information for a specific query. We will set a filter on a session
    ID that will execute the query, then execute the query we want to analyze.


    The first thing we are going to do is open up the SQL Server Management Studio
    and connect to a SQL Server instance. Keep in mind that a GUI for Extended Events
    was added in SQL Server 2012, so if you plan on following the steps here you will
    need a SQL Server 2012 or higher SQL Server instance.


    Once we are connected, we open the Management folder and then choose the Extended
    Events option. We right-click the Sessions folder and select the option New Session,
    as shown in Figure 2-18.


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig18_HTML.jpg](images/340881_2_En_2_Chapter/340881_2_En_2_Fig18_HTML.jpg)

    **Figure 2-18** Adding new Extended Event session


    The New Session dialog will appear where we can enter a name for this Extended
    Event session and set some additional options. We will ignore those options for
    now, and just fill in the name of the Extended Event session, as shown in Figure
    2-19.


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig19_HTML.jpg](images/340881_2_En_2_Chapter/340881_2_En_2_Fig19_HTML.jpg)

    **Figure 2-19** Configuring wait statistics Extended Event session


    The next step is configuring which events this Extended Event session needs to
    monitor, which we can do by selecting the Events page in the New Session dialog.


    Since we are interested in wait statistics information, I searched for the `wait_info`
    event in the Events Library and added it to the Selected Events box, as shown
    in Figure 2-20.


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig20_HTML.jpg](images/340881_2_En_2_Chapter/340881_2_En_2_Fig20_HTML.jpg)

    **Figure 2-20** Selecting an event to monitor


    If we were to save this Extended Event session now, we would capture information
    for every task that has to wait for a resource. Since we are interested in the
    wait statistics associated with a specific query, we will configure a filter to
    only return wait statistics information for a specific session. To do this we
    can click the Configure button in the New Session dialog, which will open a new
    section where we can select Global Fields, which will record extra information
    when a `wait_info` event is triggered. In this case, I checked the `sql_text`
    global field, as shown in Figure 2-21, so we can view the actual query when an
    event is captured.


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig21_HTML.jpg](images/340881_2_En_2_Chapter/340881_2_En_2_Fig21_HTML.jpg)

    **Figure 2-21** Setting the `sql_text` global field


    Next up is the Filter (Predicate) tab. Here we will set a filter that will only
    capture events from a specific session ID. We can do this by clicking inside the
    Field box and selecting the `sqlserver.session_id` field, then setting the Value
    to the session ID we want to monitor. In this case I configured the filter to
    only capture events for session ID 52, as shown in Figure 2-22.


    ![../images/340881_2_En_2_Chapter/340881_2_En_2_Fig22_HTML.jpg](images/340881_2_En_2_Chapter/340881_2_En_2_Fig22_HTML.jpg)

    **Figure 2-22** Setting an event filter


    That’s all we need to configure for now, so we can click OK to close this dialog
    and save the Extended Event session.


    By default the Extended Event session will not be automatically started after
    it is created. To do this we have to open up the Sessions folder again by navigating
    to the Management ➤ Extended Events folder in SQL Server Management Studio. We
    right-click the Extended Event session we just created and select the Start Session
    option, as shown in Figure 2-23.'
