- fmt: '## Isolation


    Concurrent access to memory-optimized tables is handled through snapshot-based
    transaction isolation. This isolation level shares many characteristics with the
    snapshot isolation we can use on disk-based tables, but there are some differences
    so as to optimize throughput. First of all, the snapshot-based transaction isolation
    uses row versions when concurrent transactions want to access the same row. Instead
    of storing the row versions in the TempDB database like regular snapshot isolation,
    the row versions for memory-optimized tables are stored in-line in the data files
    itself.


    Another difference is that snapshot-based transaction isolation uses an optimistic
    concurrency control. This means that SQL Server assumes no transaction conflict
    will occur when concurrent transactions access the same data. Because of this
    assumption there is no need for locks or latches to protect the memory-optimized
    table data. There is a form of conflict detection active, however, and when it
    detects that a conflict has occurred, it will end one of the transactions, and
    that transaction will need to be retried.


    Not having to place and maintain locks and latches is another major contribution
    to the performance of In-Memory OLTP.


    ## Transaction Log Changes


    The final differences I want to discuss in this section are the modifications
    to the behavior of the transaction log regarding memory-optimized tables. For
    traditional tables, a log record will be generated when a transaction starts whether
    it gets committed or not. For memory-optimized tables, the log record will only
    be generated when the transaction begins the commit processing. This means no
    information for transactions that are rolled back is recorded. This minimizes
    interaction with the transaction log on disk, thus improving performance.


    Another modification is that changes to indexes on memory-optimized tables are
    not logged in the transaction log. Since indexes that are created on memory-optimized
    tables are also maintained entirely in-memory, there is no need to record changes.
    Indexes on memory-optimized tables are regenerated on the start of the SQL Server
    Service.


    The final difference I want to mention is the grouping of multiple transactions
    into one log record. For traditional tables every transaction will result in at
    least one log record. Transactions against memory-optimized tables are grouped
    together and then written as one log record (with a current maximum size of 24
    KB). For instance, if you have 200 inserts against a traditional table, at least
    200 log records would be generated. If we could fit 100 inserts into one log record
    for the memory-optimized table, we would only have two log records instead of
    at least 200. Again, this improves throughput for memory-optimized tables.


    Now that we have taken a (simplified and short) look at some of the inner workings
    of memory-optimized tables, let’s move on to some of the wait types that are related
    to In-Memory OLTP. Most of the three wait types that we will discuss in this chapter
    are related, one way or another, to the new offline checkpoint process introduced
    with In-Memory OLTP.


    ## WAIT_XTP_HOST_WAIT


    The first wait type we will discuss in this chapter is `WAIT_XTP_HOST_WAIT`. This
    wait type shares some characteristics with the `CHECKPOINT_QUEUE` wait type we
    discussed in Chapter [12](#340881_2_En_12_Chapter.xhtml), “Background and Miscellaneous
    Wait Types,” in that it seems to be running continuously but only writes its wait
    information to `sys.dm_os_wait_stats` at specific conditions.


    ### What Is the WAIT_XTP_HOST_WAIT Wait Type?


    If we look up some information about the `WAIT_XTP_HOST_WAIT` wait type on Books
    Online, we get a not-so-helpful definition: “Occurs when waits are triggered by
    the database engine and implemented by the host.” This doesn’t give us a lot of
    clues about the processes that might be related to the `WAIT_XTP_HOST_WAIT` wait
    type, which means we have to do a little bit of digging ourselves.


    Before we can start investigating the `WAIT_XTP_HOST_WAIT` wait type, we need
    to create a memory-optimized table. I used the script shown in Listing [13-1](#340881_2_En_13_Chapter.xhtml#PC1)
    to create a new database with a single memory-optimized table. There are some
    path references in this script that you will need to change to make sure the database
    data and log files are created in the right location.


    ```sql

    -- Create database

    -- Make sure to change the file locations if needed

    USE [master]

    GO

    CREATE DATABASE [OLTP_Test] CONTAINMENT = NONE

    ON PRIMARY

    (

    NAME = N''OLTP_Test'', FILENAME = N''E:\Data\OLTP_Test_Data.mdf'' , SIZE = 51200KB
    , FILEGROWTH = 10%

    )

    LOG ON

    (

    NAME = N''OLTP_Test_log'', FILENAME = N''E:\Log\OLTP_Test_Log.ldf'' , SIZE = 10240KB
    , FILEGROWTH = 10%

    );

    GO

    -- Add the Memory-Optimized Filegroup

    ALTER DATABASE OLTP_Test ADD FILEGROUP OLTP_MO CONTAINS MEMORY_OPTIMIZED_DATA;

    GO

    -- Add a file to the newly created Filegroup.

    -- Change drive/folder location if needed.

    ALTER DATABASE OLTP_Test ADD FILE (name=''OLTP_mo_01'', filename=''E:\data\OLTP_Test_mo_01.ndf'')
    TO FILEGROUP OLTP_MO;

    GO

    -- Create our test table

    USE [OLTP_Test]

    GO

    CREATE TABLE OLTP

    (

    ID INT IDENTITY (1,1) PRIMARY KEY NONCLUSTERED,

    RandomData1 VARCHAR(50),

    RandomData2 VARCHAR(50),

    ID2 UNIQUEIDENTIFIER

    )

    WITH (MEMORY_OPTIMIZED=ON);

    GO

    Listing 13-1

    Create test database and memory-optimized table

    ```


    Now that we have a memory-optimized table we can use for testing, let’s take a
    look at the `WAIT_XTP_HOST_WAIT` wait type in the `sys.dm_os_wait_stats` and `sys.dm_os_waiting_tasks`
    DMV using the following query:


    ```sql

    SELECT *

    FROM sys.dm_os_waiting_tasks

    WHERE wait_type = ''WAIT_XTP_HOST_WAIT'';

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''WAIT_XTP_HOST_WAIT'';

    ```


    The results of this query on my test SQL Server instance can be seen in Figure
    [13-4](#340881_2_En_13_Chapter.xhtml#Fig4).


    ![../images/340881_2_En_13_Chapter/340881_2_En_13_Fig4_HTML.jpg](images/340881_2_En_13_Chapter/340881_2_En_13_Fig4_HTML.jpg)


    Figure 13-4


    WAIT_XTP_HOST_WAIT waits


    The first thing you’ll notice is that the `WAIT_XTP_HOST_WAIT` wait type is constantly
    showing up in the `sys.dm_os_waiting_tasks` DMV, and over time the wait time increases.
    Also, the `session_id` that is related to the `WAIT_XTP_HOST_WAIT` wait type indicates
    it is an internal SQL Server thread that is recording the wait. From this information
    we can already formulate some conclusions about the `WAIT_XTP_HOST_WAIT` wait
    type: it is related to an internal background process that continuously runs.
    What’s also interesting is that if you were to run the query a second time, the
    wait time in the `sys.dm_os_waiting_tasks` DMV increases but the wait time in
    the `sys.dm_os_wait_stats` remains the same. So far we have run into one other
    wait type that shared this characteristic, the `CHECKPOINT_QUEUE` wait time, which
    we discussed in Chapter [12](#340881_2_En_12_Chapter.xhtml), “Background and Miscellaneous
    Wait Types.”


    Since the `CHECKPOINT_QUEUE` wait type has interesting behavior in that it only
    writes the accumulated wait time of the `sys.dm_os_waiting_tasks` DMV to the `sys.dm_os_wait_stats`
    DMV when an automatic checkpoint occurs, I decide to simply run a checkpoint command
    against the `OLTP_Test` database I created using Listing [13-1](#340881_2_En_13_Chapter.xhtml#PC1),
    and then query both the DMVs again. The impact on the wait times of the `WAIT_XTP_HOST_WAIT`
    wait type can be seen in Figure [13-5](#340881_2_En_13_Chapter.xhtml#Fig5).'
