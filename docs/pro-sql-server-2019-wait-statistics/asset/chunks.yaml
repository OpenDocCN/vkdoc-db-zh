- fmt: "## B-tree结构与闩锁等待\n\n显然，与索引关联的B树结构发生了某些变化。由于我们在创建的表上只有一个非聚集索引（`idx_ID`），我们可以假设是该索引的B树发生了某些变化。让我们通过查看图9-20来稍微刷新一下对B树索引结构的记忆。\n\
    \n![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig20_HTML.jpg](images/340881_2_En_9_Chapter/340881_2_En_9_Fig20_HTML.jpg)\n\
    \n图9-20 B树索引结构\n\n我们在图9-20中看到的B树结构非常浅，因为它只有三层。第一层是根节点（第0级），第二层是中间层（第1级），最后在B树底部是保存实际索引键的数据页（对于聚集索引，则是整行数据）。在图9-20中，我们只有一级中间节点，但根据索引内数据页的数量，可能存在更多中间层。当表非常小时，数据页可能直接位于中间层，而不是B树的更下层。\n\
    \n每当SQL Server需要遍历B树时，它都会从根节点的根页开始。根页将帮助它向下导航到中间层中保存所需信息的索引页。反过来，如果所需的信息不在中间层而在叶级，中间页可以将请求进一步向下发送到B树。叶级是索引中的最后一级；它无法再向下导航。图9-21展示了SQL\
    \ Server如何遍历B树。在此例中，我使用了数字作为索引键以便更容易理解。\n\n![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig21_HTML.jpg](images/340881_2_En_9_Chapter/340881_2_En_9_Fig21_HTML.jpg)\n\
    \n图9-21 B树导航\n\n当向索引添加数据时，索引会在叶级分配新的数据页来保存索引键（记住，聚集索引在叶级保存行）。当插入足够多的数据以至于需要创建一个新的索引级别时，会发生根页拆分，以便可以访问索引中的新级别。这种根页拆分并不是将你的根页一分为二；始终只有一个根页，但它需要被更新，以便我们可以用它遍历B树找到新数据。\n\
    \n`ACCESS_METHODS_HOBT_VIRTUAL_ROOT`闩锁类是与在B树中创建另一个级别时发生的根页拆分相关联的闩锁等待类。每当发生根页拆分，B树将获取一个排他（Exclusive）闩锁。所有希望向下遍历B树的线程都必须等待根页拆分完成，因为它们使用的是与排他闩锁不兼容的共享（Shared）闩锁。但是，为什么在我们的Ostress工作负载运行时看到的是`LATCH_SH`等待，而不是排他闩锁，因为我们执行的是插入操作呢？原因很简单：在SQL\
    \ Server知道将新的索引键放置在索引中的哪个位置之前，它必须首先遍历B树以定位新索引键需要放置的位置，并且它在导航期间使用的是共享闩锁。\n\n为了向你展示在我们的Ostress工作负载期间非聚集索引中添加了另一个级别，我将使用`INDEXPROPERTY`函数来检索我们创建的非聚集索引的深度。\n\
    \n首先要做的是使用`TRUNCATE`命令清空我们的`Insert_Test2`表：\n\n```sql\nTRUNCATE TABLE Insert_Test2;\n\
    ```\n\n如果我们对表上的非聚集索引使用`INDEXPROPERTY`函数，我们可以查看B树的当前深度。接下来的查询展示了如何使用`INDEXPROPERTY`函数来检索此信息：\n\
    \n```sql\nSELECT INDEXPROPERTY(OBJECT_ID('Insert_Test2'), 'idx_ID', 'indexDepth')\n\
    ```\n\n由于我们刚刚截断了表，索引深度应为0，因为表内还没有行。\n\n然后我再次运行Ostress工作负载，完成后我再次查看索引信息。这次没有使用`INDEXPROPERTY`函数，而是使用`sys.dm_db_index_physical_stats`\
    \ DMF来返回有关索引中索引页和数据页数量的一些额外信息。此查询返回此类信息：\n\n```sql\nSELECT\n    index_id,\n  \
    \  index_type_desc,\n    index_depth,\n    index_level,\n    page_count,\n   \
    \ record_count\nFROM sys.dm_db_index_physical_stats\n    (DB_ID(N'AdventureWorks'),\
    \ OBJECT_ID(N'Insert_Test2'), NULL, NULL , 'DETAILED');\n```\n\n图9-22显示了在我的测试SQL\
    \ Server实例上执行此查询的结果。\n\n![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig22_HTML.jpg](images/340881_2_En_9_Chapter/340881_2_En_9_Fig22_HTML.jpg)\n\
    \n图9-22 sys.dm_db_index_physical_stats结果\n\n如图中所示，非聚集索引现在有三个级别，由`index_depth`列指示。`index_level`和`page_count`列显示了B树每一级存在多少页。最高的`index_level`编号是根级，最低的是叶级。\n\
    \n虽然新的级别是在B树中创建的，但并发的插入查询在遍历B树之前必须等待，从而导致了`LATCH_SH`等待。\n\n## 降低LATCH_[xx]等待\n\
    \n在前面的例子中，我介绍了一种特定的闩锁争用情况，它发生在索引根页拆分以扩展B树结构时。正如我之前提到的，`LATCH_[xx]`等待类型报告了许多许多其他的闩锁类。这使得描述“一刀切”的建议变得不可能。不过，我可以描述一种通用的方法，使用这里的列表：\n\
    \n*   如果发生`LATCH_[xx]`等待，请查询`sys.dm_os_waiting_tasks`。`resource_description`列可以向你显示有关特定闩锁类的附加信息。如果你遇到`LATCH_[xx]`等待未显示在`sys.dm_os_waiting_tasks`中，但在`sys.dm_os_wait_stats`\
    \ DMV中可见高等待时间的情况，那么`sys.dm_os_latch_waits` DMV应该是你的起点。\n\n    另一个有用的DMV可能是`sys.dm_exec_requests`\
    \ DMV。与`sys.dm_exec_sql_text` DMF结合使用，它可能帮助你找到导致`LATCH_[xx]`等待的查询。\n\n*   查询`sys.dm_os_latch_waits`，查看是否与`sys.dm_os_waiting_tasks`\
    \ DMV的`resource_description`列中显示的闩锁类相关。\n\n*   查阅联机丛书或本书的附录III，以获取有关特定闩锁类的更多信息。\n\
    \n关于常见闩锁类的另一个有用资源是Paul Randal的博客文章“最常见的闩锁类及其含义”，网址是[`www.sqlskills.com/blogs/paul/most-common-latch-classes-and-what-they-mean/`](http://www.sqlskills.com/blogs/paul/most-common-latch-classes-and-what-they-mean/)。尽管Paul只描述了十种最常见的闩锁类，但它可以作为你调查的良好起点。\n\
    \n值得庆幸的是，`LATCH_[xx]`等待类型出现持续高等待时间的情况并不常见，因为导致`LATCH_[xx]`等待发生的情况通常与非常特定的工作负载和数据库设计相关。"
  raw: "Apparently, something happened to the B-tree structures associated with indexes.\
    \ Since we only have one non-clustered index on the table we created (`idx_ID`),\
    \ we can assume something happened to the B-tree of that index. Let’s refresh\
    \ our memory a little bit about what a B-tree index structure looks like by looking\
    \ at Figure [9-20](#340881_2_En_9_Chapter.xhtml#Fig20).\n\n![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig20_HTML.jpg](images/340881_2_En_9_Chapter/340881_2_En_9_Fig20_HTML.jpg)\n\
    \nFigure 9-20\n\nB-tree index structure\n\nThe B-tree structure we see in Figure\
    \ [9-20](#340881_2_En_9_Chapter.xhtml#Fig20) is pretty shallow, as it only has\
    \ three levels. The first one is the Root Node (level 0), the second is the Intermediate\
    \ level (level 1), and finally at the bottom of the B-tree are the data pages\
    \ that hold the actual index keys (or in case of a clustered index, the entire\
    \ row). In Figure [9-20](#340881_2_En_9_Chapter.xhtml#Fig20) we only have one\
    \ level of intermediate nodes, but depending on the number of data pages inside\
    \ the index it is possible to have more Intermediate levels. When the table is\
    \ very small it is possible to have the data pages inside the Intermediate level\
    \ instead of a level further down the B-tree.\n\nWhenever SQL Server needs to\
    \ navigate through the B-tree it will start at the Root page inside the Root Node.\
    \ The Root page will help it navigate down to the index page that holds the information\
    \ it needs inside the Intermediate level. In turn, the Intermediate page can send\
    \ the request further down the B-tree if the page is not inside the Intermediate\
    \ level, but is rather at the Leaf level. The Leaf level is the last level in\
    \ an index; it cannot navigate further down than that. Figure [9-21](#340881_2_En_9_Chapter.xhtml#Fig21)\
    \ shows how SQL Server navigates through the B-tree. In this case I used numbers\
    \ as the index key to make it a bit easier.\n\n![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig21_HTML.jpg](images/340881_2_En_9_Chapter/340881_2_En_9_Fig21_HTML.jpg)\n\
    \nFigure 9-21\n\nB-tree navigation\n\nWhen data is added to the index, the index\
    \ will allocate new data pages at the Leaf level to hold the index keys (remember,\
    \ clustered indexes hold rows at the Leaf level). Whenever enough data is inserted\
    \ that a new index level needs to be created, a Root page split occurs so the\
    \ new level inside the index can be accessed. This Root page split doesn’t cut\
    \ your Root page into two new ones, there is always one Root page, but it needs\
    \ to be updated so we can use it to navigate through the B-tree to the new data.\n\
    \nThe `ACCESS_METHODS_HOBT_VIRTUAL_ROOT` latch class is the latch wait class that\
    \ is associated whenever a Root page split occurs in order to create another level\
    \ inside the B-tree. Whenever a Root page split occurs, the B-tree will acquire\
    \ an Exclusive latch. All threads that want to navigate down the B-tree will have\
    \ to wait for the Root page split to finish since they use Shared latches that\
    \ are incompatible with the Exclusive latch. But why are we seeing `LATCH_SH`\
    \ waits occurring when running our Ostress workload, instead of seeing Exclusive\
    \ latches, since we are performing inserts? The reason for that is pretty simple:\
    \ before SQL Server knows where to place the new index key inside the index, it\
    \ first has to navigate through the B-tree to locate where the new index key needs\
    \ to be placed, and it uses Shared latches during its navigation.\n\nTo show you\
    \ that another level was added to the non-clustered index during our Ostress workload,\
    \ I am going to use the `INDEXPROPERTY` function to retrieve the depth of the\
    \ non-clustered index we created.\n\nThe first thing I am going to do is empty\
    \ our `Insert_Test2` table using the `TRUNCATE` command :\n\n```\nTRUNCATE TABLE\
    \ Insert_Test2;\n```\n\nIf we use the `INDEXPROPERTY` function against the non-clustered\
    \ index on this table, we can view the current depth of the B-tree. The query\
    \ that follows shows how to use the `INDEXPROPERTY` function to retrieve this\
    \ information:\n\n```\nSELECT INDEXPROPERTY(OBJECT_ID('Insert_Test2'), 'idx_ID',\
    \ 'indexDepth')\n```\n\nSince we just truncated the table, the index depth should\
    \ be 0 as there are no rows inside the table yet.\n\nI then run the Ostress workload\
    \ again, and after it has finished I look at the index information again. Instead\
    \ of using the `INDEXPROPERTY` function, I use the `sys.dm_db_index_physical_stats`\
    \ DMF to return some additional information about the number of index and data\
    \ pages inside the index. This query returns such information:\n\n```\nSELECT\n\
    index_id,\nindex_type_desc,\nindex_depth,\nindex_level,\npage_count,\nrecord_count\n\
    FROM sys.dm_db_index_physical_stats\n(DB_ID(N'AdventureWorks'), OBJECT_ID(N'Insert_Test2'),\
    \ NULL, NULL , 'DETAILED');\n```\n\nFigure [9-22](#340881_2_En_9_Chapter.xhtml#Fig22)\
    \ shows the results of this query on my test SQL Server instance.\n\n![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig22_HTML.jpg](images/340881_2_En_9_Chapter/340881_2_En_9_Fig22_HTML.jpg)\n\
    \nFigure 9-22\n\nsys.dm_db_index_physical_stats results\n\nAs you can see in this\
    \ image, the non-clustered index now has three levels as indicated by the `index_depth`\
    \ column. The `index_level` and `page_count` columns show how many pages exist\
    \ on each level of the B-tree. The highest `index_level` number is the Root level,\
    \ the lowest the Leaf level.\n\nWhile the new levels were created inside the B-tree,\
    \ the concurrent insert queries had to wait before they could navigate the B-tree,\
    \ resulting in the `LATCH_SH` waits.\n\n### Lowering LATCH_[xx] Waits\n\nIn the\
    \ previous example I presented a specific case of latch contention that occurs\
    \ when index Root page splits occur so as to extend the B-tree structure. As I\
    \ mentioned before, there are many, many more latch classes that are reported\
    \ by the `LATCH_[xx]` wait type. This makes describing “one-size-fits-all” suggestions\
    \ impossible. I can describe a general approach though, using the list here:\n\
    \n*   Query `sys.dm_os_waiting_tasks` if `LATCH_[xx]` waits are occurring. The\
    \ `resource_description` column can show you additional information about the\
    \ specific latch class. If you are in a situation where the `LATCH_[xx]` waits\
    \ do not show in `sys.dm_os_waiting_tasks` but high wait times are visible in\
    \ `sys.dm_os_wait_stats` DMV, the `sys.dm_os_latch_waits` DMV should be your starting\
    \ point.\n\n    Another helpful DMV can be the `sys.dm_exec_requests` DMV. Joined\
    \ together with the `sys.dm_exec_sql_text` DMF, it may help you to find the query\
    \ that is causing the `LATCH_[xx]` wait.\n\n*   Query `sys.dm_os_latch_waits`\
    \ to see if this correlates with the latch class shown in the `resource_description`\
    \ column of the `sys.dm_os_waiting_tasks` DMV.\n\n*   Check Books Online or Appendix\
    \ III in this book for more information about the specific latch class.\n\nAnother\
    \ good resource for more information about common latch classes is Paul Randal’s\
    \ blog post “Most common latch classes and what they mean” at [`www.sqlskills.com/blogs/paul/most-common-latch-classes-and-what-they-mean/`](http://www.sqlskills.com/blogs/paul/most-common-latch-classes-and-what-they-mean/)\
    \ . Though Paul only describes the ten most common latch classes, it can be a\
    \ good starting point for your investigation.\n\nThankfully, it is not very common\
    \ to see consistent high wait times for the `LATCH_[xx]` wait type since the cases\
    \ that can cause the `LATCH_[xx]` waits to occur are frequently related to very\
    \ specific workloads and database design."
