  trans: '

    # 1. 等待统计详解


    SQL Server 等待统计是一个重要工具，可用于分析与性能相关的问题或优化 SQL Server 的性能。然而，许多数据库管理员或开发人员对其并不十分了解。我认为这与其相对复杂的性质、不同类型的等待统计数量庞大以及许多类型缺乏文档说明有关。等待统计还与你分析它们所用的
    SQL Server 直接相关，这意味着即使服务器 A 和服务器 B 拥有完全相同的硬件和数据库配置，也无法比较它们的等待统计。每一个配置选项，从硬件固件级别到客户端计算机上
    SQL Server 本机客户端的配置，都会对等待统计产生影响！


    基于上述原因，我坚信我们应该从 SQL Server 等待统计的基础和内部原理开始，以便你能熟悉它们是如何生成的、如何访问它们以及如何利用它们进行性能故障排查。这种方法将为你学习本书第二部分（我们将深入研究特定的等待统计）做好准备。


    在本章中，我们将简要回顾等待统计在 SQL Server 各个版本中的历史。随后，我们将仔细研究 SQL 操作系统，即 `SQLOS`。`SQLOS` 的架构与等待统计以及一般的性能故障排查密切相关。本章的剩余部分将致力于讨论等待统计最重要的一个方面：线程调度。


    在开始介绍 SQL Server 等待统计的基础和内部原理之前，我想先说明几个与讨论等待统计时使用的术语相关的问题。在本书的引言和前文中，我只提到了等待统计这个术语。句子“比较服务器
    A 与服务器 B 的等待统计”实际上是不正确的，因为我们只能比较特定等待类型（与我们正在等待的资源相关的具体等待类型）的等待时间（我们在某个资源上等待的总时间）。从此时起，当我使用术语“等待统计”时，我指的是等待统计这一概念，并在适当时使用正确的术语“等待时间”和“等待类型”。


    ## 等待统计简史


    SQL Server 已经存在相当长的时间了；其第一个版本发布于 1989 年，面向 OS/2 平台。直到 1995 年发布的 SQL Server 6.0，微软一直与
    Sybase 合作开发 SQL Server。然而在 1995 年，微软和 Sybase 分道扬镳。微软和 Sybase 在数据库领域都保持活跃（SAP 实际上于
    2010 年收购了 Sybase），到 2019 年，微软发布了 SQL Server 2019，而 SAP 则在 2014 年发布了 SAP Sybase
    ASE 16（至今仍在维护），两者都是关系型企业级数据库系统。


    从 SQL Server 6.0 到 SQL Server 2019，发生了如此多的变化，以至于你根本无法比较这两个版本。然而，多年来有一件事未曾改变，那就是等待统计。SQL
    Server 会以某种方式存储其内部进程的信息，尽管我们访问这些信息的方式多年来已经改变，但等待统计仍然是内部日志记录过程的重要组成部分。


    在 SQL Server 的早期版本中，我们需要使用未公开文档的命令来访问等待统计。图 1-1 展示了在 SQL Server 6.5 中使用 `DBCC`
    命令查询等待统计信息的方法。


    ![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig1_HTML.jpg](img/340881_2_En_1_Fig1_HTML.jpg)


    图 1-1


    SQL Server 6.5 中的等待统计


    SQL Server 2005 引入的重大变更之一是将许多内部函数和命令转换为 `动态管理视图（DMV）`，其中包括等待统计信息。这使得查询和分析函数或命令返回的信息变得容易得多。随着
    Tom Davidson 的微软白皮书《SQL Server 2005 Waits and Queues》的发布，一种新的性能分析方法诞生了。


    在 SQL Server 的各个版本中，每当引入新功能或配置选项时，不同等待类型的数量都会呈指数级增长。如果你仔细观察图 1-1，你会注意到它返回了 21
    种不同的等待类型。图 1-2 显示了 SQL Server 2017 中可用的等待类型数量，即返回的行数。


    ![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig2_HTML.jpg](img/340881_2_En_1_Fig2_HTML.jpg)


    图 1-2


    SQL Server 2017 中的等待统计


    这 921 行都是不同的等待类型，保存了 SQL Server 引擎不同部分的等待信息。随着 SQL Server 2019 社区技术预览版（`CTP`）2.4
    的发布，等待类型的数量进一步增加，超过了 1000 种。随着新功能的引入或现有功能的改变，等待类型的数量在未来 SQL Server 版本中将继续增长。值得庆幸的是，现在关于等待统计的信息比
    SQL Server 6.5 时代要丰富得多！

    '
- fmt: '## The SQLOS


    计算机硬件世界在不断变化。每年，甚至在某些情况下是每个月，我们都设法在处理器中加入更多核心，提高主板的内存容量，或者引入全新的硬件概念，比如基于PCI的持久化闪存存储。数据库管理系统（DBMS）总是最先想要利用新硬件趋势的应用程序类型之一。由于硬件的快速变化特性以及需要一有新的硬件选项就加以利用，SQL
    Server 团队在 SQL Server 2005 中决定改变 SQL Server 的平台层。


    在 SQL Server 2005 之前，SQL Server 的平台层限制很多，许多操作都是由操作系统执行的。这意味着 SQL Server 很难跟上快速变化的服务器硬件世界，因为为了利用更快的硬件或新的硬件特性而更改整个操作系统是一项耗时且复杂的操作。


    图 1-3 展示了在 SQL Server 2005 引入 SQLOS 之前，SQL Server 的（简化）架构。


    ![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig3_HTML.jpg](images/340881_2_En_1_Chapter/340881_2_En_1_Fig3_HTML.jpg)


    图 1-3

    引入 SQLOS 之前的 SQL Server 架构


    SQL Server 2005 引入了迄今为止 SQL Server 引擎最大的变化之一：SQLOS。这是一个全新的平台层，充当用户级别的操作系统。这个新的操作系统使得充分利用当前和未来的硬件成为可能，并实现了诸如高级并行性等功能。SQLOS
    高度可配置，会根据其运行的硬件进行调整，因此对于高端或低端系统都具有完美的可扩展性。


    图 1-4 展示了 SQL Server 2005 的（简化）架构，包括 SQLOS 层。


    ![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig4_HTML.jpg](images/340881_2_En_1_Chapter/340881_2_En_1_Fig4_HTML.jpg)


    图 1-4

    SQL Server 2005 架构


    SQLOS 通过引入调度器（schedulers）、任务（tasks）和工作线程（worker threads），改变了 SQL Server 访问处理器资源的方式。这使得
    SQLOS 能够更好地控制如何由处理器来完成工作。Windows 操作系统采用*抢占式调度*方法。这意味着 Windows 会给每个需要处理器时间的进程分配一个优先级和固定的时间片，或称为*量程*。这个进程优先级是根据许多变量计算得出的，如资源使用情况、预期运行时间、当前活动等。通过使用抢占式调度，Windows
    操作系统可以选择在某个进程需要处理器时间但优先级更高的进程到来时中断当前进程。这种调度方式可能对 SQL Server 生成的进程产生负面影响，因为这些进程很容易被更高优先级的进程（包括其他应用程序的进程）中断。因此，SQLOS
    使用自己的（协作式）非抢占式调度机制，确保 Windows 进程无法中断 SQLOS 进程。


    SQL Server 7 和 SQL Server 2000 也使用用户模式调度（UMS）进行非抢占式调度。SQLOS 将更多的系统组件紧密地结合在一起，从而实现了更好的性能和可扩展性。


    在 SQLOS 无法使用非抢占式调度的情况下也有一些例外，例如当 SQLOS 需要通过 Windows 操作系统访问资源时。我们将在本书后面的第 11 章“抢占式等待类型”中讨论这些例外情况。


    ## 调度器、任务和工作线程


    由于 SQLOS 使用与 Windows 操作系统不同的方法来执行请求，SQL Server 引入了一种不同的方式来调度处理器时间，使用调度器、任务和工作线程。图
    1-5 展示了 SQL Server 调度的不同部分以及它们之间的关系。


    ![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig5_HTML.jpg](images/340881_2_En_1_Chapter/340881_2_En_1_Fig5_HTML.jpg)


    图 1-5

    SQL Server 调度


    ### 会话


    一个*会话*是客户端与其连接的 SQL Server 之间建立的连接（在成功通过身份验证之后）。我们可以通过使用以下查询查询 `sys.dm_exec_sessions`
    DMV 来轻松访问会话信息：


    ```sql

    SELECT * FROM sys.dm_exec_sessions;

    ```


    一般来说，用户会话的 `session_id` 大于 50；小于 50 的都保留给内部 SQL Server 进程。然而，在非常繁忙的服务器上，SQL Server
    有可能需要使用大于 50 的 `session_id`。如果你只对用户发起的会话信息感兴趣，最好使用 `is_user_process` 列来过滤 `sys.dm_exec_sessions`
    DMV 的结果，而不是过滤 `session_id` 大于 50。以下查询将只返回用户会话并过滤掉内部系统会话：


    ```sql

    SELECT * FROM sys.dm_exec_sessions

    WHERE is_user_process = 1;

    ```


    图 1-6 显示了此查询结果的一小部分。


    ![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig6_HTML.jpg](images/340881_2_En_1_Chapter/340881_2_En_1_Fig6_HTML.jpg)


    图 1-6

    `sys.dm_exec_sessions` 结果


    `sys.dm_exec_sessions` DMV 返回的列要多得多，这些列提供了关于特定会话的信息。一些更有趣、值得额外解释的列包括 `host_process_id`，这是连接到
    SQL Server 的客户端程序的进程 ID（PID）。`cpu_time` 列将告诉你该会话自建立以来已使用的处理器时间（以毫秒为单位）。`memory_usage`
    列显示会话使用的内存量。这不是以 MB 或 KB 为单位，而是使用的 8 KB 页面数。另一个我想重点说明的列是 `status` 列。这将显示会话是否有活动请求。`status`
    列最常见的值是“Running”，表示当前正在从此会话处理一个或多个请求；以及“Sleeping”，表示当前没有从此会话处理任何请求。


    ### 请求


    一个*请求*是 SQL Server 执行引擎对由会话提交的查询的表示。同样，我们可以使用一个 DMV 来查询关于请求的信息；在本例中，我们可以针对 `sys.dm_exec_requests`
    DMV 运行一个查询，如下所示：


    ```sql

    SELECT * FROM sys.dm_exec_requests;

    ```


    图 1-7 显示了此查询结果的一部分。


    ![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig7_HTML.jpg](images/340881_2_En_1_Chapter/340881_2_En_1_Fig7_HTML.jpg)


    图 1-7

    `sys.dm_exec_requests` 结果


    `sys.dm_exec_requests` DMV 是在对任何与性能相关的问题进行故障排除时使用的极其强大的工具。原因是它包含大量关于正在执行的实际查询的信息，并且可以帮助你相对快速地检测到性能瓶颈。因为
    `sys.dm_exec_requests` DMV 也显示与等待统计相关的信息，我们将在第 2 章“查询 SQL Server 等待统计信息”中对其进行详细研究。'
  raw: '## The SQLOS


    The world of computer hardware changes constantly. Every year, or in some cases
    every month, we manage to put more cores inside a processor, increase the memory
    capacity of mainboards, or introduce entirely new hardware concepts like PCI-based
    persistent flash storage. Database Management Systems (or DBMSs) are always one
    of the first types of applications that want to take advantage of new hardware
    trends. Because of the fast-changing nature of hardware and the need to utilize
    new hardware options as soon as they become available, the SQL Server team decided
    to change the SQL Server platform layer in SQL Server 2005.


    Before SQL Server 2005, the platform layer of SQL Server was pretty restricted,
    and many operations were performed by the operating system. This meant that it
    was difficult for SQL Server to keep up with the fast-changing world of server
    hardware, as changing a complete operating system in order to utilize faster hardware
    or new hardware features is a time-consuming and complex operation.


    Figure [1-3](#340881_2_En_1_Chapter.xhtml#Fig3) shows the (simplified) architecture
    of SQL Server before the introduction of the SQLOS in SQL Server 2005.


    ![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig3_HTML.jpg](images/340881_2_En_1_Chapter/340881_2_En_1_Fig3_HTML.jpg)


    Figure 1-3


    SQL Server architecture before the introduction of the SQLOS


    SQL Server 2005 introduced one of the biggest changes to the SQL Server engine
    seen to this day, the SQLOS. This is a completely new platform layer that functions
    as a user-level operating system. This new operating system has made it possible
    to fully utilize current and future hardware and has enabled features like advanced
    parallelism. The SQLOS is highly configurable and adjusts itself to the hardware
    it is running on, thus making it perfectly scalable for high-end or low-end systems
    alike.


    Figure [1-4](#340881_2_En_1_Chapter.xhtml#Fig4) shows the (simplified) architecture
    of SQL Server 2005, including the SQLOS layer.


    ![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig4_HTML.jpg](images/340881_2_En_1_Chapter/340881_2_En_1_Fig4_HTML.jpg)


    Figure 1-4


    SQL Server 2005 architecture


    The SQLOS changed the way SQL Server accesses processor resources by introducing
    schedulers, tasks, and worker threads. This gives the SQLOS greater control of
    how work should be completed by the processors. The Windows operating system uses
    a *preemptive scheduling* approach. This means that Windows will give every process
    that needs processor time a priority and fixed slice of time, or a *quantum*.
    This process priority is calculated from a number of variables like resource usage,
    expected runtime, current activity, and so forth. By using preemptive scheduling,
    the Windows operating system can choose to interrupt a process when a process
    with a higher priority needs processor time. This way of scheduling can have a
    negative impact on processes generated by SQL Server, since those processes could
    easily be interrupted by higher priority ones, including those of other applications.
    For this reason, the SQLOS uses its own (cooperative) non-preemptive scheduling
    mechanism, making sure that Windows processes cannot interrupt SQLOS processes.


    SQL Server 7 and SQL Server 2000 also used non-preemptive scheduling using User
    Mode Scheduling (UMS). SQLOS brought many more system components closer together,
    thus enabling better performance and scalability.


    There are some exceptions when the SQLOS cannot use non-preemptive scheduling,
    for instance, when the SQLOS needs to access a resource through the Windows operating
    system. We will discuss these exceptions later in this book in Chapter [11](#340881_2_En_11_Chapter.xhtml),
    “Preemptive Wait Types.”


    ## Schedulers, Tasks, and Worker Threads


    Because the SQLOS uses a different method to execute requests than the Windows
    operating system uses, SQL Server introduced a different way to schedule processor
    time using schedulers, tasks, and worker threads. Figure [1-5](#340881_2_En_1_Chapter.xhtml#Fig5)
    shows the different parts of SQL Server scheduling and how they relate to each
    other.


    ![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig5_HTML.jpg](images/340881_2_En_1_Chapter/340881_2_En_1_Fig5_HTML.jpg)


    Figure 1-5


    SQL Server scheduling


    ### Sessions


    A *session* is the connection a client has to the SQL Server it is connected to
    (after it has been successfully authenticated). We can easily access session information
    by querying the **sys.dm_exec_sessions** DMV using the following query:


    ```

    SELECT * FROM sys.dm_exec_sessions;

    ```


    Generally speaking, user sessions will have a `session_id` greater than 50; everything
    lower is reserved for internal SQL Server processes. However, on very busy servers
    there is a possibility that SQL Server needs to use a `session_id` greater than
    50\. If you are only interested in information about user-initiated sessions,
    it is better to filter the results of the `sys.dm_exec_sessions` DMV using the
    `is_user_process` column instead of filtering on a `session_id` greater than 50\.
    The following query will only return user sessions and will filter out the internal
    system sessions:


    ```

    SELECT * FROM sys.dm_exec_sessions

    WHERE is_user_process = 1;

    ```


    Figure [1-6](#340881_2_En_1_Chapter.xhtml#Fig6) shows a small part of the results
    of this query.


    ![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig6_HTML.jpg](images/340881_2_En_1_Chapter/340881_2_En_1_Fig6_HTML.jpg)


    Figure 1-6


    sys.dm_exec_sessions results


    There are many more columns returned by the **sys.dm_exec_sessions** DMV that
    will give us information about the specific session. Some of the more interesting
    columns that deserve some extra explanation are the `host_process_id`, which is
    the Process ID (or PID) of the client program connected to the SQL Server. The
    `cpu_time` column will give you information about the processor time (in milliseconds)
    the session has used since it was first established. The `memory_usage` column
    displays the amount of memory used by the session. This is not the amount in MB
    or KB, but the number of 8 KB pages used. Another column I would like to highlight
    is the `status` column. This will show you if the session has any active requests.
    The most common values of the `status` column are “Running,” which indicates that
    one or more requests are currently being processed from this session, and “Sleeping,”
    which means no requests are currently being processed from this session.


    ### Requests


    A *request* is the SQL Server execution engine’s representation of a query submitted
    by a session. Again, we can use a DMV to query information about a request; in
    this case, we can run a query against the **sys.dm_exec_requests** DMV like the
    following query:


    ```

    SELECT * FROM sys.dm_exec_requests;

    ```


    Figure [1-7](#340881_2_En_1_Chapter.xhtml#Fig7) shows a portion of the results
    of this query.


    ![../images/340881_2_En_1_Chapter/340881_2_En_1_Fig7_HTML.jpg](images/340881_2_En_1_Chapter/340881_2_En_1_Fig7_HTML.jpg)


    Figure 1-7


    sys.dm_exec_requests results


    The **sys.dm_exec_requests** DMV is an incredibly powerful tool to use when you
    are troubleshooting any performance-related issues. The reason for this is that
    it has a lot of information about the actual queries being executed and can help
    you detect performance bottlenecks relatively quickly. Because the **sys.dm_exec_requests**
    DMV also displays wait statistics–related information, we will take a thorough
    look at it in Chapter [2](#340881_2_En_2_Chapter.xhtml), “Querying SQL Server
    Wait Statistics.”'
  trans: '## SQLOS


    计算机硬件世界在不断变化。每年，甚至在某些情况下是每个月，我们都设法在处理器中加入更多核心，提高主板的内存容量，或者引入全新的硬件概念，比如基于 PCI 的持久化闪存存储。数据库管理系统（DBMS）总是最先想要利用新硬件趋势的应用程序类型之一。由于硬件的快速变化特性以及需要一有新的硬件选项就加以利用，SQL
    Server 团队在 SQL Server 2005 中决定改变 SQL Server 的平台层。


    在 SQL Server 2005 之前，SQL Server 的平台层限制很多，许多操作都是由操作系统执行的。这意味着 SQL Server 很难跟上快速变化的服务器硬件世界，因为为了利用更快的硬件或新的硬件特性而更改整个操作系统是一项耗时且复杂的操作。


