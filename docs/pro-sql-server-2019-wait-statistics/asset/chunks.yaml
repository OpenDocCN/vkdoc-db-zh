  trans: '

    # BACKUPBUFFER 等待类型概述


    `BACKUPBUFFER` 等待通常在备份或恢复操作期间发生，当备份/恢复操作需要等待可用的空闲缓冲区时就会出现。由于这是正常现象，因此无需担忧。我们确实有一些选项可以减少
    `BACKUPIO` 等待时间，但这也会对备份/恢复操作的持续时间产生影响。不过，这些参数需要经过仔细配置和测试，因为设置得过高可能会导致内存不足错误。


    ## BACKUPIO


    与 `BACKUPBUFFER` 等待类型类似，`BACKUPIO` 等待类型在备份或恢复操作的某个部分遇到争用问题时发生。另一个相似之处是 Books Online
    上对该等待类型的描述：“当备份任务正在等待数据，或正在等待用于存储数据的缓冲区时发生。此类型并不典型，除非任务正在等待磁带挂载。” 同样，在执行备份或恢复操作时，即使备份目标或恢复源不是磁带设备，这种等待类型也很常见。


    ### 什么是 BACKUPIO 等待类型？


    为了更好地理解 `BACKUPIO` 等待是如何产生的，我们需要查看图 7-5，该图先前作为图 7-1 展示过。


    ![../images/340881_2_En_7_Chapter/340881_2_En_7_Fig5_HTML.jpg](img/340881_2_En_7_Fig5_HTML.jpg)


    图 7-5：备份操作的内部机制


    在之前讨论 `BACKUPBUFFER` 等待类型的部分，我们解释了 `BACKUPBUFFER` 等待类型发生在我们等待一个空闲（空）缓冲区可用时。在很大程度上，`BACKUPBUFFER`
    等待类型位于图 7-5 的左侧，即读取器部分。而 `BACKUPIO` 等待类型主要发生在图 7-5 的右侧，即写入器部分。当 `BACKUPIO` 等待发生时，意味着写入器在写入数据时出现了延迟。这种延迟可能由多种原因引起；例如，将备份写入速度较慢的磁盘、将备份写入网络位置，或者在还原数据库时。


    在执行数据库备份或还原时，`BACKUPIO` 等待类型经常会伴随着 `ASYNC_IO_COMPLETION` 等待。


    ### BACKUPIO 示例


    我们可以使用与演示 `BACKUPBUFFER` 等待类型相同的示例。我对查询做了一点修改，以返回 `BACKUPIO` 等待而不是 `BACKUPBUFFER`
    等待，并且在对 `sys.dm_os_wait_stats` DMV 的查询结果中包含了 `ASYNC_IO_COMPLETION`。清单 7-4 显示了修改后的备份查询。


    ```sql

    -- 清除 sys.dm_os_wait_stats

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    BACKUP DATABASE [AdventureWorks]

    TO DISK = N''F:\Backup\aw_21042015.bak''

    WITH

    NAME = N''AdventureWorks-Full Database Backup'';

    GO

    -- 查询 BACKUPIO 等待

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''BACKUPIO''

    OR wait_type = ''ASYNC_IO_COMPLETION'';

    清单 7-4: 生成 BACKUPIO 等待

    ```


    对 `sys.dm_os_wait_stats` DMV 的查询结果如图 7-6 所示。


    ![../images/340881_2_En_7_Chapter/340881_2_En_7_Fig6_HTML.jpg](img/340881_2_En_7_Fig6_HTML.jpg)


    图 7-6：ASYNC_IO_COMPLETION 和 BACKUPIO 等待


    如图 7-6 所示，数据库备份导致了这两种等待类型的产生，大部分时间都花费在了 `ASYNC_IO_COMPLETION` 等待上，该等待负责读取需要写入备份文件的数据页。由于我的备份目标在
    SSD 磁盘上，因此我们没有遇到非常高的 `BACKUPIO` 等待时间。


    ### 减少 BACKUPIO 等待


    调整 `BUFFERCOUNT` 和 `MAXTRANSFERSIZE` 选项对 `BACKUPIO` 等待类型的影响不如它们对 `BACKUPBUFFER`
    等待类型的影响那么大。当你看到 `BACKUPIO` 等待类型的等待时间高于正常水平时，问题很可能与存储子系统的吞吐量或你正在写入/读取备份的网络位置有关。务必检查这两个位置是否存在潜在的性能问题，例如高延迟或网络利用率过高。


    ### BACKUPIO 概述


    与 `BACKUPBUFFER` 等待类型类似，`BACKUPIO` 等待类型在执行备份或恢复操作时发生。`BACKUPBUFFER` 等待类型主要与备份操作访问备份缓冲区的速度有关，而
    `BACKUPIO` 等待类型则与这些备份缓冲区写入磁盘的速度有关。在执行完整数据库备份或还原时，`BACKUPIO` 等待经常与 `ASYNC_IO_COMPLETION`
    等待同时出现。当看到 `BACKUPIO` 等待类型的等待时间高于正常水平时，请检查你写入或读取备份文件位置的性能指标。减少 `BACKUPIO` 等待时间不会影响系统的查询性能，但将有助于加快备份和还原操作的速度。


    ## BACKUPTHREAD


    `BACKUPTHREAD` 等待类型在对数据库执行还原操作时经常出现，但在备份操作期间也可能发生。当另一个线程正在等待备份/还原操作完成以便继续处理时，就会发生这种等待。


    ### 什么是 BACKUPTHREAD 等待类型？


    当你看到 `BACKUPTHREAD` 等待发生时，意味着另一个线程想要访问当前正被备份或还原操作占用的资源。在线程必须等待备份/还原完成的期间，将记录 `BACKUPTHREAD`
    等待时间。此类等待的一个例子是，当数据库数据文件正在被还原时，一个线程想要访问它；例如，`ASYNC_IO_COMPLETION` 等待类型正在将数据文件写入磁盘。


    `BACKUPTHREAD` 等待通常不是引起关注的原因。它们只是表明其他线程正在等待备份/还原操作完成，并且它们的持续时间通常与你的备份或还原完成所需的时间相同。然而，如果等待时间超出预期，它们确实会给你一个提示，表明可能存在其他值得调查的等待。


    因为一图胜千言，图 7-7 展示了 `BACKUPTHREAD` 等待类型与还原操作以及其他正在发生的等待之间的关系。


    ![../images/340881_2_En_7_Chapter/340881_2_En_7_Fig7_HTML.jpg](img/340881_2_En_7_Fig7_HTML.jpg)


    图 7-7：BACKUPTHREAD 与其他线程的关系


    在图 7-7 中，你可以看到 `BACKUPTHREAD` 等待正在发生，因为另一个线程也想要访问一个当前正由还原操作拥有的资源。

    '
- fmt: '### BACKUPTHREAD 示例


    演示 `BACKUPTHREAD` 等待发生的一个简单方法是执行还原操作。当您执行还原时，其他进程将需要访问数据库数据文件，以将备份文件中的信息写入数据库数据文件。


    清单 [7-5](#340881_2_En_7_Chapter.xhtml#PC5) 展示了一个脚本，用于还原我之前在测试 SQL Server 上为 `AdventureWorks`
    数据库制作的备份文件。


    ```sql

    -- Restore database

    USE [master]

    RESTORE DATABASE [AdventureWorks]

    FROM DISK = N''F:\Backup\AWBackup.bak''

    WITH  FILE = 1, REPLACE;

    GO

    ```


    清单 7-5

    还原 AdventureWorks 数据库


    如果在备份运行期间查看 `sys.dm_os_waiting_tasks` DMV，我们会看到发生的等待，如图 [7-8](#340881_2_En_7_Chapter.xhtml#Fig8)
    所示，该图显示了我测试 SQL Server 上的一部分等待。


    ![../images/340881_2_En_7_Chapter/340881_2_En_7_Fig8_HTML.jpg](images/340881_2_En_7_Chapter/340881_2_En_7_Fig8_HTML.jpg)


    图 7-8

    BACKUPTHREAD 及其他等待


    如图 [7-8](#340881_2_En_7_Chapter.xhtml#Fig8) 所示，`BACKUPTHREAD` 等待类型的等待时间与 `PREEMPTIVE_OS_WRITEFILEGATHER`
    等待类型非常接近。此等待类型负责将数据写入文件系统，但我们将在第 [11](#340881_2_En_11_Chapter.xhtml) 章 “抢占式等待类型”
    中更深入地探讨此特定等待类型。


    ### 降低 BACKUPTHREAD 等待


    虽然 `BACKUPTHREAD` 等待类型本身并不表示任何问题，但它与其他等待类型的结合可能是一些额外研究的原因。基本上，任何可以用来加速备份或恢复过程的方法都会对
    `BACKUPTHREAD` 等待时间产生影响。


    一些好的起点是可以在 `BACKUP` 和 `RESTORE` T-SQL 命令上指定的 `BufferCount` 和 `MaxTransferSize`
    选项。我们在讨论 `BACKUPBUFFER` 和 `BACKUPIO` 等待类型时曾涉及这些设置。调整这些设置可以使您的备份和还原花费更少的时间，从而导致更低的
    `BACKUPTHREAD` 等待时间。


    另一个可以显著改善备份和还原时间的设置是即时文件初始化选项，我们在第 [6](#340881_2_En_6_Chapter.xhtml) 章 “与 I/O
    相关的等待类型” 的 `ASYNC_IO_COMPLETION` 部分讨论过。


    ### BACKUPTHREAD 总结


    `BACKUPTHREAD` 等待时间并不表示对特定资源的访问，而是表示另一个进程正在等待备份或还原操作完成。看到这种等待类型非常常见，尤其是在还原操作期间。减少备份和还原操作的持续时间也会反映在
    `BACKUPTHREAD` 等待类型的等待时间中。您可以用来降低 `BACKUPTHREAD` 等待时间的方法之一是检查是否启用了即时文件初始化。此设置不会直接影响
    `BACKUPTHREAD` 等待类型，但它会影响其他等待类型，进而影响 `BACKUPTHREAD` 等待时间。


    ## 8. 与锁相关的等待类型


    锁定是每个关系数据库或关系数据库管理系统（RDBMS）的基本组成部分。SQL Server 基于关系数据库模型，因此在访问数据时使用锁定。尽管我们经常将锁定与性能问题联系起来，但它在确保数据在并发工作负载期间的可靠性方面起着至关重要的作用。SQL
    Server 或任何其他 RDBMS 处理这种数据可靠性的方式是通过遵循 “ACID” 属性，这些属性最初由 Jim Gray 在 1970 年代定义，但在
    1983 年由 Andreas Reuter 和 Theo Härder 命名。这些 ACID 属性被强制执行于单一操作上，即我们所知的事务。首字母缩写词
    ACID 包含了保证事务内部数据可靠性的四个特征。以下列表描述了这些特征中的每一个：


    *   原子性：原子性特征要求事务是全有或全无的。这意味着如果事务的一部分失败，则整个事务失败，并且在事务内完成的所有更改都需要回滚到事务开始之前的状态。

    *   一致性：一致性特征要求事务写入数据库的数据是合法的。这意味着数据必须剔除非法或不良的输入。

    *   隔离性：隔离性特征要求每个事务对其他并发事务是不可见的。从事务的角度来看，这意味着每个事务都是串行执行的。

    *   持久性：持久性特征要求每个已提交的事务保持已提交状态，即使在发生电源故障或灾难时也是如此。


    正如您可能从阅读不同的 ACID 属性中猜到的那样，SQL Server 中的锁定与隔离性特征密切相关。


    由于本章专门讨论与锁相关的等待类型，除了隔离性之外，我们不会详细介绍 ACID 属性。如果您有兴趣了解更多关于 ACID 属性和数据库理论的知识，一个很好的起点是
    Andreas Reuter 和 Theo Harder 的研究论文 “Principles of Transaction-Oriented Database
    Recovery”，其中详细描述了 ACID 属性。


    为了更好地理解隔离性特征的工作原理，我们需要理解事务。一个事务代表与数据库的一次交互，可以包含多个操作，并且与其他事务分离。


    为了确保我们的事务不会与其他并发事务冲突，SQL Server 使用锁。这些锁确保没有其他事务可以修改您的事务正在同时处理的数据。例如，如果您从银行账户中提取
    100 美元，您不希望另一个并发的提取操作修改该金额。其他事务必须等待其提取操作，直到您的事务完成。在 SQL Server 内部，这个过程的工作方式相同。当您从数据库请求数据时，您希望获得您所请求的数据返回，而没有数据在您请求时被修改的风险。


    当您运行事务时，它将受到 SQL Server 在您正在访问的对象上放置的锁的保护。如果另一个事务想要与同一对象交互，则会发生阻塞。当发生阻塞时，后一个事务将必须等待，直到对象上的锁被移除。然后，该事务可以在对象上放置自己的锁并开始其交互。


    在 SQL Server 中，我们有许多可用选项来控制锁定和阻塞的行为，其中大多数与更改针对数据库的某些或所有事务的隔离级别有关。在 SQL Server
    内部，我们也可以访问大量关于锁定和阻塞的信息，其中非常重要的一部分就在等待统计中。事务等待访问锁定对象的时间被记录为特定的、与锁相关的等待类型的等待时间（取决于事务打算放置的锁的类型）。


    在本章中，我们将讨论与锁定和阻塞相关的各种等待类型，以及如何降低或甚至解决它们。这需要一些关于 SQL Server 如何使用锁的知识，因此我专门包含了一节内容，让我们在深入研究锁等待类型之前熟悉锁定和阻塞。'
  raw: '### BACKUPTHREAD Example


    An easy way to demonstrate `BACKUPTHREAD` waits occurring is by performing a restore
    operation. When you perform a restore, other processes will need to access the
    database data files to write the information from the backup file to the database
    data files.


    Listing [7-5](#340881_2_En_7_Chapter.xhtml#PC5) shows a script to restore a backup
    file I made earlier of the `AdventureWorks` database on my test SQL Server.


    ```

    -- Restore database

    USE [master]

    RESTORE DATABASE [AdventureWorks]

    FROM DISK = N''F:\Backup\AWBackup.bak''

    WITH  FILE = 1, REPLACE;

    GO

    Listing 7-5

    Restore AdventureWorks database

    ```


    If we were to look at the `sys.dm_os_waiting_tasks` DMV while the backup is running,
    we would see the waits occurring as shown in Figure [7-8](#340881_2_En_7_Chapter.xhtml#Fig8),
    which shows a selection of waits on my test SQL Server.


    ![../images/340881_2_En_7_Chapter/340881_2_En_7_Fig8_HTML.jpg](images/340881_2_En_7_Chapter/340881_2_En_7_Fig8_HTML.jpg)


    Figure 7-8


    BACKUPTHREAD and other waits


    As you can see in Figure [7-8](#340881_2_En_7_Chapter.xhtml#Fig8), the wait time
    of the `BACKUPTHREAD` wait type is pretty close to that of the `PREEMPTIVE_OS_WRITEFILEGATHER`
    wait type. This wait type is responsible for writing data to the file system,
    but we will dive deeper into this specific wait type in Chapter [11](#340881_2_En_11_Chapter.xhtml),
    “Preemptive Wait Types.”


    ### Lowering BACKUPTHREAD Waits


    While the `BACKUPTHREAD` wait type itself doesn’t indicate any problems, its combination
    with other wait types can be a reason for some additional research. Basically,
    every method you can use to speed up your backup or recovery process will have
    an impact on the `BACKUPTHREAD` wait time.


    Some good pointers to start with are the `BufferCount` and `MaxTransferSize` options
    that you can specify on the `BACKUP` and `RESTORE` T-SQL commands. We touched
    upon these settings when we discussed the `BACKUPBUFFER` and `BACKUPIO` wait types.
    Tweaking these settings can make your backups and restores take less time, resulting
    in lower `BACKUPTHREAD` wait times.


    Another setting that can dramatically improve backup and restore times is the
    instant file initialization option that we discussed in Chapter [6](#340881_2_En_6_Chapter.xhtml),
    “IO-Related Wait Types,” in the `ASYNC_IO_COMPLETION` section.


    ### BACKUPTHREAD Summary


    The `BACKUPTHREAD` wait time doesn’t indicate access to a specific resource, but
    rather indicates that another process is waiting for a backup or restore operation
    to complete. It is very common to see this wait type, especially during restore
    operations. Lowering the duration of backup and restore operations will also be
    reflected in the wait times of the `BACKUPTHREAD` wait type. One of the methods
    you can use to lower `BACKUPTHREAD` wait times is checking whether instant file
    initialization is enabled. This setting does not directly impact the `BACKUPTHREAD`
    wait type, but it will impact other wait types, which will in turn impact the
    `BACKUPTHREAD` wait time.


    # 8. Lock-Related Wait Types


    Locking is a fundamental part of every relational database, or Relational Database
    Management System (RDBMS). SQL Server is based on the relational database model,
    and as such uses locking when data is accessed. Even though we frequently relate
    locking to performance problems, it plays a vital role in making sure your data
    is reliable during concurrent workloads. The way SQL Server, or any other RDBMS
    for that matter, takes care of this data reliability is by following the “ACID”
    properties, which were originally defined by Jim Gray in the 1970s but received
    their name in 1983 from Andreas Reuter and Theo Härder. These ACID properties
    are enforced upon single operations, which we know as transactions. The acronym
    ACID consists of four characteristics that guarantee data reliability inside transactions.
    The following list describes each of these characteristics:


    *   Atomicity: The atomicity characteristic requires that transactions are all
    or nothing. This means that if one part of the transaction fails, the complete
    transaction fails, and every change done inside the transaction needs to be changed
    back to the state before the transaction started.


    *   Consistency: The consistency characteristic requires that data written to
    the database by the transaction is legal. This means that the data must be stripped
    of illegal or bad input.


    *   Isolation: The isolation characteristic requires that every transaction is
    hidden from other concurrent transactions. From a transaction point of view, this
    means every transaction is executed serially.


    *   Durable: The durable characteristic requires that every committed transaction
    remains committed, even in the event of a power failure or disaster.


    As you might have guessed from reading the different ACID properties, locking
    inside SQL Server is closely related to the Isolation characteristic.


    Since this chapter is dedicated to lock-related wait types, we won’t go into detail
    about ACID properties besides Isolation. If you are interested in learning more
    about the ACID properties and database theory, a good place to start would be
    the “Principles of Transaction-Oriented Database Recovery” research paper by Andreas
    Reuter and Theo Harder, which describes the ACID properties in detail.


    To get a better understanding of how the Isolation characteristic works, we need
    to understand transactions. A transaction represents an interaction with the database
    that can consist of multiple actions and that is separated from other transactions.


    To make sure our transactions do not conflict with other concurrent transactions,
    SQL Server uses locks. These locks make sure no other transaction can modify data
    that your transaction is processing at the same time. For example, if you make
    a $100 withdrawal from your bank account, you do not want another concurrent withdrawal
    to modify that amount. Other transactions will have to wait with their withdrawals
    until your transaction is completed. Inside SQL Server, this process works the
    same way. When you request data from your database, you want to get the data returned
    you asked for, without running the risk that the data is being modified while
    you are requesting it.


    When you run your transaction it will be protected by a lock SQL Server places
    on the object you are accessing. If another transaction wants to interact with
    the same object, a block will occur. When this block occurs, the latter transaction
    will have to wait until the lock on the object is removed. The transaction can
    then place its own lock on the object and start its interaction.


    There are many options available to us within SQL Server to control the behavior
    of locking and blocking, and most of them are related to changing the Isolation
    of certain or all transactions against a database. There is also a lot of information
    about locking and blocking we can access inside SQL Server, and not the least
    of these are inside wait statistics. The time a transaction is waiting to access
    a locked object is recorded as wait time for specific, lock-related wait types
    (depending on the type of lock the transaction intends to place).


    In this chapter we will discuss the various wait types that are related to locking
    and blocking and how we can lower or even resolve them. This requires some knowledge
    of how SQL Server uses locks, and for this reason I included a section to familiarize
    ourselves with locking and blocking before we dive into the lock wait types.'
