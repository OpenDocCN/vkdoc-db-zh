- fmt: '# 10. High-Availability and Disaster-Recovery Wait Types


    There have always been several options available within SQL Server to make sure
    your database is always available to your users and/or the data inside your database
    is replicated to another server so as to minimize the chances of losing data.
    Just like with performing regular database backups to ensure you can revert to
    a previous state of your database should a crash or data corruption occur, planning
    and maintaining highly available database environments is part of your job as
    a DBA.


    Now that data has become incredibly important for many companies, and the need
    for high-availability database servers grows, many DBAs will find themselves managing
    SQL Server instances inside a high-availability solution, like mirroring, or a
    disaster-recovery configuration, like log shipping. With these types of SQL Server
    high-availability and disaster-recovery configurations comes a group of dedicated
    wait types that are directly related to the health of your high-availability and
    disaster-recovery (HA/DR) configuration. With the release of SQL Server AlwaysOn
    Availability Groups in SQL Server 2012, more options became available for configuring
    HA/DR solutions, together with new wait types that are directly related to AlwaysOn
    Availability Groups.


    In this chapter we will take a look at some of the most common wait types to see
    in HA/DR configurations. The main focus of the wait types inside this chapter
    is AlwaysOn Availability Groups, because Microsoft is deprecating many of the
    previous installments of features that now fall under the name AlwaysOn Availability
    Groups, like mirroring. As an exception to this rule, I selected one mirroring-related
    wait type that is relatively common on highly used mirroring configurations. All
    the other wait types are related to AlwaysOn Availability Groups.


    For the examples inside this chapter, I used several virtual machines to create
    a mirroring and an AlwaysOn Availability Groups configuration. The configuration
    of these VMs can be found in Appendix I Example SQL Server Machine Configurations.


    ## DBMIRROR_SEND


    The first wait type I want to discuss in this chapter is the `DBMIRROR_SEND` wait
    type. As you might suspect from the wait type name, `DBMIRROR_SEND` is related
    to database mirroring.


    Database mirroring is a feature that was introduced in SQL Server 2005 but was
    announced deprecated in SQL Server 2012. This doesn’t mean you cannot use database
    mirroring in SQL Server 2012 or SQL Server 2014, but it does mean it is scheduled
    for removal. The entire feature will be replaced with AlwaysOn Availability Groups,
    which offers the same configuration options as database mirroring.


    Database mirroring is a solution that increases the availability of SQL Server
    databases, and unlike, for instance, failover clustering, it can be configured
    on a per-database basis. Database mirroring works by redoing every data modification
    operation that occurs on the primary database (called `principal` in database-mirroring
    terms) on the mirror database. The redoing of every database modification operation
    is achieved by streaming active transaction log records to the mirror server,
    which will perform the operations on the mirror database in the sequence in which
    they were inserted into the transaction log on the principal database.


    Database mirroring offers two different operating modes that impact the availability
    and performance of the mirror configuration: synchronous (or high-safety) mode
    and asynchronous (or high-performance) mode. Even though both modes perform identical
    actions to ensure data modification operations are also performed on the mirror
    database, there can be a large difference in performance, and thus in waits occurring.


    The synchronous mirror mode makes sure that every data modification action that
    is performed on the principal is also directly performed on the mirror. It does
    this by waiting on sending a transaction confirmation message to the client until
    the transaction is successfully written to disk on the mirror. Figure 10-1 depicts
    synchronous mirroring.


    ![../images/340881_2_En_10_Chapter/340881_2_En_10_Fig1_HTML.jpg](images/340881_2_En_10_Chapter/340881_2_En_10_Fig1_HTML.jpg)


    Figure 10-1 Synchronous mirroring


    Even though synchronous mirroring makes sure data on the principal and mirror
    are 100% identical, it comes with a few drawbacks. One of those is that the performance
    of your database inside a synchronous mirroring configuration is highly dependent
    on the speed the mirror can process data modification operations, since every
    transaction has to be committed on the mirror first.


    The flow of a data modification transaction is described in the steps that follow:


    1.  When the transaction is received, the principal will write the transaction
    to the transaction log, but the transaction is not yet committed though.

    2.  The principal will send the log record to the mirror.

    3.  The mirror will harden the log record to disk and send an acknowledgment to
    the principal.

    4.  After the principal receives the acknowledgment, it will send a confirmation
    message to the client that the transaction was completed, and the transaction
    gets committed to the transaction log on the principal.


    The asynchronous mode works in much the same way; the exception is that it will
    not wait on an acknowledgment message from the mirror before sending the transaction
    confirmation message to the client. This means that transactions are committed
    to disk on the principal before they are written to disk on the mirror. Using
    asynchronous mirroring will improve mirror performance, since the latency overhead
    of synchronous mirroring is removed. The trade-off for this increase in performance
    is that asynchronous replication can lead to data loss in the case of a disaster,
    since it is possible that transactions were not yet committed on the mirror. Figure
    10-2 shows the transaction-log flow on an asynchronous mirror; the dotted lines
    indicate that the actions are not performed directly.


    ![../images/340881_2_En_10_Chapter/340881_2_En_10_Fig2_HTML.jpg](images/340881_2_En_10_Chapter/340881_2_En_10_Fig2_HTML.jpg)


    Figure 10-2 Asynchronous mirroring


    ### What Is the DBMIRROR_SEND Wait Type?


    The `DBMIRROR_SEND` wait type is most frequently related to synchronous mirroring
    configurations. The description of the `DBMIRROR_SEND` wait type on Books Online
    is “Occurs when a task is waiting for a communications backlog at the network
    layer to clear to be able to send messages. Indicates that the communications
    layer is starting to become overloaded and affect the database mirroring data
    throughput.” In this case the Books Online description is pretty accurate, but
    the network is not the only thing that can impact `DBMIRROR_SEND` wait times.
    Having a slow disk subsystem connected to the mirror database can, for instance,
    also lead to an increase in `DBMIRROR_SEND` wait times.


    Another important point to remember is that high `DBMIRROR_SEND` wait times will
    frequently only be recorded on the mirror instance, and not on the principal.
    It is common to see waits occur on the `DBMIRROR_SEND` wait type on both the principal
    and the mirror, but these will normally be very low on the principal. They can
    still reach high values on the mirror since, generally, there is always some latency
    between both SQL Server instances. Because of expected latency, I advise you to
    use baseline measurements to identify higher-than-normal wait times for the `DBMIRROR_SEND`
    wait type.'
  raw: '# 10. High-Availability and Disaster-Recovery Wait Types


    There have always been several options available within SQL Server to make sure
    your database is always available to your users and/or the data inside your database
    is replicated to another server so as to minimize the chances of losing data.
    Just like with performing regular database backups to ensure you can revert to
    a previous state of your database should a crash or data corruption occur, planning
    and maintaining highly available database environments is part of your job as
    a DBA.


    Now that data has become incredibly important for many companies, and the need
    for high-availability database servers grows, many DBAs will find themselves managing
    SQL Server instances inside a high-availability solution, like mirroring, or a
    disaster-recovery configuration, like log shipping. With these types of SQL Server
    high-availability and disaster-recovery configurations comes a group of dedicated
    wait types that are directly related to the health of your high-availability and
    disaster-recovery (HA/DR) configuration. With the release of SQL Server AlwaysOn
    Availability Groups in SQL Server 2012, more options became available for configuring
    HA/DR solutions, together with new wait types that are directly related to AlwaysOn
    Availability Groups.


    In this chapter we will take a look at some of the most common wait types to see
    in HA/DR configurations. The main focus of the wait types inside this chapter
    is AlwaysOn Availability Groups, because Microsoft is deprecating many of the
    previous installments of features that now fall under the name AlwaysOn Availability
    Groups, like mirroring. As an exception to this rule, I selected one mirroring-related
    wait type that is relatively common on highly used mirroring configurations. All
    the other wait types are related to AlwaysOn Availability Groups.


    For the examples inside this chapter, I used several virtual machines to create
    a mirroring and an AlwaysOn Availability Groups configuration. The configuration
    of these VMs can be found in Appendix I Example SQL Server Machine Configurations.


    ## DBMIRROR_SEND


    The first wait type I want to discuss in this chapter is the `DBMIRROR_SEND` wait
    type. As you might suspect from the wait type name, `DBMIRROR_SEND` is related
    to database mirroring.


    Database mirroring is a feature that was introduced in SQL Server 2005 but was
    announced deprecated in SQL Server 2012\. This doesn’t mean you cannot use database
    mirroring in SQL Server 2012 or SQL Server 2014, but it does mean it is scheduled
    for removal. The entire feature will be replaced with AlwaysOn Availability Groups,
    which offers the same configuration options as database mirroring.


    Database mirroring is a solution that increases the availability of SQL Server
    databases, and unlike, for instance, failover clustering, it can be configured
    on a per-database basis. Database mirroring works by redoing every data modification
    operation that occurs on the primary database (called *principal* in database-mirroring
    terms) on the mirror database. The redoing of every database modification operation
    is achieved by streaming active transaction log records to the mirror server,
    which will perform the operations on the mirror database in the sequence in which
    they were inserted into the transaction log on the principal database.


    Database mirroring offers two different operating modes that impact the availability
    and performance of the mirror configuration: synchronous (or high-safety) mode
    and asynchronous (or high-performance) mode. Even though both modes perform identical
    actions to ensure data modification operations are also performed on the mirror
    database, there can be a large difference in performance, and thus in waits occurring.


    The synchronous mirror mode makes sure that every data modification action that
    is performed on the principal is also directly performed on the mirror. It does
    this by waiting on sending a transaction confirmation message to the client until
    the transaction is successfully written to disk on the mirror. Figure [10-1](#340881_2_En_10_Chapter.xhtml#Fig1)
    depicts synchronous mirroring.


    ![../images/340881_2_En_10_Chapter/340881_2_En_10_Fig1_HTML.jpg](images/340881_2_En_10_Chapter/340881_2_En_10_Fig1_HTML.jpg)


    Figure 10-1


    Synchronous mirroring


    Even though synchronous mirroring makes sure data on the principal and mirror
    are 100% identical, it comes with a few drawbacks. One of those is that the performance
    of your database inside a synchronous mirroring configuration is highly dependent
    on the speed the mirror can process data modification operations, since every
    transaction has to be committed on the mirror first.


    The flow of a data modification transaction is described in the steps that follow:


    1.  When the transaction is received, the principal will write the transaction
    to the transaction log, but the transaction is not yet committed though.


    2.  The principal will send the log record to the mirror.


    3.  The mirror will harden the log record to disk and send an acknowledgment to
    the principal.


    4.  After the principal receives the acknowledgment, it will send a confirmation
    message to the client that the transaction was completed, and the transaction
    gets committed to the transaction log on the principal.


    The asynchronous mode works in much the same way; the exception is that it will
    not wait on an acknowledgment message from the mirror before sending the transaction
    confirmation message to the client. This means that transactions are committed
    to disk on the principal before they are written to disk on the mirror. Using
    asynchronous mirroring will improve mirror performance, since the latency overhead
    of synchronous mirroring is removed. The trade-off for this increase in performance
    is that asynchronous replication can lead to data loss in the case of a disaster,
    since it is possible that transactions were not yet committed on the mirror. Figure
    [10-2](#340881_2_En_10_Chapter.xhtml#Fig2) shows the transaction-log flow on an
    asynchronous mirror; the dotted lines indicate that the actions are not performed
    directly.


    ![../images/340881_2_En_10_Chapter/340881_2_En_10_Fig2_HTML.jpg](images/340881_2_En_10_Chapter/340881_2_En_10_Fig2_HTML.jpg)


    Figure 10-2


    Asynchronous mirroring


    ### What Is the DBMIRROR_SEND Wait Type?


    The `DBMIRROR_SEND` wait type is most frequently related to synchronous mirroring
    configurations. The description of the `DBMIRROR_SEND` wait type on Books Online
    is “Occurs when a task is waiting for a communications backlog at the network
    layer to clear to be able to send messages. Indicates that the communications
    layer is starting to become overloaded and affect the database mirroring data
    throughput.” In this case the Books Online description is pretty accurate, but
    the network is not the only thing that can impact `DBMIRROR_SEND` wait times.
    Having a slow disk subsystem connected to the mirror database can, for instance,
    also lead to an increase in `DBMIRROR_SEND` wait times.


    Another important point to remember is that high `DBMIRROR_SEND` wait times will
    frequently only be recorded on the mirror instance, and not on the principal.
    It is common to see waits occur on the `DBMIRROR_SEND` wait type on both the principal
    and the mirror, but these will normally be very low on the principal. They can
    still reach high values on the mirror since, generally, there is always some latency
    between both SQL Server instances. Because of expected latency, I advise you to
    use baseline measurements to identify higher-than-normal wait times for the `DBMIRROR_SEND`
    wait type.'
  trans: '

    # 第 10 章 高可用性与灾难恢复等待类型


    SQL Server 中一直有多种选项可用，以确保您的数据库始终对用户可用，和/或将数据库内的数据复制到另一台服务器，从而最大程度地降低数据丢失的可能性。就像执行定期数据库备份以确保在发生崩溃或数据损坏时可以恢复到数据库的先前状态一样，规划并维护高可用的数据库环境是数据库管理员工作的一部分。


    如今，数据对许多公司变得极其重要，对高可用性数据库服务器的需求日益增长，许多数据库管理员会发现自己在管理高可用解决方案（如镜像）或灾难恢复配置（如日志传送）中的
    SQL Server 实例。伴随着这些类型的 SQL Server 高可用性和灾难恢复配置，出现了一组专用的等待类型，它们与您的高可用性和灾难恢复（HA/DR）配置的运行状况直接相关。随着
    SQL Server 2012 中 SQL Server AlwaysOn 可用性组的发布，配置 HA/DR 解决方案有了更多选项，同时出现了与 AlwaysOn
    可用性组直接相关的新等待类型。


    在本章中，我们将探讨在 HA/DR 配置中最常见的一些等待类型。本章中等待类型的主要关注点是 AlwaysOn 可用性组，因为 Microsoft 正在弃用许多先前属于现在统称为
    AlwaysOn 可用性组名下的功能，例如镜像。作为此规则的一个例外，我选择了一个与镜像相关的等待类型，它在高度使用的镜像配置中相对常见。所有其他等待类型都与
    AlwaysOn 可用性组相关。


    对于本章中的示例，我使用了多个虚拟机来创建一个镜像和一个 AlwaysOn 可用性组配置。这些虚拟机的配置可以在附录 I 示例 SQL Server 机器配置中找到。


    ## DBMIRROR_SEND


    本章我想讨论的第一个等待类型是 `DBMIRROR_SEND` 等待类型。正如您可能从等待类型名称中猜到的那样，`DBMIRROR_SEND` 与数据库镜像相关。


    数据库镜像是在 SQL Server 2005 中引入的功能，但在 SQL Server 2012 中被宣布弃用。这并不意味着您不能在 SQL Server
    2012 或 SQL Server 2014 中使用数据库镜像，但这确实意味着它计划被移除。整个功能将被 AlwaysOn 可用性组取代，后者提供了与数据库镜像相同的配置选项。


    数据库镜像是一种提高 SQL Server 数据库可用性的解决方案，并且与故障转移群集等不同，它可以基于每个数据库进行配置。数据库镜像的工作原理是在镜像数据库上重做主数据库（在数据库镜像术语中称为
    `principal`）上发生的每个数据修改操作。通过将活动的事务日志记录流式传输到镜像服务器来实现每个数据库修改操作的重做，镜像服务器将按照它们插入主数据库事务日志的顺序在镜像数据库上执行这些操作。


    数据库镜像提供两种不同的操作模式，它们会影响镜像配置的可用性和性能：同步（或高安全）模式和异步（或高性能）模式。尽管两种模式执行相同的动作以确保数据修改操作也在镜像数据库上执行，但性能可能存在很大差异，因此发生的等待也可能不同。


    同步镜像模式确保在主服务器上执行的每个数据修改操作也直接在镜像上执行。它通过等待向客户端发送事务确认消息，直到事务成功写入镜像上的磁盘来实现这一点。图 10-1
    描绘了同步镜像。


    ![../images/340881_2_En_10_Chapter/340881_2_En_10_Fig1_HTML.jpg](img/340881_2_En_10_Fig1_HTML.jpg)


    **图 10-1 同步镜像**


    尽管同步镜像确保主服务器和镜像上的数据完全一致，但它也有一些缺点。其中之一是，在同步镜像配置中，数据库的性能高度依赖于镜像处理数据修改操作的速度，因为每个事务必须先在镜像上提交。


    数据修改事务的流程描述如下：


    1.  当接收到事务时，主服务器会将事务写入事务日志，但此时事务尚未提交。

    2.  主服务器将日志记录发送到镜像。

    3.  镜像将日志记录固化到磁盘，并向主服务器发送确认。

    4.  主服务器收到确认后，将向客户端发送事务已完成的确认消息，事务随即在主服务器的事务日志中提交。


    异步模式的工作方式非常相似；不同之处在于，它不会在向客户端发送事务确认消息之前等待来自镜像的确认消息。这意味着事务在主服务器上提交到磁盘后，才被写入镜像上的磁盘。使用异步镜像将提高镜像性能，因为消除了同步镜像的延迟开销。这种性能提升的代价是，在发生灾难时，异步复制可能导致数据丢失，因为事务可能尚未在镜像上提交。图
    10-2 显示了异步镜像上的事务日志流；虚线表示这些动作不是直接执行的。


    ![../images/340881_2_En_10_Chapter/340881_2_En_10_Fig2_HTML.jpg](img/340881_2_En_10_Fig2_HTML.jpg)


    **图 10-2 异步镜像**


    ### 什么是 DBMIRROR_SEND 等待类型？


    `DBMIRROR_SEND` 等待类型最常与同步镜像配置相关。联机丛书中对 `DBMIRROR_SEND` 等待类型的描述是“当任务正在等待网络层上的通信积压清除以便能够发送消息时发生。表示通信层开始变得过载并影响数据库镜像数据吞吐量。”在这种情况下，联机丛书的描述相当准确，但网络并不是唯一可能影响
    `DBMIRROR_SEND` 等待时间的因素。例如，连接到镜像数据库的磁盘子系统速度慢也可能导致 `DBMIRROR_SEND` 等待时间增加。


    另一个需要记住的重要点是，高的 `DBMIRROR_SEND` 等待时间通常只记录在镜像实例上，而不是主服务器上。通常可以看到在主服务器和镜像上都发生 `DBMIRROR_SEND`
    等待类型的等待，但在主服务器上通常非常低。在镜像上它们仍然可能达到较高的值，因为一般来说，两个 SQL Server 实例之间总是存在一些延迟。由于预期的延迟，我建议您使用基线测量来识别
    `DBMIRROR_SEND` 等待类型的等待时间是否高于正常水平。

    '
- fmt: '# DBMIRROR_SEND Example


    For this example I have built a synchronous mirror between two of my test SQL
    Server instances, using the `AdventureWorks` database as the database that will
    be mirrored between both instances.


    Inside the `AdventureWorks` database, I create a simple table using the script
    in Listing [10-1](#340881_2_En_10_Chapter.xhtml#PC1).


    ```

    USE [AdventureWorks]

    GO

    CREATE TABLE Mirror_Test

    (

    ID UNIQUEIDENTIFIER PRIMARY KEY,

    RandomData VARCHAR(50)

    );

    Listing 10-1

    Create Mirror_Test table

    ```


    After the table is created, I clear the `sys.dm_os_wait_stats` DMV and insert
    10,000 rows into the `Mirror_Test` table using the query in Listing [10-2](#340881_2_En_10_Chapter.xhtml#PC2).
    I also make sure to clear the `sys.dm_os_wait_stats` DMV on the mirror as well
    before running the script in Listing [10-2](#340881_2_En_10_Chapter.xhtml#PC2).


    ```

    DBCC SQLPERF(''sys.dm_os_wait_stats, CLEAR'')

    INSERT INTO Mirror_Test

    (

    ID,

    RandomData

    )

    VALUES

    (

    NEWID(),

    CONVERT(VARCHAR(50), NEWID())

    );

    GO 10000

    Listing 10-2

    Insert 10,000 rows into Mirror_Test table

    ```


    While the script is running, I look at the `DBMIRROR_SEND` wait times on both
    the mirror and the principal using the following query:


    ```

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''DBMIRROR_SEND''

    ```


    The results of this query can be seen in Figure [10-3](#340881_2_En_10_Chapter.xhtml#Fig3),
    which shows the `DBMIRROR_SEND` wait times on the mirror. Figure [10-4](#340881_2_En_10_Chapter.xhtml#Fig4)
    shows the `DBMIRROR_SEND` wait times on the principal server.


    ![../images/340881_2_En_10_Chapter/340881_2_En_10_Fig4_HTML.jpg](images/340881_2_En_10_Chapter/340881_2_En_10_Fig4_HTML.jpg)

    **Figure 10-4** DBMIRROR_SEND wait times on the principal


    ![../images/340881_2_En_10_Chapter/340881_2_En_10_Fig3_HTML.jpg](images/340881_2_En_10_Chapter/340881_2_En_10_Fig3_HTML.jpg)

    **Figure 10-3** DBMIRROR_SEND wait times on the mirror


    As you can see, we spend quite some time waiting on the `DBMIRROR_SEND` wait type
    on the mirror vs. no `DBMIRROR_SEND` waits on the principal.


    # Lowering DBMIRROR_SEND Waits


    One of the most common pieces of advice for lowering `DBMIRROR_SEND` wait time
    is changing the mirror mode from synchronous to asynchronous. While this will
    absolutely lower the wait time, it also means you can potentially lose data when
    a disaster occurs on the principal. Lowering the wait time on the `DBMIRROR_SEND`
    wait type will have a positive effect on the duration of your queries. For instance,
    in the example in the previous section, the insert of 10,000 rows took around
    30 seconds on my test SQL Server mirror configuration. When I changed the mirror
    mode from synchronous to asynchronous, not only did the wait times on the `DBMIRROR_SEND`
    wait type go down, the total execution time of 10,000 inserts went down to 3 seconds.
    That’s an improvement of almost 30 seconds!


    Even though these improvements might sound very attractive, sometimes changing
    the mirror mode is not an option. For instance, your company’s disaster-recovery
    strategy can require a synchronous mirror configuration. Changing the mirror mode
    from synchronous to asynchronous should, in my opinion, be the last option (if
    it actually is a viable option). There are other parts that can influence `DBMIRROR_SEND`
    wait times, like the storage configuration on the mirror or the network connection
    between the principal and mirror SQL Server instances. Both these parts can act
    like a bottleneck between both instances, contributing to the `DBMIRROR_SEND`
    wait time.


    Next to checking out the performance of your storage subsystem and network connection,
    SQL Server has a database mirroring monitor that will give you status information
    about the mirroring configuration. You can find the database mirroring monitor
    by right-clicking the database that is part of a mirror, selecting Tasks ➤ Database
    Mirroring Monitor. Figure [10-5](#340881_2_En_10_Chapter.xhtml#Fig5) shows the
    monitor against my test mirror configuration.


    ![../images/340881_2_En_10_Chapter/340881_2_En_10_Fig5_HTML.jpg](images/340881_2_En_10_Chapter/340881_2_En_10_Fig5_HTML.jpg)

    **Figure 10-5** Database mirroring monitor


    As you can see, the database mirroring monitor can provide you with some very
    interesting additional information like the number of log records that still need
    to be sent or restored, how far behind the mirror currently is, and the send and
    restore rates. In many of my dealings with database mirroring, the database mirroring
    monitor is the first place I’ll check when there are performance issues involving
    the mirror configuration.


    # DBMIRROR_SEND Summary


    The `DBMIRROR_SEND` wait type is directly related to database mirroring. Seeing
    `DBMIRROR_SEND` waits occur is pretty normal on most mirror configurations. This
    makes using a baseline to identify wait time spikes a necessity. The mirroring
    mode plays a huge part in the `DBMIRROR_SEND` wait times. When using synchronous
    mirroring, `DBMIRROR_SEND` wait times will frequently be higher than when using
    asynchronous mirroring. Not only the mirroring mode influences `DBMIRROR_SEND`
    wait times, though. Having a storage subsystem on the mirror SQL Server instance
    that cannot keep up with the load will have an effect on `DBMIRROR_SEND` waits,
    just like the network connection between the principal and the mirror.


    # HADR_LOGCAPTURE_WAIT and HADR_WORK_QUEUE


    The `HADR_LOGCAPTURE_WAIT` and `HADR_WORK_QUEUE` wait types are both related to
    AlwaysOn Availability Groups. All wait types that are related to AlwaysOn can
    easily be identified by the `HADR_` prefix in the wait type’s name. AlwaysOn Availability
    Groups was introduced in SQL Server 2012 as a replacement for various SQL Server
    high-availability and disaster-recovery features such as database mirroring. There
    are quite a few different wait types associated with AlwaysOn, totaling 65 in
    SQL Server 2017. Not all of these wait types necessarily indicate performance
    problems somewhere in your AlwaysOn configuration. The `HADR_LOGCAPTURE_WAIT`
    and `HADR_WORK_QUEUE` are both perfect examples of benign wait types that occur
    naturally over time and do not directly indicate a performance problem. Since
    both these wait types have high wait times associated with them on every AlwaysOn
    configuration, and are thus very common, I wanted to include them in this chapter
    to help you better understand what function they have.'
