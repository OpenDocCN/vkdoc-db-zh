  trans: '

    ### 降低 ASYNC_NETWORK_IO 等待


    降低 `ASYNC_NETWORK_IO` 等待最“简单”的方法之一，是识别那些会向应用程序返回大型结果集的查询。例如，如果我们修改查询使其只返回前 100
    行，SQL Server Management Studio 可能就能跟上返回给它的信息：


    ```

    DBCC SQLPERF (''sys.dm_os_wait_stats'', CLEAR);

    SELECT TOP 100 *

    FROM Person.Person;

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''ASYNC_NETWORK_IO'';

    ```


    此修改后的等待时间可参见图 6-10。


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig10_HTML.jpg](img/340881_2_En_6_Fig10_HTML.jpg)


    图 6-10

    修改查询后的 ASYNC_NETWORK_IO 等待时间


    如你所见，这次我们没有遇到任何 `ASYNC_NETWORK_IO` 等待。SQL Server Management Studio 能够跟上返回的结果，因此我们查询的
    SQL Server 实例不必延迟向客户端发送结果。


    限制返回结果的另一种方法，是通过使用 `WHERE` 子句过滤掉应用程序根本不使用的信息。更小的结果集将导致更低的 `ASYNC_NETWORK_IO` 等待时间。


    如果你认为 `ASYNC_NETWORK_IO` 等待并非由返回应用程序的大型结果集或应用程序处理结果的速度引起，那么也有可能是你的网络配置拖慢了你。在这种情况下，你应该首先检查你的网络利用率。遗憾的是，Performance
    Monitor 中没有一个计数器能直接显示网络利用率而无需你进行一些计算。相反，你可以使用任务管理器的“联网”选项卡来查看你的网卡利用率，如图 6-11 所示。


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig11_HTML.jpg](img/340881_2_En_6_Fig11_HTML.jpg)


    图 6-11

    任务管理器网络利用率


    如果你在遇到高于正常的 `ASYNC_NETWORK_IO` 等待时间的同时，注意到网络利用率很高，那么可能是网络拖慢了你。在这种情况下，与你的网络管理员沟通可能是个好主意。通常，网络配置包含许多部分，如交换机、路由器、防火墙、网线、驱动程序、固件、操作系统的潜在虚拟化等等。所有这些部分都可能降低你的网络吞吐量，并可能是导致
    `ASYNC_NETWORK_IO` 等待的潜在原因。


    ### ASYNC_NETWORK_IO 总结


    `ASYNC_NETWORK_IO` 等待类型发生在应用程序通过网络从 SQL Server 实例请求查询结果，且无法足够快地处理返回的结果时。看到 `ASYNC_NETWORK_IO`
    等待发生是完全正常的，但高于正常的等待时间可能是由返回的查询结果发生变化或网络相关问题引起的。降低与应用程序相关的 `ASYNC_NETWORK_IO` 等待时间，可以通过减少返回给应用程序的行数和/或列数来实现。


    ## CMEMTHREAD


    `CMEMTHREAD` 等待类型与内存相关，表明某些 SQL Server 相关的内存对象存在压力。这些内存对象为 SQL Server 的各个部分（如缓冲区缓存和计划缓存）分配内存。每当发生
    `CMEMTHREAD` 等待时，意味着多个线程试图同时访问同一个内存对象。


    ### 什么是 CMEMTHREAD 等待类型？


    要解释 `CMEMTHREAD` 等待类型的产生机制，我们需要更深入地了解一些编程术语，特别是术语 *互斥*、*临界区* 和 *线程安全*。这三个概念在 `CMEMTHREAD`
    等待类型的产生中扮演着直接角色。


    临界区由一段访问共享资源的代码组成，该资源一次只能由一个线程访问。在我们的例子中，共享资源将是一个 SQL Server 内存对象。SQL Server 内存对象一次只能由一个线程访问，以确保不会发生内存对象损坏。因为有许多线程想要访问内存对象，所以我们必须使用一种方法来确保一次只有一个线程获得访问权。这种方法称为互斥。SQL
    Server 使用一个互斥体（Mutex）对象，以确保并发线程在访问内存对象时不会同时处于其临界区内。互斥体通过将线程对内存对象的访问串行化来实现这一点。只有一个线程可以成为互斥体对象的所有者，当一个线程拥有所有权时，它就可以访问共享资源。当该线程完成操作后，互斥体对象将移交给队列中的下一个线程。通过使用这些对象，我们创建了线程安全的代码，其中多个线程不会并发访问内存对象。图
    6-12 展示了这种情况。


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig12_HTML.jpg](img/340881_2_En_6_Fig12_HTML.jpg)


    图 6-12

    线程等待互斥体对象以访问共享资源


    一个简化的行为例子是，当你和其他一大群人正在等待一个唯一的取票机购买摇滚乐队演唱会的门票。在这个例子中，取票机是共享资源，一次只能由一个人访问。当我们到达取票机时，我们可以拿到一张票，而我们后面的人必须等到轮到他们的时间。在我们买完票后，队列中的下一个人获得取票机的访问权。


    我们也可以在 SQL Server 中观察这种行为，但要做到这一点，我们需要使用调试器（如 WinDbg）。图 6-13 显示了 SQL Server 中的一个线程如何等待互斥体，因为对内存对象的访问权被授予了另一个线程。为了捕获此图像，我使用了一个扩展事件会话，该会话在发生
    `CMEMTHREAD` 等待时创建了一个 SQL Server 小型转储。然后我使用 WinDbg 打开小型转储并返回了堆栈。


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig13_HTML.jpg](img/340881_2_En_6_Fig13_HTML.jpg)


    图 6-13

    小型转储中发生 CMEMTHREAD 等待的示例


    这里重要的行是 `SOS_UnfairMutexPair::LongWait`，它产生了 `CMEMTHREAD` 等待，因为我们在此监控的线程必须等待另一个当前拥有内存对象访问权的线程。其后的
    `SOS_UnfairMutexPair::AcquirePair` 表示该线程获得了互斥体，紧接着是访问由 `CMemThread<CmemObj>::Alloc`
    表示的内存对象。

