  trans: '### 降低 LOGBUFFER 和 WRITELOG 等待


    通常有两种方法可以降低 `LOGBUFFER` 和 `WRITELOG` 等待，但需谨记，`WRITELOG` 等待也会正常发生，只有当其等待时间异常偏高时才需要引起关注。


    第一种方法是仔细审视事务的执行方式。在前面的例子中，我们为每个 `INSERT` 语句都进行了隐式提交。这意味着一旦 `INSERT` 语句的日志记录进入日志缓冲区，它就需要再次被刷写。如果我们显式地提交整个
    `WHILE` 循环，我们将有更大的写入量需要刷写到事务日志，从而获得更好的性能。这是因为频繁写入小数据块通常比间隔较大地写入大数据块要慢。游标也可能产生与我们所用示例相同的效果，因此应尽量少用它们。


    另一种方法基于存储子系统。如果 SQL Server 无法足够快地写入日志记录，您可能会遇到 `LOGBUFFER` 和 `WRITELOG` 等待。作为最佳实践，请确保将事务日志与数据库数据文件分开存放在不同的磁盘上，这样在高负载情况下它们就不会相互影响。同时，使用
    Perfmon 中的磁盘性能计数器（如显示写入延迟的 `Avg. Disk sec/write` 和显示写入 IOPS 的 `Disk Writes/sec`）来监控事务日志所在的磁盘，并检查这些值是否在可接受的范围内。


    如果您的 SQL Server 实例运行的是 SQL Server 2014，您可以选择使用 `延迟持久性` 选项，该选项在 SQL Server 2014
    中引入。简而言之，启用此选项后，事务提交时将不再立即将日志缓冲区内容刷写到磁盘，而是等到日志缓冲区满（60 KB）后再将内容刷写到事务日志。通过启用此选项，您将面临这样的风险：那些已提交但尚未写入事务日志的事务，在发生故障时可能会丢失，因为它们只会在日志缓冲区满时才被写入事务日志。


    ### LOGBUFFER 和 WRITELOG 总结


    `LOGBUFFER` 和 `WRITELOG` 这两种等待类型都与 SQL Server 处理事务的方式有关。`WRITELOG` 等待类型在每次将日志记录写入事务日志时都会发生，通常无需担心。但当它与较高的
    `LOGBUFFER` 等待时间同时出现时，较高的 `WRITELOG` 等待时间可能表明事务日志存在压力。要降低这些等待时间，请尽量避免使用 `cursor`
    和 `WHILE` 语句，因为 `cursor` 或 `WHILE` 子句中的语句通常会被隐式提交，从而产生大量小型写入操作。同时检查您的存储配置，确保事务日志没有与数据库数据文件放在同一个驱动器上。如果仍然出现较高的等待时间，请分析事务日志所在磁盘的性能。


    ## RESOURCE_SEMAPHORE


    `RESOURCE_SEMAPHORE` 等待类型是一种与内存相关的等待类型，当查询内存请求无法立即获得批准时可能出现。这种等待可能发生在正经历内存压力的服务器上，或者当大量并发查询为排序或连接等昂贵操作请求内存时。


    ### RESOURCE_SEMAPHORE 等待类型是什么？


    在 SQL Server 中执行查询时，在实际执行之前会发生一系列步骤。第一步是生成已编译的计划。该计划包含满足查询请求所需的逻辑指令或操作。在生成已编译计划期间，会执行一个计算以确定执行查询所需的内存量，这取决于已编译计划中涉及的操作。一些需要内存的操作包括排序和连接，它们会临时将行数据存储在
    SQL Server 的内存中。执行这些排序或连接所需的最小内存量被称为 `required memory`，没有它查询根本无法执行。例如，如果排序过程中需要更多内存来在内存中存储行数据，它将被计算为
    `additional memory`。没有这些额外内存，查询仍然可以执行，但临时行数据将写入磁盘而不是内存。


    当查询执行时，将根据已编译计划中计算出的所需内存和额外内存值来确定内存授予。此内存授予需要在名为 `resource semaphore` 的内部对象上执行内存保留。资源信号量负责保留查询执行所需的内存，但它也在太多查询同时请求内存保留或当时没有足够可用内存时管理内存节流。它通过维护一个请求内存的查询队列来实现这一点。如果队列中没有查询且有新查询请求内存，资源信号量会将内存授予该查询（如果有足够的可用内存）。但是，如果存在队列，新查询将被放在队列末尾，它必须等待轮到自己才能获得内存授予。


    在资源信号量将请求的内存授予查询之前，它会检查是否有足够的可用内存来执行该查询。如果由于某种原因，可用内存量少于查询请求的内存量，该查询将再次被放入队列，直到有足够的内存可用。当一个查询在资源信号量队列中等待其请求的内存时，它在队列中花费的时间将被记录为
    `RESOURCE_SEMAPHORE` 等待类型。


    资源信号量可用的最大内存量是从缓冲区缓存中分配的。资源信号量最多可以从缓冲区缓存分配 75% 的内存用于内存授予，但单个查询获得的内存量永远不能超过此数量的
    25%。例如，如果我们有一个缓冲区缓存最大可达 500 MB 的 SQL Server，那么内存授予的最大值将是 375 MB。在此示例中，单个查询永远无法获得超过
    93 MB 的内存。向查询授予如此多的内存可能会出现问题，因为这些内存没有用于缓冲区缓存，这意味着需要更多的 IO 操作到存储子系统来检索和写入数据页。'
- fmt: '### RESOURCE_SEMAPHORE Example


    For this example we are going to execute a query against the `AdventureWorks`
    database that involves a sort operation. As I mentioned in the previous section,
    a query that involves a sort will request memory from the resource semaphore so
    as to perform the sort operation. We will also use the `Ostress` tool to create
    a situation where multiple queries are requesting memory, creating a queue at
    the resource semaphore.


    Let’s take a look at the query and the memory grant information that we will be
    executing in Listing 6-8.


    ```

    SELECT

    SalesOrderID,

    SalesOrderDetailID,

    ProductID,

    CarrierTrackingNumber

    FROM

    Sales.SalesOrderDetail

    ORDER BY CarrierTrackingNumber ASC

    Listing 6-8

    Sort query against the AdventureWorks database

    ```


    As you can see, this is a relatively simple query that returns some information
    from the `Sales.SalesOrderDetail` table, ordered by the `CarrierTrackingNumber`.


    If we enable the Include Actual Execution Plan option and execute the query, we
    can take a look at the amount of memory that was needed to execute it. The results
    on my test SQL Server are shown in Figure 6-19. You can access these properties
    by showing the Properties window (View ➤ Properties Window) or by pressing F4
    and selecting the `SELECT` operator.


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig19_HTML.jpg](images/340881_2_En_6_Chapter/340881_2_En_6_Fig19_HTML.jpg)


    Figure 6-19: `MemoryGrantInfo` inside the properties of the execution plan


    Because we requested the actual execution plan, we can also see the amount of
    memory that was granted to the query for execution. In this case the query got
    13,568 KB (13.5 MB) granted by the resource semaphore, as shown in the `GrantedMemory`
    property. The minimal amount of memory needed to execute the query, the required
    memory, was 512 KB, shown by the `RequiredMemory` property. The query asked for
    13,568 KB, as shown in the `DesiredMemory` property, which is the sum of the required
    and additional memory. We can see the query received what it asked for, since
    both the `GrantedMemory` and `DesiredMemory` have the same value.


    There are two other properties in Figure 6-19 I would like to point out, the `SerialDesiredMemory`
    and the `SerialRequiredMemory` properties. In the case of this query, both these
    properties have the same values as the `DesiredMemory` and `RequiredMemory` properties.
    This is because the query was performed without using parallelism. When you use
    parallelism in your queries, more memory is needed to perform the sort operation
    since work is split up among threads. Figure 6-20 shows the `MemoryGrantInfo`
    properties when I forced the query in Listing 6-8 to use parallelism, spreading
    the work among four threads.


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig20_HTML.jpg](images/340881_2_En_6_Chapter/340881_2_En_6_Fig20_HTML.jpg)


    Figure 6-20: `MemoryGrantInfo` properties when executing a parallel query


    As you can see, the `SerialRequiredMemory` has the same value as when we executed
    the query serially. The `RequiredMemory` and `RequestedMemory` have increased
    in size so that the sort operation can be completed using parallelism. You should
    keep this information in mind when you run into memory-related issues and when
    many of your queries involve sort and join operations that are performed using
    parallelism, since parallelism simply requires more memory.


    Now that we know how much memory is needed to execute the query in Listing 6-8,
    let’s use `Ostress` to execute the query using multiple connections. Before I
    start `Ostress`, I must change the maximum server memory value to 250 MB using
    the following query:


    ```

    EXEC sys.sp_configure N''max server memory (MB)'', N''250''

    GO

    RECONFIGURE WITH OVERRIDE

    GO

    ```


    I saved the query in Listing 6-8 to a `.sql` file named `resource_semaphore.sql`
    and executed `Ostress` using the following command line: `"C:\Program Files\Microsoft
    Corporation\RMLUtils\ostress.exe" -E -dAdventureWorks -i"C:\resource_semaphore.sql"
    -n20 -r1 -q`


    This will execute the `resource_semaphore.sql` script against the `AdventureWorks`
    database with 20 concurrent connections, with each connection performing the query
    one time.


    While `Ostress` is running, I query the `sys.dm_os_waiting_tasks` DMV, looking
    for `RESOURCE_SEMAPHORE` waits; some of the results are shown in Figure 6-21.


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig21_HTML.jpg](images/340881_2_En_6_Chapter/340881_2_En_6_Fig21_HTML.jpg)


    Figure 6-21: `RESOURCE_SEMAPHORE` waits in the `sys.dm_os_waiting_tasks` DMV


    Because we set our maximum server memory to 250 MB, and each query requests 13.25
    MB memory, we do not have enough memory free to grant all the memory requested.
    This will result in the `RESOURCE_SEMAPHORE` wait type you can see in Figure 6-21.


    There are various other resources we can use to analyze `RESOURCE_SEMAPHORE` waits.
    The resource semaphores themselves have their own DMV, `sys.dm_exec_query_resource_semaphores`,
    which will return information about their memory consumption and outstanding and
    waiting grants. Figure 6-22 shows the results of the query that follows against
    the `sys.dm_exec_query_resource_semaphores` DMV, while running the `Ostress` workload:


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig22_HTML.jpg](images/340881_2_En_6_Chapter/340881_2_En_6_Fig22_HTML.jpg)


    Figure 6-22: `sys.dm_exec_query_resource_semaphores`


    ```

    SELECT

    target_memory_kb,

    max_target_memory_kb,

    total_memory_kb,

    available_memory_kb,

    granted_memory_kb,

    grantee_count,

    waiter_count

    FROM sys.dm_exec_query_resource_semaphores

    WHERE pool_id = 2

    ```


    I am filtering out `pool_id` 1 because this pool will not handle user queries.


    As you might have noticed, two rows are returned. This is because there are actually
    two different resource semaphores. The top row is the “regular” resource semaphore.
    This will handle queries that request more than 5 MB memory. The second row (identified
    by the `NULL` value of the `max_target_memory_kb` column) returns information
    for the “small” resource semaphore, which handles queries that are smaller than
    5 MB. Because our query requested more than 5 MB of memory, we will receive our
    memory grants from the regular resource semaphore.


    Let’s go through the various columns that are returned by the query against the
    `sys.dm_exec_query_resource_semaphores` DMV:


    *   The `target_memory_kb` column returns the amount of memory in KB that this
    resource semaphore plans to use as a maximum amount of memory it can grant to
    queries.


    *   The `max_target_memory_kb` column returns the maximum amount of memory this
    resource semaphore could grant.


    *   The `total_memory_kb` column returns the total memory held by the resource
    semaphore and is the sum of the `available_memory_kb` and the `granted_memory_kb`.


    *   The `granted_memory_kb` returns the amount of memory that is granted to queries
    at this time.


    *   The `grantee_count` and `waiter_count` columns return the amount of grants
    that have currently been satisfied or are waiting in the resource semaphore queue.


    From this information we can see that the information returned by the `granted_memory_kb`
    column is correct, and that our test queries are requesting the memory grants.
    We know from the execution plan that our test query will request 13,568 KB. Since
    the `grantee_count` column shows us that two memory requests are granted, we can
    multiply the amount of memory requests with the amount of memory per query (2
    × 13,568 KB), which ends up being 27,136 KB, the amount of granted memory in Figure
    6-22.'
