  trans: '

    ### LATCH_[xx] 概述


    `LATCH_[xx]` 等待类型代表 SQL Server 内部大量不同的、与缓冲区无关的闩锁类所遇到的等待。这些与缓冲区无关的闩锁类拥有自己专属的闩锁等待
    DMV，即 `sys.dm_os_latch_waits`，它会返回这些闩锁类的等待时间。对 `LATCH_[xx]` 等待进行故障排除可能很困难，因为与此等待类型关联的闩锁类文档非常少。值得庆幸的是，`LATCH_[xx]`
    等待类型出现高等待时间的情况并不常见，因为它们只在非常特定的情况和工作负载下才会发生。


    ## PAGEIOLATCH_[xx]


    本章我们将讨论的最后一种与闩锁相关的等待类型是 `PAGEIOLATCH_[xx]` 等待类型。`PAGEIOLATCH_[xx]` 等待类型是目前最常见的一种与闩锁相关的等待类型，它与
    `CXPACKET` 等待类型并列为任何 SQL Server 实例上最常见的等待类型。


    就像我们之前讨论的两种闩锁等待类型一样，`PAGEIOLATCH_[xx]` 也有不同的访问模式，我在本章中用 `[xx]` 代替了它们。由于我们已经在引言部分描述了不同的闩锁模式，因此本章将不再进一步讨论它们。


    到目前为止，我们已经讨论了三种与闩锁相关的等待类型中的两种及其相关领域。`PAGELATCH_[xx]` 等待类型与在缓冲区缓存内的内存页上放置的闩锁有关，而
    `LATCH_[xx]` 等待类型则与非缓冲区对象上的闩锁有关。`PAGEIOLATCH_[xx]` 等待类型也指示了 SQL Server 中特定区域的闩锁使用情况，在此例中是指
    I/O 闩锁。


    ### PAGEIOLATCH_[xx] 等待类型是什么？


    SQL Server 内部的磁盘操作开销非常大。访问系统的磁盘子系统需要额外的资源，并且总是比访问系统内存中的信息要慢。由于 SQL Server 是一个数据库，并且访问和存储数据库内的数据是其主要功能，因此
    SQL Server 访问数据的方式极其重要。如果数据访问速度慢，SQL Server 的运行速度也会变慢，这可能会导致查询或应用程序出现明显的性能下降。为了使
    I/O 交互尽可能高效，SQL Server 使用一个缓冲区缓存，将先前访问过的数据页缓存到系统的内存中。通过缓存数据页，SQL Server 只需在首次查询请求这些特定数据页时访问一次磁盘子系统。当后续查询需要与首次查询相同的数据页时，SQL
    Server 将通过缓冲区管理器检测到这些页已在缓冲区缓存中，并从缓冲区缓存内部访问数据页，而不是与磁盘子系统进行额外的交互。图 9-23 展示了当查询需要来自存储子系统的数据页时的缓冲区缓存行为。


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig23_HTML.jpg](img/340881_2_En_9_Fig23_HTML.jpg)


    图 9-23 将页从存储子系统移动到缓冲区缓存


    在将数据页从存储子系统移动到缓冲区缓存的过程中，会使用闩锁为存储子系统上的数据页在缓冲区缓存中“预留”一个缓冲页。这确保了没有其他并发事务分配同一个缓冲页，或者同时尝试将同一个数据页从存储子系统传输到缓冲区缓存。


    当 SQL Server 正在将数据页从存储子系统传输到缓冲区缓存时，会对该缓冲页放置一个独占 (Exclusive) 闩锁。由于独占闩锁几乎与所有其他闩锁模式都不兼容（保留
    (Keep) 模式除外），这保证了在数据页传输期间，没有其他闩锁可以访问该缓冲页。从用户的角度来看，在整个数据页传输期间都会记录一个 `PAGEIOLATCH_[xx]`
    等待。该闩锁的模式取决于引发数据页从存储子系统移动到缓冲区缓存的操作。如果数据是因读取访问而移动的，则记录 `PAGEIOLATCH_SH`；如果数据页是因修改操作而移动的，则使用
    `PAGEIOLATCH_UP` 或 `PAGEIOLATCH_EX`。图 9-24 展示了数据页移动过程，包括闩锁和闩锁等待。


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig24_HTML.jpg](img/340881_2_En_9_Fig24_HTML.jpg)


    图 9-24 数据页的移动


    总结以上内容，如果你看到发生了 `PAGEIOLATCH_[xx]` 等待，这意味着你的 SQL Server 实例正在从存储子系统将数据读入缓冲区缓存。因为这是一个非常常见的操作，所以很容易理解为什么
    `PAGEIOLATCH_[xx]` 等待类型是任何 SQL Server 实例上最常见的等待类型之一。


    ### PAGEIOLATCH_[xx] 示例


    为 `PAGEIOLATCH_[xx]` 等待创建一个示例极其简单——只需对一个刚重启的 SQL Server 实例运行一个 `SELECT` 查询即可。重启
    SQL Server 服务将清空缓冲区缓存中的所有数据页。这将使你得到一个不含任何用户数据的缓冲区缓存。不过，还有另一种无需重启 SQL Server 服务即可清空缓冲区缓存的方法。运行
    `DBCC DROPCLEANBUFFERS` 命令将从缓冲区缓存中移除所有未修改的数据页。将其与 `CHECKPOINT` 命令结合使用，可确保修改过的页也被写入磁盘，从而得到一个空的，或称“冷”的缓冲区缓存。


    清单 9-3 中的查询将执行一个 `CHECKPOINT`，然后是 `DBCC DROPCLEANBUFFERS`。接着，它将重置 `sys.dm_os_wait_stats`
    DMV 并对 `AdventureWorks` 数据库运行一个查询。在对 `AdventureWorks` 数据库内的一些表执行查询后，我们将查询 `sys.dm_os_wait_stats`
    DMV 以查看 `PAGEIOLATCH_[xx]` 等待。


    ```sql

    CHECKPOINT 1;

    GO

    DBCC DROPCLEANBUFFERS;

    GO

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    GO

    SELECT

    SOD.SalesOrderID,

    SOD.CarrierTrackingNumber,

    SOH.CustomerID,

    C.AccountNumber,

    SOH.OrderDate,

    SOH.DueDate

    FROM Sales.SalesOrderDetail SOD

    INNER JOIN Sales.SalesOrderHeader SOH

    ON SOD.SalesOrderID = SOH.SalesOrderID

    INNER JOIN Sales.Customer C

    ON SOH.CustomerID = C.CustomerID;

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type LIKE ''PAGEIOLATCH_%'';

    ```


    清单 9-3 生成 `PAGEIOLATCH_SH` 等待


    图 9-25 显示了我的测试 SQL Server 实例上最后一个查询对 `sys.dm_os_wait_stats` DMV 的查询结果。


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig25_HTML.jpg](img/340881_2_En_9_Fig25_HTML.jpg)


    图 9-25 `PAGEIOLATCH_SH` 等待时间信息


    只看到记录了 `PAGEIOLATCH_SH` 等待是有道理的，因为我们执行的是 `SELECT` 查询而不是进行数据修改。如果我们要对行执行某种形式的数据修改，我们将在结果中看到
    `PAGEIOLATCH_EX` 等待。

    '
- fmt: '### Lowering PAGEIOLATCH_[xx] Waits


    If you read the previous section, you would probably understand that seeing `PAGEIOLATCH_[xx]`
    waits occur is completely normal behavior inside SQL Server. In many cases your
    databases are larger in size than the available amount of RAM inside your system,
    and some interaction with the storage subsystem is to be expected. Even if your
    databases are smaller than the amount of RAM in your system, and they can fit
    entirely inside the buffer cache, you will still notice `PAGEIOLATCH_[xx]` waits
    occurring during the startup of SQL Server, since this is the time SQL Server
    will start moving data pages from the storage subsystem into the buffer cache
    (if there is any query activity, SQL Server won’t move data from the storage subsystem
    into the buffer cache by itself).


    Since seeing `PAGEIOLATCH_[xx]` waits occur is completely normal for every SQL
    Server instance, it is very important to maintain a baseline of the wait times
    (Chapter [4](#340881_2_En_4_Chapter.xhtml), “Building a Solid Baseline,” can help
    you with that). When the wait times stay within the range of the baseline values
    for this wait type, there shouldn’t be any cause for concern. If wait times are
    much higher than you expect them to be, investigation into the source of the higher-than-normal
    wait times might be necessary. There are quite a few possible causes for seeing
    higher-than-normal `PAGEIOLATCH_[xx]` wait times, and I will describe some of
    the more common ones.


    The first place I look when noticing higher-than-normal `PAGEIOLATCH_[xx]` wait
    times is the SQL Server log to find out if SQL Server was restarted. SQL Server
    can restart due to a crash, but also when a failover occurs. These events will
    cause high `PAGEIOLATCH_[xx]` wait times that might not be reflected in your baseline,
    especially when SQL Server restarts do not frequently occur. Since our baseline’s
    measurements are frequently calculated using average values, the `PAGEIOLATCH_[xx]`
    wait times during SQL Server startup slowly lower when more measurements are taken
    inside the average baseline. If you create your baseline on measurements taken
    between a specific time range, and SQL Server hasn’t had a restart during the
    time range, your baseline measurements will also be considerably lower. As we
    read in the example section, a `DBCC DROPCLEANBUFFERS` will also remove data pages
    from the buffer cache, resulting in higher `PAGEIOLATCH_[xx]` wait times after
    the command completes. Sadly, unlike the `DBCC FREEPROCCACHE` command, the execution
    of the `DBCC DROPCLEANBUFFERS` command is not recorded in the SQL Server log.


    One of the more common pieces of advice I see about lowering `PAGEIOLATCH_[xx]`
    wait times is to focus your attention on the storage subsystem. Since the `PAGEIOLATCH_[xx]`
    wait type indicates data movement from your storage subsystem to your buffer cache,
    it is logical that the storage subsystem plays a vital role in the wait times,
    but do not automatically assume this is the root cause! If you do have storage-related
    problems, this can show in the `PAGEIOLATCH_[xx]` wait time, so checking the performance
    of your storage subsystem is worth the effort.


    A good place to start for monitoring storage performance is Perfmon. Perfmon has
    a variety of counters that will show you the current performance of your storage
    subsystem. Those in the following list are the ones I use the most when monitoring
    storage performance:


    *   `PhysicalDisk\Avg. Disk sec/Read`: This will show you the average read latency
    on the disk you are monitoring. Less latency is better, and as a general guideline
    latency values should be below 20 milliseconds (0.020 within Perfmon, as it reports
    the latency in seconds).


    *   `PhysicalDisk\Avg. Disk sec/Write`: This will return the average write latency
    on the disk you are monitoring. Just like the read latency, write latency should,
    as a general guideline, be below 20 milliseconds.


    *   `PhysicalDisk\Disk Reads/sec`: This shows the amount of read IOPS (Input Output
    Operations) per second. This information can be helpful if you are running into
    capacity issues on the disk.


    *   `PhysicalDisk\Disk Writes/sec`: The same as the `PhysicalDisk\Disk Reads/sec`,
    but this one shows the amount of write IOPS.


    *   `PhysicalDisk\Disk Read Bytes/sec`: This counter shows the amount of bytes
    read from the disk per second. Again, this information can be useful for detecting
    possible capacity problems.


    *   `PhysicalDisk\Disk Write Bytes/sec`: This is identical to the `PhysicalDisk\Disk
    Read Bytes/sec`, but this counter shows the amount of bytes written to disk per
    second.


    Using the information these Perfmon measurements provide, you should be able to
    identify possible storage-related bottlenecks. This information can also be helpful
    to the storage administrator (if there is one) who can compare these measurements
    to the measurements of the storage he/she manages.


    As an extra diagnostic tool, or if you cannot use Perfmon, you can also run the
    IO performance script Paul Randal created based on the `sys.dm_io_virtual_file_stats`
    DMF, shown in Listing [9-4](#340881_2_En_9_Chapter.xhtml#PC25). The script, and
    the blog post describing the script, can be found on Paul’s blog at [`www.sqlskills.com/blogs/paul/how-to-examine-io-subsystem-latencies-from-within-sql-server/`](http://www.sqlskills.com/blogs/paul/how-to-examine-io-subsystem-latencies-from-within-sql-server/).


    ```sql

    SELECT

    [ReadLatency] =

    CASE WHEN [num_of_reads] = 0

    THEN 0 ELSE ([io_stall_read_ms] / [num_of_reads]) END,

    [WriteLatency] =

    CASE WHEN [num_of_writes] = 0

    THEN 0 ELSE ([io_stall_write_ms] / [num_of_writes]) END,

    [Latency] =

    CASE WHEN ([num_of_reads] = 0 AND [num_of_writes] = 0)

    THEN 0 ELSE ([io_stall] / ([num_of_reads] + [num_of_writes])) END,

    [AvgBPerRead] =

    CASE WHEN [num_of_reads] = 0

    THEN 0 ELSE ([num_of_bytes_read] / [num_of_reads]) END,

    [AvgBPerWrite] =

    CASE WHEN [num_of_writes] = 0

    THEN 0 ELSE ([num_of_bytes_written] / [num_of_writes]) END,

    [AvgBPerTransfer] =

    CASE WHEN ([num_of_reads] = 0 AND [num_of_writes] = 0)

    THEN 0 ELSE

    (([num_of_bytes_read] + [num_of_bytes_written]) /

    ([num_of_reads] + [num_of_writes])) END,

    LEFT ([mf].[physical_name], 2) AS [Drive],

    DB_NAME ([vfs].[database_id]) AS [DB],

    [mf].[physical_name]

    FROM

    sys.dm_io_virtual_file_stats (NULL,NULL) AS [vfs]

    JOIN sys.master_files AS [mf]

    ON [vfs].[database_id] = [mf].[database_id]

    AND [vfs].[file_id] = [mf].[file_id]

    -- WHERE [vfs].[file_id] = 2 -- log files

    ORDER BY [Latency] DESC

    -- ORDER BY [ReadLatency] DESC

    -- ORDER BY [WriteLatency] DESC;

    GO

    ```


    Listing 9-4

    IO performance script


    Figure [9-26](#340881_2_En_9_Chapter.xhtml#Fig26) shows a part of the results
    of the IO performance script from Listing [9-4](#340881_2_En_9_Chapter.xhtml#PC25)
    on my test SQL Server instance, ordered by latency.


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig26_HTML.jpg](images/340881_2_En_9_Chapter/340881_2_En_9_Fig26_HTML.jpg)


    Figure 9-26

    IO performance on my test SQL Server instance


    One important thing to keep in mind with the IO performance script is that its
    values are cumulative from the start of the SQL Server service. They do not show
    the situation at the moment of executing the query. If you are interested in monitoring
    your IO performance using this script, you can consider capturing the output to
    a table at a specific interval and calculate the deltas (much in the same way
    as we did in Chapter [4](#340881_2_En_4_Chapter.xhtml), “Building a Solid Baseline”).'
