    generate a few `WRITE_COMPLETION` waits.


    ```

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    DBCC CHECKDB (''AdventureWorks'');

    SELECT * FROM sys.dm_os_wait_stats

    WHERE wait_type = ''WRITE_COMPLETION'';

    Listing 6-12

    Generate WRITE_COMPLETION waits

    ```


    The results of the last query in the batch are shown in Figure [6-32](#340881_2_En_6_Chapter.xhtml#Fig32).


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig32_HTML.jpg](images/340881_2_En_6_Chapter/340881_2_En_6_Fig32_HTML.jpg)


    Figure 6-32


    WRITE_COMPLETION waits


    As you can see, the amount of wait time is so low that it would not be a cause
    of any concern. This is also partly due to the fact that the `AdventureWorks`
    database is very small and the storage performance of my test machine is very
    fast. Running `CHECKDB` against larger databases can result in higher wait times.


    ### Lowering WRITE_COMPLETION Waits


    If you see high `WRITE_COMPLETION` wait times, try to find out what process is
    generating the waits. In many cases it will be caused by a `CHECKDB` or database
    data or log file growth.


    One thing worth checking is the instant file initialization option discussed in
    the `ASYNC_IO_COMPLETION` section earlier in this chapter. Not using this option
    can impact the duration of the `WRITE_COMPLETION` wait time.


    Another, far less common cause for a higher `WRITE_COMPLETION` wait time is when
    you are experiencing page latch contention on your Page Free Space page (or PFS).
    The PFS page tracks the amount of free space in data pages. If a process needs
    to modify the PFS page very frequently, it is possible to see `WRITE_COMPLETION`
    waits occur along with many `PAGELATCH_UP` waits, which we will discuss in Chapter
    [9](#340881_2_En_9_Chapter.xhtml), “Latch-Related Wait Types.” To give you an
    example of such a scenario, consider a high amount of concurrent queries that
    all create a temporary table, insert a few rows, and remove the temporary table
    again. In this case the PFS page of the `tempdb` database needs to get updates
    very frequently to reflect the creation and removal of the temporary tables.


    ### WRITE_COMPLETION Summary


    The `WRITE_COMPLETION` wait type, just like the `ASYNC_IO_COMPLETION` and `IO_COMPLETION`
    wait types, is related to specific storage-related actions performed by SQL Server.
    Seeing `WRITE_COMPLETION` waits is very normal and won’t be cause for concern
    in many situations. Operations such as `CHECKDB` and database data or log file
    growth can cause `WRITE_COMPLETION` waits.


    # 7. Backup-Related Wait Types


    Backups are a very important part of database administration, and in many cases
    they are essential for the survival of the company you work for. Data has become
    so important for businesses that if some disaster causes data to be lost, companies
    can lose large amounts of money, or even go out of business.


    There are many methods we can implement on all levels of your IT infrastructure
    to make sure no data is lost (or as little as possible) during a disaster. We
    could implement a SAN to make sure our data is not stored on a local disk drive
    on your server. Or we could design SQL Server AlwaysOn Availability Groups to
    replicate our data across datacenters. But the first step we should take, and
    hopefully have already taken, is performing regular backups of our data inside
    our SQL Server databases.


    Implementing and scheduling SQL Server backups is not a very difficult task, and
    there is no excuse not to perform a backup. The type of backup and the interval
    of backup operations are dictated by the needs of the organization you work for
    and are frequently expressed in “RTO” (Recovery Time Objective) and “RPO” (Recovery
    Point Objective) times. These times represent the amount of time it should take
    to recover from a disaster and the amount of data loss that is acceptable when
    a disaster occurs. These two times should be the primary input for your SQL Server
    backup strategy.


    Thankfully, SQL Server has different options available to us for meeting RTO and
    RPO requirements right out of the box. This means we can use SQL Server’s own
    backup mechanism to fulfill our company’s RTO and RPO times; we are not necessarily
    dependent on third-party backup software. Since the SQL Server backup operation
    is an internal process, there are different wait types associated with it, and
    in this chapter we will take a look at three of the most common wait types that
    are directly related to performing backups and restores.


    Noticing high wait times on these backup/restore-related wait types will not likely
    lead to a performance degradation of your SQL Server instance. However, we do
    have options to optimize the SQL Server backup process that can result in faster
    backup and restore times. And since backups/restores of your database(s) are vital
    for the survival of your company, optimizing backup and restore throughput can
    be well worth the effort.


    ## BACKUPBUFFER


    The first backup-related wait types we will discuss is `BACKUPBUFFER`. If we look
    up the definition of this wait type on Books Online we would get the following
    text: “Occurs when a backup task is waiting for data, or is waiting for a buffer
    in which to store data. This type is not typical, except when a task is waiting
    for a tape mount.” Apparently, we would only see this wait type when we are writing
    our backups to a tape device, and this is wrong. `BACKUPBUFFER` waits will practically
    always be logged during a backup operation, no matter the destination of the backup
    file. The reason for this is in the way the SQL Server backup operation uses buffers
    to read data from the database and write it to the backup file.'
  trans: '

    ### WRITE_COMPLETION 等待示例


    为了向你展示一个 `WRITE_COMPLETION` 等待发生的例子，我将使用 `DBCC SQLPERF(''sys.dm_os_wait_stats'',
    CLEAR)` 命令清除 `sys.dm_os_wait_stats` DMV 后，对 `AdventureWorks` 数据库执行一次 `CHECKDB`。


    请记住，此示例是 `WRITE_COMPLETION` 等待可能发生的完全正常情况，它不应阻止你执行常规的数据库一致性检查！


    清单 6-12 展示了我为生成一些 `WRITE_COMPLETION` 等待而执行的查询。


    ```sql

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    DBCC CHECKDB (''AdventureWorks'');

    SELECT * FROM sys.dm_os_wait_stats

    WHERE wait_type = ''WRITE_COMPLETION'';

    ```

    **清单 6-12** 生成 WRITE_COMPLETION 等待


    批处理中最后一个查询的结果如图 6-32 所示。


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig32_HTML.jpg](img/340881_2_En_6_Fig32_HTML.jpg)


    **图 6-32** WRITE_COMPLETION 等待


    如你所见，等待时间量非常低，不会引起任何担忧。这部分也是由于 `AdventureWorks` 数据库非常小，并且我的测试机存储性能非常快。对更大的数据库运行
    `CHECKDB` 可能会导致更高的等待时间。


    ### 降低 WRITE_COMPLETION 等待


    如果你看到 `WRITE_COMPLETION` 等待时间很高，尝试找出是哪个进程导致了这些等待。在许多情况下，这可能是由 `CHECKDB` 或数据库数据/日志文件增长引起的。


    一个值得检查的事情是本章前面在 `ASYNC_IO_COMPLETION` 部分讨论的即时文件初始化选项。不使用此选项可能会影响 `WRITE_COMPLETION`
    等待时间的持续时间。


    另一个导致 `WRITE_COMPLETION` 等待时间较高的、远不常见的原因是当你在页面空闲空间页（或 PFS）上遇到页面闩锁争用时。PFS 页跟踪数据页中的空闲空间量。如果一个进程需要非常频繁地修改
    PFS 页，就有可能看到 `WRITE_COMPLETION` 等待与许多 `PAGELATCH_UP` 等待一起发生，我们将在第 9 章“与闩锁相关的等待类型”中讨论。为了给你这样一个场景的例子，考虑大量并发查询，它们都创建一个临时表，插入几行，然后再次删除临时表。在这种情况下，`tempdb`
    数据库的 PFS 页需要非常频繁地更新以反映临时表的创建和删除。


    ### WRITE_COMPLETION 总结


    `WRITE_COMPLETION` 等待类型，就像 `ASYNC_IO_COMPLETION` 和 `IO_COMPLETION` 等待类型一样，与 SQL
    Server 执行的特定存储相关操作有关。看到 `WRITE_COMPLETION` 等待是非常正常的，在许多情况下不会引起担忧。诸如 `CHECKDB`
    和数据库数据/日志文件增长等操作可能导致 `WRITE_COMPLETION` 等待。


    # 7. 与备份相关的等待类型


    备份是数据库管理中非常重要的一部分，在许多情况下，它们对你所在公司的生存至关重要。数据对业务变得如此重要，如果某些灾难导致数据丢失，公司可能会损失大量资金，甚至倒闭。


    我们可以在 IT 基础架构的各个层面实施许多方法，以确保在灾难期间数据不会丢失（或尽可能少丢失）。我们可以实施 SAN 以确保我们的数据不存储在服务器的本地磁盘驱动器上。或者我们可以设计
    SQL Server AlwaysOn 可用性组以跨数据中心复制我们的数据。但我们应该采取，并且希望已经采取的第一步，是在我们的 SQL Server 数据库内执行定期备份。


    实施和安排 SQL Server 备份不是一项非常困难的任务，没有理由不执行备份。备份的类型和备份操作的间隔由你所工作的组织的需求决定，并通常以“RTO”（恢复时间目标）和“RPO”（恢复点目标）时间表示。这些时间代表从灾难中恢复所需的时间量以及灾难发生时可接受的数据丢失量。这两个时间应该是你
    SQL Server 备份策略的主要输入。


    值得庆幸的是，SQL Server 开箱即用提供了不同的选项来满足 RTO 和 RPO 要求。这意味着我们可以使用 SQL Server 自己的备份机制来满足我们公司的
    RTO 和 RPO 时间；我们不一定依赖第三方备份软件。由于 SQL Server 备份操作是一个内部过程，因此与之关联了不同的等待类型，在本章中，我们将查看与执行备份和还原直接相关的三种最常见的等待类型。


    注意到这些备份/还原相关等待类型上的高等待时间，不太可能导致 SQL Server 实例的性能下降。但是，我们确实可以选择优化 SQL Server 备份过程，从而缩短备份和还原时间。由于数据库的备份/还原对你公司的生存至关重要，优化备份和还原吞吐量非常值得付出努力。


    ## BACKUPBUFFER


    我们将讨论的第一个与备份相关的等待类型是 `BACKUPBUFFER`。如果我们在在线手册上查找此等待类型的定义，会得到以下文本：“当备份任务正在等待数据，或正在等待存储数据的缓冲区时发生。此类型不常见，除非任务正在等待磁带装载。”
    显然，我们只会在将备份写入磁带设备时看到这种等待类型，但这是错误的。无论备份文件的目标是什么，在备份操作期间实际上总是会记录 `BACKUPBUFFER`
    等待。原因在于 SQL Server 备份操作使用缓冲区从数据库读取数据并将其写入备份文件的方式。

