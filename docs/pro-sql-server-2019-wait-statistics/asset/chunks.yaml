  trans: '### 降低 `PAGEIOLATCH_[xx]` 等待


    如果你阅读了前一节，你可能会理解，看到 `PAGEIOLATCH_[xx]` 等待发生是 SQL Server 内部完全正常的行为。在许多情况下，你的数据库大小超过了系统中可用的
    RAM 量，因此与存储子系统发生一些交互是意料之中的。即使你的数据库小于系统中的 RAM 量，并且可以完全放入缓冲区缓存中，在 SQL Server 启动期间，你仍然会注意到
    `PAGEIOLATCH_[xx]` 等待的发生，因为这是 SQL Server 开始将数据页从存储子系统移入缓冲区缓存的时间（如果有任何查询活动，SQL
    Server 自身不会将数据从存储子系统移入缓冲区缓存）。


    既然看到 `PAGEIOLATCH_[xx]` 等待发生对于每个 SQL Server 实例来说都是完全正常的，那么为等待时间维护一个基准就非常重要（第 4
    章“构建一个可靠的基准”可以帮到你）。当等待时间保持在该等待类型的基准值范围内时，就不应该有任何担忧的原因。如果等待时间远高于你的预期，可能有必要调查高于正常等待时间的来源。导致看到高于正常水平的
    `PAGEIOLATCH_[xx]` 等待时间的原因有很多，我将描述一些比较常见的原因。


    当我注意到高于正常水平的 `PAGEIOLATCH_[xx]` 等待时间时，我首先查看的是 SQL Server 日志，以查明 SQL Server 是否已重启。SQL
    Server 可能因为崩溃而重启，也可能在发生故障转移时重启。这些事件将导致高的 `PAGEIOLATCH_[xx]` 等待时间，这可能不会反映在你的基准中，尤其是在
    SQL Server 重启不频繁发生的情况下。由于我们的基准测量通常使用平均值进行计算，随着更多测量值被纳入平均基准中，SQL Server 启动期间的 `PAGEIOLATCH_[xx]`
    等待时间会逐渐降低。如果你在特定时间范围内获取的测量值上创建基准，并且在此时间范围内 SQL Server 没有重启，那么你的基准测量值也会显著降低。正如我们在示例部分读到的，`DBCC
    DROPCLEANBUFFERS` 也会从缓冲区缓存中移除数据页，导致命令完成后出现更高的 `PAGEIOLATCH_[xx]` 等待时间。遗憾的是，与 `DBCC
    FREEPROCCACHE` 命令不同，执行 `DBCC DROPCLEANBUFFERS` 命令不会记录在 SQL Server 日志中。


    我看到关于降低 `PAGEIOLATCH_[xx]` 等待时间的一个比较常见的建议是，将注意力集中在存储子系统上。由于 `PAGEIOLATCH_[xx]`
    等待类型表示数据从你的存储子系统移动到缓冲区缓存，因此存储子系统在等待时间中扮演着至关重要的角色是合乎逻辑的，但不要自动假设这是根本原因！如果你确实存在与存储相关的问题，这可能会在
    `PAGEIOLATCH_[xx]` 等待时间中体现出来，因此检查存储子系统的性能是值得的。


    开始监控存储性能的一个好地方是性能监视器 (Perfmon)。Perfmon 有各种计数器，可以显示存储子系统的当前性能。以下列表中的那些是我在监控存储性能时最常用的：


    *   `PhysicalDisk\Avg. Disk sec/Read`：这将显示你正在监控的磁盘上的平均读取延迟。延迟越低越好，作为一般准则，延迟值应低于
    20 毫秒（在 Perfmon 中为 0.020，因为它以秒为单位报告延迟）。

    *   `PhysicalDisk\Avg. Disk sec/Write`：这将返回你正在监控的磁盘上的平均写入延迟。与读取延迟一样，作为一般准则，写入延迟应低于
    20 毫秒。

    *   `PhysicalDisk\Disk Reads/sec`：这显示每秒的读取 IOPS（输入输出操作）数量。如果你的磁盘遇到容量问题，这些信息可能会有所帮助。

    *   `PhysicalDisk\Disk Writes/sec`：与 `PhysicalDisk\Disk Reads/sec` 相同，但这一个显示写入
    IOPS 的数量。

    *   `PhysicalDisk\Disk Read Bytes/sec`：此计数器显示每秒从磁盘读取的字节数。同样，这些信息对于检测可能的容量问题很有用。

    *   `PhysicalDisk\Disk Write Bytes/sec`：这与 `PhysicalDisk\Disk Read Bytes/sec`
    相同，但此计数器显示每秒写入磁盘的字节数。


    利用这些 Perfmon 测量提供的信息，你应该能够识别可能的与存储相关的瓶颈。这些信息对于存储管理员（如果有的话）也很有帮助，他可以将其与他/她管理的存储的测量值进行比较。


    作为一个额外的诊断工具，或者如果你无法使用 Perfmon，你也可以运行 Paul Randal 基于 `sys.dm_io_virtual_file_stats`
    DMF 创建的 IO 性能脚本，如清单 9-4 所示。该脚本以及描述该脚本的博客文章可以在 Paul 的博客上找到：[`www.sqlskills.com/blogs/paul/how-to-examine-io-subsystem-latencies-from-within-sql-server/`](http://www.sqlskills.com/blogs/paul/how-to-examine-io-subsystem-latencies-from-within-sql-server/)。


    ```sql

    SELECT

    [ReadLatency] =

    CASE WHEN [num_of_reads] = 0

    THEN 0 ELSE ([io_stall_read_ms] / [num_of_reads]) END,

    [WriteLatency] =

    CASE WHEN [num_of_writes] = 0

    THEN 0 ELSE ([io_stall_write_ms] / [num_of_writes]) END,

    [Latency] =

    CASE WHEN ([num_of_reads] = 0 AND [num_of_writes] = 0)

    THEN 0 ELSE ([io_stall] / ([num_of_reads] + [num_of_writes])) END,

    [AvgBPerRead] =

    CASE WHEN [num_of_reads] = 0

    THEN 0 ELSE ([num_of_bytes_read] / [num_of_reads]) END,

    [AvgBPerWrite] =

    CASE WHEN [num_of_writes] = 0

    THEN 0 ELSE ([num_of_bytes_written] / [num_of_writes]) END,

    [AvgBPerTransfer] =

    CASE WHEN ([num_of_reads] = 0 AND [num_of_writes] = 0)

    THEN 0 ELSE

    (([num_of_bytes_read] + [num_of_bytes_written]) /

    ([num_of_reads] + [num_of_writes])) END,

    LEFT ([mf].[physical_name], 2) AS [Drive],

    DB_NAME ([vfs].[database_id]) AS [DB],

    [mf].[physical_name]

    FROM

    sys.dm_io_virtual_file_stats (NULL,NULL) AS [vfs]

    JOIN sys.master_files AS [mf]

    ON [vfs].[database_id] = [mf].[database_id]

    AND [vfs].[file_id] = [mf].[file_id]

    -- WHERE [vfs].[file_id] = 2 -- 日志文件

    ORDER BY [Latency] DESC

    -- ORDER BY [ReadLatency] DESC

    -- ORDER BY [WriteLatency] DESC;

    GO

    ```


    清单 9-4

    IO 性能脚本


    图 9-26 显示了在我的测试 SQL Server 实例上执行清单 9-4 中的 IO 性能脚本的部分结果，按延迟排序。


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig26_HTML.jpg](img/340881_2_En_9_Fig26_HTML.jpg)


    图 9-26

    我的测试 SQL Server 实例上的 IO 性能


    使用 IO 性能脚本时要记住的一个重要点是，其值是从 SQL Server 服务启动开始累积的。它们不显示执行查询时的即时情况。如果你有兴趣使用此脚本监控
    IO 性能，可以考虑在特定时间间隔将输出捕获到表中，并计算增量（就像我们在第 4 章“构建一个可靠的基准”中所做的那样）。'
- fmt: '除了存储子系统的性能外，查询的行为也会影响 `PAGEIOLATCH_[xx]` 等待类型的等待时间。查询请求的数据越多（这些数据不在缓冲区缓存中），就需要从存储子系统读取到缓冲区缓存的数据量就越大。例如，如果我们修改清单
    [9-3](#340881_2_En_9_Chapter.xhtml#PC24) 中的查询，如清单 [9-5](#340881_2_En_9_Chapter.xhtml#PC26)
    所示，使其更具选择性以返回更少的数据，那么 `PAGEIOLATCH_[xx]` 的等待时间也应该更少。


    ```

    CHECKPOINT 1;

    GO

    DBCC DROPCLEANBUFFERS;

    GO

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    GO

    SELECT

    SOD.SalesOrderID,

    SOD.CarrierTrackingNumber,

    SOH.CustomerID,

    C.AccountNumber,

    SOH.OrderDate,

    SOH.DueDate

    FROM Sales.SalesOrderDetail SOD

    INNER JOIN Sales.SalesOrderHeader SOH

    ON SOD.SalesOrderID = SOH.SalesOrderID

    INNER JOIN Sales.Customer C

    ON SOH.CustomerID = C.CustomerID

    WHERE SOD.CarrierTrackingNumber BETWEEN ''F467-41BF-8B'' AND ''F4E4-4739-B4''

    ;

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type LIKE ''PAGEIOLATCH_%'';

    ```

    清单 9-5 修改后的清单 9-3 查询


    图 [9-27](#340881_2_En_9_Chapter.xhtml#Fig27) 显示了最后针对 `sys.dm_os_wait_stats` DMV
    执行的查询的结果。


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig27_HTML.jpg](images/340881_2_En_9_Chapter/340881_2_En_9_Fig27_HTML.jpg)


    图 9-27 PAGEIOLATCH_SH 等待时间信息


    如图 [9-27](#340881_2_En_9_Chapter.xhtml#Fig27) 所示，`PAGEIOLATCH_SH` 等待类型的等待时间从 19
    毫秒急剧下降到 3 毫秒。这个例子规模很小，我们处理的是非常小的结果集，但它说明了问题。


    然而，您并非总能奢侈地修改每个查询使其更具选择性。也许查询是由应用程序生成的，您甚至无法修改它们，或者查询就是需要大的结果集。值得庆幸的是，作为 DBA，我们也可以通过简单地执行数据库维护来帮助最小化
    `PAGEIOLATCH_[xx]` 等待时间。索引碎片和过时的统计信息会显著增加 `PAGEIOLATCH_[xx]` 等待时间。如果索引碎片化，检索所需数据需要执行更多的磁盘
    I/O，这意味着 I/O 锁定需要保持更长时间，从而导致更高的 `PAGEIOLATCH_[xx]` 等待时间。过时的统计信息也可能导致更多的磁盘 I/O，因为
    SQL Server 预期的行数与实际返回的行数不同。因此，请确保您定期执行索引和统计信息维护，以确保磁盘交互量尽可能小。


    最终影响 `PAGEIOLATCH_[xx]` 等待时间的领域是系统的内存。如果数据页在特定时间段内未被访问，SQL Server 将从缓冲区缓存中移除它们，以便为缓冲区缓存腾出空间。SQL
    Server 执行此清理操作的间隔取决于进入缓冲区缓存的数据量以及缓冲区缓存中的可用空间量。如果对缓冲区缓存中数据页的请求非常高，SQL Server 将被迫将最少访问（或一段时间未访问）的数据页换出，以腾出空间给当前需要的页面。这种数据页在缓冲区缓存中移入移出的操作将导致更多的
    `PAGEIOLATCH_[xx]` 等待。在理想情况下，您的数据库应完全适合 SQL Server 实例的缓冲区缓存。在这种情况下，SQL Server
    只需要将数据页从存储子系统移动到缓冲区缓存一次，它们将一直保留在那里直到 SQL Server 再次重启。尽管我们现在可以使用非常大的 RAM，但在许多情况下，我们无法简单地将整个数据库放入
    SQL Server 实例的缓冲区缓存中，因此可以预期会发生一些数据页从缓冲区缓存换回到存储子系统的情况。为系统增加更多 RAM 将提高缓冲区缓存可以存储的数据页数量，并有助于缓冲区缓存将这些页面在内存中保留更长时间。


    有两个 Perfmon 计数器可以帮助您深入了解缓冲区缓存的使用情况：`SQLServer:Buffer Manager\Buffer cache hit
    ratio` 和 `SQLServer:Buffer Manager\Page life expectancy`。`SQLServer:Buffer Manager\Buffer
    cache hit ratio` 将显示可以在缓冲区缓存中找到而无需对存储子系统进行物理读取的页面百分比。`SQLServer:Buffer Manager\Page
    life expectancy` 计数器将显示数据页在缓冲区缓存中停留的秒数。如果您看到这两个计数器的值持续低于您的基线，可能意味着 SQL Server
    正在遇到内存压力，需要将数据页从缓冲区缓存移回磁盘以释放内存。然而，这两个计数器并不完美，关于它们的工作原理（特别是它们的理想值）已有大量论述。我们不会深入讨论这些计数器应该达到什么好值，因为这需要参考您的基线，但我相信它们是调查缓冲区缓存内存压力的良好起点。


    ### PAGEIOLATCH_[xx] 总结


    到目前为止，`PAGEIOLATCH_[xx]` 等待类型是最常见的与锁存相关的等待类型。它与 `CXPACKET` 等待类型一起，可能是任何 SQL Server
    实例上最常见的等待类型。`PAGEIOLATCH_[xx]` 等待类型与数据页从存储子系统移动到 SQL Server 实例的缓冲区缓存内存直接相关。SQL
    Server 使用缓冲区缓存来最小化对（慢得多的）存储子系统的交互次数，从而最大化性能。每当一个数据页被读入缓冲区缓存时，就会记录为此操作所花费时间的 `PAGEIOLATCH_[xx]`
    等待类型。有许多方法可以降低 `PAGEIOLATCH_[xx]` 的等待时间。经常被建议的“使用更快的存储”并不总是成立，尽管快速存储确实会直接影响 `PAGEIOLATCH_[xx]`
    等待时间。优化查询使其需要移动到缓冲区缓存的数据页更少、对索引和统计信息执行维护，以及分析内存性能，都可能有助于降低 `PAGEIOLATCH_[xx]`
    等待时间。'
  raw: 'Next to the performance of your storage subsystem, the behavior of your queries
    can impact the wait times of the `PAGEIOLATCH_[xx]` wait type. The more data your
    queries are requesting (that is not already in the buffer cache), the larger the
    amount of data that needs to be read from the storage subsystem into the buffer
    cache. For instance, if we were to modify the query of Listing [9-3](#340881_2_En_9_Chapter.xhtml#PC24),
    shown in Listing [9-5](#340881_2_En_9_Chapter.xhtml#PC26), to be more selective
    so that less data is returned, the amount of `PAGEIOLATCH_[xx]` wait time should
    also be less.


    ```

    CHECKPOINT 1;

    GO

    DBCC DROPCLEANBUFFERS;

    GO

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    GO

    SELECT

    SOD.SalesOrderID,

    SOD.CarrierTrackingNumber,

    SOH.CustomerID,

    C.AccountNumber,

    SOH.OrderDate,

    SOH.DueDate

    FROM Sales.SalesOrderDetail SOD

    INNER JOIN Sales.SalesOrderHeader SOH

    ON SOD.SalesOrderID = SOH.SalesOrderID

    INNER JOIN Sales.Customer C

    ON SOH.CustomerID = C.CustomerID

    WHERE SOD.CarrierTrackingNumber BETWEEN ''F467-41BF-8B'' AND ''F4E4-4739-B4''

    ;

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type LIKE ''PAGEIOLATCH_%'';

    Listing 9-5

    Modified Listing 9-3 query

    ```


    Figure [9-27](#340881_2_En_9_Chapter.xhtml#Fig27) shows the results of the last
    query that was executed against the `sys.dm_os_wait_stats` DMV .


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig27_HTML.jpg](images/340881_2_En_9_Chapter/340881_2_En_9_Fig27_HTML.jpg)


    Figure 9-27


    PAGEIOLATCH_SH wait time information


    As you can see from Figure [9-27](#340881_2_En_9_Chapter.xhtml#Fig27), the wait
    times of the `PAGEIOLATCH_SH` wait type went down drastically, from 19 to 3 milliseconds.
    Now, this example is rather small, and we are dealing with very small result sets,
    but I think it shows the point.


    However, you don’t always have the luxury of being able to modify every query
    so that it is more selective. Maybe the queries are generated by an application
    and you can’t even modify them, or the queries simply need the large result set.
    Thankfully, as a DBA, we can also play a part in minimizing `PAGEIOLATCH_[xx]`
    wait times by simply performing database maintenance. Index fragmentation and
    out-of-date statistics can increase the `PAGEIOLATCH_[xx]` wait times drastically.
    If indexes are fragmented more disk IOs need to take place to retrieve the data
    requested, which means IO latches will need to stay in place longer, which results
    in higher `PAGEIOLATCH_[xx]` wait times. Out-of-date statistics can also result
    in more disk IOs, because SQL Server expects a different number of rows to be
    returned instead of the actual number of rows. So, make sure you are regularly
    performing index and statistics maintenance to make sure the amount of disk interaction
    is as small as possible.


    The final area that can impact `PAGEIOLATCH_[xx]` wait time is the memory of your
    system. SQL Server will remove data pages from inside the buffer cache if they
    have not been accessed within a specific timeframe in order to free up room inside
    the buffer cache. The interval at which SQL Server performs this cleanup depends
    on the amount of data coming into the buffer cache and the amount of free space
    inside the buffer cache. If the request for data pages inside the buffer cache
    is very high, SQL Server will be forced to swap data pages that have been accessed
    the least (or haven’t been accessed for a while) for pages that are required now.
    This movement of data pages from and to the buffer cache will result in more `PAGEIOLATCH_[xx]`
    waits. In an ideal world, your database would fit completely inside the buffer
    cache of your SQL Server instance. In this case, SQL Server will only need to
    move the data pages from the storage subsystem into the buffer cache once, where
    they will stay until SQL Server restarts again. Even though we do have access
    to very large amounts of RAM these days, in many cases we cannot simply fit our
    entire database into the buffer cache of our SQL Server instance, and some swapping
    of data pages from the buffer cache back to the storage subsystem can be expected.
    Adding more RAM to your system will increase the number of data pages the buffer
    cache can store and can help the buffer cache keep those pages in memory longer.


    There are two Perfmon counters that can help you get some insight into the buffer
    cache usage: `SQLServer:Buffer Manager\Buffer cache hit ratio` and `SQLServer:Buffer
    Manager\Page life expectancy`. The `SQLServer:Buffer Manager\Buffer cache hit
    ratio` will show you what percentage of pages could be located in the buffer cache
    that do not require a physical read on the storage subsystem. The `SQLServer:Buffer
    Manager\Page life expectancy` counter will show you the number of seconds a data
    page stays inside the buffer cache. If you see continuously low values on both
    these counters, compared to your baseline, it could mean SQL Server is running
    into memory pressure and needs to move data pages from the buffer cache back to
    disk again to free up memory. These two counters are not perfect, though, and
    much has been written about their workings (and specifically their ideal values).
    We won’t go into details about what good values for these counters should be,
    as for that you should refer to your baseline, but I believe they are a good starting
    point for investigating buffer cache memory pressure.


    ### PAGEIOLATCH_[xx] Summary


    The `PAGEIOLATCH_[xx]` wait type is, by far, the most common latch-related wait
    type. Together with the `CXPACKET` wait type, the `PAGEIOLATCH_[xx]` wait type
    is probably the most common wait type on any SQL Server instance. The `PAGEIOLATCH_[xx]`
    wait type is directly related to the movement of data pages on the storage subsystem
    into the buffer cache memory of your SQL Server instance. SQL Server uses the
    buffer cache to minimize the number of interactions to the (much slower) storage
    subsystem so as to maximize performance. Whenever a data page is read into the
    buffer cache, the `PAGEIOLATCH_[xx]` wait type will be recorded for the time it
    took to do so. There are many methods available to lower the amount of `PAGEIOLATCH_[xx]`
    wait time. The frequently advised “get faster storage” doesn’t always hold true,
    even though fast storage will indeed directly influence the `PAGEIOLATCH_[xx]`
    wait times. Optimizing queries so they require fewer data pages to be moved to
    the buffer cache, performing maintenance on indexes and statistics, and analyzing
    memory performance could all lead to lower `PAGEIOLATCH_[xx]` wait times.'
