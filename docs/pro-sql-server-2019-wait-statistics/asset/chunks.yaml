  trans: '## 锁与阻塞简介


    正如我们刚才讨论的，SQL Server 使用锁来隔离不同的并发事务，使得数据在任一时刻仅被一个事务访问或修改。SQL Server 可以使用多种锁类型，或称为锁模式，并且可以对不同级别的对象放置锁。更为复杂的是，不同的锁模式之间不一定兼容，当两个不兼容的锁相遇时，就会发生阻塞。


    ### 锁模式与兼容性


    首先，让我们熟悉一下 SQL Server 内部的不同锁类型，或称锁模式。下面的列表描述了最常见的锁模式。SQL Server 内部还有更多的锁模式，但它们仅在执行非常特定的操作时才会出现。所有不同锁模式的完整列表可以在
    MSDN 上讨论锁模式的页面找到：[`https://technet.microsoft.com/en-us/library/ms175519.aspx`](https://technet.microsoft.com/en-us/library/ms175519.aspx)。SQL
    Server 使用缩写来指示正在使用的锁模式。这些缩写显示在括号中：


    *   共享 (`S`)：当查询从某个资源中选择数据时，将在该资源上放置共享锁。例如，执行 `SELECT * FROM [table]`。


    *   更新 (`U`)：更新锁模式用于查询想要修改资源时。引入它是为了防止“死锁”，即在并发事务中，多个锁相互等待释放以修改同一资源的情况。


    *   排他 (`X`)：当事务想要修改资源时，会放置排他锁。当排他锁就位时，其他事务无法修改该资源。例如，`INSERT`、`UPDATE` 或 `DELETE`
    T-SQL 语句将导致排他锁。


    *   架构 (`Sch`)：架构锁在表被修改时使用。例如向表中添加一列。


    *   意向 (`I`)：意向锁用于表示在锁层次结构的较低级别已经放置了锁。我们稍后会详细讨论锁层次结构。


    当不同的锁需要相互交互时，SQL Server 会对涉及的锁模式执行锁兼容性检查。并非所有的锁模式都彼此兼容，这意味着当两个不同的事务因为锁不兼容而无法同时访问资源时，就会发生阻塞。例如，当放置共享锁来读取一行时，另一个事务想要通过放置排他锁来修改该行，则排他锁将必须等待，直到共享锁被移除。表
    8-1 显示了共享、更新和排他锁模式的锁模式兼容性。


    表 8-1 锁兼容性


    | 锁模式 | 共享 | 更新 | 排他 |

    | --- | --- | --- | --- |

    | **共享** | 是 | 是 | 否 |

    | **更新** | 是 | 否 | 否 |

    | **排他** | 否 | 否 | 否 |


    让我们通过一个例子来说明锁兼容性。假设你想通过针对某个表执行 `SELECT` 语句来读取其中一行。当你执行查询时，SQL Server 会检查你想要访问的行上是否已存在任何锁，以及该锁是否与你想要放置在该行上的锁兼容。假设在你运行查询时没有锁存在。这种情况下，将在该行上放置一个共享锁，表明你的查询正在从该行读取数据。在你执行查询之后，另一个用户发起了另一个事务，想要修改你正在访问的行中的数据。SQL
    Server 将检测到该行上已存在一个共享锁，这使得第二个事务在放置其排他锁之前需要等待，因为共享锁和排他锁不兼容。运行第二个事务的用户可能会遇到延迟，因为该事务正在等待共享锁被移除，然后才能放置其排他锁。如果启动了第三个事务，想要读取与你事务相同的行，则不会发生锁冲突。共享锁与其他共享锁是兼容的，这意味着第三个事务无需等待即可放置其锁，并且直接获得它请求的结果。


    图 8-1 展示了这个例子，其中虚线表示必须等待的不兼容锁。


    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig1_HTML.jpg](img/340881_2_En_8_Fig1_HTML.jpg)

    图 8-1 并发锁情况


    ### 锁层次结构


    SQL Server 使用多粒度锁机制，允许为不同级别的对象放置不同的锁。这样做是为了最小化锁的开销成本。可以放置锁的最低级别的对象是行，最大的是数据库。在这两个粒度级别之间有许多级别，SQL
    Server 自动决定应在哪个级别放置锁以最小化锁开销。以下列表显示了最常见的锁级别，从最高粒度到最小粒度排序：


    *   数据库


    *   数据库文件


    *   表/对象


    *   区


    *   页


    *   `RID`（堆中的行）/`KEY`（聚集索引中的行）


    我们之前讨论的意向锁在在不同的粒度级别上放置锁也起着重要作用。SQL Server 会在较高粒度级别的对象上放置意向锁，以指示已在较低级别放置了锁。这保护了较低级别的锁免受较高级别对象上更改的影响。从最高粒度级别到对象上的实际锁，所有放置的意向锁一起查看时，被称为锁层次结构。


    图 8-2 展示了修改行内数据的锁层次结构的图形表示，这将需要在行上放置排他锁，并在层次结构的更高层级放置意向排他锁。


    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig2_HTML.jpg](img/340881_2_En_8_Fig2_HTML.jpg)

    图 8-2 锁层次结构示例


    请注意数据库级别的共享锁。每个请求总是会放置一个共享锁，以在事务活动时保护数据库免受更改。这确保了，例如，你无法在事务仍处于活动状态时删除数据库。另请注意，意向锁将在最低级别的对象上使用相同的锁模式，在本例中是意向排他锁
    (`IX`)。如果放置了共享锁，意向锁的锁模式也会相应改变，在本例中变为意向共享锁 (`IS`)。我们将在本章后面更深入地探讨意向锁。'
- fmt: '### Isolation Levels


    我们可以控制事务放置的锁的类型，通过更改隔离级别。隔离级别定义了在并发操作期间事务彼此隔离的程度。我们可以在连接或事务基础上更改隔离级别。更改隔离级别只会更改共享锁的行为；数据修改所需的排他锁不受影响。更改隔离级别还会引入某些现象。这些现象会影响读取事务的结果，并且是因为事务期间放置和持有共享锁的方式发生变化而产生的。以下列表按从最低到最高的顺序显示了
    SQL Server 中可用的各种隔离级别以及与之相关的现象：


    #### Read Uncommitted（未提交读）

    此隔离级别允许在另一个事务正在修改同一对象时进行读取。它不会等待对象上的排他锁被释放。这使得可以读取未提交的值，称为“脏读”。脏读可能很糟糕（如果您不期望它们的话），因为它们可能返回数据库中不再最新的值。例如，如果有人正在将值从“A”更新为“B”，而其他用户在同一时间查询相同数据，可能会得到旧值“A”而不是更新后的“B”值。


    #### Read Committed（已提交读）

    这是 SQL Server 中的默认隔离级别。使用此隔离级别将使读取事务等待，直到并发的写入事务完成。将在行上放置一个共享锁，并在读取该行后立即释放。与此隔离级别相关的现象称为“不一致分析”。这意味着如果数据在两次读取事务之间的时间被另一个事务修改，那么相同的读取查询可能会得到不同的结果。


    #### Repeatable Read（可重复读）

    将隔离级别设置为可重复读会锁定事务正在读取的行。但是，可重复读不会在读取行后释放共享锁，而是会一直持有该锁，直到整个事务完成。可重复读可能允许“幻读”发生。幻读发生在另一个事务添加或更改了尚未被读取事务锁定的数据时。


    #### Serializable（可序列化）

    可序列化隔离级别是您可以使用的最高可能隔离级别，这意味着它会放置最多的锁，以确保您读取的数据在事务运行期间不会被修改。它通过锁定您正在选择的数据的整个范围（例如，整个表）来实现这一点，使得无法更改该数据。由于您正在选择的整个数据范围在事务开始时就被锁定，因此不可能出现任何现象。


    SQL Server 2005 添加了另一种用于隔离事务的方法，称为行版本控制。行版本控制使用数据修改的版本，并将它们返回给读取查询而不会导致阻塞。当事务修改数据时，该更改将被记录为一个版本。当读取事务访问相同数据时，它将收到在修改事务提交之前的更改版本。有关行版本控制的更多信息可以在在线手册中找到：[`https://technet.microsoft.com/en-us/library/ms189050.aspx`](https://technet.microsoft.com/en-us/library/ms189050.aspx)。


    由于隔离级别及其锁定行为可能很复杂，我添加了图 [8-3](#340881_2_En_8_Chapter.xhtml#Fig3)，它显示了各种隔离级别在读取操作期间实现锁定的方式。方框代表表中的行，带有锁的行表示该行上有一个活动的共享锁。


    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig3_HTML.jpg](images/340881_2_En_8_Chapter/340881_2_En_8_Fig3_HTML.jpg)


    图 8-3：隔离级别和锁定行为


    您希望使用与默认的 Read Committed 不同的隔离级别有各种原因。在许多情况下，这些原因与您预期工作负载产生的锁/阻塞量，或者您的事务返回的数据应该有多“正确”有关。例如，在默认的
    Read Committed 隔离级别下，其他事务有可能在您的事务运行时修改数据，这意味着事务结束时的结果与事务开始时不同。为了确保在您的事务运行时没有数据可以更改，您可以使用
    Serializable 隔离级别，但这意味着需要放置和维护更多的锁，从而在并发 SQL Server 环境中导致更多的阻塞。


    我们只能通过专门为连接配置不同的隔离级别或提供表提示（一个例外是快照隔离，它是在数据库级别配置的）来更改默认的 Read Committed 隔离级别。例如，下面的两个查询展示了两种不同的方法来执行使用
    Read Uncommitted 隔离级别的查询。第一个查询为整个会话设置事务隔离级别：


    ```

    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED

    GO

    BEGIN TRANSACTION

    SELECT *

    FROM Person.Person

    COMMIT TRANSACTION;

    GO

    ```


    另一种方法是使用表提示将隔离级别设置为 Read Uncommitted：


    ```

    SELECT *

    FROM Person.Person

    WITH (READUNCOMMITTED);

    ```


    这两种方法都将达到相同的效果，但请记住，为会话设置隔离级别将导致在此之后在该特定会话中执行的所有查询都使用选定的隔离级别。'
  raw: '### Isolation Levels


    We can exercise a certain level of control over what locks are being placed by
    a transaction by changing the Isolation level. The Isolation level defines the
    degree to which transactions are isolated from each other during concurrent operations.
    We can change the Isolation level on either a connection or a transaction basis.
    Changing the Isolation level will only change the behavior of Shared locks; Exclusive
    locks that are needed for data modification are not affected. Changing the Isolation
    level will also introduce certain phenomena. These phenomena have an impact on
    the results of your read transaction and occur because of the changes to how Shared
    locks are placed and held during the transaction. The list that follows shows
    the various Isolation levels, from the lowest form of Isolation to the highest,
    available in SQL Server and the phenomena related to them:


    *   Read Uncommitted: This Isolation level will allow reads to occur while another
    transaction is performing modifications on the same object. It will not wait until
    the Exclusive lock on the object is released. This makes it possible to read uncommitted
    values called “dirty reads.” Dirty reads can be bad (if you do not expect them)
    because they can return a value that is no longer current in the database. For
    instance, if someone is updating a value to “B” while it was “A” at the start
    of the transaction, other users that query the same data at the same time can
    get the old value of “A” back instead of the updated “B” value.


    *   Read Committed: This is the default Isolation level in SQL Server. Using this
    Isolation level will make read transactions wait until concurrent write transactions
    are completed. A Shared lock will be placed on a row and will be released right
    after the row has been read. The phenomenon associated with this Isolation level
    is called “inconsistent analysis.” This means that it is possible to receive different
    results from the same read query if the data were modified by another transaction
    in the time between both read transactions.


    *   Repeatable Read: Setting the Isolation level to Repeatable Read will lock
    rows that are being read by a transaction. But instead of releasing the Shared
    lock on the row after it has been read, Repeatable Read will keep the lock in
    place until the entire transaction is completed. A Repeatable Read makes it possible
    for “phantom reads” to occur. Phantom reads occur whenever data is added or changed
    by another transaction that has not yet been locked by the read transaction.


    *   Serializable: The Serializable Isolation level is the highest possible Isolation
    level you can use, and that means it will place the most locks to ensure the data
    you are reading is not modified during the time the transaction is running. It
    does this by locking the entire range of data (for instance, an entire table)
    you are selecting, making it impossible to make changes to that data. Since the
    entire range of data you are selecting is being locked right at the start of the
    transaction, there are no phenomena possible.


    SQL Server 2005 added another method for isolating transactions called Row Versioning.
    Row Versioning uses versions of data modification and returns them to read queries
    without causing blocking. When a transaction modifies data, that change will be
    recorded as a version. When a read transaction accesses the same data, it will
    receive the version of the change before the modification transaction is committed.
    More information about Row Versioning can be found on Books Online at [`https://technet.microsoft.com/en-us/library/ms189050.aspx`](https://technet.microsoft.com/en-us/library/ms189050.aspx)
    .


    Because Isolation levels, and their locking behavior, can be complex to understand,
    I added Figure [8-3](#340881_2_En_8_Chapter.xhtml#Fig3), which shows the way the
    various Isolation levels implement locking during a read operation. The boxes
    represent rows inside a table, and a row with a lock means a Shared lock is active
    on that row.


    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig3_HTML.jpg](images/340881_2_En_8_Chapter/340881_2_En_8_Fig3_HTML.jpg)


    Figure 8-3


    Isolation levels and locking behavior


    There are various reasons why you would want to use a different Isolation level
    than the default of Read Committed. In many cases these reasons are related to
    the amount of locking/blocking you expect with your workload, or how “correct”
    the data returned by your transaction should be. For instance, with the default
    Isolation level of Read Committed it is possible that data is modified by other
    transactions while your transaction is running, which means that the results at
    the end of the transaction are not the same as they were at the start of your
    transaction. To make sure no data can change while your transaction is running,
    you could use the Serializable Isolation level, but this means more locks need
    to be placed and maintained, resulting in more blocking in concurrent SQL Server
    environments.


    We can only change the default Isolation level of Read Committed by specifically
    configuring a different Isolation level for a connection or by supplying a table
    hint (an exception is Snapshot Isolation, which is configured at the database
    level). For instance, the two queries that follow show two different methods of
    executing a query using the Read Uncommitted Isolation level. The first query
    sets the transaction Isolation level for the entire session:


    ```

    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED

    GO

    BEGIN TRANSACTION

    SELECT *

    FROM Person.Person

    COMMIT TRANSACTION;

    GO

    ```


    Another method is to use a table hint to set the Isolation level to Read Uncommitted:


    ```

    SELECT *

    FROM Person.Person

    WITH (READUNCOMMITTED);

    ```


    Both of these methods will achieve the same effect, but keep in mind that setting
    the Isolation level for the session will result in using the selected Isolation
    level for all the queries that are being executed in this specific session after
    setting it.'
  trans: '

    ### 隔离级别


    我们可以通过更改隔离级别来控制事务放置的锁的类型。隔离级别定义了在并发操作期间事务彼此隔离的程度。我们可以在连接或事务基础上更改隔离级别。更改隔离级别只会更改共享锁的行为；数据修改所需的排他锁不受影响。更改隔离级别还会引入某些现象。这些现象会影响读取事务的结果，并且是因为事务期间放置和持有共享锁的方式发生变化而产生的。以下列表按从最低到最高的顺序显示了
    SQL Server 中可用的各种隔离级别以及与之相关的现象：


    #### Read Uncommitted（未提交读）

    此隔离级别允许在另一个事务正在修改同一对象时进行读取。它不会等待对象上的排他锁被释放。这使得可以读取未提交的值，称为“脏读”。脏读可能很糟糕（如果您不期望它们的话），因为它们可能返回数据库中不再最新的值。例如，如果有人正在将值从“A”更新为“B”，而其他用户在同一时间查询相同数据，可能会得到旧值“A”而不是更新后的“B”值。


    #### Read Committed（已提交读）

    这是 SQL Server 中的默认隔离级别。使用此隔离级别将使读取事务等待，直到并发的写入事务完成。将在行上放置一个共享锁，并在读取该行后立即释放。与此隔离级别相关的现象称为“不一致分析”。这意味着如果数据在两次读取事务之间的时间被另一个事务修改，那么相同的读取查询可能会得到不同的结果。


    #### Repeatable Read（可重复读）

    将隔离级别设置为可重复读会锁定事务正在读取的行。但是，可重复读不会在读取行后释放共享锁，而是会一直持有该锁，直到整个事务完成。可重复读可能允许“幻读”发生。幻读发生在另一个事务添加或更改了尚未被读取事务锁定的数据时。


    #### Serializable（可序列化）

    可序列化隔离级别是您可以使用的最高可能隔离级别，这意味着它会放置最多的锁，以确保您读取的数据在事务运行期间不会被修改。它通过锁定您正在选择的数据的整个范围（例如，整个表）来实现这一点，使得无法更改该数据。由于您正在选择的整个数据范围在事务开始时就被锁定，因此不可能出现任何现象。


    SQL Server 2005 添加了另一种用于隔离事务的方法，称为行版本控制。行版本控制使用数据修改的版本，并将它们返回给读取查询而不会导致阻塞。当事务修改数据时，该更改将被记录为一个版本。当读取事务访问相同数据时，它将收到在修改事务提交之前的更改版本。有关行版本控制的更多信息可以在在线手册中找到：[`https://technet.microsoft.com/en-us/library/ms189050.aspx`](https://technet.microsoft.com/en-us/library/ms189050.aspx)。


    由于隔离级别及其锁定行为可能很复杂，我添加了图 8-3，它显示了各种隔离级别在读取操作期间实现锁定的方式。方框代表表中的行，带有锁的行表示该行上有一个活动的共享锁。


    ![../images/340881_2_En_8_Chapter/340881_2_En_8_Fig3_HTML.jpg](img/340881_2_En_8_Fig3_HTML.jpg)


    图 8-3：隔离级别和锁定行为


    您希望使用与默认的 Read Committed 不同的隔离级别有各种原因。在许多情况下，这些原因与您预期工作负载产生的锁/阻塞量，或者您的事务返回的数据应该有多“正确”有关。例如，在默认的
    Read Committed 隔离级别下，其他事务有可能在您的事务运行时修改数据，这意味着事务结束时的结果与事务开始时不同。为了确保在您的事务运行时没有数据可以更改，您可以使用
    Serializable 隔离级别，但这意味着需要放置和维护更多的锁，从而在并发 SQL Server 环境中导致更多的阻塞。


    我们只能通过专门为连接配置不同的隔离级别或提供表提示（一个例外是快照隔离，它是在数据库级别配置的）来更改默认的 Read Committed 隔离级别。例如，下面的两个查询展示了两种不同的方法来执行使用
    Read Uncommitted 隔离级别的查询。第一个查询为整个会话设置事务隔离级别：


    ```

    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED

    GO

    BEGIN TRANSACTION

    SELECT *

    FROM Person.Person

    COMMIT TRANSACTION;

    GO

    ```


    另一种方法是使用表提示将隔离级别设置为 Read Uncommitted：


    ```

    SELECT *

    FROM Person.Person

    WITH (READUNCOMMITTED);

    ```


    这两种方法都将达到相同的效果，但请记住，为会话设置隔离级别将导致在此之后在该特定会话中执行的所有查询都使用选定的隔离级别。

