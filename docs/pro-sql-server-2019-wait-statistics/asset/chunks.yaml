    # 线程池等待：诊断与解决


    SELECT *

    FROM sys.dm_os_waiting_tasks

    WHERE session_id > 50;


    如果我们在测试 SQL Server 实例上检查结果，可能会得出没有任务在等待的结论，如图 5-21 所示。然而，该测试 SQL Server 实例响应速度极其缓慢，查询任何内容都需要数秒。


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig21_HTML.jpg](img/340881_2_En_5_Fig21_HTML.jpg)


    图 5-21


    没有任务在等待


    让我们检查一下不过滤会话 ID 的 `sys.dm_os_waiting_tasks` DMV：


    ```sql

    SELECT *

    FROM sys.dm_os_waiting_tasks;

    ```


    如图 5-22 所示，`THREADPOOL` 等待并未作为用户会话记录，实际上其会话 ID 为空。这就是我总是建议不要对 `sys.dm_os_waiting_tasks`
    DMV 按会话 ID 进行过滤的原因。


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig22_HTML.png](img/340881_2_En_5_Fig22_HTML.png)


    图 5-22


    线程池等待


    存在相当多的 `THREADPOOL` 等待，等待时间各不有些甚至长达数秒。情况可能比这更糟。图 5-23 显示了我运行 `Ostress` 工具时尝试连接到测试
    SQL Server 实例所遇到的错误。


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig23_HTML.jpg](img/340881_2_En_5_Fig23_HTML.jpg)


    图 5-23


    发生超时，SQL Server 无响应


    现在我们已经看到了线程池资源枯竭可能引发的问题类型，接下来让我们看看如何降低甚至解决 `THREADPOOL` 等待。


    ## 在发生线程池等待时访问我们的 SQL Server


    `THREADPOOL` 等待可能非常难以排查，这主要是因为导致 SQL Server 没有可用的工作线程的原因有很多。此外，`THREADPOOL` 等待可能完全锁死您的
    SQL Server 实例，使其（以及对其进行排查）几乎不可能连接，正如您在前面的例子中所看到的。


    为了确保您不会陷入无法连接到 SQL Server 实例进行排查的境地，您应该采取的第一步是启用专用管理员连接（`DAC`）。如果您还记得第 1 章“等待统计信息内部原理”中关于调度器的部分，您可能会想起一个为
    `DAC` 保留的特殊类型的调度器。这个专用调度器，如图 5-24 所示，是专门为 `DAC` 保留的，并且可以访问其自己的工作线程。


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig24_HTML.jpg](img/340881_2_En_5_Fig24_HTML.jpg)


    图 5-24


    专用管理员连接调度器


    如果您通过 `DAC` 连接到 SQL Server 实例，您的会话将映射到 `DAC` 调度器。这使得即使所有其他调度器都有大量任务队列，也可能连接并执行查询。


    您可以通过执行以下查询来启用 `DAC`：


    ```sql

    sp_configure ''remote admin connections'', 1

    GO

    RECONFIGURE

    GO

    ```


    如果您想使用 `DAC` 连接到 SQL Server 实例，需要在连接的服务器名称前添加 `ADMIN:` 前缀，如图 5-25 所示。您只能在未连接到服务器的情况下，从
    SQL Server Management Studio 内部执行新查询时使用 `DAC` 进行连接。


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig25_HTML.jpg](img/340881_2_En_5_Fig25_HTML.jpg)


    图 5-25


    使用专用管理员连接进行连接


    现在您能够使用 `DAC` 连接到 SQL Server 实例，即使 SQL Server 实例不接受任何新连接，您也始终有办法进入。


    在启用 `DAC` 后，让我们讨论一下 `THREADPOOL` 等待的一些常见原因。


    ## 降低由并行度引起的线程池等待


    我遇到的最常见的 `THREADPOOL` 等待原因之一与查询执行期间大量使用并行度有关。在并行查询执行期间，会使用多个工作线程来执行所需的工作。如果您将与并行度相关的配置选项——`最大并行度`
    和 `并行度的成本阈值`——保留为默认值，可能会导致比预期更多的查询并行运行。根据您的 SQL Server 可访问的处理器数量，以及并行查询期间使用的工作线程数量，单个并行查询可能需要许多工作线程。


    如果您遇到这种特定情况的高频高 `THREADPOOL` 等待，通常也会看到许多 `CXPACKET` 等待（有时等待时间很长）。为了展示这种行为，我修改了我们用于生成
    `THREADPOOL` 等待的查询，使其以并行方式执行。在这个例子中，我注释掉了 `MAXDOP` 查询选项：


    ```sql

    SELECT TOP 1 *

    FROM Sales.SalesOrderDetail

    ORDER BY NEWID()

    -- OPTION (MAXDOP 1)

    ```


    对于此示例，我还将 `最大并行度` 配置为其默认值 0，并将 `并行度的成本阈值` 选项设置为 1。这样我就能 100%确定查询将以并行方式运行。我将 `最大工作线程数`
    选项保留为之前配置的 128。


    如果我们现在重复本章前面执行的相同 `Ostress` 测试，执行以下命令，我们应该会在 `sys.dm_os_waiting_tasks` DMV 中再次看到
    `THREADPOOL` 等待发生，如图 5-26 所示。


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig26_HTML.jpg](img/340881_2_En_5_Fig26_HTML.jpg)


    图 5-26


    线程池等待


    ```shell

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -E -dAdventureWorks
    -i"C:\select_rnd.sql" -n150 -r10 -q

    ```


    但这一次，因为我们的测试查询是以并行方式执行的，我们还会在 `sys.dm_os_waiting_tasks` DMV 返回的结果中发现许多 `CXPACKET`
    等待，如图 5-27 所示。


    ![../images/340881_2_En_5_Chapter/340881_2_En_5_Fig27_HTML.jpg](img/340881_2_En_5_Fig27_HTML.jpg)


    图 5-27


    CXPACKET 和线程池等待


    如果您在 SQL Server 实例上观察到这种行为，检查您的并行度配置可能是值得的。本章第一节讨论了 `CXPACKET` 等待以及如何降低它们。另一个可能引导您朝此方向检查的提示是，这种特定情况下的
    `CPU` 负载通常高于正常水平。在我的测试 SQL Server 实例情况下，所有 `CPU` 都达到了 100%。

