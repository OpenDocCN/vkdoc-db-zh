  trans: '## 降低 `PAGELATCH_[xx]` 等待


    到目前为止，我已经向你展示了两个可能发生 `PAGELATCH_[xx]` 等待的示例：`TempDB` 数据库 PFS 页上的页闩锁争用，以及最后一页插入争用。还有另一种闩锁争用问题可能在向带有索引的小型表插入行时发生。这种闩锁争用情况也可以通过出现的
    `PAGELATCH_[xx]` 等待来识别，但它也与 `LATCH_[xx]` 等待类型有关联。因此，我将针对这种特定情况的解释和示例留到本章下一节，届时我们将讨论
    `LATCH_[xx]` 等待类型。


    降低 `PAGELATCH_[xx]` 等待可能具有挑战性。通常，它们与数据库设计或工作负载相关，而这些在生产环境中可能难以更改。然而，有许多可能导致闩锁争用的因素值得花时间去检查。


    在具有大量逻辑处理器（16 个以上）和高并发 OLTP 工作负载的系统上，更常见到闩锁争用。但是，拥有较少的逻辑处理器并不意味着不会发生闩锁争用。到目前为止，我在本章中向你展示的所有闩锁争用示例，都是在仅有两个逻辑处理器的虚拟机上生成的。我必须创建足够高的并发工作负载才能达到闩锁争用的状态。拥有更多逻辑处理器意味着有更多线程可用于执行工作，这也导致放置更多并发闩锁，从而增加了闩锁争用的机会。在这种特定情况下，遇到闩锁争用时增加逻辑处理器，反而可能导致更多的闩锁争用，而不是解决问题。减少逻辑处理器数量也不是一个选项，因为这会减慢所有其他工作负载。


    解决闩锁争用的最佳方法是确定争用发生的位置以及你正在处理的是哪种争用。


    如果你正在处理 PFS 页争用，一个好的第一步是检查你使用的是一个还是多个数据库数据文件。如果使用一个数据库数据文件，第一步是添加额外的、大小相同的数据文件，并测量这是否会减少发生的
    `PAGELATCH_[xx]` 等待数量。如果你已经有多个数据库数据文件，可以尝试添加更多，但要小心不要添加太多，因为这可能会引入其他性能问题。你的目标应该是找到数据库数据文件的“甜蜜点”，即拥有足够的数据文件以最小化闩锁争用的影响，但又不至于多到导致开销过高。这完全取决于你的工作负载，因此我无法给你一个通用的建议。


    在处理最后一页插入争用时，你可以考虑将索引键更改为其他内容，而不是像 GUID 这样的顺序递增值。使用 GUID 作为索引键会因为 GUID 所需的字节数而导致索引更大。此外，由于
    GUID 完全随机，保持索引有序需要比处理不断递增的顺序值更多的工作。它还可能对你的应用程序或查询产生影响，可能需要重写以适应数据类型的变更。


    其他需要考虑的可能影响闩锁争用的因素包括索引策略、页满度以及到数据库的并发连接数。此外，识别和优化对数据库内部数据的访问模式也会大有帮助。例如，如果你知道你的工作负载由对单个表的许多非常小的插入组成，那么值得花时间看看是否可以将一些小插入合并成一个更大的批处理，从而有效减少所需的闩锁数量。


    解决闩锁争用的最后一个选项是使用一种称为**哈希分区**的方法。哈希分区根据使用计算列生成的值，将你的表或索引拆分成多个分区。分区功能仅在企业版中可用（除非你运行的是
    SQL Server 2016 SP1 或更高版本，那样的话表和索引分区在标准版中也可用），但它是一种可以最小化甚至完全防止闩锁争用的方法。


    哈希分区的工作原理是将表或索引切分成多个分区，每个分区持有一部分数据。分区通常用于将数据从表内归档到位于其他（更便宜的）存储上的另一个文件组，而当前数据则驻留在快速存储上。在哈希分区的情况下，我们将使用计算列计算表中每一行的值。基于该值，我们将把行移动到某个分区。


    使用这种索引分区方法的最大优势在于，每个分区都有自己的索引树。因此，即使插入语句仍将发生在索引的最后一页（最右边的页），它也会分布在各个分区上。如果我们看图
    9-13，我们看到一个最后一页插入争用的情况，其中并发查询正试图像我们在前面的示例中讨论的那样，将行插入到索引中。


    ![图 9-13](img/340881_2_En_9_Fig13_HTML.png)


    图 9-13：索引最右侧数据页上的最后一页插入争用


    如果我们使用分区将索引切分成多个部分（本例中是三部分），我们将得到图 9-14 所示的情况：多个 B 树，每个树跨越一部分数据。


    ![图 9-14](img/340881_2_En_9_Fig14_HTML.jpg)


    图 9-14：分散在各分区中的最后一页插入


    让我们看一下哈希分区在运行工作负载以产生最后一页插入争用时的效果，就像我们在本章前面的示例中所做的那样。


    我们需要做的第一件事是创建一个分区函数。这将根据列的值将表或索引中的行映射到分区。下面的脚本将创建一个名为 `LatchPartFunc` 的分区函数，它将根据列的值（我们将稍后创建）将行划分为九个分区。如下所示：


    ```sql

    CREATE PARTITION FUNCTION [LatchPartFunc] (INT)

    AS RANGE LEFT FOR VALUES

    (0,1,2,3,4,5,6,7,8);

    ```


    下一步是创建一个分区方案，将分区映射到文件组：


    ```sql

    CREATE PARTITION SCHEME [LatchPartSchema]

    AS PARTITION [LatchPartFunc] ALL TO ([PRIMARY]);

    ```


    在这个例子中，我使用了 `PRIMARY` 文件组，但你可以自由创建额外的文件组来容纳这些分区。


    接下来是使用下面的查询创建一个名为 `Insert_Test3` 的新表。注意 `ID_Hash` 列。这是一个计算列，它将根据 `ID` 列的值计算一个介于
    0 到 8 之间的值：


    ```sql

    CREATE TABLE Insert_Test3

    (

    ID INT IDENTITY(1,1),

    RandomData VARCHAR(50),

    ID_Hash AS (CONVERT(INT, abs(binary_checksum(ID) % (9)), (0))) PERSISTED

    );

    ```


    最后一步是创建一个聚集索引并将其映射到分区方案：


    ```sql

    CREATE UNIQUE CLUSTERED INDEX idx_ID

    ON Insert_Test3

    (

    ID ASC, ID_Hash

    )

    ON LatchPartSchema(ID_Hash);

    ```


    现在我们已经设置了分区表，让我们重复一下导致我们前面示例中最后一页插入争用的 `ostress` 工作负载。我将插入操作的目标表更改为新的、已分区的 `Insert_Test3`
    表。


    ```cmd

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -E -dAdventureWorks
    -Q"INSERT INTO Insert_Test3 (RandomData) VALUES (CONVERT(varchar(50), NEWID()))"
    -n500 -r100 -q

    ```'
- fmt: 'During both Ostress workloads I used Perfmon to monitor the number of latch
    waits occurring every second. Figure [9-15](#340881_2_En_9_Chapter.xhtml#Fig15)
    shows the Perfmon graph for the first Ostress workload against a non-partitioned
    index and the second against the partitioned index we just created.


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig15_HTML.jpg](images/340881_2_En_9_Chapter/340881_2_En_9_Fig15_HTML.jpg)


    Figure 9-15


    Latch Waits/sec against both a non-partitioned and a partitioned index


    As you can see, the number of latch waits occurring dropped drastically after
    configuring hash partitioning! We can view the distribution of rows across the
    different partitions we created by running this query:


    ```sql

    SELECT *

    FROM sys.partitions

    WHERE object_id = OBJECT_ID(''Insert_Test3'');

    ```


    Figure [9-16](#340881_2_En_9_Chapter.xhtml#Fig16) shows the results of this query
    on my test SQL Server instance.


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig16_HTML.jpg](images/340881_2_En_9_Chapter/340881_2_En_9_Fig16_HTML.jpg)


    Figure 9-16


    Rows distribution across partitions


    In Figure [9-16](#340881_2_En_9_Chapter.xhtml#Fig16) we see the nine partitions
    we created on the `Insert_Test3` table, numbered 1 to 9 by the `partition_number`
    column. The `rows` column shows the number of rows inside each partition, and
    as you can see, they are distributed very evenly across the nine partitions! The
    `hobt_id` returns the ID of the B-tree where two rows of this partition are stored;
    all the partitions have different IDs, meaning they each have their own B-tree
    structure.


    Even though partitioning is a great way to resolve latch contention issues, it
    does come with its own unique challenges and drawbacks. Two of those are that
    it is an Enterprise-only feature (unless you are on SQL Server 2016 SP1 or higher),
    thus costly, and it can impact the generation of query execution plans, resulting
    in a suboptimal plan.


    ### PAGELATCH_[xx] Summary


    The `PAGELATCH_[xx]` wait type indicates that buffer latches, which are used to
    protect in-memory pages, are running into other, non-compatible, buffer latches.
    Just like locks, latches have different modes they use when protecting pages,
    and not all of these are compatible with each other. Seeing a large amount of
    `PAGELATCH_[xx]` waits occurring can indicate a case of latch contention. Resolving
    latch contention can be challenging and frequently requires making changes to
    the database design or queries.


    ## LATCH_[xx]


    Another latch-related wait type is the `LATCH_[xx]` wait type. Just like the `PAGELATCH_[xx]`
    wait type we discussed in the previous section, `LATCH_[xx]` waits are related
    to a specific latch class. While the `PAGELATCH_[xx]` wait type is related to
    latches that protect data structures inside the buffer cache, the `LATCH_[xx]`
    wait type is related to latches that are used to protect data structures outside
    of the buffer cache (but still inside the SQL Server memory).


    ### What Is the LATCH_[xx] Wait Type?


    When you see the `LATCH_[xx]` wait type occurring a specific class of non-buffer
    latches is running into a wait. The `LATCH_[xx]` is actually a summary of the
    wait time of those different non-buffer latch classes and not a latch type of
    its own. All of the different non-buffer latch classes that add to the wait time
    shown by the `LATCH_[xx]` wait type are recorded inside their own DMV, `sys.dm_os_latch_stats`.
    There are many different latch classes that the `LATCH_[xx]` wait type represents,
    totaling 168 in SQL Server 2017\. Figure [9-17](#340881_2_En_9_Chapter.xhtml#Fig17)
    shows the memory area where `LATCH_[xx]` waits can occur.


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig17_HTML.jpg](images/340881_2_En_9_Chapter/340881_2_En_9_Fig17_HTML.jpg)


    Figure 9-17


    LATCH_SH wait occurring


    Because the `LATCH_[xx]` wait type is a cumulative view of waits occurring on
    a specific latch class, you will need to look inside the `sys.dm_os_latch_stats`
    DMV to find the exact cause of the `LATCH_[xx]` wait. We described the inner workings
    and columns of the `sys.dm_os_latch_stats` DMV in the “Introduction to Latches”
    section at the start of this chapter, so I won’t go into more detail about the
    DMV here.


    ### LATCH_[xx] Example


    There is one case of latch contention that can occur that will result in `LATCH_[xx]`
    waits. This problem can occur on small tables that have a shallow B-tree structure
    (we will explain more about the B-tree structure a bit further down in this section)
    during a large volume of concurrent insert operations. A typical use case of such
    a table could be a messaging table that acts as a queue and gets truncated when
    the messages are sent. The script in Listing [9-2](#340881_2_En_9_Chapter.xhtml#PC17)
    will create a test table, named `Insert_Test2`, together with a non-clustered
    index on the table.


    ```sql

    -- Create the table

    CREATE TABLE Insert_Test2

    (

    ID UNIQUEIDENTIFIER,

    RandomData VARCHAR(50)

    );

    -- Create a non-clustered index on the ID column

    CREATE NONCLUSTERED INDEX idx_ID

    ON Insert_Test2 (ID);

    GO

    ```

    Listing 9-2

    Test contention table with non-clustered index


    The ID column has a data type of `UNIQUEIDENTIFIER` to make sure random, non-sequential
    values are generated. By creating a non-clustered index on this column, we are
    sure inserts will happen randomly across the B-tree associated with the non-clustered
    index.


    Once the table is created we can start Ostress with a workload consisting of an
    insert query that will insert a single row inside the table. We will run the workload
    with 500 concurrent connections, with each of the connections executing the query
    100 times. The command that follows shows the Ostress command:


    ```shell

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -E -dAdventureWorks
    -Q"INSERT INTO Insert_Test2 (ID, RandomData) VALUES (NEWID(), CONVERT(varchar(50),
    NEWID()))" -n500 -r100 -q

    ```


    While the workload is running, I can take a look at the `sys.dm_os_waiting_tasks`
    DMV using the following query so the `resource_description` column could fit on
    the screenshot:


    ```sql

    SELECT

    session_id,

    wait_duration_ms,

    wait_type,

    resource_description

    FROM sys.dm_os_waiting_tasks;

    ```


    Figure [9-18](#340881_2_En_9_Chapter.xhtml#Fig18) shows a part of the results
    of this query on my test SQL Server instance.


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig18_HTML.jpg](images/340881_2_En_9_Chapter/340881_2_En_9_Fig18_HTML.jpg)


    Figure 9-18


    LATCH_SH waits occurring


    The `resource_description` column of the `sys.dm_os_waiting_tasks` DMV will help
    us identify what latch class is associated with the `LATCH_[xx]` wait. In this
    case we are running into the `ACCESS_METHODS_HOBT_VIRTUAL_ROOT` latch class.


    Now that we know what latch class is running into waits, we can query the `sys.dm_os_latch_waits`
    DMV to find out the number of waits and the total wait time for this specific
    latch class using the following query:


    ```sql

    SELECT *

    FROM sys.dm_os_latch_stats

    WHERE latch_class = ''ACCESS_METHODS_HOBT_VIRTUAL_ROOT'';

    ```


    Figure [9-19](#340881_2_En_9_Chapter.xhtml#Fig19) shows the results of this query
    on my test SQL Server instance.


    ![../images/340881_2_En_9_Chapter/340881_2_En_9_Fig19_HTML.jpg](images/340881_2_En_9_Chapter/340881_2_En_9_Fig19_HTML.jpg)


    Figure 9-19


    ACCESS_METHOD_HOBT_VIRTUAL_ROOT latch wait


    Now that we have identified the latch class that is causing the LATCH_SH wait
    to occur we can start troubleshooting it. According to Books Online, the `ACCESS_METHODS_HOBT_VIRTUAL_ROOT`
    latch class is used to “synchronize access to the root page abstraction of an
    internal B-tree.” Even though the description is pretty limited, it should give
    us an idea of where to start looking when troubleshooting this specific problem.
    I included a list of the different latch classes that are described on Books Online,
    including some extra information whenever possible, in Appendix III of this book.'
