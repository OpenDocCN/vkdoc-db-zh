    ad hoc plans every time they are executed can be a cause of `RESOURCE_SEMAPHORE_QUERY_COMPILE`
    waits, especially if they are executed very frequently and concurrently. Jonathan
    Kehayias of SQLskills has written an excellent blog post on how you can query
    the plan cache to detect heavy compilation queries; it can be found at [`www.sqlskills.com/blogs/jonathan/identifying-high-compile-time-statements-from-the-plan-cache/`](http://www.sqlskills.com/blogs/jonathan/identifying-high-compile-time-statements-from-the-plan-cache/)
    . Using the script in Jonathan’s blog post should help you with detecting those
    queries that require a large amount of compilation memory.


    If your SQL Server is under memory pressure, it is also possible to see `RESOURCE_SEMAPHORE_QUERY_COMPILE`
    waits occur. This happens because of the dynamic compilation-memory thresholds
    of the medium and big gateways. If SQL Server is under memory pressure, the thresholds
    of both these gateways will lower, giving more queries the chance to use the medium
    or big gateways. But because the medium and big gateways allow fewer concurrent
    compilations, in the small gateway the available concurrent slots will be filled
    faster.


    Just as with the `RESOURCE_SEMAPHORE` wait type, you can use the resource governor
    to split workloads into specific resource pools. Each resource pool will have
    its own resource semaphores responsible for granting compilation memory, making
    it possible to split heavy compilation-memory usage across multiple resource pools.


    ### RESOURCE_SEMAPHORE_QUERY_COMPILE Summary


    Just like the resource semaphores that are needed to grant memory requests for
    specific query operations, resource semaphores exist for access to compilation
    memory. These resource semaphores throttle access to compilation memory through
    the usage of gateways. When a query is compiled, it will approach a gateway based
    on the amount of compilation memory it needs. The gateway can then grant the compilation
    memory requested or put the request in a queue if there are more requests that
    concurrently want to access the gateway. When a query is waiting inside one of
    these queues, the `RESOURCE_SEMAPHORE_QUERY_COMPILE` wait type is recorded.


    Resolving or lowering `RESOURCE_SEMAPHORE_QUERY_COMPILE` wait times is commonly
    achieved by either freeing up more memory or by lowering the compilation-memory
    needs of queries.


    ## SLEEP_BPOOL_FLUSH


    The `SLEEP_BPOOL_FLUSH` wait type is directly related to the checkpoint process
    inside SQL Server. The checkpoint process is responsible for writing modified,
    or “dirty,” data pages from the buffer pool to the database data file on disk.
    So next to having a close relationship with the checkpoint process, `SLEEP_BPOOL_FLUSH`
    waits also have a relationship with the performance of your storage subsystem.
    If we search for the definition of the `SLEEP_BPOOL_FLUSH` wait type on Books
    Online, Microsoft describes the wait type as occurring “when a checkpoint is throttling
    the issuance of new I/Os in order to avoid flooding the disk subsystem.”


    It is pretty common to see `SLEEP_BPOOL_FLUSH` waits occur, and frequently they
    will not indicate a problem. There are, however, cases where `SLEEP_BPOOL_FLUSH`
    waits can indicate performance problems that are related to either the checkpoint
    process or the storage subsystem.'
  trans: '

    ## 降低 RESOURCE_SEMAPHORE_QUERY_COMPILE 等待时间


    在很多情况下，你可以用来降低 `RESOURCE_SEMAPHORE_QUERY_COMPILE` 等待类型等待时间的方法，与降低或解决 `RESOURCE_SEMAPHORE`
    等待的方法是相同的。与 `RESOURCE_SEMAPHORE` 等待类型类似，`RESOURCE_SEMAPHORE_QUERY_COMPILE` 等待类型也与内存相关，因此，如果你能增加用于查询编译的总可用内存，就很有可能降低或解决
    `RESOURCE_SEMAPHORE_QUERY_COMPILE` 的等待时间。然而，增加内存在很多情况下是最后手段。


    由于我们可以使用 `DBCC MEMORYSTATUS` 命令访问有关处理编译内存的资源信号量门控的非常具体的信息，一个良好的第一步是分析这些门控的使用模式。如果你注意到某个特定门控持续存在等待的内存请求，那么该门控的内存阈值，或者说所允许的最大并发编译内存请求数量，应该能为你提供一些关于根本原因的线索。例如，如果你在大型门控（该门控一次只允许一个查询）处注意到许多排队的编译内存请求，那么导致你出现
    `RESOURCE_SEMAPHORE_QUERY_COMPILE` 等待时间的源头，可能是那些请求大量编译内存的查询。另一个原因可能是大量并发查询都需要访问小型门控——这正是我们示例中的情况，从而导致在门控处形成队列。


    在这些情况下，你应该找出导致门控处队列的具体查询，并尝试优化它们，方法是减少其编译内存需求量，或者确保减少编译发生的次数。后者可以通过确保你的查询被正确参数化来实现。每次执行时都生成即席计划的查询，可能是导致
    `RESOURCE_SEMAPHORE_QUERY_COMPILE` 等待的原因，特别是当它们被执行得非常频繁且并发时。SQLskills 的 Jonathan
    Kehayias 撰写了一篇优秀的博客文章，讲解如何查询计划缓存以检测高编译时间的语句；文章位于 [`www.sqlskills.com/blogs/jonathan/identifying-high-compile-time-statements-from-the-plan-cache/`](http://www.sqlskills.com/blogs/jonathan/identifying-high-compile-time-statements-from-the-plan-cache/)
    。使用 Jonathan 博客文章中的脚本应能帮助你检测那些需要大量编译内存的查询。


    如果你的 SQL Server 正处于内存压力之下，也可能看到 `RESOURCE_SEMAPHORE_QUERY_COMPILE` 等待的发生。这种情况的发生是由于中型和大型门控的动态编译内存阈值所致。如果
    SQL Server 处于内存压力之下，这两个门控的阈值都会降低，从而给予更多查询使用中型或大型门控的机会。但由于中型和大型门控允许的并发编译数量较少，在小型门控中，可用的并发槽位会更快地被填满。


    与 `RESOURCE_SEMAPHORE` 等待类型一样，你可以使用资源调控器将工作负载拆分到特定的资源池中。每个资源池将拥有自己的资源信号量，负责授予编译内存，从而可以将繁重的编译内存使用情况分散到多个资源池中。


    ## RESOURCE_SEMAPHORE_QUERY_COMPILE 总结


    就像为特定查询操作授予内存请求所需的资源信号量一样，也存在用于访问编译内存的资源信号量。这些资源信号量通过使用门控来调节对编译内存的访问。当一个查询被编译时，它会根据其所需的编译内存数量来接近一个门控。然后，该门控可以授予所请求的编译内存，或者如果有更多请求并发地想要访问该门控，则将该请求放入队列。当一个查询在其中一个队列中等待时，就会记录下
    `RESOURCE_SEMAPHORE_QUERY_COMPILE` 等待类型。


    解决或降低 `RESOURCE_SEMAPHORE_QUERY_COMPILE` 等待时间通常通过释放更多内存或降低查询的编译内存需求来实现。


    ## SLEEP_BPOOL_FLUSH


    `SLEEP_BPOOL_FLUSH` 等待类型与 SQL Server 内部的检查点过程直接相关。检查点进程负责将缓冲池中已修改的（或“脏的”）数据页写入磁盘上的数据库数据文件。因此，除了与检查点过程有密切关系外，`SLEEP_BPOOL_FLUSH`
    等待也与你的存储子系统的性能有关。如果我们在 SQL Server 联机丛书中搜索 `SLEEP_BPOOL_FLUSH` 等待类型的定义，微软将其描述为“当检查点正在限制新
    I/O 的发出以避免淹没磁盘子系统时”发生。


    看到 `SLEEP_BPOOL_FLUSH` 等待发生是相当普遍的，并且通常它们并不表示存在问题。然而，在某些情况下，`SLEEP_BPOOL_FLUSH`
    等待可能指示与检查点过程或存储子系统相关的性能问题。

    '
- fmt: '### What Is the `SLEEP_BPOOL_FLUSH` Wait Type?


    To get a better understanding of how the `SLEEP_BPOOL_FLUSH` wait type gets recorded,
    we need an understanding of how the checkpoint process works inside SQL Server.


    The checkpoint process is an internal SQL Server process that is responsible for
    writing modified (dirty) pages from the buffer cache to the database data file.
    One of the main reasons for this is to speed up recovery of your database when
    an unexpected failure occurs. When an unexpected failure occurs, SQL Server needs
    to go back to the state that existed before the failure. It will do this by using
    the contents of the transaction log to redo, or undo, changes that were made to
    data pages. If the data page was modified, but the change was no yet written to
    the database data file, SQL Server will need to redo the change to the data page.
    If a checkpoint already wrote the changed data page to the database data file,
    this step is not needed, which speeds up the recovery process for the database
    because SQL Server knows the data was written to the database data file. Figure
    [6-29](#340881_2_En_6_Chapter.xhtml#Fig29) shows the (simplified) process that
    happens when a data page gets modified.


    ![../images/340881_2_En_6_Chapter/340881_2_En_6_Fig29_HTML.jpg](images/340881_2_En_6_Chapter/340881_2_En_6_Fig29_HTML.jpg)


    Figure 6-29: Data modification process


    The first thing that happens when a data page is modified by a committed transaction
    is that the change will be recorded in the transaction log (first in the log buffer
    then to disk as described in the `WRITELOG` and `LOGBUFFER` wait types section).
    The modification of the data page will happen in the buffer cache, and the data
    page will be marked as dirty (red page icon). When a checkpoint occurs, which
    can be for multiple reasons as we will discuss later, all of the data pages that
    have been marked as dirty since the previous checkpoint will be written to the
    physical database data file on your storage subsystem, regardless of the state
    of the transaction that created those dirty pages (green page icon).


    The checkpoint process is executed by SQL Server automatically roughly once every
    minute, which is the default `recovery interval` if you are a lower version of
    SQL Server than SQL Server 2016. This does not mean that a checkpoint will occur
    every minute exactly. The values you can specify for the `recovery interval` are
    the upper time limit at which a checkpoint should occur, the checkpoint process
    analyses of the outstanding I/O requests, and latency; throttle checkpoint operations
    to avoid overloading the storage subsystem.


    The following list will describe the various checkpoint types available in SQL
    Server:


    - The internal checkpoint type is not configurable and occurs automatically when
    certain actions are performed; for instance, a database backup.

    - Automatic: These are the default checkpoints, on SQL Server version lower than
    2016, that occur roughly every minute when left at their default value of 0. We
    can change the interval of the checkpoint process by changing the `recovery interval`
    configuration option under the `Server Properties ➤ Database Settings` page in
    SQL Server Management Studio. We can only change it to a value in minutes, and
    it will be used for all databases inside the SQL Server instance.

    - Manual: You can manually cause checkpoints to occur by issuing the `CHECKPOINT`
    T-SQL command. Optionally, you can specify the time in seconds at which the checkpoint
    must be completed. If you do issue a manual checkpoint, it will run in the context
    of the current database. For example, executing `CHECKPOINT 10` in a query window
    will perform a checkpoint within 10 seconds of the time you executed the query.

    - Indirect: SQL Server 2012 added an extra option to configure checkpoint intervals
    on a per-database level. Configuring this option to a value greater than the default
    0 will overwrite the automatic checkpoint process for the specific database. You
    can use indirect checkpoints for a specific database by using the following command:
    `ALTER DATABASE [db name] SET TARGET_RECOVERY_TIME = [time in seconds or minutes]`.


    With the release of SQL Server 2016, Indirect Checkpoint became the new default
    setting of the Checkpoint process (with the value of 60).


    As I mentioned before, SQL Server will attempt to throttle the checkpoint process
    to avoid overloading the storage subsystem if it believes this is necessary. It
    monitors the number of outstanding requests to the storage subsystem and tries
    to detect if there is any latency. Using this information, it will throttle the
    amount of IOs the checkpoint process generates so as to avoid a too-heavy load
    on the storage subsystem. When the checkpoint process is getting throttled, the
    `SLEEP_BPOOL_FLUSH` wait type will be recorded.'
