- fmt: "### Testing Normalization\n\nWe can test whether our normalization process\
    \ has worked by creating a simple ERD (entity relationship diagram). This diagram\
    \ will graphically depict the entities, along with the keys that join them. Where\
    \ a key is unique, the line that connects the entity will be attached with a standard\
    \ end. Where repeating key values can occur, the line will attach with a crow’s\
    \ foot.\n\nWhen we examine the completed ERD, we want to see every line that joins\
    \ entities depicted as a standard line on one end and a crow’s foot on the other.\
    \ This is known as a one-to-many relationship and will map directly to the Primary\
    \ and Foreign Key constraints in your physical database tables.\n\nIf we discover\
    \ many-to-many relationships, the likelihood is that we have missed an entity\
    \ and will have to add an additional entity to our design that will work in the\
    \ same way as our `DR Server` entity to resolve the many-to-many relationship\
    \ into two one-to-many relationships.\n\nOn the other hand, if we discover a one-to-one\
    \ relationship, we have almost certainly normalized the entities to a point that\
    \ will add query complexity, without adding any value. In this case, we should\
    \ denormalize our entities back to a point where all entities are joined together\
    \ using a one-to-many relationship. An ERD for our normalized inventory database\
    \ can be found in Figure [8-4](#395785_2_En_8_Chapter.xhtml#Fig4).\n\n![](images/395785_2_En_8_Chapter/395785_2_En_8_Fig4_HTML.jpg)\n\
    \nDiagram of a database schema flow chart showing relationships between tables.\
    \ The main tables include \"Server,\" \"Instance,\" \"Service Account,\" \"sa\
    \ Account,\" \"DR Server,\" and \"DR Instance.\" Each table lists attributes such\
    \ as \"Server Name,\" \"Cluster Flag,\" \"Instance Name,\" \"Service Account Name,\"\
    \ and \"DR Technology.\" Lines connect tables, indicating relationships, with\
    \ keys labeled as \"PK\" for primary key and \"FK\" for foreign key. The chart\
    \ visually represents the structure and connections within a database system.\n\
    \nFigure 8-4: Entity relationship diagram\n\nYou will notice that the ERD has\
    \ identified an issue with our modeling. The `sa Account` entity is joined to\
    \ the `Instance` entity with a one-to-one relationship. This means that we should\
    \ denormalize the `sa Account` entity back into the `Instance` entity. The resulting\
    \ ERD is displayed in Figure [8-5](#395785_2_En_8_Chapter.xhtml#Fig5).\n\n![](images/395785_2_En_8_Chapter/395785_2_En_8_Fig5_HTML.jpg)\n\
    \nDiagram illustrating a database schema with five interconnected tables: Server,\
    \ Instance, DR Server, Service Account, and DR Instance. Each table lists attributes\
    \ and keys. The Server table includes attributes like Server Name and SQL Server\
    \ Version. The Instance table contains Instance Name and IP Address. The DR Server\
    \ table lists DR Server Name. The Service Account table includes Service Account\
    \ Name. The DR Instance table features DR Instance and DR Technology. Lines indicate\
    \ relationships between tables, with primary and foreign keys labeled.\n\nFigure\
    \ 8-5: Denormalized ERD\n\nTip\n\nThe preceding examples have demonstrated how\
    \ to model a simple inventory database. When creating an inventory database to\
    \ support your production environment, you may also wish to store details relating\
    \ to HA technologies, such as AlwaysOn failover clusters or AlwaysOn Availability\
    \ Groups. You may also wish to model `Servers`, `DR Servers`, and (potentially)\
    \ `HA Servers` as supertype and subtypes. Further details of supertypes and subtypes\
    \ can be found at [`https://msdn.microsoft.com/en-us/library/cc505839.aspx`](https://msdn.microsoft.com/en-us/library/cc505839.aspx).\n\
    \n## Inventory Database Physical Design\n\nNow that we have a logical model for\
    \ our database, we have to consider a physical design. The first consideration\
    \ may be our attribute and entity names and how they will map to SQL Server–friendly\
    \ object identifiers, which will not have to be encapsulated in square brackets.\
    \ An object identifier will have to be encapsulated in square brackets when being\
    \ referenced in code, if any of the following rules are broken:\n\n1.  Identifiers\
    \ may not contain spaces.\n\n2.  Identifiers may not contain the following special\
    \ characters:\n\n```\n    ~                              '\n    -            \
    \                  &\n    !                              .\n    {            \
    \                  (\n    %                              \\\n    }           \
    \                   )\n    ^                              `\n```\n\n3.  Identifiers\
    \ may not be the same as a T-SQL keyword.\n\nIf identifiers do not meet these\
    \ rules, they are known as delimited identifiers. Our `Server` and `Instance`\
    \ entities conform to these rules, but our `DR Server` entity will become `DRServer`;\
    \ our `DR Instance` entity will become `DRInstance`; and our `Service Account\
    \ Entity` will become `ServiceAccount`. Table [8-4](#395785_2_En_8_Chapter.xhtml#Tab4)\
    \ details the mapping of attribute names to column names.\n\nTable 8-4: Removing\
    \ Delimited Identifiers\n\n| Attribute Name | Column Name |\n| --- | --- |\n|\
    \ `Server name` | `ServerName` |\n| `Instance name` | `InstanceName` |\n| `Port`\
    \ | `Port` |\n| `IP Address` | `IPAddress` |\n| `Service account name` | `ServiceAccountName`\
    \ |\n| `Service account password` | `ServiceAccountPassword` |\n| `Authentication\
    \ mode` | `AuthenticationMode` |\n| `sa account name` | `saAccountName` |\n| `sa\
    \ account password` | `saPassword` |\n| `Cluster flag` | `ClusterFlag` |\n| `Windows\
    \ version` | `WindowsVersion` |\n| `SQL Server version` | `SQLVersion` |\n| `DR\
    \ Server Name` | `DRServerName` |\n| `DR instance Name` | `DRInstanceName` |\n\
    | `DR technology` | `DRTechnology` |\n| `Target RPO` | `TargetRPO` |\n| `Target\
    \ RTO` | `TargetRTO` |\n| `Instance classification` | `InstanceClassification`\
    \ |\n| `Server cores` | `ServerCores` |\n| `Instance cores` | `InstanceCores`\
    \ |\n| `Server RAM` | `ServerRAM` |\n| `Instance RAM` | `InstanceRAM` |\n| `Virtual\
    \ flag` | `VirtualFlag` |\n| `Hypervisor` | `Hypervisor` |\n| `SQL Server Agent\
    \ account name` | `SQLServerAgentAccountName` |\n| `SQL Server Agent account password`\
    \ | `SQLServerAgentAccountPassword` |\n| `Application owner` | `ApplicationOwner`\
    \ |\n| `Application owner e-mail` | `ApplicationOwnerEMail` |\n\nA data type is\
    \ the only constraint that a column will always have, and care should be given\
    \ when implementing this constraint. If the data type is too restrictive, some\
    \ data will not fit into the column, and you will find yourself having to fix\
    \ the issue by changing the column’s data type or length specification. If the\
    \ data type is larger than it need be, however, you will find yourself using more\
    \ server resources to satisfy disk and RAM requirements.\n\nTable [8-5](#395785_2_En_8_Chapter.xhtml#Tab5)\
    \ lists each column in our `Inventory` database and recommends a suitable data\
    \ type. Where applicable, an explanation is given of the rationale behind the\
    \ choice.\n\nTable 8-5: Data Types"
