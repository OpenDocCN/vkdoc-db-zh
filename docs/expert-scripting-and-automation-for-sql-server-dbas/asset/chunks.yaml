    This time, the output is much shorter. You will notice from the entries highlighted
    in bold text that all three set operations have been skipped. This is because
    they are already configured in the desired state and no action needs to be performed.
    This illustrates the beauty of the configuration management approach.


    The last step is to schedule this configuration to run. I normally recommend running
    the configuration every 30 minutes. That is, if any drift arises on a server,
    it will be corrected in no more than half an hour (plus the time it takes the
    configuration to execute).


    Listing 3-7 demonstrates how to configure a task in Task Scheduler to apply the
    configuration every 30 minutes. The script sets multiple variables, which build
    up the parameters that will be required to execute the `Register-ScheduledTask`
    cmdlet at the end of the script.


    Note


    You will notice that we are using Windows PowerShell, rather than PowerShell 7.
    This is because, as previously mentioned, usage of DSC without Azure is only supported
    by DSC 1.1 which shipped with Windows PowerShell 5.1. PowerShell 7 shipped with
    DSC 2.0 which contains major changes, and as of PowerShell 7.2, the `PSDesiredStateConfiguration`
    module is no longer delivered with PowerShell but is available as a separate download.


    ```

    $command = ''C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe''

    $arguments = ''-NoProfile -Command "Start-DscConfiguration -Path C:\Scripts\WindowsConfig"
    -Wait''

    $actions = (New-ScheduledTaskAction -Execute $command -Argument $arguments )

    $trigger = New-ScheduledTaskTrigger -Once -At 00:00 -RepetitionInterval (New-TimeSpan
    -Minutes 30)

    $settings = New-ScheduledTaskSettingsSet

    $principal = New-ScheduledTaskPrincipal -UserId ''NT AUTHORITY\SYSTEM'' -RunLevel
    Highest -LogonType ServiceAccount

    $task = New-ScheduledTask -Action $actions -Trigger $trigger -Settings $settings
    -Principal $principal

    Register-ScheduledTask ''ApplyWindowsConfig'' -InputObject $task

    Listing 3-7

    Create a Scheduled Task

    ```


    ## Summary


    Configuration management is a very powerful technique for building servers and
    avoiding configuration drift as they move through their life cycle. DSC in the
    modern era is most suitable for use in environments that harness Azure or Azure
    Arc. It can still be used in non-Azure environments, however, by using the DSC
    1.1 release.


    DSC can be used to configure all aspects of Windows. In this chapter, we have
    examined how to use DSC to configure registry keys, folders, and to ensure that
    services are running. In Chapter 6, we will explore how to use DSC to install
    SQL Server, and in Chapter 9, we will explore how to configure SQL Server itself,
    using DSC.


    DSC is fully extensible, and we can write our own DSC resources that will cover
    almost any possible configuration. The beauty of DSC is that it only performs
    configurations that need to be performed to avoid drift. Each resource will test
    the state of the resource and only perform the set action if the test evaluation
    fails.


    # 4. Working with the sqlserver Module


    The `sqlserver` is a PowerShell module, written and maintained by Microsoft, which
    allows DBAs to interact with and manage SQL Server instances from a PowerShell
    terminal. It can be manually downloaded from PowerShell Gallery ([`www.powershellgallery.com/packages/Sqlserver`](http://www.powershellgallery.com/packages/Sqlserver/21.1.18228))
    or can be installed using the command in Listing 4-1.


    ```

    Install-Module SqlServer

    Listing 4-1

    Install sqlserver Module

    ```


    In this chapter, we will discuss how to work with the module, exploring some of
    the most useful cmdlets and their use cases, both for ad hoc administration and
    for automation. We will start by looking at the `Invoke-SqlCmd` cmdlet, before
    looking at other cmdlets that can be used for management and scripting.


    ## Working with Invoke-SqlCmd


    Arguably, the most commonly used cmdlet in the `sqlserver` arsenal is `Invoke-SqlCmd`.
    This cmdlet mirrors the functionality of the `SQLCMD` command-line tool, allowing
    DBAs to run queries against a SQL Server instance, from a PowerShell terminal.'
