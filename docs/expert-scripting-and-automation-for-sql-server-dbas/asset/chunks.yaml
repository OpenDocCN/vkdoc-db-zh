  trans: '

    ### 产品更新


    “产品更新”功能取代了 SQL Server 已弃用的流式安装功能，它使您能够在安装 SQL Server 基础二进制文件的同时，安装最新的 `CU`（累积更新）或
    `GDR`（常规分发版本 - 针对安全问题的修复程序）。此功能可以节省数据库管理员在安装 SQL Server 实例后立即安装最新更新所需的时间和精力，也有助于确保新部署环境的补丁级别保持一致。


    提示：从 SQL Server 2017 开始，不再发布服务包。所有更新均为 `CU` 或 `GDR`。


    要使用此功能，必须在命令行安装时使用两个参数。第一个是 `/UPDATEENABLED` 参数。您应将其值指定为 `1` 或 `True`。第二个是 `/UPDATESOURCE`
    参数。此参数将告诉安装程序在哪里查找产品更新。如果向此参数传递值 `MU`，则安装程序将检查 Microsoft Update 或 WSUS 服务；或者，您也可以提供一个文件夹的相对路径或网络共享的
    `UNC`（统一命名约定）路径。


    在下面的示例中，我们将研究如何使用此功能来安装包含 `CU1` 的 SQL Server 2022，该更新位于一个网络共享中。当您下载 `GDR` 或 `CU`
    时，它们通常会被打包在一个自解压可执行文件中。这非常有用，因为即使您的环境中未使用 WSUS，一旦您批准了新的补丁级别，您只需简单地替换网络共享中的 `CU`；这样做之后，所有新部署都能接收最新的更新，而无需更改您用于构建新实例的
    PowerShell 脚本。


    清单 6-4 中的 PowerShell 命令将安装一个名为 `SCRIPTING2` 的 SQL Server 实例，同时安装位于文件服务器上的 `CU1`。


    注意：您用于运行安装的帐户需要具有对文件共享的访问权限。


    ```powershell

    .\SETUP.EXE /IACCEPTSQLSERVERLICENSETERMS /ACTION="Install" /FEATURES=SQLEngine,Replication
    /INSTANCENAME="SCRIPTING2" /SQLSVCACCOUNT="MyDomain\SQLServiceAccount1" /SQLSVCPASSWORD="Pa$$w0rd"
    /AGTSVCACCOUNT="MyDomain\SQLServiceAccount1" /AGTSVCPASSWORD="Pa$$w0rd" /SQLSYSADMINACCOUNTS="MyDomain\SQLDBA"
    /UPDATEENABLED=1 /UPDATESOURCE="\\192.168.183.1\SQL2022_CU1\" /qs

    ```

    清单 6-4：在安装过程中安装 `CU`


    清单 6-5 中的代码演示了如何检查两个实例之间的差异。该代码使用 `Invoke-sqlcmd` 连接到 `SCRIPTING2` 实例，并返回包含实例完整版本详细信息（包括内部版本号）的系统变量。实例名称也包含在内，以帮助我们轻松识别结果。


    ```powershell

    $parameters = @{

    ServerInstance = ''localhost\SCRIPTING2''

    TrustServerCertificate = $true

    Query               = "

    SELECT

    @@SERVERNAME

    , @@VERSION

    "

    }

    Invoke-sqlcmd @parameters | Format-List

    ```

    清单 6-5：确定每个实例的内部版本


    ### 使用配置文件


    清单 6-6 中的示例是一个配置文件的内容，其中已填充了安装名为 `EXPERTSCRIPTING3` 的实例所需的所有必需参数。它还包含启用命名管道和 `TCP/IP`、在可通过
    `T-SQL` 访问的级别启用 `FILESTREAM`、将 `SQL Agent` 服务设置为自动启动以及将排序规则配置为 `Latin1_General_CI_AS`
    的可选参数。在此 `.ini` 文件中，注释以行首的分号定义。


    ```ini

    ; SQL Server 2022 配置文件

    [OPTIONS]

    ; 接受 SQL Server 许可协议

    IACCEPTSQLSERVERLICENSETERMS

    ; 指定安装工作流，如 INSTALL、UNINSTALL 或 UPGRADE。

    ; 此为必需参数。

    ACTION="Install"

    ; 安装程序将仅显示进度，无需任何用户交互。

    QUIETSIMPLE="True"

    ; 指定要安装、卸载或升级的功能。

    FEATURES=SQLENGINE,REPLICATION

    ; 指定默认实例或命名实例。MSSQLSERVER 是非 Express 版本的默认实例，

    ; SQLExpress 是 Express 版本的默认实例。安装 SQL Server 数据库引擎 (SQL)、

    ; 分析服务 (AS) 时，此参数为必需。

    INSTANCENAME="EXPERTSCRIPTING3"

    ; 代理帐户名称

    AGTSVCACCOUNT="MyDomain\SQLServiceAccount1"

    ; 代理帐户密码

    AGTSVCPASSWORD="Pa$$w0rd"

    ; 安装后自动启动服务。

    AGTSVCSTARTUPTYPE="Automatic"

    ; 要启用的 FILESTREAM 功能级别 (0, 1, 2 或 3)。

    FILESTREAMLEVEL="1"

    ; 指定用于数据库引擎的 Windows 排序规则或 SQL 排序规则。

    SQLCOLLATION="Latin1_General_CI_AS"

    ; SQL Server 服务的帐户：域\用户或系统帐户。

    SQLSVCACCOUNT="MyDomain\SQLServiceAccount1"

    ; SQL Server 服务帐户的密码。

    SQLSVCPASSWORD="Pa$$w0rd"

    ; 要配置为 SQL Server 系统管理员的 Windows 帐户。

    SQLSYSADMINACCOUNTS="MyDomain\SQLDBA"

    ; 指定 0 为禁用，1 为启用 TCP/IP 协议。

    TCPENABLED="1"

    ; 指定 0 为禁用，1 为启用命名管道协议。

    NPENABLED="1"

    ```

    清单 6-6：用于 `SCRIPTING3` 的配置文件


    假设此配置文件已保存为 `c:\SQL2022\configuration1.ini`，则可以使用清单 6-7 中的代码从 PowerShell 运行 `setup.exe`。


    ```powershell

    .\setup.exe /CONFIGURATIONFILE="c:\SQL2022\Configuration1.ini"

    ```

    清单 6-7：使用配置文件安装 SQL Server


    尽管这是配置文件的完全有效的用法，但您实际上可以更巧妙地利用此方法创建一个可重用的脚本，该脚本可在任何服务器上运行，以帮助您引入一致的构建过程。如果您的 Windows
    运维团队尚未采用 `sysprep` 或使用其他方法来构建服务器，此方法特别有用。


    在清单 6-8 中，您将看到另一个配置文件。然而，这次它只包含您期望在整个环境中保持一致的静态参数。会因每次安装而变化的参数（例如实例名称和帐户详细信息）已被省略。

    '
- fmt: "## SQL Server 2022 安装配置\n\n```\n;SQL Server 2022 Configuration File\n[OPTIONS]\n\
    ; Accept the SQL Server License Agreement\nIACCEPTSQLSERVERLICENSETERMS\n; Specifies\
    \ a Setup work flow, like INSTALL, UNINSTALL, or UPGRADE.\n; This is a required\
    \ parameter.\nACTION=\"Install\"\n; Setup will display progress only, without\
    \ any user interaction.\nQUIETSIMPLE=\"True\"\n; Specifies features to install,\
    \ uninstall, or upgrade.\nFEATURES=SQLENGINE,REPLICATION\n; Auto-start service\
    \ after installation.\nAGTSVCSTARTUPTYPE=\"Automatic\"\n; Level to enable FILESTREAM\
    \ feature at (0, 1, 2 or 3).\nFILESTREAMLEVEL=\"1\"\n; Specifies a Windows collation\
    \ or an SQL collation to use for the Database Engine.\nSQLCOLLATION=\"Latin1_General_CI_AS\"\
    \n; Windows account(s) to provision as SQL Server system administrators.\nSQLSYSADMINACCOUNTS=\"\
    MyDomain\\SQLDBA\"\n; Specify 0 to disable or 1 to enable the TCP/IP protocol.\n\
    TCPENABLED=\"1\"\n; Specify 0 to disable or 1 to enable the Named Pipes protocol.\n\
    NPENABLED=\"1\"\n```\n`Listing 6-8` Configuration File for `SCRIPTING4`\n\n这意味着要成功安装该实例，你需要混合使用配置文件中的参数以及运行\
    \ `setup.exe` 命令时内联指定的参数，如`Listing 6-9`所示。此示例假设`Listing 6-8`中的配置已保存为 `C:\\SQL2022\\\
    Configuration2.ini`，并将安装一个名为 `EXPERTSCRIPTING3` 的实例。\n\n```\n.\\SETUP.EXE /INSTANCENAME=\"\
    SCRIPTING4 /SQLSVCACCOUNT=\"MyDomain\\SQLServiceAccount1\" /SQLSVCPASSWORD=\"\
    Pa$$w0rd\" /AGTSVCACCOUNT=\"MyDomain\\SQLServiceAccount1\" /AGTSVCPASSWORD=\"\
    Pa$$w0rd\" /CONFIGURATIONFILE=\"C:\\SQL2022\\Configuration2.ini\"\n```\n`Listing\
    \ 6-9` Installing SQL Server Using a Mix of Parameters and a Configuration File\n\
    \n## 通过脚本进行自动化安装\n\n这种方法的好处在于，我们拥有一个一致的配置文件，无需在每次构建新实例时都进行修改。然而，这个想法可以更进一步。如果我们把\
    \ PowerShell 命令保存为 PowerShell 脚本，那么就可以运行该脚本并传入参数，而不必每次都重写命令。这将为我们提供一个用于构建新实例的一致脚本，我们可以将其置于变更控制之下。`Listing\
    \ 6-10`中的代码演示了如何构建一个参数化的 PowerShell 脚本，它将使用相同的配置文件。该脚本假设 `D:\\` 是安装媒体的根文件夹。\n\n\
    ```\nparam(\n    [string]       $InstanceName,\n    [PSCredential] $SQLServiceAccountCredential,\n\
    \    [PSCredential] $AgentServiceAccountCredential\n)\n$params = @(\n    '/INSTANCENAME=\"\
    {0}\"' -f $InstanceName\n    '/SQLSVCACCOUNT=\"{0}\"' -f $SQLServiceAccountCredential.Username\n\
    \    '/SQLSVCPASSWORD=\"{0}\"' -f $SQLServiceAccountCredential.GetNetworkCredential().Password\n\
    \    '/AGTSVCACCOUNT=\"{0}\"' -f $AgentServiceAccountCredential.Username\n   \
    \ '/AGTSVCPASSWORD=\"{0}\"' -f$AgentServiceAccountCredential.GetNetworkCredential().Password\n\
    \    '/CONFIGURATIONFILE=\"C:\\SQL2022\\Configuration2.ini\"'\n)\nStart-Process\
    \ -FilePath 'C:\\SQLServerSetup\\SETUP.EXE' -ArgumentList $params -Wait -NoNewWindow\n\
    ```\n`Listing 6-10` PowerShell Script for Auto-install\n\n假设此脚本保存为 `SQLAutoInstall1.ps1`，则可以使用`Listing\
    \ 6-11`中的命令来构建一个名为 `SCRIPTING5` 的实例。该命令运行 PowerShell 脚本，传入参数，然后这些参数在 `setup.exe`\
    \ 命令中被使用。\n\n```\n./SQLAutoInstall.ps1 -InstanceName 'SCRIPTING5' -SQLServiceAccount\
    \ 'MyDomain\\SQLServiceAccount1' -SQLServiceAccountPassword 'Pa$$w0rd' -AgentServiceAccount\
    \ 'MyDomain\\SQLServiceAccount1' -AgentServiceAccountPassword 'Pa$$w0rd'\n```\n\
    `Listing 6-11` Running `SQLAutoInstall.ps1`\n\n### 增强安装例程\n\n你还可以进一步扩展 `SQLAutoInstall.ps1`\
    \ 脚本，并用它来结合你在第 1 章学到的操作系统组件配置技术，以及你在本章前面学到的执行冒烟测试的技术。\n\n安装实例后，修改后的脚本（如`Listing\
    \ 6-12`所示，我们称之为 `SQLAutoInstall2.ps1`）会使用 `powercfg` 设置高性能电源计划，并使用 `Set-ItemProperty`\
    \ 将后台服务优先级置于前台应用程序之上。然后运行冒烟测试以确保 SQL Server 和 SQL Agent 服务都在运行，并且实例可访问。\n\n```\n\
    param(\n    [string]       $InstanceName,\n    [PSCredential] $SQLServiceAccountCredential,\n\
    \    [PSCredential] $AgentServiceAccountCredential\n)\n# Initialize ConnectionString\
    \ variable\n$serverName = $env:computername\n$connectionString = '{0}\\{1}' -f\
    \ $serverName, $InstanceName\n#Install the instance\n$params = @(\n    '/INSTANCENAME=\"\
    {0}\"' -f $InstanceName\n    '/SQLSVCACCOUNT=\"{0}\"' -f $SQLServiceAccountCredential.Username\n\
    \    '/SQLSVCPASSWORD=\"{0}\"' -f $SQLServiceAccountCredential.GetNetworkCredential().Password\n\
    \    '/AGTSVCACCOUNT=\"{0}\"' -f $AgentServiceAccountCredential.Username\n   \
    \ '/AGTSVCPASSWORD=\"{0}\"' -f$AgentServiceAccountCredential.GetNetworkCredential().Password\n\
    \    '/CONFIGURATIONFILE=\"C:\\SQL2022\\Configuration2.ini\"'\n)\nStart-Process\
