    ## Listing 9-11 The Final Configuration


    ## Summary


    Many people think of DSC as a powerful tool for building operating systems and
    avoiding configuration drift at the operating system level. SQL Server DBAs should
    also consider it a useful tool for building and avoiding configuration drift in
    SQL Server.


    The `SqlserverDsc` module provides many resources, which we can use to configure
    all aspects of SQL Server, including security, performance, and availability.
    Some of these resources, such as the `SqlMaxDop` resource, have logic written
    into the resources that avoid us having to pass arbitrary values and, instead,
    dynamically calculate the most appropriate value for us. This is very useful because
    it allows us to resize our servers without having to worry about changing the
    values passed within our DSC configurations.


    The `SqlScriptQuery` resource allows us to define our own `Get`, `Test`, and `Set`
    queries. This makes the module fully extensible, as it means that we can cater
    to literally any configuration requirement in SQL Server, even if an out-of-the-box
    resource does not exist to perform the configuration.


    When using the `SqlScriptQuery` resource, the `Get` query should return the status
    of the resource to DSC as JSON, and we can achieve this by using a `FOR JSON`
    clause in the query. The `Test` query should check to see if the resource is configured
    in our desired state. If it is, we should let the query succeed, but if not, we
    should raise an error, which will result in the `Set` query being executed. The
    `Set` query simply consists of the T-SQL statements required to configure the
    resource to our requirements.


    # 10. Centralizing Maintenance


    One of the main goals of introducing automation and scripting techniques to your
    SQL Server environment is the ability to centralize your maintenance. This is
    a key step toward obtaining a low-ops model, where a DBA’s time is spent adding
    value proposition to the business, instead of mundane tasks, such as checking
    the status of SQL Server Agent jobs, across their enterprise.


    In this chapter, we will first discuss the design considerations for implementing
    a centralized maintenance system, which is built on the inventory database that
    we discussed in Chapter [8](#395785_2_En_8_Chapter.xhtml). We will then explore
    how to create the maintenance engine.'
