  raw: 'I have seen some environments in which instances always follow the naming
    convention SQL001, SQL002, etc. This pattern is then repeated on every server.
    In this scenario, the instance name will not be unique and cannot be used as a
    key. Therefore, either IP address would have to be used, or you would have to
    create a composite key consisting of `Server name` and `Instance name`.


    The DR entity will consist of the following attributes:


    *   `DR Server`


    *   `DR instance`


    *   `DR technology`


    *   `Target RPO`


    *   `Target RTO`


    All of the values are atomic, so there is no need for us to split out any attributes.
    In this entity, there is no single attribute that can uniquely identify all other
    attributes. We will, therefore, have to construct a composite key for this entity.
    This key will consist of `DR Server` and `DR instance`. Again, we move the key
    of the `Server` entity to the `DR Server entity`, so that we can link the entities
    together. Figure [8-2](#395785_2_En_8_Chapter.xhtml#Fig2) illustrates our completed
    1NF entity model.


    ![](images/395785_2_En_8_Chapter/395785_2_En_8_Fig2_HTML.jpg)


    Table image displaying three sections: "Server," "Instance," and "DR Server."
    The "Server" section lists attributes like Server Name, Clustered Flag, Windows
    Version, SQL Server Version, Server Cores, Server RAM, Virtual Flag, Hypervisor,
    Application Owner, and Application Owner E-Mail. The "Instance" section includes
    Instance Name, Server Name, Port, IP Address, Service Account Name, Service Account
    Password, Authentication Mode, sa Account Name, sa Account Password, Instance
    Classification, Instance Cores, Instance RAM, SQL Server Agent Account Name, and
    SQL Server Agent Account Password. The "DR Server" section lists DR Server Name,
    Server Name, DR Instance, DR Technology, Target RPO, and Target RTO.


    Figure 8-2


    1NF entities


    #### 2NF


    The next step in the normalization process will move our entities into second
    normal form (2NF). To be in 2NF, the entities must already be in 1NF, and you
    must also ensure that no non-key attribute (also known as a non-prime attribute)
    is dependent on only part of the entity’s key. If it is, you must split the attribute(s)
    out to an additional entity.


    As the `Server` and `Instance` entities all have a single attribute key, we know
    that these entities are already in second normal form. We do, however, have to
    review the `DR Server` entity, as this entity has a composite key. We should look
    at each non-prime attribute in turn and identify if the attribute is dependent
    on the whole of the composite key or just a subset of the key. Table [8-2](#395785_2_En_8_Chapter.xhtml#Tab2)
    shows this analysis.


    Table 8-2


    Key Dependencies


    | Non-prime Attribute | Key Dependencies | 2NF Compliant? |

    | --- | --- | --- |

    | `DR technology` | `DR Instance name` | No |

    | `Target RPO` | `DR Instance name` | No |

    | `Target RTO` | `DR Instance name` | No |


    As you can see, all three of the non-prime attributes can be identified without
    knowing the name of the DR server. This means that these columns should all be
    moved to a separate entity, which we will call `DR Instance`.


    The only attributes that will remain in the `DR Server` entity are the key attributes.
    This may seem a little odd, but it has happened to avoid a many-to-many relationship
    between the `Server` entity and the `DR Instance` entity and is perfectly valid
    design.


    #### 3NF


    The final stage of normalization that I will cover in this book is how to move
    entities into third normal form (3NF). In order to be in 3NF, the entity should
    already be in 2NF, and no non-prime attributes of an entity should be dependent
    on any other non-prime attributes. If we find an attribute that is dependent on
    a non-prime attribute, this is known as a transitive dependency, and the attribute
    should be moved to a separate entity.


    In the `Server`, `DR Server`, and `DR Instance` entities, there are no transitive
    dependencies. In the `Instance` entity, however, there are three attributes that
    are dependent on non-prime attributes. These are listed in Table [8-3](#395785_2_En_8_Chapter.xhtml#Tab3).


    Table 8-3


    Transitive Dependencies


    | Attribute | Dependency |

    | --- | --- |

    | `sa account password` | `sa account name` |

    | `Service account password` | `Service account name` |

    | `SQL Server agent account password` | `SQL Server agent account name` |


    Following the rules of normalization, we should move each of these attributes
    to its own entity. Using our understanding of the business rules, however, we
    know that in some cases, the same service account may be used for both the database
    engine service account and the SQL Server Agent service account. Therefore, we
    will move the service account attributes to a single entity, which we will call
    `Service Account`. We can then link the `Service Account` entity back to the `DR
    Instance` entity twice: once for the `Service Account Name` and again for the
    `SQL Server Agent Account Name`.


    The sa account details do not fit with the service account details, as the sa
    account can never be shared between instances. Therefore, we will move the sa
    account details to a separate entity, called `sa Account`. We will move the primary
    key of both the `Service Account` and `sa Account` entities back up to the `Instance`
    entity, so that they can be linked together. Figure [8-3](#395785_2_En_8_Chapter.xhtml#Fig3)
    shows how the `Instance`, `sa Account`, and `Service Account` entities have been
    modeled.


    ![](images/395785_2_En_8_Chapter/395785_2_En_8_Fig3_HTML.jpg)


    Diagram showing a flow chart with six labeled boxes: "Server," "Instance," "DR
    Server," "DR Instance," "Service Account," and "sa Account." Each box lists related
    attributes. "Server" includes details like server name and SQL version. "Instance"
    covers instance name, IP address, and authentication mode. "DR Server" and "DR
    Instance" focus on disaster recovery details. "Service Account" and "sa Account"
    list account names and passwords. The chart outlines server and account configurations.


    Figure 8-3


    Transitive dependencies'
