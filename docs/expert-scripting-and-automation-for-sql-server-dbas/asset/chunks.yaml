    The only thing that remains is to bring all of our resources together into the
    configuration that we have built during the course of Chapters [3](#395785_2_En_3_Chapter.xhtml)
    and [6](#395785_2_En_6_Chapter.xhtml). This complete configuration can be seen
    in Listing [9-11](#395785_2_En_9_Chapter.xhtml#PC11). You will notice that we
    have added a `DependOn` clause to the `DBATeamSysadmin` resource, which makes
    it dependent on the `DBATeamLogin` resource, as, of course, this resource will
    fail if the Login doesn’t already exist. We will make all other SQL Server configuration
    resources dependent on the `SQLServerService` resource, which ensures that SQL
    Server Database Engine service is started. This is because each of these resources
    would fail if the database engine service was stopped.'
