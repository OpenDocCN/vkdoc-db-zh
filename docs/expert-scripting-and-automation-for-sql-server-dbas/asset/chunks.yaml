    \        = \"localhost\"\n    Name               = \"Inventory\"\n    Collation\
    \          = \"Latin1_General_CI_AS\"\n    Owner              = \"sa\"\n    RecoveryModel\
    \      = \"Full\"\n    PrimaryFileSize    = \"2048\" # 指定单位为 MB\n    PrimaryFileGrowth\
    \  = \"1024\" # 指定单位为 MB\n    PrimaryFileMaxSize = \"4096\" # 指定单位为 MB\n}\nNew-DbaDatabase\
    \ @params\n# 清单 8-1 创建外壳数据库\n```\n\n由于我们的库存数据库将包含所管理实例的 `sa` 密码，因此我们需要考虑加密。SQL\
    \ Server 中的加密层次结构如图 [8-6](#395785_2_En_8_Chapter.xhtml#Fig6) 所示。\n\n![](images/395785_2_En_8_Chapter/395785_2_En_8_Fig6_HTML.jpg)\n\
    \n图 8-6\n\nSQL Server 加密层次结构\n\n> 提示\n>\n> 全面讨论加密超出了本书的范围。但是，可以在 Apress 出版的 *Pro\
    \ SQL Server 2022 Administration* 中找到完整的描述，网址为 link.springer.com/book/10.1007/978-1-4842-8864-1。\n\
    \n对于我们的用例，我们需要创建一个数据库主密钥（服务主密钥将自动创建）。然后，我们需要创建一个使用数据库主密钥加密的证书，再创建一个使用该证书加密的对称密钥。这样就可以使用对称密钥加密\
    \ `sa` 密码，然后再插入数据库表。\n\n我们可以使用 `New-DbaDbMasterKey` 命令创建数据库主密钥，如代码清单 [8-2](#395785_2_En_8_Chapter.xhtml#PC3)\
    \ 所示。在这里，我们将一个密码转换为安全字符串，然后将其作为主密钥的密码，连同将在其中创建主密钥的数据库名称一起，传递到 `New-DbaDbMasterKey`\
    \ 命令中。\n\n```powershell\n$Password = $SecurePassword = ConvertTo-SecureString\
    \ 'Pa$$w0rd' -AsPlainText -Force\n$params = @{\n    SqlInstance    = \"localhost\"\
    \n    Database       = \"Inventory\"\n    SecurePassword = $Password\n}\nNew-DbaDbMasterKey\
    \ @params\n# 清单 8-2 为库存数据库创建数据库主密钥\n```\n\n备份数据库主密钥至关重要。否则，如果我们丢失了密钥，将无法恢复加密的数据。我们可以使用代码清单\
