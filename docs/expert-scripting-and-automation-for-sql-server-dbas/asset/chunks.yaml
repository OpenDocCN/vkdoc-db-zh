  trans: '

    ### 规范化


    既然我们已经确定了需要存储的数据（称为属性），接下来必须将这些属性分组到相关的组中。每个组称为一个实体，这些属性实际上就是最终实体的属性。


    对实体进行建模的过程称为*规范化*。这一过程由 Edgar F. Codd 于 1970 年发明，并经受住了时间的考验，尽管在随后的十年中又增加了额外的范式。


    总共有八种范式，列举如下：


    *   1NF（第一范式）

    *   2NF（第二范式）

    *   3NF（第三范式——这是由 Edgar Codd 定义的原始范式中的最后一个）

    *   BCNF（Boyce-Codd 范式，也称为 3.5 范式）

    *   4NF（第四范式）

    *   5NF（第五范式）

    *   6NF（第六范式）

    *   DKNF（域键范式）


    从 BCNF 到 DKNF 这些范式处理的是特殊情况，并且大多数情况下，如果数据库处于 3NF，那么它通常也满足 DKNF。因此，以下部分将只讨论前三种范式。


    使用规范化对数据库进行建模的原因是为了减少数据冗余，这意味着每一条数据都应该只存储一次，用于唯一标识该数据的键除外。这与其说是为了节省存储空间（尽管这显然具有成本和性能优势），不如说是为了避免因需要在多个位置更新数据而导致的数据库异常。它也避免了与防止这些异常相关的复杂性和开销。


    **提示**


    规范化仅适用于 OLTP（联机事务处理）数据库。数据仓库和数据集市应为了性能而进行反规范化。因此，应使用诸如 Kimball 方法学之类的技术进行建模。ODS（操作数据存储）也需要以不同方式建模，通常基于它所集成的异构源。


    将数据建模为 1NF 的目标是确保值是原子的，将重复的属性组移至单独的实体，并且所有属性都依赖于键（也称为素属性）。将数据建模为 2NF 的目标是确保所有非素属性都依赖于实体内的所有素属性。将数据建模为
    3NF 的目标是确保没有非素属性依赖于任何其他非素属性。我喜欢用这句话来记忆：“第一、第二和第三范式确保所有属性都依赖于键、整个键、以及除了键之外什么也不依赖。”


    #### 1NF


    我们规范化之旅的第一步是将所需属性移入第一范式（1NF）。为此，我们必须确保每个属性都是原子的（只保存一条信息），并且每个属性都依赖于一个键。在此阶段，我们还将把重复的属性组拆分到新的实体中。那么，首先，让我们拆分出重复的属性组。我们将从第一个属性（`Server
    name`）开始，然后对每个其他属性提出以下问题：“每个服务器是否可以有多个该属性？” 表 8-1 为每个属性回答了这个问题。


    **表 8-1**


    **每个服务器名是否可以有多个该属性？**


    | 属性 | 每个服务器是否可以有多个该属性？ |

    | --- | --- |

    | `Instance name` | 是 |

    | `Port` | 是 |

    | `IP Address` | 是 |

    | `Service account name and password` | 是 |

    | `Authentication mode` | 是 |

    | `sa account name and password` | 是 |

    | `Cluster flag` | 否 |

    | `Windows version` | 否 |

    | `SQL Server version` | 否（技术上可行，但违反大多数公司策略） |

    | `DR Server` | 是 |

    | `DR instance` | 是 |

    | `DR technology` | 是 |

    | `Target RPO` | 是 |

    | `Target RTO` | 是 |

    | `Instance classification` | 是 |

    | `Server cores` | 否 |

    | `Instance cores` | 是 |

    | `Server RAM` | 否 |

    | `Instance RAM` | 是 |

    | `Virtual flag` | 否 |

    | `Hypervisor` | 否 |

    | `SQL Server Agent account name and password` | 是 |

    | `Application owner` | 否 |

    | `Application owner e-mail` | 否 |


    对于任何答案为“否”的属性，在此规范化阶段，它将保留在与 `Server name` 相同的实体中。因此，我们知道我们的第一个实体将包含以下属性：


    *   `Server name`

    *   `Cluster flag`

    *   `Windows version`

    *   `SQL Server version`

    *   `Server cores`

    *   `Server RAM`

    *   `Virtual flag`

    *   `Hypervisor`

    *   `Application owner`

    *   `Application owner e-mail`


    我们应该给这个实体一个有意义的名称，因此我们将其称为 `Server`。我们现在应确保 `Server` 实体中的每个属性都依赖于一个键。键应该能唯一标识任何行，而
    `Server name` 将满足这一要求。因此，我们将把 `Server name` 设为键（素）属性。我们可以看到每个属性只包含一个值，这意味着我们也满足了原子性的要求。


    如果我们查看剩余的属性，可以发现它们自然地分为两组：`Instance` 和 `DR Server`。因此，我们将把其余的属性拆分到与这些重复组对应的新实体中。


    首先，让我们看看 `Instance` 实体，它将包含以下属性：


    *   `Instance name`

    *   `Port`

    *   `IP Address`

    *   `Service account name and password`

    *   `Authentication mode`

    *   `sa account name and password`

    *   `Instance classification`

    *   `Instance cores`

    *   `Instance RAM`

    *   `SQL Server Agent account name and password`


    我们需要将 `Server name` 属性添加到 `Instance` 实体中，以便能够将这些实体关联起来。在这个实体中，我们还可以轻松识别出三个不包含原子值的属性：`sa
    account name and password`、`Service account name and password` 和 `SQL Server Agent
    account name and password`。每个属性都包含两个值：账户名和密码。因此，这些列应该被拆分，得到以下属性集：


    *   `Instance name`

    *   `Server name`

    *   `Port`

    *   `IP Address`

    *   `Service account name`

    *   `Service account password`

    *   `Authentication mode`

    *   `sa account name`

    *   `sa password`

    *   `Instance classification`

    *   `Instance cores`

    *   `Instance RAM`

    *   `Additional services`

    *   `SQL Server Agent account name`

    *   `SQL Server Agent account password`


    关于键，所有属性都可以通过 `Instance name` 唯一标识。因此，实例名称将成为该实体的键。


    **提示**

    '
- fmt: '# 数据库规范化


    我见过一些环境，其实例总是遵循SQL001、SQL002等命名约定。这种模式在每个服务器上重复出现。在这种情况下，实例名称将不是唯一的，不能用作键。因此，要么必须使用IP地址，要么必须创建一个由`服务器名`和`实例名`组成的复合键。


    灾难恢复（DR）实体将包含以下属性：


    *   `DR Server`


    *   `DR instance`


    *   `DR technology`


    *   `Target RPO`


    *   `Target RTO`


    所有值都是原子性的，因此我们无需拆分任何属性。在这个实体中，没有单个属性能够唯一标识所有其他属性。因此，我们必须为此实体构建一个复合键。该键将由`DR Server`和`DR
    instance`组成。同样，我们将`Server`实体的键移动到`DR Server`实体中，以便将实体链接起来。图8-2展示了我们完成的1NF实体模型。


    ![](images/395785_2_En_8_Chapter/395785_2_En_8_Fig2_HTML.jpg)


    显示三个部分的表格图像：“服务器”、“实例”和“DR Server”。“服务器”部分列出了服务器名称、集群标志、Windows版本、SQL Server版本、服务器核心数、服务器内存、虚拟化标志、管理程序、应用负责人和应用负责人电子邮件等属性。“实例”部分包括实例名称、服务器名称、端口、IP地址、服务账户名、服务账户密码、身份验证模式、sa账户名、sa账户密码、实例分类、实例核心数、实例内存、SQL
    Server代理账户名和SQL Server代理账户密码。“DR Server”部分列出了DR服务器名称、服务器名称、DR实例、DR技术、目标RPO和目标RTO。


    图 8-2


    1NF实体


    ## 2NF


    规范化过程的下一步是将我们的实体转换为第二范式（2NF）。要符合2NF，实体必须已经是1NF，并且你必须确保没有非键属性（也称为非素属性）仅依赖于实体键的一部分。如果有，你必须将属性拆分到额外的实体中。


    由于`Server`和`Instance`实体都具有单属性键，我们知道这些实体已经是第二范式。然而，我们必须检查`DR Server`实体，因为该实体具有复合键。我们应该依次查看每个非素属性，并确定该属性是依赖于复合键的全部，还是仅依赖于键的一个子集。表8-2显示了此分析。


    表 8-2


    键依赖关系


    | 非素属性 | 键依赖关系 | 符合2NF？ |

    | --- | --- | --- |

    | `DR technology` | `DR Instance name` | 否 |

    | `Target RPO` | `DR Instance name` | 否 |

    | `Target RTO` | `DR Instance name` | 否 |


    如你所见，所有三个非素属性无需知道DR服务器的名称即可标识。这意味着这些列都应移动到一个单独的实体中，我们称之为`DR Instance`。


    唯一保留在`DR Server`实体中的属性是键属性。这可能看起来有点奇怪，但这样做是为了避免`Server`实体和`DR Instance`实体之间的多对多关系，并且是一个完全有效的设计。


    ## 3NF


    本书中将介绍的规范化最后阶段是如何将实体转换为第三范式（3NF）。为了符合3NF，实体应该已经是2NF，并且实体的非素属性不应依赖于任何其他非素属性。如果我们发现一个属性依赖于非素属性，则称为传递依赖，该属性应移动到单独的实体中。


    在`Server`、`DR Server`和`DR Instance`实体中，没有传递依赖。然而，在`Instance`实体中，有三个属性依赖于非素属性。这些列在表8-3中。


    表 8-3


    传递依赖


    | 属性 | 依赖 |

    | --- | --- |

    | `sa account password` | `sa account name` |

    | `Service account password` | `Service account name` |

    | `SQL Server agent account password` | `SQL Server agent account name` |


    根据规范化规则，我们应该将这些属性中的每一个移动到其自己的实体中。但是，利用我们对业务规则的理解，我们知道在某些情况下，同一个服务账户可能同时用于数据库引擎服务账户和SQL
    Server Agent服务账户。因此，我们将服务账户属性移动到单个实体中，我们称之为`Service Account`。然后，我们可以将`Service
    Account`实体链接回`DR Instance`实体两次：一次用于`Service Account Name`，另一次用于`SQL Server Agent
    Account Name`。


    sa账户详情与服务账户详情不匹配，因为sa账户永远不能在实例之间共享。因此，我们将sa账户详情移动到一个单独的实体中，称为`sa Account`。我们将`Service
