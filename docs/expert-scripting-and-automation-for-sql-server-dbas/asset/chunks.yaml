    Listing 8-4

    Create a Certificate

    ```


    Just as we did with the Database Master Key, we should take a backup of the certificate
    to ensure that there is no data loss, should an issue with the certificate occur.
    This is demonstrated in Listing [8-5](#395785_2_En_8_Chapter.xhtml#PC7).


    ```

    $Password = $SecurePassword = ConvertTo-SecureString ''Pa$$w0rd'' -AsPlainText
    -Force

    $params = @{

    SqlInstance        = "localhost"

    Database           = "Inventory"

    EncryptionPassword = $Password

    DecryptionPassword = $Password

    Path               = "C:\Keys\"

    }

    Backup-DbaDbCertificate @params

    Listing 8-5

    Back Up the Certificate

    ```


    The output of this command is shown below. You will notice that you are provided
    with the filenames used to create the certificate and private key files.


    ```

    Certificate  : Inventory

    ComputerName : WIN-J38I01U06D7

    Database     : Inventory

    InstanceName : MSSQLSERVER

    Key          : C:\Keys\Inventory202401281255385538.pvk

    Path         : C:\Keys\Inventory202401281255385538.cer

    SqlInstance  : WIN-J38I01U06D7

    Status       : Success

    ```


    We can now create a symmetric key. This will be encrypted using our certificate
    and in turn will be used to encrypt data that we insert into the `saPassword`
    column of the `dbo.Instance` table. Listing [8-6](#395785_2_En_8_Chapter.xhtml#PC9)
    demonstrates how to create a symmetric key. Unfortunately, at the time of writing,
    the DbaTools command to do this (New-DbaEncryptionKey) looks for a certificate
    in the master database, as opposed to the user database. Therefore, the script
    is using Invoke-DbaQuery, passing in a T-SQL script to create the key.


    Tip


    Further details of Invoke-DbaQuery can be found in Chapter [5](#395785_2_En_5_Chapter.xhtml).


    ```

    $params = @{

    SqlInstance = "localhost"

    Query = "

    CREATE SYMMETRIC KEY Inventory_Key

    WITH ALGORITHM = AES_128

    ENCRYPTION BY CERTIFICATE Inventory

    "

    Database = "Inventory"

    }

    Invoke-DbaQuery @params

    Listing 8-6

    Create a Symmetric Key

    ```


    Finally, we need to create the tables. Although there is a DbaTools command for
    creating tables (New-DbaDbTable), I personally find it rather cumbersome, with
    the column definitions needing to be defined in an array and then passed in. Therefore,
    we will perform this action using the `Invoke-DbaQuery` command, passing in a
    script that will create the required schema. This is demonstrated in Listing [8-7](#395785_2_En_8_Chapter.xhtml#PC10).
    Note that the `saPassword` column is created as a `VARBINARY(256)` instead of
    an `NVARCHAR(64)` to allow encrypted value to be stored.


    ```

    $params = @{

    SqlInstance = "localhost"

    Database = “Inventory”

    Query       = "

    --Create the ServiceAccount table

    CREATE TABLE [dbo].[ServiceAccount] (

    [ServiceAccountID] INT NOT NULL IDENTITY PRIMARY KEY,

    [ServiceAccountName] NVARCHAR(128) NOT NULL UNIQUE,

    [ServiceAccountPassword] VARBINARY(256)

    ) ;

    GO

    --Create the Server table

    CREATE TABLE [dbo].[Server] (

    [ServerID] INT NOT NULL IDENTITY PRIMARY KEY,

    [ServerName] NVARCHAR(128) NOT NULL UNIQUE,

    [ClusterFlag] BIT NOT NULL,

    [WindowsVersion] NVARCHAR(64) NOT NULL,

    [SQLVersion] NVARCHAR(64) NOT NULL,

    [ServerCores] TINYINT NOT NULL,

    [ServerRAM] BIGINT NOT NULL,

    [VirtualFlag] BIT NOT NULL,

    [Hypervisor] BIT NULL,

    [ApplicationOwner] NVARCHAR(256) NULL,

    [ApplicationOwnerEMail] NVARCHAR(512) NULL

    ) ;

    GO

    --Create the DRServer table

    CREATE TABLE [dbo].[DRServer] (

    [DRServerID] INT NOT NULL IDENTITY ,

    [DRServerName] NVARCHAR(128) NOT NULL

    [ServerID] INT NOT NULL,

    CONSTRAINT [FK_DRServer_ToServer]

    FOREIGN KEY ([ServerID]) REFERENCES [Server]([ServerID]),

    PRIMARY KEY ([DRServerID], [ServerID])

    ) ;

    GO

    --Create the DRInstance table

    CREATE TABLE [dbo].[DRInstance] (

    [DRInstanceID] INT NOT NULL IDENTITY PRIMARY KEY,

    [DRInstanceName] NVARCHAR(128) NOT NULL UNIQUE,

    [DRServerID] INT NOT NULL,

    [ServerID] INT NOT NULL,

    [DRTechnology] NVARCHAR(128) NOT NULL,

    [TargetRPO] TINYINT NOT NULL,

    [TargetPTO] TINYINT NOT NULL,

    CONSTRAINT [FK_DRInstance_ToDRServer]

    FOREIGN KEY ([DRServerID], [ServerID]) REFERENCES [DRServer]([DRServerID],[ServerID])

    ) ;

    GO

    --Create the Instance table

    CREATE TABLE [dbo].[Instance] (

    [InstanceID] INT NOT NULL IDENTITY  PRIMARY KEY,

    [InstanceName] NVARCHAR(128) NOT NULL UNIQUE,

    [ServerID] INT NOT NULL,

    [Port] NVARCHAR(8) NOT NULL,

    [IPAddress] NVARCHAR(15) NOT NULL,

    [SQLServiceAccountID] INT NOT NULL,

    [AuthenticationMode] BIT NOT NULL,

    [saAccountName] NVARCHAR(128) NULL,

    [saAccountPassword] VARBINARY(256) NULL,

    [InstanceClassification] TINYINT NOT NULL,

    [InstanceCores] TINYINT NOT NULL,

    [InstanceRAM] BIGINT NOT NULL,

    [SQLServerAgentAccountID] INT NOT NULL,

    CONSTRAINT [FK_Instance_ToServer]

    FOREIGN KEY ([ServerID]) REFERENCES [Server]([ServerID]),

    CONSTRAINT [FK_Instance_SQL_ToServiceAccount]

    FOREIGN KEY ([SQLServiceAccountID]) REFERENCES [ServiceAccount]([ServiceAccountID]),

    CONSTRAINT [FK_Instance_Agent_ToServiceAccount]

    FOREIGN KEY ([SQLServerAgentAccountID]) REFERENCES [ServiceAccount]([ServiceAccountID])

    ) ;

    GO

    "

    }

    Invoke-DbaQuery @params

    Listing 8-7

    Create the Schema

    ```


    ## Summary


    A well-designed inventory database can assist DBAs in their automation effort
    by providing an automatically maintained, central repository of information that
    can in turn drive automated maintenance routines.


    When designing the inventory database, you will have to consider both platform
    requirements and also the logical and physical design of the database tables.
    When designing the platform requirements of the database, you should consider
    HA/DR strategies and also placement of the inventory database to avoid data center
    isolation issues. Ideally, you will have geographical dispersion of the inventory
    database, as it is critical to offering a “low-ops” solution.


    When performing the logical design of the database, you should model the data
    using normalization, which is a process invented in 1970 for the elimination of
    data duplication. You can then test your model by using an entity relationship
    diagram to ensure that all entities are joined with one-to-many relationships.


    The physical design of the database will involve designing the physical tables
    that will store the data. This involves ensuring that there are no delimited identifiers,
    choosing appropriate data types, and defining any artificial keys that may be
    required.


    You can create the database and required artifacts, such as encryption keys and
    certificates, as well as the database and tables using DbaTools. This keeps all
    of your code in PowerShell. There are some artifacts, such as symmetric keys and
    tables, however, which it may be better to create using the `Invoke-DbaQuery`
    command, due to limitations in the functionality-specific commands.'
  trans: "\n此命令的示例输出如下所示。你会注意到其中包含了保存密钥时使用的文件名。\n\n```\nComputerName : WIN-J38I01U06D7\n\
    InstanceName : MSSQLSERVER\nSqlInstance  : WIN-J38I01U06D7\nDatabase     : Inventory\n\
    Path         : C:\\Keys\\localhost-Inventory-20240128124555.key\nStatus      \
    \ : Success\n```\n\n## 创建证书\n我们现在可以创建一个证书。清单 8-4 演示了如何使用 `New-DbaDbCertificate`\
    \ 命令来生成证书。\n\n```\n$Password = $SecurePassword = ConvertTo-SecureString 'Pa$$w0rd'\
    \ -AsPlainText -Force\n$params = @{\n    SqlInstance    = \"localhost\"\n    Database\
    \       = \"Inventory\"\n    SecurePassword = $Password\n}\nNew-DbaDbCertificate\
    \ @params\n清单 8-4\n创建证书\n```\n\n## 备份证书\n就像我们处理数据库主密钥一样，我们也应该备份证书，以确保在证书出现问题时不会丢失数据。清单\
    \ 8-5 演示了这一点。\n\n```\n$Password = $SecurePassword = ConvertTo-SecureString 'Pa$$w0rd'\
    \ -AsPlainText -Force\n$params = @{\n    SqlInstance        = \"localhost\"\n\
    \    Database           = \"Inventory\"\n    EncryptionPassword = $Password\n\
    \    DecryptionPassword = $Password\n    Path               = \"C:\\Keys\\\"\n\
    }\nBackup-DbaDbCertificate @params\n清单 8-5\n备份证书\n```\n\n此命令的输出如下所示。你会注意到它提供了用于创建证书和私钥文件的文件名。\n\
    \n```\nCertificate  : Inventory\nComputerName : WIN-J38I01U06D7\nDatabase    \
    \ : Inventory\nInstanceName : MSSQLSERVER\nKey          : C:\\Keys\\Inventory202401281255385538.pvk\n\
    Path         : C:\\Keys\\Inventory202401281255385538.cer\nSqlInstance  : WIN-J38I01U06D7\n\
    Status       : Success\n```\n\n## 创建对称键\n我们现在可以创建一个对称密钥。该密钥将使用我们的证书进行加密，反过来又将用于加密我们插入到\
    \ `dbo.Instance` 表的 `saPassword` 列中的数据。清单 8-6 演示了如何创建对称密钥。不幸的是，在撰写本文时，执行此操作的 DbaTools\
    \ 命令 (`New-DbaEncryptionKey`) 会在 master 数据库中查找证书，而不是在用户数据库中。因此，脚本使用了 `Invoke-DbaQuery`，传入\
    \ T-SQL 脚本来创建密钥。\n\n> 提示\n>\n> 关于 `Invoke-DbaQuery` 的更多详细信息可以在第 5 章找到。\n\n```\n\
    $params = @{\n    SqlInstance = \"localhost\"\n    Query = \"\n        CREATE\
    \ SYMMETRIC KEY Inventory_Key\n        WITH ALGORITHM = AES_128\n        ENCRYPTION\
    \ BY CERTIFICATE Inventory\n    \"\n    Database = \"Inventory\"\n}\nInvoke-DbaQuery\
    \ @params\n清单 8-6\n创建对称密钥\n```\n\n## 创建表\n最后，我们需要创建表。虽然有一个用于创建表的 DbaTools 命令 (`New-DbaDbTable`)，但我个人觉得它相当繁琐，需要将列定义在数组中定义然后传入。因此，我们将使用\
    \ `Invoke-DbaQuery` 命令执行此操作，传入一个将创建所需架构的脚本。清单 8-7 演示了这一点。请注意，`saPassword` 列被创建为\
    \ `VARBINARY(256)` 而不是 `NVARCHAR(64)`，以便存储加密值。\n\n```\n$params = @{\n    SqlInstance\
    \ = \"localhost\"\n    Database = \"Inventory\"\n    Query       = \"\n      \
    \  --Create the ServiceAccount table\n        CREATE TABLE [dbo].[ServiceAccount]\
    \ (\n            [ServiceAccountID] INT NOT NULL IDENTITY PRIMARY KEY,\n     \
    \       [ServiceAccountName] NVARCHAR(128) NOT NULL UNIQUE,\n            [ServiceAccountPassword]\
    \ VARBINARY(256)\n        ) ;\n        GO\n\n        --Create the Server table\n\
    \        CREATE TABLE [dbo].[Server] (\n            [ServerID] INT NOT NULL IDENTITY\
    \ PRIMARY KEY,\n            [ServerName] NVARCHAR(128) NOT NULL UNIQUE,\n    \
    \        [ClusterFlag] BIT NOT NULL,\n            [WindowsVersion] NVARCHAR(64)\
    \ NOT NULL,\n            [SQLVersion] NVARCHAR(64) NOT NULL,\n            [ServerCores]\
    \ TINYINT NOT NULL,\n            [ServerRAM] BIGINT NOT NULL,\n            [VirtualFlag]\
    \ BIT NOT NULL,\n            [Hypervisor] BIT NULL,\n            [ApplicationOwner]\
    \ NVARCHAR(256) NULL,\n            [ApplicationOwnerEMail] NVARCHAR(512) NULL\n\
    \        ) ;\n        GO\n\n        --Create the DRServer table\n        CREATE\
    \ TABLE [dbo].[DRServer] (\n            [DRServerID] INT NOT NULL IDENTITY ,\n\
    \            [DRServerName] NVARCHAR(128) NOT NULL\n            [ServerID] INT\
    \ NOT NULL,\n            CONSTRAINT [FK_DRServer_ToServer]\n                FOREIGN\
    \ KEY ([ServerID]) REFERENCES Server,\n            PRIMARY KEY ([DRServerID],\
    \ [ServerID])\n        ) ;\n        GO\n\n        --Create the DRInstance table\n\
    \        CREATE TABLE [dbo].[DRInstance] (\n            [DRInstanceID] INT NOT\
    \ NULL IDENTITY PRIMARY KEY,\n            [DRInstanceName] NVARCHAR(128) NOT NULL\
    \ UNIQUE,\n            [DRServerID] INT NOT NULL,\n            [ServerID] INT\
    \ NOT NULL,\n            [DRTechnology] NVARCHAR(128) NOT NULL,\n            [TargetRPO]\
    \ TINYINT NOT NULL,\n            [TargetPTO] TINYINT NOT NULL,\n            CONSTRAINT\
    \ [FK_DRInstance_ToDRServer]\n                FOREIGN KEY ([DRServerID], [ServerID])\
    \ REFERENCES DRServer\n        ) ;\n        GO\n\n        --Create the Instance\
    \ table\n        CREATE TABLE [dbo].[Instance] (\n            [InstanceID] INT\
    \ NOT NULL IDENTITY  PRIMARY KEY,\n            [InstanceName] NVARCHAR(128) NOT\
    \ NULL UNIQUE,\n            [ServerID] INT NOT NULL,\n            [Port] NVARCHAR(8)\
    \ NOT NULL,\n            [IPAddress] NVARCHAR(15) NOT NULL,\n            [SQLServiceAccountID]\
    \ INT NOT NULL,\n            [AuthenticationMode] BIT NOT NULL,\n            [saAccountName]\
    \ NVARCHAR(128) NULL,\n            [saAccountPassword] VARBINARY(256) NULL,\n\
    \            [InstanceClassification] TINYINT NOT NULL,\n            [InstanceCores]\
    \ TINYINT NOT NULL,\n            [InstanceRAM] BIGINT NOT NULL,\n            [SQLServerAgentAccountID]\
    \ INT NOT NULL,\n            CONSTRAINT [FK_Instance_ToServer]\n             \
    \   FOREIGN KEY ([ServerID]) REFERENCES Server,\n            CONSTRAINT [FK_Instance_SQL_ToServiceAccount]\n\
    \                FOREIGN KEY ([SQLServiceAccountID]) REFERENCES ServiceAccount,\n\
    \            CONSTRAINT [FK_Instance_Agent_ToServiceAccount]\n               \
    \ FOREIGN KEY ([SQLServerAgentAccountID]) REFERENCES ServiceAccount\n        )\
    \ ;\n        GO\n    \"\n}\nInvoke-DbaQuery @params\n清单 8-7\n创建架构\n```\n\n## 总结\n\
    一个设计良好的清单数据库可以通过提供自动维护的、集中式的信息存储库来协助 DBA 进行自动化工作，该存储库进而可以驱动自动化维护例程。\n\n在设计清单数据库时，你必须同时考虑平台需求以及数据库表的逻辑和物理设计。在设计数据库的平台需求时，你应该考虑\
    \ HA/DR 策略以及清单数据库的放置位置，以避免数据中心隔离问题。理想情况下，你应该将清单数据库进行地理分散，因为它对于提供“低运维”解决方案至关重要。\n\
    \n在执行数据库的逻辑设计时，你应该使用规范化来建模数据，这是在 1970 年发明的用于消除数据重复的过程。然后，你可以使用实体关系图测试你的模型，以确保所有实体都通过一对多关系连接。\n\
    \n数据库的物理设计将涉及设计将存储数据的物理表。这包括确保没有分隔标识符、选择适当的数据类型以及定义可能需要的任何人工键。\n\n你可以使用 DbaTools\
    \ 创建数据库和所需的对象，例如加密密钥和证书，以及数据库和表。这使你所有的代码都保留在 PowerShell 中。然而，有些对象，例如对称密钥和表，使用\
    \ `Invoke-DbaQuery` 命令创建可能更好，因为特定功能的命令存在限制。\n"
- fmt: '# 9. Implementing Configuration Management for SQL Server


    In Chapter [3](#395785_2_En_3_Chapter.xhtml), we explored the concepts of configuration
    management and how we can use PowerShell DSC to configure the Windows operating
    system and prevent configuration drift. In Chapter [6](#395785_2_En_6_Chapter.xhtml),
    we expanded on this concept to examine how we can use DSC to ensure that our SQL
    Server instance is installed. In this chapter, we will explore the `SqlServerDsc`
    module further, exploring how we can use it to configure our SQL Server instance
    and prevent drift.


    We will start by defining the requirements for our build, by thinking about some
    of the common aspects of a SQL Server instance that we may wish to configure during
    a SQL Server build and avoid drift during the instance’s life cycle. Then, we
    will explore how we can implement the appropriate DSC resources.


    ## Defining the Configuration Requirements


    When defining a standard build for our organization, we should think not just
    about installing SQL Server but also how it should be configured. When thinking
    about this configuration, we should consider aspects such as security, performance,
    and reducing ongoing operations.


    Tip


    High availability is beyond the scope of this book, but it is another consideration
    for DSC, as the `SqlServerDsc` module has commands that can help add nodes to
    clusters or Availability Groups.


    ### Security Requirements


    Security in SQL Server is a huge topic, which I cover in depth in the Apress book
    *Securing SQL Server*, which can be found at link.springer.com/book/10.1007/978-1-4842-2265-2\.
    For the purpose of this chapter, however, let’s pick three considerations. The
    first of these is the use of `xp_cmdshell`. This is a system stored procedure,
    which allows administrators to interact with the operating system from within
    SQL Server. Unfortunately, the nature of it makes it a prime target for nefarious
    activities. There are attack vectors, which means this procedure can be used to
    perform lateral movement attacks across the network, if a SQL Server instance
    is compromised.


    The second configuration we will enforce is that OLE Automation is disabled. If
    OLE Automation Procedures are enabled, then the attack surface of the SQL Server
    instance is increased, and users are allowed to execute functions, external to
    SQL Server, which act within the security context of the database engine service.
    This is another prime target for attackers who wish to perform lateral movement
    attacks.


    Finally, we will ensure that the built-in Windows `Administrators` role is not
    associated with a SQL Server Login. In very old versions of SQL Server, the `Administrators`
    group was automatically given a SQL Server Login and added to the `sysadmin` fixed
    server role. Over the last 15 years, however, this behavior has been changed,
    and it is now considered a poor practice. In fact, in SQL Server 2022, it’s no
    longer possible to add the local Administrators group as a login. Only designated
    SQL Server administrators should be given permissions to the SQL Server instance.
    If administrators who are not skilled in SQL Server attempt to perform actions
    in SQL Server, then this can lead to issues, even if their intentions are benign.


    ### Performance Requirements


    Ensuring good performance is at the forefront of many DBAs’ minds. Many performance
    configurations will be dependent on the nature of the workload profile of the
    databases hosted in the instance. For example, OLTP databases, which expect a
    high percentage of `INSERTS` and `UPDATES`, may be configured differently to data
    warehouse databases, which are subject to nightly ETL runs, but the user experience
    is based mainly on large reads. There are some performance optimizations which
    `usually` hold true, regardless of the workload profile, however.


    The first configuration that we will ensure for our instance is that the maximum
    degree of parallelism (MAXDOP) is configured optimally. This setting will determine
    the maximum number of cores that can be used by a single query. Setting MAXDOP
    to 0 allows for unlimited parallelization, whereas setting it to an integer value
    specifies the number of logical processors that can be used.


    Although there are edge cases, such as servers with multiple NUMA nodes, the general
    rule of thumb is that MAXDOP should be configured as the number of cores in the
    server, up to a maximum of 8\. `SqlserverDsc` allows us to configure this value
    dynamically. This is very helpful, as it means that if we resize our server, DSC
    will automatically change the MAXDOP to ensure it remains appropriate.


    The second configuration that we will enforce relates to how much memory is consumed
    by SQL Server. Microsoft recommends that the maximum amount of memory used by
    SQL Server (for the buffer cache) is 75% of the total memory in the server. Therefore,
    we will enforce this recommendation. Just as with MAXDOP, `SqlserverDsc` can enforce
    this dynamically to ensure best practice is still followed after a server is resized,
    without the need for administrator intervention.


    Tip


    If there are multiple instances installed on the server, then you should divide
    the 75% across those multiple instances. For example, if a server hosts three
    instances, you may wish to set each of them with a maximum memory of 25% to ensure
    that one instance does not starve the others of memory.


    The next configuration relates to the minimum amount of memory that will be consumed
    by the SQL Server instance. By default, SQL Server adjusts memory usage up and
    down, depending on how much it needs. The trouble with this is that dynamic memory
    allocation in SQL Server is not the product’s strongest feature. Given that SQL
    Server should usually be the only application running on a server, and assuming
    that there is only a single instance, I recommend configuring the minimum memory
    to be the same as maximum memory, therefore preventing dynamic memory management.


    Tip


    SQL Server does not allocate the minimum memory to itself at service startup.
    It will always grow the memory usage as required. What the minimum memory setting
    does is set a limit on how much memory can be released.


    ### Reducing Ongoing Operations


    The idea of automation is to prevent the need for manual tasks. Therefore, if
    we know up front that administration will be required, post install, it makes
    good sense to automate it up front to save us time later.


    The first configuration that we will enforce, to save ourselves administration
    later, is to ensure that the DBA team has administrative access to the instance.
    This will involve creating a login for the Windows group called `DBATeam` and
    ensuring that this login is in the `sysadmin` fixed server role.


    The second configuration that we will enforce relates to the central management
    server and configuration database that we discussed in Chapter [8](#395785_2_En_8_Chapter.xhtml).
    Specifically, we will ensure that a linked server exists, which provides access
    to the `Config` database on the central management server. This will allow us
    to run queries from the local instance, which pull back useful information. This
    could be the application owner, for example.


    ## Implementing the Configuration


    In the following sections, we will examine how to create the resources for each
    of our requirements. The first section will look at implementing our security
    requirements. We will then discuss how to implement our performance and operational
    requirements. Finally, we will bring everything together into our configuration
    that we have been building through Chapters [3](#395785_2_En_3_Chapter.xhtml)
    and [6](#395785_2_En_6_Chapter.xhtml).'
