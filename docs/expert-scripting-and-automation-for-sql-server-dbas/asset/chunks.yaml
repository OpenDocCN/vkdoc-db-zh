  trans: '### SqlServer 模块


    SqlServer 模块作为 SQL Server 管理工具下载的一部分提供，但也可以使用 `Install-Module` 命令进行安装。该模块提供了超过
    100 个命令，用于通过 PowerShell 会话与 SQL Server 交互。该模块将在第 4 章深入讨论，但在本节中，我们将简要讨论如何使用该模块来导航
    SQL Server 实例。对于以前未使用过 PowerShell 的数据库管理员（DBA）来说，能够导航 SQL Server 实例甚至从 SQL Server
    Management Studio 内部调用 PowerShell，可能是一个很好的突破性入门方式。


    除了使用诸如 `Get-ChildItem` 和 `Set-Location` 等命令导航文件夹结构外，PowerShell 还可用于导航实例的 SQL Server
    对象层次结构。你可以通过使用 `Set-Location` 导航到 `SQLSERVER:\SQL`，将 PowerShell 连接到 SQL Server
    数据库引擎提供程序。`Get-ChildItem` 返回的信息取决于对象层次结构中的当前位置。表 2-4 详细说明了从层次结构的每一级返回的信息。


    #### 表 2-4

    每个层次结构级别返回的详细信息


    | 位置 | 返回的信息 |

    | --- | --- |

    | `SQLSERVER:\SQL` | 本地计算机的名称 |

    | `SQLSERVER:\SQL\ComputerName` | 本地计算机上安装的数据库引擎实例的名称 |

    | `SQLSERVER:\SQL\ComputerName\InstanceName` | 实例级别的对象类型 |

    | `更低级别` | 包含在当前位置内的对象类型或对象 |


    一旦导航到层次结构的适当级别，你就可以使用 PowerShell 对该级别的对象执行基本操作。例如，清单 2-13 中的脚本将导航到 `AdventureWorks2022`
    数据库中的 `tables` 命名空间，并将 `dbo.DatabaseLog` 表重命名为 `dbo.DatabaseLogPS`。`dir` 命令将显示表的原始名称和新名称。


    提示：此脚本假设你安装了默认实例的 SQL Server（而非命名实例），并且拥有 `AdventureWorks2022` 数据库，该数据库可从 `learn.microsoft.com/en-us/sql/samples/adventureworks-install-configure`
    下载。


    ```powershell

    Set-Location SQLSERVER:\SQL\localhost\Default\Databases\AdventureWorks2022\Tables

    dir | where { $_.name -like "*DatabaseLog*" }

    Rename-Item -LiteralPath dbo.DatabaseLog -NewName DatabaseLogPS

    dir | Where-Object { $_.name -like "*DatabaseLog*" }

    ```


    **清单 2-13**

    导航对象层次结构并重命名表


    也可以从 SQL Server Management Studio (SSMS) 内部启动 PowerShell。为此，在对象资源管理器中的对象文件夹上右键单击并选择
    **启动 PowerShell**。这将调用 PowerShell CLI，其初始位置与你用于调用 CLI 的对象文件夹相匹配。


    ## 总结


    PowerShell 提供了两种操作方式。命令行界面可用于立即执行命令，类似于 Windows 命令提示符。这对于需要执行临时操作或进行快速检查的管理员非常有用。第二种操作方式是脚本编写。管理员或
    DevOps 工程师可以构建涉及多个命令或计划自动运行的复杂脚本。


    PowerShell 语言通过模块实现，使其具有可扩展性。每个模块包含提供功能的 cmdlet。常用的 cmdlet 提供别名，这些别名可以缩短你必须键入的命令长度，并帮助具有
    DOS 或 Linux 经验的新 PowerShell 用户学习该语言。但是，别名应保留用于临时命令。在脚本中使用时，它们会使代码难以理解和管理。


    PowerShell 中的每个变量都是一个对象，并关联有数据类型。由于这些对象映射到 .NET 类，因此可以使用诸如 `ToString()` 等方法。PowerShell
    还提供了一个丰富的框架来控制脚本的执行流。这包括管道，它允许你将一个命令的结果直接传递给下一个命令。


    `SqlServer` 模块为 SQL Server 提供支持。加载该模块后，它会公开一组基于 SQL Server 的 cmdlet，允许你从命令 shell
    或通过自动化脚本管理 SQL Server。它还允许你导航 SQL Server 实例的对象层次结构，并对对象执行基本任务。


    # 3. PowerShell DSC


    配置管理是一种强大的方法，可用于根据组织的标准配置服务器，并通过在其生命周期内按计划强制执行策略，使它们保持一致的配置。


    在本章中，我们将讨论配置管理方法背后的概念，然后深入探讨微软的配置管理工具——期望状态配置（DSC）的具体实现。最后，我们将探索如何在 SQL Server
    环境中实施 DSC 来配置 Windows Server。'
- fmt: "## Understanding Configuration Management\n\nThere are many ways that a server\
    \ can be built and configured. We could manually configure a server, we could\
    \ use a gold disk or a build script, but each of these approaches has limitations.\n\
    \nThe limitations of configuring a server manually are fairly apparent. It is\
    \ a mundane, time-consuming job, which often leads to human error, which results\
    \ in an inconsistent estate. Even if the server is built to a good standard, its\
    \ configuration will likely drift over time.\n\nIf we use a gold disk approach,\
    \ which means building a single image, using `sysprep` and then deploying it multiple\
    \ times, then we can address the issues described with a manual build, but we\
    \ open up new issues. Specifically:\n\n*   We have no flexibility. Every server\
    \ has to be 100% identical. This means that if we need the slightest variation,\
    \ we must either\n    *   Have a huge selection of gold images, each of which\
    \ must be maintained separately\n    *   Use the gold image, but then make manual\
    \ updates, which can lead to an inconsistent estate\n*   While the estate may\
    \ be consistent at the point each server is built, as time goes on, manual changes\
    \ can lead to drift in configuration and, ultimately, an inconsistent estate.\n\
    \nIf we use a scripted approach, then we will usually start with a very basic\
    \ gold image and then run build scripts against the newly created server, which\
    \ will perform the configuration. This approach removes the first issue with gold\
    \ images. Specifically, it allows us to have a consistent build, which uses logic\
    \ in the script to configure the server differently for different use cases. It\
    \ does not resolve the second issue however. There is still the likelihood of\
    \ configuration drift, as the server moves through its life cycle.\n\nConfiguration\
    \ management addresses all of the build issues described above. It is a scripted\
    \ approach, but instead of the script only being run once, at build time, the\
    \ script is run on a schedule. Every time the script runs, it checks what the\
    \ server’s configuration should be, and if anything has drifted, then it puts\
    \ the configuration back into its desired state.\n\nThe logic used in configuration\
    \ management is illustrated in Figure [3-1](#395785_2_En_3_Chapter.xhtml#Fig1).\n\
    \n![](images/395785_2_En_3_Chapter/395785_2_En_3_Fig1_HTML.jpg)\n\nFigure 3-1:\
    \ Configuration management logic\n\nThis process can be used to configure any\
    \ configuration within a server. It can install software, configure security setting,\
    \ and even install and configure SQL Server (which will be discussed in Chapters\
    \ [6](#395785_2_En_6_Chapter.xhtml) and [9](#395785_2_En_9_Chapter.xhtml)).\n\n\
    There are many configuration management tools available, including Ansible, Chef,\
    \ and Puppet. This book, however, will focus on Microsoft DSC or Desired State\
    \ Configuration, which is Microsoft’s implementation of configuration management.\n\
    \n## Understanding DSC\n\nThere are two broad ways that DSC can be implemented.\
    \ The first is at the machine level. This approach is the simplest implementation\
    \ and is best suited to small environments or testing. DSC is included in Windows\
    \ Management Framework 5.1. Therefore, we can get started with DSC, without the\
    \ need to install any client software. This chapter will focus on this approach\
    \ to help you understand the implementation in the most straightforward way.\n\
    \nThe second way to implement it is by using a centralized management resource,\
    \ which can manage multiple machines from a single location. This is most suitable\
    \ for large enterprises as it significantly reduces management overheads when\
    \ you have many servers.\n\nThe central management component can be a Pull Server,\
    \ which is a server that runs the `DSC-Service` Windows Server feature, or it\
    \ can be the guest configuration Azure Policy, which is compatible with Azure\
    \ VMs and Arc-enabled servers outside of Azure.\n\n> **Note**: Windows Pull Server\
    \ is still a supported feature, but it is no longer being developed. This means\
    \ that Microsoft DSC is usually most appropriate for smaller organizations or\
    \ large organizations which use either Azure or Arc-enabled servers. The DSC code\
    \ has actually been branched, so that DSC 1.1 is still supported but not maintained.\
    \ This can be used with PowerShell versions up to PowerShell 5.1 and can be used\
    \ on non-Azure environments. DSC 2.0 is supported in PowerShell 7 and above, but\
    \ is designed for use with Azure. At the time of writing, DSC 3.0 is in preview.\n\
    \nThe two main concepts to understand in DSC are configurations and resources.\
    \ Configurations provide a simple mechanism to describe the desired configuration\
    \ of an item, and resources provide the mechanism of implementation of the settings\
    \ described in the configurations (taking into account the current state of the\
    \ item). Every DSC resource has three methods: `Get`, `Test`, and `Set`. The `Get`\
    \ method is used to retrieve the current state of a resource. The `Test` method\
    \ is used to determine if the server (known as a node in DSC) is currently configured\
    \ in its desired target state. The `Set` method is used to configure the node\
    \ to be compliant with its target state.\n\nDSC provides a number of built-in\
    \ resources, which can be used to configure items such as services, users, groups,\
    \ registry keys, and Windows features. DSC is also fully extensible. We can create\
    \ our own, custom resources, which can be used to configure any item that can\
    \ be configured with PowerShell.\n\nResources can be written using either a class-based\
    \ approach or a Microsoft Operations Framework (MOF) based approach. This chapter\
    \ will focus on using out-of-the-box resources, but a guide to creating custom\
    \ DSC resources can be found at the following location: `learn.microsoft.com/en-us/powershell/dsc/resources/authoringresourceclass?view=dsc-1.1`.\n\
    \nConfigurations are the manifest of resources that should be applied. They are\
    \ implemented through a special type of function, which lists the resources that\
    \ should be applied to the node. Each resource is passed a minimum of two parameters.\
    \ One of these parameters is the name of the target instance. The second is the\
    \ action that should be applied to it. For example, if you had a resource that\
    \ ensured that SQL Browser service was running, you would use the service resource\
    \ and pass `Name = \"SQLBrowser\"` and `State = \"Running\"`. On the other hand,\
    \ if you wanted to ensure that the file `C:\\Logs\\CustomSqlLog.log` file exists,\
    \ you would use the file resource and pass the parameters `Name = \"C:\\Logs\\\
    CustomSqlLog.log\"` and `Ensure = \"Present\"`. Local Configuration Manager is\
    \ the engine that reads configurations and uses resources to ensure that the desired\
    \ configuration is applied."
  raw: "## Understanding Configuration Management\n\nThere are many ways that a server\
    \ can be built and configured. We could manually configure a server, we could\
    \ use a gold disk or a build script, but each of these approaches has limitations.\n\
    \nThe limitations of configuring a server manually are fairly apparent. It is\
    \ a mundane, time-consuming job, which often leads to human error, which results\
    \ in an inconsistent estate. Even if the server is built to a good standard, its\
    \ configuration will likely drift over time.\n\nIf we use a gold disk approach,\
    \ which means building a single image, using sysprep and then deploying it multiple\
    \ times, then we can address the issues described with a manual build, but we\
    \ open up new issues. Specifically:\n\n*   We have no flexibility. Every server\
    \ has to be 100% identical. This means that if we need the slightest variation,\
    \ we must either\n    *   Have a huge selection of gold images, each of which\
    \ must be maintained separately\n\n    *   Use the gold image, but then make manual\
    \ updates, which can lead to an inconsistent estate\n\n*   While the estate may\
    \ be consistent at the point each server is built, as time goes on, manual changes\
    \ can lead to drift in configuration and, ultimately, an inconsistent estate.\n\
    \nIf we use a scripted approach, then we will usually start with a very basic\
    \ gold image and then run build scripts against the newly created server, which\
    \ will perform the configuration. This approach removes the first issue with gold\
    \ images. Specifically, it allows us to have a consistent build, which uses logic\
    \ in the script to configure the server differently for different use cases. It\
    \ does not resolve the second issue however. There is still the likelihood of\
    \ configuration drift, as the server moves through its life cycle.\n\nConfiguration\
    \ management addresses all of the build issues described above. It is a scripted\
    \ approach, but instead of the script only being run once, at build time, the\
    \ script is run on a schedule. Every time the script runs, it checks what the\
    \ server’s configuration should be, and if anything has drifted, then it puts\
    \ the configuration back into its desired state.\n\nThe logic used in configuration\
    \ management is illustrated in Figure [3-1](#395785_2_En_3_Chapter.xhtml#Fig1).\n\
    \n![](images/395785_2_En_3_Chapter/395785_2_En_3_Fig1_HTML.jpg)\n\nFlowchart illustrating\
    \ a configuration evaluation process. It begins with \"Start\" leading to \"Evaluate\
    \ configuration Item 1.\" A decision diamond asks, \"Is configuration item 1 in\
    \ desired state?\" with \"Yes\" leading to \"Move to next configuration item\"\
    \ and \"No\" leading to \"Configure as-per desired state,\" which loops back to\
    \ the evaluation. The process continues to \"Evaluate configuration Item 2.\"\n\
    \nFigure 3-1\n\nConfiguration management logic\n\nThis process can be used to\
    \ configure any configuration within a server. It can install software, configure\
    \ security setting, and even install and configure SQL Server (which will be discussed\
    \ in Chapters [6](#395785_2_En_6_Chapter.xhtml) and [9](#395785_2_En_9_Chapter.xhtml)).\n\
    \nThere are many configuration management tools available, including Ansible,\
    \ Chef, and Puppet. This book, however, will focus on Microsoft DSC or Desired\
    \ State Configuration, which is Microsoft’s implementation of configuration management.\n\
    \n## Understanding DSC\n\nThere are two broad ways that DSC can be implemented.\
    \ The first is at the machine level. This approach is the simplest implementation\
    \ and is best suited to small environments or testing. DSC is included in Windows\
    \ Management Framework 5.1\\. Therefore, we can get started with DSC, without\
    \ the need to install any client software. This chapter will focus on this approach\
    \ to help you understand the implementation in the most straightforward way.\n\
    \nThe second way to implement it is by using a centralized management resource,\
    \ which can manage multiple machines from a single location. This is most suitable\
    \ for large enterprises as it significantly reduces management overheads when\
    \ you have many servers.\n\nThe central management component can be a Pull Server,\
    \ which is a server that runs the DSC-Service Windows Server feature, or it can\
    \ be the guest configuration Azure Policy, which is compatible with Azure VMs\
    \ and Arc-enabled servers outside of Azure.\n\nNote\n\nWindows Pull Server is\
    \ still a supported feature, but it is no longer being developed. This means that\
    \ Microsoft DSC is usually most appropriate for smaller organizations or large\
    \ organizations which use either Azure or Arc-enabled servers. The DSC code has\
    \ actually been branched, so that DSC 1.1 is still supported but not maintained.\
    \ This can be used with PowerShell versions up to PowerShell 5.1 and can be used\
    \ on non-Azure environments. DSC 2.0 is supported in PowerShell 7 and above, but\
