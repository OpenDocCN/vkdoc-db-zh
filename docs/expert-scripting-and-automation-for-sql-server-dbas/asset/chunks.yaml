    ### Automating a Response to 9002 Errors


    We will use a SQL Server Agent alert to trigger our process if a 9002 error occurs.
    To create a new alert, drill through SQL Server Agent in SQL Server Management
    Studio and select New Alert from the context menu of Alerts. This will cause the
    New Alert dialog box to be displayed. On the General page of the dialog box, illustrated
    in Figure [11-11](#395785_2_En_11_Chapter.xhtml#Fig11), we will give the alert
    a name and configure it to be triggered by SQL Server error number 9002.


