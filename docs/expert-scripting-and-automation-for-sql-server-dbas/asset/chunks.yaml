- fmt: "# 5. Working with DbaTools\n\nAs we discussed in Chapter 4, the Microsoft-maintained\
    \ `sqlserver` PowerShell module is a great tool, allowing DBAs to easily interact\
    \ with SQL Server from scripts or interactively from PowerShell; however, it does\
    \ support limited functionality. The community-maintained `DbaTools` module addresses\
    \ many of these gaps in functionality and provides an alternative to the `sqlserver`\
    \ module for interacting with SQL Server from PowerShell.\n\nThe `DbaTools` module,\
    \ at the time of writing, has 707 cmdlets and functions, but this number continues\
    \ to grow. Therefore, it is not possible to discuss each of these in detail. Instead,\
    \ after initially looking at the `Invoke-DbaQuery` function, which is equivalent\
    \ to `Invoke-SqlCmd`, this chapter will focus primarily on the gaps in the `sqlserver`\
    \ module that were discussed in Chapter 4. Specifically, we will look at how Logins\
    \ and Users can be managed end to end and how SQL Server Agent artifacts can be\
    \ managed. I would advise you, however, to review the list of commands available\
    \ in `DbaTools`. A full list of commands can be found at `dbatools.io/commands/`,\
    \ or you can use the script in Listing 5-1 to install the `DbaTools` module and\
    \ list all available commands.\n\nTip\n\nPlease make sure you visit `dbatools.io/commands/`\
    \ and review the complete list of commands available in `DbaTools`.\n\n```powershell\n\
    # Install DbaTools\nInstall-Module dbatools\n# List commands in the DbaTools module\n\
    Get-Command -Module dbatools\n```\n\nListing 5-1: Install the DbaTools Module\n\
    \n`DbaTools` provides commands within the following categories:\n\n*   Availability\
    \ Groups\n*   Backup and Restore\n*   Community Tools\n*   Connection Strings\n\
    *   Databases\n*   Data Masking\n*   Computer Management\n*   Configuration\n\
    *   Support Tools\n*   Update Watcher\n*   DBCC\n*   Detach and Attach\n*   Diagnostics\
    \ and Performance\n*   Endpoints\n*   Export\n*   File System and Storage\n* \
    \  FileStream\n*   Finders\n*   General\n*   Log Shipping\n*   Login and User\
    \ Management\n*   Mail and Logging\n*   Max Memory\n*   Migration\n*   Mirroring\n\
    *   Network and Connectivity\n*   Policy-Based Management\n*   Registered Servers\n\
    *   Replication\n*   Resource Governor\n*   Security and Encryption\n*   Server\
    \ Management\n*   Service Principal Names (SPNs)\n*   Services\n*   Snapshots\n\
    *   Sp_configure\n*   SQL Agent\n*   SQL Client Configuration\n*   SQL Management\
    \ Objects\n*   SQL Server Integration Services (SSIS)\n*   System Startup\n* \
    \  Tempdb\n*   Data Masking\n*   Traces, Profiler, and Extended Events\n*   Utilities\n\
    *   Windows Server Failover Cluster\n*   Writing to SQL Tables\n\n## Working with\
    \ `Invoke-DbaQuery`\n\n`Invoke-DbaQuery` offers equivalent functionality to the\
    \ `Invoke-SqlCmd` command discussed in Chapter 4. Therefore, to explore the differences\
    \ between the commands, we will use the same example; namely, we want to retrieve\
    \ a list of databases and then pass that into a loop, which rebuilds indexes dynamically,\
    \ based on their fragmentation level.\n\n### `Invoke-DbaQuery` Basics\n\nThe most\
    \ basic call of `Invoke-DbaQuery` involves passing two parameters: `SqlInstance`,\
    \ which defines which SQL Server instance the query should be run against, and\
    \ `Query` which supplies the query that should be executed. Listing 5-2 demonstrates\
    \ using this basic call to return a list of database names from the default instance\
    \ of the local server. Possible formats for the `SqlInstance` parameter include\
    \ `ServerName` and `ServerName\\InstanceName`. If you wish to run the query against\
    \ a default instance of the local server, then you can use `localhost`, `.` or\
    \ omit the `SqlInstance` parameter all together.\n\nTip\n\nIf you wish to follow\
    \ along with the examples in this chapter, but you have not configured a secure\
    \ TLS connection to your SQL Server instance, then you can run the following command\
    \ to work around certificate failures when using `DbaTools` (you should not do\
    \ this in a production environment): `Set-DbatoolsConfig -FullName sql.connection.encrypt\
    \ -Value $false`.\n\n```powershell\n$Params = @{\n    SqlInstance   = \"localhost\"\
    \n    Query         = \"SELECT name FROM sys.databases\"\n}\nInvoke-DbaQuery @Params\n\
    ```\n\nListing 5-2: Basic Call of `Invoke-DbaQuery`\n\nTo run the same query,\
    \ but authenticate to SQL Server using a second-tier SQL Login, the `SqlCredential`\
    \ parameter can be passed. This is demonstrated in Listing 5-3.\n\n```powershell\n\
    $UserName = 'Pete'\n$SecurePassword = ConvertTo-SecureString 'Pa$$w0rd' -AsPlainText\
    \ -Force\n$Credential = [PSCredential]::new($UserName, $SecurePassword)\n$Params\
    \ = @{\n    SqlInstance   = \"localhost\"\n    Query         = \"SELECT name FROM\
    \ sys.databases\"\n    sqlCredential = $Credential\n}\nInvoke-DbaQuery @Params\n\
    ```\n\nListing 5-3: Authenticate with a SQL Login\n\n### Working with Parameters\n\
    \nThe biggest difference between `Invoke-DbaQuery` and `Invoke-SqlCmd`, in common\
    \ usage of the commands, is how parameters are handled. As discussed in Chapter\
    \ 4, when using `Invoke-SqlCmd`, parameters are passed into the `Variable` parameter\
    \ as a string array of key-value pairs. With `Invoke-DbaQuery`, however, variables\
    \ are passed to a parameter called `SqlParameters` as a hash table. This is an\
    \ important advantage of `Invoke-DbaQuery`, as it allows for tidier, more readable,\
    \ and easier-to-maintain code when dealing with multiple parameters.\n\nThe script\
    \ in Listing 5-4 shows a T-SQL script that will be used to rebuild indexes, dynamically,\
    \ based on levels of fragmentation that are passed from the calling invocation\
    \ of `Invoke-DbaQuery`. Note that the format of the parameters is the same as\
    \ native T-SQL parameters, as opposed to the SQLCMD parameter format. This can\
    \ make testing and debugging scripts easier, as they can be run directly without\
    \ switching to SQLCMD mode. This script will then be called by the PowerShell\
    \ script in Listing 5-5.\n\nNote\n\nThe T-SQL script will fail to execute if it’s\
    \ run in isolation, because the `@Fragmentation` and `@PageSpace` parameters are\
    \ not defined.\n\n```sql\nDECLARE @SQL NVARCHAR(MAX)\nSET @SQL =\n(\n    SELECT\
    \ 'ALTER INDEX '\n        + QUOTENAME(i.name)\n        + ' ON ' + s.name\n   \
    \     + '.'\n        + QUOTENAME(OBJECT_NAME(i.object_id))\n        + ' REBUILD\
    \ ; '\n    FROM sys.dm_db_index_physical_stats(DB_ID(),NULL,NULL,NULL,'DETAILED')\
    \ ps\n    INNER JOIN sys.indexes i\n        ON ps.object_id = i.object_id\n  \
    \      AND ps.index_id = i.index_id\n    INNER JOIN sys.objects o\n        ON\
    \ ps.object_id = o.object_id\n    INNER JOIN sys.schemas s\n        ON o.schema_id\
    \ = s.schema_id\n    WHERE index_level = 0\n        AND (avg_fragmentation_in_percent\
    \ > @Fragmentation\n            OR avg_page_space_used_in_percent < @PageSpace)\n\
    \    FOR XML PATH('')\n) ;\nEXEC(@SQL) ;\n```\n\nListing 5-4: T-SQL Script to\
    \ Rebuild Indexes\n\nThe PowerShell script in Listing 5-5 will return a list of\
    \ tables and pass them into a `foreach` loop that runs an index rebuild script\
    \ against each database. The script passes two parameters into a T-SQL query,\
    \ which is stored in a file. The location of the T-SQL script is passed through\
    \ the `File` parameter. The key thing to note, however, is how the parameters\
    \ are passed, using a hash table. This hash table is then passed into the `SqlParameters`\
    \ parameter.\n\n```powershell\n$Variables = @{\n    \"Fragmentation\" = \"25\"\
    \n    \"PageSpace\"     = \"70\"\n}\n$Params = @{\n    SqlInstance = \"localhost\"\
    \n    Query       = \"SELECT name FROM sys.databases\"\n}\n$Databases = Invoke-DbaQuery\
    \ @Params\nforeach ($Database in $Databases) {\n    $Params = @{\n        SqlInstance\
    \   = \"localhost\"\n        Database      = $Database.name\n        File    \
    \      = \"c:\\scripts\\IndexRebuild.sql\"\n        SqlParameters = $Variables\n\
    \    }\n    Invoke-DbaQuery @Params\n}\n```\n\nListing 5-5: Using Parameters"
  raw: '# 5. Working with DbaTools


    As we discussed in Chapter [4](#395785_2_En_4_Chapter.xhtml), the Microsoft-maintained
    sqlserver PowerShell module is a great tool, allowing DBAs to easily interact
    with SQL Server from scripts or interactively from PowerShell; however, it does
    support limited functionality. The community-maintained DbaTools module addresses
    many of these gaps in functionality and provides an alternative to the sqlserver
    module for interacting with SQL Server from PowerShell.


    The DbaTools module, at the time of writing, has 707 cmdlets and functions, but
    this number continues to grow. Therefore, it is not possible to discuss each of
    these in detail. Instead, after initially looking at the `Invoke-DbaQuery` function,
    which is equivalent to `Invoke-SqlCmd`, this chapter will focus primarily on the
    gaps in the sqlserver module that were discussed in Chapter [4](#395785_2_En_4_Chapter.xhtml).
    Specifically, we will look at how Logins and Users can be managed end to end and
    how SQL Server Agent artifacts can be managed. I would advise you, however, to
    review the list of commands available in DbaTools. A full list of commands can
    be found at dbatools.io/commands/, or you can use the script in Listing [5-1](#395785_2_En_5_Chapter.xhtml#PC1)
    to install the DbaTools module and list all available commands.


    Tip


    Please make sure you visit dbatools.io/commands/ and review the complete list
    of commands available in DbaTools.


    ```

    # Install DbaTools

    Install-Module dbatools

    # List commands in the DbaTools module

    Get-Command -Module dbatools

    Listing 5-1

    Install the DbaTools Module

    ```


    DbaTools provides commands within the following categories:


    *   Availability Groups


    *   Backup and Restore


    *   Community Tools


    *   Connection Strings


    *   Databases


    *   Data Masking


    *   Computer Management


    *   Configuration


    *   Support Tools


    *   Update Watcher


    *   DBCC


    *   Detach and Attach


    *   Diagnostics and Performance


    *   Endpoints


    *   Export


    *   File System and Storage


    *   FileStream


    *   Finders


    *   General


    *   Log Shipping


    *   Login and User Management


    *   Mail and Logging


    *   Max Memory


    *   Migration


    *   Mirroring


    *   Network and Connectivity


    *   Policy-Based Management


    *   Registered Servers


    *   Replication


    *   Resource Governor


    *   Security and Encryption


    *   Server Management


    *   Service Principal Names (SPNs)


    *   Services


    *   Snapshots


    *   Sp_configure


    *   SQL Agent


    *   SQL Client Configuration


    *   SQL Management Objects


    *   SQL Server Integration Services (SSIS)


    *   System Startup


    *   Tempdb


    *   Data Masking


    *   Traces, Profiler, and Extended Events


    *   Utilities


    *   Windows Server Failover Cluster


    *   Writing to SQL Tables


    ## Working with Invoke-DbaQuery


    `Invoke-DbaQuery` offers equivalent functionality to the `Invoke-SqlCmd` command
    discussed in Chapter [4](#395785_2_En_4_Chapter.xhtml). Therefore, to explore
    the differences between the commands, we will use the same example; namely, we
    want to retrieve a list of databases and then pass that into a loop, which rebuilds
    indexes dynamically, based on their fragmentation level.


    ### Invoke-DbaQuery Basics


    The most basic call of Invoke-DbaQuery involves passing two parameters: SqlInstance,
    which defines which SQL Server instance the query should be run against, and Query
    which supplies the query that should be executed. Listing [5-2](#395785_2_En_5_Chapter.xhtml#PC2)
    demonstrates using this basic call to return a list of database names from the
    default instance of the local server. Possible formats for the SqlInstance parameter
    include ServerName and ServerName\InstanceName. If you wish to run the query against
    a default instance of the local server, then you can use localhost, . or omit
    the SqlInstance parameter all together.


    Tip


    If you wish to follow along with the examples in this chapter, but you have not
    configured a secure TLS connection to your SQL Server instance, then you can run
    the following command to work around certificate failures when using DbaTools
    (you should not do this in a production environment): `Set-DbatoolsConfig -FullName
    sql.connection.encrypt -Value $false`.


    ```

    $Params = @{

    SqlInstance   = "localhost"

    Query         = "SELECT name FROM sys.databases"

    }

    Invoke-DbaQuery @Params

    Listing 5-2

    Basic Call of Invoke-DbaQuery

    ```


    To run the same query, but authenticate to SQL Server using a second-tier SQL
    Login, the SqlCredential parameter can be passed. This is demonstrated in Listing
    [5-3](#395785_2_En_5_Chapter.xhtml#PC3).


    ```

    $UserName = ''Pete''

    $SecurePassword = ConvertTo-SecureString ''Pa$$w0rd'' -AsPlainText -Force

    $Credential = [PSCredential]::new($UserName, $SecurePassword)

    $Params = @{

    SqlInstance   = "localhost"

    Query         = "SELECT name FROM sys.databases"

    sqlCredential = $Credential

    }

    Invoke-DbaQuery @Params

    Listing 5-3

    Authenticate with a SQL Login

    ```


    ### Working with Parameters


    The biggest difference between `Invoke-DbaQuery` and `Invoke-SqlCmd`, in common
    usage of the commands, is how parameters are handled. As discussed in Chapter
    [4](#395785_2_En_4_Chapter.xhtml), when using `Invoke-SqlCmd`, parameters are
    passed into the Variable parameter as a string array of key-value pairs. With
    `Invoke-DbaQuery`, however, variables are passed to a parameter called `SqlParameters`
    as a hash table. This is an important advantage of `Invoke-DbaQuery`, as it allows
    for tidier, more readable, and easier-to-maintain code when dealing with multiple
    parameters.


    The script in Listing [5-4](#395785_2_En_5_Chapter.xhtml#PC4) shows a T-SQL script
    that will be used to rebuild indexes, dynamically, based on levels of fragmentation
    that are passed from the calling invocation of `Invoke-DbaQuery`. Note that the
    format of the parameters is the same as native T-SQL parameters, as opposed to
    the SQLCMD parameter format. This can make testing and debugging scripts easier,
    as they can be run directly without switching to SQLCMD mode. This script will
    then be called by the PowerShell script in Listing [5-5](#395785_2_En_5_Chapter.xhtml#PC5).


    Note


    The T-SQL script will fail to execute if it’s run in isolation, because the `@Fragmentation`
    and `@PageSpace` parameters are not defined.


    ```

    DECLARE @SQL NVARCHAR(MAX)

    SET @SQL =

    (

    SELECT ''ALTER INDEX ''

    + QUOTENAME(i.name)

    + '' ON '' + s.name

    + ''.''

    + QUOTENAME(OBJECT_NAME(i.object_id))

    + '' REBUILD ; ''

    FROM sys.dm_db_index_physical_stats(DB_ID(),NULL,NULL,NULL,''DETAILED'') ps

    INNER JOIN sys.indexes i

    ON ps.object_id = i.object_id

    AND ps.index_id = i.index_id

    INNER JOIN sys.objects o

    ON ps.object_id = o.object_id

    INNER JOIN sys.schemas s

    ON o.schema_id = s.schema_id

    WHERE index_level = 0

    AND (avg_fragmentation_in_percent > @Fragmentation

    OR avg_page_space_used_in_percent < @PageSpace)

    FOR XML PATH('''')

    ) ;

    EXEC(@SQL) ;

    Listing 5-4

    T-SQL Script to Rebuild Indexes

    ```


    The PowerShell script in Listing [5-5](#395785_2_En_5_Chapter.xhtml#PC5) will
    return a list of tables and pass them into a foreach loop that runs an index rebuild
    script against each database. The script passes two parameters into a T-SQL query,
    which is stored in a file. The location of the T-SQL script is passed through
    the `file` parameter. The key thing to note, however, is how the parameters are
    passed, using a hash table. This hash table is then passed into the `SqlParameters`
    parameter.


    ```

    $Variables = @{

    "Fragmentation" = "25"

    "PageSpace"     = "70"

    }

    $Params = @{

    SqlInstance = "localhost"

    Query       = "SELECT name FROM sys.databases"

    }

    $Databases = Invoke-DbaQuery @Params

    foreach ($Database in $Databases) {

    $Params = @{

    SqlInstance   = "localhost"

    Database      = $Database.name

    File          = "c:\scripts\IndexRebuild.sql"

    SqlParameters = $Variables

    }

    Invoke-DbaQuery @Params

    }

    Listing 5-5

    Using Parameters

    ```'
  trans: "# 5. 使用 DbaTools\n\n正如我们在第 4 章讨论的，由 Microsoft 维护的 `sqlserver` PowerShell\
    \ 模块是一个很棒的工具，它允许数据库管理员轻松地通过脚本或 PowerShell 交互方式与 SQL Server 交互；但是，它支持的功能有限。由社区维护的\
    \ `DbaTools` 模块填补了功能上的许多空白，为从 PowerShell 与 SQL Server 交互提供了 `sqlserver` 模块之外的另一种选择。\n\
    \n截至本文撰写时，`DbaTools` 模块拥有 707 个 cmdlet 和函数，并且这个数字还在持续增长。因此，我们无法详细讨论每一个命令。本章将在初步了解\
    \ `Invoke-DbaQuery` 函数（它等同于 `Invoke-SqlCmd`）之后，主要聚焦于第 4 章讨论过的 `sqlserver` 模块的功能缺口。具体来说，我们将探讨如何端到端地管理登录（Logins）和用户（Users），以及如何管理\
    \ SQL Server 代理（SQL Server Agent）对象。不过，我建议您查阅 `DbaTools` 中可用的命令列表。完整的命令列表可以在 `dbatools.io/commands/`\
    \ 找到，或者您可以使用代码清单 5-1 中的脚本来安装 `DbaTools` 模块并列出所有可用的命令。\n\n> **提示**\n>\n> 请务必访问\
    \ `dbatools.io/commands/` 并查看 `DbaTools` 中完整的可用命令列表。\n\n```powershell\n# 安装 DbaTools\n\
    Install-Module dbatools\n# 列出 DbaTools 模块中的命令\nGet-Command -Module dbatools\n\
    ```\n\n**代码清单 5-1：安装 DbaTools 模块**\n\n`DbaTools` 提供以下类别的命令：\n\n*   可用性组\n*   备份和还原\n\
    *   社区工具\n*   连接字符串\n*   数据库\n*   数据屏蔽\n*   计算机管理\n*   配置\n*   支持工具\n*   更新监视器\n\
    *   DBCC\n*   分离和附加\n*   诊断和性能\n*   端点\n*   导出\n*   文件系统和存储\n*   文件流\n*   查找器\n\
    *   常规\n*   日志传送\n*   登录和用户管理\n*   邮件和日志记录\n*   最大内存\n*   迁移\n*   镜像\n*   网络和连接\n\
    *   基于策略的管理\n*   已注册的服务器\n*   复制\n*   资源调控器\n*   安全和加密\n*   服务器管理\n*   服务主体名称\n\
    *   服务\n*   快照\n*   Sp_configure\n*   SQL Agent\n*   SQL 客户端配置\n*   SQL 管理对象\n\
    *   SQL Server Integration Services\n*   系统启动\n*   Tempdb\n*   数据屏蔽\n*   跟踪、探查器和扩展事件\n\
    *   实用工具\n*   Windows Server 故障转移群集\n*   写入 SQL 表\n\n## 使用 `Invoke-DbaQuery`\n\
    \n`Invoke-DbaQuery` 提供了与第 4 章讨论的 `Invoke-SqlCmd` 命令等效的功能。因此，为了探究命令之间的差异，我们将使用相同的例子；即，我们希望检索一个数据库列表，然后将其传入循环中，根据索引碎片级别动态重建索引。\n\
    \n### `Invoke-DbaQuery` 基础\n\n`Invoke-DbaQuery` 最基本的调用涉及传递两个参数：`SqlInstance`（定义查询应针对哪个\
    \ SQL Server 实例运行）和 `Query`（提供要执行的查询）。代码清单 5-2 演示了使用此基本调用从本地服务器的默认实例返回数据库名称列表。`SqlInstance`\
    \ 参数可能的格式包括 `ServerName` 和 `ServerName\\InstanceName`。如果您希望针对本地服务器的默认实例运行查询，则可以使用\
    \ `localhost`、`.` 或完全省略 `SqlInstance` 参数。\n\n> **提示**\n>\n> 如果您想跟随本章的示例操作，但尚未为\
    \ SQL Server 实例配置安全的 TLS 连接，那么您可以运行以下命令来绕过使用 `DbaTools` 时的证书失败问题（您不应在生产环境中这样做）：`Set-DbatoolsConfig\
    \ -FullName sql.connection.encrypt -Value $false`。\n\n```powershell\n$Params =\
    \ @{\n    SqlInstance   = \"localhost\"\n    Query         = \"SELECT name FROM\
    \ sys.databases\"\n}\nInvoke-DbaQuery @Params\n```\n\n**代码清单 5-2：`Invoke-DbaQuery`\
    \ 的基本调用**\n\n要运行相同的查询，但使用二级 SQL 登录名（SQL Login）向 SQL Server 进行身份验证，可以传递 `SqlCredential`\
    \ 参数。如代码清单 5-3 所示。\n\n```powershell\n$UserName = 'Pete'\n$SecurePassword = ConvertTo-SecureString\
    \ 'Pa$$w0rd' -AsPlainText -Force\n$Credential = [PSCredential]::new($UserName,\
    \ $SecurePassword)\n$Params = @{\n    SqlInstance   = \"localhost\"\n    Query\
    \         = \"SELECT name FROM sys.databases\"\n    sqlCredential = $Credential\n\
    }\nInvoke-DbaQuery @Params\n```\n\n**代码清单 5-3：使用 SQL 登录名进行身份验证**\n\n### 使用参数\n\
    \n`Invoke-DbaQuery` 和 `Invoke-SqlCmd` 在常见命令用法中最大的区别在于参数的处理方式。正如第 4 章所讨论的，使用 `Invoke-SqlCmd`\
    \ 时，参数是作为键值对的字符串数组传递给 `Variable` 参数的。然而，对于 `Invoke-DbaQuery`，变量是以哈希表的形式传递给名为 `SqlParameters`\
    \ 的参数。这是 `Invoke-DbaQuery` 的一个重要优势，因为它在处理多个参数时可以产生更整洁、更易读且更易于维护的代码。\n\n代码清单 5-4\
    \ 中的脚本是一个 T-SQL 脚本，它将根据从调用 `Invoke-DbaQuery` 传递过来的碎片级别动态重建索引。请注意，参数的格式与原生 T-SQL\
    \ 参数相同，而不是 SQLCMD 参数格式。这可以使测试和调试脚本更容易，因为它们可以直接运行而无需切换到 SQLCMD 模式。此脚本随后将由代码清单 5-5\
    \ 中的 PowerShell 脚本调用。\n\n> **注意**\n>\n> 如果单独运行，T-SQL 脚本将执行失败，因为未定义 `@Fragmentation`\
    \ 和 `@PageSpace` 参数。\n\n```sql\nDECLARE @SQL NVARCHAR(MAX)\nSET @SQL =\n(\n  \
    \  SELECT 'ALTER INDEX '\n        + QUOTENAME(i.name)\n        + ' ON ' + s.name\n\
    \        + '.'\n        + QUOTENAME(OBJECT_NAME(i.object_id))\n        + ' REBUILD\
    \ ; '\n    FROM sys.dm_db_index_physical_stats(DB_ID(),NULL,NULL,NULL,'DETAILED')\
    \ ps\n    INNER JOIN sys.indexes i\n        ON ps.object_id = i.object_id\n  \
    \      AND ps.index_id = i.index_id\n    INNER JOIN sys.objects o\n        ON\
    \ ps.object_id = o.object_id\n    INNER JOIN sys.schemas s\n        ON o.schema_id\
    \ = s.schema_id\n    WHERE index_level = 0\n        AND (avg_fragmentation_in_percent\
    \ > @Fragmentation\n            OR avg_page_space_used_in_percent < @PageSpace)\n\
    \    FOR XML PATH('')\n) ;\nEXEC(@SQL) ;\n```\n\n**代码清单 5-4：重建索引的 T-SQL 脚本**\n\
    \n代码清单 5-5 中的 PowerShell 脚本将返回一个表列表，并将其传入一个 `foreach` 循环，针对每个数据库运行索引重建脚本。该脚本将两个参数传递给存储在文件中的\
    \ T-SQL 查询。T-SQL 脚本的位置通过 `File` 参数传递。然而，关键点在于参数是如何使用哈希表传递的。然后这个哈希表被传递给 `SqlParameters`\
    \ 参数。\n\n```powershell\n$Variables = @{\n    \"Fragmentation\" = \"25\"\n    \"\
    PageSpace\"     = \"70\"\n}\n$Params = @{\n    SqlInstance = \"localhost\"\n \
    \   Query       = \"SELECT name FROM sys.databases\"\n}\n$Databases = Invoke-DbaQuery\
    \ @Params\nforeach ($Database in $Databases) {\n    $Params = @{\n        SqlInstance\
    \   = \"localhost\"\n        Database      = $Database.name\n        File    \
    \      = \"c:\\scripts\\IndexRebuild.sql\"\n        SqlParameters = $Variables\n\
    \    }\n    Invoke-DbaQuery @Params\n}\n```\n\n**代码清单 5-5：使用参数**"
- fmt: '### Error Handling


    Commands within the `DbaTools` family attempt to help you handle errors by default.
    Specifically, when an error occurs, `DbaTools` will catch and parse the error
    and return a friendly error. For example, consider the command in Listing 5-6,
    which throws a divide by zero error.


    ```

    Invoke-DbaQuery -SqlInstance localhost -Query "SELECT 1/0"

    Listing 5-6

    Producing a Friendly Error

    ```


    The output of this error is shown below:


    ```

    WARNING: [10:56:33][Invoke-DbaQuery] [localhost] Failed during execution | Divide
    by zero error encountered.

    ```


    While this is certainly easier on the eye than a standard PowerShell exception
    being thrown, it can cause issues when you are scripting, as it can cause a script
    to fail silently. Therefore, in many circumstances, it is advisable to turn off
    this feature. This can be achieved by using the `–EnableException` parameter,
    as demonstrated in Listing 5-7.


    ```

    Invoke-DbaQuery -SqlInstance localhost -Query "SELECT 1/0" –EnableException

    Listing 5-7

    Using EnableException Parameter

    ```


    This will cause a standard exception to be thrown, as shown below:


    ```

    Exception:

    Line |

    97974 |          throw $records[0]

    |          ~~~~~~~~~~~~~~~~~

    | Divide by zero error encountered.

    ```


    ### Running Queries Against Multiple Instances


    Using `Invoke-DbaQuery`, it is very simple to run a query against multiple SQL
    Server instances. All you need to do is define a list of instance names and then
    pipe them into the `Invoke-DbaQuery` command. This is demonstrated in Listing
    5-8, which returns a list of databases on each instance.


    **Note**

    The script assumes that you have a default SQL Server instance and an instance
    named `poshscripting`.


    ```

    "localhost", "localhost\poshscripting" | Invoke-DbaQuery -Query "SELECT name FROM
    sys.databases"

    Listing 5-8

    Running a Query Against Multiple Servers

    ```


    Looking at the results below, you will notice that the obvious issue is that it’s
    not possible to determine which instance each database resides within:


    ```

    master

    tempdb

    model

    msdb

    AdventureWorks2022

    master

    tempdb

    model

    msdb

    ```


    You could, of course, deal with this issue by adding the `@@SERVERNAME` to the
    `SELECT` list. `Invoke-DbaQuery` offers an alternative, however. You can simply
    specify the `–AppendServerInstance` parameter. The difference between the two
    techniques is apparent when dealing with a local server. Using the `@@SERVERNAME`
    technique will cause the actual server name to be returned. Using the `–AppendServerInstance`
    technique, however, will return whatever value you passed into `Invoke-DbaQuery`.
    This could be the server name, `localhost`, or an IP address. For example, consider
    the command in Listing 5-9.


    ```

    $query = "SELECT name, @@SERVERNAME AS SQLInstance FROM sys.databases"

    "localhost", "localhost\poshscripting" | Invoke-DbaQuery -Query $query –AppendServerInstance

    Listing 5-9

    Returning Server Name

    ```


    The results (shown below) illustrate the potential difference between the results,
    with each technique:


    ```

    name               SQLInstance                      ServerInstance

    --------------     ---------------------------    -----------------------

    master             WIN-J38I01U06D7                  localhost

    tempdb             WIN-J38I01U06D7                  localhost

    model              WIN-J38I01U06D7                  localhost

    msdb               WIN-J38I01U06D7                  localhost

    AdventureWorks2022 WIN-J38I01U06D7                  localhost

    master             WIN-J38I01U06D7\POSHSCRIPTING    localhost\poshscripting

    tempdb             WIN-J38I01U06D7\POSHSCRIPTING    localhost\poshscripting

    model              WIN-J38I01U06D7\POSHSCRIPTING    localhost\poshscripting

    msdb               WIN-J38I01U06D7\POSHSCRIPTING    localhost\poshscripting

    ```


    #### Writing Results to a File


    Just as with `Invoke-SqlCmd`, there is not a parameter which will allow you to
    send query results directly to a file; however, the same ends can be achieved
    by piping the results of `Invoke-SqlCmd` to the `Out-File` cmdlet. This is demonstrated
    in Listing 5-10, which writes the list of databases to a file called `c:\scripts\DatabasesOut.csv`.


    ```

    $Params = @{

    SqlInstance  = "localhost"

    Query        = "SELECT name FROM sys.databases"

    }

    Invoke-DbaQuery @Params | ConvertTo-Csv | Out-File -FilePath "c:\scripts\DatabasesOut.csv"

    Listing 5-10

    Outputting Results to a File

    ```


    ## Managing Security Objects


    In Chapter 4, we discussed how the `SqlServer` module can be used to create Logins
    and add them to roles. At the point, we wanted to start managing database users;
    however, we hit a gap in the functionality of the `SqlServer` module and had to
    use SMO directly to perform the required tasks.


    The `DbaTools` module has a much richer set of commands for dealing with security
    objects. Therefore, in the following sections, we will walk through how we can
    use `DbaTools` to manage Logins and Users end to end. Specifically, we will explore
    how to create a Login, create a database User, add both the Login and the User
    to roles, rename a Login, delete a Login, and remove an orphaned User.'
  raw: '### Error Handling


