- fmt: 'The script in Listing [7-2](#395785_2_En_7_Chapter.xhtml#PC5) demonstrates
    how you can use this dynamic management function to determine which indexes have
    more than 25% external fragmentation and rebuild only those indexes.


    ```

    $GetDatabaseParams = @{

    SqlInstance = "localhost"

    Query       = "

    SELECT name

    FROM sys.databases

    WHERE database_id > 4

    "

    }

    $databases = Invoke-DbaQuery @GetDatabaseParams | Select-Object -ExpandProperty
    Name

    $params = @{

    SqlInstance = "localhost"

    Query       = "

    DECLARE @SQL NVARCHAR(MAX)

    SET @SQL = (

    SELECT ''ALTER INDEX ''

    + QUOTENAME(i.name)

    + '' ON '' + s.name

    + ''.''

    + QUOTENAME(OBJECT_NAME(i.object_id))

    + '' REBUILD ; ''

    FROM sys.dm_db_index_physical_stats(DB_ID(),NULL,NULL,NULL,''DETAILED'') ps

    INNER JOIN sys.indexes i

    ON ps.object_id = i.object_id

    AND ps.index_id = i.index_id

    INNER JOIN sys.objects o

    ON ps.object_id = o.object_id

    INNER JOIN sys.schemas s

    ON o.schema_id = s.schema_id

    WHERE index_level = 0

    AND avg_fragmentation_in_percent > 25

    FOR XML PATH('''')

    ) ;

    EXEC(@SQL) ;

    "

    }

    foreach ($database in $databases) {

    Invoke-DbaQuery @params -Database $database

    }

    ```


    This script uses the XML `data()` method technique to build and execute a string
    that contains `ALTER INDEX` statements for every index in the specified database
    that has more than 25% external fragmentation at the leaf level. The script joins
    `sys.dm_db_index_physical_stats` to `sys.schemas` to obtain the name of the schema
    that contains the index. There is no direct join between these objects, so the
    join is implemented through an intermediate catalog view (`sys.objects`). The
    script also joins to `sys.indexes` to retrieve the `object_id`, which is then
    passed into the `OBJECT_NAME()` function to determine the name of the index.


    ### Enforcing Policies


    Policy-Based Management (PBM) is a great tool for ensuring that your policies
    are met across the enterprise. It does have limitations, however. Specifically,
    some facets only allow you to report on policy violation but not actually to prevent
    the change that will cause the violation. Therefore, many DBAs will choose to
    enforce some of their key policies by using custom scripting.


    **Tip**: A PBM Facet is a set of properties that are related to an area of SQL
    Server Management.


    `xp_cmdshell` is a system-stored procedure that allows you to run operating system
    commands from within a SQL Server instance. There seems to be some debate between
    DBAs about whether this is a security hole or not, but I have always found it
    cut and dried. The argument for `xp_cmdshell` not being a security risk generally
    revolves around “Only my team and I are allowed to use it.” But what if the instance
    is compromised by a malicious user? In this case, you really do not want to reduce
    the number of steps hackers have to take before they can start spreading their
    attack out to the network.


    **Caution**: If your organization wishes to comply with CIS hardening standards
    for SQL Server, then `xp_cmdshell` must be disabled.


    PBM can report on `xp_cmdshell`, but it cannot prevent it being enabled. You can,
    however, create a PowerShell script that will check for `xp_cmdshell` being enabled
    and disable it, if required. The script can then be scheduled to run on a regular
    basis.


    The script in Listing [7-3](#395785_2_En_7_Chapter.xhtml#PC6) demonstrates how
    to discover if the feature is incorrectly configured, by checking its status in
    the `sys.configurations` catalog view. It will then use `sp_configure` to reconfigure
    the setting. There are two calls of `sp_configure`, because `xp_cmdshell` is an
    advanced option, and the `show advanced options` property must be configured before
    the setting can be changed. The `RECONFIGURE` command forces the change.


    **Tip**: In Chapter [10](#395785_2_En_10_Chapter.xhtml), we discuss techniques
    to allow useful scripts such as these to be applied to enterprise from a central
    location. However, for this particular configuration, you may wish to use the
    techniques discussed in Chapter [9](#395785_2_En_9_Chapter.xhtml) to make this
    part of your standard build, which will be applied through Desired State Configuration
    (DSC), or your configuration management tool of choice.


    There are two commands to reconfigure the instance, following a change made by
    `sp_configure`. The first is `RECONFIGURE`. The second is `RECONFIGURE WITH OVERRIDE`.
    `RECONFIGURE` will change the running value of the setting, as long as the newly
    configured value is regarded as “sensible” by SQL Server. For example, `RECONFIGURE`
    will not allow you to disable contained databases when they exist on the instance.
    If you use `RECONFIGURE WITH OVERRIDE`, however, this action will be allowed,
    even though your contained databases will no longer be accessible. Even with this
    command, however, SQL Server will still run checks to ensure that the value you
    have entered is between the allowable minimum and maximum values for the setting.
    It will also not allow you to perform any operations that will cause fatal errors
    in the database engine. As an example of this, the procedure will not allow you
    to configure the `Min Server Memory (MB)` setting to be higher than the `Max Server
    Memory (MB)` setting.


    ```

    $params = @{

    SqlInstance = "localhost"

    Query       = "

    --Check if xp_cmdshell is enabled

    IF (

    SELECT value_in_use

    FROM sys.configurations

    WHERE name = ''xp_cmdshell''

    ) = 1

    BEGIN

    --Turn on advanced options

    EXEC sp_configure ''show advanced options'', 1 ;

    RECONFIGURE

    --Turn off xp_cmdshell

    EXEC sp_configure ''xp_cmdshell'', 0 ;

    RECONFIGURE

    END

    "

    }

    Invoke-DbaQuery @params

    ```


    This approach can be used to configure many aspects of your enterprise’s surface
    area. In SQL Server 2022, the features that can be configured with this methodology
    are detailed in Table [7-8](#395785_2_En_7_Chapter.xhtml#Tab8).


    **Table 7-8**: Settings That Can Be Changed with `sp_configure`'
