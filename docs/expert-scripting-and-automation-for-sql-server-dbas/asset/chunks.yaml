    be the ambition of every DBA. The configurable options within `sp_configure` alone
    will give you a small taste of how vast the possibilities are. I strongly encourage
    you to explore SQL Server metadata and how you can use it to automate the mundane,
    within your own enterprise.


    There are some classic opportunities which will stand out to DBAs in any organization,
    however, such as the ability to rebuild only those indexes which require it, instead
    of rebuilding all indexes in every maintenance window. `sys.dm_db_index_physical_stats`
    can be harnessed to provide a mechanism for achieving this.


    DBAs should always seriously consider enabling Query Store on their databases,
    and in SQL Server 2022, this is the default option. You may even choose to create
    a maintenance routine, using some of the techniques you have learned in this book,
    to have a centralized script that will run against every database in your enterprise,
    to enable the feature. Once enabled, a raft of possibilities opens up, such as
    the example provided here, of removing ad hoc plans from your instances. Many
    more complex possibilities exist, and some of these can be harnessed by querying
    the XML, in which the raw Query Store data is stored. In some of these scenarios,
    you will want to use the `CROSS` and `OUTER APPLY` operators in conjunction with
    this to pull useful metadata in the most efficient way. The APPLY operator will
    be particularly useful when you wish to add query text to your results. Please
    refer to Chapter [1](#395785_2_En_1_Chapter.xhtml) for a primer on how to use
    these features.


    Scripts utilizing a combination of PowerShell and T-SQL can also be used to enforce
    policies, such as hardening standards, in scenarios where Policy-Based Management
    can report but not enforce the required standards. This is especially helpful
    in large enterprises, where it is challenging to track multiple servers. Chapter
    [10](#395785_2_En_10_Chapter.xhtml) will discuss how we can centralize our maintenance
    routines. Alternatively, you could use the techniques discussed in Chapter [9](#395785_2_En_9_Chapter.xhtml)
    to make it part of your standard build, so that it is enforced through configuration
    management.


    # 8. Building an Inventory Database


    You may be wondering why a book discussing PowerShell automation for DBA includes
    a chapter on building an inventory database. The answer to this is simple – an
    inventory database is critical to the success of your automation strategy. Despite
    being a relatively small and simple database, an inventory database will act as
    your hub for orchestrating your automation efforts throughout the enterprise.


    Even if your company has a full-fledged Configuration Management Database (CMDB),
    which includes databases, the astute DBA will still have their own inventory system.
    There are two reasons for this. Firstly, it allows a DBA to have more control
    over their own database, limiting the chances of the data becoming stale or dirty.


    From the perspective of PowerShell and automation, however, having full control
    over the system also means that you can easily extend and enhance it, so that
    you can also easily grow and extend your automation solution. Because the database
    is a DBA-owned SQL Server database, as opposed to a hidden database in a large
    CMDB, which can often only be accessed via APIs, it allows you to use the database
    to control your automated maintenance.


    Your automated build will keep the database up to date by inserting the details
    of every new SQL Server instance that is built in your enterprise. The database
    can then feed automated maintenance routines that you create, for example, providing
    a list of SQL Server instances and databases that should be iterated by maintenance
    routines, such as DBCC CHECKDB, or index rebuilds.


    Centralized maintenance techniques will be discussed in more detail in Chapter
    [10](#395785_2_En_10_Chapter.xhtml). In this chapter, we will focus on designing
    and building the inventory database itself. We will start by discussing an appropriate
    platform design for the database, before discussing the logical and physical database
    design. Finally, we will explore how to create the database.'
  trans: '# 8. 构建库存数据库


    ## 表 7-9


    `sys.configurations` 返回的列


    | 列 | 描述 |

    | --- | --- |

    | `configuration_id` | 主键 |

    | `name` | 设置的名称 |

    | `value` | 设置当前配置的值 |

    | `minimum` | 该设置可配置的最小值 |

    | `maximum` | 该设置可配置的最大值 |

    | `value_in_use` | 当前正在使用的值。如果设置已更改但实例尚未重新配置或重启，则此值可能与 `value` 列不同 |

    | `description` | 设置的描述 |

    | `is_dynamic` | 指定设置是否为动态的：<br>• `1` 表示该设置可通过 `RECONFIGURE` 应用<br>• `0` 表示必须重启实例
    |

    | `is_advanced` | 指定设置是否只能在“显示高级选项”设为 `1` 时更改：<br>• `0` 表示它不是高级选项<br>• `1` 表示它是一个高级选项
    |


    `sp_configure` 接受的参数详见表 7-10。


    ## 表 7-10


    `sp_configure` 接受的参数


    | 参数 | 描述 |

    | --- | --- |

    | `@configname` | 要更改的设置的名称 |

    | `@configvalue` | 要为该设置配置的值 |


    ## 总结


    全面讨论 SQL Server 中所有可用的元数据对象本身就足以写成好几卷书。元数据的每一个领域都为你开启了在环境中自动化维护例程的机会，而这应该是每一位
    DBA 的目标。仅 `sp_configure` 内的可配置选项就让你窥见了可能性的广阔。我强烈建议你探索 SQL Server 元数据，以及如何利用它在你自己的企业中实现日常工作的自动化。


    然而，对于任何组织中的 DBA 来说，都有一些显而易见的经典机会，例如，只重建那些需要重建的索引，而不是在每个维护窗口中重建所有索引。`sys.dm_db_index_physical_stats`
    就可以被用来实现这一机制。


    DBA 应始终认真考虑在其数据库上启用查询存储，在 SQL Server 2022 中，这已是默认选项。你甚至可以选择创建一个维护例程（使用本书中学到的一些技术），编写一个中心化的脚本，针对企业中的每个数据库运行，以启用该功能。一旦启用，一系列可能性便会展开，例如此处提供的关于从实例中移除即席查询计划的示例。还存在许多更复杂的可能性，其中一些可以通过查询存储原始查询存储数据的
    XML 来利用。在某些场景下，你会希望结合使用 `CROSS` 和 `OUTER APPLY` 操作符来以最有效的方式提取有用的元数据。当你希望向结果中添加查询文本时，`APPLY`
    操作符将特别有用。关于如何使用这些功能的入门知识，请参阅第 1 章。


    结合使用 PowerShell 和 T-SQL 的脚本也可用于强制执行策略，例如在基于策略的管理只能报告而无法强制执行所需标准的场景中实施加固标准。这在需要跟踪多台服务器的大型企业中尤其有用。第
    10 章将讨论如何集中化我们的维护例程。或者，你也可以使用第 9 章讨论的技术，使其成为标准构建的一部分，从而通过配置管理来强制执行。


    你可能想知道为什么一本讨论 DBA PowerShell 自动化的书会包含一章关于构建库存数据库的内容。答案很简单——库存数据库对于自动化策略的成功至关重要。尽管它是一个相对较小且简单的数据库，但库存数据库将充当你在整个企业中协调自动化工作的枢纽。


    即使你的公司拥有一个成熟的配置管理数据库（CMDB），其中包含了数据库，精明的 DBA 仍然会拥有自己的库存系统。这有两个原因。首先，它让 DBA 能更好地控制自己的数据库，减少数据变得陈旧或“脏”的机会。


    然而，从 PowerShell 和自动化的角度来看，完全控制系统也意味着你可以轻松地扩展和增强它，从而也能轻松地发展和扩展你的自动化解决方案。因为该数据库是一个
    DBA 拥有的 SQL Server 数据库，而不是大型 CMDB 中的一个隐藏数据库（后者通常只能通过 API 访问），所以它允许你使用该数据库来控制你的自动化维护。


    你的自动化构建将通过插入在企业中构建的每个新 SQL Server 实例的详细信息来保持数据库最新。然后，该数据库可以为你创建的自动化维护例程提供数据，例如，提供一个
    SQL Server 实例和数据库列表，供维护例程（如 `DBCC CHECKDB` 或索引重建）进行迭代。


    集中化维护技术将在第 10 章中更详细地讨论。在本章中，我们将专注于设计和构建库存数据库本身。我们将首先讨论适合该数据库的平台设计，然后讨论逻辑和物理数据库设计。最后，我们将探讨如何创建该数据库。'
- fmt: '# Inventory Database Platform Design


    ## Overview


    Before designing the inventory database itself, you should first consider the
    platform requirements of the database, such as availability. For example, imagine
    that your organization has four data centers, dispersed across the UK and the
    United States, as well as a presence in Azure. This is depicted in Figure [8-1](#395785_2_En_8_Chapter.xhtml#Fig1).
    You have decided to place the inventory database on a management instance in the
    UK. What will happen in the event of the `UK Primary` data center losing connectivity
    to the rest of the network? The SQL Server instances in `UK` will continue to
    see the inventory database, but instances in the other three data centers will
    not. If your inventory database is used as a hub to control automation, this scenario
    could pose real issues. If you have all hands on deck, firefighting a data center
    outage and potentially invoking DR strategies for dozens of data-tier applications,
    the last thing that you probably want to be worrying about is users complaining
    of performance issues across the rest of the enterprise because their maintenance
    jobs have not been able to run.


    ![](images/395785_2_En_8_Chapter/395785_2_En_8_Fig1_HTML.jpg)


    Figure 8-1: Flow chart illustrating a cloud computing infrastructure using Azure.
    The diagram shows two main regions: West US and UK South, each with managed servers
    and databases. West US and UK South are connected to their respective primary
    and secondary sites, labeled as US Primary Site, US Secondary Site, UK Primary
    Site, and UK Secondary Site, each containing managed servers. The flow chart represents
    the distribution and management of servers and databases across different geographical
    locations.


    ## Example Topology


    The resolution to this problem lays in redundancy. Specifically, SQL Server `AlwaysOn
    Availability Groups` can be used to synchronize your inventory database between
    two locations. You could either build an `AlwaysOn Availability Group` on-premise,
    spanning two data centers, or as in this example, if the organization has a presence
    in public cloud, you could build an `Availability Group` across two regions in
    Azure.


    ## Solution


    If you choose to host your inventory database in Azure, you could build the `Availability
    Group` on `IaaS` (Infrastructure as a Service), or you could make use of Azure’s
    `PaaS` (Platform as a Service) or `DBaaS` (Database as a Service) offerings.


    ### IaaS


    If you choose to use `IaaS`, then you will build VMs in Azure and be responsible
    for manually configuring the `Availability Group` yourself.


    ### PaaS


    If you choose to use a `PaaS` offering, then you would be looking toward Azure
    Managed Instances. Here, you do not work with the VM directly. Instead, you are
    buying a SQL Server instance as a service. This reduces the administrative overhead,
    as it provides automatic patching, version updates, and automatic backups, as
    well as entirely removing the Windows administration. Auto-failover groups can
    also be used to manage geographical dispersement of your inventory database across
    Azure regions.


    **Caution**: Azure SQL Database may not be suitable for your inventory database;
    although you could potentially use Elastic Jobs, it would be easier to manage
    with a Managed Instance.


    Azure SQL Database is a database as a service offering from Azure. With this option,
    you purchase a database. This removes the requirement to administer both the Windows
    operating system and the SQL Server instance entirely. In our case, however, Azure
    SQL Database may not be a good choice, because we want to use our database as
    a hub for automation, which means creating SQL Server Agent jobs. These are not
    supported in Azure SQL Database, as they are instance-level artifacts.


    **Tip**: A full discussion of `AlwaysOn Availability Groups` is beyond the scope
    of this book. However, full details can be found in the Apress title *SQL Server
    2022 AlwaysOn*, which can be found at link.springer.com/book/10.1007/978-1-4842-8864-1.


    # Inventory Database Logical Design


    When designing any database, the first task should be to determine what data you
    need to store. Do not think about table design yet, just the data that you will
    need – in a flat list. For database developers, this involves conversations with
    business analysts or business stakeholders to determine requirements. For an application
    developer, this task will usually be handled by their chosen framework, such as
    Entity Framework. The DBA who wishes to create an inventory database, however,
    will play the role of both the developer and business stakeholder. Below is a
    list of attributes that you may wish to record. Of course, this list should be
    tailored to your individual requirements.


    *   `Server name`

    *   `Instance name`

    *   `Port`

    *   `IP Address`

    *   `Service account name and password`

    *   `Authentication mode`

    *   `sa account name and password`

    *   `Cluster flag`

    *   `Windows version`

    *   `SQL Server version`

    *   `DR Server name`

    *   `DR instance name`

    *   `DR technology`

    *   `Target RPO`

    *   `Target RTO`

    *   `Instance classification`

    *   `Server cores`

    *   `Instance cores`

    *   `Server RAM`

    *   `Instance RAM`

    *   `Virtual flag`

    *   `Hypervisor`

    *   `SQL Server Agent account name and password`

    *   `Application owner`

    *   `Application owner e-mail`'
