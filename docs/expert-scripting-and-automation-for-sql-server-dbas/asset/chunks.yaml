    `Server` 和 `Instance` 表。


    最后，`MaintenanceSchedule` 视图基于上述两个表构建，并计算应对每台服务器运行维护任务的下一次时间。该视图将是调用我们维护脚本的 `SQL
    Server Agent` 作业的入口点。


