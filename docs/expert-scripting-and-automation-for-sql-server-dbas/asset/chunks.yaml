    清单 7-2 中的脚本演示了如何使用此动态管理函数来确定哪些索引的碎片率超过 25%，并仅重建这些索引。


    ```

    $GetDatabaseParams = @{

    SqlInstance = "localhost"

    Query       = "

    SELECT name

    FROM sys.databases

    WHERE database_id > 4

    "

    }

    $databases = Invoke-DbaQuery @GetDatabaseParams | Select-Object -ExpandProperty
    Name

    $params = @{

    SqlInstance = "localhost"

    Query       = "

    DECLARE @SQL NVARCHAR(MAX)

    SET @SQL = (

    SELECT ''ALTER INDEX ''

    + QUOTENAME(i.name)

    + '' ON '' + s.name

    + ''.''

    + QUOTENAME(OBJECT_NAME(i.object_id))

    + '' REBUILD ; ''

    FROM sys.dm_db_index_physical_stats(DB_ID(),NULL,NULL,NULL,''DETAILED'') ps

    INNER JOIN sys.indexes i

    ON ps.object_id = i.object_id

    AND ps.index_id = i.index_id

    INNER JOIN sys.objects o

    ON ps.object_id = o.object_id

    INNER JOIN sys.schemas s

    ON o.schema_id = s.schema_id

    WHERE index_level = 0

    AND avg_fragmentation_in_percent > 25

    FOR XML PATH('''')

    ) ;

    EXEC(@SQL) ;

    "

    }

    foreach ($database in $databases) {

    Invoke-DbaQuery @params -Database $database

    }

    ```


    该脚本使用 XML `data()` 方法技术来构建并执行一个字符串，该字符串包含针对指定数据库中所有在叶级碎片率超过 25% 的索引的 `ALTER INDEX`
    语句。脚本将 `sys.dm_db_index_physical_stats` 连接到 `sys.schemas` 以获取包含该索引的架构名称。这些对象之间没有直接连接，因此连接是通过一个中间目录视图
    (`sys.objects`) 实现的。脚本还连接到 `sys.indexes` 以检索 `object_id`，然后将其传递到 `OBJECT_NAME()`
    函数中以确定索引的名称。


    ### 强制执行策略


    基于策略的管理 (PBM) 是确保整个企业满足您策略的绝佳工具。然而，它有其局限性。具体来说，某些方面只允许您报告策略违规，而无法实际阻止导致违规的更改。因此，许多
    DBA 会选择通过自定义脚本来强制执行其部分关键策略。


    **提示**：PBM 方面是 SQL Server 管理领域中一组相关的属性。


    `xp_cmdshell` 是一个系统存储过程，允许您从 SQL Server 实例中运行操作系统命令。DBA 们对于这是否是一个安全漏洞似乎存在一些争论，但我一直认为这是显而易见的。认为
    `xp_cmdshell` 不是安全风险的理由通常围绕着“只有我的团队和我才被允许使用它。”但是，如果实例被恶意用户入侵了怎么办？在这种情况下，您绝对不希望减少黑客在开始将其攻击传播到网络之前所需采取的步骤。


    **注意**：如果您的组织希望符合 SQL Server 的 CIS 加固标准，则必须禁用 `xp_cmdshell`。


    PBM 可以报告 `xp_cmdshell` 的状态，但无法阻止其被启用。不过，您可以创建一个 PowerShell 脚本，用于检查 `xp_cmdshell`
    是否已启用，并在需要时将其禁用。然后可以安排该脚本定期运行。


    清单 7-3 中的脚本演示了如何通过检查 `sys.configurations` 目录视图中的状态来发现该功能是否配置错误。然后，它将使用 `sp_configure`
    重新配置该设置。这里调用了两次 `sp_configure`，因为 `xp_cmdshell` 是一个高级选项，在更改该设置之前必须先配置 `show advanced
    options` 属性。`RECONFIGURE` 命令强制应用更改。


    **提示**：在第 10 章中，我们将讨论允许从此类有用的脚本从中心位置应用到企业的技术。然而，对于这个特定的配置，您可能希望使用第 9 章中讨论的技术，将其作为标准构建的一部分，通过期望状态配置
    (DSC) 或您选择的配置管理工具来应用。


    在通过 `sp_configure` 进行更改后，有两个命令可以重新配置实例。第一个是 `RECONFIGURE`。第二个是 `RECONFIGURE WITH
    OVERRIDE`。只要新配置的值被 SQL Server 视为“合理”，`RECONFIGURE` 就会更改该设置的运行值。例如，如果实例上存在包含数据库，`RECONFIGURE`
    将不允许您禁用包含数据库。但是，如果您使用 `RECONFIGURE WITH OVERRIDE`，即使您的包含数据库将不再可访问，此操作也将被允许。即使使用此命令，SQL
    Server 仍会运行检查以确保您输入的值介于该设置允许的最小值和最大值之间。它也不允许您执行任何会导致数据库引擎出现致命错误的操作。例如，该过程不允许您将
    `Min Server Memory (MB)` 设置配置为高于 `Max Server Memory (MB)` 设置。


    ```

    $params = @{

    SqlInstance = "localhost"

    Query       = "

    --Check if xp_cmdshell is enabled

    IF (

    SELECT value_in_use

    FROM sys.configurations

    WHERE name = ''xp_cmdshell''

    ) = 1

    BEGIN

    --Turn on advanced options

    EXEC sp_configure ''show advanced options'', 1 ;

    RECONFIGURE

    --Turn off xp_cmdshell

    EXEC sp_configure ''xp_cmdshell'', 0 ;

    RECONFIGURE

    END

    "

    }

    Invoke-DbaQuery @params

    ```


    此方法可用于配置企业对外暴露区域的许多方面。在 SQL Server 2022 中，可以使用此方法配置的功能详见表 7-8。


