    ## 关于技术审校


    # 1. 面向 DBA 的 T-SQL 技巧


    在本章中，我们将讨论 T-SQL 中的一些基础技巧，这些技巧在后续章节中当我们探讨如何使用 PowerShell 自动化您的 SQL Server 企业环境时将变得非常有用。具体而言，我们将讨论如何使用
    `APPLY` 运算符对结果集中的每一行调用函数。理解这项技术对于第 8 章至关重要，那时我们将开始研究元数据驱动的自动化。然后，我们将探讨 XML（可扩展标记语言），以及
    SQL Server DBA 如何利用其原生 XML 数据类型。由于大量信息（如查询计划）以 XML 格式存储，DBA 掌握 XML 的使用至关重要。理解
    SQL Server 中的基础 XML 也是理解如何高效循环的关键。为此，我们将探索如何使用 XML 技术高效地遍历多个对象。我们会将其效率与传统的游标进行比较。这一点很重要，因为尽管在
    PowerShell 中循环总是更高效，但有时自动化的最优方法会涉及通过 PowerShell 和 T-SQL 层进行多层循环。这将在第 8 章中变得显而易见，但这项技术贯穿于本书的多个章节。


    ## 使用 APPLY 运算符


    T-SQL `APPLY` 运算符将在第 8 章探讨元数据驱动的自动化时使用。它允许您针对查询返回的结果集中的每一行调用一个表值函数。`APPLY` 运算符有两种变体：`CROSS
    APPLY` 和 `OUTER APPLY`。使用 `CROSS APPLY` 时，查询将仅返回表值函数产生了结果集的行。使用 `OUTER APPLY`
    时，不会对结果集应用筛选器，如果表值函数未返回任何结果，则在该函数的每一列中将返回 `NULL`。


    当 DBA 从动态管理视图（`DMV`）和函数（`DMF`）中检索元数据时，`APPLY` 运算符非常有用。例如，代码清单 1-1 中的查询将返回所有会话的列表，详细列出会话
    ID、登录时间、登录名以及进程是用户进程还是系统进程。然后，它将使用 `OUTER APPLY` 针对每一行运行 `sys.dm_exec_sql_text`
    动态管理函数。该函数返回一个名为 `text` 的列，其中包含与 `sys.dm_exec_requests` 动态管理视图中 `sql_handle` 列关联的
    SQL 语句。


    > 注意

    >

    > 在 `SELECT` 列表中引用的 `text` 列是由 `sys.dm_exec_sql_text` `DMF` 返回的列。


    ```sql

    SELECT

    s.session_id

    , s.login_time

    , s.login_name

    , s.is_user_process

    , dest.[text]

    FROM sys.dm_exec_sessions s

    INNER JOIN sys.dm_exec_requests r

    ON r.session_id = s.session_id

    OUTER APPLY sys.dm_exec_sql_text(sql_handle) dest;

    ```


    代码清单 1-1 使用 `OUTER APPLY`


    您会注意到此查询返回的结果集中有许多行的 `text` 列为 `NULL` 值。这是因为它们是系统进程，为 SQL Server 运行后台任务，例如 Lazy
    Writer（懒惰写入器）和 Ghost Cleanup Task（幽灵清理任务）。


    > 提示

    >

    > 我们可以确定它们是系统进程是因为 `is_user_process` 标志。我们不会依赖会话 ID 小于 50 这一假设。所有系统进程的会话 ID 都小于
    50 这一断言被广泛相信，但也是一个谬误，因为有可能存在超过 50 个并行运行的系统会话。


    如果我们对同一个查询使用 `CROSS APPLY` 运算符，如代码清单 1-2 所示，则返回的唯一行将是应用表值函数后结果不为 `NULL` 的行。


    ```sql

    SELECT

    s.session_id

    , s.login_time

    , s.login_name

    , [text]

    , s.is_user_process

    FROM sys.dm_exec_sessions s

    INNER JOIN sys.dm_exec_requests r

    ON r.session_id = s.session_id

    CROSS APPLY sys.dm_exec_sql_text(sql_handle) ;

    ```


    代码清单 1-2 使用 `CROSS APPLY`


    ## 面向 DBA 的 XML


    XML（可扩展标记语言）在 SQL Server 中被广泛用作数据格式，用于存储对成功 DBA 至关重要的数据，例如扩展事件数据、查询计划数据以及 `MDW`（管理数据仓库）使用的收集器项目。因此，DBA
    掌握 XML 格式及其在 SQL Server 中的使用方法非常重要。理解如何在 SQL Server 中使用 XML 对于理解如何高效循环也很重要。这将在本章的“高效循环”一节中讨论。以下各节将概述
    XML 数据类型、如何生成 XML 文档以及如何查询 XML 数据。

    '
- fmt: '### Understanding XML


    XML is a markup language, similar to HTML, which was designed for the purpose
    of storing and transporting data. Like HTML, XML uses tags. Unlike HTML, however,
    these tags are not predefined. Instead, they are defined by the document author.
    An XML document has a tree structure, beginning with a root node and containing
    child nodes (also known as child elements). Each element can contain data but
    also attributes. Each attribute can contain information that describes the element.


    For example, imagine that you require details of sales orders to be stored in
    XML format. It would be sensible to assume that each sales order would be stored
    in a separate element within the document. But what about sales order properties,
    such as order date, customer ID, product IDs, quantities, and prices? These pieces
    of information could either be stored as child elements of the sales order element,
    or they could be stored as attributes of the sales order element. There are no
    set rules for when you should use child elements or attributes to describe properties
    of an element. This choice is at the discretion of the document author.


    The XML document in Listing [1-3](#395785_2_En_1_Chapter.xhtml#PC3) provides a
    sample XML document, which holds the details of sales orders for a fictional organization.


    ```

    Listing 1-3

    Sales Orders Stored in an XML Document

    ```


    There are several things to note when looking at this XML document. First, elements
    (or nodes) begin with the opening tag, which is the element name, encapsulated
    within angle brackets. They end with the closing tag, which is the element name
    preceded by a backslash and enclosed in angle brackets. Any elements which fall
    between the opening and closing tags of another node are child elements of that
    node.


    Attribute values are enclosed in double quotation marks and reside within the
    opening tag of an element. For example, `SalesOrderID` is an attribute of the
    `<SalesOrder>` element.


    It is acceptable to have repeating elements. You can see that `<SalesOrder>` is
    a repeating element, as two separate sales orders are stored in this XML document.
    The `<SalesOrders>` element is the document’s root element and is the only element
    that is not allowed to be complex. This means that it cannot have attributes and
    cannot be repeating. Attributes can never repeat within an element. Therefore,
    if you require an attribute to repeat, you should use a nested element as opposed
    to an attribute.


    The format of an XML document can be defined by an `XSD` (XML Schema Definition)
    schema. An `XSD` schema will define the document’s structure, including data types,
    if complex types (complex elements) are allowed, and how many times an element
    must occur (or is limited to occurring) within a document. It also defines the
    sequence of elements. A full description of `XSD` schemas can be found at `en.wikipedia.org/wiki/XML_Schema_(W3C)`.


    > Tip

    >

    > An XML document requires a root element in order to be “well-formed.” An XML
    document without a root element is known as an XML fragment. This is important,
    because it is not possible to bind an XML fragment to an `XSD` schema. This means
    that the structure of the document, including data types, cannot be enforced.


    So how does this map to DBA data? Well, take Listing [1-4](#395785_2_En_1_Chapter.xhtml#PC4)
    as an example. This shows part of an XML execution plan, which was produced by
    selecting the `database_id` column from `msdb.dbo.suspect_pages`.


    ```

    Listing 1-4

    Partial XML Execution Plan

    ```


    While the execution plan is very simple, you can see that the author used nested
    elements, all of which have many attributes associated with them. Because the
    document conforms to a schema (typed), the root element, in this case `<ShowPlanXML>`,
    defines its schema association.


    ### Converting Result Sets to XML


    `T-SQL` allows you to convert relational result sets into XML, by using the `FOR
    XML` clause in your `SELECT` statement. There are four modes that can be used
    with the `FOR XML` clause: `FOR XML RAW`, `FOR XML AUTO`, `FOR XML PATH`, and
    `FOR XML EXPLICIT`.


    The following sections will briefly discuss how the `FOR XML` clause works in
    `RAW` mode and `AUTO` mode, but we will mainly focus on `PATH` mode. `EXPLICIT`
    mode is beyond the scope of this book, as its functionality is very similar to
    `PATH` mode but is far more complex and, although helpful in some development
    scenarios, does not often prove useful for DBAs.'
