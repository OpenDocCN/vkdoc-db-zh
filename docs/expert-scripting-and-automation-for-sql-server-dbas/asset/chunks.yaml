    ```

    $Params = @{

    SqlInstance  = "localhost"

    Query        = "SELECT name FROM sys.databases"

    }

    Invoke-DbaQuery @Params | ConvertTo-Csv | Out-File -FilePath "c:\scripts\DatabasesOut.csv"

    Listing 5-10

    Outputting Results to a File

    ```


    ## Managing Security Objects


    In Chapter [4](#395785_2_En_4_Chapter.xhtml), we discussed how the SqlServer module
    can be used to create Logins and add them to roles. At the point, we wanted to
    start managing database users; however, we hit a gap in the functionality of the
    SqlServer module and had to use SMO directly to perform the required tasks.


    The DbaTools module has a much richer set of commands for dealing with security
    objects. Therefore, in the following sections, we will walk through how we can
    use DbaTools to manage Logins and Users end to end. Specifically, we will explore
    how to create a Login, create a database User, add both the Login and the User
    to roles, rename a Login, delete a Login, and remove an orphaned User.'
  trans: '

    ### 错误处理


    `DbaTools` 系列中的命令默认会尝试帮助你处理错误。具体来说，当发生错误时，`DbaTools` 会捕获并解析错误，然后返回一个友好的错误信息。例如，考虑代码清单
    5-6 中的命令，它会抛出一个除零错误。


    ```

    Invoke-DbaQuery -SqlInstance localhost -Query "SELECT 1/0"

    Listing 5-6

    生成友好错误

    ```


    此错误的输出如下所示：


    ```

    WARNING: [10:56:33][Invoke-DbaQuery] [localhost] Failed during execution | Divide
    by zero error encountered.

    ```


    虽然这肯定比抛出标准的 PowerShell 异常更容易阅读，但在编写脚本时可能会导致问题，因为它可能导致脚本静默失败。因此，在许多情况下，建议关闭此功能。这可以通过使用
    `–EnableException` 参数来实现，如代码清单 5-7 所示。


    ```

    Invoke-DbaQuery -SqlInstance localhost -Query "SELECT 1/0" –EnableException

    Listing 5-7

    使用 EnableException 参数

    ```


    这将导致抛出一个标准异常，如下所示：


    ```

    Exception:

    Line |

    97974 |          throw $records[0]

    |          ~~~~~~~~~~~~~~~~~

    | Divide by zero error encountered.

    ```


    ### 针对多个实例运行查询


    使用 `Invoke-DbaQuery`，针对多个 SQL Server 实例运行查询非常简单。你只需要定义一个实例名称列表，然后将其通过管道传递给 `Invoke-DbaQuery`
    命令即可。代码清单 5-8 展示了这一点，它返回了每个实例上的数据库列表。


    **注意**

    该脚本假设你有一个默认的 SQL Server 实例和一个名为 `poshscripting` 的命名实例。


    ```

    "localhost", "localhost\poshscripting" | Invoke-DbaQuery -Query "SELECT name FROM
    sys.databases"

    Listing 5-8

    针对多台服务器运行查询

    ```


    观察下面的结果，你会注意到一个明显的问题：无法确定每个数据库属于哪个实例：


    ```

    master

    tempdb

    model

    msdb

    AdventureWorks2022

    master

    tempdb

    model

    msdb

    ```


    当然，你可以通过将 `@@SERVERNAME` 添加到 `SELECT` 列表中来解决这个问题。然而，`Invoke-DbaQuery` 提供了另一种方法。你可以简单地指定
    `–AppendServerInstance` 参数。在处理本地服务器时，两种技术的差异显而易见。使用 `@@SERVERNAME` 技术将返回实际的服务器名称。而使用
    `–AppendServerInstance` 技术，则会返回你传递给 `Invoke-DbaQuery` 的任何值。这可能是服务器名称、`localhost`
    或一个 IP 地址。例如，考虑代码清单 5-9 中的命令。


    ```

    $query = "SELECT name, @@SERVERNAME AS SQLInstance FROM sys.databases"

    "localhost", "localhost\poshscripting" | Invoke-DbaQuery -Query $query –AppendServerInstance

    Listing 5-9

    返回服务器名称

    ```


    结果（如下所示）说明了两种技术在结果上可能存在的差异：


    ```

    name               SQLInstance                      ServerInstance

    --------------     ---------------------------    -----------------------

    master             WIN-J38I01U06D7                  localhost

    tempdb             WIN-J38I01U06D7                  localhost

    model              WIN-J38I01U06D7                  localhost

    msdb               WIN-J38I01U06D7                  localhost

    AdventureWorks2022 WIN-J38I01U06D7                  localhost

    master             WIN-J38I01U06D7\POSHSCRIPTING    localhost\poshscripting

    tempdb             WIN-J38I01U06D7\POSHSCRIPTING    localhost\poshscripting

    model              WIN-J38I01U06D7\POSHSCRIPTING    localhost\poshscripting

    msdb               WIN-J38I01U06D7\POSHSCRIPTING    localhost\poshscripting

    ```


    #### 将结果写入文件


    与 `Invoke-SqlCmd` 一样，没有直接允许你将查询结果发送到文件的参数；但是，可以通过将 `Invoke-SqlCmd` 的结果通过管道传递给
    `Out-File` cmdlet 来达到相同的目的。代码清单 5-10 展示了这一点，它将数据库列表写入到一个名为 `c:\scripts\DatabasesOut.csv`
    的文件中。


    ```

    $Params = @{

    SqlInstance  = "localhost"

    Query        = "SELECT name FROM sys.databases"

    }

    Invoke-DbaQuery @Params | ConvertTo-Csv | Out-File -FilePath "c:\scripts\DatabasesOut.csv"

    Listing 5-10

    将结果输出到文件

    ```


    ## 管理安全对象


    在第 4 章中，我们讨论了如何使用 `SqlServer` 模块来创建登录名并将其添加到角色中。那时，我们想开始管理数据库用户；然而，我们遇到了 `SqlServer`
    模块功能上的空白，不得不直接使用 SMO 来执行所需的任务。


    `DbaTools` 模块拥有更丰富的命令集来处理安全对象。因此，在接下来的章节中，我们将逐步介绍如何使用 `DbaTools` 来端到端地管理登录名和用户。具体来说，我们将探讨如何创建登录名、创建数据库用户、将登录名和用户都添加到角色中、重命名登录名、删除登录名以及移除孤立用户。

    '
- fmt: "### 创建登录\n\n`New-DbaLogin` 命令可用于创建登录名。该命令最简单的调用方式是，通过 `–Login` 参数传递要创建的登录名，并通过\
    \ `-SqlInstance` 参数传递应创建登录名的 SQL Server 实例名称。如代码清单 [5-11](#395785_2_En_5_Chapter.xhtml#PC15)\
    \ 所示。\n\n> 注意\n> 请将服务器\\登录名更改为与你自己的服务器名称以及服务器上存在的本地用户相匹配。\n\n```\n$params = @{\n\
    \    SqlInstance     = \"localhost\"\n    Login           = \"WIN-J38I01U06D7\\\
    Adam\"\n    DefaultDatabase = \"AdventureWorks2022\"\n}\nNew-DbaLogin @params\n\
    ```\n*代码清单 5-11 创建一个登录名*\n\n此脚本为现有的 Windows 用户创建登录名。如果要创建 SQL 登录名，则需要额外以 `SecureString`\
    \ 形式传递登录名的密码。创建 SQL 登录名时，我们还可以选择强制执行域密码策略和过期策略，就像使用 `SqlServer` 模块一样。代码清单 [5-12](#395785_2_En_5_Chapter.xhtml#PC16)\
    \ 展示了这一点。\n\n```\n$Password = 'Pa$$w0rd'\n# 转换为 SecureString\n$SecurePassword\
    \ = ConvertTo-SecureString $Password -AsPlainText -Force\n$params = @{\n    SqlInstance\
    \      = \"localhost\"\n    Login            = \"Adam\"\n    SecurePassword  \
    \ = $SecurePassword\n    DefaultDatabase  = \"AdventureWorks2022\"\n}\nNew-DbaLogin\
    \ @params -PasswordPolicyEnforced –PasswordExpirationEnabled\n```\n*代码清单 5-12\
    \ 创建一个 SQL 登录名*\n\n创建 SQL 登录名时，我们还可以强制使用特定的 SID（安全标识符）。这在诸如配置管理（在第 [9](#395785_2_En_9_Chapter.xhtml)\
    \ 章讨论）等场景中非常有用，因为我们希望确保登录始终存在，并在意外删除时自动重新创建。\n\nSQL Server 使用 SID 将数据库用户映射到登录名；因此，即使\
    \ SQL 登录名具有相同的名称和密码，如果 SID 发生变化，数据库用户也会成为孤立用户。使用特定的 SID 可以消除此问题。\n\n> 提示\n> 对于为\
    \ Windows 帐户创建的登录名，不会出现此问题。这是因为 SID 存储在域中（对于本地 Windows 帐户则存储在本地服务器中）。每次为 Windows\
    \ 用户创建登录名时，即使在不同的实例上，它都将具有相同的 SID。\n\n你可以通过 `sys.syslogins` 表来识别 SQL 登录名的 SID。代码清单\
    \ [5-13](#395785_2_En_5_Chapter.xhtml#PC17) 中的 T-SQL 查询演示了如何检索我们在代码清单 [5-12](#395785_2_En_5_Chapter.xhtml#PC16)\
    \ 中创建的名为 `Adam` 的 SQL 登录名的 SID。\n\n```\nSELECT\n    name\n    , sid\nFROM sys.syslogins\n\
    WHERE name = 'Adam'\n```\n*代码清单 5-13 检索登录名的 SID*\n\n代码清单 [5-14](#395785_2_En_5_Chapter.xhtml#PC18)\
    \ 演示了如何创建具有特定 SID 的登录名。为此，我们使用 `New-DbaLogin` 命令的 `–Sid` 参数。\n\n> 注意\n> 登录名 `Adam`\
    \ 已存在。因此，我们使用了 `–Force` 参数，这将导致登录名被删除并重新创建，从而避免失败。\n\n```\n$Password = 'Pa$$w0rd'\n\
    # 转换为 SecureString\n[securestring]$SecurePassword = ConvertTo-SecureString $Password\
    \ -AsPlainText -Force\n$params = @{\n    SqlInstance     = \"localhost\"\n   \
    \ Login           = \"Adam\"\n    SecurePassword  = $SecurePassword\n    DefaultDatabase\
    \ = \"AdventureWorks2022\"\n    SID             = \"0xC8105F39AEDBF947ACA0FA99544EBF33\"\
    \n}\nNew-DbaLogin @params –Force\n```\n*代码清单 5-14 使用特定 SID 创建登录名*\n\n### 管理登录名\n\
    \nDbaTools 提供了用于管理登录名的有用命令。在以下部分中，我们将探讨如何将登录名添加到服务器角色、重命名以及删除登录名。\n\n#### 将登录名添加到服务器角色\n\
    \n通过将登录名添加到服务器角色，可以为其授予实例范围内的权限。这可以使用 DbaTools 的 `Add-DbaServerRoleMember` 命令实现。例如，代码清单\
    \ [5-15](#395785_2_En_5_Chapter.xhtml#PC19) 中的命令将 `Adam` 登录名添加到 `dbcreator` 服务器角色，允许他在实例上创建新数据库。\n\
    \n```\nAdd-DbaServerRoleMember -SqlInstance localhost -ServerRole dbCreator -Login\
    \ Adam\n```\n*代码清单 5-15 将登录名添加到服务器角色*\n\n较新版本的 SQL Server 还允许你创建自己的自定义服务器角色，此功能也通过\
    \ DbaTools 得到支持，即使用 `New-DbaServerRole` 命令；但是，在撰写本文时，此命令功能非常有限，可以创建服务器角色，但无法为其分配权限。因此，我们将不对其进行详细探讨。\n\
    \n#### 重命名登录名\n\n假设你接手了一个应用程序的职责，并发现连接是通过一个名为 `AppLogin` 的登录名建立的。我们都经历过这种情况。这不仅仅令人有点沮丧，而且你已将应用程序迁移到一个托管多个应用程序数据库的\
    \ SQL 实例。因此，这个名称根本不合适，因为故障排除将变得混乱和复杂。\n\n你可以使用 `Rename-DbaLogin` 命令轻松更改登录名的名称。代码清单\
    \ [5-16](#395785_2_En_5_Chapter.xhtml#PC20) 说明了如何将 `AppLogin` 的名称更改为 `SalesApp`，从而允许你区分实例上的多个应用程序登录名。`-Login`\
    \ 参数指定原始登录名，`-NewLogin` 参数用于指定登录名的所需名称。\n\n> 注意\n> 请记住，如果在 SQL Server 实例中更改了应用程序登录名的名称，还需要在应用程序中进行更新。\n\
    \n```\n$params = @{\n    SqlInstance = \"localhost\"\n    Login       = \"AppLogin\"\
    \n    NewLogin    = \"SalesApp\"\n}\nRename-DbaLogin @params\n```\n*代码清单 5-16\
    \ 重命名登录名*\n\n#### 删除登录名\n\n可以使用 `Remove-DBALogin` 命令删除登录名。要使用此命令，只需使用 `–Login`\
    \ 参数指定登录名即可。代码清单 [5-17](#395785_2_En_5_Chapter.xhtml#PC21) 演示了这一点，我们在其中删除了 `SalesApp`\
    \ 登录名。\n\n```\n$params = @{\n    SqlInstance = \"localhost\"\n    Login      \
    \ = \"SalesApp\"\n}\nRemove-DbaLogin @params\n```\n*代码清单 5-17 删除登录名*"
  raw: '### Creating a Login


    The `New-DbaLogin` command can be used for creating Logins. The simplest invocation
    of this command is to simply pass the name of the login to create via the `–Login`
    parameter and the name of the SQL Server instance where the Login should be created,
    via the `-SqlInstance` parameter. This is demonstrated in Listing [5-11](#395785_2_En_5_Chapter.xhtml#PC15).


    Note


    Change the server\login name to equate to your own server name and a local user
    that is present on your server.


    ```

    $params = @{

    SqlInstance     = "localhost"

    Login           = "WIN-J38I01U06D7\Adam"

    DefaultDatabase = "AdventureWorks2022"

    }

    New-DbaLogin @params

    Listing 5-11

    Create a Login

    ```


    This script creates a login for an existing Windows user. If we wanted to create
    a SQL Login, then we would need to additionally pass the password for the Login
    as a SecureString. When creating a SQL Login, we can also, optionally, enforce
    domain password policies and expirations, just as we can with the `SqlServer`
    module. This is demonstrated in Listing [5-12](#395785_2_En_5_Chapter.xhtml#PC16).


    ```

    $Password = ''Pa$$w0rd''

    # Convert to SecureString

    $SecurePassword = ConvertTo-SecureString $Password -AsPlainText -Force

    $params = @{

    SqlInstance      = "localhost"

    Login            = "Adam"

    SecurePassword   = $SecurePassword

    DefaultDatabase  = "AdventureWorks2022"

    }

    New-DbaLogin @params -PasswordPolicyEnforced –PasswordExpirationEnabled

    Listing 5-12

    Create a SQL Login

    ```


    When creating a SQL Login, we can also force a specific SID (Security Identifier)
    to be used. This is useful in scenarios such as configuration management (discussed
    in Chapter [9](#395785_2_En_9_Chapter.xhtml)), where we want to ensure that a
    Login always exists and is re-created automatically if it is unintentionally dropped.


    SQL Server uses the SID to map Database Users to Logins; therefore, if the SID
    changes, the Database Users will be orphaned, even if the SQL Login has the same
    name and password. Using a specific SID removes this issue.


    Tip


    This issue does not occur for Logins created for Windows accounts. This is because
    the SID is stored in the domain (or the local server for a local Windows account).
    Every time you create a Login for a Windows user, it will have the same SID, even
    on different instances.


    You can identify the SID of a SQL Login via the `sys.syslogins` table. The T-SQL
    query in Listing [5-13](#395785_2_En_5_Chapter.xhtml#PC17) demonstrates how to
    retrieve the SID of the SQL Login called `Adam`, which we created in Listing [5-12](#395785_2_En_5_Chapter.xhtml#PC16).


    ```

    SELECT

    name

    , sid

    FROM sys.syslogins

    WHERE name = ''Adam''

    Listing 5-13

    Retrieve SID of Login

    ```


    Listing [5-14](#395785_2_En_5_Chapter.xhtml#PC18) demonstrates how to create a
    Login with a specific SID. For this, we use the `–Sid` parameter of the `New-DbaLogin`
    command.


    Note


    The Login `Adam` already exists. Therefore, we have used the `–Force` parameter,
    which will cause the Login to be dropped and re-created, therefore avoiding a
    failure.


    ```

    $Password = ''Pa$$w0rd''

    # Convert to SecureString

    [securestring]$SecurePassword = ConvertTo-SecureString $Password -AsPlainText
    -Force

    $params = @{

    SqlInstance     = "localhost"

    Login           = "Adam"

    SecurePassword  = $SecurePassword

    DefaultDatabase = "AdventureWorks2022"

    SID             = "0xC8105F39AEDBF947ACA0FA99544EBF33"

    }

    New-DbaLogin @params –Force

    Listing 5-14

    Create a Login with a Specific SID

    ```


    ### Managing Logins


    DbaTools provides useful commands for managing Logins. In the following sections,
    we will explore how we can add a Login to a Server Role, rename, and drop Logins.


    #### Adding a Login to a Server Role


    Logins can be granted instance-wide permissions by adding them to Server Roles.
    This can be achieved with DbaTools by using the `Add-DbaServerRoleMember` command.
    For example, the command in Listing [5-15](#395785_2_En_5_Chapter.xhtml#PC19)
    adds the `Adam` Login to the `dbcreator` Server Role, allowing him to create new
    databases on the instance.


    ```

    Add-DbaServerRoleMember -SqlInstance localhost -ServerRole dbCreator -Login Adam

    Listing 5-15

    Add a Login to a Server Role

    ```


    Newer versions of SQL Server also allow you to create your own, custom server
    roles, and this functionality is also supported through DbaTools, by using the
    New-DbaServerRole command; however, at the time of writing, this command has very
    limited functionality, where a Server Role can be created, but permissions cannot
    be assigned to it. Therefore, we will not explore it in detail.


    #### Renaming a Login


    Imagine you inherit responsibility for an application and find that connections
    are made through a Login called `AppLogin`. We have all been there. More than
    being a little frustrating, you have migrated the application to a SQL instance,
    which hosts the databases for multiple applications. Therefore, the name simply
    isn’t appropriate, as troubleshooting will become confusing and complicated.


    You can easily change the name of a Login by using the `Rename-DbaLogin` command.
    Listing [5-16](#395785_2_En_5_Chapter.xhtml#PC20) illustrates how to change the
    name of `AppLogin` to `SalesApp`, allowing you to differentiate between multiple
    application logins on the instance. The `-Login` parameter specifies the original
    Login name, with the `-NewLogin` parameter used to specify the desired name of
    the Login.


    Caution


    Remember that if you change the name of the application login in the SQL Server
    instance, it will also need to be updated in the application.


    ```

    $params = @{

    SqlInstance = "localhost"

    Login       = "AppLogin"

    NewLogin    = "SalesApp"

    }

    Rename-DbaLogin @params

    Listing 5-16

    Rename a Login

    ```


    #### Drop a Login


    A Login can be dropped by using the Remove-DBALogin command. To use this command,
    simply specify the name of the Login with the `–Login` parameter. This is demonstrated
    in Listing [5-17](#395785_2_En_5_Chapter.xhtml#PC21), where we drop the SalesApp
    Login.


    ```

    $params = @{

    SqlInstance = "localhost"

    Login       = "SalesApp"

    }

    Remove-DbaLogin @params

    Listing 5-17

    Drop a Login

    ```'
  trans: "### 创建登录名\n\n`New-DbaLogin` 命令可用于创建登录名。该命令最简单的调用方式是，通过 `–Login` 参数传递要创建的登录名，并通过\
    \ `-SqlInstance` 参数传递应创建登录名的 SQL Server 实例名称。如代码清单 5-11 所示。\n\n> 注意\n> 请将服务器\\\
    登录名更改为与你自己的服务器名称以及服务器上存在的本地用户相匹配。\n\n```\n$params = @{\n    SqlInstance     =\
    \ \"localhost\"\n    Login           = \"WIN-J38I01U06D7\\Adam\"\n    DefaultDatabase\
    \ = \"AdventureWorks2022\"\n}\nNew-DbaLogin @params\n```\n*代码清单 5-11 创建一个登录名*\n\
    \n此脚本为现有的 Windows 用户创建登录名。如果要创建 SQL 登录名，则需要额外以 `SecureString` 形式传递登录名的密码。创建 SQL\
    \ 登录名时，我们还可以选择强制执行域密码策略和过期策略，就像使用 `SqlServer` 模块一样。代码清单 5-12 展示了这一点。\n\n```\n\
    $Password = 'Pa$$w0rd'\n# 转换为 SecureString\n$SecurePassword = ConvertTo-SecureString\
    \ $Password -AsPlainText -Force\n$params = @{\n    SqlInstance      = \"localhost\"\
    \n    Login            = \"Adam\"\n    SecurePassword   = $SecurePassword\n  \
    \  DefaultDatabase  = \"AdventureWorks2022\"\n}\nNew-DbaLogin @params -PasswordPolicyEnforced\
    \ –PasswordExpirationEnabled\n```\n*代码清单 5-12 创建一个 SQL 登录名*\n\n创建 SQL 登录名时，我们还可以强制使用特定的\
    \ SID（安全标识符）。这在诸如配置管理（在第 9 章讨论）等场景中非常有用，因为我们希望确保登录始终存在，并在意外删除时自动重新创建。\n\nSQL Server\
    \ 使用 SID 将数据库用户映射到登录名；因此，即使 SQL 登录名具有相同的名称和密码，如果 SID 发生变化，数据库用户也会成为孤立用户。使用特定的\
    \ SID 可以消除此问题。\n\n> 提示\n> 对于为 Windows 帐户创建的登录名，不会出现此问题。这是因为 SID 存储在域中（对于本地 Windows\
    \ 帐户则存储在本地服务器中）。每次为 Windows 用户创建登录名时，即使在不同的实例上，它都将具有相同的 SID。\n\n你可以通过 `sys.syslogins`\
    \ 表来识别 SQL 登录名的 SID。代码清单 5-13 中的 T-SQL 查询演示了如何检索我们在代码清单 5-12 中创建的名为 `Adam` 的 SQL\
    \ 登录名的 SID。\n\n```\nSELECT\n    name\n    , sid\nFROM sys.syslogins\nWHERE name\
    \ = 'Adam'\n```\n*代码清单 5-13 检索登录名的 SID*\n\n代码清单 5-14 演示了如何创建具有特定 SID 的登录名。为此，我们使用\
    \ `New-DbaLogin` 命令的 `–Sid` 参数。\n\n> 注意\n> 登录名 `Adam` 已存在。因此，我们使用了 `–Force` 参数，这将导致登录名被删除并重新创建，从而避免失败。\n\
    \n```\n$Password = 'Pa$$w0rd'\n# 转换为 SecureString\n[securestring]$SecurePassword\
    \ = ConvertTo-SecureString $Password -AsPlainText -Force\n$params = @{\n    SqlInstance\
    \     = \"localhost\"\n    Login           = \"Adam\"\n    SecurePassword  = $SecurePassword\n\
    \    DefaultDatabase = \"AdventureWorks2022\"\n    SID             = \"0xC8105F39AEDBF947ACA0FA99544EBF33\"\
    \n}\nNew-DbaLogin @params –Force\n```\n*代码清单 5-14 使用特定 SID 创建登录名*\n\n### 管理登录名\n\
    \nDbaTools 提供了用于管理登录名的有用命令。在以下部分中，我们将探讨如何将登录名添加到服务器角色、重命名以及删除登录名。\n\n#### 将登录名添加到服务器角色\n\
    \n通过将登录名添加到服务器角色，可以为其授予实例范围内的权限。这可以使用 DbaTools 的 `Add-DbaServerRoleMember` 命令实现。例如，代码清单\
    \ 5-15 中的命令将 `Adam` 登录名添加到 `dbcreator` 服务器角色，允许他在实例上创建新数据库。\n\n```\nAdd-DbaServerRoleMember\
    \ -SqlInstance localhost -ServerRole dbCreator -Login Adam\n```\n*代码清单 5-15 将登录名添加到服务器角色*\n\
    \n较新版本的 SQL Server 还允许你创建自己的自定义服务器角色，此功能也通过 DbaTools 得到支持，即使用 `New-DbaServerRole`\
    \ 命令；但是，在撰写本文时，此命令功能非常有限，可以创建服务器角色，但无法为其分配权限。因此，我们将不对其进行详细探讨。\n\n#### 重命名登录名\n\
    \n假设你接手了一个应用程序的职责，并发现连接是通过一个名为 `AppLogin` 的登录名建立的。我们都经历过这种情况。这不仅仅令人有点沮丧，而且你已将应用程序迁移到一个托管多个应用程序数据库的\
    \ SQL 实例。因此，这个名称根本不合适，因为故障排除将变得混乱和复杂。\n\n你可以使用 `Rename-DbaLogin` 命令轻松更改登录名的名称。代码清单\
    \ 5-16 说明了如何将 `AppLogin` 的名称更改为 `SalesApp`，从而允许你区分实例上的多个应用程序登录名。`-Login` 参数指定原始登录名，`-NewLogin`\
    \ 参数用于指定登录名的所需名称。\n\n> 注意\n> 请记住，如果在 SQL Server 实例中更改了应用程序登录名的名称，还需要在应用程序中进行更新。\n\
    \n```\n$params = @{\n    SqlInstance = \"localhost\"\n    Login       = \"AppLogin\"\
    \n    NewLogin    = \"SalesApp\"\n}\nRename-DbaLogin @params\n```\n*代码清单 5-16\
    \ 重命名登录名*\n\n#### 删除登录名\n\n可以使用 `Remove-DBALogin` 命令删除登录名。要使用此命令，只需使用 `–Login`\
    \ 参数指定登录名即可。代码清单 5-17 演示了这一点，我们在其中删除了 `SalesApp` 登录名。\n\n```\n$params = @{\n \
    \   SqlInstance = \"localhost\"\n    Login       = \"SalesApp\"\n}\nRemove-DbaLogin\
    \ @params\n```\n*代码清单 5-17 删除登录名*"
- fmt: "### Creating Database Users\n\nDbaTools 可用于创建数据库用户和实例登录。`New-DbaDbUser` 命令可用于此目的。其最简单的调用方式中，你可以通过\
    \ `–Database` 参数指定数据库名称，并通过 `–Login` 参数指定用户应映射到的登录名，如代码清单 [5-18](#395785_2_En_5_Chapter.xhtml#PC22)\
    \ 所示，我们在 AdventureWorks2022 数据库中创建了一个关联到 `Adam` 登录名的数据库用户。\n\n```\n$params = @{\n\
    SqlInstance = \"localhost\"\nDatabase    = \"AdventureWorks2022\"\nLogin     \
    \  = \"Adam\"\n}\nNew-DbaDbUser @params\nListing 5-18\nCreate a Database User\n\
    ```\n\n你也可以选择性地使用 `–User` 参数来指定数据库用户的名称。你可以选择这样做作为一种代码风格选项，或者当你希望数据库用户的名称与登录名不同时，这也非常有用。例如，代码清单\
    \ [5-19](#395785_2_En_5_Chapter.xhtml#PC23) 中的脚本在 `AdventureWorks2022` 数据库中创建了一个名为\
    \ `PeteCarter` 的数据库用户，该用户映射到 `Pete` 登录名。\n\n```\n$params = @{\nSqlInstance = \"\
    localhost\"\nDatabase    = \"AdventureWorks2022\"\nLogin       = \"Pete\"\nUser\
    \        = \"PeteCarter\"\n}\nNew-DbaDbUser @params\nListing 5-19\nCreate a Database\
    \ User with a Specific Name\n```\n\n此外，该命令可用于复制用户，可以在同一实例的不同数据库之间进行。例如，代码清单 [5-20](#395785_2_En_5_Chapter.xhtml#PC24)\
    \ 中的命令将 AdventureWorks2022 数据库中的用户 Pete（基于 Windows 登录名 Pete）复制到同一实例的 WideWorldImporters\
    \ 数据库中。\n\n`Get-DbaDbUser` 命令用于获取 AdventureWorks2022 数据库中所有数据库用户的详细信息。然后通过管道传递给\
    \ `Where-Object`，对结果进行过滤，以便仅包含 Pete 数据库用户。这随后存储在一个名为 `$user` 的变量中，该变量由 `New-DbaDbUser`\
    \ 命令使用。用户将在我们指定的数据库中创建。\n\n> 注意\n> \n> 需要注意的是，虽然数据库用户被复制，但与该用户关联的权限不会随之复制。\n\n\
    ```\n$user = Get-DbaDbUser -SqlInstance localhost -Database AdventureWorks2022\
    \ | Where-Object name -eq \"Pete\"\n$params = @{\nLogin = $user.Login\nDatabase\
    \ = 'WideWorldImporters'\nSqlInstance = 'Localhost'\n}\nNew-DbaDbUser @params\n\
    Listing 5-20\nCopy a Database User\n```\n\n### Managing Database Users\n\nDbaTools\
    \ 提供了许多用于管理数据库用户的有用命令。在以下部分中，我们将探讨如何将用户添加到数据库角色。我们还将讨论如何删除用户以及如何修复已成为孤立状态的用户。\n\
    \n#### Add a User to a Database Role\n\n可以使用 `Add-DbaDbRoleMember` 命令将用户添加到数据库角色。你需要通过\
    \ `–Database` 参数传递数据库名称，通过 `–Role` 参数传递角色名称，并通过 `–User` 参数传递要添加到角色的用户名称。代码清单 [5-21](#395785_2_En_5_Chapter.xhtml#PC25)\
    \ 演示了这一点，其中 `PeteCarter` 登录名被添加到 `AdventureWorks2022` 数据库中的 `db_owner` 数据库角色。\n\
    \n```\n$params = @{\nSqlInstance = \"localhost\"\nDatabase    = \"AdventureWorks2022\"\
    \nUser        = \"PeteCarter\"\nRole        = \"db_owner\"\n}\nAdd-DbaDbRoleMember\
    \ @params\nListing 5-21\nAdd a User to a Role\n```\n\n> 提示\n> \n> 为避免被提示确认操作，你可以在命令后附加\
    \ `-Confirm:$false`。\n\n存在一个名为 `New-DbaDbRole` 的命令，可用于创建你自己的数据库角色。然而，与其服务器角色对应物类似，其功能仅限于创建角色。它不允许向该角色分配权限。因此，我们将不在这里介绍它，我建议使用\
    \ `Invoke-DbaQuery` 来创建服务器和数据库角色。\n\n#### Dropping Users and Removing Them from\
    \ Roles\n\n可以使用 `Remove-DbaDbRoleMember` 命令将用户从数据库角色中移除。代码清单 [5-22](#395785_2_En_5_Chapter.xhtml#PC26)\
    \ 演示了这一点，它将 `PeteCarter` 用户从 `AdventureWorks2022` 数据库的 `db_owner` 数据库角色中移除。\n\n\
    ```\n$params = @{\nSqlInstance = \"localhost\"\nDatabase    = \"AdventureWorks2022\"\
    \nUser           = \"PeteCarter\"\nRole           = \"db_owner\"\n}\nRemove-DbaDbRoleMember\
    \ @params\nListing 5-22\nRemove a User from a Database Role\n```\n\n如果需要完全删除一个数据库用户，可以通过使用\
    \ `Remove-DbaDbUser` 命令来实现。该命令需要传递数据库和用户，如代码清单 [5-23](#395785_2_En_5_Chapter.xhtml#PC27)\
    \ 所示。\n\n```\n$params = @{\nSqlInstance = \"localhost\"\nDatabase    = \"AdventureWorks2022\"\
    \nUser        = \"PeteCarter\"\n}\nRemove-DbaDbUser @params\nListing 5-23\nDrop\
    \ a Database User\n```\n\n### Managing Server Agent\n\n在第 [4](#395785_2_En_4_Chapter.xhtml)\
    \ 章中，我们讨论了 SqlServer 模块如何使你能够创建凭据并检索有关 SQL Server 代理作业的信息，但由于没有提供与 SQL Server\
    \ 代理对象交互或管理其的命令，因此其用处有限。因此，在以下部分中，我们将讨论如何端到端地管理 SQL Server 代理。具体来说，我们将探讨如何创建凭据、创建映射到该凭据的代理以及创建作业。我们还将讨论如何检索作业信息以及如何使用这些信息来排查问题。\n\
    \n> 注意\n> \n> 本章假设你熟悉 SQL Server 代理及其对象，例如作业、作业步骤和代理。对 SQL Server 代理的完整讨论和解释可以在\
    \ Apress 的书籍 *Pro SQL Server 2022 Administration* 中找到，链接为：link.springer.com/book/10.1007/978-1-4842-8864-1。\n\
    \n#### Create a Credential\n\n`New-DbaCredential` 提供了与本书第 [4](#395785_2_En_4_Chapter.xhtml)\
    \ 章讨论的 `SqlServer` 模块的 `New-SqlCredential` 命令等效的功能。我们将使用该命令创建一个名为 `SQLAgentCredential`\
    \ 的凭据，该凭据映射到 `Pete` Windows 用户，并将用作运行 SQL Server 代理作业的安全上下文。\n\n该命令需要通过 `–Name`\
    \ 参数传递凭据的名称。它还需要将要使用的标识（在本例中为 Windows 用户）传递给 `–Identity` 参数，并将密钥（在本例中为 Windows\
    \ 用户的密码）传递给 `–SecurePassword` 参数。\n\n代码清单 [5-24](#395785_2_En_5_Chapter.xhtml#PC28)\
    \ 中的脚本说明了如何使用 `New-DbaCredential` 命令来创建描述的凭据对象。\n\n```\n$SecurePassword = ConvertTo-SecureString\
    \ 'Pa$$w0rd' -AsPlainText -Force\n$params = @{\nSqlInstance     = \"localhost\"\
    \nName            = \"SqlAgentCredential\"\nIdentity        = \"Pete\"\nSecurePassword\
    \  = $SecurePassword\n}\nNew-DbaCredential @params\nListing 5-24\nCreate a Credential\n\
    ```"
  raw: '### Creating Database Users


    DbaTools can be used to create Database Users as well as Instance Logins. The
    `New-DbaDbUser` command can be used for this purpose. In its most simple invocation,
    you can specify the name of the database via the `–Database` parameter and the
    name of the Login to which the user should be mapped via the `–Login` parameter,
    as illustrated in Listing [5-18](#395785_2_En_5_Chapter.xhtml#PC22), where we
    create a Database User associated with the `Adam` login, within the AdventureWorks2022
    database.


    ```

    $params = @{

    SqlInstance = "localhost"

    Database    = "AdventureWorks2022"

    Login       = "Adam"

    }

    New-DbaDbUser @params

    Listing 5-18

    Create a Database User

    ```


    You can also, optionally, use the –User parameter to specify the name of the Database
    User. You may choose to do this as a code-styling option, or it is also useful
    if you want your Database User to have a different name from the Login. For example,
    the script in Listing [5-19](#395785_2_En_5_Chapter.xhtml#PC23) creates a Database
    User called `PeteCarter` within the `AdventureWorks2022` database, which is mapped
    to the `Pete` Login.


    ```

    $params = @{

    SqlInstance = "localhost"

    Database    = "AdventureWorks2022"

    Login       = "Pete"

    User        = "PeteCarter"

    }

    New-DbaDbUser @params

    Listing 5-19

    Create a Database User with a Specific Name

    ```


    Additionally, the command can be used to copy users, either between databases
    within the same instance. For example, the command in Listing [5-20](#395785_2_En_5_Chapter.xhtml#PC24)
    creates the user Pete (which is based on the Windows Login Pete) from the AdventureWorks2022
    database to the WideWorldImporters database in the same instance.


    The Get-DbaDbUser command is used to get the details of all Database Users in
    the AdventureWorks2022 database. This is then piped into a Where-Object, which
    filters the results, so that only the Pete Database User is included. This is
    then stored in a variable called $user, which is used by the New-DbaDbUser command.
    The user is created in the database we specify.


    Caution


    It is important to note that while the Database User is copied, the permissions
    associated with that User are not copied with it.


    ```

    $user = Get-DbaDbUser -SqlInstance localhost -Database AdventureWorks2022 | Where-Object
    name -eq "Pete"

    $params = @{

    Login = $user.Login

    Database = ''WideWorldImporters''

    SqlInstance = ''Localhost''

    }

    New-DbaDbUser @params

    Listing 5-20

    Copy a Database User

    ```


    ### Managing Database Users


    DbaTools provides many useful commands for managing Database Users. In the following
    sections, we will explore how to add Users to database roles. We will also discuss
    how to drop Users and how to repair Users that have become orphaned.


    #### Add a User to a Database Role


    A User can be added to a database role using the `Add-DbaDbRoleMember` command.
    You will pass this command the name of the database via the `–Database` parameter,
    the role via the `–Role` parameter, and the name of the User to add to the role
    via the `–User` parameter. This is demonstrated in Listing [5-21](#395785_2_En_5_Chapter.xhtml#PC25),
    where the `PeteCarter` Login is added to the `db_owner` database role, within
    the `AdventureWorks2022` database.


    ```

    $params = @{

    SqlInstance = "localhost"

    Database    = "AdventureWorks2022"

    User        = "PeteCarter"

    Role        = "db_owner"

    }

    Add-DbaDbRoleMember @params

    Listing 5-21

    Add a User to a Role

    ```


    Tip


    To avoid being prompted to confirm the action, you can append `-Confirm:$false`
    to the command.


    A command called `New-DbaDbRole` exists, which can be used to create your own
    database roles. Like its server role equivalent, however, the functionality is
    limited to creating a role. It doesn’t allow for permissions to be assigned to
    that role. Therefore, we will not cover it here, and I recommend using `Invoke-DbaQuery`
    for creating both server and database roles.


    #### Dropping Users and Removing Them from Roles


    A User can be removed from a database role using the `Remove-DbaDbRoleMember`
    command. This is demonstrated in Listing [5-22](#395785_2_En_5_Chapter.xhtml#PC26),
    which removes the `PeteCarter` user from the `db_owner` database role, in the
    `AdventureWorks2022` database.


    ```

    $params = @{

    SqlInstance = "localhost"

    Database    = "AdventureWorks2022"

    User           = "PeteCarter"

    Role           = "db_owner"

    }

    Remove-DbaDbRoleMember @params

    Listing 5-22

    Remove a User from a Database Role

    ```


    If you need to drop a Database User entirely, this can be achieved by using the
    `Remove-DbaDbUser` command. This command requires the Database and User to be
    passed, as illustrated in Listing [5-23](#395785_2_En_5_Chapter.xhtml#PC27).


    ```

    $params = @{

    SqlInstance = "localhost"

    Database    = "AdventureWorks2022"

    User        = "PeteCarter"

    }

    Remove-DbaDbUser @params

    Listing 5-23

    Drop a Database User

    ```


    ## Managing Server Agent


    In Chapter [4](#395785_2_En_4_Chapter.xhtml), we discussed how the SqlServer module
    enables you to create Credentials and also retrieve information about SQL Server
    Agent jobs, but how this is of limited use, as there are no commands provided
    to interact with or manage SQL Server Agent artifacts. Therefore, in the following
    sections, we will discuss how to manage SQL Server Agent end to end. Specifically,
    we will explore how to create a Credential, create a Proxy which maps to that
    Credential, and create a Job. We will also discuss how to retrieve Job information
    and how this information can be used to troubleshoot issues.


    Note


    This chapter assumes a familiarity with SQL Server Agent and its artifacts, such
    as Jobs, Job Steps, and Proxies. A full discussion and explanation of SQL Server
    Agent can be found in the Apress title *Pro SQL Server 2022 Administration*, which
    can be found here: link.springer.com/book/10.1007/978-1-4842-8864-1.


    ### Create a Credential


    `New-DbaCredential` provides equivalent functionality of the `SqlServer` module’s
    `New-SqlCredential` command, which is discussed in Chapter [4](#395785_2_En_4_Chapter.xhtml)
    of this book. We will use the command to create a credential called `SQLAgentCredential`,
    which is mapped to the `Pete` Windows user and will be used as a security context
    for running SQL Server Agent jobs.


    The command requires the name of the Credential to be passed via the `–Name` parameter.
    It also requires the identity that will be used (in this case, a Windows user)
    to be passed to the `–Identity` parameter and the secret (in this case, the password
    of the Windows user) to be passed to the `–SecurePassword` parameter.


    The script in Listing [5-24](#395785_2_En_5_Chapter.xhtml#PC28) illustrates how
    to use the `New-DbaCredential` command to create the described Credential object.


    ```

    $SecurePassword = ConvertTo-SecureString ''Pa$$w0rd'' -AsPlainText -Force

    $params = @{

    SqlInstance     = "localhost"

    Name            = "SqlAgentCredential"

    Identity        = "Pete"

    SecurePassword  = $SecurePassword

    }

    New-DbaCredential @params

    Listing 5-24

    Create a Credential

    ```'
