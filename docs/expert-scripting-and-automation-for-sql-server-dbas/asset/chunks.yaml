    *清单 10-4 插入样本数据*


    那么，让我们开始创建一个脚本，该脚本将对我们的用户数据库执行完整备份。该脚本首先生成一个维护任务列表，这些任务需要在每个服务器/实例上运行。它通过查询`MaintenanceSchedule`视图并过滤掉任何正在进行中的维护任务以及已禁用的任务来创建此列表。它还包括一个筛选器，以确保当前日期和时间大于或等于任务下次应运行的时间。下一个筛选器确保当前时间在作业可执行的开始时间和结束时间范围内。这是通过将当前日期/时间转换为`time`类型，并对照`StartTime`和`EndTime`列进行评估来实现的。最后一个筛选器移除了所有不等于`FullBackup`的任务。


    此查询的结果被传递到一个`foreach`循环中，该循环依次连接到每个 SQL Server 实例，并在该实例上生成用户数据库列表。然后更新`MaintenanceTasks`表，指示给定服务器\实例的任务正在进行中。


    数据库列表然后被传递到一个子`foreach`循环，在该循环中，每个数据库依次被备份。备份语句通过使用给定数据库的名称生成。


    一旦实例上的所有用户数据库都备份完毕，子`foreach`循环退出，并再次更新`MaintenanceTasks`表。这次是为了反映给定服务器的任务不再进行中。`LastExecTime`和`LastExecStatus`列也会被更新，以避免任务在需要之前再次运行。然后循环对每个需要进行完整备份的服务器重复，如清单
    [10-5](#395785_2_En_10_Chapter.xhtml#PC5) 所示。


    ```powershell

    $params = @{

    SqlInstance = "localhost"

    Database    = "Inventory"

    Query       = "

    SELECT

    ServerInstance

    ,Task

    ,LastExecDate

    ,NextExecDate

    ,InProgress

    ,TaskDisabled

    ,StartTime

    ,EndTime

    ,ServerID

    ,InstanceID

    FROM dbo.MaintenanceSchedule ms

    WHERE InProgress = 0

    AND TaskDisabled = 0

    AND GETDATE() >= NextExecDate

    AND CAST(GETDATE() AS TIME) BETWEEN StartTime AND EndTime

    AND Task = ''FullBackup''

    "

    }

    $ServerTasks = Invoke-DbaQuery @params

    foreach ($Server in $ServerTasks) {

    $params = @{

    SqlInstance = $Server.ServerInstance

    Database    = "Master"

    Query       = "

    SELECT name FROM sys.databases WHERE database_id > 4

    "

    }

    $databases = Invoke-DbaQuery @params

    $params = @{

    SqlInstance = "localhost"

    Database    = "Inventory"

    Query       = "

    UPDATE dbo.MaintenanceTasks

    SET InProgress = 1

    WHERE ServerID = ''" + $Server.ServerID + "'' AND InstanceID = ''" + $Server.InstanceID
    + "'' AND Task = ''FullBackup''

    "

    }

    Invoke-DbaQuery @params

    foreach ($database in $databases) {

    $params = @{

    SqlInstance = $Server.ServerInstance

    Database    = "Master"

    Query       = "

    BACKUP DATABASE " + $database.name + " TO DISK = ''C:\Backups\" + $database.name
    + ".bak''

    "

    }

    Invoke-DbaQuery @params

    }

    $params = @{

    SqlInstance = "localhost"

    Database    = "Inventory"

    Query       = "

    UPDATE dbo.MaintenanceTasks

    SET InProgress = 0, LastExecDate = GETDATE(), LastExecStatus = ''Success''

    WHERE ServerID = ''" + $Server.ServerID + "'' AND InstanceID = ''" + $Server.InstanceID
    + "'' AND Task = ''FullBackup'';

    "

    }

    Invoke-DbaQuery @params

    }

    ```

    *清单 10-5 完整备份脚本*


    > **提示**

    >

    > 如果你正在跟随操作，请将此脚本保存为`c:\scripts\fullbackup.ps1`。稍后，我们将从 SQL Agent 作业调用此脚本。


    ### 删除旧备份脚本


    我们需要的下一个脚本如清单 [10-6](#395785_2_En_10_Chapter.xhtml#PC6) 所示。该脚本将删除旧的备份文件。你会注意到创建了一个`$limit`变量，它被填充为当前日期/时间减去三天。`$path`变量构建到共享的路径，使用`split`函数删除实例名称。然后使用`Get-ChildItem`
    cmdlet 来构建要删除的文件列表。然后，此列表通过管道传递给`Remove-Item` cmdlet。


    在这个例子中，我们将假设应删除超过三天的备份。这是基于有一个企业备份工具将`.bak`文件卸载到磁带的假设。如果没有，你可能希望保留备份更长时间。


    该脚本使用了与我们之前创建的`FullBackup`脚本相同的逻辑。唯一的区别是正在调度的任务和调用的脚本是`RemoveOldBackups`。


    > **提示**

    >

    > 该脚本假设存储备份文件的卷是共享的。如果不是这种情况，并且假设你配置了 PowerShell Remoting，你可以使用`Invoke-Command`
    cmdlet 在远程服务器上调用该脚本。'
