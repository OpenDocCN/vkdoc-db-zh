  raw: '### Implementing Operational Resources


    The first configuration that we want to implement to reduce our operational overhead
    will ensure that a Login exists for the `DBATeam` Windows group and has administrative
    permissions on the instance. This will require two resources.


    The first resource will ensure that the `DBATeam` login exists, using the `SqlLogin`
    resource, which we have already discussed in this chapter. The second resource
    will be a `SqlRole` resource, which ensures that the `DBATeam` login is added
    to the `sysadmin` fixed server role. In the declaration of the `SqlRole` resource,
    we need to pass `sysadmin` to the `ServerRoleName` parameter. The `Members` parameter
    accepts a comma-separated list of security principals that should be added to
    the role. Listing [9-6](#395785_2_En_9_Chapter.xhtml#PC6) demonstrates how to
    create these two resources.


    Note


    The script assumes that the `DBATeam` Windows group already exists. If you are
    following along with the examples in this chapter, then you should either create
    the `DBATeam` group in Windows or use a Windows group that already exists.


    ```

    SqlLogin ''DBATeamLogin'' {

    Ensure           = ''Present''

    Name             = ''MyDomain\DBATeam''

    LoginType        = ''WindowsGroup''

    ServerName       = ''localhost''

    InstanceName     = $SqlInstanceName

    }

    SqlRole ''DBATeamSysadmin'' {

    Ensure           = ''Present''

    ServerRoleName   = ''sysadmin''

    MembersToInclude = ''MyDomain\DBATeam''

    ServerName       = ''localhost''

    InstanceName     = $SqlInstanceName

    }

    Listing 9-6

    DBATeamLogin and DBATeamSysadmin Resources

    ```


    Caution


    This example uses MembersToInclude. If we were to use the Members property instead,
    then it would overwrite existing group membership, rather than append additional
    users.


    The final resource that we will configure will ensure that a linked server exists,
    which will allow us to run queries against our central management server. The
    trouble is that a resource does not exist in the `SqlServerDsc` module, which
    allows us to manage linked servers.


    Therefore, we will use an advanced resource, known as the `SqlScriptQuery` resource.
    This resource allows us to define our own `Get`, `Test`, and `Set` queries. So,
    before looking at the PowerShell script to create the resource, let’s first look
    at each of the T-SQL queries that will be run by the resource.


    The first of these scripts is the Get script. Listing [9-7](#395785_2_En_9_Chapter.xhtml#PC7)
    demonstrates how to write a `Get` query for our use case. The query reads the
    `sys.sysservers` catalog view and returns the svrname where the svrname is `CENTRALMGMT`.
    It then converts the results of this query to JSON and returns it to DSC.


    Note


    The scripts in this section require a default SQL Server instance to be hosted
    on a server named `CENTRALMGMT`. You should change these scripts to point to a
    SQL Server instance in your environment.


    ```

    SELECT srvname

    FROM sys.sysservers

    WHERE srvname = ''CENTRALMGMT''

    FOR JSON AUTO

    Listing 9-7

    Get Query

    ```


    The test query can be found in Listing [9-8](#395785_2_En_9_Chapter.xhtml#PC8).
    This query checks to see if a server with the name `CENTRALMGMT` exists in the
    `sys.sysservers` catalog view. If the server exists, the script succeeds and returns
    a message stating the linked server was found. If it fails, it returns an error
    message.


    ```

    IF (SELECT COUNT(srvname) FROM sys.sysservers WHERE srvname = ''CENTRALMGMT'')
    = 0

    BEGIN

    RAISERROR (''Did not find the CENTRALMGMT linked sever'', 16, 1)

    END

    ELSE

    BEGIN

    PRINT ''Found the CENTRALMGMT linked server''

    END

    Listing 9-8

    Test Query

    ```


    Finally, the Set query uses the `sp_addlinkedserver` system stored procedure to
    create a linked server and then the `sp_addlinkedserverlogin` system stored procedure
    to configure pass-through authentication. This means that queries made against
    the linked server will be made using the security context of the security principal
    that ran the query. This script can be seen in Listing [9-9](#395785_2_En_9_Chapter.xhtml#PC9).


    ```

    USE master

    GO

    EXEC master.dbo.sp_addlinkedserver

    @server = ''CENTRALMGMT'',

    @srvproduct=''SQL Server''

    GO

    EXEC master.dbo.sp_addlinkedsrvlogin

    @rmtsrvname = ''CENTRALMGMT'',

    @locallogin = NULL , @useself = ''True''

    GO

    Listing 9-9

    Set Query

    ```


    The `SqlScriptQuery` resource that will run our custom scripts is shown in Listing
    [9-10](#395785_2_En_9_Chapter.xhtml#PC10). As well as the `Get`, `Set`, and `Test`
    scripts, we also pass a parameter called `QueryTimeout`, which specifies the maximum
    duration any of the three scripts can run, before they fail with a timeout.


    Tip


    You will notice that the string terminators (herestrings) for each of the custom
    queries are not indented. This is because string terminators must always be placed
    at the beginning of the line, when working with the `SqlserverDsc` resources.


    ```

    SqlScriptQuery ''CentralMgmtLinkedServer'' {

    Id                   = ''CentralMgmtLinkedServer''

    ServerName           = ''localhost''

    InstanceName         = $SqlInstanceName

    GetQuery             = @''

    SELECT srvname

    FROM sys.sysservers

    WHERE srvname = ''CENTRALMGMT''

    FOR JSON AUTO

    ''@

    TestQuery            = @''

    IF (SELECT COUNT(srvname) FROM sys.sysservers WHERE srvname = ''CENTRALMGMT'')
    = 0

    BEGIN

    RAISERROR (''Did not find the CENTRALMGMT linked sever'', 16, 1)

    END

    ELSE

    BEGIN

    PRINT ''Found the CENTRALMGMT linked server''

    END

    ''@

    SetQuery             = @''

    USE master

    GO

    EXEC master.dbo.sp_addlinkedserver

    @server = ''CENTRALMGMT'',

    @srvproduct=''SQL Server''

    GO

    EXEC master.dbo.sp_addlinkedsrvlogin

    @rmtsrvname = ''CENTRALMGMT'',

    @locallogin = NULL , @useself = ''True''

    GO

    ''@

    QueryTimeout         = 30

    }

    Listing 9-10

    CentralMgmtLinkedServer Resource

    ```


