    # 1. T-SQL Techniques for DBAs


    In this chapter, we will discuss some fundamental techniques in T-SQL which will
    become useful in later chapters, when we discuss how to use PowerShell to automate
    your SQL Server enterprise. Specifically, we will discuss how to use the `APPLY`
    operator to call a function against rows within a result set. It is important
    to understand this technique in Chapter [8](#395785_2_En_8_Chapter.xhtml), when
    we begin to look at metadata-driven automation. We will then look at how XML (eXtensible
    Markup Language) and how the native XML data type can be harnessed by SQL Server
    DBAs. It is critical for DBAs to have a handle on the use of XML, due to the volume
    of information, such as Query Plans, that is stored in this format. Understanding
    basic XML in SQL Server is also key to understanding how to loop efficiently.
    To this end, we will explore how to efficiently iterate through multiple objects,
    using an XML technique. We will compare its efficiency to that of a traditional
    cursor. This is important, because although looping in PowerShell is always more
    efficient, there are times where the optimal approach to automation will involve
    multiple layers of looping, through the PowerShell and T-SQL layers. This will
    become apparent in Chapter [8](#395785_2_En_8_Chapter.xhtml), but the technique
    is used in multiple chapters throughout the book.


    ## Using the APPLY Operator


    The T-SQL `APPLY` operator will be used in Chapter [8](#395785_2_En_8_Chapter.xhtml),
    when we explore metadata-driven automation. It allows you to call a table-valued
    function against every row in a result set returned by a query. There are two
    variations of the `APPLY` operator: `CROSS APPLY` and `OUTER APPLY`. When `CROSS
    APPLY` is used, the query will only return rows in which a result set has been
    produced by the table-valued function. When `OUTER APPLY` is used, no filter will
    be applied to the result set, and where no result is returned by the table-valued
    function, `NULL` will be returned, in each column of the table-valued function.


    The `APPLY` operator can be very useful to DBAs when they are retrieving metadata
    from dynamic management views (`DMV`) and functions (`DMF`). For example, the
    query in Listing [1-1](#395785_2_En_1_Chapter.xhtml#PC1) will return a list of
    all sessions, detailing the session ID, the login time, the login name, and whether
    the process is a user or system process. It will then use `OUTER APPLY` to run
    the `sys.dm_exec_sql_text` dynamic management function against each row. This
    function returns a column called `text`, which is the SQL statement associated
    with the SQL handle in the `sql_handle` column in the `sys.dm_exec_requests` dynamic
    management view.


    Note


    The `text` column that is referenced in the `SELECT` list is the column returned
    by the `sys.dm_exec_sql_text` `DMF`.


    ```sql

    SELECT

    s.session_id

    , s.login_time

    , s.login_name

    , s.is_user_process

    , dest.[text]

    FROM sys.dm_exec_sessions s

    INNER JOIN sys.dm_exec_requests r

    ON r.session_id = s.session_id

    OUTER APPLY sys.dm_exec_sql_text(sql_handle) dest;

    ```


    Listing 1-1 Using `OUTER APPLY`


    You will notice that this query returns many rows in this result set with `NULL`
    values for the `text` column. This is because they are system processes, running
    background tasks for SQL Server, such as the Lazy Writer and the Ghost Cleanup
    Task.


    Tip


    We can be sure that they are system processes because of the `is_user_process`
    flag. We will not rely on the session ID being less than 50. The assertion that
    all system processes have a session ID of less than 50 is widely believed, but
    also a fallacy, because there can potentially be more than 50 system sessions
    running in parallel.


    If we use the `CROSS APPLY` operator for the same query, as shown in Listing [1-2](#395785_2_En_1_Chapter.xhtml#PC2),
    the only rows that will be returned will be rows where the result of applying
    the table-valued function is not `NULL`.


    ```sql

    SELECT

    s.session_id

    , s.login_time

    , s.login_name

    , [text]

    , s.is_user_process

    FROM sys.dm_exec_sessions s

    INNER JOIN sys.dm_exec_requests r

    ON r.session_id = s.session_id

    CROSS APPLY sys.dm_exec_sql_text(sql_handle) ;

    ```


    Listing 1-2 Using `CROSS APPLY`


    ## XML for DBAs


    XML (eXtensible Markup Language) is used extensively as a data format within SQL
    Server, for storing data that is critical for the successful DBA, such as Extended
    Events data, query plan data, and collector items, used by `MDW` (Management Data
    Warehouse). Therefore, it is important that DBAs have a grasp of the XML format
    and how to work with it, within SQL Server. Understanding how to use XML in SQL
    Server is also important to understanding how to loop efficiently. This will be
    discussed in the “Efficient Looping” section of this chapter. The following sections
    will provide an overview of the XML data type, how to generate XML documents,
    and how to query XML data.'
