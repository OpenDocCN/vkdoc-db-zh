  trans: '

    ### 管道与筛选


    如果你有 T-SQL 背景而非编程背景，管道（piping）的概念对你来说可能是全新的。在 PowerShell 中，管道是指将一个命令的结果传递给另一个命令的过程。管道是
    PowerShell 的一个核心概念，也是其如此强大的原因之一。


    管道的一个简单示例如清单 2-7 所示。此脚本中的第一行从操作系统获取正在运行的进程列表。然后，它将此命令的结果（作为一个或多个对象，而不仅仅是纯文本）传递到
    `Where-Object` cmdlet。`Where-Object` 遍历所有接收到的对象，并应用提供的筛选脚本（在花括号中）。该筛选脚本使用特殊的自动
    PowerShell 变量 `$_`（它表示当前正在处理的对象），将每个对象的 `ProcessName` 属性与字符串“*p*w*sh*”进行比较（星号用作通配符）。不匹配的对象将从结果中移除。


    ```

    # 返回正在运行的进程列表，然后按进程名称进行筛选

    # 选择的筛选字符串将匹配 PowerShell 7 (pwsh) 和 5 (powershell) 的可执行文件

    $process = Get-Process | Where-Object { $_.ProcessName -like "*p*w*sh*" }

    # 将筛选后的进程列表打印到控制台

    $process

    清单 2-7

    基本管道操作

    ```


    如果没有管道能力，代码会长得多且更难管理。在这种情况下，我们需要一个单独的语句来遍历读入 `$process` 变量的每个进程。对于像这样非常简单的例子，这可能听起来没什么大不了的，但当我们有非常庞大、复杂的脚本时，由此产生的额外开销就会成为一种负担。


    ### 流程控制


    如果你的背景纯粹是 SQL Server，那么你可能对循环的想法感到反感，因为在 SQL Server 中循环是一种非常糟糕的做法，这是由于该语言基于集合的特性。如果你有任何脚本编写或编程经验，你就会知道循环在遍历对象、执行指定次数的操作（或一组操作）或重复执行操作（或一组操作）直到满足条件方面是多么有用。PowerShell
    通过 `for` 语句、`foreach` 语句和 `while` 语句提供循环能力。


    > **注意**

    > 当然，关于循环多么有用的论断并不适用于 T-SQL，因为基于集合的操作总是比循环高效得多。更多详情请参考第 1 章。


    不过，在我们深入探讨如何使用循环之前，我们需要确保熟悉 PowerShell 支持的运算符，因为我们将需要它们来控制循环。如果你熟悉 T-SQL，那么你可能已经了解运算符的概念，并且知道诸如
    `=`（等于）、`>`（大于）和 `<=`（小于或等于）之类的比较运算符。


    PowerShell 中可用的比较运算符列于表 2-3 中，但与 T-SQL 的一个重要区别是，在 PowerShell 中 `=` 仅用于赋值，从不用于比较。PowerShell
    中的相等比较运算符是 `-eq`。记住这一点非常重要，以避免代码中一些难以发现的、讨厌的错误。


    **表 2-3: 比较运算符**


    | 运算符 | 描述 |

    | --- | --- |

    | `-contains` | 属性值中的任何项等于指定值。当你必须确保数组中存在特定值时，这很有用 |

    | `-eq` | 属性的值等于指定值 |

    | `-ge` | 属性的值大于或等于指定值 |

    | `-gt` | 属性的值大于指定值 |

    | `-in` | 属性的值等于指定值数组中的任何一个元素。值数组可以指定为逗号分隔的列表 |

    | `-is` | 属性的值的数据类型是指定的数据类型。指定的数据类型必须用方括号括起来 |

    | `-isnot` | 属性的值的数据类型与指定的数据类型不同。指定的数据类型必须用方括号括起来 |

    | `-le` | 属性的值小于或等于指定值 |

    | `-lt` | 属性的值小于指定值 |

    | `-like` | 属性的值包含指定值，遵循通配符匹配 |

    | `-match` | 属性的值与提供的正则表达式模式匹配 |

    | `-ne` | 属性的值不等于指定值 |

    | `-notcontains` | 属性值中的任何项都不等于指定值。当你必须确保数组中不存在特定值时，这很有用 |

    | `-notin` | 属性的值不等于指定值数组中的任何一个元素。值数组可以指定为逗号分隔的列表 |

    | `-notlike` | 属性的值不包含指定值，遵循通配符匹配 |

    | `-notmatch` | 属性的值不与提供的正则表达式模式匹配 |

    | `-ccontains` | 与 `-Contains` 相同，但区分大小写 |

    | `-ceq` | 与 `-EQ` 相同，但区分大小写 |

    | `-cge` | 与 `-GE` 相同，但区分大小写 |

    | `-cgt` | 与 `-GT` 相同，但区分大小写 |

    | `-cin` | 与 `-In` 相同，但区分大小写 |

    | `-cle` | 与 `-LE` 相同，但区分大小写 |

    | `-clt` | 与 `-LT` 相同，但区分大小写 |

    | `-clike` | 与 `-Like` 相同，但区分大小写 |

    | `-cmatch` | 与 `-Match` 相同，但区分大小写 |

    | `-cne` | 与 `-NE` 相同，但区分大小写 |

    | `-cnotcontains` | 与 `-NotContains` 相同，但区分大小写 |

    | `-cnotin` | 与 `-NotIn` 相同，但区分大小写 |

    | `-cnotlike` | 与 `-NotLike` 相同，但区分大小写 |

    | `-cnotmatch` | 与 `-NotMatch` 相同，但区分大小写 |


    `for` 循环可用于将一组操作重复指定次数，或遍历数组或集合的子集。`foreach` 循环在你必须遍历数组或集合中的每个项时非常有用，而 `while`
    循环用于重复一组操作，直到满足某个条件。


    清单 2-8 演示了如何使用 `for` 循环来实现错误处理。该脚本将尝试每 30 秒读取一次文件内容，共尝试三次。for 循环的行为在括号内定义。括号内有三个元素。第一个初始化将要控制循环的变量。在我们的示例中，我们创建一个名为
    `$i` 的变量，初始值为 1。第二个定义指定了在我们的循环终止之前必须满足的条件。我们指定当 `$i` 小于或等于 3 时继续循环。最后一个定义控制循环变量的增量。`$i++`
    是 `$i = $i + 1` 的简写。因此，在我们的示例中，`$i` 的值将在每次循环迭代时增加一。

    '
- fmt: 'The code to be repeated in each iteration of the loop is enclosed within braces.
    Here, we use a `try...catch` block to attempt to read the file. If the operation
    succeeds, we will write the success to the console and then exit the loop via
    the `break` command. If the operation fails, execution moves to the `catch` block.
    Here, we write the failure to the console and then pause the execution of the
    script for 30 seconds.


    **Tip**

    Although failing to read the file will always generate an error, it will not usually
    cause the script to terminate. As we need the script to terminate for the flow
    to move to the `catch` block, we use the `-ErrorAction` parameter to force the
    script to terminate.


    ```

    for ($i=1; $i -le 3; $i++) {

    try {

    Get-Content c:\ExpertScripting.txt -ErrorAction Stop

    "Attempt " + $i + " Succeeded"

    break

    } catch {

    "Attempt " + $i + " Failed"

    Start-Sleep -s 30

    }

    }

    Listing 2-8

    Using a for Loop

    ```


    The script in Listing 2-9 demonstrates how a `while` loop can be used to refine
    the code in Listing 2-8, so that the script will continue to loop (potentially
    infinitely) until the read of the file exists. The `while` loop continues as long
    as the condition defined within parentheses evaluates to the Boolean value of
    `$true`. In our example, since the condition is just `$true`, the `while` loop
    will continue infinitely. Once the contents of the file have been read successfully,
    however, the `break` command will exit the loop. This technique is particularly
    useful when you are scripting a middleware component, which requires a file to
    be written before continuing.


    **Note**

    If you are following along with the demonstrations, create a file named `ExpertScripting.txt`
    in the root of `c:\` while the script is running.


    ```

    $i = 0

    while ($true) {

    try {

    $i++

    Get-Content c:\ExpertScripting.txt -ErrorAction Stop

    "Attempt " + $i + " Succeeded"

    break

    } catch {

    "Attempt " + $i + " Failed"

    Start-Sleep -s 30

    }

    }

    Listing 2-9

    Using a while Loop

    ```


    The script in Listing 2-10 demonstrates how a `foreach` loop can be used to ensure
    that all SQL Server services are running and start them if they are not.


    ```

    # Populate a new variable with the details all SQL Server services

    $services = Get-Service | Where-Object { $_.Name -like "*SQL*" -and $_.Status
    -eq "Stopped" }

    # Start each service

    foreach ($name in $services) {

    Start-Service $name

    }

    Listing 2-10

    Using a foreach Loop

    ```


    The final control of flow concept that we will discuss is `IF`...`ELSE`. An `IF`...`ELSE`
    block allows you to branch your code, based on a condition. You can also nest
    `IF`...`ELSE` blocks to implement complex logic (although you should consider
    code maintenance when doing so). It is only possible to have one `IF` block. To
    implement multiple chained `IF` conditions, you can add multiple `ELSEIF` blocks.
    The `ELSE` block always comes last (if you choose to use one) and is a catchall
    for any occurrences in which none of your `IF` and `ELSEIF` conditions is met.
    The conditions of `IF` and `ELSEIF` blocks are enclosed within parentheses. The
    code block to execute is enclosed within braces. The script in Listing 2-11 demonstrates
    how to implement an `IF`...`ELSE` block to check the status of a service.


    ```

    $Service = "SQLBrowser"

    $ServiceDetails = Get-Service | Where-Object {$_.Name -eq $Service}

    if ($ServiceDetails.Status -eq "Running") {

    $Service + " is  working"

    } elseif ($ServiceDetails.Status -eq "Stopped") {

    $Service + " is not working. Please check the Event Log"

    } elseif (-not $serviceDetails) {

    $Service + " is not installed"

    } else {

    $Service + " is changing state"

    }

    Listing 2-11

    Using IF, ELSEIF, and ELSE

    ```


    ## Modules


    To make PowerShell fully extensible and able to manage virtually any application,
    it has been written using a modular approach, with modules having to be imported
    to allow users access to the cmdlets that they contain. Some of the core modules
    are imported automatically when a command is executed. For example, using the
    `Get-ExecutionPolicy` command causes the `Microsoft.PowerShell.Security` module
    to be imported.


    A massive number of modules are available, providing the ability to use PowerShell
    to manage almost any platform or application. Some of these modules are provided
    by organizations. For example, AWS provides the `AWSPowerShell` module for managing
    its public cloud platform, and Microsoft provides the `Az` module for managing
    Azure.


    There is also a vast number of community modules available, however, for example,
    the `posh-git` module which provides Git status summary and tab completion for
    Git command and the `powershell-yaml` module which provides YAML serialization
    and deserialization in PowerShell.


    When modules are published on PowerShell Gallery, they can be downloaded and installed
    using the `Install-Module` command, as demonstrated in Listing 2-12, which installs
    the `Indented.IniFile` module, which was written by the excellent Indented Automation
    (which I strongly recommend you check out for all things PowerShell) and provides
    functionality for managing INI file content in PowerShell.


    ```

    Install-Module Indented.IniFile

    Listing 2-12

    Install a PowerShell Module

    ```'
