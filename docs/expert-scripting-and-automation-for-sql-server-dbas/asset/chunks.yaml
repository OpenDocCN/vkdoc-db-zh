- fmt: '## Designing Centralized Maintenance


    There are multiple ways in which you can build a centralized maintenance system
    for your SQL Server Enterprise. One of the options is to use `SQL Server Agent`
    Master and Target servers, which allow target servers to pull jobs from a centralized
    master.


    This is an approach that I previously advocated, but in recent years, however,
    the limitations and lack of flexibility in this approach have led me to recommend
    creating a custom maintenance scheduling system, which can easily be integrated
    with your automated build. Assuming that you use a configuration management approach,
    you can also easily perform activities, such as changing maintenance schedules,
    just by updating parameters in your build. Therefore, this chapter will focus
    on using the custom maintenance system approach.


    As depicted in Figure 10-1, for this approach, we will use a `SQL Server` instance
    as a centralized management system. The instance will host our inventory database,
    which will be enhanced to contain a set of tables and views, which will define
    which maintenance routines will be executed on which servers and when. The instance
    will also host a `SQL Server Agent` job, which runs continuously and calls off
    maintenance scripts against servers, based on their defined schedules. The `PowerShell`
    scripts that are called off by the job will also be stored on our centralized
    server. This gives the benefit of only having to update a single job, or a set
    of maintenance scripts on a single server, instead of potentially hundreds of
    servers across the enterprise. At the same time, we maintain the flexibility of
    running maintenance job at a different time on each server.


    ![](images/395785_2_En_10_Chapter/395785_2_En_10_Fig1_HTML.jpg)


    Flow chart illustrating a maintenance process. The "Central Maintenance Instance"
    contains an "Inventory Database" and a "SQL Agent Maintenance Job." Arrows connect
    the database and maintenance job, indicating data flow. A separate arrow links
    "Maintenance Scripts" to the maintenance job. The process outputs to "Managed
    Servers," depicted as a stack of server icons. Key elements include inventory
    management, SQL maintenance, and server management.


    ### Figure 10-1: Target maintenance routine architecture


    > Tip

    >

    > The ability to run jobs at different times across different servers is absolutely
    key. If we consider backups, as a classic example, many servers will require backups
    to happen at specific times to avoid their maintenance or `ETL` windows. But even
    without considering windows of opportunity, in environments, such as a private
    cloud, where all `SQL` Instances run on shared resources, it would be undesirable
    to run all backup jobs at the same time, due to the risk of resource contention
    on the underlying hardware.


    We now need to consider the table structure that we will need to add to the inventory
    database to support the solution. At a high level, this is depicted in Figure
    10-2. Here, the `MaintenanceWindows` table will key off of the `Server ID` from
    the `Server` and `Instance` tables and will define the windows in which maintenance
    routines can run for each server across the enterprise.


    ![](images/395785_2_En_10_Chapter/395785_2_En_10_Fig2_HTML.jpg)


    Flow chart depicting a database schema. At the top is "dbo.MaintenanceWindows
    (View)" connected to two tables: "dbo.MaintenanceWindows (Table)" and "dbo.MaintenanceTasks
    (Table)." Both tables are linked to "dbo.Instance (Table)" and "dbo.Server (Table)"
    respectively, with cardinality indicators showing many-to-one relationships.


    ### Figure 10-2: High-level design of tables and views


    The `MaintenanceTasks` table will define which maintenance tasks should run against
    each instance, giving us the ability to disable specific maintenance jobs from
    specific servers, as well as providing the interval between the executions of
    each maintenance task. Again, this table will key from the `Server` and `Instance`
    tables.


    Finally, the `MaintenanceSchedule` view is built across the two tables mentioned
    above and calculates the next time that a maintenance task should run against
    each server. This view will be the entry point for the `SQL Server Agent` job
    that will call off our maintenance scripts.


    So now let’s take a look at the configuration data we should store in each of
    these objects. The suggested column layout of the `MaintenanceWindows` table is
    detailed in Table 10-1.


    > Tip

    >

    > The example column layouts in this chapter are meant to provide a base template
    for creating a scheduling engine; however, you should consider adapting them to
    the unique needs of your organization.


    We would like to make our scheduling options as flexible and as easy as possible.
    Therefore, we will want to accommodate for a `DBA` to use set schedules of `Daily`
    or `Weekly` or to express the schedule in minutes. Our `MaintenanceTasks` table,
    which will be at the granularity of `Server`, `Instance`, and `Task` will allow
    for this, by containing a schedule column, where we can add values such as `Daily`
    and `Weekly`. It will then have a computed column, which translates this value
    to a number of minutes. This will allow our code to easily determine how often
    the task should run against a given server and instance.


    ### Table 10-1: `MaintenanceWindows` Columns


    | Column | Description |

    | --- | --- |

    | `MaintenanceWindowID` | Artificial Primary Key of the table |

    | `ServerID` | Foreign Key from `Server` table. A unique constraint should be
    added across the `ServerID` and `InstanceID` columns |

    | `InstanceID` | Foreign Key from `Instance` table. A unique constraint should
    be added across the `ServerID` and `InstanceID` columns |

    | `DayOfWeekNumber` | A number from 1 to 7 which designates the day of the week.
    Allows for an instance to have a different schedule on different days |

    | `StartTime` | The start time of the maintenance window |

    | `EndTime` | The end time of the maintenance window |


    We would like to make our scheduling options as flexible and as easy as possible.
    Therefore, we will want to accommodate for a `DBA` to use set schedules of `Daily`
    or `Weekly` or to express the schedule in minutes. Our `MaintenanceTasks` table,
    which will be at the granularity of `Server`, `Instance`, and `Task` will allow
    for this, by containing a


    The suggested column layout for the `MaintenanceTasks` table is defined in Table
    10-2.


    ### Table 10-2: `MaintenanceTasks` Columns


    | Column | Description |

    | --- | --- |

    | `MaintenanceTaskID` | Artificial Primary Key of the table |

    | `ServerID` | Foreign Key from `Server` table. A unique constraint should be
    added across the `ServerID` and `InstanceID` columns |

    | `InstanceID` | Foreign Key from `Instance` table. A unique constraint should
    be added across the `ServerID` and `InstanceID` columns |

    | `Task` | The name of the maintenance task |

    | `LastExecDate` | The date and time that the task was last executed |

    | `Schedule` | The schedule. In our example, this can be `Daily`, `Weekly`, or
    the number of minutes between task executions |

    | `ScheduleMinutes` | An integer value that expresses the schedule in minutes
    |

    | `InProgress` | A flag that specifies if the task is in progress |

    | `LastExecStatus` | The status of the task, the last time it was executed on
    the instance |

    | `TaskDisabled` | A flag that specifies if the task is disabled for the specific
    instance |


    The `MaintenanceSchedules` view will be the entry point for the code, so it should
    contain all columns that will be useful to minimize potential code duplication
    within our maintenance tasks. The suggested column layout for the view is defined
    in Table 10-3.


    ### Table 10-3: `MaintenanceSchedules` Columns'
