    named `poshscripting`.


    ```

    "localhost", "localhost\poshscripting" | Invoke-DbaQuery -Query "SELECT name FROM
    sys.databases"

    Listing 5-8

    Running a Query Against Multiple Servers

    ```


    Looking at the results below, you will notice that the obvious issue is that it’s
