    \ or a Microsoft Operations Framework (MOF) based approach. This chapter will\
    \ focus on using out-of-the-box resources, but a guide to creating custom DSC\
    \ resources can be found at the following location: learn.microsoft.com/en-us/powershell/dsc/resources/authoringresourceclass?view=dsc-1.1.\n\
