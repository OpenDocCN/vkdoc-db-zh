    \n```powershell\n$Params = @{\nServerInstance  = \"localhost\"\nQuery        \
    \   = \"SELECT name FROM sys.databases\"\nUsername        = \"Pete\"\nPassword\
    \        = 'Pa$$w0rd'\n}\nInvoke-Sqlcmd @Params\n```\n清单 4-12\n使用用户名和密码参数\n\n\
    这是一个简单的方法，但不是很安全，因为用户名和密码将以明文形式发送到 SQL Server 实例。如果命令是从本地服务器运行的，这可能没问题，但明文凭据绝不应通过网络发送。因此，另一种方法是使用\
    \ `Credential` 参数，如清单 4-13 所示。\n\n```powershell\n$UserName = 'Pete'\n$SecurePassword\
    \ = ConvertTo-SecureString 'Pa$$w0rd' -AsPlainText -Force\n$Credential = [PSCredential]::new($UserName,\
    \ $SecurePassword)\n$Params = @{\nServerInstance  = \"localhost\"\nQuery     \
    \      = \"SELECT name FROM sys.databases\"\nCredential      = $Credential\n}\n\
    Invoke-Sqlcmd @Params\n```\n清单 4-13\n使用凭据参数进行身份验证\n\n该脚本首先创建 `$UserName` 和 `$Password`\
    \ 变量。密码被创建为安全字符串。然后，这些变量用于创建一个 `PSCredential` 对象，该对象被传递给 `Invoke-SqlCmd` 的 `Credential`\
    \ 参数。\n\n## 管理安全对象\n\n`sqlserver` 模块提供的不仅仅是 `Invoke-SqlCmd`，它还包含用于执行常见管理任务的定制\
    \ cmdlet。这包括一组用于管理安全对象（包括登录名和凭据）的 cmdlet。然而，该模块在处理数据库用户和权限方面的功能有些有限；因此，我们需要直接与\
    \ SMO（SQL Server 管理对象——`sqlserver` 模块所基于的库）交互来管理这些方面。以下部分将讨论这些主题。\n\n> 提示\n> \n\
    > 对每个安全对象及其注意事项的详细讨论超出了本书的范围，但可以在 Apress 书籍 *Securing SQL Server* 中找到，链接如下：[`www.apress.com/gb/book/9781484222652`](http://www.apress.com/gb/book/9781484222652)。\n"
- fmt: '### Working with Logins


    New Logins can be created using the `Add-SqlLogin` cmdlet. In its most basic form,
    you can simply request a new SQL Server Login be created, with a given name, as
    demonstrated in Listing [4-14](#395785_2_En_4_Chapter.xhtml#PC18).


    ```powershell

    $params = @{

    ServerInstance  = "localhost"

    LoginName       = "Pete"

    LoginType       = "SqlLogin"

    DefaultDatabase = "WideWorldImporters"

    Enable          = $true

    GrantConnectSql = $true

    }

    Add-SqlLogin @params

    Listing 4-14

    Create a New Login

    ```


    Tip


    If you do not set `Enable = $true`, the Login will be created but left disabled.
    If you do not set `GrantConnectSql = $true`, then the Login will be created, but
    not granted permissions to connect to the Database Engine.


    This will cause a password prompt to be displayed, as illustrated in Figure [4-1](#395785_2_En_4_Chapter.xhtml#Fig1),
    where you can enter the desired password for the Login.


    Tip


    If using a non-Windows operating system, the prompt will be displayed in the console,
    as opposed to a pop-up window.


    While this is fine if you are running an ad hoc command, it is less helpful if
    you are trying to script processes. Therefore, you can alternatively pass a `PSCredential`
    object into the `LoginPsCredential` parameter, instead of using the `LoginName`
    parameter. This will allow both the username and password to be securely passed
    to SQL Server. The technique for this is demonstrated in Listing [4-15](#395785_2_En_4_Chapter.xhtml#PC19).


    ```powershell

    $UserName = ''Pete''

    $Password = ''Pa$$w0rd''

    # Convert to SecureString

    $SecurePassword = ConvertTo-SecureString $Password -AsPlainText -Force

    #Create The psCredential object

    $LoginCredential = [PSCredential]::new($UserName, $SecurePassword)

    $params = @{

    ServerInstance      = "localhost"

    LoginPsCredential   = $LoginCredential

    LoginType           = "SqlLogin"

    DefaultDatabase     = "WideWorldImporters"

    Enable              = $true

    GrantConnectSql     = $true

    }

    Add-SqlLogin @params

    Listing 4-15

    Create a Login with LoginPsCredential

    ```


    ![](images/395785_2_En_4_Chapter/395785_2_En_4_Fig1_HTML.jpg)


    Screenshot of an SQL login password prompt. The window requests a password for
    a new login, displaying a username field with "Pete" selected. Below is a password
    input field. The window includes "OK" and "Cancel" buttons. An icon of keys is
    visible in the top left corner.


    Figure 4-1

    Password prompt


    While this is fine if you are running an ad hoc command, it is less helpful if
    you are trying to script processes. Therefore, you can alternatively pass a


    Just as if you were creating a Login using T-SQL or SQL Server Management Studio,
    it is possible to enforce domain password policy for a Login. This can be achieved
    with the help of the `EnforcePasswordPolicy`, `EnforcePasswordExpiration`, and
    `MustChangePasswordAtNextLogin` parameters.


    These parameters form a hierarchy. It is not possible to set `EnforcePasswordExpiration`
    without setting `EnforcePasswordPolicy`. It is also not possible to set `MustChangePasswordAtNextLogin`
    without setting `EnforcePasswordExpiration`. Therefore, if you specify a parameter
    at a lower level of the hierarchy, then it silently implies the parameters above
    it.


    For example, the script in Listing [4-16](#395785_2_En_4_Chapter.xhtml#PC20) only
    specifies `MustChangePasswordAtNextLogin`, but because this parameter is at the
    bottom of the hierarchy, `EnforcePasswordExpiration` and `EnforcePasswordPolicy`
    are also set.


    ```powershell

    $UserName = ''Pete''

    $Password = ''Pa$$w0rd''

    # Convert to SecureString

    $SecurePassword = ConvertTo-SecureString $Password -AsPlainText -Force

    #Create The psCredential object

    $LoginCredential = [PSCredential]::new($UserName, $SecurePassword)

    $params = @{

    ServerInstance                  = "localhost"

    LoginPsCredential               = $LoginCredential

    LoginType                       = "SqlLogin"

    DefaultDatabase                 = "WideWorldImporters"

    Enable                          = $true

    GrantConnectSql                 = $true

    MustChangePasswordAtNextLogin   = $true

    }

    Add-SqlLogin @params

    Listing 4-16

    Enforcing Password Policies

    ```


    The `Add-SqlLogin` cmdlet can also be used to create SQL Logins for Windows users,
    Windows groups, asymmetric keys, and certificates. This is achieved by changing
    the value of the `LoginType` parameter. For example, the script in Listing [4-17](#395785_2_En_4_Chapter.xhtml#PC21)
    will create a login for the AD User `POSHSQL\Pete`.


    ```powershell

    $params = @{

    ServerInstance    = "localhost"

    LoginName         = "POSHSQL\Pete"

    LoginType         = "WindowsUser"

    DefaultDatabase   = "WideWorldImporters"

    Enable            = $true

    GrantConnectSql   = $true

    }

    Add-SqlLogin @param

    Listing 4-17

    Create a Login for a Windows User

    ```


    The sqlserver module also provides a `Get-SqlLogin` cmdlet which allows you to
    return information about a user. For example, the script in Listing [4-18](#395785_2_En_4_Chapter.xhtml#PC22)
    returns details of the SQL Login called Pete, which we created in an earlier example.


    ```powershell

    $params = @{

    ServerInstance = "localhost"

    LoginName      = "Pete"

    }

    Get-SqlLogin @params

    Listing 4-18

    Return Login Details

    ```


    This command returns the results shown below:


    ```powershell

    Name                                        Login Type    Created

    ----                                        ----------    ----------------

    Pete                                          SqlLogin      10/10/2020 10:33

    ```


    The `Get-SqlLogin` command can be run with wildcard or regex searches, or if you
    omit the `LoginName` parameter, it will return all Logins that exist in the instance.
    This can be incredibly helpful for auditing, cleaning up old Logins, enforcing
    naming conventions, and checking if Logins exist. Of course, this command can
    also be added to scripts to help build automated administration routines.


    With the help of another cmdlet, `Remove-SqlLogin`, let’s see how the `Get-SqlLogin`
    command can be used to clean up old Login objects. The script in Listing [4-19](#395785_2_En_4_Chapter.xhtml#PC24)
    will return all SQL Logins (filtered using the `LoginType` parameter to include
    SQL Logins only, not Windows users or Windows groups) and then pipe them into
    the `Remove-Login` cmdlet, which will drop them from the instance.


    ```powershell

    $params = @{

    ServerInstance = "localhost"

    LoginName      = "*Pete*"

    Wildcard       = $true

    LoginType      = "SqlLogin"

    }

    Get-SqlLogin @params | Remove-SqlLogin

    Listing 4-19

    Using Get-SqlLogin and Remove-SqlLogin to Clean Up Old Login Objects

    ```


    ### Working with Server Roles


    So, we know how to create a SQL Login, but typically we would want to create a
    database User associated with the Login and assign our security principal permissions
    to SQL Server resources through server and database roles. Here, the sqlserver
    module lacks functionality, so instead we will need to interact directly with
    SMO (SQL Server Management Objects) to perform the required tasks.


    The script in Listing [4-20](#395785_2_En_4_Chapter.xhtml#PC25) demonstrates how
    we can add our Login `Pete` to the `dbcreator` server role, so that the principal
    can create new databases. The script first creates an SMO object which maps to
    our SQL Server instance. We then create an object for the `dbcreator` server role,
    before finally adding our Login to the role.


    ```powershell

    using namespace Microsoft.SqlServer.Management.Smo

    #Set variables

    $ServerInstance = "localhost"

    $LoginName = "Pete"

    $Role = "dbcreator"

    #Create an SMO instance of our SQL Instance

    $Server = [Server]::new($ServerInstance)

    #Traverse the instance for find the role

    $ServerRole = $Server.Roles[$Role]

    #Add the Login to the server role

    $ServerRole.AddMember($LoginName)

    Listing 4-20

    Add Login to a Server Role

    ```'
