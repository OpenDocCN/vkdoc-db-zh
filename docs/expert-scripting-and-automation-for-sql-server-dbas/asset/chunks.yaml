    $params = @{

    SqlInstance = "localhost"

    Database    = "Inventory"

    Query       = "

    UPDATE dbo.MaintenanceTasks

    SET InProgress = 1

    WHERE ServerID = ''" + $Server.ServerID + "'' AND InstanceID = ''" + $Server.InstanceID
    + "'' AND Task = ''RemoveOldBackups''

    "

    }

    Invoke-DbaQuery @params

    foreach ($database in $databases) {

    $limit = (Get-Date).AddDays(-3)

    $path = "\\" + $Server.ServerInstance.split(''\'')[0] + "\Backups\"

    Get-ChildItem -Path $path | Where-Object { $_.CreationTime -lt $limit } | Remove-Item

    }

    $params = @{

    SqlInstance = "localhost"

    Database    = "Inventory"

    Query       = "

    UPDATE dbo.MaintenanceTasks

    SET InProgress = 0, LastExecDate = GETDATE(), LastExecStatus = ''Success''

    WHERE ServerID = ''" + $Server.ServerID + "'' AND InstanceID = ''" + $Server.InstanceID
    + "'' AND Task = ''RemoveOldBackups'';

    "

    }

    Invoke-DbaQuery @params

    }

    ```

    **清单 10-6 删除旧备份脚本**


    此示例中我们需要的最后一个脚本如清单 10-7 所示。该脚本用于更新统计信息。它遵循与前两个维护任务相同的模式。它遍历每个实例，然后遍历该实例中的每个数据库。脚本本身只是简单地执行
    `sp_updatestats` 存储过程。


    ```powershell

    $params = @{

    SqlInstance = "localhost"

    Database    = "Inventory"

    Query       = "

    SELECT

    ServerInstance

    ,Task

    ,LastExecDate

    ,NextExecDate

    ,InProgress

    ,TaskDisabled

    ,StartTime

    ,EndTime

    ,ServerID

    ,InstanceID

    FROM dbo.MaintenanceSchedule ms

    WHERE InProgress = 0

    AND TaskDisabled = 0

    AND GETDATE() >= NextExecDate

    AND CAST(GETDATE() AS TIME) BETWEEN StartTime AND EndTime

    AND Task = ''UpdateStatistics''

    "

    }

    $ServerTasks = Invoke-DbaQuery @params

    foreach ($Server in $ServerTasks) {

    $params = @{

    SqlInstance = $Server.ServerInstance

    Database    = "Master"

    Query       = "

    SELECT name FROM sys.databases

    "

    }

    $databases = Invoke-DbaQuery @params

    $params = @{

    SqlInstance = "localhost"

    Database    = "Inventory"

    Query       = "

    UPDATE dbo.MaintenanceTasks

    SET InProgress = 1

    WHERE ServerID = ''" + $Server.ServerID + "'' AND InstanceID = ''" + $Server.InstanceID
    + "'' AND Task = ''UpdateStats''

    "

    }

    Invoke-DbaQuery @params

    foreach ($database in $databases) {

    $params = @{

    SqlInstance = $Server.ServerInstance

    Database    = $database.name

    Query       = "

    EXEC sp_UpdateStatistics

    "

    }

    Invoke-DbaQuery @params

    }

    $params = @{

    SqlInstance = "localhost"

    Database    = "Inventory"

    Query       = "

    UPDATE dbo.MaintenanceTasks

    SET InProgress = 0, LastExecDate = GETDATE(), LastExecStatus = ''Success''

    WHERE ServerID = ''" + $Server.ServerID + "'' AND InstanceID = ''" + $Server.InstanceID
    + "'' AND Task = ''UpdateStatistics'';

    "

    }

    Invoke-DbaQuery @params

    }

    ```

    **清单 10-7 更新统计信息**


    每个脚本都应保存到 SQL Server 代理服务账户（或代理账户）可以访问的文件夹中。在此示例中，我将它们保存到了中央管理服务器上的 `c:\scripts`
    文件夹中。我分别将文件命名为 `FullBackups.ps1`、`RemoveOldBackups.ps1` 和 `UpdateStatistics.ps1`。


    > **提示**

    >

    > 如果适合你的环境，可以进行各种增强。例如，你可以考虑将 `MaintenanceTasks` 表的粒度细化到数据库级别，以便在同一实例上为不同数据库安排不同的备份时间。你还可以向
    `MaintenanceSchedule` 视图中添加 `LastExecStatus`，这样如果任务失败，你就可以添加重试逻辑。


    ## 创建 SQL Server 代理作业


    现在我们有了希望针对 SQL Server 实例运行的每个脚本，我们可以在中央管理服务器上创建一个 SQL Server 代理作业来运行它们。由于脚本本身决定了它们需要运行在哪些实例上，这意味着可以将作业安排为每分钟运行一次。如果没有需要脚本执行的任务，它将直接退出，并允许作业转到下一个作业步骤。


    清单 10-8 中的脚本创建了 SQL Server 代理作业、计划以及所需的步骤。该作业被配置为无论前一步骤成功或失败都转到下一步。这避免了一个脚本失败导致其他任务停止运行的问题。


    > **注意**

    >

    > 在查询中使用了 `"` 的地方，我们使用 `""` 对其进行了转义。


    ```powershell

    $params = @{

    SqlInstance  = "localhost"

    Query        = "

    USE msdb

    GO

    DECLARE @jobId BINARY(16)

    EXEC  msdb.dbo.sp_add_job @job_name=''SQLMaintenance'',

    @enabled=1,

    @notify_level_eventlog=0,

    @notify_level_email=2,

    @notify_level_page=2,

    @delete_level=0,

    @owner_login_name=''SQL2022-STANDAL\Administrator'', @job_id = @jobId OUTPUT

    SELECT @jobId

    GO

    EXEC msdb.dbo.sp_add_jobserver @job_name=''SQLMaintenance'', @server_name = ''SQL2022-STANDALONE''

    GO

    USE msdb

    GO

    EXEC msdb.dbo.sp_add_jobstep @job_name=''SQLMaintenance'', @step_name=''FullBackups'',

    @step_id=1,

    @cmdexec_success_code=0,

    @on_success_action=3,

    @on_fail_action=3,

    @retry_attempts=0,

    @retry_interval=0,

    @os_run_priority=0, @subsystem=''PowerShell'',

    @command=''powershell ""C:\scripts\FullBackups.ps1""''

    GO

    USE msdb

    GO

    EXEC msdb.dbo.sp_add_jobstep @job_name=''SQLMaintenance'', @step_name=''RemoveOldBackups'',

    @step_id=2,

    @cmdexec_success_code=0,

    @on_success_action=3,

    @on_fail_action=3,

    @retry_attempts=0,

    @retry_interval=0,

    @os_run_priority=0, @subsystem=''PowerShell'',

    @command=''powershell ""C:\scripts\RemoveOldBackups.ps1""''

    GO

    USE msdb

    GO

    EXEC msdb.dbo.sp_add_jobstep @job_name=''SQLMaintenance'', @step_name=''UpdateStatistics'',

    @step_id=3,

    @cmdexec_success_code=0,

    @on_success_action=1,

    @on_fail_action=2,

    @retry_attempts=0,

    @retry_interval=0,

    @os_run_priority=0, @subsystem=''PowerShell'',

    @command=''powershell ""C:\scripts\UpdateStatistics.ps1""''

    GO

    USE msdb

    GO

    EXEC msdb.dbo.sp_update_job @job_name=''SQLMaintenance'',

    @enabled=1,

    @start_step_id=1,

    @notify_level_eventlog=0,

    @notify_level_email=2,

    @notify_level_page=2,

    @delete_level=0,

    @owner_login_name=''SQL2022-STANDAL\Administrator''

    GO

    USE msdb

    GO

    DECLARE @schedule_id int

    EXEC msdb.dbo.sp_add_jobschedule @job_name=''SQLMaintenance'', @name=''MaitenanceSchedule'',

    @enabled=1,

    @freq_type=4,

    @freq_interval=1,

    @freq_subday_type=4,

    @freq_subday_interval=1,

    @freq_relative_interval=0,

    @freq_recurrence_factor=1,

    @active_start_date=20241020,

    @active_end_date=99991231,

    @active_start_time=0,

    @active_end_time=235959

    GO

    "

    }

    Invoke-DbaQuery @params

    ```

    **清单 10-8 创建 SQL Server 代理作业**


    ## 总结


    创建一个集中化的维护引擎，为在 SQL Server 全域中如何以及何时执行维护任务提供了终极灵活性。维护引擎位于集中管理的服务器上，允许跨企业执行维护任务，但可从单一位置进行控制。


    引擎本身由表和视图组成，这些表和视图存储有关哪些维护例程应在何时、在哪台服务器上执行的信息。随后是 PowerShell 脚本中的简单逻辑，用于确定任务应在何处运行。然后，这些任务由每分钟运行一次的
    SQL Server 代理作业调用。


    这种方法具有无尽的可能性，我鼓励你以此方法为基础，开发满足你组织需求的自定义维护计划程序。


    '
- fmt: '# 11. Automating Routine Maintenance and Break/Fix Scenarios


    The more quickly a DBA team can respond to a request from the business, the more
    value it can bring to the organization. In Chapter [10](#395785_2_En_10_Chapter.xhtml),
    we focused on the centralization of maintenance routines, but there are many more
    mundane aspects of a DBA’s role that can be automated.


    In this chapter, we will look at two aspects of this. This first aspect is automating
    ad hoc maintenance, which will allow us to respond more rapidly to business requirements.
    This chapter will focus specifically on environment refreshes, but the techniques
    can be applied to many scenarios.


    The second aspect of automation we will address is break/fix automation. This
    can greatly improve service to the business, by resolving issues automatically,
    without needing to wait for a DBA to do it. This chapter will focus on resolving
    log space issues, but, once again, the techniques can be applied to almost any
    scenario.


    So far, this book has focused primarily on `PowerShell`. In this chapter, however,
    we will move away from `PowerShell` to demonstrate other methods of achieving
    automation with `SQL Server`. Specifically, we will examine the use of `SSIS`
    and `SQL Agent Alerts`. The chapter also demonstrates configuring a `SQL Agent
    Job` through the `GUI`. It is useful to understand this because, in this book,
    you have already learned how to create a `SQL Agent job` through code, but sometimes
    the fastest way to create a `SQL Agent Job` is to use the `GUI` and then script
    it, so that you can save it to source control.


    ## Automating Ad Hoc Routine Maintenance


    The techniques for building centralized maintenance you learned in Chapter [10](#395785_2_En_10_Chapter.xhtml)
    are great for routine maintenance that runs on a schedule. But what about ad hoc
    tasks? These can’t be scheduled to run on a regular basis, but that doesn’t prevent
    us from implementing automation to take the heavy lifting out of the requests,
    thus allowing us to respond more quickly and also freeing us up for higher value
    activity.


    Let’s take environment refreshes as an example. If you have in-house application
    development teams, it is common for them to periodically request that their development
    environment be refreshed with the latest cut of production data. In this scenario,
    providing that there are no data privacy issues, we may respond by backing up
    the database and restoring it to the development environment or detaching the
    database, copying the data files, and reattaching it in both locations.


    In other environments, however, especially where there is a heightened need for
    security, the process can be a lot more complex.


    For example, I once worked with a `FTSE 100` company that was tightly controlled
    by regulators, and when developers required an environment refresh, there was
    no way that they could be given access to live data. Therefore, the process of
    refreshing the environment consisted of the following steps:


    1.  Back up the production database.

    2.  Put the development server into `SINGLE USER` mode, so that developers could
    not access it.

    3.  Restore the database onto the development server.

    4.  Remove database users without a login.

    5.  Obfuscate the data.

    6.  Put instance back into `MULTI USER` mode.


    In this section, we will re-create this process for the `AdventureWorks2022` database,
    which we will copy from an instance called `ESPROD1` to an instance called `ESPROD2`.
    This process is depicted in the workflow that can be found in Figure [11-1](#395785_2_En_11_Chapter.xhtml#Fig1).


    ![](images/395785_2_En_11_Chapter/395785_2_En_11_Fig1_HTML.jpg)


    Flow chart illustrating a database obfuscation process. It begins with "Start"
    in a green oval, followed by steps: "Backup Production Database," "Put Development
    Server into SINGLE USER Mode," "Restore Database to Development Server," and "Remove
    Database Logins." The process continues with "Obfuscation," which includes "Identify
    Data to be Obfuscated" and "Obfuscate Data." Finally, it ends with "Put Development
    Server into MULTI USER Mode" and "Stop" in a pink oval. Arrows connect each step
    sequentially.


    **Figure 11-1**


    Environment refresh workflow


    We will parameterize the process, so that it can be easily modified for any database.
    Again, we have the choice of orchestrating this workflow using either `PowerShell`
    or `SSIS`. For this kind of workflow, however, I would recommend that `SSIS` be
    considered as the most appropriate tool.'
