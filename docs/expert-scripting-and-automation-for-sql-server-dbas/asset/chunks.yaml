- fmt: '### Aliases


    To make learning PowerShell even easier, many commands have aliases, which map
    to DOS or Linux commands. This means that if you have any experience using Windows
    Command Prompt (which is based on DOS), or Bash, you can continue to use many
    commands that you are already familiar with.


    As an example, let’s consider `Get-ChildItem`. As mentioned earlier, `Get-ChildItem`
    can be used to list the contents of a folder in the file system. Many new PowerShell
    users unfamiliar with this command will be familiar with `dir` from DOS or `ls`
    from LINUX. Therefore, PowerShell provides both of these aliases. For example,
    all of the commands in Listing [2-2](#395785_2_En_2_Chapter.xhtml#PC2) are functionally
    equivalent.


    ```

    dir *.txt #Using the DOS alias

    ls *.txt #Using the LINUX alias

    gci *.txt #Using gci alias

    Get-ChildItem *.txt #Using the PowerShell command

    Listing 2-2

    Using Aliases

    ```


    > **Tip**: Aliases can enhance productivity when you are operating interactively
    with the PowerShell terminal, but they are considered bad practice within scripts,
    because it makes the code more opaque and harder to read.


    ## Language Fundamentals


    The following sections will discuss comments, data types, variables, piping and
    filtering, and flow control statements. PowerShell is a very large language, but
    the constructs contained in this section will give you an accelerator and provide
    you with the fundamentals you need for the rest of this book.


    ### Comments


    PowerShell supports both inline comments and block comments. An inline comment
    is denoted by the `#` symbol. Anything to the right of this symbol is treated
    as a comment and is not executed. For example, the command in Listing [2-3](#395785_2_En_2_Chapter.xhtml#PC3)
    is functionally equivalent to the command in Listing [2-1](#395785_2_En_2_Chapter.xhtml#PC1).


    ```

    Set-ExecutionPolicy -ExecutionPolicy Unrestricted #Set execution policy to Unrestricted

    Listing 2-3

    Inline Comments

    ```


    Block comments begin with `<#` and end with `#>`. Anything between these character
    sequences is regarded as a comment and is not executed. The script in Listing
    [2-4](#395785_2_En_2_Chapter.xhtml#PC4) demonstrates the use of block comments.


    ```

    Set-ExecutionPolicy  -ExecutionPolicy Unrestricted

    Listing 2-4

    Block Comments

    ```


    ### Data Types


    PowerShell uses the data types provided by the .NET CLR. Every data type in .NET
    is derived from the `Object` data type. Therefore, the `Object` data type is the
    root of the type hierarchy, as well as being a data type in its own right.


    The base types listed in Table [2-2](#395785_2_En_2_Chapter.xhtml#Tab2) are derived
    directly from the `Object` type. From these base types, literally hundreds of
    data types are derived. Some of these derived types are complex, such as `XML`,
    `DateTimeOffset` (which stores a date and time with an offset against UTC), and
    `Array`.


    **Table 2-2 Base Data Types**


    | Base Data Type | Description |

    | --- | --- |

    | `Byte` | 8-bit unsigned integer |

    | `SByte` | Non-CLS-compliant 8-bit signed integer |

    | `Int16` | 16-bit signed integer |

    | `Int32` | 32-bit signed integer |

    | `Int64` | 64-bit signed integer |

    | `UInt16` | 16-bit unsigned integer |

    | `UInt32` | Non-CLS-compliant 32-bit unsigned integer |

    | `UInt64` | Non-CLS-compliant 64-bit unsigned integer |

    | `Single` | 32-bit floating-point number |

    | `Double` | 64-bit floating-point number |

    | `Boolean` | Boolean/Bit value |

    | `Char` | Unicode (16-bit) character |

    | `Decimal` | Decimal (128-bit) value |

    | `IntPtr` | A signed integer that has a 32-bit value on a 32-bit platform and
    a 64-bit value on a 64-bit platform |

    | `UIntPtr` | Non-CLS-compliant, unsigned integer that has a 32-bit value on a
    32-bit platform and a 64-bit value on a 64-bit platform |

    | `String` | A string of Unicode characters |


    ### Variables


    As with all languages, variables contain values that are unknown until runtime
    or that change during execution. They are critical to writing flexible, powerful,
    and maintainable code. They are used for purposes such as storing user inputs
    and looping. Each variable maps to a data type, and because variables are objects
    derived from a .NET class, various methods can be called against them. For example,
    the `ToString()` method can be called against an `Int32` to output the variable
    value as a string, as opposed to an integer.


    A variable is always prefixed with a `$`, and when declaring a variable, you specify
    the data type in square brackets, immediately before the `$`, before finally declaring
    the name of the variable.


    > **Tip**: Always give variables meaningful names. If you give variables names
    such as `$i` or `$a`, they become as meaningless as naming them `$foo` and `$bar`.
    Giving variables meaningful names makes your code easier to read and maintain.


    The script in Listing [2-5](#395785_2_En_2_Chapter.xhtml#PC5) first creates two
    variables. One is an integer called `$HelloWorldInt`, and the other is a string
    called `$HelloWorldText` and assigns values to each of the variables. The second
    part of the script clears the console of messages, before it outputs the results.


    ```

    #Declare the variables and assign them values

    [int]$HelloWorldInt = 123

    [string]$HelloWorldText = "Hello World"

    #Print the Results to the Console

    Clear-Host

    Write-Host "HelloWorldInt: " $HelloWorldInt

    Write-Host "HelloWorldText: " $HelloWorldText

    Listing 2-5

    Declaring and Using Variables

    ```


    We can also declare variables without specifying a data type. When you do this,
    PowerShell will use the data type that it considers to be most appropriate. Be
    warned, however, that PowerShell is not psychic! It can only guess what data type
    the variable should be. For example, consider the script in Listing [2-6](#395785_2_En_2_Chapter.xhtml#PC6).
    Here, we declare six variables without specifying a data type. We then use the
    `GetType()` method to extract the data type for each.


    ```

    #Declare Variables In-line

    $StringVariable1 = "Hello World"

    $StringVariable2 = 123

    $StringVariable3 = "123"

    $Int32Variable = 123

    $SingleVariable = 3.3

    $XMLVariable = ''MyValue''

    #Extract Data Types

    Clear-Host

    "StringVariable1: " + $StringVariable1.GetType()

    "StringVariable2: " + $StringVariable2.GetType()

    "StringVariable3: " + $StringVariable3.GetType()

    "Int32Variable: " + $Int32Variable.GetType()

    "SingleVariable: " + $SingleVariable.GetType()

    "XMLVariable: " + $XMLVariable.GetType()

    Listing 2-6

    Declaring Variables Without Data Types

    ```


    As you can see from the results, which are listed below, the data types are not
    as you might expect:


    ```

    StringVariable1: string

    StringVariable2: int

    StringVariable3: string

    Int32Variable: int

    SingleVariable: double

    XMLVariable: string

    ```


    You can see that `$StringVariable`, `$StringVariable3`, and `$Int32Variable` have
    been assigned to the data types we wanted. We have not been so lucky with the
    other variables, however. `$StringVariable2` has been created with an `int` data
    type, because we did not enclose the assigned value within quotation marks. This
    is why `$StringVariable3` did not suffer the same issue. `$SingleVariable` has
    been created with a data type of `double`. This is not the end of the world, but
    it does mean that we are using more memory resource than we require. `$XMLVariable`
    has been created with the `string` data type. This means that we will be unable
    to use XML-specific methods and cmdlets, such as the `GetElementsByTagName` method
    and the `Select-Xml` cmdlet.


    To summarize, it is important to remember the potential complications of not specifying
    a data type, and if the data type is important to your script, it should always
    be specified. An additional factor to consider is code maintenance. If it is not
    easy for you (or a team member) to reference the data type of a variable, it may
    slow you down when you come to troubleshoot, revise, or enhance the script.'
  raw: '### Aliases


    To make learning PowerShell even easier, many commands have aliases, which map
    to DOS or Linux commands. This means that if you have any experience using Windows
    Command Prompt (which is based on DOS), or Bash, you can continue to use many
    commands that you are already familiar with.


    As an example, let’s consider `Get-ChildItem`. As mentioned earlier, `Get-ChildItem`
    can be used to list the contents of a folder in the file system. Many new PowerShell
    users unfamiliar with this command will be familiar with `dir` from DOS or `ls`
    from LINUX. Therefore, PowerShell provides both of these aliases. For example,
    all of the commands in Listing [2-2](#395785_2_En_2_Chapter.xhtml#PC2) are functionally
    equivalent.


    ```

    dir *.txt #Using the DOS alias

    ls *.txt #Using the LINUX alias

    gci *.txt #Using gci alias

    Get-ChildItem *.txt #Using the PowerShell command

    Listing 2-2

    Using Aliases

    ```


    Tip


    Aliases can enhance productivity when you are operating interactively with the
    PowerShell terminal, but they are considered bad practice within scripts, because
    it makes the code more opaque and harder to read.


    ## Language Fundamentals


    The following sections will discuss comments, data types, variables, piping and
    filtering, and flow control statements. PowerShell is a very large language, but
    the constructs contained in this section will give you an accelerator and provide
    you with the fundamentals you need for the rest of this book.


    ### Comments


    PowerShell supports both inline comments and block comments. An inline comment
    is denoted by the `#` symbol. Anything to the right of this symbol is treated
    as a comment and is not executed. For example, the command in Listing [2-3](#395785_2_En_2_Chapter.xhtml#PC3)
    is functionally equivalent to the command in Listing [2-1](#395785_2_En_2_Chapter.xhtml#PC1).


    ```

    Set-ExecutionPolicy -ExecutionPolicy Unrestricted #Set execution policy to Unrestricted

    Listing 2-3

    Inline Comments

    ```


    Block comments begin with `<#` and end with `#>`. Anything between these character
    sequences is regarded as a comment and is not executed. The script in Listing
    [2-4](#395785_2_En_2_Chapter.xhtml#PC4) demonstrates the use of block comments.


    ```

    Set-ExecutionPolicy  -ExecutionPolicy Unrestricted

    Listing 2-4

    Block Comments

    ```


    ### Data Types


    PowerShell uses the data types provided by the .NET CLR. Every data type in .NET
    is derived from the `Object` data type. Therefore, the `Object` data type is the
    root of the type hierarchy, as well as being a data type in its own right.


    The base types listed in Table [2-2](#395785_2_En_2_Chapter.xhtml#Tab2) are derived
    directly from the `Object` type. From these base types, literally hundreds of
    data types are derived. Some of these derived types are complex, such as `XML`,
    `DateTimeOffset` (which stores a date and time with an offset against UTC), and
    `Array`.


    Table 2-2


    Base Data Types


    | Base Data Type | Description |

    | --- | --- |

    | `Byte` | 8-bit unsigned integer |

    | `SByte` | Non-CLS-compliant 8-bit signed integer |

    | `Int16` | 16-bit signed integer |

    | `Int32` | 32-bit signed integer |

    | `Int64` | 64-bit signed integer |

    | `UInt16` | 16-bit unsigned integer |

    | `UInt32` | Non-CLS-compliant 32-bit unsigned integer |

    | `UInt64` | Non-CLS-compliant 64-bit unsigned integer |

    | `Single` | 32-bit floating-point number |

    | `Double` | 64-bit floating-point number |

    | `Boolean` | Boolean/Bit value |

    | `Char` | Unicode (16-bit) character |

    | `Decimal` | Decimal (128-bit) value |

    | `IntPtr` | A signed integer that has a 32-bit value on a 32-bit platform and
    a 64-bit value on a 64-bit platform |

    | `UIntPtr` | Non-CLS-compliant, unsigned integer that has a 32-bit value on a
    32-bit platform and a 64-bit value on a 64-bit platform |

    | `String` | A string of Unicode characters |


    ### Variables


    As with all languages, variables contain values that are unknown until runtime
    or that change during execution. They are critical to writing flexible, powerful,
    and maintainable code. They are used for purposes such as storing user inputs
    and looping. Each variable maps to a data type, and because variables are objects
    derived from a .NET class, various methods can be called against them. For example,
    the `ToString()` method can be called against an `Int32` to output the variable
    value as a string, as opposed to an integer.


    A variable is always prefixed with a `$`, and when declaring a variable, you specify
    the data type in square brackets, immediately before the `$`, before finally declaring
    the name of the variable.


    Tip


    Always give variables meaningful names. If you give variables names such as `$i`
    or `$a`, they become as meaningless as naming them `$foo` and $`bar`. Giving variables
    meaningful names makes your code easier to read and maintain.


    The script in Listing [2-5](#395785_2_En_2_Chapter.xhtml#PC5) first creates two
    variables. One is an integer called `$HelloWorldInt`, and the other is a string
    called `$HelloWorldText` and assigns values to each of the variables. The second
    part of the script clears the console of messages, before it outputs the results.


    ```

    #Declare the variables and assign them values

    [int]$HelloWorldInt = 123

    [string]$HelloWorldText = "Hello World"

    #Print the Results to the Console

    Clear-Host

    Write-Host "HelloWorldInt: " $HelloWorldInt

    Write-Host "HelloWorldText: " $HelloWorldText

    Listing 2-5

    Declaring and Using Variables

    ```


    We can also declare variables without specifying a data type. When you do this,
    PowerShell will use the data type that it considers to be most appropriate. Be
    warned, however, that PowerShell is not psychic! It can only guess what data type
    the variable should be. For example, consider the script in Listing [2-6](#395785_2_En_2_Chapter.xhtml#PC6).
    Here, we declare six variables without specifying a data type. We then use the
    `GetType()` method to extract the data type for each.


    ```

    #Declare Variables In-line

    $StringVariable1 = "Hello World"

    $StringVariable2 = 123

    $StringVariable3 = "123"

    $Int32Variable = 123

    $SingleVariable = 3.3

    $XMLVariable = ''MyValue''

    #Extract Data Types

    Clear-Host

    "StringVariable1: " + $StringVariable1.GetType()

    "StringVariable2: " + $StringVariable2.GetType()

    "StringVariable3: " + $StringVariable3.GetType()

    "Int32Variable: " + $Int32Variable.GetType()

    "SingleVariable: " + $SingleVariable.GetType()

    "XMLVariable: " + $XMLVariable.GetType()

    Listing 2-6

    Declaring Variables Without Data Types

    ```


    As you can see from the results, which are listed below, the data types are not
    as you might expect:


    ```

    StringVariable1: string

    StringVariable2: int

    StringVariable3: string

    Int32Variable: int

    SingleVariable: double

    XMLVariable: string

    ```


    You can see that `$StringVariable`, `$StringVariable3`, and `$Int32Variable` have
    been assigned to the data types we wanted. We have not been so lucky with the
    other variables, however. `$StringVariable2` has been created with an `int` data
    type, because we did not enclose the assigned value within quotation marks. This
    is why `$StringVariable3` did not suffer the same issue. `$SingleVariable` has
    been created with a data type of `double`. This is not the end of the world, but
    it does mean that we are using more memory resource than we require. `$XMLVariable`
    has been created with the `string` data type. This means that we will be unable
    to use XML-specific methods and cmdlets, such as the `GetElementsByTagName` method
    and the `Select-Xml` cmdlet.


    To summarize, it is important to remember the potential complications of not specifying
    a data type, and if the data type is important to your script, it should always
    be specified. An additional factor to consider is code maintenance. If it is not
    easy for you (or a team member) to reference the data type of a variable, it may
    slow you down when you come to troubleshoot, revise, or enhance the script.'
  trans: '

    ### 别名


    为了让学习 PowerShell 变得更加简单，许多命令都有别名，这些别名映射到 DOS 或 Linux 命令。这意味着，如果你有使用 Windows 命令提示符（基于
    DOS）或 Bash 的任何经验，就可以继续使用许多你已经熟悉的命令。


    例如，我们来看一下 `Get-ChildItem`。如前所述，`Get-ChildItem` 可用于列出文件系统中文件夹的内容。许多不熟悉此命令的 PowerShell
    新手会熟悉 DOS 的 `dir` 或 Linux 的 `ls`。因此，PowerShell 提供了这两个别名。例如，代码清单 2-2 中的所有命令在功能上都是等效的。


    ```

    dir *.txt #使用 DOS 别名

    ls *.txt #使用 LINUX 别名

    gci *.txt #使用 gci 别名

    Get-ChildItem *.txt #使用 PowerShell 命令

    代码清单 2-2

    使用别名

    ```


    > **提示**：当你与 PowerShell 终端进行交互式操作时，别名可以提高工作效率，但在脚本中使用别名被认为是糟糕的做法，因为它会使代码更加晦涩难懂，更难以阅读。


    ## 语言基础


    以下部分将讨论注释、数据类型、变量、管道和筛选以及流程控制语句。PowerShell 是一门非常庞大的语言，但本节包含的结构将为你提供一个加速器，并为你阅读本书其余部分所需的基础知识。


    ### 注释


    PowerShell 支持行内注释和块注释。行内注释由 `#` 符号表示。该符号右侧的所有内容都被视为注释，不会被执行。例如，代码清单 2-3 中的命令与代码清单
    2-1 中的命令在功能上是等效的。


    ```

    Set-ExecutionPolicy -ExecutionPolicy Unrestricted #将执行策略设置为 Unrestricted

    代码清单 2-3

    行内注释

    ```


    块注释以 `<#` 开始，以 `#>` 结束。这些字符序列之间的任何内容都被视为注释，不会被执行。代码清单 2-4 中的脚本演示了块注释的用法。


    ```

    <#

    Set-ExecutionPolicy  -ExecutionPolicy Unrestricted

    此命令用于将 PowerShell 的执行策略设置为“无限制”。

    #>

    代码清单 2-4

    块注释

    ```


    ### 数据类型


    PowerShell 使用 .NET CLR 提供的数据类型。.NET 中的每种数据类型都派生自 `Object` 数据类型。因此，`Object` 数据类型是类型层次结构的根，同时它本身也是一个数据类型。


    表 2-2 中列出的基本类型直接派生自 `Object` 类型。从这些基本类型中，实际上派生出了数百种数据类型。其中一些派生类型很复杂，例如 `XML`、`DateTimeOffset`（存储相对于
    UTC 偏移的日期和时间）和 `Array`。


    **表 2-2 基本数据类型**


    | 基本数据类型 | 描述 |

    | --- | --- |

    | `Byte` | 8 位无符号整数 |

    | `SByte` | 不符合 CLS 规范的 8 位有符号整数 |

    | `Int16` | 16 位有符号整数 |

    | `Int32` | 32 位有符号整数 |

    | `Int64` | 64 位有符号整数 |

    | `UInt16` | 16 位无符号整数 |

    | `UInt32` | 不符合 CLS 规范的 32 位无符号整数 |

    | `UInt64` | 不符合 CLS 规范的 64 位无符号整数 |

    | `Single` | 32 位浮点数 |

    | `Double` | 64 位浮点数 |

    | `Boolean` | 布尔值/位值 |

    | `Char` | Unicode（16 位）字符 |

    | `Decimal` | 十进制（128 位）值 |

    | `IntPtr` | 有符号整数，在 32 位平台上为 32 位值，在 64 位平台上为 64 位值 |

    | `UIntPtr` | 不符合 CLS 规范的无符号整数，在 32 位平台上为 32 位值，在 64 位平台上为 64 位值 |

    | `String` | Unicode 字符字符串 |


    ### 变量


    与所有语言一样，变量包含在运行时未知或在执行期间会更改的值。它们对于编写灵活、强大和可维护的代码至关重要。变量用于存储用户输入和循环等目的。每个变量都映射到一个数据类型，并且由于变量是派生自
    .NET 类的对象，因此可以对它们调用各种方法。例如，可以对 `Int32` 调用 `ToString()` 方法，将变量值作为字符串而非整数输出。


    变量始终以 `$` 为前缀，声明变量时，你在美元符号 `$` 前面的方括号中指定数据类型，最后声明变量的名称。


    > **提示**：始终为变量赋予有意义的名称。如果你给变量起名为 `$i` 或 `$a`，它们就变得毫无意义，就像命名为 `$foo` 和 `$bar` 一样。为变量赋予有意义的名称使你的代码更易于阅读和维护。


    代码清单 2-5 中的脚本首先创建两个变量。一个是名为 `$HelloWorldInt` 的整数，另一个是名为 `$HelloWorldText` 的字符串，并为每个变量赋值。脚本的第二部分清除控制台的消息，然后输出结果。


    ```

    #声明变量并赋值

    [int]$HelloWorldInt = 123

    [string]$HelloWorldText = "Hello World"

    #将结果打印到控制台

    Clear-Host

    Write-Host "HelloWorldInt: " $HelloWorldInt

    Write-Host "HelloWorldText: " $HelloWorldText

    代码清单 2-5

    声明和使用变量

    ```


    我们也可以在不指定数据类型的情况下声明变量。当你这样做时，PowerShell 将使用它认为最合适的数据类型。但请注意，PowerShell 并未通灵！它只能猜测变量应该是哪种数据类型。例如，考虑代码清单
    2-6 中的脚本。这里，我们声明了六个变量而没有指定数据类型。然后我们使用 `GetType()` 方法来提取每个变量的数据类型。


    ```

    #行内声明变量

    $StringVariable1 = "Hello World"

    $StringVariable2 = 123

    $StringVariable3 = "123"

    $Int32Variable = 123

    $SingleVariable = 3.3

    $XMLVariable = ''MyValue''

    #提取数据类型

    Clear-Host

    "StringVariable1: " + $StringVariable1.GetType()

    "StringVariable2: " + $StringVariable2.GetType()

    "StringVariable3: " + $StringVariable3.GetType()

    "Int32Variable: " + $Int32Variable.GetType()

    "SingleVariable: " + $SingleVariable.GetType()

    "XMLVariable: " + $XMLVariable.GetType()

    代码清单 2-6

    不指定数据类型声明变量

    ```


    从下面列出的结果可以看出，数据类型并非如你所愿：


    ```

    StringVariable1: string

    StringVariable2: int

    StringVariable3: string

    Int32Variable: int

    SingleVariable: double

    XMLVariable: string

    ```


    你可以看到 `$StringVariable`、`$StringVariable3` 和 `$Int32Variable` 被分配了我们想要的数据类型。然而，对于其他变量，我们就不那么幸运了。`$StringVariable2`
    被创建为 `int` 数据类型，因为我们没有将赋值的值用引号括起来。这就是为什么 `$StringVariable3` 没有遭受同样问题的原因。`$SingleVariable`
    被创建为 `double` 数据类型。这并非世界末日，但这确实意味着我们使用了比所需更多的内存资源。`$XMLVariable` 被创建为 `string`
    数据类型。这意味着我们将无法使用 XML 特定的方法和 cmdlet，例如 `GetElementsByTagName` 方法和 `Select-Xml`
    cmdlet。


    总之，重要的是要记住不指定数据类型的潜在复杂性，并且如果数据类型对你的脚本很重要，则应始终指定。另一个需要考虑的因素是代码维护。如果对你（或团队成员）来说，引用变量的数据类型并不容易，那么在你进行故障排除、修订或增强脚本时，可能会减慢你的速度。

