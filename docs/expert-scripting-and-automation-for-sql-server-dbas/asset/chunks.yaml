- fmt: "#### Using FOR XML RAW\n\nThe simplest and easiest to understand of the `FOR\
    \ XML` modes is `FOR XML RAW`. This mode will transform each row in a relational\
    \ result set into an element within a flat XML document. Consider the query in\
    \ Listing 1-5, which extracts data from `sys.dm_exec_sessions` and `sys.dm_exec_requests`.\n\
    \n```sql\nSELECT\nExecSessions.session_id\n, ExecSessions.login_name\n, ExecSessions.host_name\n\
    , ExecSessions.status\n, ExecRequests.command\n, DB_NAME(ExecRequests.database_id)\
    \ AS DatabaseName\n, ExecRequests.last_wait_type\nFROM sys.dm_exec_sessions ExecSessions\n\
    INNER JOIN sys.dm_exec_requests ExecRequests\nON ExecSessions.session_id = ExecRequests.session_id\n\
    WHERE ExecSessions.is_user_process = 1\nListing 1-5\nExtract Session Information\n\
    ```\n\nWhen running this query, your results will vary depending on your environment\
    \ and what activity there currently is on the instance. When I ran it, it returned\
    \ the results shown in Figure 1-1.\n\n![](images/395785_2_En_1_Chapter/395785_2_En_1_Fig1_HTML.jpg)\n\
    \nTable displaying database session information. Columns include `session_id`,\
    \ `login_name`, `host_name`, `status`, `command`, `DatabaseName`, and `task_wait_type`.\
    \ Two rows are shown:\n\n1.  `session_id` 52, `login_name` WIN-3B0U1U05D7\\Administrator,\
    \ `host_name` WIN-3B0U1U05D7, `status` running, `command` SELECT, `DatabaseName`\
    \ master, `task_wait_type` SOS_WORK_DISPATCHER.\n2.  `session_id` 55, `login_name`\
    \ WIN-3B0U1U05D7\\Administrator, `host_name` WIN-3B0U1U05D7, `status` running,\
    \ `command` SELECT, `DatabaseName` master, `task_wait_type` ASYNC_NETWORK_IO.\n\
    \n**Figure 1-1**\nExtract session information – results\n\nIf we were to add a\
    \ `FOR XML` clause using `RAW` mode, the results would be returned in the form\
    \ of an XML fragment. The amended query in Listing 1-6 will return the XML document\
    \ instead of a relational result set.\n\n```sql\nSELECT\nExecSessions.session_id\n\
    , ExecSessions.login_name\n, ExecSessions.host_name\n, ExecSessions.status\n,\
    \ ExecRequests.command\n, DB_NAME(ExecRequests.database_id) AS DatabaseName\n\
    , ExecRequests.last_wait_type\nFROM sys.dm_exec_sessions ExecSessions\nINNER JOIN\
    \ sys.dm_exec_requests ExecRequests\nON ExecSessions.session_id = ExecRequests.session_id\n\
    WHERE ExecSessions.is_user_process = 1\nFOR XML RAW\nListing 1-6\nExtract Session\
    \ Information Using FOR XML RAW\n```\n\nListing 1-7 illustrates the XML document\
    \ that is returned.\n\n```xml\nListing 1-7\nExtract Session Information FOR XML\
    \ RAW Results\n```\n\nThe first thing that we should note about this document\
    \ is that it is an XML fragment, as opposed to a well-formed XML document, because\
    \ there is no root node. The `<row>` element cannot be the root node, because\
    \ it repeats. This means that we cannot validate the XML against a schema. Therefore,\
    \ when using the `FOR XML` clause, you should consider using the `ROOT` keyword.\
    \ This will force a root element, with a name of your choosing, to be created\
    \ within the document. This is demonstrated in Listing 1-8.\n\n```sql\nSELECT\n\
    ExecSessions.session_id\n, ExecSessions.login_name\n, ExecSessions.host_name\n\
    , ExecSessions.status\n, ExecRequests.command\n, DB_NAME(ExecRequests.database_id)\
    \ AS DatabaseName\n, ExecRequests.last_wait_type\nFROM sys.dm_exec_sessions ExecSessions\n\
    INNER JOIN sys.dm_exec_requests ExecRequests\nON ExecSessions.session_id = ExecRequests.session_id\n\
    WHERE ExecSessions.is_user_process = 1\nFOR XML RAW, ROOT('Sessions')\nListing\
    \ 1-8\nAdding a Root Node\n```\n\nThe resulting XML document can be seen in Listing\
    \ 1-9.\n\n```xml\nListing 1-9\nExtract Session Information with Root Node Results\n\
    ```\n\nThe other important thing to notice about the document is that it is completely\
    \ flat. There is no nesting. This means that the document’s granularity is at\
    \ the level of session, which, if there are multiple requests for a session, does\
    \ not make a lot of sense.\n\nIt is also worth noting that all data is contained\
    \ in attributes, as opposed to elements. We can alter this behavior by using the\
    \ `ELEMENTS` keyword in the `FOR XML` clause. The `ELEMENTS` keyword will cause\
    \ all data to be contained within child elements, as opposed to attributes. This\
    \ is demonstrated in the modified query that can be found in Listing 1-10.\n\n\
    ```sql\nSELECT\nExecSessions.session_id\n, ExecSessions.login_name\n, ExecSessions.host_name\n\
    , ExecSessions.status\n, ExecRequests.command\n, DB_NAME(ExecRequests.database_id)\
    \ AS DatabaseName\n, ExecRequests.last_wait_type\nFROM sys.dm_exec_sessions ExecSessions\n\
    INNER JOIN sys.dm_exec_requests ExecRequests\nON ExecSessions.session_id = ExecRequests.session_id\n\
    WHERE ExecSessions.is_user_process = 1\nFOR XML RAW, ELEMENTS, ROOT('Sessions')\n\
    Listing 1-10\nExtract Session Information As Elements\n```\n\nThe well-formed\
    \ XML document that is returned can be seen in Listing 1-11.\n\n```xml\n<Sessions>\n\
    \  <row>\n    <session_id>52</session_id>\n    <login_name>WIN-J38I01U06D7\\Administrator</login_name>\n\
    \    <host_name>WIN-J38I01U06D7</host_name>\n    <status>running</status>\n  \
    \  <command>SELECT</command>\n    <DatabaseName>master</DatabaseName>\n    <last_wait_type>MEMORY_ALLOCATION_EXT</last_wait_type>\n\
    \  </row>\n  <row>\n    <session_id>55</session_id>\n    <login_name>WIN-J38I01U06D7\\\
    Administrator</login_name>\n    <host_name>WIN-J38I01U06D7</host_name>\n    <status>running</status>\n\
    \    <command>SELECT</command>\n    <DatabaseName>master</DatabaseName>\n    <last_wait_type>ASYNC_NETWORK_IO</last_wait_type>\n\
    \  </row>\n</Sessions>\nListing 1-11\nExtract Session Information As Elements\
    \ Results\n```\n\nYou can see that the element-centric document still returns\
    \ one element, called `<row>`, per row in the relational result set. Instead of\
    \ the data being contained in attributes, however, it is stored in the form of\
    \ child elements. Each child element has been given the name of the column, from\
    \ which the data has been returned. The data is still flat, however. There is\
    \ no hierarchy based on logic or physical table structure.\n\nIt is possible to\
    \ give the `<row>` element a more meaningful name. In our example, the most meaningful\
    \ name would be `<Session>`. Listing 1-12 demonstrates how we can use an optional\
    \ argument in our `FOR XML` clause to generate this name for the element.\n\n\
    ```sql\nSELECT\nExecSessions.session_id\n, ExecSessions.login_name\n, ExecSessions.host_name\n\
    , ExecSessions.status\n, ExecRequests.command\n, DB_NAME(ExecRequests.database_id)\
    \ AS DatabaseName\n, ExecRequests.last_wait_type\nFROM sys.dm_exec_sessions ExecSessions\n\
    INNER JOIN sys.dm_exec_requests ExecRequests\nON ExecSessions.session_id = ExecRequests.session_id\n\
    WHERE ExecSessions.is_user_process = 1\nFOR XML RAW('Session'), ELEMENTS, ROOT('Sessions')\n\
    Listing 1-12\nGenerate a Name for the <row> Element\n```\n\nThe partial resulting\
    \ XML document can be found in Listing 1-13.\n\n```xml\n<Sessions>\n  <Session>\n\
    \    <session_id>52</session_id>\n    <login_name>WIN-J38I01U06D7\\Administrator</login_name>\n\
    \    <host_name>WIN-J38I01U06D7</host_name>\n    <status>running</status>\n  \
    \  <command>SELECT</command>\n    <DatabaseName>master</DatabaseName>\n    <last_wait_type>MEMORY_ALLOCATION_EXT</last_wait_type>\n\
    \  </Session>\n  <Session>\n    <session_id>55</session_id>\n    <login_name>WIN-J38I01U06D7\\\
    Administrator</login_name>\n    <host_name>WIN-J38I01U06D7</host_name>\n    <status>running</status>\n\
    \    <command>SELECT</command>\n    <DatabaseName>master</DatabaseName>\n    <last_wait_type>ASYNC_NETWORK_IO</last_wait_type>\n\
    \  </Session>\n</Sessions>\nListing 1-13\nGenerate a Name for the <row> Element\
    \ Results\n```"
  raw: '#### Using FOR XML RAW


    The simplest and easiest to understand of the `FOR XML` modes is `FOR XML RAW`.
    This mode will transform each row in a relational result set into an element within
    a flat XML document. Consider the query in Listing [1-5](#395785_2_En_1_Chapter.xhtml#PC5),
    which extracts data from `sys.dm_exec_sessions` and `sys.dm_exec_requests`.


    ```

    SELECT

    ExecSessions.session_id

    , ExecSessions.login_name

    , ExecSessions.host_name

    , ExecSessions.status

    , ExecRequests.command

    , DB_NAME(ExecRequests.database_id) AS DatabaseName

    , ExecRequests.last_wait_type

    FROM sys.dm_exec_sessions ExecSessions

    INNER JOIN sys.dm_exec_requests ExecRequests

    ON ExecSessions.session_id = ExecRequests.session_id

    WHERE ExecSessions.is_user_process = 1

    Listing 1-5

    Extract Session Information

    ```


    When running this query, your results will vary depending on your environment
    and what activity there currently is on the instance. When I ran it, it returned
    the results shown in Figure [1-1](#395785_2_En_1_Chapter.xhtml#Fig1).


    ![](images/395785_2_En_1_Chapter/395785_2_En_1_Fig1_HTML.jpg)


    Table displaying database session information. Columns include session_id, login_name,
    host_name, status, command, DatabaseName, and task_wait_type. Two rows are shown:
    \\n\\n1\. session_id 52, login_name WIN-3B0U1U05D7\Administrator, host_name WIN-3B0U1U05D7,
    status running, command SELECT, DatabaseName master, task_wait_type SOS_WORK_DISPATCHER.\\n2\.
    session_id 55, login_name WIN-3B0U1U05D7\Administrator, host_name WIN-3B0U1U05D7,
    status running, command SELECT, DatabaseName master, task_wait_type ASYNC_NETWORK_IO.


    Figure 1-1


    Extract session information – results


    If we were to add a `FOR XML` clause using `RAW` mode, the results would be returned
    in the form of an XML fragment. The amended query in Listing [1-6](#395785_2_En_1_Chapter.xhtml#PC6)
    will return the XML document instead of a relational result set.


    ```

    SELECT

    ExecSessions.session_id

    , ExecSessions.login_name

    , ExecSessions.host_name

    , ExecSessions.status

    , ExecRequests.command

    , DB_NAME(ExecRequests.database_id) AS DatabaseName

    , ExecRequests.last_wait_type

    FROM sys.dm_exec_sessions ExecSessions

    INNER JOIN sys.dm_exec_requests ExecRequests

    ON ExecSessions.session_id = ExecRequests.session_id

    WHERE ExecSessions.is_user_process = 1

    FOR XML RAW

    Listing 1-6

    Extract Session Information Using FOR XML RAW

    ```


    Listing [1-7](#395785_2_En_1_Chapter.xhtml#PC7) illustrates the XML document that
    is returned.


    ```


    Listing 1-7

    Extract Session Information FOR XML RAW Results

    ```


    The first thing that we should note about this document is that it is an XML fragment,
    as opposed to a well-formed XML document, because there is no root node. The `<row>`
    element cannot be the root node, because it repeats. This means that we cannot
    validate the XML against a schema. Therefore, when using the `FOR XML` clause,
    you should consider using the `ROOT` keyword. This will force a root element,
    with a name of your choosing, to be created within the document. This is demonstrated
    in Listing [1-8](#395785_2_En_1_Chapter.xhtml#PC8).


    ```

    SELECT

    ExecSessions.session_id

    , ExecSessions.login_name

    , ExecSessions.host_name

    , ExecSessions.status

    , ExecRequests.command

    , DB_NAME(ExecRequests.database_id) AS DatabaseName

    , ExecRequests.last_wait_type

    FROM sys.dm_exec_sessions ExecSessions

    INNER JOIN sys.dm_exec_requests ExecRequests

    ON ExecSessions.session_id = ExecRequests.session_id

    WHERE ExecSessions.is_user_process = 1

    FOR XML RAW, ROOT(''Sessions'')

    Listing 1-8

    Adding a Root Node

    ```


    The resulting XML document can be seen in Listing [1-9](#395785_2_En_1_Chapter.xhtml#PC9).


    ```


    Listing 1-9

    Extract Session Information with Root Node Results

    ```


    The other important thing to notice about the document is that it is completely
    flat. There is no nesting. This means that the document’s granularity is at the
    level of session, which, if there are multiple requests for a session, does not
    make a lot of sense.


    It is also worth noting that all data is contained in attributes, as opposed to
    elements. We can alter this behavior by using the `ELEMENTS` keyword in the `FOR
    XML` clause. The `ELEMENTS` keyword will cause all data to be contained within
    child elements, as opposed to attributes. This is demonstrated in the modified
    query that can be found in Listing [1-10](#395785_2_En_1_Chapter.xhtml#PC10).


    ```

    SELECT

    ExecSessions.session_id

    , ExecSessions.login_name

    , ExecSessions.host_name

    , ExecSessions.status

    , ExecRequests.command

    , DB_NAME(ExecRequests.database_id) AS DatabaseName

    , ExecRequests.last_wait_type

    FROM sys.dm_exec_sessions ExecSessions

    INNER JOIN sys.dm_exec_requests ExecRequests

    ON ExecSessions.session_id = ExecRequests.session_id

    WHERE ExecSessions.is_user_process = 1

    FOR XML RAW, ELEMENTS, ROOT(''Sessions'')

    Listing 1-10

    Extract Session Information As Elements

    ```


    The well-formed XML document that is returned can be seen in Listing [1-11](#395785_2_En_1_Chapter.xhtml#PC11).


    ```


    WIN-J38I01U06D7\Administrator

    WIN-J38I01U06D7

    running

    SELECT

    master

    MEMORY_ALLOCATION_EXT


    WIN-J38I01U06D7\Administrator

    WIN-J38I01U06D7

    running

    SELECT

    master

    ASYNC_NETWORK_IO


    Listing 1-11

    Extract Session Information As Elements Results

    ```


    You can see that the element-centric document still returns one element, called
    `<row>`, per row in the relational result set. Instead of the data being contained
    in attributes, however, it is stored in the form of child elements. Each child
    element has been given the name of the column, from which the data has been returned.
    The data is still flat, however. There is no hierarchy based on logic or physical
    table structure.


    It is possible to give the `<row>` element a more meaningful name. In our example,
    the most meaningful name would be `<Session>`. Listing [1-12](#395785_2_En_1_Chapter.xhtml#PC12)
    demonstrates how we can use an optional argument in our `FOR XML` clause to generate
    this name for the element.


    ```

    SELECT

    ExecSessions.session_id

    , ExecSessions.login_name

    , ExecSessions.host_name

    , ExecSessions.status

    , ExecRequests.command

    , DB_NAME(ExecRequests.database_id) AS DatabaseName

    , ExecRequests.last_wait_type

    FROM sys.dm_exec_sessions ExecSessions

    INNER JOIN sys.dm_exec_requests ExecRequests

    ON ExecSessions.session_id = ExecRequests.session_id

    WHERE ExecSessions.is_user_process = 1

    FOR XML RAW(''Session''), ELEMENTS, ROOT(''Sessions'')

    Listing 1-12

    Generate a Name for the  Element

    ```


    The partial resulting XML document can be found in Listing [1-13](#395785_2_En_1_Chapter.xhtml#PC13).


    ```


    WIN-J38I01U06D7\Administrator

    WIN-J38I01U06D7

    running

    SELECT

    master

    MEMORY_ALLOCATION_EXT


    WIN-J38I01U06D7\Administrator

    WIN-J38I01U06D7

    running

    SELECT

    master

    ASYNC_NETWORK_IO


    Listing 1-13

    Generate a Name for the  Element Results

    ```'
  trans: "\n#### 使用 FOR XML RAW\n\n在 `FOR XML` 的各种模式中，`FOR XML RAW` 是最简单且最易于理解的。此模式会将关系结果集中的每一行转换为扁平\
    \ XML 文档中的一个元素。请考虑清单 1-5 中的查询，该查询从 `sys.dm_exec_sessions` 和 `sys.dm_exec_requests`\
    \ 中提取数据。\n\n```sql\nSELECT\nExecSessions.session_id\n, ExecSessions.login_name\n\
    , ExecSessions.host_name\n, ExecSessions.status\n, ExecRequests.command\n, DB_NAME(ExecRequests.database_id)\
    \ AS DatabaseName\n, ExecRequests.last_wait_type\nFROM sys.dm_exec_sessions ExecSessions\n\
    INNER JOIN sys.dm_exec_requests ExecRequests\nON ExecSessions.session_id = ExecRequests.session_id\n\
    WHERE ExecSessions.is_user_process = 1\nListing 1-5\n提取会话信息\n```\n\n运行此查询时，您的结果将根据您的环境以及实例上当前的活动情况而有所不同。当我运行它时，它返回了如图\
    \ 1-1 所示的结果。\n\n![](img/395785_2_En_1_Fig1_HTML.jpg)\n\n显示数据库会话信息的表格。列包括 `session_id`、`login_name`、`host_name`、`status`、`command`、`DatabaseName`\
    \ 和 `task_wait_type`。显示了两行：\n\n1.  `session_id` 52, `login_name` WIN-3B0U1U05D7\\\
    Administrator, `host_name` WIN-3B0U1U05D7, `status` running, `command` SELECT,\
    \ `DatabaseName` master, `task_wait_type` SOS_WORK_DISPATCHER.\n2.  `session_id`\
    \ 55, `login_name` WIN-3B0U1U05D7\\Administrator, `host_name` WIN-3B0U1U05D7,\
    \ `status` running, `command` SELECT, `DatabaseName` master, `task_wait_type`\
    \ ASYNC_NETWORK_IO.\n\n**图 1-1**\n提取会话信息 – 结果\n\n如果我们使用 `RAW` 模式添加一个 `FOR XML`\
    \ 子句，结果将以 XML 片段的形式返回。清单 1-6 中修改后的查询将返回 XML 文档而不是关系结果集。\n\n```sql\nSELECT\nExecSessions.session_id\n\
    , ExecSessions.login_name\n, ExecSessions.host_name\n, ExecSessions.status\n,\
    \ ExecRequests.command\n, DB_NAME(ExecRequests.database_id) AS DatabaseName\n\
    , ExecRequests.last_wait_type\nFROM sys.dm_exec_sessions ExecSessions\nINNER JOIN\
    \ sys.dm_exec_requests ExecRequests\nON ExecSessions.session_id = ExecRequests.session_id\n\
    WHERE ExecSessions.is_user_process = 1\nFOR XML RAW\nListing 1-6\n使用 FOR XML RAW\
    \ 提取会话信息\n```\n\n清单 1-7 展示了返回的 XML 文档。\n\n```xml\n清单 1-7\n提取会话信息 FOR XML RAW 结果\n\
    ```\n\n关于这个文档，我们首先需要注意它是一个 XML 片段，而不是一个格式良好的 XML 文档，因为它没有根节点。`<row>` 元素不能作为根节点，因为它会重复。这意味着我们无法根据架构验证\
    \ XML。因此，在使用 `FOR XML` 子句时，应考虑使用 `ROOT` 关键字。这将强制在文档中创建一个根元素，名称由您选择。清单 1-8 展示了这一点。\n\
    \n```sql\nSELECT\nExecSessions.session_id\n, ExecSessions.login_name\n, ExecSessions.host_name\n\
    , ExecSessions.status\n, ExecRequests.command\n, DB_NAME(ExecRequests.database_id)\
    \ AS DatabaseName\n, ExecRequests.last_wait_type\nFROM sys.dm_exec_sessions ExecSessions\n\
    INNER JOIN sys.dm_exec_requests ExecRequests\nON ExecSessions.session_id = ExecRequests.session_id\n\
    WHERE ExecSessions.is_user_process = 1\nFOR XML RAW, ROOT('Sessions')\nListing\
    \ 1-8\n添加根节点\n```\n\n结果 XML 文档可以在清单 1-9 中看到。\n\n```xml\n清单 1-9\n带根节点的提取会话信息结果\n\
    ```\n\n关于文档的另一个重要注意事项是它是完全扁平的。没有嵌套。这意味着文档的粒度在会话级别，如果一个会话有多个请求，这就不那么合理了。\n\n还值得注意的是，所有数据都包含在属性中，而不是元素中。我们可以通过在\
    \ `FOR XML` 子句中使用 `ELEMENTS` 关键字来改变这种行为。`ELEMENTS` 关键字将使所有数据都包含在子元素中，而不是属性中。清单\
    \ 1-10 中修改后的查询展示了这一点。\n\n```sql\nSELECT\nExecSessions.session_id\n, ExecSessions.login_name\n\
    , ExecSessions.host_name\n, ExecSessions.status\n, ExecRequests.command\n, DB_NAME(ExecRequests.database_id)\
    \ AS DatabaseName\n, ExecRequests.last_wait_type\nFROM sys.dm_exec_sessions ExecSessions\n\
    INNER JOIN sys.dm_exec_requests ExecRequests\nON ExecSessions.session_id = ExecRequests.session_id\n\
    WHERE ExecSessions.is_user_process = 1\nFOR XML RAW, ELEMENTS, ROOT('Sessions')\n\
    Listing 1-10\n提取会话信息为元素\n```\n\n返回的格式良好的 XML 文档可以在清单 1-11 中看到。\n\n```xml\n<Sessions>\n\
    \  <row>\n    <session_id>52</session_id>\n    <login_name>WIN-J38I01U06D7\\Administrator</login_name>\n\
    \    <host_name>WIN-J38I01U06D7</host_name>\n    <status>running</status>\n  \
    \  <command>SELECT</command>\n    <DatabaseName>master</DatabaseName>\n    <last_wait_type>MEMORY_ALLOCATION_EXT</last_wait_type>\n\
    \  </row>\n  <row>\n    <session_id>55</session_id>\n    <login_name>WIN-J38I01U06D7\\\
    Administrator</login_name>\n    <host_name>WIN-J38I01U06D7</host_name>\n    <status>running</status>\n\
    \    <command>SELECT</command>\n    <DatabaseName>master</DatabaseName>\n    <last_wait_type>ASYNC_NETWORK_IO</last_wait_type>\n\
    \  </row>\n</Sessions>\n清单 1-11\n提取会话信息为元素结果\n```\n\n您可以看到，以元素为中心的文档仍然为关系结果集中的每一行返回一个名为\
    \ `<row>` 的元素。但是，数据不是包含在属性中，而是以子元素的形式存储。每个子元素都被赋予了从中返回数据的列的名称。然而，数据仍然是扁平的。没有基于逻辑或物理表结构的层次结构。\n\
    \n可以为 `<row>` 元素赋予一个更有意义的名称。在我们的例子中，最有意义的名称是 `<Session>`。清单 1-12 展示了如何在 `FOR XML`\
    \ 子句中使用可选参数来为元素生成此名称。\n\n```sql\nSELECT\nExecSessions.session_id\n, ExecSessions.login_name\n\
    , ExecSessions.host_name\n, ExecSessions.status\n, ExecRequests.command\n, DB_NAME(ExecRequests.database_id)\
    \ AS DatabaseName\n, ExecRequests.last_wait_type\nFROM sys.dm_exec_sessions ExecSessions\n\
    INNER JOIN sys.dm_exec_requests ExecRequests\nON ExecSessions.session_id = ExecRequests.session_id\n\
    WHERE ExecSessions.is_user_process = 1\nFOR XML RAW('Session'), ELEMENTS, ROOT('Sessions')\n\
    Listing 1-12\n为 <row> 元素生成名称\n```\n\n部分结果 XML 文档可以在清单 1-13 中找到。\n\n```xml\n<Sessions>\n\
    \  <Session>\n    <session_id>52</session_id>\n    <login_name>WIN-J38I01U06D7\\\
    Administrator</login_name>\n    <host_name>WIN-J38I01U06D7</host_name>\n    <status>running</status>\n\
    \    <command>SELECT</command>\n    <DatabaseName>master</DatabaseName>\n    <last_wait_type>MEMORY_ALLOCATION_EXT</last_wait_type>\n\
    \  </Session>\n  <Session>\n    <session_id>55</session_id>\n    <login_name>WIN-J38I01U06D7\\\
    Administrator</login_name>\n    <host_name>WIN-J38I01U06D7</host_name>\n    <status>running</status>\n\
    \    <command>SELECT</command>\n    <DatabaseName>master</DatabaseName>\n    <last_wait_type>ASYNC_NETWORK_IO</last_wait_type>\n\
    \  </Session>\n</Sessions>\n清单 1-13\n为 <row> 元素生成名称的结果\n```\n"
- fmt: '## Using FOR XML AUTO


    Unlike `FOR XML RAW`, `FOR XML AUTO` is able to return nested results. It is also
    refreshingly simple to use, because it will automatically nest the data, based
    on the joins within your query. The modified query in Listing 1-14 uses `AUTO`
    mode to return a hierarchical XML document.


    ```sql

    SELECT

    ExecSessions.session_id

    , ExecSessions.login_name

    , ExecSessions.host_name

    , ExecSessions.status

    , ExecRequests.command

    , DB_NAME(ExecRequests.database_id) AS DatabaseName

    , ExecRequests.last_wait_type

    FROM sys.dm_exec_sessions ExecSessions

    INNER JOIN sys.dm_exec_requests ExecRequests

    ON ExecSessions.session_id = ExecRequests.session_id

    WHERE ExecSessions.is_user_process = 1

    FOR XML AUTO

    Listing 1-14

    Using FOR XML AUTO

    ```


    The XML fragment that is returned by this query can be seen in Listing 1-15.


    ```xml

    Listing 1-15

    Extract Session Information with FOR XML AUTO Results

    ```


    You can see that when `AUTO` mode is used, the `FOR XML` clause has automatically
    nested the data based on the `JOIN` clauses within the query. Each element has
    been assigned a name based on the table alias of the table from which it was retrieved.
    Just as with `RAW` mode, we are able to use the `ROOT` keyword to add a root node,
    to make the document well-formed, or the `ELEMENTS` keyword to make the document
    element centric.


    ## Using FOR XML PATH


    Sometimes you need more control over the shape of the resultant XML document than
    can be provided by either `RAW` mode or `AUTO` mode. When you have a requirement
    to define custom heuristics, `PATH` mode can be used. `PATH` mode offers great
    flexibility, as it allows you to define the location of each node within the resultant
    XML. This is achieved by specifying how each column in the query maps to the XML,
    with the use of column names or aliases.


    If a column alias begins with the `@` symbol, an attribute will be created. If
    no `@` symbol is used, the column will map to an element. Columns that will become
    attributes must be specified before columns that will be sibling nodes but defined
    as elements.


    If you wish to define a node’s location in the hierarchy, you can use the `/`
    symbol. For example, if you require the host name to appear nested under an element
    called `<Session>`, you can specify that column alias as `''/Session/HostName''`
    for the `host_name` column.


    `PATH` mode allows you to create highly customized and complex structures. For
    example, imagine that you have a requirement to create an XML document in the
    format displayed in Listing 1-16. Here, you will notice that there is a root node
    called `<Sessions>`, the next node in the hierarchy is `<UserSession>`. This is
    a repeating element, with a new occurrence for every active session on the instance.
    Within this element, the Session ID is displayed as an attribute, while the Login
    name, Host name, and Status are all child elements.


    There is also a complex child element called `<Request>` which contains other
    child elements, containing the command type, the reason for the last wait, and
    Database. Database has its own child element, containing the Database name. This
    would be helpful if we wanted to add another tag, such as Database ID.


    ```xml


    WIN-J38I01U06D7\Administrator

    WIN-J38I01U06D7

    running


    SELECT


    master


    SOS_WORK_DISPATCHER


    WIN-J38I01U06D7\Administrator

    WIN-J38I01U06D7

    running


    SELECT


    master


    ASYNC_NETWORK_IO


    Listing 1-16

    Desired Results for FOR XML PATH

    ```


    Queries to build XML documents using `FOR XML PATH` can seem a little complicated
    at first, but once you understand the principles, they become fairly straightforward.
    Let’s examine each requirement and how we can achieve the required shape.


    First, we will need a root node called `<Sessions>`, and we will also have to
    rename the `<row>` element to `<UserSession>`. This can be achieved in the same
    way as when we were exploring `RAW` mode, using the optional argument for the
    `<row>` element and the `ROOT` keyword in the `FOR XML` clause and the root node,
    as shown in Listing 1-17.


    ```sql

    FOR XML PATH(''UserSession''), ROOT(''Sessions'')

    Listing 1-17

    Creating a Root and Naming the  Element with FOR XML PATH

    ```


    Next, in the `SELECT` list, we simply need to specify where each of the tags should
    reside in our hierarchy and if they should be treated as elements or attributes.
    The technique for this is shown in Listing 1-18. Note that `SessionID` is prefixed
    with an `@` symbol to make it an attribute and that we have created the additional
    level of nesting for `DatabaseName`, simply by adding another level to the requested
    hierarchy.


    ```sql

    SELECT

    ExecSessions.session_id                      ''@SessionID''

    , ExecSessions.login_name                      ''LoginName''

    , ExecSessions.host_name                       ''HostName''

    , ExecSessions.status                          ''Status''

    , ExecRequests.command                         ''Request/Command''

    , DB_NAME(ExecRequests.database_id)            ''Request/Database/Name''

    , ExecRequests.last_wait_type                  ''Request/LastWaitReason''

    Listing 1-18

    Defining the SELECT List

    ```


    Pulling these techniques together, we have the complete query to generate our
    desired result set in Listing 1-19.


    ```sql

    SELECT

    ExecSessions.session_id ''@SessionID''

    , ExecSessions.login_name ''LoginName''

    , ExecSessions.host_name ''HostName''

    , ExecSessions.status ''Status''

    , ExecRequests.command ''Request/Command''

    , DB_NAME(ExecRequests.database_id) ''Request/Database/Name''

    , ExecRequests.last_wait_type ''Request/LastWaitReason''

    FROM sys.dm_exec_sessions ExecSessions

    INNER JOIN sys.dm_exec_requests ExecRequests

    ON ExecSessions.session_id = ExecRequests.session_id

    WHERE ExecSessions.is_user_process = 1

    FOR XML PATH(''UserSession''), ROOT(''Sessions'')

    Listing 1-19

    The Final Query

    ```'
