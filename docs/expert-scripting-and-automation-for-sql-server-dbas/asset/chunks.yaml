- fmt: '# Dynamic Index Rebuilds


    SQL Server does not provide out-of-the-box functionality for intelligently rebuilding
    indexes. If you use a Maintenance Plan to rebuild or reorganize all indexes in
    your database, every index will be rebuilt or reorganized, whether it needs it
    or not. Unfortunately, this can be a resource-intensive and time-consuming process,
    and it may be that only a fraction of your indexes need to be rebuilt.


    If you have read Chapters [4](#395785_2_En_4_Chapter.xhtml) and [5](#395785_2_En_5_Chapter.xhtml),
    you will have noticed that we use a dynamic index rebuild script. This works around
    this issue, so you can use index-related metadata to evaluate the fragmentation
    level in each index and take the appropriate action (rebuild, reorganize, or leave
    alone). As mentioned in previous chapters, we will take the time here to explain
    how the script works.


    The script uses the `sys.dm_db_index_physical_stats` dynamic management function.
    This function returns fragmentation statistics for indexes, with one row returned
    for every level of every index within scope (based on the input parameters). The
    parameters required to call this function are detailed in Table [7-6](#395785_2_En_7_Chapter.xhtml#Tab6).


    ## Table 7-6


    Parameters Required by `sys.dm_db_index_physical_stats`


    | Parameter | Description |

    | --- | --- |

    | `Database_ID` | The ID of the database that the function will run against. If
    you do not know it, you can pass in `DB_ID(''DatabaseName'')` |

    | `Object_ID` | The Object ID of the table that you want to run the function against.
    If you do not know it, pass in `OBJECT_ID(''TableName'')`. Pass `NULL` to run
    the function against all tables in the database |

    | `Index_ID` | The index ID of the index you want to run the function against.
    `1` is always the ID of a table’s clustered index. Pass `NULL` to run the function
    against all indexes on the table |

    | `Partition_Number` | The ID of the partition that you want to run the function
    against. Pass `NULL` if you want to run the function against all partitions or
    if the table is not partitioned |

    | `Mode` | Acceptable values are `LIMITED`, `SAMPLED`, or `DETAILED`:<br>• `LIMITED`
    only scans the non-leaf levels of an index<br>• `SAMPLED` scans 1% of pages in
    the table, unless the table or partition has 10,000 pages or fewer, in which case
    `DETAILED` mode is used<br>• `DETAILED` mode scans 100% of the pages in the table.
    For very large tables, `SAMPLED` is often preferred, due to the length of time
    it can take to return data in `DETAILED` mode |


    > Tip

    >

    > This book assumes that you are familiar with B-Tree indexes and fragmentation
    (both internal and external). If you require a refresher, full details can be
    found in the Apress title *Pro SQL Server 2022 Administration*, which can be found
    at link.springer.com/book/10.1007/978-1-4842-8864-1, or *100 SQL Server Mistakes
    and How to Avoid Them* at manning.com/books/100-sql-server-mistakes-and-how-to-avoid-them.


    The columns returned by `sys.dm_db_index_physical_stats` are detailed in Table
    [7-7](#395785_2_En_7_Chapter.xhtml#Tab7).


    ## Table 7-7


    Columns Returned by `sys.dm_db_index_physical_stats`


    | Column | Description |

    | --- | --- |

    | `database_id` | The database ID of the database, in which the index resides
    |

    | `object_id` | The object ID of the table or indexed view to which the index
    is associated |

    | `index_id` | The ID of the index within the table or indexed view. The ID is
    only unique within its associated parent object. `0` is always the index ID of
    a heap, and `1` is always the index ID of a clustered index |

    | `partition_number` | The partition number. This always returns `1` for non-partitioned
    tables and indexed views |

    | `index_type_desc` | Text defining the index types. Possible return values are
    as follows:<br>• `HEAP`<br>• `CLUSTERED INDEX`<br>• `NONCLUSTERED INDEX`<br>• `PRIMARY
    XML INDEX`<br>• `EXTENDED INDEX`<br>• `XML INDEX` (Referring to a secondary XML
    index)<br>There are also some index types used for internal use only. These are
    as follows:<br>• `COLUMNSTORE MAPPING INDEX`<br>• `COLUMNSTORE DELETEBUFFER INDEX`<br>• `COLUMNSTORE
    DELETEBITMAP INDEX` |

    | `alloc_unit_type_desc` | Text describing the type of allocation unit that the
    index level resides in |

    | `index_depth` | The number of levels that the index consists of. If `1` is returned,
    the index is either a heap or LOB data or row overflow data |

    | `index_level` | The level of the index that is represented by the row returned
    |

    | `avg_fragmentation_in_percent` | The average percentage of external fragmentation
    within the index level (lower is better) |

    | `fragment_count` | The number of fragments within the index level |

    | `avg_fragment_size_in_pages` | The average size of each fragment, represented
    as a count of 8KB pages |

    | `page_count` | For in-row data, the page count represents the number of pages
    at the level of the index that is represented by the row<br>For a heap, the page
    count represents the number of pages within the `IN_ROW_DATA` allocation unit<br>For
    LOB or row overflow data, the page count represents the number of pages within
    the allocation unit |

    | `avg_page_space_used_in_percent` | The average amount of internal fragmentation
    within the index level that the row represents (higher is better…usually) |

    | `record_count` | For in-row data, the record count represents the number of
    records at the level of the index that is represented by the row<br>For a heap,
    the record count represents the number of records within the `IN_ROW_DATA` allocation
    unit<br>For LOB or row overflow data, the record count represents the number of
    records within the allocation unit |

    | `ghost_record_count` | A count of logically deleted rows that are awaiting physical
    deletion by the ghost cleanup task |

    | `version_ghost_record_count` | The number of rows that have been retained by
    a transaction using the snapshot isolation level |

    | `min_record_size_in_bytes` | The size of the smallest record, expressed in bytes
    |

    | `max_record_size_in_bytes` | The size of the largest record, expressed in bytes
    |

    | `avg_record_size_in_bytes` | The average record size, expressed in bytes |

    | `forwarded_record_count` | The number of records that have forwarding pointers
    to other locations. Only applies to heaps. If the object is an index, `NULL` is
    returned |

    | `compressed_page_count` | A count of the compressed pages within the index level
    represented by the row |

    | `hobt_id` | This column only applies to columnstore indexes. It represents the
    ID of the heaps or B-Trees that are used to track internal columnstore data |

    | `column_store_delete_buffer_state` | This column only applies to columnstore
    indexes. It represents the state of the columnstore delete buffer |

    | `column_store_delete_buff_state_desc` | This column only applies to columnstore
    indexes. It is a textual description of the value returned in the `column_store_delete_buffer_state`
    column |

    | `version_record_count` | The number of row version records being maintained
    for use with Accelerated Database Recovery |

    | `inrow_version_record_count` | The number of version records kept in-row for
    use with Accelerated Database Recovery |

    | `inrow_diff_version_record_count` | The number of version records kept in the
    form of differences for Accelerated Database Recovery |

    | `total_inrow_version_payload_size_in_bytes` | The size of the indexes in-row
    version records. Expressed in bytes |

    | `offrow_regular_version_record_count` | The number of version records kept outside
    of the data row |

    | `offrow_long_term_version_record_count` | The number of records kept in the
    online index version store |'
