    ```powershell\n$params = @{\n    SqlInstance = \"localhost\"\n    Database   \
    \ = \"Inventory\"\n    Query       = \"\n        CREATE TABLE dbo.MaintenanceTasks\
    \ (\n            MaintenanceTaskID INT            NOT NULL    PRIMARY KEY CLUSTERED,\n\
    \            ServerID          INT            NOT NULL    FOREIGN KEY REFERENCES\
    \ Server(ServerID),\n            InstanceID        INT            NOT NULL   \
    \ FOREIGN KEY REFERENCES Instance(InstanceID),\n            Task             \
    \ NVARCHAR(32)   NOT NULL,\n            LastExecDate      DATETIME       NULL,\n\
    \            Schedule          NVARCHAR(8)    NOT NULL,\n            ScheduleMinutes\
    \   AS (CASE WHEN [Schedule]='Daily' THEN (1440) WHEN [Schedule]='Weekly' THEN\
    \ (10080) ELSE [Schedule] END) PERSISTED,\n            InProgress        BIT \
    \           NOT NULL,\n            LastExecStatus    NCHAR(7)       NOT NULL,\n\
    \            TaskDisabled      BIT            NOT NULL\n        ) ;\n        CREATE\
    \ UNIQUE NONCLUSTERED INDEX ServerID_InstanceID\n            ON dbo.MaintenanceTasks(ServerID,\
    \ InstanceID, Task) ;\n    \"\n}\nInvoke-DbaQuery @params\n```\n**代码清单 10-2**\n\
    创建 MaintenanceTasks 表\n\n最后，我们将创建 `MaintenanceSchedules` 视图（代码清单 10-3），它将基于基础表，并计算每个维护任务应在每个“服务器\\\
    实例”上运行的时间。请特别注意计算 `NextExecDate` 列以实现此功能。同时，请特别注意 `StartTime` 和 `EndTime` 列。这些列源自\
    \ `MaintenanceWindows` 表，与该表的连接基于查询执行当天的星期数，这是通过将 `DayOfWeekNumber` 列与 `WEEKDAY`\
    \ 日期部分进行比较来实现的。\n\n```powershell\n$params = @{\n    SqlInstance = \"localhost\"\
    \n    Database    = \"Inventory\"\n    Query       = \"\n        CREATE VIEW dbo.MaintenanceSchedule\n\
    \        AS\n        SELECT\n            S.ServerName + '\\' + I.InstanceName\
    \ AS ServerInstance\n            , MT.Task\n            , MT.LastExecDate\n  \
    \          , CASE\n                WHEN LastExecDate IS NULL\n               \
    \ THEN GETDATE()\n                ELSE DATEADD(MINUTE,ScheduleMinutes,LastExecDate)\n\
    \            END AS NextExecDate\n            , MT.InProgress\n            , MT.TaskDisabled\n\
    \            , MW.StartTime\n            , MW.EndTime\n            , S.ServerID\n\
    \            , I.InstanceID\n        FROM dbo.MaintenanceTasks MT\n        INNER\
    \ JOIN dbo.Server S\n            ON S.ServerID = MT.ServerID\n        INNER JOIN\
    \ dbo.Instance I\n            ON I.InstanceID = MT.InstanceID\n        INNER JOIN\
    \ dbo.MaintenanceWindows MW\n            ON MW.ServerID = S.ServerID\n       \
    \     AND MW.InstanceID = I.InstanceID\n            AND (SELECT DATEPART(dw,GETDATE()))\
    \ = MW.DayOfWeekNumber\n    \"\n}\nInvoke-DbaQuery @params\n```\n**代码清单 10-3**\n\
    创建 MaintenanceSchedules 视图\n"
