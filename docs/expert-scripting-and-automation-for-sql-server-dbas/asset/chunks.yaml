- fmt: '# 8. Building an Inventory Database


    ## Table 7-9


    Columns Returned by `sys.configurations`


    | Column | Description |

    | --- | --- |

    | `configuration_id` | The primary key |

    | `name` | The name of the setting |

    | `value` | The currently configured value of the setting |

    | `minimum` | The minimum value that can be configured for the setting |

    | `maximum` | The maximum value that can be configured for the setting |

    | `value_in_use` | The value that is currently in use. This can differ from the
    value column, if the setting has been changed but the instance has not been reconfigured
    or restarted |

    | `description` | A description of the setting |

    | `is_dynamic` | Specifies if the setting is dynamic:<br>• `1` indicates that
    the setting can be applied using `RECONFIGURE`<br>• `0` indicates that the instance
    must be restarted |

    | `is_advanced` | Specifies if the setting can only be changed when show advanced
    options is set to `1`:<br>• `0` indicates it is not an advanced option<br>• `1`
    indicates that it is an advanced option |


    The parameters accepted by `sp_configure` are detailed in Table 7-10.


    ## Table 7-10


    Parameters Accepted by `sp_configure`


    | Parameter | Description |

    | --- | --- |

    | `@configname` | The name of the setting to change |

    | `@configvalue` | The value to be configured for the setting |


    ## Summary


    Discussion of all metadata objects available within SQL Server would be worthy
    of several volumes in its own right. Each area of metadata opens up opportunities
    for you to automate maintenance routines within your environment, which should
    be the ambition of every DBA. The configurable options within `sp_configure` alone
    will give you a small taste of how vast the possibilities are. I strongly encourage
    you to explore SQL Server metadata and how you can use it to automate the mundane,
    within your own enterprise.


    There are some classic opportunities which will stand out to DBAs in any organization,
    however, such as the ability to rebuild only those indexes which require it, instead
    of rebuilding all indexes in every maintenance window. `sys.dm_db_index_physical_stats`
    can be harnessed to provide a mechanism for achieving this.


    DBAs should always seriously consider enabling Query Store on their databases,
    and in SQL Server 2022, this is the default option. You may even choose to create
    a maintenance routine, using some of the techniques you have learned in this book,
    to have a centralized script that will run against every database in your enterprise,
    to enable the feature. Once enabled, a raft of possibilities opens up, such as
    the example provided here, of removing ad hoc plans from your instances. Many
    more complex possibilities exist, and some of these can be harnessed by querying
    the XML, in which the raw Query Store data is stored. In some of these scenarios,
    you will want to use the `CROSS` and `OUTER APPLY` operators in conjunction with
    this to pull useful metadata in the most efficient way. The `APPLY` operator will
    be particularly useful when you wish to add query text to your results. Please
    refer to Chapter 1 for a primer on how to use these features.


    Scripts utilizing a combination of PowerShell and T-SQL can also be used to enforce
    policies, such as hardening standards, in scenarios where Policy-Based Management
    can report but not enforce the required standards. This is especially helpful
    in large enterprises, where it is challenging to track multiple servers. Chapter
    10 will discuss how we can centralize our maintenance routines. Alternatively,
    you could use the techniques discussed in Chapter 9 to make it part of your standard
    build, so that it is enforced through configuration management.


    You may be wondering why a book discussing PowerShell automation for DBA includes
    a chapter on building an inventory database. The answer to this is simple – an
    inventory database is critical to the success of your automation strategy. Despite
    being a relatively small and simple database, an inventory database will act as
    your hub for orchestrating your automation efforts throughout the enterprise.


    Even if your company has a full-fledged Configuration Management Database (CMDB),
    which includes databases, the astute DBA will still have their own inventory system.
    There are two reasons for this. Firstly, it allows a DBA to have more control
    over their own database, limiting the chances of the data becoming stale or dirty.


    From the perspective of PowerShell and automation, however, having full control
    over the system also means that you can easily extend and enhance it, so that
    you can also easily grow and extend your automation solution. Because the database
    is a DBA-owned SQL Server database, as opposed to a hidden database in a large
    CMDB, which can often only be accessed via APIs, it allows you to use the database
    to control your automated maintenance.


    Your automated build will keep the database up to date by inserting the details
    of every new SQL Server instance that is built in your enterprise. The database
    can then feed automated maintenance routines that you create, for example, providing
    a list of SQL Server instances and databases that should be iterated by maintenance
    routines, such as `DBCC CHECKDB`, or index rebuilds.


    Centralized maintenance techniques will be discussed in more detail in Chapter
    10. In this chapter, we will focus on designing and building the inventory database
    itself. We will start by discussing an appropriate platform design for the database,
    before discussing the logical and physical database design. Finally, we will explore
    how to create the database.'
