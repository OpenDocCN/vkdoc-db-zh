- fmt: "### Production Readiness\n\nFinally, you may wish to add some defensive coding\
    \ to your script in order to make it production ready. Although PowerShell has\
    \ `try`/`catch` functionality, it cannot be used here due to `setup.exe` being\
    \ an external application, which does not return exit codes in a manner understood\
    \ by PowerShell. Therefore, the most effective technique for ensuring the smooth\
    \ running of this script is to enforce mandatory parameters.\n\nThe code in Listing\
    \ 6-13 is a modified version of the script, which we will refer to as `SQLAutoInstall3.ps1`.\
    \ This version of the script uses the `Parameter` keyword to set the `Mandatory`\
    \ attribute to `$true` for each of the parameters. This is important because if\
    \ the person running this script were to omit any of the parameters, or if there\
    \ was a typo in the parameter name, the installation would fail. This provides\
    \ a fail-safe by ensuring that all of the parameters have been entered before\
    \ allowing the script to run. The additional change that we have made in this\
    \ script is to add annotations before and after each step, so that if the script\
    \ does fail, we can easily see where the error occurred.\n\n```powershell\nparam(\n\
    \    [Parameter(Mandatory=$true)]\n    [string]       $InstanceName,\n    [PSCredential]\
    \ $SQLServiceAccountCredential = (Get-Credential -Message 'Enter the SQL service\
    \ account credential'),\n    [PSCredential] $AgentServiceAccountCredential = (Get-Credential\
    \ -Message 'Enter the SQL Server Agent service account credential')\n)\n# Initialize\
    \ ConnectionString variable\nWrite-Host 'Initialise variables...'\n$serverName\
    \ = $env:computername\n$connectionString = '{0}\\{1}' -f $serverName, $InstanceName\n\
    Write-Host 'Initialise variables complete'\n#Install the instance\nWrite-Host\
    \ 'Install the instance...'\n$params = @(\n    '/INSTANCENAME=\"{0}\"' -f $InstanceName\n\
    \    '/SQLSVCACCOUNT=\"{0}\"' -f $SQLServiceAccountCredential.Username\n    '/SQLSVCPASSWORD=\"\
    {0}\"' -f $SQLServiceAccountCredential.GetNetworkCredential().Password\n    '/AGTSVCACCOUNT=\"\
    {0}\"' -f $AgentServiceAccountCredential.Username\n    '/AGTSVCPASSWORD=\"{0}\"\
    ' -f$AgentServiceAccountCredential.GetNetworkCredential().Password\n    '/CONFIGURATIONFILE=\"\
    C:\\SQL2022\\Configuration2.ini\"'\n)\nStart-Process -FilePath 'C:\\SQLServerSetup\\\
    SETUP.EXE' -ArgumentList $params -Wait -NoNewWindow\nWrite-Host 'Instance installation\
    \ complete'\n# Configure OS settings\nWrite-Host 'Configure OS settings...'\n\
    Start-Process -FilePath 'C:\\Windows\\System32\\powercfg.exe' -ArgumentList '-setactive\
    \ 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c' -Wait -NoNewWindow\nWrite-Host 'High Performance\
    \ power plan configured'\nSet-ItemProperty -Path HKLM:\\SYSTEM\\CurrentControlSet\\\
    Control\\PriorityControl\\ -Name Win32PrioritySeparation -Value 24\nWrite-Host\
    \ 'Optimise for background services configured'\n# Run smoke tests\nWrite-Host\
    \ 'Run smoke tests...'\nGet-Service -DisplayName ('*{0}*' -f $InstanceName)\n\
    Write-Host 'Service running check complete'\nInvoke-SqlCmd -Serverinstance $connectionString\
    \ -Query \"SELECT @@SERVERNAME\" -TrustServerCertificate\nWrite-Host 'Instance\
    \ accessibility check complete'\n```\n\nThe `SQLAutoInstall3.ps1` script has been\
    \ run, but without any parameters specified. In previous versions of the script,\
    \ PowerShell would have gone ahead and executed the code, only for `setup.exe`\
    \ to fail, since no values were specified for the required parameters. In this\
    \ version, however, you can see that you will be prompted to enter a value for\
    \ each parameter in turn. It is achieved in two different ways – either via the\
    \ `Mandatory` attribute or by providing a default, which in this case happens\
    \ to be a command that will prompt the user to enter the missing credential.\n\
    \nWhen running the script, you will notice that before and after each phase of\
    \ the script execution, our annotations are shown. This can aid you in responding\
    \ to errors, because you can easily see which command caused an issue before you\
    \ even begin to decipher any error messages that may be displayed.\n\n### Automated\
    \ Installation with DSC\n\nIn Chapter 3, we discussed how to configure the Windows\
    \ operating system using DSC. In this chapter, we will expand that configuration,\
    \ so that it also installs our SQL Server instance. To achieve this, we will need\
    \ to install the `SqlServerDSC` module, and this action can be performed using\
    \ the command in Listing 6-14. This must be done in PowerShell 5.\n\n```powershell\n\
    Install-Module SqlServerDsc\n```\n\nWe can now expand the configuration that we\
    \ created in Chapter 3, with a resource that will ensure that a SQL Server instance\
    \ called `DSCInstance` is created, using the Developer Edition. This resource\
    \ is shown in Listing 6-15. You will notice that we pass the desired name of the\
    \ instance, the source path of the SQL Server installation media, and the product\
    \ key as strings. We pass `SQLENGINE` into the `Features` parameter, but if we\
    \ wanted to install multiple components, this string would consist of a comma-separated\
    \ list. We also pass an array of Windows logins that we want to be added to the\
    \ `sysadmins` fixed server role. In our case, we are just passing one login –\
    \ `Administrator`.\n\nNote: You should change the source path to reflect the location\
    \ of your SQL Server installation media.\n\n```powershell\nSqlSetup 'InstallInstance'\
    \ {\n    InstanceName = 'DSCInstance'\n    Features = 'SQLENGINE'\n    SourcePath\
    \ = 'C:\\SQL Media'\n    SQLSysAdminAccounts = @('Administrator')\n    ProductKey\
    \ = '22222-00000-00000-00000-00000'\n}\n```\n\nTip: The product key we pass is\
    \ the product key for the Developer Edition, and it means that this is the edition\
    \ that will be installed. If we passed out Enterprise or Standard Edition product\
    \ keys, this would change the edition that is installed.\n\nSo, let’s examine\
    \ Listing 6-16, which demonstrates what our updated configuration will look like,\
    \ with the new resource added. There are two important things to note about the\
    \ configuration. The first is that we have changed the service that the `SQLServerService`\
    \ resource is managing, from the default instance to the `DSCInstance` instance,\
    \ as this is the instance we will be working with. The second important aspect\
    \ to note is that the syntax `DependsOn = '[SqlSetup]InstallInstance'` has been\
    \ added to the end of the `SQLServerService` resource. This is because we do not\
    \ want the configuration to try to ensure that the SQL Server Database Engine\
    \ service is started, before the instance is installed. When the configuration\
    \ is compiled, there is no guarantee of the order in which resources will be configured.\
    \ Therefore, if there is a dependency between resources, we should always use\
    \ `DependsOn` to ensure the correct order.\n\n```powershell\nConfiguration WindowsConfig\
    \ {\n    Import-DscResource -ModuleName 'PSDesiredStateConfiguration'\n    Import-DscResource\
    \ -ModuleName 'SqlServerDsc'\n    Node 'localhost' {\n        File CreateCertificateBackupsFolder\
    \ {\n            Ensure = \"Present\"\n            Type = \"Directory\"\n    \
    \        DestinationPath = \"C:\\CertificateBackups\"\n        }\n        Registry\
    \ OptimizeForBackgroundServices {\n            Ensure      = \"Present\"\n   \
    \         Key         = \" HKEY_LOCAL_MACHINE:\\SYSTEM\\CurrentControlSet\\Control\\\
    PriorityControl\"\n            ValueName   = \"Win32PrioritySeparation\"\n   \
    \         ValueData   = 24\n            ValueType   = 'Dword'\n        }\n   \
    \     SqlSetup 'InstallInstance' {\n            InstanceName        = 'DSCInstance'\n\
    \            Features            = 'SQLENGINE'\n            SourcePath       \
    \   = 'C:\\SQL Media'\n            SQLSysAdminAccounts = @('Administrator')\n\
    \            ProductKey          = '22222-00000-00000-00000-00000'\n        }\n\
    \        Service SQLServerService\n        {\n            Name        = 'MSSQL$DSCInstance'\n\
    \            StartupType = 'Automatic'\n            State       = 'Running'\n\
    \            DependsOn    = '[SqlSetup]InstallInstance'\n        }\n    }\n}\n\
    WindowsConfig\n```"
