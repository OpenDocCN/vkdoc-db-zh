    | `is_parallel_plan` | 指示计划是否是并行化的：<br>• `0` 表示不是并行计划<br>• `1` 表示是并行计划 |

    | `is_forced_plan` | 指示计划是否是强制的：<br>• `0` 表示未强制<br>• `1` 表示已强制 |

    | `is_natively_compiled` | 指示计划是否包含原生编译的存储过程：<br>• `0` 表示不包含<br>• `1` 表示包含 |

