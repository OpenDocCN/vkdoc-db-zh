  raw: '### Piping and Filtering


    If you have a T-SQL background, rather than a programming background, the idea
    of piping may be new to you. In PowerShell, piping is the process of passing the
    results of one command into another command. Piping is a key concept of PowerShell
    and one of the things that makes it so powerful.


    A simple example of piping can be found in Listing [2-7](#395785_2_En_2_Chapter.xhtml#PC8).
    The first line in this script pulls a list of running processes from the operating
    system. It then passes the results of this command – as one or more objects, not
    just flat text – into a `Where-Object` cmdlet. `Where-Object` iterates over all
    received objects, applying the supplied filter script (in curly brackets). The
    filter script uses a special automatic PowerShell variable `$_`, which denotes
    the currently processed object, to compare each object’s `ProcessName` property
    against the string “*p*w*sh*” (the asterisks are used as wildcards). Non-matching
    objects are removed from the results.


    ```

    # Return a list of running processes and then filter by the name of the process

    # The chosen filter string will match executables of both Powershell 7 (pwsh)
    and 5 (powershell)

    $process = Get-Process | Where-Object { $_.ProcessName -like "*p*w*sh*" }

    # Print the filtered list of processes to the console

    $process

    Listing 2-7

    Basic Piping

    ```


    Without the ability to pipe, code would be much longer and harder to manage. In
    this scenario, we would need a separate statement, which looped through every
    process that was read into the `$process` variable. For a very simple example
    like this, that might not sound like the end of the world, but when we have very
    large, complex scripts, the extra overhead that would cause would become a burden.


    ### Controlling Flow


    If your background is purely in SQL Server, then you will likely be averse to
    the thought of looping, as it is a very bad practice to loop in SQL Server, due
    to the set-based nature of the language. If you have any scripting or programming
    experience, you will already know how useful looping can be for iterating through
    objects, performing an action (or set of actions) a specified number of times,
    or performing an action (or set of actions) repeatedly, until a condition is met.
    PowerShell provides looping capability through a `for` statement, a `foreach`
    statement, and a `while` statement.


    Caution


    Of course, the statement asserting how useful looping can be does not hold true
    for T-SQL, as set-based operations are always far more efficient than looping.
    Please refer to Chapter [1](#395785_2_En_1_Chapter.xhtml) for more details.


    Before we dive into how we can use loops, however, we need to ensure that we are
    familiar with the operators supported by PowerShell, as we will need these to
    control our loops. If you are familiar with T-SQL, then you are likely familiar
    with the concept of operators and know comparison operators such as `=` (equal
    to), `>` (greater than), and `<=` (less than or equal to).


    Comparison operators available in PowerShell are listed in Table [2-3](#395785_2_En_2_Chapter.xhtml#Tab3),
    but an important differential to T-SQL is that in PowerShell `=` is only used
    for assignment, never for comparison. The equality comparative operator in PowerShell
    is `-eq`. It is important to remember this to avoid some nasty bugs in our code,
    which are difficult to find.


    Table 2-3


    Comparison Operators


    | Operator | Description |

    | --- | --- |

    | `-contains` | Any item in the property’s value is equal to the value specified.
    This is useful if you must ensure that a specific value exists within an array
    |

    | `-eq` | The property’s value is equal to the specified value |

    | `-ge` | The property’s value is greater than or equal to the specified value
    |

    | `-gt` | The property’s value is greater than the specified value |

    | `-in` | The property’s value is equal to any of the elements of the array of
    values specified. The array of values can be specified as a comma-separated list
    |

    | `-is` | The property’s value is of the specified data type. The data type specified
    must be enclosed in square brackets |

    | `-isnot` | The data type of the property’s value is not the same as the specified
    data type. The data type specified must be enclosed in square brackets |

    | `-le` | The property’s value is less than or equal to the specified value |

    | `-lt` | The property’s value is less than the specified value |

    | `-like` | The property’s value contains the specified value, following a wildcard
    match |

    | `-match` | The property’s value matches the regex pattern provided |

    | `-ne` | The property’s value is not equal to the value specified |

    | `-notcontains` | No item in the property’s value is equal to the value specified.
    This is useful if you have to ensure that a specific value does not exist within
    an array |

    | `-notin` | The property’s value is not equal to any of the elements of the array
    of values specified. The array of values can be specified as a comma-separated
    list |

    | `-notlike` | The property’s value does not contain the specified value, following
