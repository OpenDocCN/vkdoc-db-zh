- fmt: '### Smoke Tests


    After performing an automated installation of an instance, it is always a good
    idea to perform some smoke tests. In this context, `smoke tests` refer to quick,
    high-level tests that ensure that the services are running and the instance is
    accessible.


    The code in Listing 6-2 will use the PowerShell `Get-Service` cmdlet to ensure
    that the services relating to the SCRIPTING instance exist and to check their
    status. This script uses asterisks as wildcards to return all services that contain
    our instance name. This, of course, means that services such as SQL Browser will
    not be returned.


    ```

    Get-Service -displayname *SCRIPTING* | Select-Object name, displayname, status

    Listing 6-2

    Checking Status of Services

    ```


    You will notice that both the SQL Server and SQL Agent services have been installed.
    You can also see that the SQL Server service is started and the SQL Agent service
    is stopped. This aligns with our expectations, because we did not use the startup
    mode parameters for either service. The default startup mode for the SQL Server
    service is automatic, whereas the default startup mode for the SQL Agent service
    is manual.


    The second recommended smoke test is to use `Invoke-Sqlcmd` to run a T-SQL statement
    which returns the instance name. To use the `Invoke-Sqlcmd` cmdlet (or any other
    SQL Server PowerShell cmdlets), the `sqlserver` PowerShell module needs to be
    installed. This module replaces the deprecated `SQLPS` module and contains many
    more cmdlets.


    Once the `sqlserver` module has been installed, the script in Listing 6-3 can
    be used to return the name of the instance.


    > **Note**

    >

    > This is also the query that is used by the `IsAlive` test, which is performed
    by a cluster. It has little system impact and just checks that the instance is
    accessible.


    ```

    Invoke-Sqlcmd –serverinstance "localhost\SCRIPTING" -query -TrustServerCertificate  "SELECT
    @@SERVERNAME"

    Listing 6-3

    Checking If Instance Is Accessible

    ```


    In this example, the `-serverinstance` switch is used to specify the instance
    name that you will connect to, and the `-query` switch specifies the query that
    will be run. You should see the query resolve successfully and returned the name
    of the instance.


    ### Optional Parameters


    There are many switches and parameters that can optionally be used to customize
    the configuration of the instance that you are installing. The optional switches
    and parameters that you can use for the installation of the Database Engine are
    listed in Table 6-6.


    > **Tip**

    >

    > Account passwords should not be specified if the account being used is an MSA/gMSA.
    This includes the accounts for the Database Engine and SQL Server Agent services,
    which are otherwise mandatory.


    Table 6-6

    Optional Parameters'
  raw: '### Smoke Tests


    After performing an automated installation of an instance, it is always a good
    idea to perform some smoke tests. In this context, *smoke tests* refer to quick,
    high-level tests that ensure that the services are running and the instance is
    accessible.


    The code in Listing [6-2](#395785_2_En_6_Chapter.xhtml#PC2) will use the PowerShell
    `Get-Service` cmdlet to ensure that the services relating to the SCRIPTING instance
    exist and to check their status. This script uses asterisks as wildcards to return
    all services that contain our instance name. This, of course, means that services
    such as SQL Browser will not be returned.


    ```

    Get-Service -displayname *SCRIPTING* | Select-Object name, displayname, status

    Listing 6-2

    Checking Status of Services

    ```


    You will notice that both the SQL Server and SQL Agent services have been installed.
    You can also see that the SQL Server service is started and the SQL Agent service
    is stopped. This aligns with our expectations, because we did not use the startup
    mode parameters for either service. The default startup mode for the SQL Server
    service is automatic, whereas the default startup mode for the SQL Agent service
    is manual.


    The second recommended smoke test is to use `Invoke-Sqlcmd` to run a T-SQL statement
    which returns the instance name. To use the `Invoke-Sqlcmd` cmdlet (or any other
    SQL Server PowerShell cmdlets), the sqlserver PowerShell module needs to be installed.
    This module replaces the deprecated SQLPS module and contains many more cmdlets.


    Once the sqlserver module has been installed, the script in Listing [6-3](#395785_2_En_6_Chapter.xhtml#PC3)
    can be used to return the name of the instance.


    Note


    This is also the query that is used by the IsAlive test, which is performed by
    a cluster. It has little system impact and just checks that the instance is accessible.


    ```

    Invoke-Sqlcmd –serverinstance "localhost\SCRIPTING" -query -TrustServerCertificate  "SELECT
    @@SERVERNAME"

    Listing 6-3

    Checking If Instance Is Accessible

    ```


    In this example, the `-serverinstance` switch is used to specify the instance
    name that you will connect to, and the `-query` switch specifies the query that
    will be run. You should see the query resolve successfully and returned the name
    of the instance.


    ### Optional Parameters


    There are many switches and parameters that can optionally be used to customize
    the configuration of the instance that you are installing. The optional switches
    and parameters that you can use for the installation of the Database Engine are
    listed in Table [6-6](#395785_2_En_6_Chapter.xhtml#Tab6).


    Tip


    Account passwords should not be specified if the account being used is an MSA/gMSA.
    This includes the accounts for the Database Engine and SQL Server Agent services,
    which are otherwise mandatory.


    Table 6-6


    Optional Parameters'
  trans: '

    ### 冒烟测试


    在自动安装实例后，总是值得进行一些冒烟测试。这里的 `冒烟测试` 指的是快速、高层级的测试，旨在确保服务正在运行且实例可访问。


    代码清单 6-2 中的脚本将使用 PowerShell 的 `Get-Service` cmdlet 来确认与 SCRIPTING 实例相关的服务是否存在，并检查其状态。此脚本使用星号作为通配符，返回所有包含我们实例名称的服务。这当然意味着，诸如
    SQL Browser 之类的服务不会被返回。


    ```

    Get-Service -displayname *SCRIPTING* | Select-Object name, displayname, status

    代码清单 6-2

    检查服务状态

    ```


    你会注意到 SQL Server 和 SQL Agent 服务都已安装。你还可以看到 SQL Server 服务已启动，而 SQL Agent 服务已停止。这与我们的预期一致，因为我们没有为这两个服务使用启动模式参数。SQL
    Server 服务的默认启动模式是自动，而 SQL Agent 服务的默认启动模式是手动。


    第二个推荐的冒烟测试是使用 `Invoke-Sqlcmd` 运行一个返回实例名称的 T-SQL 语句。要使用 `Invoke-Sqlcmd` cmdlet（或任何其他
    SQL Server PowerShell cmdlet），需要安装 `sqlserver` PowerShell 模块。此模块取代了已弃用的 `SQLPS`
    模块，并且包含更多 cmdlet。


    一旦 `sqlserver` 模块安装完毕，就可以使用代码清单 6-3 中的脚本来返回实例名称。


    > **注意**

    >

    > 这也是集群执行 `IsAlive` 测试时所使用的查询。它对系统影响很小，只是检查实例是否可访问。


    ```

    Invoke-Sqlcmd –serverinstance "localhost\SCRIPTING" -query -TrustServerCertificate  "SELECT
    @@SERVERNAME"

    代码清单 6-3

    检查实例是否可访问

    ```


    在此示例中，`-serverinstance` 开关用于指定你要连接到的实例名称，`-query` 开关指定了将要运行的查询。你应该能看到查询成功解析并返回了实例名称。


    ### 可选参数


    有许多开关和参数可以可选地使用，以自定义你正在安装的实例的配置。可用于安装数据库引擎的可选开关和参数列于表 6-6 中。


    > **提示**

    >

    > 如果使用的账户是 MSA/gMSA，则不应指定账户密码。这包括数据库引擎和 SQL Server Agent 服务的账户，否则这些账户是必填的。


    表 6-6

    可选参数

    '
- fmt: '| 参数 | 用法 |

    | --- | --- |

    | `/AGTSVCSTARTUPTYPE` | 指定 SQL Server Agent 服务的启动模式。可以设置为 `Automatic`、`Manual`
    或 `Disabled` |

    | `/BROWSERSVCSTARTUPTYPE` | 指定 SQL Server Browser 服务的启动模式。可以设置为 `Automatic`、`Manual`
    或 `Disabled` |

