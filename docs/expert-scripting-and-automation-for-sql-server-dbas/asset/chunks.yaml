    \ = $SecurePassword = ConvertTo-SecureString 'Pa$$w0rd' -AsPlainText -Force\n\
    $params = @{\n    SqlInstance    = \"localhost\"\n    Database       = \"Inventory\"\
    \n    SecurePassword = $Password\n    Path           = \"c:\\Keys\\\"\n}\nBackup-DbaDbMasterKey\
    \ @params\n# 清单 8-3 备份主密钥\n```"
