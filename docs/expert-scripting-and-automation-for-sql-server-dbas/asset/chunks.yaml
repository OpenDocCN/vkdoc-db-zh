    | `/ENU` | 指定将使用英文版 SQL Server。如果您在具有本地化设置的服务器上安装英文版 SQL Server，并且介质包含英文和本地化操作系统的语言包，请使用此开关
    |

    | `/FILESTREAMLEVEL` | 用于启用 FILESTREAM 并设置所需的访问级别。可以设置为 `0` 以禁用 FILESTREAM，`1`
    以允许仅通过 SQL Server 连接，`2` 以允许 IO 流式处理，或 `3` 以允许远程流式处理。选项 `1` 到 `3` 是逐级构建的，因此指定级别
    `3` 就隐式指定了级别 `1` 和 `2` |

    | `/FILESTREAMSHARENAME` | 指定存储 FILESTREAM 数据的 Windows 文件共享的名称。当 `/FILESTREAMLEVEL`
    设置为 `2` 或 `3` 时，此参数变为必需 |

    | `/FTSVCACCOUNT` | 用于运行全文筛选器启动器服务的帐户 |

    | `/FTSVCPASSWORD` | 用于运行全文筛选器启动器服务的帐户的密码 |

    | `/HIDECONSOLE` | 指定应隐藏控制台 |

