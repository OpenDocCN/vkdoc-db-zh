    4-27 中演示。


    ```powershell

    Switch-SqlAvailabilityGroup -Path "SQLSERVER:\Sql\SecondaryServer\default\AvailabilityGroups\WideWorldImportersAG"

    代码清单 4-27

    故障转移可用性组

    ```


    如果可用性组处于异步模式，则存在数据丢失的风险。在这种情况下，必须使用`AllowDataLoss`参数，以确保运行该命令的管理员知晓潜在后果，如代码清单
    4-28 所示。


