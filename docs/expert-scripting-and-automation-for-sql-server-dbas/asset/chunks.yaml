  raw: '```

    ;SQL Server 2022 Configuration File

    [OPTIONS]

    ; Accept the SQL Server License Agreement

    IACCEPTSQLSERVERLICENSETERMS

    ; Specifies a Setup work flow, like INSTALL, UNINSTALL, or UPGRADE.

    ; This is a required parameter.

    ACTION="Install"

    ; Setup will display progress only, without any user interaction.

    QUIETSIMPLE="True"

    ; Specifies features to install, uninstall, or upgrade.

    FEATURES=SQLENGINE,REPLICATION

    ; Auto-start service after installation.

    AGTSVCSTARTUPTYPE="Automatic"

    ; Level to enable FILESTREAM feature at (0, 1, 2 or 3).

    FILESTREAMLEVEL="1"

    ; Specifies a Windows collation or an SQL collation to use for the Database Engine.

    SQLCOLLATION="Latin1_General_CI_AS"

    ; Windows account(s) to provision as SQL Server system administrators.

    SQLSYSADMINACCOUNTS="MyDomain\SQLDBA"

    ; Specify 0 to disable or 1 to enable the TCP/IP protocol.

    TCPENABLED="1"

    ; Specify 0 to disable or 1 to enable the Named Pipes protocol.

    NPENABLED="1"

    Listing 6-8

    Configuration File for SCRIPTING4

    ```


    This means that to successfully install the instance, you will need to use a mix
    of parameters from the configuration file and also inline with the command that
    runs setup.exe, as demonstrated in Listing [6-9](#395785_2_En_6_Chapter.xhtml#PC9).
    This example assumes that the configuration in Listing [6-8](#395785_2_En_6_Chapter.xhtml#PC8)
    has been saved as C:\SQL2022\Configuration2.ini and will install an instance named
    EXPERTSCRIPTING3.


    ```

    .\SETUP.EXE /INSTANCENAME="SCRIPTING4 /SQLSVCACCOUNT="MyDomain\SQLServiceAccount1"
    /SQLSVCPASSWORD="Pa$$w0rd" /AGTSVCACCOUNT="MyDomain\SQLServiceAccount1" /AGTSVCPASSWORD="Pa$$w0rd"
    /CONFIGURATIONFILE="C:\SQL2022\Configuration2.ini"

    Listing 6-9

    Installing SQL Server Using a Mix of Parameters and a Configuration File

    ```


    ## Automated Installation with Scripts


    This approach gives us the benefit of having a consistent configuration file that
    we do not need to modify every time we build out a new instance. This idea can
    be taken even further, however. If we were to save our PowerShell command as a
    PowerShell script, then we could run the script and pass in parameters, rather
    than rewrite the command each time. This will give a consistent script for building
    new instances, which we can place under change control. The code in Listing [6-10](#395785_2_En_6_Chapter.xhtml#PC10)
    demonstrates how to construct a parameterized PowerShell script, which will use
    the same configuration file. The script assumes D:\ is the root folder of the
    installation media.


    ```

    param(

    [string]       $InstanceName,

    [PSCredential] $SQLServiceAccountCredential,

    [PSCredential] $AgentServiceAccountCredential

    )

    $params = @(

    ''/INSTANCENAME="{0}"'' -f $InstanceName

    ''/SQLSVCACCOUNT="{0}"'' -f $SQLServiceAccountCredential.Username

    ''/SQLSVCPASSWORD="{0}"'' -f $SQLServiceAccountCredential.GetNetworkCredential().Password

    ''/AGTSVCACCOUNT="{0}"'' -f $AgentServiceAccountCredential.Username

    ''/AGTSVCPASSWORD="{0}"'' -f$AgentServiceAccountCredential.GetNetworkCredential().Password

    ''/CONFIGURATIONFILE="C:\SQL2022\Configuration2.ini"''

    )

    Start-Process -FilePath ''C:\SQLServerSetup\SETUP.EXE'' -ArgumentList $params
    -Wait -NoNewWindow

    Listing 6-10

    PowerShell Script for Auto-install

    ```


    Assuming that this script is saved as SQLAutoInstall1.ps1, the command in Listing [6-11](#395785_2_En_6_Chapter.xhtml#PC11)
    can be used to build an instance named SCRIPTING5\. This command runs the PowerShell
    script, passing in parameters, which are then used in the setup.exe command.


    ```

    ./SQLAutoInstall.ps1 -InstanceName ''SCRIPTING5'' -SQLServiceAccount ''MyDomain\SQLServiceAccount1''
    -SQLServiceAccountPassword ''Pa$$w0rd'' -AgentServiceAccount ''MyDomain\SQLServiceAccount1''
    -AgentServiceAccountPassword ''Pa$$w0rd''

    Listing 6-11

    Running SQLAutoInstall.ps1

    ```


    ### Enhancing the Installation Routine


    You could also extend the SQLAutoInstall.ps1 script further and use it to incorporate
    the techniques that you learned in Chapter [1](#395785_2_En_1_Chapter.xhtml) for
    the configuration of operating system components and the techniques that you learned
    earlier in this chapter for performing smoke tests.


    After installing an instance, the amended script in Listing [6-12](#395785_2_En_6_Chapter.xhtml#PC12),
    which we will refer to as SQLAutoInstall2.ps1, uses powercfg to set the High Performance
    power plan and `Set-ItemProperty` to prioritize background services over foreground
    applications. It then runs smoke tests to ensure that the SQL Server and SQL Agent
    services are both running and that the instance is accessible.


    ```

    param(

    [string]       $InstanceName,

    [PSCredential] $SQLServiceAccountCredential,

    [PSCredential] $AgentServiceAccountCredential

    )

    # Initialize ConnectionString variable

    $serverName = $env:computername

    $connectionString = ''{0}\{1}'' -f $serverName, $InstanceName

    #Install the instance

    $params = @(

    ''/INSTANCENAME="{0}"'' -f $InstanceName

    ''/SQLSVCACCOUNT="{0}"'' -f $SQLServiceAccountCredential.Username

    ''/SQLSVCPASSWORD="{0}"'' -f $SQLServiceAccountCredential.GetNetworkCredential().Password

    ''/AGTSVCACCOUNT="{0}"'' -f $AgentServiceAccountCredential.Username

    ''/AGTSVCPASSWORD="{0}"'' -f$AgentServiceAccountCredential.GetNetworkCredential().Password

    ''/CONFIGURATIONFILE="C:\SQL2022\Configuration2.ini"''

    )

    Start-Process -FilePath ''C:\SQLServerSetup\SETUP.EXE'' -ArgumentList $params
    -Wait -NoNewWindow

    # Configure OS settings

    Start-Process -FilePath ''C:\Windows\System32\powercfg.exe'' -ArgumentList ''-setactive
    8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c'' -Wait -NoNewWindow

    Set-ItemProperty -Path HKLM:\SYSTEM\CurrentControlSet\Control\PriorityControl\
    -Name Win32PrioritySeparation -Value 24

    # Run smoke tests

    Get-Service -DisplayName (''*{0}*'' -f $InstanceName)

    Invoke-SqlCmd -Serverinstance $connectionString -Query "SELECT @@SERVERNAME" -TrustServerCertificate

    Listing 6-12

    Enhanced PowerShell Auto-install Script

    ```


    As well as passing variables into the setup.exe command, this script also uses
    the $InstanceName parameter as input for the smoke tests. The parameter can be
    passed straight into get-service cmdlet, with wildcards on either side. For invoke-sqlcmd,
    however, we need to do a little extra work. `Invoke-Sqlcmd` requires the full
    name of the instance, including the server name, or localhost, assuming that the
    script is always run locally. The script pulls the name of the server from the
    ComputerName environmental variable and then concatenates this with the $InstanceName
    variable, placing a \ between the two. This concatenated value populates the $ConnectionString
    variable, which can then be passed into the `-Serverinstance` switch.'
