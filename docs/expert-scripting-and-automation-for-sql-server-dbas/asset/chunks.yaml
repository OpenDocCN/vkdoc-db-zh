    \   ENCRYPTION BY CERTIFICATE Inventory\n    \"\n    Database = \"Inventory\"\n\
    }\nInvoke-DbaQuery @params\nListing 8-6\nCreate a Symmetric Key\n```\n\n## 创建表\n\
    Finally, we need to create the tables. Although there is a DbaTools command for\
    \ creating tables (`New-DbaDbTable`), I personally find it rather cumbersome,\
    \ with the column definitions needing to be defined in an array and then passed\
    \ in. Therefore, we will perform this action using the `Invoke-DbaQuery` command,\
