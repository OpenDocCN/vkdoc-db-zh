    ## 总结


    许多人认为 DSC 是构建操作系统并在操作系统层面避免**配置漂移**的强大工具。SQL Server 数据库管理员也应将其视为在 SQL Server 中构建和避免配置漂移的有用工具。


    `SqlserverDsc` 模块提供了许多资源，我们可以用它们来配置 SQL Server 的各个方面，包括安全性、性能和可用性。其中一些资源，例如 `SqlMaxDop`
    资源，其内部已写入逻辑，避免了我们必须传递任意值，而是为我们动态计算最合适的值。这非常有用，因为它允许我们在调整服务器大小时，无需担心更改 DSC 配置中传递的值。


    `SqlScriptQuery` 资源允许我们定义自己的 `Get`、`Test` 和 `Set` 查询。这使得模块完全可扩展，因为它意味着我们可以满足 SQL
    Server 中的任何配置需求，即使没有现成的资源来执行该配置。


    使用 `SqlScriptQuery` 资源时，`Get` 查询应以 JSON 格式将资源状态返回给 DSC，我们可以通过在查询中使用 `FOR JSON`
    子句来实现这一点。`Test` 查询应检查资源是否已配置为我们期望的状态。如果是，我们应该让查询成功；如果不是，我们应该引发错误，这将导致执行 `Set`
    查询。`Set` 查询仅由将资源配置为符合我们要求所需的 T-SQL 语句组成。


    # 10. 集中化维护


    向 SQL Server 环境引入自动化和脚本技术的主要目标之一是能够集中化你的维护工作。这是迈向**低运维模型**的关键一步，在这种模型中，数据库管理员的时间用于为业务增加价值主张，而不是花费在诸如检查整个企业中
    SQL Server 代理作业状态等日常任务上。


    在本章中，我们将首先讨论实现集中式维护系统的设计考虑事项，该系统构建于我们在第 8 章讨论的清单数据库之上。然后，我们将探讨如何创建维护引擎。

