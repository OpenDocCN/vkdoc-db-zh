    ### 管理数据库用户


    DbaTools 提供了许多用于管理数据库用户的有用命令。在以下部分中，我们将探讨如何将用户添加到数据库角色。我们还将讨论如何删除用户以及如何修复已成为孤立状态的用户。


    #### 将用户添加到数据库角色


    可以使用 `Add-DbaDbRoleMember` 命令将用户添加到数据库角色。你需要通过 `–Database` 参数传递数据库名称，通过 `–Role`
    参数传递角色名称，并通过 `–User` 参数传递要添加到角色的用户名称。代码清单 5-21 演示了这一点，其中 `PeteCarter` 登录名被添加到
    `AdventureWorks2022` 数据库中的 `db_owner` 数据库角色。


    ```

    $params = @{

    SqlInstance = "localhost"

    Database    = "AdventureWorks2022"

    User        = "PeteCarter"

    Role        = "db_owner"

    }

    Add-DbaDbRoleMember @params

    Listing 5-21

    将用户添加到角色

    ```


    > 提示

    >

    > 为避免被提示确认操作，你可以在命令后附加 `-Confirm:$false`。


    存在一个名为 `New-DbaDbRole` 的命令，可用于创建你自己的数据库角色。然而，与其服务器角色对应物类似，其功能仅限于创建角色。它不允许向该角色分配权限。因此，我们将不在这里介绍它，我建议使用
    `Invoke-DbaQuery` 来创建服务器和数据库角色。


    #### 删除用户及将其从角色中移除


    可以使用 `Remove-DbaDbRoleMember` 命令将用户从数据库角色中移除。代码清单 5-22 演示了这一点，它将 `PeteCarter`
    用户从 `AdventureWorks2022` 数据库的 `db_owner` 数据库角色中移除。


    ```

    $params = @{

    SqlInstance = "localhost"

    Database    = "AdventureWorks2022"

    User           = "PeteCarter"

    Role           = "db_owner"

    }

    Remove-DbaDbRoleMember @params

    Listing 5-22

    从数据库角色中移除用户

    ```


    如果需要完全删除一个数据库用户，可以通过使用 `Remove-DbaDbUser` 命令来实现。该命令需要传递数据库和用户，如代码清单 5-23 所示。


    ```

    $params = @{

    SqlInstance = "localhost"

    Database    = "AdventureWorks2022"

    User        = "PeteCarter"

    }

    Remove-DbaDbUser @params

    Listing 5-23

    删除数据库用户

    ```


    ### 管理服务器代理


    在第 4 章中，我们讨论了 SqlServer 模块如何使你能够创建凭据并检索有关 SQL Server 代理作业的信息，但由于没有提供与 SQL Server
    代理对象交互或管理其的命令，因此其用处有限。因此，在以下部分中，我们将讨论如何端到端地管理 SQL Server 代理。具体来说，我们将探讨如何创建凭据、创建映射到该凭据的代理以及创建作业。我们还将讨论如何检索作业信息以及如何使用这些信息来排查问题。


    > 注意

    >

    > 本章假设你熟悉 SQL Server 代理及其对象，例如作业、作业步骤和代理。对 SQL Server 代理的完整讨论和解释可以在 Apress 的书籍
    *Pro SQL Server 2022 Administration* 中找到，链接为：link.springer.com/book/10.1007/978-1-4842-8864-1。


    #### 创建凭据


    `New-DbaCredential` 提供了与本书第 4 章讨论的 `SqlServer` 模块的 `New-SqlCredential` 命令等效的功能。我们将使用该命令创建一个名为
    `SQLAgentCredential` 的凭据，该凭据映射到 `Pete` Windows 用户，并将用作运行 SQL Server 代理作业的安全上下文。


    该命令需要通过 `–Name` 参数传递凭据的名称。它还需要将要使用的标识（在本例中为 Windows 用户）传递给 `–Identity` 参数，并将密钥（在本例中为
    Windows 用户的密码）传递给 `–SecurePassword` 参数。


    代码清单 5-24 中的脚本说明了如何使用 `New-DbaCredential` 命令来创建描述的凭据对象。


    ```

    $SecurePassword = ConvertTo-SecureString ''Pa$$w0rd'' -AsPlainText -Force

    $params = @{

    SqlInstance     = "localhost"

    Name            = "SqlAgentCredential"

    Identity        = "Pete"

    SecurePassword  = $SecurePassword

    }

    New-DbaCredential @params

    Listing 5-24

    创建凭据

    ```

