    \ in Listing [8-7](#395785_2_En_8_Chapter.xhtml#PC10). Note that the `saPassword`\
    \ column is created as a `VARBINARY(256)` instead of an `NVARCHAR(64)` to allow\
    \ encrypted value to be stored.\n\n```\n$params = @{\n    SqlInstance = \"localhost\"\
    \n    Database = \"Inventory\"\n    Query       = \"\n        --Create the ServiceAccount\
    \ table\n        CREATE TABLE [dbo].[ServiceAccount] (\n            [ServiceAccountID]\
    \ INT NOT NULL IDENTITY PRIMARY KEY,\n            [ServiceAccountName] NVARCHAR(128)\
    \ NOT NULL UNIQUE,\n            [ServiceAccountPassword] VARBINARY(256)\n    \
    \    ) ;\n        GO\n\n        --Create the Server table\n        CREATE TABLE\
    \ [dbo].[Server] (\n            [ServerID] INT NOT NULL IDENTITY PRIMARY KEY,\n\
