- fmt: '# Designing a Response to 9002 Errors


    Before creating a process to respond to 9002 errors, we will first create a process
    flow. This will assist with the coding effort and also act as ongoing documentation
    of the process.


    Figure [11-10](#395785_2_En_11_Chapter.xhtml#Fig10) displays the process flow
    that we will follow when writing our code.


    ![](images/395785_2_En_11_Chapter/395785_2_En_11_Fig10_HTML.jpg)


    Flow chart illustrating a decision-making process for database management. It
    begins with "Start" in a green oval, leading to a decision diamond asking, "Is
    DB using SIMPLE recovery model?" If "Yes," it proceeds to "Issue a CHECKPOINT,"
    then "Shrink Transaction Log," and ends at "Stop" in a red oval. If "No," it asks,
    "Was delayed truncation to HA/DR?" If "Yes," it leads to "e-mail DBA Team," then
    "Shrink Transaction Log," and ends at "Stop." If "No," it goes to "Backup Transaction
    Log," then "Shrink Transaction Log," and ends at "Stop."


    Figure 11-10


    Responding to 9002 error process flow


    ## Automating a Response to 9002 Errors


    We will use a `SQL Server Agent` alert to trigger our process if a 9002 error
    occurs. To create a new alert, drill through `SQL Server Agent` in `SQL Server
    Management Studio` and select `New Alert` from the context menu of `Alerts`. This
    will cause the `New Alert` dialog box to be displayed. On the `General` page of
    the dialog box, illustrated in Figure [11-11](#395785_2_En_11_Chapter.xhtml#Fig11),
    we will give the alert a name and configure it to be triggered by `SQL Server`
    error number 9002.


    ![](images/395785_2_En_11_Chapter/395785_2_En_11_Fig11_HTML.jpg)


    Screenshot of a "New Alert" configuration window for SQL Server. The alert is
    named "RespondTo9002" and is enabled. It is a SQL Server event alert for all databases,
    triggered by error number 9002. The severity is set to "001 - Miscellaneous System
    Information." The server is "ESASSMGMT1" with a connection to "ESASSMGMT1\Pete."
    Options to view connection properties and progress status as "Ready" are visible.


    Figure 11-11


    New Alert – General page


    On the `Response` page of the dialog box, we will check the option to `Execute
    Job` and use the `New Job` button to invoke the `New Job` dialog box. Save the
    job, then on the `General` page of the `New Job` dialog box, we will define a
    name for our new `Job`, as illustrated in Figure [11-12](#395785_2_En_11_Chapter.xhtml#Fig12).


    ![](images/395785_2_En_11_Chapter/395785_2_En_11_Fig12_HTML.jpg)


    Screenshot of a "New Job" window in a software application. The interface includes
    fields for "Name," "Owner," "Category," and "Description," with the name set to
    "RespondTo9002" and owner as "ESASSMGMT1\Pete." The category is "[Uncategorized
    (Local)]." A checkbox labeled "Enabled" is checked. The left panel shows options
    like "General," "Steps," "Schedules," "Notifications," and "Targets." Connection
    details display the server as "ESASSMGMT1" and a link to "View connection properties."
    The progress status is "Ready."


    Figure 11-12


    New Job – General page


    On the `Steps` page of the `New Job` dialog box, we will use the `New` button
    to invoke the `New Job Step` dialog box. On the `General` page of the `New Job
    Step` dialog box, we will give our job step a name and configure it to execute
    the script in Listing [11-5](#395785_2_En_11_Chapter.xhtml#PC5).


    ```sql

    --Create a table to store log entries

    CREATE TABLE #ErrorLog

    (

    LogDate          DATETIME,

    ProcessInfo      NVARCHAR(128),

    Text             NVARCHAR(MAX)

    ) ;

    --Populate table with log entries

    INSERT INTO #ErrorLog

    EXEC(''xp_readerrorlog'') ;

    --Declare variables

    DECLARE @SQL NVARCHAR(MAX) ;

    DECLARE @DBName NVARCHAR(128) ;

    DECLARE @LogName NVARCHAR(128) ;

    DECLARE @Subject        NVARCHAR(MAX) ;

    --Find database name where error occured

    SET @DBName = (

    SELECT TOP 1

    SUBSTRING(

    SUBSTRING(

    Text,

    35,

    LEN(Text)

    ),

    1,

    CHARINDEX(

    '''''''',

    SUBSTRING(Text,

    35,

    LEN(Text)

    )

    )-1

    )

    FROM #ErrorLog

    WHERE Text LIKE ''The transaction log for database%''

    ORDER BY LogDate DESC

    FOR XML PATH('''')

    ) ;

    --Find name of log file that is full

    SET @LogName = (

    SELECT name

    FROM sys.master_files

    WHERE type = 1

    AND database_id = DB_ID(@DBName)

    ) ;

    --Kill any active queries, to allow clean up to take place

    SET @SQL = (

    SELECT ''USE Master; KILL '' + CAST(s.session_id AS NVARCHAR(4)) + '' ; ''

    FROM sys.dm_exec_requests r

    INNER JOIN sys.dm_exec_sessions s

    ON r.session_id = s.session_id

    INNER JOIN sys.dm_tran_active_transactions at

    ON r.transaction_id = at.transaction_id

    WHERE r.database_id = DB_ID(@DBName)

    ) ;

    EXEC(@SQL) ;

    --IF recovery model is SIMPLE

    IF (SELECT recovery_model FROM sys.databases WHERE name = @DBName) = 3

    BEGIN

    --Issue a CHECKPOINT

    SET @SQL = (

    SELECT ''USE '' + @DBName + '' ; CHECKPOINT''

    ) ;

    EXEC(@SQL) ;

    --Shrink the transaction log

    SET @SQL = (

    SELECT ''USE '' + @DBName + '' ; DBCC SHRINKFILE ('' + @LogName + '' , 1)''

    ) ;

