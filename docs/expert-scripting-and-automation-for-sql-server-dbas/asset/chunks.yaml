  trans: "\n## 理解配置管理\n\n构建和配置服务器的方式有很多种。我们可以手动配置服务器，可以使用黄金镜像或构建脚本，但每种方法都有其局限性。\n\n\
    手动配置服务器的局限性相当明显。这是一项单调、耗时的工作，常常导致人为错误，进而造成环境状态不一致。即使服务器是按照良好标准构建的，其配置也可能随着时间的推移而发生**偏移**。\n\
    \n如果我们采用黄金镜像方法，即构建一个单一镜像，使用 `sysprep` 然后多次部署它，那么我们可以解决手动构建所描述的问题，但同时又会引发新的问题。具体来说：\n\
    \n*   我们没有任何灵活性。每台服务器都必须是 100%相同的。这意味着如果我们需要最细微的变体，我们必须要么\n    *   拥有大量黄金镜像选择，每一个都必须单独维护\n\
    \    *   使用黄金镜像，但随后进行手动更新，这可能导致环境状态不一致\n*   虽然每台服务器在构建时环境状态可能是一致的，但随着时间的推移，手动更改可能导致配置偏移，并最终造成环境状态不一致。\n\
    \n如果我们采用脚本化方法，我们通常会从一个非常基础的黄金镜像开始，然后针对新创建的服务器运行构建脚本，这些脚本将执行配置。这种方法消除了黄金镜像的第一个问题。具体来说，它允许我们拥有一致的构建，利用脚本中的逻辑为不同用例配置服务器。然而，它并没有解决第二个问题。随着服务器生命周期的推进，仍然存在配置偏移的可能性。\n\
    \n配置管理解决了上述所有构建问题。它是一种脚本化方法，但脚本不是只在构建时运行一次，而是按计划运行。每次脚本运行时，它都会检查服务器的配置应该是什么，如果有任何偏移，它会将配置恢复到期望状态。\n\
    \n配置管理中使用的逻辑如图 3-1 所示。\n\n![](img/395785_2_En_3_Fig1_HTML.jpg)\n\n图 3-1：配置管理逻辑\n\
    \n此过程可用于配置服务器内的任何配置项。它可以安装软件、配置安全设置，甚至可以安装和配置 SQL Server（这将在第 6 章和第 9 章讨论）。\n\n\
    有许多配置管理工具可用，包括 Ansible、Chef 和 Puppet。然而，本书将重点介绍微软的 DSC 或所需状态配置，这是微软对配置管理的实现。\n\
    \n## 理解 DSC\n\nDSC 可以通过两种主要方式实现。第一种是在机器级别。这种方法是最简单的实现，最适合小型环境或测试。DSC 包含在 Windows\
    \ Management Framework 5.1 中。因此，我们无需安装任何客户端软件即可开始使用 DSC。本章将重点介绍这种方法，以最直接的方式帮助您理解其实现。\n\
    \n第二种实现方式是通过使用集中管理资源，可以从单一位置管理多台机器。这最适合大型企业，因为当您拥有许多服务器时，它能显著减少管理开销。\n\n集中管理组件可以是一个拉取服务器，即运行\
    \ `DSC-Service` Windows Server 功能的服务器，也可以是来宾配置 Azure Policy，它与 Azure VM 和 Azure\
    \ 外的 Arc 启用服务器兼容。\n\n> **注意**：Windows 拉取服务器仍是一个受支持的功能，但已不再进行开发。这意味着微软 DSC 通常最适合使用\
    \ Azure 或 Arc 启用服务器的中小型组织。DSC 代码实际上已经分支，因此 DSC 1.1 仍然受支持但不再维护。它可以与最高到 PowerShell\
    \ 5.1 的版本一起使用，并且可以在非 Azure 环境中使用。DSC 2.0 在 PowerShell 7 及以上版本中受支持，但设计用于与 Azure\
    \ 配合使用。在撰写本文时，DSC 3.0 处于预览阶段。\n\nDSC 中需要理解的两个主要概念是配置和资源。配置提供了一种简单的机制来描述项目的期望配置，而资源则提供了实现配置中描述的设置的机制（同时考虑项目的当前状态）。每个\
    \ DSC 资源都有三种方法：`Get`、`Test` 和 `Set`。`Get` 方法用于检索资源的当前状态。`Test` 方法用于确定服务器（在 DSC\
    \ 中称为节点）当前是否配置为其期望的目标状态。`Set` 方法用于将节点配置为符合其目标状态。\n\nDSC 提供了许多内置资源，可用于配置服务、用户、组、注册表项和\
    \ Windows 功能等项目。DSC 也是完全可扩展的。我们可以创建自己的自定义资源，用于配置任何可以通过 PowerShell 配置的项目。\n\n资源可以使用基于类的方法或基于\
    \ Microsoft Operations Framework (MOF) 的方法来编写。本章将重点介绍使用开箱即用的资源，但有关创建自定义 DSC 资源的指南可在以下位置找到：`learn.microsoft.com/en-us/powershell/dsc/resources/authoringresourceclass?view=dsc-1.1`。\n\
    \n配置是应应用的资源的清单。它们通过一种特殊类型的函数实现，该函数列出了应应用于节点的资源。每个资源至少传递两个参数。其中一个参数是目标实例的名称。第二个是应对其应用的操作。例如，如果您有一个资源用于确保\
    \ SQL Browser 服务正在运行，您将使用服务资源并传递 `Name = \"SQLBrowser\"` 和 `State = \"Running\"\
    `。另一方面，如果您想确保文件 `C:\\Logs\\CustomSqlLog.log` 存在，您将使用文件资源并传递参数 `Name = \"C:\\Logs\\\
    CustomSqlLog.log\"` 和 `Ensure = \"Present\"`。本地配置管理器是读取配置并使用资源来确保应用期望配置的引擎。\n"
- fmt: "# Using DSC to Configure Windows Server\n\nNow that we understand the key\
    \ concepts, let’s put those concepts into practice to perform some simple Windows\
    \ Server configuration, using DSC 1.1. There are many configurations that you\
    \ may wish to perform at the operating system level, such as configuring the operating\
    \ system to be in line with the CIS benchmark or ensuring that the SQL Server\
    \ Database Engine service is running. To keep things simple, in this example,\
    \ however, we will look to ensure the following target configurations:\n\n*  \
    \ Ensure a folder exists that will store backups of certificates used by SQL Server\n\
    *   Ensure that Windows is configured to optimize background tasks\n*   Ensure\
    \ that the SQL Server Database Engine service is running\n\n## Defining the File\
    \ Resource\n\nThe code snippet in Listing 3-1 demonstrates how to define a resource\
    \ that will ensure that a folder called `CertificateBackups` exists. The declaration\
    \ starts by using the `File` keyword, which denotes the resource being declared\
    \ is the DSC `File` resource. This is followed by the name of the resource. Providing\
    \ a name is essential, as it uniquely identifies resources of the same type. Inside\
    \ the curly brackets, we pass `Ensure = \"Present\"` which states that we want\
    \ to ensure the folder exists. If we wanted to ensure that it doesn’t exist, we\
    \ could pass `Ensure = \"Absent\"`. We pass `Type = \"Directory\"`. If we wanted\
    \ to manage a file, instead of a folder, we could pass `Type = \"File\"`. We could\
    \ then use `Content = \"FooBar\"` to insert the text into the file. Finally, we\
    \ pass `DestinationPath = \"C:\\CertificateBackups\"`, which defines which folder\
    \ we want the resource to manage.\n\n```powershell\nFile CreateCertificateBackupsFolder\
    \ {\nEnsure           = \"Present\"\nType             = \"Directory\"\nDestinationPath\
    \  = \"C:\\CertificateBackups\"\n}\n```\n**Listing 3-1** Define a `File` Resource\n\
    \n## Defining the Registry Resource\n\nThe code snippet in Listing 3-2 demonstrates\
    \ how to use a `Registry` DSC resource. This resource type is useful for configuring\
    \ many Windows-level items, but here we will use it to ensure that Windows is\
    \ configured to be optimized for background tasks. We don’t want the database\
    \ engine having to wait, because a user clicking around Management Studio is being\
    \ prioritized. This time, we use the `Registry` keyword to denote that this is\
    \ a `Registry` DSC resource. Again, we give it a sensible name. Inside the curly\
    \ brackets, we once again use `Ensure = “Present”` to indicate that the relevant\
    \ string value should exist inside the registry key. We use `Key = \"HKLM:\\SYSTEM\\\
    CurrentControlSet\\Control\\PriorityControl\"` to specify the path to the registry\
    \ key that we want to manage. We use `ValueName = \"Win32PrioritySeparation\"\
    ` to denote the value within the key that should be present and `ValueData = 24`\
    \ to define our desired value for the key.\n\n```powershell\nRegistry OptimizeForBackgroundServices\
    \ {\nEnsure      = \"Present\"\nKey         = \"HKLM:\\SYSTEM\\CurrentControlSet\\\
    Control\\PriorityControl\"\nValueName   = \"Win32PrioritySeparation\"\nValueType\
    \   = 'Dword'\nValueData   = 24\n}\n```\n**Listing 3-2** Define a `Registry` Resource\n\
    \n## Defining the Service Resource\n\nOur final resource ensures that the database\
    \ engine service of the Default SQL Server instance is running.\n\n> **Tip**\n\
    > We will be discussing how to build SQL Server in Chapter 6, so if you want to\
    \ follow along with the examples, but don’t have SQL Server installed yet, you\
    \ can change the SQL Server Database Engine service to be any other service, which\
    \ does exist.\n\nListing 3-3 demonstrates how to define this resource, by using\
    \ the `Service` DSC resource. The declaration starts with the `Service` keyword\
    \ to denote that we are using the `Service` DSC resource, and, again, we provide\
    \ a sensible name. Inside the curly brackets, you will notice that, this time,\
    \ we do not pass `Ensure`. When not present, `Ensure` defaults to `Present`. We\
    \ pass `Name = \"MSSQLSERVER\"` to define the service we wish to manage. We pass\
    \ `StartupType = \"Automatic\"` to specify that the service should always be configured\
    \ to start automatically and `State = \"Running\"` to specify that the service\
    \ should always be running. If the service is stopped, DSC will automatically\
    \ start it for us.\n\n```powershell\nService SQLServerService {\n    Name    \
    \    = \"MSSQLSERVER\"\n    StartupType = \"Automatic\"\n    State       = \"\
    Running\"\n}\n```\n**Listing 3-3** Define a `Service` Resource\n\n## Creating\
    \ the Configuration File\n\nNow that all of our resources are defined, we need\
    \ to bring them together into a configuration file. The configuration file that\
    \ we will use is shown in Listing 3-4. The first line uses the `Configuration`\
    \ keyword, followed by a name for the configuration. The required DSC resources\
    \ are imported from the `PSDesiredStateConfiguration` PowerShell module.\n\nNext,\
    \ we define the host or hosts that the configuration should run on. In our topology,\
    \ we will be scheduling the configuration to run locally from Task Scheduler.\
    \ Therefore, we define it as `localhost`. Inside the node definition, we have\
    \ the definition of all of the resources which lay out our desired configuration.\n\
    \nFinally, the last line of the file calls the configuration that we have just\
    \ defined. Think of the definition of the configuration a bit like defining a\
    \ function. It’s not enough to just define what a function will do, it needs to\
    \ actually be called off in order to be executed.\n\nWe need to save this file\
    \ to our local computer. I have saved mine as `C:\\Scripts\\WindowsConfig.ps1`.\n\
    \n```powershell\nConfiguration WindowsConfig {\n    Import-DscResource -ModuleName\
    \ 'PSDesiredStateConfiguration'\n    Node 'localhost' {\n        File CreateCertificateBackupsFolder\
    \ {\n            Ensure = \"Present\"\n            Type = \"Directory\"\n    \
    \        DestinationPath = \"C:\\CertificateBackups\"\n        }\n        Registry\
    \ OptimizeForBackgroundServices {\n            Ensure      = \"Present\"\n   \
    \         Key         = \"HKEY_LOCAL_MACHINE:\\SYSTEM\\CurrentControlSet\\Control\\\
    PriorityControl\"\n            ValueName   = \"Win32PrioritySeparation\"\n   \
    \         ValueType   = 'Dword'\n            ValueData   = 24\n        }\n   \
    \     Service SQLServerService {\n            Name        = \"MSSQLSERVER\"\n\
    \            StartupType = \"Automatic\"\n            State       = \"Running\"\
    \n        }\n    }\n}\nWindowsConfig\n```\n**Listing 3-4** Define the Configuration\n\
    \n## Running the Configuration\n\nNow that we have saved our configuration, we\
    \ will run the configuration to generate the `.mof` file, as demonstrated in Listing\
    \ 3-5.\n\n> **Tip**\n> If you have used a different path or filename for the configuration\
    \ file, make sure you change the path in the following scripts.\n\n```powershell\n\
    .\\C:\\Scripts\\WindowsConfig.ps1\n```\n**Listing 3-5** Run the Configuration\n\
    \nThe output of this command is shown below:\n\n```\nMode          LastWriteTime\
    \         Length Name\n----          -------------         ------ ----\n-a----\
    \        10/11/2024   10:22       3796 localhost.mof\n```\n\nIf you look in the\
    \ file system, you will notice that when we ran the configuration it created a\
    \ folder with the same name as the configuration and a `.mof` file inside it.\
    \ This file is named after the node and contains configuration information for\
    \ the system. The folder is shown in Figure 3-2.\n\n![File Explorer screenshot\
    \ showing a directory path: This PC > Local Disk (C:) > Scripts > WindowsConfig.\
    \ The directory contains a single file named \"localhost.mof\" with a modification\
    \ date of 10/11/2024 at 10:22. The file type is MOF File, and its size is 4 KB.](images/395785_2_En_3_Chapter/395785_2_En_3_Fig2_HTML.jpg)\n\
    \n**Figure 3-2** Configuration folder"
  raw: '## Using DSC to Configure Windows Server


    Now that we understand the key concepts, let’s put those concepts into practice
    to perform some simple Windows Server configuration, using DSC 1.1\. There are
    many configurations that you may wish to perform at the operating system level,
    such as configuring the operating system to be in line with the CIS benchmark
    or ensuring that the SQL Server Database Engine service is running. To keep things
    simple, in this example, however, we will look to ensure the following target
    configurations:


    *   Ensure a folder exists that will store backups of certificates used by SQL
    Server


    *   Ensure that Windows is configured to optimize background tasks


    *   Ensure that the SQL Server Database Engine service is running


    The code snippet in Listing [3-1](#395785_2_En_3_Chapter.xhtml#PC1) demonstrates
    how to define a resource that will ensure that a folder called CertificateBackups
    exists. The declaration starts by using the `File` keyword, which denotes the
    resource being declared is the DSC File resource. This is followed by the name
    of the resource. Providing a name is essential, as it uniquely identifies resources
    of the same type. Inside the curly brackets, we pass `Ensure = "Present"` which
    states that we want to ensure the folder exists. If we wanted to ensure that it
    doesn’t exist, we could pass `Ensure = "Absent"`. We pass `Type = "Directory"`.
    If we wanted to manage a file, instead of a folder, we could pass `Type = "File"`.
    We could then use `Content = "FooBar"` to insert the text into the file. Finally,
    we pass `DestinationPath = "C:\CertificateBackups"`, which defines which folder
    we want the resource to manage.


    ```

    File CreateCertificateBackupsFolder {

    Ensure           = "Present"

    Type             = "Directory"

    DestinationPath  = "C:\CertificateBackups"

    }

    Listing 3-1

    Define a File Resource

    ```


    The code snippet in Listing [3-2](#395785_2_En_3_Chapter.xhtml#PC2) demonstrates
    how to use a Registry DSC resource. This resource type is useful for configuring
    many Windows-level items, but here we will use it to ensure that Windows is configured
    to be optimized for background tasks. We don’t want the database engine having
    to wait, because a user clicking around Management Studio is being prioritized.
    This time, we use the Registry keyword to denote that this is a Registry DSC resource.
    Again, we give it a sensible name. Inside the curly brackets, we once again use
    `Ensure = “Present”` to indicate that the relevant string value should exist inside
    the registry key. We use `Key = "HKLM:\SYSTEM\CurrentControlSet\Control\PriorityControl"`
    to specify the path to the registry key that we want to manage. We use `ValueName
    = "Win32PrioritySeparation"` to denote the value within the key that should be
    present and `ValueData = 24` to define our desired value for the key.


    ```

    Registry OptimizeForBackgroundServices {

    Ensure      = "Present"

    Key         = "HHKEY_LOCAL_MACHINE:\SYSTEM\CurrentControlSet\Control\PriorityControl"

    ValueName   = "Win32PrioritySeparation"

    ValueType   = ''Dword''

    ValueData   = 24

    }

    Listing 3-2

    Define a Registry Resource

    ```


    Our final resource ensures that the database engine service of the Default SQL
    Server instance is running.


    Tip


    We will be discussing how to build SQL Server in Chapter [6](#395785_2_En_6_Chapter.xhtml),
    so if you want to follow along with the examples, but don’t have SQL Server installed
    yet, you can change the SQL Server Database Engine service to be any other service,
    which does exist.


    Listing [3-3](#395785_2_En_3_Chapter.xhtml#PC3) demonstrates how to define this
    resource, by using the Service DSC resource. The declaration starts with the Service
    keyword to denote that we are using the Service DSC resource, and, again, we provide
    a sensible name. Inside the curly brackets, you will notice that, this time, we
    do not pass Ensure. When not present, Ensure defaults to Present. We pass `Name
    = "MSSQLSERVER"` to define the service we wish to manage. We pass `StartupType
    = "Automatic"` to specify that the service should always be configured to start
    automatically and `State = "Running"` to specify that the service should always
    be running. If the service is stopped, DSC will automatically start it for us.


    ```

    Service SQLServerService

    {

    Name        = "MSSQLSERVER"

    StartupType = "Automatic"

    State       = "Running"

    }

    Listing 3-3

    Define a Service Resource

    ```


    Now that all of our resources are defined, we need to bring them together into
    a configuration file. The configuration file that we will use is shown in Listing
    [3-4](#395785_2_En_3_Chapter.xhtml#PC4). The first line uses the Configuration
    keyword, followed by a name for the configuration. The required DSC resources
    are imported from the PSDesiredStateConfiguration PowerShell module.


    Next, we define the host or hosts that the configuration should run on. In our
    topology, we will be scheduling the configuration to run locally from Task Scheduler.
    Therefore, we define it as localhost. Inside the node definition, we have the
    definition of all of the resources which lay out our desired configuration.


    Finally, the last line of the file calls the configuration that we have just defined.
    Think of the definition of the configuration a bit like defining a function. It’s
    not enough to just define what a function will do, it needs to actually be called
    off in order to be executed.


    We need to save this file to our local computer. I have saved mine as C:\Scripts\WindowsConfig.ps1.


    ```

    Configuration WindowsConfig {

    Import-DscResource -ModuleName ''PSDesiredStateConfiguration''

    Node ''localhost'' {

    File CreateCertificateBackupsFolder {

    Ensure = "Present"

    Type = "Directory"

    DestinationPath = "C:\CertificateBackups"

    }

    Registry OptimizeForBackgroundServices {

    Ensure      = "Present"

    Key         = "HKEY_LOCAL_MACHINE:\SYSTEM\CurrentControlSet\Control\PriorityControl"

    ValueName   = "Win32PrioritySeparation"

    ValueType   = ''Dword''

    ValueData   = 24

    }

    Service SQLServerService

    {

    Name        = "MSSQLSERVER"

    StartupType = "Automatic"

    State       = "Running"

    }

    }

    }

    WindowsConfig

    Listing 3-4

    Define the Configuration

    ```


    Now that we have saved our configuration, we will run the configuration to generate
    the .mof file, as demonstrated in Listing [3-5](#395785_2_En_3_Chapter.xhtml#PC5).


    Tip


    If you have used a different path or filename for the configuration file, make
    sure you change the path in the following scripts.


    ```

    C:\Scripts\WindowsConfig.ps1

    Listing 3-5

    Run the Configuration

    ```


    The output of this command is shown below:


    ```

    Mode          LastWriteTime               Length Name

    ------        --------------------        ------ -----------

    -a----        10/11/2024     10:22        3796 localhost.mof

    ```


    If you look in the file system, you will notice that when we ran the configuration
    it created a folder with the same name as the configuration and a .mof file inside
    it. This file is named after the node and contains configuration information for
    the system. The folder is shown in Figure [3-2](#395785_2_En_3_Chapter.xhtml#Fig2).


    ![](images/395785_2_En_3_Chapter/395785_2_En_3_Fig2_HTML.jpg)


    File Explorer screenshot showing a directory path: This PC > Local Disk (C:) >
    Scripts > WindowsConfig. The directory contains a single file named "localhost.mof"
    with a modification date of 10/11/2024 at 10:22\. The file type is MOF File, and
    its size is 4 KB.


    Figure 3-2


    Configuration folder'
  trans: "\n# 使用 DSC 配置 Windows 服务器\n\n现在我们已经理解了关键概念，让我们将这些概念付诸实践，使用 DSC 1.1 来执行一些简单的\
    \ Windows 服务器配置。您可能希望在操作系统级别执行许多配置，例如配置操作系统以符合 CIS 基准，或者确保 SQL Server 数据库引擎服务正在运行。然而，为了保持简单，在本例中，我们将力求确保以下目标配置：\n\
    \n*   确保存在一个用于存储 SQL Server 使用的证书备份的文件夹\n*   确保 Windows 被配置为优化后台任务\n*   确保 SQL\
    \ Server 数据库引擎服务正在运行\n\n## 定义文件资源\n\n清单 3-1 中的代码片段演示了如何定义一个资源，该资源将确保存在一个名为 `CertificateBackups`\
    \ 的文件夹。声明以使用 `File` 关键字开始，这表示被声明的资源是 DSC `File` 资源。后面是资源的名称。提供名称至关重要，因为它唯一地标识了相同类型的资源。在花括号内，我们传递\
    \ `Ensure = \"Present\"`，这表明我们希望确保文件夹存在。如果我们想确保它不存在，可以传递 `Ensure = \"Absent\"\
    `。我们传递 `Type = \"Directory\"`。如果我们想管理一个文件而不是文件夹，可以传递 `Type = \"File\"`。然后我们可以使用\
    \ `Content = \"FooBar\"` 将文本插入文件。最后，我们传递 `DestinationPath = \"C:\\CertificateBackups\"\
    `，它定义了我们要让资源管理哪个文件夹。\n\n```powershell\nFile CreateCertificateBackupsFolder {\n\
    Ensure           = \"Present\"\nType             = \"Directory\"\nDestinationPath\
    \  = \"C:\\CertificateBackups\"\n}\n```\n**清单 3-1** 定义一个 `File` 资源\n\n## 定义注册表资源\n\
    \n清单 3-2 中的代码片段演示了如何使用 `Registry` DSC 资源。这种资源类型对于配置许多 Windows 级别的项目很有用，但在这里，我们将用它来确保\
    \ Windows 被配置为针对后台任务进行优化。我们不希望数据库引擎因为用户在 Management Studio 中点击操作被优先处理而不得不等待。这次，我们使用\
    \ `Registry` 关键字来表示这是一个 `Registry` DSC 资源。同样，我们给它一个合理的名称。在花括号内，我们再次使用 `Ensure\
    \ = “Present”` 来表示相关的字符串值应存在于注册表项中。我们使用 `Key = \"HKLM:\\SYSTEM\\CurrentControlSet\\\
    Control\\PriorityControl\"` 来指定我们想要管理的注册表项的路径。我们使用 `ValueName = \"Win32PrioritySeparation\"\
    ` 来表示该项中应该存在的值，并使用 `ValueData = 24` 来定义我们为该项期望的值。\n\n```powershell\nRegistry OptimizeForBackgroundServices\
    \ {\nEnsure      = \"Present\"\nKey         = \"HKLM:\\SYSTEM\\CurrentControlSet\\\
    Control\\PriorityControl\"\nValueName   = \"Win32PrioritySeparation\"\nValueType\
    \   = 'Dword'\nValueData   = 24\n}\n```\n**清单 3-2** 定义一个 `Registry` 资源\n\n## 定义服务资源\n\
    \n我们的最后一个资源确保默认 SQL Server 实例的数据库引擎服务正在运行。\n\n> **提示**\n> 我们将在第 6 章讨论如何构建 SQL\
    \ Server，因此如果您想跟随示例操作，但尚未安装 SQL Server，可以将 SQL Server 数据库引擎服务更改为任何其他确实存在的服务。\n\
    \n清单 3-3 演示了如何通过使用 `Service` DSC 资源来定义此资源。声明以 `Service` 关键字开始，表示我们正在使用 `Service`\
    \ DSC 资源，并且同样，我们提供一个合理的名称。在花括号内，您会注意到这次我们没有传递 `Ensure`。当未指定时，`Ensure` 默认为 `Present`。我们传递\
    \ `Name = \"MSSQLSERVER\"` 来定义我们希望管理的服务。我们传递 `StartupType = \"Automatic\"` 来指定该服务应始终配置为自动启动，传递\
    \ `State = \"Running\"` 来指定该服务应始终正在运行。如果服务停止，DSC 将自动为我们启动它。\n\n```powershell\n\
    Service SQLServerService {\n    Name        = \"MSSQLSERVER\"\n    StartupType\
    \ = \"Automatic\"\n    State       = \"Running\"\n}\n```\n**清单 3-3** 定义一个 `Service`\
    \ 资源\n\n## 创建配置文件\n\n现在我们所有的资源都已定义，我们需要将它们整合到一个配置文件中。我们将使用的配置文件如清单 3-4 所示。第一行使用\
    \ `Configuration` 关键字，后跟配置的名称。所需的 DSC 资源从 `PSDesiredStateConfiguration` PowerShell\
    \ 模块导入。\n\n接下来，我们定义配置应在其中运行的主机。在我们的拓扑中，我们将计划配置从任务计划程序在本地运行。因此，我们将其定义为 `localhost`。在节点定义内部，我们拥有所有资源的定义，这些资源规划了我们期望的配置。\n\
    \n最后，文件的最后一行调用了我们刚刚定义的配置。可以将配置的定义想象成定义一个函数。仅仅定义函数要做什么是不够的，它需要被实际调用才能执行。\n\n我们需要将此文件保存到本地计算机。我已将其保存为\
    \ `C:\\Scripts\\WindowsConfig.ps1`。\n\n```powershell\nConfiguration WindowsConfig\
    \ {\n    Import-DscResource -ModuleName 'PSDesiredStateConfiguration'\n    Node\
    \ 'localhost' {\n        File CreateCertificateBackupsFolder {\n            Ensure\
    \ = \"Present\"\n            Type = \"Directory\"\n            DestinationPath\
    \ = \"C:\\CertificateBackups\"\n        }\n        Registry OptimizeForBackgroundServices\
    \ {\n            Ensure      = \"Present\"\n            Key         = \"HKEY_LOCAL_MACHINE:\\\
    SYSTEM\\CurrentControlSet\\Control\\PriorityControl\"\n            ValueName \
    \  = \"Win32PrioritySeparation\"\n            ValueType   = 'Dword'\n        \
    \    ValueData   = 24\n        }\n        Service SQLServerService {\n       \
    \     Name        = \"MSSQLSERVER\"\n            StartupType = \"Automatic\"\n\
    \            State       = \"Running\"\n        }\n    }\n}\nWindowsConfig\n```\n\
    **清单 3-4** 定义配置\n\n## 运行配置\n\n现在我们已经保存了配置，我们将运行该配置以生成 `.mof` 文件，如清单 3-5 所示。\n\n\
    > **提示**\n> 如果您为配置文件使用了不同的路径或文件名，请确保更改以下脚本中的路径。\n\n```powershell\n.\\C:\\Scripts\\\
    WindowsConfig.ps1\n```\n**清单 3-5** 运行配置\n\n此命令的输出如下所示：\n\n```\nMode          LastWriteTime\
    \         Length Name\n----          -------------         ------ ----\n-a----\
    \        10/11/2024   10:22       3796 localhost.mof\n```\n\n如果您查看文件系统，会注意到当我们运行配置时，它创建了一个与配置同名的文件夹，里面有一个\
    \ `.mof` 文件。该文件以节点命名，并包含系统的配置信息。该文件夹如图 3-2 所示。\n\n![文件资源管理器截图显示目录路径：此电脑 > 本地磁盘\
    \ (C:) > Scripts > WindowsConfig。该目录包含一个名为“localhost.mof”的文件，修改日期为 2024 年 10 月\
    \ 11 日 10:22。文件类型为 MOF 文件，大小为 4 KB。](img/395785_2_En_3_Fig2_HTML.jpg)\n\n**图 3-2**\
    \ 配置文件夹\n"
- fmt: 'So, let’s apply the configuration and see what happens. We can apply the configuration
    using the `Start-DscConfiguration` cmdlet, as shown in Listing [3-6](#395785_2_En_3_Chapter.xhtml#PC7).
    We use the `-Path` parameter to pass the folder that was created by executing
    the configuration, and we use the `-Verbose` switch, so we can see the details
    of what is happening.


    > **Tip**

    >

    > Before running the script, I recommend stopping the SQL Server Database Engine
    service, ensuring that you do not have a folder called `C:\CertificateBackups`
    and making sure Windows is optimized for Programs. That will allow you to test
    your configuration has applied the desired state as expected.


    ```

    Start-DscConfiguration -Path ''C:\Scripts\WindowsConfig'' -Verbose -Wait

    Listing 3-6

    Apply the Configuration

    ```


