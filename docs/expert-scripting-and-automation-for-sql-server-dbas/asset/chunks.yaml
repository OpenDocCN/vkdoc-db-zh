  trans: "\n### 测试规范化\n\n我们可以通过创建一个简单的 ERD（实体关系图）来测试规范化过程是否有效。该图将以图形方式描绘实体及其连接键。当键是唯一的时，连接实体的线条将带有标准端点。当可能出现重复键值时，线条将带有“鸦爪”状端点。\n\
    \n当我们检查完成的 ERD 时，我们希望看到每条连接实体的线条都是一端为标准线，另一端为鸦爪状。这被称为一对多关系，将直接映射到物理数据库表中的主键和外键约束。\n\
    \n如果我们发现多对多关系，很可能我们遗漏了一个实体，需要在我们的设计中添加一个额外的实体，其作用方式与我们的 `DR Server` 实体类似，用于将多对多关系分解为两个一对多关系。\n\
    \n另一方面，如果我们发现一对一关系，那几乎肯定是我们将实体规范化到了一个会增加查询复杂性却没有任何价值的程度。这种情况下，我们应该将实体反规范化，直到所有实体都使用一对多关系连接在一起。我们规范化后的库存数据库的\
    \ ERD 可以在图 8-4 中找到。\n\n![](img/395785_2_En_8_Fig4_HTML.jpg)\n\n显示表间关系的数据库模式流程图图表。主要表包括“Server”、“Instance”、“Service\
    \ Account”、“sa Account”、“DR Server”和“DR Instance”。每个表列出属性，如“Server Name”、“Cluster\
    \ Flag”、“Instance Name”、“Service Account Name”和“DR Technology”。线条连接表以指示关系，键被标记为“PK”（主键）和“FK”（外键）。该图表直观地表示了数据库系统内的结构和连接。\n\
    \n图 8-4: 实体关系图\n\n你会注意到 ERD 发现了一个我们建模中的问题。`sa Account` 实体通过一对一关系连接到 `Instance`\
    \ 实体。这意味着我们应该将 `sa Account` 实体反规范化回到 `Instance` 实体中。由此产生的 ERD 显示在图 8-5 中。\n\n\
    ![](img/395785_2_En_8_Fig5_HTML.jpg)\n\n一个数据库模式图示，包含五个相互连接的表：Server、Instance、DR\
    \ Server、Service Account 和 DR Instance。每个表列出了属性和键。Server 表包含属性如 Server Name 和\
    \ SQL Server Version。Instance 表包含 Instance Name 和 IP Address。DR Server 表列出 DR\
    \ Server Name。Service Account 表包含 Service Account Name。DR Instance 表具有 DR Instance\
    \ 和 DR Technology。线条表示表之间的关系，标有主键和外键。\n\n图 8-5: 反规范化的 ERD\n\n提示\n\n前面的示例展示了如何为一个简单的库存数据库建模。在创建库存数据库以支持你的生产环境时，你可能还希望存储与高可用性（HA）技术相关的详细信息，例如\
    \ AlwaysOn 故障转移集群或 AlwaysOn 可用性组。你可能还希望将 `Servers`、`DR Servers` 和（可能的）`HA Servers`\
    \ 建模为超类型和子类型。有关超类型和子类型的更多详细信息，请访问 [`https://msdn.microsoft.com/en-us/library/cc505839.aspx`](https://msdn.microsoft.com/en-us/library/cc505839.aspx)。\n\
    \n## 库存数据库物理设计\n\n既然我们有了数据库的逻辑模型，我们就必须考虑物理设计。第一个考虑因素可能是我们的属性和实体名称，以及它们如何映射到 SQL\
    \ Server 友好的对象标识符，这些标识符将不需要被封装在方括号中。在代码中引用对象标识符时，如果违反以下任何规则，则必须将其封装在方括号中：\n\n\
    1.  标识符不能包含空格。\n\n2.  标识符不能包含以下特殊字符：\n\n```\n    ~                           \
    \   '\n    -                              &\n    !                           \
    \   .\n    {                              (\n    %                           \
    \   \\\n    }                              )\n    ^                          \
    \    `\n```\n\n3.  标识符不能与 T-SQL 关键字相同。\n\n如果标识符不符合这些规则，则它们被称为分隔标识符。我们的 `Server`\
    \ 和 `Instance` 实体符合这些规则，但我们的 `DR Server` 实体将成为 `DRServer`；我们的 `DR Instance` 实体将成为\
    \ `DRInstance`；我们的 `Service Account Entity` 将成为 `ServiceAccount`。表 8-4 详细说明了属性名到列名的映射。\n\
    \n表 8-4: 移除分隔标识符\n\n| 属性名称 | 列名称 |\n| --- | --- |\n| `Server name` | `ServerName`\
    \ |\n| `Instance name` | `InstanceName` |\n| `Port` | `Port` |\n| `IP Address`\
