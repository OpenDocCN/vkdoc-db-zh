- fmt: '## Summary


    对于希望通过脚本编写和自动化任务来减少工作量的数据库管理员（DBA）而言，必须熟悉一些 T-SQL 技术。虽然本书侧重于 PowerShell，但有时在 T-SQL
    层编写代码才是最优解决方案，这意味着您的代码将横跨 PowerShell 和 T-SQL 两个层面。


    使用 `APPLY` 操作符可以将函数应用于结果集中的每一行。当使用 `CROSS APPLY` 操作符时，仅返回那些不会导致函数返回 `NULL` 值的行。当使用
    `OUTER APPLY` 操作符时，结果集中的所有行都将被返回。DBA 可以使用此技术将动态管理函数应用于动态管理视图。


    XML 对于 DBA 来说是一项日益重要的技术，需要理解并能够处理。SQL Server 中与 XML 相关的两个主要概念是将 XML 转换为关系值，以及将结果集转换为
    XML 文档。`SELECT` 语句的 `FOR XML` 子句可用于从结果集生成 XML 文档。基于 XPath 的 XQuery 可用于从 XML 文档中提取值。


    许多 DBA 仍然使用游标来遍历对象，但在子查询中使用 XQuery `data()` 方法提供了一种优化得多的解决方案。它也通过以身作则，促进了开发人员的良好实践。


    ## 2. PowerShell 基础


    PowerShell 是由微软编写的一种强大的脚本语言。它使用 .NET 公共语言运行时（CLR），提供了开箱即用的庞大功能，并且完全可扩展。它专为自动化和管理而设计，常用于云环境（如
    Azure 和 AWS）的自动化或维护。它也是管理诸如 Microsoft Exchange 等平台的首选语言，当然也包括 SQL Server。PowerShell
    核心版（v7）不仅支持 Windows，还支持 Mac OS 和 Linux。它完全支持多种 Linux 变体，包括 Red Hat、Ubuntu 和 Debian
    等等。


    在本章中，我们将回顾 PowerShell 语言的基础知识。我们将从一个简短的加速器开始，它将帮助我们提高效率。然后我们将讨论一些基本的语言元素，例如注释、数据类型、变量和流程控制语句。最后，我们将概述
    PowerShell 模块，它们提供了可扩展性。


    ### 入门指南


    要开始使用，我们应该理解 PowerShell 可以通过两种不同的方式使用。第一种是命令行 Shell。它为管理员提供了使用 PowerShell 终端运行临时命令（称为
    cmdlet）或简单脚本的能力。在 Windows 环境中，此终端可以替代 cmd shell，并提供更丰富的体验。命令返回的是 .NET 对象而非纯文本，并且可以使用管道（我们将在本章后面讨论）将命令链接在一起。终端本身提供了命令行历史和
    Tab 键补全功能。


    第二种使用 PowerShell 的方式是将其作为脚本语言。当用作脚本语言时，PowerShell 为创建自动化提供了一个丰富、可扩展的平台，允许管理员和
    DevOps 工程师利用 .NET 的力量以及一个完全面向对象的语言（包含类、继承、方法和属性）。这意味着该语言可以通过类、函数和模块完全扩展。


    ### 执行策略


    如果我们计划在 Windows 上使用 PowerShell 进行自动化，那么我们需要考虑执行策略。这是 PowerShell 安全策略的一部分，决定了用户是否可以运行脚本、加载配置文件以及加载配置文件。表
    2-1 详细列出了可以在 Windows 上设置的执行策略。


    **表 2-1**


    **执行策略**


    | 策略 | 描述 |

    | --- | --- |

    | **Undefined** | `Windows 环境中的默认策略。检查组策略中是否定义了策略。如果在所有作用域都未定义，则其效果等同于 Windows
    客户端的 Restricted 或 Windows Server 的 RemoteSigned。` |

    | **AllSigned** | `所有脚本和配置文件都必须由受信任的发布者签名。即使脚本是在本地计算机上编写的。` |

    | **Bypass** | `没有任何阻止。没有警告或提示。` |

    | **Default** | `将 Windows 桌面设置为 Restricted，将 Windows 服务器设置为 RemoteSigned。` |

    | **RemoteSigned** | `如果脚本或配置文件是下载的，则必须签名或明确解除阻止。本地创建的脚本可以无需签名即可执行。` |

    | **Restricted** | `不能运行脚本，也不能加载配置文件。` |

    | **Unrestricted** | `所有脚本都可以执行，所有配置文件都可以加载。如果脚本是从互联网下载且未签名，则用户在执行前会收到提示。这是非 Windows
    系统上的默认设置。` |


    默认情况下，指定执行策略时，它应用于 `LocalMachine` 作用域。但是，可以使用 `-Scope` 参数来指定 `CurrentUser` 或 `Process`。如果使用
    `Process` 作用域，则该策略仅适用于当前 PowerShell 会话。


    在非 Windows 操作系统上，从 PowerShell 6 开始，默认策略是 `Unrestricted`，并且无法覆盖。然而在 Windows 上，应适当考虑合适的执行策略，通常需要与组织的网络安全团队协作制定。


    如果您打算按照本书中的示例操作，并从代码存储库下载代码示例，我建议将执行策略设置为 `Unrestricted`，这可以通过清单 2-1 中的命令实现。


    ```

    Set-ExecutionPolicy Unrestricted

    ```

    **清单 2-1**

    **设置执行策略**


    > **提示**

    > 要设置执行策略，必须以管理员身份运行终端。


    ### 标准


    虽然有例外，但 PowerShell 中的大多数命令都遵循 `动词-名词`（名词为单数）的命名约定。命令名称的第一部分（“动词”）描述了您将执行的操作。这些被称为已批准的动词，使用它们是为了保持一致性，以便命令能够被直观地理解。下面列出了一些最常见的动词，但完整列表可以在
    learn.microsoft.com/en-us/powershell/scripting/developer/cmdlet/approved-verbs-for-windows-powershell-commands?view=powershell-7.4
    找到：


    *   `Add`

    *   `Clear`

    *   `Connect`

    *   `Convert`

    *   `Copy`

    *   `Disable`

    *   `Disconnect`

    *   `Enable`

    *   `Format`

    *   `Get`

    *   `Install`

    *   `Invoke`

    *   `New`

    *   `Read`

    *   `Remove`

    *   `Rename`

    *   `Reset`

    *   `Revoke`

    *   `Save`

    *   `Select`

    *   `Set`

    *   `Show`

    *   `Start`

    *   `Stop`

    *   `Test`

    *   `Update`

    *   `Wait`

    *   `Write`


    这个前缀后面跟着一个连字符（`-`），最后是对您将要对其执行操作的资源的描述（“名词”）。例如，`Get-ChildItem` 可用于列出当前 PowerShell
    位置的内容。此位置可以是文件系统中的文件夹，也可以是 SQL Server 实例中的表。导航 SQL Server 实例将在本章后面讨论。逻辑且一致的命名约定，结合
    IntelliSense，使得在诸如 Visual Studio Code 等开发环境中学习和查找命令成为一个相对容易的过程。'
  raw: '## Summary


    The DBA who is serious about reducing workload by scripting and automating tasks
    has to be familiar with some T-SQL techniques. While this book focuses on PowerShell,
    sometimes writing code at the T-SQL layer is the most optimal solution, meaning
    that your code will span both the PowerShell and T-SQL layers.


    Using the `APPLY` operator allows you to apply a function to each row in a result
    set. When the `CROSS APPLY` operator is used, only rows that do not cause the
    function to return a `NULL` value will be returned. When the `OUTER APPLY` operator
    is used, all rows in the result set will be returned. DBAs can use this technique
    for applying Dynamic Management Functions to Dynamic Management Views.


    XML is an ever increasingly important technology for a DBA to understand and be
    able to work with. The two main concepts relating to XML within SQL Server are
    converting XML to relational values and converting a result set to an XML document.
    The `FOR XML` clause of a `SELECT` statement can be used to produce XML documents
    from result sets. XQuery, which is based on XPath, can be used to extract values
    from XML documents.


    Many DBAs still use cursors to iterate through objects, but using the XQuery `data()`
    method within a subquery provides a far more optimal solution. It also promotes
    good practice from developers, by showing that you lead by example.


    # 2. PowerShell Fundamentals


    PowerShell is a powerful scripting language, written by Microsoft. It uses the
    .NET Common Language Runtime (CLR) which provides massive functionality out of
    the box and is also entirely extensible. It is designed for automating and managing
    systems and is often used for the automation or maintenance of cloud environments,
    such as Azure and AWS. It is also the language of choice for managing platforms
    such as Microsoft Exchange and, of course, SQL Server. PowerShell Core Edition
    (v7) is supported not only on Windows but also on Mac OS and Linux. There is full
    support for many variants of Linux, including Red Hat, Ubuntu, and Debian, to
    name but a few.


    In this chapter, we will refresh ourselves on the fundamentals of the PowerShell
    language. We will start with a short accelerator, which will help us be productive.
    We will then discuss some fundamental language elements such as comments, data
    types, variables, and flow control statements. Finally, we will look at an overview
    of PowerShell modules, which provide extensibility.


    ## Getting Started


    To get started, we should understand that PowerShell can be used in two distinct
    ways. The first of these is a command-line shell. This provides administrators
    with the ability to run ad hoc commands (known as cmdlets) or simple scripts,
    using the PowerShell terminal. In a Windows environment, this terminal can be
    used instead of cmd shell and provides a much richer experience. Commands return
    .NET objects as opposed to plain text, and the pipeline (which we will discuss
    later in this chapter) can be used to chain commands together. The terminal itself
    offers command-line history and tab completion.


    The second way in which PowerShell can be used is as a scripting language. When
    used as a scripting language, PowerShell provides a rich, extensible platform
    for creating automation, which allows administrators and DevOps Engineers to harness
    the power of .NET and a fully object-oriented language with classes, inheritance,
    methods, and properties. This means that the language is fully extensible through
    classes, functions, and modules.


    ### Execution Policy


    If we plan to use PowerShell for automation on Windows, then we need to consider
    the execution policy. This is part of the PowerShell security strategy and determines
    if users can run scripts, load configuration files, and load profiles. Table [2-1](#395785_2_En_2_Chapter.xhtml#Tab1)
    details the execution policies that can be set on Windows.


    Table 2-1


    Execution Policies


    | Policy | Description |

    | --- | --- |

    | **Undefined** | `The default policy in a Windows environment. Checks to see
    if a policy is defined in Group Policy. If undefined at all scopes, then it provides
    the equivalent of Restricted for Windows Clients or the equivalent of RemoteSigned
    for Windows Server` |

    | **AllSigned** | `All scripts and configuration files must be signed by a trusted
    publisher. Even if the script was written on the local machine` |

    | **Bypass** | `Nothing is blocked. There are no warnings or prompts` |

    | **Default** | `Sets Windows desktops to Restricted and sets Windows Servers
    to RemoteSigned` |

    | **RemoteSigned** | `If a script or configuration file has been downloaded, then
    it must be signed or explicitly unblocked. Locally created scripts can be executed
    without being signed` |

    | **Restricted** | `Scripts cannot be run and configuration files cannot be loaded`
    |

    | **Unrestricted** | `All scripts can be executed and all configuration files
    can be loaded. If the script has been downloaded from the Internet and is not
    signed, then the user will be prompted before execution. This is the default,
    for non-Windows systems` |


    By default, when specifying an execution policy, it applies to the scope of `LocalMachine`.
    The `-Scope` parameter can be used, however, to specify `CurrentUser` or Process.
    If the scope of `Process` is used, then the policy only applies to the current
    PowerShell session.


    On non-Windows operating systems, from PowerShell 6 onward, the default policy
    is `Unrestricted` and this cannot be overridden. On Windows, however, due consideration
    should be given to the appropriate execution policy, usually in collaboration
    with your organization’s Cyber Security team.


    If you are planning on following examples in this book, and downloading the code
    samples from the code repository, I would recommend setting the execution policy
    to be `Unrestricted`, and this can be achieved using the command in Listing [2-1](#395785_2_En_2_Chapter.xhtml#PC1).


    ```

    Set-ExecutionPolicy Unrestricted

    Listing 2-1

    Set Execution Policy

    ```


    Tip


    To set the execution policy, you must run the terminal as administrator.


    ### Standards


    While there are exceptions, most commands in PowerShell follow the naming convention
    of Verb-Noun (noun in singular). The first part of the command’s name (“Verb”)
    describes the action that you will be performing. These are known as approved
    verbs and are used for the sake of consistency so that commands can be intuitively
    understood. Some of the most common verbs are listed below, but an exhaustive
    list can be found at learn.microsoft.com/en-us/powershell/scripting/developer/cmdlet/approved-verbs-for-windows-powershell-commands?view=powershell-7.4:


    *   Add


    *   Clear


    *   Connect


    *   Convert


    *   Copy


    *   Disable


    *   Disconnect


    *   Enable


    *   Format


    *   Get


    *   Install


    *   Invoke


    *   New


    *   Read


    *   Remove


    *   Rename


    *   Reset


    *   Revoke


    *   Save


    *   Select


    *   Set


    *   Show


    *   Start


    *   Stop


    *   Test


    *   Update


    *   Wait


    *   Write


    This prefix is followed by a hyphen (`-`) and ends with a description of the resource
    that you will be performing the action upon (“Noun”). For example, `Get-ChildItem`
    can be used to list the contents of the current PowerShell location. This location
    could be a folder in the file system, or it could be a table inside a SQL Server
    instance. Navigating a SQL Server instance is discussed later in this chapter.
    The logical and consistent naming convention, combined with IntelliSense, makes
    learning and finding commands a relatively easy process in development environments
    such as Visual Studio Code.'
