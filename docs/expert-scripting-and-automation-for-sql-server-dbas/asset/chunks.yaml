    ## 处理其他 Cmdlet


    `sqlserver`模块还包含许多不属于以上任何部分的 cmdlet。例如，`Invoke-SqlAssessment` cmdlet 可用于根据最佳实践知识库扫描你的
    SQL Server 实例，以确保你已正确加固。


    有许多 cmdlet 允许你管理 SSAS（SQL Server Analysis Services），包括处理 SSAS 数据库中数据的功能，这会刷新聚合以及可能来自源关系数据库的基础数据。这些对于自动化
    SSAS 活动的管理以及临时操作非常有用。


    还有一些 cmdlet 可以让你查看有关 SQL Server Agent、其作业和作业步骤的信息。例如，代码清单 4-29 中的命令将返回给定实例上所有
    SQL Server Agent 作业的信息。


    ```powershell

    Get-SqlAgentJob –ServerInstance "localhost"

    代码清单 4-29

    返回所有 SQL Server Agent 作业

    ```


    当在作为 SQL Server MDW（管理数据仓库）客户端的实例上运行时，此命令将返回以下输出：


    ```

    Name                      Owner       Category             Enabled    CurrentRunStatus   DateCreated               LastModified              LastRunDuration

    ----                      -----       --------             -------    ----------------   -----------               ------------              ---------------

    collection_set_1_nonca... sa          Data Collector       True       Idle               09/09/2020
    16:01:38       07/10/2020 18:46:29       00:00:04

    collection_set_2_colle... sa          Data Collector       True       Idle               09/09/2020
    16:01:41       07/10/2020 18:46:30       20.18:26:41

    collection_set_2_upload   sa          Data Collector       True       Idle               09/09/2020
    16:01:41       07/10/2020 18:46:29       00:00:09

    collection_set_3_colle... sa          Data Collector       True       Idle               09/09/2020
    16:01:44       07/10/2020 18:46:30       20.17:43:04

    collection_set_3_upload   sa          Data Collector       True       Idle               09/09/2020
    16:01:44       07/10/2020 18:46:30       00:00:03

    collection_set_6_nonca... sa          Data Collector       True       Idle               09/09/2020
    16:16:50       07/10/2020 18:46:30       00:00:06

    mdw_purge_data_sysuti... sa          Data Collector       True       Idle               09/09/2020
    16:01:17       07/10/2020 18:46:30       02:20:28

    ```


    然而，这些 cmdlet 的用处比其他一些 cmdlet 稍小，因为该模块仅包含读取作业详细信息的 cmdlet，而不包括更新它们的 cmdlet。要更新作业，你需要直接与
    SMO 交互或在`Invoke-SqlCmd`内使用 T-SQL。


    `Read-SqlXEvent` cmdlet 可用于读取扩展事件并将其写入终端。此 cmdlet 接受连接字符串（到 SQL Server）和扩展事件会话的名称（用于读取实时会话），或者，如果你希望从
    XEL 文件读取事件，则可以接受`FileName`参数的名称。例如，代码清单[4-30 中的命令可用于将名为`LocksAndLatches_XE`的实时扩展事件会话中的事件读取到终端。


    提示


    有关创建扩展事件会话的更多详细信息，请参阅 Apress 出版物*Pro SQL Server 2022 Administration*，可在此处找到：link.springer.com/book/10.1007/978-1-4842-8864-1。


    ```powershell

    $params = @{

    ConnectionString = "Server=localhost;Database=master;Trusted_Connection=True;"

    SessionName      = "system_health"

    }

    Read-SQLXEvent @params

    代码清单 4-30

    读取扩展事件会话

    ```


    ## 小结


    `sqlserver`模块提供了许多用于在 SQL Server 中执行常见管理任务的 cmdlet。但是，其功能存在一些显著缺口。可以通过直接与 SMO（`sqlserver`模块所基于的库）交互来解决这些问题。或者，有一个由社区更新的开源模块，名为`dbatools`。该模块填补了功能上的许多空白，本书第
    5 章将进行讨论。


    `Invoke-SqlCmd` cmdlet 是一个强大的工具，它允许你从 PowerShell 终端或在 PowerShell 脚本中运行 T-SQL 语句。结果可以返回到变量，允许你基于结果编写下游逻辑。例如，如果你想对一组数据库执行操作，可以使用`Invoke-SqlCmd`检索实例中数据库的动态列表，然后遍历该列表以执行所需的管理操作。


    `sqlserver`模块提供了一组用于管理 SQL Server 登录名的 cmdlet。`Add-SqlLogin` cmdlet 可用于从 Windows（带有二级身份验证）、证书或非对称密钥创建
    SQL Server 登录名，而`Get-SqlLogin` cmdlet 可用于返回有关登录名的信息，`Remove-SqlLogin` cmdlet 可用于从实例中删除登录名。但是，该模块没有处理数据库用户或权限的功能。


    该模块包含许多其他 cmdlet，包括用于管理 Analysis Services 数据库和检索有关 SQL Server Agent 作业信息的 cmdlet。`sqlserver`模块中包含的
    cmdlet 和函数的完整列表可以通过运行`Get-Command -module sqlserver`获取。

