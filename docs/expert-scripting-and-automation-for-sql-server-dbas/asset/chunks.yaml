  trans: '

    # 9. 实现 SQL Server 的配置管理


    在第 3 章中，我们探讨了配置管理的概念，以及如何使用 PowerShell DSC 来配置 Windows 操作系统并防止配置漂移。在第 6 章中，我们扩展了这一概念，研究了如何使用
    DSC 来确保 SQL Server 实例的安装。在本章中，我们将进一步探讨 `SqlServerDsc` 模块，研究如何使用它来配置我们的 SQL Server
    实例并防止漂移。


    我们将从定义构建需求开始，思考在 SQL Server 构建期间我们可能希望配置的、并在实例生命周期中防止其发生漂移的常见方面。然后，我们将探讨如何实现适当的
    DSC 资源。


    ## 定义配置需求


    在为组织定义标准构建时，我们不应只考虑安装 SQL Server，还应考虑它应如何配置。在考虑此配置时，我们应考虑诸如安全性、性能和减少持续性操作等方面。


    **提示**


    高可用性超出了本书的范围，但它是 DSC 的另一个考虑因素，因为 `SqlServerDsc` 模块包含有助于向集群或可用性组添加节点的命令。


    ### 安全需求


    SQL Server 的安全性是一个庞大的主题，我在 Apress 出版的《*Securing SQL Server*》一书中有深入探讨，该书可在此链接获取：link.springer.com/book/10.1007/978-1-4842-2265-2。然而，就本章的目的而言，让我们选取三个考虑因素。首先是
    `xp_cmdshell` 的使用。这是一个系统存储过程，允许管理员从 SQL Server 内部与操作系统交互。不幸的是，它的性质使其成为恶意活动的主要目标。存在一些攻击向量，这意味着如果
    SQL Server 实例遭到入侵，此过程可被用于在网络中执行横向移动攻击。


    我们将强制执行的第二个配置是禁用 OLE 自动化。如果启用了 OLE 自动化过程，则 SQL Server 实例的攻击面会增加，并且允许用户在数据库引擎服务的安全上下文内，执行
    SQL Server 外部的函数。这是攻击者希望执行横向移动攻击的另一个主要目标。


    最后，我们将确保内置的 Windows `Administrators` 角色不与 SQL Server 登录关联。在非常旧的 SQL Server 版本中，`Administrators`
    组会自动获得 SQL Server 登录名并被添加到 `sysadmin` 固定服务器角色中。然而，在过去的 15 年里，这种行为已经改变，现在被认为是不良实践。事实上，在
    SQL Server 2022 中，已无法再将本地 Administrators 组添加为登录名。只有指定的 SQL Server 管理员才应被授予 SQL
    Server 实例的权限。如果未掌握 SQL Server 技能的管理员尝试在 SQL Server 中执行操作，即使他们的意图是善意的，也可能导致问题。


    ### 性能需求


    确保良好的性能是许多 DBA 心中的首要任务。许多性能配置将取决于实例中托管数据库的工作负载特征。例如，期望高比例 `INSERTS` 和 `UPDATES`
    的 OLTP 数据库，其配置可能与数据仓库数据库不同，后者受夜间 ETL 运行的影响，但用户体验主要基于大型读取。然而，有一些性能优化通常**适用**，无论工作负载特征如何。


    我们将为实例确保的第一个配置是最大并行度 (MAXDOP) 得到最佳配置。此设置将确定单个查询可使用的最大核心数。将 MAXDOP 设置为 0 允许无限并行化，而将其设置为整数值则指定可使用的逻辑处理器数量。


    尽管存在一些边缘情况，例如具有多个 NUMA 节点的服务器，但一般经验法则是 MAXDOP 应配置为服务器中的核心数，最多不超过 8。`SqlserverDsc`
    允许我们动态配置此值。这非常有帮助，因为这意味着如果我们调整服务器规模，DSC 会自动更改 MAXDOP 以确保其保持适当。


    我们将强制执行的第二个配置与 SQL Server 消耗的内存量有关。Microsoft 建议 SQL Server 使用的最大内存量（用于缓冲区缓存）为服务器总内存的
    75%。因此，我们将强制执行此建议。与 MAXDOP 一样，`SqlserverDsc` 可以动态强制执行此设置，以确保在服务器调整规模后仍遵循最佳实践，而无需管理员干预。


    **提示**


    如果服务器上安装了多个实例，则应将 75% 的内存分配给这些实例。例如，如果服务器托管三个实例，您可能希望将每个实例的最大内存设置为 25%，以确保一个实例不会使其他实例因内存不足而受限。


    下一个配置涉及 SQL Server 实例将消耗的最小内存量。默认情况下，SQL Server 根据需要上下调整内存使用量。问题在于，SQL Server
    中的动态内存分配并非该产品的最强功能。鉴于 SQL Server 通常是服务器上运行的唯一应用程序，并且假设只有一个实例，我建议将最小内存配置为与最大内存相同，从而防止动态内存管理。


    **提示**


    SQL Server 不会在服务启动时为自己分配最小内存。它总是会根据需要增长内存使用量。最小内存设置的作用是设置可释放内存量的限制。


    ### 减少持续性操作


    自动化的理念是防止手动任务的需求。因此，如果我们事先知道安装后需要管理任务，那么最好提前将其自动化，以便以后节省时间。


    我们将强制执行的第一个配置，以减少以后的管理工作量，是确保 DBA 团队对实例具有管理访问权限。这将涉及为名为 `DBATeam` 的 Windows 组创建一个登录名，并确保此登录名位于
    `sysadmin` 固定服务器角色中。


    我们将强制执行的第二个配置涉及我们在第 8 章讨论的中央管理服务器和配置数据库。具体来说，我们将确保存在一个链接服务器，该服务器提供对中央管理服务器上 `Config`
    数据库的访问。这将允许我们从本地实例运行查询，以检索有用的信息，例如应用程序所有者。


    ## 实现配置


    在以下部分中，我们将研究如何为每个需求创建资源。第一部分将介绍如何实现我们的安全需求。然后，我们将讨论如何实现性能和操作需求。最后，我们将把所有内容整合到我们在第
    3 章和第 6 章中一直在构建的配置中。

    '
- fmt: '### Implementing Security Resources


    Let’s look at how we can enforce each of our chosen security-related configurations
    using DSC. The first resource we will need should ensure that `xp_cmdshell` is
    disabled. We can achieve this using the resource definition in Listing 9-1. This
    resource uses the `SqlConfiguration` resource type from the `SqlserverDsc` module,
    and we have given it a name of `xpCmdshell`. You will notice that we are not passing
    an `Ensure` parameter to this resource. Instead, we pass the name of the option
    and the desired value of the option. In our case, this is `0`, which means disabled.
    We can also specify if we want the service to be restarted. This is because there
    are a small number of configuration options that will only take effect after a
    service restart.


    Tip


    When configuring a default instance with the `SqlserverDsc` module, we should
    pass `MSSQLSERVER` as the instance name. For a named instance, we will, of course,
    pass the instance name instead. In this scenario, our configuration (see Chapter
    6) is parameterized, so we will pass the `SqlInstanceName` variable, which has
    a default value of `MSSQLSERVER` but can be overridden when the MOF is compiled.


    ```

    SqlConfiguration ''xpCmdshell'' {

    OptionName     = ''xp_cmdshell''

    OptionValue    = 0

    RestartService = $false

    ServerName     = ''localhost''

    InstanceName   = $SqlInstanceName

    }

    ```

    Listing 9-1. xpCmdshell Resource


    Our next resource will ensure that OLE Automation is disabled in the instance.
    For this configuration, we will again use the `SqlConfiguration` resource. This
    time, however, we will pass in the `OptionName` of `Ole Automation Procedures`.
    Once again, we will pass in the `OptionValue` of `0` to denote that we want the
    feature to be disabled. This is illustrated in Listing 9-2.


    ```

    SqlConfiguration ''OLEAutomation'' {

    OptionName     = ''Ole Automation Procedures''

    OptionValue    = 0

    RestartService = $false

    ServerName     = ''localhost''

    InstanceName   = $SqlInstanceName

    }

    ```

    Listing 9-2. OLEAutomation Resource


    The final security-related resource that we will create will ensure that the Windows
    `Authenticated Users` group does not have a SQL Server Login. To do this, we will
    use the `SqlLogin` resource from the `SqlserverDsc` module. We will pass in the
    `Ensure` parameter, but instead of using `Ensure = ''Present''` as we have previously,
    we will use `Ensure = ''Absent''` to remove the Login if it exists.


    We will use the `Name` parameter to provide the name of the Login that we wish
    to remove, and the `LoginType` parameter allows us to define if the Login is mapping
    to a Windows user, a Windows group, or a SQL Login. This is demonstrated in Listing
    9-3.


    ```

    SqlLogin ''AuthenticatedUsers'' {

    Ensure       = ''Absent''

    Name         = ''NT AUTHORITY\Authenticated Users''

    LoginType    = ''WindowsGroup''

    ServerName   = ''localhost''

    InstanceName = $SqlInstanceName

    }

    ```

    Listing 9-3. BuiltinAdministrators Resource


    ### Implementing Performance Resources


    Let’s examine how we can perform our performance configurations using DSC. The
    first of these configurations ensures that `MAXDOP` is configured to an optimum
    value. With the `SqlMaxDop` resource, it is possible to pass a desired value for
    the `MAXDOP`, but instead of doing this, we will pass `DynamicAlloc = $true`.
    This is a useful feature, which uses logic contained in the code of the resource,
    which will calculate the ideal value based on the current size of the server and
    configure `MAXDOP` appropriately. This is demonstrated in Listing 9-4.


    Tip


    If your server has multiple NUMA nodes, then the recommendations are different,
    and the `SqlMaxDop` resource does not have logic to support this. Therefore, if
    the server has multiple NUMA nodes, I would recommend adding your own custom logic
    into the configuration.


    ```

    SqlMaxDop ''DynamicSqlMaxDop'' {

    Ensure                  = ''Present''

    DynamicAlloc            = $true

    ServerName              = ''localhost''

    InstanceName            = $SqlInstanceName

    }

    ```

    Listing 9-4. DynamicSqlMaxDop Resource


    Next, we will consider the minimum and maximum memory requirements. We want to
    configure both of these settings to be 75% of the available memory in the server,
    which will leave enough memory for the operating system and avoid dynamic memory
    management in SQL Server.


    We can configure both of these options using a single `SqlMemory` resource. This
    resource allows us to configure the minimum and maximum memory dynamically, using
    rules built into the resource, or it allows us to pass an arbitrary value in MB.
    In our case, however, we want to pass values as a percentage of total server memory.
    Therefore, we will use the `MaxMemoryPercent` and `MinMemoryPercent` parameters,
    as shown in Listing 9-5.


    ```

    SqlMemory ''MinAndMaxMemory75Percent'' {

    Ensure               = ''Present''

    DynamicAlloc         = $false

    MaxMemoryPercent     = 75

    MinMemoryPercent     = 75

    ServerName           = ''localhost''

    InstanceName         = $SqlInstanceName

    }

    ```

    Listing 9-5. MinAndMaxMemory75Percent Resource'
