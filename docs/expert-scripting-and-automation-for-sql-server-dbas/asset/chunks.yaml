    ```

    master

    tempdb

    model

    msdb

    AdventureWorks2022

    master

    tempdb

    model

    msdb

    ```


    You could, of course, deal with this issue by adding the `@@SERVERNAME` to the
    SELECT list. `Invoke-DbaQuery` offers an alternative, however. You can simply
    specify the `–AppendServerInstance` parameter. The difference between the two
    techniques is apparent when dealing with a local server. Using the `@@SERVERNAME`
    technique will cause the actual server name to be returned. Using the `–AppendServerInstance`
    technique, however, will return whatever value you passed into `Invoke-DbaQuery`.
    This could be the server name, localhost, or an IP address. For example, consider
