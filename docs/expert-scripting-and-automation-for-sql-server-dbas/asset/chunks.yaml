    param(

    [Parameter(Mandatory=$true)]

    [string]       $InstanceName,

    [PSCredential] $SQLServiceAccountCredential = (Get-Credential -Message ''Enter
    the SQL service account credential''),

    [PSCredential] $AgentServiceAccountCredential = (Get-Credential -Message ''Enter
    the SQL Server Agent service account credential'')

    )

    # Initialize ConnectionString variable

    Write-Host ''Initialise variables...''

    $serverName = $env:computername

    $connectionString = ''{0}\{1}'' -f $serverName, $InstanceName

    Write-Host ''Initialise variables complete''

    #Install the instance

    Write-Host ''Install the instance...''

    $params = @(

    ''/INSTANCENAME="{0}"'' -f $InstanceName

    ''/SQLSVCACCOUNT="{0}"'' -f $SQLServiceAccountCredential.Username

    ''/SQLSVCPASSWORD="{0}"'' -f $SQLServiceAccountCredential.GetNetworkCredential().Password

    ''/AGTSVCACCOUNT="{0}"'' -f $AgentServiceAccountCredential.Username

    ''/AGTSVCPASSWORD="{0}"'' -f$AgentServiceAccountCredential.GetNetworkCredential().Password

    ''/CONFIGURATIONFILE="C:\SQL2022\Configuration2.ini"''

    )

    Start-Process -FilePath ''C:\SQLServerSetup\SETUP.EXE'' -ArgumentList $params
    -Wait -NoNewWindow

    Write-Host ''Instance installation complete''

    # Configure OS settings

    Write-Host ''Configure OS settings...''

    Start-Process -FilePath ''C:\Windows\System32\powercfg.exe'' -ArgumentList ''-setactive
    8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c'' -Wait -NoNewWindow

    Write-Host ''High Performance power plan configured''

    Set-ItemProperty -Path HKLM:\SYSTEM\CurrentControlSet\Control\PriorityControl\
    -Name Win32PrioritySeparation -Value 24

    Write-Host ''Optimise for background services configured''

    # Run smoke tests

    Write-Host ''Run smoke tests...''

    Get-Service -DisplayName (''*{0}*'' -f $InstanceName)

    Write-Host ''Service running check complete''

    Invoke-SqlCmd -Serverinstance $connectionString -Query "SELECT @@SERVERNAME" -TrustServerCertificate

    Write-Host ''Instance accessibility check complete''

    Listing 6-13

    Auto-install Script with Defensive Code

    ```


    The SQLAutoInstall3.ps1 script has been run, but without any parameters specified.
    In previous versions of the script, PowerShell would have gone ahead and executed
    the code, only for setup.exe to fail, since no values were specified for the required
    parameters. In this version, however, you can see that you will be prompted to
    enter a value for each parameter in turn. It is achieved in two different ways
    – either via the “Mandatory” attribute or by providing a default, which in this
    case happens to be a command that will prompt the user to enter the missing credential.


    When running the script, you will notice that before and after each phase of the
    script execution, our annotations are shown. This can aid you in responding to
    errors, because you can easily see which command caused an issue before you even
    begin to decipher any error messages that may be displayed.


    ## Automated Installation with DSC


    In Chapter [3](#395785_2_En_3_Chapter.xhtml), we discussed how to configure the
    Windows operating system using DSC. In this chapter, we will expand that configuration,
    so that it also installs our SQL Server instance. To achieve this, we will need
    to install the SQLServerDSC module, and this action can be performed using the
    command in Listing [6-14](#395785_2_En_6_Chapter.xhtml#PC14). This must be done
    in PowerShell 5.


    ```

    Install-Module SqlServerDsc

    Listing 6-14

    Install the SQLServerDSC Module

    ```


    We can now expand the configuration that we created in Chapter [3](#395785_2_En_3_Chapter.xhtml),
    with a resource that will ensure that a SQL Server instance called `DSCInstance`
    is created, using the Developer Edition. This resource is shown in Listing [6-15](#395785_2_En_6_Chapter.xhtml#PC15).
    You will notice that we pass the desired name of the instance, the source path
    of the SQL Server installation media, and the product key as strings. We pass
    `SQLENGINE` into the features parameter, but if we wanted to install multiple
    components, this string would consist of a comma-separated list. We also pass
    an array of Windows logins that we want to be added to the `sysadmins` fixed server
    role. In our case, we are just passing one login – `Administrator`.


    Note


    You should change the source path to reflect the location of your SQL Server installation
    media.


    ```

    SqlSetup ''InstallInstance'' {

    InstanceName = ''DSCInstance''

    Features = ''SQLENGINE''

    SourcePath = ''C:\SQL Media''

    SQLSysAdminAccounts = @(''Administrator'')

    ProductKey = ''22222-00000-00000-00000-00000''

    }

    Listing 6-15

    InstallInstance Resource

    ```


    Tip


    The product key we pass is the product key for the Developer Edition, and it means
    that this is the edition that will be installed. If we passed out Enterprise or
    Standard Edition product keys, this would change the edition that is installed.


    So, let’s examine Listing [6-16](#395785_2_En_6_Chapter.xhtml#PC16), which demonstrates
    what our updated configuration will look like, with the new resource added. There
    are two important things to note about the configuration. The first is that we
    have changed the service that the `SQLServerService` resource is managing, from
    the default instance to the `DSCInstance` instance, as this is the instance we
    will be working with. The second important aspect to note is that the syntax `DependsOn
    = ''[SqlSetup]InstallInstance''` has been added to the end of the `SQLServerService`
    resource. This is because we do not want the configuration to try to ensure that
    the SQL Server Database Engine service is started, before the instance is installed.
    When the configuration is compiled, there is no guarantee of the order in which
    resources will be configured. Therefore, if there is a dependency between resources,
    we should always use `DependsOn` to ensure the correct order.


    ```

    Configuration WindowsConfig {

    Import-DscResource -ModuleName ''PSDesiredStateConfiguration''

    Import-DscResource -ModuleName ''SqlServerDsc''

    Node ''localhost'' {

    File CreateCertificateBackupsFolder {

    Ensure = "Present"

    Type = "Directory"

    DestinationPath = "C:\CertificateBackups"

    }

    Registry OptimizeForBackgroundServices {

    Ensure      = "Present"

    Key         = " HKEY_LOCAL_MACHINE:\SYSTEM\CurrentControlSet\Control\PriorityControl"

    ValueName   = "Win32PrioritySeparation"

    ValueData   = 24

    ValueType   = ''Dword''

    }

    SqlSetup ''InstallInstance'' {

    InstanceName        = ''DSCInstance''

    Features            = ''SQLENGINE''

    SourcePath          = ''C:\SQL Media''

    SQLSysAdminAccounts = @(''Administrator'')

    ProductKey          = ''22222-00000-00000-00000-00000''

    }

    Service SQLServerService

    {

    Name        = ''MSSQL$DSCInstance''

    StartupType = ''Automatic''

    State       = ''Running''

    DependsOn    = ''[SqlSetup]InstallInstance''

    }

    }

    }

    WindowsConfig

    Listing 6-16

    Updated Configuration

    ```'
  trans: "### 生产环境就绪\n\n最后，您可能希望为脚本添加一些防御性编程，使其达到生产环境就绪的状态。尽管 PowerShell 具有 `try`/`catch`\
    \ 功能，但由于 `setup.exe` 是一个外部应用程序，其返回退出代码的方式不被 PowerShell 识别，因此在此处无法使用。因此，确保此脚本平稳运行的最有效技术是强制要求使用参数。\n\
    \n清单 6-13 中的代码是该脚本的一个修改版本，我们将其称为 `SQLAutoInstall3.ps1`。此版本的脚本使用 `Parameter` 关键字为每个参数将\
    \ `Mandatory` 属性设置为 `$true`。这一点很重要，因为如果运行此脚本的人遗漏了任何参数，或者参数名称有误，安装就会失败。这通过确保在允许脚本运行前所有参数都已输入，提供了一种故障保险机制。我们在此脚本中所做的另一项更改是在每个步骤前后添加了注释，这样如果脚本运行失败，我们可以轻松地看到错误发生在哪里。\n\
    \n```powershell\nparam(\n    [Parameter(Mandatory=$true)]\n    [string]      \
    \ $InstanceName,\n    [PSCredential] $SQLServiceAccountCredential = (Get-Credential\
    \ -Message 'Enter the SQL service account credential'),\n    [PSCredential] $AgentServiceAccountCredential\
    \ = (Get-Credential -Message 'Enter the SQL Server Agent service account credential')\n\
    )\n# Initialize ConnectionString variable\nWrite-Host 'Initialise variables...'\n\
    $serverName = $env:computername\n$connectionString = '{0}\\{1}' -f $serverName,\
    \ $InstanceName\nWrite-Host 'Initialise variables complete'\n#Install the instance\n\
    Write-Host 'Install the instance...'\n$params = @(\n    '/INSTANCENAME=\"{0}\"\
    ' -f $InstanceName\n    '/SQLSVCACCOUNT=\"{0}\"' -f $SQLServiceAccountCredential.Username\n\
    \    '/SQLSVCPASSWORD=\"{0}\"' -f $SQLServiceAccountCredential.GetNetworkCredential().Password\n\
    \    '/AGTSVCACCOUNT=\"{0}\"' -f $AgentServiceAccountCredential.Username\n   \
    \ '/AGTSVCPASSWORD=\"{0}\"' -f$AgentServiceAccountCredential.GetNetworkCredential().Password\n\
    \    '/CONFIGURATIONFILE=\"C:\\SQL2022\\Configuration2.ini\"'\n)\nStart-Process\
    \ -FilePath 'C:\\SQLServerSetup\\SETUP.EXE' -ArgumentList $params -Wait -NoNewWindow\n\
    Write-Host 'Instance installation complete'\n# Configure OS settings\nWrite-Host\
    \ 'Configure OS settings...'\nStart-Process -FilePath 'C:\\Windows\\System32\\\
    powercfg.exe' -ArgumentList '-setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c'\
    \ -Wait -NoNewWindow\nWrite-Host 'High Performance power plan configured'\nSet-ItemProperty\
    \ -Path HKLM:\\SYSTEM\\CurrentControlSet\\Control\\PriorityControl\\ -Name Win32PrioritySeparation\
    \ -Value 24\nWrite-Host 'Optimise for background services configured'\n# Run smoke\
    \ tests\nWrite-Host 'Run smoke tests...'\nGet-Service -DisplayName ('*{0}*' -f\
    \ $InstanceName)\nWrite-Host 'Service running check complete'\nInvoke-SqlCmd -Serverinstance\
    \ $connectionString -Query \"SELECT @@SERVERNAME\" -TrustServerCertificate\nWrite-Host\
    \ 'Instance accessibility check complete'\n```\n\n`SQLAutoInstall3.ps1` 脚本在运行时没有指定任何参数。在以前版本的脚本中，PowerShell\
    \ 会继续执行代码，然后 `setup.exe` 会因为没有为所需参数指定值而失败。然而，在这个版本中，您可以看到系统会依次提示您为每个参数输入值。这是通过两种不同的方式实现的——要么通过\
    \ `Mandatory` 属性，要么通过提供一个默认值（在本例中，这个默认值恰好是一个会提示用户输入缺失凭据的命令）。\n\n运行脚本时，您会注意到在脚本执行的每个阶段前后，我们的注释都会显示出来。这可以帮助您应对错误，因为您甚至可以在开始解读可能显示的任何错误消息之前，就能轻松地看到是哪个命令导致了问题。\n\
    \n### 使用 DSC 实现自动化安装\n\n在第 3 章中，我们讨论了如何使用 DSC 配置 Windows 操作系统。在本章中，我们将扩展该配置，使其也能安装我们的\
    \ SQL Server 实例。为此，我们需要安装 `SqlServerDSC` 模块，此操作可以使用清单 6-14 中的命令完成。这必须在 PowerShell\
    \ 5 中进行。\n\n```powershell\nInstall-Module SqlServerDsc\n```\n\n现在，我们可以扩展在第 3 章中创建的配置，添加一个资源，该资源将确保创建一个名为\
    \ `DSCInstance` 的 SQL Server 实例（使用 Developer 版本）。此资源如清单 6-15 所示。您会注意到我们传递了实例的期望名称、SQL\
    \ Server 安装介质的源路径以及产品密钥（均为字符串）。我们将 `SQLENGINE` 传递给 `Features` 参数，但如果我们要安装多个组件，这个字符串将由逗号分隔的列表组成。我们还传递了一个\
    \ Windows 登录名数组，我们希望将这些登录名添加到 `sysadmins` 固定服务器角色中。在我们的例子中，我们只传递了一个登录名——`Administrator`。\n\
    \n注意：您应更改源路径以反映您的 SQL Server 安装介质的位置。\n\n```powershell\nSqlSetup 'InstallInstance'\
    \ {\n    InstanceName = 'DSCInstance'\n    Features = 'SQLENGINE'\n    SourcePath\
    \ = 'C:\\SQL Media'\n    SQLSysAdminAccounts = @('Administrator')\n    ProductKey\
    \ = '22222-00000-00000-00000-00000'\n}\n```\n\n提示：我们传递的产品密钥是 Developer 版本的产品密钥，这意味着将安装此版本。如果我们传递\
    \ Enterprise 或 Standard 版本的产品密钥，这将改变安装的版本。\n\n那么，让我们来检查清单 6-16，它展示了我们更新后的配置（添加了新资源）将是什么样子。关于此配置有两点需要注意。第一点是，我们将\
    \ `SQLServerService` 资源管理的服务从默认实例更改为 `DSCInstance` 实例，因为这是我们将要使用的实例。第二点需要注意的重要方面是，在\
    \ `SQLServerService` 资源的末尾添加了语法 `DependsOn = '[SqlSetup]InstallInstance'`。这是因为我们不希望配置尝试确保\
    \ SQL Server Database Engine 服务在实例安装之前启动。当配置被编译时，无法保证资源的配置顺序。因此，如果资源之间存在依赖关系，我们应始终使用\
    \ `DependsOn` 来确保正确的顺序。\n\n```powershell\nConfiguration WindowsConfig {\n    Import-DscResource\
    \ -ModuleName 'PSDesiredStateConfiguration'\n    Import-DscResource -ModuleName\
    \ 'SqlServerDsc'\n    Node 'localhost' {\n        File CreateCertificateBackupsFolder\
    \ {\n            Ensure = \"Present\"\n            Type = \"Directory\"\n    \
    \        DestinationPath = \"C:\\CertificateBackups\"\n        }\n        Registry\
    \ OptimizeForBackgroundServices {\n            Ensure      = \"Present\"\n   \
    \         Key         = \" HKEY_LOCAL_MACHINE:\\SYSTEM\\CurrentControlSet\\Control\\\
    PriorityControl\"\n            ValueName   = \"Win32PrioritySeparation\"\n   \
    \         ValueData   = 24\n            ValueType   = 'Dword'\n        }\n   \
    \     SqlSetup 'InstallInstance' {\n            InstanceName        = 'DSCInstance'\n\
    \            Features            = 'SQLENGINE'\n            SourcePath       \
    \   = 'C:\\SQL Media'\n            SQLSysAdminAccounts = @('Administrator')\n\
    \            ProductKey          = '22222-00000-00000-00000-00000'\n        }\n\
    \        Service SQLServerService\n        {\n            Name        = 'MSSQL$DSCInstance'\n\
    \            StartupType = 'Automatic'\n            State       = 'Running'\n\
    \            DependsOn    = '[SqlSetup]InstallInstance'\n        }\n    }\n}\n\
    WindowsConfig\n```"
- fmt: "# 目前，此配置有效，但相当不灵活。它总是安装相同名称的实例，并且总是安装开发者版。为了使其更灵活，我们可以将配置参数化，以便在应用配置时，可以传递与相关节点相关的实例名称和产品密钥。\n\
    \n此配置的参数化版本如列表[6-17](#395785_2_En_6_Chapter.xhtml#PC17)所示。您会注意到声明中添加了一个`param`块，它接受实例名称和版本的参数。`$SqlInstanceName`参数的值被设为`'MSSQLSERVER'`，这表示一个默认实例。还添加了一个`IF...ELSE\
    \ IF...`块，该块根据传递到配置的版本计算要使用的产品密钥。\n\n> **注意**\n>\n> 出于本示例的目的，评估版的产品密钥被用于企业和标准版。这些产品密钥应替换为您自己的企业和标准版产品密钥。\n\
    \n```powershell\nConfiguration WindowsConfig {\n    param (\n        [string]\
    \ $SqlInstanceName = 'MSSQLSERVER',\n        [Parameter(Mandatory)]\n        [ValidateSet('Developer',\
    \ 'Standard', 'Enterprise')]\n        [string] $Edition\n    )\n    Import-DscResource\
    \ -ModuleName 'PSDesiredStateConfiguration'\n    Import-DscResource -ModuleName\
    \ 'SqlServerDsc'\n    if ($Edition -eq 'Developer') {\n        $ProductKey = '22222-00000-00000-00000-00000'\n\
    \    } elseif ($edition -eq 'Standard') {\n        $ProductKey = '00000-00000-00000-00000-00000'\n\
    \    } elseif ($edition -eq 'Enterprise') {\n        $ProductKey = '00000-00000-00000-00000-00000'\n\
    \    }\n    Node 'localhost' {\n        File CreateCertificateBackupsFolder {\n\
    \            Ensure = \"Present\"\n            Type = \"Directory\"\n        \
    \    DestinationPath = \"C:\\CertificateBackups\"\n        }\n        Registry\
    \ OptimizeForBackgroundServices {\n            Ensure      = \"Present\"\n   \
    \         Key         = \"HKLM:\\SYSTEM\\CurrentControlSet\\Control\\PriorityControl\"\
    \n            ValueName   = \"Win32PrioritySeparation\"\n            ValueData\
    \   = 24\n            ValueType   = 'Dword'\n        }\n        SqlSetup 'InstallInstance'\
    \ {\n            InstanceName        = $SqlInstanceName\n            Features\
    \            = 'SQLENGINE'\n            SourcePath          = 'C:\\SQL Media'\n\
    \            SQLSysAdminAccounts = @('Administrator')\n            ProductKey\
    \          = $ProductKey\n        }\n        Service SQLServerService {\n    \
    \        Name        = 'MSSQL${0}' -f $SqlInstanceName\n            StartupType\
    \ = 'Automatic'\n            State       = 'Running'\n            DependsOn  \
    \  = '[SqlSetup]InstallInstance'\n        }\n    }\n}\n```\n列表 6-17\n参数化配置\n\n\
    我们现在可以将参数传递给`Start-DscConfiguration`来应用配置。列表[6-18](#395785_2_En_6_Chapter.xhtml#PC18)中的命令将应用配置，确保`DSCInstance`存在并使用开发者版。这里的一个细微之处是，因为我们传递了参数，所以我们必须先点源化脚本，将其带入与调用上下文相同的会话中。\n\
    \n```powershell\n# 点源化配置文件\n. C:\\Scripts\\WindowsConfig.ps1\n# 编译配置\nWindowsConfig\
    \ -Edition Developer -SqlInstanceName 'DSCInstance2'\n# 应用配置\nStart-DscConfiguration\
    \ -Path \"C:\\Scripts\\WindowsConfig\" -Verbose -Wait\n```\n列表 6-18\n应用参数化配置\n\
    \n在第[9](#395785_2_En_9_Chapter.xhtml)章中，我们将探讨如何使用DSC根据我们组织的最佳实践来配置我们的SQL Server实例。\n\
    \n## 总结\n\n安装SQL Server是一项单调的任务，并且容易出错，这可能导致环境不一致。解决这个问题的关键是自动化。SQL Server的安装可以通过多种方式自动化，但在现代工作场所，我们通常会选择脚本化方法或配置管理方法。\n\
    \n脚本化方法涉及使用PowerShell脚本来运行`setup.exe`，然后根据我们的要求配置实例。我们还应该在脚本中包含冒烟测试，以确保实例已正确安装。\n\
    \n或者，我们可以使用配置管理方法，该方法使用工具（如PowerShell DSC）来管理实例安装。这种方法可以像脚本化方法一样进行参数化，并确保实例始终存在。在第[9](#395785_2_En_9_Chapter.xhtml)章中，我们将探讨如何使用配置管理方法来配置SQL\
    \ Server实例。\n\n# 7. 元数据驱动自动化\n\n元数据是描述其他数据的数据。SQL Server公开了大量元数据。这包括描述每个对象的结构性元数据，以及描述数据本身的描述性元数据。元数据通过目录视图、信息架构视图、动态管理视图、动态管理函数、系统函数和存储过程公开。元数据是自动化的关键，因为它允许您创建动态的、智能的脚本。\n\
    \n本章假设您熟悉基本的元数据对象，例如`sys.tables`和`sys.databases`。相反，本章将重点探讨一些不太常见但被证明对DBA非常有用的元数据对象。它将演示这些元数据对象如何在自动化维护例程中发挥关键作用。然而，重要的是要记住，对SQL\
    \ Server中所有可用元数据对象的讨论本身就需要几卷书的篇幅。因此，我建议您自己研究SQL Server元数据，并找出对您的个体环境有用的对象。一个很好的起点是MSDN上的动态管理视图和函数页面，可以在[`https://msdn.microsoft.com/en-us/library/ms188754.aspx`](https://msdn.microsoft.com/en-us/library/ms188754.aspx)找到。\n\
    \n> **提示**\n>\n> 本章将重点介绍编写维护例程本身。在第[10](#395785_2_En_10_Chapter.xhtml)章中，我们将重点介绍如何在SQL\
    \ Server环境中集中化维护，以便我们有一个单一的代码库需要维护。\n\n## 创建智能例程\n\n以下部分将演示如何将SQL Server元数据与PowerShell结合使用，以编写智能例程，这些例程可用于使您的企业更一致、性能更好，同时减少DBA的工作量。我们将讨论使用查询存储元数据、动态索引重建，以及强制执行无法通过基于策略的管理来强制执行的策略。"
  raw: 'Currently, this configuration will work, but it is rather inflexible. It will
    always install an instance with the same name, and it will always install the
    Developer Edition. To make it more flexible, we can parameterize the configuration,
    so that when the configuration is applied, we can pass an instance name and product
    key that is relevant to the node in question.


    This parameterized version of the configuration is shown in Listing [6-17](#395785_2_En_6_Chapter.xhtml#PC17).
    You will notice that a param block has been added to the declaration, which accepts
    parameters for the instance name and edition. The `$SQLInstanceName` parameter
    has been given a value of `MSSQLSERVER`, which indicates a default instance. An
    `IF...ELSE IF...` block has also been added, which calculates which product key
    to use, based on the edition that has been passed to the configuration.


    Note


    For the purpose of this example, the product key for the Evaluation Edition has
    been used for both Enterprise and Standard Editions. These product keys should
    be substituted for your own Enterprise and Standard Edition product keys.


    ```

    Configuration WindowsConfig {

    param (

    [string] $SqlInstanceName = ''MSSQLSERVER'',

    [Parameter(Mandatory)]

    [ValidateSet(''Developer'', ''Standard'', ''Enterprise'')]

    [string] $Edition

    )

    Import-DscResource -ModuleName ''PSDesiredStateConfiguration''

    Import-DscResource -ModuleName ''SqlServerDsc''

    if ($Edition -eq ''Developer'') {

    $ProductKey = ''22222-00000-00000-00000-00000''

    } elseif ($edition -eq ''Standard'') {

    $ProductKey = ''00000-00000-00000-00000-00000''

    } elseif ($edition -eq ''Enterprise'') {

    $ProductKey = ''00000-00000-00000-00000-00000''

    }

    Node ''localhost'' {

    File CreateCertificateBackupsFolder {

    Ensure = "Present"

    Type = "Directory"

    DestinationPath = "C:\CertificateBackups"

    }

    Registry OptimizeForBackgroundServices {

    Ensure      = "Present"

    Key         = "HKLM:\SYSTEM\CurrentControlSet\Control\PriorityControl"

    ValueName   = "Win32PrioritySeparation"

    ValueData   = 24

    ValueType   = ''Dword''

    }

    SqlSetup ''InstallInstance'' {

    InstanceName        = $SqlInstanceName

    Features            = ''SQLENGINE''

    SourcePath          = ''C:\SQL Media''

    SQLSysAdminAccounts = @(''Administrator'')

    ProductKey          = $ProductKey

    }

    Service SQLServerService

    {

    Name        = ''MSSQL${0}'' -f $SqlInstanceName

    StartupType = ''Automatic''

    State       = ''Running''

    DependsOn    = ''[SqlSetup]InstallInstance''

    }

    }

    }

    Listing 6-17

    Parameterized Configuration

    ```


    We can now pass parameters into Start-DscConfiguration to apply the configuration.
    The command in Listing [6-18](#395785_2_En_6_Chapter.xhtml#PC18) will apply the
    configuration, ensuring that the DSCInstance exists and uses the Developer Edition.
    The nuance here is that because we are passing in parameters, we must first dot-source
    the script to bring it into the same session as the calling context.


    ```

    # dot source the configuration file

    . C:\Scripts\WindowsConfig.ps1

    # compile the modffile

    WindowsConfig -Edition Developer -SqlInstanceName ''DSCInstance2''

    # apply the configuration

    Start-DscConfiguration -Path "C:\Scripts\WindowsConfig" -Verbose -Wait

    Listing 6-18

    Apply the Parameterized Configuration

    ```


    In Chapter [9](#395785_2_En_9_Chapter.xhtml), we will explore how we can use DSC
    to configure our SQL Server instance, according to our organization’s best practice.


    ## Summary


    Installing SQL Server is a monotonous task and subject to human error, which can
    lead to a divergent estate. The key to addressing this is automation. There are
    many ways in which a SQL Server installation can be automated, but in the modern
    workplace, we will usually opt for either a scripted approach or a configuration
    management approach.


    A scripted approach involves using a PowerShell script to run setup.exe and then
    configure the instance to our requirements. We should also include smoke tests
    in the script to ensure that the instance is installed correctly.


    Alternatively, we can use a configuration management approach, which will use
    a tool, such as PowerShell DSC, to manage the instance installation. This approach
    can be parameterized, just as a scripted approach can, and ensures that the instance
    is always present. In Chapter [9](#395785_2_En_9_Chapter.xhtml), we will explore
    how to use a configuration management approach to configure a SQL Server instance.


    # 7. Metadata-Driven Automation


    Metadata is data that describes other data. SQL Server exposes a large amount
    of metadata. This includes structural metadata, which describes every object,
    and descriptive metadata, which describes the data itself. Metadata is exposed
    through catalog views, information schema views, dynamic management views, dynamic
    management functions, system functions, and stored procedures. Metadata is the
    key to automation, as it allows you to create dynamic, intelligent scripts.


    This chapter assumes that you are familiar with basic metadata objects, such as
    `sys.tables` and `sys.databases`. Instead, this chapter will focus on interrogating
    some less commonly known metadata objects that can prove very useful to DBAs.
    It will demonstrate how these metadata objects can be used to play a key role
    in automating maintenance routines. It is important to remember, however, that
    a discussion of all metadata objects available within SQL Server would be worthy
    of several volumes in its own right. Therefore, I suggest that you do your own
    research on SQL Server metadata and identify objects that will prove useful to
    your individual environment. A good place to start is the Dynamic Management Views
    and Functions page on MSDN, which can be found at [`https://msdn.microsoft.com/en-us/library/ms188754.aspx`](https://msdn.microsoft.com/en-us/library/ms188754.aspx).


    Tip


    This chapter will focus on writing the maintenance routines themselves. In Chapter
    [10](#395785_2_En_10_Chapter.xhtml), we will then focus on how we can centralize
    maintenance, across the SQL Server estate, so that we have a single code base
    to maintain.


    ## Creating Intelligent Routines


    The following sections will demonstrate how SQL Server metadata can be used, in
    conjunction with PowerShell, to write intelligent routines that can be used to
    make your enterprise more consistent and better performing, with less DBA effort.
    We will discuss using Query Store metadata, dynamic index rebuilds, and enforcing
    policies that cannot be enforced using Policy-Based Management.'
  trans: "\n# 目前，此配置有效，但相当不灵活。它总是安装相同名称的实例，并且总是安装开发者版。为了使其更灵活，我们可以将配置参数化，以便在应用配置时，可以传递与相关节点相关的实例名称和产品密钥。\n\
    \n此配置的参数化版本如列表 6-17 所示。您会注意到声明中添加了一个`param`块，它接受实例名称和版本的参数。`$SqlInstanceName`参数的值被设为`'MSSQLSERVER'`，这表示一个默认实例。还添加了一个`IF...ELSE\
    \ IF...`块，该块根据传递到配置的版本计算要使用的产品密钥。\n\n> **注意**\n>\n> 出于本示例的目的，评估版的产品密钥被用于企业和标准版。这些产品密钥应替换为您自己的企业和标准版产品密钥。\n\
    \n```powershell\nConfiguration WindowsConfig {\n    param (\n        [string]\
    \ $SqlInstanceName = 'MSSQLSERVER',\n        [Parameter(Mandatory)]\n        [ValidateSet('Developer',\
    \ 'Standard', 'Enterprise')]\n        [string] $Edition\n    )\n    Import-DscResource\
    \ -ModuleName 'PSDesiredStateConfiguration'\n    Import-DscResource -ModuleName\
    \ 'SqlServerDsc'\n    if ($Edition -eq 'Developer') {\n        $ProductKey = '22222-00000-00000-00000-00000'\n\
    \    } elseif ($edition -eq 'Standard') {\n        $ProductKey = '00000-00000-00000-00000-00000'\n\
    \    } elseif ($edition -eq 'Enterprise') {\n        $ProductKey = '00000-00000-00000-00000-00000'\n\
    \    }\n    Node 'localhost' {\n        File CreateCertificateBackupsFolder {\n\
    \            Ensure = \"Present\"\n            Type = \"Directory\"\n        \
    \    DestinationPath = \"C:\\CertificateBackups\"\n        }\n        Registry\
    \ OptimizeForBackgroundServices {\n            Ensure      = \"Present\"\n   \
    \         Key         = \"HKLM:\\SYSTEM\\CurrentControlSet\\Control\\PriorityControl\"\
    \n            ValueName   = \"Win32PrioritySeparation\"\n            ValueData\
    \   = 24\n            ValueType   = 'Dword'\n        }\n        SqlSetup 'InstallInstance'\
    \ {\n            InstanceName        = $SqlInstanceName\n            Features\
    \            = 'SQLENGINE'\n            SourcePath          = 'C:\\SQL Media'\n\
    \            SQLSysAdminAccounts = @('Administrator')\n            ProductKey\
    \          = $ProductKey\n        }\n        Service SQLServerService {\n    \
    \        Name        = 'MSSQL${0}' -f $SqlInstanceName\n            StartupType\
    \ = 'Automatic'\n            State       = 'Running'\n            DependsOn  \
    \  = '[SqlSetup]InstallInstance'\n        }\n    }\n}\n```\n列表 6-17\n参数化配置\n\n\
    我们现在可以将参数传递给`Start-DscConfiguration`来应用配置。列表 6-18 中的命令将应用配置，确保`DSCInstance`存在并使用开发者版。这里的一个细微之处是，因为我们传递了参数，所以我们必须先点源化脚本，将其带入与调用上下文相同的会话中。\n\
    \n```powershell\n# 点源化配置文件\n. C:\\Scripts\\WindowsConfig.ps1\n# 编译配置\nWindowsConfig\
    \ -Edition Developer -SqlInstanceName 'DSCInstance2'\n# 应用配置\nStart-DscConfiguration\
    \ -Path \"C:\\Scripts\\WindowsConfig\" -Verbose -Wait\n```\n列表 6-18\n应用参数化配置\n\
    \n在第 9 章中，我们将探讨如何使用 DSC 根据我们组织的最佳实践来配置我们的 SQL Server 实例。\n\n## 总结\n\n安装 SQL Server\
    \ 是一项单调的任务，并且容易出错，这可能导致环境不一致。解决这个问题的关键是自动化。SQL Server 的安装可以通过多种方式自动化，但在现代工作场所，我们通常会选择脚本化方法或配置管理方法。\n\
    \n脚本化方法涉及使用 PowerShell 脚本来运行`setup.exe`，然后根据我们的要求配置实例。我们还应该在脚本中包含冒烟测试，以确保实例已正确安装。\n\
    \n或者，我们可以使用配置管理方法，该方法使用工具（如 PowerShell DSC）来管理实例安装。这种方法可以像脚本化方法一样进行参数化，并确保实例始终存在。在第\
    \ 9 章中，我们将探讨如何使用配置管理方法来配置 SQL Server 实例。\n\n# 7. 元数据驱动自动化\n\n元数据是描述其他数据的数据。SQL\
    \ Server 公开了大量元数据。这包括描述每个对象的结构性元数据，以及描述数据本身的描述性元数据。元数据通过目录视图、信息架构视图、动态管理视图、动态管理函数、系统函数和存储过程公开。元数据是自动化的关键，因为它允许您创建动态的、智能的脚本。\n\
    \n本章假设您熟悉基本的元数据对象，例如`sys.tables`和`sys.databases`。相反，本章将重点探讨一些不太常见但被证明对 DBA 非常有用的元数据对象。它将演示这些元数据对象如何在自动化维护例程中发挥关键作用。然而，重要的是要记住，对\
    \ SQL Server 中所有可用元数据对象的讨论本身就需要几卷书的篇幅。因此，我建议您自己研究 SQL Server 元数据，并找出对您的个体环境有用的对象。一个很好的起点是\
    \ MSDN 上的动态管理视图和函数页面，可以在[`https://msdn.microsoft.com/en-us/library/ms188754.aspx`](https://msdn.microsoft.com/en-us/library/ms188754.aspx)找到。\n\
    \n> **提示**\n>\n> 本章将重点介绍编写维护例程本身。在第 10 章中，我们将重点介绍如何在 SQL Server 环境中集中化维护，以便我们有一个单一的代码库需要维护。\n\
    \n## 创建智能例程\n\n以下部分将演示如何将 SQL Server 元数据与 PowerShell 结合使用，以编写智能例程，这些例程可用于使您的企业更一致、性能更好，同时减少\
    \ DBA 的工作量。我们将讨论使用查询存储元数据、动态索引重建，以及强制执行无法通过基于策略的管理来强制执行的策略。\n"
- fmt: "### Remove Ad Hoc Query Plans\n\nAd hoc query plans consume memory and can\
    \ be of limited use. It is a good idea to remove ad hoc query plans if they are\
    \ not being reused. The query in Listing [7-1](#395785_2_En_7_Chapter.xhtml#PC4)\
    \ demonstrates how Query Store metadata can be used to clear unwanted ad hoc query\
    \ plans from the cache.\n\nThe first part of the script runs a query against the\
    \ `sys.databases` catalog view to return a list of databases on the instance.\
    \ The Query Store can be enabled or disabled at the database level and cannot\
    \ be enabled on either `master` or `TempDB` system databases. In SQL Server 2022,\
    \ Query Store is enabled by default, but previously it was disabled by default.\
    \ Therefore, the query filters out databases with a `database_id` of less than\
    \ three and any databases where Query Store is disabled.\n\n#### TWO WAYS TO PROCESS\
    \ QUERY RESULTS\n\nThe output of `Invoke-DbaQuery` command is an object (or an\
    \ array of objects) with a number of properties. There is a property for each\
    \ column in the query result, as well as some additional properties.\n\nTherefore,\
    \ to use this result in further processing, the desired property will need to\
    \ be extracted. This can be done in two different ways, each with pros and cons:\n\
    \n1.  Immediately – By piping the results into a `Select-Object` cmdlet, such\
    \ as\n\n    ```\n    $databases = Invoke-DbaQuery @GetDatabaseParams | Select-Object\
    \ -ExpandProperty Name\n    ```\n\n    This keeps `$database` simple; it ends\
    \ up just an array of database names\n\n2.  At the point of usage – By using a\
    \ `foreach` loop to iterate through each object, such as\n\n    ```\n    foreach\
    \ ($database in $databases.Name) { ... }\n    ```\n\n    This approach means that\
    \ at any point later you can make use of all the data returned by the query, including\
    \ the metadata.\n\nWhen PowerShell displays objects, it does not always show all\
    \ their properties by default. To see all properties of an object, you can pipe\
    \ it into `Select-Object *` such as\n\n```\nInvoke-DbaQuery @GetDatabaseParams\
    \ | Select-Object *\n```\n\nThe second part of the script passes the database\
    \ names into a `foreach` loop and executes a SQL script against each one. This\
    \ technique provides a useful mechanism for running the same command against every\
    \ database in an instance, and I would highly recommend this approach, which uses\
    \ the `FOR XML PATH('')` technique, described in Chapter [1](#395785_2_En_1_Chapter.xhtml),\
    \ instead of the undocumented `sp_MSForeachdb` system stored procedure, which\
    \ can be unreliable. We could also scale this script to run across all instances\
    \ in the enterprise, by using the techniques discussed in Chapter [10](#395785_2_En_10_Chapter.xhtml).\n\
    \n```\n$GetDatabaseParams = @{\n    SqlInstance = \"localhost\"\n    Query   \
    \    = \"\n    SELECT name\n    FROM sys.databases\n    WHERE database_id > 2\n\
    \      AND is_query_store_on = 1\n    \"\n}\n$databases = Invoke-DbaQuery @GetDatabaseParams\
    \ | Select-Object -ExpandProperty Name\n$params = @{\n    SqlInstance = \"localhost\"\
    \n    Query       = \"\n    DECLARE @SQL NVARCHAR(MAX)\n    SELECT @SQL = (\n\
    \        SELECT 'EXEC sp_query_store_remove_query '\n               + CAST(qsq.query_id\
    \ AS NVARCHAR(6)) + ';' AS [data()]\n        FROM sys.query_store_query_text AS\
    \ qsqt\n        JOIN sys.query_store_query AS qsq\n          ON qsq.query_text_id\
    \ = qsqt.query_text_id\n        JOIN sys.query_store_plan AS qsp\n          ON\
    \ qsp.query_id = qsq.query_id\n        JOIN sys.query_store_runtime_stats AS qsrs\n\
    \          ON qsrs.plan_id = qsp.plan_id\n        GROUP BY qsq.query_id\n    \
    \    HAVING SUM(qsrs.count_executions) = 1\n           AND MAX(qsrs.last_execution_time)\
    \ < DATEADD (HH, -24, GETUTCDATE())\n        ORDER BY qsq.query_id\n        FOR\
    \ XML PATH('')\n    ) ;\n    EXEC(@SQL) ;\n    \"\n}\nforeach ($database in $databases)\
    \ {\n    Invoke-DbaQuery @params -Database $database\n}\n```\n*Listing 7-1 Removing\
    \ Ad Hoc Query Plans*\n\nThe query that is run against each database uses the\
    \ `data()` method approach to iteration, to build a string that can be executed\
    \ using dynamic SQL, before finally executing the script, using the `EXEC` statement.\
    \ The metadata objects used by the query are described below.\n\nThe `sys.query_store_query_text`\
    \ catalog view exposes the text and handle of each T-SQL statement in the store.\
    \ It returns the columns detailed in Table [7-1](#395785_2_En_7_Chapter.xhtml#Tab1).\n\
    \n**Table 7-1 Columns Returned by `sys.query_store_query_text`**\n\n| Column |\
    \ Description |\n| --- | --- |\n| `query_text_id` | The primary key |\n| `query_sql_text`\
    \ | The T-SQL text of the query |\n| `statement_sql_handle` | The SQL handle of\
    \ the query |\n| `is_part_of_encrypted_module` | Whether the SQL text is part\
    \ of an encrypted programmable object |\n| `has_restricted_text` | Whether the\
    \ SQL text includes sensitive information that cannot be displayed, such as a\
    \ password |\n\nThe `sys.query_store_query` catalog view joins to the `sys.query_store_query_text`\
    \ catalog view on the `query_text_id` column in each view. It also joins to `sys.query_context_settings`\
    \ on the `context_settings_id` column in each object. `sys.query_store_query`\
    \ returns details of the queries, including aggregated statistics. The columns\
    \ returned are detailed in Table [7-2](#395785_2_En_7_Chapter.xhtml#Tab2).\n\n\
    **Table 7-2 Columns Returned by `sys.query_store_query`**"
