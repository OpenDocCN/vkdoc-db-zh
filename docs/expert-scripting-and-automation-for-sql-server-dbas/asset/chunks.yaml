  raw: '| Parameter | Usage |

    | --- | --- |

    | `/AGTSVCSTARTUPTYPE` | Specifies the startup mode of the SQL Server Agent service.
    This can be set to `Automatic`, `Manual`, or `Disabled` |

    | `/BROWSERSVCSTARTUPTYPE` | Specifies the startup mode of the SQL Server Browser
    service. This can be set to `Automatic`, `Manual`, or `Disabled` |

    | `/CONFIGURATIONFILE` | Specifies the path to a configuration file, which contains
    a list of switches and parameters so that they do not have to be specified inline
    when running setup |

    | `/ENU` | Dictates that the English version of SQL Server will be used. Use this
    switch if you are installing the English version of SQL Server on a server with
    localized settings and the media contains language packs for both English and
    the localized operating system |

    | `/FILESTREAMLEVEL` | Used to enable FILESTREAM and set the required level of
    access. This can be set to `0` to disable FILESTREAM, `1` to allow connections
    via SQL Server only, `2` to allow IO streaming, or `3` to allow remote streaming.
    The options from `1` to `3` build on each other, so by specifying level `3`, you
    are implicitly specifying levels `1` and `2` as well |

    | `/FILESTREAMSHARENAME` | Specify the name of the Windows file share where FILESTREAM
    data will be stored. This parameter becomes required when `/FILESTREAMLEVEL` is
    set to a value of `2` or `3` |

    | `/FTSVCACCOUNT` | The account used to run the Full-Text filter launcher service
    |

    | `/FTSVCPASSWORD` | The password of the account used to run the Full-text filter
    launcher service |

    | `/HIDECONSOLE` | Specifies that the console should be hidden |

    | `/INDICATEPROGRESS` | When this switch is used, the setup log is piped to the
    screen during installation |

    | `/IACCEPTPYTHONLICENSETERMS` | Must be specified if installing the Anaconda
    Python package, using /q or /qs |

    | `/IACCEPTROPENLICENSETERMS` | Must be specified when installing Microsoft R
    package, using /q or /qs |

    | `/INSTANCEDIR` | Specifies a folder location for the instance |

    | `/INSTANCEID` | Specifies an ID for the instance. It is considered bad practice
    to use this parameter |

    | `/INSTALLSHAREDDIR` | Specifies a folder location for 64-bit components that
    are shared between instances |

    | `/INSTALLSHAREDWOWDIR` | Specifies a folder location for 32-bit components that
    are shared between instances. This location cannot be the same as the location
    for 64-bit shared components |

    | `/INSTALLSQLDATADIR` | Specifies the default folder location for instance data
    |

    | `/NPENABLED` | Specifies if Named Pipes should be enabled. This can be set to
    `0` for disabled or `1` for enabled |

    | `/PID` | Specifies the PID for SQL Server. Unless the media is pre-pidded, failure
    to specify this parameter will cause the Evaluation Edition to be installed |

    | `/PBENGSVCACCOUNT` | Specifies the account that will be used to run the PolyBase
    service |

    | `/PBDMSSVCPASSWORD` | Specifies the password for the account that will run the
    PolyBase service |

    | `/PBENGSVCSTARTUPTYPE` | Specifies the startup mode of the PolyBase. This can
    be set to `Automatic`, `Manual`, or `Disabled` |

    | `/PBPORTRANGE` | Specifies a range of ports for the PolyBase service to listen
    on. Must contain a minimum of six ports |

    | `/PBSCALEOUT` | Specifies if the Database Engine is part of a PolyBase scale-out
    group |

    | `/SAPWD` | Specifies the password for the SA account. This parameter is used
    when `/SECURITYMODE` is used to configure the instance as mixed-mode authentication.
    This parameter becomes required if `/SECURITYMODE` is set to `SQL` |

    | `/SECURITYMODE` | Use this parameter, with a value of `SQL`, to specify mixed
    mode. If you do not use this parameter, then Windows authentication will be used
    |

    | `/SQLBACKUPDIR` | Specifies the default location for SQL Server backups |

    | `/SQLCOLLATION` | Specifies the collation the instance will use |

    | `/SQLMAXMEMORY` | Specifies the maximum amount of RAM that can be used by the
    database engine (mainly for the buffer cache) |

    | `/SQLMINMEMORY` | Specifies the minimum amount of RAM that can be used by the
    database engine (mainly for the buffer cache) |

    | `/SQLSVCSTARTUPTYPE` | Specifies the startup mode of the Database Engine service.
    This can be set to `Automatic`, `Manual`, or `Disabled` |

    | `/SQLTEMPDBDIR` | Specifies a folder location for TempDB data files |

    | `/SQLTEMPDBLOGDIR` | Specifies a folder location for TempDB log files |

    | `/SQLTEMPDBFILECOUNT` | Specifies the number of TempDB data files that should
    be created |

    | `/SQLTEMPDBFILESIZE` | Specifies the size of each TempDB data file |

    | `/SQLTEMPDBFILEGROWTH` | Specifies the growth increment for TempDB data files
    |

    | `/SQLTEMPDBLOGFILESIZE` | Specifies the initial size for the TempDB log file
    |

    | `/SQLTEMPDBLOGFILEGROWTH` | Specifies the growth increment for TempDB log files
    |

    | `/SQLUSERDBDIR` | Specifies a default location for the data files of user databases
    |

    | `/SQLUSERDBLOGDIR` | Specifies the default folder location for log files of
    user databases |

    | `/SQLSVCINSTANTFILEINIT` | Specifies that the Database Engine service account
    should be granted the Perform Volume Maintenance Tasks privilege. Acceptable values
    are **true** or **false** |

    | `/TCPENABLED` | Specifies if TCP will be enabled. Use a value of `0` to disable
    or `1` to enable |

    | `/UPDATEENABLED` | Specifies if Product Update functionality will be used. Pass
    a value of `0` to disable or `1` to enable |

    | `/UPDATESOURCE` | Specify a location for Product Update to search for updates.
    A value of `MU` will search Windows Update, but you can also pass a file share
    or UNC |'
