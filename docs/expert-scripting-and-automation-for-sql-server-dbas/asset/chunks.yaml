    **Listing 10-6 Remove Old Backups Script**


    The final script we need for this example is illustrated in Listing 10-7. This
    script is used to update statistics. The script follows the same pattern as the
    two previous maintenance tasks. It loops around each instance and then each database
    within the instance. The script itself is a simple execution of the `sp_updatestats`
    stored procedure.


    ```powershell

    $params = @{

    SqlInstance = "localhost"

    Database    = "Inventory"

    Query       = "

    SELECT

    ServerInstance

    ,Task

    ,LastExecDate

    ,NextExecDate

    ,InProgress

    ,TaskDisabled

    ,StartTime

    ,EndTime

    ,ServerID

    ,InstanceID

    FROM dbo.MaintenanceSchedule ms

    WHERE InProgress = 0

    AND TaskDisabled = 0

    AND GETDATE() >= NextExecDate

    AND CAST(GETDATE() AS TIME) BETWEEN StartTime AND EndTime

    AND Task = ''UpdateStatistics''

    "

    }

    $ServerTasks = Invoke-DbaQuery @params

    foreach ($Server in $ServerTasks) {

    $params = @{

    SqlInstance = $Server.ServerInstance

    Database    = "Master"

    Query       = "

    SELECT name FROM sys.databases

    "

    }

    $databases = Invoke-DbaQuery @params

    $params = @{

    SqlInstance = "localhost"

    Database    = "Inventory"

    Query       = "

    UPDATE dbo.MaintenanceTasks

    SET InProgress = 1

    WHERE ServerID = ''" + $Server.ServerID + "'' AND InstanceID = ''" + $Server.InstanceID
    + "'' AND Task = ''UpdateStats''

    "

    }

    Invoke-DbaQuery @params

    foreach ($database in $databases) {

    $params = @{

    SqlInstance = $Server.ServerInstance

    Database    = $database.name

    Query       = "

    EXEC sp_UpdateStatistics

    "

    }

    Invoke-DbaQuery @params

    }

    $params = @{

    SqlInstance = "localhost"

    Database    = "Inventory"

    Query       = "

    UPDATE dbo.MaintenanceTasks

    SET InProgress = 0, LastExecDate = GETDATE(), LastExecStatus = ''Success''

    WHERE ServerID = ''" + $Server.ServerID + "'' AND InstanceID = ''" + $Server.InstanceID
    + "'' AND Task = ''UpdateStatistics'';

    "

    }

    Invoke-DbaQuery @params

    }

    ```

    **Listing 10-7 Update Statistics**


    Each of the scripts should be saved to a folder that the SQL Agent service account
    (or Proxy account) can access. For this example, I have saved them to the `c:\scripts`
    folder on the central management server. I have named the files `FullBackups.ps1`,
    `RemoveOldBackups.ps1`, and `UpdateStatistics.ps1`, respectively.


    > **Tip**

    >

    > There are various enhancements that could be made, if appropriate for your environment.
    For example, you could consider breaking the granularity of the `MaintenanceTasks`
    table down to the level of database to allow you to schedule different databases
    on the same instance to be backed up at different times. You could also add `LastExecStatus`
    to the `MaintenanceSchedule` view, which would allow you to add retry logic, if
    a task fails.


    ## Create the SQL Server Agent Job


    Now that we have each of the scripts that we would like to run against our SQL
    Server instances, we can create a SQL Agent job on the central management server
    that will run them. Because the scripts themselves determine which instances they
    need to run against, it means that the job can be scheduled to run once a minute.
    If there are no tasks for the script to execute, it will simply exit and allow
    the job to move to the next job step.


    The script in Listing 10-8 creates the SQL Agent Job, the schedule, and the required
    steps. The job is configured to move to the next step, regardless of success or
    failure of the previous step. This avoids a problem with one script stopping the
    other tasks from running.


    > **Note**

    >

    > Where we have used `"` inside the query, we have escaped them using `""`.


    ```powershell

    $params = @{

    SqlInstance  = "localhost"

    Query        = "

    USE msdb

    GO

    DECLARE @jobId BINARY(16)

    EXEC  msdb.dbo.sp_add_job @job_name=''SQLMaintenance'',

    @enabled=1,

    @notify_level_eventlog=0,

    @notify_level_email=2,

    @notify_level_page=2,

    @delete_level=0,

    @owner_login_name=''SQL2022-STANDAL\Administrator'', @job_id = @jobId OUTPUT

    SELECT @jobId

    GO

    EXEC msdb.dbo.sp_add_jobserver @job_name=''SQLMaintenance'', @server_name = ''SQL2022-STANDALONE''

    GO

    USE msdb

    GO

    EXEC msdb.dbo.sp_add_jobstep @job_name=''SQLMaintenance'', @step_name=''FullBackups'',

    @step_id=1,

    @cmdexec_success_code=0,

    @on_success_action=3,

    @on_fail_action=3,

    @retry_attempts=0,

    @retry_interval=0,

    @os_run_priority=0, @subsystem=''PowerShell'',

    @command=''powershell ""C:\scripts\FullBackups.ps1""''

    GO

    USE msdb

    GO

    EXEC msdb.dbo.sp_add_jobstep @job_name=''SQLMaintenance'', @step_name=''RemoveOldBackups'',

    @step_id=2,

    @cmdexec_success_code=0,

    @on_success_action=3,

    @on_fail_action=3,

    @retry_attempts=0,

    @retry_interval=0,

    @os_run_priority=0, @subsystem=''PowerShell'',

    @command=''powershell ""C:\scripts\RemoveOldBackups.ps1""''

    GO

    USE msdb

    GO

    EXEC msdb.dbo.sp_add_jobstep @job_name=''SQLMaintenance'', @step_name=''UpdateStatistics'',

    @step_id=3,

    @cmdexec_success_code=0,

    @on_success_action=1,

    @on_fail_action=2,

    @retry_attempts=0,

    @retry_interval=0,

    @os_run_priority=0, @subsystem=''PowerShell'',

    @command=''powershell ""C:\scripts\UpdateStatistics.ps1""''

    GO

    USE msdb

    GO

    EXEC msdb.dbo.sp_update_job @job_name=''SQLMaintenance'',

    @enabled=1,

    @start_step_id=1,

    @notify_level_eventlog=0,

    @notify_level_email=2,

    @notify_level_page=2,

    @delete_level=0,

    @owner_login_name=''SQL2022-STANDAL\Administrator''

    GO

    USE msdb

    GO

    DECLARE @schedule_id int

    EXEC msdb.dbo.sp_add_jobschedule @job_name=''SQLMaintenance'', @name=''MaitenanceSchedule'',

    @enabled=1,

    @freq_type=4,

    @freq_interval=1,

    @freq_subday_type=4,

    @freq_subday_interval=1,

    @freq_relative_interval=0,

    @freq_recurrence_factor=1,

    @active_start_date=20241020,

    @active_end_date=99991231,

    @active_start_time=0,

    @active_end_time=235959

    GO

    "

    }

    Invoke-DbaQuery @params

    ```

    **Listing 10-8 Create the SQL Agent Job**


    ## Summary


    Creating a centralized maintenance engine provides the ultimate flexibility in
    how and when maintenance tasks will be executed across your SQL Server estate.
    A maintenance engine sits on a centralized management server and allows for maintenance
    tasks to be executed across the enterprise but controlled from a single location.


    The engine itself consists of tables and views that store information about which
    maintenance routines should be executed at which times on which server. This is
    followed by simple logic within PowerShell scripts that determines where a task
    should be run. These tasks are then called off by a SQL Agent Job, which runs
    every minute.


    This approach has endless possibilities, and I encourage you to use this approach
    as a basis for developing your own maintenance scheduler, which meets the needs
    of your organization.'
