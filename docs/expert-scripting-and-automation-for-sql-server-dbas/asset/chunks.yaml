    VERBOSE: [SQL2022-STANDAL]: LCM:  [ End    Test     ]  [[Service]SQLServerService]  in
    1.1170 seconds.

    VERBOSE: [SQL2022-STANDAL]: LCM:  [ Skip   Set      ]  [[Service]SQLServerService]

    VERBOSE: [SQL2022-STANDAL]: LCM:  [ End    Resource ]  [[Service]SQLServerService]

    VERBOSE: [SQL2022-STANDAL]: LCM:  [ End    Set      ]

    VERBOSE: [SQL2022-STANDAL]: LCM:  [ End    Set      ]    in  1.4600 seconds.

    VERBOSE: Operation ''Invoke CimMethod'' complete.

    VERBOSE: Time taken for configuration job to complete is 1.507 seconds

    ```


    这次，输出内容要短得多。你会注意到**粗体文本**高亮显示的条目表明，所有三个设置操作都被跳过了。这是因为它们已经配置为所需状态，无需执行任何操作。这说明了配置管理方法的美妙之处。


    最后一步是安排此配置运行。我通常建议每 30 分钟运行一次配置。也就是说，如果服务器上出现任何偏差，将在不超过半小时内（加上配置执行所需的时间）得到纠正。


    清单 3-7 演示了如何在任务计划程序中配置任务以每 30 分钟应用一次配置。该脚本设置了多个变量，这些变量构建了在脚本末尾执行 `Register-ScheduledTask`
    命令所需的参数。


    注意


    你会注意到我们使用的是 Windows PowerShell，而不是 PowerShell 7。这是因为，如前所述，不使用 Azure 的 DSC 仅由随
    Windows PowerShell 5.1 一起发布的 DSC 1.1 支持。PowerShell 7 随附 DSC 2.0，其中包含重大更改，并且截至
    PowerShell 7.2，`PSDesiredStateConfiguration` 模块不再随 PowerShell 一起提供，而是作为单独的下载提供。


    ```

    $command = ''C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe''

    $arguments = ''-NoProfile -Command "Start-DscConfiguration -Path C:\Scripts\WindowsConfig"
    -Wait''

    $actions = (New-ScheduledTaskAction -Execute $command -Argument $arguments )

    $trigger = New-ScheduledTaskTrigger -Once -At 00:00 -RepetitionInterval (New-TimeSpan
    -Minutes 30)

    $settings = New-ScheduledTaskSettingsSet

    $principal = New-ScheduledTaskPrincipal -UserId ''NT AUTHORITY\SYSTEM'' -RunLevel
    Highest -LogonType ServiceAccount

    $task = New-ScheduledTask -Action $actions -Trigger $trigger -Settings $settings
    -Principal $principal

    Register-ScheduledTask ''ApplyWindowsConfig'' -InputObject $task

    清单 3-7

    创建计划任务

    ```


    ## 总结


    配置管理是一种非常强大的技术，用于构建服务器并避免其在生命周期中发生配置偏差。现代的 DSC 最适合在利用 Azure 或 Azure Arc 的环境中使用。然而，通过使用
    DSC 1.1 版本，它仍然可以在非 Azure 环境中使用。


    DSC 可用于配置 Windows 的所有方面。在本章中，我们研究了如何使用 DSC 配置注册表项、文件夹以及确保服务正在运行。在第 6 章中，我们将探讨如何使用
    DSC 安装 SQL Server；在第 9 章中，我们将探讨如何使用 DSC 配置 SQL Server 本身。


    DSC 是完全可扩展的，我们可以编写自己的 DSC 资源，这些资源几乎可以涵盖任何可能的配置。DSC 的美妙之处在于它只执行需要执行的配置以避免偏差。每个资源都将测试资源的状态，并且仅在测试评估失败时才执行设置操作。


    # 4. 使用 sqlserver 模块


    `sqlserver` 是一个由 Microsoft 编写和维护的 PowerShell 模块，它允许 DBA 从 PowerShell 终端与 SQL Server
    实例进行交互和管理。可以手动从 PowerShell Gallery ([`www.powershellgallery.com/packages/Sqlserver`](http://www.powershellgallery.com/packages/Sqlserver/21.1.18228))
    下载，也可以使用清单 4-1 中的命令安装。


    ```

    Install-Module SqlServer

    清单 4-1

    安装 sqlserver 模块

    ```


    在本章中，我们将讨论如何使用该模块，探索一些最有用的命令及其用例，既适用于临时管理，也适用于自动化。我们将首先了解 `Invoke-SqlCmd` 命令，然后再了解可用于管理和脚本编写的其他命令。


    ## 使用 Invoke-SqlCmd


    可以说，`sqlserver` 模块中最常用的命令是 `Invoke-SqlCmd`。该命令镜像了 `SQLCMD` 命令行工具的功能，允许 DBA 从 PowerShell
    终端针对 SQL Server 实例运行查询。

    '
- fmt: '### Invoke-SqlCmd Basics


    The most basic call of `Invoke-SqlCmd` involves passing two parameters: `ServerInstance`,
    which defines which SQL Server instance the query should be run against, and `Query`
    which supplies the query that should be executed. Listing [4-2](#395785_2_En_4_Chapter.xhtml#PC3)
    demonstrates using this basic call to return a list of database names from the
    default instance of the local server. Possible formats for the `ServerInstance`
    parameter include `ServerName` and `ServerName\InstanceName`. If you wish to run
    the query against a default instance of the local server, then you can use `localhost`,
    `.` or omit the `ServerInstance` parameter all together.


    Tip


    The following example assumes Windows authentication. If SQL authentication should
    be used, then the user credential will also need to be passed.


    `-TrustServerCertificate` will be required if you are using v22 or above of the
    `sqlServer` module and do not have encryption configured.


    ```

    Invoke-SqlCmd -ServerInstance localhost -Query "SELECT name FROM sys.databases"
    -TrustServerCertificate

    Listing 4-2

    Basic Call of Invoke-SqlCmd

    ```


    ### Using Invoke-SqlCmd for Scripting


    So we now have a list of databases displayed on screen, which is great and certainly
    useful for ad hoc DBA activity. If we are planning to use `Invoke-SqlCmd` within
    a script, then there is a strong likelihood that we will want to pass the results
    of the query into a variable.


    The script in Listing [4-3](#395785_2_En_4_Chapter.xhtml#PC4) demonstrates how
    to do this, but it also introduces a technique known as splatting. This technique
    builds up a hash table, which contains key/value pairs, which relate to the parameter
    names and values that we plan to pass to the command. When we execute the command,
    we can then simply pass the hash table, and PowerShell will expand the parameter
    names and values inside it. Functionally, it is equivalent to passing each parameter
    into the command in the usual way. The benefit of splatting is that it makes the
    commands more concise and easier to read. It is also easier to find and manage
    parameter values at a later date.


    ```

    $Params = @{

    ServerInstance = "localhost"

    Query          = "SELECT name FROM sys.databases"

    }

    $Databases = Invoke-Sqlcmd @Params

    Listing 4-3

    Pass Invoke-SqlCmd Results to a Variable

    ```


    It is important to note that the results of the `Invoke-SqlCmd` command are an
    object or an array of objects. By default, the output is as `DataRow`s, although
    the `OutputAs` parameter can be used to change the output to a `DataSet` or `DataTables`
    format. This means that you need to work with the properties of the rich object,
    rather than the object itself. For example, consider the script in Listing [4-4](#395785_2_En_4_Chapter.xhtml#PC5),
    which passes the `$Databases` variable into a `foreach` loop and writes each object
    to screen.


    Tip


    `foreach` loops are introduced in Chapter [2](#395785_2_En_2_Chapter.xhtml).


    ```

    $Params = @{

    ServerInstance = "localhost"

    Query          = "SELECT name FROM sys.databases"

    }

    $Databases = Invoke-Sqlcmd @Params

    foreach ($Database in $Databases) {

    Write-Host $Database

    }

    Listing 4-4

    Passing Rich Objects to a foreach Loop

    ```


    The results of running this script are displayed below:


    ```

    System.Data.DataRow

    System.Data.DataRow

    System.Data.DataRow

    System.Data.DataRow

    System.Data.DataRow

    ```


    Instead, we should work with the properties of the rich object. In this specific
    case, the column we are returning is called `name`; hence, we should work with
    the `name` property, as demonstrated in Listing [4-5](#395785_2_En_4_Chapter.xhtml#PC7).


    ```

    $Params = @{

    ServerInstance = "localhost"

    Query          = "SELECT name FROM sys.databases"

    }

    $Databases = Invoke-Sqlcmd @Params

    foreach ($Database in $Databases) {

    Write-Host $Database.name

    }

    Listing 4-5

    Working with Object Properties

    ```


    This script will return the more helpful results, shown below:


    ```

    master

    tempdb

    model

    msdb

    WideWorldImporters

    ```


    This point brings me nicely on to discussing how we could use the data returned
    by `Invoke-SqlCmd`. In the examples above, we have been returning a list of databases
    that exist on our instance. Imagine that you have a script that will dynamically
    rebuild indexes, based on a fragmentation threshold, such as the script in Listing
    [4-6](#395785_2_En_4_Chapter.xhtml#PC9).


    Tip


    Creating a dynamic index rebuild script and other metadata-driven automation will
    be discussed in more detail in Chapter [7](#395785_2_En_7_Chapter.xhtml).


    ```

    DECLARE @SQL NVARCHAR(MAX)

    SET @SQL =

    (

    SELECT ''ALTER INDEX ''

    + QUOTENAME(i.name)

    + '' ON '' + s.name

    + ''.''

    + QUOTENAME(OBJECT_NAME(i.object_id))

    + '' REBUILD ; ''

    FROM sys.dm_db_index_physical_stats(DB_ID(),NULL,NULL,NULL,''DETAILED'') ps

    INNER JOIN sys.indexes i

    ON ps.object_id = i.object_id

    AND ps.index_id = i.index_id

    INNER JOIN sys.objects o

    ON ps.object_id = o.object_id

    INNER JOIN sys.schemas s

    ON o.schema_id = s.schema_id

    WHERE index_level = 0

    AND avg_fragmentation_in_percent > 25

    FOR XML PATH('''')

    ) ;

    EXEC(@SQL) ;

    Listing 4-6

    Dynamic Index Rebuilds

    ```


    Tip


    Using `FOR XML PATH` to efficiently loop in T-SQL is explained further in Chapter
    [1](#395785_2_En_1_Chapter.xhtml).


    A variable containing a list of databases will allow us to schedule this script
    to run against every database on our instance, without having to maintain a static
    list of databases. The technique for this is demonstrated in Listing [4-7](#395785_2_En_4_Chapter.xhtml#PC10).


    ```

    $Params = @{

    ServerInstance = "localhost"

    Query          = "SELECT name FROM sys.databases"

    }

    $Databases = Invoke-Sqlcmd @Params

    foreach ($Database in $Databases) {

    $Params = @{

    ServerInstance = "localhost"

    Database       = $Database.name

    InputFile      = "c:\scripts\IndexRebuild.sql"

    }

    Invoke-Sqlcmd @Params

    }

    Listing 4-7

    Running a Script Against All Databases

    ```


    There are a couple of key points to consider about this script. Firstly, note
    that we are using the `Database` parameter of the `Invoke-SqlCmd` cmdlet. We are
    passing in the `name` property of the `Database` object in each iteration of the
    `foreach` loop.


    Secondly, while it is technically possible to pass the index rebuild script directly
    into the `Query` parameter of `Invoke-SqlCmd`, the script is rather large for
    this approach and will make our script hard to maintain. Therefore, we have saved
    the script in a file called `c:\scripts\IndexRebuild.sql` and are passing this
    file into the cmdlet, with the use of the `InputFile` parameter.'
