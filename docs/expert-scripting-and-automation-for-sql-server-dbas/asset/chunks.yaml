    \ NOT NULL` 的同义词。因此，为了保持一致性，我们将使用 `NVARCHAR(128)` 作为任何对象标识符的数据类型。 |\n| `Instance\
    \ name` | `NVARCHAR(128)` |  |\n| `Port` | `NVARCHAR(8)` | 存储为字符串，以包含协议信息。 |\n\
    | `IP Address` | `NVARCHAR(15)` |  |\n| `Service account name` | `NVARCHAR(128)`\
    \ |  |\n| `Service account password` | `NVARCHAR(64)` |  |\n| `Authentication\
    \ mode` | `BIT` | `0` 表示 Windows 身份验证，`1` 表示混合模式身份验证。 |\n| `sa account name` |\
    \ `NVARCHAR(128)` |  |\n| `sa account password` | `NVARCHAR(64)` |  |\n| `Cluster\
    \ flag` | `BIT` |  |\n| `Windows version` | `NVARCHAR(64)` | 服务器上安装的 Windows 版本，例如\
    \ “Windows Server 2022 Standard LSTC”。 |\n| `SQL Server version` | `NVARCHAR(64)`\
    \ | 服务器上安装的 SQL Server 版本，例如 “SQL Server 2022 Enterprise RTM CU2”。 |\n| `DR Server\
    \ name` | `NVARCHAR(128)` |  |\n| `DR instance name` | `NVARCHAR(128)` |  |\n\
    | `DR technology` | `NVARCHAR(128)` |  |\n| `TargetRPO` | `TINYINT` |  |\n| `TargetRTO`\
    \ | `TINYINT` |  |\n| `Instance classification` | `TINYINT` | `1` 表示联机事务处理 (OLTP)，`2`\
    \ 表示数据仓库，`3` 表示混合工作负载，`4` 表示提取、转换、加载 (ETL)。 |\n| `Server cores` | `TINYINT` |\
    \  |\n| `Instance cores` | `TINYINT` |  |\n| `Server RAM` | `SMALLINT` |  |\n\
    | `Instance RAM` | `SMALLINT` |  |\n| `Virtual flag` | `BIT` | `0` 表示物理服务器，`1`\
    \ 表示虚拟机。 |\n| `Hypervisor` | `BIT` | `0` 表示 VMWare，`1` 表示 Hyper-V。 |\n| `SQL Server\
    \ Agent account name` | `NVARCHAR(128)` |  |\n| `SQL Server Agent account password`\
    \ | `NVARCHAR(64)` |  |\n| `Application owner` | `NVARCHAR(256)` |  |\n| `Application\
    \ owner e-mail` | `NVARCHAR(512)` |  |\n\n我们现在应该考虑为每张表设计主键。我们已经识别出的逻辑“自然”键是否足够，还是应该创建人工键？人工键通常通过\
    \ `IDENTITY` 列实现。\n\n我们可以看到，每张表的主键列数据类型都是 `NVARCHAR(128)`。虽然这些列能唯一标识各自表中的每一行，但它们是宽列，每行可能消耗高达\
    \ 256 字节。\n\n主键将在每个外键中被复制，并且由于主键通常是表的聚集索引所基于的列，它也很可能在所有非聚集索引中被复制。因此，我们希望主键值尽可能窄。如果我们为每张表添加一个使用\
    \ `INT` 数据类型的假想主键，每个键值将只消耗 4 字节，而不是可能的 256 字节。\n\n> 提示\n>\n> 由于我们采取了使用假想键的方法，很可能每个自然键都需要一个唯一约束。\n\
    \n## 创建库存数据库\n\n在本节中，我们将使用 DbaTools 来创建我们在本章中设计的库存数据库。我们的第一步是创建数据库外壳，这可以通过使用 `New-DbaDatabase`\
    \ 命令来实现，如代码清单 8-1 所示。在此脚本中，我们配置了数据库的排序规则、数据库所有者以及所需的恢复模式（在我们的案例中是完整恢复模式，因为它是一个\
    \ OLTP 数据库，并且我们希望执行事务日志备份）。我们还配置了主数据文件的属性。\n\n> 提示\n>\n> `New-DbaDatabase` 还有一些参数，允许您配置辅助数据文件的属性、事务日志的属性、默认文件组以及数据和日志文件的文件路径。由于我们未指定这些值，SQL\
    \ Server 将使用 `Model` 数据库中配置的值。\n\n```powershell\n$params = @{\n    SqlInstance\
    \        = \"localhost\"\n    Name               = \"Inventory\"\n    Collation\
    \          = \"Latin1_General_CI_AS\"\n    Owner              = \"sa\"\n    RecoveryModel\
    \      = \"Full\"\n    PrimaryFileSize    = \"2048\" # 指定单位为 MB\n    PrimaryFileGrowth\
    \  = \"1024\" # 指定单位为 MB\n    PrimaryFileMaxSize = \"4096\" # 指定单位为 MB\n}\nNew-DbaDatabase\
    \ @params\n# 清单 8-1 创建外壳数据库\n```\n\n由于我们的库存数据库将包含所管理实例的 `sa` 密码，因此我们需要考虑加密。SQL\
    \ Server 中的加密层次结构如图 8-6 所示。\n\n![](img/395785_2_En_8_Fig6_HTML.jpg)\n\n图 8-6 SQL\
    \ Server 加密层次结构\n\n> 提示\n>\n> 全面讨论加密超出了本书的范围。但是，可以在 Apress 出版的 *Pro SQL Server\
    \ 2022 Administration* 中找到完整的描述，网址为 link.springer.com/book/10.1007/978-1-4842-8864-1。\n\
    \n对于我们的用例，我们需要创建一个数据库主密钥（服务主密钥将自动创建）。然后，我们需要创建一个使用数据库主密钥加密的证书，再创建一个使用该证书加密的对称密钥。这样就可以使用对称密钥加密\
    \ `sa` 密码，然后再插入数据库表。\n\n我们可以使用 `New-DbaDbMasterKey` 命令创建数据库主密钥，如代码清单 8-2 所示。在这里，我们将一个密码转换为安全字符串，然后将其作为主密钥的密码，连同将在其中创建主密钥的数据库名称一起，传递到\
    \ `New-DbaDbMasterKey` 命令中。\n\n```powershell\n$Password = $SecurePassword = ConvertTo-SecureString\
    \ 'Pa$$w0rd' -AsPlainText -Force\n$params = @{\n    SqlInstance    = \"localhost\"\
    \n    Database       = \"Inventory\"\n    SecurePassword = $Password\n}\nNew-DbaDbMasterKey\
    \ @params\n# 清单 8-2 为库存数据库创建数据库主密钥\n```\n\n备份数据库主密钥至关重要。否则，如果我们丢失了密钥，将无法恢复加密的数据。我们可以使用代码清单\
    \ 8-3 中的脚本将密钥备份到文件系统。\n\n```powershell\n$Password = $SecurePassword = ConvertTo-SecureString\
    \ 'Pa$$w0rd' -AsPlainText -Force\n$params = @{\n    SqlInstance    = \"localhost\"\
    \n    Database       = \"Inventory\"\n    SecurePassword = $Password\n    Path\
    \           = \"c:\\Keys\\\"\n}\nBackup-DbaDbMasterKey @params\n# 清单 8-3 备份主密钥\n\
    ```\n"
