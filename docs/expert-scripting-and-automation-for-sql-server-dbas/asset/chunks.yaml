    \ PowerShell 终端运行 `setup.exe` 时，你可以使用开关和参数来传递值，这些值将用于配置实例。\n\n#### 必需参数\n\n虽然许多开关和参数是可选的，但有些必须始终包含。当你安装独立的数据库引擎实例时，表\
    \ 6-1 中列出的参数始终是必需的。\n\n表 6-1\n\n必需参数\n\n| 参数 | 用途 |\n| --- | --- |\n| `/IACCEPTSQLSERVERLICENSETERMS`\
    \ | 确认你接受 SQL Server 许可条款 |\n| `/SUPPRESSPRIVACYSTATEMENTNOTICE` | 防止显示隐私声明 |\n\
    | `/ACTION` | 指定你想要执行的操作，例如安装或升级 |\n| `/FEATURES or /ROLE` | 指定你希望安装的功能 |\n| `/INSTANCENAME`\
    \ | 分配给实例的名称 |\n| `/SQLSYSADMINACCOUNTS` | 将在数据库引擎实例中被授予管理权限的 Windows 安全上下文 |\n\
    | `/AGTSVCACCOUNT` | 用于运行 SQL Agent 服务的帐户 |\n| `/AGTSVCPASSWORD` | 如果不是组管理服务帐户，则此参数用于指定\
    \ SQL Agent 服务帐户的密码 |\n| `/SQLSVCACCOUNT` | 用于运行数据库引擎服务的帐户 |\n| `/SQLSVCPASSWORD`\
    \ | 如果不是 gMSA 或虚拟帐户，则此参数用于指定数据库引擎服务帐户的密码 |\n| `/qs` | 执行无人参与安装。在 Windows Server\
    \ Core 上是必需的，因为不支持安装向导 |\n\n##### IACCEPTSQLSERVERLICENSETERMS 开关\n\n因为 `/IACCEPTSQLSERVERLICENSETERMS`\
    \ 是一个简单的开关，表示你接受许可条款，所以它不需要传递任何参数值。\n"
- fmt: '## ACTION Parameter


    当你执行独立实例的基本安装时，传递给`/ACTION`参数的值将是`install`；但是，`/ACTION`参数所有可能的值如表 6-2 所示。


    **表 6-2**


    `/ACTION` 参数接受的值


    | 值 | 用途 |

    | --- | --- |

    | `Install` | 安装独立实例 |

    | `PrepareImage` | 准备一个原始的独立镜像，不包含账户、计算机或网络的特定详细信息 |

    | `CompleteImage` | 通过添加账户、计算机和网络详细信息来完成已准备的独立镜像的安装 |

    | `Upgrade` | 从 SQL Server 2012、2014、2017 或 2019 升级实例 |

    | `EditionUpgrade` | 将 SQL Server 2022 从较低版本（如 Developer Edition）升级到较高版本（如 Enterprise）
    |

    | `Repair` | 修复损坏的实例 |

    | `RebuildDatabase` | 重建损坏的系统数据库 |

    | `Uninstall` | 卸载独立实例 |

    | `InstallFailoverCluster` | 安装故障转移群集实例 |

    | `PrepareFailoverCluster` | 准备一个原始的群集镜像，不包含账户、计算机或网络的特定详细信息 |

    | `CompleteFailoverCluster` | 通过添加账户、计算机和网络详细信息来完成已准备的群集镜像的安装 |

    | `AddNode` | 向故障转移群集添加节点 |

    | `RemoveNode` | 从故障转移群集中移除节点 |


    ## FEATURES Parameter


    如表 6-3 所示，`/FEATURES` 参数用于指定一个逗号分隔的列表，该列表包含安装程序将要安装的功能，但并非所有功能都可在 Windows Server
    Core 上使用。


    **表 6-3**


    `/FEATURES` 参数的可接受值


    | 参数值 | 在 Windows Core 上使用 | 描述 |

    | --- | --- | --- |

    | `SQL` | 否 | 完整的 SQL 引擎，包括全文搜索、复制和数据质量服务器 |

    | `SQLEngine` | 是 | 数据库引擎 |

    | `FullText` | 是 | 全文搜索 |

    | `Replication` | 是 | 复制组件 |

    | `DQ` | 否 | 数据质量服务器 |

    | `PolyBase` | 是 | PolyBase 组件 |

    | `AdvancedAnalytics` | 是 | 机器学习解决方案和数据库内 R 服务 |

    | `AS` | 是 | Analysis Services |

    | `DQC` | 否 | 数据质量客户端 |

    | `IS` | 是 | Integration Services |

    | `MDS` | 否 | 主数据服务 |

    | `Tools` | 否 | 所有客户端工具 |

    | `BC` | 否 | 向后兼容组件 |

    | `Conn` | 是 | 连接组件 |

    | `DREPLAY_CTLR` | 否 | 分布式重播控制器 |

    | `DREPLAY_CLT` | 否 | 分布式重播客户端 |

    | `SNAC_SDK` | 是 | 客户端连接 SDK |

    | `SDK` | 否 | 客户端工具 SDK |

    | `LocalDB` | 是 | SQL Server Express 的一种执行模式，供应用程序开发人员使用 |

    | `IS_MASTER` | 是 | Integration Services Master，用于横向扩展的 SSIS 部署 |

    | `IS_WORKER` | 是 | Integration Services Worker，用于横向扩展的 SSIS 部署 |

    | `AZUREEXTENSION` | 是 | 将实例与 Azure ARC 集成以实现集中管理 |


    > **注意**

    > 如果你选择安装其他 SQL Server 功能，例如 Analysis Services 或 Integration Services，那么其他参数也会变为必需项。


    ## Role Parameter


    除了使用`/FEATURES`参数指定要安装的功能列表外，还可以使用`/ROLE`参数在预定义的角色中安装 SQL Server。`/ROLE`参数支持的角色详见表
    6-4。


    **表 6-4**


    `/ROLE` 参数的可用值


    | 参数值 | 描述 |

    | --- | --- |

    | `SPI_AS_ExistingFarm` | 在现有的 SharePoint 场中将 SSAS 安装为 PowerPivot 实例 |

    | `SPI_AS_NewFarm` | 在新的、未配置的 SharePoint 场中安装数据库引擎和 SSAS 作为 PowerPivot 实例 |

    | `AllFeatures_WithDefaults` | 安装 SQL Server 及其组件的所有功能。我建议不要使用此选项，除非是在最特殊的情况下，因为安装比实际需要更多的功能会增加
    SQL Server 的安全足迹和资源利用足迹 |


    ## Basic Installation


    当你使用`setup.exe`的命令行参数时，应遵守表 6-5 中概述的语法规则。


    **表 6-5**


    命令行参数的语法规则


    | 参数类型 | 语法 |

    | --- | --- |

    | 简单开关 | `/SWITCH` |

    | 真/假 | `/PARAMETER=true/false` |

    | 布尔值 | `/PARAMETER=0/1` |

    | 文本 | `/PARAMETER="Value"` |

    | 多值文本 | `/PARAMETER="Value1" "Value2"` |

    | `/FEATURES` 参数 | `/FEATURES=Feature1,Feature2` |


    > **提示**

    > 对于文本参数，只有当值包含空格时才需要引号。但是，始终包含它们被认为是一种良好的做法。


    假设你已经导航到安装介质的根目录，那么代码清单 6-1 提供了用于安装数据库引擎和复制的 PowerShell 语法。它为所有可选参数使用了默认值，但排序规则除外，我们将把它设置为
    Windows 排序规则 `Latin1_General_CI_AS`。


    ```

    .\SETUP.EXE /IACCEPTSQLSERVERLICENSETERMS /ACTION="Install" /FEATURES=SQLEngine,Replication
    /INSTANCENAME="SCRIPTING" /SQLSYSADMINACCOUNTS="Administrator" /SQLCOLLATION="Latin1_General_CI_AS"
    /qs /SUPPRESSPRIVACYSTATEMENTNOTICE

    ```


    **代码清单 6-1**

    从 PowerShell 安装 SQL Server


    > **注意**

    > 如果使用的是命令提示符而不是 PowerShell，则不需要前导的 `.\` 字符。


    在此示例中，将安装一个名为 `SCRIPTING` 的 SQL Server 实例。由于未提供服务账户参数，数据库引擎和 SQL Agent 服务将在虚拟服务账户下运行。安装开始时，一个精简的、非交互式的安装向导版本将出现，以使你了解进度。'
  raw: '#### ACTION Parameter


    When you perform a basic installation of a stand-alone instance, the value passed
    to the `/ACTION` parameter will be `install`; however, a complete list of possible
    values for the `/ACTION` parameter is shown in Table [6-2](#395785_2_En_6_Chapter.xhtml#Tab2).


    Table 6-2


    Values Accepted by the `/ACTION` Parameter


    | Value | Usage |

    | --- | --- |

    | `Install` | Installs a stand-alone instance |

    | `PrepareImage` | Prepares a vanilla stand-alone image, with no account-, computer-,
    or network-specific details |

    | `CompleteImage` | Completes the installation of a prepared stand-alone image
    by adding account, computer, and network details |

    | `Upgrade` | Upgrades an instance from SQL Server 2012, 2014, 2017, or 2019 |

    | `EditionUpgrade` | Upgrades a SQL Server 2022 from a lower edition (such as
    Developer Edition) to a higher edition (such as Enterprise) |

    | `Repair` | Repairs a corrupt instance |

    | `RebuildDatabase` | Rebuilds corrupted system databases |

    | `Uninstall` | Uninstalls a stand-alone instance |

    | `InstallFailoverCluster` | Installs a failover clustered instance |

    | `PrepareFailoverCluster` | Prepares a vanilla clustered image with no account-,
    computer-, or network-specific details |

    | `CompleteFailoverCluster` | Completes the installation of a prepared clustered
    image by adding account, computer, and network details |

    | `AddNode` | Adds a node to a failover cluster |

    | `RemoveNode` | Removes a node from a failover cluster |


    #### FEATURES Parameter


    As shown in Table [6-3](#395785_2_En_6_Chapter.xhtml#Tab3), the `/FEATURES` parameter
    is used to specify a comma-delimited list of features that will be installed by
    setup, but not all features can be used on Windows Server Core.


    Table 6-3


    Acceptable Values of the `/FEATURES` Parameter


    | Parameter Value | Use on Windows Core | Description |

    | --- | --- | --- |

    | `SQL` | NO | Full SQL Engine, including Full Text, Replication, and Data Quality
    Server |

    | `SQLEngine` | YES | Database Engine |

    | `FullText` | YES | Full Text search |

    | `Replication` | YES | Replication components |

    | `DQ` | NO | Data Quality Server |

    | `PolyBase` | YES | PolyBase components |

    | `AdvancedAnalytics` | YES | Machine Learning Solutions and In-Database R Services
    |

    | `AS` | YES | Analysis Services |

    | `DQC` | NO | Data Quality Client |

    | `IS` | YES | Integration Services |

    | `MDS` | NO | Master Data Services |

    | `Tools` | NO | All client tools |

    | `BC` | NO | Backward compatibility components |

    | `Conn` | YES | Connectivity components |

    | `DREPLAY_CTLR` | NO | Distributed Replay Controller |

    | `DREPLAY_CLT` | NO | Distributed Replay Client |

    | `SNAC_SDK` | YES | Client connectivity SDK |

    | `SDK` | NO | Client tools SDK |

    | `LocalDB` | YES | An execution mode of SQL Server express, which is used by
    application developers |

    | `IS_MASTER` | YES | Integration Services Master, for use with scaled out SSIS
    deployments |

    | `IS_WORKER` | YES | Integration Services Worker, for use with scaled out SSIS
    deployments |

    | `AZUREEXTENSION` | YES | Integrate the instance with Azure ARC for centralized
    management |


    Note


    If you choose to install other SQL Server features, such as Analysis Services
    or Integration Services, then other parameters will also become required.


    ### Role Parameter


    Instead of specifying a list of features to install, with the `/FEATURES` parameter,
    it is possible to install SQL Server in a predefined role, using the /ROLE parameter.
    The roles supported by the `/ROLE` parameter are detailed in Table [6-4](#395785_2_En_6_Chapter.xhtml#Tab4).


    Table 6-4


    Available Values for the `/ROLE` Parameter


    | Parameter Value | Description |

    | --- | --- |

    | `SPI_AS_ExistingFarm` | Installs SSAS as a PowerPivot instance in an existing
    SharePoint farm |

    | `SPI_AS_NewFarm` | Installs the Database Engine and SSAS as a PowerPivot instance
    in a new and unconfigured SharePoint farm |

    | `AllFeatures_WithDefaults` | Installs all features of SQL Server and its components.
    I do not recommend using this option, except in the most occasional circumstances,
    as installing more features than are actually required increases the security
    footprint and resource utilization footprints of SQL Server |


    ### Basic Installation


    When you are working with command-line parameters for setup.exe, you should observe
    the rules outlined in Table [6-5](#395785_2_En_6_Chapter.xhtml#Tab5) with regard
    to syntax.


    Table 6-5


    Syntax Rules for Command-Line Parameters


    | Parameter Type | Syntax |

    | --- | --- |

    | Simple switch | `/SWITCH` |

    | True/False | `/PARAMETER=true/false` |

    | Boolean | `/PARAMETER=0/1` |

    | Text | `/PARAMETER="Value"` |

    | Multi-valued text | `/PARAMETER="Value1" "Value2"` |

    | `/FEATURES` parameter | `/FEATURES=Feature1,Feature2` |


    Tip


    For text parameters, the quotation marks are only required if the value contains
    spaces. However, it is considered good practice to always include them.


    Assuming that you have already navigated to the root directory of the installation
    media, then the command in Listing [6-1](#395785_2_En_6_Chapter.xhtml#PC1) provides
    PowerShell syntax for installing the Database Engine and Replication. It uses
    default values for all optional parameters, with the exception of the collation,
    which we will set to the Windows collation Latin1_General_CI_AS.


    ```

    .\SETUP.EXE /IACCEPTSQLSERVERLICENSETERMS /ACTION="Install" /FEATURES=SQLEngine,Replication
    /INSTANCENAME="SCRIPTING" /SQLSYSADMINACCOUNTS="Administrator" /SQLCOLLATION="Latin1_General_CI_AS"
    /qs /SUPPRESSPRIVACYSTATEMENTNOTICE

    Listing 6-1

    Installing SQL Server from PowerShell

    ```


    Note


    If using the command prompt, instead of PowerShell, the leading `.\` characters
    are not required.


    In this example, a SQL Server instance named SCRIPTING will be installed. Because
    service account parameters were not supplied, the Database Engine and the SQL
    Agent services will run under virtual service accounts. When installation begins,
    a pared-down, noninteractive version of the installation wizard will appear to
    keep you updated on progress.'
