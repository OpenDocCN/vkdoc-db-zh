    \n首先，假设我们正在对服务器执行晨检。我们需要检查 SQL Agent 作业，因此我们将使用 `Get-DbaAgentJob` 命令返回作业列表。默认情况下，此命令将为每个作业返回一个对象，如清单\
    \ 5-30 所示。\n\n```powershell\nGet-DbaAgentJob -SqlInstance localhost\n```\n*清单\
    \ 5-30：返回 SQL Agent 作业列表*\n\n此命令的结果当然会因你在实例上拥有的作业而异。当我运行此命令时，收到以下结果：\n\n```\n\
    ComputerName    InstanceName SqlInstance     Name                    Category\
    \                OwnerLoginName CurrentRunStatus CurrentRunRetryAttempt Enabled\
    \ LastRunDate         LastRunOutcome HasSchedule OperatorToEmail CreateDate\n\
    ------------    ------------ -----------     ----                    --------\
    \                -------------- ---------------- ---------------------- -------\
    \ -----------         -------------- ----------- ---------------\nWIN-J38I01U06D7\
    \ MSSQLSERVER  WIN-J38I01U06D7 DbaMaintenance          [Uncategorized (Local)]\
    \ sa                    Executing                      0    True 18/01/2021 08:37:00\
    \         Failed        True                 17/01/2021 16:36:29\nWIN-J38I01U06D7\
    \ MSSQLSERVER  WIN-J38I01U06D7 syspolicy_purge_history [Uncategorized (Local)]\
    \ sa                         Idle                      0    True 18/01/2021 07:09:47\
    \      Succeeded        True                 11/08/2020 13:10:41\n```\n\n从这些结果中明显可以看出，`DbaMaintenance`\
    \ 作业在上次执行时失败了。因此，我们将使用 `Get-DbaAgentJobHistory` 命令检索有关失败作业的更多信息，以返回作业历史输出。我们将此命令的结果通过管道传递给\
    \ `Where-Object` 命令，以便筛选失败的作业，最后再通过管道传递给 `Format-Table` 命令，使结果更易于阅读。清单 5-31 演示了这一点。\n\
    \n```powershell\nGet-DbaAgentJobHistory -SqlInstance localhost | Where-Object\
    \ status -eq \"Failed\" | Format-Table\n```\n*清单 5-31：返回作业历史记录*\n\n运行此命令的结果如下所示：\n\
    \n```\nComputerName    InstanceName SqlInstance     Job            StepName  \
    \    RunDate             StartDate               EndDate                 Duration\
    \ Status OperatorEmailed Message\n------------    ------------ -----------   \
    \  ---            --------      -------             ---------               -------\
    \                 -------- ------ ---------------\nWIN-J38I01U06D7 MSSQLSERVER\
    \  WIN-J38I01U06D7 DbaMaintenance (Job outcome) 18/01/2021 08:41:00 2021-01-18\
    \ 08:41:00.000 2021-01-18 08:42:01.000 00:01:01 Failed                 The job\
    \ failed.  JobManager tried to run a non-existent step (3) for job DbaMain...\n\
    WIN-J38I01U06D7 MSSQLSERVER  WIN-J38I01U06D7 DbaMaintenance (Job outcome) 18/01/2021\
    \ 08:39:00 2021-01-18 08:39:00.000 2021-01-18 08:40:02.000 00:01:02 Failed   \
    \              The job failed.  JobManager tried to run a non-existent step (3)\
    \ for job DbaMain...\nWIN-J38I01U06D7 MSSQLSERVER  WIN-J38I01U06D7 DbaMaintenance\
    \ (Job outcome) 18/01/2021 08:37:00 2021-01-18 08:37:00.000 2021-01-18 08:38:02.000\
    \ 00:01:02 Failed                 The job failed.  JobManager tried to run a non-existent\
    \ step (3) for job DbaMain...\nWIN-J38I01U06D7 MSSQLSERVER  WIN-J38I01U06D7 DbaMaintenance\
    \ (Job outcome) 18/01/2021 08:35:00 2021-01-18 08:35:00.000 2021-01-18 08:36:02.000\
    \ 00:01:02 Failed                 The job failed.  JobManager tried to run a non-existent\
    \ step (3) for job DbaMain...\n```\n"
- fmt: "## 从结果看失败任务\n\n从这些结果中，我们可以看出哪个任务总是在同一位置失败。但你也会注意到，错误信息被截断了。我们可以通过将`Where-Object`命令的结果通过管道传递给`Select-Object`命令来解决这个问题，后者可以展开`Message`属性。这在代码清单\
    \ 5-32 中有演示。\n\n```\nGet-DbaAgentJobHistory -SqlInstance localhost | Where-Object\
    \ status -eq \"Failed\" | Select-Object -ExpandProperty Message\n```\n代码清单 5-32\n\
    展开 Message 属性\n\n此命令的结果如下所示：\n\n```\nThe job failed.  JobManager tried to run\
    \ a non-existent step (3) for job DbaMaintenance.\nThe job failed.  JobManager\
    \ tried to run a non-existent step (3) for job DbaMaintenance.\nThe job failed.\
    \  JobManager tried to run a non-existent step (3) for job DbaMaintenance.\nThe\
    \ job failed.  JobManager tried to run a non-existent step (3) for job DbaMaintenance.\n\
    ```\n\n我现在可以明确地看到，任务失败是因为它试图运行一个不存在的作业步骤。这显然是作业设计中的一个错误。如果你回想一下代码清单 5-28，我们在那里创建了作业步骤，你可能记得我们为所有作业步骤将`OnSuccessAction`和`OnFailureAction`参数的公共属性设置为了`GoToNextStep`。这包括了最后一个作业步骤，这意味着当最后一个作业步骤完成时，它会尝试执行“下一个作业步骤”，而这个步骤当然不存在。\n\
    \n我们可以通过将最后一个作业步骤更新为`QuitWithSuccess`或`QuitWithFailure`来解决这个问题，具体取决于该步骤的结果。这可以通过使用`Set-DbaAgentJobStep`命令实现，如代码清单\
    \ 5-33 所示。这里，我们将作业名称传递给`–Job`参数，作业步骤名称传递给`–StepName`参数，以及我们想要更新的作业方面。在我们的场景中，将包含`-OnSuccessAction`和`-OnFailAction`参数。\n\
    \n```\n$params = @{\n    SqlInstance     = \"localhost\"\n    Job            \
    \ = \"DbaMaintenance\"\n    StepName        = \"RebuildIndexes\"\n    OnSuccessAction\
    \ = \"QuitWithSuccess\"\n    OnFailAction    = \"QuitWithFailure\"\n}\nSet-DbaAgentJobStep\
    \ @params\n```\n代码清单 5-33\n更新作业步骤\n\n## 总结\n\nDbaTools 提供了一个由社区维护的替代方案，用于替代 Microsoft\
    \ 的`SqlServer` PowerShell 模块。虽然它并非没有局限性，例如，无法为你已创建的角色分配权限，但它提供的功能覆盖范围远大于 Microsoft\
    \ 的产品。该模块中的命令在用法上也提供了更高的一致性，这使得代码编写更快。\n\n`Invoke-DbaQuery`命令等同于`SqlServer`模块中的`Invoke-SqlCmd`命令。这两个命令的功能在很大程度上是一致的。两者之间最大的区别在于参数的处理方式。`Invoke-DbaQuery`允许你通过哈希表传递参数，然后在你的\
    \ T-SQL 脚本中使用它们，就像在 T-SQL 中声明的一样。这有助于使代码更易于维护。\n\n在撰写本文时，DbaTools 提供了超过 700 个命令和函数，我强烈建议你查看\
    \ dbatools.io/commands/ 上的完整命令列表。虽然在本章的有限篇幅内只能触及可用命令的皮毛，但你可以看到，这一系列功能提供了以一种非常快速、简单和灵活的方式管理对象（例如与安全和\
    \ SQL Server Agent 相关的对象）的能力，而无需依赖在`Invoke-DbaQuery`命令中编写 T-SQL 脚本。\n\n## 6. 自动化安装\n\
    \n自动化实例构建不仅可以减少 DBA 的工作量和新数据层应用程序的上市时间，还可以降低运营开销，因为它为企业中所有新的数据层应用程序提供了一个一致的平台。\n\
    \n一个完全自动化的构建不仅仅是运行命令行的`setup.exe`。我们还应该考虑如何优化 Windows 以及如何测试我们的自动化构建是否成功。\n\n\
    有多种方法可用于自动化 SQL Server 实例的构建。例如，我们可以使用 sysprep，或者在云中，我们可以使用已预装 SQL Server 的现成映像。然而，这些选项存在挑战，例如缺乏控制和灵活性。\n\
    \n因此，在本章中，在初步回顾如何使用`setup.exe`从命令行安装 SQL Server 之后，我们将重点介绍构建实例的两种最灵活的方法。具体来说，我们将研究一种脚本化方法，然后是使用\
    \ DSC 安装 SQL Server。这第二种技术建立在你在第 3 章学到的内容之上，我强烈建议你先阅读那一章。\n\n### 安装实例\n\n从命令行安装\
    \ SQL Server 涉及在 PowerShell 终端中运行`setup.exe`。`setup.exe`可以在 SQL Server 安装介质的根目录中找到。从\
    \ PowerShell 终端运行`setup.exe`时，你可以使用开关和参数来传递值，这些值将用于配置实例。\n\n#### 必需参数\n\n虽然许多开关和参数是可选的，但有些必须始终包含。当你安装独立的数据库引擎实例时，表\
    \ 6-1 中列出的参数始终是必需的。\n\n表 6-1\n\n必需参数\n\n| 参数 | 用途 |\n| --- | --- |\n| `/IACCEPTSQLSERVERLICENSETERMS`\
    \ | 确认你接受 SQL Server 许可条款 |\n| `/SUPPRESSPRIVACYSTATEMENTNOTICE` | 防止显示隐私声明 |\n\
    | `/ACTION` | 指定你想要执行的操作，例如安装或升级 |\n| `/FEATURES or /ROLE` | 指定你希望安装的功能 |\n| `/INSTANCENAME`\
    \ | 分配给实例的名称 |\n| `/SQLSYSADMINACCOUNTS` | 将在数据库引擎实例中被授予管理权限的 Windows 安全上下文 |\n\
    | `/AGTSVCACCOUNT` | 用于运行 SQL Agent 服务的帐户 |\n| `/AGTSVCPASSWORD` | 如果不是组管理服务帐户，则此参数用于指定\
    \ SQL Agent 服务帐户的密码 |\n| `/SQLSVCACCOUNT` | 用于运行数据库引擎服务的帐户 |\n| `/SQLSVCPASSWORD`\
    \ | 如果不是 gMSA 或虚拟帐户，则此参数用于指定数据库引擎服务帐户的密码 |\n| `/qs` | 执行无人参与安装。在 Windows Server\
    \ Core 上是必需的，因为不支持安装向导 |\n\n##### IACCEPTSQLSERVERLICENSETERMS 开关\n\n因为`/IACCEPTSQLSERVERLICENSETERMS`是一个简单的开关，表示你接受许可条款，所以它不需要传递任何参数值。"
  raw: 'We can see from these results which job is consistently failing in the same
    place. You will also note, however, that the error message is truncated. We can
    resolve this by piping the results of the Where-Object command into a Select-Object
    command, which expands the Message property. This is demonstrated in Listing [5-32](#395785_2_En_5_Chapter.xhtml#PC38).


    ```

    Get-DbaAgentJobHistory -SqlInstance localhost | Where-Object status -eq "Failed"
    | Select-Object -ExpandProperty Message

    Listing 5-32

    Expanding the Message

    ```


    The results of this command are shown below:


    ```

    The job failed.  JobManager tried to run a non-existent step (3) for job DbaMaintenance.

    The job failed.  JobManager tried to run a non-existent step (3) for job DbaMaintenance.

    The job failed.  JobManager tried to run a non-existent step (3) for job DbaMaintenance.

    The job failed.  JobManager tried to run a non-existent step (3) for job DbaMaintenance.

    ```


    I can now categorically see that the job is failing, consistently, because it
    is trying to run a job step that doesn’t exist. This is clearly a bug in the job.
    If you cast your mind back to Listing [5-28](#395785_2_En_5_Chapter.xhtml#PC32),
    where we created the job steps, you may remember that we set common properties
    for the `OnSuccessAction` and `OnFailureAction` parameters to be `GoToNextStep`
    for all job steps. This included the final job step, meaning that when the final
    job step completes, it is trying to execute the “next job step,” which, of course,
    doesn’t exist.


    We can resolve this issue by updating the final job step to either `QuitWithSuccess`
    or `QuitWithFailure`, depending on the outcome of the step. This can be achieved
    using the `Set-DbaAgentJobStep` command, as shown in Listing [5-33](#395785_2_En_5_Chapter.xhtml#PC40).
    Here, we pass in the name of the job to the `–Job` parameter, the name of the
    job step to the `–StepName` parameter, and the aspects of the job that we want
    to update. In our scenario, we will include the `-OnSuccessAction` and `-OnFailAction`
    parameters.


    ```

    $params = @{

    SqlInstance     = "localhost"

    Job             = "DbaMaintenance"

    StepName        = "RebuildIndexes"

    OnSuccessAction = "QuitWithSuccess"

    OnFailAction    = "QuitWithFailure"

    }

    Set-DbaAgentJobStep @params

    Listing 5-33

    Update a Job Step

    ```


    ## Summary


    DbaTools provides a community-maintained alternative to Microsoft’s `SqlServer`
    PowerShell module. While it is not without its limitations, for example, the inability
    to assign permissions to roles that you have created, it provides far greater
    coverage of functionality than Microsoft’s offering. The commands within the module
    also offer greater consistency in the usage of commands, which makes code production
    faster.


    The `Invoke-DbaQuery` command is the equivalent of Invoke-SqlCmd command in the
    `SqlServer` module. The functionality of both commands is aligned to a high degree.
    The biggest difference between the commands is how parameters are handled. `Invoke-DbaQuery`
    allows you to pass parameters in a hash table and then use them within your T-SQL
    scripts, as if they were declared within T-SQL. This can help make code easier
    to maintain.


    DbaTools provides, at the time of writing, over 700 commands and functions, and
    I strongly recommend that you review a complete list of commands at dbatools.io/commands/.
    While it is only possible to scratch the surface of the available commands in
    the confines of this chapter, you can see that the raft of functionality provides
    the ability to manage artifacts, such as those associated with security and SQL
    Server Agent, in a very fast, easy, and flexible way, without having to rely on
    writing T-SQL scripts, within `Invoke-DbaQuery` commands.


    # 6. Automating Installation


    Automating an instance build not only reduces DBA effort and time to market for
    a new data-tier application, but it also reduces operational overhead, as it provides
    a consistent platform for all new data-tier applications across the enterprise.


    A fully automated is more than just running setup.exe from the command line. We
    should also consider how we will optimize Windows and how we will test that our
    automated build succeeded.


    There are multiple approaches that can be taken to automating the build of a SQL
    Server instance. For example, we could use sysprep, or in cloud, we could use
    an off-the-shelf image, with SQL Server already installed. These options have
    challenges, however, such as lack of control and flexibility.


    Therefore, in this chapter, after initially reviewing how to install SQL Server
    from the command line, using setup.exe, we will focus on the two most flexible
    approaches to building an instance. Specifically, we will examine a scripted approach,
    followed by installing SQL Server using DSC. This second technique builds upon
    what you learned in Chapter [3](#395785_2_En_3_Chapter.xhtml), and I strongly
    recommend that you read that chapter first.


    ## Installing an Instance


    Installing SQL Server from the command line involves running setup.exe from the
    PowerShell terminal. Setup.exe can be found in the root directory of the SQL Server
    installation media. When running setup.exe from the PowerShell terminal, you can
    use switches and parameters to pass in values, which will be used to configure
    the instance.


    ### Required Parameters


    Although many switches and parameters are optional, some must always be included.
    When you are installing a stand-alone instance of the Database Engine, the parameters
    listed in Table [6-1](#395785_2_En_6_Chapter.xhtml#Tab1) are always required.


    Table 6-1


    Required Parameters


    | Parameter | Usage |

    | --- | --- |

    | `/IACCEPTSQLSERVERLICENSETERMS` | Confirms that you accept the SQL Server license
    terms |

    | `/SUPPRESSPRIVACYSTATEMENTNOTICE` | Prevents the privacy statement being displayed
    |

    | `/ACTION` | Specifies the action that you want to perform, such as Install or
    Upgrade |

    | `/FEATURES or /ROLE` | Specifies the features that you wish to install |

    | `/INSTANCENAME` | The name to be assigned to the instance |

    | `/SQLSYSADMINACCOUNTS` | The Windows security context(s) that will be given
    administrative permissions in the instance of the Database Engine |

    | `/AGTSVCACCOUNT` | The account that will be used to run the SQL Agent service
    |

    | `/AGTSVCPASSWORD` | If not a Group Managed Service Account (gMSA), this parameter
    is required to specify the password of the SQL Agent service account |

    | `/SQLSVCACCOUNT` | The account that will be used to run the Database Engine
    service |

    | `/SQLSVCPASSWORD` | If not a gMSA or virtual account, this parameter is required
    to specify the password of the Database Engine service account |

    | `/qs` | Performs an unattended install. This is required on Windows Server Core
    since the installation wizard is not supported |


    #### IACCEPTSQLSERVERLICENSETERMS Switch


    Because `/IACCEPTSQLSERVERLICENSETERMS` is a simple switch that indicates your
    acceptance of the license terms, it does not require any parameter value be passed.'
