    | `8694` | `DQ_NO_FORCING_SUPPORTED` | 计划与使用全文查询或分布式查询冲突 |

    | `8698` | `NO_PLAN` | 优化器无法生成强制计划，或者无法验证该计划 |

    | `8712` | `NO_INDEX` | 计划使用的一个索引不存在 |

    | `8713` | `VIEW_COMPILE_FAILED` | 计划使用的索引视图存在问题 |

