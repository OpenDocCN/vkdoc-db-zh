    ```


    We can now create a certificate. This is demonstrated in Listing [8-4](#395785_2_En_8_Chapter.xhtml#PC6),
    which uses the `New-DbDbaCertificate` command to generate the certificate.


    ```

    $Password = $SecurePassword = ConvertTo-SecureString ''Pa$$w0rd'' -AsPlainText
