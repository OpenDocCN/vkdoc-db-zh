    > 在不同服务器上以不同时间运行作业的能力绝对关键。以备份为例，许多服务器需要在特定时间进行备份，以避免其维护或 `ETL` 窗口期。但即使不考虑机会窗口，在诸如私有云之类的环境中，所有
    `SQL` 实例都运行在共享资源上，由于底层硬件存在资源争用的风险，在同一时间运行所有备份作业也是不可取的。


