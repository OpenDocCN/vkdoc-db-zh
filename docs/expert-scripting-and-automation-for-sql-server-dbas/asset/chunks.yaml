    So, let’s start by creating a script that will run full backups against our User
    databases. The script starts by generating a list of maintenance tasks that it
    needs to run against each server/instance. It creates this list by querying the
    MaintenanceSchedule view and filtering out any maintenance tasks that are already
    in progress and tasks that have been disabled. It also includes a filter to ensure
    that the current date and time is greater than or equal to the time that the task
    is next due to run. The next filter ensures that the current time is within the
    start and end times of when the job can be executed. This is achieved by casting
    the current date/time as time and evaluating this against the `StartTime` and
    `EndTime` columns. The final filter removes all tasks which are not equal to `FullBackup`.


    The results of this query are passed into a foreach loop, which connects to each
    SQL Server instance in turn and generates a list of user databases on that instance.
    The `MaintenanceTasks` table is then updated to indicate that the task is in progress
    for the given server\instance.


    The list of databases is then passed into a child foreach loop, where each database,
    in turn, is backed up. The backup statement is generated by using the name of
    the given database.


    Once all user databases on the instance are backed up, the child foreach loop
    exits, and the `MaintenanceTasks` table is updated again. This time, to reflect
    that the task is no longer in progress for the given server. The `LastExecTime`
    and `LastExecStatus` columns are also updated to avoid the task being run again
    until required. The loop then repeats for every server that is due to have full
    backups, as shown in Listing [10-5](#395785_2_En_10_Chapter.xhtml#PC5).


    ```

    $params = @{

    SqlInstance = "localhost"

    Database    = "Inventory"

    Query       = "

    SELECT

    ServerInstance

    ,Task

    ,LastExecDate

    ,NextExecDate

    ,InProgress

    ,TaskDisabled

    ,StartTime

    ,EndTime

    ,ServerID

    ,InstanceID

    FROM dbo.MaintenanceSchedule ms

    WHERE InProgress = 0

    AND TaskDisabled = 0

    AND GETDATE() >= NextExecDate

    AND CAST(GETDATE() AS TIME) BETWEEN StartTime AND EndTime

    AND Task = ''FullBackup''

    "

    }

    $ServerTasks = Invoke-DbaQuery @params

    foreach ($Server in $ServerTasks) {

    $params = @{

    SqlInstance = $Server.ServerInstance

    Database    = "Master"

    Query       = "

    SELECT name FROM sys.databases WHERE database_id > 4

    "

    }

    $databases = Invoke-DbaQuery @params

    $params = @{

    SqlInstance = "localhost"

    Database    = "Inventory"

    Query       = "

    UPDATE dbo.MaintenanceTasks

    SET InProgress = 1

    WHERE ServerID = ''" + $Server.ServerID + "'' AND InstanceID = ''" + $Server.InstanceID
    + "'' AND Task = ''FullBackup''

    "

    }

    Invoke-DbaQuery @params

    foreach ($database in $databases) {

    $params = @{

    SqlInstance = $Server.ServerInstance

    Database    = "Master"

    Query       = "

    BACKUP DATABASE " + $database.name + " TO DISK = ''C:\Backups\" + $database.name
    + ".bak''

    "

    }

    Invoke-DbaQuery @params

    }

    $params = @{

    SqlInstance = "localhost"

    Database    = "Inventory"

    Query       = "

    UPDATE dbo.MaintenanceTasks

    SET InProgress = 0, LastExecDate = GETDATE(), LastExecStatus = ''Success''

    WHERE ServerID = ''" + $Server.ServerID + "'' AND InstanceID = ''" + $Server.InstanceID
    + "'' AND Task = ''FullBackup'';

    "

    }

    Invoke-DbaQuery @params

    }

    Listing 10-5

    Full Backup Script

    ```


    Tip


    If you are following along, then save this script as c:\scripts\fullbackup.ps1\.
    Later, we will call this script from a SQL Agent job.


    The next script we need is illustrated in Listing [10-6](#395785_2_En_10_Chapter.xhtml#PC6).
    This script will remove old backup files. You will notice that a `$limit` variable
    is created that is populated with the current date/time minus three days. The
    `$path` variable builds the path to the share, using the split function to remove
    the instance name. The `Get-ChildItem` cmdlet is then used to build a list of
    files to delete. This list is then piped into the `Remove-Item` cmdlet.


    For this example, we will assume that we should delete backups that are older
    than three days. This makes the assumption that there is an enterprise backup
    tool offloading the .bak files to tape. If there isn’t, then you will likely want
    to retain the backups for much longer.


    The script uses the same logic as the FullBackup script we created earlier. The
    only difference is that the tasks being scheduled and the script being called
    are `RemoveOldBackups`.


    Tip


    The script assumes that the volume the backup files are stored on is shared. If
    this is not the case, then assuming you have PowerShell Remoting configured, you
    can use the `Invoke-Command` cmdlet to invoke the script on the remote server.'
