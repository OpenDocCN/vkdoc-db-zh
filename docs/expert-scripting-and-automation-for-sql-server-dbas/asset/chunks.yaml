    ```powershell

    $params = @{

    SqlInstance = "localhost"

    Database    = "Inventory"

    Query       = "

    SELECT

    ServerInstance

    ,Task

    ,LastExecDate

    ,NextExecDate

    ,InProgress

    ,TaskDisabled

    ,StartTime

    ,EndTime

    ,ServerID

    ,InstanceID

