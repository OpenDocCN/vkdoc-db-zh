- fmt: '### Create a Proxy


    A SQL Server Agent Proxy defines the security context under which a job step can
    run. Essentially, it provides a mapping of Job Step to Credential. In this example,
    we will create a Proxy called `SQLAgentProxy`, which maps to the `SQLAgentCredential`
    Credential and assign it the rights to run Job steps which are configured as the
    `PowerShell` or `CmdExec` Job step types.


    To achieve this, we will use the `New-DbaAgentProxy` command and will pass in
    a name for the Proxy to the `–Name` parameter, the Credential that it will be
    mapped to, via the `-ProxyCredential` parameter, and finally specify the type
    of Job steps it can run, via the `–SubSystem` parameter, as demonstrated in Listing
    [5-25](#395785_2_En_5_Chapter.xhtml#PC29).


    Tip


    If passing the `–SubSystem` parameter directly in the command, we could simply
    pass a comma-separated list. Because we are using the splatting technique, we
    define the two values as an array of strings, which is then passed to the command.


    This code is only valid on Windows-based machines.


    ```

    $params = @{

    SqlInstance     = "localhost"

    Name            = "SqlAgentProxy"

    ProxyCredential = "SQLAgentCredential"

    SubSystem       = @("PowerShell","CmdExec")

    }

    New-DbaAgentProxy @params

    Listing 5-25

    Create a Proxy

    ```


    A full list of valid SubSystems is as follows:


    *   ActiveScripting

    *   AnalysisCommand

    *   AnalysisQuery

    *   CmdExec

    *   Distribution

    *   LogReader

    *   Merge

    *   PowerShell

    *   QueueReader

    *   Snapshot

    *   Ssis


    Caution


    The `ActiveScripting` SubSystem relates to running ActiveX Scripts. This is deprecated
    within SQL Server and should not be used.


    ### Create a Job


    There are three aspects to creating a SQL Server Agent job with DbaTools. Firstly,
    you need to create the Job itself. You then need to create the Job Steps that
    are run by that Job, before finally attaching a Job schedule, which will define
    when the Job runs.


    In this section, we will create a job called `DbaMaintenance`, which runs `DBCC
    CHECKDB` and an intelligent index rebuild process against each database on our
    instance. Because the jobs have logic built in, they will be PowerShell scripts,
    as opposed to T-SQL scripts. This will be discussed further in Chapters [10](#395785_2_En_10_Chapter.xhtml)
    and [11](#395785_2_En_11_Chapter.xhtml) of this book.


    Creating the Job is achieved with the `New-DbaAgentJob` command. Its basic invocation
    requires a Job name via the `–Job` parameter and a job owner via the `–OwnerLogin`
    parameter. Creating a Job is demonstrated in Listing [5-26](#395785_2_En_5_Chapter.xhtml#PC30).


    ```

    New-DbaAgentJob -SqlInstance localhost -Job DbaMaintenance -OwnerLogin sa

    Listing 5-26

    Creating a SQL Agent Job

    ```


    Job steps can be created using the `New-DbaAgentJobStep` command. Let us first
    look at a simple invocation of this, before moving to a more complex example.


    The script in Listing [5-27](#395785_2_En_5_Chapter.xhtml#PC31) creates the two
    required Job Steps. Here, we pass in the name of the step, the command that should
    be run, the relevant SubSystem, the Proxy name and the name of the Job that will
    run the steps, and the success/failure actions for each step.


    We also pass the `StepID`. This is a sequential number, within a Job, defining
    the order in which the steps should run. Without this, every time you add a step,
    it moves into first position within the Job, giving you a slightly strange situation,
    where the steps are run in the reverse order of how they are defined in your code.


    ```

    New-DbaAgentJobStep -SqlInstance localhost -Job DbaMaintenance -StepName CheckDB
    -ProxyName SQLAgentProxy -Command ''PowerShell "c:\scripts\CheckDB.ps1"'' -Subsystem
    PowerShell -StepId 1 -OnSuccessAction GoToNextStep -OnFailAction GoToNextStep

    New-DbaAgentJobStep -SqlInstance Localhost -Job DbaMaintenance -StepName IndexRebuild
    -ProxyName SQLAgentProxy -Command ''PowerShell "c:\scripts\IndexRebuild.ps1"''
    -Subsystem PowerShell -StepId 2 -OnSuccessAction GoToNextStep -OnFailAction GoToNextStep

    Listing 5-27

    Create Job Steps

    ```


    While this works, it’s rather ugly and leads to a lot of code duplication. This
    is magnified when you consider that this example only uses two Job steps. Imagine
    if there were 20! We can work around this, however, by using a combination of
    splatting and looping in PowerShell, allowing us to define the majority of parameter
    values only once and also only have a single declaration of the command invocation.
    This technique is illustrated in Listing [5-28](#395785_2_En_5_Chapter.xhtml#PC32).
    Here, we initially use the splatting technique to define the common set of parameters.
    We then use a second splat, consisting of an array for each step definition. Finally,
    a `foreach` loop iterates over each step definition, calling `New-DbaAgentJobStep`
    for each step, in turn. The results are functionally equivalent, but this reduces
    code duplication and leads to more maintainable code.


    ```

    $commonParams = @{

    SqlInstance     = "localhost"

    Job             = "DbaMaintenance"

    Subsystem       = "PowerShell"

    ProxyName       = "SQLAgentProxy"

    OnSuccessAction = "GoToNextStep"

    OnFailAction    = "GoToNextStep"

    }

    $steps = @(

    @{ StepName = ''CheckDB'';          Command = ''powershell "C:\scripts\CheckDB.ps1"'';            StepID
    = 1 }

    @{ StepName = ''RebuildIndexes''; Command = ''powershell "C:\scripts\RebuildIndexes.ps1"'';   StepID
    = 2 }

    )

    foreach ($step in $steps) {

    New-DbaAgentJobStep @step @commonParams

    }

    Listing 5-28

    Improve the Code for Job Step Creation

    ```'
