- fmt: 'We will now add a second `Execute SQL Task`, which we will configure to restore
    the database onto the `Development Server` and place it into `Single User` mode.
    The `Execute SQL Task Editor` for this task is illustrated in Figure 11-6. Here,
    you will notice that we have configured the task to run against our `Development
    Server`. We have configured the `SQL source` as a variable and pointed the task
    to our `RestoreSQLStatement` variable.


    ![](images/395785_2_En_11_Chapter/395785_2_En_11_Fig6_HTML.jpg)


    Screenshot of the "Execute SQL Task Editor" window. The interface includes a navigation
    pane on the left with options: General, Parameter Mapping, Result Set, and Expressions.
    The main section displays settings for a task named "Restore Database" with options
    like TimeOut set to 0, CodePage 1252, and TypeConversionMode allowed. The ResultSet
    is set to None. SQL Statement settings include ConnectionType as OLE DB, Connection
    as DevelopmentServer, and SQLSourceType as Variable. Buttons at the bottom include
    Build Query, Parse Query, OK, Cancel, and Help.


    Figure 11-6: Configuring the restore task


    The next `Execute SQL Task` will be used to remove any existing database users
    without a login. It is possible to create logins directly at the database level,
    as opposed to database users, which must map to logins at the Instance level.
    This feature is part of contained database functionality, which simplifies administration
    when using technologies such as `AlwaysOn Availability Groups`. In our scenario,
    however, database users without a login can cause an issue, because instead of
    being orphaned on the instance of the lower environment, unauthorized users could
    connect if they have a database login and know the password. Therefore, we will
    remove all such logins.


    Figure 11-7 illustrates how we will use the `Execute SQL Task Editor` dialog box
    to configure this process. You will note that we have configured the `Connection`
    property to run the query against the `Development Server`; we have configured
    the `SQL source` as direct input; and we have typed the query directly into the
    `SQLStatement` property. We have not used a variable, as, this time, we will explore
    an alternative way of configuring the task to be dynamic.


    ![](images/395785_2_En_11_Chapter/395785_2_En_11_Fig7_HTML.jpg)


    Screenshot of the "Execute SQL Task Editor" window in a software application.
    The window displays various configuration options for running SQL statements.
    Key sections include "General," "Options," "Result Set," and "SQL Statement."
    The "ConnectionType" is set to "OLE DB," and "Connection" is "DevelopmentServer."
    The "SQLSourceType" is highlighted as "Direct input," with a sample SQL statement
    shown. Buttons at the bottom include "Browse," "Build Query," "Parse Query," "OK,"
    "Cancel," and "Help."


    Figure 11-7: Configuring remove database users without a login task


    The expression entered into the `SQLSourceType` property can be found in Listing
    11-4.


    ```sql

    "USE " +  @[$Project::DatabaseName] + "

    DECLARE @SQL NVARCHAR(MAX)

    SET @SQL = (

    SELECT ''DROP USER '' + QUOTENAME(name) + '' ; ''

    FROM sys.database_principals

    WHERE type = ''S''

    AND authentication_type = 0

    AND principal_id > 4

    FOR XML PATH('''')

    ) ;

    EXEC(@SQL)"

    ```


    Listing 11-4: Remove Database Users Without a Login


    We will make this task dynamic by configuring an expression on the `SQLStatement`
    property of the task, as illustrated in Figure 11-8.


    ![](images/395785_2_En_11_Chapter/395785_2_En_11_Fig8_HTML.jpg)


    Screenshot of the "Property Expressions Editor" window. It displays a table with
    columns labeled "Property" and an expression. The property shown is "SqlStatementSource"
    with an expression: `"USE " + @[Project::DatabaseName] + " DECLARE @SQL NVARCHAR(MAX)`.
    Buttons at the bottom include "Delete," "OK," and "Cancel."


    Figure 11-8: Configuring expression on SQLStatement property


    The final `Execute SQL task` will be used to obfuscate the data and place it back
    in `Multi User` mode. We will use the `Execute SQL Task Editor` dialog box to
    configure the connection to be made to the `Development Server` and configure
    the `SQL source` as a variable. We will then point the task to the `ObfuscateDataSQLStatement`
    variable. The dynamic techniques that we have used to create the package mean
    that when we run the package (probably as a manual execution of a `SQL Server
    Agent` job), we can pass in any `Production Server`, `Development Server`, and
    database. The metadata-driven process will obfuscate textual data, integers, and
    money data in any database. If the need arises, you can also easily amend the
    script to obfuscate only certain data, such as a specific schema, within the database.


    All of the required tasks have now been created and configured. To clean up the
    package, join each task in sequence, using success precedence constraints. Because
    there are four `Execute SQL Tasks`, I also strongly recommend renaming them to
    give them intuitive names. This is always a best practice, but even more important,
    when there are so many tasks of the same type, as by default, they will be named
    with a meaningless, sequential number. The final control flow is depicted in Figure
    11-9.


    ![](images/395785_2_En_11_Chapter/395785_2_En_11_Fig9_HTML.jpg)


    Flow chart illustrating a database management process. The sequence includes four
    steps: "Backup Database," "Restore Database," "Remove Database Logins," and "Obfuscate
    Data," connected by arrows indicating the flow direction. The chart is set against
    a dark background, with each step enclosed in a rectangular box.


    Figure 11-9: Completed control flow


    ## Automating Break/Fix Scenarios


    Automating responses to break/fix scenarios is the pinnacle of your automation
    efforts. When implemented well, it can significantly reduce the `TCO (Total Cost
    of Ownership)` of the SQL Server estate.


    If you attempt to design an entire break/fix automation solution up front, you
    are destined to fail. First, the cost and effort will be prohibitive. Second,
    each enterprise is not only unique but also changes over time. Therefore, break/fix
    automation should be implemented as `CSI (continuous service improvement)`.


    The approach that I recommend is to use a simple formula to decide which break/fix
    scenarios you should create automated responses for. The formula I recommend is
    “If issue occurs x times in n weeks and (time to fix X n) > estimated automation
    effort.”


    The values that you will plug into this formula are dependent on your environment.
    An example would be “If issue occurs 5 times in 4 weeks and (time to fix X 20)
    > 4 hours.” The formula calculates if you will recoup your automation effort,
    within a three-month period. If you will recover your effort in three months,
    then it is almost certainly worth the up-front effort to automate your response.


    If your company uses a sophisticated ticketing system, such as `ServiceNow` or
    `ITSM 365`, you will be able to report on problems. A problem is a ticket that
    is repeatedly raised. For example, your ticketing system may be configured so
    that if a ticket is raised for the same issue five times in four weeks, it becomes
    a problem ticket. This allows effective root-cause analysis, but you will instantly
    see the synergy with our formula. Reporting on problem tickets against the DBA
    team’s queue can be a great starting point when looking for candidate break/fix
    scenarios to automate.


    The following sections will discuss how to design and implement an automated response
    to `9002` errors. `9002` errors occur if there is no space to write to the transaction
    log, and the log is unable to grow.'
