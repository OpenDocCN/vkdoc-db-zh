  trans: '### 处理登录名


    可以使用 `Add-SqlLogin` cmdlet 创建新的登录名。其最基本的形式是，您可以简单地请求创建一个具有指定名称的新的 SQL Server 登录名，如清单
    4-14 所示。


    ```powershell

    $params = @{

    ServerInstance  = "localhost"

    LoginName       = "Pete"

    LoginType       = "SqlLogin"

    DefaultDatabase = "WideWorldImporters"

    Enable          = $true

    GrantConnectSql = $true

    }

    Add-SqlLogin @params

    清单 4-14

    创建新登录名

    ```


    提示


    如果您不设置 `Enable = $true`，登录名将被创建但处于禁用状态。如果您不设置 `GrantConnectSql = $true`，则登录名将被创建，但不会被授予连接到数据库引擎的权限。


    这将显示一个密码提示，如图 4-1 所示，您可以在其中为登录名输入所需的密码。


    提示


    如果使用非 Windows 操作系统，提示将显示在控制台中，而不是弹出窗口中。


    如果您正在运行临时命令，这样做没问题，但如果您尝试编写脚本流程，这就不太方便了。因此，您也可以将一个 `PSCredential` 对象传递到 `LoginPsCredential`
    参数中，而不是使用 `LoginName` 参数。这将允许用户名和密码都安全地传递给 SQL Server。清单 4-15 演示了此技术。


    ```powershell

    $UserName = ''Pete''

    $Password = ''Pa$$w0rd''

    # Convert to SecureString

    $SecurePassword = ConvertTo-SecureString $Password -AsPlainText -Force

    #Create The psCredential object

    $LoginCredential = [PSCredential]::new($UserName, $SecurePassword)

    $params = @{

    ServerInstance      = "localhost"

    LoginPsCredential   = $LoginCredential

    LoginType           = "SqlLogin"

    DefaultDatabase     = "WideWorldImporters"

    Enable              = $true

    GrantConnectSql     = $true

    }

    Add-SqlLogin @params

    清单 4-15

    使用 LoginPsCredential 创建登录名

    ```


    ![](img/395785_2_En_4_Fig1_HTML.jpg)


    SQL 登录密码提示的截图。该窗口请求新登录名的密码，显示一个用户名字段，其中选择了 "Pete"。下方是一个密码输入字段。该窗口包含 "确定" 和 "取消"
    按钮。左上角可见一个钥匙图标。


    图 4-1

    密码提示


    就像使用 T-SQL 或 SQL Server Management Studio 创建登录名一样，也可以为登录名强制实施域密码策略。这可以通过 `EnforcePasswordPolicy`、`EnforcePasswordExpiration`
    和 `MustChangePasswordAtNextLogin` 参数来实现。


    这些参数形成一个层级结构。不设置 `EnforcePasswordPolicy` 就无法设置 `EnforcePasswordExpiration`。同样，不设置
    `EnforcePasswordExpiration` 也无法设置 `MustChangePasswordAtNextLogin`。因此，如果您指定了层级结构中较低级别的参数，它就会隐式地意味着设置了其上级的参数。


    例如，清单 4-16 中的脚本只指定了 `MustChangePasswordAtNextLogin`，但由于此参数位于层级结构的底部，`EnforcePasswordExpiration`
    和 `EnforcePasswordPolicy` 也会被设置。


    ```powershell

    $UserName = ''Pete''

    $Password = ''Pa$$w0rd''

    # Convert to SecureString

    $SecurePassword = ConvertTo-SecureString $Password -AsPlainText -Force

    #Create The psCredential object

    $LoginCredential = [PSCredential]::new($UserName, $SecurePassword)

    $params = @{

    ServerInstance                  = "localhost"

    LoginPsCredential               = $LoginCredential

    LoginType                       = "SqlLogin"

    DefaultDatabase                 = "WideWorldImporters"

    Enable                          = $true

    GrantConnectSql                 = $true

    MustChangePasswordAtNextLogin   = $true

    }

    Add-SqlLogin @params

    清单 4-16

    强制实施密码策略

    ```


    `Add-SqlLogin` cmdlet 也可用于为 Windows 用户、Windows 组、非对称密钥和证书创建 SQL 登录名。这通过更改 `LoginType`
    参数的值来实现。例如，清单 4-17 中的脚本将为 AD 用户 `POSHSQL\Pete` 创建一个登录名。


    ```powershell

    $params = @{

    ServerInstance    = "localhost"

    LoginName         = "POSHSQL\Pete"

    LoginType         = "WindowsUser"

    DefaultDatabase   = "WideWorldImporters"

    Enable            = $true

    GrantConnectSql   = $true

    }

    Add-SqlLogin @param

    清单 4-17

    为 Windows 用户创建登录名

    ```


    sqlserver 模块还提供了一个 `Get-SqlLogin` cmdlet，它允许您返回有关用户的信息。例如，清单 4-18 中的脚本返回了我们在前面示例中创建的名为
    Pete 的 SQL 登录名的详细信息。


    ```powershell

    $params = @{

    ServerInstance = "localhost"

    LoginName      = "Pete"

    }

    Get-SqlLogin @params

    清单 4-18

    返回登录名详细信息

    ```


    此命令返回的结果如下所示：


    ```powershell

    Name                                        Login Type    Created

    ----                                        ----------    ----------------

    Pete                                          SqlLogin      10/10/2020 10:33

    ```


    `Get-SqlLogin` 命令可以使用通配符或正则表达式搜索来运行，或者如果您省略 `LoginName` 参数，它将返回实例中存在的所有登录名。这对于审计、清理旧登录名、强制实施命名约定以及检查登录名是否存在非常有帮助。当然，此命令也可以添加到脚本中以帮助构建自动化管理例程。


    在另一个 cmdlet `Remove-SqlLogin` 的帮助下，让我们看看如何使用 `Get-SqlLogin` 命令来清理旧的登录对象。清单 4-19
    中的脚本将返回所有 SQL 登录名（使用 `LoginType` 参数进行筛选，仅包括 SQL 登录名，不包括 Windows 用户或 Windows 组），然后将它们通过管道传递给
    `Remove-Login` cmdlet，该 cmdlet 将把它们从实例中删除。


    ```powershell

    $params = @{

    ServerInstance = "localhost"

    LoginName      = "*Pete*"

    Wildcard       = $true

    LoginType      = "SqlLogin"

    }

    Get-SqlLogin @params | Remove-SqlLogin

    清单 4-19

    使用 Get-SqlLogin 和 Remove-SqlLogin 清理旧的登录对象

    ```


    ### 处理服务器角色


    现在，我们知道了如何创建 SQL 登录名，但通常我们会希望创建一个与该登录名关联的数据库用户，并通过服务器和数据库角色为我们的安全主体分配对 SQL Server
    资源的权限。在这里，sqlserver 模块缺乏此功能，因此我们需要直接与 SMO（SQL Server 管理对象）交互来执行所需的任务。


    清单 4-20 中的脚本演示了如何将我们的登录名 `Pete` 添加到 `dbcreator` 服务器角色中，以便该主体可以创建新的数据库。该脚本首先创建一个映射到我们
    SQL Server 实例的 SMO 对象。然后，我们为 `dbcreator` 服务器角色创建一个对象，最后将我们的登录名添加到该角色中。


    ```powershell

    using namespace Microsoft.SqlServer.Management.Smo

    #Set variables

    $ServerInstance = "localhost"

    $LoginName = "Pete"

    $Role = "dbcreator"

    #Create an SMO instance of our SQL Instance

    $Server = [Server]::new($ServerInstance)

    #Traverse the instance for find the role

    $ServerRole = $Server.Roles[$Role]

    #Add the Login to the server role

    $ServerRole.AddMember($LoginName)

    清单 4-20

    将登录名添加到服务器角色

    ```'
- fmt: "### Working with Database Users\n\nWe should now create a database User inside\
    \ the `WideWorldImporters` database. Again, the `sqlserver` module is limited\
    \ here, so we will need to interact with SMO. The script in Listing 4-21 uses\
    \ a similar technique to the example above, where we added our Login to the `dbcreator`\
    \ server role.\nAfter setting our variable, the script starts by creating an SMO\
    \ object that maps to our SQL Server instance. We then traverse the databases\
    \ within this representation of our instance to create an SMO representation of\
    \ our database. We then create an SMO object that represents our new database\
    \ User, before using the `Create` method on that User object to create the Database\
    \ user.\n\n```powershell\nusing namespace Microsoft.SqlServer.Management.Smo\n\
    #Set Variables\n$ServerInstance = \"localhost\"\n$LoginName = \"Pete\"\n$UserName\
    \ = \"Pete\"\n$Database = \"WideWorldImporters\"\n#Create an SMO instance of our\
    \ SQL Instance\n$Server = [Server]::new($ServerInstance)\n#Create an SMO instance\
    \ of our Database\n$Database = $Server.Databases[$Database]\n#Create an SMO objecty\
    \ to represent our new user and map the appropriate Login\n$DbUser = [Microsoft.SqlServer.Management.Smo.User]::New($Database,\
    \ $UserName)\n$DbUser.Login  = $LoginName\n#Use the Create method to create the\
    \ Database User\n$DbUser.Create()\n```\nListing 4-21\nCreate a Database User\n\
    \nNow that our User is created, we should add it to appropriate database roles\
    \ to assign it permissions. In this instance, we would like to add the Login,\
    \ Pete, to the `db_datareader` role. To do this, we modify the script in the previous\
    \ example, so that this time, instead of creating the database user, it adds the\
    \ user to the database role, using the `AddToRole` method of the User object,\
    \ as demonstrated in Listing 4-22.\n\n```powershell\nusing namespace Microsoft.SqlServer.Management.Smo\n\
    #Set Variables\n$ServerInstance = \"localhost\"\n$UserName = \"Pete\"\n$Database\
    \ = \"WideWorldImporters\"\n$Role = \"db_datareader\"\n#Create an SMO instance\
    \ of our SQL Instance\n$Server = [Server]::new($ServerInstance)\n#Create an SMO\
    \ instance of our Database\n$Database = $Server.Databases[$Database]\n#Create\
    \ an SMO objecty to represent our user\n$DbUser = $Database.Users[$UserName]\n\
    #Use the Create method to create the Database User\n$DbUser.AddToRole($Role)\n\
    ```\nListing 4-22\nAdd a User to a Database Role\n\n### Working with Credentials\n\
    \nA credential is an instance-level object in SQL Server that contains the details\
    \ required to authenticate to resources outside of the SQL Server instance. A\
    \ classic use case for this is working with SQL Server Agent jobs. By default,\
    \ job steps within SQL Server Agent jobs run under the security context of the\
    \ service account that runs the SQL Server Agent service. However, if job steps\
    \ require elevated permissions, then it can help reduce the security footprint\
    \ of the service account to run specific job steps under a different security\
    \ context.\nIn this case, you can create a credential in SQL Server, which maps\
    \ to a different AD account, with the appropriate permissions to perform the relevant\
    \ task. This credential object can then be mapped to a SQL Server Agent proxy,\
    \ which in turn is used to run relevant job steps.\nAnother use case for credentials\
    \ is in hybrid cloud scenarios. For example, if you are performing backups to\
    \ Azure Blob storage, then a credential must be used to store the Azure storage\
    \ account name and access key.\nThe `sqlserver` module provides the `New-SqlCredential`,\
    \ `Get-SqlCredential`, and `Remove-SqlCredential` cmdlets for managing credential\
    \ objects in SQL Server. For example, the script in Listing 4-23 can be used to\
    \ create a credential called `WinUser` which stores the authentication details\
    \ for the Windows User `POSHSQL\\Pete`.\nThe key thing to note about this script\
    \ is that instead of providing the `ServerInstance` parameter to specify the SQL\
    \ Server instance where the credential should be created, we provide the `Path`\
    \ parameter. This parameter specifies the Windows Management Instrumentation (WMI)\
    \ location of the instance, in the form `SQLServer:\\SQL\\[ServerName]\\[InstanceName]`,\
    \ where default is used to specify a `default` instance, or the name of the instance\
    \ is used, for a named instance.\n\n```powershell\n$Password = 'Pa$$w0rd'\n# Convert\
    \ to SecureString\n$SecurePassword = ConvertTo-SecureString $Password -AsPlainText\
    \ -Force\n$params = @{\n    Name     = \"WinUser\"\n    Identity = \"POSHSQL\\\
    Pete\"\n    Secret   = $SecurePassword\n    Path     = \"SQLServer:\\SQL\\localhost\\\
    default\"\n}\nNew-SqlCredential @params\n```\nListing 4-23\nCreate a Credential\n\
    \nTo demonstrate the use of the `Get-SqlCredential` and `Remove-SqlCredential`\
    \ cmdlets, let’s use a similar scenario as we did for Logins. We will use the\
    \ `Get-SqlCredential` cmdlet to return our `WinUser` credential and then pipe\
    \ that into the `Remove-SqlCredential` cmdlet to drop them. This is demonstrated\
    \ in Listing 4-24.\n\n```powershell\n$params = @{\n    Name     = \"WinUser\"\n\
    \    Path     = \"SQLServer:\\SQL\\localhost\\default\"\n}\nGet-SqlCredential\
    \ @params | Remove-SqlCredential\n```\nListing 4-24\nRemove Old Credentials\n\n\
    ### Working with Availability Groups\n\nThe `sqlserver` module provides a number\
    \ of cmdlets for administering AlwaysOn Availability Groups. In this section,\
    \ we will highlight the cmdlets that are available, but a full discussion of Availability\
    \ Groups is beyond the scope of this book.\n**Tip**\nA full discussion of SQL\
    \ Server AlwaysOn Availability Groups is beyond the scope of this book; however,\
    \ full details can be found in the Apress title *SQL Server 2019 AlwaysOn*, which\
    \ can be found here: link.springer.com/book/10.1007/978-1-4842-6479-9.\nA list\
    \ of cmdlets to support Availability Groups can be found by running the command\
    \ in Listing 4-25.\n\n```powershell\nGet-Command -Module sqlserver -Name  '*availability*'\
    \ | Select-Object -ExpandProperty Name\n```\nListing 4-25\nList Availability Group\
    \ Cmdlets\n\nThe results of this command are shown below:\n\n```\nAdd-SqlAvailabilityDatabase\n\
    Add-SqlAvailabilityGroupListenerStaticIp\nGrant-SqlAvailabilityGroupCreateAnyDatabase\n\
    Join-SqlAvailabilityGroup\nNew-SqlAvailabilityGroup\nNew-SqlAvailabilityGroupListener\n\
    New-SqlAvailabilityReplica\nRemove-SqlAvailabilityDatabase\nRemove-SqlAvailabilityGroup\n\
    Remove-SqlAvailabilityReplica\nResume-SqlAvailabilityDatabase\nRevoke-SqlAvailabilityGroupCreateAnyDatabase\n\
    Set-SqlAvailabilityGroup\nSet-SqlAvailabilityGroupListener\nSet-SqlAvailabilityReplica\n\
    Set-SqlAvailabilityReplicaRoleToSecondary\nSuspend-SqlAvailabilityDatabase\nSwitch-SqlAvailabilityGroup\n\
    ```\n\n**Tip**\n`Get-Command` is a useful helper function, irrespective of Availability\
    \ Groups. Changing the value passed to the `–Name` parameter can be used to filter\
    \ the results to any set of related commands.\nEach cmdlet corresponds to a specific\
    \ administrative task that is required to manage Availability Groups. The cmdlets\
    \ beginning with the `New` verb are primarily responsible for the initial configuration\
    \ of an Availability Group, alongside the `Add-SqlAvailabilityGroupListenerStaticIp`\
    \ and `Grant-SqlAvailabilityGroupCreateAnyDatabase` cmdlets.\nThe other cmdlets\
    \ are primarily concerned with post-implementation administration. For example,\
    \ the script in Listing 4-26 will add the `WideWorldImporters` database to an\
    \ existing Availability Group. The first part of the script seeds the database\
    \ on the secondary by taking full and log backups to a share on the primary server\
    \ and restoring them on the secondary. These tasks are performed using the useful\
    \ `Backup-SqlDatabase` and `Restore-SqlDatabase` cmdlets. The second part of the\
    \ script uses the `Add-SqlAvailabilityDatabase` cmdlet to add the database to\
    \ the Availability Group on each Replica.\n**Tip**\nDatabases do not need to be\
    \ joined to the replicas if automatic seeding is used."
  raw: '### Working with Database Users


    We should now create a database User inside the `WideWorldImporters` database.
    Again, the sqlserver module is limited here, so we will need to interact with
    SMO. The script in Listing [4-21](#395785_2_En_4_Chapter.xhtml#PC26) uses a similar
    technique to the example above, where we added our Login to the `dbcreator` server
    role.


    After setting our variable, the script starts by creating an SMO object that maps
    to our SQL Server instance. We then traverse the databases within this representation
    of our instance to create an SMO representation of our database. We then create
    an SMO object that represents our new database User, before using the `Create`
    method on that User object to create the Database user.


    ```

    using namespace Microsoft.SqlServer.Management.Smo

    #Set Variables

    $ServerInstance = "localhost"

    $LoginName = "Pete"

    $UserName = "Pete"

    $Database = "WideWorldImporters"

    #Create an SMO instance of our SQL Instance

    $Server = [Server]::new($ServerInstance)

    #Create an SMO instance of our Database

    $Database = $Server.Databases[$Database]

    #Create an SMO objecty to represent our new user and map the appropriate Login

    $DbUser = [Microsoft.SqlServer.Management.Smo.User]::New($Database, $UserName)

    $DbUser.Login  = $LoginName

    #Use the Create method to create the Database User

    $DbUser.Create()

    Listing 4-21

    Create a Database User

    ```


    Now that our User is created, we should add it to appropriate database roles to
    assign it permissions. In this instance, we would like to add the Login, Pete,
    to the `db_datareader` role. To do this, we modify the script in the previous
    example, so that this time, instead of creating the database user, it adds the
    user to the database role, using the `AddToRole` method of the User object, as
    demonstrated in Listing [4-22](#395785_2_En_4_Chapter.xhtml#PC27).


    ```

    using namespace Microsoft.SqlServer.Management.Smo

    #Set Variables

    $ServerInstance = "localhost"

    $UserName = "Pete"

    $Database = "WideWorldImporters"

    $Role = "db_datareader"

    #Create an SMO instance of our SQL Instance

    $Server = [Server]::new($ServerInstance)

    #Create an SMO instance of our Database

    $Database = $Server.Databases[$Database]

    #Create an SMO objecty to represent our user

    $DbUser = $Database.Users[$UserName]

    #Use the Create method to create the Database User

    $DbUser.AddToRole($Role)

    Listing 4-22

    Add a User to a Database Role

    ```


    ### Working with Credentials


    A credential is an instance-level object in SQL Server that contains the details
    required to authenticate to resources outside of the SQL Server instance. A classic
    use case for this is working with SQL Server Agent jobs. By default, job steps
    within SQL Server Agent jobs run under the security context of the service account
    that runs the SQL Server Agent service. However, if job steps require elevated
    permissions, then it can help reduce the security footprint of the service account
    to run specific job steps under a different security context.


    In this case, you can create a credential in SQL Server, which maps to a different
    AD account, with the appropriate permissions to perform the relevant task. This
    credential object can then be mapped to a SQL Server Agent proxy, which in turn
    is used to run relevant job steps.


    Another use case for credentials is in hybrid cloud scenarios. For example, if
    you are performing backups to Azure Blob storage, then a credential must be used
    to store the Azure storage account name and access key.


    The sqlserver module provides the `New-SqlCredential`, `Get-SqlCredential`, and
    `Remove-SqlCredential` cmdlets for managing credential objects in SQL Server.
    For example, the script in Listing [4-23](#395785_2_En_4_Chapter.xhtml#PC28) can
    be used to create a credential called `WinUser` which stores the authentication
    details for the Windows User `POSHSQL\Pete`.


    The key thing to note about this script is that instead of providing the `ServerInstance`
    parameter to specify the SQL Server instance where the credential should be created,
    we provide the `Path` parameter. This parameter specifies the Windows Management
    Instrumentation (WMI) location of the instance, in the form `SQLServer:\SQL\[ServerName]\[InstanceName]`,
    where default is used to specify a `default` instance, or the name of the instance
    is used, for a named instance.


    ```

    $Password = ''Pa$$w0rd''

    # Convert to SecureString

    $SecurePassword = ConvertTo-SecureString $Password -AsPlainText -Force

    $params = @{

    Name     = "WinUser"

    Identity = "POSHSQL\Pete"

    Secret   = $SecurePassword

    Path     = "SQLServer:\SQL\localhost\default"

    }

    New-SqlCredential @params

    Listing 4-23

    Create a Credential

    ```


    To demonstrate the use of the `Get-SqlCredential` and `Remove-SqlCredential` cmdlets,
    let’s use a similar scenario as we did for Logins. We will use the `Get-SqlCredential`
    cmdlet to return our `WinUser` credential and then pipe that into the `Remove-SqlCredential`
    cmdlet to drop them. This is demonstrated in Listing [4-24](#395785_2_En_4_Chapter.xhtml#PC29).


    ```

    $params = @{

    Name     = "WinUser"

    Path     = "SQLServer:\SQL\localhost\default"

    }

    Get-SqlCredential @params | Remove-SqlCredential

    Listing 4-24

    Remove Old Credentials

    ```


    ## Working with Availability Groups


    The sqlserver module provides a number of cmdlets for administering AlwaysOn Availability
    Groups. In this section, we will highlight the cmdlets that are available, but
    a full discussion of Availability Groups is beyond the scope of this book.


    Tip


    A full discussion of SQL Server AlwaysOn Availability Groups is beyond the scope
    of this book; however, full details can be found in the Apress title *SQL Server
    2019 AlwaysOn*, which can be found here: link.springer.com/book/10.1007/978-1-4842-6479-9.


    A list of cmdlets to support Availability Groups can be found by running the command
    in Listing [4-25](#395785_2_En_4_Chapter.xhtml#PC30).


    ```

    Get-Command -Module sqlserver -Name  ''*availability* | Select-Object -ExpandProperty
    Name

    Listing 4-25

    List Availability Group Cmdlets

    ```


    The results of this command are shown below:


    ```

    Add-SqlAvailabilityDatabase

    Add-SqlAvailabilityGroupListenerStaticIp

    Grant-SqlAvailabilityGroupCreateAnyDatabase

    Join-SqlAvailabilityGroup

    New-SqlAvailabilityGroup

    New-SqlAvailabilityGroupListener

    New-SqlAvailabilityReplica

    Remove-SqlAvailabilityDatabase

    Remove-SqlAvailabilityGroup

    Remove-SqlAvailabilityReplica

    Resume-SqlAvailabilityDatabase

    Revoke-SqlAvailabilityGroupCreateAnyDatabase

    Set-SqlAvailabilityGroup

    Set-SqlAvailabilityGroupListener

    Set-SqlAvailabilityReplica

    Set-SqlAvailabilityReplicaRoleToSecondary

    Suspend-SqlAvailabilityDatabase

    Switch-SqlAvailabilityGroup

    ```


    Tip


    Get-Command is a useful helper function, irrespective of Availability Groups.
    Changing the value passed to the `–Name` parameter can be used to filter the results
    to any set of related commands.


    Each cmdlet corresponds to a specific administrative task that is required to
    manage Availability Groups. The cmdlets beginning with the `New` verb are primarily
    responsible for the initial configuration of an Availability Group, alongside
    the `Add-SqlAvailabilityGroupListenerStaticIp` and `Grant-SqlAvailabilityGroupCreateAnyDatabase`
    cmdlets.


    The other cmdlets are primarily concerned with post-implementation administration.
    For example, the script in Listing [4-26](#395785_2_En_4_Chapter.xhtml#PC32) will
    add the `WideWorldImporters` database to an existing Availability Group. The first
    part of the script seeds the database on the secondary by taking full and log
    backups to a share on the primary server and restoring them on the secondary.
    These tasks are performed using the useful `Backup-SqlDatabase` and `Restore-SqlDatabase`
    cmdlets. The second part of the script uses the `Add-SqlAvailabilityGroup` cmdlet
    to the Availability Group on each Replica.


    Tip


    Databases do not need to be joined to the replicas if automatic seeding is used.'
  trans: "\n### 处理数据库用户\n\n现在我们应该在 `WideWorldImporters` 数据库内部创建一个数据库用户。同样，`sqlserver`\
    \ 模块在这里功能有限，因此我们需要与 SMO 进行交互。清单 4-21 中的脚本使用了与上面示例类似的技术，当时我们将我们的登录名添加到了 `dbcreator`\
    \ 服务器角色中。\n设置变量后，脚本首先创建一个映射到我们 SQL Server 实例的 SMO 对象。然后，我们遍历此实例表示中的数据库，以创建我们数据库的\
    \ SMO 表示。接着，我们创建一个表示新数据库用户的 SMO 对象，之后使用该用户对象上的 `Create` 方法来创建数据库用户。\n\n```powershell\n\
    using namespace Microsoft.SqlServer.Management.Smo\n#Set Variables\n$ServerInstance\
    \ = \"localhost\"\n$LoginName = \"Pete\"\n$UserName = \"Pete\"\n$Database = \"\
    WideWorldImporters\"\n#Create an SMO instance of our SQL Instance\n$Server = [Server]::new($ServerInstance)\n\
    #Create an SMO instance of our Database\n$Database = $Server.Databases[$Database]\n\
    #Create an SMO objecty to represent our new user and map the appropriate Login\n\
    $DbUser = [Microsoft.SqlServer.Management.Smo.User]::New($Database, $UserName)\n\
    $DbUser.Login  = $LoginName\n#Use the Create method to create the Database User\n\
    $DbUser.Create()\n```\n清单 4-21\n创建数据库用户\n\n现在用户已创建，我们应该将其添加到适当的数据库角色以分配权限。在此例中，我们希望将登录名\
    \ Pete 添加到 `db_datareader` 角色。为此，我们修改前面示例中的脚本，这次不再创建数据库用户，而是使用用户对象的 `AddToRole`\
    \ 方法将用户添加到数据库角色，如清单 4-22 所示。\n\n```powershell\nusing namespace Microsoft.SqlServer.Management.Smo\n\
    #Set Variables\n$ServerInstance = \"localhost\"\n$UserName = \"Pete\"\n$Database\
    \ = \"WideWorldImporters\"\n$Role = \"db_datareader\"\n#Create an SMO instance\
    \ of our SQL Instance\n$Server = [Server]::new($ServerInstance)\n#Create an SMO\
    \ instance of our Database\n$Database = $Server.Databases[$Database]\n#Create\
    \ an SMO objecty to represent our user\n$DbUser = $Database.Users[$UserName]\n\
    #Use the Create method to create the Database User\n$DbUser.AddToRole($Role)\n\
    ```\n清单 4-22\n将用户添加到数据库角色\n\n### 处理凭据\n\n凭据是 SQL Server 中的一个实例级对象，包含向 SQL Server\
    \ 实例外部资源进行身份验证所需的详细信息。一个典型用例是与 SQL Server Agent 作业配合使用。默认情况下，SQL Server Agent\
    \ 作业中的作业步骤在运行 SQL Server Agent 服务的服务帐户的安全上下文下运行。但是，如果作业步骤需要提升的权限，那么为了在不同安全上下文下运行特定的作业步骤，可以帮助减少服务帐户的安全足迹。\n\
    在这种情况下，您可以在 SQL Server 中创建一个凭据，该凭据映射到具有执行相关任务所需权限的不同 AD 帐户。然后，此凭据对象可以映射到 SQL Server\
    \ Agent 代理，该代理又用于运行相关的作业步骤。\n凭据的另一个用例是在混合云场景中。例如，如果您正在执行备份到 Azure Blob 存储，则必须使用凭据来存储\
    \ Azure 存储帐户名称和访问密钥。\n`sqlserver` 模块提供了 `New-SqlCredential`、`Get-SqlCredential`\
    \ 和 `Remove-SqlCredential` cmdlet 来管理 SQL Server 中的凭据对象。例如，清单 4-23 中的脚本可用于创建一个名为\
    \ `WinUser` 的凭据，该凭据存储 Windows 用户 `POSHSQL\\Pete` 的身份验证详细信息。\n关于此脚本需要注意的关键点是，我们没有提供\
    \ `ServerInstance` 参数来指定应在其中创建凭据的 SQL Server 实例，而是提供了 `Path` 参数。此参数指定实例的 Windows\
    \ Management Instrumentation (WMI) 位置，形式为 `SQLServer:\\SQL\\[ServerName]\\[InstanceName]`，其中\
    \ `default` 用于指定默认实例，或者使用命名实例的名称。\n\n```powershell\n$Password = 'Pa$$w0rd'\n#\
    \ Convert to SecureString\n$SecurePassword = ConvertTo-SecureString $Password\
    \ -AsPlainText -Force\n$params = @{\n    Name     = \"WinUser\"\n    Identity\
    \ = \"POSHSQL\\Pete\"\n    Secret   = $SecurePassword\n    Path     = \"SQLServer:\\\
    SQL\\localhost\\default\"\n}\nNew-SqlCredential @params\n```\n清单 4-23\n创建凭据\n\n\
    为了演示 `Get-SqlCredential` 和 `Remove-SqlCredential` cmdlet 的用法，让我们使用与处理登录名类似的场景。我们将使用\
    \ `Get-SqlCredential` cmdlet 来返回我们的 `WinUser` 凭据，然后将其通过管道传递给 `Remove-SqlCredential`\
    \ cmdlet 以删除它们。如清单 4-24 所示。\n\n```powershell\n$params = @{\n    Name     = \"\
    WinUser\"\n    Path     = \"SQLServer:\\SQL\\localhost\\default\"\n}\nGet-SqlCredential\
    \ @params | Remove-SqlCredential\n```\n清单 4-24\n删除旧凭据\n\n### 处理可用性组\n\n`sqlserver`\
    \ 模块提供了多个用于管理 AlwaysOn 可用性组的 cmdlet。在本节中，我们将重点介绍可用的 cmdlet，但全面讨论可用性组超出了本书的范围。\n\
    **提示**\n全面讨论 SQL Server AlwaysOn 可用性组超出了本书的范围；但是，完整细节可以在 Apress 出版物 *SQL Server\
    \ 2019 AlwaysOn* 中找到，链接如下：link.springer.com/book/10.1007/978-1-4842-6479-9。\n\
    支持可用性组的 cmdlet 列表可以通过运行清单 4-25 中的命令找到。\n\n```powershell\nGet-Command -Module sqlserver\
    \ -Name  '*availability*' | Select-Object -ExpandProperty Name\n```\n清单 4-25\n\
    列出可用性组 Cmdlet\n\n此命令的结果如下所示：\n\n```\nAdd-SqlAvailabilityDatabase\nAdd-SqlAvailabilityGroupListenerStaticIp\n\
    Grant-SqlAvailabilityGroupCreateAnyDatabase\nJoin-SqlAvailabilityGroup\nNew-SqlAvailabilityGroup\n\
    New-SqlAvailabilityGroupListener\nNew-SqlAvailabilityReplica\nRemove-SqlAvailabilityDatabase\n\
    Remove-SqlAvailabilityGroup\nRemove-SqlAvailabilityReplica\nResume-SqlAvailabilityDatabase\n\
    Revoke-SqlAvailabilityGroupCreateAnyDatabase\nSet-SqlAvailabilityGroup\nSet-SqlAvailabilityGroupListener\n\
    Set-SqlAvailabilityReplica\nSet-SqlAvailabilityReplicaRoleToSecondary\nSuspend-SqlAvailabilityDatabase\n\
    Switch-SqlAvailabilityGroup\n```\n\n**提示**\n`Get-Command` 是一个非常有用的辅助函数，与可用性组无关。更改传递给\
    \ `–Name` 参数的值可用于将结果筛选到任何一组相关命令。\n每个 cmdlet 对应管理可用性组所需的特定管理任务。以 `New` 动词开头的 cmdlet\
    \ 主要负责可用性组的初始配置，同时还有 `Add-SqlAvailabilityGroupListenerStaticIp` 和 `Grant-SqlAvailabilityGroupCreateAnyDatabase`\
    \ cmdlet。\n其他 cmdlet 主要关注实施后的管理。例如，清单 4-26 中的脚本会将 `WideWorldImporters` 数据库添加到现有的可用性组。脚本的第一部分通过在主服务器上执行完整备份和日志备份到共享位置，然后在辅助副本上还原它们，从而在辅助副本上播种数据库。这些任务使用非常有用的\
    \ `Backup-SqlDatabase` 和 `Restore-SqlDatabase` cmdlet 执行。脚本的第二部分使用 `Add-SqlAvailabilityDatabase`\
    \ cmdlet 将数据库添加到每个副本上的可用性组。\n**提示**\n如果使用了自动播种，则数据库无需加入副本。\n"
