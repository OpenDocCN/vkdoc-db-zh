    ### 创建 SSIS 包


    我们现在将使用 SQL Server Data Tools (SSDT) 来创建一个 SQL Server Integration Services 项目，我们将其命名为
    `EnvironmentRefresh`。我们将使用相同的名称来命名在项目中自动创建的包。


    #### 创建项目参数


    我们的第一个任务将是创建三个项目参数，这些参数将用于接受 `生产服务器\实例` 的名称、`开发服务器\实例` 的名称以及要刷新的数据库名称。如图 11-2
    所示。


    ![图 11-2：创建项目参数。一个显示服务器信息的表格，列标签为“名称”、“数据类型”、“值”、“敏感”、“必需”和“描述”。各行分别列出了“ProductionServer”、“DevelopmentServer”和“DatabaseName”，数据类型均为“字符串”。“敏感”和“必需”列对于每个条目都标记为“False”。](img/395785_2_En_11_Fig2_HTML.jpg)


    #### 配置连接管理器


    下一步将是创建两个 `OLEDB 连接管理器`，方法是在 `连接管理器` 窗口中右键单击并使用 `新建 OLEDB 连接` 对话框。我们应该将一个 `连接管理器`
    命名为 `ProductionServer`，另一个命名为 `DevelopmentServer`。


    一旦 `连接管理器` 创建完成，我们就可以使用 `表达式生成器` 来动态配置每个 `连接管理器` 的 `ServerName` 属性，依据是我们创建的 `ProductionServer`
    和 `DevelopmentServer` 项目参数。图 11-3 展示了使用 `表达式生成器` 配置 `ProductionServer` 连接管理器的
    `ServerName` 属性。


    ![图 11-3：表达式生成器。表达式生成器界面截图，显示一个包含变量和参数以及函数部分的窗口。左侧面板列出系统变量，如 `$Project::DatabaseName`、`$Project::DevelopmentServer`
    和 `$Project::ProductionServer`。右侧面板包括数学函数、字符串函数和日期/时间函数等类别。表达式字段包含 `@[$Project::ProductionServer]`。底部有“计算表达式”、“确定”和“取消”按钮。](images/395785_2_En_11_Chapter/395785_2_En_11_Fig3_HTML.jpg)


    #### 创建包变量


    我们现在必须创建三个包变量，它们将保存用于备份数据库、恢复数据库和混淆数据库的 SQL 语句。我们将在变量中输入适当的表达式来构建 SQL 语句，如图 11-4
    所示。将变量的 `EvaluateAsExpression` 属性设置为 `true` 非常重要（尽管在较新版本中，如果粘贴表达式，这会自动发生）。当变量在作用域内时，可以在
    `属性` 窗口中配置此设置。


