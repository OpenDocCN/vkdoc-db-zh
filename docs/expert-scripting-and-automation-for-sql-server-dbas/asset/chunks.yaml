- fmt: '### Product Update


    The Product Update functionality replaces the deprecated slipstream installation
    functionality of SQL Server and provides you with the ability to install the latest
    `CU` (cumulative update) or `GDR` (General Distribution Release – a hotfix for
    security issues) at the same time you are installing the SQL Server base binaries.
    This functionality can save DBAs the time and effort associated with installing
    the latest update immediately after installing a SQL Server instance and can also
    help provide consistent patching levels across new builds.


    Tip: From SQL Server 2017 onward, Service Packs are no longer released. All updates
    are `CU`s or `GDR`s.


    In order to use this functionality, you must use two parameters during the command-line
    install. The first of these is the `/UPDATEENABLED` parameter. You should specify
    this parameter with a value of `1` or `True`. The second is the `/UPDATESOURCE`
    parameter. This parameter will tell setup where to look for the product update.
    If you pass a value of `MU` into this parameter, then setup will check Microsoft
    Update, or a WSUS service, or alternatively, you can supply a relative path to
    a folder or the `UNC` (Uniform Naming Convention) of a network share.


    In the following example, we will examine how to use this functionality to install
    SQL Server 2022, with `CU1` included, which will be located in a network share.
    When you download a `GDR` or `CU`, they will arrive wrapped in a self-extracting
    executable. This is extremely useful, because even if WSUS is not in use in your
    environment, once you have signed off on a new patching level, you can simply
    replace the `CU` within your network share; when you do, all new builds can receive
    the latest update, without you needing to change the PowerShell script that you
    use for building new instances.


    The PowerShell command in Listing 6-4 will install an instance of SQL Server,
    named `SCRIPTING2`, and install `CU1` at the same time, which is located on a
    file server.


    Note: The account that you are using to run the installation will require permissions
    to the file share.


    ```powershell

    .\SETUP.EXE /IACCEPTSQLSERVERLICENSETERMS /ACTION="Install" /FEATURES=SQLEngine,Replication
    /INSTANCENAME="SCRIPTING2" /SQLSVCACCOUNT="MyDomain\SQLServiceAccount1" /SQLSVCPASSWORD="Pa$$w0rd"
    /AGTSVCACCOUNT="MyDomain\SQLServiceAccount1" /AGTSVCPASSWORD="Pa$$w0rd" /SQLSYSADMINACCOUNTS="MyDomain\SQLDBA"
    /UPDATEENABLED=1 /UPDATESOURCE="\\192.168.183.1\SQL2022_CU1\" /qs

    ```

    Listing 6-4: Installing `CU` During Setup


    The code in Listing 6-5 demonstrates how you can interrogate the difference between
    the two instances. The code uses `Invoke-sqlcmd` to connect to the `SCRIPTING2`
    instance and return the system variable that contains the full version details
    of the instance, including the build number. The name of the instance is also
    included to help us easily identify the results.


    ```powershell

    $parameters = @{

    ServerInstance = ''localhost\SCRIPTING2''

    TrustServerCertificate = $true

    Query               = "

    SELECT

    @@SERVERNAME

    , @@VERSION

    "

    }

    Invoke-sqlcmd @parameters | Format-List

    ```

    Listing 6-5: Determining Build Version of Each Instance


    ### Using a Config File


    The sample in Listing 6-6 is the content of a configuration file, which has been
    populated with all of the required parameters that are needed to install an instance
    named `EXPERTSCRIPTING3`. It also contains the optional parameters to enable named
    pipes and `TCP/IP`, enables `FILESTREAM` at the access level where it can only
    be accessed via `T-SQL`, sets the `SQL Agent` service to start automatically,
    and configures the collation to be `Latin1_General_CI_AS`. In this `.ini` file,
    comments are defined with a semicolon at the beginning of the line.


    ```ini

    ; SQL Server 2022 Configuration File

    [OPTIONS]

    ; Accept the SQL Server License Agreement

    IACCEPTSQLSERVERLICENSETERMS

    ; Specifies a Setup work flow, like INSTALL, UNINSTALL, or UPGRADE.

    ; This is a required parameter.

    ACTION="Install"

    ; Setup will display progress only, without any user interaction.

    QUIETSIMPLE="True"

    ; Specifies features to install, uninstall, or upgrade.

    FEATURES=SQLENGINE,REPLICATION

    ; Specify a default or named instance. MSSQLSERVER is the default instance for

    ; non-Express editions and SQLExpress is for Express editions. This parameter
    is

    ; required when installing the SQL Server Database Engine (SQL), Analysis

    ; Services (AS)

    INSTANCENAME="EXPERTSCRIPTING3"

    ; Agent account name

    AGTSVCACCOUNT="MyDomain\SQLServiceAccount1"

    ; Agent account password

    AGTSVCPASSWORD="Pa$$w0rd"

    ; Auto-start service after installation.

    AGTSVCSTARTUPTYPE="Automatic"

    ; Level to enable FILESTREAM feature at (0, 1, 2 or 3).

    FILESTREAMLEVEL="1"

    ; Specifies a Windows collation or an SQL collation to use for the Database

    ; Engine.

    SQLCOLLATION="Latin1_General_CI_AS"

    ; Account for SQL Server service: Domain\User or system account.

    SQLSVCACCOUNT="MyDomain\SQLServiceAccount1"

    ; Password for the SQL Server service account.

    SQLSVCPASSWORD="Pa$$w0rd"

    ; Windows account(s) to provision as SQL Server system administrators.

    SQLSYSADMINACCOUNTS="MyDomain\SQLDBA"

    ; Specify 0 to disable or 1 to enable the TCP/IP protocol.

    TCPENABLED="1"

    ; Specify 0 to disable or 1 to enable the Named Pipes protocol.

    NPENABLED="1"

    ```

    Listing 6-6: Configuration File for `SCRIPTING3`


    Assuming that this configuration file had been saved as `c:\SQL2022\configuration1.ini`,
    then the code in Listing 6-7 could be used to run `setup.exe` from PowerShell.


    ```powershell

    .\setup.exe /CONFIGURATIONFILE="c:\SQL2022\Configuration1.ini"

    ```

    Listing 6-7: Installing SQL Server Using a Configuration File


    Although this is a perfectly valid use of a configuration file, you can actually
    be a little bit more sophisticated and use this approach to create a reusable
    script, which can be run on any server, to help you introduce a consistent build
    process. This is particularly useful if your Windows operational teams have not
    adopted the use of `sysprep` or use other methods to build servers.


    In Listing 6-8, you will see another configuration file. This time, however, it
    only includes the static parameters that you expect to be consistent across your
    estate. Parameters that will vary for each installation, such as instance name
    and service account details, have been omitted.'
