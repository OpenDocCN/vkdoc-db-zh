    Our SQL Server Agent job should be scheduled to run every minute. The job will
    have a job step for every common maintenance task, each of which will call a PowerShell
    script. The PowerShell script will use the data surfaced in the MaintenanceSchedule
    view to determine which instances the task should run against and then execute
    the task against each instance in turn.


    Therefore, as we will have a job step per maintenance task, we need to define
    the list of maintenance tasks that we want to run against our environment. In
    our example, we will run the following maintenance tasks:


    *   Full backup of all databases


    *   Remove old backup files


    *   Update statistics


    Tip


    Of course, the list of maintenance tasks that you want to create will depend on
    the requirements of your own organization and enterprise. For example, you will
    almost certainly want a dynamic index rebuild capability, and the script to achieve
    this can be found in Chapter [7](#395785_2_En_7_Chapter.xhtml). The possibilities
    are endless, and I encourage you to think broadly. For example, you could consider
    including transaction log backups for databases in full recovery model, columnstore
    index maintenance, or even snapshot maintenance.


    ## Implementing Centralized Maintenance


    Now that we have put some thought into the design of our centralized maintenance
    solution, we will now look at how to implement it. In the following sections,
    we will discuss how to create the tables and view, how to create the PowerShell
    scripts, and finally how to create the SQL Server Agent job.


    ### Create the Tables and View


    The first table that we will create is the `MaintenanceWindows` table. This table
    is relatively straightforward as it does not contain any computed columns. We
    will define the artificial key for the table, and we will define two foreign keys
    against the server and instance tables, with a unique constraint across these
    two columns, plus DayOfWeekNumber to avoid the same `server\instance` inadvertently
    being added twice for the same day. The script in Listing [10-1](#395785_2_En_10_Chapter.xhtml#PC1)
    demonstrates how to create this table.


    ```

    Set-DbatoolsInsecureConnection -SessionOnly

    $params = @{

    SqlInstance = "localhost"

    Database    = "Inventory"

    Query       = "

    CREATE TABLE dbo.MaintenanceWindows (

    MaintenanceWindowID  INT    NOT NULL    PRIMARY KEY CLUSTERED,

    ServerID             INT    NOT NULL    FOREIGN                                       KEY
    REFERENCES Server(ServerID),

    InstanceID           INT    NOT NULL    FOREIGN                                        KEY
    REFERENCES Instance(InstanceID),

    DayOfWeekNumber      INT    NOT NULL,

    StartTime            TIME   NOT NULL,

    EndTime              TIME   NOT NULL

    ) ;

    CREATE UNIQUE NONCLUSTERED INDEX ServerID_InstanceID_Day

    ON dbo.MaintenanceWindows(ServerID, InstanceID, DayOfWeekNumber) ;

    "

    }

    Invoke-DbaQuery @params

    Listing 10-1

    Create the MaintenanceWindows Table

    ```


    Next, we will use the script in Listing [10-2](#395785_2_En_10_Chapter.xhtml#PC2)
    to create the `MaintenanceTasks` table. This table will once again have a unique
    constraint, created across the `ServerID`, `InstanceID`, and `Task` columns. Also,
    note the definition of the `ScheduleMinutes` column. This is a computed column,
    which changes the granularity of all schedule types into minutes.


    ```

    $params = @{

    SqlInstance = "localhost"

    Database    = "Inventory"

    Query       = "

    CREATE TABLE dbo.MaintenanceTasks (

    MaintenanceTaskID INT            NOT NULL    PRIMARY KEY CLUSTERED,

    ServerID          INT            NOT NULL    FOREIGN                                           KEY
    REFERENCES Server(ServerID),

    InstanceID        INT            NOT NULL    FOREIGN                                       KEY
    REFERENCES Instance(InstanceID),

    Task              NVARCHAR(32)   NOT NULL,

    LastExecDate      DATETIME       NULL,

    Schedule          NVARCHAR(8)    NOT NULL,

    ScheduleMinutes   AS (CASE WHEN [Schedule]=''Daily'' THEN (1440) WHEN [Schedule]=''Weekly''
    THEN (10080) ELSE [Schedule] END) PERSISTED,

    InProgress        BIT            NOT NULL,

    LastExecStatus    NCHAR(7)       NOT NULL,

    TaskDisabled      BIT            NOT NULL

    ) ;

    CREATE UNIQUE NONCLUSTERED INDEX ServerID_InstanceID

    ON dbo.MaintenanceTasks(ServerID, InstanceID, Task) ;

    "

    }

    Invoke-DbaQuery @params

    Listing 10-2

    Create the MaintenanceTasks Table

    ```


    Finally, we will create the `MaintenanceSchedules` view (Listing [10-3](#395785_2_En_10_Chapter.xhtml#PC3)),
    which will be based on the underlying tables, and calculate when each maintenance
    task should run against each server\instance. Pay particular attention to the
    `NextExecDate` column, which is calculated to provide this functionality. Also,
    pay particular attention to the `StartTime` and `EndTime` columns. These columns
    are derived from the `MaintenanceWindows` table, with the join to this table being
    based on the day number of the day on which the query is executed. This is achieved
    by evaluating the `DayOfWeekNumber` column against the WEEKDAY daypart.


    ```

    $params = @{

    SqlInstance = "localhost"

    Database    = "Inventory"

    Query       =

    "

    CREATE VIEW dbo.MaintenanceSchedule

    AS

    SELECT

    S.ServerName + ''\'' + I.InstanceName AS ServerInstance

    , MT.Task

    , MT.LastExecDate

    , CASE

    WHEN LastExecDate IS NULL

    THEN GETDATE()

    ELSE DATEADD(MINUTE,ScheduleMinutes,LastExecDate)

    END AS NextExecDate

    , MT.InProgress

    , MT.TaskDisabled

    , MW.StartTime

    , MW.EndTime

    , S.ServerID

    , I.InstanceID

    FROM dbo.MaintenanceTasks MT

    INNER JOIN dbo.Server S

    ON S.ServerID = MT.ServerID

    INNER JOIN dbo.Instance I

    ON I.InstanceID = MT.InstanceID

    INNER JOIN dbo.MaintenanceWindows MW

    ON MW.ServerID = s.ServerID

    AND MW.InstanceID = I.InstanceID

    AND (SELECT DATEPART(dw,GETDATE())) = MW.DayOfWeekNumber

    "

    }

    Invoke-DbaQuery @params

    Listing 10-3

    Create the MaintenanceSchedules View

