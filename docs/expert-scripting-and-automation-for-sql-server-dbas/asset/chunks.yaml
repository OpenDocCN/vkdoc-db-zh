    \        ) ;\n        GO\n\n        --Create the DRServer table\n        CREATE\
    \ TABLE [dbo].[DRServer] (\n            [DRServerID] INT NOT NULL IDENTITY ,\n\
    \            [DRServerName] NVARCHAR(128) NOT NULL\n            [ServerID] INT\
    \ NOT NULL,\n            CONSTRAINT [FK_DRServer_ToServer]\n                FOREIGN\
    \ KEY ([ServerID]) REFERENCES [Server]([ServerID]),\n            PRIMARY KEY ([DRServerID],\
    \ [ServerID])\n        ) ;\n        GO\n\n        --Create the DRInstance table\n\
    \        CREATE TABLE [dbo].[DRInstance] (\n            [DRInstanceID] INT NOT\
    \ NULL IDENTITY PRIMARY KEY,\n            [DRInstanceName] NVARCHAR(128) NOT NULL\
    \ UNIQUE,\n            [DRServerID] INT NOT NULL,\n            [ServerID] INT\
    \ NOT NULL,\n            [DRTechnology] NVARCHAR(128) NOT NULL,\n            [TargetRPO]\
    \ TINYINT NOT NULL,\n            [TargetPTO] TINYINT NOT NULL,\n            CONSTRAINT\
    \ [FK_DRInstance_ToDRServer]\n                FOREIGN KEY ([DRServerID], [ServerID])\
    \ REFERENCES [DRServer]([DRServerID],[ServerID])\n        ) ;\n        GO\n\n\
    \        --Create the Instance table\n        CREATE TABLE [dbo].[Instance] (\n\
    \            [InstanceID] INT NOT NULL IDENTITY  PRIMARY KEY,\n            [InstanceName]\
    \ NVARCHAR(128) NOT NULL UNIQUE,\n            [ServerID] INT NOT NULL,\n     \
    \       [Port] NVARCHAR(8) NOT NULL,\n            [IPAddress] NVARCHAR(15) NOT\
    \ NULL,\n            [SQLServiceAccountID] INT NOT NULL,\n            [AuthenticationMode]\
    \ BIT NOT NULL,\n            [saAccountName] NVARCHAR(128) NULL,\n           \
    \ [saAccountPassword] VARBINARY(256) NULL,\n            [InstanceClassification]\
    \ TINYINT NOT NULL,\n            [InstanceCores] TINYINT NOT NULL,\n         \
    \   [InstanceRAM] BIGINT NOT NULL,\n            [SQLServerAgentAccountID] INT\
    \ NOT NULL,\n            CONSTRAINT [FK_Instance_ToServer]\n                FOREIGN\
    \ KEY ([ServerID]) REFERENCES [Server]([ServerID]),\n            CONSTRAINT [FK_Instance_SQL_ToServiceAccount]\n\
    \                FOREIGN KEY ([SQLServiceAccountID]) REFERENCES [ServiceAccount]([ServiceAccountID]),\n\
    \            CONSTRAINT [FK_Instance_Agent_ToServiceAccount]\n               \
    \ FOREIGN KEY ([SQLServerAgentAccountID]) REFERENCES [ServiceAccount]([ServiceAccountID])\n\
    \        ) ;\n        GO\n    \"\n}\nInvoke-DbaQuery @params\nListing 8-7\nCreate\
    \ the Schema\n```\n\n## 总结\nA well-designed inventory database can assist DBAs\
    \ in their automation effort by providing an automatically maintained, central\
    \ repository of information that can in turn drive automated maintenance routines.\n\
    \nWhen designing the inventory database, you will have to consider both platform\
    \ requirements and also the logical and physical design of the database tables.\
    \ When designing the platform requirements of the database, you should consider\
    \ HA/DR strategies and also placement of the inventory database to avoid data\
    \ center isolation issues. Ideally, you will have geographical dispersion of the\
    \ inventory database, as it is critical to offering a “low-ops” solution.\n\n\
    When performing the logical design of the database, you should model the data\
    \ using normalization, which is a process invented in 1970 for the elimination\
    \ of data duplication. You can then test your model by using an entity relationship\
    \ diagram to ensure that all entities are joined with one-to-many relationships.\n\
    \nThe physical design of the database will involve designing the physical tables\
    \ that will store the data. This involves ensuring that there are no delimited\
    \ identifiers, choosing appropriate data types, and defining any artificial keys\
    \ that may be required.\n\nYou can create the database and required artifacts,\
    \ such as encryption keys and certificates, as well as the database and tables\
    \ using DbaTools. This keeps all of your code in PowerShell. There are some artifacts,\
    \ such as symmetric keys and tables, however, which it may be better to create\
    \ using the `Invoke-DbaQuery` command, due to limitations in the functionality-specific\
    \ commands."
