  trans: '

    ## 从 XML 文档中提取值


    在编写脚本或进行性能调优时，DBA 经常需要从原生 XML 中提取值。为了演示这一点，我们将使用查询存储。查询存储捕获查询计划及其统计信息的历史记录，因此
    DBA 可以轻松比较不同计划之间的性能差异。除了图形化仪表板风格的工具外，查询存储还通过一系列目录视图公开计划及其元数据。


    **提示**

    关于查询存储的完整讨论，我强烈推荐 Apress 出版的 `Pro SQL Server 2022 Administration` 一书，可从 [`https://link.springer.com/book/10.1007/978-1-4842-8864-1`](https://link.springer.com/book/10.1007/978-1-4842-8864-1)
    购买。


    让我们假设我们想要检查使用扫描操作的最昂贵的查询计划。这些信息可以通过将 `sys.query_store_runtime_statistics` 目录视图与
    `sys.query_store_plan` 目录视图进行联接来检索。然而，为了检索我们需要的结果，我们将不得不查询 XML 执行计划。这意味着我们将不得不引入
    XQuery 的概念。


    XQuery 是一种用于查询 XML 的语言，就像 SQL 是一种用于查询关系数据的语言一样。该语言建立在 XPath 之上，由用于寻址文档特定区域的 XPath
    表达式和 FLOWR（发音同 "flower"）语句组成。FLOWR 是 "For, Let, Where, Order by, and Return" 的缩写。


    For 语句允许你遍历一个节点序列。Let 语句将一个序列绑定到一个变量。Where 语句根据布尔表达式过滤节点。Order by 语句在返回节点之前对其进行排序。Return
    语句指定应返回的内容。


    大多数 DBA（即使是那些关注自动化的人）很少需要关心 FLOWR 语句。因此，对该主题的完整讨论超出了本书的范围。相反，我将重点介绍在 SQL Server
    中用于自动化和脚本编写的核心方法。这些方法是 `query()`、`value()`、`exist()` 和 `nodes()`。


    **注意**

    以下部分中的示例使用 showplan 模式。此 XSD 的完整详细信息可在 [`http://schemas.microsoft.com/sqlserver/2004/07/showplan`](http://schemas.microsoft.com/sqlserver/2004/07/showplan)
    找到。


    ### query 方法


    XQuery `query()` 方法可用于具有 XML 数据类型的列或变量。它提取文档的一部分。提取的文档部分将形成一个未类型化的 XML 文档，即使原始文档符合模式（类型化
    XML）。


    调用该方法使用语法 `XMLDoc.query(''/Path/To/Node'')`。如果文档绑定到 XSD，你可以在指定节点路径之前声明命名空间，语法为
    `XMLDoc.query(''declare namespace alias="//domain.com/schemalocation"; //alias:node'')`。


    例如，代码清单 1-20 中的查询将返回查询存储中每个查询计划的每个列引用。在 `query()` 方法中，我们首先为 Microsoft 的 showplan
    模式声明命名空间。然后我们可以轻松地指定我们希望提取的节点，而不是传递该节点在层次结构中的完整位置。


    ```

    SELECT

    CAST(query_plan AS XML).query(''declare namespace

    qplan="http://schemas.microsoft.com/sqlserver/2004/07/showplan";

    //qplan:ColumnReference'') AS SQLStatement

    FROM sys.query_store_plan ;

    代码清单 1-20

    使用 query() 方法

    ```


    ### value 和 nodes 方法


    `value()` 方法将从 XML 文档中提取一个单值，并映射到 SQL Server 数据类型。`value()` 方法可以针对 XML 数据类型的列或变量调用，格式为
    `XMLDoc.value(''/path/to/node/@node[1]'', ''int'')`。或者，你也可以指定 XML 文档所绑定的模式，格式为
    `XMLDoc.value(''declare namespace alias="http://domain.com/schemalocation"; (//alias:node[1]'',
    ''int'')`。


    **提示**

    因为 `value()` 方法只能返回一个单值，所以必须在方括号中指定一个索引值，即使该节点在文档中只出现一次。


    因为 `value()` 方法只能返回一个原子（单）值，所以它可以与 `nodes()` 方法结合使用，将节点分解为关系数据。`nodes()` 方法返回一个行集，其中包含节点实例的逻辑副本。然后，可以将
    `value()` 方法交叉应用到 `nodes()` 方法的结果，以便从同一个 XML 文档返回多个值。代码清单 1-21 中的查询将返回查询存储中每个计划内访问的表和列的列表。


    代码清单 1-21 中的子查询只是将 `query_plan` 列转换为原生 XML，以便可以对其调用 `nodes()` 方法。外部查询将 `nodes()`
    方法交叉应用到查询计划的原生 XML 版本，然后针对 `nodes()` 方法返回的节点实例的逻辑表示运行 `value()` 方法。请注意，因为 `value()`
    方法是针对 `nodes()` 返回的结果而不是原始 XML 文档调用的，所以不需要为属性指定路径。这是因为 `nodes()` 返回的结果始于 `<ColumnReference>`
    元素级别，而 `@Table` 和 `@Column` 节点是该元素的属性。因此，对于 `value()` 方法而言，这些属性位于文档的顶层。


    **提示**

    当将 `nodes()` 与 `value()` 结合使用时，模式仅在 `nodes()` 方法中声明。这是因为 `value()` 方法是针对实例的逻辑表示运行的，而不是针对原始
    XML 文档。


    ```

    SELECT

    plan_id

    ,nodes.query_plan.value(''@Table[1]'', ''nvarchar(128)'') AS TableRef

    ,nodes.query_plan.value(''@Column[1]'', ''nvarchar(128)'') AS ColumnRef

    FROM

    (

    SELECT plan_id, CAST(query_plan AS XML) query_plan_xml

    FROM sys.query_store_plan

    ) base

    CROSS APPLY query_plan_xml.nodes(''declare namespace

    qplan="http://schemas.microsoft.com/sqlserver/2004/07/showplan";

    //qplan:ColumnReference'') as nodes(query_plan) ;

    代码清单 1-21

    使用 value() 和 nodes() 方法

    ```

    '
- fmt: '### exist Method


    `exist`方法将对XML文档运行XQuery表达式。它会返回一个位（布尔）值来表示表达式的结果状态。当XPath表达式的结果为空时返回0；结果不为空时返回1；如果结果为`NULL`则返回`NULL`。


    `exist`方法通常用于`WHERE`子句。例如，你可能已经注意到清单[1-20](#395785_2_En_1_Chapter.xhtml#PC20)和[1-21](#395785_2_En_1_Chapter.xhtml#PC21)中的查询返回了许多结果，这些结果既来自SQL
    Server内部运行的许多查询，也来自DBA活动，比如访问备份元数据。清单[1-22](#395785_2_En_1_Chapter.xhtml#PC22)中的查询扩展了清单[1-21](#395785_2_En_1_Chapter.xhtml#PC21)的查询，用于过滤掉`<ColumnReference>`元素的`@Schema`属性等于`[sys]`或`[dbo]`的任何结果。这将导致只考虑访问用户表的执行计划。


    ```

    SELECT

    plan_id

    ,nodes.query_plan.value(''@Table[1]'', ''nvarchar(128)'') AS index1

    ,nodes.query_plan.value(''@Column[1]'', ''nvarchar(128)'') AS index2

    FROM

    (

    SELECT plan_id, CAST(query_plan AS XML) query_plan_xml

    FROM sys.query_store_plan

    ) base

    CROSS APPLY query_plan_xml.nodes(''declare namespace

    qplan="http://schemas.microsoft.com/sqlserver/2004/07/showplan";

    //qplan:ColumnReference'') as nodes(query_plan)

    WHERE query_plan_xml.exist(''declare namespace

    qplan="http://schemas.microsoft.com/sqlserver/2004/07/showplan";

    //qplan:Object[@Schema="[sys]"]'') = 0

    AND query_plan_xml.exist(''declare namespace

    qplan="http://schemas.microsoft.com/sqlserver/2004/07/showplan";

    //qplan:Object[@Schema="[dbo]"]'') = 0 ;

    Listing 1-22

    使用`exist`方法

    ```


    ### 综合使用方法


    为了满足我们的原始需求，即检查使用扫描操作的最昂贵的执行计划，我们必须在单个查询中组合`value`、`query`和`exist`方法。清单[1-23](#395785_2_En_1_Chapter.xhtml#PC23)中的查询在`WHERE`子句中使用了`exist`方法来检查每个计划的`<RelOp>`元素，并过滤掉任何不涉及扫描操作的运算符。`WHERE`子句还将使用`exist`方法来过滤任何非用户表的操作。


    `SELECT`列表使用`value`方法提取`@Schema`和`@Table`属性，以帮助我们识别可能缺少索引的表。它还使用`query`方法提取整个`<Object>`元素，以XML格式提供表的完整详细信息。


    除了使用XQuery方法外，该查询还以本机XML格式返回整个计划，并从`sys.query_store_runtime_stats`目录视图返回计划统计信息。查询使用`TOP`和`ORDER
    BY`来过滤掉除基于计划的平均执行时间乘以计划执行次数计算出的最昂贵的前五个计划之外的所有计划。


    ```

    SELECT TOP 5

    CAST(p.query_plan AS XML)

    , CAST(p.query_plan AS XML).value(''declare namespace

    qplan="http://schemas.microsoft.com/sqlserver/2004/07/showplan";

    (//qplan:Object/@Schema)[1]'',''nvarchar(128)'')

    + ''.''

    + CAST(p.query_plan AS XML).value(''declare namespace

    qplan="http://schemas.microsoft.com/sqlserver/2004/07/showplan";

    (//qplan:Object/@Table)[1]'',''nvarchar(128)'') AS [Table]

    , CAST(p.query_plan AS XML).query(''declare namespace

    qplan="http://schemas.microsoft.com/sqlserver/2004/07/showplan";

    //qplan:Object'') AS TableDetails

    , rs.count_executions

    , rs.avg_duration

    , rs.avg_physical_io_reads

    , rs.avg_cpu_time

    FROM sys.query_store_runtime_stats rs

    INNER JOIN sys.query_store_plan p

    ON p.plan_id = rs.plan_id

    WHERE CAST(p.query_plan AS XML).exist(''declare namespace

    qplan="http://schemas.microsoft.com/sqlserver/2004/07/showplan";

    //qplan:RelOp[@LogicalOp="Index Scan"

    or @LogicalOp="Clustered Index Scan"

    or @LogicalOp="Table Scan"]'') = 1

    AND CAST(p.query_plan AS XML).exist(''declare namespace

    qplan="http://schemas.microsoft.com/sqlserver/2004/07/showplan";

    //qplan:Object[@Schema="[sys]"]'') = 0

    AND CAST(p.query_plan AS XML).exist(''declare namespace

    qplan="http://schemas.microsoft.com/sqlserver/2004/07/showplan";

    //qplan:Object[@Schema="[dbo]"]'') = 0

    ORDER BY rs.count_executions * rs.avg_duration DESC ;

    Listing 1-23

    查找具有扫描操作的最昂贵计划

    ```


    ### 高效循环


    DBA强加给开发人员的最常见托管标准之一是禁止使用游标。与此同时，大多数DBA在需要遍历一组对象时都会使用游标。论点通常是他们的脚本每天只运行一次，而编写游标是实现目标的最快方式。当然，这个论点有一定道理，但我总觉得最好以身作则。有几次，我与开发团队进行了“游标辩论”，并通过自己编写不使用游标的脚本赢得了辩论，开发人员也应该能够做到同样的事情。


    当然，本书的主要重点是PowerShell，在PowerShell中循环远比在T-SQL中循环高效得多。然而，本书（尤其是第[8](#395785_2_En_8_Chapter.xhtml)章）展示了最佳技术，在PowerShell和T-SQL级别具有多层循环是合理的方案。


    想象一下，我们需要一个脚本来终止所有活动会话。这对于任何DBA来说都是一个有用的脚本，因为你总会有需要快速断开所有用户连接的情况。清单[1-24](#395785_2_En_1_Chapter.xhtml#PC24)中的脚本使用游标实现了这一点，但它会很慢且耗费资源，尤其是在具有许多活动会话的高度事务性环境中。


    ```

    DECLARE @session_id INT ;

    DECLARE C_Sessions CURSOR

    FOR

    SELECT Session_id

    FROM sys.dm_exec_sessions

    WHERE session_id  @@SPID

    AND is_user_process = 1 ;

    OPEN C_Sessions ;

    FETCH NEXT FROM C_Sessions

    INTO @Session_id ;

    DECLARE @SQL NVARCHAR(MAX) ;

    WHILE @@FETCH_STATUS = 0

    BEGIN

    SET @SQL = ''Kill '' + CAST(@Session_id AS NVARCHAR(4)) ;

    EXEC(@SQL) ;

    FETCH NEXT FROM C_Sessions

    INTO @Session_id ;

    END

    CLOSE C_Sessions ;

    DEALLOCATE C_Sessions ;

    Listing 1-24

    使用游标终止所有会话

    ```


    一种更有效（也符合你自己的托管标准！）的方法是使用`FOR XML`的一个技巧。清单[1-25](#395785_2_En_1_Chapter.xhtml#PC25)中的查询使用子查询来填充变量。子查询为结果集中返回的每一行返回字符串`''Kill
    ''`与`Session_id`连接的结果。然后使用`FOR XML PATH`将其转换为XML格式。`data()`方法用于剥离XML标签和字符，只保留文本。然后，该文本被传递回外部查询，凭借变量的数据类型，它被隐式转换为`NVARCHAR`。然后可以使用动态SQL执行该变量。


    这种方法的好处是查询只执行一次，而不是对每个活动会话执行一次。这意味着更少的磁盘活动。与其他技术（如`@SQL = @SQL +`方法）相比，这种方法使用的内存也更少。


    ```

    DECLARE @SQL NVARCHAR(MAX) ;

    SELECT DISTINCT @SQL =

    (

    SELECT ''Kill '' + CAST(session_id AS NVARCHAR(4)) AS [data()]

    FROM sys.dm_exec_sessions

    WHERE session_id  @@SPID

    AND is_user_process = 1

    FOR XML PATH('''')

    ) ;

    EXEC(@SQL) ;

    Listing 1-25

    高效终止所有会话

    ```'
  raw: '### exist Method


    The exist method will run an XQuery expression against an XML document. It will
    then return a bit (Boolean) value to denote the success of the expression. 0 is
    returned when the result of the XPath expression is empty; 1 is returned if the
    result is not empty; and `NULL` is returned if the result is `NULL`.


    The exist method is usually used in a `WHERE` clause. For example, you may have
    noticed that the queries in Listings [1-20](#395785_2_En_1_Chapter.xhtml#PC20)
    and [1-21](#395785_2_En_1_Chapter.xhtml#PC21) return many results for many internal
    queries run by SQL Server and also for DBA activity, such as accessing backup
    metadata. The query in Listing [1-22](#395785_2_En_1_Chapter.xhtml#PC22) extends
    the query in Listing [1-21](#395785_2_En_1_Chapter.xhtml#PC21) to filter out any
    results where the `@Schema` attribute of the `<ColumnReference>` element is equal
    to either `[sys]` or `[dbo]`. This will result if only plans that access user
    tables are considered.


    ```

    SELECT

    plan_id

    ,nodes.query_plan.value(''@Table[1]'', ''nvarchar(128)'') AS index1

    ,nodes.query_plan.value(''@Column[1]'', ''nvarchar(128)'') AS index2

    FROM

    (

    SELECT plan_id, CAST(query_plan AS XML) query_plan_xml

    FROM sys.query_store_plan

    ) base

    CROSS APPLY query_plan_xml.nodes(''declare namespace

    qplan="http://schemas.microsoft.com/sqlserver/2004/07/showplan";

    //qplan:ColumnReference'') as nodes(query_plan)

    WHERE query_plan_xml.exist(''declare namespace

    qplan="http://schemas.microsoft.com/sqlserver/2004/07/showplan";

    //qplan:Object[@Schema="[sys]"]'') = 0

    AND query_plan_xml.exist(''declare namespace

    qplan="http://schemas.microsoft.com/sqlserver/2004/07/showplan";

    //qplan:Object[@Schema="[dbo]"]'') = 0 ;

    Listing 1-22

    Using the exist CROSS Method

    ```


    ### Pulling the Methods Together


    In order to meet our original requirement, to examine the most expensive query
    plans, which use a scan operation, we will have to combine the value, query, and
    exist methods in a single query. The query in Listing [1-23](#395785_2_En_1_Chapter.xhtml#PC23)
    uses the exist method in the `WHERE` clause to examine the `<RelOp>` element of
    each plan and filter out any operators that do not involve a scan operation. The
    `WHERE` clause will also use the exist method to filter any operations that are
    not against user tables.


    The `SELECT` list uses the value method to extract the `@Schema` and `@Table`
    attributes, to help us to identify the tables where we may be missing indexes.
    It also uses the query method to extract the entire `<Object>` element, giving
    us full details of the table, in XML format.


    As well as using XQuery methods, the query also returns the whole plan in native
    XML format and plan statistics from the `sys.query_store_runtime_stats` catalog
    view. The query uses `TOP` and `ORDER BY` to filter out all but the five most
    expensive plans, based on the average execution time of the plan, multiplied by
    the number of times the plan has been executed.


    ```

    SELECT TOP 5

    CAST(p.query_plan AS XML)

    , CAST(p.query_plan AS XML).value(''declare namespace

    qplan="http://schemas.microsoft.com/sqlserver/2004/07/showplan";

    (//qplan:Object/@Schema)[1]'',''nvarchar(128)'')

    + ''.''

    + CAST(p.query_plan AS XML).value(''declare namespace

    qplan="http://schemas.microsoft.com/sqlserver/2004/07/showplan";

    (//qplan:Object/@Table)[1]'',''nvarchar(128)'') AS [Table]

    , CAST(p.query_plan AS XML).query(''declare namespace

    qplan="http://schemas.microsoft.com/sqlserver/2004/07/showplan";

    //qplan:Object'') AS TableDetails

    , rs.count_executions

    , rs.avg_duration

    , rs.avg_physical_io_reads

    , rs.avg_cpu_time

    FROM sys.query_store_runtime_stats rs

    INNER JOIN sys.query_store_plan p

    ON p.plan_id = rs.plan_id

    WHERE CAST(p.query_plan AS XML).exist(''declare namespace

    qplan="http://schemas.microsoft.com/sqlserver/2004/07/showplan";

    //qplan:RelOp[@LogicalOp="Index Scan"

    or @LogicalOp="Clustered Index Scan"

    or @LogicalOp="Table Scan"]'') = 1

    AND CAST(p.query_plan AS XML).exist(''declare namespace

    qplan="http://schemas.microsoft.com/sqlserver/2004/07/showplan";

    //qplan:Object[@Schema="[sys]"]'') = 0

    AND CAST(p.query_plan AS XML).exist(''declare namespace

    qplan="http://schemas.microsoft.com/sqlserver/2004/07/showplan";

    //qplan:Object[@Schema="[dbo]"]'') = 0

    ORDER BY rs.count_executions * rs.avg_duration DESC ;

    Listing 1-23

    Finding the Most Expensive Plans with Scan Operations

    ```


    ## Efficient Looping


    One of the most common hosting standards enforced upon developers by DBAs is to
    disallow the use of cursors. At the same time, the majority of DBAs will use a
    cursor whenever they need to iterate through a set of objects. The argument is
    normally that their script only runs once per day, and writing a cursor is the
    quickest way to achieve their means. That argument, of course, has some merit,
    but I always feel that it is better to lead by example. There have been several
    times when I have had “the cursor debate” with development teams and won the argument
    by virtue of the fact that I have implemented my own scripts without the use of
    cursors, and developers should be able to do the same.


    Of course, the main focus of this book is on PowerShell, and looping in PowerShell
    is far more efficient than looping in T-SQL. There are optimal techniques, however,
    which are demonstrated throughout this book, especially in Chapter [8](#395785_2_En_8_Chapter.xhtml),
    where having multiple layers of looping at the PowerShell and T-SQL levels is
    the logical approach.


    Imagine that we need a script to kill all active sessions. This is a useful script
    for any DBA to have in their armory, as there will always be occasions when you
    have to disconnect all users quickly. The script in Listing [1-24](#395785_2_En_1_Chapter.xhtml#PC24)
    achieves this by using a cursor, but it will be slow and resource-intensive, especially
    in a highly transactional environment with many active sessions.


    ```

    DECLARE @session_id INT ;

    DECLARE C_Sessions CURSOR

    FOR

    SELECT Session_id

    FROM sys.dm_exec_sessions

    WHERE session_id  @@SPID

    AND is_user_process = 1 ;

    OPEN C_Sessions ;

    FETCH NEXT FROM C_Sessions

    INTO @Session_id ;

    DECLARE @SQL NVARCHAR(MAX) ;

    WHILE @@FETCH_STATUS = 0

    BEGIN

    SET @SQL = ''Kill '' + CAST(@Session_id AS NVARCHAR(4)) ;

    EXEC(@SQL) ;

    FETCH NEXT FROM C_Sessions

    INTO @Session_id ;

    END

    CLOSE C_Sessions ;

    DEALLOCATE C_Sessions ;

    Listing 1-24

    Kill All Sessions with a Cursor

    ```


    A much more efficient way of achieving the same results (and adhering to your
    own hosting standards!) is to use a trick with `FOR XML`. The query in Listing
    [1-25](#395785_2_En_1_Chapter.xhtml#PC25) uses a subquery to populate a variable.
    The subquery returns the string `''Kill ''` concatenated to the `Session_id` for
    each row that is returned in the result set. This is then converted into XML format,
    using `FOR XML PATH`. The `data()` method is used to strip out the XML tags and
    characters, leaving only the text. This text is then passed back up to the outer
    query, where it is implicitly converted into `NVARCHAR` by virtue of the data
    type of the variable. The variable can then be executed using dynamic SQL.


    The benefit of this approach is that the query is only executed once, as opposed
    to once for every active session. This means less disk activity. There is also
    less memory used in this approach, compared to other techniques, such as `@SQL
    = @SQL +` approach.


    ```

    DECLARE @SQL NVARCHAR(MAX) ;

    SELECT DISTINCT @SQL =

    (

    SELECT ''Kill '' + CAST(session_id AS NVARCHAR(4)) AS [data()]

    FROM sys.dm_exec_sessions

    WHERE session_id  @@SPID

    AND is_user_process = 1

    FOR XML PATH('''')

    ) ;

    EXEC(@SQL) ;

    Listing 1-25

    Kill All Sessions Efficiently

    ```'
