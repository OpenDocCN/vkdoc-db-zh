    Add a Database to an Availability Group

    ```


    Another great example of how the `sqlserver` module can be used to administer
    Availability Groups is the `Switch-AvailabilityGroup` cmdlet, which can be used
    to failover an Availability Group to another Replica. This functionality is demonstrated
    in Listing [4-27](#395785_2_En_4_Chapter.xhtml#PC33).


    ```powershell

    Switch-SqlAvailabilityGroup -Path "SQLSERVER:\Sql\SecondaryServer\default\AvailabilityGroups\WideWorldImportersAG"

    Listing 4-27

    Failover an Availability Group

    ```


    If the Availability Group is in Asynchronous Mode, then there would be a risk
    of data loss. In this situation, the `AllowDataLoss` parameter must be used to
    ensure that the administrator running the command is aware of the potential consequences,
    as demonstrated in Listing [4-28](#395785_2_En_4_Chapter.xhtml#PC34).


    ```powershell

    Switch-SqlAvailabilityGroup -Path "SQLSERVER:\Sql\SecondaryServer\default\AvailabilityGroups\WideWorldImportersAG"
    –AllowDataLoss

    Listing 4-28

    Failover an Availability Group in Asynchronous Commit Mode

    ```


    ## Working with Miscellaneous Cmdlets


    The `sqlserver` module also contains a number of cmdlets which do not fall into
    any of the sections above. For example, the `Invoke-SqlAssessment` cmdlet can
    be used to scan your SQL Server instance against a knowledge base of best practices
    to ensure that you are correctly hardened.


    There are a number of cmdlets that allow you to administer SSAS (SQL Server Analysis
    Services), including functionality to process data in SSAS databases, which refreshes
    the aggregations and potentially underlying data from the source, relational databases.
    These can be useful for automating the administration of SSAS activities, as well
    as ad hoc actions.


    There are a number of cmdlets that will also allow you to view information about
    SQL Server Agent, its jobs and job steps. For example, the command in Listing
    [4-29](#395785_2_En_4_Chapter.xhtml#PC35) will return information about all SQL
    Server Agent jobs on a given instance.


    ```powershell

    Get-SqlAgentJob –ServerInstance "localhost"

    Listing 4-29

    Return All SQL Server Agent Jobs

    ```


    When run against an instance that is a client of SQL Server MDW (Management Data
    Warehouse), this command will return the following output:


    ```

    Name                      Owner       Category             Enabled    CurrentRunStatus   DateCreated               LastModified              LastRunDuration

    ----                      -----       --------             -------    ----------------   -----------               ------------              ---------------

    collection_set_1_nonca... sa          Data Collector       True       Idle               09/09/2020
    16:01:38       07/10/2020 18:46:29       00:00:04

    collection_set_2_colle... sa          Data Collector       True       Idle               09/09/2020
    16:01:41       07/10/2020 18:46:30       20.18:26:41

    collection_set_2_upload   sa          Data Collector       True       Idle               09/09/2020
    16:01:41       07/10/2020 18:46:29       00:00:09

    collection_set_3_colle... sa          Data Collector       True       Idle               09/09/2020
    16:01:44       07/10/2020 18:46:30       20.17:43:04

    collection_set_3_upload   sa          Data Collector       True       Idle               09/09/2020
    16:01:44       07/10/2020 18:46:30       00:00:03

    collection_set_6_nonca... sa          Data Collector       True       Idle               09/09/2020
    16:16:50       07/10/2020 18:46:30       00:00:06

    mdw_purge_data_[sysuti... sa          Data Collector       True       Idle               09/09/2020
    16:01:17       07/10/2020 18:46:30       02:20:28

    ```


    These cmdlets are slightly less useful than some other cmdlets, however, as the
    module only includes cmdlets to read the details of the jobs, not to update them.
    To update them, you would need to interact directly with SMO or use T-SQL within
    `Invoke-SqlCmd`.


    The `Read-SqlXEvent` cmdlet can be used to read Extended Events and write them
    to the terminal. This cmdlet accepts either a connection string (to SQL Server)
    and the name of an Extended Events session, for reading live sessions, or can
    accept the name of a `FileName` parameter, if you wish to read events from an
    XEL file. For example, the command in Listing [4-30](#395785_2_En_4_Chapter.xhtml#PC37)
    can be used to read events from the live Extended Events session called `LocksAndLatches_XE`
    session to the terminal.


    Tip


    Further details regarding creating Extended Events sessions can be found in the
    Apress title *Pro SQL Server 2022 Administration*, which can be found here: link.springer.com/book/10.1007/978-1-4842-8864-1.


    ```powershell

    $params = @{

    ConnectionString = "Server=localhost;Database=master;Trusted_Connection=True;"

    SessionName      = "system_health"

    }

    Read-SQLXEvent @params

    Listing 4-30

    Reading an Extended Events Session

    ```


    ## Summary


    The `sqlserver` module provides many cmdlets for performing common administrative
    tasks within SQL Server. However, there are some significant gaps in functionality.
    These can be worked around by interacting directly with SMO, the library that
    the `sqlserver` module is based upon. Alternatively, there is an open source module,
    updated by the community, called `dbatools`. This module plugs many of the gaps
    in functionality and will be discussed in Chapter [5](#395785_2_En_5_Chapter.xhtml)
    of this book.


    The `Invoke-SqlCmd` cmdlet is a powerful tool, which allows you to run T-SQL statements
    from a PowerShell terminal or within PowerShell scripts. The results can be returned
    to variables, allowing you to write downstream logic, based on the results. For
    example, if you wish to perform an action on a set of databases, you can use `Invoke-SqlCmd`
    to retrieve a dynamic list of databases in an instance and then iterate over this
    list to perform the required administrative action.


    The `sqlserver` module provides a set of cmdlets for managing SQL Server Logins.
    The `Add-SqlLogin` cmdlet can be used to create SQL Server Logins from Windows,
    with second-tier authentication, or from certificates and asymmetric keys, while
    the `Get-SqlLogin` cmdlet can be used to return information about a Login, and
    the `Remove-SqlLogin` can be used to drop logins from the instance. The module
    does not have the functionality to deal with database users, or permissions, however.


    The module contains many miscellaneous cmdlets, including cmdlets for administering
    the Analysis Services database and retrieving information about SQL Server Agent
    jobs. A complete list of cmdlets and functions contained in the `sqlserver` module
    can be retrieved by running `Get-Command -module sqlserver`.'
