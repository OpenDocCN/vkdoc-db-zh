  trans: '


    ### 实施安全资源


    让我们看看如何使用 DSC（期望状态配置）来强制实施我们选定的每个安全相关配置。我们需要的第一个资源应确保 `xp_cmdshell` 被禁用。我们可以使用清单
    9-1 中的资源定义来实现这一点。该资源使用了 `SqlserverDsc` 模块中的 `SqlConfiguration` 资源类型，我们将其名称设为 `xpCmdshell`。你会注意到，我们没有向此资源传递
    `Ensure` 参数。相反，我们传递的是选项名称和选项的期望值。在我们的例子中，值是 `0`，表示禁用。我们还可以指定是否希望服务重启。这是因为有少数配置选项只有在服务重启后才会生效。


    提示


    当使用 `SqlserverDsc` 模块配置默认实例时，我们应传递 `MSSQLSERVER` 作为实例名称。对于命名实例，我们当然会传递实际的实例名称。在此场景中，我们的配置（参见第
    6 章）是参数化的，因此我们将传递 `SqlInstanceName` 变量，该变量默认值为 `MSSQLSERVER`，但在编译 MOF 时可以覆盖。


    ```

    SqlConfiguration ''xpCmdshell'' {

    OptionName     = ''xp_cmdshell''

    OptionValue    = 0

    RestartService = $false

    ServerName     = ''localhost''

    InstanceName   = $SqlInstanceName

    }

    ```

    清单 9-1. xpCmdshell 资源


    我们的下一个资源将确保在实例中禁用 OLE 自动化。对于此配置，我们将再次使用 `SqlConfiguration` 资源。但这次，我们将传递 `Ole Automation
    Procedures` 作为 `OptionName`。同样，我们将传递 `OptionValue` 为 `0` 来表示我们希望禁用该功能。如清单 9-2
    所示。


    ```

    SqlConfiguration ''OLEAutomation'' {

    OptionName     = ''Ole Automation Procedures''

    OptionValue    = 0

    RestartService = $false

    ServerName     = ''localhost''

    InstanceName   = $SqlInstanceName

    }

    ```

    清单 9-2. OLEAutomation 资源


    我们将创建的最后一个安全相关资源将确保 Windows `Authenticated Users` 组没有 SQL Server 登录名。为此，我们将使用
    `SqlserverDsc` 模块中的 `SqlLogin` 资源。我们将传递 `Ensure` 参数，但这次不是像之前那样使用 `Ensure = ''Present''`，而是使用
    `Ensure = ''Absent''` 来删除登录名（如果存在）。


    我们将使用 `Name` 参数来提供要删除的登录名的名称，`LoginType` 参数允许我们定义该登录名是映射到 Windows 用户、Windows 组还是
    SQL 登录名。清单 9-3 展示了这一点。


    ```

    SqlLogin ''AuthenticatedUsers'' {

    Ensure       = ''Absent''

    Name         = ''NT AUTHORITY\Authenticated Users''

    LoginType    = ''WindowsGroup''

    ServerName   = ''localhost''

    InstanceName = $SqlInstanceName

    }

    ```

    清单 9-3. BuiltinAdministrators 资源


    ### 实施性能资源


    让我们看看如何使用 DSC 执行性能配置。这些配置中的第一个是确保 `MAXDOP` 被配置为最佳值。使用 `SqlMaxDop` 资源，可以直接传递 `MAXDOP`
    的期望值，但我们不这样做，而是传递 `DynamicAlloc = $true`。这是一个有用的功能，它利用资源代码中包含的逻辑，根据服务器当前的规模计算理想值，并相应地配置
    `MAXDOP`。如清单 9-4 所示。


    提示


    如果你的服务器有多个 NUMA 节点，那么建议会有所不同，并且 `SqlMaxDop` 资源没有内置逻辑来支持这种情况。因此，如果服务器有多个 NUMA 节点，我建议在你自己的配置中添加自定义逻辑。


    ```

    SqlMaxDop ''DynamicSqlMaxDop'' {

    Ensure                  = ''Present''

    DynamicAlloc            = $true

    ServerName              = ''localhost''

    InstanceName            = $SqlInstanceName

    }

    ```

    清单 9-4. DynamicSqlMaxDop 资源


    接下来，我们将考虑最小和最大内存需求。我们希望将这两个设置都配置为服务器可用内存的 75%，这将为操作系统预留足够的内存，并避免 SQL Server 中的动态内存管理。


    我们可以使用单个 `SqlMemory` 资源来配置这两个选项。该资源允许我们使用资源内置的规则动态配置最小和最大内存，也允许我们以 MB 为单位传递任意值。然而，在我们的例子中，我们希望以总服务器内存的百分比来传递值。因此，我们将使用
    `MaxMemoryPercent` 和 `MinMemoryPercent` 参数，如清单 9-5 所示。


    ```

    SqlMemory ''MinAndMaxMemory75Percent'' {

    Ensure               = ''Present''

    DynamicAlloc         = $false

    MaxMemoryPercent     = 75

    MinMemoryPercent     = 75

    ServerName           = ''localhost''

    InstanceName         = $SqlInstanceName

    }

    ```

    清单 9-5. MinAndMaxMemory75Percent 资源


