  trans: "\n## 使用 FOR XML AUTO\n\n与 `FOR XML RAW` 不同，`FOR XML AUTO` 能够返回嵌套结果。它使用起来也异常简单，因为它会根据查询中的联接自动嵌套数据。代码清单\
    \ 1-14 中的修改后的查询使用 `AUTO` 模式来返回一个层次化的 XML 文档。\n\n```sql\nSELECT\nExecSessions.session_id\n\
    , ExecSessions.login_name\n, ExecSessions.host_name\n, ExecSessions.status\n,\
    \ ExecRequests.command\n, DB_NAME(ExecRequests.database_id) AS DatabaseName\n\
    , ExecRequests.last_wait_type\nFROM sys.dm_exec_sessions ExecSessions\nINNER JOIN\
    \ sys.dm_exec_requests ExecRequests\nON ExecSessions.session_id = ExecRequests.session_id\n\
    WHERE ExecSessions.is_user_process = 1\nFOR XML AUTO\n代码清单 1-14\n使用 FOR XML AUTO\n\
    ```\n\n此查询返回的 XML 片段可以在代码清单 1-15 中看到。\n\n```xml\n代码清单 1-15\n使用 FOR XML AUTO 结果提取会话信息\n\
    ```\n\n您可以看到，当使用 `AUTO` 模式时，`FOR XML` 子句会根据查询中的 `JOIN` 子句自动嵌套数据。每个元素都根据其来源表的表别名被分配了一个名称。与\
    \ `RAW` 模式一样，我们可以使用 `ROOT` 关键字来添加一个根节点，以使文档结构良好；或者使用 `ELEMENTS` 关键字使文档以元素为中心。\n\
    \n## 使用 FOR XML PATH\n\n有时，您需要对结果 XML 文档的形状进行比 `RAW` 模式或 `AUTO` 模式所能提供的更多控制。当您有定义自定义启发式规则的需求时，可以使用\
    \ `PATH` 模式。`PATH` 模式提供了极大的灵活性，因为它允许您定义结果 XML 中每个节点的位置。这是通过指定查询中的每一列如何映射到 XML\
    \ 来实现的，使用的是列名或别名。\n\n如果一个列别名以 `@` 符号开头，则将创建一个属性。如果不使用 `@` 符号，该列将映射到一个元素。将成为属性的列必须在定义为同级节点但作为元素的列之前指定。\n\
    \n如果您希望定义节点在层次结构中的位置，可以使用 `/` 符号。例如，如果您需要主机名显示在一个名为 `<Session>` 的元素之下，您可以将 `host_name`\
    \ 列的别名指定为 `'/Session/HostName'`。\n\n`PATH` 模式允许您创建高度定制和复杂的结构。例如，假设您有一个需求，需要创建一个格式如代码清单\
    \ 1-16 所示的 XML 文档。在这里，您会注意到有一个名为 `<Sessions>` 的根节点，层次结构中的下一个节点是 `<UserSession>`。这是一个可重复元素，对于实例上的每个活动会话都会出现一次。在此元素中，会话\
    \ ID 显示为属性，而登录名、主机名和状态都是子元素。\n\n还有一个名为 `<Request>` 的复杂子元素，它包含其他子元素，这些子元素包含命令类型、上次等待的原因和数据库。数据库有自己的子元素，其中包含数据库名称。如果我们想添加另一个标签，例如数据库\
    \ ID，这将很有帮助。\n\n```xml\n<Sessions>\n  <UserSession SessionID=\"54\">\n    <LoginName>WIN-J38I01U06D7\\\
    Administrator</LoginName>\n    <HostName>WIN-J38I01U06D7</HostName>\n    <Status>running</Status>\n\
    \    <Request>\n      <Command>SELECT</Command>\n      <Database>\n        <Name>master</Name>\n\
    \      </Database>\n      <LastWaitReason>SOS_WORK_DISPATCHER</LastWaitReason>\n\
    \    </Request>\n  </UserSession>\n  <UserSession SessionID=\"55\">\n    <LoginName>WIN-J38I01U06D7\\\
    Administrator</LoginName>\n    <HostName>WIN-J38I01U06D7</HostName>\n    <Status>running</Status>\n\
    \    <Request>\n      <Command>SELECT</Command>\n      <Database>\n        <Name>master</Name>\n\
    \      </Database>\n      <LastWaitReason>ASYNC_NETWORK_IO</LastWaitReason>\n\
    \    </Request>\n  </UserSession>\n</Sessions>\n代码清单 1-16\nFOR XML PATH 的期望结果\n\
    ```\n\n使用 `FOR XML PATH` 构建 XML 文档的查询初看起来可能有点复杂，但一旦理解了原理，它们就变得相当直接。让我们逐一检查每个需求以及如何实现所需的形状。\n\
    \n首先，我们需要一个名为 `<Sessions>` 的根节点，并且我们还需要将 `<row>` 元素重命名为 `<UserSession>`。这可以以与我们探索\
    \ `RAW` 模式时相同的方式实现，使用 `FOR XML` 子句中 `<row>` 元素的可选参数和 `ROOT` 关键字来指定根节点，如代码清单 1-17\
    \ 所示。\n\n```sql\nFOR XML PATH('UserSession'), ROOT('Sessions')\n代码清单 1-17\n使用\
    \ FOR XML PATH 创建根节点并命名 <row> 元素\n```\n\n接下来，在 `SELECT` 列表中，我们只需要指定每个标签应该位于层次结构中的哪个位置，以及它们应该被视为元素还是属性。如代码清单\
    \ 1-18 所示的技术。请注意，`SessionID` 带有 `@` 前缀以使其成为属性，并且我们仅为 `DatabaseName` 创建了额外的嵌套层级，只需在请求的层次结构中添加另一个层级即可。\n\
    \n```sql\nSELECT\nExecSessions.session_id                      '@SessionID'\n\
    , ExecSessions.login_name                      'LoginName'\n, ExecSessions.host_name\
    \                       'HostName'\n, ExecSessions.status                    \
    \      'Status'\n, ExecRequests.command                         'Request/Command'\n\
    , DB_NAME(ExecRequests.database_id)            'Request/Database/Name'\n, ExecRequests.last_wait_type\
    \                  'Request/LastWaitReason'\n代码清单 1-18\n定义 SELECT 列表\n```\n\n\
    将这些技术整合在一起，我们得到了代码清单 1-19 中生成所需结果集的完整查询。\n\n```sql\nSELECT\nExecSessions.session_id\
    \ '@SessionID'\n, ExecSessions.login_name 'LoginName'\n, ExecSessions.host_name\
    \ 'HostName'\n, ExecSessions.status 'Status'\n, ExecRequests.command 'Request/Command'\n\
    , DB_NAME(ExecRequests.database_id) 'Request/Database/Name'\n, ExecRequests.last_wait_type\
    \ 'Request/LastWaitReason'\nFROM sys.dm_exec_sessions ExecSessions\nINNER JOIN\
    \ sys.dm_exec_requests ExecRequests\nON ExecSessions.session_id = ExecRequests.session_id\n\
    WHERE ExecSessions.is_user_process = 1\nFOR XML PATH('UserSession'), ROOT('Sessions')\n\
    代码清单 1-19\n最终查询\n```\n"
- fmt: '## Extracting Values from XML Documents


    When scripting, or even performance tuning, DBAs will often have to extract values
    from native XML. In order to demonstrate this, we will use the Query Store. The
    Query Store captures a history of query plans and their statistics, so that DBAs
    can easily compare the performance difference between different plans. As well
    as a graphical dashboard style tool, the Query Store also exposes plans and their
    metadata through a series of catalog views.


    Tip

    For a full discussion of Query Store, I strongly recommend the Apress title `Pro
    SQL Server 2022 Administration`, which can be purchased from [`https://link.springer.com/book/10.1007/978-1-4842-8864-1`](https://link.springer.com/book/10.1007/978-1-4842-8864-1).


    Let’s imagine that we want to examine the most expensive query plans, which use
    a scan operation. This information can be retrieved by joining the `sys.query_store_runtime_statistics`
    catalog view with the `sys.query_store_plan` catalog view. In order to retrieve
    the results that we require, however, we will have to interrogate the XML execution
    plan. This means that we will have to introduce the concepts of XQuery.


    XQuery is a language for querying XML, in the same way that SQL is a language
    for querying relational data. The language is built on XPath and consists of XPath
    expressions to address a specific area of the document and FLOWR (pronounced flower)
    statements. FLOWR is an abbreviation of “For, Let, Where, Order by, and Return.”


    For statements allow you to iterate through a sequence of nodes. Let statements
    bind a sequence to a variable. Where statements filter nodes based on a Boolean
    expression. Order by statements order nodes before they are returned. Return statements
    specify what should be returned.


    The majority of DBAs (even those concerned with automation) rarely need to concern
    themselves with FLOWR statements. Therefore, a complete discussion of the topic
    is beyond the scope of this book. Instead, I will focus on the core methods that
    are of use for automation and scripting in SQL Server. These methods are `query()`,
    `value()`, `exist()`, and `nodes()`.


    Note

    The examples in the following sections use the showplan schema. Full details of
    this XSD can be found at [`http://schemas.microsoft.com/sqlserver/2004/07/showplan`](http://schemas.microsoft.com/sqlserver/2004/07/showplan).


    ### query Method


    The XQuery `query()` method can be used against columns or variables with the
    XML data type. It extracts part of the document. The extracted parts of the document
    will form an untyped XML document, even if the original document conforms to a
    schema (typed XML).


    Calling the method uses the syntax `XMLDoc.query(''/Path/To/Node'')`. If the document
    is bound to an XSD, you can declare the namespace, prior to specifying the node
    path, with the syntax `XMLDoc.query(''declare namespace alias="//domain.com/schemalocation";
    //alias:node'')`.


    For example, the query in Listing 1-20 will return every column reference from
    each query plan within the Query Store. Within the `query()` method, we first
    declare the namespace for Microsoft’s showplan schema. We can then easily specify
    the node that we wish to extract, as opposed to passing the node’s full location
    within the hierarchy.


    ```

    SELECT

    CAST(query_plan AS XML).query(''declare namespace

    qplan="http://schemas.microsoft.com/sqlserver/2004/07/showplan";

    //qplan:ColumnReference'') AS SQLStatement

    FROM sys.query_store_plan ;

    Listing 1-20

    Using the query() Method

    ```


    ### value and nodes Methods


    The `value()` method will extract a singleton value from an XML document, mapped
    to a SQL Server data type. The `value()` method can be called against columns
    or variables of the XML data type in the format `XMLDoc.value(''/path/to/node/@node[1]'',
    ''int'')`. Alternatively, you can also specify the schema that the XML document
    is bound to, in the format `XMLDoc.value(''declare namespace alias="http://domain.com/schemalocation";
    (//alias:node[1]'', ''int'')`.


    Tip

    Because the `value()` method can only return a singleton value, it is mandatory
    to specify an index value in square brackets, even if the node only occurs once
    within the document.


    Because the `value()` method can only return an atomic (singleton) value, it can
    be used in conjunction with the `nodes()` method to shred nodes into relational
    data. The `nodes()` method returns a rowset that contains logical copies of the
    instances of a node. The `value()` method can then be cross-applied to the results
    of the `nodes()` method, in order to return multiple values from the same XML
    document. The query in Listing 1-21 will return a list of tables and columns that
    are accessed within each plan in the Query Store.


    The subquery within Listing 1-21 simply converts the `query_plan` column to native
    XML, so that the `nodes()` method can be called against it. The outer query cross-applies
    the `nodes()` method to the native XML version of the query plan and then runs
    the `value()` method against the logical representation of the node instances
    that have been returned by the `nodes()` method. Note that because the `value()`
    method is being called against the results returned by `nodes()`, rather than
    the original XML document, there is no need to specify a path for the attributes.
    This is because the results returned by `nodes()` begin at the level of the `<ColumnReference>`
    element, and the `@Table` and `@Column` nodes are attributes of this element.
    Therefore, as far as the `value()` method is concerned, the attributes are at
    the top level of the document.


    Tip

    When combining `nodes()` with `value()`, the schema is declared in the `nodes()`
    method only. This is because the `value()` method is run against the logical representation
    of instances, as opposed to the original XML document.


    ```

    SELECT

    plan_id

    ,nodes.query_plan.value(''@Table[1]'', ''nvarchar(128)'') AS TableRef

    ,nodes.query_plan.value(''@Column[1]'', ''nvarchar(128)'') AS ColumnRef

    FROM

    (

    SELECT plan_id, CAST(query_plan AS XML) query_plan_xml

    FROM sys.query_store_plan

    ) base

    CROSS APPLY query_plan_xml.nodes(''declare namespace

    qplan="http://schemas.microsoft.com/sqlserver/2004/07/showplan";

    //qplan:ColumnReference'') as nodes(query_plan) ;

    Listing 1-21

    Using the value() and nodes() Methods

    ```'
