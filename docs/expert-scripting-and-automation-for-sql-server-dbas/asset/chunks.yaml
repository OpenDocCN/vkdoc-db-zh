  trans: '# 库存数据库平台设计


    ## 概述


    在设计库存数据库本身之前，您应首先考虑数据库的平台要求，例如**可用性**。例如，假设您的组织拥有四个数据中心，分散在英国和美国，并且在 Azure 中也有业务存在。这如图
    8-1 所示。您已决定将库存数据库放置在英国的一个管理实例上。如果发生 `UK Primary` 数据中心与其他网络连接中断的情况，将会怎样？`UK` 中的
    SQL Server 实例将继续能看到库存数据库，但其他三个数据中心的实例将无法看到。如果您的库存数据库被用作控制自动化的中心，这种情况可能会引发真正的问题。如果您正全员出动，忙于应对数据中心中断故障，并可能为数十个数据层应用程序调用灾难恢复策略，那么您最不希望担心的事情可能就是：由于维护作业无法运行，用户抱怨整个企业的其他部分出现性能问题。


    ![](img/395785_2_En_8_Fig1_HTML.jpg)


    图 8-1：展示使用 Azure 的云计算基础设施的流程图。该图显示了两个主要区域：美国西部和英国南部，每个区域都有托管服务器和数据库。美国西部和英国南部连接到它们各自的主站点和辅助站点，分别标记为美国主站点、美国辅助站点、英国主站点和英国辅助站点，每个站点都包含托管服务器。该流程图代表了服务器和数据库在不同地理位置上的分布和管理。


    ## 示例拓扑


    解决此问题的方法在于冗余。具体而言，可以使用 SQL Server `AlwaysOn 可用性组` 在两个位置之间同步您的库存数据库。您可以构建一个跨越两个数据中心的本地
    `AlwaysOn 可用性组`，或者如本例所示，如果组织在公有云中有业务存在，您可以在 Azure 的两个区域之间构建一个 `可用性组`。


    ## 解决方案


    如果您选择将库存数据库托管在 Azure 中，您可以在 `IaaS`（基础设施即服务）上构建 `可用性组`，或者利用 Azure 的 `PaaS`（平台即服务）或
    `DBaaS`（数据库即服务）产品。


    ### IaaS


    如果您选择使用 `IaaS`，那么您将在 Azure 中构建虚拟机，并负责手动配置 `可用性组`。


    ### PaaS


    如果您选择使用 `PaaS` 产品，那么您将考虑 Azure 托管实例。在这里，您不直接操作虚拟机，而是购买一个 SQL Server 实例作为服务。这减少了管理开销，因为它提供了自动修补、版本更新和自动备份，并完全消除了
    Windows 管理。自动故障转移组也可用于管理库存数据库在 Azure 区域间的地理分散部署。


    **注意**：Azure SQL 数据库可能不适合您的库存数据库；尽管您可能可以使用弹性作业，但使用托管实例会更易于管理。


    Azure SQL 数据库是 Azure 提供的数据库即服务产品。选择此选项，您购买的是一个数据库。这完全消除了管理 Windows 操作系统和 SQL Server
    实例的需求。然而，在我们的场景中，Azure SQL 数据库可能不是一个好的选择，因为我们希望将数据库用作自动化的中心，这意味着需要创建 SQL Server
    Agent 作业。这些作业在 Azure SQL 数据库中不受支持，因为它们属于实例级别的对象。


    **提示**：对 `AlwaysOn 可用性组` 的完整讨论超出了本书范围。但是，完整细节可以在 Apress 出版的 *SQL Server 2022 AlwaysOn*
    一书中找到，链接为：link.springer.com/book/10.1007/978-1-4842-8864-1。


    # 库存数据库逻辑设计


    在设计任何数据库时，首要任务应是确定需要存储哪些数据。先不要考虑表设计，只需考虑需要的数据——以扁平列表形式列出。对于数据库开发人员，这需要与业务分析师或业务利益相关者沟通以确定需求。对于应用程序开发人员，此任务通常由他们选择的框架（如
    Entity Framework）处理。然而，希望建立库存数据库的 DBA 将同时扮演开发人员和业务利益相关者的角色。以下是一份您可能希望记录的属性列表。当然，此列表应根据您的具体需求进行调整。


    *   `服务器名称`

    *   `实例名称`

    *   `端口`

    *   `IP 地址`

    *   `服务账户名称和密码`

    *   `身份验证模式`

    *   `sa 账户名称和密码`

    *   `集群标志`

    *   `Windows 版本`

    *   `SQL Server 版本`

    *   `灾难恢复服务器名称`

    *   `灾难恢复实例名称`

    *   `灾难恢复技术`

    *   `目标恢复点目标`

    *   `目标恢复时间目标`

    *   `实例分类`

    *   `服务器核心数`

    *   `实例核心数`

    *   `服务器内存`

    *   `实例内存`

    *   `虚拟化标志`

    *   `虚拟机监控程序`

    *   `SQL Server Agent 账户名称和密码`

    *   `应用程序所有者`

    *   `应用程序所有者电子邮件`'
- fmt: '### Normalization


    Now that we have identified the data (known as attributes) that we need to store,
    we have to group these attributes together into related groups. Each of these
    groups is called an entity, and the attributes are, in fact, attributes of the
    resulting entities.


    The process for modeling the entities is known as *normalization*. This is a process
    that was invented by Edgar F. Codd in 1970 and has endured the test of time, although
    additional normal forms were added over the subsequent decade.


    There are eight normal forms in total, which are listed as follows:


    *   1NF (first normal form)

    *   2NF (second normal form)

    *   3NF (third normal form – this is the last of the original normal forms, as
    defined by Edgar Codd)

    *   BCNF (Boyce-Codd normal form, also known as 3.5 normal form)

    *   4NF (fourth normal form)

    *   5NF (fifth normal form)

    *   6NF (sixth normal form)

    *   DKNF (domain key normal form)


    The normal forms BCNF to DKNF deal with special circumstances, and the majority
    of the time, if a database is in 3NF, it will also be in DKNF. For this reason,
    the following sections will discuss the first three normal forms only.


    The reason for modeling a database with normalization is to reduce data redundancy,
    meaning that every piece of data should be stored only once, with the exception
    of a unique key, which is used to identify the data. This is less about saving
    storage space (although this has obvious cost and performance benefits) and more
    about avoiding database anomalies that may be caused by having to update data
    in more than one place. It also avoids the complexities and overheads associated
    with avoiding these anomalies.


    **Tip**


    Normalization is only suitable for OLTP (Online Transactional Processing) databases.
    Data Warehouses and Data Marts should be denormalized for performance. Therefore,
    they should be modeled using techniques such as Kimball methodology. An ODS (Operational
    Data Store) will also have to be modeled differently, usually based on the heterogeneous
    sources that it unites.


    The objectives of modeling data in 1NF are to ensure that values are atomic, that
    repeating groups of attributes are moved to separate entities, and that all attributes
    are dependent on a key (also known as the prime attribute). The objective of modeling
    data into 2NF is to ensure that all non-prime attributes are dependent on all
    prime attributes within the entity. The objective of modeling data into 3NF is
    to ensure that no non-prime attributes are dependent on any other non-prime attributes.
    I like to remember this by using the phrase “first, second, and third normal forms
    ensure that all attributes are dependent on the key, the whole key, and nothing
    but the key.”


    #### 1NF


    The first step in our normalization journey is to move the required attributes
    into first normal form (1NF). To do this, we must ensure that each attribute is
    atomic (holds only one piece of information) and that each attribute is dependent
    upon a key. In this phase, we will also break out repeating groups to new entities.
    So, first, let’s break out the repeating groups. We will do this by starting with
    the first attribute (`Server name`) and then asking the following question about
    each other attribute: “Can we have more than one per server?” Table 8-1 answers
    this question for each attribute.


    **Table 8-1**


    **Can There Be More Than One per Server Name?**


    | Attribute | More Than One per Server? |

    | --- | --- |

    | `Instance name` | Yes |

    | `Port` | Yes |

    | `IP Address` | Yes |

    | `Service account name and password` | Yes |

    | `Authentication mode` | Yes |

    | `sa account name and password` | Yes |

    | `Cluster flag` | No |

    | `Windows version` | No |

    | `SQL Server version` | No (technically possible, but against most corporate
    policies) |

    | `DR Server` | Yes |

    | `DR instance` | Yes |

    | `DR technology` | Yes |

    | `Target RPO` | Yes |

    | `Target RTO` | Yes |

    | `Instance classification` | Yes |

    | `Server cores` | No |

    | `Instance cores` | Yes |

    | `Server RAM` | No |

    | `Instance RAM` | Yes |

    | `Virtual flag` | No |

    | `Hypervisor` | No |

    | `SQL Server Agent account name and password` | Yes |

    | `Application owner` | No |

    | `Application owner e-mail` | No |


    Any attribute for which the answer to the question is no will remain within the
    same entity as `Server name` in this phase of normalization. Therefore, we know
    that our first entity will contain the following attributes:


    *   `Server name`

    *   `Cluster flag`

    *   `Windows version`

    *   `SQL Server version`

    *   `Server cores`

    *   `Server RAM`

    *   `Virtual flag`

    *   `Hypervisor`

    *   `Application owner`

    *   `Application owner e-mail`


    We should give this entity a meaningful name, so we will call it `Server`. We
    should now ensure that each attribute in the `Server` entity is dependent on a
    key. A key should uniquely identify any row, and `Server name` will fulfill this
    requirement. Therefore, we will make `Server name` the key (prime) attribute.
    We can see that each attribute contains only a single value, meaning that we are
    also fulfilling the requirement to be autonomous.


    If we look at the remaining attributes, we can see that they naturally fall together
    into two groups: `Instance` and `DR Server`. Therefore, we will break the rest
    of the attributes out to new entities that align with these repeating groups.


    First, let’s look at the `Instance` entity, which will contain the following attributes:


    *   `Instance name`

    *   `Port`

    *   `IP Address`

    *   `Service account name and password`

    *   `Authentication mode`

    *   `sa account name and password`

    *   `Instance classification`

    *   `Instance cores`

    *   `Instance RAM`

    *   `SQL Server Agent account name and password`


    We will have to add the `Server name` attribute to the `Instance` entity, so that
    we can link the entities together. In this entity, we can also easily identify
    three attributes that do not contain atomic values: `sa account name and password`,
    `Service account name and password`, and `SQL Server Agent account name and password`.
    Each of these attributes contains two values: the account name and the password.
    Therefore, the columns should be broken up, giving the following set of attributes:


    *   `Instance name`

    *   `Server name`

    *   `Port`

    *   `IP Address`

    *   `Service account name`

    *   `Service account password`

    *   `Authentication mode`

    *   `sa account name`

    *   `sa password`

    *   `Instance classification`

    *   `Instance cores`

    *   `Instance RAM`

    *   `Additional services`

    *   `SQL Server Agent account name`

    *   `SQL Server Agent account password`


    In regard to a key, all attributes can be uniquely identified by the `Instance
    name`. Therefore, an instance name will become the key of the entity.


    **Tip**'
