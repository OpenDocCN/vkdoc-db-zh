  trans: "\n\n### 移除即席查询计划\n\n即席查询计划会消耗内存且可能用处有限。如果它们没有被重用，移除这些即席查询计划是个好主意。清单 7-1\
    \ 中的查询演示了如何使用查询存储元数据从缓存中清除不需要的即席查询计划。\n\n脚本的第一部分针对 `sys.databases` 目录视图运行一个查询，以返回实例上的数据库列表。查询存储可以在数据库级别启用或禁用，并且不能在\
    \ `master` 或 `TempDB` 系统数据库上启用。在 SQL Server 2022 中，查询存储默认启用，但之前版本是默认禁用的。因此，该查询会筛选掉\
    \ `database_id` 小于 3 的数据库以及任何已禁用查询存储的数据库。\n\n#### 处理查询结果的两种方式\n\n`Invoke-DbaQuery`\
    \ 命令的输出是一个对象（或对象数组），该对象具有多个属性。查询结果中的每个列都对应一个属性，此外还有一些额外属性。\n\n因此，要在进一步处理中使用此结果，需要提取所需的属性。这可以通过两种不同的方式完成，各有优缺点：\n\
    \n1.  **立即方式** – 通过将结果通过管道传递给 `Select-Object` cmdlet，例如：\n\n    ```\n    $databases\
    \ = Invoke-DbaQuery @GetDatabaseParams | Select-Object -ExpandProperty Name\n\
    \    ```\n\n    这种方式使得 `$database` 保持简单；它最终只是一个数据库名称的数组。\n\n2.  **在使用时方式** – 通过使用\
    \ `foreach` 循环遍历每个对象，例如：\n\n    ```\n    foreach ($database in $databases.Name)\
    \ { ... }\n    ```\n\n    这种方法意味着在后续任何时候，你都可以利用查询返回的所有数据，包括元数据。\n\n当 PowerShell\
    \ 显示对象时，默认情况下并不总是显示其所有属性。要查看对象的所有属性，可以将其通过管道传递给 `Select-Object *`，例如：\n\n```\n\
    Invoke-DbaQuery @GetDatabaseParams | Select-Object *\n```\n\n脚本的第二部分将数据库名称传递到一个\
    \ `foreach` 循环中，并针对每个数据库执行一个 SQL 脚本。这种技术为在实例中的每个数据库上运行相同命令提供了一种有用的机制，我强烈推荐使用这种使用\
    \ `FOR XML PATH('')` 技术（在第 1 章中描述）的方法，而不是未公开的系统存储过程 `sp_MSForeachdb`，后者可能不可靠。我们还可以通过使用第\
    \ 10 章中讨论的技术来扩展此脚本，使其在企业中的所有实例上运行。\n\n```\n$GetDatabaseParams = @{\n    SqlInstance\
    \ = \"localhost\"\n    Query       = \"\n    SELECT name\n    FROM sys.databases\n\
    \    WHERE database_id > 2\n      AND is_query_store_on = 1\n    \"\n}\n$databases\
    \ = Invoke-DbaQuery @GetDatabaseParams | Select-Object -ExpandProperty Name\n\
    $params = @{\n    SqlInstance = \"localhost\"\n    Query       = \"\n    DECLARE\
    \ @SQL NVARCHAR(MAX)\n    SELECT @SQL = (\n        SELECT 'EXEC sp_query_store_remove_query\
    \ '\n               + CAST(qsq.query_id AS NVARCHAR(6)) + ';' AS [data()]\n  \
    \      FROM sys.query_store_query_text AS qsqt\n        JOIN sys.query_store_query\
    \ AS qsq\n          ON qsq.query_text_id = qsqt.query_text_id\n        JOIN sys.query_store_plan\
    \ AS qsp\n          ON qsp.query_id = qsq.query_id\n        JOIN sys.query_store_runtime_stats\
    \ AS qsrs\n          ON qsrs.plan_id = qsp.plan_id\n        GROUP BY qsq.query_id\n\
    \        HAVING SUM(qsrs.count_executions) = 1\n           AND MAX(qsrs.last_execution_time)\
    \ < DATEADD (HH, -24, GETUTCDATE())\n        ORDER BY qsq.query_id\n        FOR\
    \ XML PATH('')\n    ) ;\n    EXEC(@SQL) ;\n    \"\n}\nforeach ($database in $databases)\
    \ {\n    Invoke-DbaQuery @params -Database $database\n}\n```\n*清单 7-1 移除即席查询计划*\n\
    \n针对每个数据库运行的查询使用了 `data()` 方法进行迭代，以构建一个可以使用动态 SQL 执行的字符串，最后使用 `EXEC` 语句执行该脚本。查询使用的元数据对象描述如下。\n\
    \n`sys.query_store_query_text` 目录视图公开了存储中每个 T-SQL 语句的文本和句柄。它返回表 7-1 中详述的列。\n\n\
    **表 7-1 `sys.query_store_query_text` 返回的列**\n\n| 列名 | 描述 |\n| --- | --- |\n| `query_text_id`\
    \ | 主键 |\n| `query_sql_text` | 查询的 T-SQL 文本 |\n| `statement_sql_handle` | 查询的\
    \ SQL 句柄 |\n| `is_part_of_encrypted_module` | SQL 文本是否属于加密的可编程对象 |\n| `has_restricted_text`\
    \ | SQL 文本是否包含无法显示的敏感信息，例如密码 |\n\n`sys.query_store_query` 目录视图通过每个视图中的 `query_text_id`\
    \ 列与 `sys.query_store_query_text` 目录视图联接。它还通过每个对象中的 `context_settings_id` 列与 `sys.query_context_settings`\
    \ 联接。`sys.query_store_query` 返回查询的详细信息，包括聚合的统计信息。返回的列详见表 7-2。\n\n**表 7-2 `sys.query_store_query`\
    \ 返回的列**\n\n"
