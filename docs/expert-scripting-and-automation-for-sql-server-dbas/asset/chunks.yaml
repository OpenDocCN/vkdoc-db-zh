  trans: '### Invoke-SqlCmd 基础用法


    `Invoke-SqlCmd` 最基本的调用方式涉及传递两个参数：`ServerInstance`（定义查询应针对哪个 SQL Server 实例运行）和
    `Query`（提供要执行的查询语句）。清单 4-2 演示了如何使用此基本调用从本地服务器的默认实例返回数据库名称列表。`ServerInstance` 参数的可能格式包括
    `ServerName` 和 `ServerName\InstanceName`。如果你希望针对本地服务器的默认实例运行查询，则可以使用 `localhost`、`.`
    或完全省略 `ServerInstance` 参数。


    提示


    以下示例假设使用 Windows 身份验证。如果应使用 SQL 身份验证，则还需要传递用户凭据。


    如果你使用的是 `sqlServer` 模块的 v22 或更高版本且未配置加密，则将需要 `-TrustServerCertificate` 参数。


    ```

    Invoke-SqlCmd -ServerInstance localhost -Query "SELECT name FROM sys.databases"
    -TrustServerCertificate

    清单 4-2

    Invoke-SqlCmd 的基本调用

    ```


    ### 将 Invoke-SqlCmd 用于脚本编写


    现在我们已经将数据库列表显示在屏幕上，这对于临时的 DBA 活动来说既很棒又确实有用。如果我们计划在脚本中使用 `Invoke-SqlCmd`，那么我们很可能会希望将查询结果传递到一个变量中。


    清单 4-3 中的脚本演示了如何做到这一点，但它也引入了一种称为**拼接**的技术。该技术会构建一个哈希表，其中包含键/值对，这些键/值对应于我们计划传递给命令的参数名称和值。当我们执行命令时，我们只需传递该哈希表，PowerShell
    就会展开其中的参数名称和值。在功能上，这等同于以通常的方式将每个参数传递给命令。拼接的好处在于它使命令更简洁、更易于阅读。日后查找和管理参数值也更容易。


    ```

    $Params = @{

    ServerInstance = "localhost"

    Query          = "SELECT name FROM sys.databases"

    }

    $Databases = Invoke-Sqlcmd @Params

    清单 4-3

    将 Invoke-SqlCmd 结果传递给变量

    ```


    需要注意的是，`Invoke-SqlCmd` 命令的结果是一个对象或对象数组。默认情况下，输出为 `DataRow` 对象，尽管可以使用 `OutputAs`
    参数将输出更改为 `DataSet` 或 `DataTables` 格式。这意味着你需要使用丰富对象的属性，而不是对象本身。例如，考虑清单 4-4 中的脚本，它将
    `$Databases` 变量传递给 `foreach` 循环，并将每个对象写入屏幕。


    提示


    `foreach` 循环在第 2 章介绍。


    ```

    $Params = @{

    ServerInstance = "localhost"

    Query          = "SELECT name FROM sys.databases"

    }

    $Databases = Invoke-Sqlcmd @Params

    foreach ($Database in $Databases) {

    Write-Host $Database

    }

    清单 4-4

    将丰富对象传递给 foreach 循环

    ```


    运行此脚本的结果显示如下：


    ```

    System.Data.DataRow

    System.Data.DataRow

    System.Data.DataRow

    System.Data.DataRow

    System.Data.DataRow

    ```


    相反，我们应该使用丰富对象的属性。在这个特定情况下，我们返回的列名为 `name`；因此，我们应该使用 `name` 属性，如清单 4-5 所示。


    ```

    $Params = @{

    ServerInstance = "localhost"

    Query          = "SELECT name FROM sys.databases"

    }

    $Databases = Invoke-Sqlcmd @Params

    foreach ($Database in $Databases) {

    Write-Host $Database.name

    }

    清单 4-5

    使用对象属性

    ```


    此脚本将返回更有用的结果，如下所示：


    ```

    master

    tempdb

    model

    msdb

    WideWorldImporters

    ```


    这一点自然引出了如何使用 `Invoke-SqlCmd` 返回的数据的讨论。在上面的例子中，我们一直返回我们实例上存在的数据库列表。想象一下，你有一个脚本，它将根据碎片化阈值动态重建索引，例如清单
    4-6 中的脚本。


    提示


    创建动态索引重建脚本和其他元数据驱动的自动化将在第 7 章中更详细地讨论。


    ```

    DECLARE @SQL NVARCHAR(MAX)

    SET @SQL =

    (

    SELECT ''ALTER INDEX ''

    + QUOTENAME(i.name)

    + '' ON '' + s.name

    + ''.''

    + QUOTENAME(OBJECT_NAME(i.object_id))

    + '' REBUILD ; ''

    FROM sys.dm_db_index_physical_stats(DB_ID(),NULL,NULL,NULL,''DETAILED'') ps

    INNER JOIN sys.indexes i

    ON ps.object_id = i.object_id

    AND ps.index_id = i.index_id

    INNER JOIN sys.objects o

    ON ps.object_id = o.object_id

    INNER JOIN sys.schemas s

    ON o.schema_id = s.schema_id

    WHERE index_level = 0

    AND avg_fragmentation_in_percent > 25

    FOR XML PATH('''')

    ) ;

    EXEC(@SQL) ;

    清单 4-6

    动态索引重建

    ```


    提示


    使用 `FOR XML PATH` 在 T-SQL 中高效循环的内容将在第 1 章进一步解释。


    一个包含数据库列表的变量将允许我们安排此脚本针对我们实例上的每个数据库运行，而无需维护一个静态的数据库列表。此技术在清单 4-7 中演示。


    ```

    $Params = @{

    ServerInstance = "localhost"

    Query          = "SELECT name FROM sys.databases"

    }

    $Databases = Invoke-Sqlcmd @Params

    foreach ($Database in $Databases) {

    $Params = @{

    ServerInstance = "localhost"

    Database       = $Database.name

    InputFile      = "c:\scripts\IndexRebuild.sql"

    }

    Invoke-Sqlcmd @Params

    }

    清单 4-7

    对所有数据库运行脚本

    ```


    关于此脚本，有几个关键点需要考虑。首先，请注意我们正在使用 `Invoke-SqlCmd` cmdlet 的 `Database` 参数。我们在 `foreach`
    循环的每次迭代中传入 `Database` 对象的 `name` 属性。


    其次，虽然在技术上可以将索引重建脚本直接传递到 `Invoke-SqlCmd` 的 `Query` 参数，但此脚本对于这种方法来说相当大，并且会使我们的脚本难以维护。因此，我们将脚本保存在一个名为
    `c:\scripts\IndexRebuild.sql` 的文件中，并使用 `InputFile` 参数将此文件传递给 cmdlet。'
- fmt: "### Working with Parameters\n\n当然，虽然这个脚本已经变得相当有用，但如果它能接受变量，就会更加实用。在这种情况下，变量最明显的用例是碎片化阈值，但我们可能还想增强脚本以重建那些受外部碎片影响的索引。因此，清单\
    \ [4-8](#395785_2_En_4_Chapter.xhtml#PC11) 更新了 `IndexRebuild.sql` 脚本以包含 `avg_page_space_used_in_percent`，并期望将变量传递到\
    \ `WHERE` 子句中。请注意，变量的格式是 SQLCMD 格式的 `$(Variable)`。\n\n```sql\nDECLARE @SQL NVARCHAR(MAX)\n\
    SET @SQL =\n(\nSELECT 'ALTER INDEX '\n+ QUOTENAME(i.name)\n+ ' ON ' + s.name\n\
    + '.'\n+ QUOTENAME(OBJECT_NAME(i.object_id))\n+ ' REBUILD ; '\nFROM sys.dm_db_index_physical_stats(DB_ID(),NULL,NULL,NULL,'DETAILED')\
    \ ps\nINNER JOIN sys.indexes i\nON ps.object_id = i.object_id\nAND ps.index_id\
    \ = i.index_id\nINNER JOIN sys.objects o\nON ps.object_id = o.object_id\nINNER\
    \ JOIN sys.schemas s\nON o.schema_id = s.schema_id\nWHERE index_level = 0\nAND\
    \ (avg_fragmentation_in_percent > $(Fragmentation)\nOR avg_page_space_used_in_percent\
    \ < $(PageSpace))\nFOR XML PATH('')\n) ;\nEXEC(@SQL) ;\n```\n清单 4-8\n更新脚本以期望变量\n\
    \n`Invoke-SqlCmd` 允许通过 `Variable` 参数使用 `VARIABLE='Value'` 格式传递 SQLCMD 变量。如清单 [4-9](#395785_2_En_4_Chapter.xhtml#PC12)\
    \ 所示。\n\n```powershell\n$Variables = \"Fragmentation=25\", \"PageSpace=70\"\n\
    $Params = @{\nServerInstance = \"localhost\"\nQuery          = \"SELECT name FROM\
    \ sys.databases\"\n}\n$Databases = Invoke-Sqlcmd @Params\nforeach ($Database in\
    \ $Databases) {\n$Params = @{\nServerInstance = \"localhost\"\nDatabase      \
    \ = $Database.name\nInputFile      = \"c:\\scripts\\IndexRebuild.sql\"\nVariable\
    \       = $Variables\n}\nInvoke-Sqlcmd @Params\n}\n```\n清单 4-9\n将变量传递给 Invoke-SqlCmd\n\
    \n在这个脚本中，我们首先创建一个字符串数组，其中包含我们想要传递的每个变量。然后，我们将这个数组传递给 `Variable` 参数。\n\n> 提示\n\
    > \n> 如果我们运行索引重建等维护任务，那么配置超时会很有帮助。`Invoke-SqlCmd` 支持 `ConnectionTimeout` 和 `QueryTimeout`\
    \ 参数，允许你以秒为单位指定超时值。\n\n### 输出错误\n\n`Invoke-SqlCmd` 有许多参数，虽然不如我们到目前为止讨论的那些常用，但同样有用。例如，假设我们在用于返回数据库名称列表的查询中有一个错误。我们可以使用\
    \ `OutputSqlErrors` 参数来返回错误。如清单 [4-10](#395785_2_En_4_Chapter.xhtml#PC13) 所示。我们预计这个查询会失败，因为\
    \ `WHERE` 子句中的列应该是 `database_id`，而不是 `db_id`。第一次调用 `Invoke-SqlCmd` 会成功，但 `$Databases`\
    \ 参数将为空。第二次调用 `Invoke-SqlCmd` 将告诉我们错误。\n\n```powershell\n$Params = @{\nServerInstance\
    \   = \"localhost\"\nQuery            = \"SELECT name FROM sys.databases WHERE\
    \ db_id = 1\"\nOutputSqlErrors = $false\n}\n$Databases = Invoke-Sqlcmd @Params\n\
    $Params = @{\nServerInstance   = \"localhost\"\nQuery            = \"SELECT name\
    \ FROM sys.databases WHERE db_id = 1\"\nOutputSqlErrors = $true\n}\n$Databases\
    \ = Invoke-Sqlcmd @Params\n```\n清单 4-10\n输出错误消息\n\n第二次调用返回的错误如下所示：\n\n```powershell\n\
    Invoke-Sqlcmd : Invalid column name 'db_id'.\nAt line:15 char:14\n+ $Databases\
    \ = Invoke-Sqlcmd @Params\n+              ~~~~~~~~~~~~~~~~~~~~~\n+ CategoryInfo\
    \          : InvalidOperation: (:) [Invoke-Sqlcmd], SqlPowerShellSqlExecutionException\n\
    + FullyQualifiedErrorId : SqlError,Microsoft.SqlServer.Management.PowerShell.GetScriptCommand\n\
    ```\n\n### 将结果写入文件\n\n没有直接允许你将查询结果发送到文件的参数；但是，可以通过将 `Invoke-SqlCmd` 的结果通过管道传输到\
    \ `Out-File` cmdlet 来实现相同的目的。如清单 [4-11](#395785_2_En_4_Chapter.xhtml#PC15) 所示，它将数据库列表写入名为\
    \ `c:\\scripts\\DatabasesOut.txt` 的文件。\n\n```powershell\n$Params = @{\nServerInstance\
    \  = \"localhost\"\nQuery           = \"SELECT name FROM sys.databases\"\n}\n\
    Invoke-Sqlcmd @Params | Out-File -FilePath \"c:\\scripts\\DatabasesOut.txt\"\n\
    ```\n清单 4-11\n将结果输出到文件\n\n> 提示\n> \n> 对于许多用例，最好先将结果通过管道传输到 `ConvertTo-Csv`，然后再传输到\
    \ `Out-File`，但这会产生将 NULL 值转换为 `System.Byte[]` 的副作用。\n\n### 用户执行上下文\n\n到目前为止的所有示例都使用了\
    \ Windows 身份验证。也就是说，T-SQL 脚本是在交互式运行 PowerShell 的 Windows 用户的安全上下文下执行的，并假设该 Windows\
    \ 用户在 SQL Server 中具有执行查询的适当权限。\n\n然而，情况并非总是如此，特别是当脚本被安排为无人值守运行时，而不是由人交互式运行时。在这些场景中，可以使用\
    \ SQL Server 身份验证（即 SQL Server 登录名和密码）来验证 SQL Server。\n\n要以这种方式进行身份验证，你可以使用 `Username`\
    \ 和 `Password` 参数，或者使用 `Credential` 参数，后者将用户名和密码作为 `PSCredential` 对象传递。首先，让我们检查\
    \ `Username` 和 `Password` 参数。假设存在一个名为 `Pete`、密码为 `Pa$$w0rd` 的 SQL 登录名，我们可以使用清单\
    \ [4-12](#395785_2_En_4_Chapter.xhtml#PC16) 中的脚本来检索数据库名称列表。\n\n```powershell\n\
    $Params = @{\nServerInstance  = \"localhost\"\nQuery           = \"SELECT name\
    \ FROM sys.databases\"\nUsername        = \"Pete\"\nPassword        = 'Pa$$w0rd'\n\
    }\nInvoke-Sqlcmd @Params\n```\n清单 4-12\n使用用户名和密码参数\n\n这是一个简单的方法，但不是很安全，因为用户名和密码将以明文形式发送到\
    \ SQL Server 实例。如果命令是从本地服务器运行的，这可能没问题，但明文凭据绝不应通过网络发送。因此，另一种方法是使用 `Credential`\
    \ 参数，如清单 [4-13](#395785_2_En_4_Chapter.xhtml#PC17) 所示。\n\n```powershell\n$UserName\
    \ = 'Pete'\n$SecurePassword = ConvertTo-SecureString 'Pa$$w0rd' -AsPlainText -Force\n\
    $Credential = [PSCredential]::new($UserName, $SecurePassword)\n$Params = @{\n\
    ServerInstance  = \"localhost\"\nQuery           = \"SELECT name FROM sys.databases\"\
    \nCredential      = $Credential\n}\nInvoke-Sqlcmd @Params\n```\n清单 4-13\n使用凭据参数进行身份验证\n\
    \n该脚本首先创建 `$UserName` 和 `$Password` 变量。密码被创建为安全字符串。然后，这些变量用于创建一个 `PSCredential`\
    \ 对象，该对象被传递给 `Invoke-SqlCmd` 的 `Credential` 参数。\n\n## 管理安全对象\n\n`sqlserver` 模块提供的不仅仅是\
    \ `Invoke-SqlCmd`，它还包含用于执行常见管理任务的定制 cmdlet。这包括一组用于管理安全对象（包括登录名和凭据）的 cmdlet。然而，该模块在处理数据库用户和权限方面的功能有些有限；因此，我们需要直接与\
    \ SMO（SQL Server 管理对象——`sqlserver` 模块所基于的库）交互来管理这些方面。以下部分将讨论这些主题。\n\n> 提示\n> \n\
    > 对每个安全对象及其注意事项的详细讨论超出了本书的范围，但可以在 Apress 书籍 *Securing SQL Server* 中找到，链接如下：[`www.apress.com/gb/book/9781484222652`](http://www.apress.com/gb/book/9781484222652)。"
  raw: '### Working with Parameters


    Of course, while this script is already becoming rather useful, it would be even
    more useful if it could accept variables. In this case, the most obvious use case
    for a variable would be the fragmentation threshold, but we may also want to enhance
    the script to also rebuild indexes that are suffering from external fragmentation.
    Therefore, Listing [4-8](#395785_2_En_4_Chapter.xhtml#PC11) updates the `IndexRebuild.sql`
    script to include `avg_page_space_used_in_percent` and expect variables to be
    passed to the `WHERE` clause. Note that the format of the variables is the SQLCMD
    format of `$(Variable)`.


    ```

    DECLARE @SQL NVARCHAR(MAX)

    SET @SQL =

    (

    SELECT ''ALTER INDEX ''

    + QUOTENAME(i.name)

    + '' ON '' + s.name

    + ''.''

    + QUOTENAME(OBJECT_NAME(i.object_id))

    + '' REBUILD ; ''

    FROM sys.dm_db_index_physical_stats(DB_ID(),NULL,NULL,NULL,''DETAILED'') ps

    INNER JOIN sys.indexes i

    ON ps.object_id = i.object_id

    AND ps.index_id = i.index_id

    INNER JOIN sys.objects o

    ON ps.object_id = o.object_id

    INNER JOIN sys.schemas s

    ON o.schema_id = s.schema_id

    WHERE index_level = 0

    AND (avg_fragmentation_in_percent > $(Fragmentation)

    OR avg_page_space_used_in_percent < $(PageSpace))

    FOR XML PATH('''')

    ) ;

    EXEC(@SQL) ;

    Listing 4-8

    Update Script to Expect Variable

    ```


    `Invoke-SqlCmd` allows SQLCMD variables to be passed, using the `VARIABLE=''Value''`
    format, via the `Variable` parameter. This is demonstrated in Listing [4-9](#395785_2_En_4_Chapter.xhtml#PC12).


    ```

    $Variables = "Fragmentation=25", "PageSpace=70"

    $Params = @{

    ServerInstance = "localhost"

    Query          = "SELECT name FROM sys.databases"

    }

    $Databases = Invoke-Sqlcmd @Params

    foreach ($Database in $Databases) {

    $Params = @{

    ServerInstance = "localhost"

    Database       = $Database.name

    InputFile      = "c:\scripts\IndexRebuild.sql"

    Variable       = $Variables

    }

    Invoke-Sqlcmd @Params

    }

    Listing 4-9

    Passing a Variable to Invoke-SqlCmd

    ```


    In this script, we start by creating a string array, which contains each of our
    variables, which we want to pass. We then pass this array to the `Variable` parameter.


    Tip


    If we are running maintenance tasks such as index rebuilds, then it can be helpful
    to configure timeouts. `Invoke-SqlCmd` supports both `ConnectionTimeout` and `QueryTimeout`
    parameters, which allow you to specify timeout values in seconds.


    ### Outputting Errors


    Invoke-SqlCmd has many parameters, which are less commonly used than those we
    have discussed so far, but no less useful. For example, imagine we had a bug in
    the query that we are using to return a list of database names. We could use the
    `OutputSqlErrors` parameter to return the error. This is demonstrated in Listing
    [4-10](#395785_2_En_4_Chapter.xhtml#PC13). We would expect this query to fail
    because the column in the `WHERE` clause should be `database_id`, not `db_id`.
    The first invocation of Invoke-SqlCmd will succeed, but the $Databases parameter
    will be empty. The second invocation of Invoke-SqlCmd will tell us the error.


    ```

    $Params = @{

    ServerInstance   = "localhost"

    Query            = "SELECT name FROM sys.databases WHERE db_id = 1"

    OutputSqlErrors = $false

    }

    $Databases = Invoke-Sqlcmd @Params

    $Params = @{

    ServerInstance   = "localhost"

    Query            = "SELECT name FROM sys.databases WHERE db_id = 1"

    OutputSqlErrors = $true

    }

    $Databases = Invoke-Sqlcmd @Params

    Listing 4-10

    Output Error Messages

    ```


    The error returned by the second invocation is shown below:


    ```

    Invoke-Sqlcmd : Invalid column name ''db_id''.

    At line:15 char:14

    + $Databases = Invoke-Sqlcmd @Params

    +              ~~~~~~~~~~~~~~~~~~~~~

    + CategoryInfo          : InvalidOperation: (:) [Invoke-Sqlcmd], SqlPowerShellSqlExecutionException

    + FullyQualifiedErrorId : SqlError,Microsoft.SqlServer.Management.PowerShell.GetScriptCommand

    ```


    ### Writing Results to a File


    There is not a parameter which will allow you to send query results directly to
    a file; however, the same ends can be achieved by piping the results of Invoke-SqlCmd
    to the Out-File cmdlet. This is demonstrated in Listing [4-11](#395785_2_En_4_Chapter.xhtml#PC15),
    which writes the list of databases to a file called c:\scripts\DatabasesOut.txt.


    ```

    $Params = @{

    ServerInstance  = "localhost"

    Query           = "SELECT name FROM sys.databases"

    }

    Invoke-Sqlcmd @Params | Out-File -FilePath "c:\scripts\DatabasesOut.txt"

    Listing 4-11

    Outputting Results to a File

    ```


    Tip


    For many use cases, it will be better to pipe the results into ConvertTo-Csv before
    piping into Out-File, but this does have the side effect of converting NULL values
    to System.Byte[ ].


    ### User Execution Context


    All of the examples thus far have used Windows authentication. That is, the T-SQL
    scripts have been executed under the security context of the Windows user that
    is interactively running PowerShell and assume that Windows user has the appropriate
    permissions within SQL Server to execute the query.


    This may not always be the case, however, especially if the script is being scheduled
    to run unattended, as opposed to being run interactively by a human. In these
    scenarios, it is possible to authenticate to SQL Server using SQL Server authentication,
    that is, a SQL Server Login and password.


    To authenticate in this manner, you can use the `Username` and `Password` parameters,
    or you can use the `Credential` parameter, which passes the username and password
    as a `PSCredential` object. First, let’s examine the `Username` and `Password`
    parameters. Assuming that a SQL Login exists, called `Pete`, with a password of
    `Pa$$w0rd`, we can use the script in Listing [4-12](#395785_2_En_4_Chapter.xhtml#PC16)
    to retrieve a list of database names.


    ```

    $Params = @{

    ServerInstance  = "localhost"

    Query           = "SELECT name FROM sys.databases"

    Username        = "Pete"

    Password        = ''Pa$$w0rd''

    }

    Invoke-Sqlcmd @Params

    Listing 4-12

    Using the Username and Password Parameters

    ```


    This is a simple approach, but not very secure, as the username and password will
    be sent by clear text to the SQL Server instance. This might be OK if the command
    is being run from the local server, but clear text credentials should never be
    sent across the network. Therefore, an alternative would be to use the `Credential`
    parameter, as demonstrated in Listing [4-13](#395785_2_En_4_Chapter.xhtml#PC17).


    ```

    $UserName = ''Pete''

    $SecurePassword = ConvertTo-SecureString ''Pa$$w0rd'' -AsPlainText -Force

    $Credential = [PSCredential]::new($UserName, $SecurePassword)

    $Params = @{

    ServerInstance  = "localhost"

    Query           = "SELECT name FROM sys.databases"

    Credential      = $Credential

    }

    Invoke-Sqlcmd @Params

    Listing 4-13

    Authenticating with the Credential Parameter

    ```


    This script begins by creating `$UserName` and `$Password` variables. The password
    is created as a secure string. These variables are then used to create a `PSCredential`
    object, which is passed to the `Credentia``l` parameter of `Invoke-SqlCmd`.


    ## Managing Security Objects


    The sqlserver module provides more than just `Invoke-SqlCmd`, with tailored cmdlets
    for performing common administrative tasks. This includes a set of cmdlets for
    managing security objects, including Logins and Credentials. However, the module’s
    functionality for dealing with database users and permissions is somewhat limited;
    hence, we will need to interact directly with SMO (SQL Server Management Objects
    – the library that the sqlserver module is built upon) to manage these aspects.
    The following sections will discuss each of these topics.


    Tip


    A detailed discussion of each security object and their considerations is beyond
    the scope of this book, but can be found in the Apress title *Securing SQL Server*,
    which can be found here: [`www.apress.com/gb/book/9781484222652`](http://www.apress.com/gb/book/9781484222652).'
