    ### 创建代理


    SQL Server Agent 代理定义了作业步骤得以运行的安全上下文。本质上，它提供了作业步骤到凭据的映射。在此示例中，我们将创建一个名为 `SQLAgentProxy`
    的代理，该代理映射到 `SQLAgentCredential` 凭据，并为其分配运行配置为 `PowerShell` 或 `CmdExec` 作业步骤类型的作业步骤的权限。


    为此，我们将使用 `New-DbaAgentProxy` 命令，并通过 `-Name` 参数传入代理的名称，通过 `-ProxyCredential` 参数传入其将映射到的凭据，最后通过
    `–SubSystem` 参数指定它可以运行的作业步骤类型，如代码清单 5-25 所示。


    提示


    如果直接在命令中传递 `–SubSystem` 参数，我们可以简单地传递一个逗号分隔的列表。因为我们使用的是拼接技术，所以将两个值定义为字符串数组，然后传递给命令。


    此代码仅适用于基于 Windows 的机器。


    ```

    $params = @{

    SqlInstance     = "localhost"

    Name            = "SqlAgentProxy"

    ProxyCredential = "SQLAgentCredential"

    SubSystem       = @("PowerShell","CmdExec")

    }

    New-DbaAgentProxy @params

    代码清单 5-25

    创建代理

    ```


    有效的子系统完整列表如下：


    *   ActiveScripting

    *   AnalysisCommand

    *   AnalysisQuery

    *   CmdExec

    *   Distribution

    *   LogReader

    *   Merge

    *   PowerShell

    *   QueueReader

    *   Snapshot

    *   Ssis


    注意


    `ActiveScripting` 子系统与运行 ActiveX 脚本有关。这在 SQL Server 中已弃用，不应使用。


    ### 创建作业


    使用 DbaTools 创建 SQL Server Agent 作业涉及三个方面。首先，您需要创建作业本身。然后，您需要创建由该作业运行的作业步骤，最后附加一个作业计划，该计划将定义作业何时运行。


    在本节中，我们将创建一个名为 `DbaMaintenance` 的作业，该作业对实例上的每个数据库运行 `DBCC CHECKDB` 和智能索引重建过程。由于作业内置了逻辑，它们将是
    PowerShell 脚本，而不是 T-SQL 脚本。这将在本书的第 10 章和第 11 章中进一步讨论。


    使用 `New-DbaAgentJob` 命令创建作业。其基本调用需要通过 `–Job` 参数提供作业名称，并通过 `–OwnerLogin` 参数提供作业所有者。创建作业如代码清单
    5-26 所示。


    ```

    New-DbaAgentJob -SqlInstance localhost -Job DbaMaintenance -OwnerLogin sa

    代码清单 5-26

    创建 SQL Agent 作业

    ```


    可以使用 `New-DbaAgentJobStep` 命令创建作业步骤。让我们先看看一个简单的调用，然后再看一个更复杂的例子。


    代码清单 5-27 中的脚本创建了所需的两个作业步骤。这里，我们传入步骤的名称、应运行的命令、相关的子系统、代理名称以及将运行步骤的作业名称，还有每个步骤的成功/失败操作。


    我们还传递了 `StepID`。这是一个在作业内顺序递增的数字，用于定义步骤运行的顺序。如果没有此参数，每次添加一个步骤时，它都会移动到作业中的第一个位置，这会导致一个有点奇怪的情况：步骤的运行顺序与代码中定义的顺序相反。


    ```

    New-DbaAgentJobStep -SqlInstance localhost -Job DbaMaintenance -StepName CheckDB
    -ProxyName SQLAgentProxy -Command ''PowerShell "c:\scripts\CheckDB.ps1"'' -Subsystem
    PowerShell -StepId 1 -OnSuccessAction GoToNextStep -OnFailAction GoToNextStep

    New-DbaAgentJobStep -SqlInstance Localhost -Job DbaMaintenance -StepName IndexRebuild
    -ProxyName SQLAgentProxy -Command ''PowerShell "c:\scripts\IndexRebuild.ps1"''
    -Subsystem PowerShell -StepId 2 -OnSuccessAction GoToNextStep -OnFailAction GoToNextStep

    代码清单 5-27

    创建作业步骤

    ```


    虽然这种方法可行，但它相当繁琐，并且会导致大量代码重复。考虑到此示例仅使用两个作业步骤，这种情况被放大了。想象一下，如果有 20 个步骤会怎样！然而，我们可以通过在
    PowerShell 中结合使用拼接和循环来解决这个问题，使我们能够仅定义一次大多数参数值，并且只声明一次命令调用。代码清单 5-28 说明了这种技术。在这里，我们首先使用拼接技术定义通用参数集。然后，我们使用第二个拼接，该拼接由每个步骤定义的数组组成。最后，一个
    `foreach` 循环遍历每个步骤定义，依次为每个步骤调用 `New-DbaAgentJobStep`。结果在功能上是等效的，但这减少了代码重复，并产生了更易于维护的代码。


    ```

    $commonParams = @{

    SqlInstance     = "localhost"

    Job             = "DbaMaintenance"

    Subsystem       = "PowerShell"

    ProxyName       = "SQLAgentProxy"

    OnSuccessAction = "GoToNextStep"

    OnFailAction    = "GoToNextStep"

    }

    $steps = @(

    @{ StepName = ''CheckDB'';          Command = ''powershell "C:\scripts\CheckDB.ps1"'';            StepID
    = 1 }

    @{ StepName = ''RebuildIndexes''; Command = ''powershell "C:\scripts\RebuildIndexes.ps1"'';   StepID
    = 2 }

    )

    foreach ($step in $steps) {

    New-DbaAgentJobStep @step @commonParams

    }

    代码清单 5-28

    改进作业步骤创建的代码

    '
- fmt: "# 为作业添加调度\n\n为作业添加调度的最后一步是定义其运行时间。这可以通过使用 `New-DbaAgentSchedule` 命令来实现。可以传递给此命令的参数定义在表\
    \ 5-1 中。\n\n## 表 5-1：New-DbaAgentSchedule 参数\n\n| 参数 | 描述 | 允许的值 |\n| --- | ---\
    \ | --- |\n| `Job` | 要附加调度的 SQL Agent 作业的名称 | |\n| `Schedule` | 调度的名称 | |\n| `Disabled`\
    \ | 指定调度应启用还是禁用 | `True`，`False`（默认） |\n| `FrequencyType` | 指定作业执行的频率周期 | `Once`，`OneTime`，`Daily`，`Weekly`，`Monthly`，`MonthlyRelative`，`AgentStart`，`AutoStart`，`IdleComputer`，`OnIdle`\
    \ |\n| `FrequencyInterval` | 在频率周期内，应执行作业的间隔。对于 `FrequencyType` 为每周的作业，这可以是一周中的某几天；对于\
    \ `FrequencyType` 为每月的作业，这可以是一个月中的某一天 | `Sunday`，`Monday`，`Tuesday`，`Wednesday`，`Thursday`，`Friday`，`Saturday`，`Sunday`，`Weekdays`，`Weekend`，`Everyday`，或\
    \ 1 到 31（月度）或 1 到 365（每日）的数值 |\n| `FrequencySubdayType` | 对于一天内执行多次的作业，指定每次执行之间的时间单位。对于一天内只执行一次的作业，请使用\
    \ `Time`。`Once` 指定作业在其生命周期内仅执行一次 | `Once`，`Time`，`Seconds`，`Second`，`Minutes`，`Minute`，`Hours`，`Hour`\
    \ |\n| `FrequencySubdayInterval` | 指定每次执行之间应发生的 `FrequencySubdayType` 次数的整数。例如，如果\
    \ `FrequencySubdayType` 设置为 `Minutes` 且 `FrequencySubdayInterval` 设置为 `5`，则作业将每\
    \ 5 分钟执行一次 | |\n| `FrequencyRecurrenceFactor` | 如果 `FrequencyType` 设置为 `Weekly`、`Monthly`\
    \ 或 `MonthlyRelative`，则可以向此参数传递一个整数，以指定每次执行之间应间隔多少周或月 | |\n| `FrequencyRelativeInterval`\
    \ | 当 `FrequencyInterval` 配置为 `MonthRelative` 时，此参数用于指定在月内何时执行作业 | `First`，`Second`，`Third`，`Fourth`，`Last`\
    \ |\n| `StartDate` | 调度应开始的日期，格式为 yyyyMMdd | |\n| `EndDate` | 调度应结束的日期，格式为 yyyyMMdd\
    \ | |\n| `StartTime` | 调度应开始的时间。可接受的格式是 24 小时制的 HHMMSS | |\n| `EndTime` | 调度应结束的时间。可接受的格式是\
    \ 24 小时制的 HHMMSS | |\n\n在我们的场景中，假设我们希望作业每天每五分钟运行一次。我们希望调度立即开始并无限期运行。因此，我们不指定 `StartDate`、`StartTime`、`EndDate`\
    \ 和 `EndTime`，而是使用 `–Force` 参数，它会将当前日期添加为开始日期，当前日期/时间添加为开始时间，结束日期和时间设置为 9999年12月31日\
    \ 00:00:00。清单 5-29 中的脚本演示了如何创建此调度。\n\n> 注意\n>\n> 实际上，这样的维护作业可能会安排每天运行一次，或者在某些环境中甚至可能每周运行一次。此处的调度仅用于说明目的。\n\
    \n```powershell\n$params = @{\n    SqlInstance = \"localhost\"\n    Job = \"DbaMaintenance\"\
    \n    Schedule = \"DailyEvery5Mins\"\n    FrequencyType = \"Daily\"\n    FrequencyInterval\
    \ = \"Everyday\"\n    FrequencySubdayType = \"Minutes\"\n    FrequencySubdayInterval\
    \ = 5\n}\nNew-DbaAgentSchedule @params -force\n```\n*清单 5-29：创建作业调度*\n\n# 检索作业信息\n\
    \nDbaTools 提供了多个用于检索作业信息的命令。这些信息可以提供非常快速简便的机制，帮助 DBA 故障排除问题。在本节中，我们将通过一个示例来说明。\n\
    \n首先，假设我们正在对服务器执行晨检。我们需要检查 SQL Agent 作业，因此我们将使用 `Get-DbaAgentJob` 命令返回作业列表。默认情况下，此命令将为每个作业返回一个对象，如清单\
    \ 5-30 所示。\n\n```powershell\nGet-DbaAgentJob -SqlInstance localhost\n```\n*清单\
    \ 5-30：返回 SQL Agent 作业列表*\n\n此命令的结果当然会因你在实例上拥有的作业而异。当我运行此命令时，收到以下结果：\n\n```\n\
    ComputerName    InstanceName SqlInstance     Name                    Category\
    \                OwnerLoginName CurrentRunStatus CurrentRunRetryAttempt Enabled\
    \ LastRunDate         LastRunOutcome HasSchedule OperatorToEmail CreateDate\n\
    ------------    ------------ -----------     ----                    --------\
    \                -------------- ---------------- ---------------------- -------\
    \ -----------         -------------- ----------- ---------------\nWIN-J38I01U06D7\
    \ MSSQLSERVER  WIN-J38I01U06D7 DbaMaintenance          [Uncategorized (Local)]\
    \ sa                    Executing                      0    True 18/01/2021 08:37:00\
    \         Failed        True                 17/01/2021 16:36:29\nWIN-J38I01U06D7\
    \ MSSQLSERVER  WIN-J38I01U06D7 syspolicy_purge_history [Uncategorized (Local)]\
    \ sa                         Idle                      0    True 18/01/2021 07:09:47\
    \      Succeeded        True                 11/08/2020 13:10:41\n```\n\n从这些结果中明显可以看出，`DbaMaintenance`\
    \ 作业在上次执行时失败了。因此，我们将使用 `Get-DbaAgentJobHistory` 命令检索有关失败作业的更多信息，以返回作业历史输出。我们将此命令的结果通过管道传递给\
    \ `Where-Object` 命令，以便筛选失败的作业，最后再通过管道传递给 `Format-Table` 命令，使结果更易于阅读。清单 5-31 演示了这一点。\n\
    \n```powershell\nGet-DbaAgentJobHistory -SqlInstance localhost | Where-Object\
    \ status -eq \"Failed\" | Format-Table\n```\n*清单 5-31：返回作业历史记录*\n\n运行此命令的结果如下所示：\n\
    \n```\nComputerName    InstanceName SqlInstance     Job            StepName  \
    \    RunDate             StartDate               EndDate                 Duration\
    \ Status OperatorEmailed Message\n------------    ------------ -----------   \
    \  ---            --------      -------             ---------               -------\
    \                 -------- ------ ---------------\nWIN-J38I01U06D7 MSSQLSERVER\
    \  WIN-J38I01U06D7 DbaMaintenance (Job outcome) 18/01/2021 08:41:00 2021-01-18\
    \ 08:41:00.000 2021-01-18 08:42:01.000 00:01:01 Failed                 The job\
    \ failed.  JobManager tried to run a non-existent step (3) for job DbaMain...\n\
    WIN-J38I01U06D7 MSSQLSERVER  WIN-J38I01U06D7 DbaMaintenance (Job outcome) 18/01/2021\
    \ 08:39:00 2021-01-18 08:39:00.000 2021-01-18 08:40:02.000 00:01:02 Failed   \
    \              The job failed.  JobManager tried to run a non-existent step (3)\
    \ for job DbaMain...\nWIN-J38I01U06D7 MSSQLSERVER  WIN-J38I01U06D7 DbaMaintenance\
    \ (Job outcome) 18/01/2021 08:37:00 2021-01-18 08:37:00.000 2021-01-18 08:38:02.000\
    \ 00:01:02 Failed                 The job failed.  JobManager tried to run a non-existent\
    \ step (3) for job DbaMain...\nWIN-J38I01U06D7 MSSQLSERVER  WIN-J38I01U06D7 DbaMaintenance\
    \ (Job outcome) 18/01/2021 08:35:00 2021-01-18 08:35:00.000 2021-01-18 08:36:02.000\
    \ 00:01:02 Failed                 The job failed.  JobManager tried to run a non-existent\
    \ step (3) for job DbaMain...\n```"
  raw: 'The final stage is to add a schedule to the Job to define when the Job will
    run. This can be achieved using the New-DbaAgentSchedule command. The parameters
    that can be passed to this command are defined in Table [5-1](#395785_2_En_5_Chapter.xhtml#Tab1).


    Table 5-1


    New-DbaAgentSchedule Parameters


    | Parameter | Description | Allowed Values |

    | --- | --- | --- |

    | Job | The name of the SQL Agent Job to which the schedule should be attached
    |   |

    | Schedule | The name of the Schedule |   |

    | Disabled | Specify if the schedule should be enabled or disabled | True, False
    (Default) |

    | FrequencyType | Specify the frequency period of when the job should be executed
    | Once, OneTime, Daily, Weekly, Monthly, MonthlyRelative, AgentStart, AutoStart,
    IdleComputer, OnIdle |

    | FrequencyInterval | The interval, within the frequency period, that the job
    should be executed. This can be day(s) of the week for jobs with a weekly `FrequencyType`
    or a day of the month for jobs with a `FrequencyType` of monthly | Sunday, Monday,
    Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday, Weekdays, Weekend, Everyday,
    or numeric value from 1 to 31 (for monthly) or 1 to 365 (for daily) |

    | FrequencySubdayType | For jobs that are executed multiple times a day, specifies
    the unit of time between each execution. For jobs that are executed only once
    within a day, use Time. Once specifies that the job will only execute once within
    its lifespan | Once, Time, Seconds, Second, Minutes, Minute, Hours, Hour |

    | FrequencySubdayInterval | An integer specifying how many occurrences of the
    `FrequencySubdayType` should occur between each execution. For example, if `FrequencySubdayType`
    is set as `Minutes` and `FrequencySubdayInterval` is set as `5`, then the job
    will execute every 5 minutes |   |

    | FrequencyRecurrenceFactor | If the `FrequencyType` is set to `Weekly`, `Monthly`,
    or `MonthlyRelative`, then an integer can be passed to this parameter to specify
    how many weeks or months should occur between each execution |   |

    | FrequencyRelativeInterval | When `FrequencyInterval` is configured as `MonthRelative`,
    then this parameter is used to specify when, within the month, the job should
    be executed | First, Second, Third, Fourth, Last |

    | StartDate | The date on which the schedule should begin as yyyyMMdd |   |

    | EndDate | The date on which the schedule should end as yyyyMMdd |   |

    | StartTime | The time when the schedule should begin. Acceptable formats are
    HHMMSS with a 24-hour clock |   |

    | EndTime | The time when the schedule should end. Acceptable formats are HHMMSS
    with a 24-hour clock |   |


    In our scenario, let’s imagine we would like our job to run every five minutes,
    every day. We want the schedule to start immediately and run indefinitely. Therefore,
    instead of specifying the `StartDate`, `StartTime`, `EndDate`, and `EndTime`,
    we will use the `–Force` parameter, which will add the current date as the start
    date and time as the current date/time and the end date and time as 31/12/9999
    00:00:00. The script in Listing [5-29](#395785_2_En_5_Chapter.xhtml#PC33) demonstrates
    how to create this schedule.


    Note


    In reality, such a maintenance job would probably be scheduled to run once a day
    or, in some environments, perhaps even once a week. The schedule here is for illustrative
    purposes only.


    ```

    $params = @{

    SqlInstance = "localhost"

    Job = "DbaMaintenance"

    Schedule = "DailyEvery5Mins"

    FrequencyType = "Daily"

    FrequencyInterval = "Everyday"

    FrequencySubdayType = "Minutes"

    FrequencySubdayInterval = 5

    }

    New-DbaAgentSchedule @params -force

    Listing 5-29

    Create a Job Schedule

    ```


    ### Retrieve Job Information


    DbaTools provides a number of commands for retrieving job information. This information
    can provide a very quick and easy mechanism to assist DBAs in troubleshooting
    issues. In this section, we will work through an example of this.


    To begin, imagine that we are running our morning checks against a server. We
    want to check our SQL Agent Jobs, so we will return a list of Jobs, using the
    `Get-DbaAgentJob` command. By default, this command will return an object for
    each job, as demonstrated in Listing [5-30](#395785_2_En_5_Chapter.xhtml#PC34).


    ```

    Get-DbaAgentJob -SqlInstance localhost

    Listing 5-30

    Return a List of SQL Agent Jobs

    ```


    The results of this command will of course differ depending on what jobs you have
    on your instance. When I ran this command, I received the results below:


    ```

    ComputerName    InstanceName SqlInstance     Name                    Category                OwnerLoginName
    CurrentRunStatus CurrentRunRetryAttempt Enabled LastRunDate         LastRunOutcome
    HasSchedule OperatorToEmail CreateDate

    ------------    ------------ -----------     ----                    --------                --------------
    ---------------- ---------------------- ------- -----------         --------------
    ----------- --------------- ----------

    WIN-J38I01U06D7 MSSQLSERVER  WIN-J38I01U06D7 DbaMaintenance          [Uncategorized
    (Local)] sa                    Executing                      0    True 18/01/2021
    08:37:00         Failed        True                 17/01/2021 16:36:29

    WIN-J38I01U06D7 MSSQLSERVER  WIN-J38I01U06D7 syspolicy_purge_history [Uncategorized
    (Local)] sa                         Idle                      0    True 18/01/2021
    07:09:47      Succeeded        True                 11/08/2020 13:10:41

    ```


    The obvious thing to note from these results is that the `DbaMaintenance` job
    failed on its last execution. Therefore, we will retrieve further information
    about failed jobs, by using the `Get-DbaAgentJobHistory` command, to return the
    job history output. We will pipe the results of this command into a `Where-Object`
    command, so that we can filter for failed jobs, before finally piping into the
    `Format-Table` command to make the results easier to read. This is demonstrated
    in Listing [5-31](#395785_2_En_5_Chapter.xhtml#PC36).


    ```

    Get-DbaAgentJobHistory -SqlInstance localhost | Where-Object status -eq "Failed"
    | Format-Table

    Listing 5-31

    Return Job History

    ```


    The results of running this command are shown below:


    ```

    ComputerName    InstanceName SqlInstance     Job            StepName      RunDate             StartDate               EndDate                 Duration
    Status OperatorEmailed Message

    ------------    ------------ -----------     ---            --------      -------             ---------               -------                 --------
    ------ --------------- -------

    WIN-J38I01U06D7 MSSQLSERVER  WIN-J38I01U06D7 DbaMaintenance (Job outcome) 18/01/2021
    08:41:00 2021-01-18 08:41:00.000 2021-01-18 08:42:01.000 00:01:01 Failed                 The
    job failed.  JobManager tried to run a non-existent step (3) for job DbaMain...

    WIN-J38I01U06D7 MSSQLSERVER  WIN-J38I01U06D7 DbaMaintenance (Job outcome) 18/01/2021
    08:39:00 2021-01-18 08:39:00.000 2021-01-18 08:40:02.000 00:01:02 Failed                 The
    job failed.  JobManager tried to run a non-existent step (3) for job DbaMain...

    WIN-J38I01U06D7 MSSQLSERVER  WIN-J38I01U06D7 DbaMaintenance (Job outcome) 18/01/2021
    08:37:00 2021-01-18 08:37:00.000 2021-01-18 08:38:02.000 00:01:02 Failed                 The
    job failed.  JobManager tried to run a non-existent step (3) for job DbaMain...

    WIN-J38I01U06D7 MSSQLSERVER  WIN-J38I01U06D7 DbaMaintenance (Job outcome) 18/01/2021
    08:35:00 2021-01-18 08:35:00.000 2021-01-18 08:36:02.000 00:01:02 Failed                 The
    job failed.  JobManager tried to run a non-existent step (3) for job DbaMain...

    ```'
