    We should now consider the design of our Primary Keys for each table. Are the
    logical “natural” keys that we have already identified sufficient, or should we
    create artificial keys, which are usually implemented through an `IDENTITY` column?


    We can see that each of our Primary Key columns has the data type `NVARCHAR(128)`.
    Although these columns will uniquely identify each row in their respective tables,
    they are wide columns that will consume up to 256 bytes for each row.


    The Primary Key will be replicated in each Foreign Key, and because the Primary
    Key is usually the column(s) that the table’s clustered index is built on, it
    is also likely to be replicated in all non-clustered indexes. Therefore, we want
    the Primary Key value to be as narrow as possible. If we add an artificial Primary
    Key to each table using the INT data type, each key value will only consume 4
    bytes, as opposed to a possible 256.


    Tip


    Because we are taking the approach of using an artificial key, it is likely that
    each natural key will require a unique constraint.


    ## Creating the Inventory Database


    In this section, we will use DbaTools to create the inventory database, which
    we have designed throughout this chapter. Our first step will be to create the
    shell database, which we can achieve using the `New-DbaDatabase` command, as shown
    in Listing [8-1](#395785_2_En_8_Chapter.xhtml#PC2). In this script, we configure
    the collation of the database, the database Owner, and the required recovery model,
    which in our case is Full, as it is an OLTP database and we want transaction log
    backups to be taken. We also configure the properties of the Primary data file.


    Tip


    `New-DbaDatabase` also has parameters that allow you to configure the properties
    of secondary data files, the properties of the transaction log, the default file
    group, and the file paths of the data and log files. Because we have not specified
    these values, SQL Server will use the configured values within the Model database.


    ```

    $params = @{

    SqlInstance        = "localhost"

    Name               = "Inventory"

    Collation          = "Latin1_General_CI_AS"

    Owner              = "sa"

    RecoveryModel      = "Full"

    PrimaryFileSize    = "2048" #Specified in MBs

    PrimaryFileGrowth  = "1024" #Specified in MBs

    PrimaryFileMaxSize = "4096" #Specified in MBs

    }

    New-DbaDatabase @params

    Listing 8-1

    Create the Shell Database

    ```


    Because our inventory database will include sa passwords for the managed instances,
    we need to consider encryption. The encryption hierarchy in SQL Server is depicted
    in Figure [8-6](#395785_2_En_8_Chapter.xhtml#Fig6).


    ![](images/395785_2_En_8_Chapter/395785_2_En_8_Fig6_HTML.jpg)


    Flow chart illustrating a security architecture. The chart is divided into three
    main sections: "Operating System" with "DPAPI," "Instance" with "Service Master
    Key" and "Database Master Key (Copy)," and "Database" with "Database Master Key,"
    "Certificates," "Symmetric Keys," and "Asymmetric Keys." An additional section
    labeled "EKM Module" includes "Certificates," "Symmetric Keys," and "Asymmetric
    Keys." The flow chart visually represents the hierarchy and relationship between
    different security components.


    Figure 8-6


    SQL Server encryption hierarchy


    Tip


    A full discussion of encryption is beyond the scope of this book. A full description,
    however, can be found in the Apress title *Pro SQL Server 2022 Administration*,
    which can be found at link.springer.com/book/10.1007/978-1-4842-8864-1.


    For our use case, we will need to create a Database Master Key (the Service Master
    Key will be created automatically). We will then need to create a certificate,
    which is encrypted using the Database Master Key, before creating a symmetric
    key, which is encrypted using the certificate. This will allow for the sa passwords
    to be encrypted using the symmetric key, before being inserted into the database
    table.


    We can create the Database Master Key by using the `New-DbaDbMasterKey` command,
    as shown in Listing [8-2](#395785_2_En_8_Chapter.xhtml#PC3). Here, we convert
    a password to a secure string and then pass that into the `New-DbaDbMasterKey`
    command as the password for the Master Key, along with the name of the database
    that it will be created in.


    ```

    $Password = $SecurePassword = ConvertTo-SecureString ''Pa$$w0rd'' -AsPlainText
    -Force

    $params = @{

    SqlInstance    = "localhost"

    Database       = "Inventory"

    SecurePassword = $Password

    }

    New-DbaDbMasterKey @params

    Listing 8-2

    Create a Database Master Key for the Inventory Database

    ```


    It is important that we take a backup of the Database Master Key. Otherwise, if
    we lost the key, it would not be possible to recover our encrypted data. We can
    back up the key to the file system using the script in Listing [8-3](#395785_2_En_8_Chapter.xhtml#PC4).


    ```

    $Password = $SecurePassword = ConvertTo-SecureString ''Pa$$w0rd'' -AsPlainText
    -Force

    $params = @{

    SqlInstance    = "localhost"

