  trans: '# 11. 自动化例行维护与故障修复场景


    DBA 团队响应业务需求的速度越快，为组织带来的价值就越大。在第 10 章中，我们重点讨论了维护例程的集中化，但 DBA 角色中还有许多更琐碎的方面可以实现自动化。


    本章中，我们将探讨其中的两个方面。第一个方面是自动化临时维护，这将使我们能够更快地响应业务需求。本章将特别聚焦于环境刷新，但这些技术可应用于多种场景。


    我们将讨论的第二个方面是故障修复自动化。这可以通过自动解决问题（无需等待 DBA 手动处理）来极大改善对业务的服务质量。本章将重点解决日志空间问题，但同样，这些技术几乎可应用于任何场景。


    迄今为止，本书主要聚焦于`PowerShell`。然而，在本章中，我们将跳出`PowerShell`，展示使用`SQL Server`实现自动化的其他方法。具体而言，我们将探讨`SSIS`和`SQL
    Agent 警报`的使用。本章还演示了通过`GUI`配置`SQL Agent 作业`。了解这一点很有用，因为在本书中，你已经学习了如何通过代码创建`SQL
    Agent 作业`，但有时创建`SQL Agent 作业`最快的方法是使用`GUI`，然后将其编写为脚本，以便保存到源代码管理中。


    ## 自动化临时例行维护


    你在第 10 章学到的构建集中化维护的技术，对于按计划运行的例行维护非常有效。但对于临时任务呢？这些任务无法定期安排运行，但这并不妨碍我们实施自动化来减轻请求的负担，从而使我们能够更快地响应，并解放我们从事更高价值的活动。


    让我们以环境刷新为例。如果你有内部应用开发团队，他们通常会定期请求使用最新的生产数据快照来刷新其开发环境。在这种情况下，只要不存在数据隐私问题，我们可能会通过备份数据库并将其恢复到开发环境，或者分离数据库、复制数据文件并在两个位置重新附加来响应。


    然而，在其他环境中，尤其是在安全性要求更高的场景下，该过程可能要复杂得多。


    例如，我曾与一家受监管机构严格控制的`FTSE 100`公司合作，当开发人员需要刷新环境时，绝对不能让他们访问实时数据。因此，刷新环境的流程包括以下步骤：


    1.  备份生产数据库。

    2.  将开发服务器置于`SINGLE USER`模式，使开发人员无法访问。

    3.  将数据库恢复到开发服务器。

    4.  删除没有登录凭据的数据库用户。

    5.  混淆数据。

    6.  将实例恢复为`MULTI USER`模式。


    在本节中，我们将为`AdventureWorks22`数据库重现此过程，将其从名为`ESPROD1`的实例复制到名为`ESPROD2`的实例。该过程如图 11-1
    的工作流所示。


    ![](img/395785_2_En_11_Fig1_HTML.jpg)


    流程图说明了数据库混淆过程。它从绿色的“开始”椭圆开始，后续步骤包括：“备份生产数据库”、“将开发服务器置于 SINGLE USER 模式”、“将数据库恢复到开发服务器”和“删除数据库登录”。流程继续进行“混淆”，包括“识别待混淆的数据”和“混淆数据”。最后，以“将开发服务器置于
    MULTI USER 模式”和粉色的“停止”椭圆结束。箭头依次连接每个步骤。


    **图 11-1**


    环境刷新工作流


    我们将对此过程进行参数化，以便可以轻松修改用于任何数据库。同样，我们可以选择使用`PowerShell`或`SSIS`来编排此工作流。然而，对于此类工作流，我建议将`SSIS`视为最合适的工具。'
- fmt: '### Creating the SSIS Package


    We will now use SQL Server Data Tools (SSDT) to create a SQL Server Integration
    Services Project, which we will name `EnvironmentRefresh`. We will give the same
    name to the package that is automatically created within the project.


    #### Creating Project Parameters


    Our first task will be to create three project parameters that will accept the
    name of the `Production Server\Instance`, the name of the `Development Server\Instance`,
    and the name of the database to be refreshed. This is illustrated in Figure 11-2.


    ![Figure 11-2: Creating project parameters. A table displaying server information
    with columns labeled "Name," "Data type," "Value," "Sensitive," "Required," and
    "Description." The rows list "ProductionServer," "DevelopmentServer," and "DatabaseName,"
    all with "String" as the data type. The "Sensitive" and "Required" columns are
    marked "False" for each entry.](images/395785_2_En_11_Chapter/395785_2_En_11_Fig2_HTML.jpg)


    #### Configuring Connection Managers


    The next step will be to create two `OLEDB Connection Managers`, by right-clicking
    in the `Connection Managers` window and using the `New OLEDB Connection` dialog
    box. We should name one `Connection Manager` `ProductionServer` and the other
    `DevelopmentServer`.


    Once the `Connection Managers` have been created, we can use the `Expression Builder`
    to configure the `ServerName` property of each `Connection Manager` to be dynamic,
    based on the `ProductionServer` and `DevelopmentServer` project parameters that
    we created. Figure 11-3 illustrates using `Expression Builder` to configure the
    `ServerName` property of the `ProductionServer` Connection Manager.


    ![Figure 11-3: Expression Builder. Expression Builder interface screenshot showing
    a window with sections for Variables and Parameters, and Functions. The left panel
    lists system variables like `$Project::DatabaseName`, `$Project::DevelopmentServer`,
    and `$Project::ProductionServer`. The right panel includes categories like Mathematical
    Functions, String Functions, and Date/Time Functions. The Expression field contains
    `@[$Project::ProductionServer]`. Buttons for "Evaluate Expression," "OK," and
    "Cancel" are at the bottom.](images/395785_2_En_11_Chapter/395785_2_En_11_Fig3_HTML.jpg)


    #### Creating Package Variables


    We must now create three package variables, which will hold the SQL statements
    that will be run to back up the database, restore the database, and obfuscate
    the database. We will enter the appropriate expressions to build the SQL statements
    within the variables, as illustrated in Figure 11-4. It is important to set the
    `EvaluateAsExpression` property of the variables to `true` (although in newer
    versions, this happens automatically if you paste in an expression). This can
    be configured in the `Properties` window, when the variable is in scope.


    ![Figure 11-4: Creating package variables. A table displaying three rows with
    columns labeled Name, Scope, Data type, Value, and Expression. The names are "BicyclistStatement,"
    "AutomobileStatement," and "ChocolateMilkStatement," all within the "Environment"
    scope and of "String" data type. Each row contains complex expressions and values
    related to database operations and string manipulations.](images/395785_2_En_11_Chapter/395785_2_En_11_Fig4_HTML.jpg)


    The expression stored in the `BackupSQLStatement` variable is detailed in Listing
    11-1.


    ```

    "BACKUP DATABASE " +  @[$Project::DatabaseName] + " TO DISK = ''C:\\Backups\\"
    + @[$Project::DatabaseName] + ".bak''"

    ```

    *Listing 11-1: BackupSQLStatement Expression*


    The expression stored in the `RestoreSQLStatement` variable can be found in Listing
    11-2.


    ```

    "RESTORE DATABASE " +  @[$Project::DatabaseName] + " FROM DISK = ''\\\\ESPROD2\\backups\\"
    + @[$Project::DatabaseName] + ".bak'' WITH REPLACE; ALTER DATABASE " + @[$Project::DatabaseName]
    + " SET SINGLE_USER WITH ROLLBACK IMMEDIATE;"

    ```

    *Listing 11-2: RestoreSQLStatement Expression*


    The expression stored in the `ObfuscateDataStatement` variable can be found in
    Listing 11-3.


    ```

    "DECLARE @SQL NVARCHAR(MAX) ;

    SET @SQL = (SELECT CASE t.name WHEN ''int'' THEN ''UPDATE '' + SCHEMA_NAME(o.schema_id)
    + ''.'' + QUOTENAME(OBJECT_NAME(nkc.object_id)) + '' SET '' +  QUOTENAME(c.name)
    + '' = CHECKSUM('' + c.name + ''); ''

    WHEN ''money'' THEN ''UPDATE '' + QUOTENAME(SCHEMA_NAME(o.schema_id)) + ''.''
    + QUOTENAME(OBJECT_NAME(nkc.object_id)) + '' SET '' +  QUOTENAME(c.name) + ''
    = CHECKSUM('' + c.name + ''); ''

    WHEN ''nvarchar'' THEN ''UPDATE '' + QUOTENAME(SCHEMA_NAME(o.schema_id)) + ''.''
    + QUOTENAME(OBJECT_NAME(nkc.object_id)) + '' SET '' +  QUOTENAME(c.name) + ''
    = LEFT(RTRIM(CONVERT(nvarchar(255), NEWID())), '' + CAST(c.max_length / 2 AS NVARCHAR(10))
    + ''); ''

    WHEN ''varchar'' THEN ''UPDATE '' + QUOTENAME(SCHEMA_NAME(o.schema_id)) + ''.''
    + QUOTENAME(OBJECT_NAME(nkc.object_id)) + '' SET '' +  QUOTENAME(c.name) + ''
    = LEFT(RTRIM(CONVERT(nvarchar(255), NEWID())), '' + CAST(c.max_length AS NVARCHAR(10))
    + ''); ''

    WHEN ''text'' THEN ''UPDATE '' + QUOTENAME(SCHEMA_NAME(o.schema_id)) + ''.'' +
    QUOTENAME(OBJECT_NAME(nkc.object_id)) + '' SET '' +  QUOTENAME(c.name) + '' =
    LEFT(RTRIM(CONVERT(nvarchar(255), NEWID())), '' + CAST(c.max_length AS NVARCHAR(10))
    + ''); ''

    WHEN ''ntext'' THEN ''UPDATE '' + QUOTENAME(SCHEMA_NAME(o.schema_id)) + ''.''
    + QUOTENAME(OBJECT_NAME(nkc.object_id)) + '' SET '' +  QUOTENAME(c.name) + ''
    = LEFT(RTRIM(CONVERT(nvarchar(255), NEWID())), '' + CAST(c.max_length AS NVARCHAR(10))
    + ''); ''  END

    FROM

    (

    SELECT object_id, column_id

    FROM sys.columns

    EXCEPT --Exclude foreign key columns

    SELECT parent_object_id, parent_column_id

    FROM sys.foreign_key_columns

    EXCEPT --Exclude check constraints

    SELECT parent_object_id, parent_column_id

    FROM sys.check_constraints

    ) nkc

    INNER JOIN sys.columns c

    ON nkc.object_id = c.object_id

    AND nkc.column_id = c.column_id

    INNER JOIN sys.objects o

    ON nkc.object_id = o.object_id

    INNER JOIN sys.types t

    ON c.user_type_id = t.user_type_id

    AND c.system_type_id = t.system_type_id

    INNER JOIN sys.tables tab

    ON o.object_id = tab.object_id

    WHERE is_computed = 0  --Exclude computed columns

    AND c.is_filestream = 0 --Exclude filestream columns

    AND c.is_identity = 0 --Exclude identity columns

    AND c.is_xml_document = 0 --Exclude XML columns

    AND c.default_object_id = 0 --Exclude columns with default constraints

    AND c.rule_object_id = 0 --Exclude columns associated with rules

    AND c.encryption_type IS NULL --Exclude columns with encryption

    AND o.type = ''U'' --Filter on user tables

    AND t.is_user_defined = 0 --Exclude columns with custom data types

    AND tab.temporal_type = 0 --Exclude temporal history tables

    FOR XML PATH('''')

    ) ;

    EXEC(@SQL) ;

    ALTER DATABASE " +  @[$Project::DatabaseName] + " SET MULTI_USER ;"

    ```

    *Listing 11-3: ObfuscateDataStatement Expression*


