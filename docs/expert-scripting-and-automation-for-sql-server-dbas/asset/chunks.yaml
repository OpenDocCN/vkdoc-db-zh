    \ OLTP 数据库，并且我们希望执行事务日志备份）。我们还配置了主数据文件的属性。\n\n> 提示\n>\n> `New-DbaDatabase` 还有一些参数，允许您配置辅助数据文件的属性、事务日志的属性、默认文件组以及数据和日志文件的文件路径。由于我们未指定这些值，SQL\
