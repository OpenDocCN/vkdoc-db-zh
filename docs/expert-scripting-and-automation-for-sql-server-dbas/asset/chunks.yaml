    ## Response page


    We do not need to configure anything on the `Options` page of the `New Alert`
    dialog box. You should be aware of the options that can be configured on this
    page. A very useful option is the ability to provide a delay between responses.
    Configuring this option can help you avoid the possibility of “false” responses
    being fired while a previous response is still in the process of resolving an
    issue.


    ## Summary


    Automating routine maintenance tasks can save a DBA’s valuable time and also improve
    the service to the business. Of course, it may not be possible to get to a position
    where 100% of maintenance is automated, because there are always exceptions. It
    is a good idea to aim for an 80/20 split of automated vs. exception. As well as
    automating tasks within the database engine, such as intelligent `index rebuilds`,
    as you have learned in previous chapters, it is also possible to automate tasks
    that have operating system elements, such as patching.


    The more break/fix scenarios that you can automate, the better and more proactive
    your service to the business will become. It is not feasible to attempt to automate
    responses to all break/fix scenarios in one go, however. This is because problems
    will change and vary over time and because such a large-scale effort would likely
    be cost-prohibitive. Instead, you should look to add automated break/fix scenarios
    as a continuous service improvement (`CSI`) program. It is helpful to use the
    problem management functionality of your ticket system to help define candidate
    issues for automation.

