    The final control of flow concept that we will discuss is `IF`...`ELSE`. An `IF`...`ELSE`
    block allows you to branch your code, based on a condition. You can also nest
    `IF`...`ELSE` blocks to implement complex logic (although you should consider
    code maintenance when doing so). It is only possible to have one `IF` block. To
    implement multiple chained `IF` conditions, you can add multiple `ELSEIF` blocks.
    The `ELSE` block always comes last (if you choose to use one) and is a catchall
    for any occurrences in which none of your `IF` and `ELSEIF` conditions is met.
    The conditions of `IF` and `ELSEIF` blocks are enclosed within parentheses. The
    code block to execute is enclosed within braces. The script in Listing [2-11](#395785_2_En_2_Chapter.xhtml#PC12)
    demonstrates how to implement an `IF`...`ELSE` block to check the status of a
    service.


    ```

    $Service = "SQLBrowser"

    $ServiceDetails = Get-Service | Where-Object {$_.Name -eq $Service}

    if ($ServiceDetails.Status -eq "Running") {

    $Service + " is  working"

    } elseif ($ServiceDetails.Status -eq "Stopped") {

    $Service + " is not working. Please check the Event Log"

    } elseif (-not $serviceDetails) {

    $Service + " is not installed"

    } else {

    $Service + " is changing state"

    }

    Listing 2-11

    Using IF, ELSEIF, and ELSE

    ```


    ## Modules


    To make PowerShell fully extensible and able to manage virtually any application,
    it has been written using a modular approach, with modules having to be imported
    to allow users access to the cmdlets that they contain. Some of the core modules
    are imported automatically when a command is executed. For example, using the
    `Get-ExecutionPolicy` command causes the `Microsoft.PowerShell.Security` module
    to be imported.


    A massive number of modules are available, providing the ability to use PowerShell
    to manage almost any platform or application. Some of these modules are provided
    by organizations. For example, AWS provides the AWSPowerShell module for managing
    its public cloud platform, and Microsoft provides the Az module for managing Azure.


    There is also a vast number of community modules available, however, for example,
    the `posh-git` module which provides Git status summary and tab completion for
    Git command and the `powershell-yaml` module which provides YAML serialization
    and deserialization in PowerShell.


    When modules are published on PowerShell Gallery, they can be downloaded and installed
    using the `Install-Module` command, as demonstrated in Listing [2-12](#395785_2_En_2_Chapter.xhtml#PC13),
    which installs the `Indented.IniFile` module, which was written by the excellent
    Indented Automation (which I strongly recommend you check out for all things PowerShell)
    and provides functionality for managing INI file content in PowerShell.


    ```

    Install-Module Indented.IniFile

    Listing 2-12

    Install a PowerShell Module

    ```'
  trans: '

    在循环的每次迭代中要重复执行的代码被包含在花括号内。这里，我们使用一个 `try...catch` 代码块来尝试读取文件。如果操作成功，我们会将成功信息写入控制台，然后通过
    `break` 命令退出循环。如果操作失败，执行流程会移至 `catch` 代码块。在这里，我们将失败信息写入控制台，然后将脚本的执行暂停 30 秒。


    **提示**

    尽管读取文件失败总会产生一个错误，但它通常不会导致脚本终止。由于我们需要脚本终止才能使流程转入 `catch` 代码块，因此我们使用 `-ErrorAction`
    参数来强制脚本终止。


    ```

    for ($i=1; $i -le 3; $i++) {

    try {

    Get-Content c:\ExpertScripting.txt -ErrorAction Stop

    "Attempt " + $i + " Succeeded"

    break

    } catch {

    "Attempt " + $i + " Failed"

    Start-Sleep -s 30

    }

    }

    代码清单 2-8

    使用 for 循环

    ```


    代码清单 2-9 中的脚本演示了如何使用 `while` 循环来优化代码清单 2-8 中的代码，使得脚本能够持续循环（可能是无限循环），直到文件读取成功为止。只要括号内定义的条件评估为布尔值
    `$true`，`while` 循环就会继续。在我们的例子中，由于条件就是 `$true`，`while` 循环将无限期地继续下去。然而，一旦文件内容被成功读取，`break`
    命令就会退出循环。当你在编写需要先写入文件才能继续的中间件组件脚本时，这种技术特别有用。


    **注意**

    如果你正在跟随演示操作，请在脚本运行时，在 `c:\` 根目录下创建一个名为 `ExpertScripting.txt` 的文件。


    ```

    $i = 0

    while ($true) {

    try {

    $i++

    Get-Content c:\ExpertScripting.txt -ErrorAction Stop

    "Attempt " + $i + " Succeeded"

    break

    } catch {

    "Attempt " + $i + " Failed"

    Start-Sleep -s 30

    }

    }

    代码清单 2-9

    使用 while 循环

    ```


    代码清单 2-10 中的脚本演示了如何使用 `foreach` 循环来确保所有 SQL Server 服务都在运行，如果它们没有运行，则启动它们。


    ```

    # 用所有 SQL Server 服务的详细信息填充一个新变量

    $services = Get-Service | Where-Object { $_.Name -like "*SQL*" -and $_.Status
    -eq "Stopped" }

    # 启动每个服务

    foreach ($name in $services) {

    Start-Service $name

    }

    代码清单 2-10

    使用 foreach 循环

    ```


    我们将要讨论的最后一个流程控制概念是 `IF`...`ELSE`。一个 `IF`...`ELSE` 代码块允许你根据一个条件来分支你的代码。你也可以嵌套 `IF`...`ELSE`
    代码块来实现复杂的逻辑（尽管这样做时应考虑代码的可维护性）。只能有一个 `IF` 代码块。要实现多个链式的 `IF` 条件，你可以添加多个 `ELSEIF`
    代码块。`ELSE` 代码块总是放在最后（如果你选择使用它），用于处理所有 `IF` 和 `ELSEIF` 条件都不满足的情况。`IF` 和 `ELSEIF`
    代码块的条件被括在圆括号内。要执行的代码块被括在花括号内。代码清单 2-11 中的脚本演示了如何实现一个 `IF`...`ELSE` 代码块来检查服务的状态。


    ```

    $Service = "SQLBrowser"

    $ServiceDetails = Get-Service | Where-Object {$_.Name -eq $Service}

    if ($ServiceDetails.Status -eq "Running") {

    $Service + " is  working"

    } elseif ($ServiceDetails.Status -eq "Stopped") {

    $Service + " is not working. Please check the Event Log"

    } elseif (-not $serviceDetails) {

    $Service + " is not installed"

    } else {

    $Service + " is changing state"

    }

    代码清单 2-11

    使用 IF、ELSEIF 和 ELSE

    ```


    ## 模块


    为了使 PowerShell 具有完全的可扩展性并能够管理几乎任何应用程序，它采用模块化方法编写，必须导入模块才能让用户访问它们包含的 cmdlet。执行某些命令时会自动导入一些核心模块。例如，使用
    `Get-ExecutionPolicy` 命令会导致 `Microsoft.PowerShell.Security` 模块被导入。


    有大量可用的模块，提供了使用 PowerShell 管理几乎任何平台或应用程序的能力。其中一些模块由组织提供。例如，AWS 提供 `AWSPowerShell`
    模块来管理其公有云平台，而 Microsoft 提供 `Az` 模块来管理 Azure。


    此外，还有大量的社区模块可用，例如 `posh-git` 模块（它提供了 Git 状态摘要以及 Git 命令的 Tab 键补全功能）和 `powershell-yaml`
    模块（它在 PowerShell 中提供了 YAML 序列化和反序列化功能）。


    当模块发布在 PowerShell Gallery 上时，可以使用 `Install-Module` 命令下载并安装它们，如代码清单 2-12 所示，该命令安装了
    `Indented.IniFile` 模块。该模块由出色的 Indented Automation 编写（我强烈建议你去了解他们所有关于 PowerShell
    的内容），并提供了在 PowerShell 中管理 INI 文件内容的功能。


    ```

    Install-Module Indented.IniFile

    代码清单 2-12

    安装 PowerShell 模块

    ```

    '
- fmt: '### SqlServer Module


    The SqlServer module is supplied as part of the SQL Server Management Tools download,
    but can also be installed using the `Install-Module` command. The module provides
    over 100 commands for interacting with SQL Server from a PowerShell session. This
    module will be discussed in depth in Chapter [4](#395785_2_En_4_Chapter.xhtml),
    but in this section, we will briefly discuss how the module can be used to navigate
    a SQL Server instance. The ability to navigate a SQL Server instance or even invoke
    PowerShell from inside SQL Server Management Studio can be a good break-through
    introduction for DBAs who have not used PowerShell before.


    As well as navigating a folder structure with commands such as `Get-ChildItem`
    and `Set-Location`, PowerShell can also be used to navigate the SQL Server object
    hierarchy of an instance. You can connect PowerShell to the SQL Server Database
    Engine provider by using `Set-Location` to navigate to `SQLSERVER:\SQL`. The information
    returned by `Get-ChildItem` is dependent on the current location in the object
    hierarchy. Table [2-4](#395785_2_En_2_Chapter.xhtml#Tab4) details what information
    is returned from each level of the hierarchy.


    #### Table 2-4

    Details Returned at Each Hierarchy Level


    | Location | Information Returned |

    | --- | --- |

    | `SQLSERVER:\SQL` | The name of the local machine |

    | `SQLSERVER:\SQL\ComputerName` | The names of the database engine instances installed
    on the local machine |

    | `SQLSERVER:\SQL\ComputerName\InstanceName` | Instance-level object types |

    | `Lower levels` | Object types or objects contained within the current location
    |


    Once you have navigated to an appropriate level of the hierarchy, you are able
    to use PowerShell to perform basic operations against objects at that level. For
    example, the script in Listing [2-13](#395785_2_En_2_Chapter.xhtml#PC14) will
    navigate to the `tables` namespace within the `AdventureWorks2022` database and
    rename the `dbo.DatabaseLog` table to `dbo.DatabaseLogPS`. The `dir` commands
    will display the original name and new name of the table.


    Tip: The script assumes that you have a default instance of SQL Server installed
    (as opposed to a named instance) and that you have the `AdventureWorks2022` database,
    which can be downloaded from `learn.microsoft.com/en-us/sql/samples/adventureworks-install-configure`.


    ```powershell

    Set-Location SQLSERVER:\SQL\localhost\Default\Databases\AdventureWorks2022\Tables

    dir | where { $_.name -like "*DatabaseLog*" }

    Rename-Item -LiteralPath dbo.DatabaseLog -NewName DatabaseLogPS

    dir | Where-Object { $_.name -like "*DatabaseLog*" }

    ```


    **Listing 2-13**

    Navigating Object Hierarchy and Renaming a Table


    It is also possible to start PowerShell from within SQL Server Management Studio
    (SSMS). To do this, select **Start PowerShell** from the context menu of an object
    folder, within Object Explorer. This will cause the PowerShell CLI to be invoked,
    with the initial location matching the object folder that you used to invoke the
    CLI.


    ## Summary


    PowerShell provides two methods of operation. The Command Line Interface can be
    used to immediately execute commands, in a similar manner to the Windows Command
    Prompt. This is useful for administrators who need to perform ad hoc actions or
    perform quick checks. The second method of operation is scripting. Administrators
    or DevOps Engineers can build complex scripts that involve many commands or are
    scheduled to run automatically.


    The PowerShell language is implemented through modules to make it extensible.
    Each module contains cmdlets, which provide the functionality. Commonly used cmdlets
    provide aliases, which can shorten the length of the command you have to type
    and help new PowerShell users with DOS or Linux experience to learn the language.
    Aliases should be reserved for ad hoc commands, however. When used in scripts,
    they make the code opaque and hard to manage.


    Each variable in PowerShell is an object, with a data type associated with it.
    Because the objects map to .NET classes, methods such as `ToString()` are available.
    PowerShell also provides a rich framework for controlling the execution flow of
    your script. This includes piping, which allows you to pass the results of one
    command directly into the next.


    The `SqlServer` module provides support for SQL Server. Once the module has been
    loaded, it exposes a set of SQL Server–based cmdlets, which allow you to manage
    SQL Server from the command shell or through automated scripts. It also allows
    you to navigate the object hierarchy of the SQL Server instance and perform basic
    tasks against objects.


    # 3. PowerShell DSC


    Configuration management is a powerful methodology that can be used to configure
    your servers to your organization’s standards, but also keep them configured in
    a consistent manner, by enforcing the policies on a scheduled basis as they move
    through their life cycle.


    In this chapter, we will discuss the concepts behind the configuration management
    approach, before drilling into the specific implementation of Desired State Configuration
    (DSC), which is Microsoft’s configuration management tool. Finally, we will explore
    how we can implement DSC to configure Windows Server in a SQL Server estate.'
