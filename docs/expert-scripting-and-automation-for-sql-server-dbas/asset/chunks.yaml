  trans: '# 针对 9002 错误设计响应方案


    在创建响应 9002 错误的流程之前，我们将首先创建一个流程图。这将有助于后续的编码工作，并作为该流程的持续文档。


    图 11-10 展示了我们在编写代码时将遵循的流程图。


    ![](img/395785_2_En_11_Fig10_HTML.jpg)


    展示数据库管理决策过程的流程图。它始于绿色椭圆中的“开始”，导向一个决策菱形，询问“数据库是否使用简单恢复模式？”如果“是”，则进行“发出 CHECKPOINT”，然后是“收缩事务日志”，并以红色椭圆中的“停止”结束。如果“否”，则询问“是否由于高可用/灾难恢复（HA/DR）导致延迟截断？”如果“是”，则导向“电子邮件通知
    DBA 团队”，然后“收缩事务日志”，并以“停止”结束。如果“否”，则导向“备份事务日志”，然后“收缩事务日志”，并以“停止”结束。


    图 11-10


    响应 9002 错误的流程图


    ## 自动化响应 9002 错误


    我们将使用 `SQL Server Agent` 警报来触发我们的流程（如果发生 9002 错误）。要创建新警报，请在 `SQL Server Management
    Studio` 中展开 `SQL Server Agent`，并从 `Alerts`（警报）的上下文菜单中选择 `New Alert`（新建警报）。这将显示
    `New Alert`（新建警报）对话框。在对话框的 `General`（常规）选项卡上（如图 11-11 所示），我们将为警报命名，并将其配置为由 `SQL
    Server` 错误号 9002 触发。


    ![](img/395785_2_En_11_Fig11_HTML.jpg)


    SQL Server 的“新建警报”配置窗口截图。警报被命名为“RespondTo9002”并已启用。这是一个针对所有数据库的 SQL Server 事件警报，由错误号
    9002 触发。严重性设置为“001 - 杂项系统信息”。服务器是“ESASSMGMT1”，连接到“ESASSMGMT1\Pete”。可以看到查看连接属性和进度状态为“就绪”的选项。


    图 11-11


    新建警报 – 常规选项卡


    在对话框的 `Response`（响应）选项卡上，我们将勾选 `Execute Job`（执行作业）选项，并使用 `New Job`（新建作业）按钮调用 `New
    Job`（新建作业）对话框。保存作业后，在 `New Job`（新建作业）对话框的 `General`（常规）选项卡上，我们将为我们新的 `Job`（作业）定义一个名称，如图
    11-12 所示。


    ![](img/395785_2_En_11_Fig12_HTML.jpg)


    软件应用程序中“新建作业”窗口的截图。界面包含“名称”、“所有者”、“类别”和“描述”字段，名称设置为“RespondTo9002”，所有者为“ESASSMGMT1\Pete”。类别为“[未分类（本地）]”。标有“已启用”的复选框已被勾选。左侧面板显示“常规”、“步骤”、“计划”、“通知”和“目标”等选项。连接详细信息显示服务器为“ESASSMGMT1”以及“查看连接属性”的链接。进度状态为“就绪”。


    图 11-12


    新建作业 – 常规选项卡


    在 `New Job`（新建作业）对话框的 `Steps`（步骤）选项卡上，我们将使用 `New`（新建）按钮调用 `New Job Step`（新建作业步骤）对话框。在
    `New Job Step`（新建作业步骤）对话框的 `General`（常规）选项卡上，我们将为我们的作业步骤命名，并配置其执行清单 11-5 中的脚本。


    ```sql

    --创建一个表来存储日志条目

    CREATE TABLE #ErrorLog

    (

    LogDate          DATETIME,

    ProcessInfo      NVARCHAR(128),

    Text             NVARCHAR(MAX)

    ) ;

    --用日志条目填充表

    INSERT INTO #ErrorLog

    EXEC(''xp_readerrorlog'') ;

    --声明变量

    DECLARE @SQL NVARCHAR(MAX) ;

    DECLARE @DBName NVARCHAR(128) ;

    DECLARE @LogName NVARCHAR(128) ;

    DECLARE @Subject        NVARCHAR(MAX) ;

    --查找发生错误的数据库名称

    SET @DBName = (

    SELECT TOP 1

    SUBSTRING(

    SUBSTRING(

    Text,

    35,

    LEN(Text)

    ),

    1,

    CHARINDEX(

    '''''''',

    SUBSTRING(Text,

    35,

    LEN(Text)

    )

    )-1

    )

    FROM #ErrorLog

    WHERE Text LIKE ''The transaction log for database%''

    ORDER BY LogDate DESC

    FOR XML PATH('''')

    ) ;

    --查找已满的日志文件名称

    SET @LogName = (

    SELECT name

    FROM sys.master_files

    WHERE type = 1

    AND database_id = DB_ID(@DBName)

    ) ;

    --终止任何活动的查询，以便清理操作可以执行

    SET @SQL = (

    SELECT ''USE Master; KILL '' + CAST(s.session_id AS NVARCHAR(4)) + '' ; ''

    FROM sys.dm_exec_requests r

    INNER JOIN sys.dm_exec_sessions s

    ON r.session_id = s.session_id

    INNER JOIN sys.dm_tran_active_transactions at

    ON r.transaction_id = at.transaction_id

    WHERE r.database_id = DB_ID(@DBName)

    ) ;

    EXEC(@SQL) ;

    --如果恢复模式为简单（SIMPLE）

    IF (SELECT recovery_model FROM sys.databases WHERE name = @DBName) = 3

    BEGIN

    --发出 CHECKPOINT

    SET @SQL = (

    SELECT ''USE '' + @DBName + '' ; CHECKPOINT''

    ) ;

    EXEC(@SQL) ;

    --收缩事务日志

    SET @SQL = (

    SELECT ''USE '' + @DBName + '' ; DBCC SHRINKFILE ('' + @LogName + '' , 1)''

    ) ;

    EXEC(@SQL) ;

    --发送电子邮件给 DBA 团队

    SET @Subject = (SELECT ''9002 Errors on '' + @DBName + '' on Server '' + @@SERVERNAME)

    EXEC msdb.dbo.sp_send_dbmail

    @profile_name = ''ESASS Administrator'',

    @recipients = ''DBATeam@ESASS.com'',

    @body = ''A CHECKPOINT has been issued and the Log has been shrunk'',

    @subject = @Subject ;

    END

    --如果数据库为完整恢复模式（FULL）

    IF (SELECT recovery_model FROM sys.databases WHERE name = @DBName) = 1

    BEGIN

    --如果重用延迟不是由于复制或镜像/可用性组导致

    IF (SELECT log_reuse_wait FROM sys.databases WHERE name = @DBName) NOT IN (5,6)

    BEGIN

    --备份事务日志

    SET @SQL = (

    SELECT ''BACKUP LOG ''

    + @DBName

    + '' TO  DISK = ''''C:\Backups\''

    + @DBName

    + ''.bak'''' WITH NOFORMAT, NOINIT,  NAME = ''''''

    + @DBName

    + ''-Full Database Backup'''', SKIP ;''

    ) ;

    EXEC(@SQL) ;

    --收缩事务日志

    SET @SQL =  (

    SELECT ''USE '' + @DBName + '' ; DBCC SHRINKFILE ('' + @LogName + '' , 1)''

    ) ;

    EXEC(@SQL) ;

    --发送电子邮件给 DBA 团队

    SET @Subject = (SELECT ''9002 Errors on '' + @DBName + '' on Server '' + @@SERVERNAME)
    ;

    EXEC msdb.dbo.sp_send_dbmail

    @profile_name = ''ESASS Administrator'',

    @recipients = ''DBATeam@ESASS.com'',

    @body = ''A Log Backup has been issued and the Log has been shrunk'',

    @subject = @Subject ;

    END

    --如果重用延迟是由于复制或镜像/可用性组导致

    ELSE

    BEGIN

    --发送电子邮件给 DBA 团队

    SET @Subject = (SELECT ''9002 Errors on '' + @DBName + '' on Server '' + @@SERVERNAME)
    ;

    EXEC msdb.dbo.sp_send_dbmail

    @profile_name = ''ESASS Administrator'',

    @recipients = ''DBATeam@ESASS.com'',

    @body = ''DBA intervention required - 9002 errors due to HA/DR issues'',

    @subject = @Subject ;

    END

    END

    ```


