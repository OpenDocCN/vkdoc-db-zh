  \ “LogDate”、“ProcessInfo” 和 “Text” 列）以及插入日志条目的 SQL 代码。左侧面板显示 “选择页面” 选项，“连接” 部分显示服务器详细信息。可以看到\
  \ “打开”、“全选”、“复制”、“粘贴” 和 “解析” 按钮。\n\n图 11-13\n\n#### 新建作业步骤 – 常规页\n\n退出 `新建作业步骤`\
  \ 对话框和 `新建作业` 对话框后，我们的新作业将自动出现在 `新建警报` 对话框的 `响应` 页面上的 `执行作业` 下拉列表中，如图 11-14 所示。\n\
  \n![](img/395785_2_En_11_Fig14_HTML.jpg)\n\n服务器管理界面中 “新建警报” 配置窗口的截图。该窗口包含执行名为 “RespondTo9002\
  \ (未分类本地)” 的作业的选项，以及 “新建作业” 和 “查看作业” 按钮。有一个通知操作员的部分，尽管未列出任何操作员。左侧面板显示导航选项，如常规、响应和选项，其中响应选项卡被选中。连接详细信息显示\
  \ “服务器: ESASSMGMT1” 和 “连接: ESASSMGMT1\\Pete”。底部的进度指示器显示 “就绪”。\n\n图 11-14\n\n####\
  \ 响应页\n\n我们无需在 `新建警报` 对话框的 `选项` 页面上进行任何配置。但您应该了解在此页面上可以配置的选项。一个非常有用的选项是能够在响应之间提供延迟。配置此选项可以帮助您避免在先前的响应仍在处理问题的过程中时触发\
  \ “误” 响应的可能性。\n\n## 总结\n\n自动化日常维护任务可以节省 DBA 的宝贵时间，并提高对业务的服务水平。当然，可能无法实现 100% 维护自动化，因为总会有例外情况。目标是将\
  \ 80% 的任务自动化，20% 作为例外处理，这是一个很好的思路。除了自动化数据库引擎内的任务（例如智能 `索引重建`，如您在前面章节中所学）之外，也可以自动化包含操作系统元素的任务，例如打补丁。\n\
  \n您能自动化的故障/修复场景越多，您对业务的服务就会越好、越主动。然而，试图一次性自动化对所有故障/修复场景的响应是不可行的。这是因为问题会随着时间而变化和不同，并且如此大规模的工作很可能成本过高。相反，您应该将自动化的故障/修复场景作为一项持续服务改进\
  \ (`CSI`) 计划来添加。利用工单系统的问题管理功能来帮助定义适合自动化的候选问题会很有帮助。\n\n\n\n\nAdd-SqlLogin cmdlet,\
