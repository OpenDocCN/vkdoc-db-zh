  \n最后一步是安排此配置运行。我通常建议每 30 分钟运行一次配置。也就是说，如果服务器上出现任何偏差，将在不超过半小时内（加上配置执行所需的时间）得到纠正。\n\
  \n清单 3-7 演示了如何在任务计划程序中配置任务以每 30 分钟应用一次配置。该脚本设置了多个变量，这些变量构建了在脚本末尾执行 `Register-ScheduledTask`\
  \ 命令所需的参数。\n\n注意\n\n你会注意到我们使用的是 Windows PowerShell，而不是 PowerShell 7。这是因为，如前所述，不使用\
  \ Azure 的 DSC 仅由随 Windows PowerShell 5.1 一起发布的 DSC 1.1 支持。PowerShell 7 随附 DSC 2.0，其中包含重大更改，并且截至\
  \ PowerShell 7.2，`PSDesiredStateConfiguration` 模块不再随 PowerShell 一起提供，而是作为单独的下载提供。\n\
  \n```\n$command = 'C:\\Windows\\System32\\WindowsPowerShell\\v1.0\\powershell.exe'\n\
  $arguments = '-NoProfile -Command \"Start-DscConfiguration -Path C:\\Scripts\\WindowsConfig\"\
  \ -Wait'\n$actions = (New-ScheduledTaskAction -Execute $command -Argument $arguments\
  \ )\n$trigger = New-ScheduledTaskTrigger -Once -At 00:00 -RepetitionInterval (New-TimeSpan\
  \ -Minutes 30)\n$settings = New-ScheduledTaskSettingsSet\n$principal = New-ScheduledTaskPrincipal\
  \ -UserId 'NT AUTHORITY\\SYSTEM' -RunLevel Highest -LogonType ServiceAccount\n$task\
  \ = New-ScheduledTask -Action $actions -Trigger $trigger -Settings $settings -Principal\
  \ $principal\nRegister-ScheduledTask 'ApplyWindowsConfig' -InputObject $task\n清单\
  \ 3-7\n创建计划任务\n```\n\n## 总结\n\n配置管理是一种非常强大的技术，用于构建服务器并避免其在生命周期中发生配置偏差。现代的 DSC 最适合在利用\
  \ Azure 或 Azure Arc 的环境中使用。然而，通过使用 DSC 1.1 版本，它仍然可以在非 Azure 环境中使用。\n\nDSC 可用于配置\
  \ Windows 的所有方面。在本章中，我们研究了如何使用 DSC 配置注册表项、文件夹以及确保服务正在运行。在第 6 章中，我们将探讨如何使用 DSC 安装\
  \ SQL Server；在第 9 章中，我们将探讨如何使用 DSC 配置 SQL Server 本身。\n\nDSC 是完全可扩展的，我们可以编写自己的 DSC\
  \ 资源，这些资源几乎可以涵盖任何可能的配置。DSC 的美妙之处在于它只执行需要执行的配置以避免偏差。每个资源都将测试资源的状态，并且仅在测试评估失败时才执行设置操作。\n\
  \n"
- "# 4. 使用 sqlserver 模块\n\n`sqlserver` 是一个由 Microsoft 编写和维护的 PowerShell 模块，它允许 DBA\
  \ 从 PowerShell 终端与 SQL Server 实例进行交互和管理。可以手动从 PowerShell Gallery ([`www.powershellgallery.com/packages/Sqlserver`](http://www.powershellgallery.com/packages/Sqlserver/21.1.18228))\
  \ 下载，也可以使用清单 4-1 中的命令安装。\n\n```\nInstall-Module SqlServer\n清单 4-1\n安装 sqlserver\
  \ 模块\n```\n\n在本章中，我们将讨论如何使用该模块，探索一些最有用的命令及其用例，既适用于临时管理，也适用于自动化。我们将首先了解 `Invoke-SqlCmd`\
  \ 命令，然后再了解可用于管理和脚本编写的其他命令。\n\n## 使用 Invoke-SqlCmd\n\n可以说，`sqlserver` 模块中最常用的命令是\
  \ `Invoke-SqlCmd`。该命令镜像了 `SQLCMD` 命令行工具的功能，允许 DBA 从 PowerShell 终端针对 SQL Server 实例运行查询。\n\
  \n\n### Invoke-SqlCmd 基础用法\n\n`Invoke-SqlCmd` 最基本的调用方式涉及传递两个参数：`ServerInstance`（定义查询应针对哪个\
  \ SQL Server 实例运行）和 `Query`（提供要执行的查询语句）。清单 4-2 演示了如何使用此基本调用从本地服务器的默认实例返回数据库名称列表。`ServerInstance`\
  \ 参数的可能格式包括 `ServerName` 和 `ServerName\\InstanceName`。如果你希望针对本地服务器的默认实例运行查询，则可以使用\
  \ `localhost`、`.` 或完全省略 `ServerInstance` 参数。\n\n提示\n\n以下示例假设使用 Windows 身份验证。如果应使用\
  \ SQL 身份验证，则还需要传递用户凭据。\n\n如果你使用的是 `sqlServer` 模块的 v22 或更高版本且未配置加密，则将需要 `-TrustServerCertificate`\
  \ 参数。\n\n```\nInvoke-SqlCmd -ServerInstance localhost -Query \"SELECT name FROM\
  \ sys.databases\" -TrustServerCertificate\n清单 4-2\nInvoke-SqlCmd 的基本调用\n```\n\n\
  ### 将 Invoke-SqlCmd 用于脚本编写\n\n现在我们已经将数据库列表显示在屏幕上，这对于临时的 DBA 活动来说既很棒又确实有用。如果我们计划在脚本中使用\
  \ `Invoke-SqlCmd`，那么我们很可能会希望将查询结果传递到一个变量中。\n\n清单 4-3 中的脚本演示了如何做到这一点，但它也引入了一种称为**拼接**的技术。该技术会构建一个哈希表，其中包含键/值对，这些键/值对应于我们计划传递给命令的参数名称和值。当我们执行命令时，我们只需传递该哈希表，PowerShell\
  \ 就会展开其中的参数名称和值。在功能上，这等同于以通常的方式将每个参数传递给命令。拼接的好处在于它使命令更简洁、更易于阅读。日后查找和管理参数值也更容易。\n\
  \n```\n$Params = @{\nServerInstance = \"localhost\"\nQuery          = \"SELECT name\
  \ FROM sys.databases\"\n}\n$Databases = Invoke-Sqlcmd @Params\n清单 4-3\n将 Invoke-SqlCmd\
  \ 结果传递给变量\n```\n\n需要注意的是，`Invoke-SqlCmd` 命令的结果是一个对象或对象数组。默认情况下，输出为 `DataRow` 对象，尽管可以使用\
  \ `OutputAs` 参数将输出更改为 `DataSet` 或 `DataTables` 格式。这意味着你需要使用丰富对象的属性，而不是对象本身。例如，考虑清单\
  \ 4-4 中的脚本，它将 `$Databases` 变量传递给 `foreach` 循环，并将每个对象写入屏幕。\n\n提示\n\n`foreach` 循环在第\
  \ 2 章介绍。\n\n```\n$Params = @{\nServerInstance = \"localhost\"\nQuery          =\
  \ \"SELECT name FROM sys.databases\"\n}\n$Databases = Invoke-Sqlcmd @Params\nforeach\
  \ ($Database in $Databases) {\nWrite-Host $Database\n}\n清单 4-4\n将丰富对象传递给 foreach\
  \ 循环\n```\n\n运行此脚本的结果显示如下：\n\n```\nSystem.Data.DataRow\nSystem.Data.DataRow\nSystem.Data.DataRow\n\
  System.Data.DataRow\nSystem.Data.DataRow\n```\n\n相反，我们应该使用丰富对象的属性。在这个特定情况下，我们返回的列名为\
  \ `name`；因此，我们应该使用 `name` 属性，如清单 4-5 所示。\n\n```\n$Params = @{\nServerInstance =\
  \ \"localhost\"\nQuery          = \"SELECT name FROM sys.databases\"\n}\n$Databases\
  \ = Invoke-Sqlcmd @Params\nforeach ($Database in $Databases) {\nWrite-Host $Database.name\n\
  }\n清单 4-5\n使用对象属性\n```\n\n此脚本将返回更有用的结果，如下所示：\n\n```\nmaster\ntempdb\nmodel\nmsdb\n\
  WideWorldImporters\n```\n\n这一点自然引出了如何使用 `Invoke-SqlCmd` 返回的数据的讨论。在上面的例子中，我们一直返回我们实例上存在的数据库列表。想象一下，你有一个脚本，它将根据碎片化阈值动态重建索引，例如清单\
  \ 4-6 中的脚本。\n\n提示\n\n创建动态索引重建脚本和其他元数据驱动的自动化将在第 7 章中更详细地讨论。\n\n```\nDECLARE @SQL\
  \ NVARCHAR(MAX)\nSET @SQL =\n(\nSELECT 'ALTER INDEX '\n+ QUOTENAME(i.name)\n+ '\
  \ ON ' + s.name\n+ '.'\n+ QUOTENAME(OBJECT_NAME(i.object_id))\n+ ' REBUILD ; '\n\
  FROM sys.dm_db_index_physical_stats(DB_ID(),NULL,NULL,NULL,'DETAILED') ps\nINNER\
  \ JOIN sys.indexes i\nON ps.object_id = i.object_id\nAND ps.index_id = i.index_id\n\
  INNER JOIN sys.objects o\nON ps.object_id = o.object_id\nINNER JOIN sys.schemas\
  \ s\nON o.schema_id = s.schema_id\nWHERE index_level = 0\nAND avg_fragmentation_in_percent\
  \ > 25\nFOR XML PATH('')\n) ;\nEXEC(@SQL) ;\n清单 4-6\n动态索引重建\n```\n\n提示\n\n使用 `FOR\
  \ XML PATH` 在 T-SQL 中高效循环的内容将在第 1 章进一步解释。\n\n一个包含数据库列表的变量将允许我们安排此脚本针对我们实例上的每个数据库运行，而无需维护一个静态的数据库列表。此技术在清单\
  \ 4-7 中演示。\n\n```\n$Params = @{\nServerInstance = \"localhost\"\nQuery         \
  \ = \"SELECT name FROM sys.databases\"\n}\n$Databases = Invoke-Sqlcmd @Params\n\
  foreach ($Database in $Databases) {\n$Params = @{\nServerInstance = \"localhost\"\
  \nDatabase       = $Database.name\nInputFile      = \"c:\\scripts\\IndexRebuild.sql\"\
  \n}\nInvoke-Sqlcmd @Params\n}\n清单 4-7\n对所有数据库运行脚本\n```\n\n关于此脚本，有几个关键点需要考虑。首先，请注意我们正在使用\
  \ `Invoke-SqlCmd` cmdlet 的 `Database` 参数。我们在 `foreach` 循环的每次迭代中传入 `Database` 对象的\
  \ `name` 属性。\n\n其次，虽然在技术上可以将索引重建脚本直接传递到 `Invoke-SqlCmd` 的 `Query` 参数，但此脚本对于这种方法来说相当大，并且会使我们的脚本难以维护。因此，我们将脚本保存在一个名为\
  \ `c:\\scripts\\IndexRebuild.sql` 的文件中，并使用 `InputFile` 参数将此文件传递给 cmdlet。\n\n\n###\
  \ 处理参数\n\n当然，虽然这个脚本已经变得相当有用，但如果它能接受变量，就会更加实用。在这种情况下，变量最明显的用例是碎片化阈值，但我们可能还想增强脚本以重建那些受外部碎片影响的索引。因此，清单\
  \ 4-8 更新了 `IndexRebuild.sql` 脚本以包含 `avg_page_space_used_in_percent`，并期望将变量传递到 `WHERE`\
  \ 子句中。请注意，变量的格式是 SQLCMD 格式的 `$(Variable)`。\n\n```sql\nDECLARE @SQL NVARCHAR(MAX)\n\
  SET @SQL =\n(\nSELECT 'ALTER INDEX '\n+ QUOTENAME(i.name)\n+ ' ON ' + s.name\n+\
  \ '.'\n+ QUOTENAME(OBJECT_NAME(i.object_id))\n+ ' REBUILD ; '\nFROM sys.dm_db_index_physical_stats(DB_ID(),NULL,NULL,NULL,'DETAILED')\
  \ ps\nINNER JOIN sys.indexes i\nON ps.object_id = i.object_id\nAND ps.index_id =\
  \ i.index_id\nINNER JOIN sys.objects o\nON ps.object_id = o.object_id\nINNER JOIN\
  \ sys.schemas s\nON o.schema_id = s.schema_id\nWHERE index_level = 0\nAND (avg_fragmentation_in_percent\
  \ > $(Fragmentation)\nOR avg_page_space_used_in_percent < $(PageSpace))\nFOR XML\
  \ PATH('')\n) ;\nEXEC(@SQL) ;\n```\n清单 4-8\n更新脚本以期望变量\n\n`Invoke-SqlCmd` 允许通过 `Variable`\
  \ 参数使用 `VARIABLE='Value'` 格式传递 SQLCMD 变量。如清单 4-9 所示。\n\n```powershell\n$Variables\
  \ = \"Fragmentation=25\", \"PageSpace=70\"\n$Params = @{\nServerInstance = \"localhost\"\
  \nQuery          = \"SELECT name FROM sys.databases\"\n}\n$Databases = Invoke-Sqlcmd\
  \ @Params\nforeach ($Database in $Databases) {\n$Params = @{\nServerInstance = \"\
  localhost\"\nDatabase       = $Database.name\nInputFile      = \"c:\\scripts\\IndexRebuild.sql\"\
  \nVariable       = $Variables\n}\nInvoke-Sqlcmd @Params\n}\n```\n清单 4-9\n将变量传递给\
  \ Invoke-SqlCmd\n\n在这个脚本中，我们首先创建一个字符串数组，其中包含我们想要传递的每个变量。然后，我们将这个数组传递给 `Variable`\
  \ 参数。\n\n> 提示\n> \n> 如果我们运行索引重建等维护任务，那么配置超时会很有帮助。`Invoke-SqlCmd` 支持 `ConnectionTimeout`\
  \ 和 `QueryTimeout` 参数，允许你以秒为单位指定超时值。\n\n### 输出错误\n\n`Invoke-SqlCmd` 有许多参数，虽然不如我们到目前为止讨论的那些常用，但同样有用。例如，假设我们在用于返回数据库名称列表的查询中有一个错误。我们可以使用\
  \ `OutputSqlErrors` 参数来返回错误。如清单 4-10 所示。我们预计这个查询会失败，因为 `WHERE` 子句中的列应该是 `database_id`，而不是\
  \ `db_id`。第一次调用 `Invoke-SqlCmd` 会成功，但 `$Databases` 参数将为空。第二次调用 `Invoke-SqlCmd` 将告诉我们错误。\n\
  \n```powershell\n$Params = @{\nServerInstance   = \"localhost\"\nQuery         \
  \   = \"SELECT name FROM sys.databases WHERE db_id = 1\"\nOutputSqlErrors = $false\n\
  }\n$Databases = Invoke-Sqlcmd @Params\n$Params = @{\nServerInstance   = \"localhost\"\
  \nQuery            = \"SELECT name FROM sys.databases WHERE db_id = 1\"\nOutputSqlErrors\
  \ = $true\n}\n$Databases = Invoke-Sqlcmd @Params\n```\n清单 4-10\n输出错误消息\n\n第二次调用返回的错误如下所示：\n\
  \n```powershell\nInvoke-Sqlcmd : Invalid column name 'db_id'.\nAt line:15 char:14\n\
  + $Databases = Invoke-Sqlcmd @Params\n+              ~~~~~~~~~~~~~~~~~~~~~\n+ CategoryInfo\
  \          : InvalidOperation: (:) [Invoke-Sqlcmd], SqlPowerShellSqlExecutionException\n\
  + FullyQualifiedErrorId : SqlError,Microsoft.SqlServer.Management.PowerShell.GetScriptCommand\n\
  ```\n\n#### 将结果写入文件\n\n没有直接允许你将查询结果发送到文件的参数；但是，可以通过将 `Invoke-SqlCmd` 的结果通过管道传输到\
  \ `Out-File` cmdlet 来实现相同的目的。如清单 4-11 所示，它将数据库列表写入名为 `c:\\scripts\\DatabasesOut.txt`\
  \ 的文件。\n\n```powershell\n$Params = @{\nServerInstance  = \"localhost\"\nQuery  \
  \         = \"SELECT name FROM sys.databases\"\n}\nInvoke-Sqlcmd @Params | Out-File\
  \ -FilePath \"c:\\scripts\\DatabasesOut.txt\"\n```\n清单 4-11\n将结果输出到文件\n\n> 提示\n\
  > \n> 对于许多用例，最好先将结果通过管道传输到 `ConvertTo-Csv`，然后再传输到 `Out-File`，但这会产生将 NULL 值转换为 `System.Byte[]`\
  \ 的副作用。\n\n### 用户执行上下文\n\n到目前为止的所有示例都使用了 Windows 身份验证。也就是说，T-SQL 脚本是在交互式运行 PowerShell\
  \ 的 Windows 用户的安全上下文下执行的，并假设该 Windows 用户在 SQL Server 中具有执行查询的适当权限。\n\n然而，情况并非总是如此，特别是当脚本被安排为无人值守运行时，而不是由人交互式运行时。在这些场景中，可以使用\
  \ SQL Server 身份验证（即 SQL Server 登录名和密码）来验证 SQL Server。\n\n要以这种方式进行身份验证，你可以使用 `Username`\
  \ 和 `Password` 参数，或者使用 `Credential` 参数，后者将用户名和密码作为 `PSCredential` 对象传递。首先，让我们检查\
  \ `Username` 和 `Password` 参数。假设存在一个名为 `Pete`、密码为 `Pa$$w0rd` 的 SQL 登录名，我们可以使用清单 4-12\
  \ 中的脚本来检索数据库名称列表。\n\n```powershell\n$Params = @{\nServerInstance  = \"localhost\"\
  \nQuery           = \"SELECT name FROM sys.databases\"\nUsername        = \"Pete\"\
  \nPassword        = 'Pa$$w0rd'\n}\nInvoke-Sqlcmd @Params\n```\n清单 4-12\n使用用户名和密码参数\n\
  \n这是一个简单的方法，但不是很安全，因为用户名和密码将以明文形式发送到 SQL Server 实例。如果命令是从本地服务器运行的，这可能没问题，但明文凭据绝不应通过网络发送。因此，另一种方法是使用\
  \ `Credential` 参数，如清单 4-13 所示。\n\n```powershell\n$UserName = 'Pete'\n$SecurePassword\
  \ = ConvertTo-SecureString 'Pa$$w0rd' -AsPlainText -Force\n$Credential = [PSCredential]::new($UserName,\
  \ $SecurePassword)\n$Params = @{\nServerInstance  = \"localhost\"\nQuery       \
  \    = \"SELECT name FROM sys.databases\"\nCredential      = $Credential\n}\nInvoke-Sqlcmd\
  \ @Params\n```\n清单 4-13\n使用凭据参数进行身份验证\n\n该脚本首先创建 `$UserName` 和 `$Password` 变量。密码被创建为安全字符串。然后，这些变量用于创建一个\
  \ `PSCredential` 对象，该对象被传递给 `Invoke-SqlCmd` 的 `Credential` 参数。\n\n## 管理安全对象\n\n\
  `sqlserver` 模块提供的不仅仅是 `Invoke-SqlCmd`，它还包含用于执行常见管理任务的定制 cmdlet。这包括一组用于管理安全对象（包括登录名和凭据）的\
  \ cmdlet。然而，该模块在处理数据库用户和权限方面的功能有些有限；因此，我们需要直接与 SMO（SQL Server 管理对象——`sqlserver`\
  \ 模块所基于的库）交互来管理这些方面。以下部分将讨论这些主题。\n\n> 提示\n> \n> 对每个安全对象及其注意事项的详细讨论超出了本书的范围，但可以在\
  \ Apress 书籍 *Securing SQL Server* 中找到，链接如下：[`www.apress.com/gb/book/9781484222652`](http://www.apress.com/gb/book/9781484222652)。\n\
  \n\n### 处理登录名\n\n可以使用 `Add-SqlLogin` cmdlet 创建新的登录名。其最基本的形式是，您可以简单地请求创建一个具有指定名称的新的\
  \ SQL Server 登录名，如清单 4-14 所示。\n\n```powershell\n$params = @{\nServerInstance  =\
  \ \"localhost\"\nLoginName       = \"Pete\"\nLoginType       = \"SqlLogin\"\nDefaultDatabase\
  \ = \"WideWorldImporters\"\nEnable          = $true\nGrantConnectSql = $true\n}\n\
  Add-SqlLogin @params\n清单 4-14\n创建新登录名\n```\n\n提示\n\n如果您不设置 `Enable = $true`，登录名将被创建但处于禁用状态。如果您不设置\
  \ `GrantConnectSql = $true`，则登录名将被创建，但不会被授予连接到数据库引擎的权限。\n\n这将显示一个密码提示，如图 4-1 所示，您可以在其中为登录名输入所需的密码。\n\
  \n提示\n\n如果使用非 Windows 操作系统，提示将显示在控制台中，而不是弹出窗口中。\n\n如果您正在运行临时命令，这样做没问题，但如果您尝试编写脚本流程，这就不太方便了。因此，您也可以将一个\
  \ `PSCredential` 对象传递到 `LoginPsCredential` 参数中，而不是使用 `LoginName` 参数。这将允许用户名和密码都安全地传递给\
  \ SQL Server。清单 4-15 演示了此技术。\n\n```powershell\n$UserName = 'Pete'\n$Password = 'Pa$$w0rd'\n\
  # Convert to SecureString\n$SecurePassword = ConvertTo-SecureString $Password -AsPlainText\
  \ -Force\n#Create The psCredential object\n$LoginCredential = [PSCredential]::new($UserName,\
  \ $SecurePassword)\n$params = @{\nServerInstance      = \"localhost\"\nLoginPsCredential\
  \   = $LoginCredential\nLoginType           = \"SqlLogin\"\nDefaultDatabase    \
  \ = \"WideWorldImporters\"\nEnable              = $true\nGrantConnectSql     = $true\n\
  }\nAdd-SqlLogin @params\n清单 4-15\n使用 LoginPsCredential 创建登录名\n```\n\n![](img/395785_2_En_4_Fig1_HTML.jpg)\n\
  \nSQL 登录密码提示的截图。该窗口请求新登录名的密码，显示一个用户名字段，其中选择了 \"Pete\"。下方是一个密码输入字段。该窗口包含 \"确定\" 和\
  \ \"取消\" 按钮。左上角可见一个钥匙图标。\n\n图 4-1\n密码提示\n\n就像使用 T-SQL 或 SQL Server Management Studio\
  \ 创建登录名一样，也可以为登录名强制实施域密码策略。这可以通过 `EnforcePasswordPolicy`、`EnforcePasswordExpiration`\
  \ 和 `MustChangePasswordAtNextLogin` 参数来实现。\n\n这些参数形成一个层级结构。不设置 `EnforcePasswordPolicy`\
  \ 就无法设置 `EnforcePasswordExpiration`。同样，不设置 `EnforcePasswordExpiration` 也无法设置 `MustChangePasswordAtNextLogin`。因此，如果您指定了层级结构中较低级别的参数，它就会隐式地意味着设置了其上级的参数。\n\
  \n例如，清单 4-16 中的脚本只指定了 `MustChangePasswordAtNextLogin`，但由于此参数位于层级结构的底部，`EnforcePasswordExpiration`\
  \ 和 `EnforcePasswordPolicy` 也会被设置。\n\n```powershell\n$UserName = 'Pete'\n$Password\
  \ = 'Pa$$w0rd'\n# Convert to SecureString\n$SecurePassword = ConvertTo-SecureString\
  \ $Password -AsPlainText -Force\n#Create The psCredential object\n$LoginCredential\
  \ = [PSCredential]::new($UserName, $SecurePassword)\n$params = @{\nServerInstance\
  \                  = \"localhost\"\nLoginPsCredential               = $LoginCredential\n\
  LoginType                       = \"SqlLogin\"\nDefaultDatabase                \
  \ = \"WideWorldImporters\"\nEnable                          = $true\nGrantConnectSql\
  \                 = $true\nMustChangePasswordAtNextLogin   = $true\n}\nAdd-SqlLogin\
  \ @params\n清单 4-16\n强制实施密码策略\n```\n\n`Add-SqlLogin` cmdlet 也可用于为 Windows 用户、Windows\
  \ 组、非对称密钥和证书创建 SQL 登录名。这通过更改 `LoginType` 参数的值来实现。例如，清单 4-17 中的脚本将为 AD 用户 `POSHSQL\\\
  Pete` 创建一个登录名。\n\n```powershell\n$params = @{\nServerInstance    = \"localhost\"\
  \nLoginName         = \"POSHSQL\\Pete\"\nLoginType         = \"WindowsUser\"\nDefaultDatabase\
  \   = \"WideWorldImporters\"\nEnable            = $true\nGrantConnectSql   = $true\n\
  }\nAdd-SqlLogin @param\n清单 4-17\n为 Windows 用户创建登录名\n```\n\nsqlserver 模块还提供了一个 `Get-SqlLogin`\
  \ cmdlet，它允许您返回有关用户的信息。例如，清单 4-18 中的脚本返回了我们在前面示例中创建的名为 Pete 的 SQL 登录名的详细信息。\n\n\
  ```powershell\n$params = @{\nServerInstance = \"localhost\"\nLoginName      = \"\
  Pete\"\n}\nGet-SqlLogin @params\n清单 4-18\n返回登录名详细信息\n```\n\n此命令返回的结果如下所示：\n\n```powershell\n\
  Name                                        Login Type    Created\n----        \
  \                                ----------    ----------------\nPete          \
  \                                SqlLogin      10/10/2020 10:33\n```\n\n`Get-SqlLogin`\
  \ 命令可以使用通配符或正则表达式搜索来运行，或者如果您省略 `LoginName` 参数，它将返回实例中存在的所有登录名。这对于审计、清理旧登录名、强制实施命名约定以及检查登录名是否存在非常有帮助。当然，此命令也可以添加到脚本中以帮助构建自动化管理例程。\n\
  \n在另一个 cmdlet `Remove-SqlLogin` 的帮助下，让我们看看如何使用 `Get-SqlLogin` 命令来清理旧的登录对象。清单 4-19\
  \ 中的脚本将返回所有 SQL 登录名（使用 `LoginType` 参数进行筛选，仅包括 SQL 登录名，不包括 Windows 用户或 Windows 组），然后将它们通过管道传递给\
  \ `Remove-Login` cmdlet，该 cmdlet 将把它们从实例中删除。\n\n```powershell\n$params = @{\nServerInstance\
  \ = \"localhost\"\nLoginName      = \"*Pete*\"\nWildcard       = $true\nLoginType\
  \      = \"SqlLogin\"\n}\nGet-SqlLogin @params | Remove-SqlLogin\n清单 4-19\n使用 Get-SqlLogin\
  \ 和 Remove-SqlLogin 清理旧的登录对象\n```\n\n### 处理服务器角色\n\n现在，我们知道了如何创建 SQL 登录名，但通常我们会希望创建一个与该登录名关联的数据库用户，并通过服务器和数据库角色为我们的安全主体分配对\
  \ SQL Server 资源的权限。在这里，sqlserver 模块缺乏此功能，因此我们需要直接与 SMO（SQL Server 管理对象）交互来执行所需的任务。\n\
  \n清单 4-20 中的脚本演示了如何将我们的登录名 `Pete` 添加到 `dbcreator` 服务器角色中，以便该主体可以创建新的数据库。该脚本首先创建一个映射到我们\
  \ SQL Server 实例的 SMO 对象。然后，我们为 `dbcreator` 服务器角色创建一个对象，最后将我们的登录名添加到该角色中。\n\n```powershell\n\
  using namespace Microsoft.SqlServer.Management.Smo\n#Set variables\n$ServerInstance\
  \ = \"localhost\"\n$LoginName = \"Pete\"\n$Role = \"dbcreator\"\n#Create an SMO\
  \ instance of our SQL Instance\n$Server = [Server]::new($ServerInstance)\n#Traverse\
  \ the instance for find the role\n$ServerRole = $Server.Roles[$Role]\n#Add the Login\
  \ to the server role\n$ServerRole.AddMember($LoginName)\n清单 4-20\n将登录名添加到服务器角色\n\
  ```\n\n\n### 处理数据库用户\n\n现在我们应该在 `WideWorldImporters` 数据库内部创建一个数据库用户。同样，`sqlserver`\
  \ 模块在这里功能有限，因此我们需要与 SMO 进行交互。清单 4-21 中的脚本使用了与上面示例类似的技术，当时我们将我们的登录名添加到了 `dbcreator`\
  \ 服务器角色中。\n设置变量后，脚本首先创建一个映射到我们 SQL Server 实例的 SMO 对象。然后，我们遍历此实例表示中的数据库，以创建我们数据库的\
  \ SMO 表示。接着，我们创建一个表示新数据库用户的 SMO 对象，之后使用该用户对象上的 `Create` 方法来创建数据库用户。\n\n```powershell\n\
  using namespace Microsoft.SqlServer.Management.Smo\n#Set Variables\n$ServerInstance\
  \ = \"localhost\"\n$LoginName = \"Pete\"\n$UserName = \"Pete\"\n$Database = \"WideWorldImporters\"\
  \n#Create an SMO instance of our SQL Instance\n$Server = [Server]::new($ServerInstance)\n\
  #Create an SMO instance of our Database\n$Database = $Server.Databases[$Database]\n\
  #Create an SMO objecty to represent our new user and map the appropriate Login\n\
  $DbUser = [Microsoft.SqlServer.Management.Smo.User]::New($Database, $UserName)\n\
  $DbUser.Login  = $LoginName\n#Use the Create method to create the Database User\n\
  $DbUser.Create()\n```\n清单 4-21\n创建数据库用户\n\n现在用户已创建，我们应该将其添加到适当的数据库角色以分配权限。在此例中，我们希望将登录名\
  \ Pete 添加到 `db_datareader` 角色。为此，我们修改前面示例中的脚本，这次不再创建数据库用户，而是使用用户对象的 `AddToRole`\
  \ 方法将用户添加到数据库角色，如清单 4-22 所示。\n\n```powershell\nusing namespace Microsoft.SqlServer.Management.Smo\n\
  #Set Variables\n$ServerInstance = \"localhost\"\n$UserName = \"Pete\"\n$Database\
  \ = \"WideWorldImporters\"\n$Role = \"db_datareader\"\n#Create an SMO instance of\
  \ our SQL Instance\n$Server = [Server]::new($ServerInstance)\n#Create an SMO instance\
  \ of our Database\n$Database = $Server.Databases[$Database]\n#Create an SMO objecty\
  \ to represent our user\n$DbUser = $Database.Users[$UserName]\n#Use the Create method\
  \ to create the Database User\n$DbUser.AddToRole($Role)\n```\n清单 4-22\n将用户添加到数据库角色\n\
  \n### 处理凭据\n\n凭据是 SQL Server 中的一个实例级对象，包含向 SQL Server 实例外部资源进行身份验证所需的详细信息。一个典型用例是与\
  \ SQL Server Agent 作业配合使用。默认情况下，SQL Server Agent 作业中的作业步骤在运行 SQL Server Agent 服务的服务帐户的安全上下文下运行。但是，如果作业步骤需要提升的权限，那么为了在不同安全上下文下运行特定的作业步骤，可以帮助减少服务帐户的安全足迹。\n\
  在这种情况下，您可以在 SQL Server 中创建一个凭据，该凭据映射到具有执行相关任务所需权限的不同 AD 帐户。然后，此凭据对象可以映射到 SQL Server\
  \ Agent 代理，该代理又用于运行相关的作业步骤。\n凭据的另一个用例是在混合云场景中。例如，如果您正在执行备份到 Azure Blob 存储，则必须使用凭据来存储\
  \ Azure 存储帐户名称和访问密钥。\n`sqlserver` 模块提供了 `New-SqlCredential`、`Get-SqlCredential`\
  \ 和 `Remove-SqlCredential` cmdlet 来管理 SQL Server 中的凭据对象。例如，清单 4-23 中的脚本可用于创建一个名为\
  \ `WinUser` 的凭据，该凭据存储 Windows 用户 `POSHSQL\\Pete` 的身份验证详细信息。\n关于此脚本需要注意的关键点是，我们没有提供\
  \ `ServerInstance` 参数来指定应在其中创建凭据的 SQL Server 实例，而是提供了 `Path` 参数。此参数指定实例的 Windows\
  \ Management Instrumentation (WMI) 位置，形式为 `SQLServer:\\SQL\\[ServerName]\\[InstanceName]`，其中\
  \ `default` 用于指定默认实例，或者使用命名实例的名称。\n\n```powershell\n$Password = 'Pa$$w0rd'\n# Convert\
  \ to SecureString\n$SecurePassword = ConvertTo-SecureString $Password -AsPlainText\
  \ -Force\n$params = @{\n    Name     = \"WinUser\"\n    Identity = \"POSHSQL\\Pete\"\
  \n    Secret   = $SecurePassword\n    Path     = \"SQLServer:\\SQL\\localhost\\\
  default\"\n}\nNew-SqlCredential @params\n```\n清单 4-23\n创建凭据\n\n为了演示 `Get-SqlCredential`\
  \ 和 `Remove-SqlCredential` cmdlet 的用法，让我们使用与处理登录名类似的场景。我们将使用 `Get-SqlCredential`\
  \ cmdlet 来返回我们的 `WinUser` 凭据，然后将其通过管道传递给 `Remove-SqlCredential` cmdlet 以删除它们。如清单\
  \ 4-24 所示。\n\n```powershell\n$params = @{\n    Name     = \"WinUser\"\n    Path\
  \     = \"SQLServer:\\SQL\\localhost\\default\"\n}\nGet-SqlCredential @params |\
  \ Remove-SqlCredential\n```\n清单 4-24\n删除旧凭据\n\n### 处理可用性组\n\n`sqlserver` 模块提供了多个用于管理\
  \ AlwaysOn 可用性组的 cmdlet。在本节中，我们将重点介绍可用的 cmdlet，但全面讨论可用性组超出了本书的范围。\n**提示**\n全面讨论\
  \ SQL Server AlwaysOn 可用性组超出了本书的范围；但是，完整细节可以在 Apress 出版物 *SQL Server 2019 AlwaysOn*\
  \ 中找到，链接如下：link.springer.com/book/10.1007/978-1-4842-6479-9。\n支持可用性组的 cmdlet 列表可以通过运行清单\
  \ 4-25 中的命令找到。\n\n```powershell\nGet-Command -Module sqlserver -Name  '*availability*'\
  \ | Select-Object -ExpandProperty Name\n```\n清单 4-25\n列出可用性组 Cmdlet\n\n此命令的结果如下所示：\n\
  \n```\nAdd-SqlAvailabilityDatabase\nAdd-SqlAvailabilityGroupListenerStaticIp\nGrant-SqlAvailabilityGroupCreateAnyDatabase\n\
  Join-SqlAvailabilityGroup\nNew-SqlAvailabilityGroup\nNew-SqlAvailabilityGroupListener\n\
  New-SqlAvailabilityReplica\nRemove-SqlAvailabilityDatabase\nRemove-SqlAvailabilityGroup\n\
  Remove-SqlAvailabilityReplica\nResume-SqlAvailabilityDatabase\nRevoke-SqlAvailabilityGroupCreateAnyDatabase\n\
  Set-SqlAvailabilityGroup\nSet-SqlAvailabilityGroupListener\nSet-SqlAvailabilityReplica\n\
  Set-SqlAvailabilityReplicaRoleToSecondary\nSuspend-SqlAvailabilityDatabase\nSwitch-SqlAvailabilityGroup\n\
  ```\n\n**提示**\n`Get-Command` 是一个非常有用的辅助函数，与可用性组无关。更改传递给 `–Name` 参数的值可用于将结果筛选到任何一组相关命令。\n\
  每个 cmdlet 对应管理可用性组所需的特定管理任务。以 `New` 动词开头的 cmdlet 主要负责可用性组的初始配置，同时还有 `Add-SqlAvailabilityGroupListenerStaticIp`\
  \ 和 `Grant-SqlAvailabilityGroupCreateAnyDatabase` cmdlet。\n其他 cmdlet 主要关注实施后的管理。例如，清单\
  \ 4-26 中的脚本会将 `WideWorldImporters` 数据库添加到现有的可用性组。脚本的第一部分通过在主服务器上执行完整备份和日志备份到共享位置，然后在辅助副本上还原它们，从而在辅助副本上播种数据库。这些任务使用非常有用的\
  \ `Backup-SqlDatabase` 和 `Restore-SqlDatabase` cmdlet 执行。脚本的第二部分使用 `Add-SqlAvailabilityDatabase`\
  \ cmdlet 将数据库添加到每个副本上的可用性组。\n**提示**\n如果使用了自动播种，则数据库无需加入副本。\n\n\n\n```powershell\n\
  $DatabaseBackupFile = \"\\\\PrimaryServer.poshsql.com\\backups\\WideWorldImporters.bak\"\
  \n$LogBackupFile = \"\\\\PrimaryServer.poshsql.com\\backups\\WideWorldImporters.trn\"\
  \n$AGPrimaryPath = \"SQLSERVER:\\SQL\\PrimaryServer\\default\\AvailabilityGroups\\\
  WideWorldImportersAG\"\n$AGSecondaryPath = \"SQLSERVER:\\SQL\\SecondaryServer\\\
  default\\AvailabilityGroups\\WideWorldImportersAG\"\n$PrimaryServerInstance = \"\
  PrimaryServer\"\n$SecondaryServerInstance = \"SecondaryServer\"\n#在主副本上备份数据库和日志\n\
  $BackupCommonParams = @{\nDatabase        = \"WideWorldImporters\"\nServerInstance\
  \  = $PrimaryServerInstance\n}\nBackup-SqlDatabase @BackupCommonParams -BackupFile\
  \ $DatabaseBackupFile\nBackup-SqlDatabase @BackupCommonParams -BackupFile $LogBackupFile\
  \ -BackupAction Log\n#在辅助副本上还原数据库和日志\n$RestoreCommonParams = @{\nDatabase      \
  \   = \"WideWorldImporters\"\nServerInstance   = $SecondaryServerInstance\n}\nRestore-SqlDatabase\
  \ @RestoreCommonParams -BackupFile $DatabaseBackupFile -NoRecovery\nRestore-SqlDatabase\
  \ @RestoreCommonParams -BackupFile $LogBackupFile -RestoreAction Log -NoRecovery\n\
  #将数据库添加到可用性组\nAdd-SqlAvailabilityDatabase -Path $AGPrimaryPath -Database \"WideWorldImporters\"\
  \nAdd-SqlAvailabilityDatabase -Path $AGSecondaryPath -Database \"WideWorldImporters\"\
  \n代码清单 4-26\n将数据库添加到可用性组\n```\n\n`sqlserver`模块可用于管理可用性组的另一个绝佳示例是`Switch-AvailabilityGroup`\
  \ cmdlet，它可用于将可用性组故障转移到另一个副本。此功能在代码清单 4-27 中演示。\n\n```powershell\nSwitch-SqlAvailabilityGroup\
  \ -Path \"SQLSERVER:\\Sql\\SecondaryServer\\default\\AvailabilityGroups\\WideWorldImportersAG\"\
  \n代码清单 4-27\n故障转移可用性组\n```\n\n如果可用性组处于异步模式，则存在数据丢失的风险。在这种情况下，必须使用`AllowDataLoss`参数，以确保运行该命令的管理员知晓潜在后果，如代码清单\
  \ 4-28 所示。\n\n```powershell\nSwitch-SqlAvailabilityGroup -Path \"SQLSERVER:\\Sql\\\
  SecondaryServer\\default\\AvailabilityGroups\\WideWorldImportersAG\" –AllowDataLoss\n\
  代码清单 4-28\n在异步提交模式下故障转移可用性组\n```\n\n## 处理其他 Cmdlet\n\n`sqlserver`模块还包含许多不属于以上任何部分的\
  \ cmdlet。例如，`Invoke-SqlAssessment` cmdlet 可用于根据最佳实践知识库扫描你的 SQL Server 实例，以确保你已正确加固。\n\
  \n有许多 cmdlet 允许你管理 SSAS（SQL Server Analysis Services），包括处理 SSAS 数据库中数据的功能，这会刷新聚合以及可能来自源关系数据库的基础数据。这些对于自动化\
  \ SSAS 活动的管理以及临时操作非常有用。\n\n还有一些 cmdlet 可以让你查看有关 SQL Server Agent、其作业和作业步骤的信息。例如，代码清单\
  \ 4-29 中的命令将返回给定实例上所有 SQL Server Agent 作业的信息。\n\n```powershell\nGet-SqlAgentJob\
  \ –ServerInstance \"localhost\"\n代码清单 4-29\n返回所有 SQL Server Agent 作业\n```\n\n当在作为\
  \ SQL Server MDW（管理数据仓库）客户端的实例上运行时，此命令将返回以下输出：\n\n```\nName                    \
  \  Owner       Category             Enabled    CurrentRunStatus   DateCreated  \
  \             LastModified              LastRunDuration\n----                  \
  \    -----       --------             -------    ----------------   -----------\
  \               ------------              ---------------\ncollection_set_1_nonca...\
  \ sa          Data Collector       True       Idle               09/09/2020 16:01:38\
  \       07/10/2020 18:46:29       00:00:04\ncollection_set_2_colle... sa       \
  \   Data Collector       True       Idle               09/09/2020 16:01:41     \
  \  07/10/2020 18:46:30       20.18:26:41\ncollection_set_2_upload   sa         \
  \ Data Collector       True       Idle               09/09/2020 16:01:41       07/10/2020\
  \ 18:46:29       00:00:09\ncollection_set_3_colle... sa          Data Collector\
  \       True       Idle               09/09/2020 16:01:44       07/10/2020 18:46:30\
  \       20.17:43:04\ncollection_set_3_upload   sa          Data Collector      \
  \ True       Idle               09/09/2020 16:01:44       07/10/2020 18:46:30  \
  \     00:00:03\ncollection_set_6_nonca... sa          Data Collector       True\
  \       Idle               09/09/2020 16:16:50       07/10/2020 18:46:30       00:00:06\n\
  mdw_purge_data_sysuti... sa          Data Collector       True       Idle      \
  \         09/09/2020 16:01:17       07/10/2020 18:46:30       02:20:28\n```\n\n\
  然而，这些 cmdlet 的用处比其他一些 cmdlet 稍小，因为该模块仅包含读取作业详细信息的 cmdlet，而不包括更新它们的 cmdlet。要更新作业，你需要直接与\
  \ SMO 交互或在`Invoke-SqlCmd`内使用 T-SQL。\n\n`Read-SqlXEvent` cmdlet 可用于读取扩展事件并将其写入终端。此\
  \ cmdlet 接受连接字符串（到 SQL Server）和扩展事件会话的名称（用于读取实时会话），或者，如果你希望从 XEL 文件读取事件，则可以接受`FileName`参数的名称。例如，代码清单[4-30\
  \ 中的命令可用于将名为`LocksAndLatches_XE`的实时扩展事件会话中的事件读取到终端。\n\n提示\n\n有关创建扩展事件会话的更多详细信息，请参阅\
  \ Apress 出版物*Pro SQL Server 2022 Administration*，可在此处找到：link.springer.com/book/10.1007/978-1-4842-8864-1。\n\
  \n```powershell\n$params = @{\nConnectionString = \"Server=localhost;Database=master;Trusted_Connection=True;\"\
  \nSessionName      = \"system_health\"\n}\nRead-SQLXEvent @params\n代码清单 4-30\n读取扩展事件会话\n\
  ```\n\n## 小结\n\n`sqlserver`模块提供了许多用于在 SQL Server 中执行常见管理任务的 cmdlet。但是，其功能存在一些显著缺口。可以通过直接与\
  \ SMO（`sqlserver`模块所基于的库）交互来解决这些问题。或者，有一个由社区更新的开源模块，名为`dbatools`。该模块填补了功能上的许多空白，本书第\
  \ 5 章将进行讨论。\n\n`Invoke-SqlCmd` cmdlet 是一个强大的工具，它允许你从 PowerShell 终端或在 PowerShell\
  \ 脚本中运行 T-SQL 语句。结果可以返回到变量，允许你基于结果编写下游逻辑。例如，如果你想对一组数据库执行操作，可以使用`Invoke-SqlCmd`检索实例中数据库的动态列表，然后遍历该列表以执行所需的管理操作。\n\
  \n`sqlserver`模块提供了一组用于管理 SQL Server 登录名的 cmdlet。`Add-SqlLogin` cmdlet 可用于从 Windows（带有二级身份验证）、证书或非对称密钥创建\
  \ SQL Server 登录名，而`Get-SqlLogin` cmdlet 可用于返回有关登录名的信息，`Remove-SqlLogin` cmdlet 可用于从实例中删除登录名。但是，该模块没有处理数据库用户或权限的功能。\n\
  \n该模块包含许多其他 cmdlet，包括用于管理 Analysis Services 数据库和检索有关 SQL Server Agent 作业信息的 cmdlet。`sqlserver`模块中包含的\
  \ cmdlet 和函数的完整列表可以通过运行`Get-Command -module sqlserver`获取。\n\n\n"
- "# 5. 使用 DbaTools\n\n正如我们在第 4 章讨论的，由 Microsoft 维护的 `sqlserver` PowerShell 模块是一个很棒的工具，它允许数据库管理员轻松地通过脚本或\
  \ PowerShell 交互方式与 SQL Server 交互；但是，它支持的功能有限。由社区维护的 `DbaTools` 模块填补了功能上的许多空白，为从\
  \ PowerShell 与 SQL Server 交互提供了 `sqlserver` 模块之外的另一种选择。\n\n截至本文撰写时，`DbaTools` 模块拥有\
  \ 707 个 cmdlet 和函数，并且这个数字还在持续增长。因此，我们无法详细讨论每一个命令。本章将在初步了解 `Invoke-DbaQuery` 函数（它等同于\
  \ `Invoke-SqlCmd`）之后，主要聚焦于第 4 章讨论过的 `sqlserver` 模块的功能缺口。具体来说，我们将探讨如何端到端地管理登录（Logins）和用户（Users），以及如何管理\
  \ SQL Server 代理（SQL Server Agent）对象。不过，我建议您查阅 `DbaTools` 中可用的命令列表。完整的命令列表可以在 `dbatools.io/commands/`\
  \ 找到，或者您可以使用代码清单 5-1 中的脚本来安装 `DbaTools` 模块并列出所有可用的命令。\n\n> **提示**\n>\n> 请务必访问 `dbatools.io/commands/`\
  \ 并查看 `DbaTools` 中完整的可用命令列表。\n\n```powershell\n## 安装 DbaTools\nInstall-Module dbatools\n\
  ## 列出 DbaTools 模块中的命令\nGet-Command -Module dbatools\n```\n\n**代码清单 5-1：安装 DbaTools\
  \ 模块**\n\n`DbaTools` 提供以下类别的命令：\n\n*   可用性组\n*   备份和还原\n*   社区工具\n*   连接字符串\n* \
  \  数据库\n*   数据屏蔽\n*   计算机管理\n*   配置\n*   支持工具\n*   更新监视器\n*   DBCC\n*   分离和附加\n\
  *   诊断和性能\n*   端点\n*   导出\n*   文件系统和存储\n*   文件流\n*   查找器\n*   常规\n*   日志传送\n*  \
  \ 登录和用户管理\n*   邮件和日志记录\n*   最大内存\n*   迁移\n*   镜像\n*   网络和连接\n*   基于策略的管理\n*   已注册的服务器\n\
  *   复制\n*   资源调控器\n*   安全和加密\n*   服务器管理\n*   服务主体名称\n*   服务\n*   快照\n*   Sp_configure\n\
  *   SQL Agent\n*   SQL 客户端配置\n*   SQL 管理对象\n*   SQL Server Integration Services\n\
  *   系统启动\n*   Tempdb\n*   数据屏蔽\n*   跟踪、探查器和扩展事件\n*   实用工具\n*   Windows Server 故障转移群集\n\
  *   写入 SQL 表\n\n## 使用 `Invoke-DbaQuery`\n\n`Invoke-DbaQuery` 提供了与第 4 章讨论的 `Invoke-SqlCmd`\
  \ 命令等效的功能。因此，为了探究命令之间的差异，我们将使用相同的例子；即，我们希望检索一个数据库列表，然后将其传入循环中，根据索引碎片级别动态重建索引。\n\n\
  ### `Invoke-DbaQuery` 基础\n\n`Invoke-DbaQuery` 最基本的调用涉及传递两个参数：`SqlInstance`（定义查询应针对哪个\
  \ SQL Server 实例运行）和 `Query`（提供要执行的查询）。代码清单 5-2 演示了使用此基本调用从本地服务器的默认实例返回数据库名称列表。`SqlInstance`\
  \ 参数可能的格式包括 `ServerName` 和 `ServerName\\InstanceName`。如果您希望针对本地服务器的默认实例运行查询，则可以使用\
  \ `localhost`、`.` 或完全省略 `SqlInstance` 参数。\n\n> **提示**\n>\n> 如果您想跟随本章的示例操作，但尚未为 SQL\
  \ Server 实例配置安全的 TLS 连接，那么您可以运行以下命令来绕过使用 `DbaTools` 时的证书失败问题（您不应在生产环境中这样做）：`Set-DbatoolsConfig\
  \ -FullName sql.connection.encrypt -Value $false`。\n\n```powershell\n$Params = @{\n\
  \    SqlInstance   = \"localhost\"\n    Query         = \"SELECT name FROM sys.databases\"\
  \n}\nInvoke-DbaQuery @Params\n```\n\n**代码清单 5-2：`Invoke-DbaQuery` 的基本调用**\n\n要运行相同的查询，但使用二级\
  \ SQL 登录名（SQL Login）向 SQL Server 进行身份验证，可以传递 `SqlCredential` 参数。如代码清单 5-3 所示。\n\n\
  ```powershell\n$UserName = 'Pete'\n$SecurePassword = ConvertTo-SecureString 'Pa$$w0rd'\
  \ -AsPlainText -Force\n$Credential = [PSCredential]::new($UserName, $SecurePassword)\n\
  $Params = @{\n    SqlInstance   = \"localhost\"\n    Query         = \"SELECT name\
  \ FROM sys.databases\"\n    sqlCredential = $Credential\n}\nInvoke-DbaQuery @Params\n\
  ```\n\n**代码清单 5-3：使用 SQL 登录名进行身份验证**\n\n### 使用参数\n\n`Invoke-DbaQuery` 和 `Invoke-SqlCmd`\
  \ 在常见命令用法中最大的区别在于参数的处理方式。正如第 4 章所讨论的，使用 `Invoke-SqlCmd` 时，参数是作为键值对的字符串数组传递给 `Variable`\
  \ 参数的。然而，对于 `Invoke-DbaQuery`，变量是以哈希表的形式传递给名为 `SqlParameters` 的参数。这是 `Invoke-DbaQuery`\
  \ 的一个重要优势，因为它在处理多个参数时可以产生更整洁、更易读且更易于维护的代码。\n\n代码清单 5-4 中的脚本是一个 T-SQL 脚本，它将根据从调用\
  \ `Invoke-DbaQuery` 传递过来的碎片级别动态重建索引。请注意，参数的格式与原生 T-SQL 参数相同，而不是 SQLCMD 参数格式。这可以使测试和调试脚本更容易，因为它们可以直接运行而无需切换到\
  \ SQLCMD 模式。此脚本随后将由代码清单 5-5 中的 PowerShell 脚本调用。\n\n> **注意**\n>\n> 如果单独运行，T-SQL 脚本将执行失败，因为未定义\
  \ `@Fragmentation` 和 `@PageSpace` 参数。\n\n```sql\nDECLARE @SQL NVARCHAR(MAX)\nSET\
  \ @SQL =\n(\n    SELECT 'ALTER INDEX '\n        + QUOTENAME(i.name)\n        + '\
  \ ON ' + s.name\n        + '.'\n        + QUOTENAME(OBJECT_NAME(i.object_id))\n\
  \        + ' REBUILD ; '\n    FROM sys.dm_db_index_physical_stats(DB_ID(),NULL,NULL,NULL,'DETAILED')\
  \ ps\n    INNER JOIN sys.indexes i\n        ON ps.object_id = i.object_id\n    \
  \    AND ps.index_id = i.index_id\n    INNER JOIN sys.objects o\n        ON ps.object_id\
  \ = o.object_id\n    INNER JOIN sys.schemas s\n        ON o.schema_id = s.schema_id\n\
  \    WHERE index_level = 0\n        AND (avg_fragmentation_in_percent > @Fragmentation\n\
  \            OR avg_page_space_used_in_percent < @PageSpace)\n    FOR XML PATH('')\n\
  ) ;\nEXEC(@SQL) ;\n```\n\n**代码清单 5-4：重建索引的 T-SQL 脚本**\n\n代码清单 5-5 中的 PowerShell\
  \ 脚本将返回一个表列表，并将其传入一个 `foreach` 循环，针对每个数据库运行索引重建脚本。该脚本将两个参数传递给存储在文件中的 T-SQL 查询。T-SQL\
  \ 脚本的位置通过 `File` 参数传递。然而，关键点在于参数是如何使用哈希表传递的。然后这个哈希表被传递给 `SqlParameters` 参数。\n\n\
  ```powershell\n$Variables = @{\n    \"Fragmentation\" = \"25\"\n    \"PageSpace\"\
  \     = \"70\"\n}\n$Params = @{\n    SqlInstance = \"localhost\"\n    Query    \
  \   = \"SELECT name FROM sys.databases\"\n}\n$Databases = Invoke-DbaQuery @Params\n\
  foreach ($Database in $Databases) {\n    $Params = @{\n        SqlInstance   = \"\
  localhost\"\n        Database      = $Database.name\n        File          = \"\
  c:\\scripts\\IndexRebuild.sql\"\n        SqlParameters = $Variables\n    }\n   \
  \ Invoke-DbaQuery @Params\n}\n```\n\n**代码清单 5-5：使用参数**\n\n\n### 错误处理\n\n`DbaTools`\
  \ 系列中的命令默认会尝试帮助你处理错误。具体来说，当发生错误时，`DbaTools` 会捕获并解析错误，然后返回一个友好的错误信息。例如，考虑代码清单 5-6\
  \ 中的命令，它会抛出一个除零错误。\n\n```\nInvoke-DbaQuery -SqlInstance localhost -Query \"SELECT\
  \ 1/0\"\nListing 5-6\n生成友好错误\n```\n\n此错误的输出如下所示：\n\n```\nWARNING: [10:56:33][Invoke-DbaQuery]\
  \ [localhost] Failed during execution | Divide by zero error encountered.\n```\n\
  \n虽然这肯定比抛出标准的 PowerShell 异常更容易阅读，但在编写脚本时可能会导致问题，因为它可能导致脚本静默失败。因此，在许多情况下，建议关闭此功能。这可以通过使用\
  \ `–EnableException` 参数来实现，如代码清单 5-7 所示。\n\n```\nInvoke-DbaQuery -SqlInstance localhost\
  \ -Query \"SELECT 1/0\" –EnableException\nListing 5-7\n使用 EnableException 参数\n```\n\
  \n这将导致抛出一个标准异常，如下所示：\n\n```\nException:\nLine |\n97974 |          throw $records[0]\n\
  |          ~~~~~~~~~~~~~~~~~\n| Divide by zero error encountered.\n```\n\n### 针对多个实例运行查询\n\
  \n使用 `Invoke-DbaQuery`，针对多个 SQL Server 实例运行查询非常简单。你只需要定义一个实例名称列表，然后将其通过管道传递给 `Invoke-DbaQuery`\
  \ 命令即可。代码清单 5-8 展示了这一点，它返回了每个实例上的数据库列表。\n\n**注意**\n该脚本假设你有一个默认的 SQL Server 实例和一个名为\
  \ `poshscripting` 的命名实例。\n\n```\n\"localhost\", \"localhost\\poshscripting\" | Invoke-DbaQuery\
  \ -Query \"SELECT name FROM sys.databases\"\nListing 5-8\n针对多台服务器运行查询\n```\n\n观察下面的结果，你会注意到一个明显的问题：无法确定每个数据库属于哪个实例：\n\
  \n```\nmaster\ntempdb\nmodel\nmsdb\nAdventureWorks2022\nmaster\ntempdb\nmodel\n\
  msdb\n```\n\n当然，你可以通过将 `@@SERVERNAME` 添加到 `SELECT` 列表中来解决这个问题。然而，`Invoke-DbaQuery`\
  \ 提供了另一种方法。你可以简单地指定 `–AppendServerInstance` 参数。在处理本地服务器时，两种技术的差异显而易见。使用 `@@SERVERNAME`\
  \ 技术将返回实际的服务器名称。而使用 `–AppendServerInstance` 技术，则会返回你传递给 `Invoke-DbaQuery` 的任何值。这可能是服务器名称、`localhost`\
  \ 或一个 IP 地址。例如，考虑代码清单 5-9 中的命令。\n\n```\n$query = \"SELECT name, @@SERVERNAME AS\
  \ SQLInstance FROM sys.databases\"\n\"localhost\", \"localhost\\poshscripting\"\
  \ | Invoke-DbaQuery -Query $query –AppendServerInstance\nListing 5-9\n返回服务器名称\n\
  ```\n\n结果（如下所示）说明了两种技术在结果上可能存在的差异：\n\n```\nname               SQLInstance      \
  \                ServerInstance\n--------------     ---------------------------\
  \    -----------------------\nmaster             WIN-J38I01U06D7               \
  \   localhost\ntempdb             WIN-J38I01U06D7                  localhost\nmodel\
  \              WIN-J38I01U06D7                  localhost\nmsdb               WIN-J38I01U06D7\
  \                  localhost\nAdventureWorks2022 WIN-J38I01U06D7               \
  \   localhost\nmaster             WIN-J38I01U06D7\\POSHSCRIPTING    localhost\\\
  poshscripting\ntempdb             WIN-J38I01U06D7\\POSHSCRIPTING    localhost\\\
  poshscripting\nmodel              WIN-J38I01U06D7\\POSHSCRIPTING    localhost\\\
  poshscripting\nmsdb               WIN-J38I01U06D7\\POSHSCRIPTING    localhost\\\
  poshscripting\n```\n\n#### 将结果写入文件\n\n与 `Invoke-SqlCmd` 一样，没有直接允许你将查询结果发送到文件的参数；但是，可以通过将\
  \ `Invoke-SqlCmd` 的结果通过管道传递给 `Out-File` cmdlet 来达到相同的目的。代码清单 5-10 展示了这一点，它将数据库列表写入到一个名为\
  \ `c:\\scripts\\DatabasesOut.csv` 的文件中。\n\n```\n$Params = @{\nSqlInstance  = \"\
  localhost\"\nQuery        = \"SELECT name FROM sys.databases\"\n}\nInvoke-DbaQuery\
  \ @Params | ConvertTo-Csv | Out-File -FilePath \"c:\\scripts\\DatabasesOut.csv\"\
  \nListing 5-10\n将结果输出到文件\n```\n\n## 管理安全对象\n\n在第 4 章中，我们讨论了如何使用 `SqlServer` 模块来创建登录名并将其添加到角色中。那时，我们想开始管理数据库用户；然而，我们遇到了\
  \ `SqlServer` 模块功能上的空白，不得不直接使用 SMO 来执行所需的任务。\n\n`DbaTools` 模块拥有更丰富的命令集来处理安全对象。因此，在接下来的章节中，我们将逐步介绍如何使用\
  \ `DbaTools` 来端到端地管理登录名和用户。具体来说，我们将探讨如何创建登录名、创建数据库用户、将登录名和用户都添加到角色中、重命名登录名、删除登录名以及移除孤立用户。\n\
  \n\n### 创建登录名\n\n`New-DbaLogin` 命令可用于创建登录名。该命令最简单的调用方式是，通过 `–Login` 参数传递要创建的登录名，并通过\
  \ `-SqlInstance` 参数传递应创建登录名的 SQL Server 实例名称。如代码清单 5-11 所示。\n\n> 注意\n> 请将服务器\\登录名更改为与你自己的服务器名称以及服务器上存在的本地用户相匹配。\n\
  \n```\n$params = @{\n    SqlInstance     = \"localhost\"\n    Login           =\
  \ \"WIN-J38I01U06D7\\Adam\"\n    DefaultDatabase = \"AdventureWorks2022\"\n}\nNew-DbaLogin\
  \ @params\n```\n*代码清单 5-11 创建一个登录名*\n\n此脚本为现有的 Windows 用户创建登录名。如果要创建 SQL 登录名，则需要额外以\
  \ `SecureString` 形式传递登录名的密码。创建 SQL 登录名时，我们还可以选择强制执行域密码策略和过期策略，就像使用 `SqlServer` 模块一样。代码清单\
  \ 5-12 展示了这一点。\n\n```\n$Password = 'Pa$$w0rd'\n# 转换为 SecureString\n$SecurePassword\
  \ = ConvertTo-SecureString $Password -AsPlainText -Force\n$params = @{\n    SqlInstance\
  \      = \"localhost\"\n    Login            = \"Adam\"\n    SecurePassword   =\
  \ $SecurePassword\n    DefaultDatabase  = \"AdventureWorks2022\"\n}\nNew-DbaLogin\
  \ @params -PasswordPolicyEnforced –PasswordExpirationEnabled\n```\n*代码清单 5-12 创建一个\
  \ SQL 登录名*\n\n创建 SQL 登录名时，我们还可以强制使用特定的 SID（安全标识符）。这在诸如配置管理（在第 9 章讨论）等场景中非常有用，因为我们希望确保登录始终存在，并在意外删除时自动重新创建。\n\
  \nSQL Server 使用 SID 将数据库用户映射到登录名；因此，即使 SQL 登录名具有相同的名称和密码，如果 SID 发生变化，数据库用户也会成为孤立用户。使用特定的\
  \ SID 可以消除此问题。\n\n> 提示\n> 对于为 Windows 帐户创建的登录名，不会出现此问题。这是因为 SID 存储在域中（对于本地 Windows\
  \ 帐户则存储在本地服务器中）。每次为 Windows 用户创建登录名时，即使在不同的实例上，它都将具有相同的 SID。\n\n你可以通过 `sys.syslogins`\
  \ 表来识别 SQL 登录名的 SID。代码清单 5-13 中的 T-SQL 查询演示了如何检索我们在代码清单 5-12 中创建的名为 `Adam` 的 SQL\
  \ 登录名的 SID。\n\n```\nSELECT\n    name\n    , sid\nFROM sys.syslogins\nWHERE name\
  \ = 'Adam'\n```\n*代码清单 5-13 检索登录名的 SID*\n\n代码清单 5-14 演示了如何创建具有特定 SID 的登录名。为此，我们使用\
  \ `New-DbaLogin` 命令的 `–Sid` 参数。\n\n> 注意\n> 登录名 `Adam` 已存在。因此，我们使用了 `–Force` 参数，这将导致登录名被删除并重新创建，从而避免失败。\n\
  \n```\n$Password = 'Pa$$w0rd'\n# 转换为 SecureString\n[securestring]$SecurePassword\
  \ = ConvertTo-SecureString $Password -AsPlainText -Force\n$params = @{\n    SqlInstance\
  \     = \"localhost\"\n    Login           = \"Adam\"\n    SecurePassword  = $SecurePassword\n\
  \    DefaultDatabase = \"AdventureWorks2022\"\n    SID             = \"0xC8105F39AEDBF947ACA0FA99544EBF33\"\
  \n}\nNew-DbaLogin @params –Force\n```\n*代码清单 5-14 使用特定 SID 创建登录名*\n\n### 管理登录名\n\
  \nDbaTools 提供了用于管理登录名的有用命令。在以下部分中，我们将探讨如何将登录名添加到服务器角色、重命名以及删除登录名。\n\n#### 将登录名添加到服务器角色\n\
  \n通过将登录名添加到服务器角色，可以为其授予实例范围内的权限。这可以使用 DbaTools 的 `Add-DbaServerRoleMember` 命令实现。例如，代码清单\
  \ 5-15 中的命令将 `Adam` 登录名添加到 `dbcreator` 服务器角色，允许他在实例上创建新数据库。\n\n```\nAdd-DbaServerRoleMember\
  \ -SqlInstance localhost -ServerRole dbCreator -Login Adam\n```\n*代码清单 5-15 将登录名添加到服务器角色*\n\
  \n较新版本的 SQL Server 还允许你创建自己的自定义服务器角色，此功能也通过 DbaTools 得到支持，即使用 `New-DbaServerRole`\
  \ 命令；但是，在撰写本文时，此命令功能非常有限，可以创建服务器角色，但无法为其分配权限。因此，我们将不对其进行详细探讨。\n\n#### 重命名登录名\n\n\
  假设你接手了一个应用程序的职责，并发现连接是通过一个名为 `AppLogin` 的登录名建立的。我们都经历过这种情况。这不仅仅令人有点沮丧，而且你已将应用程序迁移到一个托管多个应用程序数据库的\
  \ SQL 实例。因此，这个名称根本不合适，因为故障排除将变得混乱和复杂。\n\n你可以使用 `Rename-DbaLogin` 命令轻松更改登录名的名称。代码清单\
  \ 5-16 说明了如何将 `AppLogin` 的名称更改为 `SalesApp`，从而允许你区分实例上的多个应用程序登录名。`-Login` 参数指定原始登录名，`-NewLogin`\
  \ 参数用于指定登录名的所需名称。\n\n> 注意\n> 请记住，如果在 SQL Server 实例中更改了应用程序登录名的名称，还需要在应用程序中进行更新。\n\
  \n```\n$params = @{\n    SqlInstance = \"localhost\"\n    Login       = \"AppLogin\"\
  \n    NewLogin    = \"SalesApp\"\n}\nRename-DbaLogin @params\n```\n*代码清单 5-16 重命名登录名*\n\
  \n#### 删除登录名\n\n可以使用 `Remove-DBALogin` 命令删除登录名。要使用此命令，只需使用 `–Login` 参数指定登录名即可。代码清单\
  \ 5-17 演示了这一点，我们在其中删除了 `SalesApp` 登录名。\n\n```\n$params = @{\n    SqlInstance = \"\
  localhost\"\n    Login       = \"SalesApp\"\n}\nRemove-DbaLogin @params\n```\n*代码清单\
  \ 5-17 删除登录名*\n\n\n### 创建数据库用户\n\nDbaTools 可用于创建数据库用户和实例登录名。`New-DbaDbUser` 命令可用于此目的。在最简单的调用方式中，你可以通过\
  \ `–Database` 参数指定数据库名称，并通过 `–Login` 参数指定用户应映射到的登录名，如代码清单 5-18 所示，我们在 AdventureWorks2022\
  \ 数据库中创建了一个关联到 `Adam` 登录名的数据库用户。\n\n```\n$params = @{\nSqlInstance = \"localhost\"\
  \nDatabase    = \"AdventureWorks2022\"\nLogin       = \"Adam\"\n}\nNew-DbaDbUser\
  \ @params\nListing 5-18\n创建数据库用户\n```\n\n你也可以选择性地使用 `–User` 参数来指定数据库用户的名称。你可以选择这样做作为一种代码风格选项，或者当你希望数据库用户的名称与登录名不同时，这也非常有用。例如，代码清单\
  \ 5-19 中的脚本在 `AdventureWorks2022` 数据库中创建了一个名为 `PeteCarter` 的数据库用户，该用户映射到 `Pete`\
  \ 登录名。\n\n```\n$params = @{\nSqlInstance = \"localhost\"\nDatabase    = \"AdventureWorks2022\"\
  \nLogin       = \"Pete\"\nUser        = \"PeteCarter\"\n}\nNew-DbaDbUser @params\n\
  Listing 5-19\n创建具有特定名称的数据库用户\n```\n\n此外，该命令可用于复制用户，可以在同一实例的不同数据库之间进行。例如，代码清单 5-20\
  \ 中的命令将 AdventureWorks2022 数据库中的用户 Pete（基于 Windows 登录名 Pete）复制到同一实例的 WideWorldImporters\
  \ 数据库中。\n\n`Get-DbaDbUser` 命令用于获取 AdventureWorks2022 数据库中所有数据库用户的详细信息。然后通过管道传递给\
  \ `Where-Object`，对结果进行过滤，以便仅包含 Pete 数据库用户。这随后存储在一个名为 `$user` 的变量中，该变量由 `New-DbaDbUser`\
  \ 命令使用。用户将在我们指定的数据库中创建。\n\n> 注意\n>\n> 需要注意的是，虽然数据库用户被复制，但与该用户关联的权限不会随之复制。\n\n```\n\
  $user = Get-DbaDbUser -SqlInstance localhost -Database AdventureWorks2022 | Where-Object\
  \ name -eq \"Pete\"\n$params = @{\nLogin = $user.Login\nDatabase = 'WideWorldImporters'\n\
  SqlInstance = 'Localhost'\n}\nNew-DbaDbUser @params\nListing 5-20\n复制数据库用户\n```\n\
  \n### 管理数据库用户\n\nDbaTools 提供了许多用于管理数据库用户的有用命令。在以下部分中，我们将探讨如何将用户添加到数据库角色。我们还将讨论如何删除用户以及如何修复已成为孤立状态的用户。\n\
  \n#### 将用户添加到数据库角色\n\n可以使用 `Add-DbaDbRoleMember` 命令将用户添加到数据库角色。你需要通过 `–Database`\
  \ 参数传递数据库名称，通过 `–Role` 参数传递角色名称，并通过 `–User` 参数传递要添加到角色的用户名称。代码清单 5-21 演示了这一点，其中\
  \ `PeteCarter` 登录名被添加到 `AdventureWorks2022` 数据库中的 `db_owner` 数据库角色。\n\n```\n$params\
  \ = @{\nSqlInstance = \"localhost\"\nDatabase    = \"AdventureWorks2022\"\nUser\
  \        = \"PeteCarter\"\nRole        = \"db_owner\"\n}\nAdd-DbaDbRoleMember @params\n\
  Listing 5-21\n将用户添加到角色\n```\n\n> 提示\n>\n> 为避免被提示确认操作，你可以在命令后附加 `-Confirm:$false`。\n\
  \n存在一个名为 `New-DbaDbRole` 的命令，可用于创建你自己的数据库角色。然而，与其服务器角色对应物类似，其功能仅限于创建角色。它不允许向该角色分配权限。因此，我们将不在这里介绍它，我建议使用\
  \ `Invoke-DbaQuery` 来创建服务器和数据库角色。\n\n#### 删除用户及将其从角色中移除\n\n可以使用 `Remove-DbaDbRoleMember`\
  \ 命令将用户从数据库角色中移除。代码清单 5-22 演示了这一点，它将 `PeteCarter` 用户从 `AdventureWorks2022` 数据库的\
  \ `db_owner` 数据库角色中移除。\n\n```\n$params = @{\nSqlInstance = \"localhost\"\nDatabase\
  \    = \"AdventureWorks2022\"\nUser           = \"PeteCarter\"\nRole           =\
  \ \"db_owner\"\n}\nRemove-DbaDbRoleMember @params\nListing 5-22\n从数据库角色中移除用户\n```\n\
  \n如果需要完全删除一个数据库用户，可以通过使用 `Remove-DbaDbUser` 命令来实现。该命令需要传递数据库和用户，如代码清单 5-23 所示。\n\
  \n```\n$params = @{\nSqlInstance = \"localhost\"\nDatabase    = \"AdventureWorks2022\"\
  \nUser        = \"PeteCarter\"\n}\nRemove-DbaDbUser @params\nListing 5-23\n删除数据库用户\n\
  ```\n\n### 管理服务器代理\n\n在第 4 章中，我们讨论了 SqlServer 模块如何使你能够创建凭据并检索有关 SQL Server 代理作业的信息，但由于没有提供与\
  \ SQL Server 代理对象交互或管理其的命令，因此其用处有限。因此，在以下部分中，我们将讨论如何端到端地管理 SQL Server 代理。具体来说，我们将探讨如何创建凭据、创建映射到该凭据的代理以及创建作业。我们还将讨论如何检索作业信息以及如何使用这些信息来排查问题。\n\
  \n> 注意\n>\n> 本章假设你熟悉 SQL Server 代理及其对象，例如作业、作业步骤和代理。对 SQL Server 代理的完整讨论和解释可以在 Apress\
  \ 的书籍 *Pro SQL Server 2022 Administration* 中找到，链接为：link.springer.com/book/10.1007/978-1-4842-8864-1。\n\
  \n#### 创建凭据\n\n`New-DbaCredential` 提供了与本书第 4 章讨论的 `SqlServer` 模块的 `New-SqlCredential`\
  \ 命令等效的功能。我们将使用该命令创建一个名为 `SQLAgentCredential` 的凭据，该凭据映射到 `Pete` Windows 用户，并将用作运行\
  \ SQL Server 代理作业的安全上下文。\n\n该命令需要通过 `–Name` 参数传递凭据的名称。它还需要将要使用的标识（在本例中为 Windows\
  \ 用户）传递给 `–Identity` 参数，并将密钥（在本例中为 Windows 用户的密码）传递给 `–SecurePassword` 参数。\n\n代码清单\
  \ 5-24 中的脚本说明了如何使用 `New-DbaCredential` 命令来创建描述的凭据对象。\n\n```\n$SecurePassword = ConvertTo-SecureString\
  \ 'Pa$$w0rd' -AsPlainText -Force\n$params = @{\nSqlInstance     = \"localhost\"\n\
  Name            = \"SqlAgentCredential\"\nIdentity        = \"Pete\"\nSecurePassword\
  \  = $SecurePassword\n}\nNew-DbaCredential @params\nListing 5-24\n创建凭据\n```\n\n\n\
  \n### 创建代理\n\nSQL Server Agent 代理定义了作业步骤得以运行的安全上下文。本质上，它提供了作业步骤到凭据的映射。在此示例中，我们将创建一个名为\
  \ `SQLAgentProxy` 的代理，该代理映射到 `SQLAgentCredential` 凭据，并为其分配运行配置为 `PowerShell` 或 `CmdExec`\
  \ 作业步骤类型的作业步骤的权限。\n\n为此，我们将使用 `New-DbaAgentProxy` 命令，并通过 `-Name` 参数传入代理的名称，通过 `-ProxyCredential`\
  \ 参数传入其将映射到的凭据，最后通过 `–SubSystem` 参数指定它可以运行的作业步骤类型，如代码清单 5-25 所示。\n\n提示\n\n如果直接在命令中传递\
  \ `–SubSystem` 参数，我们可以简单地传递一个逗号分隔的列表。因为我们使用的是拼接技术，所以将两个值定义为字符串数组，然后传递给命令。\n\n此代码仅适用于基于\
  \ Windows 的机器。\n\n```\n$params = @{\nSqlInstance     = \"localhost\"\nName     \
  \       = \"SqlAgentProxy\"\nProxyCredential = \"SQLAgentCredential\"\nSubSystem\
  \       = @(\"PowerShell\",\"CmdExec\")\n}\nNew-DbaAgentProxy @params\n代码清单 5-25\n\
  创建代理\n```\n\n有效的子系统完整列表如下：\n\n*   ActiveScripting\n*   AnalysisCommand\n*   AnalysisQuery\n\
  *   CmdExec\n*   Distribution\n*   LogReader\n*   Merge\n*   PowerShell\n*   QueueReader\n\
  *   Snapshot\n*   Ssis\n\n注意\n\n`ActiveScripting` 子系统与运行 ActiveX 脚本有关。这在 SQL Server\
  \ 中已弃用，不应使用。\n\n### 创建作业\n\n使用 DbaTools 创建 SQL Server Agent 作业涉及三个方面。首先，您需要创建作业本身。然后，您需要创建由该作业运行的作业步骤，最后附加一个作业计划，该计划将定义作业何时运行。\n\
  \n在本节中，我们将创建一个名为 `DbaMaintenance` 的作业，该作业对实例上的每个数据库运行 `DBCC CHECKDB` 和智能索引重建过程。由于作业内置了逻辑，它们将是\
  \ PowerShell 脚本，而不是 T-SQL 脚本。这将在本书的第 10 章和第 11 章中进一步讨论。\n\n使用 `New-DbaAgentJob`\
  \ 命令创建作业。其基本调用需要通过 `–Job` 参数提供作业名称，并通过 `–OwnerLogin` 参数提供作业所有者。创建作业如代码清单 5-26 所示。\n\
  \n```\nNew-DbaAgentJob -SqlInstance localhost -Job DbaMaintenance -OwnerLogin sa\n\
  代码清单 5-26\n创建 SQL Agent 作业\n```\n\n可以使用 `New-DbaAgentJobStep` 命令创建作业步骤。让我们先看看一个简单的调用，然后再看一个更复杂的例子。\n\
  \n代码清单 5-27 中的脚本创建了所需的两个作业步骤。这里，我们传入步骤的名称、应运行的命令、相关的子系统、代理名称以及将运行步骤的作业名称，还有每个步骤的成功/失败操作。\n\
  \n我们还传递了 `StepID`。这是一个在作业内顺序递增的数字，用于定义步骤运行的顺序。如果没有此参数，每次添加一个步骤时，它都会移动到作业中的第一个位置，这会导致一个有点奇怪的情况：步骤的运行顺序与代码中定义的顺序相反。\n\
  \n```\nNew-DbaAgentJobStep -SqlInstance localhost -Job DbaMaintenance -StepName\
  \ CheckDB -ProxyName SQLAgentProxy -Command 'PowerShell \"c:\\scripts\\CheckDB.ps1\"\
  ' -Subsystem PowerShell -StepId 1 -OnSuccessAction GoToNextStep -OnFailAction GoToNextStep\n\
  New-DbaAgentJobStep -SqlInstance Localhost -Job DbaMaintenance -StepName IndexRebuild\
  \ -ProxyName SQLAgentProxy -Command 'PowerShell \"c:\\scripts\\IndexRebuild.ps1\"\
  ' -Subsystem PowerShell -StepId 2 -OnSuccessAction GoToNextStep -OnFailAction GoToNextStep\n\
  代码清单 5-27\n创建作业步骤\n```\n\n虽然这种方法可行，但它相当繁琐，并且会导致大量代码重复。考虑到此示例仅使用两个作业步骤，这种情况被放大了。想象一下，如果有\
  \ 20 个步骤会怎样！然而，我们可以通过在 PowerShell 中结合使用拼接和循环来解决这个问题，使我们能够仅定义一次大多数参数值，并且只声明一次命令调用。代码清单\
  \ 5-28 说明了这种技术。在这里，我们首先使用拼接技术定义通用参数集。然后，我们使用第二个拼接，该拼接由每个步骤定义的数组组成。最后，一个 `foreach`\
  \ 循环遍历每个步骤定义，依次为每个步骤调用 `New-DbaAgentJobStep`。结果在功能上是等效的，但这减少了代码重复，并产生了更易于维护的代码。\n\
  \n```\n$commonParams = @{\nSqlInstance     = \"localhost\"\nJob             = \"\
  DbaMaintenance\"\nSubsystem       = \"PowerShell\"\nProxyName       = \"SQLAgentProxy\"\
  \nOnSuccessAction = \"GoToNextStep\"\nOnFailAction    = \"GoToNextStep\"\n}\n$steps\
  \ = @(\n@{ StepName = 'CheckDB';          Command = 'powershell \"C:\\scripts\\\
  CheckDB.ps1\"';            StepID = 1 }\n@{ StepName = 'RebuildIndexes'; Command\
  \ = 'powershell \"C:\\scripts\\RebuildIndexes.ps1\"';   StepID = 2 }\n)\nforeach\
  \ ($step in $steps) {\nNew-DbaAgentJobStep @step @commonParams\n}\n代码清单 5-28\n改进作业步骤创建的代码\n\
  \n\n\n## 为作业添加调度\n\n为作业添加调度的最后一步是定义其运行时间。这可以通过使用 `New-DbaAgentSchedule` 命令来实现。可以传递给此命令的参数定义在表\
  \ 5-1 中。\n\n### 表 5-1：New-DbaAgentSchedule 参数\n\n| 参数 | 描述 | 允许的值 |\n| --- | ---\
  \ | --- |\n| `Job` | 要附加调度的 SQL Agent 作业的名称 | |\n| `Schedule` | 调度的名称 | |\n| `Disabled`\
  \ | 指定调度应启用还是禁用 | `True`，`False`（默认） |\n| `FrequencyType` | 指定作业执行的频率周期 | `Once`，`OneTime`，`Daily`，`Weekly`，`Monthly`，`MonthlyRelative`，`AgentStart`，`AutoStart`，`IdleComputer`，`OnIdle`\
  \ |\n| `FrequencyInterval` | 在频率周期内，应执行作业的间隔。对于 `FrequencyType` 为每周的作业，这可以是一周中的某几天；对于\
  \ `FrequencyType` 为每月的作业，这可以是一个月中的某一天 | `Sunday`，`Monday`，`Tuesday`，`Wednesday`，`Thursday`，`Friday`，`Saturday`，`Sunday`，`Weekdays`，`Weekend`，`Everyday`，或\
  \ 1 到 31（月度）或 1 到 365（每日）的数值 |\n| `FrequencySubdayType` | 对于一天内执行多次的作业，指定每次执行之间的时间单位。对于一天内只执行一次的作业，请使用\
  \ `Time`。`Once` 指定作业在其生命周期内仅执行一次 | `Once`，`Time`，`Seconds`，`Second`，`Minutes`，`Minute`，`Hours`，`Hour`\
  \ |\n| `FrequencySubdayInterval` | 指定每次执行之间应发生的 `FrequencySubdayType` 次数的整数。例如，如果\
  \ `FrequencySubdayType` 设置为 `Minutes` 且 `FrequencySubdayInterval` 设置为 `5`，则作业将每\
  \ 5 分钟执行一次 | |\n| `FrequencyRecurrenceFactor` | 如果 `FrequencyType` 设置为 `Weekly`、`Monthly`\
  \ 或 `MonthlyRelative`，则可以向此参数传递一个整数，以指定每次执行之间应间隔多少周或月 | |\n| `FrequencyRelativeInterval`\
  \ | 当 `FrequencyInterval` 配置为 `MonthRelative` 时，此参数用于指定在月内何时执行作业 | `First`，`Second`，`Third`，`Fourth`，`Last`\
  \ |\n| `StartDate` | 调度应开始的日期，格式为 yyyyMMdd | |\n| `EndDate` | 调度应结束的日期，格式为 yyyyMMdd\
  \ | |\n| `StartTime` | 调度应开始的时间。可接受的格式是 24 小时制的 HHMMSS | |\n| `EndTime` | 调度应结束的时间。可接受的格式是\
  \ 24 小时制的 HHMMSS | |\n\n在我们的场景中，假设我们希望作业每天每五分钟运行一次。我们希望调度立即开始并无限期运行。因此，我们不指定 `StartDate`、`StartTime`、`EndDate`\
  \ 和 `EndTime`，而是使用 `–Force` 参数，它会将当前日期添加为开始日期，当前日期/时间添加为开始时间，结束日期和时间设置为 9999 年 12\
  \ 月 31 日 00:00:00。清单 5-29 中的脚本演示了如何创建此调度。\n\n> 注意\n>\n> 实际上，这样的维护作业可能会安排每天运行一次，或者在某些环境中甚至可能每周运行一次。此处的调度仅用于说明目的。\n\
  \n```powershell\n$params = @{\n    SqlInstance = \"localhost\"\n    Job = \"DbaMaintenance\"\
  \n    Schedule = \"DailyEvery5Mins\"\n    FrequencyType = \"Daily\"\n    FrequencyInterval\
  \ = \"Everyday\"\n    FrequencySubdayType = \"Minutes\"\n    FrequencySubdayInterval\
  \ = 5\n}\nNew-DbaAgentSchedule @params -force\n```\n*清单 5-29：创建作业调度*\n\n## 检索作业信息\n\
  \nDbaTools 提供了多个用于检索作业信息的命令。这些信息可以提供非常快速简便的机制，帮助 DBA 故障排除问题。在本节中，我们将通过一个示例来说明。\n\
  \n首先，假设我们正在对服务器执行晨检。我们需要检查 SQL Agent 作业，因此我们将使用 `Get-DbaAgentJob` 命令返回作业列表。默认情况下，此命令将为每个作业返回一个对象，如清单\
  \ 5-30 所示。\n\n```powershell\nGet-DbaAgentJob -SqlInstance localhost\n```\n*清单 5-30：返回\
  \ SQL Agent 作业列表*\n\n此命令的结果当然会因你在实例上拥有的作业而异。当我运行此命令时，收到以下结果：\n\n```\nComputerName\
  \    InstanceName SqlInstance     Name                    Category             \
  \   OwnerLoginName CurrentRunStatus CurrentRunRetryAttempt Enabled LastRunDate \
  \        LastRunOutcome HasSchedule OperatorToEmail CreateDate\n------------   \
  \ ------------ -----------     ----                    --------                --------------\
  \ ---------------- ---------------------- ------- -----------         --------------\
  \ ----------- ---------------\nWIN-J38I01U06D7 MSSQLSERVER  WIN-J38I01U06D7 DbaMaintenance\
  \          [Uncategorized (Local)] sa                    Executing             \
  \         0    True 18/01/2021 08:37:00         Failed        True             \
  \    17/01/2021 16:36:29\nWIN-J38I01U06D7 MSSQLSERVER  WIN-J38I01U06D7 syspolicy_purge_history\
  \ [Uncategorized (Local)] sa                         Idle                      0\
  \    True 18/01/2021 07:09:47      Succeeded        True                 11/08/2020\
  \ 13:10:41\n```\n\n从这些结果中明显可以看出，`DbaMaintenance` 作业在上次执行时失败了。因此，我们将使用 `Get-DbaAgentJobHistory`\
  \ 命令检索有关失败作业的更多信息，以返回作业历史输出。我们将此命令的结果通过管道传递给 `Where-Object` 命令，以便筛选失败的作业，最后再通过管道传递给\
  \ `Format-Table` 命令，使结果更易于阅读。清单 5-31 演示了这一点。\n\n```powershell\nGet-DbaAgentJobHistory\
  \ -SqlInstance localhost | Where-Object status -eq \"Failed\" | Format-Table\n```\n\
  *清单 5-31：返回作业历史记录*\n\n运行此命令的结果如下所示：\n\n```\nComputerName    InstanceName SqlInstance\
  \     Job            StepName      RunDate             StartDate               EndDate\
  \                 Duration Status OperatorEmailed Message\n------------    ------------\
  \ -----------     ---            --------      -------             ---------   \
  \            -------                 -------- ------ ---------------\nWIN-J38I01U06D7\
  \ MSSQLSERVER  WIN-J38I01U06D7 DbaMaintenance (Job outcome) 18/01/2021 08:41:00\
  \ 2021-01-18 08:41:00.000 2021-01-18 08:42:01.000 00:01:01 Failed              \
  \   The job failed.  JobManager tried to run a non-existent step (3) for job DbaMain...\n\
  WIN-J38I01U06D7 MSSQLSERVER  WIN-J38I01U06D7 DbaMaintenance (Job outcome) 18/01/2021\
  \ 08:39:00 2021-01-18 08:39:00.000 2021-01-18 08:40:02.000 00:01:02 Failed     \
  \            The job failed.  JobManager tried to run a non-existent step (3) for\
  \ job DbaMain...\nWIN-J38I01U06D7 MSSQLSERVER  WIN-J38I01U06D7 DbaMaintenance (Job\
  \ outcome) 18/01/2021 08:37:00 2021-01-18 08:37:00.000 2021-01-18 08:38:02.000 00:01:02\
  \ Failed                 The job failed.  JobManager tried to run a non-existent\
  \ step (3) for job DbaMain...\nWIN-J38I01U06D7 MSSQLSERVER  WIN-J38I01U06D7 DbaMaintenance\
  \ (Job outcome) 18/01/2021 08:35:00 2021-01-18 08:35:00.000 2021-01-18 08:36:02.000\
  \ 00:01:02 Failed                 The job failed.  JobManager tried to run a non-existent\
  \ step (3) for job DbaMain...\n```\n\n\n\n### 从结果看失败任务\n\n从这些结果中，我们可以看出哪个任务总是在同一位置失败。但你也会注意到，错误信息被截断了。我们可以通过将\
  \ `Where-Object` 命令的结果通过管道传递给 `Select-Object` 命令来解决这个问题，后者可以展开 `Message` 属性。这在代码清单\
  \ 5-32 中有演示。\n\n```\nGet-DbaAgentJobHistory -SqlInstance localhost | Where-Object\
  \ status -eq \"Failed\" | Select-Object -ExpandProperty Message\n```\n代码清单 5-32\n\
  展开 Message 属性\n\n此命令的结果如下所示：\n\n```\nThe job failed.  JobManager tried to run a\
  \ non-existent step (3) for job DbaMaintenance.\nThe job failed.  JobManager tried\
  \ to run a non-existent step (3) for job DbaMaintenance.\nThe job failed.  JobManager\
  \ tried to run a non-existent step (3) for job DbaMaintenance.\nThe job failed.\
  \  JobManager tried to run a non-existent step (3) for job DbaMaintenance.\n```\n\
  \n我现在可以明确地看到，任务失败是因为它试图运行一个不存在的作业步骤。这显然是作业设计中的一个错误。如果你回想一下代码清单 5-28，我们在那里创建了作业步骤，你可能记得我们为所有作业步骤将\
  \ `OnSuccessAction` 和 `OnFailureAction` 参数的公共属性设置为了 `GoToNextStep`。这包括了最后一个作业步骤，这意味着当最后一个作业步骤完成时，它会尝试执行“下一个作业步骤”，而这个步骤当然不存在。\n\
  \n我们可以通过将最后一个作业步骤更新为 `QuitWithSuccess` 或 `QuitWithFailure` 来解决这个问题，具体取决于该步骤的结果。这可以通过使用\
  \ `Set-DbaAgentJobStep` 命令实现，如代码清单 5-33 所示。这里，我们将作业名称传递给 `–Job` 参数，作业步骤名称传递给 `–StepName`\
  \ 参数，以及我们想要更新的作业方面。在我们的场景中，将包含 `-OnSuccessAction` 和 `-OnFailAction` 参数。\n\n```\n\
  $params = @{\n    SqlInstance     = \"localhost\"\n    Job             = \"DbaMaintenance\"\
  \n    StepName        = \"RebuildIndexes\"\n    OnSuccessAction = \"QuitWithSuccess\"\
  \n    OnFailAction    = \"QuitWithFailure\"\n}\nSet-DbaAgentJobStep @params\n```\n\
  代码清单 5-33\n更新作业步骤\n\n## 总结\n\nDbaTools 提供了一个由社区维护的替代方案，用于替代 Microsoft 的 `SqlServer`\
  \ PowerShell 模块。虽然它并非没有局限性，例如，无法为你已创建的角色分配权限，但它提供的功能覆盖范围远大于 Microsoft 的产品。该模块中的命令在用法上也提供了更高的一致性，这使得代码编写更快。\n\
  \n`Invoke-DbaQuery` 命令等同于 `SqlServer` 模块中的 `Invoke-SqlCmd` 命令。这两个命令的功能在很大程度上是一致的。两者之间最大的区别在于参数的处理方式。`Invoke-DbaQuery`\
  \ 允许你通过哈希表传递参数，然后在你的 T-SQL 脚本中使用它们，就像在 T-SQL 中声明的一样。这有助于使代码更易于维护。\n\n在撰写本文时，DbaTools\
  \ 提供了超过 700 个命令和函数，我强烈建议你查看 dbatools.io/commands/ 上的完整命令列表。虽然在本章的有限篇幅内只能触及可用命令的皮毛，但你可以看到，这一系列功能提供了以一种非常快速、简单和灵活的方式管理对象（例如与安全和\
  \ SQL Server Agent 相关的对象）的能力，而无需依赖在 `Invoke-DbaQuery` 命令中编写 T-SQL 脚本。\n\n# 6. 自动化安装\n\
  \n自动化实例构建不仅可以减少 DBA 的工作量和新数据层应用程序的上市时间，还可以降低运营开销，因为它为企业中所有新的数据层应用程序提供了一个一致的平台。\n\
  \n一个完全自动化的构建不仅仅是运行命令行的 `setup.exe`。我们还应该考虑如何优化 Windows 以及如何测试我们的自动化构建是否成功。\n\n有多种方法可用于自动化\
  \ SQL Server 实例的构建。例如，我们可以使用 sysprep，或者在云中，我们可以使用已预装 SQL Server 的现成映像。然而，这些选项存在挑战，例如缺乏控制和灵活性。\n\
  \n因此，在本章中，在初步回顾如何使用 `setup.exe` 从命令行安装 SQL Server 之后，我们将重点介绍构建实例的两种最灵活的方法。具体来说，我们将研究一种脚本化方法，然后是使用\
  \ DSC 安装 SQL Server。这第二种技术建立在你在第 3 章学到的内容之上，我强烈建议你先阅读那一章。\n\n## 安装实例\n\n从命令行安装 SQL\
  \ Server 涉及在 PowerShell 终端中运行 `setup.exe`。`setup.exe` 可以在 SQL Server 安装介质的根目录中找到。从\
  \ PowerShell 终端运行 `setup.exe` 时，你可以使用开关和参数来传递值，这些值将用于配置实例。\n\n### 必需参数\n\n虽然许多开关和参数是可选的，但有些必须始终包含。当你安装独立的数据库引擎实例时，表\
  \ 6-1 中列出的参数始终是必需的。\n\n表 6-1\n\n必需参数\n\n| 参数 | 用途 |\n| --- | --- |\n| `/IACCEPTSQLSERVERLICENSETERMS`\
  \ | 确认你接受 SQL Server 许可条款 |\n| `/SUPPRESSPRIVACYSTATEMENTNOTICE` | 防止显示隐私声明 |\n\
  | `/ACTION` | 指定你想要执行的操作，例如安装或升级 |\n| `/FEATURES or /ROLE` | 指定你希望安装的功能 |\n| `/INSTANCENAME`\
  \ | 分配给实例的名称 |\n| `/SQLSYSADMINACCOUNTS` | 将在数据库引擎实例中被授予管理权限的 Windows 安全上下文 |\n\
  | `/AGTSVCACCOUNT` | 用于运行 SQL Agent 服务的帐户 |\n| `/AGTSVCPASSWORD` | 如果不是组管理服务帐户，则此参数用于指定\
  \ SQL Agent 服务帐户的密码 |\n| `/SQLSVCACCOUNT` | 用于运行数据库引擎服务的帐户 |\n| `/SQLSVCPASSWORD`\
  \ | 如果不是 gMSA 或虚拟帐户，则此参数用于指定数据库引擎服务帐户的密码 |\n| `/qs` | 执行无人参与安装。在 Windows Server\
  \ Core 上是必需的，因为不支持安装向导 |\n\n#### IACCEPTSQLSERVERLICENSETERMS 开关\n\n因为 `/IACCEPTSQLSERVERLICENSETERMS`\
  \ 是一个简单的开关，表示你接受许可条款，所以它不需要传递任何参数值。\n\n\n### ACTION 参数\n\n当执行独立实例的基本安装时，传递给`/ACTION`参数的值将是`install`；但是，`/ACTION`参数所有可能的值如表\
  \ 6-2 所示。\n\n**表 6-2**\n\n`/ACTION` 参数接受的值\n\n| 值 | 用途 |\n| --- | --- |\n| `Install`\
  \ | 安装独立实例 |\n| `PrepareImage` | 准备一个原始的独立镜像，不包含账户、计算机或网络的特定详细信息 |\n| `CompleteImage`\
  \ | 通过添加账户、计算机和网络详细信息来完成已准备的独立镜像的安装 |\n| `Upgrade` | 从 SQL Server 2012、2014、2017\
  \ 或 2019 升级实例 |\n| `EditionUpgrade` | 将 SQL Server 2022 从较低版本（如 Developer Edition）升级到较高版本（如\
  \ Enterprise） |\n| `Repair` | 修复损坏的实例 |\n| `RebuildDatabase` | 重建损坏的系统数据库 |\n| `Uninstall`\
  \ | 卸载独立实例 |\n| `InstallFailoverCluster` | 安装故障转移群集实例 |\n| `PrepareFailoverCluster`\
  \ | 准备一个原始的群集镜像，不包含账户、计算机或网络的特定详细信息 |\n| `CompleteFailoverCluster` | 通过添加账户、计算机和网络详细信息来完成已准备的群集镜像的安装\
  \ |\n| `AddNode` | 向故障转移群集添加节点 |\n| `RemoveNode` | 从故障转移群集中移除节点 |\n\n### FEATURES\
  \ 参数\n\n如表 6-3 所示，`/FEATURES` 参数用于指定一个逗号分隔的列表，该列表包含安装程序将要安装的功能，但并非所有功能都可在 Windows\
  \ Server Core 上使用。\n\n**表 6-3**\n\n`/FEATURES` 参数的可接受值\n\n| 参数值 | 在 Windows Core\
  \ 上使用 | 描述 |\n| --- | --- | --- |\n| `SQL` | 否 | 完整的 SQL 引擎，包括全文搜索、复制和数据质量服务器 |\n\
  | `SQLEngine` | 是 | 数据库引擎 |\n| `FullText` | 是 | 全文搜索 |\n| `Replication` | 是 | 复制组件\
  \ |\n| `DQ` | 否 | 数据质量服务器 |\n| `PolyBase` | 是 | PolyBase 组件 |\n| `AdvancedAnalytics`\
  \ | 是 | 机器学习解决方案和数据库内 R 服务 |\n| `AS` | 是 | Analysis Services |\n| `DQC` | 否 | 数据质量客户端\
  \ |\n| `IS` | 是 | Integration Services |\n| `MDS` | 否 | 主数据服务 |\n| `Tools` | 否 |\
  \ 所有客户端工具 |\n| `BC` | 否 | 向后兼容组件 |\n| `Conn` | 是 | 连接组件 |\n| `DREPLAY_CTLR` | 否\
  \ | 分布式重播控制器 |\n| `DREPLAY_CLT` | 否 | 分布式重播客户端 |\n| `SNAC_SDK` | 是 | 客户端连接 SDK |\n\
  | `SDK` | 否 | 客户端工具 SDK |\n| `LocalDB` | 是 | SQL Server Express 的一种执行模式，供应用程序开发人员使用\
  \ |\n| `IS_MASTER` | 是 | Integration Services Master，用于横向扩展的 SSIS 部署 |\n| `IS_WORKER`\
  \ | 是 | Integration Services Worker，用于横向扩展的 SSIS 部署 |\n| `AZUREEXTENSION` | 是 |\
  \ 将实例与 Azure ARC 集成以实现集中管理 |\n\n> **注意**\n> 如果你选择安装其他 SQL Server 功能，例如 Analysis\
  \ Services 或 Integration Services，那么其他参数也会变为必需项。\n\n### Role 参数\n\n除了使用`/FEATURES`参数指定要安装的功能列表外，还可以使用`/ROLE`参数在预定义的角色中安装\
  \ SQL Server。`/ROLE`参数支持的角色详见表 6-4。\n\n**表 6-4**\n\n`/ROLE` 参数的可用值\n\n| 参数值 | 描述\
  \ |\n| --- | --- |\n| `SPI_AS_ExistingFarm` | 在现有的 SharePoint 场中将 SSAS 安装为 PowerPivot\
  \ 实例 |\n| `SPI_AS_NewFarm` | 在新的、未配置的 SharePoint 场中安装数据库引擎和 SSAS 作为 PowerPivot 实例\
  \ |\n| `AllFeatures_WithDefaults` | 安装 SQL Server 及其组件的所有功能。我建议不要使用此选项，除非是在最特殊的情况下，因为安装比实际需要更多的功能会增加\
  \ SQL Server 的安全足迹和资源利用足迹 |\n\n### 基本安装\n\n当你使用`setup.exe`的命令行参数时，应遵守表 6-5 中概述的语法规则。\n\
  \n**表 6-5**\n\n命令行参数的语法规则\n\n| 参数类型 | 语法 |\n| --- | --- |\n| 简单开关 | `/SWITCH` |\n\
  | 真/假 | `/PARAMETER=true/false` |\n| 布尔值 | `/PARAMETER=0/1` |\n| 文本 | `/PARAMETER=\"\
  Value\"` |\n| 多值文本 | `/PARAMETER=\"Value1\" \"Value2\"` |\n| `/FEATURES` 参数 | `/FEATURES=Feature1,Feature2`\
  \ |\n\n> **提示**\n> 对于文本参数，只有当值包含空格时才需要引号。但是，始终包含它们被认为是一种良好的做法。\n\n假设你已经导航到安装介质的根目录，那么代码清单\
  \ 6-1 提供了用于安装数据库引擎和复制的 PowerShell 语法。它为所有可选参数使用了默认值，但排序规则除外，我们将把它设置为 Windows 排序规则\
  \ `Latin1_General_CI_AS`。\n\n```\n.\\SETUP.EXE /IACCEPTSQLSERVERLICENSETERMS /ACTION=\"\
  Install\" /FEATURES=SQLEngine,Replication /INSTANCENAME=\"SCRIPTING\" /SQLSYSADMINACCOUNTS=\"\
  Administrator\" /SQLCOLLATION=\"Latin1_General_CI_AS\" /qs /SUPPRESSPRIVACYSTATEMENTNOTICE\n\
  ```\n\n**代码清单 6-1**\n从 PowerShell 安装 SQL Server\n\n> **注意**\n> 如果使用的是命令提示符而不是 PowerShell，则不需要前导的\
  \ `.\\` 字符。\n\n在此示例中，将安装一个名为 `SCRIPTING` 的 SQL Server 实例。由于未提供服务账户参数，数据库引擎和 SQL\
  \ Agent 服务将在虚拟服务账户下运行。安装开始时，一个精简的、非交互式的安装向导版本将出现，以使你了解进度。\n\n\n### 冒烟测试\n\n在自动安装实例后，总是值得进行一些冒烟测试。这里的\
  \ `冒烟测试` 指的是快速、高层级的测试，旨在确保服务正在运行且实例可访问。\n\n代码清单 6-2 中的脚本将使用 PowerShell 的 `Get-Service`\
  \ cmdlet 来确认与 SCRIPTING 实例相关的服务是否存在，并检查其状态。此脚本使用星号作为通配符，返回所有包含我们实例名称的服务。这当然意味着，诸如\
  \ SQL Browser 之类的服务不会被返回。\n\n```\nGet-Service -displayname *SCRIPTING* | Select-Object\
  \ name, displayname, status\n代码清单 6-2\n检查服务状态\n```\n\n你会注意到 SQL Server 和 SQL Agent\
  \ 服务都已安装。你还可以看到 SQL Server 服务已启动，而 SQL Agent 服务已停止。这与我们的预期一致，因为我们没有为这两个服务使用启动模式参数。SQL\
  \ Server 服务的默认启动模式是自动，而 SQL Agent 服务的默认启动模式是手动。\n\n第二个推荐的冒烟测试是使用 `Invoke-Sqlcmd`\
  \ 运行一个返回实例名称的 T-SQL 语句。要使用 `Invoke-Sqlcmd` cmdlet（或任何其他 SQL Server PowerShell cmdlet），需要安装\
  \ `sqlserver` PowerShell 模块。此模块取代了已弃用的 `SQLPS` 模块，并且包含更多 cmdlet。\n\n一旦 `sqlserver`\
  \ 模块安装完毕，就可以使用代码清单 6-3 中的脚本来返回实例名称。\n\n> **注意**\n>\n> 这也是集群执行 `IsAlive` 测试时所使用的查询。它对系统影响很小，只是检查实例是否可访问。\n\
  \n```\nInvoke-Sqlcmd –serverinstance \"localhost\\SCRIPTING\" -query -TrustServerCertificate\
  \  \"SELECT @@SERVERNAME\"\n代码清单 6-3\n检查实例是否可访问\n```\n\n在此示例中，`-serverinstance`\
  \ 开关用于指定你要连接到的实例名称，`-query` 开关指定了将要运行的查询。你应该能看到查询成功解析并返回了实例名称。\n\n### 可选参数\n\n有许多开关和参数可以可选地使用，以自定义你正在安装的实例的配置。可用于安装数据库引擎的可选开关和参数列于表\
  \ 6-6 中。\n\n> **提示**\n>\n> 如果使用的账户是 MSA/gMSA，则不应指定账户密码。这包括数据库引擎和 SQL Server Agent\
  \ 服务的账户，否则这些账户是必填的。\n\n表 6-6\n可选参数\n\n\n\n| 参数 | 用法 |\n| --- | --- |\n| `/AGTSVCSTARTUPTYPE`\
  \ | 指定 SQL Server Agent 服务的启动模式。可设置为 `Automatic`、`Manual` 或 `Disabled` |\n| `/BROWSERSVCSTARTUPTYPE`\
  \ | 指定 SQL Server Browser 服务的启动模式。可设置为 `Automatic`、`Manual` 或 `Disabled` |\n| `/CONFIGURATIONFILE`\
  \ | 指定配置文件的路径，该文件包含一系列开关和参数，从而在运行安装程序时无需内联指定它们 |\n| `/ENU` | 指定将使用英文版 SQL Server。如果您在具有本地化设置的服务器上安装英文版\
  \ SQL Server，并且介质包含英文和本地化操作系统的语言包，请使用此开关 |\n| `/FILESTREAMLEVEL` | 用于启用 FILESTREAM\
  \ 并设置所需的访问级别。可设置为 `0` 以禁用 FILESTREAM，`1` 以允许仅通过 SQL Server 连接，`2` 以允许 IO 流式处理，或\
  \ `3` 以允许远程流式处理。选项 `1` 到 `3` 是逐级构建的，因此指定级别 `3` 就隐式指定了级别 `1` 和 `2` |\n| `/FILESTREAMSHARENAME`\
  \ | 指定存储 FILESTREAM 数据的 Windows 文件共享的名称。当 `/FILESTREAMLEVEL` 设置为 `2` 或 `3` 时，此参数变为必需\
  \ |\n| `/FTSVCACCOUNT` | 用于运行全文筛选器启动器服务的帐户 |\n| `/FTSVCPASSWORD` | 用于运行全文筛选器启动器服务的帐户的密码\
  \ |\n| `/HIDECONSOLE` | 指定应隐藏控制台 |\n| `/INDICATEPROGRESS` | 使用此开关时，安装日志将在安装过程中输出到屏幕\
  \ |\n| `/IACCEPTPYTHONLICENSETERMS` | 如果安装 Anaconda Python 包，并使用 `/q` 或 `/qs`，则必须指定此参数\
  \ |\n| `/IACCEPTROPENLICENSETERMS` | 安装 Microsoft R 包，并使用 `/q` 或 `/qs` 时，必须指定此参数\
  \ |\n| `/INSTANCEDIR` | 指定实例的文件夹位置 |\n| `/INSTANCEID` | 指定实例的 ID。使用此参数被认为是不好的做法\
  \ |\n| `/INSTALLSHAREDDIR` | 指定实例间共享的 64 位组件的文件夹位置 |\n| `/INSTALLSHAREDWOWDIR` |\
  \ 指定实例间共享的 32 位组件的文件夹位置。此位置不能与 64 位共享组件的位置相同 |\n| `/INSTALLSQLDATADIR` | 指定实例数据的默认文件夹位置\
  \ |\n| `/NPENABLED` | 指定是否应启用命名管道。可设置为 `0` 表示禁用，或 `1` 表示启用 |\n| `/PID` | 指定 SQL\
  \ Server 的 PID。除非介质已预置 PID，否则未指定此参数将导致安装评估版 |\n| `/PBENGSVCACCOUNT` | 指定将用于运行 PolyBase\
  \ 服务的帐户 |\n| `/PBDMSSVCPASSWORD` | 指定将运行 PolyBase 服务的帐户的密码 |\n| `/PBENGSVCSTARTUPTYPE`\
  \ | 指定 PolyBase 的启动模式。可设置为 `Automatic`、`Manual` 或 `Disabled` |\n| `/PBPORTRANGE`\
  \ | 指定 PolyBase 服务要侦听的端口范围。必须包含至少六个端口 |\n| `/PBSCALEOUT` | 指定数据库引擎是否是 PolyBase 横向扩展组的一部分\
  \ |\n| `/SAPWD` | 指定 SA 帐户的密码。当使用 `/SECURITYMODE` 将实例配置为混合模式身份验证时，使用此参数。如果 `/SECURITYMODE`\
  \ 设置为 `SQL`，则此参数变为必需 |\n| `/SECURITYMODE` | 使用此参数（值为 `SQL`）来指定混合模式。如果不使用此参数，则将使用\
  \ Windows 身份验证 |\n| `/SQLBACKUPDIR` | 指定 SQL Server 备份的默认位置 |\n| `/SQLCOLLATION`\
  \ | 指定实例将使用的排序规则 |\n| `/SQLMAXMEMORY` | 指定数据库引擎（主要用于缓冲区缓存）可以使用的最大 RAM 量 |\n| `/SQLMINMEMORY`\
  \ | 指定数据库引擎（主要用于缓冲区缓存）可以使用的最小 RAM 量 |\n| `/SQLSVCSTARTUPTYPE` | 指定数据库引擎服务的启动模式。可设置为\
  \ `Automatic`、`Manual` 或 `Disabled` |\n| `/SQLTEMPDBDIR` | 指定 TempDB 数据文件的文件夹位置\
  \ |\n| `/SQLTEMPDBLOGDIR` | 指定 TempDB 日志文件的文件夹位置 |\n| `/SQLTEMPDBFILECOUNT` | 指定应创建的\
  \ TempDB 数据文件的数量 |\n| `/SQLTEMPDBFILESIZE` | 指定每个 TempDB 数据文件的大小 |\n| `/SQLTEMPDBFILEGROWTH`\
  \ | 指定 TempDB 数据文件的增长增量 |\n| `/SQLTEMPDBLOGFILESIZE` | 指定 TempDB 日志文件的初始大小 |\n|\
  \ `/SQLTEMPDBLOGFILEGROWTH` | 指定 TempDB 日志文件的增长增量 |\n| `/SQLUSERDBDIR` | 指定用户数据库数据文件的默认位置\
  \ |\n| `/SQLUSERDBLOGDIR` | 指定用户数据库日志文件的默认文件夹位置 |\n| `/SQLSVCINSTANTFILEINIT` |\
  \ 指定应授予数据库引擎服务帐户“执行卷维护任务”权限。可接受的值是 `true` 或 `false` |\n| `/TCPENABLED` | 指定是否将启用\
  \ TCP。使用值 `0` 表示禁用，`1` 表示启用 |\n| `/UPDATEENABLED` | 指定是否将使用产品更新功能。传递值 `0` 表示禁用，`1`\
  \ 表示启用 |\n| `/UPDATESOURCE` | 指定产品更新搜索更新的位置。值 `MU` 将搜索 Windows Update，但您也可以传递文件共享或\
  \ UNC 路径 |\n\n\n\n### 产品更新\n\n“产品更新”功能取代了 SQL Server 已弃用的流式安装功能，它使您能够在安装 SQL Server\
  \ 基础二进制文件的同时，安装最新的 `CU`（累积更新）或 `GDR`（常规分发版本 - 针对安全问题的修复程序）。此功能可以节省数据库管理员在安装 SQL\
  \ Server 实例后立即安装最新更新所需的时间和精力，也有助于确保新部署环境的补丁级别保持一致。\n\n提示：从 SQL Server 2017 开始，不再发布服务包。所有更新均为\
  \ `CU` 或 `GDR`。\n\n要使用此功能，必须在命令行安装时使用两个参数。第一个是 `/UPDATEENABLED` 参数。您应将其值指定为 `1`\
  \ 或 `True`。第二个是 `/UPDATESOURCE` 参数。此参数将告诉安装程序在哪里查找产品更新。如果向此参数传递值 `MU`，则安装程序将检查 Microsoft\
  \ Update 或 WSUS 服务；或者，您也可以提供一个文件夹的相对路径或网络共享的 `UNC`（统一命名约定）路径。\n\n在下面的示例中，我们将研究如何使用此功能来安装包含\
  \ `CU1` 的 SQL Server 2022，该更新位于一个网络共享中。当您下载 `GDR` 或 `CU` 时，它们通常会被打包在一个自解压可执行文件中。这非常有用，因为即使您的环境中未使用\
  \ WSUS，一旦您批准了新的补丁级别，您只需简单地替换网络共享中的 `CU`；这样做之后，所有新部署都能接收最新的更新，而无需更改您用于构建新实例的 PowerShell\
  \ 脚本。\n\n清单 6-4 中的 PowerShell 命令将安装一个名为 `SCRIPTING2` 的 SQL Server 实例，同时安装位于文件服务器上的\
  \ `CU1`。\n\n注意：您用于运行安装的帐户需要具有对文件共享的访问权限。\n\n```powershell\n.\\SETUP.EXE /IACCEPTSQLSERVERLICENSETERMS\
  \ /ACTION=\"Install\" /FEATURES=SQLEngine,Replication /INSTANCENAME=\"SCRIPTING2\"\
  \ /SQLSVCACCOUNT=\"MyDomain\\SQLServiceAccount1\" /SQLSVCPASSWORD=\"Pa$$w0rd\" /AGTSVCACCOUNT=\"\
  MyDomain\\SQLServiceAccount1\" /AGTSVCPASSWORD=\"Pa$$w0rd\" /SQLSYSADMINACCOUNTS=\"\
  MyDomain\\SQLDBA\" /UPDATEENABLED=1 /UPDATESOURCE=\"\\\\192.168.183.1\\SQL2022_CU1\\\
  \" /qs\n```\n清单 6-4：在安装过程中安装 `CU`\n\n清单 6-5 中的代码演示了如何检查两个实例之间的差异。该代码使用 `Invoke-sqlcmd`\
  \ 连接到 `SCRIPTING2` 实例，并返回包含实例完整版本详细信息（包括内部版本号）的系统变量。实例名称也包含在内，以帮助我们轻松识别结果。\n\n```powershell\n\
  $parameters = @{\nServerInstance = 'localhost\\SCRIPTING2'\nTrustServerCertificate\
  \ = $true\nQuery               = \"\nSELECT\n@@SERVERNAME\n, @@VERSION\n\"\n}\n\
  Invoke-sqlcmd @parameters | Format-List\n```\n清单 6-5：确定每个实例的内部版本\n\n### 使用配置文件\n\
  \n清单 6-6 中的示例是一个配置文件的内容，其中已填充了安装名为 `EXPERTSCRIPTING3` 的实例所需的所有必需参数。它还包含启用命名管道和 `TCP/IP`、在可通过\
  \ `T-SQL` 访问的级别启用 `FILESTREAM`、将 `SQL Agent` 服务设置为自动启动以及将排序规则配置为 `Latin1_General_CI_AS`\
  \ 的可选参数。在此 `.ini` 文件中，注释以行首的分号定义。\n\n```ini\n; SQL Server 2022 配置文件\n[OPTIONS]\n\
  ; 接受 SQL Server 许可协议\nIACCEPTSQLSERVERLICENSETERMS\n; 指定安装工作流，如 INSTALL、UNINSTALL\
  \ 或 UPGRADE。\n; 此为必需参数。\nACTION=\"Install\"\n; 安装程序将仅显示进度，无需任何用户交互。\nQUIETSIMPLE=\"\
  True\"\n; 指定要安装、卸载或升级的功能。\nFEATURES=SQLENGINE,REPLICATION\n; 指定默认实例或命名实例。MSSQLSERVER\
  \ 是非 Express 版本的默认实例，\n; SQLExpress 是 Express 版本的默认实例。安装 SQL Server 数据库引擎 (SQL)、\n\
  ; 分析服务 (AS) 时，此参数为必需。\nINSTANCENAME=\"EXPERTSCRIPTING3\"\n; 代理帐户名称\nAGTSVCACCOUNT=\"\
  MyDomain\\SQLServiceAccount1\"\n; 代理帐户密码\nAGTSVCPASSWORD=\"Pa$$w0rd\"\n; 安装后自动启动服务。\n\
  AGTSVCSTARTUPTYPE=\"Automatic\"\n; 要启用的 FILESTREAM 功能级别 (0, 1, 2 或 3)。\nFILESTREAMLEVEL=\"\
  1\"\n; 指定用于数据库引擎的 Windows 排序规则或 SQL 排序规则。\nSQLCOLLATION=\"Latin1_General_CI_AS\"\
  \n; SQL Server 服务的帐户：域\\用户或系统帐户。\nSQLSVCACCOUNT=\"MyDomain\\SQLServiceAccount1\"\
  \n; SQL Server 服务帐户的密码。\nSQLSVCPASSWORD=\"Pa$$w0rd\"\n; 要配置为 SQL Server 系统管理员的 Windows\
  \ 帐户。\nSQLSYSADMINACCOUNTS=\"MyDomain\\SQLDBA\"\n; 指定 0 为禁用，1 为启用 TCP/IP 协议。\nTCPENABLED=\"\
  1\"\n; 指定 0 为禁用，1 为启用命名管道协议。\nNPENABLED=\"1\"\n```\n清单 6-6：用于 `SCRIPTING3` 的配置文件\n\
  \n假设此配置文件已保存为 `c:\\SQL2022\\configuration1.ini`，则可以使用清单 6-7 中的代码从 PowerShell 运行\
  \ `setup.exe`。\n\n```powershell\n.\\setup.exe /CONFIGURATIONFILE=\"c:\\SQL2022\\\
  Configuration1.ini\"\n```\n清单 6-7：使用配置文件安装 SQL Server\n\n尽管这是配置文件的完全有效的用法，但您实际上可以更巧妙地利用此方法创建一个可重用的脚本，该脚本可在任何服务器上运行，以帮助您引入一致的构建过程。如果您的\
  \ Windows 运维团队尚未采用 `sysprep` 或使用其他方法来构建服务器，此方法特别有用。\n\n在清单 6-8 中，您将看到另一个配置文件。然而，这次它只包含您期望在整个环境中保持一致的静态参数。会因每次安装而变化的参数（例如实例名称和帐户详细信息）已被省略。\n\
  \n\n\n## SQL Server 2022 安装配置\n\n```\n;SQL Server 2022 配置文件\n[OPTIONS]\n; 接受 SQL\
  \ Server 许可协议\nIACCEPTSQLSERVERLICENSETERMS\n; 指定安装工作流，例如 INSTALL（安装）、UNINSTALL（卸载）或\
  \ UPGRADE（升级）。\n; 此为必需参数。\nACTION=\"Install\"\n; 安装程序仅显示进度，不进行任何用户交互。\nQUIETSIMPLE=\"\
  True\"\n; 指定要安装、卸载或升级的功能。\nFEATURES=SQLENGINE,REPLICATION\n; 安装后自动启动服务。\nAGTSVCSTARTUPTYPE=\"\
  Automatic\"\n; 启用 FILESTREAM 功能的级别（0、1、2 或 3）。\nFILESTREAMLEVEL=\"1\"\n; 指定数据库引擎使用的\
  \ Windows 排序规则或 SQL 排序规则。\nSQLCOLLATION=\"Latin1_General_CI_AS\"\n; 要配置为 SQL Server\
  \ 系统管理员的 Windows 帐户。\nSQLSYSADMINACCOUNTS=\"MyDomain\\SQLDBA\"\n; 指定 0 为禁用，1 为启用\
  \ TCP/IP 协议。\nTCPENABLED=\"1\"\n; 指定 0 为禁用，1 为启用 Named Pipes 协议。\nNPENABLED=\"1\"\
  \n```\n`Listing 6-8` `SCRIPTING4` 的配置文件\n\n这意味着要成功安装该实例，你需要混合使用配置文件中的参数以及运行 `setup.exe`\
  \ 命令时内联指定的参数，如`Listing 6-9`所示。此示例假设`Listing 6-8`中的配置已保存为 `C:\\SQL2022\\Configuration2.ini`，并将安装一个名为\
  \ `EXPERTSCRIPTING3` 的实例。\n\n```\n.\\SETUP.EXE /INSTANCENAME=\"SCRIPTING4 /SQLSVCACCOUNT=\"\
  MyDomain\\SQLServiceAccount1\" /SQLSVCPASSWORD=\"Pa$$w0rd\" /AGTSVCACCOUNT=\"MyDomain\\\
  SQLServiceAccount1\" /AGTSVCPASSWORD=\"Pa$$w0rd\" /CONFIGURATIONFILE=\"C:\\SQL2022\\\
  Configuration2.ini\"\n```\n`Listing 6-9` 使用混合参数和配置文件安装 SQL Server\n\n## 通过脚本进行自动化安装\n\
  \n这种方法的好处在于，我们拥有一个一致的配置文件，无需在每次构建新实例时都进行修改。然而，这个想法可以更进一步。如果我们把 PowerShell 命令保存为\
  \ PowerShell 脚本，那么就可以运行该脚本并传入参数，而不必每次都重写命令。这将为我们提供一个用于构建新实例的一致脚本，我们可以将其置于变更控制之下。`Listing\
  \ 6-10`中的代码演示了如何构建一个参数化的 PowerShell 脚本，它将使用相同的配置文件。该脚本假设 `D:\\` 是安装媒体的根文件夹。\n\n\
  ```\nparam(\n    [string]       $InstanceName,\n    [PSCredential] $SQLServiceAccountCredential,\n\
  \    [PSCredential] $AgentServiceAccountCredential\n)\n$params = @(\n    '/INSTANCENAME=\"\
  {0}\"' -f $InstanceName\n    '/SQLSVCACCOUNT=\"{0}\"' -f $SQLServiceAccountCredential.Username\n\
  \    '/SQLSVCPASSWORD=\"{0}\"' -f $SQLServiceAccountCredential.GetNetworkCredential().Password\n\
  \    '/AGTSVCACCOUNT=\"{0}\"' -f $AgentServiceAccountCredential.Username\n    '/AGTSVCPASSWORD=\"\
  {0}\"' -f$AgentServiceAccountCredential.GetNetworkCredential().Password\n    '/CONFIGURATIONFILE=\"\
  C:\\SQL2022\\Configuration2.ini\"'\n)\nStart-Process -FilePath 'C:\\SQLServerSetup\\\
  SETUP.EXE' -ArgumentList $params -Wait -NoNewWindow\n```\n`Listing 6-10` 用于自动安装的\
  \ PowerShell 脚本\n\n假设此脚本保存为 `SQLAutoInstall1.ps1`，则可以使用`Listing 6-11`中的命令来构建一个名为\
  \ `SCRIPTING5` 的实例。该命令运行 PowerShell 脚本，传入参数，然后这些参数在 `setup.exe` 命令中被使用。\n\n```\n\
  ./SQLAutoInstall.ps1 -InstanceName 'SCRIPTING5' -SQLServiceAccount 'MyDomain\\SQLServiceAccount1'\
  \ -SQLServiceAccountPassword 'Pa$$w0rd' -AgentServiceAccount 'MyDomain\\SQLServiceAccount1'\
  \ -AgentServiceAccountPassword 'Pa$$w0rd'\n```\n`Listing 6-11` 运行 `SQLAutoInstall.ps1`\n\
  \n### 增强安装例程\n\n你还可以进一步扩展 `SQLAutoInstall.ps1` 脚本，并用它来结合你在第 1 章学到的操作系统组件配置技术，以及你在本章前面学到的执行冒烟测试的技术。\n\
  \n安装实例后，修改后的脚本（如`Listing 6-12`所示，我们称之为 `SQLAutoInstall2.ps1`）会使用 `powercfg` 设置高性能电源计划，并使用\
  \ `Set-ItemProperty` 将后台服务优先级置于前台应用程序之上。然后运行冒烟测试以确保 SQL Server 和 SQL Agent 服务都在运行，并且实例可访问。\n\
  \n```\nparam(\n    [string]       $InstanceName,\n    [PSCredential] $SQLServiceAccountCredential,\n\
  \    [PSCredential] $AgentServiceAccountCredential\n)\n"
- "# 初始化连接字符串变量\n$serverName = $env:computername\n$connectionString = '{0}\\{1}' -f\
  \ $serverName, $InstanceName\n## 安装实例\n$params = @(\n    '/INSTANCENAME=\"{0}\"\
  ' -f $InstanceName\n    '/SQLSVCACCOUNT=\"{0}\"' -f $SQLServiceAccountCredential.Username\n\
  \    '/SQLSVCPASSWORD=\"{0}\"' -f $SQLServiceAccountCredential.GetNetworkCredential().Password\n\
  \    '/AGTSVCACCOUNT=\"{0}\"' -f $AgentServiceAccountCredential.Username\n    '/AGTSVCPASSWORD=\"\
  {0}\"' -f$AgentServiceAccountCredential.GetNetworkCredential().Password\n    '/CONFIGURATIONFILE=\"\
  C:\\SQL2022\\Configuration2.ini\"'\n)\nStart-Process -FilePath 'C:\\SQLServerSetup\\\
  SETUP.EXE' -ArgumentList $params -Wait -NoNewWindow\n"
- '# 配置操作系统设置

  Start-Process -FilePath ''C:\Windows\System32\powercfg.exe'' -ArgumentList ''-setactive
  8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c'' -Wait -NoNewWindow

  Set-ItemProperty -Path HKLM:\SYSTEM\CurrentControlSet\Control\PriorityControl\ -Name
  Win32PrioritySeparation -Value 24

  '
- "# 运行冒烟测试\nGet-Service -DisplayName ('*{0}*' -f $InstanceName)\nInvoke-SqlCmd -Serverinstance\
  \ $connectionString -Query \"SELECT @@SERVERNAME\" -TrustServerCertificate\n```\n\
  `Listing 6-12` 增强版的 PowerShell 自动安装脚本\n\n除了将变量传递到 `setup.exe` 命令外，该脚本还使用 `$InstanceName`\
  \ 参数作为冒烟测试的输入。该参数可以直接传递给 `Get-Service` cmdlet，两边使用通配符。然而，对于 `Invoke-Sqlcmd`，我们需要多做一点工作。`Invoke-Sqlcmd`\
  \ 需要实例的全名，包括服务器名称，或者如果脚本总是在本地运行，则可以是 `localhost`。该脚本从 `ComputerName` 环境变量中获取服务器名称，然后将其与\
  \ `$InstanceName` 变量连接起来，中间放置一个 `\\`。这个连接后的值填充了 `$ConnectionString` 变量，然后可以传递给 `-Serverinstance`\
  \ 开关。\n\n\n### 生产环境就绪\n\n最后，您可能希望为脚本添加一些防御性编程，使其达到生产环境就绪的状态。尽管 PowerShell 具有 `try`/`catch`\
  \ 功能，但由于 `setup.exe` 是一个外部应用程序，其返回退出代码的方式不被 PowerShell 识别，因此在此处无法使用。因此，确保此脚本平稳运行的最有效技术是强制要求使用参数。\n\
  \n清单 6-13 中的代码是该脚本的一个修改版本，我们将其称为 `SQLAutoInstall3.ps1`。此版本的脚本使用 `Parameter` 关键字为每个参数将\
  \ `Mandatory` 属性设置为 `$true`。这一点很重要，因为如果运行此脚本的人遗漏了任何参数，或者参数名称有误，安装就会失败。这通过确保在允许脚本运行前所有参数都已输入，提供了一种故障保险机制。我们在此脚本中所做的另一项更改是在每个步骤前后添加了注释，这样如果脚本运行失败，我们可以轻松地看到错误发生在哪里。\n\
  \n```powershell\nparam(\n    [Parameter(Mandatory=$true)]\n    [string]       $InstanceName,\n\
  \    [PSCredential] $SQLServiceAccountCredential = (Get-Credential -Message 'Enter\
  \ the SQL service account credential'),\n    [PSCredential] $AgentServiceAccountCredential\
  \ = (Get-Credential -Message 'Enter the SQL Server Agent service account credential')\n\
  )\n"
- "# Initialize ConnectionString variable\nWrite-Host 'Initialise variables...'\n\
  $serverName = $env:computername\n$connectionString = '{0}\\{1}' -f $serverName,\
  \ $InstanceName\nWrite-Host 'Initialise variables complete'\n#Install the instance\n\
  Write-Host 'Install the instance...'\n$params = @(\n    '/INSTANCENAME=\"{0}\"'\
  \ -f $InstanceName\n    '/SQLSVCACCOUNT=\"{0}\"' -f $SQLServiceAccountCredential.Username\n\
  \    '/SQLSVCPASSWORD=\"{0}\"' -f $SQLServiceAccountCredential.GetNetworkCredential().Password\n\
  \    '/AGTSVCACCOUNT=\"{0}\"' -f $AgentServiceAccountCredential.Username\n    '/AGTSVCPASSWORD=\"\
  {0}\"' -f$AgentServiceAccountCredential.GetNetworkCredential().Password\n    '/CONFIGURATIONFILE=\"\
  C:\\SQL2022\\Configuration2.ini\"'\n)\nStart-Process -FilePath 'C:\\SQLServerSetup\\\
  SETUP.EXE' -ArgumentList $params -Wait -NoNewWindow\nWrite-Host 'Instance installation\
  \ complete'\n"
- '# Configure OS settings

  Write-Host ''Configure OS settings...''

  Start-Process -FilePath ''C:\Windows\System32\powercfg.exe'' -ArgumentList ''-setactive
  8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c'' -Wait -NoNewWindow

  Write-Host ''High Performance power plan configured''

  Set-ItemProperty -Path HKLM:\SYSTEM\CurrentControlSet\Control\PriorityControl\ -Name
  Win32PrioritySeparation -Value 24

  Write-Host ''Optimise for background services configured''

  '
- "# Run smoke tests\nWrite-Host 'Run smoke tests...'\nGet-Service -DisplayName ('*{0}*'\
  \ -f $InstanceName)\nWrite-Host 'Service running check complete'\nInvoke-SqlCmd\
  \ -Serverinstance $connectionString -Query \"SELECT @@SERVERNAME\" -TrustServerCertificate\n\
  Write-Host 'Instance accessibility check complete'\n```\n\n`SQLAutoInstall3.ps1`\
  \ 脚本在运行时没有指定任何参数。在以前版本的脚本中，PowerShell 会继续执行代码，然后 `setup.exe` 会因为没有为所需参数指定值而失败。然而，在这个版本中，您可以看到系统会依次提示您为每个参数输入值。这是通过两种不同的方式实现的——要么通过\
  \ `Mandatory` 属性，要么通过提供一个默认值（在本例中，这个默认值恰好是一个会提示用户输入缺失凭据的命令）。\n\n运行脚本时，您会注意到在脚本执行的每个阶段前后，我们的注释都会显示出来。这可以帮助您应对错误，因为您甚至可以在开始解读可能显示的任何错误消息之前，就能轻松地看到是哪个命令导致了问题。\n\
  \n## 使用 DSC 实现自动化安装\n\n在第 3 章中，我们讨论了如何使用 DSC 配置 Windows 操作系统。在本章中，我们将扩展该配置，使其也能安装我们的\
  \ SQL Server 实例。为此，我们需要安装 `SqlServerDSC` 模块，此操作可以使用清单 6-14 中的命令完成。这必须在 PowerShell\
  \ 5 中进行。\n\n```powershell\nInstall-Module SqlServerDsc\n```\n\n现在，我们可以扩展在第 3 章中创建的配置，添加一个资源，该资源将确保创建一个名为\
  \ `DSCInstance` 的 SQL Server 实例（使用 Developer 版本）。此资源如清单 6-15 所示。您会注意到我们传递了实例的期望名称、SQL\
  \ Server 安装介质的源路径以及产品密钥（均为字符串）。我们将 `SQLENGINE` 传递给 `Features` 参数，但如果我们要安装多个组件，这个字符串将由逗号分隔的列表组成。我们还传递了一个\
  \ Windows 登录名数组，我们希望将这些登录名添加到 `sysadmins` 固定服务器角色中。在我们的例子中，我们只传递了一个登录名——`Administrator`。\n\
  \n注意：您应更改源路径以反映您的 SQL Server 安装介质的位置。\n\n```powershell\nSqlSetup 'InstallInstance'\
  \ {\n    InstanceName = 'DSCInstance'\n    Features = 'SQLENGINE'\n    SourcePath\
  \ = 'C:\\SQL Media'\n    SQLSysAdminAccounts = @('Administrator')\n    ProductKey\
  \ = '22222-00000-00000-00000-00000'\n}\n```\n\n提示：我们传递的产品密钥是 Developer 版本的产品密钥，这意味着将安装此版本。如果我们传递\
  \ Enterprise 或 Standard 版本的产品密钥，这将改变安装的版本。\n\n那么，让我们来检查清单 6-16，它展示了我们更新后的配置（添加了新资源）将是什么样子。关于此配置有两点需要注意。第一点是，我们将\
  \ `SQLServerService` 资源管理的服务从默认实例更改为 `DSCInstance` 实例，因为这是我们将要使用的实例。第二点需要注意的重要方面是，在\
  \ `SQLServerService` 资源的末尾添加了语法 `DependsOn = '[SqlSetup]InstallInstance'`。这是因为我们不希望配置尝试确保\
  \ SQL Server Database Engine 服务在实例安装之前启动。当配置被编译时，无法保证资源的配置顺序。因此，如果资源之间存在依赖关系，我们应始终使用\
  \ `DependsOn` 来确保正确的顺序。\n\n```powershell\nConfiguration WindowsConfig {\n    Import-DscResource\
  \ -ModuleName 'PSDesiredStateConfiguration'\n    Import-DscResource -ModuleName\
  \ 'SqlServerDsc'\n    Node 'localhost' {\n        File CreateCertificateBackupsFolder\
  \ {\n            Ensure = \"Present\"\n            Type = \"Directory\"\n      \
  \      DestinationPath = \"C:\\CertificateBackups\"\n        }\n        Registry\
  \ OptimizeForBackgroundServices {\n            Ensure      = \"Present\"\n     \
  \       Key         = \" HKEY_LOCAL_MACHINE:\\SYSTEM\\CurrentControlSet\\Control\\\
  PriorityControl\"\n            ValueName   = \"Win32PrioritySeparation\"\n     \
  \       ValueData   = 24\n            ValueType   = 'Dword'\n        }\n       \
  \ SqlSetup 'InstallInstance' {\n            InstanceName        = 'DSCInstance'\n\
  \            Features            = 'SQLENGINE'\n            SourcePath         \
  \ = 'C:\\SQL Media'\n            SQLSysAdminAccounts = @('Administrator')\n    \
  \        ProductKey          = '22222-00000-00000-00000-00000'\n        }\n    \
  \    Service SQLServerService\n        {\n            Name        = 'MSSQL$DSCInstance'\n\
  \            StartupType = 'Automatic'\n            State       = 'Running'\n  \
  \          DependsOn    = '[SqlSetup]InstallInstance'\n        }\n    }\n}\nWindowsConfig\n\
  ```\n\n\n# 目前，此配置有效，但相当不灵活。它总是安装相同名称的实例，并且总是安装开发者版。为了使其更灵活，我们可以将配置参数化，以便在应用配置时，可以传递与相关节点相关的实例名称和产品密钥。\n\
  \n此配置的参数化版本如列表 6-17 所示。您会注意到声明中添加了一个`param`块，它接受实例名称和版本的参数。`$SqlInstanceName`参数的值被设为`'MSSQLSERVER'`，这表示一个默认实例。还添加了一个`IF...ELSE\
  \ IF...`块，该块根据传递到配置的版本计算要使用的产品密钥。\n\n> **注意**\n>\n> 出于本示例的目的，评估版的产品密钥被用于企业和标准版。这些产品密钥应替换为您自己的企业和标准版产品密钥。\n\
  \n```powershell\nConfiguration WindowsConfig {\n    param (\n        [string] $SqlInstanceName\
  \ = 'MSSQLSERVER',\n        [Parameter(Mandatory)]\n        [ValidateSet('Developer',\
  \ 'Standard', 'Enterprise')]\n        [string] $Edition\n    )\n    Import-DscResource\
  \ -ModuleName 'PSDesiredStateConfiguration'\n    Import-DscResource -ModuleName\
  \ 'SqlServerDsc'\n    if ($Edition -eq 'Developer') {\n        $ProductKey = '22222-00000-00000-00000-00000'\n\
  \    } elseif ($edition -eq 'Standard') {\n        $ProductKey = '00000-00000-00000-00000-00000'\n\
  \    } elseif ($edition -eq 'Enterprise') {\n        $ProductKey = '00000-00000-00000-00000-00000'\n\
  \    }\n    Node 'localhost' {\n        File CreateCertificateBackupsFolder {\n\
  \            Ensure = \"Present\"\n            Type = \"Directory\"\n          \
  \  DestinationPath = \"C:\\CertificateBackups\"\n        }\n        Registry OptimizeForBackgroundServices\
  \ {\n            Ensure      = \"Present\"\n            Key         = \"HKLM:\\\
  SYSTEM\\CurrentControlSet\\Control\\PriorityControl\"\n            ValueName   =\
  \ \"Win32PrioritySeparation\"\n            ValueData   = 24\n            ValueType\
  \   = 'Dword'\n        }\n        SqlSetup 'InstallInstance' {\n            InstanceName\
  \        = $SqlInstanceName\n            Features            = 'SQLENGINE'\n   \
  \         SourcePath          = 'C:\\SQL Media'\n            SQLSysAdminAccounts\
  \ = @('Administrator')\n            ProductKey          = $ProductKey\n        }\n\
  \        Service SQLServerService {\n            Name        = 'MSSQL${0}' -f $SqlInstanceName\n\
  \            StartupType = 'Automatic'\n            State       = 'Running'\n  \
  \          DependsOn    = '[SqlSetup]InstallInstance'\n        }\n    }\n}\n```\n\
  列表 6-17\n参数化配置\n\n我们现在可以将参数传递给`Start-DscConfiguration`来应用配置。列表 6-18 中的命令将应用配置，确保`DSCInstance`存在并使用开发者版。这里的一个细微之处是，因为我们传递了参数，所以我们必须先点源化脚本，将其带入与调用上下文相同的会话中。\n\
  \n```powershell\n"
- '# 点源化配置文件

  . C:\Scripts\WindowsConfig.ps1

  '
- '# 编译配置

  WindowsConfig -Edition Developer -SqlInstanceName ''DSCInstance2''

  '
- "# 应用配置\nStart-DscConfiguration -Path \"C:\\Scripts\\WindowsConfig\" -Verbose -Wait\n\
  ```\n列表 6-18\n应用参数化配置\n\n在第 9 章中，我们将探讨如何使用 DSC 根据我们组织的最佳实践来配置我们的 SQL Server 实例。\n\
  \n## 总结\n\n安装 SQL Server 是一项单调的任务，并且容易出错，这可能导致环境不一致。解决这个问题的关键是自动化。SQL Server 的安装可以通过多种方式自动化，但在现代工作场所，我们通常会选择脚本化方法或配置管理方法。\n\
  \n脚本化方法涉及使用 PowerShell 脚本来运行`setup.exe`，然后根据我们的要求配置实例。我们还应该在脚本中包含冒烟测试，以确保实例已正确安装。\n\
  \n或者，我们可以使用配置管理方法，该方法使用工具（如 PowerShell DSC）来管理实例安装。这种方法可以像脚本化方法一样进行参数化，并确保实例始终存在。在第\
  \ 9 章中，我们将探讨如何使用配置管理方法来配置 SQL Server 实例。\n\n# 7. 元数据驱动自动化\n\n元数据是描述其他数据的数据。SQL Server\
  \ 公开了大量元数据。这包括描述每个对象的结构性元数据，以及描述数据本身的描述性元数据。元数据通过目录视图、信息架构视图、动态管理视图、动态管理函数、系统函数和存储过程公开。元数据是自动化的关键，因为它允许您创建动态的、智能的脚本。\n\
  \n本章假设您熟悉基本的元数据对象，例如`sys.tables`和`sys.databases`。相反，本章将重点探讨一些不太常见但被证明对 DBA 非常有用的元数据对象。它将演示这些元数据对象如何在自动化维护例程中发挥关键作用。然而，重要的是要记住，对\
  \ SQL Server 中所有可用元数据对象的讨论本身就需要几卷书的篇幅。因此，我建议您自己研究 SQL Server 元数据，并找出对您的个体环境有用的对象。一个很好的起点是\
  \ MSDN 上的动态管理视图和函数页面，可以在[`https://msdn.microsoft.com/en-us/library/ms188754.aspx`](https://msdn.microsoft.com/en-us/library/ms188754.aspx)找到。\n\
  \n> **提示**\n>\n> 本章将重点介绍编写维护例程本身。在第 10 章中，我们将重点介绍如何在 SQL Server 环境中集中化维护，以便我们有一个单一的代码库需要维护。\n\
  \n## 创建智能例程\n\n以下部分将演示如何将 SQL Server 元数据与 PowerShell 结合使用，以编写智能例程，这些例程可用于使您的企业更一致、性能更好，同时减少\
  \ DBA 的工作量。我们将讨论使用查询存储元数据、动态索引重建，以及强制执行无法通过基于策略的管理来强制执行的策略。\n\n\n\n\n### 移除即席查询计划\n\
  \n即席查询计划会消耗内存且可能用处有限。如果它们没有被重用，移除这些即席查询计划是个好主意。清单 7-1 中的查询演示了如何使用查询存储元数据从缓存中清除不需要的即席查询计划。\n\
  \n脚本的第一部分针对 `sys.databases` 目录视图运行一个查询，以返回实例上的数据库列表。查询存储可以在数据库级别启用或禁用，并且不能在 `master`\
  \ 或 `TempDB` 系统数据库上启用。在 SQL Server 2022 中，查询存储默认启用，但之前版本是默认禁用的。因此，该查询会筛选掉 `database_id`\
  \ 小于 3 的数据库以及任何已禁用查询存储的数据库。\n\n#### 处理查询结果的两种方式\n\n`Invoke-DbaQuery` 命令的输出是一个对象（或对象数组），该对象具有多个属性。查询结果中的每个列都对应一个属性，此外还有一些额外属性。\n\
  \n因此，要在进一步处理中使用此结果，需要提取所需的属性。这可以通过两种不同的方式完成，各有优缺点：\n\n1.  **立即方式** – 通过将结果通过管道传递给\
  \ `Select-Object` cmdlet，例如：\n\n    ```\n    $databases = Invoke-DbaQuery @GetDatabaseParams\
  \ | Select-Object -ExpandProperty Name\n    ```\n\n    这种方式使得 `$database` 保持简单；它最终只是一个数据库名称的数组。\n\
  \n2.  **在使用时方式** – 通过使用 `foreach` 循环遍历每个对象，例如：\n\n    ```\n    foreach ($database\
  \ in $databases.Name) { ... }\n    ```\n\n    这种方法意味着在后续任何时候，你都可以利用查询返回的所有数据，包括元数据。\n\
  \n当 PowerShell 显示对象时，默认情况下并不总是显示其所有属性。要查看对象的所有属性，可以将其通过管道传递给 `Select-Object *`，例如：\n\
  \n```\nInvoke-DbaQuery @GetDatabaseParams | Select-Object *\n```\n\n脚本的第二部分将数据库名称传递到一个\
  \ `foreach` 循环中，并针对每个数据库执行一个 SQL 脚本。这种技术为在实例中的每个数据库上运行相同命令提供了一种有用的机制，我强烈推荐使用这种使用\
  \ `FOR XML PATH('')` 技术（在第 1 章中描述）的方法，而不是未公开的系统存储过程 `sp_MSForeachdb`，后者可能不可靠。我们还可以通过使用第\
  \ 10 章中讨论的技术来扩展此脚本，使其在企业中的所有实例上运行。\n\n```\n$GetDatabaseParams = @{\n    SqlInstance\
  \ = \"localhost\"\n    Query       = \"\n    SELECT name\n    FROM sys.databases\n\
  \    WHERE database_id > 2\n      AND is_query_store_on = 1\n    \"\n}\n$databases\
  \ = Invoke-DbaQuery @GetDatabaseParams | Select-Object -ExpandProperty Name\n$params\
  \ = @{\n    SqlInstance = \"localhost\"\n    Query       = \"\n    DECLARE @SQL\
  \ NVARCHAR(MAX)\n    SELECT @SQL = (\n        SELECT 'EXEC sp_query_store_remove_query\
  \ '\n               + CAST(qsq.query_id AS NVARCHAR(6)) + ';' AS [data()]\n    \
  \    FROM sys.query_store_query_text AS qsqt\n        JOIN sys.query_store_query\
  \ AS qsq\n          ON qsq.query_text_id = qsqt.query_text_id\n        JOIN sys.query_store_plan\
  \ AS qsp\n          ON qsp.query_id = qsq.query_id\n        JOIN sys.query_store_runtime_stats\
  \ AS qsrs\n          ON qsrs.plan_id = qsp.plan_id\n        GROUP BY qsq.query_id\n\
  \        HAVING SUM(qsrs.count_executions) = 1\n           AND MAX(qsrs.last_execution_time)\
  \ < DATEADD (HH, -24, GETUTCDATE())\n        ORDER BY qsq.query_id\n        FOR\
  \ XML PATH('')\n    ) ;\n    EXEC(@SQL) ;\n    \"\n}\nforeach ($database in $databases)\
  \ {\n    Invoke-DbaQuery @params -Database $database\n}\n```\n*清单 7-1 移除即席查询计划*\n\
  \n针对每个数据库运行的查询使用了 `data()` 方法进行迭代，以构建一个可以使用动态 SQL 执行的字符串，最后使用 `EXEC` 语句执行该脚本。查询使用的元数据对象描述如下。\n\
  \n`sys.query_store_query_text` 目录视图公开了存储中每个 T-SQL 语句的文本和句柄。它返回表 7-1 中详述的列。\n\n**表\
  \ 7-1 `sys.query_store_query_text` 返回的列**\n\n| 列名 | 描述 |\n| --- | --- |\n| `query_text_id`\
  \ | 主键 |\n| `query_sql_text` | 查询的 T-SQL 文本 |\n| `statement_sql_handle` | 查询的 SQL\
