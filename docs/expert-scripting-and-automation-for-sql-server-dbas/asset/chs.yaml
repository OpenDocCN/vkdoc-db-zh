  \ 找到。\n\n如图 11-13 所示。\n\n![](img/395785_2_En_11_Fig13_HTML.jpg)\n\n\n\nSQL Server\
  \ Management Studio 中 “新建作业步骤” 窗口的截图。该窗口包含 “步骤名称”、“类型” 和 “以身份运行” 字段，其中已填入 “RespondTo9002”\
