  ## 模块


  为了使 PowerShell 具有完全的可扩展性并能够管理几乎任何应用程序，它采用模块化方法编写，必须导入模块才能让用户访问它们包含的 cmdlet。执行某些命令时会自动导入一些核心模块。例如，使用
  `Get-ExecutionPolicy` 命令会导致 `Microsoft.PowerShell.Security` 模块被导入。


  有大量可用的模块，提供了使用 PowerShell 管理几乎任何平台或应用程序的能力。其中一些模块由组织提供。例如，AWS 提供 `AWSPowerShell`
  模块来管理其公有云平台，而 Microsoft 提供 `Az` 模块来管理 Azure。


  此外，还有大量的社区模块可用，例如 `posh-git` 模块（它提供了 Git 状态摘要以及 Git 命令的 Tab 键补全功能）和 `powershell-yaml`
  模块（它在 PowerShell 中提供了 YAML 序列化和反序列化功能）。


  当模块发布在 PowerShell Gallery 上时，可以使用 `Install-Module` 命令下载并安装它们，如代码清单 2-12 所示，该命令安装了
  `Indented.IniFile` 模块。该模块由出色的 Indented Automation 编写（我强烈建议你去了解他们所有关于 PowerShell
  的内容），并提供了在 PowerShell 中管理 INI 文件内容的功能。


  ```

  Install-Module Indented.IniFile

  代码清单 2-12

  安装 PowerShell 模块

  ```



  ### SqlServer 模块


  SqlServer 模块作为 SQL Server 管理工具下载的一部分提供，但也可以使用 `Install-Module` 命令进行安装。该模块提供了超过 100
  个命令，用于通过 PowerShell 会话与 SQL Server 交互。该模块将在第 4 章深入讨论，但在本节中，我们将简要讨论如何使用该模块来导航 SQL
  Server 实例。对于以前未使用过 PowerShell 的数据库管理员（DBA）来说，能够导航 SQL Server 实例甚至从 SQL Server Management
  Studio 内部调用 PowerShell，可能是一个很好的突破性入门方式。


  除了使用诸如 `Get-ChildItem` 和 `Set-Location` 等命令导航文件夹结构外，PowerShell 还可用于导航实例的 SQL Server
  对象层次结构。你可以通过使用 `Set-Location` 导航到 `SQLSERVER:\SQL`，将 PowerShell 连接到 SQL Server 数据库引擎提供程序。`Get-ChildItem`
  返回的信息取决于对象层次结构中的当前位置。表 2-4 详细说明了从层次结构的每一级返回的信息。


  #### 表 2-4

  每个层次结构级别返回的详细信息


  | 位置 | 返回的信息 |

  | --- | --- |

  | `SQLSERVER:\SQL` | 本地计算机的名称 |

  | `SQLSERVER:\SQL\ComputerName` | 本地计算机上安装的数据库引擎实例的名称 |

  | `SQLSERVER:\SQL\ComputerName\InstanceName` | 实例级别的对象类型 |

  | `更低级别` | 包含在当前位置内的对象类型或对象 |


  一旦导航到层次结构的适当级别，你就可以使用 PowerShell 对该级别的对象执行基本操作。例如，清单 2-13 中的脚本将导航到 `AdventureWorks2022`
  数据库中的 `tables` 命名空间，并将 `dbo.DatabaseLog` 表重命名为 `dbo.DatabaseLogPS`。`dir` 命令将显示表的原始名称和新名称。


  提示：此脚本假设你安装了默认实例的 SQL Server（而非命名实例），并且拥有 `AdventureWorks2022` 数据库，该数据库可从 `learn.microsoft.com/en-us/sql/samples/adventureworks-install-configure`
  下载。


  ```powershell

  Set-Location SQLSERVER:\SQL\localhost\Default\Databases\AdventureWorks2022\Tables

  dir | where { $_.name -like "*DatabaseLog*" }

  Rename-Item -LiteralPath dbo.DatabaseLog -NewName DatabaseLogPS

  dir | Where-Object { $_.name -like "*DatabaseLog*" }

  ```


