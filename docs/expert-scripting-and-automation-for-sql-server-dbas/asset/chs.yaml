  \n### 运行配置\n\n现在我们已经保存了配置，我们将运行该配置以生成 `.mof` 文件，如清单 3-5 所示。\n\n> **提示**\n> 如果您为配置文件使用了不同的路径或文件名，请确保更改以下脚本中的路径。\n\
  \n```powershell\n.\\C:\\Scripts\\WindowsConfig.ps1\n```\n**清单 3-5** 运行配置\n\n此命令的输出如下所示：\n\
