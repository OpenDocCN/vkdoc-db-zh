- "# 1. 面向 DBA 的 T-SQL 技巧\n\n在本章中，我们将讨论 T-SQL 中的一些基础技巧，这些技巧在后续章节中当我们探讨如何使用 PowerShell\
  \ 自动化您的 SQL Server 企业环境时将变得非常有用。具体而言，我们将讨论如何使用 `APPLY` 运算符对结果集中的每一行调用函数。理解这项技术对于第\
  \ 8 章至关重要，那时我们将开始研究元数据驱动的自动化。然后，我们将探讨 XML（可扩展标记语言），以及 SQL Server DBA 如何利用其原生 XML\
  \ 数据类型。由于大量信息（如查询计划）以 XML 格式存储，DBA 掌握 XML 的使用至关重要。理解 SQL Server 中的基础 XML 也是理解如何高效循环的关键。为此，我们将探索如何使用\
  \ XML 技术高效地遍历多个对象。我们会将其效率与传统的游标进行比较。这一点很重要，因为尽管在 PowerShell 中循环总是更高效，但有时自动化的最优方法会涉及通过\
  \ PowerShell 和 T-SQL 层进行多层循环。这将在第 8 章中变得显而易见，但这项技术贯穿于本书的多个章节。\n\n## 使用 APPLY 运算符\n\
  \nT-SQL `APPLY` 运算符将在第 8 章探讨元数据驱动的自动化时使用。它允许您针对查询返回的结果集中的每一行调用一个表值函数。`APPLY` 运算符有两种变体：`CROSS\
  \ APPLY` 和 `OUTER APPLY`。使用 `CROSS APPLY` 时，查询将仅返回表值函数产生了结果集的行。使用 `OUTER APPLY`\
  \ 时，不会对结果集应用筛选器，如果表值函数未返回任何结果，则在该函数的每一列中将返回 `NULL`。\n\n当 DBA 从动态管理视图（`DMV`）和函数（`DMF`）中检索元数据时，`APPLY`\
  \ 运算符非常有用。例如，代码清单 1-1 中的查询将返回所有会话的列表，详细列出会话 ID、登录时间、登录名以及进程是用户进程还是系统进程。然后，它将使用 `OUTER\
  \ APPLY` 针对每一行运行 `sys.dm_exec_sql_text` 动态管理函数。该函数返回一个名为 `text` 的列，其中包含与 `sys.dm_exec_requests`\
  \ 动态管理视图中 `sql_handle` 列关联的 SQL 语句。\n\n> 注意\n>\n> 在 `SELECT` 列表中引用的 `text` 列是由 `sys.dm_exec_sql_text`\
  \ `DMF` 返回的列。\n\n```sql\nSELECT\ns.session_id\n, s.login_time\n, s.login_name\n\
  , s.is_user_process\n, dest.[text]\nFROM sys.dm_exec_sessions s\nINNER JOIN sys.dm_exec_requests\
  \ r\nON r.session_id = s.session_id\nOUTER APPLY sys.dm_exec_sql_text(sql_handle)\
  \ dest;\n```\n\n代码清单 1-1 使用 `OUTER APPLY`\n\n您会注意到此查询返回的结果集中有许多行的 `text` 列为 `NULL`\
  \ 值。这是因为它们是系统进程，为 SQL Server 运行后台任务，例如 Lazy Writer（懒惰写入器）和 Ghost Cleanup Task（幽灵清理任务）。\n\
  \n> 提示\n>\n> 我们可以确定它们是系统进程是因为 `is_user_process` 标志。我们不会依赖会话 ID 小于 50 这一假设。所有系统进程的会话\
  \ ID 都小于 50 这一断言被广泛相信，但也是一个谬误，因为有可能存在超过 50 个并行运行的系统会话。\n\n如果我们对同一个查询使用 `CROSS APPLY`\
  \ 运算符，如代码清单 1-2 所示，则返回的唯一行将是应用表值函数后结果不为 `NULL` 的行。\n\n```sql\nSELECT\ns.session_id\n\
  , s.login_time\n, s.login_name\n, [text]\n, s.is_user_process\nFROM sys.dm_exec_sessions\
  \ s\nINNER JOIN sys.dm_exec_requests r\nON r.session_id = s.session_id\nCROSS APPLY\
  \ sys.dm_exec_sql_text(sql_handle) ;\n```\n\n代码清单 1-2 使用 `CROSS APPLY`\n\n## 面向\
  \ DBA 的 XML\n\nXML（可扩展标记语言）在 SQL Server 中被广泛用作数据格式，用于存储对成功 DBA 至关重要的数据，例如扩展事件数据、查询计划数据以及\
  \ `MDW`（管理数据仓库）使用的收集器项目。因此，DBA 掌握 XML 格式及其在 SQL Server 中的使用方法非常重要。理解如何在 SQL Server\
  \ 中使用 XML 对于理解如何高效循环也很重要。这将在本章的“高效循环”一节中讨论。以下各节将概述 XML 数据类型、如何生成 XML 文档以及如何查询 XML\
  \ 数据。\n\n\n\n\n### 理解 XML\n\nXML 是一种标记语言，与 HTML 类似，其设计目的是存储和传输数据。和 HTML 一样，XML 使用标签。但与\
  \ HTML 不同的是，这些标签不是预定义的，而是由文档作者定义的。XML 文档具有树状结构，以一个根节点开始，并包含子节点（也称为子元素）。每个元素不仅可以包含数据，还可以包含属性。每个属性可以包含描述该元素的信息。\n\
  \n例如，假设你需要将销售订单的详细信息以 XML 格式存储。一个合理的设想是，每个销售订单都存储在文档中一个独立的元素里。但是，像订单日期、客户 ID、产品\
  \ ID、数量和价格这样的销售订单属性该怎么处理呢？这些信息既可以作为销售订单元素的子元素来存储，也可以作为销售订单元素的属性来存储。对于何时应该使用子元素还是属性来描述元素的属性，没有固定的规则。这个选择取决于文档作者的判断。\n\
  \n代码清单 1-3 提供了一个示例 XML 文档，其中保存了一个虚构组织的销售订单详细信息。\n\n```\n代码清单 1-3\n存储在 XML 文档中的销售订单\n\
  ```\n\n在查看此 XML 文档时，有几点需要注意。首先，元素（或节点）以开始标签开头，即元素名被包裹在尖括号内。它们以结束标签结尾，即元素名前加一个反斜杠并被尖括号包裹。任何位于另一个节点开始和结束标签之间的元素都是该节点的子元素。\n\
  \n属性值用双引号括起来，并位于元素的开始标签内。例如，`SalesOrderID` 是 `<SalesOrder>` 元素的一个属性。\n\n可以存在重复元素。可以看到\
  \ `<SalesOrder>` 是一个重复元素，因为两个独立的销售订单都存储在此 XML 文档中。`<SalesOrders>` 元素是文档的根元素，并且是唯一一个不允许是复杂的元素。这意味着它不能拥有属性，也不能是重复的。属性永远不能在元素内重复。因此，如果你需要一个属性重复，你应该使用一个嵌套元素，而不是一个属性。\n\
  \nXML 文档的格式可以通过 `XSD` （XML 模式定义）模式来定义。一个 `XSD` 模式将定义文档的结构，包括数据类型、是否允许复杂类型（复杂元素），以及元素在文档中必须出现（或限制出现）的次数。它还定义了元素的顺序。关于\
  \ `XSD` 模式的完整描述可以在 `en.wikipedia.org/wiki/XML_Schema_(W3C)` 找到。\n\n> 提示\n>\n> 一个\
  \ XML 文档需要一个根元素才能是“格式良好的”。没有根元素的 XML 文档被称为 XML 片段。这很重要，因为无法将 XML 片段绑定到 `XSD` 模式。这意味着无法强制执行文档的结构，包括数据类型。\n\
  \n那么，这如何映射到 DBA 的数据呢？好吧，以代码清单 1-4 为例。它展示了从 `msdb.dbo.suspect_pages` 选择 `database_id`\
  \ 列所产生的部分 XML 执行计划。\n\n```\n代码清单 1-4\n部分 XML 执行计划\n```\n\n虽然这个执行计划非常简单，但你可以看到作者使用了嵌套元素，所有这些元素都有许多与之关联的属性。因为文档符合一个模式（类型化的），所以在此例中，根元素\
  \ `<ShowPlanXML>` 定义了它的模式关联。\n\n### 将结果集转换为 XML\n\n`T-SQL` 允许你通过在 `SELECT` 语句中使用\
  \ `FOR XML` 子句，将关系型结果集转换为 XML。`FOR XML` 子句可以使用四种模式：`FOR XML RAW`、`FOR XML AUTO`、`FOR\
  \ XML PATH` 和 `FOR XML EXPLICIT`。\n\n以下部分将简要讨论 `FOR XML` 子句在 `RAW` 模式和 `AUTO` 模式下的工作方式，但我们将主要关注\
  \ `PATH` 模式。`EXPLICIT` 模式超出了本书的范围，因为它的功能与 `PATH` 模式非常相似，但复杂得多，尽管在某些开发场景中有帮助，但对 DBA\
  \ 来说通常用处不大。\n\n\n\n\n#### 使用 FOR XML RAW\n\n在 `FOR XML` 的各种模式中，`FOR XML RAW` 是最简单且最易于理解的。此模式会将关系结果集中的每一行转换为扁平\
  \ XML 文档中的一个元素。请考虑清单 1-5 中的查询，该查询从 `sys.dm_exec_sessions` 和 `sys.dm_exec_requests`\
  \ 中提取数据。\n\n```sql\nSELECT\nExecSessions.session_id\n, ExecSessions.login_name\n\
  , ExecSessions.host_name\n, ExecSessions.status\n, ExecRequests.command\n, DB_NAME(ExecRequests.database_id)\
  \ AS DatabaseName\n, ExecRequests.last_wait_type\nFROM sys.dm_exec_sessions ExecSessions\n\
  INNER JOIN sys.dm_exec_requests ExecRequests\nON ExecSessions.session_id = ExecRequests.session_id\n\
  WHERE ExecSessions.is_user_process = 1\nListing 1-5\n提取会话信息\n```\n\n运行此查询时，您的结果将根据您的环境以及实例上当前的活动情况而有所不同。当我运行它时，它返回了如图\
  \ 1-1 所示的结果。\n\n![](img/395785_2_En_1_Fig1_HTML.jpg)\n\n显示数据库会话信息的表格。列包括 `session_id`、`login_name`、`host_name`、`status`、`command`、`DatabaseName`\
  \ 和 `task_wait_type`。显示了两行：\n\n1.  `session_id` 52, `login_name` WIN-3B0U1U05D7\\\
  Administrator, `host_name` WIN-3B0U1U05D7, `status` running, `command` SELECT, `DatabaseName`\
  \ master, `task_wait_type` SOS_WORK_DISPATCHER.\n2.  `session_id` 55, `login_name`\
  \ WIN-3B0U1U05D7\\Administrator, `host_name` WIN-3B0U1U05D7, `status` running, `command`\
  \ SELECT, `DatabaseName` master, `task_wait_type` ASYNC_NETWORK_IO.\n\n**图 1-1**\n\
  提取会话信息 – 结果\n\n如果我们使用 `RAW` 模式添加一个 `FOR XML` 子句，结果将以 XML 片段的形式返回。清单 1-6 中修改后的查询将返回\
  \ XML 文档而不是关系结果集。\n\n```sql\nSELECT\nExecSessions.session_id\n, ExecSessions.login_name\n\
  , ExecSessions.host_name\n, ExecSessions.status\n, ExecRequests.command\n, DB_NAME(ExecRequests.database_id)\
  \ AS DatabaseName\n, ExecRequests.last_wait_type\nFROM sys.dm_exec_sessions ExecSessions\n\
  INNER JOIN sys.dm_exec_requests ExecRequests\nON ExecSessions.session_id = ExecRequests.session_id\n\
  WHERE ExecSessions.is_user_process = 1\nFOR XML RAW\nListing 1-6\n使用 FOR XML RAW\
  \ 提取会话信息\n```\n\n清单 1-7 展示了返回的 XML 文档。\n\n```xml\n清单 1-7\n提取会话信息 FOR XML RAW 结果\n\
  ```\n\n关于这个文档，我们首先需要注意它是一个 XML 片段，而不是一个格式良好的 XML 文档，因为它没有根节点。`<row>` 元素不能作为根节点，因为它会重复。这意味着我们无法根据架构验证\
  \ XML。因此，在使用 `FOR XML` 子句时，应考虑使用 `ROOT` 关键字。这将强制在文档中创建一个根元素，名称由您选择。清单 1-8 展示了这一点。\n\
  \n```sql\nSELECT\nExecSessions.session_id\n, ExecSessions.login_name\n, ExecSessions.host_name\n\
  , ExecSessions.status\n, ExecRequests.command\n, DB_NAME(ExecRequests.database_id)\
  \ AS DatabaseName\n, ExecRequests.last_wait_type\nFROM sys.dm_exec_sessions ExecSessions\n\
  INNER JOIN sys.dm_exec_requests ExecRequests\nON ExecSessions.session_id = ExecRequests.session_id\n\
  WHERE ExecSessions.is_user_process = 1\nFOR XML RAW, ROOT('Sessions')\nListing 1-8\n\
  添加根节点\n```\n\n结果 XML 文档可以在清单 1-9 中看到。\n\n```xml\n清单 1-9\n带根节点的提取会话信息结果\n```\n\n\
  关于文档的另一个重要注意事项是它是完全扁平的。没有嵌套。这意味着文档的粒度在会话级别，如果一个会话有多个请求，这就不那么合理了。\n\n还值得注意的是，所有数据都包含在属性中，而不是元素中。我们可以通过在\
  \ `FOR XML` 子句中使用 `ELEMENTS` 关键字来改变这种行为。`ELEMENTS` 关键字将使所有数据都包含在子元素中，而不是属性中。清单 1-10\
  \ 中修改后的查询展示了这一点。\n\n```sql\nSELECT\nExecSessions.session_id\n, ExecSessions.login_name\n\
  , ExecSessions.host_name\n, ExecSessions.status\n, ExecRequests.command\n, DB_NAME(ExecRequests.database_id)\
  \ AS DatabaseName\n, ExecRequests.last_wait_type\nFROM sys.dm_exec_sessions ExecSessions\n\
  INNER JOIN sys.dm_exec_requests ExecRequests\nON ExecSessions.session_id = ExecRequests.session_id\n\
  WHERE ExecSessions.is_user_process = 1\nFOR XML RAW, ELEMENTS, ROOT('Sessions')\n\
  Listing 1-10\n提取会话信息为元素\n```\n\n返回的格式良好的 XML 文档可以在清单 1-11 中看到。\n\n```xml\n<Sessions>\n\
  \  <row>\n    <session_id>52</session_id>\n    <login_name>WIN-J38I01U06D7\\Administrator</login_name>\n\
  \    <host_name>WIN-J38I01U06D7</host_name>\n    <status>running</status>\n    <command>SELECT</command>\n\
  \    <DatabaseName>master</DatabaseName>\n    <last_wait_type>MEMORY_ALLOCATION_EXT</last_wait_type>\n\
  \  </row>\n  <row>\n    <session_id>55</session_id>\n    <login_name>WIN-J38I01U06D7\\\
  Administrator</login_name>\n    <host_name>WIN-J38I01U06D7</host_name>\n    <status>running</status>\n\
  \    <command>SELECT</command>\n    <DatabaseName>master</DatabaseName>\n    <last_wait_type>ASYNC_NETWORK_IO</last_wait_type>\n\
  \  </row>\n</Sessions>\n清单 1-11\n提取会话信息为元素结果\n```\n\n您可以看到，以元素为中心的文档仍然为关系结果集中的每一行返回一个名为\
  \ `<row>` 的元素。但是，数据不是包含在属性中，而是以子元素的形式存储。每个子元素都被赋予了从中返回数据的列的名称。然而，数据仍然是扁平的。没有基于逻辑或物理表结构的层次结构。\n\
  \n可以为 `<row>` 元素赋予一个更有意义的名称。在我们的例子中，最有意义的名称是 `<Session>`。清单 1-12 展示了如何在 `FOR XML`\
  \ 子句中使用可选参数来为元素生成此名称。\n\n```sql\nSELECT\nExecSessions.session_id\n, ExecSessions.login_name\n\
  , ExecSessions.host_name\n, ExecSessions.status\n, ExecRequests.command\n, DB_NAME(ExecRequests.database_id)\
  \ AS DatabaseName\n, ExecRequests.last_wait_type\nFROM sys.dm_exec_sessions ExecSessions\n\
  INNER JOIN sys.dm_exec_requests ExecRequests\nON ExecSessions.session_id = ExecRequests.session_id\n\
  WHERE ExecSessions.is_user_process = 1\nFOR XML RAW('Session'), ELEMENTS, ROOT('Sessions')\n\
  Listing 1-12\n为 <row> 元素生成名称\n```\n\n部分结果 XML 文档可以在清单 1-13 中找到。\n\n```xml\n<Sessions>\n\
  \  <Session>\n    <session_id>52</session_id>\n    <login_name>WIN-J38I01U06D7\\\
  Administrator</login_name>\n    <host_name>WIN-J38I01U06D7</host_name>\n    <status>running</status>\n\
  \    <command>SELECT</command>\n    <DatabaseName>master</DatabaseName>\n    <last_wait_type>MEMORY_ALLOCATION_EXT</last_wait_type>\n\
  \  </Session>\n  <Session>\n    <session_id>55</session_id>\n    <login_name>WIN-J38I01U06D7\\\
  Administrator</login_name>\n    <host_name>WIN-J38I01U06D7</host_name>\n    <status>running</status>\n\
  \    <command>SELECT</command>\n    <DatabaseName>master</DatabaseName>\n    <last_wait_type>ASYNC_NETWORK_IO</last_wait_type>\n\
  \  </Session>\n</Sessions>\n清单 1-13\n为 <row> 元素生成名称的结果\n```\n\n\n\n#### 使用 FOR XML\
  \ AUTO\n\n与 `FOR XML RAW` 不同，`FOR XML AUTO` 能够返回嵌套结果。它使用起来也异常简单，因为它会根据查询中的联接自动嵌套数据。代码清单\
  \ 1-14 中的修改后的查询使用 `AUTO` 模式来返回一个层次化的 XML 文档。\n\n```sql\nSELECT\nExecSessions.session_id\n\
  , ExecSessions.login_name\n, ExecSessions.host_name\n, ExecSessions.status\n, ExecRequests.command\n\
  , DB_NAME(ExecRequests.database_id) AS DatabaseName\n, ExecRequests.last_wait_type\n\
  FROM sys.dm_exec_sessions ExecSessions\nINNER JOIN sys.dm_exec_requests ExecRequests\n\
  ON ExecSessions.session_id = ExecRequests.session_id\nWHERE ExecSessions.is_user_process\
  \ = 1\nFOR XML AUTO\n代码清单 1-14\n使用 FOR XML AUTO\n```\n\n此查询返回的 XML 片段可以在代码清单 1-15\
  \ 中看到。\n\n```xml\n代码清单 1-15\n使用 FOR XML AUTO 结果提取会话信息\n```\n\n您可以看到，当使用 `AUTO` 模式时，`FOR\
  \ XML` 子句会根据查询中的 `JOIN` 子句自动嵌套数据。每个元素都根据其来源表的表别名被分配了一个名称。与 `RAW` 模式一样，我们可以使用 `ROOT`\
  \ 关键字来添加一个根节点，以使文档结构良好；或者使用 `ELEMENTS` 关键字使文档以元素为中心。\n\n#### 使用 FOR XML PATH\n\n\
  有时，您需要对结果 XML 文档的形状进行比 `RAW` 模式或 `AUTO` 模式所能提供的更多控制。当您有定义自定义启发式规则的需求时，可以使用 `PATH`\
  \ 模式。`PATH` 模式提供了极大的灵活性，因为它允许您定义结果 XML 中每个节点的位置。这是通过指定查询中的每一列如何映射到 XML 来实现的，使用的是列名或别名。\n\
  \n如果一个列别名以 `@` 符号开头，则将创建一个属性。如果不使用 `@` 符号，该列将映射到一个元素。将成为属性的列必须在定义为同级节点但作为元素的列之前指定。\n\
  \n如果您希望定义节点在层次结构中的位置，可以使用 `/` 符号。例如，如果您需要主机名显示在一个名为 `<Session>` 的元素之下，您可以将 `host_name`\
  \ 列的别名指定为 `'/Session/HostName'`。\n\n`PATH` 模式允许您创建高度定制和复杂的结构。例如，假设您有一个需求，需要创建一个格式如代码清单\
  \ 1-16 所示的 XML 文档。在这里，您会注意到有一个名为 `<Sessions>` 的根节点，层次结构中的下一个节点是 `<UserSession>`。这是一个可重复元素，对于实例上的每个活动会话都会出现一次。在此元素中，会话\
  \ ID 显示为属性，而登录名、主机名和状态都是子元素。\n\n还有一个名为 `<Request>` 的复杂子元素，它包含其他子元素，这些子元素包含命令类型、上次等待的原因和数据库。数据库有自己的子元素，其中包含数据库名称。如果我们想添加另一个标签，例如数据库\
  \ ID，这将很有帮助。\n\n```xml\n<Sessions>\n  <UserSession SessionID=\"54\">\n    <LoginName>WIN-J38I01U06D7\\\
  Administrator</LoginName>\n    <HostName>WIN-J38I01U06D7</HostName>\n    <Status>running</Status>\n\
  \    <Request>\n      <Command>SELECT</Command>\n      <Database>\n        <Name>master</Name>\n\
  \      </Database>\n      <LastWaitReason>SOS_WORK_DISPATCHER</LastWaitReason>\n\
  \    </Request>\n  </UserSession>\n  <UserSession SessionID=\"55\">\n    <LoginName>WIN-J38I01U06D7\\\
  Administrator</LoginName>\n    <HostName>WIN-J38I01U06D7</HostName>\n    <Status>running</Status>\n\
  \    <Request>\n      <Command>SELECT</Command>\n      <Database>\n        <Name>master</Name>\n\
  \      </Database>\n      <LastWaitReason>ASYNC_NETWORK_IO</LastWaitReason>\n  \
  \  </Request>\n  </UserSession>\n</Sessions>\n代码清单 1-16\nFOR XML PATH 的期望结果\n```\n\
  \n使用 `FOR XML PATH` 构建 XML 文档的查询初看起来可能有点复杂，但一旦理解了原理，它们就变得相当直接。让我们逐一检查每个需求以及如何实现所需的形状。\n\
  \n首先，我们需要一个名为 `<Sessions>` 的根节点，并且我们还需要将 `<row>` 元素重命名为 `<UserSession>`。这可以以与我们探索\
  \ `RAW` 模式时相同的方式实现，使用 `FOR XML` 子句中 `<row>` 元素的可选参数和 `ROOT` 关键字来指定根节点，如代码清单 1-17\
  \ 所示。\n\n```sql\nFOR XML PATH('UserSession'), ROOT('Sessions')\n代码清单 1-17\n使用 FOR\
  \ XML PATH 创建根节点并命名 <row> 元素\n```\n\n接下来，在 `SELECT` 列表中，我们只需要指定每个标签应该位于层次结构中的哪个位置，以及它们应该被视为元素还是属性。如代码清单\
  \ 1-18 所示的技术。请注意，`SessionID` 带有 `@` 前缀以使其成为属性，并且我们仅为 `DatabaseName` 创建了额外的嵌套层级，只需在请求的层次结构中添加另一个层级即可。\n\
  \n```sql\nSELECT\nExecSessions.session_id                      '@SessionID'\n, ExecSessions.login_name\
  \                      'LoginName'\n, ExecSessions.host_name                   \
  \    'HostName'\n, ExecSessions.status                          'Status'\n, ExecRequests.command\
  \                         'Request/Command'\n, DB_NAME(ExecRequests.database_id)\
  \            'Request/Database/Name'\n, ExecRequests.last_wait_type            \
  \      'Request/LastWaitReason'\n代码清单 1-18\n定义 SELECT 列表\n```\n\n将这些技术整合在一起，我们得到了代码清单\
  \ 1-19 中生成所需结果集的完整查询。\n\n```sql\nSELECT\nExecSessions.session_id '@SessionID'\n\
  , ExecSessions.login_name 'LoginName'\n, ExecSessions.host_name 'HostName'\n, ExecSessions.status\
  \ 'Status'\n, ExecRequests.command 'Request/Command'\n, DB_NAME(ExecRequests.database_id)\
  \ 'Request/Database/Name'\n, ExecRequests.last_wait_type 'Request/LastWaitReason'\n\
  FROM sys.dm_exec_sessions ExecSessions\nINNER JOIN sys.dm_exec_requests ExecRequests\n\
  ON ExecSessions.session_id = ExecRequests.session_id\nWHERE ExecSessions.is_user_process\
  \ = 1\nFOR XML PATH('UserSession'), ROOT('Sessions')\n代码清单 1-19\n最终查询\n```\n\n\n\
  \n### 从 XML 文档中提取值\n\n在编写脚本或进行性能调优时，DBA 经常需要从原生 XML 中提取值。为了演示这一点，我们将使用查询存储。查询存储捕获查询计划及其统计信息的历史记录，因此\
  \ DBA 可以轻松比较不同计划之间的性能差异。除了图形化仪表板风格的工具外，查询存储还通过一系列目录视图公开计划及其元数据。\n\n**提示**\n关于查询存储的完整讨论，我强烈推荐\
  \ Apress 出版的 `Pro SQL Server 2022 Administration` 一书，可从 [`https://link.springer.com/book/10.1007/978-1-4842-8864-1`](https://link.springer.com/book/10.1007/978-1-4842-8864-1)\
  \ 购买。\n\n让我们假设我们想要检查使用扫描操作的最昂贵的查询计划。这些信息可以通过将 `sys.query_store_runtime_statistics`\
  \ 目录视图与 `sys.query_store_plan` 目录视图进行联接来检索。然而，为了检索我们需要的结果，我们将不得不查询 XML 执行计划。这意味着我们将不得不引入\
  \ XQuery 的概念。\n\nXQuery 是一种用于查询 XML 的语言，就像 SQL 是一种用于查询关系数据的语言一样。该语言建立在 XPath 之上，由用于寻址文档特定区域的\
  \ XPath 表达式和 FLOWR（发音同 \"flower\"）语句组成。FLOWR 是 \"For, Let, Where, Order by, and\
  \ Return\" 的缩写。\n\nFor 语句允许你遍历一个节点序列。Let 语句将一个序列绑定到一个变量。Where 语句根据布尔表达式过滤节点。Order\
  \ by 语句在返回节点之前对其进行排序。Return 语句指定应返回的内容。\n\n大多数 DBA（即使是那些关注自动化的人）很少需要关心 FLOWR 语句。因此，对该主题的完整讨论超出了本书的范围。相反，我将重点介绍在\
  \ SQL Server 中用于自动化和脚本编写的核心方法。这些方法是 `query()`、`value()`、`exist()` 和 `nodes()`。\n\
  \n**注意**\n以下部分中的示例使用 showplan 模式。此 XSD 的完整详细信息可在 [`http://schemas.microsoft.com/sqlserver/2004/07/showplan`](http://schemas.microsoft.com/sqlserver/2004/07/showplan)\
  \ 找到。\n\n#### query 方法\n\nXQuery `query()` 方法可用于具有 XML 数据类型的列或变量。它提取文档的一部分。提取的文档部分将形成一个未类型化的\
  \ XML 文档，即使原始文档符合模式（类型化 XML）。\n\n调用该方法使用语法 `XMLDoc.query('/Path/To/Node')`。如果文档绑定到\
  \ XSD，你可以在指定节点路径之前声明命名空间，语法为 `XMLDoc.query('declare namespace alias=\"//domain.com/schemalocation\"\
  ; //alias:node')`。\n\n例如，代码清单 1-20 中的查询将返回查询存储中每个查询计划的每个列引用。在 `query()` 方法中，我们首先为\
  \ Microsoft 的 showplan 模式声明命名空间。然后我们可以轻松地指定我们希望提取的节点，而不是传递该节点在层次结构中的完整位置。\n\n```\n\
  SELECT\nCAST(query_plan AS XML).query('declare namespace\nqplan=\"http://schemas.microsoft.com/sqlserver/2004/07/showplan\"\
  ;\n//qplan:ColumnReference') AS SQLStatement\nFROM sys.query_store_plan ;\n代码清单\
  \ 1-20\n使用 query() 方法\n```\n\n#### value 和 nodes 方法\n\n`value()` 方法将从 XML 文档中提取一个单值，并映射到\
  \ SQL Server 数据类型。`value()` 方法可以针对 XML 数据类型的列或变量调用，格式为 `XMLDoc.value('/path/to/node/@node[1]',\
  \ 'int')`。或者，你也可以指定 XML 文档所绑定的模式，格式为 `XMLDoc.value('declare namespace alias=\"http://domain.com/schemalocation\"\
  ; (//alias:node[1]', 'int')`。\n\n**提示**\n因为 `value()` 方法只能返回一个单值，所以必须在方括号中指定一个索引值，即使该节点在文档中只出现一次。\n\
  \n因为 `value()` 方法只能返回一个原子（单）值，所以它可以与 `nodes()` 方法结合使用，将节点分解为关系数据。`nodes()` 方法返回一个行集，其中包含节点实例的逻辑副本。然后，可以将\
  \ `value()` 方法交叉应用到 `nodes()` 方法的结果，以便从同一个 XML 文档返回多个值。代码清单 1-21 中的查询将返回查询存储中每个计划内访问的表和列的列表。\n\
  \n代码清单 1-21 中的子查询只是将 `query_plan` 列转换为原生 XML，以便可以对其调用 `nodes()` 方法。外部查询将 `nodes()`\
  \ 方法交叉应用到查询计划的原生 XML 版本，然后针对 `nodes()` 方法返回的节点实例的逻辑表示运行 `value()` 方法。请注意，因为 `value()`\
  \ 方法是针对 `nodes()` 返回的结果而不是原始 XML 文档调用的，所以不需要为属性指定路径。这是因为 `nodes()` 返回的结果始于 `<ColumnReference>`\
  \ 元素级别，而 `@Table` 和 `@Column` 节点是该元素的属性。因此，对于 `value()` 方法而言，这些属性位于文档的顶层。\n\n**提示**\n\
  当将 `nodes()` 与 `value()` 结合使用时，模式仅在 `nodes()` 方法中声明。这是因为 `value()` 方法是针对实例的逻辑表示运行的，而不是针对原始\
  \ XML 文档。\n\n```\nSELECT\nplan_id\n,nodes.query_plan.value('@Table[1]', 'nvarchar(128)')\
  \ AS TableRef\n,nodes.query_plan.value('@Column[1]', 'nvarchar(128)') AS ColumnRef\n\
  FROM\n(\nSELECT plan_id, CAST(query_plan AS XML) query_plan_xml\nFROM sys.query_store_plan\n\
  ) base\nCROSS APPLY query_plan_xml.nodes('declare namespace\nqplan=\"http://schemas.microsoft.com/sqlserver/2004/07/showplan\"\
  ;\n//qplan:ColumnReference') as nodes(query_plan) ;\n代码清单 1-21\n使用 value() 和 nodes()\
  \ 方法\n```\n\n\n\n#### exist 方法\n\n`exist` 方法会对 XML 文档执行 XQuery 表达式。它将返回一个位（布尔）值来表示表达式的结果状态。当\
  \ XPath 表达式的结果为空时返回 0；结果不为空时返回 1；如果结果为 `NULL` 则返回 `NULL`。\n\n`exist` 方法通常用于 `WHERE`\
  \ 子句。例如，你可能已经注意到清单 1-20 和 1-21 中的查询返回了许多结果，这些结果既来自 SQL Server 内部运行的许多查询，也来自 DBA\
  \ 活动，比如访问备份元数据。清单 1-22 中的查询扩展了清单 1-21 的查询，用于过滤掉 `<ColumnReference>` 元素的 `@Schema`\
  \ 属性等于 `[sys]` 或 `[dbo]` 的任何结果。这将导致只考虑访问用户表的执行计划。\n\n```\nSELECT\nplan_id\n,nodes.query_plan.value('@Table[1]',\
  \ 'nvarchar(128)') AS index1\n,nodes.query_plan.value('@Column[1]', 'nvarchar(128)')\
  \ AS index2\nFROM\n(\nSELECT plan_id, CAST(query_plan AS XML) query_plan_xml\nFROM\
  \ sys.query_store_plan\n) base\nCROSS APPLY query_plan_xml.nodes('declare namespace\n\
  qplan=\"http://schemas.microsoft.com/sqlserver/2004/07/showplan\";\n//qplan:ColumnReference')\
  \ as nodes(query_plan)\nWHERE query_plan_xml.exist('declare namespace\nqplan=\"\
  http://schemas.microsoft.com/sqlserver/2004/07/showplan\";\n//qplan:Object[@Schema=\"\
  [sys]\"]') = 0\nAND query_plan_xml.exist('declare namespace\nqplan=\"http://schemas.microsoft.com/sqlserver/2004/07/showplan\"\
  ;\n//qplan:Object[@Schema=\"[dbo]\"]') = 0 ;\nListing 1-22\n使用 `exist` 方法\n```\n\
  \n#### 综合使用方法\n\n为了满足我们的原始需求，即检查使用扫描操作的最昂贵的执行计划，我们必须在单个查询中组合 `value`、`query` 和 `exist`\
  \ 方法。清单 1-23 中的查询在 `WHERE` 子句中使用了 `exist` 方法来检查每个计划的 `<RelOp>` 元素，并过滤掉任何不涉及扫描操作的运算符。`WHERE`\
  \ 子句还将使用 `exist` 方法来过滤任何非用户表的操作。\n\n`SELECT` 列表使用 `value` 方法提取 `@Schema` 和 `@Table`\
  \ 属性，以帮助我们识别可能缺少索引的表。它还使用 `query` 方法提取整个 `<Object>` 元素，以 XML 格式提供表的完整详细信息。\n\n除了使用\
  \ XQuery 方法外，该查询还以本机 XML 格式返回整个计划，并从 `sys.query_store_runtime_stats` 目录视图返回计划统计信息。查询使用\
  \ `TOP` 和 `ORDER BY` 来过滤掉除基于计划的平均执行时间乘以计划执行次数计算出的最昂贵的前五个计划之外的所有计划。\n\n```\nSELECT\
  \ TOP 5\nCAST(p.query_plan AS XML)\n, CAST(p.query_plan AS XML).value('declare namespace\n\
  qplan=\"http://schemas.microsoft.com/sqlserver/2004/07/showplan\";\n(//qplan:Object/@Schema)[1]','nvarchar(128)')\n\
  + '.'\n+ CAST(p.query_plan AS XML).value('declare namespace\nqplan=\"http://schemas.microsoft.com/sqlserver/2004/07/showplan\"\
  ;\n(//qplan:Object/@Table)[1]','nvarchar(128)') AS [Table]\n, CAST(p.query_plan\
  \ AS XML).query('declare namespace\nqplan=\"http://schemas.microsoft.com/sqlserver/2004/07/showplan\"\
  ;\n//qplan:Object') AS TableDetails\n, rs.count_executions\n, rs.avg_duration\n\
  , rs.avg_physical_io_reads\n, rs.avg_cpu_time\nFROM sys.query_store_runtime_stats\
  \ rs\nINNER JOIN sys.query_store_plan p\nON p.plan_id = rs.plan_id\nWHERE CAST(p.query_plan\
  \ AS XML).exist('declare namespace\nqplan=\"http://schemas.microsoft.com/sqlserver/2004/07/showplan\"\
  ;\n//qplan:RelOp[@LogicalOp=\"Index Scan\"\nor @LogicalOp=\"Clustered Index Scan\"\
  \nor @LogicalOp=\"Table Scan\"]') = 1\nAND CAST(p.query_plan AS XML).exist('declare\
  \ namespace\nqplan=\"http://schemas.microsoft.com/sqlserver/2004/07/showplan\";\n\
  //qplan:Object[@Schema=\"[sys]\"]') = 0\nAND CAST(p.query_plan AS XML).exist('declare\
  \ namespace\nqplan=\"http://schemas.microsoft.com/sqlserver/2004/07/showplan\";\n\
  //qplan:Object[@Schema=\"[dbo]\"]') = 0\nORDER BY rs.count_executions * rs.avg_duration\
  \ DESC ;\nListing 1-23\n查找具有扫描操作的最昂贵计划\n```\n\n#### 高效循环\n\nDBA 强加给开发人员的最常见托管标准之一是禁止使用游标。与此同时，大多数\
  \ DBA 在需要遍历一组对象时都会使用游标。论点通常是他们的脚本每天只运行一次，而编写游标是实现目标的最快方式。当然，这个论点有一定道理，但我总觉得最好以身作则。有几次，我与开发团队进行了“游标辩论”，并通过自己编写不使用游标的脚本赢得了辩论，开发人员也应该能够做到同样的事情。\n\
  \n当然，本书的主要重点是 PowerShell，在 PowerShell 中循环远比在 T-SQL 中循环高效得多。然而，本书（尤其是第 8 章）展示了最佳技术，在\
  \ PowerShell 和 T-SQL 级别具有多层循环是合理的方案。\n\n想象一下，我们需要一个脚本来终止所有活动会话。这对于任何 DBA 都是一个有用的脚本，因为你总会有需要快速断开所有用户连接的情况。清单\
  \ 1-24 中的脚本使用游标实现了这一点，但它会很慢且耗费资源，尤其是在具有许多活动会话的高度事务性环境中。\n\n```\nDECLARE @session_id\
  \ INT ;\nDECLARE C_Sessions CURSOR\nFOR\nSELECT Session_id\nFROM sys.dm_exec_sessions\n\
  WHERE session_id <> @@SPID\nAND is_user_process = 1 ;\nOPEN C_Sessions ;\nFETCH\
  \ NEXT FROM C_Sessions\nINTO @Session_id ;\nDECLARE @SQL NVARCHAR(MAX) ;\nWHILE\
  \ @@FETCH_STATUS = 0\nBEGIN\nSET @SQL = 'Kill ' + CAST(@Session_id AS NVARCHAR(4))\
  \ ;\nEXEC(@SQL) ;\nFETCH NEXT FROM C_Sessions\nINTO @Session_id ;\nEND\nCLOSE C_Sessions\
  \ ;\nDEALLOCATE C_Sessions ;\nListing 1-24\n使用游标终止所有会话\n```\n\n一种更有效（也符合你自己的托管标准！）的方法是使用\
  \ `FOR XML` 的一个技巧。清单 1-25 中的查询使用子查询来填充变量。子查询为结果集中返回的每一行返回字符串 `'Kill '` 与 `Session_id`\
  \ 连接的结果。然后使用 `FOR XML PATH` 将其转换为 XML 格式。`data()` 方法用于剥离 XML 标签和字符，只保留文本。然后，该文本被传递回外部查询，凭借变量的数据类型，它被隐式转换为\
  \ `NVARCHAR`。然后可以使用动态 SQL 执行该变量。\n\n这种方法的好处是查询只执行一次，而不是对每个活动会话执行一次。这意味着更少的磁盘活动。与其他技术（如\
  \ `@SQL = @SQL +` 方法）相比，这种方法使用的内存也更少。\n\n```\nDECLARE @SQL NVARCHAR(MAX) ;\nSELECT\
  \ DISTINCT @SQL =\n(\nSELECT 'Kill ' + CAST(session_id AS NVARCHAR(4)) AS [data()]\n\
  FROM sys.dm_exec_sessions\nWHERE session_id <> @@SPID\nAND is_user_process = 1\n\
  FOR XML PATH('')\n) ;\nEXEC(@SQL) ;\nListing 1-25\n高效终止所有会话\n```\n\n\n\n## 摘要\n\n\
  对于希望通过脚本编写和自动化任务来减少工作量的数据库管理员（DBA）而言，必须熟悉一些 T-SQL 技术。虽然本书侧重于 PowerShell，但有时在 T-SQL\
  \ 层编写代码才是最优解决方案，这意味着您的代码将横跨 PowerShell 和 T-SQL 两个层面。\n\n使用 `APPLY` 操作符可以将函数应用于结果集中的每一行。当使用\
  \ `CROSS APPLY` 操作符时，仅返回那些不会导致函数返回 `NULL` 值的行。当使用 `OUTER APPLY` 操作符时，结果集中的所有行都将被返回。DBA\
  \ 可以使用此技术将动态管理函数应用于动态管理视图。\n\nXML 对于 DBA 来说是一项日益重要的技术，需要理解并能够处理。SQL Server 中与 XML\
  \ 相关的两个主要概念是将 XML 转换为关系值，以及将结果集转换为 XML 文档。`SELECT` 语句的 `FOR XML` 子句可用于从结果集生成 XML\
  \ 文档。基于 XPath 的 XQuery 可用于从 XML 文档中提取值。\n\n许多 DBA 仍然使用游标来遍历对象，但在子查询中使用 XQuery `data()`\
  \ 方法提供了一种优化得多的解决方案。它也通过以身作则，促进了开发人员的良好实践。\n\n"
- '# 2. PowerShell 基础


  PowerShell 是由微软编写的一种强大的脚本语言。它使用 .NET 公共语言运行时（CLR），提供了开箱即用的庞大功能，并且完全可扩展。它专为自动化和管理而设计，常用于云环境（如
  Azure 和 AWS）的自动化或维护。它也是管理诸如 Microsoft Exchange 等平台的首选语言，当然也包括 SQL Server。PowerShell
  核心版（v7）不仅支持 Windows，还支持 Mac OS 和 Linux。它完全支持多种 Linux 变体，包括 Red Hat、Ubuntu 和 Debian
  等等。


  在本章中，我们将回顾 PowerShell 语言的基础知识。我们将从一个简短的加速器开始，它将帮助我们提高效率。然后我们将讨论一些基本的语言元素，例如注释、数据类型、变量和流程控制语句。最后，我们将概述
  PowerShell 模块，它们提供了可扩展性。


  ## 入门指南


  要开始使用，我们应该理解 PowerShell 可以通过两种不同的方式使用。第一种是命令行 Shell。它为管理员提供了使用 PowerShell 终端运行临时命令（称为
  cmdlet）或简单脚本的能力。在 Windows 环境中，此终端可以替代 cmd shell，并提供更丰富的体验。命令返回的是 .NET 对象而非纯文本，并且可以使用管道（我们将在本章后面讨论）将命令链接在一起。终端本身提供了命令行历史和
  Tab 键补全功能。


  第二种使用 PowerShell 的方式是将其作为脚本语言。当用作脚本语言时，PowerShell 为创建自动化提供了一个丰富、可扩展的平台，允许管理员和 DevOps
  工程师利用 .NET 的力量以及一个完全面向对象的语言（包含类、继承、方法和属性）。这意味着该语言可以通过类、函数和模块完全扩展。


  ## 执行策略


  如果我们计划在 Windows 上使用 PowerShell 进行自动化，那么我们需要考虑执行策略。这是 PowerShell 安全策略的一部分，决定了用户是否可以运行脚本、加载配置文件以及加载配置文件。表
  2-1 详细列出了可以在 Windows 上设置的执行策略。


  **表 2-1**


  **执行策略**


  | 策略 | 描述 |

  | --- | --- |

  | **Undefined** | `Windows 环境中的默认策略。检查组策略中是否定义了策略。如果在所有作用域都未定义，则其效果等同于 Windows 客户端的
  Restricted 或 Windows Server 的 RemoteSigned。` |

  | **AllSigned** | `所有脚本和配置文件都必须由受信任的发布者签名。即使脚本是在本地计算机上编写的。` |

  | **Bypass** | `没有任何阻止。没有警告或提示。` |

  | **Default** | `将 Windows 桌面设置为 Restricted，将 Windows 服务器设置为 RemoteSigned。` |

  | **RemoteSigned** | `如果脚本或配置文件是下载的，则必须签名或明确解除阻止。本地创建的脚本可以无需签名即可执行。` |

  | **Restricted** | `不能运行脚本，也不能加载配置文件。` |

  | **Unrestricted** | `所有脚本都可以执行，所有配置文件都可以加载。如果脚本是从互联网下载且未签名，则用户在执行前会收到提示。这是非 Windows
  系统上的默认设置。` |


  默认情况下，指定执行策略时，它应用于 `LocalMachine` 作用域。但是，可以使用 `-Scope` 参数来指定 `CurrentUser` 或 `Process`。如果使用
  `Process` 作用域，则该策略仅适用于当前 PowerShell 会话。


  在非 Windows 操作系统上，从 PowerShell 6 开始，默认策略是 `Unrestricted`，并且无法覆盖。然而在 Windows 上，应适当考虑合适的执行策略，通常需要与组织的网络安全团队协作制定。


  如果您打算按照本书中的示例操作，并从代码存储库下载代码示例，我建议将执行策略设置为 `Unrestricted`，这可以通过清单 2-1 中的命令实现。


  ```

  Set-ExecutionPolicy Unrestricted

  ```

  **清单 2-1**

  **设置执行策略**


  > **提示**

  > 要设置执行策略，必须以管理员身份运行终端。


  ## 标准


  虽然有例外，但 PowerShell 中的大多数命令都遵循 `动词-名词`（名词为单数）的命名约定。命令名称的第一部分（“动词”）描述了您将执行的操作。这些被称为已批准的动词，使用它们是为了保持一致性，以便命令能够被直观地理解。下面列出了一些最常见的动词，但完整列表可以在
  learn.microsoft.com/en-us/powershell/scripting/developer/cmdlet/approved-verbs-for-windows-powershell-commands?view=powershell-7.4
  找到：


  *   `Add`

  *   `Clear`

  *   `Connect`

  *   `Convert`

  *   `Copy`

  *   `Disable`

  *   `Disconnect`

  *   `Enable`

  *   `Format`

  *   `Get`

  *   `Install`

  *   `Invoke`

  *   `New`

  *   `Read`

  *   `Remove`

  *   `Rename`

  *   `Reset`

  *   `Revoke`

  *   `Save`

  *   `Select`

  *   `Set`

  *   `Show`

  *   `Start`

  *   `Stop`

  *   `Test`

  *   `Update`

  *   `Wait`

  *   `Write`


  这个前缀后面跟着一个连字符（`-`），最后是对您将要对其执行操作的资源的描述（“名词”）。例如，`Get-ChildItem` 可用于列出当前 PowerShell
  位置的内容。此位置可以是文件系统中的文件夹，也可以是 SQL Server 实例中的表。导航 SQL Server 实例将在本章后面讨论。逻辑且一致的命名约定，结合
  IntelliSense，使得在诸如 Visual Studio Code 等开发环境中学习和查找命令成为一个相对容易的过程。




  ## 别名


  为了让学习 PowerShell 变得更加简单，许多命令都有别名，这些别名映射到 DOS 或 Linux 命令。这意味着，如果你有使用 Windows 命令提示符（基于
  DOS）或 Bash 的任何经验，就可以继续使用许多你已经熟悉的命令。


  例如，我们来看一下 `Get-ChildItem`。如前所述，`Get-ChildItem` 可用于列出文件系统中文件夹的内容。许多不熟悉此命令的 PowerShell
  新手会熟悉 DOS 的 `dir` 或 Linux 的 `ls`。因此，PowerShell 提供了这两个别名。例如，代码清单 2-2 中的所有命令在功能上都是等效的。


  ```

  dir *.txt #使用 DOS 别名

  ls *.txt #使用 LINUX 别名

  gci *.txt #使用 gci 别名

  Get-ChildItem *.txt #使用 PowerShell 命令

  代码清单 2-2

  使用别名

  ```


  > **提示**：当你与 PowerShell 终端进行交互式操作时，别名可以提高工作效率，但在脚本中使用别名被认为是糟糕的做法，因为它会使代码更加晦涩难懂，更难以阅读。


  ## 语言基础


  以下部分将讨论注释、数据类型、变量、管道和筛选以及流程控制语句。PowerShell 是一门非常庞大的语言，但本节包含的结构将为你提供一个加速器，并为你阅读本书其余部分所需的基础知识。


  ### 注释


  PowerShell 支持行内注释和块注释。行内注释由 `#` 符号表示。该符号右侧的所有内容都被视为注释，不会被执行。例如，代码清单 2-3 中的命令与代码清单
  2-1 中的命令在功能上是等效的。


  ```

  Set-ExecutionPolicy -ExecutionPolicy Unrestricted #将执行策略设置为 Unrestricted

  代码清单 2-3

  行内注释

  ```


  块注释以 `<#` 开始，以 `#>` 结束。这些字符序列之间的任何内容都被视为注释，不会被执行。代码清单 2-4 中的脚本演示了块注释的用法。


  ```

  <#

  Set-ExecutionPolicy  -ExecutionPolicy Unrestricted

  此命令用于将 PowerShell 的执行策略设置为“无限制”。

  #>

  代码清单 2-4

  块注释

  ```


  ### 数据类型


  PowerShell 使用 .NET CLR 提供的数据类型。.NET 中的每种数据类型都派生自 `Object` 数据类型。因此，`Object` 数据类型是类型层次结构的根，同时它本身也是一个数据类型。


  表 2-2 中列出的基本类型直接派生自 `Object` 类型。从这些基本类型中，实际上派生出了数百种数据类型。其中一些派生类型很复杂，例如 `XML`、`DateTimeOffset`（存储相对于
  UTC 偏移的日期和时间）和 `Array`。


  **表 2-2 基本数据类型**


  | 基本数据类型 | 描述 |

  | --- | --- |

  | `Byte` | 8 位无符号整数 |

  | `SByte` | 不符合 CLS 规范的 8 位有符号整数 |

  | `Int16` | 16 位有符号整数 |

  | `Int32` | 32 位有符号整数 |

  | `Int64` | 64 位有符号整数 |

  | `UInt16` | 16 位无符号整数 |

  | `UInt32` | 不符合 CLS 规范的 32 位无符号整数 |

  | `UInt64` | 不符合 CLS 规范的 64 位无符号整数 |

  | `Single` | 32 位浮点数 |

  | `Double` | 64 位浮点数 |

  | `Boolean` | 布尔值/位值 |

  | `Char` | Unicode（16 位）字符 |

  | `Decimal` | 十进制（128 位）值 |

  | `IntPtr` | 有符号整数，在 32 位平台上为 32 位值，在 64 位平台上为 64 位值 |

  | `UIntPtr` | 不符合 CLS 规范的无符号整数，在 32 位平台上为 32 位值，在 64 位平台上为 64 位值 |

  | `String` | Unicode 字符字符串 |


  ### 变量


  与所有语言一样，变量包含在运行时未知或在执行期间会更改的值。它们对于编写灵活、强大和可维护的代码至关重要。变量用于存储用户输入和循环等目的。每个变量都映射到一个数据类型，并且由于变量是派生自
  .NET 类的对象，因此可以对它们调用各种方法。例如，可以对 `Int32` 调用 `ToString()` 方法，将变量值作为字符串而非整数输出。


  变量始终以 `$` 为前缀，声明变量时，你在美元符号 `$` 前面的方括号中指定数据类型，最后声明变量的名称。


  > **提示**：始终为变量赋予有意义的名称。如果你给变量起名为 `$i` 或 `$a`，它们就变得毫无意义，就像命名为 `$foo` 和 `$bar` 一样。为变量赋予有意义的名称使你的代码更易于阅读和维护。


  代码清单 2-5 中的脚本首先创建两个变量。一个是名为 `$HelloWorldInt` 的整数，另一个是名为 `$HelloWorldText` 的字符串，并为每个变量赋值。脚本的第二部分清除控制台的消息，然后输出结果。


  ```

  #声明变量并赋值

  [int]$HelloWorldInt = 123

  [string]$HelloWorldText = "Hello World"

  #将结果打印到控制台

  Clear-Host

  Write-Host "HelloWorldInt: " $HelloWorldInt

  Write-Host "HelloWorldText: " $HelloWorldText

  代码清单 2-5

  声明和使用变量

  ```


  我们也可以在不指定数据类型的情况下声明变量。当你这样做时，PowerShell 将使用它认为最合适的数据类型。但请注意，PowerShell 并未通灵！它只能猜测变量应该是哪种数据类型。例如，考虑代码清单
  2-6 中的脚本。这里，我们声明了六个变量而没有指定数据类型。然后我们使用 `GetType()` 方法来提取每个变量的数据类型。


  ```

  #行内声明变量

  $StringVariable1 = "Hello World"

  $StringVariable2 = 123

  $StringVariable3 = "123"

  $Int32Variable = 123

  $SingleVariable = 3.3

  $XMLVariable = ''MyValue''

  #提取数据类型

  Clear-Host

  "StringVariable1: " + $StringVariable1.GetType()

  "StringVariable2: " + $StringVariable2.GetType()

  "StringVariable3: " + $StringVariable3.GetType()

  "Int32Variable: " + $Int32Variable.GetType()

  "SingleVariable: " + $SingleVariable.GetType()

  "XMLVariable: " + $XMLVariable.GetType()

  代码清单 2-6

  不指定数据类型声明变量

  ```


  从下面列出的结果可以看出，数据类型并非如你所愿：


  ```

  StringVariable1: string

  StringVariable2: int

  StringVariable3: string

  Int32Variable: int

  SingleVariable: double

  XMLVariable: string

  ```


  你可以看到 `$StringVariable`、`$StringVariable3` 和 `$Int32Variable` 被分配了我们想要的数据类型。然而，对于其他变量，我们就不那么幸运了。`$StringVariable2`
  被创建为 `int` 数据类型，因为我们没有将赋值的值用引号括起来。这就是为什么 `$StringVariable3` 没有遭受同样问题的原因。`$SingleVariable`
  被创建为 `double` 数据类型。这并非世界末日，但这确实意味着我们使用了比所需更多的内存资源。`$XMLVariable` 被创建为 `string` 数据类型。这意味着我们将无法使用
  XML 特定的方法和 cmdlet，例如 `GetElementsByTagName` 方法和 `Select-Xml` cmdlet。


  总之，重要的是要记住不指定数据类型的潜在复杂性，并且如果数据类型对你的脚本很重要，则应始终指定。另一个需要考虑的因素是代码维护。如果对你（或团队成员）来说，引用变量的数据类型并不容易，那么在你进行故障排除、修订或增强脚本时，可能会减慢你的速度。




  ### 管道与筛选


  如果你有 T-SQL 背景而非编程背景，管道（piping）的概念对你来说可能是全新的。在 PowerShell 中，管道是指将一个命令的结果传递给另一个命令的过程。管道是
  PowerShell 的一个核心概念，也是其如此强大的原因之一。


  管道的一个简单示例如清单 2-7 所示。此脚本中的第一行从操作系统获取正在运行的进程列表。然后，它将此命令的结果（作为一个或多个对象，而不仅仅是纯文本）传递到
  `Where-Object` cmdlet。`Where-Object` 遍历所有接收到的对象，并应用提供的筛选脚本（在花括号中）。该筛选脚本使用特殊的自动 PowerShell
  变量 `$_`（它表示当前正在处理的对象），将每个对象的 `ProcessName` 属性与字符串“*p*w*sh*”进行比较（星号用作通配符）。不匹配的对象将从结果中移除。


  ```

  # 返回正在运行的进程列表，然后按进程名称进行筛选

  # 选择的筛选字符串将匹配 PowerShell 7 (pwsh) 和 5 (powershell) 的可执行文件

  $process = Get-Process | Where-Object { $_.ProcessName -like "*p*w*sh*" }

  # 将筛选后的进程列表打印到控制台

  $process

  清单 2-7

  基本管道操作

  ```


  如果没有管道能力，代码会长得多且更难管理。在这种情况下，我们需要一个单独的语句来遍历读入 `$process` 变量的每个进程。对于像这样非常简单的例子，这可能听起来没什么大不了的，但当我们有非常庞大、复杂的脚本时，由此产生的额外开销就会成为一种负担。


  ### 流程控制


  如果你的背景纯粹是 SQL Server，那么你可能对循环的想法感到反感，因为在 SQL Server 中循环是一种非常糟糕的做法，这是由于该语言基于集合的特性。如果你有任何脚本编写或编程经验，你就会知道循环在遍历对象、执行指定次数的操作（或一组操作）或重复执行操作（或一组操作）直到满足条件方面是多么有用。PowerShell
  通过 `for` 语句、`foreach` 语句和 `while` 语句提供循环能力。


  > **注意**

  > 当然，关于循环多么有用的论断并不适用于 T-SQL，因为基于集合的操作总是比循环高效得多。更多详情请参考第 1 章。


  不过，在我们深入探讨如何使用循环之前，我们需要确保熟悉 PowerShell 支持的运算符，因为我们将需要它们来控制循环。如果你熟悉 T-SQL，那么你可能已经了解运算符的概念，并且知道诸如
  `=`（等于）、`>`（大于）和 `<=`（小于或等于）之类的比较运算符。


  PowerShell 中可用的比较运算符列于表 2-3 中，但与 T-SQL 的一个重要区别是，在 PowerShell 中 `=` 仅用于赋值，从不用于比较。PowerShell
  中的相等比较运算符是 `-eq`。记住这一点非常重要，以避免代码中一些难以发现的、讨厌的错误。


  **表 2-3: 比较运算符**


  | 运算符 | 描述 |

  | --- | --- |

  | `-contains` | 属性值中的任何项等于指定值。当你必须确保数组中存在特定值时，这很有用 |

  | `-eq` | 属性的值等于指定值 |

  | `-ge` | 属性的值大于或等于指定值 |

  | `-gt` | 属性的值大于指定值 |

  | `-in` | 属性的值等于指定值数组中的任何一个元素。值数组可以指定为逗号分隔的列表 |

  | `-is` | 属性的值的数据类型是指定的数据类型。指定的数据类型必须用方括号括起来 |

  | `-isnot` | 属性的值的数据类型与指定的数据类型不同。指定的数据类型必须用方括号括起来 |

  | `-le` | 属性的值小于或等于指定值 |

  | `-lt` | 属性的值小于指定值 |

  | `-like` | 属性的值包含指定值，遵循通配符匹配 |

  | `-match` | 属性的值与提供的正则表达式模式匹配 |

  | `-ne` | 属性的值不等于指定值 |

  | `-notcontains` | 属性值中的任何项都不等于指定值。当你必须确保数组中不存在特定值时，这很有用 |

  | `-notin` | 属性的值不等于指定值数组中的任何一个元素。值数组可以指定为逗号分隔的列表 |

  | `-notlike` | 属性的值不包含指定值，遵循通配符匹配 |

  | `-notmatch` | 属性的值不与提供的正则表达式模式匹配 |

  | `-ccontains` | 与 `-Contains` 相同，但区分大小写 |

  | `-ceq` | 与 `-EQ` 相同，但区分大小写 |

  | `-cge` | 与 `-GE` 相同，但区分大小写 |

  | `-cgt` | 与 `-GT` 相同，但区分大小写 |

  | `-cin` | 与 `-In` 相同，但区分大小写 |

  | `-cle` | 与 `-LE` 相同，但区分大小写 |

  | `-clt` | 与 `-LT` 相同，但区分大小写 |

  | `-clike` | 与 `-Like` 相同，但区分大小写 |

  | `-cmatch` | 与 `-Match` 相同，但区分大小写 |

  | `-cne` | 与 `-NE` 相同，但区分大小写 |

  | `-cnotcontains` | 与 `-NotContains` 相同，但区分大小写 |

  | `-cnotin` | 与 `-NotIn` 相同，但区分大小写 |

  | `-cnotlike` | 与 `-NotLike` 相同，但区分大小写 |

  | `-cnotmatch` | 与 `-NotMatch` 相同，但区分大小写 |


  `for` 循环可用于将一组操作重复指定次数，或遍历数组或集合的子集。`foreach` 循环在你必须遍历数组或集合中的每个项时非常有用，而 `while` 循环用于重复一组操作，直到满足某个条件。


  清单 2-8 演示了如何使用 `for` 循环来实现错误处理。该脚本将尝试每 30 秒读取一次文件内容，共尝试三次。for 循环的行为在括号内定义。括号内有三个元素。第一个初始化将要控制循环的变量。在我们的示例中，我们创建一个名为
  `$i` 的变量，初始值为 1。第二个定义指定了在我们的循环终止之前必须满足的条件。我们指定当 `$i` 小于或等于 3 时继续循环。最后一个定义控制循环变量的增量。`$i++`
  是 `$i = $i + 1` 的简写。因此，在我们的示例中，`$i` 的值将在每次循环迭代时增加一。




  在循环的每次迭代中要重复执行的代码被包含在花括号内。这里，我们使用一个 `try...catch` 代码块来尝试读取文件。如果操作成功，我们会将成功信息写入控制台，然后通过
  `break` 命令退出循环。如果操作失败，执行流程会移至 `catch` 代码块。在这里，我们将失败信息写入控制台，然后将脚本的执行暂停 30 秒。


  **提示**

  尽管读取文件失败总会产生一个错误，但它通常不会导致脚本终止。由于我们需要脚本终止才能使流程转入 `catch` 代码块，因此我们使用 `-ErrorAction`
  参数来强制脚本终止。


  ```

  for ($i=1; $i -le 3; $i++) {

  try {

  Get-Content c:\ExpertScripting.txt -ErrorAction Stop

  "Attempt " + $i + " Succeeded"

  break

