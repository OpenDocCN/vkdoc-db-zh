  导航对象层次结构并重命名表


  也可以从 SQL Server Management Studio (SSMS) 内部启动 PowerShell。为此，在对象资源管理器中的对象文件夹上右键单击并选择
  **启动 PowerShell**。这将调用 PowerShell CLI，其初始位置与你用于调用 CLI 的对象文件夹相匹配。


  ## 总结


  PowerShell 提供了两种操作方式。命令行界面可用于立即执行命令，类似于 Windows 命令提示符。这对于需要执行临时操作或进行快速检查的管理员非常有用。第二种操作方式是脚本编写。管理员或
  DevOps 工程师可以构建涉及多个命令或计划自动运行的复杂脚本。


  PowerShell 语言通过模块实现，使其具有可扩展性。每个模块包含提供功能的 cmdlet。常用的 cmdlet 提供别名，这些别名可以缩短你必须键入的命令长度，并帮助具有
  DOS 或 Linux 经验的新 PowerShell 用户学习该语言。但是，别名应保留用于临时命令。在脚本中使用时，它们会使代码难以理解和管理。


  PowerShell 中的每个变量都是一个对象，并关联有数据类型。由于这些对象映射到 .NET 类，因此可以使用诸如 `ToString()` 等方法。PowerShell
  还提供了一个丰富的框架来控制脚本的执行流。这包括管道，它允许你将一个命令的结果直接传递给下一个命令。


  `SqlServer` 模块为 SQL Server 提供支持。加载该模块后，它会公开一组基于 SQL Server 的 cmdlet，允许你从命令 shell
  或通过自动化脚本管理 SQL Server。它还允许你导航 SQL Server 实例的对象层次结构，并对对象执行基本任务。


  '
- "# 3. PowerShell DSC\n\n配置管理是一种强大的方法，可用于根据组织的标准配置服务器，并通过在其生命周期内按计划强制执行策略，使它们保持一致的配置。\n\
  \n在本章中，我们将讨论配置管理方法背后的概念，然后深入探讨微软的配置管理工具——期望状态配置（DSC）的具体实现。最后，我们将探索如何在 SQL Server\
  \ 环境中实施 DSC 来配置 Windows Server。\n\n\n## 理解配置管理\n\n构建和配置服务器的方式有很多种。我们可以手动配置服务器，可以使用黄金镜像或构建脚本，但每种方法都有其局限性。\n\
  \n手动配置服务器的局限性相当明显。这是一项单调、耗时的工作，常常导致人为错误，进而造成环境状态不一致。即使服务器是按照良好标准构建的，其配置也可能随着时间的推移而发生**偏移**。\n\
  \n如果我们采用黄金镜像方法，即构建一个单一镜像，使用 `sysprep` 然后多次部署它，那么我们可以解决手动构建所描述的问题，但同时又会引发新的问题。具体来说：\n\
  \n*   我们没有任何灵活性。每台服务器都必须是 100%相同的。这意味着如果我们需要最细微的变体，我们必须要么\n    *   拥有大量黄金镜像选择，每一个都必须单独维护\n\
  \    *   使用黄金镜像，但随后进行手动更新，这可能导致环境状态不一致\n*   虽然每台服务器在构建时环境状态可能是一致的，但随着时间的推移，手动更改可能导致配置偏移，并最终造成环境状态不一致。\n\
  \n如果我们采用脚本化方法，我们通常会从一个非常基础的黄金镜像开始，然后针对新创建的服务器运行构建脚本，这些脚本将执行配置。这种方法消除了黄金镜像的第一个问题。具体来说，它允许我们拥有一致的构建，利用脚本中的逻辑为不同用例配置服务器。然而，它并没有解决第二个问题。随着服务器生命周期的推进，仍然存在配置偏移的可能性。\n\
  \n配置管理解决了上述所有构建问题。它是一种脚本化方法，但脚本不是只在构建时运行一次，而是按计划运行。每次脚本运行时，它都会检查服务器的配置应该是什么，如果有任何偏移，它会将配置恢复到期望状态。\n\
  \n配置管理中使用的逻辑如图 3-1 所示。\n\n![](img/395785_2_En_3_Fig1_HTML.jpg)\n\n图 3-1：配置管理逻辑\n\
  \n此过程可用于配置服务器内的任何配置项。它可以安装软件、配置安全设置，甚至可以安装和配置 SQL Server（这将在第 6 章和第 9 章讨论）。\n\n\
  有许多配置管理工具可用，包括 Ansible、Chef 和 Puppet。然而，本书将重点介绍微软的 DSC 或所需状态配置，这是微软对配置管理的实现。\n\n\
  ## 理解 DSC\n\nDSC 可以通过两种主要方式实现。第一种是在机器级别。这种方法是最简单的实现，最适合小型环境或测试。DSC 包含在 Windows Management\
  \ Framework 5.1 中。因此，我们无需安装任何客户端软件即可开始使用 DSC。本章将重点介绍这种方法，以最直接的方式帮助您理解其实现。\n\n第二种实现方式是通过使用集中管理资源，可以从单一位置管理多台机器。这最适合大型企业，因为当您拥有许多服务器时，它能显著减少管理开销。\n\
  \n集中管理组件可以是一个拉取服务器，即运行 `DSC-Service` Windows Server 功能的服务器，也可以是来宾配置 Azure Policy，它与\
  \ Azure VM 和 Azure 外的 Arc 启用服务器兼容。\n\n> **注意**：Windows 拉取服务器仍是一个受支持的功能，但已不再进行开发。这意味着微软\
  \ DSC 通常最适合使用 Azure 或 Arc 启用服务器的中小型组织。DSC 代码实际上已经分支，因此 DSC 1.1 仍然受支持但不再维护。它可以与最高到\
  \ PowerShell 5.1 的版本一起使用，并且可以在非 Azure 环境中使用。DSC 2.0 在 PowerShell 7 及以上版本中受支持，但设计用于与\
  \ Azure 配合使用。在撰写本文时，DSC 3.0 处于预览阶段。\n\nDSC 中需要理解的两个主要概念是配置和资源。配置提供了一种简单的机制来描述项目的期望配置，而资源则提供了实现配置中描述的设置的机制（同时考虑项目的当前状态）。每个\
  \ DSC 资源都有三种方法：`Get`、`Test` 和 `Set`。`Get` 方法用于检索资源的当前状态。`Test` 方法用于确定服务器（在 DSC 中称为节点）当前是否配置为其期望的目标状态。`Set`\
  \ 方法用于将节点配置为符合其目标状态。\n\nDSC 提供了许多内置资源，可用于配置服务、用户、组、注册表项和 Windows 功能等项目。DSC 也是完全可扩展的。我们可以创建自己的自定义资源，用于配置任何可以通过\
  \ PowerShell 配置的项目。\n\n资源可以使用基于类的方法或基于 Microsoft Operations Framework (MOF) 的方法来编写。本章将重点介绍使用开箱即用的资源，但有关创建自定义\
  \ DSC 资源的指南可在以下位置找到：`learn.microsoft.com/en-us/powershell/dsc/resources/authoringresourceclass?view=dsc-1.1`。\n\
  \n配置是应应用的资源的清单。它们通过一种特殊类型的函数实现，该函数列出了应应用于节点的资源。每个资源至少传递两个参数。其中一个参数是目标实例的名称。第二个是应对其应用的操作。例如，如果您有一个资源用于确保\
  \ SQL Browser 服务正在运行，您将使用服务资源并传递 `Name = \"SQLBrowser\"` 和 `State = \"Running\"\
  `。另一方面，如果您想确保文件 `C:\\Logs\\CustomSqlLog.log` 存在，您将使用文件资源并传递参数 `Name = \"C:\\Logs\\\
  CustomSqlLog.log\"` 和 `Ensure = \"Present\"`。本地配置管理器是读取配置并使用资源来确保应用期望配置的引擎。\n\n\n\
  \n## 使用 DSC 配置 Windows 服务器\n\n现在我们已经理解了关键概念，让我们将这些概念付诸实践，使用 DSC 1.1 来执行一些简单的 Windows\
  \ 服务器配置。您可能希望在操作系统级别执行许多配置，例如配置操作系统以符合 CIS 基准，或者确保 SQL Server 数据库引擎服务正在运行。然而，为了保持简单，在本例中，我们将力求确保以下目标配置：\n\
  \n*   确保存在一个用于存储 SQL Server 使用的证书备份的文件夹\n*   确保 Windows 被配置为优化后台任务\n*   确保 SQL Server\
  \ 数据库引擎服务正在运行\n\n### 定义文件资源\n\n清单 3-1 中的代码片段演示了如何定义一个资源，该资源将确保存在一个名为 `CertificateBackups`\
  \ 的文件夹。声明以使用 `File` 关键字开始，这表示被声明的资源是 DSC `File` 资源。后面是资源的名称。提供名称至关重要，因为它唯一地标识了相同类型的资源。在花括号内，我们传递\
  \ `Ensure = \"Present\"`，这表明我们希望确保文件夹存在。如果我们想确保它不存在，可以传递 `Ensure = \"Absent\"`。我们传递\
  \ `Type = \"Directory\"`。如果我们想管理一个文件而不是文件夹，可以传递 `Type = \"File\"`。然后我们可以使用 `Content\
  \ = \"FooBar\"` 将文本插入文件。最后，我们传递 `DestinationPath = \"C:\\CertificateBackups\"`，它定义了我们要让资源管理哪个文件夹。\n\
  \n```powershell\nFile CreateCertificateBackupsFolder {\nEnsure           = \"Present\"\
  \nType             = \"Directory\"\nDestinationPath  = \"C:\\CertificateBackups\"\
  \n}\n```\n**清单 3-1** 定义一个 `File` 资源\n\n### 定义注册表资源\n\n清单 3-2 中的代码片段演示了如何使用 `Registry`\
  \ DSC 资源。这种资源类型对于配置许多 Windows 级别的项目很有用，但在这里，我们将用它来确保 Windows 被配置为针对后台任务进行优化。我们不希望数据库引擎因为用户在\
  \ Management Studio 中点击操作被优先处理而不得不等待。这次，我们使用 `Registry` 关键字来表示这是一个 `Registry` DSC\
  \ 资源。同样，我们给它一个合理的名称。在花括号内，我们再次使用 `Ensure = “Present”` 来表示相关的字符串值应存在于注册表项中。我们使用 `Key\
  \ = \"HKLM:\\SYSTEM\\CurrentControlSet\\Control\\PriorityControl\"` 来指定我们想要管理的注册表项的路径。我们使用\
  \ `ValueName = \"Win32PrioritySeparation\"` 来表示该项中应该存在的值，并使用 `ValueData = 24` 来定义我们为该项期望的值。\n\
  \n```powershell\nRegistry OptimizeForBackgroundServices {\nEnsure      = \"Present\"\
  \nKey         = \"HKLM:\\SYSTEM\\CurrentControlSet\\Control\\PriorityControl\"\n\
  ValueName   = \"Win32PrioritySeparation\"\nValueType   = 'Dword'\nValueData   =\
  \ 24\n}\n```\n**清单 3-2** 定义一个 `Registry` 资源\n\n### 定义服务资源\n\n我们的最后一个资源确保默认 SQL Server\
  \ 实例的数据库引擎服务正在运行。\n\n> **提示**\n> 我们将在第 6 章讨论如何构建 SQL Server，因此如果您想跟随示例操作，但尚未安装 SQL\
  \ Server，可以将 SQL Server 数据库引擎服务更改为任何其他确实存在的服务。\n\n清单 3-3 演示了如何通过使用 `Service` DSC\
  \ 资源来定义此资源。声明以 `Service` 关键字开始，表示我们正在使用 `Service` DSC 资源，并且同样，我们提供一个合理的名称。在花括号内，您会注意到这次我们没有传递\
  \ `Ensure`。当未指定时，`Ensure` 默认为 `Present`。我们传递 `Name = \"MSSQLSERVER\"` 来定义我们希望管理的服务。我们传递\
  \ `StartupType = \"Automatic\"` 来指定该服务应始终配置为自动启动，传递 `State = \"Running\"` 来指定该服务应始终正在运行。如果服务停止，DSC\
  \ 将自动为我们启动它。\n\n```powershell\nService SQLServerService {\n    Name        = \"\
  MSSQLSERVER\"\n    StartupType = \"Automatic\"\n    State       = \"Running\"\n\
  }\n```\n**清单 3-3** 定义一个 `Service` 资源\n\n### 创建配置文件\n\n现在我们所有的资源都已定义，我们需要将它们整合到一个配置文件中。我们将使用的配置文件如清单\
  \ 3-4 所示。第一行使用 `Configuration` 关键字，后跟配置的名称。所需的 DSC 资源从 `PSDesiredStateConfiguration`\
  \ PowerShell 模块导入。\n\n接下来，我们定义配置应在其中运行的主机。在我们的拓扑中，我们将计划配置从任务计划程序在本地运行。因此，我们将其定义为\
  \ `localhost`。在节点定义内部，我们拥有所有资源的定义，这些资源规划了我们期望的配置。\n\n最后，文件的最后一行调用了我们刚刚定义的配置。可以将配置的定义想象成定义一个函数。仅仅定义函数要做什么是不够的，它需要被实际调用才能执行。\n\
  \n我们需要将此文件保存到本地计算机。我已将其保存为 `C:\\Scripts\\WindowsConfig.ps1`。\n\n```powershell\n\
  Configuration WindowsConfig {\n    Import-DscResource -ModuleName 'PSDesiredStateConfiguration'\n\
  \    Node 'localhost' {\n        File CreateCertificateBackupsFolder {\n       \
  \     Ensure = \"Present\"\n            Type = \"Directory\"\n            DestinationPath\
