  OMS 并不会同时升级代理。不过，你可以通过在 EM12c 控制台中点击`可升级`，选择要升级的代理，然后点击`升级`按钮来批量升级代理。


  你还可以选择特定的代理（按住 Ctrl 键的同时进行选择）或一系列代理（按住 Shift 键的同时进行选择）来执行操作，例如启动、关闭、保障安全等。这些相当直接的操作在
