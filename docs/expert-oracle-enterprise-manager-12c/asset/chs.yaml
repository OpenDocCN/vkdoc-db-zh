  \ 安装将失败。\n\n5.  通过在备用主机上以备用模式运行 `omsca` 来配置备用管理服务。\n\n```\n    $ $OMS_HOME/bin/omsca\
  \ standby -EM_DOMAIN_NAME GCDomainStby -NM_USER \\\n    nodemanager -AS_USERNAME\
  \ weblogic -nostart\n    Oracle Enterprise Manager Cloud Control 12c Release 12.1.0.2.0\n\
